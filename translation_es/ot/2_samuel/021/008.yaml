translation:
  language: es
  text: 'Entonces el rey tomó a los dos hijos de Rizpa, hija de Aía, los cuales ella había dado a Saúl: Armoní y Mefibóset; y a los cinco hijos de Mical[a], hija de Saúl, los cuales ella había dado a Adriel, hijo de Barzilai, el meholatita.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos e intérpretes antiguos tienen «Merab» en lugar de «Mical»; compárese 1 Samuel 18:19, donde se dice que Adriel se casó con Merab, hija de Saúl.
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: So ... took
  chosen_spanish: Entonces ... tomó
  alternatives_spanish:
  - Y ... tomó
  - Así que ... tomó
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; «Entonces» conserva la secuencia narrativa con español natural y digno.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Se conserva el título indefinido por el hebreo, sin sustituirlo por el nombre propio, siguiendo el texto fuente.
- source_word: שְׁנֵי בְּנֵי
  english_pob_choice: the two sons of
  chosen_spanish: los dos hijos de
  alternatives_spanish:
  - los dos hijos de entre
  lexicon: HALOT
  rationale: La cadena constructa con numeral se expresa de forma directa en español como «los dos hijos de».
- source_word: רִצְפָּה בַת אַיָּה
  english_pob_choice: Rizpah daughter of Aiah
  chosen_spanish: Rizpa, hija de Aía
  alternatives_spanish:
  - Rizpa, la hija de Aía
  lexicon: HALOT
  rationale: Los nombres propios se transliteran; la relación filial se vierte con una construcción natural en español.
- source_word: אֲשֶׁר יָלְדָה לְשָׁאוּל
  english_pob_choice: whom she had borne to Saul
  chosen_spanish: a quienes ella había dado a luz para Saúl
  alternatives_spanish:
  - a quienes ella había dado a luz a Saúl
  - a quienes ella había parido para Saúl
  lexicon: HALOT
  rationale: יָלַד con ל expresa la filiación/paternidad. «Dar a luz» conserva el sentido de maternidad; «para Saúl» refleja la relación de pertenencia/paternidad indicada por la preposición, sin suavizarla excesivamente.
- source_word: אַרְמֹנִי
  english_pob_choice: Armoni
  chosen_spanish: Armoní
  alternatives_spanish:
  - Armoni
  lexicon: HALOT
  rationale: Nombre propio transliterado; se adapta la acentuación al español para facilitar la lectura sin alterar la identificación.
- source_word: מְפִבֹשֶׁת
  english_pob_choice: Mephibosheth
  chosen_spanish: Mefibóset
  alternatives_spanish:
  - Mefiboset
  lexicon: HALOT
  rationale: Nombre propio transliterado en forma consistente y legible en español, evitando la forma tradicional inglesa.
- source_word: חֲמֵשֶׁת בְּנֵי
  english_pob_choice: the five sons of
  chosen_spanish: los cinco hijos de
  alternatives_spanish:
  - los cinco hijos
  lexicon: HALOT
  rationale: La expresión cuantificada se vierte de manera directa y natural en español.
- source_word: מִיכַל בַּת שָׁאוּל
  english_pob_choice: Michal daughter of Saul
  chosen_spanish: Mical, hija de Saúl
  alternatives_spanish:
  - Mical, la hija de Saúl
  lexicon: HALOT
  rationale: Se mantiene el nombre tal como está en el hebreo, sin armonizarlo en el texto principal con la otra tradición.
- source_word: אֲשֶׁר יָלְדָה לְעַדְרִיאֵל
  english_pob_choice: whom she had borne to Adriel
  chosen_spanish: a quienes ella había dado a luz para Adriel
  alternatives_spanish:
  - a quienes ella había dado a luz a Adriel
  lexicon: HALOT
  rationale: Se conserva la misma construcción que antes para mantener la correspondencia con el hebreo y la coherencia interna del versículo.
- source_word: בֶּן בַּרְזִלַּי
  english_pob_choice: son of Barzillai
  chosen_spanish: hijo de Barzilai
  alternatives_spanish:
  - descendiente de Barzilai
  lexicon: HALOT
  rationale: Se traduce el patronímico de forma estándar y transparente.
- source_word: הַמְּחֹלָתִי
  english_pob_choice: the Meholathite
  chosen_spanish: el meholatita
  alternatives_spanish:
  - el de Meholá
  lexicon: HALOT
  rationale: Se conserva el gentilicio con una forma castellana clara; «meholatita» refleja el valor etnogeográfico del término.
theological_decisions:
- issue: Tensión histórica/textual en torno a Mical o Merab como madre de los hijos de Adriel
  english_pob_reading: Retain 'Michal' in the main text as the reading of the Hebrew source, with the alternative 'Merab' preserved in a footnote.
  chosen_spanish_reading: Mantener «Mical» en el texto principal, con una nota que preserve la alternativa «Merab».
  alternative_spanish_readings:
  - Merab, hija de Saúl
  rationale: La prioridad es respetar la lectura del texto hebreo recibido sin emendarla silenciosamente. Dado que 1 Samuel 18:19 atribuye a Merab la relación con Adriel, la variante se documenta para transparencia textual y no se armoniza en el cuerpo principal.
  doctrine_reference: Principio de fidelidad al texto fuente; transparencia textual
- issue: Relación filial expresada por ל con יָלַד
  english_pob_reading: whom she had borne to Saul / Adriel
  chosen_spanish_reading: a quienes ella había dado a luz para Saúl / para Adriel
  alternative_spanish_readings:
  - a quienes ella había dado a luz a Saúl / a Adriel
  - a quienes ella había alumbrado para Saúl / para Adriel
  rationale: Se mantiene el sentido biológico y de filiación del hebreo sin reducirlo a una simple mención relacional. «Dar a luz» es claro en español y preserva la fuerza semántica de yālad.
  doctrine_reference: Semántica bíblica de filiación y descendencia
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la decisión óptima-equivalente del audit trail inglés: mantiene el título «el rey», conserva la lectura hebrea «Mical» en el texto principal y documenta en nota la variante tradicional «Merab». También ajusta nombres propios y patronímicos a formas españolas legibles sin borrar la tensión textual.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en este encargo solo cuando aparezca el tetragrámaton; aquí no aparece.
  - «Saúl» y «Barzilai» se mantienen con grafía española habitual.
  - Los nombres propios han sido transliterados de manera consistente y sin sustituir la lectura del hebreo por armonizaciones internas.
  - Se prefirió «dar a luz» para reflejar el verbo de nacimiento con naturalidad en español, manteniendo la relación filial indicada por la preposición hebrea.
