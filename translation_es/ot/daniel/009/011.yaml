translation:
  language: es
  text: Todo Israel ha transgredido tu ley y se ha desviado, sin escuchar tu voz. Por eso, la maldición y el juramento[a] que están escritos en la ley de Moisés, siervo de Dios, se han derramado sobre nosotros, porque hemos pecado contra él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la maldición jurada'. El hebreo dice literalmente 'la maldición y el juramento', probablemente aludiendo a las sanciones de pacto juradas en la ley de Moisés.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: All Israel
  chosen_spanish: Todo Israel
  alternatives_spanish:
  - Israel entero
  - la totalidad de Israel
  lexicon: HALOT
  rationale: כָל con Israel expresa al pueblo de manera corporativa y completa. 'Todo Israel' es natural en español, mantiene el alcance nacional de la confesión y evita diluir el sujeto colectivo.
- source_word: עָבְרוּ אֶת תּוֹרָתֶךָ
  english_pob_choice: has transgressed your law
  chosen_spanish: ha transgredido tu ley
  alternatives_spanish:
  - ha traspasado tu ley
  - ha violado tu instrucción
  lexicon: HALOT
  rationale: עָבַר con תורה en contexto de pacto comunica quebrantar o transgredir. 'Transgredido' preserva esa fuerza jurídica y moral. 'Ley' refleja aquí el contenido normativo del pacto, como en el audit trail inglés.
- source_word: וְסוֹר
  english_pob_choice: and turned aside
  chosen_spanish: y se ha desviado
  alternatives_spanish:
  - y se ha apartado
  - y ha girado aparte
  lexicon: HALOT
  rationale: סור expresa apartarse del camino debido. 'Se ha desviado' conserva la imagen de desviación respecto de la obediencia y funciona bien en paralelo con 'ha transgredido'.
- source_word: לְבִלְתִּי שְׁמֹעַ בְּקוֹלֶךָ
  english_pob_choice: not listening to your voice
  chosen_spanish: sin escuchar tu voz
  alternatives_spanish:
  - para no escuchar tu voz
  - no escuchando tu voz
  lexicon: HALOT
  rationale: La construcción negativa indica el resultado o propósito de la desviación. 'Sin escuchar tu voz' es fiel y más natural que una paráfrasis más fuerte; mantiene la idiomaticidad hebrea de 'escuchar la voz'.
- source_word: וַתִּתַּךְ עָלֵינוּ
  english_pob_choice: have been poured out on us
  chosen_spanish: se han derramado sobre nosotros
  alternatives_spanish:
  - han caído sobre nosotros
  - se han volcado sobre nosotros
  lexicon: HALOT
  rationale: נתך aquí se usa de algo que se derrama sobre personas, normalmente juicio o maldición. 'Se han derramado' conserva la metáfora de vertido y la pasividad del hebreo.
- source_word: הָאָלָה
  english_pob_choice: the curse
  chosen_spanish: la maldición
  alternatives_spanish:
  - la maldición-pena
  - la maldición del pacto
  lexicon: HALOT
  rationale: אָלָה suele denotar una maldición, especialmente de pacto. 'Maldición' es clara y no sobreinterpreta el término; permite que el contexto pactal siga funcionando sin explicitarlo en el texto principal.
- source_word: וְהַשְּׁבֻעָה
  english_pob_choice: and the oath
  chosen_spanish: y el juramento
  alternatives_spanish:
  - y la jura
  - y el juramento solemne
  lexicon: HALOT
  rationale: שְׁבוּעָה es literalmente 'juramento'. En español 'juramento' comunica mejor la forma nominal y la dimensión vinculante que 'oath' en el contexto bíblico. Se preserva así la tensión entre 'maldición' y 'juramento' sin resolverla excesivamente.
- source_word: אֲשֶׁר כְּתוּבָה בְּתוֹרַת מֹשֶׁה
  english_pob_choice: that are written in the law of Moses
  chosen_spanish: que están escritas en la ley de Moisés
  alternatives_spanish:
  - que está escrita en la ley de Moisés
  - escrita en la ley de Moisés
  lexicon: HALOT
  rationale: Aunque כְּתוּבָה es singular femenina, el referente conceptual conjunto es 'la maldición y el juramento', por lo que el plural concuerda naturalmente en español. 'Ley de Moisés' conserva el valor normativo del corpus mosaico.
- source_word: עֶבֶד הָאֱלֹהִים
  english_pob_choice: the servant of God
  chosen_spanish: siervo de Dios
  alternatives_spanish:
  - esclavo de Dios
  - servidor de Dios
  lexicon: HALOT
  rationale: עֶבֶד puede ser 'siervo' o 'esclavo'. Aquí el título de Moisés es honorífico y tradicionalmente se vierte como 'siervo de Dios' en español bíblico. Se conserva ese registro por razones de claridad y respeto al título.
- source_word: כִּי חָטָאנוּ לֽוֹ
  english_pob_choice: because we have sinned against him
  chosen_spanish: porque hemos pecado contra él
  alternatives_spanish:
  - porque hemos pecado contra Dios
  - porque pecamos contra él
  lexicon: HALOT
  rationale: חטא con ל puede expresar pecar contra alguien. 'Pecado contra él' conserva la relación personal implícita; el antecedente es Dios, a quien se dirige la oración.
theological_decisions:
- issue: Guilt corporativa y primera persona plural
  english_pob_reading: All Israel has transgressed ... have been poured out on us ... we have sinned against him.
  chosen_spanish_reading: Todo Israel ha transgredido ... se han derramado sobre nosotros ... hemos pecado contra él.
  alternative_spanish_readings:
  - Todo Israel ha transgredido ... se ha derramado sobre nosotros ... hemos pecado contra él
  - Todo Israel ha transgredido ... han sido derramados sobre nosotros ... hemos pecado contra él
  rationale: El hebreo presenta a Israel como un todo corporativo y, a la vez, incluye a Daniel en la confesión de culpa. El español mantiene esa solidaridad usando un sujeto colectivo al inicio y la primera persona plural después.
  doctrine_reference: Translation philosophy §5; §6
- issue: Relación entre 'maldición' y 'juramento'
  english_pob_reading: the curse and the oath
  chosen_spanish_reading: la maldición y el juramento
  alternative_spanish_readings:
  - la maldición jurada
  - la maldición y el juramento solemne
  rationale: El texto hebreo conserva dos sustantivos distintos; no conviene fusionarlos de entrada. 'Juramento' reproduce שְׁבוּעָה y deja abierta la referencia a las sanciones de pacto sin borrar la tensión textual.
  doctrine_reference: Translation philosophy §3
- issue: Valor del título aplicado a Moisés
  english_pob_reading: the servant of God
  chosen_spanish_reading: siervo de Dios
  alternative_spanish_readings:
  - siervo del Dios
  - servidor de Dios
  rationale: El título resalta la función pactal y profética de Moisés. 'Siervo de Dios' es la fórmula más estable y fiel en el registro bíblico en español, sin sustituirla por un término más débil o menos reverente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El texto inglés revisó 'refusing to listen' por 'not listening' para acercarse más al hebreo. En español se refleja esa menor interpretación con 'sin escuchar tu voz', evitando una explicitación volitiva que el original no exige.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplicable aquí, pues el versículo usa un pronombre dirigido a Dios y no el tetragrama explícito.
  - Se eligió 'ley' para תּוֹרָה conforme al uso pactal del contexto y al audit trail inglés; no se usó 'instrucción' por la referencia específica a Moisés.
  - Se preservó la metáfora de 'derramar' para וַתִּתַּךְ, coherente con el tono judicial del pasaje.
  - Se evitó traducir אֱלֹהִים en plural, ya que aquí funciona como título singular de Dios.
  - Se mantuvo la tensión léxica entre 'maldición' y 'juramento' en vez de resolverla con una sola expresión interpretativa.
