review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el hebreo: ''Pondrá su mano'', ''sobre la cabeza de su ofrenda'', ''a la entrada de la tienda de reunión'' y ''los hijos de Aarón, los sacerdotes'' reflejan fielmente וְסָמַךְ, רֹאשׁ קָרְבָּנוֹ, פֶּתַח אֹהֶל מוֹעֵד y בְּנֵי אַהֲרֹן הַכֹּהֲנִים. Sin embargo, el punto clave וְזָרְקוּ ... עַל־הַמִּזְבֵּחַ סָבִיב no está bien preservado: ''rociarán la sangre alrededor del altar'' cambia el verbo de lanzar/arrojar contra el altar por uno de rociar, y además debilita la relación de impacto con el altar expresada por זרק + עַל.'
  spanish_quality_summary: El español es claro y legible, con registro digno y natural. 'Degollará' funciona bien para שׁחט en contexto sacrificial. No obstante, 'rociarán la sangre alrededor del altar' suena ritual e idiomático, pero precisamente por eso introduce una acción distinta de la del hebreo. También conviene mejorar la nota b para que la alternativa sea español natural y no 'contra el altar alrededor', que resulta torpe.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto. ''Tienda de reunión'' y ''ofrenda'' son adecuados. El principal desajuste léxico-teológico es זרק: según el expediente inglés, debe mantenerse el sentido de ''arrojar/echar'' la sangre contra el altar, no ''rociar''.'
  issues:
  - severity: high
    issue: '''rociarán'' para וְזָרְקוּ'
    rationale: זרק en este contexto sacrificial significa arrojar/lanzar la sangre, no rociarla. 'Rociar' introduce otro matiz ritual y contradice la decisión léxica y teológica documentada en el audit trail inglés.
  - severity: high
    issue: '''alrededor del altar'' omite el valor de impacto de עַל־הַמִּזְבֵּחַ'
    rationale: El hebreo expresa que la sangre es arrojada contra/sobre el altar, con סביב añadiendo 'todo alrededor'. La redacción actual transmite ubicación periférica, no la acción contra el altar.
  - severity: medium
    issue: La nota b es poco natural en español
    rationale: La alternativa 'arrojarán la sangre contra el altar alrededor' conserva mejor el verbo, pero el orden final suena forzado. Debe formularse como 'arrojarán la sangre contra el altar, todo alrededor' o equivalente natural.
  revised_spanish_text: Pondrá su mano sobre la cabeza de su ofrenda y la degollará a la entrada de la tienda de reunión[a]; y los hijos de Aarón, los sacerdotes, arrojarán la sangre contra el altar, todo alrededor[b].
  revised_footnotes:
  - marker: a
    text: O “a la puerta de la tienda de reunión”.
    reason: lexical_alternative
  - marker: b
    text: O “lanzarán la sangre contra el altar, todo alrededor”.
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo principal de la aplicación de la sangre para reflejar fielmente זרק ('arrojar/lanzar') en vez de 'rociar', y se restituye la relación con el altar expresada por עַל־הַמִּזְבֵּחַ mediante 'contra el altar'. 'Todo alrededor' traduce naturalmente סביב y sigue la revisión final del POB inglés. Se mantiene el resto del texto, que ya era fiel y legible.
