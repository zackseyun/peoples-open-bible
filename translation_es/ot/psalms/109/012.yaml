review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura imprecatoria de אַל יְהִי con «No haya quien», y transmite adecuadamente מֹשֵׁךְ חָסֶד como una acción de prolongar/mostrar benevolencia. También conserva la referencia a los hijos del sujeto como vulnerables. Sin embargo, la nota a invierte los componentes semánticos del modismo al decir «arrastrar/dibujar bondad», cuando el hebreo literalmente habla de ‘arrastrar/sacar’ la bondad, no de dibujarla; además, «sus hijos huérfanos» suena menos natural y algo redundante en español para יְתוֹמָיו.
  spanish_quality_summary: El texto principal es claro y legible, pero puede pulirse para sonar más natural en español eclesial amplio. «No haya quien le extienda bondad» funciona, aunque «bondad» puede sentirse un poco abstracto con «extender». La frase «sus hijos huérfanos» es comprensible pero torpe; «sus hijos sin padre» preserva mejor la especificidad de «fatherless children» y suena más natural. Las notas necesitan ajuste estilístico y léxico.
  glossary_alignment: No hay conflicto con los términos globales del proyecto. No aparecen Yahvé, Mesías, etc. La decisión de חָסֶד como «bondad» es defendible en contexto humano, aunque «misericordia» también sería posible. La principal mejora es representar יְתוֹמָיו de forma más idiomática en español sin perder la relación posesiva ni el matiz de orfandad paterna.
  issues:
  - severity: medium
    issue: «sus hijos huérfanos» suena redundante y poco natural
    rationale: Aunque semánticamente posible, en español «hijos huérfanos» resulta extraño. El hebreo señala a sus hijos dejados sin padre; «sus hijos sin padre» comunica esto con mayor naturalidad y precisión contextual.
  - severity: medium
    issue: La nota [a] usa «dibujar» para explicar el literal hebreo
    rationale: El verbo משׁךְ aquí se relaciona con ‘arrastrar’, ‘sacar’ o ‘prolongar’, no con ‘dibujar’. Esa formulación puede confundir al lector y no refleja bien el razonamiento léxico documentado.
  - severity: low
    issue: La nota [b] queda menos útil si el texto principal ya usa «huérfanos»
    rationale: Si el texto principal dice «sus hijos huérfanos», la alternativa «huérfanos» aporta poco. Al revisar el texto principal a «sus hijos sin padre», la nota recupera utilidad como alternativa léxica breve.
  revised_spanish_text: No haya quien le extienda bondad[a], ni quien muestre favor a sus hijos sin padre[b].
  revised_footnotes:
  - marker: a
    text: 'O: «le continúe misericordia»; el modismo hebreo habla literalmente de «prolongar» o «arrastrar» la bondad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus huérfanos».'
    reason: lexical_alternative
  revision_rationale: Se mantiene la fuerza imprecatoria y la estructura del original, pero se mejora la naturalidad española y la precisión de las notas. «Sus hijos sin padre» refleja mejor יְתוֹמָיו que «sus hijos huérfanos», y la nota [a] corrige una explicación literal inexacta del hebreo.
