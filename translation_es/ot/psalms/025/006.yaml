translation:
  language: es
  text: Recuerda tus misericordias[a], oh Yahvé, y tus amores leales[b], porque son desde antiguo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «compasiones». El hebreo tiene un plural que puede expresar multiplicidad o abundancia de actos de misericordia.
    reason: lexical_alternative
  - marker: b
    text: O «tu amor leal». El hebreo tiene aquí una forma plural; en español puede expresarse en singular para sonar más idiomático. Otras posibilidades incluyen «tus misericordias fieles» o «tu amor constante».
    reason: lexical_alternative
  - marker: c
    text: O «desde la eternidad» o «desde siempre». La expresión hebrea puede señalar antigüedad remota o duración sin fin.
    reason: alternative_reading
lexical_decisions:
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  lexicon: HALOT
  rationale: Imperativo qal 2ms de זכר. En español, «recuerda» conserva la petición directa y solemne sin forzar una forma reflexiva menos natural en este contexto oracional.
- source_word: רַחֲמֶיךָ
  english_pob_choice: your mercies
  chosen_spanish: tus misericordias
  alternatives_spanish:
  - tu compasión
  - tus entrañas de misericordia
  lexicon: HALOT
  rationale: El plural hebreo favorece un plural en español. «Misericordias» mantiene la fuerza concreta y plural del sustantivo, mientras que «compasión» sería más abstracto y singular.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en el texto principal, preservando el nombre personal del pacto.'
- source_word: וַחֲסָדֶיךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu amor leal
  alternatives_spanish:
  - tu misericordia fiel
  - tu amor constante
  - tus amores leales
  lexicon: HALOT
  rationale: חסד expresa amor leal de pacto, no solo afecto general. En español, «amor leal» comunica bien la fidelidad relacional sin recurrir a un giro arcaico; el singular responde a la revisión inglesa que privilegió la naturalidad contextual frente al plural formal.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la petición; «porque» es claro y natural en español bíblico contemporáneo.
- source_word: מֵעוֹלָם
  english_pob_choice: from of old
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - desde la antigüedad
  - desde la eternidad
  - desde siempre
  lexicon: HALOT
  rationale: 'La expresión puede indicar antigüedad remota o, según contexto, duración eterna. Aquí conviene una formulación que preserve la modestia teológica del hebreo: «desde antiguo» comunica la idea de antigüedad sin resolverla en una afirmación metafísica más fuerte.'
- source_word: הֵמָּה
  english_pob_choice: they are
  chosen_spanish: son
  alternatives_spanish:
  - ellas son
  - éstas son
  lexicon: HALOT
  rationale: El pronombre independiente de tercera persona plural retoma los dos sustantivos plurales. En español basta el verbo copulativo «son»; no hace falta explicitar el pronombre si la referencia ya está clara.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre del pacto en transliteración, conforme a la doctrina del proyecto y frente a la sustitución por un título. Esto mantiene visible que el hebreo usa el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza temporal de מֵעוֹלָם
  english_pob_reading: from of old
  chosen_spanish_reading: desde antiguo
  alternative_spanish_readings:
  - desde la eternidad
  - desde siempre
  rationale: La frase puede sugerir antigüedad remota o eternidad. El contexto de la súplica apela a la larga historia de la misericordia divina; por eso se evita una lectura dogmáticamente más fuerte que el texto no exige.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue el audit trail inglés y la revisión más reciente: se mantiene la naturalidad contextual del singular para חֲסָדֶיךָ, mientras se preserva el plural de רַחֲמֶיךָ en español. También se conserva la tensión temporal de מֵעוֹלָם sin cerrarla en «eternidad» salvo como nota alternativa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la política del proyecto para יְהוָה.
  - Se reserva «misericordias» para רַחֲמֶיךָ por su plural explícito en hebreo.
  - «Amor leal» refleja חסד de manera comprensible y no arcaizante, sin borrar la dimensión de pacto.
  - 'La puntuación sigue el español bíblico moderno: vocativo con coma y pausa final natural.'
