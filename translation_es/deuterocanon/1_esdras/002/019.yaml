  to: Y encontrarás en los registros[a] lo que ha sido escrito acerca de estas cosas, y sabrás que aquella ciudad era rebelde, perturbando a reyes y ciudades, y que los judíos en ella eran rebeldes y habían organizado asedios[b] en ella desde antiguo; por esta causa esta ciudad fue asolada.
