review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: «diciendo», «A ti te daré», «la tierra de Canaán» y la aposición final. Sin embargo, no preserva adecuadamente una decisión fuente clave: el hebreo cambia de singular («a ti») a plural en נַחֲלַתְכֶם («vuestra/su herencia»), y el borrador lo neutraliza en el texto como «tu herencia». La nota además habla de «plural implícito», cuando en hebreo el sufijo es explícitamente plural.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para reflejar con más precisión el cambio de número y para evitar una explicación potencialmente engañosa. La frase revisada sigue siendo natural en español bíblico moderno. «La porción de vuestra herencia» suena algo más marcada en un registro latinoamericano neutral, pero aquí sirve justamente para conservar la tensión formal del original.
  glossary_alignment: No hay conflicto con los términos del glosario principal. «Canaán», «herencia» y «porción» están bien elegidos. La cuestión principal es de fidelidad morfosintáctica, no de terminología doctrinal. La nota léxica sobre חֶבֶל puede mantenerse.
  issues:
  - severity: high
    issue: Se pierde en el texto el cambio del singular al plural presente en el hebreo.
    rationale: El original dice «a ti» (2ms) pero luego «vuestra/su herencia» (2mp). El POB inglés decidió conservar esa tensión en el texto. «Tu herencia» la armoniza indebidamente.
  - severity: medium
    issue: La nota b describe incorrectamente el plural como «implícito».
    rationale: En נַחֲלַתְכֶם el sufijo -כם es plural explícito, no implícito. La nota debe describirlo con precisión.
  - severity: low
    issue: La decisión léxica española documenta una estrategia distinta de la auditada.
    rationale: La sección teológica dice que se mantiene la tensión, pero el texto español actual no la mantiene. Conviene alinear texto y documentación.
  revised_spanish_text: 'diciendo[a]: «A ti te daré la tierra de Canaán, la porción de vuestra herencia[b]»'
  revised_footnotes:
  - marker: a
    text: O «la cuerda de medición de vuestra herencia», donde «cuerda» se entiende por extensión como la porción de tierra asignada.
    reason: lexical_alternative
  - marker: b
    text: El hebreo pasa del singular «a ti» al plural explícito en «vuestra herencia», probablemente aludiendo a Abraham como representante de sus descendientes.
    reason: alternative_reading
  revision_rationale: Se revisa «tu herencia» a «vuestra herencia» para preservar en el cuerpo del texto el cambio de singular a plural presente en el hebreo y ya documentado por el POB inglés. También se corrige la nota para indicar que el plural es explícito, no implícito, y se ajusta la nota léxica para que concuerde con el texto revisado.
