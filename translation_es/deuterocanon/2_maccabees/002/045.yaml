translation:
  language: es
  text: tal como lo prometió por medio de la ley. Porque esperamos en Dios que pronto tendrá misericordia de nosotros y nos reunirá de debajo del cielo[a] en el lugar santo[b]; pues nos rescató de grandes males[c] y purificó el lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de todo lugar bajo el cielo’, es decir, desde los lugares de dispersión.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el sitio sagrado de Jerusalén; por contexto, se refiere al área del templo.
    reason: cultural_note
  - marker: c
    text: O ‘de grandes calamidades’ o ‘de grandes tribulaciones’.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς ἐπηγγείλατο
  english_pob_choice: just as he promised
  chosen_spanish: tal como lo prometió
  alternatives_spanish:
  - como lo prometió
  - justamente como lo prometió
  lexicon: BDAG
  rationale: καθώς expresa conformidad o comparación; ἐπαγγέλλομαι es ‘prometer’. ‘Tal como’ conserva la correspondencia del griego y suena natural en español.
- source_word: διὰ τοῦ νόμου
  english_pob_choice: through the law
  chosen_spanish: por medio de la ley
  alternatives_spanish:
  - a través de la ley
  - por la ley
  lexicon: BDAG
  rationale: διά con genitivo indica medio o instrumento. ‘Por medio de’ mantiene esa función de mediación sin endurecer el español.
- source_word: ἐλπίζομεν ... ἐπὶ τῷ θεῷ
  english_pob_choice: we hope in God
  chosen_spanish: esperamos en Dios
  alternatives_spanish:
  - ponemos nuestra esperanza en Dios
  - tenemos esperanza en Dios
  lexicon: BDAG
  rationale: La construcción griega expresa confianza/esperanza puesta en Dios. ‘Esperamos en Dios’ es idiomático y fiel al valor de ἐπὶ con dativo.
- source_word: ταχέως
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - rápidamente
  - sin demora
  lexicon: BDAG
  rationale: El adverbio marca prontitud futura. ‘Pronto’ es natural y no añade matiz ajeno.
- source_word: ἐλεήσει
  english_pob_choice: will ... have mercy on
  chosen_spanish: tendrá misericordia de nosotros
  alternatives_spanish:
  - mostrará misericordia hacia nosotros
  - se compadecerá de nosotros
  lexicon: BDAG
  rationale: ἐλεέω significa mostrar misericordia. ‘Tendrá misericordia de nosotros’ es la forma más natural y tradicionalmente comprensible en español, sin perder el sentido.
- source_word: ἐπισυνάξει
  english_pob_choice: gather
  chosen_spanish: nos reunirá
  alternatives_spanish:
  - nos congregará
  - nos juntará
  lexicon: BDAG
  rationale: El verbo sugiere reunir de nuevo, con posible matiz de restauración. ‘Nos reunirá’ preserva ese valor de convocar/regresar al conjunto.
- source_word: ἐκ τῆς ὑπὸ τὸν οὐρανόν
  english_pob_choice: from under heaven
  chosen_spanish: desde debajo del cielo
  alternatives_spanish:
  - desde todo lo que está bajo el cielo
  - desde las regiones bajo el cielo
  lexicon: BDAG
  rationale: La expresión griega es elíptica. ‘Desde debajo del cielo’ conserva la imagen de origen del texto; la referencia a la dispersión queda implícita, como en el audit trail inglés.
- source_word: εἰς τὸν ἅγιον τόπον
  english_pob_choice: into the holy place
  chosen_spanish: en el lugar santo
  alternatives_spanish:
  - al lugar santo
  - en el lugar sagrado
  lexicon: BDAG
  rationale: ἅγιος + τόπος se vierte de modo directo como ‘lugar santo’. Se mantiene el sustantivo ‘lugar’ para no interpretar más de lo que dice el griego.
- source_word: ἐξείλατο
  english_pob_choice: rescued
  chosen_spanish: nos rescató
  alternatives_spanish:
  - nos libró
  - nos salvó
  lexicon: BDAG
  rationale: ἐξαιρέω en voz media suele significar rescatar o librar de peligro. ‘Nos rescató’ conserva la fuerza concreta del verbo.
- source_word: ἐκ μεγάλων κακῶν
  english_pob_choice: from great evils
  chosen_spanish: de grandes males
  alternatives_spanish:
  - de grandes calamidades
  - de grandes aflicciones
  - de grandes males y desgracias
  lexicon: BDAG
  rationale: κακά puede abarcar males, calamidades o desgracias. ‘Males’ es lo bastante amplio para mantener la fuerza del griego sin restringirla a un solo matiz.
- source_word: τὸν τόπον ἐκαθάρισεν
  english_pob_choice: cleansed the place
  chosen_spanish: purificó el lugar
  alternatives_spanish:
  - limpió el lugar
  - purificó ese lugar
  lexicon: BDAG
  rationale: καθαρίζω puede ser limpiar o purificar. ‘Purificó’ refleja mejor el sentido ritual del contexto, mientras ‘el lugar’ conserva la transparencia del τόπος griego.
theological_decisions:
- issue: Referencia del ‘lugar santo’ y del ‘lugar’ final
  english_pob_reading: Keep τόπος as 'place' rather than explicitly 'temple' or 'sanctuary' in the main text.
  chosen_spanish_reading: Mantener ‘lugar santo’ y ‘el lugar’ sin expandir a ‘templo’ en el texto principal.
  alternative_spanish_readings:
  - templo
  - santuario
  - lugar sagrado
  rationale: El contexto apunta al área sagrada de Jerusalén, pero el griego usa τόπος. Para no sobretraducir, se conserva ‘lugar’ en la línea principal y se deja que el contexto temple el sentido.
  doctrine_reference: Principio de primacía del idioma original; no paraprasear más allá de lo que el texto garantiza.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete 1909 y el audit trail inglés existente, sin cambios sustantivos respecto de la lectura aprobada. Se preserva la ambigüedad de τόπος y la imagen espacial de ὑπὸ τὸν οὐρανόν.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando aparezca el tetragrámaton; aquí el texto dice θεῷ, por lo que corresponde ‘Dios’.
  - ‘Misericordia’ se usa para ἐλεέω, coherente con el léxico bíblico en español.
  - ‘Purificó’ se elige para la acción ritual de καθαρίζω, evitando ‘limpió’ por ser menos preciso en este contexto.
  - ‘Lugar santo’ conserva la referencia cultual sin introducir ‘templo’ en la línea principal.
