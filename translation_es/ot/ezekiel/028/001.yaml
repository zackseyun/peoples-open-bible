lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y llegó
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: El waw consecutivo introduce aquí una fórmula narrativa/secuencial; en español, «llegó» transmite de manera natural la entrada de la palabra profética sin caer en un calco arcaizante.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: En la fórmula profética, דָּבָר designa la palabra/mensaje de Dios. «La palabra» conserva el idiomatismo profético y es la opción más transparente en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte según el criterio editorial del proyecto como «Yahvé», preservando el nombre propio divino en vez de sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular expresa dirección hacia el profeta; «a mí» es la equivalencia natural y precisa en español.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'con estas palabras:'
  - 'así:'
  lexicon: HALOT
  rationale: El infinitivo constructo introduce discurso directo. «Diciendo:» conserva la fórmula bíblica y prepara de forma clara la cita que sigue.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el nombre propio de Dios; la versión española debe reflejarlo con una transliteración reverente y consistente, no con una sustitución por título. «Yahvé» sigue la convención del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés fue revisado y mantenido sin cambios sustanciales; la formulación española sigue la misma lectura semántica y la decisión terminológica de rendir el nombre divino explícitamente, adaptada a la norma del proyecto en español.
  spanish_consistency_notes:
  - Se mantiene la fórmula profética breve y directa.
  - «La palabra de Yahvé» conserva el idiomatismo bíblico sin recurrir a sustitución por mayúsculas o títulos.
  - El marcador [a] está anclado en el nombre divino, siguiendo la nota de alternativa de lectura.
  - La puntuación con dos puntos tras «diciendo» prepara la cita siguiente y es natural en español contemporáneo.
