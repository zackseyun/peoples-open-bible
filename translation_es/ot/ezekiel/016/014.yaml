review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del hebreo: la reputación de Jerusalén se difundió entre las naciones por su belleza, y esa belleza era perfecta por el esplendor que Dios puso sobre ella. Sin embargo, hay dos ajustes importantes: (1) en español bíblico natural, «Y salió para ti un nombre» suena torpe y menos fiel al valor idiomático que «tu nombre salió» o mejor «tu fama se difundió», especialmente porque la nota ya preserva la alternativa literal; (2) «debido a mi esplendor» para בַּהֲדָרִי desplaza el matiz instrumental/medio mejor captado por «por medio de» o «con».'
  spanish_quality_summary: La redacción actual es comprensible pero algo rígida y calcada en «Y salió para ti un nombre». También «declara el Señor Yahvé» funciona, pero «declara el Señor Yahvé» requiere artículo por la sintaxis española y es aceptable. La frase mejora claramente en fluidez y dignidad con una formulación idiomática que mantenga la imagen hebrea mediante nota.
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: «Yahvé» se preserva correctamente para יהוה; «naciones», «belleza», «perfecta» y «esplendor» son adecuados. No obstante, el proyecto pide no ser innecesariamente de madera: aquí conviene dejar «fama» en el texto principal y conservar «nombre» en nota, siguiendo además la decisión inglesa documentada para שֵׁם.'
  issues:
  - severity: medium
    issue: «Y salió para ti un nombre» es una construcción poco natural en español
    rationale: Aunque intenta conservar la imagen de יצא + שם, en español suena forzada y puede entorpecer la comprensión. La evidencia y el audit trail permiten expresar el sentido idiomático principal en el texto y reservar la literalidad para la nota.
  - severity: medium
    issue: «nombre» en el texto principal no sigue la decisión semántica principal del POB para שֵׁם
    rationale: El inglés auditado eligió «fame» como sentido contextual principal, con nota para la formulación literal. En español, «nombre» sin más puede sonar opaco; «fama» o «renombre» comunica mejor el sentido del hebreo en contexto.
  - severity: low
    issue: «debido a mi esplendor» debilita el matiz instrumental de בַּהֲדָרִי
    rationale: La cláusula explica que su belleza era perfecta por el esplendor que Dios puso sobre ella. «Por medio de mi esplendor» o «con mi esplendor» conserva mejor la idea de medio/agencia que el hebreo y el inglés auditado resaltan.
  revised_spanish_text: Y tu fama se difundió entre las naciones[a] por tu belleza, porque era perfecta por medio de mi esplendor que yo había puesto sobre ti, declara el Señor Yahvé.
