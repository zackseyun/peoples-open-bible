translation:
  language: es
  text: Y lo exaltará por encima de sus compañeros[a], y en medio de la asamblea abrirá su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por encima de su amigo»; el hebreo tiene una forma singular, pero el paralelo griego refleja un sentido social más amplio en plural («sus vecinos/compañeros»), que probablemente es el significado aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרוֹמְמַתְהוּ / ὑψώσει αὐτὸν
  english_pob_choice: he will exalt him
  chosen_spanish: lo exaltará
  alternatives_spanish:
  - lo levantará
  - lo ensalzará
  - lo honrará
  lexicon: HALOT / LXX ὑψόω
  rationale: «Exaltar» conserva la idea de elevar con honor, tal como el inglés POB y el paralelo griego ὑψώσει. En español suena más natural que un calco como «levantar» y más preciso que «honrar», que desplaza el matiz de elevación.
- source_word: מֵרֵעֵהוּ / παρὰ τοὺς πλησίον αὐτοῦ
  english_pob_choice: above his companions
  chosen_spanish: por encima de sus compañeros
  alternatives_spanish:
  - por encima de su amigo
  - por encima de sus vecinos
  - sobre sus allegados
  lexicon: HALOT / LXX πλησίον
  rationale: La forma hebrea singular puede funcionar colectivamente, y el griego explicita el sentido plural/social. «Compañeros» recoge mejor esa amplitud relacional en español que «amigo», que sería demasiado estrecho, o «vecinos», que suena más espacial que sapiencial.
- source_word: וּבְתוֹךְ / ἐν μέσῳ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - entre
  - dentro de
  lexicon: HALOT / LXX ἐν μέσῳ
  rationale: «En medio de» reproduce bien la locución locativa y mantiene la imagen de presencia pública. Es natural en español y sigue de cerca el hebreo y el griego.
- source_word: קָהָל / ἐκκλησίας
  english_pob_choice: assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la reunión
  - la comunidad reunida
  lexicon: HALOT / LXX ἐκκλησία
  rationale: «Asamblea» es la opción más neutral y pública. «Congregación» podría sonar demasiado eclesiástica en español y no requiere el hebreo. El griego ἐκκλησίας confirma una reunión convocada, no necesariamente un uso técnico cristiano.
- source_word: תִּפְתַּח פִּיו / ἀνοίξει στόμα αὐτοῦ
  english_pob_choice: he will open his mouth
  chosen_spanish: abrirá su boca
  alternatives_spanish:
  - abrirá su boca para hablar
  - hablará
  - abrirá la boca
  lexicon: HALOT / LXX
  rationale: Se conserva el giro concreto «abrirá su boca» porque tanto el hebreo como el griego usan la expresión física y no simplemente el verbo «hablar». En español bíblico suena digno y refleja el acto de discurso público autorizado.
theological_decisions:
- issue: Sujeto implícito de los verbos
  english_pob_reading: The implied subject is God/Wisdom's giver, rendered as 'he,' while the object is the wise disciple ('him').
  chosen_spanish_reading: Se mantiene el sujeto implícito con «lo exaltará» y «abrirá», sin nombrarlo.
  alternative_spanish_readings:
  - Dios lo exaltará...
  - La Sabiduría lo exaltará...
  - Él lo exaltará...
  rationale: El hebreo y el griego dejan el sujeto sin nombrar de manera explícita en este verso. En español conviene no resolverlo de forma interpretativa, para preservar la tensión auditada por el POB inglés y permitir que el contexto próximo determine el agente.
  doctrine_reference: Preservar la tensión textual sin sobreespecificar el sujeto
translation_notes:
  revision_awareness: 'El pasaje coincide con la última pasada auditada: no hubo revisiones aplicadas y el estado más reciente indicó que no eran necesarios cambios. La redacción española mantiene la misma resolución lexical y la misma cautela sobre el sujeto implícito que el texto inglés POB.'
  spanish_consistency_notes:
  - Se mantuvo el tratamiento singular implícito con objeto directo en masculino («lo» / «su boca») como corresponde al referente del verso.
  - Se evitó «SEÑOR» y otras convenciones de ocultamiento del nombre divino porque el verso no contiene el Tetragrámaton.
  - «Asamblea» se usó de manera consistente con el valor público de קָהָל / ἐκκλησία, sin convertirlo automáticamente en tecnicismo eclesial.
  - La nota [a] se ancla en «compañeros» para reflejar la alternativa singular/plural documentada en el aparato inglés.
