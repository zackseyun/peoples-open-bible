  - severity: low
    issue: '''un asunto para juicio'' suena algo forzado en español.'
    rationale: Es fiel, pero menos natural que 'un caso para juicio' o 'un caso judicial'. El contexto es forense y 'caso' comunica mejor la función adjudicativa de דָבָר לַמִּשְׁפָּט.
