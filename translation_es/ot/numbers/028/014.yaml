revisions:
- from: 'Y sus libaciones serán: la mitad de un hin para el toro[a], la tercera parte de un hin para el carnero, y la cuarta parte de un hin para el cordero, de vino. Este es el holocausto de cada mes, en su mes, para los meses del año.'
  to: 'Y sus ofrendas de bebida serán: la mitad de un hin para el toro[a], la tercera parte de un hin para el carnero, y la cuarta parte de un hin para el cordero, de vino. Este es el holocausto de cada mes, en su mes, a lo largo de los meses del año.'
  rationale: Se revisa «sus libaciones» a «sus ofrendas de bebida» para mantener el sentido sacrificial con mayor claridad y accesibilidad, en línea con la decisión documentada del POB inglés. También se cambia «para los meses del año» por «a lo largo de los meses del año» para expresar mejor el valor temporal recurrente de לְחָדְשֵׁי הַשָּׁנָה y mejorar la naturalidad del español. Se conserva la nota sobre «mes/luna nueva» porque refleja una ambigüedad léxica real del hebreo y está bien anclada en el texto.
