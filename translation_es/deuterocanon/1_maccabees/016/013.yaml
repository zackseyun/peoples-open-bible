translation:
  language: es
  text: Y se enalteció su corazón[a], y quiso apoderarse del país, y maquinaba con engaño contra Simón y contra sus hijos[b], para quitarlos de en medio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “se volvió orgulloso”; literalmente: “su corazón fue levantado”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “para hacerlos desaparecer”. El griego dice “para quitarlos”, lo que en este contexto probablemente implica una eliminación violenta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑψώθη ἡ καρδία αὐτοῦ
  english_pob_choice: his heart was lifted up
  chosen_spanish: se enalteció su corazón
  alternatives_spanish:
  - su corazón se elevó
  - se volvió orgulloso
  lexicon: LSJ
  rationale: La imagen literal de “levantarse/elevarse” en español suena menos natural aquí; “se enalteció su corazón” conserva la metáfora de autoexaltación y comunica la soberbia implícita del giro griego sin perder su fuerza idiomática.
- source_word: ἐβουλήθη
  english_pob_choice: he intended
  chosen_spanish: quiso
  alternatives_spanish:
  - se propuso
  - intencionó
  lexicon: LSJ
  rationale: El verbo expresa una resolución formada. “Quiso” en español bíblico y moderno puede abarcar intención decidida sin sonar demasiado técnico, y mantiene el matiz volitivo sin afirmar más de lo que el texto dice.
- source_word: κατακρατῆσαι τῆς χώρας
  english_pob_choice: to seize control of the country
  chosen_spanish: apoderarse del país
  alternatives_spanish:
  - tomar el dominio del país
  - adueñarse de la tierra
  lexicon: LSJ
  rationale: κατακρατέω con genitivo indica dominar o someter. “Apoderarse del país” comunica con claridad la idea política de tomar el control; “país” funciona bien para χώρα en este contexto territorial y gubernativo.
- source_word: ἐβούλευετο
  english_pob_choice: he was plotting
  chosen_spanish: maquinaba
  alternatives_spanish:
  - estaba maquinando
  - estaba conspirando
  lexicon: LSJ
  rationale: En combinación con δόλῳ y el objeto hostil, el verbo no es deliberación neutral sino intriga. “Maquinaba” transmite el carácter continuo y malicioso de la acción en un español natural.
- source_word: δόλῳ
  english_pob_choice: deceitfully
  chosen_spanish: con engaño
  alternatives_spanish:
  - con traición
  - engañosamente
  lexicon: LSJ
  rationale: El dativo indica medio o manera. “Con engaño” conserva la idea de fraude o astucia sin añadir una carga interpretativa excesiva; armoniza con “maquinaba” en español.
- source_word: ἆραι αὐτούς
  english_pob_choice: to remove them
  chosen_spanish: para quitarlos de en medio
  alternatives_spanish:
  - para eliminarlos
  - para apartarlos
  lexicon: LSJ
  rationale: αἴρω puede significar quitar o remover. En este contexto hostil, la frase probablemente implica eliminación violenta, pero “quitarlos de en medio” preserva la ambigüedad del griego y sugiere la consecuencia sin explicitar más de lo que el texto dice.
- source_word: χώρα
  english_pob_choice: country
  chosen_spanish: país
  alternatives_spanish:
  - tierra
  - región
  lexicon: LSJ
  rationale: χώρα puede designar territorio, tierra o país. Dado el trasfondo político de dominio, “país” ofrece una equivalencia clara y natural en español contemporáneo.
translation_notes:
  revision_awareness: 'Se revisó el encuadre inglés auditable: se mantuvo la metáfora de autoexaltación de ὑψώθη ἡ καρδία αὐτοῦ y la ambigüedad deliberada de ἆραι αὐτούς (“quitar/remover”), sin introducir una explicación más específica que la apoyada por el griego. La opción española evita calcado rígido y conserva el tono narrativo hostil del pasaje.'
  spanish_consistency_notes:
  - Se usa “país” para χώρα por el contexto político de dominio.
  - Se mantiene un registro bíblico sobrio, no arcaizante.
  - “Con engaño” y “maquinaba” reflejan el valor hostil y continuado de ἐβούλευετο δόλῳ.
  - Los marcadores [a] y [b] están anclados en el texto y corresponden exactamente a las notas.
