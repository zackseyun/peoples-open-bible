translation:
  language: es
  text: En cuanto a estas cosas que ustedes contemplan[a], vendrán días en los cuales no quedará piedra sobre piedra que no sea derribada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que ustedes ven». θεωρεῖτε puede traducirse de manera más general como «ver» o de forma más específica como «contemplar/observar».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no será dejada piedra sobre piedra que no sea derribada», un modismo que expresa destrucción completa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα ἃ θεωρεῖτε
  english_pob_choice: As for these things that you are looking at
  chosen_spanish: En cuanto a estas cosas que ustedes contemplan
  alternatives_spanish:
  - Estas cosas que ustedes ven
  - Estas cosas que ustedes están mirando
  lexicon: BDAG
  rationale: Ταῦτα introduce con énfasis los objetos de la observación, y θεωρεῖτε expresa una acción visual en curso. «En cuanto a» refleja el giro topical sin volverlo pesado, y «contemplan» conserva mejor la idea de observar atentamente que un simple «ven».
- source_word: ἐλεύσονται ἡμέραι
  english_pob_choice: days will come
  chosen_spanish: vendrán días
  alternatives_spanish:
  - los días vendrán
  - días están por venir
  lexicon: BDAG
  rationale: La expresión es idiomática para un futuro inminente. «Vendrán días» mantiene la fuerza profética natural del griego y evita añadir un artículo innecesario.
- source_word: ἐν αἷς
  english_pob_choice: in which
  chosen_spanish: en los cuales
  alternatives_spanish:
  - cuando
  - durante los cuales
  lexicon: BDAG
  rationale: La frase es temporal; «en los cuales» conserva la correspondencia formal y sigue siendo clara en español. «Cuando» sería más libre y perdería algo de la estructura del original.
- source_word: οὐκ ἀφεθήσεται
  english_pob_choice: will be left
  chosen_spanish: no quedará
  alternatives_spanish:
  - no será dejado
  - no permanecerá
  lexicon: BDAG
  rationale: En este contexto de demolición, ἀφίημι en pasiva equivale a «quedar/ser dejado». «No quedará» es natural en español y comunica con claridad que no subsistirá ninguna piedra.
- source_word: λίθος ἐπὶ λίθῳ
  english_pob_choice: stone upon another
  chosen_spanish: piedra sobre piedra
  alternatives_spanish:
  - piedra encima de piedra
  - una piedra sobre otra
  lexicon: BDAG
  rationale: La imagen idiomática expresa destrucción total. «Piedra sobre piedra» conserva la forma proverbial del original y sugiere que nada quedará en pie.
- source_word: ὃς οὐ καταλυθήσεται
  english_pob_choice: that will not be torn down
  chosen_spanish: que no sea derribada
  alternatives_spanish:
  - que no sea demolida
  - que no será derribada
  lexicon: BDAG
  rationale: καταλύω aquí se refiere al derribo de una estructura. «Derribada» comunica el sentido edilicio de manera más natural que «tirada abajo» y mantiene la intensificación del relativo final.
theological_decisions:
- issue: Alcance de la predicción sobre la estructura del templo
  english_pob_reading: Render the saying as a concrete prophecy of total structural destruction without importing a specific eschatological system.
  chosen_spanish_reading: Presentar la frase como una profecía concreta de destrucción estructural total, sin añadir un marco escatológico particular.
  alternative_spanish_readings:
  - Leerla principalmente como un dicho simbólico de juicio
  - Vincularla a una cronología doctrinal posterior específica
  rationale: El griego describe con sencillez la caída material de las piedras. La traducción debe preservar esa concreción sin resolver ni ampliar el alcance teológico más allá del versículo.
  doctrine_reference: Conservar la tensión interpretativa del texto; no introducir afirmaciones doctrinales que el versículo no expresa.
translation_notes:
  revision_awareness: Conforme al último pase revisado, no se requirieron cambios sustantivos respecto del acuerdo alto con la auditoría inglesa; se mantuvo la fuerza idiomática de la profecía y la referencia concreta al derribo de la estructura.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto solo cuando aparece el nombre divino; en este versículo no aplica.
  - Se mantiene «contemplan» para reflejar el matiz de observación activa de θεωρεῖτε.
  - Se conserva la imagen proverbial «piedra sobre piedra» para la expresión de destrucción total.
  - «Derribada» se eligió por naturalidad en español y por su ajuste al campo semántico de καταλύω en contexto arquitectónico.
