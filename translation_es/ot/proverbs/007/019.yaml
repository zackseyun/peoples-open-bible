translation:
  language: es
  text: Porque el hombre no está en casa[a]; se ha ido de viaje lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi marido no está en casa». El hebreo dice más literalmente «el hombre no está en su casa», usando una expresión indirecta para referirse a su esposo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o razón del engaño en el contexto inmediato. «Porque» conserva la fuerza causal y suena natural en español.
- source_word: אֵין
  english_pob_choice: is not
  chosen_spanish: no está
  alternatives_spanish:
  - no hay
  - está ausente
  lexicon: HALOT
  rationale: Con el sintagma nominal y la localización, el sentido es de ausencia. «No está» reproduce bien la idea relacional sin volverla artificial.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - mi marido
  lexicon: HALOT
  rationale: El hebreo dice literalmente «el hombre». En contexto se refiere al esposo, pero el texto mantiene la expresión indirecta; por eso se preserva en el cuerpo principal y se deja la lectura alternativa en nota.
- source_word: בְּבֵיתוֹ
  english_pob_choice: at home
  chosen_spanish: en su casa
  alternatives_spanish:
  - en casa
  - en su hogar
  lexicon: HALOT
  rationale: La preposición con «casa» expresa presencia en la residencia. «En su casa» conserva la referencia posesiva del hebreo y sigue siendo natural en español.
- source_word: הָלַךְ
  english_pob_choice: he has gone
  chosen_spanish: se ha ido
  alternatives_spanish:
  - ha salido
  - fue
  lexicon: HALOT
  rationale: El qatal comunica una acción completada con resultado presente. «Se ha ido» expresa bien que partió y todavía está ausente.
- source_word: בְּדֶרֶךְ
  english_pob_choice: on a journey
  chosen_spanish: por un largo viaje
  alternatives_spanish:
  - en un viaje
  - por el camino
  lexicon: HALOT
  rationale: En este uso idiomático, «camino/דרך» con el verbo de ir indica viaje. «Por un largo viaje» sigue la decisión inglesa de captar la expresión idiomática con naturalidad en español.
- source_word: מֵרָחוֹק
  english_pob_choice: far away
  chosen_spanish: largo
  alternatives_spanish:
  - lejos
  - muy lejos
  lexicon: HALOT
  rationale: La frase marca distancia; en la combinación con «viaje» la idea se vierte naturalmente como «largo», siguiendo el sentido global del modismo hebreo. La longitud del viaje funciona como equivalente idiomático de la lejanía.
theological_decisions:
- issue: Referencia indirecta al esposo en lugar de nombrarlo explícitamente
  english_pob_reading: The Hebrew more literally says 'the man is not at his house,' using an indirect expression for her husband.
  chosen_spanish_reading: El texto principal dice «el hombre», no «mi marido», y conserva la indirection del hebreo.
  alternative_spanish_readings:
  - mi marido no está en su casa
  - mi esposo no está en casa
  rationale: El hebreo usa una formulación más indirecta. La nota mantiene visible la tensión entre literalidad y referencia contextual sin borrar el matiz del original.
  doctrine_reference: Principio de transparencia textual y respeto al matiz del lenguaje bíblico
- issue: Expresión de ausencia y desplazamiento con valor idiomático
  english_pob_reading: For the man is not at home; he has gone on a long journey.
  chosen_spanish_reading: Porque el hombre no está en su casa; se ha ido por un largo viaje.
  alternative_spanish_readings:
  - Porque el hombre no está en casa; se ha ido de viaje lejos
  - Pues el hombre está ausente; ha ido lejos
  rationale: La lectura conserva la ausencia real y el viaje prolongado sin añadir detalles no presentes. «Largo viaje» comunica el modismo de distancia sin perder el sentido contextual.
  doctrine_reference: Fidelidad semántica al hebreo y claridad idiomática en español
translation_notes:
  revision_awareness: 'El inglés POB revisó este versículo para preferir «at home» y «on a long journey», evitando una literalidad excesivamente rígida. La versión española sigue esa misma línea de equivalencia óptima: conserva la indirecta hebrea «el hombre» en el texto principal, mantiene la ausencia con «no está en su casa» y vierte el modismo del viaje como «por un largo viaje» sin añadir elementos ajenos al hebreo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo «el hombre» en el texto principal para respetar la formulación hebrea indirecta; la lectura contextual «mi marido» quedó relegada a nota.
  - «No está» y «se ha ido» reflejan bien la combinación de ausencia y acción completada del hebreo sin sobreinterpretar.
  - La frase «por un largo viaje» busca equivaler el modismo de distancia de manera idiomática en español, en continuidad con la revisión inglesa.
