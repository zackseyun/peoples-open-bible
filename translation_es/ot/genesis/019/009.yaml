    text: Lit. «te haremos mal más que a ellos», un modismo de amenaza de daño mayor.
    reason: lexical_alternative
  - marker: d
    text: El verbo expresa aquí presión insistente y empuje violento; también puede traducirse «apremiaron» según el contexto.
    reason: lexical_alternative
  revision_rationale: Se revisa para eliminar la redundancia de «forastero ... como extranjero», preservar mejor la distribución de sentidos entre הָאֶחָד y לָגוּר, y expresar con mayor claridad la presión física de וַיִּפְצְרוּ en contexto. También se recupera mejor el énfasis de la doble preposición hebrea con «contra el hombre, contra Lot».
