translation:
  language: es
  text: Entonces alzó su mano contra ellos[a], para hacerlos caer en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juró contra ellos»; el hebreo «alzó su mano» puede referirse a un juramento, especialmente en un contexto de juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשָּׂא
  english_pob_choice: raised
  chosen_spanish: alzó
  alternatives_spanish:
  - levantó
  - alzò
  lexicon: HALOT
  rationale: El verbo expresa la acción de levantar/elevar. En español, «alzó su mano» conserva la imagen idiomática sin sonar tan pesada como una traducción más literal.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - la mano de él
  - su brazo
  lexicon: HALOT
  rationale: Se preserva el singular con sufijo pronominal y la imagen corporal del hebreo. En este contexto, «su mano» comunica naturalmente la referencia divina.
- source_word: לָהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es literalmente «a/para», en este giro idiomático el sentido hostil/judicial se expresa mejor en español con «contra ellos».
- source_word: לְהַפִּיל
  english_pob_choice: to make them fall
  chosen_spanish: para hacerlos caer
  alternatives_spanish:
  - para derribarlos
  - para abatirlos
  lexicon: HALOT
  rationale: 'El hiphil de נפל es causativo: «hacer caer». Esta forma mantiene la fuerza causativa del hebreo y suena natural en español.'
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre objeto se integra de forma idiomática en el verbo compuesto «hacerlos caer».
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto del desierto
  - en el erial
  lexicon: HALOT
  rationale: Aquí «desierto» funciona bien en español y comunica el escenario del éxodo. Aunque «wilderness» a menudo se vierte «desierto» o «desierto/soledad», esta opción es más natural que «wilderness» calco.
theological_decisions:
- issue: Idiom of 'raised his hand' and possible oath nuance
  english_pob_reading: Retain the idiom in the main text while allowing its oath/judgment nuance to be inferred from context.
  chosen_spanish_reading: Conservar el modismo «alzó su mano» y dejar que el contexto sugiera su posible matiz de juramento o sentencia judicial.
  alternative_spanish_readings:
  - juró contra ellos
  - alzando su mano en juramento contra ellos
  rationale: El hebreo permite un matiz de juramento, pero no lo formula explícitamente. Mantener el giro evita paraphrasear en exceso y preserva la tensión lexical documentada.
  doctrine_reference: Sal 106:26; cf. el uso idiomático de levantar/alzar la mano en contexto de juramento o juicio
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete fuente; la redacción inglesa más reciente permanece sin cambios y se mantiene el sentido idiomático con la nota alternativa.
  spanish_consistency_notes:
  - Se evita «SEÑOR» como sustituto automático del nombre divino porque este versículo no contiene el Tetragrámaton.
  - Se mantiene un registro idiomático claro y bíblico con «alzó su mano», sin desplazarlo por una paráfrasis interpretativa en el texto principal.
  - «Desierto» se usa como equivalente funcional de מִדְבָּר en un contexto de peregrinación/juicio.
  - La nota al pie preserva la alternativa documental sobre el posible sentido de juramento sin imponerla en el texto base.
