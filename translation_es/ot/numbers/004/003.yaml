translation:
  language: es
  text: desde los treinta años de edad y en adelante, hasta los cincuenta años de edad, todo el que entra[a] al servicio[b] para hacer el trabajo en el tabernáculo de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «todo el que viene». El participio hebreo «viene/entra» admite una traducción más general como «viene».'
    reason: lexical_alternative
  - marker: b
    text: «Servicio» traduce aquí צָבָא, término que también puede significar «deber», «compañía» o «hueste». En este contexto se refiere al servicio levítico organizado.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִבֶּן שְׁלֹשִׁים שָׁנָה
  english_pob_choice: from thirty years old
  chosen_spanish: desde los treinta años de edad
  alternatives_spanish:
  - a partir de los treinta años de edad
  - desde los treinta años
  lexicon: HALOT
  rationale: La expresión hebrea usa בן + número + שנה como fórmula de edad. En español, 'años de edad' aclara naturalmente la referencia al límite inferior sin introducir una paráfrasis ajena al hebreo.
- source_word: וָמַעְלָה
  english_pob_choice: and upward
  chosen_spanish: y en adelante
  alternatives_spanish:
  - y hacia arriba
  - y más
  lexicon: HALOT
  rationale: La fórmula marca extensión hacia arriba del rango de edad. 'Y en adelante' conserva el sentido inclusivo de continuación desde el mínimo establecido, con español natural.
- source_word: וְעַד בֶּן חֲמִשִּׁים שָׁנָה
  english_pob_choice: up to fifty years old
  chosen_spanish: hasta los cincuenta años de edad
  alternatives_spanish:
  - hasta los cincuenta años
  - e incluso hasta los cincuenta años de edad
  lexicon: HALOT
  rationale: '''Hasta'' comunica el límite superior con precisión y mantiene el tono administrativo del hebreo.'
- source_word: כָּל בָּא
  english_pob_choice: everyone who enters
  chosen_spanish: todo el que entra
  alternatives_spanish:
  - todo el que viene
  - todos los que entran
  lexicon: HALOT
  rationale: El participio בָּא admite 'entra' o 'viene'. Se elige 'entra' porque el contexto es la incorporación al servicio asignado, en línea con la lectura auditada del inglés POB.
- source_word: לַצָּבָא
  english_pob_choice: the service
  chosen_spanish: al servicio
  alternatives_spanish:
  - al deber
  - al servicio organizado
  - a la milicia
  lexicon: HALOT
  rationale: צָבָא puede significar servicio, deber, compañía o hueste. Aquí, como en el texto auditado en inglés, se refiere al servicio levítico organizado; 'al servicio' evita el matiz militar de 'milicia' y conserva la fuerza institucional del término.
- source_word: לַעֲשׂוֹת מְלָאכָה
  english_pob_choice: to do the work
  chosen_spanish: para hacer la obra
  alternatives_spanish:
  - para realizar el trabajo
  - para efectuar la labor
  lexicon: HALOT
  rationale: מְלָאכָה es 'obra' o 'trabajo'. 'Hacer la obra' conserva el valor concreto y funcional del hebreo sin sonar excesivamente técnico en español.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en el tabernáculo de reunión
  alternatives_spanish:
  - en la tienda de reunión
  - en el tabernáculo de la reunión
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'tienda/tabernáculo de reunión'. 'Tabernáculo de reunión' es una equivalencia tradicional y clara en español bíblico; 'tabernáculo' comunica el referente cultual del recinto sagrado.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura auditada del inglés POB y mantiene sus dos decisiones léxicas clave: el rango de edad con fórmula administrativa y צָבָא como servicio organizado. No se registran revisiones aplicadas en el pasaje fuente consultado.'
  spanish_consistency_notes:
  - Se preservó el límite inferior y superior de la edad con una formulación natural en español.
  - Se mantuvo la distinción entre 'entra' y 'viene' en una nota, siguiendo la alternativa auditada del inglés POB.
  - Se evitó 'SEÑOR' y otras fórmulas no pertinentes; no aparecen en este versículo.
  - '''Tabernáculo de reunión'' se usa como forma bíblica estable y comprensible para אֹהֶל מוֹעֵד.'
  - No se introdujo lenguaje militar en el texto principal para צָבָא, conforme al contexto levítico.
