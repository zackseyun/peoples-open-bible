translation:
  language: es
  text: Serán conducidas con alegría y regocijo[a]; entrarán en el palacio[b] del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serán llevadas con gozo y júbilo».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo heikhal puede significar «palacio», «templo» o, en otros contextos, «salón»; aquí «palacio» encaja mejor con el escenario de boda real.
    reason: cultural_note
lexical_decisions:
- source_word: תּוּבַלְנָה
  english_pob_choice: they will be led
  chosen_spanish: serán conducidas
  alternatives_spanish:
  - serán llevadas
  - serán guiadas
  lexicon: HALOT
  rationale: El Hophal imperfecto 3fp de יבל expresa voz pasiva con matiz de ser conducidas o llevadas. «Serán conducidas» conserva el valor procesional del contexto nupcial y suena natural en español.
- source_word: בִּשְׂמָחוֹת
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - en alegrías
  lexicon: HALOT
  rationale: La preposición ב con el plural שְׂמָחוֹת expresa acompañamiento o manera. En español, «con alegría» refleja bien ese carácter celebratorio sin volverla una construcción rígida como «en alegrías».
- source_word: וָגִיל
  english_pob_choice: and rejoicing
  chosen_spanish: y regocijo
  alternatives_spanish:
  - y júbilo
  - y exaltación
  lexicon: HALOT
  rationale: גִיל comunica júbilo exultante. «Regocijo» mantiene una segunda palabra distinta de «alegría», como hace el inglés POB al diferenciar los dos términos de celebración.
- source_word: תְּבֹאֶינָה
  english_pob_choice: they will enter
  chosen_spanish: entrarán
  alternatives_spanish:
  - vendrán
  - pasarán al interior
  lexicon: HALOT
  rationale: El Qal imperfecto 3fp de בוא, ante un edificio, se expresa con precisión como «entrarán». Es más exacto que el más amplio «vendrán».
- source_word: בְּהֵיכַל
  english_pob_choice: the palace
  chosen_spanish: el palacio
  alternatives_spanish:
  - el templo
  - el salón
  lexicon: HALOT
  rationale: הֵיכָל puede significar palacio, templo o sala. En el marco inmediato de boda real de Salmo 45, «palacio» es la opción más ajustada.
- source_word: מֶלֶךְ
  english_pob_choice: of the king
  chosen_spanish: del rey
  alternatives_spanish:
  - de un rey
  lexicon: HALOT
  rationale: Aunque el hebreo carece de artículo, el contexto identifica a un rey específico. En español, el artículo definido en «del rey» fluye de forma natural y respeta ese referente contextual.
theological_decisions:
- issue: Referente de los verbos femeninos plurales
  english_pob_reading: The feminine plural refers to the bridal party/virgins accompanying the bride, without specifying beyond the immediate literary context.
  chosen_spanish_reading: El femenino plural se entiende como la comitiva nupcial o las doncellas que acompañan a la novia, sin precisarlo más allá del contexto inmediato.
  alternative_spanish_readings:
  - una referencia general a mujeres en la procesión
  - la novia misma y su acompañamiento
  rationale: El hebreo y el contexto permiten una referencia femenina plural, pero no obligan a identificar con total precisión el grupo. La traducción mantiene la referencia abierta y no resuelve la tensión más allá de lo que el texto sustenta.
  doctrine_reference: Preservar la tensión exegética sin sobreespecificar el referente.
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no hay cambios pendientes y el acuerdo de revisión es alto. La formulación española sigue el sentido del hebreo y la decisión inglesa documentada, sin introducir reinterpretaciones.'
  spanish_consistency_notes:
  - Se mantuvo «rey» con artículo definido por el referente contextual específico.
  - Se distinguió «alegría» de «regocijo» para reflejar el par hebreo de celebración.
  - Se evitó «templo» en el texto principal porque el contexto de Salmo 45 es nupcial y real, no cultual.
  - La voz pasiva de תּוּבַלְנָה se volvió con naturalidad como «serán conducidas».
