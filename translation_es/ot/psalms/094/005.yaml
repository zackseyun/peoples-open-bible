translation:
  language: es
  text: A tu pueblo, oh Yahvé, lo quebrantan[a], y afligen tu herencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'aplastan a tu pueblo'. El verbo hebreo (Piel de דכא) puede denotar una opresión que quebranta o aplasta con fuerza.
    reason: lexical_alternative
  - marker: b
    text: O 'tu heredad' o 'tu posesión'. El término hebreo נַחֲלָה se refiere a lo que pertenece a alguien por herencia o porción asignada; aquí, Israel como lo que pertenece a Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמְּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu nación
  - tu gente
  lexicon: HALOT
  rationale: עַם designa especialmente al pueblo de la alianza. 'Tu pueblo' es la equivalencia más natural en español y mantiene la resonancia de la relación pactual con Yahvé, en paralelo con 'tu heredad' en el segundo hemistiquio.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh SEÑOR
  - oh Jehová
  lexicon: HALOT
  rationale: El Tetragrama יְהוָה es el nombre personal divino revelado a Israel. Conforme al estilo del proyecto POB, se transliteró como 'Yahvé' en lugar de la convención sustitutiva 'SEÑOR' o 'SEÑOR'. La forma 'Yahvé' (con acento en la última sílaba) es la ortografía habitual en español académico y eclesiástico moderno para el nombre hebreo. El vocativo 'oh' es idiomático en español ante un nombre propio en invocación directa.
- source_word: יְדַכְּאוּ
  english_pob_choice: they crush
  chosen_spanish: quebrantan
  alternatives_spanish:
  - aplastan
  - machacan
  - oprimen
  lexicon: HALOT
  rationale: El Piel de דכא expresa una acción intensa de destrozar o quebrantar. 'Quebrantan' preserva en español la fuerza vívida del original —romper con violencia— sin diluirla en la genérica 'oprimen'. 'Aplastan' sería igualmente válido; se prefiere 'quebrantan' por su tono más literario y su aptitud para el género salmoídico. Se mantiene la distinción con יְעַנּוּ ('afligen') del segundo hemistiquio.
- source_word: וְנַחֲלָתְךָ
  english_pob_choice: and your inheritance
  chosen_spanish: tu heredad
  alternatives_spanish:
  - tu herencia
  - tu posesión
  - tu porción
  lexicon: HALOT
  rationale: נַחֲלָה designa lo que corresponde a alguien por herencia, asignación o posesión. 'Heredad' en español combina precisamente los sentidos de bien heredado y tierra propia, y es comprensible en el español moderno culto; la alternativa 'herencia' es más abstracta y pierde el matiz de posesión concreta (Israel como lote asignado a Yahvé). Se evita 'herencia' como principal para no aplanar la imagen de pertenencia territorial-covenant.
- source_word: יְעַנּוּ
  english_pob_choice: afflict
  chosen_spanish: afligen
  alternatives_spanish:
  - oprimen
  - humillan
  - maltratan
  lexicon: HALOT
  rationale: ענה en el Piel (lemma 6031b en la morfología) significa afligir, oprimir, humillar. 'Afligen' distingue este verbo del anterior 'quebrantan' preservando la gravedad de la acción. Se prefiere sobre 'oprimen' para evitar sinonimia excesiva con la alternativa documentada para יְדַכְּאוּ, y sobre 'humillan' para no reducir el sentido a una dimensión únicamente social.
theological_decisions:
- issue: Transliteración del nombre divino יהוה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh SEÑOR
  - oh Jehová
  rationale: El texto fuente usa el Tetragrama יְהוָה directamente (sustantivo propio, lemma 3068). Conforme a la doctrina del proyecto POB, se preserva el nombre de la alianza divina mediante transliteración al español ('Yahvé') en lugar de la convención sustitutiva 'SEÑOR'. La forma 'Yahvé' es la ortografía española académicamente estándar (RAE y tradición exegética hispanohablante moderna). No hay mediación griega κύριος en este texto hebreo, por lo que no se plantea la cuestión de si κύριος cita el Tetragrama.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / español: Yahvé'
- issue: 'Orden de palabras hebreo: énfasis en el objeto frontalizado'
  english_pob_reading: O Yahweh, they crush your people and afflict your inheritance
  chosen_spanish_reading: A tu pueblo, oh Yahvé, lo quebrantan, y a tu heredad la afligen
  alternative_spanish_readings:
  - Oh Yahvé, ellos quebrantan a tu pueblo y afligen tu heredad
  rationale: 'El hebreo frontaliza עַמְּךָ (''tu pueblo'') antes del vocativo יְהוָה y el verbo, marcando el objeto para énfasis retórico: los salmistas señalan al pueblo oprimido como el escándalo que clama a Yahvé. La traducción española preserva este énfasis mediante la construcción de objeto anticipado con pronombre de reanudación (''A tu pueblo… lo quebrantan''), que es plenamente idiomática en español moderno. El POB inglés optó por anteponer el vocativo; la versión española ajusta el orden para ser más fiel al peso retórico del original.'
  doctrine_reference: Principio de fidelidad sintáctica del proyecto POB cuando el español puede reproducir el énfasis hebreo sin forzar la lengua
translation_notes:
  revision_awareness: 'El POB inglés fue revisado el 23 de abril de 2026 (modelo gpt-5.4) sin cambios necesarios, con estado de verificación cruzada de alta concordancia (acuerdo 1.0, revisor gemini-3.1-pro-preview, 4 pases). No hay revisiones aplicadas previas. La traducción española sigue fielmente las decisiones léxicas y teológicas del rastro de auditoría inglés, con ajustes propios del español: orden sintáctico que preserva el énfasis hebreo frontalizado, y ''Yahvé'' como forma ortográfica española estándar para el Tetragrama.'
  spanish_consistency_notes:
  - יְהוָה → 'Yahvé' conforme al estándar del proyecto para el Tetragrama hebreo directo (no mediado por κύριος griego).
  - נַחֲלָה → 'heredad' como término preferido frente a 'herencia' para preservar el matiz de posesión territorial pactual; 'herencia' queda en nota al pie.
  - 'Distinción verbal mantenida: יְדַכְּאוּ (Piel de דכא) → ''quebrantan''; יְעַנּוּ (Piel de ענה) → ''afligen''; los dos verbos no se fusionan en un único equivalente español.'
  - 'Orden de palabras: objeto frontalizado hebreo reproducido en español con construcción de objeto anticipado + pronombre de reanudación (''A tu pueblo… lo quebrantan; a tu heredad… la afligen''), idiomática en español moderno y fiel al énfasis retórico hebreo.'
  - Vocativo 'oh Yahvé' sin signos de exclamación en el cuerpo del versículo, conforme al estilo de prosa salmoídica en español moderno; los signos de exclamación se reservarían para versículos de invocación directa sostenida.
