    reason: lexical_alternative
  revision_rationale: Se ajustó el texto para reflejar una petición oracional en español («oye... perdona... envía») en vez de una simple predicción futura. También se cambió «desde los cielos» a «desde el cielo» en el texto principal por naturalidad, preservando la alternativa literal en la nota. Se suavizó «en que han de andar» a «por el que deben andar» para mejorar la fluidez sin cambiar el sentido.
