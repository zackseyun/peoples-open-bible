translation:
  language: es
  text: Y séllalo con tu anillo. Luego, cuando vengas por la mañana, si no encuentras todo comido por Bel, moriremos, o Daniel, que miente contra nosotros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que nos acusa falsamente». El griego puede expresar mentir contra alguien en sentido acusatorio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σφράγισον
  english_pob_choice: seal
  chosen_spanish: séllalo
  alternatives_spanish:
  - séllelo
  - ponle un sello
  lexicon: LSJ
  rationale: El imperativo pide una acción concreta de sellar/cerrar con garantía. «Séllalo» conserva brevedad, fuerza imperativa y la imagen de sellar el recinto.
- source_word: τῷ δακτυλίῳ σου
  english_pob_choice: with your ring
  chosen_spanish: con tu anillo
  alternatives_spanish:
  - con tu anillo-sello
  - con tu sortija
  lexicon: LSJ
  rationale: δακτύλιος puede ser simplemente «anillo» y, por el contexto de sellar, ya funciona como anillo usado para sellar. «Anillo» es claro y natural en español; no es necesario añadir «sello» en el texto principal.
- source_word: ἐλθὼν πρωὶ
  english_pob_choice: when you come in the morning
  chosen_spanish: cuando vengas por la mañana
  alternatives_spanish:
  - cuando vengas temprano por la mañana
  - al venir por la mañana
  lexicon: LSJ
  rationale: El participio con πρωί se expresa mejor en español con una subordinada temporal natural. «Por la mañana» conserva el valor temporal sin sobrecargar el ritmo.
- source_word: πάντα βεβρωμένα
  english_pob_choice: everything eaten
  chosen_spanish: todo comido
  alternatives_spanish:
  - todo lo comido
  - todo devorado
  lexicon: LSJ
  rationale: El participio perfecto pasivo de βιβρώσκω indica el estado de haber sido comido. «Todo comido» es directo y mantiene la pasiva/resultativa del griego.
- source_word: ὑπὸ τοῦ Βήλ
  english_pob_choice: by Bel
  chosen_spanish: por Bel
  alternatives_spanish:
  - por el dios Bel
  lexicon: LSJ
  rationale: El griego nombra a Bel directamente sin añadir un sustantivo explicativo. «Por Bel» reproduce esa simplicidad; el contexto ya identifica a Bel como la deidad.
- source_word: ἀποθανούμεθα
  english_pob_choice: we will die
  chosen_spanish: moriremos
  alternatives_spanish:
  - moriremos ciertamente
  - tendremos que morir
  lexicon: LSJ
  rationale: El futuro se traduce de forma natural y breve en español. «Moriremos» mantiene el sentido de consecuencia inevitable en la apuesta.
- source_word: ὁ ψευδόμενος καθʼ ἡμῶν
  english_pob_choice: who is lying against us
  chosen_spanish: que está mintiendo contra nosotros
  alternatives_spanish:
  - que miente contra nosotros
  - que nos acusa falsamente
  lexicon: LSJ
  rationale: ψεύδομαι con κατά puede significar mentir contra alguien o acusarlo falsamente. Se mantiene la construcción verbal y la tensión del texto con «contra nosotros», sin resolverla a una sola formulación legal.
theological_decisions:
- issue: Naturaleza de la acusación contra Daniel
  english_pob_reading: who is lying against us
  chosen_spanish_reading: que está mintiendo contra nosotros
  alternative_spanish_readings:
  - que nos acusa falsamente
  - que miente sobre nosotros
  rationale: El pasaje conserva una acusación personal ambigua que puede leerse como mentira en sentido general o como acusación falsa. La versión española mantiene esa tensión sin convertirla de antemano en un tecnicismo jurídico.
  doctrine_reference: Preservar la tensión léxica documentada; no resolver indebidamente la ambigüedad del texto fuente.
translation_notes:
  revision_awareness: Se siguió el extracto griego de Swete y el rastro auditado en inglés. No hubo revisiones aplicadas en el pasaje fuente; la redacción española conserva la estructura imperativa y la acusación final con la misma ambigüedad lexical documentada.
  spanish_consistency_notes:
  - Se usa «Bel» de manera consistente con el nombre propio del texto fuente.
  - Se mantiene «anillo» en vez de ampliar a «anillo-sello» en el texto principal para no sobretraducir δακτύλιος.
  - La nota [a] conserva la alternativa acusatoria documentada en el inglés POB.
  - «Moriremos» refleja el futuro simple del griego y el tono solemne de la apuesta.
