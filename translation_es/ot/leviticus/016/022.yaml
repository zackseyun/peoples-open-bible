review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la imagen central de que el macho cabrío lleva las iniquidades y va al desierto, pero no sigue del todo el rastro auditado en dos puntos importantes: (1) omite en nota la alternativa principal documentada para אֶרֶץ גְּזֵרָה y suaviza demasiado ''cut-off'' como ''aislada''; (2) ''soltará'' para וְשִׁלַּח reduce el matiz de despachar/enviar lejos. Además, el sujeto implícito de ''soltará'' queda poco natural en español sin objeto indirecto o dirección más clara.'
  spanish_quality_summary: El español es legible, pero 'El macho cabrío[a]' introduce una nota innecesaria porque el inglés auditado no preservó esa alternativa, mientras que falta la nota necesaria en la frase difícil 'tierra aislada'. 'Llevará sobre sí' y 'todas sus iniquidades' son buenos. 'Lo enviará al desierto' suena más natural y fiel que 'soltará ... en el desierto'.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La elección 'iniquidades' alinea bien con עֺוֹן. 'Macho cabrío' es aceptable en español por precisión contextual. La principal desalineación está en no reflejar en la nota la incertidumbre léxica de גְּזֵרָה según el POB inglés.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en 'macho cabrío' en vez de en אֶרֶץ גְּזֵרָה.
    rationale: El expediente inglés preserva las alternativas léxicas para 'cut-off land', no para 'goat'. En español debe mantenerse esa incertidumbre donde realmente existe.
  - severity: medium
    issue: '''tierra aislada'' debilita la imagen de ''cut-off land'' sin nota explicativa.'
    rationale: Aunque es comprensible, 'aislada' puede sonar más geográfica que de separación/corte. Conviene una formulación más cercana al hebreo y acompañarla con alternativas como en el POB inglés.
  - severity: medium
    issue: '''soltará'' no refleja tan bien וְשִׁלַּח como ''enviar/despachar''.'
    rationale: En este rito no solo se 'suelta' al animal; se lo envía fuera, alejándolo hacia el desierto. 'Enviar' preserva mejor el acto ritual de remoción.
  - severity: low
    issue: '''en el desierto'' es menos direccional que ''al desierto''.'
    rationale: Con un verbo de envío, el español normalmente pide destino ('al desierto') para reflejar el movimiento.
  revised_spanish_text: El macho cabrío llevará sobre sí todas sus iniquidades a una tierra separada[a], y enviará al macho cabrío al desierto.
  revised_footnotes:
  - marker: a
    text: O «a una tierra solitaria», «a una tierra inaccesible» o «a una tierra desolada». El hebreo probablemente comunica un lugar cortado o aislado de la habitación humana.
    reason: lexical_alternative
  revision_rationale: Se quitó la nota innecesaria sobre 'macho cabrío' y se trasladó la nota al lugar de verdadera incertidumbre léxica, אֶרֶץ גְּזֵרָה, en línea con el POB inglés. 'Tierra separada' se acerca mejor a la imagen de 'cut-off land' que 'tierra aislada', sin sonar demasiado forzada, y la nota conserva las alternativas documentadas. 'Enviará ... al desierto' refleja mejor וְשִׁלַּח ... בַּמִּדְבָּר que 'soltará ... en el desierto'.
