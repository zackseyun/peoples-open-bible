translation:
  language: es
  text: 'En aquel día se levantará contra ustedes una burla[a], y se lamentará una lamentación[b], diciendo: «¡Estamos totalmente arruinados! Él cambia la porción de mi pueblo. ¡Cómo me la quita! Al que se aparta[c] le reparte nuestros campos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'dicho' o 'proverbio'; aquí tiene sentido de reproche o burla pública.
    reason: lexical_alternative
  - marker: b
    text: La repetición hebrea intensifica el lamento; también puede verterse 'y gemirá un gemido' o 'y entonará un lamento'.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo difícil: también puede entenderse como ''al rebelde'' o, menos probablemente, ''al captor'' o ''al que vuelve atrás''.'
    reason: alternative_reading
lexical_decisions:
- source_word: יִשָּׂא ... מָשָׁל
  english_pob_choice: will take up a taunt
  chosen_spanish: se levantará contra ustedes una parábola[a]
  alternatives_spanish:
  - se alzará contra ustedes un dicho
  - se levantará contra ustedes una burla
  lexicon: HALOT
  rationale: El hebreo usa el modismo de 'tomar/levantar una parábola', que puede introducir un dicho solemne, una burla o un canto de reproche. En este contexto de juicio, 'parábola' conserva el giro idiomático, mientras la nota aclara el matiz de burla o lamento.
- source_word: וְנָהָה נְהִי נִהְיָה
  english_pob_choice: and lament a lament
  chosen_spanish: y se lamentará una lamentación[b]
  alternatives_spanish:
  - y gemirá un gemido
  - y entonará un lamento
  lexicon: HALOT
  rationale: La repetición hebrea intensifica el duelo. 'Lamentación' mantiene la redundancia retórica en español y evita suavizar el énfasis. La nota preserva las alternativas idiomáticas cercanas.
- source_word: שָׁד֣וֹד נְשַׁדֻּ֔נוּ
  english_pob_choice: We are utterly ruined
  chosen_spanish: ¡Estamos totalmente arruinados!
  alternatives_spanish:
  - ¡Estamos completamente devastados!
  - ¡Nos han despojado por completo!
  lexicon: HALOT
  rationale: El juego de formas intensivas comunica devastación total. 'Totalmente arruinados' expresa bien el sentido global de ruina y pérdida, sin perder el tono exclamativo del lamento.
- source_word: חֵלֶק עַמִּי
  english_pob_choice: the portion of my people
  chosen_spanish: la porción de mi pueblo
  alternatives_spanish:
  - la heredad de mi pueblo
  - la parte de mi pueblo
  lexicon: HALOT
  rationale: '''Porción'' refleja de forma directa חֵלֶק y encaja con el reparto territorial. Se evita ''heredad'' como opción más interpretativa, aunque puede sugerir el trasfondo de tierra asignada.'
- source_word: יָמִיר
  english_pob_choice: He changes
  chosen_spanish: Él cambia
  alternatives_spanish:
  - Él intercambia
  - Él transfiere
  lexicon: HALOT
  rationale: El hifil de מוּר puede significar cambiar o intercambiar. 'Cambia' es claro y fiel, sin especificar más de lo que el hebreo exige.
- source_word: אֵיךְ יָמִישׁ לִי
  english_pob_choice: How he removes it from me
  chosen_spanish: ¡Cómo me la quita!
  alternatives_spanish:
  - ¡Cómo me la retira!
  - ¡Cómo me la aparta!
  lexicon: HALOT
  rationale: La exclamación expresa asombro dolido. En español, 'me la quita' comunica de forma natural la remoción del bien mencionado, manteniendo la referencia implícita a la porción.
- source_word: לְשׁוֹבֵב
  english_pob_choice: to the one who turns away
  chosen_spanish: Al que se desvía
  alternatives_spanish:
  - Al rebelde
  - Al que se aparta
  lexicon: HALOT
  rationale: La forma es difícil y debatida. 'Al que se desvía' conserva la idea básica de apartarse/volver atrás sin cerrar la ambigüedad con un término excesivamente técnico como 'apóstata'.
- source_word: שָׂדֵינוּ יְחַלֵּק
  english_pob_choice: he divides our fields
  chosen_spanish: le reparte nuestros campos
  alternatives_spanish:
  - les reparte nuestros campos
  - distribuye nuestros campos
  lexicon: HALOT
  rationale: '''Reparte'' transmite la idea de dividir/apartir porciones de tierra. ''Nuestros campos'' mantiene la referencia agrícola y territorial del hebreo.'
theological_decisions:
- issue: Interpretación de לְשׁוֹבֵב
  english_pob_reading: to the one who turns away
  chosen_spanish_reading: Al que se desvía
  alternative_spanish_readings:
  - Al rebelde
  - Al que se aparta
  rationale: La expresión es léxicamente difícil y admite más de una lectura. La traducción principal opta por una formulación transparente que preserva la idea de apartarse, sin resolver en exceso si el matiz es moral, político o de reversión de estado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se integró la revisión reciente del POB en inglés: el giro de לְשׁוֹבֵב se mantiene transparente como ''al que se desvía'', evitando ''apóstata'' y conservando la tensión interpretativa. También se reflejó la decisión auditada de mantener la repetición retórica del lamento y el valor intensivo de las formas verbales en la primera mitad del versículo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantuvo 'pueblo' y 'campos' para conservar el campo semántico de reparto territorial.
  - '''Parábola'' se eligió como equivalente formal del modismo hebreo, con nota para el matiz de reproche.'
  - Se evitó 'Mesías', 'Cristo' y otras terminologías no presentes en este versículo.
