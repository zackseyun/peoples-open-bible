review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del hebreo y del POB inglés: negación existencial, metáfora de herida irreparable, regocijo hostil de las naciones y pregunta retórica sobre el alcance universal del mal de Nínive. Sin embargo, hay dos puntos que conviene ajustar para mayor fidelidad y naturalidad: ''sanidad'' suena menos idiomático que ''curación'' o ''alivio'' en esta construcción, y ''baten palmas sobre ti'' es comprensible pero menos natural en español bíblico actual que ''aplauden por tu caída'' o ''dan palmadas por ti/contra ti''; además, el matiz de regocijo hostil puede expresarse mejor sin calco excesivo.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta leves calcos del inglés/hebreo: ''sanidad para tu fractura'' y especialmente ''baten palmas sobre ti''. ''Gravísima'' intensifica más que el inglés auditado ''grievous'' y que el hebreo exige; ''grave'' o ''severa'' es más sobrio y suficiente. El resto del verso fluye bien y mantiene legibilidad amplia.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección de 'maldad' para רָעָתְךָ es defendible y preserva la carga moral documentada. No intervienen términos sensibles como Yahvé, Mesías, Espíritu o δοῦλος.
  issues:
  - severity: medium
    issue: '''sanidad'' en ''No hay sanidad para tu fractura'''
    rationale: Aunque no es incorrecto, en español general y eclesial 'sanidad' suele sonar más marcado o técnico/carismático; 'curación' o 'alivio' representan mejor el valor léxico de כֵּהָה y suenan más naturales aquí.
  - severity: medium
    issue: '''baten palmas sobre ti'' es un calco poco natural'
    rationale: La combinación 'batir palmas sobre alguien' no es la forma más idiomática en español contemporáneo. El hebreo expresa regocijo hostil por la caída de Nínive; conviene una formulación más natural que preserve ese matiz.
  - severity: low
    issue: '''gravísima'' sobreintensifica נַחְלָה'
    rationale: El audit trail inglés prefirió 'is grievous' evitando una lectura demasiado interpretativa. 'Grave' mantiene mejor el equilibrio entre severidad y sobriedad.
  revised_spanish_text: No hay curación para tu fractura[a]; tu herida es grave. Todos los que oyen la noticia acerca de ti aplauden por tu caída[b], porque ¿sobre quién no ha pasado continuamente tu maldad?
  revised_footnotes:
