review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: contraste adversativo, acción divina por causa de su nombre, prevención de la profanación y dimensión pública ante las naciones. Sin embargo, la cláusula final usa «las había sacado», que no concuerda con el referente natural de Israel en español bíblico general, donde corresponde masculino no marcado («los había sacado»), a menos que se explicitara «la casa de Israel». Además, la repetición «a la vista ... en cuya vista» suena forzada en español.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero «en cuya vista las había sacado» resulta poco natural y gramaticalmente problemática por el pronombre femenino. También hay una nota redundante: la nota [a] repite exactamente el texto principal y no preserva una alternativa real. Conviene mejorar la fluidez manteniendo la imagen visual del hebreo.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «mi nombre», «profanado» y «las naciones» están bien alineados. La mejora propuesta conserva la carga teológica de profanación y el énfasis público del hebreo.
  issues:
  - severity: medium
    issue: Pronombre de objeto «las» para Israel
    rationale: El hebreo tiene sufijo 3mp («los»). En español, si no se explicita un antecedente femenino como «las personas de Israel», «los había sacado» es la concordancia natural y fiel.
  - severity: medium
    issue: 'Cláusula final poco natural: «en cuya vista ...»'
    rationale: Aunque intenta preservar la repetición de לְעֵינֵי/לְעֵינֵיהֶם, en español suena rígido. «ante cuyos ojos» conserva mejor la imagen visual y la legibilidad.
  - severity: low
    issue: Nota [a] no ofrece alternativa real
    rationale: 'Dice «O: por amor de mi nombre», idéntico al texto principal, por lo que no añade valor documental. Debe eliminarse o sustituirse por una alternativa real como «por causa de mi nombre».'
  revised_spanish_text: Pero yo actué por amor de mi nombre, para que no fuera profanado[a] a la vista de las naciones, ante cuyos ojos los había sacado.
  revised_footnotes:
  - marker: a
    text: «Profanado» traduce un verbo que significa tratar como común o desacralizar lo que es santo.
    reason: lexical_alternative
  revision_rationale: Se corrige el pronombre a masculino plural para concordar con el referente implícito de Israel y con el sufijo hebreo. Se reemplaza «en cuya vista» por «ante cuyos ojos» para conservar la imagen visual del hebreo con mejor naturalidad en español. Se elimina la nota redundante [a] original y la nota sobre «a la vista» por no ser necesaria una vez que el texto ya expresa con claridad la dimensión visual.
