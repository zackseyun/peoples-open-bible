base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/031/006.yaml
  text: Be strong and courageous[a]. Do not fear or be terrified because of them, for Yahweh your God is the one who goes with you[b]; he will not fail you or forsake you.
  footnotes:
  - marker: a
    text: Or 'Do not fear or dread them.' The second verb is stronger than the first and can carry the sense of being terrified or shattered with fear.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'he will not let go of you' or 'he will not drop you'; the sense is that the LORD will not fail to uphold you.
    reason: lexical_alternative
