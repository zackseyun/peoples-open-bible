- from: Se engrandeció hasta el ejército de los cielos[a], y arrojó a tierra parte del ejército y de las estrellas, y los pisoteó.
  to: Creció hasta el ejército de los cielos[a], y arrojó a tierra parte del ejército y parte de las estrellas, y los pisoteó.
