translation:
  language: es
  text: Entonces tomó a su hijo primogénito, el que había de reinar en su lugar, y lo ofreció como holocausto sobre la muralla. Y hubo gran ira[a] contra Israel, de modo que se retiraron de él y regresaron a su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘gran indignación/ira contra Israel’. El hebreo no especifica de quién era esta ira; los intérpretes difieren en si se refiere a ira divina, a furor moabita o al desánimo de Israel después del sacrificio.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנוֹ הַבְּכוֹר
  english_pob_choice: his firstborn son
  chosen_spanish: su hijo primogénito
  alternatives_spanish:
  - su hijo mayor
  lexicon: HALOT
  rationale: Primogénito conserva el sentido de primero en nacimiento y la carga de sucesión implícita en el término. 'Mayor' sería más débil y perdería esa fuerza lexical.
- source_word: אֲשֶׁר יִמְלֹךְ תַּחְתָּיו
  english_pob_choice: who was to reign in his place
  chosen_spanish: el que había de reinar en su lugar
  alternatives_spanish:
  - el que reinaría después de él
  - el que iba a ser rey en su lugar
  lexicon: HALOT
  rationale: '''Había de reinar'' expresa la designación futura del heredero sin forzar una interpretación más específica que la del hebreo. ''En su lugar'' refleja naturalmente תַּחְתָּיו.'
- source_word: וַיַּעֲלֵהוּ עֹלָה
  english_pob_choice: offered him up as a burnt offering
  chosen_spanish: lo ofreció como holocausto
  alternatives_spanish:
  - lo ofreció como sacrificio quemado
  - lo hizo holocausto
  lexicon: HALOT
  rationale: '''Holocausto'' es el equivalente cultual tradicional en español para עֹלָה y conserva el carácter sacrificial del acto. Se evita suavizarlo con una paráfrasis menos precisa.'
- source_word: עַל הַחֹמָה
  english_pob_choice: on the wall
  chosen_spanish: sobre la muralla
  alternatives_spanish:
  - sobre la pared
  - sobre la muralla de la ciudad
  lexicon: HALOT
  rationale: '''Muralla'' suena natural en español para una fortificación urbana y comunica mejor el contexto militar que ''pared''. ''Sobre'' conserva la referencia espacial del hebreo.'
- source_word: קֶצֶף גָּדוֹל
  english_pob_choice: great wrath
  chosen_spanish: gran ira
  alternatives_spanish:
  - gran furor
  - gran indignación
  lexicon: HALOT
  rationale: '''Ira'' comunica de manera directa la fuerza de קֶצֶף en español. Se conserva la amplitud semántica y la ambigüedad del hebreo, que no especifica el sujeto de esa ira.'
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - sobre Israel
  lexicon: HALOT
  rationale: Con un sustantivo como 'ira', 'contra' expresa mejor la dirección hostil que el hebreo עַל en este contexto.
- source_word: וַיִּסְעוּ מֵעָלָיו
  english_pob_choice: they withdrew from him
  chosen_spanish: se retiraron de él
  alternatives_spanish:
  - se apartaron de él
  - levantaron el campamento de frente a él
  lexicon: HALOT
  rationale: '''Se retiraron de él'' transmite una retirada militar natural en español y preserva la relación con el rey de Moab indicada por el pronombre.'
- source_word: וַיָּשֻׁבוּ לָאָרֶץ
  english_pob_choice: returned to their land
  chosen_spanish: regresaron a su tierra
  alternatives_spanish:
  - volvieron a la tierra
  - regresaron a su territorio
  lexicon: HALOT
  rationale: '''Su tierra'' es una forma idiomática y fiel que hace explícito el posesivo implícito en el contexto de la coalición invasora.'
theological_decisions:
- issue: Ambigüedad de la 'gran ira'
  english_pob_reading: Retain the ambiguous expression 'great wrath' without specifying whether it is divine wrath, Moabite fury, or the psychological/military effect of the sacrifice.
  chosen_spanish_reading: Mantener 'gran ira' sin identificar su origen.
  alternative_spanish_readings:
  - gran indignación
  - gran furor de parte de Dios
  - gran consternación cayó sobre Israel
  rationale: El hebreo no identifica de manera explícita quién experimenta o provoca esa ira. La traducción conserva la tensión interpretativa en vez de resolverla, de acuerdo con la lectura auditada de la POB inglesa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios en el último pase; esta propuesta española sigue esa misma línea textual y conserva la ambigüedad interpretativa del original.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Holocausto'' se usa como término cultual técnico para עֹלָה, consistente con la pauta POB de no suavizar el acto sacrificial.'
  - '''Ira'' se reserva para קֶצֶף en este contexto para preservar la fuerza y la ambigüedad del sustantivo.'
