translation:
  text: My father[a], and the sister of my husband—and he is my offspring. I am the
    servant of my husband[e][d][c][b], and I am the Lady.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ‘He is the one who begot me’ reflects a paternal begetting nuance; some
      English versions read ‘gave birth to me,’ but the Coptic idiom distinguishes
      begetting (father) from bearing (mother).
    reason: lexical_alternative
  - marker: b
    text: If the underlying word is ⲡϩⲙϩⲁⲗ, the line reads ‘I am the bride and the
      bridegroom,’ a well-known paradox in this poem.
    reason: alternative_reading
  - marker: c
    text: ⲧϫⲟⲉⲓⲥ is the feminine counterpart to ‘lord,’ hence ‘Lady’; ‘mistress’ is
      another option but carries modern overtones.
    reason: cultural_note
  - marker: d
    text: Or 'the one who begot me'.
    reason: previous_rendering
  - marker: e
    text: Or 'the bride'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲡⲁⲉⲓⲱⲧ
  chosen: my father
  alternatives:
  - my sire
  - my parent (father)
  lexicon: Crum Coptic Dictionary
  rationale: Plain possessive of ⲉⲓⲱⲧ with first-person suffix; modern, clear English
    preferred.
- source_word: ⲧⲥⲱⲛⲉ
  chosen: the sister
  alternatives:
  - my sister (contextual)
  - female sibling
  lexicon: Crum Coptic Dictionary
  rationale: ⲥⲱⲛⲉ is ‘sister’; article ⲧ marks feminine; kept definite article as
    in Coptic phrase.
- source_word: ⲡⲁϩⲁⲓ
  chosen: my husband
  alternatives:
  - my man
  - my spouse
  lexicon: Crum Coptic Dictionary
  rationale: ϩⲁⲓ commonly denotes ‘husband’; ‘my man’ is idiomatic but less clear;
    ‘spouse’ blurs gendered paradoxes.
- source_word: ⲛⲧⲟϥ ⲡⲉ
  chosen: he is
  alternatives:
  - it is he
  - he’s
  lexicon: Crum Coptic Dictionary
  rationale: Third-person independent pronoun + copula; straightforward copular clause.
- source_word: ⲡⲁϫⲡⲟ
  chosen: the one who begot me
  alternatives:
  - my begetter
  - the one who fathered me
  lexicon: Crum Coptic Dictionary
  rationale: Agent-noun sense fits context; English ‘begot’ preserves paternal begetting
    without confusing with maternal birthing; ‘begetter’ felt more archaic.
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  chosen: I am
  alternatives:
  - It is I
  - I (am)
  lexicon: Crum Coptic Dictionary
  rationale: Standard ‘I am’ formula in Thunder; kept explicit to preserve cadence.
- source_word: ⲧϩⲙϩⲁⲗ
  chosen: the bride
  alternatives:
  - the wedded woman
  - the bride-woman
  lexicon: Crum Coptic Dictionary
  rationale: Form and context point to ‘bride’; maintains the nuptial paradox with
    following title.
- source_word: ⲛⲧⲉ ⲡⲁϩⲁⲓ
  chosen: of my husband
  alternatives:
  - belonging to my husband
  - my husband’s
  lexicon: Crum Coptic Dictionary
  rationale: Genitival ⲛⲧⲉ phrase; simple ‘of’ keeps the compactness.
- source_word: ⲧϫⲟⲉⲓⲥ
  chosen: the Lady
  alternatives:
  - the mistress
  - the female master
  lexicon: Crum Coptic Dictionary
  rationale: Feminine counterpart to ‘lord’; ‘Lady’ avoids modern connotations of
    ‘mistress’ while preserving status/title.
parallelism_check: 'This rendering preserves paired paradoxes: familial inversion
