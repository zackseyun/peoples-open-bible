translation:
  language: es
  text: Como un león joven, ha dejado su guarida, porque la tierra de ellos ha quedado en desolación por la ardiente ira del opresor[a], y por su ardiente ira[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la ardiente ira de la paloma». La forma escrita hebrea puede leerse así, aunque el contexto favorece claramente un sentido como «el opresor».
    reason: alternative_reading
  - marker: b
    text: El «su» final probablemente se refiere a Yahvé en el contexto inmediato, aunque algunos lo entienden como referencia al opresor mencionado en la frase anterior.
    reason: alternative_reading
lexical_decisions:
- source_word: עָזַב
  english_pob_choice: has left
  chosen_spanish: ha dejado
  alternatives_spanish:
  - ha abandonado
  - dejó
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una acción concluida; «ha dejado» conserva bien ese valor aspectual en español y es más sobrio que «ha abandonado».
- source_word: כַּכְּפִיר
  english_pob_choice: Like a young lion
  chosen_spanish: Como león joven
  alternatives_spanish:
  - Como cachorro de león
  - Como un león joven
  lexicon: HALOT
  rationale: כְּפִיר suele referir a un león joven, con vigor y ferocidad. «León joven» comunica la imagen sin volverla demasiado zoológica o torpe en español.
- source_word: סֻכּוֹ
  english_pob_choice: his den
  chosen_spanish: su guarida
  alternatives_spanish:
  - su cueva
  - su refugio
  lexicon: HALOT
  rationale: En la imagen del león, la idea es el lugar donde se retira; «guarida» conserva el sentido metafórico de un sitio de descanso o escondite de un animal depredador.
- source_word: הָיְתָה אַרְצָם לְשַׁמָּה
  english_pob_choice: their land has become a desolation
  chosen_spanish: su tierra ha quedado en desolación
  alternatives_spanish:
  - su tierra se ha vuelto una desolación
  - su tierra ha quedado desolada
  lexicon: HALOT
  rationale: La construcción nominal לְשַׁמָּה se conserva mejor con «en desolación» que con un adjetivo solo. «Ha quedado» expresa el resultado consumado.
- source_word: מִפְּנֵי חֲרוֹן הַיּוֹנָה
  english_pob_choice: because of the burning anger of the oppressor
  chosen_spanish: por la ardiente ira del opresor
  alternatives_spanish:
  - a causa de la ardiente ira del opresor
  - por la ira abrasadora del opresor
  lexicon: HALOT
  rationale: Se sigue la lectura contextual de הַיּוֹנָה como «el opresor», como en el inglés POB. «Ardiente ira» reproduce bien חֲרוֹן como ira encendida o ardorosa.
- source_word: וּמִפְּנֵי חֲרוֹן אַפּוֹ
  english_pob_choice: and because of his burning anger
  chosen_spanish: y por la ardiente ira de él
  alternatives_spanish:
  - y por su ardiente ira
  - y por la ira ardiente de él
  lexicon: HALOT
  rationale: El pronombre final se mantiene deliberadamente abierto, como en el audit trail inglés. «De él» conserva la ambigüedad sobre el referente sin resolverla en la traducción principal.
theological_decisions:
- issue: Identidad del sujeto implícito en la imagen del león y referente del pronombre final
  english_pob_reading: The verse depicts the LORD under lion imagery, with the final 'his' referring to him.
  chosen_spanish_reading: La imagen del león se deja en español sin especificar explícitamente al referente, y el pronombre final queda en «de él» para mantener la ambigüedad contextual.
  alternative_spanish_readings:
  - 'Como interpretación explícita: «Como león joven, Yahvé ha dejado su guarida…»'
  - 'Como interpretación alternativa: «…por la ardiente ira del opresor, y por la ardiente ira de él» refiriendo el último pronombre al opresor.'
  rationale: El hebreo y el contexto admiten tensión entre la lectura del juicio de Yahvé y la posible referencia al opresor. La traducción principal no fuerza una resolución; preserva el flujo del texto y deja espacio para la nota alternativa, siguiendo el audit trail.
  doctrine_reference: Preservar la tensión textual y teológica sin resolverla de manera prematura.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso de revisión fue alto y sin objeciones. Se mantuvo la solución que preserva la ambigüedad contextual en la cláusula del opresor y en el pronombre final.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino en el proyecto, pero aquí no se añadió al texto principal para no resolver explícitamente el referente del león donde el audit trail mantiene una tensión contextual.
  - Se mantiene «ira ardiente/ardiente ira» para חֲרוֹן en ambas cláusulas a fin de conservar el paralelismo hebreo.
  - «Guarida» se eligió por naturalidad en la imagen del león; no desplaza el sentido de lugar de refugio o alojamiento animal.
