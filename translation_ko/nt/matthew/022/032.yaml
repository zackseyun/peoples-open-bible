source:
  edition: SBLGNT
  text: Ἐγώ εἰμι ὁ θεὸς Ἀβραὰμ καὶ ὁ θεὸς Ἰσαὰκ καὶ ὁ θεὸς Ἰακώβ; οὐκ ἔστιν ⸂ὁ θεὸς⸃ νεκρῶν ἀλλὰ ζώντων.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/022/032.yaml
  text: I am the God of Abraham and the God of Isaac and the God of Jacob. He is not the God of the dead[a], but of the living.
  footnotes:
  - marker: a
    text: 'Or: ''God is not the God of the dead, but of the living.'' The Greek repeats ''God'' explicitly in the second sentence; the main text uses ''He'' for natural English style.'
    reason: lexical_alternative
translation:
  language: ko
  text: ʻ나는 아브라함의 하나님이요, 이삭의 하나님이요, 야곱의 하나님이다ʼ 하셨으니, 그분은 죽은 자들의 하나님이 아니라 산 자들의 하나님이십니다.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 출 3:6 인용에서 ἐγώ εἰμι ὁ θεὸς의 무게
  chosen_reading: 「나는 아브라함의 하나님이요…」 (현재형 강조)
  alternative_readings:
  - 나는 ~의 하나님이었다
  rationale: 예수의 논증은 동사가 현재형이라는 사실 — 곧 족장들이 지금도 하나님 앞에 살아 있다는 사실 — 에 달려 있다. 한국어에서도 현재형으로 옮겨 논증의 무게를 보존한다.
  doctrine_reference: 'DOCTRINE.md §1: render the source''s strongest plain meaning'
