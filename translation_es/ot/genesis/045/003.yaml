revisions:
- from: 'Entonces José dijo a sus hermanos[a]: «Yo soy José. ¿Sigue vivo todavía mi padre?». Pero sus hermanos no pudieron responderle[b], porque estaban consternados ante su presencia.'
  to: 'Entonces José dijo a sus hermanos: «Yo soy José. ¿Todavía vive mi padre?». Pero sus hermanos no pudieron responderle, porque estaban consternados ante su presencia[a].'
  rationale: Se elimina la redundancia de «sigue ... todavía» para una pregunta más natural y fiel al hebreo. Se suprime la nota [a] por innecesaria. Se corrige la nota sobre la expresión hebrea מִפָּנָיו, anclándola en «su presencia» y no en «responderle», en conformidad con el rastro de auditoría inglés. No se requiere adjudicación adicional porque los cambios son menores y claros.
