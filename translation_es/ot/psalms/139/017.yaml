  to: Y a mí[a], ¡cuán preciosos son tus pensamientos, oh Dios; cuán inmensa es la suma de ellos[b]!
  rationale: Se corrige el anclaje de la nota léxica para que corresponda al idiomatismo final del hebreo, y se pule el español con 'Y a mí' y 'la suma de ellos', que resultan más naturales y transparentes sin apartarse del sentido fuente ni de las decisiones auditadas del POB inglés.
