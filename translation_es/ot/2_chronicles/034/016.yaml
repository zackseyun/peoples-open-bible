translation:
  language: es
  text: 'Entonces Safán trajo el libro al rey y también le informó al rey[a], diciendo: «Todo lo que fue confiado a tus siervos, ellos están haciendo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «también le trajo de nuevo palabra al rey». El hebreo expresa literalmente la idea de volver con un informe o noticia al rey. También: «Todo lo que fue encomendado a tus siervos, ellos lo están llevando a cabo». El hebreo usa literalmente «fue puesto en la mano de tus siervos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: brought
  chosen_spanish: trajo
  alternatives_spanish:
  - presentó
  - llevó
  lexicon: HALOT
  rationale: 'El hifil de בוא es causativo: Safán no solo vino, sino que llevó el libro hasta el rey. «Trajo» conserva esa acción sin forzar un calco.'
- source_word: הַסֵּפֶר
  english_pob_choice: the book
  chosen_spanish: el libro
  alternatives_spanish:
  - el rollo
  - el documento
  lexicon: HALOT
  rationale: «Libro» es la forma más natural y fiel en español para este contexto narrativo, sin precisar indebidamente el soporte material.
- source_word: וַיָּשֶׁב עוֹד אֶת־הַמֶּלֶךְ דָּבָר
  english_pob_choice: also brought back word to the king
  chosen_spanish: también le trajo de nuevo palabra al rey
  alternatives_spanish:
  - también informó al rey otra vez
  - también respondió de nuevo al rey
  lexicon: HALOT
  rationale: La locución שוב + דבר expresa volver con un informe o noticia. «Trajo de nuevo palabra» conserva la imagen hebrea y el sentido de reporte; «también» refleja עוֹד.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - 'así: '
  lexicon: HALOT
  rationale: Es la introducción estándar de discurso directo; «diciendo» mantiene el enlace sin añadir interpretación.
- source_word: כֹּל אֲשֶׁר נִתַּן בְּיַד עֲבָדֶיךָ
  english_pob_choice: All that was committed into the hand of your servants
  chosen_spanish: Todo lo que fue confiado a tus siervos
  alternatives_spanish:
  - Todo lo que fue puesto en manos de tus siervos
  - Todo lo que fue entregado a tus siervos
  lexicon: HALOT
  rationale: El pasivo נִתַּן con בְיַד es un modismo de encargo o comisión. «Fue confiado» expresa bien la idea de encomienda y evita una literalidad dura en español.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus oficiales
  lexicon: HALOT
  rationale: En contexto de corte real, עבד puede referirse a servidores/funcionarios del rey. «Siervos» mantiene la relación de servicio sin sobredeterminar su rango.
- source_word: הֵם עֹשִׂים
  english_pob_choice: they are doing
  chosen_spanish: ellos lo están haciendo
  alternatives_spanish:
  - ellos lo están llevando a cabo
  - ellos están cumpliéndolo
  lexicon: HALOT
  rationale: La combinación de pronombre explícito y participio en hebreo enfatiza la acción en curso. En español, «lo están haciendo» preserva ese aspecto progresivo y el énfasis, con un objeto implícito recuperado por el contexto del encargo.
translation_notes:
  revision_awareness: Se siguió el último estado revisado del inglés POB, que cambió «put» por «committed» para reflejar mejor la idea de encomienda. La versión española adopta «fue confiado» para captar ese mismo matiz, manteniendo el modismo hebreo subyacente con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como estándar solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usa «siervos» en lugar de «esclavos» porque el contexto cortesano señala servidores/funcionarios del rey.
  - El objeto de «hacer» queda implícito por el contexto; la nota aclara la alternativa más explícita.
  - La puntuación y comillas siguen el uso español moderno y un registro bíblico sobrio.
