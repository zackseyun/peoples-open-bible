translation:
  language: es
  text: Yotam durmió con sus padres[a], y lo sepultaron en la ciudad de David. Y Acaz, su hijo, reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, ‘murió con sus padres’. El hebreo dice literalmente ‘durmió con sus padres’, fórmula real de muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: HALOT
  rationale: En esta fórmula real de muerte, שׁכב con ‘con sus padres’ funciona como un giro idiomático. ‘Durmió’ preserva la imagen verbal y la fórmula tradicional mejor que explicitar ‘murió’.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: ‘Padres’ conserva la relación dinástica y el paralelismo con el hebreo. En español, ‘con sus padres’ comunica la fórmula sepulcral de manera natural y solemne.
- source_word: וַיִּקְבְּרוּ אֹתוֹ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - fue sepultado
  lexicon: HALOT
  rationale: El verbo hebreo está en plural activo. ‘Lo sepultaron’ mantiene la acción activa y ofrece un registro digno; ‘fue sepultado’ suavizaría el sujeto explícito del hebreo.
- source_word: בְּעִיר דָּוִיד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en David's city
  lexicon: HALOT
  rationale: Se conserva la expresión fija del lugar con el nombre propio tradicional, sin reinterpretarla.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: ‘Reinó’ es el equivalente natural y directo en castellano para la notificación sucesoria de מלך.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - después de él
  - en lugar de él
  lexicon: HALOT
  rationale: En contexto de sucesión, תַּחַת indica reemplazo. ‘En su lugar’ transmite con claridad la sucesión dinástica en español.
- source_word: יוֹתָם
  english_pob_choice: Jotham
  chosen_spanish: Yotam
  alternatives_spanish:
  - Jotam
  - Joatam
  lexicon: Transliteración estándar basada en el hebreo
  rationale: Se adopta ‘Yotam’ para reflejar más de cerca la pronunciación hebrea y mantener coherencia transliteracional en español bíblico contemporáneo.
- source_word: אָחָז
  english_pob_choice: Ahaz
  chosen_spanish: Ahaz
  alternatives_spanish:
  - Acaz
  lexicon: Transliteración estándar basada en el hebreo
  rationale: Se mantiene ‘Ahaz’ como forma transliterada directa del hebreo, coherente con un enfoque de transliteración transparente.
theological_decisions:
- issue: 'Fórmula real de muerte: ‘durmió con sus padres’'
  english_pob_reading: The Hebrew says 'slept with his fathers,' a standard royal death formula.
  chosen_spanish_reading: durmió con sus padres
  alternative_spanish_readings:
  - murió con sus padres
  - descansó con sus padres
  rationale: Se conserva la tensión idiomática del hebreo en vez de eliminarla con una paráfrasis interpretativa. La expresión es un giro convencional de obituario real y no requiere explicitación teológica adicional.
  doctrine_reference: Formula narrativa de muerte en registros reales del Antiguo Testamento
- issue: 'Sucesión monárquica: ‘reinó en su lugar’'
  english_pob_reading: in his place
  chosen_spanish_reading: reinó en su lugar
  alternative_spanish_readings:
  - reinó después de él
  - tomó su lugar como rey
  rationale: La frase destaca la sucesión dinástica sin añadir matices que el texto no exige. ‘En su lugar’ mantiene la idea de reemplazo regnal del hebreo.
  doctrine_reference: Continuidad dinástica en los libros históricos
translation_notes:
  revision_awareness: 'Se mantuvo el sentido y la estructura del original hebreo con plena concordancia con la auditoría inglesa: se preservó la fórmula real de muerte, el sujeto activo de ‘sepultaron’, la expresión fija ‘ciudad de David’ y la fórmula sucesoria ‘en su lugar’. No se requirieron cambios respecto del paso de revisión más reciente, que marcó el segmento como sin cambios.'
  spanish_consistency_notes:
  - Se usó ‘Yotam’ para la transliteración del nombre אישי יוֹתָם, coherente con una política transliteracional transparente.
  - Se evitó ‘SEÑOR’ porque no aparece el nombre divino en este versículo.
  - ‘Lo sepultaron’ mantiene el plural activo del hebreo, en lugar de una pasiva impersonal.
  - ‘En su lugar’ conserva la sucesión dinástica sin introducir un orden temporal más amplio que el del hebreo.
