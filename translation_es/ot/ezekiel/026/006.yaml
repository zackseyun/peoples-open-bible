translation:
  language: es
  text: Y sus hijas[a], que están en el campo[b], serán matadas a espada, y sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “sus ciudades hijas” o “sus villas”; es decir, los asentamientos dependientes de Tiro.
    reason: lexical_alternative
  - marker: b
    text: Lit. “en el campo”; probablemente alude a asentamientos en tierra firme o en la campiña.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְנוֹתֶיהָ
  english_pob_choice: her daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - sus ciudades hijas
  - sus villas
  - sus poblados hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente “sus hijas”. En este contexto profético y geográfico puede referirse a asentamientos dependientes de Tiro. En español, “hijas” preserva la imagen literal; las alternativas interpretativas se conservan en nota para no borrar la tensión semántica.
- source_word: אֲשֶׁר בַּשָּׂדֶה
  english_pob_choice: who are in the field
  chosen_spanish: que están en el campo
  alternatives_spanish:
  - que están en el campo abierto
  - que están en la tierra firme
  - que están en la campiña
  lexicon: HALOT
  rationale: La frase es literalmente “en el campo”. “Campo” mantiene la imagen hebrea y es natural en español. La posible referencia contextual a asentamientos en tierra firme queda explicada en nota.
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con la espada
  lexicon: HALOT
  rationale: El hebreo usa el instrumento de juicio/muerte. En español bíblico, “a espada” suena natural y conserva el valor instrumental sin endurecer innecesariamente la frase.
- source_word: תֵּהָרַגְנָה
  english_pob_choice: will be killed
  chosen_spanish: serán muertas
  alternatives_spanish:
  - serán asesinadas
  - serán degolladas
  - serán matadas
  lexicon: HALOT
  rationale: 'El nifal imperfecto plural femenino expresa pasivo: “serán muertas”. Mantiene la correspondencia gramatical con “sus hijas” y la forma de juicio anunciada.'
- source_word: וְיָדְעוּ
  english_pob_choice: and they will know
  chosen_spanish: y sabrán
  alternatives_spanish:
  - y conocerán
  - y llegarán a saber
  lexicon: HALOT
  rationale: 'La fórmula de Ezequiel expresa reconocimiento resultante: “sabrán”. En español es fluido y conserva el sentido futuro/resultativo del hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma española adoptada por el proyecto. Se evita la sustitución por un título y se mantiene la transparencia del Tetragrámaton.
theological_decisions:
- issue: Referente de “sus hijas” en el oráculo contra Tiro
  english_pob_reading: Dependent settlements belonging to Tyre are denoted, while the main text retains the literal expression 'her daughters.'
  chosen_spanish_reading: El texto principal conserva la expresión literal “sus hijas”, mientras la nota aclara que puede referirse a ciudades o poblados dependientes de Tiro.
  alternative_spanish_readings:
  - hijas literales de una ciudad personificada
  - sus ciudades hijas
  - sus villas o asentamientos
  rationale: La metáfora urbana hebrea puede designar comunidades dependientes, no hijas biológicas. Mantener la literalidad en el texto evita eliminar la imagen original; la nota preserva la interpretación contextual sin imponerla como única lectura.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Forma del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El proyecto pide renderizar el Tetragrámaton con el nombre propio transliterado. “Yahvé” es la forma española establecida aquí y evita la sustitución reverencial por un título.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; por eso se mantiene la solución ya auditada, con la misma distinción entre la expresión literal y la aclaración contextual en nota.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” para יְהוָה, conforme a la terminología del proyecto.
  - Se eligió “sus hijas” para preservar la metáfora urbana literal, sin ocultar la lectura contextual.
  - “A espada” conserva el instrumento de juicio con español natural y reverente.
  - La concordancia femenina plural se mantuvo en “serán muertas” para reflejar el hebreo.
  - No se introdujo terminología eclesiástica ajena al contexto del pasaje.
