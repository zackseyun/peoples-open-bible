  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura imperativa, la personificación de Jerusalén y el contraste entre vestidura de duelo y revestimiento de gloria. Sin embargo, hay un desajuste en el anclaje de las notas: la nota [a] está puesta sobre «Quítate», pero en el rastro inglés la alternativa corresponde a «garment/robe», y la nota [b] está puesta sobre «aflicción», aunque en el rastro inglés la segunda nota corresponde a «splendor/beauty», no a κάκωσις. Además, «de parte de Dios» es defendible, pero «de Dios» resulta más natural aquí y sigue permitiendo que «gloria» sea entendida como procedente de Dios por la construcción completa.'
  spanish_quality_summary: El español es claro, digno y legible. «Quítate» y «ponte» son naturales; «vestidura» y «esplendor» mantienen tono bíblico sin ser arcaicos. No obstante, la distribución de notas crea confusión semántica, y conviene ajustar una nota para preservar las alternativas léxicas documentadas por el POB inglés. También mejora la fluidez sustituir «oh Jerusalén» por «Jerusalén» sin interjección.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «gloria» y el tono profético están bien preservados. No aplica terminología de Yahvé/Mesías aquí. La elección «vestidura» para στολή y «aflicción» para κάκωσις es consistente con el rastro léxico; «esplendor» para εὐπρέπεια también lo es.
  issues:
  - severity: medium
    issue: Notas al pie mal alineadas con el texto y con el audit trail inglés
    rationale: La nota [a] en inglés corresponde a στολή ('garment/robe'), no a Ἔκδυσαι; la nota [b] corresponde a εὐπρέπεια ('splendor/beauty'), no a κάκωσις. En español deben anclarse en las expresiones pertinentes.
  - severity: low
    issue: Contenido de la nota [b] actual no refleja la alternativa preservada por el POB inglés
    rationale: La nota inglesa [b] ofrece alternativa para εὐπρέπεια ('beauty'), pero la nota española actual ofrece alternativas para κάκωσις ('miseria', 'humillación'). Eso altera la documentación léxica.
  - severity: low
    issue: «oh Jerusalén» suena menos natural en español contemporáneo
    rationale: La invocación directa se conserva adecuadamente con «Jerusalén,» sin necesidad de «oh», que puede sonar algo calcado en este registro.
