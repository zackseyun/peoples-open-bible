translation:
  language: es
  text: Porque Yahvé, tu Dios, es Dios de dioses y Señor de señores, el Dios grande, poderoso y temible[a], que no hace acepción de personas y no acepta soborno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «asombroso»; hebreo: «el que debe ser temido», es decir, el Dios que inspira reverente temor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la base o razón de la afirmación anterior; «Porque» conserva la fuerza causal de la partícula y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio confesional y editorial del proyecto para el nombre divino: transliterar el Tetragrámaton como «Yahvé», evitando la sustitución por un título.'
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - su Dios
  - vuestro Dios
  lexicon: HALOT
  rationale: El sufijo de 2mp se naturaliza en español como «tu» en un discurso dirigido al pueblo de forma colectiva; el sentido singular de referencia a Dios se mantiene por el contexto.
- source_word: אֱלֹהֵי הָאֱלֹהִים
  english_pob_choice: God of gods
  chosen_spanish: Dios de dioses
  alternatives_spanish:
  - Dios sobre dioses
  - Dios por encima de los dioses
  lexicon: HALOT
  rationale: Se preserva la cadena constructa y su valor de supremacía sin explicar filosóficamente la expresión; «Dios de dioses» transmite bien la fuerza retórica del hebreo.
- source_word: וַאֲדֹנֵי הָאֲדֹנִים
  english_pob_choice: Lord of lords
  chosen_spanish: Señor de señores
  alternatives_spanish:
  - Dueño de dueños
  - Maestro de maestros
  lexicon: HALOT
  rationale: «Señor» es el equivalente español más natural y solemne para el título paralelo; mantiene la cadencia y la relación con la fórmula anterior.
- source_word: הָאֵל
  english_pob_choice: God
  chosen_spanish: el Dios
  alternatives_spanish:
  - el Poderoso
  - el Dios poderoso
  lexicon: HALOT
  rationale: 'En aposición, אֵל funciona como título divino; en español se explicita con artículo para mantener la identificación: «el Dios».'
- source_word: הַגָּדֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - magnífico
  - majestuoso
  lexicon: HALOT
  rationale: Adjetivo directo y fiel al hebreo; «grande» conserva la sencillez y el ritmo del encadenamiento de epítetos.
- source_word: הַגִּבֹּר
  english_pob_choice: mighty
  chosen_spanish: poderoso
  alternatives_spanish:
  - fuerte
  - valiente
  lexicon: HALOT
  rationale: Aquí el matiz principal es fuerza efectiva y poder; «poderoso» comunica bien ese valor en español y encaja con el registro solemne.
- source_word: וְהַנּוֹרָא
  english_pob_choice: awesome
  chosen_spanish: temible
  alternatives_spanish:
  - asombroso
  - imponente
  - que inspira reverente temor
  lexicon: HALOT
  rationale: Se preserva el componente de temor reverente del participio; «temible» es más cercano al peso del hebreo que «asombroso», aunque mantiene la tensión entre reverencia y miedo.
- source_word: אֲשֶׁר לֹא יִשָּׂא פָנִים
  english_pob_choice: who shows no partiality
  chosen_spanish: que no hace acepción de personas
  alternatives_spanish:
  - que no muestra favoritismo
  - que no levanta el rostro
  lexicon: HALOT
  rationale: Se traduce el modismo hebreo por una equivalencia idiomática asentada en español bíblico y jurídico; comunica imparcialidad sin perder el sentido del original.
- source_word: וְלֹא יִקַּח שֹׁחַד
  english_pob_choice: and takes no bribe
  chosen_spanish: y no acepta soborno
  alternatives_spanish:
  - y no recibe soborno
  - y no toma cohecho
  lexicon: HALOT
  rationale: «Aceptar soborno» expresa con claridad el contenido legal-ético del verbo; «soborno» es la opción más natural y comprensible para lector general.
theological_decisions:
- issue: Conservar la fórmula de supremacía divina sin atenuarla ni explicarla en exceso
  english_pob_reading: Retain 'God of gods and Lord of lords' as a supremacy formula
  chosen_spanish_reading: Mantener «Dios de dioses y Señor de señores» como fórmula de supremacía
  alternative_spanish_readings:
  - Dios por encima de todos los dioses y señores
  - el Dios supremo y el Señor supremo
  rationale: La cadena hebrea funciona como proclamación de superioridad y soberanía. La traducción literal conserva la fuerza retórica y deja la interpretación al lector sin introducir una paráfrasis doctrinal.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense; do not paraphrase beyond what the source warrants.'
- issue: Renderizar el valor de ירא en נוֹרָא
  english_pob_reading: awesome; 'the one to be feared,' that is, the God who inspires reverent fear
  chosen_spanish_reading: temible, con trasfondo de reverente temor
  alternative_spanish_readings:
  - asombroso
  - que inspira reverente temor
  - terrible
  rationale: '«Temible» conserva la tensión semántica del hebreo: no solo admiración, sino una reverencia que incluye temor. La nota en inglés permite mantener esa amplitud; en el texto español se opta por un término sobrio que no suaviza el matiz.'
  doctrine_reference: HALOT lexical sense for נוֹרָא and the POB lexical note preserving reverent fear without flattening the term.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que mantuvo «awesome» como equivalente directo de נוֹרָא, pero en español se optó por «temible» para preservar el campo semántico de temor reverente sin perder naturalidad. Se conservó la serie titular completa y la clausula final con equivalencias idiomáticas estables.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, de acuerdo con el estándar del proyecto.
  - Se mantiene «Dios» para אֱלֹהִים y «Señor» para אֲדֹנִים, con cadencia paralela.
  - No se introdujo una paráfrasis explicativa en el cuerpo del versículo; la aclaración sobre parcialidad queda en nota.
  - «No hace acepción de personas» se eligió como equivalente idiomático bíblico claro y auditable.
