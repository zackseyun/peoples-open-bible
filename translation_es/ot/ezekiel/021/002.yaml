    rationale: Aunque recoge la metáfora literal de וְהַטֵּף, la decisión inglesa principal es «preach», dejando lo literal en nota. En español, «predica» o «proclama» comunica mejor el mandato profético con dignidad y legibilidad, mientras la nota puede explicar el literal «haz gotear/derrama».
