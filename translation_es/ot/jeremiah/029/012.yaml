translation:
  language: es
  text: Entonces me invocarán, vendrán y orarán a mí[a], y yo los escucharé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vendrán y orarán a mí»; el verbo hebreo es literalmente «ir/andar», pero aquí probablemente significa acercarse para orar.
    reason: lexical_alternative
  - marker: b
    text: O «los escucharé», «los oiré» o «les haré caso».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/קְרָאתֶם
  english_pob_choice: you will call on
  chosen_spanish: me invocarán
  alternatives_spanish:
  - me llamarán
  - me llamarán a mí
  - me invocarán a mí
  lexicon: קרא
  rationale: En este contexto, קרא con objeto personal expresa dirigirse a Dios en apelación. «Invocar» comunica bien ese sentido en español bíblico y mantiene la referencia cultual del verbo sin volverlo una mera llamada vocal.
- source_word: וַֽ/הֲלַכְתֶּם
  english_pob_choice: come
  chosen_spanish: vendrán
  alternatives_spanish:
  - irán
  - caminarán
  - se acercarán
  lexicon: הלך
  rationale: Aunque הלך significa literalmente «ir/andar», el POB inglés ya documenta su uso idiomático como movimiento hacia Dios para orar. «Vendrán» refleja ese acercamiento desde la perspectiva del hablante y suena natural en español.
- source_word: וְ/הִתְפַּלַּלְתֶּם
  english_pob_choice: pray
  chosen_spanish: orarán
  alternatives_spanish:
  - rezarán
  - intercederán
  lexicon: פלל
  rationale: El hitpael de פלל aquí designa oración dirigida a Dios. «Orarán» es claro, digno y mantiene el sentido general sin introducir una connotación confesional específica de «rezar».
- source_word: אֵלָי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: אל
  rationale: La preposición marca dirección de la oración hacia Dios. «A mí» conserva la relación directa del original y funciona de manera natural con «orar» en español.
- source_word: וְשָׁמַעְתִּי
  english_pob_choice: I will hear
  chosen_spanish: yo los escucharé
  alternatives_spanish:
  - yo les haré caso
  - yo los oiré
  lexicon: שׁמע
  rationale: שמע puede significar oír, escuchar o atender. «Escucharé» mantiene la tensión del texto entre percepción y respuesta, como el POB inglés con «I will hear you», sin resolverla demasiado hacia «obedeceré» o «haré caso».
- source_word: אֲלֵיכֶם
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - les
  lexicon: שׁמע + אֶל
  rationale: El hebreo combina שמע con la preposición אל para expresar escuchar a alguien. En español, tras «escucharé» el objeto directo «los» permite una frase fluida y mantiene el sentido de escuchar dirigidamente a los destinatarios.
theological_decisions:
- issue: Respuesta divina a la oración
  english_pob_reading: I will hear you
  chosen_spanish_reading: yo los escucharé
  alternative_spanish_readings:
  - yo los oiré
  - yo les haré caso
  rationale: El hebreo afirma que Yahvé responderá al clamor y oración del pueblo. «Los escucharé» conserva la amplitud semántica de שמע sin fijar de antemano si el énfasis es solo percepción auditiva o una respuesta favorable; así se preserva la tensión teológica documentada por el POB inglés.
  doctrine_reference: Preservar la tensión textual sobre el tipo de respuesta divina, sin estrecharla indebidamente.
translation_notes:
  revision_awareness: 'Este borrador sigue de cerca el audit trail inglés sin traducir mecánicamente: conserva el valor idiomático de הלך como acercamiento para orar, y mantiene abierta la fuerza de שמע como escuchar/responder. No se registraron revisiones posteriores en el paquete fuente; el estado de concordancia es alto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según la terminología del proyecto.
  - Se prefirió «invocarán» para קרא en un contexto de oración dirigida a Dios, en lugar de un simple «llamarán».
  - «Orarán» y «escucharé» están elegidos por claridad y dignidad en español, sin perder la relación con el hebreo.
  - Los pronombres se ajustan al español para evitar una traducción pesada del objeto hebreo, manteniendo la referencia a los destinatarios.
