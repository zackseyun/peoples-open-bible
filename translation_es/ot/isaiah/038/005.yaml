translation:
  language: es
  text: 'Ve y di a Ezequías[a]: «Así dice Yahvé, el Dios de David, tu padre: he oído tu oración; he visto tus lágrimas. He aquí[b], añadiré a tus días quince años».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el Dios de tu padre David».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «añadiré a tus días quince años», un hebraísmo que significa prolongar su vida por quince años.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלוֹךְ וְאָמַרְתָּ
  english_pob_choice: Go and say
  chosen_spanish: Ve y di
  alternatives_spanish:
  - Ve y habla
  - Ve y dile
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto con verbo finito intensifica la orden. En español, «Ve y di» comunica con naturalidad la instrucción profética sin volverla mecánica.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: Convención bíblica española
  rationale: Nombre propio transliterado según la forma bíblica española más establecida y reconocible.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Fórmula profética estándar. «Así dice» conserva el registro solemne y el presente declarativo del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: DOCTRINE.md contested terms
  rationale: Se mantiene el nombre propio del pacto en español como «Yahvé», conforme al criterio del proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵי דָּוִד אָבִיךָ
  english_pob_choice: the God of David your father
  chosen_spanish: el Dios de David, tu padre
  alternatives_spanish:
  - el Dios de tu padre David
  - el Dios de David, tu padre
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera natural en español preservando la relación posesiva y la identificación de David como el padre del destinatario.
- source_word: שָׁמַעְתִּי אֶת תְּפִלָּתֶךָ
  english_pob_choice: I have heard your prayer
  chosen_spanish: he oído tu oración
  alternatives_spanish:
  - he escuchado tu oración
  lexicon: HALOT
  rationale: El perfecto divino se expresa con presente perfecto español. «Oído» conserva la fuerza resultativa y la respuesta divina inmediata.
- source_word: רָאִיתִי אֶת דִּמְעָתֶךָ
  english_pob_choice: I have seen your tears
  chosen_spanish: he visto tus lágrimas
  alternatives_spanish:
  - he visto tu llanto
  - he visto tu llanto y tus lágrimas
  lexicon: HALOT
  rationale: El sustantivo singular con sufijo puede funcionar colectivamente; en español, el plural «lágrimas» expresa con naturalidad el valor idiomático del hebreo.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Mira, aquí
  lexicon: HALOT
  rationale: Se conserva la función deíctica y enfática con una fórmula reverente y bien asentada en español bíblico, sin forzar un coloquialismo.
- source_word: יוֹסִף עַל יָמֶיךָ
  english_pob_choice: I will add ... to your days
  chosen_spanish: añadiré a tus días
  alternatives_spanish:
  - aumentaré tus días
  - prolongaré tus días
  lexicon: HALOT
  rationale: Se respeta el hebraísmo «añadir... a tus días» como expresión del sentido de prolongar la vida, manteniendo la imagen original que el POB inglés también preserva.
- source_word: חֲמֵשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: fifteen years
  chosen_spanish: quince años
  alternatives_spanish:
  - 15 años
  lexicon: HALOT
  rationale: Equivalencia numérica directa y natural en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se preserva el nombre personal de Dios revelado en el texto hebreo, conforme a la política del proyecto, evitando la sustitución por un título como «Señor».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de הִנְנִי en la introducción de la promesa
  english_pob_reading: Behold
  chosen_spanish_reading: He aquí
  alternative_spanish_readings:
  - Mira
  - He aquí, yo
  rationale: La partícula introduce una acción divina inminente y enfática; «He aquí» conserva el tono formal y la deixis sin añadir explicación innecesaria.
  doctrine_reference: HALOT; POB revision trail
- issue: Idiomático «añadir... a tus días»
  english_pob_reading: I will add fifteen years to your days
  chosen_spanish_reading: añadiré a tus días quince años
  alternative_spanish_readings:
  - prolongaré tu vida quince años
  - aumentaré tus días en quince años
  rationale: La imagen hebrea se mantiene sin ocultar el hebraísmo. El español puede entenderlo como prolongación de la vida, pero la traducción no lo aplana en el texto principal.
  doctrine_reference: POB lexical policy on idiom preservation
translation_notes:
  revision_awareness: El contexto inglés pasó por una revisión menor sobre la partícula הִנְנִי, alternando entre «Look» y «Behold» para un registro más formal. En español se eligió directamente «He aquí» para reflejar ese ajuste de formalidad y conservar la deixis enfática sin coloquializarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar español del proyecto.
  - Se mantiene el nombre propio «Ezequías» en español bíblico convencional.
  - Se preserva el hebraísmo «añadiré a tus días» en el texto principal, con nota explicativa sobre su sentido idiomático.
  - El orden de comillas y puntuación sigue normas tipográficas españolas.
  - La voz verbal divina se expresa en perfecto español («he oído», «he visto») para reflejar la relevancia presente del acto cumplido.
