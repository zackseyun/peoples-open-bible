  to: Y después de las sesenta y dos semanas[a], será cortado un ungido y no tendrá nada[b]. La ciudad y el santuario los destruirá el pueblo del gobernante que ha de venir[c]. Su fin vendrá con una inundación[d], y hasta el fin habrá guerra; desolaciones están decretadas.
