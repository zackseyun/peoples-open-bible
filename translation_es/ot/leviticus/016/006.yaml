translation:
  language: es
  text: Aarón presentará el toro de la ofrenda por el pecado[a] que es para él, y hará expiación por sí mismo y por su familia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «la ofrenda de purificación». El término hebreo חַטָּאת puede denotar la ofrenda por el pecado, con énfasis en algunos contextos en la purificación ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרִיב
  english_pob_choice: shall present
  chosen_spanish: presentará
  alternatives_spanish:
  - ofrecerá
  - traerá para presentar
  lexicon: HALOT
  rationale: En contexto sacrificial, הקריב significa acercar o presentar una ofrenda ante Yahvé. «Presentará» conserva el sentido ritual sin volver la frase innecesariamente técnica o mecánica en español.
- source_word: פַּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el novillo
  - el toro joven
  lexicon: HALOT
  rationale: פַּר designa un macho bovino destinado al rito. «Toro» es natural y claro en español; «novillo» podría sonar más específico de edad de lo que el hebreo exige aquí.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado
  alternatives_spanish:
  - la ofrenda de purificación
  - la ofrenda por el pecado
  lexicon: HALOT
  rationale: Aunque la nota inglesa preserva la posibilidad de «purification offering», en este contexto levítico la referencia es la ofrenda sacrificial. «Ofrenda por el pecado» comunica con fidelidad el uso cultual y mantiene la tensión semántica sin imponer una equivalencia alternativa no explicitada en el texto base.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: that is for himself
  chosen_spanish: que es para él
  alternatives_spanish:
  - que le pertenece
  - que es suyo
  lexicon: HALOT
  rationale: La frase identifica el animal como la ofrenda asignada a Aarón. «Que es para él» conserva la relación funcional sin añadir una interpretación más fuerte de posesión o beneficio que el hebreo no exige aquí.
- source_word: וְכִפֶּר
  english_pob_choice: and he shall make atonement
  chosen_spanish: y hará expiación
  alternatives_spanish:
  - y hará propiciación
  - y expiará
  lexicon: HALOT
  rationale: כפר en lenguaje sacerdotal apunta al acto expiatorio/ritual. «Hará expiación» mantiene el valor técnico y es más natural que un calco como «hará atonamiento».
- source_word: בַּעֲדוֹ
  english_pob_choice: for himself
  chosen_spanish: por sí mismo
  alternatives_spanish:
  - en favor de sí mismo
  - por él
  lexicon: HALOT
  rationale: La preposición con sufijo expresa beneficio o referencia a su propia persona. «Por sí mismo» funciona bien en español y enlaza con el paralelismo siguiente.
- source_word: וּבְעַד בֵּיתוֹ
  english_pob_choice: and for his household
  chosen_spanish: y por su casa
  alternatives_spanish:
  - y por su familia
  - y por su casa/hogar
  lexicon: HALOT
  rationale: בַּיִת puede significar casa, familia o casa real/hogar. En este contexto sacerdotal, «su casa» reproduce con sobriedad el hebreo y deja abierta la carga representativa del término, sin cerrar prematuramente el sentido a una simple edificación.
theological_decisions:
- issue: Cómo rendir חטאת en este pasaje sacrificial
  english_pob_reading: sin offering, with a footnoted alternative 'purification offering'
  chosen_spanish_reading: ofrenda por el pecado, con nota de alternativa cultual
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda por el pecado
  rationale: 'La opción principal sigue el uso estable del término sacrificial en español y mantiene la transparencia con la tradición bíblica. La nota preserva la tensión documentada por el audit trail: el rito enfatiza también la purificación ritual, no solo la culpa moral.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Alcance de בֵּיתוֹ en el contexto de la expiación de Aarón
  english_pob_reading: his household
  chosen_spanish_reading: su casa
  alternative_spanish_readings:
  - su familia
  - su hogar
  rationale: El hebreo apunta al grupo doméstico representativo vinculado con Aarón, no solo al edificio. «Su casa» conserva la amplitud semítica y permite que el lector perciba el marco sacerdotal sin introducir una explicación interpretativa extra.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition)
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo y el audit trail inglés sin cambios de sentido relevantes; se mantiene la alternativa léxica documentada para חטאת en nota, y se ajusta la sintaxis al español natural sin ampliar el contenido.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece un sustituto del Nombre divino en la línea base.
  - 'Se conserva un registro cultual consistente con Levítico: «ofrenda por el pecado», «hará expiación», y «su casa» como unidad doméstica representativa.'
  - La redacción evita «siervo» u otras sustituciones no motivadas; también evita modernizaciones que borren el valor ritual técnico del pasaje.
