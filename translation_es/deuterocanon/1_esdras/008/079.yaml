translation:
  language: es
  text: Y ahora, ¿qué diremos, Señor, teniendo estas cosas?[a] Han transgredido tus mandamientos, que diste por mano de tus siervos, los profetas.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase «teniendo estas cosas» es comprimida en griego y remite a las circunstancias o beneficios mencionados en el contexto cercano.
    reason: lexical_alternative
  - marker: b
    text: O, de manera más idiomática, «por medio de tus siervos, los profetas». El griego dice «por mano de», una expresión bíblica habitual para una entrega mediada.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ νῦν
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora bien
  - Y ahora entonces
  lexicon: BDAG
  rationale: Conserva la transición discursiva de καί sin volverla rígida. 'Y ahora' es natural en español y mantiene el tono solemne de la oración.
- source_word: τί ἐροῦμεν
  english_pob_choice: what shall we say
  chosen_spanish: ¿qué diremos?
  alternatives_spanish:
  - ¿qué podremos decir?
  - ¿qué hemos de decir?
  lexicon: BDAG
  rationale: La pregunta retórica se expresa de forma directa y natural en español. 'Diremos' preserva el futuro deliberativo sin sobrecargar el giro.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - oh Señor
  - Soberano
  lexicon: BDAG
  rationale: Vocativo de κύριος. 'Señor' reproduce el tratamiento directo y es idiomático en español bíblico sin añadir elementos no presentes en el griego.
- source_word: ἔχοντες αὐτά
  english_pob_choice: having these things
  chosen_spanish: teniendo estas cosas
  alternatives_spanish:
  - teniendo esto
  - en vista de estas cosas
  - después de recibir estas cosas
  lexicon: BDAG
  rationale: La expresión es comprimida y remite a lo mencionado en el contexto. 'Estas cosas' preserva el plural del pronombre y evita precisar más de lo que el griego permite.
- source_word: παρέβησαν
  english_pob_choice: They have transgressed
  chosen_spanish: Han transgredido
  alternatives_spanish:
  - Han violado
  - Transgredieron
  lexicon: BDAG
  rationale: '''Transgredido'' conserva la fuerza moral-jurídica del verbo mejor que una formulación más débil. El sujeto queda implícito en español como en griego y se entiende por el contexto comunitario.'
- source_word: τὰ προστάγματά σου
  english_pob_choice: your commandments
  chosen_spanish: tus mandamientos
  alternatives_spanish:
  - tus decretos
  - tus preceptos
  - tus ordenanzas
  lexicon: BDAG
  rationale: προστάγματα designa mandatos o preceptos. 'Mandamientos' es la equivalencia más natural y clara en este contexto de pacto y obediencia.
- source_word: ἃ ἔδωκας
  english_pob_choice: which you gave
  chosen_spanish: que diste
  alternatives_spanish:
  - que entregaste
  - que concediste
  lexicon: BDAG
  rationale: El relativo con δίδωμι se vierte de manera directa. 'Diste' mantiene la sencillez del griego y fluye mejor en español.
- source_word: ἐν χειρὶ
  english_pob_choice: by the hand of
  chosen_spanish: por mano de
  alternatives_spanish:
  - por medio de
  - a través de
  lexicon: BDAG
  rationale: Se conserva la fórmula bíblica de mediación. 'Por mano de' es una traducción bastante literal, reconocible y fiel al giro semítico del texto.
- source_word: τῶν παίδων σου
  english_pob_choice: your servants
  chosen_spanish: de tus siervos
  alternatives_spanish:
  - de tus servidores
  - de tus hijos
  - de tus esclavos
  lexicon: BDAG
  rationale: En el contexto profético, παῖς funciona como 'siervo'. 'Siervos' mantiene el registro bíblico y la relación de servicio, más precisa que 'hijos' y más fuerte que 'servidores'.
- source_word: τῶν προφητῶν
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los videntes
  lexicon: BDAG
  rationale: 'Término estándar para προφῆται. La aposición se conserva en español: ''de tus siervos, los profetas''.'
theological_decisions:
- issue: Sujeto implícito de παρέβησαν
  english_pob_reading: They have transgressed
  chosen_spanish_reading: Han transgredido
  alternative_spanish_readings:
  - Hemos transgredido
  - Transgredieron
  rationale: El verbo está en tercera persona plural, así que la confesión se formula sobre el pueblo, no en primera persona. En español se mantiene esa correspondencia gramatical sin resolver indebidamente la implicación comunitaria de la oración.
  doctrine_reference: Preservar la tensión textual y la gramática original sin importar una lectura no marcada.
- issue: Fórmula de mediación con ἐν χειρὶ
  english_pob_reading: by the hand of your servants the prophets
  chosen_spanish_reading: por mano de tus siervos, los profetas
  alternative_spanish_readings:
  - por medio de tus siervos, los profetas
  - a través de tus siervos, los profetas
  rationale: La expresión retiene el sabor bíblico de mediación y evita sustituirlo por una paráfrasis que suavice el giro del original. En español 'por mano de' sigue siendo comprensible y fiel.
  doctrine_reference: Equivalencia óptima con prioridad al texto fuente y su registro bíblico.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas [a] y [b] en el texto español.
  spanish_consistency_notes:
  - Se mantuvo 'Y ahora' para la transición discursiva y 'Señor' para Κύριε, conforme al tratamiento directo del vocativo.
  - Se conservó la fórmula 'por mano de' para reflejar la mediación bíblica de ἐν χειρὶ.
  - Se eligió 'siervos' para παίδων en línea con el contexto profético y con el uso bíblico de servicio, no de filiación literal.
  - Se preservó 'mandamientos' para προστάγματα por claridad covenantal y compatibilidad con el registro bíblico español.
