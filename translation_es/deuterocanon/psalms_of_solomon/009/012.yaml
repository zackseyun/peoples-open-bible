    rationale: Aunque es literalmente defendible, en español natural no expresa tan bien la idea de admisión franca o reconocimiento abierto del pecado. «Reconocimiento abierto» preserva mejor el matiz documentado por el POB.
  - severity: medium
    issue: La nota [a] está anclada en «confesión» pero explica la alternativa de «de los pecados / en pecados»
    rationale: Las notas deben anclarse en la palabra o frase pertinente del texto. Aquí la observación textual corresponde a la frase sobre los pecados, no al medio de confesión.
