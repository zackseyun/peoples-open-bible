translation:
  language: es
  text: Todos los registrados[a], a quienes Moisés y Aarón y los líderes de Israel contaron entre los levitas[b], por sus clanes y por sus casas paternas—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los numerados» o «los contados». El hebreo usa lenguaje de censo con el verbo פּקד.'
    reason: lexical_alternative
  - marker: b
    text: «Casas paternas» se refiere a hogares ancestrales o divisiones familiares dentro de los clanes.
    reason: cultural_note
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todos
  alternatives_spanish:
  - La totalidad de
  - Todos los
  lexicon: HALOT
  rationale: Expresa la totalidad del conjunto en español natural y conciso, manteniendo el valor de suma/totalidad del hebreo sin añadir elementos.
- source_word: הַפְּקֻדִים
  english_pob_choice: those counted
  chosen_spanish: los contados
  alternatives_spanish:
  - los numerados
  - los registrados
  lexicon: HALOT
  rationale: Conserva el participio pasivo de פּקד en contexto censal. 'Los contados' es claro en español y refleja el valor de censo/registro sin explicitar más de lo que el hebreo dice.
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: a quienes
  alternatives_spanish:
  - que
  - los cuales
  lexicon: HALOT
  rationale: Introduce naturalmente la relativa en español con función de objeto indirecto/directo según el contexto sintáctico inmediato, sin perder la referencia humana.
- source_word: פָּקַד
  english_pob_choice: counted
  chosen_spanish: contaron
  alternatives_spanish:
  - numeraron
  - registraron
  - musteraron
  lexicon: HALOT
  rationale: En Números 4 el verbo está en lenguaje de censo. 'Contaron' es el equivalente más directo y transparente, y preserva la repetición lexical del pasaje.
- source_word: וּנְשִׂיאֵי יִשְׂרָאֵל
  english_pob_choice: the leaders of Israel
  chosen_spanish: los líderes de Israel
  alternatives_spanish:
  - los jefes de Israel
  - los príncipes de Israel
  lexicon: HALOT
  rationale: '''Líderes'' comunica bien נשיאים en español moderno sin cargar un matiz nobiliario que ''príncipes'' podría sugerir.'
- source_word: אֶת הַלְוִיִּם
  english_pob_choice: among the Levites
  chosen_spanish: entre los levitas
  alternatives_spanish:
  - a los levitas
  - de entre los levitas
  lexicon: HALOT
  rationale: El hebreo marca a los levitas como el grupo dentro del cual se realizó el conteo. 'Entre los levitas' reproduce ese sentido relacional de manera idiomática en español.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus clanes
  - por sus familias
  lexicon: HALOT
  rationale: '''Clanes'' conserva el nivel de agrupación social de משפחה en contexto tribal. La preposición ''por'' refleja el criterio de clasificación del censo.'
- source_word: וּלְבֵית אֲבֹתָם
  english_pob_choice: by their fathers' houses
  chosen_spanish: y por sus casas paternas
  alternatives_spanish:
  - y por sus casas de padres
  - y por sus casas ancestrales
  lexicon: HALOT
  rationale: '''Casas paternas'' es fiel y suficientemente transparente en español para בית אבות, preservando la estructura de organización familiar/tribal del original.'
theological_decisions:
- issue: Lenguaje censal y valor de פּקד
  english_pob_reading: All those counted ... whom ... counted
  chosen_spanish_reading: Todos los contados ... a quienes ... contaron
  alternative_spanish_readings:
  - Todos los numerados ...
  - Todos los registrados ...
  rationale: No hay una cuestión doctrinal, sino de semántica institucional. Se conserva el lenguaje de censo del hebreo y la repetición del verbo para no diluir la formulación técnica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo de WLC y el tramo auditado en inglés, manteniendo la repetición de פּקד y la estructura enumerativa del versículo. No se observaron revisiones previas que alteren la línea de traducción.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Levitas'' se usa de forma consistente como etnónimo/grupo tribal.'
  - '''Casas paternas'' conserva la terminología técnica de organización social israelita.'
