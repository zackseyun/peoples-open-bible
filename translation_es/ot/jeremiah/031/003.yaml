review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura básica del hebreo y conserva correctamente «Yahvé», la distinción entre «amor» y חֶסֶד, y el valor inferencial de עַל־כֵּן. Sin embargo, «se apareció Yahvé a mí» es menos natural que «Yahvé se me apareció» o «Yahvé apareció ante mí», y «te he atraído» suaviza demasiado מְשַׁכְתִּיךְ frente al audit trail inglés «I have drawn you». Además, la nota b en español se desvía del foco del POB inglés, que documenta el valor léxico de חֶסֶד, no de אַהֲבַת עוֹלָם.
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero presenta dos problemas de naturalidad/precisión: «se apareció Yahvé a mí» suena forzado en español, y «amor leal» al final, aunque defendible, funciona mejor como nota léxica sobre «amor fiel» o «amor constante» si se desea una expresión más fluida. «Te he atraído» es legible pero semánticamente menos cercano a «drawn» que «te he atraído hacia mí» o, mejor, «te he traído hacia mí» no corresponde; por fidelidad al hebreo, «te he atraído» con nota sería posible, pero «te he atraído con amor fiel» aún no expresa claramente el matiz de משך. «Te he atraído» puede mantenerse si se privilegia legibilidad, aunque conviene reforzar חֶסֶד con nota donde realmente pertenece.'
  glossary_alignment: Alinea bien con la terminología del proyecto en «Yahvé». No hay conflicto mayor con los demás términos. La principal corrección necesaria es reubicar la nota léxica para חֶסֶד, ya que el POB inglés preserva explícitamente esa información, y mejorar la formulación idiomática de נִרְאָה לִי.
  issues:
  - severity: medium
    issue: «se apareció Yahvé a mí» es poco idiomático en español
    rationale: Aunque formalmente comprensible, el orden y la construcción suenan torpes. «Yahvé se me apareció» expresa mejor נִרְאָה לִי en español natural y fiel.
  - severity: medium
    issue: Falta en español la nota léxica sobre חֶסֶד preservada por el POB inglés
    rationale: La nota b del inglés explica «steadfast love» como traducción de חֶסֶד. El borrador español en cambio pone una nota sobre «amor eterno», desplazando una decisión léxica importante documentada en el audit trail.
  - severity: low
    issue: «te he atraído» puede percibirse como algo más psicológico que «drawn you»
    rationale: No es erróneo, pero משך conserva mejor la idea de atraer/jalar hacia sí. Aun así, «atraído» sigue siendo aceptable en español bíblico moderno si no se desea una expresión más física.
  revised_spanish_text: 'Desde lejos[a] Yahvé se me apareció: «Con amor eterno te he amado; por eso te he atraído con amor fiel[b]».'
  revised_footnotes:
  - marker: a
    text: También puede entenderse como «Yahvé se apareció a él desde lejos», según se tome «desde lejos» con el verbo y/o se entienda de otro modo el pronombre en el contexto.
    reason: alternative_reading
  - marker: b
    text: «Amor fiel» traduce el hebreo חֶסֶד, un término que con frecuencia se asocia con amor leal y de pacto; alternativamente, «amor constante», «fidelidad del pacto» o «misericordia amorosa».
    reason: lexical_alternative
  revision_rationale: Se ajusta la redacción para un español más natural («Yahvé se me apareció»), y se restaura la nota léxica importante sobre חֶסֶד, conforme al audit trail inglés. También se cambia «amor leal» por «amor fiel» en el texto principal para una expresión más fluida sin perder el matiz de lealtad pactal; la nota conserva las alternativas relevantes.
