translation:
  language: es
  text: Y pondré mi venganza sobre Edom por mano de mi pueblo Israel[a], y harán con Edom conforme a mi ira y conforme a mi furor; y conocerán mi venganza, declara el Señor Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «por mano de mi pueblo Israel»; es un giro instrumental que significa que Dios actuará mediante su pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי
  english_pob_choice: I will set
  chosen_spanish: pondré
  alternatives_spanish:
  - colocaré
  - daré
  lexicon: HALOT
  rationale: נתן puede significar ‘dar’, ‘poner’ o ‘colocar’. En este contexto judicial, ‘pondré’ conserva la imagen concreta de establecer la venganza sin sonar forzado en español.
- source_word: נִקְמָתִי
  english_pob_choice: my vengeance
  chosen_spanish: mi venganza
  alternatives_spanish:
  - mi castigo vengador
  - mi vindicación
  lexicon: HALOT
  rationale: נקמה expresa retribución vengativa. ‘Venganza’ mantiene la fuerza judicial del término y evita debilitarlo con ‘vindicación’.
- source_word: בֶּאֱדוֹם
  english_pob_choice: on Edom
  chosen_spanish: sobre Edom
  alternatives_spanish:
  - contra Edom
  - en Edom
  lexicon: HALOT
  rationale: La preposición ב en un contexto hostil admite un valor direccional o adversativo. ‘Sobre Edom’ reproduce bien la imagen de una acción de juicio que recae sobre Edom.
- source_word: בְּיַד עַמִּי יִשְׂרָאֵל
  english_pob_choice: by the hand of my people Israel
  chosen_spanish: por mano de mi pueblo Israel
  alternatives_spanish:
  - por medio de mi pueblo Israel
  - a través de mi pueblo Israel
  lexicon: HALOT
  rationale: La expresión ביד es un giro instrumental. ‘Por mano de’ conserva la metáfora hebrea y deja claro que Israel es el instrumento humano del juicio divino.
- source_word: וְעָשׂוּ בֶאֱדוֹם
  english_pob_choice: they will deal with Edom
  chosen_spanish: harán con Edom
  alternatives_spanish:
  - actuarán contra Edom
  - ejecutarán juicio contra Edom
  lexicon: HALOT
  rationale: עשה es deliberadamente amplio. ‘Harán con Edom’ mantiene esa amplitud, mientras que ‘actuarán contra’ o ‘ejecutarán juicio’ especifican más de lo que el verbo exige.
- source_word: כְּאַפִּי
  english_pob_choice: according to my anger
  chosen_spanish: conforme a mi ira
  alternatives_spanish:
  - según mi ira
  - de acuerdo con mi ira
  lexicon: HALOT
  rationale: אף denota ira/enojo. ‘Conforme a’ refleja la relación comparativa de כ y suena natural en un registro bíblico solemne.
- source_word: וְכַחֲמָתִי
  english_pob_choice: and according to my wrath
  chosen_spanish: y conforme a mi furor
  alternatives_spanish:
  - y conforme a mi ira
  - y según mi furor
  lexicon: HALOT
  rationale: חמה intensifica el tono de juicio y suele rendirse como ‘furor’ o ‘ira ardiente’. ‘Furor’ mantiene la distinción respecto de ‘ira’ en la línea paralela.
- source_word: וְיָדְעוּ
  english_pob_choice: and they will know
  chosen_spanish: y conocerán
  alternatives_spanish:
  - y sabrán
  - y llegarán a conocer
  lexicon: HALOT
  rationale: ידע implica conocimiento reconocido o experimentado. ‘Conocerán’ es la forma más natural y suficientemente amplia para ese valor experiencial.
- source_word: נִקְמָתִי
  english_pob_choice: my vengeance
  chosen_spanish: mi venganza
  alternatives_spanish:
  - mi justicia retributiva
  - mi vindicación
  lexicon: HALOT
  rationale: La repetición de נִקְמָה al final debe conservarse con el mismo término en español para no diluir el efecto enfático del hebreo.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara Yahvé, el Señor
  alternatives_spanish:
  - dice Yahvé, el Señor
  - oráculo de Yahvé, el Señor
  lexicon: HALOT
  rationale: Se preserva el nombre divino YHWH como ‘Yahvé’ según el criterio del proyecto. Como אֲדֹנָי antecede al Tetragrámaton, se añade ‘el Señor’ para reflejar el título compuesto sin ocultar el nombre divino.
theological_decisions:
- issue: Preservación del nombre divino יְהוָה en la fórmula final
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Dios
  - Yahvé
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. En español se conserva ‘Yahvé’ en vez de sustituirlo por una máscara litúrgica, y se mantiene también el título אֲדֹנָי como ‘el Señor’.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Agencia divina e instrumentalidad humana en el juicio
  english_pob_reading: Israel is the human instrument of God's own vengeance
  chosen_spanish_reading: Israel es el instrumento humano por el que se ejecuta la venganza de Dios
  alternative_spanish_readings:
  - Israel actúa independientemente
  - Dios actúa sin mediación humana
  rationale: 'La frase ‘por mano de mi pueblo Israel’ conserva la doble afirmación: Dios establece su venganza y, al mismo tiempo, usa a Israel como medio de ejecución. La traducción evita separar indebidamente ambas agencias.'
  doctrine_reference: Hebrew instrumental idiom; agency in prophetic judgment
- issue: Intensificación paralela de ira y furor
  english_pob_reading: according to my anger and according to my wrath
  chosen_spanish_reading: conforme a mi ira y conforme a mi furor
  alternative_spanish_readings:
  - según mi ira y según mi furor
  - conforme a mi ira y conforme a mi indignación
  rationale: Se preserva la duplicación poética del hebreo con dos términos distintos, evitando fusionarlos en uno solo. ‘Ira’ y ‘furor’ retienen la intensificación sin borrar la distinción léxica.
  doctrine_reference: Poetic parallelism; lexical distinction between אף and חמה
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustanciales; el consenso de auditoría fue alto y solo quedó la cuestión menor de cómo reflejar en español el valor instrumental de ביד y la fórmula final con el nombre divino. Esta versión conserva ambas tensiones sin resolverlas por paráfrasis.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יְהוָה conforme al criterio del proyecto, y ‘el Señor’ para אֲדֹנָי.
  - Se conserva ‘venganza’ en ambas apariciones de נִקְמָתִי para reflejar la repetición enfática del hebreo.
  - ‘Por mano de’ preserva la metáfora instrumental hebrea mejor que ‘por medio de’, aunque ambas son posibles.
  - ‘Furor’ distingue היטב la segunda pareja semántica frente a ‘ira’, respetando el paralelismo.
  - La puntuación en español sigue la sintaxis de una sola oración profética con cierre formularia.
