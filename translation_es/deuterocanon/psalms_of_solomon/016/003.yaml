translation:
  language: es
  text: Cuando mi alma estaba siendo arrancada de Yahvé, el Dios de Israel[a]—de no haberme socorrido Yahvé por su misericordia para siempre[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando mi alma estaba siendo apartada de Yahvé, el Dios de Israel»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de no haber venido Yahvé en mi auxilio por su misericordia»'
    reason: lexical_alternative
  - marker: c
    text: La frase «para siempre» puede referirse a «su misericordia» o al acto de rescate en conjunto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τῷ διενεχθῆναι
  english_pob_choice: when ... was being torn away
  chosen_spanish: cuando ... estaba siendo arrancada
  alternatives_spanish:
  - cuando ... estaba siendo llevada
  - cuando ... estaba siendo separada
  - en el ser arrancada
  lexicon: LSJ
  rationale: La construcción temporal con infinitivo articular se expresa naturalmente con «cuando». Para διενεχθῆναι, «estaba siendo arrancada» conserva la idea pasiva de desgarro o alejamiento forzado sin volver la frase rígida o demasiado literal.
- source_word: ψυχήν μου
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  lexicon: LSJ
  rationale: En este contexto de súplica, ψυχή conserva fuerza personal y espiritual; «alma» comunica mejor esa carga que «vida» o «ser» en español bíblico contemporáneo.
- source_word: ἀπὸ Κυρίου θεοῦ Ἰσραήλ
  english_pob_choice: from the Lord, the God of Israel
  chosen_spanish: del Señor, el Dios de Israel
  alternatives_spanish:
  - del Señor Dios de Israel
  - alejada del Señor, el Dios de Israel
  lexicon: LSJ
  rationale: La aposición se hace explícita en español con comas. Se mantiene «Señor» como equivalente de κύριος en el texto base de esta obra para este pasaje, y «Dios de Israel» traduce con claridad la identificación.
- source_word: εἰ μὴ
  english_pob_choice: had not
  chosen_spanish: si no me hubiera socorrido
  alternatives_spanish:
  - de no haberme socorrido
  - si no me hubiera ayudado
  lexicon: LSJ
  rationale: Aquí la expresión introduce una condición irreal de rescate. En español, la forma condicional «si no me hubiera socorrido» reproduce bien la fuerza contrafactual y resulta idiomática.
- source_word: ἀντελάβετό μου
  english_pob_choice: helped me
  chosen_spanish: me hubiera socorrido
  alternatives_spanish:
  - me hubiera ayudado
  - hubiera salido en mi auxilio
  - me hubiera sostenido
  lexicon: LSJ
  rationale: El verbo puede implicar tomar a favor de alguien, auxiliar o sostener. «Socorrer» refleja mejor la idea de intervención salvadora que una ayuda genérica, y conserva el tono de rescate divino.
- source_word: τῷ ἐλέει αὐτοῦ
  english_pob_choice: by his mercy
  chosen_spanish: con su misericordia
  alternatives_spanish:
  - por su misericordia
  - mediante su misericordia
  lexicon: LSJ
  rationale: El dativo instrumental admite varias soluciones. «Con su misericordia» mantiene el valor instrumental de manera clara en español y evita una formulación demasiado abstracta.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: LSJ
  rationale: «Para siempre» es la equivalencia idiomática más natural. Además, deja abierta la tensión documentada entre si la frase modifica solo «misericordia» o todo el acto de salvación.
theological_decisions:
- issue: Traducción de κύριος en un texto con referencia a Yahvé
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Soberano
  rationale: Aunque el proyecto español general usa «Yahvé» para יהוה, este pasaje de Salmos de Salomón aparece en griego con κύριος sin un marcador textual directo adicional. Siguiendo el auditable inglés POB de este versículo, se conserva «Señor» para no forzar una identificación más específica de la que el griego explícitamente ofrece en esta unidad.
  doctrine_reference: DOCTRINE.md contested terms
- issue: Alcance de εἰς τὸν αἰῶνα
  english_pob_reading: forever may qualify either mercy or the whole saving action
  chosen_spanish_reading: para siempre
  alternative_spanish_readings:
  - su misericordia para siempre
  - para siempre el Señor me socorriera con su misericordia
  rationale: La posición final de la frase en griego permite ambigüedad. Se deja «para siempre» al final, sin amarrarlo demasiado a solo «misericordia» ni al acto completo, preservando la tensión interpretativa del original.
  doctrine_reference: DOCTRINE.md principle 3
translation_notes:
  revision_awareness: Se tuvo en cuenta que la revisión más reciente corrige la puntuación final del inglés para cerrar el versículo con punto. En español se reflejó un cierre pleno con punto final y se mantuvo la estructura condicional/exclamativa sin arrastrarla al siguiente versículo.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος en coherencia con el texto inglés auditado de este versículo.
  - Se prefirió «alma» para ψυχή por su peso espiritual en contexto orante.
  - Se eligió «socorrido» como equivalente más preciso de ἀντελάβετό μου, aunque «ayudado» sigue siendo una alternativa posible.
  - Se conservó la ambigüedad de «para siempre» sin resolverla en la puntuación o en una paráfrasis explicativa del texto principal.
