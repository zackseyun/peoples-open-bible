  text: הַצִּ֧יבִי לָ֣/ךְ צִיֻּנִ֗ים שִׂ֤מִי לָ/ךְ֙ תַּמְרוּרִ֔ים שִׁ֣תִי לִבֵּ֔/ךְ לַֽ/מְסִלָּ֖ה דֶּ֣רֶךְ הלכתי שׁ֚וּבִי בְּתוּלַ֣ת יִשְׂרָאֵ֔ל שֻׁ֖בִי אֶל עָרַ֥יִ/ךְ אֵֽלֶּה־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/031/021.yaml
  text: Set up road markers for yourself[a]; place guideposts for yourself. Set your heart toward the highway, the way you went. Return, virgin Israel[c][b]; return to these your cities.
  footnotes:
  - marker: a
    text: Or 'signposts' for 'road markers.'
    reason: lexical_alternative
  - marker: b
    text: Or 'guide markers' for 'guideposts'; the Hebrew term is rare, but in context it likely refers to markers along the route.
    reason: lexical_alternative
  - marker: c
    text: '''Return'' can carry both the sense of coming back from exile and of turning back in covenant loyalty.'
    reason: alternative_reading
