translation:
  language: es
  text: Ve, reúne a todos los judíos que se encuentran en Susa[a], y ayunen por mí[b]. No coman ni beban por tres días, noche y día. Yo también, junto con mis jóvenes mujeres[c], ayunaré de la misma manera. Entonces iré al rey, aunque no es conforme a la ley[d]; y si perezco, perezco[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a todos los judíos que están en Susa». El participio hebreo significa literalmente «que se encuentran» o «que están presentes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ayunen en mi favor».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «mis doncellas» o «mis sirvientas».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «contrario a la ley».'
    reason: lexical_alternative
  - marker: e
    text: 'O: «y cuando perezca, perezco». El hebreo es breve y enfático, y expresa la aceptación resuelta de Ester ante el riesgo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Ve y
  lexicon: HALOT
  rationale: Imperativo directo de הלך. «Ve» es natural, conciso y mantiene el tono de instrucción inmediata a Mardoqueo.
- source_word: כְּנוֹס
  english_pob_choice: gather
  chosen_spanish: reúne
  alternatives_spanish:
  - junta
  - convoca
  - reúne junto a
  lexicon: HALOT
  rationale: El imperativo pide congregar a los judíos; «reúne» expresa bien la acción sin cargarla de un matiz institucional que el hebreo no exige.
- source_word: כָּל הַיְּהוּדִים הַנִּמְצְאִים בְּשׁוּשָׁן
  english_pob_choice: all the Jews who are found in Susa
  chosen_spanish: a todos los judíos que se encuentran en Susa
  alternatives_spanish:
  - a todos los judíos que están en Susa
  - a todos los judíos presentes en Susa
  lexicon: HALOT
  rationale: El participio הנמצאים conserva el valor de «estar hallados / presentes». «Que se encuentran» mantiene esa matización participial sin volverla forzada en español.
- source_word: שׁוּשָׁן
  english_pob_choice: Susa
  chosen_spanish: Susa
  alternatives_spanish:
  - Sushán
  lexicon: HALOT
  rationale: «Susa» es la forma más reconocible y estándar en español actual; evita una transliteración menos usual.
- source_word: וְצוּמוּ עָלַי
  english_pob_choice: fast for me
  chosen_spanish: ayunen por mí
  alternatives_spanish:
  - ayunen en favor mío
  - ayunen a causa de mí
  lexicon: HALOT
  rationale: עַל con 1cs indica relación/beneficio en la situación de Esther. «Por mí» comunica bien la finalidad o intercesión del ayuno en español.
- source_word: וְאַל תֹּאכְלוּ וְאַל תִּשְׁתּוּ
  english_pob_choice: Do not eat or drink
  chosen_spanish: No coman ni beban
  alternatives_spanish:
  - No coman y no beban
  - No vayan a comer ni beber
  lexicon: HALOT
  rationale: La prohibición doble define el ayuno. «Ni» reproduce con naturalidad la coordinación negativa en español.
- source_word: שְׁלֹשֶׁת יָמִים לַיְלָה וָיוֹם
  english_pob_choice: for three days, night and day
  chosen_spanish: por tres días, noche y día
  alternatives_spanish:
  - durante tres días, noche y día
  - por tres días, de noche y de día
  lexicon: HALOT
  rationale: La frase marca duración continua; «noche y día» conserva el orden enfático del hebreo y sugiere ayuno ininterrumpido.
- source_word: גַּם אֲנִי וְנַעֲרֹתַי
  english_pob_choice: I and my young women also
  chosen_spanish: Yo también, junto con mis doncellas
  alternatives_spanish:
  - Yo también, junto con mis jóvenes mujeres
  - Yo también, junto con mis sirvientas
  lexicon: HALOT
  rationale: נַעֲרוֹת puede referirse a doncellas, sirvientas o jóvenes mujeres. «Doncellas» preserva el registro cortesano y no impone una lectura demasiado moderna.
- source_word: אָצוּם כֵּן
  english_pob_choice: will fast in the same way
  chosen_spanish: ayunaré de la misma manera
  alternatives_spanish:
  - ayunaré igualmente
  - ayunaré así
  lexicon: HALOT
  rationale: כֵּן remite al modo ya descrito. «De la misma manera» explicita el referente y suena natural en español.
- source_word: וּבְכֵן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y así
  - Después
  lexicon: HALOT
  rationale: Introduce la consecuencia narrativa; «Entonces» es la opción más clara y idiomática en español.
- source_word: אָבוֹא אֶל הַמֶּלֶךְ
  english_pob_choice: I will go to the king
  chosen_spanish: iré al rey
  alternatives_spanish:
  - me presentaré al rey
  - entraré al rey
  lexicon: HALOT
  rationale: בוא con אֶל expresa aproximación al rey. «Iré al rey» reproduce la sencillez del inglés auditado y mantiene la fuerza del riesgo implícito.
- source_word: אֲשֶׁר לֹא כַדָּת
  english_pob_choice: though it is not according to the law
  chosen_spanish: aunque no es conforme a la ley
  alternatives_spanish:
  - aunque no es según la ley
  - pues no es conforme a la ley
  - contrariamente a la ley
  lexicon: HALOT
  rationale: כַדָּת alude a lo que está conforme a la ley o norma. «Conforme a la ley» conserva el valor normativo sin sonar arcaico.
- source_word: וְכַאֲשֶׁר אָבַדְתִּי אָבָדְתִּי
  english_pob_choice: and if I perish, I perish
  chosen_spanish: y si perezco, perezco
  alternatives_spanish:
  - y cuando perezca, perezco
  - y si he de perecer, que perezca
  lexicon: HALOT
  rationale: El hebreo es breve y enfático, aceptando el riesgo de manera resuelta. «Si perezco, perezco» conserva la tersura y la fuerza proverbial de la expresión.
translation_notes:
  revision_awareness: Comparado con el texto auditado en inglés, se mantuvo la misma estructura de sentido y el mismo nivel de literalidad funcional. Se ajustó el español para sonar natural sin perder el participio hebreo, la relación de עַל con el ayuno ni la concisión enfática del cierre.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «judíos» para הַיְּהוּדִים, en coherencia con el contexto histórico y narrativo.
  - Se eligió «doncellas» para נַעֲרוֹת, manteniendo el matiz cortesano y la alternativa abierta en nota.
  - Se mantiene la duplicación final «si perezco, perezco» para no suavizar la tensión retórica del hebreo.
