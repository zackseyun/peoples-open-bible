  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. «alma» respeta la revisión inglesa documentada para נֶפֶשׁ. «violencia» corresponde bien a חָמָס. «traicioneros» es compatible con «the treacherous», aunque menos idiomático que «pérfidos» en algunos contextos; no requiere cambio obligatorio.
