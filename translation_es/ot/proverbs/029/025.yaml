revisions:
- from: El temor del hombre[a] pone una trampa; pero el que confía en Yahvé[b] será puesto en alto.
  to: El temor del hombre[a] tiende un lazo; pero el que confía en Yahvé será puesto en alto[b].
  rationale: Se ajusta la primera cláusula a una formulación más natural y sapiencial en español ('tiende un lazo'), más cercana a la imaginería de מוֹקֵשׁ. Se conserva 'Yahvé' según la norma del proyecto y 'será puesto en alto' por fidelidad a יְשֻׂגָּב. También se corrige el anclaje de la nota [b] para que corresponda al término que realmente comenta.
