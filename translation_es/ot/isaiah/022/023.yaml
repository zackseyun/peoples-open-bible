review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo y mantiene la metáfora central del ''peg'' y el ''throne of honor''. Sin embargo, presenta dos desajustes importantes frente al español natural y al rastro auditado: (1) ''clavaré a él'' es gramaticalmente impropio; el objeto debe incorporarse como ''lo clavaré'' o, mejor, ''lo fijaré/hincaré''; (2) el anclaje de las notas está invertido: la nota sobre ''lugar seguro/firme'' debe ir en esa frase, y la nota sobre ''trono de honor'' debe ir en ''trono de honor'', no ambas sobre ''lugar seguro''.'
  spanish_quality_summary: El texto es generalmente claro, pero 'clavaré a él' suena antinatural en español y rompe la fluidez. También 'estaca' puede funcionar, pero 'clavo' reduciría demasiado la imagen y 'poste' la agrandaría; 'estaca' es aceptable aunque algo rústica. La reparación mínima más fiel y legible es 'lo fijaré como una estaca en un lugar seguro[a], y llegará a ser un trono de honor[b] para la casa de su padre.' Esto corrige la sintaxis, mejora el matiz resultativo de וְהָיָה y coloca correctamente las notas.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. Se preservan las metáforas documentadas. La decisión 'trono de honor' coincide con el POB. 'Casa de su padre' también mantiene la estructura semítica adecuada.
  issues:
  - severity: high
    issue: 'Sintaxis antinatural: ''clavaré a él'''
    rationale: En español estándar no se dice 'clavaré a él' en este contexto; debe ser 'lo clavaré', 'lo fijaré' o equivalente. Tal como está, afecta seriamente la naturalidad y la dignidad del texto.
  - severity: medium
    issue: Notas al pie mal ancladas
    rationale: La nota sobre 'trono de honor' está marcada en 'lugar seguro', lo cual confunde al lector y no cumple la disciplina de anclaje exacto de notas.
  - severity: medium
    issue: Matiz resultativo de וְהָיָה subexpresado
    rationale: '''Será'' no es incorrecto, pero ''llegará a ser'' refleja mejor el resultado de la acción previa sin apartarse del hebreo ni del audit trail inglés (''will become'').'
  revised_spanish_text: Y lo fijaré como una estaca en un lugar seguro[a], y llegará a ser un trono de honor[b] para la casa de su padre.
  revised_footnotes:
  - marker: a
    text: O «lo fijaré como una estaca en un lugar firme».
    reason: lexical_alternative
  - marker: b
    text: «Trono de honor» también puede rendirse «trono glorioso» o «asiento de honor».
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación mínima pero necesaria: se corrigió la sintaxis impropia (''clavaré a él''), se preservó la imagen concreta del hebreo con una formulación española natural (''lo fijaré como una estaca''), se explicitó mejor el sentido resultativo de וְהָיָה con ''llegará a ser'', y se reubicaron las notas para que cada marcador aparezca en la frase correspondiente. No se requiere adjudicación adicional porque el sentido fuente y las decisiones léxicas están suficientemente claros.'
