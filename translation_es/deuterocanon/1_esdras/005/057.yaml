base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/005/057.yaml
  text: And the priests stood arrayed with musicians and trumpets[a], and the Levites, the sons of Asaph, holding the cymbals, praising the Lord and blessing him according to David king of Israel[b];
  footnotes:
  - marker: a
    text: Or 'with musical instruments and trumpets.' The Greek μουσικῶν can be understood more generally as musical accompaniment or instruments.
    reason: lexical_alternative
  - marker: b
    text: Or 'as prescribed by David king of Israel' or 'in the manner of David king of Israel.' The Greek leaves the exact force of conformity open.
    reason: alternative_reading
