base_translation:
  language: en
  yaml_path: translation/ot/proverbs/017/021.yaml
  text: He who fathers a fool does so to his own grief[b][a], and the father of a fool has no joy.
  footnotes:
  - marker: a
    text: Or 'One who begets a fool begets him for sorrow.' The Hebrew wording is compact and may be rendered more formally.
    reason: lexical_alternative
  - marker: b
    text: '''Vile man'' translates Hebrew nabal, a term for a morally shameful or disgraceful person, not merely one lacking intelligence.'
    reason: cultural_note
