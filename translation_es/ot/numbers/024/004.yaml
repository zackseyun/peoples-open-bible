- from: 'el oráculo de quien oye las palabras de Dios[a], de quien ve la visión del Todopoderoso, cayendo[b], y con los ojos descubiertos:'
  to: 'la declaración de quien oye las palabras de Dios[a], de quien ve la visión del Todopoderoso, cayendo[b], aunque con los ojos descubiertos:'
