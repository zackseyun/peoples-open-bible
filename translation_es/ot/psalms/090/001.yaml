review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español acierta en la mayor parte del versículo: conserva bien el superscrito «Oración de Moisés[a], el hombre de Dios», mantiene la ambigüedad de לְמֹשֶׁה con nota, traduce correctamente אֲדֹנָי como «Señor», y refleja bien הָיִיתָ לָנוּ y בְּדֹר וָדֹר. Sin embargo, falla en la decisión principal sobre מָעוֹן: el hebreo y la POB inglesa escogieron el sentido base espacial «dwelling place», mientras que el borrador puso «refugio» en el texto principal, desplazando una alternativa secundaria al centro semántico.'
  spanish_quality_summary: 'El español es claro y eclesialmente legible, pero la elección «un refugio» debilita la imagen poética de Dios como morada/habitación y además introduce un artículo indefinido no exigido. También hay redundancia impropia en las notas: la nota [b] está anclada a «Señor» pero habla de מָעוֹן, y la nota [c] duplica la misma cuestión léxica. Conviene simplificar a una sola nota léxica en «morada».'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Señor» para אֲדֹנָי es correcto, y no corresponde «Yahvé» aquí. «Dios» en «el hombre de Dios» está bien. La desviación importante es léxica: מָעוֹן debería ir como «morada» o expresión equivalente de habitación, no «refugio» como texto principal, porque la POB inglesa documentó «refuge» solo como alternativa.'
  issues:
  - severity: high
    issue: μָעוֹן fue traducido como «refugio» en el texto principal
    rationale: La evidencia fuente y la decisión auditada en inglés privilegian «dwelling place». «Refugio» es una alternativa posible, pero más interpretativa y más estrecha; por eso debe quedar en nota, no en el cuerpo principal.
  - severity: high
    issue: La nota [b] está mal anclada a «Señor» pero comenta מָעוֹן
    rationale: Las notas deben anclarse exactamente en la palabra o frase relevante. Aquí [b] no explica «Señor», sino «morada/refugio», lo que crea confusión editorial.
  - severity: medium
    issue: Duplicación de notas léxicas [b] y [c] sobre el mismo término
    rationale: El registro contiene dos notas distintas para una sola cuestión léxica. Eso infringe la economía y claridad del aparato; basta una sola nota bien anclada.
  - severity: low
    issue: «un refugio» suena menos fiel que «una morada» en el paralelismo poético
    rationale: Además del cambio semántico, el artículo indefinido con «refugio» hace el español un poco más interpretativo. «Morada» reproduce mejor la imagen nominal directa del hebreo.
  revised_spanish_text: Oración de Moisés[a], el hombre de Dios. Señor, tú has sido para nosotros una morada[b] de generación en generación.
