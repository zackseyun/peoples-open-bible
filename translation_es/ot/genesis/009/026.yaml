translation:
  language: es
  text: 'Y dijo: «Bendito sea Yahvé, el Dios de Sem, y que Canaán sea esclavo de ellos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su esclavo». El hebreo tiene un pronombre plural («a ellos/para ellos»), probablemente referido a Sem y a su linaje, o más ampliamente a los hermanos en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol se expresa de manera natural en español con una simple coordinación verbal. «Y dijo» conserva el flujo narrativo sin añadir una secuencia temporal más fuerte de la que exige el hebreo.
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito es
  lexicon: HALOT
  rationale: Es una fórmula de bendición con matiz desiderativo/declarante. «Bendito sea» mantiene mejor ese valor exhortativo o proclamativo que un simple enunciado copulativo.
- source_word: יְהֹוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El proyecto pide rendir el nombre divino como «Yahvé» en el texto principal. Se preserva así el Tetragrámaton sin sustituirlo por una convención de ocultamiento.
- source_word: אֱלֹהֵי שֵׁם
  english_pob_choice: the God of Shem
  chosen_spanish: el Dios de Sem
  alternatives_spanish:
  - Dios de Sem
  lexicon: HALOT
  rationale: La cadena constructa se traduce de forma directa y reverente. «El Dios de Sem» conserva la relación posesiva/covenantal sin parafrasear.
- source_word: וִיהִי
  english_pob_choice: and let ... be
  chosen_spanish: y que ... sea
  alternatives_spanish:
  - y sea
  - y que ... quede
  lexicon: HALOT
  rationale: El jussivo expresa deseo/maldición. En español, «y que ... sea» reproduce mejor esa fuerza volitiva que un futuro simple.
- source_word: כְנַעַן
  english_pob_choice: Canaan
  chosen_spanish: Canaán
  alternatives_spanish:
  - Canaan
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera estándar en español bíblico.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  lexicon: HALOT
  rationale: En este contexto de maldición y subordinación, «esclavo» transmite mejor la fuerza del término que «siervo», que sería demasiado suave y perdería la tensión léxica documentada por el POB inglés.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Nombre divino directamente. Siguiendo el estándar terminológico del proyecto, el español principal debe reflejar ese nombre como «Yahvé», no ocultarlo bajo una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Force of the jussive in וִיהִי
  english_pob_reading: and let Canaan be his slave
  chosen_spanish_reading: y que Canaán sea su esclavo
  alternative_spanish_readings:
  - y sea su esclavo
  - y quede esclavo de él
  rationale: La forma verbal expresa una voluntad/maldición, no solo un futuro descriptivo. «Y que ... sea» conserva esa fuerza sin convertirla en una mera predicción.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
- issue: Referent and gender of לָמוֹ in context
  english_pob_reading: his slave
  chosen_spanish_reading: su esclavo
  alternative_spanish_readings:
  - su esclavo de ellos
  - su esclavo de ambos
  rationale: Aunque el morfema hebreo es plural, el contexto permite una referencia singular colectiva o focalizada en Sem. En español, «su» evita forzar una pluralidad extraña en la frase y sigue la revisión más reciente del expediente inglés, que resolvió la ambigüedad hacia un referente singular contextual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, #5'
translation_notes:
  revision_awareness: 'El expediente inglés revisó la cláusula final de “their slave” a “his slave” para reflejar un referente singular contextual, aunque el hebreo conserva una forma plural. Esta versión española sigue esa revisión reciente, pero sin perder de vista la tensión textual: por eso el texto principal usa «su esclavo» y la nota indica la alternativa literal plural del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se prefirió «esclavo» por la fuerza semántica del contexto de maldición, alineado con la decisión léxica inglesa.
  - La fórmula «Bendito sea» conserva el tono benedictorio del hebreo.
  - «Canaán» y «Sem» siguen la transliteración bíblica habitual en español.
  - La nota al pie conserva la ambigüedad del pronombre hebreo sin imponer una solución única al lector.
