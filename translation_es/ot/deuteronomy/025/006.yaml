review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del hebreo y mantiene correctamente «primogénito», «dé a luz», «su hermano muerto» y «no sea borrado su nombre de Israel». Sin embargo, «se levantará sobre el nombre de» reproduce demasiado literalmente יָקוּם עַל שֵׁם y en español resulta poco natural y potencialmente confuso. Dado que la propia nota explica el sentido legal de continuación de linaje/nombre, conviene ajustar el texto principal para expresar esa fuerza representativa sin sugerir una imagen espacial extraña.
  spanish_quality_summary: El español es mayormente claro y digno, pero «se levantará sobre el nombre de» suena forzado y opaco en registro bíblico natural. «Ocupará el lugar de su hermano muerto bajo su nombre» sería demasiado expansivo; una solución mejor y más contenida es «se levantará en nombre de su hermano muerto», acompañada por la nota que preserva la literalidad hebrea «sobre el nombre». También es más fluido «que ella dé a luz» en subjuntivo tras relativo de futuro, tal como ya está.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Primogénito», «nombre», «borrado» e «Israel» concuerdan con las decisiones auditadas. La revisión propuesta mantiene la cautela teológica de no reducir la frase a recibir el mismo nombre personal.
  issues:
  - severity: medium
    issue: La frase «se levantará sobre el nombre de su hermano muerto» es poco idiomática en español.
    rationale: Aunque calca mejor el hebreo, en español moderno eclesial puede leerse de forma espacial o ininteligible. El sentido documentado es representativo/legal, no físico.
  - severity: low
    issue: La nota al pie actual duplica exactamente la redacción del texto principal.
    rationale: Si el texto principal conserva la forma más literal, la nota no añade alternativa útil. Es preferible que la nota preserve la literalidad hebrea cuando el texto principal use una formulación española más clara.
  revised_spanish_text: Y acontecerá que el primogénito que ella dé a luz se levantará en nombre de su hermano muerto[a], para que no sea borrado su nombre de Israel.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «se levantará sobre el nombre de su hermano muerto»; es decir, continuará su linaje y su lugar dentro de Israel.
    reason: lexical_alternative
  revision_rationale: Se ajusta únicamente la expresión de יָקוּם עַל שֵׁם para lograr español natural y claro sin perder la cercanía formal al hebreo. La nota conserva la alternativa más literal y explica su sentido legal-social, en línea con la auditoría inglesa.
