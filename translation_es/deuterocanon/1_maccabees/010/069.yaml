- from: Y Demetrio nombró[a] a Apolonio, que estaba sobre Celesiria, y reunió una gran fuerza, y acampó en Jamnia.
  to: Y Demetrio nombró a Apolonio, que estaba a cargo de Celesiria, y reunió una gran fuerza[a], y acampó en Jamnia.
  rationale: Se corrige el anclaje de la nota para que corresponda a δύναμιν μεγάλην y se mejora «que estaba sobre Celesiria» a una formulación española más natural que conserva el sentido administrativo del griego.
