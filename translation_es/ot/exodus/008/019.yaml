translation:
  language: es
  text: Y haré distinción[a] entre mi pueblo y tu pueblo. Mañana será esta la señal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘redención’ o ‘liberación’; el término hebreo puede llevar la idea del acto redentor de Dios, aquí expresado como la distinción que él hace entre Israel y Egipto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: I will put
  chosen_spanish: pondré
  alternatives_spanish:
  - colocaré
  - echaré
  lexicon: HALOT
  rationale: El verbo שׂים puede traducirse literalmente como ‘poner/colocar’. En español, ‘pondré’ conserva ese valor directo y suena natural con un objeto abstracto como ‘una distinción’.
- source_word: פְדֻת
  english_pob_choice: a distinction
  chosen_spanish: una distinción
  alternatives_spanish:
  - una redención
  - una liberación
  - una separación
  lexicon: HALOT
  rationale: En el contexto inmediato (‘entre mi pueblo y tu pueblo’), el término expresa el efecto visible de separar o diferenciar a Israel de Egipto. ‘Distinción’ conserva ese sentido contextual sin borrar la resonancia de redención que la nota inglesa preserva.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: between ... and ...
  chosen_spanish: entre ... y ...
  alternatives_spanish:
  - entre ... e ...
  lexicon: HALOT
  rationale: La construcción correlativa se expresa de forma natural y precisa en español con ‘entre ... y ...’, manteniendo la relación de separación entre los dos pueblos.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  lexicon: HALOT
  rationale: La posesión divina se conserva con ‘mi pueblo’, la forma más directa y bíblicamente reconocible para ישראל en este contexto.
- source_word: עַמֶּךָ
  english_pob_choice: your people
  chosen_spanish: tu pueblo
  alternatives_spanish:
  - tu gente
  lexicon: HALOT
  rationale: La referencia es al pueblo de Faraón, por lo que ‘tu pueblo’ mantiene el paralelismo y la relación posesiva del hebreo.
- source_word: לְמָחָר
  english_pob_choice: Tomorrow
  chosen_spanish: Mañana
  alternatives_spanish:
  - Para mañana
  - Al día siguiente
  lexicon: HALOT
  rationale: El adverbio temporal se conserva al inicio de la oración para reflejar el énfasis del hebreo y mantener fluidez en español.
- source_word: יִהְיֶה
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - ocurrirá
  - se cumplirá
  lexicon: HALOT
  rationale: Con ‘esta señal’ como sujeto, ‘será’ reproduce de forma sobria el futuro simple del hebreo sin sobreexplicar el resultado.
- source_word: הָאֹת הַזֶּה
  english_pob_choice: this sign
  chosen_spanish: esta señal
  alternatives_spanish:
  - esta marca
  - este signo
  lexicon: HALOT
  rationale: ‘Señal’ es la opción más clara y natural en español para אוֹת en este contexto de plagas, donde se trata de un indicador divino.
theological_decisions:
- issue: Cómo reflejar פְדֻת sin perder su resonancia de redención
  english_pob_reading: Render in the main text as 'a distinction' and retain 'redemption/deliverance' as an alternative in a footnote.
  chosen_spanish_reading: Traducir en el texto principal como ‘una distinción’ y conservar la resonancia de ‘redención/liberación’ en una nota.
  alternative_spanish_readings:
  - redención
  - liberación
  - separación
  rationale: El marco sintáctico del versículo apunta al resultado concreto de separar a Israel de Egipto. Sin embargo, el sustantivo tiene carga de rescate/redención, y la nota permite preservar esa tensión sin oscurecer el sentido inmediato.
  doctrine_reference: 'Translation philosophy #3, #5'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se prefirió una formulación más cercana al verbo hebreo (‘pondré’) y una expresión sobria del futuro (‘será’), manteniendo el registro formal y la claridad contextual.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para el Tetragrámaton en todo el proyecto, pero en este versículo no aparece explícitamente en el texto fuente recibido.
  - ‘Pueblo’ conserva el paralelismo posesivo con mi/tu y evita una lectura genérica de ‘gente’.
  - ‘Señal’ se usa de manera consistente para אוֹת en contextos de confirmación divina.
