translation:
  language: es
  text: 'Entonces los hijos de Israel clamaron a Yahvé[a], diciendo: «Hemos pecado contra ti, pues hemos abandonado a nuestro Dios y hemos servido a los Baales».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְעֲקוּ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron un clamor
  lexicon: HALOT
  rationale: זעק expresa un clamor urgente de angustia o súplica. En español, «clamaron» conserva mejor ese matiz de petición intensa y contexto de ruego que un simple «llamaron» o un «gritaron» demasiado físico.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los hijos de Israel». Se mantiene la formulación transparente y gender-accurate, sin neutralizar a «israelitas».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino «Yahvé» según la convención del proyecto en español, preservando el nombre propio del pacto y evitando la sustitución por un título.
- source_word: חָטָאנוּ לָךְ
  english_pob_choice: We have sinned against you
  chosen_spanish: Hemos pecado contra ti
  alternatives_spanish:
  - Hemos pecado contra usted
  - Hemos pecado a ti
  lexicon: HALOT
  rationale: La construcción hebrea expresa ofensa dirigida a la persona ofendida; en español idiomático, «pecar contra ti» comunica mejor el sentido que un calco como «pecamos a ti».
- source_word: וְכִי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: Aquí כי introduce la razón explicativa de la confesión. «Porque» es la conexión más natural y fiel en español formal, manteniendo la relación causal del texto.
- source_word: עָזַבְנוּ
  english_pob_choice: have forsaken
  chosen_spanish: hemos abandonado
  alternatives_spanish:
  - hemos forsaken
  - hemos dejado
  lexicon: HALOT
  rationale: El verbo עזב tiene un peso relacional y de deserción. «Abandonado» comunica esa ruptura con claridad en español sin perder la fuerza del reproche confesional.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestros dioses
  - nuestro Dios
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente amplia, aquí apunta al Dios singular de Israel. «Nuestro Dios» evita ambigüedad y sigue el contraste inmediato con los baales.
- source_word: וַנַּעֲבֹד
  english_pob_choice: have served
  chosen_spanish: hemos servido
  alternatives_spanish:
  - servimos
  - hemos adorado
  - hemos rendido servicio a
  lexicon: HALOT
  rationale: עבד incluye servicio cultual y lealtad. «Hemos servido» conserva esa amplitud mejor que «hemos adorado», que restringiría el sentido a devoción interna.
- source_word: הַבְּעָלִים
  english_pob_choice: the Baals
  chosen_spanish: los baales
  alternatives_spanish:
  - los Baales
  - los ídolos de Baal
  - los baalim
  lexicon: HALOT
  rationale: El plural designa las diversas manifestaciones locales de Baal. «Los baales» es la forma más transparente y natural en español.
theological_decisions:
- issue: Nombre divino יהוה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el nombre del pacto. La decisión de traducirlo como «Yahvé» mantiene la referencia personal y evita la sustitución por un título, en línea con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Desplazamiento de culpa y confesión dirigida a Dios
  english_pob_reading: We have sinned against you, for we have forsaken our God and have served the Baals.
  chosen_spanish_reading: Hemos pecado contra ti, porque hemos abandonado a nuestro Dios y hemos servido a los baales.
  alternative_spanish_readings:
  - Hemos pecado contra ti, pues hemos abandonado a nuestro Dios y hemos servido a los baales.
  - Hemos pecado contra ti, ya que hemos abandonado a nuestro Dios y hemos servido a los baales.
  rationale: 'La confesión conserva la secuencia: pecado contra Dios, explicación causal y contraste con la idolatría de los baales. «Porque» mantiene la relación causal sin suavizar la admisión de culpa.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión inglesa reemplazó “because” por “for” para ajustar el registro formal sin cambiar la relación causal. La versión española conserva esa relación con «porque», que es la equivalencia más natural y formal en español para introducir la confesión explicativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto en español.
  - Se conserva la estructura confesional con pretérito perfecto compuesto para armonizar las acciones coordinadas («hemos pecado», «hemos abandonado», «hemos servido»).
  - «Baales» se escribe en minúscula por ser un sustantivo común pluralizado en español, aunque remite a nombres de deidades locales.
