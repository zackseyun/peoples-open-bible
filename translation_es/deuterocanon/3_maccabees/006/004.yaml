  to: Padre, tú que destruíste a Faraón, el antiguo gobernante de este país de Egipto, cuando fue levantado con audacia sin ley y con lengua fanfarrona, aumentando en hechos presuntuosos[a], junto con su orgulloso ejército, al hundirlos en el mar[b], y que hiciste resplandecer la luz de misericordia sobre el pueblo de Israel[c],
