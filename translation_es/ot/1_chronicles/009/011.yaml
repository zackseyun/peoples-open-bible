translation:
  language: es
  text: y Azarías, hijo de Hilcías, hijo de Mesulam, hijo de Sadoc, hijo de Merayot, hijo de Ahitub, jefe[a] de la casa de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «líder», «jefe principal» o «gobernante» de la casa de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲזַרְיָה
  english_pob_choice: and Azariah
  chosen_spanish: y Azarías
  alternatives_spanish:
  - Azarías
  lexicon: HALOT
  rationale: Se conserva la conjunción inicial como continuación de la lista genealógica y se translitera el nombre propio con una forma española natural y reconocible.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La forma genealógica inmediata se expresa de manera natural en español con 'hijo de'. 'Descendiente de' sería posible, pero debilita la repetición genealógica del hebreo.
- source_word: חִלְקִיָּה
  english_pob_choice: Hilkiah
  chosen_spanish: Hilcías
  alternatives_spanish:
  - Hilkías
  lexicon: HALOT
  rationale: Se adopta una transliteración castellanizada usual para facilitar la lectura en español, sin perder la identificación del nombre.
- source_word: מְשֻׁלָּם
  english_pob_choice: Meshullam
  chosen_spanish: Meseullam
  alternatives_spanish:
  - Mesulam
  lexicon: HALOT
  rationale: Se vierte el nombre propio con adaptación fonética al español, manteniendo la referencia al mismo antropónimo hebreo.
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Sadoc
  alternatives_spanish:
  - Zadoc
  lexicon: HALOT
  rationale: Se usa la forma castellanizada tradicional del nombre propio para una lectura más natural en español.
- source_word: מְרָיוֹת
  english_pob_choice: Meraioth
  chosen_spanish: Merayot
  alternatives_spanish:
  - Meraiot
  lexicon: HALOT
  rationale: Se conserva el nombre propio con adaptación gráfica española, evitando una transliteración excesivamente anglicizada.
- source_word: אֲחִיטוּב
  english_pob_choice: Ahitub
  chosen_spanish: Ahitub
  alternatives_spanish:
  - Ahitub
  lexicon: HALOT
  rationale: El nombre propio se mantiene en una forma ampliamente inteligible en español y cercana a la tradición bíblica.
- source_word: נְגִיד
  english_pob_choice: chief officer
  chosen_spanish: jefe[a]
  alternatives_spanish:
  - líder
  - jefe principal
  - gobernante
  lexicon: HALOT
  rationale: En este contexto administrativo-templario, נְגִיד expresa una función de autoridad. 'Jefe' comunica bien la idea en español y permite preservar en nota la gama de sentidos documentada por el audit trail inglés.
- source_word: בֵּית הָאֱלֹהִים
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  - la casa divina
  lexicon: HALOT
  rationale: Se mantiene la imagen hebrea de 'casa' para conservar la transparencia del constructo y la resonancia cultual del original.
theological_decisions:
- issue: Sentido de אֱלֹהִים en la expresión cultual
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - los dioses
  rationale: En el contexto del santuario de Israel, אֱלֹהִים se refiere inequívocamente al Dios de Israel. La traducción singular 'Dios' es la lectura correcta y evita una ambigüedad indebida.
  doctrine_reference: Monoteísmo bíblico; coherencia contextual del templo de Yahvé
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó el artículo innecesario antes de 'chief officer' para conservar una construcción appositiva más natural. El español sigue esa misma economía sintáctica con 'jefe de la casa de Dios', sin artículo intermedio que altere el valor descriptivo del hebreo.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים en el ámbito cultual, conforme al contexto.
  - Los nombres propios se castellanizan de forma moderada para una lectura eclesial natural.
  - Se preserva la secuencia genealógica repetida de 'hijo de' para reflejar la forma del hebreo.
  - '''Casa de Dios'' conserva la metáfora del original mejor que una sustitución explicativa por ''templo''.'
