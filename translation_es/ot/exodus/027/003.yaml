  to: Harás sus ollas[a] para quitar sus cenizas, y sus palas, y sus vasijas, y sus garfios, y sus cazos para brasas[b]; harás todos sus utensilios de bronce.
  rationale: Se recomienda una revisión menor para mejorar la precisión cultual y la fidelidad a las notas auditadas. Se conserva la estructura general del borrador, pero se corrige la nota [a] para reflejar la alternativa literal documentada, se sustituye 'braseros' por 'cazos para brasas' para evitar una lectura doméstica o inexacta de מַחְתֹּתָיו, y se ajusta 'tazones' a 'vasijas' para un registro más adecuado al contexto ritual.
