revisions:
- from: Se prostituyeron en Egipto[a]; en su juventud cometieron prostitución allí. Allí les fueron manoseados[c][b] sus pechos, y allí fueron tocados sus senos de doncellez.
  to: Se prostituyeron en Egipto[a]; en su juventud cometieron prostitución allí. Allí les manosearon[c][b] los pechos, y allí les tocaron sus senos virginales.
  rationale: Se ajusta la redacción para que el español sea natural y digno sin suavizar la fuerza sexual del hebreo. «Les manosearon los pechos» expresa mejor מֹעֲכוּ שְׁדֵיהֶן que la pasiva torpe del borrador. «Les tocaron sus senos virginales» mantiene el paralelismo, la explicitud y la referencia a virginidad de בְּתוּלֵיהֶן de forma más idiomática que «senos de doncellez». También se pulen las notas para que suenen naturales en español y sigan documentando las alternativas del POB inglés.
