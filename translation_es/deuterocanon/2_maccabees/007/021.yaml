translation:
  language: es
  text: 'Y alentaba[a] a cada uno de ellos en la lengua de sus padres, llena de un espíritu noble, y, avivando su razonamiento femenino con ánimo viril[b], les dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la lengua ancestral» o «en su lengua nativa». El griego alude literalmente a la lengua paterna o heredada.
    reason: lexical_alternative
  - marker: b
    text: 'El griego emplea un contraste deliberado de género: literalmente, «avivando el razonamiento femenino con un ánimo/coraje masculino».'
    reason: cultural_note
lexical_decisions:
- source_word: ἕκαστον
  english_pob_choice: each one
  chosen_spanish: a cada uno de ellos
  alternatives_spanish:
  - a cada uno
  - a todos
  lexicon: LSJ
  rationale: El distributivo griego se refiere a cada hijo individualmente; «a cada uno de ellos» mantiene esa distribución con naturalidad en español.
- source_word: παρεκάλει
  english_pob_choice: encouraged
  chosen_spanish: alentaba
  alternatives_spanish:
  - animaba
  - exhortaba
  - animaba y exhortaba
  lexicon: BDAG
  rationale: En este contexto de martirio, el verbo implica apoyo y fortalecimiento para perseverar; «alentaba» comunica bien ese impulso sin reducirlo a mera consolación.
- source_word: τῇ πατρίῳ φωνῇ
  english_pob_choice: in the language of their fathers
  chosen_spanish: en la lengua de sus padres
  alternatives_spanish:
  - en la lengua ancestral
  - en su lengua nativa
  - en la lengua de sus antepasados
  lexicon: LSJ
  rationale: πατρίῳ conserva el sentido paterno/ancestral; «lengua de sus padres» sigue de cerca la imagen del texto y preserva el matiz familiar e histórico.
- source_word: γενναίῳ ... φρονήματι
  english_pob_choice: filled with a noble spirit
  chosen_spanish: llena de un espíritu noble
  alternatives_spanish:
  - llena de noble resolución
  - llena de un ánimo noble
  - llena de un espíritu valiente
  lexicon: LSJ
  rationale: φρόνημα expresa disposición interior, mente o ánimo; «espíritu noble» es una equivalencia idiomática que conserva la elevación moral del adjetivo γενναίῳ.
- source_word: τὸν θῆλυν λογισμόν
  english_pob_choice: her womanly reasoning
  chosen_spanish: el razonamiento femenino
  alternatives_spanish:
  - su pensamiento femenino
  - la mente femenina
  - su manera de pensar de mujer
  lexicon: LSJ
  rationale: λογισμός es razonamiento/pensamiento, y θῆλυς marca ese razonamiento como femenino. «Razonamiento femenino» preserva el contraste deliberado sin volverlo más tosco de lo necesario.
- source_word: ἄρσενι θυμῷ
  english_pob_choice: with manly courage
  chosen_spanish: con ánimo viril
  alternatives_spanish:
  - con valentía viril
  - con coraje varonil
  - con espíritu masculino
  lexicon: LSJ
  rationale: θυμός aquí denota ímpetu, valor o coraje; «ánimo viril» reproduce el contraste de género del griego con dignidad y claridad en español.
- source_word: διεγείρασα
  english_pob_choice: stirring
  chosen_spanish: despertando
  alternatives_spanish:
  - excitando
  - espoleando
  - incitando
  lexicon: LSJ
  rationale: El participio aoristo describe la acción previa al discurso; «despertando» expresa bien la idea de activar o avivar ese razonamiento/coraje.
- source_word: λέγουσα πρὸς αὐτούς
  english_pob_choice: she said to them
  chosen_spanish: les decía
  alternatives_spanish:
  - les dijo
  - hablaba a ellos
  lexicon: BDAG
  rationale: El participio de discurso se vierte con naturalidad como imperfecto narrativo en español; «les decía» conserva el flujo de la escena antes de las palabras directas.
theological_decisions:
- issue: Contraste de género en la caracterización de la madre
  english_pob_reading: 'The Greek uses a deliberate gendered contrast: literally, ''having stirred the female reasoning with a male courage/spirit.'''
  chosen_spanish_reading: Mantener el contraste explícito entre «razonamiento femenino» y «ánimo viril» en el texto principal.
  alternative_spanish_readings:
  - neutralizarlo como «resolución valiente» y «firmeza interior»
  - suavizarlo como «pensamiento maternal» y «coraje fuerte»
  rationale: El griego usa θῆλυς y ἄρσην de forma intencional y retórica; la versión española debe conservar esa tensión sin disolverla en un lenguaje más genérico.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: El borrador sigue el paquete fuente griego de Swete 1909 y el audit trail en inglés, sin cambios revisados posteriores; la redacción española conserva la estructura participial y el contraste de género documentado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evita «Cristo» y otras terminologías no pertinentes al pasaje.
  - «Razón/razonamiento» se eligió para λογισμός por claridad en español; no se usa «mente» para no perder el matiz del proceso mental.
  - La puntuación introduce dos comas para reflejar los participios descriptivos del griego y la cadencia narrativa antes del discurso directo.
