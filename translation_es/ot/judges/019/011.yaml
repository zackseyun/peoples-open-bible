  glossary_alignment: No hay términos del glosario mayor en juego (Yahvé, Mesías, etc.). La principal cuestión léxica es אֲדֹנָיו, donde conviene seguir la racionalidad auditada de 'master' y no elevarlo a 'señor'. Las demás decisiones ('Jebús', 'jebuseos', 'pasemos la noche') están bien alineadas con el hebreo y con la filosofía POB.
