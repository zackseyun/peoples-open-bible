lexical_decisions:
- source_word: שָׂמַח
  english_pob_choice: was glad
  chosen_spanish: se alegró
  alternatives_spanish:
  - estuvo contento
  - se regocijó
  lexicon: HALOT
  rationale: El qal perfecto con sujeto colectivo expresa un estado/acción completa de alegría. En español, "se alegró" comunica con naturalidad ese estado sin cargarlo innecesariamente con un registro más solemne que el hebreo requiere.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - los egipcios
  lexicon: HALOT
  rationale: El hebreo usa un nombre colectivo con referencia nacional. Mantener "Egipto" sigue el uso idiomático del POB en inglés y conserva la forma singular del sujeto, aunque el referente sea colectivo.
- source_word: בְּצֵאתָם
  english_pob_choice: when they departed
  chosen_spanish: cuando ellos salieron
  alternatives_spanish:
  - al salir ellos
  - cuando salieron
  lexicon: HALOT
  rationale: La preposición con infinitivo y sufijo indica circunstancia temporal. "Cuando ellos salieron" es claro en español y conserva la referencia explícita al grupo que sale.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la alegría de Egipto. "Porque" reproduce de forma directa la relación causal en español contemporáneo.
- source_word: נָפַל
  english_pob_choice: had fallen
  chosen_spanish: había caído
  alternatives_spanish:
  - cayó
  - había recaído
  lexicon: HALOT
  rationale: El perfecto verbal expresa una condición previa ya establecida antes del momento narrado. El pluscuamperfecto español "había caído" conserva esa anterioridad.
- source_word: פַּחְדָּם
  english_pob_choice: dread of them
  chosen_spanish: el temor de ellos
  alternatives_spanish:
  - su temor
  - el pavor de ellos
  lexicon: HALOT
  rationale: 'פחד puede ser "temor", "miedo" o "pavor/dread". En español, "temor" transmite bien la fuerza del término sin sonar excesivamente literario. Se conserva la relación objetiva con el pronombre: temor causado por ellos.'
- source_word: עֲלֵיהֶם
  english_pob_choice: upon them
  chosen_spanish: sobre él
  alternatives_spanish:
  - sobre ellos
  - sobre los egipcios
  lexicon: HALOT
  rationale: El hebreo retoma el antecedente colectivo מִצְרַיִם en singular. En español, "sobre él" mantiene esa concordancia singular colectiva del texto-base y evita introducir una pluralización no presente en el hebreo.
theological_decisions:
- issue: Tratamiento del sujeto colectivo singular para מִצְרַיִם y del pronombre final
  english_pob_reading: Egypt was glad ... for dread of them had fallen upon them.
  chosen_spanish_reading: Egipto se alegró ... porque el temor de ellos había caído sobre él.
  alternative_spanish_readings:
  - Los egipcios se alegraron ... porque el temor de ellos había caído sobre ellos.
  - Egipto se alegró ... porque el temor de ellos había caído sobre ellos.
  rationale: El hebreo presenta un sujeto colectivo singular y cierra con un pronombre singular. El español permite reflejar esa tensión con "Egipto" y "sobre él". Aunque "sobre ellos" puede sonar más natural para algunos lectores, suaviza la estructura singular del original y borra la concordancia deliberada del texto hebreo.
  doctrine_reference: Hebrew collective noun usage; narrative concordance to source grammar
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB en inglés que volvió a "Egypt was glad" para respetar el sujeto singular colectivo de מִצְרַיִם. A la vez, resuelve en español la tensión de pronombres manteniendo el singular colectivo en el cierre ("sobre él") para no perder el rasgo gramatical del hebreo.
  spanish_consistency_notes:
  - Se mantiene "Egipto" como nombre colectivo singular, en línea con la decisión inglesa final.
  - Se evita "SEÑOR" u otra sustitución teológica ajena al pasaje, pues aquí no aparece el nombre divino.
  - '"Temor" se usa como equivalente más natural de פחד en este contexto, sin reducir su intensidad a simple "miedo".'
  - La nota alternativa preserva la opción de lectura "se regocijó" / "al salir ellos" que el inglés documentó como variante léxica.
