review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del siríaco según la auditoría inglesa: mantiene el dolor incluso de los ángeles ante el Poderoso, la entrega de Sion, la cadena verbal ''se jactan / se reúnen / dicen'', y el doble dicho irónico contra Sion. Sin embargo, introduce una nota al pie no necesaria en el texto principal y puede pulirse la puntuación y una colocación para mayor naturalidad y fuerza idiomática en español.'
  spanish_quality_summary: El español es claro y digno, pero 'ni siquiera para los ángeles' suena algo rígido dentro de 'no hay dolor'; 'mucho tiempo' funciona, aunque 'por tanto tiempo' encaja mejor con el matiz durativo. La coma antes de 'es pisoteada' es innecesaria. La nota [a] explica una alternativa inglesa ya resuelta, pero no responde a una ambigüedad que deba preservarse en el español final.
  glossary_alignment: 'Alineación buena con las pautas del proyecto: ''Sion'', ''el Poderoso'', ''ídolos'', y el lenguaje de sometimiento están bien. No hay conflicto con términos clave del glosario. La excepción principal es editorial: no conviene conservar una nota de alternativa descartada cuando el español no la necesita para evitar ambigüedad.'
  issues:
  - severity: medium
    issue: Nota al pie innecesaria sobre una alternativa ya descartada
    rationale: La instrucción pide preservar alternativas significativas cuando el inglés las preservó o cuando el español crea una nueva ambigüedad. Aquí el inglés final ya no lleva nota activa sobre 'throngs'; la revisión auditada resolvió la lectura verbal. Mantener la nota en español sobrecarga el texto sin beneficio exegético.
  - severity: low
    issue: Puntuación mejorable en la cita final
    rationale: La coma en 'La que durante mucho tiempo pisoteó a otros, es pisoteada' no es necesaria en español y entorpece el paralelismo sentencioso.
  - severity: low
    issue: Leve mejora de naturalidad en 'ni siquiera para los ángeles'
    rationale: '''Ni aun para los ángeles'' o ''ni siquiera entre los ángeles'' suena más natural con ''hay dolor''. Se recomienda una reformulación mínima conservando el sentido.'
  revised_spanish_text: '¿O piensas que no hay dolor, ni aun para los ángeles ante el Poderoso, porque Sion fue entregada de esta manera, y porque, mira, las naciones se jactan en su corazón, y se reúnen ante sus ídolos y dicen: «La que por tanto tiempo pisoteó a otros es pisoteada; la que sometió a otros, ella misma ha sido sometida»?'
  revision_rationale: Se retira la nota [a] porque la alternativa ya fue resuelta en la auditoría y no hace falta preservarla en español. Se pule la fluidez con 'ni aun para los ángeles', se mejora el matiz durativo con 'por tanto tiempo', y se corrige la puntuación de la cita para un paralelismo más natural y elegante en español.
