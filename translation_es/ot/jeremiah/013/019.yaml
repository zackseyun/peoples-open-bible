translation:
  language: es
  text: Las ciudades del Neguev[a] están cerradas, y no hay quien las abra; toda Judá ha sido llevada al destierro[c][b], enteramente llevada al destierro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ciudades del sur». «Neguev» conserva el nombre de la región meridional de Judá.
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «Judá ha sido exiliada, toda ella; ha sido exiliada por completo».'
    reason: lexical_alternative
  - marker: c
    text: O posiblemente «llevada al destierro en paz», aunque el contexto favorece más una idea de totalidad que de paz.
    reason: alternative_reading
lexical_decisions:
- source_word: עָרֵי הַנֶּגֶב
  english_pob_choice: the cities of the Negev
  chosen_spanish: las ciudades del Neguev
  alternatives_spanish:
  - las ciudades del sur
  - las poblaciones del Neguev
  lexicon: HALOT
  rationale: נעגב puede designar la región meridional de Judá, o el sur en sentido más general. Conservé 'Neguev' como topónimo geográfico, porque mantiene con precisión el referente regional sin perder legibilidad en español bíblico.
- source_word: סֻגְּרוּ
  english_pob_choice: are shut up
  chosen_spanish: están cerradas
  alternatives_spanish:
  - han sido cerradas
  - están sitiadas
  lexicon: HALOT
  rationale: El pasivo perfecto describe un estado resultante. 'Están cerradas' comunica bien la clausura de las ciudades en un contexto de desastre, sin forzar una imagen más específica de sitio si el hebreo no la explicita.
- source_word: וְאֵין פֹּתֵחַ
  english_pob_choice: with no one to open them
  chosen_spanish: y no hay quien las abra
  alternatives_spanish:
  - y no hay quien abra
  - y nadie las abre
  lexicon: HALOT
  rationale: La construcción idiomática se expresa naturalmente en español con 'no hay quien...'. El complemento pronominal 'las' retoma 'las ciudades' y evita ambigüedad.
- source_word: הָגְלָת
  english_pob_choice: has been carried away into exile
  chosen_spanish: ha sido llevado al destierro
  alternatives_spanish:
  - ha sido exiliado
  - ha sido deportado al destierro
  lexicon: HALOT
  rationale: 'El hophal de גלה implica acción sufrida: no un irse voluntario, sino un traslado forzado. ''Llevado al destierro'' conserva esa pasividad y el matiz de deportación que el contexto exige.'
- source_word: יְהוּדָה כֻּלָּהּ
  english_pob_choice: all Judah
  chosen_spanish: todo Judá
  alternatives_spanish:
  - Judá entera
  - la totalidad de Judá
  lexicon: HALOT
  rationale: כֻּלָּהּ intensifica la totalidad. 'Todo Judá' es breve y fiel, y preserva el alcance colectivo del juicio.
- source_word: הָגְלָת שְׁלוֹמִים
  english_pob_choice: wholly carried away into exile
  chosen_spanish: completamente llevado al destierro
  alternatives_spanish:
  - llevado al destierro por completo
  - llevado al destierro en su totalidad
  lexicon: HALOT
  rationale: Aunque la forma se relaciona con שלם, aquí funciona adverbialmente para reforzar la totalidad, no la idea de 'en paz'. 'Completamente' mantiene el énfasis repetitivo sin introducir un sentido ajeno al contexto.
theological_decisions:
- issue: Sentido de שְׁלוֹמִים en la fórmula de exilio
  english_pob_reading: an adverbial expression of completeness rather than peacefulness
  chosen_spanish_reading: 'una expresión adverbial de totalidad: ''completamente'''
  alternative_spanish_readings:
  - '''en paz'''
  - '''pacíficamente'''
  rationale: El contexto de juicio y la repetición con כֻּלָּהּ favorecen una lectura de plenitud/totalidad. Traducirlo como 'en paz' suavizaría indebidamente el golpe retórico del verso y sugeriría una deportación tranquila, algo que el pasaje no apoya.
  doctrine_reference: Jeremías 13:19; cf. el uso contextual de fórmulas de exilio en pasajes de juicio
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registran cambios aplicados en el expediente inglés, y el consenso de verificación fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene 'Neguev' como topónimo transliterado, coherente con el valor geográfico señalado por el expediente.
  - '''Destierro'' se usa para expresar el pasivo de גלה con la fuerza de deportación forzada, evitando una lectura voluntaria.'
  - La repetición de totalidad ('todo' / 'completamente') reproduce el paralelismo enfático del hebreo y evita introducir 'paz' en el sentido principal.
