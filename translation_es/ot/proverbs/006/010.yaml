translation:
  language: es
  text: Un poco de sueño[a], un poco de adormecimiento, un poco de cruzar las manos para acostarse—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «un poco de sueño, un poco de adormecimiento, un poco de cruzar las manos para acostarse».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעַט
  english_pob_choice: a little
  chosen_spanish: un poco
  alternatives_spanish:
  - un poquito
  - un poco de tiempo
  lexicon: HALOT
  rationale: La repetición tripartita pide una expresión breve y proverbial; «un poco» conserva la concisión y el ritmo sin añadir precisión temporal que el hebreo no da.
- source_word: שֵׁנוֹת
  english_pob_choice: sleep
  chosen_spanish: sueño
  alternatives_spanish:
  - dormir
  - sueño(s)
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, en español «sueño» funciona naturalmente como sustantivo de masa y evita una pluralización extraña.
- source_word: תְּנוּמוֹת
  english_pob_choice: slumber
  chosen_spanish: adormecimiento
  alternatives_spanish:
  - cabeceo
  - somnolencia
  lexicon: HALOT
  rationale: El paralelismo con שֵׁנוֹת sugiere un sueño más ligero o momentáneo; «adormecimiento» mantiene esa gradación sin caer en un coloquialismo excesivo.
- source_word: חִבֻּק יָדַיִם
  english_pob_choice: folding of the hands
  chosen_spanish: entrelazar las manos
  alternatives_spanish:
  - cruzar las manos
  - doblar las manos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «abrazo de las manos»; en español, «entrelazar las manos» comunica la postura de manos recogidas en inactividad y suena más natural que una traducción calca.
- source_word: לִשְׁכָּב
  english_pob_choice: to lie down
  chosen_spanish: para acostarse
  alternatives_spanish:
  - para tenderse
  - para echarse
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad o resultado de la postura de las manos; «acostarse» mantiene el sentido de ponerse en posición de descanso sin confundirse con el sueño ya mencionado.
translation_notes:
  revision_awareness: El texto base inglés se mantuvo sin cambios en la revisión más reciente; la versión española sigue esa lectura estable y reproduce la acumulación retórica de tres expresiones breves.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y proverbial, evitando ampliaciones interpretativas.
  - «Sueño» y «adormecimiento» preservan la diferencia semántica entre שֵׁנוֹת y תְּנוּמוֹת.
  - La nota al pie conserva la alternativa literal sin imponerla en el cuerpo del texto.
