revisions:
- from: Pues Yahvé ha escogido a Jacob para sí mismo[a], a Israel como su posesión preciosa.
  to: Pues Yah[a] ha escogido a Jacob para sí mismo, a Israel como su posesión preciada.
  rationale: Se corrige «Yahvé» a «Yah» para preservar la forma corta יָהּ atestiguada en el hebreo y en la revisión inglesa auditada. Se reubica la nota al nombre divino, que es lo que realmente explica. También se pule «posesión preciosa» a «posesión preciada» por naturalidad y mejor correspondencia con סְגֻלָּה.
  reviewer_model: gpt-5.4
