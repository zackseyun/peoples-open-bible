base_translation:
  language: en
  yaml_path: translation/deuterocanon/psalms_of_solomon/007/001.yaml
  text: Do not depart from us[a], O God[c][b], lest those who hate us without cause attack us.
  footnotes:
  - marker: a
    text: Or “lest those who hate us attack us for nothing”; the adverb “without cause” could be heard with the attack rather than with the hatred.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb rendered “depart” is more literally related to moving one’s tent or encampment away, a vivid image of withdrawn presence.
    reason: cultural_note
  - marker: c
    text: Or 'Do not depart from us'.
    reason: previous_rendering
