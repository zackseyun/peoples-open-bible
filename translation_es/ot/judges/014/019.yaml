translation:
  language: es
  text: Y el Espíritu de Yahvé se lanzó sobre él, y descendió a Ascalón, y mató a treinta hombres entre ellos; tomó sus vestidos[a] y dio las mudas de ropa a los que habían explicado el enigma. Y se encendió su ira, y subió a la casa de su padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus ropas». El hebreo puede referirse más específicamente a ropa quitada a los muertos y tomada como botín.
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֣וּחַ יְהוָ֗ה
  english_pob_choice: the Spirit of Yahweh rushed upon him
  chosen_spanish: el Espíritu de Yahvé se lanzó sobre él
  alternatives_spanish:
  - el Espíritu de Yahvé vino poderosamente sobre él
  - el Espíritu de Yahvé irrumpió sobre él
  lexicon: HALOT
  rationale: צָלַח con רוּחַ יְהוָה en Jueces expresa un empuje súbito y enérgico de investidura divina, no simplemente que algo “anduvo bien”. En español, “se lanzó sobre él” conserva el movimiento repentino y la fuerza de la expresión sin suavizarla demasiado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de traducir el Nombre divino con “Yahvé”, manteniendo el nombre personal de Dios en vez de sustituirlo por un título.
- source_word: וַיֵּרֶד אַשְׁקְלוֹן
  english_pob_choice: he went down to Ashkelon
  chosen_spanish: descendió a Ascalón
  alternatives_spanish:
  - bajó a Ascalón
  - descendió hasta Ascalón
  lexicon: HALOT
  rationale: ירד es el verbo narrativo normal “descender/bajar”. “Descendió a Ascalón” conserva el movimiento del hebreo y es natural en español bíblico moderno.
- source_word: וַיַּךְ מֵהֶם שְׁלֹשִׁים אִישׁ
  english_pob_choice: struck down thirty men among them
  chosen_spanish: mató a treinta hombres entre ellos
  alternatives_spanish:
  - hirió de muerte a treinta hombres entre ellos
  - derribó a treinta hombres entre ellos
  lexicon: HALOT
  rationale: En este contexto נכה implica violencia letal. “Mató” comunica claramente el resultado; “entre ellos” refleja מֵהֶם sin añadir la idea de procedencia en exceso, y coincide con la revisión inglesa más natural.
- source_word: חֲלִיצוֹתָם
  english_pob_choice: their garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: La forma designa la ropa quitada a los muertos; el auditor inglés conservó “garments” tras revisar una opción más interpretativa. “Vestidos” mantiene el término amplio y publicable sin introducir “botín” como glosa no explicitada en el texto principal.
- source_word: הַחֲלִיפוֹת
  english_pob_choice: the changes of clothes
  chosen_spanish: las mudas de ropa
  alternatives_spanish:
  - los cambios de ropa
  - las mudas
  lexicon: HALOT
  rationale: En el contexto del acertijo, חליפות son las prendas de recambio prometidas. “Mudas de ropa” transmite la idea con naturalidad en español; “cambios de ropa” sería más literal pero menos idiomático.
- source_word: לְמַגִּידֵי הַחִידָה
  english_pob_choice: to those who had explained the riddle
  chosen_spanish: a los que habían explicado el enigma
  alternatives_spanish:
  - a los que habían declarado el enigma
  - a los que habían dado la respuesta del enigma
  lexicon: HALOT
  rationale: מגידים es participio de “dar a conocer/explicar”. “Habían explicado el enigma” comunica bien que el acertijo fue resuelto y conserva el vínculo con el relato previo; “enigma” es la forma más natural aquí para חִידָה.
- source_word: וַיִּחַר אַפּוֹ
  english_pob_choice: his anger burned
  chosen_spanish: se encendió su ira
  alternatives_spanish:
  - ardió su ira
  - se inflamó su ira
  lexicon: HALOT
  rationale: El hebreo usa un modismo de ira que arde. “Se encendió su ira” conserva la metáfora de fuego sin sonar forzado en español.
- source_word: וַיַּעַל בֵּית אָבִיהוּ
  english_pob_choice: he went up to his father's house
  chosen_spanish: subió a la casa de su padre
  alternatives_spanish:
  - subió a la casa de su padre
  - volvió a la casa de su padre
  lexicon: HALOT
  rationale: עלה se mantiene como “subió”, preservando el movimiento narrativo del hebreo. “Casa de su padre” traduce el sintagma sin explicar de más la intención de retorno.
theological_decisions:
- issue: Empoderamiento por el Espíritu de Yahvé sin suavizar la violencia narrativa
  english_pob_reading: the Spirit of Yahweh rushed upon him
  chosen_spanish_reading: el Espíritu de Yahvé se lanzó sobre él
  alternative_spanish_readings:
  - el Espíritu de Yahvé vino poderosamente sobre él
  - el Espíritu de Yahvé lo impulsó
  rationale: La escena presenta una acción divina inmediata que habilita a Sansón para lo que sigue. La traducción conserva la fuerza del empoderamiento sin añadir una explicación moral que el texto no formula aquí.
  doctrine_reference: Preservar la tensión teológica del relato; no resolver la relación entre investidura divina y acción violenta más allá de la forma del texto.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente al preferir una redacción más natural para מֵהֶם (“entre ellos”) y al evitar una glosa interpretativa en el cuerpo principal para חֲלִיצוֹתָם, manteniendo solo una nota alternativa breve en español. También se respetó el ajuste inglés que conservó “garments” en lugar de una lectura más expansiva.
  spanish_consistency_notes:
  - Se usa Yahvé para el Nombre divino, conforme al estándar del proyecto.
  - Se mantiene ‘Espíritu’ con mayúscula por tratarse del Espíritu de Yahvé.
  - ‘Enigma’ traduce חִידָה de forma natural y coherente con el contexto del acertijo.
  - ‘Casa de su padre’ conserva el hebreo literal sin convertirlo en una paráfrasis de regreso.
