  yaml_path: translation/ot/proverbs/015/031.yaml
  text: An ear that listens to life-giving rebuke will remain among the wise[a][b].
  footnotes:
  - marker: a
    text: Or 'An ear that hears the rebuke of life will lodge among the wise.' The Hebrew verb is literally 'lodge' or 'spend the night,' here used figuratively for remaining or dwelling among the wise.
    reason: lexical_alternative
  - marker: b
    text: '''Life-giving rebuke'' renders a Hebrew expression that could also be translated ''rebuke of life'' or ''rebuke for life,'' meaning correction that leads to life.'
    reason: lexical_alternative
