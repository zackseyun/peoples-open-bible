translation:
  language: es
  text: Hicieron las túnicas de lino fino[a], obra de un tejedor, para Aarón y para sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "obra tejida". La frase hebrea subraya que las túnicas fueron hechas mediante tejido.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: They made
  chosen_spanish: Hicieron
  alternatives_spanish:
  - Y hicieron
  - Fabricaron
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de עשה introduce una acción sucesiva; en español, "hicieron" comunica la acción sin sobrerrepresentar la conjunción narrativa. Se evita "fabricaron" por sonar más técnico de lo que exige el contexto.
- source_word: הַכָּתְנֹת
  english_pob_choice: the tunics
  chosen_spanish: las túnicas
  alternatives_spanish:
  - las vestiduras
  - las prendas
  lexicon: HALOT
  rationale: כֻּתֹּנֶת designa una prenda ceñida tipo túnica. "Túnicas" es claro, actual y más específico que "vestiduras" o "prendas".
- source_word: שֵׁשׁ
  english_pob_choice: fine linen
  chosen_spanish: lino fino
  alternatives_spanish:
  - lino
  - lino delicado
  lexicon: HALOT
  rationale: En contexto tabernacular y sacerdotal, שֵׁשׁ apunta a lino de calidad fina. "Lino fino" conserva la cualidad del material sin perder naturalidad en español.
- source_word: מַעֲשֵׂה אֹרֵג
  english_pob_choice: the work of a weaver
  chosen_spanish: obra de tejedor
  alternatives_spanish:
  - trabajo de tejedor
  - tejido de tejedor
  - obra tejida
  lexicon: HALOT
  rationale: La construcción hebrea enfatiza la labor hecha por tejido. "Obra de tejedor" mantiene el foco artesanal y suena idiomático en español bíblico contemporáneo.
- source_word: לְאַהֲרֹן וּלְבָנָיו
  english_pob_choice: for Aaron and for his sons
  chosen_spanish: para Aarón y para sus hijos
  alternatives_spanish:
  - para Aarón y sus hijos
  - para Aarón y para sus descendientes
  lexicon: HALOT
  rationale: Se conserva la repetición de לְ con "para ... y para ..." como marca de distribución y énfasis, siguiendo el matiz observado en el audit trail inglés. "Sus hijos" refleja con precisión el referente masculino familiar en el contexto sacerdotal.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada muestran alto acuerdo y no registran revisiones aplicadas; por eso el español sigue de cerca la sintaxis y las decisiones léxicas ya estabilizadas, preservando el énfasis en la calidad del lino y en la elaboración por tejido.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el hebreo contiene el nombre divino; aquí no aparece.
  - Se mantiene "Aarón" y "sus hijos" en registro bíblico claro y contemporáneo.
  - '"Obra de tejedor" deja visible la alternativa "obra tejida" mediante nota, sin perder fluidez en el texto principal.'
