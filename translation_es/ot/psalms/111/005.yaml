translation:
  language: es
  text: Ha dado alimento[a] a los que le temen; recordará para siempre su alianza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘presa’; el término hebreo puede denotar alimento obtenido como presa, pero aquí probablemente significa alimento en sentido general.
    reason: lexical_alternative
lexical_decisions:
- source_word: טֶרֶף
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - presa
  - provisión
  lexicon: HALOT
  rationale: El término hebreo puede significar ‘presa’ o alimento obtenido como presa, pero en este contexto de benevolencia divina hacia los que le temen, ‘alimento’ comunica con naturalidad la provisión concreta sin introducir una imagen depredatoria que el contexto no exige. ‘Provisión’ es más amplio e interpretativo.
- source_word: נָתַן
  english_pob_choice: has given
  chosen_spanish: proveyó
  alternatives_spanish:
  - dio
  - ha dado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completa; en español, ‘proveyó’ refleja bien el acto cumplido de dar sustento y su sentido de provisión continua. En un verso poético resulta más fluido que un presente perfecto estricto, sin perder el valor de acción realizada.
- source_word: לִירֵאָיו
  english_pob_choice: to those who fear him
  chosen_spanish: a los que le temen
  alternatives_spanish:
  - a los que le reverencian
  - a sus temerosos
  lexicon: HALOT
  rationale: La construcción participial describe a personas caracterizadas por temer a Dios. ‘A los que le temen’ conserva el peso teológico de ירא y suena más natural que una forma literal como ‘sus temerosos’. ‘Reverencian’ suaviza algo el término.
- source_word: יִזְכֹּר
  english_pob_choice: he will remember
  chosen_spanish: recordará
  alternatives_spanish:
  - se acordará
  - recuerda
  lexicon: HALOT
  rationale: El imperfecto puede leerse con fuerza futura en paralelo con la primera cláusula. ‘Recordará’ mantiene el verbo ‘recordar’ del texto auditado y su valor de acción futura; ‘se acordará’ es posible, pero menos solemne en este contexto poético.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: ‘Para siempre’ es la equivalencia española más natural del idiomático ‘forever’ en este contexto de duración indefinida y fidelidad de pacto.
- source_word: בְּרִיתוֹ
  english_pob_choice: his covenant
  chosen_spanish: su pacto
  alternatives_spanish:
  - su alianza
  - su convenio
  lexicon: HALOT
  rationale: Aunque ‘covenant’ suele traducirse por ‘pacto’, en español la palabra ‘pacto’ puede sonar más jurídica o contractual; aquí conserva bien la referencia a la relación y compromisos duraderos de Dios. ‘Alianza’ también es posible, pero ‘pacto’ se ajusta mejor al registro bíblico y al uso tradicional en este tipo de cláusulas.
theological_decisions:
- issue: El recordar divino en contexto de pacto
  english_pob_reading: '''he will remember his covenant'' as covenant faithfulness expressed in action, not mere mental recollection'
  chosen_spanish_reading: ‘recordará su pacto’ como fidelidad de pacto expresada en acción, no simple memoria mental
  alternative_spanish_readings:
  - ‘se acordará de su pacto’ como presente gnómico
  - ‘guardará su pacto’ como paráfrasis de fidelidad
  rationale: En la Biblia, cuando Dios ‘recuerda’ su pacto, el sentido incluye actuar conforme a él. La traducción conserva el verbo ‘recordar’ para mantener el modismo bíblico y la tensión teológica, sin sustituirlo por una paráfrasis que borre la imagen.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail en lectura y énfasis; no se registran revisiones posteriores que requieran ajustar el sentido. Se mantiene la distinción entre el verbo de provisión y el verbo de memoria de pacto.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ solo cuando aparece el nombre divino explícito; en este versículo el sujeto está pronominal, por lo que no se inserta un nombre no presente en el hebreo.
  - Se conserva el paralelismo breve del hebreo en dos miembros poéticos.
  - ‘Pacto’ se usa como término técnico bíblico equivalente a בְּרִית, en coherencia con el audit trail inglés.
