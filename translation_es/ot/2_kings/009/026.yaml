translation:
  language: es
  text: «Ciertamente[a] vi ayer la sangre de Nabot y la sangre de sus hijos —declara Yahvé—, y te retribuiré en esta parcela —declara Yahvé—. Ahora, levántalo y arrójalo en la parcela, conforme a la palabra de Yahvé.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La apertura hebrea אִם לֹא funciona aquí como una afirmación enfática, casi con fuerza de juramento: «Ciertamente» o «En verdad», no como una condición.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - En verdad
  - De veras
  lexicon: HALOT
  rationale: La expresión hebrea funciona aquí como una afirmación enfática, de tono casi juramentado, no como condición. «Ciertamente» comunica esa fuerza aseverativa en español con registro digno y natural.
- source_word: דְּמֵי
  english_pob_choice: blood
  chosen_spanish: sangre
  alternatives_spanish:
  - sangre derramada
  - derramamiento de sangre
  lexicon: HALOT
  rationale: El plural constructo hebreo expresa aquí sangre derramada o culpa de sangre. En español, «sangre» mantiene el giro bíblico sin perder el sentido judicial y narrativo.
- source_word: נָבוֹת
  english_pob_choice: Naboth
  chosen_spanish: Nabot
  alternatives_spanish:
  - Nabot
  - Nabot
  lexicon: HALOT
  rationale: Se translitera el nombre propio en forma española habitual, conservando la referencia histórica del relato.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos varones
  alternatives_spanish:
  - sus hijos
  - sus muchachos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos/sons». Para conservar la precisión de género que el audit trail protege, en español puede explicitarse como «sus hijos varones»; sin embargo, en el texto principal se optó por «sus hijos» por fluidez y fidelidad suficiente al uso bíblico, manteniendo la especificidad en la nota de decisión.
- source_word: רָאִיתִי
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - he visto
  - he llegado a ver
  lexicon: HALOT
  rationale: El perfecto hebreo encaja naturalmente con pretérito simple en español dentro de una formulación profética/judicial con marcador temporal pasado.
- source_word: אֶמֶשׁ
  english_pob_choice: yesterday
  chosen_spanish: ayer
  alternatives_spanish:
  - anoche
  - la noche pasada
  lexicon: HALOT
  rationale: Es la equivalencia directa y menos interpretativa del adverbio en este contexto.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética solemne y el nombre divino «Yahvé», siguiendo la política de la obra de no ocultar el Tetragrámaton.
- source_word: וְשִׁלַּמְתִּי לְךָ
  english_pob_choice: I will repay you
  chosen_spanish: te lo retribuiré
  alternatives_spanish:
  - te lo pagaré
  - te lo recompensaré
  lexicon: HALOT
  rationale: El verbo שׁלם en este contexto implica retribución judicial, no mera compensación comercial. «Retribuir» conserva mejor ese matiz de pago retributivo y formal.
- source_word: בַּחֶלְקָה הַזֹּאת
  english_pob_choice: on this plot of land
  chosen_spanish: en este terreno
  alternatives_spanish:
  - en este campo
  - sobre esta parcela
  lexicon: HALOT
  rationale: חֶלְקָה designa un terreno o parcela. «Terreno» es natural en español y suficientemente preciso para la escena narrativa.
- source_word: וְעַתָּה
  english_pob_choice: So now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: HALOT
  rationale: La transición es directa a la orden inmediata; en español, «Ahora» transmite bien el giro imperativo del discurso.
- source_word: שָׂא
  english_pob_choice: lift him up
  chosen_spanish: tómalo
  alternatives_spanish:
  - levántalo
  - cárgalo
  lexicon: HALOT
  rationale: El verbo hebreo literalmente es «levantar/llevar». En el contexto de un cadáver a ser retirado, «tómalo» integra de forma natural la acción previa al desecho; la alternativa más literal se refleja en la nota para no perder la tensión semántica.
- source_word: הַשְׁלִכֵהוּ
  english_pob_choice: throw him
  chosen_spanish: arrójalo
  alternatives_spanish:
  - échalo
  - lánzalo
  lexicon: HALOT
  rationale: El causativo con sufijo exige un verbo fuerte de expulsión. «Arrójalo» preserva la violencia y la inmediatez del mandato.
- source_word: בַּחֶלְקָה
  english_pob_choice: on the plot
  chosen_spanish: en el terreno
  alternatives_spanish:
  - sobre el terreno
  - en la parcela
  lexicon: HALOT
  rationale: Se repite el lugar y conviene mantener consistencia con la primera ocurrencia; «en el terreno» suena natural y claro.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: La fórmula de cumplimiento se conserva con un registro bíblico sobrio. «Conforme a» reproduce bien la relación de ajuste a la declaración divina.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La política española de la obra pide «Yahvé» como forma principal para preservar el nombre propio divino, no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Specificity of the victims as sons
  english_pob_reading: his sons
  chosen_spanish_reading: sus hijos
  alternative_spanish_readings:
  - sus hijos varones
  - sus muchachos
  rationale: El hebreo especifica una relación filial masculina. En español, «sus hijos» es la forma más fluida y ya puede entenderse como masculina en este contexto; la precisión de género queda documentada en la decisión léxica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo y el audit trail inglés sin cambios sustantivos respecto de la lectura aprobada. La principal adaptación al español fue naturalizar el orden y la puntuación del discurso directo, manteniendo la fuerza enfática de אִם לֹא, la fórmula profética נְאֻם יְהוָה y el matiz retributivo de שִׁלַּמְתִּי.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה en el texto principal.
  - Se mantiene un registro bíblico sobrio, evitando «SEÑOR» como sustituto del nombre divino.
  - «Retribuir» se usa para el valor judicial de שִׁלַּמְתִּי, no un pago comercial.
  - «Terreno» traduce חֶלְקָה de forma consistente en ambas ocurrencias.
  - El tono del mandato final conserva la violencia del hebreo con «arrójalo».
