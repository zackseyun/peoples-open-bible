review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: fórmula legal-procedural con futuro («dirá»), sujeto correcto («el padre de la joven»), destinatario judicial («los ancianos»), entrega matrimonial («di mi hija a este hombre») y acusación final de odio presente («la odia»). También preserva la nota léxica alternativa sobre וַיִּשְׂנָאֶהָ.'
  spanish_quality_summary: La redacción es clara y digna, pero «por mujer» suena más calcado y menos natural en español contemporáneo neutral. «Como esposa» expresa de manera más idiomática el giro matrimonial לְאִשָּׁה sin pérdida de sentido. El resto del versículo es natural y bien puntuado.
  glossary_alignment: 'No hay términos del glosario mayor en disputa. «Ancianos» encaja bien para הַזְּקֵנִים. «Joven» es una buena elección para הַנַּעַר en este contexto matrimonial. La decisión principal a ajustar es estilístico-lexical: לְאִשָּׁה se vierte mejor como «como esposa» que «por mujer» en español bíblico moderno legible.'
  issues:
  - severity: medium
    issue: «por mujer» suena acartonado y poco natural en español actual
    rationale: Aunque históricamente comprensible, esta formulación resulta más calco que español neutral contemporáneo. El hebreo לְאִשָּׁה en este contexto significa dar en matrimonio/as wife; «como esposa» conserva el sentido relacional con mejor legibilidad.
  revised_spanish_text: 'Y el padre de la joven dirá a los ancianos: «Yo di mi hija a este hombre como esposa, y él la odia».

    '
  revision_rationale: Se elimina la nota [a] porque en el español revisado ya no hay ancla correspondiente, y la nota existente estaba colocada sobre «ancianos» aunque explicaba el verbo final «la odia», lo cual incumple la disciplina de anclaje. Además, se sustituye «por mujer» por «como esposa» para un español más natural sin apartarse del sentido del hebreo ni de la decisión auditada en inglés («as a wife»).
