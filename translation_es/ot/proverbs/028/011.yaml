translation:
  language: es
  text: El hombre rico es sabio a sus propios ojos[a], pero el pobre que tiene entendimiento lo investiga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "lo pone al descubierto" o "lo examina". El verbo hebreo puede abarcar la idea de buscar, investigar, examinar o penetrar el verdadero carácter de alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - que se cree sabio
  lexicon: HALOT
  rationale: El hebreo usa un adjetivo de sabiduría real; en español, ‘sabio’ conserva esa base semántica. La autoevaluación queda reforzada por la expresión siguiente, por eso no se reemplaza el adjetivo por una paráfrasis completa.
- source_word: בְּעֵינָיו
  english_pob_choice: in his own eyes
  chosen_spanish: en su propia opinión
  alternatives_spanish:
  - a sus propios ojos
  - a su parecer
  lexicon: HALOT
  rationale: Es un modismo hebreo de autoevaluación. ‘En su propia opinión’ comunica bien el sentido reflexivo en español y evita una literalidad poco natural, sin perder la idea de percepción subjetiva.
- source_word: אִישׁ עָשִׁיר
  english_pob_choice: a rich man
  chosen_spanish: el rico
  alternatives_spanish:
  - un hombre rico
  - un rico
  lexicon: HALOT
  rationale: La construcción hebrea nombra a un hombre rico. En español, ‘el rico’ suena proverbial y natural; mantiene el valor masculino del singular sin añadir explicación innecesaria.
- source_word: וְדַל
  english_pob_choice: but a poor man
  chosen_spanish: pero el pobre
  alternatives_spanish:
  - y el pobre
  - sin embargo, el pobre
  lexicon: HALOT
  rationale: La waw introduce contraste en el proverbio. ‘Pero’ refleja mejor la oposición entre los dos miembros que una simple coordinación.
- source_word: מֵבִין
  english_pob_choice: who has understanding
  chosen_spanish: entendido
  alternatives_spanish:
  - prudente
  - discerning
  - que tiene entendimiento
  lexicon: HALOT
  rationale: El participio expresa a alguien con discernimiento. ‘Entendido’ funciona de manera breve y proverbial en español, preservando el valor atributivo sin expandirlo demasiado.
- source_word: יַחְקְרֶנּוּ
  english_pob_choice: searches him out
  chosen_spanish: lo investiga
  alternatives_spanish:
  - lo busca con cuidado
  - lo examina
  - lo descubre
  lexicon: HALOT
  rationale: El verbo חקר denota buscar, examinar, investigar. ‘Lo investiga’ conserva el matiz de indagación/penetración del carácter que la nota inglesa preserva, aunque en español también permite una lectura más general de examen.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el archivo auditado en inglés. La versión inglesa permanece estable; no se documentaron cambios relevantes ni revisiones aplicadas para este versículo.
  spanish_consistency_notes:
  - Se conservó ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una referencia divina directa.
  - Se prefirió ‘sabio’/‘entendido’ por su correspondencia breve con חָכָם y מֵבִין, y ‘investiga’ para reflejar el campo semántico de חקר.
  - La redacción adopta un tono proverbial natural en español sin neutralizar el género del hebreo.
