translation:
  language: es
  text: Permíteme pasar por tu tierra. No nos desviaremos hacia campo ni viña[a], y no beberemos agua de un pozo. Iremos por el camino del rey hasta que hayamos pasado por tu territorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «el camino real».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶעְבְּרָה
  english_pob_choice: Let me pass through
  chosen_spanish: Déjame pasar por
  alternatives_spanish:
  - Permíteme pasar por
  - Déjame atravesar
  lexicon: HALOT
  rationale: El cohortativo 1cs expresa una petición/resolución en contexto diplomático. En español, «Déjame pasar por» conserva el matiz de solicitud y el movimiento a través de un espacio sin añadir formalidad innecesaria.
- source_word: בְאַרְצְךָ
  english_pob_choice: your land
  chosen_spanish: tu tierra
  alternatives_spanish:
  - tu país
  - tu territorio
  lexicon: HALOT
  rationale: אֶרֶץ puede significar tierra, país o territorio. «Tu tierra» es natural en español y mantiene el sentido político-geográfico del pasaje sin sonar excesivamente técnico.
- source_word: לֹא נִטֶּה
  english_pob_choice: we will not turn aside
  chosen_spanish: No nos apartaremos
  alternatives_spanish:
  - No nos desviaremos
  - No nos volveremos aparte
  lexicon: HALOT
  rationale: נטה aquí describe desviarse del camino. «Apartarse» preserva la imagen del desvío y suena idiomático en español.
- source_word: בְּשָׂדֶה וּבְכֶרֶם
  english_pob_choice: into field or vineyard
  chosen_spanish: ni a campo ni a viña
  alternatives_spanish:
  - ni a un campo ni a una viña
  - ni a campo o viña
  lexicon: HALOT
  rationale: La construcción distributiva con sustantivos singulares pide una formulación genérica. «Campo» y «viña» mantienen el contraste entre zona cultivada y viñedo, y la duplicación con «ni... ni...» refleja bien la prohibición.
- source_word: לֹא נִשְׁתֶּה מֵי בְאֵר
  english_pob_choice: we will not drink water from a well
  chosen_spanish: no beberemos agua de un pozo
  alternatives_spanish:
  - no beberemos agua de un aljibe
  - no beberemos agua de un pozo de allí
  lexicon: HALOT
  rationale: La expresión literalmente es «aguas de un pozo». «Agua de un pozo» comunica con claridad el sentido y conserva la referencia a no usar recursos locales.
- source_word: בְּדֶרֶךְ הַמֶּלֶךְ
  english_pob_choice: by the king’s road
  chosen_spanish: por el camino del rey
  alternatives_spanish:
  - por la ruta del rey
  - por el camino real
  lexicon: HALOT
  rationale: La frase hebrea alude a la ruta principal o pública. «Camino del rey» reproduce el valor literal y mantiene la tensión con la nota tradicional inglesa sobre «the king’s highway» sin imponer una formulación eclesiástica.
- source_word: נֵלֵךְ
  english_pob_choice: we will go
  chosen_spanish: Iremos
  alternatives_spanish:
  - iremos de paso
  - seguiremos
  lexicon: HALOT
  rationale: הלך es el verbo común de ir/caminar. «Iremos» es simple, formal y adecuado al registro del compromiso.
- source_word: עַד אֲשֶׁר נַעֲבֹר
  english_pob_choice: until we have passed through
  chosen_spanish: hasta que hayamos pasado por
  alternatives_spanish:
  - hasta que pasemos por
  - hasta haber pasado por
  lexicon: HALOT
  rationale: 'El límite temporal del recorrido se expresa mejor con subjuntivo perfecto en español: «hasta que hayamos pasado por», que conserva la idea de tránsito completado.'
- source_word: גְּבֻלֶךָ
  english_pob_choice: your territory
  chosen_spanish: tu territorio
  alternatives_spanish:
  - tu frontera
  - tu lindero
  lexicon: HALOT
  rationale: גבול puede significar borde, frontera o territorio delimitado. La revisión inglesa prefirió «territory» por naturalidad contextual; «tu territorio» sigue esa decisión y evita restringir el sentido a una mera línea fronteriza.
translation_notes:
  revision_awareness: La revisión inglesa cambió el cierre de «border» a «territory» por naturalidad contextual. En español seguí esa decisión con «territorio», manteniendo el resto de la línea muy cercano al auditable original.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino.
  - Conservé un registro sobrio y diplomático, acorde con una petición de tránsito.
  - 'Mantuve el paralelismo negativo de dos prohibiciones: apartarse del camino y beber agua local.'
