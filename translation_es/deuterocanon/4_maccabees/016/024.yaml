translation:
  language: es
  text: Por estas palabras[a] la madre de siete[b], alentando a cada uno de sus hijos, los persuadió a morir antes que transgredir el mandamiento de Dios;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Por medio de estas palabras». La preposición griega διά con genitivo puede expresar medio o instrumento.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «la madre de siete».
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τούτων τῶν λόγων
  english_pob_choice: By these words
  chosen_spanish: Por estas palabras
  alternatives_spanish:
  - Con estas palabras
  - Por medio de estas palabras
  lexicon: LSJ
  rationale: διά con genitivo expresa medio o instrumento. En español, «por estas palabras» comunica naturalmente ese valor instrumental sin forzar una paráfrasis.
- source_word: ἡ ἑπτάμητωρ
  english_pob_choice: the mother of seven
  chosen_spanish: la madre de siete
  alternatives_spanish:
  - la madre de siete hijos
  - la siete veces madre
  lexicon: LSJ
  rationale: El compuesto griego nombra compactamente a una mujer madre de siete. «La madre de siete» conserva esa concisión y la carga retórica; no se añade «hijos» aquí porque el verso lo especifica enseguida con τῶν υἱῶν.
- source_word: ἕνα ἕκαστον τῶν υἱῶν
  english_pob_choice: each one of her sons
  chosen_spanish: a cada uno de sus hijos
  alternatives_spanish:
  - a cada uno de sus hijos varones
  - a cada uno de los hijos
  lexicon: LSJ
  rationale: La construcción es distributiva y enfática. En español, «a cada uno de sus hijos» mantiene el foco individual y suena natural; «hijos» refleja υἱῶν y puede funcionar de manera inclusiva solo si el contexto lo permitiera, pero aquí la referencia es a varones, por eso se añade «sus» sin importar un matiz ajeno.
- source_word: παρακαλοῦσα
  english_pob_choice: encouraging
  chosen_spanish: animando
  alternatives_spanish:
  - exhortando
  - instando
  - alentando
  lexicon: LSJ
  rationale: παρακαλέω puede significar exhortar, animar o alentar según el contexto. Aquí la madre fortalece a sus hijos para mantenerse fieles bajo presión, y «animando» transmite bien ese impulso de sostén moral en español.
- source_word: ἔπεισε
  english_pob_choice: persuaded them
  chosen_spanish: los persuadió
  alternatives_spanish:
  - los convenció
  - los ganó para
  lexicon: LSJ
  rationale: πείθω significa persuadir o convencer. «Los persuadió» reproduce el verbo de manera directa y mantiene el sentido de logro efectivo que exige el contexto.
- source_word: μᾶλλον ἀποθανεῖν, ἢ παραβῆναι
  english_pob_choice: rather to die than to transgress
  chosen_spanish: a morir más bien que transgredir
  alternatives_spanish:
  - a morir antes que transgredir
  - a morir más que quebrantar
  lexicon: LSJ
  rationale: La construcción comparativa expresa preferencia por la muerte antes que la desobediencia. «Más bien que transgredir» conserva el registro elevado y legal-moral de παραβαίνω sin suavizarlo.
- source_word: τὴν ἐντολὴν τοῦ θεοῦ
  english_pob_choice: the commandment of God
  chosen_spanish: el mandamiento de Dios
  alternatives_spanish:
  - el mandamiento de Dios
  - el mandato de Dios
  - la orden de Dios
  lexicon: LSJ
  rationale: ἐντολή puede ser «mandamiento» o «mandato». Se eligió «mandamiento de Dios» porque reproduce el tono formal y religioso de la cláusula, y en español suena más bíblico y preciso que «orden».
theological_decisions:
- issue: Cómo renderizar ἑπτάμητωρ sin expandir indebidamente el epiteto
  english_pob_reading: the mother of seven
  chosen_spanish_reading: la madre de siete
  alternative_spanish_readings:
  - la madre de siete hijos
  - la siete veces madre
  rationale: El griego usa un apelativo compacto; el verso ya aclara que son hijos. Mantener «la madre de siete» preserva la densidad retórica y evita sobreexplicar.
  doctrine_reference: Translation philosophy §1, §5
- issue: Registro moral de παραβῆναι τὴν ἐντολὴν τοῦ θεοῦ
  english_pob_reading: to transgress the commandment of God
  chosen_spanish_reading: transgredir el mandamiento de Dios
  alternative_spanish_readings:
  - quebrantar el mandamiento de Dios
  - violar el mandamiento de Dios
  rationale: La escena exalta la fidelidad a la ley divina bajo persecución. «Transgredir» mantiene la gravedad jurídico-moral del verbo sin introducir una interpretación doctrinal ajena.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete (1909) y coincide sustancialmente con la auditoría inglesa; la principal adaptación es idiomática en español para mantener el valor instrumental de διά, la compacidad de ἑπτάμητωρ y el tono moral de παραβῆναι τὴν ἐντολὴν τοῦ θεοῦ. No se detectaron revisiones aplicadas en el historial inglés, así que no se introducen cambios especulativos.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - Se conserva «mandamiento» por su registro bíblico y por la equivalencia con ἐντολή.
  - No se usa «Cristo» ni terminología cristológica en este versículo.
  - «Madre de siete» se conserva como epíteto compacto; el referente a hijos queda especificado por «sus hijos».
