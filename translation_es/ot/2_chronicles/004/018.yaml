translation:
  language: es
  text: Salomón hizo todos estos utensilios en grandísima abundancia, pues no se pudo determinar[a] el peso del bronce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no fue averiguado». El verbo hebreo puede significar «buscar», «averiguar» o «determinar»; el sentido aquí es que el bronce era tan abundante que su peso no fue calculado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - fabricó
  - produjo
  lexicon: HALOT
  rationale: עשה en este contexto denota hacer o producir los objetos del templo. En español, «hizo» es natural, sobrio y fiel al valor básico del verbo sin añadir matices no presentes en la fuente.
- source_word: כָּל הַכֵּלִים הָאֵלֶּה
  english_pob_choice: all these vessels
  chosen_spanish: todos estos utensilios
  alternatives_spanish:
  - todos estos vasos
  - todos estos objetos
  lexicon: HALOT
  rationale: כֵּלִים es un término amplio para implementos o artículos. «Utensilios» conserva amplitud semántica en español y funciona bien en el contexto de objetos del templo; «vasos» sería más estrecho y «objetos» demasiado genérico.
- source_word: לָרֹב מְאֹד
  english_pob_choice: in very great abundance
  chosen_spanish: en muy gran abundancia
  alternatives_spanish:
  - en grandísima abundancia
  - en abundancia muy grande
  lexicon: HALOT
  rationale: La frase expresa cantidad muy grande, no modo. «En muy gran abundancia» mantiene la intensificación de מְאֹד y suena natural en español bíblico contemporáneo, sin perder la fuerza cuantitativa.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la explicación causal de la afirmación anterior. En español, «porque» expresa con claridad esa relación causal; aunque la revisión inglesa prefirió «for» por registro, el español necesita una causal más directa y natural.
- source_word: לֹא נֶחְקַר
  english_pob_choice: could not be determined
  chosen_spanish: no se podía calcular
  alternatives_spanish:
  - no se podía determinar
  - no pudo ser averiguado
  - no se pudo pesquisar
  lexicon: HALOT
  rationale: El nifal de חקר puede significar ‘investigar’, ‘averiguar’ o ‘determinar’. Dado que el contexto trata del peso del bronce, «no se podía calcular» comunica que el peso no fue computado por la enorme cantidad, preservando la idea de que no llegó a fijarse el dato.
- source_word: מִשְׁקַל
  english_pob_choice: the weight
  chosen_spanish: el peso
  alternatives_spanish:
  - la medida por peso
  - la cantidad por peso
  lexicon: HALOT
  rationale: מִשְׁקַל designa peso de manera concreta. «El peso» es la equivalencia directa y clara en español.
- source_word: הַנְּחֹשֶׁת
  english_pob_choice: the bronze
  chosen_spanish: del bronce
  alternatives_spanish:
  - del cobre
  - del metal de bronce
  lexicon: HALOT
  rationale: En contextos del templo, נְחֹשֶׁת suele referirse a bronce más que a cobre puro. «Bronce» sigue el uso bíblico estándar y la decisión del POB en inglés.
theological_decisions:
- issue: Sentido causal de כִּי y relación con la imposibilidad de determinar el peso
  english_pob_reading: for the weight of the bronze could not be determined
  chosen_spanish_reading: porque no se podía calcular el peso del bronce
  alternative_spanish_readings:
  - pues no se podía determinar el peso del bronce
  - ya que el peso del bronce no podía ser averiguado
  rationale: 'No hay un problema doctrinal aquí, pero sí una decisión interpretativa sobre el vínculo lógico del versículo. La lectura causal se conserva: la gran abundancia explica que el peso no fuera calculado. Esto mantiene la tensión lexical del hebreo entre ‘buscar/averiguar’ y ‘determinar’ sin ocultarla.'
  doctrine_reference: None
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente en dos puntos relevantes: refleja מְאֹד con «muy gran abundancia» y conserva una causal explícita para כִּי. Además, mantiene la nota alternativa sobre נֶחְקַר para no borrar la ambigüedad lexical documentada por el POB en inglés.'
  spanish_consistency_notes:
  - Se usó «bronce» de forma consistente con la terminología del POB y con el uso habitual en contextos del templo.
  - Se prefirió «utensilios» para כֵּלִים por amplitud semántica, evitando tanto restricción excesiva como vaguedad.
  - Se mantuvo un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - La nota al pie marca la alternativa lexical principal sin duplicar el marcador en el texto.
