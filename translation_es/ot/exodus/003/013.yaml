translation:
  language: es
  text: 'Entonces Moisés dijo a Dios[a]: «He aquí, cuando yo venga a los hijos de Israel y les diga: “El Dios de sus padres me ha enviado a ustedes”, y ellos me digan: “¿Qué nombre tiene?”, ¿qué les diré?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas»; el hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva marca avance narrativo. «Entonces» comunica bien la secuencia en español sin sonar rígido.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico y moderno.
- source_word: אֶל הָאֱלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Dios
  lexicon: HALOT
  rationale: En español, «a Dios» es la construcción natural para el destinatario del habla. El artículo hebreo no exige «al Dios», que suena forzado.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Observa
  lexicon: HALOT
  rationale: La partícula introduce la situación imaginada con fuerza de atención. «He aquí» preserva el registro elevado y la deixis del hebreo mejor que una expresión demasiado coloquial.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: HALOT
  rationale: El pronombre independiente se expresa naturalmente en español con «yo»; no requiere énfasis adicional en el cuerpo del texto.
- source_word: בָא
  english_pob_choice: come
  chosen_spanish: vaya
  alternatives_spanish:
  - venga
  lexicon: HALOT
  rationale: 'En el escenario proyectado, el español natural usa subjuntivo con valor futuro: «cuando yo vaya». Mantiene la perspectiva de acercamiento hacia Israel.'
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva la formulación masculina plural del hebreo y su matiz familiar. «Israelitas» suaviza la forma pero pierde la literalidad documentada en la POB inglesa.
- source_word: וְאָמַרְתִּי לָהֶם
  english_pob_choice: and say to them
  chosen_spanish: y les diga
  alternatives_spanish:
  - y les diré
  - y les diga a ellos
  lexicon: HALOT
  rationale: El hebreo proyecta un discurso indirecto dentro de la situación futura; en español, el subjuntivo encaja mejor en la subordinación temporal.
- source_word: אֱלֹהֵי אֲבוֹתֵיכֶם
  english_pob_choice: The God of your fathers
  chosen_spanish: El Dios de sus padres
  alternatives_spanish:
  - El Dios de vuestros padres
  - El Dios de sus antepasados
  lexicon: HALOT
  rationale: «Padres» refleja el vocabulario de pacto y continuidad patriarcal. Se prefiere «sus» por el flujo natural del discurso en español; el poseedor sigue siendo plural de segunda persona.
- source_word: שְׁלָחַנִי
  english_pob_choice: has sent me
  chosen_spanish: me ha enviado
  alternatives_spanish:
  - me envió
  lexicon: HALOT
  rationale: El perfecto compuesto expresa una acción cumplida con relevancia presente, concordando con la formulación inglesa auditada.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  lexicon: HALOT
  rationale: En español, el posesivo es la forma natural para el referente divino, sin perder la pregunta explícita por el nombre.
- source_word: מָה אֹמַר אֲלֵהֶם
  english_pob_choice: what shall I say to them?
  chosen_spanish: ¿qué les diré?
  alternatives_spanish:
  - ¿qué debo decirles?
  - ¿qué les diré a ellos?
  lexicon: HALOT
  rationale: La interrogación deliberativa se expresa con futuro simple en español, que aquí suena más natural que un calco modal.
theological_decisions:
- issue: Referencia de הָאֱלֹהִים a Dios en contexto narrativo
  english_pob_reading: to God
  chosen_spanish_reading: a Dios
  alternative_spanish_readings:
  - al Dios
  - a la Deidad
  rationale: El contexto identifica inequívocamente al Dios verdadero; el español no necesita una perífrasis artificial. Se mantiene la referencia personal y concreta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Género y forma colectiva en בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel y de las hijas de Israel
  rationale: La forma hebrea es masculina plural y la POB inglesa preserva esa literalidad. «Los hijos de Israel» conserva el vínculo familiar y el valor colectivo sin neutralizar el género gramatical.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Pregunta por el nombre divino
  english_pob_reading: What is his name?
  chosen_spanish_reading: ¿Cuál es su nombre?
  alternative_spanish_readings:
  - ¿Cómo se llama?
  - ¿Cuál es el nombre de él?
  rationale: La escena gira en torno al nombre, no solo a una identificación vaga. «Cuál es su nombre» conserva la formalidad y la precisión del hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que elevó «Behold» frente a «Look» para reflejar con mayor formalidad הִנֵּה. Por eso se eligió «He aquí» en lugar de una solución más coloquial. También se respetó el énfasis documental en la forma masculina plural de בְּנֵי יִשְׂרָאֵל y la formulación directa de la pregunta por el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים en el habla directa, conforme al uso estable del proyecto.
  - Se conservó «hijos de Israel» como equivalente transparente de la forma hebrea, con nota para la alternativa colectiva.
  - Se evitó «SEÑOR» como sustituto del nombre divino porque este verso usa אֱלֹהִים, no el tetragrámaton.
  - El tono general busca equilibrio óptimo entre literalidad auditable y español natural de lectura pública.
