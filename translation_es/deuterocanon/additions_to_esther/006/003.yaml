revisions:
- from: La pequeña fuente que se convirtió en río es Ester[a], a quien el rey desposó y hizo reina; y había luz, sol y mucha agua.
  to: El pequeño manantial que se convirtió en río es Ester[a], a quien el rey tomó por esposa y hizo reina; y hubo luz, sol y agua abundante.
  rationale: Se ajusta πηγή a 'manantial' para una imagen natural más precisa; se reemplaza 'desposó' por 'tomó por esposa' para mejor legibilidad panhispánica; y se eleva 'mucha agua' a 'agua abundante' para reflejar mejor πολύ y el registro del pasaje. Se conserva la nota sobre la forma más literal del griego.
