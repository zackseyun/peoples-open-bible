id: PHP.2.1
reference: Philippians 2:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Εἴ τις οὖν παράκλησις ἐν Χριστῷ, εἴ τι παραμύθιον ἀγάπης, εἴ τις κοινωνία πνεύματος, εἴ τις σπλάγχνα καὶ οἰκτιρμοί,
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/001.yaml
  text: 'So if there is any encouragement in Messiah[a], if any comfort from love, if any fellowship of the Spirit, if any affection and compassion,'
  footnotes:
  - marker: a
    text: "Or, 'participation in the Spirit'; less likely, 'fellowship in spirit.'"
    reason: alternative_reading
translation:
  language: ko
  text: 그러므로 메시아[a] 안에 어떤 격려가 있고, 사랑에서 오는 어떤 위로가 있고, 성령의 어떤 사귐이 있고, 어떤 애정과 긍휼이 있다면,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그리스도」. Χριστός를 칭호로 옮기는 본 번역의 원칙에 따라 「메시아」로 번역한다.
    reason: lexical_alternative
lexical_decisions:
- source_word: παράκλησις
  english_pob_choice: encouragement
  chosen_korean: 격려
  alternatives_korean:
  - 위로
  - 권면
  - 호소
  lexicon: BDAG
  rationale: παράκλησις는 위로와 권고가 함께 들어 있는 어휘이지만, 본 단락에서 바울은 연합의 동기를 열거하므로 「격려」가 자연스럽다. 같은 절에 παραμύθιον이 별도로 등장하므로 「위로」는 그쪽에 배정해 의미 구분을 보존한다.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_korean: 메시아 안에
  alternatives_korean:
  - 그리스도 안에
  lexicon: BDAG
  rationale: 처격 ἐν을 그대로 보존하고, 칭호 Χριστός는 본 번역의 일관된 원칙에 따라 「메시아」로 옮긴다.
- source_word: παραμύθιον
  english_pob_choice: comfort
  chosen_korean: 위로
  alternatives_korean:
  - 위안
  - 격려
  lexicon: BDAG
  rationale: παράκλησις를 「격려」로 옮겼으므로 παραμύθιον은 「위로」로 옮겨 두 어휘의 의미 구분을 살린다.
- source_word: ἀγάπης
  english_pob_choice: from love
  chosen_korean: 사랑에서 오는
  alternatives_korean:
  - 사랑의
  - 사랑이 주는
  lexicon: BDAG
  rationale: 속격을 출처적 의미로 풀어 한국어로 자연스럽게 옮긴다. 단순 「사랑의 위로」보다 「사랑에서 오는 위로」가 의미가 분명하다.
- source_word: κοινωνία πνεύματος
  english_pob_choice: fellowship of the Spirit
  chosen_korean: 성령의 사귐
  alternatives_korean:
  - 영의 사귐
  - 성령 안의 참여
  lexicon: BDAG
  rationale: 영어 POB와 같이 πνεύματος를 거룩한 영으로 이해해 「성령의 사귐」으로 옮긴다. 「사귐」은 친교의 결속을 가장 자연스럽게 담는 한국어이다.
- source_word: σπλάγχνα
  english_pob_choice: affection
  chosen_korean: 애정
  alternatives_korean:
  - 깊은 정
  - 자비
  - 측은지심
  lexicon: BDAG
  rationale: σπλάγχνα는 본래 내장(內臟)을 가리키지만 관용적으로 깊은 애정·자비를 뜻한다. 「애정」은 한국어로 그 정서적 깊이를 자연스럽게 담는다.
- source_word: οἰκτιρμοί
  english_pob_choice: compassion
  chosen_korean: 긍휼
  alternatives_korean:
  - 자비
  - 측은
  lexicon: BDAG
  rationale: οἰκτιρμοί는 동정·자비의 정형 어휘로, 한국 교회 전통의 「긍휼」이 신학적 무게를 그대로 담는다.
- source_word: οὖν
  english_pob_choice: So
  chosen_korean: 그러므로
  alternatives_korean:
  - 그렇다면
  - 그러니
  lexicon: BDAG
  rationale: 추론적 접속사로, 앞 단락에서 본 단락으로의 논리적 이행을 한국어로 자연스럽게 옮긴다.
theological_decisions:
- issue: πνεύματος가 성령을 가리키는지, 그리고 κοινωνία와의 속격 관계를 어떻게 풀 것인지
  chosen_reading: 성령의 사귐
  alternative_readings:
  - 성령 안의 참여
  - 영의 사귐
  rationale: 일련의 그리스도교적 실재가 열거되는 흐름에서 πνεύματος는 거룩한 영을 가리킬 가능성이 가장 높다. 영어 POB의 선택을 따라 본문은 「성령의 사귐」으로 두되, 다른 가능성을 굳이 배제하지 않는다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
