    issue: La nota [b] está colocada sobre «nuestro ganado» en vez de sobre el verbo «se quedarán».
    rationale: La nota explica que el hebreo dice simplemente «serán» y que el contexto implica «permanecerán allí»; por tanto, el anclaje debe ir en la forma verbal, no en el sustantivo precedente. Tal como está, induce a pensar erróneamente que la nota trata sobre «ganado».
  revised_spanish_text: Nuestros niños pequeños[a], nuestras esposas, nuestro ganado y todos nuestros animales se quedarán[b] allí, en las ciudades de Galaad.
