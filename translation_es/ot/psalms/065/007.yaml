lexical_decisions:
- source_word: מֵכִ֣ין
  english_pob_choice: establishes
  chosen_spanish: afirma
  alternatives_spanish:
  - establece
  - fija
  - asienta
  lexicon: HALOT
  rationale: El participio hifil de כון comunica hacer firme o establecer. En español, «afirma» conserva la idea de dar firmeza y estabilidad a los montes sin sonar forzado. «Establece» también sería posible, pero «afirma» evita una repetición dura con el lenguaje de fuerza del segundo hemistiquio.
- source_word: הָרִ֣ים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - los montes
  - las montañas
  lexicon: HALOT
  rationale: El hebreo designa montañas; «montes» funciona de manera natural en español poético y bíblico. Mantiene el plural de la imagen creada y no cambia el referente.
- source_word: בְּכֹחוֹ
  english_pob_choice: by his power
  chosen_spanish: por su poder
  alternatives_spanish:
  - con su poder
  - por su fuerza
  - con su fuerza
  lexicon: HALOT
  rationale: La preposición instrumental expresa medio o agencia. «Por su poder» reproduce bien ese valor en español y mantiene la relación causal/agentiva que el hebreo sugiere.
- source_word: נֶאְזָר
  english_pob_choice: being girded
  chosen_spanish: ceñido
  alternatives_spanish:
  - ceñido
  - armado
  - preparado
  lexicon: HALOT
  rationale: El participio niphal de אזר conserva la imagen corporal de estar ceñido o equipado. «Ceñido» es breve, poético y fiel al giro metafórico sin convertirlo en una abstracción.
- source_word: בִּגְבוּרָה
  english_pob_choice: with might
  chosen_spanish: de fortaleza
  alternatives_spanish:
  - con poderío
  - con fuerza
  - de poder
  lexicon: HALOT
  rationale: גְבוּרָה puede ser fuerza, poderío o valentía. «Fortaleza» en español transmite robustez y vigor sin duplicar exactamente «poder» del primer hemistiquio. La construcción «ceñido de fortaleza» preserva el carácter metafórico del texto.
theological_decisions:
- issue: Relación entre los dos participios hebreos
  english_pob_reading: 'Render both participles descriptively of God: ''who establishes ... being girded ...'''
  chosen_spanish_reading: 'Presentar ambos miembros como descripciones continuas de Dios: «el que afirma ... ceñido ...»'
  alternative_spanish_readings:
  - «el que establece ... y está ceñido ...»
  - «el que afirma ... siendo ceñido ...»
  rationale: El hebreo encadena dos participios. En español, un participio sustantivado al inicio y otro participio adjetival conservan el flujo poético y la descripción característica, sin introducir una relación verbal distinta a la del original.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Metáfora corporal de la fuerza divina
  english_pob_reading: Preserve the metaphor 'girded with might'
  chosen_spanish_reading: Preservar la imagen «ceñido de fortaleza»
  alternative_spanish_readings:
  - «armado con poder»
  - «lleno de fuerza»
  rationale: El texto hebreo usa una imagen encarnada de equipamiento o ceñido. Mantenerla en español conserva la poesía y evita reducir la afirmación a un enunciado abstracto sobre la omnipotencia.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y coincide con el sentido general del audit trail inglés. Se conserva la secuencia participial y la metáfora de estar ceñido, con una elección española natural para el primer verbo y para גְבוּרָה.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino en la política del proyecto, pero este versículo no contiene el Tetragrámaton explícito.
  - Se mantiene la imagen corporal de «ceñido» para no desactivar la metáfora hebrea.
  - «Fortaleza» se usa aquí como equivalente de גְבוּרָה para evitar una repetición innecesaria de «poder».
