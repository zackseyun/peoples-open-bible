  text: אִ֣ישׁ תַּ֭הְפֻּכוֹת יְשַׁלַּ֣ח מָד֑וֹן וְ֝/נִרְגָּ֗ מַפְרִ֥יד אַלּֽוּף׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/016/028.yaml
  text: A perverse man stirs up strife[c][b][a], and a whisperer separates close friends.
  footnotes:
  - marker: a
    text: Or 'A perverse man sends out contention.' The Hebrew verb is literally 'sends out,' and תַּהְפֻּכוֹת may be rendered 'perversity' or 'crookedness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a gossip' or 'a slanderer.' The Hebrew נִרְגָּן refers to one who speaks covertly in a way that damages relationships.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'an intimate friend' or 'a close companion'; the English plural 'close friends' expresses the proverb's general force.
    reason: lexical_alternative
