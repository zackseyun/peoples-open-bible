lexical_decisions:
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  - se puso a
  lexicon: BDAG
  rationale: El aoristo medio de ἄρχω funciona aquí como introducción narrativa del discurso de Jesús. «Comenzó» mantiene el valor de inicio sin añadir matices coloquiales ni sobrerrepresentar la acción.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ marca continuación narrativa. «Entonces» expresa bien el paso al habla de Jesús en español natural y conserva la progresión del relato.
- source_word: λέγειν
  english_pob_choice: to say
  chosen_spanish: decir
  alternatives_spanish:
  - hablar
  - expresar
  lexicon: BDAG
  rationale: Con ἤρξατο, el infinitivo complementario se traduce naturalmente como «comenzó a decir». «Decir» encaja mejor con la cita directa que sigue.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - les
  - a los presentes
  lexicon: BDAG
  rationale: La construcción con πρός y acusativo señala el destinatario del discurso. «A ellos» es directo y refleja la referencia inmediata al auditorio.
- source_word: Σήμερον
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  lexicon: BDAG
  rationale: El adverbio es temporal y enfático. «Hoy» es la equivalencia natural en español y preserva la inmediatez de la afirmación.
- source_word: πεπλήρωται
  english_pob_choice: has been fulfilled
  chosen_spanish: se ha cumplido
  alternatives_spanish:
  - ha sido cumplida
  - está cumplida
  lexicon: BDAG
  rationale: El perfecto pasivo de πληρόω expresa una acción completada con resultado vigente. «Se ha cumplido» comunica esa idea en español de manera idiomática y evita una formulación rígida.
- source_word: ἡ γραφὴ αὕτη
  english_pob_choice: this Scripture
  chosen_spanish: esta Escritura
  alternatives_spanish:
  - este pasaje de la Escritura
  - este escrito
  lexicon: BDAG
  rationale: γραφή aquí remite al texto sagrado recién leído. «Esta Escritura» conserva el referente sacro y sigue de cerca la formulación del griego sin sonar forzado.
- source_word: ἐν τοῖς ὠσὶν ὑμῶν
  english_pob_choice: in your hearing
  chosen_spanish: en vuestros oídos
  alternatives_spanish:
  - en vuestra audición
  - mientras la oís
  lexicon: BDAG
  rationale: Aunque la POB inglesa opta por una equivalencia funcional, el griego dice literalmente «en vuestros oídos». En español, conservar esa imagen respeta mejor la forma de la expresión y mantiene la tensión interpretativa del dicho.
theological_decisions:
- issue: Modo de expresar el cumplimiento de la Escritura
  english_pob_reading: Render Jesus' statement as a present declaration of scriptural fulfillment without expanding what or how the fulfillment occurs.
  chosen_spanish_reading: Jesús declara el cumplimiento presente de la Escritura sin añadir explicaciones sobre el modo o el agente del cumplimiento.
  alternative_spanish_readings:
  - Hoy esta profecía se cumple por mí.
  - Hoy se cumple esta Escritura en mi persona.
  rationale: El griego afirma el cumplimiento de «esta Escritura» y sitúa esa realidad en el presente, pero no añade «profecía», «por mí» ni una explicación causal explícita. La traducción mantiene esa fuerza teológica sin resolver la tensión interpretativa más allá del texto.
  doctrine_reference: Principio de primacía del texto original; preservar la tensión hermenéutica sin expansión interpretativa.
translation_notes:
  revision_awareness: No se registran revisiones en el paquete auditado; el texto inglés más reciente permanece sin cambios, y la versión española sigue la misma lectura con una decisión más literal en la expresión idiomática final.
  spanish_consistency_notes:
  - Se mantiene «Escritura» para γραφή en coherencia con el contexto bíblico y el audit trail inglés.
  - Se usa «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se preserva la tensión de la imagen «en vuestros oídos» mediante nota, sin sustituirla en el cuerpo del texto por una paráfrasis interpretativa.
