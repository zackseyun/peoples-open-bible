base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/025/030.yaml
  text: And when Yahweh has done for my lord according to all the good that he spoke concerning you[a], and has appointed you ruler over Israel[b],
  footnotes:
  - marker: a
    text: Or 'the good he promised you.' The Hebrew says literally 'the good' that the LORD spoke concerning David.
    reason: lexical_alternative
  - marker: b
    text: Or 'has commanded/charged you to be leader over Israel.' The verb can mean 'command,' but here likely carries the sense of appointing or commissioning to rule.
    reason: alternative_reading
