translation:
  language: es
  text: 'los hijos de los siervos de Salomón: los hijos de Sotai[a], los hijos de Hassophereth, los hijos de Peruda.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo de Esdras: Peruda; la lista paralela en Nehemías 7:57 tiene Perida.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de
  lexicon: HALOT
  rationale: En este contexto genealógico y de lista, בְּנֵי funciona como fórmula de pertenencia a un linaje o grupo. «Los hijos de» conserva la repetición y la estructura formal del hebreo, y en español puede leerse de manera colectiva dentro de una lista administrativa.
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: servidores
  alternatives_spanish:
  - esclavos
  - siervos
  lexicon: HALOT
  rationale: El inglés POB eligió «servants» para esta designación fija de un grupo vinculado a Salomón. En español, «servidores» mantiene el valor funcional y el tono administrativo de la lista, evitando «esclavos», que sería demasiado fuerte para una etiqueta de clan, y «siervos», que puede sonar más devocional o eclesiástico.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  lexicon: HALOT
  rationale: Nombre propio bíblico con equivalencia estándar en español.
- source_word: סֹטַי
  english_pob_choice: Sotai
  chosen_spanish: Sotai
  alternatives_spanish:
  - Sotay
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente; se conserva la forma breve y reconocible sin intentar interpretarlo.
- source_word: הַסֹּפֶרֶת
  english_pob_choice: Hassophereth
  chosen_spanish: Hassophereth
  alternatives_spanish:
  - Has-sophereth
  - Sophereth
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre/formulario hebreo con el artículo integrado. No se traduce como sustantivo común porque en la lista funciona como designación familiar.
- source_word: פְרוּדָא
  english_pob_choice: Peruda
  chosen_spanish: Peruda
  alternatives_spanish:
  - Perida
  lexicon: HALOT
  rationale: La lectura hebrea de Esdras es פְרוּדָא, por lo que el texto principal sigue esa forma. Se mantiene la transliteración española regularizada con base en la lectura masorética.
theological_decisions:
- issue: Nombre del grupo «servants of Solomon»
  english_pob_reading: a fixed administrative/genealogical label, not a doctrinal statement about slavery or ministry office
  chosen_spanish_reading: 'un rótulo genealógico/administrativo: «los hijos de los servidores de Salomón»'
  alternative_spanish_readings:
  - «los hijos de los esclavos de Salomón»
  - «los hijos de los siervos de Salomón»
  rationale: No se introduce una lectura doctrinal nueva. La expresión se trata como etiqueta de lista, no como afirmación teológica sobre el estado espiritual o social del grupo. «Servidores» conserva la neutralidad contextual del inglés POB sin intensificar innecesariamente el estatus de dependencia.
  doctrine_reference: Neutralidad contextual en listas genealógicas; cf. el uso administrativo de genealogías en Esdras/Nehemías.
translation_notes:
  revision_awareness: La versión española sigue de cerca la lectura final del inglés POB y mantiene la nota de variante textual para el nombre final. No se detectan revisiones sustantivas en el auditoría; por eso la redacción conserva la cadencia de lista y la transliteración estable de los nombres propios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en otros contextos del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita «SEÑOR» y «Cristo» porque no aparecen en el texto fuente.
  - La nota a pie de página se ancla en «Peruda» para reflejar la variante con Nehemías 7:57.
