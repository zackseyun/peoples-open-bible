translation:
  language: es
  text: Y les disparamos[a]; Hesbón ha perecido hasta Dibón, y devastamos hasta Nofá[b], que se extiende hasta Medebá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo del inicio es difícil y se ha entendido de varias maneras, entre ellas «los derribamos» o «su dominio pereció».
    reason: textual_variant
  - marker: b
    text: La cláusula traducida «devastamos» también es incierta; algunos analizan la forma de otro modo, pero el contexto favorece un verbo de devastación en este canto de victoria.
    reason: textual_variant
lexical_decisions:
- source_word: וַנִּירָם
  english_pob_choice: And we shot at them
  chosen_spanish: Y los herimos[a]
  alternatives_spanish:
  - Y los abatimos[a]
  - Y los derribamos[a]
  - Y dispararon contra ellos[a]
  lexicon: HALOT
  rationale: El hebreo es difícil y la forma admite varias lecturas. En español, "los herimos" conserva la imagen de acción militar breve y fuerte sin fijar demasiado una reconstrucción demasiado específica. Se mantiene la incertidumbre con nota, como en el POB inglés.
- source_word: אָבַד
  english_pob_choice: has perished
  chosen_spanish: ha perecido
  alternatives_spanish:
  - ha sido destruido
  - se ha perdido
  lexicon: HALOT
  rationale: '"Perecer" reproduce bien el valor perfecto y el tono poético de derrota total.'
- source_word: חֶשְׁבּוֹן
  english_pob_choice: Heshbon
  chosen_spanish: Hesbón
  alternatives_spanish:
  - Hesebón
  - Heshbón
  lexicon: transliteración estándar
  rationale: Se translitera el nombre propio al español con adaptación fonética natural.
- source_word: עַד דִּיבוֹן
  english_pob_choice: as far as Dibon
  chosen_spanish: hasta Dibón
  alternatives_spanish:
  - hasta Dibon
  - a Dibón
  lexicon: HALOT
  rationale: '"Hasta" expresa alcance territorial de forma natural en español y conserva el sentido de extensión.'
- source_word: וַנַּשִּׁים
  english_pob_choice: and we laid waste
  chosen_spanish: y hemos devastado
  alternatives_spanish:
  - y arrasamos
  - y desolamos
  lexicon: HALOT
  rationale: La forma es incierta, pero el contexto de canto de victoria favorece un verbo de devastación. "Devastado" mantiene fuerza militar y evita un giro demasiado interpretativo.
- source_word: עַד נֹפַח
  english_pob_choice: as far as Nophah
  chosen_spanish: hasta Nofá[b]
  alternatives_spanish:
  - hasta Nofaj[b]
  - hasta Nofa[b]
  lexicon: HALOT
  rationale: Nombre propio transliterado; se adapta la forma a una pronunciación española clara.
- source_word: אֲשֶׁר עַד מֵידְבָא
  english_pob_choice: which reaches to Medeba
  chosen_spanish: que se extiende hasta Mebá
  alternatives_spanish:
  - que llega hasta Medebá
  - que alcanza hasta Medebá
  lexicon: HALOT
  rationale: La cláusula relativa expresa alcance geográfico. "Se extiende hasta" es una solución natural en español y preserva la relación territorial.
- source_word: מֵידְבָא
  english_pob_choice: Medeba
  chosen_spanish: Mebá
  alternatives_spanish:
  - Medebá
  - Midebá
  lexicon: transliteración estándar
  rationale: Se adapta el topónimo a una forma breve y pronunciable en español, siguiendo la transliteración del nombre propio.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la lectura auditada del POB inglés. Se conserva la ambigüedad inicial y la de la segunda forma verbal mediante nota, sin borrar la tensión léxica documentada. No se aplicaron revisiones posteriores al texto base, y el expediente de revisión indica que no hubo cambios necesarios.
  spanish_consistency_notes:
  - Se usa «hasta» para עַד en ambos segmentos por consistencia de alcance territorial.
  - Se mantienen nombres propios transliterados con acento gráfico español cuando corresponde.
  - Se conserva el tono poético de victoria con verbos perfectivos en pasado compuesto o perfecto según fluidez del español.
  - Se evita normalizar la primera cláusula hacia una sola reconstrucción interpretativa, respetando la incertidumbre del hebreo.
