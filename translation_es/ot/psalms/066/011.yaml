translation:
  language: es
  text: Tú nos metiste en la red[a]; pusiste aflicción sobre nuestros lomos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la fortaleza» o «en la trampa»; el hebreo מְצוּדָה puede designar un lugar de captura o confinamiento.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «lomos»; es decir, la zona lumbar o de la cintura. Se conserva la imagen corporal de una carga puesta sobre el cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲבֵאתָנוּ
  english_pob_choice: You brought us
  chosen_spanish: Tú nos has llevado
  alternatives_spanish:
  - Tú nos has traído
  - Tú nos has hecho entrar
  lexicon: HALOT
  rationale: El hifil de בוא expresa causar la entrada o llevar a alguien a un lugar. «Has llevado» conserva la agencia directa de Dios y suena natural en español bíblico contemporáneo.
- source_word: בַמְּצוּדָה
  english_pob_choice: into the net
  chosen_spanish: a la red
  alternatives_spanish:
  - al fuerte
  - a la fortaleza
  - a la trampa
  lexicon: HALOT
  rationale: מְצוּדָה puede referirse a una red, trampa o fortaleza. En este contexto de constricción y captura, «red» comunica mejor la imagen de quedar atrapados, manteniendo la ambigüedad lexical documentada.
- source_word: שַׂמְתָּ
  english_pob_choice: you laid
  chosen_spanish: has puesto
  alternatives_spanish:
  - has colocado
  - has puesto sobre nosotros
  lexicon: HALOT
  rationale: שׂים significa poner o colocar. «Has puesto» es la forma más directa y natural para el gesto de imponer una carga o aflicción.
- source_word: מוּעָקָה
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - angustia
  - opresión
  - presión
  - carga
  lexicon: HALOT
  rationale: El sustantivo denota presión, estrechez o angustia impuesta. «Aflicción» preserva el sentido de sufrimiento y mantiene un registro solemne.
- source_word: בְמָתְנֵינוּ
  english_pob_choice: on our loins
  chosen_spanish: sobre nuestros lomos
  alternatives_spanish:
  - sobre nuestros riñones
  - sobre nuestra cintura
  - sobre nuestras caderas
  lexicon: HALOT
  rationale: מָתְנַיִם designa literalmente los lomos o la zona de la cintura. «Lomos» conserva la imagen corporal tradicional y formal que la POB preserva con «loins».
theological_decisions:
- issue: Atribución directa a Dios del encierro y la aflicción
  english_pob_reading: Direct second-person address to God as the one who brought the people into confinement and laid affliction on them
  chosen_spanish_reading: Atribución directa a Dios como quien nos llevó a la red y puso aflicción sobre nosotros
  alternative_spanish_readings:
  - 'Una redacción suavizada: «caímos en una red»'
  - «la aflicción vino sobre nosotros»
  rationale: El hebreo usa verbos en segunda persona dirigidos a Dios. La traducción mantiene esa tensión teológica sin suavizarla ni desplazar la agencia divina hacia una formulación impersonal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «hips» por «loins» para mayor precisión y formalidad. En español se siguió ese ajuste con «lomos», que conserva el nivel formal y la imagen corporal del original, mientras que la elección de «red» refleja la decisión inglesa auditada para מְצוּדָה sin perder la ambigüedad registrada.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo en segunda persona singular («Tú ... has»), coherente con el hebreo.
  - «Red» traduce la imagen de captura preferida en el contexto, pero la nota conserva las alternativas auditadas.
  - «Lomos» evita diluir la imaginería corporal del verso y armoniza con la revisión inglesa final.
  - No se usa «SEÑOR» como máscara del nombre divino porque aquí el texto hebreo no contiene el tetragrámaton.
