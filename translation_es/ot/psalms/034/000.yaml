translation:
  language: es
  text: De David[a], cuando cambió su comportamiento delante de Abimelec, y Abimelec lo expulsó, y él se fue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abimelec se identifica con Aquis en 1 Samuel 21:10–15; «Abimelec» aquí puede ser un nombre alternativo o un título real.
    reason: alternative_reading
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: HALOT
  rationale: El לְ con nombre propio en los encabezamientos de Salmos admite una relación amplia; “De David” conserva esa ambigüedad de autoría/asociación mejor que restringirla a una sola relación preposicional.
- source_word: בְּשַׁנּוֹתוֹ
  english_pob_choice: when he changed
  chosen_spanish: cuando cambió
  alternatives_spanish:
  - al cambiar
  - cuando alteró
  lexicon: HALOT
  rationale: El infinitivo con ב tiene aquí valor temporal. “Cuando cambió” expresa de forma natural el sentido sin forzar una construcción más literal pero menos idiomática en español.
- source_word: טַעְמוֹ
  english_pob_choice: his behavior
  chosen_spanish: su manera de comportarse
  alternatives_spanish:
  - su conducta
  - su juicio
  - su sentido
  - su gusto
  lexicon: HALOT
  rationale: Aunque el sustantivo puede relacionarse con “gusto” o “discernimiento”, en este dicho remite al comportamiento externo o a la apariencia de cordura. “Su manera de comportarse” mantiene esa idea sin introducir un matiz clínico que el contexto no exige.
- source_word: לִפְנֵי אֲבִימֶלֶךְ
  english_pob_choice: before Abimelech
  chosen_spanish: delante de Abimelec
  alternatives_spanish:
  - en presencia de Abimelec
  - ante Abimelec
  lexicon: HALOT
  rationale: “Delante de” conserva el valor espacial/social de la preposición y suena natural en español. Se translitera el nombre como Abimelec en la línea principal, siguiendo la lectura hebrea.
- source_word: וַיְגָרֲשֵׁהוּ
  english_pob_choice: and he drove him away
  chosen_spanish: y lo expulsó
  alternatives_spanish:
  - y lo echó
  - y lo echó fuera
  - y lo despidió
  lexicon: HALOT
  rationale: El verbo significa “expulsar / echar fuera / alejar”. “Lo expulsó” recoge bien la fuerza verbal y evita ambigüedad sobre quién sale de la escena.
- source_word: וַיֵּלַךְ
  english_pob_choice: and he went away
  chosen_spanish: y él se fue
  alternatives_spanish:
  - y se fue
  - y salió
  - y se marchó
  lexicon: HALOT
  rationale: El verbo simple “ir” queda bien en español como “se fue”. Se explicita el pronombre para que quede claro que el sujeto sigue siendo David.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimelek
  lexicon: HALOT
  rationale: Se prefiere la forma española habitual Abimelec para lectura eclesial en español, manteniendo la transliteración del nombre hebreo en lugar de sustituirlo por el nombre histórico armonizado.
theological_decisions:
- issue: Identificación histórica de Abimelec con Aquis
  english_pob_reading: Retain 'Abimelech' in the main text; footnote the identification with Achish in 1 Samuel 21:10–15.
  chosen_spanish_reading: Mantener Abimelec en el texto principal y aclarar en nota su identificación probable con Aquis en 1 Samuel 21:10–15.
  alternative_spanish_readings:
  - Sustituir Abimelec por Aquis en el texto
  - Dejar la identificación sin nota
  rationale: La prioridad del texto hebreo requiere no armonizar la superscripción con 1 Samuel dentro del cuerpo principal. La identificación histórica es relevante, pero debe preservarse como nota para no borrar la tensión documental entre los pasajes.
  doctrine_reference: Principio de primacía del texto original; conservar la tensión textual e histórica sin resolverla por sustitución.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente cambió una relación de propósito (“so that”) por mera secuencia narrativa (“and”), para reflejar mejor el hebreo. La redacción española sigue esa decisión con coordinaciones simples: “y lo expulsó, y él se fue”, sin introducir finalidad.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma preferida para el nombre divino, aunque este versículo no lo contiene.
  - Se conserva una transliteración española estable de nombres propios bíblicos (Abimelec).
  - La formulación de la nota preserva la alternativa histórica sin reemplazar el nombre del texto hebreo en el cuerpo principal.
