translation:
  language: es
  text: Se agazapa[a]; se inclina[b], y los desvalidos caen por su poder[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se encorva». El hebreo de este verso es difícil y puede describir una postura de acecho depredador.
    reason: lexical_alternative
  - marker: b
    text: O «se encorva» o «se agacha».
    reason: lexical_alternative
  - marker: c
    text: La expresión hebrea es difícil. También puede entenderse como «por sus poderosos», «por su fuerza» o, metafóricamente, «en sus garras fuertes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ו/דכה
  english_pob_choice: He crouches
  chosen_spanish: Se agazapa
  alternatives_spanish:
  - Se encorva
  - Se agacha
  - Se aplasta
  lexicon: HALOT
  rationale: El contexto inmediato presenta una imagen de acecho depredador. «Se agazapa» comunica mejor esa postura baja y tensa que «se aplasta», que suena pasivo, o una simple «se encorva», que puede perder el matiz de acecho.
- source_word: יָשֹׁחַ
  english_pob_choice: he bows down
  chosen_spanish: se encorva
  alternatives_spanish:
  - se inclina
  - se agacha
  - se dobla
  lexicon: HALOT
  rationale: El verbo expresa doblarse o bajar el cuerpo. «Se encorva» conserva la imagen física y sugiere continuidad con el primer verbo sin forzar una lectura moral o litúrgica.
- source_word: וְ/נָפַ֥ל
  english_pob_choice: and the helpless fall
  chosen_spanish: y los desvalidos caen
  alternatives_spanish:
  - y cae
  - y los débiles caen
  - y los afligidos caen
  lexicon: HALOT
  rationale: Aunque la forma verbal es 3ms, el sentido en el contexto es sintácticamente comprimido. La POB inglesa toma como sujeto implícito a los vulnerables, y «los desvalidos» comunica bien esa referencia social.
- source_word: בַּ֝/עֲצוּמָ֗י/ו
  english_pob_choice: by his might
  chosen_spanish: por su poder
  alternatives_spanish:
  - por su fuerza
  - por sus poderosos
  - por sus fuertes
  lexicon: HALOT
  rationale: La forma plural con sufijo 3ms es difícil. La lectura más natural en español, siguiendo la revisión inglesa, es una abstracción de poder/fortaleza del malvado. «Por su poder» mantiene la ambigüedad sin introducir una paráfrasis excesiva.
- source_word: חלכאים
  english_pob_choice: the helpless
  chosen_spanish: los desvalidos
  alternatives_spanish:
  - los indefensos
  - los débiles
  - los afligidos
  lexicon: HALOT
  rationale: El término refiere a personas socialmente vulnerables. «Desvalidos» es natural, digno y transmite la idea de falta de apoyo o protección.
theological_decisions:
- issue: Imagen del malvado como depredador frente a los vulnerables
  english_pob_reading: The wicked crouches and bows down; the helpless fall by his might.
  chosen_spanish_reading: El malvado se presenta como una figura agazapada y opresora, mientras los vulnerables caen por su poder.
  alternative_spanish_readings:
  - El malvado se inclina y los desvalidos caen por su fuerza.
  - El malvado se agazapa y los débiles caen bajo su dominio.
  rationale: La POB inglesa preserva la imagen de acecho y la relación de poder entre el malvado y los vulnerables. La traducción española mantiene esa tensión sin suavizarla ni convertirla en una descripción neutra.
  doctrine_reference: Sal 10:2, 8-10; Prov 1:11-19
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó el segundo miembro desde 'by his strength' a 'by his might' para mayor naturalidad, pero mantuvo la misma dificultad hebrea. La versión española sigue esa decisión con «por su poder», conservando la abstracción y la ambigüedad del sintagma hebreo.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece el Tetragrámaton en este verso.
  - Se evita «Mesías/Cristo» porque no hay lenguaje mesiánico en el pasaje.
  - «Desvalidos» se usa de forma consistente para חלכאים, con matiz de vulnerabilidad social más que mera debilidad física.
