revisions:
- from: Asimismo, hasta cien coros de trigo y cien medidas de vino.
  to: Asimismo, hasta cien cors de trigo y cien medidas de vino.
  rationale: 'Se corrige únicamente la forma de la unidad antigua de capacidad seca: «coros» → «cors». Esto preserva mejor el sentido técnico de κόρος, evita una palabra engañosa en español, y mantiene la distinción con «medidas» para μετρητῶν según la revisión inglesa final. No hacen falta notas porque el borrador original no las tenía y el texto revisado sigue siendo comprensible sin añadir aparato adicional.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:13:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: ὁμοίως = «Asimismo», ἕως = «hasta», πυροῦ = «trigo», οἴνου = «vino», y mantiene el contraste entre κόρος como unidad específica y μετρητής como medida genérica. Sin embargo, «coros» no es una forma adecuada para la unidad antigua κόρος en español; induce confusión con «coros» (grupos que cantan) y no preserva bien la terminología técnica que el POB en inglés retuvo como «cors».'
  spanish_quality_summary: 'La frase es clara y natural en español formal. El único problema de calidad es léxico-terminológico: «cien coros de trigo» suena extraño y potencialmente equívoco. «Cien cors de trigo» es más fiel al término técnico conservado en la auditoría inglesa y más adecuado para una transliteración de medida antigua. El resto del texto es legible y digno.'
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. La decisión entre una unidad específica y una genérica sí importa: debe conservarse la unidad antigua para κόρος, mientras que μετρητῶν puede mantenerse como «medidas» siguiendo la revisión inglesa final. Esto respeta la racionalidad léxica documentada.'
  issues:
  - severity: medium
    issue: «coros» como traducción de κόρων
    rationale: Aunque se intentó transliterar la unidad antigua, «coros» en español se asocia fuertemente con conjuntos vocales y no funciona bien como nombre de medida. La auditoría inglesa preserva el tecnicismo como «cors»; en español, «cors» evita la falsa familiaridad y conserva mejor el carácter de unidad antigua no explicada en el cuerpo del texto.
  revised_spanish_text: Asimismo, hasta cien cors de trigo y cien medidas de vino.
  revision_rationale: 'Se corrige únicamente la forma de la unidad antigua de capacidad seca: «coros» → «cors». Esto preserva mejor el sentido técnico de κόρος, evita una palabra engañosa en español, y mantiene la distinción con «medidas» para μετρητῶν según la revisión inglesa final. No hacen falta notas porque el borrador original no las tenía y el texto revisado sigue siendo comprensible sin añadir aparato adicional.'
