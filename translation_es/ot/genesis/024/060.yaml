revisions:
- from: 'Y la bendijeron y le dijeron: «Nuestra hermana, que llegues a ser miles de miríadas[a], y que tu descendencia posea la puerta de los que la odian[b]».'
  to: 'Y bendijeron a Rebeca y le dijeron: «Nuestra hermana, que llegues a ser miles de decenas de millar[a], y que tu descendencia posea la puerta de los que los odian[b]».'
  rationale: Se corrige el referente del pronombre final para que apunte a la descendencia y no a Rebeca, en línea con el hebreo y la revisión inglesa final. También se sustituye «miles de miríadas» por una formulación más literal de לְאַלְפֵי רְבָבָה en el texto principal, dejando «miríadas» como alternativa en nota. Se pulen las notas para mantener fidelidad y buen español.
