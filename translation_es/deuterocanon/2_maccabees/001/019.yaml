    text: 'O: «eran deportados a Persia». El verbo griego puede denotar ser llevado o arrastrado al exilio.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y precisión del español: «lo resguardaron» comunica mejor el sentido de κατησφαλίσαντο en contexto, y «para que nadie supiera dónde estaba el lugar» expresa de manera idiomática el propósito de que el sitio permaneciera desconocido para todos. Se mantuvo la nota léxica existente sobre ἤγοντο.'
