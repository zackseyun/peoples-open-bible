translation:
  language: es
  text: Estas son las generaciones de Noé. Noé fue un hombre justo[a], intachable en su generación. Noé caminó con Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre sus contemporáneos» o «en su tiempo».
    reason: alternative_reading
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Esto es
  lexicon: HALOT
  rationale: El deíctico plural introduce un nuevo encabezado seccional; en español, «Estas son» mantiene la pluralidad y suena natural.
- source_word: תּוֹלְדֹת
  english_pob_choice: the generations of
  chosen_spanish: las generaciones de
  alternatives_spanish:
  - el relato de
  - la historia de
  - los descendientes de
  lexicon: HALOT
  rationale: «Generaciones» conserva la señal estructural de toledot en Génesis y permite que el encabezado siga siendo visible sin reducirlo a una sola paráfrasis.
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noah
  lexicon: HALOT
  rationale: Nombre propio bíblico adaptado al uso corriente del español.
- source_word: אִישׁ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino singular y aquí caracteriza a Noé como individuo varón; «hombre» es fiel y natural.
- source_word: צַדִּיק
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  lexicon: HALOT
  rationale: «Justo» comunica la valoración ética/covenantal del texto. En español bíblico es una equivalencia sólida y transparente.
- source_word: תָּמִים
  english_pob_choice: blameless
  chosen_spanish: intachable
  alternatives_spanish:
  - íntegro
  - sin tacha
  - perfecto
  lexicon: HALOT
  rationale: «Intachable» expresa integridad moral sin sugerir perfección sin pecado; conserva la tensión que el hebreo permite mejor que «perfecto».
- source_word: בְּדֹרֹתָיו
  english_pob_choice: in his generation
  chosen_spanish: en su generación
  alternatives_spanish:
  - entre sus contemporáneos
  - en su tiempo
  - en sus generaciones
  lexicon: HALOT
  rationale: La revisión inglesa prefirió el singular por naturalidad y por probable sentido idiomático. En español, «en su generación» mantiene esa lectura y sigue dejando visible la posible referencia contextual al entorno de Noé.
- source_word: אֶת הָאֱלֹהִים
  english_pob_choice: with God
  chosen_spanish: con Dios
  alternatives_spanish:
  - con el Dios verdadero
  lexicon: HALOT
  rationale: Con el verbo de caminar, la expresión es idiomática; «con Dios» reproduce la relación personal y evita añadir explicaciones no requeridas.
- source_word: הִתְהַלֶּךְ
  english_pob_choice: walked
  chosen_spanish: caminó
  alternatives_spanish:
  - anduvo
  - vivió
  - se condujo
  lexicon: HALOT
  rationale: «Caminó» preserva la metáfora bíblica de conducta y trato continuo con Dios. En español es comprensible y no exige reemplazo interpretativo.
theological_decisions:
- issue: Alcance de תָּמִים aplicado a Noé
  english_pob_reading: blameless as a description of integrity, not absolute sinlessness
  chosen_spanish_reading: intachable como descripción de integridad, no de perfección sin pecado
  alternative_spanish_readings:
  - perfecto
  - sin culpa
  - sin pecado
  rationale: El texto elogia la integridad de Noé frente a una generación corrompida; «intachable» evita importar una doctrina de impecabilidad que el hebreo no exige.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
- issue: Fuerza de בְּדֹרֹתָיו
  english_pob_reading: retain the more literal 'in his generations' in the main text
  chosen_spanish_reading: mantener «en su generación» en el texto principal
  alternative_spanish_readings:
  - entre sus contemporáneos
  - en sus generaciones
  - en su tiempo
  rationale: La frase es ambigua; la forma singular en español sigue la revisión inglesa y es idiomática, pero no elimina por completo la posibilidad de una referencia al entorno histórico de Noé.
  doctrine_reference: Preservar la ambigüedad interpretativa del texto fuente.
translation_notes:
  revision_awareness: La redacción refleja la revisión más reciente del POB inglés, que cambió «in his generations» por «in his generation» para mayor naturalidad y para reflejar el probable sentido singular del hebreo, manteniendo sin cambios el resto del versículo salvo ajustes mínimos de estilo en español.
  spanish_consistency_notes:
  - Se conserva «generaciones» en el encabezado de toledot por su valor estructural en Génesis.
  - «Con Dios» y «caminó» mantienen la imagen relacional y metafórica del hebreo.
  - El adjetivo «intachable» evita tanto la suavización excesiva como la afirmación doctrinal de sin pecado.
