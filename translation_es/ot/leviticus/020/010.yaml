translation:
  language: es
  text: Si un hombre comete adulterio con la mujer de otro hombre —si comete adulterio con la mujer de su prójimo[a]—, el adúltero y la adúltera ciertamente serán condenados a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «con la mujer de un hombre ... con la mujer de su prójimo». La repetición intensifica y aclara la ofensa en estilo legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִישׁ
  english_pob_choice: If a man
  chosen_spanish: Si un hombre
  alternatives_spanish:
  - Y un hombre
  - Un hombre
  lexicon: HALOT
  rationale: La construcción casuística del hebreo introduce una ley condicional. En español, «Si un hombre» comunica con naturalidad ese valor condicional y conserva el masculino singular del caso legal.
- source_word: אֲשֶׁר
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - que
  - quien
  lexicon: HALOT
  rationale: Aunque formalmente es un relativo, en este contexto legal funciona de manera condicional o explicativa. «Si» reproduce mejor la estructura de la norma que un relativo más literal en español.
- source_word: יִנְאַף
  english_pob_choice: commits adultery
  chosen_spanish: comete adulterio
  alternatives_spanish:
  - adultera
  - tiene relaciones ilícitas
  lexicon: HALOT
  rationale: נאף designa específicamente adulterio. «Comete adulterio» es la equivalencia clara y precisa en español, sin diluir el alcance jurídico del verbo.
- source_word: אֶת אֵשֶׁת אִישׁ
  english_pob_choice: with another man's wife
  chosen_spanish: con la mujer de otro hombre
  alternatives_spanish:
  - con la esposa de otro hombre
  - con la mujer de un hombre
  lexicon: HALOT
  rationale: El hebreo dice literalmente «la mujer de un hombre». «La mujer de otro hombre» conserva el sentido relacional y evita una expansión interpretativa innecesaria; «esposa» sería posible, pero el hebreo usa una formulación más general que el español puede reflejar bien con «mujer».
- source_word: אֲשֶׁר יִנְאַף אֶת אֵשֶׁת רֵעֵהוּ
  english_pob_choice: if he commits adultery with his neighbor's wife
  chosen_spanish: si comete adulterio con la mujer de su prójimo
  alternatives_spanish:
  - si comete adulterio con la mujer de su vecino
  - si comete adulterio con la esposa de su prójimo
  lexicon: HALOT
  rationale: La repetición hebrea intensifica y aclara la ofensa. «Prójimo» es una opción tradicional y adecuada para רֵעַ en contexto legal/covenantal, equivalente al «neighbor» del POB inglés. Se preserva la repetición del caso sin volverlo rígidamente mecánico.
- source_word: רֵעֵהוּ
  english_pob_choice: his neighbor
  chosen_spanish: su prójimo
  alternatives_spanish:
  - su vecino
  - su semejante
  - su fellow
  lexicon: HALOT
  rationale: «Prójimo» comunica el sentido de miembro cercano de la comunidad, no solo vecino geográfico. En este contexto jurídico, es la opción más natural y reconocible en español bíblico contemporáneo.
- source_word: מוֹת יוּמַת
  english_pob_choice: shall surely be put to death
  chosen_spanish: ciertamente serán muertos
  alternatives_spanish:
  - serán ciertamente puestos a muerte
  - deberán morir
  - serán ejecutados
  lexicon: HALOT
  rationale: La forma hebrea es un infinitivo absoluto con verbo finito que intensifica la pena. «Ciertamente serán muertos» conserva la fuerza enfática y el registro legal sin especificar el medio de ejecución, como hace el texto.
- source_word: הַנֹּאֵף
  english_pob_choice: the adulterer
  chosen_spanish: el adúltero
  alternatives_spanish:
  - el que comete adulterio
  - el marido adúltero
  lexicon: HALOT
  rationale: El participio sustantivado identifica al culpable masculino. «El adúltero» es la correspondencia breve y precisa en español.
- source_word: וְהַנֹּאָפֶת
  english_pob_choice: and the adulteress
  chosen_spanish: y la adúltera
  alternatives_spanish:
  - y la mujer que comete adulterio
  - y la adúltera mujer
  lexicon: HALOT
  rationale: El participio sustantivado femenino incluye explícitamente a la mujer culpable. «La adúltera» conserva la simetría con el masculino y la precisión legal del hebreo.
theological_decisions:
- issue: Lenguaje legal con género explícito
  english_pob_reading: Retained masculine 'man' and explicit male/female offender terms ('adulterer' / 'adulteress').
  chosen_spanish_reading: Se mantiene «hombre» y se nombran explícitamente «el adúltero» y «la adúltera».
  alternative_spanish_readings:
  - Si alguien comete adulterio... la persona culpable será muerta
  - Si un hombre comete adulterio... los culpables serán muertos
  rationale: El hebreo formula tanto el caso como la sanción de manera marcada por género. Para respetar el texto y la audibilidad jurídica, se conserva esa especificidad en lugar de neutralizarla con una paráfrasis inclusiva.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Fórmula de pena capital
  english_pob_reading: Rendered the penalty as 'shall surely be put to death' without specifying method.
  chosen_spanish_reading: «ciertamente serán muertos» sin especificar el modo de ejecución.
  alternative_spanish_readings:
  - serán puestos a muerte
  - serán ejecutados
  rationale: El hebreo afirma con énfasis la pena de muerte, pero no indica el método. La traducción debe preservar ese alcance sin introducir información ajena al versículo.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 3
- issue: Término relacional רֵעַ
  english_pob_reading: '''neighbor'' in covenantal/legal contexts'
  chosen_spanish_reading: «prójimo» para רֵעַ en contexto legal de comunidad.
  alternative_spanish_readings:
  - vecino
  - fellow
  rationale: «Prójimo» comunica adecuadamente la relación de cercanía comunitaria y coincide con el valor jurídico amplio que el POB inglés expresa con «neighbor».
  doctrine_reference: HALOT; usage in legal/covenantal context
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del texto hebreo y del audit trail inglés; no se detectaron cambios necesarios respecto a la lectura principal, y se mantuvo la fórmula legal intensificada y la penalidad sin especificar método.
  spanish_consistency_notes:
  - Se usó «hombre» para אִישׁ y «prójimo» para רֵעַ, manteniendo un registro bíblico claro y consistente.
  - Se preservó la simetría masculina/femenina de «el adúltero y la adúltera».
  - «Muertos» refleja la pasiva legal intensificada sin añadir detalle sobre el método de ejecución.
  - La nota[a] conserva la repetición hebrea como aclaración y énfasis retórico-legal.
