translation:
  language: es
  text: Y no comerán pan, ni grano tostado[a], ni grano fresco[b], hasta este mismo día, hasta que hayan traído la ofrenda de su Dios. Es un estatuto permanente[c] para todas sus generaciones, en todos sus lugares de morada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'grano parchado' para 'grano tostado'.
    reason: lexical_alternative
  - marker: b
    text: O 'grano nuevo' para 'grano fresco'.
    reason: lexical_alternative
  - marker: c
    text: O 'estatuto eterno' / 'estatuto perpetuo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - pan horneado
  lexicon: HALOT
  rationale: En este contexto legal y agrícola, לֶחֶם designa el producto básico de cereal ya preparado como alimento. 'Pan' es el equivalente natural en español y mantiene la concreción del término sin volverlo demasiado general como 'alimento'.
- source_word: קָלִי
  english_pob_choice: roasted grain
  chosen_spanish: grano tostado
  alternatives_spanish:
  - grano parchado
  - grano asado
  lexicon: HALOT
  rationale: El hebreo se refiere a grano preparado por tostado/parcheado. 'Grano tostado' comunica bien la preparación en español actual y conserva la especificidad agrícola; 'grano parchado' es una alternativa más técnica o regional.
- source_word: כַּרְמֶל
  english_pob_choice: fresh grain
  chosen_spanish: grano fresco
  alternatives_spanish:
  - grano nuevo
  - espigas tiernas
  lexicon: HALOT
  rationale: Aquí el término no se refiere al monte Carmelo, sino a grano recién maduro o recién cosechado. 'Grano fresco' refleja la opción inglesa del POB y su sentido contextual; 'grano nuevo' también es posible, pero algo menos concreto.
- source_word: עַד עֶצֶם הַיּוֹם הַזֶּה
  english_pob_choice: until this very day
  chosen_spanish: hasta este mismo día
  alternatives_spanish:
  - hasta el mismo día
  - hasta ese día exacto
  lexicon: HALOT
  rationale: עֶצֶם intensifica la referencia temporal. 'Este mismo día' conserva el énfasis sin sonar rígido en español.
- source_word: עַד הֲבִיאֲכֶם
  english_pob_choice: until you have brought
  chosen_spanish: hasta que hayan traído
  alternatives_spanish:
  - hasta que traigan
  - hasta que ustedes hayan traído
  lexicon: HALOT
  rationale: La construcción marca una condición de término previa a comer. En español, 'hasta que hayan traído' expresa con naturalidad la acción completada antes del permiso.
- source_word: קָרְבַּן
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - ofrenda sacrificial
  - presentación
  lexicon: HALOT
  rationale: קָרְבָּן es un término general para lo que se ofrece a Dios. 'Ofrenda' es el equivalente directo y claro en español, sin sobreespecificar el tipo de sacrificio.
- source_word: אֱלֹהֵי/כֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: El posesivo plural se expresa de forma natural con 'su' en español latinoamericano. Se conserva la relación de pertenencia del pacto sin alterar el referente divino.
- source_word: חֻקַּת עוֹלָם
  english_pob_choice: a permanent statute
  chosen_spanish: un estatuto perpetuo
  alternatives_spanish:
  - una ordenanza perpetua
  - un estatuto permanente
  lexicon: HALOT
  rationale: La expresión legal denota una disposición vigente de forma continua dentro del marco del pacto. 'Estatuto perpetuo' mantiene el registro jurídico bíblico en español y deja abierta la tensión doctrinal sobre su aplicación más amplia.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: para todas sus generaciones
  alternatives_spanish:
  - por todas sus generaciones
  - a través de sus generaciones
  lexicon: HALOT
  rationale: La fórmula idiomática indica continuidad generacional. 'Para todas sus generaciones' comunica esa permanencia de manera natural en español.
- source_word: בְּכֹל מֹשְׁבֹתֵיכֶם
  english_pob_choice: in all your dwelling places
  chosen_spanish: en todos sus lugares de morada
  alternatives_spanish:
  - en todas sus viviendas
  - en todos sus asentamientos
  lexicon: HALOT
  rationale: מֹשְׁבֹתֵיכֶם se refiere a los lugares donde habitan. 'Lugares de morada' conserva el matiz formal del hebreo y evita restringirlo indebidamente a una sola clase de asentamiento.
theological_decisions:
- issue: Fuerza de חֻקַּת עוֹלָם en la ley mosaica
  english_pob_reading: Rendered as 'a permanent statute' without importing later theological conclusions about its application beyond the covenantal/legal context.
  chosen_spanish_reading: Se traduce como 'un estatuto perpetuo' sin resolver si su vigencia se extiende más allá del marco legal del pacto.
  alternative_spanish_readings:
  - una ordenanza eterna
  - un estatuto permanente
  rationale: La frase hebrea expresa continuidad normativa dentro de la legislación de Levítico. La traducción debe conservar esa fuerza, pero no cerrar debates teológicos posteriores sobre continuidad o discontinuidad de la ley ceremonial.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El texto coincide sustancialmente con el estado revisado más reciente del POB en inglés; no se documentan cambios aplicados en la revisión y el acuerdo cruzado es alto (0.95), con observaciones menores en alternativas léxicas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como convención general del proyecto solo cuando corresponde; en este versículo aparece 'su Dios' porque el hebreo usa אֱלֹהֵיכֶם, no el Tetragrámaton.
  - Se preservó el registro legal con 'estatuto perpetuo' y 'ofrenda', evitando equivalentes eclesiásticos más interpretativos.
  - Las notas al pie siguen la serie a, b, c y están ancladas en el texto donde corresponde.
