translation:
  language: es
  text: para ejecutar venganza sobre las naciones[a], castigos sobre los pueblos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reprensiones» o «correcciones» sobre los pueblos. El término hebreo puede denotar reprensión, pero aquí probablemente tiene un sentido judicial en paralelo con «venganza».
    reason: lexical_alternative
lexical_decisions:
- source_word: לַעֲשׂוֹת
  english_pob_choice: to execute
  chosen_spanish: para ejecutar
  alternatives_spanish:
  - para hacer
  - para llevar a cabo
  lexicon: HALOT
  rationale: El infinitivo constructo con ל expresa finalidad. En español, con נְקָמָה como objeto, «para ejecutar» conserva la idea de realizar un acto de juicio con fuerza y sin sonar artificial.
- source_word: נְקָמָה
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - vengamiento
  - retribución
  lexicon: HALOT
  rationale: El sustantivo hebreo nombra venganza o acto de vengar en un marco judicial o bélico. «Venganza» comunica bien esa carga fuerte en español sin suavizarla.
- source_word: בַּגּוֹיִם
  english_pob_choice: on the nations
  chosen_spanish: sobre las naciones
  alternatives_spanish:
  - entre las naciones
  - contra las naciones
  lexicon: HALOT
  rationale: Con נְקָמָה, la preposición marca el ámbito o el objetivo del acto. «Sobre» suena natural en español con este verbo y mantiene la relación poética del texto.
- source_word: תּוֹכֵחוֹת
  english_pob_choice: punishments
  chosen_spanish: castigos
  alternatives_spanish:
  - reprensiones
  - correcciones
  - juicios
  lexicon: HALOT
  rationale: Aunque el término puede significar reprensiones o correcciones, el paralelismo con «venganza» pide aquí un sentido judicial más concreto. «Castigos» expresa mejor esa fuerza penal en español.
- source_word: בַּל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - contra
  - en
  lexicon: HALOT
  rationale: En este paralelismo poético, la forma funciona como variante preposicional de valor espacial/objetual. «Sobre» mantiene la simetría con «sobre las naciones».
- source_word: אֻמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - las gentes
  lexicon: HALOT
  rationale: אֻמִּים designa pueblos o grupos étnicos. «Los pueblos» conserva la pluralidad colectiva y el paralelismo con «las naciones» sin volverlos idénticos.
theological_decisions:
- issue: Si suavizar el lenguaje judicial para evitar la idea de juicio divino contra las naciones
  english_pob_reading: Retain the strong judicial language of 'vengeance' and 'punishments'
  chosen_spanish_reading: Mantener el lenguaje fuerte de «venganza» y «castigos»
  alternative_spanish_readings:
  - usar términos más suaves como «justicia» y «reprensiones»
  - reducir el tono a «correcciones»
  rationale: El hebreo presenta un lenguaje intenso de juicio en un contexto de alabanza militar. Suavizarlo introduciría una mitigación interpretativa que el verso no exige. La traducción preserva esa tensión teológica sin ampliarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente sin cambios sustanciales; el control cruzado reporta alta coincidencia y solo observaciones menores. La redacción española mantiene el paralelismo poético y la fuerza judicial del hebreo, conforme al audit trail inglés.
  spanish_consistency_notes:
  - Se conservó el paralelismo entre «las naciones» y «los pueblos» para reflejar גּוֹיִם / אֻמִּים.
  - Se evitó traducir תּוֹכֵחוֹת de manera demasiado verbal («reprensiones») en el texto principal, pero se preservó la alternativa en nota.
  - Se usó «venganza» en lugar de una paráfrasis más débil para no perder la carga judicial del sustantivo hebreo.
  - La preposición poética se normalizó como «sobre» en ambas líneas para una lectura natural en español.
