revisions:
- from: Y salió el pueblo, y trajeron[b], y se hicieron cabañas[a] cada uno sobre su azotea, y en sus patios, y en los patios de la casa de Dios, y en la plaza de la Puerta del Agua, y en la plaza de la Puerta de Efraín.
  to: Y el pueblo salió, trajo e hizo para sí cabañas[a], cada uno sobre su azotea, y en sus patios, y en los patios de la casa de Dios, y en la plaza[b] de la Puerta del Agua, y en la plaza[b] de la Puerta de Efraín.
  rationale: Se corrige la discordancia verbal del inicio, se mejora la fluidez manteniendo el sentido fuente, y se restituye la nota cultural del POB inglés sobre רְחוֹב en «plaza». También se elimina una nota innecesaria sobre el objeto implícito de «trajo», ya suficientemente claro en español dentro del contexto.
