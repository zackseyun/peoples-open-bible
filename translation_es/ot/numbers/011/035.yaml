review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: salida desde un topónimo, movimiento del pueblo, y estancia posterior en el siguiente lugar. Sin embargo, hay un desajuste gramatical importante en el último verbo: וַיִּהְיוּ es plural (''ellos estuvieron/se quedaron''), pero el español dice ''estuvo'' en singular. También conviene alinear la nota al marcador inicial en orden y mejorar la naturalidad itineraria de la última cláusula.'
  spanish_quality_summary: El español es claro y legible, con buen registro narrativo. 'Partió' con sujeto colectivo 'el pueblo' es aceptable. No obstante, 'y estuvo en Jazerot' crea discordancia de número con 'el pueblo' entendido colectivamente frente al hebreo plural, y suena algo rígido en secuencia. 'Y se quedaron en Jazerot' o 'y permanecieron en Jazerot' comunica mejor el sentido de parada en el itinerario.
  glossary_alignment: No hay términos teológicos sensibles aquí. La transliteración de topónimos es coherente con la política del proyecto. La elección 'Jazerot' puede sostenerse como adaptación española; no requiere cambio para fidelidad. La nota léxica sobre Quibrot-hataavá preserva correctamente el sentido transparente del nombre, pero el marcador debe comenzar en 'a' por orden requerido.
  issues:
  - severity: high
    issue: Discordancia verbal en 'y estuvo en Jazerot'
    rationale: El hebreo וַיִּהְיוּ es 3ª persona plural. Aunque 'el pueblo' puede tomar singular en español, la cláusula final retoma al grupo en plural en el original y el propio análisis del borrador ofrece alternativas plurales. 'Estuvo' reduce indebidamente el referente colectivo.
  - severity: medium
    issue: Marcador de nota al pie usa 'b' sin existir una nota previa
    rationale: Las instrucciones exigen marcadores únicos en orden (a, b, c...). Al haber solo una nota, debe ser [a].
  - severity: low
    issue: La última cláusula puede expresar mejor el sentido de parada en itinerario
    rationale: En contexto de viaje, היה + ב suele indicar permanecer/quedarse en un lugar. 'Se quedaron en Jazerot' suena más idiomático y refleja mejor la función narrativa que el simple 'estuvieron'.
  revised_spanish_text: Desde Quibrot-hataavá[a] el pueblo partió hacia Jazerot, y se quedaron en Jazerot.
  revised_footnotes:
  - marker: a
    text: Quibrot-hataavá significa ‘sepulturas del deseo’ o ‘sepulturas de la codicia’.
    reason: lexical_alternative
  revision_rationale: Se corrige la discordancia verbal con un plural que refleja el hebreo original y se usa una formulación más natural para una parada de itinerario. También se corrige el marcador de nota al pie al orden requerido. Se conserva la transliteración de los topónimos y la nota léxica existente.
