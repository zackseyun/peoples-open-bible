  glossary_alignment: No hay conflictos con la terminología base del proyecto. «del Santo» respeta la decisión documentada de traducir הקדוש como título divino, en lugar de sustituirlo por «del Señor»; la variante griega se preserva correctamente en nota. No interviene el nombre divino Yahvé ni otros términos sensibles del glosario.
