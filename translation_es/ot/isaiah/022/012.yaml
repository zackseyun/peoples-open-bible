    text: O «a afeitarse la cabeza» o «a raparse»; el término hebreo traducido «calvicie» alude a una práctica de duelo.
    reason: lexical_alternative
  revision_rationale: Se ajusta el título divino para preservar el compuesto hebreo de manera más fiel al estándar del proyecto y más natural en español. Se mantiene la nota léxica sobre «calvicie», pero se reancla correctamente en ese término dentro del texto revisado. El resto de la redacción queda sustancialmente igual por ser fiel y legible.
