translation:
  language: es
  text: 'Y él le dijo: «No temas, porque la mano de Saúl, mi padre, no te alcanzará[a]. Tú reinarás sobre Israel, y yo seré segundo después de ti[b]. Incluso Saúl, mi padre, lo sabe».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la mano de Saúl, mi padre, no te encontrará». El hebreo dice literalmente «la mano de Saúl mi padre no te encontrará», donde «mano» funciona como figura de poder o alcance.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «yo seré tu segundo en el mando». El hebreo expresa la idea de segundo rango o posición subordinada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּירָא
  english_pob_choice: Do not be afraid
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No te asustes
  lexicon: HALOT
  rationale: El imperativo negativo de ירא se expresa de forma natural y fiel en español con «No temas», que conserva la fuerza exhortativa sin volverlo coloquial en exceso.
- source_word: לֹא תִמְצָאֲךָ יַד שָׁאוּל אָבִי
  english_pob_choice: the hand of Saul my father will not find you
  chosen_spanish: la mano de Saúl, mi padre, no te alcanzará
  alternatives_spanish:
  - la mano de Saúl, mi padre, no te encontrará
  - el poder de Saúl, mi padre, no llegará hasta ti
  - Saúl, mi padre, no te alcanzará
  lexicon: HALOT
  rationale: Mantengo la imagen concreta de «mano» como metonimia de poder o alcance, pero en español «no te alcanzará» comunica mejor la idea de que su poder no llegará a tocarlo. Así se preserva el giro hebreo sin sonar forzado.
- source_word: וְאַתָּה תִּמְלֹךְ עַל יִשְׂרָאֵל
  english_pob_choice: You will reign over Israel
  chosen_spanish: Tú reinarás sobre Israel
  alternatives_spanish:
  - Serás rey sobre Israel
  - Gobernarás sobre Israel
  lexicon: HALOT
  rationale: מלך como verbo se traduce mejor con «reinarás», conservando la forma verbal del hebreo y la referencia clara a la realeza sin convertirla en título nominal.
- source_word: וְאָנֹכִי אֶהְיֶה לְּךָ לְמִשְׁנֶה
  english_pob_choice: and I will be second to you
  chosen_spanish: y yo estaré en segundo lugar junto a ti
  alternatives_spanish:
  - y yo seré tu segundo
  - y yo seré tu segundo en el mando
  - y yo estaré subordinado a ti
  lexicon: HALOT
  rationale: מִשְׁנֶה expresa rango secundario o subordinación. «En segundo lugar junto a ti» conserva la idea de posición inferior y la relación personal sin introducir un tecnicismo moderno demasiado interpretativo.
- source_word: וְגַם שָׁאוּל אָבִי יֹדֵעַ כֵּן
  english_pob_choice: Even Saul my father knows this
  chosen_spanish: Incluso Saúl, mi padre, lo sabe
  alternatives_spanish:
  - Y Saúl, mi padre, también lo sabe
  - Hasta Saúl, mi padre, sabe esto
  lexicon: HALOT
  rationale: «Incluso» refleja el refuerzo de גַּם y «lo sabe» es una forma idiomática en español para retomar el contenido previamente dicho sin repetirlo pesadamente.
theological_decisions:
- issue: La relación entre la promesa de reinar y la subordinación de Jonathan sin añadir lenguaje profético explícito
  english_pob_reading: Render as a straightforward political and providential expectation without adding covenantal or messianic language
  chosen_spanish_reading: Se presenta como una expectativa directa de gobierno y de subordinación personal, sin añadir lenguaje mesiánico ni explicaciones teológicas externas.
  alternative_spanish_readings:
  - Hacerlo sonar como una profecía formalmente explícita de elección divina
  - Introducir un tono más devocional o providencial en la redacción
  rationale: El versículo habla de la confianza de Jonatán sobre el futuro de David y sobre su propia posición, pero no menciona a Yahvé en esta oración. La traducción debe conservar esa sobriedad y no cargar el texto con categorías no expresadas aquí.
  doctrine_reference: Preservar la tensión teológica sin resolverla; no ampliar el texto más allá de su evidencia.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail inglés: mantiene la imagen de la «mano», la declaración de reinar y la idea de un segundo rango para Jonatán, sin introducir explicaciones teológicas ajenas al verso. No se requirieron revisiones previas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exige; aquí no aparece el nombre divino, por lo que no se introduce.
  - Se prefirió «reinarás» para conservar el valor verbal de מלך.
  - Se tradujo מִשְׁנֶה con una expresión española natural que mantiene la subordinación sin burocratizar el cargo.
  - La nota de la mano/poder se resolvió en el cuerpo con una solución idiomática española que conserva la metáfora de alcance.
