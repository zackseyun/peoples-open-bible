translation:
  language: es
  text: 'Para los hijos de José[a], para los hijos de Efraín, según sus generaciones, según sus clanes, según las casas de sus padres, según el número de nombres, de veinte años en adelante, todo varón que sale a la guerra:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los que salen para el servicio militar». El hebreo usa un modismo que literalmente habla de salir a la guerra.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי יוֹסֵף / לִבְנֵי אֶפְרַיִם
  english_pob_choice: For the sons of Joseph / for the sons of Ephraim
  chosen_spanish: Para los hijos de José / para los hijos de Efraín
  alternatives_spanish:
  - Para los descendientes de José / para los descendientes de Efraín
  - De los hijos de José / de los hijos de Efraín
  lexicon: HALOT
  rationale: Se conserva el giro genealógico-formal del hebreo con «hijos», que en este contexto tribal no se limita a hijos inmediatos sino a descendencia. «Para» refleja la función de encabezado censal de ל־ en la serie del pasaje.
- source_word: תּוֹלְדֹתָם
  english_pob_choice: by their generations
  chosen_spanish: según sus generaciones
  alternatives_spanish:
  - por sus generaciones
  - de acuerdo con sus generaciones
  - según su descendencia
  lexicon: HALOT
  rationale: «Generaciones» mantiene la dimensión de linaje/descendencia del término sin convertirlo en un registro administrativo. «Según» expresa bien el marco clasificatorio del censo.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: según sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus clanes
  lexicon: HALOT
  rationale: «Clanes» preserva la unidad social tribal más precisa que «familias» en español actual. Se mantiene la relación formal con la lista censal.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: según la casa de sus padres
  alternatives_spanish:
  - según las casas de sus padres
  - según sus casas paternas
  - según la casa paterna
  lexicon: HALOT
  rationale: «Casa de sus padres» reproduce la expresión técnica del hebreo y conserva el énfasis en la línea paterna. Se evita una paráfrasis que borre la formulación fija del pasaje.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  english_pob_choice: by the number of names
  chosen_spanish: según el número de nombres
  alternatives_spanish:
  - por el número de nombres
  - según la cuenta de nombres
  lexicon: HALOT
  rationale: «Número de nombres» es la calca semántica más transparente en español y conserva la idea censal de enumeración individual. Se evita interpretar de más el sintagma como “listas” o “registros”.
- source_word: מִבֶּן עֶשְׂרִים שָׁנָה וָמַעְלָה
  english_pob_choice: from twenty years old and upward
  chosen_spanish: desde los veinte años y más
  alternatives_spanish:
  - desde los veinte años y arriba
  - a partir de los veinte años
  lexicon: HALOT
  rationale: La fórmula temporal se traduce de modo natural en español sin perder el umbral de edad requerido para el censo. «Y más» conserva el valor inclusivo de וָמַעְלָה.
- source_word: כֹּל יֹצֵא צָבָא
  english_pob_choice: every man going out to war
  chosen_spanish: todo varón que sale a la guerra
  alternatives_spanish:
  - todo hombre que sale a la guerra
  - todos los que salen a la guerra
  - todo varón apto para el servicio militar
  lexicon: HALOT
  rationale: Se conserva el idiomatismo militar del hebreo, literalmente “salir a la guerra”, y se explicita el masculino con «varón» para no neutralizar el referente censal. «Sale» sigue el presente participial de la frase hebrea y funciona bien como caracterización general.
theological_decisions:
- issue: Referencia masculina en el censo tribal
  english_pob_reading: every man going out to war
  chosen_spanish_reading: todo varón que sale a la guerra
  alternative_spanish_readings:
  - todos los que salen a la guerra
  - todo hombre que sale a la guerra
  rationale: El contexto del pasaje es un censo de varones aptos para el servicio militar. Mantener «varón» preserva la fuerza masculina del hebreo y evita una neutralización que el texto no justifica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Se siguió el pasaje hebreo directo y se corroboró con el audit trail en inglés: se mantuvieron las unidades genealógicas y censales, la fórmula de edad y el modismo militar, sin introducir cambios de sentido. No se detectaron revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se conservó «hijos» para la descendencia tribal, en coherencia con el registro genealógico del pasaje.
  - «Clanes» se usa de manera consistente para מִשְׁפָּחֹת en listas tribales.
  - «Casa de sus padres» mantiene la terminología censal y patriarcal del original.
  - «Número de nombres» reproduce la fórmula administrativa sin añadir explicaciones no presentes en el texto.
  - Se optó por «Yahvé» como forma estándar del proyecto solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se mantuvo el orden acumulativo de la serie preposicional para reflejar la progresión del hebreo.
