    issue: Ligera atenuación del matiz léxico de 'evil against me' en 'hablan mal de mí'
    rationale: La expresión española es idiomática y adecuada, pero desplaza un poco el foco desde 'decir maldad/daño contra mí' hacia 'hablar mal de mí'. La nota al pie compensa suficientemente este matiz.
