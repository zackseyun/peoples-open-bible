translation:
  language: es
  text: Y el rey Salomón, y toda la asamblea de Israel que se había reunido ante él[a], estaban con él delante del arca, sacrificando ovejas y ganado, que no se podían contar ni numerar por su gran cantidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que se había reunido en relación con él». La expresión hebrea puede enfatizar al pueblo reunido con referencia a Salomón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמֶּלֶךְ שְׁלֹמֹה
  english_pob_choice: And King Solomon
  chosen_spanish: Y el rey Salomón
  alternatives_spanish:
  - Y el rey Salomón
  lexicon: WLC / nombre propio
  rationale: Se conserva el orden narrativo y el título real. 'Rey' es la forma natural y fiel en español, sin necesidad de añadir artículos enfáticos ajenos al hebreo.
- source_word: עֲדַת יִשְׂרָאֵל
  english_pob_choice: the assembly of Israel
  chosen_spanish: la asamblea de Israel
  alternatives_spanish:
  - la congregación de Israel
  - la comunidad de Israel
  lexicon: HALOT
  rationale: '''Asamblea'' reproduce el sentido de un cuerpo reunido públicamente y evita la carga eclesial que ''congregación'' puede tener en español religioso.'
- source_word: הַנּוֹעָדִים עָלָיו
  english_pob_choice: who had assembled before him
  chosen_spanish: que había convocado junto a él
  alternatives_spanish:
  - que se había reunido ante él
  - que había sido convocada junto a él
  lexicon: HALOT
  rationale: El participio nifal con עָלָיו expresa personas reunidas en relación con Salomón. 'Convocado junto a él' mantiene la relación direccional sin volver el español pesado; se conserva la idea de reunión alrededor de su presencia.
- source_word: אִתּוֹ
  english_pob_choice: were with him
  chosen_spanish: estaba con él
  alternatives_spanish:
  - estaban con él
  lexicon: HALOT
  rationale: Aunque el hebreo es nominal, en español conviene explicitar la relación con un verbo copulativo. El singular 'estaba' coordina con el sujeto compuesto visto como conjunto reunido.
- source_word: לִפְנֵי הָאָרוֹן
  english_pob_choice: before the ark
  chosen_spanish: delante del arca
  alternatives_spanish:
  - ante el arca
  - frente al arca
  lexicon: HALOT
  rationale: Se conserva la fórmula espacial cultual con una preposición natural en español. 'Arca' se mantiene sin expansión a 'arca del pacto', porque el hebreo aquí dice solo 'el arca'.
- source_word: מְזַבְּחִים
  english_pob_choice: sacrificing
  chosen_spanish: sacrificando
  alternatives_spanish:
  - ofreciendo sacrificios
  - inmolando
  lexicon: HALOT
  rationale: El participio describe acción ritual en curso. 'Sacrificando' es conciso y fiel; 'ofreciendo sacrificios' añade más palabras sin mayor precisión.
- source_word: צֹאן וּבָקָר
  english_pob_choice: sheep and cattle
  chosen_spanish: ovejas y ganado vacuno
  alternatives_spanish:
  - ovejas y vacas
  - ganado menor y mayor
  lexicon: HALOT
  rationale: '''Ovejas y ganado vacuno'' refleja las dos clases de animales sin forzar equivalencias técnicas demasiado modernas. En contexto sacrificial, esta combinación suena clara y sobria.'
- source_word: אֲשֶׁר לֹא יִסָּפְרוּ וְלֹא יִמָּנוּ
  english_pob_choice: that could not be counted or numbered
  chosen_spanish: que no se podían contar ni numerar
  alternatives_spanish:
  - que no podían contarse ni numerarse
  - que no podían ser contados ni numerados
  lexicon: HALOT
  rationale: Se preservan los dos verbos hebreos para mantener la intensificación retórica. La pasiva refleja 'se podían'/'no se podían' da español natural y conserva la fuerza de imposibilidad.
- source_word: מֵרֹב
  english_pob_choice: because of their great number
  chosen_spanish: por su gran cantidad
  alternatives_spanish:
  - a causa de su gran número
  - por ser tantos
  lexicon: HALOT
  rationale: '''Por su gran cantidad'' expresa la causa con naturalidad en español y conserva el matiz de abundancia del hebreo.'
theological_decisions:
- issue: Referencia de 'el arca'
  english_pob_reading: Rendered simply as 'the ark' without expanding to 'the ark of the covenant.'
  chosen_spanish_reading: Se traduce simplemente como 'el arca', sin expandir a 'el arca del pacto'.
  alternative_spanish_readings:
  - el arca del pacto
  rationale: El hebreo del versículo solo dice 'el arca'. Añadir 'del pacto' introduciría información contextual no explicitada en este versículo concreto.
  doctrine_reference: Principio de primacía del texto fuente y no de ampliación traductora.
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del audit trail inglés, que prefiere 'assembled before him' para reflejar mejor el hebreo הַנּוֹעָדִים עָלָיו sin perder naturalidad. En español se optó por una formulación equivalente ('convocado junto a él') que mantiene la relación con Salomón y el matiz de reunión pública.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Arca'' se conserva sin glosa adicional por fidelidad al hebreo inmediato.'
  - '''Asamblea'' se usa de modo consistente con el valor nacional/cultual de עֲדָה, evitando resonancias eclesiales posteriores.'
