translation:
  language: es
  text: Miren, vienen días —declara Yahvé— en que el que ara alcanzará al que siega, y el que pisa las uvas al que siembra la semilla[a]; los montes destilarán vino dulce[b][c], y todas las colinas se derretirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el que saca la semilla’. El hebreo literalmente dice ‘el que tira/saca la semilla’, probablemente un modismo para sembrar.
    reason: lexical_alternative
  - marker: b
    text: O ‘vino nuevo’.
    reason: lexical_alternative
  - marker: c
    text: La imagen es de una abundancia tan grande que el trabajo de una estación comienza antes de que haya terminado el de la anterior.
    reason: cultural_note
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - He aquí
  - Presta atención
  lexicon: HALOT
  rationale: En español, 'Mira' conserva la función de llamado profético a prestar atención sin sonar tan arcaico como 'He aquí'. Mantiene el valor discursivo de הִנֵּה como apertura solemne.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - vienen los días
  - se acercan días
  - están por venir días
  lexicon: HALOT
  rationale: La construcción profética se expresa de manera natural en español con 'vienen días'. Respeta el futuro inminente sin añadir determinación no explícita en el hebreo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino 'Yahvé' según la política del proyecto. 'Declara' conserva la solemnidad de נְאֻם mejor que un simple 'dice'.
- source_word: וְנִגַּשׁ
  english_pob_choice: will overtake
  chosen_spanish: alcanzará
  alternatives_spanish:
  - sobrepasará
  - dará alcance a
  - alcanzará a
  lexicon: HALOT
  rationale: El contexto agrícola de superposición de labores requiere más que mera cercanía. 'Alcanzará' comunica la idea de que una tarea llega a tocar o rebasar a la otra antes de concluirse.
- source_word: חוֹרֵשׁ
  english_pob_choice: the plowman
  chosen_spanish: el que ara
  alternatives_spanish:
  - el labrador
  - el arador
  - el que labra
  lexicon: HALOT
  rationale: Se prefirió una expresión verbal natural en español para conservar el participio agente sin forzar un sustantivo técnico. 'Ara' es claro y fiel al agente agrícola.
- source_word: בַּקֹּצֵר
  english_pob_choice: the reaper
  chosen_spanish: el que siega
  alternatives_spanish:
  - el segador
  - el cosechador
  - el que cosecha
  lexicon: HALOT
  rationale: '''Siega'' corresponde al acto de recolectar cereal y conserva el paralelismo con ''el que ara''. Es una equivalencia directa y transparente en español bíblico contemporáneo.'
- source_word: וְדֹרֵךְ עֲנָבִים
  english_pob_choice: the one who treads grapes
  chosen_spanish: el que pisa las uvas
  alternatives_spanish:
  - el que pisa el lagar
  - el que exprime las uvas
  - el lagarero
  lexicon: HALOT
  rationale: '''Pisa las uvas'' reproduce la imagen concreta de la vendimia y el lagar sin introducir un término más técnico que el hebreo no exige.'
- source_word: בְּמֹשֵׁךְ הַזָּרַע
  english_pob_choice: the one who sows the seed
  chosen_spanish: el que siembra la semilla
  alternatives_spanish:
  - el sembrador
  - el que siembra
  - el que arrastra la semilla
  lexicon: HALOT
  rationale: Aunque el hebreo tiene un matiz literal de 'tirar/pulir/arrastrar', el propio audit trail inglés concluye que en contexto se trata de sembrar. En español, 'siembra la semilla' preserva la idea y evita una literalidad opaca.
- source_word: וְהִטִּיפוּ
  english_pob_choice: will drip
  chosen_spanish: destilarán
  alternatives_spanish:
  - gotearán
  - derramarán
  - emanarán
  lexicon: HALOT
  rationale: '''Destilarán'' conserva la imagen de líquido que cae gota a gota y suena natural en español poético. Es una opción un poco más literaria que ''gotearán'' sin perder la base imagética.'
- source_word: עָסִיס
  english_pob_choice: sweet wine
  chosen_spanish: mosto
  alternatives_spanish:
  - vino nuevo
  - vino dulce
  - jugo de uva
  lexicon: HALOT
  rationale: '''Mosto'' expresa con precisión el producto fresco de la uva y mantiene el carácter abundante de la imagen. En español puede cubrir tanto mosto recién prensado como vino joven, por lo que deja abierta la tensión lexical documentada.'
- source_word: תִּתְמוֹגַגְנָה
  english_pob_choice: will melt
  chosen_spanish: se derretirán
  alternatives_spanish:
  - se disolverán
  - se desharán
  - se fundirán
  lexicon: HALOT
  rationale: La metáfora hebrea de derretirse se traslada de forma directa y comprensible. En español, 'se derretirán' conserva el carácter hiperbólico de la imagen sin reinterpretarla como simple abundancia líquida.
theological_decisions:
- issue: Imagen profética de abundancia restauradora
  english_pob_reading: Render the verse as hyperbolic agricultural abundance in Israel's restoration without importing a narrower millennial or purely spiritualized scheme.
  chosen_spanish_reading: Presentar el versículo como una imagen profética de abundancia restauradora, sin cerrarlo en una lectura milenarista estricta ni en una espiritualización total.
  alternative_spanish_readings:
  - predicción agrícola literal estricta
  - bendición espiritual puramente simbólica
  rationale: El hebreo usa poesía de abundancia, y el texto debe conservar esa tensión interpretativa. La traducción no debe resolver el alcance del cumplimiento, sino dejar que el lector la discierna a partir de la imagen profética.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó ‘the one who draws out the seed’ por ‘the one who sows the seed’ para reflejar mejor מֹשֵׁךְ הַזָּרַע en contexto. La traducción española sigue esa revisión y evita una literalidad opaca.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ conforme al estándar del proyecto para יהוה.
  - Se prefirió ‘mosto’ para עָסִיס, dejando abierta la alternativa ‘vino nuevo’ en nota, porque el español puede cubrir ambas posibilidades según contexto.
  - Se conservó la metáfora de ‘se derretirán’ para תִּתְמוֹגַגְנָה, en línea con la imagen hebrea de sobreabundancia.
  - La estructura general sigue el paralelismo agrícola del original sin añadir elementos doctrinales externos.
