translation:
  language: es
  text: Mira[a], estás confiando en Egipto, ese báculo de caña rota, que, si un hombre se apoya en él, le entrará en la mano y la perforará. Así es el faraón, rey de Egipto, para todos los que confían en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un hombre»; se conserva aquí el singular masculino como figura representativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira bien
  - Mira pues
  - He aquí
  lexicon: HALOT
  rationale: La interjección deíctica llama la atención del oyente. «Mira» conserva la fuerza inmediata y suena natural en español moderno; «He aquí» sería más tradicional, pero menos directo.
- source_word: בָטַחְתָּ
  english_pob_choice: you are trusting
  chosen_spanish: estás confiando
  alternatives_spanish:
  - confías
  - has confiado
  lexicon: HALOT
  rationale: El perfecto hebreo aquí describe una postura vigente de confianza política. El presente progresivo español comunica mejor esa confianza actual y continuada.
- source_word: מִשְׁעֶנֶת
  english_pob_choice: staff
  chosen_spanish: báculo
  alternatives_spanish:
  - bastón
  - apoyo
  - vara
  lexicon: HALOT
  rationale: En el cuadro metafórico de una caña en la que alguien se apoya, «báculo» transmite la idea de soporte. «Bastón» también sería posible, pero «báculo» mantiene un tono más elevado sin perder claridad.
- source_word: הַקָּנֶה הָרָצוּץ
  english_pob_choice: that broken reed
  chosen_spanish: esa caña rota
  alternatives_spanish:
  - esa caña quebrada
  - esa caña aplastada
  - esa caña partida
  lexicon: HALOT
  rationale: «קָנֶה» es «caña»; «רָצוּץ» indica algo roto o quebrado. Mantener «caña rota» conserva la imagen vegetal original sin cambiarla por una metáfora más interpretativa.
- source_word: אֲשֶׁר יִסָּמֵךְ אִישׁ עָלָיו
  english_pob_choice: which, if a man leans on it
  chosen_spanish: si un hombre se apoya en ella
  alternatives_spanish:
  - en la que un hombre se apoya
  - si alguien se apoya en ella
  - en la cual un hombre se apoya
  lexicon: HALOT
  rationale: El relativo hebreo introduce una situación hipotética. En español, el condicional se expresa de forma natural con «si»; se conserva además el masculino singular representativo del hebreo.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: La referencia es genérica y representativa. Se mantiene el masculino singular, como en el texto fuente, en vez de neutralizarlo con «alguien».
- source_word: וּבָא בְכַפּוֹ
  english_pob_choice: will go into his hand
  chosen_spanish: le entrará en la mano
  alternatives_spanish:
  - le penetrará la mano
  - entrará en su mano
  - se le clavará en la mano
  lexicon: HALOT
  rationale: La imagen es de penetración física en la mano de quien se apoya. «Le entrará en la mano» conserva el movimiento y el daño con un español fluido.
- source_word: וּנְקָבָהּ
  english_pob_choice: and pierces it
  chosen_spanish: y la perforará
  alternatives_spanish:
  - y la herirá
  - y la atravesará
  - y la pinchará
  lexicon: HALOT
  rationale: El verbo implica perforar o agujerear. «La perforará» preserva el impacto concreto sobre la mano sin suavizarlo.
- source_word: כֵּן
  english_pob_choice: So is
  chosen_spanish: Así es
  alternatives_spanish:
  - De igual modo es
  - Tal es
  - Igualmente es
  lexicon: HALOT
  rationale: Marca la comparación entre la imagen de la caña y el faraón. «Así es» reproduce la equivalencia comparativa de forma breve y natural.
- source_word: פַּרְעֹה מֶלֶךְ מִצְרַיִם
  english_pob_choice: Pharaoh king of Egypt
  chosen_spanish: el faraón, rey de Egipto
  alternatives_spanish:
  - Faraón, rey de Egipto
  - el faraón, el rey de Egipto
  lexicon: HALOT
  rationale: La aposición se mantiene compacta y clara. Se usa artículo con «faraón» para naturalidad en español, sin añadir una glosa explicativa que no está en el hebreo.
- source_word: לְכָל הַבֹּטְחִים עָלָיו
  english_pob_choice: to all who trust in him
  chosen_spanish: para todos los que confían en él
  alternatives_spanish:
  - a todos los que confían en él
  - para cuantos confían en él
  - a quienes confían en él
  lexicon: HALOT
  rationale: 'Se conserva el paralelismo con la primera aparición de בָטַח. «Para» expresa bien la relación caracterizadora: qué es él para quienes ponen en él su confianza.'
theological_decisions:
- issue: Tensión entre literalidad de la imagen y claridad española
  english_pob_reading: broken reed of a staff / will go into his hand and pierce it
  chosen_spanish_reading: esa caña rota por báculo; si un hombre se apoya en ella, le entrará en la mano y la perforará
  alternative_spanish_readings:
  - esa caña rota de báculo
  - esa caña rota como báculo
  - ese apoyo de caña rota
  rationale: 'El hebreo acumula dos imágenes: caña y soporte. En español, «caña rota por báculo» conserva la metáfora de soporte defectuoso sin reemplazarla por una explicación totalmente interpretativa. Se mantiene también el daño físico explícito para preservar la fuerza del cuadro.'
  doctrine_reference: No aplica; cuestión poética/metafórica.
translation_notes:
  revision_awareness: El audit trail inglés revisó la cláusula condicional para hacer explícita la secuencia resultado-condición con «will go». La versión española adopta una solución igualmente natural con «si... le entrará... y la perforará», manteniendo el futuro en la consecuencia y sin suavizar la imagen de lesión. También se preserva la aposición compacta de «Pharaoh king of Egypt» sin añadir glosas.
  spanish_consistency_notes:
  - Se mantiene confiamente el verbo «confiar» para בטח en ambas ocurrencias.
  - Se traduce YHWH no aparece en este versículo; no hay decisión terminológica al respecto.
  - Se conserva el tono proverbial y la repetición de la imagen para reproducir el paralelismo del hebreo.
  - Se evita «SEÑOR» por no corresponder aquí al divino nombre ni al léxico del pasaje.
