    text: 'O: «donde me hiciste un voto». El hebreo usa verbo + sustantivo para énfasis.'
    reason: lexical_alternative
  - marker: b
    text: «Betel» significa «casa de Dios», pero aquí es un nombre de lugar.
    reason: cultural_note
  revision_rationale: Se corrigen los anclajes de las notas para que coincidan con su contenido. Se reemplaza «piedra con aceite» por «pilar» para seguir más de cerca מַצֵּבָה y evitar añadir un detalle no explícito en el versículo. Se conserva un español natural y digno, manteniendo «me hiciste un voto» con nota explicativa sobre la construcción hebrea enfática.
