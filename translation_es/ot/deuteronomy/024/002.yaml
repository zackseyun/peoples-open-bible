- from: y ella sale de su casa, va y llega a ser esposa de otro hombre[a].
  to: y ella sale de la casa de él, va y llega a ser esposa de otro hombre[a].
  rationale: Se revisa «su casa» a «la casa de él» para preservar el referente masculino singular explícito del hebreo מִבֵּיתוֹ y evitar una ambigüedad innecesaria en español. Se conserva la nota sobre «para otro hombre» porque documenta adecuadamente el idiomatismo de לְאִישׁ אַחֵר.
  reviewer_model: gpt-5.4
