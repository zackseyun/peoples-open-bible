- from: Entonces Baasá, rey de Israel, subió contra Judá y edificó Ramá[a], para no permitir que nadie saliera ni entrara a Asa, rey de Judá.[b]
  to: Entonces Baasá, rey de Israel, subió contra Judá y edificó Ramá[a], para no permitir que nadie saliera ni entrara hacia Asa, rey de Judá.[b]
  rationale: Se ajusta únicamente la parte final para que el español exprese con naturalidad el objetivo del bloqueo sin perder la restricción textual del hebreo. «Hacia Asa» evita la lectura anómala de «entrar a Asa» y preserva la idea de movimiento/acceso respecto de él. La nota b se armoniza con esa mejora.
