translation:
  language: es
  text: Porque ¿qué ventaja tiene el sabio sobre el necio? ¿Qué ventaja tiene el pobre que sabe conducirse delante de los vivos?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «¿Qué ventaja tiene el pobre que sabe caminar delante de los vivos?». El hebreo «caminar» puede usarse idiomáticamente con el sentido de «conducirse».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o el fundamento de la pregunta anterior. En español, «Porque» mantiene el valor explicativo/consecutivo de כִּי sin volverlo más interpretativo de lo necesario.
- source_word: מַה יּוֹתֵר
  english_pob_choice: what advantage ... have
  chosen_spanish: ¿qué ventaja tiene?
  alternatives_spanish:
  - ¿qué provecho tiene?
  - ¿qué gana?
  - ¿qué le aprovecha?
  lexicon: HALOT
  rationale: La idiomática hebrea pregunta por la ventaja, ganancia o excedente. «Ventaja» conserva bien ese campo semántico y suena natural en español bíblico moderno.
- source_word: לֶחָכָם
  english_pob_choice: the wise man
  chosen_spanish: el sabio
  alternatives_spanish:
  - la persona sabia
  - el hombre sabio
  lexicon: HALOT
  rationale: El sustantivo/adjetivo hebreo funciona aquí de manera sustantiva y masculina singular. En español, «el sabio» preserva la concisión del hebreo sin añadir género explicativo innecesario.
- source_word: מִן הַכְּסִיל
  english_pob_choice: over the fool
  chosen_spanish: sobre el necio
  alternatives_spanish:
  - más que el necio
  - que el necio
  lexicon: HALOT
  rationale: מן marca comparación. «Sobre» reproduce la estructura comparativa con naturalidad; «necio» mantiene el tono sapiencial para כְּסִיל.
- source_word: לֶעָנִי
  english_pob_choice: the poor man
  chosen_spanish: el pobre
  alternatives_spanish:
  - el pobre hombre
  - el indigente
  lexicon: HALOT
  rationale: עָנִי puede ser «pobre» en sentido socioeconómico o «afligido/humilde» según contexto. Aquí «el pobre» conserva la amplitud semántica y evita forzar una especificación que el hebreo no exige.
- source_word: יוֹדֵעַ
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - es capaz de
  lexicon: HALOT
  rationale: El participio expresa conocimiento o habilidad. «Sabe» es breve y abarca la noción de competencia que el contexto desarrolla.
- source_word: לַהֲלֹךְ
  english_pob_choice: to conduct himself
  chosen_spanish: caminar
  alternatives_spanish:
  - conducirse
  - andar
  - moverse
  lexicon: HALOT
  rationale: La POB inglesa optó por una lectura idiomática («conduct himself») para aclarar el hebreo. En español, «caminar» conserva la imagen verbal original y deja visible la posible tensión idiomática; la nota explica la alternativa de conducta.
- source_word: נֶגֶד הַחַיִּים
  english_pob_choice: before the living
  chosen_spanish: delante de los vivos
  alternatives_spanish:
  - en presencia de los vivos
  - ante los vivos
  lexicon: HALOT
  rationale: נֶגֶד significa «delante de / en presencia de / frente a». «Delante de los vivos» refleja de manera directa la imagen espacial del hebreo y permite entender a «los vivos» como las personas vivientes.
translation_notes:
  revision_awareness: Se siguió el sentido auditado del inglés POB, pero se corrigió la segunda pregunta para mantener explícita la ventaja implícita del paralelismo hebreo, y se conservó la imagen de «caminar» como traducción base para no ocultar la tensión lexical documentada en el original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, aunque este versículo no contiene el Tetragrámaton.
  - Se usó «sabio/necio» para el contraste sapiencial coherente con el registro del Eclesiastés.
  - Se evitó introducir «siervo» o léxico eclesial no presente en el texto.
  - La puntuación con dos preguntas refleja el paralelismo hebreo y la estructura del inglés auditado.
