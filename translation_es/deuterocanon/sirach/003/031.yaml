translation:
  language: es
  text: El que hace el bien será llamado dichoso por sus caminos[a], y en el tiempo de su tropiezo hallará apoyo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «El que devuelve favores recuerda para lo que viene después»; la primera línea griega difiere sustancialmente del hebreo conservado, aunque ambas coinciden en la segunda línea en que se encuentra apoyo en un tiempo de caída.'
    reason: alternative_reading
lexical_decisions:
- source_word: פועל טוב
  english_pob_choice: One who does good
  chosen_spanish: El que hace el bien
  alternatives_spanish:
  - Uno que hace el bien
  - Quien hace el bien
  - Un hacedor de bien
  lexicon: HALOT
  rationale: La forma hebrea es un participio singular con valor genérico. En español, «El que hace el bien» conserva el carácter de sentencia sapiencial y evita una paráfrasis más dura. Mantiene también la observación del POB inglés de no convertirlo en plural ni en un abstracto impersonal.
- source_word: יקראנו
  english_pob_choice: will be called blessed
  chosen_spanish: será llamado bienaventurado
  alternatives_spanish:
  - será llamado
  - será proclamado bienaventurado
  - será tenido por bienaventurado
  lexicon: HALOT
  rationale: El hebreo permite la idea de ser públicamente reconocido por su conducta. «Bienaventurado» expresa el juicio favorable sin sobrecargar el verbo. Aunque el inglés opta por «blessed», en español «bienaventurado» comunica mejor la valoración sapiencial y evita confundirlo con una bendición litúrgica.
- source_word: בדרכיו
  english_pob_choice: for his ways
  chosen_spanish: por sus caminos
  alternatives_spanish:
  - a causa de sus caminos
  - en sus caminos
  - por su conducta
  lexicon: HALOT
  rationale: «Caminos» conserva la metáfora hebrea de conducta o manera de vivir. «Por sus caminos» refleja la relación causal/valorativa del texto sin reemplazar la imagen por un término explicativo.
- source_word: בעת מוטו
  english_pob_choice: at the time of his stumbling
  chosen_spanish: en el tiempo de su tropiezo
  alternatives_spanish:
  - en el tiempo de su caída
  - cuando tropiece
  - en la hora de su caída
  lexicon: HALOT
  rationale: «Tropiezo» mantiene la imagen física y moral del hebreo mejor que «caída», que puede sugerir ruina final. La expresión también armoniza con la línea griega, que habla de un tiempo de caída, sin borrar la metáfora hebrea.
- source_word: ימצא משען
  english_pob_choice: he will find support
  chosen_spanish: hallará apoyo
  alternatives_spanish:
  - encontrará apoyo
  - hallará sostén
  - encontrará un apoyo
  lexicon: HALOT
  rationale: «Apoyo» y «sostén» son posibles; «apoyo» suena natural y preserva la función concreta de algo en lo que uno puede apoyarse. La elección evita un giro demasiado mecánico y sigue el valor de στήριγμα en el paralelo griego.
theological_decisions:
- issue: Tratamiento del testimonio hebreo frente al paralelo griego divergente en el primer colon
  english_pob_reading: Follow the Hebrew first colon and use the Greek to confirm the second colon's sense
  chosen_spanish_reading: Seguir el hebreo en la primera línea y reflejar la segunda con apoyo léxico del griego
  alternative_spanish_readings:
  - 'Traducir hacia el griego: «El que devuelve favores recuerda para lo venidero»'
  - Combinar ambas lecturas en el cuerpo principal
  rationale: En Sirácida, cuando el hebreo está atestiguado con confianza, el POB prioriza ese testimonio como texto base. La diferencia con el griego en el primer hemistiquio es real y debe quedar visible; por eso el texto principal sigue el hebreo y la nota preserva la variante griega.
  doctrine_reference: PHILOSOPHY.md §What we are translating; Zone 1 instruction on Hebrew primacy for surviving Sirach
- issue: Renderización del cierre sapiencial del segundo colon
  english_pob_reading: he will find support
  chosen_spanish_reading: hallará apoyo
  alternative_spanish_readings:
  - hallará sostén
  - encontrará apoyo
  - encontrará sostén
  rationale: «Apoyo» comunica bien el sentido práctico de משען/στήριγμα sin perder la imagen de algo firme para sostenerse. No introduce una interpretación doctrinal adicional; sólo deja claro el valor de ayuda firme en el momento de tropiezo.
  doctrine_reference: HALOT; paralelismo con στήριγμα
translation_notes:
  revision_awareness: La revisión inglesa más reciente reemplazó «A man who does good» por «One who does good» para reflejar mejor el hebreo y evitar restringir indebidamente el sujeto; el español adopta de entrada una forma genérica equivalente («El que hace el bien»). También se tuvo en cuenta que el control de calidad marcó problemas mayores, en particular por la divergencia hebreo-griego, por lo que la nota conserva transparentemente esa tensión textual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando corresponda, pero este verso no contiene el nombre divino.
  - Se prefirió «bienaventurado» para reproducir el valor evaluativo sapiencial de יהיה/יקראנו sin introducir lenguaje eclesiástico técnico.
  - No se usó «siervo» ni «Cristo», pues no corresponden al verso.
  - La nota al pie usa un solo marcador y enlaza directamente con la divergencia textual del primer hemistiquio, como exige la transparencia editorial.
