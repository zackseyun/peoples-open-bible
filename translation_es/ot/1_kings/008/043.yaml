  text: אַתָּ֞ה תִּשְׁמַ֤ע הַ/שָּׁמַ֨יִם֙ מְכ֣וֹן שִׁבְתֶּ֔/ךָ וְ/עָשִׂ֕יתָ כְּ/כֹ֛ל אֲשֶׁר יִקְרָ֥א אֵלֶ֖י/ךָ הַ/נָּכְרִ֑י לְמַ֣עַן יֵדְעוּ/ן֩ כָּל עַמֵּ֨י הָ/אָ֜רֶץ אֶת שְׁמֶ֗/ךָ לְ/יִרְאָ֤ה אֹֽתְ/ךָ֙ כְּ/עַמְּ/ךָ֣ יִשְׂרָאֵ֔ל וְ/לָ/דַ֕עַת כִּי שִׁמְ/ךָ֣ נִקְרָ֔א עַל הַ/בַּ֥יִת הַ/זֶּ֖ה אֲשֶׁ֥ר בָּנִֽיתִי־־־־־׃
