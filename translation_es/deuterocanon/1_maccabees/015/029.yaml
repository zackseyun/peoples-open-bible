review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido global del griego: devastación de las fronteras/territorio, daño grave a la tierra, y dominio sobre muchos lugares del reino. Sin embargo, dos giros debilitan la fidelidad idiomática al valor contextual: «un gran golpe sobre la tierra» suena poco natural en español para πληγὴν μεγάλην ἐπὶ τῆς γῆς, y «os habéis hecho dueños» introduce una posesión más personal que el matiz de dominio/control de ἐκυριεύσατε.'
  spanish_quality_summary: El texto es generalmente claro, pero necesita una reparación menor para sonar natural y digno en español eclesiástico contemporáneo. «Habéis causado un gran golpe sobre la tierra» resulta forzado; «habéis asestado un gran golpe a la tierra» o «habéis causado gran daño en la tierra» sería más idiomático. Además, «os habéis hecho dueños de» es comprensible, pero menos limpio que «habéis tomado control de» o «habéis dominado».
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. Las decisiones léxicas son mayormente adecuadas. Conviene ajustar ἐκυριεύσατε a «habéis tomado control de» para alinearse mejor con el POB inglés («have gained control of») y evitar el matiz posesivo de «hecho dueños».
  issues:
  - severity: medium
    issue: «habéis causado un gran golpe sobre la tierra» es poco natural en español
    rationale: Aunque «gran golpe» puede defenderse léxicamente para πληγή, la construcción con «causar ... sobre la tierra» no suena idiomática. «Asestar un gran golpe a la tierra» conserva mejor la imagen de impacto y mejora la legibilidad.
  - severity: medium
    issue: «os habéis hecho dueños[c] de» sobreinterpreta ἐκυριεύσατε
    rationale: El griego denota ejercer dominio o ganar control, no necesariamente apropiación posesiva en sentido fuerte. «Habéis tomado control[c] de» preserva mejor el matiz contextual y coincide mejor con la auditoría inglesa.
  - severity: low
    issue: La nota b omite «plaga» como alternativa documentada
    rationale: La auditoría inglesa preserva explícitamente la gama «wound, stroke, or plague». En español conviene mantener «plaga» en la nota para reflejar con más plenitud el abanico semántico, aunque no sea la opción principal en contexto.
  revised_spanish_text: Habéis arrasado sus fronteras[a], y habéis asestado un gran golpe[b] a la tierra, y habéis tomado control[c] de muchos lugares en mi reino.
