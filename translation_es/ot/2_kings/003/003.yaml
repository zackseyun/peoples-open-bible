translation:
  language: es
  text: Solo[a] se apegó a los pecados de Jeroboam, hijo de Nabat, con los cuales hizo pecar a Israel; no se apartó de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que hizo pecar a Israel» / «con los cuales llevó a Israel al pecado». El verbo causativo hebreo indica que las acciones de Jeroboam llevaron a Israel al pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Sin embargo
  - Pero solo
  lexicon: HALOT
  rationale: La partícula limita la evaluación del rey frente a lo anterior. «Solo» reproduce de forma breve y natural la restricción evaluativa sin introducir una oposición más fuerte que la del hebreo.
- source_word: בְּחַטֹּאות
  english_pob_choice: to the sins
  chosen_spanish: a los pecados
  alternatives_spanish:
  - en los pecados
  - con los pecados
  lexicon: HALOT
  rationale: Con דבק, la preposición expresa adherencia. En español, «se apegó a» se combina naturalmente con «a los pecados», manteniendo la idea de adhesión persistente.
- source_word: חַטֹּאות
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - prácticas pecaminosas
  - faltas
  lexicon: HALOT
  rationale: El plural designa las transgresiones cultuales asociadas con Jeroboam. «Pecados» conserva la valoración moral y religiosa explícita del pasaje deuteronomista.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam, hijo de Nabat
  alternatives_spanish:
  - Jeroboam, hijo de Nebat
  - Jeroboam, el hijo de Nabat
  lexicon: HALOT
  rationale: Se conserva la identificación nominal estándar. «Hijo de Nabat» refleja el patronímico hebreo con claridad y naturalidad en español bíblico moderno.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  english_pob_choice: with which he caused Israel to sin
  chosen_spanish: con los cuales hizo pecar a Israel
  alternatives_spanish:
  - con los cuales llevó a Israel a pecar
  - por los cuales hizo pecar a Israel
  lexicon: HALOT
  rationale: El verbo hiphil es causativo. «Hizo pecar a Israel» preserva la fuerza causal sin suavizarla; «con los cuales» mantiene la relación relativa plural con los pecados/prácticas de Jeroboam.
- source_word: דָּבֵק
  english_pob_choice: he clung
  chosen_spanish: se apegó
  alternatives_spanish:
  - se mantuvo adherido
  - se mantuvo fiel
  lexicon: HALOT
  rationale: דבק expresa fuerte adhesión. «Se apegó» es idiomático en español y conserva la idea de persistencia y vínculo continuo; evita una formulación demasiado mecánica.
- source_word: לֹא סָר
  english_pob_choice: he did not turn away
  chosen_spanish: no se apartó
  alternatives_spanish:
  - no se desvió
  - no se alejó
  lexicon: HALOT
  rationale: La expresión idiomática indica cese o abandono de una conducta. «No se apartó» es la forma más natural y fiel para este contexto.
- source_word: מִמֶּנָּה
  english_pob_choice: from them
  chosen_spanish: de ellos
  alternatives_spanish:
  - de eso
  - de ello
  lexicon: HALOT
  rationale: Aunque el sufijo hebreo es formalmente singular femenino, el antecedente conceptual es colectivo. En español, «de ellos» evita ambigüedad y concuerda con «los pecados».
theological_decisions:
- issue: Juicio teológico sobre la infidelidad real
  english_pob_reading: Retain explicit moral language ('sins,' 'caused Israel to sin') without softening into merely political or cultic deviation.
  chosen_spanish_reading: Mantener el lenguaje moral explícito («pecados», «hizo pecar a Israel») sin rebajarlo a mera desviación política o ritual.
  alternative_spanish_readings:
  - «prácticas»
  - «errores»
  - «desviaciones»
  rationale: El hebreo pertenece a la fórmula de evaluación deuteronomista que condena la conducta de Jeroboam y su efecto sobre Israel. La traducción debe conservar esa valoración teológica, no atenuarla.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la última revisión inglesa: se preserva la fuerza causal del hiphil con una relativa plural («con los cuales»), y se mantiene la evaluación moral explícita del texto. No se adoptó una equivalencia más neutral porque el hebreo y el audit trail subrayan la acusación teológica tradicional deuteronomista.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni un sustituto directo.
  - Se eligió «pecados» en lugar de «prácticas» para conservar el juicio moral explícito del pasaje.
  - «Se apegó» y «no se apartó» reflejan de forma natural la continuidad y perseverancia del hebreo דבק / סר.
  - La forma «hijo de Nabat» sigue la convención bíblica española y mantiene la identificación patronímica sin añadir explicación innecesaria.
