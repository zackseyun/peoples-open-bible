revisions:
- from: Así también ustedes presentarán la contribución de Yahvé[a] de todos sus diezmos, que reciban de los hijos de Israel, y de ello darán la contribución de Yahvé a Aarón el sacerdote.
  to: Así también ustedes presentarán la contribución de Yahvé de todos sus diezmos que reciban de los hijos de Israel[a], y de esos diezmos darán la contribución de Yahvé a Aarón el sacerdote.
  rationale: Se corrige el anclaje de la nota para que corresponda a 'hijos de Israel', conforme al audit trail y a la disciplina de notas. También se mejora 'de ello' a 'de esos diezmos' para expresar con naturalidad el partitivo de מִמֶּנּוּ sin perder precisión. El resto del verso se conserva porque representa bien el hebreo y el razonamiento léxico del POB.
