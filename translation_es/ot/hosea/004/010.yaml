  glossary_alignment: 'Alineación general buena con el glosario del proyecto: יְהוָה -> ''Yahvé'' correctamente; no hay conflictos con otros términos por defecto. La elección ''se prostituirán'' para זנה es defendible en Oseas y preserva la carga sexual/covenantal. La última cláusula debe explicarse mejor para mostrar por qué no se traduce simplemente ''guardar/observar''.'
