translation:
  language: es
  text: Y a Semaías, su hijo, le nacieron hijos que gobernaban la casa de sus padres[a], porque eran hombres poderosos y valerosos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que eran gobernantes sobre la casa de sus padres». La expresión hebrea también puede entenderse como referencia a autoridad sobre la casa paterna o el hogar ancestral.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea «hombres poderosos y valerosos» también puede referirse a hombres de fuerza, capacidad o posición probadas, no solo a guerreros.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִשְׁמַעְיָה
  english_pob_choice: And to Shemaiah
  chosen_spanish: Y a Semaías
  alternatives_spanish:
  - Ahora bien, a Semaías
  - Y para Semaías
  lexicon: HALOT
  rationale: La preposición לְ en esta fórmula genealógica introduce al miembro siguiente de la lista; en español, «a Semaías» reproduce con naturalidad ese valor direccional/relacional sin añadir interpretación.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su descendiente
  lexicon: HALOT
  rationale: El sufijo posesivo 3ms se refiere de manera más natural a «su hijo» en este contexto genealógico, manteniendo la relación familiar explícita.
- source_word: נוֹלַד
  english_pob_choice: were born
  chosen_spanish: le nacieron
  alternatives_spanish:
  - nacieron
  - fueron nacidos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular pasiva, en español la construcción impersonal con «le nacieron» expresa mejor el dato genealógico con sujeto plural («hijos») sin forzar una pasiva poco natural.
- source_word: בָּנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - descendientes
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos/sons». En español, «hijos» conserva el sentido genealógico y resulta más natural que repetir «hijos varones» sin necesidad contextual.
- source_word: הַמִּמְשָׁלִים
  english_pob_choice: who ruled over
  chosen_spanish: que gobernaban
  alternatives_spanish:
  - que tenían autoridad sobre
  - que ejercían dominio sobre
  lexicon: HALOT
  rationale: מָשַׁל expresa gobernar/ejercer autoridad. «Gobernaban» mantiene el valor verbal y evita reducir el término a un título nominal.
- source_word: לְבֵית אֲבִיהֶם
  english_pob_choice: their fathers’ house
  chosen_spanish: la casa de sus padres
  alternatives_spanish:
  - la casa paterna
  - la casa de su padre
  lexicon: HALOT
  rationale: בית אב denota la unidad familiar/clánica del padre. En español, «la casa de sus padres» conserva la imagen de casa familiar heredada y sigue de cerca la revisión inglesa hacia el singular conceptual de «house» sin perder el matiz de linaje.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de su capacidad para gobernar. «Porque» da una relación causal clara y natural en español.
- source_word: גִּבּוֹרֵי חַיִל
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - hombres de valor
  - hombres poderosos y valerosos
  - guerreros valientes
  lexicon: HALOT
  rationale: La expresión fija puede abarcar valor, fuerza y capacidad probada. En este contexto genealógico-administrativo, «hombres valientes» conserva la fuerza evaluativa sin restringirla indebidamente a guerra, y sigue la amplitud semántica reconocida en la nota inglesa.
- source_word: הֵמָּה
  english_pob_choice: they were
  chosen_spanish: eran
  alternatives_spanish:
  - ellos eran
  - eran ellos
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis en hebreo. En español ese énfasis queda suficientemente reflejado por la estructura de la frase; «eran» evita pesadez innecesaria.
theological_decisions:
- issue: La expresión de estatus y capacidad en גִּבּוֹרֵי חַיִל
  english_pob_reading: The Hebrew phrase 'mighty men of valor' can also denote men of proven strength, competence, or standing, not only battlefield warriors.
  chosen_spanish_reading: «hombres valientes» como rasgo de fortaleza y capacidad probada, no solo de guerra
  alternative_spanish_readings:
  - «hombres de valor»
  - «guerreros valientes»
  - «hombres capaces y valerosos»
  rationale: El contexto es genealógico y administrativo, no militar. «Hombres valientes» conserva la evaluación positiva sin imponer una lectura exclusivamente bélica. Se mantiene la tensión semántica de una fórmula amplia de honor/capacidad.
  doctrine_reference: No aplica; decisión léxica-contextual, no doctrinal.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «households» por «house» para acercarse más al singular de בית אֲבִיהֶם. La redacción española sigue esa decisión con «la casa de sus padres», manteniendo el valor clánico/familiar de la expresión sin volverla demasiado literal o poco natural. Se preserva además la amplitud semántica de גִּבּוֹרֵי חַיִל mediante una traducción no reducida a combate.
  spanish_consistency_notes:
  - Se mantiene «Semaías» para el nombre propio, siguiendo la ortografía castellana habitual de nombres bíblicos.
  - «Yahvé» no aparece en este versículo; no se requiere decisión sobre el tetragrámaton.
  - Se usa «hombres» en correspondencia con la evaluación del hebreo masculino plural.
  - La construcción «le nacieron hijos» evita una pasiva rígida y es idiomática en español bíblico contemporáneo.
