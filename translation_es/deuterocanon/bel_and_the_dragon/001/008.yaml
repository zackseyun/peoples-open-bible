lexical_decisions:
- source_word: βέβρωκεν
  english_pob_choice: has eaten
  chosen_spanish: ha comido
  alternatives_spanish:
  - ha consumido
  - ha devorado
  lexicon: LSJ
  rationale: El perfecto de βιβρώσκω expresa una acción completada con relevancia presente. En español, «ha comido» comunica de manera natural ese valor perfecto sin añadir intensidad indebida.
- source_word: οὐδέποτε
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - jamás
  lexicon: LSJ
  rationale: «Nunca» es la negación adverbial más directa y natural en español para οὐδέποτε.
- source_word: θυμωθεὶς
  english_pob_choice: became angry
  chosen_spanish: se enojó
  alternatives_spanish:
  - se enfureció
  - se irritó
  lexicon: LSJ
  rationale: El participio aoristo indica la circunstancia del enojo del rey. «Se enojó» conserva ese valor ingresivo sin sobrecargarlo como una ira extrema.
- source_word: ὁ βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: LSJ
  rationale: Título estándar; «el rey» es la equivalencia natural y fiel.
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - mandó llamar
  - convocó
  lexicon: LSJ
  rationale: «Llamó» reproduce el verbo básico de manera transparente. Aunque puede implicar convocatoria, no añade formalidad innecesaria.
- source_word: τοὺς ἱερεῖς αὐτοῦ
  english_pob_choice: his priests
  chosen_spanish: a sus sacerdotes
  alternatives_spanish:
  - a sus sacerdotes del templo
  - a sus sacerdotes propios
  lexicon: LSJ
  rationale: ἱερεῖς se traduce aquí por «sacerdotes», el término español natural. El posesivo αὐτοῦ se conserva como «sus», indicando pertenencia o adscripción al rey.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les expresó
  lexicon: LSJ
  rationale: Fórmula verbal directa y natural en español; el dativo αὐτοῖς se refleja con «les».
- source_word: Ἐὰν μὴ εἴπητέ μοι
  english_pob_choice: If you do not tell me
  chosen_spanish: Si no me dicen
  alternatives_spanish:
  - A menos que me digan
  - Si no me lo dicen
  lexicon: LSJ
  rationale: La condición con ἐὰν μή y subjuntivo se expresa de forma clara y fiel con «Si no me dicen». Mantiene el sentido directo de amenaza o exigencia.
- source_word: τίς ὁ κατεσθίων
  english_pob_choice: who is eating
  chosen_spanish: quién es el que está comiendo
  alternatives_spanish:
  - quién está comiendo
  - quién es el que devora
  lexicon: LSJ
  rationale: El participio presente expresa acción en curso; «el que está comiendo» preserva el aspecto progresivo. Se evita intensificarlo como «devorando» sin necesidad textual.
translation_notes:
  revision_awareness: La versión inglesa de la POB conserva la incompletitud del versículo porque el griego suministrado se corta al final. Esta propuesta española sigue esa misma decisión textual y mantiene la frase final abierta para no fingir una continuidad que no está en el fuente base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece el nombre divino.
  - Se usa «sacerdotes» por el valor léxico de ἱερεῖς en este contexto narrativo; no se opta por «presbíteros» ni «ministros».
  - Se conserva el progresivo con «está comiendo» para reflejar el participio presente κατεσθίων.
  - La frase final queda truncada con puntos suspensivos para reflejar la ruptura del texto griego, en línea con la nota textual inglesa.
