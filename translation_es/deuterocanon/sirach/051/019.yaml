translation:
  language: es
  text: Mi alma la deseó[a], y no aparté mi rostro de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El paralelo griego en este punto es sustancialmente más largo y presenta otra redacción, añadiendo líneas sobre práctica diligente, las manos alzadas en alto y el lamento por los asuntos ocultos de la sabiduría. El texto principal sigue el testimonio hebreo conservado.
    reason: textual_variant
lexical_decisions:
- source_word: חַשְׁקָה
  english_pob_choice: desired
  chosen_spanish: se apegó
  alternatives_spanish:
  - la deseó
  - se inclinó a ella
  - se prendó de ella
  lexicon: HALOT
  rationale: El hebreo expresa una fuerte adhesión o deseo; en español, "se apegó" conserva la idea de unión afectiva y perseverante sin reducirla solo a emoción momentánea. También evita una formulación demasiado romántica para el contexto sapiencial personificado.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo
  - mi vida
  - mi ser
  lexicon: HALOT
  rationale: '"Mi alma" mantiene el paralelismo y el tono elevado del hebreo, preservando la antropología bíblica y la cadencia devocional del verso.'
- source_word: בָּהּ
  english_pob_choice: her
  chosen_spanish: a ella
  alternatives_spanish:
  - en ella
  - con ella
  lexicon: HALOT
  rationale: La preposición hebrea con חשק comunica adhesión dirigida a una persona; en español, "a ella" refleja esa orientación relacional con naturalidad.
- source_word: וּפָנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  - mi presencia
  - mi atención
  lexicon: HALOT
  rationale: '"Rostro" conserva el hebraísmo y funciona bien en la expresión idiomática posterior. "Cara" suena más coloquial; "presencia" y "atención" suavizan demasiado la imagen concreta.'
- source_word: לֹא אַהֲפֹך
  english_pob_choice: I did not turn away
  chosen_spanish: no aparté
  alternatives_spanish:
  - no volví
  - no desvié
  - no me aparté
  lexicon: HALOT
  rationale: El verbo hebreo aquí apunta a un movimiento de apartarse o volverse de lado. En español, "no aparté mi rostro" reproduce la idea sin añadir un sujeto reflexivo que el hebreo no exige explícitamente.
- source_word: מִמֶּנָּה
  english_pob_choice: from her
  chosen_spanish: de ella
  alternatives_spanish:
  - de junto a ella
  - alejado de ella
  lexicon: HALOT
  rationale: '"De ella" es la forma directa y suficiente para marcar separación. La idea de alejamiento ya queda implícita en "no aparté mi rostro".'
theological_decisions:
- issue: Sapiential personification of wisdom as feminine
  english_pob_reading: Retain feminine pronouns ('her')
  chosen_spanish_reading: Mantener la referencia femenina ('ella')
  alternative_spanish_readings:
  - neutro impersonal ('eso')
  - reformular de modo abstracto ('la sabiduría')
  rationale: El hebreo usa formas femeninas y el contexto de Sirácides personifica la sabiduría. Mantener "ella" preserva la textura literaria y teológica en vez de despersonalizar el pasaje.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; preserve source intent'
- issue: 'Base textual: hebreo conservado versus paralelo griego divergente'
  english_pob_reading: Translate from the extant Hebrew while consulting the Greek as a control
  chosen_spanish_reading: Traducir desde el hebreo conservado, con el griego como control secundario
  alternative_spanish_readings:
  - seguir el griego expandido
  - combinar hebreo y griego en una sola línea
  rationale: El testimonio hebreo es la base principal del versículo y el griego es sustancialmente más largo y diferente. Por eso la traducción española sigue el hebreo, sin borrar la tensión textual ni el valor del paralelo griego.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; use parallel as actual input without displacing original-language primacy'
translation_notes:
  revision_awareness: La redacción española sigue la decisión revisada del registro inglés, que pasó de una imagen más débil de adhesión a una formulación más directa de deseo/adhesión para חַשְׁקָה. Aun así, en español se eligió 'se apegó' para conservar tanto la fuerza afectiva como la continuidad de la imagen relacional en un estilo natural.
  spanish_consistency_notes:
  - He mantenido "ella" para la sabiduría, coherente con el hebreo y con la práctica del POB de preservar el género fuente.
  - '"Rostro" conserva el hebraísmo idiomático y enlaza bien con "no aparté".'
  - No se incorporaron elementos del griego al texto principal, pero sí en nota para respetar la variante textual documentada.
