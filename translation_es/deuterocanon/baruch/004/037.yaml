review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego: anuncio de retorno, hijos reunidos de oriente a occidente, relación con la palabra del Santo y gozo vinculado a la gloria de Dios. Sin embargo, no preserva del todo la decisión auditada sobre οἱ υἱοί σου, ya que neutraliza el masculino explícito con «tus hijos», donde en español puede mantenerse «tus hijos» pero pierde la nota de ''sons'' frente a ''children''; además, las notas al pie están desalineadas con los anclajes semánticos del inglés auditado: la nota [a] en inglés corresponde a una alternativa para τῷ ῥήματι, no para ἰδοὺ, y la [b] corresponde a la relación de χαίροντες con τῇ...δόξῃ, no a «del Santo».'
  spanish_quality_summary: El español es claro, natural y digno. «Mira» funciona, aunque «Mira» con nota de alternativa «He aquí» es aceptable. «Enviaste lejos», «reunidos» y «desde el oriente hasta el occidente» son legibles. El punto principal de calidad es que conviene alinear las notas al pie con las ambigüedades reales del texto fuente y del audit trail. También es más idiomático en este contexto usar «regocijándose» o mantener «alegrándose»; ambos sirven. Se prefiere una formulación más exacta de las notas para evitar confusión.
  glossary_alignment: 'No hay conflicto con los términos troncales del proyecto como Yahvé/Mesías. «Dios» está bien para θεοῦ. «El Santo» es una buena equivalencia de τοῦ ἁγίου en este contexto. La principal desalineación es metodológica: el audit trail preserva dos alternativas dativales, una en «a/por la palabra del Santo» y otra en «en/ante la gloria de Dios»; el español debe reflejar ambas correctamente en notas.'
  issues:
  - severity: medium
    issue: Notas al pie mal asignadas respecto del audit trail inglés
    rationale: La nota [a] del inglés explica la ambigüedad de τῷ ῥήματι ('at/by the word of the Holy One'), pero en el borrador [a] se usa para ἰδοὺ. La nota [b] del inglés explica la relación de χαίροντες con τῇ τοῦ θεοῦ δόξῃ, pero en el borrador [b] se aplica a «por la palabra del Santo». Esto altera la documentación lexical.
  - severity: medium
    issue: Falta una nota para la ambigüedad de «en la gloria de Dios»
    rationale: El audit trail conservó explícitamente la alternativa 'at the glory of God'. El español actual no la documenta, aunque la construcción admite alternativas como «ante la gloria de Dios».
  - severity: low
    issue: La rationale de «tus hijos» suaviza innecesariamente la decisión de masculino explícito
