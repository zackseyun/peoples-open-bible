translation:
  language: es
  text: Ellos perecerán[a], pero tú permanecerás; todos ellos se gastarán como una prenda. Como ropa los cambiarás[b], y pasarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estarás en pie». El verbo hebreo dice literalmente «estar de pie» y aquí expresa permanencia duradera en contraste con la ruina de la creación.
    reason: lexical_alternative
  - marker: b
    text: O «los reemplazarás». El hebreo puede sugerir cambiarlos o sustituirlos, continuando la metáfora de la ropa.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - Estos
  - Ellos mismos
  lexicon: HALOT
  rationale: Pronombre independiente en tercera persona plural; en el contexto se refiere a la creación mencionada antes. «Ellos» mantiene la contraposición natural con «tú».
- source_word: יֹאבֵדוּ
  english_pob_choice: will perish
  chosen_spanish: perecerán
  alternatives_spanish:
  - serán destruidos
  - desaparecerán
  lexicon: HALOT
  rationale: El qal imperfecto de אבד expresa ruina o perecer. «Perecerán» es directo, sobrio y no fuerza una noción más fuerte de aniquilación.
- source_word: וְאַתָּה
  english_pob_choice: but you
  chosen_spanish: pero tú
  alternatives_spanish:
  - y tú
  lexicon: HALOT
  rationale: La conjunción marca contraste fuerte entre la creación que perece y Dios. «Pero» expresa mejor el valor adversativo en español.
- source_word: תַעֲמֹד
  english_pob_choice: will remain
  chosen_spanish: permanecerás
  alternatives_spanish:
  - estarás en pie
  - permanecerás firme
  lexicon: HALOT
  rationale: Literalmente significa «estar en pie», pero aquí el sentido es permanencia duradera. «Permanecerás» comunica la idea sin perder el contraste.
- source_word: וְכֻלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - todos juntos
  lexicon: HALOT
  rationale: Conserva el alcance total y distributivo del hebreo, referido al conjunto de lo creado.
- source_word: כַּבֶּגֶד
  english_pob_choice: like a garment
  chosen_spanish: como un vestido
  alternatives_spanish:
  - como un manto
  - como ropa
  lexicon: HALOT
  rationale: בגד es término general para prenda/vestido. «Vestido» es natural en español y mantiene la imagen poética.
- source_word: יִבְלוּ
  english_pob_choice: will wear out
  chosen_spanish: se gastarán
  alternatives_spanish:
  - se desgastarán
  - se arruinarán
  lexicon: HALOT
  rationale: בלה se usa especialmente para ropa que se consume por el uso. «Se gastarán» preserva el matiz de desgaste de la metáfora.
- source_word: כַּלְּבוּשׁ
  english_pob_choice: Like clothing
  chosen_spanish: Como ropa
  alternatives_spanish:
  - Como vestido
  - Como vestidura
  lexicon: HALOT
  rationale: לבוש también pertenece al campo de la vestimenta. Se varía el término para evitar repetición torpe y reflejar el paralelismo poético.
- source_word: תַּחֲלִיפֵם
  english_pob_choice: you will change them
  chosen_spanish: los cambiarás
  alternatives_spanish:
  - los reemplazarás
  - los trocarás
  lexicon: HALOT
  rationale: El hiphil de חלף puede significar cambiar o reemplazar. «Los cambiarás» sigue la metáfora del cambio de ropa sin cerrar la ambigüedad del hebreo.
- source_word: וְיַחֲלֹפוּ
  english_pob_choice: they will pass away
  chosen_spanish: y pasarán
  alternatives_spanish:
  - y desaparecerán
  - y se irán
  lexicon: HALOT
  rationale: El qal de חלף aquí expresa pasar, irse o desaparecer. «Pasarán» es breve y conserva el efecto final del verso.
theological_decisions:
- issue: Permanencia divina frente a transitoriedad de la creación
  english_pob_reading: Creation perishes, but God remains; the verse emphasizes enduring permanence without masking the contrast.
  chosen_spanish_reading: La creación perece, pero Dios permanece; se conserva la tensión entre lo creado y la permanencia divina.
  alternative_spanish_readings:
  - usar «estarás en pie» para una literalidad más fuerte
  - usar «permanecerás firme» para enfatizar estabilidad
  rationale: El hebreo contrapone la caducidad de lo creado con la permanencia de Dios. «Permanecerás» transmite bien el peso teológico sin introducir terminología doctrinal ajena al verso.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla'
- issue: Metáfora del vestido para cambio o reemplazo
  english_pob_reading: The Hebrew can suggest changing or replacing them, continuing the clothing metaphor.
  chosen_spanish_reading: «Los cambiarás» conserva la ambigüedad entre cambiar y reemplazar, dentro de la imagen de la ropa.
  alternative_spanish_readings:
  - «los reemplazarás»
  - «los trocarás»
  rationale: El hebreo permite cambio o sustitución. En español, «cambiarás» mantiene abierta esa tensión y sigue la metáfora sin sobreespecificarla.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión lexical cuando el texto la permite'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente: se mantuvo el contraste adversativo, la metáfora de la vestimenta y la ambigüedad de חלף en un español natural. No hubo revisiones aplicadas en el paquete inglés; el borrador español conserva esa línea estable.'
  spanish_consistency_notes:
  - Se usó «Dios» por la referencia implícita al segundo miembro del contraste, coherente con el contexto del salmo.
  - Se evitó «SEÑOR» porque aquí no se trata de un reemplazo por convenciones de ocultamiento del nombre divino, sino de una formulación poética del sujeto divino.
  - Se eligió un nivel de español moderno y reverente, apto para lectura pública, sin arcaísmos innecesarios.
