translation:
  language: es
  text: Ahora bien, Jefté el galaadita era un guerrero valiente[a], y era hijo de una prostituta[b][c]. Galaad engendró a Jefté.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, ‘un hombre de valor’.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘hijo de una prostituta’. Versiones españolas más antiguas a veces usan ‘ramera’.'
    reason: lexical_alternative
  - marker: c
    text: Aquí Galaad es el nombre personal del padre de Jefté, no solo una referencia geográfica.
    reason: cultural_note
lexical_decisions:
- source_word: הַגִּלְעָדִי
  english_pob_choice: the Gileadite
  chosen_spanish: el galaadita
  alternatives_spanish:
  - de Galaad
  - el de Galaad
  lexicon: HALOT
  rationale: El gentilicio/adjetivo identifica a Jefté por su pertenencia a Galaad. 'Galaadita' conserva la función identificadora y suena natural en español bíblico moderno.
- source_word: גִּבּוֹר חַיִל
  english_pob_choice: a mighty warrior
  chosen_spanish: un guerrero valiente
  alternatives_spanish:
  - un hombre poderoso de valor
  - un guerrero poderoso
  - un hombre de valor
  lexicon: HALOT
  rationale: La combinación puede abarcar fuerza, valor y capacidad militar. En este contexto narrativo, 'guerrero valiente' comunica la fuerza marcial sin sonar arcaico; mantiene la tensión entre valentía y destreza bélica.
- source_word: בֶּן אִשָּׁה זוֹנָה
  english_pob_choice: the son of a prostitute
  chosen_spanish: hijo de una prostituta
  alternatives_spanish:
  - hijo de una ramera
  - hijo de una mujer prostituta
  lexicon: HALOT
  rationale: זונה denota de manera directa a una prostituta. 'Prostituta' es claro y fiel al peso social del término, sin suavizarlo ni volverlo arcaico.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - procreó
  lexicon: HALOT
  rationale: El verbo indica paternidad biológica. 'Engendró' preserva bien la fuerza genealógica y funciona como equivalente bíblico natural en español.
- source_word: גִּלְעָד
  english_pob_choice: Gilead (the man, not merely the region)
  chosen_spanish: Galaad
  alternatives_spanish:
  - Galaad, el hombre
  - Galaad, su padre
  lexicon: HALOT
  rationale: Aquí el sujeto de 'engendró' es un individuo llamado Galaad, no solo la región. Mantener el nombre sin aclaración excesiva respeta la concisión del hebreo y la nota contextual del POB en inglés.
- source_word: וְ
  english_pob_choice: Now
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Entonces
  lexicon: HALOT
  rationale: El inicio hebreo funciona como enlace narrativo simple. En español, 'Y' reproduce mejor la coordinación del original que 'Ahora' o 'Entonces', que añadirían un matiz discursivo no necesario.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente quedó sin cambios tras revisión final; el español sigue esa lectura de alta concordancia y conserva las mismas decisiones clave: gentilicio, valor marcial, término social fuerte para זוֹנָה y distinción entre el hombre llamado Galaad y la región.'
  spanish_consistency_notes:
  - Se mantiene 'Jefté' para el nombre propio.
  - Se conserva 'Galaad' como forma española uniforme para el nombre personal y la región según contexto.
  - No se introduce 'Mesías', 'SEÑOR' ni otras sustituciones no pertinentes al versículo.
  - La coordinación inicial se refleja con 'Y' para no sobredeterminar el arranque narrativo.
