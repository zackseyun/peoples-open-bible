review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el contenido del hebreo: doble sincronismo regnal, avance militar de Salmanasar contra Samaria y el asedio. No hay errores graves de sentido. Sin embargo, la sintaxis española repite «que ... que», lo que entorpece la relación entre הִיא y la cláusula principal. Además, «subió contra» es comprensible pero suena más calcado y menos natural en español actual que «marchó contra» o «vino contra», sin pérdida del matiz militar.'
  spanish_quality_summary: El texto es mayormente fiel y legible, pero necesita una reparación de fluidez y naturalidad. «Y aconteció» es aceptable en registro bíblico digno. La principal deficiencia es la construcción «..., que era ..., que Salmanasar ...», poco natural en español. También conviene evitar el calco semítico «subió contra» en favor de una formulación militar más idiomática.
  glossary_alignment: No hay términos del glosario mayor implicados. Los nombres propios «Ezequías», «Oseas», «Ela», «Samaria», «Asiria» y «Salmanasar» son aceptables en español bíblico. La elección «la sitió» alinea bien con וַיָּצַר עָלֶיהָ.
  issues:
  - severity: medium
    issue: Sintaxis española torpe por doble «que»
    rationale: La secuencia «..., que era el séptimo año ..., que Salmanasar ...» reproduce demasiado de cerca la estructura de enlace del inglés/hebreo y resulta poco natural en español. Puede resolverse con comas o rayas y una cláusula principal directa.
  - severity: low
    issue: «Subió contra» suena calcado
    rationale: Aunque refleja עלה en contexto militar, en español general eclesial «marchó contra» comunica mejor el sentido de campaña militar sin rigidez semítica innecesaria.
  revised_spanish_text: Y aconteció en el cuarto año del rey Ezequías, que era el séptimo año de Oseas hijo de Ela, rey de Israel, que Salmanasar, rey de Asiria, marchó contra Samaria y la sitió.
  revision_rationale: Se mantiene el contenido y el tono bíblico del original, pero se sustituye «subió contra» por «marchó contra» para mayor naturalidad en español. No se añaden notas porque no surge una ambigüedad nueva ni es necesario preservar aquí las alternativas inglesas. La sintaxis queda prácticamente igual al borrador, aunque la recomendación editorial ideal sería puntuar la cláusula parentética con rayas; aun así, el cambio mínimo necesario es léxico.
