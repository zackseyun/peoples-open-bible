  text: לָ/כֵ֗ן בְּ/זֹאת֙ יְכֻפַּ֣ר עֲוֺֽן יַעֲקֹ֔ב וְ/זֶ֕ה כָּל פְּרִ֖י הָסִ֣ר חַטָּאת֑/וֹ בְּ/שׂוּמ֣/וֹ כָּל אַבְנֵ֣י מִזְבֵּ֗חַ כְּ/אַבְנֵי גִר֙ מְנֻפָּצ֔וֹת לֹֽא יָקֻ֥מוּ אֲשֵׁרִ֖ים וְ/חַמָּנִֽים־־׀־־־׃
translation:
  text: 'Therefore by this the guilt of Jacob will be atoned for, and this will be the full fruit of the removal of his sin: when he makes all the stones of the altar like crushed chalkstones, the Asherah poles and incense altars will not stand.'
