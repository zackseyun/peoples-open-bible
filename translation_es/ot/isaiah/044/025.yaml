translation:
  language: es
  text: el que frustra las señales de los jactanciosos[a] y hace que los adivinos actúen como necios[b], el que hace volver atrás a los sabios[c] y vuelve necio su conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''augurios'' por ''señales''. El hebreo puede referirse a supuestas señales confirmatorias usadas por practicantes engañosos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''hace locos a los adivinos'' / ''hace necios a los adivinos''. El verbo hebreo puede expresar que actúen irracionalmente o que queden desenmascarados como necios.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ''vuelve atrás a los sabios''. La frase pinta una reversión y humillación de quienes son tenidos por sabios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵפֵר
  english_pob_choice: frustrates
  chosen_spanish: frustra
  alternatives_spanish:
  - anula
  - desbarata
  - impide
  lexicon: HALOT
  rationale: El participio causativo comunica que Dios hace fracasar o quedar sin efecto esas señales; 'frustra' es natural en español y conserva la fuerza activa del verbo.
- source_word: אֹתוֹת
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - augurios
  - omens
  lexicon: HALOT
  rationale: '''Señales'' conserva el valor básico de אֹתוֹת y funciona bien en un contexto polémico sobre supuestos prodigios verificadores.'
- source_word: בַּדִּים
  english_pob_choice: boasters
  chosen_spanish: los arrogantes
  alternatives_spanish:
  - los jactanciosos
  - los mentirosos
  - los vanagloriosos
  lexicon: HALOT
  rationale: La revisión inglesa optó por un matiz de jactancia/arrogancia más que de mentira directa. 'Los arrogantes' recoge esa dimensión de presunción pública sin perder la censura profética.
- source_word: קֹסְמִים
  english_pob_choice: diviners
  chosen_spanish: adivinos
  alternatives_spanish:
  - hechiceros
  - vaticinadores
  - pronosticadores
  lexicon: HALOT
  rationale: '''Adivinos'' es el equivalente español más directo para קסם y mantiene el tono formal del pasaje.'
- source_word: יְהוֹלֵל
  english_pob_choice: makes ... act like fools
  chosen_spanish: hace que ... sean insensatos
  alternatives_spanish:
  - vuelve locos
  - los hace actuar como necios
  - los hace parecer necios
  lexicon: HALOT
  rationale: El verbo expresa volver insensato o hacer obrar como necio; 'hace que sean insensatos' preserva el sentido causativo sin introducir una lectura clínica de locura.
- source_word: מֵשִׁיב
  english_pob_choice: turns
  chosen_spanish: hace volver
  alternatives_spanish:
  - vuelve
  - empuja hacia atrás
  - retrae
  lexicon: HALOT
  rationale: El hiphil de שוב comunica reversión; 'hace volver' mantiene esa acción dirigida de Dios.
- source_word: חֲכָמִים
  english_pob_choice: wise men
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  - los prudentes
  - los doctos
  lexicon: HALOT
  rationale: '''Los sabios'' es una manera natural y respeta el plural masculino del hebreo sin necesidad de una perífrasis más pesada.'
- source_word: אָחוֹר
  english_pob_choice: back
  chosen_spanish: atrás
  alternatives_spanish:
  - hacia atrás
  - retroceder
  - en retaguardia
  lexicon: HALOT
  rationale: Como adverbio de dirección/reversión, 'atrás' funciona con 'hace volver' y conserva la imagen de retroceso y humillación.
- source_word: דַעְתָּם
  english_pob_choice: their knowledge
  chosen_spanish: su sabiduría
  alternatives_spanish:
  - su conocimiento
  - su entendimiento
  - su discernimiento
  lexicon: HALOT
  rationale: Aunque דעת puede ser 'conocimiento', el paralelismo con 'sabios' permite en español una correspondencia más natural con 'sabiduría', sin eliminar la tensión entre saber humano y su descalificación por Dios.
- source_word: יְשַׂכֵּל
  english_pob_choice: makes ... foolish
  chosen_spanish: vuelve necia
  alternatives_spanish:
  - hace necia
  - demuestra necia
  - la convierte en necedad
  lexicon: HALOT
  rationale: El verbo causativo expresa hacer necio o mostrar como necedad; 'vuelve necia' comunica bien ese resultado sobre la supuesta sabiduría.
theological_decisions:
- issue: How to render בַּדִּים in a way that preserves the POB revision from 'liars' to 'boasters'
  english_pob_reading: boasters
  chosen_spanish_reading: los arrogantes
  alternative_spanish_readings:
  - los jactanciosos
  - los mentirosos
  - los vanagloriosos
  rationale: La evidencia inglesa revisada favorece una referencia a presunción y jactancia más que a una falsedad aislada. 'Los arrogantes' transmite esa autosuficiencia exhibicionista y evita estrechar el término a 'mentirosos'.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §4
- issue: Whether יְשַׂכֵּל should be rendered as mere exposure or as active causation of folly
  english_pob_reading: makes their knowledge foolish
  chosen_spanish_reading: vuelve necia su sabiduría
  alternative_spanish_readings:
  - hace necia su sabiduría
  - muestra que su sabiduría es necedad
  - convierte su conocimiento en necedad
  rationale: El hebreo presenta acción divina activa sobre el supuesto saber humano. 'Vuelve necia' conserva esa causalidad y el paralelismo con 'hace volver atrás a los sabios'.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó בַּדִּים de 'liars' a 'boasters'; por eso el español evita 'mentirosos' como principal y adopta un término de presunción jactanciosa. También se mantuvo la lectura activa de los verbos causativos, conforme al audit trail más reciente y al consenso de alta concordancia.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplica en este versículo, pues el tetragrámaton no aparece explícitamente en el texto hebreo dado.
  - Se preservó la estructura de participios y verbos causativos con una cadena relativa en español para reflejar el hebreo.
  - '''Sabios'' se mantuvo masculino plural por fidelidad al hebreo y por consistencia con la política de precisión gramatical.'
  - '''Adivinos'' se usó en sentido técnico, no como mera adivinación popular, para respetar el campo semántico de קסם.'
