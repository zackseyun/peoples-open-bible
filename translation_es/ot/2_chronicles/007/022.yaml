translation:
  language: es
  text: 'Y dirán: «Porque abandonaron a Yahvé, el Dios de sus padres, que los sacó de la tierra de Egipto, y se aferraron[a] a otros dioses, y se postraron ante ellos y los sirvieron, por eso él ha traído sobre ellos todo este desastre[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abrazaron a otros dioses». El hebreo literalmente dice «tomaron/agarraron», una imagen de adhesión deliberada a dioses ajenos.
    reason: lexical_alternative
  - marker: b
    text: «Todo este desastre» se refiere a calamidad o juicio, no a mal moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  english_pob_choice: And they will say
  chosen_spanish: Y dirán
  alternatives_spanish:
  - Y dirán entonces
  - Y dirán así
  lexicon: HALOT
  rationale: El hebreo continúa la respuesta prevista en contexto futuro; en español, «dirán» transmite naturalmente ese valor prospectivo sin forzar una perífrasis.
- source_word: עַל אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Por cuanto
  - Ya que
  lexicon: HALOT
  rationale: La construcción introduce la causa de la ruina; «porque» es la forma más clara y directa en español para ese valor causal.
- source_word: עָזְבוּ
  english_pob_choice: forsook
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - desampararon
  lexicon: HALOT
  rationale: En este contexto pactal, el verbo expresa abandono relacional y religioso. «Abandonaron» conserva la gravedad sin sonar arcaico.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene el nombre divino según la convención POB en español: transliteración de YHWH como «Yahvé», evitando la sustitución por un título.'
- source_word: אֱלֹהֵי אֲבֹתֵיהֶם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - el Dios de sus progenitores
  lexicon: HALOT
  rationale: La expresión remite a continuidad de pacto con los padres/antepasados. «Sus padres» es la formulación natural y tradicional en español bíblico.
- source_word: הוֹצִיאָם מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: who brought them out of the land of Egypt
  chosen_spanish: que los sacó de la tierra de Egipto
  alternatives_spanish:
  - que los hizo salir de la tierra de Egipto
  - que los sacó de la tierra de Egipto
  lexicon: HALOT
  rationale: La fórmula del éxodo se expresa con naturalidad por «sacó». Mantiene el sentido de liberación histórica sin calcado excesivo.
- source_word: וַיַּחֲזִיקוּ בֵּאלֹהִים אֲחֵרִים
  english_pob_choice: and embraced other gods
  chosen_spanish: y se aferraron a otros dioses
  alternatives_spanish:
  - y se prendieron de otros dioses
  - y abrazaron a otros dioses
  lexicon: HALOT
  rationale: El verbo sugiere toma de posesión/agarre deliberado. En español, «se aferraron a» conserva la metáfora de adhesión intensa que el POB inglés quiso preservar con «embraced». Se evita «abrazaron» por posible ambigüedad afectiva.
- source_word: וַיִּשְׁתַּחֲוּוּ לָהֶם
  english_pob_choice: and bowed down to them
  chosen_spanish: y se postraron ante ellos
  alternatives_spanish:
  - y se inclinaron ante ellos
  - y se postraron a ellos
  lexicon: HALOT
  rationale: El verbo denota postración física de adoración. «Se postraron ante ellos» preserva el gesto corporal y el matiz cultual.
- source_word: וַיַּעַבְדוּם
  english_pob_choice: and served them
  chosen_spanish: y los sirvieron
  alternatives_spanish:
  - y les sirvieron
  - y los adoraron
  lexicon: HALOT
  rationale: Se conserva la distinción entre postración y servicio religioso. «Los sirvieron» mantiene el valor de עבד sin reemplazarlo por una glosa interpretativa.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: Marca consecuencia directa; «por eso» es claro, formal y natural en español contemporáneo.
- source_word: הֵבִיא עֲלֵיהֶם
  english_pob_choice: he has brought on them
  chosen_spanish: él ha traído sobre ellos
  alternatives_spanish:
  - él trajo sobre ellos
  - él ha hecho venir sobre ellos
  lexicon: HALOT
  rationale: El hifil de בוא con עַל expresa traer calamidad sobre alguien. «Ha traído sobre ellos» reproduce la direccionalidad y encaja con el discurso explicativo citado.
- source_word: כָּל הָרָעָה הַזֹּאת
  english_pob_choice: all this disaster
  chosen_spanish: todo este desastre
  alternatives_spanish:
  - toda esta calamidad
  - todo este mal
  lexicon: HALOT
  rationale: En contexto judicial, רָעָה apunta a desastre/calamidad, no a mal moral. «Desastre» refleja bien la idea de juicio y ruina.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la política editorial POB de no enmascarar el Tetragrámaton. «Yahvé» preserva el nombre propio del pacto y mantiene consistencia con otros pasajes del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de הָרָעָה en un contexto de juicio
  english_pob_reading: all this disaster, not moral evil
  chosen_spanish_reading: todo este desastre, no mal moral
  alternative_spanish_readings:
  - todo este mal
  - toda esta calamidad
  rationale: 'El contexto es explicativo y punitivo: se habla del resultado del abandono de Dios. En español, «desastre» evita leer רָעָה como mal ético y conserva la carga de calamidad judicial.'
  doctrine_reference: Uso contextual de רָעָה en lenguaje de juicio
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB en inglés, que optó por una formulación más natural para el segmento de וַיַּחֲזִיקוּ בֵּאלֹהִים אֲחֵרִים. En español se eligió «se aferraron a otros dioses» para preservar esa misma naturalidad y el sentido de adhesión intensa. También se mantuvo la distinción entre postración y servicio en los dos verbos cultuales consecutivos.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - 'Se mantiene la distinción entre postrarse y servir: «se postraron ante ellos» / «los sirvieron».'
  - «Desastre» se emplea en sentido judicial, no moral.
  - El orden y la puntuación siguen de cerca la estructura del hebreo y del texto inglés auditado, sin calcos innecesarios.
