translation:
  language: es
  text: Sólo él es mi peña y mi salvación[a], mi fortaleza; no vacilaré mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «no vacilaré». El hebreo incluye un modificador de grado, «mucho» o «grandemente», que suaviza un poco la afirmación frente a la formulación absoluta de Salmo 62:2 [Eng. 62:6].
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: alone
  chosen_spanish: Sólo
  alternatives_spanish:
  - solamente
  - únicamente
  - ciertamente
  lexicon: HALOT
  rationale: El marcador hebreo expresa exclusividad enfática. «Sólo» mantiene esa fuerza en español natural y corresponde mejor al énfasis del contexto que una simple lectura adverbial de certeza.
- source_word: הוּא
  english_pob_choice: He
  chosen_spanish: él
  alternatives_spanish:
  - Él
  - él mismo
  lexicon: HALOT
  rationale: El pronombre retoma a Dios; en español se puede omitir por estilo, pero aquí se conserva para reflejar la estructura enfática del hebreo. Se usa minúscula en el flujo de la oración y mayúscula sólo cuando la norma editorial lo requiera.
- source_word: צוּרִי
  english_pob_choice: my rock
  chosen_spanish: mi peña
  alternatives_spanish:
  - mi roca
  - mi roca escarpada
  lexicon: HALOT
  rationale: צוּר designa una roca firme, a menudo como imagen de seguridad. «Peña» preserva el valor metafórico de solidez y amparo con una resonancia bíblica clara en español; «roca» también sería posible, pero «peña» ayuda a mantener el tono poético.
- source_word: וִישׁוּעָתִי
  english_pob_choice: and my salvation
  chosen_spanish: y mi salvación
  alternatives_spanish:
  - y mi liberación
  - y mi rescate
  lexicon: HALOT
  rationale: יְשׁוּעָה puede significar salvación o liberación. Se mantiene «salvación» porque es la equivalencia amplia y teológicamente más estable en español, coherente con el uso bíblico del término.
- source_word: מִשְׂגַּבִּי
  english_pob_choice: my stronghold
  chosen_spanish: mi refugio
  alternatives_spanish:
  - mi fortaleza alta
  - mi baluarte
  lexicon: HALOT
  rationale: מִשְׂגָּב alude a un lugar alto y seguro, una fortaleza/refugio. «Refugio» comunica protección inmediata en español moderno; «fortaleza alta» o «baluarte» preservan más la imagen militar, pero suenan más marcadas o menos naturales en esta línea.
- source_word: לֹא אֶמּוֹט
  english_pob_choice: I will not be shaken
  chosen_spanish: no seré muy sacudido
  alternatives_spanish:
  - no seré sacudido
  - no vacilaré
  - no seré conmovido
  lexicon: HALOT
  rationale: מוט expresa tambalearse, ser sacudido o perder estabilidad. Se traduce con una pasiva natural en español para conservar la imagen de inestabilidad. «Muy» refleja רַבָּה, el matiz de grado que atenúa la afirmación absoluta.
- source_word: רַבָּה
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - mucho
  - grandemente
  lexicon: HALOT
  rationale: La forma adjetival femenina funciona aquí como modificador adverbial de grado. «Muy» es la manera más natural de expresar esa intensificación en español y preserva la diferencia con la formulación paralela más absoluta de otros versos.
theological_decisions:
- issue: Intensidad relativa de la seguridad final
  english_pob_reading: I will not be greatly shaken
  chosen_spanish_reading: no seré muy sacudido
  alternative_spanish_readings:
  - no seré sacudido
  - no vacilaré
  rationale: El hebreo incluye רַבָּה, que matiza el verbo de sacudimiento. Se conserva ese matiz para no nivelar la diferencia textual con la formulación paralela más absoluta y para respetar la variación deliberada del verso.
  doctrine_reference: Translation philosophy §1, §5
- issue: Metáfora de estabilidad aplicada a Dios
  english_pob_reading: my rock ... my stronghold
  chosen_spanish_reading: mi peña ... mi refugio
  alternative_spanish_readings:
  - mi roca ... mi fortaleza
  - mi roca ... mi baluarte
  rationale: La imagen del Dios protector se conserva como metáfora concreta de firmeza y amparo. «Peña» y «refugio» mantienen la densidad poética sin borrar la tensión entre solidez física y protección personal.
  doctrine_reference: Salmos 62:2–3; Translation philosophy §3
translation_notes:
  revision_awareness: El texto inglés de la POB permanece sin cambios en la revisión más reciente; no se registraron modificaciones aplicadas. La versión española sigue de cerca la lectura auditada del inglés, pero recupera el matiz de grado del hebreo con «muy».
  spanish_consistency_notes:
  - Se mantiene «salvación» para יְשׁוּעָה por coherencia con el registro bíblico general de la serie.
  - Se traduce el término de estabilidad con un verbo de sacudimiento para conservar la metáfora física del hebreo.
  - «Peña» se usa como equivalente poético de «rock» cuando el contexto de fortaleza y refugio lo favorece.
