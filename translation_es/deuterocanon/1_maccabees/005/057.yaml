translation:
  language: es
  text: 'Y dijeron: «Hagámonos también un nombre[a], y vayamos a combatir contra las naciones[b] que nos rodean».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ganarnos renombre». Literalmente: «hacernos un nombre».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los gentiles». El término griego puede referirse a los pueblos no judíos de alrededor.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ποιήσωμεν
  english_pob_choice: Let us make
  chosen_spanish: Hagámonos
  alternatives_spanish:
  - Hagamos
  - Hagámonos un nombre
  lexicon: LSJ
  rationale: El aoristo subjuntivo exhortativo se expresa naturalmente en español con una forma inclusiva de primera persona plural. En este contexto, 'hagámonos' mantiene la fuerza volitiva y encaja con la construcción fija 'hacerse un nombre'.
- source_word: καὶ αὐτοὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - nosotros también
  - aun nosotros
  lexicon: LSJ
  rationale: La partícula combina adición y énfasis; 'también' reproduce esa idea de hacer lo mismo, con fluidez en español dentro del discurso directo.
- source_word: ἑαυτοῖς
  english_pob_choice: for ourselves
  chosen_spanish: para nosotros mismos
  alternatives_spanish:
  - para sí mismos
  - para nosotros
  lexicon: LSJ
  rationale: Dentro del discurso directo, el reflexivo toma sentido de primera persona plural. 'Para nosotros mismos' conserva la autorreferencia y la intensidad del giro idiomático.
- source_word: ὄνομα
  english_pob_choice: a name
  chosen_spanish: un nombre
  alternatives_spanish:
  - renombre
  - reputación
  lexicon: LSJ
  rationale: La expresión griega idiomática significa alcanzar fama o renombre, pero 'un nombre' preserva la imagen bíblica sin ocultar el giro literal. En español, 'hacerse un nombre' es natural y transparente.
- source_word: πορευθῶμεν
  english_pob_choice: let us go
  chosen_spanish: vayamos
  alternatives_spanish:
  - partamos
  - procuremos ir
  lexicon: LSJ
  rationale: El verbo de movimiento en subjuntivo exhortativo se expresa de forma directa con 'vayamos'. Es breve, natural y mantiene el impulso narrativo.
- source_word: πολεμῆσαι
  english_pob_choice: to fight
  chosen_spanish: a combatir
  alternatives_spanish:
  - a pelear
  - a hacer guerra
  lexicon: LSJ
  rationale: El infinitivo señala acción bélica. 'Combatir' conserva el valor militar de manera natural en español y evita la posible ambigüedad de un combate aislado que podría tener 'pelear'.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los gentiles
  - los pueblos
  lexicon: LSJ
  rationale: '''Naciones'' sigue de cerca el griego y conserva el valor de pueblos/entidades vecinas sin cargar el término con un matiz eclesiástico posterior. Se mantiene la lectura histórica del pasaje.'
- source_word: τὰ κύκλῳ ἡμῶν
  english_pob_choice: around us
  chosen_spanish: que nos rodean
  alternatives_spanish:
  - alrededor de nosotros
  - circundantes
  lexicon: LSJ
  rationale: 'La expresión locativa se vuelve más idiomática en español como relativa: ''que nos rodean''. Comunica la idea de cercanía geográfica sin sonar forzado.'
theological_decisions:
- issue: Matiz idiomático de 'hacer un nombre'
  english_pob_reading: Retained the idiom literally as 'make a name for ourselves'
  chosen_spanish_reading: Conservar el giro como 'hacernos un nombre para nosotros mismos'
  alternative_spanish_readings:
  - ganarnos renombre
  - adquirir fama
  rationale: El texto expresa ambición de prestigio por medio de un modismo bíblico. Mantener el giro literal preserva la resonancia intertextual y el tono narrativo, sin perder inteligibilidad en español.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de τὰ ἔθνη en un contexto militar
  english_pob_reading: the nations
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  - los pueblos vecinos
  rationale: El pasaje es histórico y bélico; no requiere imponer un contraste teológico posterior entre judíos y gentiles. 'Las naciones' conserva el sentido amplio del griego y deja que el contexto determine que se trata de pueblos circundantes.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Se siguió el pasaje griego de 1 Macabeos 5:57 y se tuvo en cuenta el audit trail inglés, especialmente la decisión revisada sobre πολεμῆσαι: en español se optó por ''combatir'' como equivalente natural y formal. También se preservó la ambigüedad útil de ὄνομα mediante una nota de alternativa, tal como lo hace el POB inglés con ''make a name for ourselves''.'
  spanish_consistency_notes:
  - Se mantiene 'naciones' para τὰ ἔθνη, coherente con el criterio POB de no cargar el término con una lectura confesional innecesaria.
  - Se traduce el plural exhortativo inclusivo con primera persona plural ('hagámonos', 'vayamos') para conservar la voz del discurso directo.
  - Se usa 'combatir' en vez de 'pelear' porque suena más digno y conserva mejor el matiz militar del infinitivo griego en español bíblico contemporáneo.
  - Se conserva el orden natural del español con el complemento 'que nos rodean' para τὰ κύκλῳ ἡμῶν.
