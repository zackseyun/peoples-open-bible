translation:
  language: es
  text: Los correos[a], montados en los corceles reales, salieron apresurados y urgidos por la orden del rey, y el decreto fue emitido en Susa la ciudadela.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "montados en los corceles, los caballos reales de cría"; los términos hebreos para los animales son raros y su identificación precisa es incierta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָצִים
  english_pob_choice: the couriers
  chosen_spanish: los correos
  alternatives_spanish:
  - los couriers
  - los mensajeros
  - los corredores
  lexicon: HALOT
  rationale: En contexto persa imperial, el término alude a mensajeros oficiales o correos de despacho, no meramente a 'corredores'. 'Correos' comunica bien la función y conserva el matiz oficial.
- source_word: רֹכְבֵי
  english_pob_choice: mounted on
  chosen_spanish: montados en
  alternatives_spanish:
  - cabalgando en
  - montados sobre
  lexicon: HALOT
  rationale: El participio describe a los correos como jinetes de los animales de transporte. 'Montados en' es natural en español y mantiene la imagen.
- source_word: הָרֶכֶשׁ
  english_pob_choice: the royal steeds
  chosen_spanish: los corceles reales
  alternatives_spanish:
  - los corceles
  - los caballos reales
  - los postas reales
  lexicon: HALOT
  rationale: El hebreo designa animales de transporte rápido en servicio real. 'Corceles reales' preserva el tono oficial y la referencia equina sin precisar de más el tipo zoológico.
- source_word: הָאֲחַשְׁתְּרָנִים
  english_pob_choice: the swift horses
  chosen_spanish: los corceles reales
  alternatives_spanish:
  - los caballos veloces
  - los caballos de raza
  - los corceles veloces
  lexicon: HALOT
  rationale: Este préstamo persa es raro y de identificación incierta. Siguiendo la revisión inglesa, no se añade un segundo grupo distinto; el término se integra en la misma imagen de los animales reales de transporte rápido, sin sobreespecificar.
- source_word: יָצְאוּ
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - se pusieron en camino
  - salieron de allí
  lexicon: HALOT
  rationale: '''Salir'' reproduce el movimiento narrativo básico de יצא de manera clara y fiel.'
- source_word: מְבֹהָלִים
  english_pob_choice: hastened
  chosen_spanish: apresurados
  alternatives_spanish:
  - dándose prisa
  - apurados
  - precipitadamente
  lexicon: HALOT
  rationale: El participio expresa rapidez forzada o ansiedad. 'Apresurados' funciona bien en español y no introduce una emoción no explicitada.
- source_word: וּדְחוּפִים
  english_pob_choice: pressed on
  chosen_spanish: urgidos
  alternatives_spanish:
  - empujados
  - impulsados
  - apremiados
  lexicon: HALOT
  rationale: El segundo participio intensifica la rapidez como presión externa. 'Urgidos' mantiene esa fuerza causal mejor que una simple repetición de rapidez.
- source_word: בִּדְבַר הַמֶּלֶךְ
  english_pob_choice: by the king’s command
  chosen_spanish: por la orden del rey
  alternatives_spanish:
  - por la palabra del rey
  - por el mandato del rey
  - a causa de la orden del rey
  lexicon: HALOT
  rationale: דבר aquí es palabra/mandato con valor autoritativo. 'Por la orden del rey' expresa bien el sentido administrativo e instrumental del hebreo.
- source_word: וְהַדָּת
  english_pob_choice: the decree
  chosen_spanish: el decreto
  alternatives_spanish:
  - el edicto
  - la ley
  lexicon: HALOT
  rationale: En Ester, דת suele referirse a una disposición imperial promulgada. 'Decreto' es claro y plenamente adecuado al contexto.
- source_word: נִתְּנָה
  english_pob_choice: was issued
  chosen_spanish: fue promulgado
  alternatives_spanish:
  - fue dado
  - fue emitido
  - fue publicado
  lexicon: HALOT
  rationale: Aunque literalmente es 'fue dada', en el registro administrativo español 'fue promulgado' transmite el acto formal de emisión del decreto con precisión y solemnidad.
- source_word: בְּשׁוּשַׁן הַבִּירָה
  english_pob_choice: in Susa the citadel
  chosen_spanish: en Susa la ciudadela
  alternatives_spanish:
  - en Susa la fortaleza
  - en la ciudadela de Susa
  lexicon: HALOT
  rationale: '''Ciudadela'' refleja bien הבירה en este contexto como sede fortificada/regia. Conserva el nombre propio y la apposición sin forzar una perífrasis más larga.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al no separar 'the swift horses' como un segundo grupo animal distinto. El hebreo presenta dos expresiones raras para los animales de transporte real; por eso el texto español las integra en una sola imagen de correos montados en corceles reales, y la nota conserva la incertidumbre léxica sin sobreafirmar una identificación zoológica.
  spanish_consistency_notes:
  - Se usa 'decreto' para דת conforme al uso administrativo de Ester.
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino; 'rey' y 'orden' mantienen el marco real/persa del pasaje.
  - '''Ciudadela'' se emplea como equivalente de הַבִּירָה para un español amplio y bíblico, evitando una traducción excesivamente técnica.'
