translation:
  language: es
  text: Corrientes de agua corren de mis ojos por la ruina de la hija de mi pueblo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la destrucción» o «el quebranto» de la hija de mi pueblo.'
    reason: lexical_alternative
  - marker: b
    text: «La hija de mi pueblo» es una expresión poética hebrea que personifica al pueblo, a menudo Sión o Judá, como una hija.
    reason: cultural_note
lexical_decisions:
- source_word: פַּלְגֵי מַיִם
  english_pob_choice: Streams of water
  chosen_spanish: Arroyos de agua
  alternatives_spanish:
  - Corrientes de agua
  - Riachuelos de agua
  - Canales de agua
  lexicon: HALOT
  rationale: פֶּלֶג alude a una corriente o cauce dividido; en el contexto poético de lágrimas, 'arroyos de agua' conserva la imagen intensa sin sonar artificial en español.
- source_word: תֵּרַד
  english_pob_choice: run down
  chosen_spanish: bajan
  alternatives_spanish:
  - descienden
  - fluyen hacia abajo
  - corren hacia abajo
  lexicon: HALOT
  rationale: El verbo ירד expresa descenso. En español, con ojos y lágrimas, 'bajan' es natural y mantiene el movimiento descendente sin recargar la imagen.
- source_word: עֵינִי
  english_pob_choice: my eyes
  chosen_spanish: mis ojos
  alternatives_spanish:
  - mi ojo
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular con sufijo de primera persona, en español la forma natural es el plural para el par de ojos.
- source_word: עַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - por
  - a causa de
  - con motivo de
  lexicon: HALOT
  rationale: La preposición expresa la ocasión o causa del llanto. 'Sobre' mantiene la cercanía al hebreo y funciona con naturalidad en español lamentativo.
- source_word: שֶׁבֶר
  english_pob_choice: the destruction
  chosen_spanish: la ruina
  alternatives_spanish:
  - la destrucción
  - el quebranto
  - la fractura
  lexicon: HALOT
  rationale: En contextos de lamentación, שֶׁבֶר puede denotar ruina o devastación. 'Ruina' comunica el desastre comunitario con buena naturalidad en español sin perder el peso del término.
- source_word: בַּת עַמִּי
  english_pob_choice: the daughter of my people
  chosen_spanish: la hija de mi pueblo
  alternatives_spanish:
  - la hija, mi pueblo
  - mi pueblo amado
  - la hija de mi gente
  lexicon: HALOT
  rationale: Se conserva la personificación poética del hebreo. 'La hija de mi pueblo' preserva la metáfora y evita aplanarla a una mera referencia colectiva.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo, a la vez que adopta las decisiones consolidadas del audit trail en inglés: imagen de flujo descendente para las lágrimas, ''ruina'' para שֶׁבֶר y la personificación conservada en ''la hija de mi pueblo''. No se observaron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o sustitutos litúrgicos porque el verso no contiene el Tetragrámaton.
  - Se mantuvo la metáfora filial del hebreo en vez de explicarla dentro del cuerpo del texto.
  - '''Arroyos de agua'' y ''bajan'' preservan la imaginería poética sin volverla demasiado literal o áspera en español.'
