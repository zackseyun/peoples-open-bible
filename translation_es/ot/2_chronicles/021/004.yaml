review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja correctamente la secuencia principal del hebreo: acceso de Joram al reino de su padre, consolidación de su posición, asesinato de todos sus hermanos y además de parte de los jefes/príncipes de Israel. Sin embargo, «llegó al reino de su padre» suena menos preciso para una entronización o acceso al poder, y «con espada» omite el artículo de una expresión más idiomática en español bíblico moderno.'
  spanish_quality_summary: El texto es generalmente claro y legible, pero puede mejorarse en naturalidad y precisión con «ascendió al reino de su padre» y «con la espada». El resto del versículo es adecuado, y la nota sobre «se fortaleció» está bien formulada y anclada correctamente.
  glossary_alignment: No hay términos del glosario principal en conflicto. «Príncipes de Israel» conserva bien la decisión de la POB inglesa y la tensión teológica documentada sobre «Israel». «Joram» corresponde a la forma hebrea יְהוֹרָם por contracción tradicional; no requiere cambio en este contexto, aunque «Jehoram» sería una transliteración más cercana al inglés auditado.
  issues:
  - severity: medium
    issue: «llegó al reino de su padre» es poco idiomático para accession/entronización
    rationale: וַיָּקָם עַל מַמְלֶכַת אָבִיו describe que asumió o se alzó sobre el reino de su padre. «Llegó al reino» puede sonar como desplazamiento físico o mera entrada al ámbito real, no como ascenso al trono.
  - severity: low
    issue: «con espada» suena algo incompleto frente a la locución más natural «con la espada»
    rationale: בֶּחָרֶב es la fórmula estándar «con la espada / a espada». En español general y eclesial, «con la espada» preserva mejor el giro idiomático.
  revised_spanish_text: Entonces, cuando Joram ascendió al reino de su padre y se fortaleció[a], mató a todos sus hermanos con la espada, y también a algunos de los príncipes de Israel.
  revised_footnotes:
  - marker: a
    text: O «fortaleció su posición». El hebreo puede referirse tanto a fortalecerse personalmente como a consolidar el poder.
    reason: lexical_alternative
  revision_rationale: Se ajusta la expresión de acceso al trono para reflejar mejor el valor real de קום עַל en contexto monárquico, y se mejora la naturalidad idiomática de בחרב en español con «con la espada». No se alteran las decisiones documentadas sobre «príncipes» ni sobre «Israel».
