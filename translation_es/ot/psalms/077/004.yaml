translation:
  language: es
  text: Recuerdo a Dios[a], y gimo; medito, y mi espíritu desfallece[b]. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reflexiono» / «me quejo» para אָשִׂיחָה; el verbo hebreo puede expresar meditación reflexiva o habla de lamentación.
    reason: lexical_alternative
  - marker: b
    text: O «mi espíritu se siente abrumado» para «mi espíritu desfallece».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶזְכְּרָה
  english_pob_choice: I remember
  chosen_spanish: Recuerdo
  alternatives_spanish:
  - recordaré
  - permítame recordar
  lexicon: HALOT
  rationale: El hebreo puede expresar una acción inmediata con matiz volitivo; en español, el presente «recuerdo» comunica mejor la vivencia continua del lamento sin forzar un futuro ni una exhortación. Mantiene la primera persona y la inmediatez del contexto poético.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios de Israel
  - el Dios
  lexicon: HALOT
  rationale: En este contexto el referente es el Dios de Israel; «Dios» es la equivalencia natural y fiel en español. No se requiere explicitación adicional en el texto principal.
- source_word: וְאֶהֱמָיָה
  english_pob_choice: and I groan
  chosen_spanish: y gimo
  alternatives_spanish:
  - y me lamento
  - y me quejo
  - y gimo en voz baja
  lexicon: HALOT
  rationale: El verbo hebreo denota agitación audible o lamento. «Gimo» conserva el tono corporal y doliente mejor que un término más abstracto como «me lamento», y evita suavizar la fuerza expresiva.
- source_word: אָשִׂיחָה
  english_pob_choice: I meditate
  chosen_spanish: medito
  alternatives_spanish:
  - musito
  - reflexiono
  - me quejo
  lexicon: HALOT
  rationale: Como el hebreo admite musing/meditating o speech of complaint, «medito» mantiene la lectura reflexiva adoptada por la POB inglesa y suena natural en español. No se borra la posibilidad de lamento, pero se preserva la ambivalencia mediante nota.
- source_word: וְתִתְעַטֵּף
  english_pob_choice: grows faint
  chosen_spanish: desfallece
  alternatives_spanish:
  - se debilita
  - se abruma
  - se rinde
  lexicon: HALOT
  rationale: El hitpael puede significar volverse débil, desfallecer o quedar abrumado. «Desfallece» es una solución española idiomática que conserva la imagen de colapso interior sin introducir un sentido más interpretativo que el del hebreo.
- source_word: רוּחִי
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi ser interior
  lexicon: HALOT
  rationale: En este lamento introspectivo, «espíritu» reproduce adecuadamente el sentido de la vida interior del salmista. «Aliento» sería demasiado físico y «ser interior» demasiado explicativo.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - —
  lexicon: HALOT
  rationale: Se translitera el término porque su valor preciso sigue siendo incierto. Mantener «Selah» respeta la práctica del POB y evita una traducción conjetural.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: mantiene la secuencia verbal del lamento, conserva la ambigüedad de אָשִׂיחָה con una nota, y adopta una equivalencia española natural para וְתִתְעַטֵּף sin perder la tensión entre desfallecimiento y posible abrumamiento.'
  spanish_consistency_notes:
  - Se usa «Dios» según el patrón POB para אֱלֹהִים en este contexto.
  - Se mantiene la transliteración «Selah» por la incertidumbre semántica del término.
  - «Espíritu» se conserva como interioridad personal, no como viento o aliento físico.
  - La puntuación con coma tras «Dios» refleja la pausa poética visible en el audit trail inglés.
