translation:
  language: es
  text: La misericordia de un hombre es para su prójimo, pero la misericordia de Yahvé es para toda carne[a]; reprende, disciplina, enseña y hace volver[b] a su rebaño como un pastor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría traducirse «toda la humanidad» o «todo ser viviente»; el griego dice literalmente «toda carne», una expresión bíblica amplia para la vida creatural.
    reason: lexical_alternative
  - marker: b
    text: También podría entenderse «devuelve» o «restaura»; el griego literalmente significa «volviendo» o «haciendo volver», dentro de la imagen de un pastor que recupera a los descarriados.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - bondad
  lexicon: BDAG
  rationale: «Misericordia» preserva el peso ético y teológico de ἔλεος y mantiene el paralelismo entre la compasión humana y la divina.
- source_word: ἀνθρώπου
  english_pob_choice: a man's
  chosen_spanish: de un hombre
  alternatives_spanish:
  - de una persona
  - de un ser humano
  lexicon: BDAG
  rationale: El genitivo singular contrasta a una persona humana con Yahvé. «De un hombre» conserva el valor genérico singular y el contraste del original.
- source_word: πλησίον
  english_pob_choice: neighbor
  chosen_spanish: prójimo
  alternatives_spanish:
  - vecino
  - semejante
  lexicon: BDAG
  rationale: «Prójimo» es el equivalente natural en contexto ético y conserva el alcance interpersonal de πλησίον.
- source_word: Κυρίου
  english_pob_choice: the Lord's
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  - de Dios
  lexicon: BDAG
  rationale: En el proyecto POB, el nombre divino se vierte como «Yahvé». Aquí Κυρίου funciona en paralelo con el genitivo humano y se entiende como referencia al Señor/Yahvé del texto bíblico.
- source_word: πᾶσαν σάρκα
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda la humanidad
  - todo ser viviente
  lexicon: BDAG
  rationale: «Toda carne» conserva el idiomismo bíblico y la amplitud creatural de σάρξ, sin reducirlo a un simple equivalente interpretativo.
- source_word: ἐλέγχων
  english_pob_choice: rebukes
  chosen_spanish: reprende
  alternatives_spanish:
  - corrige
  - redarguye
  lexicon: BDAG
  rationale: «Reprende» reproduce la reprensión verbal de ἐλέγχων sin cargarlo con matices más técnicos o judiciales.
- source_word: παιδεύων
  english_pob_choice: disciplines
  chosen_spanish: disciplina
  alternatives_spanish:
  - corrige
  - forma
  lexicon: BDAG
  rationale: «Disciplina» conserva el sentido formativo y correctivo de παιδεύω, incluyendo instrucción y adiestramiento.
- source_word: διδάσκων
  english_pob_choice: teaches
  chosen_spanish: enseña
  alternatives_spanish:
  - instruye
  lexicon: BDAG
  rationale: «Enseña» es directo y corresponde al verbo de instrucción en la serie de acciones divinas.
- source_word: ἐπιστρέφων
  english_pob_choice: turns back
  chosen_spanish: vuelve a
  alternatives_spanish:
  - lo hace volver
  - restaura
  lexicon: BDAG
  rationale: «Vuelve a» conserva la imagen de retorno o recuperación del rebaño sin introducir un lenguaje técnico posterior. Se entiende con el complemento «a su rebaño» en la secuencia pastoral.
- source_word: ὡς ποιμήν
  english_pob_choice: like a shepherd
  chosen_spanish: como un pastor
  alternatives_spanish:
  - como pastor
  lexicon: BDAG
  rationale: «Como un pastor» es la equivalencia natural en español y mantiene la similitúd explícita del griego.
- source_word: τὸ ποίμνιον αὐτοῦ
  english_pob_choice: his flock
  chosen_spanish: su rebaño
  alternatives_spanish:
  - su grey
  - sus ovejas
  lexicon: BDAG
  rationale: «Rebaño» comunica la imagen pastoral de ποίμνιον con claridad y naturalidad en español contemporáneo.
theological_decisions:
- issue: Alcance de πᾶσαν σάρκα
  english_pob_reading: The Lord's mercy extends broadly to all flesh, retaining the biblical idiom rather than narrowing it to humans only.
  chosen_spanish_reading: La misericordia de Yahvé se extiende a toda carne, conservando el idiomismo bíblico y su amplitud creatural.
  alternative_spanish_readings:
  - a toda la humanidad
  - a todo ser viviente
  rationale: La frase es deliberadamente amplia y contrasta con el alcance más limitado de la misericordia humana. «Toda carne» preserva esa amplitud y el eco bíblico del hebraísmo.
  doctrine_reference: σάρξ → carne (literal/idiomático) frente a lecturas metafóricas como «naturaleza pecaminosa»
- issue: Función pastoral de la serie de participios
  english_pob_reading: He rebukes and disciplines and teaches and turns back his flock like a shepherd.
  chosen_spanish_reading: Reprende, disciplina, enseña y vuelve a su rebaño como un pastor.
  alternative_spanish_readings:
  - reprende, disciplina, enseña y lo vuelve como pastor a su rebaño
  - reprende, disciplina, enseña y lo hace volver como pastor
  rationale: La secuencia de acciones divinas se mantiene como una serie de corrección y restauración pastoral. «Vuelve a su rebaño» conserva la imagen del retorno sin sobrerinterpretar el verbo con un tecnicismo posterior.
  doctrine_reference: Imagen del pastor y corrección divina en lenguaje sapiencial
translation_notes:
  revision_awareness: 'Se atendió la revisión reciente desplazando la comparación pastoral para que modifique naturalmente la acción de volver al rebaño, en línea con el orden y la imagen del griego. El español mantiene esa relación: «vuelve a su rebaño como un pastor».'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para el nombre divino.
  - Se preservó «toda carne» por la fuerza idiomática de πᾶσαν σάρκα.
  - «Prójimo» y «rebaño» mantienen registros bíblicos naturales y claros en español.
  - La serie verbal se mantuvo breve y coordinada para reflejar el flujo participial del griego.
