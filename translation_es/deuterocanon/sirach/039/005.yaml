translation:
  language: es
  text: Dedicará su corazón a levantarse temprano hacia Yahvé, el que lo hizo[a]; y suplicará ante el Altísimo; abrirá su boca en oración, y suplicará por sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para buscar temprano a Yahvé»; el verbo griego puede implicar levantarse temprano y, por el contexto, también una búsqueda temprana y diligente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιδώσει
  english_pob_choice: will devote
  chosen_spanish: pondrá su corazón
  alternatives_spanish:
  - dedicará su corazón
  - aplicará su corazón
  - entregará su corazón
  lexicon: LSJ
  rationale: El griego expresa orientar o aplicar el corazón hacia una acción. En español, «pondrá su corazón» conserva la imagen idiomática y la intención deliberada sin sobrecargar el verso con una paráfrasis más larga.
- source_word: καρδίαν
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - ser interior
  lexicon: LSJ
  rationale: «Corazón» mantiene el sentido antropológico del griego como sede interior de voluntad y devoción, y evita restringirlo a lo intelectual con «mente».
- source_word: ὀρθρίσαι
  english_pob_choice: to rise early
  chosen_spanish: levantarse temprano
  alternatives_spanish:
  - buscar temprano
  - estar en pie al alba
  lexicon: LSJ
  rationale: El infinitivo se refiere al levantarse temprano; «levantarse temprano» es claro en español y conserva el valor temporal de la acción sin añadir un objeto que el verbo no expresa por sí mismo.
- source_word: πρὸς Κύριον
  english_pob_choice: to the Lord
  chosen_spanish: hacia Yahvé
  alternatives_spanish:
  - ante Yahvé
  - para Yahvé
  lexicon: LSJ
  rationale: El griego marca orientación hacia el Señor. En el contexto del proyecto, κύριος correspondiente al nombre divino se vierte como «Yahvé», y «hacia» conserva mejor la direccionalidad de πρὸς que una simple traducción estática.
- source_word: τὸν ποιήσαντα αὐτόν
  english_pob_choice: who made him
  chosen_spanish: el que lo hizo
  alternatives_spanish:
  - su Hacedor
  - el que lo creó
  lexicon: LSJ
  rationale: La frase participial identifica a Yahvé como quien lo hizo. «El que lo hizo» sigue de cerca el griego y evita introducir un sustantivo más interpretativo como «Hacedor».
- source_word: ἔναντι Ὑψίστου
  english_pob_choice: before the Most High
  chosen_spanish: ante el Altísimo
  alternatives_spanish:
  - en la presencia del Altísimo
  lexicon: LSJ
  rationale: «Ante el Altísimo» reproduce el valor espacial y reverencial de ἔναντι de manera natural en español. «Altísimo» es la equivalencia habitual de Ὕψιστος.
- source_word: δεηθήσεται
  english_pob_choice: will make supplication
  chosen_spanish: suplicará
  alternatives_spanish:
  - hará súplica
  - pedirá con insistencia
  lexicon: BDAG
  rationale: El verbo denota ruego o petición ferviente. «Suplicará» conserva esa intensidad de manera idiomática y más natural que la forma nominal «hará súplica».
- source_word: ἀνοίξει στόμα αὐτοῦ ἐν προσευχῇ
  english_pob_choice: he will open his mouth in prayer
  chosen_spanish: abrirá su boca en oración
  alternatives_spanish:
  - abrirá su boca para orar
  lexicon: LSJ
  rationale: La expresión es vívida y se conserva casi literalmente. «En oración» mantiene el paralelismo formal del verso y evita suavizar la imagen.
- source_word: περὶ τῶν ἁμαρτιῶν αὐτοῦ
  english_pob_choice: for his sins
  chosen_spanish: por sus pecados
  alternatives_spanish:
  - acerca de sus pecados
  - a causa de sus pecados
  lexicon: LSJ
  rationale: 'La preposición περὶ con δεηθήσεται introduce el asunto de la súplica. «Por sus pecados» es una forma natural en español que preserva la amplitud semántica: puede implicar ruego relativo a sus pecados sin precisar todavía confesión o perdón.'
theological_decisions:
- issue: Renderizar κύριος/Ὑψιστος en un contexto sapiencial griego con referencia al Dios de Israel
  english_pob_reading: Lord / Most High
  chosen_spanish_reading: Yahvé / el Altísimo
  alternative_spanish_readings:
  - Señor / el Altísimo
  - el Señor / el Altísimo
  rationale: Siguiendo la norma del proyecto, el nombre divino no se oculta con una máscara litúrgica. Aquí el contexto y la frase participial «el que lo hizo» apuntan al Dios creador; por eso se usa «Yahvé». «Altísimo» mantiene el título reverente de Ὕψιστος sin perder el tono bíblico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה → Yahvé'
- issue: El sentido teológico de la súplica «por sus pecados»
  english_pob_reading: for his sins
  chosen_spanish_reading: por sus pecados
  alternative_spanish_readings:
  - acerca de sus pecados
  - por causa de sus pecados
  rationale: El griego no explicita aquí si la súplica es confesión, petición de perdón o intercesión por consecuencias del pecado. «Por sus pecados» preserva esa tensión teológica en vez de cerrarla con una interpretación más definida.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'La versión inglesa revisada pasó de «set his heart» a «devote his heart» y de una colocación menos natural de la última súplica a «he will make supplication for his sins». En español, la redacción adoptada ya refleja esa naturalidad: «pondrá su corazón» conserva la dedicación intencional; «suplicará por sus pecados» mantiene la fluidez y el matiz abierto del original.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para κύριος conforme al estándar del proyecto, sin convertirlo en «Señor» como máscara de nombre divino.
  - «Altísimo» traduce Ὕψιστος de forma estable y reverente.
  - «Suplicará» se usa para δεηθήσεται en ambos casos, conservando la repetición enfática del griego.
  - «Pecados» traduce ἁμαρτίαι en sentido moral y relacional, sin añadir explícitamente «perdón» o «confesión».
