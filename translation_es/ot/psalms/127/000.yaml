  revision_rationale: Se corrigen los anclajes de notas para que cada marcador corresponda al término o cláusula pertinente según el hebreo y el rastro de auditoría inglés. También se corrige el error gramatical en la nota [c]. El texto principal no requiere cambios sustantivos de traducción.
