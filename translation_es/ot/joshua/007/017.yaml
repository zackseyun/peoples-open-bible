translation:
  language: es
  text: Entonces acercó el clan de Judá, y fue tomado el clan de los Zerahitas. Luego acercó el clan de los Zerahitas, hombre por hombre[a], y fue tomado Zabdi.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por los hombres». El hebreo probablemente quiere decir que el clan de los Zerahitas fue presentado individualmente, hombre por hombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: he brought near
  chosen_spanish: acercó
  alternatives_spanish:
  - presentó
  - trajo adelante
  lexicon: HALOT
  rationale: La forma causativa expresa poner a un grupo ante la autoridad para su turno o examen. En español, «acercó» conserva la idea de traer hacia delante sin sonar artificial, y funciona bien en la secuencia narrativa de selección.
- source_word: מִשְׁפַּחַת
  english_pob_choice: clan
  chosen_spanish: clan
  alternatives_spanish:
  - familia
  - linaje
  lexicon: HALOT
  rationale: Aquí designa una subdivisión tribal de parentesco. «Clan» refleja mejor esa unidad social que «familia», que en español puede resultar demasiado estrecha.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judá
  lexicon: N/A nombre propio
  rationale: Nombre propio tribal/personal en transliteración estándar al español bíblico.
- source_word: וַיִּלְכֹּד / וַיִּלָּכֵד
  english_pob_choice: was taken
  chosen_spanish: fue tomado
  alternatives_spanish:
  - fue seleccionado
  - fue apresado
  lexicon: HALOT
  rationale: En este contexto el verbo indica quedar señalado/escogido por la acción providencial del procedimiento, no una captura militar. «Fue tomado» mantiene la pasiva sin añadir una interpretación más fuerte que la del hebreo.
- source_word: הַזַּרְחִי
  english_pob_choice: the Zerahites
  chosen_spanish: los zarhitas
  alternatives_spanish:
  - los zerahitas
  - la familia de Zera
  lexicon: HALOT
  rationale: El gentilicio plural español naturaliza el nombre de descendencia de Zera. «Zarhitas» conserva la raíz hebrea y evita una forma demasiado explicativa.
- source_word: לַגְּבָרִים
  english_pob_choice: man by man
  chosen_spanish: hombre por hombre
  alternatives_spanish:
  - por los hombres
  - uno por uno
  lexicon: HALOT
  rationale: La frase distributiva indica que el grupo fue presentado individualmente. «Hombre por hombre» reproduce esa distribución y deja abierta la nota de alternativa literal indicada por el POB en inglés.
- source_word: זַבְדִּי
  english_pob_choice: Zabdi
  chosen_spanish: Zabdi
  alternatives_spanish:
  - Zabdí
  lexicon: N/A nombre propio
  rationale: Nombre propio transliterado; se mantiene la forma breve y reconocible.
translation_notes:
  revision_awareness: El borrador sigue la lectura y decisiones léxicas del POB en inglés para Josué 7:17, con el mismo sentido procedimental de «bring near / was taken». No se registran revisiones textuales adicionales; la concordancia general del expediente es alta, con una observación menor sobre la alternativa distributiva de לַגְּבָרִים.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conserva «clan» por consistencia con la terminología tribal del pasaje.
  - «Fue tomado» y no «fue capturado» evita una lectura bélica no sustentada por el contexto.
  - La nota al pie preserva la alternativa distributiva documentada en el inglés POB.
