translation:
  language: es
  text: Y he aquí, he puesto con él a Oholiab, hijo de Ahisamach, de la tribu de Dan; y en el corazón de todo sabio de corazón he puesto sabiduría[a], para que hagan todo lo que te he mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sabio de corazón», un modismo para personas dotadas de sabiduría o destreza.'
    reason: cultural_note
lexical_decisions:
- source_word: וַאֲנִי הִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y yo, he aquí
  - Y mira
  lexicon: HALOT
  rationale: Conserva el énfasis de la primera persona implícita en וַאֲנִי y el carácter de atención de הִנֵּה sin forzar un calco innecesario. «He aquí» es natural en español bíblico digno y mantiene el registro elevado del hebreo.
- source_word: נָתַתִּי אִתּוֹ
  english_pob_choice: have appointed with him
  chosen_spanish: he puesto con él
  alternatives_spanish:
  - he designado con él
  - he nombrado con él
  lexicon: HALOT
  rationale: נתן literalmente es «dar/poner», y aquí la POB inglesa resolvió la idea de asignación/nombramiento por el contexto. En español, «he puesto con él» conserva la metáfora básica de ‘colocar’ a alguien junto a Bezalel, sin perder el sentido funcional de comisión.
- source_word: לְמַטֵּה דָן
  english_pob_choice: of the tribe of Dan
  chosen_spanish: de la tribu de Dan
  alternatives_spanish:
  - de la casa de Dan
  - perteneciente a la tribu de Dan
  lexicon: HALOT
  rationale: מַטֶּה expresa afiliación tribal; «de la tribu de Dan» es la forma clara y estándar en español para ese marcador social y genealógico.
- source_word: וּבְלֵב כָּל חֲכַם לֵב
  english_pob_choice: and in the heart of everyone wise of heart
  chosen_spanish: y en el corazón de todo sabio de corazón
  alternatives_spanish:
  - y en la mente de todo hábil de corazón
  - y en el corazón de todo entendido
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «corazón» para no aplanar la antropología bíblica. «Sabio de corazón» reproduce el idiomático חֲכַם לֵב, que en este contexto no es solo intelectual sino capacitado por Dios para la obra artesanal.
- source_word: נָתַתִּי חָכְמָה
  english_pob_choice: I have put wisdom
  chosen_spanish: he puesto sabiduría
  alternatives_spanish:
  - he dado sabiduría
  - he concedido habilidad
  lexicon: HALOT
  rationale: «Poner sabiduría» sigue de cerca la imagen concreta del hebreo y mantiene el vínculo entre sabiduría y capacidad práctica. «Sabiduría» conserva el campo léxico que la POB inglesa quiso preservar frente a una reducción exclusiva a «habilidad».
- source_word: וְעָשׂוּ
  english_pob_choice: that they may make
  chosen_spanish: para que hagan
  alternatives_spanish:
  - y harán
  - y hagan
  lexicon: HALOT
  rationale: 'La relación aquí es de resultado o propósito: la sabiduría dada por Dios tiene como fin que ejecuten la obra. «Para que hagan» expresa esa finalidad con naturalidad en español y evita una simple futurización.'
- source_word: אֵת כָּל אֲשֶׁר צִוִּיתִךָ
  english_pob_choice: all that I have commanded you
  chosen_spanish: todo lo que te he mandado
  alternatives_spanish:
  - todo lo que te mandé
  - todo cuanto te he ordenado
  lexicon: HALOT
  rationale: Reproduce la totalidad de la expresión y el verbo de mandato. «Te he mandado» es una forma digna y transparente en español contemporáneo; conserva la relación directa entre Yahvé y Moisés implícita en el original.
theological_decisions:
- issue: Cómo rendir חֲכַם לֵב sin perder el trasfondo antropológico hebreo
  english_pob_reading: wise of heart / wisdom
  chosen_spanish_reading: sabio de corazón / sabiduría
  alternative_spanish_readings:
  - hábil / habilidad
  - entendido / entendimiento
  rationale: Aunque el contexto inmediato es artesanal, el hebreo no dice simplemente «habilidoso», sino «sabio de corazón». Mantener «corazón» y «sabiduría» preserva la idea bíblica de que la pericia para la obra del tabernáculo es un don de Dios que involucra la persona interior, no solo técnica adquirida.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Relación entre la sabiduría dada y la acción de los artesanos
  english_pob_reading: that they may make
  chosen_spanish_reading: para que hagan
  alternative_spanish_readings:
  - y harán
  - de modo que hagan
  rationale: 'La frase final no introduce una doctrina nueva, pero sí una relación de propósito: Dios da sabiduría con vistas a la obediencia creativa. «Para que hagan» conserva esa finalidad sin debilitar la iniciativa divina ni convertir la cláusula en mera predicción.'
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La versión inglesa más reciente eliminó el «I,» antes de «behold» para hacer más natural la frase y cambió «so that» por «that» para un registro más formal. En español, «Y he aquí» mantiene la solemnidad y el énfasis sin necesidad de un pronombre explícito; además, la cláusula final se resolvió con «para que» para expresar con claridad la finalidad implícita en el hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en la lógica terminológica del proyecto aunque no aparezca explícitamente en este versículo; la primera persona divina se conserva con «he puesto» y «te he mandado».
  - Se eligió «sabio de corazón» en lugar de «habilidoso» para respetar la metáfora hebrea y la terminología POB sobre חכם לב.
  - Se evitó «SEÑOR» como sustituto del nombre divino, en línea con la política del proyecto, aunque aquí el texto solo presenta discurso directo divino sin el tetragrámaton explícito.
