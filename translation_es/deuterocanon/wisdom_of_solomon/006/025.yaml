    rationale: El imperativo medio/pasivo παιδεύεσθε en una exhortación sapiencial se expresa con más naturalidad en español como «déjense instruir» o «reciban instrucción». Esto preserva mejor la invitación a someterse a la formación de las palabras del hablante.
  - severity: low
