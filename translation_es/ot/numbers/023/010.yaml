revisions:
- from: ¿Quién puede contar el polvo de Jacob[a], o enumerar la cuarta parte de Israel? ¡Que muera yo la muerte de los rectos[b], y que mi fin sea como el suyo[c]!
  to: ¿Quién puede contar el polvo de Jacob, o enumerar la multitud de Israel[a]? Que yo muera la muerte de los rectos[b], y que mi fin sea como el suyo[c].
  rationale: Se actualiza el texto principal para alinearlo con la revisión auditada más reciente de la POB inglesa («multitud de Israel») y se traslada la lectura más literal a nota. También se corrige el anclaje de la nota [a] y se suaviza levemente la sintaxis de la cláusula desiderativa para un español más natural.
