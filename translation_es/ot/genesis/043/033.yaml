translation:
  language: es
  text: Y se sentaron delante de él, el primogénito según su primogenitura y el menor según su juventud[a]; y los hombres se miraron unos a otros con asombro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el primogénito según su orden de nacimiento y el menor según su condición de más joven». El hebreo contrapone la primogenitura y la juventud al describir la disposición en la mesa.
    reason: lexical_alternative
  - marker: b
    text: O, «los hombres se maravillaron unos a otros». El verbo hebreo denota asombro; la traducción hace explícita la reacción recíproca implícita en «cada uno a su compañero».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: And they sat
  chosen_spanish: Y se sentaron
  alternatives_spanish:
  - Y se sentaron allí
  - Y se sentaron delante de él
  lexicon: HALOT
  rationale: El hebreo usa un wayyiqtol activo de ישׁב. En español, «se sentaron» conserva el hecho narrativo sin volverlo pasivo. Se mantiene el matiz contextual de que ya habían sido dispuestos en orden ante José.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en frente de él
  lexicon: HALOT
  rationale: La expresión espacial frente al pronombre se vierte de manera natural en español con «delante de él», preservando la relación formal con José.
- source_word: הַבְּכֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero en nacer
  - el mayor
  lexicon: HALOT
  rationale: בכור señala estatus de primogénito, no solo edad relativa. «Primogénito» conserva ese valor de nacimiento y rango; «mayor» sería más libre y menos preciso.
- source_word: כִּבְכֹרָתוֹ
  english_pob_choice: according to his birthright
  chosen_spanish: según su primogenitura
  alternatives_spanish:
  - según su derecho de primogenitura
  - según su orden de nacimiento
  lexicon: HALOT
  rationale: El sustantivo בכורה puede referir el derecho/estatus ligado al primogénito. «Primogenitura» permite conservar el vínculo léxico con בכור y la idea de orden o rango por nacimiento; en este contexto puede abarcar tanto derecho como orden.
- source_word: וְהַצָּעִיר
  english_pob_choice: and the youngest
  chosen_spanish: y el menor
  alternatives_spanish:
  - y el más joven
  - y el más pequeño
  lexicon: HALOT
  rationale: צָעִיר describe al más joven dentro del grupo. «El menor» es idiomático en español y conserva el contraste con «el primogénito» sin añadir matiz afectivo.
- source_word: כִּצְעִרָתוֹ
  english_pob_choice: according to his youth
  chosen_spanish: según su juventud
  alternatives_spanish:
  - según su edad menor
  - según su condición de más joven
  lexicon: HALOT
  rationale: La forma nominal preserva el paralelo con «primogenitura». «Juventud» mantiene la relación léxica y el contraste de estatus/edad; «más joven» explicaría el sentido pero perdería la simetría formal.
- source_word: וַיִּתְמְהוּ
  english_pob_choice: looked at one another in astonishment
  chosen_spanish: se miraban unos a otros con asombro
  alternatives_spanish:
  - se maravillaban unos a otros
  - quedaban asombrados unos de otros
  lexicon: HALOT
  rationale: תמה expresa asombro o sorpresa. La frase hebrea añade reciprocidad («cada uno a su compañero»), por eso en español se explicita con «unos a otros». «Se miraban» refleja la reacción interpersonal sin sobrecargar el verbo con interpretación excesiva.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los hombres allí presentes
  - los hermanos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «los hombres». Se conserva esa formulación sin especificar «los hermanos», porque esa identificación es contextual pero no está expresada en la palabra misma.
- source_word: אִישׁ אֶל רֵעֵהוּ
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - cada uno a su compañero
  - el uno al otro
  lexicon: HALOT
  rationale: El idiomático hebreo de reciprocidad se traduce con «unos a otros», equivalente natural en español y suficientemente recíproco para reflejar la construcción original.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el hebreo de Génesis 43:33 y la decisión óptima del POB inglés: mantiene la secuencia narrativa, la oposición entre primogénito/menor y la reacción recíproca de los hombres. Se conserva el valor formal de los sustantivos hebreos en la medida en que el español lo permite, sin resolver interpretativamente la frase más allá del alcance del texto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; en este versículo no aplica.
  - Se eligió «primogénito/primogenitura» para conservar el paralelismo léxico de בכור/בכורה.
  - «Los hombres» se mantiene como traducción del hebreo, aunque el contexto identifique a los hermanos de José.
  - La reciprocidad de איש אל רעהו se expresa con «unos a otros», que es natural en español y fiel al sentido colectivo.
