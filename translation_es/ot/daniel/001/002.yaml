    rationale: Además del problema léxico, arrancar con 'Y' seguido del sujeto suena rígido en español. 'El Señor entregó/dio...' o 'Y el Señor dio...' mejora la legibilidad.
  - severity: medium
    issue: '''En su mano'' suena menos idiomático que ''en sus manos''.'
    rationale: Aunque el hebreo es singular, en español la expresión fija de dominio es normalmente 'entregar en manos de'. Preserva el sentido sin pérdida relevante.
  - severity: low
