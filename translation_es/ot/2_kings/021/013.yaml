translation:
  language: es
  text: Y extenderé sobre Jerusalén el cordel de Samaria y la plomada de la casa de Acab[a], y limpiaré a Jerusalén como se limpia un plato[b], limpiándolo y volteándolo boca abajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cordel de albañil» y «plomada de la casa de Acab». La imagen es la de medir a Jerusalén para juicio con la misma medida usada contra Samaria y la casa de Acab.
    reason: lexical_alternative
  - marker: b
    text: O «cuenco» en lugar de «plato».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָטִיתִי
  english_pob_choice: And I will stretch over
  chosen_spanish: Y extenderé sobre
  alternatives_spanish:
  - Y tenderé sobre
  - Y alargaré sobre
  lexicon: HALOT
  rationale: נָטָה expresa la acción concreta de extender o tender. Con עַל y los instrumentos de medida, la imagen es la de colocar una línea sobre Jerusalén para juicio; «extenderé sobre» conserva esa metáfora sin volverla abstracta.
- source_word: קָו
  english_pob_choice: measuring line
  chosen_spanish: cordel
  alternatives_spanish:
  - línea de medida
  - cuerda de medir
  lexicon: HALOT
  rationale: El término puede referirse a una línea o cordel usado para medir o trazar. «Cordel» mantiene la concreción del instrumento y funciona bien en español; se conserva la idea de medida por el contexto de juicio.
- source_word: מִשְׁקֹלֶת
  english_pob_choice: plumb line
  chosen_spanish: plomada
  alternatives_spanish:
  - nivel
  - plomo de albañil
  lexicon: HALOT
  rationale: מִשְׁקֹלֶת designa un instrumento con peso para comprobar la verticalidad. «Plomada» es el equivalente natural y fiel en español, y mantiene la pareja técnica con «cordel».
- source_word: בֵּית אַחְאָב
  english_pob_choice: the house of Ahab
  chosen_spanish: la casa de Ahab
  alternatives_spanish:
  - la casa de Acab
  - la dinastía de Ahab
  lexicon: HALOT
  rationale: La expresión es dinástica. Se conserva «casa» como en el hebreo. Se mantiene «Ahab» en lugar de «Acab» para no imponer una forma tradicional no documentada en el expediente y por consistencia transliterada.
- source_word: וּמָחִיתִי
  english_pob_choice: and I will wipe
  chosen_spanish: y borraré
  alternatives_spanish:
  - y limpiaré
  - y borraré por completo
  lexicon: HALOT
  rationale: Aunque el verbo literal es «borrar/limpiar», en este contexto de juicio la imagen se completa con la comparación del plato. «Borraré» comunica la fuerza de eliminación sin perder el vínculo semántico con el símil.
- source_word: כַּאֲשֶׁר יִמְחֶה אֶת הַצַּלַּחַת
  english_pob_choice: as one wipes a dish
  chosen_spanish: así como se borra un plato
  alternatives_spanish:
  - como se limpia un plato
  - como alguien limpia un plato
  lexicon: HALOT
  rationale: El hebreo usa una construcción indefinida general. «Así como se borra un plato» reproduce la comparación impersonal y la reiteración verbal del texto, aunque «borra» en español suene menos habitual para un utensilio; se prefiere por la coherencia con וּמָחִיתִי.
- source_word: מָחָה
  english_pob_choice: wiping it
  chosen_spanish: borrándolo
  alternatives_spanish:
  - limpiándolo
  - frotándolo
  lexicon: HALOT
  rationale: La repetición intensifica la acción. «Borrándolo» mantiene el paralelismo con «borraré» y refleja la insistencia del hebreo sin añadir elementos ajenos.
- source_word: וְהָפַךְ עַל פָּנֶיהָ
  english_pob_choice: and turning it upside down
  chosen_spanish: y volteándolo boca abajo
  alternatives_spanish:
  - y dándolo vuelta sobre su cara
  - y volviéndolo al revés
  lexicon: HALOT
  rationale: Literalmente es «y lo voltea sobre su faz». Para un plato en español, «boca abajo» comunica de forma natural la misma imagen de inversión total.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  lexicon: HALOT
  rationale: Se conserva el topónimo estándar en español.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Se conserva el topónimo estándar en español.
theological_decisions:
- issue: Imágenes de medición como juicio, no restauración
  english_pob_reading: The verse depicts Jerusalem being judged by the same standard used in the destruction of Samaria and Ahab's house.
  chosen_spanish_reading: El versículo presenta a Jerusalén siendo juzgada por el mismo patrón de medida aplicado a Samaria y a la casa de Ahab.
  alternative_spanish_readings:
  - Las imágenes de medida podrían entenderse como restauración o reconstrucción.
  - La medición podría sugerir evaluación neutral sin implicar destrucción.
  rationale: En otros contextos bíblicos la medición puede asociarse con restauración, pero aquí el paralelo con borrar un plato y voltearlo boca abajo determina claramente el sentido de juicio y destrucción. La redacción española conserva esa tensión textual sin suavizarla.
  doctrine_reference: 2 Reyes 21:13; cf. el uso de imágenes de medición en contextos de juicio y restauración dentro de la literatura profética
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión menor que eliminó un guion largo para dar fluidez tipográfica; no altera el contenido. La traducción española conserva el paralelismo de juicio y la secuencia verbal intensiva del hebreo.
  spanish_consistency_notes:
  - Se conserva «Ahab» por consistencia transliterada con el expediente recibido.
  - Se usa «Jerusalén» y «Samaria» como topónimos estándar en español.
  - 'Se mantiene la serie verbal de juicio con tres acciones: extender, borrar, voltear.'
  - El pie de nota a distingue la posible lectura técnica de קָו y מִשְׁקֹלֶת sin borrar la imagen principal.
  - El pie de nota b preserva la ambigüedad de צַלַּחַת entre plato, vaso o cuenco.
