review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: quien causa daño a su casa/familia termina heredando solo viento, y el necio queda en posición servil frente al sabio de corazón. Conserva acertadamente la metáfora de רוּחַ como «viento» con nota explicativa, y «casa» mantiene el campo semántico de בֵּיתוֹ.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos ajustes preferibles: «perturba su propia casa» suena menos idiomático y menos preciso que una formulación como «causa problemas a su propia casa» o «trae desgracia sobre su propia casa»; además, «será esclavo» endurece innecesariamente עֶבֶד frente al audit trail inglés y el contexto proverbial, donde una relación servil general queda mejor con «será siervo».'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto. No hay términos divinos en juego. La excepción relevante es עֶבֶד: aunque el valor por defecto del proyecto favorece «esclavo» cuando el inglés eligió «slave», aquí el audit trail documentó explícitamente «servant» por razón contextual; por eso conviene seguir esa justificación y usar «siervo» en español. También debe corregirse la alternativa errónea «el foolish» en las decisiones léxicas internas, aunque no afecta el texto publicado.'
  issues:
  - severity: medium
    issue: «Perturba su propia casa» es algo débil y poco natural en este proverbio.
    rationale: עוֹכֵר denota causar problemas, calamidad o ruina al propio ámbito doméstico. «Perturbar» en español puede sonar más emocional o momentáneo; una expresión como «causa problemas a su propia casa» comunica mejor el daño activo sin sobredeterminar destrucción total.
  - severity: medium
    issue: «Será esclavo» no sigue la decisión contextual documentada para וְעֶבֶד.
    rationale: El audit trail inglés escogió «will be a servant» precisamente para no sobrecargar el vínculo como esclavitud formal. En este contexto sapiencial, «será siervo» preserva una subordinación servil sin forzar una lectura más dura de la necesaria.
  - severity: low
    issue: El orden de notas [a][b] sobre «viento» y «casa» no refleja con claridad el anclaje semántico más natural del texto.
    rationale: La nota sobre «casa» debe anclarse en «casa», y la de «viento» en «viento», para facilitar la lectura y evitar confusión.
  revised_spanish_text: Quien causa problemas a su propia casa[a] heredará viento[b], y el necio será siervo del sabio de corazón.
