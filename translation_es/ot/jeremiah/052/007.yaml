  to: Entonces se abrió una brecha en la ciudad[a], y todos los hombres de guerra huyeron y salieron de la ciudad de noche por la puerta entre los dos muros, que estaba junto al jardín del rey, mientras los caldeos[c] estaban alrededor de la ciudad por todos lados; y se fueron por el camino del Arabá[b].
