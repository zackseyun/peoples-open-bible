translation:
  language: es
  text: La mujer quedó embarazada y dio a luz un hijo. Cuando vio que era bueno[a], lo escondió durante tres meses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hermoso'. El hebreo dice 'bueno', que en este contexto también puede llevar el sentido de agradable o de buena apariencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּהַר
  english_pob_choice: became pregnant
  chosen_spanish: quedó encinta
  alternatives_spanish:
  - concibió
  lexicon: HALOT
  rationale: הרה indica quedar embarazada / concebir. 'Quedó encinta' es natural, digno y fiel al proceso narrativo, equivalente en registro a 'became pregnant' en inglés.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - su esposa
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'la mujer'. Mantener 'la mujer' evita introducir una relación explícita que el versículo no formula.
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: gave birth to a son
  chosen_spanish: dio a luz un hijo
  alternatives_spanish:
  - parió un hijo
  lexicon: HALOT
  rationale: La expresión es el equivalente idiomático directo de ילד + בן. 'Dio a luz' comunica el hecho en español moderno sin perder la sobriedad narrativa.
- source_word: וַתֵּרֶא אֹתוֹ כִּי טוֹב הוּא
  english_pob_choice: When she saw that he was good
  chosen_spanish: Cuando vio que era bueno
  alternatives_spanish:
  - cuando vio que era hermoso
  - cuando vio que era agradable
  lexicon: HALOT
  rationale: Conservar 'bueno' respeta el sentido básico de טוב y deja abierta la posible resonancia literaria con Génesis 1. No se resuelve la ambigüedad hacia una valoración estética específica en el texto principal.
- source_word: וַתִּצְפְּנֵהוּ
  english_pob_choice: she hid him
  chosen_spanish: lo escondió
  alternatives_spanish:
  - lo ocultó
  - lo disimuló
  lexicon: HALOT
  rationale: צפן significa esconder/ocultar. 'Lo escondió' es la opción más directa y natural en español narrativo.
- source_word: שְׁלֹשָׁה יְרָחִים
  english_pob_choice: for three months
  chosen_spanish: durante tres meses
  alternatives_spanish:
  - por tres meses
  lexicon: HALOT
  rationale: יְרָחִים se refiere a meses lunares/meses. En español, 'durante tres meses' transmite el lapso con claridad y sin tecnicismos innecesarios.
theological_decisions:
- issue: Sentido de טוֹב aplicado al niño
  english_pob_reading: good, with a footnoted alternative 'beautiful'
  chosen_spanish_reading: bueno, con nota de alternativa interpretativa
  alternative_spanish_readings:
  - hermoso
  - bonito
  - agradable
  rationale: La traducción principal mantiene el valor léxico primario de טוב. Se preserva en nota la alternativa 'hermoso' porque existe una larga tradición interpretativa que entiende aquí un matiz estético; sin embargo, no se impone en el cuerpo del texto para no borrar la tensión semántica del hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El pasaje coincide con la revisión más reciente sin cambios necesarios; se conserva la solución auditada en inglés y se traslada al español con equivalencia natural y respeto por la ambigüedad de טוֹב.
  spanish_consistency_notes:
  - Se mantiene 'la mujer' conforme al hebreo, sin añadir 'su esposa'.
  - Se evita 'Señor' o 'Cristo' porque no aparecen en el versículo.
  - '''Bueno'' se conserva para reflejar el valor básico de טוב y permitir la lectura alternativa en nota.'
  - El tiempo verbal narrativo se mantiene fluido en español con pretérito perfecto simple y pasado compuesto donde corresponde.
