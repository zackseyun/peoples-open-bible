    reason: lexical_alternative
  revision_rationale: Se ajusta 'toda injusticia' a 'toda clase de injusticia' para reflejar mejor la amplitud de πᾶσαν ἀδικίαν documentada en la auditoría inglesa. Se cambia 'en arrogancia' por 'con soberbia' para una expresión más idiomática en español sin pérdida del sentido de ἐν ὑπερηφανίᾳ. También se mejora la naturalidad con 'cometen' en lugar de 'hacen'. Se mantiene 'Señor' para Κύριος y 'en justicia' para conservar la textura teológica y formal del original, con nota alternativa existente.
