  - severity: medium
    issue: «como la del mar» añade una explicitación no presente
    rationale: El hebreo/POB inglés favorece una comparación más desnuda («like the sea»). El posesivo «la del» interpreta más de la cuenta y debilita la aspereza poética que la nota intenta preservar.
  - severity: low
