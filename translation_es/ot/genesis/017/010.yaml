translation:
  language: es
  text: 'Este es mi pacto, que ustedes guardarán, entre mí y ustedes y su descendencia[a] después de ustedes: todo varón de entre ustedes será circuncidado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus descendientes después de ustedes’. El hebreo זֶרַע es un término colectivo que puede referirse a ‘descendencia’ o ‘descendientes’.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Esto es
  lexicon: HALOT
  rationale: El demostrativo femenino singular introduce la estipulación del pacto; en español, ‘Este es’ suministra naturalmente el verbo copulativo implícito sin perder la referencia inmediata.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  - mi convenio
  lexicon: HALOT
  rationale: ‘Pacto’ es el equivalente bíblico establecido en español para בְּרִית y conserva la fuerza relacional y vinculante del término.
- source_word: אֲשֶׁר תִּשְׁמְרוּ
  english_pob_choice: which you shall keep
  chosen_spanish: que ustedes guardarán
  alternatives_spanish:
  - que ustedes deberán guardar
  - que han de guardar
  lexicon: HALOT
  rationale: ‘Guardar’ reproduce bien el sentido de observar fielmente una disposición pactal. ‘Ustedes’ evita ambigüedad de persona en español y mantiene el valor obligatorio del imperfecto.
- source_word: בֵּינִי וּבֵינֵיכֶם וּבֵין זַרְעֲךָ אַחֲרֶיךָ
  english_pob_choice: between me and you and your offspring after you
  chosen_spanish: entre yo y ustedes y su descendencia después de ustedes
  alternatives_spanish:
  - entre mí y ustedes y su descendencia después de ustedes
  - entre yo y ustedes y sus hijos después de ustedes
  lexicon: HALOT
  rationale: ‘Descendencia’ conserva el valor colectivo de זֶרַע sin reducirlo a ‘hijos’. En la formulación relacional, se mantiene la secuencia entre las partes del pacto y la sucesión temporal ‘después de ustedes’.
- source_word: הִמּוֹל
  english_pob_choice: shall be circumcised
  chosen_spanish: será circuncidado
  alternatives_spanish:
  - deberá ser circuncidado
  - se circuncidará
  lexicon: HALOT
  rationale: La forma del hebreo expresa la obligación del signo pactal y el POB inglés la resolvió con pasiva. En español, ‘será circuncidado’ conserva esa construcción pasiva y la fuerza prescriptiva.
- source_word: לָכֶם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - para ustedes
  - en medio de ustedes
  lexicon: HALOT
  rationale: Aquí el dativo marca el ámbito distributivo de la obligación; ‘entre ustedes’ comunica mejor la pertenencia al grupo que ‘para ustedes’.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo hombre
  - cada varón
  lexicon: HALOT
  rationale: ‘Varón’ preserva el matiz sexo-específico del hebreo y suena natural en español bíblico contemporáneo. ‘Todo varón’ refleja con precisión el alcance de כָּל זָכָר.
theological_decisions:
- issue: Alcance sexoespecífico del mandato de circuncisión
  english_pob_reading: every male among you shall be circumcised
  chosen_spanish_reading: todo varón entre ustedes será circuncidado
  alternative_spanish_readings:
  - todos serán circuncidados
  - todo el pueblo será circuncidado
  rationale: El hebreo especifica explícitamente כָּל זָכָר, por lo que la traducción mantiene el alcance masculino del mandamiento y evita generalizarlo indebidamente a todo el grupo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: Coincide con el sentido del texto hebreo y con la lectura auditada en inglés; no se detectaron revisiones aplicadas en el registro de referencia. La opción española mantiene la estructura del pacto, la relación entre las partes y el mandato sexoespecífico sin sobreexplicar.
  spanish_consistency_notes:
  - Se mantiene ‘pacto’ para בְּרִית de manera consistente con la terminología bíblica del proyecto.
  - ‘Descendencia’ conserva el valor colectivo de זֶרַע y evita una reducción a ‘hijos’.
  - La pasiva ‘será circuncidado’ reproduce la obligación prescrita sin cambiar al sujeto de la acción.
