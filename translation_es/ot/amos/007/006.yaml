translation:
  language: es
  text: 'Yahvé cedió[a] ante esto también: «Tampoco esto sucederá», dijo el Señor Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cambió de parecer»; lenguaje antropopático hebreo que describe la respuesta de Yahvé a la intercesión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִחַם
  english_pob_choice: relented
  chosen_spanish: se arrepintió
  alternatives_spanish:
  - cedió
  - se retractó
  - cambió de parecer
  lexicon: HALOT
  rationale: En este contexto profético, el hebreo expresa que Yahvé revoca o suspende el juicio anunciado en respuesta a la intercesión. 'Se arrepintió' conserva el valor relacional y antropopático del verbo, aunque en español puede sonar más fuerte; por eso se acompaña de nota para mantener la tensión del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino para conservar el Tetragrámaton como nombre propio, conforme al criterio del proyecto y al texto fuente.
- source_word: עַל זֹאת
  english_pob_choice: concerning this
  chosen_spanish: de esto
  alternatives_spanish:
  - acerca de esto
  - respecto de esto
  - sobre esto
  lexicon: HALOT
  rationale: La preposición hebrea marca el asunto del que se trata. 'De esto' es breve y natural en español, y en contexto comunica que la referencia es al juicio mencionado.
- source_word: גַּם הִיא
  english_pob_choice: It too
  chosen_spanish: también
  alternatives_spanish:
  - esto también
  - ello también
  - también esto
  lexicon: HALOT
  rationale: El hebreo añade énfasis de inclusión; en español, el adverbio 'también' dentro de la frase transmite esa adición sin forzar un pronombre enfático poco natural.
- source_word: לֹא תִהְיֶה
  english_pob_choice: shall not happen
  chosen_spanish: no sucederá
  alternatives_spanish:
  - no será
  - no acontecerá
  - no tendrá lugar
  lexicon: HALOT
  rationale: Aunque literalmente es 'no será', el sentido contextual apunta a la no ocurrencia del evento anunciado. 'No sucederá' comunica de forma clara y fiel la idiomaticidad del hebreo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Dios
  alternatives_spanish:
  - el Señor Yahvé
  - el Señor Dios Yahvé
  - el Señor Dios Soberano
  lexicon: HALOT
  rationale: La combinación de título y nombre divino se vierte con una forma reverente y legible en español. 'Señor Dios' distingue el título compuesto sin ocultar el carácter solemne del hebreo.
theological_decisions:
- issue: Lenguaje antropopático en נִחַם
  english_pob_reading: Retain relational language with 'relented' rather than paraphrasing away the expression.
  chosen_spanish_reading: Conservar un verbo relacional ('se arrepintió') y marcar la alternativa en nota, en lugar de neutralizar el texto.
  alternative_spanish_readings:
  - cambió de parecer
  - cedió
  - se retractó
  rationale: El hebreo presenta a Dios respondiendo a la intercesión profética con lenguaje humano. La traducción debe conservar esa tensión sin resolverla doctrinalmente ni diluir la fuerza del enunciado.
  doctrine_reference: Preservar la tensión teológica del texto sin armonizarla prematuramente.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal junto al término al que remite la nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה de manera consistente con el criterio del proyecto.
  - Se mantiene 'Señor Dios' para אֲדֹנָי יְהוִה como título compuesto legible en español.
  - '''También'' conserva el matiz aditivo de גַּם sin añadir palabras innecesarias.'
  - La cláusula final se traduce como no ocurrencia del evento, no como mera existencia abstracta.
