translation:
  language: es
  text: 'Y de los hijos de Bebai: Zacarías, hijo de Bebai[a], y con él veintiocho varones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «hijos de Bebai» puede referirse más ampliamente a descendientes o miembros del linaje de Bebai.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de los descendientes de
  - Y de la familia de
  lexicon: HALOT
  rationale: La construcción genealógica hebrea se conserva con «hijos de», que refleja de cerca la forma del original y es inteligible en español. En este contexto de lista censal, también puede abarcar descendientes o miembros de un linaje, sin necesidad de explicitarlo en el texto principal.
- source_word: בֵבַי
  english_pob_choice: Bebai
  chosen_spanish: Bebai
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio de manera directa y estable.
- source_word: זְכַרְיָה
  english_pob_choice: Zechariah
  chosen_spanish: Zacarías
  alternatives_spanish:
  - Zeharías
  lexicon: Nombre propio
  rationale: En español bíblico, «Zacarías» es la forma más reconocible y natural para este nombre, sin alterar el referente original.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En la construcción patronímica inmediata, «hijo de» comunica con precisión la relación expresada por el hebreo y suena natural en español.
- source_word: וְעִמּוֹ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: Se mantiene la conjunción para preservar el ritmo enumerativo del versículo y la relación de acompañamiento.
- source_word: עֶשְׂרִים וּשְׁמֹנָה
  english_pob_choice: twenty-eight
  chosen_spanish: veintiocho
  lexicon: HALOT
  rationale: Número cardinal simple, renderizado idiomáticamente en español.
- source_word: הַזְּכָרִים
  english_pob_choice: males
  chosen_spanish: varones
  alternatives_spanish:
  - males
  - hombres
  lexicon: HALOT
  rationale: «Varones» preserva el rasgo de sexo señalado por el hebreo y suena más natural que «males» en español. «Hombres» podría sugerir edad adulta, lo cual no es necesario en este listado.
theological_decisions:
- issue: Alcance de «hijos de Bebai»
  english_pob_reading: Hebrew 'sons of Bebai' may refer more broadly to descendants or members of Bebai's family line.
  chosen_spanish_reading: «hijos de Bebai» puede referirse más ampliamente a descendientes o miembros de su linaje.
  alternative_spanish_readings:
  - «descendientes de Bebai»
  - «familia de Bebai»
  rationale: Se conserva la formulación literal en el texto principal, pero se reconoce la amplitud semántica del hebreo en la nota, para no perder la tensión lexical documentada por la POB en inglés.
  doctrine_reference: Uso genealógico/censal de lenguaje de parentesco en listas bíblicas
- issue: Sexo gramatical de הַזְּכָרִים
  english_pob_reading: males
  chosen_spanish_reading: varones
  alternative_spanish_readings:
  - males
  - hombres
  rationale: La POB en inglés opta por la precisión sexual frente a una referencia etaria. En español, «varones» preserva esa precisión sin sonar técnico ni biológico de manera extraña en una lista bíblica.
  doctrine_reference: Precisión referencial en listas censales del texto bíblico
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se reportan cambios aplicados ni divergencias respecto del texto fuente o del audit trail inglés. La redacción española sigue la decisión auditada de mantener la forma genealógica literal y la precisión de sexo en el término final.'
  spanish_consistency_notes:
  - Se mantiene «hijos de» para conservar la estructura genealógica del hebreo, con aclaración en nota.
  - «Zacarías» sigue la forma española bíblica común para el nombre propio.
  - «Varones» preserva la precisión de género/sexo del hebreo sin imponer una lectura de edad adulta.
  - La puntuación reproduce el formato de lista y la pausa fuerte tras «Bebai».
