revisions:
- from: Porque de Yahvé fue endurecerles el corazón para salir al encuentro de Israel en batalla, para que los dedicara al anatema,[a] para que no hubiera para ellos misericordia,[b] sino para destruirlos, como Yahvé había mandado a Moisés.
  to: Porque venía de Yahvé el endurecerles el corazón para salir al encuentro de Israel en batalla,[a] para consagrarlos a la destrucción,[b] para que no hubiera para ellos misericordia,[c] sino para destruirlos, como Yahvé había mandado a Moisés.
  rationale: Se revisa la cláusula inicial para hacerla natural en español sin debilitar la agencia divina explícita. Se sustituye 'anatema' en el texto principal por 'consagrarlos a la destrucción' para reflejar mejor חרם según la rationale documentada y evitar una ambigüedad eclesiástica en español. Se añaden/ajustan notas para conservar las alternativas léxicas significativas del audit trail inglés.
