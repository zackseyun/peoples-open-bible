base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/011/003.yaml
  text: The elders of Jabesh said to him[a], “Give us seven days' respite, and we will send messengers throughout all the territory of Israel. Then, if there is no one to save us, we will come out to you.”
  footnotes:
  - marker: a
    text: Or “we will surrender to you.” The Hebrew more literally says “we will come/go out to you,” which in context likely implies capitulation.
    reason: lexical_alternative
