translation:
  language: es
  text: 'Entonces el comandante del ejército de Yahvé[a] dijo a Josué: «Quítate la sandalia[b] de tu pie, porque el lugar donde estás es santo». Y Josué hizo así.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el ejército de Yahvé” o “la hueste de Yahvé”.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo singular: “tu sandalia ... tu pie”. Compárese el plural más familiar de Éxodo 3:5.'
    reason: cross_reference
lexical_decisions:
- source_word: שַׂר
  english_pob_choice: commander
  chosen_spanish: comandante
  alternatives_spanish:
  - capitán
  - jefe
  - príncipe
  lexicon: HALOT
  rationale: En el contexto militar de צְבָא, “comandante” comunica con claridad la autoridad sobre tropas y evita la ambigüedad de “príncipe” o el matiz menos preciso de “capitán” en español actual.
- source_word: צְבָא יְהוָה
  english_pob_choice: the LORD’s army
  chosen_spanish: el ejército de Yahvé
  alternatives_spanish:
  - el ejército de Yahvé
  - la hueste de Yahvé
  - el host del Yahvé
  lexicon: HALOT
  rationale: צָבָא remite de forma natural a un ejército o hueste. “Ejército” es transparente en español y mantiene el sentido militar. Se usa “Yahvé” por la convención del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración estándar del proyecto, en lugar de sustituirlo por un título. Esto mantiene la distinción entre el nombre propio y una designación reverencial.
- source_word: שַׁל
  english_pob_choice: Take ... off
  chosen_spanish: Quítate
  alternatives_spanish:
  - Saca
  - Retira
  lexicon: HALOT
  rationale: El imperativo expresa la acción de remover el calzado. “Quítate” es idiomático y directo en español, sin perder el valor verbal de la orden.
- source_word: נַעַלְךָ
  english_pob_choice: your sandal
  chosen_spanish: la sandalia
  alternatives_spanish:
  - el sandalio
  - el calzado
  lexicon: HALOT
  rationale: El hebreo singular se conserva con singular en español. “Sandalia” es más natural y culturalmente adecuado que “zapato”, y evita generalizar a “calzado” sin necesidad.
- source_word: מֵעַל רַגְלְךָ
  english_pob_choice: off your foot
  chosen_spanish: de tu pie
  alternatives_spanish:
  - de sobre tu pie
  - de tus pies
  lexicon: HALOT
  rationale: Se conserva el singular hebreo (“tu pie”) frente al plural más conocido en otras tradiciones. En español, “de tu pie” suena natural dentro del mandato de quitarse la sandalia.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - este lugar
  lexicon: HALOT
  rationale: “Lugar” es la correspondencia directa y clara en español para el sustantivo definido, sin introducir un demostrativo que no está en el hebreo.
- source_word: עֹמֵד עָלָיו
  english_pob_choice: you are standing
  chosen_spanish: estás de pie
  alternatives_spanish:
  - estás parado
  - estás sobre él
  lexicon: HALOT
  rationale: El participio expresa una postura continua. “Estás de pie” es una solución natural en español y evita una redundancia extraña al traducir literalmente la relación espacial.
- source_word: קֹדֶשׁ הוּא
  english_pob_choice: is holy
  chosen_spanish: es santo
  alternatives_spanish:
  - es sagrado
  - es consagrado
  lexicon: HALOT
  rationale: “Santo” es el equivalente bíblico más fuerte y usual para קֹדֶשׁ en este contexto. “Sagrado” es posible, pero menos marcado en registro teológico.
- source_word: וַיַּעַשׂ ... כֵּן
  english_pob_choice: And Joshua did so
  chosen_spanish: Y Josué hizo así
  alternatives_spanish:
  - Y Josué lo hizo
  - Y Josué obedeció
  lexicon: HALOT
  rationale: La fórmula narrativa de cumplimiento se conserva de manera sobria. “Hizo así” refleja el hebreo כֵּן sin añadir una interpretación explícita que no aparece en la cláusula.
theological_decisions:
- issue: Identidad del comandante del ejército de Yahvé
  english_pob_reading: Render the title descriptively without specifying whether this figure is an angel, a theophany, or a Christophany.
  chosen_spanish_reading: 'Se mantiene una designación descriptiva: “el comandante del ejército de Yahvé”, sin identificarlo más allá del título.'
  alternative_spanish_readings:
  - un ángel comandante
  - una manifestación de Yahvé
  - una aparición preencarnada de Cristo
  rationale: El versículo no identifica explícitamente al personaje más allá de su título y del contexto de tierra santa. Para conservar la tensión teológica del pasaje, la traducción no fuerza una identificación doctrinal que el texto no declara.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
- issue: Lenguaje de santidad del lugar
  english_pob_reading: the place where you are standing is holy
  chosen_spanish_reading: el lugar donde estás de pie es santo
  alternative_spanish_readings:
  - el lugar donde estás es santo
  - el lugar sobre el que estás es santo
  rationale: La santidad del lugar se expresa con el adjetivo “santo”, que mantiene el valor cultual del hebreo קֹדֶשׁ. Se evita diluirlo en una paráfrasis menos precisa.
  doctrine_reference: Santidad del lugar de la presencia divina
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo y el audit trail en inglés; no hubo revisiones textuales adicionales en el expediente, y la traducción española conserva la misma resolución léxica y teológica básica documentada allí.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” para יְהוָה conforme al estándar del proyecto.
  - Se conserva el singular hebreo en “sandalia” y “pie”, con nota explicativa por contraste con Éxodo 3:5.
  - “Santo” se usa como término cultual principal, coherente con la terminología bíblica del proyecto.
  - La fórmula de cierre “Y Josué hizo así” reproduce el tono narrativo breve del hebreo sin expansión interpretativa.
