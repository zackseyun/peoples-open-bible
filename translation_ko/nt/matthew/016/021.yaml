id: MAT.16.21
reference: Matthew 16:21
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀπὸ τότε ἤρξατο ⸂ὁ Ἰησοῦς⸃ δεικνύειν τοῖς μαθηταῖς αὐτοῦ ὅτι δεῖ αὐτὸν ⸂εἰς Ἱεροσόλυμα ἀπελθεῖν⸃ καὶ πολλὰ παθεῖν ἀπὸ τῶν πρεσβυτέρων καὶ ἀρχιερέων καὶ γραμματέων καὶ ἀποκτανθῆναι καὶ τῇ τρίτῃ ἡμέρᾳ ἐγερθῆναι.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/016/021.yaml
  text: 'From that time Jesus began to show his disciples that he must go to Jerusalem and suffer many things from the elders and chief priests and scribes[a], and be killed[c][b], and on the third day be raised.'
translation:
  language: ko
  text: '그때부터 예수께서 자기 제자들에게 자신이 예루살렘에 올라가 장로들과 대제사장들과 서기관들에게서 많은 고난을 받고, 죽임을 당하고, 사흘째 되는 날에 살아나야 한다는 것을 보이기 시작하셨습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「많은 고난을 받다」. 헬라어는 문자적으로 「많은 일들을 겪다」로, 고난의 다양성을 강조한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「장로들과 대제사장들과 서기관들의 손에」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「일어나다」. 헬라어는 수동형 「살아나심을 받다」.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεῖ
  english_pob_choice: must
  chosen_korean: 해야 한다
  lexicon: BDAG
  rationale: 신적 필연성(divine necessity)을 가리키는 마태 특유의 동사. 「-해야 한다」로 그 강제성을 보존한다.
- source_word: ἀρχιερέων
  english_pob_choice: chief priests
  chosen_korean: 대제사장들
  lexicon: BDAG
  rationale: 한국 성경 정착어.
- source_word: ἐγερθῆναι
  english_pob_choice: be raised
  chosen_korean: 살아나야 한다
  alternatives_korean:
  - 일으키심을 받다
  lexicon: BDAG
  rationale: 수동태. 본문 흐름에서는 「살아나다」가 자연스럽고, 신적 수동의 함의는 각주로 보존한다.
