translation:
  language: es
  text: Así Edom se rebeló y dejó de estar bajo el dominio de Judá hasta hoy[a]. En aquel tiempo, Libna también se rebeló y dejó de estar bajo su dominio[b], porque había abandonado a Yahvé[c], el Dios de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se sublevó» / «se separó» para «se rebeló».'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «de debajo de la mano de Judá» y «de debajo de su mano», un modismo para salir del dominio o la sujeción de alguien.
    reason: cultural_note
  - marker: c
    text: La cláusula causal puede referirse a los problemas de Joram en general, o más específicamente a la rebelión de Libna.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּפְשַׁע / תִּפְשַׁע (פשע)
  english_pob_choice: rebelled
  chosen_spanish: se rebeló
  alternatives_spanish:
  - se sublevó
  - se alzó en rebelión
  - se apartó de la autoridad
  lexicon: HALOT
  rationale: En contexto político, פשע expresa ruptura de sujeción o rebelión contra la autoridad. «Se rebeló» es la opción española más natural y conserva bien la fuerza política del verbo, sin suavizarla a una mera separación.
- source_word: מִתַּחַת יַד / מִתַּחַת יָדוֹ
  english_pob_choice: from under the hand of / from under his hand
  chosen_spanish: contra la mano de / contra su mano
  alternatives_spanish:
  - de debajo de la mano de
  - de bajo el dominio de
  - de bajo el control de
  lexicon: HALOT
  rationale: La imagen hebrea literalmente dice «de debajo de la mano», pero en español esa estructura puede sonar forzada. «Contra la mano de» conserva la metáfora de autoridad y dominio, manteniendo la transparencia idiomática sin perder el sentido de subordinación política.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judá
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio bíblico estándar en español para el reino/territorio de Judá.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta hoy
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: La fórmula temporal hebrea indica una situación vigente hasta el presente del narrador. «Hasta hoy» es una equivalencia natural y compacta en español que conserva el valor formular.
- source_word: אָז
  english_pob_choice: At that time
  chosen_spanish: Entonces
  alternatives_spanish:
  - En ese tiempo
  - En aquel momento
  lexicon: HALOT
  rationale: Aquí אָז introduce la secuencia temporal de los eventos. «Entonces» enlaza de modo fluido con la primera cláusula y mantiene la progresión narrativa.
- source_word: לִבְנָה
  english_pob_choice: Libnah
  chosen_spanish: Libna
  alternatives_spanish:
  - Libná
  lexicon: Nombre propio
  rationale: Se usa la forma toponímica estándar en español, con adaptación ortográfica mínima para la pronunciación natural.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: En este contexto causal, כִּי introduce la razón de las rebeliones. «Porque» expresa de manera directa la causalidad en español contemporáneo.
- source_word: עָזַב
  english_pob_choice: had forsaken
  chosen_spanish: había abandonado
  alternatives_spanish:
  - había dejado
  - había desamparado
  lexicon: HALOT
  rationale: El verbo aquí señala la ruptura de fidelidad a Yahvé. «Había abandonado» comunica bien el quiebre relacional y covenantal en español, sin forzar un arcaísmo. Se conserva el pluscuamperfecto para reflejar la anterioridad respecto de la rebelión de Libna.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: Tetragrámaton
  rationale: Siguiendo el criterio del proyecto, el Tetragrámaton se traduce como «Yahvé» en el texto principal, manteniendo el nombre divino sin sustitución por un título.
- source_word: אֱלֹהֵי אֲבֹתָיו
  english_pob_choice: the God of his fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - el Dios de sus padres ancestrales
  lexicon: HALOT
  rationale: La construcción posesiva se conserva de manera directa. «De sus padres» es la expresión bíblica y eclesial más transparente en español y reproduce la referencia al Dios del linaje pactal.
theological_decisions:
- issue: Relación causal entre la apostasía y las rebeliones
  english_pob_reading: The final clause may explain Jehoram's troubles generally, or more specifically Libnah's rebellion.
  chosen_spanish_reading: 'La cláusula causal queda unida al relato sin restringirla de forma absoluta: puede leerse como explicación general de los trastornos políticos, o de modo más estrecho como razón de la rebelión de Libna.'
  alternative_spanish_readings:
  - La cláusula explica solo la rebelión de Libna.
  - La cláusula explica de manera general las dificultades políticas de Joram.
  rationale: El hebreo permite ambas lecturas, y el audit trail en inglés preserva esa tensión. El español mantiene la causalidad abierta sin resolverla en una sola dirección, respetando la ambigüedad documentada.
  doctrine_reference: Preservar tensión exegética documentada; no sobreespecificar la causalidad.
- issue: Nombre divino en el texto principal
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto exige la representación del Nombre divino como «Yahvé» para no ocultar el Tetragrámaton tras una sustitución titular. Se mantiene así la transparencia con la fuente hebrea.
  doctrine_reference: Tetragrámaton y política de transliteración del nombre divino.
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con la auditoría inglesa de alta concordancia; no se registran revisiones aplicadas en el pass más reciente. Se ha preservado la tensión interpretativa sobre la cláusula causal y se ha adaptado el modismo hebreo de autoridad a un español natural sin perder la imagen de la 'mano'.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «se rebeló» como verbo político fuerte, paralelo en ambas cláusulas.
  - «El Dios de sus padres» sigue la fórmula bíblica estable y evita una paráfrasis amplia.
  - La nota de «mano» explica el hebraísmo sin duplicar el sentido en el cuerpo del texto.
