translation:
  language: es
  text: Entonces la ira de Yahvé se encendió contra Uzá[a], y lo derribó porque había extendido la mano al arca; y murió allí, delante de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque había alargado la mano al arca»; o: «porque había extendido la mano hacia el arca».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף יְהוָה
  english_pob_choice: Then Yahweh’s anger burned
  chosen_spanish: Entonces el furor de Yahvé se encendió
  alternatives_spanish:
  - Entonces Yahvé se enojó
  - Entonces se encendió la ira de Yahvé
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de חרה אף con un equivalente natural en español. "Furor" y "se encendió" mantienen la imagen de ira encendida sin suavizarla a una simple emoción, y "Yahvé" sigue el criterio del nombre divino.
- source_word: בְּעֻזָּא
  english_pob_choice: against Uzza
  chosen_spanish: contra Uzá
  alternatives_spanish:
  - hacia Uzá
  - sobre Uzá
  lexicon: HALOT
  rationale: La preposición ב con חרה אף marca el objeto de la ira; "contra" expresa bien esa dirección en español y conserva la fuerza relacional del hebreo.
- source_word: וַיַּכֵּהוּ
  english_pob_choice: he struck him down
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo derribó
  lexicon: HALOT
  rationale: El verbo נכה admite "herir" en español como un equivalente directo y sobrio. Dado que el resultado inmediato es la muerte, "lo hirió" conserva la gravedad sin agregar una formulación más interpretativa como "lo derribó".
- source_word: עַל אֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - por cuanto
  - debido a que
  lexicon: HALOT
  rationale: La cláusula introduce la causa del juicio; "porque" es la opción natural y fiel en español contemporáneo.
- source_word: שָׁלַח יָדוֹ עַל הָאָרוֹן
  english_pob_choice: he had put out his hand to the ark
  chosen_spanish: había extendido su mano hacia el arca
  alternatives_spanish:
  - había alargado su mano hacia el arca
  - había puesto su mano sobre el arca
  lexicon: HALOT
  rationale: '"Extender su mano hacia" conserva el gesto físico del hebreo sin especificar una intención que el texto no formula aquí. "Hacia el arca" evita añadir un matiz de contacto que no es necesario para el sentido.'
- source_word: הָאָרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca de Dios
  - el cofre
  lexicon: HALOT
  rationale: El contexto inmediato identifica el referente, por lo que basta "el arca"; ampliar a "de Dios" introduciría palabras no presentes en esta línea.
- source_word: וַיָּמָת שָׁם
  english_pob_choice: and he died there
  chosen_spanish: y murió allí
  alternatives_spanish:
  - y murió en el acto allí
  - y falleció allí
  lexicon: HALOT
  rationale: La secuencia narrativa se expresa de manera simple y directa. "Murió allí" preserva שׁם sin adornos.
- source_word: לִפְנֵי אֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en presencia de Dios
  - ante Dios
  lexicon: HALOT
  rationale: '"Delante de Dios" reproduce el sentido de לִפְנֵי con solemnidad y naturalidad en español. Se conserva la referencia a אֱלֹהִים como "Dios", distinta del uso previo de Yahvé.'
theological_decisions:
- issue: Cómo traducir יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El nombre divino se vierte como "Yahvé" según el criterio del proyecto para preservar el nombre propio del pacto, en lugar de ocultarlo con un título tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Diferencia entre יְהוָה y אֱלֹהִים en la misma oración
  english_pob_reading: 'Retain both as in the Hebrew: ''the LORD'' ... ''before God'''
  chosen_spanish_reading: 'Retener ambos como en el hebreo: ''Yahvé'' ... ''delante de Dios'''
  alternative_spanish_readings:
  - Unificar ambos como 'Yahvé'
  - Suavizar el final como 'delante de él'
  rationale: El texto hebreo distingue intencionalmente entre el nombre del pacto y el sustantivo general para Dios. Mantener esa diferencia en español respeta la textura del original y evita borrar una variación significativa.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition'
- issue: Fuerza de la acción sobre Uzá
  english_pob_reading: he struck him down
  chosen_spanish_reading: lo hirió
  alternative_spanish_readings:
  - lo golpeó
  - lo castigó
  rationale: '"Lo hirió" comunica una acción divina severa sin expandir el texto hacia una explicación adicional. El resultado mortal queda claro por la cláusula siguiente.'
  doctrine_reference: HALOT semantic range for נכה
translation_notes:
  revision_awareness: 'El texto sigue el contexto de auditoría inglesa sin depender mecánicamente de él: mantiene el nombre divino como Yahvé, conserva la distinción entre Yahvé y Dios, y ajusta la frase verbal al español natural sin perder el paralelismo del hebreo. No se detectaron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para יְהוָה y "Dios" para אֱלֹהִים en todo el versículo.
  - Se prefirió un registro sobrio y bíblico, pero con sintaxis natural en español.
  - La nota textual se ancla en "porque" para reflejar la alternativa lexicográfica preservada por el POB inglés.
