translation:
  language: es
  text: Y quemaron la ciudad con fuego, y todo lo que había en ella. Solo la plata y el oro, y los utensilios[a] de bronce y de hierro, los pusieron al tesoro de la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vasos de bronce y de hierro». El hebreo כְּלֵי puede abarcar utensilios, objetos o implementos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - ciudad
  lexicon: WLC/HALOT
  rationale: Se conserva el sustantivo directo del hebreo con artículo explícito en español por claridad narrativa.
- source_word: שָׂרְפוּ בָאֵשׁ
  english_pob_choice: they burned ... with fire
  chosen_spanish: la quemaron con fuego
  alternatives_spanish:
  - la incendiaron
  - la quemaron en fuego
  lexicon: HALOT
  rationale: El hebreo usa la preposición instrumental con 'fuego'; 'con fuego' reproduce el medio de manera natural en español.
- source_word: וְכָל אֲשֶׁר בָּהּ
  english_pob_choice: and everything that was in it
  chosen_spanish: todo lo que había en ella
  alternatives_spanish:
  - todo cuanto había en ella
  - todo lo que estaba en ella
  lexicon: HALOT
  rationale: La construcción hebrea expresa la totalidad del contenido de la ciudad; 'había en ella' es idiomático y preciso.
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Excepto
  - Únicamente
  lexicon: HALOT
  rationale: Marca la excepción a la destrucción anterior; 'Solo' comunica la restricción de modo claro y sobrio.
- source_word: הַכֶּסֶף וְהַזָּהָב
  english_pob_choice: the silver and the gold
  chosen_spanish: la plata y el oro
  alternatives_spanish:
  - plata y oro
  lexicon: HALOT
  rationale: Se mantienen los metales preciosos con artículo, reflejando el valor inventarial del texto.
- source_word: וּכְלֵי הַנְּחֹשֶׁת וְהַבַּרְזֶל
  english_pob_choice: the articles of bronze and iron
  chosen_spanish: los utensilios de bronce y de hierro
  alternatives_spanish:
  - los artículos de bronce y de hierro
  - los vasos de bronce y de hierro
  lexicon: HALOT
  rationale: כְלֵי es un término amplio para objetos/implementos; 'utensilios' transmite esa amplitud con naturalidad en español. 'Bronce' sigue la decisión inglesa por el sentido metalúrgico más probable en este contexto.
- source_word: נָתְנוּ
  english_pob_choice: they put
  chosen_spanish: los pusieron
  alternatives_spanish:
  - los colocaron
  - los depositaron
  lexicon: HALOT
  rationale: En contexto de entregar bienes valiosos al depósito sagrado, 'pusieron' es una traducción sencilla y fiel.
- source_word: אוֹצַר
  english_pob_choice: treasury
  chosen_spanish: el tesoro
  alternatives_spanish:
  - el depósito
  - la tesorería
  lexicon: HALOT
  rationale: El hebreo refiere a un lugar donde se guardan objetos valiosos; 'tesoro' funciona bien en español bíblico y evita una lectura demasiado administrativa.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahveh
  - la casa de Yahweh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para יְהוָה con 'Yahvé', conservando el nombre del pacto en lugar de una sustitución por 'Señor'.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton; el proyecto pide mantener el nombre divino como 'Yahvé' en el texto principal para no ocultarlo bajo un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Destino cultual de los metales
  english_pob_reading: into the treasury of the house of Yahweh
  chosen_spanish_reading: en el tesoro de la casa de Yahvé
  alternative_spanish_readings:
  - al tesoro de la casa de Yahvé
  - dentro del tesoro de la casa de Yahvé
  rationale: La cadena posesiva hebrea indica una dedicación al ámbito sagrado del santuario; 'en el tesoro' comunica el depósito sin añadir interpretaciones ajenas al verso.
  doctrine_reference: Contexto cultual de Josué 6:24
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail inglés: mantiene la secuencia narrativa, la excepción introducida por רַק y la referencia cultual al tesoro de la casa de Yahvé. Se evitó ''Señor'' para יְהוָה conforme a la norma del proyecto.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se prefirió 'la casa de Yahvé' por fidelidad al nombre divino y al registro bíblico.
  - '''Utensilios'' preserva la amplitud semántica de כְּלֵי sin cerrarla a un solo objeto.'
