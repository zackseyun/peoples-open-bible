base_translation:
  language: en
  yaml_path: translation/ot/1_kings/020/013.yaml
  text: 'And behold[a], a certain prophet came near to Ahab king of Israel and said, “Thus says Yahweh: Have you seen all this great multitude? Behold, I am giving it into your hand today, and you shall know that I am Yahweh.”'
  footnotes:
