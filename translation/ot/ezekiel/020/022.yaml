theological_decisions:
- issue: Divine restraint after threatened judgment
  chosen_reading: The verse states that God refrained from executing the threatened action and instead acted to preserve the honor of his name before the nations.
  alternative_readings:
  - The verse could be rendered more literally as God 'turned back' or 'withdrew' his hand.
  rationale: The Hebrew idiom about the hand is metaphorical; the translation keeps the metaphor ('hand') while making clear that the action is restraint, not physical movement. This preserves the theological emphasis on God's concern for his name among the nations without importing further doctrinal explanation.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Meaning of 'my name'
  chosen_reading: '''My name'' is retained as a covenantal expression for God''s public honor/reputation, not paraphrased as ''my reputation'' in the main text.'
  alternative_readings:
  - my reputation
  - my honor
  rationale: The Hebrew text explicitly says 'my name.' Retaining it preserves biblical-theological resonance while remaining understandable in English. The surrounding clause clarifies the public-honor sense.
  doctrine_reference: Translation philosophy §§1, 6
