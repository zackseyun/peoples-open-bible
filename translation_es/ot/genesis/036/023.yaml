translation:
  language: es
  text: 'Estos son los hijos de Shobal: Alván[a], Manáhat, Ebal, Sefó[b] y Onam.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: Alván; la genealogía paralela de 1 Crónicas 1:40 lee Alian.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: Sefó; la genealogía paralela de 1 Crónicas 1:40 lee Shephi.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אֵ֨לֶּה֙
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Y estos son
  - Ahora bien, estos son
  lexicon: HALOT
  rationale: En fórmulas genealógicas, la secuencia introductoria se expresa de manera natural en español con "Estos son"; el valor conjuntivo del prefijo queda suficientemente reflejado sin forzar un "Y" inicial que suena menos idiomático.
- source_word: בְּנֵ֣י
  english_pob_choice: sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos
  lexicon: HALOT
  rationale: El hebreo genealógico aquí presenta una lista masculina directa. "Hijos de" mantiene la relación filial del texto y es más natural en español bíblico que "descendientes de" en esta construcción concreta.
- source_word: שׁוֹבָ֔ל
  english_pob_choice: Shobal
  chosen_spanish: Shobal
  lexicon: Nombre propio
  rationale: Nombre propio transliterado, sin intentar adaptar su forma.
- source_word: עַלְוָ֥ן
  english_pob_choice: Alvan
  chosen_spanish: Alván
  alternatives_spanish:
  - Alian
  lexicon: Nombre propio / variante textual
  rationale: Se conserva la forma del hebreo masorético con acento españolado para lectura. La genealogía paralela en 1 Crónicas 1:40 ofrece la variante "Alian", que se preserva como alternativa posible.
- source_word: וּ/מָנַ֖חַת
  english_pob_choice: Manahath
  chosen_spanish: Manahat
  alternatives_spanish:
  - Manahat(h)
  lexicon: Nombre propio
  rationale: Se translitera el nombre según el hebreo. En español conviene evitar una grafía excesivamente anglófona; la forma simple "Manahat" es clara y fiel.
- source_word: וְ/עֵיבָ֑ל
  english_pob_choice: Ebal
  chosen_spanish: Ebal
  lexicon: Nombre propio
  rationale: Transliteración directa del nombre hebreo, ya bien establecida en español bíblico.
- source_word: שְׁפ֖וֹ
  english_pob_choice: Shepho
  chosen_spanish: Sefó
  alternatives_spanish:
  - Shefo
  - Shefi
  lexicon: Nombre propio / variante textual
  rationale: Se adapta la transliteración a ortografía y fonética española. La forma hebrea MT corresponde al nombre que en la genealogía paralela aparece como "Shephi"; se mantiene la variante textual como trasfondo, sin borrar la tensión documental.
- source_word: וְ/אוֹנָֽם
  english_pob_choice: and Onam
  chosen_spanish: y Onam
  alternatives_spanish:
  - e Onam
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio y la conjunción final en español natural de lista.
translation_notes:
  revision_awareness: La redacción sigue el testigo hebreo masorético de Génesis 36:23 y conserva en notas las variantes paralelas documentadas por la POB inglesa en 1 Crónicas 1:40. No se introdujeron cambios doctrinales ni expansiones interpretativas.
  spanish_consistency_notes:
  - Se usó "hijos de" para mantener el registro genealógico del hebreo.
  - Los nombres propios se transliteraron con grafía española legible, evitando anglicismos innecesarios.
  - Se preservó la variante textual de Alván/Alian y Sefó/Shefi mediante notas, sin fusionarlas en el texto principal.
