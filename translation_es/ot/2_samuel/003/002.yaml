translation:
  language: es
  text: Le nacieron hijos a David en Hebrón, y su primogénito fue Amnón, de Ahinoam[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ahinoam, la mujer jezreelita» o «Ahinoam, la mujer de Jezreel».
    reason: lexical_alternative
lexical_decisions:
- source_word: ו/ילדו
  english_pob_choice: were born
  chosen_spanish: le nacieron
  alternatives_spanish:
  - fueron nacidos
  - nacieron
  lexicon: HALOT
  rationale: 'El hebreo expresa un sentido pasivo/impersonal: los hijos vinieron a nacerle a David. En español, «le nacieron» conserva ese matiz relacional y evita hacer a los hijos sujetos activos, mientras que «fueron nacidos» suena artificial.'
- source_word: לְ/דָוִ֛ד
  english_pob_choice: to David
  chosen_spanish: le
  alternatives_spanish:
  - a David
  - para David
  lexicon: HALOT
  rationale: El lamed de relación/beneficio se refleja de manera natural en español con el dativo «le». Mantiene la idea de pertenencia relacional sin añadir sentido de propósito que no está en el hebreo.
- source_word: בָּנִ֖ים
  english_pob_choice: Sons
  chosen_spanish: hijos
  alternatives_spanish:
  - varones
  - niños
  lexicon: HALOT
  rationale: Aunque el hebreo especifica hijos varones, en español «hijos» en un contexto genealógico ya funciona como masculino plural. «Varones» sería más marcado de lo necesario y «niños» rebajaría el registro.
- source_word: בְּ/חֶבְרוֹן
  english_pob_choice: in Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - en la ciudad de Hebrón
  lexicon: HALOT
  rationale: Locativo simple; «en Hebrón» reproduce con naturalidad el valor de la preposición y el topónimo.
- source_word: וַ/יְהִ֤י
  english_pob_choice: and ... was
  chosen_spanish: y ... fue
  alternatives_spanish:
  - y resultó ser
  - y llegó a ser
  lexicon: HALOT
  rationale: El verbo introduce la especificación del primogénito. En español, «fue» es la forma más sobria y fiel para esta construcción copulativa narrativa.
- source_word: בְכוֹר/וֹ֙
  english_pob_choice: his firstborn
  chosen_spanish: su primogénito
  alternatives_spanish:
  - su hijo mayor
  - su primero en nacer
  lexicon: HALOT
  rationale: «Primogénito» preserva el valor técnico y familiar de בכור, incluyendo la posible carga legal/estatus que el texto puede implicar.
- source_word: לַ/אֲחִינֹ֖עַם
  english_pob_choice: by Ahinoam
  chosen_spanish: de Ahinoam
  alternatives_spanish:
  - por Ahinoam
  - a Ahinoam
  lexicon: HALOT
  rationale: En este tipo de nota genealógica en español, «de» expresa de forma natural la maternidad/paternidad biográfica, equivalente al inglés «by» en la POB. Evita la ambigüedad de «por» y el direccionamiento de «a».
- source_word: הַ/יִּזְרְעֵאלִֽת
  english_pob_choice: the Jezreelitess
  chosen_spanish: la jezreelita
  alternatives_spanish:
  - la mujer de Jezreel
  - la jezreelense
  lexicon: HALOT
  rationale: La forma gentilicia femenina se conserva con un equivalente transparente y breve. «Jezreelitess» en inglés se naturaliza en español como «jezreelita», manteniendo el rasgo étnico/originario sin parafrasear.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y coincide con la línea inglesa de la POB: pasivo impersonal para וילדו, marcador relacional para לְדָוִד, y gentilicio femenino para הַיִּזְרְעֵאלִת. Se ha ajustado el español para que suene natural sin perder el valor genealógico del verso.'
  spanish_consistency_notes:
  - Se usa «Hebrón» y no una forma castellana arcaizante.
  - «Primogénito» se conserva como término técnico; no se simplifica a «mayor».
  - Se evita «Cristo/SEÑOR» porque no aplica a este versículo.
  - El gentilicio se vierte con forma femenina explícita, acorde con el contexto de Ahinoam.
