  text: Οὐ γὰρ θέλω ὑμᾶς ἀγνοεῖν, ἀδελφοί, τὸ μυστήριον τοῦτο, ἵνα μὴ ⸀ἦτε ἑαυτοῖς φρόνιμοι, ὅτι πώρωσις ἀπὸ μέρους τῷ Ἰσραὴλ γέγονεν ἄχρι οὗ τὸ πλήρωμα τῶν ἐθνῶν εἰσέλθῃ,
base_translation:
  language: en
  yaml_path: translation/nt/romans/011/025.yaml
  text: 'For I do not want you to be unaware[a], brothers, of this mystery, so that you may not be wise in your own sight: a partial hardening has come upon Israel until the fullness of the Gentiles has come in[b],'
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and can address a mixed group.
    reason: lexical_alternative
  - marker: b
    text: Or 'the full number of the Gentiles.'
    reason: alternative_reading
translation:
  language: ko
  text: 형제 여러분, 나는 여러분이 이 신비를 알지 못한 채로 있어 스스로 지혜로운 자가 되지 않기를 원합니다. 곧 이방인의 충만한 수가 들어올 때까지 부분적 완악함이 이스라엘에게 임하였다는 것입니다.
  philosophy: optimal-equivalence
