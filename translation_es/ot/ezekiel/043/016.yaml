translation:
  language: es
  text: Y el fogón del altar tenía doce codos de largo por doce de ancho[b], cuadrado en sus cuatro lados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo אֶל אַרְבַּעַת רְבָעָיו, literalmente: «a/hacia sus cuatro cuartos»; también puede entenderse como «en sus cuatro esquinas».'
    reason: lexical_alternative
  - marker: b
    text: «Codos» se añade por el contexto inmediato de las medidas del altar; el hebreo de esta línea lo omite por abreviación.
    reason: cross_reference
lexical_decisions:
- source_word: הָאֲרִיאֵל
  english_pob_choice: the altar hearth
  chosen_spanish: el fogón del altar
  alternatives_spanish:
  - el hogar del altar
  - la plataforma del altar
  - el altar
  lexicon: HALOT
  rationale: En este contexto de medidas arquitectónicas del templo, el término señala la parte superior funcional del altar, no el altar en general. "Fogón" comunica el lugar de fuego/combustión con naturalidad en español, sin perder la referencia cultual. "Hogar" también es posible, pero puede sonar menos específico en español moderno; "altar" sería demasiado general.
- source_word: שְׁתֵּים עֶשְׂרֵה
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce en número
  lexicon: HALOT
  rationale: Número cardinal simple y directo; no requiere expansión.
- source_word: אֹרֶךְ
  english_pob_choice: long
  chosen_spanish: de largo
  alternatives_spanish:
  - en longitud
  - largo
  lexicon: HALOT
  rationale: En una fórmula de medidas, "de largo" es la equivalencia española más natural y precisa.
- source_word: בִּשְׁתֵּים עֶשְׂרֵה
  english_pob_choice: by twelve
  chosen_spanish: por doce
  alternatives_spanish:
  - de doce de ancho
  - en doce
  lexicon: HALOT
  rationale: El valor funcional de la preposición es marcar la medida correspondiente del ancho; en español, "por doce" en una expresión dimensional es idiomático y claro.
- source_word: רֹחַב
  english_pob_choice: wide
  chosen_spanish: de ancho
  alternatives_spanish:
  - ancho
  - en anchura
  lexicon: HALOT
  rationale: Para medidas, "de ancho" suena natural en español y conserva el paralelismo con "de largo".
- source_word: רָבוּעַ
  english_pob_choice: square
  chosen_spanish: cuadrado
  alternatives_spanish:
  - de forma cuadrada
  - cuadrangular
  lexicon: HALOT
  rationale: Describe la forma geométrica; "cuadrado" es la forma más clara y directa en español.
- source_word: אֶל אַרְבַּעַת רְבָעָיו
  english_pob_choice: on its four sides
  chosen_spanish: por sus cuatro lados
  alternatives_spanish:
  - hacia sus cuatro cuartos
  - en sus cuatro esquinas
  lexicon: HALOT
  rationale: La expresión hebrea puede entenderse literalmente como "a sus cuatro cuartos" o "hacia sus cuatro partes"; el POB inglés opta por el sentido arquitectónico claro. En español, "por sus cuatro lados" conserva ese sentido sin ocultar la simetría de la forma. La alternativa "esquinas" es posible, pero interpretativa.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones sustantivas y presenta alta concordancia con la fuente hebrea; se conservó su decisión principal de leer הָאֲרִיאֵל como la parte superior funcional del altar, evitando una transliteración opaca.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto, pero este verso no contiene el nombre divino.
  - Se evitó "SEÑOR" y otras formas de ocultamiento textual, porque el versículo no las requiere.
  - '"Fogón del altar" busca respetar la lectura cultual/arquitectónica del término sin convertirlo en un genérico "altar".'
  - La nota sobre "codos" refleja la misma inferencia contextual que en el audit trail en inglés.
