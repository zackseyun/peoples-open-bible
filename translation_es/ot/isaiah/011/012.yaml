base_translation:
  language: en
  yaml_path: translation/ot/isaiah/011/012.yaml
  text: He will raise a banner for the nations[a], and gather the banished of Israel[c][b]; he will assemble the scattered of Judah from the four corners of the earth.
  footnotes:
  - marker: a
    text: Or 'the outcasts of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the scattered women of Judah'; the feminine form may reflect grammatical agreement with Judah as a collective, so some translations render more generally, 'the dispersed of Judah.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'from the four wings of the earth,' an idiom for the earth's farthest extremities.
    reason: cultural_note
