review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura hebrea y preserva el paralelismo de 'tu mano' / 'la mano de todo el pueblo'. Sin embargo, en הָרֹג תַּהַרְגֶנּוּ y לַהֲמִיתוֹ el español mezcla 'matar' con 'darle muerte', lo que debilita la fuerza judicial que el expediente inglés documenta como 'put him to death'.
  spanish_quality_summary: El texto es claro, pero 'ciertamente lo matarás' suena menos natural y menos jurídico que 'de cierto lo pondrás a muerte' o 'sin duda lo pondrás a muerte'. Además, 'sobre él' es comprensible, pero 'contra él' refleja mejor el valor adversativo/judicial de בּוֹ en esta construcción y suena más idiomático en español bíblico moderno.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé o Mesías. Sí aplica la decisión del proyecto de no suavizar el lenguaje legal: conviene usar ''poner a muerte'' en vez de ''matar'' para mantener la formalidad judicial documentada en el audit trail inglés.'
  issues:
  - severity: medium
    issue: '''ciertamente lo matarás'' no refleja bien el matiz judicial formal'
    rationale: El inglés auditado eligió 'put him to death' precisamente para preservar el marco legal. 'Matar' es semánticamente posible, pero menos preciso en este contexto legislativo.
  - severity: low
    issue: La nota al pie repite prácticamente la misma redacción del texto principal
    rationale: Si el texto principal se revisa a 'lo pondrás a muerte', la alternativa 'lo matarás' funciona mejor como nota léxica real.
  - severity: low
    issue: '''sobre él'' es menos natural que ''contra él'' en esta imagen forense'
    rationale: La frase hebrea indica que su mano debe ser la primera en actuar contra el acusado; 'contra él' comunica mejor esa relación en español natural.
  revised_spanish_text: Porque de cierto lo pondrás a muerte; tu mano será la primera contra él para darle muerte[a], y después la mano de todo el pueblo.
  revised_footnotes:
  - marker: a
    text: O 'ciertamente lo matarás'. El hebreo usa un infinitivo absoluto con un verbo finito para dar énfasis.
    reason: lexical_alternative
