  glossary_alignment: 'No hay términos del glosario maestro en conflicto. Las decisiones léxicas principales concuerdan con el rastro auditado: מוֹעֵד como ''señal'' preacordada, אֹרֵב con valor colectivo, y מַשְׂאַת הֶעָשָׁן como señal visible de humo. No hay cuestiones teológicas sensibles.'
