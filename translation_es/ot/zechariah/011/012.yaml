    rationale: Aunque posible, el contexto y la auditoría inglesa marcan un contraste adversativo. «Pero si no» expresa mejor la fuerza de וְאִם לֹא aquí.
  - severity: low
    issue: Repetición explícita de sujeto en «Y ellos pesaron»
    rationale: El español no necesita «ellos» aquí; la progresión narrativa queda más natural con «Entonces pesaron» o «Y pesaron».
