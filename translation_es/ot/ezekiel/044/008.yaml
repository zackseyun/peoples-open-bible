review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: reproche por no cumplir una responsabilidad sagrada y por asignar a otros para desempeñarla en el santuario. Sin embargo, no preserva bien dos decisiones clave del rastro POB: (1) מִשְׁמֶרֶת como ''charge'' no se vierte naturalmente con ''carga'' en español, porque desplaza el sentido hacia peso/gravamen más que encargo cultual; (2) לָכֶם fue elevado en el borrador a ''en lugar de ustedes'' en el texto principal, cuando el POB inglés conservó ''for you'' y relegó ''instead of you'' a nota. Además, la nota [a] está anclada en ''mis cosas santas'' pero explica una alternativa de לָכֶם, por lo que el anclaje no corresponde al lugar pertinente del texto.'
  spanish_quality_summary: El español es entendible, pero 'la carga de mis cosas santas' y 'guardar la carga' suenan poco idiomáticos y algo opacos en registro bíblico natural. 'Encargo' o 'responsabilidad' comunican mejor el sentido cultual-administrativo. También conviene mantener la segunda persona plural con 'han' si se sigue de 'ustedes', pero el texto debe sonar más fluido. La colocación de la nota debe ir sobre 'para ustedes' al final, no sobre 'mis cosas santas'.
  glossary_alignment: 'No hay conflicto con términos de proyecto mayores como Yahvé/Mesías. Sí hay desalineación con la racionalidad léxica auditada: ''charge'' debe reflejarse con un término español cultual y natural, preferiblemente ''encargo''; ''my holy things'' puede mantenerse como ''mis cosas santas''; y la alternativa ''en lugar de ustedes'' debe preservarse en nota, no sustituir el texto principal.'
  issues:
  - severity: high
    issue: מִשְׁמֶרֶת traducido como 'carga'
    rationale: En español bíblico general 'carga' sugiere peso o fardo, y no comunica bien el encargo cultual/administrativo del hebreo. Esto afecta ambas ocurrencias y vuelve la frase poco natural.
  - severity: high
    issue: לָכֶם traducido en el texto principal como 'en lugar de ustedes'
    rationale: El POB inglés eligió 'for you' como texto base y documentó 'instead of you' como alternativa plausible en nota. El borrador invierte esa decisión sin necesidad textual suficiente.
  - severity: medium
    issue: Nota [a] anclada en el lugar equivocado
    rationale: La nota explica la alternativa de לָכֶם, pero el marcador aparece sobre 'mis cosas santas', que corresponde a קָדָשַׁי. Esto confunde la referencia.
  - severity: medium
    issue: Construcción 'guardar la carga' poco idiomática
    rationale: Aunque intenta reflejar la repetición hebrea, en español suena forzada. 'cumplir el encargo' o 'guardar el encargo' funciona mejor; aquí 'cumplir el encargo' es más natural.
  revised_spanish_text: No han cumplido el encargo de mis cosas santas, sino que han nombrado a otros para que cumplan mi encargo en mi santuario, para ustedes[a].
  revised_footnotes:
  - marker: a
    text: O "en lugar de ustedes", destacando que otros fueron designados para cumplir el encargo del santuario en su lugar.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para reflejar mejor el hebreo y el audit trail inglés: ''encargo'' comunica con más fidelidad y naturalidad el sentido de מִשְׁמֶרֶת; se mantiene ''mis cosas santas'' por su amplitud deliberada; y לָכֶם vuelve al valor base ''para ustedes'', dejando ''en lugar de ustedes'' como alternativa en nota. También se corrige el anclaje de la nota al segmento pertinente del texto.'
