translation:
  language: es
  text: Y el rey y Joyadá lo entregaron[a] a los que hacían la obra del servicio de la casa de Yahvé[b], y contrataron canteros y artesanos para restaurar la casa de Yahvé, y también artesanos en hierro y bronce[c] para fortalecer la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo dieron' o 'lo pusieron en manos de otros'; el pronombre se refiere al dinero reunido en el contexto.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'la casa de Yahvé'; es decir, el templo.
    reason: lexical_alternative
  - marker: c
    text: O 'herreros en hierro y bronce'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְּנֵהוּ
  english_pob_choice: gave it
  chosen_spanish: lo entregaron
  alternatives_spanish:
  - lo dieron
  - lo entregaron a su cargo
  - lo pusieron a disposición
  lexicon: HALOT
  rationale: El pronombre enclítico retoma el dinero reunido en el contexto; en español, 'lo entregaron' conserva el valor de transferir/poner en manos de otros sin añadir un objeto implícito extra. 'Dieron' sería correcto pero menos preciso aquí.
- source_word: אֶל עוֹשֵׂה מְלֶאכֶת עֲבוֹדַת בֵּית יְהוָה
  english_pob_choice: to those doing the work of the service of the house of Yahweh
  chosen_spanish: a los encargados de la obra del servicio de la casa de Yahvé
  alternatives_spanish:
  - a los que hacían la obra del servicio de la casa de Yahvé
  - a los que trabajaban en la obra del servicio de la casa de Yahvé
  - a los responsables de la obra del servicio de la casa de Yahvé
  lexicon: HALOT
  rationale: 'La construcción hebrea es formal y compacta: ''al hacedor de la obra del servicio...''. En español, ''encargados'' comunica de forma natural la función administrativa/operativa implícita por el contexto, sin agregar la idea de supervisión de manera demasiado explícita.'
- source_word: בֵּית יְהוָה
  english_pob_choice: house of Yahweh
  chosen_spanish: casa de Yahvé
  alternatives_spanish:
  - casa de Yahweh
  - templo de Yahvé
  lexicon: HALOT
  rationale: Se conserva la metáfora básica 'casa' en paralelo al hebreo בית, manteniendo transparencia lexical. 'Templo' es posible, pero es una explicitación más interpretativa.
- source_word: וַיִּהְיוּ שֹׂכְרִים
  english_pob_choice: and they hired
  chosen_spanish: y ellos contrataron
  alternatives_spanish:
  - y contrataron
  - y alquilaron
  - y estaban contratando
  lexicon: HALOT
  rationale: El participio con היה expresa el acto de emplear mano de obra; 'contrataron' reproduce bien la idea en español moderno. Se evita 'alquilaron' por ser engañoso y 'estaban contratando' por suavizar indebidamente el resultado narrativo.
- source_word: חֹצְבִים
  english_pob_choice: stonecutters
  chosen_spanish: canteros
  alternatives_spanish:
  - cortadores de piedra
  - hewers de piedra
  - canteros de piedra
  lexicon: HALOT
  rationale: En contexto de reparación del templo, el oficio es el de trabajar piedra; 'canteros' es el equivalente natural y técnico en español. 'Cortadores de piedra' es más literal pero menos idiomático.
- source_word: וְחָרָשִׁים
  english_pob_choice: craftsmen
  chosen_spanish: artesanos
  alternatives_spanish:
  - artesanos
  - maestros artesanos
  - carpinteros
  lexicon: HALOT
  rationale: חרש designa un trabajador hábil de forma amplia. 'Artesanos' preserva esa amplitud mejor que 'carpinteros', que restringiría indebidamente el oficio.
- source_word: לְחַדֵּשׁ
  english_pob_choice: to restore
  chosen_spanish: para restaurar
  alternatives_spanish:
  - para renovar
  - para reparar
  - para rehacer
  lexicon: HALOT
  rationale: '''Restaurar'' en español transmite la idea de volver a dejar en buen estado, integrando reparación y renovación. Es la mejor correspondencia para el valor contextual de חדש en este pasaje.'
- source_word: לְחָרָשֵׁי בַרְזֶל וּנְחֹשֶׁת
  english_pob_choice: craftsmen in iron and bronze
  chosen_spanish: artesanos en hierro y bronce
  alternatives_spanish:
  - artesanos de hierro y bronce
  - herreros y broncistas
  - artesanos de metal
  lexicon: HALOT
  rationale: Se mantiene la coordinación de materiales del hebreo. 'En hierro y bronce' refleja el oficio especializado sin convertirlo en una profesión más específica de lo que el texto dice.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  - aleación de cobre
  lexicon: HALOT
  rationale: En este contexto de herramientas y construcción, 'bronce' es la equivalencia contextual más aceptada y coherente con el audit trail en inglés.
- source_word: לְחַזֵּק
  english_pob_choice: to strengthen
  chosen_spanish: para fortalecer
  alternatives_spanish:
  - para reforzar
  - para укрепecer
  - para hacer fuerte
  lexicon: HALOT
  rationale: '''Fortalecer'' conserva el sentido de hacer más sólido/robusto, especialmente referido a una estructura. ''Reforzar'' también sería posible, pero ''fortalecer'' mantiene mejor el paralelismo con el verbo hebreo.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrama. La convención de POB es preservar el nombre divino en transliteración; en español, 'Yahvé' es la forma establecida del proyecto y mantiene la transparencia del original mejor que la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: בית יהוה como metáfora cultual
  english_pob_reading: house of Yahweh
  chosen_spanish_reading: casa de Yahvé
  alternative_spanish_readings:
  - templo de Yahvé
  - casa del SEÑOR
  rationale: Se conserva la metáfora 'casa' del hebreo sin neutralizarla por 'templo'. Esto mantiene la consistencia intertextual y evita borrar una elección lexical significativa del source text.
  doctrine_reference: POB lexical consistency for בית יהוה
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'workers in iron and bronze' por 'craftsmen in iron and bronze' para ajustarse mejor al valor del término hebreo. Por eso la versión española usa 'artesanos en hierro y bronce' y no una formulación genérica de trabajadores. También se mantuvo la decisión auditable de traducir יְהוָה por el nombre divino y no por una sustitución titular.
  spanish_consistency_notes:
  - 'Se preserva la estructura narrativa con dos acciones coordinadas: entrega del dinero y contratación de trabajadores.'
  - '''Casa de Yahvé'' se mantiene de forma uniforme en todo el versículo para reflejar בית יְהוָה.'
  - '''Artesanos'' se repite en el tramo final para conservar la consistencia con חָרָשִׁים y לְחָרָשֵׁי.'
  - La puntuación separa las dos cláusulas principales sin sobrecargar el período, en un estilo bíblico moderno y legible.
