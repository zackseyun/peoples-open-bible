id: EST.9.25
reference: Esther 9:25
source:
  edition: WLC
  text: וּ/בְ/בֹאָ/הּ֮ לִ/פְנֵ֣י הַ/מֶּלֶךְ֒ אָמַ֣ר עִם הַ/סֵּ֔פֶר יָשׁ֞וּב מַחֲשַׁבְתּ֧/וֹ הָ/רָעָ֛ה אֲשֶׁר חָשַׁ֥ב עַל הַ/יְּהוּדִ֖ים עַל רֹאשׁ֑/וֹ וְ/תָל֥וּ אֹת֛/וֹ וְ/אֶת בָּנָ֖י/ו עַל הָ/עֵֽץ־־־־־־׃
translation:
  text: But when she came before the king[a], he commanded by letter that his evil scheme which he had devised against the Jews should return on his own head[b], and they hanged him and his sons on the gallows.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more literally, 'he said with the letter/book'; the sense is that the king issued a written decree.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb can also be understood as 'impaled,' and 'the tree' may refer to a stake or wooden pole rather than a modern gallows.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְבֹאָהּ
  chosen: when she came
  alternatives:
  - when it came
  - when Esther came
  lexicon: HALOT
  rationale: The feminine singular suffix most naturally refers back to Esther in context. Rendering with the pronoun 'she' preserves the anaphoric reference without unnecessarily repeating the name.
- source_word: לִפְנֵי הַמֶּלֶךְ
  chosen: before the king
  alternatives:
  - into the presence of the king
  lexicon: HALOT
  rationale: Standard idiom for appearing in the king's presence; 'before the king' is natural and sufficiently formal.
- source_word: אָמַר עִם הַסֵּפֶר
  chosen: he commanded in writing
  alternatives:
  - he said with a letter
  - he said in the document
  - he ordered by letter
  lexicon: HALOT
  rationale: The Hebrew is somewhat compressed and idiomatic. In context it refers to the king's written decree. 'Commanded in writing' captures the force and avoids an awkwardly literal 'said with the book/letter.'
- source_word: יָשׁוּב
  chosen: should return
  alternatives:
  - returned
  - be turned back
  lexicon: HALOT
  rationale: The verb expresses reversal of Haman's plot back onto himself. 'Should return' fits the dependent sense after the king's command.
- source_word: מַחֲשַׁבְתּוֹ הָרָעָה
  chosen: his evil scheme
  alternatives:
  - his evil plan
  - his wicked device
  - his evil thought
  lexicon: HALOT
  rationale: The noun denotes a plan, device, or scheme, not merely an internal thought. 'Scheme' conveys malicious intent clearly in modern English.
- source_word: אֲשֶׁר חָשַׁב
  chosen: which he had devised
  alternatives:
  - which he had planned
  - which he had thought up
  lexicon: HALOT
  rationale: Using 'devised' maintains lexical connection with the preceding noun of planning while sounding idiomatic.
- source_word: עַל הַיְּהוּדִים
  chosen: against the Jews
  alternatives:
  - concerning the Jews
  - upon the Jews
  lexicon: HALOT
  rationale: Here עַל with hostile intent is best rendered 'against.'
- source_word: עַל רֹאשׁוֹ
  chosen: on his own head
  alternatives:
  - upon his head
  lexicon: HALOT
  rationale: This is a standard idiom of retributive reversal. 'His own head' makes the reflexive sense explicit in natural English.
- source_word: וְתָלוּ אֹתוֹ וְאֶת־בָּנָיו
  chosen: and they hanged him and his sons
  alternatives:
  - and they impaled him and his sons
  - and they hung him and his sons
  lexicon: HALOT
  rationale: The verb תלה in Esther may refer to suspension/execution on a stake or gallows. Traditional English in Esther commonly uses 'hanged,' and this fits the immediate context; the more specific possibility 'impaled' is worth preserving in a footnote because the exact mode is debated.
- source_word: עַל הָעֵץ
  chosen: on the gallows
  alternatives:
  - on the tree
  - on the stake
  - on the wooden pole
  lexicon: HALOT
  rationale: In Esther this term refers to the execution structure prepared by Haman. 'Gallows' is the conventional contextual rendering, though literally it is 'tree/wood/pole'; the lexical alternative is preserved in a footnote.
