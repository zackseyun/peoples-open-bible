translation:
  language: es
  text: No prestará a interés ni tomará ganancia[a]; apartará su mano de la injusticia[b]; ejecutará verdadera justicia entre un hombre y otro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no prestará a usura ni tomará incremento».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hará volver su mano de la injusticia».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «entre hombre y hombre», un modismo legal para juzgar justamente entre dos partes.'
    reason: cultural_note
lexical_decisions:
- source_word: בַּנֶּשֶׁךְ
  english_pob_choice: at interest
  chosen_spanish: a interés
  alternatives_spanish:
  - con interés
  - sobre interés
  - a usura
  lexicon: HALOT
  rationale: נֶשֶׁךְ designa interés cobrado en un préstamo, con matiz explotador en contextos legales. «A interés» es natural en español y conserva el sentido jurídico-económico sin recurrir a un arcaísmo como «usura».
- source_word: יִתֵּן
  english_pob_choice: lend
  chosen_spanish: dará
  alternatives_spanish:
  - prestará
  - entregará
  lexicon: HALOT
  rationale: El hebreo dice literalmente «dar», y con נֶשֶׁךְ el sentido es dar dinero en préstamo con interés. En español, «dará a interés» reproduce mejor la construcción básica que forzar «prestará» como si el verbo hebreo lo dijera explícitamente.
- source_word: וְתַרְבִּית
  english_pob_choice: profit
  chosen_spanish: ganancia
  alternatives_spanish:
  - incremento
  - interés
  - provecho
  lexicon: HALOT
  rationale: תַרְבִּית es un término cercano a נֶשֶׁךְ dentro de prohibiciones sobre préstamos abusivos. «Ganancia» comunica el beneficio extraído del préstamo y mantiene una distinción española razonable frente a «a interés».
- source_word: יִקָּח
  english_pob_choice: take
  chosen_spanish: tomará
  alternatives_spanish:
  - recibirá
  - obtendrá
  lexicon: HALOT
  rationale: El verbo significa «tomar». «Tomará ganancia» conserva la forma activa y la relación con el sustantivo siguiente sin perder naturalidad en español.
- source_word: מֵעָוֶל
  english_pob_choice: from injustice
  chosen_spanish: de la injusticia
  alternatives_spanish:
  - de la maldad
  - de la iniquidad
  - del agravio
  lexicon: HALOT
  rationale: עָוֶל se usa en contextos ético-legales para injusticia o torcimiento del derecho. «Injusticia» mantiene el campo judicial y moral del verso.
- source_word: יָשִׁיב יָדוֹ
  english_pob_choice: he keeps his hand back
  chosen_spanish: apartará su mano
  alternatives_spanish:
  - retirará su mano
  - volverá atrás su mano
  - contendrá su mano
  lexicon: HALOT
  rationale: 'La expresión hebrea es idiomática: «hará volver su mano». En español, «apartará su mano» conserva la imagen corporal y la idea de abstenerse de actuar, sin sonar forzado.'
- source_word: מִשְׁפַּט אֱמֶת
  english_pob_choice: true justice
  chosen_spanish: verdadera justicia
  alternatives_spanish:
  - justicia verdadera
  - juicio verdadero
  - justo juicio
  lexicon: HALOT
  rationale: La combinación une decisión judicial con verdad/fidelidad. «Verdadera justicia» conserva ambas dimensiones y sigue la elección del POB inglés sin depender de una fórmula eclesiástica.
- source_word: יַעֲשֶׂה
  english_pob_choice: he executes
  chosen_spanish: ejecutará
  alternatives_spanish:
  - hará
  - practicará
  - realizará
  lexicon: HALOT
  rationale: Aunque literalmente es «hacer», en el contexto de juicio la traducción formal «ejecutará» expresa una justicia llevada a cabo efectivamente.
- source_word: בֵּין אִישׁ לְאִישׁ
  english_pob_choice: between one man and another
  chosen_spanish: entre un hombre y otro
  alternatives_spanish:
  - entre una persona y otra
  - entre un hombre y un hombre
  lexicon: HALOT
  rationale: Se conserva el modismo legal masculino singular de אִישׁ, siguiendo la precisión de género del POB inglés. «Entre un hombre y otro» suena natural en español y mantiene la imagen de litigio entre dos partes.
theological_decisions:
- issue: 'Los dos términos de préstamo: נֶשֶׁךְ y תַרְבִּית'
  english_pob_reading: Different but related terms rendered as 'interest' and 'profit'
  chosen_spanish_reading: Dos términos relacionados rendidos como «a interés» y «ganancia»
  alternative_spanish_readings:
  - «usura» y «aumento»
  - «interés» y «interés»
  rationale: El hebreo usa dos vocablos cercanos para prácticas de préstamo con beneficio. Mantener una leve diferencia en español ayuda a no borrar la duplicación retórica del texto y evita un término demasiado arcaico como «usura» salvo que el contexto lo exija.
  doctrine_reference: DOCTRINE.md Translation philosophy points 5 and 6
- issue: El modismo judicial בֵּין אִישׁ לְאִישׁ
  english_pob_reading: between one man and another
  chosen_spanish_reading: entre un hombre y otro
  alternative_spanish_readings:
  - entre una persona y otra
  - entre una parte y otra
  rationale: El hebreo conserva la fórmula masculina singular como idiomática legal. La traducción no la neutraliza, porque la conservación del valor representativo ayuda a reflejar el texto fuente y la política de precisión de género del proyecto.
  doctrine_reference: DOCTRINE.md Translation philosophy point 4
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «carries out» por «executes» para el miembro judicial final. La redacción española adopta una forma igualmente formal, «ejecutará verdadera justicia», para reflejar ese ajuste de registro sin perder el modismo hebreo ni la distinción entre los dos términos económicos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se evita «SEÑOR» como sustituto teológico porque el verso no lo requiere.
  - Se conserva la repetición de la estructura verbal del hebreo en dos miembros negativos y dos afirmativos.
  - «Injusticia» traduce עָוֶל en su valor ético-legal, no como maldad abstracta.
  - Se mantiene el singular masculino representativo en «un hombre y otro» para el modismo jurídico final.
