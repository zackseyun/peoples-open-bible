translation:
  language: es
  text: Quien me obedece no será avergonzado[a], y los que trabajan en mí[b] no pecarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no se avergonzará». El verbo griego puede referirse tanto a sentir vergüenza como a ser avergonzado o deshonrado públicamente.
    reason: lexical_alternative
  - marker: b
    text: O «conmigo». El griego dice literalmente «en mí», pero puede expresar asociación cercana o acción en comunión con la Sabiduría personificada.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ὑπακούων μου
  english_pob_choice: Whoever obeys me
  chosen_spanish: Quien me obedece
  alternatives_spanish:
  - El que me escucha
  - Quien me hace caso
  lexicon: BDAG
  rationale: ὑπακούω implica oír con respuesta obediente; en español, «obedecer» conserva mejor esa fuerza que un simple «escuchar». La forma general «quien» reproduce naturalmente el participio singular genérico.
- source_word: οὐκ αἰσχυνθήσεται
  english_pob_choice: will not be put to shame
  chosen_spanish: no será avergonzado
  alternatives_spanish:
  - no quedará avergonzado
  - no será hecho pasar vergüenza
  - no será deshonrado
  lexicon: BDAG
  rationale: El pasivo puede expresar tanto vergüenza interior como quedar expuesto al oprobio. «No será avergonzado» mantiene esa amplitud en español y suena natural, sin forzar una perífrasis demasiado interpretativa.
- source_word: οἱ ἐργαζόμενοι
  english_pob_choice: those who work
  chosen_spanish: los que trabajan
  alternatives_spanish:
  - los que obran
  - los que laboran
  - los que practican
  lexicon: BDAG
  rationale: ἐργάζομαι designa hacer/trabajar de manera concreta. «Trabajan» es la opción más directa y transparente en español.
- source_word: ἐν ἐμοὶ
  english_pob_choice: in me
  chosen_spanish: en mí
  alternatives_spanish:
  - conmigo
  - por mí
  lexicon: BDAG
  rationale: Se conserva la preposición griega de forma literal porque el texto de la POB inglesa volvió a «in me» en su última revisión. En español, «en mí» suena algo más extraño, pero retiene la imagen de la fuente de acción asociada con la Sabiduría personificada y evita suavizar de más la relación.
- source_word: οὐχ ἁμαρτήσουσιν
  english_pob_choice: will not sin
  chosen_spanish: no pecarán
  alternatives_spanish:
  - no pecarán contra mí
  - no errarán
  - no se desviarán
  lexicon: BDAG
  rationale: ἁμαρτάνω es el verbo usual para «pecar». En español bíblico contemporáneo, «pecarán» comunica con claridad el valor moral sin diluirlo en «errar».
theological_decisions:
- issue: La promesa de que los que trabajan en/ con la Sabiduría no pecarán
  english_pob_reading: A moral-spiritual promise stated in wisdom-language, rendered directly as 'will not sin' without softening.
  chosen_spanish_reading: Una promesa moral-espiritual expresada en lenguaje sapiencial, traducida de forma directa como «no pecarán».
  alternative_spanish_readings:
  - no errarán
  - no se desviarán del camino
  rationale: El griego usa el verbo ordinario para pecar, y el español debe conservar esa fuerza. A la vez, el contexto es la Sabiduría personificada, así que no se debe convertir en una afirmación doctrinal absoluta de impecabilidad.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión inglesa reciente osciló entre 'with me' y 'in me' para ἐν ἐμοὶ. La presente versión española opta por conservar la literalidad «en mí» en el cuerpo del texto, pero deja constancia en nota de la alternativa asociativa «conmigo», porque el griego puede leerse de manera relacional sin quedar rígidamente locativo. También se mantiene la correspondencia directa entre αἰσχυνθήσεται y un pasivo de vergüenza, sin reducirlo a simple sentimiento interno.
  spanish_consistency_notes:
  - Usar «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Mantener «pecar» para ἁμαρτάνω en contextos morales claros.
  - Conservar «en mí» en la línea principal para respetar el griego, aunque la nota explique la lectura asociativa posible.
  - Evitar sustituir «obedecer» por «escuchar» aquí, porque el verbo griego exige respuesta activa.
  - Reproducir el paralelismo breve y proverbial del original sin expandirlo.
