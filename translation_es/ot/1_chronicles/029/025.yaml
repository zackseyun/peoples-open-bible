translation:
  language: es
  text: Y Yahvé engrandeció a Salomón sobremanera ante los ojos de todo Israel, y le dio majestad real[a], como no había estado sobre ningún rey antes de él sobre Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘esplendor real’ o ‘majestad regia’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְגַדֵּל
  english_pob_choice: made ... exceedingly great
  chosen_spanish: engrandeció
  alternatives_spanish:
  - hizo ... grande
  - magnificó
  lexicon: HALOT
  rationale: 'El hifil de גדל es causativo: ‘hacer grande’ o ‘engrandecer’. En español, ‘engrandeció’ conserva bien la causatividad y permite combinarse naturalmente con el intensificador siguiente.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como ‘Yahvé’, siguiendo la norma del proyecto para no sustituirlo por un título y mantener la referencia directa al nombre del pacto.
- source_word: לְמַעְלָה
  english_pob_choice: exceedingly
  chosen_spanish: sobremanera
  alternatives_spanish:
  - en gran manera
  - muchísimo
  - muy altamente
  lexicon: HALOT
  rationale: Aquí no tiene sentido espacial (‘hacia arriba’), sino intensificador del verbo anterior. ‘Sobremanera’ reproduce ese aumento enfático con dignidad y naturalidad en español.
- source_word: לְעֵינֵי כָּל יִשְׂרָאֵל
  english_pob_choice: in the sight of all Israel
  chosen_spanish: a la vista de todo Israel
  alternatives_spanish:
  - ante todo Israel
  - en presencia de todo Israel
  lexicon: HALOT
  rationale: La expresión es idiomática de percepción pública. ‘A la vista de’ conserva la idea de reconocimiento público sin volverlo artificial.
- source_word: וַיִּתֵּן עָלָיו
  english_pob_choice: gave him
  chosen_spanish: le dio
  alternatives_spanish:
  - puso sobre él
  - le otorgó
  lexicon: HALOT
  rationale: El hebreo literalmente dice ‘dio sobre él’, una forma idiomática de conferir algo. En español, ‘le dio’ transmite la acción de otorgar sin calco pesado.
- source_word: הוֹד מַלְכּוּת
  english_pob_choice: royal majesty
  chosen_spanish: majestad real
  alternatives_spanish:
  - esplendor real
  - majestad de realeza
  - esplendor de realeza
  lexicon: HALOT
  rationale: הוֹד puede ser ‘majestad’, ‘esplendor’ u ‘honor’; מַלְכוּת añade el ámbito real. ‘Majestad real’ conserva ambos elementos de forma breve y reverente.
- source_word: אֲשֶׁר לֹא הָיָה עַל כָּל מֶלֶךְ
  english_pob_choice: such as had not been on any king
  chosen_spanish: como no la había tenido ningún rey
  alternatives_spanish:
  - que no había estado sobre ningún rey
  - tal que no había habido sobre ningún rey
  lexicon: HALOT
  rationale: 'Se mantiene el alcance comparativo del relativo: una majestad real sin precedente. ‘La’ retoma ‘majestad real’ para evitar una repetición torpe y conservar la cohesión.'
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: antes de él
  alternatives_spanish:
  - delante de él
  - anterior a él
  lexicon: HALOT
  rationale: Aquí el sentido es temporal, no espacial. ‘Antes de él’ expresa con claridad que se trata de reyes anteriores a Salomón.
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - en Israel
  - a Israel
  lexicon: HALOT
  rationale: Con מלך, עַל expresa gobierno o dominio. ‘Sobre Israel’ preserva ese valor real y no lo debilita a un simple ‘en’.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. Se mantiene una transliteración del nombre propio divino, en consonancia con la política del proyecto y con la transparencia frente al texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión española sigue de cerca la decisión inglesa auditada de distinguir la causatividad de וַיְגַדֵּל, preservar el nombre divino como nombre propio, y tratar הוֹד מַלְכוּת como una expresión de dignidad real sin reducirla a un mero adorno estilístico. No se detectaron revisiones posteriores que requirieran ajuste adicional.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יְהוָה, conforme al estándar del proyecto.
  - ‘sobremanera’ funciona como intensificador del verbo ‘engrandeció’ y evita un calco espacial.
  - La nota [a] preserva la alternativa léxica documentada para הוֹד מַלְכוּת.
  - Se mantiene ‘sobre Israel’ para reflejar el gobierno real implícito en עַל con מֶלֶךְ.
