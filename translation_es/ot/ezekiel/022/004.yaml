base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/022/004.yaml
  text: By your blood that you have shed[a], you have become guilty, and by your idols that you have made, you have become unclean. You have brought your days near and have come to your years[b]. Therefore I have made you a reproach to the nations and a mockery to all the lands.
  footnotes:
  - marker: a
    text: Or, more interpretively, 'You have hastened your days and reached the end of your years.' The Hebrew idiom likely refers to the approach of Jerusalem's appointed time of judgment.
    reason: lexical_alternative
  - marker: b
    text: The term translated 'idols' is a contemptuous Hebrew word often used in Ezekiel for false gods, carrying a pejorative sense beyond a neutral term for images.
    reason: cultural_note
