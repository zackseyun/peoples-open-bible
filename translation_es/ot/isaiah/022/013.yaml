review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la escena hebrea de festejo fatalista y conserva la secuencia de acciones. Sin embargo, ''sacrificando ovejas'' introduce un matiz ritual que el rastro inglés evitó explícitamente en favor de un sentido de matanza/carnicería para banquete. También la nota al pie no corresponde al inglés auditado: presenta como alternativa ''Comamos y bebamos'', que ya es el texto principal, cuando la alternativa documentada es la forma más literal y escueta ''Comer y beber'' / ''Comed y bebed'' según se explique la fuerza del hebreo.'
  spanish_quality_summary: El español es claro, digno y legible. 'Y he aquí' funciona en registro bíblico. 'Gozo y alegría' suena natural. La única aspereza relevante es 'sacrificando ovejas', que en español bíblico suele oírse más cultual que culinario; 'degollando ovejas' o 'matando ovejas' evita esa sobrelectura. La nota necesita reparación para no repetir el texto principal y para explicar correctamente la alternativa más literal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son sólidas. La excepción importante es שָׁחֹט, donde conviene evitar 'sacrificando' por el matiz ritual no querido por la auditoría inglesa. El resto ('gozo', 'alegría', 'carne', 'vino') está alineado.
  issues:
  - severity: medium
    issue: '''sacrificando ovejas'' añade un matiz ritual no exigido por וְשָׁחֹט צֹאן'
    rationale: La decisión inglesa documenta que שחט aquí debe sonar a matanza/carnicería sin sobreespecificar sacrificio ritual. En español, 'sacrificar' evoca con fuerza un acto cultual.
  - severity: high
    issue: La nota al pie no preserva la alternativa auditada y repite el texto principal
    rationale: El texto principal ya dice 'Comamos y bebamos'. La nota debería ofrecer la alternativa más literal y breve del hebreo, no la misma redacción. Así como está, la nota es funcionalmente errónea.
  - severity: low
    issue: '''porque mañana moriremos'' es aceptable, pero reduce un poco la concisión sentenciosa de ''for tomorrow we die'''
    rationale: No obliga cambio; en español el futuro suena natural. Se puede mantener sin problema.
  revised_spanish_text: 'Y he aquí[a], gozo y alegría, matando ganado y degollando ovejas, comiendo carne y bebiendo vino: «Comamos y bebamos, porque mañana moriremos».'
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «Comer y beber», preservando la fuerza breve y casi formular de la consigna hebrea.'
    reason: lexical_alternative
  revision_rationale: Se corrige 'sacrificando ovejas' a 'degollando ovejas' para evitar un matiz ritual no apoyado por la decisión léxica auditada, y se repara la nota al pie para que refleje una alternativa verdaderamente distinta y más literal al lema hebreo.
