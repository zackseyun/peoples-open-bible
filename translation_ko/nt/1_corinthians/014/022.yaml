  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὥστε αἱ γλῶσσαι εἰς σημεῖόν εἰσιν οὐ τοῖς πιστεύουσιν ἀλλὰ τοῖς ἀπίστοις, ἡ δὲ προφητεία οὐ τοῖς ἀπίστοις ἀλλὰ τοῖς πιστεύουσιν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/022.yaml
  text: So then[a], tongues are for a sign not to those who believe but to unbelievers[b], while prophecy is not to unbelievers but to those who believe.
  footnotes:
  - marker: a
    text: Or 'languages.' The Greek term can denote languages, but in 1 Corinthians 12–14 'tongues' preserves Paul's established terminology without deciding a debated interpretation.
    reason: lexical_alternative
  - marker: b
    text: '''A sign'' may be understood by some interpreters as a sign of judgment in light of the preceding citation of Isaiah 28:11–12.'
    reason: cross_reference
translation:
  language: ko
  text: 그러므로 방언은 믿는 자들을 위한 것이 아니라 믿지 않는 자들을 위한 표적이며, 예언은 믿지 않는 자들을 위한 것이 아니라 믿는 자들을 위한 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 여기서 「표적」은 직전 21절의 이사야 인용에 비추어 「심판의 표적」으로 이해되기도 한다.
    reason: cross_reference
lexical_decisions:
- source_word: σημεῖόν
  english_pob_choice: a sign
  chosen_korean: 표적
  alternatives_korean:
