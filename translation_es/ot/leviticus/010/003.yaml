revisions:
- from: 'Entonces Moisés dijo a Aarón[a]: «Esto es lo que Yahvé habló, diciendo: “En los que se acercan a mí yo seré santificado[b], y delante de todo el pueblo seré glorificado[c]”». Y Aarón guardó silencio.'
  to: 'Entonces Moisés dijo a Aarón: «Esto es lo que Yahvé habló, diciendo: “Entre los que se acercan a mí[a] seré santificado[b], y delante de todo el pueblo seré glorificado[c]”». Y Aarón guardó silencio.'
  rationale: Se cambió «En los que se acercan a mí» por «Entre los que se acercan a mí» para reflejar mejor בִּקְרֹבַי en español natural y mantener la ambigüedad teológica señalada por el POB. También se movió la nota [a] desde «Aarón» a la frase pertinente, conforme a las reglas de anclaje de notas. El resto del texto se conserva porque es fiel al hebreo, al POB en inglés y a la terminología del proyecto.
  reviewer_model: gpt-5.4
