  glossary_alignment: No hay conflicto con la terminología base del proyecto. Los nombres propios «Josué», «Israel» y «Judá» están bien. La decisión de mantener «fue tomada» concuerda con la filosofía POB de preservar el modismo hebreo sin resolverlo en el texto principal.
