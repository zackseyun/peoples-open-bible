translation:
  language: es
  text: Y nos recordó a Abel, a quien Caín mató, y a Isaac siendo ofrecido en holocausto[a], y a José en prisión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «siendo ofrecido como un holocausto». El griego usa lenguaje sacrificial para evocar Génesis 22.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεγίνωσκεν
  english_pob_choice: he recounted to us
  chosen_spanish: le recordó a nosotros
  alternatives_spanish:
  - nos relató
  - nos recordó
  - nos hizo memoria de
  lexicon: LSJ
  rationale: El imperfecto aquí tiene valor de repaso evocador de ejemplos bíblicos más que de lectura literal. En español, 'nos recordó' comunica bien la función, y 'le recordó a nosotros' mantiene la dirección del verbo hacia el grupo; la construcción puede resultar algo marcada, pero conserva la relación del original con mayor cercanía que una paráfrasis libre.
- source_word: τὸν ἀναιρεθέντα
  english_pob_choice: who was slain
  chosen_spanish: a quien mató
  alternatives_spanish:
  - a quien fue muerto
  - a quien fue asesinado
  - a quien fue matado
  lexicon: BDAG
  rationale: El participio pasivo expresa muerte violenta. Elegí una forma verbal directa y natural en español; 'mató' conserva la fuerza del acto de Caín sin añadir matiz interpretativo adicional.
- source_word: ὁλοκαυτούμενον
  english_pob_choice: being offered up as a whole burnt offering
  chosen_spanish: siendo ofrecido en holocausto
  alternatives_spanish:
  - siendo ofrecido como holocausto
  - siendo ofrecido en ofrenda quemada
  - siendo ofrecido como ofrenda íntegra
  lexicon: LSJ
  rationale: '''ὁλοκαυτούμενον'' evoca el lenguaje sacrificial de holocausto. En español, ''en holocausto'' preserva el vínculo léxico con el griego y con Génesis 22, sin sugerir erróneamente que Isaac fue realmente consumido por el fuego.'
- source_word: ἐν φυλακῇ
  english_pob_choice: in prison
  chosen_spanish: en prisión
  alternatives_spanish:
  - en la cárcel
  - en confinamiento
  - en custodia
  lexicon: BDAG
  rationale: La referencia es al encierro de José. 'En prisión' / 'en prisión' es claro y actual; 'en prisión' mantiene un registro bíblico sobrio y transparente.
- source_word: Ἄβελ / Κάϊν / Ἰσαάκ / Ἰωσήφ
  english_pob_choice: Abel / Cain / Isaac / Joseph
  chosen_spanish: Abel / Caín / Isaac / José
  alternatives_spanish:
  - Abel / Caim / Isaac / José
  lexicon: convención onomástica estándar
  rationale: Se usan las formas habituales en español bíblico y litúrgico, con grafía castellana estándar para Caín, y nombres plenamente reconocibles para el lector hispano.
theological_decisions:
- issue: Lenguaje sacrificial aplicado a Isaac
  english_pob_reading: Isaac being offered up as a whole burnt offering
  chosen_spanish_reading: Isaac, siendo ofrecido en holocausto
  alternative_spanish_readings:
  - Isaac, siendo ofrecido como holocausto
  - Isaac, siendo ofrecido en ofrenda totalmente quemada
  - Isaac, siendo ofrecido en sacrificio
  rationale: El griego usa terminología de holocausto para evocar Génesis 22. En español conviene conservar esa carga sacrificial con 'holocausto', pero sin afirmar que Isaac fue efectivamente inmolado; la frase queda como alusión litúrgico-sacrificial, no como descripción de un sacrificio consumado.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §§1, 3, 6'
translation_notes:
  revision_awareness: El borrador sigue el sentido del texto griego con especial atención al participio ὁλοκαυτούμενον, conservando la alusión sacrificial a Isaac conforme al audit trail inglés, y manteniendo el encierro de José y la muerte violenta de Abel. He optado por una formulación española sobria y publicable, aunque la sintaxis de la primera cláusula podría ajustarse en una revisión posterior para mayor fluidez.
  spanish_consistency_notes:
  - Yahvé no aparece en este versículo.
  - '''Holocausto'' se usa aquí en sentido técnico-sacrificial, no en sentido moderno no bíblico.'
  - Los nombres propios siguen las convenciones bíblicas estándar en español.
  - No se introduce 'Mesías' ni terminología cristológica en este pasaje.
