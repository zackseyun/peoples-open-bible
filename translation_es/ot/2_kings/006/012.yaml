review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro de auditoría inglés: mantiene el contraste discursivo de וַיֹּאמֶר con «Pero», la negación respetuosa «No, mi señor el rey», la explicación correctiva con «más bien», la localización «que está en Israel», y conserva el paralelismo léxico entre «palabras» y «hablas». También preserva adecuadamente la nota sobre la literalidad de בַּחֲדַר מִשְׁכָּבֶךָ.'
  spanish_quality_summary: El español es claro y digno, pero «le cuenta al rey de Israel las palabras que tú hablas» suena algo menos natural y ligeramente coloquial para este contexto. «Le comunica al rey de Israel las palabras que hablas» mantiene mejor el registro formal y el sentido de hacer saber. Además, el pronombre «tú» es innecesario en español y puede sonar enfático sin base en el hebreo.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Siervos» es aceptable aquí por contexto cortesano. El nombre «Eliseo» es la forma estándar española. No intervienen términos sensibles del glosario principal.
  issues:
  - severity: medium
    issue: «le cuenta» para יַגִּיד resulta algo coloquial
    rationale: Aunque no es incorrecto, en una escena cortesana y profética «le comunica» o «le dice» refleja mejor el valor de 'hacer saber' sin el matiz conversacional de «contar».
  - severity: low
    issue: El pronombre explícito «tú» en «que tú hablas» es innecesario
    rationale: El hebreo marca segunda persona masculina singular, pero el español no necesita el pronombre para expresar el sujeto. Omitirlo mejora la naturalidad y evita énfasis no indicado por el original.
  revised_spanish_text: 'Pero uno de sus siervos dijo[a]: «No, mi señor el rey; más bien, Eliseo el profeta, que está en Israel, le comunica al rey de Israel las palabras que hablas en tu dormitorio».

    '
