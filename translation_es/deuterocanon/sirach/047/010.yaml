    text: 'El final del verso es difícil en el hebreo conservado. El paralelo griego dice: «y desde temprano resonaba el santuario», lo que probablemente preserva el sentido general de la línea; aquí «atrio» sigue la revisión auditada que procura reflejar más de cerca el hebreo difícil.'
    reason: textual_variant
  revision_rationale: Se reubica la nota al pie en la cláusula final, que es donde está la dificultad textual real. Se ajusta «antes de la mañana» a «antes del amanecer» por claridad idiomática en español. Se cambia «santuario» por «atrio» para alinearse con la revisión inglesa auditada más reciente («the court resounded»), manteniendo en la nota la alternativa griega y la incertidumbre del hebreo final.
