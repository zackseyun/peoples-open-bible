revisions:
- from: Esdras abrió el libro[a] a la vista de todo el pueblo, porque estaba por encima de todo el pueblo; y, cuando lo abrió, todo el pueblo se puso de pie.
  to: Esdras abrió el libro[a] a la vista de todo el pueblo, porque estaba por encima de todo el pueblo; y cuando lo abrió, todo el pueblo se puso en pie.
  rationale: Se mantiene la traducción base por su fidelidad al hebreo y al rastro auditado, pero se ajusta la cláusula final a un español más natural y digno para un sujeto colectivo ('se puso en pie') y se simplifica la puntuación. No se requieren cambios doctrinales ni léxicos mayores.
