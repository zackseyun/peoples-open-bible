    issue: Nota [b] innecesaria sobre «un jebuseo»
    rationale: El español ya comunica naturalmente el singular genérico del hebreo; la auditoría inglesa no preserva esta observación como nota. Mantenerla sobrecarga el texto sin resolver una ambigüedad real.
  - severity: low
