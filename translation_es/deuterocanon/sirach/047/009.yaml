translation:
  language: es
  text: Con cantos en los jardines[a] preparó ante el altar, y dispuso el sonido del salmo y de las arpas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo transmitido en esta frase es incierto. El paralelo griego dice: «y puso cantores frente al altar, y por su sonido endulzar melodías», lo que sugiere otra base textual o una corrupción del hebreo.'
    reason: textual_variant
  - marker: b
    text: O «liras» para «arpas»; el término hebreo designa un instrumento de cuerda.
    reason: lexical_alternative
lexical_decisions:
- source_word: בגינות שיר
  english_pob_choice: With songs in the gardens
  chosen_spanish: Con cantos en los jardines
  alternatives_spanish:
  - Con canciones en los jardines
  - Con cantos junto a los jardines
  - Con música en los jardines
  lexicon: HALOT
  rationale: El hebreo transmitido es difícil y probablemente corrupto o incierto. En español, «cantos en los jardines» conserva el sentido hebreo visible sin armonizarlo en el cuerpo principal con la tradición griega, que habla de cantores ante el altar. Mantiene la rareza textual que el testimonio requiere.
- source_word: הכין
  english_pob_choice: made preparation
  chosen_spanish: preparó
  alternatives_spanish:
  - hizo preparación
  - dispuso
  - preparó y ordenó
  lexicon: HALOT
  rationale: הכין significa preparar, disponer o poner en orden. «Preparó» es natural en español y conserva la idea de acción intencional sin añadir objeto que el hebreo no explicita.
- source_word: לפני מזבח
  english_pob_choice: before the altar
  chosen_spanish: antes del altar
  alternatives_spanish:
  - delante del altar
  - frente al altar
  - ante el altar
  lexicon: HALOT
  rationale: La frase preposicional se traduce de manera directa. «Antes del altar» es idiomático en español bíblico contemporáneo y conserva la relación espacial del hebreo.
- source_word: וקול
  english_pob_choice: the sound
  chosen_spanish: el sonido
  alternatives_spanish:
  - la voz
  - el eco
  - la música
  lexicon: HALOT
  rationale: קול puede significar voz o sonido. Aquí, por el contexto de instrumentos y canto, «el sonido» es el término más neutral y adecuado.
- source_word: מזמור
  english_pob_choice: psalm
  chosen_spanish: salmo
  alternatives_spanish:
  - canto
  - himno
  - melodía
  lexicon: HALOT
  rationale: מזמור tiene fuerte matiz litúrgico; «salmo» preserva esa carga cultual mejor que «canto» o «melodía».
- source_word: ונבלים
  english_pob_choice: and harps
  chosen_spanish: y de arpas
  alternatives_spanish:
  - y de liras
  - y de instrumentos de cuerda
  lexicon: HALOT
  rationale: נבלים designa instrumentos de cuerda, comúnmente «arpas» o «liras». «Arpas» es una equivalencia clara y tradicional en español, sin perder el valor instrumental general.
- source_word: תקן
  english_pob_choice: he arranged
  chosen_spanish: dispuso
  alternatives_spanish:
  - ordenó
  - colocó
  - estableció
  lexicon: HALOT
  rationale: תקן expresa poner en orden o disponer. «Dispuso» funciona bien con elementos musicales y cultuales en español.
theological_decisions:
- issue: Texto hebreo difícil frente al paralelo griego más claro
  english_pob_reading: Main text follows the extant Hebrew wording, while the Greek parallel is preserved in a footnote as an alternative textual trajectory.
  chosen_spanish_reading: El texto principal sigue el hebreo transmitido, y la nota hace visible la trayectoria alternativa del griego.
  alternative_spanish_readings:
  - 'Adoptar en el texto principal la lectura griega más clara: «puso cantores frente al altar…»'
  - Suavizar el hebreo en el cuerpo principal para concordarlo con el griego
  rationale: La política del proyecto exige primacía de la fuente disponible y transparencia respecto a la incertidumbre. En este versículo hay una desajuste mayor entre hebreo y griego; por eso no se armonizan en el texto principal, sino que se documenta la alternativa en nota.
  doctrine_reference: 'PHILOSOPHY.md: original-language primacy; transparency about source uncertainty'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente sin cambios: el estado indicó que no hacía falta modificar la propuesta. Se mantuvo la diferencia textual entre hebreo y griego en lugar de armonizarla, conforme al criterio de transparencia.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí porque el versículo no contiene el nombre divino.
  - Se evitó traducir mecánicamente la solución inglesa «made preparation»; el español natural es «preparó» o «dispuso».
  - Se conservó «salmo» por su peso litúrgico y «arpas» como equivalencia clara de נבלים.
  - La nota a pie mantiene la alternativa griega sin convertirla en texto principal, para no borrar la tensión documental entre testigos.
