revisions:
- from: 'Porque no dejará de haber pobre en medio de la tierra; por eso te mando, diciendo: ‘Sin falta abrirás tu mano a tu hermano, a tu afligido[a] y a tu pobre en tu tierra.’'
  to: 'Porque no dejará de haber pobres de en medio de la tierra; por eso te mando, diciendo: ‘Debes abrir bien tu mano a tu hermano[a], a tu afligido[b] y a tu pobre en tu tierra.’'
  rationale: Se ajusta la primera cláusula para reflejar mejor el ámbito de la tierra pactal sin sugerir el planeta en sentido abstracto; se añade la nota documentada para ‘hermano’; y se mejora levemente la naturalidad del mandato enfático en español manteniendo la distinción entre ‘afligido’ y ‘pobre’.
  reviewer_model: gpt-5.4
