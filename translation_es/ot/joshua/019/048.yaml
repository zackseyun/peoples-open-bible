revisions:
- from: 'Esta fue la herencia[a] de la tribu de los hijos de Dan, según sus clanes[b]: estas ciudades con sus aldeas.'
  to: 'Esta fue[a] la herencia[b] de la tribu de los hijos de Dan, según sus clanes: estas ciudades con sus aldeas.'
  rationale: Se conserva la traducción principal del borrador, pero se reubica la nota verbal al segmento correcto (‘Esta fue’) y se añade la alternativa léxica exigida por el audit trail para נַחֲלַת. La nota sobre ‘clanes’ no es necesaria aquí porque el POB inglés no la preservó en nota y la traducción principal ya comunica adecuadamente el sentido.
