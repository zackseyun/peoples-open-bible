id: JOL.1.7
reference: Joel 1:7
source:
  edition: WLC
  text: שָׂ֤ם גַּפְנִ/י֙ לְ/שַׁמָּ֔ה וּ/תְאֵנָתִ֖/י לִ/קְצָפָ֑ה חָשֹׂ֤ף חֲשָׂפָ/הּ֙ וְ/הִשְׁלִ֔יךְ הִלְבִּ֖ינוּ שָׂרִיגֶֽי/הָ׃
translation:
  text: It has made my vine a desolation and my fig tree splinters[a]; it has stripped it bare and thrown it down[b]; its branches have turned white.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'my fig tree into splinters'; the Hebrew noun is rare and may also suggest 'stumps' or shattered remains.
    reason: lexical_alternative
  - marker: b
    text: Or 'its shoots/tendrils have become white,' likely describing exposed wood after the bark has been stripped away.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂם
  chosen: has made
  alternatives:
  - has set
  - has turned
  lexicon: HALOT
  rationale: Qal perfect 3ms of שׂים commonly means 'set/place,' but with לְשַׁמָּה it idiomatically means 'make/turn into' a desolation. 'Has made' is natural English and preserves the resultative force.
- source_word: גַּפְנִי
  chosen: my vine
  alternatives:
  - my vineyard
  lexicon: HALOT
  rationale: גֶּפֶן is 'vine' rather than 'vineyard.' The 1cs suffix is retained as 'my,' reflecting the speaker's possessive lament.
- source_word: לְשַׁמָּה
  chosen: a desolation
  alternatives:
  - for devastation
  - waste
  lexicon: HALOT
  rationale: שַׁמָּה denotes ruin/desolation. 'A desolation' preserves the noun and the prophetic tone better than a looser verbal paraphrase.
- source_word: וּתְאֵנָתִי
  chosen: and my fig tree
  alternatives:
  - and my fig
  lexicon: HALOT
  rationale: תְּאֵנָה refers to the fig tree/fig plant. In this agricultural judgment context, 'fig tree' is the clearest English rendering.
- source_word: לִקְצָפָה
  chosen: splinters
  alternatives:
  - stumps
  - broken pieces
  - stripped bark
  lexicon: HALOT
  rationale: The noun is rare and denotes something broken off or shattered. Given the following verbs about stripping and throwing down, 'splinters' best conveys the image of the tree being ruined into broken fragments. Because the term is difficult, an alternative is preserved in a footnote.
- source_word: חָשֹׂף חֲשָׂפָהּ
  chosen: has stripped it bare
  alternatives:
  - stripping, it has stripped it
  - has completely stripped it
  lexicon: HALOT
  rationale: The infinitive absolute plus perfect of the same root intensifies the action. English expresses this naturally with 'has stripped it bare,' preserving both the verbal idea and the emphatic force.
- source_word: וְהִשְׁלִיךְ
  chosen: and thrown it down
  alternatives:
  - and cast it away
  - and hurled it down
  lexicon: HALOT
  rationale: Hiphil of שלך means 'throw/cast.' 'Thrown it down' fits the image of violent devastation of the fig tree.
- source_word: הִלְבִּינוּ
  chosen: have turned white
  alternatives:
  - are whitened
  - have become white
  lexicon: HALOT
  rationale: Hiphil perfect plural from לבן means 'make white/turn white.' The plural agrees with the following subject 'branches.' 'Have turned white' communicates the exposed, bark-stripped condition.
- source_word: שָׂרִיגֶיהָ
  chosen: its branches
  alternatives:
  - its shoots
  - its tendrils
  lexicon: HALOT
  rationale: שָׂרִיג can denote vine-shoots/tendrils/branches. Since the immediate referent is the fig tree in the second colon and English 'branches' is broadly intelligible, it is chosen here, with more specific alternatives noted.
