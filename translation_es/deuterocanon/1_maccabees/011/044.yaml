translation:
  language: es
  text: Y Jonatán envió a tres mil hombres, poderosos por su fuerza, a Antioquía; y llegaron ante el rey, y el rey se alegró por su llegada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «por su llegada» refleja ἐπὶ τῇ ἐφόδῳ αὐτῶν, cuyo campo semántico puede incluir «aproximación», «venida» o «llegada». En este contexto parece referirse a su arribo ante el rey, no a un ataque.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: El verbo narra una acción de envío en secuencia narrativa. «Envió» es natural en español y conserva el sentido directo sin añadir matices excesivos.
- source_word: ἄνδρας τρισχιλίους
  english_pob_choice: three thousand men
  chosen_spanish: tres mil hombres
  alternatives_spanish:
  - tres mil soldados
  lexicon: LSJ
  rationale: ἄνδρας dice literalmente «hombres»; aunque el contexto es militar, el griego no explicita «soldados». Se mantiene la referencia directa.
- source_word: δυνατοὺς ἰσχύι αὐτῶν
  english_pob_choice: mighty in strength
  chosen_spanish: poderosos en su fuerza
  alternatives_spanish:
  - fuertes en su vigor
  - valientes en fuerza
  - mighty en fuerza
  lexicon: LSJ
  rationale: La frase es enfática y casi redundante en griego. «Poderosos en su fuerza» conserva esa intensificación. «Fuertes» sería más simple, pero perdería parte del énfasis.
- source_word: εἰς Ἀντιοχίαν
  english_pob_choice: to Antioch
  chosen_spanish: a Antioquía
  alternatives_spanish:
  - hacia Antioquía
  - hasta Antioquía
  lexicon: LSJ
  rationale: El movimiento hacia una ciudad se expresa naturalmente con «a» en español. «En Antioquía» sugeriría entrada interna y no solo destino.
- source_word: ἦλθοσαν πρὸς τὸν βασιλέα
  english_pob_choice: they came to the king
  chosen_spanish: llegaron ante el rey
  alternatives_spanish:
  - vinieron al rey
  - fueron ante el rey
  lexicon: LSJ
  rationale: «Llegaron ante el rey» comunica bien el movimiento hacia su presencia. «Ante» refleja la relación espacial/personal de πρὸς τὸν βασιλέα mejor que un simple «a».
- source_word: ηὐφράνθη
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se deleitó
  lexicon: LSJ
  rationale: El verbo expresa gozo o alegría. «Se alegró» es claro y natural en español, manteniendo el tono narrativo.
- source_word: ἐπὶ τῇ ἐφόδῳ αὐτῶν
  english_pob_choice: at their arrival
  chosen_spanish: por su llegada
  alternatives_spanish:
  - ante su llegada
  - a causa de su llegada
  - por su venida
  lexicon: LSJ
  rationale: ἐφόδος puede significar aproximación, llegada o acometida. En este contexto, después de que llegan al rey, la referencia más probable es su llegada/presencia; «por su llegada» conserva la ambigüedad mínima y suena natural en español.
translation_notes:
  revision_awareness: La redacción sigue el texto griego directamente y toma en cuenta la revisión inglesa que prefirió una formulación más natural para δυνατούς ἰσχύι αὐτῶν. En español se buscó una equivalencia igualmente natural sin perder el énfasis enfático del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo», «espíritu/Espíritu» y otros términos doctrinales no aparecen aquí.
  - La puntuación separa las cláusulas narrativas para reflejar la coordinación del griego y facilitar la lectura en español.
