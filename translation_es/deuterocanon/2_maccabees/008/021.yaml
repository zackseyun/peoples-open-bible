translation:
  language: es
  text: Con estas palabras los animó y los dejó listos para morir por las leyes y la patria, y dividió al ejército en cuatro partes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dividió al ejército en cuatro divisiones».
