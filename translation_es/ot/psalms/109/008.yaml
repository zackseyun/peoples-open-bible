  - severity: medium
    issue: «su cargo» para פְּקֻדָּתוֹ
    rationale: «Cargo» puede funcionar, pero se aparta de la decisión inglesa «office» y en español puede estrechar el sentido hacia un puesto administrativo. «Oficio» conserva mejor la idea de rol o responsabilidad designada, con nota aclaratoria para otras opciones.
