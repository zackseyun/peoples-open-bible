translation:
  language: es
  text: Y ellos mismos no mintieron al decir estas cosas; pues él quería ocultarme los hechos[a] de nuestros hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego τὰ ἔργα (tà érga): «los hechos», «las obras» o «las acciones». Se prefiere «hechos» por su naturalidad en español narrativo para actos concretos ya realizados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: Thus
  chosen_spanish: Así que
  alternatives_spanish:
  - Y
  - Por tanto
  - De modo que
  lexicon: BDAG καί 1.b (continuative/inferential use in narrative)
  rationale: Καὶ is a simple copulative conjunction, but in narrative context it frequently carries inferential or resumptive force (BDAG §1.b). The English POB rendered it 'Thus,' signaling a conclusion drawn from prior context. 'Así que' best captures this inferential nuance in natural Spanish without over-formalizing it as 'por tanto.' Bare 'Y' would flatten the logical connection the English POB preserved.
- source_word: ἐψεύσαντο (αὐτοί)
  english_pob_choice: did not lie [subject rendered as singular 'Joseph']
  chosen_spanish: no mintió
  alternatives_spanish:
  - no mintieron
  - no engañaron
  lexicon: 'LSJ ψεύδομαι: to lie, speak falsely; aorist middle ἐψεύσαντο = 3rd pl.'
  rationale: The Greek has αὐτοὶ ἐψεύσαντο — third-person plural aorist, 'they themselves did not lie' — yet the English POB rendered the subject as singular 'Joseph.' The Spanish follows the English POB's editorial choice of a singular subject and specifies 'José,' most likely reflecting a textual variant flagged by the source's footnote marker ³¹ (Charles 1908). The Greek plural tension is preserved in footnote [a]; suppressing it would erase a documented source ambiguity.
- source_word: ἤθελεν
  english_pob_choice: wanted
  chosen_spanish: quería
  alternatives_spanish:
  - deseaba
  - pretendía
  lexicon: 'BDAG θέλω 1: to will, wish, want; imperfect = ongoing or habitual desire'
  rationale: The Greek imperfect ἤθελεν expresses a continuous or durative desire in past time. Spanish imperfect 'quería' is the natural equivalent, preserving the aspectual value. 'Deseaba' is synonymous but slightly more emotive; 'pretendía' introduces connotation of pretense not present in θέλω.
- source_word: κρύπτειν
  english_pob_choice: hide
  chosen_spanish: ocultarme
  alternatives_spanish:
  - esconderme
  - encubrirme
  lexicon: 'LSJ κρύπτω: to hide, conceal; infinitive κρύπτειν as complement of θέλω'
  rationale: 'κρύπτω means to conceal or keep hidden. Spanish ''ocultar'' is precise and modern. The prepositional phrase ἀπʼ ἐμοῦ (''from me'') is naturally absorbed into the pronominal clitic: ''ocultarme'' = ''to hide from me.'' This is more elegant than ''ocultar de mí,'' which would be stilted in Spanish. ''Esconder'' is more colloquial; ''encubrir'' can carry the sense of cover-up or complicity, which exceeds the Greek.'
- source_word: τὰ ἔργα
  english_pob_choice: deeds
  chosen_spanish: los hechos
  alternatives_spanish:
  - las obras
  - las acciones
  - los actos
  lexicon: 'BDAG ἔργον 1: deed, act, thing done; pl. τὰ ἔργα = the deeds/acts'
  rationale: ἔργα in the plural frequently denotes concrete, completed actions, especially morally weighted ones. Spanish 'hechos' (from hacer = to do) conveys this sense of completed acts cleanly. 'Obras' is possible but in modern Spanish leans toward literary/artistic works or ongoing projects. 'Acciones' and 'actos' are also viable but more clinical; 'hechos' is the natural narrative register.
- source_word: τῶν ἀδελφῶν ἡμῶν
  english_pob_choice: our brothers
  chosen_spanish: nuestros hermanos
  alternatives_spanish:
  - nuestros hermanos
  lexicon: 'LSJ ἀδελφός: brother; ἡμῶν = genitive plural of ἐγώ (our)'
  rationale: Standard rendering. 'Nuestros hermanos' is natural and dignified. No Spanish ambiguity arises here.
theological_decisions:
- issue: 'Joseph''s motive: protective concealment vs. deception'
  english_pob_reading: he wanted to hide from me the deeds of our brothers
  chosen_spanish_reading: quería ocultarme los hechos de nuestros hermanos
  alternative_spanish_readings:
  - quería encubrirme los hechos de nuestros hermanos
  rationale: 'The verse explicitly exonerates Joseph: he did not lie, but he did deliberately conceal information. The Spanish must preserve this distinction. ''Ocultar'' (to hide/conceal) accurately names the act without implying deception, consistent with the Greek κρύπτειν. A rendering like ''encubrir'' would introduce a sense of morally suspect cover-up that the Greek and English POB do not intend. The theological point — that concealment can be motivated by protection rather than malice — is lexically supported by the Greek and should not be flattened.'
  doctrine_reference: 'T12P.BEN.2.5 contextual: Joseph as righteous figure protecting Benjamin from distress over the brothers'' conduct'
translation_notes:
  revision_awareness: La última revisión del registro inglés POB (modelo gpt-5.4, 2026-04-23) no introdujo cambios; el texto inglés se considera estable. No hay revisiones aplicadas previas que afecten el borrador español. La tensión entre el plural griego αὐτοὶ ἐψεύσαντο y el sujeto singular del inglés POB no fue documentada explícitamente en el rastro de auditoría inglés; se documenta aquí por primera vez en el nivel español.
  spanish_consistency_notes:
  - No aparece el Nombre Divino (YHWH/Yahvé) en este versículo; no aplica la convención de proyecto.
  - José (patriarca) se translitера como «José» en español, distinto de Jesús (Ἰησοῦς); no hay confusión de referentes.
  - No hay terminología de δοῦλος, πνεῦμα, δικαιοσύνη ni χάρις en este versículo; no aplican las convenciones de terminología de proyecto.
  - El punto y aparte tras 'estas cosas' se resuelve con coma + 'pues' en español, más natural que el punto y coma del inglés POB en este registro.
