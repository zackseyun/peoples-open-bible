translation:
  language: es
  text: Y yo te he asignado los años de su iniquidad[a], según el número de días, trescientos noventa días; y llevarás la iniquidad de la casa de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘castigo por su iniquidad’ o ‘su culpa’; el hebreo puede referirse a la iniquidad, la culpa o el castigo que resulta de la culpa.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתַתִּי
  english_pob_choice: have assigned
  chosen_spanish: te he asignado
  alternatives_spanish:
  - te he dado
  - te he nombrado
  - te he adjudicado
  lexicon: HALOT
  rationale: El hebreo literalmente significa ‘he dado’, pero en este acto simbólico-profético expresa una asignación o designación de un período. ‘Te he asignado’ conserva esa fuerza de imposición sin suavizarla ni volverla interpretativa en exceso.
- source_word: שְׁנֵי עֲוֺנָם
  english_pob_choice: the years of their iniquity
  chosen_spanish: los años de su iniquidad
  alternatives_spanish:
  - los años de su culpa
  - los años de su castigo
  lexicon: HALOT
  rationale: Se mantiene ‘iniquidad’ para preservar el sentido moral del término y la correspondencia con la primera ocurrencia de עֲוֺן. ‘Años’ refleja el plural constructo del hebreo, tal como lo hace la POB inglesa.
- source_word: עֲוֺן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - castigo
  lexicon: HALOT
  rationale: ‘Iniquidad’ es la forma española más directa y estable para mantener la tensión semántica del término hebreo, que puede incluir pecado, culpa y el castigo resultante. Así no se resuelve prematuramente el alcance del vocablo.
- source_word: לְמִסְפַּר יָמִים
  english_pob_choice: according to the number of days
  chosen_spanish: según el número de los días
  alternatives_spanish:
  - conforme al número de los días
  - de acuerdo con el número de los días
  lexicon: HALOT
  rationale: ‘Según el número de los días’ reproduce con naturalidad la relación formal del hebreo y mantiene claro que los años están representados por días en el signo profético.
- source_word: שְׁלֹשׁ מֵאוֹת וְתִשְׁעִים יוֹם
  english_pob_choice: three hundred and ninety days
  chosen_spanish: trescientos noventa días
  alternatives_spanish:
  - trescientos y noventa días
  lexicon: HALOT
  rationale: Es la equivalencia numérica directa y normal en español, sin añadir explicaciones al texto principal.
- source_word: וְנָשָׂאתָ
  english_pob_choice: you shall bear
  chosen_spanish: llevarás
  alternatives_spanish:
  - soportarás
  - cargarás
  - llevarás sobre ti
  lexicon: HALOT
  rationale: El verbo נשא con עָוֹן suele significar ‘llevar/bear’ en el sentido idiomático de cargar con la culpa o iniquidad. ‘Llevarás’ conserva esa idiomática bíblica en español sin volverla demasiado abstracta.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión covenantal y colectiva del hebreo. ‘Casa de Israel’ mantiene mejor la fórmula del texto que una simplificación a ‘Israel’.
theological_decisions:
- issue: Sentido de עָוֹן en un signo profético de carga
  english_pob_reading: Rendered as 'iniquity' in both occurrences, while allowing the context of bearing to imply guilt and its burdened consequence.
  chosen_spanish_reading: ‘Iniquidad’ en ambos casos, mientras ‘llevarás’ deja implícita la carga de culpa y sus consecuencias.
  alternative_spanish_readings:
  - culpa
  - castigo
  - pena por su culpa
  rationale: El hebreo admite un campo semántico que incluye pecado, culpa y el resultado de esa culpa. Traducir ambas ocurrencias con ‘iniquidad’ preserva la coherencia léxica y no fuerza una decisión entre culpa o castigo; el contexto de ‘llevar’ mantiene la dimensión de carga o consecuencia.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente no indicó cambios y el control cruzado reportó alto acuerdo; por eso se conserva la lectura principal de la POB inglesa, con español ajustado al orden natural y a la terminología bíblica consistente.
  spanish_consistency_notes:
  - Se mantiene ‘Y yo’ para reflejar el waw enfático y la transición discursiva.
  - ‘Iniquidad’ se usa de manera consistente para עֲוֺן en ambos lugares.
  - ‘La casa de Israel’ conserva la fórmula corporativa del hebreo.
  - El texto evita ‘SEÑOR’ porque aquí no aparece el Tetragrámaton.
  - La puntuación y el número se presentan en forma natural para español bíblico moderno.
