id: 1TH.2.4
reference: 1 Thessalonians 2:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ καθὼς δεδοκιμάσμεθα ὑπὸ τοῦ θεοῦ πιστευθῆναι τὸ εὐαγγέλιον οὕτως λαλοῦμεν, οὐχ ὡς ἀνθρώποις ἀρέσκοντες ἀλλὰ ⸀θεῷ τῷ δοκιμάζοντι τὰς καρδίας ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/004.yaml
  text: But just as we have been approved by God to be entrusted with the gospel[a], so we speak—not as pleasing people, but God, who tests our hearts.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'not to please people, but to please God.' The Greek is compressed, explicitly stating 'pleasing' only in the first half of the contrast.
    reason: lexical_alternative
translation:
  language: ko
  text: 오히려 하나님께 인정받아 복음을 위탁받은 것처럼, 우리는 그렇게 말합니다. 곧 사람을 기쁘게 하려는 것이 아니라 우리의 마음을 살피시는[a] 하나님을 기쁘시게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 δοκιμάζω는 「시험하다·검증하다·인정하다」. 4절 첫머리의 동일 어휘(인정받아)와 짝을 이루며 단어 유희를 이룬다.
    reason: lexical_alternative
lexical_decisions:
- source_word: δεδοκιμάσμεθα
  english_pob_choice: have been approved
  chosen_korean: 인정받아
  alternatives_korean:
  - 검증받아
  - 합격되어
  lexicon: BDAG
  rationale: 완료 수동. δοκιμάζω는 시험·검증·인정의 의미를 함께 담는다. 「인정받다」가 사도 위임의 결과 상태를 가장 잘 담는다.
- source_word: πιστευθῆναι τὸ εὐαγγέλιον
  english_pob_choice: to be entrusted with the gospel
  chosen_korean: 복음을 위탁받은
  alternatives_korean:
  - 복음을 맡겨진
  - 복음의 청지기 직임을 받은
  lexicon: BDAG
  rationale: πιστεύω 수동의 「맡겨지다」 의미. 「위탁받다」가 사도적 청지기 직임의 무게를 담는다.
- source_word: τῷ δοκιμάζοντι τὰς καρδίας ἡμῶν
  english_pob_choice: who tests our hearts
  chosen_korean: 우리의 마음을 살피시는
  alternatives_korean:
  - 우리의 마음을 시험하시는
  - 우리의 마음을 검증하시는
  lexicon: BDAG
  rationale: δοκιμάζω의 「검토·살핌」 의미를 한국어 「살피시다」로 옮긴다. 「시험」은 본문의 평가적 의미보다 위협적 어감이 강하다.
