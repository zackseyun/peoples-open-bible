  to: para que tome los extremos de la tierra[a], y los malvados sean sacudidos de ella[b].
  rationale: Se cambia 'orillas' por 'extremos' para reflejar mejor כַנְפוֹת en un contexto cósmico y evitar una connotación de costa o ribera. También se corrige la nota cultural para que la metáfora concuerde con 'tomar/asir' en vez de 'adherirse'.
