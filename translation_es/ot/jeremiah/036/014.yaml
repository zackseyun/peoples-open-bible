translation:
  language: es
  text: 'Entonces todos los oficiales enviaron a Jehudí, hijo de Netanías, hijo de Sélamías, hijo de Cusí, a Baruc, diciendo: «Toma en tu mano el rollo del que leíste a oídos del pueblo, y ven[a]». Y Baruc, hijo de Nerías, tomó el rollo en su mano y vino a ellos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y ve». El hebreo usa un verbo de «ir», pero en español, cuando alguien es llamado hacia la ubicación de quienes hablan, «ven» suele expresar mejor la deíxis del mandato.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשָּׂרִים
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los príncipes
  - los líderes
  lexicon: HALOT
  rationale: En este contexto de corte/administración, שׂרים se refiere a funcionarios o autoridades del gobierno, no a príncipes dinásticos en sentido estricto. «Oficiales» conserva ese valor institucional en español contemporáneo.
- source_word: אֶל בָּרוּךְ אֶת יְהוּדִי
  english_pob_choice: sent Jehudi ... to Baruch
  chosen_spanish: enviaron a Jehudí ... a Baruc
  alternatives_spanish:
  - mandaron a Jehudí ... a Baruc
  - despacharon a Jehudí ... a Baruc
  lexicon: HALOT
  rationale: La construcción hebrea identifica a Jehudí como la persona enviada y a Baruc como el destino. En español, «enviar a alguien a» refleja con naturalidad esa relación.
- source_word: יְהוּדִי
  english_pob_choice: Jehudi
  chosen_spanish: Jehudí
  alternatives_spanish:
  - Judí
  lexicon: HALOT
  rationale: Aquí funciona como nombre propio, confirmado por la cadena patronímica; por eso se translitera. Se adapta a la ortografía española con acento final para la pronunciación natural.
- source_word: הַמְּגִלָּה
  english_pob_choice: the scroll
  chosen_spanish: el rollo
  alternatives_spanish:
  - el pergamino
  - el documento
  lexicon: HALOT
  rationale: מגילה designa un escrito enrollado; «rollo» es la equivalencia más directa y fiel. «Pergamino» añadiría un soporte que el término no exige, y «documento» sería demasiado general.
- source_word: קָרָאתָ בָּהּ
  english_pob_choice: you read from which
  chosen_spanish: del que leíste
  alternatives_spanish:
  - en el que leíste
  - del cual leíste
  lexicon: HALOT
  rationale: El verbo קרא con ב expresa lectura en voz alta desde un texto. En español, «leíste del que» o «del que leíste» reproduce bien la relación fuente-lectura sin sonar rígido.
- source_word: בְּאָזְנֵי הָעָם
  english_pob_choice: in the hearing of the people
  chosen_spanish: en oídos del pueblo
  alternatives_spanish:
  - ante el pueblo
  - para el pueblo
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente auditiva. «En oídos del pueblo» mantiene esa concreción y respeta la formulación del original mejor que una paráfrasis más plana.
- source_word: קָחֶנָּה בְיָדְךָ
  english_pob_choice: Take in your hand
  chosen_spanish: Toma en tu mano
  alternatives_spanish:
  - Tómalo en tu mano
  - Llévalo en tu mano
  lexicon: HALOT
  rationale: La terminación pronominal femenina remite al rollo. En español, el imperativo con objeto tácito es natural porque el referente ya fue mencionado inmediatamente antes.
- source_word: וָלֵךְ
  english_pob_choice: and come
  chosen_spanish: y ven
  alternatives_spanish:
  - y ve
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «ve», el contexto es de invitación hacia la ubicación de quienes hablan; por eso, como en la auditoría inglesa, «ven» expresa mejor la deixis del llamamiento.
- source_word: בְּיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - con él
  - en la mano
  lexicon: HALOT
  rationale: Se conserva la repetición de la mano para reflejar el mandato anterior y la obediencia de Baruc al portar personalmente el rollo.
- source_word: וַיָּבֹא אֲלֵיהֶם
  english_pob_choice: and came to them
  chosen_spanish: y vino a ellos
  alternatives_spanish:
  - y fue hacia ellos
  - y llegó adonde ellos estaban
  lexicon: HALOT
  rationale: «Vino a ellos» mantiene la perspectiva narrativa del llamado y es una forma bíblica natural en español, sin forzar el verbo a un giro perifrástico.
theological_decisions:
- issue: Representación de יהוה / YHWH en este versículo
  english_pob_reading: No appears in the verse; the verse uses narrative references only.
  chosen_spanish_reading: No aparece en este versículo; la frase contiene solo referencias narrativas.
  alternative_spanish_readings:
  - Incluir una nota sobre Yahvé aunque no figure aquí
  - No mencionar nada
  rationale: No hay decisión teológica específica sobre el nombre divino en este versículo porque el hebreo no lo incluye. Se evita introducir una nota innecesaria.
  doctrine_reference: No aplicable
translation_notes:
  revision_awareness: La auditoría inglesa no muestra revisiones aplicadas y el último pase quedó sin cambios; por eso la versión española sigue de cerca la solución auditada, manteniendo las mismas decisiones clave de equivalencia óptima.
  spanish_consistency_notes:
  - «Oficiales» se usa en sentido administrativo/cortesano, coherente con el contexto de la escena.
  - Se mantiene «rollo» para מגילה a fin de conservar la imagen material del texto.
  - «En oídos del pueblo» conserva la fuerza auditiva del hebreo y la misma solución funcional de la auditoría inglesa.
  - «Vino a ellos» sigue la perspectiva narrativa del movimiento hacia los oficiales, igual que la solución inglesa.
