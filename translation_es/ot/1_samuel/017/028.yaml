translation:
  language: es
  text: 'Al oír Eliab, su hermano mayor, que David hablaba con los hombres[a], se encendió la ira de Eliab contra David, y le dijo: «¿Por qué bajaste aquí? ¿Y con quién dejaste esas pocas ovejas en el desierto? Yo conozco tu presunción[b] y la maldad de tu corazón[c], porque bajaste para ver la batalla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras hablaba» / «cuando hablaba»; el hebreo expresa una circunstancia temporal al oírlo hablar.'
    reason: alternative_reading
  - marker: b
    text: 'O: «tu orgullo» / «tu insolencia».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «la perversidad de tu corazón».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/דַבְּר֖/וֹ
  english_pob_choice: him speaking
  chosen_spanish: que David hablaba
  alternatives_spanish:
  - mientras hablaba
  - cuando hablaba
  lexicon: HALOT
  rationale: El infinitivo con ב expresa circunstancia temporal; en español, «que David hablaba» mantiene la acción en curso sin volverla rígida ni añadir una interpretación excesiva.
- source_word: הָ/אֲנָשִׁ֑ים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los soldados
  - la gente
  lexicon: HALOT
  rationale: El hebreo dice simplemente «los hombres»; no especifica soldados. Mantener «los hombres» preserva la sobriedad del referente.
- source_word: וַ/יִּֽחַר אַף
  english_pob_choice: anger burned
  chosen_spanish: se encendió la ira
  alternatives_spanish:
  - su ira ardió
  - se enfureció
  lexicon: HALOT
  rationale: La imagen hebrea es de ira que arde. «Se encendió la ira» conserva esa fuerza idiomática en español natural.
- source_word: לָ/מָּה זֶּה יָרַ֗דְתָּ
  english_pob_choice: Why have you come down here?
  chosen_spanish: ¿Para qué bajaste aquí?
  alternatives_spanish:
  - ¿Por qué bajaste aquí?
  - ¿Por qué has bajado aquí?
  lexicon: HALOT
  rationale: ירד se traduce naturalmente como «bajar»; el deíctico זֶּה queda bien reflejado con «aquí». «¿Para qué…?» puede comunicar el tono despectivo de la reprensión sin salir del sentido base.
- source_word: וְ/עַל מִ֨י נָטַ֜שְׁתָּ
  english_pob_choice: with whom have you left
  chosen_spanish: ¿Y con quién dejaste
  alternatives_spanish:
  - ¿Y sobre quién abandonaste
  - ¿Y a quién confiaste
  lexicon: HALOT
  rationale: En el contexto, נטשׁ apunta a dejar a cargo o abandonar. «Con quién dejaste» reproduce la acusación práctica sin forzar el verbo hacia una formulación más técnica.
- source_word: מְעַ֨ט הַ/צֹּ֤אן
  english_pob_choice: those few sheep
  chosen_spanish: esas pocas ovejas
  alternatives_spanish:
  - ese pequeño rebaño
  - aquellas pocas ovejas
  lexicon: HALOT
  rationale: «Pocas ovejas» conserva מְעַט y el sustantivo en plural. «Esas» refleja el matiz despectivo del hablante y el valor demostrativo.
- source_word: בַּ/מִּדְבָּ֔ר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto/pastizal
  - en la estepa
  lexicon: HALOT
  rationale: Aunque מִדְבָּר puede abarcar terreno despoblado o de pastoreo, «desierto» es claro y digno en español bíblico; aquí no se pretende una imagen de arena, sino de soledad y apartamiento.
- source_word: זְדֹנְ/ךָ֗
  english_pob_choice: your presumption
  chosen_spanish: tu presunción
  alternatives_spanish:
  - tu arrogancia
  - tu insolencia
  lexicon: HALOT
  rationale: «Presunción» reproduce bien el juicio de sobreconfianza culpable. Conserva el peso moral sin convertirlo en un insulto más fuerte de lo que el texto exige.
- source_word: רֹ֣עַ לְבָבֶ֔/ךָ
  english_pob_choice: the evil of your heart
  chosen_spanish: la maldad de tu corazón
  alternatives_spanish:
  - la malicia de tu corazón
  - la perversidad de tu corazón
  lexicon: HALOT
  rationale: El sustantivo רֹעַ comunica maldad/malos propósitos. «La maldad de tu corazón» es natural en español y conserva la atribución del mal al interior de la persona.
- source_word: לְמַ֛עַן רְא֥וֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - a fin de ver
  - con el propósito de ver
  lexicon: HALOT
  rationale: La construcción expresa propósito; «para ver» es la forma más directa y transparente en español.
- source_word: הַ/מִּלְחָמָ֖ה
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  lexicon: HALOT
  rationale: En esta escena concreta, el singular se refiere al enfrentamiento presente; «batalla» es más preciso que «guerra».
translation_notes:
  revision_awareness: Se siguió de cerca el packet hebreo WLC y el audit trail inglés; no hubo revisiones aplicadas en el control más reciente, y la equivalencia alta confirma que no se requiere ajuste textual adicional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «siervo» o lenguaje eclesiástico no presente en el hebreo; el verso conserva el tono de reprensión familiar y militar.
  - «Desierto» se eligió por claridad bíblica en español; no implica necesariamente arena, sino terreno apartado y despoblado.
  - 'Se conservaron los dos juegos de acusación con paralelo semántico: conducta externa («bajaste», «dejaste») e intención interna («presunción», «maldad de tu corazón»).'
