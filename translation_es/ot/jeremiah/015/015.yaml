base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/015/015.yaml
  text: You know[a], O Yahweh; remember me and attend to me, and take vengeance for me on my persecutors. In your patience do not take me away[d][c][b]; know that for your sake I bear reproach.
  footnotes:
