id: 1TI.1.11
reference: 1 Timothy 1:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: κατὰ τὸ εὐαγγέλιον τῆς δόξης τοῦ μακαρίου θεοῦ, ὃ ἐπιστεύθην ἐγώ.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/011.yaml
  text: according to the gospel of the glory of the blessed God[a], which was entrusted to me.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'the glorious gospel of the blessed God.'
    reason: alternative_reading
translation:
  language: ko
  text: 이는 복되신 하나님의 영광의 복음[a]을 따른 것이며, 그 복음이 내게 맡겨졌습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 보다 매끄럽게 「복되신 하나님의 영광스러운 복음」.
    reason: alternative_reading
lexical_decisions:
- source_word: κατὰ τὸ εὐαγγέλιον
  english_pob_choice: according to the gospel
  chosen_korean: 복음을 따른 것이며
  alternatives_korean:
  - 복음에 따른
  - 복음대로
  lexicon: BDAG
  rationale: κατά + 대격으로 8-10절의 가르침이 복음의 규범에 부합함을 표현한다.
- source_word: τῆς δόξης τοῦ μακαρίου θεοῦ
  english_pob_choice: of the glory of the blessed God
  chosen_korean: 복되신 하나님의 영광의 복음
  alternatives_korean:
  - 복되신 하나님의 영광스러운 복음
  - 복된 하나님의 영광에 관한 복음
  lexicon: BDAG
  rationale: 속격의 연쇄(복음-영광-하나님)를 한국어 구문 흐름으로 보존한다. 「복되신」은 μακάριος의 신적 충만의 어감을 살린다.
- source_word: μακαρίου
  english_pob_choice: blessed
  chosen_korean: 복되신
  alternatives_korean:
  - 복된
  - 행복하신
  lexicon: BDAG
  rationale: 신성에 적용된 μακάριος는 자족적 충만의 어감. 「복되신」이 한국 신학 어휘에서 정립되어 있다.
- source_word: ὃ ἐπιστεύθην ἐγώ
  english_pob_choice: which was entrusted to me
  chosen_korean: 그 복음이 내게 맡겨졌습니다
  alternatives_korean:
  - 내가 그 일을 맡았습니다
  - 그것이 나에게 위임되었습니다
  lexicon: BDAG
  rationale: 헬라어 「~이 ~받았다」의 수동 구문을 한국어 자연 어순(주어 사물 + 「맡겨졌다」)으로 옮긴다.
