translation:
  language: es
  text: Pero mirad cuán intrincado es el afecto por los hijos[a], que arrastra todo hacia la compasión de las entrañas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «amor maternal», ya que el contexto inmediato presenta a la madre de los siete hermanos; sin embargo, el término griego es más amplio: afecto por los propios hijos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεωρεῖτε
  english_pob_choice: see
  chosen_spanish: mirad
  alternatives_spanish:
  - considerad
  - observad
  - ved
  lexicon: LSJ
  rationale: El imperativo plural llama a prestar atención al ejemplo. «Mirad» conserva ese tono exhortativo de manera natural en español moderno y mantiene la inmediatez del original.
- source_word: πολυπλόκος
  english_pob_choice: intricate
  chosen_spanish: intrincado
  alternatives_spanish:
  - complejo
  - enrevesado
  - multiforme
  lexicon: LSJ
  rationale: El adjetivo expresa algo entrelazado o de muchos pliegues. «Intrincado» reproduce bien la imagen sin sonar técnico ni alterar el sentido.
- source_word: φιλοτεκνίας
  english_pob_choice: affection of love for children
  chosen_spanish: afecto del amor por los hijos
  alternatives_spanish:
  - amor por los hijos
  - afecto maternal
  - amor paternal por los hijos
  lexicon: LSJ
  rationale: La palabra designa el afecto por los propios hijos; el contexto inmediato es materno, pero el término griego es más amplio. «Afecto del amor por los hijos» conserva esa amplitud y refleja la formulación auditada en inglés sin estrecharla solo a lo materno.
- source_word: στοργή
  english_pob_choice: affection
  chosen_spanish: afecto
  alternatives_spanish:
  - ternura
  - cariño
  - amor natural
  lexicon: LSJ
  rationale: στοργή apunta al afecto familiar o natural. «Afecto» es el equivalente base más claro en español, y el complemento «por los hijos» aporta la especificación relacional.
- source_word: ἕλκουσα
  english_pob_choice: drawing
  chosen_spanish: que arrastra
  alternatives_spanish:
  - que atrae
  - que tira de
  - que lleva
  lexicon: LSJ
  rationale: El participio expresa una fuerza que tira de todo hacia sí. «Arrastra» conserva la imagen de impulso fuerte mejor que una opción demasiado suave como «atrae».
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo cuanto existe
  - todas las cosas
  - todo lo demás
  lexicon: LSJ
  rationale: El neutro plural es comprehensivo. «Todo» transmite la amplitud total en un español más natural que una perífrasis pesada.
- source_word: σπλάγχνων
  english_pob_choice: inward parts
  chosen_spanish: entrañas
  alternatives_spanish:
  - interior
  - visceras
  - partes internas
  lexicon: LSJ
  rationale: Aunque literalmente alude a las partes internas, en español bíblico y literario «entrañas» puede conservar la fuerza idiomática del afecto profundo sin perder el trasfondo corporal del término.
- source_word: συμπάθειαν
  english_pob_choice: sympathy
  chosen_spanish: simpatía
  alternatives_spanish:
  - compasión
  - fellow-feeling
  - sentimiento compartido
  lexicon: LSJ
  rationale: El sustantivo indica sentir con otro o participar de su sentir. «Simpatía» es la equivalencia directa más transparente en español; en esta construcción mantiene la relación con «entrañas» y el matiz de participación afectiva.
theological_decisions:
- issue: Alcance de φιλοτεκνία en el contexto de la madre mártir
  english_pob_reading: Render generically as 'a parent's affection for children' rather than specifically 'maternal love.'
  chosen_spanish_reading: Traducir de manera general como «el afecto del amor por los hijos» y no restringirlo a «amor maternal».
  alternative_spanish_readings:
  - amor maternal
  - amor de madre
  rationale: Aunque la escena inmediata gira en torno a una madre, el término griego no se limita a lo materno. La versión española preserva esa amplitud y evita cerrar el sentido más de lo que permite el léxico de base.
  doctrine_reference: Principios de traducción POB §1, §5
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail, que prefirió una formulación más literal de σπλάγχνων y mantuvo un tono formal. Por eso se conservó «simpatía de las entrañas» en lugar de suavizarlo a una paráfrasis emocional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto cuando corresponda; aquí no aplica.
  - Se evitó «Cristo»/«Mesías» por no aparecer en el versículo.
  - «Simpatía de las entrañas» conserva la tensión entre el idioma idiomático y el trasfondo corporal del griego.
  - Se usó un registro digno y bíblico, pero con sintaxis natural para lectores hispanohablantes.
