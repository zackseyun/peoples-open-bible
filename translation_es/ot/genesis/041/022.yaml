  spanish_quality_summary: 'El texto es generalmente claro y digno, pero puede mejorarse para sonar más idiomático en español bíblico actual. «Y he aquí» funciona, aunque es algo rígido; no exige cambio. Los ajustes principales son de naturalidad léxica: «siete espigas» basta sin «de grano», y «en un solo tallo» comunica mejor la imagen que «en una sola caña».'
  glossary_alignment: 'No hay términos del glosario maestro especialmente activados en este versículo. Las decisiones principales concuerdan con la pauta del proyecto: fidelidad léxica, español natural, y preservación de alternativas en nota. La nota sobre «cabezas de grano» debe mantenerse anclada en «espigas».'
