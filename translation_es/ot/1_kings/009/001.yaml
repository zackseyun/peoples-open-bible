translation:
  language: es
  text: Y sucedió[a], cuando Salomón terminó de edificar la casa de Yahvé y la casa del rey, y todo lo que Salomón deseaba hacer,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el deseo de Salomón» o «cada proyecto que Salomón deseaba hacer».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa introduce un nuevo episodio. «Y sucedió» conserva el valor discursivo de la construcción hebrea sin sonar arcaica en español.
- source_word: כְּכַלּוֹת
  english_pob_choice: when ... had finished
  chosen_spanish: cuando ... terminó de
  alternatives_spanish:
  - al ... terminar
  - después de que ... terminó de
  lexicon: HALOT
  rationale: La construcción temporal se expresa de manera natural en español con «cuando terminó de», manteniendo la secuencia temporal del original.
- source_word: לִבְנוֹת
  english_pob_choice: building
  chosen_spanish: edificar
  alternatives_spanish:
  - construir
  - levantar
  lexicon: HALOT
  rationale: En este contexto de obra real y del santuario, «edificar» conserva la referencia concreta a la construcción sin perder dignidad estilística.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahweh
  - el templo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea de «casa» y el nombre divino «Yahvé» conforme al criterio doctrinal del proyecto.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s house
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - el palacio real
  - la casa real
  lexicon: HALOT
  rationale: «La casa del rey» conserva el paralelismo formal con «la casa de Yahvé» y reproduce la transparencia literal del hebreo.
- source_word: כָּל חֵשֶׁק שְׁלֹמֹה
  english_pob_choice: all that Solomon desired
  chosen_spanish: todo lo que Salomón deseaba
  alternatives_spanish:
  - todo el deseo de Salomón
  - cada proyecto que Salomón deseaba
  lexicon: HALOT
  rationale: חֵשֶׁק puede referirse a deseo, placer o aquello que se desea. En esta construcción, «todo lo que ... deseaba» evita forzar una abstracción y mantiene abierta la amplitud semántica.
- source_word: חָפֵץ
  english_pob_choice: desired
  chosen_spanish: deseaba
  alternatives_spanish:
  - se complacía en
  - quería
  lexicon: HALOT
  rationale: El verbo refuerza la idea de deseo o inclinación; «deseaba» armoniza bien con חֵשֶׁק y con el flujo de la frase española.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to make
  chosen_spanish: hacer
  alternatives_spanish:
  - construir
  - realizar
  lexicon: HALOT
  rationale: עשה es amplio; «hacer» preserva esa amplitud sin precisar indebidamente si eran obras de construcción o proyectos en general.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se sigue el criterio del proyecto de verterlo como «Yahvé», manteniendo transparencia textual y evitando la convención de sustitución por mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: No se aplicaron revisiones previas en este versículo; la presente redacción sigue de cerca el hebreo y el criterio auditado del inglés POB, con ajuste natural al español.
  spanish_consistency_notes:
  - Se conserva la metáfora «casa» para evitar sustituirla por «templo» o «palacio», ya que el hebreo repite intencionalmente la misma estructura.
  - «Yahvé» se usa de forma consistente para el Tetragrámaton, conforme al estándar del proyecto.
  - «Deseaba» y «hacer» mantienen la amplitud semántica de חֵשֶׁק / חָפֵץ / עשה sin sobreinterpretar el alcance de las obras.
