- from: Por tanto[a], puesto que también queremos que esta nación esté libre de perturbación, decidimos que el templo sea restaurado para ellos y que vivan conforme a las costumbres de sus antepasados.
  to: Por tanto[a], puesto que también preferimos que esta nación esté libre de perturbación, decidimos que el templo les sea restaurado y que vivan conforme a las costumbres de sus antepasados.
  rationale: Se ajusta αἱρούμενοι a 'preferimos' para reflejar mejor la elección de política; se corrige 'para ellos' a 'les sea restaurado' por fidelidad y naturalidad; y se mejora la nota para preservar tanto el matiz de vida común de πολιτεύεσθαι como la posible nuance temporal de κατὰ τὰ ἐπὶ τῶν προγόνων αὐτῶν ἔθη.
