review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis y el paralelismo del hebreo: futuro profético (''será''), las dos virtudes como predicado nominal, y la imaginería concreta de ''cinturón'' con distinción entre ''cintura'' y ''lomos''. Sin embargo, las notas al pie están mal asignadas respecto al texto auditado en inglés: la nota [a] en el inglés corresponde a la alternativa de צֶדֶק (''justicia''), mientras que [b] corresponde a la alternativa de אֱמוּנָה (''fidelidad''). En el borrador español, [a] aparece sobre ''justicia'' pero ofrece ''rectitud'' correctamente; [b] aparece sobre ''fidelidad'' pero dice ''O fidelidad'', que repite la lectura principal en vez de dar una alternativa real. Requiere corrección menor.'
  spanish_quality_summary: El español es natural, claro y digno. 'La justicia será el cinturón de su cintura, y la fidelidad el cinturón de sus lomos' suena bien y conserva la poesía sin arcaísmo excesivo. 'Cinturón' y 'cintura' son modernos; 'lomos' mantiene el matiz poético del segundo miembro. La única deficiencia real está en la precisión y utilidad de las notas.
  glossary_alignment: 'Buena alineación con las decisiones del proyecto: צֶדֶק como ''justicia'' con alternativa ''rectitud''; אֱמוּנָה como ''fidelidad''; no hay conflicto con terminología teológica global. La imagen corporal y el doble ''cinturón'' preservan bien la racionalidad léxica documentada.'
  issues:
  - severity: medium
    issue: La nota [b] repite la lectura principal en vez de ofrecer una alternativa léxica real para אֱמוּנָה.
    rationale: El inglés auditado documenta como alternativa 'fidelity' frente a la principal 'faithfulness'. En español, si la principal es 'fidelidad', la nota debe ofrecer otra opción válida como 'constancia' o 'lealtad', no repetir 'fidelidad'.
  - severity: low
    issue: La distribución de notas no refleja claramente la lógica del audit trail inglés.
    rationale: Aunque cada nota está anclada en la palabra correcta del español, conviene que el contenido de cada nota corresponda a una alternativa útil y coherente con las decisiones léxicas documentadas.
  revised_spanish_text: La justicia[a] será el cinturón de su cintura, y la fidelidad[b] el cinturón de sus lomos.
  revised_footnotes:
  - marker: a
    text: O 'rectitud' para צֶדֶק.
    reason: lexical_alternative
  - marker: b
    text: O 'constancia' para אֱמוּנָה.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, claro y estilísticamente adecuado. Solo se corrige la nota [b] para que aporte una alternativa léxica real y útil para אֱמוּנָה, en vez de repetir la lectura principal.
