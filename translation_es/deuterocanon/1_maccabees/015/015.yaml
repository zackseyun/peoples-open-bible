translation:
  language: es
  text: 'Y Numenio y los que estaban con él regresaron de Roma[a], trayendo cartas para los reyes y las regiones, en las cuales estaba escrito lo siguiente:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «vinieron de Roma»; el contexto indica que regresaban de una embajada allí, por eso se traduce de forma más explícita como «regresaron de Roma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: came back
  chosen_spanish: vinieron de Roma
  alternatives_spanish:
  - volvieron de Roma
  - regresaron de Roma
  - vinieron
  lexicon: LSJ
  rationale: El griego básico es “vino/llegó”, pero el contexto de 1 Maccabees 15:14-15 muestra que Numenio regresa de una embajada en Roma. “Vinieron de Roma” conserva el movimiento de llegada desde ese lugar sin añadir más de lo que el contexto permite.
- source_word: οἱ παρʼ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - sus compañeros
  - los que iban con él
  - los suyos
  lexicon: LSJ
  rationale: La expresión idiomática señala a los acompañantes de Numenio. “Los que estaban con él” es natural en español y sigue de cerca la relación de compañía, sin especificar más que el texto griego.
- source_word: ἐκ Ῥώμης
  english_pob_choice: from Rome
  chosen_spanish: de Roma
  alternatives_spanish:
  - desde Roma
  - procedentes de Roma
  lexicon: LSJ
  rationale: La preposición con lugar de origen se vierte de manera directa por “de Roma”. Es la opción más clara y fiel en español.
- source_word: ἔχοντες ἐπιστολάς
  english_pob_choice: bringing letters
  chosen_spanish: trayendo cartas
  alternatives_spanish:
  - llevando cartas
  - con cartas
  - portando cartas
  lexicon: LSJ
  rationale: 'El participio expresa una circunstancia concomitante: llegan con cartas en mano. “Trayendo cartas” es idiomático y conserva el valor de acompañamiento sin volverlo técnico o demasiado literal.'
- source_word: τοῖς βασιλεῦσι καὶ ταῖς χώραις
  english_pob_choice: to the kings and the countries
  chosen_spanish: para los reyes y las provincias
  alternatives_spanish:
  - a los reyes y a las tierras
  - para los reyes y los países
  - a los reyes y a las regiones
  lexicon: LSJ
  rationale: El dativo indica destinatarios de las cartas. “Provincias” transmite bien χώρα en un contexto político-administrativo y suena más natural en español que “países” o “tierras” si se entiende una correspondencia oficial dirigida a territorios gobernados.
- source_word: ἐν αἷς ἐγέγραπτο τάδε
  english_pob_choice: in which these things had been written
  chosen_spanish: en las cuales estaba escrito lo siguiente
  alternatives_spanish:
  - en las que habían sido escritas estas cosas
  - en las cuales se había escrito esto
  - donde estaban escritas estas cosas
  lexicon: LSJ
  rationale: La frase introduce el contenido de las cartas. “Estaba escrito lo siguiente” preserva el carácter introductorio de τάδε y evita una construcción demasiado pesada en español, manteniendo la referencia al texto que sigue.
translation_notes:
  revision_awareness: El texto fuente griego y el audit trail inglés coinciden en lo esencial; la única tensión relevante es que ἦλθεν es literalmente “vino/llegó”, mientras que el inglés POB aclara “came back” por el contexto de la misión en Roma. La versión española conserva esa aclaración con una formulación natural (“vinieron de Roma”) sin perder la lectura de regreso implícita.
  spanish_consistency_notes:
  - Se mantiene “Y” al inicio para reflejar la coordinación narrativa del griego.
  - Se usa “Numenio” como forma hispana estándar del nombre.
  - “Cartas” se prefiere a “epístolas” porque el griego y el contexto administrativo no requieren un término eclesiástico.
  - “Provincias” se adopta para χώρα en este contexto político, sin forzar una equivalencia absoluta con el sentido moderno de “países”.
