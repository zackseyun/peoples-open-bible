revisions:
- from: Se han engordado[a]; están lustrosos. También han pasado de las obras malas. No juzgan con justicia la causa del huérfano, para que prosperen[b][c], y no defienden el derecho de los pobres.
  to: Han engordado[a]; están lustrosos. También han sobrepasado las obras malas. No juzgan con justicia la causa del huérfano[c], de modo que prosperan[b], y no defienden el derecho de los pobres.
  rationale: 'Se hicieron ajustes menores pero importantes para mejorar fidelidad y naturalidad: ''Han engordado'' en vez de ''Se han engordado''; ''han sobrepasado'' en vez de ''han pasado de'' para reflejar el cruce de límites en el hebreo; y ''de modo que prosperan'' para no imponer un matiz de propósito demasiado estrecho en una cláusula reconocidamente difícil. También se corrigió la formulación de la nota sobre ''huérfano/sin padre''.'
  reviewer_model: gpt-5.4
