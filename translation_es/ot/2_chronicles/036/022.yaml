base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/036/022.yaml
  text: 'Now in the first year of Cyrus king of Persia[a], so that the word of Yahweh by the mouth of Jeremiah might be fulfilled, Yahweh stirred up the spirit of Cyrus king of Persia, and he made a proclamation throughout all his kingdom, and also in writing, saying:'
  footnotes:
  - marker: a
    text: Or 'through Jeremiah'; Hebrew literally, 'by the mouth of Jeremiah.'
    reason: lexical_alternative
  ai_draft:
