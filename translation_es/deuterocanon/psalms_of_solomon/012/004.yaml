translation:
  language: es
  text: Que Dios arroje las casas[a] de los inicuos al tumulto en la guerra por labios susurrantes[b]; que Dios aparte de los inocentes los labios de los inicuos en angustia[c], y sean esparcidos los huesos de los susurradores, de entre los que temen al Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Casas» también puede implicar hogares o establecimientos familiares, no solo edificios físicos.
    reason: lexical_alternative
  - marker: b
    text: O «por labios calumniosos» / «los huesos de calumniadores». El grupo griego ψιθυρ- puede denotar habla secreta y maliciosa, no solo hablar en voz baja.
    reason: lexical_alternative
  - marker: c
    text: O «aparte de los inocentes los labios de los hombres inicuos en angustia».
    reason: alternative_reading
lexical_decisions:
- source_word: συνταράξαι
  english_pob_choice: throw ... into turmoil
  chosen_spanish: arroje ... al tumulto
  alternatives_spanish:
  - lance ... al trastorno
  - sacuda violentamente
  lexicon: LSJ
  rationale: El optativo expresa un deseo imprecatorio; «arroje ... al tumulto» mantiene la idea de desorden/jucio sin sonar forzado en español.
- source_word: οἴκους
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  - familias
  lexicon: LSJ
  rationale: «Casas» conserva la imagen concreta del texto griego. Puede implicar también hogares o establecimientos, como en el audit trail inglés.
- source_word: παρανόμους / παρανόμων
  english_pob_choice: lawless
  chosen_spanish: inicuos
  alternatives_spanish:
  - malvados
  - sin ley
  lexicon: LSJ
  rationale: «Inicuos» comunica la oposición moral y legal sin introducir una paráfrasis demasiado amplia. «Sin ley» sería más literal, pero menos natural en español bíblico.
- source_word: χείλεσι ψιθυροῖς
  english_pob_choice: by whispering lips
  chosen_spanish: por labios susurrantes
  alternatives_spanish:
  - por labios murmuradores
  - por labios de murmuración
  lexicon: LSJ
  rationale: Se conserva la imaginería de labios que hablan en secreto. «Susurrantes» reproduce el vínculo léxico con ψιθυροῦν- y evita reducir de entrada a «calumniosos», aunque esa connotación sigue posible.
- source_word: μακρύναι
  english_pob_choice: remove
  chosen_spanish: aparte
  alternatives_spanish:
  - aleje
  - ponga lejos
  lexicon: LSJ
  rationale: El verbo expresa apartar o poner lejos; «aparte» funciona bien en una súplica y mantiene la dirección espacial del griego.
- source_word: ἀκάκων
  english_pob_choice: the innocent
  chosen_spanish: los inocentes
  alternatives_spanish:
  - los íntegros
  - los mansos
  lexicon: LSJ
  rationale: «Los inocentes» es la opción más natural y clara en español para ἀκάκων, sin cargar el verso con matices ajenos.
- source_word: ἐν ἀπορίᾳ
  english_pob_choice: in distress
  chosen_spanish: en angustia
  alternatives_spanish:
  - en perplejidad
  - en desamparo
  - en aprieto
  lexicon: LSJ
  rationale: El contexto apunta a una situación de aflicción o estrechez; «angustia» es idiomática y suficientemente amplia.
- source_word: ψιθύρων
  english_pob_choice: whisperers
  chosen_spanish: susurradores
  alternatives_spanish:
  - murmuradores
  - calumniadores
  lexicon: LSJ
  rationale: Se mantiene la familia léxica de susurrar para conservar la relación con «labios susurrantes». «Calumniadores» queda como posible matiz, no como traducción principal.
- source_word: φοβουμένων Κύριον
  english_pob_choice: those who fear the Lord
  chosen_spanish: los que temen al Señor
  alternatives_spanish:
  - los que reverencian al Señor
  lexicon: LSJ
  rationale: Se conserva la expresión bíblica estable para temor reverente. «Señor» sigue el patrón del audit trail inglés para κύριος en esta cláusula.
theological_decisions:
- issue: κύριος al final de la cláusula
  english_pob_reading: those who fear the Lord
  chosen_spanish_reading: los que temen al Señor
  alternative_spanish_readings:
  - los que temen a Yahvé
  - los que reverencian al Señor
  rationale: Aunque el proyecto suele usar «Yahvé» para el nombre divino, aquí el texto griego trae κύριον sin marca explícita del nombre. Siguiendo el audit trail inglés y la fórmula bíblica estable, se mantiene «Señor» en esta expresión fija.
  doctrine_reference: Convención editorial del POB sobre κύριος y el nombre divino
- issue: Ambigüedad de χείλεσι ψιθυροῖς / ψιθύρων
  english_pob_reading: whispering lips / whisperers
  chosen_spanish_reading: labios susurrantes / susurradores
  alternative_spanish_readings:
  - labios calumniosos / calumniadores
  - labios murmuradores / murmuradores
  rationale: El griego permite tanto la idea de susurro como la de habla secreta maliciosa. El español conserva el término más cercano al campo léxico para no borrar esa tensión, dejando abierta la connotación de calumnia sin imponerla en el cuerpo principal.
  doctrine_reference: Principio de no borrar tensiones léxicas documentadas
translation_notes:
  revision_awareness: 'La versión inglesa revisada ajustó el orden de la segunda cláusula para que «in distress» se entendiera naturalmente con «the innocent» y no con «lawless men». La redacción española sigue esa resolución: «aparte de los inocentes los labios de los inicuos en angustia». También se preserva la estructura imprecatoria del original y la relación léxica entre «susurrantes» y «susurradores».'
  spanish_consistency_notes:
  - Se evita «SEÑOR» en el texto principal, pero se conserva «Señor» en la fórmula estable «los que temen al Señor» por tratarse de κύριος sin nombre divino explícito en esta cláusula.
  - «Inicuos» se usa para παρανόμος con el fin de mantener el matiz legal-moral sin recurrir mecánicamente a «sin ley».
  - Se conserva la duplicación léxica de la familia ψιθυρ- para que el lector perciba la correspondencia entre «labios susurrantes» y «susurradores».
  - «Casas» se mantiene en el cuerpo principal por fidelidad concreta, mientras la nota abre la posibilidad de hogares/establecimientos.
