revisions:
- from: Así que enseguida envió a las ciudades[a] junto al mar, invitándolas a comprar cuerpos judíos, prometiendo entregar noventa cuerpos por un talento[b]; pero no esperaba el castigo del Todopoderoso que estaba por venir sobre él.
  to: Así que enseguida envió mensaje a las ciudades junto al mar,[a] invitándolas a comprar cuerpos judíos, prometiendo entregar noventa cuerpos por un talento;[b] pero no esperaba el castigo del Todopoderoso que estaba por alcanzarlo.
  rationale: Se corrige un problema sintáctico y semántico en «envió a las ciudades» añadiendo «mensaje», que expresa con claridad la acción implícita de ἀπέστειλεν en este contexto. También se sustituye «que estaba por venir sobre él» por «que estaba por alcanzarlo», una formulación más natural en español y plenamente compatible con la nota alternativa ya documentada. Se conserva «cuerpos judíos» para mantener la deshumanización deliberada del original.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:43:11Z'
