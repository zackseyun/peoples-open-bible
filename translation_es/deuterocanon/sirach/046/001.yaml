translation:
  language: es
  text: Josué, hijo de Nun, fue un valiente guerrero, asistente de Moisés en la profecía[a]; fue designado en sus días para ser una gran salvación[b] para sus escogidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «sucesor de Moisés en profecías», lo que hace más explícita la relación de Josué con Moisés como una de sucesión que lo que hace la redacción hebrea conservada.'
    reason: alternative_reading
  - marker: b
    text: «Una gran salvación» también puede traducirse «una gran liberación» o «una gran victoria»; el hebreo תשועה y el griego σωτηρία pueden tener tanto sentido militar como uno más amplio de salvación.
    reason: lexical_alternative
lexical_decisions:
- source_word: גבור בן חיל / κραταιὸς ἐν πολέμῳ
  english_pob_choice: a mighty warrior
  chosen_spanish: un valiente guerrero
  alternatives_spanish:
  - un héroe, hijo de valor
  - poderoso en la guerra
  - fuerte en combate
  lexicon: HALOT
  rationale: El hebreo combina la idea de hombre poderoso con la de hombre de valor, y el griego refuerza el sentido bélico con κραταιὸς ἐν πολέμῳ. «Valiente guerrero» transmite con naturalidad la fuerza militar sin sonar arcaico.
- source_word: משרת משה
  english_pob_choice: Moses’ attendant
  chosen_spanish: siervo de Moisés
  alternatives_spanish:
  - asistente de Moisés
  - servidor de Moisés
  - ministro de Moisés
  lexicon: HALOT
  rationale: Aunque «attendant» puede sonar más neutral en inglés, en español «siervo» conserva la relación de servicio personal y oficial sin introducir asociaciones eclesiásticas de «ministro». La forma es breve y comprensible en contexto bíblico.
- source_word: בנבואה / ἐν προφητείαις
  english_pob_choice: in prophecy
  chosen_spanish: en la profecía
  alternatives_spanish:
  - para la profecía
  - en oficio profético
  - como sucesor profético
  lexicon: HALOT
  rationale: La frase hebrea es concisa y el paralelo griego sugiere relación con la esfera profética. «En la profecía» preserva esa compacidad sin decidir de más entre oficio, ámbito o sucesión.
- source_word: נוצר / ἐγένετο
  english_pob_choice: was appointed
  chosen_spanish: fue designado
  alternatives_spanish:
  - fue formado
  - fue creado
  - fue puesto
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «appointed» por naturalidad contextual. En español, «fue designado» refleja bien una asignación providencial o institucional, evitando una traducción demasiado material como «formado» y sin perder el matiz de elección para una misión.
- source_word: תשועה גדולה / σωτηρίᾳ
  english_pob_choice: a great salvation
  chosen_spanish: una gran salvación
  alternatives_spanish:
  - una gran liberación
  - una gran victoria
  - un gran rescate
  lexicon: HALOT
  rationale: El hebreo y el griego permiten tanto un sentido militar como uno más amplio de rescate/salvación. «Gran salvación» conserva la amplitud teológica y el tono solemne del texto.
- source_word: לבחיריו / ἐκλεκτῶν αὐτοῦ
  english_pob_choice: for his chosen ones
  chosen_spanish: para sus escogidos
  alternatives_spanish:
  - para sus elegidos
  - para su pueblo escogido
  - para sus selectos
  lexicon: HALOT
  rationale: «Escogidos» sigue de cerca la idea de elección del hebreo y del griego, y suena más bíblico y natural en español que «electos» o «selectos».
theological_decisions:
- issue: Relación de Josué con Moisés en la frase «en la profecía»
  english_pob_reading: Retain the compact wording 'Moses’ attendant in prophecy' rather than expanding to 'successor to Moses in prophetic office.'
  chosen_spanish_reading: Mantener «siervo de Moisés en la profecía» en lugar de expandir a «sucesor de Moisés en oficio profético».
  alternative_spanish_readings:
  - sucesor de Moisés en la profecía
  - ministro de Moisés para la profecía
  rationale: El hebreo conservado es breve y algo opaco; el griego sí sugiere sucesión con διάδοχος, pero el testimonio hebreo sigue siendo la base principal. La traducción española conserva esa tensión sin resolverla con una afirmación más fuerte de la que el hebreo exige.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Alcance de תשועה / σωτηρία
  english_pob_reading: Render as 'salvation' in the main text, preserving military-deliverance nuance in alternatives.
  chosen_spanish_reading: Traducir como «salvación» en el texto principal, manteniendo la posibilidad de «liberación» o «victoria» como matices alternos.
  alternative_spanish_readings:
  - liberación
  - victoria
  - rescate
  rationale: El contexto es militar, pero el término bíblico y su paralelo griego son más amplios que una victoria de guerra. «Salvación» preserva ese alcance y deja abierta la resonancia histórica de liberación.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del registro inglés, que cambió «was formed» por «was appointed» para נוצר por razones de naturalidad y adecuación contextual. Por eso el español adopta «fue designado» en el texto principal, manteniendo un tono formal y evitando una literalidad que sonaría extraña en español. También se integró la preferencia inglesa por conservar la ambigüedad de «in prophecy» y por mantener «salvation» como término amplio.
  spanish_consistency_notes:
  - Se usa «Josué» para Ἰησοῦς y «Moisés» para Μωσῇ, de manera consistente con la terminología bíblica en español.
  - «Yahvé» no aparece porque el versículo no contiene el nombre divino; por eso no se introduce terminología innecesaria.
  - Se mantuvo un registro solemne y bíblico sin recurrir a fórmulas eclesiásticas que no están respaldadas por el hebreo o el griego.
