translation:
  language: es
  text: Entonces Moisés extendió su mano hacia el cielo[a], y hubo tinieblas espesas[b] sobre toda la tierra de Egipto por tres días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia los cielos». El hebreo שָּׁמַיִם puede significar «cielo» o «cielos» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «oscuridad profunda». La expresión hebrea combina «oscuridad/tinieblas» con un segundo término de penumbra o intensa oscuridad para enfatizarla.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּט
  english_pob_choice: stretched out
  chosen_spanish: extendió
  alternatives_spanish:
  - alargó
  - tendió
  - estiró
  lexicon: HALOT
  rationale: נטה en este gesto significa extender o alargar la mano. «Extendió» es natural en español y conserva la acción física sin añadir interpretaciones.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su brazo
  lexicon: HALOT
  rationale: יָד normalmente es «mano». No hay motivo contextual para ampliar a «brazo».
- source_word: עַל הַשָּׁמַיִם
  english_pob_choice: toward the sky
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - hacia el cielo/los cielos
  - sobre el cielo
  lexicon: HALOT
  rationale: En este contexto gestual, עַל puede indicar dirección. «Hacia el cielo» expresa bien la orientación del gesto y mantiene la alternativa lexical entre «cielo» y «cielos».
- source_word: וַיְהִי
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - y fue
  - y llegó a haber
  lexicon: HALOT
  rationale: La forma introduce el estado resultante. «Hubo» es una solución idiomática en español para marcar la aparición de la condición.
- source_word: חֹשֶׁךְ אֲפֵלָה
  english_pob_choice: thick darkness
  chosen_spanish: oscuridad densa
  alternatives_spanish:
  - tinieblas densas
  - oscuridad profunda
  - oscuridad espesa
  lexicon: HALOT
  rationale: La combinación intensifica la oscuridad. «Oscuridad densa» comunica esa intensidad sin alejarse del valor enfático de los dos sustantivos hebreos.
- source_word: בְּכָל אֶרֶץ מִצְרַיִם
  english_pob_choice: over all the land of Egypt
  chosen_spanish: sobre toda la tierra de Egipto
  alternatives_spanish:
  - en toda la tierra de Egipto
  - por toda la tierra de Egipto
  lexicon: HALOT
  rationale: «Tierra de Egipto» es un equivalente natural de אֶרֶץ מִצְרַיִם. «Sobre» refleja la imagen de la oscuridad cubriendo la región, como en el audit trail inglés.
- source_word: שְׁלֹשֶׁת יָמִים
  english_pob_choice: for three days
  chosen_spanish: por tres días
  alternatives_spanish:
  - durante tres días
  - por espacio de tres días
  lexicon: HALOT
  rationale: En español, «por tres días» comunica la duración de forma directa y sobria, equivalente al valor temporal del hebreo.
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés de alta concordancia; no se registraron revisiones textuales aplicadas en el último pase. La redacción española conserva la intensificación de חֹשֶׁךְ אֲפֵלָה y la ambigüedad lexical de שָׁמַיִם mediante nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «tierra de Egipto» para אֶרֶץ מִצְרַיִם, consistente con el registro bíblico y el audit trail inglés.
  - «Cielo» se prefiere en el texto principal por fluidez; la nota preserva la alternativa «cielos».
