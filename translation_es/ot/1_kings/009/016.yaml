translation:
  language: es
  text: Faraón, rey de Egipto, había subido, capturó Gezer y la quemó con fuego, y mató a los cananeos que habitaban en la ciudad, y se la dio como dote[a] a su hija, esposa de Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Dote» refleja aquí un regalo matrimonial formal; el término hebreo se refiere a una entrega relacionada con el matrimonio y puede solaparse con una donación nupcial más amplia.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה
  english_pob_choice: had gone up
  chosen_spanish: subió
  alternatives_spanish:
  - había subido
  - fue de campaña
  lexicon: HALOT
  rationale: El hebreo usa el verbo de movimiento ascendente típico para una incursión militar. En español, «subió» conserva esa imagen sin sobrecargar el tiempo verbal; el contexto ya sitúa la acción como anterior a la narración principal.
- source_word: וַיִּלְכֹּד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - tomó
  - se apoderó de
  lexicon: HALOT
  rationale: En contexto de conquista, «capturó» expresa con naturalidad el sentido militar de לכד y evita un calco rígido.
- source_word: וַיִּשְׂרְפָהּ בָּאֵשׁ
  english_pob_choice: burned it with fire
  chosen_spanish: la quemó con fuego
  alternatives_spanish:
  - la incendió
  - la quemó
  lexicon: HALOT
  rationale: Se mantiene la expresión enfática del hebreo, incluyendo el complemento explícito «con fuego», que no es solo decorativo sino parte de la formulación original.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  - la población cananea
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular colectivo, el español natural exige plural para el grupo étnico/inhabitante en este contexto.
- source_word: הַיֹּשֵׁב בָּעִיר
  english_pob_choice: who lived in the city
  chosen_spanish: que habitaban en la ciudad
  alternatives_spanish:
  - que vivía en la ciudad
  - residentes de la ciudad
  lexicon: HALOT
  rationale: El participio describe a quienes ocupaban la ciudad; «habitaban» conserva el valor descriptivo sin perder fluidez.
- source_word: הָרָג
  english_pob_choice: killed
  chosen_spanish: mató
  alternatives_spanish:
  - dio muerte a
  - derribó
  lexicon: HALOT
  rationale: «Mató» es la forma directa y sobria para הרג; evita arcaísmos y no introduce matices ajenos.
- source_word: שִׁלֻּחִים
  english_pob_choice: as a dowry
  chosen_spanish: como dote
  alternatives_spanish:
  - como regalo de boda
  - como obsequio matrimonial
  lexicon: HALOT
  rationale: El audit trail inglés revisó la opción hacia «dowry» por mayor precisión. En español, «dote» es el equivalente más exacto para un regalo matrimonial formal, aunque el término puede abarcar matices de donación nupcial más amplios.
- source_word: לְבִתּוֹ אֵשֶׁת שְׁלֹמֹה
  english_pob_choice: to his daughter, Solomon’s wife
  chosen_spanish: a su hija, esposa de Salomón
  alternatives_spanish:
  - a su hija, la esposa de Salomón
  - a su hija, que era la esposa de Salomón
  lexicon: HALOT
  rationale: La apposición identifica a la hija como la esposa de Salomón; en español se conserva la relación sin añadir elementos interpretativos.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo y el rastro editorial inglés, incluyendo la decisión revisada de entender שִׁלֻּחִים como «dowry»; en español se opta por «dote» por ser el equivalente más natural y preciso. Se conserva el encadenamiento narrativo de conquista, destrucción y entrega matrimonial sin atenuar la dureza del relato.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - «Salomón» se mantiene como nombre propio establecido.
  - Se conserva el tono sobrio y narrativo, sin expandir el contenido del versículo.
