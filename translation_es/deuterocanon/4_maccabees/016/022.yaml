translation:
  language: es
  text: Por tanto, ustedes también, teniendo la misma fe[a] hacia Dios, no se angustien[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘la misma confianza hacia Dios’. πίστις puede llevar el sentido de confianza o de fidelidad, según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘no se irriten’, ‘no se amarguen’ o ‘no se entristezcan’. El verbo puede expresar pena, molestia o enojo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ὑμεῖς οὖν
  english_pob_choice: So you also
  chosen_spanish: Así también ustedes
  alternatives_spanish:
  - Por tanto, ustedes también
  - De modo que ustedes también
  lexicon: LSJ
  rationale: Reproduce la inferencia de οὖν y el énfasis de ὑμεῖς con una frase natural en español que mantiene el enlace exhortativo con el contexto anterior.
- source_word: τὴν αὐτὴν πίστιν
  english_pob_choice: the same faith
  chosen_spanish: la misma fe
  alternatives_spanish:
  - la misma confianza
  - la misma fidelidad
  lexicon: BDAG
  rationale: ‘Fe’ es el equivalente más directo y coherente con el valor principal de πίστις en este contexto. ‘Confianza’ y ‘fidelidad’ quedan como matices posibles, pero no sustituyen bien el alcance teológico y exhortativo del texto.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: toward God
  chosen_spanish: hacia Dios
  alternatives_spanish:
  - en relación con Dios
  - respecto de Dios
  lexicon: LSJ
  rationale: La preposición πρός con acusativo expresa orientación o relación; ‘hacia Dios’ conserva esa dirección sin forzar una construcción menos natural en español.
- source_word: ἔχοντες
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - poseyendo
  - manteniendo
  lexicon: BDAG
  rationale: 'El participio expresa una condición acompañante: al tener esa fe, se sigue la exhortación. ‘Teniendo’ preserva bien la estructura participial y el sentido circunstancial.'
- source_word: μὴ χαλεπαίνητε
  english_pob_choice: do not be distressed
  chosen_spanish: no se angustien
  alternatives_spanish:
  - no se entristezcan
  - no se irriten
  - no se amarguen
  lexicon: LSJ
  rationale: χαλεπαίνω puede abarcar estar afligido, molesto, irritado o amargado. ‘No se angustien’ comunica bien el peso emocional en este contexto de consuelo, sin reducirlo solo a enojo.
theological_decisions:
- issue: Sentido de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: Se mantiene ‘fe’ como traducción principal por continuidad doctrinal y lexical. Las alternativas reflejan matices reales del término griego, pero no desplazan el valor dominante en esta exhortación.
  doctrine_reference: 'DOCTRINE.md: πίστις → fe'
- issue: Alcance de μὴ χαλεπαίνητε
  english_pob_reading: do not be distressed
  chosen_spanish_reading: no se angustien
  alternative_spanish_readings:
  - no se irriten
  - no se amarguen
  - no se entristezcan
  rationale: El verbo admite un rango que incluye dolor, vexación y amargura. En esta escena de exhortación, ‘no se angustien’ preserva la carga afectiva sin cerrar indebidamente la ambigüedad del término.
  doctrine_reference: 'DOCTRINE.md: evitar estrechar el campo semántico cuando el contexto permite varias resonancias'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y concuerda con la revisión inglesa más reciente, que no requirió cambios. Se conserva la misma estructura exhortativa y se mantienen las alternativas léxicas documentadas para πίστις y χαλεπαίνω.
  spanish_consistency_notes:
  - Se usa ‘Dios’ para θεόν conforme al estándar del proyecto.
  - Se evita sustituir ‘fe’ por ‘confianza’ en el texto principal para no perder la continuidad terminológica.
  - La puntuación reproduce una exhortación directa y breve, adecuada para la cadencia del pasaje.
