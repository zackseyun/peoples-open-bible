revisions:
- from: Y Yahvé limpia a todo hombre piadoso[a] y su casa[b][c].
  to: Y Yahvé purifica a todo hombre piadoso[a] y su casa[b].
  rationale: Se corrige la nota redundante [b], se conserva una sola nota útil sobre el alcance de οἶκος, y se ajusta «limpia» a «purifica» para reflejar mejor καθαρίζει en español bíblico natural. Se mantienen «Yahvé», «todo hombre» y «casa» por fidelidad al griego y a las decisiones documentadas del POB.
