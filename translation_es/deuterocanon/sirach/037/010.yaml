translation:
  language: es
  text: 'Pues él también pensará en sí: «¿Por qué habría de caerle esto a él?»[a][b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es breve y algo difícil aquí. El paralelo griego dice: «No consultes con el que te mira de reojo, y oculta tu consejo a los que te tienen envidia», lo que apoya la idea de que la otra persona calcula por interés propio o mala intención.'
    reason: alternative_reading
  - marker: b
    text: 'O: «Pues él también pensará acerca de sí: “¿Por qué habría de sucederle esto?”». La redacción hebrea permite cierta incertidumbre sobre si el pronombre final apunta al consejero mismo o a otra persona.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כי
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Porque, en efecto
  lexicon: HALOT
  rationale: Introduce la razón con un conector natural en español, manteniendo el tono sapiencial explicativo sin sobrerreproducir la sintaxis inglesa.
- source_word: גם הוא
  english_pob_choice: he too
  chosen_spanish: él también
  alternatives_spanish:
  - también él
  - ese hombre también
  lexicon: HALOT
  rationale: Conserva el valor aditivo de 'también' y deja claro que se trata de la misma persona mencionada en el contexto.
- source_word: לנפשך
  english_pob_choice: for himself
  chosen_spanish: en sí mismo
  alternatives_spanish:
  - para sí mismo
  - sobre sí mismo
  lexicon: HALOT
  rationale: La hebra es difícil y el audit trail inglés entiende aquí una referencia reflexiva de interés propio; 'en sí mismo' expresa el cálculo interior sin forzar una literalidad engañosa.
- source_word: יחשב
  english_pob_choice: will think
  chosen_spanish: pensará
  alternatives_spanish:
  - considerará
  - hará cálculos
  lexicon: HALOT
  rationale: '''Pensará'' comunica la actividad mental básica y funciona bien con el matiz de evaluación interesada indicado por el contexto y la nota inglesa.'
- source_word: למה זה
  english_pob_choice: Why should this
  chosen_spanish: ¿Por qué habría de esto
  alternatives_spanish:
  - ¿Por qué esto?
  - ¿Por qué habría de ser esto?
  lexicon: HALOT
  rationale: La pregunta retórica se conserva; la forma elegida intenta mantener la apertura semántica del hebreo y la dificultad señalada en el aparato inglés.
- source_word: אליו יפול
  english_pob_choice: fall to him
  chosen_spanish: caerle esto a él
  alternatives_spanish:
  - venirle esto a él
  - acaecerle esto
  lexicon: HALOT
  rationale: '''Caerle'' preserva la metáfora del verbo de caída y el dativo pronominal; ''esto'' mantiene la indeterminación del referente, como en el inglés POB.'
theological_decisions:
- issue: Ambigüedad del hebreo final y lectura reflexiva/interesada del sujeto
  english_pob_reading: The other person is calculating from self-interest or ill will; the pronoun may also allow another referent.
  chosen_spanish_reading: El otro calcula desde el interés propio; el pronombre final se deja con ambigüedad respetando la dificultad del hebreo.
  alternative_spanish_readings:
  - Puede leerse como 'pensará acerca de sí mismo' en un sentido reflexivo estricto.
  - Puede leerse como 'pensará en ti' si se adoptara una resolución más literal del hebreo.
  rationale: 'La versión española debe conservar la tensión documentada: el hebreo es terso y difícil, y la nota inglesa admite incertidumbre sobre el referente final. No se debe resolver artificialmente la ambigüedad.'
  doctrine_reference: Sabiduría bíblica / prudencia en el consejo; sin implicación doctrinal específica
translation_notes:
  revision_awareness: Se tuvo en cuenta el texto hebreo de Kahana y el paralelo griego de Swete. El inglés POB revisó 'think for himself' por 'think of himself' para naturalidad; la propuesta española sigue esa lectura reflexiva, pero conserva la dificultad del final y la posibilidad alternativa documentada en el aparato inglés.
  spanish_consistency_notes:
  - Se mantuvo una opción neutra y sobria, apta para lectura eclesial, sin sustituir la terminología por fórmulas tradicionales no exigidas por el texto.
  - '''caerle'' se eligió para conservar la imagen verbal del hebreo y el inglés ''fall to him''.'
  - Las notas mantienen la tensión entre el hebreo oscuro y el apoyo interpretativo del griego, sin cerrar indebidamente la ambigüedad.
