translation:
  language: es
  text: Su apariencia es más oscura que el hollín[a]; no se los reconoce en las calles. Su piel se ha encogido sobre sus huesos[b]; ha quedado seca como madera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más oscura que la negrura». El hebreo puede denotar oscuridad o negrura en general; «hollín» conserva una imagen concreta y equivalente a la elección del POB inglés.
    reason: lexical_alternative
  - marker: b
    text: O «su piel se pega a los huesos». El verbo hebreo también puede entenderse como una piel que se contrae y queda tirante sobre los huesos.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָשַׁךְ / מִשְּׁחוֹר
  english_pob_choice: is darker than soot
  chosen_spanish: es más oscura que el hollín
  alternatives_spanish:
  - es más oscura que la negrura
  - es más oscura que el carbón
  lexicon: HALOT
  rationale: El comparativo hebreo con מִן sobre שְׁחוֹר pide una comparación de grado, no solo una afirmación de oscurecimiento. «Más oscura que el hollín» conserva la imagen concreta elegida por el POB inglés («soot») y evita una abstracción excesiva.
- source_word: תָּאֳרָם
  english_pob_choice: their appearance
  chosen_spanish: su apariencia
  alternatives_spanish:
  - su forma
  - su aspecto
  - su semblante
  lexicon: HALOT
  rationale: תֹּאַר / תָּאֳרָם refiere a la forma o apariencia visible. «Apariencia» es natural en español y mantiene el sentido externo y observable del texto.
- source_word: לֹא נִכְּרוּ
  english_pob_choice: they are not recognized
  chosen_spanish: no se los reconoce
  alternatives_spanish:
  - no son reconocidos
  - nadie los reconoce
  lexicon: HALOT
  rationale: El nifal comunica que no pueden ser reconocidos. La pasiva impersonal en español preserva ese valor sin forzar un sujeto agente no expresado.
- source_word: בַּחוּצוֹת
  english_pob_choice: in the streets
  chosen_spanish: en las calles
  alternatives_spanish:
  - en las plazas
  - en los lugares públicos
  lexicon: HALOT
  rationale: חוּצוֹת se refiere a espacios públicos urbanos; «calles» es la equivalencia moderna más clara y compatible con el registro del POB.
- source_word: צָפַד
  english_pob_choice: has shriveled
  chosen_spanish: se ha encogido
  alternatives_spanish:
  - se ha arrugado
  - se ha contraído
  lexicon: HALOT
  rationale: El verbo expresa contracción o encogimiento por desnutrición. «Se ha encogido» transmite bien la imagen corporal y sigue el paralelismo con los huesos.
- source_word: עוֹרָם
  english_pob_choice: their skin
  chosen_spanish: su piel
  alternatives_spanish:
  - su dermis
  - su cutis
  lexicon: HALOT
  rationale: עוֹר es literalmente piel. «Su piel» es el equivalente directo y natural.
- source_word: עַל עַצְמָם
  english_pob_choice: on their bones
  chosen_spanish: sobre sus huesos
  alternatives_spanish:
  - pegada a sus huesos
  - hasta los huesos
  lexicon: HALOT
  rationale: La preposición על, en esta imagen, describe la piel tensada sobre el esqueleto. «Sobre sus huesos» conserva la figura sin explicitar más de lo que el hebreo dice.
- source_word: יָבֵשׁ הָיָה
  english_pob_choice: it has become dry
  chosen_spanish: se ha secado
  alternatives_spanish:
  - se ha vuelto seca
  - se ha puesto seca
  lexicon: HALOT
  rationale: La secuencia verbal expresa un estado resultante de sequedad. En español, «se ha secado» funciona de modo idiomático y mantiene el efecto final del hebreo.
- source_word: כָעֵץ
  english_pob_choice: like wood
  chosen_spanish: como madera
  alternatives_spanish:
  - como leña
  - como un árbol
  lexicon: HALOT
  rationale: עֵץ puede abarcar árbol o madera, pero aquí el paralelismo con piel reseca favorece la dureza y deshidratación de «madera». «Madera» preserva mejor la fuerza de la comparación que «árbol» en español.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió una afirmación directa («is darker») en lugar de un matiz inceptivo («has grown darker»). Por eso el español usa una copulativa simple («es más oscura») sin añadir un desarrollo aspectual innecesario. También se mantuvo la imagen corporal directa del segundo hemistiquio, respetando la nota alternativa sobre la piel pegada a los huesos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto original lo exige; este versículo no contiene el nombre divino.
  - Se usó «piel» y «huesos» en sentido corporal literal, sin suavizar la imagen de inanición.
  - El comparativo se resolvió con «más oscura que…» para reflejar el hebreo sin perder naturalidad en español.
