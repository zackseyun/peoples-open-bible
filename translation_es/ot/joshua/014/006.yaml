translation:
  language: es
  text: 'Entonces los hijos de Judá se acercaron a Josué en Gilgal, y Caleb hijo de Jefone el quenizita le dijo: «Tú sabes la palabra[a] que Yahvé habló a Moisés, el hombre de Dios, acerca de mí y acerca de ti en Cadés-barnea».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el asunto» o «la cosa» que Yahvé habló a Moisés.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְּשׁוּ
  english_pob_choice: came near
  chosen_spanish: se acercaron
  alternatives_spanish:
  - vinieron cerca
  - se aproximaron
  lexicon: HALOT
  rationale: El verbo hebreo expresa el acto de aproximarse; «se acercaron» es natural en español y conserva el movimiento narrativo sin endurecerlo.
- source_word: בְנֵי יְהוּדָה
  english_pob_choice: the sons of Judah
  chosen_spanish: los hijos de Judá
  alternatives_spanish:
  - los hombres de Judá
  - el pueblo de Judá
  lexicon: HALOT
  rationale: Se mantiene la construcción filial/tribal explícita del hebreo. «Hijos» reproduce con fidelidad la forma masculina plural sin neutralizarla.
- source_word: בַּגִּלְגָּל
  english_pob_choice: at Gilgal
  chosen_spanish: en Gilgal
  alternatives_spanish:
  - en el Gilgal
  - al Gilgal
  lexicon: HALOT
  rationale: La preposición locativa española «en» comunica adecuadamente el marco narrativo del lugar.
- source_word: וַיֹּאמֶר אֵלָיו
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - le habló diciendo
  lexicon: HALOT
  rationale: «Decir» es el equivalente más natural de אמר en este contexto directo de discurso.
- source_word: כָּלֵב בֶּן יְפֻנֶּה הַקְּנִזִּי
  english_pob_choice: Caleb son of Jephunneh the Kenizzite
  chosen_spanish: Caleb hijo de Jefone el quenizita
  alternatives_spanish:
  - Caleb hijo de Jefuné el quenizita
  - Caleb, hijo de Jefone, el quenizita
  lexicon: HALOT
  rationale: Se transliteran los nombres propios y el etnónimo. «Quenizita» conserva el valor de designación clan/etnia del original.
- source_word: אַתָּה יָדַעְתָּ
  english_pob_choice: You know
  chosen_spanish: Tú sabes
  alternatives_spanish:
  - Tú conoces
  - Bien sabes
  lexicon: HALOT
  rationale: El perfecto hebreo expresa aquí un estado presente de conocimiento; en español, «sabes» es idiomático y fiel.
- source_word: הַדָּבָר
  english_pob_choice: the word
  chosen_spanish: la palabra[a]
  alternatives_spanish:
  - la cosa[a]
  - el asunto[a]
  lexicon: HALOT
  rationale: Aunque דבר puede significar «palabra», «asunto» o «cosa», el contexto de un dicho divino favorece «palabra». Se conserva la tensión semántica con una nota alternativa.
- source_word: דִּבֶּר יְהוָה
  english_pob_choice: the LORD spoke
  chosen_spanish: Yahvé habló
  alternatives_spanish:
  - Yahvé dijo
  - el SEÑOR habló
  lexicon: HALOT
  rationale: Se sigue la directriz del proyecto para יהוה como «Yahvé». «Habló» reproduce con mayor cercanía el verbo דִּבֶּר que un simple «dijo».
- source_word: מֹשֶׁה אִישׁ הָאֱלֹהִים
  english_pob_choice: Moses the man of God
  chosen_spanish: a Moisés, el hombre de Dios
  alternatives_spanish:
  - a Moisés, varón de Dios
  - a Moisés, el hombre de Dios
  lexicon: HALOT
  rationale: Se mantiene el título bíblico tradicional «el hombre de Dios», que corresponde de forma precisa al hebreo sin paraphrasearlo.
- source_word: עַל אֹדוֹתַי וְעַל אֹדוֹתֶיךָ
  english_pob_choice: concerning me and concerning you
  chosen_spanish: acerca de mí y acerca de ti
  alternatives_spanish:
  - con respecto a mí y con respecto a ti
  - sobre mí y sobre ti
  lexicon: HALOT
  rationale: El idiomático עַל אֹדוֹת se traduce por una construcción española natural de referencia/concernencia. «Acerca de» conserva el paralelismo y la precisión relacional.
- source_word: בְּקָדֵשׁ בַּרְנֵעַ
  english_pob_choice: at Kadesh-barnea
  chosen_spanish: en Cades-barnea
  alternatives_spanish:
  - en Cadés-barnea
  - en Cades Barnea
  lexicon: HALOT
  rationale: Se usa la forma castellana habitual del topónimo bíblico con guion, manteniendo la identificación geográfica.
theological_decisions:
- issue: Rendering of the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El paquete fuente y la política del proyecto indican que יהוה debe aparecer como el nombre divino transliterado en el texto principal. «Yahvé» es la forma establecida en español del proyecto y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Gendered tribal designation בְנֵי יְהוּדָה
  english_pob_reading: the sons of Judah
  chosen_spanish_reading: los hijos de Judá
  alternative_spanish_readings:
  - los hombres de Judá
  - el pueblo de Judá
  rationale: El hebreo usa plural masculino explícito; «hijos» conserva la forma de parentesco/tribu sin neutralizar el dato gramatical.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto coincide con el audit trail inglés en el sentido de mantener la progresión narrativa, la designación tribal masculina, el nombre divino transliterado y la alternativa semántica de דבר mediante nota. No se registran revisiones previas aplicadas en el expediente, y la concordancia de revisión fue alta sin cambios.
  spanish_consistency_notes:
  - Se usó «hijos de Judá» para reflejar el plural masculino del hebreo.
  - Se prefirió «Yahvé» conforme a la terminología del proyecto para יהוה.
  - «Cades-barnea» mantiene la toponimia bíblica en una forma castellana legible.
  - La nota de la palabra[a] preserva la alternativa semántica de דבר sin recargar el texto principal.
