id: REV.18.20
reference: Revelation 18:20
source:
  edition: SBLGNT
  text: Εὐφραίνου ἐπ’ αὐτῇ, οὐρανέ, καὶ οἱ ἅγιοι καὶ οἱ ἀπόστολοι καὶ οἱ προφῆται, ὅτι ἔκρινεν ὁ θεὸς τὸ κρίμα ὑμῶν ἐξ αὐτῆς.
translation:
  text: Rejoice over her[a], O heaven, and you saints and apostles and prophets, because God has judged your judgment from her.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Or, more interpretively, ''because God has judged her for your sake'' or ''because God has avenged you on her.'' The Greek is compressed: literally, ''God judged your judgment from her.'''
    reason: alternative_reading
lexical_decisions:
- source_word: Εὐφραίνου
  chosen: Rejoice
  alternatives:
  - Be glad
  - Celebrate
  lexicon: BDAG
  rationale: Second-person singular present middle/passive imperative functioning as an exhortation to joy. 'Rejoice' is concise and preserves the imperative force better than the more colloquial 'be glad.'
- source_word: ἐπ’ αὐτῇ
  chosen: over her
  alternatives:
  - because of her
  - concerning her
  lexicon: BDAG
  rationale: With verbs of rejoicing, ἐπί + dative commonly expresses the object or occasion of rejoicing. 'Over her' is idiomatic in English and fits the context of Babylon's fall.
- source_word: οὐρανέ
  chosen: O heaven
  alternatives:
  - heaven
  lexicon: BDAG
  rationale: Vocative singular directly addresses heaven personified. 'O heaven' preserves the elevated summons and the vocative force.
- source_word: οἱ ἅγιοι
  chosen: saints
  alternatives:
  - holy ones
  - God's holy people
  lexicon: BDAG
  rationale: ἅγιοι in Revelation commonly refers to God's holy people. 'Saints' is the established concise rendering, while alternatives are possible but less natural here.
- source_word: οἱ ἀπόστολοι
  chosen: apostles
  alternatives:
  - messengers
  lexicon: BDAG
  rationale: In this context the technical sense 'apostles' is most likely, especially alongside prophets. 'Messengers' would flatten the likely ecclesial reference.
- source_word: οἱ προφῆται
  chosen: prophets
  lexicon: BDAG
  rationale: Standard rendering of προφῆται; no contextual pressure suggests a different gloss.
- source_word: ὅτι
  chosen: because
  alternatives:
  - for
  lexicon: BDAG
  rationale: Introduces the reason for the command to rejoice. 'Because' is clearer in modern English than 'for.'
- source_word: ἔκρινεν
  chosen: has judged
  alternatives:
  - judged
  - has passed judgment
  lexicon: BDAG
  rationale: Aorist indicative viewed here as a completed divine act with present relevance in English discourse. 'Has judged' reads naturally in context; 'has passed judgment' is possible but more cumbersome.
- source_word: τὸ κρίμα ὑμῶν
  chosen: your judgment
  alternatives:
  - the judgment for you
  - your legal case
  - your sentence
  lexicon: BDAG
  rationale: The phrase is somewhat compressed. It most naturally refers to the judgment belonging to or concerning the saints, apostles, and prophets—i.e., God's judicial action on their behalf. 'Your judgment' preserves the lexical link to κρίμα without over-interpreting.
- source_word: ἐξ αὐτῆς
  chosen: from her
  alternatives:
  - against her
  - on her account
  lexicon: BDAG
  rationale: ἐκ/ἐξ with κρίμα here is difficult, but 'from her' most directly reflects the preposition and leaves the compressed Greek expression visible. It likely conveys that the judgment is exacted from Babylon/her agency.
