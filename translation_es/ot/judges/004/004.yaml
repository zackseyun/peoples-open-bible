translation:
  language: es
  text: Débora[a], una mujer, profetisa, esposa de Lappidot, juzgaba a Israel en aquel tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «una mujer de antorchas», si לַפִּידוֹת se entiende de forma descriptiva y no como el nombre propio Lappidot; sin embargo, la lectura más natural es «la esposa de Lappidot».
    reason: alternative_reading
lexical_decisions:
- source_word: וּ/דְבוֹרָה
  english_pob_choice: Now Deborah
  chosen_spanish: Ahora Débora
  alternatives_spanish:
  - Y Débora
  - Entonces Débora
  lexicon: HALOT
  rationale: La conjunción ו puede ser coordinativa, pero en español narrativo «Ahora» funciona bien para introducir o retomar un personaje sin forzar una coordinación pesada. «Débora» conserva el nombre propio en forma usual y clara.
- source_word: נְבִיאָה
  english_pob_choice: a prophetess
  chosen_spanish: profetisa
  alternatives_spanish:
  - profeta
  - mujer profeta
  lexicon: HALOT
  rationale: El hebreo marca explícitamente el femenino. «Profetisa» es la forma natural y breve en español para preservar ese marcado de género. «Profeta» neutralizaría el rasgo femenino; «mujer profeta» suena menos idiomático.
- source_word: אֵשֶׁת לַפִּידוֹת
  english_pob_choice: the wife of Lappidoth
  chosen_spanish: esposa de Lappidot
  alternatives_spanish:
  - esposa de Lappidot
  - mujer de Lappidot
  - mujer de antorchas
  lexicon: HALOT
  rationale: El constructo con אֵשֶׁת se entiende más naturalmente como relación marital cuando sigue un nombre propio. «Esposa» es fiel y natural en español. Se mantiene «Lappidot» como nombre propio, en línea con la lectura más natural señalada en el POB inglés.
- source_word: הִיא
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - era
  - estuvo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis en hebreo; en español no hace falta traducirlo explícitamente si el sujeto ya está presente. «Estaba juzgando» conserva el valor aspectual durativo de la forma participial mejor que un pretérito simple.
- source_word: שֹׁפְטָה
  english_pob_choice: was judging
  chosen_spanish: estaba juzgando
  alternatives_spanish:
  - juzgaba
  - servía como juez
  lexicon: HALOT
  rationale: La forma participial expresa una acción característica o en curso en el relato. «Estaba juzgando» preserva esa duración. «Juzgaba» también es posible, pero puede sonar más habitual y menos progresivo; «servía como juez» añade explicación no presente en el hebreo.
- source_word: אֶת יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - Israel
  - al pueblo de Israel
  lexicon: HALOT
  rationale: En español conviene conservar la marca objetiva con «a» ante el nombre propio como objeto directo humano. No se amplía a «el pueblo de Israel» porque el hebreo nombra simplemente a Israel.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - entonces
  lexicon: HALOT
  rationale: «En aquel tiempo» reproduce con naturalidad el valor temporal de la expresión hebrea. Es más idiomático en español bíblico que una traducción demasiado literal de la estructura inglesa.
theological_decisions:
- issue: Marcado femenino de Débora como profetisa y juez
  english_pob_reading: Deborah is presented explicitly as a female prophet and as one judging Israel, without minimizing either description.
  chosen_spanish_reading: Débora aparece explícitamente como profetisa y como quien juzgaba a Israel, sin borrar ni suavizar ninguno de los dos rasgos.
  alternative_spanish_readings:
  - Débora, profeta, que juzgaba a Israel
  - Débora, la profetisa, juzgaba a Israel
  rationale: El hebreo conserva el femenino con נְבִיאָה y además describe a Débora con la función de juzgar. La traducción mantiene ambos rasgos sin neutralizarlos ni explicar de más. No hay razón para convertir el femenino en genérico.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Lectura de לַפִּידוֹת como nombre propio o como ‘antorchas’
  english_pob_reading: the wife of Lappidoth, with a footnote allowing the descriptive alternative 'a woman of torches'
  chosen_spanish_reading: esposa de Lappidot, con nota que deja abierta la lectura alternativa descriptiva
  alternative_spanish_readings:
  - mujer de antorchas
  - esposa de Lappidot
  rationale: La lectura más natural, según el POB inglés, es que se trata del marido llamado Lappidot. A la vez, el hebreo admite una ambigüedad léxica por su relación con לַפִּידוֹת, por lo que la nota conserva la alternativa sin imponerla en el cuerpo del texto.
  doctrine_reference: Principio POB de preservar tensiones léxicas documentadas
- issue: Valor aspectual de la forma participial hebrea
  english_pob_reading: was judging
  chosen_spanish_reading: estaba juzgando
  alternative_spanish_readings:
  - juzgaba
  - estuvo juzgando
  rationale: La forma participial sugiere acción continua o característica. «Estaba juzgando» reproduce mejor ese matiz que un pretérito puntual. No se fuerza una interpretación jurídica técnica que el texto no explicita.
  doctrine_reference: Principio POB de conservar el aspecto verbal cuando aporta sentido
translation_notes:
  revision_awareness: 'El POB inglés revisó la redacción para eliminar el redundante «a woman» y retener solo «a prophetess». En español se sigue esa misma economía: no se añade «mujer» porque «profetisa» ya cumple la identificación appositiva. También se refleja la nota alternativa sobre לַפִּידוֹת, manteniendo la ambigüedad documentada sin convertirla en lectura principal.'
  spanish_consistency_notes:
  - Se usa «Débora» como nombre propio estándar en español.
  - Se conserva «profetisa» para mantener el femenino explícito del hebreo.
  - 'Se traduce el participio con imperfectivo progresivo: «estaba juzgando».'
  - Se mantiene «Yahvé» como norma del proyecto, pero en este versículo no aparece el nombre divino.
  - La nota usa una única marca [a] y se coloca solo donde corresponde la ambigüedad de לַפִּידוֹת.
