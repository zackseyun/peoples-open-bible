translation:
  text: 'Therefore[a], whoever comes and teaches you all these things that have been said before, receive him. But if the teacher himself turns aside and teaches another teaching so as to overthrow them, do not listen to him. But if it is to add righteousness and knowledge of the Lord, receive him as the Lord.


    Now concerning the apostles and prophets, according to the ordinance of the gospel, act in this way. Let every apostle who comes to you be received as the Lord[b]. He shall remain for one day only; but if there is need, also the next. But if he remains three days, he is a false prophet. And when the apostle departs, let him take nothing except bread, until he finds lodging; but if he asks for money, he is a false prophet.


    And every prophet speaking in the Spirit you shall not test, nor shall you judge; for every sin will be forgiven, but this sin will not be forgiven. Yet not everyone speaking in the Spirit is a prophet, but only if he has the ways of the Lord. So then, from the ways the false prophet and the prophet will be known. And every prophet who sets a table in the Spirit shall not eat from it; otherwise he is a false prophet. And every prophet teaching the truth, if he does not do what he teaches, is a false prophet. But every prophet who has been tested and is genuine, acting for a worldly mystery of the church, yet not teaching you to do what he himself does, shall not be judged by you; for he has his judgment with God. For in the same way the ancient prophets also acted.


    But whoever says in the Spirit, “Give me money,” or something else, you shall not listen to him. Yet if he tells you to give for others who are in need[c][d][e][f], let no one judge him.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Greek text for the apostle's length of stay is likely corrupt. It reads 'he shall not remain one day.' This translation follows the common emendation that he should remain for 'only one day.'
    reason: textual_variant
    anchor_ref: 11:5a
  - marker: b
    text: Or, 'until he lodges' or 'until he reaches his night's shelter.' The Greek concerns obtaining lodging for the night on a journey.
    reason: lexical_alternative
    anchor_ref: 11:5b
  - marker: f
    text: The warning about a sin that 'will not be forgiven' echoes the dominical saying about blasphemy against the Holy Spirit; compare Matt 12:31; Mark 3:28–29; Luke 12:10.
    reason: cross_reference
    anchor_ref: '11:7'
  - marker: e
    text: Discernment is not abolished. The prohibition in the previous sentence concerns irreverent testing of inspired speech, not the suspension of moral evaluation, which this verse immediately requires. Prophets are to be known 'from their ways.'
    reason: cultural_note
    anchor_ref: '11:8'
  - marker: d
    text: '''Appoints a table'' may refer to directing or setting out a meal while speaking in the Spirit, possibly in a liturgical or symbolic setting.'
    reason: cultural_note
    anchor_ref: '11:9'
  - marker: c
    text: The clause 'acting for the earthly mystery of the church' is obscure. 'Earthly' (κοσμικός) here likely means 'in the world' as opposed to 'heavenly,' not 'sinful.' The phrase may refer to a symbolic action performed for the church's life in the world. The translation keeps the ambiguity rather than forcing a single interpretation.
    reason: alternative_reading
    anchor_ref: '11:11'
lexical_decisions:
- source_word: στραφεὶς
  chosen: turns aside
  rationale: The verb στραφεὶς implies a change of direction. In this context of teaching, 'turns aside' better captures the sense of deviation from the established truth than the more neutral 'turns'.
  alternatives:
  - turns
  - is perverted
  entry: στρέφω
  lexicon: BDAG
- source_word: οὐ μενεῖ
  chosen: He shall remain for only one day
  rationale: The manuscript reading 'he shall not remain one day' is nonsensical in context and widely considered a textual corruption. The translation follows the common scholarly emendation (e.g., dropping the negative οὐ) to reflect the clear intent of the passage, which sets a one-day limit extendable to two.
  alternatives:
  - He shall not remain [more than] one day
  entry: μένω
  lexicon: BDAG
- source_word: κοσμικὸν
  chosen: earthly
  rationale: In the notoriously difficult phrase 'μυστήριον κοσμικὸν ἐκκλησίας', 'earthly' is chosen for κοσμικὸν over 'worldly' to avoid the strong negative moral connotations of the latter in English. The sense here is likely 'pertaining to the world/cosmos' in contrast to 'heavenly', as in Hebrews 9:1.
  alternatives:
  - worldly
  - of this world
  entry: κοσμικός
  lexicon: LSJ
- source_word: μὴ διδάσκων δὲ ποιεῖν
  chosen: not teaching others to do
  rationale: The Greek infinitive lacks an object. 'Others' is supplied as a general object, which is more fitting for a universal rule than the more specific 'you' found in the draft, making the principle clearer.
  alternatives:
  - not teaching to do
  - not teaching you to do
theological_decisions:
- issue: Whether ἐν πνεύματι should be rendered with capitalized 'Spirit'
  chosen_reading: Capitalized as 'in the Spirit'
  rationale: In this chapter the phrase refers to prophetic utterance understood as inspired speech. Capitalization reflects likely reference to the Holy Spirit while acknowledging that the Greek manuscripts themselves do not mark case distinction.
  alternative_readings:
  - in spirit
  doctrine_reference: Pneumatology
- issue: How to handle the obscure clause ποιῶν εἰς μυστήριον κοσμικὸν ἐκκλησίας
  chosen_reading: acting for the earthly mystery of the church
  rationale: The Greek is difficult and likely technical or idiomatic. Rather than flattening it into a speculative paraphrase, the main text preserves the ambiguity. 'Earthly' is chosen over 'worldly' to clarify the likely sense is 'in the world' (cf. Heb 9:1) rather than 'sinful,' with further explanation in a footnote.
  alternative_readings:
  - performing a symbolic act for the church in the world
  - acting for the worldly mystery of the church
  doctrine_reference: Ecclesiology
