translation:
  language: es
  text: 'Entonces Samuel dijo al pueblo[a]: «Vengan, vamos a Gilgal, y allí renovaremos el reinado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confirmaremos el reinado» o «renovaremos el reino».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma waw-consecutiva avanza la narración; «Entonces» conserva el valor secuencial de manera natural en español sin perder el enlace narrativo.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  alternatives_spanish:
  - Samuél
  lexicon: Nombre propio bíblico estándar
  rationale: Se mantiene la forma tradicional y reconocible del nombre propio.
- source_word: אֶל הָעָם
  english_pob_choice: to the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo reunido
  - a la gente
  lexicon: HALOT
  rationale: עָם aquí designa al conjunto del Israel reunido. «Pueblo» es más natural que «gente» y conserva el referente colectivo.
- source_word: לְכוּ
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vayan
  - Vamos
  lexicon: HALOT
  rationale: En una invitación con posterior cohorte plural, el imperativo funciona idiomáticamente como exhortación a acompañar; «Vengan» transmite mejor el valor invitacional que un simple «Vayan».
- source_word: וְנֵלְכָה
  english_pob_choice: let us go
  chosen_spanish: vamos
  alternatives_spanish:
  - vayamos
  - y vayamos
  lexicon: HALOT
  rationale: La forma cohortativa expresa acción conjunta. En español, «vamos» es una invitación/cohortativa natural y fluida; «vayamos» también sería posible, pero suena más formal y menos conversacional en este contexto.
- source_word: הַגִּלְגָּל
  english_pob_choice: Gilgal
  chosen_spanish: Gilgal
  alternatives_spanish:
  - el Gilgal
  lexicon: HALOT
  rationale: Nombre propio de lugar; en español bíblico se conserva la transliteración. Se omite el artículo por tratarse de un topónimo fijado.
- source_word: וּנְחַדֵּשׁ
  english_pob_choice: renew
  chosen_spanish: renovaremos
  alternatives_spanish:
  - confirmaremos
  - restableceremos
  lexicon: HALOT
  rationale: חדש en piel expresa renovar o hacer de nuevo. «Renovaremos» conserva la idea de reafirmación pública del reinado sin introducir un matiz institucional excesivo; también mantiene la ambigüedad productiva del hebreo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  lexicon: HALOT
  rationale: Adverbio locativo simple que apunta a Gilgal. «Allí» es el equivalente más claro y sobrio en español bíblico contemporáneo.
- source_word: הַמְּלוּכָה
  english_pob_choice: the kingship
  chosen_spanish: la realeza
  alternatives_spanish:
  - el reinado
  - la monarquía
  - el reino
  lexicon: HALOT
  rationale: מְלוּכָה puede referirse a la realeza, el reinado o la monarquía. «La realeza» conserva el matiz de dignidad/oficio real y evita reducir el término a un territorio («reino») o a una institución demasiado técnica («monarquía»).
theological_decisions:
- issue: Cómo expresar renovar הַמְּלוּכָה sin fijar demasiado el acto histórico
  english_pob_reading: publicly reaffirming or confirming Saul's royal office
  chosen_spanish_reading: renovar la realeza como reafirmación pública del reinado de Saúl
  alternative_spanish_readings:
  - confirmar la realeza
  - restablecer la monarquía
  - renovar el reino
  rationale: El contexto inmediato no exige describir una coronación nueva; más bien señala la ratificación pública de la autoridad real tras la victoria. «Renovar la realeza» preserva la tensión entre institución y función regia, sin sobreinterpretar el acto.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: No se detectaron revisiones posteriores que alteren el sentido base; el borrador sigue de cerca el texto hebreo y el auditorial inglés en las decisiones clave de secuencia narrativa, invitación, cohortativo y el campo semántico de מְלוּכָה.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el texto lo exige; este versículo no contiene el Tetragrámaton.
  - «Pueblo» mantiene el referente colectivo de עָם.
  - «Renovar la realeza» preserva la ambigüedad textual entre confirmar, renovar o restablecer el ejercicio real.
  - La puntuación con comillas angulares y la cohesión verbal están ajustadas a español bíblico contemporáneo.
