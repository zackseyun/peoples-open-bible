translation:
  language: es
  text: 'Yahvé de los ejércitos[a], el Dios de Israel, dice: He aquí, voy a castigar a Amón de No, y al Faraón, y a Egipto, y a sus dioses, y a sus reyes, y al Faraón, y a los que confían en él[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Amón de Tebas». «No» es el nombre hebreo de la ciudad egipcia comúnmente identificada con Tebas.
    reason: cultural_note
  - marker: b
    text: O «los que confían en él», si el pronombre se entiende como referencia a Egipto y no al Faraón.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: conservar el Tetragrámaton en forma visible y no enmascararlo. En español, ''Yahvé'' es la forma directa y reconocible, más adecuada que ''SEÑOR'' para un texto auditable.'
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: '''Ejércitos'' preserva la amplitud del título divino sin reducirlo solo a tropas humanas. Es un equivalente natural en español y mantiene la fuerza tradicional del hebreo.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios del Israel
  lexicon: HALOT
  rationale: Construcción posesiva directa y natural en español, sin añadir matiz interpretativo. Refleja con claridad la identificación del Dios de Israel.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am about to
  chosen_spanish: He aquí, voy a
  alternatives_spanish:
  - He aquí, estoy por
  - Miren, voy a
  lexicon: HALOT
  rationale: '''He aquí'' conserva la solemnidad profética; ''voy a'' comunica la inminencia que el audit trail inglés destaca. Evita un calco rígido y suena natural en español.'
- source_word: פוֹקֵד
  english_pob_choice: punish
  chosen_spanish: castigar
  alternatives_spanish:
  - visitar con juicio
  - traer juicio sobre
  - pedir cuentas a
  lexicon: HALOT
  rationale: En contexto de juicio, el sentido es retributivo/judicial. 'Castigar' comunica mejor ese valor que un 'visitar' arcaico, sin perder la solemnidad del oráculo.
- source_word: אָמוֹן מִנֹּא
  english_pob_choice: Amon of No
  chosen_spanish: Amón de No
  alternatives_spanish:
  - Amón de Tebas
  - Amón de Nô
  lexicon: HALOT
  rationale: Se conserva la relación nominal del hebreo y la forma transliterada de la deidad. 'No' se mantiene como topónimo transliterado; la identificación con Tebas queda mejor para nota, no para el texto principal.
- source_word: וְעַל
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - y contra
  - y sobre
  lexicon: HALOT
  rationale: La repetición de וְעַל en la lista se vierte con 'y' para mantener el encadenamiento acusativo/judicial en español sin recargar la sintaxis.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el Faraón
  alternatives_spanish:
  - Faraón
  lexicon: HALOT
  rationale: Título regnal estándar y claro en español. Se mantiene con artículo cuando funciona como referente concreto en la lista.
- source_word: מִצְרַיִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: HALOT
  rationale: Nombre geográfico estándar, sin ampliación innecesaria.
- source_word: אֱלֹהֶיהָ
  english_pob_choice: her gods
  chosen_spanish: sus dioses
  alternatives_spanish:
  - sus dioses
  - los dioses de ella
  lexicon: HALOT
  rationale: En español, el posesivo 'sus' evita forzar un femenino personal que sonaría extraña para una nación. El hebreo lleva sufijo femenino; el referente es Egipto, no una persona.
- source_word: מְלָכֶיהָ
  english_pob_choice: her kings
  chosen_spanish: sus reyes
  alternatives_spanish:
  - sus reyes
  - los reyes de ella
  lexicon: HALOT
  rationale: Se conserva el paralelismo con 'sus dioses'. 'Reyes' refleja la pluralidad del hebreo y deja abierta la referencia a gobernantes o dinastías dependientes.
- source_word: הַבֹּטְחִים בּוֹ
  english_pob_choice: those who trust in him
  chosen_spanish: los que confían en él
  alternatives_spanish:
  - los que confían en él
  - los que se apoyan en él
  - los que ponen su confianza en él
  lexicon: HALOT
  rationale: '''Confiar en'' es la equivalencia natural para בָּטַח. Se conserva el objeto personal masculino singular, siguiendo la lectura del audit trail inglés que lo refiere a Faraón.'
theological_decisions:
- issue: Destino del juicio en la cadena 'Amon of No... and Pharaoh, and Egypt...'
  english_pob_reading: Behold, I am about to punish Amon of No, and Pharaoh, and Egypt...
  chosen_spanish_reading: He aquí, voy a castigar a Amón de No, y al Faraón, y a Egipto...
  alternative_spanish_readings:
  - He aquí, voy a traer juicio sobre Amón de No, y al Faraón, y a Egipto...
  rationale: Se conserva la secuencia acumulativa de destinatarios del juicio sin suavizarla. 'Castigar' mantiene el carácter judicial del anuncio profético.
  doctrine_reference: Jr 46:25; juicio divino sobre naciones e ídolos
- issue: Referente del pronombre final בּוֹ
  english_pob_reading: those who trust in him
  chosen_spanish_reading: los que confían en él
  alternative_spanish_readings:
  - los que confían en ello
  - los que confían en ella
  rationale: 'Se sigue la lectura preferida del audit trail: el pronombre masculino singular apunta a Faraón, el antecedente más cercano y explícito. Mantener ''él'' en español preserva esa tensión interpretativa.'
  doctrine_reference: Jr 46:25; condena de la confianza en poderes humanos
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el audit trail inglés y la revisión más reciente no introdujo cambios. La única tensión relevante es el referente del pronombre final; se conserva la lectura preferida por cercanía sintáctica, con nota alternativa. También se mantiene 'No' como topónimo transliterado en el texto principal y se aclara su identificación cultural en nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - '''Dios'' se usa para אֱלֹהִים sin singularizar ni pluralizar artificialmente.'
  - Se evita 'SEÑOR' como sustituto del Tetragrámaton.
  - La repetición de 'y al Faraón' refleja la duplicación del hebreo, sin eliminar la repetición retórica.
  - El posesivo 'sus' se usa para los objetos plurales de Egipto por naturalidad del español, aunque el hebreo use sufijo femenino singular.
