  to: Cuando él estableció los cielos, yo estaba allí, cuando trazó un círculo[a] sobre la faz de la profundidad.
  rationale: 'Se ajusta la segunda mitad del versículo para acercarla más estrechamente al hebreo y a la racionalidad léxica del POB inglés: ''faz'' preserva mejor עַל־פְּנֵי, y ''la profundidad'' evita las asociaciones de ''abismo'' que el audit trail procuró no introducir. La nota se corrige para ofrecer una alternativa real al verbo principal.'
