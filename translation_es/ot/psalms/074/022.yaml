revisions:
- from: Levántate[a], oh Dios; defiende tu causa. Recuerda tu afrenta[b] que viene del necio, todo el día.
  to: Levántate[a], Oh Dios; defiende tu causa. Recuerda tu afrenta de parte del necio[b], todo el día.
  rationale: Se corrigen los anclajes de las notas para que correspondan a las palabras adecuadas, se ajusta la nota [a] para que funcione como alternativa léxica del imperativo inicial conforme al rastro inglés, y se mueve la nota cultural a «necio». También se suaviza la expresión de origen con «de parte del necio», que suena más natural en español sin perder la fuerza de מן, y se mejora la presentación del vocativo.
