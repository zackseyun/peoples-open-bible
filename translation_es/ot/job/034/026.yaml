translation:
  language: es
  text: Él los golpea como[a] impíos, en un lugar donde todos pueden ver[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «bajo los impíos» / «en lugar de los impíos». El hebreo puede entenderse de modo más literal o como una expresión idiomática.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ante los que miran» / «a la vista de observadores». El hebreo literalmente dice «los que ven».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּחַת
  english_pob_choice: as wicked men / in the place of the wicked
  chosen_spanish: como
  alternatives_spanish:
  - en lugar de
  - bajo
  - como si fueran impíos
  lexicon: HALOT
  rationale: En este contexto poético-judicial, תַּחַת con רְשָׁעִים expresa una relación de correspondencia o identificación con los impíos más que una simple localización. En español, «como» comunica esa función sin forzar una frase poco natural ni perder la tensión interpretativa.
- source_word: רְשָׁעִים
  english_pob_choice: wicked men
  chosen_spanish: impíos
  alternatives_spanish:
  - malvados
  - malhechores
  - gente impía
  lexicon: HALOT
  rationale: El sustantivo/adjetivo plural designa a personas impías o malvadas. «Impíos» conserva el valor moral y judicial del término hebreo con un registro bíblico claro y natural en español.
- source_word: סְפָקָם
  english_pob_choice: He strikes them down
  chosen_spanish: los derriba
  alternatives_spanish:
  - los hiere
  - los golpea
  - los abate
  lexicon: HALOT
  rationale: El verbo aquí denota un golpe/acto violento de juicio. «Los derriba» transmite con naturalidad la acción decisiva y punitiva del texto, sin suavizarla ni introducir una imagen ajena.
- source_word: בִּמְקוֹם
  english_pob_choice: in a place
  chosen_spanish: en un lugar
  alternatives_spanish:
  - en la presencia
  - en el sitio
  - en un sitio
  lexicon: HALOT
  rationale: La construcción introduce una localización abierta y expuesta. «En un lugar» preserva el sentido locativo general y combina bien con la frase siguiente sobre la visibilidad pública.
- source_word: רֹאִים
  english_pob_choice: where people can see
  chosen_spanish: donde se les puede ver
  alternatives_spanish:
  - ante los que miran
  - a la vista de observadores
  - en presencia de quienes ven
  lexicon: HALOT
  rationale: El participio significa literalmente «los que ven» u «observadores». En español, «donde se les puede ver» conserva la idea de exposición pública de manera idiomática, sin perder la referencia a quienes miran.
theological_decisions:
- issue: Interpretación de תַּחַת רְשָׁעִים
  english_pob_reading: The phrase may also be understood more literally as 'under the wicked' or idiomatically as 'as wicked people.'
  chosen_spanish_reading: como impíos
  alternative_spanish_readings:
  - bajo los impíos
  - en lugar de los impíos
  - como gente impía
  rationale: La evidencia del texto y del auditorio inglés favorece una lectura idiomática o de correspondencia más que una mera localización física. «Como impíos» mantiene abierta la tensión entre lectura literal e idiomática sin imponer una sola solución.
  doctrine_reference: Job 34:26; uso poético de תחת en contexto de juicio
- issue: Visibilidad pública del castigo
  english_pob_reading: in a place where people can see
  chosen_spanish_reading: en un lugar donde se les puede ver
  alternative_spanish_readings:
  - a la vista de los observadores
  - ante los que miran
  - en presencia de testigos
  rationale: El hebreo con בִּמְקוֹם רֹאִים enfatiza una escena pública, visible. La formulación elegida conserva esa exposición sin añadir testigos explícitos que el hebreo no nombra directamente.
  doctrine_reference: Job 34:26; valor del participio רֹאִים
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que prefirió «as wicked men» frente a «in the place of the wicked», y se reflejó esa decisión con una solución española idiomática («como impíos») sin perder la posibilidad de lectura más literal en la nota.
  spanish_consistency_notes:
  - Se mantuvo «Dios»/«Yahvé» fuera del versículo porque el hebreo no los contiene aquí.
  - Se evitó «SEÑOR» y se conservó un registro poético sobrio acorde con el libro de Job.
  - «Impíos» funciona aquí como sustantivo/adjetivo colectivo y reproduce el tono judicial del hebreo.
  - La cláusula final conserva el carácter público de רֹאִים sin volverla más explícita que el original.
