    text: El hebreo puede también entenderse como 'otra madura' o algo parecido a partir de גּוֹמֵל; pero el testimonio griego dice 'otra nace', lo cual encaja con la comparación de generaciones sucesivas y se sigue aquí con una formulación más abierta.
    reason: alternative_reading
