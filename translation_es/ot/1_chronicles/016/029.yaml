translation:
  language: es
  text: Atribuyan a Yahvé la gloria debida a su nombre; traigan una ofrenda y vengan ante él. Inclínense ante Yahvé en santo esplendor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'en el esplendor de la santidad'; posiblemente, 'con vestiduras santas'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָבוּ
  english_pob_choice: Ascribe
  chosen_spanish: Atribuyan
  alternatives_spanish:
  - Reconozcan
  - Den
  lexicon: HALOT
  rationale: En este imperativo litúrgico, el hebreo pide reconocer o atribuir honor a Yahvé, no transferirle algo material. En español, 'atribuyan' conserva la idea de asignar o reconocer la gloria que le corresponde.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - al SEÑOR
  - a Yahweh
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre divino directo, y la pauta del proyecto requiere 'Yahvé' en el texto principal. 'A Yahvé' preserva el nombre del pacto sin sustituirlo por una máscara litúrgica.
- source_word: כְּבוֹד שְׁמוֹ
  english_pob_choice: the glory due his name
  chosen_spanish: la gloria debida a su nombre
  alternatives_spanish:
  - la gloria de su nombre
  - gloria a su nombre
  lexicon: HALOT
  rationale: El constructo comunica gloria asociada a su nombre y, por contexto, gloria que le corresponde. 'Debida a su nombre' expresa esa fuerza idiomática de manera natural en español.
- source_word: שְׂאוּ
  english_pob_choice: bring
  chosen_spanish: traigan
  alternatives_spanish:
  - lleven
  - presenten
  lexicon: HALOT
  rationale: Con מִנְחָה, el verbo 'levantar/cargar' funciona idiomáticamente como llevar o presentar una ofrenda. 'Traigan' conserva esa acción cultual sin forzar una traducción literal poco natural.
- source_word: מִנְחָה
  english_pob_choice: an offering
  chosen_spanish: una ofrenda
  alternatives_spanish:
  - un presente
  - una ofrenda de tributo
  lexicon: HALOT
  rationale: Es un término amplio de regalo/ofrenda sacrificial. 'Ofrenda' es la opción más clara y sobria en español sin precisar indebidamente el tipo de ofrenda.
- source_word: וּבֹאוּ לְפָנָיו
  english_pob_choice: and come before him
  chosen_spanish: y entren delante de él
  alternatives_spanish:
  - y vengan ante él
  - y se acerquen a su presencia
  lexicon: HALOT
  rationale: La expresión es un modismo reverencial de acercamiento para el culto. 'Entren delante de él' preserva la imagen espacial y el tono solemne sin expandir innecesariamente el sentido.
- source_word: הִשְׁתַּחֲוּוּ
  english_pob_choice: Bow down
  chosen_spanish: Inclínense
  alternatives_spanish:
  - adórenlo
  - prostérnense
  lexicon: HALOT
  rationale: El verbo denota el gesto corporal de inclinarse o postrarse, normalmente en adoración. 'Inclínense' mantiene ese matiz físico y evita reducirlo solo a un acto abstracto de culto.
- source_word: בְּהַדְרַת קֹדֶשׁ
  english_pob_choice: in holy splendor
  chosen_spanish: en santo esplendor
  alternatives_spanish:
  - en el esplendor de la santidad
  - con vestiduras santas
  lexicon: HALOT
  rationale: 'La frase es poética y ambigua: puede aludir al esplendor propio de la santidad o a un adorno/vestidura santa. ''Santo esplendor'' conserva la ambigüedad y el valor estético-teológico del original.'
theological_decisions:
- issue: Renderización del Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton. En esta serie, el español del proyecto adopta 'Yahvé' como forma principal para hacer auditable el Nombre del pacto y no ocultarlo tras una sustitución devocional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Interpretación de בְּהַדְרַת קֹדֶשׁ
  english_pob_reading: in holy splendor
  chosen_spanish_reading: en santo esplendor
  alternative_spanish_readings:
  - en el esplendor de la santidad
  - con vestiduras santas
  rationale: La construcción hebrea es compacta y permite más de una lectura legítima. Se preserva la tensión entre belleza sagrada y posible atuendo cultual sin resolverla de forma excesiva.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo de WLC y coincide con la auditoría inglesa: mantiene el Nombre divino, el paralelismo imperativo, el valor idiomático de מִנְחָה y la ambigüedad de בְּהַדְרַת קֹדֶשׁ. No se detectaron revisiones aplicadas en el último pase, y la coincidencia con el control cruzado fue alta.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה, según la directriz del proyecto.
  - '''Ofrenda'' se mantiene como término general para מִנְחָה, sin especificación sacrificial añadida.'
  - '''Inclínense'' conserva el componente corporal de הִשְׁתַּחֲוּוּ sin perder el sentido de adoración.'
  - La nota al pie preserva la alternativa legítima para בְּהַדְרַת קֹדֶשׁ sin resolver la ambigüedad.
