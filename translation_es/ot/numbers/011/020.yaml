revisions:
- from: 'por un mes entero[a], hasta que salga por tus narices y se vuelva algo repugnante para ti, porque han rechazado a Yahvé, que está en medio de ustedes, y han llorado delante de él, diciendo: “¿Por qué salimos de Egipto?”'
  to: 'por un mes entero, hasta que salga por sus narices y les resulte repugnante[a], porque han rechazado a Yahvé, que está en medio de ustedes, y han llorado delante de él, diciendo: “¿Por qué salimos de Egipto?”'
  rationale: Se corrigió la segunda persona para mantener de forma uniforme el plural comunitario del hebreo y del contexto ('sus', 'les', 'ustedes'). También se movió la nota al término que realmente comenta, la expresión de repulsión, y se ajustó la redacción a un español más natural sin perder la fuerza gráfica del original.
