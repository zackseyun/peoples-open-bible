translation:
  language: es
  text: Y al tiempo de su descanso sobre su lecho, testificó ante Yahvé y su ungido.[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase hebrea puede entenderse también como 'su reposo' o, de manera interpretativa, 'su muerte'; aquí se mantiene un sentido más cercano al descanso sobre el lecho.
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego de este versículo es muy distinto: ''y destruyó a los jefes de Tiro y a todos los gobernantes de los filisteos''. Esto señala una divergencia textual importante entre los testigos hebreo y griego.'
    reason: textual_variant
lexical_decisions:
- source_word: ועת
  english_pob_choice: And at the time of
  chosen_spanish: Y al tiempo de
  alternatives_spanish:
  - Y cuando
  - Al tiempo de
  - Y cuando llegó el momento de
  lexicon: HALOT
  rationale: La construcción temporal del hebreo se conserva con una fórmula natural en español que mantiene el enlace narrativo y el sentido de momento preciso.
- source_word: נוחו
  english_pob_choice: his resting
  chosen_spanish: su descanso
  alternatives_spanish:
  - su reposo
  - su resting (calco no idiomático)
  - su muerte
  lexicon: HALOT
  rationale: En español, 'descanso' comunica la acción o estado de reposar sin forzar la lectura a 'muerte' como glosa interpretativa. Preserva la ambigüedad controlada del hebreo.
- source_word: על משכבו
  english_pob_choice: on his bed
  chosen_spanish: sobre su lecho
  alternatives_spanish:
  - en su cama
  - sobre su cama
  - en su lecho
  lexicon: HALOT
  rationale: '''Lecho'' conserva el matiz bíblico de lugar de acostarse y evita modernizar demasiado con ''cama'' si el registro busca dignidad literaria.'
- source_word: העיד
  english_pob_choice: he testified before
  chosen_spanish: testificó ante
  alternatives_spanish:
  - dio testimonio ante
  - atestiguó ante
  - llamó como testigos a
  lexicon: HALOT
  rationale: '''Testificó ante'' refleja bien el valor de העיד en un contexto formal. ''Ante'' evita añadir una idea de dirección verbal que no está en el hebreo y mantiene la relación con las dos entidades invocadas.'
- source_word: יהוה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - el Señor
  lexicon: HALOT
  rationale: 'Se sigue la norma del proyecto para el Tetragrámaton: ''Yahvé'' en el texto principal, sin enmascararlo con un sustituto litúrgico.'
- source_word: משיחו
  english_pob_choice: his anointed one
  chosen_spanish: su ungido
  alternatives_spanish:
  - su Mesías
  - su ungido real
  - su rey ungido
  lexicon: HALOT
  rationale: '''Ungido'' reproduce el valor léxico de משיח sin imponer la carga cristológica de ''Mesías'' ni concretar innecesariamente el referente histórico. Mantiene la tensión del título, como hace la POB en inglés.'
theological_decisions:
- issue: Título משיחו y posible carga mesiánica
  english_pob_reading: his anointed one
  chosen_spanish_reading: su ungido
  alternative_spanish_readings:
  - su Mesías
  - su rey ungido
  rationale: La frase hebrea usa un título real/consagrado y el contexto inmediato no obliga a una identificación mesiánica escatológica. 'Su ungido' preserva la ambigüedad histórica y el enlace con la raíz de 'Mesías' sin resolverlo prematuramente.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; reservar nombres propios para nombres propios; mantener tensiones léxicas cuando el original las conserva.'
- issue: Relación semántica de העיד con los objetos divinos
  english_pob_reading: he testified before Yahweh and his anointed one
  chosen_spanish_reading: testificó ante Yahvé y su ungido
  alternative_spanish_readings:
  - dio testimonio ante Yahvé y su ungido
  - llamó a Yahvé y a su ungido como testigos
  rationale: '''Testificó ante'' respeta el acto verbal sin convertirlo en una fórmula legal técnica más fuerte que la del hebreo. También preserva la posibilidad de leer la escena como una declaración solemne en presencia de ambas figuras.'
  doctrine_reference: 'DOCTRINE.md: evitar añadir solemnidades o inferencias no exigidas por el texto fuente.'
translation_notes:
  revision_awareness: El inglés POB pasó de 'called ... to witness' a 'testified before' para reflejar más directamente העיד. En español se siguió esa revisión con 'testificó ante', manteniendo además la lectura del hebreo frente a la divergencia notable del griego.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme a la terminología del proyecto para יהוה.
  - Se mantiene 'ungido' y no 'Mesías' en el texto principal para conservar la neutralidad del título hebreo.
  - El registro es bíblico-formal pero con español natural, evitando calcos innecesarios.
  - La nota griega se conserva porque el expediente textual documenta una divergencia sustancial entre hebreo y griego.
