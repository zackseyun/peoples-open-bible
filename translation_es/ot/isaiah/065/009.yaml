translation:
  language: es
  text: Y haré surgir descendencia de Jacob[a], y de Judá un heredero de mis montes; mis escogidos la poseerán[b], y mis siervos habitarán allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘simiente de Jacob’. זֶרַע es un sustantivo colectivo que puede significar ‘simiente’, ‘descendencia’ o ‘descendientes’.
    reason: lexical_alternative
  - marker: b
    text: O ‘la heredarán’. El mismo verbo hebreo se usa para ‘heredero’ y para ‘poseer’, uniendo herencia y posesión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹצֵאתִי
  english_pob_choice: And I will bring forth
  chosen_spanish: y sacaré
  alternatives_spanish:
  - y haré salir
  - y traeré
  lexicon: HALOT
  rationale: El verbo hiphil de יצא tiene fuerza causativa. En español, ‘sacaré’ comunica bien la idea de hacer salir o hacer aparecer descendencia sin sonar forzado. Mantiene la imagen de producción/custodia divina sin añadir contenido.
- source_word: מִיַּעֲקֹב
  english_pob_choice: from Jacob
  chosen_spanish: de Jacob
  alternatives_spanish:
  - desde Jacob
  - fuera de Jacob
  lexicon: HALOT
  rationale: La preposición מן se expresa de manera natural con ‘de’ en español. Se conserva el nombre propio Jacob para mantener el vínculo genealógico y pactual.
- source_word: זֶרַע
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - simiente
  - semilla
  - descendientes
  lexicon: HALOT
  rationale: זֶרַע puede ser colectivo. ‘Descendencia’ preserva ese valor colectivo y es más transparente en español moderno que ‘simiente’, sin perder la referencia genealógica.
- source_word: וּמִיהוּדָה
  english_pob_choice: and from Judah
  chosen_spanish: y de Judá
  alternatives_spanish:
  - y desde Judá
  lexicon: HALOT
  rationale: Se mantiene el nombre tribal/geográfico Judá con la preposición simple ‘de’, paralelo a ‘de Jacob’.
- source_word: יוֹרֵשׁ
  english_pob_choice: an heir
  chosen_spanish: un heredero
  alternatives_spanish:
  - uno que hereda
  - un poseedor
  lexicon: HALOT
  rationale: El participio de ירש indica quien hereda o posee por derecho. ‘Heredero’ es natural en español y conserva la idea de recepción por herencia.
- source_word: הָרָי
  english_pob_choice: my mountains
  chosen_spanish: mis montes
  alternatives_spanish:
  - mis montañas
  - mi tierra montañosa
  lexicon: HALOT
  rationale: ‘Montes’ reproduce con buena naturalidad el plural hebreo y el tono bíblico, sin desplazar la imagen concreta a una abstracción como ‘tierra’. Se mantiene el posesivo de primera persona para reflejar el hebreo.
- source_word: וִירֵשׁוּהָ
  english_pob_choice: will possess it
  chosen_spanish: la poseerán
  alternatives_spanish:
  - la heredarán
  - poseerán eso
  lexicon: HALOT
  rationale: El verbo חוזר a ירש. El sufijo apunta a la referencia antecedente singular colectiva de ‘mis montes’, por eso en español se usa ‘la’ para concordar con el antecedente implícito singular/colectivo, siguiendo el ajuste auditado en inglés.
- source_word: בְחִירַי
  english_pob_choice: my chosen ones
  chosen_spanish: mis escogidos
  alternatives_spanish:
  - mis elegidos
  - mis escogidos por mí
  lexicon: HALOT
  rationale: ‘Escogidos’ expresa el valor de ‘los elegidos’ sin cargar de más el término técnico ‘electos’. Conserva el sentido de elección divina.
- source_word: וַעֲבָדַי
  english_pob_choice: my servants
  chosen_spanish: mis siervos
  alternatives_spanish:
  - mis servidores
  - mis esclavos
  lexicon: HALOT
  rationale: Aunque עבד puede tener fuerza de esclavo, aquí el contexto de pertenencia y servicio a Dios hace que ‘siervos’ sea la opción más idiomática y reverente en español eclesial, sin introducir una dureza no resaltada por el contexto.
- source_word: יִשְׁכְּנוּ שָׁמָּה
  english_pob_choice: will dwell there
  chosen_spanish: habitarán allí
  alternatives_spanish:
  - morarán allí
  - vivirán allí
  lexicon: HALOT
  rationale: שכן suele significar habitar/dwelling. ‘Habitarán allí’ conserva registro bíblico digno y claro en español, sin sonar arcaizante en exceso.
theological_decisions:
- issue: Referencia de ‘mis montes’ y el alcance de la promesa
  english_pob_reading: Retain the concrete territorial language 'my mountains' without reducing it to a purely symbolic promise.
  chosen_spanish_reading: Conservar ‘mis montes’ como lenguaje territorial concreto, sin reducirlo a una promesa solo simbólica.
  alternative_spanish_readings:
  - interpretarlo como ‘mi tierra’
  - espiritualizarlo como bendición escatológica solamente
  rationale: El hebreo dice literalmente ‘mis montes’. La traducción preserva la imagen concreta y deja abiertas las cuestiones de cumplimiento teológico sin resolverlas en el texto mismo.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: El texto inglés pasó de ‘them’ a ‘it’ para concordar con el antecedente singular colectivo ‘my mountains’; por eso en español se reflejó ‘la poseerán’, manteniendo la referencia singular colectiva de הָרָי y la repetición de ירש en clave de herencia/posesión.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el nombre divino explícito en el hebreo.
  - Se conserva el paralelismo verbal entre ‘heredero’ y ‘poseerán’ para reflejar la repetición de ירש.
  - ‘Mis escogidos’ y ‘mis siervos’ siguen el patrón posesivo de primera persona del hebreo.
  - La puntuación separa las cláusulas como en un registro bíblico claro y publicable.
