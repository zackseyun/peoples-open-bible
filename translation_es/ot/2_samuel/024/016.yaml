base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/024/016.yaml
  text: When the angel stretched out his hand toward Jerusalem to destroy it[a], Yahweh relented concerning the calamity and said to the angel who was destroying the people, “Enough[b]; now withdraw your hand.” And the angel of Yahweh was by the threshing floor of Araunah the Jebusite.
  footnotes:
  - marker: a
    text: Or, “the LORD relented from the disaster.” The Hebrew says literally “relented concerning the calamity/disaster,” with רָעָה here meaning calamity, not moral evil.
    reason: lexical_alternative
  - marker: b
    text: Araunah is called Ornan in the parallel account in 1 Chronicles 21:15.
    reason: cross_reference
