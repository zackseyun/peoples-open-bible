id: ACT.26.11
reference: Acts 26:11
source:
  edition: SBLGNT
  text: καὶ κατὰ πάσας τὰς συναγωγὰς πολλάκις τιμωρῶν αὐτοὺς ἠνάγκαζον βλασφημεῖν, περισσῶς τε ἐμμαινόμενος αὐτοῖς ἐδίωκον ἕως καὶ εἰς τὰς ἔξω πόλεις.
translation:
  text: And in all the synagogues[a], punishing them many times, I tried to force them to blaspheme; and being exceedingly enraged against them, I kept persecuting them even to the foreign cities.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more literally, 'even to cities outside'; the phrase likely refers to cities beyond Judea.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ πάσας τὰς συναγωγάς
  chosen: in all the synagogues
  alternatives:
  - throughout all the synagogues
  - from synagogue to synagogue
  lexicon: BDAG
  rationale: κατά with the accusative here is distributive/local, indicating repeated action across the synagogue settings. 'In all the synagogues' is natural English and preserves the scope without over-paraphrasing.
- source_word: πολλάκις
  chosen: many times
  alternatives:
  - often
  - frequently
  lexicon: BDAG
  rationale: The adverb emphasizes repeated occurrence. 'Many times' keeps the iterative force more explicitly than the smoother 'often'.
- source_word: τιμωρῶν
  chosen: as I punished
  alternatives:
  - punishing
  - while punishing
  - as I was punishing
  lexicon: BDAG
  rationale: The participle is contemporaneous with the main verb and describes means/circumstance. 'As I punished' reads naturally in English while preserving the ongoing/repeated sense.
- source_word: ἠνάγκαζον
  chosen: I tried to force
  alternatives:
  - I forced
  - I compelled
  lexicon: BDAG
  rationale: The imperfect indicates repeated attempted action in past time. In this context, 'tried to force' better reflects the imperfective nuance than a simple completed 'forced,' while still conveying coercion.
- source_word: βλασφημεῖν
  chosen: to blaspheme
  alternatives:
  - to speak blasphemously
  - to renounce with blasphemy
  lexicon: BDAG
  rationale: The infinitive most directly denotes uttering blasphemy, likely against Jesus/the Christian confession in context. 'To blaspheme' is the standard concise rendering and avoids importing a narrower interpretation into the main text.
- source_word: περισσῶς
  chosen: exceedingly
  alternatives:
  - furiously
  - beyond measure
  - extremely
  lexicon: BDAG
  rationale: The adverb intensifies Paul's hostile state. 'Exceedingly' preserves the degree of excess without collapsing it into a purely emotional paraphrase.
- source_word: ἐμμαινόμενος
  chosen: being enraged
  alternatives:
  - being mad
  - raging
  - being driven mad with fury
  lexicon: BDAG
  rationale: The verb conveys furious, frenzied hostility. 'Being enraged' communicates the sense in clear modern English without the misleading connotations of mental illness that 'mad' may carry in contemporary usage.
- source_word: ἐδίωκον
  chosen: I kept persecuting
  alternatives:
  - I persecuted
  - I pursued
  lexicon: BDAG
  rationale: The imperfect again marks ongoing/repeated action. Because διώκω in Acts commonly refers to hostile pursuit of believers, 'I kept persecuting' preserves both aspect and contextual meaning.
- source_word: ἕως καὶ εἰς τὰς ἔξω πόλεις
  chosen: even to foreign cities
  alternatives:
  - even to cities outside the land
  - even to outside cities
  - even to cities beyond
  lexicon: BDAG
  rationale: ἔξω here means outside, beyond the local/national sphere. In Paul's recounting of extending persecution beyond Jerusalem/Judea, 'foreign cities' captures the sense idiomatically for English readers, though more literally it is 'outside cities.'
