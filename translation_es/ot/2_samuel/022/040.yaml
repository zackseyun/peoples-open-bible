    text: Or 'You girded me with strength for battle.' The Hebrew verb carries the imagery of girding or equipping, which can be rendered more formally that way.
    reason: lexical_alternative
  - marker: b
    text: Or 'you caused my adversaries to bow under me.' The verb can more literally express forcing opponents to kneel or bow down.
