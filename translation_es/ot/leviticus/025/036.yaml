  text: אַל תִּקַּ֤ח מֵֽ/אִתּ/וֹ֙ נֶ֣שֶׁךְ וְ/תַרְבִּ֔ית וְ/יָרֵ֖אתָ מֵֽ/אֱלֹהֶ֑י/ךָ וְ/חֵ֥י אָחִ֖י/ךָ עִמָּֽ/ךְ־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/025/036.yaml
  text: Do not take interest or profit from him[a], but fear your God[b], and let your brother live with you.
  footnotes:
  - marker: a
    text: Or 'increase' or 'gain' for 'profit'; the Hebrew pairs two related terms for interest extracted from a poor borrower.
    reason: lexical_alternative
  - marker: b
    text: '''Your brother'' here means a fellow member of the covenant community, not necessarily a biological brother.'
