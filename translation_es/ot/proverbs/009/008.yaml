review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del hebreo: prohibición + consecuencia negativa, seguido de mandato + consecuencia positiva. «Reprender» corresponde adecuadamente a יכח en ambas cláusulas, y «te amará» transmite bien el imperfecto resultativo final. Sin embargo, «para que no te odie» no es la mejor equivalencia de פֶּן, porque en español suele expresar propósito más que advertencia; «no sea que te odie» preserva mejor la relación de consecuencia a evitar. Además, el hebreo לְחָכָם es indefinido («a un sabio»), mientras que «al sabio» puede sonar demasiado definido o tipificado en español.'
  spanish_quality_summary: El español es claro y digno, pero admite una mejora menor para mayor naturalidad y fidelidad. «Escarnecedor» es comprensible y apropiado en registro sapiencial. La frase «para que no te odie» suena menos precisa que «no sea que te odie». También conviene ajustar la nota b, que actualmente lleva comillas y puntuación poco naturales en español editorial.
  glossary_alignment: No hay términos del glosario principal comprometidos aquí. La elección de «escarnecedor» para לֵץ es defendible y coherente con el perfil moral del término; la alternativa «burlón» queda bien en nota. El tratamiento del masculino representativo debe seguir la rationale documentada; en español «a un sabio» conserva mejor la indefinición del hebreo que «al sabio», sin neutralizar el género.
  issues:
  - severity: medium
    issue: «para que no te odie» para פֶּן
    rationale: פֶּן introduce una consecuencia negativa a evitar («no sea que», «lest»), no un propósito. «Para que no» puede leerse como finalidad del mandato en vez de advertencia.
  - severity: medium
    issue: «al sabio» suena demasiado definido frente a לְחָכָם
    rationale: El hebreo usa un singular masculino representativo e indefinido. «A un sabio» preserva mejor ese valor proverbial sin cambiar la decisión teológica de mantener el masculino singular.
  - severity: low
    issue: Redacción editorial de la nota b
    rationale: 'La nota empieza con una comilla innecesaria y puede expresarse con español más natural: «Hebreo “a un sabio”...».'
  revised_spanish_text: No reprendas al escarnecedor[a], no sea que te odie; reprende a un sabio[b], y te amará.
