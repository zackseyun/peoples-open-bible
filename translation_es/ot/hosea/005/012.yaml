translation:
  language: es
  text: Así que yo soy como polilla para Efraín, y como podredumbre[a] para la casa de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «como decadencia» o «como corrupción». La imagen hebrea comunica corrupción interna y desgaste progresivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: So I
  chosen_spanish: Así yo
  alternatives_spanish:
  - Y yo
  - Pero yo
  lexicon: HALOT
  rationale: El hebreo introduce una declaración divina nueva y enfática. «Así yo» conserva esa transición causal/consecutiva que el inglés POB captó con «So I», y mantiene el pronombre explícito para la fuerza del sujeto.
- source_word: כָעָשׁ
  english_pob_choice: like a moth
  chosen_spanish: como polilla
  alternatives_spanish:
  - como una polilla
  - como polilla devoradora
  lexicon: HALOT
  rationale: עָשׁ denota una polilla como imagen de consumo gradual. «Como polilla» conserva la metáfora con naturalidad en español y evita explicitar más de lo que el hebreo dice.
- source_word: לְאֶפְרָיִם
  english_pob_choice: to Ephraim
  chosen_spanish: para Efraín
  alternatives_spanish:
  - a Efraín
  - contra Efraín
  lexicon: HALOT
  rationale: La preposición ל aquí señala el blanco o el efecto respecto de Efraín. En español, «para Efraín» comunica la relación de destinación/afectación de manera natural sin borrar el referente tribal o nacional.
- source_word: וְכָרָקָב
  english_pob_choice: and like rot
  chosen_spanish: y como podredumbre
  alternatives_spanish:
  - y como rot
  - y como descomposición
  lexicon: HALOT
  rationale: רָקָב expresa corrupción interna y deterioro. «Podredumbre» conserva la fuerza imagística y la idea de descomposición progresiva que el POB inglés explicó con «rot/rottenness/decay».
- source_word: לְבֵית יְהוּדָה
  english_pob_choice: to the house of Judah
  chosen_spanish: para la casa de Judá
  alternatives_spanish:
  - a la casa de Judá
  - para Judá
  lexicon: HALOT
  rationale: «Casa de Judá» preserva la expresión corporativa hebrea. «Para» mantiene el valor de afectación/relación del ל en un español más fluido que «a», sin reducirlo simplemente a «Judá».
theological_decisions:
- issue: Imagen divina de juicio gradual y destructivo
  english_pob_reading: YHWH compares himself to a moth and to rot—images of gradual judgment against Ephraim and Judah.
  chosen_spanish_reading: 'Yahvé se compara con una polilla y con la podredumbre: imágenes de juicio gradual que consumen internamente a Efraín y a Judá.'
  alternative_spanish_readings:
  - Yahvé los consumirá como polilla y hará que Judá se pudra
  - Soy como polilla para Efraín y como podredumbre para Judá
  rationale: El hebreo usa similes nominales, no una paráfrasis verbal. La traducción española conserva la imagen y su ambigüedad retórica, evitando convertirla en una explicación más interpretativa que el texto fuente.
  doctrine_reference: 'Principio de equivalencia óptima: mantener la metáfora profética sin añadir desarrollo explicativo no presente en el hebreo.'
translation_notes:
  revision_awareness: 'La versión española sigue el audit trail inglés sin copiarlo mecánicamente: conserva el paralelismo nominal del hebreo, mantiene los nombres propios específicos (Efraín, casa de Judá) y traduce la imagen de juicio con un español natural y bíblicamente transparente. No se registraron revisiones posteriores que alteraran la lectura base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según el estándar del proyecto.
  - Se mantiene «Efraín» como designación específica y no se generaliza a «Israel».
  - «Casa de Judá» conserva el valor colectivo del hebreo.
  - La metáfora se preserva sin verbalizarla en exceso, para respetar la forma nominal del original.
