translation:
  language: es
  text: y para los albañiles[a], y para los canteros, y para comprar madera y piedra de cantera[b] para reparar[c] el daño de la casa de Yahvé, y para todos los gastos[d] de la casa para repararla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘constructores’ para ‘albañiles’. El término hebreo puede referirse de manera más amplia a quienes trabajan en albañilería o reparación de muros.
    reason: lexical_alternative
  - marker: b
    text: O ‘piedra labrada’ o ‘piedra tallada’.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, ‘para fortalecer el daño/quebrantamiento de la casa de Yahvé’.
    reason: lexical_alternative
  - marker: d
    text: Literalmente, ‘para todo lo que sale sobre la casa’; es decir, todos los gastos incurridos para su reparación.
    reason: lexical_alternative
lexical_decisions:
- source_word: גֹּדְרִים
  english_pob_choice: masons
  chosen_spanish: albañiles
  alternatives_spanish:
  - masones
  - constructores
  - albañiles de muro
  lexicon: HALOT
  rationale: El hebreo alude a trabajadores de albañilería o reparación de muros; en español, 'albañiles' comunica bien la función constructiva sin sonar técnico en exceso. 'Masones' sería más literal pero menos natural; 'constructores' es demasiado general.
- source_word: חֹצְבֵי הָאֶבֶן
  english_pob_choice: stonecutters
  chosen_spanish: canteros
  alternatives_spanish:
  - cortadores de piedra
  - talladores de piedra
  - hewers of stone
  lexicon: HALOT
  rationale: La expresión describe a quienes trabajan o extraen piedra de cantera. 'Canteros' es breve, idiomático y encaja con el contexto de obra; 'cortadores de piedra' explicita más el oficio pero suena más pesado.
- source_word: לִקְנוֹת עֵצִים
  english_pob_choice: to buy timber
  chosen_spanish: para comprar madera
  alternatives_spanish:
  - para comprar madera de construcción
  - para comprar timber
  lexicon: HALOT
  rationale: En este contexto, עֵצִים se refiere a material para construcción. 'Madera' es natural en español y suficientemente amplia; 'madera de construcción' explicita la función, pero añade una precisión no requerida por el texto.
- source_word: אַבְנֵי מַחְצֵב
  english_pob_choice: quarried stone
  chosen_spanish: piedra de cantera
  alternatives_spanish:
  - piedra labrada
  - piedra tallada
  - piedra de cantera
  lexicon: HALOT
  rationale: La frase indica piedra extraída de cantera. 'Piedra de cantera' conserva el sentido de procedencia; 'piedra labrada' o 'tallada' enfatizan el trabajo sobre la piedra, no su origen.
- source_word: לְחַזֵּק
  english_pob_choice: to repair
  chosen_spanish: reparar
  alternatives_spanish:
  - reforzar
  - fortalecer
  - restaurar
  lexicon: HALOT
  rationale: Aunque el verbo base significa 'fortalecer', el contexto de obra exige un equivalente funcional. 'Reparar' es la forma más clara y natural para español, sin perder la idea de restauración estructural.
- source_word: בֶּדֶק
  english_pob_choice: the damage
  chosen_spanish: el daño
  alternatives_spanish:
  - la grieta
  - la brecha
  - el desperfecto
  lexicon: HALOT
  rationale: בֶּדֶק nombra la parte dañada, abierta o defectuosa que requiere arreglo. 'El daño' reproduce la referencia al problema mismo y evita mover el foco a la acción de reparar.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: Se mantiene la expresión 'casa de Yahvé' para reflejar el hebreo בֵּית יְהוָה y el criterio del proyecto para el nombre divino. 'Templo' aclara la función, pero sustituye la forma hebrea de manera más interpretativa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: 'Se sigue el estándar del proyecto en español: ''Yahvé'' como transliteración del nombre divino, en lugar de una sustitución por título. Esto preserva la referencia personal del texto hebreo.'
- source_word: וּלְכֹל אֲשֶׁר יֵצֵא עַל הַבַּיִת
  english_pob_choice: and for all that is spent on the house
  chosen_spanish: y para todo lo que se gaste en la casa
  alternatives_spanish:
  - y para todo lo que salga para la casa
  - y para todos los gastos de la casa
  lexicon: HALOT
  rationale: La idiomática hebrea 'lo que sale sobre la casa' alude a gastos o desembolsos. 'Lo que se gaste' mantiene la imagen de gasto sin sonar extraño en español; 'gastos' sería más explícito, pero menos pegado a la formulación.
- source_word: לְחָזְקָה
  english_pob_choice: to repair it
  chosen_spanish: para repararla
  alternatives_spanish:
  - para su reparación
  - para fortalecerla
  - para restaurarla
  lexicon: HALOT
  rationale: El infinitivo conserva la idea de hacer sólida la estructura, pero en el contexto el sentido práctico es reparar el edificio. 'Repararla' es claro y natural, a la vez que compatible con el trasfondo de 'fortalecer'.
theological_decisions:
- issue: Representación del nombre divino יְהוָה en el texto base
  english_pob_reading: house of Yahweh
  chosen_spanish_reading: casa de Yahvé
  alternative_spanish_readings:
  - casa del Señor
  - casa de Jehová
  rationale: Se mantiene la transliteración 'Yahvé' conforme al criterio doctrinal del proyecto para el Tetragrámaton. Esto evita la sustitución por un título y conserva la especificidad del hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción sigue el ajuste reciente del audit trail en inglés, donde se corrigió la idea de ‘strengthen the damage’ a ‘repair the damage’. En español se resolvió directamente con ‘reparar’, pero se conservó en nota la fuerza literal de לְחַזֵּק como ‘fortalecer’ y la imagen idiomática de ‘lo que sale sobre la casa’ como gastos.
  spanish_consistency_notes:
  - Se usó 'Yahvé' de forma consistente para יְהוָה.
  - Se eligieron términos de obra ('albañiles', 'canteros', 'madera', 'piedra de cantera') para mantener el campo semántico de reparación del edificio.
  - '''Reparar'' se reservó para el sentido contextual, mientras la nota conserva la tensión léxica de ''fortalecer''.'
  - '''Casa'' se mantuvo frente a ''templo'' para alinearse con el hebreo בֵּית יְהוָה.'
