translation:
  language: es
  text: Los del Néguev poseerán la región montañosa de Esaú[a], y los de la Sefelá poseerán la tierra de los filisteos; también poseerán el territorio de Efraín y el territorio de Samaria[b], y Benjamín poseerá Galaad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el monte de Esaú»; aquí se traduce con sentido territorial como región montañosa.'
    reason: lexical_alternative
  - marker: b
    text: O «heredarán» en todo el verso; el hebreo puede significar heredar o tomar posesión de una tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָרְשׁוּ
  english_pob_choice: will possess
  chosen_spanish: poseerán
  alternatives_spanish:
  - heredarán
  - tomarán posesión de
  lexicon: HALOT
  rationale: ירשׁ puede expresar tanto heredar como tomar posesión de una tierra. En este contexto territorial, «poseerán» conserva esa amplitud sin forzar solo la herencia ni solo la conquista.
- source_word: הַנֶּגֶב
  english_pob_choice: those of the Negev
  chosen_spanish: Los del Néguev
  alternatives_spanish:
  - el Néguev
  - el sur
  - los habitantes del Néguev
  lexicon: HALOT
  rationale: El hebreo usa el nombre regional con valor metonímico para sus habitantes. «Los del Néguev» hace explícito el sujeto implícito y mantiene el topónimo.
- source_word: הַר עֵשָׂו
  english_pob_choice: the hill country of Esau
  chosen_spanish: el monte de Esaú
  alternatives_spanish:
  - la serranía de Esaú
  - el monte/cerro de Esaú
  - la región montañosa de Esaú
  lexicon: HALOT
  rationale: הַר en expresiones territoriales puede referirse a una zona montañosa, pero en español «monte de Esaú» conserva la forma breve y reconocible del nombre territorial. Se evita «montaña» en singular, que sonaría más literal que contextual.
- source_word: הַשְּׁפֵלָה
  english_pob_choice: those of the Shephelah
  chosen_spanish: los de la Sefelá
  alternatives_spanish:
  - la Sefelá
  - la Sefelá baja
  - los habitantes de la Sefelá
  lexicon: HALOT
  rationale: El término geográfico funciona metonímicamente. «Los de la Sefelá» reproduce ese uso colectivo y preserva el nombre regional conocido en español bíblico.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the land of the Philistines
  chosen_spanish: la tierra de los filisteos
  alternatives_spanish:
  - Filistea
  - los filisteos
  lexicon: HALOT
  rationale: Aunque el hebreo dice «los filisteos», el contexto es de posesión territorial. «La tierra de los filisteos» explicita la referencia espacial sin borrar el etnónimo.
- source_word: שְׂדֵה אֶפְרַיִם
  english_pob_choice: the territory of Ephraim
  chosen_spanish: el territorio de Efraín
  alternatives_spanish:
  - el campo de Efraín
  - la región de Efraín
  lexicon: HALOT
  rationale: שָׂדֶה puede significar campo, llano o región abierta. En una fórmula de herencia territorial, «territorio» comunica mejor el sentido geográfico-político.
- source_word: שְׂדֵה שֹׁמְרוֹן
  english_pob_choice: the territory of Samaria
  chosen_spanish: el territorio de Samaria
  alternatives_spanish:
  - el campo de Samaria
  - la región de Samaria
  lexicon: HALOT
  rationale: Por el mismo motivo que en Efraín, «territorio» expresa con naturalidad la posesión de una zona, no de un campo agrícola aislado.
- source_word: בִנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - la tribu de Benjamín
  - los de Benjamín
  lexicon: HALOT
  rationale: El nombre tribal funciona de manera colectiva. «Benjamín» es breve e idiomático en español, y el sentido tribal se entiende por el contexto.
- source_word: הַגִּלְעָד
  english_pob_choice: Gilead
  chosen_spanish: Galaad
  alternatives_spanish:
  - Gilead
  - la Galaad
  lexicon: HALOT
  rationale: «Galaad» es la forma habitual en español bíblico para este topónimo. Mantiene la identificabilidad del lugar sin anglicismo.
theological_decisions:
- issue: Valor del verbo de posesión/herencia en un anuncio de restauración territorial
  english_pob_reading: will possess / may inherit or take possession of land
  chosen_spanish_reading: poseerán
  alternative_spanish_readings:
  - heredarán
  - tomarán posesión de
  rationale: No se debe fijar unilateralmente la imagen como herencia legal o como conquista militar. «Poseerán» conserva la amplitud semántica del hebreo y la lectura territorial del contexto profético.
  doctrine_reference: Restauración y posesión de la tierra en la profecía (sin resolver la tensión entre herencia y conquista)
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del inglés POB: no hay cambios aplicados y el acuerdo de revisión reportado es alto. La traducción española conserva la misma estructura territorial y la misma amplitud del verbo de posesión.'
  spanish_consistency_notes:
  - Se mantiene Yahvé solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva la repetición del verbo de posesión para reflejar el paralelismo hebreo.
  - Se usa «territorio» para שָׂדֶה en contextos de reparto de tierras, evitando una literalidad que oscurecería el sentido.
  - Se usa «Galaad» como forma española estable de toponimia bíblica.
