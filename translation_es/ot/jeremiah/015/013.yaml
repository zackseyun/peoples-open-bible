revisions:
- from: Tu riqueza y tus tesoros los daré como botín[a], sin precio, por causa de todos tus pecados, por todo tu territorio.
  to: Entregaré tu riqueza y tus tesoros como botín[a], sin precio, por causa de todos tus pecados, en todo tu territorio.
  rationale: 'Se hicieron ajustes menores de estilo y precisión: se cambió el orden verbal para mayor naturalidad en español, se afinó la frase territorial a «en todo tu territorio» para reflejar mejor el alcance distributivo del hebreo, y se corrigió la nota para ceñirse al matiz léxico documentado sin añadir «rescate». No se requiere nueva adjudicación, pues son reparaciones editoriales menores dentro de decisiones ya establecidas por la auditoría inglesa.'
