translation:
  language: es
  text: y no se acuerdan, mientras beben, de mostrar afecto[a] a amigos y hermanos, y poco después sacan espadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «ser amistosos con amigos y hermanos». El verbo griego puede indicar un comportamiento afectuoso o amistoso en sentido amplio, no solo un gesto literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μέμνηται
  english_pob_choice: they do not remember
  chosen_spanish: no se acuerdan
  alternatives_spanish:
  - no recuerdan
  - no son conscientes
  lexicon: LSJ
  rationale: El griego expresa falta de memoria o de consideración. «Se acuerdan» conserva el matiz idiomático natural en español sin rigidizar el sujeto singular del griego, que en contexto funciona de manera general.
- source_word: ὅταν πίνωσιν
  english_pob_choice: while they are drinking
  chosen_spanish: mientras beben
  alternatives_spanish:
  - cuando beben
  - mientras están bebiendo
  lexicon: LSJ
  rationale: La construcción indica una circunstancia repetida o indefinida. «Mientras beben» suena natural en español y mantiene la escena continua de la bebida.
- source_word: φιλιάζειν
  english_pob_choice: to show affection
  chosen_spanish: mostrar afecto
  alternatives_spanish:
  - ser amistosos
  - tratar con cariño
  - besar afectuosamente
  lexicon: LSJ
  rationale: El verbo puede abarcar un trato afectuoso o amistoso. «Mostrar afecto» preserva esa amplitud sin restringirlo a un gesto físico concreto como el beso.
- source_word: φίλοις καὶ ἀδελφοῖς
  english_pob_choice: to friends and brothers
  chosen_spanish: a amigos y hermanos
  alternatives_spanish:
  - a amigos y hermanos/compañeros
  - a amigos y hermanos de sangre
  lexicon: LSJ
  rationale: «Amigos» traduce φίλοις de forma directa. «Hermanos» conserva ἀδελφοῖς en forma literal y acorde con el género gramatical masculino del griego, sin ampliar innecesariamente a parentescos no señalados por el texto.
- source_word: μετʼ οὐ πολὺ
  english_pob_choice: before long
  chosen_spanish: poco después
  alternatives_spanish:
  - no mucho después
  - al poco tiempo
  lexicon: LSJ
  rationale: La locución marca un intervalo breve. «Poco después» es idiomático en español y refleja bien el giro temporal hacia la violencia.
- source_word: σπῶνται μαχαίρας
  english_pob_choice: they draw swords
  chosen_spanish: sacan espadas
  alternatives_spanish:
  - desenvainan espadas
  - desenvainan las espadas
  - sacan sus espadas
  lexicon: LSJ
  rationale: σπάω con μαχαίρας significa sacar o desenvainar. «Sacan espadas» es claro y natural; evita la rigidez de un calco y conserva la irrupción súbita del acto.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete LXX 1909 y la auditoría inglesa POB. Se conserva la secuencia general: olvido o falta de consideración bajo la bebida, afecto hacia amigos y hermanos, y la rápida transición a sacar espadas. El giro inglés revisado de «while they are drinking» se refleja con «mientras beben».'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el nombre divino.
  - Se mantuvo un español neutral y publicable, evitando arcaísmos innecesarios.
  - La frase final usa «espadas» para reflejar μαχαίρας en español natural y no introducir tecnicismos no requeridos por el griego.
