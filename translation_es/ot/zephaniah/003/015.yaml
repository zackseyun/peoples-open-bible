translation:
  language: es
  text: Yahvé ha quitado tus sentencias[a]; ha apartado a tu enemigo. El Rey de Israel, Yahvé, está en medio de ti; ya no temerás mal alguno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «las sentencias contra ti» o «tu condena».'
    reason: lexical_alternative
  - marker: b
    text: Aquí «mal» también puede entenderse como «desastre» o «calamidad» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵסִיר
  english_pob_choice: has taken away
  chosen_spanish: ha quitado
  alternatives_spanish:
  - ha removido
  - ha apartado
  lexicon: HALOT
  rationale: El hiphil de סור expresa quitar o remover. «Ha quitado» es natural en español y conserva el sentido de retirar algo que pesaba sobre la ciudad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino conforme al criterio del proyecto, en vez de sustituirlo por un título.
- source_word: מִשְׁפָּטַיִךְ
  english_pob_choice: your judgments
  chosen_spanish: tus sentencias
  alternatives_spanish:
  - los juicios contra ti
  - tu condena
  - tus juicios
  lexicon: HALOT
  rationale: En este contexto profético, מִשְׁפָּט puede referirse a decisiones judiciales adversas o a una sentencia. «Sentencias» preserva el matiz forense en español sin reducirlo a una sola lectura.
- source_word: פִּנָּה
  english_pob_choice: has turned away
  chosen_spanish: ha apartado
  alternatives_spanish:
  - ha alejado
  - ha removido
  lexicon: HALOT
  rationale: El verbo comunica apartar o retirar. Con «tu enemigo» como objeto, «ha apartado» transmite bien la acción de desplazarlo o echarlo fuera.
- source_word: אֹיְבֵךְ
  english_pob_choice: your enemy
  chosen_spanish: tu enemigo
  alternatives_spanish:
  - tus enemigos
  lexicon: HALOT
  rationale: El hebreo está en singular; se conserva el singular en español aunque pueda tener sentido colectivo.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: The King of Israel
  chosen_spanish: el Rey de Israel
  alternatives_spanish:
  - Israel es su Rey
  lexicon: HALOT
  rationale: La construcción se vierte de forma directa como título. Se capitaliza por referirse a Dios en aposición con el nombre divino.
- source_word: בְּקִרְבֵּךְ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - en tu seno
  - dentro de ti
  - entre ti
  lexicon: HALOT
  rationale: Es una expresión típica de presencia de pacto. «En medio de ti» suena natural y mantiene la idea de presencia local.
- source_word: לֹא תִירְאִי
  english_pob_choice: you will fear
  chosen_spanish: no temerás
  alternatives_spanish:
  - no tendrás miedo
  - no temerás ya
  lexicon: HALOT
  rationale: El imperfecto en este anuncio se expresa de manera natural en futuro negativo. «No temerás» evita añadir una modalidad que no está explícita.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - el desastre
  - la calamidad
  lexicon: HALOT
  rationale: Aunque el hebreo puede abarcar mal moral o calamidad, en español «el mal» mantiene esa amplitud y suena más natural que «evil» o una especificación excesiva. La nota preserva la alternativa contextual de desastre.
- source_word: עוֹד
  english_pob_choice: no more
  chosen_spanish: más
  alternatives_spanish:
  - ya
  - nunca más
  - más nunca
  lexicon: HALOT
  rationale: Con negación, עוֹד suele equivaler a «más / ya». En español, «no temerás más» comunica bien la cessación duradera.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre propio del pacto para evitar la sustitución por un título y mantener la transparencia del texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de מִשְׁפָּטַיִךְ en una promesa de restauración
  english_pob_reading: your judgments
  chosen_spanish_reading: tus sentencias
  alternative_spanish_readings:
  - los juicios contra ti
  - tu condena
  - tus juicios
  rationale: La forma hebrea puede referirse a decisiones judiciales adversas removidas por Yahvé. «Sentencias» conserva el peso forense y evita resolver demasiado la ambigüedad.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Sentido de רָע en la cláusula final
  english_pob_reading: evil
  chosen_spanish_reading: el mal
  alternative_spanish_readings:
  - el desastre
  - la calamidad
  - el daño
  rationale: Se preserva la amplitud semántica del hebreo. En este contexto, puede implicar mal experimentado o calamidad, y la nota deja abierta esa posibilidad.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y no requiere cambios recientes: la última revisión indicó que no había cambios necesarios. Se mantuvieron las tensiones léxicas principales, especialmente מִשְׁפָּטַיִךְ y רָע, sin resolverlas en exceso.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para el Tetragrámaton.
  - Se conservó el singular «tu enemigo» siguiendo el hebreo.
  - «En medio de ti» mantiene la fórmula de presencia de pacto sin volverla más interpretativa.
  - Se prefirió «el mal» por amplitud semántica, con nota explicativa para la alternativa contextual.
