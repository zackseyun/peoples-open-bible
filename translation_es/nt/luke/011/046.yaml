translation:
  language: es
  text: 'Pero él dijo: «¡Ay también de ustedes, letrados[a], porque cargan a la gente con cargas difíciles de llevar[b], y ustedes mismos no tocan las cargas ni con uno de sus dedos!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «expertos en la ley». El término griego se refiere a especialistas en la ley judía.
    reason: lexical_alternative
  - marker: b
    text: O «no tocan ni con un dedo las cargas». La expresión enfatiza que no hacen ningún esfuerzo por ayudar con lo que imponen a otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: νομικοῖς
  english_pob_choice: lawyers
  chosen_spanish: expertos en la ley
  alternatives_spanish:
  - letrados
  - doctores de la ley
  lexicon: BDAG
  rationale: En este contexto, νομικός designa especialistas en la ley mosaica, no abogados civiles. «Expertos en la ley» comunica el referente con claridad al lector hispanohablante y conserva el matiz explicativo que el audit trail inglés preserva en la nota alternativa.
- source_word: οὐαί
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de!
  - ¡Ay!
  lexicon: BDAG
  rationale: «¡Ay!» mantiene la fuerza profética de reproche y lamento de οὐαί. En español, añadir «de» sería posible, pero aquí la exclamación breve conserva mejor el tono sentencioso del original.
- source_word: φορτίζετε
  english_pob_choice: you load
  chosen_spanish: cargan
  alternatives_spanish:
  - ponen sobre
  - agobian con
  - cargan
  lexicon: BDAG
  rationale: 'El verbo es activo y concreto: ponen una carga sobre otros. «Cargan» reproduce la metáfora de manera natural en español y encaja con «cargas» en la misma oración.'
- source_word: ἀνθρώπους
  english_pob_choice: people
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a la gente
  - a los seres humanos
  lexicon: BDAG
  rationale: Aunque el sentido es genérico, «hombres» puede funcionar en español bíblico como plural representativo de la humanidad. Aquí se mantiene la concisión y el paralelismo con la forma clásica de la acusación, sin implicar exclusión intencional de mujeres.
- source_word: φορτία
  english_pob_choice: burdens
  chosen_spanish: cargas
  alternatives_spanish:
  - pesos
  - bultos
  - cargas
  lexicon: BDAG
  rationale: «Cargas» es la equivalencia más natural para φορτία y permite conservar la repetición del sustantivo al final del versículo.
- source_word: δυσβάστακτα
  english_pob_choice: hard to bear
  chosen_spanish: difíciles de llevar
  alternatives_spanish:
  - difíciles de soportar
  - pesadas de llevar
  - insoportables
  lexicon: BDAG
  rationale: La palabra describe algo difícil de cargar o soportar. «Difíciles de llevar» mantiene el valor semántico sin intensificarlo más de lo que exige el griego.
- source_word: ἑνὶ τῶν δακτύλων ὑμῶν
  english_pob_choice: with one of your fingers
  chosen_spanish: ni con uno de sus dedos
  alternatives_spanish:
  - con uno de sus dedos
  - ni con un dedo
  - ni siquiera con uno de sus dedos
  lexicon: BDAG
  rationale: La expresión subraya la mínima medida de ayuda que no prestan. «Ni con uno de sus dedos» conserva esa imagen de esfuerzo mínimo; el «ni» está sostenido por la negación de la cláusula siguiente en el griego, y en español ayuda a reflejar el contraste implícito.
- source_word: προσψαύετε
  english_pob_choice: do not touch
  chosen_spanish: tocan
  alternatives_spanish:
  - tocan
  - ponen la mano sobre
  - tocan siquiera
  lexicon: BDAG
  rationale: El verbo significa tocar o hacer contacto. En esta construcción, «no tocan» transmite la ausencia de toda ayuda sin añadir una interpretación demasiado explícita en la línea principal; la nota preserva la alternativa idiomática del POB inglés.
theological_decisions:
- issue: Identidad y traducción de νομικοῖς
  english_pob_reading: Rendered as 'lawyers' referring to experts in the Jewish law, not modern civil attorneys.
  chosen_spanish_reading: Se traduce como «expertos en la ley», entendidos como especialistas en la ley judía o mosaica, no como abogados modernos.
  alternative_spanish_readings:
  - abogados
  - doctores de la ley
  - letrados
  rationale: El término tiene un campo semántico religioso-jurídico. «Expertos en la ley» evita el anacronismo de «abogados» y expresa de forma transparente el oficio criticado por Jesús.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza de la acusación final
  english_pob_reading: Kept the concrete metaphor 'do not touch the burdens with one of your fingers' rather than making the implied meaning explicit.
  chosen_spanish_reading: Se conserva la metáfora concreta de no tocar las cargas ni con un dedo, sin desarrollar explícitamente la idea de que no ayudan en absoluto.
  alternative_spanish_readings:
  - no ayudan a llevar las cargas
  - no levantan un dedo para ayudar
  - no mueven un dedo
  rationale: La metáfora es inteligible en español y mantiene el contraste acusatorio entre imponer y no aliviar. Explicitar demasiado el sentido debilitaría la imagen del texto fuente.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés de alta concordancia, manteniendo la metáfora de las cargas, la identificación contextual de νομικοῖς y la clausula final concreta sin paráfrasis ampliada. No se registraron revisiones sustantivas en el pasaje inglés base.
  spanish_consistency_notes:
  - Se mantiene «cargas» para φορτία en ambas apariciones para preservar la repetición retórica.
  - Se usa «expertos en la ley» como término principal y se deja una alternativa en nota para reflejar la decisión lexical documentada.
  - La puntuación respeta el tono de reproche directo con comillas de apertura y cierre en español.
  - La forma «a los hombres» se conserva solo como genérico representativo; si el proyecto prefiere máxima neutralidad moderna, podría evaluarse «a la gente» en una revisión posterior, pero aquí se prioriza la cercanía al registro bíblico tradicional del juicio pronunciado por Jesús.
