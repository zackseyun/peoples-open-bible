revisions:
- from: Cántico de ascensos[a]. Desde lo profundo clamo a ti[b], Yahvé.
  to: Cántico de ascenso[a]. Desde las profundidades clamo a ti, Yahvé[b].
  rationale: 'Se reemplaza «de ascensos» por «de ascenso» para dar un español más natural y conservar mejor el carácter de título tradicional de la colección. Se cambia «Desde lo profundo» a «Desde las profundidades» para reflejar el plural hebreo y una expresión española bien establecida. Se reorganizan las notas para alinearlas mejor con la auditoría inglesa: una nota cultural sobre el título y una nota léxica sobre la posible lectura verbal en pasado.'
