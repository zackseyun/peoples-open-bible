id: ROM.15.9
reference: Romans 15:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὰ δὲ ἔθνη ὑπὲρ ἐλέους δοξάσαι τὸν θεόν· καθὼς γέγραπται· Διὰ τοῦτο ἐξομολογήσομαί σοι ἐν ἔθνεσι, καὶ τῷ ὀνόματί σου ψαλῶ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/015/009.yaml
  text: 'and the Gentiles might glorify God for his mercy, as it is written, "Therefore I will praise you among the Gentiles, and sing praise to your name."'
translation:
  language: ko
  text: '또한 이방인들이 자비 때문에 하나님께 영광을 돌리게 하시려는 것입니다. 기록된 대로입니다. 「그러므로 내가 이방인들 가운데 당신께 찬송하며, 당신의 이름을 노래하겠습니다.」'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὰ ἔθνη
  english_pob_choice: the Gentiles
  chosen_korean: 이방인들
  alternatives_korean:
  - 열방
  - 민족들
  lexicon: BDAG
  rationale: 바울 문맥의 ἔθνη는 「이방인들」. 인용 본문 15:11에서는 일반적 「민족들」 의미가 강하므로 거기서는 다르게 처리.
- source_word: ὑπὲρ ἐλέους
  english_pob_choice: for his mercy
  chosen_korean: 자비 때문에
  alternatives_korean:
  - 긍휼 때문에
  - 자비를 위하여
  lexicon: BDAG
  rationale: ὑπέρ + 속격의 원인·근거.
- source_word: ἐξομολογήσομαί
  english_pob_choice: I will praise
  chosen_korean: 찬송하다
  alternatives_korean:
  - 자백하다
  - 인정하다
  lexicon: BDAG
  rationale: 시편 18:49 인용. 「찬송」이 시편 문맥에 자연스러움. 14:11의 「자백하다」와는 문맥이 다르므로 구분 정당.
- source_word: ψαλῶ
  english_pob_choice: sing praise
  chosen_korean: 노래하다
  alternatives_korean:
  - 시로 노래하다
  - 찬양하다
  lexicon: BDAG
  rationale: ψάλλω는 현악기 반주의 찬양. 「노래하다」가 자연스럽다.
