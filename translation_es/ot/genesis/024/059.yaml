translation:
  language: es
  text: Entonces enviaron a Rebeca, su hermana[a], y a su nodriza, y al siervo de Abraham, y a sus hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más específicamente, «su ama de cría».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלְּחוּ
  english_pob_choice: sent away
  chosen_spanish: despidieron
  alternatives_spanish:
  - la enviaron
  - la dejaron partir
  - la mandaron
  lexicon: HALOT
  rationale: El piel de שׁלח aquí expresa hacer partir a alguien. En español, «despedir» comunica el acto formal de enviarla de vuelta o dejarla ir, con un matiz más natural que una simple réplica de «enviaron».
- source_word: רִבְקָה
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Rebecca
  lexicon: Transliteración estándar
  rationale: 'El nombre propio se adapta a la forma usual en español bíblico: «Rebeca».'
- source_word: אֲחֹתָם
  english_pob_choice: their sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - su parienta
  - su pariente femenina
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo «hermana»; aunque el vínculo es de parentesco dentro del grupo familiar, el sentido inmediato favorece la traducción directa.
- source_word: מֵנִקְתָּהּ
  english_pob_choice: her nurse
  chosen_spanish: su nodriza
  alternatives_spanish:
  - su ama de cría
  - su niñera
  - su nodriza, es decir, su ama de cría
  lexicon: HALOT
  rationale: «Nodriza» conserva mejor que «niñera» la relación de lactancia/crianza sugerida por la raíz y evita suavizar demasiado el término. En español bíblico es comprensible y mantiene la precisión léxica.
- source_word: עֶבֶד אַבְרָהָם
  english_pob_choice: Abraham’s servant
  chosen_spanish: el esclavo de Abraham
  alternatives_spanish:
  - el siervo de Abraham
  - el servidor de Abraham
  lexicon: HALOT
  rationale: Aunque el inglés POB optó por «servant» por el contexto narrativo, el hebreo עֶבֶד tiene fuerza semántica de dependencia servil/esclava. En español, «esclavo» preserva esa tensión lexical sin borrarla.
- source_word: אֲנָשָׁיו
  english_pob_choice: his men
  chosen_spanish: sus hombres
  alternatives_spanish:
  - los hombres que iban con él
  - sus servidores
  lexicon: HALOT
  rationale: «Hombres» refleja de manera directa אֲנָשִׁים. El posesivo se entiende por el contexto como referido al esclavo de Abraham; la frase española mantiene esa referencia sin especificar indebidamente su función.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la traducción inglesa auditada: se mantiene la secuencia de participantes y la distinción entre la nodriza, el esclavo de Abraham y sus hombres. La principal diferencia es la elección de «esclavo» para עֶבֶד, para no diluir una tensión lexical que el hebreo sí permite.'
  spanish_consistency_notes:
  - Se usa «Rebeca» como forma española estable del nombre propio.
  - Se mantiene «nodriza» para מֵנִקְתָּהּ y se aclara la alternativa más específica en nota.
  - «Sus hombres» conserva la literalidad de אֲנָשָׁיו sin añadir precisión no requerida por el hebreo.
  - No se emplea «SEÑOR» ni terminología teológica ajena al versículo.
