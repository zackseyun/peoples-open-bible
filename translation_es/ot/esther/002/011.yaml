translation:
  language: es
  text: Y cada día Mardoqueo caminaba de un lado a otro frente al patio de la casa de las mujeres[a], para saber del bienestar de Ester y qué se haría con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa, “el patio del harén”. El hebreo dice más literalmente: “el patio de la casa de las mujeres”.'
    reason: cultural_note
lexical_decisions:
- source_word: וּבְכָל יוֹם וָיוֹם
  english_pob_choice: And every day
  chosen_spanish: Y cada día
  alternatives_spanish:
  - Y todos los días
  - Y día tras día
  lexicon: HALOT
  rationale: El hebreo expresa repetición distributiva cotidiana. 'Cada día' conserva la idea de regularidad sin volver la frase pesada en español.
- source_word: מִתְהַלֵּךְ
  english_pob_choice: would walk back and forth
  chosen_spanish: caminaba de un lado a otro
  alternatives_spanish:
  - iba y venía
  - andaba de un lado a otro
  lexicon: HALOT
  rationale: El hitpael comunica movimiento repetido o itinerante. 'Caminaba de un lado a otro' transmite bien la acción continua sin añadir más de lo que el hebreo garantiza.
- source_word: לִפְנֵי
  english_pob_choice: in front of
  chosen_spanish: frente al
  alternatives_spanish:
  - delante de
  - ante
  lexicon: HALOT
  rationale: La preposición indica posición espacial delante de algo. 'Frente al' es natural y preciso en español moderno.
- source_word: חֲצַר בֵּית הַנָּשִׁים
  english_pob_choice: the courtyard of the women’s house
  chosen_spanish: el patio de la casa de las mujeres
  alternatives_spanish:
  - el patio de la casa de las mujeres
  - el patio de la casa de las mujeres / el harén
  lexicon: HALOT
  rationale: Se conserva la forma más literal del hebreo ('patio de la casa de las mujeres'). 'Harén' es una opción interpretativa documentada, pero se deja fuera del texto principal para no sustituir la redacción fuente.
- source_word: לָדַעַת
  english_pob_choice: to learn
  chosen_spanish: para saber
  alternatives_spanish:
  - para conocer
  - para averiguar
  lexicon: HALOT
  rationale: El infinitivo de propósito expresa búsqueda de información. 'Para saber' es idiomático y suficientemente fiel; 'averiguar' sería más explícito pero algo más interpretativo.
- source_word: אֶת שְׁלוֹם אֶסְתֵּר
  english_pob_choice: about Esther’s welfare
  chosen_spanish: cómo estaba Ester
  alternatives_spanish:
  - sobre el bienestar de Ester
  - acerca de la paz de Ester
  lexicon: HALOT
  rationale: שָׁלוֹם aquí apunta a bienestar, condición o tranquilidad. En español, 'cómo estaba Ester' comunica esa preocupación concreta y evita que 'paz' suene demasiado abstracto.
- source_word: וּמַה יֵּעָשֶׂה בָּהּ
  english_pob_choice: and what would be done with her
  chosen_spanish: y qué se haría con ella
  alternatives_spanish:
  - y qué le harían
  - y qué ocurriría con ella
  lexicon: HALOT
  rationale: 'El nifal imperfecto preserva un pasivo: alguien o algo haría algo con Ester. ''Qué se haría con ella'' mantiene la pasividad y la incertidumbre del hebreo.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que simplificó la repetición a 'every day' para un registro más formal y que ajustó el sentido de שָׁלוֹם hacia bienestar; por eso en español se optó por 'cada día' y 'cómo estaba Ester' en vez de una paráfrasis más libre. También se mantuvo el pasivo de יֵּעָשֶׂה con 'se haría' para no perder la incertidumbre del hebreo.
  spanish_consistency_notes:
  - Se conserva el nombre propio 'Mardoqueo' y 'Ester' conforme al uso bíblico español estándar.
  - Se evitó 'SEÑOR' u otras sustituciones, ya que el versículo no contiene el nombre divino.
  - '''Casa de las mujeres'' se mantiene en el texto principal por fidelidad al hebreo, con la alternativa cultural ''harén'' explicada en nota.'
