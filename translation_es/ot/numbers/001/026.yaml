review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la fórmula censal hebrea y conserva bien la secuencia: hijos de Judá, generaciones, clanes, casas paternas, número de nombres, umbral de veinte años, y el modismo militar final. Sin embargo, «de veinte años arriba» suena algo truncado en español actual y conviene ajustar el umbral etario a una formulación más natural sin perder literalidad. La nota alternativa refleja adecuadamente el valor idiomático de כֹּל יֹצֵא צָבָא.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero «de veinte años arriba» es menos idiomático que «de veinte años en adelante» o «de veinte años para arriba». Además, la nota al pie puede mejorar su redacción: «están incluidos para el servicio militar» suena administrativo; «son aptos para el servicio militar» expresa mejor el sentido contextual ya documentado por el inglés. Lo demás es legible y fiel.'
  glossary_alignment: No hay términos del glosario mayor (Yahvé, Mesías, etc.) en este versículo. «Hijos», «clanes», «casas de sus padres», «varón» y la preservación del masculino censal concuerdan con la filosofía y con las decisiones léxicas auditadas. La excepción recomendada es solo estilística en la fórmula de edad.
  issues:
  - severity: medium
    issue: Fórmula de edad algo poco natural en español
    rationale: «De veinte años arriba» es comprensible, pero en español neutro moderno suena menos fluido que «de veinte años en adelante», que preserva el umbral etario del hebreo con mejor legibilidad.
  - severity: low
    issue: Redacción mejorable en la nota al pie
    rationale: «Están incluidos para el servicio militar» suena burocrático y menos preciso. El sentido contextual es elegibilidad/aptitud militar, por lo que «son aptos para el servicio militar» o equivalente comunica mejor la explicación ya presente en el audit trail.
  revised_spanish_text: 'Para los hijos de Judá[a], por sus generaciones, por sus clanes, por las casas de sus padres, según el número de nombres, de veinte años en adelante, todo varón que sale a la guerra:'
  revised_footnotes:
  - marker: a
    text: 'O: «todos los que salen a la guerra». El hebreo es un modismo que se refiere a quienes son aptos para el servicio militar.'
    reason: lexical_alternative
  revision_rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin alterar el sentido: «de veinte años arriba» pasó a «de veinte años en adelante». También se afinó la nota al pie para expresar mejor el valor idiomático de la fórmula militar hebrea. No se requieren cambios doctrinales ni de terminología principal.'
