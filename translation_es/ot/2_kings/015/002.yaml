translation:
  language: es
  text: Tenía dieciséis años cuando comenzó a reinar, y reinó cincuenta y dos años en Jerusalén. El nombre de su madre era Jecolía[a] de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
