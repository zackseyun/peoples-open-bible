translation:
  language: es
  text: En aquellos días no había rey en Israel. Y en aquellos días la tribu de Dan[a] buscaba para sí una heredad para habitar, porque hasta aquel día no le había caído heredad[b] en medio de las tribus de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la tribu de los danitas».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «no le había caído heredad», un modismo que se refiere a la asignación de tierra tribal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵין מֶלֶךְ
  english_pob_choice: there was no king
  chosen_spanish: no había rey
  alternatives_spanish:
  - no existía rey
  - no estaba rey
  lexicon: BDB/HALOT
  rationale: La negación existencial se expresa de forma natural en español con 'no había', conservando el sentido directo del hebreo sin sobrerinterpretar.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - para Israel
  lexicon: BDB/HALOT
  rationale: La preposición locativa 'en' reproduce de manera fiel y natural el valor de ubicación política/geográfica.
- source_word: שֵׁבֶט הַדָּנִי
  english_pob_choice: the tribe of the Danites
  chosen_spanish: la tribu de Dan
  alternatives_spanish:
  - la tribu de los danitas
  - la tribu danita
  lexicon: BDB/HALOT
  rationale: El hebreo usa una designación tribal colectiva. En español, 'la tribu de Dan' es la forma más breve y fiel; la nota preserva la alternativa étnica cuando se desea enfatizar el colectivo descendiente.
- source_word: מְבַקֶּשׁ
  english_pob_choice: was seeking
  chosen_spanish: buscaba
  alternatives_spanish:
  - estaba buscando
  - andaba buscando
  lexicon: BDB/HALOT
  rationale: El participio denota acción en curso; el imperfecto español 'buscaba' comunica continuidad sin sonar forzado.
- source_word: ל֤/וֹ
  english_pob_choice: for itself
  chosen_spanish: para sí
  alternatives_spanish:
  - para ella misma
  - para sí misma
  lexicon: BDB/HALOT
  rationale: El pronombre hebreo es singular y colectivo. 'Para sí' conserva esa referencia reflexiva sin introducir género innecesario.
- source_word: נַחֲלָה
  english_pob_choice: an inheritance
  chosen_spanish: una heredad
  alternatives_spanish:
  - una herencia
  - una porción heredada
  lexicon: BDB/HALOT
  rationale: En contexto de reparto territorial tribal, 'heredad' preserva mejor el valor de porción asignada de tierra que la más genérica 'herencia'.
- source_word: לָשֶׁבֶת
  english_pob_choice: to dwell in
  chosen_spanish: para habitar
  alternatives_spanish:
  - para morar
  - para establecerse
  lexicon: BDB/HALOT
  rationale: El infinitivo expresa finalidad de residencia/asentamiento. 'Para habitar' es claro y mantiene el registro bíblico sin arcaísmo excesivo.
- source_word: כִּי לֹא נָפְלָה לוֹ
  english_pob_choice: because ... no inheritance had fallen to it
  chosen_spanish: porque hasta aquel día no le había caído heredad
  alternatives_spanish:
  - porque hasta aquel día no había recibido heredad
  - porque hasta aquel día no le había correspondido heredad
  lexicon: BDB/HALOT
  rationale: '''Caer'' conserva la metáfora hebrea de la porción asignada por sorteo o repartición. ''Le había caído heredad'' mantiene esa tensión idiomática mejor que una explicación totalmente desmetaforizada.'
- source_word: עַד הַיּוֹם הַהוּא
  english_pob_choice: up to that day
  chosen_spanish: hasta aquel día
  alternatives_spanish:
  - hasta ese día
  - hasta entonces
  lexicon: BDB/HALOT
  rationale: La fórmula retrospectiva narrativa queda bien en español con 'aquel', que suena más distante y literario que 'ese'.
- source_word: בְּתוֹךְ שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: among the tribes of Israel
  chosen_spanish: en medio de las tribus de Israel
  alternatives_spanish:
  - entre las tribus de Israel
  lexicon: BDB/HALOT
  rationale: '''En medio de'' refleja el valor distributivo de בתוך y mantiene una resonancia bíblica clara; ''entre'' también es posible, pero menos evocador del reparto tribal.'
- source_word: בְּנַחֲלָה
  english_pob_choice: no inheritance had fallen to it among the tribes of Israel
  chosen_spanish: heredad
  alternatives_spanish:
  - por heredad
  - como heredad
  lexicon: BDB/HALOT
  rationale: El cierre del versículo vuelve al campo semántico territorial. Integrarlo en 'no le había caído heredad' preserva la idiomática hebrea sin repetir mecánicamente la misma palabra varias veces.
theological_decisions:
- issue: La fórmula 'no había rey en Israel'
  english_pob_reading: Retained as a historical-political observation without implying an explicit theological endorsement of monarchy beyond the narrator's wording.
  chosen_spanish_reading: 'Se conserva como observación histórico-política: ''no había rey en Israel''.'
  alternative_spanish_readings:
  - no reinaba un rey en Israel
  - no existía autoridad real en Israel
  rationale: El hebreo presenta la afirmación de manera sobria y repetitiva dentro de Jueces. En español conviene dejarla sin intensificarla como juicio doctrinal ni suavizarla a una paráfrasis explicativa.
  doctrine_reference: Preservar la tensión narrativa sin resolverla.
translation_notes:
  revision_awareness: Se siguió el estado de alta concordancia del audit trail inglés y no se introdujeron cambios sustanciales respecto del sentido base. La principal decisión fue mantener la metáfora de 'caer' en relación con la heredad, junto con una formulación española natural para la búsqueda territorial de la tribu.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se prefirió 'heredad' para נַחֲלָה por su valor territorial-covenantal en contexto tribal.
  - Se mantuvo el registro narrativo sobrio y no interpretativo, acorde con el libro de Jueces.
