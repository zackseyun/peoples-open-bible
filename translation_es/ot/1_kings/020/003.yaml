    issue: “tus mujeres” para וְנָשֶׁיךָ
    rationale: La auditoría inglesa documenta que נָשִׁים en este contexto posesivo familiar significa “wives”, no “women” en general. En español, “tus mujeres” puede sugerir concubinas, mujeres de la casa o una expresión coloquial impropia; “tus esposas” comunica mejor el sentido sin pérdida.
  - severity: low
