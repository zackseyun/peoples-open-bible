revisions:
- from: Cuando el Altísimo dio a las naciones su herencia[a], cuando separó a los hijos de los hombres[b], fijó los límites de los pueblos conforme al número de los hijos de Israel.
  to: Cuando el Altísimo dio a las naciones sus heredades[a], cuando separó a los hijos del hombre[b], fijó los límites de los pueblos conforme al número de los hijos de Israel.
  rationale: Se ajusta «su herencia» a «sus heredades» para reflejar mejor la distribución implícita en el hebreo y en la justificación léxica auditada. Se cambia «los hijos de los hombres» por «los hijos del hombre» para una formulación más natural en español, manteniendo a la vez la forma masculina representativa del original. Se conservan la lectura masorética principal y la nota de variante textual documentada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:53:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis y el sentido del hebreo WLC: cláusulas temporales con «cuando», «el Altísimo», asignación de herencia a las naciones, separación de בני אדם, establecimiento de límites, y la lectura masorética final «hijos de Israel» con nota sobre la variante «hijos de Dios/ángeles de Dios». Sin embargo, «su herencia» en singular suena menos distributivo en español que el hebreo y que el razonamiento auditado en inglés, que enfatiza «their inheritance».'
  spanish_quality_summary: El texto es claro y digno, pero «dio a las naciones su herencia» puede entenderse como una sola herencia común; «dio a las naciones sus heredades» o «repartió a las naciones su herencia» comunicaría mejor la distribución. Además, «los hijos de los hombres» es comprensible, pero en español bíblico-natural suena algo forzado; «los hijos del hombre» reproduce mejor la expresión semítica colectiva y mantiene el masculino representativo. La nota correspondiente debe ajustarse al nuevo anclaje.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «El Altísimo», «naciones», «pueblos» e «hijos de Israel» son adecuados. No intervienen términos como Yahvé o Mesías en este versículo. La decisión sobre בני אדם debe mantener la forma masculina representativa sin caer en una paráfrasis neutralizante.
  issues:
  - severity: medium
    issue: «su herencia» debilita el sentido distributivo
    rationale: El hifil de נחל en este contexto describe la asignación/aporcionamiento a las naciones. En español, el singular posesivo puede sugerir una herencia colectiva única, mientras que el audit trail inglés subraya el reparto a cada nación.
  - severity: medium
    issue: «los hijos de los hombres» suena poco natural en español bíblico actual
    rationale: Aunque es bastante literal, la expresión resulta pesada. «Los hijos del hombre» conserva mejor el giro semítico colectivo y la decisión POB de mantener el masculino representativo, sin neutralizarlo a «la humanidad» en el texto principal.
  revised_spanish_text: Cuando el Altísimo dio a las naciones sus heredades[a], cuando separó a los hijos del hombre[b], fijó los límites de los pueblos conforme al número de los hijos de Israel.
  revised_footnotes:
  - marker: a
    text: Los Rollos del Mar Muerto y la Septuaginta leen «hijos de Dios» (o «ángeles de Dios») en lugar de «hijos de Israel».
    reason: textual_variant
  - marker: b
    text: «Los hijos del hombre» es una expresión hebrea para seres humanos o la humanidad.
    reason: lexical_alternative
  revision_rationale: Se ajusta «su herencia» a «sus heredades» para reflejar mejor la distribución implícita en el hebreo y en la justificación léxica auditada. Se cambia «los hijos de los hombres» por «los hijos del hombre» para una formulación más natural en español, manteniendo a la vez la forma masculina representativa del original. Se conservan la lectura masorética principal y la nota de variante textual documentada.
