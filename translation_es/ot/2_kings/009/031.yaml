  yaml_path: translation/ot/2_kings/009/031.yaml
  text: As Jehu came into the gate[a], she said, “Is it peace, Zimri[c][b], murderer of his master?”
  footnotes:
  - marker: a
    text: Jezebel calls Jehu 'Zimri' as a taunt, comparing him to Zimri, who killed his master and seized the throne (see 1 Kings 16:9–20).
    reason: cross_reference
  - marker: b
    text: Or 'Is all well?'
    reason: lexical_alternative
  - marker: c
    text: Literally 'killer of his master.'
    reason: lexical_alternative
