translation:
  language: es
  text: Que den[a] gloria a Yahvé[b], y que declaren su alabanza en las costas lejanas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘atribuyan’. El verbo hebreo es literalmente ‘poner/colocar’, pero aquí se usa idiomáticamente con ‘gloria’.
    reason: lexical_alternative
  - marker: b
    text: Hebreo YHWH, tradicionalmente traducido ‘el SEÑOR’.
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: ‘en las islas’; ‘las costas lejanas’ refleja el uso frecuente de Isaías para tierras marítimas distantes en sentido amplio, no solo islas literales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשִׂימוּ
  english_pob_choice: let them give
  chosen_spanish: Que den
  alternatives_spanish:
  - Que pongan
  - Que atribuyan
  lexicon: HALOT
  rationale: El hebreo usa literalmente ‘poner/colocar’, pero con כָּבוֹד como objeto y Yahvé como destinatario funciona idiomáticamente como ‘dar’ o ‘atribuir’ gloria. En español, ‘Que den’ conserva el tono exhortativo/jusivo y evita un calco rígido.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: HALOT
  rationale: El nombre divino se traduce según la norma del proyecto como ‘Yahvé’. La preposición ל se expresa naturalmente con ‘a’ en este giro de destinatario.
- source_word: כָּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - honra
  lexicon: HALOT
  rationale: ‘Gloria’ es la equivalencia más natural y fuerte en este contexto de adoración y paralelismo poético con ‘alabanza’.
- source_word: וּתְהִלָּתוֹ
  english_pob_choice: and his praise
  chosen_spanish: su alabanza
  alternatives_spanish:
  - su loor
  - su alabanza y loor
  lexicon: HALOT
  rationale: תְּהִלָּה significa ‘alabanza’; con sufijo posesivo de 3ms, ‘su alabanza’ mantiene la relación de pertenencia o de alabanza debida a él, sin añadir ideas ajenas.
- source_word: בָּאִיִּים
  english_pob_choice: in the coastlands
  chosen_spanish: en las costas
  alternatives_spanish:
  - en las islas
  - en las costas marítimas
  lexicon: HALOT
  rationale: Isaías usa אִיִּים de manera amplia para tierras marítimas lejanas, no solo islas literales. ‘Costas’ comunica esa extensión geográfica de forma natural en español; ‘en las costas’ preserva el valor locativo del prefijo ב.
- source_word: יַגִּידוּ
  english_pob_choice: let them declare
  chosen_spanish: que declaren
  alternatives_spanish:
  - que proclamen
  - que digan
  lexicon: HALOT
  rationale: El Hifil de נגד tiene el sentido de ‘declarar, hacer saber, contar’. ‘Que declaren’ conserva el registro elevado y la fuerza pública/proclamatoria del verbo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue la decisión doctrinal del proyecto de no ocultar el Tetragrámaton con un título genérico. ‘Yahvé’ reproduce el nombre propio divino en español de manera reverente y reconocible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El texto inglés de referencia fue revisado y quedó sin cambios en el último pase; la versión española conserva las mismas decisiones semánticas principales: ‘glory/praise’, el valor amplio de ‘coastlands’ y la traducción directa del nombre divino como Yahvé.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio y contemporáneo, sin arcaísmos innecesarios.
  - Se evita ‘SEÑOR’ como máscara del nombre divino, conforme al criterio del proyecto.
  - ‘Costas’ se usa en sentido amplio de regiones marítimas lejanas, no solo litoral inmediato.
  - No se agrega nota al pie porque no hay ambigüedad textual que requiera marcador en el verso español.
