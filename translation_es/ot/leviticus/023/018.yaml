translation:
  language: es
  text: Y con el pan[a] presentarás siete corderos machos de un año, sin defecto, y un toro del ganado, y dos carneros; serán holocausto para Yahvé, con su ofrenda de cereal y sus libaciones, ofrenda por fuego[b], de aroma agradable para Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «además del pan» o «junto al pan»; la preposición hebrea puede expresar acompañamiento más que ubicación física.
    reason: lexical_alternative
  - marker: b
    text: O «ofrenda encendida»; el término hebreo se refiere a una ofrenda hecha por fuego.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִקְרַבְתֶּם
  english_pob_choice: you shall present
  chosen_spanish: presentarás
  alternatives_spanish:
  - ofrecerás
  - acercarás
  lexicon: HALOT
  rationale: En contexto sacrificial, הקריב significa traer o presentar la ofrenda ante Dios. «Presentarás» conserva la acción cultual sin sonar excesivamente literal o técnico en español.
- source_word: עַל הַלֶּחֶם
  english_pob_choice: with the bread
  chosen_spanish: con el pan
  alternatives_spanish:
  - junto al pan
  - además del pan
  - sobre el pan
  lexicon: HALOT
  rationale: El hebreo עַל aquí expresa acompañamiento o adición, no colocación física sobre el pan. «Con el pan» sigue la decisión auditada en inglés y es natural en español.
- source_word: שִׁבְעַת כְּבָשִׂים
  english_pob_choice: seven male lambs
  chosen_spanish: siete corderos machos
  alternatives_spanish:
  - siete corderos
  - siete ovejas
  lexicon: HALOT
  rationale: כֶּבֶשׂ apunta a cordero/lamb; el valor masculino del plural justifica explicitar «machos» para conservar la precisión sacrificial.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin imperfección
  - sin tacha
  lexicon: HALOT
  rationale: Es el término ritual estándar para animales aptos para sacrificio. «Sin defecto» mantiene claridad moderna y la idea de integridad ceremonial.
- source_word: בְּנֵי שָׁנָה
  english_pob_choice: a year old
  chosen_spanish: de un año
  alternatives_spanish:
  - de un año de edad
  - de edad de un año
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para la edad del animal. «De un año» suena natural en español y preserva la especificación de edad.
- source_word: וּפַר בֶּן בָּקָר אֶחָד
  english_pob_choice: one bull from the herd
  chosen_spanish: un novillo
  alternatives_spanish:
  - un toro joven
  - un buey
  lexicon: HALOT
  rationale: פַר בֶּן־בָּקָר designa un bovino del ganado; «novillo» comunica bien un animal joven apto para sacrificio sin sobrecargar la frase.
- source_word: וְאֵילִם שְׁנָיִם
  english_pob_choice: and two rams
  chosen_spanish: y dos carneros
  alternatives_spanish:
  - y dos machos ovejos
  - y dos ovejos
  lexicon: HALOT
  rationale: אַיִל es «carnero» en español bíblico y moderno. Es preciso y transparente para el inventario sacrificial.
- source_word: יִהְיוּ עֹלָה לַיהוָה
  english_pob_choice: They shall be a burnt offering to Yahweh
  chosen_spanish: serán holocausto para Yahvé
  alternatives_spanish:
  - serán para holocausto para Yahvé
  - serán ofrenda quemada para Yahvé
  lexicon: HALOT
  rationale: עֹלָה es el holocausto, la ofrenda totalmente consumida. «Holocausto» es el equivalente cultual tradicional y preciso; se mantiene Yahvé según el estándar español del proyecto.
- source_word: וּמִנְחָתָם
  english_pob_choice: with their grain offering
  chosen_spanish: con su ofrenda de cereal
  alternatives_spanish:
  - con su ofrenda vegetal
  - con su ofrenda de grano
  lexicon: HALOT
  rationale: מִנְחָה en Levítico es la ofrenda de cereal/grano que acompaña el holocausto. «Ofrenda de cereal» evita un giro demasiado eclesiástico y sigue la terminología cultual.
- source_word: וְנִסְכֵּיהֶם
  english_pob_choice: and their drink offerings
  chosen_spanish: y sus libaciones
  alternatives_spanish:
  - y sus ofrendas de bebida
  - y sus derramamientos
  lexicon: HALOT
  rationale: נֶסֶךְ es una ofrenda derramada; «libaciones» es el equivalente español más directo y reconocido en contexto bíblico-sacrificial.
- source_word: אִשֵּׁה
  english_pob_choice: a food offering
  chosen_spanish: ofrenda encendida
  alternatives_spanish:
  - ofrenda por fuego
  - ofrenda ígnea
  lexicon: HALOT
  rationale: El término hebreo señala una ofrenda hecha por fuego. «Ofrenda encendida» conserva el elemento del fuego sin imponer la categoría interpretativa de «food offering», que sería menos natural en español.
- source_word: רֵיחַ נִיחֹחַ
  english_pob_choice: a pleasing aroma
  chosen_spanish: de aroma agradable
  alternatives_spanish:
  - de aroma placentero
  - de olor grato
  lexicon: HALOT
  rationale: La expresión es un modismo sacrificial de aceptación. «De aroma agradable» transmite la imagen sin perder la resonancia tradicional.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - de parte de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del proyecto en español, «Yahvé», conforme al criterio de traducción directa del Tetragrama.
theological_decisions:
- issue: Forma de renderizar el Tetragrama יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre de pacto de Dios directamente. En el español del proyecto se ha fijado «Yahvé» como equivalente principal, evitando el reemplazo por «el SEÑOR» que enmascararía el nombre propio.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de la ofrenda final (אִשֵּׁה)
  english_pob_reading: a food offering / an offering by fire
  chosen_spanish_reading: ofrenda encendida
  alternative_spanish_readings:
  - ofrenda por fuego
  - ofrenda ígnea
  rationale: La tensión entre la tradición de «ofrenda por fuego» y la necesidad de un español idiomático se resuelve con «ofrenda encendida», que preserva el rasgo del fuego y sigue siendo legible para lectores contemporáneos.
  doctrine_reference: Levitical sacrificial terminology
translation_notes:
  revision_awareness: 'El pasaje presenta alto acuerdo con el control inglés auditado y no requiere revisión textual adicional; se han conservado las decisiones cultuales principales: acompañamiento de la ofrenda con el pan, nomenclatura sacrificial precisa y el nombre divino Yahvé en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se usa «holocausto» para עֹלָה, coherente con la terminología cultual del Antiguo Testamento.
  - «Ofrenda de cereal» traduce מִנְחָה de modo consistente con el registro sacrificial.
  - No se sustituyó «libaciones» por un giro más libre, para conservar el valor técnico de נֶסֶךְ.
  - La nota al pie marca únicamente la ambigüedad de עַל הַלֶּחֶם; no se añadieron notas innecesarias.
