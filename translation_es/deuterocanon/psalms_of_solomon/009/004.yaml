lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón o fundamento de la afirmación anterior. En español, «Porque» conserva con naturalidad ese valor causal sin forzar un orden extraño.
- source_word: κριτὴς
  english_pob_choice: judge
  chosen_spanish: juez
  alternatives_spanish:
  - árbitro
  lexicon: BDAG
  rationale: El sustantivo designa a quien juzga. «Juez» es la correspondencia directa y clara en español.
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - recto y justo
  lexicon: BDAG
  rationale: Aunque la POB inglesa opta por «righteous» para conservar el peso moral y teológico, en español «justo» transmite de manera natural esa cualidad divina. «Recto» es posible, pero aquí suena menos idiomático.
- source_word: ἐπὶ
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - por encima de
  lexicon: BDAG
  rationale: Con un sustantivo de autoridad o jurisdicción, la preposición expresa dominio o gobierno. «Sobre» reproduce bien esa relación.
- source_word: πάντας τοὺς λαοὺς
  english_pob_choice: all the peoples
  chosen_spanish: todos los pueblos
  alternatives_spanish:
  - todas las naciones
  lexicon: BDAG
  rationale: λαοί está en plural y señala grupos humanos diversos. «Pueblos» preserva mejor esa pluralidad que «naciones», que en español puede sonar más político o estatal.
- source_word: τῆς γῆς
  english_pob_choice: of the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del mundo
  lexicon: BDAG
  rationale: En esta afirmación universal, «tierra» conserva el valor del griego y el alcance global del enunciado. «Mundo» también es posible, pero desplaza ligeramente el matiz léxico.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego directo y conserva la alternativa léxica documentada por la POB inglesa para λαοί, sin añadir explicaciones ajenas al versículo.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno.
  - «Justo» se usa como equivalente natural de δίκαιος en este contexto judicial/divino.
  - «Pueblos» conserva la pluralidad de λαοί sin reemplazarla por una formulación más estrecha.
  - La nota al pie refleja la alternativa de traducción documentada en el audit trail inglés.
