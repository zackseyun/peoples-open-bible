    text: O ‘hombres de muerte’, es decir, hombres sujetos a muerte o dignos de ejecución.
    reason: lexical_alternative
  - marker: b
    text: ‘Derecho’ traduce aquí צְדָקָה en el sentido de un reclamo o pretensión justa, no principalmente rectitud moral personal.
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva todas las decisiones léxicas correctas del borrador, pero mejora la naturalidad y precisión del español: "eran" concuerda mejor con el referente colectivo familiar; "sin embargo" expresa claramente el contraste de וַ; y "me queda, para que siga clamando al rey" evita una construcción final poco natural y transmite mejor que Mefiboset ya no tiene base para seguir apelando.'
