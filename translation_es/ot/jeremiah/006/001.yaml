translation:
  language: es
  text: ¡Huyan para ponerse a salvo[a], hijos de Benjamín, de en medio de Jerusalén! Toquen el cuerno en Tecoa y levanten una señal[c] sobre Bet-haquerem[b], porque un desastre aparece desde el norte[d], y una gran destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pónganse a salvo»; o: «Apresúrense a escapar». El imperativo hebreo es difícil y puede llevar la idea de buscar refugio con urgencia.'
    reason: lexical_alternative
  - marker: b
    text: Bet-haquerem es un lugar propio; probablemente era un punto alto usado para señales de advertencia entre Jerusalén y Tecoa.
    reason: cultural_note
  - marker: c
    text: 'O: «alcen una señal»; o: «levanten una antorcha» / «una señal de fuego».'
    reason: lexical_alternative
  - marker: d
    text: 'Lit.: «el desastre se asoma desde el norte» o «ha mirado desde el norte», personificando la calamidad que viene de esa dirección.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעִ֣זוּ
  english_pob_choice: Flee for safety
  chosen_spanish: ¡Huyan para ponerse a salvo[a]!
  alternatives_spanish:
  - Pónganse a salvo
  - Huyan a refugiarse
  - Apresúrense a escapar
  lexicon: HALOT
  rationale: El imperativo hebreo es difícil y, en este contexto de alarma militar inmediata, expresa con naturalidad una orden urgente de buscar seguridad. «Huyan para ponerse a salvo» conserva ese valor sin convertirlo en una simple exhortación a la fuerza.
- source_word: בְּנֵ֣י בִניָמִ֗ן
  english_pob_choice: sons of Benjamin
  chosen_spanish: hijos de Benjamín
  alternatives_spanish:
  - gente de Benjamín
  - benjaminitas
  lexicon: HALOT
  rationale: Se conserva la expresión filial plural del hebreo y la identidad tribal. «Hijos de Benjamín» comunica el grupo corporativo al que se dirige la advertencia, manteniendo la forma cercana al original.
- source_word: מִ/קֶּ֨רֶב֙ יְר֣וּשָׁלִַ֔ם
  english_pob_choice: from the midst of Jerusalem
  chosen_spanish: de en medio de Jerusalén
  alternatives_spanish:
  - desde el corazón de Jerusalén
  - desde dentro de Jerusalén
  - de la mitad de Jerusalén
  lexicon: HALOT
  rationale: קֶרֶב indica el interior o centro. «De en medio de Jerusalén» reproduce la imagen de salir desde el interior de la ciudad y suena natural en español bíblico contemporáneo.
- source_word: וּ/בִ/תְק֨וֹעַ֙ תִּקְע֣וּ שׁוֹפָ֔ר
  english_pob_choice: Blow the trumpet in Tekoa
  chosen_spanish: Toquen el cuerno en Tecoa
  alternatives_spanish:
  - Toquen la trompeta en Tecoa
  - Hagan sonar el cuerno en Tecoa
  - Toquen el cuerno de carnero en Tecoa
  lexicon: HALOT
  rationale: שׁוֹפָר es un cuerno de alarma; en español, «cuerno» preserva mejor el referente que «trompeta» y evita introducir un instrumento demasiado moderno o distinto. Se mantiene Tecoa como topónimo transliterado.
- source_word: וְ/עַל בֵּ֥ית הַכֶּ֖רֶם
  english_pob_choice: over Beth-haccherem
  chosen_spanish: sobre Bet-haquerem[b][c]
  alternatives_spanish:
  - en Bet-haquerem
  - encima de Bet-haquerem
  - desde Bet-haquerem
  lexicon: HALOT
  rationale: עַל permite un sentido locativo/elevado. «Sobre Bet-haquerem» conserva la idea de un punto alto apto para señalización y mantiene el nombre propio por transliteración.
- source_word: שְׂא֣וּ מַשְׂאֵ֑ת
  english_pob_choice: raise a signal
  chosen_spanish: levanten una señal
  alternatives_spanish:
  - alcen una señal
  - levanten un faro
  - alcen una antorcha
  lexicon: HALOT
  rationale: מַשְׂאֵת puede ser algo alzado, aquí probablemente una señal de aviso. «Levanten una señal» es suficientemente amplio para no especificar indebidamente fuego o antorcha, y refleja bien la función de alerta.
- source_word: כִּ֥י רָעָ֛ה
  english_pob_choice: for disaster
  chosen_spanish: porque un desastre
  alternatives_spanish:
  - porque una calamidad
  - porque un mal
  - pues viene el desastre
  lexicon: HALOT
  rationale: En contexto profético-jurídico, רָעָה expresa calamidad/desgracia más que mal moral. «Desastre» comunica con claridad el juicio inminente sin cargar el verso con una lectura ética que el hebreo inmediato no exige.
- source_word: נִשְׁקְפָ֥ה
  english_pob_choice: appears
  chosen_spanish: aparece
  alternatives_spanish:
  - se deja ver
  - se asoma
  - se ve
  lexicon: HALOT
  rationale: El nifal de שׁקף puede expresar la idea de asomarse o dejarse ver desde una altura. «Aparece» sigue la revisión inglesa más reciente y mantiene la imagen de algo ya visible que viene desde el norte.
- source_word: מִ/צָּפ֖וֹן
  english_pob_choice: from the north
  chosen_spanish: del norte
  alternatives_spanish:
  - desde el norte
  - procedente del norte
  lexicon: HALOT
  rationale: Es una indicación direccional directa. En Jeremías, «del norte» es la fórmula sobria y natural para la procedencia del juicio invasor.
- source_word: וְ/שֶׁ֥בֶר גָּדֽוֹל
  english_pob_choice: and great destruction
  chosen_spanish: y una gran destrucción
  alternatives_spanish:
  - y gran ruina
  - y un gran quebranto
  - y una gran devastación
  lexicon: HALOT
  rationale: שֶׁבֶר literalmente implica quebradura, pero en este contexto profético señala ruina o destrucción. «Gran destrucción» es claro, natural y mantiene el paralelismo con «desastre».
theological_decisions:
- issue: Dirección del juicio y lenguaje de calamidad
  english_pob_reading: disaster ... great destruction
  chosen_spanish_reading: un desastre ... una gran destrucción
  alternative_spanish_readings:
  - una calamidad ... una gran ruina
  - un mal ... un gran quebranto
  rationale: La frase describe la irrupción del juicio desde el norte, no una afirmación doctrinal sobre el mal moral. «Desastre» y «gran destrucción» preservan el valor de calamidad sin sobreinterpretar el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Tratamiento corporativo del llamado a Benjamín
  english_pob_reading: sons of Benjamin
  chosen_spanish_reading: hijos de Benjamín
  alternative_spanish_readings:
  - gente de Benjamín
  - benjaminitas
  rationale: Se mantiene la forma masculina plural del hebreo por fidelidad al original, entendida de manera corporativa como el pueblo/tribu de Benjamín. No se neutraliza el dato gramatical del texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Imagen de la señal de alarma
  english_pob_reading: raise a signal
  chosen_spanish_reading: levanten una señal
  alternative_spanish_readings:
  - levanten un faro
  - alcen una antorcha
  - levanten una señal de fuego
  rationale: El hebreo deja abierta la clase exacta de señal. La versión española evita fijar indebidamente «fuego» o «antorcha», conservando la amplitud semántica que permite el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB al preferir una formulación de urgencia para הָעִזוּ y al reflejar נִשְׁקְפָה con un verbo más natural en español («aparece»), manteniendo el carácter elíptico de la última cláusula. También se respetó la decisión auditada de no especificar indebidamente el tipo de señal en מַשְׂאֵת.
  spanish_consistency_notes:
  - Se translitera el topónimo como «Tecoa» y «Bet-haquerem», siguiendo el patrón español para nombres propios bíblicos.
  - Se usa «cuerno» para שׁוֹפָר, porque en español comunica mejor el instrumento de alarma sin introducir una trompeta moderna.
  - Se conserva «del norte» como fórmula profética estable y clara.
  - La puntuación refleja una serie de imperativos seguidos de una motivación causal final, conforme al hebreo.
