revisions:
- from: Y las multitudes de toda la ciudad se habían reunido para el espectáculo [a] más lamentable, esperando con ansia la mañana.
  to: Y las multitudes por toda la ciudad se estaban reuniendo para el espectáculo[a] más lamentable, esperando con ansia la mañana.
  rationale: Se ajusta el imperfecto griego con 'se estaban reuniendo', se mejora la naturalidad de la distribución espacial con 'por toda la ciudad', y se corrige la nota para preservar de verdad la ambigüedad léxica de θεωρία entre el acto de ver y el espectáculo contemplado. Se mantiene 'espectáculo más lamentable' como opción principal por su fuerza pública y patética, en línea con el POB inglés.
