translation:
  language: es
  text: Pero Yahvé, el Dios de Israel, me escogió de entre toda la casa de mi padre para ser rey sobre Israel para siempre[a]; porque escogió a Judá como líder[b], y en la casa de Judá, la casa de mi padre, y entre los hijos de mi padre, se complació en mí para hacerme rey sobre todo Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Para siempre'' refleja el hebreo de duración permanente o perdurable, aquí en el marco de la realeza davídica.'
    reason: cultural_note
  - marker: b
    text: '''Líder'' traduce el hebreo nagid; también puede entenderse como ''príncipe'' o ''jefe''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en forma transliterada, conforme al criterio del POB y al uso español reverente y legible. No se sustituye por un título para no ocultar el Tetragrámaton.
- source_word: וַיִּבְחַר / בָּחַר
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: HALOT
  rationale: בחר expresa elección soberana; 'escogió' es natural en español y mantiene el énfasis repetido en la selección divina.
- source_word: בִּי מִכֹּל בֵּית אָבִי
  english_pob_choice: me from all my father's house
  chosen_spanish: de entre toda la casa de mi padre
  alternatives_spanish:
  - de toda la casa de mi padre
  - de entre la casa de mi padre
  lexicon: HALOT
  rationale: '''De entre'' refleja mejor el valor de separación/selección de מִכֹּל que un simple ''de''. ''Casa de mi padre'' conserva el ámbito familiar/clánico del hebreo.'
- source_word: לִהְיוֹת לְמֶלֶךְ
  english_pob_choice: to be king
  chosen_spanish: para ser rey
  alternatives_spanish:
  - para llegar a ser rey
  - para ser rey y reinar
  lexicon: HALOT
  rationale: La construcción infinitiva indica resultado/nombramiento; 'para ser rey' es fiel y natural en español.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - perpetuamente
  - para un tiempo perpetuo
  lexicon: HALOT
  rationale: '''Para siempre'' comunica la permanencia dinástica y el peso teológico del término sin resolver la tensión histórica/mesiánica que el texto deja abierta.'
- source_word: בִּיהוּדָה ... לְנָגִיד
  english_pob_choice: he chose Judah as leader
  chosen_spanish: escogió a Judá como líder
  alternatives_spanish:
  - escogió a Judá como príncipe
  - escogió a Judá como jefe
  lexicon: HALOT
  rationale: נָגִיד puede ser 'líder', 'jefe' o 'príncipe'. Se elige 'líder' por su claridad moderna y porque no impone una distinción de rango que el versículo no desarrolla.
- source_word: וּבְבֵית יְהוּדָה בֵּית אָבִי
  english_pob_choice: and in the house of Judah, my father's house
  chosen_spanish: y en la casa de Judá, la casa de mi padre
  alternatives_spanish:
  - y dentro de la casa de Judá, la casa de mi padre
  - y en la casa de Judá, mi casa paterna
  lexicon: HALOT
  rationale: 'Se conserva la progresión geográfica/genealógica del hebreo: Judá → casa de Judá → casa del padre. ''La casa de mi padre'' mantiene la resonancia familiar sin sobrerreformular.'
- source_word: וּבִבְנֵי אָבִי
  english_pob_choice: and among my father's sons
  chosen_spanish: y entre los hijos de mi padre
  alternatives_spanish:
  - y entre los hijos de mi padre
  - y entre mis hermanos
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hijos de mi padre'; 'hijos' preserva la especificidad genealógica mejor que 'hermanos', que sería interpretativo.
- source_word: בִּי רָצָה
  english_pob_choice: he took pleasure in me
  chosen_spanish: se complació en mí
  alternatives_spanish:
  - se deleitó en mí
  - tuvo agrado en mí
  lexicon: HALOT
  rationale: רצה aquí expresa aceptación favorable y deleite personal. 'Se complació en mí' mantiene ese matiz sin confundirse con la mera elección ya expresada por בחר.
- source_word: לְהַמְלִיךְ
  english_pob_choice: to make me king
  chosen_spanish: para hacerme rey
  alternatives_spanish:
  - para entronizarme
  - para constituirme rey
  lexicon: HALOT
  rationale: El causativo de מלך indica 'hacer rey' a alguien; 'para hacerme rey' conserva la fuerza causativa de modo claro y sobrio.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: over all Israel
  chosen_spanish: sobre todo Israel
  alternatives_spanish:
  - sobre todo el Israel
  - sobre la totalidad de Israel
  lexicon: HALOT
  rationale: '''Todo Israel'' es la forma natural en español para el alcance político del dominio; mantiene el ámbito total sin agregar matices ajenos.'
theological_decisions:
- issue: Alcance de לְעוֹלָם en la monarquía davídica
  english_pob_reading: Rendered 'forever' to preserve the dynastic and covenantal horizon of the statement.
  chosen_spanish_reading: Traducido 'para siempre' para preservar el horizonte dinástico y pactal de la afirmación.
  alternative_spanish_readings:
  - por largo tiempo
  - de modo perpetuo en sentido real
  rationale: El contexto de la elección de David apunta a la permanencia de la línea davídica, no solo a la duración personal de su reinado. Se preserva la tensión teológica sin explicitar su cumplimiento posterior.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Valor de נָגִיד
  english_pob_reading: Rendered as 'leader' rather than 'prince.'
  chosen_spanish_reading: Traducido como 'líder' en vez de 'príncipe'.
  alternative_spanish_readings:
  - príncipe
  - jefe
  rationale: En este contexto 'líder' comunica autoridad sin importar una categoría cortesana moderna o una jerarquía técnica no exigida por el texto.
  doctrine_reference: No doctrinal issue; lexical-theological nuance of office/title.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el expediente auditado en inglés: conserva la secuencia de elección divina (Yahvé → Judá → casa de Judá → casa paterna → hijos del padre), mantiene la tensión de לְעוֹלָם con ''para siempre'' y refleja el valor causal de לְהַמְלִיךְ con ''para hacerme rey''. También se atendió la revisión inglesa que prefirió ''leader'' para נָגִיד y ajustó la localización de la casa de Judá.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma principal del nombre divino, en consonancia con el POB y la política terminológica del proyecto.
  - Se conserva 'rey' en lugar de 'monarca' para mantener la resonancia bíblica directa y la correspondencia con מֶלֶךְ.
  - '''Todo Israel'' mantiene la referencia colectiva y política sin introducir explicaciones fuera del versículo.'
  - No se emplean fórmulas eclesiásticas tradicionales que oculten el léxico del hebreo original.
