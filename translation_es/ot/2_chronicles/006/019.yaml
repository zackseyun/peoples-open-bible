revisions:
- from: Pero vuelve a la oración de tu siervo y a su súplica de favor[a], Yahvé mi Dios[b][c], para escuchar el clamor y la oración que tu siervo hace delante de ti.
  to: Pero vuélvete hacia la oración de tu siervo y hacia su súplica de favor[a], Yahvé mi Dios, para escuchar el clamor[b] y la oración que tu siervo ora ante ti.
  rationale: Se corrige el verbo final para reflejar con mayor fidelidad מִתְפַּלֵּל ('ora') y mejorar la naturalidad del español. También se recoloca la nota sobre הָרִנָּה junto a 'clamor' y se elimina la nota c, que no era necesaria como nota al texto. Se mantiene 'Yahvé' según la política del proyecto y la distinción 'oración / súplica de favor'.
