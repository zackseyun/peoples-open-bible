translation:
  language: es
  text: Da descanso a tu alma[a], y alegra tu corazón; y mantén lejos de ti la ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de este versículo es difícil, y el paralelo griego disponible refleja una redacción sustancialmente distinta. La traducción sigue el testimonio hebreo conservado, con «alegra» como lectura contextual de un verbo difícil.
    reason: textual_variant
lexical_decisions:
- source_word: פוג
  english_pob_choice: give rest
  chosen_spanish: da descanso
  alternatives_spanish:
  - descansa
  - alivia
  - apacigua
  lexicon: HALOT
  rationale: El hebreo apunta al alivio o relajación del interior. «Da descanso» conserva un matiz causativo natural en español y sigue de cerca la fuerza exhortativa del verbo sin volverlo demasiado coloquial.
- source_word: נפשך
  english_pob_choice: your soul
  chosen_spanish: tu alma
  alternatives_spanish:
  - tu vida
  - tu ser
  - tu persona interior
  lexicon: HALOT
  rationale: «Alma» reproduce bien el peso antropológico de נפש en lenguaje sapiencial y mantiene la resonancia moral e interior del texto, sin imponer una distinción filosófica rígida.
- source_word: ופיג
  english_pob_choice: and gladden
  chosen_spanish: y alegra
  alternatives_spanish:
  - y consuela
  - y reanima
  - y serena
  lexicon: HALOT
  rationale: La forma es difícil, pero el contexto pide una acción positiva sobre el interior. «Alegra» encaja con el paralelismo con «corazón» y con la exhortación ética que sigue, sin exagerar el matiz técnico del hebreo.
- source_word: לבך
  english_pob_choice: your heart
  chosen_spanish: tu corazón
  alternatives_spanish:
  - tu mente
  - tu interior
  lexicon: HALOT
  rationale: «Corazón» es el equivalente más natural y fiel para לב en sabiduría, donde designa el centro de pensamiento y afecto.
- source_word: וקצפון
  english_pob_choice: and anger
  chosen_spanish: y la ira
  alternatives_spanish:
  - y el enojo
  - y la indignación
  - y el furor
  lexicon: HALOT
  rationale: El sustantivo denota ira o enojo fuerte. «Ira» es claro, digno y suficientemente amplio en español para este mandato sapiencial.
- source_word: הרחק ממך
  english_pob_choice: keep far from you
  chosen_spanish: mantén lejos de ti
  alternatives_spanish:
  - apártala de ti
  - aléjala de ti
  - ponla lejos de ti
  lexicon: HALOT
  rationale: La construcción exige una distancia activa. «Mantén lejos de ti» suena natural en español y conserva la fuerza imperativa de separar la ira de la propia vida interior.
theological_decisions:
- issue: Alcance antropológico de נפש
  english_pob_reading: your soul
  chosen_spanish_reading: tu alma
  alternative_spanish_readings:
  - tu vida
  - tu ser
  rationale: En el contexto sapiencial, «alma» comunica la interioridad moral y vital del versículo sin introducir más doctrina de la necesaria. Se evita reducirlo a un simple «yo» o «ser» porque perdería densidad bíblica.
  doctrine_reference: PHILOSOPHY.md; original-language primacy and readable modern Spanish
- issue: Tratamiento de una línea hebrea difícil con paralelo griego desajustado
  english_pob_reading: Translate primarily from the Hebrew as an exhortation to inner rest and joy, while noting source uncertainty in a footnote.
  chosen_spanish_reading: Traducir principalmente desde el hebreo conservado como exhortación al descanso y la alegría interior, y señalar la incertidumbre textual en una nota.
  alternative_spanish_readings:
  - 'Seguir el griego: «Y yo, el último, vigilé como uno que rebusca detrás de los vendimiadores»'
  - Forzar una armonización entre ambos testigos
  rationale: La evidencia muestra una discrepancia grande entre el hebreo transmitido y el griego. Para la POB en español conviene seguir el testimonio hebreo sobreviviente, pero sin ocultar la variante significativa del paralelo griego.
  doctrine_reference: PHILOSOPHY.md; transparencia textual en deuterocanónicos
translation_notes:
  revision_awareness: El pasaje fue evaluado recientemente sin cambios necesarios; la presente propuesta mantiene la lectura basada en el hebreo conservado y conserva la nota de variante textual por la fuerte discrepancia con el griego paralelo.
  spanish_consistency_notes:
  - Se mantiene «alma» para נפש y «corazón» para לב, siguiendo el uso sapiencial bíblico.
  - Se usa «ira» para קצפון, un término sobrio y amplio en español bíblico moderno.
  - La nota al pie marca explícitamente la dificultad textual sin intentar armonizar el hebreo y el griego.
