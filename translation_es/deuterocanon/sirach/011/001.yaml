translation:
  language: es
  text: La sabiduría del pobre[a] levanta su cabeza, y lo hace sentar entre nobles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el humilde» o «el de condición baja»; el hebreo dice «el pobre», mientras que el paralelo griego puede sugerir más ampliamente una condición social baja.
    reason: lexical_alternative
lexical_decisions:
- source_word: חָכְמַת
  english_pob_choice: The wisdom of
  chosen_spanish: La sabiduría de
  alternatives_spanish:
  - La sabiduría
  - La conducta sabia de
  lexicon: HALOT
  rationale: El constructo hebreo con דַּל exige en español una relación genitiva explícita. «La sabiduría de» reproduce fielmente esa dependencia sin perder naturalidad.
- source_word: דַּל
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el humilde
  - el bajo de condición
  - el débil
  lexicon: HALOT
  rationale: El hebreo דל puede abarcar pobreza, fragilidad o estatus bajo. Sigo la decisión inglesa de dar prioridad al sentido socioeconómico concreto, mientras la referencia al griego permite oír también la connotación de baja condición.
- source_word: תִּשָּׂא רֹאשׁוֹ
  english_pob_choice: lifts up his head
  chosen_spanish: levanta su cabeza
  alternatives_spanish:
  - alza su cabeza
  - levanta la cabeza de él
  - lo enaltece
  lexicon: HALOT
  rationale: La imagen hebrea de levantar la cabeza se conserva de modo transparente en español. Mantiene la metáfora de dignidad/restauración sin sustituirla por una explicación menos cercana al texto.
- source_word: וּבֵין
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - among
  lexicon: HALOT
  rationale: Con un plural humano, «entre» es la forma más natural en español y conserva la idea relacional de estar ubicado dentro de un grupo.
- source_word: נְדִיבִים
  english_pob_choice: nobles
  chosen_spanish: nobles
  alternatives_spanish:
  - príncipes
  - grandes
  - personas de rango
  lexicon: HALOT
  rationale: «Nobles» comunica adecuadamente la elevación social indicada por el hebreo y el paralelo griego μεγιστάνων, sin restringir innecesariamente el término a un cargo político específico.
- source_word: תּוֹשִׁיבֶנּוּ
  english_pob_choice: seats him
  chosen_spanish: lo sienta
  alternatives_spanish:
  - lo hace sentar
  - lo coloca
  - le da asiento
  lexicon: HALOT
  rationale: El hiphil de ישב expresa causar que alguien se siente o darle un lugar. «Lo sienta» conserva la acción y la imagen de honor con buena fluidez en español.
theological_decisions:
- issue: Si דל debe leerse principalmente como pobreza material o como humildad moral
  english_pob_reading: the poor, with a footnote allowing 'the lowly' or 'the humble'
  chosen_spanish_reading: el pobre, con nota que admite 'el humilde' o 'el de condición baja'
  alternative_spanish_readings:
  - el humilde
  - el de condición baja
  - el débil
  rationale: La evidencia hebrea favorece el matiz concreto de pobreza o bajeza social, y el paralelo griego amplía el campo semántico hacia la baja condición. La nota preserva esa tensión sin borrar la elección principal.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se observan revisiones aplicadas en el expediente; el texto inglés reciente permanece sin cambios y el consenso de verificación es alto, con solo una observación menor sobre el alcance semántico de דל.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el testimonio fuente lo exige; este versículo no contiene el nombre divino.
  - Se prefirió «nobles» para mantener la referencia social de rango, en consonancia con el hebreo y el griego.
  - La metáfora de levantar la cabeza se conservó de forma literal para respetar la imagen de elevación y honor.
