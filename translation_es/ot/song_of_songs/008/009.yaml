    text: O 'la guardaremos con una tabla de cedro'. El verbo hebreo puede llevar el sentido de cercar, encerrar, asediar o guardar.
    reason: lexical_alternative
  revision_rationale: Se revisa únicamente el segundo verbo principal para alinear mejor el español con el hebreo נָצוּר y con la decisión auditada inglesa 'we will enclose'. 'La cercaremos con una tabla de cedro' conserva la imagen arquitectónica y protectora sin reducirla al acto ordinario de cerrar una puerta. Se mantienen las demás decisiones, que son fieles y legibles.
