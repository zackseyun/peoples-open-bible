translation:
  language: es
  text: Y Yahvé habló a Moisés[a], diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; tradicionalmente se traduce «el SEÑOR».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  - se dirigió
  lexicon: HALOT
  rationale: El hebreo introduce una nueva escena de habla narrativa con el verbo דבר en forma wayyiqtol. En español, «habló» mantiene el valor de introducción de discurso con un tono natural y digno. «Dijo» sería posible, pero aquí «habló» conserva mejor la fórmula narrativa y el matiz de acto de habla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, no un sustituto litúrgico. «Yahvé» es la forma adoptada en el proyecto para reflejar directamente el nombre revelado, en continuidad con la decisión inglesa de usar «Yahweh».
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para con
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, «a» es la equivalencia natural y precisa para introducir el objeto indirecto de este verbo de comunicación.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico y moderno.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: En esta fórmula hebrea de introducción de discurso, el participio «diciendo» reproduce la construcción de enlace que anticipa la cita siguiente. «Para decir» suena menos natural en español aquí.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'La línea doctrinal del POB inglés evita la sustitución por un título y preserva el nombre propio. En español, «Yahvé» cumple la misma función: mantiene visible el Tetragrámaton como nombre personal del Dios del pacto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: la estructura narrativa, el destinatario, y el tratamiento del nombre divino no requieren revisión adicional. Se mantuvo la misma decisión teológica de preservar el Tetragrámaton en forma transliterada, adaptada al uso español como «Yahvé».'
  spanish_consistency_notes:
  - 'Se mantuvo el orden y la función de la fórmula narrativa hebrea: sujeto divino + verbo de habla + destinatario + participio introductorio.'
  - «Yahvé» se usa de manera consistente para יְהוָה, evitando la convención de ocultamiento por título.
  - La puntuación con coma antes de «diciendo» sigue el valor introductorio de לֵּאמֹר y prepara la cita del versículo siguiente.
