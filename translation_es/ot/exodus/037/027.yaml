translation:
  language: es
  text: Y le hizo dos anillos de oro, debajo de su borde[a], en sus dos marcos laterales, en sus dos lados[b], como soportes para las varas, para llevarlo con ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «debajo de su moldura». El hebreo זֵר puede referirse al borde o adorno superior que rodea la pieza.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo repite dos expresiones relacionadas: «en sus dos marcos laterales, en sus dos lados». Se conserva la repetición en lugar de fundirla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׁתֵּי
  english_pob_choice: And... two
  chosen_spanish: Y... dos
  alternatives_spanish:
  - Y dos
  lexicon: HALOT
  rationale: La conjunción y el numeral femenino introducen el siguiente elemento en la secuencia. En español, "Y... dos" conserva el arranque narrativo sin forzar el orden.
- source_word: טַבְּעֹ֨ת
  english_pob_choice: rings
  chosen_spanish: anillos
  alternatives_spanish:
  - aros
  - anillos
  lexicon: HALOT
  rationale: El término designa piezas metálicas circulares usadas como fijaciones. "Anillos" es claro y natural en español bíblico contemporáneo; "aros" también sería posible, pero menos preciso para este contexto técnico.
- source_word: זָהָ֜ב
  english_pob_choice: of gold
  chosen_spanish: de oro
  alternatives_spanish:
  - de oro
  lexicon: HALOT
  rationale: Se trata de una relación material genitiva; "de oro" expresa con naturalidad el material del objeto.
- source_word: עָֽשָׂה ל֣/וֹ
  english_pob_choice: he made for it
  chosen_spanish: hizo para él
  alternatives_spanish:
  - hizo para ello
  - lo hizo
  lexicon: HALOT
  rationale: El sufijo pronominal remite al altar en contexto; en español, "para él" mantiene la relación dativa sin perder la referencia a un objeto masculino. Se evita "lo hizo" porque borra el matiz de destinación.
- source_word: מִ/תַּ֣חַת לְ/זֵר֗/וֹ
  english_pob_choice: under its rim
  chosen_spanish: debajo de su borde
  alternatives_spanish:
  - debajo de su moldura
  - debajo de su ribete
  - debajo de su corona
  lexicon: HALOT
  rationale: זֵר en este tipo de mobiliario sagrado denota el borde o adorno superior; "borde" es claro y no sugiere erróneamente una corona separada. Se conserva la nota de alternativa en el registro mediante el pie de nota.
- source_word: עַ֚ל שְׁתֵּ֣י צַלְעֹתָ֔י/ו
  english_pob_choice: on its two side frames
  chosen_spanish: sobre sus dos marcos laterales
  alternatives_spanish:
  - sobre sus dos costados
  - sobre sus dos piezas laterales
  - sobre sus dos lados
  lexicon: HALOT
  rationale: צלע puede referirse a costado, lado o pieza estructural lateral. "Marcos laterales" sigue la revisión inglesa "side frames" y comunica una estructura de soporte sin perder la idea de lateralidad.
- source_word: עַ֖ל שְׁנֵ֣י צִדָּ֑י/ו
  english_pob_choice: on its two sides
  chosen_spanish: sobre sus dos lados
  alternatives_spanish:
  - sobre ambos lados
  - sobre sus dos costados
  lexicon: HALOT
  rationale: צד es el término ordinario para lado. Se conserva la repetición hebrea, como en el texto inglés, en vez de fusionar ambas expresiones.
- source_word: לְ/בָתִּ֣ים
  english_pob_choice: as holders
  chosen_spanish: como soportes
  alternatives_spanish:
  - como sujetadores
  - como alojamientos
  - como receptáculos
  lexicon: HALOT
  rationale: La construcción literalmente equivale a "como casas", pero en este contexto funcional significa elementos que sostienen o reciben las varas. "Soportes" es idiomático y preciso.
- source_word: לְ/בַדִּ֔ים
  english_pob_choice: for poles
  chosen_spanish: para las varas
  alternatives_spanish:
  - para los travesaños
  - para los palos
  - para las barras
  lexicon: HALOT
  rationale: בדים son las varas utilizadas para transportar el mobiliario del tabernáculo. "Varas" es el término más reconocido en español bíblico para ese uso técnico.
- source_word: לָ/שֵׂ֥את אֹת֖/וֹ בָּ/הֶֽם
  english_pob_choice: with which to carry it
  chosen_spanish: para llevarlo con ellas
  alternatives_spanish:
  - para cargarlo con ellas
  - para transportarlo con ellas
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. "Para llevarlo con ellas" conserva la función instrumental de las varas sin volver la frase pesada en español; "ellas" retoma naturalmente las varas femeninas.
theological_decisions:
- issue: Terminología del objeto del santuario y del sufijo pronominal
  english_pob_reading: he made for it
  chosen_spanish_reading: hizo para él
  alternative_spanish_readings:
  - hizo para ello
  - lo hizo
  rationale: El referente es el altar u objeto sagrado, no una persona. En español se mantiene la referencia pronominal masculina conforme al antecedente implícito en el contexto, preservando la relación de destino del hebreo לּוֹ.
  doctrine_reference: Ex 37:27 en contexto de la fabricación del mobiliario del tabernáculo; coherencia referencial del pasaje.
- issue: Conservación de la duplicación hebrea de localización
  english_pob_reading: on its two side frames, on its two sides
  chosen_spanish_reading: sobre sus dos marcos laterales, sobre sus dos lados
  alternative_spanish_readings:
  - sobre sus dos costados
  - sobre sus dos piezas laterales
  rationale: El hebreo repite dos expresiones cercanas. Se conserva la duplicación para no suavizar el relieve textual ni perder la precisión descriptiva del montaje.
  doctrine_reference: Principio de correspondencia textual en pasajes técnicos de Éxodo 25–40.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de "side panels" a "side frames" en una revisión posterior para mayor precisión estructural. La redacción española sigue esa revisión con "marcos laterales", manteniendo la repetición hebrea y la función técnica del pasaje.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el texto contenga el nombre divino; este versículo no lo contiene.
  - '"Varas" se reserva para los elementos de transporte del mobiliario sagrado en Éxodo; no se sustituye por "palos" o "barras" salvo necesidad contextual.'
  - Se conserva la diferencia entre "borde" y "lado(s)" para reflejar las dos localizaciones distintas del hebreo.
