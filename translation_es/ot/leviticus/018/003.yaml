revisions:
- from: No hagan conforme a las obras de la tierra de Egipto[a], en la cual habitasteis; ni hagan conforme a las obras de la tierra de Canaán[b], a la cual yo los llevo; y no anden en sus estatutos.
  to: No hagan conforme a las obras de la tierra de Egipto[a], en la cual vivieron; ni hagan conforme a las obras de la tierra de Canaán, adonde yo los llevo; y no anden en sus estatutos[b].
  rationale: Se reemplazó 'habitasteis' por 'vivieron' para ajustarlo al español neutral latinoamericano; se movió la nota [b] a 'sus estatutos' porque su contenido explica la cláusula final, no 'Canaán'; y se suavizó 'a la cual yo los llevo' a 'adonde yo los llevo' para una dirección más natural en español sin perder el sentido del participio hebreo.
