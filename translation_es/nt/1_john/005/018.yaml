review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: «Sabemos», «todo el que ha nacido de Dios», el valor habitual de οὐχ ἁμαρτάνει, la ambigüedad de «el que nació de Dios», y «el maligno no lo toca». Sin embargo, la nota [b] introduce una alternativa principal no preservada en la POB inglesa: «O: “lo protege”». El rastro inglés reservó «protects him» como alternativa léxica no principal, mientras que la nota principal documentada para este lugar es la lectura alternativa «se guarda a sí mismo» junto con la interpretación cristológica. Conviene alinear las notas españolas con esa priorización auditada.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «No sigue pecando», «más bien», «el maligno», y «no lo toca» suenan bien en español neutral. La única mejora necesaria es ajustar la nota [b] para que no desplace la ambigüedad sintáctico-teológica principal con una simple alternativa léxica secundaria.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios», «el maligno» y el resto del vocabulario están bien alineados. No aparecen términos sensibles como Yahvé/Mesías/esclavo que requieran corrección aquí.
  issues:
  - severity: medium
    issue: 'La nota [b] prioriza «O: “lo protege”» en lugar de reflejar la nota principal auditada sobre «se guarda a sí mismo» / referencia a Jesús.'
    rationale: 'El inglés POB mantuvo «keeps him» en el texto y documentó en nota la alternativa de construal: «the one born of God keeps himself», además de la interpretación de que se refiere a Jesús, el Hijo. Añadir «O: “lo protege”» como apertura de la nota cambia el foco desde la ambigüedad del referente/estructura hacia una simple sustitución léxica, lo cual no coincide con la justificación documentada.'
  revised_spanish_text: Sabemos que todo el que ha nacido de Dios no sigue pecando[a]; más bien, el que nació de Dios lo guarda[b], y el maligno no lo toca[c].
  revised_footnotes:
  - marker: a
    text: 'O: «no peca»; el presente griego puede señalar conducta continua o habitual, no necesariamente la negación de todo acto de pecado.'
    reason: cross_reference
  - marker: b
    text: 'O: «el nacido de Dios se guarda a sí mismo». Sin embargo, muchos intérpretes entienden que «el que nació de Dios» se refiere a Jesús, el Hijo, quien guarda al creyente.'
    reason: alternative_reading
  - marker: c
    text: «Tocar» puede implicar sujetar o hacer daño.
    reason: lexical_alternative
  revision_rationale: 'La traducción principal puede mantenerse. Solo hace falta reparar la nota [b] para que preserve la decisión textual y teológica auditada por la POB inglesa: la alternativa relevante aquí no es primariamente «proteger», sino la lectura reflexiva «se guarda a sí mismo» frente a la interpretación cristológica de que el Hijo guarda al creyente.'
