  yaml_path: translation/ot/2_samuel/013/010.yaml
  text: Then Amnon said to Tamar[a], “Bring the food into the chamber, so that I may eat from your hand.” So Tamar took the cakes she had made and brought them into the chamber to Amnon her brother.
