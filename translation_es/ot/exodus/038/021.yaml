  text: אֵ֣לֶּה פְקוּדֵ֤י הַ/מִּשְׁכָּן֙ מִשְׁכַּ֣ן הָ/עֵדֻ֔ת אֲשֶׁ֥ר פֻּקַּ֖ד עַל פִּ֣י מֹשֶׁ֑ה עֲבֹדַת֙ הַ/לְוִיִּ֔ם בְּ/יַד֙ אִֽיתָמָ֔ר בֶּֽן אַהֲרֹ֖ן הַ/כֹּהֵֽן־־׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/038/021.yaml
  text: These are the records of the tabernacle[a], the tabernacle of the testimony, as they were recorded at the command of Moses[c][b], by the service of the Levites under the direction of Ithamar son of Aaron the priest.
  footnotes:
  - marker: a
    text: Or 'inventory' or 'accounts' of the tabernacle; the Hebrew term refers to an official reckoning.
    reason: lexical_alternative
  - marker: b
    text: '''The testimony'' likely refers to the covenant testimony, especially the tablets placed in the ark.'
    reason: cultural_note
  - marker: c
    text: Literally 'by the hand of Ithamar,' an idiom for agency or supervision.
    reason: lexical_alternative
