  to: Así que David y Abisai llegaron a las tropas de noche[a]; y he aquí, Saúl estaba acostado y dormido dentro del campamento, con su lanza clavada en la tierra a su cabecera, y Abner y las tropas estaban acostados alrededor de él.
  rationale: Se reemplaza «el pueblo» por «las tropas» en ambas ocurrencias para reflejar fielmente הָעָם en contexto militar, en línea con la decisión lexical auditada del English POB. También se mantiene la nota sobre «en el círculo» porque preserva la alternativa de בַּמַּעְגָּל sin sacrificar claridad en el texto principal. No se requieren más cambios.
