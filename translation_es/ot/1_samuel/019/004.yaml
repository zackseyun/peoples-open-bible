translation:
  language: es
  text: 'Jonatán habló bien de David[a] a Saúl, su padre, y le dijo: «Que el rey no peque contra su siervo David, porque él no ha pecado contra ti, y porque sus acciones te han sido muy provechosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habló favorablemente de David». El hebreo usa un modismo que literalmente dice “habló bien acerca de David”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר ... טוֹב / בְּדָוִד
  english_pob_choice: spoke well of
  chosen_spanish: habló bien de
  alternatives_spanish:
  - habló favorablemente de
  - dijo cosas buenas acerca de
  lexicon: HALOT
  rationale: El hebreo usa un modismo con דִּבֶּר + בְּ + טוֹב para expresar aprobación o defensa favorable, no solo “hablar” en sentido neutro. “Habló bien de” conserva ese valor idiomático en español natural.
- source_word: אֶל שָׁאוּל אָבִיו
  english_pob_choice: to Saul his father
  chosen_spanish: a Saúl, su padre
  alternatives_spanish:
  - a su padre Saúl
  lexicon: HALOT
  rationale: La relación posesiva se mantiene en español con coma explicativa. Esta opción respeta el orden hebreo sin sonar forzada.
- source_word: אַל יֶחֱטָא
  english_pob_choice: Let not ... sin
  chosen_spanish: Que ... no peque
  alternatives_spanish:
  - No permita que ... peque
  - No peque
  lexicon: HALOT
  rationale: El jussivo con אַל expresa prohibición. En español, “Que el rey no peque” conserva el tono exhortativo y la cortesía del discurso de Jonatán.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - mi señor el rey
  lexicon: HALOT
  rationale: El hebreo dice simplemente “el rey”; no se añadió un tratamiento más amplio que no está en el texto.
- source_word: בְּעַבְדּוֹ
  english_pob_choice: against his servant
  chosen_spanish: contra su siervo
  alternatives_spanish:
  - contra su esclavo
  - respecto de su siervo
  lexicon: HALOT
  rationale: Aquí חטא + ב significa “pecar contra”. Se conserva “siervo” porque el español bíblico y el contexto cortesano transmiten adecuadamente la relación de subordinación, aunque “esclavo” sería una posibilidad lexical más dura en otros contextos.
- source_word: בְדָוִד
  english_pob_choice: against David
  chosen_spanish: David
  alternatives_spanish:
  - contra David
  lexicon: HALOT
  rationale: El hebreo repite el nombre para identificar al siervo en aposición. En español, la aposición simple “su siervo David” comunica esa identificación sin duplicar la preposición.
- source_word: כִּי לֹא חָטָא לָךְ
  english_pob_choice: because he has not sinned against you
  chosen_spanish: porque él no ha pecado contra ti
  alternatives_spanish:
  - porque no te ha hecho ningún mal
  - pues él no ha pecado contra ti
  lexicon: HALOT
  rationale: Se mantiene el mismo verbo “pecar” para preservar el contraste retórico entre el posible pecado de Saúl y la inocencia de David.
- source_word: וְכִי
  english_pob_choice: and because
  chosen_spanish: y porque
  alternatives_spanish:
  - además porque
  - pues
  lexicon: HALOT
  rationale: El hebreo añade una segunda razón. “Y porque” refleja la acumulación argumentativa de Jonatán.
- source_word: מַעֲשָׂיו
  english_pob_choice: his deeds
  chosen_spanish: sus acciones
  alternatives_spanish:
  - sus obras
  - lo que ha hecho
  lexicon: HALOT
  rationale: מַעֲשֶׂה puede abarcar hechos o acciones. “Acciones” es claro en español y mantiene el plural concreto del hebreo.
- source_word: טוֹב לְךָ מְאֹד
  english_pob_choice: have been very good for you
  chosen_spanish: te han sido muy provechosas
  alternatives_spanish:
  - te han hecho mucho bien
  - te han beneficiado mucho
  lexicon: HALOT
  rationale: El hebreo expresa beneficio real para Saúl. “Provechosas” comunica utilidad/resultados positivos sin perder la valoración moral y práctica del texto.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparece explícitamente en el texto principal junto a la frase anotada. La redacción mantiene el contraste verbal con חָטָא y conserva el enfoque argumentativo de Jonatán conforme al pasaje hebreo y al audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” como terminología por defecto, pero este versículo no contiene el nombre divino.
  - Se usó “siervo” para בְּעַבְדּוֹ siguiendo el valor relacional de cortesía del contexto real/cortesano.
  - Se evitó añadir duplicaciones de preposición en la aposición de David, siguiendo la revisión inglesa más reciente.
  - La puntuación española sigue comillas angulares para el discurso directo y coma para la aposición explicativa.
