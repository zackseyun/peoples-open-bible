lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los miembros de
  lexicon: HALOT
  rationale: En listas genealógicas o censales, el constructo plural de בֵּן suele señalar linaje o pertenencia familiar. 'Los hijos de' conserva la forma formal de la lista y refleja bien el uso de clan sin sonar forzado en español bíblico moderno.
- source_word: אָטֵר
  english_pob_choice: Ater
  chosen_spanish: Ater
  lexicon: nombre propio (transliteración)
  rationale: Es un nombre propio/familiar, por lo que se translitera en español.
- source_word: לְחִזְקִיָּה
  english_pob_choice: of Hezekiah
  chosen_spanish: de Hezequías
  alternatives_spanish:
  - perteneciente a Hezequías
  - para Hezequías
  lexicon: HALOT
  rationale: La preposición ל aquí marca afiliación o subdivisión del linaje; 'de Hezequías' reproduce de manera natural y breve la relación de pertenencia dentro del registro censal.
- source_word: תִּשְׁעִים וּשְׁמֹנָה
  english_pob_choice: ninety-eight
  chosen_spanish: noventa y ocho
  lexicon: HALOT
  rationale: Número cardinal expresado en español contemporáneo estándar, manteniendo el valor numérico exacto del hebreo.
translation_notes:
  revision_awareness: 'El texto hebreo y la auditoría en inglés concuerdan de forma alta: no se requieren revisiones textuales ni cambios de sentido. La única tensión interpretativa relevante es la relación de לְחִזְקִיָּה, que puede leerse como afiliación/subrama del clan.'
  spanish_consistency_notes:
  - Se mantuvo 'hijos de' para reflejar la fórmula genealógica/censal, en coherencia con la decisión inglesa 'sons of'.
  - Se evitó 'SEÑOR' u այլ sustituciones teológicas, pues el versículo no contiene el nombre divino.
  - '''Hezequías'' se escribe con la ortografía española habitual del nombre bíblico.'
  - La nota al pie preserva la alternativa interpretativa documentada en la POB inglesa sin introducir una paráfrasis más amplia en el texto principal.
