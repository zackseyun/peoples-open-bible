translation:
  text: and[a], though she was compelled to feel sympathy for them because of the many pains each one of them suffered[b], because of fear toward God she overlooked the temporary preservation of her children.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'their temporary safety' or 'their momentary deliverance.' The Greek speaks of immediate rescue or survival, not necessarily salvation in a theological sense.
    reason: lexical_alternative
  - marker: b
    text: '''Fear toward God'' may also be understood as reverence or awe toward God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠδῖνας
  chosen: pains
  alternatives:
  - birth-pangs
  - agonies
  - torments
  lexicon: LSJ
  rationale: ὠδίν can denote severe pain or pangs. In this martyrdom context it refers to the intense sufferings endured by each son. 'Pains' is natural English and broad enough to cover the physical agony without importing a more specific image like childbirth.
- source_word: συμπάθειαν
  chosen: sympathy
  alternatives:
  - compassion
  - fellow-feeling
  lexicon: LSJ
  rationale: The noun denotes shared feeling or fellow-suffering. 'Sympathy' preserves the emotional identification of the mother with her sons' suffering and fits the syntax 'to have sympathy for them.'
- source_word: ὑπερείδειν
  chosen: overlooked
  alternatives:
  - disregarded
  - looked past
  lexicon: LSJ
  rationale: The verb here conveys passing over or giving less regard to something in light of a higher commitment. 'Overlooked' captures that she did not prioritize their immediate rescue, without implying lack of love.
- source_word: πρόσκαιρον σωτηρίαν
  chosen: the temporary preservation
  alternatives:
  - their temporary safety
  - their momentary deliverance
  - their temporary salvation
  lexicon: LSJ
  rationale: σωτηρία can mean rescue, preservation, or salvation. Here the context is physical survival from torture, not eternal salvation. 'Temporary preservation' makes the contrast with enduring fidelity to God explicit and avoids theological overreading.
- source_word: φόβον
  chosen: fear
  alternatives:
  - reverence
  - awe
  lexicon: LSJ
  rationale: φόβος toward God can include reverential fear, but the Greek directly says 'fear.' Retaining 'fear' preserves the text's theological weight while remaining understandable in English.
- source_word: καθʼ ἕκαστον αὐτῶν
  chosen: each one of them
  alternatives:
  - each of them
  - one by one
  lexicon: LSJ
  rationale: The phrase individualizes the sons' sufferings. 'Each one of them' preserves that distributive force clearly.
- source_word: ἠναγκασμένην ... ἔχειν
  chosen: was compelled to feel
  alternatives:
  - was forced to have
  - was constrained to experience
  lexicon: LSJ
  rationale: The construction expresses that her maternal sympathy was unavoidable in view of their sufferings. 'Was compelled to feel' is idiomatic and preserves the emotional force.
