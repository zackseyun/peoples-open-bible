base_translation:
  language: en
  yaml_path: translation/ot/isaiah/040/019.yaml
  text: As for the idol[a], a craftsman casts it[b], and a goldsmith overlays it with gold and refines silver chains for it.
  footnotes:
  - marker: a
    text: Or 'the carved image.' The Hebrew noun can refer more specifically to an image made by carving, though here the broader sense 'idol' fits the context of manufactured cult objects.
    reason: lexical_alternative
  - marker: b
    text: Or 'silver fittings' or 'silver fastenings.' The Hebrew term is rare, and its precise referent is uncertain.
    reason: lexical_alternative
