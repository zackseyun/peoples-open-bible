  to: o uno que liga un hechizo[a], o uno que consulta a un médium[b], o uno que es espiritista[c], o uno que busca a los muertos[d].
  rationale: Se repite «uno que» para preservar la enumeración de practicantes distintos conforme al hebreo y evitar que «espiritista» parezca objeto del verbo «consulta». Se ajusta «ata un hechizo» a «liga un hechizo» para mantener la imagen idiomática de ‘binding’ con mejor naturalidad en español. También se pule la nota de apoyo para evitar «incantación», menos natural en español.
