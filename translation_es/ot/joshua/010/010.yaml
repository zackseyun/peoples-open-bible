  rationale: 'Se hicieron reparaciones menores para mejorar la naturalidad y la precisión semántica en español sin apartarse del hebreo ni del audit trail inglés: «los hizo entrar en confusión» expresa mejor la causación divina de המם, y «los golpeó» refleja mejor el valor militar amplio de נכה que «los hirió». También se afinó la nota para mantener alternativas más cercanas al matiz de confusión/pánico del verbo fuente.'
