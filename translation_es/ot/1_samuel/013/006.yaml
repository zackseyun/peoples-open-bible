  language: en
  yaml_path: translation/ot/1_samuel/013/006.yaml
  text: When the men of Israel saw that they were in trouble[a], because the people were hard pressed, the people hid themselves in caves, in thickets, among rocks, in strongholds[c][b], and in pits.
  footnotes:
