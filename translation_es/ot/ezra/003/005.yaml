base_translation:
  language: en
  yaml_path: translation/ot/ezra/003/005.yaml
  text: And after that came the regular burnt offering[a], and the offerings for the new moons and for all the appointed feasts of Yahweh that were consecrated[c][b], and for everyone who willingly offered a freewill offering to Yahweh.
