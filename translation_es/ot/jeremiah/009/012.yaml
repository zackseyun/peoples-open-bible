translation:
  language: es
  text: 'Y Yahvé dijo: «Porque han abandonado mi ley[a] que puse delante de ellos, y no han obedecido mi voz[b] ni han andado en ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «mi instrucción». El hebreo torá puede designar instrucción en sentido amplio, aunque aquí tiene fuerza pactual y legal.'
    reason: lexical_alternative
  - marker: b
    text: 'O «escuchado mi voz». El hebreo «oír mi voz» suele incluir la idea de obedecer; aquí la traducción principal hace explícito ese sentido contextual con «obedecido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, preservando el nombre del pacto en español. "Yahvé" es el equivalente establecido en la serie POB; "SEÑOR" ocultaría el nombre y "Jehová" no es el valor preferido del proyecto.
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Y ... declaró
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. En español, "Y ... dijo" reproduce ese avance de forma natural y sobria sin añadir matiz interpretativo.
- source_word: עַל עָזְבָם
  english_pob_choice: Because they have forsaken
  chosen_spanish: Porque han abandonado
  alternatives_spanish:
  - Por haber abandonado
  - A causa de que han abandonado
  lexicon: HALOT
  rationale: '"עַל" introduce la base causal del juicio; "porque" comunica bien esa relación. "Abandonado" mantiene el peso pactual de עזב. "Forsaken" sería más solemne en inglés, pero en español "abandonado" es claro y fiel.'
- source_word: תּוֹרָתִי
  english_pob_choice: my law
  chosen_spanish: mi ley
  alternatives_spanish:
  - mi instrucción
  - mi enseñanza
  lexicon: HALOT
  rationale: En este contexto jeremiano, תּוֹרָה conserva fuerza jurídico-pactual. "Ley" es la opción más natural y seria en español, y refleja bien esa carga; "instrucción" o "enseñanza" quedan como alternativas léxicas posibles, pero suavizan demasiado el tono del pasaje.
- source_word: אֲשֶׁר נָתַתִּי לִפְנֵיהֶם
  english_pob_choice: that I set before them
  chosen_spanish: que puse delante de ellos
  alternatives_spanish:
  - que coloqué delante de ellos
  - que les di delante de ellos
  lexicon: HALOT
  rationale: La expresión idiomática de dar/poner delante comunica la presentación de la ley para ser observada. "Puse delante de ellos" suena natural en español y conserva el valor idiomático sin volverlo explicativo de más.
- source_word: וְלֹא שָׁמְע֥וּ בְקוֹלִי
  english_pob_choice: and have not listened to my voice
  chosen_spanish: y no han obedecido mi voz
  alternatives_spanish:
  - y no han escuchado mi voz
  - y no han oído mi voz
  lexicon: HALOT
  rationale: Aunque el inglés auditado pasó por una variante con "listened", el contexto final favorece el sentido obediencial de שמע con בְּקוֹל. En español, "obedecido mi voz" expresa bien esa tensión semítica sin perder el vínculo con la fórmula "mi voz".
- source_word: וְלֹא הָלְכוּ בָהּ
  english_pob_choice: or walked in it
  chosen_spanish: ni han andado en ella
  alternatives_spanish:
  - ni han caminado en ella
  - ni la han seguido
  lexicon: HALOT
  rationale: '"Andar en" preserva la metáfora bíblica de conducta conforme a una norma. "Ella" retoma naturalmente "mi ley", que es femenino en español, y mantiene la referencia interna del hebreo.'
theological_decisions:
- issue: Valor de תּוֹרָה en un contexto de alianza y juicio
  english_pob_reading: my law
  chosen_spanish_reading: mi ley
  alternative_spanish_readings:
  - mi instrucción
  - mi enseñanza
  rationale: La escena no trata solo de enseñanza en sentido general, sino de ruptura del pacto y desobediencia a una norma divina dada al pueblo. "Ley" conserva mejor ese alcance jurídico-covenantal que "instrucción", sin borrar la dimensión de guía.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave con excepciones documentadas)
- issue: Sentido de שׁמע con בְּקוֹלִי
  english_pob_reading: have not obeyed my voice
  chosen_spanish_reading: no han obedecido mi voz
  alternative_spanish_readings:
  - no han escuchado mi voz
  - no han oído mi voz
  rationale: El hebreo puede significar tanto escuchar como obedecer. Aquí, el paralelismo con "han abandonado mi ley" y "han andado en ella" favorece el sentido de desobediencia. El español principal adopta ese valor sin perder la formulación "mi voz".
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica y la fuerza contextual)
- issue: Relación entre "mi voz" y el mandato divino
  english_pob_reading: my voice
  chosen_spanish_reading: mi voz
  alternative_spanish_readings:
  - mi mandato
  - mi palabra
  rationale: Se conserva la metáfora de la voz divina, que en hebreo vincula revelación y autoridad. Traducirla como "mandato" o "palabra" explicaría demasiado y reduciría la imaginería del texto.
  doctrine_reference: Translation philosophy §3 (mantener la imagen original cuando es inteligible)
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión que cambió 'listened to my voice' por 'obeyed my voice' para reflejar mejor el sentido contextual de שָׁמְעוּ בְקוֹלִי. La versión española adopta directamente ese ajuste en la línea principal, manteniendo además una nota que reconoce la alternativa literal 'escuchar' y la tensión semítica entre oír y obedecer.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como forma constante para el nombre divino, conforme al estándar POB en español.
  - '"Ley" se usa para תּוֹרָה en este contexto pactual; otras ocurrencias deberán evaluarse caso por caso para no borrar matices de ''instrucción''.'
  - La metáfora de "andar en" se conserva con "andar en ella" porque es idiomática en español y refleja היטב la imagen hebrea.
  - La referencia pronominal "ella" recupera correctamente el femenino de "ley" en español.
