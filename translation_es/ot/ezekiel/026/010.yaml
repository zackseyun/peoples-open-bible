translation:
  language: es
  text: Por la abundancia de sus caballos te cubrirá su polvo[a]; al ruido de jinetes, de ruedas y de carros temblarán tus muros cuando él entre por tus puertas[b], como al entrar en una ciudad abierta por brecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al ruido de la caballería, de ruedas y de carros».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo literalmente: «como las entradas de una ciudad abierta por brecha»; el sentido es entrar como en una ciudad cuyas defensas han sido abiertas o rotas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִשִּׁפְעַת
  english_pob_choice: From the abundance of
  chosen_spanish: Por la abundancia de
  alternatives_spanish:
  - Por la multitud de
  - A causa de la abundancia de
  lexicon: HALOT
  rationale: שִׁפְעָה expresa abundancia o plenitud. En español, «por la abundancia de» conserva el matiz causal/circunstancial de מִן y suena natural en el contexto de polvo levantado por muchos caballos.
- source_word: סוּסָיו
  english_pob_choice: his horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - sus corceles
  - sus caballos de guerra
  lexicon: HALOT
  rationale: El sustantivo básico es «caballos» con sufijo de 3ms. «Sus caballos» es directo y fiel; no se añade especificación militar que el hebreo no explicita aquí.
- source_word: יְכַסֵּךְ אֲבָקָם
  english_pob_choice: their dust will cover you
  chosen_spanish: te cubrirá el polvo de ellos
  alternatives_spanish:
  - te cubrirá su polvo
  - el polvo de ellos te cubrirá
  lexicon: HALOT
  rationale: כסה es «cubrir». En español, «el polvo de ellos» mantiene la imagen concreta del polvo levantado por los caballos. Se conserva el trato directo a la ciudad con «te» y el sujeto en orden natural.
- source_word: מִקּוֹל
  english_pob_choice: at the sound of
  chosen_spanish: al ruido de
  alternatives_spanish:
  - al sonido de
  - a causa del ruido de
  lexicon: HALOT
  rationale: קוֹל puede ser sonido o ruido. En este contexto bélico, «ruido» comunica mejor el estruendo de la llegada militar; «al» conserva el valor circunstancial del hebreo.
- source_word: פָּרַשׁ
  english_pob_choice: horsemen
  chosen_spanish: jinetes
  alternatives_spanish:
  - hombres a caballo
  - caballería
  lexicon: HALOT
  rationale: פָּרָשׁ designa un jinete o hombre de caballo. «Jinetes» es el equivalente natural en español y conserva el referente humano; el plural concuerda con la lectura colectiva del contexto.
- source_word: וְגַלְגַּל
  english_pob_choice: and wheel
  chosen_spanish: de ruedas
  alternatives_spanish:
  - y rueda
  - de las ruedas
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular, la serie sonora en español fluye mejor con el plural coordinado «de ruedas», que refleja el conjunto de vehículos sin perder la imagen del rodar.
- source_word: וָרֶכֶב
  english_pob_choice: and chariot
  chosen_spanish: y de carros
  alternatives_spanish:
  - y de carros de guerra
  - y de carruajes
  lexicon: HALOT
  rationale: רֶכֶב puede referirse a carros de guerra o al conjunto de carros/charrería militar. «Carros» conserva la brevedad y la fuerza visual; el contexto bélico ya define el sentido.
- source_word: תִּרְעַשְׁנָה
  english_pob_choice: will quake
  chosen_spanish: temblarán
  alternatives_spanish:
  - se estremecerán
  - se sacudirán
  lexicon: HALOT
  rationale: רעשׁ implica sacudirse, estremecerse o temblar. «Temblarán» es idiomático en español para muros bajo impacto y mantiene la intensidad del verbo.
- source_word: חוֹמוֹתַיִךְ
  english_pob_choice: your walls
  chosen_spanish: tus muros
  alternatives_spanish:
  - tus paredes
  - tus murallas
  lexicon: HALOT
  rationale: חוֹמוֹת son muros o murallas. «Muros» es amplio y fiel; evita imponer una terminología demasiado técnica donde el hebreo solo habla de las estructuras defensivas.
- source_word: בְּבֹאוֹ בִּשְׁעָרַיִךְ
  english_pob_choice: when he enters your gates
  chosen_spanish: cuando él entre por tus puertas
  alternatives_spanish:
  - cuando entre por tus puertas
  - al entrar por tus puertas
  lexicon: HALOT
  rationale: El infinitivo con preposición expresa temporalidad. «Cuando él entre» respeta el sujeto singular del hebreo; «por tus puertas» es la forma natural de decir entrada por las puertas de una ciudad.
- source_word: כִּמְבוֹאֵי עִיר מְבֻקָּעָה
  english_pob_choice: as one enters a city that has been breached
  chosen_spanish: como al entrar en una ciudad asolada
  alternatives_spanish:
  - como al entrar en una ciudad abierta brecha
  - como al entrar en una ciudad quebrantada
  lexicon: HALOT
  rationale: מְבֻקָּעָה literalmente es «brechada / abierta por brecha». En español, «asolada» comunica una ciudad arruinada y tomada, aunque no reproduce de forma literal la metáfora de la brecha. Se mantiene el sentido de entrada en una ciudad devastada; la nota preserva la lectura más literal.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión inglesa más reciente: la serie sonora se entendió de forma colectiva, por lo que se prefirió «jinetes» en plural implícito y se tradujo la comparación final con una construcción singular natural en español («como al entrar»), sin perder el valor idiomático del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo el tratamiento directo a la ciudad con pronombres de 2.ª persona singular, como en el hebreo.
  - Se evitó usar «SEÑOR» o terminología teológica no presente en el versículo.
  - La imagen militar final se tradujo de manera comprensible en español, preservando en nota la literalidad de «entradas» y «ciudad brechada».
