translation:
  language: es
  text: 'sino[a]: «Vive Yahvé[b], que hizo subir y que hizo entrar[c] la descendencia de la casa de Israel desde la tierra del norte y desde todas las tierras donde yo los había expulsado; y habitarán en su propio suelo[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Sino» refleja aquí una fórmula de reemplazo: introduce no solo contraste, sino la sustitución del juramento anterior en el contexto inmediato.'
    reason: lexical_alternative
  - marker: b
    text: Yahvé traduce el nombre divino YHWH. La alternativa tradicional «el SEÑOR» oculta el nombre propio; aquí se conserva la forma del texto hebreo.
    reason: alternative_reading
  - marker: c
    text: 'Literalmente: «hizo subir y hizo entrar». La pareja verbal conserva el doble movimiento de liberación y restauración territorial.'
    reason: source_note
  - marker: d
    text: También puede entenderse «en su propia tierra». El hebreo usa un término que apunta a «suelo/terreno», no solo a territorio en sentido amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  - sino más bien
  lexicon: HALOT
  rationale: En este contexto introduce una sustitución de la fórmula de juramento del versículo anterior; «sino» comunica mejor la corrección o reemplazo que un simple contraste adversativo.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - ¡Vive el Yahvé!
  - ¡Tan cierto como vive Yahvé!
  - ¡Vive el Señor!
  lexicon: HALOT
  rationale: Se conserva la fórmula juramentaria hebrea con el nombre divino en español como «Yahvé», conforme al criterio del proyecto, manteniendo el tono solemne e idiomático.
- source_word: הֶעֱלָה
  english_pob_choice: brought up
  chosen_spanish: hizo subir
  alternatives_spanish:
  - sacó
  - trajo arriba
  - hizo salir
  lexicon: HALOT
  rationale: «Hizo subir» preserva el verbo direccional de עלה y su resonancia con el lenguaje del éxodo y la restauración, sin neutralizarlo en un simple «sacó».
- source_word: הֵבִיא
  english_pob_choice: brought in
  chosen_spanish: hizo entrar
  alternatives_spanish:
  - trajo
  - condujo
  - introdujo
  lexicon: HALOT
  rationale: La pareja verbal se mantiene distinta en español; «hizo entrar» refleja el movimiento de reingreso a la tierra y evita colapsar ambos verbos en uno solo.
- source_word: זֶרַע בֵּית יִשְׂרָאֵל
  english_pob_choice: the offspring of the house of Israel
  chosen_spanish: la descendencia de la casa de Israel
  alternatives_spanish:
  - los descendientes de la casa de Israel
  - la simiente de la casa de Israel
  - la descendencia del pueblo de Israel
  lexicon: HALOT
  rationale: «Descendencia» reproduce el valor colectivo de זֶרַע y mantiene la expresión formal «casa de Israel» sin introducir un giro explicativo no presente en el texto.
- source_word: מֵאֶרֶץ צָפוֹנָה
  english_pob_choice: from the land of the north
  chosen_spanish: desde la tierra del norte
  alternatives_spanish:
  - de la tierra del norte
  - desde el país del norte
  - de la región del norte
  lexicon: HALOT
  rationale: «Tierra del norte» conserva el paralelismo geográfico-teológico de Jeremías; «desde» expresa con naturalidad el movimiento de regreso desde el lugar del exilio.
- source_word: וּמִכֹּל הָאֲרָצוֹת
  english_pob_choice: and from all the lands
  chosen_spanish: y de todas las tierras
  alternatives_spanish:
  - y de todos los países
  - y de todas las regiones
  - y de todas las tierras
  lexicon: HALOT
  rationale: «Tierras» refleja el plural hebreo y su amplitud dispersiva, sin reemplazarlo por un término político moderno que estreche el sentido.
- source_word: אֲשֶׁר הִדַּחְתִּים שָׁם
  english_pob_choice: where I had driven them
  chosen_spanish: a las cuales yo los había expulsado allí
  alternatives_spanish:
  - donde yo los había arrojado
  - a donde yo los había desterrado
  - donde yo los había echado
  lexicon: HALOT
  rationale: «Expulsado» comunica la fuerza de נדח en este contexto de dispersión judicial; se conserva además el valor retrospectivo del pluscuamperfecto («había expulsado»).
- source_word: וְיָשְׁבוּ
  english_pob_choice: and they shall dwell
  chosen_spanish: y habitarán
  alternatives_spanish:
  - y vivirán
  - y morarán
  - y se establecerán
  lexicon: HALOT
  rationale: «Habitarán» mantiene la promesa de restauración territorial con un verbo natural en español bíblico contemporáneo y evita la banalidad de «vivirán».
- source_word: עַל אַדְמָתָם
  english_pob_choice: on their own soil
  chosen_spanish: sobre su propio suelo
  alternatives_spanish:
  - en su propia tierra
  - sobre su propia tierra
  - en su propio suelo
  lexicon: HALOT
  rationale: «Su propio suelo» reproduce la concreción de אַדְמָה como terreno/ground, distinguiéndolo de אֶרֶץ («tierra»), y conserva el matiz corporal y territorial.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. Siguiendo la norma del proyecto, se translitera como «Yahvé» para no ocultar el nombre propio detrás de un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fórmula juramentaria con dos verbos de restauración
  english_pob_reading: brought up and brought in
  chosen_spanish_reading: hizo subir y hizo entrar
  alternative_spanish_readings:
  - sacó y trajo
  - rescató y retornó
  - hizo salir y volvió a introducir
  rationale: La lectura inglesa preserva la pareja verbal; la española también la conserva para no borrar la relación entre liberación y reentrada en la tierra.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
- issue: ‘Seed/offspring’ como colectivo covenantal
  english_pob_reading: offspring of the house of Israel
  chosen_spanish_reading: la descendencia de la casa de Israel
  alternative_spanish_readings:
  - los descendientes de la casa de Israel
  - la simiente de la casa de Israel
  rationale: «Descendencia» mantiene el valor colectivo de זֶרַע sin imponer una lectura biológica estrecha ni una paráfrasis explicativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §§2, 4
translation_notes:
  revision_awareness: El paquete de fuente y la auditoría inglesa muestran alta concordancia y sin revisiones aplicadas; esta versión española sigue de cerca esa lectura estable, conservando la distinción de verbos y el matiz material de אַדְמָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en todo el texto.
  - Se conserva la diferencia entre «tierra(s)» y «suelo» para reflejar הארץ/אדמה.
  - Se usa una sola fórmula en futuro («habitarán») para representar וְיָשְׁבוּ sin añadir modalización.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al versículo.
