translation:
  language: es
  text: Entonces clamarán a Yahvé[a], pero él no les responderá; les ocultará su rostro en aquel tiempo, porque hicieron malas sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «porque actuaron malvadamente en sus obras».
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - En aquel tiempo
  - Luego
  lexicon: HALOT
  rationale: Marca consecuencia temporal respecto de la denuncia anterior; «Entonces» es natural en español y conserva la secuencia de juicio.
- source_word: יִזְעֲקוּ
  english_pob_choice: they will cry out
  chosen_spanish: clamarán
  alternatives_spanish:
  - gritarán
  - clamarán pidiendo auxilio
  lexicon: HALOT
  rationale: זעק expresa un clamor intenso de angustia; «clamarán» mantiene la fuerza del ruego sin excesiva paráfrasis.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvé
  - al Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino Yahvé conforme al criterio del proyecto, evitando la sustitución por una máscara devocional.
- source_word: וְלֹא יַעֲנֶה אוֹתָם
  english_pob_choice: but he will not answer them
  chosen_spanish: pero él no les responderá
  alternatives_spanish:
  - y no les responderá
  - pero no responderá a ellos
  lexicon: HALOT
  rationale: ענה aquí es «responder/contestar»; «les responderá» suena natural en español y mantiene el rechazo implícito en el contexto.
- source_word: וְיַסְתֵּר פָּנָיו מֵהֶם
  english_pob_choice: he will hide his face from them
  chosen_spanish: ocultará de ellos su rostro
  alternatives_spanish:
  - les ocultará su rostro
  - apartará de ellos su rostro
  lexicon: HALOT
  rationale: La imagen idiomática de «ocultar el rostro» se conserva, aunque el orden español se adapta para fluidez. «De ellos» refleja el מן sin perder el sentido relacional.
- source_word: בָּעֵת הַהִיא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - aquel tiempo
  lexicon: HALOT
  rationale: Fórmula temporal idiomática para un momento específico de juicio; «en aquel tiempo» es claro y sobrio.
- source_word: כַּאֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: En este contexto la partícula introduce la causa del juicio, no una simple comparación; «porque» expresa bien esa relación causal.
- source_word: הֵרֵעוּ
  english_pob_choice: they made ... evil
  chosen_spanish: hicieron malas
  alternatives_spanish:
  - hicieron malvadas
  - obraron mal
  lexicon: HALOT
  rationale: 'Se conserva la idea de tornar malo/dañino, pero en español se expresa de forma idiomática con el predicado de la obra: «hicieron malas sus obras».'
- source_word: מַעַלְלֵיהֶם
  english_pob_choice: their deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  lexicon: HALOT
  rationale: «Obras» es un término bíblico natural en español y mantiene el peso moral de מַעַלְלִים en el contexto de culpa y juicio.
theological_decisions:
- issue: Idiom of divine withdrawal
  english_pob_reading: he will hide his face from them
  chosen_spanish_reading: ocultará de ellos su rostro
  alternative_spanish_readings:
  - apartará de ellos su rostro
  - retirará de ellos su rostro
  - les ocultará su rostro
  rationale: Se preserva la imagen bíblica del retiro del favor/divino rechazo sin explicitarla en exceso; la frase sigue siendo reconocible como juicio relacional.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Causal clause with moral emphasis
  english_pob_reading: because they made their deeds evil
  chosen_spanish_reading: porque hicieron malas sus obras
  alternative_spanish_readings:
  - porque obraron mal
  - porque sus obras eran malas
  - porque hicieron sus obras malas
  rationale: La construcción intenta conservar el componente causal y la referencia explícita a las obras, sin perder naturalidad en español. «Hicieron malas sus obras» mantiene el reproche moral y la conexión entre conducta y juicio.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el borrador permanece alineado con el texto fuente y con el audit trail inglés; el acuerdo de control cruzado fue alto, con solo observaciones menores.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR», según la convención del proyecto para יְהוָה.
  - Se conserva el verbo de juicio relacional «ocultará su rostro», evitando una paráfrasis teológica que borre la imagen.
  - «Obras» se usa como equivalente bíblico de מַעַלְלֵיהֶם; en español suena más natural que «hechos» en este contexto de culpa moral.
  - El marcador [a] aparece en el texto principal donde corresponde la alternativa léxica documentada.
