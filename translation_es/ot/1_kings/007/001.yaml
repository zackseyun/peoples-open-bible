translation:
  language: es
  text: Salomón edificó su propia casa durante trece años[a], y terminó toda su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su palacio’. El hebreo ‘casa’ puede referirse aquí a una residencia real o a un complejo palaciego.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּיתוֹ
  english_pob_choice: his own house
  chosen_spanish: su propia casa
  alternatives_spanish:
  - su casa
  - su palacio
  lexicon: HALOT
  rationale: בַּיִת puede significar ‘casa’ y, en contexto real, también residencia real o complejo palaciego. En español, ‘casa’ conserva el término base hebreo; ‘propia’ refleja el matiz contrastivo de la construcción frente al templo y evita perder la referencia personal al edificio de Salomón.
- source_word: בָּנָה
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: El perfecto qal expresa una acción pasada completa. ‘Edificó’ es natural en español bíblico contemporáneo y mantiene el sentido de construir una estructura importante sin forzar un tecnicismo.
- source_word: שְׁלֹשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: for thirteen years
  chosen_spanish: durante trece años
  alternatives_spanish:
  - por trece años
  - en trece años
  lexicon: HALOT
  rationale: La expresión denota duración del proyecto. ‘Durante’ comunica con claridad la extensión temporal en español y evita que se lea como mero plazo o límite.
- source_word: וַיְכַל
  english_pob_choice: he finished
  chosen_spanish: terminó
  alternatives_spanish:
  - acabó
  - completó
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración hacia el cierre de la obra. ‘Terminó’ es el equivalente más natural y conciso en español moderno, manteniendo la idea de llevar la obra a su fin.
- source_word: כָּל בֵּיתוֹ
  english_pob_choice: all his house
  chosen_spanish: toda su casa
  alternatives_spanish:
  - toda su casa real
  - todo su palacio
  lexicon: HALOT
  rationale: ‘Toda’ preserva la totalidad del hebreo כָּל. ‘Casa’ mantiene la continuidad léxica con la primera mitad del versículo; en contexto puede abarcar la residencia/complexo, no solo el espacio doméstico común.
- source_word: וְאֶת
  english_pob_choice: '[contrastive clause opening reflected by word order and ''own'']'
  chosen_spanish: '[el arranque contrastivo se refleja en el orden de la frase y en ‘propia’]'
  alternatives_spanish:
  - y
  - ahora
  lexicon: HALOT
  rationale: La secuencia introductoria marca transición discursiva y contraste con lo anterior. El español no requiere una partícula explícita aquí; se conserva el efecto mediante el orden y la especificación ‘su propia casa’.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios sustantivos; el testimonio de alta concordancia confirma que no se requieren ajustes textuales adicionales. Se conservó la tensión léxica entre ‘casa’ y ‘palacio’ sin resolverla de manera unilateral en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantuvo ‘casa’ de forma consistente para בית, como en la decisión auditada en inglés.
  - Se evitó ‘SEÑOR’ u otra convención de sustitución, porque el versículo no contiene el tetragrámaton.
  - ‘Salomón’ y el orden verbal siguen el flujo narrativo natural del hebreo sin añadir información interpretativa.
