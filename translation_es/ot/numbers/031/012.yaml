revisions:
- from: Y los trajeron a Moisés, a Eleazar el sacerdote, y a la congregación de los hijos de Israel, al campamento en las llanuras de Moab[a][b], que están junto al Jordán, en Jericó[c].
  to: Y trajeron los cautivos, el botín y el despojo a Moisés, a Eleazar el sacerdote y a la congregación de los hijos de Israel, al campamento en las llanuras de Moab[a], que están junto al Jordán, frente a Jericó[b].
  rationale: Se restauran los tres objetos directos explícitos del hebreo, se mantiene la distinción léxica entre מלקוח y שלל con 'botín' y 'despojo', y se corrige la localización final para evitar la ambigüedad de 'en Jericó'. También se reordenan y simplifican las notas para que coincidan con sus anclajes textuales y con el audit trail inglés.
