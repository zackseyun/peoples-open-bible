    text: Literalmente, «delante de un enemigo». La expresión hebrea aquí significa entregarlos al poder de un enemigo.
    reason: lexical_alternative
  revision_rationale: 'Ajusté la frase principal para que exprese el sentido hebreo de manera natural en español: «los entregues a un enemigo» comunica sometimiento al poder enemigo sin el calco torpe «delante de». Conservé el matiz literal en una nota. También cambié «ningún ser humano» por «nadie» para mayor fluidez y concisión, en línea con el inglés POB revisado, y «cautivadores» por «captores» para mejorar la legibilidad sin pérdida de sentido.'
