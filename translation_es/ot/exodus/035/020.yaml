  glossary_alignment: El borrador sigue bien la terminología del proyecto. No aparecen términos sensibles del glosario principal. La elección de «congregación» con nota alternativa «asamblea» coincide con la auditoría inglesa, y «hijos de Israel» preserva la decisión documentada de no aplanar a «israelitas».
