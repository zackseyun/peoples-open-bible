translation:
  language: es
  text: 'Yo dije: «Subiré a la palmera; tomaré sus ramas[a]. Que tus pechos sean como racimos de la vid, y el aroma de tu aliento[b] como manzanas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sus gajos» o «sus tallos fructíferos»; el hebreo se refiere a las ramas o brotes de la palmera que llevan fruto.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «tu nariz». En contexto, la imagen probablemente apunta al aroma asociado con tu aliento o con la zona del rostro, no solo a la forma física de la nariz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָמַ֨רְתִּי
  english_pob_choice: I said
  chosen_spanish: Yo dije
  alternatives_spanish:
  - Dije
  - He dicho
  lexicon: HALOT
  rationale: El hebreo es un perfecto de primera persona singular. «Yo dije» conserva la afirmación directa del hablante sin forzar un presente narrativo.
- source_word: אֶעֱלֶ֣ה בְ/תָמָ֔ר
  english_pob_choice: I will climb the palm tree
  chosen_spanish: Subiré a la palmera
  alternatives_spanish:
  - Subiré a la palmera datilera
  - Me treparé a la palmera
  lexicon: HALOT
  rationale: עלה con תמר en contexto poético expresa subir o trepar; en español «subiré a la palmera» suena natural y mantiene la imagen. «Palmera» funciona bien en español bíblico moderno; «palmera datilera» sería más específica pero más pesada.
- source_word: אֹֽחֲזָ֖ה בְּ/סַנְסִנָּ֑י/ו
  english_pob_choice: I will take hold of its branches
  chosen_spanish: tomaré sus ramas
  alternatives_spanish:
  - me aferraré a sus ramas
  - tomaré sus brotes
  - tomaré sus racimos
  lexicon: HALOT
  rationale: אחז es «tomar/aferrar». La referencia de סנסנים se entiende como ramas, brotes o tallos fructíferos de la palmera; «ramas» es la opción española más clara y sobria, con alternativas preservadas en el razonamiento.
- source_word: וְ/יִֽהְיוּ נָ֤א
  english_pob_choice: May ... be
  chosen_spanish: Sean, pues
  alternatives_spanish:
  - Que sean
  - Ojalá sean
  lexicon: HALOT
  rationale: El jussivo con נא expresa deseo o petición. «Sean, pues» conserva el valor optativo sin sonar artificial; el «pues» ayuda a reproducir el tono exhortativo/implorativo.
- source_word: שָׁדַ֨יִ/ךְ֙
  english_pob_choice: your breasts
  chosen_spanish: tus pechos
  alternatives_spanish:
  - tus senos
  - tus pechos
  lexicon: HALOT
  rationale: El sustantivo designa literalmente los pechos. Dado el carácter erótico del poema, se evita suavizarlo con un término más ambiguo.
- source_word: כְּ/אֶשְׁכְּל֣וֹת הַ/גֶּ֔פֶן
  english_pob_choice: like clusters of the vine
  chosen_spanish: como racimos de la vid
  alternatives_spanish:
  - como racimos de la viña
  - como racimos de uvas
  lexicon: HALOT
  rationale: אשכולות הגפן es literalmente «racimos de la vid». «Vid» preserva la imagen vegetal del hebreo mejor que «uvas», que ya interpreta el fruto.
- source_word: וְ/רֵ֥יחַ אַפֵּ֖/ךְ
  english_pob_choice: the fragrance of your breath
  chosen_spanish: el aroma de tu aliento
  alternatives_spanish:
  - la fragancia de tu aliento
  - el olor de tu nariz
  lexicon: HALOT
  rationale: אַף puede referirse literalmente a nariz, pero el audit trail inglés revisado privilegia el sentido contextual de respiración/aliento asociado al aroma. «Aroma de tu aliento» comunica esa imagen en español sin quedarse en una lectura corporal más cruda o menos natural.
- source_word: כַּ/תַּפּוּחִֽים
  english_pob_choice: like apples
  chosen_spanish: como el de las manzanas
  alternatives_spanish:
  - como manzanas
  - como de las manzanas
  lexicon: HALOT
  rationale: תפוחים se traduce de forma estándar como «manzanas». Añadir «el de» enlaza naturalmente con «aroma» en español y refleja el paralelismo del hebreo.
theological_decisions:
- issue: Imagen corporal y erotismo poético
  english_pob_reading: 'The verse keeps explicit erotic imagery without euphemism: breasts, palm tree, vine clusters, breath/fragrance.'
  chosen_spanish_reading: 'La traducción conserva el lenguaje corporal explícito del poema: pechos, palmera, racimos de la vid y aroma/aliento.'
  alternative_spanish_readings:
  - suavizar con 'senos'
  - parafrasear con imágenes menos directas
  rationale: El texto hebreo es poético-erótico y no justifica eufemizarlo. En español, mantener la franqueza preserva el registro y la fuerza literaria del pasaje.
  doctrine_reference: No aplica; decisión literaria y de registro.
- issue: Sentido de אַפֵּךְ en el cierre
  english_pob_reading: The English audit trail revises 'your nose' to 'the fragrance of your breath' to better reflect context.
  chosen_spanish_reading: Se traduce como 'el aroma de tu aliento', no como 'tu nariz'.
  alternative_spanish_readings:
  - tu nariz
  - tu rostro
  rationale: Aunque el sustantivo básico puede ser 'nariz', el contexto de 'fragrance' pide un sentido más idiomático y evocador. La solución española evita una imagen extraña y sigue la revisión documentada del POB.
  doctrine_reference: No aplica; decisión lexical-contextual.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail inglés, especialmente el ajuste de אַפֵּךְ de 'nose' a 'breath'. También conserva la alternativa léxica documentada para סנסנים, que el inglés resumió como 'branches' con nota sobre 'boughs' o 'fruit stalks'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no necesario aquí porque el versículo no contiene el nombre divino.
  - Se usa 'vid' para respetar la imagen botánica del hebreo.
  - Se conserva el tono poético con puntuación directa y comillas tipográficas españolas.
  - '''Aliento'' se eligió para reflejar el sentido contextual de ריח/אף sin imponer una lectura anatómica literal.'
