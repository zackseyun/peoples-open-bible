translation:
  language: es
  text: Estos son inmundos para ustedes entre todos los seres que pululan[a]. Todo el que los toque cuando estén muertos[b] será inmundo hasta la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre todas las criaturas que pululan». El hebreo se refiere de manera amplia a criaturas pequeñas que pululan o abundan; el español debe conservar esa amplitud sin reducirla a una especie concreta.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «en su muerte»; el sentido es el contacto con ellos en su condición de muertos, no solo el instante de morir.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Éstos
  lexicon: HALOT
  rationale: El demostrativo plural introduce la clasificación de manera directa; «Estos» suena natural y fiel en español contemporáneo.
- source_word: הַטְּמֵאִים
  english_pob_choice: unclean
  chosen_spanish: inmundos
  alternatives_spanish:
  - impuros
  - inmundos ritualmente
  lexicon: HALOT
  rationale: En el marco de Levítico, la impureza es ritual. «Inmundos» conserva el valor técnico tradicional y sigue la fuerza lexical del inglés POB sin suavizarla a «impuros».
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - a ustedes
  lexicon: HALOT
  rationale: La dativa de beneficio/relación se expresa de forma natural como «para ustedes», manteniendo el destinatario del mandato para Israel.
- source_word: בְּכָל הַשָּׁרֶץ
  english_pob_choice: among all the swarming things
  chosen_spanish: entre todos los seres que se arrastran
  alternatives_spanish:
  - entre todas las cosas que pululan
  - entre todos los animales que se arrastran
  lexicon: HALOT
  rationale: שׁרץ denota criaturas pequeñas que pululan o se arrastran; «seres que se arrastran» transmite la categoría amplia sin especificar zoológicamente más de lo que el hebreo permite. Se añade «todos» para reflejar el alcance distributivo de בְּכָל.
- source_word: כָּל הַנֹּגֵעַ
  english_pob_choice: Everyone who touches
  chosen_spanish: Todo el que los toque
  alternatives_spanish:
  - Cualquiera que los toque
  - Todo el que toque a ellos
  lexicon: HALOT
  rationale: La construcción distributiva se expresa de manera idiomática con «Todo el que…». El futuro subjuntivo «toque» es adecuado en español jurídico-bíblico.
- source_word: בָּהֶם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los mismos
  lexicon: HALOT
  rationale: El pronombre directo retoma a los seres mencionados; en español «los» conserva la referencia sin sobrecargar la frase.
- source_word: בְּמֹתָם
  english_pob_choice: when they are dead
  chosen_spanish: cuando estén muertos
  alternatives_spanish:
  - en su muerte
  - cuando hayan muerto
  lexicon: HALOT
  rationale: El hebreo señala el contacto con ellos en estado de muerte, no simplemente el momento de morir. «Cuando estén muertos» preserva esa condición de manera clara y natural.
- source_word: יִטְמָא
  english_pob_choice: shall be unclean
  chosen_spanish: será inmundo
  alternatives_spanish:
  - quedará inmundo
  - quedará impuro
  lexicon: HALOT
  rationale: El imperfecto legal se vierte con futuro de obligación/resultado. «Será inmundo» mantiene el registro normativo del pasaje.
- source_word: עַד הָעָרֶב
  english_pob_choice: until the evening
  chosen_spanish: hasta la tarde
  alternatives_spanish:
  - hasta el atardecer
  - hasta que anochezca
  lexicon: HALOT
  rationale: «Tarde» comunica de manera sobria el límite temporal fijado por el hebreo; evita añadir una precisión interpretativa como «atardecer» si no es necesaria.
theological_decisions:
- issue: Impureza ritual de los animales pequeños/prohibidos
  english_pob_reading: unclean among all the swarming things
  chosen_spanish_reading: inmundos entre todos los seres que se arrastran
  alternative_spanish_readings:
  - impuros entre todos los seres que se arrastran
  - ritualmente inmundos entre todos los seres que se arrastran
  rationale: No se atenúa el lenguaje cultual de Levítico. «Inmundos» conserva la categoría ritual del texto y evita diluirla en una mera observación higiénica.
  doctrine_reference: Levítico 11; pureza ritual levítica
- issue: Estado de impureza por contacto con cadáveres
  english_pob_reading: when they are dead shall be unclean until the evening
  chosen_spanish_reading: cuando estén muertos, será inmundo hasta la tarde
  alternative_spanish_readings:
  - en su muerte, será inmundo hasta la tarde
  - cuando hayan muerto, quedará inmundo hasta la tarde
  rationale: La impureza proviene del contacto con el animal en su estado muerto. La traducción mantiene esa relación causal y el límite temporal de la impureza.
  doctrine_reference: Levítico 11:24-31; impureza por contacto
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se detectaron cambios necesarios respecto del texto auditado en inglés; la redacción española sigue de cerca el alcance lexical del hebreo y preserva la nota sobre el estado muerto de los seres mencionados.'
  spanish_consistency_notes:
  - Se mantiene «inmundos/inmundo» para el vocabulario ritual de Levítico, en línea con la elección inglesa de «unclean».
  - Se usa «Yahvé» en el proyecto, pero este versículo no contiene el tetragrámaton ni un sustituto contextual.
  - «Hasta la tarde» conserva el cierre temporal del hebreo sin introducir una interpretación litúrgica adicional.
  - La nota sobre בְּמֹתָם se ancla en el texto español porque la ambigüedad puede perderse en una lectura natural; por eso se marca explícitamente con [b].
