translation:
  language: es
  text: Honra para el hombre es apartarse de la contienda, pero todo necio estalla en contienda[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo es raro e incierto; también podría entenderse como «se involucra en la contienda» o, de manera más literal, «se muestra» con agresividad.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּבוֹד
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honor
  - gloria
  - prestigio
  lexicon: HALOT
  rationale: En el contexto sapiencial, el hebreo expresa estima o condición honorable. 'Honra' es natural en español y conserva el valor ético-social mejor que 'gloria', que en español puede sonar más solemne o teológico.
- source_word: לָאִישׁ
  english_pob_choice: for a man
  chosen_spanish: para el hombre
  alternatives_spanish:
  - para una persona
  - para cualquiera
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ en singular masculino. Se mantiene la referencia literal en un proverbio de alcance general, sin neutralizar artificialmente el término.
- source_word: שֶׁבֶת
  english_pob_choice: to keep away
  chosen_spanish: apartarse
  alternatives_spanish:
  - mantenerse lejos
  - abstenerse
  - dejar de participar
  lexicon: HALOT
  rationale: En esta construcción, el verbo comunica la idea de alejarse o retirarse de algo. 'Apartarse' reproduce bien el movimiento de evitar la contienda en un español natural.
- source_word: מֵרִיב
  english_pob_choice: from strife
  chosen_spanish: de la contienda
  alternatives_spanish:
  - de la pelea
  - del pleito
  - de la disputa
  lexicon: HALOT
  rationale: רִיב abarca disputa, contienda o pleito. 'Contienda' preserva un registro proverbial y amplio; 'pelea' o 'pleito' serían posibles pero algo más concretos o coloquiales.
- source_word: אֱוִיל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - insensato
  - fatuo
  - tonto
  lexicon: HALOT
  rationale: En literatura sapiencial, אֱוִיל designa a una persona moralmente insensata, no solo poco inteligente. 'Necio' mantiene ese matiz bíblico con buena claridad en español.
- source_word: יִתְגַּלָּע
  english_pob_choice: bursts out in quarrel
  chosen_spanish: se lanza en la pelea
  alternatives_spanish:
  - estalla en contienda
  - se mete en pleitos
  - se muestra agresivamente
  lexicon: HALOT
  rationale: El verbo es raro y de sentido incierto. 'Se lanza en la pelea' comunica la acción brusca y la idea de irrumpir en conflicto, sin cerrar indebidamente el rango semántico documentado por el audit trail.
translation_notes:
  revision_awareness: Se siguió el pasaje base sin cambios respecto al último pase auditado; la redacción española busca reflejar la misma lectura contextual y mantener abierta la ambigüedad del verbo raro en la segunda cola.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando corresponda a nombres divinos explícitos; este versículo no lo contiene.
  - Se prefirió «honra» por su naturalidad en español y por conservar la categoría de estatus honorable del proverbio.
  - Se mantuvo el paralelismo breve y proverbial del hebreo, con una segunda cola igualmente concisa.
  - La nota al pie se ancló en la frase verbal donde recae la incertidumbre léxica.
