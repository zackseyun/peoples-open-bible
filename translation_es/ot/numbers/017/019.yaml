review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: mandato de colocar objetos plurales, ubicación en el santuario, relación espacial ''delante de'' y cláusula relativa locativa de encuentro. Sin embargo, omite el objeto plural implícito de וְהִנַּחְתָּם en el texto principal (''los pondrás'' sería más fiel que ''pondrás''), y la nota [a] introduce una alternativa inadecuada (''pondrás allí'') que no corresponde al verbo mismo sino a la cláusula locativa posterior. También conviene ajustar la nota [c], ya que ''citaré mi encuentro'' no es español natural ni representa bien יעד en nifal.'
  spanish_quality_summary: 'El español es generalmente claro y digno. ''Tabernáculo de reunión'' es comprensible y muy eclesial, aunque ''tienda de reunión'' sería más transparente; no es necesario forzar el cambio. La principal mejora de legibilidad y fidelidad es explicitar el objeto: ''Y los pondrás...''. Las notas necesitan pulirse para sonar naturales y evitar formulaciones torpes.'
  glossary_alignment: No hay términos del glosario mayor en disputa aquí. 'Testimonio' preserva correctamente la decisión POB de no resolver el referente. 'Tabernáculo de reunión' es aceptable como equivalente tradicional de אֹהֶל מוֹעֵד, aunque algo menos transparente que 'tienda de reunión'.
  issues:
  - severity: medium
    issue: Falta el objeto plural en 'Y pondrás'
    rationale: וְהִנַּחְתָּם incluye sufijo 3mp ('los'). Aunque el contexto puede suplirlo, en español el verbo sin objeto queda más abrupto y menos completo que el hebreo.
  - severity: medium
    issue: 'La nota [a] ofrece una alternativa incorrecta: ''pondrás allí'''
    rationale: '''Allí'' no es alternativa léxica del verbo הִנַּחְתָּם; corresponde más bien a שָׁמָּה absorbido en ''donde''. La nota mezcla elementos distintos del texto fuente.'
  - severity: low
    issue: 'La nota [c] contiene una formulación poco natural: ''citaré mi encuentro con ustedes'''
    rationale: No es español idiomático y oscurece la alternativa documentada. Debe expresarse como 'donde me daré a conocer a ustedes' o 'donde he fijado encontrarme con ustedes'.
  revised_spanish_text: Y los pondrás[a] en el tabernáculo de reunión, delante del testimonio[b], donde me encontraré con ustedes[c].
  revised_footnotes:
  - marker: a
    text: O ‘los colocarás’ o ‘los dejarás’. El hebreo expresa una acción de poner o colocar con objeto plural.
    reason: lexical_alternative
  - marker: b
    text: O ‘delante del testimonio del pacto’. El hebreo puede referirse al testimonio asociado al pacto, sin especificar más aquí.
    reason: lexical_alternative
  - marker: c
    text: O ‘donde me manifestaré a ustedes’ o ‘donde he fijado encontrarme con ustedes’. El hebreo admite la idea de un encuentro señalado.
    reason: alternative_reading
  revision_rationale: Se añade 'los' para reflejar el sufijo plural del verbo hebreo y mejorar la naturalidad en español. Se corrige la nota [a] para que ofrezca alternativas realmente correspondientes al verbo principal, y se rehace la nota [c] con opciones idiomáticas que preservan mejor el valor de יעד en nifal.
