translation:
  language: es
  text: Hijo de hombre[a], ¿no te dijo la casa de Israel, esa casa rebelde, «¿Qué estás haciendo?»?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser humano»; o «mortal». La fórmula hebrea בֶּן אָדָם es el vocativo característico de Ezequiel y se conserva como expresión fija.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conservo la fórmula fija de la vocación profética de Ezequiel. En español, «Hijo de hombre» mantiene la continuidad literaria e intertextual mejor que una paráfrasis como «ser humano» o «mortal».
- source_word: הֲלֹא
  english_pob_choice: has not
  chosen_spanish: '¿no te ha dicho...?:'
  alternatives_spanish:
  - '¿acaso no...?:'
  - ¿no...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿no te ha dicho...?» conserva ese valor y suena natural con el sujeto implícito de la pregunta.
- source_word: אָמְרוּ
  english_pob_choice: said
  chosen_spanish: te ha dicho
  alternatives_spanish:
  - te dijeron
  - han dicho
  lexicon: HALOT
  rationale: Aunque el hebreo usa plural, el sentido en la pregunta retórica apunta a lo que la casa de Israel ha estado diciendo a Ezequiel. Opto por una formulación natural en español que preserve el acto de hablar dirigido al profeta.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El objeto indirecto se expresa de forma directa y natural con el clítico «te» en español.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - el pueblo de Israel
  - Israel
  lexicon: HALOT
  rationale: Mantengo la expresión colectiva covenantal «la casa de Israel» en vez de reducirla a «el pueblo de Israel».
- source_word: בֵּית הַמֶּרִי
  english_pob_choice: that rebellious house
  chosen_spanish: esa casa rebelde
  alternatives_spanish:
  - la casa rebelde
  - esa casa de rebeldía
  lexicon: HALOT
  rationale: La frase es appositiva respecto de «la casa de Israel». «Esa casa rebelde» conserva el matiz demostrativo y el peso acusatorio del hebreo sin volverla demasiado explicativa.
- source_word: מָה אַתָּה עֹשֶׂה
  english_pob_choice: What are you doing?
  chosen_spanish: ¿Qué estás haciendo?
  alternatives_spanish:
  - ¿Qué haces?
  - ¿Qué es lo que haces?
  lexicon: HALOT
  rationale: El participio con pronombre expresa acción en curso; por eso, en español, el progresivo «estás haciendo» reproduce bien el valor discursivo de la pregunta.
theological_decisions:
- issue: Función profética de la invocación «Hijo de hombre»
  english_pob_reading: Standard divine address preserving Ezekiel’s literary idiom
  chosen_spanish_reading: Fórmula profética fija conservada como «Hijo de hombre»
  alternative_spanish_readings:
  - «Ser humano»
  - «Mortal»
  rationale: No traduzco de manera interpretativa porque la expresión funciona como vocativo técnico y recurrente en Ezequiel. Mantenerla evita borrar una tensión literaria importante del libro.
  doctrine_reference: Ezequiel 2:1; 3:1; 12:1
- issue: Relación appositiva entre «la casa de Israel» y «esa casa rebelde»
  english_pob_reading: '''that rebellious house'' is appositional to ''the house of Israel'''
  chosen_spanish_reading: «la casa de Israel, esa casa rebelde»
  alternative_spanish_readings:
  - «la casa de Israel, la casa rebelde»
  - «la casa de Israel, que es rebelde»
  rationale: Mantengo la aposición sin suavizarla, porque el texto profético identifica a Israel con la rebeldía. «Esa» ayuda a reflejar la fuerza demostrativa que el inglés POB marcó con 'that'.
  doctrine_reference: Ezequiel 2:5-8; 12:2-3
translation_notes:
  revision_awareness: La revisión inglesa más reciente no alteró el contenido; el pasaje quedó con alta concordancia y sin cambios necesarios. La versión española sigue esa misma lectura, conservando la vocación profética fija y la aposición acusatoria del hebreo.
  spanish_consistency_notes:
  - Conservo «la casa de Israel» como fórmula colectiva estable en vez de «el pueblo de Israel».
  - Mantengo el vocativo «Hijo de hombre» como término técnico recurrente en Ezequiel.
  - Uso «esa casa rebelde» para reflejar el valor appositivo y demostrativo del hebreo.
  - La pregunta final se vierte en presente progresivo para reflejar la acción en curso del participio hebreo.
