translation:
  language: es
  text: Y traeré a los peores[a] de las naciones, y tomarán posesión[b] de sus casas. Pondré fin al orgullo de los fuertes, y sus santuarios serán profanados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los más perversos de las naciones».
    reason: lexical_alternative
  - marker: b
    text: O «heredarán sus casas»; el verbo hebreo puede significar «heredar», «poseer» o «desposeer», según el contexto.
    reason: lexical_alternative
  - marker: c
    text: O «sus lugares santos serán profanados».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתִי
  english_pob_choice: And I will bring
  chosen_spanish: Y traeré
  alternatives_spanish:
  - Y haré venir
  - Y traeré contra ellos
  lexicon: HALOT
  rationale: El verbo causativo de בוא en primera persona se expresa naturalmente en español con «traeré». Mantiene la acción iniciada por Yahvé y no añade un objeto explícito que el hebreo deja implícito por contexto.
- source_word: רָעֵי גוֹיִם
  english_pob_choice: the worst of the nations
  chosen_spanish: los peores de las naciones
  alternatives_spanish:
  - los más perversos de las naciones
  - los malvados de las naciones
  lexicon: HALOT
  rationale: רָעֵי tiene aquí valor calificativo intensivo, no solo descriptivo. «Los peores» comunica en español la fuerza superlativa y el tono de juicio del pasaje, sin sobrecargarlo con una paráfrasis más larga.
- source_word: וְיָרְשׁוּ אֶת בָּתֵּיהֶם
  english_pob_choice: and they will take possession of their houses
  chosen_spanish: y tomarán posesión de sus casas
  alternatives_spanish:
  - y heredarán sus casas
  - y se apoderarán de sus casas
  lexicon: HALOT
  rationale: ירשׁ en contexto de conquista expresa posesión obtenida por despojo. «Tomarán posesión» conserva ese valor sin convertirlo en mera herencia legal ni restringirlo a un matiz demasiado violento como «apoderarse».
- source_word: וְהִשְׁבַּתִּי
  english_pob_choice: I will put an end to
  chosen_spanish: Pondré fin
  alternatives_spanish:
  - Haré cesar
  - Detendré
  lexicon: HALOT
  rationale: 'El hifil de שׁבת tiene sentido causativo: hacer cesar. «Pondré fin» es una forma idiomática en español que preserva la iniciativa divina y el valor de interrupción definitiva.'
- source_word: גְּא֣וֹן עַזִּ֔ים
  english_pob_choice: the pride of the strong
  chosen_spanish: el orgullo de los fuertes
  alternatives_spanish:
  - la soberbia de los fuertes
  - la majestad de los poderosos
  lexicon: HALOT
  rationale: En un oráculo de juicio, גאון se entiende mejor como «orgullo» y no como «majestad». עזים se refiere a los fuertes/poderosos; «fuertes» mantiene la concisión y el paralelismo con el tono de humillación del verso.
- source_word: וְנִחֲל֖וּ מְקַֽדְשֵׁי/הֶם
  english_pob_choice: and their sanctuaries will be profaned
  chosen_spanish: y sus santuarios serán profanados
  alternatives_spanish:
  - y sus lugares santos serán contaminados
  - y sus lugares sagrados serán profanados
  lexicon: HALOT
  rationale: נחל en esta forma pasiva se expresa con el campo semántico de profanación/contaminación cultual. «Serán profanados» conserva el sentido ritual preciso y armoniza con la terminología bíblica de santuario.
theological_decisions:
- issue: Valor de juicio de גְּאוֹן
  english_pob_reading: pride
  chosen_spanish_reading: orgullo
  alternative_spanish_readings:
  - soberbia
  - majestad
  rationale: El contexto es de sentencia y abatimiento. «Orgullo» mantiene la carga moral negativa y evita introducir una lectura positiva que el flujo del verso no permite.
  doctrine_reference: Tema bíblico del juicio divino contra la soberbia humana (cf. Pr 16:18; Ez 7:24).
- issue: Profanación de los santuarios
  english_pob_reading: their sanctuaries will be profaned
  chosen_spanish_reading: sus santuarios serán profanados
  alternative_spanish_readings:
  - sus lugares santos serán profanados
  - sus lugares santos serán deflorados
  rationale: La pasiva conserva el énfasis en la deshonra cultual causada por el juicio. «Santuarios» es la mejor correspondencia para מקדש y evita especificar más de lo que el hebreo dice.
  doctrine_reference: Santidad del lugar de culto y profanación como señal de juicio en la literatura profética (cf. Ez 7:20-24).
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible del inglés POB: no hubo cambios respecto de la lectura auditada. La redacción española sigue esa decisión y conserva las mismas tensiones léxicas principales (רָעֵי גוֹיִם, ירשׁ, גאון, נחל) sin suavizarlas indebidamente.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, evitando calcos innecesarios.
  - «Santuarios» se usa de forma consistente para מקדש en contexto cultual.
  - «Pondré fin» preserva el causativo divino sin arcaísmo excesivo.
  - El verso queda en una sola oración de cuatro miembros, reflejando la estructura del hebreo.
