translation:
  language: es
  text: 'Después de esto, Jesús, sabiendo que ya todas las cosas habían sido completadas, para que la Escritura se cumpliera, dijo: «Tengo sed».'
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Μετὰ τοῦτο
  english_pob_choice: After this
  chosen_spanish: Después de esto
  alternatives_spanish:
  - Después
  - Luego de esto
  - Después de estas cosas
  lexicon: BDAG
  rationale: La expresión marca una transición temporal natural en español y conserva el demostrativo singular τοῦτο, sin volver el texto artificial.
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - conociendo
  - al saber
  lexicon: BDAG
  rationale: El participio circunstancial se vierte de manera natural como 'sabiendo', que expresa acción concomitante sin sobrecargar la sintaxis.
- source_word: ἤδη πάντα τετέλεσται
  english_pob_choice: all things had already been completed
  chosen_spanish: ya todas las cosas habían sido consumadas
  alternatives_spanish:
  - ya todo había sido terminado
  - ya todas las cosas habían sido completadas
  lexicon: BDAG
  rationale: '''Τετέλεσται'' expresa un estado resultante de terminación previa; ''habían sido consumadas'' conserva ese valor perfecto y el matiz solemne de cumplimiento. ''Todas las cosas'' refleja explícitamente πάντα.'
- source_word: ἵνα τελειωθῇ
  english_pob_choice: in order that ... might be fulfilled
  chosen_spanish: para que ... se cumpliera
  alternatives_spanish:
  - a fin de que ... se cumpliera
  - para que ... fuera llevado a cumplimiento
  lexicon: BDAG
  rationale: Con ἡ γραφή como sujeto, en español 'cumplirse' comunica bien el sentido de realización de la Escritura. 'Para que' refleja claramente la finalidad o resultado de ἵνα sin forzar un giro más rígido.
- source_word: ἡ γραφὴ
  english_pob_choice: the Scripture
  chosen_spanish: la Escritura
  alternatives_spanish:
  - la escritura
  - las Escrituras
  lexicon: BDAG
  rationale: En Juan, γραφή suele referirse a la Escritura sagrada en singular. Se mantiene 'la Escritura' para reflejar ese referente reconocido.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El presente histórico griego se traduce aquí con pasado narrativo para una lectura natural y publicada en español.
- source_word: Διψῶ
  english_pob_choice: I thirst
  chosen_spanish: Tengo sed
  alternatives_spanish:
  - Yo tengo sed
  - Estoy sediento
  - 'Tengo sed, literalmente: «Tú tengo sed»'
  lexicon: BDAG
  rationale: La forma más natural y clara en español moderno es 'Tengo sed'. Aunque la POB inglesa retuvo la forma más tradicional 'I thirst' en la revisión, el español gana en inteligibilidad con esta expresión sin alterar el contenido léxico básico de διψάω.
theological_decisions:
- issue: Relación entre el conocimiento de Jesús, la consumación de todas las cosas y el cumplimiento de la Escritura
  english_pob_reading: Jesus knew all things had already been completed, and then he spoke in order that the Scripture might be fulfilled.
  chosen_spanish_reading: Jesús sabe que ya todas las cosas habían sido consumadas, y luego habla para que la Escritura se cumpla.
  alternative_spanish_readings:
  - Jesús sabía que todo había terminado y habló para que se cumpliera la Escritura.
  - Jesús, al saber que todo estaba consumado, dijo esto a fin de que la Escritura se cumpliera.
  rationale: 'La traducción conserva la relación sintáctica y la tensión teológica del griego sin resolverla artificialmente. Se mantienen separados τετέλεσται y τελειωθῇ: uno declara la consumación previa, el otro el cumplimiento de la Escritura.'
  doctrine_reference: Preservar la tensión teológica sin añadir explicación doctrinal externa.
translation_notes:
  revision_awareness: El inglés POB pasó de 'I am thirsty' a 'I thirst' para acercarse al registro del griego. En español, se opta por 'Tengo sed' por claridad y naturalidad, sin perder la formalidad del enunciado breve de Jesús. Se conserva el valor de cumplimiento en 'para que la Escritura se cumpliera', evitando suavizar ἵνα.
  spanish_consistency_notes:
  - Se mantiene 'Escritura' en singular para reflejar el uso joánico de γραφή.
  - Se evita 'Mesías' o 'Cristo' porque el versículo no contiene Χριστός ni lenguaje mesiánico directo.
  - Se traduce 'consumadas' para conservar el matiz perfecto de τετέλεσται y no reducirlo a un simple 'terminadas'.
  - La cita directa se puntúa con comillas angulares y la nota alternativa se ancla al enunciado de Jesús.
