translation:
  language: es
  text: 'Así dice Yahvé, el Dios de Israel: Yo hice un pacto[a] con sus padres el día en que los saqué de la tierra de Egipto, de la casa de esclavos[b], diciendo,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «corté un pacto».
    reason: lexical_alternative
  - marker: b
    text: 'O: «de la casa de servidumbre». El hebreo es literalmente «de la casa de esclavos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Esto es lo que dice
  lexicon: HALOT
  rationale: La fórmula profética se expresa de manera natural y solemne en español con «Así dice», preservando el registro oracular sin volverlo artificial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrama: transliterar el nombre divino como «Yahvé» en vez de sustituirlo por un título.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción se traduce de forma directa y transparente, manteniendo la identificación pactual de Dios con Israel.
- source_word: כָּרַתִּי בְרִית
  english_pob_choice: made a covenant
  chosen_spanish: hice un pacto
  alternatives_spanish:
  - concerté un pacto
  - corté un pacto
  lexicon: HALOT
  rationale: En español bíblico, «hacer un pacto» comunica con claridad el idiomatismo hebreo. Se evita «corté un pacto» en el texto principal, aunque el hebreo literalmente diga «cortar» un pacto.
- source_word: אֶת אֲבֹתֵיכֶם
  english_pob_choice: with your fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: Se conserva el referente masculino plural del hebreo; «padres» refleja mejor el término que una neutralización interpretativa.
- source_word: בְּיוֹם
  english_pob_choice: on the day
  chosen_spanish: el día en que
  alternatives_spanish:
  - el día cuando
  - cuando
  lexicon: HALOT
  rationale: «El día en que» reproduce bien la relación temporal del hebreo y suena natural en español.
- source_word: הוֹצִיאִי אוֹתָם
  english_pob_choice: I brought them out
  chosen_spanish: los saqué
  alternatives_spanish:
  - los conduje afuera
  - los hice salir
  lexicon: HALOT
  rationale: «Sacar» es el equivalente más natural para el hiphil de יצא en el contexto del éxodo y preserva la resonancia histórica de la liberación de Egipto.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - de Egipto
  lexicon: HALOT
  rationale: Se conserva la formulación completa «tierra de Egipto», que refleja mejor la frase convencional del pacto-exodo.
- source_word: מִבֵּית עֲבָדִים
  english_pob_choice: from the house of slaves
  chosen_spanish: de la casa de esclavos
  alternatives_spanish:
  - de la casa de servidumbre
  - de la casa de esclavos
  lexicon: HALOT
  rationale: Se mantiene la imagen concreta y fuerte del hebreo («casa de esclavos»), de acuerdo con la preferencia del proyecto por no suavizar la esclavitud cuando es central al contexto.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - 'y dijo:'
  - 'así:'
  lexicon: HALOT
  rationale: La partícula introductoria se vierte con el gerundio «diciendo», manteniendo la continuidad sintáctica hacia la cita siguiente.
theological_decisions:
- issue: Nombre divino יְהוָה en contexto de cita profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del Dios del pacto, conforme al criterio del proyecto, evitando la sustitución por un título que borre la forma del texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: עֲבָדִים en la fórmula del éxodo
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidumbre
  - cautiverio
  rationale: El contexto describe liberación de esclavitud literal en Egipto; por eso «esclavos» preserva la fuerza concreta del término mejor que opciones más abstractas o suavizadas.
  doctrine_reference: DOCTRINE.md Translation philosophy §1; Contested terms analogy for δοῦλος
translation_notes:
  revision_awareness: El inglés POB pasó por una revisión que eliminó «I myself» por no ser necesario para אָנֹכִי; en español se siguió esa línea y se tradujo simplemente «Yo». También se mantuvo la decisión revisada de «made a covenant» sin reforzar el pronombre. La nota sobre la forma literal del pacto («cortar un pacto») no se añadió al texto principal porque la equivalencia funcional en español resulta más natural, pero sí se conserva la tensión léxica en la documentación.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para el Tetragrama.
  - Se conserva «pacto» como traducción principal de בְרִית, con la alternativa literal documentada en la nota.
  - Se mantiene «esclavos» en el lenguaje del éxodo para no suavizar la referencia a la esclavitud.
  - El inicio profético «Así dice» conserva el registro solemne sin arcaísmo excesivo.
  - La puntuación deja la frase abierta con coma final porque el versículo continúa en la siguiente línea.
