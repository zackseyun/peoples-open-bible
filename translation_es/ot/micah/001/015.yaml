translation:
  language: es
  text: Aún traeré un heredero[a] contra ti, habitante de Maresá; la gloria de Israel[b] llegará hasta Adulam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un poseedor», «uno que toma posesión» o «un conquistador». El hebreo probablemente juega con el nombre de Maresá.
    reason: lexical_alternative
  - marker: b
    text: O «la nobleza de Israel» o «la riqueza/esplendor de Israel».
    reason: alternative_reading
lexical_decisions:
- source_word: עֹד
  english_pob_choice: yet
  chosen_spanish: Aún
  alternatives_spanish:
  - Todavía
  - Aún así
  lexicon: HALOT
  rationale: 'En español, «aún» expresa bien la continuación de la acción de juicio: no ha terminado. Conserva la fuerza aspectual de continuidad sin sonar forzado.'
- source_word: הַיּוֹרֵשׁ
  english_pob_choice: an heir
  chosen_spanish: un heredero
  alternatives_spanish:
  - un poseedor
  - uno que toma posesión
  - un conquistador
  lexicon: HALOT
  rationale: «Heredero» mantiene la idea de quien recibe o toma posesión y permite conservar el juego verbal con el topónimo, aunque en contexto sea un agente de despojo más que un heredero familiar estricto.
- source_word: אָבִי לָךְ
  english_pob_choice: I will bring against you
  chosen_spanish: traeré contra ti
  alternatives_spanish:
  - te traeré
  - traeré a ti
  lexicon: HALOT
  rationale: El verbo con ל puede significar llevar a/contra. En un oráculo de juicio, «contra ti» hace explícita la hostilidad implícita del contexto y preserva el sentido de invasión.
- source_word: יוֹשֶׁבֶת
  english_pob_choice: inhabitant
  chosen_spanish: habitante
  alternatives_spanish:
  - moradora
  - la que habitas
  lexicon: HALOT
  rationale: Como participio femenino singular dirigido a la ciudad personificada, «habitante» resulta natural en español y conserva el tratamiento directo de la ciudad como persona.
- source_word: מָרֵשָׁה
  english_pob_choice: Mareshah
  chosen_spanish: Moreset
  alternatives_spanish:
  - Maresá
  - Maresha
  lexicon: HALOT
  rationale: Se translitera el topónimo de forma habitual en español bíblico como «Moreset», que es la forma reconocible para esta localidad de Miqueas, manteniendo el valor propio del nombre.
- source_word: עַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta llegar a
  - a
  lexicon: HALOT
  rationale: En español «hasta» comunica el alcance espacial del movimiento con naturalidad y conserva la imagen de extensión geográfica.
- source_word: עֲדֻּלָּם
  english_pob_choice: Adullam
  chosen_spanish: Adulam
  alternatives_spanish:
  - Adullam
  lexicon: HALOT
  rationale: Topónimo transliterado de manera estándar en español bíblico como «Adulam».
- source_word: כְּבוֹד יִשְׂרָאֵל
  english_pob_choice: the glory of Israel
  chosen_spanish: la gloria de Israel
  alternatives_spanish:
  - la nobleza de Israel
  - la riqueza/esplendor de Israel
  - el honor de Israel
  lexicon: HALOT
  rationale: «Gloria» preserva el rango semántico de כבוד y deja abierta la posible referencia a dignatarios, riqueza o esplendor nacional, sin reducir prematuramente la ambigüedad del hebreo.
theological_decisions:
- issue: Alcance de «la gloria de Israel»
  english_pob_reading: Rendered literally without specifying whether it refers to nobles, wealth, or the nation's splendor/personified leadership.
  chosen_spanish_reading: Se traduce literalmente como «la gloria de Israel» sin precisar si alude a nobles, riqueza, esplendor o liderazgo personificado.
  alternative_spanish_readings:
  - la nobleza de Israel
  - la riqueza/esplendor de Israel
  rationale: El hebreo admite varios matices relacionados. Mantener la formulación amplia conserva la tensión literaria y evita cerrar el sentido más de lo que exige el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que prefirió «heir» sobre «possessor» para reflejar mejor el juego de palabras con el topónimo y la idea de posesión por herencia. La versión española adopta «heredero» para seguir esa decisión revisada sin perder la ambigüedad de juicio/conquista del contexto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino explícito.
  - «Heredero» conserva el campo semántico de posesión/invasión y permite una nota alternativa para no fijar indebidamente el matiz.
  - El topónimo se normalizó como «Moreset» y «Adulam» según uso bíblico español, sin alterar la referencia geográfica.
  - «Gloria de Israel» conserva la ambigüedad semántica documentada en el audit trail.
