base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/008/011.yaml
  text: And Solomon brought Pharaoh’s daughter up from the city of David to the house that he had built for her[a], for he said, “My wife shall not live in the house of David king of Israel, because the places to which the ark of Yahweh has come are holy.”
  footnotes:
