translation:
  language: es
  text: Yo lo desperté en justicia[a], y haré rectos todos sus caminos. Él reconstruirá mi ciudad[b] y dejará ir a mis exiliados, no por precio y no por soborno, dice Yahvé de los ejércitos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo levanté en justicia». El verbo puede entenderse también como «lo suscité».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «edificará mi ciudad». El hebreo dice simplemente «construirá»; «reconstruirá» refleja el contexto histórico de la restauración de Jerusalén.'
    reason: lexical_alternative
  - marker: c
    text: 'Tradicional: «el SEÑOR de los Ejércitos». Aquí se mantiene la forma transparente del título divino.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַעִירֹתִהוּ
  english_pob_choice: have stirred him up
  chosen_spanish: lo desperté
  alternatives_spanish:
  - lo he despertado
  - lo levanté
  - lo puse en actividad
  lexicon: HALOT
  rationale: El piel de עור puede expresar despertar, espolear o poner en actividad. ‘Lo desperté’ conserva la acción divina de suscitarlo sin añadir la idea de investidura que ‘levanté’ podría sugerir.
- source_word: בְצֶדֶק
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  lexicon: HALOT
  rationale: צדק admite ‘justicia’ o ‘rectitud’. En español, ‘en justicia’ mantiene la fuerza moral y judicial del hebreo y suena más natural que un calco rígido.
- source_word: אֲיַשֵּׁר
  english_pob_choice: I will make ... straight
  chosen_spanish: haré rectos
  alternatives_spanish:
  - enderezaré
  - allanaré
  - haré llanos
  lexicon: HALOT
  rationale: El piel de ישר expresa hacer recto, llano o derecho. ‘Haré rectos’ reproduce la metáfora de manera clara y sobria en español.
- source_word: דְּרָכָיו
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus sendas
  - sus rutas
  - su conducta
  lexicon: HALOT
  rationale: ‘Caminos’ conserva la metáfora hebrea de דרך y permite que la imagen de enderezar el curso de su vida o empresa permanezca abierta.
- source_word: יִבְנֶה עִירִי
  english_pob_choice: He will rebuild my city
  chosen_spanish: reconstruirá mi ciudad
  alternatives_spanish:
  - edificará mi ciudad
  - volverá a edificar mi ciudad
  lexicon: HALOT
  rationale: בנה significa ‘construir’. Dado el contexto histórico de Jerusalén devastada, ‘reconstruirá’ comunica el sentido sin violentar el hebreo.
- source_word: גָלוּתִי
  english_pob_choice: my exiles
  chosen_spanish: mis desterrados
  alternatives_spanish:
  - mis exiliados
  - los de mi cautiverio
  - mi gente desterrada
  lexicon: HALOT
  rationale: גלות puede referirse al estado de exilio o al grupo exiliado. ‘Desterrados’ conserva la condición personal de quienes están fuera de su tierra y funciona bien con el verbo siguiente.
- source_word: יְשַׁלֵּחַ
  english_pob_choice: send my exiles away
  chosen_spanish: pondrá en libertad
  alternatives_spanish:
  - enviará lejos
  - dejará ir
  - soltará
  lexicon: HALOT
  rationale: שלח en piel puede significar enviar, despedir o dejar ir. En este contexto de liberación del exilio, ‘pondrá en libertad’ expresa bien el efecto del verbo sin precisar indebidamente el destino.
- source_word: לֹא בִמְחִיר
  english_pob_choice: not for a price
  chosen_spanish: no por precio
  alternatives_spanish:
  - no por pago
  - no a cambio de dinero
  lexicon: HALOT
  rationale: מחיר significa precio o pago. ‘No por precio’ mantiene la concisión del hebreo y la relación con la frase siguiente sobre el soborno.
- source_word: וְלֹא בְשֹׁחַד
  english_pob_choice: and not for a bribe
  chosen_spanish: y no por soborno
  alternatives_spanish:
  - ni por cohecho
  - ni por un soborno
  lexicon: HALOT
  rationale: שחד designa soborno. ‘Soborno’ es claro y contemporáneo en español, y conserva la denuncia de cualquier compra o corrupción en la liberación.
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of Armies
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de las huestes
  - Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se conserva ‘Yahvé’ para יהוה según la terminología del proyecto, y צבאות se vierte ‘de los ejércitos’ para mantener transparencia y la fuerza militar/plural del título.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrama y la norma del proyecto pide ‘Yahvé’ en el texto principal. Esto preserva el nombre pactual sin la convención de sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Identificación implícita del destinatario de los pronombres
  english_pob_reading: retain the pronouns 'him' and 'he'
  chosen_spanish_reading: mantener los pronombres 'lo' y 'él'
  alternative_spanish_readings:
  - explicitar a Ciro
  - sustituir por el nombre propio
  rationale: El hebreo mantiene pronombres; el contexto inmediato identifica al gobernante sin necesidad de añadir el nombre en la línea principal. Así se evita una glosa interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Alcance de ‘en justicia’
  english_pob_reading: in righteousness
  chosen_spanish_reading: en justicia
  alternative_spanish_readings:
  - en rectitud
  - con justicia
  rationale: Se conserva la ambigüedad fecunda de צדק entre justicia y rectitud. ‘En justicia’ permite leer tanto la dimensión moral como la jurídica del acto divino.
  doctrine_reference: DOCTRINE.md lexical handling of צדק / δικαιοσύνη
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en el verbo final, que prefirió una expresión más natural para el sentido de liberación del exilio (‘send my exiles away’). En español se reflejó con ‘pondrá en libertad’, evitando tanto una traducción mecánica como una explicitación excesiva del destino.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para יהוה, conforme al estándar del proyecto.
  - ‘Ejércitos’ traduce צבאות de modo transparente y evita la fórmula eclesiástica ‘huestes’ salvo necesidad contextual.
  - Se conservan los pronombres del hebreo para no introducir Ciro en el texto principal.
  - ‘Desterrados’ mantiene el matiz personal del exilio y armoniza con ‘poner en libertad’.
