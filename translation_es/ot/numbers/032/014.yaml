review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: mantiene la fuerza de וְהִנֵּה, la sucesión generacional de קַמְתֶּם תַּחַת אֲבֹתֵיכֶם, el tono recriminatorio de תַּרְבּוּת אֲנָשִׁים חַטָּאִים, y la referencia a la ira de Yahvé contra Israel. Sin embargo, falta una nota para la expresión idiomática עַל חֲרוֹן אַף, que el rastro auditado inglés preservó como decisión léxica significativa. También conviene pulir la colocación española para mayor naturalidad sin perder el matiz.'
  spanish_quality_summary: 'El texto es claro y digno, pero ''Y he aquí'' suena algo rígido en español actual; ''Y miren'' sería demasiado coloquial, así que ''Y he aquí'' puede mantenerse por fidelidad retórica. La mejora principal es estilística y de precisión: ''una prole de hombres pecadores'' funciona, pero ''una camada de hombres pecadores'' sería demasiado fuerte y ''prole'' es aceptable. La frase sobre la ira gana claridad con una nota explicativa del hebraísmo.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה -> ''Yahvé'' correctamente; no hay términos doctrinales conflictivos adicionales. Se respeta el valor masculino de אֲנָשִׁים con ''hombres''.'
  issues:
  - severity: medium
    issue: Falta una nota para el hebraísmo עַל חֲרוֹן אַף
    rationale: El POB inglés documentó explícitamente que la expresión es literalmente 'sobre el ardor/encendimiento de la nariz', un modismo hebreo para ira intensa. En español, 'ardor de la ira' conserva parte de la imagen, pero debe acompañarse de nota para preservar la justificación léxica auditada.
  - severity: low
    issue: La nota [a] no preserva la alternativa principal documentada en inglés
    rationale: El inglés auditado ofrecía alternativas relacionadas con 'an increase / offspring of sinful men' para תַּרְבּוּת, mientras que en español eso está bien recogido en [b]; sin embargo, la nota [a] sobre וְהִנֵּה está correcta pero menos necesaria que la nota faltante sobre la ira. Conviene reordenar marcadores para que las notas acompañen las decisiones más significativas del texto.
  revised_spanish_text: Y he aquí, ustedes se han levantado en lugar de sus padres, una prole[a] de hombres pecadores, para añadir todavía más al ardor de la ira[b] de Yahvé contra Israel.
  revised_footnotes:
