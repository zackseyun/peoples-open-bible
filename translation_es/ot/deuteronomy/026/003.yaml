    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del borrador, pero se corrige el aparato crítico para alinearlo con las decisiones documentadas por POB. También se mejora levemente la naturalidad y la cercanía al hebreo con «entrarás al sacerdote», paralelo a «he entrado en la tierra», aunque «irás» también sería defendible. Las nuevas notas preservan exactamente las alternativas significativas del expediente inglés y la justificación teológica/léxica del proyecto.
