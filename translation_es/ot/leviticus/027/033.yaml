revisions:
- from: No hará distinción entre lo bueno y lo malo[a], ni lo cambiará; y si de hecho lo cambia[b], entonces tanto él como su sustituto serán santos[c]; no podrá ser redimido.
  to: No examinará si es bueno o malo[a], ni lo cambiará; y si de hecho lo cambia[b], entonces tanto él como su sustituto quedarán consagrados; no será redimido.
  rationale: Se ajusta יְבַקֵּר a ‘examinará’ para reflejar mejor el acto de inspección/selección; se suaviza el modismo hebreo con ‘si es bueno o malo’ en el texto principal y se conserva la alternativa más literal en nota. Se cambia ‘serán santos’ por ‘quedarán consagrados’ para expresar naturalmente el valor cultual de קֹדֶשׁ aplicado a animales. Se simplifica ‘no podrá ser redimido’ a ‘no será redimido’ para acercarse al enunciado legal del hebreo. Se elimina la nota c porque la revisión ya evita la ambigüedad.
