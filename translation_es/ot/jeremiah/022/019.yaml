translation:
  language: es
  text: Será sepultado con una sepultura como la de un asno[a]—arrastrado y arrojado fuera, más allá de las puertas de Jerusalén[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Será sepultado con la sepultura de un asno» o «con una sepultura de asno».'
    reason: lexical_alternative
  - marker: b
    text: 'La imagen comunica un trato vergonzoso del cadáver: no un entierro honorable, sino una disposición fuera de la ciudad.'
    reason: cultural_note
lexical_decisions:
- source_word: קְבוּרַת
  english_pob_choice: the burial of
  chosen_spanish: la sepultura de
  alternatives_spanish:
  - una sepultura como la de
  - la sepultura de un
  lexicon: HALOT
  rationale: El constructo expresa una comparación de sepultura; en español, 'la sepultura de un asno' reproduce con naturalidad la relación posesiva/comparativa sin perder la imagen.
- source_word: חֲמוֹר
  english_pob_choice: donkey
  chosen_spanish: asno
  alternatives_spanish:
  - burro
  - mula
  lexicon: HALOT
  rationale: '''Asno'' mantiene un registro bíblico digno y fiel al animal del hebreo. ''Burro'' es posible, pero más coloquial; ''mula'' no corresponde al término original.'
- source_word: יִקָּבֵר
  english_pob_choice: he will be buried
  chosen_spanish: Será sepultado
  alternatives_spanish:
  - Será enterrado
  - Será enterrado en sepultura
  lexicon: HALOT
  rationale: '''Sepultado'' comunica el acto funerario con un registro más formal y bíblico que ''enterrado'', y conserva el pasivo futuro del hebreo.'
- source_word: סָחוֹב
  english_pob_choice: dragged off
  chosen_spanish: arrastrado
  alternatives_spanish:
  - arrastrado violentamente
  - llevado a rastras
  lexicon: HALOT
  rationale: El valor adverbial/intensivo del hebreo se refleja de manera concisa con 'arrastrado'; el contexto ya comunica la indignidad y violencia del acto.
- source_word: וְהַשְׁלֵךְ
  english_pob_choice: and thrown out
  chosen_spanish: y arrojado fuera
  alternatives_spanish:
  - y echado fuera
  - y lanzado fuera
  lexicon: HALOT
  rationale: '''Arrojado fuera'' conserva el movimiento de expulsión y el paralelismo con el inglés POB revisado, sin sonar mecánico en español.'
- source_word: מֵהָלְאָה
  english_pob_choice: beyond
  chosen_spanish: más allá de
  alternatives_spanish:
  - fuera de
  - al otro lado de
  lexicon: HALOT
  rationale: La expresión espacial hebrea pide un equivalente que indique exterioridad respecto de las puertas; 'más allá de' es preciso y natural.
- source_word: לְשַׁעֲרֵי
  english_pob_choice: the gates of
  chosen_spanish: las puertas de
  alternatives_spanish:
  - los portones de
  - las entradas de
  lexicon: HALOT
  rationale: '''Puertas'' es el equivalente estándar y más transparente para el plural hebreo en este contexto urbano.'
- source_word: יְרוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Nombre propio asentado en español bíblico; no requiere adaptación adicional.
theological_decisions:
- issue: Sentido de la imagen funeraria
  english_pob_reading: A shameful disposal comparable to that of a donkey, not an honorable human burial.
  chosen_spanish_reading: Una sepultura vergonzosa, comparable a la de un asno, no un entierro honorable.
  alternative_spanish_readings:
  - Solo una descripción literal del modo de entierro sin énfasis en la vergüenza
  - Una metáfora sin referencia a una disposición corporal real
  rationale: El encadenamiento 'sepultura de un asno' + 'arrastrado y arrojado fuera' exige conservar la vergüenza y la exclusión del entierro honorable. La traducción mantiene esa tensión sin suavizarla.
  doctrine_reference: Principio de sentido llano del texto y preservación de la imagen de deshonra funeraria.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el rastro auditado en inglés, incorporando la revisión que refuerza 'arrojado fuera' y 'más allá de' para reflejar con mayor claridad la expulsión fuera de las puertas de la ciudad.
  spanish_consistency_notes:
  - '''Asno'' se usa de forma consistente para חֲמוֹר en un registro bíblico transparente.'
  - '''Sepultado'' conserva el tono formal del pasivo hebreo sin convertir la frase en una paráfrasis.'
  - '''Puertas de Jerusalén'' mantiene la imagen urbana y la exclusión pública implícita en el hebreo.'
