translation:
  language: es
  text: Doscientos hombres de Jerusalén fueron con Absalón[a], invitados, y fueron en su inocencia, sin saber nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘con integridad’; la expresión hebrea sugiere que fueron sin sospechar, sin conocer el plan de Absalón.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָלְכוּ
  english_pob_choice: went with
  chosen_spanish: fueron con
  alternatives_spanish:
  - fueron
  - acompañaron a
  lexicon: HALOT
  rationale: El hebreo הָלְכוּ significa básicamente ‘ir/caminar’, y con אֶת־אַבְשָׁלוֹם expresa compañía. ‘Fueron con’ conserva esa relación sin forzar un verbo más interpretativo.
- source_word: מָאתַיִם אִישׁ
  english_pob_choice: Two hundred men
  chosen_spanish: Doscientos hombres
  alternatives_spanish:
  - Doscientas personas
  - doscientos varones
  lexicon: HALOT
  rationale: El hebreo usa el conteo masculino plural típico para personas masculinas. ‘Hombres’ refleja bien el valor gramatical y el referente probable.
- source_word: מִירוּשָׁלַםִ
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  - de la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición מִן marca origen. ‘De Jerusalén’ es la forma más directa y natural en español.
- source_word: קְרֻאִים
  english_pob_choice: invited
  chosen_spanish: invitados
  alternatives_spanish:
  - convocados
  - llamados
  lexicon: HALOT
  rationale: El participio pasivo de קרא expresa personas que habían sido llamadas/invitadas. ‘Invitados’ mantiene esa pasividad y encaja con el contexto de una comida/convite sin añadir ‘huéspedes’.
- source_word: וְהֹלְכִים
  english_pob_choice: and they went
  chosen_spanish: y fueron
  alternatives_spanish:
  - y caminaban
  - e iban
  lexicon: HALOT
  rationale: El participio continúa la descripción narrativa. En español, un verbo finito simple fluye mejor y conserva la secuencia del relato.
- source_word: לְתֻמָּם
  english_pob_choice: innocently
  chosen_spanish: con ingenuidad
  alternatives_spanish:
  - en su inocencia
  - con integridad
  lexicon: HALOT
  rationale: La expresión puede implicar inocencia, integridad o sencillez. Aquí el contexto inmediato (‘sin saber nada’) favorece el matiz de ir sin sospechar; ‘con ingenuidad’ comunica esa idea sin perder la tensión semántica.
- source_word: וְלֹא יָדְעוּ כָּל דָּבָר
  english_pob_choice: not knowing anything
  chosen_spanish: sin saber nada
  alternatives_spanish:
  - y no supieron nada
  - y no conocían asunto alguno
  lexicon: HALOT
  rationale: כָּל דָּבָר literalmente es ‘cualquier cosa / nada’. ‘Sin saber nada’ preserva el sentido general de total desconocimiento y suena natural en español.
translation_notes:
  revision_awareness: La revisión inglesa cambió ‘invited guests’ por ‘invited’ para ceñirse más al hebreo; en español se siguió esa misma cautela con ‘invitados’, sin añadir ‘huéspedes’. También se mantuvo la equivalencia funcional de ‘innocently’ con una expresión que deje abierta la tensión entre inocencia, sencillez e integridad.
  spanish_consistency_notes:
  - Se mantuvo ‘Absalón’ como nombre propio estándar.
  - Se evitó ‘SEÑOR’ u այլ sustitutos porque el versículo no contiene el tetragrámaton ni un título divino.
  - No se añadió ‘mesa’, ‘banquete’ ni otros elementos contextuales no presentes en el texto hebreo, aunque el participio ‘invitados’ los presupone indirectamente.
