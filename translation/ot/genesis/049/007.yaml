id: GEN.49.7
reference: Genesis 49:7
source:
  edition: WLC
  text: אָר֤וּר אַפָּ/ם֙ כִּ֣י עָ֔ז וְ/עֶבְרָתָ֖/ם כִּ֣י קָשָׁ֑תָה אֲחַלְּקֵ֣/ם בְּ/יַעֲקֹ֔ב וַ/אֲפִיצֵ֖/ם בְּ/יִשְׂרָאֵֽל׃ס
translation:
  text: Cursed be their anger[a], for it is fierce, and their wrath, for it is harsh. I will divide them in Jacob and scatter them in Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Accursed is their anger ... and their fury, for it is harsh.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָרוּר
  chosen: Cursed be
  alternatives:
  - Accursed is
  lexicon: HALOT
  rationale: Passive participial form used predicatively in a curse declaration. 'Cursed be' preserves the force of Jacob's pronouncement in natural English.
- source_word: אַפָּם
  chosen: their anger
  alternatives:
  - their nose
  - their anger/anger
  lexicon: HALOT
  rationale: Though literally related to 'nose/nostril,' the idiomatic sense here is anger. English should render the idiom's meaning rather than the body-part image.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - indeed
  lexicon: HALOT
  rationale: Here it introduces the reason for the curse. 'For' fits the poetic style and links the judgment to its cause.
- source_word: עָז
  chosen: fierce
  alternatives:
  - strong
  - violent
  lexicon: HALOT
  rationale: The adjective can mean strong or intense; in context of anger, 'fierce' best conveys destructive intensity rather than mere strength.
- source_word: וְעֶבְרָתָם
  chosen: and their wrath
  alternatives:
  - and their fury
  lexicon: HALOT
  rationale: עֶבְרָה denotes overflowing rage or wrath. 'Wrath' preserves the elevated, judicial tone of the poetic denunciation.
- source_word: קָשָׁתָה
  chosen: it is cruel
  alternatives:
  - it is harsh
  - it is hard
  lexicon: HALOT
  rationale: The verb/adjective idea is hardness or severity. In context of wrath, 'cruel' communicates morally harsh violence more clearly than the more literal but less idiomatic 'hard'.
- source_word: אֲחַלְּקֵם
  chosen: I will divide them
  alternatives:
  - I will apportion them
  - I will disperse them
  lexicon: HALOT
  rationale: 'Piel imperfect 1cs with 3mp suffix: Jacob declares what will happen to Simeon and Levi as tribes. ''Divide'' matches the later tribal scattering and preserves the verbal distinction from the next clause.'
- source_word: בְּיַעֲקֹב
  chosen: in Jacob
  alternatives:
  - within Jacob
  lexicon: HALOT
  rationale: '''Jacob'' here refers corporately to the covenant people descended from Jacob. ''In Jacob'' is the most direct rendering and preserves the parallelism with ''in Israel.'''
- source_word: וַאֲפִיצֵם
  chosen: and scatter them
  alternatives:
  - and disperse them
  lexicon: HALOT
  rationale: Hiphil conveys causing to be scattered. 'Scatter' is idiomatic and preserves the judgment image.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - within Israel
  lexicon: HALOT
  rationale: Parallel to 'in Jacob'; the two names function poetically for the nation. Retaining both names preserves the Hebrew parallelism rather than collapsing them into one expression.
