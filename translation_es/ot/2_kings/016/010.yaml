  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios y «sacerdote» están bien. La decisión «semejanza» para דְּמוּת y «diseño» para תַּבְנִית es compatible con la auditoría inglesa. El único ajuste recomendado es estilístico-semántico en לְכָל מַעֲשֵׂהוּ para reflejar con más claridad la idea de todos los pormenores de construcción.
