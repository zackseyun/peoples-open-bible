translation:
  language: es
  text: ¿Han olvidado las malas acciones de sus padres, las malas acciones de los reyes de Judá, las malas acciones de sus mujeres[a], sus propias malas acciones y las malas acciones de sus mujeres[b], que hicieron en la tierra de Judá y en las calles de Jerusalén?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente «sus mujeres» con sufijo singular («sus mujeres de él»); después de «los reyes de Judá», la forma probablemente funciona en sentido colectivo, por eso se traduce «sus mujeres».
    reason: lexical_alternative
  - marker: b
    text: O «males» / «cosas malas»; aquí se traduce el término como «malas acciones» porque el versículo añade «que hicieron».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְׁכַחְתֶּם
  english_pob_choice: Have you forgotten
  chosen_spanish: ¿Han olvidado
  alternatives_spanish:
  - ¿Han olvidado ya?
  - ¿Se han olvidado?
  lexicon: HALOT
  rationale: Mantiene el valor de pregunta retórica en tiempo perfecto/resultativo. En español, «han olvidado» conserva el reproche sobre un olvido con efecto presente sin volverse forzado.
- source_word: רָעוֹת
  english_pob_choice: evil deeds
  chosen_spanish: maldades
  alternatives_spanish:
  - hechos malos
  - malvados actos
  - maldades cometidas
  lexicon: HALOT
  rationale: La pluralidad concreta del sustantivo apunta a acciones culpables, no solo a maldad abstracta. «Maldades» es breve y natural en español bíblico moderno, y permite que el verso siga calificándolas con «que hicieron».
- source_word: אֲבוֹתֵיכֶם
  english_pob_choice: your fathers
  chosen_spanish: sus padres
  alternatives_spanish:
  - sus antepasados
  lexicon: HALOT
  rationale: El hebreo usa el término masculino familiar. En español, «sus padres» preserva la forma directa y la referencia generacional del texto.
- source_word: מַלְכֵי יְהוּדָה
  english_pob_choice: the kings of Judah
  chosen_spanish: los reyes de Judá
  alternatives_spanish:
  - los monarcas de Judá
  lexicon: HALOT
  rationale: Traducción literal y transparente del genitivo; «reyes» es la forma más directa y natural en español.
- source_word: נָשָׁיו
  english_pob_choice: their wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - sus mujeres
  - las esposas de ellos
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular posesiva, el antecedente colectivo es plural («los reyes de Judá»), por lo que en español conviene el plural colectivo «sus esposas», como ajuste gramatical fiel al sentido.
- source_word: רָעֹתֵיכֶם
  english_pob_choice: your own evil deeds
  chosen_spanish: sus propias maldades
  alternatives_spanish:
  - sus maldades
  - las maldades de ustedes
  lexicon: HALOT
  rationale: El posesivo reforzado expresa contraste con las generaciones anteriores. «Sus propias» conserva esa focalización sin añadir comentario interpretativo.
- source_word: נְשֵׁיכֶם
  english_pob_choice: your wives
  chosen_spanish: sus esposas
  alternatives_spanish:
  - vuestras esposas
  lexicon: HALOT
  rationale: En un registro bíblico latinoamericano amplio, «sus esposas» es más neutral y abarca lectura de tratamiento plural de respeto o distancia contextual, manteniendo el referente posesivo.
- source_word: אֲשֶׁר עָשׂוּ
  english_pob_choice: which they did
  chosen_spanish: que hicieron
  alternatives_spanish:
  - que cometieron
  - que realizaron
  lexicon: HALOT
  rationale: «Hicieron» reproduce con sobriedad el verbo general עשה. La cláusula posterior concreta el carácter moral de esas acciones.
- source_word: בְּאֶרֶץ יְהוּדָה
  english_pob_choice: in the land of Judah
  chosen_spanish: en la tierra de Judá
  alternatives_spanish:
  - en el país de Judá
  - en la región de Judá
  lexicon: HALOT
  rationale: «Tierra» preserva la resonancia geográfica y covenantal del hebreo אֶרֶץ mejor que «país» o «región».
- source_word: וּבְחֻצוֹת יְרוּשָׁלִָם
  english_pob_choice: in the streets of Jerusalem
  chosen_spanish: en las calles de Jerusalén
  alternatives_spanish:
  - en las plazas de Jerusalén
  - en los espacios públicos de Jerusalén
  lexicon: HALOT
  rationale: «חֻצוֹת» puede referir calles o lugares públicos urbanos. «Calles» es la equivalencia más natural y comprensible en español moderno sin perder el sentido de exposición pública.
theological_decisions:
- issue: Traducción del término moral plural רָעוֹת
  english_pob_reading: Rendered concretely as 'evil deeds' rather than abstract 'evils.'
  chosen_spanish_reading: «maldades» / «maldades que hicieron» como actos culpables concretos
  alternative_spanish_readings:
  - «males»
  - «cosas malas»
  - «iniquidades»
  rationale: El contexto enumera actos históricos atribuidos a varios grupos y luego los define con «que hicieron». Por eso conviene una lectura de acciones concretas y no de maldad abstracta.
  doctrine_reference: Principios de transparencia léxica y correspondencia semántica del texto base
- issue: Conservación del término familiar masculino אֲבוֹתֵיכֶם
  english_pob_reading: Translated 'your fathers.'
  chosen_spanish_reading: «sus padres»
  alternative_spanish_readings:
  - «sus antepasados»
  - «sus progenitores»
  rationale: El hebreo es explícitamente masculino y generacional. No hay razón textual para neutralizarlo con un término genérico cuando el pasaje apela a la culpa heredada de los padres.
  doctrine_reference: 'Translation philosophy §4: respeto de términos de parentesco con género del original'
- issue: Ajuste colectivo de נָשָׁיו
  english_pob_reading: Translated 'their wives.'
  chosen_spanish_reading: «sus esposas»
  alternative_spanish_readings:
  - «las esposas de ellos»
  - «sus mujeres»
  rationale: La forma hebrea es singular, pero el antecedente plural («los reyes de Judá») exige en español un referente colectivo. «Sus esposas» comunica el sentido sin forzar la sintaxis española.
  doctrine_reference: Principios de equivalencia óptima con ajuste gramatical por antecedente colectivo
translation_notes:
  revision_awareness: El texto inglés auditado mantiene sin cambios la última revisión y no registra enmiendas aplicadas. La propuesta española sigue esa línea estable, respetando las decisiones léxicas y el tratamiento colectivo de «sus esposas».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el tetragrámaton en el texto hebreo.
  - Se usó «Judá» y «Jerusalén» de forma uniforme y sin variación estilística.
  - «sus» se mantiene coherentemente como posesivo plural para los grupos mencionados en el verso.
  - La alternancia «maldades» / «que hicieron» preserva tanto el sustantivo hebreo como su concreción verbal en el contexto.
