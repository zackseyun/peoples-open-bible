- from: Que sus hijos[a] anden errantes y pidan limosna; que busquen en sus ruinas.
  to: Que sus hijos anden vagando y pidan limosna; que busquen de sus ruinas[a].
  rationale: Se corrige la preposición para reflejar mejor el hebreo מִן y la nota léxica preservada por la auditoría inglesa. También se mejora la naturalidad de «anden errantes» a «anden vagando» sin alterar el sentido intensivo e imprecatorio del original. Se elimina la nota sobre «hijos» porque no era la ambigüedad significativa que debía preservarse en este versículo.
