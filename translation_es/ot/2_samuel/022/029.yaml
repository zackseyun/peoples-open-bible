translation:
  language: es
  text: Porque tú eres mi lámpara[a], Yahvé, y Yahvé alumbra mi oscuridad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mi lámpara»; alternativamente, «mi luz». La imagen es concreta en hebreo y se refiere a una lámpara, no a la luz abstracta.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Yahvé da luz a mi oscuridad».'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  lexicon: HALOT
  rationale: El hebreo introduce aquí la base o explicación de la afirmación previa. 'Porque' conserva bien la relación causal/explicativa en español sin forzar un matiz demasiado enfático ni meramente conclusivo.
- source_word: אַתָּה
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - tú mismo
  - usted
  lexicon: HALOT
  rationale: Es el pronombre singular masculino dirigido directamente a Dios. 'Tú' mantiene la segunda persona y el tono inmediato de la oración.
- source_word: נֵירִי
  english_pob_choice: my lamp
  chosen_spanish: mi lámpara
  alternatives_spanish:
  - mi luz
  lexicon: HALOT
  rationale: El sustantivo designa concretamente una lámpara, no solo luz abstracta. 'Mi lámpara' preserva la metáfora material del texto hebreo, aunque 'mi luz' sería posible por sentido.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - oh Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto de traducir el Tetragrámaton como 'Yahvé'. En español no se necesita la interjección 'oh' porque el vocativo queda claro por la puntuación y el contexto poético.
- source_word: יַגִּיהַּ
  english_pob_choice: lights up
  chosen_spanish: alumbra
  alternatives_spanish:
  - ilumina
  - da luz a
  - hace brillar
  lexicon: HALOT
  rationale: El verbo en hifil expresa causar luz o hacer que algo resplandezca. 'Alumbra' es natural en español y conserva el valor causativo sin volverlo excesivamente técnico.
- source_word: חָשְׁכִּי
  english_pob_choice: my darkness
  chosen_spanish: mi oscuridad
  alternatives_spanish:
  - mi tiniebla
  - la oscuridad que me rodea
  lexicon: HALOT
  rationale: El sustantivo indica oscuridad, con sufijo de primera persona. 'Mi oscuridad' conserva la fuerza metafórica y personal del hebreo mejor que explicaciones interpretativas.
theological_decisions:
- issue: Renderizado del nombre divino יהוה
  english_pob_reading: Yahweh / O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme a la política del proyecto, se mantiene el nombre divino como 'Yahvé' en vez de sustituirlo por un título o una paráfrasis litúrgica. La forma vocativa queda implícita por el contexto poético y la puntuación.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se mantiene la metáfora concreta de ''lamp'', el nombre divino se translitera como ''Yahvé'' según la norma del proyecto, y el verbo causativo de iluminación se expresa de manera natural en español sin perder el paralelismo poético. No se detectaron revisiones adicionales en la fuente inglesa más reciente.'
  spanish_consistency_notes:
  - 'Se conserva la estructura paralela del versículo: afirmación vocativa + cláusula coordinada con repetición del nombre divino.'
  - '''Mi oscuridad'' mantiene el sufijo posesivo del hebreo y evita interpretar de más el campo semántico.'
  - La elección de 'alumbra' favorece una lectura poética y contemporánea, pero sigue siendo fiel al causativo hebreo.
  - Se evita 'SEÑOR' porque el proyecto exige 'Yahvé' para יהוה en el texto principal.
