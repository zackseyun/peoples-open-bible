  text: Let the king appoint officers in all the provinces of his kingdom[a], and let them gather every young virgin of beautiful appearance to Susa the citadel, to the house of the women, into the custody of Hegai the king’s eunuch, keeper of the women[b]; and let their cosmetics be given to them.
