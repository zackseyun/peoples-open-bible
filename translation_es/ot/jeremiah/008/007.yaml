base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/008/007.yaml
  text: Even the stork in the heavens knows her appointed times[a], and the turtledove, the swallow, and the crane keep the time of their coming[b]; but my people do not know the judgment of Yahweh.
  footnotes:
  - marker: a
    text: Or 'swallow' for 'swift' (Hebrew סוס); the exact bird identification is uncertain.
    reason: lexical_alternative
  - marker: b
    text: '''The judgment of the LORD'' may also be rendered ''the ordinance of the LORD'' or ''the justice of the LORD.'''
    reason: lexical_alternative
