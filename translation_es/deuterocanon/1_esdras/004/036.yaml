    rationale: No invalida el texto principal, pero la formulación actual centra solo καλεῖ y deja fuera el dato textual más notable del versículo.
  revised_spanish_text: Toda la tierra llama bendita[a] a la verdad, y el cielo la bendice; y todas las obras se sacuden y tiemblan[b], y con ella[a] no hay nada injusto.
