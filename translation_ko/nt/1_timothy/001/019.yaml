id: 1TI.1.19
reference: 1 Timothy 1:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἔχων πίστιν καὶ ἀγαθὴν συνείδησιν, ἥν τινες ἀπωσάμενοι περὶ τὴν πίστιν ἐναυάγησαν·
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/019.yaml
  text: holding faith and a good conscience[a], which some, having rejected[b], have suffered shipwreck concerning the faith.
  footnotes:
  - marker: a
    text: Or 'holding faith and a good conscience, which some have cast aside and have been shipwrecked with regard to the faith.' The relative pronoun 'which' most naturally refers to 'conscience,' though some take it more broadly.
    reason: alternative_reading
  - marker: b
    text: '''Faith'' could also be understood as ''trust'' or, less likely here, ''faithfulness.'''
    reason: lexical_alternative
translation:
  language: ko
  text: 믿음과 선한 양심을 굳게 지키십시오. 어떤 사람들은 그 양심을 내버려[a] 믿음에 관하여 파선하고[b] 말았습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「믿음과 선한 양심을 지키되, 그것을 어떤 사람들은 내버려…」. 관계대명사 「그것」은 「양심」을 가장 자연스럽게 받으나, 더 넓게 「믿음과 양심 모두」로 보는 견해도 있다.
    reason: alternative_reading
  - marker: b
    text: 「믿음」은 「신뢰」로도 이해될 수 있으나, 본문은 신앙 그 자체를 가리킨다고 보는 것이 자연스럽다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔχων
  english_pob_choice: holding
  chosen_korean: 굳게 지키십시오
  alternatives_korean:
  - 지키며
  - 가지고
  lexicon: BDAG
  rationale: 18절의 「선한 싸움을 싸우게」를 받는 분사이지만, 한국어 흐름상 권면 동사로 옮겨 디모데에게 주어진 책무를 명시한다. 「굳게 지키십시오」가 어감의 무게를 살린다.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_korean: 믿음
  alternatives_korean:
  - 신뢰
  - 신앙
  lexicon: BDAG
  rationale: 본 번역의 πίστις 기본 표준 「믿음」.
- source_word: ἀγαθὴν συνείδησιν
  english_pob_choice: a good conscience
  chosen_korean: 선한 양심
  alternatives_korean:
  - 깨끗한 양심
  lexicon: BDAG
  rationale: 5절과 일관.
- source_word: ἀπωσάμενοι
  english_pob_choice: having rejected
  chosen_korean: 내버려
  alternatives_korean:
  - 떨쳐 내고
  - 거절하고
  lexicon: BDAG
  rationale: ἀπωθέω의 「밀어내·내치다」 어감을 「내버려」로 자연스럽게 옮긴다.
- source_word: περὶ τὴν πίστιν ἐναυάγησαν
  english_pob_choice: have suffered shipwreck concerning the faith
  chosen_korean: 믿음에 관하여 파선하고 말았습니다
  alternatives_korean:
  - 그 믿음과 관련해 난파했습니다
  - 신앙에 있어서 좌초했습니다
  lexicon: BDAG
  rationale: ναυαγέω의 항해 비유를 「파선」으로 보존한다. 한국 교회 정립 어휘이며 본문의 비극적 이미지를 살린다.
