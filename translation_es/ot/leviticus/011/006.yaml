translation:
  language: es
  text: Y la liebre[a], porque rumia pero no tiene la pezuña hendida, es impura para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el conejo’. אַרְנֶבֶת se entiende tradicionalmente como ‘liebre’, aunque algunos la toman en un sentido más amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאַרְנֶבֶת
  english_pob_choice: the hare
  chosen_spanish: la liebre
  alternatives_spanish:
  - el conejo
  lexicon: HALOT
  rationale: El inglés POB eligió 'hare' por la identificación zoológica tradicional de אַרְנֶבֶת, con nota de alternativa. En español, 'liebre' es el equivalente natural de 'hare'; 'conejo' conserva una posibilidad más amplia pero es menos preciso para la lista bíblica.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí כִּי introduce la causa de la clasificación ritual. 'Porque' reproduce bien la relación causal sin sonar forzado en español.
- source_word: מַעֲלַת גֵּרָה
  english_pob_choice: chews the cud
  chosen_spanish: rumia
  alternatives_spanish:
  - mastica el rumen
  - revuelve la comida
  lexicon: HALOT
  rationale: La expresión hebrea alude al comportamiento rumiante. 'Rumia' comunica de forma natural y suficientemente literal la característica diagnóstica exigida por el texto.
- source_word: וּפַרְסָה לֹא הִפְרִיסָה
  english_pob_choice: but does not divide the hoof
  chosen_spanish: pero no tiene la pezuña hendida
  alternatives_spanish:
  - pero no divide la pezuña
  - pero no parte la pezuña
  lexicon: HALOT
  rationale: El inglés usa la fórmula técnica 'divide the hoof'. En español, 'pezuña hendida' expresa con claridad el rasgo anatómico, y 'no tiene' evita una literalidad poco natural con el verbo hebreo.
- source_word: טְמֵאָה הִוא לָכֶם
  english_pob_choice: is unclean for you
  chosen_spanish: es impura para ustedes
  alternatives_spanish:
  - es inmunda para ustedes
  - es ritualmente impura para ustedes
  lexicon: HALOT
  rationale: En contexto levítico, טָמֵא es ritual. 'Impura' mantiene la terminología bíblica en español sin cargarla de connotaciones morales indebidas. 'Para ustedes' conserva el destinatario comunitario de לָכֶם.
theological_decisions:
- issue: Naturaleza de la impureza en la ley alimentaria levítica
  english_pob_reading: ritually unclean
  chosen_spanish_reading: impura en sentido ritual
  alternative_spanish_readings:
  - moralmente mala
  - inmunda
  rationale: El pasaje clasifica un animal dentro del código de santidad y no emite juicio moral sobre el animal. La traducción 'impura' preserva el término bíblico, y el contexto lector puede entender su alcance ritual.
  doctrine_reference: Levítico 11; código de santidad
translation_notes:
  revision_awareness: 'El texto sigue la lectura estable del hebreo masorético y coincide sustancialmente con la versión inglesa auditada: se mantuvo la identificación zoológica tradicional, la causalidad de כִּי, la imagen rumiante de מַעֲלַת גֵּרָה, la negación del rasgo de la pezuña hendida y el veredicto ritual de impureza. No se registran revisiones previas en el expediente.'
  spanish_consistency_notes:
  - Se usa 'liebre' para armonizar con la decisión inglesa 'hare' y con el uso zoológico tradicional.
  - '''Impura'' se conserva como término técnico bíblico; no se sustituye por ''inmunda'' ni por una paráfrasis moral.'
  - La frase 'para ustedes' preserva el destinatario del mandato sin sobreexplicar el marco legal.
