translation:
  language: es
  text: Sea su camino oscuro y resbaladizo[a], con el ángel de Yahvé persiguiéndolos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y el ángel de Yahvé persiguiéndolos». El hebreo puede leerse como coordinación simple; «con» expresa en español el sentido acompañante de manera más fluida.
    reason: alternative_reading
lexical_decisions:
- source_word: יְהִי
  english_pob_choice: May ... be
  chosen_spanish: Sea ...
  alternatives_spanish:
  - Que ... sea
  - Ojalá ... sea
  lexicon: HALOT
  rationale: El jussivo expresa deseo o imprecación. En español, «Sea» conserva la fuerza volitiva de forma natural y sobria, sin añadir un matiz devocional ajeno al hebreo.
- source_word: דַרְכָּם
  english_pob_choice: their way
  chosen_spanish: su camino
  alternatives_spanish:
  - su senda
  - su senda/trajectoria
  lexicon: HALOT
  rationale: «Camino» reproduce el campo semántico básico de דֶּרֶךְ y funciona bien tanto en sentido literal como figurado en español bíblico contemporáneo.
- source_word: חֹשֶׁךְ
  english_pob_choice: dark
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - negro
  lexicon: HALOT
  rationale: Como predicado nominal después de «sea», el hebreo presenta la idea de «darkness». En español, «tinieblas» conserva mejor la sustantividad e imagen poética que un adjetivo aislado, y mantiene el tono solemne del verso.
- source_word: וַחֲלַקְלַקּוֹת
  english_pob_choice: and slippery
  chosen_spanish: y resbaladizo
  alternatives_spanish:
  - y resbaladizo(s)
  - y de superficies resbaladizas
  - y resbaladizo(s) en extremo
  lexicon: HALOT
  rationale: El plural hebreo denota lugares o cualidad de resbalosidad. En español, el adjetivo singular «resbaladizo» expresa de manera natural la imagen de peligro y dificultad sin sobrecargar el verso.
- source_word: וּמַלְאַךְ יְהוָה
  english_pob_choice: with the angel of Yahweh
  chosen_spanish: con el ángel de Yahvé
  alternatives_spanish:
  - y el ángel de Yahvé
  - junto con el ángel de Yahvé
  lexicon: HALOT
  rationale: 'La conjunción permite coordinación simple, pero el valor resultante es de circunstancia acompañante: el camino es oscuro y resbaladizo mientras el ángel actúa. «Con» expresa ese sentido attendant en español con fluidez, como en el audit trail inglés.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en su forma española establecida por el proyecto. No se sustituye por «Señor», para mantener la presencia explícita del Tetragrámaton.
- source_word: רֹדְפָם
  english_pob_choice: pursuing them
  chosen_spanish: persiguiéndolos
  alternatives_spanish:
  - perseguiéndolos
  - dándoles alcance
  - acogiéndolos
  lexicon: HALOT
  rationale: רדף indica perseguir, ir detrás de alguien con intención hostil. El gerundio «persiguiéndolos» mantiene la acción en curso y la relación circunstancial con la cláusula principal.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahveh
  rationale: El texto hebreo usa יְהוָה directamente. La tradición del proyecto pide reflejar el nombre divino de forma visible; en español, la forma adoptada es «Yahvé», que preserva el carácter propio del nombre sin la sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación sintáctica de la segunda cláusula
  english_pob_reading: with the angel of Yahweh pursuing them
  chosen_spanish_reading: con el ángel de Yahvé persiguiéndolos
  alternative_spanish_readings:
  - y el ángel de Yahvé persiguiéndolos
  - mientras el ángel de Yahvé los persigue
  rationale: El hebreo permite leer la segunda parte como coordinación simple, pero el inglés POB documenta el sentido attendant. El español «con... persiguiéndolos» conserva esa lectura sin perder la tensión semántica del original.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — preserve documented ambiguity where it matters'
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo directamente y coincide con la decisión auditada del texto inglés de mantener la cláusula acompañante con el ángel de Yahweh/Yahvé. No se detectan revisiones pendientes en el expediente inglés; por eso el español conserva la misma tensión sintáctica sin expandirla.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene un registro poético y sobrio, adecuado al Salmo.
  - La cláusula final conserva la acción en progreso con el gerundio «persiguiéndolos».
