  to: Entonces Betsabé vino al rey Salomón para hablarle acerca de Adonías. Y el rey se levantó para recibirla y se postró ante ella[a], y se sentó en su trono, y se colocó un trono para la madre del rey, y ella se sentó a su derecha.
