revisions:
- from: Así que ahora[a], manda aviso; trae tu ganado y todo lo que tienes en el campo a resguardo. Toda persona y todo animal que se encuentre en el campo y no sea recogido en la casa[b], el granizo caerá sobre ellos, y morirán.
  to: Así que ahora[a], manda a poner a resguardo tu ganado y todo lo que tienes en el campo. Toda persona y todo animal que se encuentre en el campo y no sea llevado a la casa[b]—el granizo caerá sobre ellos, y morirán.
  rationale: Se reemplazó «manda aviso» por «manda a poner a resguardo» para lograr un español más natural y fiel a la función de la orden urgente. Se cambió «no sea recogido en la casa» por «no sea llevado a la casa» para expresar con mayor claridad la dirección implícita de הַבַּיְתָה y alinearse mejor con la decisión inglesa auditada «brought into the house». También se ajustó la puntuación para mejorar la legibilidad.
