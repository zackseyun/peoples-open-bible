lexical_decisions:
- source_word: חָצוֹר
  english_pob_choice: Hazor
  chosen_spanish: Hazor
  alternatives_spanish:
  - Jazor
  lexicon: HALOT
  rationale: Es un nombre propio de lugar (topónimo) en una lista de asentamientos; por eso se translitera, no se traduce. Se conserva la forma bíblica reconocible en español, y se evita una adaptación fonética menos estable como «Jazor».
- source_word: רָמָה
  english_pob_choice: Ramah
  chosen_spanish: Ramá
  alternatives_spanish:
  - Rama
  lexicon: HALOT
  rationale: También es un topónimo. En español conviene la forma tradicional con acento gráfico («Ramá») para indicar la sílaba tónica y mantener legibilidad, sin convertirla en un sustantivo común como «altura».
- source_word: גִּתָּיִם
  english_pob_choice: Gittaim
  chosen_spanish: Gitaim
  alternatives_spanish:
  - Guitaim
  - Gittaim
  lexicon: HALOT
  rationale: Se trata de otro nombre propio de lugar. La terminación dual/plural hebrea forma parte del topónimo y no debe semantizarse. Se prefiere «Gitaim» como transliteración clara y natural en español; se conserva la posibilidad fonética alternativa en nota.
translation_notes:
  revision_awareness: El texto fuente es una lista breve y estable de tres topónimos. La auditoría inglesa no introduce cambios ni problemas textuales; solo deja abierta una variante de transliteración para גִּתָּיִם. La versión española mantiene esa misma apertura mediante una nota de transliteración alternativa, sin añadir interpretación semántica.
  spanish_consistency_notes:
  - Se conserva el orden de los tres topónimos del hebreo.
  - Se usa una puntuación breve propia de lista nominal.
  - No se añade verbo ni información implícita, porque el hebreo también presenta una lista desnuda de nombres.
  - Se mantiene el tono bíblico sobrio y publicable, con transliteraciones consistentes para topónimos.
