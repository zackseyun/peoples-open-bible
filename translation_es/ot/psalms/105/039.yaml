translation:
  language: es
  text: Él extendió una nube como cubierta[a], y fuego para alumbrar de noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para una cobertura», «como pantalla» o «como dosel». El término hebreo puede designar una cobertura protectora o una pantalla.'
    reason: lexical_alternative
lexical_decisions:
- source_word: פָּרַשׂ
  english_pob_choice: spread out
  chosen_spanish: extendió
  alternatives_spanish:
  - esparció
  - desplegó
  - extendió
  lexicon: HALOT
  rationale: El verbo expresa la acción de desplegar o extender algo sobre otro objeto; en español, "extendió" comunica con naturalidad la imagen de la nube colocada sobre el pueblo sin añadir connotaciones ajenas.
- source_word: עָנָן
  english_pob_choice: cloud
  chosen_spanish: nube
  alternatives_spanish:
  - nube
  - nubarrón
  lexicon: HALOT
  rationale: '"Nube" es el equivalente directo y natural en español para mantener la imagen bíblica de protección y guía en el desierto.'
- source_word: לְמָסָךְ
  english_pob_choice: as a covering
  chosen_spanish: como cobertura
  alternatives_spanish:
  - como cobertura
  - como pantalla
  - como cortina
  - como dosel
  lexicon: HALOT
  rationale: El sustantivo puede referirse a un recubrimiento, pantalla o cortina. "Cobertura" preserva la función protectora y evita especificar de más la forma física del objeto.
- source_word: וְאֵשׁ
  english_pob_choice: and fire
  chosen_spanish: y fuego
  alternatives_spanish:
  - y fuego
  lexicon: HALOT
  rationale: '"Fuego" mantiene el paralelismo con la nube y la imaginería del desierto de manera literal y clara.'
- source_word: לְהָאִיר
  english_pob_choice: to give light
  chosen_spanish: para alumbrar
  alternatives_spanish:
  - para dar luz
  - para iluminar
  - para alumbrar
  lexicon: HALOT
  rationale: El infinitivo expresa propósito; "para alumbrar" es idiomático en español y comunica bien la función del fuego.
- source_word: לָיְלָה
  english_pob_choice: by night
  chosen_spanish: de noche
  alternatives_spanish:
  - de noche
  - por la noche
  - en la noche
  lexicon: HALOT
  rationale: '"De noche" es una solución adverbial natural en español y conserva el contraste temporal del verso.'
theological_decisions:
- issue: Sujeto implícito del verbo
  english_pob_reading: He = God
  chosen_spanish_reading: Él = Dios
  alternative_spanish_readings:
  - Yahvé
  - El Señor
  rationale: El hebreo tiene un sujeto masculino singular implícito que remite al contexto anterior, donde se entiende a Dios. Mantener "Él" conserva ese flujo discursivo sin introducir el nombre divino donde el versículo no lo explicita.
  doctrine_reference: Principio de primacía del texto original; referencia contextual al discurso previo en el salmo.
- issue: Imaginería teofánica del desierto
  english_pob_reading: Retain literal cloud and fire imagery without interpretive expansion
  chosen_spanish_reading: Mantener la imagen literal de nube y fuego sin ampliar a una glosa interpretativa
  alternative_spanish_readings:
  - la columna de nube y de fuego
  - nube protectora y fuego guía
  rationale: El hebreo menciona nube y fuego con sus funciones, pero no desarrolla la explicación. La traducción conserva esa sobriedad y deja la alusión al éxodo implícita en la imagen.
  doctrine_reference: Principio de equivalencia óptima con primacía del original; evitar importar al texto principal material no expresado en el hebreo.
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo y el audit trail inglés sin cambios relevantes respecto del sentido base: mantiene el sujeto implícito, la imaginería de nube y fuego, y la ambigüedad funcional de לְמָסָךְ con una nota lexical equivalente a la del POB inglés.'
  spanish_consistency_notes:
  - Se usa "Él" para el sujeto implícito, coherente con el contexto inmediato del salmo y con el tono reverente del texto.
  - '"Cobertura" conserva la función protectora del término hebreo sin convertirlo en un elemento arquitectónico específico.'
  - '"Alumbrar de noche" refleja el propósito del fuego y mantiene un español claro y publicable.'
  - Se evita "SEÑOR" como máscara, conforme a la convención del proyecto de traducir יהוה como Yahvé cuando corresponda; aquí el versículo no lo expresa explícitamente.
