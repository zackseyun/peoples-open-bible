  - marker: b
    text: Hebrew 'each man.' The masculine singular is distributive here, referring to each individual Israelite in the legal setting.
    reason: cultural_note
  - marker: c
    text: Or 'to his possession'; the Hebrew refers especially to an inherited property holding.
    reason: lexical_alternative
  - marker: d
    text: Or 'to his clan.'
    reason: lexical_alternative
