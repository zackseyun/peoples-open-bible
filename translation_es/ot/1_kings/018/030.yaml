translation:
  language: es
  text: 'Entonces Elías dijo a todo el pueblo: «Acérquense a mí». Entonces todos se acercaron a él, y reparó el altar de Yahvé[a] que había sido derribado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «restauró» el altar de Yahvé; el verbo hebreo es literalmente «sanó».
    reason: lexical_alternative
lexical_decisions:
- source_word: גְּשׁוּ
  english_pob_choice: Come near
  chosen_spanish: Acérquense a mí
  alternatives_spanish:
  - Vengan cerca de mí
  - Aproximen-se a mí
  lexicon: HALOT
  rationale: El imperativo plural pide que se acerquen físicamente. «Acérquense» conserva la dirección espacial y suena natural en español; «a mí» explicita el complemento que está en el hebreo.
- source_word: וַיִּגְּשׁוּ
  english_pob_choice: came near
  chosen_spanish: se le acercó
  alternatives_spanish:
  - se acercó
  - se aproximó a él
  lexicon: HALOT
  rationale: En español conviene reflejar la respuesta narrativa con el mismo campo léxico de cercanía. «Se le acercó» mantiene la correspondencia con el imperativo previo y expresa bien el sentido del hebreo.
- source_word: וַיְרַפֵּא
  english_pob_choice: repaired
  chosen_spanish: reparó
  alternatives_spanish:
  - restauró
  - sanó
  lexicon: HALOT
  rationale: Aunque el verbo hebreo literalmente es «sanar», con un altar el sentido es dejarlo nuevamente apto/entero. «Reparó» comunica la acción concreta sin perder la tensión lexical entre sanar y restaurar, que la nota conserva.
- source_word: מִזְבַּח יְהוָה
  english_pob_choice: the altar of Yahweh
  chosen_spanish: el altar de Yahvé
  alternatives_spanish:
  - el altar de Yahvé
  - el altar de Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según la terminología del proyecto y la relación constructa con «altar de». Esta forma evita la sustitución por un título y mantiene el vínculo textual con el nombre propio del pacto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el Tetragrámaton; en el texto español se vierte de acuerdo con el estándar del proyecto como «Yahvé», preservando el nombre personal divino en lugar de ocultarlo tras un título.
- source_word: הֶהָרוּס
  english_pob_choice: that had been torn down
  chosen_spanish: derribado
  alternatives_spanish:
  - echado abajo
  - destruido
  lexicon: HALOT
  rationale: El participio pasivo indica algo demolido o puesto abajo. «Derribado» es natural en español y mantiene la imagen concreta mejor que una paráfrasis más amplia.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La secuencia narrativa se expresa con «Entonces», que en español reproduce bien el avance del waw consecutivo sin sonar mecánico.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo reunido
  - la gente
  lexicon: HALOT
  rationale: La frase colectiva hebrea se traduce de forma idiomática con «todo el pueblo», que en contexto narrativo es clara y formal.
theological_decisions:
- issue: Nombre divino יְהוָה en el altar
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo nombra directamente a יְהוָה. Siguiendo la práctica del proyecto, se preserva el nombre divino como «Yahvé» en vez de sustituirlo por un título genérico, para mantener la transparencia con el original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de וַיְרַפֵּא con objeto inanimado
  english_pob_reading: repaired / healed / restored
  chosen_spanish_reading: reparó
  alternative_spanish_readings:
  - restauró
  - sanó
  rationale: Con un altar como objeto, el verbo no debe leerse como curación literal de un ser vivo, pero tampoco perder su base verbal. «Reparó» conserva el hecho de rehacer/poner en buen estado sin borrar la tensión lexical presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: lexical transparency and retained tensions'
translation_notes:
  revision_awareness: 'El audit trail inglés no requirió cambios de fondo: mantiene la secuencia narrativa, el imperativo de cercanía, la respuesta del pueblo, el nombre divino como Yahvé y la solución léxica de וַיְרַפֵּא como «repaired». La versión española conserva esas decisiones con equivalentes naturales y transparentes.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se preservó la relación léxica entre «acérquense» y «se le acercó».
  - «Reparó» se eligió como verbo principal, con nota que conserva la alternativa «restauró» y la literalidad de «sanó».
  - El registro es bíblico y contemporáneo, sin arcaísmos innecesarios.
  - La puntuación y el tratamiento de comillas siguen el uso español moderno.
