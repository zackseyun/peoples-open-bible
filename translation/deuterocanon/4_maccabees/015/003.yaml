translation:
  text: she loved piety more[a], which saves unto eternal life according to God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which saves for eternal life in accordance with God,' with κατὰ θεόν expressing conformity to God's will or standard.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσέβειαν
  chosen: piety
  alternatives:
  - godliness
  - reverence
  lexicon: BDAG
  rationale: εὐσέβεια in this work is a key virtue denoting reverent devotion toward God expressed in faithful conduct. 'Piety' preserves the technical and thematic sense better than the broader 'godliness' or the narrower 'reverence.'
- source_word: μᾶλλον
  chosen: more
  alternatives:
  - rather
  - to a greater degree
  lexicon: LSJ
  rationale: 'The comparative adverb marks preference: she loved piety more than the competing natural attachment in context.'
- source_word: ἠγάπησεν
  chosen: loved
  alternatives:
  - cherished
  - preferred
  lexicon: BDAG
  rationale: The verb straightforwardly means 'loved.' The comparative force is already carried by μᾶλλον, so 'loved' is preferable to importing 'preferred' into the verb itself.
- source_word: τὴν σώζουσαν
  chosen: the kind that saves
  alternatives:
  - which saves
  - that brings salvation
  lexicon: BDAG
  rationale: The present participle modifies εὐσέβειαν. 'The kind that saves' gives natural English while preserving the attributive force; it avoids overstating with a more interpretive paraphrase.
- source_word: εἰς αἰώνιον ζωὴν
  chosen: for eternal life
  alternatives:
  - unto eternal life
  - into eternal life
  lexicon: BDAG
  rationale: εἰς here expresses goal or result. 'For eternal life' is idiomatic English that still reflects the teleological sense.
- source_word: κατὰ θεόν
  chosen: according to God
  alternatives:
  - in accordance with God
  - as God wills
  - in God's sight
  lexicon: LSJ
  rationale: 'The phrase is somewhat compressed. A relatively literal rendering preserves the ambiguity: piety saves for eternal life in a way consonant with God or God''s standard. More interpretive options are possible but go beyond the wording.'
