translation:
  language: es
  text: Hijo mío[a], honra a tu padre en palabra y en obra, para que todas las bendiciones te alcancen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: «para que la bendición venga sobre ti de parte de él», haciendo más explícito al padre como fuente de la bendición.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Muchacho mío
  lexicon: HALOT
  rationale: El hebreo se dirige directamente a un hijo varón. En español, «Hijo mío» conserva la relación afectiva y la apelación personal sin neutralizar el masculino singular.
- source_word: בְּמַאֲמָר
  english_pob_choice: in word
  chosen_spanish: en palabra
  alternatives_spanish:
  - en lo que dices
  - en hablar
  lexicon: HALOT
  rationale: El sustantivo apunta a habla/expresión verbal. «En palabra» mantiene el paralelismo con «en obra» y refleja bien el griego λόγῳ.
- source_word: וּבְמַעֲשֶׂה
  english_pob_choice: and deed
  chosen_spanish: y en obra
  alternatives_spanish:
  - y en acción
  - y en hecho
  lexicon: HALOT
  rationale: El término se refiere a acción concreta. «Obra» es una equivalencia natural y breve en español para el contraste ético «palabra y obra».
- source_word: כַּבֵּד
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - da honor a
  - trata con honor
  lexicon: HALOT
  rationale: En contexto filial, el verbo expresa dar el peso debido, respetar y tratar con honra. «Honra» es la forma más directa y digna en español.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: a tu padre
  alternatives_spanish:
  - a tu progenitor
  lexicon: HALOT
  rationale: El posesivo de segunda persona se expresa naturalmente en español con «tu padre» como complemento de objeto directo introducido por la preposición personal.
- source_word: עֲבוּר
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Introduce finalidad o resultado. «Para que» es la forma más natural y precisa en español.
- source_word: יַשִׂיגוּךָ
  english_pob_choice: may come upon you
  chosen_spanish: te alcancen
  alternatives_spanish:
  - te sobrevengan
  - te lleguen
  lexicon: HALOT
  rationale: Literalmente es «alcanzar/overtake/reach». En español, «te alcancen» conserva la imagen de llegar hasta la persona sin sonar forzado.
- source_word: כֹּל בְּרָכוֹת
  english_pob_choice: all blessings
  chosen_spanish: todas las bendiciones
  alternatives_spanish:
  - toda bendición
  - todas las gracias
  lexicon: HALOT
  rationale: El hebreo usa plural totalizante. «Todas las bendiciones» refleja mejor la pluralidad que la singular distributiva y conserva el alcance completo del original.
theological_decisions:
- issue: Fuente explícita de la bendición
  english_pob_reading: general blessing from honoring one's father, without specifying divine or paternal source in the main text
  chosen_spanish_reading: bendiciones generales vinculadas al honor del padre, sin explicitar en el texto principal si proceden del padre o si llegan por mediación divina
  alternative_spanish_readings:
  - bendición de Dios
  - bendiciones de tu padre
  rationale: El hebreo no nombra explícitamente la fuente de las bendiciones; el griego añade «de él», que puede señalar al padre. Para no resolver prematuramente la tensión textual, el texto principal conserva la formulación amplia y abierta.
  doctrine_reference: Primacía del testimonio original con preservación de tensiones textuales; no armonización teológica prematura.
translation_notes:
  revision_awareness: El texto español sigue la decisión revisada del POB inglés de usar «all blessings» para reflejar כֹּל בְּרָכוֹת. La nota conserva la variante del griego, que explicita «de parte de él», sin imponerla al texto principal. La formulación elegida mantiene el paralelismo hebreo «en palabra y en obra» y suena natural en español de lectura pública.
  spanish_consistency_notes:
  - Se usa «Hijo mío» para conservar la apelación filial masculina, en línea con el audit trail inglés.
  - Se prefirió «bendiciones» en plural, no «bendición» singular, para respetar el hebreo plural totalizante.
  - «Honra» mantiene la carga ética de כבד sin recurrir a un calco rígido.
  - No se emplea «SEÑOR» ni terminología de sustitución porque no aparece el Tetragrámaton en este versículo.
  - La nota al pie está anclada al término «Hijo mío» para corresponder al uso del patrón de notas del POB inglés.
