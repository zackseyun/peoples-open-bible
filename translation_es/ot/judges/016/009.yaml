revisions:
- from: 'Ahora bien, el de la emboscada estaba en la habitación interior[a], y ella le dijo: «¡Los filisteos sobre ti, Sansón!». Pero él rompió las ataduras, como se rompe un hilo de estopa[b] cuando huele el fuego, y no se supo de dónde venía su fuerza.'
  to: 'Ahora bien, la emboscada estaba esperando en la habitación interior[a], y ella le dijo: «¡Los filisteos sobre ti, Sansón!». Pero él rompió las ataduras, como se rompe un hilo de estopa[b] cuando huele fuego, y su fuerza no fue conocida.'
  rationale: Se reemplaza «el de la emboscada» por «la emboscada» para un español natural que además sigue la decisión auditada de tratar el participio singular colectivamente. Se añade «estaba esperando» para reflejar mejor el valor contextual de יֹשֵׁב en una emboscada. Se corrige la cláusula final a «su fuerza no fue conocida» para evitar la expansión interpretativa «de dónde venía», ausente del hebreo. También se completa la nota literal sobre «huele fuego», que es una imagen relevante preservada por el POB inglés.
  reviewer_model: gpt-5.4
