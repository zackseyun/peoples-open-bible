revisions:
- from: El sacerdote lo hará arder sobre el altar como ofrenda encendida para Yahvé[a]; es una ofrenda por la culpa[b].
  to: El sacerdote los hará arder sobre el altar como una ofrenda hecha por fuego[a] para Yahvé; es una ofrenda por la culpa[b].
  rationale: La revisión corrige el plural exigido por אֹתָם, reancla las notas a los términos correctos según el rastro POB y mejora la naturalidad técnica de אִשֶּׁה en español. Se conserva 'Yahvé' conforme a la doctrina del proyecto y 'ofrenda por la culpa' como equivalente principal de אָשָׁם, con alternativas en nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:29:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura general del hebreo: sacerdote, altar, dedicación a Yahvé y clasificación final como אָשָׁם. Sin embargo, no preserva con suficiente fidelidad dos puntos del texto fuente y del rastro POB: (1) אֹתָם es plural (''them''), no singular colectivo; y (2) el marcador de nota [b] quedó anclado en ''Yahvé'' cuando la nota b en el rastro inglés corresponde a אָשָׁם / ''guilt offering'', mientras que la nota sobre אִשֶּׁה debe ir con [a].'
  spanish_quality_summary: La redacción es clara y de registro digno, pero 'lo hará arder' suena menos natural que 'los hará arder' o 'los quemará' dado el plural del referente. 'Ofrenda encendida' es comprensible, aunque algo menos idiomática como término técnico que 'ofrenda hecha por fuego'; puede mantenerse en el texto con nota alternativa, pero conviene una formulación más natural en español litúrgico-legible. La puntuación y el estilo general son buenos.
  glossary_alignment: 'Se alinea bien con ''Yahvé'' para יהוה. Para אָשָׁם, ''ofrenda por la culpa'' es aceptable y fiel al valor técnico, con alternativas en nota. El principal problema de alineación es la mala correspondencia de los marcadores de nota con los términos fuente: [a] debe respaldar אִשֶּׁה y [b] debe respaldar אָשָׁם.'
  issues:
  - severity: high
    issue: Pronombre de objeto en singular en lugar de plural
    rationale: El hebreo אֹתָם significa 'them/los'. Cambiarlo a 'lo' introduce una reducción no justificada por el texto fuente. Aunque el antecedente pueda concebirse como conjunto, aquí la evidencia fuente y el POB inglés preservan el plural.
  - severity: high
    issue: Marcadores de notas invertidos respecto del rastro inglés y de los términos fuente
    rationale: En el texto español, [a] está sobre 'Yahvé' pero la nota a explica אִשֶּׁה; además la nota b en inglés pertenece a 'guilt offering'/אָשָׁם y no al nombre divino. Esto rompe la trazabilidad auditada y debe corregirse.
  - severity: medium
    issue: '''Ofrenda encendida'' es menos idiomático como equivalente técnico de אִשֶּׁה'
    rationale: Aunque comunica combustión ritual, en español suena algo inusual. 'Ofrenda hecha por fuego' es más transparente como alternativa, y en el texto principal 'ofrenda quemada' o 'ofrenda hecha por fuego' serían más naturales. Dado el objetivo de legibilidad amplia, conviene suavizarlo.
  revised_spanish_text: El sacerdote los hará arder sobre el altar como una ofrenda hecha por fuego[a] para Yahvé; es una ofrenda por la culpa[b].
  revised_footnotes:
  - marker: a
    text: 'O también: «una ofrenda encendida». El hebreo usa un término técnico para una ofrenda presentada mediante fuego.'
    reason: lexical_alternative
  - marker: b
    text: 'O también: «ofrenda de reparación» o, tradicionalmente, «ofrenda por el delito».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige el plural exigido por אֹתָם, reancla las notas a los términos correctos según el rastro POB y mejora la naturalidad técnica de אִשֶּׁה en español. Se conserva 'Yahvé' conforme a la doctrina del proyecto y 'ofrenda por la culpa' como equivalente principal de אָשָׁם, con alternativas en nota.
