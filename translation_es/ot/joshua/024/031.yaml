translation:
  language: es
  text: Israel sirvió a Yahvé todos los días de Josué, y todos los días de los ancianos que sobrevivieron a Josué y que habían conocido toda la obra[a] de Yahvé que había hecho para Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los actos de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבֹד
  english_pob_choice: served
  chosen_spanish: sirvió
  alternatives_spanish:
  - adoró
  - prestó servicio
  lexicon: HALOT
  rationale: עבד con Yahvé como objeto expresa servicio en lealtad de pacto, no solo culto ritual. En español, «sirvió» conserva esa amplitud y evita reducir el verbo a «adoró», que sería más estrecho.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino en forma transliterada y reconocible para español, siguiendo la decisión de la POB de no sustituir el Tetragrámaton por una convención de título. «Yahvé» es la forma estándar en español para este proyecto.
- source_word: כֹּל יְמֵי
  english_pob_choice: all the days of
  chosen_spanish: todos los días de
  alternatives_spanish:
  - durante toda la vida de
  - a lo largo de los días de
  lexicon: HALOT
  rationale: La expresión temporal hebrea es idiomática y se conserva de forma directa en español por claridad y fidelidad estructural.
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los mayores
  - los líderes
  lexicon: HALOT
  rationale: En este contexto comunitario, זקנים designa a los ancianos reconocidos del pueblo. «Ancianos» transmite mejor esa función social que «viejos» y evita sobreinterpretar como solo una referencia a la edad.
- source_word: הֶאֱרִיכוּ יָמִים אַחֲרֵי יְהוֹשֻׁעַ
  english_pob_choice: outlived Joshua
  chosen_spanish: sobrevivieron a Josué
  alternatives_spanish:
  - vivieron muchos días después de Josué
  - alargaron sus días después de Josué
  lexicon: HALOT
  rationale: El hebreo es un modismo que indica que vivieron más allá de Josué. «Sobrevivieron a Josué» expresa ese sentido con naturalidad en español sin perder la idea de continuación temporal.
- source_word: יָדְעוּ
  english_pob_choice: had known
  chosen_spanish: habían conocido
  alternatives_spanish:
  - conocían
  - habían sabido
  lexicon: HALOT
  rationale: El perfecto relativo apunta a conocimiento previo y personal de las obras de Yahvé. «Habían conocido» conserva esa anterioridad y el matiz experiencial mejor que un presente simple.
- source_word: כָּל מַעֲשֵׂה יְהוָה
  english_pob_choice: all the work of Yahweh
  chosen_spanish: toda la obra de Yahvé
  alternatives_spanish:
  - todos los actos de Yahvé
  - todo el obrar de Yahvé
  lexicon: HALOT
  rationale: מַעֲשֶׂה puede significar obra, hecho o acto. «Obra» funciona bien en español para el conjunto de acciones efectivas de Dios, y mantiene la amplitud del término mejor que una opción más puntual.
- source_word: עָשָׂה לְיִשְׂרָאֵל
  english_pob_choice: he had done for Israel
  chosen_spanish: había hecho para Israel
  alternatives_spanish:
  - había hecho a favor de Israel
  - había realizado por Israel
  lexicon: HALOT
  rationale: El ל aquí indica beneficio en favor de Israel; «para Israel» comunica de manera natural que las acciones de Yahvé fueron en su beneficio.
theological_decisions:
- issue: El nombre divino יהוה en la traducción española
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La POB en inglés preserva el nombre propio del pacto. En español, «Yahvé» mantiene esa decisión, evita la sustitución por un título y sigue la terminología del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de עבד con Yahvé como objeto
  english_pob_reading: served
  chosen_spanish_reading: sirvió
  alternative_spanish_readings:
  - adoró
  - rindió culto
  rationale: No se limita el verbo a culto litúrgico. El texto habla de fidelidad y servicio al Dios del pacto, por eso «sirvió» preserva mejor la amplitud semántica que «adoró».
  doctrine_reference: HALOT / uso contextual de עבד en fidelidad de pacto
translation_notes:
  revision_awareness: Se refleja el estado de revisión más reciente sin cambios sustanciales; la solución inglesa final se mantiene estable y no requiere ajuste adicional en español. La nota léxica conserva la alternativa documentada para מַעֲשֶׂה sin introducir una reinterpretación nueva.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה, en línea con la política del proyecto.
  - Se usa «sirvió» para עבד con Dios como objeto, coherente con el matiz de servicio de pacto.
  - «Ancianos» conserva el valor comunitario de זקנים sin convertirlo en una mera descripción etaria.
  - La nota de pie conserva la alternativa «actos» porque el hebreo permite esa lectura junto con «obra».
