translation:
  language: es
  text: '¡Ustedes lo ponen todo al revés![a] ¿Se considerará al alfarero como barro, para que la obra diga de quien la hizo: «No me hizo», y lo formado diga de quien lo formó: «No tiene entendimiento»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¡Su inversión de las cosas!»; algunos entienden el inicio como «¡Su perversidad!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַפְכְּכֶם
  english_pob_choice: You turn things upside down
  chosen_spanish: ¡Vosotros trastornáis todo!
  alternatives_spanish:
  - ¡Vuestra perversidad!
  - ¡Vosotros dais vuelta a todo!
  - ¡Vuestro trastorno de todo!
  lexicon: HALOT
  rationale: La forma hebrea es exclamativa y el contexto es de reproche por invertir el orden debido. En español, «trastornáis todo» comunica la inversión general con fuerza profética y evita un calco torpe.
- source_word: אִם
  english_pob_choice: Shall
  chosen_spanish: ¿Se considerará... ?
  alternatives_spanish:
  - ¿Acaso... ?
  - ¿Se pondrá... ?
  - ¿Se estimará... ?
  lexicon: HALOT
  rationale: Aquí introduce una pregunta retórica, no una condicional simple. «Se considerará» refleja bien el valor de ser tenido por algo, en línea con el hebreo pasivo/reflexivo.
- source_word: כְּחֹמֶר
  english_pob_choice: as clay
  chosen_spanish: como barro
  alternatives_spanish:
  - como arcilla
  - como barro de alfarero
  lexicon: HALOT
  rationale: El hebreo nombra el material del alfarero. «Barro» es natural en español bíblico y conserva la imagen sin perder claridad; «arcilla» también sería posible, pero «barro» suena más idiomático en este dicho.
- source_word: הַיֹּצֵר
  english_pob_choice: the potter
  chosen_spanish: al alfarero
  alternatives_spanish:
  - al que forma
  - al modelador
  - al que da forma
  lexicon: HALOT
  rationale: Aunque el verbo subyacente es «formar», la collocación con barro activa la imagen concreta del alfarero. En español, «alfarero» conserva esa metáfora central mejor que una abstracción.
- source_word: יֵחָשֵׁב
  english_pob_choice: be regarded
  chosen_spanish: se considerará
  alternatives_spanish:
  - se tendrá por
  - se estimará
  - será contado
  lexicon: HALOT
  rationale: El nifal de חשב expresa ser contado/considerado. «Se considerará» es natural y mantiene el valor de evaluación o juicio sobre el alfarero.
- source_word: מַעֲשֶׂה
  english_pob_choice: what is made
  chosen_spanish: la obra
  alternatives_spanish:
  - lo hecho
  - la cosa hecha
  - la criatura
  lexicon: HALOT
  rationale: En la oposición hacedor/hecho, «la obra» funciona como sustantivo resultativo y resulta idiomático en español, sin introducir un matiz más abstracto que el del texto.
- source_word: לְעֹשֵׂהוּ
  english_pob_choice: of its maker
  chosen_spanish: de quien la hizo
  alternatives_spanish:
  - de su hacedor
  - de su creador
  - de su artesano
  lexicon: HALOT
  rationale: El hebreo presenta la relación de origen/autoría. «De quien la hizo» evita un término demasiado técnico y mantiene la referencia personal del que fabrica.
- source_word: עָשָׂנִי
  english_pob_choice: make me
  chosen_spanish: No me hizo
  alternatives_spanish:
  - No me creó
  - No me formó
  - No me hizo él
  lexicon: HALOT
  rationale: La negación en la cita exige un pasado simple en español. «No me hizo» conserva con precisión la negación de autoría creadora.
- source_word: יֵצֶר
  english_pob_choice: what is formed
  chosen_spanish: lo formado
  alternatives_spanish:
  - la formación
  - la obra modelada
  - lo que fue formado
  lexicon: HALOT
  rationale: En paralelo con מַעֲשֶׂה, el participio/resultado apunta al producto formado. «Lo formado» preserva la simetría y evita sobreexplicar.
- source_word: לְיוֹצְרוֹ
  english_pob_choice: of the one who formed it
  chosen_spanish: de quien lo formó
  alternatives_spanish:
  - de su formador
  - de su alfarero
  - de quien lo modeló
  lexicon: HALOT
  rationale: Mantiene el paralelismo con la cláusula anterior y conserva el sentido personal del formador sin perder la relación de procedencia.
- source_word: הֵבִין
  english_pob_choice: has no understanding
  chosen_spanish: No entiende
  alternatives_spanish:
  - No tiene entendimiento
  - No tiene discernimiento
  - No comprende
  lexicon: HALOT
  rationale: El verbo בין expresa entender/discernir. En la cita directa, «No entiende» es breve, natural y reproduce la acusación de incapacidad intelectual.
theological_decisions:
- issue: Metáfora del alfarero y el barro
  english_pob_reading: Retain the creator-creature metaphor explicitly with 'potter' and 'clay' rather than flattening it into abstract language.
  chosen_spanish_reading: Mantener explícitamente la imagen de alfarero y barro.
  alternative_spanish_readings:
  - Reducir a «creador» y «creación»
  - Usar solo formas abstractas como «el que forma» y «lo formado»
  rationale: La fuerza teológica del versículo está en el absurdo de que la criatura juzgue a su hacedor. La imagen concreta es necesaria en español para conservar la carga profética y bíblica del pasaje.
  doctrine_reference: Isaías 29:16; cf. Romanos 9:20-21; POB translation philosophy §§1, 3, 5
- issue: Exclamación inicial de reproche
  english_pob_reading: Translate as a rebuking exclamation, 'You turn things upside down!'
  chosen_spanish_reading: 'Traducir la apertura como una exclamación de reprensión: «¡Vosotros trastornáis todo!»'
  alternative_spanish_readings:
  - «¡Vuestra perversidad!»
  - «¡Oh, vuestro trastorno de todo!»
  rationale: 'El hebreo es comprimido y debatido, pero la función retórica es clara: censurar una inversión del orden debido. La exclamación en español debe sonar a reproche profético y preparar la pregunta subsiguiente.'
  doctrine_reference: Isaías 29:16; POB translation philosophy §§1, 6
translation_notes:
  revision_awareness: El borrador sigue el pasaje ya revisado en la auditoría inglesa, que quedó sin cambios en la última pasada (high agreement, 1.0). No se registran revisiones aplicadas; por eso la versión española conserva la misma decisión interpretativa principal y solo adapta la formulación al español natural.
  spanish_consistency_notes:
  - Se mantiene el nombre divino y no aparece en este versículo.
  - Se conserva la metáfora central de alfarero/barro, evitando equivalentes abstractos que debiliten la imagen.
  - La negación de autoría («No me hizo») y la de entendimiento («No entiende») siguen el paralelismo del hebreo.
  - «Barro» y «alfarero» son coherentes con el registro bíblico castellano y con el valor léxico del contexto.
