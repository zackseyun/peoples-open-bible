  - severity: medium
    issue: «el canto era cantado» es español poco natural
    rationale: Aunque intenta reflejar la literalidad hebrea, en español suena forzado y poco digno. El proyecto permite evitar calcos de madera cuando la gramática española se vuelve antinatural.
  - severity: low
    issue: «se estaba postrando» es más pesado de lo necesario
    rationale: Con sujeto colectivo, «se postraba» comunica bien la acción en curso y lee mejor en narración bíblica española.
