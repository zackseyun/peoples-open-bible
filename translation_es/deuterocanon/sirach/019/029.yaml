translation:
  language: es
  text: Por la apariencia se reconoce a un hombre, y por la expresión del rostro se reconoce al que tiene entendimiento.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el porte del rostro se reconoce a una persona discernidora».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ ὁράσεως
  english_pob_choice: From appearance
  chosen_spanish: A partir de la apariencia
  alternatives_spanish:
  - Por la apariencia
  - Desde la apariencia
  - A partir del aspecto visible
  lexicon: LSJ
  rationale: El griego señala el rasgo visible por el que alguien llega a ser identificado; «apariencia» reproduce bien esa idea en español natural. «A partir de» conserva el valor de ἀπό como base o punto de partida del reconocimiento.
- source_word: ἐπιγνωσθήσεται
  english_pob_choice: is recognized
  chosen_spanish: es reconocido
  alternatives_spanish:
  - será reconocido
  - es discernido
  - se le reconoce
  lexicon: BDAG
  rationale: El pasivo indica que la persona es identificada por otros a partir de señales observables. En español proverbial, el presente pasivo impersonal/narrativo suena más natural que el futuro y mantiene la fuerza general del dicho.
- source_word: ἀνήρ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un varón
  lexicon: LSJ
  rationale: El sustantivo es masculino singular y el proverbio conserva esa forma representativa. «Un hombre» mantiene la simetría del griego y la tonalidad proverbial sin forzar una neutralización que el texto no exige.
- source_word: ἀπαντήσεως προσώπου
  english_pob_choice: the expression of the face
  chosen_spanish: la expresión del rostro
  alternatives_spanish:
  - la expresión del rostro
  - el porte del rostro
  - el semblante
  lexicon: LSJ
  rationale: La expresión griega es idiomática y apunta a la disposición visible del rostro. «Rostro» es claro y actual; «expresión del rostro» comunica el matiz observable mejor que un calco como «encuentro del rostro».
- source_word: νοήμων
  english_pob_choice: one who has understanding
  chosen_spanish: un hombre entendido
  alternatives_spanish:
  - una persona entendida
  - un hombre con entendimiento
  - un hombre prudente
  lexicon: LSJ
  rationale: νόημων describe a quien tiene entendimiento o discernimiento. Dado el paralelismo con ἀνήρ, «un hombre entendido» preserva el tono sapiencial y evita sobreinterpretar el término como «inteligente» o «prudente» únicamente.
translation_notes:
  revision_awareness: El texto griego solo dice «a partir de apariencia» en la primera cláusula; por eso se evitó introducir «de un hombre» allí, siguiendo la revisión inglesa más reciente. También se mantuvo el paralelismo pasivo («es reconocido») como en el audit trail.
  spanish_consistency_notes:
  - Se conservó «hombre» para ἀνήρ por la fuerza proverbial y la correspondencia formal con el original.
  - Se evitó «SEÑOR» u otra terminología no pertinente; este verso no contiene lenguaje divino.
  - La frase «un hombre entendido» refleja el valor sapiencial de νοήμων sin cargarlo de una connotación técnica posterior.
  - La puntuación reproduce el paralelismo del proverbio y separa limpiamente las dos cláusulas.
