translation:
  language: es
  text: 'Jesús respondió[a]: «¿Tú dices esto por tu propia cuenta, o te lo dijeron otros acerca de mí?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de ti mismo». El griego dice literalmente «desde ti mismo», preguntando si la afirmación proviene de Pilato mismo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: El verbo narrativo de respuesta se rinde de forma natural con «respondió» en español. Mantiene el tono conversacional del diálogo judicial sin añadir matiz interpretativo.
- source_word: Ἀπὸ σεαυτοῦ
  english_pob_choice: on your own
  chosen_spanish: por tu propia cuenta
  alternatives_spanish:
  - por ti mismo
  - de ti mismo
  - por iniciativa propia
  lexicon: BDAG
  rationale: La preposición ἀπό con el reflexivo señala origen o fuente. «Por tu propia cuenta» comunica bien la idea de que la afirmación procede de Pilato mismo, conservando el matiz de origen sin sonar demasiado literal.
- source_word: σὺ
  english_pob_choice: you
  chosen_spanish: Tú
  alternatives_spanish:
  - tú mismo
  - usted
  lexicon: BDAG
  rationale: El pronombre explícito en griego aporta énfasis. En español se conserva con «Tú» para reflejar esa focalización, manteniendo además la naturalidad del interrogativo.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - eso
  lexicon: BDAG
  rationale: Remite a la pregunta previa de Pilato. «Esto» es la forma más natural y precisa en español.
- source_word: λέγεις
  english_pob_choice: are saying
  chosen_spanish: dices
  alternatives_spanish:
  - estás diciendo
  - dices tú
  lexicon: BDAG
  rationale: Aunque el inglés POB usa progresivo para naturalidad, en español «dices» funciona de manera idiomática en una pregunta directa y preserva el valor presente del verbo.
- source_word: ἄλλοι
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - otras personas
  - los demás
  lexicon: BDAG
  rationale: Plural indefinido que contrasta con Pilato. «Otros» es breve y plenamente adecuado.
- source_word: εἶπόν σοι
  english_pob_choice: did others tell you
  chosen_spanish: te lo dijeron
  alternatives_spanish:
  - te dijeron
  - otros te lo contaron
  lexicon: BDAG
  rationale: El aoristo se expresa naturalmente con pretérito perfecto simple en español. «Te lo dijeron» recoge el valor de decir a alguien; el pronombre «lo» ayuda a representar «esto» como objeto implícito en la segunda cláusula.
- source_word: περὶ ἐμοῦ
  english_pob_choice: about me
  chosen_spanish: acerca de mí
  alternatives_spanish:
  - sobre mí
  - de mí
  lexicon: BDAG
  rationale: La preposición περί con genitivo expresa tema o referencia. «Acerca de mí» es clara, sobria y respeta el sentido de referencia personal.
theological_decisions:
- issue: Fuerza de la pregunta de Jesús a Pilato
  english_pob_reading: 'La pregunta explora el origen de la afirmación de Pilato: si nace de él mismo o si proviene de otros, sin explicar más allá la intención teológica.'
  chosen_spanish_reading: 'La traducción mantiene la misma tensión: si Pilato habla por su propia cuenta o si otros le han transmitido la idea acerca de Jesús.'
  alternative_spanish_readings:
  - ¿Lo dices por tu propia iniciativa?
  - ¿Tú mismo lo dices, o te lo dijeron otros?
  rationale: El griego apunta a la procedencia de la afirmación, no a una explicación ampliada de motivos. La versión española conserva ese alcance limitado y evita sobreinterpretar.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla prematuramente.
translation_notes:
  revision_awareness: La versión inglesa auditada revisó 'from yourself' a la más natural 'on your own' sin cambiar el sentido de ἀπὸ σεαυτοῦ. La redacción española sigue esa decisión semántica, pero opta por una equivalencia idiomática propia del español («por tu propia cuenta») para preservar el matiz de origen. No se introducen elementos ajenos al texto griego.
  spanish_consistency_notes:
  - Se mantiene 'Jesús' como nombre propio y no se introduce 'Cristo' ni 'Señor'.
  - Se conserva el pronombre explícito 'Tú' para reflejar el énfasis del griego.
  - «Acerca de mí» traduce el valor relacional de περὶ con genitivo sin volverlo más interpretativo que el original.
  - La nota al pie conserva la alternativa semántica principal documentada por el POB inglés.
