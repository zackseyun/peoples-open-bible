translation:
  language: es
  text: Y aprendí sin engaño, y comparto sin envidia[a]; no oculto su riqueza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin mezquindad»; el adverbio griego puede implicar compartir sin envidia o sin escatimar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδόλως
  english_pob_choice: without deceit
  chosen_spanish: sin engaño
  alternatives_spanish:
  - sin fraude
  - sin dolo
  - sinceramente
  lexicon: LSJ
  rationale: El adverbio expresa ausencia de dolo, fraude o engaño. «Sin engaño» conserva la fuerza moral del término en español natural y evita suavizarlo demasiado con «sinceramente».
- source_word: ἔμαθον
  english_pob_choice: I learned
  chosen_spanish: aprendí
  alternatives_spanish:
  - llegué a conocer
  - fui instruido
  - he aprendido
  lexicon: LSJ
  rationale: El aoristo de μανθάνω se rinde de forma directa con «aprendí», manteniendo la voz autobiográfica en primera persona sin añadir una matización no exigida por el griego.
- source_word: ἀφθόνως
  english_pob_choice: without envy
  chosen_spanish: sin envidia
  alternatives_spanish:
  - sin mezquindad
  - sin reservarme nada
  - generosamente
  lexicon: LSJ
  rationale: El adverbio puede implicar dar sin envidiar ni escatimar. «Sin envidia» sigue de cerca el valor básico señalado por el texto base y conserva la relación con el acto de compartir.
- source_word: μεταδίδωμι
  english_pob_choice: I share
  chosen_spanish: reparto
  alternatives_spanish:
  - comparto
  - imparto
  - doy
  lexicon: LSJ
  rationale: En este contexto, con «sus riquezas» como objeto, «reparto» comunica bien la acción de dar participación de algo abundante. Se evita tecnicismo innecesario y se mantiene el sentido de impartir o compartir.
- source_word: πλοῦτον
  english_pob_choice: wealth
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - abundancia
  - tesoro
  lexicon: LSJ
  rationale: «Riquezas» reproduce el plural natural español para el singular colectivo griego y conserva el matiz de abundancia valiosa que el contexto atribuye a la sabiduría.
- source_word: αὐτῆς
  english_pob_choice: her
  chosen_spanish: sus
  alternatives_spanish:
  - de ella
  - su
  lexicon: LSJ
  rationale: El pronombre remite a la sabiduría personificada. En español, «sus riquezas» mantiene esa referencia femenina sin forzar una formulación menos natural; el posesivo evita perder la personificación.
- source_word: ἀποκρύπτομαι
  english_pob_choice: I do not hide
  chosen_spanish: no oculto
  alternatives_spanish:
  - no escondo
  - no disimulo
  - no lo guardo en secreto
  lexicon: LSJ
  rationale: El verbo medio/pasivo funciona aquí con valor activo de ocultar o encubrir. «No oculto» es idiomático en español y conserva la claridad de la negación directa.
theological_decisions:
- issue: Personificación femenina de la sabiduría en el pronombre y posesivo
  english_pob_reading: 'Retain feminine personal reference: ''her wealth'''
  chosen_spanish_reading: 'Mantener la referencia femenina implícita: «sus riquezas»'
  alternative_spanish_readings:
  - sus riquezas (sin marcar género)
  - las riquezas de ella
  rationale: El texto griego presenta a la sabiduría como figura personificada y femenina. El español puede conservar esa personificación con un posesivo natural, sin convertirla en un tratamiento impersonal ni añadir explicaciones doctrinales ajenas al verso.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se siguió el texto griego de Swete y el audit trail inglés: se mantuvo la triple secuencia de aprender, compartir y no ocultar; no se introdujeron explicaciones interpretativas adicionales. La revisión más reciente indicó que no se requerían cambios.'
  spanish_consistency_notes:
  - Se preserva la primera persona singular como en el griego.
  - «Sabiduría» queda implícita por el contexto y por el posesivo femenino, sin necesidad de añadirla en el verso.
  - «Sin engaño» y «sin envidia» mantienen la tensión moral del original, evitando suavizaciones devocionales.
  - «Riquezas» traduce adecuadamente πλοῦτον en un sentido figurado y personificado.
