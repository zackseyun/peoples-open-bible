    rationale: Aunque no es incorrecto, el audit trail inglés justificó «overlaid». En español, «revistió ... con oro» comunica mejor el sentido de revestimiento o recubrimiento ornamental del templo.
  revised_spanish_text: Y el peso de los clavos era de cincuenta siclos de oro, y revistió los aposentos altos[a] con oro.
