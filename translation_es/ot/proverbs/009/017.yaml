    text: 'O: «el pan de secreto» / «el pan en lugares ocultos». La expresión hebrea es comprimida; la traducción expresa el sentido idiomático más probable sin añadir «comido» ni otra acción que el texto no dice explícitamente.'
    reason: lexical_alternative
