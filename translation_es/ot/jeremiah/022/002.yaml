translation:
  language: es
  text: 'y di: «Escucha la palabra de Yahvé, rey de Judá, que te sientas sobre el trono de David: tú, tus servidores[a] y tu pueblo, los que entran por estas puertas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus funcionarios», para עֲבָדֶיךָ.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: and say
  chosen_spanish: y di
  alternatives_spanish:
  - entonces di
  - y dirás
  lexicon: HALOT
  rationale: El consecutivo con introducción de discurso se expresa naturalmente en español con «y di», manteniendo el enlace con el mandato previo sin endurecerlo con una perífrasis más literal.
- source_word: שְׁמַע
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escuchen
  lexicon: HALOT
  rationale: «Escucha» conserva el valor de llamado profético y suena más natural para el español actual que «oye», sin reducirlo a una simple atención auditiva.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: «Palabra» preserva el peso revelatorio y pactal de דָּבָר; «Yahvé» sigue el criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la terminología del proyecto para el Tetragrámaton, evitando la máscara litúrgica «SEÑOR».
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: O king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - oh rey de Judá
  - rey judío
  lexicon: HALOT
  rationale: En español, el vocativo se puede marcar con la coma y el contexto; no es necesario añadir «oh» si la frase ya resulta clara y natural.
- source_word: הַיֹּשֵׁב עַל כִּסֵּא דָוִד
  english_pob_choice: who sits on the throne of David
  chosen_spanish: tú que te sientas sobre el trono de David
  alternatives_spanish:
  - que se sienta sobre el trono de David
  - sentado sobre el trono de David
  lexicon: HALOT
  rationale: La forma personal «tú que te sientas» mantiene el énfasis directo del hebreo («tú») y reproduce el valor descriptivo del participio sin perder fluidez.
- source_word: אַתָּה וַעֲבָדֶיךָ וְעַמְּךָ
  english_pob_choice: you, your servants, and your people
  chosen_spanish: tú, tus esclavos y tu pueblo
  alternatives_spanish:
  - tú, tus siervos y tu pueblo
  - tú, tus funcionarios y tu pueblo
  lexicon: HALOT
  rationale: Se conserva «esclavos» porque el campo léxico de עֲבָדִים es más fuerte que «siervos»; además, la sección presenta una enumeración amplia dirigida al rey y su entorno. Se mantiene la tensión documentada frente a la opción interpretativa «funcionarios».
- source_word: הַבָּאִים
  english_pob_choice: who enter
  chosen_spanish: los que entran
  alternatives_spanish:
  - los que están entrando
  - quienes pasan
  lexicon: HALOT
  rationale: «Los que entran» reproduce de forma directa el participio de movimiento y su función descriptiva.
- source_word: בַּשְּׁעָרִים הָאֵלֶּה
  english_pob_choice: through these gates
  chosen_spanish: por estas puertas
  alternatives_spanish:
  - a través de estas puertas
  - en estas puertas
  lexicon: HALOT
  rationale: «Puertas» es la equivalencia más natural en español para שְׁעָרִים en este contexto urbano/real; «por» expresa el tránsito de entrada sin forzar un calco.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La lectura del texto base y la política del proyecto favorecen la transliteración del Nombre propio divino. «Yahvé» comunica mejor que una sustitución litúrgica y mantiene el enlace con la auditable base hebrea.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: עֲבָדֶיךָ en contexto real
  english_pob_reading: your servants
  chosen_spanish_reading: tus esclavos
  alternative_spanish_readings:
  - tus servidores
  - tus funcionarios
  rationale: El hebreo עֲבָדִים conserva fuerza social y de dependencia. Aunque en español «esclavos» puede sonar más fuerte, refleja mejor la amplitud semántica del término y evita suavizarlo sin apoyo textual. Se preserva así la tensión léxica documentada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — עֶבֶד / δοῦλος → esclavo'
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el auditor inglés sin cambios de revisión aplicados; el pasaje presenta alta concordancia con el control cruzado. La principal decisión sensible en español es la elección de «esclavos» para עֲבָדֶיךָ, manteniendo la fuerza léxica documentada y la forma directa del mandato.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se usó «trono de David» y no una paráfrasis dinástica más libre, para conservar el enlace mesiánico/covenantal del hebreo.
  - «Puertas» se eligió como término más natural en español para שְׁעָרִים en este contexto de acceso urbano/real.
  - La nota al pie marca la alternativa léxica documentada para עֲבָדִים sin eliminar el sentido fuerte del texto principal.
