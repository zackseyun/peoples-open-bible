review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: un marco temporal festivo, la fórmula cultual מִקְרָא קֹדֶשׁ y la prohibición de כָּל מְלֶאכֶת עֲבֹדָה. Sin embargo, hay dos ajustes importantes para mayor fidelidad e idiomaticidad: en español bíblico natural, בַּיּוֹם הָרִאשׁוֹן se expresa mejor como «El primer día» que «En el primer día»; y «trabajo laborioso» suena poco natural y puede sugerir intensidad física más que trabajo ordinario/de ocupación, por lo que conviene «trabajo habitual» con nota que preserve las alternativas documentadas.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «En el primer día» es un calco poco natural en español, y «habrá una santa convocación» puede mantenerse aunque «santa convocación» suena formal/tradicional. La frase «ningún trabajo laborioso» no fluye bien en español general ni comunica con precisión el matiz explicado en la auditoría inglesa. «No harán ningún trabajo habitual» mejora la legibilidad y el sentido.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. «Santa convocación» es aceptable para מִקְרָא קֹדֶשׁ y conserva la razón léxica documentada. Para כָּל מְלֶאכֶת עֲבֹדָה, conviene apartarse de una reproducción demasiado literal de «laborious work» porque en español «laborioso» no cumple bien la función semántica explicada por la nota inglesa; «habitual» o «ordinario» representan mejor el trabajo común/ocupacional prohibido.
  issues:
  - severity: medium
    issue: «En el primer día» es poco idiomático.
    rationale: Aunque reproduce el valor temporal de ב, en español natural se dice «El primer día» o «En el primer día de…» solo si sigue un complemento. Aquí el artículo simple basta y suena bíblico sin calco forzado.
  - severity: medium
    issue: «trabajo laborioso» es poco natural y puede desviar el sentido.
    rationale: La auditoría inglesa explica que la frase no se refiere a trabajo físicamente arduo, sino al trabajo ordinario/de ocupación. En español, «laborioso» suele describir algo costoso o diligente, no el tipo de trabajo común prohibido en un día festivo.
  revised_spanish_text: El primer día habrá una santa convocación[a]; no harán ningún trabajo habitual[b].
  revised_footnotes:
  - marker: a
    text: O «una asamblea santa». La frase hebrea מִקְרָא קֹדֶשׁ es un término formal para una reunión santa convocada.
    reason: lexical_alternative
  - marker: b
    text: O «trabajo ordinario» o, más literalmente en español antiguo, «trabajo servil». La expresión alude al trabajo cotidiano asociado con la ocupación o el servicio.
    reason: lexical_alternative
  revision_rationale: Se corrige la frase temporal a un español más natural («El primer día») y se sustituye «trabajo laborioso» por «trabajo habitual», que comunica mejor el sentido documentado de כָּל מְלֶאכֶת עֲבֹדָה en español contemporáneo, manteniendo en nota las alternativas más literales y tradicionales.
