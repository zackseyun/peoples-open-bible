review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: συνήντησεν = «fue a encontrarse con», αὐτοῖς = plural «ellos», κατέλιπεν = «dejó», y mantiene «su hermano Simón». También preserva la nota léxica sobre χώρα. Sin embargo, la conjunción adversativa española «pero» no corresponde bien al simple δέ aquí, que funciona más como contraste suave o transición; «mientras que» o una coordinación más ligera suena más fiel y natural.'
  spanish_quality_summary: El texto es claro y legible, pero «pero dejó» introduce una oposición innecesariamente fuerte. Además, dado que la nota ofrece «en la región» como alternativa, no debe repetir en el texto principal esa misma opción; conviene escoger una formulación principal distinta, como «en el territorio», para que la nota sea útil y coherente.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La elección de «Simón» y la sintaxis general son adecuadas. Para χώρα, «territorio» encaja bien con la justificación léxica y evita la repetición entre texto y nota.
  issues:
  - severity: medium
    issue: «pero» sobrerrepresenta el valor de δέ
    rationale: El griego contrasta las dos acciones, pero no exige una adversativa fuerte. «Pero» puede insinuar una oposición más marcada de la que el original comunica.
  - severity: medium
    issue: La nota léxica repite la lectura principal «en la región»
    rationale: Si el texto principal ya dice «en la región», la alternativa anotada pierde valor informativo. Es mejor diferenciar el texto base y las alternativas.
  - severity: low
    issue: La nota menciona «campo cultivado», mientras el inglés habla de «cultivated countryside»
    rationale: No es erróneo, pero «campo» o «campiña cultivada» suena más natural en español que «campo cultivado» en una nota de lectura.
  revised_spanish_text: Y fue a encontrarse con ellos[a], y dejó a su hermano Simón en el territorio.
  revised_footnotes:
  - marker: a
    text: O «en la tierra» o «en la región»; el griego χώρα puede designar territorio en sentido amplio, no solo la campiña cultivada.
    reason: lexical_alternative
  revision_rationale: Se ajusta la coordinación para no imponer una adversativa más fuerte que el griego δέ, y se cambia «región» por «territorio» para que la nota léxica conserve alternativas reales y refleje mejor el rango semántico de χώρα.
