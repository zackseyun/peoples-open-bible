lexical_decisions:
- source_word: אִיתַי
  english_pob_choice: Ittai
  chosen_spanish: Itaí
  alternatives_spanish:
  - Ithai
  lexicon: transliteración onomástica
  rationale: Nombre propio. En español, Itaí mantiene la forma breve y natural de transliteración, preservando la identidad del nombre sin traducirlo.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - ben
  lexicon: equivalencia semántica de constructo filial
  rationale: El constructo genealógico expresa filiación directa; «hijo de» es la equivalencia española natural y clara.
- source_word: רִיבַי
  english_pob_choice: Ribai
  chosen_spanish: Ribai
  alternatives_spanish:
  - Ribay
  lexicon: transliteración onomástica
  rationale: Nombre propio transliterado de manera estándar, conservando la vocalización reflejada por la POB en inglés.
- source_word: מִ/גִּבְעַת
  english_pob_choice: from Gibeah
  chosen_spanish: de Guibeá
  alternatives_spanish:
  - de Gibeá
  - de la colina
  lexicon: topónimo bíblico
  rationale: La preposición indica procedencia o asociación. Se conserva el topónimo como nombre propio; «Guibeá» evita la calca inglesa y corresponde al nombre bíblico de la localidad.
- source_word: בְּנֵי בִנְיָמִן
  english_pob_choice: of the sons of Benjamin
  chosen_spanish: de los hijos de Benjamín
  alternatives_spanish:
  - de los benjaminitas
  - de la tribu de Benjamín
  lexicon: HALOT / uso tribal-genealógico
  rationale: Se preserva la expresión hebrea de parentesco tribal. En este contexto, «hijos de Benjamín» funciona como designación de pertenencia al linaje o tribu, tal como indica la nota inglesa.
- source_word: בְּנָיָה
  english_pob_choice: Benaiah
  chosen_spanish: Benaía
  alternatives_spanish:
  - Banaía
  lexicon: transliteración onomástica
  rationale: Nombre propio transliterado al español según uso bíblico común, manteniendo la correspondencia con el nombre hebreo.
- source_word: הַ/פִּרְעָתֹנִי
  english_pob_choice: the Pirathonite
  chosen_spanish: el piratonita
  alternatives_spanish:
  - de Piratón
  - el de Piratón
  lexicon: gentilicio bíblico
  rationale: El gentilicio identifica a Benaía por procedencia o asociación con Piratón. «Piratonita» conserva la función gentilicia y evita expandir indebidamente el dato del texto.
translation_notes:
  revision_awareness: El texto inglés auditado no requiere revisión sustantiva; se mantiene la estructura genealógica y gentilicia del hebreo, con transliteración consistente de nombres propios y una nota que aclara el valor tribal de «hijos de Benjamín».
  spanish_consistency_notes:
  - Se mantiene la puntuación enumerativa con punto y coma para reflejar la lista nominal.
  - Se usa «Guibeá» como forma española del topónimo bíblico, en vez de traducirlo como sustantivo común.
  - «Piratonita» conserva el gentilicio del hebreo con equivalencia natural en español bíblico.
  - La nota al pie se ancla en «hijos de Benjamín» para preservar la tensión entre lectura literal y sentido tribal.
