  text: וְ/זָכַרְתִּ֥י לָ/הֶ֖ם בְּרִ֣ית רִאשֹׁנִ֑ים אֲשֶׁ֣ר הוֹצֵֽאתִי אֹתָ/ם֩ מֵ/אֶ֨רֶץ מִצְרַ֜יִם לְ/עֵינֵ֣י הַ/גּוֹיִ֗ם לִ/הְיֹ֥ת לָ/הֶ֛ם לֵ/אלֹהִ֖ים אֲנִ֥י יְהוָֽה־׃
