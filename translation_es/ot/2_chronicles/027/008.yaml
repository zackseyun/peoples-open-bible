translation:
  language: es
  text: Tenía veinticinco años cuando comenzó a reinar, y reinó dieciséis años en Jerusalén.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְחָמֵשׁ שָׁנָה
  english_pob_choice: twenty-five years old
  chosen_spanish: veinticinco años
  alternatives_spanish:
  - veinticinco años de edad
  - un hijo de veinticinco años
  lexicon: HALOT
  rationale: Es la fórmula hebrea estándar para indicar edad. En español, el inciso natural y fiel es 'veinticinco años'; añadir 'de edad' es posible pero menos fluido, y 'un hijo de' sería demasiado literal y poco idiomático.
- source_word: הָיָה בְמָלְכֹו
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando empezó a reinar
  - cuando llegó a reinar
  - cuando reinaba
  lexicon: HALOT
  rationale: La expresión hebrea funciona como fórmula temporal de acceso al trono. 'Comenzó a reinar' conserva el valor aspectual y es natural en español sin convertir la frase en una paráfrasis excesiva.
- source_word: וְשֵׁשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: sixteen years
  chosen_spanish: dieciséis años
  alternatives_spanish:
  - por dieciséis años
  - durante dieciséis años
  lexicon: HALOT
  rationale: La cifra es directa y no presenta dificultad especial; 'dieciséis años' reproduce con claridad la duración del reinado.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó como rey
  lexicon: HALOT
  rationale: '''Reinó'' es el equivalente más directo del verbo real hebreo. ''Fue rey'' desplaza el foco del acto de reinar a la identidad, y ''gobernó como rey'' añade una explicación no requerida por el texto.'
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa se rinde de forma sencilla con 'en Jerusalén'. Es la opción más fiel y sobria para la fórmula regnal.
