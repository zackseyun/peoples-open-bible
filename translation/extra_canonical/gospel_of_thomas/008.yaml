translation:
  text: And he said, "The human is like a wise fisherman who cast his net into the
    sea. He drew it up from the sea full of small fish. Among them, the wise fisherman
    found a large, fine fish. He threw all the small fish back down into the sea;
    he chose the large fish without difficulty. Whoever has ears to hear, let him
    hear."
  philosophy: optimal-equivalence
  drafter_model: gemini-3.1-pro-preview
  drafter_label: gemini_3_1_pro_thomas_redraft
  drafted_at: '2026-04-22T09:13:26Z'
  footnotes:
  - marker: The human
    text: Coptic ⲡⲣⲱⲙⲉ (p-rōme). Often translated 'the man', but used here in a generic
      sense for humanity or the seeker.
    reason: lexical_alternative
  - marker: cast
    text: The manuscript reads ⲛⲧⲁϩⲛⲟⲩϫⲉ, using ϩ for the 3rd person masculine singular
      suffix pronoun ϥ, a regional (often Lycopolitan) dialect feature common in this
      text.
    reason: dialect_note
  - marker: found
    text: Literally 'fell upon' (ⲁϥϩⲉ ⲉ-).
    reason: lexical_alternative
  - marker: down
    text: The manuscript has a small lacuna here (ⲉ[ⲡⲉ]ⲥⲏⲧ), but the restoration is
      standard and certain.
    reason: textual_variant
  - marker: without difficulty
    text: This parable parallels Matthew 13:47-48, but diverges significantly. Matthew
      describes a dragnet gathering all kinds of fish to be sorted into good and bad
      at the end of the age. Thomas focuses on a single wise fisherman who discards
      the many small fish to keep the one large, valuable fish, reflecting Thomas's
      emphasis on finding the 'single one' (monachos) rather than an apocalyptic sorting.
    reason: cross_reference
lexical_decisions:
- source_word: ⲡⲣⲱⲙⲉ
  chosen: The human
  rationale: The Coptic uses the definite generic article. In Thomas, this term frequently
    represents humanity or the generic seeker. 'The human' preserves this inclusive,
    generic sense better than 'The man'.
  lexicon: Crum 294a
  alternatives:
  - The man
  - A person
- source_word: ⲟⲩⲱϩⲉ
  chosen: fisherman
  rationale: Standard term for a fisherman or fowler.
  lexicon: Crum 508a
- source_word: ⲣⲙⲛϩⲏⲧ
  chosen: wise
  rationale: Literally 'person of heart/mind', meaning wise or intelligent.
  lexicon: Crum 714b
- source_word: ⲁⲃⲱ
  chosen: net
  rationale: Standard term for a fishing net.
  lexicon: Crum 1b
- source_word: ϩⲉ
  chosen: found
  rationale: The verb ϩⲉ with the preposition ⲉ- literally means 'to fall to/upon',
    idiomatically meaning 'to find' or 'to chance upon'.
  lexicon: Crum 657a
  alternatives:
  - fell upon
  - chanced upon
- source_word: ⲭⲱⲣⲓⲥϩⲓⲥⲉ
  chosen: without difficulty
  rationale: A compound of the Greek preposition χωρὶς ('without') and the Coptic
    noun ϩⲓⲥⲉ ('labor, toil, difficulty').
  lexicon: Crum 718b
theological_decisions:
- issue: Handling of the Synoptic parallel (Matthew 13:47-48)
  chosen_reading: Preserved Thomas's singular focus on the wise fisherman and the
    single large fish.
  rationale: Thomas's parable is fundamentally different in its theological aim from
    Matthew's. It emphasizes the discovery of the single valuable thing (aligning
    with the Thomasine theme of the 'single one' or monachos) rather than a final
    judgment. The translation strictly follows the Coptic to maintain this divergence.
  alternatives_noted:
  - Harmonizing with Matthew's 'good and bad' fish.
drafter_notes: The translation preserves the distinct Thomasine focus of the parable.
  Unlike the Synoptic parallel, which is an eschatological allegory about sorting
  the righteous from the wicked, Thomas's version is a wisdom parable about recognizing
  and choosing the single thing of great value, discarding the rest 'without difficulty'.
  The Coptic circumstantial perfect (ⲉⲥⲙⲉϩ) is rendered attributively ('full of small
  fish').
