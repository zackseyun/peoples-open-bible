  glossary_alignment: No hay conflictos con la terminología base del proyecto (no aparece Yahvé, Mesías, etc.). «Apostasías» preserva bien la decisión teológica documentada para משבותיהם. «Rebeliones» para פִּשְׁעֵיהֶם es defendible, aunque el POB inglés prefirió «transgressions»; no requiere cambio obligatorio. La reparación necesaria es fortalecer הִכָּם y reubicar la nota lexical sobre זְאֵב עֲרָבוֹת.
