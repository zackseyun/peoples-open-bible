- from: Menelao nos lo hizo saber[a], queriendo que, después de bajar[b], se unieran a sus propios[c].
  to: Menelao nos lo hizo saber[a], queriendo que ustedes, después de bajar[b], se unieran a los suyos[c].
  rationale: Se corrige una construcción poco natural ('sus propios') por la forma idiomática 'los suyos', que preserva mejor el sentido del griego y del audit trail inglés. También se explicita 'ustedes' para reflejar ὑμᾶς y evitar ambigüedad sintáctica en español. Las notas se mantienen y se ajustan levemente para armonizar con el texto revisado.
