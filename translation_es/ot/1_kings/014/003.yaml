translation:
  language: es
  text: Y toma en tu mano diez panes[a], tortas y un frasco de miel, y ve a verlo. Él te dirá lo que le sucederá al muchacho[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “tortas pequeñas” o “galletas finas”; el término hebreo se refiere a un tipo de alimento horneado, pero su forma exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: O “qué será del muchacho”.
    reason: alternative_reading
lexical_decisions:
- source_word: וְלָקַחַתְּ
  english_pob_choice: And take
  chosen_spanish: Y toma
  alternatives_spanish:
  - Y tomarás
  - Entonces toma
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal en secuencia instructiva; en español, el imperativo en segunda persona singular femenina conserva el valor directivo sin sonar forzado.
- source_word: בְּיָדֵךְ
  english_pob_choice: in your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - con contigo
  - en tu poder
  lexicon: HALOT
  rationale: Se mantiene el sentido concreto del idiomático hebreo. 'En tu mano' es natural en español y preserva que los objetos los lleva personalmente.
- source_word: עֲשָׂרָה לֶחֶם
  english_pob_choice: ten loaves
  chosen_spanish: diez panes
  alternatives_spanish:
  - diez hogazas
  - diez piezas de pan
  lexicon: HALOT
  rationale: El hebreo usa לֶחֶם en singular colectivo; en español, 'panes' expresa mejor la cantidad contable requerida por el contexto. 'Panes' conserva la sobriedad y evita sobreespecificar 'hogazas'.
- source_word: וְנִקֻּדִים
  english_pob_choice: cakes
  chosen_spanish: tortas
  alternatives_spanish:
  - bizcochos
  - galletas
  - tortas horneadas
  lexicon: HALOT
  rationale: El término designa un producto horneado pequeño cuya forma exacta es incierta. 'Tortas' comunica la idea de alimento horneado sin añadir una identificación demasiado precisa; se evita 'galletas' por posible connotación moderna demasiado estrecha.
- source_word: וּבַקְבֻּק דְּבַשׁ
  english_pob_choice: a jar of honey
  chosen_spanish: un frasco de miel
  alternatives_spanish:
  - un cántaro de miel
  - una vasija de miel
  - una botella de miel
  lexicon: HALOT
  rationale: בַקְבֻּק es un recipiente portátil pequeño; 'frasco' es general, claro y suficientemente neutro en español. 'Miel' traduce דְבַשׁ de forma directa.
- source_word: וּבָאת אֵלָיו
  english_pob_choice: and go to him
  chosen_spanish: y ve a él
  alternatives_spanish:
  - y acércate a él
  - y ve hasta él
  lexicon: HALOT
  rationale: Se conserva el movimiento hacia la persona indicada sin forzar un giro más interpretativo. 'Ve a él' es breve y fiel; en español la preposición 'a' ya marca el destino.
- source_word: הוּא יַגִּיד לָךְ
  english_pob_choice: He will tell you
  chosen_spanish: Él te dirá
  alternatives_spanish:
  - Él te hará saber
  - Él te declarará
  lexicon: HALOT
  rationale: '''Decir'' es la equivalencia natural de נגד en este contexto predictivo. El pronombre explícito puede sonar enfático en español, pero ayuda a seguir el hebreo sin ambigüedad.'
- source_word: מַה יִּהְיֶה
  english_pob_choice: what will happen
  chosen_spanish: lo que le sucederá
  alternatives_spanish:
  - lo que será
  - lo que le pasará
  lexicon: HALOT
  rationale: Se conserva el sentido futuro de la condición del muchacho con una formulación idiomática en español. 'Sucederá' transmite el valor prospectivo sin endurecerlo en un calco.
- source_word: לַנָּעַר
  english_pob_choice: to the boy
  chosen_spanish: al muchacho
  alternatives_spanish:
  - al niño
  - al joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar niño o joven; aquí, por el contexto narrativo, 'muchacho' mantiene la amplitud semántica sin fijarlo demasiado en una edad específica.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo masorético y toma como guía la decisión inglesa revisada de mantener el sintagma breve (sin añadir equivalentes innecesarios como 'de pan' o un indefinido antes de 'cakes'). Se preserva la incertidumbre léxica de נִקֻּדִים mediante una nota alternativa en español, y se refleja la ambigüedad de מַה יִּהְיֶה con una nota de lectura alternativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma estándar cuando aparezca el Nombre divino; este versículo no lo contiene.
  - '''Muchacho'' conserva mejor el rango de נַעַר que ''niño'' o ''joven'' en este contexto.'
  - Se evita añadir 'de pan' después de 'panes' porque el hebreo ya expresa el sustantivo básico y la revisión inglesa confirmó la concisión.
  - Se mantiene un español moderno y digno, sin recurrir a formas arcaizantes innecesarias.
