translation:
  language: es
  text: El vino es como la vida para un hombre, si lo bebes con moderación. ¿Qué es la vida para quien queda disminuido por el vino[a]? Pues también él fue creado para la alegría humana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «¿Qué es la vida para quien carece de vino?». La frase griega es breve, y el dativo con «vino» puede entenderse de otra manera; el texto principal sigue el sentido de una persona disminuida por el vino, es decir, dañada por él.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἴσον
  english_pob_choice: is like
  chosen_spanish: es como
  alternatives_spanish:
  - es igual a
  - es lo mismo que
  lexicon: LSJ
  rationale: ἴσον expresa equivalencia o comparabilidad. En español, «es como» conserva esa relación comparativa con naturalidad y sin endurecer el enunciado.
- source_word: ζωῆς
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vivir
  - la existencia
  lexicon: LSJ
  rationale: 'El genitivo plantea comparación: el vino se presenta en relación con la vida. «La vida» es la opción más clara y fiel en español.'
- source_word: ἀνθρώπῳ
  english_pob_choice: to a man
  chosen_spanish: para un hombre
  alternatives_spanish:
  - para una persona
  - para un ser humano
  lexicon: LSJ
  rationale: El dativo es genérico. «Un hombre» mantiene el singular representativo masculino que aparece en el griego, sin forzar una abstracción impersonal.
- source_word: ἐὰν πίνῃς
  english_pob_choice: if you drink
  chosen_spanish: si lo bebes
  alternatives_spanish:
  - si bebes de él
  - si tú lo bebes
  lexicon: LSJ
  rationale: El giro gnómico en segunda persona singular se expresa de forma natural en español con «si lo bebes»; conserva el tono proverbial y directo.
- source_word: μέτρῳ αὐτοῦ
  english_pob_choice: in due measure
  chosen_spanish: con moderación
  alternatives_spanish:
  - en su medida
  - en justa medida
  lexicon: LSJ
  rationale: La frase remite a medida/porcionamiento. «Con moderación» comunica la idea en español actual sin perder el mandato implícito de mesura.
- source_word: τίς ζωὴ
  english_pob_choice: What is life
  chosen_spanish: ¿Qué es la vida?
  alternatives_spanish:
  - ¿Qué vida hay?
  - ¿Qué clase de vida es?
  lexicon: LSJ
  rationale: La pregunta retórica es breve y compacta; la forma directa «¿Qué es la vida?» conserva su fuerza.
- source_word: ἐλασσουμένῳ
  english_pob_choice: to one diminished
  chosen_spanish: quien es disminuido
  alternatives_spanish:
  - quien es menguado
  - quien es perjudicado
  lexicon: LSJ
  rationale: El participio implica ser rebajado o disminuido. «Disminuido» preserva la imagen sin fijar excesivamente el mecanismo del daño.
- source_word: οἴνῳ
  english_pob_choice: by wine
  chosen_spanish: por el vino
  alternatives_spanish:
  - con el vino
  - a causa del vino
  lexicon: LSJ
  rationale: El dativo permite más de una relación. Dado el contexto de la moderación, «por el vino» expresa bien el daño causado por el exceso; la ambigüedad se conserva en nota.
- source_word: ἔκτισται
  english_pob_choice: was created
  chosen_spanish: fue creado
  alternatives_spanish:
  - ha sido creado
  - fue hecho
  lexicon: LSJ
  rationale: El perfecto/pasivo subraya estado de criatura con propósito. «Fue creado» es natural en español y mantiene esa idea.
- source_word: εἰς εὐφροσύνην
  english_pob_choice: for human gladness
  chosen_spanish: para la alegría humana
  alternatives_spanish:
  - para la dicha humana
  - para el regocijo humano
  lexicon: LSJ
  rationale: εὐφροσύνη denota alegría, regocijo o buen ánimo. «Alegría humana» reproduce bien el sentido general y la amplitud del término.
- source_word: ἀνθρώποις
  english_pob_choice: human
  chosen_spanish: humana
  alternatives_spanish:
  - de las personas
  - para la gente
  lexicon: LSJ
  rationale: El plural refiere a seres humanos en general. «Humana» mantiene el valor genérico de forma natural en la frase final.
theological_decisions:
- issue: Bondad creada del vino con límite de medida
  english_pob_reading: For it too was created for human gladness
  chosen_spanish_reading: Pues también él fue creado para la alegría humana
  alternative_spanish_readings:
  - Porque también él fue creado para la alegría humana
  - Pues también fue creado para el gozo humano
  rationale: La cláusula final afirma un propósito creador positivo, pero el contexto inmediato lo limita por la exigencia de moderación. «Pues también él» refleja el valor aditivo de καί y preserva el equilibrio entre bondad creada y uso mesurado.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Posible lectura alternativa de οἴνῳ
  english_pob_reading: The main text understands the sense as a person diminished by wine, that is, harmed by it.
  chosen_spanish_reading: ¿Qué es la vida para quien es disminuido por el vino?
  alternative_spanish_readings:
  - ¿Qué es la vida para quien carece de vino?
  - ¿Qué vida tiene quien se ve reducido por el vino?
  rationale: 'El griego es breve y permite una lectura alternativa: uno perjudicado por el vino, o uno carente de vino. La traducción principal sigue la lectura del audito POB, pero se conserva la ambigüedad con una nota.'
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión inglesa más reciente: el ajuste de «in due measure» y la adición de «For» en la cláusula final. En español, esto se refleja con «con moderación» y con «Pues también él», manteniendo la relación aditiva de καί sin sobretraducirla. También se consideró la nota inglesa sobre la ambigüedad de οἴνῳ para conservarla en el aparato de notas.'
  spanish_consistency_notes:
  - Se mantiene «vino» para οἶνος, «vida» para ζωῆς, y «alegría» para εὐφροσύνη, conforme al registro bíblico claro y contemporáneo.
  - Se usa «Dios/Yahvé» solo cuando corresponde; este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» y no hay terminología cristológica en el pasaje.
  - La nota principal preserva la ambigüedad textual sin forzar una sola solución interpretativa.
