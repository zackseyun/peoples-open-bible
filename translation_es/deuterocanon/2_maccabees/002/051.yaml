translation:
  language: es
  text: Porque, viendo[a] el torrente de números y la dificultad para los que desean adentrarse[b] en los relatos de la historia, debido a la abundancia de material.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «considerando»; el participio griego presenta la acción como base de la explicación.
    reason: lexical_alternative
  - marker: b
    text: O «entrar en»; el verbo raro puede sugerir también involucrarse en o abrirse paso por los relatos históricos.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνορῶντες
  english_pob_choice: seeing
  chosen_spanish: viendo
  alternatives_spanish:
  - considerando
  - observando
  - tomando en cuenta
  lexicon: LSJ
  rationale: El participio introduce la base causal de la declaración. «Viendo» conserva la relación lógica y suena natural en español sin añadir interpretación.
- source_word: χῦμα
  english_pob_choice: flood
  chosen_spanish: inundación
  alternatives_spanish:
  - masa
  - torrente
  - oleaje
  lexicon: LSJ
  rationale: El término es metafórico y expresa una cantidad abrumadora. «Inundación» preserva la imagen vívida mejor que una traducción plana como «masa».
- source_word: ἀριθμῶν
  english_pob_choice: numbers
  chosen_spanish: números
  alternatives_spanish:
  - cifras
  - datos
  - detalles
  lexicon: LSJ
  rationale: La palabra griega dice literalmente «números». En español, «números» mantiene la forma directa del original y la idea de multiplicidad.
- source_word: οὖσαν δυσχέρειαν
  english_pob_choice: the difficulty for
  chosen_spanish: la dificultad para
  alternatives_spanish:
  - la dificultad que enfrenta
  - la dificultad existente para
  - la pena para
  lexicon: LSJ
  rationale: La construcción expresa una dificultad presente y real. «Para» refleja bien el destinatario de la dificultad y sigue la revisión inglesa más cercana al griego.
- source_word: τοῖς θέλουσιν εἰσκυκλεῖσθαι
  english_pob_choice: those who wish to enter into
  chosen_spanish: para los que desean entrar
  alternatives_spanish:
  - para los que quieren involucrarse en
  - para los que desean internarse en
  - para los que desean ser introducidos en
  lexicon: LSJ
  rationale: El verbo raro sugiere entrar en o involucrarse con algo. «Entrar» mantiene la metáfora sin exagerarla y funciona bien con el complemento siguiente.
- source_word: τοῖς τῆς ἱστορίας διηγήμασιν
  english_pob_choice: the narratives of the history
  chosen_spanish: en los relatos de la historia
  alternatives_spanish:
  - en las narraciones de la historia
  - en los relatos históricos
  - en los relatos de la historia
  lexicon: LSJ
  rationale: La expresión señala los relatos que constituyen la historia. «Relatos de la historia» conserva la relación genitiva y resulta claro en español.
- source_word: διὰ τὸ πλῆθος τῆς ὕλης
  english_pob_choice: because of the abundance of material
  chosen_spanish: debido a la abundancia de material
  alternatives_spanish:
  - a causa de la abundancia de material
  - por la gran cantidad de materia
  - por la abundancia de material
  lexicon: LSJ
  rationale: ὕλη aquí designa el contenido o materia de la obra, no madera literal. «Abundancia de material» es la opción más transparente y fiel al sentido.
translation_notes:
  revision_awareness: Se siguió el contexto auditado de la revisión inglesa, que prefirió reflejar más directamente la construcción griega de τοῖς θέλουσιν con «for» en lugar de una paráfrasis más interpretativa. En español se adoptó «para los que desean» para conservar esa relación sin perder fluidez.
  spanish_consistency_notes:
  - Se mantuvo la metáfora intensiva de χῦμα con un término igualmente imaginativo y comprensible en español.
  - «Relatos de la historia» preserva la estructura del genitivo sin convertirla en una paráfrasis más libre.
  - No se introdujeron términos doctrinales; el verso es de carácter metadiscursivo y metodológico.
