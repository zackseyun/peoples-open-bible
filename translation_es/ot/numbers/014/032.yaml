review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: contraste enfático con אַתֶּם, imagen concreta de פגריכם, verbo simple יִפְּלוּ y deíctico הַזֶּה. Sin embargo, el inglés auditado eligió ''wilderness'' para מִדְבָּר, y en español ''desierto'' puede estrechar innecesariamente el referente. ''Este desierto'' es posible en tradición bíblica, pero aquí conviene preservar mejor la amplitud semántica con ''este desierto'' solo si el proyecto lo prefiere sistemáticamente; sin esa evidencia, ''este desierto'' queda algo menos alineado con la rationale documentada que ''este desierto/esta región desolada/este desierto''—la mejor reparación mínima es mantener la frase natural pero ajustar la nota léxica. También la nota alternativa ''sus despojos'' no es tan fiel como las alternativas inglesas ''corpses/carcasses''.'
  spanish_quality_summary: 'El español es claro, natural y digno: ''Pero en cuanto a ustedes, sus cadáveres caerán…'' suena bien y comunica el énfasis. La principal mejora es lexical: en la nota conviene evitar ''despojos'' como alternativa principal y acercarse más a ''cuerpos sin vida'' o ''cadáveres/cuerpos muertos''.'
  glossary_alignment: No hay términos de glosario mayor implicados (Yahvé, Mesías, etc.). 'Cadáveres' alinea bien con la decisión POB para פגריכם. El punto menor es que la rationale inglesa privilegia 'wilderness'; por eso 'desierto' merece una revisión ligera hacia 'desierto' con nota más precisa o, mejor, 'este desierto' conservado si se prioriza tradición bíblica. No se requiere adjudicación especial.
  issues:
  - severity: medium
    issue: La nota léxica usa 'sus despojos' como alternativa para פגריכם.
    rationale: '''Despojos'' en español puede sonar menos preciso o desplazarse hacia ''restos'' o incluso bienes despojados; no refleja tan directamente ''dead bodies/corpses'' como las alternativas auditadas.'
  - severity: low
    issue: La elección 'desierto' para מִדְבָּר no refleja tan explícitamente la rationale inglesa a favor de 'wilderness'.
    rationale: No es una traducción incorrecta en contexto bíblico, pero sí algo más estrecha semánticamente. Aun así, como reparación mínima, puede mantenerse el texto principal por naturalidad y tradición, afinando la evaluación y la nota.
  revised_spanish_text: Pero en cuanto a ustedes, sus cadáveres[a] caerán en este desierto.
  revised_footnotes:
  - marker: a
    text: Heb. פִגְרֵיכֶם; también puede traducirse 'sus cuerpos sin vida' o 'sus cuerpos muertos'.
    reason: lexical_alternative
  revision_rationale: El texto principal es fiel y natural, así que solo requiere una reparación menor en la nota léxica para alinearla mejor con las alternativas documentadas en inglés y evitar 'despojos', que en español puede desviar el sentido.
