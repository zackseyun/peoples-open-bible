translation:
  language: es
  text: Que escuches en el cielo, el lugar de tu morada, y hagas conforme a todo lo que el extranjero clame a ti por[a], para que todos los pueblos de la tierra conozcan tu nombre, para temerte como lo hace tu pueblo Israel, y para saber que tu nombre es llamado sobre esta casa[b] que he edificado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te invoque por» o «te pida». El hebreo יִקְרָא אֵלֶיךָ puede expresar llamar, clamar o invocar a Dios en súplica.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tu nombre es llamado sobre esta casa», un modismo que indica que la casa te pertenece o lleva tu nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּשְׁמַע
  english_pob_choice: may you hear
  chosen_spanish: Que escuches
  alternatives_spanish:
  - Que oigas
  - Escucha
  lexicon: HALOT
  rationale: En una oración, el imperfecto hebreo funciona como petición volitiva; en español, el subjuntivo exhortativo expresa bien ese deseo dirigido a Dios sin volverlo imperativo brusco.
- source_word: הַשָּׁמַיִם
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - desde el cielo
  - en los cielos
  lexicon: HALOT
  rationale: La expresión apunta al ámbito de la morada divina. «En el cielo» es natural en español y conserva la referencia al lugar de la presencia de Yahvé.
- source_word: מְכ֣וֹן שִׁבְתֶּ֔ךָ
  english_pob_choice: the place where you dwell
  chosen_spanish: el lugar de tu morada
  alternatives_spanish:
  - el lugar donde habitas
  - tu lugar de morada
  lexicon: HALOT
  rationale: מָכוֹן señala un lugar fijo o establecido; שֶׁבֶת/שִׁבְתְּךָ es «morada/asiento». «El lugar de tu morada» conserva ambas ideas con español digno y claro.
- source_word: וְעָשִׂיתָ
  english_pob_choice: and do
  chosen_spanish: y hagas
  alternatives_spanish:
  - y hagas actuar
  - y obres
  lexicon: HALOT
  rationale: En este contexto de súplica, la forma se vuelve desiderativa en español; «hagas» mantiene la amplitud del verbo hebreo sin estrecharlo innecesariamente.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - como todo lo que
  lexicon: HALOT
  rationale: La fórmula totalizadora se expresa bien con «conforme a todo lo que», que es formal y fiel al alcance del hebreo.
- source_word: יִקְרָא אֵלֶיךָ
  english_pob_choice: calls to you for
  chosen_spanish: te pida
  alternatives_spanish:
  - clame a ti por
  - te invoque por
  lexicon: HALOT
  rationale: קרא אל en contexto de oración implica pedir o clamar. Aquí «te pida» resume la acción petitoria de manera natural en español, sin perder la relación dirigida a Dios.
- source_word: הַנָּכְרִי
  english_pob_choice: the foreigner
  chosen_spanish: el extranjero
  alternatives_spanish:
  - el forastero
  - el de nación extranjera
  lexicon: HALOT
  rationale: נכרי designa al que pertenece a otro pueblo; «extranjero» es el equivalente más claro y neutral en español contemporáneo.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de manera que
  lexicon: HALOT
  rationale: Introduce propósito; «para que» es la forma española más natural y directa.
- source_word: כָּל עַמֵּי הָאָרֶץ
  english_pob_choice: all the peoples of the earth
  chosen_spanish: todos los pueblos de la tierra
  alternatives_spanish:
  - todas las naciones de la tierra
  - todos los pueblos del mundo
  lexicon: HALOT
  rationale: עַמִּים enfatiza pueblos/etnias; «pueblos de la tierra» conserva el universalismo del texto sin sustituirlo por un término menos preciso.
- source_word: אֶת שְׁמֶךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu renombre
  lexicon: HALOT
  rationale: Se conserva «nombre» porque en la Biblia implica identidad, reputación y presencia; no conviene resolverlo solo como fama.
- source_word: לְיִרְאָה אֹתְךָ
  english_pob_choice: to fear you
  chosen_spanish: para temerte
  alternatives_spanish:
  - para reverenciarte
  - para tenerte temor
  lexicon: HALOT
  rationale: Se mantiene el verbo «temer» para preservar la tensión bíblica de reverencia y temor santo. El infinitivo español coordinado con «para que» funciona bien en la finalidad del versículo.
- source_word: כְּעַמְּךָ יִשְׂרָאֵל
  english_pob_choice: as your people Israel do
  chosen_spanish: como tu pueblo Israel
  alternatives_spanish:
  - como tu pueblo Israel lo hace
  - como tu pueblo Israel
  lexicon: HALOT
  rationale: El hebreo compara el temor de las naciones con el de Israel. En español, la comparación queda clara sin añadir un verbo innecesario en la frase principal.
- source_word: וְלָדַעַת
  english_pob_choice: and to know
  chosen_spanish: y para saber
  alternatives_spanish:
  - y conocer
  - y para conocer
  lexicon: HALOT
  rationale: La segunda finalidad se expresa bien con «y para saber», conservando el paralelismo con la cláusula anterior.
- source_word: כִּי שִׁמְךָ נִקְרָא עַל
  english_pob_choice: that your name is called on
  chosen_spanish: que tu nombre es llamado sobre
  alternatives_spanish:
  - que tu nombre es invocado sobre
  - que esta casa lleva tu nombre
  lexicon: HALOT
  rationale: Se preserva el modismo hebreo de manera transparente. «Es llamado sobre» conserva la imagen de dedicación/posesión, aunque suene menos idiomático que una paráfrasis.
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - esta casa santa
  lexicon: HALOT
  rationale: «Casa» reproduce el sustantivo hebreo בַּיִת y mantiene el lenguaje cultual del texto.
- source_word: אֲשֶׁר בָּנִיתִי
  english_pob_choice: that I have built
  chosen_spanish: que he edificado
  alternatives_spanish:
  - que he construido
  - que construí
  lexicon: HALOT
  rationale: «Edificado» conserva un tono bíblico digno y corresponde bien al acto de construir un santuario o casa sagrada.
theological_decisions:
- issue: El modismo שִׁמְךָ נִקְרָא עַל הַבַּיִת הַזֶּה
  english_pob_reading: your name is called on this house
  chosen_spanish_reading: tu nombre es llamado sobre esta casa
  alternative_spanish_readings:
  - esta casa lleva tu nombre
  - tu nombre es invocado sobre esta casa
  rationale: Se mantiene el modismo para no borrar la idea de pertenencia/dedicación divina asociada al templo. La forma española conserva la tensión entre literalidad y sentido teológico, tal como hace la POB en inglés.
  doctrine_reference: 1 Reyes 8:43; dedicación del templo; propiedad y presencia de Yahvé
- issue: El valor de ירא en el propósito del versículo
  english_pob_reading: to fear you
  chosen_spanish_reading: para temerte
  alternative_spanish_readings:
  - para reverenciarte
  - para tenerte temor
  rationale: «Temer» preserva el peso bíblico del temor reverente ante Dios, sin diluirlo en una noción meramente respetuosa. Eso permite ver la continuidad entre Israel y las naciones en la respuesta debida a Yahvé.
  doctrine_reference: Proverbios 1:7; Deuteronomio 6:13; reverencia y temor santo
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó «called upon this house» a «called on this house» por naturalidad, manteniendo el mismo modismo subyacente. En español se optó por conservar la imagen idiomática («es llamado sobre esta casa») para reflejar con transparencia el hebreo y el rastreo auditado de la POB.
  spanish_consistency_notes:
  - Se usó «Yahvé» en el texto fuente de referencia, pero este versículo no contiene el tetragrámaton explícito en la forma requerida dentro de la línea española; el contexto sigue siendo oración a Dios.
  - Se mantuvo «casa» y no «templo» para respetar el sustantivo hebreo בַּיִת y la decisión auditada de la POB.
  - Se preservó el tono de súplica con subjuntivo y finalidades encadenadas («para que», «para temerte», «y para saber»).
