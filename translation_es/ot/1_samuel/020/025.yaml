translation:
  language: es
  text: El rey se sentó en su asiento, como otras veces, junto al muro; y Jonatán se levantó, y Abner se sentó al lado de Saúl, pero el lugar de David[a] quedó vacío.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «faltaba el lugar de David», es decir, el puesto asignado a David en la comida no estaba ocupado.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey Saúl
  - el monarca
  lexicon: HALOT
  rationale: El hebreo usa el título definido y no el nombre propio; en español, "el rey" conserva esa forma discursiva. Aunque el contexto identifica a Saúl, no se explicita el nombre en el texto base.
- source_word: מוֹשָׁבוֹ
  english_pob_choice: his seat
  chosen_spanish: su asiento
  alternatives_spanish:
  - su lugar
  - su puesto
  lexicon: HALOT
  rationale: En el contexto de banquete, el término apunta al lugar donde uno se sienta. "Asiento" transmite bien la imagen concreta y es natural en español.
- source_word: כְּפַעַם בְּפַעַם
  english_pob_choice: as at other times
  chosen_spanish: como otras veces
  alternatives_spanish:
  - como antes
  - como en otras ocasiones
  lexicon: HALOT
  rationale: La expresión es idiomática y repetitiva; "como otras veces" conserva el sentido habitual sin volverla rígida.
- source_word: אֶל מוֹשַׁב הַקִּיר
  english_pob_choice: by the wall
  chosen_spanish: junto al muro
  alternatives_spanish:
  - junto a la pared
  - al lado del muro
  lexicon: HALOT
  rationale: La frase señala la ubicación del asiento respecto del muro. En español, "junto al muro" conserva la relación espacial y evita una construcción poco natural como "asiento del muro".
- source_word: וַיָּקָם
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: En narración española, "se levantó" expresa de forma clara y digna la acción de קום.
- source_word: אַבְנֵר ... מִצַּד שָׁאוּל
  english_pob_choice: Abner sat beside Saul
  chosen_spanish: Abner se sentó al lado de Saúl
  alternatives_spanish:
  - Abner se sentó junto a Saúl
  - Abner se sentó a la derecha/izquierda de Saúl
  lexicon: HALOT
  rationale: מִצַּד indica estar al lado. "Al lado de" mantiene la relación espacial sin añadir orientación que el hebreo no da.
- source_word: וַיִּפָּקֵד
  english_pob_choice: was empty
  chosen_spanish: quedó vacío
  alternatives_spanish:
  - estaba vacío
  - faltó su ocupante
  - quedó desocupado
  lexicon: HALOT
  rationale: El valor idiomático aquí es que el lugar esperado no fue ocupado. "Quedó vacío" preserva esa observación narrativa y suena natural en español.
- source_word: מְקוֹם דָּוִד
  english_pob_choice: David’s place
  chosen_spanish: el lugar de David
  alternatives_spanish:
  - el asiento de David
  - el puesto de David
  lexicon: HALOT
  rationale: מָקוֹם es más amplio que "asiento" y el hebreo habla del lugar asignado a David. "El lugar de David" mantiene la amplitud del término y la referencia de pertenencia.
translation_notes:
  revision_awareness: 'Se siguió el criterio del último pase de revisión en inglés: la ubicación se vierte de manera natural como "junto al muro", evitando una calca poco idiomática. También se preservó la alternativa lexical sobre el valor de "el lugar de David" / "quedó vacío", porque el hebreo permite esa ambigüedad entre lugar y ocupante ausente.'
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma del proyecto solo cuando aparezca el Tetragrámaton; en este versículo no aparece, por lo que no se aplica.
  - Se usó "Saúl" y no "el ungido" ni otros títulos, porque el hebreo nombra al personaje directamente en la segunda cola.
  - '"Lugar" se reservó para מְקוֹם; "asiento" para מוֹשָׁב, evitando confundir un sitio de mesa con el espacio más general.'
  - El tono busca ser bíblico y claro en español latinoamericano, sin arcaísmos innecesarios.
