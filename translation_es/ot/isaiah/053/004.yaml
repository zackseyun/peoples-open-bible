translation:
  language: es
  text: Ciertamente él ha llevado nuestras enfermedades[a] y ha cargado nuestros dolores; sin embargo, nosotros lo tuvimos por herido, golpeado por Dios[b] y afligido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nuestras dolencias» y «nuestros sufrimientos». El hebreo, más literalmente, se refiere a enfermedades y dolores.'
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «azotado por Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָכֵן
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Seguro
  - De veras
  lexicon: HALOT
  rationale: Marca una afirmación enfática o correctiva. «Ciertamente» conserva el peso de la sorpresa/rectificación sin sonar arcaico en español.
- source_word: חֳלָיֵנוּ
  english_pob_choice: our sicknesses
  chosen_spanish: nuestras enfermedades
  alternatives_spanish:
  - nuestras dolencias
  - nuestras aflicciones
  lexicon: HALOT
  rationale: El sustantivo apunta más directamente a enfermedad o dolencia física que a tristeza emocional. «Enfermedades» refleja el sentido más concreto y mantiene la relación con «dolores».
- source_word: נָשָׂא
  english_pob_choice: has borne
  chosen_spanish: ha llevado
  alternatives_spanish:
  - ha cargado
  - ha soportado
  lexicon: HALOT
  rationale: Aquí el verbo expresa tomar sobre sí y llevar una carga. «Ha llevado» suena natural en español y conserva la idea de portar un peso ajeno.
- source_word: וּמַכְאֹבֵינוּ
  english_pob_choice: our pains
  chosen_spanish: nuestros dolores
  alternatives_spanish:
  - nuestros sufrimientos
  - nuestras penas
  lexicon: HALOT
  rationale: El término se refiere a dolor, a menudo físico. «Dolores» es la correspondencia más directa y mantiene el paralelismo con «enfermedades».
- source_word: סְבָלָם
  english_pob_choice: carried
  chosen_spanish: cargado
  alternatives_spanish:
  - llevado
  - soportado
  lexicon: HALOT
  rationale: Este verbo subraya portar una carga. «Cargado» distingue ligeramente este segundo verbo del primero y reproduce el énfasis del hebreo en la carga asumida.
- source_word: וַאֲנַחְנוּ
  english_pob_choice: yet we
  chosen_spanish: sin embargo, nosotros
  alternatives_spanish:
  - pero nosotros
  - y nosotros
  lexicon: HALOT
  rationale: La conjunción introduce contraste con lo que él realmente hizo. «Sin embargo» expresa bien el giro adversativo en español.
- source_word: חֲשַׁבְנֻהוּ
  english_pob_choice: considered him
  chosen_spanish: lo tuvimos por
  alternatives_spanish:
  - lo consideramos
  - lo estimamos
  lexicon: HALOT
  rationale: El verbo significa contar, reputar o considerar. «Lo tuvimos por» preserva el matiz de juicio evaluativo y suena natural en español bíblico sin volverse arcaizante en exceso.
- source_word: נָגוּעַ
  english_pob_choice: stricken
  chosen_spanish: herido
  alternatives_spanish:
  - golpeado
  - afligido
  lexicon: HALOT
  rationale: El participio indica alguien alcanzado por un golpe, plaga o herida severa. «Herido» comunica ese estado sin perder la gravedad del juicio percibido.
- source_word: מֻכֵּה אֱלֹהִים
  english_pob_choice: struck by God
  chosen_spanish: golpeado por Dios
  alternatives_spanish:
  - herido por Dios
  - azotado por Dios
  lexicon: HALOT
  rationale: La frase atribuye explícitamente la acción a Dios. «Golpeado por Dios» preserva la agencia divina de manera directa y evita suavizar el verbo de golpear/alcanzar.
- source_word: וּמְעֻנֶּה
  english_pob_choice: and afflicted
  chosen_spanish: y afligido
  alternatives_spanish:
  - y humillado
  - y oprimido
  lexicon: HALOT
  rationale: El participio denota sufrimiento impuesto o aflicción. «Afligido» encaja con el contexto inmediato y con la percepción equivocada del pueblo sobre el siervo.
theological_decisions:
- issue: Si presentar los sustantivos hebreos como sufrimiento emocional general o como lenguaje físico de enfermedad/dolor
  english_pob_reading: physical illness language in the main text ('sicknesses' / 'pains')
  chosen_spanish_reading: lenguaje físico de enfermedades y dolores
  alternative_spanish_readings:
  - lenguaje generalizado de tristezas y penas
  - aflicciones y sufrimientos
  rationale: El hebreo favorece sentidos concretos de enfermedad y dolor. Mantener ese campo semántico evita diluir la tensión del texto y sigue la prioridad del original sobre la tradición interpretativa.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Cómo expresar la agencia divina en מֻכֵּה אֱלֹהִים
  english_pob_reading: 'explicit divine agency: ''struck by God'''
  chosen_spanish_reading: 'agencia divina explícita: ''golpeado por Dios'''
  alternative_spanish_readings:
  - herido por Dios
  - azotado por Dios
  - castigado por Dios
  rationale: El hebreo atribuye el golpe a Dios de forma directa. La traducción no debe atenuar ni moralizar esa afirmación; «golpeado por Dios» conserva la crudeza y la claridad de la lectura de base.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail, que ajustó la frase inglesa de 'struck down by God' a 'struck by God' por mayor precisión léxica. En español se reflejó esa precisión con «golpeado por Dios», sin añadir la idea de 'abajo' ni suavizar la agencia divina.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que exija esa forma.
  - Se prefirió «enfermedades/dolores» para conservar la literalidad semántica del hebreo y la tensión entre interpretación física y recepción tradicional.
  - «Lo tuvimos por» reproduce mejor el juicio evaluativo de חֲשַׁבְנֻהוּ que un simple «lo consideramos» en español bíblico.
  - Las notas a y b preservan las alternativas documentadas por el audit trail inglés sin introducir nuevas opciones no sustentadas.
