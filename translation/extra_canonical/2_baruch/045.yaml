translation:
  text: '1 …that belong to corruption and its ways[a], ways that cannot be searched out. But if you endure and stand in his fear and do not go astray from his law, the times will be changed in their season for good, and you will see the consolation of Zion.


    2 For what exists now is nothing; but what is to come will be exceedingly great.


    3 For everything corruptible passes away and goes as though it had not been, and the time that has been is now forgotten; nor after this is it sought in remembrance.


    4 For what has been passed over for corruption is what has been, and what is corrupted falls in remembrance and is forgotten. But what is to come is what is sought; what has passed from the hand is no longer reckoned.


    5 For when the time that does not pass away comes and its season arrives, it makes equal the work of its makers and examines its sins. Those who are held by it, who belong to it, do not add torment to destruction.


    6 And if there are any things that are appointed, it is not withheld; and for those who live in it there is no leading to destruction.


    7 And those also who desire to be seen should beware of the time spoken of, and should pass beyond the burden of the waking time.


    8 But those who turned anguish and falsehood into gain, and lost the foundation of hope, and were sought out in emptiness, and did not have mercy, but kept the way of correction—


    9 the hidden anguish sought by the people to come is withheld; but the visitation of that matter, by which many were justified[b][c][d][e][f], …'
  philosophy: optimal-equivalence
