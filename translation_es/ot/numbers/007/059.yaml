translation:
  language: es
  text: 'Y para el sacrificio de paz[a]: dos reses[b], cinco carneros, cinco machos cabríos y cinco corderos de un año. Esta fue[c] la ofrenda de Gamliel hijo de Pedahzur.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «ofrenda de paz», «ofrenda de bienestar» o «ofrenda de comunión».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «dos reses»; tradicionalmente, «dos bueyes».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «Esta es la ofrenda de»; el pasado en español refleja la enumeración narrativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/לְ/זֶבַח
  english_pob_choice: And for the sacrifice of
  chosen_spanish: Y para el sacrificio de
  alternatives_spanish:
  - Y para la ofrenda de
  - Y como sacrificio de
  lexicon: HALOT
  rationale: La preposición y la conjunción introducen el último elemento de la lista de ofrendas; en español, «y para» conserva esa continuidad. «Sacrificio» refleja el sentido básico de זֶבַח y suena natural en este contexto ritual.
- source_word: הַ/שְּׁלָמִים
  english_pob_choice: peace offerings
  chosen_spanish: los sacrificios de paz
  alternatives_spanish:
  - las ofrendas de paz
  - las ofrendas de bienestar
  - las ofrendas de comunión
  lexicon: HALOT
  rationale: 'Conservo la fórmula tradicional «sacrificios de paz» para mantener reconocimiento bíblico en español. Sin embargo, no se borra la idea de bienestar/comunión: esa ambigüedad se documenta en la nota, como hace la POB inglesa con alternativas cercanas.'
- source_word: בָּקָר שְׁנַיִם
  english_pob_choice: two cattle
  chosen_spanish: dos reses
  alternatives_spanish:
  - dos cabezas de ganado
  - dos toros
  - dos bueyes
  lexicon: HALOT
  rationale: בָּקָר es un colectivo para ganado bovino; «reses» conserva ese valor genérico mejor que «bueyes», que sería más específico de animales de labor. «Dos reses» es claro en español y evita restringir indebidamente el hebreo.
- source_word: אֵילִם חֲמִשָּׁה
  english_pob_choice: five rams
  chosen_spanish: cinco carneros
  alternatives_spanish:
  - cinco machos de oveja
  lexicon: HALOT
  rationale: אֵילִם denota carneros; «carneros» es la equivalencia directa y natural en español bíblico.
- source_word: עַתֻּדִים חֲמִשָּׁה
  english_pob_choice: five male goats
  chosen_spanish: cinco machos cabríos
  alternatives_spanish:
  - cinco cabríos
  - cinco chivos
  lexicon: HALOT
  rationale: עַתּוּדִים refiere a machos cabríos; «machos cabríos» preserva con precisión el rasgo sexual del animal sacrificial y evita la ambigüedad de «cabritos».
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה חֲמִשָּׁה
  english_pob_choice: five one-year-old lambs
  chosen_spanish: cinco corderos de un año
  alternatives_spanish:
  - cinco corderos de un año de edad
  - cinco corderos añales
  lexicon: HALOT
  rationale: La construcción hebrea literalmente expresa animales «hijos de un año». «Corderos de un año» comunica fielmente la restricción de edad sin forzar una calca poco natural.
- source_word: זֶה קָרְבַּן
  english_pob_choice: This was the offering of
  chosen_spanish: Esta fue la ofrenda de
  alternatives_spanish:
  - Ésta fue la ofrenda de
  - Esta es la ofrenda de
  lexicon: HALOT
  rationale: El hebreo usa una cláusula nominal; el pasado español refleja con naturalidad el cierre narrativo de la enumeración, como en la POB inglesa, sin alterar el contenido.
- source_word: גַּמְלִיאֵל
  english_pob_choice: Gamliel
  chosen_spanish: Gamliel
  alternatives_spanish:
  - Gamaliel
  lexicon: transliteration
  rationale: Mantengo la transliteración más cercana a la forma hebrea dada en el texto fuente, en línea con la práctica del proyecto para nombres propios.
- source_word: בֶּן פְּדָה צוּר
  english_pob_choice: son of Pedahzur
  chosen_spanish: hijo de Pedahzur
  alternatives_spanish:
  - hijo de Peda Zur
  - hijo de Pedatzur
  lexicon: transliteration
  rationale: Sigo la segmentación del propio texto hebreo/morfológico, que presenta el nombre como פְּדָה צוּר. «Pedahzur» ofrece una transliteración compacta y reconocible sin introducir una traducción interpretativa.
theological_decisions:
- issue: Cómo renderizar הַשְּׁלָמִים en español sin borrar su rango semántico
  english_pob_reading: 'peace offerings, with note: ''fellowship offerings'' or ''offerings of well-being'''
  chosen_spanish_reading: sacrificios de paz, con nota de alternativas cercanas
  alternative_spanish_readings:
  - ofrendas de paz
  - ofrendas de bienestar
  - ofrendas de comunión
  rationale: La expresión tradicional es entendible y bíblicamente establecida en español. Aun así, la nota conserva las alternativas porque el término hebreo incluye dimensiones de paz, bienestar y comunión que no conviene reducir sin aviso.
  doctrine_reference: Terminología sacrificial del Pentateuco; cf. Levítico 3
- issue: Si בָּקָר debe especificarse como «bueyes» o mantenerse como bovinos genéricos
  english_pob_reading: 'two cattle, with note: traditionally, ''two oxen.'''
  chosen_spanish_reading: dos reses
  alternative_spanish_readings:
  - dos bueyes
  - dos cabezas de ganado
  rationale: El hebreo no obliga a una categoría de trabajo. «Reses» conserva la amplitud del término y evita introducir una tradición más específica que la señalada por el texto.
  doctrine_reference: Precisión léxica del inventario sacrificial
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés muestran alta concordancia y no requieren cambios sustanciales. Mantengo el cierre narrativo en pasado como decisión de equivalencia óptima, y conservo la terminología sacrificial tradicional junto con notas que resguardan las alternativas léxicas relevantes.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «ofrenda» para קָרְבָּן en la cláusula final, coherente con el uso del inventario ritual y con la POB inglesa.
  - Se prefirió «reses» para בָּקָר por su amplitud semántica; no se sustituyó por «bueyes» en el texto principal.
  - Los nombres propios se transliteran de forma estable sin traducirlos.
