id: 1KI.6.5
reference: 1 Kings 6:5
source:
  edition: WLC
  text: וַ/יִּבֶן֩ עַל קִ֨יר הַ/בַּ֤יִת יצוע סָבִ֔יב אֶת קִיר֤וֹת הַ/בַּ֨יִת֙ סָבִ֔יב לַֽ/הֵיכָ֖ל וְ/לַ/דְּבִ֑יר וַ/יַּ֥עַשׂ צְלָע֖וֹת סָבִֽיב־־׃
translation:
  text: He built against the wall of the house a structure all around[a], against the walls of the house all around, around both the nave and the inner sanctuary[c][b]; and he made side rooms all around.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “a surrounding annex” for the rare Hebrew word יצוע, referring to the structure built around the temple walls.
    reason: lexical_alternative
  - marker: b
    text: Hebrew הֵיכָל refers to the main hall of the temple, distinct from the inner sanctuary (דְּבִיר).
    reason: cultural_note
  - marker: c
    text: Or “Most Holy Place” for “inner sanctuary.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  chosen: He built
  alternatives:
  - And he built
  lexicon: HALOT
  rationale: Standard wayyiqtol narrative verb from בנה, rendered as simple past in natural English narrative.
- source_word: עַל קִיר הַבַּיִת
  chosen: against the wall of the house
  alternatives:
  - upon the wall of the house
  - along the wall of the house
  lexicon: HALOT
  rationale: עַל with a building context here indicates construction adjoining or against the wall, not literally on top of it.
- source_word: יצוע
  chosen: a structure of side chambers
  alternatives:
  - a platform
  - a surrounding annex
  - a story
  lexicon: HALOT
  rationale: The noun is rare and contextually refers to the surrounding side construction attached to the temple building. 'Structure of side chambers' captures the collective architectural sense without overcommitting to a technical reconstruction.
- source_word: סָבִיב
  chosen: all around / around
  alternatives:
  - surrounding
  - on every side
  lexicon: HALOT
  rationale: Repeated סָבִיב emphasizes the encircling arrangement of the side structure around the temple walls; rendered idiomatically in English while preserving repetition.
- source_word: אֶת קִירוֹת הַבַּיִת
  chosen: the walls of the house
  alternatives:
  - the house walls
  lexicon: HALOT
  rationale: Plural קִירוֹת is explicit and should be preserved as 'walls,' indicating the perimeter walls of the temple structure.
- source_word: לַהֵיכָל
  chosen: the nave
  alternatives:
  - the main hall
  - the temple hall
  lexicon: HALOT
  rationale: הֵיכָל here refers to the main room of the temple building, distinct from the inner sanctuary. 'Nave' is a concise architectural equivalent that preserves the distinction.
- source_word: וְלַדְּבִיר
  chosen: the inner sanctuary
  alternatives:
  - the inner room
  - the Most Holy Place
  lexicon: HALOT
  rationale: דְּבִיר denotes the inner shrine/inner sanctuary. 'Inner sanctuary' is clear and avoids importing later liturgical terminology too strongly, though 'Most Holy Place' is a familiar contextual equivalent.
- source_word: וַיַּעַשׂ צְלָעוֹת
  chosen: he made side rooms
  alternatives:
  - he made side chambers
  - he made ribs
  lexicon: HALOT
  rationale: צְלָעוֹת literally can denote 'sides' or 'ribs,' but in this architectural context it refers to side rooms/chambers attached to the temple.
