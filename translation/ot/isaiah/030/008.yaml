id: ISA.30.8
reference: Isaiah 30:8
source:
  edition: WLC
  text: עַתָּ֗ה בּ֣וֹא כָתְבָ֥/הּ עַל ל֛וּחַ אִתָּ֖/ם וְ/עַל סֵ֣פֶר חֻקָּ֑/הּ וּ/תְהִי֙ לְ/י֣וֹם אַחֲר֔וֹן לָ/עַ֖ד עַד עוֹלָֽם־־־׃
translation:
  text: Now come[a], write it before them on a tablet, and inscribe it in a scroll, that it may stand for a later day[b], as a witness forever and ever.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'for the latter day' or 'for the last day.'
    reason: alternative_reading
  - marker: b
    text: Or 'forever'; the Hebrew may also emphasize that the written record remains as enduring testimony.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַתָּה
  chosen: Now
  alternatives:
  - At this time
  lexicon: HALOT
  rationale: Temporal adverb introducing an immediate command. 'Now' is natural and direct in English.
- source_word: בּוֹא
  chosen: come
  alternatives:
  - go
  lexicon: HALOT
  rationale: 'Imperative singular of בוא. In prophetic discourse it commonly functions as an attention-getting summons: ''come.'''
- source_word: כָתְבָהּ
  chosen: write it
  alternatives:
  - write this
  - record it
  lexicon: HALOT
  rationale: The 3fs suffix refers to the message/oracle to be recorded. 'Write it' preserves the object without over-specifying.
- source_word: עַל לוּחַ
  chosen: on a tablet
  alternatives:
  - on a tablet board
  - on a plaque
  lexicon: HALOT
  rationale: לוּחַ denotes a writing tablet/board. 'Tablet' is the most idiomatic modern equivalent while retaining the physical writing surface.
- source_word: אִתָּם
  chosen: before them
  alternatives:
  - with them
  - in their presence
  lexicon: HALOT
  rationale: Though אֵת can mean 'with,' in this context with a public written witness the sense is best taken as 'in their presence' or 'before them.' 'Before them' is concise and idiomatic.
- source_word: וְעַל סֵפֶר
  chosen: and ... in a scroll
  alternatives:
  - and on a document
  - and in a book
  lexicon: HALOT
  rationale: סֵפֶר here refers to a written document, likely a scroll. 'Scroll' better fits the ancient medium than the anachronistic 'book.' The preposition is rendered idiomatically with 'in' for inscription within a document.
- source_word: חֻקָּהּ
  chosen: inscribe it
  alternatives:
  - engrave it
  - record it
  lexicon: HALOT
  rationale: From חקק, 'to inscribe/engrave.' Since the object is a scroll, 'inscribe it' preserves the formal, durable sense without implying literal stone engraving.
- source_word: וּתְהִי
  chosen: that it may stand
  alternatives:
  - and it shall be
  - that it may be
  lexicon: HALOT
  rationale: 'Jussive/result sense following the commands: the written record is intended to remain. ''May stand'' brings out enduring validity more clearly than a bare ''be.'''
- source_word: לְיוֹם אַחֲרוֹן
  chosen: for a later day
  alternatives:
  - for the latter day
  - for a future day
  lexicon: HALOT
  rationale: The phrase points to a future time rather than necessarily an eschatological technical term. 'A later day' is natural English and avoids overloading the phrase with end-times specificity not demanded by the context.
- source_word: לָעַד
  chosen: as a witness
  alternatives:
  - forever
  - perpetually
  lexicon: HALOT
  rationale: Although עד often denotes perpetuity, in this verse many interpreters understand לָעַד adverbially in the sense of enduring testimony/witness, especially in light of the parallel 'forever and ever.' Rendering it 'as a witness' captures the memorial/testimonial force of the written record in context.
- source_word: עַד עוֹלָם
  chosen: forever and ever
  alternatives:
  - forever
  - for everlasting time
  lexicon: HALOT
  rationale: An emphatic expression of enduring duration. 'Forever and ever' communicates the intensification naturally in English.
