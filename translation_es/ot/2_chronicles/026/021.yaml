revisions:
- from: Y el rey Uzías fue leproso[a] hasta el día de su muerte, y habitó en una casa separada, leproso, porque fue cortado[b] de la casa de Yahvé. Y Jotam su hijo estaba sobre la casa del rey, juzgando al pueblo de la tierra.
  to: Y el rey Uzías quedó leproso[a] hasta el día de su muerte, y habitó en una casa apartada, leproso, porque fue cortado[b] de la casa de Yahvé. Y Jotam su hijo estaba a cargo de la casa del rey, juzgando a la gente del país.
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad y precisión del español sin apartarse del hebreo ni de las decisiones auditadas: ''quedó leproso'' para un estado narrativo más idiomático; ''casa apartada'' por fluidez; ''estaba a cargo de la casa del rey'' para expresar supervisión administrativa; y ''la gente del país'' para un español más natural que conserve el sentido de עַם הָאָרֶץ.'
