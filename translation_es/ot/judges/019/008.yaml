translation:
  language: es
  text: 'Se levantó temprano por la mañana, en el quinto día, para ir; pero el padre de la joven dijo: «Por favor, fortalece tu corazón[a] con un poco de comida, y demórate hasta que decline el día». Así que los dos comieron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «fortalece tu corazón». Es un modismo para tomar alimento y recobrar fuerzas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: He got up early
  chosen_spanish: Se levantó de mañana
  alternatives_spanish:
  - Se levantó temprano
  - Se puso en pie temprano
  lexicon: HALOT
  rationale: El verbo en hiphil de שׁכם expresa levantarse temprano o comenzar temprano. «Se levantó de mañana» conserva la noción temporal sin sonar forzado en español.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: de mañana
  alternatives_spanish:
  - por la mañana
  - en la mañana
  lexicon: HALOT
  rationale: La combinación con וַיַּשְׁכֵּם ya transmite la idea de levantarse temprano; «de mañana» mantiene el matiz adverbial de la expresión hebrea y suena natural en español.
- source_word: בַּיּוֹם הַחֲמִישִׁי
  english_pob_choice: on the fifth day
  chosen_spanish: al quinto día
  alternatives_spanish:
  - en el quinto día
  - el quinto día
  lexicon: HALOT
  rationale: Es una expresión temporal directa. «Al quinto día» es idiomático en español y conserva la referencia cronológica.
- source_word: לָלֶכֶת
  english_pob_choice: to go
  chosen_spanish: para ir
  alternatives_spanish:
  - para partir
  - para marcharse
  lexicon: HALOT
  rationale: הלך es amplio y aquí indica salida o partida. «Para ir» sigue de cerca el hebreo sin añadir interpretación excesiva.
- source_word: אֲבִי הַנַּעֲרָה
  english_pob_choice: the young woman's father
  chosen_spanish: el padre de la joven
  alternatives_spanish:
  - el padre de la muchacha
  - el padre de la muchacha joven
  lexicon: HALOT
  rationale: נַעֲרָה aquí se refiere a una joven mujer en contexto de relato. «La joven» evita la posible connotación infantil de «niña» y mantiene el sentido relacional del constructo.
- source_word: סְעָד נָא לְבָבְךָ
  english_pob_choice: Please strengthen your heart with a little food
  chosen_spanish: Por favor, fortalece tu corazón con un poco de comida
  alternatives_spanish:
  - Por favor, sustenta tu corazón con un poco de comida
  - Por favor, renueva tu ánimo con algo de comida
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «corazón» y el valor idiomático de tomar alimento para reponerse. «Fortalece» mantiene el sentido de sostener/afianzar, y «un poco de comida» refleja el ajuste del POB inglés sin volverse explicativo en exceso.
- source_word: וְהִתְמַהְמְהוּ
  english_pob_choice: delay
  chosen_spanish: demora
  alternatives_spanish:
  - permanece
  - retrásate
  lexicon: HALOT
  rationale: El hitpael de מהה expresa tardanza o demora. «Demora» es formal y preciso en español, y evita trivializar el mandato con un simple «espera».
- source_word: עַד נְטוֹת הַיּוֹם
  english_pob_choice: until the day declines
  chosen_spanish: hasta que decline el día
  alternatives_spanish:
  - hasta que el día caiga
  - hasta que se incline el día
  lexicon: HALOT
  rationale: La imagen hebrea del día que se inclina/declina se conserva casi literalmente. «Decline el día» es claro y digno en español.
- source_word: וַיֹּאכְלוּ שְׁנֵיהֶם
  english_pob_choice: So the two of them ate
  chosen_spanish: Y comieron los dos
  alternatives_spanish:
  - Y ambos comieron
  - Así que comieron los dos
  lexicon: HALOT
  rationale: La frase hebrea subraya explícitamente que fueron dos. «Los dos» conserva ese énfasis sin redundancia innecesaria.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y mantiene el par idiomático «corazón / comida» como en el audit trail inglés. También refleja la revisión inglesa que prefirió un equivalente más directo para el acto de retardar la partida, aquí con «demora».
  spanish_consistency_notes:
  - Se conserva «joven» para נַעֲרָה en lugar de «muchacha» o «niña» por el contexto narrativo.
  - Se mantiene la imagen corporal de «corazón» en el modismo, en vez de sustituirla por una paráfrasis como «ánimo» o «fuerzas».
  - «Demora» reproduce con más precisión la idea verbal de retrasar la salida que un simple «espera».
  - La coordinación final «Y comieron los dos» preserva el énfasis numérico del hebreo.
