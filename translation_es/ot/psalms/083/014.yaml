translation:
  language: es
  text: Dios mío, hazlos como polvo arremolinado[a], como tamo[b] ante el viento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como una rueda'. El hebreo גַּלְגַּל puede denotar una rueda o algo que rueda o gira. Aquí se traduce 'polvo arremolinado' porque la imagen paralela de material llevado por el viento favorece la idea de algo que gira y se dispersa.
    reason: lexical_alternative
  - marker: b
    text: Hebreo קַשׁ, más literalmente 'paja' o 'rastrojo'. Se traduce 'tamo' para expresar mejor la imagen de material liviano arrastrado por el viento.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהַי
  english_pob_choice: My God
  chosen_spanish: Dios mío
  alternatives_spanish:
  - ¡Dios mío!
  - Oh, Dios mío
  lexicon: HALOT
  rationale: La forma con sufijo de primera persona singular expresa una invocación directa y posesiva; en español, 'Dios mío' comunica esa apelación inmediata sin añadir una interjección no explícita en el hebreo.
- source_word: שִׁיתֵמוֹ
  english_pob_choice: make them
  chosen_spanish: hazlos
  alternatives_spanish:
  - ponlos
  - colócalos
  - considéralos
  lexicon: HALOT
  rationale: El verbo pide que Dios los disponga o los haga ser de cierta manera; 'hazlos' preserva el valor causativo/volitivo en una forma natural de oración en español y encaja con los dos comparativos siguientes.
- source_word: כַגַּלְגַּל
  english_pob_choice: like whirling dust
  chosen_spanish: como polvo que gira
  alternatives_spanish:
  - como rueda
  - como algo que gira
  - como polvo remolinado
  lexicon: HALOT
  rationale: גַּלְגַּל puede referirse a rueda o a algo que rueda/gira. Siguiendo la lectura poética adoptada en el POB inglés, se privilegia el movimiento arremolinado, pero se evita 'rueda' en el texto principal porque en español no comunica tan bien la imagen de dispersión ligera antes del viento.
- source_word: כְּקַשׁ
  english_pob_choice: like chaff
  chosen_spanish: como paja
  alternatives_spanish:
  - como rastrojo
  - como tamo
  - como hojarasca
  lexicon: HALOT
  rationale: קַשׁ designa propiamente paja o rastrojo. En español, 'paja' conserva el referente agrícola básico sin introducir una equivalencia más interpretativa que 'tamo'; la relación con el viento queda explícita en la segunda mitad del verso.
- source_word: לִפְנֵי רוּחַ
  english_pob_choice: before the wind
  chosen_spanish: delante del viento
  alternatives_spanish:
  - ante el viento
  - frente al viento
  - a merced del viento
  lexicon: HALOT
  rationale: La expresión idiomática se conserva de modo directo. 'Delante del viento' refleja היטב la preposición hebrea y mantiene la imagen de algo empujado por la fuerza del viento.
translation_notes:
  revision_awareness: El texto sigue de cerca el acuerdo alto del expediente inglés y no requiere revisión sustantiva; la principal adaptación es idiomática al español, manteniendo la tensión lexical de גַּלְגַּל entre 'rueda' y 'algo que gira' y de קַשׁ entre 'paja/rastrojo' y la imagen funcional de material fácilmente dispersable.
  spanish_consistency_notes:
  - Se usa 'Dios mío' como vocativo directo, coherente con el sufijo hebreo de primera persona.
  - Se evita 'SEÑOR' porque el hebreo aquí dice אֱלֹהַי, no el tetragrámaton.
  - '''Viento'' se mantiene en singular, como en el hebreo.'
  - 'Se conserva el paralelismo con dos comparaciones: movimiento giratorio y material liviano ante el viento.'
