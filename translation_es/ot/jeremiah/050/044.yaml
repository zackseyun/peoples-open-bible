translation:
  language: es
  text: ¡Mira![a] Como un león sube desde el matorral del Jordán contra un pastizal seguro; porque, en un instante, haré que ellos corran[b] de allí, y pondré sobre ese lugar a quien sea escogido. Porque ¿quién es como yo? ¿Y quién me podrá citar[c]? ¿Qué pastor podrá mantenerse en pie delante de mí?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «desde el orgullo del Jordán»; la expresión probablemente alude a la espesura exuberante de sus riberas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los expulsaré de allí».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «¿y quién me podrá fijar una cita?». El hebreo puede implicar establecer un momento para encuentro o para comparecer a rendir cuentas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - Mira
  - He aquí
  lexicon: HALOT
  rationale: Como marcador discursivo profético, expresa mejor en español la vivacidad e inmediatez de la escena. Se evita la calca arcaizante, pero se conserva la fuerza de llamada al oyente.
- source_word: כְּאַרְיֵה
  english_pob_choice: like a lion
  chosen_spanish: Como un león
  alternatives_spanish:
  - Cual león
  lexicon: HALOT
  rationale: La comparación es directa y debe mantenerse sin suavizarse. 'Como un león' es claro y natural en español contemporáneo.
- source_word: מִגְּאוֹן הַיַּרְדֵּן
  english_pob_choice: from the thicket of the Jordan
  chosen_spanish: desde el matorral del Jordán
  alternatives_spanish:
  - desde la espesura del Jordán
  - desde el orgullo del Jordán
  lexicon: HALOT
  rationale: Se sigue la decisión auditada de entender גָּאוֹן aquí como la vegetación densa y exuberante del Jordán. 'Matorral' comunica la imagen concreta; se evita 'orgullo' por ser demasiado abstracto en este contexto.
- source_word: אֶל נְוֵה אֵיתָן
  english_pob_choice: against a secure pasture
  chosen_spanish: contra un pastizal seguro
  alternatives_spanish:
  - hacia un pastizal seguro
  - contra un aprisco firme
  - hacia una morada firme
  lexicon: HALOT
  rationale: נוה conserva su campo pastoral; אֵיתָן aporta firmeza/seguridad. 'Pastizal seguro' mantiene la imagen pastoril y la dirección hostil de אֶל en este cuadro de amenaza.
- source_word: כִּי אַרְגִּעָה
  english_pob_choice: for in an instant
  chosen_spanish: porque, en un instante
  alternatives_spanish:
  - porque, de repente
  - porque, en un momento
  lexicon: HALOT
  rationale: La raíz רגע en esta forma expresa súbita celeridad. En español, 'en un instante' transmite bien la rapidez sin añadir contenido no explicitado.
- source_word: ארוצם
  english_pob_choice: I will make them run
  chosen_spanish: haré que ellos huyan
  alternatives_spanish:
  - los haré correr
  - los echaré a correr
  - los haré huir
  lexicon: HALOT
  rationale: Se mantiene el valor causativo de la forma verbal y se elige un español idiomático. 'Huyan' preserva el sentido de expulsión/huida más naturalmente que una calca de 'correr'.
- source_word: מֵעָלֶיהָ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de ella
  - de eso
  - de allí
  lexicon: HALOT
  rationale: Aunque el sufijo hebreo es femenino singular, el referente en español puede entenderse como el lugar/pastizal, que admite tratamiento masculino según la traducción elegida. Se conserva la relación espacial de alejamiento.
- source_word: וּמִי בָחוּר אֵלֶיהָ אֶפְקֹד
  english_pob_choice: and I will appoint over it whoever is chosen
  chosen_spanish: y pondré sobre él a quien sea escogido
  alternatives_spanish:
  - y nombraré sobre él al escogido
  - y estableceré sobre él al elegido
  lexicon: HALOT
  rationale: Se conserva el sentido de פקד como 'poner/nombrar sobre'. 'Quien sea escogido' refleja el participio pasivo בָחוּר sin forzarlo a una forma más interpretativa.
- source_word: כִּי מִי כָמוֹנִי
  english_pob_choice: For who is like me
  chosen_spanish: Porque ¿quién es como yo?
  alternatives_spanish:
  - ¿Pues quién es como yo?
  - Porque no hay quien sea como yo
  lexicon: HALOT
  rationale: La pregunta retórica se mantiene intacta. En español, '¿quién es como yo?' conserva la incomparabilidad divina sin ampliar la afirmación.
- source_word: וּמִי יוֹעִדֶנִּי
  english_pob_choice: and who can summon me
  chosen_spanish: ¿Y quién me podrá citar?
  alternatives_spanish:
  - ¿y quién podrá convocarme?
  - ¿y quién me podrá señalar tiempo?
  - ¿y quién podrá fijarme una cita?
  lexicon: HALOT
  rationale: 'Se preserva la tensión semántica de יעד: citar/convocar/fijar cita para comparecer. ''Citar'' en español puede abarcar la idea de convocar o requerir comparecencia, manteniendo la ambigüedad relevante sin resolverla demasiado.'
- source_word: וּמִי זֶה רֹעֶה אֲשֶׁר יַעֲמֹד לְפָנָי
  english_pob_choice: What shepherd can stand before me
  chosen_spanish: ¿Qué pastor podrá mantenerse en pie delante de mí?
  alternatives_spanish:
  - ¿qué pastor podrá estar en pie ante mí?
  - ¿qué pastor podrá resistirme?
  lexicon: HALOT
  rationale: Se conserva la imagen de 'pastor' y la expresión idiomática 'estar en pie delante de' como capacidad de resistir/comparecer. 'Mantenerse en pie' es natural y refleja bien el hebreo sin perder la fuerza retórica.
theological_decisions:
- issue: 'Cambio de voz: imagen del león y discurso en primera persona'
  english_pob_reading: The verse shifts from third-person lion imagery to first-person divine declaration, with the lion image functioning as an instrument or figure of the LORD's judgment rather than an independent actor.
  chosen_spanish_reading: La traducción conserva el paso de la imagen del león a la declaración en primera persona, sin identificar de antemano al león con un actor humano específico.
  alternative_spanish_readings:
  - Interpretar el león solo como el invasor humano
  - Explicitar que el león representa directamente al juicio de Yahvé
  rationale: 'El hebreo cambia de tercera persona a primera persona, y la traducción no debe borrar ese quiebre. En español se mantiene la misma tensión: la imagen es vívida, pero la voz soberana sigue siendo la de Yahvé.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sentido de יוֹעִדֶנִּי
  english_pob_reading: Or 'I will appoint me a time.' The Hebrew may carry the sense of setting a time for meeting or summoning to account.
  chosen_spanish_reading: ¿Y quién me podrá citar?
  alternative_spanish_readings:
  - ¿y quién me señalará un tiempo?
  - ¿y quién podrá convocarme a comparecer?
  rationale: Se preserva la ambigüedad entre convocar, citar a comparecer y fijar una cita. 'Citar' permite al lector español percibir la posibilidad de llamada a juicio o comparecencia sin cerrar el sentido.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente más reciente; el texto coincide con el pase de revisión final aprobado como sin cambios.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como forma estándar del proyecto para el nombre divino cuando corresponde, aunque aquí el versículo usa voz divina en primera persona sin el Tetragrámaton explícito.
  - Se preservó 'pastor' por su valor metafórico en el cierre del versículo.
  - Se evitó 'SEÑOR' como máscara del nombre divino porque el encargo del proyecto pide transparencia terminológica.
  - La puntuación reproduce el paralelismo retórico y la secuencia de preguntas sin sobreexplicar la sintaxis hebrea.
