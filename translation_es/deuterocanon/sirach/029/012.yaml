translation:
  language: es
  text: Guarda la limosna en tus depósitos[a], y ella te rescatará de toda aflicción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Atesora la limosna en tus tesoros»; el griego dice literalmente: «encierra la limosna en tus tesoros/depósitos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de todo mal».'
    reason: alternative_reading
lexical_decisions:
- source_word: σύγκλεισον
  english_pob_choice: Store up
  chosen_spanish: Atesora
  alternatives_spanish:
  - Guarda
  - Acopia
  - Pon a buen recaudo
  lexicon: LSJ
  rationale: El imperativo griego literalmente significa 'encierra' o 'guarda bajo llave', pero en este contexto de bienes valiosos la idea es poner algo aparte para conservarlo. 'Atesora' mantiene la noción de reservar con cuidado y suena natural en español bíblico contemporáneo.
- source_word: ἐλεημοσύνην
  english_pob_choice: almsgiving
  chosen_spanish: la limosna
  alternatives_spanish:
  - la caridad
  - las obras de misericordia
  - la misericordia
  lexicon: LSJ
  rationale: En uso helenístico judío, el sustantivo suele referirse al acto concreto de dar a los necesitados. 'Limosna' conserva ese sentido concreto y evita volverlo una abstracción demasiado amplia como 'misericordia' o demasiado general como 'caridad'.
- source_word: ἐν τοῖς ταμείοις σου
  english_pob_choice: in your treasuries
  chosen_spanish: en tus tesoros
  alternatives_spanish:
  - en tus graneros
  - en tus almacenes
  - en tus depósitos
  lexicon: LSJ
  rationale: ταμεῖον puede ser despensa, almacén, cuarto o tesorería. Dado que aquí se trata de algo valioso que se guarda, 'tesoros' transmite la imagen figurada en español sin forzar una arquitectura doméstica literal.
- source_word: ἐξελεῖταί
  english_pob_choice: will rescue
  chosen_spanish: te rescatará
  alternatives_spanish:
  - te librará
  - te salvará
  - te sacará
  lexicon: LSJ
  rationale: El verbo expresa sacar o librar de un peligro. 'Rescatará' conserva la acción eficaz y evita cargar el verso con un matiz soteriológico más técnico que el del contexto sapiencial.
- source_word: ἐκ πάσης κακώσεως
  english_pob_choice: from every affliction
  chosen_spanish: de toda aflicción
  alternatives_spanish:
  - de todo mal
  - de todo daño
  - de toda desgracia
  lexicon: LSJ
  rationale: κακώσις puede aludir a trato malo, daño o padecimiento. 'Aflicción' encaja mejor con el contexto sapiencial de liberación de la angustia o la adversidad que 'mal', que en español puede sonar más moral que circunstancial.
theological_decisions:
- issue: La eficacia protectora atribuida a la limosna
  english_pob_reading: and it will rescue you from every affliction
  chosen_spanish_reading: y ella te rescatará de toda aflicción
  alternative_spanish_readings:
  - y te librará de todo mal
  - y eso te salvará de toda desgracia
  rationale: El griego atribuye directamente a la limosna una eficacia protectora. La traducción conserva esa afirmación sin suavizarla ni convertirla en mera consecuencia moral. Se mantiene 'aflicción' por fidelidad al valor contextual de κακώσις.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego de Sirácida 29:12 y el audit trail inglés sin introducir expansiones doctrinales. Se respetó la metáfora de atesorar/guardar, la concreción de ἐλεημοσύνην como acto de dar a los necesitados, y la ambigüedad de κακώσις como aflicción o mal. No hubo revisiones aplicadas en el último pase, por lo que se mantiene una solución estable y alineada con la versión inglesa aprobada.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o equivalentes porque no aparece el nombre divino en este versículo.
  - Se usa 'limosna' para mantener la concreción del término griego; en notas se preserva la alternativa 'caridad' solo como posibilidad léxica.
  - '''Tesoros'' funciona aquí como equivalente figurado de ταμεῖα, no como afirmación de riqueza material.'
  - Se conserva la referencia singular 'ella' para ἐλεημοσύνην, siguiendo el sustantivo femenino singular del griego.
