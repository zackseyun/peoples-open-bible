translation:
  language: es
  text: 'Entonces alguien de la multitud le dijo: «Maestro, dile a mi hermano que divida la herencia conmigo»[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «comparta la herencia conmigo» o «me asigne mi parte de la herencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἶπεν δέ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... le dijo
  alternatives_spanish:
  - Y ... dijo
  - Ahora ... dijo
  lexicon: δέ (conector narrativo); λέγω
  rationale: δέ funciona como conector suave de avance narrativo; «Entonces» expresa la secuencia de manera natural en español sin cargar contraste indebido. «Le dijo» conserva el dativo αὐτῷ como objeto indirecto.
- source_word: τις
  english_pob_choice: someone
  chosen_spanish: alguien
  alternatives_spanish:
  - uno
  - un hombre
  lexicon: τις
  rationale: El indefinido remite a una persona no identificada; «alguien» es idiomático y mantiene la indeterminación del griego.
- source_word: ἐκ τοῦ ὄχλου
  english_pob_choice: from the crowd
  chosen_spanish: de la multitud
  alternatives_spanish:
  - entre la multitud
  - desde la multitud
  lexicon: ὄχλος
  rationale: «De la multitud» comunica el origen o procedencia del hablante desde el grupo reunido, con español natural.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro mío
  - Profesor
  lexicon: διδάσκαλος
  rationale: Como vocativo dirigido a Jesús, «Maestro» es fiel y natural en español bíblico contemporáneo sin añadir matiz de autoridad excesiva.
- source_word: εἰπὲ
  english_pob_choice: tell
  chosen_spanish: dile
  alternatives_spanish:
  - di
  - háblale y dile
  lexicon: λέγω
  rationale: El imperativo aoristo aquí funciona como petición dirigida a Jesús para que hable al hermano; «dile» refleja bien esa función comunicativa en español.
- source_word: τῷ ἀδελφῷ μου
  english_pob_choice: my brother
  chosen_spanish: a mi hermano
  alternatives_spanish:
  - a mi hermano mayor
  - a mi hermano
  lexicon: ἀδελφός
  rationale: La relación fraterna se expresa con el dativo de destinatario; «a mi hermano» es la equivalencia natural y directa.
- source_word: μερίσασθαι
  english_pob_choice: to divide
  chosen_spanish: que divida
  alternatives_spanish:
  - que reparta
  - que distribuya
  lexicon: μερίζω
  rationale: En contexto de herencia, «divida» conserva el sentido de repartir por partes; la subordinada con «que» hace natural el infinitivo de mandato indirecto en español.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto conmigo
  - entre ambos
  lexicon: μετά + genitivo
  rationale: La preposición con genitivo expresa asociación/participación; «conmigo» es la forma idiomática y fiel en español.
- source_word: τὴν κληρονομίαν
  english_pob_choice: the inheritance
  chosen_spanish: la herencia
  alternatives_spanish:
  - la herencia familiar
  - el patrimonio
  lexicon: κληρονομία
  rationale: «Herencia» es el término español más directo para un bien heredado o la porción hereditaria, sin sobreespecificar el aspecto legal.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: ahora cada marcador de nota está anclado explícitamente en el texto principal, y las alternativas léxicas se mantienen sin añadir notas no ancladas. La redacción sigue de cerca el griego y el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantuvo el modo narrativo simple para Εἶπεν δέ como avance de escena.
  - Se preservó la indeterminación de τις con un indefinido neutro.
  - No se ocultó ni suavizó el tema jurídico de κληρονομία; «herencia» conserva el sentido de reparto patrimonial.
  - La subordinación con «que» en español comunica la función del infinitivo de mandato indirecto sin forzar una estructura poco natural.
