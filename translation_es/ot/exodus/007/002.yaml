translation:
  language: es
  text: Tú hablarás todo lo que yo te mande, y Aarón tu hermano hablará a Faraón, para que él deje salir a los hijos de Israel[a] de su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los israelitas’; el hebreo dice literalmente ‘los hijos de Israel’.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְדַבֵּר
  english_pob_choice: shall speak
  chosen_spanish: hablarás
  alternatives_spanish:
  - deberás hablar
  - hablarás de
  lexicon: HALOT
  rationale: El verbo hebreo דבר en este contexto de comisión se expresa de manera natural con ‘hablar’. El futuro simple español transmite la instrucción con dignidad y sin volverla rígidamente modal. ‘Hablarás’ mantiene la relación paralela con Aarón y evita sobretraducir con ‘deberás’, que agrega obligación no explícita en el verbo.
- source_word: אֵת כָּל אֲשֶׁר אֲצַוֶּךָּ
  english_pob_choice: all that I command you
  chosen_spanish: todo lo que yo te mande
  alternatives_spanish:
  - todo cuanto yo te mande
  - todo lo que yo te ordene
  lexicon: HALOT
  rationale: La cláusula es total y directa. ‘Todo lo que yo te mande’ conserva la amplitud de ‘all that I command you’ y el matiz de encargo/comisión del hebreo צוה. ‘Mande’ es más idiomático en español bíblico moderno que un calco como ‘comande’ y no debilita la fuerza del mandato.
- source_word: אַהֲרֹן אָחִיךָ
  english_pob_choice: Aaron your brother
  chosen_spanish: Aarón tu hermano
  alternatives_spanish:
  - tu hermano Aarón
  - Aarón, tu hermano
  lexicon: HALOT
  rationale: Se mantiene el orden hebreo y la apposición sencilla. ‘Aarón tu hermano’ suena natural en español y conserva la cercanía fraterna sin añadir puntuación interpretativa innecesaria.
- source_word: יְדַבֵּר אֶל פַּרְעֹה
  english_pob_choice: shall speak to Pharaoh
  chosen_spanish: hablará a Faraón
  alternatives_spanish:
  - hablará con Faraón
  - dirá a Faraón
  lexicon: HALOT
  rationale: Con דבר + אֶל, ‘hablar a’ reproduce con sobriedad la relación direccional del hebreo. ‘Faraón’ se mantiene como nombre/título histórico-bíblico en español. ‘Dirá’ sería más específico y podría sugerir contenido distinto; ‘hablará con’ atenúa la dirección del texto.
- source_word: וְשִׁלַּח
  english_pob_choice: that he may send
  chosen_spanish: para que él envíe
  alternatives_spanish:
  - y que él envíe
  - para que pueda enviar
  lexicon: HALOT
  rationale: El inglés revisado optó por ‘that he may send’ para reflejar mejor la relación final/resultado. En español, ‘para que él envíe’ expresa esa finalidad sin exagerar el grado de certeza. ‘Envíe’ conserva el tono formal y el verbo causativo del contexto de liberación.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la forma literal del hebreo, en línea con la nota auditada del inglés POB. ‘Los hijos de Israel’ preserva la textura genealógica y evita sustituir sin necesidad por ‘israelitas’, que es idiomático pero menos transparente respecto al original.
- source_word: מֵאַרְצוֹ
  english_pob_choice: out from his land
  chosen_spanish: fuera de su tierra
  alternatives_spanish:
  - de su tierra
  - fuera de su país
  lexicon: HALOT
  rationale: La preposición de separación se expresa naturalmente con ‘fuera de’. ‘Su tierra’ reproduce el posesivo masculino singular referido a Faraón y mantiene el eco territorial del hebreo sin volverlo rígidamente literal con ‘desde su tierra’.
theological_decisions:
- issue: Relación entre la instrucción de Yahvé y la mediación de Aarón en el verso
  english_pob_reading: Moses must speak all that God commands, while Aaron speaks to Pharaoh as the mouthpiece leading to Israel’s release.
  chosen_spanish_reading: Moisés debe hablar todo lo que Yahvé le mande, y Aarón hablará a Faraón como mediación que conduce a la salida de Israel.
  alternative_spanish_readings:
  - Moisés hablará todo lo que yo te mande, y Aarón hablará a Faraón, para que él saque a los hijos de Israel
  - Moisés dirá todo lo que yo le ordene, y Aarón dirá a Faraón
  rationale: El verso articula una cadena de comisión y mediación, no solo dos acciones sueltas. La redacción española conserva ese orden funcional sin añadir interpretaciones doctrinales ajenas al texto. No se explicita ‘Moisés’ en el texto porque el versículo se dirige directamente al interlocutor; la lectura teológica queda implícita por el contexto del encargo divino.
  doctrine_reference: Éxodo 7:1-2; mediación profética y liberación del pueblo
translation_notes:
  revision_awareness: La revisión inglesa cambió ‘so that he will send’ por ‘that he may send’ para reflejar mejor la construcción final del hebreo. La versión española adopta ‘para que él envíe’, que conserva esa finalidad sin afirmar un resultado demasiado fuerte. Se mantuvo el enfoque formal-optimal del POB y la preferencia por traducir directamente el hebreo ‘sons of Israel’ de manera transparente.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ para el nombre divino en coherencia con el proyecto POB, aunque este versículo no lo contiene explícitamente en el hebreo citado aquí; la frase ‘yo te mande’ refleja la voz divina sin introducir sustitución reverencial.
  - Se mantiene ‘Faraón’ como forma estándar bíblica en español.
  - ‘Hijos de Israel’ se conserva por transparencia lexical y se marca con nota para la alternativa idiomática ‘israelitas’.
