review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: negativa enfática, compra plena en plata, rechazo a tomar para Yahvé lo que pertenece a Ornán, y negativa a ofrecer una ofrenda sin haber pagado. También respeta la revisión inglesa sobre el orden: «para Yahvé» modifica «tomaré».'
  spanish_quality_summary: 'El español es claro y digno, pero requiere un ajuste menor de naturalidad y fidelidad estilística: «sin costo» suena algo administrativo y menos idiomático que «gratis» o «gratuitamente» en este contexto cultual; además, la nota [a] es inadecuada porque no ofrece una alternativa real al texto ni corresponde al inglés auditado. La nota [b] es innecesaria, y la [c] puede omitirse si se mantiene «holocausto», término suficientemente establecido.'
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: יהוה como «Yahvé», עֹלָה como «holocausto», y preserva el valor posesivo de אֲשֶׁר לְךָ como «lo que es tuyo». No hay conflicto doctrinal relevante.'
  issues:
  - severity: medium
    issue: «sin costo» suena menos idiomático para חִנָּם en este contexto
    rationale: Aunque semánticamente correcto, «sin costo» tiene un registro más comercial/administrativo. «gratis» expresa mejor la idea de ofrecer un sacrificio sin que le haya costado nada a David, y sigue de cerca el punto retórico del hebreo y del inglés «for nothing».
  - severity: medium
    issue: La nota [a] sobre «Ornán» es impropia
    rationale: Dice «O, “Ornán”» cuando el texto principal ya tiene «Ornán». No presenta una alternativa útil ni responde a una ambigüedad del español creada por la traducción.
  - severity: low
    issue: Las notas [b] y [c] no son necesarias en español
    rationale: El orden «no tomaré para Yahvé lo que es tuyo» ya es claro en español, y «holocausto» es un término bíblico asentado. Mantener notas superfluas recarga el texto sin aportar claridad sustancial.
  revised_spanish_text: 'Pero el rey David dijo a Ornán: «No, porque ciertamente lo compraré por el precio completo en plata, porque no tomaré para Yahvé lo que es tuyo, ni ofreceré un holocausto gratis».

    '
  revision_rationale: 'Se elimina el aparato de notas innecesario y se sustituye «sin costo» por «gratis», que reproduce de modo más natural e idiomático el sentido de חִנָּם en este contexto: David no ofrecerá a Yahvé un sacrificio que no le haya costado nada. El resto del texto se conserva por su buena fidelidad al hebreo y a las decisiones auditadas.'
