base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/033/006.yaml
  text: But if the watchman sees the sword coming and does not blow the trumpet[a], and the people are not warned, and the sword comes and takes a life from among them, that one is taken away in his iniquity[b], but I will require his blood from the watchman's hand.
  footnotes:
  - marker: a
    text: Or 'do not take warning.' The Hebrew can be understood either as the people not being warned or as their not heeding warning; the main text follows the causal emphasis created by the watchman's failure to sound the trumpet.
    reason: lexical_alternative
  - marker: b
    text: '''His blood ... from the watchman''s hand'' is a legal idiom of accountability for a death.'
    reason: cultural_note
