id: GEN.49.20
reference: Genesis 49:20
source:
  edition: WLC
  text: מֵ/אָשֵׁ֖ר שְׁמֵנָ֣ה לַחְמ֑/וֹ וְ/ה֥וּא יִתֵּ֖ן מַֽעֲדַנֵּי מֶֽלֶךְ־׃ס
translation:
  text: Asher's food will be rich[a], and he will provide royal delicacies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'Asher's bread will be rich/fat, and he will give the delicacies of a king.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵ/אָשֵׁר
  chosen: From Asher comes
  alternatives:
  - Asher's
  - Out of Asher
  lexicon: HALOT
  rationale: The preposition מִן with the proper name Asher is most naturally rendered 'from Asher' or 'out of Asher,' indicating source or region/tribe. 'Comes' is supplied idiomatically in English because the Hebrew clause is verbless.
- source_word: שְׁמֵנָה
  chosen: rich
  alternatives:
  - fat
  - abundant
  - fertile
  lexicon: HALOT
  rationale: The adjective literally denotes fatness/richness. In English, 'rich' communicates the sense of luxuriant, plentiful produce better than the archaic-sounding 'fat' when modifying food.
- source_word: לַחְמֹו
  chosen: food
  alternatives:
  - bread
  - his bread
  lexicon: HALOT
  rationale: Though לֶחֶם literally means 'bread,' in Hebrew it often extends to food/provision generally. Here, because the parallel line speaks of delicacies, 'food' better captures the broader sense. The 3ms suffix is retained conceptually in relation to Asher, though not woodenly translated as 'his' in English.
- source_word: וְהוּא
  chosen: and he
  alternatives:
  - and it is he
  - he also
  lexicon: HALOT
  rationale: The independent pronoun adds emphasis and resumes the subject Asher. 'And he' is a natural English rendering that preserves the personal subject.
- source_word: יִתֵּן
  chosen: will provide
  alternatives:
  - will give
  - gives
  lexicon: HALOT
  rationale: The verb נָתַן is literally 'give,' but in context of producing or supplying delicacies, 'provide' is idiomatic and fits the blessing-oracle context.
- source_word: מַעֲדַנֵּי
  chosen: delicacies
  alternatives:
  - dainties
  - choice foods
  - luxuries
  lexicon: HALOT
  rationale: The noun refers to delights or delicacies, especially fine foods. 'Delicacies' is clear modern English and suits the royal context.
- source_word: מֶלֶךְ
  chosen: royal
  alternatives:
  - of a king
  - kingly
  lexicon: HALOT
  rationale: The construct phrase literally means 'delicacies of a king.' Rendering it adjectivally as 'royal delicacies' is natural English while preserving the sense of food fit for a king.
