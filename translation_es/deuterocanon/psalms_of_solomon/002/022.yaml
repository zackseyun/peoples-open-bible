translation:
  language: es
  text: Se quitó el tocado[a] de gloria que Dios había puesto sobre ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diadema».
    reason: lexical_alternative
  - marker: b
    text: O «puesto en ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: περιείλατο
  english_pob_choice: removed
  chosen_spanish: quitó
  alternatives_spanish:
  - se quitó
  - apartó
  - sacó
  lexicon: LSJ
  rationale: El aoristo medio expresa que el sujeto realiza la acción sobre sí mismo o sobre lo que lleva puesto. En español, 'quitó' comunica de forma natural la acción deliberada de despojarse del adorno sin añadir violencia que el griego no exige.
- source_word: μίτραν
  english_pob_choice: headdress
  chosen_spanish: diadema
  alternatives_spanish:
  - tocado
  - tiara
  - banda para la cabeza
  lexicon: LSJ
  rationale: Aunque μίτρα puede abarcar un tocado o turbante, aquí la revisión inglesa favorece un adorno de honor para una figura femenina personificada. 'Diadema' conserva mejor en español la idea de adorno regio/honorífico que 'turbante', y mantiene abierta la asociación con un tocado de gloria.
- source_word: δόξης
  english_pob_choice: of glory
  chosen_spanish: de gloria
  alternatives_spanish:
  - de esplendor
  - gloriosa
  lexicon: LSJ
  rationale: Se mantiene el genitivo directo para conservar la construcción honorífica y elevada del original, sin rebajarla a una simple cualidad ornamental.
- source_word: περιέθηκεν αὐτῇ
  english_pob_choice: had placed on her
  chosen_spanish: había puesto sobre ella
  alternatives_spanish:
  - había colocado sobre ella
  - le había puesto
  - había ceñido sobre ella
  lexicon: LSJ
  rationale: '''Había puesto sobre ella'' reproduce el sentido de colocar o poner encima/en torno a alguien. ''Sobre ella'' preserva la imagen de un adorno otorgado por Dios a la personificación femenina.'
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - el Señor
  lexicon: LSJ
  rationale: El griego nombra a Dios de forma directa; en español corresponde 'Dios' sin sustituirlo por un título más tradicional que no está exigido por el texto.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'turban' por 'headdress' para ajustar μίτρα al contexto de una personificación femenina. En español se refleja ese ajuste con 'diadema', evitando una asociación masculina o moderna de 'turbante' y manteniendo la imagen honorífica del adorno.
  spanish_consistency_notes:
  - Se mantiene una sintaxis breve y solemne acorde con una versión bíblica publicable.
  - '''Dios'' se conserva sin mayúsculas especiales adicionales ni sustitución por ''Señor''.'
  - Las notas al pie se limitan a alternativas léxicas atestiguadas por el contexto auditado.
