  timestamp: '2026-05-07T23:08:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el griego: ἐπέταξεν = «dio órdenes», κηρῦξαι = «proclamar», παρεμβολῇ = «campamento», y el contenido distributivo de ἕκαστον. También conserva correctamente la alternativa de que la orden implique permanecer en la posición actual.'
  spanish_quality_summary: El español es claro y digno, pero «acampase» sugiere más naturalmente montar campamento, mientras que aquí el contexto favorece quedarse en el puesto ya ocupado. Además, la nota al pie tiene comillas y puntuación poco naturales en español inicial. Una leve revisión mejora naturalidad y precisión.
  glossary_alignment: No hay términos teológicos o de glosario del proyecto en juego. La terminología militar está bien encaminada; conviene ajustar «acampase» a «permaneciera acampado» para reflejar mejor el matiz contextual documentado.
  issues:
  - severity: medium
    issue: «que cada uno acampase» puede sonar como una orden de instalar el campamento, no necesariamente de mantenerse en la posición actual.
    rationale: El griego τοῦ παρεμβαλεῖν ἕκαστον ἐν ᾧ ἐστιν τόπῳ, junto con la nota inglesa, permite y probablemente favorece el sentido de permanecer donde ya está cada uno. En español, «acampar» solo puede perder ese matiz contextual.
  - severity: low
    issue: 'La nota al pie usa formulación y puntuación algo poco idiomáticas: «''O: …»'
    rationale: 'En español editorial es más natural «O bien: …» o «Otra posibilidad: …», sin comilla simple inicial innecesaria.'
  revised_spanish_text: Y Judas dio órdenes de proclamar en el campamento que cada uno permaneciera acampado en el lugar donde se encontraba[a].
  revised_footnotes:
  - marker: a
    text: 'O bien: «que cada uno acampase donde estaba». La frase griega también puede entenderse como una orden de permanecer en la posición presente.'
    reason: lexical_alternative
  revision_rationale: Se ajusta «acampase» a «permaneciera acampado» para hacer explícito en español el matiz contextual de permanecer en el puesto actual, ya documentado en la auditoría inglesa. Se conserva la alternativa más literal en nota al pie y se mejora su redacción para un español más natural.
