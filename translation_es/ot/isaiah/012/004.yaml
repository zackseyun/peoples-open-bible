translation:
  language: es
  text: 'Y dirán en aquel día: «Den gracias a Yahvé; invoquen su nombre. Den a conocer entre los pueblos sus hechos; proclamen[a] que su nombre es exaltado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «proclamen, porque su nombre es exaltado». La conjunción hebrea puede leerse causalmente («porque») más que como contenido de la proclamación («que»).'
    reason: alternative_reading
lexical_decisions:
- source_word: וַאֲמַרְתֶּם
  english_pob_choice: And you will say
  chosen_spanish: Y dirán
  alternatives_spanish:
  - Y ustedes dirán
  - Entonces dirán
  lexicon: HALOT
  rationale: El wayyiqtol en discurso profético suele expresar secuencia futura; «dirán» conserva esa fuerza sin arcaísmo. El sujeto implícito plural se mantiene natural en español.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: Es el modismo profético estándar. «En aquel día» conserva el valor temporal y solemne del hebreo.
- source_word: הוֹדוּ לַיהוָה
  english_pob_choice: Give thanks to Yahweh
  chosen_spanish: Den gracias a Yahvé
  alternatives_spanish:
  - Agradezcan a Yahvé
  - Alaben a Yahvé
  lexicon: HALOT
  rationale: La forma causativa de ידה aquí expresa gratitud/presentación de gracias. «Den gracias» es la equivalencia más directa y cultualmente natural; se usa «Yahvé» según el criterio español del proyecto para יהוה.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el nombre divino. «Yahvé» es la forma fijada en el español POB, con transparencia respecto del Tetragrámaton.
- source_word: קִרְאוּ בִשְׁמוֹ
  english_pob_choice: call on his name
  chosen_spanish: invoquen su nombre
  alternatives_spanish:
  - llamen en su nombre
  - llamen a su nombre
  lexicon: HALOT
  rationale: קרא con בְּשֵׁם puede significar invocar/llamar invocando. «Invoquen su nombre» preserva mejor el uso cultual y oracional que una mera idea de declarar.
- source_word: הוֹדִיעוּ
  english_pob_choice: Make known
  chosen_spanish: Den a conocer
  alternatives_spanish:
  - Hagan conocer
  - Proclamen
  lexicon: HALOT
  rationale: 'El hifil de ידע es causativo: hacer saber. «Den a conocer» es natural en español y mantiene la dirección de la acción.'
- source_word: בָעַמִּים
  english_pob_choice: among the peoples
  chosen_spanish: entre los pueblos
  alternatives_spanish:
  - entre las naciones
  - a los pueblos
  lexicon: HALOT
  rationale: La preposición ב aquí indica difusión dentro de los grupos humanos; «entre los pueblos» conserva el plural étnico sin imponer matices modernos ajenos.
- source_word: עֲלִילֹתָיו
  english_pob_choice: his deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus obras
  - sus actos
  lexicon: HALOT
  rationale: El sustantivo designa acciones/hechos de alguien, frecuentemente notables. «Hechos» es amplio y fiel; evita añadir el matiz interpretativo de «poderosos» que no está explícito.
- source_word: הַזְכִּירוּ
  english_pob_choice: proclaim
  chosen_spanish: proclamen
  alternatives_spanish:
  - mencionen
  - hagan memoria de
  lexicon: HALOT
  rationale: El hifil de זכר puede significar mencionar/hacer recordar. En paralelo poético con los imperativos anteriores, «proclamen» comunica adecuadamente la declaración pública.
- source_word: כִּי נִשְׂגָּב שְׁמוֹ
  english_pob_choice: that his name is exalted
  chosen_spanish: que su nombre es exaltado
  alternatives_spanish:
  - porque su nombre es exaltado
  - que su nombre está enaltecido
  lexicon: HALOT
  rationale: נִשְׂגָּב expresa altura/exaltación/majestad. «Es exaltado» conserva la tensión poética y la pasiva del hebreo; se mantiene la lectura de contenido introducida por כִּי en la línea principal.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton. En el español del proyecto se adopta «Yahvé» como forma principal, conforme al estándar terminológico indicado, en vez de una sustitución por «SEÑOR».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Alcance de כִּי después de הַזְכִּירוּ
  english_pob_reading: 'content/result nuance: ''proclaim that his name is exalted'''
  chosen_spanish_reading: «proclamen que su nombre es exaltado»
  alternative_spanish_readings:
  - «proclamen, porque su nombre es exaltado»
  - «proclamen, pues su nombre es exaltado»
  rationale: La partícula כִּי permite una lectura de contenido o de razón. En el texto principal se mantiene la lectura de contenido, pero la formulación no elimina la posibilidad causal, que queda resguardada por la equivalencia verbal y la nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se revisó el borrador a la luz del paquete fuente y del audit trail inglés; no se requirieron cambios ulteriores respecto de la última pasada, y la redacción española mantiene la equivalencia óptima con las decisiones léxicas y teológicas documentadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה en el cuerpo principal.
  - «Pueblos» conserva el plural de עמים sin cargarlo con una equivalencia más política como «naciones» cuando el contexto es poético y cultual.
  - La pareja «den gracias / invoquen / den a conocer / proclamen» preserva la cadena de imperativos del hebreo.
  - La nota sobre כִּי se ancla en el final del versículo para reflejar la alternativa de lectura sin duplicar el contenido principal.
