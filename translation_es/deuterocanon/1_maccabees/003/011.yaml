translation:
  language: es
  text: Y Judas se enteró de ello, y salió a su encuentro, y lo golpeó y lo mató; y muchos cayeron heridos[a], y los demás huyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego especifica «muchos cayeron heridos»; no dice explícitamente que muchos murieron.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγνω
  english_pob_choice: learned of it
  chosen_spanish: se enteró de ello
  alternatives_spanish:
  - lo supo
  - se enteró
  - llegó a saberlo
  lexicon: BDAG
  rationale: El aoristo de γινώσκω aquí indica tomar conocimiento de la situación; en español, «se enteró de ello» transmite bien el ingreso a ese conocimiento sin sonar rígido.
- source_word: ἐξῆλθεν εἰς συνάντησιν αὐτῷ
  english_pob_choice: went out to meet him
  chosen_spanish: salió a su encuentro
  alternatives_spanish:
  - salió para enfrentarlo
  - salió a encontrarse con él
  lexicon: LSJ
  rationale: La expresión griega es idiomática y en contexto bélico implica encuentro/confrontación. «Salió a su encuentro» conserva la imagen y suena natural en español.
- source_word: ἐπάταξεν αὐτόν
  english_pob_choice: struck him down
  chosen_spanish: lo hirió
  alternatives_spanish:
  - lo golpeó
  - lo derribó
  - lo hirió de muerte
  lexicon: LSJ
  rationale: En español, «hirió» mantiene la acción violenta del golpe sin duplicar el efecto ya expresado por el verbo siguiente. Evita hacer explícito que fue mortal antes de tiempo, aunque el contexto lo sugiera.
- source_word: ἀπέκτεινεν
  english_pob_choice: killed him
  chosen_spanish: lo mató
  alternatives_spanish:
  - lo mató
  - lo dio muerte
  lexicon: BDAG
  rationale: Es la equivalencia directa y clara de ἀποκτείνω en español moderno.
- source_word: ἔπεσον τραυματίαι πολλοί
  english_pob_choice: many fell wounded
  chosen_spanish: muchos cayeron heridos
  alternatives_spanish:
  - muchos cayeron heridos
  - muchos heridos cayeron
  - muchos fueron heridos y cayeron
  lexicon: LSJ
  rationale: 'La frase griega especifica heridos, no muertos. «Cayeron heridos» preserva esa tensión: víctimas de guerra, no necesariamente fallecidos.'
- source_word: οἱ ἐπίλοιποι
  english_pob_choice: the rest
  chosen_spanish: los demás
  alternatives_spanish:
  - el resto
  - los restantes
  lexicon: BDAG
  rationale: «Los demás» es natural en español y conserva el sentido de los sobrevivientes o los que quedaron de la tropa.
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - huyeron
  - escaparon
  - tomaron la fuga
  lexicon: BDAG
  rationale: Verbo directo y apropiado para el retiro militar del grupo restante.
translation_notes:
  revision_awareness: El borrador sigue la lectura del texto griego de Swete y coincide sustancialmente con la solución inglesa auditada. La principal decisión sensible es mantener la secuencia «hirió y lo mató» sin colapsar ambos verbos, y conservar «muchos cayeron heridos» para no convertirlos indebidamente en muertos.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reflejar la coordinación narrativa del griego.
  - Se evita «SEÑOR» u այլ terminología no pertinente, ya que no aparece el nombre divino en este versículo.
  - «Los demás» funciona como equivalente inclusivo del remanente militar sin cargarlo de sentido teológico.
