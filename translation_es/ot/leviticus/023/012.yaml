revisions:
- from: En el día en que ustedes mezan la gavilla[a], ofrecerán un cordero macho sin defecto, de un año, como holocausto para Yahvé.
  to: El día en que presenten meciendo la gavilla[a], ofrecerán un cordero macho sin defecto, de un año, como holocausto para Yahvé.
  rationale: Se revisa «En el día» a «El día en que» para español más natural y fiel al valor temporal, y «mezan» a «presenten meciendo» para expresar con mayor claridad el gesto ritual de הֲנִיפְכֶם sin perder su carácter técnico. Se conserva «gavilla», «holocausto» y «Yahvé» por buena alineación con la evidencia fuente y la terminología del proyecto.
