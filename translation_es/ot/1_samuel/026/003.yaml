review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la auditoría inglesa en la mayoría de los puntos: «acampó», la referencia topográfica a Hachilá, «frente a Jesimón», «junto al camino», y la cláusula final sobre que Saúl vino tras David al desierto. También preserva correctamente la nota léxica sobre Jesimón. Sin embargo, «Pero David permanecía» introduce un contraste más fuerte que el hebreo simple waw no exige, y «en el desierto» para ambos מִדְבָּר y מִדְבָּרָה debilita la preferencia POB por «wilderness» = «desierto/soledad/territorio agreste»; en español bíblico legible aquí encaja mejor «desierto», pero el verbo de estancia puede mejorarse para reflejar יֹשֵׁב con más naturalidad narrativa.'
  spanish_quality_summary: El texto es claro y legible, pero puede pulirse. «Collado» es posible, aunque «colina» es más transparente para lectura amplia. «Pero David permanecía» suena algo pesado; «David estaba en el desierto» o «David se quedaba en el desierto» refleja mejor el participio narrativo. El conjunto necesita solo ajustes menores de estilo y matiz.
  glossary_alignment: No hay términos del glosario mayor en juego salvo topónimos. La transliteración de Hachilá y Jesimón está bien alineada con la auditoría inglesa. No hay conflictos teológicos relevantes.
  issues:
  - severity: medium
    issue: «Pero» añade contraste innecesario
    rationale: El hebreo usa waw conjuntiva simple antes de «David», y el inglés POB ya interpretó con «But» por contraste discursivo. En español, mantener «Pero» aquí suena más marcado y menos natural; «y David estaba...» preserva mejor el flujo narrativo sin perder sentido.
  - severity: medium
    issue: «permanecía» no refleja tan naturalmente יֹשֵׁב en este contexto
    rationale: El participio יֹשֵׁב aquí describe la ubicación/estancia de David. «Permanecía» es comprensible, pero más abstracto y menos idiomático que «estaba» o «se quedaba» en narrativa geográfica.
  - severity: low
    issue: «collado» puede resultar menos claro que «colina»
    rationale: Aunque lexicalmente válido, «colina» es más ampliamente comprensible en español neutral contemporáneo y mantiene bien la referencia topográfica de גבעה.
  revised_spanish_text: Y Saúl acampó en la colina de Hachilá[a], que está frente a Jesimón, junto al camino. Y David estaba en el desierto, y vio que Saúl había venido tras él al desierto.
  revised_footnotes:
  - marker: a
    text: Jesimón también puede entenderse de manera genérica como «el erial» o «el desierto».
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para un español más natural y más cercano al valor narrativo del hebreo: «colina» mejora la claridad, se elimina el contraste excesivo de «Pero», y «estaba» refleja mejor יֹשֵׁב en contexto locativo. Se conserva la nota sobre la posible lectura genérica de Jesimón, conforme a la auditoría inglesa.'
