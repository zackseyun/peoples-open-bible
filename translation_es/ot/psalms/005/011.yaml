review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés: mantiene las peticiones imprecatorias, el vocativo a Dios, la caída por sus propios planes y la razón causal de su rebelión contra Dios. Sin embargo, la elección «Ahuyéntalos» no refleja con suficiente precisión el campo semántico judicial/expulsivo de הַדִּיחֵמוֹ, y una alternativa de la nota está mal formada en español.'
  spanish_quality_summary: El español es generalmente claro y digno. «Decláralos culpables», «que caigan» y «porque se han rebelado contra ti» funcionan bien. Pero «Ahuyéntalos» sugiere espantar como animales o dispersar, menos adecuado que «Expúlsalos» o «Échalos fuera» en este contexto. Además, «bánalos» es incorrecto; debe ser «destiérralos» o «bánsalos» no es uso estándar bíblico, por lo que conviene evitarlo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» es correcto para אֱלֹהִים. No aparecen términos sensibles como Yahvé, Mesías o esclavo. La revisión propuesta mejora la correspondencia léxica con הַדִּיחֵמוֹ sin apartarse del razonamiento auditado del POB.
  issues:
  - severity: medium
    issue: «Ahuyéntalos» debilita o desplaza el matiz de הַדִּיחֵמוֹ
    rationale: El hifil de נדח en este contexto imprecatorio-jurídico apunta a expulsar, echar fuera o desterrar. «Ahuyentar» en español suele sugerir espantar o hacer huir, a menudo de animales, y no expresa tan bien la idea de exclusión judicial.
  - severity: medium
    issue: 'La nota b contiene una alternativa mal formada: «bánalos»'
    rationale: «Bánalos» no es forma idiomática estándar en español bíblico general. La alternativa documentada en inglés es «banish them»; en español natural y claro conviene «destiérralos».
  - severity: low
    issue: «oh Dios» puede ajustarse mejor a la puntuación española como «oh, Dios»
    rationale: La interjección «oh» suele ir seguida de coma en español cuando introduce vocativo. Es un ajuste de estilo, no de sentido.
  revised_spanish_text: Decláralos culpables[a], oh, Dios; que caigan por sus propios consejos. Expúlsalos[b] por la multitud de sus transgresiones, porque se han rebelado contra ti.
  revised_footnotes:
