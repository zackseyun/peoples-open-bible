revisions:
- from: Entonces, Zerobabel hijo de Salatiel y Jesúa hijo de Josadac se levantaron y comenzaron a edificar la casa de Yahvé en Jerusalén[a], mientras los profetas de Yahvé estaban con ellos[c][b], ayudándolos.
  to: Entonces, Zorobabel hijo de Salatiel y Jesúa hijo de Josedec se levantaron y comenzaron a edificar la casa de Yahvé en Jerusalén[a], mientras los profetas de Yahvé estaban con ellos[c][b], ayudándolos.
  rationale: Se corrige «Josadac» a «Josedec» para seguir el griego Ἰωσεδὲκ, conforme al principio del proyecto de priorizar el testigo griego en 1 Esdras y a la auditoría inglesa que evitó armonizar con el MT. También se mejora la nota [a] para reflejar con más precisión el matiz narrativo de στάς como levantarse para actuar, no meramente ponerse de pie. El resto del texto se mantiene porque es fiel, natural y consistente con la terminología del proyecto.
  reviewer_model: gpt-5.4
