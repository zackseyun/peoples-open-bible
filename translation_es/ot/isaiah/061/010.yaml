  text: שׂ֧וֹשׂ אָשִׂ֣ישׂ בַּֽ/יהוָ֗ה תָּגֵ֤ל נַפְשִׁ/י֙ בֵּֽ/אלֹהַ֔/י כִּ֤י הִלְבִּישַׁ֨/נִי֙ בִּגְדֵי יֶ֔שַׁע מְעִ֥יל צְדָקָ֖ה יְעָטָ֑/נִי כֶּֽ/חָתָן֙ יְכַהֵ֣ן פְּאֵ֔ר וְ/כַ/כַּלָּ֖ה תַּעְדֶּ֥ה כֵלֶֽי/הָ־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/061/010.yaml
  text: I will greatly rejoice in Yahweh[a]; my soul will exult in my God, for he has clothed me with garments of salvation; he has wrapped me in a robe of righteousness, like a bridegroom who adorns himself with a priestly headdress[b], and like a bride who decks herself with her jewelry.
  footnotes:
