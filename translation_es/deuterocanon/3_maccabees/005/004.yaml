lexical_decisions:
- source_word: ἐλεφαντάρχης
  english_pob_choice: elephant-master
  chosen_spanish: jefe de los elefantes
  alternatives_spanish:
  - comandante de los elefantes
  - oficial de los elefantes
  lexicon: LSJ
  rationale: El compuesto griego designa al funcionario a cargo de los elefantes. En español, "jefe de los elefantes" comunica con naturalidad esa función de mando sin sonar forzado; conserva la imagen concreta del cargo mejor que un genérico "oficial".
- source_word: τὸ προσταγὲν
  english_pob_choice: the order
  chosen_spanish: la orden
  alternatives_spanish:
  - lo que había sido mandado
  - el mandato
  lexicon: LSJ
  rationale: La expresión neutra participial significa "lo que fue mandado". En español, "la orden" reproduce bien el sentido administrativo/militar y es idiomático en el contexto.
- source_word: ἀραρότως
  english_pob_choice: exactly
  chosen_spanish: exactamente
  alternatives_spanish:
  - precisamente
  - debidamente
  - firmemente
  lexicon: LSJ
  rationale: El adverbio sugiere cumplimiento ajustado, exacto o debidamente hecho. "Exactamente" mantiene la fuerza de ejecución precisa que refleja la lectura inglesa auditada.
- source_word: συνετέλει
  english_pob_choice: carried out
  chosen_spanish: cumplió
  alternatives_spanish:
  - llevó a cabo
  - ejecutó
  - cumplimentó
  lexicon: LSJ
  rationale: El verbo indica completar la acción encomendada. "Cumplió" funciona bien en español para una orden y conserva la idea de ejecución fiel sin sobrerrepresentar el aspecto técnico.
- source_word: Ἕρμων
  english_pob_choice: Hermon
  chosen_spanish: Hermón
  alternatives_spanish:
  - Hermon
  lexicon: convención de transliteración
  rationale: Se translitera el nombre propio al español. "Hermón" respeta la forma griega y se lee con naturalidad en español bíblico.
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la revisión más reciente; no se registraron ajustes textuales adicionales, y el griego presenta alto acuerdo con la traducción base.
  spanish_consistency_notes:
  - Se mantuvo el tono sobrio y narrativo propio del pasaje.
  - No se introdujo terminología eclesiástica posterior; se prefirió una designación funcional para el cargo.
  - No se añadieron notas de pie porque el español escogido no requiere alternancia textual obligatoria en este versículo.
