base_translation:
  language: en
  yaml_path: translation/extra_canonical/jubilees/009/018.yaml
  text: And in the thirty-third jubilee[18], in the first year of the second week, Peleg took for himself a wife whose name was Lomna, the daughter of Shinar, and she bore him a son in the fourth year of this week. And he called his name Reu, for he said, “Behold, the children of men have become evil through the wicked purpose to build for themselves a city and a tower in the land.”
  footnotes:
  - marker: '18'
    text: The tower measurements are textually difficult in Ethiopic transmission. The numbers are translated conservatively from the supplied text and may reflect a corrupt or compressed measurement tradition.
    reason: textual_variant
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:49:57Z'
    unchanged: false
    changes_summary: 'Replaced the unrelated draft with a translation that matches the Ge''ez text: restored the chronological notice, Peleg''s marriage to Lomna daughter of Shinar, the birth of a son, the naming of Reu, and the explanatory statement about people becoming evil in their plan to build a city and tower.'
translation:
  language: es
  text: ‘Y en el trigésimo tercer jubileo, en el primer año de la segunda semana, Péleg tomó para sí una esposa llamada Lomna, hija de Sinar, y ella le dio a luz un hijo en el cuarto año de esta semana. Y le puso por nombre Reu, porque dijo: «He aquí, los hijos de los hombres se han vuelto malos por el propósito perverso de edificarse una ciudad y una torre en la tierra».’
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ትውልድ፡ ለዕለተ፡ ደይን።
  english_pob_choice: The tower measurements are textually difficult in Ethiopic transmission. The numbers are translated conservatively from the supplied text and may reflect a corrupt or compressed measurement tradition.
  chosen_spanish: Y en el trigésimo tercer jubileo[a]
  alternatives_spanish:
  - En el jubileo treinta y tres
  - Y durante el trigésimo tercer jubileo
  lexicon: jubileo
  rationale: El texto ge’ez y el auditorio inglés conservado sitúan aquí un aviso cronológico; como la línea de mediciones del texto fuente fue reemplazada en la revisión por una secuencia narrativa, conviene reflejar el marco temporal con la forma española natural «jubileo».
- source_word: ፋሌክ
  english_pob_choice: Peleg
  chosen_spanish: Péleg
  alternatives_spanish:
  - Peleg
  lexicon: nombre propio
  rationale: Se transcribe el nombre propio en forma española transparente; «Péleg» mantiene la pronunciación aproximada y distingue el acento prosódico en español.
- source_word: ሎምና፡ ወለተ፡ ሲናአር
  english_pob_choice: Lomna, the daughter of Shinar
  chosen_spanish: Lomna, la hija de Sinar
  alternatives_spanish:
  - Lomna, hija de Sinar
  - Lomna, la hija de Shinar
  lexicon: nombre propio / gentilicio
  rationale: «Sinar» sigue la forma española bíblica habitual para Shinar, conservando el nombre propio del linaje o procedencia sin añadir interpretación.
- source_word: ወወለደት፡ ሎቱ፡ ወልደ፡
  english_pob_choice: and she bore him a son
  chosen_spanish: y ella le dio un hijo
  alternatives_spanish:
  - y ella le dio a luz un hijo
  - y ella le dio un hijo
  lexicon: verbo de parto
  rationale: «Dar un hijo» reproduce con naturalidad el hecho de nacimiento sin forzar un calco; «dio a luz» es posible, pero aquí el giro breve del español bíblico moderno queda más fluido.
- source_word: ወጸውዐ፡ ስሞ፡ ራገው፡
  english_pob_choice: And he called his name Reu
  chosen_spanish: Y le puso por nombre Reu
  alternatives_spanish:
  - Y llamó su nombre Reu
  - Y le llamó Reu
  lexicon: fórmula onomástica
  rationale: La fórmula española «poner por nombre» transmite bien la construcción semítica sin sonar arcaica; se mantiene el nombre tradicional «Reu» como en la tradición bíblica en español.
- source_word: ውሉደ፡ ሰብእ
  english_pob_choice: the children of men
  chosen_spanish: los hijos de los hombres
  alternatives_spanish:
  - la humanidad
  - los seres humanos
  lexicon: expresión idiomática
  rationale: Se conserva la locución literalmente porque tiene fuerte sabor bíblico y refleja el plural colectivo del original; «la humanidad» suavizaría el eco textual.
- source_word: እኩያነ፡ በምክረ፡ ዐግ
  english_pob_choice: evil through the wicked purpose
  chosen_spanish: se han vuelto malos por el propósito perverso
  alternatives_spanish:
  - se han corrompido por el plan perverso
  - han llegado a ser malos por el mal propósito
  lexicon: maldad / intención
  rationale: El ge’ez une maldad moral con intención o plan; «propósito perverso» conserva esa tensión entre estado moral y designio, sin convertirlo en mera maldad abstracta.
- source_word: ይሕንፁ፡ ሎሙ፡ ሀገረ፡ ወማኅፈደ፡ ውስተ፡ ምድረ።
  english_pob_choice: to build for themselves a city and a tower in the land.
  chosen_spanish: de edificarse una ciudad y una torre en la tierra
  alternatives_spanish:
  - para construirse una ciudad y una torre en la tierra
  - de construir para sí una ciudad y una torre en la tierra
  lexicon: construcción / reflexivo
  rationale: El infinitivo reflexivo español expresa bien el valor de beneficio propio del original («for themselves»), mientras «edificarse» mantiene el registro bíblico sin elevarlo a un arcaísmo innecesario.
theological_decisions:
- issue: Autoafirmación humana y mal moral del proyecto de Babel
  english_pob_reading: the children of men have become evil through the wicked purpose to build for themselves a city and a tower in the land
  chosen_spanish_reading: los hijos de los hombres se han vuelto malos por el propósito perverso de edificarse una ciudad y una torre en la tierra
  alternative_spanish_readings:
  - la humanidad se ha corrompido con el mal propósito de construirse una ciudad y una torre en la tierra
  - los hombres se han hecho malos al proponerse levantar una ciudad y una torre en la tierra
  rationale: Se preserva la idea de corrupción moral ligada a una intención colectiva desordenada. No se suaviza hacia mera ambición arquitectónica, porque el texto explícitamente atribuye la maldad al propósito.
  doctrine_reference: Génesis 11:4; Jubileos 10:18-20 en tradición temática de Babel
- issue: Fórmula genealógica y nombramiento
  english_pob_reading: And he called his name Reu
  chosen_spanish_reading: Y le puso por nombre Reu
  alternative_spanish_readings:
  - Y llamó su nombre Reu
  - Y lo llamó Reu
  rationale: La frase mantiene la convención genealógica sin cargarla doctrinalmente; se evita una forma que en español pueda sonar demasiado literal o litúrgica sin beneficio textual.
  doctrine_reference: Génesis 4–11 genealogical formulas
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada de un bloque erróneo sobre medidas de la torre a un relato cronológico y genealógico: en el texto ge’ez presente se conserva el marco del trigésimo tercer jubileo, el matrimonio de Péleg con Lomna, el nacimiento del hijo y la explicación moral sobre la construcción de una ciudad y una torre. La traducción española sigue esa lectura revisada y no incorpora la tradición de medidas descartada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del proyecto solo cuando aparezca el nombre divino; en este pasaje no ocurre.
  - Se mantiene «Jubileo» como tecnicismo calendárico del libro de Jubileos.
  - «Péleg» y «Reu» se tratan como nombres propios bíblicos transcritos en español, sin adaptación interpretativa.
  - Se conserva el paralelismo sintáctico del original con dos oraciones coordinadas y una cláusula causal final.
