translation:
  language: es
  text: Pero, por adorar a Dios y vivir conforme a su ley[a], se mantenían separados en asuntos de comida; por esta razón algunos los consideraban odiosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su ley» / «la ley de este pueblo». La expresión griega es condensada.'
    reason: alternative_reading
lexical_decisions:
- source_word: σεβόμενοι
  english_pob_choice: worshiped
  chosen_spanish: reverenciar a Dios
  alternatives_spanish:
  - adoraban a Dios
  - veneraban a Dios
  - daban culto a Dios
  lexicon: BDAG
  rationale: El participio expresa devoción reverente hacia Dios. En español, «reverenciar» comunica esa actitud de piedad con dignidad y evita reducirla a un acto meramente ritual; «adoraban» también sería posible, pero puede sonar más cultual que relacional en este contexto.
- source_word: πολιτευόμενοι
  english_pob_choice: lived according to
  chosen_spanish: vivir conforme a
  alternatives_spanish:
  - conducirse según
  - ordenar su vida según
  - vivir de acuerdo con
  lexicon: LSJ
  rationale: Aquí el verbo apunta a organizar la vida bajo una norma, no sólo a un estatus cívico. «Vivir conforme a» es natural en español y conserva la idea de conducta regulada por la ley.
- source_word: τῷ τούτων νόμῳ
  english_pob_choice: their law
  chosen_spanish: su ley
  alternatives_spanish:
  - la ley de estos
  - la ley de esta gente
  - su propia ley
  lexicon: LSJ
  rationale: La expresión griega es comprimida y admite una referencia al pueblo o a Dios en relación con esa ley. En español, «su ley» conserva la ambigüedad sin decidirla en exceso; el contexto inmediato permite entender la referencia comunitaria, mientras la nota mantiene la alternativa.
- source_word: χωρισμὸν ἐποίουν
  english_pob_choice: they kept themselves separate
  chosen_spanish: se mantenían separados
  alternatives_spanish:
  - hacían separación
  - se apartaban
  - guardaban separación
  lexicon: LSJ
  rationale: La expresión idiomática describe una práctica de separación social. «Se mantenían separados» transmite esa conducta de forma clara y natural, sin volverla más técnica de lo que exige el griego.
- source_word: ἐπὶ τῷ κατὰ τὰς τροφάς
  english_pob_choice: in matters of food
  chosen_spanish: en asuntos de alimento
  alternatives_spanish:
  - en materia de comida
  - respecto de los alimentos
  - en cuestiones de dieta
  lexicon: LSJ
  rationale: 'La frase delimita el ámbito de la separación: lo alimentario. «Asuntos de alimento» es comprensible y no demasiado técnico; evita una paráfrasis excesiva y conserva la referencia concreta a la comida.'
- source_word: ἀπεχθεῖς
  english_pob_choice: hateful
  chosen_spanish: odiosos
  alternatives_spanish:
  - detestables
  - aborrecibles
  - desagradables
  lexicon: LSJ
  rationale: El adjetivo describe cómo eran percibidos por otros a causa de esta separación. «Odiosos» preserva la carga valorativa fuerte sin convertirla en una afirmación absoluta sobre su carácter.
- source_word: ἐφαίνοντο
  english_pob_choice: regarded
  chosen_spanish: los consideraban
  alternatives_spanish:
  - les parecían
  - eran vistos como
  - los juzgaban
  lexicon: BDAG
  rationale: El verbo aquí no sólo indica apariencia visual, sino percepción social. «Los consideraban» explicita bien ese punto de vista ajeno y evita una traducción demasiado literal que sonaría ambigua en español.
theological_decisions:
- issue: Referencia de la ley en τῷ τούτων νόμῳ
  english_pob_reading: '''their law'' / ''the law of these people,'' preserving the compressed Greek expression in a footnote.'
  chosen_spanish_reading: «su ley» con nota sobre la posible lectura «la ley de estos / la ley de este pueblo»
  alternative_spanish_readings:
  - «la ley de ellos»
  - «la ley de estos»
  - «la ley de ese pueblo»
  rationale: El griego permite una relación comprimida entre Dios, el pueblo y la ley. En español, «su ley» es breve y fiel, y la nota preserva la tensión interpretativa sin fijar indebidamente un referente único.
  doctrine_reference: Principio de primacía del original; preservar ambigüedad textual cuando el griego la contiene.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «his law» por «their law» para reflejar con mayor precisión τῷ τούτων νόμῳ. La redacción española evita escoger exclusivamente una lectura personal y conserva la ambigüedad mediante «su ley» y la nota alternativa.
  spanish_consistency_notes:
  - Se usa «Dios» para θεόν, conforme a la terminología base.
  - Se mantiene «ley» para νόμος y no «Torá», porque el texto y el audit trail en inglés hablan de law/ley, no de un término técnico hebreo explícito.
  - Se traduce ἀπεχθεῖς como «odiosos» para conservar la fuerza evaluativa sin suavizarla.
  - La frase final refleja percepción pública («los consideraban») y no una cualidad objetiva absoluta.
