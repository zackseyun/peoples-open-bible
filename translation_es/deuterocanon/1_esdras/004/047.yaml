  to: Entonces el rey Darío se levantó y lo besó, y escribió cartas en su favor a todos los administradores[a], gobernadores regionales, generales y sátrapas, para que lo escoltaran[b] a él y a todos los que estaban con él y subían a edificar Jerusalén[c].
