base_translation:
  language: en
  yaml_path: translation/ot/isaiah/053/006.yaml
  text: All of us[a], like sheep, have gone astray; each of us has turned to his own way[c][b]; and Yahweh has laid on him the iniquity of us all.
  footnotes:
  - marker: a
    text: Or 'each one has turned to his own way.' The Hebrew has the masculine singular 'each man' with distributive force, referring to all people in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD has caused the iniquity of us all to fall on him' or 'to meet on him.' The Hebrew verb can carry the sense of causing something to strike or converge upon someone.
    reason: alternative_reading
  - marker: c
    text: '''Iniquity'' may also be understood as ''guilt'' or, by extension, the liability or punishment associated with guilt.'
    reason: lexical_alternative
