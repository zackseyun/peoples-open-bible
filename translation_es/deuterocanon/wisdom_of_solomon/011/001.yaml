translation:
  language: es
  text: Hizo prosperar sus obras por mano de un santo profeta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Probablemente se trata de Moisés por el contexto inmediato, aunque el griego de este versículo no lo nombra.
    reason: cross_reference
lexical_decisions:
- source_word: Εὐόδωσεν
  english_pob_choice: prospered
  chosen_spanish: hizo prosperar
  alternatives_spanish:
  - prosperó
  - dio éxito a
  lexicon: LSJ
  rationale: 'El griego εὐοδόω tiene sentido causativo: hacer que algo tenga buen éxito o prosperar. «Hizo prosperar» conserva ese valor causativo mejor que un simple intransitivo como «prosperó».'
- source_word: τὰ ἔργα
  english_pob_choice: their works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus emprendimientos
  lexicon: LSJ
  rationale: ἔργα es amplio y puede abarcar obras, hechos o emprendimientos. «Obras» es la equivalencia más directa y mantiene el estilo conciso del versículo.
- source_word: ἐν χειρὶ
  english_pob_choice: by the hand of
  chosen_spanish: por mano de
  alternatives_spanish:
  - por medio de
  - bajo la guía de
  lexicon: LSJ
  rationale: La expresión griega es idiomática y señala mediación o agencia. «Por mano de» conserva ese matiz bíblico y la imagen del instrumento humano.
- source_word: προφήτου ἁγίου
  english_pob_choice: a holy prophet
  chosen_spanish: de un profeta santo
  alternatives_spanish:
  - de un profeta sagrado
  - de su profeta santo
  lexicon: LSJ
  rationale: El griego no lleva artículo, así que «de un profeta santo» refleja mejor la indefinición formal. «Santo» traduce ἁγίου sin introducir una identificación explícita en el texto principal.
theological_decisions:
- issue: Sujeto implícito del verbo
  english_pob_reading: Rendered simply as 'He prospered,' leaving the antecedent to context rather than supplying 'God' in the text.
  chosen_spanish_reading: Él hizo prosperar...
  alternative_spanish_readings:
  - Dios hizo prosperar...
  - El Señor hizo prosperar...
  rationale: El griego deja el sujeto implícito y el contexto lo provee. «Él» mantiene esa reserva sin añadir un nombre que el versículo no expresa.
  doctrine_reference: 'Principio de primacía del texto fuente: no importar especificaciones ausentes del griego.'
- issue: Identidad del profeta
  english_pob_reading: Kept generic as 'a holy prophet' in the main text.
  chosen_spanish_reading: un profeta santo
  alternative_spanish_readings:
  - Moisés
  - su profeta santo
  rationale: Aunque el contexto apunta a Moisés, el griego no lo nombra aquí. La traducción conserva el nivel de especificidad del original y deja la identificación para la nota.
  doctrine_reference: No paraphrase beyond what the source text warrants.
translation_notes:
  revision_awareness: 'El testimonio auditado en inglés no requiere cambios de contenido: se mantiene el sujeto implícito, la agencia mediada por «mano de» y la referencia genérica a «un profeta santo», con la identificación probable de Moisés reservada para la nota.'
  spanish_consistency_notes:
  - Se mantuvo la terminología POB de mediación literal con «por mano de» en lugar de suavizarla a «por medio de».
  - Se evitó introducir «Dios» o «el Señor» en el texto principal porque el griego no lo dice explícitamente.
  - Se conservó «profeta santo» sin convertirlo en un título litúrgico más desarrollado.
