translation:
  language: es
  text: Y el asunto que pide el rey es difícil[a], y no hay otro que pueda declararlo delante del rey, excepto los dioses[b], cuya morada no es con la carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la cosa que pide el rey es dura».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «excepto los dioses, cuya morada no es con seres humanos»; o «...con carne mortal».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִלְּתָא
  english_pob_choice: the thing
  chosen_spanish: la cosa
  alternatives_spanish:
  - el asunto
  - la materia
  - la palabra
  lexicon: HALOT
  rationale: El arameo imperial puede significar cosa, asunto o palabra. Aquí se refiere a la petición/discusión que debe darse a conocer, y «la cosa» conserva la amplitud del término con un español natural. «El asunto» también sería posible, pero «la cosa» sigue más de cerca la neutralidad del sustantivo original.
- source_word: שָׁאֵל
  english_pob_choice: asks
  chosen_spanish: pide
  alternatives_spanish:
  - pregunta
  - solicita
  - demanda
  lexicon: HALOT
  rationale: El participio describe lo que el rey está exigiendo/pidiendo. En español, «pide» expresa con naturalidad el acto solicitado sin endurecer el matiz más allá de lo que el contexto exige. «Demanda» podría sonar excesivo; «pregunta» sería menos preciso aquí.
- source_word: יַקִּירָה
  english_pob_choice: difficult
  chosen_spanish: difícil
  alternatives_spanish:
  - dura
  - rara
  - preciosa
  - grave
  lexicon: HALOT
  rationale: El adjetivo puede implicar algo pesado, raro o difícil. En este contexto, la solicitud es extraordinariamente difícil de responder, por lo que «difícil» comunica bien el valor contextual sin perder la tensión semántica.
- source_word: וְאָחֳרָן לָא אִיתַי
  english_pob_choice: there is no other
  chosen_spanish: no hay otro
  alternatives_spanish:
  - no existe otro
  - no hay nadie más
  - no hay otra persona
  lexicon: HALOT
  rationale: La expresión idiomática niega la existencia de otro capaz de hacerlo. «No hay otro» es breve, idiomático y mantiene el alcance general del original.
- source_word: יְחַוִּנַּהּ
  english_pob_choice: can declare it
  chosen_spanish: pueda declararla
  alternatives_spanish:
  - pueda mostrarla
  - pueda hacerla saber
  - pueda anunciarla
  lexicon: HALOT
  rationale: El verbo significa mostrar, declarar o hacer saber. «Declararla» funciona bien en un contexto de corte y conserva el sentido de revelar verbalmente el contenido ante el rey.
- source_word: קֳדָם מַלְכָּא
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - en presencia del rey
  - ante el rey
  lexicon: HALOT
  rationale: La frase preposicional expresa presencia ante el monarca. «Delante del rey» es natural en español y conserva el valor espacial y protocolar del hebreo/arameo.
- source_word: לָהֵן
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - a no ser que
  lexicon: HALOT
  rationale: La partícula introduce la única excepción a la declaración anterior. «Excepto» es la equivalencia más clara y directa en español.
- source_word: אֱלָהִין
  english_pob_choice: the gods
  chosen_spanish: los dioses
  alternatives_spanish:
  - Dios
  - seres divinos
  - los seres divinos
  lexicon: HALOT
  rationale: La forma es plural y el contexto de los sabios babilonios favorece una referencia a deidades, no al Dios de Israel. «Los dioses» preserva el plural y la situación histórica; «seres divinos» es posible pero menos directo.
- source_word: מְדָרְהוֹן
  english_pob_choice: whose dwelling
  chosen_spanish: cuya morada
  alternatives_spanish:
  - cuya residencia
  - cuyo lugar de morada
  - cuya habitación
  lexicon: HALOT
  rationale: El sustantivo indica lugar de habitación o residencia. «Morada» es un equivalente sobrio y bíblicamente inteligible en español, sin forzar una terminología eclesiástica distinta del sentido original.
- source_word: עִם בִּשְׂרָא
  english_pob_choice: with flesh
  chosen_spanish: con la carne
  alternatives_spanish:
  - con seres humanos
  - con los mortales
  - con la humanidad
  lexicon: HALOT
  rationale: El arameo dice literalmente «con carne». Mantener «carne» preserva la imagen concreta y la contraposición entre lo divino y lo encarnado; «seres humanos» explicita más de lo que el texto dice.
- source_word: לָא אִיתוֹהִי
  english_pob_choice: is not
  chosen_spanish: no está
  alternatives_spanish:
  - no existe
  - no habita
  - no permanece
  lexicon: HALOT
  rationale: La construcción existencial/copulativa aquí expresa ausencia de esa morada «con carne». «No está» es la forma más natural en español para este contraste locativo, sin introducir una interpretación adicional.
theological_decisions:
- issue: Referencia de אֱלָהִין
  english_pob_reading: the gods
  chosen_spanish_reading: los dioses
  alternative_spanish_readings:
  - Dios
  - seres divinos
  rationale: El plural morfológico y la voz de los consejeros babilonios apuntan a deidades paganas. Traducirlo como singular «Dios» borraría la tensión histórica y la perspectiva del hablante. «Los dioses» mantiene esa diferencia; «seres divinos» sería menos explícito.
  doctrine_reference: Primacía del idioma original y preservación de la tensión textual
- issue: Imagen de בִּשְׂרָא
  english_pob_reading: flesh
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - humanos
  - mortales
  - naturaleza humana
  rationale: La POB en inglés retiene «flesh» para conservar la imagen corpórea. En español, «carne» mantiene esa concreción y evita suavizar el contraste. Las alternativas interpretativas se reservan solo como posibilidades secundarias.
  doctrine_reference: Criterio de transparencia léxica y no aplanar el lenguaje corporal del texto
- issue: Alcance de la frase final
  english_pob_reading: whose dwelling is not with flesh
  chosen_spanish_reading: cuya morada no está con la carne
  alternative_spanish_readings:
  - cuya morada no está con los humanos
  - cuya morada no está entre los mortales
  rationale: El hebreo/arameo no dice literalmente «humanos», sino «carne». La versión principal conserva la imagen fuente; las alternativas reflejan interpretaciones legítimas que el audit trail inglés también preserva en nota.
  doctrine_reference: Preservación de alternativas semánticas documentadas
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y ninguna revisión pendiente; la redacción española sigue de cerca el hebreo/arameo y conserva las alternativas documentadas en nota, especialmente en מִלְּתָא, יַקִּירָה y בִּשְׂרָא.
  spanish_consistency_notes:
  - Se mantiene «carne» para בִּשְׂרָא, en coherencia con la preferencia POB por conservar la imagen literal cuando no hay razón doctrinal para suavizarla.
  - Se usa «los dioses» para אֱלָהִין, respetando el plural y el marco babilonio del pasaje.
  - Se evita el tradicional «SEÑOR» o «Dios» como sustituto no motivado por el contexto original.
  - La puntuación conserva la estructura coordinada del verso y la excepción introducida por «excepto».
