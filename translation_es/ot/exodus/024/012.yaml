base_translation:
  language: en
  yaml_path: translation/ot/exodus/024/012.yaml
  text: Then Yahweh said to Moses[a], “Come up to me on the mountain and remain there, and I will give you the stone tablets, and the law and the commandment[b], which I have written for their instruction.”
  footnotes:
  - marker: a
    text: Or 'the instruction and the commandment.' The Hebrew word torah often means 'instruction' or 'teaching,' not only legal statute.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'the law and the commandment' may be understood either as additional covenant instruction alongside the stone tablets or as further describing what is written on them.
    reason: alternative_reading
