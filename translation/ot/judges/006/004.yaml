id: JDG.6.4
reference: Judges 6:4
source:
  edition: WLC
  text: וַ/יַּחֲנ֣וּ עֲלֵי/הֶ֗ם וַ/יַּשְׁחִ֨יתוּ֙ אֶת יְב֣וּל הָ/אָ֔רֶץ עַד בּוֹאֲ/ךָ֖ עַזָּ֑ה וְ/לֹֽא יַשְׁאִ֤ירוּ מִֽחְיָה֙ בְּ/יִשְׂרָאֵ֔ל וְ/שֶׂ֥ה וָ/שׁ֖וֹר וַ/חֲמֽוֹר־־־׃
translation:
  text: They would encamp against them and destroy the produce of the land as far as Gaza[a], and they would leave no sustenance in Israel, nor sheep, ox[b], or donkey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'as far as your approach to Gaza,' an idiom meaning the extent reached toward Gaza.
    reason: lexical_alternative
  - marker: b
    text: Or 'sustenance' or 'livelihood' for 'means of survival.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּחֲנוּ עֲלֵיהֶם
  chosen: They would encamp against them
  alternatives:
  - They camped against them
  - They would camp against them
  lexicon: HALOT
  rationale: חנה means to camp/encamp. With the wayyiqtol sequence in this repeated-action context (vv. 3–5), English habitual past is best conveyed by 'would encamp.' עַל with pronominal suffix here is adversative/spatial, hence 'against them' rather than simply 'upon them.'
- source_word: וַיַּשְׁחִיתוּ
  chosen: destroy
  alternatives:
  - ruin
  - ravage
  lexicon: HALOT
  rationale: שׁחת in the Hiphil commonly means to destroy, ruin, or devastate. 'Destroy' is direct and fits the agricultural devastation described.
- source_word: יְבוּל הָאָרֶץ
  chosen: the produce of the land
  alternatives:
  - the crops of the land
  - the yield of the land
  lexicon: HALOT
  rationale: יְבוּל refers to produce, yield, or harvest. 'Produce of the land' is slightly broader than 'crops' and preserves the agricultural sense without over-specifying.
- source_word: עַד בּוֹאֲךָ עַזָּה
  chosen: as far as the approach to Gaza
  alternatives:
  - as far as Gaza
  - up to the entrance of Gaza
  lexicon: HALOT
  rationale: The idiom literally includes 'your coming/approach to Gaza' (2ms suffix used idiomatically). Rather than flattening it entirely to 'as far as Gaza,' 'as far as the approach to Gaza' preserves the Hebrew expression while remaining readable.
- source_word: לֹא יַשְׁאִירוּ
  chosen: they would leave no
  alternatives:
  - they left no
  - they would not leave any
  lexicon: HALOT
  rationale: שׁאר in Hiphil means to leave/remain. Habitual past matches the narrative context of repeated raids.
- source_word: מִחְיָה
  chosen: means of survival
  alternatives:
  - sustenance
  - livelihood
  - anything alive
  lexicon: HALOT
  rationale: מִחְיָה denotes sustenance, preservation of life, or means of living. Here the context is economic and agricultural deprivation, so 'means of survival' captures both livelihood and life-support without narrowing it merely to food. 'Anything alive' would overread the term toward total extermination of persons.
- source_word: בְּיִשְׂרָאֵל
  chosen: in Israel
  alternatives:
  - for Israel
  lexicon: HALOT
  rationale: The preposition ב is most naturally rendered 'in' here, referring to the land/people of Israel as the sphere in which nothing was left.
- source_word: וְשֶׂה וָשׁוֹר וַחֲמוֹר
  chosen: nor sheep, ox, or donkey
  alternatives:
  - nor flock, herd animal, or donkey
  - nor sheep, cattle, or donkey
  lexicon: HALOT
  rationale: The singular nouns function collectively. 'Sheep, ox, or donkey' is natural English and preserves the representative list of livestock. 'Ox' is more precise for שׁוֹר than the broader 'cattle,' though the collective force remains.
