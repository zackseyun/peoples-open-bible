    reason: lexical_alternative
  - marker: b
    text: 'O: ''de quién permanecerá en pie la palabra: la mía o la de ellos''.'
    reason: lexical_alternative
  revision_rationale: Se corrige la omisión de 'pocos', se arreglan las concordancias gramaticales, se recupera mejor el matiz de גור con 'residir allí como forasteros', y se sustituye una formulación española poco natural por una más clara y fiel para la vindicación profética de la palabra. La nota preserva la alternativa más literal de 'permanecerá en pie'.
