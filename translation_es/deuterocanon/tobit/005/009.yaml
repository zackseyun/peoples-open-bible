translation:
  language: es
  text: 'Y entró y dijo a su padre: «Mira, he encontrado a alguien que irá conmigo». Y él dijo: «Llámalo para que venga ante mí, para que yo sepa de qué tribu es[a] y si es digno de confianza[b] para ir contigo[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De qué tribu es» refleja la preocupación del griego por la identidad tribal israelita.
    reason: cultural_note
  - marker: b
    text: O «confiable» o «fiel».
    reason: lexical_alternative
  - marker: c
    text: O «para acompañarte» o «para viajar contigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθὼν
  english_pob_choice: he went in
  chosen_spanish: entrando
  alternatives_spanish:
  - y entró
  - después de entrar
  lexicon: LSJ
  rationale: El participio aoristo se vierte de forma natural en español como una acción previa enlazada con la principal. «Entrando» mantiene la secuencia sin añadir la paráfrasis temporal de «después de entrar».
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - He aquí
  lexicon: LSJ
  rationale: La partícula deíctica pide atención inmediata. «Mira» es idiomático en español moderno y conserva la fuerza directiva mejor que un calco arcaico.
- source_word: εὕρηκα
  english_pob_choice: I have found
  chosen_spanish: he encontrado
  alternatives_spanish:
  - he hallado
  - encontré
  lexicon: LSJ
  rationale: 'El perfecto griego expresa un resultado presente; el pretérito perfecto compuesto español comunica bien esa situación actual: ya ha encontrado a la persona buscada.'
- source_word: ὃς συμπορεύσεταί μοι
  english_pob_choice: someone who will travel with me
  chosen_spanish: alguien que irá conmigo
  alternatives_spanish:
  - alguien que viajará conmigo
  - alguien que me acompañará
  lexicon: LSJ
  rationale: El sentido es un compañero de camino. «Irá conmigo» es más natural en español y conserva la idea de acompañamiento en el viaje sin forzar un tecnicismo.
- source_word: Φώνησον αὐτὸν πρὸς μέ
  english_pob_choice: Call him to me
  chosen_spanish: Llámalo junto a mí
  alternatives_spanish:
  - Llámalo a mí
  - Tráelo a mí
  lexicon: LSJ
  rationale: El imperativo expresa convocatoria/petición de traerlo a su presencia. «Llámalo junto a mí» conserva el matiz de acercarlo para hablar con él.
- source_word: ἐπιγνῶ
  english_pob_choice: I may learn
  chosen_spanish: pueda saber
  alternatives_spanish:
  - pueda averiguar
  - pueda conocer
  lexicon: LSJ
  rationale: Aquí el padre quiere cerciorarse de la identidad del joven. «Pueda saber» es claro y suficientemente preciso; «averiguar» sería posible, pero más coloquial.
- source_word: ποίας φυλῆς ἐστίν
  english_pob_choice: what tribe he is from
  chosen_spanish: de qué tribu es
  alternatives_spanish:
  - de qué linaje es
  - a qué tribu pertenece
  lexicon: LSJ
  rationale: φυλή significa «tribu», y en el contexto israelita de Tobit debe conservarse ese dato ancestral. «De qué tribu es» es la forma más directa y fiel en español.
- source_word: πιστὸς
  english_pob_choice: trustworthy
  chosen_spanish: digno de confianza
  alternatives_spanish:
  - confiable
  - fiel
  lexicon: LSJ
  rationale: La preocupación inmediata es si puede ser dependido para el viaje. «Digno de confianza» expresa bien la fiabilidad práctica sin cargar el término con connotaciones doctrinales ajenas al contexto.
- source_word: τοῦ πορευθῆναι μετὰ σοῦ
  english_pob_choice: to go with you
  chosen_spanish: para ir contigo
  alternatives_spanish:
  - para acompañarte
  - para viajar contigo
  lexicon: LSJ
  rationale: El infinitivo articular con sentido de finalidad se traduce de forma llana. «Para ir contigo» es fiel y fluido; evita repetir «viajar» y respeta el movimiento del texto.
theological_decisions:
- issue: Identidad social en φυλή
  english_pob_reading: what tribe he is from
  chosen_spanish_reading: de qué tribu es
  alternative_spanish_readings:
  - de qué linaje es
  - a qué tribu pertenece
  rationale: El griego usa explícitamente φυλή, y en Tobit la pregunta trata de la pertenencia israelita. Mantener «tribu» preserva esa dimensión narrativa y genealógica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Valor semántico de πιστός
  english_pob_reading: whether he is trustworthy to go with you
  chosen_spanish_reading: si es digno de confianza para ir contigo
  alternative_spanish_readings:
  - si es confiable para ir contigo
  - si es fiel para ir contigo
  rationale: No se trata de una afirmación doctrinal sobre la fe, sino de una evaluación práctica del compañero de viaje. «Digno de confianza» conserva el peso moral y funcional del término.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete y el punto de revisión más reciente del POB en inglés, especialmente la eliminación de la paráfrasis temporal en la cláusula inicial. También conserva las decisiones auditadas sobre φυλή y πιστός, trasladándolas a equivalentes españoles transparentes.
  spanish_consistency_notes:
  - Se usa «Y» inicial para reflejar la coordinación narrativa del griego.
  - «Mira» reproduce la deixis de Ἰδοὺ sin arcaísmo.
  - «Tribu» se mantiene por coherencia con el contexto israelita de Tobit y con la decisión inglesa auditada.
  - «Digno de confianza» conserva el valor práctico de πιστός sin desplazarlo a un registro doctrinal.
