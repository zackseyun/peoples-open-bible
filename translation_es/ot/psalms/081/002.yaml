translation:
  language: es
  text: Canten con gozo a Dios, nuestra fuerza; lancen gritos de júbilo[a] al Dios de Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «levanten un grito de alegría al Dios de Jacob». El verbo puede denotar una aclamación fuerte o un grito de tono trompeteante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַרְנִינוּ
  english_pob_choice: Sing for joy
  chosen_spanish: Canten con gozo
  alternatives_spanish:
  - Entonen una canción de gozo
  - Griten con alegría
  lexicon: HALOT
  rationale: El verbo hebreo expresa júbilo vocal y exultación; «canten con gozo» conserva el matiz de alabanza gozosa en un español natural y digno, sin perder el componente sonoro.
- source_word: לֵאלֹהִים
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  - a los dioses
  lexicon: HALOT
  rationale: La preposición marca dirección/objeto de la alabanza. En este contexto el referente es singular y covenantal, por lo que «Dios» es la lectura adecuada, no el plural «dioses».
- source_word: עוּזֵּנוּ
  english_pob_choice: our strength
  chosen_spanish: nuestra fuerza
  alternatives_spanish:
  - nuestro refugio
  - nuestro poderoso
  lexicon: HALOT
  rationale: El sustantivo עֹז/עוּז denota fuerza, poder o vigor. «Nuestra fuerza» sigue de cerca el sentido directo del hebreo y funciona mejor en el paralelismo poético.
- source_word: הָרִיעוּ
  english_pob_choice: shout aloud
  chosen_spanish: aclamen con fuerza
  alternatives_spanish:
  - prorrumpan en un grito
  - den un grito de júbilo
  lexicon: HALOT
  rationale: El verbo puede abarcar un grito de acclamación fuerte, incluso de tono trompeteante. «Aclamen con fuerza» comunica ese valor oral y solemne sin caer en una expresión demasiado arcaica.
- source_word: לֵאלֹהֵי
  english_pob_choice: to the God of
  chosen_spanish: al Dios de
  alternatives_spanish:
  - al Dios de
  - al Dios perteneciente a
  lexicon: HALOT
  rationale: En español se requiere el artículo en la construcción posesiva/relacional. La forma «al Dios de Jacob» refleja bien el hebreo en castellano natural.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Yaacob
  lexicon: HALOT
  rationale: Nombre propio tradicionalmente transliterado como «Jacob» en español bíblico, consistente con el uso del POB y plenamente inteligible.
theological_decisions:
- issue: Valor de אֱלֹהִים en paralelismo
  english_pob_reading: God / the God of Jacob
  chosen_spanish_reading: Dios / el Dios de Jacob
  alternative_spanish_readings:
  - dioses
  rationale: Aunque la forma hebrea es morfológicamente plural, el contexto del salmo y el paralelismo con «el Dios de Jacob» exigen lectura singular. Traducir «dioses» rompería el sentido confesional del texto.
  doctrine_reference: Monoteísmo bíblico; lectura contextual de אֱלֹהִים en textos de alabanza covenantal
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el paquete fuente; el draft sigue la lectura estable de alta concordancia del texto hebreo y del audit trail inglés, manteniendo la equivalencia optimal sin introducir ajustes textuales.
  spanish_consistency_notes:
  - Se mantuvo «Dios» con mayúscula para el referente divino singular, en coherencia con el contexto.
  - Se prefirió «aclamen con fuerza» para conservar el matiz de clamor jubiloso sin usar una fórmula litúrgica más fija que pudiera oscurecer el verbo hebreo.
  - Se preservó la estructura paralela de dos miembros poéticos.
  - «Jacob» se usa de forma consistente como nombre propio bíblico estándar en español.
