translation:
  language: es
  text: 'Y el sacerdote les dijo: «Vayan en paz. El camino por el que ustedes van está delante de Yahvé[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su camino está delante de Yahvé», es decir, su viaje está a la vista de Yahvé. La frase no necesariamente declara aprobación divina explícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se refleja bien con una simple continuidad narrativa en español. «Y ... dijo» conserva el avance del relato sin sobredeterminar la secuencia temporal.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  lexicon: HALOT
  rationale: En español bíblico actual, «sacerdote» es claro y natural para הַכֹּהֵן. «Sacerdote» mantiene la referencia al oficio sin añadir matices no presentes.
- source_word: לְכוּ
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan adelante
  - Prosigan
  lexicon: HALOT
  rationale: El imperativo plural se expresa de forma natural con «Vayan». Evita un calco rígido y conserva el mandato simple.
- source_word: לְשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  lexicon: HALOT
  rationale: La locución idiomática hebrea de despedida o bendición se corresponde de manera directa y natural con «en paz».
- source_word: נֹכַח יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: «Delante de» reproduce bien la idea espacial de נֹכַח sin convertirla en una afirmación más fuerte. Se conserva el nombre divino «Yahvé» según la convención del proyecto.
- source_word: דַּרְכְּכֶם
  english_pob_choice: the journey
  chosen_spanish: el camino
  alternatives_spanish:
  - la jornada
  - su camino
  lexicon: HALOT
  rationale: Aunque el contexto es de viaje, «camino» refleja mejor דֶּרֶךְ en español bíblico y mantiene la imagen original. «Jornada» sería más interpretativo.
- source_word: אֲשֶׁר תֵּלְכוּ בָהּ
  english_pob_choice: on which you are going
  chosen_spanish: que ustedes llevan
  alternatives_spanish:
  - por el que ustedes van
  - en el que ustedes van
  lexicon: HALOT
  rationale: «Que ustedes llevan» intenta sostener la idea de un camino recorrido sin endurecer la metáfora. También conserva la relación entre camino y desplazamiento.
theological_decisions:
- issue: Alcance de נֹכַח יְהוָה respecto a aprobación divina
  english_pob_reading: The journey ... is before Yahweh; this states divine awareness/oversight, not explicit approval or guaranteed success.
  chosen_spanish_reading: El camino ... está delante de Yahvé; esto afirma que el viaje queda expuesto ante Dios, no que Él lo apruebe o garantice su éxito.
  alternative_spanish_readings:
  - Yahvé aprueba su camino
  - Su camino está bajo el cuidado de Yahvé
  rationale: La frase hebrea indica presencia u निरी vantage point, no un respaldo explícito. La traducción conserva esa tensión teológica sin resolverla hacia una aprobación que el texto no expresa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior colocando el marcador de nota [a] exactamente en el texto principal, anclado a «Yahvé». La redacción mantiene la tensión del hebreo y evita leer aprobación divina donde el texto solo afirma presencia/observación.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - «Sacerdote» se mantiene para הַכֹּהֵן por claridad y fidelidad.
  - «En paz» conserva la fórmula idiomática de despedida/bendición.
  - Se eligió «delante de» para נֹכַח por su cercanía semántica a la idea de estar frente a/al alcance de la vista de Yahvé.
  - «Camino» preserva la metáfora hebrea mejor que una paráfrasis como «jornada» en este contexto.
