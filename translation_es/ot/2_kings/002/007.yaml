translation:
  language: es
  text: Y cincuenta hombres de entre los hijos de los profetas[a] fueron y se quedaron de pie frente a ellos, a distancia[b][c], mientras ellos dos se quedaron de pie junto al Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «hijos de los profetas», designación reconocida de un grupo o gremio asociado con el ministerio profético.
    reason: cultural_note
  - marker: b
    text: O «al otro lado» para «frente a ellos».
    reason: lexical_alternative
  - marker: c
    text: O «desde lejos» para «a distancia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַחֲמִשִּׁים אִישׁ
  english_pob_choice: And fifty men
  chosen_spanish: Y cincuenta hombres
  alternatives_spanish:
  - Y cincuenta personas
  - Ahora cincuenta hombres
  lexicon: HALOT
  rationale: La forma hebrea combina el número con אִישׁ para expresar un grupo de cincuenta varones. «Hombres» conserva ese valor y suena natural en español; «personas» neutralizaría indebidamente el masculino explícito del hebreo.
- source_word: מִבְּנֵי הַנְּבִיאִים
  english_pob_choice: from the sons of the prophets
  chosen_spanish: de entre los hijos de los profetas
  alternatives_spanish:
  - de la compañía de los profetas
  - de los discípulos de los profetas
  lexicon: HALOT
  rationale: Se mantiene la expresión literal «hijos de los profetas», porque es una designación reconocible del grupo profético. «De entre» ayuda a expresar el sentido de procedencia del hebreo sin perder la referencia colectiva.
- source_word: הָלְכוּ
  english_pob_choice: went
  chosen_spanish: fueron
  alternatives_spanish:
  - caminaron
  - procedieron
  lexicon: HALOT
  rationale: Aquí הלך funciona como verbo narrativo ordinario de desplazamiento. «Fueron» es la equivalencia española más directa y natural; «caminaron» sería menos idiomático y «procedieron» demasiado formal.
- source_word: וַיַּעַמְדוּ
  english_pob_choice: stood
  chosen_spanish: se pararon
  alternatives_spanish:
  - se mantuvieron en pie
  - tomaron posición
  lexicon: HALOT
  rationale: En este contexto narrativo, עמד expresa que se detuvieron y quedaron de pie. «Se pararon» comunica ese valor con claridad en español; «tomaron posición» agrega una intención no requerida por el hebreo.
- source_word: מִנֶּגֶד
  english_pob_choice: opposite them
  chosen_spanish: enfrente
  alternatives_spanish:
  - frente a ellos
  - en oposición a ellos
  - al otro lado
  lexicon: HALOT
  rationale: מנגד indica ubicación opuesta o enfrente. «Enfrente» preserva bien la relación espacial; la alternativa «al otro lado» podría sugerir necesariamente cruce o separación fluvial, lo cual no es lo principal aquí.
- source_word: מֵרָחוֹק
  english_pob_choice: at a distance
  chosen_spanish: a distancia
  alternatives_spanish:
  - desde lejos
  - de lejos
  lexicon: HALOT
  rationale: La frase señala separación espacial. «A distancia» es claro y sobrio en español; «desde lejos» es también posible, pero cambia ligeramente el ángulo de la expresión.
- source_word: וּשְׁנֵי/הֶם
  english_pob_choice: while the two of them
  chosen_spanish: mientras los dos de ellos
  alternatives_spanish:
  - y los dos de ellos
  - mientras ambos
  lexicon: HALOT
  rationale: Se conserva la referencia dual explícita, que apunta a Elías y Eliseo. «Mientras» refleja la contraposición narrativa entre el grupo observador y los dos protagonistas.
- source_word: עָמְד֥וּ עַל הַיַּרְדֵּן
  english_pob_choice: stood by the Jordan
  chosen_spanish: se pararon junto al Jordán
  alternatives_spanish:
  - se pararon en el Jordán
  - se quedaron junto al Jordán
  - estaban junto al Jordán
  lexicon: HALOT
  rationale: Aunque עַל puede significar «sobre», con un río suele expresar ubicación junto a o en la orilla. «Junto al Jordán» comunica con naturalidad esa ubicación sin forzar una lectura de estar sobre el agua.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la revisión más reciente (sin cambios necesarios) y no muestra variantes textuales problemáticas en el paquete auditado. La redacción española sigue de cerca el hebreo, manteniendo la estructura narrativa y las relaciones espaciales clave.
  spanish_consistency_notes:
  - Se mantiene «Jordán» como topónimo bíblico estándar en español.
  - Se conserva la designación «hijos de los profetas» por fidelidad al grupo señalado en la fuente.
  - La preposición y el orden de frases buscan reflejar el contraste entre los cincuenta observadores y los dos protagonistas sin añadir interpretación.
