translation:
  language: es
  text: Y Benaías y Jahaziel, los sacerdotes, estaban continuamente con las trompetas delante del arca del pacto de Dios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘estaban continuamente tocando las trompetas delante del arca del pacto de Dios’. El hebreo no expresa explícitamente el verbo, aunque ese es probablemente el sentido intencional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנָיָ֥הוּ
  english_pob_choice: And Benaiah
  chosen_spanish: Y Benaía
  alternatives_spanish:
  - Y Benaya
  - Y Benaías
  lexicon: HALOT
  rationale: Es nombre propio; se traslada al español de forma transparente. Se conserva la conjunción inicial para reflejar el encadenamiento del hebreo.
- source_word: וְ/יַחֲזִיאֵ֖ל
  english_pob_choice: and Jahaziel
  chosen_spanish: y Jahaziel
  alternatives_spanish:
  - y Jehaziel
  - y Jajaziel
  lexicon: HALOT
  rationale: Nombre propio transliterado de manera reconocible y auditable. Se mantiene la forma usada por el POB inglés, adaptada al español sin reinterpretarla.
- source_word: הַ/כֹּהֲנִ֑ים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes ministrantes
  - los sacerdotes del templo
  lexicon: HALOT
  rationale: כֹּהֲנִים se refiere de manera directa a sacerdotes; en español ‘sacerdotes’ es el equivalente natural y fiel. No se sustituye por otro término eclesiástico más cargado.
- source_word: בַּ/חֲצֹצְר֣וֹת
  english_pob_choice: with the trumpets
  chosen_spanish: con las trompetas
  alternatives_spanish:
  - con trompetas
  - tocando las trompetas
  lexicon: HALOT
  rationale: El hebreo nombra el instrumento en relación instrumental/asociativa; ‘con las trompetas’ preserva la ausencia de un verbo explícito en la fuente. Se evita añadir ‘tocando’ al texto principal.
- source_word: תָּמִ֔יד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - regularmente
  - de continuo
  lexicon: HALOT
  rationale: Adverbio de continuidad o regularidad sostenida. ‘Continuamente’ expresa bien la duración habitual sin precisar más de lo que dice el hebreo.
- source_word: לִ/פְנֵ֖י
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: ‘Delante de’ comunica con naturalidad la posición espacial/cultual en español contemporáneo. ‘Ante’ sería posible, pero ‘delante de’ resulta más claro y menos solemne en exceso.
- source_word: אֲר֥וֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el arca sagrada
  - el arca del pacto
  lexicon: HALOT
  rationale: אֲרוֹן se traduce por ‘arca’; en contexto cultual, el referente queda determinado por el complemento siguiente. Se mantiene el sustantivo básico sin expansión innecesaria.
- source_word: בְּרִית
  english_pob_choice: of the covenant
  chosen_spanish: del pacto
  alternatives_spanish:
  - de la alianza
  - del convenio
  lexicon: HALOT
  rationale: En este contexto bíblico, ‘pacto’ conserva mejor el valor técnico y cultual de בְּרִית que ‘alianza’ o ‘convenio’. Mantiene también la formulación tradicional pero no encubre el nombre divino.
- source_word: הָ/אֱלֹהִים
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - del Dios
  - del verdadero Dios
  lexicon: HALOT
  rationale: 'אֱלֹהִים, con artículo, se refiere al Dios de Israel; en español la forma natural y fiel es ‘de Dios’. No se introduce una ampliación interpretativa como ‘verdadero’. '
theological_decisions:
- issue: Verb omitted in the Hebrew clause about the priests and the trumpets
  english_pob_reading: Retain the more literal wording 'were continually with the trumpets' rather than adding 'blowing' to the main text.
  chosen_spanish_reading: Mantener ‘estaban continuamente con las trompetas’ en lugar de añadir ‘tocaban’ al cuerpo principal.
  alternative_spanish_readings:
  - estaban continuamente tocando las trompetas
  - estaban de continuo con las trompetas, tocándolas
  rationale: El hebreo no expresa verbalmente ‘tocar’ o ‘sonar’; solo presenta a los sacerdotes, las trompetas y su presencia continua ante el arca. En español se requiere fluidez, pero el texto principal no debe añadir una acción que la fuente no formula explícitamente. La nota permite la lectura inferida sin imponerla.
  doctrine_reference: Principio de primacía del texto original; evitar paráfrasis que excedan la evidencia de la fuente.
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con la revisión auditada: no se requieren cambios sustantivos respecto del sentido base. La única tensión relevante sigue siendo la omisión del verbo ‘tocar/sonar’ en hebreo, tratada con una nota alternativa sin incorporarla al texto principal.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general de proyecto, pero en este versículo no aparece el Tetragrámaton; por ello no se introduce en el texto.
  - ‘Pacto’ se conserva como término técnico coherente con el resto del proyecto.
  - Se evita ‘SEÑOR’ para el nombre divino y no se sustituye ‘arca del pacto de Dios’ por fórmulas litúrgicas más tradicionales.
  - La puntuación y el orden nominal buscan sonar naturales en español sin perder la estructura enumerativa del hebreo.
