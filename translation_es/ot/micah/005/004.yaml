translation:
  language: es
  text: Y él será paz. Cuando Asiria[a] venga a nuestra tierra y pise nuestras ciudadelas[b], entonces levantaremos contra él siete pastores y ocho príncipes de hombres[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘el asirio’. El hebreo אַשּׁוּר puede denotar Asiria como nación o al invasor asirio personalmente.
    reason: alternative_reading
  - marker: b
    text: O ‘palacios’; el término hebreo puede referirse a palacios reales o a fortalezas defendidas.
    reason: lexical_alternative
  - marker: c
    text: ‘Siete... y ocho’ es una expresión numérica hebrea que sugiere una cantidad abundante o suficiente.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה זֶה
  english_pob_choice: And he will be
  chosen_spanish: Y él será
  alternatives_spanish:
  - Y éste será
  - Y este será
  lexicon: HALOT
  rationale: El demostrativo hebreo funciona de manera anafórica respecto del gobernante del contexto inmediato. En español, ‘él’ mantiene la referencia personal y la fluidez, mientras que ‘éste/este’ conserva una literalidad mayor pero suena más pesado en el verso.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  lexicon: HALOT
  rationale: ‘Paz’ es la equivalencia natural y reconocible en español. Aunque el término hebreo puede abarcar bienestar y plenitud, no conviene ampliar el sentido en la línea principal sin necesidad textual.
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - el asirio
  lexicon: HALOT
  rationale: El contexto de invasión permite leer el nombre geopolítico de manera natural en español. Se conserva la alternativa personalizante en nota porque el hebreo también puede referirse al invasor asirio personificado.
- source_word: בְאַרְמְנֹתֵינוּ
  english_pob_choice: in our citadels
  chosen_spanish: en nuestros palacios
  alternatives_spanish:
  - en nuestras ciudadelas
  - en nuestras fortalezas
  lexicon: HALOT
  rationale: El término hebreo puede designar palacios o fortalezas. Dado que el texto español puede aceptar ‘palacios’ con sentido de residencias/edificios reales, se mantiene la alternativa tradicional; la nota aclara la posible lectura militar de ‘ciudadelas’ o ‘fortalezas’.
- source_word: וַהֲקֵמֹנוּ
  english_pob_choice: then we will raise up
  chosen_spanish: entonces levantaremos
  alternatives_spanish:
  - y levantaremos
  - entonces appointaremos
  lexicon: HALOT
  rationale: El hiphil de קום expresa causar que surjan o establecer líderes. ‘Levantaremos’ conserva la metáfora verbal en español y permite la lectura de nombrar o suscitar líderes sin introducir un tecnicismo innecesario.
- source_word: עָלָיו
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - contra ello
  lexicon: HALOT
  rationale: La forma singular se ajusta mejor a una referencia personal al invasor. ‘Contra él’ mantiene la fuerza conflictiva y evita neutralizar el pronombre.
- source_word: שִׁבְעָה רֹעִים
  english_pob_choice: seven shepherds
  chosen_spanish: siete pastores
  alternatives_spanish:
  - siete gobernantes
  - siete líderes
  lexicon: HALOT
  rationale: Se preserva la metáfora pastoral del hebreo en la línea principal. En español, ‘pastores’ mantiene la imagen de guía y cuidado sin convertirla prematuramente en una explicación política.
- source_word: וּשְׁמֹנָה נְסִיכֵי אָדָם
  english_pob_choice: and eight princes of men
  chosen_spanish: y ocho príncipes de hombres
  alternatives_spanish:
  - y ocho jefes entre los hombres
  - y ocho líderes humanos
  lexicon: HALOT
  rationale: ‘Príncipes’ conserva el rango de נְסִיכִים. ‘De hombres’ refleja de manera bastante literal la construcción hebrea con אָדָם; se evita suavizarlo a ‘humanos’ para no borrar el giro nominal del original.
theological_decisions:
- issue: Identidad del sujeto en ‘he will be peace’
  english_pob_reading: The subject is the ruler from the immediate messianic context, rendered personally as 'he.'
  chosen_spanish_reading: El sujeto se entiende como el gobernante del contexto mesiánico inmediato, expresado personalmente como ‘él’.
  alternative_spanish_readings:
  - ‘Éste será paz’ mantendría más visible el demostrativo.
  - ‘Este será paz’ ofrecería una forma todavía más literal.
  rationale: La frase sigue el hilo discursivo del contexto de Miqueas 5, donde aparece el gobernante prometido. El español puede expresar esa referencia con pronombre personal sin añadir contenido ajeno al texto.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Sentido del par numérico ‘siete... y ocho’
  english_pob_reading: Taken as a Hebrew idiom for an ample or complete sufficiency of leaders, while translated literally.
  chosen_spanish_reading: Se traduce literalmente, dejando abierto el valor idiomático hebreo de abundancia o suficiencia.
  alternative_spanish_readings:
  - Una paráfrasis como ‘suficientes líderes’ explicitaría el sentido idiomático.
  - ‘Siete y ocho’ sin nota mantendría solo la literalidad numérica.
  rationale: El español conserva el número y la imagen sin borrar el recurso semítico. La nota permite señalar el valor idiomático sin sustituir el texto por una explicación interpretativa.
  doctrine_reference: 'Translation philosophy #1 and #5'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; la redacción sigue el estado más reciente sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto solo cuando el texto lo exija; en este versículo no aparece el nombre divino.
  - Se conserva la metáfora de ‘pastores’ y el rango de ‘príncipes’ para no disolver la imaginería del hebreo.
  - Se evita ‘SEÑOR’ como sustituto del nombre divino porque no es pertinente en este versículo y el versículo no contiene יהוה.
  - 'La puntuación reproduce una estructura temporal y consecutiva clara: apódosis inicial, cláusula temporal, resultado final.'
