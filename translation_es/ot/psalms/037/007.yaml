translation:
  language: es
  text: Calla[a] ante Yahvé y espera con paciencia en él[b]; no ardas de ira[c] a causa del que prospera en su camino, a causa del hombre que hace intrigas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Guarda silencio ante Yahvé». El verbo hebreo puede enfatizar tanto el silencio como la quietud.
    reason: lexical_alternative
  - marker: b
    text: O «espera anhelante en él» o, más tradicionalmente, «descansa en él». El verbo hebreo probablemente expresa una espera paciente, incluso angustiada, delante de Dios.
    reason: lexical_alternative
  - marker: c
    text: Más tradicionalmente, «no te irrites». El hebreo habla más literalmente de calentarse o arder de ira.
    reason: lexical_alternative
lexical_decisions:
- source_word: דּוֹם
  english_pob_choice: Be still
  chosen_spanish: Calla
  alternatives_spanish:
  - Quédate quieto
  - Guarda silencio
  lexicon: HALOT
  rationale: דּוֹם expresa silencio/quietud reverente ante Dios. En español, «Calla» comunica de manera natural la pausa y la contención exigidas por el contexto, sin perder el matiz de silencio que la nota explica.
- source_word: לַיהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: La relación del lamed aquí es de presencia/dirección hacia Dios. «Ante Yahvé» conserva la cercanía reverente del hebreo y mantiene la terminología POB para el nombre divino.
- source_word: וְהִתְחוֹלֵל ל֥וֹ
  english_pob_choice: and wait patiently for him
  chosen_spanish: y espera en él
  alternatives_spanish:
  - y aguarda con paciencia por él
  - y espera ansiosamente en él
  - y reposa en él
  lexicon: HALOT
  rationale: El hitpolel de חול puede sugerir temblor, anhelo o espera intensa; en este contexto exhortativo, «espera en él» transmite bien la actitud de confianza paciente sin añadir más de lo que la forma verbal exige. La nota conserva la alternativa de «esperar pacientemente».
- source_word: אַל תִּתְחַר
  english_pob_choice: do not burn with anger
  chosen_spanish: no te enojes
  alternatives_spanish:
  - no te quemes de ira
  - no te irrites
  - no te enfurezcas
  lexicon: HALOT
  rationale: חרה literalmente evoca calentarse o arder. En español, «no te enojes» es la forma más natural y clara para un lector bíblico amplio; la nota retiene la imagen más literal de ardor/ira que el inglés POB documenta.
- source_word: בְּמַצְלִיחַ דַּרְכּוֹ
  english_pob_choice: because of one who prospers in his way
  chosen_spanish: a causa del que prospera en su camino
  alternatives_spanish:
  - por causa del que tiene éxito en su camino
  - a causa del que hace prosperar su camino
  lexicon: HALOT
  rationale: La preposición ב marca la ocasión del enojo/frecuencia de la reacción. «Prospera en su camino» conserva la imagen de la senda o curso de vida y sigue de cerca el hebreo.
- source_word: בְּאִישׁ
  english_pob_choice: because of a man
  chosen_spanish: a causa del hombre
  alternatives_spanish:
  - a causa de un hombre
  - a causa de alguien
  lexicon: HALOT
  rationale: איש es masculino singular y funciona como individuo representativo. «El hombre» en esta construcción española suena natural y mantiene la referencia genérica masculina del texto fuente.
- source_word: עֹשֶׂה מְזִמּוֹת
  english_pob_choice: who carries out schemes
  chosen_spanish: que hace intrigas
  alternatives_spanish:
  - que ejecuta planes maliciosos
  - que lleva a cabo esquemas
  - que realiza maquinaciones
  lexicon: HALOT
  rationale: מְזִמּוֹת puede significar planes, artimañas o intrigas, con carga negativa en literatura sapiencial. «Intrigas» comunica bien el carácter calculado y dañino del término sin forzar una interpretación más específica que el hebreo no exige.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene directamente el Tetragrama. La política del proyecto pide «Yahvé» como forma principal en español, preservando el nombre del pacto en vez de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del imperativo דּוֹם
  english_pob_reading: Be still / Be silent
  chosen_spanish_reading: Calla
  alternative_spanish_readings:
  - Quédate quieto
  - Guarda silencio
  rationale: La forma hebrea admite tanto silencio como quietud. «Calla» mantiene esa doble resonancia en español, y la nota explicita la alternativa de silencio para no perder la tensión léxica del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
- issue: Interpretación de חרה
  english_pob_reading: do not burn with anger
  chosen_spanish_reading: no te enojes
  alternative_spanish_readings:
  - no ardas de ira
  - no te irrites
  - no te enfurezcas
  rationale: La imagen hebrea de calor/ardor se conserva en la nota, pero el texto principal usa una expresión española idiomática y bíblicamente clara. Así se respeta el sentido afectivo sin imponer una calca poco natural.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'Revisión última: acuerdo alto entre auditoría y revisión; no se aplicaron cambios al contenido base. Se mantuvo la decisión de rendir el Tetragrama como Yahvé y de preservar la imagen hebrea de prosperar en el camino, con una frase española natural y breve para la exhortación.'
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יְהוָה.
  - Se mantiene el registro reverente y sobrio propio de poesía sapiencial.
  - «Camino» traduce דַּרְכּוֹ como metáfora de conducta o curso de vida.
  - «Intrigas» conserva el matiz negativo de מְזִמּוֹת sin añadir detalles no presentes en el hebreo.
