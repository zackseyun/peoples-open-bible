  source_alignment_summary: 'El hebreo contiene únicamente tres nombres propios en secuencia: חָרִם, מְרֵמוֹת, עֹבַדְיָה. La estructura de lista está bien reflejada. Sin embargo, el segundo nombre se aparta innecesariamente de la forma inglesa auditada y de una transliteración más directa del hebreo al usar ''Meremot'' en vez de ''Meremot/Meremot[h]'' con justificación más sólida; en español bíblico, la forma más reconocible y fiel es ''Meremot''. El tercero, ''Obadías'', es una adaptación española establecida y aceptable para עֹבַדְיָה.'
