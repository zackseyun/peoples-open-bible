  text: those from Netebas[a], fifty-five; those from Enatos, one hundred fifty-eight[b]; those from Baitasmon Zamoth.
  footnotes:
  - marker: a
    text: The Greek names in this verse differ notably from the approximate Hebrew parallel in Nehemiah 7:25, which reads 'the sons of Gibeon/Gibbar, ninety-five' in the MT tradition. Because 1 Esdras here preserves a different list-form and names, the translation follows the Greek witness closely rather than harmonizing to the Hebrew.
    reason: textual_variant
