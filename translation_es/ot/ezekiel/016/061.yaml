review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el rastro POB: «Entonces recordarás tus caminos», «te avergonzarás», «cuando recibas a tus hermanas», el par «las mayores... así como las menores», y «yo te las daré como hijas» reflejan fielmente el sentido. La cláusula final «pero no por tu pacto» también preserva adecuadamente וְלֹא מִבְּרִיתֵךְ sin sobreinterpretar. El único ajuste necesario es estilístico y de naturalidad española en la nota a, no de sentido del texto principal.'
  spanish_quality_summary: El texto principal es claro, digno y legible en español eclesial contemporáneo. La sintaxis funciona bien y evita calcos torpes. La única mejora recomendable es quitar el redundante «O:» y las comillas innecesarias de la nota a para un formato más limpio y consistente. La nota b es útil y no sobreexplica en exceso.
  glossary_alignment: No hay términos del glosario maestro en conflicto en este versículo. «Pacto» para בְּרִית es apropiado; «hermanas» e «hijas» preservan la alegoría familiar; no aparecen Yahvé/Mesías/Cristo u otros términos sensibles del proyecto.
  issues:
  - severity: low
    issue: Formato poco natural de la nota a
    rationale: 'La nota «O: «cuando tomes...»» suena algo mecánica en español. Conviene normalizarla a «O bien, ...» o forma equivalente, sin cambiar el contenido.'
  revised_spanish_text: Entonces recordarás tus caminos y te avergonzarás cuando recibas a tus hermanas[a], las mayores que tú así como las menores que tú; y yo te las daré como hijas[b], pero no por tu pacto.
  revised_footnotes:
  - marker: a
    text: O bien, «cuando tomes a tus hermanas, las mayores que tú y las menores que tú».
    reason: lexical_alternative
  - marker: b
    text: La frase niega que este don provenga del pacto de Jerusalén; no surge de un derecho o mérito suyo.
    reason: theological_note
  revision_rationale: El texto principal puede mantenerse. Solo se normaliza la redacción de la nota a para mejor español editorial y consistencia de estilo, sin alterar el sentido ni las decisiones léxicas del POB.
