translation:
  language: es
  text: Quizá su súplica caiga[a] delante de Yahvé, y cada hombre[b] se vuelva de su mal camino, porque grande es la ira y el furor que Yahvé ha hablado contra este pueblo[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su súplica llegue delante de Yahvé» o «su petición sea presentada delante de Yahvé». El hebreo dice literalmente: «su súplica caiga delante de Yahvé», una imagen idiomática para una apelación puesta ante él.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cada uno se vuelva». El hebreo usa una forma masculina singular distributiva.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Yahvé ha hablado a este pueblo». La traducción «contra este pueblo» hace explícito el contexto de juicio de la declaración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוּלַי
  english_pob_choice: Perhaps
  chosen_spanish: Quizás
  alternatives_spanish:
  - Tal vez
  - Quizá
  lexicon: HALOT
  rationale: Expresa la posibilidad esperanzada o tentativa del hebreo sin añadir certeza. 'Quizás' suena natural en español bíblico moderno y conserva el matiz de incertidumbre.
- source_word: תִּפֹּל תְּחִנָּתָם לִפְנֵי יְהוָה
  english_pob_choice: their plea will fall before Yahweh
  chosen_spanish: su súplica caiga delante de Yahvé
  alternatives_spanish:
  - su petición llegue delante de Yahvé
  - su ruego se presente delante de Yahvé
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática de 'caer delante de' en vez de suavizarla a una expresión más abstracta. 'Súplica' mantiene el tono formal y devocional de תְּחִנָּה mejor que 'petición' o 'ruego' en este contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: DOCTRINE.md contested terms
  rationale: Se sigue el principio del proyecto de renderizar el Tetragrámaton como el nombre propio 'Yahvé' en lugar de sustituirlo por un título. 'Yahvé' es la forma establecida en el proyecto y es comprensible en español bíblico contemporáneo.
- source_word: וְיָשֻׁבוּ אִישׁ מִדַּרְכּוֹ הָרָעָה
  english_pob_choice: and each man will turn from his evil way
  chosen_spanish: y cada hombre se vuelva de su mal camino
  alternatives_spanish:
  - y cada uno se vuelva de su mal camino
  - y cada hombre se aparte de su mal camino
  lexicon: HALOT
  rationale: '''Volverse de'' conserva el valor direccional de שׁוּב en contexto de arrepentimiento sin explicitar más de lo que el hebreo dice. Se mantiene el distributivo singular con ''cada hombre'', siguiendo la elección auditada del POB en inglés.'
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada persona
  lexicon: HALOT
  rationale: El singular distributivo masculino se conserva de forma explícita, como en el audit trail inglés. Aunque 'cada uno' es posible, 'cada hombre' refleja mejor la forma hebrea y la decisión documental del POB.
- source_word: הָרָעָה
  english_pob_choice: his evil way
  chosen_spanish: mal camino
  alternatives_spanish:
  - camino malo
  - camino perverso
  lexicon: HALOT
  rationale: '''Mal camino'' es una solución española natural que conserva el sentido moral de רָעָה y evita una literalidad torpe. Se mantiene el sustantivo ''camino'' como metáfora ética bíblica.'
- source_word: כִּי גָדֹול הָאַף וְהַחֵמָה
  english_pob_choice: for great is the anger and the wrath
  chosen_spanish: porque grande es la ira y el furor
  alternatives_spanish:
  - porque grande es el enojo y la indignación
  - pues grande es la ira y la cólera
  lexicon: HALOT
  rationale: 'Se distinguen dos términos hebreos de ira con una pareja española natural: ''ira'' y ''furor''. Esto preserva la intensificación del original sin caer en un calco rígido como ''nariz y calor''.'
- source_word: אֲשֶׁר דִּבֶּר יְהוָה אֶל הָעָם הַזֶּה
  english_pob_choice: that Yahweh has spoken against this people
  chosen_spanish: que Yahvé ha dicho contra este pueblo
  alternatives_spanish:
  - que Yahvé ha hablado a este pueblo
  - que Yahvé ha declarado sobre este pueblo
  lexicon: HALOT
  rationale: Se sigue el sentido de juicio que el contexto exige, expresado en español con 'contra este pueblo'. 'Ha dicho' mantiene un registro claro y sobrio; 'ha hablado' también sería posible, pero 'ha dicho' encaja bien con el contenido oracular.
theological_decisions:
- issue: Cómo renderizar el Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto usa el nombre divino en transliteración en vez de una sustitución honorífica. En español, 'Yahvé' es la forma coherente con ese principio y con la terminología del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del distributivo masculino אִישׁ
  english_pob_reading: each man
  chosen_spanish_reading: cada hombre
  alternative_spanish_readings:
  - cada uno
  - cada persona
  rationale: Se conserva la fuerza distributiva y la forma masculina singular del hebreo. No se neutraliza sin necesidad, porque el auditable del POB en inglés ya marcó esa precisión gramatical.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Lectura del contexto de juicio en אֶל הָעָם הַזֶּה
  english_pob_reading: against this people
  chosen_spanish_reading: contra este pueblo
  alternative_spanish_readings:
  - a este pueblo
  - sobre este pueblo
  rationale: Aunque la preposición hebrea es literalmente 'a', el contexto del oráculo es de juicio. 'Contra' hace explícita la orientación adversativa que el audit trail inglés ya documentó, sin exceder el alcance del verso.
  doctrine_reference: 'DOCTRINE.md: Context-sensitive prepositions and judgment oracles'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios: el texto fuente y el audit trail inglés permanecen estables. Se mantuvo la imagen idiomática de ''caiga delante de Yahvé'', la lectura distributiva de אִישׁ y la orientación de juicio de ''contra este pueblo''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente con el estándar del proyecto para יְהוָה.
  - Se conserva un registro bíblico moderno y digno, evitando el calco mecánico.
  - '''Súplica'' y ''caiga delante de'' preservan la metáfora hebrea sin oscurecerla.'
  - '''Ira'' y ''furor'' reflejan la intensificación semántica de אַף y חֵמָה.'
  - '''Cada hombre'' conserva el distributivo singular masculino documentado en el audit trail.'
