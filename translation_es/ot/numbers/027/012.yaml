translation:
  language: es
  text: 'Entonces Yahvé dijo a Moisés: «Sube a este monte de los Abarim[a] y mira la tierra que he dado a los hijos de Israel[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘monte de Abarim’ o ‘monte Abarim’. El hebreo dice literalmente ‘monte de los Abarim’.
    reason: lexical_alternative
  - marker: b
    text: 'O ‘a los israelitas’ o ‘al pueblo de Israel’. Hebreo: ‘a los hijos de Israel’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del hebreo, siguiendo el criterio del proyecto para יְהוָה. En español, 'Yahvé' es la forma transparente y litúrgicamente reconocible, más fiel que sustituirlo por un título.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Y luego dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; 'Entonces' reproduce bien ese valor secuencial en español sin sonar mecánico.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Asciende
  - Sube allá
  lexicon: HALOT
  rationale: El imperativo de עלה expresa movimiento ascendente. 'Sube' es natural y preciso en español; 'asciende' sería más formal pero menos idiomático.
- source_word: הַר הָעֲבָרִים
  english_pob_choice: mountain of the Abarim
  chosen_spanish: monte de los Abarim
  alternatives_spanish:
  - monte de Abarim
  - monte Abarim
  - montaña de los Abarim
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'monte de los Abarim'. En español, 'monte' es más natural en un contexto geográfico bíblico, y se mantiene 'Abarim' como nombre propio transliterado.
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y mira
  alternatives_spanish:
  - y ve
  - y contempla
  lexicon: HALOT
  rationale: ראה admite 'ver' o 'mirar'. 'Mira' conserva el tono de mandato directo y suena claro en español; 've' podría sonar menos natural en esta construcción.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: Aunque en contextos pactales puede entenderse como 'la tierra prometida', el hebreo dice simplemente 'la tierra'. Se evita añadir 'prometida' porque no aparece aquí.
- source_word: נָתַתִּי
  english_pob_choice: I have given
  chosen_spanish: he dado
  alternatives_spanish:
  - di
  - doy
  lexicon: HALOT
  rationale: 'El perfecto hebreo con sentido de certeza/promesa cumplida se refleja bien con el perfecto compuesto español: ''he dado''.'
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - a los hijos de Israel
  - a los israelitas
  - al pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la fuerza formal de בני como 'hijos', en lugar de neutralizarla con 'israelitas'. 'Hijos de Israel' es transparente y fiel al hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto no usa un título genérico sino el nombre del pacto. Mantener 'Yahvé' preserva esa distinción teológica y sigue el criterio del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión étnica לִבְנֵי יִשְׂרָאֵל
  english_pob_reading: to the sons of Israel
  chosen_spanish_reading: a los hijos de Israel
  alternative_spanish_readings:
  - a los israelitas
  - al pueblo de Israel
  - a los hijos de Israel
  rationale: Se mantiene la literalidad masculina del hebreo, acorde con la filosofía de precisión morfológica del proyecto. No se neutraliza el plural masculino en una forma más general.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El pasaje fue revisado en el expediente inglés y quedó sin cambios sustantivos en el último pase; la versión castellana sigue de cerca ese estado estable, preservando las decisiones léxicas ya auditadas (nombre divino, imperativo ascendente, topónimo Abarim y expresión étnica masculina).
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para יְהוָה, no ‘SEÑOR’.
  - Se conserva ‘hijos de Israel’ para reflejar בני ישראל con precisión formal.
  - ‘Monte de los Abarim’ mantiene el genitivo hebreo sin forzar una reinterpretación geográfica.
  - Los imperativos ‘sube’ y ‘mira’ reproducen el orden y la fuerza directa del hebreo.
  - El perfecto ‘he dado’ expresa la certeza de la concesión divina en español natural.
