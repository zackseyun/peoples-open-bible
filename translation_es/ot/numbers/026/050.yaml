    issue: «familias» para מִשְׁפְּחֹת en contexto censal tribal
    rationale: El expediente inglés justifica «clans» por tratarse de subdivisiones extensas de parentesco dentro de la tribu. En español, «clanes» preserva mejor ese matiz que «familias», que suena más doméstico.
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota «O “según sus familias”» explica לְמִשְׁפְּחֹתָם, no «Neftalí». Debe anclarse en la frase que traduzca ese segmento.
  - severity: low
    issue: «los registrados de ellos» es poco idiomático
    rationale: Aunque es comprensible, en español suena más natural «los registrados de entre ellos» o «los contados de entre ellos», manteniendo el sentido partitivo del hebreo.
  revised_spanish_text: Estos son los clanes de Neftalí, por sus clanes[a], y los registrados de entre ellos[b] fueron cuarenta y cinco mil cuatrocientos.
