revisions:
- from: 'Yahvé dijo a Gedeón[a]: «La gente que está contigo es demasiada para que yo entregue a Madián en su mano, para que Israel no se gloríe contra mí, diciendo[b]: “Mi propia mano me ha salvado”.»'
  to: 'Yahvé dijo a Gedeón[a]: «El pueblo que está contigo es demasiado numeroso para que yo entregue a Madián en su mano, no sea que Israel se jacte contra mí, diciendo[b]: “Mi propia mano me ha salvado”.»'
  rationale: 'La revisión conserva fielmente el contenido y las decisiones léxicas principales del audit trail, pero mejora la naturalidad y precisión del español en dos puntos clave: el valor preventivo de פֶּן («no sea que») y el sentido de jactancia de יִתְפָּאֵר («se jacte»). También se corrige la nota b y se afina «la gente» a «el pueblo» para un registro bíblico más claro.'
  reviewer_model: gpt-5.4
