revisions:
- from: Y David y todo Israel se estaban celebrando[a] delante de Dios con todo su vigor, con cantos, liras, arpas, tamboriles, címbalos y trompetas.
  to: Y David y todo Israel celebraban[a] delante de Dios con todas sus fuerzas, con cantos, liras, arpas, panderos, címbalos y trompetas.
  rationale: Se corrige el verbo principal para expresar fielmente el sentido festivo de מְשַׂחֲקִים en español natural, eliminando la forma reflexiva incorrecta. Se suaviza la construcción verbal al imperfecto simple narrativo y se adopta «con todas sus fuerzas» por mayor idiomaticidad para בְּכָל עֹז. También se cambia «tamboriles» por «panderos» para mejor claridad contemporánea. No se requieren cambios doctrinales ni una adjudicación especial.
