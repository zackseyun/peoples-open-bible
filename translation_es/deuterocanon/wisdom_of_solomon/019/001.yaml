  source_alignment_summary: 'El borrador sigue bien el griego y el rastro POB inglés en casi todos los puntos: ἀσεβέσιν = ''impíos'', θυμός = ''ira'', ἐπέστη = ''les sobrevino'', y el sujeto implícito de προῄδει se conserva adecuadamente con ''él''. Sin embargo, μέχρι τέλους en el POB auditado es enfático (''to the very end''), y ''hasta el fin'' queda algo más débil en español. Además, el marcador [d] no corresponde a una ambigüedad necesaria en el texto español revisado si se adopta una formulación más directa para τὰ μέλλοντα.'
