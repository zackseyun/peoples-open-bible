translation:
  language: es
  text: Y su límite fue Jezreel[a], Quesulot y Sunem.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo lleva una terminación direccional en «Jezreel», que puede entenderse como «hacia Jezreel»; sin embargo, aquí se toma como uno de los lugares del límite.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... was
  chosen_spanish: Y ... fue
  alternatives_spanish:
  - Y ... era
  - Y ... estaba
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce la siguiente cláusula de límites; en español, «Y ... fue» transmite de manera natural la secuencia sin añadir interpretación.
- source_word: גְּבוּלָם
  english_pob_choice: their border
  chosen_spanish: su frontera
  alternatives_spanish:
  - su límite
  - su lindero
  lexicon: HALOT
  rationale: גְּבוּל expresa el límite territorial. «Frontera» es claro y digno en español bíblico moderno; el posesivo singular «su» refleja el sufijo plural del contexto colectivo.
- source_word: יִזְרְעֶאלָה
  english_pob_choice: Jezreel
  chosen_spanish: Jezreel[a]
  alternatives_spanish:
  - Jezreel
  - hacia Jezreel
  lexicon: HALOT
  rationale: El final direccional hebreo puede sugerir orientación o extensión hacia el lugar, pero el contexto revisado en inglés decidió no explicitar «toward». En español se mantiene el topónimo sin ampliar más allá del texto base, dejando la nota como alternativa lexical.
- source_word: הַכְּסוּלֹת
  english_pob_choice: Chesulloth
  chosen_spanish: Chesullot
  alternatives_spanish:
  - Hesulot
  - Kesulot
  lexicon: HALOT
  rationale: Se translitera el topónimo con una forma cercana a la tradición inglesa POB, pero ajustada al español. Se evita convertirlo en palabra común o añadir artículo explícito no marcado en la lista de lugares.
- source_word: שׁוּנֵם
  english_pob_choice: Shunem
  chosen_spanish: Sunem
  alternatives_spanish:
  - Shunem
  lexicon: HALOT
  rationale: El nombre propio se adapta a la ortografía española habitual para nombres bíblicos, conservando la identificación del lugar.
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés eliminó «toward» porque el hebreo enumera lugares del borde territorial y no una dirección explícita; esta versión española sigue esa decisión y conserva una nota para la posibilidad direccional del topónimo.
  spanish_consistency_notes:
  - Se usa «frontera» para גְּבוּל en contexto de reparto territorial, coherente con el registro bíblico moderno y transparente.
  - Se mantiene transliteración de los nombres propios, con adaptación gráfica mínima al español («Sunem»).
  - No se introduce «Mesías», «SEÑOR» ni otros equivalentes no pertinentes al versículo.
