revisions:
- from: 'Entonces las tres compañías tocaron las trompetas y quebraron los cántaros. Sostuvieron las antorchas en su mano izquierda y las trompetas en su mano derecha para tocarlas[a], y gritaron: «¡Espada para Yahvé y para Gedeón!»'
  to: 'Entonces las tres compañías tocaron las trompetas y quebraron los cántaros. Sostuvieron las antorchas en sus manos izquierdas y las trompetas en sus manos derechas para hacerlas sonar[a], y gritaron: «¡Espada para Yahvé y para Gedeón!»'
  rationale: 'Se hicieron dos ajustes menores: (1) «para hacerlas sonar» aclara mejor el infinitivo de propósito לִתְקֹעַ en contexto de señal de guerra; (2) «sus manos izquierdas / derechas» suena más natural en español para el distributivo plural. El resto del borrador preserva fielmente el sentido fuente, la decisión terminológica sobre «Yahvé» y la nota alternativa documentada.'
