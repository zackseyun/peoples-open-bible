translation:
  language: es
  text: Él envió flechas y los dispersó; relámpagos[a], y los confundió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «y los desbarató», para ambos verbos que describen el efecto de las flechas y de los relámpagos sobre los enemigos de David.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: He sent
  chosen_spanish: envió
  alternatives_spanish:
  - lanzó
  - mandó
  lexicon: HALOT
  rationale: El hebreo שלח tiene el sentido general de 'enviar'. En este poema teofánico, 'envió' conserva la imagen sin forzar el mecanismo como si fuera estrictamente un verbo de disparo.
- source_word: חִצִּים
  english_pob_choice: arrows
  chosen_spanish: flechas
  alternatives_spanish:
  - arcos
  - dardos
  lexicon: HALOT
  rationale: חצים designa proyectiles bélicos; 'flechas' es el equivalente natural y claro en español, manteniendo la imagen concreta.
- source_word: וַיְפִיצֵם
  english_pob_choice: and scattered them
  chosen_spanish: los dispersó
  alternatives_spanish:
  - los esparció
  - los dispersó por todas partes
  lexicon: HALOT
  rationale: El causativo de פוץ/פצץ expresa dispersar o desbandar. 'Los dispersó' conserva la fuerza verbal y funciona con naturalidad en español.
- source_word: בָּרָק
  english_pob_choice: lightning
  chosen_spanish: relámpago
  alternatives_spanish:
  - fulgor
  - rayo
  lexicon: HALOT
  rationale: בָּרָק puede referirse al relámpago o destello de luz. 'Relámpago' mantiene la imagen breve y poética del texto.
- source_word: וַיְהֻמֵּם
  english_pob_choice: and threw them into confusion
  chosen_spanish: los llenó de confusión
  alternatives_spanish:
  - los confundió
  - los puso en desorden
  - los desbarató
  lexicon: HALOT
  rationale: המם expresa confundir, descomponer o poner en desorden. 'Los llenó de confusión' conserva el efecto causal y suena idiomático en español.
theological_decisions:
- issue: Referente de los sufijos pronominales en 'los dispersó' y 'los llenó de confusión'
  english_pob_reading: The pronouns refer to the enemies/opponents in the broader poetic context.
  chosen_spanish_reading: Los pronombres se entienden como referencia a los enemigos/oponentes del contexto poético amplio.
  alternative_spanish_readings:
  - Se pueden dejar implícitos en español, entendidos por el contexto.
  rationale: El hebreo exige un objeto pronominal; el contexto de guerra divina identifica naturalmente a los enemigos. No se trata de una cuestión doctrinal controvertida, sino de una decisión contextual para hacer explícito el referente.
  doctrine_reference: Contexto narrativo-poético de la guerra de Yahvé
- issue: Valor de בָּרָק en la cadena poética
  english_pob_reading: lightning
  chosen_spanish_reading: relámpago
  alternative_spanish_readings:
  - rayo
  - destello de relámpago
  rationale: La palabra puede denotar el fenómeno luminoso del relámpago; en español 'relámpago' preserva la imagen sin introducir una interpretación más técnica de 'rayo' como objeto material.
  doctrine_reference: Poética teofánica del Antiguo Testamento
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: mantiene la secuencia de acción bélica en estilo poético breve, conserva el referente contextual de los pronombres y no introduce revisiones no atestiguadas; no se requieren cambios respecto del pasaje fuente.'
  spanish_consistency_notes:
  - Se usa 'flechas' para חצים, en paralelo con el español bíblico moderno y sin perder la imaginería concreta.
  - '''Relámpago'' se eligió por claridad poética y fidelidad al fenómeno luminoso de בָּרָק.'
  - '''Los dispersó'' y ''los llenó de confusión'' mantienen la referencia a los enemigos implícitos en el contexto, coherente con el audit trail inglés.'
