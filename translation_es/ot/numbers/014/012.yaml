revisions:
- from: Yo los heriré con la peste y los desposeeré[a], y te convertiré en una nación más grande y más fuerte que ellos.
  to: Yo los heriré con la peste y los desheredaré[a], y haré de ti una nación más grande y más poderosa que ellos.
  rationale: Se ajusta el texto para mejorar la fidelidad léxica y la naturalidad del español. «Desheredaré» comunica con claridad el matiz de ירשׁ en este contexto y conserva en nota la alternativa de despojo/posesión. «Haré de ti» reproduce más directamente la construcción hebrea, y «más poderosa» encaja mejor con una nación que «más fuerte».
  reviewer_model: gpt-5.4
