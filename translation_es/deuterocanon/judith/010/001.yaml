translation:
  language: es
  text: Y sucedió que, cuando dejó de clamar al Dios de Israel y terminó todas estas palabras,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ ἐγένετο
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: BDAG
  rationale: La fórmula narrativa griega conserva el tono semítico/LXX de transición. «Y sucedió que» mantiene ese registro en español sin caer en un arcaísmo excesivo.
- source_word: ὡς
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - después de que
  - al
  lexicon: BDAG
  rationale: Aquí introduce la circunstancia temporal de la cláusula principal. «Cuando» es natural y preciso en español.
- source_word: ἐπαύσατο
  english_pob_choice: stopped
  chosen_spanish: dejó de
  alternatives_spanish:
  - cesó de
  - paró de
  lexicon: BDAG
  rationale: El verbo expresa el cese de la acción de orar o clamar. «Dejó de» comunica bien la interrupción sin sobrerrepresentar el matiz.
- source_word: βοῶσα
  english_pob_choice: crying out
  chosen_spanish: clamar
  alternatives_spanish:
  - gritar
  - dar voces
  lexicon: BDAG
  rationale: El participio describe un ruego vocal intenso dirigido a Dios. «Clamar» preserva esa fuerza devocional mejor que un simple «llamar» o «gritar».
- source_word: πρὸς τὸν θεὸν Ἰσραήλ
  english_pob_choice: to the God of Israel
  chosen_spanish: al Dios de Israel
  alternatives_spanish:
  - al Dios de Israel
  - al Dios que es de Israel
  lexicon: BDAG
  rationale: La construcción griega mantiene el título bíblico-covenantal. «Al Dios de Israel» reproduce esa forma establecida en español y conserva el peso teológico del nombre.
- source_word: συνετέλεσεν
  english_pob_choice: finished
  chosen_spanish: terminó
  alternatives_spanish:
  - concluyó
  - completó
  lexicon: BDAG
  rationale: El verbo señala que dio por concluida la expresión. «Terminó» es claro y natural; «concluyó» sería más formal, pero menos inmediato.
- source_word: πάντα τὰ ῥήματα ταῦτα
  english_pob_choice: all these words
  chosen_spanish: todas estas palabras
  alternatives_spanish:
  - todo esto que dijo
  - todas estas declaraciones
  lexicon: BDAG
  rationale: «Palabras» sigue de cerca el sustantivo griego ῥήματα y conserva la transparencia textual. En español puede sonar un poco formal, pero es fiel al vínculo con el discurso precedente.
theological_decisions:
- issue: Título divino πρὸς τὸν θεὸν Ἰσραήλ
  english_pob_reading: the God of Israel
  chosen_spanish_reading: el Dios de Israel
  alternative_spanish_readings:
  - Israel's God
  - el Dios de los israelitas
  rationale: Se conserva el título bíblico completo, sin sustituirlo por una perífrasis más explicativa. Esto respeta la resonancia de alianza y la formulación del griego.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; readable modern Spanish without flattening theological weight.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y no requieren revisión adicional; se ha mantenido la estructura narrativa y el cierre del discurso con una equivalencia óptima en español.
  spanish_consistency_notes:
  - Se conserva el nombre divino genérico como «Dios» y el título completo «de Israel» sin abreviarlo.
  - Se optó por «clamar» para captar la intensidad orante de βοῶσα, en lugar de un simple «gritar» que podría sonar menos devocional.
  - «Palabras» reproduce la transparencia de ῥήματα y mantiene la conexión con el discurso previo.
