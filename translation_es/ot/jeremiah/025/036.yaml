review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y la línea de la POB inglesa: conserva la metáfora de pastores/rebaño, usa Yahvé para יְהוָה, y expresa adecuadamente la relación causal de כִּי. Sin embargo, los marcadores de notas al pie están invertidos respecto del contenido: la nota léxica sobre ''los poderosos/nobles del rebaño'' debe anclarse en ''líderes del rebaño'', no en ''pastores''; y la nota cultural sobre la metáfora pastor/rebaño debe anclarse también en esa misma imagen o frase pertinente, no en ''líderes'' si la otra nota ocupa ese marcador sin distinción. Además, ''su pastura'' es comprensible pero algo menos natural que ''sus pastos'' o ''su pastizal'' en español general.'
  spanish_quality_summary: 'El español es claro, digno y bastante natural. ''El sonido del clamor...'' suena aceptable, aunque ligeramente pesado; ''Se oye el clamor...'' sería más idiomático, pero no es necesario para fidelidad. El ajuste importante es técnico y de legibilidad editorial: corregir la ubicación y numeración de las notas. También conviene evitar ''pastura'' por ser menos usual en registro bíblico general latinoamericano; ''sus pastos'' conserva bien la imagen y fluye mejor.'
  glossary_alignment: 'Buen alineamiento con el glosario del proyecto: יְהוָה → ''Yahvé''; הָרֹעִים → ''pastores''; metáfora preservada sin aplanarla a ''gobernantes''. ''Líderes del rebaño'' es una opción válida para אַדִּירֵי הַצֹּאן, con alternativas léxicas correctamente documentadas. No hay conflicto teológico sustantivo.'
  issues:
  - severity: high
    issue: Los marcadores de notas al pie no corresponden a las frases correctas.
    rationale: La nota 'O los poderosos del rebaño / los nobles del rebaño' comenta אַדִּירֵי הַצֹּאן, no 'pastores'. Tal como está, el marcador [a] en 'pastores' induce a error. Cada nota debe anclarse en la expresión pertinente del texto.
  - severity: medium
    issue: '''su pastura'' es menos natural en español general.'
    rationale: Aunque es defendible léxicamente, 'pastura' suena algo técnica o regional. 'Sus pastos' comunica mejor מַרְעִיתָם en español ampliamente legible y mantiene la imagen pastoril.
  revised_spanish_text: El sonido del clamor de los pastores, y el lamento de los líderes del rebaño[a][b], porque Yahvé está devastando sus pastos.
