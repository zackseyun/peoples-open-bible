translation:
  language: es
  text: Entonces[a] recordaré mi pacto con Jacob, y también mi pacto con Isaac, y también mi pacto con Abraham recordaré; y recordaré la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y recordaré». La conjunción hebrea puede traducirse simplemente «y»; «entonces» refleja la conexión del versículo con el contexto anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְזָכַרְתִּי
  english_pob_choice: Then I will remember
  chosen_spanish: Entonces recordaré
  alternatives_spanish:
  - Y recordaré
  lexicon: HALOT
  rationale: זכר en contextos de pacto no es solo recordar mentalmente, sino recordar con intención de actuar; aun así, la formulación base sigue siendo «recordar». «Entonces» reproduce la relación discursiva con el contexto anterior, como en el inglés POB, sin añadir una paráfrasis interpretativa excesiva.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  lexicon: HALOT
  rationale: «Pacto» expresa con claridad el término bíblico בְּרִית en español y conserva su peso teológico y jurídico. «Alianza» es posible, pero «pacto» queda más cercano al uso técnico habitual en traducción bíblica.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio estándar en español.
- source_word: וְאַף
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - y aun
  - también
  lexicon: HALOT
  rationale: אַף añade continuidad y énfasis. «Y también» preserva ambos valores sin endurecer el ritmo del versículo ni borrar la repetición enfática del hebreo.
- source_word: יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: Isaac
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio estándar en español.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  lexicon: Nombre propio
  rationale: Se conserva el nombre propio estándar en español.
- source_word: אֶזְכֹּר
  english_pob_choice: I will remember
  chosen_spanish: recordaré
  alternatives_spanish:
  - me acordaré
  - volveré a recordar
  lexicon: HALOT
  rationale: El verbo se repite para dar peso retórico. «Recordaré» mantiene esa repetición natural en español; «me acordaré» sonaría más coloquial y menos apto para registro bíblico solemne.
- source_word: וְהָאָרֶץ
  english_pob_choice: and the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: En este contexto de pacto, אֶרֶץ apunta a la tierra prometida. «La tierra» es la forma más fiel y sobria en español, sin introducir una glosa explícita que el texto no dice.
theological_decisions:
- issue: Orden de los patriarcas y repetición de «mi pacto»
  english_pob_reading: Retain the Hebrew order Jacob, Isaac, Abraham and preserve the repeated 'my covenant' phrasing.
  chosen_spanish_reading: Mantener el orden Jacob, Isaac, Abraham y conservar la repetición de «mi pacto».
  alternative_spanish_readings:
  - Abraham, Isaac y Jacob
  - mi pacto con Abraham, Isaac y Jacob
  rationale: El hebreo presenta deliberadamente el orden Jacob, Isaac, Abraham y repite la fórmula del pacto. Mantener esa secuencia evita armonizar el texto con la fórmula cronológicamente más familiar y preserva el énfasis retórico.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de la memoria divina
  english_pob_reading: Render as 'remember' without expanding to 'act on' or 'renew.'
  chosen_spanish_reading: Traducir como «recordaré» sin expandir a «actuaré conforme a ello» o «renovaré».
  alternative_spanish_readings:
  - tendré presente y actuaré
  - renovaré mi pacto
  rationale: Aunque el recordar divino implica acción en el marco del pacto, el texto dice «recordar». Conservar esa forma mantiene la tensión lexical y evita explicitar más de lo que el hebreo expresa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no hubo cambios sustantivos en el texto fuente ni en la decisión de conservar el orden hebreo, la repetición de «recordaré» y la referencia a la tierra.'
  spanish_consistency_notes:
  - Se mantiene «pacto» de manera uniforme para בְּרִית, en coherencia con el registro técnico bíblico.
  - «Entonces» se usa solo para reflejar la progresión discursiva; la nota aclara la alternativa más literal «y».
  - «La tierra» conserva el valor covenantal de אֶרֶץ sin añadir una glosa interpretativa.
  - La repetición de «recordaré» se preserva para reproducir el relieve retórico del hebreo.
