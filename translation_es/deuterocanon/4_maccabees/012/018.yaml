    issue: «mi nación» suena demasiado moderna/estatal para τῷ γένει μου en este contexto
    rationale: Aunque la revisión inglesa optó por «my nation», el campo semántico de γένος aquí apunta al pueblo judío como colectividad. En español bíblico y eclesial, «mi pueblo» comunica mejor esa solidaridad corporativa sin estrecharla a familia ni cargarla con connotaciones modernas de Estado-nación.
