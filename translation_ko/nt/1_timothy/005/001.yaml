id: 1TI.5.1
reference: 1 Timothy 5:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Πρεσβυτέρῳ μὴ ἐπιπλήξῃς, ἀλλὰ παρακάλει ὡς πατέρα, νεωτέρους ὡς ἀδελφούς,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/005/001.yaml
  text: Do not rebuke an older man[a], but appeal to him as a father, and to younger men as brothers,
  footnotes:
  - marker: a
    text: Or 'Do not sharply rebuke an elder'; the Greek term can mean either 'older man' or 'elder,' but the age-based contrast in this context favors 'older man.'
    reason: alternative_reading
translation:
  language: ko
  text: 연장자[a]를 호되게 꾸짖지 말고, 도리어 아버지를 대하듯 권하십시오. 젊은이들은 형제처럼,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「장로」. 헬라어 πρεσβύτερος는 「연장자」 또는 「장로」를 가리킬 수 있으나, 본 문맥의 나이 대비(연장자/젊은이)는 「연장자」를 지지한다.
    reason: alternative_reading
lexical_decisions:
- source_word: Πρεσβυτέρῳ
  english_pob_choice: an older man
  chosen_korean: 연장자
  alternatives_korean:
  - 어르신
  - 장로
  lexicon: BDAG
  rationale: 본 절은 나이 대비(연장자/젊은이) 문맥이므로 「연장자」가 자연스럽다. 17절·19절의 πρεσβύτερος는 교회 직제(장로)로 옮긴다.
- source_word: μὴ ἐπιπλήξῃς
  english_pob_choice: Do not rebuke
  chosen_korean: 호되게 꾸짖지 말고
  alternatives_korean:
  - 모질게 책망하지 말고
  - 거세게 비난하지 말고
  lexicon: BDAG
  rationale: ἐπιπλήσσω는 「강하게 책망」. 「호되게 꾸짖다」가 그 어감을 살린다.
- source_word: παρακάλει ὡς πατέρα
  english_pob_choice: appeal to him as a father
  chosen_korean: 아버지를 대하듯 권하십시오
  alternatives_korean:
  - 아버지에게 하듯 권면하십시오
  - 아버지처럼 호소하십시오
  lexicon: BDAG
  rationale: παρακαλέω의 「권면·간곡한 요청」.
- source_word: νεωτέρους ὡς ἀδελφούς
  english_pob_choice: younger men as brothers
  chosen_korean: 젊은이들은 형제처럼
  alternatives_korean:
  - 젊은이들에게는 형제에게 하듯
  lexicon: BDAG
  rationale: 2절과 묶인 문장 구조이므로 「~처럼」으로 연결.
