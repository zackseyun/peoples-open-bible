translation:
  language: es
  text: 'Entonces se levantaron contra los que venían del ejército unos hombres de entre los jefes de los hijos de Efraín[a]: Azarías hijo de Jehohanán, Berequías hijo de Mesillemot, Ezequías hijo de Salum y Amasá hijo de Hadlai.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de entre los jefes de los efraimitas». El hebreo dice literalmente «de las cabezas de los hijos de Efraín».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקֻמוּ
  english_pob_choice: stood up
  chosen_spanish: se levantaron
  alternatives_spanish:
  - se pusieron de pie
  - se alzaron
  lexicon: HALOT
  rationale: El hebreo marca una acción decisiva y, en contexto, también una toma de posición. «Se levantaron» conserva el movimiento narrativo sin forzar una lectura demasiado interpretativa.
- source_word: אֲנָשִׁים
  english_pob_choice: some men
  chosen_spanish: unos hombres
  alternatives_spanish:
  - hombres
  - algunos hombres
  lexicon: HALOT
  rationale: La forma indefinida introduce a un grupo dentro de los líderes de Efraín. «Unos hombres» reproduce bien esa indefinición y suena natural en español.
- source_word: מֵרָאשֵׁי בְנֵי אֶפְרַיִם
  english_pob_choice: from the heads of the sons of Ephraim
  chosen_spanish: de los jefes de los hijos de Efraín
  alternatives_spanish:
  - de los cabezas de los hijos de Efraín
  - de los jefes de los efraimitas
  lexicon: HALOT
  rationale: Se mantiene la estructura hebrea con «jefes» para רָאשֵׁי y «hijos de Efraín» para la construcción étnica. «Jefes» es más idiomático que una traducción literal de «cabezas» y conserva el valor de liderazgo reconocido.
- source_word: עֲזַרְיָהוּ ... בֶּרֶכְיָהוּ ... יְחִזְקִיָּהוּ ... עֲמָשָׂא
  english_pob_choice: Azariah ... Berechiah ... Hezekiah ... Amasa
  chosen_spanish: Azarías ... Berequías ... Ezequías ... Amasá
  alternatives_spanish:
  - Azarías ... Berecías ... Ezequías ... Amasa
  lexicon: standard transliteration conventions
  rationale: Los nombres propios se transliteran al español según uso bíblico común y legibilidad eclesial, sin traducirlos.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  lexicon: HALOT
  rationale: Renderización patronímica estándar y transparente en español.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - frente a
  - en oposición a
  lexicon: HALOT
  rationale: Aquí עַל con קום expresa oposición/confrontación. «Contra» reproduce directamente esa relación sin suavizarla.
- source_word: הַבָּאִים
  english_pob_choice: those coming
  chosen_spanish: los que venían
  alternatives_spanish:
  - los que iban llegando
  - los que estaban llegando
  lexicon: HALOT
  rationale: El participio sustantivado expresa a un grupo en desplazamiento. «Los que venían» es natural en español y preserva la fuerza de movimiento.
- source_word: מִן הַצָּבָא
  english_pob_choice: from the army
  chosen_spanish: del ejército
  alternatives_spanish:
  - de la tropa
  - de la campaña
  lexicon: HALOT
  rationale: En este contexto militar, «ejército» es la forma más clara y directa para צָבָא. Mantiene el sentido de los hombres que regresaban de la expedición militar.
translation_notes:
  revision_awareness: 'La redacción española sigue el estado textual auditado del POB inglés: no se registran revisiones aplicadas ni cambios de sentido en el pasaje, y la traducción inglesa vigente se mantiene estable.'
  spanish_consistency_notes:
  - Se usa «hijos de Efraín» de manera consistente con la estructura hebrea y con el tratamiento del POB inglés.
  - Los nombres propios se adaptan a formas bíblicas usuales en español para facilitar lectura pública sin perder identificabilidad.
  - Se mantiene el contraste narrativo de oposición con «contra», acorde con el valor contextual de עַל en este versículo.
