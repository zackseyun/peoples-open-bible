translation:
  language: es
  text: Y algunos de tus hijos, que saldrán de ti, que tú engendrarás, serán llevados, y serán eunucos[a] en el palacio del rey de Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oficiales de la corte» o «oficiales del palacio»; el término hebreo puede referirse tanto a eunucos literales como, en algunos contextos, a funcionarios reales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִבָּנֶיךָ
  english_pob_choice: And some of your sons
  chosen_spanish: Y de tus hijos
  alternatives_spanish:
  - Y de algunos de tus hijos
  - Y de tus descendientes
  lexicon: HALOT
  rationale: La forma partitiva con מִ y «hijos» se puede expresar naturalmente en español con «de tus hijos». El contexto ya limita el alcance a una parte de ellos, así que no es necesario añadir «algunos» en el texto principal. Se conserva «hijos» porque el hebreo dice específicamente בָּנִים, no un término más general como «descendientes».
- source_word: אֲשֶׁר יֵצְאוּ מִמְּךָ
  english_pob_choice: who will come from you
  chosen_spanish: que saldrán de ti
  alternatives_spanish:
  - que procederán de ti
  - que vendrán de ti
  lexicon: HALOT
  rationale: El hebreo usa la imagen de «salir de» como modo idiomático de indicar descendencia biológica. «Saldrán de ti» conserva esa imagen de manera natural en español y evita sobreinterpretar con «nacerán», que sería más explícito de lo que pide el hebreo.
- source_word: אֲשֶׁר תּוֹלִיד
  english_pob_choice: whom you will father
  chosen_spanish: y que tú engendrarás
  alternatives_spanish:
  - y que tú tendrás
  - y que tú concebirás
  lexicon: HALOT
  rationale: El verbo causativo de ילד se refiere aquí al acto de engendrar como padre. «Engendrarás» preserva esa fuerza paternante mejor que «tendrás», que sería más general, y evita una paráfrasis excesiva.
- source_word: יִקַּח
  english_pob_choice: will be taken
  chosen_spanish: serán llevados
  alternatives_spanish:
  - serán tomados
  - los llevarán
  lexicon: HALOT
  rationale: 'Aunque la forma hebrea es singular e impersonal, el sentido en contexto es pasivo: los hijos serán trasladados por otros. «Serán llevados» comunica ese valor sin introducir un sujeto no expresado. «Tomados» sería menos idiomático en español.'
- source_word: סָרִיסִים
  english_pob_choice: eunuchs
  chosen_spanish: eunucos
  alternatives_spanish:
  - oficiales de la corte
  - oficiales del palacio
  lexicon: HALOT
  rationale: Se mantiene el sentido literal principal, que en este contexto de príncipes llevados a la corte babilónica es plenamente plausible y conserva la dureza del juicio. Las alternativas oficiales/cortesanos siguen siendo posibles en otros contextos, pero no se adoptan en el texto principal.
- source_word: בְּהֵיכַל
  english_pob_choice: in the palace
  chosen_spanish: en el palacio
  alternatives_spanish:
  - en el templo
  - en la corte
  lexicon: HALOT
  rationale: Con «rey de Babilonia» como complemento inmediato, היכל se entiende como residencia real, no como templo. «Palacio» es la equivalencia española más clara.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: of the king of Babylon
  chosen_spanish: del rey de Babilonia
  alternatives_spanish:
  - del rey babilónico
  lexicon: HALOT
  rationale: Se traduce de forma directa y transparente la cadena constructa. «De Babilonia» es la forma idiomática más clara en español.
theological_decisions:
- issue: Sentido de סָרִיסִים
  english_pob_reading: literal 'eunuchs' in the main text, with a note preserving 'court officials' / 'palace officials' as an alternative
  chosen_spanish_reading: «eunucos» en el texto principal, con nota que conserva la alternativa «oficiales de la corte» / «oficiales del palacio»
  alternative_spanish_readings:
  - oficiales de la corte
  - oficiales del palacio
  rationale: La ambigüedad léxica del término debe mantenerse visible. En este contexto, el sentido literal es fuerte y transmite la gravedad del anuncio, pero la posibilidad de funcionarios cortesanos también existe en el hebreo. Por eso se conserva «eunucos» en el cuerpo del texto y la alternativa se documenta en nota.
  doctrine_reference: Translation philosophy §3 (Preserve tension rather than resolving it prematurely)
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios adicionales; este borrador sigue el consenso alto del contexto auditado y mantiene la decisión principal de traducir סָרִיסִים literalmente, con la alternativa léxica preservada en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca, aunque este versículo no lo contiene.
  - Se usa «Babilonia» en lugar de «Babilón» para la forma normal del nombre propio en español bíblico contemporáneo.
  - Se conserva un registro sobrio y bíblico sin caer en calcos innecesarios del inglés.
