translation:
  language: es
  text: Y desbarataré el plan[a] de Judá y de Jerusalén en este lugar, y haré que caigan a espada delante de sus enemigos y por mano de los que buscan su vida[b]; y daré sus cadáveres como alimento para las aves del cielo[c] y para las bestias de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el consejo de Judá y de Jerusalén».
    reason: lexical_alternative
  - marker: b
    text: Hebreo: «los que buscan su vida», es decir, los que buscan quitarles la vida.
    reason: lexical_alternative
  - marker: c
    text: O «las aves del firmamento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַקֹּתִי
  english_pob_choice: I will frustrate
  chosen_spanish: desbarataré
  alternatives_spanish:
  - frustraré
  - anularé
  - haré ineficaz
  lexicon: HALOT
  rationale: בקק en sentido causativo expresa volver inútil o vaciar un plan; «desbarataré» comunica bien en español la idea de hacer fracasar el propósito sin perder la fuerza activa del hebreo.
- source_word: עֲצַת
  english_pob_choice: the plan
  chosen_spanish: el plan
  alternatives_spanish:
  - el consejo
  - la estrategia
  lexicon: HALOT
  rationale: La POB inglesa eligió «plan» por claridad moderna. En español, «plan» es natural y conserva la idea de propósito o designio frustrado; «consejo» queda como alternativa semántica, pero suena más restringida aquí.
- source_word: יְהוּדָה וִירוּשָׁלַם
  english_pob_choice: Judah and Jerusalem
  chosen_spanish: de Judá y de Jerusalén
  alternatives_spanish:
  - de Judá y Jerusalén
  lexicon: N/A
  rationale: 'Se mantienen los dos referentes como en el texto fuente: el reino/territorio y la capital. La repetición de «de» en español ayuda a la fluidez sin borrar la coordinación original.'
- source_word: בַּמָּקוֹם הַזֶּה
  english_pob_choice: in this place
  chosen_spanish: en este lugar
  alternatives_spanish:
  - en este sitio
  - en este mismo lugar
  lexicon: HALOT
  rationale: «En este lugar» reproduce la fuerza deíctica de הַזֶּה y es una solución natural en español bíblico contemporáneo.
- source_word: וְהִפַּלְתִּים
  english_pob_choice: I will make them fall
  chosen_spanish: haré que caigan
  alternatives_spanish:
  - los haré caer
  - haré que caigan en
  lexicon: HALOT
  rationale: El hifil de נפל es causativo; «haré que caigan» preserva esa causatividad de manera clara y menos interpretativa que «los mataré» o «los derribaré».
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: a espada
  alternatives_spanish:
  - por la espada
  - con la espada
  lexicon: HALOT
  rationale: En español, «caer a espada» es una formulación bíblica natural y compacta para la muerte violenta por arma de guerra, conservando el valor instrumental del hebreo.
- source_word: לִפְנֵי אֹיְבֵיהֶם
  english_pob_choice: before their enemies
  chosen_spanish: delante de sus enemigos
  alternatives_spanish:
  - en presencia de sus enemigos
  lexicon: HALOT
  rationale: «Delante de» mantiene la relación espacial de לִפְנֵי y suena más directo en español que «en presencia de».
- source_word: וּבְיַד מְבַקְשֵׁי נַפְשָׁם
  english_pob_choice: and by the hand of those who seek their life
  chosen_spanish: por mano de los que buscan su vida
  alternatives_spanish:
  - por mano de los que buscan quitársela
  - por mano de los que buscan matarlos
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo «buscar la vida», que la POB inglesa también preservó con nota. «Por mano de» reproduce el instrumento/agencia; «buscan su vida» deja visible la expresión semítica y su tensión con el sentido de intentar matarlos.
- source_word: וְנָתַתִּי
  english_pob_choice: and I will give
  chosen_spanish: y daré
  alternatives_spanish:
  - y entregaré
  - y pondré
  lexicon: HALOT
  rationale: «Dar» es suficientemente amplio para introducir el resultado humillante que sigue, sin añadir una lectura más específica que el hebreo no exige.
- source_word: נִבְלָתָם
  english_pob_choice: their corpses
  chosen_spanish: sus cadáveres
  alternatives_spanish:
  - sus cuerpos muertos
  - sus despojos
  lexicon: HALOT
  rationale: נְבֵלָה designa un cuerpo muerto, a menudo con matiz de deshonra. «Cadáveres» es natural en español y conserva esa crudeza.
- source_word: לְמַאֲכָל
  english_pob_choice: as food
  chosen_spanish: como alimento
  alternatives_spanish:
  - para alimento
  - como comida
  lexicon: HALOT
  rationale: «Como alimento» reproduce bien el valor predicativo de לְמַאֲכָל y mantiene el tono elevado del pasaje.
- source_word: לְעוֹף הַשָּׁמַיִם
  english_pob_choice: to the birds of the heavens
  chosen_spanish: para las aves del cielo
  alternatives_spanish:
  - para las aves de los cielos
  - para las aves del cielo
  lexicon: HALOT
  rationale: La POB inglesa mantiene la imagen solemne; en español, «aves del cielo» es idiomático y digno. «Aves» funciona mejor que «pájaros» en registro profético.
- source_word: וּלְבֶהֱמַת הָאָרֶץ
  english_pob_choice: and to the beasts of the earth
  chosen_spanish: y para las bestias de la tierra
  alternatives_spanish:
  - y para los animales de la tierra
  - y para las fieras de la tierra
  lexicon: HALOT
  rationale: «Bestias de la tierra» conserva el paralelismo poético y el registro solemne del hebreo; «bestias» en este contexto no es peyorativo sino zoológico/profético.
theological_decisions:
- issue: Agencia divina en el juicio
  english_pob_reading: Retained the first-person sequence ('I will frustrate... I will make them fall... I will give') as direct divine action in judgment.
  chosen_spanish_reading: 'Se conserva la cadena de primera persona divina: «desbarataré... haré que caigan... daré».'
  alternative_spanish_readings:
  - «permitiré que caigan... »
  - «los dejaré caer...»
  rationale: El hebreo presenta acciones directas de Yahvé en juicio. La traducción no atenúa la agencia ni la convierte en mera permisividad, porque eso debilitaría la solemnidad y el peso teológico del texto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Preservación del modismo 'buscar la vida'
  english_pob_reading: Hebrew 'those who seek their life,' that is, those who seek to kill them.
  chosen_spanish_reading: «los que buscan su vida» se mantiene como modismo transparente, con la carga implícita de buscar quitarles la vida.
  alternative_spanish_readings:
  - «los que buscan matarlos»
  - «los que buscan quitársela»
  rationale: La POB inglesa conserva la expresión hebrea y la aclara en nota. En español conviene mantenerla para no borrar el giro semítico, pero el lector recibe el sentido por el contexto inmediato de violencia.
  doctrine_reference: HALOT; principles of source transparency
- issue: Imágenes de aves y bestias
  english_pob_reading: '''the birds of the heavens'' and ''the beasts of the earth''.'
  chosen_spanish_reading: «las aves del cielo» y «las bestias de la tierra».
  alternative_spanish_readings:
  - «las aves de los cielos»
  - «los animales de la tierra»
  rationale: Se conserva el paralelismo poético y la imaginería de humillación postmortem. «Aves» y «bestias» reflejan mejor el tono profético que alternativas más genéricas.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Revisado contra el paquete fuente hebreo y la auditoría inglesa de la POB. No se detectaron cambios posteriores necesarios; la versión española sigue de cerca las decisiones léxicas ya validadas, manteniendo la tensión entre «plan/consejo», la expresión semítica «buscar su vida» y el paralelismo solemne de «aves/bestias».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; en este versículo no aparece.
  - Se mantuvo «desbarataré» para conservar la fuerza de בקק sin caer en una paráfrasis excesiva.
  - «Cadáveres» se eligió por registro y por la carga deshonrosa implícita en נִבְלָה.
  - El paralelismo final se mantuvo con dos miembros coordinados y registro elevado.
  - Se evitó «SEÑOR» porque no hay nombre divino en este versículo y el proyecto pide transparencia cuando aparezca YHWH.
