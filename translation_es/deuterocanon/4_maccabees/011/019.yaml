    rationale: Hay incoherencia interna entre texto y nota. La nota debe corresponder a una forma realmente presente en la línea española.
  revised_spanish_text: Y después de calentar afilados espetones[a], los aplicaban a su espalda; y, tras atravesarle los costados, le quemaban las entrañas a partir de él[b].
