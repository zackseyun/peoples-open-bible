review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: Yahvé como sujeto enfático, los participios de escrutinio interior, y la retribución individual según el camino y el fruto de las acciones. Sin embargo, se aparta del audit trail léxico en un punto importante: כְּלָיוֹת fue preservado literalmente como ''kidneys'' en el POB inglés por razones de auditabilidad, mientras que el español lo interpretó como ''entrañas'' en el texto principal. Eso debilita la transparencia al original. También conviene mejorar la nota para que el anclaje corresponda al término marcado.'
  spanish_quality_summary: El español es claro, digno y eclesialmente legible. 'Yo, Yahvé, escruto el corazón' suena natural y fiel. 'A cada hombre' y 'según su camino' también funcionan bien. El principal ajuste de calidad es usar 'riñones' en el texto, pese a su extrañeza, porque aquí la rareza es deliberada y se explica con nota; en este contexto sigue siendo comprensible para lectores bíblicos si se aclara el modismo.
  glossary_alignment: '''Yahvé'' sigue correctamente la política del proyecto para יהוה. ''Corazón'' preserva לֵב. ''A cada hombre'' mantiene la decisión documentada para לְאִישׁ. El punto de desalineación es כְּלָיוֹת: el proyecto inglés decidió retener el término corporal concreto; por tanto el español debe preferir ''riñones'' con nota, no ''entrañas'' en el texto principal.'
  issues:
  - severity: medium
    issue: Se tradujo כְּלָיוֹת como 'entrañas' en vez de mantener el término corporal concreto.
    rationale: El audit trail inglés justificó explícitamente conservar la literalidad de 'kidneys' en el texto principal por transparencia al hebreo y por la imagen antropológica semítica. 'Entrañas' interpreta el sentido, pero ya no preserva la misma auditabilidad.
  - severity: low
    issue: La nota [a] está anclada en 'entrañas' pero explica 'riñones'.
    rationale: Esto crea una leve incongruencia entre texto y nota. Si el texto se corrige a 'riñones', la nota queda alineada con el original y con la explicación cultural.
  revised_spanish_text: Yo, Yahvé, escruto el corazón y examino los riñones[a], para dar a cada hombre[b] según su camino, según el fruto de sus obras.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: ‘riñones’, un modismo para lo más profundo de los pensamientos y afectos.'
    reason: cultural_note
  - marker: b
    text: O ‘a cada persona’; el hebreo usa una forma masculina singular con fuerza representativa.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'entrañas' por 'riñones' para seguir la decisión léxica documentada del POB de conservar el lenguaje corporal concreto de כְּלָיוֹת en el texto principal, usando una nota para aclarar su valor idiomático. El resto del borrador puede mantenerse.
