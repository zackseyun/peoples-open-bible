translation:
  language: es
  text: 'Así dice el rey: No dejen que Ezequías los engañe[a], porque no podrá librarlos de su mano[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los desvíe». El verbo hebreo puede significar llevar por mal camino o engañar.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «de su mano», un modismo para estar bajo el poder de alguien. El paralelo en Isaías 36:14 dice «de mi mano».
    reason: textual_variant
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Esto dice
  lexicon: HALOT
  rationale: Introduce una fórmula solemne de proclamación real; «Así» conserva el tono elevado sin sonar forzado en español.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: 'Aunque el hebreo está en perfecto, la fórmula de anuncio formal en español fluye naturalmente en presente: «Así dice...».'
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  lexicon: HALOT
  rationale: Refleja el título indefinido de la fórmula hebrea sin añadir el nombre propio, como en el texto fuente.
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: No dejen que
  alternatives_spanish:
  - No permitan que
  - No se dejen
  lexicon: HALOT
  rationale: En español, la prohibición con el causativo de «engañar» se expresa con naturalidad como «No dejen que...»; conserva el carácter exhortativo dirigido al plural.
- source_word: יַשִּׁיא
  english_pob_choice: let Hezekiah deceive you
  chosen_spanish: los engañe
  alternatives_spanish:
  - los desvíe
  - los extravíe
  lexicon: HALOT
  rationale: El verbo hebreo puede abarcar «desviar/engañar»; «engañe» preserva la acusación de falsedad que articula el portavoz asirio, sin debilitarla.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición; «porque» es directo y claro en español.
- source_word: לֹא יוּכַל
  english_pob_choice: he will not be able
  chosen_spanish: no podrá
  alternatives_spanish:
  - no puede
  - no será capaz de
  lexicon: HALOT
  rationale: Preserva la idea modal de incapacidad futura expresada por el imperfecto hebreo.
- source_word: לְהַצִּיל
  english_pob_choice: to deliver
  chosen_spanish: librarlos
  alternatives_spanish:
  - rescatarlos
  - salvarlos
  lexicon: HALOT
  rationale: En contexto bélico-político, «librar» comunica bien la acción de sacar de peligro; mantiene la fuerza de הציל sin cargar un matiz exclusivamente soteriológico.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - les
  lexicon: HALOT
  rationale: El plural de segunda persona queda señalado por el contexto; en español de registro neutral se vierte con el complemento directo átono correspondiente al objeto plural masculino genérico.
- source_word: מִיָּדוֹ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su poder
  - de su autoridad
  lexicon: HALOT
  rationale: Se conserva el hebraísmo imagístico de «mano» por ser una idiomática transparente de poder/dominio y porque el texto base leído aquí tiene sufijo de tercera persona singular.
theological_decisions:
- issue: Valor del idiomático "from his hand" en מִיָּדוֹ
  english_pob_reading: Rendered literally as 'from his hand,' referring to the king just mentioned.
  chosen_spanish_reading: «de su mano», manteniendo el idiomático de poder personal del rey mencionado.
  alternative_spanish_readings:
  - de su poder
  - de su autoridad
  - de su mano (como poder)
  rationale: El texto hebreo recibido dice literalmente «de su mano»; se preserva esa imagen, que en español comunica autoridad o dominio sin armonizar con la variante paralela de Isaías.
  doctrine_reference: Principio de primacía del texto fuente y consistencia con el testimonio hebreo recibido.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior eliminando cualquier marcador no anclado: solo aparecen [a] y [b] en el texto, y ambas notas están ligadas a esas marcas. La redacción sigue de cerca el hebreo recibido y el auditable English POB, sin armonizar con Isaías 36:14.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en este proyecto cuando el texto hebreo explicita el nombre divino; aquí no aparece.
  - Se mantiene «mano» como idiomático de poder, siguiendo el hebreo literal.
  - Se eligió «Ezequías» como forma española estándar del nombre propio.
  - Se evitó «siervo»/«Cristo»/«SEÑOR» porque no corresponden a este versículo ni al hebreo dado.
