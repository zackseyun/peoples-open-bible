translation:
  language: es
  text: Yahvé[a], tu amor constante está en los cielos; tu fidelidad alcanza las nubes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu amor constante llega hasta los cielos»; el hebreo puede entenderse como expresión de alcance, no solo de ubicación.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa el nombre propio divino, no un título. En español de este proyecto se mantiene 'Yahvé' como forma directa y auditable, en lugar de ocultarlo con 'SEÑOR'. Como el verso está en vocativo, no se añade 'Oh' en el texto principal para evitar una duplicación estilística innecesaria; el llamado directo queda claro por la posición inicial.
- source_word: בְּהַשָּׁמַיִם
  english_pob_choice: is in the heavens
  chosen_spanish: está en los cielos
  alternatives_spanish:
  - está en los cielos
  - está en el cielo
  - llega hasta los cielos
  lexicon: HALOT
  rationale: La preposición ב con 'los cielos' es naturalmente locativa. En español, 'está en los cielos' conserva la localización y respeta el plural hebreo; 'en el cielo' suaviza demasiado el plural, y 'llega hasta' introduciría una lectura de extensión que aquí no es la opción principal del texto base.
- source_word: חַסְדֶּךָ
  english_pob_choice: your steadfast love
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu misericordia
  - tu amor constante
  - tu amor leal
  - tu fidelidad
  lexicon: HALOT
  rationale: חֶסֶד tiene un campo semántico de lealtad pactal y amor firme. En español, 'misericordia' no agota el término, pero es una opción tradicional y clara; se deja constancia de que 'amor constante' o 'amor leal' reflejarían mejor la fuerza relacional del hebreo. Dado el paralelismo poético con 'fidelidad', esta elección mantiene fluidez sin perder la dimensión bondadosa del término.
- source_word: אֱמוּנָתְךָ
  english_pob_choice: your faithfulness
  chosen_spanish: tu fidelidad
  alternatives_spanish:
  - tu fidelidad
  - tu fe
  - tu verdad
  - tu constancia
  lexicon: HALOT
  rationale: אֱמוּנָה aquí expresa fiabilidad, estabilidad y lealtad. 'Fidelidad' es la correspondencia más natural y precisa en español para este sentido, y preserva el paralelismo con el primer hemistiquio.
- source_word: עַד
  english_pob_choice: reaches to
  chosen_spanish: alcanza hasta
  alternatives_spanish:
  - alcanza hasta
  - llega hasta
  - se extiende hasta
  lexicon: HALOT
  rationale: El hebreo marca extensión. En español, 'alcanza hasta' reproduce bien la idea de alcance poético sin sonar rígido, y mantiene abierta la alternativa de lectura extensiva que el audit trail inglés señaló.
- source_word: שְׁחָקִים
  english_pob_choice: the clouds
  chosen_spanish: las nubes
  alternatives_spanish:
  - las nubes
  - los cielos
  - las alturas
  lexicon: HALOT
  rationale: שְׁחָקִים puede referirse poéticamente a las nubes o a lo alto del cielo. 'Nubes' conserva la imagen concreta y la simetría con 'cielos'; 'cielos' sería más abstracto y menos imagético.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton. Se conserva el nombre propio con la forma 'Yahvé', conforme al principio del proyecto. Esto evita la sustitución reverencial por un título y mantiene la transparencia hacia la fuente original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor semántico de חֶסֶד en paralelo con אֱמוּנָה
  english_pob_reading: steadfast love / faithfulness
  chosen_spanish_reading: misericordia / fidelidad
  alternative_spanish_readings:
  - amor constante / fidelidad
  - amor leal / fidelidad
  - bondad leal / fidelidad
  rationale: La pareja hebrea expresa relación pactal, benevolencia y confiabilidad. 'Misericordia' es menos específica que 'amor leal', pero en español eclesial resulta comprensible y digna; se conserva 'fidelidad' para אֱמוּנָה, de modo que el paralelo no se diluya.
  doctrine_reference: 'DOCTRINE.md: Lexical nuance — חֶסֶד and אֱמוּנָה'
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente con alta concordancia y sin cambios necesarios. La redacción española evita calcos innecesarios, pero conserva las decisiones auditadas del inglés: vocativo directo al nombre divino, lectura locativa principal de בְּהַשָּׁמַיִם, y la imagen poética de extensión hacia lo alto con un término de alcance en el segundo hemistiquio.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de 'SEÑOR' para reflejar el Tetragrámaton.
  - '''Cielos'' y ''nubes'' conservan el plural y la imaginería poética hebrea.'
  - '''Misericordia'' y ''fidelidad'' forman un paralelismo natural en español, aunque se deja constancia de la alternativa más cercana a חֶסֶד: ''amor constante''.'
  - El marcador [a] se coloca en el término del primer hemistiquio para señalar la alternativa de alcance/ubicación indicada por el audit trail.
