base_translation:
  language: en
  yaml_path: translation/ot/exodus/012/015.yaml
  text: For seven days you shall eat unleavened bread[a]. But on the first day you shall remove leaven from your houses, for whoever eats anything leavened, that person shall be cut off from Israel[b], from the first day to the seventh day.
  footnotes:
  - marker: a
    text: Or 'you shall put away/destroy leaven from your houses.' The Hebrew literally means 'you shall cause leaven to cease.'
    reason: lexical_alternative
  - marker: b
    text: '''Shall be cut off'' is a Hebrew legal expression. It may refer to expulsion from the community, death, or divine judgment; the verse itself does not specify the exact mode.'
    reason: alternative_reading
