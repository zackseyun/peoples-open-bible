id: ISA.7.22
reference: Isaiah 7:22
source:
  edition: WLC
  text: וְ/הָיָ֗ה מֵ/רֹ֛ב עֲשׂ֥וֹת חָלָ֖ב יֹאכַ֣ל חֶמְאָ֑ה כִּֽי חֶמְאָ֤ה וּ/דְבַשׁ֙ יֹאכֵ֔ל כָּל הַ/נּוֹתָ֖ר בְּ/קֶ֥רֶב הָ/אָֽרֶץ־־׃
translation:
  text: And it will happen that because of the abundance of milk he gives[a], he will eat curds; for everyone left in the midst of the land will eat curds and honey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'butter and honey.' The Hebrew חֶמְאָה may refer more broadly to curdled or thickened milk products rather than specifically modern butter.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  chosen: And it will happen
  alternatives:
  - And it shall be
  - And it will come about
  lexicon: HALOT
  rationale: Uses a natural English rendering of the Hebrew narrative/future formula while preserving its forward-looking sense.
- source_word: מֵרֹב
  chosen: because of the abundance of
  alternatives:
  - from the abundance of
  - due to the abundance of
  lexicon: HALOT
  rationale: The preposition with 'abundance' expresses cause/source; 'because of the abundance of' communicates the idiomatic sense clearly in English.
- source_word: עֲשׂוֹת חָלָב
  chosen: milk he produces
  alternatives:
  - the yielding of milk
  - the making of milk
  lexicon: HALOT
  rationale: The infinitive construct of עשה with 'milk' refers to production/yield. 'Milk he produces' is idiomatic and fits the singular subject carried through the verse.
- source_word: יֹאכַל חֶמְאָה
  chosen: he will eat curds
  alternatives:
  - he will eat butter
  - he will eat cream
  lexicon: HALOT
  rationale: חֶמְאָה can denote curds/butter-like dairy. 'Curds' best fits the pastoral subsistence context and avoids anachronistic association with modern churned butter.
- source_word: כִּי
  chosen: for
  alternatives:
  - indeed
  - because
  lexicon: HALOT
  rationale: Introduces an explanatory clause giving the reason or broader circumstance; 'for' preserves that explanatory force.
- source_word: חֶמְאָה וּדְבַשׁ
  chosen: curds and honey
  alternatives:
  - butter and honey
  lexicon: HALOT
  rationale: Maintains the familiar collocation while rendering חֶמְאָה in line with the likely sense 'curds' in this context.
- source_word: כָּל הַנּוֹתָר
  chosen: everyone left
  alternatives:
  - all who remain
  - everyone remaining
  lexicon: HALOT
  rationale: The participle functions substantivally for surviving persons. 'Everyone left' is concise and natural.
- source_word: בְּקֶרֶב הָאָרֶץ
  chosen: in the midst of the land
  alternatives:
  - within the land
  - in the land
  lexicon: HALOT
  rationale: Preserves the spatial nuance of בקרב rather than flattening it to a simple locative.
