translation:
  language: es
  text: ¿Quién fue el que apartó a cada uno de las fortificaciones seguras de nuestra tierra y de nuestras casas[a], donde habían sido mantenidos allí en confianza[b], y los reunió aquí sin causa?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘fortalezas seguras’ o ‘lugares fortificados’ para ὀχυρώματα; el griego enfatiza un lugar defendido o seguro.
    reason: lexical_alternative
  - marker: b
    text: El griego de esta cláusula es difícil; el sentido general es que fueron apartados de lugares seguros de su tierra y de sus casas y reunidos aquí sin causa. ‘En confianza’ también puede entenderse como ‘en fe’, ‘fielmente’ o ‘en depósito’.
    reason: textual_variant
lexical_decisions:
- source_word: τίς
  english_pob_choice: Who was it
  chosen_spanish: ¿Quién fue el que
  alternatives_spanish:
  - ¿Quién
  - ¿Quién fue el que fue
  lexicon: LSJ
  rationale: El interrogativo introduce una pregunta retórica; en español, ¿Quién fue el que... naturaliza el énfasis sin alterar el sentido.
- source_word: τοὺς κρατήσαντας ἡμῶν
  english_pob_choice: where they had been held in trust
  chosen_spanish: habían sido mantenidos en confianza
  alternatives_spanish:
  - quienes nos tenían retenidos
  - quienes nos habían tenido bajo control
  - habían sido guardados
  lexicon: LSJ
  rationale: κρατέω puede expresar tener en poder, sostener o retener. Aquí la versión española conserva la idea de custodia/tenencia sin resolver en exceso la construcción difícil, en línea con la prudencia del texto base.
- source_word: ἐν πίστει
  english_pob_choice: in faith
  chosen_spanish: en confianza
  alternatives_spanish:
  - en fe
  - fielmente
  - con fidelidad
  lexicon: BDAG
  rationale: 'El griego es ambivalente: πίστις puede ser fe, confianza o fidelidad. En español, ''en confianza'' preserva esa ambigüedad y encaja mejor con el contexto de custodia que una traducción doctrinal rígida.'
- source_word: τὰ τῆς χώρας ὀχυρώματα
  english_pob_choice: the secure strongholds of our homeland
  chosen_spanish: las fortificaciones seguras de nuestra tierra
  alternatives_spanish:
  - las fortalezas de nuestra tierra
  - los lugares fortificados de nuestra tierra
  - las fortalezas seguras de nuestra patria
  lexicon: LSJ
  rationale: ὀχυρώματα son lugares fortificados o seguros. 'Fortificaciones seguras' conserva el valor concreto y defensivo; 'tierra' evita introducir un matiz más interpretativo que 'patria'.
- source_word: τῆς οἰκίας
  english_pob_choice: our homes
  chosen_spanish: de nuestras casas
  alternatives_spanish:
  - de nuestros hogares
  - de nuestra casa
  - de nuestro hogar
  lexicon: LSJ
  rationale: οἰκία puede ser casa u hogar. 'Casas' mantiene la referencia doméstica y, junto con 'nuestra tierra', conserva el paralelismo público/privado sin forzar 'hogares' como lectura más interpretativa.
- source_word: ἀποστήσας
  english_pob_choice: removed each one from
  chosen_spanish: apartó
  alternatives_spanish:
  - quitó
  - alejó
  - separó
  lexicon: LSJ
  rationale: El aoristo participial expresa una acción de separación o retiro. 'Apartó' es natural en español y suficientemente preciso sin añadir coerción no explicitada.
- source_word: ἕκαστον
  english_pob_choice: each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - cada uno
  - uno por uno
  - a cada persona
  lexicon: LSJ
  rationale: El distributivo singular se expresa con 'a cada uno', conservando la idea individualizante del griego.
- source_word: ἀλόγως
  english_pob_choice: without cause
  chosen_spanish: sin causa
  alternatives_spanish:
  - sin razón
  - irracionalmente
  - sin motivo
  lexicon: LSJ
  rationale: El adverbio marca falta de justificación. 'Sin causa' reproduce el registro formal del texto inglés revisado y mantiene el reproche implícito.
- source_word: ἤθροισεν ἐνθάδε
  english_pob_choice: gathered them here
  chosen_spanish: los reunió aquí
  alternatives_spanish:
  - los juntó aquí
  - los congregó aquí
  - los reunió acá
  lexicon: LSJ
  rationale: ἀθροίζω significa reunir o juntar. 'Reunió aquí' es claro, directo y fiel al valor deíctico de ἐνθάδε.
theological_decisions:
- issue: Tratamiento de πίστις en un contexto no doctrinal
  english_pob_reading: in faith
  chosen_spanish_reading: en confianza
  alternative_spanish_readings:
  - en fe
  - fielmente
  - con fidelidad
  rationale: No se trata aquí de una afirmación doctrinal sobre la fe, sino de una expresión sintácticamente difícil ligada a custodia o retención. 'En confianza' preserva la tensión semántica sin imponer una interpretación confesional.
  doctrine_reference: 'DOCTRINE.md: πίστις → faith; conservar alternativas cuando el contexto es discutido'
- issue: Manejo de una cláusula griega difícil sin emendar el texto
  english_pob_reading: Translate conservatively without reconstructing beyond the attested text
  chosen_spanish_reading: Traducir con cautela, preservando la dificultad sintáctica
  alternative_spanish_readings:
  - reconstruir una frase más fluida
  - explicitar que fueron tomados de lugares seguros
  rationale: La evidencia griega presenta una construcción irregular y el archivo inglés también marca dificultad. La versión española evita resolver la frase por conjetura y mantiene el sentido general de desplazamiento y reunión injustificada.
  doctrine_reference: Principio de primacía del texto original y preservación de ambigüedad documentada
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del expediente inglés en dos puntos: conserva el paralelismo entre tierra/casas y refleja la lectura cautelosa de ἐν πίστει mediante ''en confianza'', evitando una paráfrasis explicativa que resolvería la dificultad sintáctica. También adopta el registro formal de ''sin causa'' y mantiene la individualización de ἕκαστον con ''a cada uno''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - '''Mesías'' y ''Cristo'' no aplican aquí.'
  - Se conserva un tono bíblico moderno sin arcaísmos innecesarios.
  - La traducción evita reemplazar términos concretos por equivalentes eclesiásticos más tradicionales cuando el griego es material y administrativo.
  - Las notas distinguen entre alternativa léxica y dificultad textual para no ocultar la tensión del pasaje.
