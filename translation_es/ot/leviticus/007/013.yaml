review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: עַל como acompañamiento («Junto con»), יקריב קרבנו como «presentará su ofrenda», y preserva la cadena cultual «sacrificio ... de sus ofrendas de paz de acción de gracias». Sin embargo, «pan leudado» y la nota «con levadura» introducen variación léxica innecesaria frente al valor cultual más estable de חָמֵץ; «pan con levadura» es más claro y ampliamente natural en español general.'
  spanish_quality_summary: El texto es comprensible y bastante fiel, pero «leudado» puede sonar regional o técnico y menos transparente para un lector eclesial amplio en español latinoamericano. Además, «tortas de pan leudado» suena algo pesado; «tortas de pan con levadura» mejora la naturalidad sin perder precisión. El resto de la frase, aunque densa por la sintaxis sacrificial, es aceptable y fiel.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Ofrendas de paz» corresponde bien a שְׁלָמִים y conserva la decisión teológica del POB; conviene mantener la nota alternativa sobre «ofrendas de comunión / de bienestar» como en inglés. La nota actual sobre חָמֵץ no añade una alternativa significativa, porque «leudado» y «con levadura» expresan prácticamente lo mismo; la nota debería trasladarse al término sacrificial técnico.
  issues:
  - severity: medium
    issue: «leudado» en el texto principal
    rationale: Aunque no es incorrecto, en español neutral latinoamericano puede sonar menos natural o menos inmediato que «con levadura» en un contexto bíblico-cultual. La fuente solo exige el sentido de pan fermentado/leudado, no una formulación técnica específica.
  - severity: medium
    issue: La nota al pie está colocada en חָמֵץ en vez de en שְׁלָמִים
    rationale: El inglés documenta alternativas léxicas relevantes para «peace offerings», no para «leavened bread» como nota necesaria. En español, la ambigüedad o variación más útil para el lector está en «ofrendas de paz», no en «pan con levadura».
  revised_spanish_text: Junto con tortas de pan con levadura, presentará su ofrenda con el sacrificio de sus ofrendas de paz[a] de acción de gracias.
  revised_footnotes:
  - marker: a
    text: O «sus ofrendas de comunión» o «sus ofrendas de bienestar».
    reason: lexical_alternative
  revision_rationale: Se ajusta חָמֵץ a una expresión más clara y ampliamente natural en español general («con levadura») y se reubica la nota al término técnico שְׁלָמִים, siguiendo el rastro de auditoría del POB inglés y aportando la alternativa léxica realmente útil para el lector.
