base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/013/016.yaml
  text: Give glory to Yahweh your God before he brings darkness[a], and before your feet stumble on the mountains at twilight. Then you will hope for light, but he will make it deep darkness; he will turn it into gloom.
  footnotes:
