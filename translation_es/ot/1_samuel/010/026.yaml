translation:
  language: es
  text: Saúl también fue a su casa en Guibeá[a], y con él fueron los valientes[b] cuyos corazones Dios había tocado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Gabaatá”, según una transliteración más cercana a la forma hebrea.
    reason: cultural_note
  - marker: b
    text: O “los hombres de valor” o “los guerreros”.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: “cuyos corazones Dios había tocado”; el modismo indica que Dios movió su disposición interior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - y también
  lexicon: HALOT
  rationale: Expresa la adición narrativa de forma natural y concisa en español, sin sobrecargar con una conjunción más pesada.
- source_word: הָלַךְ לְבֵיתוֹ גִּבְעָתָה
  english_pob_choice: went to his home at Gibeah
  chosen_spanish: fue a su casa en Gabaatá
  alternatives_spanish:
  - volvió a su casa en Gabaatá
  - se fue a su casa en Gabaatá
  lexicon: HALOT
  rationale: Conserva el movimiento hacia la residencia personal y el topónimo. 'Casa' comunica bien לביתו en español; 'Gabaatá' translitera el nombre propio.
- source_word: וַיֵּלְכוּ עִמּוֹ
  english_pob_choice: and with him went
  chosen_spanish: y con él fueron
  alternatives_spanish:
  - y fueron con él
  - y lo acompañaron
  lexicon: HALOT
  rationale: Mantiene la secuencia narrativa hebrea y sugiere compañía sin añadir matices ajenos al texto.
- source_word: הַחַיִל
  english_pob_choice: the valiant men
  chosen_spanish: los valientes
  alternatives_spanish:
  - los hombres de valor
  - los guerreros
  - la tropa
  lexicon: HALOT
  rationale: En este contexto el término designa un grupo de hombres capaces y destacados, no necesariamente al ejército como institución. 'Los valientes' conserva esa fuerza léxica de forma breve y bíblica.
- source_word: אֲשֶׁר נָגַע אֱלֹהִים בְּלִבָּם
  english_pob_choice: whose hearts God had touched
  chosen_spanish: cuyos corazones Dios había tocado
  alternatives_spanish:
  - a quienes Dios había tocado en el corazón
  - cuyas mentes Dios había movido
  lexicon: HALOT
  rationale: '''Corazones'' refleja el hebreo לֵב como el centro interior de la persona; ''había tocado'' preserva la imagen verbal sin resolverla doctrinalmente hacia ''mover'' o ''estremecer''.'
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: Aquí el referente es claramente el Dios de Israel; 'Dios' es el equivalente directo y estándar.
- source_word: לֵב
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - mente
  - interior
  - disposición
  lexicon: HALOT
  rationale: '''Corazones'' es el equivalente más transparente y ampliamente bíblico para לֵב, que incluye voluntad, pensamiento y disposición interior.'
theological_decisions:
- issue: La forma de describir la acción divina sobre el interior de estos hombres
  english_pob_reading: whose hearts God had touched
  chosen_spanish_reading: cuyos corazones Dios había tocado
  alternative_spanish_readings:
  - cuyos corazones Dios había movido
  - cuyos corazones Dios había despertado
  rationale: La frase española conserva la metáfora sin aclararla en exceso. No se especifica un mecanismo doctrinal —conversión, coerción o simple ánimo—, sino la iniciativa divina que afecta la disposición interna.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Coincide sustancialmente con la revisión final del contexto inglés; no hay cambios sustantivos necesarios respecto del sentido, solo ajuste natural del español y de la transliteración del topónimo.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' para יהוה porque este versículo no lo contiene; aquí אֱלֹהִים se traduce de manera directa como 'Dios'.
  - '''Los valientes'' preserva la amplitud semántica de הַחַיִל sin introducir una lectura militar institucional que el contexto inmediato no exige.'
  - Se mantiene 'corazones' en plural distributivo para reflejar el sufijo hebreo y la frase idiomática de influencia interior divina.
