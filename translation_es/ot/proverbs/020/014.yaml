translation:
  language: es
  text: «Malo, malo[a]», dice el comprador; pero cuando se va, después se jacta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No bueno, no bueno» o «Sin valor, sin valor». El hebreo repite «malo» para dar énfasis, reflejando el intento del comprador de rebajar el valor del artículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַע רַע
  english_pob_choice: Bad, bad
  chosen_spanish: Malo, malo
  alternatives_spanish:
  - No bueno, no bueno
  - Sin valor, sin valor
  - Inútil, inútil
  lexicon: HALOT
  rationale: La repetición intensifica el desprecio del comprador. «Malo, malo» conserva la concisión proverbial y el paralelismo enfático del hebreo sin expandir indebidamente el sentido.
- source_word: יֹאמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dirá
  - suele decir
  lexicon: HALOT
  rationale: El imperfecto funciona aquí como presente proverbial. «Dice» suena natural en español y conserva el valor gnómico del proverbio.
- source_word: הַקּוֹנֶה
  english_pob_choice: the buyer
  chosen_spanish: el comprador
  alternatives_spanish:
  - el que compra
  - el adquirente
  - el comprador
  lexicon: HALOT
  rationale: קנה se refiere al que compra en un contexto de regateo; «el comprador» es la equivalencia más clara e idiomática en español.
- source_word: וְאֹזֵל לוֹ
  english_pob_choice: but when he goes away
  chosen_spanish: pero cuando se va
  alternatives_spanish:
  - y se va
  - y desaparece
  - pero después de irse
  lexicon: HALOT
  rationale: El participio con ו marca la continuación de la escena tras la rebaja verbal. «Cuando se va» transmite bien el desplazamiento del comprador; «pero» refleja el contraste pragmático entre lo que dice en público y lo que hace después.
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - luego
  - en ese momento
  lexicon: HALOT
  rationale: Marca la secuencia temporal con claridad y concisión.
- source_word: יִתְהַלָּל
  english_pob_choice: he boasts
  chosen_spanish: se jacta
  alternatives_spanish:
  - se enorgullece
  - presume
  - alardea
  lexicon: HALOT
  rationale: El hitpael de הלל expresa autoexaltación/boastfulness. «Se jacta» comunica bien el matiz de regocijo orgulloso y autocomplaciente del proverbio.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo y el audit trail inglés, sin necesidad de notas de variante textual o de alternativas léxicas obligatorias para esta línea.
  spanish_consistency_notes:
  - Se mantuvo el orden proverbial básico y el tono sobrio.
  - Se prefirió una equivalencia natural en español para el contexto comercial de regateo.
  - No se usó «Cristo/SEÑOR» ni otras terminologías no pertinentes a este proverbio.
