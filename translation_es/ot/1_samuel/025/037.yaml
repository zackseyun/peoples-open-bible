translation:
  language: es
  text: Y por la mañana[a], cuando el vino se le había ido a Nabal, su esposa le contó estas cosas, y su corazón murió dentro de él[b], y se quedó como una piedra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: ''cuando el vino se le había ido a Nabal'', es decir, cuando ya estaba sobrio o se le había pasado el efecto del vino.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''le falló el corazón dentro de él''. El hebreo usa una imagen vívida, no una descripción médica técnica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - por la mañana temprano
  lexicon: HALOT
  rationale: Es una expresión temporal natural en español y mantiene el valor adverbial del hebreo sin añadir énfasis no presente en el texto.
- source_word: בְּצֵאת הַיַּיִן מִנָּבָל
  english_pob_choice: when the wine had gone out of Nabal
  chosen_spanish: cuando el vino se había ido de Nabal
  alternatives_spanish:
  - cuando Nabal se había sobrado
  - cuando se le había pasado el vino a Nabal
  - cuando los efectos del vino habían salido de Nabal
  lexicon: HALOT
  rationale: Conserva la imagen concreta del hebreo ('salir/irse el vino') en vez de sustituirla por una explicación interpretativa. En español, 'se había ido de Nabal' mantiene la rareza deliberada de la metáfora y deja la lectura sobria como inferencia, como en el POB inglés.
- source_word: וַתַּגֶּד לוֹ אִשְׁתּוֹ
  english_pob_choice: his wife told him
  chosen_spanish: su esposa le contó
  alternatives_spanish:
  - su esposa le dijo
  - su esposa le informó
  - su esposa le relató
  lexicon: HALOT
  rationale: נגד en hifil puede ser 'contar, declarar, informar'. 'Le contó' suena natural en español y también refleja que ella narra el conjunto de lo ocurrido.
- source_word: אֶת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estos asuntos
  - estas palabras
  - estos hechos
  lexicon: HALOT
  rationale: דברים admite 'palabras' o 'cosas/asuntos'. Aquí la referencia es al episodio narrado previamente, y 'estas cosas' conserva amplitud semántica sin estrecharlo indebidamente.
- source_word: וַיָּמָת לִבּוֹ בְּקִרְבּוֹ
  english_pob_choice: his heart died within him
  chosen_spanish: su corazón murió dentro de él
  alternatives_spanish:
  - le falló el corazón dentro de sí
  - su corazón se le fue dentro de él
  - su corazón desfalleció dentro de él
  lexicon: HALOT
  rationale: Se preserva la imagen vívida del hebreo, como en el POB inglés, en lugar de medicalizar el pasaje. 'Murió dentro de él' reproduce la fuerza idiomática y deja abierta la naturaleza exacta del colapso.
- source_word: וְהוּא הָיָה לְאָבֶן
  english_pob_choice: he became like a stone
  chosen_spanish: y se volvió como piedra
  alternatives_spanish:
  - y quedó como piedra
  - y llegó a ser como una piedra
  - y fue como piedra
  lexicon: HALOT
  rationale: El hebreo dice literalmente que 'llegó a ser para una piedra'; en español, 'se volvió como piedra' conserva la comparación sin sobredeterminar si fue inmovilidad, estupor o parálisis. Evita un calco duro y mantiene la transparencia del original.
theological_decisions:
- issue: Si interpretar la condición de Nabal como diagnóstico médico o conservar el lenguaje figurado del relato
  english_pob_reading: 'Preserve the Hebrew imagery: ''his heart died within him, and he became like a stone'''
  chosen_spanish_reading: 'Conservar la imaginería hebrea: ''su corazón murió dentro de él, y se volvió como piedra'''
  alternative_spanish_readings:
  - le dio un ataque al corazón
  - sufrió un derrame y quedó paralizado
  - se desmayó por el susto
  rationale: El texto narra el efecto de la noticia con lenguaje figurado e ինտenso, no con terminología clínica. La traducción mantiene esa tensión y no introduce un diagnóstico que el hebreo no explicita.
  doctrine_reference: 'Principio de traducción: no importar afirmaciones que el texto no hace; dejar que la imaginería del pasaje permanezca visible.'
translation_notes:
  revision_awareness: El texto base en inglés ya fue revisado y quedó sin cambios; la presente propuesta sigue ese estado de alta concordancia y conserva sus decisiones léxicas principales en español.
  spanish_consistency_notes:
  - Se usó 'Yahvé' únicamente cuando corresponda; este versículo no lo contiene.
  - Se prefirió 'su esposa'/'su corazón' con estilo neutral y publicado, evitando arcaísmos innecesarios.
  - 'Se mantuvo la metáfora del hebreo en dos puntos clave: el vino ''se había ido'' y el corazón ''murió dentro de él''.'
  - La puntuación sigue el orden narrativo del original y usa español estándar.
  - Los corchetes de notas se colocaron solo donde hay una alternativa lexical o interpretativa real.
