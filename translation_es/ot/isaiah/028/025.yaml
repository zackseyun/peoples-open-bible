translation:
  language: es
  text: ¿No lo hace así cuando ha nivelado su superficie, esparce comino negro[a] y siembra comino, y pone trigo en hileras[b], y cebada en su lugar señalado, y espelta[c] en su borde?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alcaravea negra»; la identificación exacta de קֶצַח es incierta. Versiones antiguas en inglés suelen tener «fitches».
    reason: lexical_alternative
  - marker: b
    text: El hebreo שׂוֹרָה es difícil; puede significar «en hileras», «como el cultivo principal» o «en el mejor lugar».
    reason: lexical_alternative
  - marker: c
    text: O «emmer»; la identificación exacta del grano denotado por כֻסֶּמֶת es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלוֹא אִם
  english_pob_choice: Does he not, when
  chosen_spanish: '¿No es así: cuando'
  alternatives_spanish:
  - ¿Acaso no, cuando
  - ¿No sucede que, cuando
  lexicon: HALOT
  rationale: 'La combinación introduce una pregunta retórica con matiz condicional-temporal. En español, «¿No es así: cuando…?» conserva ese flujo interrogativo sin forzar un giro literal e incómodo de «si».},{'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la evaluación inglesa de alta concordancia y conserva las tres zonas léxicas inciertas señaladas por el POB: קֶצַח, שׂוֹרָה y כֻסֶּמֶת. No se aplicaron revisiones posteriores; el estado más reciente indica que no hubo cambios necesarios.'
  spanish_consistency_notes:
  - Se eligió «Yahvé» como convención general del proyecto solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - «comino negro» mantiene la decisión inglesa principal y la nota preserva la incertidumbre botánica.
  - «en hileras» intenta reflejar la colocación ordenada implícita en שׂוֹרָה sin cerrar indebidamente su sentido.
  - «en su lugar señalado» traduce la idea de asignación deliberada para נִסְמָן con español natural.
  - «espelta» conserva la identificación tradicional y la nota deja abierta la alternativa «emmer».
