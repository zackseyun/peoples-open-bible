translation:
  language: es
  text: porque hacía poco habían subido de la cautividad[a], y todo el pueblo de Judea hacía poco había sido reunido, y los vasos, el altar y la casa[c] habían sido consagrados de la profanación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del exilio» para «de la cautividad».
    reason: lexical_alternative
  - marker: b
    text: O «habían sido consagrados después de la profanación»; el griego contrasta una profanación previa con la posterior restauración a la santidad.
    reason: lexical_alternative
  - marker: c
    text: «La casa» se refiere al templo.
    reason: cultural_note
lexical_decisions:
- source_word: προσφάτως
  english_pob_choice: only recently
  chosen_spanish: apenas habían subido recientemente
  alternatives_spanish:
  - habían subido recientemente
  - recién habían subido
  lexicon: LSJ
  rationale: El adverbio marca cercanía temporal. En español, «apenas» refuerza el matiz de recencia sin sonar mecánico, y «habían subido» conserva la imagen direccional del griego.
- source_word: ἀναβεβηκότες
  english_pob_choice: come up
  chosen_spanish: habían subido
  alternatives_spanish:
  - habían venido
  - habían regresado
  lexicon: LSJ
  rationale: El participio perfecto de ἀναβαίνω expresa movimiento ascendente. «Subido» mantiene esa imagen geográfica y cultual, más cercana al griego que «regresado».
- source_word: αἰχμαλωσίας
  english_pob_choice: the captivity
  chosen_spanish: la cautividad
  alternatives_spanish:
  - el cautiverio
  - el exilio
  lexicon: LSJ
  rationale: «Cautividad» conserva la referencia histórica concreta y la fuerza de un estado de sometimiento. «Exilio» sería posible, pero desplaza el matiz hacia la desterración más que hacia la esclavitud/cautiverio.
- source_word: νεωστί
  english_pob_choice: only recently
  chosen_spanish: muy recientemente
  alternatives_spanish:
  - nuevamente
  - de nuevo
  lexicon: LSJ
  rationale: Este segundo adverbio refuerza la idea de recencia. «Muy recientemente» reproduce ese énfasis sin redundancia innecesaria en español.
- source_word: συνελέλεκτο
  english_pob_choice: had been gathered together
  chosen_spanish: había sido reunido
  alternatives_spanish:
  - había sido congregado
  - había sido juntado
  lexicon: LSJ
  rationale: El valor pasivo/pluperfecto apunta a una reunión comunitaria ya realizada. «Había sido reunido» es natural y conserva la idea de ensamblaje del pueblo.
- source_word: σκεύη
  english_pob_choice: the vessels
  chosen_spanish: los vasos
  alternatives_spanish:
  - los utensilios
  - los objetos sagrados
  lexicon: LSJ
  rationale: En contexto del templo, «vasos» es un equivalente tradicional y preciso para los implementos cultuales. Evita añadir explicaciones que el griego no explicita en el término mismo.
- source_word: θυσιαστήριον
  english_pob_choice: the altar
  chosen_spanish: el altar
  lexicon: LSJ
  rationale: Corresponde de manera directa al término griego y no presenta ambigüedad relevante.
- source_word: ὁ οἶκος
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: LSJ
  rationale: Se conserva el giro reverencial literal «la casa», que en este contexto alude al templo. Así se respeta la forma del original sin perder inteligibilidad.
- source_word: βεβηλώσεως
  english_pob_choice: the defilement
  chosen_spanish: la profanación
  alternatives_spanish:
  - la contaminación
  - la deshonra
  lexicon: LSJ
  rationale: El término expresa la acción de profanar lo santo. «Profanación» preserva mejor la oposición cultual con «consagrados» que «contaminación».
- source_word: ἡγιασμένα
  english_pob_choice: had been consecrated
  chosen_spanish: habían sido consagrados
  alternatives_spanish:
  - habían sido santificados
  - habían sido hechos santos
  lexicon: LSJ
  rationale: En un contexto de objetos, altar y templo, «consagrados» comunica la dedicación sagrada de forma clara y natural. Mantiene la fuerza cultual del perfectivo griego.
theological_decisions:
- issue: Relación entre profanación previa y restauración cultual
  english_pob_reading: '''had been consecrated from the defilement'' preserves the restoration from a prior state of profanation.'
  chosen_spanish_reading: «habían sido consagrados desde la profanación» mantiene la idea de paso fuera de un estado de profanación hacia la santidad.
  alternative_spanish_readings:
  - habían sido consagrados después de la profanación
  - habían sido purificados de la profanación
  rationale: El griego usa ἐκ, que aquí señala salida o proveniencia desde un estado anterior. «Desde la profanación» conserva esa relación sin introducir un proceso ritual no explicitado.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referencia de ὁ οἶκος en contexto del templo
  english_pob_reading: The house refers to the temple.
  chosen_spanish_reading: «la casa» se conserva literalmente, entendida como el templo por el contexto.
  alternative_spanish_readings:
  - el templo
  rationale: Retener la metáfora reverencial del original respeta la primacía del texto fuente y, junto con «los vasos» y «el altar», hace clara la referencia templaria.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego de cerca y toma en cuenta la revisión auditada que prefirió ἐκ como «from the defilement». Por eso se eligió «desde la profanación» y no «después de la profanación», manteniendo la idea de restauración fuera de un estado de profanación. También se preservó el paralelismo de recencia con dos marcadores temporales y la referencia reverencial «la casa».
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se mantuvo «cautividad» en lugar de «exilio» como opción principal para seguir la fuerza del inglés auditado y del griego.
  - «Consagrados» se eligió por claridad cultual en español; «santificados» queda preservado como alternativa lexicográfica.
  - «La casa» se dejó literal para respetar el idiomático del griego, con la referencia implícita al templo.
