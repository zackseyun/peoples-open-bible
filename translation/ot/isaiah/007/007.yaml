id: ISA.7.7
reference: Isaiah 7:7
source:
  edition: WLC
  text: כֹּ֥ה אָמַ֖ר אֲדֹנָ֣/י יְהוִ֑ה לֹ֥א תָק֖וּם וְ/לֹ֥א תִֽהְיֶֽה׃
translation:
  text: 'Thus says the Lord GOD: It shall not stand[a], and it shall not come to pass.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''It will not stand, and it will not be.'' The second clause means the plan will not come to pass or happen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  chosen: This is what
  alternatives:
  - Thus
  - So
  lexicon: HALOT
  rationale: Introduces a prophetic declaration formula. 'This is what' is natural modern English while preserving the deictic force of כֹּה more clearly than the more traditional but slightly archaic 'Thus'.
- source_word: אָמַר
  chosen: says
  alternatives:
  - said
  lexicon: HALOT
  rationale: Although morphologically perfect ('said'), in prophetic messenger formulas English idiom commonly uses the present 'says' to convey the standing force of the divine utterance. This is an optimal-equivalence choice reflecting standard prophetic discourse.
- source_word: אֲדֹנָי יְהוִה
  chosen: the Lord GOD
  alternatives:
  - the Lord Yahweh
  - the Lord GOD Yahweh
  lexicon: HALOT
  rationale: The compound divine title combines אֲדֹנָי with the divine name יְהוִה. Per doctrine, יְהוִה is rendered 'the LORD'; however, in the conventional English handling of the compound title, 'Lord GOD' avoids the awkward 'Lord LORD' while signaling both elements. Small caps cannot be represented here, so 'GOD' marks the underlying divine name.
- source_word: לֹא
  chosen: not
  lexicon: HALOT
  rationale: Simple negation governing the following imperfect verbs.
- source_word: תָקוּם
  chosen: will stand
  alternatives:
  - will arise
  - will be established
  lexicon: HALOT
  rationale: From קום, here referring to the hostile plan/counsel just mentioned in context. 'Will stand' is idiomatic in English for a plan succeeding or holding firm, and fits the parallel with the next clause.
- source_word: וְלֹא
  chosen: and ... not
  alternatives:
  - nor
  lexicon: HALOT
  rationale: Coordinates the second negated clause with the first. Rendered as 'and ... not' in smooth English; 'nor' would also be possible.
- source_word: תִהְיֶה
  chosen: will happen
  alternatives:
  - will be
  - will come to pass
  lexicon: HALOT
  rationale: From היה, but in this context of a threatened scheme or prediction, English 'will happen' best conveys the sense that the plan will not come into reality. 'Will be' is too vague; 'will come to pass' is accurate but more traditional/archaic.
