translation:
  language: es
  text: Entregó a su pueblo a la espada[a], y se enfureció con su heredad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Entregó a su pueblo a la espada» puede entenderse como «lo entregó al poder de la espada».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se airó contra su heredad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסְגֵּר
  english_pob_choice: he gave over
  chosen_spanish: entregó
  alternatives_spanish:
  - lo entregó
  - lo puso en manos de
  - lo dio
  lexicon: HALOT
  rationale: El hiphil de סגר aquí expresa la idea de poner a alguien en poder de otro. En español, "entregó" comunica bien esa acción causativa y mantiene el tono sobrio del texto.
- source_word: לַחֶרֶב
  english_pob_choice: to the sword
  chosen_spanish: a la espada
  alternatives_spanish:
  - a la guerra
  - a la muerte violenta
  - para la espada
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de חֶרֶב como "espada", que funciona metonímicamente para muerte violenta o derrota en combate.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - su nación
  lexicon: HALOT
  rationale: El sustantivo עַם con sufijo de 3ms se traduce naturalmente como "su pueblo". Mantiene el sentido pactual del pueblo perteneciente a Dios.
- source_word: וּבְנַחֲלָתוֹ
  english_pob_choice: with his inheritance
  chosen_spanish: contra su heredad
  alternatives_spanish:
  - con su heredad
  - sobre su heredad
  - contra su herencia
  lexicon: HALOT
  rationale: נַחֲלָה conserva el valor de posesión/correspondencia pactual, aquí aplicado a Israel. La preposición ב en este contexto admite un matiz adversativo; por eso "contra" expresa mejor la hostilidad del enojo divino en español que un simple "con".
- source_word: הִתְעַבָּר
  english_pob_choice: he was enraged
  chosen_spanish: se encendió
  alternatives_spanish:
  - se airó
  - se enojó intensamente
  - se enfureció
  lexicon: HALOT
  rationale: El hitpael de עבר en este giro indica mostrarse airado o furioso. "Se encendió" conserva la intensidad y resulta idiomático en español sin diluir la fuerza del verbo.
theological_decisions:
- issue: Doble designación pactual de Israel
  english_pob_reading: his people ... his inheritance
  chosen_spanish_reading: su pueblo ... su heredad
  alternative_spanish_readings:
  - su nación ... su herencia
  - su pueblo ... su posesión
  rationale: El versículo usa dos expresiones pactuales para Israel. "Pueblo" y "heredad" mantienen esa carga teológica y la relación de pertenencia, sin suavizar el juicio divino que recae sobre quienes siguen siendo de Yahvé.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés coinciden en la estructura causativa de וַיַּסְגֵּר y en el paralelismo entre "su pueblo" y "su herencia/heredad". La revisión inglesa eliminó un pronombre repetido por fluidez; en español no se requiere cambio comparable. Se ha preservado la imaginería de espada y la intensidad del enojo divino.
  spanish_consistency_notes:
  - Se usa "Yahvé" en otros contextos para el Tetragrámaton; aquí el verso no lo contiene explícitamente.
  - '"Heredad" se elige para reflejar el valor pactual de נַחֲלָה y mantener consistencia con otros pasajes donde el contexto es de posesión divina de Israel.'
  - '"Se encendió" se usa como equivalente idiomático de una ira intensa, sin perder la idea de furor del hitpael.'
