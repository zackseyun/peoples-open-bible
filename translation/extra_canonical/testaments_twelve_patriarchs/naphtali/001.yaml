translation:
  text: |-
    A copy of the testament of Naphtali, the eighth son of Jacob, which he set in order at the time of his departure, in the hundred and thirtieth year of his life.
    
    2 When his sons had gathered together in the seventh month, on the first day of the month, he made a feast for them. 3 And in the morning, after he awoke, he said to them, “I am dying”; but they did not believe him. 4 And while blessing and glorifying the Lord, he grew strong and said, “After the feast yesterday, my flesh failed and died.”
    
    5 Then he began to speak: “Hear, my children, sons of Naphtali; hear the words of your father. 6 I was born from Bilhah, because Rachel acted with cunning and gave Bilhah to Jacob in her place; and Bilhah conceived and bore me upon Rachel’s knees, and for this reason she called my name Naphtali. 7 For Rachel loved me greatly, because I was born upon her knees; and when I was still a tender child she kissed me, saying, ‘May I be given a brother from my own womb, like you.’ 8 Therefore Joseph also was like me in every way, according to the prayers of Rachel.”
