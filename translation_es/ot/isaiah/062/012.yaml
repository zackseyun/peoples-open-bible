  rationale: Se corrigieron y alinearon las notas al lugar semántico correspondiente en el texto, y se cambió 'abandonada' por 'desamparada' para reflejar mejor la decisión léxica documentada sobre נֶעֱזָבָה y su eco temático en Isaías. También se ajustó la nota de 'Buscada' para evitar una expansión interpretativa innecesaria.
