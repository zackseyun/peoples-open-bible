review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: dos sustantivos en el primer hemistiquio, la relación «conmigo», y luego «riqueza/caudal duradero» más צְדָקָה. Sin embargo, no sigue fielmente la decisión auditada del POB inglés para צְדָקָה, que prefirió «righteousness» en el texto principal y preservó «justice» solo como alternativa. Además, las notas están ancladas de forma invertida: la nota sobre «riqueza duradera» no debe ir en «conmigo», y la nota sobre «justicia» sí debe ir en el término final correspondiente.'
  spanish_quality_summary: El español es natural y legible, pero «riqueza duradera y justicia» combina bien solo si se corrige el término final a «rectitud» o equivalente principal más una nota alternativa. «Rectitud» suena digno y claro en contexto sapiencial; evita un giro demasiado jurídico. También conviene colocar cada nota en la palabra que comenta para mantener claridad editorial.
  glossary_alignment: 'No hay términos del glosario maestro conflictivos como Yahvé o Mesías en este versículo. La cuestión clave es צְדָקָה: según las pautas del proyecto para términos de justicia/rectitud, aquí debe preservarse la fuerza moral amplia. El inglés auditado eligió «righteousness»; en español, «rectitud» es la mejor correspondencia principal, con «justicia» en nota como alternativa. «Riqueza duradera» para הוֹן עָתֵק es aceptable, con nota alternativa «riqueza perdurable/sustancial».'
  issues:
