translation:
  language: es
  text: ¡Bendito sea Yahvé, porque ha escuchado la voz de mis súplicas de misericordia[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sonido de mis súplicas de misericordia». El hebreo dice literalmente «la voz/sonido de mis súplicas»; el contexto muestra que son súplicas por misericordia.
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ
  english_pob_choice: Blessed be
  chosen_spanish: ¡Bendito sea!
  alternatives_spanish:
  - Bendito
  - ¡Alabado sea!
  lexicon: HALOT
  rationale: La forma funciona en una doxología o bendición exclamativa; en español, «Bendito sea» conserva el valor exhortativo/benedictorio mejor que un simple adjetivo aislado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar el nombre divino en forma castellana «Yahvé», en vez de sustituirlo por un título.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la bendición; «porque» expresa con naturalidad la relación causal en español.
- source_word: שָׁמַע
  english_pob_choice: has heard
  chosen_spanish: ha escuchado
  alternatives_spanish:
  - ha oído
  - escuchó
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una acción concluida con relevancia presente. «Ha escuchado» mantiene ese valor y suena natural en español devocional.
- source_word: קוֹל
  english_pob_choice: the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el sonido de
  - la voz
  lexicon: HALOT
  rationale: El hebreo puede significar «sonido» o «voz». Aquí se conserva «voz» siguiendo la revisión del POB inglés, pues resulta más personal y menos redundante en el contexto de oración.
- source_word: תַּחֲנוּנָי
  english_pob_choice: my pleas for mercy
  chosen_spanish: mis súplicas por misericordia
  alternatives_spanish:
  - mis súplicas
  - mis peticiones de favor
  lexicon: HALOT
  rationale: «Súplicas» transmite el carácter insistente de la petición; añadir «por misericordia» preserva el matiz orientado a la compasión/divina clemencia que el sustantivo hebreo lleva en este contexto.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo usa יְהוָה directamente. Conforme al criterio doctrinal del proyecto, se preserva el nombre personal de Dios en español como «Yahvé» para no ocultarlo tras una sustitución titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de קוֹל con sustantivo de ruego
  english_pob_reading: the voice of my pleas for mercy
  chosen_spanish_reading: la voz de mis súplicas por misericordia
  alternative_spanish_readings:
  - el sonido de mis súplicas por misericordia
  - la voz de mis súplicas
  rationale: Se conserva la tensión entre «voz» y «sonido» documentada en la tradición auditiva del POB, pero se opta por «voz» por la revisión aprobada y por la mayor naturalidad en español, sin perder el vínculo con la fórmula hebrea.
  doctrine_reference: 'DOCTRINE.md: lexical precision in poetic prayer language'
translation_notes:
  revision_awareness: El audio-trail inglés muestra una revisión reciente que prefirió «voice» sobre «sound» por idiomaticidad y menor redundancia. En español se refleja esa misma decisión con «voz», manteniendo abierta la alternativa literal documentada en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» consistentemente para יְהוָה, conforme a los lineamientos del proyecto.
  - «Súplicas por misericordia» evita el arcaísmo de «suplicaciones» y mantiene el matiz intensivo del hebreo.
  - La puntuación exclamativa refleja el carácter benedictorio del inicio del versículo.
