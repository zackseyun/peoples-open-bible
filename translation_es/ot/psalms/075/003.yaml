  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Rectitud» para מֵישָׁרִים y «juzgaré» para אֶשְׁפֹּט están bien. La cuestión clave es idiomática/lexical en אֶקַּח מוֹעֵד: en español conviene una forma natural como «escoja el tiempo señalado», con nota para la literalidad «tomar».'
