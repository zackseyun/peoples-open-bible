translation:
  language: es
  text: Aun si machacas a un necio en un mortero, con la mano del mortero, entre grano triturado[a], su necedad no se apartará de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grano aplastado», «grano machacado» o, tradicionalmente, «gachas» para el hebreo רִיפוֹת.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Even if
  chosen_spanish: Aun si
  alternatives_spanish:
  - Si
  - Aunque
  lexicon: HALOT
  rationale: La partícula introduce una hipótesis concesiva; «Aun si» conserva el valor de extrema concesión que el inglés POB expresó con «Even if».
- source_word: תִּכְתּוֹשׁ
  english_pob_choice: grind
  chosen_spanish: machacas
  alternatives_spanish:
  - mueles
  - aplastas
  - machas
  lexicon: HALOT
  rationale: El verbo describe golpear o triturar en un mortero. «Machacar» comunica bien la acción física intensa en español sin perder la imagen proverbial.
- source_word: אֱוִיל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - tonto
  - insensato
  - fool
  lexicon: HALOT
  rationale: En Proverbios, el término es un tipo moral y sapiencial, no solo falta de inteligencia. «Necio» preserva ese registro bíblico en español.
- source_word: מַּכְתֵּשׁ
  english_pob_choice: mortar
  chosen_spanish: mortero
  alternatives_spanish:
  - piedra de moler
  - mortero de moler
  lexicon: HALOT
  rationale: «Mortero» es el equivalente natural en español para el recipiente de machacar o triturar.
- source_word: בַּֽ/עֱלִ֑י
  english_pob_choice: pestle
  chosen_spanish: con el majadero
  alternatives_spanish:
  - con el mazo
  - con la mano de mortero
  - con el pilón
  lexicon: HALOT
  rationale: El instrumento es el equivalente del inglés «pestle». «Majadero» es un término español tradicional para el mazo del mortero y preserva la concreción del objeto.
- source_word: הָ֭/רִיפוֹת
  english_pob_choice: crushed grain
  chosen_spanish: entre grano aplastado
  alternatives_spanish:
  - entre grano triturado
  - entre grano molido
  - entre grits
  lexicon: HALOT
  rationale: La frase nombra el material alimenticio ya desmenuzado. «Grano aplastado» mantiene la imagen concreta y evita regionalismos ambiguos como «grits».
- source_word: לֹא תָס֥וּר מֵ֝/עָלָ֗י/ו
  english_pob_choice: will not depart from him
  chosen_spanish: no se apartará de él
  alternatives_spanish:
  - no lo dejará
  - no se alejará de él
  lexicon: HALOT
  rationale: El hebreo expresa alejamiento o salida de una persona; «apartarse de él» reproduce bien el giro idiomático y el paralelo del inglés POB.
- source_word: אִוַּלְתּֽוֹ
  english_pob_choice: his foolishness
  chosen_spanish: su necedad
  alternatives_spanish:
  - su foolishness
  - su insensatez
  - su locura
  lexicon: HALOT
  rationale: El sustantivo abstracto designa la cualidad interna del necio. «Necedad» conserva la correspondencia sapiencial y el enlace con «necio».
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el trazado auditado del inglés POB, conservando la concesión de אִם, la imaginería del mortero y el sentido proverbial de que el carácter del necio no cambia aun bajo extrema trituración. Se mantiene la alternativa lexical de רִיפוֹת mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma editorial solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino.
  - 'Se prefieren términos sapienciales consolidados en español: «necio/necedad» para אֱוִיל/אִוַּלְתּוֹ.'
  - «Majadero» se entiende aquí en su sentido de herramienta del mortero, no como insulto.
  - La estructura «Aun si ... no se apartará de él» reproduce la concesión y el resultado irreductible del proverbio.
