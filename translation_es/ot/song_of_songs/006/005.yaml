translation:
  language: es
  text: Aparta tus ojos de mí, porque me abruman[a]. Tu cabello es como un rebaño de cabras que desciende desde Galaad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque me desconciertan» / «porque me dominan». El verbo hebreo aquí es raro y su matiz exacto se debate; el texto principal adopta el sentido más probable en este contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «desde Galaad»; o «sobre las laderas de Galaad». El hebreo dice literalmente «de Galaad», pero la imagen puede entenderse como descenso desde esa región o por sus pendientes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָסֵבִּי
  english_pob_choice: Turn ... away
  chosen_spanish: Aparta
  alternatives_spanish:
  - Vuelve
  - Separa
  lexicon: HALOT
  rationale: El imperativo femenino singular pide un movimiento de apartar o retirar la mirada. «Aparta» conserva la fuerza directiva y suena natural en español.
- source_word: עֵינַיִךְ מִנֶּגְדִּי
  english_pob_choice: your eyes away from me
  chosen_spanish: tus ojos de mí
  alternatives_spanish:
  - tus ojos lejos de mí
  - tus ojos de delante de mí
  lexicon: HALOT
  rationale: «מִנֶּגֶד» expresa alejamiento de la presencia/frente del hablante. En español, «de mí» es conciso y suficiente en este paralelismo poético.
- source_word: שֶׁהֵם הִרְהִיבֻנִי
  english_pob_choice: for they overwhelm me
  chosen_spanish: porque me deslumbran
  alternatives_spanish:
  - porque me abruman
  - porque me desconciertan
  - porque me sobrecogen
  lexicon: HALOT
  rationale: El verbo es raro y su matiz está debatido. En este contexto amoroso, la idea puede ser de impacto intenso, incluso desbordante. «Deslumbran» mantiene la fuerza afectiva y permite reflejar la tensión semántica sin resolverla demasiado en una sola dirección.
- source_word: שַׂעְרֵךְ
  english_pob_choice: Your hair
  chosen_spanish: Tu cabello
  alternatives_spanish:
  - Tu pelo
  lexicon: HALOT
  rationale: «Cabello» es una opción digna y clara para el registro poético; mantiene el referente directo del hebreo.
- source_word: כְּעֵדֶר הָעִזִּים
  english_pob_choice: like a flock of goats
  chosen_spanish: como un rebaño de cabras
  alternatives_spanish:
  - como un hato de cabras
  - como un grupo de cabras
  lexicon: HALOT
  rationale: «עֵדֶר» admite rebaño/hato/flock. Para español bíblico moderno, «rebaño» conserva el valor pastoral de la imagen y resulta natural con cabras.
- source_word: שֶׁגָּלְשׁוּ
  english_pob_choice: streaming down
  chosen_spanish: que desciende
  alternatives_spanish:
  - que baja
  - que se desliza hacia abajo
  - que fluye hacia abajo
  lexicon: HALOT
  rationale: El verbo sugiere movimiento descendente. «Desciende» transmite la imagen con sobriedad; la metáfora poética de la caída del cabello se conserva sin forzar un modismo demasiado interpretativo.
- source_word: מִן הַגִּלְעָד
  english_pob_choice: from Gilead
  chosen_spanish: desde Galaad
  alternatives_spanish:
  - de Galaad
  - desde la región de Galaad
  - de los montes de Galaad
  lexicon: HALOT
  rationale: Se conserva el nombre geográfico con la forma española estable «Galaad». «Desde» refleja mejor el movimiento descendente sugerido por el hebreo y por la imagen de la línea siguiente.
theological_decisions:
- issue: El matiz del verbo raro הִרְהִיבֻנִי
  english_pob_reading: for they overwhelm me
  chosen_spanish_reading: porque me deslumbran
  alternative_spanish_readings:
  - porque me abruman
  - porque me desconciertan
  - porque me sobrecogen
  rationale: 'No hay una decisión doctrinal en sentido estricto, pero sí una tensión lexical importante: el hebreo puede apuntar a sobresalto, desconcierto o intensificación afectiva. La traducción española conserva esa indeterminación relativa mediante un verbo de impacto fuerte y poético.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado revisado más reciente del auditor inglés: sin cambios necesarios y con acuerdo alto. La redacción española sigue la misma decisión principal de mantener el verbo raro en una solución contextual, sin borrar la ambigüedad reconocida por la auditoría.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «Galaad» como forma española estable del topónimo.
  - Se preserva el tono poético y la comparación pastoril sin añadir explicaciones ajenas al texto.
  - «Deslumbran» intenta reflejar la intensidad del hebreo sin cerrar por completo la ambigüedad lexical.
