review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: la mujer llega al despuntar la mañana, cae en la entrada de la casa del hombre donde está su amo, y permanece allí hasta la luz. También conserva correctamente אֲדוֹנֶיהָ como término de autoridad, no como ''marido''. Sin embargo, la redacción temporal final ''hasta que hubo luz'' suena menos natural en español y la colocación de las notas [a][b] sobre ''su amo'' no ancla correctamente la nota sobre el amanecer.'
  spanish_quality_summary: El español es claro y generalmente digno, pero necesita un ajuste menor para mejorar naturalidad y la disciplina de notas. 'Llegó' es aceptable para וַתָּבֹא. 'Cuando estaba amaneciendo' es natural. 'Cayó a la entrada de la casa' es bueno. El mejor ajuste es 'hasta que amaneció', que expresa idiomáticamente עַד הָאוֹר sin rigidez. Además, cada nota debe ir anclada a la frase correspondiente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión 'su amo' está alineada con la fuerza léxica documentada para אֲדוֹנֶיהָ. No hay términos divinos o mesiánicos relevantes aquí.
  issues:
  - severity: medium
    issue: Anclaje incorrecto de notas al texto
    rationale: La nota b explica 'cuando estaba amaneciendo', pero en el borrador aparece anclada junto a 'su amo'. Cada marcador debe aparecer en la palabra o frase pertinente.
  - severity: low
    issue: 'Expresión final poco natural: ''hasta que hubo luz'''
    rationale: Aunque semánticamente cercana, en español bíblico-natural suena más idiomático 'hasta que amaneció' o 'hasta que clareó'. El hebreo marca el límite temporal de la llegada de la luz; 'hasta que amaneció' lo comunica con claridad.
  revised_spanish_text: La mujer llegó cuando estaba amaneciendo[b] y cayó a la entrada de la casa del hombre donde estaba su amo[a], hasta que amaneció.
  revised_footnotes:
  - marker: a
    text: «Su amo» conserva el sentido de autoridad del hebreo אֲדוֹנֶיהָ; no se explicita aquí «su marido».
    reason: lexical_alternative
  - marker: b
    text: «Cuando estaba amaneciendo» traduce la idiomática idea hebrea de «al girar la mañana» o «hacia el amanecer».
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación de las notas para que cada una ancle la frase que explica, y se reemplaza 'hasta que hubo luz' por 'hasta que amaneció' para lograr un español más natural sin perder el sentido temporal de עַד הָאוֹר.
