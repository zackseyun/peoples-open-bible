  - severity: low
    issue: «hacia Dios» es menos natural que «a Dios» en este modismo.
    rationale: Aunque «hacia» no es incorrecto, אֶל se vierte de forma más idiomática en español aquí como «a Dios», especialmente con «alzar el rostro». Esto preserva mejor la naturalidad sin resolver indebidamente el sentido idiomático.
  revised_spanish_text: Porque entonces te deleitarás en el Todopoderoso, y alzarás tu rostro a Dios[a].
