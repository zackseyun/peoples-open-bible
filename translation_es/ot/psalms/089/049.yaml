translation:
  language: es
  text: ¿Qué hombre puede vivir y no ver la muerte?[a] ¿Puede librar su alma[b] de la mano del Seol? Selah[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «experimentar la muerte». Literalmente, «ver la muerte».
    reason: lexical_alternative
  - marker: b
    text: O «su vida» o «a sí mismo» para «su alma».
    reason: lexical_alternative
  - marker: c
    text: Seol es el término hebreo para el ámbito de los muertos; también puede traducirse «la tumba».
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  english_pob_choice: What ... can
  chosen_spanish: ¿Qué ... puede
  alternatives_spanish:
  - ¿Quién ... puede
  lexicon: HALOT
  rationale: En esta pregunta retórica, el español natural exige una construcción interrogativa que refleje posibilidad. «¿Qué hombre puede...?» conserva el sentido idiomático del hebreo y la fuerza retórica del original, como en la solución inglesa auditada.
- source_word: גֶבֶר
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - persona
  - mortal
  lexicon: HALOT
  rationale: El sustantivo designa a un varón/hombre, con matiz de humanidad fuerte y mortal. «Hombre» mantiene el valor representativo masculino del hebreo sin neutralizar innecesariamente el rasgo gramatical.
- source_word: יִחְיֶה
  english_pob_choice: can live
  chosen_spanish: puede vivir
  alternatives_spanish:
  - vivirá
  - vive
  lexicon: HALOT
  rationale: El imperfecto en una pregunta retórica expresa posibilidad; en español, «puede vivir» comunica mejor esa potencialidad que un futuro simple.
- source_word: וְלֹא יִרְאֶה מָוֶת
  english_pob_choice: and not see death
  chosen_spanish: y no ver la muerte
  alternatives_spanish:
  - y no experimentar la muerte
  - sin ver la muerte
  lexicon: HALOT
  rationale: «Ver la muerte» conserva el modismo hebreo y evita interpretar de más. Las alternativas explicitan el sentido, pero el texto principal retiene la imagen poética.
- source_word: יְמַלֵּט
  english_pob_choice: Can he deliver
  chosen_spanish: ¿Puede librar
  alternatives_spanish:
  - ¿Puede rescatar
  - ¿Puede salvar
  lexicon: HALOT
  rationale: «Librar» reproduce bien la idea de hacer escapar/liberar y suena natural en registro poético elevado en español.
- source_word: נַפְשׁוֹ
  english_pob_choice: his soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - a sí mismo
  lexicon: HALOT
  rationale: «Nefesh» puede significar alma, vida o ser. Aquí, por el paralelismo con muerte y Seol, «alma» preserva el peso poético y teológico sin resolver la ambigüedad hacia un solo matiz.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de la mano de
  alternatives_spanish:
  - del poder de
  - del dominio de
  lexicon: HALOT
  rationale: La expresión hebrea es literal e idiomática. «De la mano de» conserva la metáfora del poder/grasp, claramente entendible en español.
- source_word: שְׁאוֹל
  english_pob_choice: Sheol
  chosen_spanish: Seol
  alternatives_spanish:
  - la tumba
  - el reino de los muertos
  lexicon: HALOT
  rationale: Se translitera el término hebreo para preservar la categoría bíblica distinta y evitar reducirla prematuramente a «tumba» o a otro concepto doctrinal posterior.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional porque su función precisa es incierta y traducirla implicaría mayor certeza de la que ofrece el texto.
theological_decisions:
- issue: Sentido de שְׁאוֹל en el poema
  english_pob_reading: Sheol is retained as a transliterated term rather than interpreted as 'hell' or reduced to 'grave.'
  chosen_spanish_reading: Seol se mantiene transliterado, no se sustituye por «infierno» ni se reduce a «tumba».
  alternative_spanish_readings:
  - la tumba
  - el reino de los muertos
  - infierno
  rationale: El versículo expresa la universalidad de la muerte y la imposibilidad de escapar del Seol. Mantener la transliteración preserva la categoría hebrea y evita importar una especificidad doctrinal no exigida por el texto.
  doctrine_reference: Prioridad del lenguaje original; preservar tensiones teológicas en vez de resolverlas por tradición de traducción.
- issue: Lenguaje masculino representativo en גֶבֶר
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - persona
  - ser humano
  rationale: El hebreo es masculino gramaticalmente, pero funciona de manera representativa en una pregunta sobre la mortalidad humana. En español, «hombre» mantiene esa correspondencia y la fuerza retórica.
  doctrine_reference: Exactitud de género cuando el original es masculino; evitar neutralización innecesaria.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el recorrido auditado en inglés y no introduce revisiones sustantivas: conserva la pregunta retórica, el modismo «ver la muerte», la ambigüedad de נֶפֶשׁ como «alma», y la transliteración de שְׁאוֹל/Seol, tal como lo ratificó el último pase de revisión.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva «Seol» como transliteración coherente con el tratamiento auditado de שְׁאוֹל.
  - «Hombre» se usa aquí como masculino representativo, no como exclusión de humanidad en sentido general.
  - «Alma» se emplea por fidelidad poética; las notas preservan las alternativas «vida» y «a sí mismo».
  - La puntuación reproduce la cadencia interrogativa del hebreo con dos preguntas retóricas separadas.
