id: 1PE.1.7
reference: 1 Peter 1:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἵνα τὸ δοκίμιον ὑμῶν τῆς πίστεως πολυτιμότερον χρυσίου τοῦ ἀπολλυμένου διὰ πυρὸς δὲ δοκιμαζομένου εὑρεθῇ εἰς ἔπαινον καὶ δόξαν καὶ τιμὴν ἐν ἀποκαλύψει Ἰησοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/001/007.yaml
  text: 'so that the proven genuineness of your faith—more precious than gold that perishes though it is tested by fire—may be found to result in praise and glory and honor at the revelation of Jesus Messiah.'
translation:
  language: ko
  text: '이는 여러분의 믿음의 단련된 진실함이 — 불로 연단되어도 결국 없어지고 마는 금보다 더 귀하여 — 메시아 예수께서 나타나실 때에 칭찬과 영광과 존귀에 이르도록 하려 함입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ δοκίμιον ὑμῶν τῆς πίστεως
  english_pob_choice: the proven genuineness of your faith
  chosen_korean: 여러분의 믿음의 단련된 진실함
  alternatives_korean:
  - 여러분의 믿음의 시련
  - 시험으로 입증된 너희 믿음
  lexicon: BDAG
  rationale: δοκίμιον은 「시험을 거쳐 입증된 것」이라는 능동적 의미를 가진다. 「단련된 진실함」으로 입증의 과정과 결과를 함께 살린다.
- source_word: πολυτιμότερον χρυσίου
  english_pob_choice: more precious than gold
  chosen_korean: 금보다 더 귀하여
  alternatives_korean:
  - 금보다 값진
  lexicon: BDAG
  rationale: 비교급을 분명히 살리되 한국어로 자연스럽게 옮긴다.
- source_word: τοῦ ἀπολλυμένου
  english_pob_choice: that perishes
  chosen_korean: 결국 없어지고 마는
  alternatives_korean:
  - 멸망할
  - 사라지는
  lexicon: BDAG
  rationale: ἀπόλλυμι의 종국적 소멸을 한국어 「결국 없어지고 마는」으로 살린다.
- source_word: διὰ πυρὸς δὲ δοκιμαζομένου
  english_pob_choice: though it is tested by fire
  chosen_korean: 불로 연단되어도
  alternatives_korean:
  - 불로 단련되긴 하지만
  lexicon: BDAG
  rationale: δοκιμάζω의 「불 연단」 비유와 양보 어미로 「~이지만」을 살린다.
- source_word: εὑρεθῇ
  english_pob_choice: may be found
  chosen_korean: 이르도록 하려 함입니다
  alternatives_korean:
  - 발견되게 하려 함입니다
  lexicon: BDAG
  rationale: 부정 과거 수동 가정법. 한국어로 「발견되다」 직역은 어색하므로 결과 도달의 의미로 「이르도록」으로 옮긴다.
- source_word: ἐν ἀποκαλύψει Ἰησοῦ Χριστοῦ
  english_pob_choice: at the revelation of Jesus Messiah
  chosen_korean: 메시아 예수께서 나타나실 때에
  alternatives_korean:
  - 메시아 예수의 계시 때에
  - 예수 그리스도께서 나타나실 때에
  lexicon: BDAG
  rationale: ἀποκάλυψις는 종말의 「나타나심」을 가리키며, Χριστός는 칭호로 「메시아」로 옮긴다.
