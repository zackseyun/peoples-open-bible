translation:
  language: es
  text: Porque Yahvé, su Dios, es el que va con ustedes para luchar por ustedes contra sus enemigos[a], para salvarlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘para librarlos’ o ‘para darles la victoria’. El verbo hebreo puede denotar rescate o liberación; aquí aparece en contexto de batalla.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se conserva como nombre propio divino. En español del POB, 'Yahvé' mantiene la referencia al nombre revelado sin sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - su Dios propio
  lexicon: HALOT
  rationale: La forma con sufijo de segunda persona plural se expresa naturalmente con 'su Dios' en el español reverencial y bíblico, manteniendo el valor de posesión/covenio.
- source_word: הַהֹלֵךְ
  english_pob_choice: is the one who goes
  chosen_spanish: es el que va
  alternatives_spanish:
  - va
  - es el que anda
  lexicon: HALOT
  rationale: El participio hebreo indica acción continua o característica. 'Es el que va' preserva esa fuerza descriptiva en un español fluido, sin perder el matiz de acompañamiento constante.
- source_word: עִמָּכֶם
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - con vosotros
  - junto a ustedes
  lexicon: HALOT
  rationale: '''Con ustedes'' es el equivalente natural en español neutro latinoamericano y conserva la idea de compañía divina.'
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: para luchar
  alternatives_spanish:
  - para pelear
  - para guerrear
  lexicon: HALOT
  rationale: En contexto bélico, 'luchar' comunica la acción de combate con dignidad y naturalidad. 'Guerrear' sería más fuerte pero menos idiomático aquí.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - a favor de ustedes
  - en favor de ustedes
  lexicon: HALOT
  rationale: La dativa de ventaja en contexto de combate se expresa mejor con 'por ustedes', indicando defensa y representación en batalla.
- source_word: עִם אֹיְבֵיכֶם
  english_pob_choice: against your enemies
  chosen_spanish: contra sus enemigos
  alternatives_spanish:
  - frente a sus enemigos
  - en oposición a sus enemigos
  lexicon: HALOT
  rationale: Aunque עִם normalmente significa 'con', en este marco de guerra el sentido es adversativo. 'Contra' reproduce claramente la relación de combate.
- source_word: לְהוֹשִׁיעַ
  english_pob_choice: to save
  chosen_spanish: para salvar
  alternatives_spanish:
  - para librar
  - para rescatar
  - para darles la victoria
  lexicon: HALOT
  rationale: Se mantiene 'salvar' para conservar el alcance teológico del verbo, sin reducirlo sólo a victoria militar. En este contexto incluye liberación y rescate.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - les
  lexicon: HALOT
  rationale: El objeto directo plural se integra naturalmente en español con la terminación pronominal de 'salvarlos', evitando redundancia y manteniendo la referencia plural.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del pacto en lugar de reemplazarlo por un título. 'Yahvé' es la forma establecida en el POB español para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de לְהוֹשִׁיעַ en un contexto militar
  english_pob_reading: to save you
  chosen_spanish_reading: para salvarlos
  alternative_spanish_readings:
  - para librarlos
  - para rescatarlos
  - para darles la victoria
  rationale: '''Salvar'' conserva el sentido amplio de rescate/liberación y no reduce el verbo a éxito militar. El contexto bélico está dado por la cláusula anterior, por lo que la formulación española puede mantener la resonancia teológica.'
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El texto coincide con el trazo auditado en inglés y no requiere revisión adicional; se ha ajustado a un español natural manteniendo el nombre divino, la fuerza participial y la amplitud semántica de 'salvar'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme a la terminología base del proyecto.
  - Se mantiene un español neutro latinoamericano con 'ustedes' para la segunda persona plural.
  - '''Salvar'' conserva el valor teológico amplio del verbo hebreo en un contexto de combate.'
  - La nota textual/lexical marca explícitamente la alternativa militar sin desplazar el término principal.
