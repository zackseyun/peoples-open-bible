translation:
  language: es
  text: Su poder se hará grande[a], pero no por su propio poder. Causará destrucción extraordinaria, y tendrá éxito y actuará; destruirá a los poderosos y al pueblo de los santos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su poder crecerá» o «su poder será grande».'
    reason: alternative_reading
  - marker: b
    text: 'O: «el pueblo santo» o «el pueblo de los santos».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְעָצַם כֹּחוֹ
  english_pob_choice: His power will become great
  chosen_spanish: Su poder crecerá
  alternatives_spanish:
  - Su poder será grande
  - Su poder se hará grande
  - Su poder se volverá fuerte
  lexicon: HALOT
  rationale: עָצַם con כֹּחַ expresa que el poder aumenta o llega a ser grande/forte. En español, ‘crecerá’ conserva el sentido de aumento dinámico que la lectura inglesa también captó con ‘will become great’, sin endurecer la frase con un adjetivo estático.
- source_word: וְלֹא בְכֹחוֹ
  english_pob_choice: but not by his own power
  chosen_spanish: pero no por su propio poder
  alternatives_spanish:
  - pero no mediante su propio poder
  - pero no con su propio poder
  - pero no gracias a su propio poder
  lexicon: HALOT
  rationale: La preposición ב aquí marca medio o instrumento. ‘Por su propio poder’ comunica bien la negación del origen o medio de esa expansión, y ‘propio’ refleja el contraste del sufijo posesivo.
- source_word: וְנִפְלָאוֹת יַשְׁחִית
  english_pob_choice: He will cause extraordinary destruction
  chosen_spanish: Causará destrucción extraordinaria
  alternatives_spanish:
  - Provocará una destrucción asombrosa
  - Destruirá de manera extraordinaria
  - Causará una destrucción sorprendente
  lexicon: HALOT
  rationale: נִפְלָאוֹת literalmente sugiere cosas/deeds extraordinarios o asombrosos; en combinación con שׁחת, el sentido es destructivo. ‘Destrucción extraordinaria’ preserva el efecto intensivo y chocante sin convertir נִפְלָאוֹת en ‘maravillas’ positivas.
- source_word: וְהִצְלִיחַ
  english_pob_choice: he will succeed
  chosen_spanish: prosperará
  alternatives_spanish:
  - tendrá éxito
  - saldrá adelante
  - le irá bien
  lexicon: HALOT
  rationale: El hiphil de צלח suele significar prosperar o tener éxito. ‘Prosperará’ mantiene la relación semántica clásica con el texto y su tono bíblico, sin introducir una evaluación moral.
- source_word: וְעָשָׂה
  english_pob_choice: and act
  chosen_spanish: y hará
  alternatives_spanish:
  - y actuará
  - y obrará
  - y procederá
  lexicon: HALOT
  rationale: עָשָׂה es amplio (‘hacer, actuar’). ‘Hará’ conserva la concisión del hebreo y su secuencia verbal compacta; no añade una expansión interpretativa como ‘como le place’.
- source_word: וְהִשְׁחִית
  english_pob_choice: he will destroy
  chosen_spanish: destruirá
  alternatives_spanish:
  - arruinará
  - devastará
  - corromperá
  lexicon: HALOT
  rationale: En este contexto de opresión militar, ‘destruirá’ es la opción más directa y consistente con el primer verbo de destrucción del versículo.
- source_word: עֲצוּמִים
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los grandes
  - los valientes
  lexicon: HALOT
  rationale: El adjetivo sustantivado designa personas fuertes o poderosas. ‘Los poderosos’ es natural en español y conserva el valor social/político del término.
- source_word: וְעַם קְדֹשִׁים
  english_pob_choice: the people of the holy ones
  chosen_spanish: al pueblo de los santos
  alternatives_spanish:
  - al pueblo santo
  - al pueblo de los santos seres
  - al pueblo de los santos/los consagrados
  lexicon: HALOT
  rationale: El hebreo permite una construcción literal ‘pueblo de santos/holy ones’. En español, ‘pueblo de los santos’ preserva el plural y deja abierta la tensión interpretativa entre ‘santos’, ‘seres santos’ o el pueblo santo de Dios. Se evita aplanarlo sin necesidad.
theological_decisions:
- issue: Referente de וְעַם קְדֹשִׁים
  english_pob_reading: the people of the holy ones
  chosen_spanish_reading: al pueblo de los santos
  alternative_spanish_readings:
  - al pueblo santo
  - al pueblo de los santos seres
  - al pueblo de los santos
  rationale: El plural קְדֹשִׁים puede leerse como ‘santos/holy ones’ y en Daniel mantiene una tensión interpretativa relevante. La formulación elegida preserva el plural y no resuelve de forma prematura si se trata del pueblo santo en relación con seres celestiales santos o del pueblo de Dios descrito con lenguaje tradicional.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El inglés POB revisó ‘become strong’ a ‘become great’ y ‘bring about extraordinary destruction’ a ‘cause extraordinary destruction’. La redacción española sigue esa revisión con un verbo de aumento (‘crecerá’) y un causativo directo (‘causará destrucción extraordinaria’), manteniendo además la secuencia verbal compacta del hebreo.
  spanish_consistency_notes:
  - Se usa ‘Dios’/‘Yahvé’ solo cuando el texto lo requiera explícitamente; este versículo no los contiene.
  - ‘Santos’ conserva la ambigüedad del hebreo קְדֹשִׁים sin forzar la identificación.
  - Se evita ‘Cristo’ o terminología eclesiástica no presente en el original.
  - La puntuación separa con comas las cláusulas paralelas, siguiendo el ritmo del hebreo y la versión inglesa auditada.
