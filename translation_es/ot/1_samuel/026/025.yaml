  revision_rationale: 'Se ajustó la segunda cláusula enfática para reflejar mejor el sentido contextual de יכל תוכל, de acuerdo con el rastro POB en inglés: no mera capacidad abstracta, sino éxito o prevalencia. También se suavizó levemente la primera fórmula de bendición para un español más natural, sin alterar el sentido. La nota se conservó como alternativa literal del hebreo y se adaptó al texto revisado.'
