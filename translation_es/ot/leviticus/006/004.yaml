translation:
  language: es
  text: Entonces se quitará las vestiduras y se pondrá otras vestiduras, y sacará las cenizas[a] fuera del campamento, a un lugar limpio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «traerá fuera» o «llevará fuera» las cenizas.
    reason: lexical_alternative
  - marker: b
    text: «Limpio» aquí se refiere a limpieza ritual en el sentido levítico.
    reason: cultural_note
lexical_decisions:
- source_word: וּפָשַׁט
  english_pob_choice: Then he shall take off
  chosen_spanish: Entonces se quitará
  alternatives_spanish:
  - y se quitará
  - entonces se despojará de
  lexicon: HALOT
  rationale: En este contexto de vestiduras sacerdotales, פשט significa quitarse ropa. «Se quitará» es natural y fiel, y «Entonces» conserva la secuencia procedimental del waw en una instrucción ritual.
- source_word: בְּגָדָיו
  english_pob_choice: his garments
  chosen_spanish: sus vestiduras
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: «Vestiduras» conserva el tono ritual y sacerdotal mejor que «ropas», que suena más general y menos cultual.
- source_word: וְלָבַשׁ
  english_pob_choice: and put on
  chosen_spanish: y se pondrá
  alternatives_spanish:
  - y vestirá
  - y se revestirá
  lexicon: HALOT
  rationale: לבש indica ponerse la ropa. «Se pondrá» es idiomático en español y refleja la acción directa.
- source_word: בְּגָדִים אֲחֵרִים
  english_pob_choice: other garments
  chosen_spanish: otras vestiduras
  alternatives_spanish:
  - vestiduras distintas
  - otro juego de vestiduras
  lexicon: HALOT
  rationale: «Otras vestiduras» preserva la distinción respecto de las anteriores sin añadir precisión no explícita en el hebreo.
- source_word: וְהוֹצִיא
  english_pob_choice: and carry
  chosen_spanish: y sacará
  alternatives_spanish:
  - y traerá fuera
  - y llevará fuera
  lexicon: HALOT
  rationale: El hiphil de יצא aquí expresa sacar o llevar fuera las cenizas. «Sacará» es la forma más directa y no fuerza un matiz específico de transporte que el hebreo no exige.
- source_word: הַדֶּשֶׁן
  english_pob_choice: the ashes
  chosen_spanish: las cenizas
  alternatives_spanish:
  - la ceniza
  - los restos de la ofrenda
  lexicon: HALOT
  rationale: En este contexto cultual, דשן se refiere a las cenizas del altar. «Cenizas» es el equivalente natural en español; el plural evita una lectura demasiado abstracta.
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - al exterior del campamento
  - a las afueras del campamento
  lexicon: HALOT
  rationale: «Fuera del campamento» reproduce con claridad la localización fuera del perímetro campamental, sin sonar forzado.
- source_word: אֶל מָקוֹם טָהוֹר
  english_pob_choice: to a clean place
  chosen_spanish: a un lugar limpio
  alternatives_spanish:
  - a un lugar puro
  - a un lugar ritualmente limpio
  lexicon: HALOT
  rationale: «Limpio» mantiene la sencillez de la POB en inglés. En Levítico, la pureza es ritual, pero el término básico español «limpio» deja que el contexto cultual cargue la especificación, como en el texto inglés.
theological_decisions:
- issue: Sentido ritual de טָהוֹר
  english_pob_reading: clean place
  chosen_spanish_reading: lugar limpio
  alternative_spanish_readings:
  - lugar puro
  - lugar ritualmente limpio
  rationale: Se conserva la lectura funcional y sobria del inglés POB. «Limpio» no pretende higiene ordinaria, sino pureza ritual en el marco levítico; el contexto litúrgico lo determina.
  doctrine_reference: 'Levítico: pureza ritual y separación cultual'
translation_notes:
  revision_awareness: El contexto fuente y la auditoría inglesa muestran alta concordancia y no indican revisiones textuales. La formulación española sigue esa lectura estable, manteniendo las alternativas léxicas relevantes sin introducir paráfrasis.
  spanish_consistency_notes:
  - Se mantiene «vestiduras» por coherencia con el registro sacerdotal.
  - Se usa «cenizas» en plural para reflejar el residuo del altar de forma natural en español.
  - «Lugar limpio» conserva la ambigüedad ritual adecuada sin sobreexplicar en el cuerpo principal.
  - Las notas a pie preservan la alternativa de «sacar/traer fuera/llevar fuera» y la precisión ritual de «limpio».
