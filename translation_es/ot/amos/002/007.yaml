  to: los que codician hasta el polvo de la tierra sobre la cabeza de los pobres[a], y tuercen el camino de los humildes[b]; y un hombre y su padre van a la misma muchacha[c][d], para profanar mi santo nombre.
  rationale: 'La revisión hace dos reparaciones menores: (1) mejora la naturalidad semántica de la primera cláusula con «codician hasta el polvo...», que conserva la imagen concreta y la voracidad opresiva mejor que «ansían»; (2) sustituye «se llegan a» por «van a», dejando que la nota explique el eufemismo sexual, lo cual suena más claro en español contemporáneo y sigue sin sobreinterpretar el texto. También se ajusta la nota a para reflejar el hebreo completo.'
