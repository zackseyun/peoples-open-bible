translation:
  language: es
  text: Ahora, el resto de los hechos de Abiyam[a], y todo lo que hizo, ¿no están escritos en el Libro de las Crónicas de los reyes de Judá[b]? Y hubo guerra entre Abiyam y Jeroboam.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Abiyam aparece como Abías en algunos pasajes paralelos o relacionados; el hebreo aquí lee Abiyam.
    reason: alternative_reading
  - marker: b
    text: 'O: «los anales de los reyes de Judá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֶתֶר
  english_pob_choice: the rest of
  chosen_spanish: el resto de
  alternatives_spanish:
  - lo demás de
  - el resto de los
  lexicon: HALOT
  rationale: Conserva la fórmula resumidora de los relatos reales sin volverla más interpretativa de lo que permite el hebreo. En español, 'el resto de' reproduce bien la idea de material no narrado en detalle.
- source_word: דִּבְרֵי
  english_pob_choice: acts of
  chosen_spanish: hechos de
  alternatives_spanish:
  - actos de
  - cosas de
  - palabras de
  lexicon: HALOT
  rationale: En fórmulas de anales reales, דִּבְרֵי abarca lo realizado o sucedido respecto al rey. 'Hechos' comunica mejor ese valor historiográfico en español que 'palabras', que sería demasiado estrecho.
- source_word: אֲבִיָּם
  english_pob_choice: Abijam
  chosen_spanish: Abiyam
  alternatives_spanish:
  - Abijam
  - Abías
  lexicon: Transliteración del hebreo MT
  rationale: El texto hebreo masorético aquí lee אֲבִיָּם, por lo que se translitera directamente como 'Abiyam'. Se mantiene la nota de que en pasajes paralelos aparece 'Abías'.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo lo que realizó
  - y todo cuanto hizo
  lexicon: HALOT
  rationale: Es una reproducción natural y fiel de la cláusula relativa general. 'Hizo' preserva la amplitud del hebreo sin añadir matices ajenos.
- source_word: הֲלוֹא
  english_pob_choice: are they not
  chosen_spanish: ¿no están...?
  alternatives_spanish:
  - ¿acaso no están...?
  - ¿no es verdad que están...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica. '¿No están...?' conserva tanto la forma interrogativa como su fuerza de apelación.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - redactados
  - registrados
  lexicon: HALOT
  rationale: '''Escritos'' es la traducción directa y natural del participio pasivo, y mantiene la referencia a un registro documental.'
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - en el libro
  lexicon: HALOT
  rationale: Aunque literalmente la preposición es 'sobre', el español idiomático para un registro archivístico es 'en el Libro'. Se conserva la mayúscula por tratarse de un título de obra.
- source_word: סֵפֶר דִּבְרֵי הַיָּמִים
  english_pob_choice: the Book of the Chronicles
  chosen_spanish: el Libro de las Crónicas
  alternatives_spanish:
  - el libro de los anales
  - el Libro de los hechos de los días
  lexicon: HALOT
  rationale: '''Crónicas'' comunica el título archivístico tradicional de modo inteligible en español. No se sustituye por ''anales'' en el texto principal porque el título bíblico ya es reconocible y la traducción mantiene la función referencial.'
- source_word: לְמַלְכֵי יְהוּדָה
  english_pob_choice: of the Kings of Judah
  chosen_spanish: de los reyes de Judá
  alternatives_spanish:
  - para los reyes de Judá
  - perteneciente a los reyes de Judá
  lexicon: HALOT
  rationale: El ל en el título se expresa naturalmente como relación posesiva o de pertenencia en español. 'De los reyes de Judá' reproduce la referencia documental sin forzar la sintaxis.
- source_word: וּמִלְחָמָה הָיְתָה
  english_pob_choice: And there was war
  chosen_spanish: Y hubo guerra
  alternatives_spanish:
  - Y estaba la guerra
  - Y hubo hostilidad
  lexicon: HALOT
  rationale: '''Hubo guerra'' es la forma más directa y natural para el cláusula existencial del hebreo. No se amplía a ''continuó'' porque el texto no lo dice explícitamente.'
- source_word: בֵּין...וּבֵין
  english_pob_choice: between ... and
  chosen_spanish: entre ... y
  alternatives_spanish:
  - entre ... y entre
  - en medio de ... y
  lexicon: HALOT
  rationale: La correlación preposicional estándar en español transmite adecuadamente la oposición recíproca entre los dos reyes.
- source_word: יָרָבְעָם
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  alternatives_spanish:
  - Yeroboam
  lexicon: Transliteración tradicional
  rationale: Se conserva la forma castellana tradicional y ampliamente reconocible para el nombre propio.
theological_decisions:
- issue: Referencia al título archivístico 'Libro de las Crónicas'
  english_pob_reading: the Book of the Chronicles of the Kings of Judah
  chosen_spanish_reading: el Libro de las Crónicas de los reyes de Judá
  alternative_spanish_readings:
  - el libro de los anales de los reyes de Judá
  - el Libro de los hechos de los días de los reyes de Judá
  rationale: 'No hay una cuestión doctrinal aquí, pero sí una decisión terminológica relevante: mantener ''Crónicas'' preserva la identificación del documento histórico aludido por el texto. ''Anales'' sería una glosa válida, pero menos estable en español bíblico general.'
  doctrine_reference: N/A
- issue: Tratamiento del nombre אֲבִיָּם en relación con pasajes paralelos
  english_pob_reading: Abijam is called Abijah in some parallel or related passages; the Hebrew text here reads Abijam.
  chosen_spanish_reading: Abiyam, con nota de que en pasajes paralelos aparece Abías.
  alternative_spanish_readings:
  - Abijam
  - Abías
  rationale: La lectura del MT aquí es la base principal. La nota preserva la tensión textual entre la forma presente y la forma paralela, sin armonizarla artificialmente.
  doctrine_reference: Crítica textual / armonización de nombres propios
translation_notes:
  revision_awareness: Este borrador sigue de cerca el texto hebreo masorético para 1 Reyes 15:7 y refleja el mismo estado textual y decisiones auditadas del POB en inglés. No hay revisiones aplicadas en el registro fuente; por eso se conserva la fórmula resumidora y la lectura nominal del MT sin armonización.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general en el proyecto, pero este versículo no contiene el tetragrámaton ni un sustituto explícito.
  - Se mantiene 'Crónicas' como título documental reconocido, con alternativa 'anales' solo en nota.
  - Se conserva la diferencia entre la forma MT 'Abiyam' y la forma paralela 'Abías' mediante nota, sin fusionarlas en el texto principal.
  - El estilo busca ser publicable y natural en español, pero sin borrar el carácter formular del hebreo ni la referencia a un registro real oficial.
