review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido general del hebreo: reacción de todo el pueblo, caída reverente y confesión repetida de que Yahvé es Dios. También mantiene correctamente ''Yahvé'' para יְהוָה y ''Dios'' para הָאֱלֹהִים. Sin embargo, la cláusula וַיִּפְּלוּ עַל־פְּנֵיהֶם está mejor representada por una formulación más natural y concreta en español (''cayeron rostro en tierra'' o ''cayeron sobre sus rostros'') que por ''se postraron sobre su rostro'', que suena poco idiomática y además cambia el número de ''sus rostros'' a singular. El pronombre enfático הוּא puede omitirse en español sin traicionar el sentido, pero conviene reflejar mejor la fuerza repetitiva y exclamativa de la confesión.'
  spanish_quality_summary: La redacción es clara en general, pero 'se postraron sobre su rostro' resulta poco natural para español bíblico moderno y puede distraer al lector. Además, el punto y coma dentro de la cita debilita ligeramente el carácter repetitivo directo del clamor. Una revisión menor mejora naturalidad, fidelidad imagística y fluidez litúrgica sin cambiar el contenido.
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה -> ''Yahvé'', הָאֱלֹהִים -> ''Dios''. No hay conflictos terminológicos mayores. La principal corrección es estilístico-lexical en la expresión idiomática de postración.'
  issues:
  - severity: medium
    issue: '''se postraron sobre su rostro'' suena poco idiomático en español'
    rationale: Aunque busca reflejar la postración, esta formulación no es natural en español contemporáneo y el singular 'su rostro' no representa bien el plural hebreo 'sus rostros'.
  - severity: medium
    issue: La imagen concreta de caer sobre el rostro se atenúa o se vuelve extraña
    rationale: El hebreo usa una expresión corporal muy concreta. 'Cayeron rostro en tierra' preserva mejor la imagen reverente que la versión actual.
  - severity: low
    issue: La puntuación de la confesión puede reflejar mejor la repetición enfática
    rationale: Separar con coma o repetir con dos exclamaciones mantiene mejor el ritmo del clamor que el punto y coma actual.
  - severity: low
