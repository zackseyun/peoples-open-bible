  - marker: b
    text: 'Some manuscripts add ''broken'' after ''for you'': ''This is my body, which is broken for you.'''
    reason: textual_variant
translation:
  language: ko
  text: 감사 기도를 드리신 후에 빵을 떼시고 말씀하셨습니다. 「이것은 너희를 위한 내 몸이다. 너희는 나를 기억하기 위해 이것을 행하라.」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본은 「너희를 위한」 뒤에 「떼어진」을 더하여 「너희를 위해 떼어진 내 몸」으로 읽는다.
    reason: textual_variant
