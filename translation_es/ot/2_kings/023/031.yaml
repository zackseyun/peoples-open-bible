translation:
  language: es
  text: Joacaz tenía veintitrés años cuando comenzó a reinar, y reinó tres meses en Jerusalén. El nombre de su madre era Hamutal, hija de Jeremías, de Libna.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בֶּן עֶשְׂרִים וְשָׁלֹשׁ שָׁנָה
  english_pob_choice: was twenty-three years old
  chosen_spanish: tenía veintitrés años
  alternatives_spanish:
  - era de veintitrés años
  - era un hijo de veintitrés años
  lexicon: HALOT
  rationale: En español, la idiomática de edad se expresa naturalmente con 'tener' edad. Conserva el valor del hebreo sin calco innecesario.
- source_word: בְּמָלְכֹו
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando empezó a reinar
  - al comenzar a reinar
  - cuando llegó a reinar
  lexicon: HALOT
  rationale: La preposición con el infinitivo señala el momento de la entronización. 'Comenzó a reinar' refleja con claridad ese inicio de gobierno.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - llegó a reinar
  lexicon: HALOT
  rationale: El verbo finito expresa la duración del reinado; 'reinó' preserva el valor regnal de manera directa y natural.
- source_word: וּשְׁלֹשָׁה חֳדָשִׁים
  english_pob_choice: three months
  chosen_spanish: tres meses
  alternatives_spanish:
  - por tres meses
  lexicon: HALOT
  rationale: La duración temporal se expresa de forma directa en español con el acusativo temporal 'tres meses'.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Topónimo estándar en español bíblico y moderno.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: His mother’s name was
  chosen_spanish: El nombre de su madre era
  alternatives_spanish:
  - Su madre se llamaba
  lexicon: HALOT
  rationale: La fórmula nominal de Crónicas/Reyes se vierte con una estructura formal y transparente en español, sin perder el carácter de registro genealógico.
- source_word: חֲמוּטַל
  english_pob_choice: Hamutal
  chosen_spanish: Hamutal
  lexicon: transliteration
  rationale: Nombre propio transliterado de forma estándar.
- source_word: בַּת יִרְמְיָהוּ
  english_pob_choice: daughter of Jeremiah
  chosen_spanish: hija de Jeremías
  alternatives_spanish:
  - hija de Yirmeyahu
  lexicon: HALOT
  rationale: '''Hija de Jeremías'' reproduce la relación filial con la forma española habitual del nombre propio, adecuada para un registro bíblico ampliamente legible.'
- source_word: מִלִּבְנָה
  english_pob_choice: of Libnah
  chosen_spanish: de Libna
  alternatives_spanish:
  - de Libná
  - de la ciudad de Libna
  lexicon: HALOT
  rationale: El complemento de procedencia/identificación se expresa naturalmente con 'de' en español genealógico. 'Libna' conserva la forma del topónimo con una adaptación gráfica mínima y legible.
