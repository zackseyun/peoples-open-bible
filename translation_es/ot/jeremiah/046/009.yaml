translation:
  language: es
  text: 'Suban[a], caballos, y arremetan frenéticamente, carros; salgan los guerreros: Cus, Put, los que toman el escudo, y los Ludim[b], los que empuñan y tensan el arco.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «avancen»; el hebreo puede funcionar como llamado de batalla con la idea de ascender o lanzarse al combate.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, algunos identifican a «los Ludim» con los «lidios».
    reason: alternative_reading
lexical_decisions:
- source_word: עֲלוּ
  english_pob_choice: Go up
  chosen_spanish: Suban
  alternatives_spanish:
  - Avancen
  - Carguen
  lexicon: HALOT
  rationale: עלה en este llamado bélico conserva el imperativo de movimiento ascendente/lanzado; en español, «Suban» reproduce bien la breve orden militar sin añadir explicaciones.
- source_word: הַסּוּסִים
  english_pob_choice: O horses
  chosen_spanish: caballos
  alternatives_spanish:
  - O caballos
  - los caballos
  lexicon: HALOT
  rationale: El hebreo funciona como vocativo en el paralelismo. En español, el vocativo queda implícito por el imperativo inicial; «caballos» mantiene la personificación poética sin forzar una interjección poco natural.
- source_word: וְהִתְהֹלְלוּ
  english_pob_choice: drive madly
  chosen_spanish: enloquezcan
  alternatives_spanish:
  - desboquen
  - se lancen frenéticamente
  - arremetan con furia
  lexicon: HALOT
  rationale: El hitpolel de הלל expresa agitación frenética en combate. «Enloquezcan» conserva la idea de movimiento desordenado e impetuoso que el POB inglés decidió con «drive madly», sin reducirlo a mera jactancia.
- source_word: הָרֶכֶב
  english_pob_choice: O chariots
  chosen_spanish: carros
  alternatives_spanish:
  - carros de guerra
  - la caballería de carros
  - carros de combate
  lexicon: HALOT
  rationale: רכב se refiere al cuerpo de carros. «Carros» es la forma más directa y natural en español; el vocativo se entiende por el contexto poético.
- source_word: וְיֵצְאוּ
  english_pob_choice: let ... go out
  chosen_spanish: salgan
  alternatives_spanish:
  - que salgan
  - que marchen
  - salgan afuera
  lexicon: HALOT
  rationale: El imperfecto tiene fuerza jussiva después de los imperativos. «Salgan» transmite la exhortación de forma concisa y correcta.
- source_word: הַגִּבּוֹרִים
  english_pob_choice: the warriors
  chosen_spanish: los guerreros
  alternatives_spanish:
  - los valientes
  - los héroes
  - los poderosos
  lexicon: HALOT
  rationale: En contexto militar, גִּבּוֹרִים designa combatientes fuertes; «guerreros» mantiene el sentido bélico sin cargar con matices épicos innecesarios.
- source_word: כּוּשׁ
  english_pob_choice: Cush
  chosen_spanish: Cus
  alternatives_spanish:
  - Cush
  lexicon: HALOT
  rationale: Se translitera el etnónimo, y en español bíblico estándar «Cus» es la forma más natural y reconocible. Evita traducirlo por identidades geográficas posteriores.
- source_word: פּוּט
  english_pob_choice: Put
  chosen_spanish: Put
  alternatives_spanish:
  - Put
  lexicon: HALOT
  rationale: Nombre étnico/toponímico conservado por transliteración para no introducir una identificación interpretativa.
- source_word: תֹּפְשֵׂי מָגֵן
  english_pob_choice: who grasp the shield
  chosen_spanish: los que toman el escudo
  alternatives_spanish:
  - portadores de escudos
  - los que empuñan el escudo
  - los que asen el escudo
  lexicon: HALOT
  rationale: La frase describe concretamente a quienes toman el escudo. «Tomar» conserva la imagen de agarrar/aferrar sin sonar artificial en español.
- source_word: לוּדִים
  english_pob_choice: the Ludim
  chosen_spanish: los luditas
  alternatives_spanish:
  - los ludim
  - los lidios
  lexicon: HALOT
  rationale: Se preserva el etnónimo con una forma castellana legible. «Luditas» mantiene la referencia a los Ludim sin sustituirla por la identificación tradicional más interpretativa de «lidios».
- source_word: תֹּפְשֵׂי דֹּרְכֵי קָשֶׁת
  english_pob_choice: who grasp and bend the bow
  chosen_spanish: los que toman y manejan el arco
  alternatives_spanish:
  - los que empuñan y tensan el arco
  - los que toman y doblan el arco
  - los que toman y curvan el arco
  lexicon: HALOT
  rationale: La combinación participial sugiere preparación y uso del arco. «Manejan» intenta conservar el doble movimiento de tomar y ejercer el arco en español natural; «bend» puede expresarse en español como tensar o manejar según el contexto bélico.
translation_notes:
  revision_awareness: Se siguió la revisión del POB en inglés que cambió 'rage' por 'drive madly'; por eso la formulación española eligió un verbo de frenesí bélico («enloquezcan») en lugar de uno centrado en la jactancia. También se preservó la alternancia de imperativos y jussivos en una sola línea poética.
  spanish_consistency_notes:
  - Se mantuvo el tono de oráculo bélico breve y directo.
  - Los etnónimos se transliteran sin convertirlos en identificaciones geográficas interpretativas.
  - El arco se expresa con vocabulario natural en español sin perder la imagen concreta de la participación en combate.
