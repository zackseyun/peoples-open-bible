lexical_decisions:
- source_word: מְקִימִי
  english_pob_choice: raises
  chosen_spanish: levanta
  alternatives_spanish:
  - hace levantar
  - alza
  - pone en pie
  lexicon: HALOT
  rationale: 'El hebreo hifil expresa acción causativa: hacer que alguien se levante de una condición baja. «Levanta» conserva esa idea en español natural y mantiene el paralelismo con el segundo hemistiquio.'
- source_word: מֵעָפָר
  english_pob_choice: from the dust
  chosen_spanish: del polvo
  alternatives_spanish:
  - del polvo de la tierra
  - de la tierra
  - del polvo
  lexicon: HALOT
  rationale: עָפָר designa polvo o tierra suelta. «Polvo» reproduce la imagen concreta de humillación y extrema bajeza sin sobrecargarla.
- source_word: דָּל
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el necesitado
  - el humilde
  - el indigente
  lexicon: HALOT
  rationale: דָּל puede abarcar pobreza, debilidad o escasa consideración social. «El pobre» sigue de cerca la opción inglesa y conserva la referencia social concreta.
- source_word: מֵאַשְׁפֹּת
  english_pob_choice: from the ash heap
  chosen_spanish: del montón de ceniza
  alternatives_spanish:
  - del basurero
  - del estercolero
  - del montón de desechos
  lexicon: HALOT
  rationale: אַשְׁפֹּת refiere a un lugar de cenizas o residuos. «Montón de ceniza» preserva la imagen tradicional y sigue siendo comprensible en español actual.
- source_word: יָרִים
  english_pob_choice: lifts
  chosen_spanish: alza
  alternatives_spanish:
  - levanta
  - exalta
  - sube
  lexicon: HALOT
  rationale: El verbo hifil de רום significa elevar o levantar. «Alza» mantiene el paralelismo poético con «levanta» y evita anticipar la idea más interpretativa de «exalta».
- source_word: אֶבְיוֹן
  english_pob_choice: the needy
  chosen_spanish: el necesitado
  alternatives_spanish:
  - el pobre
  - el indigente
  - el menesteroso
  lexicon: HALOT
  rationale: אֶבְיוֹן denota a alguien necesitado o desamparado. «El necesitado» distingue este término de דָּל y conserva el matiz de carencia inmediata.
theological_decisions:
- issue: Imagen social concreta de reversión
  english_pob_reading: Concrete social reversal language is preserved rather than spiritualized.
  chosen_spanish_reading: Se conserva el lenguaje concreto de reversión social, sin espiritualizarlo.
  alternative_spanish_readings:
  - Se generaliza a una exaltación espiritual.
  - Se interpreta como humildad interior más que pobreza material.
  rationale: El hebreo emplea imágenes materiales muy vívidas («polvo», «montón de ceniza») y categorías sociales («pobre», «necesitado»). La traducción mantiene ese nivel de concreción y no lo convierte en una abstracción espiritual.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Coincide con el consenso del audit trail inglés; no se registran revisiones aplicadas en la fuente y la lectura revisada permanece estable.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma habitual del proyecto solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se mantiene la paralelidad verbal «levanta / alza» para reflejar la duplicación poética del hebreo.
  - «Pobre» y «necesitado» se distinguen como dos términos próximos pero no idénticos, respetando la diferencia del original.
