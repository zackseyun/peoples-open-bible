translation:
  language: es
  text: Él hizo lo malo ante los ojos de Yahvé, tal como había hecho Manasés su padre. Amón sacrificó a todas las imágenes talladas[a] que Manasés su padre había hecho, y les sirvió[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ídolos» por «imágenes talladas». El hebreo se refiere específicamente a imágenes labradas o talladas.
    reason: lexical_alternative
  - marker: b
    text: O «las adoró». El verbo hebreo literalmente significa «les sirvió», y a menudo se usa para servicio religioso.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ הָרַע
  english_pob_choice: He did what was evil
  chosen_spanish: hizo lo malo
  alternatives_spanish:
  - hizo el mal
  - hizo lo que era malo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y evalúa la conducta moralmente. «Hizo lo malo» mantiene el valor acusatorio sin sonar forzado en español; evita una calca excesivamente pesada y conserva la fuerza ética del original.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: La imagen hebrea de evaluación divina se refleja bien con «ante los ojos de Yahvé», que es natural en español y conserva la idea de juicio/valoración divina. Se mantiene «Yahvé» por la convención del proyecto para יְהוָה.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en forma directa, conforme a la guía del proyecto. «Yahvé» es la forma estándar elegida para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: כַּאֲשֶׁר עָשָׂה
  english_pob_choice: just as ... had done
  chosen_spanish: tal como había hecho
  alternatives_spanish:
  - como había hecho
  - igual que había hecho
  lexicon: HALOT
  rationale: La comparación indica imitación de la conducta previa de Manasés. «Tal como había hecho» reproduce con claridad la anterioridad del acto en español y mantiene el paralelismo narrativo.
- source_word: מְנַשֶּׁה אָבִיו
  english_pob_choice: Manasseh his father
  chosen_spanish: Manasés su padre
  alternatives_spanish:
  - su padre Manasés
  - Manasés, su padre
  lexicon: HALOT
  rationale: Se preserva la aposición hebrea de manera fluida en español. «Manasés su padre» es comprensible y sigue de cerca la estructura del original sin volverse rígida.
- source_word: הַפְּסִילִים
  english_pob_choice: the carved images
  chosen_spanish: los ídolos tallados
  alternatives_spanish:
  - las imágenes talladas
  - las imágenes esculpidas
  lexicon: HALOT
  rationale: El término hebreo apunta a imágenes labradas/talladas. «Ídolos tallados» conserva el componente material de fabricación que el POB inglés destacó, sin perder el sentido religioso en el contexto.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that ... had made
  chosen_spanish: que ... había hecho
  alternatives_spanish:
  - que ... hizo
  - los cuales ... había hecho
  lexicon: HALOT
  rationale: Se usa pluscuamperfecto para reflejar que la fabricación de las imágenes precede a la acción de Amón. La cláusula relativa mantiene la relación temporal y causal del hebreo.
- source_word: זִבַּח
  english_pob_choice: sacrificed to
  chosen_spanish: sacrificó a
  alternatives_spanish:
  - ofreció sacrificios a
  - inmoló a
  lexicon: HALOT
  rationale: En contexto cultual, זבח significa ofrecer sacrificio. «Sacrificó a» conserva la dirección del acto hacia los ídolos y es natural en español bíblico contemporáneo.
- source_word: וַיַּעַבְדֵם
  english_pob_choice: and served them
  chosen_spanish: y les sirvió
  alternatives_spanish:
  - y los sirvió
  - y los adoró
  lexicon: HALOT
  rationale: Se preserva el verbo de servicio, como en la lectura inglesa, porque el hebreo literalmente dice «les sirvió». En español, la forma con pronombre indirecto comunica bien la dependencia cultual sin sustituirla por un verbo más interpretativo como «adoró».
- source_word: אָמֹון
  english_pob_choice: Amon
  chosen_spanish: Amón
  alternatives_spanish:
  - Amon
  lexicon: HALOT
  rationale: Se translitera el nombre propio con la acentuación española habitual cuando corresponde. «Amón» es claro para lectores en español y respeta la referencia personal del texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la doctrina del proyecto, se conserva el nombre divino en español como «Yahvé» para no ocultar el nombre personal del pacto mediante una sustitución titulativa.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de וַיַּעַבְדֵם en contexto idolátrico
  english_pob_reading: served them
  chosen_spanish_reading: y les sirvió
  alternative_spanish_readings:
  - y los adoró
  - y les rindió culto
  rationale: El verbo básico es «servir», y el contexto idolátrico deja implícita la dimensión religiosa. Se mantiene la forma más cercana al léxico hebreo, sin borrar la tensión entre servicio y adoración.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Referencia a los פסילים como objetos fabricados
  english_pob_reading: the carved images
  chosen_spanish_reading: los ídolos tallados
  alternative_spanish_readings:
  - las imágenes talladas
  - los ídolos esculpidos
  rationale: El hebreo señala objetos hechos por talla/labrado. «Ídolos tallados» conserva esa concreción material y al mismo tiempo comunica su función idolátrica en el contexto narrativo.
  doctrine_reference: 'DOCTRINE.md Contested terms: פסלים / images'
translation_notes:
  revision_awareness: El contexto inglés revisado mantiene alta concordancia con el hebreo y no requiere cambios sustantivos; se han ajustado únicamente las opciones españolas para lograr naturalidad, precisión idiomática y consistencia con la terminología del proyecto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme a la guía del proyecto.
  - Se conservó la diferencia entre «sacrificó» y «sirvió», reflejando dos verbos hebreos distintos.
  - Se tradujo פְּסִילִים con un término que retiene la idea de objetos tallados y su carga idolátrica.
  - Se usó pluscuamperfecto («había hecho») para la acción previa de Manasés, como en el audit trail inglés.
