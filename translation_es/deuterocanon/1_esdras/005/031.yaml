review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue fielmente la estructura repetitiva del griego («υἱοὶ ...») y respeta la decisión auditada de no armonizar con el paralelo hebreo de Nehemías. La nota [a] preserva correctamente esa rationale textual. Sin embargo, varias transliteraciones inglesas se dejaron prácticamente sin adaptar al español, lo que debilita la legibilidad y la coherencia ortográfica en español.
  spanish_quality_summary: 'La frase base «los hijos de...» es natural y adecuada para una lista genealógica. El principal problema de calidad es onomástico: formas como «Phinoe», «Akouph», «Pharakem» y «Assana» conservan grafías anglófonas o demasiado crudas para español; además «Daisán» introduce acento gráfico sin necesidad clara, mientras otras formas no se adaptan. Conviene hispanizar mínimamente las transliteraciones sin apartarse del griego.'
  glossary_alignment: 'No hay términos teológicos relevantes aquí. La política del proyecto sobre transliterar nombres desde el griego sí aplica, pero en español debe hacerse con convenciones españolas razonables: φ normalmente como «f», no «ph»; dobles consonantes no necesarias pueden simplificarse; y debe evitarse mezclar transliteración inglesa con ortografía española.'
  issues:
  - severity: medium
    issue: Uso de transliteraciones con «ph» en nombres propios
    rationale: En español bíblico general, «ph» es una convención extraña y anglicada; «Φινόε» y «Φαρακέμ» se representan mejor como «Finoe» y «Farakem», preservando la cercanía al griego pero con ortografía española legible.
  - severity: medium
    issue: Conservación inconsistente de formas inglesas crudas como «Akouph», «Assana»
    rationale: Estas formas reflejan decisiones gráficas del POB inglés más que un destino español. «Acuf» y «Asana»/«Assana» requieren decisión española; dado que la doble sigma no necesita duplicarse en español y «ou/ph» no son naturales, conviene adaptar a «Acuf» y «Asana».
  - severity: low
    issue: Acentuación innecesaria en «Daisán»
    rationale: La forma griega no obliga a añadir tilde española aquí, y el resto de la lista no está adaptado de modo similar. «Daisan» mantiene mejor una transliteración uniforme y evita sobreinterpretar la prosodia.
  - severity: low
    issue: Algunas transliteraciones pueden simplificarse para español sin perder fidelidad
    rationale: Formas como «Asour» y «Ozeiou» son fuente-cercanas, pero en español pueden mantenerse si el proyecto prefiere máxima cercanía. No es necesario forzar una normalización mayor; por eso la revisión propuesta es conservadora y solo corrige los anglicismos más notorios.
