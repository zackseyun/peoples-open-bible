- from: Redime a Israel[a], oh Dios, de todas sus angustias.
  to: Redime a Israel[a], oh Dios, de todas sus tribulaciones.
  rationale: Se corrige la forma vocativa a la ortografía española estándar («oh Dios») y se sustituye «angustias» por «tribulaciones» para reflejar mejor el alcance de צָרוֹת como adversidades o aflicciones. Se mantiene la nota sobre la alternativa colectiva del posesivo, anclada en «Israel», porque el español «sus» no distingue número y la nota sigue siendo útil para preservar la decisión gramatical del hebreo documentada en el POB inglés.
