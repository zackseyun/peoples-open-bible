revisions:
- from: 'Entonces respondió Isaac, su padre, y le dijo: «Mira, tu morada será de la riqueza de la tierra, y del rocío de los cielos de arriba»[a].'
  to: 'Entonces su padre Isaac respondió y le dijo: «He aquí, tu morada será de la riqueza de la tierra y del rocío del cielo arriba[a]».'
  rationale: Se ajusta el registro de הִנֵּה con «He aquí», se mejora la naturalidad del español con «su padre Isaac» y «del cielo arriba», y se corrige la nota para que ancle la ambigüedad de מִן exactamente donde corresponde, presentando una alternativa real en vez de repetir el texto principal.
