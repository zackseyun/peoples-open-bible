translation:
  language: es
  text: 'Entonces David bendijo a Yahvé delante de toda la asamblea, y David dijo: «Bendito eres tú, Yahvé, el Dios de Israel nuestro padre[a], desde la eternidad y hasta la eternidad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios de Israel, nuestro Padre», si «nuestro padre» se entiende como apelativo directo a Dios y no como referencia a Israel/Jacob.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְבָרֶךְ
  english_pob_choice: blessed
  chosen_spanish: bendijo
  alternatives_spanish:
  - lo bendijo
  - alabó
  lexicon: HALOT
  rationale: En hebreo, ברך en piel con Dios como objeto expresa una acción de bendecir dirigida a Dios, con sentido de alabanza litúrgica. En español, "bendijo" conserva el enlace léxico con "Bendito eres tú" y evita reducir el acto a una simple alabanza genérica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino según la política del proyecto. "Yahvé" preserva la referencia al Tetragrámaton sin sustituirlo por un título.
- source_word: לְעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: delante de
  alternatives_spanish:
  - a la vista de
  - en presencia de
  lexicon: HALOT
  rationale: La locución hebrea es idiomática y pública. "Delante de" comunica con naturalidad en español la idea de testimonio abierto ante todos, sin perder el valor visual/público del original.
- source_word: כָּל הַקָּהָל
  english_pob_choice: all the assembly
  chosen_spanish: todo el asamblea
  alternatives_spanish:
  - toda la asamblea
  - toda la congregación
  lexicon: HALOT
  rationale: Se intentó conservar el sustantivo de reunión comunitaria con tono formal. Sin embargo, la forma correcta en español es "toda la asamblea"; el artículo y el género deben concordar con el sustantivo femenino.
- source_word: בָּרוּךְ אַתָּה
  english_pob_choice: Blessed are you
  chosen_spanish: Bendito eres tú
  alternatives_spanish:
  - Bendito seas tú
  - Bendito eres
  lexicon: HALOT
  rationale: La fórmula predicativa de bendición se expresa de modo natural en español con "Bendito eres tú". Conserva la dirección directa a Dios y el registro doxológico del hebreo.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - Dios de Israel
  lexicon: HALOT
  rationale: 'Se añade el artículo para lograr una apposición natural en español: "Yahvé, el Dios de Israel". Esto sigue la revisión inglesa que precisó the God for mayor naturalidad.'
- source_word: אָבִינוּ
  english_pob_choice: our father
  chosen_spanish: nuestro padre
  alternatives_spanish:
  - nuestro antepasado
  - padre nuestro
  lexicon: HALOT
  rationale: 'Se conserva la lectura propuesta por el audit trail: el sintagma se entiende como parte de la designación histórica de Israel/Jacob, no como una dirección directa a Dios. "Nuestro padre" mantiene esa ambigüedad controlada.'
- source_word: מֵעוֹלָם וְעַד עוֹלָם
  english_pob_choice: from everlasting to everlasting
  chosen_spanish: desde la eternidad y hasta la eternidad
  alternatives_spanish:
  - de eternidad a eternidad
  - por siempre y para siempre
  lexicon: HALOT
  rationale: El hebreo expresa duración ilimitada en ambos extremos. "Desde la eternidad y hasta la eternidad" reproduce el paralelismo y el tono elevado, mientras que "eternidad" comunica bien el alcance temporal en español.
theological_decisions:
- issue: Referente de "nuestro padre" en la frase "el Dios de Israel, nuestro padre"
  english_pob_reading: '''our father'' refers to Israel/Jacob, yielding ''the God of Israel our father'''
  chosen_spanish_reading: '"nuestro padre" se toma como referencia a Israel/Jacob, no como vocativo directo a Dios'
  alternative_spanish_readings:
  - '"nuestro Padre" como dirección directa a Dios'
  - '"el Dios de Israel, Padre nuestro"'
  rationale: La sintaxis hebrea favorece la lectura appositiva tradicional del nombre patriarcal. La traducción conserva la tensión interpretativa sin imponer una formulación devocional que el hebreo no exige.
  doctrine_reference: Preservar la primacía del texto fuente y la ambigüedad controlada; no resolver teológicamente donde el hebreo permite más de una lectura.
translation_notes:
  revision_awareness: El auditable inglés revisó la frase a 'the God of Israel our father' para hacer más natural la apposición. En español se reflejó esa mejora con 'el Dios de Israel, nuestro padre', manteniendo la lectura principal y una nota para la alternativa. También se adaptó la fórmula de bendición a una estructura española idiomática sin perder el paralelismo del hebreo.
  spanish_consistency_notes:
  - Se usa "Yahvé" como forma estable para el Tetragrámaton.
  - Se prefiere "bendijo" / "Bendito eres tú" para conservar el vínculo léxico de ברך.
  - '"Asamblea" se emplea para קָהָל en un registro público y formal.'
  - La fórmula final conserva el paralelismo hebreo con una sintaxis natural en español.
  - Se mantiene la ambigüedad de אָבִינוּ mediante nota, sin forzar una solución dogmática.
