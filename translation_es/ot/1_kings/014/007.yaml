  text: לְכִ֞י אִמְרִ֣י לְ/יָרָבְעָ֗ם כֹּֽה אָמַ֤ר יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל יַ֛עַן אֲשֶׁ֥ר הֲרִימֹתִ֖י/ךָ מִ/תּ֣וֹךְ הָ/עָ֑ם וָ/אֶתֶּנְ/ךָ֣ נָגִ֔יד עַ֖ל עַמִּ֥/י יִשְׂרָאֵֽל־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_kings/014/007.yaml
  text: 'Go and say to Jeroboam[a], ‘Thus says Yahweh[b], the God of Israel: Because I raised you up from among the people and made you ruler over my people Israel,’'
  footnotes:
  - marker: a
    text: Or “I exalted you” for “I raised you up.”
    reason: lexical_alternative
  - marker: b
    text: Or “appointed you leader” for “made you ruler.” The Hebrew literally says “gave you as ruler.”
    reason: lexical_alternative
