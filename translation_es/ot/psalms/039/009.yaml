  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Transgresiones' para פְּשָׁעַי, 'líbrame' para הַצִּילֵנִי y 'necio' para נָבָל están bien justificadas. No intervienen términos sensibles como Yahvé/Mesías/esclavo en este verso.
