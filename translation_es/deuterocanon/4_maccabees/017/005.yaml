translation:
  language: es
  text: No está la luna en majestad en el cielo con las estrellas, como tú, que has guiado a tus siete hijos, iguales a las estrellas, hacia la piedad[a], has llegado a estar honrada ante Dios y has sido establecida en el cielo con ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "habiendo iluminado a tus siete hijos, iguales a las estrellas, hacia la piedad". φωταγωγήσασα también puede entenderse más literalmente como "habiendo iluminado" o "habiendo conducido a la luz".'
    reason: lexical_alternative
  - marker: b
    text: La frase final también puede entenderse más literalmente como "has sido establecida en el cielo con ellos", en sentido de firmamento; pero en contexto probablemente se refiere al honor celestial de la madre con sus hijos.
    reason: alternative_reading
lexical_decisions:
- source_word: σελήνη
  english_pob_choice: moon
  chosen_spanish: la luna
  alternatives_spanish:
  - la luna
  lexicon: LSJ
  rationale: Término celestial directo; en español suena natural con artículo definido en la comparación.
- source_word: σεμνὴ
  english_pob_choice: in majesty
  chosen_spanish: con majestad
  alternatives_spanish:
  - noble
  - augusta
  - digna
  lexicon: LSJ
  rationale: El adjetivo expresa dignidad solemne o esplendor augusto. 'Con majestad' conserva el tono elevado y funciona bien con 'se yergue'.
- source_word: καθεστήκεν / καθεστήκας
  english_pob_choice: stand / have come to stand
  chosen_spanish: se yergue / te has puesto
  alternatives_spanish:
  - está establecida
  - permanece firme
  - has sido puesta
  lexicon: LSJ
  rationale: El verbo puede indicar estar colocado o establecido en un estado. En español, 'se yergue' preserva la imagen de presencia majestuosa; 'te has puesto' refleja el matiz resultativo del perfecto en la segunda cláusula.
- source_word: ἰσαστέρους
  english_pob_choice: equal to the stars
  chosen_spanish: iguales a las estrellas
  alternatives_spanish:
  - semejantes a las estrellas
  - al nivel de las estrellas
  - pares a las estrellas
  lexicon: LSJ
  rationale: El compuesto comunica igualdad con las estrellas. 'Iguales a las estrellas' es claro y no fuerza un adjetivo comprimido poco natural en español.
- source_word: παῖδας
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - niños
  - descendientes
  lexicon: LSJ
  rationale: En español 'hijos' es natural y, por el contexto narrativo, ya se entiende que son varones; evita sobreespecificar sin necesidad.
- source_word: φωταγωγήσασα
  english_pob_choice: having guided / having enlightened
  chosen_spanish: guiando
  alternatives_spanish:
  - habiendo iluminado
  - habiendo conducido a la luz
  - habiendo guiado a la luz
  lexicon: LSJ
  rationale: El participio sugiere conducir hacia la luz o iluminar. 'Guiando' mantiene la dirección del verbo y enlaza con la idea de orientar a los hijos hacia la piedad sin perder la imagen luminosa.
- source_word: πρὸς τὴν εὐσέβειαν
  english_pob_choice: toward godliness
  chosen_spanish: hacia la piedad
  alternatives_spanish:
  - hacia la devoción a Dios
  - hacia la reverencia
  - hacia la fidelidad piadosa
  lexicon: LSJ
  rationale: εὐσέβεια en este contexto apunta a piedad/reverencia religiosa. 'Piedad' es una equivalencia idiomática fiel y sobria en español.
- source_word: ἔντιμος
  english_pob_choice: honored
  chosen_spanish: en honor
  alternatives_spanish:
  - honrada
  - tenida en honor
  - estimada
  lexicon: LSJ
  rationale: La construcción 'te has puesto en honor delante de Dios' expresa el estado de honor. En español suena más natural que un adjetivo aislado y conserva la relación con θεῷ.
- source_word: ἐστήρισαι
  english_pob_choice: have been established
  chosen_spanish: has sido establecida
  alternatives_spanish:
  - has sido afirmada
  - has quedado establecida
  - has sido fijada
  lexicon: LSJ
  rationale: El perfecto pasivo transmite ser colocada firmemente. 'Has sido establecida' conserva ese sentido sin desplazar el registro.
- source_word: ἐν οὐρανῷ σὺν αὐτοῖς
  english_pob_choice: in heaven with them
  chosen_spanish: en el cielo con ellos
  alternatives_spanish:
  - en el cielo junto con ellos
  - en los cielos con ellos
  - en el cielo junto a ellos
  lexicon: LSJ
  rationale: Aunque οὐρανός puede significar 'cielo' o 'cielos', en español 'en el cielo' mantiene la correspondencia con la escena final de exaltación y es más natural junto con la clausula precedente.
theological_decisions:
- issue: 'οὐρανός final: ''cielo'' frente a ''cielo/heaven'' como estado de honor escatológico'
  english_pob_reading: '''have been established in heaven with them'' with note that ''sky'' is a more literal alternative'
  chosen_spanish_reading: '''has sido establecida en el cielo con ellos'''
  alternative_spanish_readings:
  - '''has sido establecida en el cielo'''
  - '''has sido establecida en los cielos con ellos'''
  - '''has sido establecida en el firmamento con ellos'''
  rationale: Conserva la tensión documentada entre el valor literal de 'cielo' como espacio visible y el matiz de exaltación postmortem. En español 'cielo' permite ambas resonancias sin resolverlas indebidamente.
  doctrine_reference: Preservar la tensión semántica y la lectura contextual; no forzar una localización cosmológica ni una sistematización doctrinal.
translation_notes:
  revision_awareness: El audit trail inglés revisó 'in the sky' a 'in heaven' en la clausula final y ajustó φωταγωγήσασα desde una imagen demasiado literal de 'give light' hacia una orientación más natural como 'guide/enlighten'. La versión española sigue esa revisión, pero conserva la tensión entre la imagen luminosa inicial y la culminación celestial final.
  spanish_consistency_notes:
  - Mantengo 'cielo' para οὐρανός en la clausula final, en línea con la lectura contextual de honor celestial.
  - Uso 'piedad' para εὐσέβεια por ser el equivalente más directo y sobrio en español eclesial.
  - Conservo la imagen de luz mediante 'guiando' y la nota alternativa sobre 'iluminado', sin borrar la metáfora original.
  - 'El orden de los miembros reproduce el paralelismo del griego: comparación con la luna, luego exaltación de la madre y sus hijos.'
