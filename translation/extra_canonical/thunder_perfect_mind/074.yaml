translation:
  text: 'those who exist with me[a], and the poor.

    What is within, in the heart—I am she.

    I am the honored one,

    and the one whom they praise,

    and the one whom they despise in scorn[e][d][c][b].

    I am'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The Coptic ⲧⲁⲉⲓⲏⲟⲩ here is uncertain; ‘my appearance’ is tentative. Alternatives
      include ‘my image,’ ‘my thought,’ or even ‘my house.’ Context with ‘face’ (ⲣⲟⲥ)
      motivates a visual gloss.
    reason: lexical_alternative
  - marker: b
    text: ⲥⲙⲟⲟⲩ can mean ‘bless’ or ‘praise,’ and sometimes ‘name.’ ‘Praise’ is chosen
      to form a clear antithesis with ‘despise.’
    reason: lexical_alternative
  - marker: c
    text: The pronoun ⲙⲙⲟⲥ (‘them’) likely refers back to ‘the poor,’ but the antecedent
      is not explicit in the excerpt.
    reason: alignment_note
  - marker: d
    text: ϩⲛ ⲟⲩϣⲱⲥ ⲁⲛⲟⲕ could also be taken as ‘in a voice, It is I’ or attached to
      the following line in some editions.
    reason: textual_variant
  - marker: e
    text: 'Or ''Be present with me, and with the poor.\nWhat is within, in the heart—I
      am she.\nMy appearance[a]—you praise[b] the face,\nand you despise them[c],\nwith
      a voice: “I am.”[d]''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ϣⲟⲟⲡ
  chosen: be present
  alternatives:
  - come forth
  - be ready
  lexicon: Crum, s.v. ϣⲟⲟⲡ
  rationale: Imperative-like appeal to the audience fits Thunder’s exhortive lines;
    “be present” preserves the verb’s existential/locative nuance.
- source_word: ⲛ̄ⲙⲙⲁⲉⲓ
  chosen: with me
  alternatives:
  - beside me
  - in my company
  lexicon: Standard Sahidic pronominal prepositional form
  rationale: Straightforward prepositional phrase; do not over-interpret.
- source_word: ⲛⲓϩⲓⲟⲙⲉ
  chosen: the poor
  alternatives:
  - the needy
  - the destitute
  lexicon: Crum, s.v. ϩⲓⲟⲙⲉ
  rationale: Common Sahidic term for poor persons (pl.).
- source_word: ⲉⲧϣⲟⲟⲡ ⲛ̄ϩⲏⲧ
  chosen: what is within, in the heart
  alternatives:
  - what exists inside
  - what is in the heart
  lexicon: Crum, s.v. ϩⲏⲧ
  rationale: Relative clause + locative; explicit “in the heart” retained to avoid
    abstraction.
- source_word: ⲁⲛⲟⲕ ⲧⲉ
  chosen: I am she
  alternatives:
  - I am (the one) [f.]
  - It is I (f.)
  lexicon: Standard Coptic copular pronoun (feminine)
  rationale: Preserves the female voice and the recurring “I am” formula.
- source_word: ⲧⲁⲉⲓⲏⲟⲩ
  chosen: my appearance
  alternatives:
  - my image
  - my house
  - my thought/intention
  lexicon: Uncertain; possible connection to ‘appearance/form’ by context
  rationale: Segment is uncertain; “appearance” is chosen tentatively because the
    following word ⲣⲟⲥ (‘face’) supports a visual/manifestation field.
- source_word: ⲥⲙⲟⲟⲩ
  chosen: praise
  alternatives:
  - bless
  - name
  lexicon: Crum, s.v. ⲥⲙⲟⲟⲩ
  rationale: Verb often means bless/praise; “praise” pairs naturally with the antithetical
    “despise.” “Name” is possible but less likely in this collocation with ‘face.’
- source_word: ⲣⲟⲥ
  chosen: face
  alternatives:
  - presence
  - countenance
  lexicon: Crum, s.v. ⲣⲟⲥ
  rationale: Basic meaning ‘face’; keeps the concrete imagery.
- source_word: ⲕⲁⲧⲁⲫⲣⲟ(…)
  chosen: despise
  alternatives:
  - scorn
  - look down on
  lexicon: Loan from Gk. καταφρονέω
  rationale: Standard rendering for the Coptic loan; preserves the sharp antithesis
    with ‘praise.’
- source_word: ⲙⲙⲟⲥ
  chosen: them
  alternatives:
  - those ones
  lexicon: Crum, enclitic 3pl object pronoun
  rationale: Pronoun referent is ambiguous; most likely picks up ‘the poor’ from line
    1, so left as ‘them’ to keep ambiguity.
- source_word: ϩⲛ ⲟⲩϣⲱⲥ
  chosen: with a voice
  alternatives:
  - with a sound
  - in a voice
  lexicon: Crum, s.v. ϣⲱⲥ
  rationale: Retains concrete ‘voice/sound’ noun; avoids over-interpretation as ‘proclamation’.
- source_word: ⲁⲛⲟⲕ
  chosen: I am
  alternatives:
  - It is I
  lexicon: Standard first-person pronoun
  rationale: Echoes the work’s refrain; likely quoted as the reported utterance.
parallelism_check: 'The couplet structure juxtaposes solidarity (“with me / with the
  poor”) with an inner-identification claim (“what is within—I am she”), then contrasts
  audience behaviors: “you praise the face / and you despise them.” The antithetical
  pair ‘praise/despise’ is preserved without smoothing. The closing ‘with a voice:
  I am’ keeps the performative speech element, resonating with the work’s recurrent
  ‘I am’ declarations.'
voice_check: 'The feminine first-person divine voice is explicit: “I am she.” Second-person
  plural address is preserved in the implied ‘you’ of “you praise … you despise.”
  No attempt is made to homogenize or explain away the self-identification; the cadence
  stays stark and oracular.'
alignment_risk_note: 'Overall alignment confidence is medium; line-break mapping is
  heuristic. Specific risks: (1) ⲧⲁⲉⲓⲏⲟⲩ is lexically uncertain; ‘my appearance’ is
  a contextual guess based on the proximity of ⲣⲟⲥ (‘face’). It could be a different
  noun altogether (e.g., ‘my house,’ ‘my thought,’ ‘my image’). (2) The verb ⲥⲙⲟⲟⲩ
  may mean ‘bless’ or even ‘name’; we chose ‘praise’ to pair with ‘despise,’ but the
  collocation is not ironclad. (3) The despising object ⲙⲙⲟⲥ (‘them’) has an ambiguous
  antecedent; we infer it most likely refers to ‘the poor,’ but it could point to
  another plural referent in a fuller context. (4) The phrase ϩⲛ ⲟⲩϣⲱⲥ ⲁⲛⲟⲕ could
  be read differently (e.g., as a new clause in the next segment); punctuating it
  as reported speech ‘with a voice: “I am”’ is a reasonable but not certain choice.
  (5) The partial form ⲕⲁⲧⲁⲫⲣⲟ… suggests a broken loanword; we supply ‘despise’ from
  καταφρονέω, but the exact inflection is not visible.'
