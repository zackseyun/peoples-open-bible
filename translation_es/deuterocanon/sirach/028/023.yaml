translation:
  language: es
  text: Los que abandonan al Señor caerán en ella[a], y arderá entre ellos[b] y de ningún modo se apagará; se enviará contra ellos como un león, y como un leopardo los devastará[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre se refiere a la fuerza destructiva mencionada en el contexto previo, especialmente la lengua dañina.
    reason: cross_reference
  - marker: b
    text: 'O: «arderá en ellos». El griego puede entenderse con un matiz más interno que «entre ellos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «como una pantera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ καταλείποντες
  english_pob_choice: Those who forsake
  chosen_spanish: los que abandonan
  alternatives_spanish:
  - los que desamparan
  - los que dejan
  lexicon: LSJ
  rationale: El participio describe a personas caracterizadas por dejar o abandonar. En español, 'abandonan' comunica bien la ruptura fiel/religiosa que el contexto exige, sin sonar artificial.
- source_word: Κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Dios
  - al Dueño
  lexicon: LSJ
  rationale: Se mantiene la correspondencia reverente con κύριος. En español, 'Señor' es natural y conserva la relación con el sujeto abandonado.
- source_word: ἐμπεσοῦνται εἰς αὐτήν
  english_pob_choice: will fall into it
  chosen_spanish: caerán en ella
  alternatives_spanish:
  - caerán en eso
  - quedarán atrapados en ella
  lexicon: LSJ
  rationale: '''Caer en'' reproduce el valor de ἐμπίπτω. Se usa ''ella'' porque el antecedente femenino queda en el contexto inmediato; no se explicita ''la lengua'' en el texto principal para no añadir más de lo que este versículo dice.'
- source_word: ἐν αὐτοῖς ἐκκαήσεται
  english_pob_choice: it will burn among them
  chosen_spanish: arderá entre ellos
  alternatives_spanish:
  - se encenderá en ellos
  - arderá en ellos
  lexicon: LSJ
  rationale: '''Entre ellos'' sigue la decisión auditada del inglés POB y evita cerrar el sentido a una interioridad que el griego no exige. ''Arderá'' conserva la imagen de fuego activo y destructivo.'
- source_word: οὐ μὴ σβεσθῇ
  english_pob_choice: will certainly not be quenched
  chosen_spanish: de ningún modo se apagará
  alternatives_spanish:
  - no se apagará jamás
  - ciertamente no se apagará
  lexicon: LSJ
  rationale: La construcción οὐ μή con subjuntivo aoristo expresa negación enfática. 'De ningún modo' reproduce esa fuerza en español con un registro natural y solemne.
- source_word: ἐξαποσταλήσεται ἐπʼ αὐτοῖς
  english_pob_choice: it will be sent against them
  chosen_spanish: será enviada contra ellos
  alternatives_spanish:
  - será lanzada contra ellos
  - será mandada contra ellos
  lexicon: LSJ
  rationale: Se conserva el pasivo futuro y el valor hostil de ἐπί. 'Enviada' es más directo y natural que 'lanzada', sin perder la imagen de una fuerza desatada contra los impíos.
- source_word: ὡς λέων
  english_pob_choice: like a lion
  chosen_spanish: como un león
  alternatives_spanish:
  - cual león
  lexicon: LSJ
  rationale: Simil simple y estándar. 'Como un león' es la equivalencia más clara y fiel en español contemporáneo.
- source_word: ὡς πάρδαλις
  english_pob_choice: like a leopard
  chosen_spanish: como un leopardo
  alternatives_spanish:
  - como una pantera
  lexicon: LSJ
  rationale: πάρδαλις puede referirse a leopardo/pantera. En español, 'leopardo' es la opción más reconocible y precisa para lectores amplios.
- source_word: λυμανεῖται
  english_pob_choice: it will ravage them
  chosen_spanish: los devastará
  alternatives_spanish:
  - los arrasará
  - los despedazará
  - los arruinará
  lexicon: LSJ
  rationale: El verbo expresa daño violento y ruina. 'Devastará' conserva el sentido de agresión destructiva y encaja bien con la imaginería de bestia depredadora.
theological_decisions:
- issue: Referencia de la pronombre femenina y del sujeto implícito
  english_pob_reading: The pronoun 'it' refers to the destructive power described in the preceding context, especially the tongue's harmful speech.
  chosen_spanish_reading: Se deja 'ella' para la fuerza destructiva implícita, con antecedente recuperable del contexto inmediato, especialmente la lengua dañina del pasaje anterior.
  alternative_spanish_readings:
  - explicitar 'la lengua' en el texto principal
  - usar 'eso' para neutralizar la personificación
  rationale: El griego remite a un antecedente del contexto y no lo repite aquí. En español, 'ella' mantiene la concordancia con el antecedente femenino sin añadir una glosa interpretativa en el cuerpo del versículo. La nota permite recuperar el referente sin sobretraducir.
  doctrine_reference: 'Translation philosophy: optimal equivalence; conservar el referente contextual sin expandirlo indebidamente.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que prefirió 'sent against them' frente a 'sent out against them' por naturalidad. En español se reflejó directamente como 'será enviada contra ellos'. También se mantuvo la decisión auditada de no explicitar 'la lengua' en el texto principal, pero sí de señalar el antecedente en nota.
  spanish_consistency_notes:
  - Se usó 'Señor' para κύριος como equivalente reverente y natural en español.
  - Se preservó el tono judicial/destructivo del versículo sin suavizar la violencia del original.
  - Se evitó el calco 'apagada' para σβέννυμι en favor de 'apagará', más idiomático y fiel.
  - Se mantuvo la distinción entre la fuerza destructiva contextual y el antecedente explícito, con nota explicativa.
  - Se prefirió 'leopardo' como equivalente estándar de πάρδαλις, dejando 'pantera' como alternativa.
