translation:
  language: es
  text: Cántico de subidas[a]. En mi angustia llamé a Yahvé, y él me respondió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Cántico de subidas», una rúbrica tradicional para los Salmos 120–134; alternativamente, «Cántico de ascensos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁיר
  english_pob_choice: Song
  chosen_spanish: Cántico
  alternatives_spanish:
  - canción
  - canto
  - salmo
  lexicon: HALOT
  rationale: El hebreo denota un poema/canto. En español, «cántico» comunica con dignidad el carácter poético-litúrgico de la rúbrica sin convertirla en una interpretación más estrecha como «salmo». Aunque «canto» sería posible, «cántico» se ajusta bien a un encabezado bíblico formal.
- source_word: הַמַּעֲלוֹת
  english_pob_choice: Ascents
  chosen_spanish: ascensos
  alternatives_spanish:
  - subidas
  - gradas
  - goings up
  lexicon: HALOT
  rationale: La expresión fija שִׁיר הַמַּעֲלוֹת conserva la idea literal de movimiento hacia arriba. «Ascensos» mantiene esa dirección ascendente sin añadir una explicación que no está en el hebreo. Se evita «gradas» por sonar demasiado concreto e incierto para una rúbrica tradicional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según la convención de la POB en español. Se conserva el nombre divino y no se sustituye por un título como «SEÑOR».
- source_word: בַּצָּרָתָה לִּי
  english_pob_choice: In my distress
  chosen_spanish: En mi angustia
  alternatives_spanish:
  - en mi aflicción
  - en mi tribulación
  - en mi problema
  lexicon: HALOT
  rationale: La frase idiomática comunica una situación de gran presión o aflicción. «Angustia» preserva la intensidad del hebreo y funciona con naturalidad en español bíblico actual.
- source_word: קָרָאתִי
  english_pob_choice: I called
  chosen_spanish: clamé
  alternatives_spanish:
  - llamé
  - grité
  - invocé
  lexicon: HALOT
  rationale: Aunque el verbo básico es «llamar», en el contexto de aflicción la forma española más natural y fiel al tono es «clamé». Evita la ambigüedad de «llamé» y refleja una petición dirigida a Dios sin exagerar más allá del hebreo.
- source_word: וַיַּעֲנֵנִי
  english_pob_choice: and he answered me
  chosen_spanish: y él me respondió
  alternatives_spanish:
  - y me contestó
  - entonces me respondió
  - y respondió a mí
  lexicon: HALOT
  rationale: La forma narrativa פשוט[?] hebrea se expresa de manera directa en español con «y él me respondió». Se mantiene el sujeto explícito para claridad y se conserva el paralelismo simple del versículo.
theological_decisions:
- issue: 'Rúbrica de apertura: forma tradicional vs. literalidad de la expresión hebrea'
  english_pob_reading: A Song of Ascents
  chosen_spanish_reading: Cántico de ascensos
  alternative_spanish_readings:
  - Cántico de subidas
  - Cántico de peregrinaciones
  - Salmo de ascenso
  rationale: La POB en inglés preserva el sentido literal del título con una forma tradicional transparente. En español, «cántico de ascensos» conserva la metáfora espacial del hebreo y evita imponer de entrada una interpretación temática como «peregrinaciones», que no está explícita en el texto.
  doctrine_reference: 'Criterio POB sobre superscripciones: traducir la rúbrica con transparencia semántica sin armonizarla teológicamente o litúrgicamente.'
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal de la POB de representar יְהוָה con el nombre propio «Yahvé». Esto evita una sustitución por título y mantiene la referencia al nombre del pacto revelado en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés: no se requieren revisiones textuales ni cambios de sentido. La única variación relevante es la adaptación natural al español de la rúbrica y de la elección verbal en el contexto de aflicción.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar español del proyecto.
  - «Angustia» preserva el tono intenso de בצרה sin volverlo excesivamente interpretativo.
  - La rúbrica se traduce con transparencia semántica y se deja constancia de la alternativa literal más cercana en la nota.
  - No se introduce «salmo» en el texto principal, porque el hebreo dice «cántico» y la subscripción no lo especifica como género técnico.
