translation:
  language: es
  text: Para cambiar el curso del asunto[a], tu siervo Joab hizo esto. Pero mi señor es sabio, con la sabiduría del ángel de Dios[b], para conocer todo lo que hay en el país.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para darle la vuelta al asunto» o «para alterar la apariencia del asunto». El hebreo dice literalmente «cambiar/volver la faz del asunto».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todo lo que hay sobre la tierra». En contexto, «el país» probablemente se refiere al territorio o reino, no al mundo entero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבַעֲבוּר
  english_pob_choice: In order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el propósito de
  lexicon: HALOT
  rationale: En este contexto expresa finalidad. «Para» comunica de manera natural y fiel el valor de propósito sin volver la frase artificial en español.
- source_word: סַבֵּב אֶת־פְּנֵי הַדָּבָר
  english_pob_choice: change the course of the matter
  chosen_spanish: cambiar el curso del asunto
  alternatives_spanish:
  - darle la vuelta al asunto
  - cambiar la cara del asunto
  lexicon: HALOT
  rationale: El hebreo usa una imagen idiomática de «volver/cambiar la faz del asunto». En español, «curso del asunto» conserva la idea de alterar su dirección o desarrollo sin perder claridad.
- source_word: עָשָׂה ... אֶת־הַדָּבָר הַזֶּה
  english_pob_choice: did this thing
  chosen_spanish: hizo esto
  alternatives_spanish:
  - hizo esta cosa
  - hizo este asunto
  lexicon: HALOT
  rationale: «Esto» refleja bien el objeto deíctico y evita la repetición pesada de «asunto» o «cosa» en español.
- source_word: עַבְדְּךָ
  english_pob_choice: your servant
  chosen_spanish: tu siervo
  alternatives_spanish:
  - tu esclavo
  - tu servidor
  lexicon: HALOT
  rationale: En la fórmula cortesana ante el rey, «siervo» reproduce el tono deferente del hebreo. «Esclavo» sería demasiado fuerte para el registro aquí, y «servidor» es menos marcado lexicalmente.
- source_word: וַאדֹנִי
  english_pob_choice: But my lord
  chosen_spanish: Pero mi señor
  alternatives_spanish:
  - Y mi señor
  - Ahora bien, mi señor
  lexicon: HALOT
  rationale: La conjunción introduce una transición elogiosa y contrastiva. «Pero» reproduce esa función discursiva con naturalidad.
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - discreto
  lexicon: HALOT
  rationale: En alabanza al rey, «sabio» es el equivalente directo y digno. «Prudente» o «discreto» restringirían innecesariamente el sentido.
- source_word: כְּחָכְמַת מַלְאַךְ הָאֱלֹהִים
  english_pob_choice: with the wisdom of the angel of God
  chosen_spanish: con la sabiduría del ángel de Dios
  alternatives_spanish:
  - como la sabiduría del ángel de Dios
  - con la sabiduría de un ángel de Dios
  lexicon: HALOT
  rationale: La comparación se mantiene explícita. «Del ángel de Dios» sigue de cerca el hebreo definido, y preserva el tono de elogio sin convertirlo en una afirmación ontológica sobre el rey.
- source_word: לָדַעַת
  english_pob_choice: to know
  chosen_spanish: para conocer
  alternatives_spanish:
  - para saber
  - a fin de conocer
  lexicon: HALOT
  rationale: El infinitivo final se entiende bien como propósito o capacidad. «Conocer» es más amplio y elevado que «saber» en este elogio de discernimiento.
- source_word: כָּל אֲשֶׁר בָּאָרֶץ
  english_pob_choice: all that is in the land
  chosen_spanish: todo lo que hay en la tierra
  alternatives_spanish:
  - todo lo que hay en el país
  - todo lo que hay en la tierra/territorio
  lexicon: HALOT
  rationale: Aunque el POB inglés optó por «the land» en clave local, en español «tierra» mantiene mejor la ambigüedad natural de אֶרֶץ entre tierra, país o territorio. Dado el contexto real y la frase inmediatamente anterior, la referencia sigue siendo al ámbito del reino sin necesidad de explicitarlo en el texto.
theological_decisions:
- issue: Referencia y alcance de «el ángel de Dios»
  english_pob_reading: A comparative expression praising extraordinary discernment, not an ontological claim about the king.
  chosen_spanish_reading: Expresión comparativa de elogio por discernimiento extraordinario, no una afirmación ontológica sobre el rey.
  alternative_spanish_readings:
  - Comparación hiperbólica con conocimiento casi divino
  - Referencia a un mensajero celestial concreto
  rationale: El hebreo eleva el elogio de forma convencional. La traducción conserva la comparación y evita convertirla en una declaración doctrinal más fuerte de la que el texto pide.
  doctrine_reference: Mantener la tensión teológica sin resolverla indebidamente.
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que prefirió «the course of the matter» y «the angel of God», pero en español se mantuvo la idiomaticidad con «cambiar el curso del asunto» y se preservó la comparación definida con «el ángel de Dios».
  spanish_consistency_notes:
  - Se usó «Yahvé» donde corresponda en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantuvo «siervo» para la autodesignación cortesana de Joab, conforme al valor deferente del hebreo.
  - Se eligió «sabio»/«sabiduría» para reproducir el paralelismo elogioso sin añadir matices no presentes en el texto.
