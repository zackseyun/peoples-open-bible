translation:
  language: es
  text: Sobre todas las alturas desnudas[a] en el desierto han venido destructores, porque la espada de Yahvé está devorando desde un extremo del territorio hasta el otro extremo del territorio[b]; no hay paz para carne alguna[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «colinas desnudas» o «alturas sin árboles».
    reason: lexical_alternative
  - marker: b
    text: O «desde un extremo de la tierra hasta el otro extremo de la tierra». El hebreo אֶרֶץ puede significar «territorio» o «tierra».
    reason: alternative_reading
  - marker: c
    text: Hebreo «para toda carne», un hebraísmo para todas las personas o criaturas vivientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁפָיִם
  english_pob_choice: bare heights
  chosen_spanish: alturas desnudas
  alternatives_spanish:
  - cerros desnudos
  - alturas peladas
  - cumbres desnudas
  lexicon: HALOT
  rationale: El hebreo alude a elevaciones expuestas, sin cobertura vegetal. «Alturas desnudas» conserva la imagen topográfica y el valor adjetival del término sin introducir la carga cultual que a veces tiene «altos» en español bíblico.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: del desierto
  alternatives_spanish:
  - en el desierto
  - en la estepa
  - en la soledad
  lexicon: HALOT
  rationale: Aquí el contexto poético describe un paisaje devastado; «desierto» comunica bien la extensión árida en español natural. Se mantiene la referencia espacial sin forzar una lectura técnica distinta.
- source_word: שֹׁדְדִים
  english_pob_choice: destroyers
  chosen_spanish: los destructores
  alternatives_spanish:
  - los saqueadores
  - los devastadores
  - los despojadores
  lexicon: HALOT
  rationale: El participio abarca la idea de devastar y despojar por violencia. «Destructores» es amplio, claro y conserva el énfasis en agentes de ruina, no solo de robo.
- source_word: חֶרֶב לַיהוָה
  english_pob_choice: the sword of Yahweh
  chosen_spanish: la espada de Yahvé
  alternatives_spanish:
  - la espada de Yahvé
  - la espada de Yahvé pertenece a
  - la espada de Yahvé, la
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según el criterio del proyecto. «La espada de Yahvé» expresa bien la relación de posesión/origen y mantiene la imagen personificada del juicio.
- source_word: אֹכְלָה
  english_pob_choice: is devouring
  chosen_spanish: está devorando
  alternatives_spanish:
  - devora
  - va devorando
  - está consumiendo
  lexicon: HALOT
  rationale: La forma verbal presenta acción continua o en curso. «Está devorando» preserva ese aspecto progresivo y la fuerza vívida de la personificación de la espada.
- source_word: מִקְצֵה אֶרֶץ וְעַד קְצֵה הָאָרֶץ
  english_pob_choice: from one end of the land to the other end of the land
  chosen_spanish: desde un extremo de la tierra hasta el otro extremo de la tierra
  alternatives_spanish:
  - desde un extremo de la tierra hasta el otro
  - de un extremo del país al otro
  - de un confín de la tierra al otro
  lexicon: HALOT
  rationale: Se conservó la repetición enfática del hebreo. «Tierra» es una opción legítima para אֶרֶץ, y aquí da una amplitud retórica más cercana al original que «país»; no obstante, sigue siendo compatible con la lectura contextual del territorio devastado.
- source_word: אֵין שָׁלוֹם
  english_pob_choice: there is no peace
  chosen_spanish: no hay paz
  alternatives_spanish:
  - no hay bienestar
  - no hay seguridad
  - no hay paz ni sosiego
  lexicon: HALOT
  rationale: «Paz» es la traducción más directa y abarca suficientemente el campo de שָׁלוֹם en un contexto de juicio y guerra. Se evita sobreexplicar con equivalentes explicativos que debilitarían la concisión profética.
- source_word: לְכָל בָּשָׂר
  english_pob_choice: for any flesh
  chosen_spanish: para toda carne
  alternatives_spanish:
  - para cualquier carne
  - para todo ser humano
  - para todo ser viviente
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo con «carne», que en español bíblico puede sonar más literal y totalizante. «Toda carne» mantiene la amplitud de la negación y la tensión entre literalidad y sentido colectivo.
- source_word: עַל כָּל
  english_pob_choice: Upon all
  chosen_spanish: Sobre todas
  alternatives_spanish:
  - Sobre todo
  - En todas
  - Por encima de todas
  lexicon: HALOT
  rationale: «Sobre» reproduce bien la localización elevada del verso y su tono poético. Se evita un giro demasiado coloquial, manteniendo la imagen de dominio espacial.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  - el SEÑOR
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton, preservando el nombre propio del pacto en vez de sustituirlo por un título. Esto mantiene la trazabilidad con el hebreo y evita la convención de ocultamiento litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Alcance de אֶרֶץ en la expresión final de extensión
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - tierra
  - mundo
  rationale: Aunque el contexto inmediato apunta al territorio devastado, «tierra» conserva mejor la amplitud del hebreo y permite la repetición enfática del paralelismo. No se impone «mundo», que ampliaría indebidamente el horizonte.
  doctrine_reference: Translation philosophy §1, original-language primacy over translation tradition
- issue: Idiomatismo de בָּשָׂר
  english_pob_reading: any flesh
  chosen_spanish_reading: toda carne
  alternative_spanish_readings:
  - todo ser humano
  - toda criatura
  - toda carne
  rationale: «Carne» mantiene el valor idiomático hebreo sin reducir prematuramente el referente solo a personas. En este juicio profético, la amplitud de «toda carne» es parte del efecto retórico.
  doctrine_reference: 'DOCTRINE.md: Lexical force and idiom preservation'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con la revisión más reciente; no se registraron cambios aplicados. La redacción española mantiene las decisiones léxicas principales del audit trail inglés, especialmente en שְׁפָיִם, שֹׁדְדִים, חֶרֶב לַיהוָה, אֹכְלָה, אֶרֶץ y בָּשָׂר.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal para יהוה, coherente con el proyecto.
  - Se preservó la repetición hebrea de «extremo... extremo» en lugar de suavizarla.
  - «Toda carne» conserva el hebraísmo y la amplitud del cierre.
  - Se evitó «SEÑOR» y «Cristo», por no corresponder al texto ni al audit trail.
  - El tono general es bíblico, claro y publicable en español latinoamericano.
