translation:
  language: es
  text: 'Los hijos de Aser: Imna[a], Ishva, Ishvi y Bería, y Serah su hermana.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Los nombres hebreos presentan variación ortográfica en la tradición: «Imna» también puede aparecer como «Jimna»; «Ishva» como «Ishua»; e «Ishvi» como «Ishui».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En un contexto genealógico inmediato, בני introduce la lista de varones nombrados; «hijos de» conserva la relación directa y la forma breve del hebreo. «Descendientes de» sería posible, pero amplía el alcance más de lo que aquí exige el texto.
- source_word: אָשֵׁר
  english_pob_choice: Asher
  chosen_spanish: Aser
  alternatives_spanish:
  - Asher
  lexicon: HALOT
  rationale: Se usa la forma española asentada del nombre propio tribal/personal. Mantiene la identificación sin añadir interpretación.
- source_word: יִמְנָה
  english_pob_choice: Imnah
  chosen_spanish: Imná
  alternatives_spanish:
  - Jimná
  lexicon: HALOT
  rationale: Nombre propio transliterado al español. Se conserva la vocalización breve del hebreo; la tilde marca la sílaba final en español. «Jimná» reproduce una tradición inglesa más antigua, pero no es necesaria en español.
- source_word: יִשְׁוָה
  english_pob_choice: Ishvah
  chosen_spanish: Isvá
  alternatives_spanish:
  - Ishvá
  - Ishua
  lexicon: HALOT
  rationale: Se translitera el nombre según la forma masorética, buscando una grafía natural en español. «Ishua» reflejaría una convención inglesa alternativa, pero no la vocalización de este texto.
- source_word: יִשְׁוִי
  english_pob_choice: Ishvi
  chosen_spanish: Isví
  alternatives_spanish:
  - Ishví
  - Ishui
  lexicon: HALOT
  rationale: Nombre propio transliterado desde la vocalización hebrea. La forma con acento final respeta la pronunciación española esperable. «Ishui» corresponde a otra tradición inglesa.
- source_word: בְרִיעָה
  english_pob_choice: Beriah
  chosen_spanish: Bería
  alternatives_spanish:
  - Bería
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma breve y reconocible en español; la acentuación gráfica ayuda a la lectura sin alterar el nombre.
- source_word: שֶׂרַח
  english_pob_choice: Serah
  chosen_spanish: Serah
  alternatives_spanish:
  - Sérah
  - Sara
  lexicon: HALOT
  rationale: Se mantiene «Serah» para preservar el nombre hebreo distintivo y evitar confusión con «Sara/Sarah», que es otro nombre. Es la opción más fiel al texto base.
- source_word: אֲחוֹתָם
  english_pob_choice: their sister
  chosen_spanish: su hermana
  alternatives_spanish:
  - la hermana de ellos
  lexicon: HALOT
  rationale: El sufijo plural de tercera persona indica «su hermana» en referencia colectiva a los hermanos listados. En español, la posesión queda clara y fluida sin necesidad de explicitar «de ellos».
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no muestran revisiones textuales relevantes para esta línea genealógica. La principal labor fue adaptar los nombres propios al español sin perder la referencia al vocalizado masorético ni a las variantes tradicionales documentadas.
  spanish_consistency_notes:
  - 'Se conserva el orden del hebreo y del inglés POB: lista genealógica seguida de la mención de Serah como hermana.'
  - Se prefiere «Aser» como forma española establecida del nombre tribal.
  - Se mantiene la distinción entre transliteración de nombres y el tratamiento relacional «su hermana» para אֲחוֹתָם.
  - No se introducen glosas doctrinales ni armonizaciones genealógicas ajenas al versículo.
