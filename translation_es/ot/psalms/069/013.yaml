translation:
  language: es
  text: Los que se sientan en la puerta hablan de mí[b][a], y yo soy la canción de los que beben bebida fuerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los que se sientan a la puerta hablan de mí, y los que beben bebida fuerte cantan sobre mí».'
    reason: lexical_alternative
  - marker: b
    text: La «puerta» era el lugar público de la vida cívica y del juicio en una ciudad antigua; la expresión probablemente apunta a burla social pública, no solo a porteros.
    reason: cultural_note
lexical_decisions:
- source_word: יָשִׂיחוּ
  english_pob_choice: talk about
  chosen_spanish: hablan de mí
  alternatives_spanish:
  - hablan sobre mí
  - hablan acerca de mí
  - me comentan
  lexicon: HALOT
  rationale: El verbo hebreo puede abarcar conversar, hablar o musitar sobre alguien; en este contexto público y hostil, el sentido es verbal y social, no meditativo. «Hablan de mí» reproduce bien ese tema de conversación y suena natural en español.
- source_word: בִי
  english_pob_choice: about me
  chosen_spanish: de mí
  alternatives_spanish:
  - sobre mí
  - acerca de mí
  - contra mí
  lexicon: HALOT
  rationale: La preposición con este verbo señala el tema de la խոսa/conversación. «De mí» es la forma más idiomática en español; «contra mí» añadiría una hostilidad explícita que el hebreo no codifica por sí solo.
- source_word: יֹשְׁבֵי שָׁעַר
  english_pob_choice: those who sit in the gate
  chosen_spanish: los que se sientan en la puerta
  alternatives_spanish:
  - los que se sientan a la puerta
  - los que están en la puerta
  - los ancianos de la puerta
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente la de quienes ocupan la puerta/portón de la ciudad, centro de vida cívica y juicio. «La puerta» conserva la metáfora y evita restringirla indebidamente a un cargo específico.
- source_word: וּנְגִינוֹת
  english_pob_choice: I am the song
  chosen_spanish: yo soy la canción
  alternatives_spanish:
  - soy el tema de sus canciones
  - soy su canción
  - soy motivo de sus cantos
  lexicon: HALOT
  rationale: 'En el paralelismo, el sustantivo funciona predicativamente: el salmista ha llegado a ser el contenido de su canto. «Yo soy la canción» sigue de cerca la estructura y deja que el contexto dé el matiz de burla.'
- source_word: שׁוֹתֵי שֵׁכָר
  english_pob_choice: those who drink strong drink
  chosen_spanish: los que beben licor fuerte
  alternatives_spanish:
  - los que beben bebida fuerte
  - los que beben bebida embriagante
  - los que beben licor intoxicante
  lexicon: HALOT
  rationale: שֵׁכָר designa una bebida alcohólica fuerte, no simplemente vino. «Licor fuerte» conserva esa distinción léxica en español y evita reducirlo a una glosa moralizante como «borrachos».
theological_decisions:
- issue: El término «puerta» como lugar cívico/judicial y no solo físico
  english_pob_reading: The 'gate' was the public place of civic life and judgment in an ancient city; the phrase likely points to public, socially influential mockery rather than merely to gatekeepers.
  chosen_spanish_reading: «La puerta» se conserva como imagen del espacio público de la ciudad, con el trasfondo de vida cívica y juicio.
  alternative_spanish_readings:
  - los ancianos de la puerta
  - los líderes de la ciudad
  - los jueces de la ciudad
  rationale: La evidencia contextual apunta a un lugar de reunión social y judicial. Mantener la imagen permite que el lector perciba tanto el sentido literal como el social sin cerrar prematuramente la interpretación.
  doctrine_reference: Vida cívica y juicio en el mundo del AT; no doctrinal propiamente dicha, sino trasfondo histórico-social
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: se mantiene la estructura paralela, el valor social de «la puerta» y la distinción léxica de שֵׁכָר como bebida fuerte. No se incorporan revisiones posteriores porque el estado más reciente indica que no hubo cambios.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según la terminología POB cuando aparece el nombre divino; en este verso no aplica.
  - Se prefirió «licor fuerte» para conservar la fuerza léxica de שֵׁכָר sin introducir «borrachos» en el texto principal.
  - Se preservó la imagen de «la puerta» para mantener el trasfondo cívico/judicial documentado en el audit trail.
