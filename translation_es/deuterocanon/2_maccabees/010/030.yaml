translation:
  language: es
  text: Por lo tanto, para los que descienden[a] hasta el treinta de Xántico[b], habrá una garantía de salvoconducto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego literalmente dice «los que van bajando»; también puede entenderse como «los que parten» o «los que se ponen en camino».
    reason: alternative_reading
  - marker: b
    text: Xántico es un nombre de mes macedonio usado en la cronología helenística.
    reason: cultural_note
  - marker: c
    text: Literalmente, «habrá una diestra con permiso». La expresión probablemente se refiere a una prenda o garantía de paso seguro.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς οὖν καταπορευομένοις
  english_pob_choice: Therefore, for those going down
  chosen_spanish: Por lo tanto, para los que van bajando
  alternatives_spanish:
  - para los que descienden
  - para los que van de camino
  - para los que salen
  lexicon: LSJ
  rationale: οὖν se rinde naturalmente con «Por lo tanto» en un registro formal. καταπορευομένοις conserva la imagen direccional de «going down»; «van bajando» mantiene el matiz literal sin volverlo rígido ni demasiado técnico.
- source_word: μέχρι τριακάδος Ξανθικοῦ
  english_pob_choice: until the thirtieth of Xanthicus
  chosen_spanish: hasta el treinta de Xántico
  alternatives_spanish:
  - hasta el día treinta de Xántico
  - hasta el treinta del mes de Xántico
  lexicon: LSJ
  rationale: La fecha se conserva como límite temporal y el nombre del mes se translitera como «Xántico», siguiendo el contexto helenístico. Se evita sustituirlo por un mes moderno o explicar más de lo que el texto dice.
- source_word: ὑπάρξει
  english_pob_choice: there will be
  chosen_spanish: habrá
  alternatives_spanish:
  - existirá
  - será
  lexicon: LSJ
  rationale: Es un futuro existencial simple. «Habrá» suena natural en español y mantiene la función de ὑπάρξει.
- source_word: δεξιὰ
  english_pob_choice: a right hand given
  chosen_spanish: una diestra concedida
  alternatives_spanish:
  - una mano derecha
  - un apretón de manos
  - una prenda de alianza
  lexicon: LSJ
  rationale: El griego es elíptico y literalmente dice «derecha / diestra». En contexto diplomático puede implicar una prenda o garantía, pero el texto no desarrolla esa glosa; por eso se conserva «diestra» y se explicita su carácter concedido.
- source_word: μετὰ τῆς ἀδείας
  english_pob_choice: with safe-conduct
  chosen_spanish: con permiso de paso
  alternatives_spanish:
  - con permiso
  - con salvoconducto
  - con seguridad
  lexicon: LSJ
  rationale: ἀδεία puede significar permiso, libertad o inmunidad. Dado el contexto militar-diplomático y la brevedad del griego, «permiso de paso» comunica la idea de autorización para transitar sin interferencia sin introducir un tecnicismo ajeno al registro bíblico.
translation_notes:
  revision_awareness: El audit trail inglés revisó el inicio de «So» a «Therefore» por mayor formalidad; en español se reflejó con «Por lo tanto». También se conservaron las decisiones auditablemente literales para καταπορευομένοις, Xanthicus, δεξιὰ y ἀδείας, ajustadas a una sintaxis española natural.
  spanish_consistency_notes:
  - Se mantuvo la transliteración «Xántico» para el mes helenístico.
  - Se prefirió «diestra» para conservar la fuerza literal de δεξιὰ, evitando sustituirla por una interpretación completa que borre la tensión léxica.
  - «Permiso de paso» conserva el sentido de autorización/safe-conduct sin imponer un término eclesiástico o jurídico demasiado cerrado.
  - El estilo general sigue un registro formal y bíblico, pero con español moderno y legible.
