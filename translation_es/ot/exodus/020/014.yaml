  philosophy: optimal-equivalence
lexical_decisions:
- source_word: לֹא
  english_pob_choice: not / shall not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No habrás de
  - No debes
  lexicon: HALOT
  rationale: La negación hebrea en un mandato legal se expresa naturalmente en español con 'No' al inicio de la prohibición. Mantiene el carácter normativo sin añadir perífrasis innecesarias.
- source_word: תִּנְאָף
  english_pob_choice: commit adultery
  chosen_spanish: cometer adulterio
  alternatives_spanish:
  - adulterar
  - ser adúltero
  lexicon: HALOT
  rationale: El verbo נאף en qal denota cometer adulterio. 'Cometer adulterio' es la equivalencia precisa y más estable en español jurídico-bíblico; evita 'adulterar', que suena transitivo o técnico, y 'ser adúltero', que cambia la estructura verbal del mandato.
theological_decisions:
- issue: Forma de la prohibición del Decálogo
  english_pob_reading: You shall not commit adultery.
  chosen_spanish_reading: No cometerás adulterio.
  alternative_spanish_readings:
  - No cometas adulterio.
  - No deberás cometer adulterio.
  rationale: El hebreo usa la negación con imperfecto de 2ª persona masculina singular en estilo legal pactal. En español, el futuro de mandato conserva bien la fuerza prohibitiva y solemne del Decálogo, sin reducirlo a un imperativo coloquial.
  doctrine_reference: Éxodo 20:14; traducción de mandato legal en estilo del Decálogo.
- issue: Alcance de la segunda persona singular masculina
  english_pob_reading: Generic second-person singular 'you' in English
  chosen_spanish_reading: El verbo en futuro de 2ª persona singular en español mantiene el valor representativo del destinatario del pacto.
  alternative_spanish_readings:
  - No cometerás adulterio, hombre.
  - No cometeréis adulterio.
  rationale: Aunque la forma hebrea es masculina singular, la función del precepto es representativa y general dentro del pacto. El español con 'cometerás' conserva esa forma sin restringirlo al varón ni pluralizarlo indebidamente.
  doctrine_reference: Gramática del Decálogo; destinatario representativo del pacto.
translation_notes:
  revision_awareness: El texto hebreo es extremadamente breve y coincide plenamente con la solución inglesa auditada. No se observan variantes textuales relevantes ni tensiones léxicas adicionales que requieran notas.
  spanish_consistency_notes:
  - Se mantiene 'adulterio' como equivalente directo de נאף en sentido legal-prohibitivo.
  - Se prefiere el futuro exhortativo/prohibitivo ('cometerás') por su adecuación al Decálogo y su registro digno en español.
  - No se introduce 'Señor' ni otra terminología no presente en el versículo.
