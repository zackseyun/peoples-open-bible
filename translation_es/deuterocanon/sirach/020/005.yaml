translation:
  language: es
  text: Hay quien calla y se le considera sabio[a], y hay quien es despreciado por hablar mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Hay quien calla, porque no tiene respuesta, y hay quien calla, sabiendo el momento oportuno». El testimonio hebreo aquí preservado difiere de manera sustancial; el texto principal sigue el hebreo conservado como fuente primaria para Sirácida cuando está disponible.'
    reason: alternative_reading
lexical_decisions:
- source_word: יֵשׁ
  english_pob_choice: There is one who
  chosen_spanish: Hay quien
  alternatives_spanish:
  - Hay uno que
  - Existe quien
  lexicon: HALOT
  rationale: El hebreo existencial introduce un tipo de persona. «Hay quien» conserva ese valor proverbial y suena natural en español sin perder la forma de caso general.
- source_word: מַחֲרִישׁ
  english_pob_choice: keeps silent
  chosen_spanish: calla
  alternatives_spanish:
  - guarda silencio
  - permanece callado
  lexicon: HALOT
  rationale: 'El participio expresa una acción o estado característico: permanecer en silencio. «Calla» es conciso y proverbial; preserva mejor el ritmo que una perífrasis más pesada.'
- source_word: וְנֶחְשָׁב
  english_pob_choice: is considered
  chosen_spanish: se le considera
  alternatives_spanish:
  - es considerado
  - se lo tiene por
  lexicon: HALOT
  rationale: El nifal expresa que otros lo estiman o lo tienen por tal. «Se le considera» refleja bien esa valoración social impersonal y mantiene el tono general del refrán.
- source_word: חָכָם
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - hombre sabio
  lexicon: HALOT
  rationale: El término pertenece al campo sapiencial normal de «sabio». En español, el adjetivo funciona con naturalidad en este contexto y evita añadir una palabra de género innecesaria.
- source_word: נִמְאָס
  english_pob_choice: is despised
  chosen_spanish: es despreciado
  alternatives_spanish:
  - es rechazado
  - es menospreciado
  lexicon: HALOT
  rationale: מאס expresa ser tenido en poco, rechazado o despreciado. «Es despreciado» reproduce adecuadamente la evaluación social negativa del segundo hemistiquio.
- source_word: בְּרוֹב שִׂיחַ
  english_pob_choice: because of much talk
  chosen_spanish: por hablar mucho
  alternatives_spanish:
  - por mucho hablar
  - a causa de mucha charla
  lexicon: HALOT
  rationale: 'El hebreo expresa causa u ocasión: la persona es menospreciada a causa de su abundancia de habla. «Por hablar mucho» es idiomático en español y conserva la relación causal sin sobreexplicarla.'
theological_decisions:
- issue: Variación textual entre el hebreo y el paralelo griego
  english_pob_reading: 'The Hebrew witness preserved here differs substantially; the main text follows the extant Hebrew as the primary source for Sirach where available. Greek: ''There is one who keeps silent because he has no answer, and there is one who keeps silent, knowing the right time.'''
  chosen_spanish_reading: El texto principal sigue el hebreo conservado; la nota remite al paralelo griego, que añade dos motivaciones distintas para callar.
  alternative_spanish_readings:
  - Hay quien calla porque no tiene respuesta, y hay quien calla, sabiendo el momento oportuno.
  - Hay quien calla y se le considera sabio, y hay quien calla sabiendo cuándo conviene hablar.
  rationale: El expediente fuente indica un desajuste importante entre la tradición hebrea disponible y el paralelo griego. La lectura principal en español sigue el hebreo como base primaria para Sirácida, pero la nota mantiene visible la tensión textual documentada y permite reconstruir el matiz del griego sin borrarlo.
  doctrine_reference: Crítica textual de Sirácida / prioridad del testimonio hebreo cuando está disponible
translation_notes:
  revision_awareness: El borrador toma en cuenta el pass más reciente, que no requirió cambios, y conserva la decisión auditada de seguir el hebreo conservado como texto principal, dejando visible en nota la diferencia sustancial con el paralelo griego.
  spanish_consistency_notes:
  - «sabio» mantiene el registro sapiencial de חָכָם sin añadir interpretación.
  - «calla» conserva la brevedad proverbial y el valor durativo del participio hebreo.
  - «por hablar mucho» explicita la causalidad del hebreo בְּרוֹב sin introducir un juicio más fuerte que el original.
  - Se evita «SEÑOR» u otra convención de ocultamiento porque este versículo no contiene el Tetragrámaton ni lenguaje divino explícito.
