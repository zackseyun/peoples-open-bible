lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: burned / anger
  chosen_spanish: se encendió el enojo
  alternatives_spanish:
  - ardió la ira
  - se inflamó la ira
  - se encendió la ira
  lexicon: HALOT
  rationale: El hebreo usa una expresión idiomática en la que la ira se presenta como algo que se enciende o arde. En español, «se encendió el enojo» conserva la metáfora con naturalidad y evita una traducción demasiado mecánica.
- source_word: אַף
  english_pob_choice: anger
  chosen_spanish: enojo
  alternatives_spanish:
  - ira
  - cólera
  - furor
  lexicon: HALOT
  rationale: Aunque el término base puede aludir literalmente a la 'nariz', aquí funciona idiomáticamente como 'ira/enojo'. «Enojo» es claro y digno en español contemporáneo; «ira» también es posible, pero puede sonar más solemne o teológica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio del pacto, no un título. Conforme al criterio del proyecto, se vierte como «Yahvé» en español, manteniendo la transparencia del nombre divino.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: La expresión narrativa temporal se expresa con naturalidad en español como «aquel día». Mantiene el valor de referencia puntual sin sobrecarga arcaizante.
- source_word: וַיִּשָּׁבַע
  english_pob_choice: he swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  - prestó juramento
  - se juramentó
  lexicon: HALOT
  rationale: El verbo hebreo significa jurar o tomar juramento. «Juró» es la forma más directa y natural en español para este contexto narrativo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: La partícula introduce el contenido del juramento; «diciendo» preserva la conexión formal con la cita siguiente sin añadir información.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: 'El versículo contiene el Tetragrámaton. La política del proyecto evita sustituirlo por un título genérico y lo traduce con el nombre divino en forma española estándar del POB: «Yahvé».'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto auditado en inglés no muestra revisiones aplicadas y el control de calidad indica alto acuerdo; por eso el borrador español sigue de cerca las decisiones léxicas ya establecidas, ajustándolas a una formulación natural en español sin añadir matices no sustentados por el hebreo.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé», conforme a la política del proyecto.
  - Se preserva la metáfora de calor/encendido del hebreo mediante «se encendió el enojo», evitando una paráfrasis abstracta.
  - «Juró, diciendo» refleja la secuencia narrativa del hebreo sin introducir un sujeto explícito no presente.
  - El registro es sobrio y bíblico, pero en español actual, sin depender de fórmulas arcaizantes.
