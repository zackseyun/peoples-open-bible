id: TIT.3.4
reference: Titus 3:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτε δὲ ἡ χρηστότης καὶ ἡ φιλανθρωπία ἐπεφάνη τοῦ σωτῆρος ἡμῶν θεοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/004.yaml
  text: But when the kindness and love for humanity of God our Savior appeared,[a]
  footnotes:
  - marker: a
    text: Or 'love of mankind'; the Greek term denotes benevolence or love toward human beings.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 우리 구주 하나님의 인자하심과 사람을 향한 사랑[a]이 나타났을 때,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「인간애」. 헬라어는 인간을 향한 자비·사랑을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: χρηστότης
  english_pob_choice: kindness
  chosen_korean: 인자하심
  alternatives_korean:
  - 친절하심
  - 자비하심
  lexicon: BDAG
  rationale: χρηστότης는 따뜻하고 너그러운 선함. 한국 교회 전통의 「인자하심」이 신적 속성으로 정립.
- source_word: φιλανθρωπία
  english_pob_choice: love for humanity
  chosen_korean: 사람을 향한 사랑
  alternatives_korean:
  - 인간애
  - 박애
  - 사람들에 대한 사랑
  lexicon: BDAG
  rationale: φιλανθρωπία는 「사람(ἄνθρωπος)을 사랑함(φιλέω)」. 「사람을 향한 사랑」이 직역과 자연스러움을 살린다. 「인간애」는 학술적 어감.
- source_word: ἐπεφάνη
  english_pob_choice: appeared
  chosen_korean: 나타났을 때
  alternatives_korean:
  - 드러났을 때
  lexicon: BDAG
  rationale: 2:11과 일관되게 「나타나다」.
- source_word: τοῦ σωτῆρος ἡμῶν θεοῦ
  english_pob_choice: of God our Savior
  chosen_korean: 우리 구주 하나님의
  alternatives_korean:
  - 우리의 구주이신 하나님의
  lexicon: BDAG
  rationale: 1:3, 2:10과 일관.
