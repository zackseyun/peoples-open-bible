review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo dice literalmente «Y/los hijos de Ulla: Arah, Hanniel y Rizia». La estructura genealógica «Los hijos de» está bien, y omitir la conjunción inicial en el texto principal es aceptable si se conserva en nota. Sin embargo, el borrador español cambia dos nombres frente a la decisión auditada basada en el hebreo: עֻלָּא fue auditado como «Ulla» y חַנִּיאֵל como «Hanniel», precisamente para reflejar mejor la doble consonante hebrea. El español no debe apartarse de esa racionalidad sin necesidad fuerte.'
  spanish_quality_summary: El español es claro y natural para una genealogía bíblica. No obstante, conviene ajustar la transliteración de los nombres para conservar fidelidad al hebreo y consistencia con la auditoría POB. La puntuación y el estilo general son adecuados.
  glossary_alignment: 'No hay términos teológicos mayores en juego. La principal cuestión de alineación es onomástica: mantener «Ulla» y «Hanniel» como formas principales, con «Ula» y «Haniel» solo como variantes en notas si se desea preservar alternativas documentadas.'
  issues:
  - severity: medium
    issue: «Ula» en el texto principal en lugar de «Ulla».
    rationale: La decisión léxica auditada escogió «Ulla» porque refleja mejor עֻלָּא con consonante doblada. El español no exige simplificarla.
  - severity: medium
    issue: «Haniel» en el texto principal en lugar de «Hanniel».
    rationale: La auditoría inglesa eligió «Hanniel» para representar mejor חַנִּיאֵל con nun doblada. El borrador invierte indebidamente principal y variante.
  - severity: low
    issue: Las notas alternativas quedaron desbalanceadas respecto de la auditoría.
    rationale: Al pasar «Ula» y «Haniel» al texto principal, las notas ya no reflejan la elección principal documentada por POB. Deben reordenarse para que la forma principal sea la auditada y la variante quede en nota.
  revised_spanish_text: 'Los hijos de Ulla: Arah[a], Hanniel[c], y Rizia[d].'
  revised_footnotes:
  - marker: a
    text: O «Y los hijos de Ulla». El hebreo inicia con una conjunción, pero en español genealógico suele omitirse.
    reason: lexical_alternative
  - marker: b
    text: Ulla también puede escribirse «Ula».
    reason: lexical_alternative
  - marker: c
    text: Hanniel también puede escribirse «Haniel».
    reason: lexical_alternative
  - marker: d
    text: Rizia también puede darse como «Riziah».
    reason: lexical_alternative
  revision_rationale: Se corrigen las formas principales de los nombres a «Ulla» y «Hanniel» para respetar mejor el hebreo y la auditoría léxica POB, manteniendo «Ula» y «Haniel» como variantes en notas. También se conserva la nota sobre la conjunción inicial y la variante de «Rizia».
