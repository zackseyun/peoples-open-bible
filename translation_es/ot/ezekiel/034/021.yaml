translation:
  language: es
  text: Porque ustedes empujan con el costado y con el hombro, y cornean a todas las débiles[a] con sus cuernos hasta dispersarlas afuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a todas las enfermas» o «a todas las flacas». La expresión hebrea se refiere a los miembros vulnerables del rebaño.
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: HALOT
  rationale: La partícula causal introduce la razón del juicio; «porque» es natural en español y conserva la relación de causa sin añadir matiz interpretativo.
- source_word: בְּצַד
  english_pob_choice: with side
  chosen_spanish: con el costado
  alternatives_spanish:
  - con el lado
  - al costado
  lexicon: HALOT
  rationale: צַד denota «lado/costado». «Con el costado» mantiene la imagen corporal de empujar con una parte del cuerpo, en paralelo con «hombro».
- source_word: וּבְכָתֵף
  english_pob_choice: and shoulder
  chosen_spanish: y con el hombro
  alternatives_spanish:
  - y hombro
  - y con el hombro
  lexicon: HALOT
  rationale: כָּתֵף es «hombro». En español, repetir la preposición preserva la construcción instrumental y suena claro en la secuencia corporal.
- source_word: תֶּהְדֹּפוּ
  english_pob_choice: you push
  chosen_spanish: empujan
  alternatives_spanish:
  - empujan
  - arrojan
  lexicon: HALOT
  rationale: El verbo expresa empujar o desplazar con fuerza; «empujan» es directo y no exagera más allá de la violencia figurada del contexto pastoral.
- source_word: וּבְקַרְנֵיכֶם
  english_pob_choice: with your horns
  chosen_spanish: con sus cuernos
  alternatives_spanish:
  - con sus cuernos
  - con vuestros cuernos
  lexicon: HALOT
  rationale: Se conserva la imagen animal concreta. En español, la segunda persona plural puede expresarse con «sus» en un registro bíblico-neutral para lectura amplia, sin perder el referente.
- source_word: תְּנַגְּחוּ
  english_pob_choice: gore
  chosen_spanish: cornean
  alternatives_spanish:
  - acornean
  - embisten
  lexicon: HALOT
  rationale: נגח se usa de dar cornadas/embestir con cuernos. «Cornean» comunica esa violencia de manera natural en español y mantiene la imagen literal mejor que una explicación perifrástica.
- source_word: כָּל הַנַּחְלֹת
  english_pob_choice: all the weak ones
  chosen_spanish: a todas las débiles
  alternatives_spanish:
  - a todas las débiles
  - a todas las enfermas
  - a todas las flacas
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y el POB inglés opta por «the weak ones», con nota sobre miembros vulnerables del rebaño. En español, «las débiles» conserva esa amplitud semántica sin forzar «ovejas» donde el hebreo no lo dice explícitamente.
- source_word: עַד אֲשֶׁר הֲפִיצוֹתֶם
  english_pob_choice: until you have scattered
  chosen_spanish: hasta que las han dispersado
  alternatives_spanish:
  - hasta que las han dispersado
  - hasta que las dispersaron
  lexicon: HALOT
  rationale: La secuencia marca resultado completado. «Han dispersado» refleja bien el valor resultativo del perfecto y mantiene la relación con la acción abusiva anterior.
- source_word: אֶל הַחוּצָה
  english_pob_choice: abroad
  chosen_spanish: por todas partes
  alternatives_spanish:
  - abroad
  - afuera
  - al exterior
  lexicon: HALOT
  rationale: El hebreo significa «al exterior / afuera» y el POB inglés revisó de «outside» a «abroad» por naturalidad contextual. En español, «por todas partes» comunica la dispersión extensiva y el resultado de expulsión fuera del redil, sin encasillarlo en una sola dirección espacial.
theological_decisions:
- issue: Imagen pastoral de abuso contra los miembros vulnerables del rebaño
  english_pob_reading: all the weak ones; the Hebrew expression refers to the vulnerable members of the flock.
  chosen_spanish_reading: a todas las débiles
  alternative_spanish_readings:
  - a todas las enfermas
  - a todas las flacas
  - a las más vulnerables del rebaño
  rationale: La frase hebrea es semánticamente abierta y el audit trail inglés la entiende como referencia a miembros vulnerables del rebaño. En español conviene mantener la literalidad relativa («las débiles») y dejar que el contexto pastoril sostenga la identificación sin añadir «ovejas» al texto principal.
  doctrine_reference: Contexto de juicio pastoral en Ezequiel 34
- issue: Destino espacial de los dispersados
  english_pob_reading: until you have scattered them abroad
  chosen_spanish_reading: hasta que las han dispersado por todas partes
  alternative_spanish_readings:
  - hasta que las han dispersado afuera
  - hasta que las han dispersado al exterior
  rationale: El inglés POB revisó la línea final para conservar la idea de dispersión fuera del espacio seguro del rebaño. «Por todas partes» en español reproduce la dispersión amplia y evita una expresión demasiado literal que sonaría extraña en lectura pública.
  doctrine_reference: Metáfora del pastor y el rebaño en Ezequiel 34
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente al reflejar el cierre de la cláusula como una dispersión amplia y resultativa. También he conservado la tensión léxica de נחלות con una solución española que no sobreinterpreta el adjetivo ni borra la nota de vulnerabilidad documentada en el audit trail.
  spanish_consistency_notes:
  - YHWH no aparece en este versículo.
  - Se mantiene el paralelismo corporal «costado/hombro/cuernos» para conservar la imaginería del hebreo.
  - «Las débiles» reproduce la ambigüedad del hebreo con apoyo de nota, sin convertirla en paráfrasis interpretativa.
  - La clausula final se expresa con dispersión amplia («por todas partes») para corresponder al valor contextual de הַחוּצָה y a la revisión inglesa 'abroad'.
