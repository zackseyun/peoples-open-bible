revisions:
- from: ¡Mira![a] Si voy hacia el oriente, no está allí; y si voy hacia el occidente, no lo percibo.
  to: ¡Mira![a] Voy hacia el oriente, pero no está allí; y hacia el occidente, pero no lo percibo.
  rationale: Se elimina «si» para preservar la fuerza directa del imperfecto hebreo y el paralelismo poético del versículo. También se añaden contrastes explícitos con «pero» en ambas cláusulas para reflejar naturalmente en español la búsqueda frustrada que el inglés POB ya hace explícita y que el contexto justifica. Se conservan «oriente/occidente» y la nota alternativa por su buen ajuste al análisis léxico documentado.
