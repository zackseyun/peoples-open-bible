translation:
  language: es
  text: Habla ahora a Zorobabel hijo de Sealtiel, gobernador de Judá, y a Josué[a] hijo de Jehosadac, el sumo sacerdote, y al remanente[b] del pueblo, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'Josué'; algunas tradiciones usan 'Jesúa' donde la forma corta del nombre aparece en otros pasajes.
    reason: alternative_reading
  - marker: b
    text: O 'el resto del pueblo'. El término hebreo puede indicar a los que quedaron y también conservar un matiz profético de 'remanente'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמָר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla
  lexicon: HALOT
  rationale: El imperativo introduce una orden profética directa. En español, 'Habla' conserva la inmediatez y suena natural antes de una serie de destinatarios.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por favor
  - ahora
  lexicon: HALOT
  rationale: Aquí la partícula expresa urgencia o inmediatez, no cortesía. 'Ahora' reproduce mejor ese valor en español.
- source_word: זְרֻבָּבֶל
  english_pob_choice: Zerubbabel
  chosen_spanish: Zorobabel
  alternatives_spanish:
  - Zorobabel
  - Zerubabel
  lexicon: transliteración de nombre propio
  rationale: Se adopta la forma castellana tradicional y ampliamente reconocible 'Zorobabel', manteniendo el referente del nombre hebreo sin depender de la grafía inglesa.
- source_word: שַׁלְתִּיאֵל
  english_pob_choice: Shealtiel
  chosen_spanish: Seltiel
  alternatives_spanish:
  - Seltiel
  - Salatiel
  lexicon: transliteración de nombre propio
  rationale: La forma 'Seltiel' refleja de cerca la vocalización hebrea y evita la dependencia de la forma griega/latina tradicional, mientras sigue siendo comprensible en español.
- source_word: פַּחַת יְהוּדָה
  english_pob_choice: governor of Judah
  chosen_spanish: gobernador de Judá
  alternatives_spanish:
  - prefecto de Judá
  - gobernador de Judá
  lexicon: HALOT
  rationale: '''Gobernador'' es el equivalente moderno más claro para el cargo provincial persa; ''prefecto'' sería posible, pero menos idiomático en español corriente.'
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Josué
  - Jesúa
  lexicon: transliteración de nombre propio
  rationale: La forma hebrea dada es יְהוֹשֻׁעַ, que en español se representa naturalmente como 'Josué'. 'Jesúa' correspondería a otras tradiciones textuales o usos posteriores.
- source_word: יְהוֹצָדָק
  english_pob_choice: Jehozadak
  chosen_spanish: Jozadac
  alternatives_spanish:
  - Jozadac
  - Jehozadac
  lexicon: transliteración de nombre propio
  rationale: '''Jozadac'' es la forma española tradicional y clara del nombre; conserva la identidad del personaje sin imponer una grafía inglesa.'
- source_word: הַכֹּהֵן הַגָּדוֹל
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el sumo sacerdote
  - el gran sacerdote
  lexicon: HALOT
  rationale: '''Sumo sacerdote'' es el equivalente establecido en español para el cargo; comunica con claridad la función del oficio y mantiene el valor jerárquico del título.'
- source_word: שְׁאֵרִית הָעָם
  english_pob_choice: the remnant of the people
  chosen_spanish: el remanente del pueblo
  alternatives_spanish:
  - el remanente del pueblo
  - el resto del pueblo
  lexicon: HALOT
  rationale: Se conserva 'remanente' para reflejar el matiz profético que la POB inglés preserva con 'remnant', sin reducirlo meramente a 'el resto'.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo
  - y diciendo
  lexicon: HALOT
  rationale: '''Diciendo'' mantiene la función de introducir el discurso que continúa en el versículo siguiente.'
theological_decisions:
- issue: שְׁאֵרִית ('remnant') y su carga profética
  english_pob_reading: Render as 'the remnant of the people' in the main text
  chosen_spanish_reading: el remanente del pueblo
  alternative_spanish_readings:
  - el resto del pueblo
  rationale: El hebreo usa שְׁאֵרִית, término que puede ser descriptivo y también teológico en la literatura profética. 'Remanente' preserva esa resonancia sin convertirla en interpretación doctrinal añadida.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla; consistencia terminológica, salvo excepción documentada.
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registran cambios aplicados en el flujo reciente, y la solución mantiene alta concordancia con el paquete fuente y el criterio inglés de la POB.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; en este versículo no aparece el nombre divino como tal.
  - Se mantiene una transliteración castellana coherente para nombres propios, evitando depender de la forma inglesa cuando existe equivalente español estable.
  - '''Sumo sacerdote'' se conserva como título eclesiástico bíblico normal en español, equivalente al inglés auditado.'
  - '''Remanente'' preserva el tono profético del hebreo שְׁאֵרִית sin neutralizarlo como mera descripción estadística.'
