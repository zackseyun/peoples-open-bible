  glossary_alignment: 'Se alinea con la terminología del proyecto: יְהוָה → ''Yahvé''; no se enmascara como ''SEÑOR''. No hay conflictos con otros términos doctrinales clave. La elección ''vara'' para מַטֶּה y ''ranas'' para הַצְפַרְדְּעִים es adecuada en este contexto. La nota léxica para הַיְאֹרִים mantiene la racionalidad auditada del POB inglés.'
