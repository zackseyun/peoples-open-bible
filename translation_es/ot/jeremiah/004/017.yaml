review_pass:
  verdict: revise
  source_alignment_summary: El borrador preserva bien la comparación («como»), el referente femenino implícito («ella»), la causalidad («porque») y la acusación de rebelión contra Yahvé. También mantiene correctamente «Yahvé» para יְהוָה y conserva la nota léxica sobre שָׂדַי. Sin embargo, «han estado» no refleja bien la decisión auditada para הָיוּ en contexto profético vívido; en español aquí conviene el presente «están» para comunicar el cerco actual e inminente. Además, la fórmula profética «dice Yahvé» es aceptable, pero «declara Yahvé» se alinea mejor con נְאֻם y con la solemnidad del original.
  spanish_quality_summary: El español es en general claro y digno, pero «han estado contra ella en derredor» suena algo forzado e innecesariamente aspectual. «Están contra ella por todos lados» sería muy coloquial; «están contra ella alrededor» sería torpe. La mejor reparación mínima y natural es «están contra ella por todos lados» o, más dignamente, «están contra ella alrededor». No obstante, para conservar el tono bíblico y la imagen de cerco, «están contra ella alrededor» sigue siendo menos idiomático que «están contra ella por todos lados». Una solución más equilibrada es «están contra ella por todos lados»; pero para mantener cercanía con מִסָּבִיב y dignidad, «están contra ella en derredor» funciona una vez corregido el verbo. El cambio principal necesario es verbal; el resto es estilísticamente aceptable.
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה → «Yahvé» correctamente; no hay conflictos con otros términos clave. Se recomienda ajustar «dice Yahvé» a «declara Yahvé» por la decisión documentada sobre נְאֻם יְהוָה y para mejor consistencia formulística.'
  issues:
  - severity: medium
    issue: «han estado» para הָיוּ debilita la vividez profética
    rationale: La auditoría inglesa justificó un presente vívido («they are») en lugar de un pasado/perfecto. En español, «han estado» suena retrospectivo o durativo-completivo y no comunica bien el cerco inmediato.
  - severity: low
    issue: «dice Yahvé» subrepresenta la solemnidad de נְאֻם
    rationale: No es una mistraducción, pero «declara Yahvé» refleja mejor la fórmula profética y sigue la lógica del POB auditado.
  revised_spanish_text: Como guardianes de un campo[a], están contra ella en derredor, porque contra mí se ha rebelado, declara Yahvé.
