translation:
  language: es
  text: 'y la segunda fila: turquesa[a], zafiro y diamante.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación exacta de varias gemas antiguas es incierta. נֹפֶךְ también puede traducirse «esmeralda» o «carbunclo», y יָהֲלֹם también puede traducirse «jacinto» o «jaspe».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הַ/טּוּר
  english_pob_choice: and the ... row
  chosen_spanish: y la ... fila
  alternatives_spanish:
  - y la ... hilera
  - y la ... línea
  lexicon: HALOT
  rationale: En el contexto del pectoral con piedras, טּוּר designa una disposición lineal de gemas; en español, 'fila' comunica con naturalidad esa disposición sin cargar un tecnicismo innecesario. Se mantiene el valor conjuntivo de וְ con 'y'.
- source_word: הַ/שֵּׁנִי
  english_pob_choice: second
  chosen_spanish: segunda
  alternatives_spanish:
  - la segunda
  lexicon: HALOT
  rationale: Es un adjetivo ordinal; en español concuerda con 'fila' y expresa el mismo orden enumerativo.
- source_word: נֹפֶךְ
  english_pob_choice: turquoise
  chosen_spanish: turquesa
  alternatives_spanish:
  - esmeralda
  - cornalina
  lexicon: HALOT
  rationale: La identificación exacta de esta gema antigua es incierta. 'Turquesa' sigue la elección inglesa de la POB y es una opción moderna clara para el lector español, mientras que las equivalencias tradicionales se preservan solo como alternativas por la incertidumbre léxica.
- source_word: סַפִּיר
  english_pob_choice: sapphire
  chosen_spanish: zafiro
  alternatives_spanish:
  - safiro
  lexicon: HALOT
  rationale: '''Zafiro'' es la forma española establecida para esta gema y conserva bien la equivalencia convencional del término hebreo.'
- source_word: וְ/יָהֲלֹם
  english_pob_choice: and diamond
  chosen_spanish: y diamante
  alternatives_spanish:
  - y jacinto
  - y jaspe
  lexicon: HALOT
  rationale: Se mantiene la lista de gemas con una equivalencia española natural. Como la identificación antigua también es incierta, se conservan alternativas históricas en nota.
theological_decisions:
- issue: Identificación incierta de las piedras preciosas
  english_pob_reading: The exact identification of several ancient gemstones is uncertain.
  chosen_spanish_reading: La identificación exacta de varias gemas antiguas es incierta.
  alternative_spanish_readings:
  - No puede determinarse con certeza la equivalencia mineralógica de varias piedras antiguas.
  - La correspondencia exacta de varias gemas antiguas no es segura.
  rationale: El versículo nombra piedras del pectoral sin definir su composición moderna. Conviene explicitar la incertidumbre para no sobreatribuir precisión científica al texto bíblico.
  doctrine_reference: Principio de modestia exegética y fidelidad semántica en nombres de objetos cultuales.
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en la última pasada de revisión, con acuerdo alto y solo observaciones menores. La presente propuesta conserva esa lectura y traslada sus decisiones léxicas al español sin ampliar el sentido del hebreo.
  spanish_consistency_notes:
  - Se usa 'fila' para טּוּר de manera consistente con el contexto del pectoral, evitando 'línea' por sonar menos natural en español.
  - '''Turquesa'' y ''diamante'' siguen la elección óptima de la POB en inglés, mientras que las alternativas antiguas quedan restringidas a nota.'
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton ni un equivalente contextual que lo exija.
