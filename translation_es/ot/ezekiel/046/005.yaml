revisions:
- from: Y la ofrenda vegetal será de una efa con el carnero[a], y con los corderos una ofrenda vegetal según la dádiva de su mano[b], y un hin de aceite con cada efa.
  to: Y la ofrenda de grano será de una efa con el carnero[a], y con los corderos una ofrenda de grano según lo que su mano pueda dar[b], y un hin de aceite con cada efa.
  rationale: Se ajusta el español para mejorar claridad y naturalidad sin perder el sentido fuente ni la auditabilidad del hebreo. 'Ofrenda de grano' comunica mejor מִנְחָה en este contexto sacrificial, y 'según lo que su mano pueda dar' conserva la imagen de 'mano' mientras expresa con claridad el modismo de capacidad. También se normaliza la nota b.
