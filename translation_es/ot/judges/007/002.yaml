translation:
  language: es
  text: 'Yahvé dijo a Gedeón[a]: «El pueblo que está contigo es demasiado numeroso para que yo entregue a Madián en su mano, no sea que Israel se jacte contra mí, diciendo[b]: “Mi propia mano me ha salvado”.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jehová». El hebreo usa el nombre divino יְהוָה; el POB lo vierte como «Yahvé» para conservar el nombre propio.
    reason: lexical_alternative
  - marker: b
    text: O «me ha librado». El verbo hebreo puede significar «salvar» o «librar».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del Tetragrámaton, conforme al criterio POB y a la directriz del proyecto para יְהוָה. «Yahvé» mantiene la referencia personal del nombre sin sustituirlo por un título.
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  - entonces dijo
  lexicon: HALOT
  rationale: En español, la coordinación implícita del waw narrativo suele quedar natural con verbo simple en pasado. Se evita una repetición forzada de «y» al inicio cuando el contexto ya es narrativo.
- source_word: רַב הָעָם
  english_pob_choice: The people ... are too many
  chosen_spanish: la gente ... es demasiada
  alternatives_spanish:
  - el pueblo ... es demasiado numeroso
  - la gente ... son demasiados
  lexicon: HALOT
  rationale: «Demasiada» expresa la idea idiomática de excedencia en relación con la acción que sigue. Se mantiene el singular colectivo de הָעָם sin normalizarlo a plural.
- source_word: אֲשֶׁר אִתָּךְ
  english_pob_choice: who are with you
  chosen_spanish: que está contigo
  alternatives_spanish:
  - que están contigo
  - que va contigo
  lexicon: HALOT
  rationale: Se conserva el referente colectivo en singular, acorde con el hebreo y con la decisión teológica de tratar a Israel como colectivo singular en el pasaje.
- source_word: מִתִּתִּי
  english_pob_choice: for me to give
  chosen_spanish: para que yo entregue
  alternatives_spanish:
  - para dar
  - para que yo dé
  lexicon: HALOT
  rationale: «Entregar» comunica bien la idea de poner a Madián en poder ajeno, sin perder el matiz de concesión/control que aporta la construcción hebrea. Se evita una traducción demasiado literal que sonaría rígida en español.
- source_word: בְּיָדָם
  english_pob_choice: into their hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - en sus manos
  - bajo su poder
  lexicon: HALOT
  rationale: Se preserva la metáfora bíblica de la «mano» como poder o dominio. En español, el singular «su mano» mantiene mejor la idiomaticidad y la correspondencia con el hebreo colectivo.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - a fin de que no
  lexicon: HALOT
  rationale: Se expresa la cláusula de prevención de manera natural en español, conservando el valor de finalidad negativa sin cargarlo con un arcaísmo innecesario.
- source_word: יִתְפָּאֵר עָלַי
  english_pob_choice: boast against me
  chosen_spanish: se gloríe contra mí
  alternatives_spanish:
  - se jacte contra mí
  - se gloríe sobre mí
  lexicon: HALOT
  rationale: «Gloriarse» refleja la autoglorificación del hitpael de פאר y permite conservar el matiz de oposición de עַל mediante «contra mí». Se evita suavizarlo a mera alabanza.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y diciendo
  lexicon: HALOT
  rationale: Forma participial natural para introducir la cita directa en español.
- source_word: יָדִי
  english_pob_choice: My own hand
  chosen_spanish: Mi propia mano
  alternatives_spanish:
  - mi mano
  - la mano propia de mí
  lexicon: HALOT
  rationale: «Propia» reproduce el énfasis posesivo del hebreo sin añadir contenido ajeno. Ayuda a expresar la autosuficiencia implícita del dicho.
- source_word: הוֹשִׁיעָה לִּי
  english_pob_choice: has saved me
  chosen_spanish: me ha salvado
  alternatives_spanish:
  - me ha librado
  - me ha dado la victoria
  lexicon: HALOT
  rationale: '«Salvar» mantiene la relación con el verbo ישׁע y con la ironía teológica del pasaje: Israel atribuiría la salvación a su propia mano. «Librar» sería posible, pero «salvar» sigue mejor la formulación POB.'
theological_decisions:
- issue: Nombre divino en el discurso directo de Yahvé
  english_pob_reading: Yahweh said to Gideon
  chosen_spanish_reading: Yahvé dijo a Gedeón
  alternative_spanish_readings:
  - el SEÑOR dijo a Gedeón
  - Jehová dijo a Gedeón
  rationale: Se preserva el nombre propio divino conforme al criterio del proyecto y a la lectura del texto hebreo, sin sustituirlo por una convención litúrgica de ocultamiento.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Colectivo singular de Israel y pronombres concordantes
  english_pob_reading: lest Israel boast against me, saying, 'My own hand has saved me.'
  chosen_spanish_reading: 'para que Israel no se gloríe contra mí, diciendo: «Mi propia mano me ha salvado»'
  alternative_spanish_readings:
  - 'para que los israelitas no se gloríen contra mí, diciendo: «Nuestras propias manos nos han salvado»'
  rationale: Se mantiene Israel como sujeto colectivo singular, junto con el singular de la cita, para no suavizar la forma de pensar del hebreo y conservar la tensión textual documentada en el audit trail.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy'
- issue: Imagen de la 'mano' como poder o control
  english_pob_reading: into their hand
  chosen_spanish_reading: en su mano
  alternative_spanish_readings:
  - en sus manos
  - bajo su poder
  rationale: La imagen bíblica de la mano se mantiene para respetar el lenguaje figurado del original. La singularidad colectiva del hebreo se refleja mejor con «su mano» que con una pluralización explicativa.
  doctrine_reference: 'DOCTRINE.md: Preserve lexical imagery where the source uses it'
translation_notes:
  revision_awareness: 'Se revisó el antecedente en inglés y no se detectaron cambios posteriores relevantes: la decisión sobre el nombre divino, el colectivo singular de Israel y la ambigüedad de יָשַׁע permanecen estables en el audit trail; por eso la versión española sigue de cerca esas elecciones sin introducir suavizaciones nuevas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva el singular colectivo «la gente ... es / que está / en su mano» para reflejar el hebreo.
  - «Madián» se usa como nombre propio adaptado al español bíblico estándar.
  - La cita directa conserva el énfasis de «mi propia mano» para reproducir la ironía teológica del versículo.
  - Se prefiere «salvar» frente a «librar» por coherencia con la decisión POB auditada.
