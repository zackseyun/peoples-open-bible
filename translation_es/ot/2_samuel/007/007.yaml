translation:
  language: es
  text: 'En todos los lugares donde he andado entre todos los hijos de Israel, ¿he hablado yo alguna vez una palabra a una de las tribus de Israel[a], a la cual mandé apacentar a mi pueblo Israel, diciendo: «¿Por qué no me han edificado una casa de cedro?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «una de las tribus de Israel»; el paralelo en 1 Crónicas 17:6 lee «jueces de Israel», lo que probablemente refleja a los líderes encargados de pastorear al pueblo.'
    reason: textual_variant
lexical_decisions:
- source_word: הִתְהַלַּכְתִּי
  english_pob_choice: have walked
  chosen_spanish: he andado
  alternatives_spanish:
  - he caminado
  - he ido y venido
  lexicon: HALOT
  rationale: El verbo hitpael de הלך aquí expresa el desplazamiento de Yahvé entre su pueblo; en español, ‘he andado’ conserva esa imagen concreta sin volverla una paráfrasis abstracta.
- source_word: בְּכֹל אֲשֶׁר ... בְּכָל בְּנֵי יִשְׂרָאֵל
  english_pob_choice: In all the places where ... among all the sons of Israel
  chosen_spanish: En todos los lugares donde ... entre todos los hijos de Israel
  alternatives_spanish:
  - A lo largo de todos los lugares donde ... en medio de todo Israel
  - En todo el tiempo que ... entre todos los hijos de Israel
  lexicon: HALOT
  rationale: La primera expresión se entiende naturalmente como ubicación del andar divino; la segunda conserva la idea de presencia ‘entre’ el pueblo del pacto. ‘Hijos de Israel’ mantiene la correspondencia formal con el hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva el etnónimo masculino plural del hebreo, que en este contexto funciona como designación nacional. ‘Israelitas’ sería más idiomático, pero menos transparente para la correspondencia léxica.
- source_word: הֲדָבָר דִּבַּרְתִּי
  english_pob_choice: did I ever speak a word
  chosen_spanish: ¿he hablado yo alguna vez una palabra?
  alternatives_spanish:
  - ¿hablé yo alguna vez algo?
  - ¿he dicho yo una palabra?
  lexicon: HALOT
  rationale: La pregunta retórica con sustantivo cognado intensifica la negación; ‘una palabra’ preserva el peso de דָּבָר sin diluirlo en ‘algo’.
- source_word: אַחַד שִׁבְטֵי יִשְׂרָאֵל
  english_pob_choice: one of the tribes of Israel
  chosen_spanish: uno de los tribus de Israel
  alternatives_spanish:
  - una de las tribus de Israel
  - uno de los jefes de Israel
  lexicon: HALOT
  rationale: Se conserva el sustantivo ‘tribus’ del texto hebreo base, junto con la tensión textual señalada por el paralelo de Crónicas. La forma española queda marcada por nota para no borrar esa diferencia.
- source_word: אֲשֶׁר צִוִּיתִי לִרְעוֹת
  english_pob_choice: whom I commanded to shepherd
  chosen_spanish: al cual mandé apacentar
  alternatives_spanish:
  - a quien mandé pastorear
  - al cual ordené cuidar como pastor
  lexicon: HALOT
  rationale: ‘Apacentar’ conserva la metáfora pastoral del hebreo y resulta natural en español bíblico sin convertirla en un mero ‘gobernar’.
- source_word: עַמִּי אֶת יִשְׂרָאֵל
  english_pob_choice: my people Israel
  chosen_spanish: a mi pueblo Israel
  alternatives_spanish:
  - a mi pueblo, Israel
  - a mi pueblo, que es Israel
  lexicon: HALOT
  rationale: La construcción aposicional se reproduce de manera compacta; ‘mi pueblo Israel’ mantiene tanto posesión pactual como identificación del pueblo.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: HALOT
  rationale: Es la introducción estándar de cita directa; ‘diciendo’ enlaza con naturalidad la pregunta final.
- source_word: לָמָּה לֹא בְנִיתֶם לִי בֵּית אֲרָזִים
  english_pob_choice: Why have you not built me a house of cedar?
  chosen_spanish: ¿Por qué no me han edificado una casa de cedro?
  alternatives_spanish:
  - ¿Por qué no me han construido una casa de cedro?
  - ¿Por qué no me han edificado una casa de madera de cedro?
  lexicon: HALOT
  rationale: ‘Casa de cedro’ reproduce la metáfora material del hebreo. ‘Han edificado’ mantiene la construcción plural y el tono formal del texto; ‘construido’ sería más llano pero menos cercano al registro bíblico.
theological_decisions:
- issue: Nombre divino implícito en el sujeto del verbo
  english_pob_reading: I have walked among all the sons of Israel
  chosen_spanish_reading: he andado entre todos los hijos de Israel
  alternative_spanish_readings:
  - he caminado entre todos los hijos de Israel
  - he andado en medio de todos los hijos de Israel
  rationale: El hebreo habla de la acción de Yahvé en primera persona y no usa un sustituto reverencial; la traducción española mantiene esa inmediatez sin ocultar el sujeto divino.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §2
- issue: Tensión textual entre ‘tribus’ y el papel de liderazgo pastoral
  english_pob_reading: to one of the tribes of Israel ... whom I commanded to shepherd my people Israel
  chosen_spanish_reading: a uno de los tribus de Israel ... al cual mandé apacentar a mi pueblo Israel
  alternative_spanish_readings:
  - a uno de los jefes de Israel ... al cual mandé apacentar a mi pueblo Israel
  - a uno de los jueces de Israel ... al cual mandé apacentar a mi pueblo Israel
  rationale: Se conserva la lectura del texto hebreo de Samuel (‘tribus’) y se deja visible la dificultad interpretativa, en vez de importar la armonización de Crónicas al cuerpo principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa al usar ‘to one of the tribes’ como dativo más preciso y mantiene sin cambios la estructura retórica: andar entre Israel, la pregunta retórica sobre haber hablado, la cláusula pastoral y la queja sobre no haber construido una casa de cedro. También conserva la tensión textual entre Samuel y 1 Crónicas mediante nota, sin armonizarla en el texto principal.'
  spanish_consistency_notes:
  - Se mantuvo ‘hijos de Israel’ para la designación nacional masculina plural, en coherencia con la política de precisión gramatical.
  - Se usó ‘apacentar’ para conservar la metáfora pastoral de רעה sin reducirla a ‘gobernar’.
  - Se evitó ‘SEÑOR’ o una sustitución reverencial, porque el hebreo presenta la voz directa de Yahvé.
  - La sintaxis busca ser publicable en español moderno, pero sin borrar la estructura interrogativa y paralela del hebreo.
