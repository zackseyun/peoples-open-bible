translation:
  language: es
  text: Con el fiel te muestras fiel[a]; con el varón poderoso[b] e íntegro te muestras íntegro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «misericordioso»: el hebreo del verbo y del adjetivo es de la misma raíz, y muchas traducciones vierten la primera línea como «Con el misericordioso te muestras misericordioso».'
    reason: lexical_alternative
  - marker: b
    text: O «varón valiente» para «hombre poderoso».
    reason: lexical_alternative
lexical_decisions:
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - para con
  - ante
  lexicon: HALOT
  rationale: La preposición expresa correspondencia relacional; en español, «con» conserva la simetría poética de ambos miembros sin añadir una dirección interpretativa innecesaria.
- source_word: חָסִיד
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - leal
  - piadoso
  - misericordioso
  lexicon: HALOT
  rationale: «Fiel» recoge bien la idea de lealtad de pacto y mantiene la relación léxica con el verbo recíproco del segundo miembro. También es claro y natural en español contemporáneo.
- source_word: תִּתְחַסָּד
  english_pob_choice: you show yourself faithful
  chosen_spanish: te muestras fiel
  alternatives_spanish:
  - te muestras misericordioso
  - actúas lealmente
  - te conduces con fidelidad
  lexicon: HALOT
  rationale: 'El hitpael sugiere una acción recíproca/reflexiva: Dios se muestra conforme al rasgo del sujeto mencionado. «Te muestras fiel» conserva esa reciprocidad y el vínculo verbal con חָסִיד.'
- source_word: גִּבּוֹר
  english_pob_choice: mighty man
  chosen_spanish: varón valiente
  alternatives_spanish:
  - mighty man
  - hombre valiente
  - guerrero
  - hombre poderoso
  lexicon: HALOT
  rationale: «גִּבּוֹר» puede designar a un hombre fuerte, valiente o guerrero. En español, «varón valiente» preserva el matiz de fuerza/heroísmo con registro digno, mientras evita un término demasiado técnico o militar si no es requerido por el contexto.
- source_word: תָּמִים
  english_pob_choice: blameless
  chosen_spanish: íntegro
  alternatives_spanish:
  - irreprensible
  - sin culpa
  - perfecto
  - recto
  lexicon: HALOT
  rationale: «תָּמִים» en contextos morales puede expresar integridad, plenitud o ausencia de defecto. «Íntegro» comunica bien esa cualidad en español y evita la posible rigidez de «perfecto».
- source_word: תִּתַּמָּם
  english_pob_choice: you show yourself blameless
  chosen_spanish: te muestras íntegro
  alternatives_spanish:
  - te muestras irreprensible
  - actúas con integridad
  - te conduces sin culpa
  lexicon: HALOT
  rationale: La forma recíproca mantiene el paralelismo con el primer hemistiquio. «Te muestras íntegro» preserva el reflejo verbal y el juego léxico con תָּמִים sin sonar forzado en español.
theological_decisions:
- issue: Reciprocidad divina en lenguaje poético
  english_pob_reading: Render the verse as describing God's corresponding dealings with people according to their character, without implying a denial of grace or a mechanistic doctrine of merit.
  chosen_spanish_reading: El verso describe la correspondencia de Dios con la persona según su carácter, sin convertirlo en una fórmula mecánica de mérito ni negar la gracia.
  alternative_spanish_readings:
  - Una afirmación estricta de retribución por mérito
  - Una mera descripción de la percepción humana de Dios
  rationale: 'La poesía hebrea presenta correspondencia verbal y relacional. El español debe conservar esa tensión: Dios responde de modo acorde al carácter del otro, pero la frase no debe ampliarse hasta convertirla en un sistema doctrinal cerrado.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: El texto inglés POB pasó por una revisión que prefirió «mighty man» sobre «warrior» para גִּבּוֹר; la versión española conserva esa amplitud semántica con «varón valiente», evitando estrechar el término a una lectura exclusivamente militar. También se mantuvo la alternativa léxica tradicional vinculada a חסיד/חסד mediante nota, porque el hebreo permite esa asociación y el POB la documenta.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el verso hebreo no contiene el nombre divino ni una cita directa del tetragrámaton en esta forma.
  - Se prefirió «fiel»/«fiel» para sostener el paralelismo léxico y el juego verbal entre adjetivo y verbo.
  - «Íntegro» se usó para reflejar תָּמִים de forma natural en español sin perder la idea de ausencia de defecto moral.
  - Las notas usan marcadores únicos y se anclan solo donde el texto realmente los requiere.
