translation:
  language: es
  text: En el primer mes, el día catorce del mes, es la Pascua de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘para Yahvé’. El hebreo con lamed puede expresar dedicación o pertenencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/חֹדֶשׁ הָ/רִאשׁוֹן
  english_pob_choice: In the first month
  chosen_spanish: En el primer mes
  alternatives_spanish:
  - Y en el primer mes
  - Ahora, en el primer mes
  lexicon: HALOT
  rationale: La fórmula temporal hebrea se conserva de manera natural en español con la preposición ‘En’. El prefijo conjuntivo inicial no obliga a reproducir ‘y’ si eso sonaría innecesario en castellano bíblico contemporáneo.
- source_word: בְּ/אַרְבָּעָה עָשָׂר יוֹם לַ/חֹדֶשׁ
  english_pob_choice: on the fourteenth day of the month
  chosen_spanish: el día catorce del mes
  alternatives_spanish:
  - el catorceavo día del mes
  - en el día catorce del mes
  lexicon: HALOT
  rationale: ‘El día catorce del mes’ refleja la fórmula hebrea estándar con claridad y sin forzar un calco poco natural. Se mantiene la referencia calendárica sin añadir ‘de este mes’, que no está en el hebreo.
- source_word: פֶּסַח
  english_pob_choice: Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua de Pascua
  - la fiesta de Pascua
  - el pascua
  lexicon: HALOT
  rationale: En contexto calendárico y cultual, el término español establecido y fiel es ‘Pascua’. No se explicita ‘ofrenda’ porque el hebreo nombra la Pascua como observancia/festival, no solo el sacrificio.
- source_word: לַ/יהוָה
  english_pob_choice: of Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - para Yahvé
  - perteneciente a Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: ‘Yahvé’. La preposición lamed se vierte mejor aquí con valor de relación/genitivo como ‘de’, equivalente al audit trail inglés que revisó ‘to the LORD’ por ‘of the LORD’.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto fuente contiene el nombre propio divino, no un título genérico. En español, el proyecto prescribe ‘Yahvé’, preservando la identidad del pacto sin máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de לַ en פֶּסַח לַיהוָה
  english_pob_reading: of Yahweh
  chosen_spanish_reading: de Yahvé
  alternative_spanish_readings:
  - para Yahvé
  - a Yahvé
  - perteneciente a Yahvé
  rationale: La relación puede sugerir dedicación o pertenencia, pero en esta cláusula nominal la solución española más directa y natural es el genitivo ‘de’, sin perder la idea de que la Pascua está vinculada a Yahvé.
  doctrine_reference: HALOT; audit trail revision pass
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que cambió ‘to the LORD’ por ‘of the LORD’ para reflejar mejor la construcción genitiva hebrea; la redacción española sigue ese ajuste con ‘de Yahvé’.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma principal para יהוה, conforme al estándar del proyecto.
  - ‘Pascua’ se usa en sentido calendárico/cúltico, no como simple nombre de comida o rito aislado.
  - 'La estructura española conserva el orden semántico del hebreo sin sacrificar fluidez: marco temporal + fecha + predicado nominal.'
