translation:
  language: es
  text: Y los querubines estaban desplegando sus alas sobre el lugar del arca[a], y los querubines cubrieron el arca y sus varas desde arriba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desplegando sus alas sobre el lugar propia del arca» o «sobre el lugar del arca» según se exprese la relación posesiva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: were
  chosen_spanish: estaban
  alternatives_spanish:
  - eran
  - se hallaban
  lexicon: HALOT
  rationale: El hebreo con el participio פֹּרְשִׂים expresa una acción/estado en curso; en español, «estaban desplegando» comunica mejor la postura continua que un simple «había».
- source_word: הַכְּרוּבִים
  english_pob_choice: the cherubim
  chosen_spanish: los querubines
  alternatives_spanish:
  - los querubines alados
  - los querubines del arca
  lexicon: HALOT
  rationale: Se conserva el término técnico tradicional «querubines» para estos seres guardianes del trono/templo; no se reduce a una glosa como «querubos».
- source_word: פֹּרְשִׂים כְּנָפַיִם
  english_pob_choice: spreading out their wings
  chosen_spanish: desplegando sus alas
  alternatives_spanish:
  - extendiendo sus alas
  - abriendo sus alas
  lexicon: HALOT
  rationale: «Desplegar» expresa bien la extensión de las alas. En español «alas» es la forma natural para כְּנָפַיִם y evita una repetición pesada de «sus alas» con «querubines».
- source_word: עַל מְקוֹם הָאָרוֹן
  english_pob_choice: over the place of the ark
  chosen_spanish: sobre el lugar del arca
  alternatives_spanish:
  - sobre el sitio del arca
  - sobre la ubicación del arca
  lexicon: HALOT
  rationale: Se mantiene la distinción del hebreo entre el arca y su «lugar». «Lugar» preserva la formulación concreta sin hacerla más abstracta de lo necesario.
- source_word: וַיְכַסּוּ
  english_pob_choice: covered
  chosen_spanish: cubrían
  alternatives_spanish:
  - cubrieron
  - tapaban
  lexicon: HALOT
  rationale: 'Aunque el verbo puede narrar una acción completa, el contexto de postura del verso favorece un imperfectivo en español: «cubrían».'
- source_word: בַּדָּיו
  english_pob_choice: its poles
  chosen_spanish: sus varas
  alternatives_spanish:
  - sus poles
  - sus varales
  lexicon: HALOT
  rationale: «Varas» es una forma clara y reverente para los bastones/polos de transporte del arca. «Poles» no es español; «varales» suena más regional o menos directo.
- source_word: מִלְמָעְלָה
  english_pob_choice: from above
  chosen_spanish: desde arriba
  alternatives_spanish:
  - por arriba
  - de arriba
  lexicon: HALOT
  rationale: La expresión señala la dirección del cubrir. «Desde arriba» es natural en español y conserva la imagen espacial del hebreo.
translation_notes:
  revision_awareness: El texto inglés ya había fijado la imagen espacial del verso y una nota alternativa para מְקוֹם; la versión española conserva esa distinción entre «el arca» y «su lugar» sin suavizarla, y mantiene el imperfectivo de la escena para reflejar la postura continua de los querubines.
  spanish_consistency_notes:
  - Se conserva «querubines» como término técnico consistente con el proyecto.
  - «Arca» se usa sin añadir explicaciones que el versículo no exige.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes porque el verso no contiene el nombre divino.
  - «Varas» mantiene la referencia funcional a los soportes de transporte del arca de manera clara para el lector actual.
