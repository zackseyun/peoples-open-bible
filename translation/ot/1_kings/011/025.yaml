theological_decisions:
- issue: Whether שָׂטָן should be rendered as the proper name 'Satan'
  chosen_reading: human 'adversary'
  alternative_readings:
  - Satan
  rationale: The context concerns political opponents raised up against Solomon; the noun is common, not a proper name here. Rendering it 'Satan' would wrongly personify the term and import later demonological meaning absent from the passage.
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition)
