translation:
  language: es
  text: 'Entonces los ancianos de su ciudad lo llamarán y le hablarán; y si se levanta y dice: “No deseo tomarla[a]”,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente en este contexto, “casarse con ella”. El hebreo dice literalmente “tomarla”, un modismo común para tomar a una mujer en matrimonio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָֽרְאוּ
  english_pob_choice: shall call
  chosen_spanish: lo llamarán
  alternatives_spanish:
  - lo convocarán
  - lo llamarán para comparecer
  lexicon: HALOT
  rationale: En este contexto legal narrativo, el llamado es una convocatoria formal a comparecer; ‘lo llamarán’ mantiene la sencillez del hebreo y su fuerza procedimental sin volverlo innecesariamente técnico.
- source_word: זִקְנֵי עִיר֖/וֹ
  english_pob_choice: the elders of his city
  chosen_spanish: los ancianos de su ciudad
  alternatives_spanish:
  - los ancianos de su pueblo
  - los mayores de su ciudad
  lexicon: HALOT
  rationale: ‘Ancianos’ conserva el término bíblico para los dirigentes locales y evita reemplazarlo por una formulación más interpretativa. ‘Ciudad’ reproduce el valor habitual de עִיר aquí.
- source_word: וְדִבְּר֣וּ אֵלָ֑י/ו
  english_pob_choice: and speak to him
  chosen_spanish: y le hablarán
  alternatives_spanish:
  - y hablarán con él
  - y le dirigirán la palabra
  lexicon: HALOT
  rationale: דבר con אֶל indica hablar directamente a alguien. ‘Le hablarán’ es natural en español y conserva el carácter formal del diálogo legal.
- source_word: וְעָמַ֣ד
  english_pob_choice: if he stands
  chosen_spanish: y si se pone de pie
  alternatives_spanish:
  - y si permanece firme
  - y si se levanta
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘y se puso de pie’. En este contexto, puede señalar que persiste en su postura; aun así, el español mantiene la imagen corporal sin borrar la literalidad. No se fuerza una paráfrasis como ‘permanece firme’ en el texto principal.
- source_word: וְאָמַ֔ר
  english_pob_choice: and says
  chosen_spanish: y dice
  alternatives_spanish:
  - y declara
  - y responde
  lexicon: HALOT
  rationale: Verbo simple de habla en secuencia; ‘dice’ es la opción más directa y fiel.
- source_word: לֹ֥א חָפַ֖צְתִּי
  english_pob_choice: I do not desire
  chosen_spanish: No deseo
  alternatives_spanish:
  - No quiero
  - No me complazco en
  lexicon: HALOT
  rationale: חפץ expresa deseo, complacencia o voluntad. ‘No deseo’ conserva ese matiz mejor que ‘no quiero’, que en español puede sonar más coloquial o exclusivamente volitivo.
- source_word: לְ/קַחְתָּֽ/הּ
  english_pob_choice: to take her
  chosen_spanish: tomarla
  alternatives_spanish:
  - casarme con ella
  - tomarla en matrimonio
  lexicon: HALOT
  rationale: El verbo לקח con una mujer funciona como un modismo para tomarla en matrimonio. En el texto principal se conserva la formulación hebrea breve ‘tomarla’; la nota aclara el sentido marital cuando corresponde.
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustanciales; se mantiene la equivalencia óptima del original hebreo y la nota lexical para el modismo matrimonial.
  spanish_consistency_notes:
  - Se evitó ‘SEÑOR’ o cualquier sustituto no pertinente porque no aparece el nombre divino en este versículo.
  - ‘Ancianos’ se mantiene como término bíblico estable para זִקְנֵי, sin convertirlo en una categoría sociológica moderna.
  - La cláusula final queda abierta como en el hebreo, sin añadir el objeto de la acción más allá de la nota textual/lexical.
