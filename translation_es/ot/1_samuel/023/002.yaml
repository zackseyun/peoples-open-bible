translation:
  language: es
  text: 'Así David consultó a Yahvé, diciendo: «¿Iré y golpearé a estos filisteos?». Y Yahvé dijo a David: «Ve y golpea a los filisteos, y salva a Queila[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «libra a Queila».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  english_pob_choice: inquired
  chosen_spanish: consultó
  alternatives_spanish:
  - preguntó
  - inquirió
  lexicon: HALOT
  rationale: שׁאל con בַּיהוָה expresa buscar dirección o consulta oracular; en español, «consultó» comunica esa búsqueda de guía mejor que un simple «preguntó». «Inquirió» sería más formal, pero menos natural para la lectura pública.
- source_word: בַּיהוָה / יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: DOCTRINE.md / Tetragrámaton
  rationale: El nombre divino יְהוָה se conserva como «Yahvé» según la norma del proyecto, sin ocultarlo detrás de un título. «El SEÑOR» reflejaría una convención reverencial, pero no la decisión doctrinal auditable del POB español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Introduce el contenido de la consulta de David. «Diciendo» mantiene la relación sintáctica de forma directa y transparente en español.
- source_word: הַאֵלֵךְ
  english_pob_choice: Shall I go
  chosen_spanish: ¿Iré?
  alternatives_spanish:
  - ¿Debo ir?
  - ¿He de ir?
  lexicon: HALOT
  rationale: La forma interrogativa deliberativa se expresa de modo natural con «¿Iré?». «¿Debo ir?» añade obligación que el hebreo no exige; «¿He de ir?» suena más arcaico.
- source_word: וְהִכֵּיתִי
  english_pob_choice: and strike
  chosen_spanish: atacaré
  alternatives_spanish:
  - golpearé
  - heriré
  - someteré
  lexicon: HALOT
  rationale: נכה puede ser «golpear/smite», pero en este contexto militar la pregunta de David es si debe salir a combatir. «Atacaré» transmite la acción bélica sin endurecer innecesariamente el matiz físico de «golpearé» y sin interpretar el resultado como «derrotaré».
- source_word: בַּפְּלִשְׁתִּים הָאֵלֶּה
  english_pob_choice: these Philistines
  chosen_spanish: a estos filisteos
  alternatives_spanish:
  - a estos filisteos aquí
  - contra estos filisteos
  lexicon: HALOT
  rationale: El demostrativo הָאֵלֶּה se conserva con «estos». La preposición española puede expresarse como complemento directo introducido por «a» o con «contra»; se eligió «a» por la construcción verbal con atacar y por fluidez.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Ve adelante
  - Adelante
  lexicon: HALOT
  rationale: Imperativo directo y breve. «Ve» mantiene la fuerza inmediata del mandato divino.
- source_word: וְהִכִּיתָ
  english_pob_choice: and strike
  chosen_spanish: ataca
  alternatives_spanish:
  - golpea
  - hiere
  - somete
  lexicon: HALOT
  rationale: Se conserva la correspondencia verbal con la pregunta de David, pero en español «ataca» resulta más idiomático en el mandato militar que repetir literalmente «golpea». La tensión entre correspondencia y naturalidad se resuelve sin perder el sentido bélico.
- source_word: וְהוֹשַׁעְתָּ
  english_pob_choice: and save
  chosen_spanish: salva
  alternatives_spanish:
  - libra
  - rescata
  - libérala
  lexicon: HALOT
  rationale: ישׁע en este contexto significa librar de peligro. «Salva» reproduce bien la amplitud del verbo y la opción del POB inglés; «libra» o «rescata» serían posibles, pero menos directas aquí.
- source_word: אֶת קְעִילָה
  english_pob_choice: Keilah
  chosen_spanish: Queila
  alternatives_spanish:
  - Keila
  - Quela
  lexicon: Topónimo bíblico
  rationale: Se translitera el nombre propio según uso español bíblico común y legibilidad fonética. «Queila» conserva la referencia geográfica del hebreo קְעִילָה de manera reconocible.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión doctrinal del POB de no enmascarar el Tetragrámaton. «Yahvé» preserva el nombre del pacto y mantiene coherencia con la política del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de וְהוֹשַׁעְתָּ אֶת קְעִילָה
  english_pob_reading: and save Keilah
  chosen_spanish_reading: y salva a Queila
  alternative_spanish_readings:
  - y libra a Queila
  - y rescata a Queila
  rationale: En el contexto militar, el verbo apunta a librar a la ciudad del peligro de los filisteos. «Salva» conserva la amplitud semántica y evita restringir indebidamente el acto a un mero rescate físico.
  doctrine_reference: HALOT / contexto narrativo de guerra
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que ajustó el interrogativo a un registro más formal («Shall I go») y eliminó una coma para mayor fluidez. En español, esa deliberación se refleja con «¿Iré?» y una sintaxis directa, sin añadir matices de obligación que no aparecen en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma base para יְהוָה, conforme a la política doctrinal del proyecto.
  - Se preserva la progresión narrativa de consulta divina seguida de respuesta imperativa.
  - Se conserva el demostrativo «estos» para הָאֵלֶּה, evitando generalizar la referencia a los filisteos.
  - «Atacar» se usa de manera consistente para נכה en este versículo, porque aquí el contexto es militar y la equivalencia más natural en español no es «golpear» sino entrar en combate.
