id: PSS.5.10
reference: Psalms of Solomon 5:10
source:
  edition: lxx-swete-1909
  text: ἐὰν γὰρ πεινάσω, πρὸς σὲ κεκράξομαι, ὁ θεός, καὶ σὺ δώσεις μοι.
  language: Greek
  pages:
  - 795
  validation: swete_direct
translation:
  text: For if I am hungry[a], I will cry out to you, O God, and you will give to me.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Greek literally says, 'you will give to me'; the object is not stated.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεινάσω
  chosen: become hungry
  alternatives:
  - am hungry
  - hunger
  lexicon: LEH; LSJ
  rationale: With ἐὰν and the aorist subjunctive, the clause expresses a future contingency. 'Become hungry' brings that sense into natural English without the archaism of 'if I should hunger.'
- source_word: κεκράξομαι
  chosen: I will cry out
  alternatives:
  - I will call
  - I will shout
  lexicon: LEH; LSJ
  rationale: '''Cry out'' preserves the intensity of κράζω better than the flatter ''call,'' while remaining readable modern English.'
- source_word: ὁ θεός
  chosen: O God
  alternatives:
  - God
  lexicon: LEH; LSJ
  rationale: Although formally nominative with article, this is vocative in function in Greek biblical style; 'O God' best reflects direct address.
- source_word: δώσεις μοι
  chosen: you will provide for me
  alternatives:
  - you will give to me
  - you will give me
  lexicon: LEH; LSJ
  rationale: The verb is literally 'give,' but the object is unstated. In context of hunger, English 'provide for me' communicates the sense naturally while preserving the idea of God's supplying need.
