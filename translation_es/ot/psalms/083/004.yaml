review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: hostilidad contra el pueblo de Dios, maquinación astuta y consulta mutua. Sin embargo, «tus tesoros escondidos» no representa fielmente צְפוּנֶיךָ como referencia personal a personas del pueblo; suena a objetos y sobreexplicita dos matices a la vez. Además, «se ponen de acuerdo» debilita el sentido de deliberación mutua de וְיִתְיָעֲצוּ.'
  spanish_quality_summary: El español es claro, pero «tus tesoros escondidos» resulta poco natural y semánticamente confuso en contexto bíblico porque convierte a las personas en cosas. «Ellos hacen planes astutos» es comprensible, aunque «traman planes astutos» o «hacen planes astutos» funcionan; el ajuste principal es la segunda mitad del versículo para mayor naturalidad y precisión.
  glossary_alignment: 'No hay conflicto con los términos teológicos de proyecto. La cuestión central es léxica: צְפוּנֶיךָ debe mantenerse como personas preciadas/protegidas de Dios, con nota que preserve «tus escondidos» como alternativa. «Tu pueblo» está bien.'
  issues:
