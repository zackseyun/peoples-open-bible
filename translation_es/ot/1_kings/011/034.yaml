review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: negación de quitar todo el reino, preservación de la autoridad de Salomón durante su vida, y motivación por David, elegido por Dios y obediente a sus mandamientos y estatutos. Sin embargo, «quitaré todo el reino de su mano» suena menos natural que «tomaré» o «quitaré ... de sus manos», y la nota de «príncipe» introduce una justificación dependiente del inglés en vez de centrarse en el hebreo.'
  spanish_quality_summary: El texto es mayormente claro y digno, con buen registro bíblico. La principal mejora es hacer más natural «אֶקַּח ... מִיָּדוֹ» en español sin perder la imagen de la mano/poder. «Por amor de David mi siervo» y «guardó mis mandamientos y mis estatutos» son adecuados y legibles.
  glossary_alignment: No aparece el nombre divino en este versículo. «Siervo» para עַבְדִּי está bien en este contexto davídico. «Príncipe» para נָשִׂיא es defendible por el rastro POB y el hebreo, siempre que la nota explique la amplitud semántica desde el hebreo y no por mera cercanía al inglés.
  issues:
  - severity: medium
    issue: «Quitaré todo el reino de su mano» es algo rígido en español
    rationale: Aunque transmite el sentido, con «reino» la combinación con «quitar de su mano» suena menos idiomática. «No tomaré todo el reino de su mano» preserva mejor la imagen concreta del hebreo/inglés POB; alternativamente, «no le quitaré» sería natural pero debilita la metáfora de la mano.
  - severity: low
    issue: La nota al pie apela a la cercanía con el POB inglés
    rationale: La revisión debe fundamentarse primariamente en el hebreo y en la semántica de נָשִׂיא. Mencionar que se conserva «príncipe» por cercanía al texto base inglés no es la mejor justificación para una nota destinada al lector.
  - severity: low
    issue: Comillas y redacción de la nota algo torpes
    rationale: La nota empieza con una comilla innecesaria y puede simplificarse para mayor limpieza editorial y claridad.
  revised_spanish_text: Pero no tomaré todo el reino de su mano, porque lo haré príncipe[a] todos los días de su vida, por amor de David mi siervo, a quien elegí, que guardó mis mandamientos y mis estatutos.
  revised_footnotes:
  - marker: a
    text: O «gobernante» o «líder». El hebreo נָשִׂיא puede significar «príncipe», «jefe», «líder» o «gobernante»; aquí se conserva «príncipe» por su cercanía al término hebreo.
    reason: lexical_alternative
  revision_rationale: Se ajusta «quitaré» a «tomaré» para reflejar más de cerca לָקַח y sonar más natural con «de su mano». También se depura la nota para que su justificación sea fuente-céntrica, basada en el hebreo נָשִׂיא, no en dependencia del inglés POB.
