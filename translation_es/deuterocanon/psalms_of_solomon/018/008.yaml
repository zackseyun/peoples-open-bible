translation:
  language: es
  text: bajo la vara de disciplina del Mesías del Señor[a], en el temor de su Dios, en sabiduría de espíritu y de rectitud[b][c];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «el Mesías, el Señor» o «el ungido del Señor»; los genitivos griegos están estrechamente trabados.
    reason: alternative_reading
  - marker: b
    text: O «sabiduría del Espíritu».
    reason: lexical_alternative
  - marker: c
    text: «Rectitud» también podría traducirse aquí como «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥάβδον
  english_pob_choice: rod
  chosen_spanish: vara
  alternatives_spanish:
  - vara
  - cetro
  - bastón
  lexicon: LSJ
  rationale: ῥάβδος puede significar vara, bastón o cetro. En combinación con παιδείας, «vara» conserva mejor la idea de corrección disciplinaria sin introducir una connotación real demasiado fuerte.
- source_word: παιδείας
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - formación
  - corrección
  lexicon: BDAG
  rationale: Aquí παιδεία va con «vara» y expresa disciplina correctiva y formativa. «Disciplina» reproduce bien ese campo semántico en español.
- source_word: χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  - ungido
  lexicon: BDAG
  rationale: Siguiendo la norma del proyecto, Χριστός se vierte como «Mesías» cuando funciona como título. Así se conserva el sentido mesiánico judío del texto.
- source_word: κυρίου
  english_pob_choice: Lord's
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Señor
  - del Amo
  - del Kyrios
  lexicon: BDAG
  rationale: κύριος se traduce por defecto como «Señor». La construcción genitiva se refleja de forma natural con «del Señor», manteniendo la relación entre Señor y Mesías.
- source_word: φόβῳ
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - reverencia
  - awe
  lexicon: BDAG
  rationale: «Temor» preserva la palabra fuente y el peso bíblico del término; el matiz reverencial queda implícito por el contexto de relación con Dios.
- source_word: θεοῦ αὐτοῦ
  english_pob_choice: his God
  chosen_spanish: su Dios
  alternatives_spanish:
  - Dios suyo
  - el Dios de él
  lexicon: BDAG
  rationale: El posesivo αὐτοῦ es explícito y debe conservarse. «Su Dios» reproduce de manera directa la relación expresada en griego.
- source_word: σοφίᾳ
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  - destreza
  lexicon: BDAG
  rationale: σοφία se vierte normalmente como «sabiduría». No hay presión contextual suficiente para una traducción más restringida.
- source_word: πνεύματος
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  lexicon: BDAG
  rationale: Como πνεύματος no lleva artículo y aparece en una serie de cualidades, «espíritu» en minúscula es la opción más cauta en el texto principal. Se deja abierta la posible referencia al Espíritu de Dios.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió «righteousness», en español «justicia» es una forma natural y fiel que puede abarcar tanto el valor moral como el sentido de rectitud/covenaantal del término.
- source_word: ἰσχύος
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - poder
  - vigor
  - fortaleza
  lexicon: BDAG
  rationale: ἰσχύς denota fuerza o vigor. «Fuerza» es la opción más directa y sobria para esta lista de virtudes.
theological_decisions:
- issue: Relación de χριστοῦ κυρίου
  english_pob_reading: the Lord's Messiah
  chosen_spanish_reading: el Mesías del Señor
  alternative_spanish_readings:
  - el Mesías, del Señor
  - el ungido del Señor
  - el Señor Mesías
  rationale: La secuencia de genitivos es compacta y algo ambigua. «El Mesías del Señor» preserva ambas piezas sin convertir Mesías en nombre propio ni forzar una lectura más doctrinal de la que exige el griego.
  doctrine_reference: 'DOCTRINE.md contested terms: Χριστός → Mesías; κύριος → Señor'
- issue: Sentido de πνεύματος
  english_pob_reading: spirit
  chosen_spanish_reading: espíritu
  alternative_spanish_readings:
  - Espíritu
  - espíritu humano
  rationale: El texto no obliga a una referencia explícita al Espíritu Santo. Por eso el texto principal conserva la lectura prudente «espíritu», mientras que la mayúscula queda como posibilidad interpretativa, no impuesta.
  doctrine_reference: Greek article usage and POB lexical caution on πνεῦμα
translation_notes:
  revision_awareness: Se tuvo en cuenta el último ajuste inglés que eliminó artículos/preposiciones repetidos en la serie final para reflejar mejor la construcción griega. En español se optó por una serie paralela breve y natural («en sabiduría de espíritu y de justicia y de fuerza»), manteniendo la compactación del original sin añadir elementos innecesarios.
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστός y «Señor» para κύριος, conforme a la terminología del proyecto.
  - Se usó «espíritu» en minúscula en el texto principal por cautela textual; la posible lectura teológica se preserva en nota.
  - «Justicia» se eligió como equivalente español natural de δικαιοσύνη, sin bloquear la alternativa «rectitud».
  - La puntuación y el orden de los complementos buscan reflejar la lista griega sin suavizar su tensión sintáctica.
