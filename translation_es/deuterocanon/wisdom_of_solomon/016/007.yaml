    rationale: Aunque es defendible, en este contexto puede entenderse de manera demasiado general. El participio ἐπιστραφεὶς, leído con el contexto de la señal, se expresa más naturalmente como un giro de atención o mirada hacia ella.
  - severity: medium
    issue: La nota a contiene la frase torpe «la señal señalada»
    rationale: Es una redacción poco natural y repetitiva que no cumple bien el objetivo explicativo. Debe reemplazarse por «la señal indicada» u otra formulación clara.
  - severity: low
    issue: La nota b puede sonar algo literalista en «la cosa que se veía»
    rationale: No es incorrecto, pero «lo que se veía» suena más natural y coincide mejor con el texto principal revisado.
