translation:
  language: es
  text: 'Su madre les dijo a los sirvientes[a]: «Todo lo que él les diga, háganlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Todo lo que él llegue a decirles, háganlo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτηρ αὐτοῦ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - la madre de él
  - su madre
  lexicon: BDAG
  rationale: La relación familiar se expresa de manera natural en español con el posesivo 'su', que mantiene la identificación narrativa sin añadir información ajena al griego.
- source_word: διακόνοις
  english_pob_choice: servants
  chosen_spanish: sirvientes
  alternatives_spanish:
  - servidores
  - criados
  - diáconos
  lexicon: BDAG
  rationale: En este contexto de banquete de bodas, el término designa a quienes prestan servicio en la fiesta, no al oficio eclesiástico posterior. 'Sirvientes' comunica con claridad esa función en español contemporáneo.
- source_word: Ὅ τι ἂν
  english_pob_choice: Whatever
  chosen_spanish: Todo lo que
  alternatives_spanish:
  - Lo que sea que
  - Cualquier cosa que
  lexicon: BDAG
  rationale: La construcción indefinida con ἄν expresa apertura y contingencia. 'Todo lo que' transmite bien esa amplitud en español natural, sin estrechar el sentido.
- source_word: λέγῃ ὑμῖν
  english_pob_choice: he tells you
  chosen_spanish: él les diga
  alternatives_spanish:
  - él les diga a ustedes
  - él les diga
  lexicon: BDAG
  rationale: El subjuntivo presente tras ἄν sugiere un caso indefinido/futuro. En español, 'les diga' conserva esa apertura y el sujeto implícito se explicita con 'él' por claridad contextual, referido a Jesús.
- source_word: ποιήσατε
  english_pob_choice: do it
  chosen_spanish: háganlo
  alternatives_spanish:
  - háganlo ustedes
  - hagan eso
  - hacedlo
  lexicon: BDAG
  rationale: El imperativo aoristo plural pide obediencia decidida. 'Háganlo' recoge el objeto implícito de la cláusula previa y suena natural en español bíblico moderno.
theological_decisions:
- issue: Referente implícito de 'él'
  english_pob_reading: The subject is rendered as 'he,' referring to Jesus, without expanding to 'Jesus' in the main text.
  chosen_spanish_reading: Se mantiene 'él' para el referente implícito, entendible por el contexto como Jesús, sin expandirlo a 'Jesús' en el texto principal.
  alternative_spanish_readings:
  - Todo lo que Jesús les diga, háganlo.
  - Todo lo que él les diga, háganlo.
  rationale: El griego no nombra a Jesús aquí; la referencia se entiende por el contexto inmediato. Conservar el pronombre respeta la economía del original y evita una explicitación interpretativa innecesaria.
  doctrine_reference: Primacía del texto original y conservación de la economía referencial del griego.
translation_notes:
  revision_awareness: La versión inglesa POB mantiene la referencia implícita con 'he' y ofrece una nota literal alternativa para la construcción contingente. Esta propuesta conserva esa economía referencial, pero adapta la contingencia griega a una formulación española idiomática ('Todo lo que...') y mantiene el tono imperativo plural.
  spanish_consistency_notes:
  - Se evita 'deaconos/diáconos' porque en español puede sugerir un cargo eclesiástico posterior que el contexto no exige.
  - Se usa 'sirvientes' por el contexto narrativo de banquete, alineado con la decisión inglesa 'servants'.
  - La nota al pie preserva la alternativa más literal del subjuntivo/contingencia sin sobrecargar el texto principal.
