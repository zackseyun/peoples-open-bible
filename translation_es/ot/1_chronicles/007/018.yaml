translation:
  language: es
  text: Su hermana Hamoléquet[a] dio a luz a Ishhod, a Abiezer y a Mahlah.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Hamoléquet; posiblemente 'Moléquet'. El nombre se relaciona en su forma con una palabra que significa 'reina' o 'la que gobierna', pero aquí se entiende mejor como nombre personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֹתוֹ
  english_pob_choice: His sister
  chosen_spanish: Su hermana
  alternatives_spanish:
  - Y su hermana
  lexicon: HALOT
  rationale: La relación de parentesco se expresa de forma natural en español como 'su hermana'. El waw inicial se integra sin necesidad de conservar una 'y' explícita, como en la decisión inglesa de dejar implícita la conexión genealógica por fluidez sin perder sentido.
- source_word: הַמֹּלֶכֶת
  english_pob_choice: Hammoleketh
  chosen_spanish: Hammolequet
  alternatives_spanish:
  - Molequet
  - la reina
  lexicon: HALOT
  rationale: El contexto genealógico indica un nombre propio, no un título. Se conserva la transliteración del nombre, manteniendo la posible relación formal con un término asociado a 'reina' o 'la que gobierna', pero sin traducirlo como título.
- source_word: יָלְדָה
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: En listas genealógicas, el verbo de dar a luz se expresa en español de manera natural y precisa con 'dio a luz'. Preserva el sujeto femenino y la acción materna explícita del hebreo.
- source_word: אִישְׁהוֹד
  english_pob_choice: Ishhod
  chosen_spanish: Ishhod
  alternatives_spanish:
  - Ish-hod
  lexicon: HALOT
  rationale: Nombre propio transliterado, siguiendo la convención del proyecto para nombres personales.
- source_word: אֲבִיעֶזֶר
  english_pob_choice: Abiezer
  chosen_spanish: Abiezer
  alternatives_spanish:
  - Abi-ezer
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar. La forma sin guion es la más legible en español y coincide con el uso asentado en inglés POB.
- source_word: מַחְלָה
  english_pob_choice: Mahlah
  chosen_spanish: Mahlá
  alternatives_spanish:
  - Mahlah
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con acento gráfico para adecuarlo a la prosodia española y evitar lectura llana impropia. Se mantiene la identidad del nombre sin introducir traducción.
translation_notes:
  revision_awareness: 'El texto inglés de referencia no requirió revisiones sustantivas y el acuerdo de control fue alto. La versión española mantiene esa lectura directa: genealogía breve, nombres propios transliterados y el verbo materno expresado con naturalidad idiomática.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa transliteración para los nombres propios, evitando traducir el posible sentido etimológico del nombre de Hammolequet.
  - '''Dio a luz'' conserva el valor genealógico sin añadir matices interpretativos no presentes en el hebreo.'
