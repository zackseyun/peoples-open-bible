translation:
  language: es
  text: No contiendas con Dios[a], y humíllate ante Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «No contradigas la verdad, y avergüénzate de tu falta de instrucción». El testimonio hebreo, en cambio, dice: «No resistas a Dios, sino humíllate ante Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּסָּרֵב
  english_pob_choice: Do not contend
  chosen_spanish: No contiendas
  alternatives_spanish:
  - No resistas
  - No te niegues
  - No contradigas
  lexicon: HALOT
  rationale: El hebreo expresa oposición o resistencia a Dios; «contiendas» conserva el matiz de ponerse en contra, en un registro natural en español y acorde con la revisión inglesa más reciente.
- source_word: עִם הָאֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios Poderoso
  - el Todopoderoso
  lexicon: HALOT
  rationale: אֵל funciona aquí como título divino común. En español, «Dios» es la opción más natural y fiel en este contexto sapiencial.
- source_word: וְאֶל אֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: ante Dios
  alternatives_spanish:
  - delante de Dios
  - frente a Dios
  - hacia Dios
  lexicon: HALOT
  rationale: La construcción hebrea comunica una postura relacional de sumisión; «ante Dios» expresa bien esa orientación sin forzar una literalidad poco natural.
- source_word: הִכָּנֵעַ
  english_pob_choice: humble yourself
  chosen_spanish: humíllate
  alternatives_spanish:
  - sométete
  - rebájate
  - inclínate
  lexicon: HALOT
  rationale: El valor reflexivo del verbo pide una forma exhortativa directa. «Humíllate» mantiene el tono sapiencial y evita una traducción más jurídica que podría estrechar el sentido.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: The Hebrew witness is primary, with the Greek parallel preserved as an alternative reading in a footnote.
  chosen_spanish_reading: 'Se sigue el hebreo: «No contiendas con Dios, y humíllate ante Dios».'
  alternative_spanish_readings:
  - «No contradigas la verdad, y avergüénzate de tu falta de instrucción»
  rationale: Para Sirácides, el hebreo conservado tiene prioridad como testimonio base. El griego presenta una formulación sustancialmente distinta; se conserva su tensión interpretativa en nota para no borrar una variante relevante.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde se conserva; usar el griego paralelo como control y nota de variante'
translation_notes:
  revision_awareness: Se corrige el problema de validación anterior anclando la nota al marcador [a] dentro del texto español. La redacción principal sigue el hebreo conservado, mientras que la nota preserva la variante griega sustancial.
  spanish_consistency_notes:
  - «Dios» se usa para אֵל y אֱלֹהִים por naturalidad y consistencia terminológica.
  - «Humíllate» conserva el imperativo reflexivo y el tono sapiencial.
  - La nota de variante está anclada en el lugar exacto donde la tradición inglesa la ubicó, para mantener trazabilidad textual.
