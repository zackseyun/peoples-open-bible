translation:
  language: es
  text: Entonces Joab tocó la trompeta[a], y el pueblo dejó de perseguir a Israel[b], porque Joab contuvo[c] al pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuerno». El hebreo shofar designa un cuerno de señal, con frecuencia de carnero; «trompeta» es la equivalencia idiomática militar aquí.
    reason: lexical_alternative
  - marker: b
    text: Es decir, las fuerzas de Israel alineadas con Absalón.
    reason: cultural_note
  - marker: c
    text: O «restringió al pueblo» o «lo detuvo». El verbo hebreo puede expresar retener, restringir o contener; aquí probablemente significa que Joab impidió que sus hombres siguieran la persecución.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְקַע
  english_pob_choice: blew
  chosen_spanish: tocó
  alternatives_spanish:
  - sopló
  - hizo sonar
  lexicon: HALOT
  rationale: El verbo con שׁוֹפָר describe la acción idiomática de hacer sonar un instrumento de señal. En español, «tocó la trompeta» es natural, claro y conserva el acto concreto sin forzar un calco.
- source_word: בַּשֹּׁפָר
  english_pob_choice: the trumpet
  chosen_spanish: la trompeta
  alternatives_spanish:
  - el cuerno
  - el cuerno de carnero
  lexicon: HALOT
  rationale: שׁוֹפָר es un cuerno de señal; la POB inglesa opta por «trumpet» como equivalente idiomático militar. En español, «trompeta» cumple la misma función comunicativa, aunque la nota mantiene la posibilidad más concreta de «cuerno».
- source_word: וַיָּשָׁב הָעָם
  english_pob_choice: the people turned back
  chosen_spanish: el pueblo volvió
  alternatives_spanish:
  - la tropa retrocedió
  - la gente se volvió atrás
  lexicon: HALOT
  rationale: שׁוּב aquí expresa volver o retirarse. «El pueblo» sigue de cerca הָעָם y en contexto militar puede referirse al grupo de combatientes; «volvió» reproduce el movimiento de retroceso.
- source_word: מִרְדֹף
  english_pob_choice: from pursuing
  chosen_spanish: de perseguir
  alternatives_spanish:
  - de seguir persiguiendo
  - de la persecución
  lexicon: HALOT
  rationale: La preposición con infinitivo marca cese de la acción. «De perseguir» es una forma natural y fiel que conserva la idea de interrupción de la persecución militar.
- source_word: אַחֲרֵי יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: a Israel
  alternatives_spanish:
  - tras Israel
  - a los israelitas
  lexicon: HALOT
  rationale: El hebreo literalmente dice «detrás de Israel», es decir, en su persecución. En español, «perseguir a Israel» comunica correctamente el objeto perseguido. La nota conserva la aclaración contextual de que se trata de las fuerzas de Israel alineadas con Absalón.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: כִּי introduce la causa. «Porque» es la forma más natural y directa en español contemporáneo.
- source_word: חָשַׂךְ
  english_pob_choice: restrained
  chosen_spanish: contuvo
  alternatives_spanish:
  - restringió
  - retuvo
  - contuvo a
  lexicon: HALOT
  rationale: El verbo puede significar retener, abstener, restringir o contener. En este contexto, Joab impide que sus hombres continúen la persecución; «contuvo» expresa bien la acción de frenar al grupo sin añadir una motivación no explicitada.
- source_word: אֶת הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la tropa
  - a sus hombres
  lexicon: HALOT
  rationale: Se mantiene «el pueblo» como referencia al mismo colectivo militar del versículo. El acusativo con אֶת se refleja naturalmente con «al». La elección conserva consistencia léxica con el primer miembro del versículo.
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que prefirió «restrained» frente a «held back» para חָשַׂךְ, y mantiene el sentido militar de interrupción de la persecución. También conserva la aclaración contextual sobre Israel mediante nota, como en el aparato inglés.
  spanish_consistency_notes:
  - Se mantuvo «el pueblo» para הָעָם de modo consistente en ambos miembros del versículo.
  - Se eligió «trompeta» como equivalente idiomático de שׁוֹפָר, con nota alternativa «cuerno» para preservar la tensión léxica.
  - «Contuvo» refleja la idea de frenar o restringir sin exagerar hacia «perdonó» o «salvó», que no están requeridos por el contexto.
  - La estructura general sigue el orden narrativo hebreo y la lectura inglesa auditada, con español natural y publicable.
