translation:
  language: es
  text: Y todo el pueblo aprobó que Simón actuara conforme a estas palabras[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «según estas palabras» o, de manera más interpretativa, «conforme a estos términos», porque el griego dice literalmente «según estas palabras» y probablemente remite a las disposiciones anteriores.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐδόκησεν
  english_pob_choice: approved
  chosen_spanish: aprobó
  alternatives_spanish:
  - tuvo por bueno
  - consintió
  - se agradó
  lexicon: LSJ
  rationale: En este contexto administrativo y colectivo, el verbo expresa una decisión favorable del pueblo. «Aprobó» conserva el sentido formal de asentimiento público mejor que una opción más emotiva o más vaga.
- source_word: πᾶς ὁ λαός
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - todo el pueblo entero
  - toda la nación
  lexicon: LSJ
  rationale: «Todo el pueblo» reproduce de modo natural la totalidad expresada por πᾶς ὁ λαός sin convertir innecesariamente la referencia en «nación».
- source_word: θέσθαι Σίμωνι ποιῆσαι
  english_pob_choice: that Simon should act
  chosen_spanish: que Simón actuara
  alternatives_spanish:
  - que Simón llevara a cabo
  - que Simón obrara
  - que Simón ejecutara
  lexicon: LSJ
  rationale: El griego es compacto y no repite en español la estructura infinitiva literal. «Actuara» expresa de forma fluida la resolución práctica tomada respecto de Simón, en línea con la equivalencia inglesa auditada.
- source_word: κατὰ τοὺς λόγους τούτους
  english_pob_choice: according to these words
  chosen_spanish: conforme a estas palabras
  alternatives_spanish:
  - según estas palabras
  - de acuerdo con estos términos
  - conforme a estos términos
  lexicon: LSJ
  rationale: «Conforme a estas palabras» conserva la formulación cercana al griego. En español, «palabras» puede sonar algo más literal que «términos», pero mantiene el vínculo con las disposiciones precedentes sin añadir interpretación excesiva.
translation_notes:
  revision_awareness: El texto inglés POB se mantuvo sin cambios de revisión relevantes; la nota inglesa sobre la posible equivalencia de «according to these words»/«in accordance with these terms» se reflejó en una nota española equivalente. No hubo necesidad de alterar la decisión central de aprobación colectiva.
  spanish_consistency_notes:
  - Se prefirió «pueblo» en singular colectivo, coherente con el griego ὁ λαός y con el español bíblico natural.
  - Se evitó «Cristo», «SEÑOR» u այլ terminología no pertinente; el versículo es político-administrativo y no presenta decisiones teológicas específicas.
  - La puntuación y mayúsculas siguen el uso estándar del español bíblico contemporáneo.
