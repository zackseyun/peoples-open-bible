translation:
  language: es
  text: Contarás para ti siete semanas[a]; desde que comience a meterse la hoz al grano en pie, comenzarás a contar siete semanas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «siete sietes». Aquí el hebreo idiomático se refiere a siete semanas.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעָה שָׁבֻעֹת
  english_pob_choice: seven weeks
  chosen_spanish: siete semanas
  alternatives_spanish:
  - siete sietes
  lexicon: HALOT
  rationale: 'La construcción hebrea es idiomática en el contexto calendárico: la POB inglesa opta por ''seven weeks'' en lugar de traducir de modo mecánico ''seven sevens''. En español, ''siete semanas'' comunica con claridad el valor idiomático sin perder la estructura de conteo.'
- source_word: תִּסְפָּר לָךְ
  english_pob_choice: you shall count for yourself
  chosen_spanish: Contarás para ti
  alternatives_spanish:
  - Contarás
  - Deberás contar para ti
  lexicon: HALOT
  rationale: El imperfecto con valor de mandato se expresa naturalmente con futuro exhortativo en español. 'Para ti' conserva el matiz explícito del dativo לָךְ, aunque en español podría omitirse; aquí se mantiene por fidelidad auditada.
- source_word: מֵהָחֵל
  english_pob_choice: from the time ... begins
  chosen_spanish: desde que comience
  alternatives_spanish:
  - desde el momento en que comience
  - desde que empiece
  lexicon: HALOT
  rationale: La preposición con infinitivo marca el punto de inicio temporal. 'Desde que comience' transmite con naturalidad ese valor inicial, sin añadir contenido ajeno.
- source_word: חֶרְמֵשׁ
  english_pob_choice: the sickle
  chosen_spanish: la hoz
  alternatives_spanish:
  - la hoz de segar
  - el hocino
  lexicon: HALOT
  rationale: El término designa la herramienta de siega. 'Hoz' es el equivalente español normal y claro; 'la hoz' mantiene el sentido genérico sin necesidad de artículo indefinido.
- source_word: בַּקָּמָה
  english_pob_choice: to the standing grain
  chosen_spanish: en la mies
  alternatives_spanish:
  - en el trigo en pie
  - en el grano en pie
  lexicon: HALOT
  rationale: קָמָה alude a la cosecha aún en pie. 'Mies' es una forma natural y bíblica en español para el cereal listo para segar; evita la dureza de una glosa demasiado literal y preserva la imagen agrícola.
- source_word: תָּחֵל לִסְפֹּר
  english_pob_choice: you shall begin to count
  chosen_spanish: comenzarás a contar
  alternatives_spanish:
  - empezarás a contar
  - comenzarás a calcular
  lexicon: HALOT
  rationale: El Hiphil de חלל más infinitivo de ספר expresa inicio de una acción. 'Comenzarás a contar' reproduce bien ese valor aspectual y mantiene la coherencia con el primer mandato de contar.
- source_word: שִׁבְעָה שָׁבֻעוֹת
  english_pob_choice: seven weeks
  chosen_spanish: siete semanas
  alternatives_spanish:
  - siete sietes
  lexicon: HALOT
  rationale: La repetición final se traduce igual que la inicial para conservar la estructura retórica y calendárica del versículo.
translation_notes:
  revision_awareness: El inglés auditado traduce consistentemente שִׁבְעָה שָׁבֻעֹת como 'seven weeks' y preserva el valor idiomático en nota; el español sigue la misma decisión, manteniendo además el paralelo interno entre la primera y la última ocurrencia de la expresión.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de 'siete semanas' en ambas apariciones de שִׁבְעָה שָׁבֻעֹת.
  - Se conservó el dativo explícito 'para ti' para reflejar לָךְ.
  - Se eligió 'hoz' y 'mies' por su adecuación agrícola y su registro bíblico natural en español.
  - La nota al pie reproduce la observación auditada sobre el hebraísmo 'siete sietes' sin sobreexplicar el texto principal.
