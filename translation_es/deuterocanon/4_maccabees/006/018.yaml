revisions:
- from: Porque sería en verdad irracional que, después de haber vivido nuestra vida hasta la vejez en la verdad y haber preservado legítimamente la reputación basada en ella, cambiáramos ahora de rumbo.
  to: Porque sería en verdad irracional que, después de haber vivido nuestra vida hasta la vejez en la verdad y haber conservado conforme a la ley la reputación basada en ella, cambiáramos ahora de rumbo.
