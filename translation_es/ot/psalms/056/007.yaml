base_translation:
  language: en
  yaml_path: translation/ot/psalms/056/007.yaml
  text: They gather together[a]; they hide themselves; they watch my steps[d][c][b], as they wait for my life.
  footnotes:
  - marker: a
    text: Or 'they lurk' for 'they hide themselves'; the Hebrew verb can carry the sense of concealing oneself in ambush.
    reason: lexical_alternative
  - marker: b
    text: Literally 'my heels'; idiomatically, 'my steps' or 'my footsteps.'
    reason: lexical_alternative
  - marker: c
    text: Or 'they have hoped for my life' / 'they lie in wait for my life'; the Hebrew verb normally means 'wait' or 'hope,' here used in a hostile context.
    reason: lexical_alternative
  - marker: d
    text: Or 'as they have waited for my life'.
    reason: previous_rendering
