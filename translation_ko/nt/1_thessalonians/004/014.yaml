id: 1TH.4.14
reference: 1 Thessalonians 4:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: εἰ γὰρ πιστεύομεν ὅτι Ἰησοῦς ἀπέθανεν καὶ ἀνέστη, οὕτως καὶ ὁ θεὸς τοὺς κοιμηθέντας διὰ τοῦ Ἰησοῦ ἄξει σὺν αὐτῷ.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/004/014.yaml
  text: For if we believe that Jesus died and rose again[b][a], so also God will bring with him those who have fallen asleep through Jesus.
  footnotes:
  - marker: a
    text: Or 'those who have died'; Paul uses 'fallen asleep' as a metaphor for believers' death in this context.
    reason: lexical_alternative
  - marker: b
    text: Or 'those who have fallen asleep in Jesus.' The phrase 'through Jesus' (διὰ τοῦ Ἰησοῦ) may be understood in different ways, including agency ('through Jesus') or close association ('in Jesus').
    reason: alternative_reading
translation:
  language: ko
  text: 우리가 예수께서 죽으셨다가 다시 살아나신 것을 믿는다면, 하나님께서도 마찬가지로 예수를 통하여[b] 잠든 자들[a]을 그분과 함께 데려오실 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「이미 죽은 자들」. 바울은 「잠들었다」를 신자들의 죽음에 대한 비유로 사용한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「예수 안에서 잠든 자들」. 헬라어 διὰ τοῦ Ἰησοῦ는 행위자의 의미(예수를 통해)나 친밀한 연합(예수 안에서)으로 모두 이해될 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰησοῦς ἀπέθανεν καὶ ἀνέστη
  english_pob_choice: Jesus died and rose again
  chosen_korean: 예수께서 죽으셨다가 다시 살아나신 것
  alternatives_korean:
  - 예수께서 죽고 다시 일어나신 것
  - 예수께서 죽으셨다가 부활하신 것
  lexicon: BDAG
  rationale: 「죽으셨다가 다시 살아나심」이 한국 교회 전통의 표준 표현이며 경어 「~셨다가 ~신」을 통해 합쇼체를 유지한다.
- source_word: διὰ τοῦ Ἰησοῦ
  english_pob_choice: through Jesus
  chosen_korean: 예수를 통하여
  alternatives_korean:
  - 예수 안에서
  - 예수에 의하여
  lexicon: BDAG
  rationale: διά + 속격의 「통하여」를 본문에 보존하고, 「안에서」 해석은 각주로 둔다. 본 구절의 모호함은 의도적이므로 한 해석으로 좁히지 않는다.
- source_word: ἄξει σὺν αὐτῷ
  english_pob_choice: will bring with him
  chosen_korean: 그분과 함께 데려오실 것입니다
  alternatives_korean:
  - 그분과 함께 이끄실 것입니다
  - 그분과 더불어 인도해 오실 것입니다
  lexicon: BDAG
  rationale: ἄγω의 「데려오다·인도하다」 의미. 「데려오시다」가 종말론적 모임의 정황에 가장 자연스럽다.
theological_decisions:
- issue: διὰ τοῦ Ἰησοῦ의 해석
  chosen_reading: 「예수를 통하여」 (행위자 의미 우선, 「예수 안에서」 가능성 각주)
  alternative_readings:
  - 예수 안에서 잠든 자들 (밀접한 연합)
  - 예수의 능력으로 잠든 자들
  rationale: 헬라어 διά는 일차적으로 「통하여(행위자)」의 의미이나, 본 문맥에서 「예수 안에서(연합)」의 해석도 학계에 널리 받아들여진다. 본 번역은 본문 어휘 의미를 우선 보존하고 대안을 각주로 살린다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
