    rationale: No obstante, sigue siendo una representación fiel y natural de כִּי como conector explicativo; no requiere cambio.
  - severity: low
    issue: La explicación de la decisión léxica sobre נָשָׂאתִי afirma que «He soportado» conserva mejor la apertura del hebreo, mientras el texto principal elige «He soportado castigo»
    rationale: Es una leve tensión expositiva en la documentación, pero la nota al pie ya resuelve la ambigüedad y el texto principal sigue la racionalidad de la auditoría inglesa.
