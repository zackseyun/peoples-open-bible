  to: Son nuevas cada mañana[a]; grande es tu fidelidad.
  rationale: Se mantiene el sentido exacto del hebreo y de la decisión POB, pero se mejora la naturalidad del español al usar una formulación más idiomática con verbo inicial. También se corrige la nota al pie para que preserve la alternativa interpretativa en un español más claro y formalmente limpio.
