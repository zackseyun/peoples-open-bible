  glossary_alignment: No hay conflicto con los términos base del proyecto salvo en la decisión editorial sobre «Dios/dios». Dado el expediente inglés y la razón teológica documentada, conviene en español reflejar la tensión con minúscula en el texto principal («tu dios será mi dios») y dejar la mayúscula como alternativa en nota. El resto de la terminología es compatible con los lineamientos.
