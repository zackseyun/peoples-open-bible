translation:
  text: |-
    1. And on the next day it was reported to us that the king of the city of Gaas was coming against us with a great multitude.
    
    2. So Dan and I, pretending to be Amorites as though allies, entered their city.
    
    3. And in the deep night, when our brothers came, we opened the gates to them, and we destroyed all of them and all that was theirs; and after plundering everything that belonged to them, we tore down their three walls.
    
    4. And we drew near to Thamna, where all their baggage was.
    
    5. Then, being insulted by them, I became angry, and I rushed up against them to the summit. And they kept hurling stones and shooting arrows at me.
    
    6. And if Dan my brother had not fought alongside me,
