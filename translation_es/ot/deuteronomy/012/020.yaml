review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo en los puntos principales: «Yahvé», «tu territorio», «como te lo ha prometido», el lenguaje repetido de «alma», y el sentido permisivo final. Sin embargo, la nota al pie está anclada en «ensanche» y su contenido no corresponde a ese término; en realidad explica la frase final «conforme a todo el deseo de tu alma». Eso crea una distorsión del aparato de notas y debe corregirse.'
  spanish_quality_summary: El texto es claro, natural y digno en español eclesial. «Ensanche tu territorio», «Comeré carne», «tu alma desea» y «podrás comer carne» son lecturas comprensibles y fieles. El único problema de calidad es la nota errónea, que además introduce una frase absurda en español («te ensanche tu corazón»).
  glossary_alignment: Se mantiene correctamente «Yahvé» para יהוה, «carne» para בשר, y «alma» para נֶפֶשׁ, en línea con la terminología del proyecto. No hay conflicto doctrinal; la corrección necesaria es solo de ubicación y contenido de la nota lexical alternativa.
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en «ensanche» pero comenta la frase final del versículo.
    rationale: La nota dice que el hebreo literalmente lee «conforme a todo el deseo de tu alma», lo cual no explica יַרְחִיב («ensanche») sino בְּכָל אַוַּת נַפְשְׁךָ. Esto desinforma al lector sobre el texto fuente.
  - severity: high
    issue: 'El contenido actual de la nota incluye una alternativa española incorrecta: «te ensanche tu corazón».'
    rationale: Esa frase no corresponde a ninguna alternativa legítima del hebreo ni del inglés auditado. La alternativa idiomática documentada se refiere al deseo del alma/corazón, no al ensanchamiento del territorio.
  - severity: medium
    issue: Falta el anclaje de nota en la frase verdaderamente comentada.
    rationale: Si se conserva la nota lexical alternativa, el marcador debe ir junto a «conforme a todo el deseo de tu alma», no junto a «ensanche».
  revised_spanish_text: 'Cuando Yahvé tu Dios ensanche tu territorio, como te lo ha prometido, y digas: «Comeré carne», porque tu alma desea comer carne, podrás comer carne conforme a todo el deseo de tu alma[a].'
  revised_footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «a tu corazón le apetezca». El hebreo dice literalmente «conforme a todo el deseo de tu alma».'
    reason: lexical_alternative
  revision_rationale: 'Se conservó la traducción principal porque es fiel y natural. Solo se corrigió el aparato de nota: se movió el marcador a la frase final que realmente comenta y se reemplazó la alternativa defectuosa por una paráfrasis idiomática española que corresponde al sentido del inglés auditado («to your heart’s desire») sin alterar la literalidad señalada en la nota.'
