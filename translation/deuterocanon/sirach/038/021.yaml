translation:
  text: Do not keep remembering him[a], for there is no return; you will not help him, and you will harm yourself.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew literally, 'for he has no hope,' while the Greek parallel reads, 'for there is no return.'
    reason: alternative_reading
lexical_decisions:
- source_word: אל תזכרנו
  chosen: Do not keep remembering him
  alternatives:
  - Do not remember him
  - Do not call him to mind
  lexicon: HALOT
  rationale: The Hebrew זכר with negative imperative can mean 'do not remember/mention.' In context of mourning, the sense is not a total ban on memory but a prohibition against continued fixation. The Greek parallel μὴ ἐπιλάθῃ is textually awkward against the Hebrew but the rest of the Greek context supports the admonition against ongoing grief; thus 'keep remembering' captures the likely force in context.
- source_word: כי אין לו תקוה
  chosen: for there is no return
  alternatives:
  - for he has no hope
  - for there is no hope for him
  lexicon: HALOT
  rationale: 'The Hebrew תקוה normally means ''hope,'' yielding ''he has no hope.'' However, the Greek parallel explicitly reads οὐ γάρ ἐστιν ἐπάνοδος, ''for there is no return,'' which likely reflects the intended sense in this funerary context: the dead do not come back. To integrate the primary Hebrew with the Greek consistency check, the main text adopts ''there is no return,'' while preserving the more literal Hebrew-based alternative in a footnote.'
- source_word: מה תועיל
  chosen: you will not help him
  alternatives:
  - what will you benefit
  - what good will you do
  lexicon: HALOT
  rationale: 'The idiom asks what benefit can be given by continued mourning. English idiom is clearer with an explicit object supplied from context: ''you will not help him.'' This is also supported by the Greek τοῦτον οὐκ ὠφελήσεις, ''you will not benefit/help him.'''
- source_word: ולך תרע
  chosen: and you will harm yourself
  alternatives:
  - and it will go badly for you
  - and you will do yourself harm
  lexicon: HALOT
  rationale: The phrase indicates injury or detriment to the mourner. The Greek σεαυτὸν κακώσεις makes the reflexive sense explicit. 'You will harm yourself' is natural English and preserves the warning.
