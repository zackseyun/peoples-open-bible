translation:
  language: es
  text: Él hará con el becerro lo mismo que hizo con el becerro de la ofrenda por el pecado[a]; así hará con él. Y el sacerdote hará expiación por ellos, y serán perdonados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el becerro de la ofrenda de purificación». El término hebreo puede designar la ofrenda que trata el pecado al producir purificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  english_pob_choice: He shall do
  chosen_spanish: Harás
  alternatives_spanish:
  - Y hará
  - Deberá hacer
  lexicon: HALOT
  rationale: 'En este mandato ritual, el hebreo funciona como instrucción procedimental. El español natural y directo es un futuro exhortativo/mandativo en segunda persona implícita, pero para conservar la referencia al sujeto del contexto se formula como acción ordenada en estilo normativo: «Harás» en el marco ritual comunica la obligación sin añadir explicaciones.'
- source_word: לַפָּר
  english_pob_choice: with the bull
  chosen_spanish: con el becerro
  alternatives_spanish:
  - al becerro
  - para el becerro
  lexicon: HALOT
  rationale: El ל con עשה en este contexto expresa tratamiento ritual sobre el animal; en español, «con el becerro» reproduce la idiomaticidad ya establecida por la auditoría inglesa y suena natural. «Becerro» es preferible en español bíblico para el animal sacrificial.
- source_word: כַּאֲשֶׁר עָשָׂה
  english_pob_choice: just as he did
  chosen_spanish: lo mismo que hiciste
  alternatives_spanish:
  - así como hiciste
  - tal como lo hizo
  lexicon: HALOT
  rationale: La comparación del hebreo exige correspondencia exacta con el rito anterior. «Lo mismo que hiciste» conserva esa equivalencia sin calcar mecánicamente la sintaxis inglesa.
- source_word: לְפַר הַחַטָּאת
  english_pob_choice: with the bull of the sin offering
  chosen_spanish: con el becerro de la ofrenda por el pecado
  alternatives_spanish:
  - con el becerro del sacrificio por el pecado
  - con el becerro de la ofrenda de purificación
  lexicon: HALOT
  rationale: «הַחַטָּאת» admite la lectura tradicional «ofrenda por el pecado» y la alternativa lexical «ofrenda de purificación». Se mantiene la forma tradicional en el texto principal por claridad litúrgica y reconocimiento, sin perder la nota de la alternativa.
- source_word: הַחַטָּאת
  english_pob_choice: sin offering
  chosen_spanish: ofrenda por el pecado
  alternatives_spanish:
  - ofrenda de purificación
  - sacrificio por el pecado
  lexicon: HALOT
  rationale: La forma tradicional española expresa bien la dimensión expiatoria del rito. La alternativa «ofrenda de purificación» se conserva porque el término hebreo puede destacar también la purificación cultual que produce la ofrenda.
- source_word: כֵּן יַעֲשֶׂה לּוֹ
  english_pob_choice: so he shall do with it
  chosen_spanish: así lo hará con él
  alternatives_spanish:
  - de la misma manera lo hará
  - así hará con él
  lexicon: HALOT
  rationale: «כֵּן» marca correspondencia precisa. «Así lo hará con él» mantiene el paralelismo ritual y conserva el referente masculino del becerro sin sobreexplicar.
- source_word: וְכִפֶּר
  english_pob_choice: shall make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará expiación por ellos
  - hará propiciación
  lexicon: HALOT
  rationale: «כפר» en contexto levítico tiene fuerza cultual de expiación/purificación. «Hará expiación» es fiel y digna en español; evita sustituir el término técnico por una paráfrasis demasiado libre.
- source_word: עֲלֵהֶם
  english_pob_choice: for them
  chosen_spanish: por ellos
  alternatives_spanish:
  - a favor de ellos
  - sobre ellos
  lexicon: HALOT
  rationale: Con כפר, la preposición indica las personas en cuyo beneficio se efectúa la expiación. «Por ellos» es la formulación española más natural y mantiene el beneficio representativo.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el oficiante
  - el sacerdote oficiará
  lexicon: HALOT
  rationale: El título sacerdotal se traduce de manera directa y estable con «el sacerdote».
- source_word: וְנִסְלַח לָהֶם
  english_pob_choice: and they shall be forgiven
  chosen_spanish: y les será perdonado
  alternatives_spanish:
  - y serán perdonados
  - y se les perdonará
  lexicon: HALOT
  rationale: El nifal de סלח puede expresarse de forma pasiva o resultativa. Se conserva la construcción impersonal española «les será perdonado» para reflejar el resultado de la acción cultual sin forzar un sujeto explícito.
theological_decisions:
- issue: Valor de חטאת en legislación sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  rationale: La tradición española conoce bien «ofrenda por el pecado», que comunica con claridad la relación del rito con la culpa humana. No obstante, se preserva la alternativa porque el hebreo también puede destacar el efecto purificador de la ofrenda, no solo el pecado que la origina.
  doctrine_reference: Leviticus sacrificial terminology; Translation philosophy §3, §5
- issue: Naturaleza de la expiación en el versículo
  english_pob_reading: shall make atonement for them, and they shall be forgiven
  chosen_spanish_reading: hará expiación por ellos, y les será perdonado
  alternative_spanish_readings:
  - hará propiciación por ellos, y serán perdonados
  rationale: «Expiación» preserva el alcance ritual y teológico del hebreo כפר, que en Levítico abarca la purificación y la restauración relacional/cultual. La formulación evita reducir el acto a mera excusa jurídica y mantiene la tensión del texto.
  doctrine_reference: Levítico 4; atonement/purification doctrine
- issue: Referencia pronominal final
  english_pob_reading: they shall be forgiven
  chosen_spanish_reading: les será perdonado
  alternative_spanish_readings:
  - serán perdonados
  rationale: El hebreo usa un pasivo sin sujeto agente expreso. El español impersonal refleja mejor esa forma resultativa y evita introducir un agente no nombrado en el texto.
  doctrine_reference: Hebrew Niphal of סלח
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en «becerro» dentro del texto español. La redacción mantiene la equivalencia ritual del hebreo y la alternativa léxica documentada para חטאת.
  spanish_consistency_notes:
  - Se preserva el término técnico «expiación» para כפר, coherente con el registro levítico.
  - Se usa «sacerdote» para הכהן por consistencia con la tradición bíblica española y con el texto fuente.
  - La nota [a] está ahora anclada en el texto principal y no queda huérfana.
