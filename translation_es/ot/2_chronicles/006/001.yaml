translation:
  language: es
  text: 'Entonces Salomón dijo: «Yahvé ha dicho que habitaría en densas tinieblas[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la nube oscura». El término hebreo puede denotar una nube densa, penumbra o tinieblas espesas, especialmente en contextos de manifestación divina.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca temporal y narrativa; «Entonces» conserva la secuencia del relato de manera natural en español.
- source_word: אָמַר ... שְׁלֹמֹה
  english_pob_choice: Solomon said
  chosen_spanish: Salomón dijo
  alternatives_spanish:
  - Salomón declaró
  - Salomón habló
  lexicon: HALOT
  rationale: אָמַר en introducción narrativa de discurso se expresa con el verbo directo «dijo», sin carga interpretativa añadida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en su forma personal, no una sustitución titular; «Yahvé» es el equivalente español establecido por el proyecto.
- source_word: אָמַר
  english_pob_choice: has said
  chosen_spanish: ha dicho
  alternatives_spanish:
  - dijo
  - ha declarado
  lexicon: HALOT
  rationale: El perfecto hebreo y la revisión inglesa favorecen un perfecto en español; «ha dicho» refleja mejor la vigencia de la palabra pronunciada.
- source_word: לִשְׁכּוֹן
  english_pob_choice: would dwell
  chosen_spanish: habitaría
  alternatives_spanish:
  - dwell
  - moraría
  - residiría
  lexicon: HALOT
  rationale: El infinitivo con ל expresa el contenido de lo dicho por Yahvé; en español, el condicional de discurso indirecto comunica adecuadamente esa intención futura/volitiva. «Habitar» mantiene el matiz teológico de presencia.
- source_word: בָּעֲרָפֶל
  english_pob_choice: in the thick darkness
  chosen_spanish: en la densa oscuridad
  alternatives_spanish:
  - en la densa nube
  - en la oscuridad espesa
  - en la nube oscura
  lexicon: HALOT
  rationale: עֲרָפֶל puede indicar nube densa, neblina oscura o tiniebla espesa; «densa oscuridad» conserva la tensión teofánica de ocultamiento y cercanía sin resolverla hacia una imagen meteorológica única.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue la decisión doctrinal del proyecto de traducir el Tetragrámaton como nombre propio, preservando la revelación del nombre personal de Dios en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen de עֲרָפֶל como presencia divina velada
  english_pob_reading: The LORD has said that he would dwell in the thick darkness
  chosen_spanish_reading: Yahvé ha dicho que habitaría en la densa oscuridad
  alternative_spanish_readings:
  - Yahvé ha dicho que habitaría en la densa nube
  - Yahvé ha dicho que habitaría en la oscuridad espesa
  rationale: '«Densa oscuridad» preserva la ambigüedad reverente del texto: Dios se da a conocer y, al mismo tiempo, permanece velado. No se resuelve la imagen en favor de un solo matiz.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se incorporó la revisión inglesa que prefirió el perfecto «has said» sobre «said» y se evitó la nota inglesa porque en español la elección «densa oscuridad» ya integra la alternativa léxica sin requerir un marcador adicional.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente para יְהוָה.
  - «Habitaría» conserva el valor de permanencia divina y evita el calco rígido de «dwell».
  - La frase no introduce vocabulario eclesiástico ajeno al hebreo ni suaviza la oscuridad teofánica.
