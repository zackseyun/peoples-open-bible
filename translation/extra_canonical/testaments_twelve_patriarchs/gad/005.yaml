translation:
  text: '1[a]. Hatred, then, is evil, because it keeps company with falsehood continually, speaking against the truth; it makes small things great, presents light as darkness, and calls the sweet bitter. It teaches slander, stirs up wrath and war, and fills the heart with insolence and every greed, with evils and a devilish poison.


    2. Therefore I say these things to you from experience, my children, so that you may drive out the devilish hatred and cling to the love of God. 3. Righteousness casts out hatred, and humility removes jealousy[b]. For the righteous man, being humble, is ashamed to do what is unjust, not because he is condemned by another, but by his own heart, because the Lord watches over his soul. 4. He does not speak against a holy man, because the fear of God dwells in him. 5. For, fearing lest he offend the Lord, he does not wish at all, not even in thought, to wrong a man.


    6. These things I learned at last after I repented concerning Joseph. 7. For true repentance according to God [removes ignorance and] puts darkness to flight, enlightens the eyes, gives knowledge to the soul, and guides the purpose toward salvation. 8. And he did not learn this from men, but through repentance he knows how to receive those who turn back.


    9. For God brought upon me a disease of the liver, and if the prayers of my father had not helped me, my spirit would almost have failed. 10. For by the very things through which a man transgresses, through those he is punished. 11. Since, then, my liver lay pitilessly set against Joseph, I too, suffering in my liver[c], was judged pitilessly for ten years.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: 'a'
    text: The words 'removes ignorance and' are textually uncertain in the Greek witness and are therefore retained in brackets.
    reason: textual_variant
  - marker: 'b'
    text: Or 'envy' for 'jealousy' in v. 3; the Greek term can cover both hostile jealousy and envious rivalry.
    reason: lexical_alternative
  - marker: 'c'
    text: The phrase rendered 'for ten months' is literally 'for ten times/periods'; 'months' is a contextual judgment.
    reason: alternative_reading
lexical_decisions:
- source_word: μῖσος
  chosen: hatred
  alternatives:
  - hate
  lexicon: LSJ
  rationale: Abstract noun preserved as 'hatred' to match Gad's vice-theme and maintain consistency across the chapter.
- source_word: ἐνδελεχεῖ συνεχῶς
  chosen: keeps company ... continually
  alternatives:
  - persists constantly
  - is continually occupied
  lexicon: LSJ
  rationale: The phrase conveys ongoing close association; 'keeps company' preserves the vivid personification of hatred allied with falsehood.
- source_word: τῷ ψεύδει
  chosen: with falsehood
  alternatives:
  - with lying
  - with the lie
  lexicon: LSJ
  rationale: Abstract 'falsehood' fits the vice catalogue and avoids narrowing to a single spoken lie.
- source_word: τὰ μικρὰ μεγάλα ποιεῖ
  chosen: makes small things great
  alternatives:
  - magnifies trifles
  - makes little matters large
  lexicon: LSJ
  rationale: Retains the compact rhetorical contrast of the Greek.
- source_word: τὸ φῶς σκότος παρέχει
  chosen: presents light as darkness
  alternatives:
  - makes light darkness
  - offers light as darkness
  lexicon: LSJ
  rationale: Idiomatic English that preserves the moral inversion in the Greek.
- source_word: συκοφαντίαν
  chosen: slander
  alternatives:
  - false accusation
  - malicious accusation
  lexicon: LSJ
  rationale: Best concise rendering in an ethical exhortation context.
- source_word: ὀργὴν ἐκταράσσει
  chosen: stirs up wrath
  alternatives:
  - agitates anger
  - throws anger into turmoil
  lexicon: LSJ
  rationale: Captures the causative force and fits the escalating vice list.
- source_word: διεγείρει
  chosen: stirs up
  alternatives:
  - awakens
  - provokes
  lexicon: LSJ
  rationale: Used for war in a vivid, active sense; 'stirs up war' is natural and forceful.
- source_word: ὕβριν
  chosen: insolence
  alternatives:
  - outrage
  - arrogance
  lexicon: LSJ
  rationale: Preserves the moral-social sense of violent arrogance better than the broader 'arrogance'.
- source_word: πλεονεξίαν
  chosen: greed
  alternatives:
  - covetousness
  - grasping
  lexicon: LSJ
  rationale: Readable modern English while retaining the vice sense of acquisitive excess.
- source_word: ἰοῦ διαβολικοῦ
  chosen: a devilish poison
  alternatives:
  - the poison of the devil
  - diabolical venom
  lexicon: LSJ
  rationale: The genitive is adjectival in effect here; 'devilish poison' is vivid and readable.
- source_word: ἐξώσητε
  chosen: drive out
  alternatives:
  - cast out
  - expel
  lexicon: LSJ
  rationale: Strong imperative sense preserved without sounding overly technical.
- source_word: τὸ μῖσος τὸ διαβολικόν
  chosen: the devilish hatred
  alternatives:
  - the diabolical hatred
  - hatred from the devil
  lexicon: LSJ
  rationale: Keeps the attributive force and the moral personification of hatred.
- source_word: κολληθῆτε
  chosen: cling to
  alternatives:
  - join yourselves to
  - cleave to
  lexicon: LSJ
  rationale: Natural English that preserves the covenantal/ethical force of attachment.
- source_word: ἀγάπῃ
  chosen: love
  alternatives: []
  lexicon: LSJ
  rationale: Default project rendering; simple and theologically weighty.
- source_word: δικαιοσύνη
  chosen: righteousness
  alternatives:
  - justice
  lexicon: LSJ
  rationale: In this personal ethical context, 'righteousness' better matches the inward moral quality contrasted with hatred.
- source_word: ζῆλος
  chosen: jealousy
  alternatives:
  - envy
  - zeal
  lexicon: LSJ
  rationale: The vice context favors 'jealousy/envy'; 'jealousy' fits the interpersonal hostility in Gad's confession.
- source_word: αἰδεῖται
  chosen: is ashamed
  alternatives:
  - feels reverent restraint
  - shrinks from
  lexicon: LSJ
  rationale: Expresses moral shame that prevents unjust action.
- source_word: ἐπισκοπεῖ τὴν ψυχὴν αὐτοῦ
  chosen: watches over his soul
  alternatives:
  - looks upon his soul
  - examines his life
  lexicon: LSJ
  rationale: Allows both oversight and scrutiny without over-specifying judgment alone.
- source_word: καταλαλεῖ
  chosen: speak against
  alternatives:
  - slander
  - speak evil of
  lexicon: LSJ
  rationale: Broader than formal slander; preserves the prohibition against hostile speech.
- source_word: ἀνδρὸς ὁσίου
  chosen: a holy man
  alternatives:
  - a godly man
  - a devout man
  lexicon: LSJ
  rationale: '''Holy'' keeps the stronger ethical-religious coloring of ὅσιος.'
- source_word: προσκρούσαι
  chosen: offend
  alternatives:
  - stumble against
  - give offense to
  lexicon: LSJ
  rationale: Idiomatic in English for sinning against the Lord.
- source_word: ἕως ἐννοίας
  chosen: not even in thought
  alternatives:
  - up to intention
  - even to inward conception
  lexicon: LSJ
  rationale: Brings out the inward scope of the prohibition in clear English.
- source_word: μετανοῆσαί
  chosen: changed my mind
  alternatives:
  - repented
  lexicon: LSJ
  rationale: Per project guidance, cognitive-context μετανοέω is rendered 'change of mind'; here Gad refers specifically to his reversal concerning Joseph.
- source_word: μετάνοια
  chosen: repentance
  alternatives:
  - change of mind
  lexicon: LSJ
  rationale: Here the noun carries fuller moral-religious force in a confessional context, so 'repentance' is preferable.
- source_word: φυγαδεύει τὸ σκότος
  chosen: puts darkness to flight
  alternatives:
  - drives away darkness
  - banishes darkness
  lexicon: LSJ
  rationale: Preserves the vivid expulsive imagery.
- source_word: τὸ διαβούλιον
  chosen: the purpose
  alternatives:
  - the counsel
  - the resolve
  - the plan
  lexicon: LSJ
  rationale: Refers to inward deliberation or intention; 'purpose' is concise and natural.
- source_word: πρὸς σωτηρίαν
  chosen: toward salvation
  alternatives:
  - to salvation
  - toward deliverance
  lexicon: LSJ
  rationale: Retains the theological weight of σωτηρία without reducing it to mere rescue.
- source_word: τοὺς ἐπιστρέφοντας δέχεσθαι
  chosen: to receive those who turn back
  alternatives:
  - to welcome those who return
  - to accept the repentant
  lexicon: LSJ
  rationale: Keeps the verbal imagery of turning/returning while leaving the object open and personal.
- source_word: νόσον ἥπατος
  chosen: a disease of the liver
  alternatives:
  - an illness in my liver
  lexicon: LSJ
  rationale: Literal rendering is important because the chapter makes a moral connection between Gad's inward hostility and liver affliction.
- source_word: αἱ εὐχαὶ τοῦ πατρός μου
  chosen: the prayers of my father
  alternatives:
  - my father's prayers
  lexicon: LSJ
  rationale: Straightforward rendering of intercessory prayer.
- source_word: ἐξέλειπε τὸ πνεῦμα μου
  chosen: my spirit would almost have failed
  alternatives:
  - my breath nearly left me
  - I nearly died
  lexicon: LSJ
  rationale: Preserves the anthropological language of spirit without flattening it into paraphrase.
- source_word: παρανομεῖ
  chosen: transgresses
  alternatives:
  - acts lawlessly
  - sins
  lexicon: LSJ
  rationale: Maintains the sense of violating moral law, fitting the maxim of retributive justice.
- source_word: ἔκειτο ... κατὰ τοῦ Ἰωσήφ
  chosen: lay ... set against Joseph
  alternatives:
  - was disposed against Joseph
  - was fixed against Joseph
  lexicon: LSJ
  rationale: Keeps the bodily metaphor and hostile orientation.
- source_word: ἀνιλεως
  chosen: pitilessly
  alternatives:
  - mercilessly
  - without pity
  lexicon: LSJ
  rationale: Used twice for rhetorical correspondence; 'pitilessly' preserves the symmetry.
- source_word: ἐκρινόμην
  chosen: I was judged
  alternatives:
  - I was condemned
  - I was punished
  lexicon: LSJ
  rationale: Retains the judicial nuance while allowing the context to imply punitive judgment.
- source_word: χρόνους δέκα
  chosen: for ten months
  alternatives:
  - for ten periods
  - for ten times
  lexicon: LSJ
  rationale: In this context χρόνοι most plausibly refers to a span of months; this is the standard temporal sense in similar Hellenistic usage.
