translation:
  language: es
  text: 'Entonces Samuel tomó una piedra y la colocó entre Mizpa y Sen[a], y le puso por nombre Ebenezer, diciendo: «Hasta aquí Yahvé nos ha ayudado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Ebenezer significa «piedra de ayuda».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶבֶן אַחַת
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - una sola piedra
  - una piedra determinada
  lexicon: HALOT
  rationale: El hebreo presenta un sustantivo singular con numeración enfática/indefinida. En español, «una piedra» comunica de forma natural la singularidad del objeto memorial sin forzar un calco como «una sola piedra», que sonarían más marcado de lo necesario en este contexto narrativo.
- source_word: וַיָּשֶׂם
  english_pob_choice: set
  chosen_spanish: la puso
  alternatives_spanish:
  - la colocó
  - la estableció
  lexicon: HALOT
  rationale: El verbo hebreo indica poner/colocar. En español, «la puso» es directo y natural; «la colocó» es una alternativa válida, pero «la puso» mantiene la sencillez narrativa del pasaje.
- source_word: בֵּין הַמִּצְפָּה וּבֵין הַשֵּׁן
  english_pob_choice: between Mizpah and Shen
  chosen_spanish: entre Mizpa y Sen
  alternatives_spanish:
  - entre Mizpa y Shen
  - entre la Mizpa y la Sen
  lexicon: HALOT
  rationale: Se conservan los nombres propios en transliteración adaptada al español. Se omiten los artículos del hebreo por naturalidad en español, sin perder el valor toponímico.
- source_word: וַיִּקְרָא אֶת שְׁמָהּ
  english_pob_choice: he called its name
  chosen_spanish: llamó su nombre
  alternatives_spanish:
  - le puso por nombre
  - la nombró
  lexicon: HALOT
  rationale: La fórmula hebrea de nombramiento se conserva de manera relativamente transparente con «llamó su nombre», que refleja mejor la estructura original que «le puso por nombre», aunque esta última sería también idiomática.
- source_word: אֶבֶן הָעָזֶר
  english_pob_choice: Ebenezer
  chosen_spanish: Ebenezer
  alternatives_spanish:
  - Piedra de ayuda
  - Piedra del auxilio
  lexicon: HALOT
  rationale: Se mantiene el nombre propio memorial en el texto principal, conforme a la práctica de transliterar nombres. Su sentido léxico queda preservado en la nota, porque el narrador explota el juego entre el nombre y la afirmación de ayuda divina.
- source_word: עַד הֵנָּה
  english_pob_choice: Thus far
  chosen_spanish: Hasta aquí
  alternatives_spanish:
  - Hasta este momento
  - Así ha sido hasta ahora
  lexicon: HALOT
  rationale: «Hasta aquí» reproduce bien la referencia temporal del hebreo y suena natural en español bíblico contemporáneo; «Así ha sido hasta ahora» sería interpretativo y más largo de lo necesario.
- source_word: עֲזָרָנוּ
  english_pob_choice: has helped us
  chosen_spanish: nos ha ayudado
  alternatives_spanish:
  - nos ayudó
  - nos ha socorrido
  lexicon: HALOT
  rationale: El perfecto hebreo en contexto memorial expresa una acción pasada con vigencia presente. «Nos ha ayudado» conserva ese valor mejor que un simple pretérito en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el defecto del proyecto para el Tetragrámaton: «Yahvé». Así se evita el sustituto reverencial «SEÑOR» y se conserva el nombre propio del pacto de manera coherente con el español de la POB.'
theological_decisions:
- issue: Nombre divino יְהוָה en una declaración memorial de ayuda
  english_pob_reading: Yahweh has helped us
  chosen_spanish_reading: Yahvé nos ha ayudado
  alternative_spanish_readings:
  - Yahweh nos ha ayudado
  - el SEÑOR nos ha ayudado
  rationale: La frase se refiere explícitamente al nombre del pacto, no a un título genérico. Traducirlo como «Yahvé» preserva la identidad divina sin ocultarla tras una convención litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Mantener Ebenezer como nombre propio frente a traducir su significado
  english_pob_reading: Treat as the proper name 'Ebenezer' in the main text
  chosen_spanish_reading: Tratar Ebenezer como nombre propio en el texto principal
  alternative_spanish_readings:
  - Traducirlo como Piedra de ayuda
  - Piedra de ayuda como glosa en el texto
  rationale: El pasaje narra la imposición de un nombre a la piedra; por eso el nombre propio debe quedarse en el texto principal. La transparencia semántica se conserva mejor en nota que sustituyendo el nombre por una traducción.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Translate titles; transliterate names'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del POB inglés: usa una formulación narrativa más natural («una piedra», «diciendo») y conserva la decisión de transliterar los nombres propios y el nombre divino. También mantiene la tensión semántica del nombre Ebenezer mediante nota, en lugar de reemplazarlo en el texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, según la política del proyecto.
  - Se transliteran los topónimos y el nombre memorial, con adaptación ortográfica española mínima y sin artículos hebraizantes.
  - «Hasta aquí» y «nos ha ayudado» mantienen el tono memorial y la temporalidad perfecta del hebreo sin sobrerreformular.
  - La nota a explica el significado de Ebenezer sin interferir con el texto principal.
