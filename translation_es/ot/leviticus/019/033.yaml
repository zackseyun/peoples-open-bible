  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: cláusula legal situacional («Cuando»), residencia del גֵּר, referencia a «tierra», y prohibición de maltratar. Sin embargo, no preserva toda la documentación del audit trail inglés porque falta en español una nota léxica para la alternativa de לֹא תוֹנוּ («oprimir / tratar injustamente»), que el POB inglés sí conserva.'
  spanish_quality_summary: El español es natural, claro y digno. «Cuando un extranjero resida con ustedes en su tierra, no lo maltraten» se lee bien en registro bíblico moderno. La única mejora necesaria es añadir la nota léxica omitida; no hace falta cambiar la redacción principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Extranjero» para גֵּר es defendible y está bien explicado con nota cultural. «Tierra» conserva la resonancia bíblica de אֶרֶץ. «Maltraten» corresponde aceptablemente a תוֹנוּ, siempre que se preserven las alternativas semánticas en nota.
  issues:
