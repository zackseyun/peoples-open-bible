translation:
  language: es
  text: Y todo el valle de los cadáveres y de las cenizas, y todas las terrazas[a] hasta el valle del Cedrón[b], hasta la esquina de la Puerta de los Caballos, hacia el oriente, será santo para Yahvé. No será arrancado ni derribado[c] jamás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «campos» o «laderas» para el término hebreo difícil, tradicionalmente referido a las zonas aterrazadas alrededor de Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: «Valle del Cedrón» también puede traducirse «torrente del Cedrón», ya que el término hebreo puede referirse tanto a un valle como a un cauce estacional o uadi.
    reason: lexical_alternative
  - marker: c
    text: 'O: «no será desarraigado ni demolido nunca más».'
    reason: alternative_reading
lexical_decisions:
- source_word: הָעֵמֶק
  english_pob_choice: the valley
  chosen_spanish: el valle
  alternatives_spanish:
  - la hondonada
  - el llano
  lexicon: HALOT
  rationale: עֵמֶק designa un valle o zona baja; en español, «valle» es la equivalencia más natural y transparente para una descripción topográfica.
- source_word: הַפְּגָרִים
  english_pob_choice: the corpses
  chosen_spanish: los cadáveres
  alternatives_spanish:
  - los cuerpos muertos
  - los cuerpos
  lexicon: HALOT
  rationale: פֶּגֶר refiere a cuerpos muertos, cadáveres. «Cadáveres» conserva el tono directo y sombrío del pasaje.
- source_word: הַדֶּשֶׁן
  english_pob_choice: the ashes
  chosen_spanish: las cenizas
  alternatives_spanish:
  - las cenizas del sacrificio
  - los restos de ceniza
  lexicon: HALOT
  rationale: En este contexto topográfico y cultual, el término probablemente alude a cenizas o montones de ceniza asociados con el área. «Cenizas» es breve y fiel sin forzar una precisión que el hebreo aquí no aclara por completo.
- source_word: ה/שרמות
  english_pob_choice: the terraces
  chosen_spanish: las terrazas
  alternatives_spanish:
  - los campos
  - las laderas
  lexicon: HALOT
  rationale: La forma consonántica es difícil; la tradición de interpretación la entiende como parcelas/terrazas escalonadas en las laderas alrededor de Jerusalén. «Terrazas» preserva esa lectura topográfica sin imponer «campos».
- source_word: נַחַל קִדְרוֹן
  english_pob_choice: the Kidron Valley
  chosen_spanish: el valle del Cedrón
  alternatives_spanish:
  - el torrente del Cedrón
  - el uadi Cedrón
  lexicon: HALOT
  rationale: נַחַל puede ser torrente, uadi o valle. En español bíblico es claro y usual decir «valle del Cedrón» en una delimitación urbana, manteniendo la referencia geográfica reconocible.
- source_word: פִּנַּת שַׁעַר הַסּוּסִים
  english_pob_choice: the corner of the Horse Gate
  chosen_spanish: la esquina de la puerta de los Caballos
  alternatives_spanish:
  - la esquina de la Puerta de los Caballos
  - el ángulo de la puerta de los Caballos
  lexicon: HALOT
  rationale: פִּנָּה significa esquina o ángulo. Se conserva la estructura del hebreo y el nombre descriptivo de la puerta con un español claro y sobrio.
- source_word: מִזְרָחָה
  english_pob_choice: toward the east
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - hacia el este
  - al oriente
  lexicon: HALOT
  rationale: La forma adverbial indica dirección. «Hacia el oriente» es idiomático en registro bíblico y mantiene el valor direccional.
- source_word: קֹדֶשׁ לַיהוָה
  english_pob_choice: holy to Yahweh
  chosen_spanish: santo para Yahvé
  alternatives_spanish:
  - sagrado para Yahvé
  - consagrado a Yahvé
  lexicon: HALOT
  rationale: La fórmula expresa dedicación y pertenencia cultual. «Santo para Yahvé» preserva la fuerza de consagración y evita suavizarla a un mero adjetivo moral.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: DOCTRINE.md contested terms
  rationale: Se mantiene el nombre divino explícito, conforme al criterio del proyecto para יהוה. En español, «Yahvé» conserva la referencia al nombre del pacto sin sustituirlo por una máscara reverencial.
- source_word: לֹא יִנָּתֵשׁ
  english_pob_choice: shall not be uprooted
  chosen_spanish: no será arrancado
  alternatives_spanish:
  - no será desarraigado
  - no será extirpado
  lexicon: HALOT
  rationale: נתשׁ en niphal suele significar ser arrancado o desarraigado; en español, «arrancado» reproduce bien la imagen de remoción violenta del terreno o del lugar.
- source_word: וְלֹא יֵהָרֵס
  english_pob_choice: or overthrown
  chosen_spanish: ni derribado
  alternatives_spanish:
  - ni demolido
  - ni arruinado
  lexicon: HALOT
  rationale: הרס en niphal significa ser derribado o demolido. «Derribado» empareja naturalmente con «arrancado» y conserva la idea de destrucción física.
- source_word: עוֹד לְעוֹלָם
  english_pob_choice: again forever
  chosen_spanish: otra vez, para siempre
  alternatives_spanish:
  - jamás, para siempre
  - nunca más, para siempre
  lexicon: HALOT
  rationale: La combinación intensifica la negación de manera duradera. «Otra vez, para siempre» mantiene los dos adverbios del hebreo sin eliminar su doble énfasis temporal.
theological_decisions:
- issue: Alcance de la santificación del área descrita
  english_pob_reading: The entire described area becomes holy to Yahweh
  chosen_spanish_reading: Todo el espacio enumerado queda consagrado a Yahvé
  alternative_spanish_readings:
  - Solo la ciudad reconstruida es santa, mientras las zonas externas quedan simplemente dentro del límite
  - Solo la parte central del recinto es santa
  rationale: La sintaxis hebrea atribuye קֹדֶשׁ לַיהוָה a todo el tramo enumerado. La traducción conserva la amplitud sorprendente de la restauración y no reduce el alcance del texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Nombre divino en un contexto de promesa/restauración
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrama. Se preserva el nombre propio divino en la forma estándar del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del expediente inglés y conserva sus decisiones principales: valle/cenizas/terrazas, Cedrón, puerta de los Caballos, consagración a Yahvé y la doble negación final. Se optó por una formulación española más natural («será santo para Yahvé», «no será arrancado ni derribado otra vez, para siempre») sin perder el alcance del hebreo ni las alternativas lexicales documentadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה.
  - Se usa «Cedrón» como forma española usual del topónimo bíblico.
  - «Terrazas» se reserva para la interpretación tradicional del término oscuro.
  - La duplicación temporal final («otra vez, para siempre») conserva el énfasis del hebreo en lugar de fusionarlo en una sola expresión.
