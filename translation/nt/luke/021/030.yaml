id: LUK.21.30
reference: Luke 21:30
source:
  edition: SBLGNT
  text: ὅταν προβάλωσιν ἤδη, βλέποντες ἀφ’ ἑαυτῶν γινώσκετε ὅτι ἤδη ἐγγὺς τὸ θέρος ἐστίν·
translation:
  text: when they already put forth leaves[a], seeing for yourselves, you know that summer is already near.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more formally, 'when they already put forth [growth].' The Greek does not explicitly say 'leaves,' but the botanical context implies it.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  chosen: when
  alternatives:
  - whenever
  lexicon: BDAG
  rationale: Introduces a temporal clause with contingent force. 'When' is natural English here and fits the illustrative saying without overemphasizing repeated occurrence.
- source_word: προβάλωσιν
  chosen: have already put forth leaves
  alternatives:
  - sprout
  - put forth
  - shoot out
  lexicon: BDAG
  rationale: In the context of a fig tree and all the trees (v. 29), the verb refers to putting forth new growth. English idiom commonly supplies 'leaves,' which is implied by the botanical context though not explicit in the Greek. This best communicates the sense without sounding wooden.
- source_word: ἤδη
  chosen: already
  alternatives:
  - now already
  - by now
  lexicon: BDAG
  rationale: The adverb appears twice in the verse and marks the evident onset of the seasonal sign. 'Already' preserves the temporal nuance in both occurrences.
- source_word: βλέποντες
  chosen: by seeing
  alternatives:
  - seeing
  - when you see
  lexicon: BDAG
  rationale: 'The participle expresses attendant means/circumstance: by observing the trees, the hearers recognize the season. ''By seeing'' preserves the participial relationship and leads naturally into ''for yourselves.'''
- source_word: ἀφ’ ἑαυτῶν
  chosen: for yourselves
  alternatives:
  - from yourselves
  - of yourselves
  - by yourselves
  lexicon: BDAG
  rationale: This idiom means from one's own observation or on one's own initiative/judgment. 'For yourselves' communicates that they can discern it directly without external explanation.
- source_word: γινώσκετε
  chosen: you know
  alternatives:
  - you recognize
  - you understand
  lexicon: BDAG
  rationale: Present indicative describing ordinary recognition from observation. 'You know' is simple and idiomatic, matching the straightforward point of the comparison.
- source_word: ἐγγὺς
  chosen: near
  alternatives:
  - close
  - at hand
  lexicon: BDAG
  rationale: A basic spatial/temporal nearness term. 'Near' is the most natural rendering in this seasonal analogy.
- source_word: θέρος
  chosen: summer
  alternatives:
  - the summer season
  lexicon: BDAG
  rationale: Refers to the season of summer. The simple 'summer' is clear and idiomatic.
