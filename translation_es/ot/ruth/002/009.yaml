review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido general del hebreo: atención al campo, ir tras el grupo, protección por parte de Booz, y provisión de agua. Sin embargo, hay dos desajustes importantes. Primero, la nota [a] está anclada en ‘siegan’, pero el contenido de la nota corresponde a ‘que no te toquen’; eso incumple la disciplina de notas y rompe la trazabilidad con la decisión léxica documentada. Segundo, ‘ve detrás de ellos’ cambia el referente femenino plural אַחֲרֵיהֶן a masculino; aunque el español puede neutralizar el género, aquí ‘ellos’ entra en tensión con la distinción del verso entre las mujeres segadoras y los jóvenes varones.'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. ‘Mantén tus ojos en el campo’ suena algo calco, pero sigue siendo comprensible y aceptable. ‘Los cántaros’ funciona bien. El mayor problema de calidad es de coherencia referencial y de colocación de nota, no de fluidez global.
  glossary_alignment: No hay términos del glosario de proyecto especialmente conflictivos en este versículo. Las decisiones ‘campo’, ‘ordenado’, ‘cántaros’ y ‘que no te toquen’ son compatibles con la evidencia fuente y el razonamiento auditado. Conviene ajustar el pronombre a femenino plural (‘ellas’) para respetar la referencia de אַחֲרֵיהֶן a las trabajadoras, ya documentada en el expediente inglés.
  issues:
  - severity: high
    issue: La nota [a] está colocada sobre ‘siegan’, pero su contenido explica ‘que no te toquen’.
    rationale: Las instrucciones exigen que cada nota tenga su marcador exactamente en la palabra o frase pertinente del texto. Aquí la nota léxica sobre נגע debe anclarse en ‘toquen’ o la frase correspondiente, no en el verbo de segar.
  - severity: medium
    issue: ‘Ve detrás de ellos’ usa masculino donde el hebreo tiene femenino plural.
    rationale: אַחֲרֵיהֶן se refiere a las mujeres del grupo de cosecha. En español no siempre hace falta explicitar género, pero usar ‘ellos’ introduce un referente masculino incorrecto, especialmente porque más adelante ‘los jóvenes’ sí son varones distintos.
  - severity: low
    issue: ‘Mantén tus ojos en’ es algo calcado.
    rationale: Es entendible y fiel al hebreo, pero ‘fíjate en’ o ‘ten puestos los ojos en’ serían más idiomáticos. No es un error de fidelidad; puede mantenerse si se desea cercanía formal.
  revised_spanish_text: Mantén tus ojos en el campo donde siegan, y ve detrás de ellas. ¿No he ordenado a los jóvenes que no te toquen[a]? Cuando tengas sed, ve a los cántaros y bebe de lo que los jóvenes han sacado.
  revised_footnotes:
  - marker: a
    text: O, más contextualmente, ‘que no te pongan la mano encima’. El hebreo dice literalmente ‘que no te toquen’, lo cual puede incluir protección contra hostigamiento o agresión.
    reason: lexical_alternative
  revision_rationale: Se reubicó la nota [a] al segmento correcto (‘que no te toquen’) para cumplir la disciplina de anclaje de notas. También se cambió ‘ellos’ por ‘ellas’ para reflejar el femenino plural del hebreo y mantener la distinción entre las mujeres que van delante y los jóvenes varones mencionados después. No se requieren cambios adicionales sustanciales.
