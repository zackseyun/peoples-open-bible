translation:
  language: es
  text: Y cuando el rey Ezequías lo oyó, rasgó sus vestidos, se cubrió con saco[a] y entró en la casa de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Saco» aquí traduce la prenda de duelo del hebreo שָּׂק; no se refiere a un saco común, sino a una tela áspera usada en señal de lamento y humillación. Alternativamente, puede expresarse como «cilicio».
    reason: lexical_and_cultural_note
lexical_decisions:
- source_word: וַיְהִי כִּשְׁמֹעַ
  english_pob_choice: And when ... heard
  chosen_spanish: Y aconteció que, al oírlo
  alternatives_spanish:
  - Y cuando lo oyó
  - Y sucedió que, al oírlo
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce la secuencia de eventos. En español, «Y aconteció que, al oírlo» conserva el valor temporal e inusitivo de la construcción sin calcarla de forma rígida.
- source_word: הַמֶּלֶךְ חִזְקִיָּהוּ
  english_pob_choice: King Hezekiah
  chosen_spanish: el rey Ezequías
  alternatives_spanish:
  - el rey, Ezequías
  - Rey Ezequías
  lexicon: HALOT
  rationale: En español, el artículo y el título antes del nombre son naturales y fieles al hebreo. «El rey Ezequías» mantiene la función de título sin añadir ni omitir contenido.
- source_word: וַיִּקְרַע אֶת בְּגָדָיו
  english_pob_choice: he tore his clothes
  chosen_spanish: rasgó sus vestidos
  alternatives_spanish:
  - rasgó sus ropas
  - desgarró sus vestidos
  lexicon: HALOT
  rationale: «Rasgar» reproduce bien el gesto de duelo. «Vestidos» conserva un registro bíblico claro en español y corresponde al campo semántico de בְּגָדִים; «ropas» sería una alternativa más coloquial.
- source_word: וַיִּתְכַּס בַּשָּׂק
  english_pob_choice: covered himself with sackcloth
  chosen_spanish: se cubrió de saco
  alternatives_spanish:
  - se cubrió con saco
  - se vistió de saco
  - se cubrió de saco de penitencia
  lexicon: HALOT
  rationale: El hebreo expresa una acción reflexiva con la prenda de duelo. «Se cubrió de saco» mantiene la imagen y evita sustituir el término tradicional por perífrasis interpretativas. Se prefiere «saco» aquí como término breve y comprensible; el matiz de material de luto queda reforzado por la nota.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - la casa de Yahvé Dios
  - el templo de Yahvé
  lexicon: HALOT
  rationale: El hebreo usa la expresión idiomática «casa de Yahvé». En español, «casa de Yahvé» preserva la formulación del texto y la elección POB del nombre divino, en lugar de reemplazarla automáticamente por «templo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino con la forma española «Yahvé», de acuerdo con el criterio del proyecto y en continuidad con la decisión inglesa de no sustituir el Tetragrámaton por un título.
- source_word: בַּשָּׂק
  english_pob_choice: sackcloth
  chosen_spanish: saco
  alternatives_spanish:
  - cilicio
  - tela áspera
  lexicon: HALOT
  rationale: El inglés POB conserva «sackcloth» como término técnico de duelo. En español, «saco» funciona como equivalente breve y reconocible, aunque menos técnico; por eso conviene aclararlo con nota para no borrar el trasfondo de humillación ritual.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La lectura del hebreo exige preservar el nombre del pacto. «Yahvé» traslada al español la decisión del texto base inglés de usar el nombre propio divino y no una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Mourning action and garment imagery
  english_pob_reading: he tore his clothes, covered himself with sackcloth
  chosen_spanish_reading: rasgó sus vestidos, se cubrió de saco
  alternative_spanish_readings:
  - rasgó sus ropas, se cubrió con saco
  - desgarró sus vestidos, se vistió de saco
  rationale: El gesto de duelo se conserva sin intensificarlo ni atenuarlo. «Saco» mantiene la referencia al atuendo de humillación; la nota explica el valor cultural de esta prenda para que no se lea como un saco común.
  doctrine_reference: Lexical convention for mourning signs in the Hebrew narrative
- issue: House of Yahweh as temple idiom
  english_pob_reading: went into the house of Yahweh
  chosen_spanish_reading: entró en la casa de Yahvé
  alternative_spanish_readings:
  - entró en el templo de Yahvé
  - fue a la casa de Yahvé
  rationale: Se preserva la metáfora espacial del hebreo. «Casa de Yahvé» mantiene el vínculo con la formulación original y no sustituye prematuramente la expresión por la interpretación «templo».
  doctrine_reference: Narrative temple idiom in the Hebrew source
translation_notes:
  revision_awareness: 'El texto inglés auditado muestra alta concordancia y no registra notas textuales ni revisiones aplicadas. La redacción española se construyó directamente desde el hebreo con apoyo del rastro inglés para confirmar decisiones ya estables: la fórmula narrativa, el título real, el gesto de duelo, la prenda de saco y el nombre divino.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se usa «el rey Ezequías» para conservar la naturalidad del orden español sin perder el artículo del hebreo.
  - «Casa de Yahvé» se conserva como calco idiomático controlado, no como «templo», para respetar el vocabulario narrativo del original.
  - «Saco» se usa en el texto principal y se aclara en nota para evitar confusión con un objeto común.
  - La puntuación y el uso de comas siguen el flujo narrativo del español bíblico moderno.
