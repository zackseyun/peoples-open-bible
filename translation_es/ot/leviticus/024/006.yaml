translation:
  language: es
  text: Y las pondrás en dos filas[a], seis en cada fila, sobre la mesa pura[b] delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en dos arreglos» o «en dos montones». El término hebreo se refiere a una disposición ordenada de los panes.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «la mesa pura»; «la mesa limpia» es otra posible traducción, con sentido ritual más que de mera limpieza física.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתָּ
  english_pob_choice: And you shall place
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - Y colocarás
  - Y pondrás allí
  lexicon: HALOT
  rationale: שׂוּם expresa poner/colocar/disponer. «Pondrás» conserva el mandato directo en segunda persona singular y funciona de manera natural en español bíblico contemporáneo.
- source_word: אוֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los mismos
  - los
  lexicon: HALOT
  rationale: El pronombre retoma los doce panes del verso anterior. En español es más natural omitir el pronombre explícito y usar el objeto directo átono «los» dentro del verbo compuesto implícito de la instrucción.
- source_word: שְׁתַּיִם מַעֲרָכ֖וֹת
  english_pob_choice: in two rows
  chosen_spanish: en dos filas
  alternatives_spanish:
  - en dos arreglos
  - en dos montones
  lexicon: HALOT
  rationale: מַעֲרָכָה puede referirse a un ordenamiento dispuesto. «Filas» es la opción más clara y natural en español para una disposición ordenada sobre una mesa, sin perder el sentido de arreglo ritual.
- source_word: שֵׁשׁ הַמַּעֲרָכֶת
  english_pob_choice: six in each row
  chosen_spanish: seis en cada fila
  alternatives_spanish:
  - seis por fila
  - seis en la fila
  lexicon: HALOT
  rationale: La expresión hebrea es distributiva. En español debe explicitarse «en cada fila» para reflejar que cada disposición contiene seis panes.
- source_word: הַטָּהֹר
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - limpia
  - ritualmente pura
  lexicon: HALOT
  rationale: En contexto cultual, טָהוֹר apunta a pureza ritual más que a mera limpieza física. «Pura» mantiene ese registro y concuerda con «la mesa».
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: La preposición indica ubicación cultual «ante/delante de». Se conserva «Yahvé» como el nombre divino, de acuerdo con la terminología del proyecto.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. La política española del proyecto pide «Yahvé» para preservar el nombre pactual, en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido cultual de הַטָּהֹר
  english_pob_reading: pure table
  chosen_spanish_reading: la mesa pura
  alternative_spanish_readings:
  - la mesa limpia
  - la mesa ritualmente pura
  rationale: El contexto es la disposición ceremonial de los panes de la Presencia. «Pura» evita reducir el término a limpieza material y mantiene la tensión ritual del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y coincide con la decisión inglesa de entender מַעֲרָכָה como una disposición ordenada. La única adaptación mayor es el uso de «Yahvé» en español conforme a la norma terminológica del proyecto, en lugar del inglés auditado «Yahweh».
  spanish_consistency_notes:
  - Se mantiene el registro cultual y sobrio, sin añadir explicaciones interpretativas al cuerpo del verso.
  - «Pura» conserva la ambigüedad ritual de טָהוֹר sin volverla meramente higiénica.
  - La estructura de dos miembros paralelos en español refleja la sintaxis breve del hebreo y la claridad de la versión inglesa auditada.
