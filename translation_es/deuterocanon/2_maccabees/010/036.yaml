translation:
  language: es
  text: Pero si hay asuntos que deben ser presentados al rey[a], envíen a alguien de inmediato para investigar estos asuntos, para que podamos actuar como corresponde; porque nosotros vamos camino de Antioquía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si algo ha sido juzgado como para ser presentado al rey». El griego está comprimido, y la traducción se ha alisado para expresar el sentido probable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἃ
  english_pob_choice: matters
  chosen_spanish: asuntos
  alternatives_spanish:
  - cosas
  - materias
  lexicon: LSJ
  rationale: El neutro plural relativo aquí funciona de manera indefinida y se refiere a temas o cuestiones pendientes, no a objetos concretos. «Asuntos» conserva ese valor amplio en español y suena natural en un contexto administrativo.
- source_word: ἔκρινεν
  english_pob_choice: there are ... should be
  chosen_spanish: deben ser presentados
  alternatives_spanish:
  - han sido juzgados como para ser presentados
  - se ha decidido presentarlos
  - conviene presentarlos
  lexicon: LSJ
  rationale: 'La construcción griega es comprimida e impersonal. En español conviene explicitar la idea de obligación o procedencia sin perder el matiz de decisión implícita: algo ha sido considerado digno de ser llevado ante el rey.'
- source_word: προσανενεχθῆναι τῷ Βασιλεῖ
  english_pob_choice: be brought before the king
  chosen_spanish: ser presentados al rey
  alternatives_spanish:
  - ser llevados ante el rey
  - ser informados al rey
  - ser expuestos al rey
  lexicon: LSJ
  rationale: «Presentados al rey» conserva el tono formal del infinitivo pasivo y evita especificar si se trata de informe oral o escrito. «Al rey» traduce el dativo personal de destino/autoridad.
- source_word: πέμψατέ τινα παραχρῆμα
  english_pob_choice: send someone at once
  chosen_spanish: envíen a alguien de inmediato
  alternatives_spanish:
  - manden a alguien enseguida
  - despachen a alguien de inmediato
  - envíen a una persona en seguida
  lexicon: LSJ
  rationale: El imperativo plural con τινα indefinido pide una acción pronta. «De inmediato» reproduce bien la fuerza de παραχρῆμα en español contemporáneo y mantiene el registro exhortativo.
- source_word: ἐπισκεψόμενον περὶ τούτων
  english_pob_choice: to look into these things
  chosen_spanish: para examinar estas cosas
  alternatives_spanish:
  - para investigar estos asuntos
  - para revisar estas cosas
  - para enterarse de estas cosas
  lexicon: LSJ
  rationale: El participio futuro medio sugiere a alguien que irá a inspeccionar o averiguar. «Examinar» recoge ese valor con un tono algo más formal que «investigar», apropiado para la escena. «Estas cosas» preserva el deíctico del griego.
- source_word: ἵνʼ ἔχωμεν
  english_pob_choice: so that we may act
  chosen_spanish: para que tengamos cómo obrar
  alternatives_spanish:
  - para que podamos actuar
  - para que sepamos cómo proceder
  - a fin de que tengamos qué hacer
  lexicon: LSJ
  rationale: El griego literalmente depende de una elipsis; no significa simplemente «tener», sino contar con la base para actuar. «Tengamos cómo obrar» conserva esa estructura y evita introducir una paráfrasis demasiado interpretativa.
- source_word: ὡς καθήκει ἡμῖν
  english_pob_choice: as is fitting for us
  chosen_spanish: conforme a lo que conviene
  alternatives_spanish:
  - como nos corresponde
  - según lo que es debido para nosotros
  - como es propio de nosotros
  lexicon: LSJ
  rationale: La expresión apunta a lo adecuado, debido o conveniente. En español «conforme a lo que conviene» mantiene el valor normativo sin sonar arcaico, y deja abierta la relación con deber/procedencia.
- source_word: προσάγομεν πρὸς Ἀντιοχίαν
  english_pob_choice: we are going on to Antioch
  chosen_spanish: vamos camino de Antioquía
  alternatives_spanish:
  - nos dirigimos a Antioquía
  - vamos a Antioquía
  - proseguimos hacia Antioquía
  lexicon: LSJ
  rationale: El presente indica desplazamiento en curso o inminente. «Vamos camino de Antioquía» comunica bien ese movimiento y evita sobredeterminar el matiz exacto del verbo griego.
translation_notes:
  revision_awareness: El texto griego presenta una construcción comprimida y algo abrupta; el inglés POB ya la suaviza para expresar el sentido probable. Esta versión española sigue esa lectura, pero conserva la tensión entre el juicio previo sobre los asuntos y la necesidad de presentarlos al rey, sin convertirlo en una paráfrasis libre.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «asuntos» para ἃ por su amplitud semántica y su naturalidad administrativa en español.
  - «Ser presentados al rey» conserva la formalidad del pasivo y evita decidir entre informe oral o escrito.
  - «Vamos camino de Antioquía» refleja el desplazamiento presente sin forzar una equivalencia demasiado literal.
