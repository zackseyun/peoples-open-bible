translation:
  language: es
  text: Y por orden mía se emitió un decreto para traer ante mí a todos los sabios de Babilonia[a], para que me dieran a conocer la interpretación del sueño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el significado del sueño».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִנִּי
  english_pob_choice: And by me
  chosen_spanish: Y por mí
  alternatives_spanish:
  - Y de mí
  - Y por mi parte
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona expresa origen o procedencia de la orden. En español, 'por mí' comunica bien que el decreto procedió del rey, manteniendo el matiz administrativo sin sonar forzado.
- source_word: שִׂים טְעֵם
  english_pob_choice: was issued / a decree
  chosen_spanish: se emitió un decreto
  alternatives_spanish:
  - se promulgó un decreto
  - fue expedido un decreto
  - se dio un decreto
  lexicon: HALOT
  rationale: La combinación verbal-nominal en arameo imperial designa la formulación oficial de una orden real. 'Se emitió un decreto' conserva el valor institucional y evita una traducción demasiado literal como 'se puso un decreto'.
- source_word: לְהַנְעָלָה
  english_pob_choice: to bring
  chosen_spanish: para traer
  alternatives_spanish:
  - para hacer venir
  - para llevar ante mí
  lexicon: HALOT
  rationale: El causativo de עלל/עלה expresa hacer comparecer. 'Traer' funciona en español con valor de hacer venir, y el complemento 'delante de mí' completa la idea judicial/cortesana.
- source_word: קָדָמַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - en mi presencia
  - ante mí
  lexicon: HALOT
  rationale: '''Delante de mí'' conserva la imagen espacial de ''frente/presencia'' y suena natural en español bíblico contemporáneo. ''Ante mí'' también sería posible, pero aquí ''delante de mí'' enlaza mejor con el verbo de traer.'
- source_word: לְכֹל חַכִּימֵי בָבֶל
  english_pob_choice: all the wise men of Babylon
  chosen_spanish: a todos los sabios de Babilonia
  alternatives_spanish:
  - a todos los hombres sabios de Babilonia
  - a todos los sabios babilonios
  lexicon: HALOT
  rationale: '''Sabios'' comunica el grupo técnico de consejeros de corte en Daniel. ''De Babilonia'' refleja el genitivo de pertenencia y evita añadir una paráfrasis como ''sages''.'
- source_word: דִּי
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: La partícula introduce una cláusula de propósito. En español, 'para que' expresa con claridad la finalidad del decreto.
- source_word: פְשַׁר חֶלְמָא
  english_pob_choice: the interpretation of the dream
  chosen_spanish: la interpretación del sueño
  alternatives_spanish:
  - el significado del sueño
  - la explicación del sueño
  lexicon: HALOT
  rationale: '''Interpretación'' preserva el sentido técnico recurrente en Daniel para פשר. ''Del sueño'' es fiel al sustantivo en estado enfático sin añadir posesivo no explícito.'
- source_word: יְהוֹדְעֻנַּנִי
  english_pob_choice: they might make known to me
  chosen_spanish: me dieran a conocer
  alternatives_spanish:
  - me hicieran saber
  - me informaran
  lexicon: HALOT
  rationale: El causativo de ידע requiere una expresión que conserve el valor de 'hacer saber'. 'Me dieran a conocer' suena natural y mantiene la mediación de unos sujetos que transmiten la información.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el arameo de Daniel 4:3 y el criterio POB de equivalencia óptima: conserva el marco administrativo del decreto, la finalidad explícita y el término técnico ''interpretación'', sin depender mecánicamente del inglés.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o 'Yahvé' porque este versículo no contiene el nombre divino; el foco está en la orden real de Nabucodonosor.
  - '''Sabios'' se mantiene como término técnico de la corte en Daniel, coherente con el uso POB de esta categoría.'
  - La nota al pie preserva la alternativa semántica documentada para פשר sin borrar la preferencia por 'interpretación'.
