translation:
  language: es
  text: Y reunió todo el alimento de los siete años que hubo en la tierra de Egipto, y puso el alimento en las ciudades. En cada ciudad puso el alimento de los campos que estaban alrededor de ella[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «el alimento del campo de la ciudad que estaba alrededor de ella lo puso dentro de ella». El hebreo repite «alimento» y usa una construcción resumptiva para dar énfasis.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְבֹּץ
  english_pob_choice: he gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - recogió
  lexicon: HALOT
  rationale: קבץ expresa reunir o juntar en un solo lugar. «Reunió» es natural en español y conserva la idea de agrupar reservas sin añadir interpretaciones.
- source_word: כָּל אֹכֶל
  english_pob_choice: all the food
  chosen_spanish: todo el alimento
  alternatives_spanish:
  - todo el comida
  - toda la provisión
  - todo el grano
  lexicon: HALOT
  rationale: אֹכֶל significa literalmente «alimento/comida». «Alimento» mantiene la amplitud semántica mejor que «grano», que sería demasiado específico para el hebreo.
- source_word: שֶׁבַע שָׁנִים
  english_pob_choice: the seven years
  chosen_spanish: los siete años
  alternatives_spanish:
  - siete años
  lexicon: HALOT
  rationale: La referencia apunta a los siete años ya mencionados. En español, el artículo definido es natural y conserva la referencia anafórica.
- source_word: אֲשֶׁר הָיוּ בְּאֶרֶץ מִצְרַיִם
  english_pob_choice: that were in the land of Egypt
  chosen_spanish: que hubo en la tierra de Egipto
  alternatives_spanish:
  - que estaban en la tierra de Egipto
  - que fueron en la tierra de Egipto
  lexicon: HALOT
  rationale: Con «años» como sujeto, el hebreo usa literalmente «que fueron/eran en». «Hubo» en español conserva la referencia temporal y suena más natural que un calco demasiado literal.
- source_word: וַיִּתֶּן אֹכֶל בֶּעָרִים
  english_pob_choice: he put the food in the cities
  chosen_spanish: y puso el alimento en las ciudades
  alternatives_spanish:
  - y colocó el alimento en las ciudades
  - y almacenó el alimento en las ciudades
  lexicon: HALOT
  rationale: נתן aquí es «poner/colocar». «Puso» mantiene la literalidad básica sin cargar el verbo con la interpretación de «almacenó», que aunque contextual, no es el verbo hebreo.
- source_word: אֹכֶל שְׂדֵה הָעִיר אֲשֶׁר סְבִיבֹתֶיהָ
  english_pob_choice: the food from the fields around it
  chosen_spanish: el alimento de los campos que estaban alrededor de ella
  alternatives_spanish:
  - el alimento del campo de la ciudad que estaba alrededor de ella
  - el alimento de las tierras de cultivo alrededor de ella
  lexicon: HALOT
  rationale: La cadena constructa puede leerse como «alimento del campo de la ciudad». En español, «de los campos que estaban alrededor de ella» comunica la relación espacial con claridad y sin forzar una construcción demasiado pesada.
- source_word: בְּתוֹכָהּ
  english_pob_choice: within it
  chosen_spanish: en ella
  alternatives_spanish:
  - dentro de ella
  - en su interior
  lexicon: HALOT
  rationale: 'El hebreo remata con una estructura resumptiva enfática: el alimento fue puesto «dentro de ella», es decir, dentro de la ciudad. «En ella» mantiene la relación pronominal y evita una redundancia innecesaria en español.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y refleja el ajuste de la auditoría inglesa desde una formulación más dinámica a otra más literal en «que hubo en la tierra de Egipto». Se conserva también la repetición de «alimento» y la estructura resumptiva, resumida en español con una nota alternativa formal.
  spanish_consistency_notes:
  - Se prefirió «alimento» para mantener la amplitud del hebreo אֹכֶל y evitar limitarse a «grano».
  - «Yahvé» no aparece en este versículo; no hay decisiones sobre el nombre divino.
  - La nota[a] está anclada al primer sintagma de la cadena resumptiva para preservar la alternativa formal documentada.
