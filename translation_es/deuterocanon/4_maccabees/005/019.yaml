translation:
  language: es
  text: Así que no supongas que esto es un pecado pequeño[a], si llegáramos a comer comida impura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «si comiéramos lo que es impuro». El verbo griego condensa la idea de comer algo hecho impuro o profanado.'
