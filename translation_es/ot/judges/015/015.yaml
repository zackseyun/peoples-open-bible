translation:
  language: es
  text: Y halló una quijada fresca[a] de asno, extendió su mano, la tomó y con ella abatió a mil hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una quijada nueva de asno». El adjetivo hebreo puede significar algo fresco o recién disponible.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמְצָא
  english_pob_choice: he found
  chosen_spanish: halló
  alternatives_spanish:
  - encontró
  - halló por casualidad
  lexicon: HALOT
  rationale: מצא expresa aquí el hallazgo de un objeto en la secuencia narrativa. «Halló» conserva el valor simple de encontrar sin añadir matiz interpretativo; «encontró» sería igualmente posible, pero «halló» suena sobrio y bíblico en español sin volverse arcaico.
- source_word: לְחִי חֲמוֹר
  english_pob_choice: jawbone of a donkey
  chosen_spanish: quijada de asno
  alternatives_spanish:
  - mandíbula de asno
  - quijada de burro
  lexicon: HALOT
  rationale: לְחִי designa la zona de la mandíbula/quijada; en este contexto es un hueso usado como arma. «Quijada» comunica con naturalidad el objeto óseo concreto y mantiene la fuerza narrativa. «Asno» sigue mejor el registro bíblico que «burro».
- source_word: טְרִיָּה
  english_pob_choice: fresh
  chosen_spanish: fresca
  alternatives_spanish:
  - nueva
  - todavía fresca
  lexicon: HALOT
  rationale: El adjetivo apunta a que no estaba seca ni quebradiza, posiblemente recién disponible. «Fresca» preserva esa idea material sin forzar «nueva» como si describiera sólo novedad cronológica.
- source_word: וַיִּשְׁלַח יָדוֹ
  english_pob_choice: he reached out his hand
  chosen_spanish: extendió su mano
  alternatives_spanish:
  - alargó su mano
  - tendió su mano
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo corporal muy común. «Extendió su mano» conserva la imagen física y resulta natural en español; «reached out his hand» en inglés se traduce mejor por un verbo de extensión que por una construcción más perifrástica.
- source_word: וַיִּקָּחֶהָ
  english_pob_choice: took it
  chosen_spanish: la tomó
  alternatives_spanish:
  - la agarró
  - la tomó en sus manos
  lexicon: HALOT
  rationale: El sufijo femenino remite a la quijada; en español el objeto se trata como femenino, de ahí «la». «Tomó» es la equivalencia narrativa más directa y sobria; «agarró» bajaría el registro.
- source_word: וַיַּךְ בָּהּ
  english_pob_choice: with it he struck down
  chosen_spanish: con ella mató
  alternatives_spanish:
  - con ella hirió de muerte
  - con ella derribó
  lexicon: HALOT
  rationale: נכה puede abarcar golpear o herir de muerte; el contexto deja claro el resultado letal. En español, «mató» expresa el efecto explícito del acto sin perder la referencia instrumental «con ella». Se evita «struck down» literal porque suena menos natural en español y podría sonar menos concluyente.
- source_word: אֶלֶף אִישׁ
  english_pob_choice: a thousand men
  chosen_spanish: mil hombres
  alternatives_spanish:
  - mil varones
  - mil personas
  lexicon: HALOT
  rationale: אִישׁ es masculino singular en distribución numérica y el contexto es de combate. «Mil hombres» reproduce bien el valor colectivo masculino y es la forma española más natural.
translation_notes:
  revision_awareness: La versión inglesa POB fue revisada y quedó sin cambios, con acuerdo alto entre revisores; por eso la redacción española sigue de cerca las decisiones léxicas ya auditadas, especialmente el sentido de טְרִיָּה como 'fresh' y la lectura instrumental de בָּהּ.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico sobrio, pero con sintaxis española natural.
  - No se introduce 'Cristo', 'SEÑOR' ni otras sustituciones ajenas al hebreo de este versículo.
  - La elección de 'quijada' y 'asno' conserva el tono narrativo tradicional sin perder precisión léxica.
  - El femenino de 'la' en 'la tomó' sigue la referencia a 'quijada' en español.
  - La traducción de נכה se resuelve por el resultado contextual ('mató') para evitar ambigüedad en una escena de combate.
