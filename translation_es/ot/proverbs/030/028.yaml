translation:
  language: es
  text: Una lagartija[a] la puedes atrapar con las manos; sin embargo, está en los palacios de los reyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «araña». El hebreo שְׂמָמִית es raro e incierto; la tradición ha oscilado entre una araña y un pequeño reptil trepador como lagartija o gecko.
    reason: alternative_reading
lexical_decisions:
- source_word: שְׂמָמִית
  english_pob_choice: lizard
  chosen_spanish: lagartija
  alternatives_spanish:
  - araña
  - gecko
  - lagarto
  lexicon: HALOT
  rationale: El hebreo es raro y su identificación exacta es incierta. En español, «lagartija» comunica mejor la imagen de un pequeño reptil trepador que puede hallarse en palacios, y evita una precisión excesiva como «gecko». También mantiene abierta la tensión textual documentada frente a la tradición «araña».
- source_word: בְּיָדַיִם
  english_pob_choice: with your hands
  chosen_spanish: con las manos
  alternatives_spanish:
  - por las manos
  - a mano
  lexicon: HALOT
  rationale: La preposición con «manos» expresa medio o instrumento. «Con las manos» es natural en español y conserva la concreción de la imagen.
- source_word: תְּתַפֵּשׂ
  english_pob_choice: you can catch
  chosen_spanish: la puedes atrapar
  alternatives_spanish:
  - la puedes coger
  - la puedes agarrar
  - puedes atraparla
  lexicon: HALOT
  rationale: El verbo significa atrapar o asir. La forma verbal invita a una segunda persona genérica; en español, «la puedes atrapar» mantiene la vivacidad proverbial y el matiz de posibilidad sin volverla rígida.
- source_word: וְהִיא
  english_pob_choice: yet it is
  chosen_spanish: sin embargo, está
  alternatives_spanish:
  - y está
  - pero está
  lexicon: HALOT
  rationale: La conjunción introduce contraste entre la pequeñez aparente del animal y su presencia en la corte. «Sin embargo» reproduce bien esa oposición en español.
- source_word: בְּהֵיכְלֵי מֶלֶךְ
  english_pob_choice: in kings’ palaces
  chosen_spanish: en los palacios de los reyes
  alternatives_spanish:
  - en palacios reales
  - en los palacios de un rey
  lexicon: HALOT
  rationale: El plural constructo se vierte de modo idiomático como plural genérico en español. «En los palacios de los reyes» conserva el sentido gnómico y la amplitud del hebreo.
translation_notes:
  revision_awareness: 'El texto base inglés no requirió cambios de revisión. La versión española sigue la misma decisión principal: un término general para un pequeño reptil trepador, manteniendo la nota de alternativa tradicional («araña») por la incertidumbre léxica del hebreo.'
  spanish_consistency_notes:
  - Se evitó «señor» o cualquier giro que sugiera un único rey, porque el hebreo usa plural genérico «palacios de reyes».
  - Se preservó la tensión léxica documentada en una nota al pie, en vez de resolverla de manera dogmática.
