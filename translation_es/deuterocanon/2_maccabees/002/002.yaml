translation:
  language: es
  text: Habiendo sido salvados por Dios de grandes peligros[a], le damos muchas gracias, como si estuviéramos puestos en formación de batalla contra un rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como si estuviéramos desplegados para la batalla contra un rey»; la comparación final en griego es condensada y puede traducirse con un matiz militar ligeramente distinto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ μεγάλων κινδύνων
  english_pob_choice: from great dangers
  chosen_spanish: de grandes peligros
  alternatives_spanish:
  - de grandes peligros
  - fuera de grandes peligros
  - a causa de grandes peligros
  lexicon: LSJ
  rationale: κινδύνων denota peligros o riesgos graves; en español, «peligros» es natural y conserva el plural intensificado por μεγάλων. La preposición ἐκ queda bien expresada con «de» en una salida de salvamento.
- source_word: ὑπὸ τοῦ θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - por Dios
  - por el Dios
  lexicon: LSJ
  rationale: ὑπό con genitivo marca agente; en español la pasiva se expresa naturalmente con «por Dios». No se necesita artículo aquí.
- source_word: σεσωσμένοι
  english_pob_choice: having been saved
  chosen_spanish: habiendo sido salvados
  alternatives_spanish:
  - habiendo sido librados
  - siendo salvados
  lexicon: LSJ
  rationale: El participio perfecto pasivo comunica una acción completada con efecto presente. «Habiendo sido salvados» preserva esa anterioridad mejor que un simple finito.
- source_word: μεγάλως εὐχαριστοῦμεν
  english_pob_choice: we give him great thanks
  chosen_spanish: le damos muchas gracias
  alternatives_spanish:
  - le damos grandes gracias
  - le agradecemos mucho
  - estamos muy agradecidos con él
  lexicon: LSJ
  rationale: El verbo εὐχαριστοῦμεν admite en español «dar gracias»; el adverbio μεγάλως se vierte con una intensificación idiomática natural, «muchas», sin perder el énfasis.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - le
  lexicon: LSJ
  rationale: El dativo se expresa de forma natural con el clítico «le» en español, manteniendo el objeto indirecto de la acción de agradecer.
- source_word: ὡς ἂν
  english_pob_choice: as if
  chosen_spanish: como si
  alternatives_spanish:
  - como aquellos que
  - como si fuera
  lexicon: LSJ
  rationale: La partícula introduce comparación y no una afirmación directa; «como si» refleja bien la modalidad comparativa y preserva la cautela del griego.
- source_word: πρὸς βασιλέα
  english_pob_choice: against a king
  chosen_spanish: contra un rey
  alternatives_spanish:
  - frente a un rey
  - ante un rey
  - contra el rey
  lexicon: LSJ
  rationale: Con lenguaje militar, πρός con παρατασσόμενοι tiene fuerza adversativa; «contra un rey» conserva la imagen de oposición sin suavizarla.
- source_word: παρατασσόμενοι
  english_pob_choice: arrayed
  chosen_spanish: ordenados en batalla
  alternatives_spanish:
  - alineados para la batalla
  - puestos en formación de combate
  - arrayados
  lexicon: LSJ
  rationale: El participio medio/pasivo evoca tropas desplegadas en formación. «Ordenados en batalla» es claro en español y mantiene el matiz militar sin volverlo demasiado técnico.
theological_decisions:
- issue: La comparación militar final
  english_pob_reading: The clause is rendered as a simile of people arrayed against a king, preserving the Greek martial imagery without softening it.
  chosen_spanish_reading: 'La cláusula se entiende como una comparación: «como si estuviéramos ordenados en batalla contra un rey», conservando la imagen militar del griego.'
  alternative_spanish_readings:
  - como si estuviéramos preparados para pelear contra un rey
  - como quienes están formados contra un rey
  - como si estuviéramos desplegados para la batalla contra un rey
  rationale: El griego es comprimido y la relación exacta de ὡς ἂν con el participio admite matices. La traducción principal retiene la comparación y la imaginería bélica sin resolver en exceso la sintaxis.
  doctrine_reference: Preservar la tensión y la imagen del original; primacía del texto fuente sobre la tradición de traducción.
translation_notes:
  revision_awareness: El texto inglés auditado revisó la última cláusula de «as those arrayed against a king» a «as if arrayed against a king» para reflejar mejor ὡς ἂν. La versión española sigue esa revisión con «como si», y mantiene la comparación militar sin atenuarla ni expandirla indebidamente.
  spanish_consistency_notes:
  - Se usa «Dios» según la convención POB para θεός, sin sustitución por fórmulas eclesiásticas de mayúsculas mascaradas.
  - «Peligros» preserva el plural intensificado de κινδύνων y evita reducirlo a un riesgo singular.
  - «Muchas gracias» reproduce la intensidad de μεγάλως sin sonar mecánico.
  - La cláusula final conserva la comparación y la imaginería bélica; no se reinterpreta como un simple agradecimiento litúrgico.
