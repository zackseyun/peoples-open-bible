translation:
  language: es
  text: Pero solo tú fuiste digno de conocer este secreto del Altísimo.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: Tu autem
  english_pob_choice: But you alone
  chosen_spanish: Pero tú solo
  alternatives_spanish:
  - Pero solo tú
  - Mas tú solamente
  lexicon: Latin tu autem
  rationale: El contraste enfático de 'autem' se vierte naturalmente con 'Pero', y 'solus' se expresa con 'solo' junto a 'tú' para conservar el énfasis exclusivo sin añadir contenido no presente.
- source_word: solus dignus fuisti
  english_pob_choice: you alone were worthy
  chosen_spanish: tú solo fuiste digno
  alternatives_spanish:
  - tú solo has sido digno
  - tú solo eras digno
  lexicon: Latin solus / dignus fuisti
  rationale: '''dignus fuisti'' corresponde de forma directa a ''fuiste digno''; no se incorpora ''hallado'' ni otra noción externa. Mantengo la cualidad de dignidad en pasado simple, que en español es natural y fiel.'
- source_word: altissimi secretum hoc
  english_pob_choice: this secret of the Most High
  chosen_spanish: este secreto del Altísimo
  alternatives_spanish:
  - este secreto del Dios Altísimo
  - este misterio del Altísimo
  lexicon: Latin altissimus / secretum
  rationale: '''secretum'' se traduce mejor como ''secreto'' por su valor de cosa revelada reservadamente; ''misterio'' es posible, pero ''secreto'' sigue más de cerca el término latino y la elección inglesa auditada. ''Altissimi'' se vierte como ''del Altísimo'' para respetar el genitivo y la referencia reverente a Dios.'
theological_decisions:
- issue: Referencia divina de 'Altissimus'
  english_pob_reading: the Most High
  chosen_spanish_reading: el Altísimo
  alternative_spanish_readings:
  - el Dios Altísimo
  - el Supremo
  rationale: En este contexto 'Altissimus' funciona como título divino. 'el Altísimo' es la forma española estándar y mantiene la identificación teológica sin oscurecer el nombre/título.
  doctrine_reference: Título divino en literatura bíblica y deuterocanónica; cf. uso reverente de 'Altísimo' para Dios.
translation_notes:
  revision_awareness: La revisión auditada en inglés eliminó 'found' porque el latín no contiene un equivalente explícito; por eso el español evita cualquier añadido del tipo 'hallado' y sigue la lectura directa de 'dignus fuisti' como 'fuiste digno'.
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' para the Most High, en coherencia con el tratamiento reverente de títulos divinos.
  - No se usa 'Cristo' ni terminología cristológica porque el versículo no la contiene.
  - La puntuación reproduce una sola proposición declarativa breve, acorde con el latín.
