review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura oracional y casi todas las decisiones léxicas del griego: ἐπισυνάγαγε = «Reúne», ἐλευθέρωσον = «libera», τοὺς δουλεύοντας = «a los esclavizados», ἐν τοῖς ἔθνεσιν = «entre las naciones», ἔφιδε = «mira», y γνώτωσαν... ὅτι σὺ ὁ θεὸς ἡμῶν = «y que las naciones sepan que tú eres nuestro Dios». El punto débil es τὴν διασπορὰν ἡμῶν: aunque literalmente es «nuestra dispersión», en español «Reúne nuestra dispersión» suena demasiado abstracto y opaco; el inglés POB documenta explícitamente que el referente es el pueblo disperso.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Reúne nuestra dispersión» resulta poco natural y puede confundir al lector, porque parece reunir una condición abstracta en vez de personas. «Mira a los despreciados y aborrecidos» es comprensible; «libera a los esclavizados entre las naciones» es fiel y legible. Conviene ajustar solo la primera frase para mejorar claridad sin perder el anclaje al griego, manteniendo nota lexical.
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: θεὸς = «Dios»; δουλεύοντας conserva fuerza de esclavitud con «esclavizados»; ἔθνη = «naciones». No hay conflicto con los defaults mayores. La única excepción práctica es que la decisión española para διασπορά debería seguir la rationale auditada y hacer explícita la comunidad dispersa en el texto principal, no solo en nota, porque el español literal queda demasiado poco idiomático.'
  issues:
  - severity: medium
    issue: «Reúne nuestra dispersión» es demasiado literal y poco idiomático en español.
    rationale: Aunque refleja la forma griega, en español moderno eclesial suena abstracto y ambiguo. El contexto pide reunir a la comunidad dispersa; la traducción inglesa auditada ya explicita ese referente. «Reúne a nuestro pueblo disperso[a]» preserva mejor el sentido sin sobreparafrasear.
  revised_spanish_text: Reúne a nuestro pueblo disperso[a], libera a los esclavizados entre las naciones, mira a los despreciados y aborrecidos; y que las naciones sepan que tú eres nuestro Dios.
  revised_footnotes:
  - marker: a
    text: Literalmente, «nuestra dispersión». La traducción hace explícito que la oración se refiere a la comunidad dispersa.
    reason: lexical_alternative
  revision_rationale: 'Se revisa únicamente τὴν διασπορὰν ἡμῶν para evitar un calco poco natural en español y seguir la rationale documentada del POB: el sustantivo se entiende aquí como la comunidad esparcida. El resto del versículo ya es fiel, claro y terminológicamente correcto.'
