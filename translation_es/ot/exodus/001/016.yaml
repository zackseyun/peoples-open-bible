revisions:
- from: 'Y dijo[a]: «Cuando asistan en el parto a las mujeres hebreas y las vean sobre el banco de parto, si es un hijo, lo harán morir; pero si es una hija, vivirá».'
  to: 'Y dijo[a]: «Cuando ayuden a las mujeres hebreas a dar a luz y las vean sobre el asiento de parto, si es un hijo, deberán darle muerte; pero si es una hija, vivirá».'
  rationale: La revisión hace el español más natural y preciso sin apartarse del hebreo ni de la auditoría inglesa. «Ayuden ... a dar a luz» refleja mejor בְּיַלֶּדְכֶן, «asiento de parto» mantiene el sentido idiomático de הָאָבְנָיִם con la alternativa literal en nota, y «deberán darle muerte» comunica mejor la fuerza mandatoria de וַהֲמִתֶּן אֹתוֹ en español digno y claro.
