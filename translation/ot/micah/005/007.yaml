theological_decisions:
- issue: Metaphor of the remnant as a lion among nations
  chosen_reading: Retain the image as a statement of the remnant's overpowering strength and invincibility among the nations without specifying whether this is military, political, or eschatological in a narrower doctrinal sense.
  alternative_readings:
  - Interpret as specifically military conquest
  - Interpret as purely symbolic of influence or dominance
  rationale: The Hebrew presents a simile of predatory dominance but does not narrowly define the mode of fulfillment. Preserving the metaphor avoids importing a denominational or eschatological system beyond the text.
  doctrine_reference: Preserve theological tension rather than resolve it.
