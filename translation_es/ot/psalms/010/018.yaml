    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «hombre de la tierra»; es decir, un ser humano meramente terrenal y mortal.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el último sintagma para alinearlo mejor con la revisión inglesa auditada («man from the earth») mediante «el hombre desde la tierra», y se simplifica la cláusula final a «ya no vuelva a aterrorizar» para un español más natural. También se rehace la nota c para conservar la alternativa significativa «hombre de la tierra» y su matiz de mortalidad.
