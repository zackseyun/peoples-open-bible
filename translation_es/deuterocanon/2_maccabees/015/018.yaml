translation:
  language: es
  text: Pues la preocupación por las esposas y los hijos[a], y además por los hermanos y parientes, tenía menos peso para ellos; pero el temor por el templo consagrado era el más grande y el primero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «era de menor importancia para ellos». El giro griego literalmente dice que este asunto «yacía en una parte menor» para ellos, es decir, tenía menor prioridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ περὶ γυναικῶν καὶ τέκνων
  english_pob_choice: the concern about wives and children
  chosen_spanish: el interés por las esposas y los hijos
  alternatives_spanish:
  - la preocupación por las esposas y los hijos
  - el asunto acerca de las esposas y los hijos
  lexicon: LSJ
  rationale: El artículo con περὶ + genitivo funciona como sintagma sustantivado. «Interés por» comunica la idea de preocupación prioritaria con naturalidad en español; «esposas y los hijos» conserva el sentido familiar del griego sin forzar una abstracción.
- source_word: ἔτι δὲ ἀδελφῶν καὶ συγγενῶν
  english_pob_choice: and further about brothers and relatives
  chosen_spanish: y además por los hermanos y parientes
  alternatives_spanish:
  - y también por los hermanos y parientes
  - y aún más por los hermanos y parientes
  lexicon: LSJ
  rationale: ἔτι δέ añade otra categoría de preocupación. «Además» reproduce bien ese añadido. «Parientes» es un equivalente claro para συγγενῶν; «hermanos» mantiene el grupo familiar inmediato.
- source_word: ἐν ἥττονι μέρει κείμενος αὐτοῖς
  english_pob_choice: weighed less with them
  chosen_spanish: ocupaba en ellos un lugar menor
  alternatives_spanish:
  - tenía menos peso para ellos
  - quedaba en una parte menor para ellos
  lexicon: LSJ
  rationale: La imagen idiomática de «yacer en una parte menor» expresa prioridad inferior. «Ocupaba en ellos un lugar menor» conserva la comparación sin sonar calcado y mantiene la jerarquía de importancia.
- source_word: μέγιστος δὲ καὶ πρῶτος
  english_pob_choice: the greatest and first
  chosen_spanish: lo más grande y primero
  alternatives_spanish:
  - lo mayor y primero
  - lo supremo y primero
  lexicon: LSJ
  rationale: La duplicación superlativa y ordinal enfatiza primacía absoluta. «Lo más grande y primero» preserva la fuerza de la secuencia con español natural.
- source_word: ὁ περὶ τοῦ καθηγιασμένου ναοῦ φόβος
  english_pob_choice: fear was for the consecrated temple
  chosen_spanish: el temor por el templo consagrado
  alternatives_spanish:
  - la preocupación por el templo consagrado
  - el miedo por el templo consagrado
  lexicon: LSJ
  rationale: φόβος puede abarcar temor, miedo o preocupación ansiosa. «Temor» mantiene esa amplitud en español mejor que una reducción a «miedo»; «consagrado» traduce καθηγιασμένου con precisión cultual y evita un término más interpretativo que el griego no exige.
theological_decisions:
- issue: Valor de φόβος en un contexto de prioridad afectiva y militar-religiosa
  english_pob_reading: fear was for the consecrated temple
  chosen_spanish_reading: el temor por el templo consagrado
  alternative_spanish_readings:
  - la preocupación por el templo consagrado
  - el miedo por el templo consagrado
  rationale: El griego puede implicar temor, ansiedad o preocupación. «Temor» conserva la tensión semántica sin resolverla demasiado hacia una sola emoción, y deja que el contexto determine si se trata de miedo concreto o de preocupación angustiosa.
  doctrine_reference: Preservar la tensión léxica del original y su matiz contextual, evitando una simplificación devocional.
- issue: Calidad cultual de καθηγιασμένου ναοῦ
  english_pob_reading: the consecrated temple
  chosen_spanish_reading: el templo consagrado
  alternative_spanish_readings:
  - el templo santo
  - el templo santificado
  rationale: «Consagrado» refleja el participio perfecto y el estado resultante del templo dedicado al culto. «Santo» es más idiomático pero menos explícito respecto del verbo griego; «santificado» es posible, aunque en español puede sonar más técnico o menos natural.
  doctrine_reference: Primacía del original sobre la tradición de traducción; mantener el sentido cultual sin borrar el matiz verbal.
translation_notes:
  revision_awareness: Se tomó como base la concordancia alta entre el griego de Swete y el audit trail inglés. La principal decisión fue conservar la jerarquía de prioridades del original con una sintaxis española fluida, sin reemplazar el cierre por un lenguaje eclesiástico más tradicional que el griego no exige.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usó «templo consagrado» para reflejar el participio καθηγιασμένου y no neutralizar el matiz cultual.
  - «Temor» se eligió como término amplio para φόβος, coherente con el audit trail inglés.
  - No se introdujo terminología confesional adicional; el texto conserva un registro bíblico sobrio y neutro.
