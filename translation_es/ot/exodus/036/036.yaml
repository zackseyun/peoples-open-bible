translation:
  language: es
  text: Hizo para ella cuatro pilares de madera de acacia y los recubrió de oro; sus ganchos eran de oro[a]; y fundió para ellos cuatro bases de plata[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El pronombre «ella» se refiere al velo mencionado en el versículo anterior.
    reason: cross_reference
  - marker: b
    text: O «cuatro zócalos de plata».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדֵי
  english_pob_choice: pillars
  chosen_spanish: pilares
  alternatives_spanish:
  - postes
  - columnas
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, el término designa soportes verticales estructurales. «Pilares» conserva esa función y resulta natural en español bíblico sin perder precisión técnica.
- source_word: שִׁטִּים
  english_pob_choice: acacia wood
  chosen_spanish: madera de acacia
  alternatives_spanish:
  - acacia
  - madera de shittim
  lexicon: HALOT
  rationale: El hebreo se refiere a la madera de acacia usada en el tabernáculo. «Madera de acacia» es claro en español y evita la transliteración opaca.
- source_word: וַיְצַפֵּם
  english_pob_choice: overlaid them
  chosen_spanish: los recubrió de
  alternatives_spanish:
  - los cubrió con
  - los revistió de
  - los plateó
  lexicon: HALOT
  rationale: El verbo describe la aplicación de una capa metálica sobre los pilares. «Recubrió de» reproduce bien la acción material sin sonar forzado; el oro se expresa como material de recubrimiento.
- source_word: וָוֵיהֶם
  english_pob_choice: their hooks
  chosen_spanish: sus ganchos
  alternatives_spanish:
  - sus broches
  - sus clavijas
  - sus remates
  lexicon: HALOT
  rationale: En las descripciones del tabernáculo, este sustantivo suele referirse a piezas de sujeción o conexión. «Ganchos» es la opción más directa y comprensible en español para mantener el valor funcional del término.
- source_word: אַדְנֵי
  english_pob_choice: bases
  chosen_spanish: bases
  alternatives_spanish:
  - zócalos
  - encajes
  - soportes
  lexicon: HALOT
  rationale: El término alude a los bloques o piezas de apoyo sobre los que se asentaban los pilares. «Bases» es claro y compatible con el vocabulario técnico del pasaje.
- source_word: כָסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - plata
  - plata fina
  lexicon: HALOT
  rationale: En español, «plata» comunica de manera natural el material de las bases. Se mantiene el valor del metal sin añadir matices no presentes en el hebreo.
- source_word: לָהּ
  english_pob_choice: for it
  chosen_spanish: para ella
  alternatives_spanish:
  - para ello
  - para ésta
  lexicon: HALOT
  rationale: El pronombre femenino singular remite al objeto femenino inmediato del contexto, la cortina/velo mencionado antes. «Para ella» conserva la referencia anafórica sin explicitarla en el cuerpo del versículo.
- source_word: וַיִּצֹק
  english_pob_choice: he cast
  chosen_spanish: fundió
  alternatives_spanish:
  - vertió
  - coló
  - fundió en metal
  lexicon: HALOT
  rationale: En este contexto de fabricación de piezas metálicas, el verbo expresa la manufactura por fundición. «Fundió» es idiomático en español y comunica la acción técnica sin sobreexplicar.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; por ello, este borrador mantiene la estructura y las decisiones léxicas principales coherentes con el audit trail en inglés, ajustando solo la formulación española para naturalidad y precisión técnica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar cuando corresponda; este versículo no contiene el tetragrámaton.
  - Se usa «plata» para el material, manteniendo la concreción del metal sin añadir explicaciones.
  - Se conserva la referencia anafórica femenina en la nota para no desambiguar en el texto principal.
  - El verbo «fundió» refleja el trabajo metalúrgico implícito en el contexto del tabernáculo.
