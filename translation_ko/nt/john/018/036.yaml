  yaml_path: translation/nt/john/018/036.yaml
  text: Jesus answered[a], “My kingdom is not from this world. If my kingdom were from this world, my servants would be fighting so that I might not be handed over to the Jews. But as it is, my kingdom is not from here.”
  footnotes:
  - marker: a
    text: Or “to the Judeans,” possibly referring more specifically here to the Judean authorities.
    reason: alternative_reading
translation:
  language: ko
  text: 예수께서 대답하셨습니다. 「내 왕국은 이 세상에 속한 것이 아닙니다. 만일 내 왕국이 이 세상에 속한 것이었다면, 내 부하들이 내가 유대인들에게 넘겨지지 않도록 싸웠을 것입니다. 그러나 이제 내 왕국은 이곳에서 난 것이 아닙니다.」
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「유대 당국에게」. 본 문맥에서는 유대 당국을 가리킬 가능성이 높다.
    reason: lexical_alternative
