translation:
  language: es
  text: Porque ha despreciado[a] la palabra de Yahvé y ha quebrantado su mandamiento, esa persona[b] ciertamente será cortada[c]; su culpa[d] quedará sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha tratado con desprecio la palabra de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: Lit. «esa alma»; en lenguaje legal hebreo, se refiere a la persona responsable.
    reason: lexical_alternative
  - marker: c
    text: «Ciertamente será cortada» preserva el modismo hebreo; la forma exacta del juicio no se especifica aquí.
    reason: cultural_note
  - marker: d
    text: O «su iniquidad quedará sobre él».
    reason: lexical_alternative
lexical_decisions:
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh / the LORD
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mandato de Yahvé
  - el dicho de Yahvé
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra' o 'asunto'; aquí, por el paralelo con 'su mandamiento', la referencia más natural es la palabra/expresión revelada de Yahvé. Se mantiene el nombre divino según la norma española del proyecto.
- source_word: בָּזָה
  english_pob_choice: has despised
  chosen_spanish: ha despreciado
  alternatives_spanish:
  - ha tratado con desprecio
  - ha menospreciado
  lexicon: HALOT
  rationale: El verbo expresa desdén activo, no solo descuido. 'Ha despreciado' comunica bien la carga de desprecio y corresponde al valor semántico del hebreo.
- source_word: מִצְוָתוֹ
  english_pob_choice: his commandment
  chosen_spanish: su mandamiento
  alternatives_spanish:
  - su orden
  - su mandato
  lexicon: HALOT
  rationale: El singular hebreo se conserva. 'Mandamiento' mantiene el peso jurídico y pactal de la expresión mejor que 'orden'.
- source_word: הֵפַר
  english_pob_choice: has broken
  chosen_spanish: ha quebrantado
  alternatives_spanish:
  - ha violado
  - ha anulado
  lexicon: HALOT
  rationale: '''Quebrantar'' es un equivalente idiomático fuerte en español para infringir o romper una norma. Conserva el tono legal sin sonar demasiado técnico.'
- source_word: הִכָּרֵת תִּכָּרֵת
  english_pob_choice: shall surely be cut off
  chosen_spanish: ciertamente será cortada
  alternatives_spanish:
  - será seguramente cortada
  - será totalmente cortada
  lexicon: HALOT
  rationale: Se preserva el idiomático 'ser cortado' en voz pasiva, como en el hebreo, sin especificar el mecanismo del juicio. 'Ciertamente' refleja la intensificación del infinitivo absoluto con el verbo finito. Se usa femenino porque el antecedente inmediato es נֶפֶשׁ, 'persona/alma', tratado aquí en español con valor individual.
- source_word: הַנֶּפֶשׁ הַהִוא
  english_pob_choice: that person
  chosen_spanish: esa persona
  alternatives_spanish:
  - esa alma
  - esa vida
  lexicon: HALOT
  rationale: En contextos legales, נֶפֶשׁ se refiere al individuo concreto. 'Persona' evita malentendidos antropológicos y comunica con naturalidad el referente judicial.
- source_word: עֲוֺנָהּ בָהּ
  english_pob_choice: his guilt shall be on him
  chosen_spanish: su culpa quedará sobre él
  alternatives_spanish:
  - su iniquidad quedará sobre él
  - su culpa estará sobre él
  lexicon: HALOT
  rationale: La construcción expresa responsabilidad penal que permanece sobre el culpable. 'Culpa' es más transparente en español que 'iniquidad', pero conserva el sentido judicial. 'Quedará sobre él' refleja bien la permanencia de la carga en un futuro jurídico.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. Conforme al criterio del proyecto, se conserva el nombre propio divino en español y no se sustituye por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de 'ser cortado' (כרת en niphal)
  english_pob_reading: Retain the idiom 'cut off' without specifying whether it means death, childlessness, or expulsion
  chosen_spanish_reading: ciertamente será cortada
  alternative_spanish_readings:
  - será ejecutada
  - será excluida de la comunidad
  rationale: Se conserva el giro idiomático de juicio sin resolver su mecanismo exacto. El hebreo no especifica aquí si el resultado es muerte, expulsión u otra forma de sanción; por eso la traducción mantiene la tensión interpretativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail, que ajustó la cláusula final a un futuro jurídico ('shall be on him'). En español se refleja con 'quedará sobre él', manteniendo el tono formal y la permanencia de la culpa. También se conservó el idiomático 'ser cortada' sin precisar el tipo de sanción, en línea con la decisión revisada del POB inglés.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente con el estándar del proyecto para יְהוָה.
  - Se mantuvo 'mandamiento' en singular para reflejar el hebreo singular.
  - '''Cortada'' se dejó en femenino para concordar con נֶפֶשׁ entendido como ''persona'' en español.'
  - '''Culpa'' traduce עָוֹן/עֲוֺן en un registro judicial claro, sin introducir una interpretación doctrinal adicional.'
