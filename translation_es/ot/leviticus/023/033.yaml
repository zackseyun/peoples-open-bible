lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El verbo narrativo con waw consecutiva introduce un acto nuevo de habla. En español, «habló» conserva mejor el registro formal y la fórmula profética/divina que «dijo», sin perder naturalidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrama en español como «Yahvé», de acuerdo con la pauta del proyecto para YHWH y para no sustituir el nombre propio por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición marca el complemento indirecto del discurso. «A» es la equivalencia natural en español para indicar a quién se dirige la palabra.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria conserva en español la relación con lo que sigue. «Diciendo» reproduce de forma natural la construcción hebrea como marcador de discurso.
theological_decisions:
- issue: Traducción del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El hebreo usa el Tetragrama directamente. Se mantiene como nombre propio transliterado en español para preservar la identidad personal y pactal de Dios, en lugar de ocultarlo bajo un sustituto reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el criterio auditado del inglés POB: fórmula narrativa breve de introducción al discurso divino, sin variantes textuales relevantes. No se documentan revisiones que afecten el versículo.'
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto.
  - Se usa «habló» para conservar el tono de fórmula narrativa y evitar un calco más pesado.
  - La frase queda abierta con coma final para introducir el contenido del versículo siguiente, como en la fuente hebrea y en el inglés auditado.
