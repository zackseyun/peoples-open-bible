translation:
  language: es
  text: 'para que Yahvé confirme su palabra que habló acerca de mí[a], diciendo: «Si tus hijos guardan su camino, andando delante de mí en verdad[b], con todo su corazón y con toda su alma, no te faltará[c] un hombre en el trono de Israel»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habló de mí»; el hebreo עַל con דִּבֶּר puede entenderse como «acerca de».'
    reason: alternative_reading
  - marker: b
    text: «En verdad» también puede traducirse «fielmente» o «con integridad».
    reason: lexical_alternative
  - marker: c
    text: 'Más literalmente: «no será cortado para ti un hombre de sobre el trono de Israel». Más idiomáticamente: «no te faltará un hombre en el trono de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para que
  lexicon: HALOT
  rationale: Introduce finalidad/resultado; «para que» es natural en español y conserva el valor purposivo.
- source_word: יָקִים
  english_pob_choice: may establish
  chosen_spanish: confirme
  alternatives_spanish:
  - establezca
  - cumpla
  - confirme
  lexicon: HALOT
  rationale: En este contexto de palabra prometida, «confirmar» expresa bien la idea de hacer firme o dar cumplimiento a lo dicho sin perder el matiz de promesa pactal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en la forma de la política del POB en español, evitando el sustituto titular.
- source_word: דְּבָרוֹ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su palabra
  - su promesa
  - lo que dijo
  lexicon: HALOT
  rationale: «Palabra» refleja de manera más directa דָּבָר y, en contexto, incluye la idea de promesa sin forzar una paráfrasis.
- source_word: דִּבֶּר עָלַי
  english_pob_choice: he spoke concerning me
  chosen_spanish: habló acerca de mí
  alternatives_spanish:
  - habló sobre mí
  - habló de mí
  - me habló
  lexicon: HALOT
  rationale: עַל con דִּבֶּר suele significar «acerca de / sobre». Se evita «me habló» porque el hebreo apunta al contenido de lo dicho sobre David.
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - si
  - cuando
  - con tal de que
  lexicon: HALOT
  rationale: Introduce la condición explícita del pasaje y preserva su forma sintáctica.
- source_word: יִשְׁמְרוּ
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - guarden
  - observen
  - conserven
  lexicon: HALOT
  rationale: En contextos éticos/pactuales, שׁמר incluye la idea de guardar/observar; «guarden» es idiomático y fiel.
- source_word: בָנֶיךָ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos
  - tus hijos varones
  - tus descendientes
  lexicon: HALOT
  rationale: El hebreo es masculino plural y puede referirse a la descendencia dinástica. En español, «hijos» comunica naturalmente esa posteridad sin perder el referente.
- source_word: אֶת דַּרְכָּם
  english_pob_choice: their way
  chosen_spanish: su camino
  alternatives_spanish:
  - su camino
  - su conducta
  - su manera de vivir
  lexicon: HALOT
  rationale: «Camino» mantiene la metáfora hebrea de manera de vida; el singular con sufijo plural se conserva de forma natural en español.
- source_word: לָלֶכֶת לְפָנַי
  english_pob_choice: to walk before me
  chosen_spanish: para andar delante de mí
  alternatives_spanish:
  - para andar delante de mí
  - para caminar delante de mí
  - para vivir delante de mí
  lexicon: HALOT
  rationale: «Andar delante de mí» preserva la imagen pactual y suena más natural que un calco rígido.
- source_word: בֶּאֱמֶת
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - en verdad
  - fielmente
  - con integridad
  lexicon: HALOT
  rationale: «En verdad» conserva la ambigüedad útil de אמת entre verdad, fidelidad e integridad; en notas se puede reconocer ese rango semántico.
- source_word: בְּכָל לְבָבָם
  english_pob_choice: with all their heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con todo su corazón
  - de todo corazón
  lexicon: HALOT
  rationale: Corresponde al giro idiomático habitual y mantiene el sentido de entrega interior total.
- source_word: וּבְכָל נַפְשָׁם
  english_pob_choice: and with all their soul
  chosen_spanish: y con toda su alma
  alternatives_spanish:
  - y con toda su alma
  - y con toda su vida
  - y con todo su ser
  lexicon: HALOT
  rationale: «Alma» preserva el paralelismo tradicional con «corazón» y respeta el valor de נֶפֶשׁ como vida/ser.
- source_word: לֹא יִכָּרֵת לְךָ אִישׁ
  english_pob_choice: You shall not lack a man
  chosen_spanish: no te faltará un hombre
  alternatives_spanish:
  - no te faltará un hombre
  - no será cortado de ti un hombre
  - no se te extinguirá un hombre
  lexicon: HALOT
  rationale: Se elige una equivalencia idiomática natural en español que conserva el sentido dinástico del hebreo sin oscurecerlo con un calco demasiado áspero.
- source_word: מֵעַל כִּסֵּא יִשְׂרָאֵל
  english_pob_choice: on the throne of Israel
  chosen_spanish: sobre el trono de Israel
  alternatives_spanish:
  - sobre el trono de Israel
  - del trono de Israel
  - desde encima del trono de Israel
  lexicon: HALOT
  rationale: «Sobre el trono» comunica claramente la función regia; evita la literalidad extraña de «de sobre» sin perder la referencia al trono dinástico.
theological_decisions:
- issue: Condicionalidad de la promesa davídica
  english_pob_reading: The verse is rendered with an explicit condition ('If your sons...'), preserving the text's stated conditional form without harmonizing it with unconditional formulations elsewhere.
  chosen_spanish_reading: Se conserva la condición explícita («Si tus hijos...») sin suavizarla ni convertirla en una afirmación general.
  alternative_spanish_readings:
  - hacerla sonar incondicional al estilo de una promesa absoluta
  - transformarla en una exhortación genérica
  rationale: El hebreo presenta una condición real vinculada al comportamiento de la descendencia; la traducción mantiene esa tensión textual y teológica.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla en la traducción.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación más idiomática para la cláusula final («You shall not lack a man on the throne of Israel») y corrigió la sintaxis de la cláusula de caminar. En español se optó por una solución igualmente idiomática («no te faltará un hombre sobre el trono de Israel») y se mantuvo la estructura «para andar delante de mí» para reflejar con claridad la construcción final del hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה, conforme al estándar del proyecto.
  - Se conserva la metáfora de «camino» sin sustituirla por una paráfrasis interpretativa.
  - «Corazón» y «alma» siguen el paralelismo bíblico tradicional sin perder naturalidad en español.
  - La nota de la cláusula final preserva la tensión entre literalidad hebrea e idiomatismo español.
