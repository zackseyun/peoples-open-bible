    rationale: '''se entiende comúnmente de manera colectiva respecto de Israel'' suena menos natural que ''se entiende comúnmente en sentido colectivo, refiriéndose a Israel'' o similar.'
  revised_spanish_text: Escogieron dioses nuevos[a]; entonces hubo guerra en las puertas[b]. ¿Se veía un escudo, o una lanza, entre cuarenta mil en Israel?
