  to: Mientras estas cosas se estaban arreglando, se extendía un rumor hostil contra la nación entre personas de parecer afín para maltratarla, y se daba un pretexto para su propósito[c][b], como si se les impidiera seguir sus leyes tradicionales.
  rationale: 'Se ajusta el español para reflejar mejor el griego y la decisión POB inglesa sin cambiar el sentido: «se estaban arreglando» corresponde más naturalmente a οἰκονομουμένων / «were being arranged»; «se daba un pretexto» mejora la fluidez; y «leyes tradicionales» expresa τὰ νόμιμα de manera más idiomática que «leyes acostumbradas», manteniendo en nota las alternativas documentadas.'
