translation:
  language: es
  text: Para el director musical[a]. De los hijos de Coré[b]. Salmo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Para el maestro de música», «Para el director del coro» o «Al maestro de coro».
    reason: lexical_alternative
  - marker: b
    text: O «Para los hijos de Coré». La preposición hebrea puede indicar autoría, asociación o dedicación en los encabezados de los salmos.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choir director
  chosen_spanish: Para el director musical
  alternatives_spanish:
  - Para el director del coro
  - Para el maestro de música
  - Al maestro de coro
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término designa a la persona responsable de la dirección musical o de la ejecución. «Director musical» comunica bien esa función en español moderno sin forzar un calco ni recurrir a una expresión demasiado eclesiástica.
- source_word: לִבְנֵי
  english_pob_choice: Of the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Para los hijos de
  - Perteneciente a los hijos de
  lexicon: HALOT
  rationale: La preposición ל en estos encabezados puede indicar asociación, pertenencia o dedicación. «De los hijos de» conserva de manera natural esa ambigüedad, igual que la opción inglesa auditada.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: convención bíblica española
  rationale: Se usa la forma bíblica española tradicional y reconocible «Coré» para el nombre propio, manteniendo claridad para lectores de iglesia en español.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Cántico
  lexicon: HALOT
  rationale: מִזְמוֹר funciona aquí como rótulo de género. En español, el encabezado breve «Salmo» transmite el valor clasificatorio sin añadir más de lo que exige el hebreo.
translation_notes:
  revision_awareness: El paquete fuente muestra alta concordancia y ningún cambio aplicado en la revisión más reciente; por eso la redacción sigue de cerca la estructura del hebreo y la solución auditada en inglés, adaptándola al español natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología de proyecto cuando corresponda, pero en este versículo no aparece el nombre divino.
  - Se conserva la ambigüedad del encabezado hebreo en «De los hijos de», sin resolverla hacia autoría o dedicación.
  - Se usa «Salmo» como rótulo genérico de género, sin expansión interpretativa.
