translation:
  language: es
  text: Porque él hace subir las gotas de agua; destilan lluvia de su vapor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de su niebla». El hebreo de la segunda línea es difícil, y «vapor» también puede traducirse «niebla».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: La conjunción introduce aquí una explicación causal o expositiva del acto divino descrito en el contexto inmediato. «Porque» conserva esa relación sin sonar forzada en español.
- source_word: יְגָרַע
  english_pob_choice: he draws up
  chosen_spanish: retira
  alternatives_spanish:
  - levanta
  - extrae
  - hace subir
  lexicon: HALOT
  rationale: El verbo גרע puede significar disminuir, quitar o retirar. En este contexto meteorológico la idea es que Dios toma el agua de la tierra hacia arriba. «Retira» preserva el valor de sacar/quitar sin imponer una imagen demasiado técnica.
- source_word: נִטְפֵי מָיִם
  english_pob_choice: the drops of water
  chosen_spanish: las gotas de agua
  alternatives_spanish:
  - las gotas del agua
  - las gotas acuosas
  lexicon: HALOT
  rationale: La construcción hebrea denota literalmente gotas de agua. «Gotas de agua» es la equivalencia más natural y fiel en español.
- source_word: יָזֹקּוּ
  english_pob_choice: they distill
  chosen_spanish: destilan
  alternatives_spanish:
  - derraman
  - llueven
  - filtran
  lexicon: HALOT
  rationale: En el campo semántico del verbo זקק, la imagen de destilación conserva bien el proceso de formación de la lluvia desde el vapor/mist sin reducirlo a un simple «derramar».
- source_word: מָטָר
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - aguacero
  - precipitación
  lexicon: HALOT
  rationale: El sustantivo es el término común para lluvia; «lluvia» es la equivalencia directa y más transparente en español.
- source_word: לְאֵדוֹ
  english_pob_choice: from his mist
  chosen_spanish: de su vapor
  alternatives_spanish:
  - de su niebla
  - de su neblina
  - de su vaho
  lexicon: HALOT
  rationale: אֵד puede significar vapor o niebla/mist. Dado el paralelismo con la lluvia y la imagen física del pasaje, «vapor» mantiene la ambigüedad meteorológica y hace explícito el origen de la lluvia. El sufijo posesivo se conserva como referido a Dios, siguiendo el audit trail en inglés.
theological_decisions:
- issue: Referencia del sufijo de tercera persona masculina singular en לְאֵדוֹ
  english_pob_reading: 'The suffix refers to God: ''his mist.'''
  chosen_spanish_reading: 'El sufijo se entiende como referido a Dios: «su vapor».'
  alternative_spanish_readings:
  - «su niebla»
  - 'una lectura impersonal: «de vapor»'
  - ajustes textuales o vocálicos que suavicen el posesivo
  rationale: En el discurso inmediato el sujeto implícito es Dios y el pasaje enfatiza su soberanía sobre el ciclo del agua. Mantener el posesivo evita borrar ese vínculo teológico, aunque el hebreo sea difícil y admita otras soluciones.
  doctrine_reference: 'Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: El borrador sigue el alto grado de acuerdo del audit trail inglés y no introduce revisiones adicionales; conserva la tensión lexical de לְאֵדוֹ mediante una nota, en paralelo con la nota inglesa sobre mist/vapor.
  spanish_consistency_notes:
  - Se mantuvo un registro poético y sobrio, adecuado para lectura bíblica.
  - «Vapor» se eligió para reflejar la ambigüedad meteorológica de אֵד sin perder inteligibilidad.
  - «Retira» evita un calco mecánico de «draws up» y expresa el movimiento ascendente implícito en el contexto.
  - La nota a pie de página preserva la alternativa lexical relevante sin multiplicar variantes innecesarias.
