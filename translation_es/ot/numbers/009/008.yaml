translation:
  language: es
  text: 'Y Moisés les dijo[a]: «Esperen, y oiré lo que Yahvé mande respecto a ustedes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Estén de pie», conservando el sentido más literal del imperativo hebreo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Así que ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce la siguiente acción narrativa; «Y» conserva la secuencia hebrea sin añadir matiz temporal o causal extra.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre enclítico en español expresa naturalmente el objeto indirecto del habla; «les» evita pesadez y conserva la referencia plural masculina.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: n/a (nombre propio)
  rationale: Nombre propio bíblico estándar en español.
- source_word: עִמְדוּ
  english_pob_choice: Wait
  chosen_spanish: Esperen
  alternatives_spanish:
  - Permanezcan
  - Quédense
  - Estén de pie
  lexicon: HALOT
  rationale: Aunque el imperativo literalmente significa «estén de pie», en este contexto comunica mejor la instrucción idiomática de permanecer en el lugar mientras Moisés busca respuesta. «Esperen» reproduce esa fuerza funcionalmente sin perder la posibilidad literal, que queda implícita en la nota.
- source_word: וְאֶשְׁמְעָה
  english_pob_choice: and I will hear
  chosen_spanish: y escucharé
  alternatives_spanish:
  - y oiré
  - y prestaré atención
  lexicon: HALOT
  rationale: La forma cohortativa expresa la intención de Moisés de recibir la respuesta; «escucharé» mantiene la idea de recibir lo que Yahvé diga y es idiomático en español. «Oiré» sería más literal, pero menos natural aquí.
- source_word: מַה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - lo que
  lexicon: HALOT
  rationale: Introduce el contenido de la revelación esperada; «qué» conserva la interrogación directa.
- source_word: יְצַוֶּה
  english_pob_choice: commands
  chosen_spanish: mandará
  alternatives_spanish:
  - ordenará
  - dará instrucciones
  lexicon: HALOT
  rationale: El piel de צוה puede traducirse como «mandar» o «ordenar». «Mandará» es claro y natural en español bíblico contemporáneo, sin forzar un registro eclesiástico tradicional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre divino personal en la forma española establecida por el proyecto, en lugar de sustituirlo por una титulación como «el SEÑOR».
- source_word: לָכֶם
  english_pob_choice: concerning you
  chosen_spanish: respecto de ustedes
  alternatives_spanish:
  - para ustedes
  - acerca de ustedes
  lexicon: HALOT
  rationale: La preposición admite varias matizaciones; aquí expresa que el mandamiento tendrá a ellos como asunto o referente. «Respecto de ustedes» preserva esa relación y evita una lectura meramente beneficiaria de «para ustedes».
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. La política del proyecto en español es conservar el nombre divino como «Yahvé», evitando el sustituto litúrgico «el SEÑOR» para no ocultar el nombre propio revelado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / forma española Yahvé'
- issue: Alcance de לָכֶם en la frase final
  english_pob_reading: concerning you
  chosen_spanish_reading: respecto de ustedes
  alternative_spanish_readings:
  - para ustedes
  - sobre ustedes
  rationale: La lectura del contexto muestra que Moisés espera una instrucción divina relativa al caso de ellos, no solo un beneficio indirecto. «Respecto de ustedes» conserva esa relación sin exagerar el matiz.
  doctrine_reference: HALOT, ל + pronombre; contexto narrativo de consulta divina
translation_notes:
  revision_awareness: La revisión inglesa más reciente afinó la clausula final de «will command for you» a «commands concerning you». La versión española toma ese ajuste como guía para expresar לָכֶם con una relación de referencia/asunto («respecto de ustedes») y mantiene la intención futura de consulta de Moisés con «escucharé».
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto en español.
  - Se evita «siervo» porque no hay δοῦλος en este versículo; no aplica el término técnico.
  - «Esperen» transmite la función pragmática del hebreo sin borrar la literalidad, que queda documentada en la nota.
  - La cita verbal está cerrada con puntuación española y el marcador [a] aparece exactamente en el texto principal.
