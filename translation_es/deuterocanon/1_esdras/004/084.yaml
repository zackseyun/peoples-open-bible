translation:
  language: es
  text: y bendijeron al Dios de sus padres[a], porque les había dado alivio y liberación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «descanso y libertad». Los términos griegos pueden expresar alivio de la aflicción y liberación o puesta en libertad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλόγησαν
  english_pob_choice: blessed
  chosen_spanish: bendijeron
  alternatives_spanish:
  - alabaron
  - bendecían
  lexicon: BDAG
  rationale: En este contexto, el verbo conserva el valor bíblico de pronunciar bendición sobre Dios; en español, "bendijeron" mantiene mejor el eco formal que "alabaron", sin perder naturalidad.
- source_word: τὸν θεὸν τῶν πατέρων αὐτῶν
  english_pob_choice: the God of their fathers
  chosen_spanish: al Dios de sus padres
  alternatives_spanish:
  - a su Dios ancestral
  - al Dios de sus antepasados
  lexicon: LEH
  rationale: La expresión es una fórmula bíblica estable que vincula la adoración presente con la fidelidad histórica del pacto. "De sus padres" preserva esa resonancia mejor que una paráfrasis.
- source_word: ἔδωκεν
  english_pob_choice: had given
  chosen_spanish: había dado
  alternatives_spanish:
  - dio
  lexicon: BDAG
  rationale: El pluscuamperfecto en español refleja con naturalidad que el beneficio ya estaba concedido cuando ellos bendicen a Dios.
- source_word: ἄνεσιν
  english_pob_choice: relief
  chosen_spanish: alivio
  alternatives_spanish:
  - descanso
  - reposo
  - alivio de la aflicción
  lexicon: LEH
  rationale: '"Alivio" comunica el sentido de aflojamiento de la presión o del sufrimiento y suena natural en español actual; "descanso" podría sugerir una quietud más estática de la que el término probablemente implica.'
- source_word: ἄφεσιν
  english_pob_choice: release
  chosen_spanish: liberación
  alternatives_spanish:
  - libertad
  - deslazamiento
  - remisión
  lexicon: LEH
  rationale: En este marco histórico, el término apunta más a liberación que a perdón de pecados. "Liberación" preserva el sentido de quedar soltados o puestos en libertad sin introducir un matiz cultual no explicitado por el versículo.
theological_decisions:
- issue: Sentido de ἄφεσιν en un contexto histórico no cultual
  english_pob_reading: release
  chosen_spanish_reading: liberación
  alternative_spanish_readings:
  - libertad
  - remisión
  - perdón
  rationale: El contexto inmediato habla de un beneficio histórico recibido, junto con alivio. Por eso se evita leer aquí una remisión de pecados que el texto no menciona expresamente. "Liberación" conserva la amplitud semántica de ἄφεσις sin sobreinterpretación doctrinal.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El contexto auditado en inglés mantuvo una solución de equivalencia óptima y no requirió cambios posteriores. La presente redacción sigue ese perfil, pero adapta el segundo término de ἄφεσις a una opción española más precisa y natural en este pasaje histórico.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, conforme al estándar del proyecto.
  - Se usa «bendijeron» para εὐλόγησαν, preservando el registro bíblico sin forzar un calco.
  - «Alivio y liberación» refleja la pareja ἄνεσις + ἄφεσις sin introducir lenguaje soteriológico ajeno al contexto.
  - La nota alternativa conserva la ambigüedad léxica útil del griego y evita cerrar indebidamente el sentido de ἄφεσις.
