review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido básico del hebreo: Jefté hace un voto a Yahvé y enuncia una condición abierta que continúa en el versículo siguiente. También preserva bien el énfasis de נָתוֹן תִּתֵּן mediante una expresión intensificadora. Sin embargo, hay dos problemas de fidelidad/forma: el etnónimo aparece como «ammonitas», grafía no estándar en español bíblico general, y la nota al pie no ofrece una alternativa real, sino que repite el texto principal en vez de reflejar la opción documentada de énfasis.'
  spanish_quality_summary: El español es claro y natural en conjunto, con buen registro bíblico moderno y uso correcto de «Yahvé». «Hizo un voto» suena bien y conserva el cognado hebreo. «En mi mano» es aceptable y fiel al idiomatismo. La principal mejora estilística/ortográfica necesaria es «amonitas». La nota al pie también debe repararse para que sea útil y no redundante.
  glossary_alignment: Alinea bien con la terminología del proyecto en «Yahvé», «Jefté», «voto», «Dios/Yahvé» y la conservación del idiomático «mano». No hay conflicto teológico. La excepción necesaria es corregir «ammonitas» a «amonitas», que es la forma española estándar del etnónimo.
  issues:
  - severity: medium
    issue: Grafía no estándar «ammonitas»
    rationale: En español general y bíblico culto la forma estándar es «amonitas». La doble eme responde a transliteración influida por el inglés/latín, pero no es la forma preferible para un texto eclesial legible en español.
  - severity: medium
    issue: La nota al pie repite el texto principal en lugar de dar una alternativa léxica real
    rationale: El English POB documenta como alternativa algo equivalente a «si ciertamente entregas...» o «si de veras entregas...». La nota española actual no añade información porque repite «en verdad entregas».
  revised_spanish_text: 'Entonces Jefté hizo un voto a Yahvé y dijo[a]: «Si en verdad entregas a los amonitas en mi mano,»'
  revised_footnotes:
  - marker: a
    text: 'O: «Si ciertamente entregas a los amonitas en mi mano». El hebreo usa un infinitivo absoluto con un verbo finito para intensificar la acción.'
    reason: lexical_alternative
  revision_rationale: Se corrige la grafía del etnónimo a «amonitas» para ajustarla al español estándar y se repara la nota al pie para que preserve una alternativa real al énfasis hebreo documentado en la auditoría inglesa. También se mantiene la coma final dentro de las comillas para reflejar que la prótasis queda abierta y continúa en el versículo siguiente.
