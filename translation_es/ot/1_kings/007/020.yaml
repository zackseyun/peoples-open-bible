base_translation:
  language: en
  yaml_path: translation/ot/1_kings/007/020.yaml
  text: And the capitals were on the two pillars[a], also above, opposite the bulge that was beside the latticework; and the pomegranates were two hundred, in rows all around[c][b], on the second capital.
  footnotes:
  - marker: a
    text: Or 'on the other capital.' The Hebrew 'the second' may simply distinguish the matching capital of the second pillar in this architectural description.
    reason: alternative_reading
  - marker: b
    text: Hebrew literally 'the belly,' likely referring to the rounded swelling part of the capital.
    reason: lexical_alternative
  - marker: c
    text: That is, the decorative net or latticework attached to the capitals.
    reason: cultural_note
