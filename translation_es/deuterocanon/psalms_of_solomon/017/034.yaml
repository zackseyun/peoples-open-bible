revisions:
- from: para que naciones vengan desde el extremo de la tierra a ver su gloria, trayendo como ofrenda a sus hijos debilitados[a],
  to: para que las naciones vengan desde el extremo de la tierra a ver su gloria, trayendo a sus hijos debilitados como dones[a],
  rationale: Se corrige la sintaxis española con artículo definido («las naciones») para mayor naturalidad y claridad. Se mantiene el infinitivo de propósito con «para que ... vengan» como equivalente idiomático del griego dependiente. Se conserva «desde el extremo de la tierra», «ver su gloria» y el sentido de φέροντες δῶρα como que los hijos son presentados en calidad de dones. Se cambia «como ofrenda» a «como dones» para reflejar mejor el plural δῶρα y se retiene «hijos» como forma natural que en este contexto sigue el masculino plural del griego mejor que una neutralización explícita a «hijos e hijas» o «hijos/as».
