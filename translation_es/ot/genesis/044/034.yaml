review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del hebreo: la imposibilidad retórica de volver al padre sin el muchacho, y el temor de ver la calamidad que le sobrevendría al padre. Sin embargo, «subiré a mi padre» no es español natural ni reproduce bien el complemento de destino; debe ser «subiré a donde está mi padre» o, mejor por claridad idiomática, «volveré a mi padre». Además, la nota al pie contiene un anglicismo/error grave: «harm/calamidad».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «subiré a mi padre» suena incorrecto en español porque sugiere un objeto directo humano en lugar de dirección. «No sea que vea» es aceptable y de buen registro. «Desgracia» funciona bien para רָע en este contexto. La nota al pie necesita corrección de español y consistencia léxica.
  glossary_alignment: No hay conflictos con la terminología proyectual principal. Las decisiones léxicas sobre נַעַר = «muchacho», רָע = «desgracia», y פֶּן = «No sea que» son defendibles. La principal corrección es sintáctica/idiomática en אֶעֱלֶה אֶל אָבִי.
  issues:
  - severity: high
    issue: «¿cómo subiré a mi padre?» es español deficiente
    rationale: El hebreo אֶעֱלֶה אֶל אָבִי significa «subir/ir a mi padre», con complemento de dirección. En español, «subir a mi padre» suena como si el padre fuera objeto directo. Debe repararse para preservar sentido y legibilidad.
  - severity: medium
    issue: La nota al pie dice «harm/calamidad»
    rationale: «harm» es inglés y no debe aparecer en la nota española. Además, conviene ofrecer alternativas plenamente en español, p. ej. «daño» o «calamidad».
  revised_spanish_text: Porque, ¿cómo volveré a mi padre si el muchacho no está conmigo? No sea que vea la desgracia[a] que vendría sobre mi padre.
  revised_footnotes:
  - marker: a
    text: O «el daño» o «la calamidad»; el hebreo רָע aquí se refiere a un perjuicio o desgracia concreta, no a mal moral.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «subiré a mi padre» por «volveré a mi padre» para expresar de forma natural en español la idea de regresar al padre sin crear una construcción incorrecta. Se corrige la nota al pie para eliminar el anglicismo «harm» y mantener alternativas léxicas fieles al hebreo.
