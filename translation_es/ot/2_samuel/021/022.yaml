revisions:
- from: Estos cuatro[a] nacieron para el Rapha[b] en Gat, y cayeron por mano de David y por mano de sus siervos.
  to: Estos cuatro nacieron del Rapha[a] en Gat, y cayeron por mano de David y por mano de sus siervos.
  rationale: Se reemplaza «para el Rapha» por «del Rapha» para expresar descendencia de manera fiel y natural en español. Se mueve la nota al término relevante y se fusionan las dos notas existentes para evitar redundancia y cumplir con el anclaje correcto de marcadores.
