translation:
  language: es
  text: Pero los sacerdotes, habiéndose arrojado ante el altar con sus vestiduras sacerdotales, invocaban al cielo[a] a aquel que había legislado acerca de los depósitos[b], para que guardara estas cosas a salvo para quienes las habían depositado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «invocaban al cielo», una manera reverente de referirse a Dios.
    reason: lexical_alternative
  - marker: b
    text: Es decir, bienes confiados para custodia en el templo.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ δὲ ἱερεῖς
  english_pob_choice: But the priests
  chosen_spanish: Pero los sacerdotes
  alternatives_spanish:
  - Y los sacerdotes
  - Mas los sacerdotes
  lexicon: LSJ
  rationale: El griego introduce una continuación adversativa con δέ; en español, «Pero» reproduce bien ese matiz. «Sacerdotes» es el equivalente natural y claro de ἱερεῖς.
- source_word: ῥίψαντες ἑαυτούς
  english_pob_choice: having thrown themselves down
  chosen_spanish: habiéndose arrojado
  alternatives_spanish:
  - habiéndose echado
  - habiéndose postrado
  - habiéndose lanzado
  lexicon: LSJ
  rationale: «Arrojarse» conserva la fuerza física de ῥίπτω mejor que un término más litúrgico. Se evita «postrarse» porque suaviza la imagen concreta del texto.
- source_word: πρὸ τοῦ θυσιαστηρίου
  english_pob_choice: before the altar
  chosen_spanish: delante del altar
  alternatives_spanish:
  - ante el altar
  - frente al altar
  lexicon: LSJ
  rationale: «Delante de» expresa la posición espacial de forma natural en español y mantiene el sentido visual del griego.
- source_word: ἐν ταῖς ἱερατικαῖς στολαῖς
  english_pob_choice: in their priestly robes
  chosen_spanish: con sus vestiduras sacerdotales
  alternatives_spanish:
  - con sus ropas sacerdotales
  - vistiendo vestiduras sacerdotales
  lexicon: LSJ
  rationale: «Vestiduras sacerdotales» preserva el tono ceremonial sin forzar un latinismo como «vestimentas». El griego describe el modo en que estaban vestidos al actuar.
- source_word: ἐπεκαλοῦντο εἰς οὐρανόν
  english_pob_choice: were calling out to heaven
  chosen_spanish: invocaban al cielo
  alternatives_spanish:
  - clamaban al cielo
  - invocaban al Cielo
  lexicon: LSJ
  rationale: El POB inglés conserva la circunlocución reverencial; en español, «al cielo» reproduce esa misma referencia reverente sin convertirla directamente en «a Dios». «Invocaban» expresa la oración insistente del imperfecto.
- source_word: τὸν περὶ παρακαταθήκης νομοθετήσαντα
  english_pob_choice: the one who had given the law concerning deposits
  chosen_spanish: a aquel que había legislado acerca de los depósitos
  alternatives_spanish:
  - al que había dado la ley acerca de los depósitos
  - a aquel que había establecido la ley sobre los depósitos
  lexicon: LSJ
  rationale: «Legislado» refleja con precisión νομοθετέω como acto de establecer ley. «Depósitos» conserva el sentido técnico de παρακαταθήκη como bienes confiados para custodia, de acuerdo con la nota cultural del POB.
- source_word: τοῖς παρακαταθεμένοις
  english_pob_choice: for those who had deposited them
  chosen_spanish: para quienes las habían depositado
  alternatives_spanish:
  - para los que las habían confiado
  - para los depositantes
  lexicon: LSJ
  rationale: Se mantiene la relación con el sustantivo previo mediante «depositado», sin introducir una paráfrasis excesiva. En español, el relativo personal «quienes» da fluidez.
- source_word: ταῦτα σῶα διαφυλάξαι
  english_pob_choice: that he should keep these things safe
  chosen_spanish: para que guardara estas cosas seguras
  alternatives_spanish:
  - para que preservara estas cosas intactas
  - para que las mantuviera a salvo
  lexicon: LSJ
  rationale: '«Guardar ... seguras» reproduce el valor de σῶα + διαφυλάξαι: preservar de daño o pérdida. «Estas cosas» mantiene la deixis concreta del texto.'
theological_decisions:
- issue: Circunlocución reverencial con οὐρανόν
  english_pob_reading: to heaven
  chosen_spanish_reading: al cielo
  alternative_spanish_readings:
  - a Dios
  - al Señor en el cielo
  rationale: El griego dice literalmente «al cielo», una forma reverencial de aludir a Dios. Se conserva la circunlocución para no introducir una explicitación teológica que el texto no hace de manera directa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Sentido jurídico de παρακαταθήκη
  english_pob_reading: deposits
  chosen_spanish_reading: depósitos
  alternative_spanish_readings:
  - bienes en custodia
  - encargos confiados
  - cosas en depósito
  rationale: El contexto del templo sugiere bienes confiados para custodia. «Depósitos» retiene la fuerza legal/económica del término y la conexión léxica interna del versículo.
  doctrine_reference: DOCTRINE.md §Lexical fidelity
translation_notes:
  revision_awareness: El texto griego y el registro inglés muestran alta concordancia; no hubo revisiones sustanciales. La versión española sigue la lectura óptima ya establecida, conservando la imagen física de arrojarse, la circunlocución reverencial «al cielo» y el valor técnico de «depósitos».
  spanish_consistency_notes:
  - Se mantiene «depósitos» para παρακαταθήκη, en coherencia con el uso técnico del término.
  - Se conserva la diferencia entre el acto físico («habiéndose arrojado») y la oración («invocaban»).
  - Se evita «SEÑOR» o una explicitación teológica que sustituya la circunlocución del griego.
  - La puntuación separa adecuadamente los participios iniciales sin recargar la sintaxis española.
