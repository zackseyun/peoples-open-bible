review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura básica del hebreo: identificación de Yahvé como Dios, iluminación/favor divino, mandato plural de atar, y referencia a los cuernos del altar. También preserva correctamente la lectura metonímica de חַג como sacrificio festivo y mantiene las alternativas principales en notas. Sin embargo, una elección léxica principal no es fiel al uso español bíblico y perjudica la claridad: «cuernas del altar» no es la forma normal para קַרְנוֹת הַמִּזְבֵּחַ; debe ser «cuernos del altar».'
  spanish_quality_summary: El texto es generalmente natural y digno, pero «Atad» suena peninsular y menos neutro para el objetivo latinoamericano amplio; «Aten» es más panhispánico sin perder solemnidad. «Víctima festiva» es defendible, pero «sacrificio festivo» comunica mejor el sentido cultual en español eclesial general. La nota d además es inútil porque repite exactamente la misma frase del texto actual en vez de aportar una verdadera alternativa.
  glossary_alignment: Se alinea bien con la política del proyecto en «Yahvé» y «Dios». No hay conflicto terminológico mayor, pero la decisión documentada para עַד קַרְנוֹת הַמִּזְבֵּחַ debe expresarse con «cuernos», no «cuernas». La equivalencia de חַג como sacrificio festivo queda mejor reflejada por «sacrificio festivo» que por «víctima festiva» en este contexto.
  issues:
  - severity: medium
    issue: «cuernas del altar» es una elección léxica inadecuada
    rationale: En español bíblico y general, la expresión establecida para קַרְנוֹת הַמִּזְבֵּחַ es «cuernos del altar». «Cuernas» suena extraña y puede asociarse a astas de ciervo, no a la terminología cultual del altar.
  - severity: medium
    issue: La nota d no aporta una alternativa real
    rationale: Dice «O “hasta las cuernas del altar”», que repite el texto principal en vez de documentar una variante como «hasta los cuernos del altar» o «a los cuernos del altar».
  - severity: low
    issue: «Atad» es menos neutro para español latinoamericano amplio
    rationale: Aunque no es incorrecto, «Aten» resulta más ampliamente legible en registro bíblico moderno neutral.
  - severity: low
    issue: «víctima festiva» es menos transparente que «sacrificio festivo»
    rationale: La decisión inglesa y la explicación teológica apuntan al sacrificio asociado a la fiesta. «Sacrificio festivo» comunica más directamente ese referente cultual al lector español.
  revised_spanish_text: Yahvé es Dios[a], y él nos ha dado luz. Aten el sacrificio festivo[b] con cuerdas[c], hasta los cuernos del altar[d].
  revised_footnotes:
