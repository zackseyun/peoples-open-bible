    rationale: El hebreo comprimido permite una formulación prudente, pero en español «lo que reciba por la venta de su patrimonio» expresa mejor la relación personal del sujeto con esos ingresos y armoniza con la nota alternativa del POB.
  revised_spanish_text: Ellos comerán porciones iguales[a], además de lo que reciba por la venta de su patrimonio.
