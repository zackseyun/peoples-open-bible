translation:
  language: es
  text: 'Y el pueblo habló contra Dios y contra Moisés: «¿Por qué nos sacaste de Egipto para morir en el desierto? Pues no hay pan ni agua, y detestamos este pan sin valor[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «este pan despreciable» o «este pan miserable». El adjetivo hebreo es raro y expresa desdén por el alimento que Dios les proveyó.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke against
  chosen_spanish: habló contra
  alternatives_spanish:
  - habló
  - se quejó contra
  - habló en contra
  lexicon: HALOT
  rationale: El contexto es de queja hostil, no de habla neutral. «Habló contra» conserva la fuerza adversativa sin introducir una paráfrasis más intensa que el hebreo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo del Señor
  lexicon: HALOT
  rationale: Es el sustantivo colectivo estándar; «el pueblo» es natural y fiel al artículo hebreo.
- source_word: בֵּאלֹהִים
  english_pob_choice: against God
  chosen_spanish: contra Dios
  alternatives_spanish:
  - a Dios
  - acerca de Dios
  lexicon: HALOT
  rationale: La preposición con דבר se entiende aquí de modo adversativo por el carácter acusatorio del discurso. «Dios» expresa el sentido directo de אֱלֹהִים en este contexto.
- source_word: וּבְמֹשֶׁה
  english_pob_choice: and against Moses
  chosen_spanish: y contra Moisés
  alternatives_spanish:
  - y a Moisés
  - y acerca de Moisés
  lexicon: HALOT
  rationale: Debe mantenerse el paralelismo con «contra Dios», porque la protesta se dirige igualmente contra Moisés.
- source_word: לָמָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué motivo
  - ¿Con qué razón
  lexicon: HALOT
  rationale: Es la interrogativa natural y exacta en español.
- source_word: הֶעֱלִיתֻנוּ
  english_pob_choice: have you brought us up
  chosen_spanish: nos hiciste salir
  alternatives_spanish:
  - nos has sacado
  - nos trajiste arriba
  lexicon: HALOT
  rationale: El hebreo usa la imagen de «hacer subir» desde Egipto; en español, «hiciste salir» comunica la idea exódica con naturalidad. Evita una literalidad extraña como «nos hiciste subir».
- source_word: מִמִּצְרַיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: En español, el verbo «salir» ya incorpora la dirección; «de Egipto» mantiene la economía del texto.
- source_word: לָמוּת
  english_pob_choice: to die
  chosen_spanish: para morir
  alternatives_spanish:
  - a morir
  - y morir
  lexicon: HALOT
  rationale: La finalidad o resultado se expresa de forma directa y sobria con «para morir».
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto / en el yermo
  - en el desierto agreste
  lexicon: HALOT
  rationale: «Desierto» es la opción más clara y natural para lectores de español; el sentido bíblico de lugar árido y despoblado queda bien representado.
- source_word: כִּי אֵין לֶחֶם וְאֵין מַיִם
  english_pob_choice: For there is no bread and no water
  chosen_spanish: Porque no hay pan ni agua
  alternatives_spanish:
  - Pues no hay pan ni agua
  - Porque no tenemos pan ni agua
  lexicon: HALOT
  rationale: Se conserva la estructura negativa y la repetición conceptual. «Pan» mantiene el vínculo léxico con la segunda mitad del versículo.
- source_word: וְנַפְשֵׁנוּ קָצָה
  english_pob_choice: and we detest
  chosen_spanish: y detestamos
  alternatives_spanish:
  - y nos repugna
  - y nos harta
  lexicon: HALOT
  rationale: El hebreo expresa aversión intensa; un verbo activo en primera persona plural reproduce bien la fuerza afectiva sin caer en un calco torpe como «nuestra alma se disgustó».
- source_word: בַּלֶּחֶם הַקְּלֹקֵל
  english_pob_choice: this worthless bread
  chosen_spanish: este pan despreciable
  alternatives_spanish:
  - este pan inútil
  - este pan miserable
  - este pan sin valor
  lexicon: HALOT
  rationale: «קְלֹקֵל» es un adjetivo raro de desprecio o desdén. «Despreciable» comunica esa valoración negativa y conserva el sustantivo «pan», como en el hebreo. Se evita «worthless» traducido mecánicamente por «sin valor» porque aquí el matiz principal es de menosprecio.
theological_decisions:
- issue: La dirección hostil de la queja contra Dios y Moisés
  english_pob_reading: Rendered the verb phrase as hostile complaint ('spoke against God and against Moses') rather than neutral speech.
  chosen_spanish_reading: «habló contra Dios y contra Moisés» expresa una protesta adversativa, no un hablar neutral.
  alternative_spanish_readings:
  - «habló a Dios y a Moisés»
  - «habló acerca de Dios y de Moisés»
  rationale: El contexto inmediato es una acusación rebelde. La traducción debe preservar esa tensión, pues suavizarla oscurecería el carácter de la queja del pueblo.
  doctrine_reference: Principios de fidelidad contextual y no-suavización de tensiones del texto bíblico
- issue: El valor despreciativo de la provisión divina
  english_pob_reading: this worthless bread
  chosen_spanish_reading: este pan despreciable
  alternative_spanish_readings:
  - este pan miserable
  - este pan sin valor
  - este pan contemptible
  rationale: La frase final no sólo describe la comida, sino que revela desprecio hacia la provisión dada. «Despreciable» conserva el juicio negativo sin domesticar el insulto del hebreo.
  doctrine_reference: Principios de precisión léxica y preservación del tono del original
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que sustituyó una opción más libre por «this worthless bread» para acercarse mejor al hebreo. En español se reflejó esa preferencia con «este pan despreciable», manteniendo el desprecio explícito y evitando una paráfrasis más suave.
  spanish_consistency_notes:
  - Se mantuvo «Dios» en lugar de «SEÑOR», conforme al hebreo אֱלֹהִים en este versículo.
  - Se eligió «pan» en ambas apariciones de לֶחֶם para conservar la repetición retórica.
  - Se evitó «siervo» o terminología eclesiástica no presente en el texto.
  - Se usó un español bíblico contemporáneo, claro y reverente, sin arcaísmos innecesarios.
