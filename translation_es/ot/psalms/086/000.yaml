source:
  edition: WLC
  text: תְּפִלָּ֗ה לְ/דָ֫וִ֥ד הַטֵּֽה יְהוָ֣ה אָזְנְ/ךָ֣ עֲנֵ֑/נִי כִּֽי עָנִ֖י וְ/אֶבְי֣וֹן אָֽנִי־־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/086/000.yaml
  text: A prayer of David. Incline your ear[a], Yahweh; answer me, for I am poor and needy.
  footnotes:
  - marker: a
    text: Or 'for I am afflicted and needy.' The Hebrew עָנִי can denote one who is poor, afflicted, or humbled.
    reason: lexical_alternative
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:21Z'
    unchanged: false
    changes_summary: 'Completed the verse by translating the remaining Hebrew after the superscription: added the petition to Yahweh and the reason clause, and rendered יְהוָה as ''Yahweh.'''
translation:
  language: es
  text: Oración de David. Inclina tu oído, Yahvé; respóndeme, porque soy pobre y necesitado.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque soy afligido y necesitado». El hebreo עָנִי puede denotar a quien es pobre, afligido o humillado.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה
  english_pob_choice: A prayer of David.
  chosen_spanish: Oración de David.
  alternatives_spanish:
  - Una oración de David.
  - Súplica de David.
  lexicon: תְּפִלָּה = prayer, supplication
  rationale: «Oración» es la forma natural y reverente en español para תְּפִלָּה; conserva el sentido general del encabezado sin sobrerreformularlo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: יהוה = divine name
  rationale: Se mantiene el nombre divino con la convención del proyecto en español, «Yahvé», en vez de sustituirlo por un título en mayúsculas.
- source_word: הַטֵּה אָזְנְךָ
  english_pob_choice: Incline your ear
  chosen_spanish: Inclina tu oído
  alternatives_spanish:
  - Inclina tu oído hacia mí
  - Dobla tu oído
  lexicon: הטה + אֹזֶן = incline the ear
  rationale: «Inclina tu oído» reproduce la imagen semítica de prestar atención, con español claro y fiel al cuerpo figurado del original.
- source_word: עֲנֵנִי
  english_pob_choice: answer me
  chosen_spanish: respóndeme
  alternatives_spanish:
  - contéstame
  - óyeme
  lexicon: ענה = answer, respond
  rationale: «Respóndeme» expresa la petición directa sin perder el tono de ruego del hebreo.
- source_word: עָנִי
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - afligido
  - humilde
  lexicon: עָנִי = poor, afflicted, humbled
  rationale: Se conserva «pobre» como lectura principal porque coincide con la opción inglesa y con el matiz económico/social primario, dejando otras posibilidades en nota.
- source_word: אֶבְיוֹן
  english_pob_choice: needy
  chosen_spanish: necesitado
  alternatives_spanish:
  - menesteroso
  - indigente
  lexicon: אֶבְיוֹן = needy, destitute
  rationale: «Necesitado» comunica bien la dependencia y carencia de אֶבְיוֹן en un español contemporáneo y digno.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: La edición española debe reflejar el nombre propio divino conforme a la convención del proyecto, no ocultarlo tras un título; «Yahvé» mantiene transparencia y legibilidad.
  doctrine_reference: Nombre divino / tetragrámaton
- issue: Matiz de עָנִי en la cláusula causal
  english_pob_reading: I am poor and needy, with footnote noting afflicted/humbled
  chosen_spanish_reading: estoy pobre y necesitado
  alternative_spanish_readings:
  - estoy afligido y necesitado
  - estoy humilde y necesitado
  rationale: La formulación principal sigue la lectura inglesa y el paralelismo con אֶבְיוֹן; el matiz alternativo se conserva en nota porque el hebreo permite también el sentido de aflicción o humillación.
  doctrine_reference: Humildad/aflicción del suplicante
translation_notes:
  revision_awareness: La revisión inglesa añadió el contenido del ruego («Incline your ear, Yahweh; answer me») y completó el versículo más allá del encabezado. Esta versión española sigue esa decisión revisada, incluyendo el nombre divino explícito y la cláusula causal completa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar español del proyecto.
  - «Oración de David» funciona como encabezado y no como cuerpo imperativo; el resto del versículo queda puntuado como plegaria dirigida a Dios.
  - La nota conserva la ambigüedad documental de עָנִי sin borrar el sentido principal de «pobre».
