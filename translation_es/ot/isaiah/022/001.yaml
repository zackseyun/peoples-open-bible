review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: encabezado profético, designación poética «Valle de la Visión», pregunta retórica con «ahora», y la imagen de subir a las azoteas. La nota también preserva correctamente la cautela interpretativa sobre Jerusalén. Sin embargo, hay un desajuste de registro y concordancia discursiva en «¿Qué te pasa... que todos ustedes han subido...?»: el hebreo personifica a la ciudad en singular femenino («te»), pero luego abarca colectivamente a sus habitantes («todo tú» = todos los tuyos). En español, mezclar «te» con «ustedes» suena menos natural y rompe la personificación. Conviene ajustar a una formulación colectiva vinculada a la ciudad.'
  spanish_quality_summary: La redacción es clara y comprensible, pero «todos ustedes» tras «¿Qué te pasa?» resulta estilísticamente torpe en español bíblico natural. Una solución más fluida y fiel es «que todos los tuyos han subido a las azoteas», que conserva la personificación de la ciudad y el alcance colectivo de sus habitantes. También conviene cerrar la comilla faltante en la decisión léxica de «¿Qué te pasa?», aunque eso no afecta el texto bíblico final.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Oráculo», «Valle de la Visión» y «azoteas» están bien escogidos. La revisión propuesta no altera ninguna decisión teológica documentada; solo mejora cómo se expresa en español el valor colectivo de כֻּלָּךְ dentro de la personificación de la ciudad.
  issues:
  - severity: medium
    issue: Mezcla poco natural de segunda persona singular con «ustedes»
    rationale: El texto pasa de dirigirse a la ciudad personificada en singular («te») a «todos ustedes», que en español apunta a interlocutores plurales directos y debilita la imagen de la ciudad como un todo con sus habitantes.
  - severity: low
    issue: La formulación actual atenúa la relación entre la ciudad y sus habitantes
    rationale: כֻּלָּךְ con sufijo femenino singular probablemente se refiere a la ciudad entera/personificada. «Todos los tuyos» o equivalente refleja mejor esa colectividad dependiente de la ciudad que «todos ustedes».
  - severity: low
    issue: Error menor en metadatos léxicos
    rationale: En las decisiones léxicas, «¿Qué te pasa» quedó sin comilla de cierre. No afecta la traducción publicada, pero conviene corregirlo en la documentación.
  revised_spanish_text: 'Un oráculo acerca del Valle de la Visión: ¿Qué te pasa ahora[a], que todos los tuyos han subido a las azoteas?'
  revised_footnotes:
  - marker: a
    text: «El Valle de la Visión» probablemente es una designación poética de Jerusalén, aunque el versículo mismo no lo identifica explícitamente.
    reason: cross_reference
  revision_rationale: Se revisa únicamente la expresión de כֻּלָּךְ para conservar mejor la personificación de la ciudad en singular y, a la vez, el sentido colectivo de sus habitantes. «Todos los tuyos» suena más natural y más fiel al hebreo que «todos ustedes» en este contexto.
