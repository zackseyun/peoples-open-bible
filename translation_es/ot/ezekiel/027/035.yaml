  to: Todos los habitantes de las costas[a] están consternados ante ti, y sus reyes se estremecen intensamente[b]; sus rostros están turbados[c].
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad del español y la precisión frente al hebreo auditado: ''ante ti'' expresa mejor la reacción dirigida hacia Tiro; ''se estremecen intensamente'' transmite el intensivo hebreo de manera más idiomática; y se corrigió la redacción de la nota b.'
