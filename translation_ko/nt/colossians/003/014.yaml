  text: And above all these, put on love, which is the bond of perfection.
translation:
  language: ko
  text: 이 모든 것 위에 사랑을 입으십시오. 사랑은 온전함의 띠[a]입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「온전함을 이루는 띠」, 「완전의 띠」. 헬라어 σύνδεσμος는 「함께 묶는 것」을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ πᾶσιν δὲ τούτοις
  english_pob_choice: above all these
  chosen_korean: 이 모든 것 위에
  alternatives_korean:
  - 이 모든 것 외에
  - 이 모든 것을 덧입어
  lexicon: BDAG
  rationale: 의복 비유 문맥에서 ἐπί + 여격을 「위에」로 옮긴다.
- source_word: τὴν ἀγάπην [ἐνδύσασθε]
  english_pob_choice: put on love
  chosen_korean: 사랑을 입으십시오
  alternatives_korean:
  - 사랑을 덧입으십시오
  lexicon: BDAG
  rationale: 12절 명령 「입으십시오」를 보충하여 자연스러운 한국어로 완성.
- source_word: ὅ ἐστιν σύνδεσμος τῆς τελειότητος
  english_pob_choice: which is the bond of perfection
  chosen_korean: 사랑은 온전함의 띠입니다
  alternatives_korean:
  - 그것은 완전의 띠입니다
  - 사랑은 온전함을 이루는 띠입니다
  lexicon: BDAG
  rationale: 「띠」는 한국 교회의 정립된 표현. τελειότης를 「온전함」으로 옮긴다.
