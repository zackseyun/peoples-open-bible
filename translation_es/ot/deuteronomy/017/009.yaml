review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: acudir a los sacerdotes levitas y al juez vigente, consultarles y recibir de ellos la decisión judicial. También preserva la nota alternativa sobre דְּבַר הַמִּשְׁפָּט. Sin embargo, «Y llegarás» suena menos natural que «Y vendrás/irás/acudirás» para וּבָאתָ en este contexto legal, y «la decisión del caso» pierde ligeramente el matiz de ‘en el caso’/‘judicial’ presente en la auditoría inglesa.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para mayor naturalidad y precisión jurídica. «Acudirás» encaja mejor que «llegarás» con la idea de presentarse ante una autoridad. «La decisión en el caso» suena más natural y más cercana a la formulación inglesa auditada que «la decisión del caso».
  glossary_alignment: 'No hay términos del glosario mayor en juego salvo mantener el registro legal. «Sacerdotes levitas», «juez», «en funciones», «inquirirás» y «declararán» son compatibles con la línea terminológica del proyecto. La excepción propuesta es solo estilístico-lexical: preferir «acudirás» para וּבָאתָ por adecuación contextual en español.'
  issues:
  - severity: medium
    issue: «Y llegarás» para וּבָאתָ
    rationale: Aunque es posible, en español legal y narrativo «llegar» enfatiza el arribo físico más que la comparecencia ante autoridad. El hebreo aquí introduce el acto de presentarse ante el tribunal autorizado; «acudirás» lo expresa con mayor naturalidad y fidelidad funcional.
  - severity: low
    issue: «la decisión del caso»
    rationale: No es incorrecto, pero «la decisión en el caso» o «la decisión judicial» refleja mejor la auditoría inglesa ‘the decision in the case’ y evita una leve rigidez posesiva en español.
  revised_spanish_text: Y acudirás a los sacerdotes levitas y al juez que esté en funciones en aquellos días[a], e inquirirás, y ellos te declararán la decisión en el caso.
  revised_footnotes:
  - marker: a
    text: O, más formalmente, «la palabra del juicio». La expresión hebrea se refiere a la decisión judicial autorizada.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron dos ajustes menores: «acudirás» reemplaza «llegarás» para expresar mejor la comparecencia ante la autoridad judicial, y «la decisión en el caso» alinea con mayor naturalidad el español con el sentido forense de דְּבַר הַמִּשְׁפָּט y con la auditoría inglesa revisada.'
