translation:
  language: es
  text: Yahvé sostiene a todos los que caen[a] y levanta a todos los que están encorvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sostiene a todos los que están cayendo». El participio hebreo también puede expresar una acción continua, no solo una referencia general a quienes caen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El hebreo usa el Tetragrámaton directamente. En español sigo la decisión POB de preservar el nombre divino con una transliteración reconocible y digna, sin sustituirlo por un título.
- source_word: סוֹמֵךְ
  english_pob_choice: supports
  chosen_spanish: sostiene
  alternatives_spanish:
  - apoya
  - sustenta
  - mantiene
  lexicon: HALOT
  rationale: El participio expresa acción continua. 'Sostiene' comunica bien la idea de apoyo activo y resulta natural en español bíblico contemporáneo.
- source_word: לְכָל
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - para todos
  - todos
  lexicon: HALOT
  rationale: La construcción indica el alcance total del objeto. 'A todos' conserva la extensión inclusiva sin forzar una traducción demasiado literal.
- source_word: הַנֹּפְלִים
  english_pob_choice: who are falling
  chosen_spanish: los que van cayendo
  alternatives_spanish:
  - los que caen
  - los caídos
  - los que están cayendo
  lexicon: HALOT
  rationale: El participio sugiere estado o proceso continuo. 'Van cayendo' preserva la idea de caída en curso mejor que una forma meramente puntual o ya completada.
- source_word: זוֹקֵף
  english_pob_choice: raises up
  chosen_spanish: levanta
  alternatives_spanish:
  - endereza
  - alza
  - pone en pie
  lexicon: HALOT
  rationale: En paralelo con 'encorvados', 'levanta' comunica restauración de manera clara y natural, sin añadir una imagen distinta a la del hebreo.
- source_word: הַכְּפוּפִים
  english_pob_choice: who are bowed down
  chosen_spanish: los que están encorvados
  alternatives_spanish:
  - los agobiados
  - los doblegados
  - los que están doblados
  lexicon: HALOT
  rationale: 'La imagen hebrea es corporal o figurada: alguien doblado hacia abajo. ''Encorvados'' conserva la metáfora sin interpretar de más la causa de la condición.'
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La POB evita la sustitución reverencial por un título y preserva el nombre del pacto. 'Yahvé' es la forma española estándar dentro de esta decisión editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El registro en inglés quedó sin cambios tras la última revisión; la versión española sigue esa lectura estable, conservando el paralelismo y la tensión aspectual del participio en ambos miembros del verso.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma del nombre divino, coherente con el estándar del proyecto.
  - 'Se conserva el paralelismo verbal: ''sostiene'' // ''levanta''.'
  - '''Van cayendo'' y ''están encorvados'' reflejan el aspecto participial sin convertirlo en pasado cerrado.'
