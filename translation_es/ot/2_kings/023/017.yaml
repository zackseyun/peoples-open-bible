translation:
  language: es
  text: 'Entonces dijo[a]: «¿Qué es este monumento que veo?» Y los hombres de la ciudad le dijeron: «Es la tumba del hombre de Dios que vino de Judá y proclamó[b] estas cosas que has hecho contra el altar de Betel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «marca», «estela conmemorativa» o «señal funeraria» para «monumento».
    reason: lexical_alternative
  - marker: b
    text: O «clamó», «dio voces» o «gritó»; el verbo se refiere a la declaración profética del hombre de Dios acerca del altar (cf. 1 R 13:1–2).
    reason: alternative_reading
lexical_decisions:
- source_word: הַצִּיּוּן
  english_pob_choice: monument
  chosen_spanish: monumento
  alternatives_spanish:
  - marca
  - estela conmemorativa
  - señal funeraria
  lexicon: HALOT
  rationale: El término apunta a una señal visible o marcador memorial. En este contexto se trata de un objeto funerario visible asociado con una sepultura, por lo que «monumento» suena natural en español y conserva amplitud semántica sin precisar de más.
- source_word: הַלָּז
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - ese
  - aquel
  lexicon: HALOT
  rationale: Es un deíctico inmediato referido a un objeto visible; «este» refleja mejor la cercanía perceptiva del hebreo en la escena.
- source_word: אֲנִי רֹאֶה
  english_pob_choice: I see
  chosen_spanish: veo
  alternatives_spanish:
  - estoy viendo
  - estoy mirando
  lexicon: HALOT
  rationale: El presente simple en español comunica bien la observación directa del rey sin forzar una perífrasis progresiva.
- source_word: הַקֶּבֶר
  english_pob_choice: the tomb
  chosen_spanish: la tumba
  alternatives_spanish:
  - la sepultura
  - la fosa
  lexicon: HALOT
  rationale: «Tumba» es el equivalente más natural y adecuado al contexto de una sepultura identificada por un marcador visible.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el profeta de Dios
  lexicon: HALOT
  rationale: Se conserva el título hebreo de forma transparente. «Profeta» explicaría la función, pero estrecharía indebidamente el término ya establecido en el texto fuente.
- source_word: מִיהוּדָה
  english_pob_choice: from Judah
  chosen_spanish: de Judá
  alternatives_spanish:
  - desde Judá
  - procedente de Judá
  lexicon: HALOT
  rationale: Rendición geográfica estándar y clara en español.
- source_word: וַיִּקְרָא
  english_pob_choice: proclaimed
  chosen_spanish: proclamó
  alternatives_spanish:
  - clamó
  - anunció
  - llamó
  lexicon: HALOT
  rationale: En la alusión a 1 Reyes 13, el verbo remite a una declaración profética pública contra el altar. «Proclamó» transmite esa fuerza mejor que «llamó» y evita perder el carácter oracular.
- source_word: הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas palabras
  - estos asuntos
  lexicon: HALOT
  rationale: La expresión puede abarcar tanto las palabras dichas como lo anunciado. «Estas cosas» preserva esa amplitud sin concretar más de lo que permite el hebreo.
- source_word: אֲשֶׁר עָשִׂיתָ
  english_pob_choice: that you have done
  chosen_spanish: que tú has hecho
  alternatives_spanish:
  - que hiciste
  - que tú hiciste
  lexicon: HALOT
  rationale: El pretérito perfecto enlaza la acción reciente de Josías con su relevancia presente y funciona con naturalidad en español.
- source_word: עַל הַמִּזְבַּח
  english_pob_choice: against the altar
  chosen_spanish: contra el altar
  alternatives_spanish:
  - sobre el altar
  - respecto del altar
  lexicon: HALOT
  rationale: La lectura adversativa es coherente con el contexto de denuncia y destrucción; «contra» reproduce mejor esa fuerza que una relación meramente locativa.
- source_word: בֵּית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Betel
  lexicon: HALOT
  rationale: Se adopta la forma tradicional española del topónimo, ampliamente reconocible y fiel a la transliteración hebrea.
theological_decisions:
- issue: Naturaleza de la referencia profética recordada en el versículo
  english_pob_reading: Render וַיִּקְרָא in a way that preserves the man of God's prophetic proclamation without importing extra detail from 1 Kings 13.
  chosen_spanish_reading: «proclamó» conserva la declaración profética pública sin añadir contenido que no aparece explícitamente en el hebreo de este versículo.
  alternative_spanish_readings:
  - «clamó»
  - «anunció»
  - «gritó contra»
  rationale: El texto alude a la profecía anterior contra el altar de Betel; la traducción debe mantener esa referencia sin expandirla. «Proclamó» preserva el acto verbal como anuncio profético y evita resolver la tensión intertextual de manera excesiva.
  doctrine_reference: 'Principio POB: primacía del original y conservación responsable de alusiones intertextuales.'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la decisión auditada del inglés POB, pero adapta el punto de vista y la naturalidad idiomática al español: mantiene el valor deíctico de הַלָּז con «este», conserva la amplitud semántica de הַצִּיּוּן con «monumento», y retiene la alusión profética de וַיִּקְרָא sin sobreexplicar el trasfondo de 1 Reyes 13. No se introdujeron cambios textuales respecto al consenso del registro inglés; solo se ajustó la formulación para lectura pública en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto en el proyecto, pero aquí no aparece en el texto base.
  - «Betel» se usa como topónimo bíblico tradicional.
  - «Hombre de Dios» conserva el título técnico hebreo sin sustituirlo por «profeta».
  - Las comillas angulares se usan en el texto principal conforme a la puntuación española.
