base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/006/003.yaml
  text: So hear[a], Israel, and be careful to do it, that it may go well with you and that you may multiply greatly, just as Yahweh, the God of your fathers, has spoken to you[b], in a land flowing with milk and honey.
  footnotes:
  - marker: a
    text: Or, 'the God of your ancestors.' The Hebrew reads 'your fathers.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'as the LORD, the God of your fathers, promised you, a land flowing with milk and honey.' The Hebrew wording is compressed and can be understood with 'a land flowing with milk and honey' in apposition to what the LORD spoke concerning.
    reason: alternative_reading
