translation:
  language: es
  text: Entonces Moisés y Aarón vinieron ante la[a] Tienda de Reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «a la faz de la Tienda de Reunión».
