base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/006/022.yaml
  text: 'Then King Darius ordered a search to be made in the archives kept in Babylon[a], and in Ecbatana, the fortress in the land of Media[b], a scroll was found in which these things had been recorded:'
  footnotes:
  - marker: a
    text: Or 'the citadel' for 'the fortress' (Greek τῇ βάρει), referring to the fortified administrative center at Ecbatana.
    reason: lexical_alternative
  - marker: b
    text: Greek literally, 'a place was found in which these things had been recorded,' introducing the contents of the memorandum in the next verse.
    reason: lexical_alternative
