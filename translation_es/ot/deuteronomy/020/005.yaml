  - severity: low
    issue: «¿Qué hombre es el que…?» suena menos natural que alternativas más fluidas.
    rationale: Aunque no es infiel, en español general y bíblico moderno «¿Quién es el hombre que…?» comunica mejor la misma estructura sin rigidez innecesaria.
