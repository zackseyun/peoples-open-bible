  rationale: Se corrige «con él» a «con ello» para reflejar mejor el referente metafórico no personal del cedro/Asiria, en línea con el inglés auditado «with it». Se corrige «a los heridos a espada» a «a los muertos a espada» porque חַלְלֵי חָרֶב denota a los caídos/muertos por la espada. Se conserva «Seol», «su brazo», «su sombra» y «entre las naciones» por fidelidad al hebreo y a las decisiones documentadas.
