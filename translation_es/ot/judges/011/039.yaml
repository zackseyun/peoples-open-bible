translation:
  language: es
  text: 'Y al cabo de dos meses volvió a su padre[a], y él hizo con ella conforme al voto que había hecho. Ahora bien, ella no había conocido a ningún varón[b]. Y esto llegó a ser estatuto en Israel:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él ejecutó sobre ella el voto que había hecho». Los intérpretes difieren sobre si esto significa que Jefté la sacrificó o que la dedicó a la virginidad perpetua; el hebreo aquí no resuelve explícitamente la cuestión.'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «no había conocido a un varón», un modismo hebreo que indica que no había tenido relaciones sexuales.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקֵּץ שְׁנַיִם חֳדָשִׁים
  english_pob_choice: at the end of two months
  chosen_spanish: al cabo de dos meses
  alternatives_spanish:
  - después de dos meses
  - al final de dos meses
  lexicon: HALOT
  rationale: מִקֵּץ señala el término o culminación de un período. En español, «al cabo de dos meses» comunica con naturalidad ese cierre temporal sin perder la idea de límite del plazo.
- source_word: וַתָּשָׁב אֶל אָבִיהָ
  english_pob_choice: she returned to her father
  chosen_spanish: volvió a su padre
  alternatives_spanish:
  - regresó a su padre
  - volvió donde su padre
  lexicon: HALOT
  rationale: שׁוּב expresa retorno. Mantengo «a su padre» porque el hebreo nombra explícitamente el destino relacional, y en español resulta claro y sobrio.
- source_word: וַיַּעַשׂ לָהּ אֶת נִדְר֖וֹ אֲשֶׁר נָדָר
  english_pob_choice: he did to her according to his vow that he had vowed
  chosen_spanish: él le hizo según su voto que había hecho
  alternatives_spanish:
  - él cumplió con ella el voto que había hecho
  - él ejecutó en ella el voto que había hecho
  lexicon: HALOT
  rationale: Conservo la dureza del hebreo עשה + נדר sin resolverla con una paráfrasis devocional. «Le hizo según su voto» mantiene la ambigüedad textual sobre la manera exacta del cumplimiento.
- source_word: וְהִיא לֹא יָדְעָה אִישׁ
  english_pob_choice: Now she had not known a man
  chosen_spanish: ella no había conocido varón
  alternatives_spanish:
  - ella no había tenido relaciones con un hombre
  - era virgen
  lexicon: HALOT
  rationale: «Conocer varón» preserva el idiomatismo hebreo de יָדַע + אִישׁ para relaciones sexuales, sin sustituirlo por una explicación interpretativa que cierre la tensión narrativa.
- source_word: חֹק
  english_pob_choice: statute
  chosen_spanish: estatuto
  alternatives_spanish:
  - costumbre
  - ordenanza
  lexicon: HALOT
  rationale: Dado que la revisión inglesa decidió «statute» y el contexto apunta a una práctica establecida con peso normativo, «estatuto» reproduce mejor ese matiz formal que «costumbre».
- source_word: וַתְּהִי חֹק בְּיִשְׂרָאֵל
  english_pob_choice: it became a statute in Israel
  chosen_spanish: Y esto llegó a ser estatuto en Israel
  alternatives_spanish:
  - y se convirtió en estatuto en Israel
  - y llegó a ser una norma en Israel
  lexicon: HALOT
  rationale: «Llegó a ser estatuto» conserva el valor narrativo de וַתְּהִי y el resultado social duradero. «Esto» refiere al hecho/resultado descrito por el versículo, evitando añadir una interpretación no explicitada.
theological_decisions:
- issue: Naturaleza del cumplimiento del voto de Jefté
  english_pob_reading: The translation preserves the Hebrew's ambiguity/directness without softening it into a specific interpretive conclusion beyond the text.
  chosen_spanish_reading: La traducción conserva la ambigüedad y la crudeza del hebreo sin decidir en el texto principal si Jefté la sacrificó o la dedicó a virginidad perpetua.
  alternative_spanish_readings:
  - La ofreció como holocausto
  - La dedicó a virginidad y servicio permanentes
  rationale: El hebreo dice únicamente que «le hizo según su voto» y luego añade que ella no había conocido varón. Como este pasaje sostiene una disputa interpretativa histórica, el español principal no debe resolverla por adelantado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor de חֹק en el cierre narrativo
  english_pob_reading: it became a statute in Israel
  chosen_spanish_reading: se entiende como un estatuto/ordenanza de carácter establecido en Israel, no simplemente una costumbre casual.
  alternative_spanish_readings:
  - costumbre
  - norma
  rationale: La revisión inglesa prioriza «statute», y el hebreo חֹק puede abarcar una disposición establecida con autoridad. Por eso el español usa «estatuto» para no rebajar el peso formal del término.
  doctrine_reference: Lexical consistency with the audited English revision and HALOT contextual range.
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió «custom» por «statute» para reflejar más de cerca חֹק. La redacción española toma en cuenta esa revisión y evita una equivalencia demasiado suave. También conserva la ambigüedad central del versículo sobre el voto de Jefté, en línea con la nota auditada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - «Varón» se usa para conservar el idiomatismo bíblico y la correspondencia con el hebreo אִישׁ.
  - La puntuación sigue el ritmo de cláusulas breves del hebreo y mantiene la tensión narrativa final con dos puntos.
