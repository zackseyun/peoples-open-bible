  glossary_alignment: 'No hay conflicto con el glosario troncal: no aparece Yahvé, Mesías, etc. La elección de «hijos» para בני está alineada con la política de lenguaje filial masculino del POB. «Dios vivo» es terminología bíblica normal y fiel para אֵל חָי.'
