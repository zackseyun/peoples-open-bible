id: REV.6.6
reference: 'Revelation 6:6'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ ἤκουσα ⸀ὡς φωνὴν ἐν μέσῳ τῶν τεσσάρων ζῴων λέγουσαν· Χοῖνιξ σίτου δηναρίου, καὶ τρεῖς χοίνικες ⸀κριθῶν δηναρίου· καὶ τὸ ἔλαιον καὶ τὸν οἶνον μὴ ἀδικήσῃς.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/006/006.yaml
  text: 'And I heard what seemed to be a voice in the midst of the four living creatures[a], saying, “A quart of wheat for a denarius, and three quarts of barley for a denarius[c][b]; and do not harm the oil and the wine.”'
  footnotes:
  - marker: a
    text: A denarius was typically a day's wage for a laborer; the prices here depict severe scarcity.
    reason: cultural_note
  - marker: b
    text: Greek χοῖνιξ, a dry measure roughly equivalent to a quart (about a liter), often understood as about a person's daily grain ration.
    reason: cultural_note
  - marker: c
    text: Or “do not damage” the oil and the wine.
    reason: lexical_alternative
translation:
  language: ko
  text: '또 내가 네 생물 가운데서 나는 음성과 같은 것을 들었는데, 말하기를, 「밀 한 코이닉스에 한 데나리온이요, 보리 세 코이닉스에 한 데나리온이라. 또 너는 기름과 포도주를 해하지 말라」 하였습니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: χοῖνιξ / δηνάριον
  english_pob_choice: quart / denarius
  chosen_korean: 코이닉스 / 데나리온
  alternatives_korean:
  - 됫박/하루 품삯
  lexicon: BDAG
  rationale: 고대의 도량형과 화폐 단위를 음역으로 보존하여 본문의 시대적 무게를 살린다. 본문 자체의 가격 대비(밀 1코이닉스 = 보리 3코이닉스 = 1데나리온)가 기근의 심각함을 가리킨다.
