revisions:
- from: Estate ahora con tus encantamientos[a] y con la multitud de tus hechicerías, en las cuales te has fatigado desde tu juventud; quizá podrás sacar provecho[b], quizá podrás infundir terror.
  to: Ponte ahora en pie con tus encantamientos[a] y con la multitud de tus hechicerías, en las que te has fatigado desde tu juventud; quizá podrás sacar provecho, quizá podrás infundir terror[b].
  rationale: Se ajusta el imperativo a una expresión española natural y digna («Ponte ahora en pie») que conserva la imagen verbal del hebreo y su tono irónico. También se corrige la ubicación de la nota [b] para que corresponda a תַּעֲרוֹצִי, y se aligera ligeramente la relativa para mejor fluidez.
  reviewer_model: gpt-5.4
