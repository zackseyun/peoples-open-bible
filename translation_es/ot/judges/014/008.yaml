    text: O, de manera más explícita, «casarse con ella».
    reason: lexical_alternative
  revision_rationale: Se corrige «bandada» a «enjambre» para reflejar con precisión el hebreo עֲדַת דְּבוֹרִים y el español idiomático. También se suaviza la puntuación para una lectura más natural, sin alterar el sentido. Se conserva «tomarla» con nota por fidelidad a לְקַחְתָּהּ y a la auditoría inglesa.
