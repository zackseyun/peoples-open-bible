    text: 'Hebreo: «ante cuya presencia he estado/de pie». El giro también puede implicar servicio profético: «a quien sirvo».'
    reason: lexical_alternative
  - marker: b
    text: O «si no fuera por Josafat, rey de Judá, a quien considero». El hebreo usa un modismo con «levantar el rostro», que significa mostrar favor o consideración.
    reason: lexical_alternative
  revision_rationale: Se corrige «me he puesto» a «ante quien estoy» para preservar mejor la imagen idiomática y sonar natural en español. Se reemplaza «por la presencia de Josafat» por «porque tengo consideración por Josafat» para reflejar el modismo hebreo documentado en el audit trail. Se elimina la nota innecesaria sobre «dijo» y se conservan solo las notas léxicamente útiles.
