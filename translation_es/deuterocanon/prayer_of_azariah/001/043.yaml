translation:
  language: es
  text: Bendecid al Señor[a], fuego y calor; cantad alabanzas y exaltadlo grandemente por los siglos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «calor abrasador» para el griego καῦμα.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Alabad
  lexicon: BDAG
  rationale: El imperativo plural mantiene el tono litúrgico del original. «Bendecid» conserva mejor el valor de hablar bien del Señor que un «alabad» más general.
- source_word: πῦρ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  lexicon: LSJ
  rationale: Es la equivalencia directa y natural en español para el elemento creado invocado en el llamado a bendecir.
- source_word: καῦμα
  english_pob_choice: heat
  chosen_spanish: calor
  alternatives_spanish:
  - ardor
  - calor abrasador
  lexicon: LSJ
  rationale: «Calor» preserva la distinción con πῦρ sin duplicar la misma idea; en español resulta más natural que una paráfrasis más explicativa.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Maestro
  lexicon: BDAG
  rationale: Sigue la convención del proyecto para κύριος en este contexto litúrgico griego. «Señor» comunica la referencia divina sin introducir el nombre hebreo donde el griego no lo explicita.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cantadle alabanzas
  alternatives_spanish:
  - entonad alabanzas
  - cantad salmos
  lexicon: BDAG
  rationale: El verbo apunta a alabar con canto; «cantadle alabanzas» expresa esa fuerza de modo claro y solemne en español.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo grandemente
  alternatives_spanish:
  - exaltadlo muy alto
  - levantadlo en alto
  lexicon: BDAG
  rationale: «Grandemente» conserva el intensificador del griego sin sonar forzado; mantiene la idea de elevarlo por encima de todo.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: «Por los siglos» reproduce el matiz idiomático plural del griego y funciona bien en un registro bíblico sin convertir automáticamente la fórmula en una expansión fija.
theological_decisions:
- issue: Uso de «Señor» para κύριος en un himno de alabanza de la creación
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Dueño
  rationale: Aunque el proyecto usa «Yahvé» para יהוה cuando el texto fuente lo permite, aquí el griego presenta κύριος en un contexto litúrgico directo. Mantener «el Señor» evita atribuir explícitamente el tetragrámaton donde la capa griega no lo escribe.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: El testimonio griego y el audit trail inglés están en alto acuerdo; no se requieren revisiones textuales ni ajustes de sentido. La nota inglesa para καῦμα se refleja en español con una alternativa breve y natural.
  spanish_consistency_notes:
  - Se mantiene el registro litúrgico y exhortativo del original.
  - No se introduce «Yahvé» porque la forma fuente inmediata es κύριος en griego.
  - «Bendecid» conserva el paralelo formal con el imperativo plural del griego.
  - La clausula final conserva el valor durativo idiomático de εἰς τοὺς αἰῶνας sin sobreexpansión.
