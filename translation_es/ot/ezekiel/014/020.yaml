translation:
  language: es
  text: Aun si Noé[a], Daniel y Job estuvieran en medio de ella, vivo yo, declara el Señor Yahvé, no librarían ni hijo ni hija; por su justicia librarían solo a sí mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo דנאל también puede leerse «Danel», quizá un antiguo personaje justo distinto del Daniel bíblico conocido.
    reason: alternative_reading
lexical_decisions:
- source_word: וְנֹחַ דנאל וְאִיּוֹב
  english_pob_choice: Even if Noah, Daniel, and Job were in it
  chosen_spanish: Aun si Noé, Daniel y Job estuvieran en medio de ella
  alternatives_spanish:
  - Aunque Noé, Daniel y Job estuvieran en ella
  - Aun si Noé, Danel y Job estuvieran en medio de ella
  lexicon: HALOT
  rationale: La construcción condicional concesiva se expresa bien con «Aun si». «En medio de ella» conserva la idea locativa de בְּתוֹכָהּ con un español natural y mantiene el referente femenino implícito del contexto. Se conserva «Daniel» en el texto principal, siguiendo la decisión auditada en inglés, mientras que «Danel» se documenta como alternativa textual.
- source_word: בְּתוֹכָהּ
  english_pob_choice: in it
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - en ella
  - dentro de ella
  lexicon: HALOT
  rationale: La preposición y el sustantivo apuntan a estar dentro del ámbito del juicio al que remite el contexto. «En medio de ella» preserva la fuerza locativa con un matiz idiomático claro en español.
- source_word: חַי אָנִי נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: as I live, declares the Lord GOD
  chosen_spanish: vivo yo, declara Yahvé, el Señor
  alternatives_spanish:
  - tan cierto como que vivo, declara Yahvé, el Señor
  - vivo yo, dice el Señor Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula solemne de juramento con «vivo yo». Según los criterios del proyecto, יְהוָה se rinde como «Yahvé». Para אֲדֹנָי יְהוִה, «Yahvé, el Señor» conserva ambos elementos del título compuesto sin ocultar el nombre divino.
- source_word: אִם בֵּן אִם בַּת
  english_pob_choice: neither son nor daughter
  chosen_spanish: ni hijo ni hija
  alternatives_spanish:
  - ni un hijo ni una hija
  - sea hijo o hija
  lexicon: HALOT
  rationale: En este contexto forense/de juicio, la coordinación negativa expresa mejor el alcance de la exclusión que una paráfrasis distributiva. «Hijo» y «hija» son naturales y fieles al hebreo.
- source_word: יַצִּילוּ
  english_pob_choice: would deliver
  chosen_spanish: librarían
  alternatives_spanish:
  - rescatarían
  - salvarían
  lexicon: HALOT
  rationale: El Hifil de נצל aquí apunta a sacar de peligro o juicio. «Librar» preserva ese valor de rescate sin cargar la frase con connotaciones ajenas.
- source_word: בְצִדְקָתָם
  english_pob_choice: by their righteousness
  chosen_spanish: por su justicia
  alternatives_spanish:
  - por su rectitud
  - a causa de su justicia
  lexicon: HALOT
  rationale: La preposición ב expresa base o medio. «Justicia» conserva la fuerza moral y judicial del término, y el singular abstracto funciona naturalmente en español.
- source_word: נַפְשָׁם
  english_pob_choice: themselves
  chosen_spanish: a sí mismos
  alternatives_spanish:
  - sus propias vidas
  - solo ellos mismos
  lexicon: HALOT
  rationale: En este contexto נֶפֶשׁ se refiere a la persona/vida preservada del juicio, no a «alma» en sentido moderno. «A sí mismos» reproduce bien el énfasis de que solo ellos quedarían a salvo.
theological_decisions:
- issue: Rendering of the divine name in אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé, el Señor
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: 'Se sigue la norma del proyecto de no enmascarar יְהוָה con una sustitución como «SEÑOR». Al mismo tiempo, el compuesto אֲדֹנָי יְהוִה se refleja de manera audible como una doble designación: «Yahvé, el Señor».'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La traducción sigue de cerca el texto hebreo, mantiene la tensión documentada sobre דנאל/Daniel y adopta el nombre divino «Yahvé» conforme a la pauta del proyecto. No se introdujeron revisiones adicionales respecto del pasaje base inglés.
  spanish_consistency_notes:
  - Se mantuvo el referente femenino singular de בְּתוֹכָהּ con «ella», en armonía con el contexto de Jerusalén/la ciudad bajo juicio.
  - «Librar» se usó de manera consistente para יַצִּילוּ, evitando alternar con «salvar» o «rescatar» dentro del mismo verso.
  - «Justicia» traduce צִדְקָה de forma uniforme y compatible con el lenguaje judicial del pasaje.
  - El nombre divino se expresó con «Yahvé» en lugar de la convención litúrgica «SEÑOR», según la terminología del proyecto.
