translation:
  language: es
  text: Ustedes son la luz del mundo[a]. Una ciudad puesta sobre un monte no puede ocultarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Una ciudad situada sobre una montaña no puede ocultarse».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑμεῖς
  english_pob_choice: You
  chosen_spanish: Ustedes
  alternatives_spanish:
  - Vosotros
  - Tú
  lexicon: BDAG
  rationale: El pronombre plural explícito del griego se conserva en español con una forma natural de trato directo plural. "Ustedes" comunica bien la dirección inmediata a los discípulos sin sonar regionalmente restringido.
- source_word: τὸ φῶς
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: BDAG
  rationale: El artículo griego se refleja de manera natural con "la luz", manteniendo la identificación metafórica definida que el contexto otorga a los discípulos.
- source_word: τοῦ κόσμου
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - para el mundo
  lexicon: BDAG
  rationale: '"Mundo" conserva el sentido amplio de orden humano/mundo creado. El genitivo se expresa de forma directa con "del mundo", sin añadir una lectura funcional que el griego no exige.'
- source_word: οὐ δύναται
  english_pob_choice: cannot
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  lexicon: BDAG
  rationale: El valor de imposibilidad se vierte con la negación + poder, que es la forma más natural en español y preserva el sentido de incapacidad expresado por δύναται.
- source_word: πόλις
  english_pob_choice: A city
  chosen_spanish: Una ciudad
  alternatives_spanish:
  - Un pueblo
  - Una villa
  lexicon: BDAG
  rationale: '"Ciudad" es la equivalencia estándar y más reconocible para πόλις; "pueblo" o "villa" introducirían un matiz menor que no está solicitado por el texto.'
- source_word: κρυβῆναι
  english_pob_choice: be hidden
  chosen_spanish: ocultarse
  alternatives_spanish:
  - ser ocultada
  - esconderse
  lexicon: BDAG
  rationale: El infinitivo pasivo de κρύπτω se expresa en español de modo natural con la idea de no quedar oculta. "Ocultarse" resume bien la imposibilidad pasiva sin forzar una pasiva perifrástica menos idiomática.
- source_word: ἐπάνω ὄρους
  english_pob_choice: on a hill
  chosen_spanish: sobre un monte
  alternatives_spanish:
  - sobre una colina
  - en un monte
  lexicon: BDAG
  rationale: Aunque el audit trail inglés opta por "hill" por idiomaticidad, el griego λέει literalmente "sobre un monte". En español, "monte" conserva mejor ὄρος y mantiene la imagen elevada sin rebajarla necesariamente a "colina".
- source_word: κειμένη
  english_pob_choice: set
  chosen_spanish: puesta
  alternatives_spanish:
  - situada
  - colocada
  - yacente
  lexicon: BDAG
  rationale: El participio de κεῖμαι describe la condición de estar situada/puesta. "Puesta" es breve, idiomática y compatible con la imagen de una ciudad asentada en altura, sin añadir interpretación.
theological_decisions:
- issue: Identificación metafórica de los discípulos como luz
  english_pob_reading: Retained the direct metaphor 'You are the light of the world' without interpretive expansion.
  chosen_spanish_reading: 'Se mantiene la metáfora directa: "Ustedes son la luz del mundo".'
  alternative_spanish_readings:
  - Ustedes son luz para el mundo
  - Ustedes representan la luz del mundo
  rationale: La traducción conserva la afirmación metafórica sin expandirla. No se introduce una explicación doctrinal ni una paráfrasis que diluya la fuerza del pronunciamiento.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones posteriores relevantes. La única decisión notable para el español fue conservar la metáfora directa y reflejar ὄρος con «monte» para mantener el relieve del original, mientras que κειμένη se tradujo con una forma breve y natural («puesta»).
  spanish_consistency_notes:
  - Se mantiene el tratamiento plural de segunda persona con "Ustedes" para concordar con el pronombre explícito griego.
  - '"Mundo" se usa en sentido amplio y no se reemplaza por una paráfrasis como "sociedad" o "humanidad".'
  - No se usa "SEÑOR" ni terminología teológica ajena al versículo.
  - La nota al pie ofrece la alternativa lexical de "montaña" sin alterar el texto principal.
