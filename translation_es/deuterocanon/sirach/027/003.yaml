translation:
  language: es
  text: Si no se mantiene firme con diligencia en el temor del Señor[a], su casa será derribada rápidamente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su casa será rápidamente arruinada». El griego «casa» puede referirse no solo a un edificio, sino también a la familia o al establecimiento doméstico de una persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν μὴ
  english_pob_choice: If ... does not
  chosen_spanish: Si no
  alternatives_spanish:
  - a menos que
  - salvo que
  lexicon: BDAG
  rationale: La construcción condicional negativa se expresa de manera natural en español con «si no», preservando la prótasis sin convertirla en una paráfrasis más libre.
- source_word: ἐν φόβῳ Κυρίου
  english_pob_choice: in the fear of the Lord
  chosen_spanish: al temor del Señor
  alternatives_spanish:
  - en el temor del Señor
  - con temor del Señor
  lexicon: BDAG
  rationale: La expresión bíblica se mantiene como fórmula tradicional de sabiduría; «al temor» suena más natural que un calco rígido y conserva la idea de esfera o ámbito en el que se vive.
- source_word: Κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Yahvé
  lexicon: BDAG
  rationale: Aunque en el proyecto el nombre divino suele renderizarse como «Yahvé», aquí el griego κύριος forma parte de la locución fija «temor del Señor» y el contexto griego de Sirácides favorece mantener «Señor» como equivalente auditado de la tradición griega.
- source_word: κρατήσῃ
  english_pob_choice: hold fast
  chosen_spanish: se aferra
  alternatives_spanish:
  - se mantenga firme
  - retenga firmemente
  - se sujete
  lexicon: BDAG
  rationale: κρατέω transmite idea de sujetarse con firmeza; «aferrarse» comunica bien la tenacidad requerida sin perder la fuerza verbal.
- source_word: κατὰ σπουδήν
  english_pob_choice: with diligence
  chosen_spanish: con diligencia
  alternatives_spanish:
  - con empeño
  - con seriedad
  - con celo
  lexicon: BDAG
  rationale: La revisión inglesa enfatiza la fuerza de σπουδή; «con diligencia» conserva el matiz de aplicación seria y cuidadosa, en español natural y sobrio.
- source_word: ἐν τάχει
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - pronto
  - en seguida
  - de inmediato
  lexicon: BDAG
  rationale: La rapidez del derrumbe se expresa de forma directa con «rápidamente», manteniendo el valor adverbial del griego.
- source_word: καταστραφήσεται
  english_pob_choice: will be overthrown
  chosen_spanish: será derribada
  alternatives_spanish:
  - será destruida
  - será arruinada
  - será abatida
  lexicon: BDAG
  rationale: El pasivo futuro comunica caída o ruina. «Será derribada» conserva la imagen vívida de ser echada abajo y funciona bien con «casa» en español.
- source_word: αὐτοῦ ὁ οἶκος
  english_pob_choice: his house
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su familia
  - su casa y su casa-linaje
  lexicon: BDAG
  rationale: «Οἶκος» puede referirse a casa física o a la casa en sentido de hogar/linaje. «Su casa» preserva la ambigüedad del griego y la imagen principal sin restringir el alcance.
theological_decisions:
- issue: Temor del Señor
  english_pob_reading: Retain the traditional biblical idiom as reverent fear toward God, without paraphrasing it into 'piety' or 'reverence' alone.
  chosen_spanish_reading: Mantener «temor del Señor» como locución bíblica de sabiduría, sin reducirla a una sola idea como «reverencia».
  alternative_spanish_readings:
  - reverencia al Señor
  - devoción al Señor
  - respeto al Señor
  rationale: La frase tiene peso intertextual y teológico. En español, la expresión tradicional conserva mejor la tensión entre temor real y reverencia obediente que una paráfrasis más explicativa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish without flattening theological weight.'
- issue: Alcance de 'casa'
  english_pob_reading: Leave 'house' in the main text rather than specifying 'family' or 'estate.'
  chosen_spanish_reading: Dejar «casa» en el texto principal, sin especificar «familia» o «patrimonio».
  alternative_spanish_readings:
  - hogar
  - familia
  - linaje
  - patrimonio
  rationale: El griego οἶκος permite más de una referencia. La traducción conserva esa amplitud para no cerrar indebidamente el sentido de la advertencia sapiencial.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve ambiguity where the source is genuinely broad.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al reflejar κατὰ σπουδήν con «con diligencia» y conserva la ambigüedad de οἶκος con «casa», como en el texto auditado. Se evitó resolver el matiz hacia «familia» en el cuerpo principal para mantener la misma prudencia interpretativa del POB inglés.
  spanish_consistency_notes:
  - Se mantuvo la fórmula bíblica «temor del Señor» por su estabilidad intertextual en español.
  - «Su casa» conserva la polisemia de οἶκος y permite la nota alternativa sin estrechar el sentido.
  - El orden de la cláusula principal sigue el patrón del griego y del audit trail inglés, pero con sintaxis natural en español.
  - Se prefirió vocabulario sobrio y eclesialmente amplio, sin arcaísmos innecesarios.
