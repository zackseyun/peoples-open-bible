  text: Οἴδαμεν γὰρ ὅτι ὁ νόμος πνευματικός ἐστιν· ἐγὼ δὲ ⸀σάρκινός εἰμι, πεπραμένος ὑπὸ τὴν ἁμαρτίαν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/007/014.yaml
  text: For we know that the law is spiritual[a], but I am fleshly[b], sold under sin.
translation:
  language: ko
  text: 우리는 율법이 영적인 것임을 압니다. 그러나 나는 육체에 속한 자이며, 죄 아래 팔린 자입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πνευματικός
  english_pob_choice: spiritual
  chosen_korean: 영적인
  lexicon: BDAG
  rationale: 표준.
- source_word: σάρκινός
  english_pob_choice: fleshly
  chosen_korean: 육체에 속한 자
  alternatives_korean:
  - 육적인
  - 육체로 된
  lexicon: BDAG
  rationale: σάρκινος(-ινος 접미사는 「~의 재료/본성으로 된」)의 강한 인격적 정체성 진술. 본 과제 정책에 따라 「나는 육체에 속한 자입니다」로 옮겨 바울의 자기 진단의 무게를 보존.
- source_word: πεπραμένος ὑπὸ τὴν ἁμαρτίαν
  english_pob_choice: sold under sin
  chosen_korean: 죄 아래 팔린 자
  lexicon: BDAG
  rationale: 노예 시장 은유. 6장의 노예 수사를 잇는 강한 표현. 「팔린 자」 직역 보존.
theological_decisions:
- issue: σάρκινός εἰμι의 번역과 7장 「나」의 정체
  chosen_reading: 「나는 육체에 속한 자입니다」
  alternative_readings:
  - 「나는 육신적입니다」
  - 「나는 육체의 본성을 지닌 자입니다」
  rationale: σάρκινος는 σαρκικός(육적·육신에 매인)와 구별되는 강한 어휘로, 「본질적으로 육체로 빚어진」을 함의한다. 본문의 자기 진단의 무게를 보존하기 위해 「육체에 속한 자입니다」로 옮긴다. 7:14-25의 「나」가 회심 전 유대인의 회고인지, 신자의 현재 갈등인지는 본문이 결정짓지 않으므로 본문은 양쪽 해석에 열려 있다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension; original-language primacy'
