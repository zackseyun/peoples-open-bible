translation:
  language: es
  text: Hizo lazos de hilo azul en el borde de la primera cortina al extremo del primer conjunto unido[a]; de la misma manera los hizo en el borde de la cortina más exterior del segundo conjunto unido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la unión» / «en el acoplamiento». El término hebreo se refiere al lugar o disposición donde las cortinas se unían.
    reason: lexical_alternative
lexical_decisions:
- source_word: לֻלְאֹת
  english_pob_choice: loops
  chosen_spanish: lazadas
  alternatives_spanish:
  - bucles
  - lazos
  - argollas
  lexicon: HALOT
  rationale: En este contexto de confección del tabernáculo, el término se refiere a piezas textiles para unir cortinas. «Lazadas» comunica bien la idea de una forma hecha en la tela para enlazar, sin forzar un objeto metálico como «argollas».
- source_word: תְּכֵלֶת
  english_pob_choice: blue yarn
  chosen_spanish: hilo azul
  alternatives_spanish:
  - hilo de color azul
  - lana azul
  - hilo teñido de azul
  lexicon: HALOT
  rationale: El hebreo apunta al material textil teñido, no solo al color abstracto. «Hilo azul» conserva la referencia al material y su color de manera natural en español.
- source_word: שְׂפַת
  english_pob_choice: edge
  chosen_spanish: borde
  alternatives_spanish:
  - orilla
  - extremo
  - canto
  lexicon: HALOT
  rationale: Para una cortina, «borde» expresa de forma clara y idiomática la parte periférica donde van las lazadas.
- source_word: הַיְרִיעָה
  english_pob_choice: curtain
  chosen_spanish: cortina
  alternatives_spanish:
  - panel
  - telón
  - lona
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, יְרִיעָה designa una cortina o paño de cobertura. «Cortina» es la opción más clara y fiel en español moderno.
- source_word: הָאֶחָת
  english_pob_choice: the first
  chosen_spanish: la primera
  alternatives_spanish:
  - la una
  - la única
  lexicon: HALOT
  rationale: Aquí funciona ordinalmente en contraste con «la segunda» al final del versículo, por lo que «la primera» comunica mejor el sentido.
- source_word: מִקָּצָה
  english_pob_choice: at the end
  chosen_spanish: en el extremo
  alternatives_spanish:
  - al final
  - desde el extremo
  - en el fin
  lexicon: HALOT
  rationale: La expresión ubica las lazadas en la parte terminal de la cortina. «En el extremo» conserva la precisión espacial del hebreo.
- source_word: בַּמַּחְבָּרֶת
  english_pob_choice: in the first set joined together
  chosen_spanish: del primer conjunto unido
  alternatives_spanish:
  - en la unión
  - en el primer conjunto enlazado
  - en el acoplamiento
  lexicon: HALOT
  rationale: El sustantivo indica el lugar o estado de unión de las cortinas. Dado que el español no tiene una correspondencia tan natural como «coupling», se opta por una formulación que expresa el conjunto ya unido. El «primer» se entiende por el contraste con «el segundo».
- source_word: כֵּן עָשָׂה
  english_pob_choice: likewise he made them
  chosen_spanish: así hizo
  alternatives_spanish:
  - de igual modo hizo
  - de la misma manera los hizo
  - así los hizo
  lexicon: HALOT
  rationale: La frase resume una acción paralela en la otra orilla de la cortina. «Así hizo» preserva la correspondencia sin agregar una repetición innecesaria.
- source_word: הַקִּיצוֹנָה
  english_pob_choice: outermost
  chosen_spanish: exterior
  alternatives_spanish:
  - más externa
  - de afuera
  - extrema
  lexicon: HALOT
  rationale: El adjetivo señala la cortina ubicada en el borde exterior del conjunto. «Exterior» comunica bien el valor espacial en español.
- source_word: הַשֵּׁנִית
  english_pob_choice: the second
  chosen_spanish: el segundo conjunto unido
  alternatives_spanish:
  - la segunda
  - el segundo
  - el segundo grupo enlazado
  lexicon: HALOT
  rationale: El hebreo marca una segunda unidad en paralelo a la primera. Añadir «conjunto unido» mantiene visible la idea de las cortinas enlazadas, ya indicada por el contexto y por el término anterior.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido del WLC y el auditorio en inglés: mantiene la estructura paralela del verso, conserva la distinción entre la primera y la segunda unidad de cortinas, y traslada la nota léxica sobre el lugar de unión sin convertirla en una paráfrasis más libre.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para el nombre divino porque el versículo no lo contiene.
  - «Hilo azul» mantiene el valor material de תְּכֵלֶת, coherente con la construcción del tabernáculo.
  - «Lazadas» funciona mejor que un calco como «bucles» para una traducción publicable en español.
  - La nota al pie marca la ambigüedad de מַחְבָּרֶת sin duplicar la idea en el texto principal.
