review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés en casi todos los puntos clave: mantiene ''tus hermanos'', ''la tribu de Leví'', la idea de unirse a Aarón, el servicio levítico y ''la tienda del testimonio'' en vez de armonizar con ''encuentro''. Sin embargo, ''acerca contigo'' suena poco natural en español y no refleja bien la construcción; además, la segunda nota al pie está anclada en ''te sirvan[b]'' pero su contenido trata de ''la tienda del testimonio'', por lo que el anclaje no coincide con la palabra pertinente.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero 'Y también acerca contigo a tus hermanos' resulta forzada; 'haz que se acerquen contigo' o 'haz acercar contigo' mejora la naturalidad y conserva el matiz cultual. 'La tribu de tu padre' es fiel, aunque 'tu tribu paterna' sería más idiomático; no es necesario cambiarlo. También conviene mover la marca [b] a 'testimonio' para respetar la disciplina de notas.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Leví', 'testimonio', 'servir' y el lenguaje de parentesco están alineados con las decisiones auditadas. La preservación de 'tienda del testimonio' es especialmente correcta frente a la alternativa tradicionalizada.
  issues:
  - severity: medium
    issue: '''acerca contigo'' es poco idiomático en español'
    rationale: Aunque intenta reflejar הַקְרֵב אִתָּךְ, en español suena antinatural. Una formulación como 'haz que se acerquen contigo' preserva 'bring near with you' sin calco torpe.
  - severity: medium
    issue: La nota [b] está colocada sobre 'te sirvan' pero explica 'la tienda del testimonio'
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Aquí el contenido de la nota corresponde a 'testimonio'/'tienda del testimonio', no al verbo 'sirvan'.
  revised_spanish_text: Y también haz que se acerquen contigo tus hermanos[a], la tribu de Leví, la tribu de tu padre, para que se unan a ti y te sirvan; y tú y tus hijos contigo estaréis delante de la tienda del testimonio[b].
  revised_footnotes:
