    text: 'Hebreo: ''a comer pan'', es decir, a tomar una comida.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo לֹט designa una resina aromática; su identificación precisa es incierta. También puede traducirse 'mirra'.
    reason: lexical_alternative
  revision_rationale: Se reestructuró la cláusula final para evitar que el gerundio parezca modificar a 'camellos' en vez de a los ismaelitas, preservando así mejor la sintaxis y el sentido del hebreo. Se cambió 'estoraque' por 'goma aromática' para reflejar la cautela léxica documentada para נְכֹאת. Se mantuvieron 'a comer pan', 'he aquí', 'bálsamo' y 'ládano' por fidelidad al expediente y buena legibilidad en español.
