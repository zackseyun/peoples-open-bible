translation:
  language: es
  text: Y capturaron la ciudad y la hirieron[a] con el filo de la espada, junto con su rey, todas sus ciudades y toda persona que había en ella. No dejó sobreviviente, tal como había hecho con Eglón. La consagró a la destrucción, junto con toda persona que había en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «con la boca de la espada»; es un modismo hebreo para el filo o el borde de la espada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכְּדוּהָ
  english_pob_choice: they captured it
  chosen_spanish: capturaron la ciudad
  alternatives_spanish:
  - la tomaron
  - la apresaron
  lexicon: HALOT
  rationale: לכד en contexto militar se refiere a tomar una ciudad por captura. 'Capturaron' conserva el sentido bélico de forma natural en español; 'la ciudad' explicita el referente femenino implícito del pronombre hebreo.
- source_word: וַיַּכּוּהָ
  english_pob_choice: struck it
  chosen_spanish: la atacaron
  alternatives_spanish:
  - la golpearon
  - la hirieron
  lexicon: HALOT
  rationale: נכה es amplio ('golpear', 'herir', 'atacar'). En español, 'atacaron' comunica el acto militar sin forzar una imagen corporal que el contexto ya especifica con 'la punta de la espada'.
- source_word: לְפִי חֶרֶב
  english_pob_choice: with the edge of the sword
  chosen_spanish: con la punta de la espada[a]
  alternatives_spanish:
  - con el filo de la espada
  - a filo de espada
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'la boca de la espada', idiomáticamente el borde/filo. 'Punta' intenta reflejar la imagen concreta y mantener un español claro; se señala en nota que el sentido es idiomático y que el POB inglés optó por 'edge of the sword'.
- source_word: מַלְכָּהּ
  english_pob_choice: its king
  chosen_spanish: su rey
  alternatives_spanish:
  - el rey de la ciudad
  lexicon: HALOT
  rationale: El poseído se refiere al rey de la ciudad capturada. 'Su rey' es la forma más directa y fiel en español; evita añadir una glosa interpretativa al texto principal.
- source_word: כָּל עָרֶיהָ
  english_pob_choice: all its cities
  chosen_spanish: todas sus ciudades
  alternatives_spanish:
  - todos sus pueblos
  - todas sus villas
  lexicon: HALOT
  rationale: עיר aquí corresponde a centros urbanos dependientes. 'Ciudades' sigue el ajuste revisado del POB inglés y conserva mejor la correspondencia léxica que 'pueblos'.
- source_word: כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  english_pob_choice: every person who was in it
  chosen_spanish: toda persona que había en ella
  alternatives_spanish:
  - cada alma que había en ella
  - toda la gente que había en ella
  lexicon: HALOT
  rationale: נפש aquí designa personas, no el alma inmaterial. 'Toda persona' mantiene el valor humano concreto; 'que había en ella' refleja la ubicación dentro de la ciudad sin añadir interpretaciones.
- source_word: לֹא הִשְׁאִיר שָׂרִיד
  english_pob_choice: He left no survivor
  chosen_spanish: No dejó sobreviviente
  alternatives_spanish:
  - No dejó remanente
  - No dejó ninguno con vida
  lexicon: HALOT
  rationale: שָׂרִיד significa sobreviviente o remanente. 'No dejó sobreviviente' es idiomático y preciso en español, manteniendo el tono conciso del hebreo.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה לְעֶגְלוֹן
  english_pob_choice: just as he had done to Eglon
  chosen_spanish: tal como había hecho a Eglón
  alternatives_spanish:
  - según todo lo que había hecho a Eglón
  - como había hecho a Eglón
  lexicon: HALOT
  rationale: La comparación remite a una acción anterior ya narrada. 'Tal como había hecho' preserva la relación comparativa y el tiempo anterior, con el nombre Eglón adaptado a la ortografía española usual.
- source_word: וַיַּחֲרֵם
  english_pob_choice: He devoted it to destruction
  chosen_spanish: La consagró a la destrucción
  alternatives_spanish:
  - La dedicó al anatema
  - La puso bajo ḥerem
  lexicon: HALOT
  rationale: חרם expresa la idea técnica de poner algo bajo ḥerem, dedicado a destrucción en contexto de guerra santa. 'La consagró a la destrucción' conserva el peso religioso-jurídico sin caer en una fórmula opaca; se mantiene la tensión entre consagración y destrucción.
- source_word: וְאֶת כָּל הַנֶּפֶשׁ אֲשֶׁר בָּהּ
  english_pob_choice: along with every person who was in it
  chosen_spanish: junto con toda persona que había en ella
  alternatives_spanish:
  - y toda persona que había en ella
  - incluida toda persona que había en ella
  lexicon: HALOT
  rationale: La repetición final se traduce de forma consistente con la frase anterior. 'Junto con' expresa la inclusión de todos los habitantes en la acción de חרם.
theological_decisions:
- issue: Rendering of חרם in a warfare judgment context
  english_pob_reading: He devoted it to destruction
  chosen_spanish_reading: La consagró a la destrucción
  alternative_spanish_readings:
  - La destruyó por completo
  - La puso bajo anatema
  rationale: El hebreo implica una acción ritual-jurídica de consagración a destrucción, no solo eliminación militar. La forma elegida conserva esa tensión teológica y evita suavizar el concepto.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por una revisión menor: se cambió ''towns'' por ''cities'' para corresponder más de cerca a עָרֶיהָ. En español se siguió esa decisión con ''ciudades''. También se preservó la lectura técnica de חרם con una formulación que mantiene la tensión entre dedicación y destrucción.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' como terminología por defecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se prefirió 'persona' para נפש, en línea con el POB inglés, para evitar la falsa equivalencia con 'alma'.
  - Se mantuvo la referencia masculina singular en 'su rey' y 'No dejó sobreviviente' por la sintaxis del hebreo, donde el verbo singular retoma al sujeto narrativo implícito.
  - Se evitó 'SEÑOR' o un equivalente litúrgico para términos que no aparecen aquí.
  - Se respetó 'ciudades' para עָרֶיהָ siguiendo la revisión auditada del POB inglés.
