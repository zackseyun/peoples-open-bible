revisions:
- from: Él también quemó incienso en el Valle de Ben-hinom[a], y quemó a sus hijos en el fuego, conforme a las abominaciones de las naciones que Yahvé había expulsado de delante de los hijos de Israel.
  to: Él también quemó incienso en el Valle de Ben-hinom[a], y quemó a sus hijos varones en el fuego, conforme a las abominaciones de las naciones que Yahvé había expulsado de delante de los hijos de Israel.
  rationale: Se mantiene la traducción base porque es fiel y legible, pero se corrige «sus hijos» a «sus hijos varones» para preservar la decisión documentada de reflejar el masculino plural específico de בָּנָיו / 'sons'. También se pule la nota al pie para que use una formulación española más natural y coherente con el texto revisado.
