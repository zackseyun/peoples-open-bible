translation:
  language: es
  text: Mis hermanos eran hermosos y altos, pero el Señor no se complació en ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no estuvo complacido con ellos» o «no se agradó de ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos varones
  - hermanos de sexo masculino
  lexicon: BDAG
  rationale: El griego está en plural masculino explícito y el contexto habla de los hermanos de David; en español, "hermanos" comunica de forma natural ese referente sin neutralizar el género.
- source_word: καλοί
  english_pob_choice: handsome
  chosen_spanish: hermosos
  alternatives_spanish:
  - apuestos
  - guapos
  lexicon: LSJ
  rationale: Junto con la descripción física de la estatura, el adjetivo apunta a una apariencia atractiva; "hermosos" preserva el valor descriptivo sin sonar excesivamente coloquial.
- source_word: μεγάλοι
  english_pob_choice: tall
  chosen_spanish: altos
  alternatives_spanish:
  - grandes
  - de gran estatura
  lexicon: LSJ
  rationale: En este contexto corporal, el sentido es de estatura; "altos" es la forma más natural en español para expresar esa idea.
- source_word: οὐκ εὐδόκησεν
  english_pob_choice: did not take pleasure in
  chosen_spanish: no se complació en
  alternatives_spanish:
  - no se agradó de
  - no tuvo agrado en
  - no estuvo complacido con
  lexicon: BDAG
  rationale: '"Complacerse en" conserva el matiz de aprobación o agrado divino sin añadir la idea de elección, que el griego no expresa de manera explícita aquí.'
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  - Yahvé
  lexicon: LSJ
  rationale: Aunque el principio general del proyecto prefiere "Yahvé" para יהוה, aquí el texto griego lee Κύριος. En español, "el Señor" refleja de manera directa el apelativo griego y mantiene la referencia reverente al Dios de Israel.
theological_decisions:
- issue: Alcance de la desaprobación divina
  english_pob_reading: The verse states that the Lord did not take pleasure in them, without specifying further grounds.
  chosen_spanish_reading: El verso dice que el Señor no se complació en ellos, sin explicar más la razón.
  alternative_spanish_readings:
  - el Señor no los eligió
  - el Señor no los favoreció
  rationale: La formulación española conserva la restricción del griego y evita introducir la idea de elección, que pertenece a pasajes relacionados pero no a esta línea en sí.
  doctrine_reference: Preservar la tensión textual y no resolverla con material paralelo.
translation_notes:
  revision_awareness: Se alineó el marcador de nota con la frase completa que la nota alternativa modifica, siguiendo la revisión del registro inglés donde el marcador fue movido al final de la cláusula relevante.
  spanish_consistency_notes:
  - Se mantuvo "Señor" para Κύριος, en coherencia con el griego fuente de este versículo.
  - Se evitó "Cristo" y cualquier lenguaje de elección no presente explícitamente en el texto griego.
  - La nota alternativa se colocó sobre la cláusula verbal completa para reflejar correctamente el alcance semántico de εὐδόκησεν.
