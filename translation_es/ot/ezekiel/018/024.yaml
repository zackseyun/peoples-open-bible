translation:
  language: es
  text: Pero cuando el justo se aparta de su justicia y comete injusticia[a], haciendo todas las abominaciones que hace el malvado, ¿vivirá? Ninguna de sus obras justas será recordada. En la infidelidad[b] con que ha sido infiel, y en el pecado que ha cometido, en ellos morirá[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘todas las cosas detestables’.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como ‘deslealtad’ o ‘traición’; el hebreo subraya una ruptura de fidelidad mediante un par sustantivo-verbo relacionado.
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: ‘en ellos morirá’, refiriéndose a la infidelidad y al pecado mencionados inmediatamente antes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְשׁוּב
  english_pob_choice: But when ... turns away
  chosen_spanish: Pero cuando ... se aparta
  alternatives_spanish:
  - Y cuando ... vuelve
  - Pero cuando ... se vuelve atrás
  lexicon: HALOT
  rationale: La construcción temporal-condicional introduce contraste con el contexto previo. ‘Pero cuando’ preserva el giro adversativo; ‘se aparta’ expresa bien el valor de שׁוּב con מן como alejamiento de un estado previo.
- source_word: צַדִּיק
  english_pob_choice: a righteous man
  chosen_spanish: el justo
  alternatives_spanish:
  - un hombre justo
  - una persona justa
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivamente. En español, ‘el justo’ conserva la fuerza representativa y evita añadir innecesariamente ‘hombre’ donde el sustantivo ya está implícito.
- source_word: מִצִּדְקָתוֹ
  english_pob_choice: from his righteousness
  chosen_spanish: de su justicia
  alternatives_spanish:
  - de su rectitud
  - de su conducta justa
  lexicon: HALOT
  rationale: ‘Justicia’ mantiene el vínculo léxico con צַדִּיק y el campo moral/judicial del texto. ‘De’ refleja adecuadamente la preposición מן.
- source_word: וְעָשָׂה עָוֶל
  english_pob_choice: and does injustice
  chosen_spanish: y hace injusticia
  alternatives_spanish:
  - y comete iniquidad
  - y obra mal
  lexicon: HALOT
  rationale: ‘Hace injusticia’ reproduce con naturalidad עשה + sustantivo y conserva la fuerza activa del hebreo sin recurrir a un arcaísmo como ‘iniquidad’.
- source_word: כְּכֹל הַתּוֹעֵבוֹת
  english_pob_choice: all the abominations
  chosen_spanish: todas las abominaciones
  alternatives_spanish:
  - todas las cosas detestables
  - toda clase de actos abominables
  lexicon: HALOT
  rationale: ‘Abominaciones’ preserva el peso moral y la resonancia intertextual de תּוֹעֵבוֹת en Ezequiel.
- source_word: הָרָשָׁע
  english_pob_choice: the wicked man
  chosen_spanish: el malvado
  alternatives_spanish:
  - el impío
  - el perverso
  lexicon: HALOT
  rationale: El adjetivo es sustantivo y contrasta con ‘el justo’. ‘El malvado’ es claro y mantiene el contraste moral sin sobrecargar el español.
- source_word: יַעֲשֶׂה וָחָי
  english_pob_choice: doing ... will he live?
  chosen_spanish: ¿vivirá?
  alternatives_spanish:
  - ¿y vivirá?
  - ¿podrá vivir?
  lexicon: HALOT
  rationale: La pregunta retórica en contexto se entiende con fuerza en español como ‘¿vivirá?’. La forma breve conserva el impacto judicial del hebreo.
- source_word: כָּל צִדְקֹתָו
  english_pob_choice: None of the righteous deeds
  chosen_spanish: Ninguna de sus obras justas
  alternatives_spanish:
  - Ninguna de sus justicias
  - Ninguno de sus actos justos
  lexicon: HALOT
  rationale: El distributivo negado se expresa de forma natural con ‘Ninguna de sus obras justas’, evitando una lectura colectiva y manteniendo el sentido de actos concretos.
- source_word: לֹא תִזָּכַרְנָה
  english_pob_choice: will be remembered
  chosen_spanish: será recordada
  alternatives_spanish:
  - serán recordadas
  - será tenida en cuenta
  lexicon: HALOT
  rationale: El verbo refleja el pasivo/niﬁal de זכר. Se eligió singular en español para concordar con ‘ninguna ... obra’, conservando el sentido de memoria judicial.
- source_word: בְּמַעֲל֧וֹ אֲשֶׁר מָעַל
  english_pob_choice: In the treachery by which he has acted treacherously
  chosen_spanish: En la traición con que ha actuado con traición
  alternatives_spanish:
  - En su infidelidad con que ha sido infiel
  - En la deslealtad con que ha obrado deslealmente
  lexicon: HALOT
  rationale: El par sustantivo-verbo de מעל expresa ruptura de fidelidad. ‘Traición’ conserva la intensidad relacional y judicial; la repetición ‘actuado con traición’ deja visible el énfasis del hebreo.
- source_word: וּבְחַטָּאתוֹ אֲשֶׁר חָטָא
  english_pob_choice: and in the sin that he has committed
  chosen_spanish: y en el pecado que ha cometido
  alternatives_spanish:
  - y en su pecado que ha pecado
  - y en la falta que ha cometido
  lexicon: HALOT
  rationale: ‘Pecado’ es el equivalente directo y sobrio. ‘Ha cometido’ comunica el acto consumado sin perder el paralelismo con el membrete anterior.
- source_word: בָּם
  english_pob_choice: in them
  chosen_spanish: en ellos
  alternatives_spanish:
  - por ellos
  - a causa de ellos
  lexicon: HALOT
  rationale: El pronombre retoma la traición y el pecado mencionados. ‘En ellos’ conserva la referencia textual y el matiz locativo/causal del hebreo.
- source_word: יָמוּת
  english_pob_choice: he shall die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá ciertamente
  - deberá morir
  lexicon: HALOT
  rationale: El imperfecto expresa la consecuencia judicial. ‘Morirá’ es natural en español y mantiene la solemnidad del anuncio.
theological_decisions:
- issue: Si el versículo debe sonar como pérdida de méritos previos o como declaración judicial de responsabilidad presente
  english_pob_reading: The translation preserves the text's judicial statement that prior righteous deeds will not be remembered if a righteous man turns away and commits wickedness, without importing a later doctrinal framework about merit or perseverance.
  chosen_spanish_reading: 'La traducción conserva la declaración judicial del texto: las obras justas previas no serán recordadas si el justo se aparta y hace maldad, sin importar al verso un marco doctrinal posterior sobre mérito o perseverancia.'
  alternative_spanish_readings:
  - Una formulación que enfatice la pérdida de mérito acumulado
  - Una formulación que atenúe la advertencia como mera consecuencia social
  rationale: Ezequiel 18 presenta responsabilidad moral individual delante de Dios. La traducción debe dejar en pie la tensión del texto, sin resolverla con categorías teológicas externas.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'Se siguió la última revisión del audit trail: se mantuvo el imperfecto hebreo para las acciones del malvado (‘hace’), y se conservó el encuadre judicial del verso sin suavizar la advertencia ni convertirla en un tema de mérito meritocrático o perseverancia. La versión española ajusta la sintaxis para que suene natural en español, pero permanece pegada a los elementos del hebreo y al cierre inclusivo ‘en ellos morirá’.'
  spanish_consistency_notes:
  - Se prefirió ‘el justo’ para צַדִּיק y ‘el malvado’ para הָרָשָׁע, manteniendo el paralelismo moral.
  - Se usó ‘justicia’ en lugar de ‘rectitud’ para conservar el vínculo léxico con צִדְקָה/צְדָקָה en el contexto de Ezequiel.
  - ‘Abominaciones’ se mantuvo como término fuerte y técnico del libro.
  - ‘Traición’ traduce מעל para conservar el matiz de infidelidad de pacto, no solo de error moral general.
  - Se empleó un singular concordante en ‘será recordada’ para reflejar ‘ninguna de sus obras justas’.
