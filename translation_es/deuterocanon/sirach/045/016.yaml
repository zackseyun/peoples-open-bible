translation:
  language: es
  text: para ministrar y para servirle como sacerdote, y para bendecir a su pueblo en su nombre. Él lo escogió de entre todos los vivientes para presentar holocaustos y porciones de grasa.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego es más completo: «para ofrecer una ofrenda al Señor, incienso y un aroma agradable como memorial, para hacer expiación por tu pueblo». El testimonio hebreo aquí es más breve.'
    reason: textual_variant
lexical_decisions:
- source_word: לשרת
  english_pob_choice: to minister
  chosen_spanish: ministrar
  alternatives_spanish:
  - servir
  lexicon: HALOT
  rationale: En contexto cultual, el verbo expresa servicio sagrado. «Ministrar» conserva ese matiz ministerial y evita reducirlo a un servicio genérico.
- source_word: ולכהן
  english_pob_choice: to serve as priest
  chosen_spanish: servirle como sacerdote
  alternatives_spanish:
  - actuar como sacerdote
  - oficiar como sacerdote
  lexicon: HALOT
  rationale: La forma denominal de כהן señala ejercicio sacerdotal. En español, «servirle como sacerdote» mantiene la función y suena natural junto a «ministrar».
- source_word: ולברך את עמו בשמו
  english_pob_choice: and to bless his people in his name
  chosen_spanish: y para bendecir a su pueblo en su nombre
  alternatives_spanish:
  - y para bendecir a su pueblo por su nombre
  - y para pronunciar bendición sobre su pueblo en su nombre
  lexicon: HALOT
  rationale: «En su nombre» conserva el sentido litúrgico y de autoridad del nombre divino, sin cambiarlo por una formulación explicativa más larga.
- source_word: ויבחר בו מכל חי
  english_pob_choice: He chose him from among all the living
  chosen_spanish: Él lo escogió de entre todos los vivientes
  alternatives_spanish:
  - Lo seleccionó de entre todos los que viven
  - Lo escogió de entre todos los seres vivientes
  lexicon: HALOT
  rationale: «Todos los vivientes» reproduce el alcance amplio de מכל חי sin restringirlo a «hombres». «Vivientes» suena más fluido en español bíblico moderno que una repetición pesada de «los que viven».
- source_word: להגיש
  english_pob_choice: to present
  chosen_spanish: presentar
  alternatives_spanish:
  - ofrecer
  - traer
  lexicon: HALOT
  rationale: En contexto sacrificial, el verbo indica llevar/ofrecer una oblación. «Presentar» es suficientemente formal y deja que los objetos sacrificiales concreten el acto.
- source_word: עלה
  english_pob_choice: burnt offerings
  chosen_spanish: ofrendas quemadas
  alternatives_spanish:
  - holocaustos
  - ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: En español contemporáneo, «ofrendas quemadas» comunica el sentido del sacrificio consumido por el fuego sin depender de «holocaustos», que puede ser menos claro o arrastrar asociaciones extrañas.
- source_word: וחלבים
  english_pob_choice: fat portions
  chosen_spanish: porciones de grasa
  alternatives_spanish:
  - porciones de sebo
  - las grasas de la víctima
  lexicon: HALOT
  rationale: El plural apunta a las partes grasas ofrecidas en el altar. «Porciones de grasa» es transparente y conserva el valor técnico sin exagerar la terminología.
theological_decisions:
- issue: Prioridad del hebreo frente al paralelo griego más amplio
  english_pob_reading: The main text follows the extant Hebrew wording, with the Greek expansion preserved in a footnote.
  chosen_spanish_reading: El texto principal sigue el hebreo conservado, y la expansión griega se preserva en una nota.
  alternative_spanish_readings:
  - Integrar la ampliación griega en la línea principal
  - Harmonizar hebreo y griego en una sola frase
  rationale: Dado que el hebreo conservado en la fuente es más breve y el griego añade detalles sacrificiales ausentes allí, la línea principal debe respetar el testimonio hebreo. La nota permite visibilizar la variante sin fusionar dos formas textuales distintas.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; preservar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del expediente inglés al mantener el plural de la ofrenda consumida por fuego, reflejado en español como «ofrendas quemadas». También conserva la decisión auditada de no importar al texto principal la expansión griega, que queda documentada en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo o el contexto lo exijan explícitamente; aquí el texto de la fuente usa la referencia indirecta «su nombre», por lo que no aparece el nombre divino en la línea principal.
  - Se preserva la distinción cultual entre «ministrar» y «servir como sacerdote», evitando colapsarlas en un solo verbo.
  - «Vivientes» mantiene el alcance inclusivo de מכל חי sin introducir «humanos» donde el hebreo es más amplio.
  - La nota al pie refleja la divergencia textual documentada entre el hebreo breve y el griego más amplio.
