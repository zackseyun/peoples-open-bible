review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura hebrea, conserva la repetición enfática y maneja correctamente la elipsis verbal con «espera». Sin embargo, traduce לַאדֹנָי («al Señor / para el Señor») como «a Yahvé», aunque el texto fuente aquí no tiene יהוה sino אֲדֹנָי. Eso altera una distinción léxica significativa del hebreo y también se aparta del rastro auditado en inglés, que eligió «the Lord» por tratarse del título divino, no del nombre Yahvé.
  spanish_quality_summary: El español es claro, poético y natural. «Mi alma espera… más que los centinelas…» funciona bien y preserva el paralelismo. No obstante, «por la mañana» suena algo menos preciso que «por el amanecer» o «la mañana» como objeto esperado; aun así, es aceptable y no exige cambio. El problema principal es terminológico, no estilístico.
  glossary_alignment: Buen ajuste general con «Mi alma» y la repetición de «centinelas». Pero la pauta del proyecto sobre «Yahvé» aplica a יהוה, no debe imponerse sobre אֲדֹנָי. Aquí corresponde «el Señor» o posiblemente «mi Señor» según contexto; dado el paquete fuente y el POB inglés, «el Señor» es la mejor opción en español.
  issues:
  - severity: high
    issue: Se traduce אֲדֹנָי como «Yahvé».
    rationale: El hebreo fuente tiene לַאדֹנָי, no el Tetragrámaton. Sustituir el título divino por el nombre propio borra una diferencia léxica real del original y contradice la decisión auditada en inglés («the Lord»).
  - severity: low
    issue: La nota alternativa también usa «Yahvé» en lugar de reflejar אֲדֹנָי.
    rationale: La nota debe conservar la misma precisión léxica que el texto principal; de lo contrario, perpetúa el mismo problema terminológico.
  revised_spanish_text: Mi alma espera al Señor más que los centinelas por la mañana[a], más que los centinelas por la mañana.
  revised_footnotes:
