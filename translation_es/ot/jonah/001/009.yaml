translation:
  language: es
  text: 'Y les dijo: «Yo soy hebreo, y temo a Yahvé, el Dios de los cielos[a], que hizo el mar y la tierra seca».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; se traduce aquí «Yahvé» siguiendo la norma del proyecto para el nombre divino.'
    reason: alternative_reading
lexical_decisions:
- source_word: עִבְרִי
  english_pob_choice: Hebrew
  chosen_spanish: hebreo
  alternatives_spanish:
  - hebraeo
  lexicon: HALOT
  rationale: El término funciona como autoidentificación étnica/nacional; en español, «hebreo» es la equivalencia natural y más transparente para el lector contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino del Tetragrámaton en la forma adoptada por el proyecto en español: «Yahvé». Esto preserva el nombre propio en lugar de reemplazarlo por un título.'
- source_word: אֱלֹהֵי הַשָּׁמַיִם
  english_pob_choice: the God of heaven
  chosen_spanish: el Dios de los cielos
  alternatives_spanish:
  - el Dios del cielo
  lexicon: HALOT
  rationale: La construcción hebrea es idiomática; en español, «el Dios de los cielos» refleja bien el plural hebreo sin perder naturalidad. «Del cielo» sería más singular e interpretativo.
- source_word: יָרֵא
  english_pob_choice: fear
  chosen_spanish: temo
  alternatives_spanish:
  - reverencio
  - adoro
  lexicon: HALOT
  rationale: Se conserva el valor lexical directo de ירא con relación a Dios. «Temo» mantiene la tensión teológica del contexto sin suavizarla a «reverencio» o «adoro».
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - creó
  lexicon: HALOT
  rationale: «Hizo» es el equivalente directo y sobrio de עשה. «Creó» haría la afirmación más fuerte de lo que exige el hebreo inmediato.
- source_word: הַיָּם
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el océano
  lexicon: HALOT
  rationale: «Mar» es la equivalencia normal y adecuada al contexto narrativo de Jonás.
- source_word: הַיַּבָּשָׁה
  english_pob_choice: the dry land
  chosen_spanish: la tierra seca
  alternatives_spanish:
  - la tierra firme
  - el suelo seco
  lexicon: HALOT
  rationale: «La tierra seca» conserva el contraste explícito con el mar y mantiene la fuerza física del hebreo, aunque suene menos idiomático que «tierra firme».
- source_word: וַיֹּאמֶר אֲלֵיהֶם
  english_pob_choice: He said to them
  chosen_spanish: Y les dijo
  alternatives_spanish:
  - Entonces les dijo
  lexicon: HALOT
  rationale: Se mantiene el avance narrativo de la waw consecutiva con una forma española natural. «Les dijo» conserva la relación directa con el destinatario; el sujeto explícito no es necesario en español.
- source_word: אָנֹכִי ... אֲנִי
  english_pob_choice: I am ... and I fear
  chosen_spanish: Hebreo soy yo ... yo temo
  alternatives_spanish:
  - Yo soy hebreo ... y yo temo
  lexicon: HALOT
  rationale: La duplicación pronominal del hebreo se refleja parcialmente con «soy yo» y «yo temo», conservando el énfasis sin volver el español torpe. El orden marcado también ayuda a mantener el relieve retórico del original.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se preserva el nombre personal del Dios de Israel sin sustituirlo por una convención litúrgica. La forma «Yahvé» es la opción del proyecto en español y comunica directamente el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza semántica de יָרֵא en la confesión de Jonás
  english_pob_reading: fear
  chosen_spanish_reading: temo
  alternative_spanish_readings:
  - reverencio
  - adoro
  rationale: «Temo» conserva el sentido básico de temor reverente y, a la vez, no elimina la ironía narrativa de que Jonás lo diga en un momento de desobediencia. Se evita resolver la tensión con una paráfrasis más devocional.
  doctrine_reference: DOCTRINE.md Translation philosophy §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión; no hubo enmiendas aplicadas y el consenso de revisión fue alto. La presente redacción española sigue de cerca el texto hebreo y las decisiones lexicográficas ya estabilizadas en el expediente inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma española consistente para el Tetragrámaton.
  - Se conserva «hebreo» para עִבְרִי, evitando terminología eclesiástica no sustentada por el hebreo.
  - «Temo» mantiene la tensión entre confesión religiosa y conducta narrada en Jonás.
  - «La tierra seca» refleja el contraste literal con «el mar» y conserva el paralelismo del hebreo.
