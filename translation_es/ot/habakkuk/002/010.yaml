translation:
  language: es
  text: Has ideado vergüenza para tu casa al exterminar muchos pueblos, y has pecado contra tu propia vida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu alma» o «tú mismo».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָעַצְתָּ
  english_pob_choice: you have devised
  chosen_spanish: has ideado
  alternatives_spanish:
  - has planeado
  - has aconsejado
  lexicon: HALOT
  rationale: El qal perfecto 2ms de יעץ expresa aquí una acción intencional de planear o urdir. «Has ideado» conserva la intención maquinada y encaja con el tono de reprensión; «has aconsejado» sería demasiado neutral en español.
- source_word: בֹּשֶׁת
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - afrenta
  lexicon: HALOT
  rationale: El sustantivo puede referir vergüenza o deshonra. «Vergüenza» es natural en español y conserva el peso moral y público del término; «deshonra» intensifica el matiz social, pero no es imprescindible.
- source_word: לְבֵיתֶךָ
  english_pob_choice: for your house
  chosen_spanish: para tu casa
  alternatives_spanish:
  - para tu familia
  - para tu casa y linaje
  lexicon: HALOT
  rationale: בַּיִת puede significar casa, casa/linaje o dinastía. «Casa» preserva esa amplitud sin estrecharlo a una sola referencia. «Familia» sería interpretativo; «linaje» añade precisión que el hebreo aquí no obliga de forma exclusiva.
- source_word: קְצוֹת
  english_pob_choice: by cutting off
  chosen_spanish: al acabar con
  alternatives_spanish:
  - al destruir
  - al cortar
  lexicon: HALOT
  rationale: La forma y el contexto apuntan a poner fin, exterminar o cortar de raíz. «Al acabar con» suena natural en español y mantiene la idea de eliminación violenta sin rigidizarla con un calco.
- source_word: עַמִּים רַבִּים
  english_pob_choice: many peoples
  chosen_spanish: muchos pueblos
  alternatives_spanish:
  - muchas naciones
  - muchos pueblos y gentes
  lexicon: HALOT
  rationale: עַמִּים denota pueblos/naciones. «Pueblos» preserva el plural colectivo sin introducir de manera innecesaria la noción moderna de estado-nación.
- source_word: וְחוֹטֵא
  english_pob_choice: and have sinned
  chosen_spanish: y has pecado
  alternatives_spanish:
  - y pecando
  - y has errado
  lexicon: HALOT
  rationale: El participio en secuencia con el verbo finito funciona verbalmente como acusación continuada. «Y has pecado» reproduce bien la acusación en español y mantiene la coordinación con la acción previa.
- source_word: נַפְשֶׁךָ
  english_pob_choice: your own life
  chosen_spanish: tu propia vida
  alternatives_spanish:
  - tu alma
  - a ti mismo
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o persona. Aquí el contexto de juicio apunta al daño autoinfligido; «vida» expresa con claridad la consecuencia concreta, mientras que «alma» introduciría una carga antropológica menos segura.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en contexto de juicio profético
  english_pob_reading: life
  chosen_spanish_reading: vida
  alternative_spanish_readings:
  - alma
  - ser
  rationale: 'La denuncia no formula una antropología abstracta sino una retribución concreta: la violencia del opresor revierte sobre sí mismo. «Vida» comunica mejor ese resultado y evita cargar el versículo con un sentido técnico de «alma» que el contexto no exige.'
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El auditor inglés revisó la segunda cláusula para eliminar un sujeto explícito repetido y dejar una coordinación más fluida; el español adopta esa misma economía sintáctica con «y has pecado» sin repetir «tú».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparezca en el contexto mayor, pero este versículo no lo contiene.
  - Se usa «vida» en lugar de «alma» siguiendo la decisión contextual del hebreo נֶפֶשׁ en juicio profético.
  - «Pueblos» conserva mejor el plural colectivo de עַמִּים que una lectura nacional moderna.
