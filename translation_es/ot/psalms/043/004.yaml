translation:
  language: es
  text: Entonces iré al altar de Dios[a], a Dios, el gozo de mi alegría; y te alabaré con la lira[b], oh Dios, mi Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «a Dios, mi gran gozo». El hebreo dice literalmente «a Dios, el gozo de mi alegría», usando lenguaje duplicado de gozo para dar énfasis.
    reason: lexical_alternative
  - marker: b
    text: O «con el arpa». El hebreo kinnor se refiere a un antiguo instrumento de cuerdas, probablemente más parecido a una lira.
    reason: cultural_note
lexical_decisions:
- source_word: וְאָבוֹאָה
  english_pob_choice: Then I will go
  chosen_spanish: Entonces iré
  alternatives_spanish:
  - y entraré
  - y me iré
  lexicon: HALOT
  rationale: La forma cohortativa expresa resolución o resultado querido; «Entonces iré» comunica bien esa intención futura en español natural sin perder el valor volitivo.
- source_word: אֶל מִזְבַּח אֱלֹהִים
  english_pob_choice: to the altar of God
  chosen_spanish: al altar de Dios
  alternatives_spanish:
  - al altar de Dios
  - al altar de Dios
  lexicon: HALOT
  rationale: Se conserva la cadena constructa de modo sobrio y transparente; en español «altar de Dios» mantiene la dignidad y la forma del hebreo.
- source_word: אֶל אֵל
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - al Poderoso
  - a El
  lexicon: HALOT
  rationale: Aquí אֵל funciona en paralelo con אֱלֹהִים como título divino. «Dios» preserva la referencia y evita introducir una distinción innecesaria o una transliteración ajena al flujo del verso.
- source_word: שִׂמְחַת גִּילִי
  english_pob_choice: the joy of my rejoicing
  chosen_spanish: el gozo de mi alegría
  alternatives_spanish:
  - mi alegría suprema
  - el gozo de mi regocijo
  - la alegría de mi gozo
  lexicon: HALOT
  rationale: El hebreo acumula dos términos cercanos para intensificación. «El gozo de mi alegría» conserva la duplicación semántica sin suavizarla en exceso; «gozo» y «alegría» ayudan a mantener el juego de énfasis en español.
- source_word: וְאוֹדְךָ
  english_pob_choice: and I will praise you
  chosen_spanish: y te alabaré
  alternatives_spanish:
  - y te daré gracias
  - y te reconoceré en alabanza
  lexicon: HALOT
  rationale: En este contexto de adoración con instrumento, la acción es alabanza cultual pública; «alabaré» expresa mejor ese sentido que «daré gracias», aunque ambas posibilidades estén cerca en la raíz hebrea.
- source_word: בְּכִנּוֹר
  english_pob_choice: with the lyre
  chosen_spanish: con el arpa
  alternatives_spanish:
  - con la lira
  - con el instrumento de cuerdas
  lexicon: HALOT
  rationale: POB en inglés optó por «harp» como alternativa cultural; en español, «arpa» es la forma más natural y tradicionalmente inteligible para un instrumento antiguo de cuerdas, aunque «lira» sea más cercana en algunos contextos académicos.
- source_word: אֱלֹהִים אֱלֹהָי
  english_pob_choice: O God, my God
  chosen_spanish: oh Dios, mi Dios
  alternatives_spanish:
  - Dios, mi Dios
  - oh Dios mío
  lexicon: HALOT
  rationale: 'La repetición mantiene el vocativo y la posesión relacional. «Oh Dios, mi Dios» conserva ambas direcciones del hebreo: llamada directa y apropiación personal.'
theological_decisions:
- issue: Repetición de los títulos divinos אֱלֹהִים / אֵל
  english_pob_reading: Both rendered as 'God' in English, preserving repetition but not forcing a distinction between titles.
  chosen_spanish_reading: Ambos se rinden como «Dios», manteniendo la repetición sin imponer una diferencia doctrinal o semántica artificial.
  alternative_spanish_readings:
  - «Mighty God» / «El»
  - «Dios» / «El»
  rationale: El paralelismo poético presenta dos designaciones divinas en una misma línea. Traducir ambas como «Dios» comunica con claridad el referente y conserva la fuerza del paralelismo, sin sobredeterminar el matiz de cada término.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de ידה en el contexto cultual
  english_pob_reading: and I will praise you
  chosen_spanish_reading: y te alabaré
  alternative_spanish_readings:
  - y te daré gracias
  - y te bendeciré
  rationale: Aunque la raíz puede abarcar agradecimiento, aquí el marco es litúrgico-musical y de adoración. «Alabaré» evita reducir el acto a gratitud verbal y conserva el acto de culto expresado en el verso.
  doctrine_reference: Lexical context in worship poetry
translation_notes:
  revision_awareness: Coincide con el texto hebreo masorético y con el audit trail en inglés; no se registran revisiones aplicadas. Se ha mantenido la intensificación de ‘gozo/alegría’ y la equivalencia funcional del instrumento de cuerdas, con notas para alternativas tradicionales.
  spanish_consistency_notes:
  - Se usa «Dios» de manera uniforme para אֱלֹהִים y אֵל, preservando el paralelismo.
  - «Alabaré» refleja el acto cultual del verbo hebreo en este contexto; no se neutraliza en «daré gracias».
  - «Arpa» se deja como término español idiomático, con nota que aclara la cercanía histórica a la lira.
  - La puntuación conserva el vocativo final y el ritmo poético del verso.
