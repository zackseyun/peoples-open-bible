translation:
  language: es
  text: Hijo de hombre, pon tu rostro hacia Jerusalén, y predica[a] hacia los santuarios, y profetiza contra la tierra de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, 'haz gotear [tus palabras] hacia los santuarios', un modismo profético para hablar o predicar juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Conserva el giro hebreo y su función vocativa fija en Ezequiel. En español, “Hijo de hombre” mantiene la imagen idiomática sin convertirla en un título cristológico ajeno al contexto.
- source_word: שִׂים פָּנֶיךָ אֶל
  english_pob_choice: set your face toward
  chosen_spanish: pon tu rostro hacia
  alternatives_spanish:
  - dirige tu rostro hacia
  - vuelve tu rostro hacia
  lexicon: HALOT
  rationale: La expresión preserva la imaginería corporal del hebreo y su sentido de orientación deliberada. “Pon tu rostro hacia” es natural en español y refleja bien el verbo imperativo con dirección.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Yerusalén
  lexicon: Nombre propio estándar
  rationale: Se usa la forma española establecida del topónimo.
- source_word: וְהַטֵּף
  english_pob_choice: preach toward
  chosen_spanish: profetiza hacia
  alternatives_spanish:
  - haz gotear tus palabras hacia
  - habla hacia
  lexicon: HALOT
  rationale: El hebreo literalmente dice “haz gotear”, pero en este contexto profético la metáfora funciona como acto de hablar proféticamente. “Profetiza hacia” conserva la dirección marcada por la construcción y evita introducir una preposición de hostilidad que el hebreo aquí no exige de forma directa.
- source_word: מִקְדָּשִׁים
  english_pob_choice: the sanctuaries
  chosen_spanish: los santuarios
  alternatives_spanish:
  - los lugares santos
  - los templos
  lexicon: HALOT
  rationale: El plural hebreo debe mantenerse. “Santuarios” preserva el valor cultual y la pluralidad mejor que “templos”, que podría sonar demasiado concreto o singularizante.
- source_word: וְהִנָּבֵא
  english_pob_choice: prophesy against
  chosen_spanish: profetiza contra
  alternatives_spanish:
  - habla proféticamente contra
  lexicon: HALOT
  rationale: “Profetiza” reproduce bien el imperativo de נבא. Aquí sí se conserva “contra” porque el último miembro del versículo lleva la orientación oracular de juicio contra la tierra de Israel.
- source_word: אַדְמַת יִשְׂרָאֵל
  english_pob_choice: the land of Israel
  chosen_spanish: la tierra de Israel
  alternatives_spanish:
  - el suelo de Israel
  - el terreno de Israel
  lexicon: HALOT
  rationale: אַדְמָה puede significar suelo/tierra/terreno, pero en este contexto el sentido territorial y nacional es claro. “La tierra de Israel” es la forma más natural y fiel en español.
theological_decisions:
- issue: Fuerza del mandato verbal en la secuencia profética
  english_pob_reading: The English POB renders the clause as a prophetic speech-act, with idiomatic treatment of נטף and a directional preposition toward the sanctuaries.
  chosen_spanish_reading: Se mantiene la secuencia como mandato profético directo, con “profetiza hacia los santuarios” para reflejar la imagen de hablar/“gotear” palabras, y “profetiza contra la tierra de Israel” para el juicio final.
  alternative_spanish_readings:
  - ponte a hablar contra los santuarios
  - haz gotear tus palabras hacia los santuarios
  rationale: La primera mitad del versículo expresa una imagen verbal idiomática que en español se vuelve más clara si se preserva la dirección (“hacia”) sin forzar hostilidad donde el hebreo muestra primero orientación y luego, en el cierre, juicio explícito. Se evita neutralizar la tensión retórica del texto.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve image and force where possible, while making explicit the final judicial orientation.'
translation_notes:
  revision_awareness: 'El borrador sigue la revisión más reciente del audit trail: mantiene la orientación ‘toward the sanctuaries’ en la cláusula media y conserva ‘against the land of Israel’ en la clausula final, en lugar de imponer ‘against the sanctuaries’.'
  spanish_consistency_notes:
  - Se usa “profetiza” dos veces para reflejar la doble formulación verbal del hebreo y evitar suavizar la estructura.
  - “Tierra de Israel” se mantiene uniforme como equivalente territorial de אַדְמַת יִשְׂרָאֵל.
  - La nota [a] se ancla en “Hijo de hombre” para auditar la decisión lexical sin cargar el cuerpo del texto.
