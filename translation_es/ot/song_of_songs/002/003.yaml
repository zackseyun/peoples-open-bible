translation:
  language: es
  text: Como un manzano[a] entre los árboles del bosque, así es mi amado entre los hijos[b]. A su sombra me deleité al sentarme, y su fruto fue dulce a mi paladar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La especie precisa denotada por el hebreo תַּפּוּחַ es incierta; tradicionalmente, «manzano».
    reason: cultural_note
  - marker: b
    text: 'O: «entre los jóvenes». Hebreo: «entre los hijos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: תַּפּוּחַ
  english_pob_choice: apple tree
  chosen_spanish: manzano
  alternatives_spanish:
  - árbol de manzanas
  - árbol frutal
  lexicon: HALOT
  rationale: La imagen poética remite a un árbol frutal destacado entre árboles comunes. En español, 'manzano' es la forma natural y reconocible que conserva el valor tradicional de la comparación, mientras que 'árbol de manzanas' suena menos idiomático.
- source_word: בַּעֲצֵי הַיַּעַר
  english_pob_choice: among the trees of the forest
  chosen_spanish: entre los árboles del bosque
  alternatives_spanish:
  - entre los árboles del monte
  - entre los árboles del bosque
  lexicon: HALOT
  rationale: '''Entre los árboles del bosque'' reproduce bien la relación partitiva y el contraste entre un árbol sobresaliente y la masa arbórea del entorno.'
- source_word: דּוֹדִי
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado
  - mi amado mío
  - mi amante
  lexicon: HALOT
  rationale: '''Amado'' comunica el matiz afectivo y elevado del poema sin la posible reducción de ''amante''. ''Mi amado'' sigue de cerca el valor de דּוֹדִי.'
- source_word: בֵּין הַבָּנִים
  english_pob_choice: among the sons
  chosen_spanish: entre los hijos
  alternatives_spanish:
  - entre los jóvenes
  - entre los varones
  lexicon: HALOT
  rationale: La lectura literal conserva la forma hebrea 'hijos' y evita suavizar la imagen hacia una paráfrasis generacional o social. En español, 'hijos' mantiene la tensión lexical del original.
- source_word: בְּצִלּוֹ
  english_pob_choice: in his shade
  chosen_spanish: a su sombra
  alternatives_spanish:
  - en su sombra
  - bajo su sombra
  lexicon: HALOT
  rationale: '''A su sombra'' refleja naturalmente el movimiento del verbo ''deleitarse'' hacia el reposo y suena más fluido en español que una construcción más literal o repetitiva.'
- source_word: חִמַּדְתִּי
  english_pob_choice: I delighted
  chosen_spanish: me deleité
  alternatives_spanish:
  - deseé
  - me complací
  lexicon: HALOT
  rationale: El verbo puede expresar deseo, deleite o complacencia. Aquí se traduce con 'me deleité' para conservar el gozo afectivo del contexto sin intensificar innecesariamente el matiz de deseo.
- source_word: וְיָשַׁבְתִּי
  english_pob_choice: to sit / sat down
  chosen_spanish: en sentarme
  alternatives_spanish:
  - a sentarme
  - y me senté
  lexicon: HALOT
  rationale: La revisión inglesa entiende la construcción como 'I delighted to sit'. En español, 'me deleité en sentarme' refleja mejor esa relación verbal que una simple coordinación de acciones.
- source_word: וּפִרְיוֹ
  english_pob_choice: his fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - su fruto
  - el fruto de él
  lexicon: HALOT
  rationale: Se conserva el pronombre posesivo del árbol/metáfora del amado. 'Su fruto' es la forma natural y mantiene la continuidad figurativa.
- source_word: מָתוֹק
  english_pob_choice: was sweet
  chosen_spanish: fue dulce
  alternatives_spanish:
  - era dulce
  - es dulce
  lexicon: HALOT
  rationale: El predicado adjetival se vierte de modo simple y literario. 'Fue dulce' encaja con la secuencia verbal en pasado del verso.
- source_word: לְחִכִּי
  english_pob_choice: to my taste
  chosen_spanish: a mi paladar
  alternatives_spanish:
  - a mi gusto
  - a mi paladar
  lexicon: HALOT
  rationale: '''Paladar'' conserva con precisión el sentido corporal de חֵךְ y su imagen sensorial. ''A mi gusto'' sería más idiomático, pero menos concreto.'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión reciente del inglés POB: ''I delighted and sat down'' fue ajustado a ''I delighted to sit''. Por eso el español evita una coordinación simple de acciones y usa una construcción que expresa deleite con infinitivo. También se mantuvo la imagen tradicional de ''apple tree'' con una solución española natural (''manzano''), sin ocultar la alternativa hebrea literal en la nota.'
  spanish_consistency_notes:
  - Se preserva 'mi amado' como traducción estable de דּוֹדִי.
  - Se conserva 'hijos' en el cuerpo principal para respetar la forma hebrea, con alternativa explicativa en nota.
  - Se traduce el sintagma sensorial final con un término concreto y fácilmente comprensible en español.
  - No se introduce 'Cristo' ni vocabulario eclesiástico ajeno al poema.
