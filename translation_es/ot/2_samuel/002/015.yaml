    reason: lexical_alternative
  - marker: c
    text: Hebrew 'Ish-bosheth'; elsewhere the related form 'Eshbaal' appears in the Old Testament tradition.
    reason: alternative_reading
  - marker: d
    text: Or 'from David's servants' or more interpretively 'from David's men.'
    reason: lexical_alternative
