id: PHP.3.4
reference: Philippians 3:4
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καίπερ ἐγὼ ἔχων πεποίθησιν καὶ ἐν σαρκί. Εἴ τις δοκεῖ ἄλλος πεποιθέναι ἐν σαρκί, ἐγὼ μᾶλλον·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/004.yaml
  text: Though I myself have confidence even in the flesh. If anyone else thinks he has confidence in the flesh[a], I have more.
  footnotes:
  - marker: a
    text: 'Or “confidence in human credentials” / “confidence in outward status.” Greek: “in the flesh.”'
    reason: lexical_alternative
translation:
  language: ko
  text: 비록 나는 육체에도 신뢰할 만한 근거를 가지고 있습니다. 다른 누가 육체를 신뢰할 만하다 여긴다면[a], 나는 더욱 그렇습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「사람의 자격을 신뢰한다고」 또는 「외적 신분을 신뢰한다고」. 헬라어는 「육체 안에서(ἐν σαρκί)」이며, 여기서는 할례·혈통 같은 외적·인간적 자격을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: καίπερ
  english_pob_choice: Though
  chosen_korean: 비록
  alternatives_korean:
  - 그러나
  - ~기는 하지만
  lexicon: BDAG
  rationale: 강한 양보를 표지하는 「비록」으로 문두에서 양보의 어조를 살린다.
- source_word: ἔχων πεποίθησιν
  english_pob_choice: have confidence
  chosen_korean: 신뢰할 만한 근거를 가지고 있습니다
  alternatives_korean:
  - 확신을 가지고 있습니다
  - 자랑할 근거가 있습니다
  lexicon: BDAG
  rationale: πεποίθησιν은 「신뢰의 근거」·「자랑할 만한 기반」을 함의한다. 한국어로 「확신」만 쓰면 심리적 상태로 좁아지므로 「신뢰할 만한 근거」로 풀어 옮긴다.
- source_word: ἐν σαρκί
  english_pob_choice: in the flesh
  chosen_korean: 육체에도
  alternatives_korean:
  - 육신에도
  - 사람의 자격에도
  lexicon: BDAG
  rationale: 글로사리 기본형 「육체」 유지. 「~에도」로 양보의 강조 「καί」를 살린다.
- source_word: δοκεῖ
  english_pob_choice: thinks
  chosen_korean: 여긴다면
  alternatives_korean:
  - 생각한다면
  - 자처한다면
  lexicon: BDAG
  rationale: 「여기다」가 「자기 평가」의 어감을 가장 자연스럽게 담는다.
- source_word: ἄλλος
  english_pob_choice: anyone else
  chosen_korean: 다른 누가
  alternatives_korean:
  - 다른 사람이
  lexicon: BDAG
  rationale: τις와 결합한 「다른 누가」가 비교 구도의 「또 다른 누군가」를 자연스럽게 표현한다.
- source_word: πεποιθέναι
  english_pob_choice: has confidence
  chosen_korean: 신뢰할 만하다
  alternatives_korean:
  - 신뢰한다
  - 자랑할 만하다
  lexicon: BDAG
  rationale: 완료 부정사는 정착된 신뢰 상태를 가리킨다. 「신뢰할 만하다」가 자기 평가의 어감과 잘 어울린다.
- source_word: μᾶλλον
  english_pob_choice: more
  chosen_korean: 더욱 그렇습니다
  alternatives_korean:
  - 더
  - 더 그렇습니다
  lexicon: BDAG
  rationale: 바울의 강조적 비교를 「더욱 그렇습니다」로 자연스럽게 옮긴다.
theological_decisions:
- issue: 본 절 σάρξ의 의미
  chosen_reading: 육체(외적·인간적 자랑거리)
  alternative_readings:
  - 죄성
  - 사람의 자격
  rationale: 직후 5~6절이 할례·혈통·율법 준수·열심 등 외적 자격을 열거하므로, 「육체」는 사람의 신분과 언약적 표지에 근거한 자신감을 가리킨다. 글로사리 기본형 「육체」를 유지하고 해석적 풀이는 각주에 둔다.
  doctrine_reference: 'Contested terms: σάρξ → 육체(literal) / 죄성(metaphorical), context-dependent.'
