translation:
  language: es
  text: No reprendas al escarnecedor[a], no sea que te odie; reprende a un sabio[b], y te amará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «burlón». El hebreo לֵץ se refiere a una persona marcada por el desprecio arrogante y la burla.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «a un sabio»; el singular masculino se usa de manera representativa en Proverbios.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל / אַל תּוֹכַח
  english_pob_choice: Do not rebuke
  chosen_spanish: No reprendas
  alternatives_spanish:
  - No corrijas
  - No amonestes
  lexicon: HALOT
  rationale: אַל con imperfecto expresa una prohibición; en español, la forma natural y directa es un imperativo negativo. «Reprendas» conserva la fuerza confrontativa de יכח mejor que «corrijas», y evita debilitar el tono sapiencial del dicho.
- source_word: לֵץ
  english_pob_choice: scoffer
  chosen_spanish: escarnecedor
  alternatives_spanish:
  - burlón
  - mocker
  lexicon: HALOT
  rationale: לֵץ designa una persona caracterizada por el menosprecio arrogante y la burla persistente. «Escarnecedor» preserva mejor ese perfil moral en español bíblico que un simple «burlón», que puede sonar menos grave.
- source_word: פֶּן יִשְׂנָאֶךָּ
  english_pob_choice: lest he hate you
  chosen_spanish: para que no te odie
  alternatives_spanish:
  - no sea que te odie
  - porque te odiará
  lexicon: HALOT
  rationale: פֶּן introduce una consecuencia negativa a evitar. En español, «para que no» expresa con naturalidad esa relación de advertencia; «odie» refleja היטב el futuro/resultativo del imperfecto en este contexto.
- source_word: הוֹכַח
  english_pob_choice: rebuke
  chosen_spanish: reprende
  alternatives_spanish:
  - corrige
  - amonesta
  lexicon: HALOT
  rationale: Se mantiene la misma raíz verbal con «reprende» para conservar la paralelidad poética y la intensidad verbal del hebreo. «Corrige» sería más suave y menos adecuado al contraste con el escarnecedor.
- source_word: לְחָכָם
  english_pob_choice: a wise man
  chosen_spanish: al sabio
  alternatives_spanish:
  - a un sabio
  - al hombre sabio
  lexicon: HALOT
  rationale: El singular masculino hebreo funciona de manera representativa en Proverbios. «Al sabio» preserva esa forma proverbial sin sobrecargarla con explicaciones en el texto principal; la nota aclara el valor genérico.
- source_word: וְיֶאֱהָבֶךָּ
  english_pob_choice: and he will love you
  chosen_spanish: y te amará
  alternatives_spanish:
  - y te amará de verdad
  - y te querrá
  lexicon: HALOT
  rationale: El imperfecto expresa consecuencia esperada; «te amará» reproduce bien esa relación resultativa y mantiene el paralelismo con la cláusula anterior.
theological_decisions:
- issue: Tratamiento del singular masculino representativo en Proverbios
  english_pob_reading: a wise man
  chosen_spanish_reading: al sabio
  alternative_spanish_readings:
  - a un sabio
  - al hombre sabio
  - a la persona sabia
  rationale: Se conserva el masculino singular como forma representativa del hebreo, sin convertirlo en una redacción neutra que borre la forma proverbial del original. La nota explica que se trata de un singular genérico, no de exclusión doctrinal.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo consonante y con la auditoría inglesa: prohibición en אַל + imperfecto, advertencia con פֶּן, y paralelismo verbal con יכח / יאהב. No se documentan variantes textuales relevantes en el paquete provisto.'
  spanish_consistency_notes:
  - Se usó «reprendas» / «reprende» para mantener la raíz verbal y el paralelismo del hebreo.
  - «Escarnecedor» conserva la carga sapiencial de לֵץ mejor que términos más suaves.
  - La cláusula final se formuló en futuro español natural («te amará») para reflejar el resultado esperado del imperfecto hebreo.
