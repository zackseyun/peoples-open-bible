review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del hebreo: traer la ofrenda a los hijos de Aarón, tomar de allí un puñado de flor de harina y parte del aceite con todo el incienso, y luego quemar la porción memorial en el altar como ofrenda para Yahvé. Sin embargo, «hará subir» para וְהִקְטִיר se aleja de la decisión inglesa documentada («shall burn») y suena menos claro en español. Además, «como ofrenda encendida» introduce un matiz explicativo no presente en la estructura nominal directa del hebreo.'
  spanish_quality_summary: El texto es generalmente claro y digno. «Flor de harina» y «porción memorial» funcionan bien en contexto cultual. Pero «hará subir» resulta poco natural aquí y puede sonar calcado. «Ofrenda encendida» también es menos idiomático y menos alineado con la rationale del POB que una formulación como «ofrenda de alimento», con nota alternativa para las opciones más tradicionales relacionadas con el fuego.
  glossary_alignment: 'Se mantiene correctamente «Yahvé» para יהוה. «Porción memorial» preserva bien אַזְכָּרָתָהּ. El principal desajuste terminológico está en אִשֵּׁה: el audit trail inglés escogió «food offering», y en español conviene reflejar esa decisión con «ofrenda de alimento» en vez de «ofrenda encendida». También conviene ajustar וְהִקְטִיר a «quemará» para claridad y fidelidad a la decisión base.'
  issues:
