base_translation:
  language: en
  yaml_path: translation/ot/2_kings/015/020.yaml
  text: Then Menahem exacted the money from Israel[a], from all the mighty men of valor, to give to the king of Assyria fifty shekels of silver from each man. So the king of Assyria turned back and did not remain there in the land.
  footnotes:
