translation:
  language: es
  text: Porque, ¿de veras Dios habitará sobre la tierra? He aquí[a], los cielos, aun los cielos más altos, no pueden contenerte[b]; ¡cuánto menos esta casa[c] que yo he edificado!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “los cielos y los cielos de los cielos”, un modismo que expresa los cielos más altos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “no pueden albergarte”.'
    reason: lexical_alternative
  - marker: c
    text: “Esta casa” se refiere al templo que Salomón edificó.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי הַאֻמְנָם
  english_pob_choice: For will God indeed
  chosen_spanish: ¿Acaso, en verdad, Dios habitará...?
  alternatives_spanish:
  - Porque, en verdad, Dios habitará...
  - ¿De veras Dios habitará...?
  lexicon: HALOT
  rationale: En este contexto interrogativo-retórico, español necesita una apertura que conserve la sorpresa y la inferencia lógica. '¿Acaso, en verdad...?' refleja la combinación de pregunta y énfasis de כִּי הַאֻמְנָם sin volverlo rígidamente causal ni coloquial.
- source_word: יֵשֵׁב
  english_pob_choice: dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - dará morada
  - residirá
  - se sentará
  lexicon: HALOT
  rationale: '''Habitar'' es la equivalencia natural para la presencia permanente de Dios en este marco del templo; ''se sentará'' sería demasiado literal y menos idiomático en español.'
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios de Israel
  lexicon: HALOT
  rationale: El verbo singular y el contexto oracional muestran referencia singular a Dios; 'Dios' mantiene la fuerza directa sin añadir aclaraciones ajenas al verso.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el mundo
  lexicon: HALOT
  rationale: '''Sobre la tierra'' conserva la preposición de superficie y el contraste cósmico con los cielos, mientras suena natural en español bíblico contemporáneo.'
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: Se requiere un llamado de atención elevado pero comprensible. 'Mira' funciona bien en español; 'He aquí' es posible, pero más arcaico.
- source_word: הַשָּׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: El plural hebreo apunta al ámbito celeste en sentido cósmico; 'los cielos' preserva mejor esa amplitud que el singular 'el cielo'.
- source_word: וּשְׁמֵי הַשָּׁמַיִם
  english_pob_choice: even the highest heavens
  chosen_spanish: aun los cielos de los cielos
  alternatives_spanish:
  - los cielos de los cielos
  - aun el cielo de los cielos
  lexicon: HALOT
  rationale: La frase hebrea es un superlativo idiomático. En español, 'aun los cielos de los cielos' conserva la imagen y la intensidad sin explicar de más; 'aun' ayuda a reproducir el énfasis de la POB inglesa.
- source_word: לֹא יְכַלְכְּלוּךָ
  english_pob_choice: cannot contain you
  chosen_spanish: no te pueden contener
  alternatives_spanish:
  - no pueden contenerte
  - no te pueden abarcar
  - no te pueden sostener
  lexicon: HALOT
  rationale: '''Contener'' mantiene la idea de capacidad espacial de albergar. Se usa ''te'' porque el objeto del verbo es Yahvé implícito; la segunda persona sigue el hebreo y el tratamiento reverente en discurso directo.'
- source_word: אַף כִּי
  english_pob_choice: how much less
  chosen_spanish: ¡cuánto menos
  alternatives_spanish:
  - mucho menos
  - con mayor razón no
  lexicon: HALOT
  rationale: La locución hebrea introduce razonamiento a fortiori. '¡Cuánto menos!' reproduce el salto lógico con naturalidad y conserva el tono solemne.
- source_word: הַבַּיִת הַזֶּה
  english_pob_choice: this house
  chosen_spanish: esta casa
  alternatives_spanish:
  - este templo
  - esta casa, el templo
  lexicon: HALOT
  rationale: Se mantiene 'casa' porque el hebreo usa el término de modo intencional para el templo. 'Templo' explicita, pero pierde el enlace léxico con el motivo de la 'casa'.
- source_word: אֲשֶׁר בָּנִיתִי
  english_pob_choice: that I have built
  chosen_spanish: que yo he edificado
  alternatives_spanish:
  - que he construido
  - que yo he construido
  lexicon: HALOT
  rationale: '''Edificado'' respeta el registro elevado y el campo semántico arquitectónico del contexto cultual; ''he'' conserva el resultado presente del acto completado.'
theological_decisions:
- issue: Tensión entre la trascendencia divina y la presencia en el templo
  english_pob_reading: The verse affirms that even the highest heavens cannot contain God, while still speaking of the temple as the house Solomon built.
  chosen_spanish_reading: El verso afirma que ni los cielos de los cielos pueden contener a Dios, pero sin negar el lenguaje del templo como casa edificada para esa presencia.
  alternative_spanish_readings:
  - Dios no habitará realmente en la tierra
  - La casa podría contener a Dios
  rationale: 'La formulación española debe conservar la tensión del original: asombro ante la posibilidad de la morada divina en la tierra y afirmación simultánea de que ningún espacio creado puede contenerlo. No se resuelve la paradoja en una sola dirección.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Uso de la segunda persona singular en 'te pueden contener'
  english_pob_reading: cannot contain you
  chosen_spanish_reading: no te pueden contener
  alternative_spanish_readings:
  - no pueden contenerlo
  - no pueden contenerte
  rationale: El hebreo dirige la afirmación a Dios en segunda persona, y la POB inglesa también conserva ese trato. En español, la segunda persona mantiene la inmediatez del discurso de oración.
  doctrine_reference: Tratamiento reverente del discurso directo bíblico.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del inglés POB, que ajustó la puntuación para mayor fluidez formal sin cambiar el sentido. Se preserva el paralelismo, el quiebre retórico y la lógica a fortiori del hebreo, pero en español se opta por una puntuación natural con dos puntos de pausa: interrogación inicial, llamada de atención y punto y coma antes de la conclusión final.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para אֱלֹהִים en sentido singular.
  - Se conserva 'los cielos' y la superlación idiomática 'cielos de los cielos' en vez de simplificar a singular.
  - '''Casa'' se retiene para הַבַּיִת por coherencia con la metáfora del templo como casa.'
  - El tratamiento de segunda persona singular preserva el discurso directo al Dios de la oración.
