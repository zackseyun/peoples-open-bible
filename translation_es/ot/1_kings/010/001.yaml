review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: la reina de Saba oye la fama de Salomón en relación con el nombre de Yahvé, viene y lo pone a prueba con חִידוֹת. También preserva correctamente Yahvé para יְהוָה y mantiene la nota sobre la relación compacta de לְשֵׁם. Sin embargo, el anclaje de notas no corresponde al contenido: [a] está colocado sobre «Yahvé» aunque la nota trata de toda la frase «relacionada con el nombre de Yahvé»; [b] está colocado sobre «enigmas» correctamente. Además, «probarlo» en español puede sonar algo ambiguo o físico; «ponerlo a prueba» es más natural y más preciso para לְנַסֹּתוֹ.'
  spanish_quality_summary: El texto es claro y digno, pero se puede mejorar la naturalidad y la precisión. «Relacionada con el nombre de Yahvé» es aceptable, aunque algo pesada; «acerca del nombre de Yahvé» o «en relación con el nombre de Yahvé» sería más directo. «Ponerlo a prueba» suena mejor que «probarlo» en español bíblico contemporáneo. También conviene mover la nota [a] a la frase pertinente, no al nombre divino aislado.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: שְׁבָא → «Saba», יְהוָה → «Yahvé», חִידוֹת → «enigmas» con alternativa «preguntas difíciles». No hay conflicto con el glosario. La única mejora léxica recomendada es לְנַסֹּתוֹ → «ponerlo a prueba» para mayor claridad idiomática.'
  issues:
  - severity: medium
    issue: La nota [a] está anclada en «Yahvé» pero explica la frase completa לְשֵׁם יְהוָה.
    rationale: El lector puede entender erróneamente que la variante afecta solo al nombre divino, cuando en realidad trata la relación semántica de «acerca/en relación con el nombre de Yahvé».
  - severity: medium
    issue: «Probarlo» es menos preciso e idiomático que «ponerlo a prueba».
    rationale: נָסָה aquí describe un examen intelectual. En español, «probar» puede sonar ambiguo; «poner a prueba» comunica mejor el sentido de testearlo con acertijos/enigmas.
  - severity: low
    issue: «Relacionada con» es comprensible pero algo pesada en el flujo de la oración.
    rationale: Una formulación como «en relación con el nombre de Yahvé» mantiene la misma cautela exegética con mejor naturalidad.
  revised_spanish_text: Ahora la reina de Saba oyó la fama de Salomón en relación con el nombre de Yahvé[a], y vino para ponerlo a prueba con enigmas[b].
  revised_footnotes:
