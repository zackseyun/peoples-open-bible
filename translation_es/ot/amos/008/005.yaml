translation:
  language: es
  text: 'diciendo[a]: «¿Cuándo pasará la luna nueva, para que vendamos grano, y el sábado, para que pongamos grano a la venta, haciendo pequeña la efa[b] y grande el siclo, y falsificando balanzas engañosas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mes» para חֹדֶשׁ; aquí el contexto favorece la observancia de la luna nueva y no el mes calendario.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «haciendo pequeña la efa y grande el siclo»; es decir, dando menos producto y exigiendo más pago.'
    reason: cultural_note
lexical_decisions:
- source_word: לֵאמֹר / saying
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo así
  - y diciendo
  lexicon: HALOT
  rationale: La forma introductoria se vierte de manera natural con un gerundio en español; ‘diciendo’ conserva la función de enlace sin añadir contenido.
- source_word: הַחֹדֶשׁ
  english_pob_choice: the new moon
  chosen_spanish: novilunio
  alternatives_spanish:
  - la luna nueva
  - el mes
  lexicon: HALOT
  rationale: El contexto cultual favorece la observancia del novilunio, no solo el mes calendario. ‘Novilunio’ preserva esa referencia religiosa con un término español claro y relativamente sobrio.
- source_word: וְנַשְׁבִּירָה שֶּׁבֶר
  english_pob_choice: so that we may sell grain
  chosen_spanish: para que vendamos grano
  alternatives_spanish:
  - para que vendamos cereal
  - para que comercialicemos grano
  lexicon: HALOT
  rationale: El verbo hebreo admite el sentido de vender provisiones/grano; ‘vendamos grano’ refleja el valor comercial sin sobreinterpretar. ‘Grano’ es la opción más amplia y consistente con la revisión inglesa.
- source_word: וְהַשַּׁבָּת
  english_pob_choice: the Sabbath
  chosen_spanish: el sábado
  alternatives_spanish:
  - el día de reposo
  - el shabat
  lexicon: HALOT
  rationale: Aunque ‘Sabbath’ es el referente técnico, en español bíblico ‘el sábado’ comunica de modo directo la observancia semanal al lector amplio. Se evita ‘día de reposo’ por ser menos transparente y más interpretativo.
- source_word: וְנִפְתְּחָה בָּר
  english_pob_choice: so that we may offer grain for sale
  chosen_spanish: para que pongamos grano a la venta
  alternatives_spanish:
  - para que abramos el grano
  - para que vendamos trigo
  lexicon: HALOT
  rationale: La imagen idiomática de ‘abrir’ el grano para su venta se vierte de forma comprensible en español como ‘poner ... a la venta’. Se mantiene ‘grano’ para armonía con la cláusula anterior y con la revisión inglesa.
- source_word: בָּר
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - trigo
  - cereal
  lexicon: HALOT
  rationale: ‘Grano’ reproduce el término genérico y evita restringir indebidamente a trigo, aunque el contexto pueda sugerirlo.
- source_word: אֵיפָה
  english_pob_choice: the ephah
  chosen_spanish: la efa
  alternatives_spanish:
  - la medida efa
  - el efa
  lexicon: HALOT
  rationale: Se conserva la unidad antigua para no perder la concreción de la denuncia. ‘La efa’ es inteligible y no exige sustitución por una medida moderna.
- source_word: שֶׁקֶל
  english_pob_choice: the shekel
  chosen_spanish: el siclo
  alternatives_spanish:
  - el shekel
  - la moneda
  lexicon: HALOT
  rationale: ‘Siclo’ es la forma española tradicional del término, adecuada para una unidad de peso/valor bíblica. Se mantiene la paridad con ‘efa’ como medidas antiguas.
- source_word: וּלְעַוֵּת מֹאזְנֵי מִרְמָה
  english_pob_choice: and falsifying deceitful scales
  chosen_spanish: y falsificando balanzas engañosas
  alternatives_spanish:
  - y torciendo balanzas fraudulentas
  - y adulterando balanzas engañosas
  lexicon: HALOT
  rationale: ‘Falsificando’ expresa bien el sentido de pervertir/manipular. ‘Balanzas engañosas’ conserva el matiz moral de מִרְמָה sin volverlo demasiado técnico.
- source_word: מִרְמָה
  english_pob_choice: deceitful
  chosen_spanish: engañosas
  alternatives_spanish:
  - fraudulentas
  - falsas
  lexicon: HALOT
  rationale: Se adopta un adjetivo natural en español que mantenga la idea de fraude y engaño. ‘Engañosas’ funciona mejor que un calco más duro en este contexto.
theological_decisions:
- issue: Sentido cultual de las fechas sagradas en la acusación profética
  english_pob_reading: Translate both חֹדֶשׁ and שַׁבָּת as recognized religious observances ('new moon' and 'Sabbath') without minimizing their cultic significance.
  chosen_spanish_reading: Traducir חֹדֶשׁ como ‘novilunio’ y שַׁבָּת como ‘sábado’, preservando el peso de las observancias sagradas.
  alternative_spanish_readings:
  - Traducir חֹדֶשׁ como ‘mes’
  - Traducir שַׁבָּת como ‘día de reposo’
  rationale: La crítica profética recae sobre quienes detestan la interrupción del culto porque obstaculiza el lucro. ‘Novilunio’ mantiene el sentido de fiesta observada; ‘sábado’ comunica el día sagrado sin oscurecerlo con una perífrasis más interpretativa.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue el último pase de revisión inglés: conserva ‘grain’ para שׁבר/בָּר y refleja ‘falsifying deceitful scales’ con ‘falsificando balanzas engañosas’. También evita una restricción indebida a ‘trigo’ y mantiene la tensión cultual de ‘new moon’ y ‘Sabbath’.'
  spanish_consistency_notes:
  - Se prefiere ‘novilunio’ sobre ‘mes’ para el valor festivo de חֹדֶשׁ.
  - Se usa ‘grano’ de manera uniforme para שׁבר y בָּר, como en la revisión inglesa.
  - ‘Efa’ y ‘siclo’ conservan las unidades antiguas y su función en la denuncia comercial.
  - ‘Balanzas engañosas’ mantiene el tono moral de מִרְמָה sin introducir tecnicismos innecesarios.
