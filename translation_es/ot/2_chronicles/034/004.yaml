  yaml_path: translation/ot/2_chronicles/034/004.yaml
  text: They tore down before him the altars of the Baals[a], and he cut down the incense altars that were above them. He shattered and crushed the Asherim, the carved images, and the metal images[b], and scattered them over the graves of those who had sacrificed to them.
