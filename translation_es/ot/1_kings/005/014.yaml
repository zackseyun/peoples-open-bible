revisions:
- from: Y de todos los pueblos venían[a] para oír la sabiduría de Salomón, de parte de todos los reyes de la tierra, que habían oído de su sabiduría.
  to: Y vinieron de todos los pueblos[a] para oír la sabiduría de Salomón[b], de todos los reyes de la tierra que habían oído hablar de su sabiduría.
  rationale: Se corrige el tiempo verbal a pretérito simple para reflejar mejor el wayyiqtol narrativo; se reemplaza 'de parte de' por 'de' para no sobreinterpretar מֵאֵת; se añade la nota cultural presente en la auditoría inglesa; y se suaviza la última cláusula a un español más natural con 'habían oído hablar de su sabiduría'.
  reviewer_model: gpt-5.4
