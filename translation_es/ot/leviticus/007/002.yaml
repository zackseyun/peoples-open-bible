review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del hebreo: ubicación ritual, degüello del holocausto, degüello del אָשָׁם, y manipulación de su sangre alrededor del altar. Sin embargo, dos elecciones debilitan la precisión del sentido fuente y del rastro auditado inglés: «rociará» suaviza יִזְרֹק, que en este contexto sacrificial se acerca más a «arrojar/salpicar» que a una aspersión ligera; y «sobre el altar» no expresa tan bien la fuerza de עַל con יִזְרֹק como «contra el altar».'
  spanish_quality_summary: El español es legible y digno, pero «rociará su sangre sobre el altar, alrededor» suena algo forzado y menos natural que una secuencia integrada como «arrojará su sangre contra el altar, alrededor de este» o «por todo alrededor». Además, la nota al pie tiene comillas y puntuación poco naturales por el arranque con comilla simple.
  glossary_alignment: '«Holocausto» para עֹלָה y «ofrenda por la culpa» para אָשָׁם son aceptables y coherentes con el expediente. La nota de alternativa léxica preserva bien la dimensión de reparación/compensación. El principal desajuste terminológico está en יִזְרֹק: el expediente POB justificó explícitamente una acción más fuerte que «sprinkle», por lo que «rociará» no conserva bien esa decisión.'
  issues:
  - severity: medium
    issue: «rociará» para יִזְרֹק
    rationale: El expediente inglés documenta que זָרַק aquí no es una aspersión ligera sino una acción de arrojar/salpicar sangre contra el altar. «Rociar» en español tiende a sonar demasiado suave y cercano a «sprinkle».
  - severity: medium
    issue: «sobre el altar» para עַל הַמִּזְבֵּחַ con יִזְרֹק
    rationale: Dada la acción ritual de זָרַק, «contra el altar» comunica mejor la aplicación de sangre sobre la superficie del altar que «sobre el altar», que en español puede sonar como simple ubicación encima.
  - severity: low
    issue: La frase final «sobre el altar, alrededor» es poco idiomática
    rationale: Aunque entendible, el cierre queda algo abrupto. Conviene integrar mejor סָבִיב en la sintaxis española.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: 'La nota empieza con una comilla simple innecesaria: «''O también...». Debe normalizarse a una formulación española limpia.'
  revised_spanish_text: En el lugar donde degüellan el holocausto[a], degollarán la ofrenda por la culpa, y arrojará su sangre contra el altar, alrededor de este.
  revised_footnotes:
