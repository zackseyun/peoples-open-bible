base_translation:
  language: en
  yaml_path: translation/ot/isaiah/045/013.yaml
  text: I have stirred him up in righteousness[a], and I will make all his ways straight. He will rebuild my city and send my exiles away, not for a price and not for a bribe[c][b], says Yahweh of Armies.
  footnotes:
  - marker: a
    text: Or 'I have raised him up in righteousness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'He will build my city.' The Hebrew verb is simply 'build'; 'rebuild' reflects the historical context of Jerusalem's restoration.
    reason: lexical_alternative
  - marker: c
    text: 'Traditional: ''the LORD of Hosts.'''
    reason: lexical_alternative
