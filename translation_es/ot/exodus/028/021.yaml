review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: las piedras corresponden a los nombres de los hijos de Israel, son doce, llevan inscripciones de tipo sello y representan a las doce tribus. Sin embargo, omite una nota equivalente a la nota inglesa sobre «hijos de Israel» y suaviza ligeramente el distributivo hebreo אִישׁ con «cada una», que es legible pero menos alineado con la decisión auditada «cada uno/ cada cual según su nombre».'
  spanish_quality_summary: El español es claro y digno, pero «estarán según» suena algo menos natural en este contexto que «serán según». Además, «cada una según su nombre» es comprensible por concordar con «piedras», pero estilísticamente queda un poco rígido y se aleja de la formulación distributiva del original. Conviene ajustar para mayor naturalidad y mejor fidelidad auditada.
  glossary_alignment: Se mantiene correctamente «hijos de Israel» en línea con la decisión teológica del POB. No hay términos del glosario mayor en disputa. Falta, no obstante, preservar en nota la alternativa/documentación de «hijos de Israel» frente a «israelitas/ hijos de Israel», ya que el inglés sí la conservó.
  issues:
  - severity: medium
    issue: Falta una nota para «hijos de Israel» equivalente a la nota inglesa [c].
    rationale: El rastro de auditoría inglés preserva explícitamente la expresión hebrea formal «sons of Israel» frente a alternativas como «children of Israel» o «Israelites». La revisión española debe conservar esa decisión lexical/teológica en nota.
  - severity: low
    issue: «Estarán según» es menos natural que «serán según» en español bíblico actual.
    rationale: Ambas opciones pueden representar תִּהְיֶיןָ, pero «serán según» suena más idiomático en una cláusula descriptiva de correspondencia.
  - severity: medium
    issue: «Cada una según su nombre» desplaza el distributivo personal hebreo אִישׁ.
    rationale: Aunque la concordancia con «piedras» hace la frase entendible, el original enfatiza distributivamente «cada uno / cada cual según su nombre». En español puede mantenerse ese matiz sin perder claridad.
  revised_spanish_text: Y las piedras serán según los nombres de los hijos de Israel[a], doce según sus nombres. Serán como grabados de sello, cada cual según su nombre[c][b], para las doce tribus.
  revised_footnotes:
