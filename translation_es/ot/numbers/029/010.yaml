translation:
  language: es
  text: un décimo para cada cordero[a], para los siete corderos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo dice literalmente «un décimo, un décimo»; en el contexto sacrificial, esto denota una medida de décima parte, a menudo entendida como un décimo de efa.
