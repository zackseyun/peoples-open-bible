base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/032/033.yaml
  text: They turned their back to me and not their face[a]; though I taught them, rising early and teaching[b], they would not listen to receive correction.
  footnotes:
  - marker: a
    text: Or 'to accept discipline.' The Hebrew musar can mean correction, discipline, or instruction, often with the sense of formative rebuke.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'rising early and teaching,' an idiom for persistent, diligent instruction.
    reason: cultural_note
