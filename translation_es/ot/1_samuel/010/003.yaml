base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/010/003.yaml
  text: 'Then you will pass on from there and go farther[a], and you will come to the oak of Tabor. There three men going up to God at Bethel will meet you: one carrying three young goats, another carrying three loaves of bread[c][b], and another carrying a wineskin.'
  footnotes:
  - marker: a
    text: Or 'the terebinth of Tabor.' The Hebrew word can refer to a large tree such as an oak or terebinth.
    reason: lexical_alternative
  - marker: b
    text: Literally 'going up to God at Bethel'; this likely refers to traveling to a worship site at Bethel.
    reason: cultural_note
  - marker: c
    text: Or 'a wineskin of wine.'
    reason: lexical_alternative
