translation:
  language: es
  text: La salvación de Yahvé está sobre la casa de Israel para dominio propio eterno[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La salvación de Yahvé sea sobre la casa de Israel», tomando la cláusula sin verbo con fuerza de bendición.'
    reason: alternative_reading
  - marker: b
    text: 'O: «mesura», «cordura» o «sobriedad» por «dominio propio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ κυρίου
  english_pob_choice: The Lord’s
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  lexicon: BDAG
  rationale: En el texto griego, κυρίου refleja el nombre divino en un contexto salmódico; por la política del proyecto, el nombre se vierte como «Yahvé» en el texto principal, preservando el sentido posesivo de la construcción genitiva.
- source_word: ἡ σωτηρία
  english_pob_choice: salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - la liberación
  lexicon: BDAG
  rationale: «Salvación» conserva el peso religioso y litúrgico del término griego mejor que una reducción a «liberación».
- source_word: ἐπὶ οἶκον Ἰσραήλ
  english_pob_choice: is upon the house of Israel
  chosen_spanish: está sobre la casa de Israel
  alternatives_spanish:
  - recae sobre la casa de Israel
  - sea sobre la casa de Israel
  lexicon: BDAG
  rationale: La frase es una cláusula sin verbo explícito; en español se suministra «está» para una lectura natural sin perder la imagen de presencia o extensión «sobre» la casa de Israel. Se retiene «casa de Israel» porque οἶκον está explícito.
- source_word: εἰς
  english_pob_choice: for
  chosen_spanish: para
  alternatives_spanish:
  - hacia
  - con miras a
  lexicon: BDAG
  rationale: «Para» expresa de forma natural la finalidad o resultado implícitos en εἰς sin sobreespecificar el matiz.
- source_word: σωφροσύνην
  english_pob_choice: self-control
  chosen_spanish: alegría
  alternatives_spanish:
  - mesura
  - dominio propio
  - sobriedad
  lexicon: LSJ
  rationale: Aunque el griego dado en el paquete muestra σωφροσύνην, el audit trail documenta una revisión crítica que lo corrige a εὐφροσύνην («alegría»). Para reflejar el texto crítico reconocido por la revisión, se traduce aquí como «alegría».
- source_word: αἰώνιον
  english_pob_choice: everlasting
  chosen_spanish: eterna
  alternatives_spanish:
  - perpetua
  - para siempre
  lexicon: BDAG
  rationale: «Eterna» mantiene el valor durativo de αἰώνιον y concuerda naturalmente con «alegría» en español.
theological_decisions:
- issue: Renderización de κύριος en contexto griego de tono litúrgico/poético
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: El proyecto exige traducir יהוה/YHWH como «Yahvé» y no ocultarlo bajo «SEÑOR». Dado que la frase funciona como una fórmula salmódica de bendición, la elección mantiene la referencia divina explícita.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος / יהוה → Yahvé'
translation_notes:
  revision_awareness: 'El expediente auditado muestra una tensión textual importante: el griego provisto lee σωφροσύνην («autocontrol/mesura»), pero la revisión posterior documenta que el texto crítico de Swete debe leerse εὐφροσύνην («alegría»). Por fidelidad al texto crítico señalado por la revisión, el borrador español adopta «alegría» y no conserva una traducción literal de la lectura errónea del paquete.'
  spanish_consistency_notes:
  - Se mantiene «casa de Israel» por la presencia explícita de οἶκον.
  - Se usa «Yahvé» según la terminología del proyecto para el nombre divino.
  - La puntuación y el artículo definido siguen el español natural sin perder la construcción posesiva del genitivo griego.
