translation:
  language: es
  text: Y hacia el anochecer se lavará con agua, y cuando se ponga el sol[a], podrá entrar en medio[b] del campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'cuando el sol entra'; este es un modismo hebreo para la puesta del sol.
    reason: lexical_alternative
  - marker: b
    text: O 'al campamento'; el hebreo dice más específicamente 'en medio del campamento'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y sucederá
  lexicon: HALOT
  rationale: La waw + היה abre una continuación legal; en español, 'Y' conserva la secuencia normativa sin añadir una afirmación innecesaria.
- source_word: לִפְנוֹת עֶרֶב
  english_pob_choice: toward evening
  chosen_spanish: hacia el anochecer
  alternatives_spanish:
  - al atardecer
  - cuando ya cae la tarde
  lexicon: HALOT
  rationale: La expresión indica el giro del día hacia la tarde/noche. 'Hacia el anochecer' comunica bien el valor temporal y mantiene naturalidad en español.
- source_word: יִרְחַץ בַּמָּיִם
  english_pob_choice: he shall wash himself with water
  chosen_spanish: se lavará con agua
  alternatives_spanish:
  - se bañará con agua
  - se lavará en agua
  lexicon: HALOT
  rationale: En este contexto ritual, רחץ implica lavarse el cuerpo. El reflexivo español expresa la acción sobre sí mismo sin sobrecargar el verso.
- source_word: וּכְבֹא הַשֶּׁמֶשׁ
  english_pob_choice: when the sun sets
  chosen_spanish: cuando se ponga el sol
  alternatives_spanish:
  - cuando el sol entre
  - al ponerse el sol
  lexicon: HALOT
  rationale: El hebreo es idiomático y alude a la puesta del sol. 'Cuando se ponga el sol' mantiene el idioma natural del español y preserva la imagen literal.
- source_word: יָבֹא
  english_pob_choice: he may come
  chosen_spanish: podrá entrar
  alternatives_spanish:
  - podrá venir
  - entrará
  lexicon: HALOT
  rationale: El imperfecto aquí expresa permiso tras el lavado y la puesta del sol. 'Podrá entrar' transmite autorización más claramente que un futuro simple.
- source_word: אֶל תּוֹךְ הַמַּחֲנֶה
  english_pob_choice: into the midst of the camp
  chosen_spanish: en medio del campamento
  alternatives_spanish:
  - al campamento
  - dentro del campamento
  lexicon: HALOT
  rationale: תוך añade la idea de interioridad; 'en medio del campamento' reproduce esa fuerza con una frase española natural. 'Campamento' es la equivalencia habitual de מחנה.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; este borrador sigue la lectura de alta concordancia del texto hebreo y la solución inglesa auditada, manteniendo los matices idiomáticos principales.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma habitual para el nombre divino cuando aparezca; en este versículo no aparece.
  - Se mantiene 'campamento' para מחנה, coherente con el registro legal y narrativo del Pentateuco.
  - '''En medio del campamento'' conserva el matiz de interioridad de תוך, alineado con la nota auditada en inglés.'
