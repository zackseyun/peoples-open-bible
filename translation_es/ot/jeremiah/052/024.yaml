translation:
  language: es
  text: Y el capitán de la guardia tomó a Seraía, el sacerdote principal[a], y a Sefanías, el segundo sacerdote[b], y a los tres guardianes del umbral[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el sumo sacerdote'. El título hebreo es literalmente 'el sacerdote jefe/cabeza'.
    reason: lexical_alternative
  - marker: b
    text: O 'el sacerdote suplente' para 'el segundo sacerdote'.
    reason: lexical_alternative
  - marker: c
    text: O 'porteros' para 'guardianes del umbral'.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַב טַבָּחִים
  english_pob_choice: captain of the guard
  chosen_spanish: capitán de la guardia
  alternatives_spanish:
  - jefe de los verdugos
  - capitán de la escolta
  - comandante de la guardia
  lexicon: HALOT
  rationale: El hebreo literalmente combina 'jefe' + 'carniceros/verdugos', pero en contexto babilónico designa al oficial al mando de la guardia real. 'Capitán de la guardia' comunica la función sin sobrecargar el título con una literalidad engañosa.
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - se llevó
  - capturó
  - arrestó
  lexicon: HALOT
  rationale: לקח en narración básica significa 'tomar'. En este contexto implica aprehensión, pero 'tomó' conserva la fuerza narrativa sin añadir una interpretación más específica de la que exige el hebreo.
- source_word: שְׂרָיָה
  english_pob_choice: Seraiah
  chosen_spanish: Seraía
  alternatives_spanish:
  - Seraías
  lexicon: transliteración POB
  rationale: Se mantiene el nombre propio en forma española transliterada, con adaptación ortográfica natural al español bíblico.
- source_word: כֹּהֵן הָרֹאשׁ
  english_pob_choice: the chief priest
  chosen_spanish: el sacerdote principal
  alternatives_spanish:
  - el sumo sacerdote
  - el sacerdote jefe
  - el sacerdote mayor
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'sacerdote, el cabeza/jefe'. 'Sacerdote principal' refleja mejor esa estructura que 'sumo sacerdote', que en español puede sugerir un término técnico distinto y más fijado de lo que permite este pasaje.
- source_word: צְפַנְיָה
  english_pob_choice: Zephaniah
  chosen_spanish: Sefanías
  alternatives_spanish:
  - Sofonías
  lexicon: transliteración POB
  rationale: Se translitera el nombre propio con ortografía española habitual para el nombre bíblico, manteniendo la identificación del personaje.
- source_word: כֹּהֵן הַמִּשְׁנֶה
  english_pob_choice: the second priest
  chosen_spanish: el segundo sacerdote
  alternatives_spanish:
  - el sacerdote de segundo rango
  - el sacerdote suplente
  - el sacerdote نائب
  lexicon: HALOT
  rationale: משנה expresa rango secundario o de suplencia. 'Segundo sacerdote' es una equivalencia directa y natural que preserva la jerarquía sin expandir el cargo más allá del texto.
- source_word: שְׁלֹשֶׁת
  english_pob_choice: the three
  chosen_spanish: los tres
  alternatives_spanish:
  - tres
  lexicon: HALOT
  rationale: 'El sintagma constructo se vierte de manera natural con artículo en español: ''los tres''. Mantiene la referencia precisa al grupo completo.'
- source_word: שֹׁמְרֵי הַסַּף
  english_pob_choice: keepers of the threshold
  chosen_spanish: guardianes del umbral
  alternatives_spanish:
  - porteros
  - guardas del umbral
  - guardianes de la puerta
  lexicon: HALOT
  rationale: La imagen hebrea de 'guardias/guardianes del umbral' se preserva. 'Guardianes del umbral' mantiene el matiz concreto y oficial mejor que 'porteros', que en español suena más interpretativo y menos técnico.
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente: no se introducen cambios sustantivos respecto del sentido auditado en inglés, solo una formulación española equilibrada y transparente.'
  spanish_consistency_notes:
  - Se conserva el paralelismo y la enumeración del hebreo.
  - Se usa 'Yahvé' como norma solo cuando aparece el tetragrámaton; aquí no aplica.
  - Se mantiene la distinción entre cargos sacerdotales sin fusionarlos en títulos eclesiásticos modernos.
  - Los nombres propios siguen transliteración española estable y legible.
  - El orden de los complementos respeta el flujo narrativo del original.
