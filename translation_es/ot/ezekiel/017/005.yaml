  revision_rationale: Se corrige el anclaje de la nota para que corresponda a צַפְצָפָה/sauce, se ajusta בִּשְׂדֵה זָרַע + קָח a 'tierra fértil' conforme a la decisión documentada del POB, y se acerca עַל מַיִם רַבִּים a la revisión inglesa final con 'a aguas abundantes'. 'parte de la semilla de la tierra' conserva mejor el matiz partitivo de מִן sin sonar demasiado forzado.
