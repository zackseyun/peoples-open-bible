translation:
  language: es
  text: 'Entonces Hazael fue a su encuentro y tomó un presente en su mano, y toda clase de bienes de Damasco, una carga de cuarenta camellos. Llegó, se presentó ante él y dijo: «Tu hijo[a] Ben-adad, rey de Aram, me ha enviado a ti para decir: “¿Sanaré[b] de esta enfermedad?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tu hijo» es una expresión deferente de humildad hacia un superior respetado; no necesariamente indica filiación literal.
    reason: cultural_note
  - marker: b
    text: 'O más literalmente: «¿Viviré a pesar de esta enfermedad?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: al encuentro de él
  alternatives_spanish:
  - a recibirlo
  - a su encuentro
  lexicon: HALOT
  rationale: La expresión hebrea indica ir hacia alguien para encontrarlo. «Al encuentro de él» conserva la dirección del movimiento y suena natural en español narrativo; evita una paráfrasis excesiva.
- source_word: מִנְחָה
  english_pob_choice: a gift
  chosen_spanish: un presente
  alternatives_spanish:
  - un regalo
  - un tributo
  - una ofrenda
  lexicon: HALOT
  rationale: En este contexto diplomático no es una ofrenda cultual. «Presente» mantiene el valor de obsequio llevado a un superior sin cargar de por sí con la idea política de tributo.
- source_word: בְיָדוֹ
  english_pob_choice: in his hand
  chosen_spanish: en su mano
  alternatives_spanish:
  - con él
  lexicon: HALOT
  rationale: Se conserva el hebraísmo concreto del texto fuente. En español es claro y no exige suavizarlo a «con él».
- source_word: וְכָל טוּב דַּמֶּשֶׂק
  english_pob_choice: every good thing of Damascus
  chosen_spanish: toda clase de bienes de Damasco
  alternatives_spanish:
  - todos los bienes de Damasco
  - toda la riqueza de Damasco
  - todas las cosas buenas de Damasco
  lexicon: HALOT
  rationale: טוּב aquí apunta a bienes/lo mejor de la ciudad. «Toda clase de bienes» comunica abundancia y calidad en español sin sonar tan extraño como una traducción demasiado literal.
- source_word: מַשָּׂא אַרְבָּעִים גָּמָל
  english_pob_choice: a load of forty camels
  chosen_spanish: una carga de cuarenta camellos
  alternatives_spanish:
  - el cargamento de cuarenta camellos
  - una carga para cuarenta camellos
  lexicon: HALOT
  rationale: La frase cuantifica el volumen de los bienes por la capacidad de cuarenta camellos. «Carga de cuarenta camellos» respeta el giro hebreo y es idiomática en español.
- source_word: וַיַּעֲמֹד לְפָנָיו
  english_pob_choice: stood before him
  chosen_spanish: se puso delante de él
  alternatives_spanish:
  - se presentó ante él
  - estuvo de pie ante él
  lexicon: HALOT
  rationale: En español, «se puso delante de él» expresa la postura de audiencia sin perder naturalidad. Mantiene la escena formal ante Eliseo.
- source_word: בִּנְךָ
  english_pob_choice: Your son
  chosen_spanish: Tu hijo
  alternatives_spanish:
  - Tu servidor
  - Tu siervo
  lexicon: HALOT
  rationale: Se conserva la metáfora literal del hebreo. La POB inglesa ya documenta que es una fórmula deferencial, no necesariamente filiación biológica; en español conviene mantener la tensión textual.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: HALOT
  rationale: Se mantiene el nombre histórico transliterado, conforme a la línea terminológica del proyecto, en vez de sustituirlo por un equivalente geopolítico posterior.
- source_word: הַאֶחְיֶה
  english_pob_choice: Will I recover
  chosen_spanish: ¿Sanaré?
  alternatives_spanish:
  - ¿Viviré?
  - ¿Recobraré la vida?
  lexicon: HALOT
  rationale: En el contexto de enfermedad, el valor idiomático es preguntar por recuperación. «Sanaré» comunica ese sentido de manera natural en español y preserva la tensión entre vivir y recuperarse.
- source_word: מֵחֳלִי זֶה
  english_pob_choice: from this sickness
  chosen_spanish: de esta enfermedad
  alternatives_spanish:
  - de esta dolencia
  - de esta aflicción
  lexicon: HALOT
  rationale: «Enfermedad» es una equivalencia clara y digna para חֳלִי en este contexto. La preposición hebrea de salida/separación queda bien reflejada con «de».
theological_decisions:
- issue: Tratamiento de בִּנְךָ como fórmula deferencial
  english_pob_reading: “Your son” is a deferential expression of humility toward a respected superior; it does not necessarily indicate literal sonship.
  chosen_spanish_reading: «Tu hijo» se mantiene literalmente, entendiendo que es una fórmula de respeto hacia un superior, no una afirmación necesaria de parentesco biológico.
  alternative_spanish_readings:
  - «Tu servidor»
  - «Tu siervo»
  rationale: El texto hebreo usa la metáfora filial; traducirla como siervo o servidor aplanaría una tensión importante que la POB inglesa decidió conservar y explicar. La nota preserva la lectura deferencial sin borrar la literalidad.
  doctrine_reference: 2 Reyes 8:9; nota cultural sobre el uso cortesano de «hijo»
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «even» por una coordinación más natural y ajustó «a load for forty camels» a «a load of forty camels». En español, «y toda clase de bienes de Damasco, una carga de cuarenta camellos» sigue de cerca la revisión final y evita introducir un intensificador innecesario.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantiene «Aram» en lugar de «Siria» por consistencia histórica y terminológica.
  - Se preserva la metáfora literal «Tu hijo» con nota explicativa, en línea con la POB inglesa.
  - Se evita «siervo» para בִּנְךָ porque el hebreo no dice eso; la aclaración queda en la nota.
