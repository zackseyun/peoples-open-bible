base_translation:
  language: en
  yaml_path: translation/deuterocanon/sirach/050/015.yaml
  text: Then the sons of Aaron[a], the priests[b], would raise a shout with beaten trumpets.
  footnotes:
  - marker: a
    text: Greek has a longer parallel here, describing the priest extending his hand for the libation and pouring out the blood of the grape at the altar as a pleasing aroma to the Most High, the King of all. The Hebrew witness preserved here contains only the trumpet acclamation line.
    reason: textual_variant
  - marker: b
    text: Or 'would sound a blast with hammered trumpets.' The Hebrew verb can denote a loud acclamation or signal-shout, and in this context it is expressed through the trumpets.
    reason: lexical_alternative
