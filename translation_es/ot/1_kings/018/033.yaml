translation:
  language: es
  text: Entonces dispuso la madera, partió el toro en pedazos y lo puso sobre la madera.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲרֹךְ
  english_pob_choice: arranged
  chosen_spanish: colocó
  alternatives_spanish:
  - dispuso
  - ordenó
  lexicon: HALOT
  rationale: En este contexto ritual, ערך expresa preparar o disponer los elementos para el sacrificio. «Colocó» comunica bien la acción concreta en español sin sonar forzado; «dispuso» también sería posible, pero «colocó» mantiene la fluidez narrativa.
- source_word: הָעֵצִים
  english_pob_choice: the wood
  chosen_spanish: la madera
  alternatives_spanish:
  - la leña
  - la madera para quemar
  lexicon: HALOT
  rationale: Aunque el hebreo usa un plural formal, el inglés POB opta por el colectivo singular «wood». En español, «la madera» conserva ese valor colectivo y es idiomática; «la leña» podría sugerir ya madera partida para fuego, pero aquí la escena solo dice la madera preparada.
- source_word: וַיְנַתַּח
  english_pob_choice: cut ... into pieces
  chosen_spanish: partió ... en pedazos
  alternatives_spanish:
  - cortó ... en piezas
  - despedazó
  lexicon: HALOT
  rationale: נתח se refiere a dividir el animal en partes para la ofrenda. «Partió ... en pedazos» es natural en español y mantiene el sentido sacrificial sin añadir crudeza innecesaria.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el novillo
  - el toro joven
  lexicon: HALOT
  rationale: פַּר denota un bovino sacrificial; «toro» es una equivalencia directa y comprensible. «Novillo» sería una posible especificación, pero el verso no exige restringir más el referente.
- source_word: וַיָּשֶׂם
  english_pob_choice: placed
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo echó
  lexicon: HALOT
  rationale: שׂים en secuencia narrativa puede ser «poner» o «colocar». Aquí «lo puso» conserva sencillez y sigue de cerca la acción descrita, con el antecedente implícito del toro.
- source_word: עַל הָעֵצִים
  english_pob_choice: on the wood
  chosen_spanish: sobre la madera
  alternatives_spanish:
  - encima de la madera
  - sobre la leña
  lexicon: HALOT
  rationale: עַל indica colocación encima de algo. «Sobre la madera» reproduce bien la imagen espacial y mantiene la coherencia con la primera mención de la madera.
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con la lectura inglesa auditada; se mantuvo la secuencia narrativa y el registro ritual sin introducir notas textuales, ya que no hay variantes, tensiones léxicas o decisiones doctrinales documentadas en el material provisto.
  spanish_consistency_notes:
  - Se mantuvo «madera» de forma consistente para הָעֵצִים, en continuidad con el valor colectivo elegido en la auditoría inglesa.
  - Se evitó el calco rígido de «en la madera» por preferir la preposición natural «sobre» tras el segundo miembro, sin alterar el sentido espacial del hebreo.
  - 'El orden de los verbos sigue la progresión narrativa del hebreo y del inglés auditado: preparar, partir, poner.'
