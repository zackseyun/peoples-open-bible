  to: Y vio la mujer que el árbol era bueno para comer, y que era un deleite para los ojos[a], y que el árbol era deseable para hacer sabio[b]. Entonces tomó de su fruto y comió, y también dio a su marido, que estaba con ella, y él comió.
  rationale: Se reubicó [a] en la frase correspondiente a 'deleite para los ojos', porque esa es la expresión a la que se refiere la nota. Se cambió 'para hacerse sabia' por 'para hacer sabio' para reflejar mejor la decisión auditada del POB y conservar la ambigüedad documentada entre adquirir e impartir sabiduría, evitando además un reflexivo femenino demasiado interpretativo. El resto del texto se mantiene por ser fiel, claro y natural.
