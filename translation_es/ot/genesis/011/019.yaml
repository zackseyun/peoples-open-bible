  text: Y Peleg vivió doscientos nueve años después de haber engendrado a Reu, y engendró hijos e hijas.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - vivió
  - estuvo vivo
  - vivió por
  lexicon: HALOT
  rationale: En fórmulas genealógicas, חיה expresa el transcurso de la vida de una persona; «vivió» es la forma natural y fiel en español para indicar ese lapso.
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: después de
  alternatives_spanish:
  - después de
  - tras
  lexicon: HALOT
  rationale: Marca temporal estándar; «después de» conserva con claridad la relación posterior al engendramiento de Reu.
- source_word: הוֹלִידוֹ / יִלֵּד
  english_pob_choice: he fathered
  chosen_spanish: haber engendrado
  alternatives_spanish:
  - engendrar
  - haber sido padre de
  - haber dado a luz
  lexicon: HALOT
  rationale: El hiphil de ילד en genealogías señala el acto de engendrar/fathering. «Engendrado» mantiene el valor genealógico sin sonar tan arcaico como «engendró» en la cláusula subordinada, y preserva la relación causal del hebreo.
- source_word: אֶת רְעוּ
  english_pob_choice: Reu
  chosen_spanish: Reu
  alternatives_spanish:
  - Reú
  lexicon: transliteration policy
  rationale: Nombre propio transliterado de manera consistente con la política del proyecto; sin acento gráfico porque no lo requiere la forma española establecida en este contexto.
- source_word: תֵּשַׁע שָׁנִים וּמָאתַיִם שָׁנָה
  english_pob_choice: two hundred and nine years
  chosen_spanish: doscientos nueve años
  alternatives_spanish:
  - nueve años y doscientos años
  lexicon: HALOT
  rationale: Aunque el hebreo ordena primero la unidad y luego la centena, el español normaliza a «doscientos nueve años» para una lectura idiomática, sin perder el valor total del número.
- source_word: וַיּוֹלֶד
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - engendró
  - fue padre de
  lexicon: HALOT
  rationale: Se mantiene la misma raíz genealogía de ילד con «engendró», que comunica con precisión el acto de procrear/ser padre en este registro.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - hijos e hijas
  - varones y mujeres
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente sexo; en español «hijos e hijas» es claro, natural y conserva esa especificidad mejor que el genérico «hijos».
translation_notes:
  revision_awareness: 'No se requieren notas textuales ni variantes adicionales: el hebreo del versículo es estable y el audit trail inglés coincide plenamente con el sentido genealógico. La principal decisión fue idiomática: normalizar el orden numérico hebreo al patrón natural del español sin alterar el total.'
  spanish_consistency_notes:
  - Se preservó la secuencia narrativa genealógica con dos repeticiones del verbo de engendrar, como en el hebreo.
  - Se evitó «padreó» u otras formas poco naturales; «engendró» es la opción más transparente y tradicionalmente comprensible en español bíblico.
  - El nombre propio Reu se dejó sin marcas adicionales para mantener uniformidad transliterada.
