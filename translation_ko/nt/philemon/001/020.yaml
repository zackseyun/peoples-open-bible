id: PHM.1.20
reference: Philemon 1:20
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ναί, ἀδελφέ, ἐγώ σου ὀναίμην ἐν κυρίῳ· ἀνάπαυσόν μου τὰ σπλάγχνα ἐν ⸀Χριστῷ.
base_translation:
  language: en
  yaml_path: translation/nt/philemon/001/020.yaml
  text: Yes[a], brother, let me have benefit from you in the Lord[c][b]; refresh my heart in Messiah.
  footnotes:
  - marker: a
    text: Or 'let me profit from you,' or 'let me have joy from you.' Paul may be making a wordplay on Onesimus' name and the idea of usefulness/benefit.
    reason: lexical_alternative
  - marker: b
    text: Greek 'my inward parts,' an idiom for deep affections or inner being; rendered 'my heart' in natural English.
    reason: lexical_alternative
  - marker: c
    text: Or 'in Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its titular sense.
    reason: alternative_reading
translation:
  language: ko
  text: 그렇습니다, 형제여, 내가 주 안에서 그대로부터 유익[a]을 얻게 해 주시기 바랍니다. 메시아[c] 안에서 내 마음[b]에 새 힘을 주십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「유익을 누리다」 또는 「기쁨을 얻다」. 바울은 오네시모(Ὀνήσιμος)의 이름 — 「유익한 자」 — 과 유익(ὀναίμην)이라는 어휘로 언어유희를 펼치는 듯하다(11절 참조).
    reason: lexical_alternative
  - marker: b
    text: 헬라어는 「내장(內臟)」, 곧 깊은 정의 자리를 가리키는 관용어; 자연스러운 한국어로 「내 마음」으로 옮긴다(7절 참조).
    reason: lexical_alternative
  - marker: c
    text: 또는 「그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮기는 원칙을 따른다.
    reason: alternative_reading
lexical_decisions:
- source_word: ναί
  english_pob_choice: 'Yes'
  chosen_korean: 그렇습니다
  alternatives_korean:
  - '예'
  - 정말로
  lexicon: BDAG
  rationale: 따뜻한 긍정과 호소를 도입한다. 합쇼체 「그렇습니다」가 자연스럽다.
- source_word: ἀδελφέ
  english_pob_choice: brother
  chosen_korean: 형제여
  alternatives_korean:
  - 나의 형제여
  lexicon: BDAG
  rationale: 호격. 7절과 일관되게 「형제여」.
- source_word: ἐγώ σου ὀναίμην
  english_pob_choice: let me have benefit from you
  chosen_korean: 그대로부터 유익을 얻게 해 주시기 바랍니다
  alternatives_korean:
  - 그대로부터 유익을 누리게 해 주시기 바랍니다
  - 그대로부터 기쁨을 얻게 해 주시기 바랍니다
  lexicon: BDAG
  rationale: ὀναίμην은 ὀνίνημι의 희구법 — 「유익·이득을 얻다」. 바울은 11절의 ἄχρηστον/εὔχρηστον과 오네시모 이름(「유익한 자」)으로 이어진 언어유희를 절정적으로 마무리한다. 「유익을 얻다」가 그 어휘 연결과 호소의 무게를 함께 보존한다.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에서
  alternatives_korean:
  - 주님 안에서
  lexicon: BDAG
  rationale: 바울 정형. κύριος 기본값 「주」.
- source_word: ἀνάπαυσόν
  english_pob_choice: refresh
  chosen_korean: 새 힘을 주십시오
  alternatives_korean:
  - 쉬게 해 주십시오
  - 평안하게 해 주십시오
  lexicon: BDAG
  rationale: 부정과거 명령형. 7절의 ἀναπέπαυται를 「새 힘을 얻었다」로 옮긴 것과 어휘 일관성을 유지하기 위해 「새 힘을 주십시오」를 택한다. 7절(성도들의 마음이 새 힘을 얻음)과 20절(나의 마음에 새 힘을 줌)의 호응이 한국어로도 그대로 살아난다.
- source_word: μου τὰ σπλάγχνα
  english_pob_choice: my heart
  chosen_korean: 내 마음
  alternatives_korean:
  - 내 속사람
  - 나의 심정
  lexicon: BDAG
  rationale: 7절과 일관되게 「마음」. 12절은 절정적 동일시(「곧 나의 심장」)에서 「심장」으로 차별화했지만, 20절은 7절의 동사 ἀνάπαυσον의 호응 문맥이므로 7절과 일관되게 「마음」을 사용한다.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_korean: 메시아 안에서
  alternatives_korean:
  - 그리스도 안에서
  lexicon: BDAG
  rationale: 본 번역의 칭호 원칙. 「메시아 안에서」로 보존.
theological_decisions:
- issue: Χριστῷ를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 절의 ἐν Χριστῷ는 그리스도인의 친교·행위의 영역을 가리키며, 칭호의 무게가 살아 있다. DOCTRINE.md 원칙에 따라 「메시아」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: 7절·20절의 ἀναπαύω 호응 보존
  chosen_reading: 7절·20절 모두 「새 힘을 얻다/주다」로 동사 일관성 유지
  alternative_readings:
  - 「쉼/평안」으로 옮겨 안식의 의미를 강조
  rationale: 빌레몬서의 ἀναπαύω 어휘는 7절과 20절을 의도적으로 호응시킨다(빌레몬이 성도들에게 한 일을 바울이 자신에게도 해 달라고 요청). 한국어 번역도 동일 동사로 옮겨야 이 수사적 호응이 보존된다.
  doctrine_reference: 'Translation philosophy: 어휘 일관성과 본문 내 호응'
