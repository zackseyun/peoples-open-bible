revisions:
- from: Y habitó en el desierto de Parán[a], y su madre le tomó una esposa[b] de la tierra de Egipto.
  to: Y habitó en el desierto de Parán[a], y su madre tomó para él una esposa[b] de la tierra de Egipto.
  rationale: Se mantiene «habitó» como opción válida y digna para וַיֵּשֶׁב. Se corrige «le tomó» a «tomó para él» para expresar con claridad y naturalidad la relación de beneficio marcada por לוֹ y evitar ambigüedad en español. También se pulen las notas para ajustarlas al estilo editorial y a la legibilidad.
