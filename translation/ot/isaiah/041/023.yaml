id: ISA.41.23
reference: Isaiah 41:23
source:
  edition: WLC
  text: הַגִּ֨ידוּ֙ הָ/אֹתִיּ֣וֹת לְ/אָח֔וֹר וְ/נֵ֣דְעָ֔ה כִּ֥י אֱלֹהִ֖ים אַתֶּ֑ם אַף תֵּיטִ֣יבוּ וְ/תָרֵ֔עוּ וְ/נִשְׁתָּ֖עָה ו/נרא יַחְדָּֽו־׃
translation:
  text: Declare to us the things to come afterward[a], that we may know that you are gods; indeed, do good or do harm[c][b], that we may be dismayed and see together.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the latter things.' The Hebrew expression refers to what comes later, here functioning as a challenge to foretell the future.
    reason: lexical_alternative
  - marker: b
    text: Or 'do good and do evil.' The sense is a challenge to show any real power, whether for benefit or for harm.
    reason: lexical_alternative
  - marker: c
    text: The verb rendered 'be dismayed' is rare and may also carry the sense 'look in awe' or 'gaze about in alarm.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּידוּ
  chosen: Declare
  alternatives:
  - Tell
  - Announce
  lexicon: HALOT
  rationale: Imperative plural of נגד, calling the idols to make something known publicly. 'Declare' preserves the formal challenge tone better than the more colloquial 'tell'.
- source_word: הָאֹתִיּוֹת לְאָחוֹר
  chosen: the things to come afterward
  alternatives:
  - the latter things
  - what will happen later
  lexicon: HALOT
  rationale: Literally 'the latter things/coming things afterward.' In context this is a challenge to predict the future. 'Things to come afterward' keeps the temporal sense while remaining natural English. 'Latter things' is possible but less transparent to modern readers.
- source_word: וְנֵדְעָה
  chosen: that we may know
  alternatives:
  - and we will know
  lexicon: HALOT
  rationale: 'Cohortative first person plural following the imperative expresses purpose/result: if they can declare the future, then ''we may know.'' English purpose syntax best captures the force here.'
- source_word: כִּי אֱלֹהִים אַתֶּם
  chosen: that you are gods
  alternatives:
  - that you are divine
  - that you are God
  lexicon: HALOT
  rationale: Addressed to idols in the plural, so 'gods' is the natural rendering. Singular 'God' would distort the polemical context.
- source_word: אַף
  chosen: indeed
  alternatives:
  - 'yes'
  - even
  lexicon: HALOT
  rationale: Adds emphatic force to the challenge. 'Indeed' fits the elevated prophetic style.
- source_word: תֵּיטִיבוּ וְתָרֵעוּ
  chosen: do good or do harm
  alternatives:
  - do good and do evil
  - act well or badly
  lexicon: HALOT
  rationale: The paired Hiphil verbs from יטב and רעע challenge the idols to show any effective power, whether beneficial or harmful. 'Do good or do harm' communicates the merism idiomatically in English without implying moral approval.
- source_word: וְנִשְׁתָּעָה
  chosen: that we may be dismayed
  alternatives:
  - that we may look in awe
  - that we may gaze about in alarm
  lexicon: HALOT
  rationale: From שעה in a rare form; in this context many understand a reaction of startled alarm or astonishment before a display of power. 'Be dismayed' fits the polemical challenge and pairs well with the following verb of seeing.
- source_word: וְנִרְאֶה
  chosen: and see it
  alternatives:
  - and behold
  - and see
  lexicon: HALOT
  rationale: 'Simple first person plural verb ''and see.'' Adding ''it'' makes the English object implicit in the Hebrew contextually explicit: the displayed act of power.'
- source_word: יַחְדָּו
  chosen: together
  alternatives:
  - all together
  - as one
  lexicon: HALOT
  rationale: Adverb indicating the collective response of the observers. 'Together' is the most direct rendering.
