  yaml_path: translation/ot/proverbs/014/003.yaml
  text: In the mouth of a fool is a rod of pride[b][a], but the lips of the wise will guard them.
  footnotes:
  - marker: a
    text: Or 'a shoot of pride.' The Hebrew word translated 'rod' can also mean 'shoot' or 'branch,' but in this context the image of a rod better fits the proverb's warning about proud speech.
    reason: lexical_alternative
  - marker: b
    text: The pronoun 'them' likely refers to the wise, that is, the lips of the wise protect their owners.
    reason: lexical_alternative
