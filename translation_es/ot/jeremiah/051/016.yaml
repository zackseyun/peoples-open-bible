translation:
  language: es
  text: Al sonido de su voz, hay un tumulto de aguas en los cielos; hace subir nubes[a] desde los confines de la tierra; hace relámpagos para la lluvia, y saca el viento de sus almacenes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vapores» para נְשִׂאִים.
    reason: lexical_alternative
  - marker: b
    text: O «tesoros» para מֵאֹצְרֹתָיו.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְקוֹל תִּתּוֹ
  english_pob_choice: At the sound of his voice
  chosen_spanish: Al sonido de su voz
  alternatives_spanish:
  - A la voz de él
  - Cuando se oye su voz
  lexicon: HALOT
  rationale: La construcción con לְקוֹל introduce la circunstancia o motivo, y תִּתּוֹ funciona idiomáticamente con קוֹל como la emisión de la voz. En español, «al sonido de su voz» conserva el valor idiomático y la relación causal/ocasional sin volverlo mecánico.
- source_word: הֲמוֹן מַיִם
  english_pob_choice: a tumult of waters
  chosen_spanish: un tumulto de aguas
  alternatives_spanish:
  - una multitud de aguas
  - un estruendo de aguas
  lexicon: HALOT
  rationale: הֲמוֹן puede expresar masa, abundancia o tumulto; en este contexto poético incluye también el matiz sonoro. «Tumulto de aguas» refleja mejor esa fuerza que una simple cantidad de agua.
- source_word: בַּשָּׁמַיִם
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: HALOT
  rationale: «Cielos» mantiene el registro bíblico elevado y es natural en español. En este contexto meteorológico no se necesita reducirlo a un solo cielo físico.
- source_word: נְשִׂאִים
  english_pob_choice: clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - vapores
  - nubarrones
  lexicon: HALOT
  rationale: El término puede abarcar nubes, vapores o masas de niebla. Dado el contexto de tormenta, «nubes» es la opción más clara y natural en español. La alternativa «vapores» queda como nota léxica posible.
- source_word: מִקְצֵה אָרֶץ
  english_pob_choice: from the ends of the earth
  chosen_spanish: desde los confines de la tierra
  alternatives_spanish:
  - desde los extremos de la tierra
  - desde el borde de la tierra
  lexicon: HALOT
  rationale: Es una expresión bíblica fija para las partes más remotas del mundo. «Confines de la tierra» conserva el giro idiomático con dignidad literaria.
- source_word: בְּרָקִים לַמָּטָר
  english_pob_choice: lightning for the rain
  chosen_spanish: relámpagos para la lluvia
  alternatives_spanish:
  - relámpagos con la lluvia
  - relámpagos para el aguacero
  lexicon: HALOT
  rationale: El hebreo enlaza el relámpago con la lluvia mediante ל. «Para la lluvia» reproduce esa relación sin forzar una equivalencia científica moderna; «relámpagos» es el término más natural en español para בְּרָקִים.
- source_word: עָשָׂה
  english_pob_choice: he makes
  chosen_spanish: hace
  alternatives_spanish:
  - hizo
  - produce
  lexicon: HALOT
  rationale: En la secuencia poética, el verbo tiene valor habitual o gnómico, no solo pasado narrativo. «Hace» conserva la acción continua y estilísticamente armoniza con el resto del versículo.
- source_word: וַיֹּצֵא רוּחַ
  english_pob_choice: brings out the wind
  chosen_spanish: saca el viento
  alternatives_spanish:
  - hace salir el viento
  - saca el espíritu
  lexicon: HALOT
  rationale: Aquí רוּחַ se entiende por el contexto meteorológico como «viento». «Saca» refleja bien la idea de hacerlo salir desde un lugar de reserva.
- source_word: מֵאֹצְרֹתָיו
  english_pob_choice: from his storehouses
  chosen_spanish: de sus depósitos
  alternatives_spanish:
  - de sus almacenes
  - de sus tesoros
  lexicon: HALOT
  rationale: La imagen es la de reservorios divinos de donde salen los fenómenos del clima. «Depósitos» preserva la metáfora concreta de almacenamiento sin introducir una noción económica ajena.
theological_decisions:
- issue: Imagen cósmica y meteorológica de la soberanía divina
  english_pob_reading: 'The verse is translated as a poetic description of God''s sovereign control over weather: waters in the heavens, clouds rising, lightning with rain, and wind from divine storehouses.'
  chosen_spanish_reading: 'El versículo se traduce como una descripción poética del dominio soberano de Dios sobre el clima: aguas en los cielos, nubes que suben, relámpagos con la lluvia y viento que sale de depósitos divinos.'
  alternative_spanish_readings:
  - Una paráfrasis que reduzca la imagen a una simple tormenta
  - Una versión demasiado literal que vuelva oscuro el poema
  rationale: La poesía hebrea presenta imágenes elevadas de control divino sobre la creación. La traducción conserva la imaginería y evita tanto la simplificación excesiva como una literalidad opaca.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail inglés, que prefirió «there is a tumult of waters» sobre una formulación más rígida; por eso se eligió «hay un tumulto de aguas» en vez de una estructura nominal más pesada. También se mantuvo la progresión poética de acciones divinas sin añadir elementos no atestiguados.
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto fuente lo exige explícitamente; en este versículo no aparece el Nombre, así que no se introduce.
  - Se usa «cielos» para mantener el registro bíblico y no rebajar el tono a un mero cielo atmosférico.
  - «Viento» se mantiene por el contexto meteorológico, evitando ambigüedad con «espíritu».
  - «Depósitos» preserva la metáfora de almacenamiento y evita una sustitución teológica por lenguaje abstracto.
