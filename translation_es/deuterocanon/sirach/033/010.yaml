review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego transmitido y la línea del English POB: mantiene los imperativos «apresúrate / recuerda», conserva «juramento», refleja el jussivo final y preserva la referencia en segunda persona a Dios. También retiene correctamente las dos notas del POB, incluida la incertidumbre textual y la alternativa para καιρόν.'
  spanish_quality_summary: La redacción es comprensible, pero «Apresúrate al tiempo» suena poco natural en español y parece un calco de la preposición inglesa inexistente en el griego; conviene «Apresura el tiempo» o una solución equivalente más idiomática. Además, «que ellos recuenten» es gramatical pero algo rígido; «que cuenten» o «que relaten» lee mejor. «Tus hechos poderosos» es entendible, pero «tus obras poderosas» o «tus grandes obras» suena más bíblico y natural para τὰ μεγαλεῖά σου.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. La decisión sobre ὁρκισμοῦ como «juramento» está bien alineada. La referencia a Dios por el pronombre se conserva sin añadir títulos.
  issues:
  - severity: high
    issue: «Apresúrate al tiempo» no refleja bien la sintaxis ni suena natural en español.
    rationale: 'σπεῦσον es transitivo aquí con καιρόν como objeto directo: «apresura el tiempo» / «haz venir pronto el tiempo», no reflexivo «apresúrate». La forma actual introduce una idea de dirigirse ‘al tiempo’ que el griego no expresa.'
  - severity: medium
    issue: «que ellos recuenten» es demasiado rígido en español.
    rationale: Aunque reproduce el jussivo, el sujeto explícito «ellos» no es necesario y «recuenten» suena menos natural que «cuenten» o «relaten» en este contexto de alabanza.
  - severity: medium
    issue: «tus hechos poderosos» es menos idiomático que alternativas más naturales.
    rationale: τὰ μεγαλεῖά σου apunta a grandes obras / actos poderosos. En español bíblico y eclesial, «tus obras poderosas» o «tus grandes obras» comunica mejor el sentido sin pérdida.
  revised_spanish_text: Apresura el tiempo[b] y recuerda el juramento[a], y que cuenten tus obras poderosas.
  revised_footnotes:
  - marker: a
    text: La validación de la fuente marca este versículo con incertidumbre textual ('major mismatch'). Esta traducción sigue el griego transmitido sin reconstrucción conjetural.
    reason: textual_variant
  - marker: b
    text: 'O: «el tiempo señalado» para «el tiempo» (griego καιρόν).'
    reason: lexical_alternative
  revision_rationale: Se corrige la construcción inicial para reflejar mejor el objeto directo griego καιρόν y evitar una frase poco natural en español. Se suaviza la cláusula final con una formulación más idiomática y se reemplaza «hechos» por «obras», que encaja mejor con τὰ μεγαλεῖά en registro bíblico. Se conservan íntegramente las notas del POB y la transparencia sobre la incertidumbre textual.
