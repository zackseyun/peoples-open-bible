translation:
  language: es
  text: 'Entonces les dirás: «Así dice Yahvé: “Miren, estoy por llenar de embriaguez[b] a todos los habitantes de esta tierra, a los reyes que se sientan sobre el trono de David[a], a los sacerdotes, a los profetas y a todos los habitantes de Jerusalén”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los reyes que se sientan para David sobre su trono». El hebreo expresa de forma más literal la sucesión dinástica a David.
    reason: lexical_alternative
  - marker: b
    text: «Embriaguez» puede funcionar de modo metafórico como desorientación impuesta por Dios, pero el texto mantiene deliberadamente la imagen concreta.
    reason: theological_note
lexical_decisions:
- source_word: וְאָמַרְתָּ אֲלֵיהֶם
  english_pob_choice: Then you shall say to them
  chosen_spanish: Entonces les dirás
  alternatives_spanish:
  - Y dirás a ellos
  - Les dirás
  lexicon: HALOT
  rationale: El hebreo avanza la instrucción profética con valor secuencial; «Entonces» conserva ese paso discursivo y «les dirás» es la forma natural en español para אַלֵיהֶם.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el Señor
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética directa y el nombre divino en la forma española establecida para YHWH en este proyecto.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am about to
  chosen_spanish: Miren, estoy por
  alternatives_spanish:
  - He aquí, estoy por
  - Miren, voy a
  lexicon: HALOT
  rationale: La partícula introduce una afirmación enfática e inminente. «Miren» conserva el tono exhortativo profético en español; «estoy por» expresa la cercanía de la acción sin añadir más de lo que el contexto exige.
- source_word: מְמַלֵּא
  english_pob_choice: fill
  chosen_spanish: llenar
  alternatives_spanish:
  - colmar
  - llenar de
  lexicon: HALOT
  rationale: «Llenar» es el equivalente directo y permite conservar la construcción objeto+complemento con naturalidad en español.
- source_word: כָּל יֹשְׁבֵי הָאָרֶץ הַזֹּאת
  english_pob_choice: all the inhabitants of this land
  chosen_spanish: a todos los habitantes de esta tierra
  alternatives_spanish:
  - a todos los moradores de esta tierra
  - a todos los habitantes de este país
  lexicon: HALOT
  rationale: «Habitantes» reproduce el sustantivo idiomático; «esta tierra» es preferible a «esta tierra/país» para el referente territorial concreto del oráculo.
- source_word: הַמְּלָכִים הַיֹּשְׁבִים לְדָוִד עַל כִּסְאוֹ
  english_pob_choice: the kings who sit on David’s throne
  chosen_spanish: a los reyes que se sientan sobre el trono de David
  alternatives_spanish:
  - a los reyes que se sientan en el trono de David
  - a los reyes que ocupan el trono de David
  lexicon: HALOT
  rationale: Se adopta la forma natural en español del giro dinástico. El hebreo subraya la sucesión davídica; «sobre el trono de David» comunica ese sentido sin forzar una literalidad poco idiomática.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  - los sacerdotes del templo
  lexicon: HALOT
  rationale: «Sacerdotes» es el equivalente regular del oficio cultual hebreo en este contexto.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los videntes
  - los profetas del pueblo
  lexicon: HALOT
  rationale: Se conserva el término directo del texto. En Jeremías puede incluir el conjunto profético, sin precisar aquí una subclasificación no dada por el hebreo.
- source_word: כָּל יֹשְׁבֵי יְרוּשָׁלִָם
  english_pob_choice: all the inhabitants of Jerusalem
  chosen_spanish: a todos los habitantes de Jerusalén
  alternatives_spanish:
  - a todos los moradores de Jerusalén
  - a toda la gente que vive en Jerusalén
  lexicon: HALOT
  rationale: Se mantiene la misma equivalencia que para יֹשְׁבֵי en el resto del versículo, con un español claro y consistente.
- source_word: שִׁכָּרוֹן
  english_pob_choice: drunkenness
  chosen_spanish: embriaguez
  alternatives_spanish:
  - borrachera
  - ebriedad
  - atonimiento
  lexicon: HALOT
  rationale: «Embriaguez» conserva la imagen concreta y su posible valor metafórico de desorientación/jucio divino, con un registro más digno que «borrachera» y más natural en español bíblico que una glosa abstracta.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la decisión editorial del proyecto de transliterar el nombre del pacto en vez de ocultarlo bajo un título. «Yahvé» es la forma española establecida en este marco.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahweh/Yahvé'
- issue: La metáfora de la embriaguez como juicio
  english_pob_reading: Retain 'drunkenness' as the main image
  chosen_spanish_reading: Conservar «embriaguez» como imagen principal
  alternative_spanish_readings:
  - confusión
  - aturdimiento
  - estupor
  rationale: El hebreo usa un sustantivo concreto de embriaguez; mantenerlo preserva la fuerza profética y la tensión de la imagen, en lugar de resolverla prematuramente en una explicación abstracta.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: El borrador toma en cuenta la revisión del audit trail inglés que prefirió «the kings who sit on David’s throne» frente a la literalidad más rígida «for David on his throne». En español se siguió la forma idiomática equivalente («sobre el trono de David»), manteniendo el sentido dinástico sin cargar la frase con una literalidad poco natural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, en coherencia con el estándar del proyecto.
  - Se tradujo יֹשְׁבֵי de manera uniforme como «habitantes».
  - Se conservó el paralelismo de la lista final con «a los…» para reflejar la acumulación hebrea.
  - Se evitó «Señor» para no enmascarar el nombre divino ni alterar la decisión terminológica del proyecto.
