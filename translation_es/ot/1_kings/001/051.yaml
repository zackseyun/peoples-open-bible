base_translation:
  language: en
  yaml_path: translation/ot/1_kings/001/051.yaml
  text: And it was reported to Solomon[a], saying, “Behold, Adonijah fears King Solomon, and behold, he has taken hold of the horns of the altar, saying[b], ‘Let King Solomon swear to me today that he will not put his servant to death with the sword.’”
  footnotes:
  - marker: a
    text: Or, more literally, “if he puts his servant to death with the sword,” an oath formula expressing the request that Solomon swear not to execute him.
    reason: lexical_alternative
  - marker: b
    text: Taking hold of the horns of the altar was an appeal for sanctuary or mercy at the altar.
    reason: cultural_note
