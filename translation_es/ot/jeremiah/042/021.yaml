translation:
  language: es
  text: Hoy[a] les he hecho saber esto, pero ustedes no han obedecido la voz de Yahvé su Dios ni todo aquello para lo cual él me envió a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Les hice saber esto hoy, pero ustedes no escucharon la voz de Yahvé su Dios ni todo aquello con lo que él me envió a ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאַגִּד
  english_pob_choice: I have told
  chosen_spanish: yo os lo he dicho
  alternatives_spanish:
  - yo os lo dije
  - yo os lo declaro
  lexicon: HALOT נגד (Hiphil)
  rationale: El hebreo expresa una acción de comunicar o declarar algo ya realizado. En español, el perfecto compuesto "he dicho" conserva el valor de acción cumplida con vigencia inmediata en el discurso profético, sin perder naturalidad.
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - este día
  lexicon: HALOT יום
  rationale: '"Hoy" es la equivalencia más natural y directa para el énfasis temporal del hebreo, y mantiene el contraste retórico de la advertencia profética.'
- source_word: שְׁמַעְתֶּם בְּקוֹל
  english_pob_choice: you have not obeyed the voice of
  chosen_spanish: no habéis obedecido la voz de
  alternatives_spanish:
  - no habéis escuchado la voz de
  - no habéis oído la voz de
  lexicon: HALOT שמע + בקול
  rationale: La construcción hebrea con שמע + בְּקוֹל suele implicar escuchar con obediencia, no mera percepción auditiva. "Obedecido" conserva ese valor covenantal, y "voz de" mantiene la expresión idiomática del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: contested terms; Tetragrammaton'
  rationale: La norma del proyecto en español pide "Yahvé" para el Tetragrama. Se preserva el nombre divino propio, no una sustitución titular como "el SEÑOR".
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: vuestro Dios
  alternatives_spanish:
  - su Dios
  lexicon: HALOT אלהים + sufijo 2mp
  rationale: El sufijo plural de segunda persona requiere posesivo plural; "vuestro" es la correspondencia más directa y clara en español bíblico neutral.
- source_word: וּלְכֹל אֲשֶׁר שְׁלָחַנִי אֲלֵיכֶם
  english_pob_choice: or anything for which he sent me to you
  chosen_spanish: ni nada de lo que él me envió a vosotros
  alternatives_spanish:
  - ni todo lo que él me envió a vosotros
  - ni cualquier cosa para la cual él me envió a vosotros
  lexicon: HALOT שלח + אֶל/אֲלֵיכֶם
  rationale: El hebreo amplía la desobediencia a todo el contenido de la misión de Jeremías. "Ni nada de lo que él me envió a vosotros" reproduce la totalidad del alcance sin forzar una paráfrasis excesiva; además, evita una construcción demasiado abstracta en español.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene el nombre propio del pacto, de acuerdo con la política terminológica del proyecto y con la audibilidad del texto hebreo. Esto preserva la identificación personal del hablante divino en la reprensión profética.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH'
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para reforzar el alcance total del mandato en la cláusula final. La versión española sigue esa revisión al usar una negación total («ni nada de lo que él me envió a vosotros»), manteniendo la doble idea hebrea de no obedecer la voz de Yahvé y de no atender todo lo enviado por medio de Jeremías.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene «obedecido la voz de» para conservar el hebraísmo semántico de שמע בְּקוֹל.
  - Se emplea «vuestro» para reflejar la segunda persona plural del hebreo.
  - La cláusula final conserva la totalidad del alcance semántico del hebreo, sin reducirla a una simple referencia general.
