revisions:
- from: Como en holocaustos de carneros y toros[a], y como en miríadas de corderos cebados, así sea nuestro sacrificio delante de ti hoy y haga expiación delante de ti, porque no hay vergüenza para los que han confiado en ti[b], y sea llevado a cumplimiento delante de ti.
  to: Como en sacrificios completamente quemados de carneros y toros[a], y como en miríadas de corderos cebados, así sea nuestro sacrificio delante de ti hoy y haga expiación delante de ti[b], porque no hay vergüenza para los que han confiado en ti, y sea llevado a su cumplimiento delante de ti.
  rationale: 'Se reemplaza «holocaustos» por «sacrificios completamente quemados» para ajustarse mejor a la decisión léxica auditada y evitar connotaciones modernas engañosas en español. Se corrige la nota alternativa para que quede anclada al verbo de expiación/aceptación, no a la frase sobre confiar en Dios. También se suaviza ligeramente la cláusula final para un español más natural: «sea llevado a su cumplimiento».'
