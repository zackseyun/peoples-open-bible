translation:
  language: es
  text: pero del árbol del conocimiento del bien y del mal no comerás[b], porque el día que comas de él[a], ciertamente morirás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el día que comas de él». Este giro también puede significar «cuando comas de él».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «del árbol del conocimiento del bien y del mal no comerás de él».'
    reason: previous_rendering
lexical_decisions:
- source_word: וּ/מֵ/עֵץ
  english_pob_choice: but from the tree
  chosen_spanish: pero del árbol
  alternatives_spanish:
  - y del árbol
  - excepto del árbol
  lexicon: HALOT
  rationale: El hebreo combina una conjunción y una preposición, pero aquí cumple función contrastiva respecto del permiso anterior. «Pero del árbol» conserva esa oposición natural en español sin perder la referencia explícita al árbol.
- source_word: הַדַּעַת
  english_pob_choice: the knowledge
  chosen_spanish: el conocimiento
  alternatives_spanish:
  - el saber
  - el conocer
  lexicon: HALOT
  rationale: דעת nombra conocimiento/entendimiento; en español «conocimiento» es la opción más clara y formal para un sintagma nominal en construcción con «del bien y del mal».
- source_word: טוֹב וָרָע
  english_pob_choice: good and evil
  chosen_spanish: del bien y del mal
  alternatives_spanish:
  - de lo bueno y lo malo
  - del bien y del mal moral
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «good and evil» para preservar el peso moral, en español «bien y mal» es la merisma estable y natural. Mantiene el contraste ético sin sonar forzado.
- source_word: לֹא תֹאכַל
  english_pob_choice: you shall not eat
  chosen_spanish: no comerás
  alternatives_spanish:
  - no deberás comer
  - no comerás de
  lexicon: HALOT
  rationale: El imperfecto prohibitivo puede verterse en español con futuro de mandato. «No comerás» preserva la solemnidad normativa y es idiomático.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de eso
  - del mismo
  lexicon: HALOT
  rationale: La preposición מן exige una relación de procedencia/partitivo. En español, «de él» refleja con naturalidad el referente del árbol y mantiene la repetición pronominal del hebreo.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la base causal de la prohibición. «Porque» expresa con claridad esa causalidad en español.
- source_word: בְּיוֹם
  english_pob_choice: in the day
  chosen_spanish: el día que
  alternatives_spanish:
  - cuando
  - en el día que
  lexicon: HALOT
  rationale: El hebreo idiomático puede significar «cuando». En español, «el día que» conserva la forma temporal sin sonar artificial, y deja abierta la cuestión interpretativa que el texto hebreo no resuelve.
- source_word: אֲכָלְךָ
  english_pob_choice: you eat
  chosen_spanish: comas
  alternatives_spanish:
  - comes
  - comieres
  lexicon: HALOT
  rationale: Dentro de la cláusula temporal, el subjuntivo en español reproduce mejor la subordinación temporal-condicional de la expresión hebrea que un indicativo plano.
- source_word: מ֥וֹת תָּמֽוּת
  english_pob_choice: you shall surely die
  chosen_spanish: ciertamente morirás
  alternatives_spanish:
  - morirás sin falta
  - morirás de cierto
  lexicon: HALOT
  rationale: El infinitivo absoluto intensifica la certeza de la muerte. «Ciertamente morirás» preserva la fuerza enfática sin recurrir a una construcción demasiado arcaica.
theological_decisions:
- issue: Tensión temporal de «el día que comas de él»
  english_pob_reading: Retain the Hebrew idiom as 'in the day' without resolving whether it means immediate physical death, onset of mortality, or certain sentence of death.
  chosen_spanish_reading: Mantener la expresión temporal sin resolver en el texto principal si la muerte es inmediata, si inicia la mortalidad o si se trata de una sentencia segura.
  alternative_spanish_readings:
  - «cuando comas de él»
  - «en el día que comas de él» interpretado como muerte física inmediata
  rationale: El texto bíblico y su recepción generan una tensión interpretativa real. La traducción española conserva la ambigüedad funcional del hebreo y no la resuelve de manera doctrinal en la línea principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión que eliminó la repetición final awkward en inglés ('from it') por razones estilísticas; en español se conservó la repetición pronominal sólo donde la sintaxis natural lo permite, sin calcarla mecánicamente. No se introdujeron cambios doctrinales respecto del cierre enfático de la muerte.
  spanish_consistency_notes:
  - Se usó «árbol»/«conocimiento»/«bien y mal» de forma coherente con el sentido hebreo y la terminología poética/merística habitual en español bíblico.
  - Se evitó «Señor» u otras máscaras porque el pasaje no contiene el Tetragrámaton ni el nombre divino.
  - Se preservó la fuerza legal del mandato con futuro de prohibición («no comerás») y el énfasis intensivo final con «ciertamente morirás».
