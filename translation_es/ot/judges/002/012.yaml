review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo en la secuencia principal: «abandonaron a Yahvé», «el Dios de sus padres», el acto del éxodo, «fueron tras otros dioses», la referencia a los pueblos circundantes, y la postración idolátrica. También conserva correctamente «Yahvé» para יְהוָה y mantiene la nota alternativa sobre מִן. El punto principal a corregir es la última cláusula: «provocaron a Yahvé a ira» refleja la causalidad, pero suena poco idiomático en español y no es la mejor manera de preservar el sentido de וַיַּכְעִסוּ אֶת יְהוָה.'
  spanish_quality_summary: El español es generalmente claro y digno, pero hay dos ajustes de estilo/idioma. Primero, el punto y coma después de «Egipto» rompe innecesariamente la cadena narrativa hebrea; una coma fluye mejor. Segundo, «provocaron a Yahvé a ira» es comprensible pero demasiado calcado; «provocaron a ira a Yahvé» conserva la fuerza causativa y suena más natural en español bíblico actual. El resto del verso es legible y fiel.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה → «Yahvé»; אֱלֹהֵי אֲבוֹתָם → «el Dios de sus padres»; אֱלֹהִים אֲחֵרִים → «otros dioses»; וַיִּשְׁתַּחֲווּ לָהֶם → «se postraron ante ellos». La nota [a] preserva adecuadamente la alternativa lexical para la frase con מִן. La única decisión a refinar es כעס en hifil: conviene mantener la causatividad con una formulación española más natural.'
  issues:
  - severity: medium
    issue: «provocaron a Yahvé a ira» suena calcado y poco idiomático
    rationale: Aunque intenta reflejar la causatividad de וַיַּכְעִסוּ, en español la colocación «a ira» después del objeto personal resulta torpe. «Provocaron a ira a Yahvé» o «provocaron la ira de Yahvé» son mejores opciones; la primera conserva más de cerca el matiz causativo explicitado por la auditoría inglesa.
  - severity: low
    issue: Puntuación con punto y coma tras «Egipto»
    rationale: El hebreo encadena acciones con waw consecutivo; en español, una coma mantiene mejor la continuidad narrativa que un punto y coma en este contexto.
  revised_spanish_text: Y abandonaron a Yahvé[a], el Dios de sus padres, que los había sacado de la tierra de Egipto, y fueron tras otros dioses, de entre los dioses de los pueblos que estaban alrededor de ellos, y se postraron ante ellos, y provocaron a ira a Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «de los dioses de los pueblos circundantes». La frase hebrea también puede entenderse de manera más general como los dioses adorados por los pueblos que rodeaban a Israel.'
    reason: lexical_alternative
  revision_rationale: Se ajustó la puntuación para reflejar mejor la secuencia narrativa del hebreo y se reemplazó «provocaron a Yahvé a ira» por «provocaron a ira a Yahvé», que conserva mejor la fuerza causativa de כעס en español natural. Se mantuvo la nota lexical sobre la frase con מִן porque refleja una alternativa real documentada en la auditoría inglesa.
