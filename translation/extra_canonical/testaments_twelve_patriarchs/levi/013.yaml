theological_decisions:
- issue: Moral recompense in 'do righteousness ... so that you may find it in the heavens'
  chosen_reading: The line is rendered as an exhortation to earthly righteousness with heavenly recompense or recognition.
  alternative_readings:
  - so that you may find treasure in heaven
  - so that you may be found in the heavens
  rationale: The Greek object is implicit after εὕρητε; the most natural reading is that what is done on earth is found again in heaven. The translation preserves the reciprocity without specifying more than the Greek warrants.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Scope of the exception in v.7 ('except the blindness of ungodliness and the hardening of sin')
  chosen_reading: Wisdom cannot be taken away externally; only moral-spiritual corruption can rob a person of it.
  alternative_readings:
  - These vices are personified external forces
  - The clause is a later explanatory gloss
  rationale: The syntax most naturally presents blindness and hardening as the sole effective exception to wisdom's security. The translation keeps the warning ethical rather than speculative.
