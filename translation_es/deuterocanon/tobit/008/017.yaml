translation:
  language: es
  text: Bendito eres tú, porque me has llenado de gozo, y no me sucedió como lo esperaba[a]; antes bien, conforme a tu abundante misericordia, has obrado con nosotros. Bendito eres tú, porque has tenido misericordia de dos hijos únicos[b]. Ten misericordia de ellos, Soberano; lleva su vida a su término[c] en salud, con alegría y misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "como lo suponía". El verbo griego puede expresar sospecha o suposición; aquí el contexto sugiere una expectativa ansiosa.'
    reason: lexical_alternative
  - marker: b
    text: Esto quiere decir que cada uno de la pareja era hijo único en su familia.
    reason: cultural_note
  - marker: c
    text: 'O: "lleva sus vidas a su término" o "concede que completen su vida". El griego usa un singular colectivo, "vida".'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογητὸς
  english_pob_choice: Blessed
  chosen_spanish: Bendito eres tú
  alternatives_spanish:
  - Alabado eres tú
  - Bendito seas tú
  lexicon: BDAG
  rationale: La fórmula doxológica dirigida a Dios se conserva con una construcción natural en español. 'Bendito eres tú' mantiene el tono litúrgico sin reemplazar el valor del participio por una paráfrasis.
- source_word: ηὔφρανάς
  english_pob_choice: you have made me rejoice
  chosen_spanish: me has llenado de gozo
  alternatives_spanish:
  - me has hecho regocijar
  - me has alegrado
  lexicon: BDAG
  rationale: El griego expresa un causativo de alegrar/regocijar. 'Me has llenado de gozo' transmite el efecto intenso con español fluido, sin perder la acción causativa.
- source_word: ὑπενόουν
  english_pob_choice: I expected
  chosen_spanish: lo esperaba
  alternatives_spanish:
  - lo suponía
  - lo sospechaba
  - lo imaginaba
  lexicon: BDAG
  rationale: Según la revisión del POB, aquí el matiz más natural es expectativa ansiosa más que sospecha estricta. 'Lo esperaba' conserva esa anticipación sin cargar el verbo con una inferencia excesiva.
- source_word: κατὰ τὸ πολὺ ἔλεός σου
  english_pob_choice: according to your abundant mercy
  chosen_spanish: conforme a tu abundante misericordia
  alternatives_spanish:
  - según tu grande misericordia
  - de acuerdo con tu gran misericordia
  lexicon: BDAG
  rationale: '''Conforme a'' reproduce bien el valor de medida/estándar de κατά; ''abundante misericordia'' conserva el énfasis cuantitativo de πολὺ y evita suavizar el sustantivo repetido ἔλεος.'
- source_word: ἐποίησας μεθʼ ἡμῶν
  english_pob_choice: you have dealt with us
  chosen_spanish: has obrado con nosotros
  alternatives_spanish:
  - has hecho con nosotros
  - has tratado con nosotros
  lexicon: BDAG
  rationale: El idiomatismo griego es amplio. 'Has obrado con nosotros' es natural en español y mantiene la idea de una acción divina favorable sin concretarla más de lo que el texto dice.
- source_word: ἠλέησας
  english_pob_choice: you have had mercy on
  chosen_spanish: has tenido misericordia de
  alternatives_spanish:
  - has mostrado misericordia a
  - te has compadecido de
  lexicon: BDAG
  rationale: '''Tener misericordia de'' es un equivalente directo y claro del verbo ἐλεέω. Conserva el tema central de compasión divina repetido en el versículo.'
- source_word: δύο μονογενεῖς
  english_pob_choice: two only children
  chosen_spanish: dos hijos únicos[a]
  alternatives_spanish:
  - dos únicos hijos
  - dos hijos únicos de cada familia
  lexicon: BDAG
  rationale: En este contexto narrativo, μονογενής se refiere a la condición familiar de cada uno como hijo único. 'Hijos únicos' comunica el sentido sin importar el uso cristológico posterior.
- source_word: δέσποτα
  english_pob_choice: Master
  chosen_spanish: Maestro
  alternatives_spanish:
  - Señor
  - Soberano
  lexicon: BDAG
  rationale: Para conservar la distinción léxica frente a κύριος, se evita 'Señor'. 'Maestro' puede sonar algo más relacional en español, pero aquí funciona como vocativo de autoridad y mantiene la transparencia del término griego.
- source_word: συντέλεσον τὴν ζωὴν αὐτῶν
  english_pob_choice: bring their life to completion
  chosen_spanish: lleva su vida a su término[c]
  alternatives_spanish:
  - completa su vida
  - lleva sus vidas a su plenitud
  - haz que terminen su vida
  lexicon: BDAG
  rationale: El griego usa un singular colectivo, por eso 'su vida'. 'Llevar a su término' reproduce la idea de culminación o cierre del curso de vida sin sonar mecánico en español.
- source_word: ἐν ὑγείᾳ
  english_pob_choice: in health
  chosen_spanish: en salud
  alternatives_spanish:
  - con salud
  - en buena salud
  lexicon: BDAG
  rationale: La preposición con sustantivo simple preserva la brevedad del griego. 'En salud' es comprensible en español bíblico contemporáneo, aunque 'con salud' sería también posible.
- source_word: μετὰ εὐφροσύνης καὶ ἐλέους
  english_pob_choice: with gladness and mercy
  chosen_spanish: con alegría y misericordia
  alternatives_spanish:
  - con gozo y misericordia
  - con alegría y compasión
  lexicon: BDAG
  rationale: '''Alegría'' transmite εὐφροσύνη con naturalidad; ''misericordia'' mantiene el eco temático de ἔλεος, que aparece dos veces en el verso y conviene conservar en español.'
theological_decisions:
- issue: Título de dirección a Dios en δέσποτα
  english_pob_reading: Master
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Señor
  - Soberano
  rationale: El POB distingue δέσποτα de κύριος para no borrar una diferencia léxica relevante. 'Maestro' evita colapsarlo con el uso habitual de 'Señor' para el nombre divino o para κύριος, aunque la palabra no es la opción más litúrgica en español.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve lexical distinctions where context allows.'
- issue: Sentido de μονογενεῖς en contexto familiar
  english_pob_reading: two only children
  chosen_spanish_reading: dos hijos únicos
  alternative_spanish_readings:
  - dos únicos hijos
  - dos hijos únicos de cada familia
  rationale: Aquí no se trata del uso cristológico posterior de μονογενής. La lectura familiar se impone por el contexto narrativo, y la traducción española debe reflejar esa realidad sin cargar el término con asociaciones ajenas.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'Se siguió la última revisión del POB en inglés: ὑπενόουν se entendió en sentido de expectativa más natural que ''sospecha''; ἐποίησας μεθʼ ἡμῶν se volvió a un giro idiomático amplio; y ἠλέησας se mantuvo con un equivalente directo de misericordia. El español procura reflejar esas decisiones sin volver a una lectura más interpretativa de la necesaria.'
  spanish_consistency_notes:
  - Se conservó 'misericordia' dos veces para respetar el eco léxico de ἔλεος.
  - Se evitó 'SEÑOR' para δέσποτα a fin de no confundirlo con el tratamiento habitual de κύριος.
  - La frase 'su vida' mantiene el singular colectivo del griego, aunque en español puede sonar singular por estilo; la nota aclara la referencia a ambos.
  - El tono general es bíblico y digno, pero con sintaxis moderna para lectura pública.
