  - marker: b
    text: Or 'across the Jordan.' The Hebrew expression can be rendered either way depending on geographic perspective.
    reason: lexical_alternative
  - marker: c
    text: Or 'in the Shephelah,' the western foothill region.
    reason: cultural_note
