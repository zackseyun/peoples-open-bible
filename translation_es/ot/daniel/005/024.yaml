translation:
  language: es
  text: Entonces, de delante de él[a] fue enviada la palma de una mano, y esta escritura fue inscrita[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de su presencia». El arameo dice literalmente «de delante de él», indicando origen desde la presencia de aquel que acaba de ser mencionado.
    reason: lexical_alternative
  - marker: b
    text: O «y esta inscripción fue escrita».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּאדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En seguida
  lexicon: HALOT
  rationale: Marca discursiva aramea de secuencia narrativa; «Entonces» conserva la progresión temporal natural en español y la sobriedad del original.
- source_word: מִן קֳדָמוֹהִי
  english_pob_choice: from before him
  chosen_spanish: de delante de él
  alternatives_spanish:
  - de su presencia
  - desde su presencia
  lexicon: HALOT
  rationale: La expresión conserva la imagen espacial de procedencia «de delante de él» sin reducirla a un simple «de él»; en el contexto, el referente es Dios, pero el español mantiene la reserva del arameo.
- source_word: שְׁלִיחַ
  english_pob_choice: was sent
  chosen_spanish: fue enviado
  alternatives_spanish:
  - fue despachado
  lexicon: HALOT
  rationale: Verbo pasivo directo del radical de «enviar»; «fue enviado» reproduce con claridad la pasiva narrativa.
- source_word: פַּסָּא
  english_pob_choice: the palm
  chosen_spanish: la palma
  alternatives_spanish:
  - la extremidad
  - la palma de la mano
  lexicon: HALOT
  rationale: En este contexto designa la palma o zona extrema de la mano; «la palma» es natural y fiel, especialmente en la construcción con «de una mano».
- source_word: יְדָא
  english_pob_choice: of a hand
  chosen_spanish: de una mano
  alternatives_spanish:
  - de la mano
  lexicon: HALOT
  rationale: 'El español idiomático aquí es indefinido: la aparición es abrupta y el arameo no exige especificidad previa. «Mano» evita una rigidez innecesaria.'
- source_word: וּכְתָבָא
  english_pob_choice: and this writing
  chosen_spanish: y esta escritura
  alternatives_spanish:
  - y esta inscripción
  - y el escrito
  lexicon: HALOT
  rationale: «Escritura» puede abarcar tanto el contenido escrito como el acto/resultado, y permite luego conservar el tono solemne de la escena.
- source_word: דְנָה
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - esta misma
  lexicon: HALOT
  rationale: Demostrativo simple que apunta al texto que se va a citar; en español concuerda naturalmente con «escritura».
- source_word: רְשִׁים
  english_pob_choice: was inscribed
  chosen_spanish: fue inscrita
  alternatives_spanish:
  - fue escrita
  - fue registrada
  lexicon: HALOT
  rationale: «Inscribir» preserva mejor la escena de una escritura apareciendo sobre una superficie visible y distingue el matiz de un escribir ordinario.
theological_decisions:
- issue: 'Origen de la mano y la escritura: «de delante de él»'
  english_pob_reading: The phrase refers to the Most High God whose presence is the source of the hand.
  chosen_spanish_reading: La formulación mantiene la imagen de procedencia desde la presencia divina sin explicitar más de lo que dice el arameo.
  alternative_spanish_readings:
  - de su presencia
  - de él
  rationale: 'El contexto identifica al referente, pero la traducción conserva la cautela del texto: no fuerza una explicitación mayor, aunque sí deja clara la procedencia personal y reverente.'
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior asegurando que cada nota de pie tenga su marcador exacto en el texto principal: [a] en «de delante de él» y [b] en «inscrita».'
  spanish_consistency_notes:
  - Se mantuvo un español sobrio y publicable, con sintaxis natural y sin paraphrasear el evento.
  - «Yahvé» no aparece aquí porque el versículo, aunque alude a la presencia divina, usa un referente pronominal en el arameo; la decisión teológica lo explica sin añadir el nombre al texto.
  - Se prefirió «escritura»/«inscrita» para conservar el carácter solemne de la señal escrita.
  - La puntuación respeta el flujo narrativo español y conserva la pausa entre la llegada de la mano y la aparición del escrito.
