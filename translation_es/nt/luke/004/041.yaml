translation:
  language: es
  text: 'Los demonios también salían de muchos, gritando y diciendo: “¡Tú eres el Hijo de Dios!”. Pero él, reprendiéndolos, no les permitía hablar, porque sabían que él era el Mesías[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Cristo». Griego: «el Mesías/Ungido» (Χριστός).'
    reason: alternative_reading
lexical_decisions:
- source_word: δαιμόνια
  english_pob_choice: Demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus inmundos
  lexicon: BDAG
  rationale: δαιμόνια nombra directamente a seres demoníacos. En español, 'demonios' conserva ese valor de manera natural; 'espíritus inmundos' sería una especificación contextual que el griego aquí no usa.
- source_word: ἐξήρχετο
  english_pob_choice: were coming out
  chosen_spanish: salían
  alternatives_spanish:
  - estaban saliendo
  - iban saliendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida. 'Salían' comunica bien esa iteración en español sin sobrecargar la frase.
- source_word: ἀπὸ πολλῶν
  english_pob_choice: of many
  chosen_spanish: de muchos
  alternatives_spanish:
  - de muchas personas
  - de muchas
  lexicon: BDAG
  rationale: El griego omite el objeto explícito; en español, 'de muchos' mantiene esa misma apertura y deja el referente humano entendido por el contexto.
- source_word: κραυγάζοντα
  english_pob_choice: crying out
  chosen_spanish: gritando
  alternatives_spanish:
  - clamando
  - vociferando
  lexicon: BDAG
  rationale: El participio indica un clamor fuerte. 'Gritando' transmite la intensidad de forma natural en español, sin perder el sentido narrativo.
- source_word: λέγοντα
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - afirmando
  lexicon: BDAG
  rationale: Es el participio normal de habla; 'diciendo' coordina bien con 'gritando' y mantiene la sencillez del texto.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - el Hijo de Dios
  lexicon: BDAG
  rationale: Es un título cristológico formal. 'El Hijo de Dios' preserva su fuerza titular y su reconocimiento eclesial en español.
- source_word: ἐπιτιμῶν
  english_pob_choice: rebuking
  chosen_spanish: reprendiéndolos
  alternatives_spanish:
  - reprendiendo
  - amonestándolos severamente
  lexicon: BDAG
  rationale: El participio describe una reprensión autoritativa. 'Reprendiéndolos' reproduce bien esa fuerza verbal en español bíblico contemporáneo.
- source_word: οὐκ εἴα
  english_pob_choice: he would not allow
  chosen_spanish: no les permitía
  alternatives_spanish:
  - no los dejaba
  - no los autorizaba
  lexicon: BDAG
  rationale: El imperfecto de ἐάω sugiere una negativa sostenida. 'No les permitía' capta de manera natural esa acción continuada en español.
- source_word: λαλεῖν
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - hablar públicamente
  - decir
  lexicon: BDAG
  rationale: '''Hablar'' es el equivalente más natural y sobrio para λαλεῖν aquí, sin añadir matices no presentes en el griego.'
- source_word: ᾔδεισαν
  english_pob_choice: they knew
  chosen_spanish: sabían
  alternatives_spanish:
  - habían sabido
  lexicon: BDAG
  rationale: El verbo de conocimiento funciona como estado resultativo. 'Sabían' es idiomático y conserva ese valor sin forzar una pluperfectización en español.
- source_word: τὸν χριστὸν
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Χριστός aquí es claramente un título, no un nombre propio. En español, 'Mesías' expresa el sentido del título mejor que 'Cristo' en este contexto narrativo.
- source_word: αὐτὸν εἶναι
  english_pob_choice: that he was
  chosen_spanish: que él era
  alternatives_spanish:
  - que era él
  lexicon: BDAG
  rationale: La construcción de acusativo e infinitivo se vierte de modo natural como subordinada completiva. 'Que él era' mantiene la referencia explícita al sujeto.
theological_decisions:
- issue: Distinción entre 'Hijo de Dios' y 'Mesías'
  english_pob_reading: 'Retain both titles distinctly: the demons say ''You are the Son of God,'' and the narrator explains that they knew he was the Messiah'
  chosen_spanish_reading: 'Conservar ambos títulos de manera distinta: los demonios dicen ''Tú eres el Hijo de Dios'', y el narrador explica que sabían que él era el Mesías'
  alternative_spanish_readings:
  - Confluir ambos títulos en una sola formulación explicativa
  rationale: El griego presenta dos designaciones cristológicas relacionadas pero no idénticas. La traducción mantiene la distinción narrativa y teológica sin armonizarlas artificialmente.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción
- issue: Traducción de Χριστός como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La forma título de Χριστός se expresa mejor en español como 'Mesías'. 'Cristo' puede sonar más nombre propio y ocultar el valor semántico del término en este versículo.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Razón de la mención demoníaca
  english_pob_reading: because they knew that he was the Messiah
  chosen_spanish_reading: porque sabían que él era el Mesías
  alternative_spanish_readings:
  - porque sabían que él era el Cristo
  rationale: La cláusula causal explica por qué Jesús no les permitía hablar. Mantener 'Mesías' conserva la referencia titural y evita diluir el argumento narrativo.
  doctrine_reference: Preservar la relación causal del texto sin añadir explicación doctrinal externa
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del POB inglés: no se registraron cambios aplicados y la valoración de concordancia fue alta; por eso la redacción española sigue de cerca las decisiones auditadas sin introducir novedades innecesarias.'
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός, conforme al criterio terminológico del proyecto.
  - '''Demonios'' se usa de forma directa para δαιμόνια, en continuidad con la distinción frente a ''espíritus inmundos''.'
  - La negativa imperfectiva 'no les permitía' conserva la fuerza aspectual de οὐκ εἴα.
  - Se preserva la separación entre 'Hijo de Dios' y 'Mesías' en dos cláusulas distintas.
  - El estilo español evita calcos innecesarios como 'salían fuera' o 'decían que tú eres'.
