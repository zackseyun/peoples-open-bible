translation:
  language: es
  text: Entonces Yahvé dijo a Moisés y a Aarón, diciendo:[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yahvé dijo a Moisés y a Aarón». El hebreo también incluye la fórmula introductoria de habla «diciendo», que a menudo se omite en español por estilo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; en español, 'Entonces' transmite mejor esa secuencia. 'Habló' conserva el sentido de un acto de comunicación solemne y encaja bien con la fórmula introductoria del discurso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton. La norma del proyecto es rendirlo como 'Yahvé', preservando el nombre propio del pacto sin sustituirlo por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el complemento indirecto del acto de hablar. En español, 'a' es la equivalencia natural con los nombres propios de destinatario.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moyses
  lexicon: standard proper noun
  rationale: Nombre propio bíblico en su forma española establecida y comprensible.
- source_word: וְאֶל
  english_pob_choice: and to
  chosen_spanish: y a
  alternatives_spanish:
  - y para
  - y hacia
  lexicon: HALOT
  rationale: Se conserva la repetición explícita de la preposición hebrea antes de Aarón, manteniendo visible la estructura del original.
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aarón
  lexicon: standard proper noun
  rationale: Nombre propio bíblico en su forma española establecida y comprensible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso directo siguiente. En español, 'diciendo' conserva esa función de fórmula introductoria, aunque es posible omitirla por estilo; aquí se mantiene por fidelidad estructural.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre personal de Dios en lugar de reemplazarlo por un título. 'Yahvé' sigue la decisión doctrinal del proyecto y es una forma reconocible en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó 'saying' como redundante al final de la oración; en español se mantiene 'diciendo' porque aquí funciona naturalmente como fórmula introductoria del discurso y el texto de destino puede conservar esa señal de manera idiomática sin añadir contenido ajeno.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme a la terminología del proyecto.
  - Se conservan los nombres propios 'Moisés' y 'Aarón' en su forma española estándar.
  - La repetición de la preposición hebrea antes de Aarón se refleja con 'y a', para no fusionar indebidamente los destinatarios.
  - El participio/fórmula לֵאמֹר se vierte como 'diciendo' y se ancla en nota porque el español puede omitirlo en prosa fluida.
