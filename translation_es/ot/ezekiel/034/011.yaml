revisions:
- from: 'Porque así ha dicho el Señor Yahvé: He aquí[a], yo mismo buscaré mis ovejas y las haré volver.'
  to: 'Porque así ha dicho el Señor Yahvé: He aquí, yo mismo buscaré mis ovejas y las buscaré[a].'
  rationale: Se reemplaza «y las haré volver» por «y las buscaré» para mantener el paralelismo verbal del hebreo y no introducir una idea de retorno ausente en este versículo. La nota se traslada al segundo verbo, donde realmente está la ambigüedad léxica documentada por la auditoría inglesa. Se mantiene «el Señor Yahvé» por fidelidad al doble título אֲדֹנָי יְהוִה y a la política del proyecto sobre el nombre divino.
