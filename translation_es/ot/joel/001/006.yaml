translation:
  language: es
  text: Pues una nación[a] ha venido contra mi tierra, poderosa y sin número; sus dientes son dientes de león[b], y tiene los colmillos de una leona.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un pueblo». El hebreo גוי significa literalmente «nación/pueblo» y se usa aquí metafóricamente para la plaga invasora.
    reason: lexical_alternative
  - marker: b
    text: O «de un gran león» o simplemente «de un león». El hebreo לָבִיא puede denotar un león fuerte y maduro; muchas traducciones lo vierten «leona» en este versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento del lamento. «Porque» conserva la fuerza causal/explanatoria de la partícula sin sonar forzado en español.
- source_word: גוֹי
  english_pob_choice: nation
  chosen_spanish: nación
  alternatives_spanish:
  - pueblo
  - gente
  lexicon: HALOT
  rationale: «Nación» mantiene el valor de grupo colectivo y el tono militarizado del contexto profético, sin reducir la imagen a una mera multitud.
- source_word: עָלָה עַל
  english_pob_choice: has come up against
  chosen_spanish: ha subido contra
  alternatives_spanish:
  - ha invadido
  - ha venido contra
  lexicon: HALOT
  rationale: «Subido contra» sigue de cerca el modismo hebreo de ascender contra un territorio y conserva la imagen de avance hostil. En español suena algo más literal que «ha invadido», pero sigue siendo claro.
- source_word: אַרְצִי
  english_pob_choice: my land
  chosen_spanish: mi tierra
  alternatives_spanish:
  - mi país
  - mi país/territorio
  lexicon: HALOT
  rationale: «Tierra» refleja el campo semántico de ארץ y mantiene el tono territorial y de posesión del sufijo de primera persona.
- source_word: עָצוּם
  english_pob_choice: mighty
  chosen_spanish: poderosa
  alternatives_spanish:
  - fuerte
  - fuerte y poderosa
  lexicon: HALOT
  rationale: Acordado con «nación» en femenino español. «Poderosa» comunica la idea de fuerza formidable de manera natural.
- source_word: וְאֵין מִסְפָּר
  english_pob_choice: and without number
  chosen_spanish: y sin número
  alternatives_spanish:
  - e innumerable
  - y no tiene número
  lexicon: HALOT
  rationale: «Sin número» reproduce con concisión la idea de innumerabilidad y conserva la cadencia poética del hebreo.
- source_word: שִׁנָּיו
  english_pob_choice: its teeth
  chosen_spanish: sus dientes
  alternatives_spanish:
  - sus colmillos
  - sus dientes
  lexicon: HALOT
  rationale: Se conserva el referente colectivo/metafórico de la nación/plaga con un posesivo neutro en español.
- source_word: שִׁנֵּי אַרְיֵה
  english_pob_choice: the teeth of a lion
  chosen_spanish: dientes de león
  alternatives_spanish:
  - dientes de un león
  - dientes de león
  lexicon: HALOT
  rationale: La construcción genitiva se expresa de forma natural en español y conserva la comparación poética con el depredador.
- source_word: מְתַלְּעוֹת
  english_pob_choice: fangs
  chosen_spanish: mandíbulas
  alternatives_spanish:
  - colmillos
  - fauces
  lexicon: HALOT
  rationale: El término hebreo apunta a la zona de agarre/desgarramiento. «Mandíbulas» mantiene la imagen corporal y, en español, resulta claro y digno; «fauces» o «colmillos» enfatizarían otros matices.
- source_word: לָבִיא
  english_pob_choice: lioness
  chosen_spanish: leona
  alternatives_spanish:
  - león
  - gran león
  lexicon: HALOT
  rationale: La POB inglesa documenta la posibilidad de «lioness». En español, «leona» transmite bien el valor zoológico femenino admitido por la tradición de traducción y preserva la parallelidad poética.
theological_decisions:
- issue: Metáfora del invasor como nación/plaga
  english_pob_reading: Retain 'nation' in the main text, allowing the prophetic metaphor of locusts as an invading army to stand without flattening it to 'locust swarm.'
  chosen_spanish_reading: Conservar «nación» en el texto principal, manteniendo la metáfora profética de la plaga como fuerza invasora y militarizada.
  alternative_spanish_readings:
  - «enjambre de langostas»
  - «nación de langostas»
  rationale: El hebreo usa גוי, no un término zoológico. El contexto deja ver que se trata de una plaga descrita con lenguaje bélico; traducirlo abiertamente como «nación» respeta ese diseño retórico y evita introducir una interpretación explicativa en el texto principal.
  doctrine_reference: Translation philosophy 1, 3, 5
translation_notes:
  revision_awareness: El texto sigue de cerca el estado más reciente del POB inglés, que fue revisado y confirmado sin cambios por el último pase. Se mantiene la decisión de conservar el lenguaje metafórico de «nación» y la comparación predatoria con el león/leona, sin nivelar el versículo a una paráfrasis de la plaga.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda en este proyecto; este versículo no contiene el nombre divino.
  - Se conserva un registro poético y profético, evitando un español excesivamente interpretativo.
  - 'Se mantiene la tensión entre literalidad e inteligibilidad: «ha subido contra» y «sin número» reflejan la forma hebrea, mientras que «mandíbulas» prioriza claridad natural en español.'
