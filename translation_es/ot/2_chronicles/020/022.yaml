revisions:
- from: Y en el momento en que comenzaron con cánticos[a] y alabanza, Yahvé puso emboscadas contra los amonitas, Moab y el monte de Seír, los que venían contra Judá[b], y fueron derrotados.
  to: Y en el momento en que comenzaron con cánticos y alabanza, Yahvé puso emboscadas[a] contra los amonitas, Moab y el monte de Seír, los que venían contra Judá[b], y fueron derribados.
  rationale: Se corrige la ubicación de la nota léxica para que quede anclada en «emboscadas», el término que realmente explica מְאָרְבִים. También se cambia «fueron derrotados» por «fueron derribados» para reflejar mejor el pasivo de נגף y el matiz de golpe súbito/divino preservado en la auditoría inglesa. El resto del texto puede mantenerse.
  reviewer_model: gpt-5.4
