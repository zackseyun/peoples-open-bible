translation:
  language: es
  text: 'Durante cuarenta años[a] me repugnó esa generación, y dije: «Son un pueblo cuyo corazón se desvía, y no han conocido mis caminos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me afligió esa generación». El verbo hebreo puede expresar repulsión, cansancio o dolor; el texto principal elige un giro más fuerte para reflejar la fuerza del contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְבָּעִים שָׁנָה
  english_pob_choice: For forty years
  chosen_spanish: Durante cuarenta años
  alternatives_spanish:
  - Por cuarenta años
  - Cuarenta años
  lexicon: HALOT
  rationale: En español, 'Durante' expresa con naturalidad la duración continua del período y conserva el valor temporal del hebreo sin forzar una estructura artificial.
- source_word: אָק֤וּט
  english_pob_choice: I loathed
  chosen_spanish: me repugnó
  alternatives_spanish:
  - lo aborrecí
  - me dio asco
  - estuve disgustado con
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar repulsión, desgaste o aversión. 'Me repugnó' conserva un tono fuerte y negativo, adecuado al juicio divino del contexto, sin suavizarlo a tristeza o mera pena.
- source_word: בְּדוֹר
  english_pob_choice: that generation
  chosen_spanish: esa generación
  alternatives_spanish:
  - aquella generación
  - la generación aquella
  lexicon: HALOT
  rationale: El demostrativo refleja el valor contextual de referencia a la generación del desierto y su fuerza de señalamiento en el discurso.
- source_word: עַם
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - un pueblo como conjunto
  - una gente
  lexicon: HALOT
  rationale: El sustantivo colectivo עַם se expresa de forma natural en español con 'pueblo', manteniendo el carácter colectivo del hebreo.
- source_word: תֹּעֵי לֵבָב
  english_pob_choice: who go astray in heart
  chosen_spanish: que se desvía de corazón
  alternatives_spanish:
  - que anda errante de corazón
  - que se extravía en el corazón
  - cuyos corazones se desvían
  lexicon: HALOT
  rationale: La imagen de extravío interior se conserva con una construcción idiomática en español. 'De corazón' mantiene el foco en la disposición interna, no solo en conducta externa.
- source_word: לֹא יָדְע֥וּ דְרָכָי
  english_pob_choice: they have not known my ways
  chosen_spanish: no han conocido mis caminos
  alternatives_spanish:
  - no conocieron mis caminos
  - no han entendido mis caminos
  lexicon: HALOT
  rationale: '''Conocer mis caminos'' reproduce de manera fiel la metáfora bíblica de ידע + דרך, entendida como reconocimiento vivido de la manera de obrar y conducir de Dios. El presente perfecto conserva el carácter perdurable de la acusación.'
theological_decisions:
- issue: Intensidad del verbo אָקוט
  english_pob_reading: A strong expression of divine revulsion/displeasure ('I loathed')
  chosen_spanish_reading: Una expresión fuerte de repulsión divina ('me repugnó')
  alternative_spanish_readings:
  - '''me desagradó'''
  - '''estuve disgustado con'''
  - '''me causó repulsión'''
  rationale: La lectura fuerte preserva la severidad del juicio divino frente a la persistente incredulidad. En español, 'me repugnó' comunica con claridad la aversión del hablante sin convertirla en simple tristeza.
  doctrine_reference: Translation philosophy §1, §6
- issue: Duración y evaluación continua de la acusación
  english_pob_reading: A settled failure to know God's ways ('they have not known my ways')
  chosen_spanish_reading: Una falta continua o duradera de conocer los caminos de Dios ('no han conocido mis caminos')
  alternative_spanish_readings:
  - '''no conocieron mis caminos'''
  - '''no han llegado a conocer mis caminos'''
  rationale: El perfecto hebreo en contexto puede expresar un estado persistente. El presente perfecto español comunica bien esa permanencia sin añadir explicación doctrinal extra.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonántico/vocalizado de WLC y el audit trail inglés sin cambios de revisión adicionales; la formulación española mantiene la tensión léxica documentada en אָקוט y la lectura durativa de לא ידעו en contexto.
  spanish_consistency_notes:
  - Se usó 'Yahvé' en otros contextos del proyecto cuando corresponde al tetragrámaton, pero aquí el versículo habla en primera persona divina y no requiere un rótulo nominal adicional.
  - Se mantuvo 'caminos' para דְרָכַי por su valor bíblico de conducta/obrar revelado, evitando una paráfrasis explicativa.
  - '''Pueblo'' conserva el colectivo singular de עַם sin pluralizarlo.'
