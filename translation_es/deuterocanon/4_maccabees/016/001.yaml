  glossary_alignment: No hay conflictos con la terminología de proyecto principal. La elección de "el razonamiento piadoso" para ὁ εὐσεβὴς λογισμός es defendible y coherente con la decisión inglesa. "Pasiones" preserva bien πάθη. Se recomienda mover la nota [a] a la frase de percepción y ajustar αὐτοκράτωρ de "señor" a "dueño" por naturalidad idiomática.
