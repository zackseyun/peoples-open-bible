translation:
  language: es
  text: ¿A quién me compararéis y me haréis igual, y me compararéis[a], para que seamos semejantes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿A quién me compararéis y me haréis igual, y me asemejaréis, para que seamos semejantes?» El hebreo acumula varios verbos muy próximos de comparación para intensificar la pregunta retórica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמִי
  english_pob_choice: To whom
  chosen_spanish: ¿A quién... ?
  alternatives_spanish:
  - ¿A quién me compararéis?
  - ¿Con quién me pondréis en paralelo?
  lexicon: HALOT
  rationale: El interrogativo con ל expresa el objeto de comparación; en español, «¿A quién...?» conserva la fuerza retórica y la inversión enfática del hebreo.
- source_word: תְדַמְיוּנִי
  english_pob_choice: will you liken me
  chosen_spanish: me compararéis
  alternatives_spanish:
  - me asemejaréis
  - me likenearéis
  lexicon: HALOT
  rationale: דמה en este contexto es «comparar / asemejar». «Me compararéis» suena natural en español y mantiene el sentido comparativo directo del sufijo «-ni».
- source_word: וְתַשְׁוּוּ
  english_pob_choice: and make me equal
  chosen_spanish: me haréis igual
  alternatives_spanish:
  - me igualaréis
  - me pondréis al mismo nivel
  lexicon: HALOT
  rationale: שוה en hifil comunica hacer igual o poner al mismo nivel. «Me haréis igual» preserva la idea de igualdad sin perder la coordinación acumulativa del hebreo.
- source_word: וְתַמְשִׁל֖וּנִי
  english_pob_choice: and compare me
  chosen_spanish: me asemejaréis
  alternatives_spanish:
  - me compararéis
  - me pondréis como modelo
  lexicon: HALOT
  rationale: מָשַׁל/משל aquí sigue la cadena de verbos de comparación; para evitar una repetición mecánica y mantener el efecto retórico, se varía levemente con «me asemejaréis».
- source_word: וְנִדְמֶה
  english_pob_choice: that we may be alike
  chosen_spanish: para que seamos semejantes
  alternatives_spanish:
  - para que seamos parecidos
  - y seamos iguales
  lexicon: HALOT
  rationale: El matiz final expresa el resultado supuesto de la comparación. «Para que seamos semejantes» refleja el sentido de la forma cohortativa/plural inclusiva sin forzar un giro más técnico en español.
theological_decisions:
- issue: Acumulación de verbos de comparación en una diatriba contra la idolatría
  english_pob_reading: Retain the layered sequence of comparison verbs without collapsing them into a single English verb.
  chosen_spanish_reading: 'Mantener la secuencia escalonada: comparar / hacer igual / asemejar / ser semejantes.'
  alternative_spanish_readings:
  - Reducirlo a una sola comparación para mayor fluidez.
  - Unificar todos los verbos como «igualar».
  - 'Usar una sola formulación: «¿A quién me podéis comparar?»'
  rationale: El hebreo acumula verbos afines para intensificar la pregunta retórica; la traducción española conserva esa acumulación porque forma parte del argumento profético y no debe suavizarse en una sola idea.
  doctrine_reference: Is 46:5; traducción de equivalencia óptima con preservación de la retórica del texto fuente.
translation_notes:
  revision_awareness: La redacción sigue el patrón del POB inglés revisado, especialmente la cláusula final con valor de propósito/resultando en «para que seamos semejantes», y conserva la acumulación de verbos observada en el audit trail. Se evitó simplificar la secuencia para no perder la intensidad polémica del hebreo.
  spanish_consistency_notes:
  - Se prefirió «A quién» para reflejar el objeto interrogativo del hebreo con לְמִי.
  - Se mantuvo el orden enfático de las acciones divinas en forma de pregunta directa.
  - Se usó «semejantes» en lugar de «iguales» en la cláusula final para no repetir innecesariamente la misma raíz española y para reflejar el matiz de similitud del hebreo.
  - La nota al pie conserva una alternativa válida en español sin introducir una paráfrasis doctrinal.
