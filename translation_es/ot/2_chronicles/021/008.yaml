revisions:
- from: En sus días, Edom se rebeló contra la mano de Judá y se nombró[a] un rey sobre ellos.
  to: En sus días, Edom se rebeló contra el dominio de Judá y se puso un rey sobre sí mismo[a].
  rationale: Se corrige el modismo hebreo para expresar autoridad/dominio en español natural y fiel, mientras la nota conserva la formulación literal. También se repara el verbo de entronización para reflejar que Edom se instaló su propio rey; «sobre sí mismo» concuerda con el sujeto colectivo singular «Edom».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:46:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del sentido base está presente: marco temporal («En sus días»), rebelión de Edom, y entronización de un rey propio. Sin embargo, dos giros del borrador no preservan fielmente la sintaxis ni el sentido del hebreo: «contra la mano de Judá» cambia מִתַּחַת יַד («de debajo de la mano», es decir, de la autoridad/control) por una idea de oposición frontal, y «se nombró ... sobre ellos» oscurece el sujeto plural y la reflexividad de וַיַּמְלִיכוּ עֲלֵיהֶם («hicieron/reinstalaron un rey sobre sí mismos»).'
  spanish_quality_summary: El borrador es entendible, pero «contra la mano de Judá» suena poco natural y semánticamente desviado en español. «Se nombró un rey sobre ellos» también resulta torpe e incluso ambiguo, porque parece singular impersonal y no refleja bien que los edomitas pusieron un rey sobre sí mismos. Una reparación pequeña produce un español claro, digno y fiel.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Los nombres propios «Edom» y «Judá» están bien. La decisión principal es idiomática/lexical: conservar o aclarar «debajo de la mano de Judá». En español conviene mantener el texto principal claro con una nota que preserve la literalidad hebrea, en línea con la auditoría inglesa.'
  issues:
  - severity: high
    issue: «contra la mano de Judá» traduce incorrectamente מִתַּחַת יַד יְהוּדָה
    rationale: El hebreo significa separarse de estar bajo la autoridad/dominio de Judá, no rebelarse 'contra la mano' de Judá. La preposición «contra» altera la imagen y el sentido político.
  - severity: high
    issue: «se nombró[a] un rey sobre ellos» no refleja bien el sujeto plural ni el sentido reflexivo
    rationale: 'וַיַּמְלִיכוּ es plural activo: «hicieron/pusieron rey». Con עֲלֵיהֶם, el sentido es que se pusieron un rey sobre sí mismos. El singular reflexivo «se nombró» es ambiguo y «sobre ellos» debilita la reflexividad.'
  - severity: low
    issue: La nota al pie puede mejorarse para corresponder exactamente al texto revisado
    rationale: Si el texto principal aclara «del dominio de Judá», la nota debe preservar la alternativa literal hebrea y la opción «del control de Judá» con redacción idiomática en español.
  revised_spanish_text: En sus días, Edom se rebeló contra el dominio de Judá y se puso un rey sobre sí mismo[a].
  revised_footnotes:
  - marker: a
    text: 'O: «se rebeló del control de Judá». El hebreo dice literalmente: «se rebeló de debajo de la mano de Judá».'
    reason: lexical_alternative
  revision_rationale: Se corrige el modismo hebreo para expresar autoridad/dominio en español natural y fiel, mientras la nota conserva la formulación literal. También se repara el verbo de entronización para reflejar que Edom se instaló su propio rey; «sobre sí mismo» concuerda con el sujeto colectivo singular «Edom».
