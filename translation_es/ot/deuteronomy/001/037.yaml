    rationale: Aunque «por causa de ustedes» es válido, la alternativa inglesa principal preservada era una formulación tipo «contra mí / conmigo» para el objeto del enojo; la nota causal no es incorrecta, pero no es la más necesaria dentro del aparato auditado.
