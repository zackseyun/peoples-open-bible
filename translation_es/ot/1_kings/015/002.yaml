translation:
  language: es
  text: Reinó tres años en Jerusalén, y el nombre de su madre era Maacá, hija[a] de Abisalom[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo «hija de» puede, en algunos contextos genealógicos, referirse más ampliamente a una descendiente.
    reason: alternative_reading
  - marker: b
    text: La forma hebrea aquí es Abisalom; muchas versiones en español usan «Absalón».
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלֹשׁ שָׁנִים
  english_pob_choice: three years
  chosen_spanish: tres años
  alternatives_spanish:
  - por tres años
  lexicon: HALOT
  rationale: 'La combinación de cardinal + sustantivo expresa duración del reinado; en español natural se traduce como duración simple: «tres años».'
- source_word: מָלַךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - llegó a reinar
  lexicon: HALOT
  rationale: El verbo en contexto real señala ejercicio de autoridad real; «reinó» conserva el valor regnal y es idiomático en español.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa pide «en»; el nombre propio se adapta a la forma usual en español.
- source_word: וְשֵׁם אִמּוֹ
  english_pob_choice: and his mother’s name was
  chosen_spanish: y el nombre de su madre era
  alternatives_spanish:
  - y el nombre de su madre fue
  lexicon: HALOT
  rationale: Se conserva la fórmula regnal hebrea de manera transparente; en español, «el nombre de su madre era» mantiene el registro formal sin forzar un giro más interpretativo.
- source_word: מַעֲכָה
  english_pob_choice: Maacah
  chosen_spanish: Maacá
  alternatives_spanish:
  - Maaca
  lexicon: transliteration
  rationale: Se translitera el nombre propio al español con acento gráfico para reflejar la pronunciación natural y mantener consistencia ortográfica.
- source_word: בַּת
  english_pob_choice: daughter of
  chosen_spanish: hija de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: El sentido básico de בת es «hija». Aunque en genealogías puede abarcar una descendencia más amplia, la redacción principal preserva la forma léxica literal.
- source_word: אֲבִישָׁלוֹם
  english_pob_choice: Abishalom
  chosen_spanish: Abisalom
  alternatives_spanish:
  - Absalón
  lexicon: transliteration
  rationale: Se sigue la forma hebrea documentada en el texto fuente, representándola en español como «Abisalom». Se conserva la alternativa tradicional «Absalón» para nota, porque es la forma más conocida en otras versiones.
theological_decisions:
- issue: Expresión genealógica בַּת אֲבִישָׁלוֹם
  english_pob_reading: Retain the literal familial expression 'daughter of Abishalom' in the main text.
  chosen_spanish_reading: Conservar la expresión literal «hija de Abisalom» en el texto principal.
  alternative_spanish_readings:
  - nieta/descendiente de Abisalom
  rationale: El hebreo dice literalmente «hija de». Dado que la posible relación genealógica más amplia es una cuestión histórica e interpretativa, no doctrinal, se preserva la forma del texto y se deja la amplitud posible para una nota.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El último pase de revisión indicó alta concordancia y ningún cambio requerido; se mantiene la lectura literal del tiempo de reinado y de la relación genealógica, con ajustes mínimos para el español publicado.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - 'Se mantiene la transliteración de nombres propios según el hebreo del pasaje: «Maacá» y «Abisalom».'
  - Se preserva la fórmula regnal con orden natural en español, sin añadir información inferida sobre la sucesión o el trasfondo genealógico.
