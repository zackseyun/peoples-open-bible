  text: וַ/יִּשְׁלַ֣ח מֶֽלֶךְ אַשּׁ֣וּר אֶת רַב שָׁקֵ֨ה מִ/לָּכִ֧ישׁ יְרוּשָׁלְַ֛מָ/ה אֶל הַ/מֶּ֥לֶךְ חִזְקִיָּ֖הוּ בְּ/חֵ֣יל כָּבֵ֑ד וַֽ/יַּעֲמֹ֗ד בִּ/תְעָלַת֙ הַ/בְּרֵכָ֣ה הָ/עֶלְיוֹנָ֔ה בִּ/מְסִלַּ֖ת שְׂדֵ֥ה כוֹבֵֽס־׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/036/002.yaml
  text: Then the king of Assyria sent the Rabshakeh from Lachish to Jerusalem[a], to King Hezekiah, with a great army. And he stood by the conduit of the upper pool[c][b], on the highway of the fuller’s field.
