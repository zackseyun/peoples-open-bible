  - severity: medium
    issue: ‘la conspiración se hizo fuerte’ es comprensible pero poco idiomático.
    rationale: El hebreo expresa desarrollo de estado; en español, para una conspiración, ‘se fortaleció’ o ‘se fue fortaleciendo’ transmite mejor la progresión narrativa sin rigidez.
  - severity: low
    issue: La nota [a] queda menos coherente si el texto principal mantiene ‘envió a Ahitofel’.
    rationale: La nota explica precisamente el sentido de convocatoria; al ajustar el texto principal a ‘mandó llamar a Ahitofel’, la relación entre texto y nota resulta más consistente y la alternativa literal pasa a la nota.
