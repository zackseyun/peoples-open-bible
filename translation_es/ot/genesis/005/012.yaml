lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - vivió durante
  - estuvo vivo
  lexicon: HALOT
  rationale: En la fórmula genealógica hebrea, חיה con waw consecutiva expresa la duración de la vida hasta el siguiente hito. «Vivió» reproduce con naturalidad ese valor en español sin sobrecargar la sintaxis.
- source_word: קֵינָן
  english_pob_choice: Kenan
  chosen_spanish: Kenán
  alternatives_spanish:
  - Cainan
  lexicon: convención transliterada del hebreo
  rationale: Se conserva la transliteración directa del hebreo. En español, «Kenán» refleja la forma hebrea y mantiene la transparencia frente al original; «Cainan» corresponde a una forma tradicional mediada por el griego.
- source_word: שִׁבְעִים שָׁנָה
  english_pob_choice: seventy years
  chosen_spanish: setenta años
  alternatives_spanish:
  - setenta años de edad
  lexicon: HALOT
  rationale: La expresión indica la edad de Kenán al momento de engendrar. «Setenta años» es fiel y natural en español; añadir «de edad» sería explicativo pero no necesario.
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  - procreó
  lexicon: HALOT
  rationale: En contextos genealógicos, ילד señala la acción de engendrar. «Engendró» conserva la fuerza genealógica y corresponde bien al matiz formal del texto hebreo; «fue padre de» sería más explicativo, pero menos directo.
- source_word: מַהֲלַלְאֵל
  english_pob_choice: Mahalalel
  chosen_spanish: Mahalalel
  alternatives_spanish:
  - Mahalaleel
  lexicon: transliteración estándar del hebreo
  rationale: Se mantiene la transliteración directa del nombre propio. «Mahalalel» es una forma clara y fiel al hebreo; la variante tradicional «Mahalaleel» se reserva como opción conocida en algunas biblias.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y coincide con la decisión inglesa de traducir el verbo genealógico con un equivalente directo y claro. No se requirieron notas textuales ni variantes significativas en español.
  spanish_consistency_notes:
  - Se usa «Kenán» como transliteración directa y «Mahalalel» para mantener transparencia con el hebreo.
  - Se conserva el estilo genealógico sobrio y conciso, sin añadir glosas innecesarias.
  - «Engendró» mantiene el matiz genealógico del original mejor que un término más genérico.
