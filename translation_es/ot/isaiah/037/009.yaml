  text: וַ/יִּשְׁמַ֗ע עַל תִּרְהָ֤קָה מֶֽלֶךְ כּוּשׁ֙ לֵ/אמֹ֔ר יָצָ֖א לְ/הִלָּחֵ֣ם אִתָּ֑/ךְ וַ/יִּשְׁמַע֙ וַ/יִּשְׁלַ֣ח מַלְאָכִ֔ים אֶל חִזְקִיָּ֖הוּ לֵ/אמֹֽר־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/037/009.yaml
  text: And he heard concerning Tirhakah king of Cush[a], saying, “He has come out to fight against you.” And when he heard, he sent messengers to Hezekiah, saying[b],
  footnotes:
  - marker: a
    text: Or 'king of Ethiopia.' The Hebrew name is Cush, which may overlap geographically with regions south of Egypt often associated with ancient Nubia/Ethiopia.
    reason: lexical_alternative
  - marker: b
    text: Literally 'with you'; in this military context, 'against you' conveys the intended adversarial sense.
    reason: lexical_alternative
