revisions:
- from: Todo el pueblo que quedó de entre los amorreos[a], los hititas, los ferezeos, los heveos y los jebuseos, que no eran de entre los hijos de Israel—
  to: Todo el pueblo que quedó de los amorreos, los hititas, los ferezeos, los heveos y los jebuseos, que no eran de los hijos de Israel[a]—
  rationale: Se reemplaza «de entre» por «de» para reflejar mejor el valor de procedencia/pertenencia del hebreo sin introducir una selección interna innecesaria, y se mueve la nota al pie a la cláusula que realmente comenta. El resto del versículo puede mantenerse.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:49:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo: totalidad colectiva («Todo el pueblo»), participio residual («que quedó»), lista de pueblos y la cláusula relativa final con cierre abierto por raya. También mantiene correctamente «hijos de Israel» para בְּנֵי יִשְׂרָאֵל. Sin embargo, el uso de «de entre» dos veces sobrerrepresenta el matiz de separación interna; aquí el hebreo מִן/מִ no exige «de entre» y la segunda ocurrencia suena especialmente poco natural en español para «no eran de los hijos de Israel».'
  spanish_quality_summary: El español es mayormente claro y eclesialmente legible, pero «que no eran de entre los hijos de Israel» resulta forzado. «Que no eran de los hijos de Israel» es más natural y más cercano al sentido de pertenencia/origen. En la primera ocurrencia, «de los amorreos...» también fluye mejor que «de entre los amorreos...», especialmente siguiendo el ajuste del POB inglés a «of».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Los etnónimos tradicionales usados son aceptables en español bíblico. «Hijos de Israel» alinea bien con la decisión documentada de preservar la forma masculina explícita. La nota al pie debe anclarse donde corresponde en la cláusula final, no en «amorreos».
  issues:
  - severity: medium
    issue: «de entre» sobretraduce מִן en ambas frases
    rationale: El hebreo expresa procedencia/pertenencia; «de entre» añade un matiz de selección interna que no es necesario aquí y en la segunda frase produce una construcción poco idiomática.
  - severity: medium
    issue: La nota al pie está anclada en «amorreos» pero comenta la frase final «no eran de los hijos de Israel»
    rationale: Los marcadores deben aparecer en la palabra o frase pertinente. El anclaje actual induce a pensar que la variante afecta al etnónimo, no a la cláusula relativa.
  revised_spanish_text: Todo el pueblo que quedó de los amorreos, los hititas, los ferezeos, los heveos y los jebuseos, que no eran de los hijos de Israel[a]—
  revised_footnotes:
  - marker: a
    text: 'O: «que no eran de los israelitas». Hebreo: «que no eran de los hijos de Israel».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «de entre» por «de» para reflejar mejor el valor de procedencia/pertenencia del hebreo sin introducir una selección interna innecesaria, y se mueve la nota al pie a la cláusula que realmente comenta. El resto del versículo puede mantenerse.
