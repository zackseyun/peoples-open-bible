translation:
  language: es
  text: Pues he tensado a Judá como mi arco; con Efraín lo he llenado. Despertaré a tus hijos[a], Sión, contra tus hijos, Grecia, y te haré como espada de guerrero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Javán», nombre tradicional de los pueblos o del mundo griego.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la acción divina anterior. En español, «Porque» conserva bien el valor causal/explanatorio sin sonar forzado.
- source_word: דָרַכְתִּי לִי יְהוּדָה קֶשֶׁת
  english_pob_choice: I have bent Judah as my bow
  chosen_spanish: he tendido a Judá como mi arco
  alternatives_spanish:
  - he doblado a Judá como mi arco
  - he preparado a Judá como mi arco
  lexicon: HALOT
  rationale: דָרַךְ con קֶשֶׁת alude a tensar o tender un arco para su uso. «He tendido» comunica la imagen sin un calco extraño. «Mi arco» expresa el valor posesivo/dativo de לִי, como en la decisión inglesa.
- source_word: מִלֵּאתִי אֶפְרַיִם
  english_pob_choice: I have filled it with Ephraim
  chosen_spanish: con Efraín lo he llenado
  alternatives_spanish:
  - lo he llenado de Efraín
  - he llenado el arco con Efraín
  lexicon: HALOT
  rationale: El hebreo mantiene la metáfora del arco y presupone el objeto. En español, «lo he llenado» conserva esa referencia implícita y evita explicar en exceso qué representa Efraín. «Con Efraín» mantiene el contenido del complemento.
- source_word: וְעוֹרַרְתִּי
  english_pob_choice: I will stir up
  chosen_spanish: Despertaré
  alternatives_spanish:
  - Incitaré
  - Iré a despertar
  lexicon: HALOT
  rationale: El verbo puede expresar avivar, excitar o poner en acción. «Despertaré» es natural en español bíblico y conserva la fuerza de poner en movimiento para la batalla.
- source_word: בָנַיִךְ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus descendientes
  lexicon: HALOT
  rationale: La POB inglesa preserva la imagen filial/martial con «sons». En español, «hijos» mantiene la personificación de Sión como madre sin forzar el masculino exclusivo de «hijos varones».
- source_word: יָוָן
  english_pob_choice: Greece
  chosen_spanish: Grecia
  alternatives_spanish:
  - Javán
  - Jonia
  lexicon: HALOT
  rationale: El término designa el mundo griego. «Grecia» comunica con claridad el referente histórico-cultural; «Javán» queda implícito por la nota textual, como en la auditoría inglesa.
- source_word: וְשַׂמְתִּיךְ כְּחֶרֶב גִּבּוֹר
  english_pob_choice: and make you like a warrior’s sword
  chosen_spanish: y te haré como espada de guerrero
  alternatives_spanish:
  - y te pondré como espada de guerrero
  - y te convertiré en espada de guerrero
  lexicon: HALOT
  rationale: שׂים en esta construcción comparativa se traduce bien con «hacer» en español, que evita la aspereza de «poner» y mantiene la equivalencia dinámica aceptada en la POB inglesa. «Espada de guerrero» conserva el sentido de גִּבּוֹר como combatiente fuerte.
theological_decisions:
- issue: Referencia de יָוָן
  english_pob_reading: Greece
  chosen_spanish_reading: Grecia
  alternative_spanish_readings:
  - Javán
  rationale: La referencia histórica apunta al mundo griego; «Grecia» es la forma más transparente para el lector moderno. La tensión entre nombre propio tradicional y referente histórico se mantiene mediante la nota textual a Javán.
  doctrine_reference: Geografía bíblica / identificación étnico-histórica
- issue: Temporalidad profética de los verbos
  english_pob_reading: present perfect for completed preparatory actions and future for ensuing action
  chosen_spanish_reading: pretérito perfecto compuesto para la preparación y futuro para la acción subsiguiente
  alternative_spanish_readings:
  - presente histórico para todo
  - futuro para todo
  rationale: El hebreo alterna acciones ya dispuestas con una acción venidera. En español, «he tendido / lo he llenado» y «Despertaré» reflejan esa secuencia sin perder la dinámica profética.
  doctrine_reference: Gramática del profeta / perfecto profético
- issue: Personificación de Sión
  english_pob_reading: your sons, Zion
  chosen_spanish_reading: tus hijos, Sión
  alternative_spanish_readings:
  - tus hijos varones, Sión
  - tus hijos, oh Sión
  rationale: El texto trata a Sión como una madre/persona femenina. «Tus hijos» conserva la personificación y la relación familiar/militar, sin introducir un matiz más restrictivo que el hebreo no exige.
  doctrine_reference: Personificación poética en los profetas
translation_notes:
  revision_awareness: 'Se siguió la auditoría inglesa de POB en los puntos clave: metáfora del arco, complemento implícito con Efraín, valor futurista de וְעוֹרַרְתִּי y lectura de יָוָן como Grecia. No se detectaron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se conservó «Grecia» en el texto principal y se anotó la forma tradicional «Javán» en nota.
  - «Espada de guerrero» evita una calcada excesiva y mantiene el valor de גִּבּוֹר.
  - La secuencia verbal en español intenta reflejar la tensión entre preparación consumada y acción inminente.
