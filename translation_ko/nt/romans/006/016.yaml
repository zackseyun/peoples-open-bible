id: ROM.6.16
reference: Romans 6:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐκ οἴδατε ὅτι ᾧ παριστάνετε ἑαυτοὺς δούλους εἰς ὑπακοήν, δοῦλοί ἐστε ᾧ ὑπακούετε, ἤτοι ἁμαρτίας εἰς θάνατον ἢ ὑπακοῆς εἰς δικαιοσύνην;
base_translation:
  language: en
  yaml_path: translation/nt/romans/006/016.yaml
  text: Do you not know that if you present yourselves as slaves for obedience[a], you are slaves of the one whom you obey—either of sin leading to death, or of obedience leading to righteousness?
translation:
  language: ko
  text: 여러분이 순종을 위하여 자신을 누구에게 노예로 내어주면 그 순종하는 자의 노예가 된다는 것을 알지 못합니까? 곧 죽음에 이르는 죄의 노예이든지, 의에 이르는 순종의 노예이든지 말입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δούλους / δοῦλοί
  english_pob_choice: slaves
  chosen_korean: 노예
  alternatives_korean:
  - 종
  lexicon: BDAG
  rationale: 6장 노예제 수사의 핵심. DOCTRINE.md §1 + 본 과제 정책에 따라 모든 δοῦλος를 「노예」로 일관 옮김.
- source_word: παριστάνετε
  english_pob_choice: present
  chosen_korean: 내어주면
  lexicon: BDAG
  rationale: 6:13 일관.
- source_word: ὑπακοήν / ὑπακοῆς
  english_pob_choice: obedience
  chosen_korean: 순종
  lexicon: BDAG
  rationale: 표준.
- source_word: ἁμαρτίας εἰς θάνατον
  english_pob_choice: of sin leading to death
  chosen_korean: 죽음에 이르는 죄의
  lexicon: BDAG
  rationale: 속격+εἰς.
- source_word: ὑπακοῆς εἰς δικαιοσύνην
  english_pob_choice: of obedience leading to righteousness
  chosen_korean: 의에 이르는 순종의
  lexicon: BDAG
  rationale: 평행.
theological_decisions:
- issue: 6장 δοῦλος의 일관 「노예」 번역
  chosen_reading: 모든 δοῦλος/δουλόω/δουλεύω를 「노예/노예 노릇/노예가 되다」로 강하게 옮김
  alternative_readings:
  - 「종」으로 부드럽게 옮김
  rationale: 바울은 6장에서 죄와 의의 양극 노예제라는 극적 수사로 신자의 신분 전환을 설명한다. 한국 전통의 「종」은 봉사 기능만 시사해 매임의 절대성을 약화시키므로, 본문의 충격을 보존하기 위해 모든 용례를 「노예」로 일관 번역.
  doctrine_reference: 'DOCTRINE.md §1: Contested terms — δοῦλος'
