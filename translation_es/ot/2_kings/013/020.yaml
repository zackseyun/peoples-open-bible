review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia narrativa del hebreo: «Entonces Eliseo murió, y lo sepultaron» refleja adecuadamente וַיָּמָת ... וַיִּקְבְּרֻהוּ con plural activo indefinido. También capta el valor habitual de יָבֹאוּ. Sin embargo, «las bandas de Moab» atenúa el matiz de incursión/saqueo de גְדוּדֵי מוֹאָב, y «al llegar el año» suena menos natural en español bíblico que una formulación más clara del giro idiomático, manteniendo nota explicativa.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «Ahora» después de una secuencia narrativa pasada suena algo calcado del inglés y menos natural que «Y». Además, «las bandas de Moab» queda algo vaga, y «al llegar el año» puede entenderse literalmente sin comunicar bien el giro temporal. Una leve revisión mejora naturalidad y precisión sin alejarse del hebreo.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Eliseo» es la forma española adecuada. «Lo sepultaron» respeta bien la decisión POB de mantener la voz activa. Conviene afinar גְדוּדֵי como «bandas invasoras/de saqueo» para preservar el valor léxico documentado.
  issues:
  - severity: medium
    issue: «las bandas de Moab» no expresa suficientemente el matiz de incursión de גְדוּדֵי מוֹאָב.
    rationale: El inglés auditado eligió «raiding bands of Moab» precisamente para evitar una lectura demasiado neutra de «bands». En español, «bandas de Moab» puede sonar meramente descriptivo; «bandas invasoras de Moab» o equivalente preserva mejor la fuerza léxica.
  - severity: low
    issue: «Ahora» es menos natural que una simple conjunción narrativa en este contexto.
    rationale: El hebreo introduce la nueva circunstancia narrativamente; en español bíblico fluido, «Y las bandas invasoras...» encaja mejor que «Ahora...», que refleja de cerca el inglés pero no es necesario.
  - severity: medium
    issue: «al llegar el año» es algo opaco como representación del modismo בָּא שָׁנָה.
    rationale: Aunque es cercano a la literalidad, puede sonar extraño o poco claro. «al comenzar el año» mantiene el sentido temporal en el texto principal, mientras la nota puede conservar la literalidad «al llegar/venir el año» y la alternativa «en la primavera del año».
  revised_spanish_text: Entonces Eliseo murió[a], y lo sepultaron. Y las bandas invasoras de Moab solían entrar en la tierra al comenzar el año.
  revised_footnotes:
  - marker: a
    text: O «en la primavera del año»; el hebreo dice literalmente «al llegar el año», un modismo para el cambio de año, a menudo asociado con la temporada de campañas militares.
    reason: lexical_alternative
  revision_rationale: 'Se conserva la estructura y el sentido del original, pero se mejora la precisión léxica y la naturalidad del español: «bandas invasoras» refleja mejor גְדוּדֵי, «Y» suena más narrativo que «Ahora», y «al comenzar el año» comunica con más claridad el modismo temporal, mientras la nota preserva la literalidad y la alternativa estacional del inglés POB.'
