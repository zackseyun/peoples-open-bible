  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: declaración narrativa, sujeto «la gloria», separación «de Israel» y la razón ligada a la captura del arca. Sin embargo, «ha salido de Israel» debilita y naturaliza en exceso גָּלָה, cuyo campo semántico aquí es más bien retirada/remoción/partida, como reconoce el rastro inglés. También conviene ajustar el pasivo final a un español más natural y resultativo.'
  spanish_quality_summary: El texto es claro, pero «ha salido de Israel» suena algo físico y poco idiomático para «la gloria» en contexto bíblico; «se ha apartado de Israel» o «ha partido de Israel» leen mejor. «Fue tomada el arca de Dios» es gramaticalmente posible pero poco natural; en español bíblico actual suena mejor «ha sido tomada el arca de Dios».
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: «Dios» y «arca de Dios» están bien. «La gloria» preserva adecuadamente כָבוֹד. No se requieren cambios de glosario mayores; el ajuste principal es lexical/idiomático para גָּלָה y el pasivo de נִלְקַח.'
  issues:
  - severity: medium
    issue: «ha salido de Israel» para גָּלָה
    rationale: Aunque comunica movimiento de salida, en este contexto «la gloria ha salido» suena demasiado físico y menos fiel al matiz de retirada/remoción que el inglés auditado preserva con «has departed». «Se ha apartado de Israel» expresa mejor la pérdida teológica sin sobreinterpretar.
  - severity: medium
    issue: «fue tomada el arca de Dios» suena poco natural en español
    rationale: El pasivo hebreo debe mantenerse, pero en español contemporáneo y digno resulta más natural «ha sido tomada el arca de Dios», que además refleja bien el perfecto/resultativo del inglés POB sin introducir agente.
  - severity: low
    issue: La nota b repite exactamente el texto principal
    rationale: La nota alternativa debería conservar una alternativa real. Dado que el inglés marca como alternativa «for the ark of God was taken», en español corresponde mejor ofrecer la variante conectiva «pues»/«porque» o el tiempo «fue tomada» frente al principal «ha sido tomada».
  revised_spanish_text: 'Y dijo[a]: «La gloria se ha apartado de Israel, porque ha sido tomada el arca de Dios[b]».'
