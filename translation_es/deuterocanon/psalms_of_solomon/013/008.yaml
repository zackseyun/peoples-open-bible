translation:
  language: es
  text: Porque amonestará a un hombre justo como a un hijo amado[a], y su disciplina es como la de un primogénito[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como a un hijo de amor».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y su instrucción/formación es como la de un primogénito».'
    reason: lexical_alternative
lexical_decisions:
- source_word: νουθετήσει
  english_pob_choice: will admonish
  chosen_spanish: amonestará
  alternatives_spanish:
  - corregirá
  - admonestará
  - reprenderá
  lexicon: BDAG
  rationale: El verbo griego expresa corrección exhortativa o amonestación. «Amonestará» mantiene ese matiz de instrucción correctiva sin volverlo demasiado severo ni diluirlo en una simple enseñanza.
- source_word: δίκαιον
  english_pob_choice: a righteous man
  chosen_spanish: a un hombre justo
  alternatives_spanish:
  - al justo
  - a un justo
  - al hombre justo
  lexicon: BDAG
  rationale: El adjetivo es singular y sustantivado. «A un hombre justo» conserva el singular y hace explícita la referencia personal que en español requiere artículo/ sustantivo para sonar natural.
- source_word: υἱὸν ἀγαπήσεως
  english_pob_choice: a beloved son
  chosen_spanish: a un hijo amado
  alternatives_spanish:
  - a un hijo de amor
  - a un hijo querido
  lexicon: BDAG
  rationale: La construcción genitiva comunica una relación de afecto intenso. «Hijo amado» es la forma más natural en español y preserva el valor cualitativo de la expresión sin convertirla en un giro abstracto.
- source_word: παιδεία
  english_pob_choice: discipline
  chosen_spanish: disciplina
  alternatives_spanish:
  - instrucción
  - formación
  - corrección
  lexicon: BDAG
  rationale: En el contexto paternal y correctivo, παιδεία se refiere a disciplina formativa, no solo a enseñanza. «Disciplina» reproduce bien esa fuerza y mantiene el paralelismo con νουθετήσει.
- source_word: πρωτοτόκου
  english_pob_choice: firstborn
  chosen_spanish: primogénito
  alternatives_spanish:
  - primero nacido
  - hijo primogénito
  lexicon: BDAG
  rationale: El término sustantivado evoca estatus y privilegio del primero nacido. «Primogénito» es el equivalente español directo y bíblicamente reconocido, y funciona bien en la comparación final.
translation_notes:
  revision_awareness: 'La base inglesa revisó νουθετήσει de «correct» a «admonish» para acercarse más al griego, y cambió «the righteous» por «a righteous man» para respetar el singular de δίκαιον. La versión española sigue esa revisión: conserva el singular personal y emplea un verbo de amonestación/corrección acorde con el valor de νουθετήσει, evitando una pluralización implícita.'
  spanish_consistency_notes:
  - Se mantuvo un tono bíblico digno y moderno, evitando arcaísmos innecesarios.
  - «Primogénito» se conserva como término bíblico claro y natural en español.
  - Las notas alternativas preservan la ambigüedad léxica de υἱὸν ἀγαπήσεως y παιδεία sin sobretraducir el pasaje.
