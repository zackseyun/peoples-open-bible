translation:
  text: |-
    A copy of the testament of Reuben, what he commanded his sons before he died, in the one hundred and twenty-fifth year of his life.
    
    2 Two years after the death of Joseph his brother, when Reuben had fallen sick, the sons of Joseph and the sons of his sons were gathered to visit him. 3 And he said to them, “My children, behold, I am dying, and I am going the way of my fathers.” 4 Then, seeing there Judah and Gad and Asher, his brothers, he said to them, “Raise me up, so that I may tell my brothers and my children the things hidden in my heart; for behold, even now I am failing.” 5 And rising up, he kissed them and said to them, “Hear, my brothers and my sons; pay attention to Reuben your father in the things that I command you.
    
    6 “And behold, today I call the God of heaven to witness against you, that you not walk in the ignorance of youth and in sexual immorality, in which I was poured out and defiled the bed of my father Jacob. 7 And I tell you that he struck me with a severe blow in my loins for seven months; and if my father Jacob had not prayed for me to the Lord, the Lord would have been willing to destroy me. 8 For I was thirty years old when I did the evil thing before the Lord, and for seven months I was weakened to the point of death. 9 And after this, with the resolve of my soul, I repented before the Lord for seven years. 10 And I drank no wine or strong drink, and meat did not enter my mouth, and I ate no bread of desire; but I was mourning over my sin, for it was great—such a thing had not happened in Israel.”
