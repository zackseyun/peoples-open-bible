technical_vocabulary_note: 'This section employs reified abstractions familiar in
  Valentinian discourse. We retain capitalization and translational consistency for:
  Logos (Word), Mind (Nous), Will, Thought, and the Hidden One. The spatial metaphor
  ‘inside/outside’ marks pre-manifestation within the Father’s Thought versus manifestation
  ‘outside.’ ‘Grace’ renders charis; ‘knowledge’ renders ⲥⲟⲟⲩⲛⲉ (gnosis), a term of
  art for salvific cognition. ‘Trace’ renders Greek ichnos, an image for the Will
  as the only ‘footprint’ of the unknowable Father.'
textual_note: 'Base text: Codex I, pp. 37–38. Section boundary: translated from the
  clause beginning ‘He is the Good…’ through the sentence concluding ‘…for the glory
  and the joy of his Name.’ The phrases ‘the Logos—the first to come forth—manifested
  them’ and ‘with a Mind that speaks the one Word in a silent grace’ follow the loanwords
  ⲡⲗⲟⲅⲟⲥ, ⲛⲟⲩⲥ, and ⲭⲁⲣⲓⲥ in the manuscript. The clause ‘but not before the time when
  the Will had desired it’ reflects ⲁⲗⲗⲁ ⲙⲡⲓⲥⲁⲡ ⲛⲧⲁϥⲣϩⲛⲉϥ … ⲡⲟⲩⲱϣ, taking ⲙⲡⲓⲥⲁⲡ as
  ‘the time’ and ⲣϩⲛⲉⲥ/ⲣϩⲛⲉϥ idiomatically as ‘be pleased/desire.’ ‘His trace is the
  Will’ renders ⲉϥⲓⲭⲛⲟⲥ ⲡⲉ ⲡⲟⲩⲱϣ. The sequence ‘No one can know him…’ through ‘…the
  Will of the Father’ preserves the negative/contrastive particles and the adverbial
  ⲁⲃⲁⲗ (‘outside’) as part of the visibility motif. ‘The end is the knowledge of the
  Hidden One’ translates ⲧϩⲁⲏ ⲇⲉ ⲡⲉ ⲡⲥⲟⲟⲩⲛⲉ ⲙⲡⲉⲉⲓ ⲉⲑⲏⲡ, taking ⲡⲉⲉⲓ ⲉⲑⲏⲡ as a titular
  periphrasis for God. The closing sentence ‘They were manifested for the glory and
  the joy of his Name’ reflects ⲁⲩⲟⲩⲱⲛϩ ⲁⲃⲁⲗ … ⲛⲧⲉⲡⲉϥⲣⲉⲛ, reading ⲧⲉⲗⲏⲗ as ‘joy/delight’
  in parallel with ‘glory.’'
