translation:
  language: es
  text: Pero el Señor no eligió a la nación por causa del lugar, sino el lugar por causa de la nación.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀλλʼ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sino
  - Mas
  lexicon: BDAG
  rationale: Marca el contraste adversativo fuerte del griego. En español, «Pero» conserva bien la oposición sin forzar una estructura más pesada.
- source_word: διὰ τὸν τόπον
  english_pob_choice: for the sake of the place
  chosen_spanish: por causa del lugar
  alternatives_spanish:
  - por el bien del lugar
  - a causa del lugar
  lexicon: BDAG
  rationale: La preposición con acusativo expresa motivo o finalidad en este paralelismo. «Por causa de» reproduce bien esa relación causal/teleológica sin añadir matices que el griego no exige.
- source_word: τὸν τόπον
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - el lugar santo
  - el santuario
  lexicon: BDAG
  rationale: El griego dice simplemente «el lugar». Aunque el contexto apunta a Jerusalén o al ámbito del templo, el texto no especifica más, así que conviene mantener la amplitud del término.
- source_word: ἔθνος
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la gente
  lexicon: BDAG
  rationale: Aquí ἔθνος se refiere al pueblo judío como entidad corporativa. «La nación» conserva mejor el sentido colectivo y étnico-político que «el pueblo» en esta antítesis.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Se sigue el valor reverencial convencional de κύριος en español. «El Señor» mantiene la referencia divina de manera natural y litúrgicamente inteligible.
- source_word: ἐξελέξατο
  english_pob_choice: did ... choose / choose
  chosen_spanish: eligió
  alternatives_spanish:
  - escogió
  - seleccionó
  lexicon: BDAG
  rationale: El aoristo medio de ἐκλέγομαι se traduce con un verbo simple y directo. «Eligió» expresa bien la acción decisiva y conserva el paralelismo del versículo.
theological_decisions:
- issue: Prioridad entre el lugar sagrado y la nación elegida
  english_pob_reading: The Lord did not choose the nation because of the place, but the place because of the nation.
  chosen_spanish_reading: El Señor no eligió a la nación por causa del lugar, sino el lugar por causa de la nación.
  alternative_spanish_readings:
  - El Señor no escogió a la nación por el lugar, sino el lugar por la nación.
  - El Señor no eligió a la nación a causa del lugar, sino el lugar a causa de la nación.
  rationale: 'El griego presenta una antítesis explícita que atribuye prioridad a la elección de la nación sobre la del lugar. La traducción conserva esa tensión sin resolverla ni ampliarla: el lugar es elegido en función de la nación, no al revés.'
  doctrine_reference: Preservar la prioridad teológica del texto; primacía del original sobre la tradición de traducción.
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios necesarios; el texto griego y el audit trail inglés están en alto acuerdo y no requieren ajuste textual.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, conforme al uso reverencial estándar y a la línea editorial del proyecto.
  - Se conserva «nación» para ἔθνος para no diluir la antítesis con «lugar» en un «pueblo» más genérico.
  - No se explicita Jerusalén o el templo porque el griego usa simplemente τόπον, y la sobrerrepresentación iría más allá de la evidencia textual.
