source:
  edition: SBLGNT
  text: τὸ θηρίον ὃ εἶδες ἦν καὶ οὐκ ἔστιν, καὶ μέλλει ἀναβαίνειν ἐκ τῆς ἀβύσσου, καὶ εἰς ἀπώλειαν ⸀ὑπάγει· καὶ ⸀θαυμασθήσονται οἱ κατοικοῦντες ἐπὶ τῆς γῆς, ὧν οὐ γέγραπται ⸂τὸ ὄνομα⸃ ἐπὶ τὸ βιβλίον τῆς ζωῆς ἀπὸ καταβολῆς κόσμου, βλεπόντων ⸂τὸ θηρίον ὅτι ἦν⸃ καὶ οὐκ ἔστιν καὶ παρέσται.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/017/008.yaml
  text: The beast that you saw was[a], and is not, and is about to come up out of the abyss and go to destruction. And those who dwell on the earth, whose name has not been written in the book of life from the foundation of the world, will marvel when they see the beast[c][b], because it was and is not and will be present.
  footnotes:
  - marker: a
    text: Or, 'will wonder.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'on the book of life'; English idiom uses 'in the book of life.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'that it was and is not and will come/appear.' The Greek can be taken as either causal ('because') or content ('that'), and 'will be present' renders the future of 'to be present.'
    reason: alternative_reading
translation:
  language: ko
  text: 그대가 본 그 짐승은 전에 있었으나 지금은 없고, 장차 무저갱에서 올라와 멸망으로 가오. 그리고 땅에 거하는 자들, 곧 창세 이후로 그 이름이 생명책에 기록되지 아니한 자들은, 짐승이 전에 있었으나 지금은 없고 장차 다시 나타날 것을 보고 놀랄 것이오.
  philosophy: optimal-equivalence
