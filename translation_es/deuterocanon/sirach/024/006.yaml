translation:
  language: es
  text: En las olas del mar y en toda la tierra[a], y entre todo pueblo y nación, tomé posesión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tierra» puede entenderse también como «país» o «territorio», pero aquí se conserva el alcance universal del griego.
    reason: lexical_alternative
  - marker: b
    text: O «adquirí» o «tomé posesión». El verbo griego deja implícito el objeto, y el español conserva esa misma amplitud sin especificarlo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν κύμασιν θαλάσσης
  english_pob_choice: In the waves of the sea
  chosen_spanish: En las olas del mar
  alternatives_spanish:
  - Entre las olas del mar
  - En las ondas del mar
  lexicon: LSJ
  rationale: κύμασιν designa olas o ondas; «olas» es la opción más natural en español actual y conserva la imagen concreta del movimiento del mar. Mantiene la ubicación locativa de ἐν sin forzar una paráfrasis.
- source_word: ἐν πάσῃ τῇ γῇ
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en toda la tierra habitable
  - por toda la tierra
  lexicon: LSJ
  rationale: γῆ puede significar «tierra» o «país/territorio», pero en esta secuencia amplia y universal, «toda la tierra» comunica mejor el alcance total sin estrecharlo a una región.
- source_word: ἐν παντὶ λαῷ καὶ ἔθνει
  english_pob_choice: among every people and nation
  chosen_spanish: entre todo pueblo y nación
  alternatives_spanish:
  - en todo pueblo y nación
  - entre cada pueblo y nación
  lexicon: LSJ
  rationale: «Entre» expresa presencia o extensión dentro de grupos humanos de modo natural en español. «Pueblo» y «nación» conservan la amplitud de λαός y ἔθνος sin introducir una categoría técnica ajena al texto.
- source_word: ἐκτησάμην
  english_pob_choice: I gained possession
  chosen_spanish: obtuve posesión
  alternatives_spanish:
  - adquirí
  - tomé posesión
  lexicon: LSJ
  rationale: κτάομαι aquí se entiende como adquirir o ganar posesión. «Obtuve posesión» conserva el valor de posesión/domino del verbo y suena más idiomático en español que una construcción demasiado literal. La ausencia de objeto explícito se mantiene, como en el griego.
theological_decisions:
- issue: Objeto implícito de ἐκτησάμην
  english_pob_reading: 'Render the verb with an explicit but general object: ''I gained a possession.'''
  chosen_spanish_reading: 'Mantener el verbo sin objeto explícito: «obtuve posesión».'
  alternative_spanish_readings:
  - obtuve una posesión
  - obtuve dominio
  rationale: El griego deja el objeto sin expresar. En español, una formulación absoluta como «obtuve posesión» comunica la acción sin añadir un objeto que podría restringir indebidamente el sentido. Esto preserva la amplitud del texto y evita resolver una ambigüedad que la fuente no resuelve.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se siguió el texto griego proporcionado (ἐκτησάμην) y no la variante interpretativa que algunas traducciones modernas reflejan; por eso se traduce con un verbo de adquisición/posesión. Se evitó añadir un objeto explícito, porque el original lo omite. La puntuación final separa con claridad los dos grandes miembros del versículo.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni κύριος en un contexto de cita divina.
  - Se prefirió «nación» para ἔθνος y «pueblo» para λαός, siguiendo el uso bíblico normal en español.
  - Se mantuvo la imagen concreta de «olas» para κύμασιν, evitando un calco menos natural como «ondas» en este contexto.
