translation:
  language: es
  text: La palabra[a] que concerté[b] con ustedes cuando salieron de Egipto, y mi Espíritu permanece en medio de ustedes[c]; no teman.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la palabra que corté con ustedes'; es lenguaje de pacto, comparable a la expresión 'cortar un pacto'.
    reason: lexical_alternative
  - marker: b
    text: O 'hice un pacto con ustedes'.
    reason: lexical_alternative
  - marker: c
    text: O 'entre ustedes'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶת הַדָּבָר
  english_pob_choice: The word
  chosen_spanish: La palabra
  alternatives_spanish:
  - el asunto
  - la promesa
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra' o 'cosa/asunto'. Dado que la revisión inglesa prefirió volver a 'the word' por mayor cercanía léxica, 'la palabra' mantiene esa precisión. En español, 'la palabra' suena natural y permite conservar la apertura del enunciado sin forzar aún 'promesa' en el texto principal.
- source_word: אֲשֶׁר כָּרַתִּי אִתְּכֶם
  english_pob_choice: that I covenanted with you
  chosen_spanish: que hice con ustedes
  alternatives_spanish:
  - que pacté con ustedes
  - que corté con ustedes
  - que hice pacto con ustedes
  lexicon: HALOT
  rationale: כרת con un objeto como 'palabra' activa lenguaje de pacto, pero el hebreo no usa aquí el sustantivo explícito 'pacto'. 'Hice con ustedes' conserva una expresión idiomática natural en español y deja abierto el matiz de pacto que la nota explica.
- source_word: בְּצֵאתְכֶם מִמִּצְרַיִם
  english_pob_choice: when you came out of Egypt
  chosen_spanish: cuando salieron de Egipto
  alternatives_spanish:
  - cuando ustedes salieron de Egipto
  - al salir de Egipto
  lexicon: HALOT
  rationale: El valor temporal del infinitivo constructo con ב se expresa bien con 'cuando salieron'. 'Egipto' se conserva sin ampliar ni debilitar la referencia al éxodo.
- source_word: וְרוּחִי
  english_pob_choice: my Spirit
  chosen_spanish: mi Espíritu
  alternatives_spanish:
  - mi espíritu
  - mi aliento
  lexicon: HALOT
  rationale: Aquí רוּחַ designa la presencia activa de Dios entre su pueblo. En español, la mayúscula en 'Espíritu' ayuda a señalar el referente divino sin introducir una glosa doctrinal ajena al texto.
- source_word: עֹמֶדֶת
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - está de pie
  - se mantiene
  - está permaneciendo
  lexicon: HALOT
  rationale: El participio expresa continuidad de presencia. 'Permanece' comunica bien esa duración en español y evita una literalidad poco natural como 'está de pie', sin perder la fuerza de la imagen.
- source_word: בְּתוֹכְכֶם
  english_pob_choice: in your midst
  chosen_spanish: en medio de ustedes
  alternatives_spanish:
  - entre ustedes
  - dentro de ustedes
  lexicon: HALOT
  rationale: '''En medio de ustedes'' reproduce adecuadamente la presencia corporativa del hebreo. ''Dentro de ustedes'' podría sugerir interioridad individual no exigida por el contexto.'
- source_word: אַל תִּירָאוּ
  english_pob_choice: do not fear
  chosen_spanish: no teman
  alternatives_spanish:
  - no tengan miedo
  - no teman ustedes
  lexicon: HALOT
  rationale: La prohibición se traduce de forma directa y solemne. 'No teman' es breve, bíblico y natural en español contemporáneo.
theological_decisions:
- issue: Lenguaje de pacto en דָּבָר + כרת
  english_pob_reading: the word that I covenanted with you
  chosen_spanish_reading: la palabra que hice con ustedes
  alternative_spanish_readings:
  - el pacto que hice con ustedes
  - la palabra del pacto que hice con ustedes
  - la promesa que hice con ustedes
  rationale: La POB inglesa decidió no reemplazar דָּבָר por el sustantivo técnico 'covenant', pero sí reconocer el trasfondo pactal de כרת. En español, 'la palabra que hice con ustedes' conserva la literalidad de 'palabra' y deja que la nota aclare que el verbo tiene resonancia de pacto.
  doctrine_reference: 'Translation philosophy #1 y #5'
- issue: Presencia divina de רוּחִי
  english_pob_reading: my Spirit remains in your midst
  chosen_spanish_reading: mi Espíritu permanece en medio de ustedes
  alternative_spanish_readings:
  - mi espíritu permanece entre ustedes
  - mi aliento permanece en medio de ustedes
  rationale: El contexto del éxodo y de la comunidad sugiere la presencia activa de Dios, no un simple aliento. 'Espíritu' con mayúscula mantiene esa lectura teológica sin añadir contenido doctrinal que el hebreo no enuncia explícitamente.
  doctrine_reference: 'Affirmations; Translation philosophy #1 y #3'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que volvió a 'the word' para mayor precisión de דָּבָר, mantuvo el valor pactal de כרת con una formulación natural, y prefirió 'remains' por naturalidad mientras preservaba la presencia continua. La redacción española sigue esa misma línea de precisión lexical y fluidez, pero adapta el verbo principal para evitar una dureza innecesaria en castellano.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - '''Espíritu'' se capitaliza por el referente divino contextual.'
  - Se evitó 'SEÑOR' como sustituto por convención editorial, conforme a la política del proyecto.
  - '''No teman'' conserva el tono imperativo breve del cierre hebreo.'
  - Las notas al pie están ancladas explícitamente en el texto con [a], [b] y [c].
