  spanish_consistency_notes:
  - Se mantuvo la estructura de lista simple sin añadir verbos ni elementos interpretativos.
  - Se evitó la forma inglesa de los topónimos cuando existe una adaptación española más natural.
  - La conjunción final 'y' refleja la waw coordinante del hebreo en una enumeración de cuatro nombres.
