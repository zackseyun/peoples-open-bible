translation:
  language: es
  text: Has puesto nuestras iniquidades delante de ti, nuestros pecados ocultos[a] a la luz de tu rostro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nuestros pecados secretos». El término hebreo se refiere a lo que está oculto o encubierto.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «en la luz de tu rostro», imagen de plena exposición ante la presencia de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שת
  english_pob_choice: You have set
  chosen_spanish: Has puesto
  alternatives_spanish:
  - Has colocado
  - Has establecido
  lexicon: HALOT
  rationale: El verbo hebreo expresa poner o colocar. En español, «has puesto» comunica una acción divina ya establecida con naturalidad y conserva el valor perfecto del discurso del salmo.
- source_word: עֲוֺנֹתֵינוּ
  english_pob_choice: our iniquities
  chosen_spanish: nuestras iniquidades
  alternatives_spanish:
  - nuestros pecados
  - nuestra culpa
  lexicon: HALOT
  rationale: «Iniquidades» mantiene la fuerza moral y la pluralidad concreta del término hebreo עָוֹן, evitando suavizarlo en un genérico «pecados» o reducirlo a «culpa».
- source_word: לְנֶגְדֶּךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - en tu presencia
  lexicon: HALOT
  rationale: La expresión hebrea indica estar frente a Dios, expuestos a su mirada. «Delante de ti» es idiomático en español y conserva esa idea de exposición directa.
- source_word: עֲלֻמֵנוּ
  english_pob_choice: our hidden sins
  chosen_spanish: nuestros pecados ocultos
  alternatives_spanish:
  - nuestros pecados secretos
  - nuestras cosas ocultas
  - nuestros ocultamientos
  lexicon: HALOT
  rationale: Aunque el sustantivo hebreo significa lo oculto o escondido, en este paralelo la referencia probable es a faltas escondidas. «Pecados ocultos» hace explícita la elipsis poética sin desvirtuar el sentido.
- source_word: לִמְאוֹר פָּנֶיךָ
  english_pob_choice: in the light of your face
  chosen_spanish: a la luz de tu rostro
  alternatives_spanish:
  - en la luz de tu rostro
  - ante la luz de tu rostro
  - a la luz de tu presencia
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «a/en la luz de tu rostro». «A la luz de tu rostro» mantiene la metáfora de plena exposición ante Dios y sugiere la iluminación de todo lo oculto.
theological_decisions:
- issue: Si explicitar o no el objeto implícito de עֲלֻמֵנוּ
  english_pob_reading: our hidden sins
  chosen_spanish_reading: nuestros pecados ocultos
  alternative_spanish_readings:
  - nuestros ocultamientos
  - nuestras cosas ocultas
  - nuestros pecados secretos
  rationale: El paralelismo con «nuestras iniquidades» orienta el término hacia faltas ocultas, no solo a cosas escondidas en general. Explicitar «pecados» conserva la tensión poética y aclara el hebreo ellíptico para el lector español.
  doctrine_reference: 'Translation philosophy: optimal equivalence; mantener el sentido fuente sin añadir paráfrasis innecesaria.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés POB, conservando la metáfora de exposición ante Dios y la elipsis poética de «lo oculto» con una explicitación prudente en español. No se detectaron revisiones textuales que alteren la decisión de traducción.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando corresponde al nombre divino; en este versículo el texto hebreo solo emplea segunda persona, por lo que no se introduce ningún sustituto.
  - Se mantiene el paralelismo semántico entre «iniquidades» y «pecados ocultos» sin nivelarlo a un solo término genérico.
  - «Rostro» conserva la imaginería corporal del hebreo frente a una paráfrasis más abstracta como «presencia».
