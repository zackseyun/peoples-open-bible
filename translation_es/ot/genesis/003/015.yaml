translation:
  language: es
  text: Y pondré hostilidad entre ti y la mujer[a], y entre tu descendencia[b] y su descendencia; él[c] herirá[d] tu cabeza, y tú herirás su talón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enemistad».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «semilla» en ambos lugares; el término puede referirse colectivamente a descendientes o a un individuo representativo.
    reason: lexical_alternative
  - marker: c
    text: O «esta te herirá la cabeza». El hebreo usa un pronombre masculino singular después de un sustantivo colectivo.
    reason: alternative_reading
  - marker: d
    text: El verbo hebreo es el mismo en ambas cláusulas; tradicionalmente, «magullar» o «herir». Algunos traducen la primera cláusula más fuertemente como «aplastará» por la referencia a la cabeza.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיבָה
  english_pob_choice: hostility
  chosen_spanish: hostilidad
  alternatives_spanish:
  - enemistad
  lexicon: HALOT
  rationale: אֵיבָה expresa oposición activa. «Hostilidad» es claro y natural en español moderno; «enemistad» conserva el matiz tradicional y también es viable, por eso se mantiene como alternativa.
- source_word: אָשִׁית
  english_pob_choice: I will put
  chosen_spanish: pondré
  alternatives_spanish:
  - colocaré
  - estableceré
  lexicon: HALOT
  rationale: El verbo de poner/colocar transmite bien el hebreo de instalar o establecer algo entre dos partes. «Pondré» suena natural en español y conserva el valor de acción divina directa.
- source_word: בֵּֽינְךָ ... וּבֵ֣ין הָֽאִשָּׁה
  english_pob_choice: between you and the woman
  chosen_spanish: entre tú y la mujer
  alternatives_spanish:
  - entre ti y la mujer
  lexicon: HALOT
  rationale: Se mantiene la repetición preposicional y la relación de oposición. Se eligió «tú» para concordar con el paralelismo inmediato y con el tono directo del hebreo.
- source_word: זַרְעֲךָ ... זַרְעָהּ
  english_pob_choice: your offspring ... her offspring
  chosen_spanish: tu descendencia ... su descendencia
  alternatives_spanish:
  - tu semilla ... su semilla
  - tu linaje ... su linaje
  - tu descendencia ... la descendencia de ella
  lexicon: HALOT
  rationale: זֶרַע puede ser colectivo o referirse a un representante singular. «Descendencia» conserva el valor colectivo en español sin reducirlo al sentido botánico de «semilla», y permite dejar visible la tensión interpretativa.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - ello
  - él/ello
  lexicon: HALOT
  rationale: El pronombre hebreo es masculino singular. «Él» refleja esa forma en español y preserva la posibilidad de lectura individual sin resolverla de manera interpretativa en el texto principal.
- source_word: יְשׁוּפְךָ ... תְּשׁוּפֶנּוּ
  english_pob_choice: will bruise ... will bruise
  chosen_spanish: herirá ... herirás
  alternatives_spanish:
  - aplastará ... aplastarás
  - morderá ... morderás
  - golpeará ... golpearás
  - bruñirá ... bruñirás
  lexicon: HALOT
  rationale: שׁוּף es raro y debatido. Para un español publicable y sobrio, «herirá» comunica daño sin exagerar la intensidad y permite mantener la misma raíz verbal en ambas cláusulas, como hace el hebreo. «Bruise» o «crush» serían más interpretativos en español.
- source_word: רֹאשׁ
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - cogote
  - coco
  lexicon: HALOT
  rationale: Término corporal literal y transparente. «Cabeza» conserva la imagen primaria y la asimetría con «talón».
- source_word: עָקֵב
  english_pob_choice: heel
  chosen_spanish: talón
  alternatives_spanish:
  - pie
  - calcañar
  lexicon: HALOT
  rationale: «Talón» es el equivalente natural en español y reproduce el contraste corporal del hebreo con «cabeza».
theological_decisions:
- issue: Cómo reflejar la tensión entre lectura colectiva y posible lectura individual de זֶרַע y del pronombre masculino singular
  english_pob_reading: Rendered זֶרַע as 'offspring' and the following pronoun הוּא as 'he' in the main text
  chosen_spanish_reading: Se traduce con un sustantivo colectivo («descendencia») y con un pronombre masculino singular («él»), manteniendo abierta la lectura colectiva e individual.
  alternative_spanish_readings:
  - «semilla» con pronombre singular
  - «descendencia» con «ellos»
  - «descendencia» con «ello»
  rationale: El hebreo usa un colectivo y luego un singular masculino. En español, «descendencia» preserva bien el valor colectivo; «él» mantiene visible la forma gramatical singular. Esto evita cerrar prematuramente la tensión teológica y literaria del pasaje.
  doctrine_reference: Translation philosophy §§3–4
- issue: Cómo representar שׁוּף sin imponer una intensidad interpretativa indebida
  english_pob_reading: Used 'bruise' in both clauses after revision, while noting the traditional and stronger options
  chosen_spanish_reading: Se usa «herirá» en ambos miembros para conservar la misma relación verbal del hebreo y evitar sobretraducir la intensidad.
  alternative_spanish_readings:
  - «bruiseará»
  - «aplastará» en la primera cláusula y «herirá» en la segunda
  - «morderá» en ambas cláusulas
  rationale: El verbo hebreo es raro y su alcance exacto es debatido. «Herirá» es suficientemente amplio para no decidir por adelantado el grado de lesión; además, mantiene la simetría verbal entre cabeza y talón.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción española sigue la decisión revisada del texto fuente inglés de mantener un mismo verbo para ambas cláusulas, en lugar de distinguir artificialmente entre daño leve y fuerte. A la vez, se optó por «herirá» en vez de «bruise» o «crush» para un registro español natural, sobrio y fiel al verbo raro del hebreo.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de dos miembros con «entre… y entre…».
  - Se evitó «SEÑOR» o cualquier sustitución por convención litúrgica, porque este versículo no contiene el tetragrámaton.
  - «Descendencia» se usó de modo coherente con el valor colectivo de זֶרַע.
  - Las notas al pie distinguen claramente la alternativa léxica de la observación gramatical sobre el pronombre singular.
