translation:
  language: es
  text: Entonces todo el pueblo de Judá tomó a Azarías[a] —tenía dieciséis años— y lo hizo rey en lugar de su padre Amasías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Azarías es también llamado Uzías en otros pasajes; aquí el hebreo dice Azarías.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְחוּ
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - seleccionó
  - tomaron por la mano
  lexicon: HALOT
  rationale: לקח en este contexto de entronización expresa la acción de tomar/traer a la persona para instalarla como rey. «Tomó» conserva la concisión y la direccionalidad de la acción sin añadir ceremonia no expresada.
- source_word: כָּל עַם יְהוּדָה
  english_pob_choice: all the people of Judah
  chosen_spanish: todo el pueblo de Judá
  alternatives_spanish:
  - todo Judá
  - la gente de Judá
  lexicon: HALOT
  rationale: La frase subraya la acción corporativa del pueblo, no solo del territorio. «Todo el pueblo de Judá» preserva mejor esa referencia colectiva que una forma abreviada.
- source_word: עֲזַרְיָה
  english_pob_choice: Azariah
  chosen_spanish: Azarías
  alternatives_spanish:
  - Uzías
  lexicon: Nombre propio hebreo
  rationale: El hebreo de este versículo lee עֲזַרְיָה, por lo que la forma base en español debe seguir ese nombre. «Uzías» se reserva como nombre alterno documentado en otros pasajes y se mantiene como variante en nota, no en el cuerpo.
- source_word: וְהוּא בֶּן שֵׁשׁ עֶשְׂרֵה שָׁנָה
  english_pob_choice: he was sixteen years old
  chosen_spanish: tenía dieciséis años
  alternatives_spanish:
  - era de dieciséis años
  - siendo de dieciséis años
  lexicon: HALOT
  rationale: El hebreo presenta una nota de edad. En español, «tenía dieciséis años» es la forma más natural y fiel al valor parentético, sin perder el dato cronológico.
- source_word: וַיַּמְלִכוּ אֹתוֹ
  english_pob_choice: made him king
  chosen_spanish: lo hicieron rey
  alternatives_spanish:
  - lo proclamaron rey
  - lo coronaron rey
  lexicon: HALOT
  rationale: El hifil de מלך expresa causar que alguien reine. «Lo hicieron rey» reproduce esa causación con naturalidad; «lo coronaron rey» añadiría un rito que el texto no menciona.
- source_word: תַּחַת אָבִיו
  english_pob_choice: in place of his father
  chosen_spanish: en lugar de su padre
  alternatives_spanish:
  - en vez de su padre
  - después de su padre
  lexicon: HALOT
  rationale: En contextos sucesorios, תחת significa sustitución. «En lugar de su padre» expresa con precisión la sustitución real y evita que «después de» se lea solo como sucesión temporal.
- source_word: אֲמַצְיָהוּ
  english_pob_choice: Amaziah
  chosen_spanish: Amasías
  alternatives_spanish:
  - Amazías
  lexicon: Nombre propio hebreo
  rationale: La forma tradicional en español para אֲמַצְיָהוּ es «Amasías», que conserva la identificación del rey y es la forma más reconocible para lectores bíblicos en español.
theological_decisions:
- issue: Nombre alterno del rey (Azarías / Uzías)
  english_pob_reading: Azariah is also called Uzziah elsewhere; the Hebrew here reads Azariah.
  chosen_spanish_reading: Azarías es el nombre que aparece en este versículo; en nota se indica que en otros pasajes también se le llama Uzías.
  alternative_spanish_readings:
  - Usar Uzías en el texto principal
  - poner ambos nombres en el texto principal
  rationale: La lectura del hebreo aquí exige Azarías. Mantenerlo en el texto principal respeta la forma del pasaje, mientras la nota conserva la tensión textual y la identidad histórica del rey sin borrarla.
  doctrine_reference: Crítica textual / onomástica bíblica
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se mantuvo el nombre hebreo de este versículo (Azarías), la nota de edad en forma natural en español, y la relación sucesoria con Amasías mediante una construcción de sustitución directa. No hubo revisiones aplicadas en el pass más reciente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Hizo rey»/«lo hicieron rey» se usa de manera consistente para el hifil de מלך cuando el contexto enfatiza instalación o entronización.
  - Se prefirió la forma tradicional española «Amasías» para el padre del rey, y «Azarías» para el nombre que aparece en este versículo.
