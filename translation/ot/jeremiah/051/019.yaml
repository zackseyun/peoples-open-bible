theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether to supply 'Israel' in the clause 'and [Israel is] the tribe of his inheritance'
  chosen_reading: Do not add 'Israel' to the main text beyond what the Hebrew explicitly states
  alternative_readings:
  - Supply 'Israel' from the parallel in Jeremiah 10:16 or from versions for smoother English
  rationale: Although the parallel passage and context make Israel/Jacob the referent, the provided Hebrew text does not contain יִשְׂרָאֵל. Optimal equivalence here favors preserving the MT wording rather than harmonizing from a parallel text.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition'
