translation:
  text: Do not say[a], “Who can withstand his power?” for Yahweh seeks the persecuted.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Greek reads: “Do not say, ‘I sinned, and what happened to me?’ for the Lord is patient.” This likely reflects a different underlying text than the extant Hebrew.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תֹּאמַר
  chosen: Do not say
  alternatives:
  - Do not speak
  - Do not say to yourself
  lexicon: HALOT
  rationale: Standard negative imperative with אמר; direct prohibition is best rendered simply and naturally in English.
- source_word: מִי יוּכַל כֹּחוֹ
  chosen: Who can prevail against his power?
  alternatives:
  - Who can withstand his power?
  - Who can match his strength?
  - Who can [endure] his power?
  lexicon: HALOT
  rationale: The Hebrew as transmitted is terse and somewhat difficult, with a minor mismatch against the Greek parallel. Taking יוכל with an implicit adversative sense yields the natural question of resisting or prevailing against divine power. 'Power' reflects כוח. 'Prevail against' makes the sense idiomatic in English while preserving the warning tone. The Greek parallel points instead to a different Vorlage ('I sinned, and what happened to me?'), so the Hebrew is followed as the primary witness but with uncertainty acknowledged.
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  - since
  lexicon: HALOT
  rationale: Introduces the reason for the prohibition; 'for' preserves the explanatory connection compactly.
- source_word: יְהֹוָה
  chosen: the LORD
  alternatives:
  - Yahweh
  - Jehovah
  - the Lord
  lexicon: HALOT
  rationale: Per project doctrine, the Tetragrammaton is rendered 'the LORD'.
- source_word: מְבַקֵּשׁ
  chosen: seeks out
  alternatives:
  - seeks
  - looks for
  - calls to account on behalf of
  lexicon: HALOT
  rationale: בקש commonly means 'seek.' 'Seeks out' conveys active intervention, fitting the context of divine response to oppression.
- source_word: נִרְדָּפִים
  chosen: the persecuted
  alternatives:
  - the pursued
  - the oppressed
  - those who are chased
  lexicon: HALOT
  rationale: Passive participle from רדף, 'to pursue/persecute.' 'The persecuted' best captures the human victims in a moral-religious context; 'oppressed' is possible but less directly tied to the verbal root.
