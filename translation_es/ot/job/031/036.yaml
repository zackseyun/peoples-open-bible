translation:
  language: es
  text: Sin duda lo llevaría sobre mi hombro; me lo ceñiría como una corona[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «coronas» (plural); el sentido puede ser un plural intensivo, por eso aquí se traduce «como una corona».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  english_pob_choice: Surely
  chosen_spanish: ¡Ojalá...!
  alternatives_spanish:
  - Seguramente...
  - Ciertamente...
  lexicon: HALOT
  rationale: En este contexto juramentario, la expresión hebrea funciona como una afirmación enfática o desiderativa, no como una condición. En español, «¡Ojalá...!» transmite bien la fuerza retórica de una autoafirmación vehemente, aunque conserva una leve oscilación entre deseo y énfasis.
- source_word: עַל שִׁכְמִי
  english_pob_choice: on my shoulder
  chosen_spanish: sobre mi hombro
  alternatives_spanish:
  - en mi hombro
  - encima de mi hombro
  lexicon: HALOT
  rationale: La imagen espacial se conserva de forma directa. «Hombro» reproduce el singular hebreo y mantiene la escena de llevar algo públicamente expuesto.
- source_word: אֶשָּׂאֶנּוּ
  english_pob_choice: I would carry it
  chosen_spanish: lo llevara
  alternatives_spanish:
  - lo cargara
  - lo portara
  lexicon: HALOT
  rationale: El verbo נשׂא aquí expresa cargar o llevar. En español, «llevar» es natural y suficientemente amplio para el gesto físico de asumir y transportar el objeto.
- source_word: אֶעֶנְדֶנּוּ
  english_pob_choice: I would bind it on myself
  chosen_spanish: me lo ataría
  alternatives_spanish:
  - me lo ceñiría
  - me lo pondría
  lexicon: HALOT
  rationale: ענד normalmente denota poner o ajustar algo sobre el cuerpo, especialmente un adorno. «Atar» preserva el valor concreto de fijarlo sobre uno mismo sin reducirlo solo a adornarse; el reflexivo en español expresa la aplicación personal.
- source_word: עֲטָרוֹת
  english_pob_choice: like a crown
  chosen_spanish: como una corona[a]
  alternatives_spanish:
  - como coronas
  - como una guirnalda
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, el sentido puede ser un plural intensivo o una imagen ornamentativa singular. El español fluye mejor con singular en la comparación, pero se conserva la tensión en la nota.
- source_word: לִי
  english_pob_choice: on myself
  chosen_spanish: para mí
  alternatives_spanish:
  - sobre mí
  - a mí
  lexicon: HALOT
  rationale: El dativo final puede expresarse en español como finalidad o apropiación personal. «Para mí» mantiene la idea de que Job lo llevaría como algo asumido personalmente, sin forzar una redundancia reflexiva innecesaria.
theological_decisions:
- issue: No hay una cuestión doctrinal explícita; se trata de una autoafirmación figurada en un juramento.
  english_pob_reading: The verse expresses Job's willingness to bear an accusation publicly and even wear it as an ornament.
  chosen_spanish_reading: El versículo expresa la disposición de Job a llevar públicamente la acusación y hasta portarla como adorno.
  alternative_spanish_readings:
  - El versículo expresa la disposición de Job a soportarla públicamente.
  - El versículo expresa que Job se la pondría como una corona.
  rationale: 'Se conserva la imagen forense y de honor/vergüenza sin convertirla en una declaración doctrinal. La comparación con una corona mantiene la ironía del gesto: algo potencialmente vergonzoso sería asumido sin temor.'
  doctrine_reference: Job 31:36; discurso juramentario sapiencial
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo en el audit trail inglés: no se aplicaron revisiones sustantivas, y la elección española sigue de cerca la imagen hebrea con ajuste idiomático mínimo.'
  spanish_consistency_notes:
  - Se mantuvo «hombro» en singular por correspondencia directa con שִׁכְמִי.
  - Se eligió «corona» en singular para la comparación, pero la nota preserva el plural hebreo de עֲטָרוֹת.
  - Se evitó «SEÑOR» o terminología teológica no pertinente, porque el versículo no contiene el Tetragrámaton ni un título divino.
  - La formulación en primera persona del subjuntivo/imperfecto («lo llevara», «me lo ataría») reproduce el valor irrealis de la frase juramentaria.
