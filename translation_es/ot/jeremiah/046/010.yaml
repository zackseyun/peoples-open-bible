    rationale: La nota inglesa sobre el título menciona la forma tradicional «Lord of hosts». En español no es obligatorio calcar esa nota, pero si se conserva una nota anclada al título, su contenido debe corresponder a una alternativa real del título, no a la lectura posesiva de toda la cláusula.
