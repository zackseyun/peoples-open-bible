translation:
  language: es
  text: Y me desagradó mucho,[a] y eché fuera de la cámara[b] todos los enseres de la casa de Tobías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me fue muy malo». El hebreo puede expresar de manera impersonal que algo fue muy malo o desagradable para alguien.'
    reason: lexical_alternative
  - marker: b
    text: «Cámara» se refiere a una sala del complejo del templo.
    reason: cultural_note
lexical_decisions:
- source_word: וַיֵּרַע לִי מְאֹד
  english_pob_choice: it displeased me greatly
  chosen_spanish: me desagradó mucho
  alternatives_spanish:
  - me fue muy malo
  - me entristeció mucho
  - me irritó mucho
  lexicon: HALOT
  rationale: El hebreo expresa la idea impersonal de que algo ‘fue malo/desagradable’ para alguien. ‘Me desagradó mucho’ conserva esa construcción y comunica bien la reacción sin añadir más emoción de la que el texto garantiza.
- source_word: וָאַשְׁלִיכָה
  english_pob_choice: I threw
  chosen_spanish: eché fuera
  alternatives_spanish:
  - arrojé
  - tiré
  - lancé fuera
  lexicon: HALOT
  rationale: El verbo en hifil indica lanzar/arrojar con fuerza. ‘Eché fuera’ suena natural en español y preserva la acción expulsiva del contexto; ‘arrojé’ sería más literal pero algo más duro en castellano, aunque también posible.
- source_word: כָּל כְּלֵי בֵית טוֹבִיָּה
  english_pob_choice: the household goods of Tobiah
  chosen_spanish: todos los utensilios de la casa de Tobías
  alternatives_spanish:
  - todos los bienes de la casa de Tobías
  - todos los objetos de la casa de Tobías
  - todos los enseres de la casa de Tobías
  lexicon: HALOT
  rationale: כְּלִי puede abarcar artículos, utensilios, objetos o bienes. Aquí el contexto es sacar pertenencias almacenadas; ‘utensilios’ es amplio y concreto, y mantiene la amplitud semántica mejor que una versión más estrecha como ‘vessels’. ‘Casa de Tobías’ refleja el genitivo del hebreo y la formulación del POB en inglés.
- source_word: הַחוּץ
  english_pob_choice: out
  chosen_spanish: fuera
  alternatives_spanish:
  - al exterior
  - afuera
  - hacia afuera
  lexicon: HALOT
  rationale: Con el verbo de echar/arrojar, la dirección se expresa naturalmente con ‘fuera’. ‘Afuera’ sería posible, pero ‘fuera’ encaja mejor como complemento adverbial en este registro.
- source_word: מִן הַלִּשְׁכָּה
  english_pob_choice: from the chamber
  chosen_spanish: de la cámara
  alternatives_spanish:
  - de la habitación
  - del aposento
  - del cuarto
  lexicon: HALOT
  rationale: לשכה designa una cámara o cuarto, a menudo en el complejo del templo. ‘Cámara’ conserva esa resonancia arquitectónica y cultual mejor que opciones más genéricas o domésticas.
theological_decisions:
- issue: El sentido de la indignación de Nehemías
  english_pob_reading: it displeased me greatly
  chosen_spanish_reading: me desagradó mucho
  alternative_spanish_readings:
  - me dolió mucho
  - me indignó mucho
  - me causó gran disgusto
  rationale: El texto no especifica únicamente dolor emocional ni solo ira; presenta una reacción fuerte ante una profanación práctica. ‘Me desagradó mucho’ mantiene esa amplitud sin forzar una emoción más puntual.
  doctrine_reference: Ninguna; decisión de tono y pragmática textual.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el WLC y el audit trail inglés: conserva la construcción impersonal de וַיֵּרַע לִי מְאֹד, refleja la acción enfática de וָאַשְׁלִיכָה con una expresión natural en español, y mantiene la amplitud léxica de כְּלֵי sin reducirla indebidamente a un término demasiado técnico. No hubo revisiones posteriores en el material de referencia.'
  spanish_consistency_notes:
  - Se usa ‘Tobías’ para el nombre propio, conforme a la forma española habitual, manteniendo la referencia al mismo personaje del hebreo Tobiyyah.
  - Se eligió ‘cámara’ de manera consistente con el uso POB de ‘chamber’ para una sala del templo, evitando ‘habitación’ por su matiz demasiado doméstico.
