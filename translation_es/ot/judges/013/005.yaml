review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del hebreo: anuncio solemne, nacimiento de un hijo, prohibición del instrumento de afeitar, consagración nazarea prenatal y comienzo —no culminación— de la liberación de Israel. Sin embargo, presenta dos desajustes relevantes: 1) «concebirás» sigue la revisión inglesa auditada, pero no refleja bien הָרָה, que en el hebreo describe estado presente («estás embarazada/encinta»), y 2) «navaja» en muchas variedades de español se entiende como cuchillo plegable, no como instrumento de rasurar, lo que debilita la precisión de מוֹרָה en contexto nazareo.'
  spanish_quality_summary: El texto es legible y digno, pero «No subirá navaja sobre su cabeza» suena algo forzado y además usa un término potencialmente equívoco. «He aquí» funciona en registro bíblico, aunque la nota alternativa actual («para que lo notes») no representa bien las alternativas documentadas ni mejora claridad. Una redacción más natural y fiel en español sería «Porque he aquí, estás embarazada y darás a luz un hijo. Ninguna navaja de afeitar pasará sobre su cabeza...»
  glossary_alignment: «nazareo de Dios» está bien alineado con la decisión técnica para נְזִיר אֱלֹהִים. «salvar» y «de la mano de los filisteos» preservan correctamente las decisiones POB y la imaginería hebrea. No hay conflicto con la terminología de Yahvé/Mesías/etc. en este versículo.
  issues:
  - severity: high
    issue: «concebirás» no reproduce adecuadamente הָרָה
    rationale: El hebreo usa un adjetivo predicativo de estado presente («embarazada/encinta»), no un verbo futuro de concepción. La revisión inglesa auditada se apartó del hebreo en este punto; el español no debe seguirla mecánicamente cuando el original es claro.
  - severity: medium
    issue: «navaja» es ambiguo en español general
    rationale: En gran parte del español moderno, «navaja» sugiere cuchillo, no instrumento de rasurar. Dado el contexto nazareo, conviene explicitar «navaja de afeitar» o usar «rasuradora/afeitadora»; la primera conserva mejor la concreción histórica.
  - severity: low
    issue: La nota [a] no refleja bien la alternativa léxica pertinente
    rationale: La alternativa «para que lo notes» no corresponde a las alternativas auditadas («mira», «he ahí», etc.) y suena interpretativa. Si se mantiene nota, debe limitarse a opciones deícticas reales; también es aceptable no anotar «he aquí» en español.
  revised_spanish_text: Porque he aquí, estás embarazada y darás a luz un hijo. Ninguna navaja de afeitar pasará sobre su cabeza, porque el niño será nazareo de Dios desde el vientre, y él comenzará a salvar[a] a Israel de la mano de los filisteos.
  revised_footnotes:
