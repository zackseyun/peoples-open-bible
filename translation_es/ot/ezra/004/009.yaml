translation:
  language: es
  text: Entonces Rehum, el comandante, Shimshai el escriba, y el resto de sus asociados—los jueces[a], los oficiales[b], los tarpelitas, los persas, los erequitas, los babilonios, los hombres de Susa (es decir, los elamitas)—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los dinaitas»; el término arameo דִּינָיֵא también puede leerse como nombre étnico en traducciones tradicionales, pero aquí se entiende como un cargo administrativo en este contexto oficial.
    reason: alternative_reading
  - marker: b
    text: O «los afarsatquitas»; el término arameo אֲפַרְסַתְכָיֵא es difícil y a menudo se ha transliterado como nombre de un pueblo. Aquí se traduce «los oficiales» como una designación administrativa plausible.
    reason: alternative_reading
lexical_decisions:
- source_word: אֱדַיִן
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En seguida
  lexicon: HALOT
  rationale: Adverbio arameo de secuencia narrativa; «Entonces» conserva el avance del relato con un español natural.
- source_word: רְחוּם
  english_pob_choice: Rehum
  chosen_spanish: Rehum
  alternatives_spanish:
  - Rejún
  lexicon: HALOT
  rationale: Nombre propio transliterado.
- source_word: בְּעֵל טְעֵם
  english_pob_choice: the commander
  chosen_spanish: el comandante
  alternatives_spanish:
  - el jefe
  - el gobernador
  - el canciller
  lexicon: HALOT
  rationale: En contexto administrativo imperial, el título denota una autoridad dirigente o de mando. «Comandante» comunica ese valor sin introducir una jerarquía eclesiástica o cortesana ajena al contexto.
- source_word: שִׁמְשַׁי
  english_pob_choice: Shimshai
  chosen_spanish: Shimshai
  alternatives_spanish:
  - Simsai
  lexicon: HALOT
  rationale: Nombre propio transliterado.
- source_word: סָפְרָא
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  lexicon: HALOT
  rationale: Título administrativo que puede significar escriba/secretario; «escriba» es la equivalencia más literal y transparente en español bíblico.
- source_word: כְּנָוָתְהוֹן
  english_pob_choice: their associates
  chosen_spanish: sus asociados
  alternatives_spanish:
  - sus compañeros
  - sus colegas
  lexicon: HALOT
  rationale: Término relacional para miembros del mismo grupo; «asociados» mantiene el matiz de pertenencia/alianza y suena natural en el registro administrativo.
- source_word: דִּינָיֵא
  english_pob_choice: the judges
  chosen_spanish: los jueces
  alternatives_spanish:
  - los dinaitas
  lexicon: HALOT
  rationale: La POB inglesa optó por un oficio administrativo por el contexto; en español, «jueces» conserva esa lectura y el valor burocrático, mientras la alternativa étnica queda como posibilidad histórica implícita en la tradición.
- source_word: אֲפַרְסַתְכָיֵא
  english_pob_choice: the officials
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los afarsatquitas
  lexicon: HALOT
  rationale: Se sigue la revisión inglesa más reciente que neutraliza la idea de rango «menor». «Oficiales» es amplio y funciona bien para una denominación administrativa de sentido incierto.
- source_word: טַרְפְּלָיֵא
  english_pob_choice: the Tarpelites
  chosen_spanish: los tarpelitas
  alternatives_spanish:
  - los tarpélitas
  lexicon: HALOT
  rationale: Posible nombre de grupo étnico incierto; la transliteración es la opción más transparente.
- source_word: אֲפָרְסָיֵא
  english_pob_choice: the Persians
  chosen_spanish: los persas
  alternatives_spanish:
  - los persianos
  lexicon: HALOT
  rationale: Etnónimo claro.
- source_word: ארכוי
  english_pob_choice: the Erechites
  chosen_spanish: los erequitas
  alternatives_spanish:
  - los hombres de Ereq
  - los eréquitas
  lexicon: HALOT
  rationale: Etnónimo derivado de Erech/Uruk; «erequitas» conserva la forma de grupo y evita una paráfrasis demasiado explicativa.
- source_word: בָבְלָיֵא
  english_pob_choice: the Babylonians
  chosen_spanish: los babilonios
  alternatives_spanish:
  - los de Babilonia
  lexicon: HALOT
  rationale: Etnónimo claro y establecido.
- source_word: שׁוּשַׁנְכָיֵא
  english_pob_choice: the men of Susa
  chosen_spanish: los hombres de Susa
  alternatives_spanish:
  - los susanos
  - los susianos
  lexicon: HALOT
  rationale: La POB inglesa prefiere una forma transparente; en español, «los hombres de Susa» comunica con claridad el origen geográfico del grupo.
- source_word: דְּהוּא
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - o sea
  - esto es
  lexicon: HALOT
  rationale: Marcador explicativo natural en español para introducir la identificación appositiva.
- source_word: עֵלְמָיֵא
  english_pob_choice: the Elamites
  chosen_spanish: los elamitas
  alternatives_spanish:
  - los de Elam
  lexicon: HALOT
  rationale: Etnónimo claro que funciona como apposición explicativa de Susa.
theological_decisions:
- issue: Título administrativo ambiguo en ברעל טעם / בְּעֵל טְעֵם
  english_pob_reading: the commander
  chosen_spanish_reading: el comandante
  alternative_spanish_readings:
  - el jefe
  - el canciller
  - el gobernador
  rationale: No hay un problema doctrinal directo, pero sí una decisión de función. La traducción evita una precisión jerárquica no garantizada por el término y mantiene el papel de autoridad en el contexto persa.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que sustituyó «lesser officials» por «officials»; por eso el texto español usa «oficiales» y no introduce un matiz de rango inferior. También se mantuvo la decisión POB de leer דִּינָיֵא como «los jueces» en la línea principal, dejando la lectura étnica como alternativa en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma POB solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conservaron transliteraciones de nombres propios y etnónimos cuando el español no ofrece una equivalencia más clara.
  - El registro es administrativo y narrativo; por eso se evita una dicción eclesiástica o arcaizante.
