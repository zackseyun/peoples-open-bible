    issue: «por el desierto» añade un matiz de tránsito no explícito
    rationale: בַּמִּדְבָּר significa literalmente «en el desierto». «Por» es posible idiomáticamente, pero «en el desierto» preserva mejor la preposición fuente sin perder naturalidad.
  - severity: medium
    issue: La nota al pie está anclada en el lugar equivocado
    rationale: La marca [a] aparece tras «Egipto», pero la nota explica el singular colectivo de «amorreo/amorreos». Debe moverse al sintagma «amorreos[a]».
  - severity: low
    issue: «los hice subir» es algo rígido en español
    rationale: Aunque formalmente defendible para הֶעֱלֵיתִי, en español bíblico amplio puede sonar menos natural. No obstante, no constituye error grave y puede mantenerse si se prioriza el eco direccional del éxodo.
  revised_spanish_text: Pero yo los hice subir de la tierra de Egipto, y los guié en el desierto cuarenta años, para tomar posesión de la tierra de los amorreos[a].
