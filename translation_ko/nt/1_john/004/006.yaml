id: 1JN.4.6
reference: 1 John 4:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἡμεῖς ἐκ τοῦ θεοῦ ἐσμεν· ὁ γινώσκων τὸν θεὸν ἀκούει ἡμῶν, ὃς οὐκ ἔστιν ἐκ τοῦ θεοῦ οὐκ ἀκούει ἡμῶν. ἐκ τούτου γινώσκομεν τὸ πνεῦμα τῆς ἀληθείας καὶ τὸ πνεῦμα τῆς πλάνης.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/004/006.yaml
  text: We are from God[a]. The one who knows God listens to us; whoever is not from God does not listen to us[c][b]. By this we know the Spirit of truth and the spirit of error.
  footnotes:
  - marker: a
    text: Or 'hears us' in both occurrences; the Greek verb can denote hearing, but here likely carries the sense of receptive listening to apostolic testimony.
    reason: lexical_alternative
  - marker: b
    text: Or 'the spirit of truth.' The phrase may be read more generally, though in Johannine usage it commonly refers to the Holy Spirit.
    reason: alternative_reading
  - marker: c
    text: '''Spirit of truth'' echoes John 14:17; 15:26; 16:13.'
    reason: cross_reference
translation:
  language: ko
  text: 우리는 하나님께 속하였습니다. 하나님을 아는 자는 우리의 말을 듣고, 하나님께 속하지 않은 자는 우리의 말을 듣지 않습니다. 이로써 우리는 진리의 영과 미혹의 영을 압니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τὸ πνεῦμα τῆς ἀληθείας / τῆς πλάνης
  english_pob_choice: Spirit of truth / spirit of error
  chosen_korean: 진리의 영 / 미혹의 영
  alternatives_korean:
  - 진리의 성령 / 거짓의 영
  lexicon: BDAG
  rationale: 대조 구조를 살려 두 「영」을 평행적으로 옮긴다. πλάνη는 「방황·미혹」 — 「미혹」이 한국 교회 전통의 등가어.
