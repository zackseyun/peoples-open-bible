    reason: lexical_alternative
  - marker: b
    text: «Selah» se conserva como transliteración porque su significado o función exactos son inciertos, aunque probablemente marque una pausa musical o litúrgica.
    reason: cultural_note
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan al término y la expresión que explican, y se ajusta «negado» a «rehusado» para reflejar con más precisión el valor de מָנַעְתָּ y la decisión léxica auditada en inglés.
