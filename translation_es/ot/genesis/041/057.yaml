translation:
  language: es
  text: Y toda la tierra[a] fue a Egipto, a José, para comprar grano, porque la hambruna era severa en toda la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘toda la tierra’, ‘todo el país’ o ‘todo el mundo’. El hebreo אֶרֶץ puede significar ‘tierra’, ‘país’ o ‘territorio’; aquí probablemente se refiere de manera amplia a las tierras afectadas por la hambruna.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל הָאָרֶץ
  english_pob_choice: all the earth
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - todo el país
  - toda la región
  - todo el mundo
  lexicon: HALOT
  rationale: אָרֶץ puede significar ‘tierra’, ‘país’ o ‘territorio’. En este contexto narrativo, la frase es amplia y no conviene reducirla a una sola región. ‘Toda la tierra’ conserva la amplitud hebrea y suena natural en español bíblico actual.
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: El hebreo expresa movimiento hacia Egipto. En español, con el sujeto colectivo ‘toda la tierra’, ‘fue a Egipto’ comunica el desplazamiento de manera natural y fiel al sentido direccional.
- source_word: מִצְרַיְמָה
  english_pob_choice: to Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - a la tierra de Egipto
  lexicon: HALOT
  rationale: El sufijo direccional indica movimiento hacia Egipto. ‘A Egipto’ refleja ese valor sin volver la frase pesada.
- source_word: לִשְׁבֹּר
  english_pob_choice: to buy grain
  chosen_spanish: para comprar[a] grano
  alternatives_spanish:
  - para comprar
  - para adquirir grano
  - para comprar cereal
  lexicon: HALOT
  rationale: En contextos de hambre, שׁבר es una expresión idiomática para conseguir alimento cereal. En español, ‘comprar grano’ conserva la idea de transacción y permite el anclaje de nota para la alternativa más general ‘comprar’.
- source_word: אֶל יוֹסֵף
  english_pob_choice: to Joseph
  chosen_spanish: a José
  alternatives_spanish:
  - ante José
  - donde José
  - hacia José
  lexicon: HALOT
  rationale: Literalmente ‘a José’. Mantener la preposición simple evita sobreinterpretar la relación; el contexto ya muestra que él administraba la distribución de grano.
- source_word: חָזַק
  english_pob_choice: was severe
  chosen_spanish: era severa
  alternatives_spanish:
  - era fuerte
  - se intensificó
  - fue muy dura
  lexicon: HALOT
  rationale: El verbo literalmente es ‘ser fuerte’ o ‘hacerse fuerte’, pero aplicado al hambre, en español ‘era severa’ comunica bien la intensidad sin un calco rígido.
- source_word: הָרָעָב
  english_pob_choice: the famine
  chosen_spanish: el hambre
  alternatives_spanish:
  - la hambruna
  - el hambre extrema
  - la escasez
  lexicon: HALOT
  rationale: רָעָב puede referirse a hambre o a hambruna/famine. En este verso, el sentido es el de una escasez general y severa; ‘el hambre’ mantiene la fuerza semántica sin añadir una especificación que el español puede dejar implícita.
- source_word: בְּכָל הָאָרֶץ
  english_pob_choice: in all the earth
  chosen_spanish: en toda la tierra
  alternatives_spanish:
  - en todo el país
  - en toda la región
  - en todo el mundo
  lexicon: HALOT
  rationale: Se repite la misma amplitud de הָאָרֶץ al final del versículo. ‘En toda la tierra’ preserva la repetición retórica y la escala amplia del texto hebreo.
translation_notes:
  revision_awareness: 'La versión española sigue el sentido confirmado por el texto hebreo y coincide con el trazado auditado en inglés: movimiento hacia Egipto, compra de grano y la repetición enfática de ‘toda la tierra’. No se identificaron revisiones textuales o cambios de decisión que requieran ajuste.'
  spanish_consistency_notes:
  - Se mantiene ‘José’ para el nombre propio, conforme al uso estándar en español.
  - Se conserva la repetición de ‘toda la tierra’ al inicio y al final para reflejar el paralelismo hebreo.
  - ‘Grano’ se usa para explicitar el objeto de לִשְׁבֹּר sin cargar la frase con una paráfrasis excesiva.
