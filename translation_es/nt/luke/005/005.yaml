review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del griego: respuesta de Simón, tratamiento de autoridad para Jesús, trabajo infructuoso durante toda la noche, contraste con la obediencia, y plural de «las redes». Sin embargo, «respondiendo Simón, dijo» suena calcado y menos natural que la solución española normal «Simón respondió». Además, «hemos capturado nada» es comprensible pero menos idiomático en este contexto que «no hemos pescado nada» o «no atrapamos nada». La nota [a] también contiene formas incorrectas o inadecuadas («he trabajado» en singular y «he fatigado»).'
  spanish_quality_summary: La redacción es generalmente clara, pero necesita pulido para lograr español natural y digno. «Y respondiendo Simón, dijo» es pesado; «Entonces Simón respondió» o «Y Simón respondió» fluye mejor. «Hemos trabajado toda la noche» es aceptable, pero conviene intensificar el esfuerzo con «hemos trabajado duro» para reflejar κοπιάσαντες, en línea con el audit trail. «No hemos capturado nada» puede mejorarse a «no hemos pescado nada», más natural en el escenario pesquero. Las notas deben corregirse para español correcto y para alinear los anclajes con el contenido señalado.
  glossary_alignment: La decisión «Maestro» para Ἐπιστάτα está bien alineada con el rationale del POB y evita confundirlo con «Señor». No hay conflicto con la terminología de Yahvé/Mesías/etc. La representación de ἐπὶ τῷ ῥήματί σου como «por tu palabra» es defendible y natural en español. Se preserva correctamente el plural «las redes».
  issues:
  - severity: medium
    issue: Calco narrativo en «Y respondiendo Simón, dijo»
    rationale: Aunque refleja la forma griega, en español bíblico moderno resulta torpe. El propio audit trail inglés evita la duplicación literal participio + verbo finito. «Simón respondió» conserva el sentido con mejor legibilidad.
  - severity: medium
    issue: «No hemos capturado nada» es menos idiomático que una formulación pesquera natural
    rationale: En contexto de pesca, el español común dice «no hemos pescado nada» o «no atrapamos nada». «Capturar» suena más técnico y menos narrativo.
  - severity: high
    issue: La nota [a] contiene alternativas defectuosas
    rationale: «He trabajado» cambia indebidamente a singular, y «he fatigado» no expresa correctamente el valor de κοπιάσαντες en este contexto. La nota debe ofrecer alternativas españolas válidas como «nos hemos esforzado» o «hemos bregado»/«hemos trabajado duro».
  revised_spanish_text: 'Y Simón respondió[a]: «Maestro, hemos trabajado duro toda la noche y no hemos pescado nada; pero por tu palabra[b] echaré las redes».

