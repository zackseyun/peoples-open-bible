base_translation:
  language: en
  yaml_path: translation/ot/esther/004/005.yaml
  text: Then Esther called for Hathach[a], one of the king’s eunuchs, whom he had appointed to attend her, and commanded him concerning Mordecai, to learn what this was and why this was.
  footnotes:
  - marker: a
    text: Or 'one of the king’s court officials.' The Hebrew term can denote a eunuch specifically or, in some contexts, a royal officer more generally.
    reason: lexical_alternative
