    reason: lexical_alternative
  - marker: b
    text: O «astrólogos». El segundo término se refiere a una clase de sabios babilonios, pero su equivalente preciso en español es incierto.
    reason: alternative_reading
  revision_rationale: Se corrigen las notas para que coincidan con las alternativas y justificaciones documentadas por el POB inglés, y se ajusta 'cualquier' a 'todo' para reflejar más directamente וְכֹל sin afectar la fluidez del español.
