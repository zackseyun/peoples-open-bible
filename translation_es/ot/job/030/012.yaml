  text: עַל יָמִין֮ פִּרְחַ֪ח יָ֫ק֥וּמוּ רַגְלַ֥/י שִׁלֵּ֑חוּ וַ/יָּסֹ֥לּוּ עָ֝לַ֗/י אָרְח֥וֹת אֵידָֽ/ם־׃
base_translation:
  language: en
  yaml_path: translation/ot/job/030/012.yaml
  text: On the right a brood rises up[a]; they drive away my feet[c][b], and they build up against me their paths of disaster.
  footnotes:
  - marker: a
    text: Or 'a rabble rises up'; the Hebrew פִּרְחַח is a rare term for a contemptible or unruly group.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'they send my feet away.' The sense may be that they drive his feet off course or trip him up.
    reason: lexical_alternative
  - marker: c
    text: Or 'they cast up against me their paths of calamity/ruin.' The Hebrew keeps the road-building metaphor in a hostile sense.
    reason: lexical_alternative
