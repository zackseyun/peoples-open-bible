translation:
  language: es
  text: Porque, si somos capturados así[a], toda Judea quedará abatida[b], y nuestras cosas sagradas serán saqueadas[c], y se pedirá cuenta de su profanación[d] a costa de nuestra sangre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando seamos tomados así». El griego inicial es sintácticamente torpe, pero el sentido es que, si somos capturados en esa condición, seguirá el desastre.'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «quedará sentada»; aquí la expresión puede implicar abatimiento o quedar sin recursos. La traducción sigue el sentido idiomático.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «serán despojadas». El plural neutro puede referirse de manera amplia a objetos o bienes sagrados.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «su profanación» o «la profanación de ellas». El griego deja sin expresar el sujeto de «se pedirá cuenta», y la frase final también puede entenderse más literalmente como «de nuestra sangre».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπ' ἐν τῷ λημφθῆναι ἡμᾶς οὕτως
  english_pob_choice: For if we are captured like this
  chosen_spanish: si somos capturados así
  alternatives_spanish:
  - si somos tomados de esta manera
  - cuando seamos tomados así
  lexicon: LSJ
  rationale: La construcción griega es sintácticamente irregular, pero el infinitivo con ἡμᾶς expresa claramente nuestra captura. En español, la condición con ‘si’ comunica mejor la fuerza contextual que ‘cuando’, y ‘capturados’ mantiene el sentido militar del pasaje.
- source_word: καθήσεται
  english_pob_choice: will be brought low
  chosen_spanish: quedará abatida
  alternatives_spanish:
  - se sentará
  - será rebajada
  - caerá
  lexicon: LSJ
  rationale: Aunque el verbo significa literalmente ‘sentarse’, en contexto expresa quedar sin ánimo, abatida o humillada. ‘Quedará abatida’ conserva el matiz idiomático que la revisión inglesa ya señaló, sin volverlo un calco extraño en español.
- source_word: πᾶσα ἡ Ἰουδαία
  english_pob_choice: all Judea
  chosen_spanish: toda Judea
  alternatives_spanish:
  - toda la Judea
  - toda la región de Judea
  lexicon: LSJ
  rationale: Aquí Ἰουδαία designa la región, no al pueblo como etnónimo. ‘Toda Judea’ es breve, natural y fiel al referente geográfico.
- source_word: προνομευθήσεται
  english_pob_choice: will be plundered
  chosen_spanish: serán saqueadas
  alternatives_spanish:
  - serán despojadas
  - serán pilladas
  - serán devastadas
  lexicon: LSJ
  rationale: El pasivo futuro indica que bienes sagrados caerán en manos enemigas. ‘Saqueadas’ es un término militar y patrimonial claro en español, adecuado para ‘nuestras cosas santas’.
- source_word: τὰ ἅγια ἡμῶν
  english_pob_choice: our holy things
  chosen_spanish: nuestras cosas santas
  alternatives_spanish:
  - nuestros objetos sagrados
  - nuestro santuario
  - nuestras cosas sagradas
  lexicon: LSJ
  rationale: 'El neutro plural permite un sentido amplio: objetos, lugares o bienes cultuales. ‘Cosas santas’ conserva esa amplitud mejor que restringirlo a ‘santuario’.'
- source_word: ζητήσει
  english_pob_choice: he will require
  chosen_spanish: pedirá cuenta de
  alternatives_spanish:
  - exigirá
  - requerirá
  - pedirá
  lexicon: LSJ
  rationale: El verbo mantiene una resonancia jurídica de rendición de cuentas. ‘Pedirá cuenta de’ comunica con naturalidad en español la idea de exigir responsabilidad sin sobreinterpretar el sujeto implícito.
- source_word: τὴν βεβήλωσιν αὐτῶν
  english_pob_choice: their profanation
  chosen_spanish: su profanación
  alternatives_spanish:
  - su profanación y profanamiento
  - su desecración
  - su contaminación
  lexicon: LSJ
  rationale: βεβήλωσις nombra la profanación o violación de lo sagrado. ‘Su profanación’ corresponde bien al registro formal y preserva la tensión teológica del término.
- source_word: ἐκ τοῦ αἵματος ἡμῶν
  english_pob_choice: from our blood
  chosen_spanish: de nuestra sangre
  alternatives_spanish:
  - a costa de nuestra sangre
  - por nuestra sangre
  - desde nuestra sangre
  lexicon: LSJ
  rationale: La frase final es difícil e idiomática. ‘De nuestra sangre’ es lo más cercano al giro griego y deja abierta la relación exacta entre sangre, castigo y responsabilidad, como hace el texto fuente.
theological_decisions:
- issue: Sujeto implícito de ζητήσει
  english_pob_reading: The singular verb is left with an implied subject; English preserves the ambiguity with 'he will require.'
  chosen_spanish_reading: Se conserva un sujeto implícito en ‘pedirá cuenta de’, sin nombrar explícitamente a Dios ni a otro agente.
  alternative_spanish_readings:
  - Dios pedirá cuenta de
  - él pedirá cuenta de
  - se pedirá cuenta de
  rationale: El griego no expresa sujeto. En el contexto, la rendición de cuentas tiene una fuerte lectura divina, pero la traducción no debe resolver lo que el original deja implícito. ‘Pedirá cuenta de’ mantiene esa tensión.
  doctrine_reference: Preservar la tensión textual y la ambigüedad sintáctica del original.
- issue: Valor de καθήσεται en contexto
  english_pob_reading: The verb literally means 'will sit.' In context it likely implies dejection or helplessness, but the translation keeps the concrete image rather than paraphrasing it away.
  chosen_spanish_reading: Se opta por un equivalente idiomático que preserve la idea de abatimiento sin reducir el pasaje a una explicación interpretativa.
  alternative_spanish_readings:
  - quedará sentada
  - se sentará
  - será humillada
  rationale: En español, ‘se sentará’ sería demasiado literal y opaco; ‘quedará abatida’ transmite la imagen contextual de quedar sin fuerzas o derrumbada, respetando el sentido sin borrar el tropo.
  doctrine_reference: Mantener la fuerza retórica del texto sin forzar una paráfrasis explicativa.
translation_notes:
  revision_awareness: He seguido la revisión inglesa que prefirió el sentido idiomático de καθήσεται como abatimiento, y la lectura formal de βεβήλωσις como profanación. También he conservado la ambigüedad del sujeto implícito de ζητήσει y la dificultad sintáctica inicial, sin resolverlas de modo excesivo.
  spanish_consistency_notes:
  - Usé ‘Yahvé’ solo cuando el texto lo exigiera; aquí no aparece el nombre divino explícito.
  - Mantuve ‘Judea’ como región geográfica, no como etnónimo.
  - Elegí ‘cosas santas’ para conservar la amplitud del plural neutro griego.
  - ‘Profanación’ se mantuvo por coherencia con la revisión inglesa y con βεβήλωσις.
  - Evité ‘siervo’, ‘SEÑOR’ y otras sustituciones tradicionales no sustentadas por este pasaje.
