translation:
  language: es
  text: Por tanto[a], vivo yo —declara el Señor Yahvé—, actuaré contigo conforme a tu enojo y conforme a tus celos[b], que manifestaste por tu odio contra ellos; y me daré a conocer por medio de ellos[c] cuando te juzgue.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por esta razón».'
    reason: alternative_reading
  - marker: b
    text: El hebreo קִנְאָה puede significar «celos», «celo» o «envidia»; aquí se ha conservado «celos» por su cercanía al contexto hostil, aunque el término mantiene cierta amplitud.
    reason: lexical_alternative
  - marker: c
    text: 'O: «entre ellos». El hebreo también puede entenderse en sentido más locativo, pero aquí se prefiere «por medio de ellos» para reflejar el matiz instrumental documentado en la auditoría.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por esta razón
  - Así que
  lexicon: HALOT
  rationale: La partícula introduce una conclusión lógica del juicio anterior; «Por tanto» suena natural y conserva el valor inferencial.
- source_word: חַי אָנִי
  english_pob_choice: as I live
  chosen_spanish: vivo yo
  alternatives_spanish:
  - tan cierto como vivo yo
  - por mi vida
  lexicon: HALOT
  rationale: La fórmula es un juramento divino solemne; el orden marcado en español ayuda a preservar la fuerza enfática sin sonar forzado.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: Se conserva la fórmula profética נְאֻם como «declara» y el nombre divino יְהוִה como «Yahvé» según la terminología del proyecto; «Señor Yahvé» evita la máscara convencional y mantiene el título compuesto.
- source_word: וְעָשִׂיתִי
  english_pob_choice: I will deal with you
  chosen_spanish: actuaré contigo
  alternatives_spanish:
  - haré contigo
  - procederé contigo
  lexicon: HALOT
  rationale: עָשָׂה en contexto judicial expresa una intervención concreta; «actuaré contigo» mantiene la fuerza verbal sin imponer una idiomática demasiado interpretativa como «trataré contigo».
- source_word: כְּאַפְּךָ
  english_pob_choice: according to your anger
  chosen_spanish: conforme a tu enojo
  alternatives_spanish:
  - según tu enojo
  - de acuerdo con tu ira
  lexicon: HALOT
  rationale: כְ indica correspondencia o medida; «conforme a» preserva esa proporcionalidad. «Enojo» es una opción natural en español para אַף en este contexto de pasión hostil.
- source_word: וּכְקִנְאָתְךָ
  english_pob_choice: according to your jealousy
  chosen_spanish: y conforme a tus celos
  alternatives_spanish:
  - y conforme a tu celo
  - y conforme a tu envidia
  lexicon: HALOT
  rationale: קִנְאָה puede ser «celos», «celo» o «envidia»; aquí el contexto hostil hacia «ellos» favorece «celos» para mantener la ambigüedad entre pasión posesiva y resentimiento, sin neutralizarla.
- source_word: אֲשֶׁר עָשִׂיתָה
  english_pob_choice: which you acted out
  chosen_spanish: que hiciste
  alternatives_spanish:
  - que ejerciste
  - que mostraste
  lexicon: HALOT
  rationale: El verbo simple «hacer» permite mantener la sintaxis hebrea y deja abierta la relación entre emociones y actos; el contexto ya aclara que esas pasiones se concretaron contra ellos.
- source_word: מִשִּׂנְאָתֶיךָ
  english_pob_choice: because of your hatred
  chosen_spanish: por tu odio
  alternatives_spanish:
  - a causa de tu odio
  - desde tu odio
  lexicon: HALOT
  rationale: El מן causal se expresa naturalmente con «por» o «a causa de»; «odio» conserva la fuerza negativa directa del sustantivo.
- source_word: בָּם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - hacia ellos
  lexicon: HALOT
  rationale: El complemento personal requiere dirección hostil en español; «contra ellos» expresa con claridad la adversidad implícita.
- source_word: וְנוֹדַעְתִּי
  english_pob_choice: I will make myself known
  chosen_spanish: me daré a conocer
  alternatives_spanish:
  - seré conocido
  - me manifestaré
  lexicon: HALOT
  rationale: El nifal de ידע puede ser pasivo o reflexivo; «me daré a conocer» conserva la auto-revelación divina sin fijar de modo excesivo si el énfasis es pasivo o activo.
- source_word: בָם
  english_pob_choice: through them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - por medio de ellos
  - en medio de ellos
  lexicon: HALOT
  rationale: La revisión inglesa reciente inclinó el valor hacia lo instrumental; en español «entre ellos» mantiene la manifestación pública de Dios en su ámbito, sin exigir un mecanismo más preciso que el hebreo.
- source_word: כַּאֲשֶׁר אֶשְׁפְּטֶךָ
  english_pob_choice: when I judge you
  chosen_spanish: cuando te juzgue
  alternatives_spanish:
  - al juzgarte
  - mientras te juzgue
  lexicon: HALOT
  rationale: El valor temporal de כַאֲשֶׁר en este contexto se expresa de forma fluida con «cuando»; el futuro subjuntivo en español mantiene la referencia prospectiva.
theological_decisions:
- issue: Cómo rendir el nombre divino יְהוִה en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: El proyecto pide Yahvé para יְהוִה. En la fórmula compuesta con אֲדֹנָי, «Señor Yahvé» conserva tanto el título soberano como el nombre del pacto sin recurrir a la máscara litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: El sentido de וְנוֹדַעְתִּי בָם
  english_pob_reading: I will make myself known through them
  chosen_spanish_reading: me daré a conocer entre ellos
  alternative_spanish_readings:
  - me daré a conocer por medio de ellos
  - seré conocido entre ellos
  rationale: 'Se preserva la tensión: el hebreo puede sugerir auto-revelación divina, y el complemento admite matiz locativo o instrumental. «Entre ellos» deja abierta la manera en que el juicio de Yahvé se hace manifiesto sin sobredefinirlo.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «among them» por «through them» para reflejar un matiz instrumental. En esta versión española se optó por «entre ellos» para conservar la manifestación pública de la auto-revelación divina sin decidir de forma demasiado estrecha entre lo locativo y lo instrumental; por eso se mantiene la tensión semántica del hebreo y el cambio reciente del audit trail queda reflejado solo parcialmente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוִה conforme al estándar del proyecto.
  - Se evita «SEÑOR» como máscara tipográfica y se conserva el título compuesto «Señor Yahvé».
  - «Me daré a conocer» mantiene la voz divina de auto-revelación sin forzar una pasiva.
  - «Entre ellos» deja abierta la relación semántica del pronombre plural final.
  - Se preserva el tono judicial del pasaje con verbos como «actuaré» y «juzgue».
