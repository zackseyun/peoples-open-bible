  - marker: a
    text: 'Hebreo: «las miríadas de los millares de Israel», una expresión enfática para los vastos números de Israel.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige «dirá» a «solía decir» para reflejar el imperfecto habitual hebreo en narrativa. Se eliminan y reordenan las notas para que conserven la decisión léxica significativa documentada en el inglés: la expresión numérica final. «Y al reposar» se mantiene por ser fiel y suficientemente natural en español, y «Yahvé» respeta la convención del proyecto.'
