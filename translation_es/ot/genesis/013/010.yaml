revisions:
- from: Lot levantó sus ojos y vio toda la llanura del Jordán[a], que toda ella estaba bien regada, antes de que Yahvé destruyera Sodoma y Gomorra, como el jardín de Yahvé[b], como la tierra de Egipto, en dirección a Zoar[c].
  to: Lot levantó sus ojos y vio toda la llanura del Jordán[a], que toda ella estaba bien regada antes de que Yahvé destruyera Sodoma y Gomorra, como el jardín de Yahvé[b], como la tierra de Egipto, en dirección a Zoar[c].
  rationale: Se quitó la coma antes de 'antes de que' para mejorar el flujo sintáctico y reflejar con más naturalidad que la cláusula temporal modifica la descripción de la llanura bien regada. También se ajustó la nota c para alinearla mejor con la alternativa documentada en el expediente inglés y con una formulación más natural en español.
