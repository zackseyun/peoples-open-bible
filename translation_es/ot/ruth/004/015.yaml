base_translation:
  language: en
  yaml_path: translation/ot/ruth/004/015.yaml
  text: And he will be to you a restorer of life and a sustainer of your old age[a], for your daughter-in-law, who loves you[c][b], has borne him—she who is better to you than seven sons.
  footnotes:
  - marker: a
    text: Or 'a restorer of your life'; Hebrew 'restorer of life/soul.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your old age,' literally 'your gray hair.'
    reason: lexical_alternative
  - marker: c
    text: '''Seven sons'' uses a number that often signifies fullness or completeness; the point is that Ruth is worth more to Naomi than the idealized blessing of many sons.'
    reason: cultural_note
