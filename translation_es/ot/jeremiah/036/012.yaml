  to: 'Él bajó a la casa del rey[a], a la cámara[b] del escriba, y he aquí, todos los oficiales[c] estaban sentados allí: Elisamá el escriba, Delaía hijo de Semaías, Elnatán hijo de Acbor, Gemarías hijo de Safán, Sedequías hijo de Jananías, y todos los oficiales[c].'
