  yaml_path: translation/ot/2_chronicles/025/017.yaml
  text: Then Amaziah king of Judah took counsel and sent to Joash son of Jehoahaz[a], son of Jehu, king of Israel, saying, “Come, let us face one another.”
  footnotes:
  - marker: a
    text: Or, “let us meet face to face.” The Hebrew idiom is literally about seeing one another’s face and here likely signals a direct confrontation.
    reason: lexical_alternative
