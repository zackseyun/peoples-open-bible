id: 1CO.15.45
reference: 1 Corinthians 15:45
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὕτως καὶ γέγραπται· Ἐγένετο ὁ πρῶτος ἄνθρωπος Ἀδὰμ εἰς ψυχὴν ζῶσαν· ὁ ἔσχατος Ἀδὰμ εἰς πνεῦμα ζῳοποιοῦν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/045.yaml
  text: 'So also it is written: “The first man[a], Adam, became a living being”[b]; the last Adam became a life-giving spirit.'
  footnotes:
  - marker: a
    text: Or “a living soul,” echoing the traditional rendering of Genesis 2:7.
    reason: lexical_alternative
  - marker: b
    text: Or “became a spirit who gives life.” The phrase describes the last Adam in contrast with the first Adam; the Greek is qualitative, not necessarily an explicit identification of Christ with the Holy Spirit as a distinct person.
    reason: alternative_reading
translation:
  language: ko
  text: 이렇게 기록되었습니다. 「첫 사람 아담은 살아 있는 혼이 되었다.」 마지막 아담은 살리는 영이 되셨습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 창세기 2:7의 인용.
    reason: cross_reference
  - marker: b
    text: 「마지막 아담은 살리는 영이 되셨다」는 메시아를 첫 아담과 대조하는 표현이다. 본 절은 메시아와 성령을 단순 동일시하는 진술이 아니라, 메시아께서 「생명을 주시는 영적 실체」가 되셨음을 가리킨다.
    reason: alternative_reading
lexical_decisions:
- source_word: ψυχὴν ζῶσαν
  english_pob_choice: a living being
  chosen_korean: 살아 있는 혼
  alternatives_korean:
  - 살아 있는 존재
  - 생령
  lexicon: BDAG
  rationale: 창 2:7 LXX의 직역 「살아 있는 혼」(נפש חיה)을 살린다. 「존재」로 옮기면 15:44~46의 ψυχή/πνεῦμα 대조가 흐려진다.
- source_word: ἔσχατος Ἀδὰμ
  english_pob_choice: the last Adam
  chosen_korean: 마지막 아담
  alternatives_korean:
  - 최후의 아담
  lexicon: BDAG
  rationale: 글로사리 기본값.
- source_word: πνεῦμα ζῳοποιοῦν
  english_pob_choice: a life-giving spirit
  chosen_korean: 살리는 영
  alternatives_korean:
  - 생명을 주는 영
  lexicon: BDAG
  rationale: ζῳοποιέω의 능동분사 「생명을 부여하는」의 함의를 「살리는」으로 옮긴다.
