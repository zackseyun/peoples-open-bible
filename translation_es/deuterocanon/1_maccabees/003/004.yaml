translation:
  language: es
  text: Y fue semejante a un león en sus hechos, y como un cachorro de león[a] rugiendo en busca de presa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un leoncillo rugiendo en busca de presa».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡμοιώθη
  english_pob_choice: was like
  chosen_spanish: fue semejante a
  alternatives_spanish:
  - era como
  - fue como
  - fue comparado con
  lexicon: LSJ
  rationale: El aoristo pasivo expresa comparación, no transformación. «Fue semejante a» conserva el valor comparativo con un registro natural en español y evita un calco rígido.
- source_word: Λέοντι
  english_pob_choice: a lion
  chosen_spanish: un león
  alternatives_spanish:
  - león
  lexicon: LSJ
  rationale: El dativo tras la comparación se vierte naturalmente con «un león» en español para mantener la similitúd idiomática.
- source_word: ἐν τοῖς ἔργοις αὐτοῦ
  english_pob_choice: in his deeds
  chosen_spanish: en sus hechos
  alternatives_spanish:
  - en sus obras
  - en sus acciones
  lexicon: LSJ
  rationale: ἔργα aquí remite a sus acciones realizadas, especialmente hazañas militares. «Hechos» reproduce bien ese matiz heroico y evita la posible ambigüedad de «obras».
- source_word: σκύμνος
  english_pob_choice: lion’s cub
  chosen_spanish: cachorro de león
  alternatives_spanish:
  - leoncillo
  - joven león
  - whelp
  lexicon: LSJ
  rationale: El término designa un león joven. «Cachorro de león» es claro, natural y mantiene la distinción con el «león» del primer miembro.
- source_word: ἐρυγόμενος
  english_pob_choice: roaring
  chosen_spanish: rugiendo
  alternatives_spanish:
  - bramando
  - rugiente
  lexicon: LSJ
  rationale: El participio describe el sonido del depredador al lanzarse sobre la presa. «Rugiendo» es el equivalente más vívido y normal para la imaginería leonina.
- source_word: εἰς θήραν
  english_pob_choice: for prey
  chosen_spanish: en busca de presa
  alternatives_spanish:
  - para la presa
  - para cazar presa
  - en pos de presa
  lexicon: LSJ
  rationale: La expresión señala la dirección o finalidad predatoria. «En busca de presa» expresa bien esa orientación en español sin restringir indebidamente el matiz del griego.
translation_notes:
  revision_awareness: 'El contexto griego y el audit trail inglés coinciden en una imagen doble: león en sus acciones y cachorro de león rugiendo con intención predatoria. No se requirieron revisiones sustanciales; se conservó la tensión entre «león» y «cachorro de león» con una nota alternativa breve.'
  spanish_consistency_notes:
  - Se evitó «Cristo», «SEÑOR» y otras terminologías no presentes en este versículo.
  - «Hechos» se usa en sentido de hazañas/acciones, no como traducción litúrgica fija.
  - 'La nota conserva la alternativa semántica de edad: «cachorro de león» vs. «leoncillo».'
