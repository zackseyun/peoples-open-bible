translation:
  language: es
  text: el que da lluvia sobre la faz de la tierra[a] y envía agua sobre la faz de los campos[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la faz del país» o «sobre la tierra». Hebreo אֶרֶץ puede significar «tierra» o «país/territorio», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «sobre la faz de las calles» o «sobre la faz de los lugares abiertos». Hebreo חוּצוֹת puede referirse a espacios abiertos, calles o amplias áreas exteriores; aquí el contexto favorece «campos».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנֹּתֵן
  english_pob_choice: who gives
  chosen_spanish: el que da
  alternatives_spanish:
  - el que da
  - quien da
  - el dador de
  lexicon: HALOT
  rationale: El participio con artículo funciona como una cláusula relativa sustantivada. «El que da» conserva esa fuerza relacional en español y mantiene el tono sobrio del texto.
- source_word: מָטָר
  english_pob_choice: rain
  chosen_spanish: lluvia
  alternatives_spanish:
  - rain
  - aguacero
  - precipitación
  lexicon: HALOT
  rationale: «Lluvia» es el equivalente natural y preciso en español para מָטָר, sin añadir intensidad que el hebreo no exige.
- source_word: עַל־פְּנֵי אָרֶץ
  english_pob_choice: on the face of the earth
  chosen_spanish: sobre la faz de la tierra
  alternatives_spanish:
  - sobre la tierra
  - sobre la superficie de la tierra
  - sobre la faz del país
  lexicon: HALOT
  rationale: «Faz» preserva la imagen literal de פְּנֵי y ayuda a reflejar el paralelismo con la segunda mitad del versículo. Se eligió «tierra» porque el contexto es general y cósmico, no territorial.
- source_word: וְשֹׁלֵחַ
  english_pob_choice: and sends
  chosen_spanish: y envía
  alternatives_spanish:
  - y manda
  - y despacha
  - y envía
  lexicon: HALOT
  rationale: «Y envía» reproduce bien el paralelismo verbal con «da» y es natural en español para un acto providencial.
- source_word: מַיִם
  english_pob_choice: water
  chosen_spanish: agua
  alternatives_spanish:
  - agua
  - aguas
  lexicon: HALOT
  rationale: Aunque el hebreo es plural morfológico, en español funciona mejor el singular colectivo «agua», como masa no contable.
- source_word: עַל־פְּנֵי חוּצוֹת
  english_pob_choice: on the face of the fields
  chosen_spanish: sobre la faz de los campos
  alternatives_spanish:
  - sobre la faz de las calles
  - sobre la faz de los lugares abiertos
  - sobre el campo
  lexicon: HALOT
  rationale: חוּצוֹת puede referirse a espacios abiertos fuera de áreas pobladas, y la revisión inglesa favorece «fields» por ser más natural y ajustado al contexto agrícola/natural. En español, «campos» comunica bien ese ámbito abierto sin forzar un sentido urbano de «calles».
theological_decisions:
- issue: Alcance de אָרֶץ
  english_pob_reading: earth
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - suelo
  - país
  - land
  rationale: La línea habla de la provisión universal de Dios sobre la creación; «tierra» comunica mejor ese alcance general que una lectura territorial restringida.
  doctrine_reference: Providencia divina en la creación
- issue: Sentido de חוּצוֹת
  english_pob_reading: fields
  chosen_spanish_reading: campos
  alternative_spanish_readings:
  - calles
  - lugares abiertos
  - caminos
  rationale: La evidencia contextual favorece un ámbito rural/abierto más que urbano. «Campos» mantiene la imagen amplia de exterioridad y armoniza con la lluvia sobre la tierra.
  doctrine_reference: Lectura contextual del léxico hebreo
- issue: Imagen de פְּנֵי
  english_pob_reading: face of
  chosen_spanish_reading: faz de
  alternative_spanish_readings:
  - superficie de
  - sobre
  - en
  rationale: Se conserva la imagen semítica de «faz» para reflejar el paralelismo del hebreo y no borrar la metáfora espacial que el texto repite.
  doctrine_reference: Poética hebrea y paralelismo
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés: la revisión más reciente cambió la solución de חוּצוֹת desde una equivalencia más interpretativa hacia una opción más natural y lexicalmente ajustada. Por eso el español adopta «campos» en lugar de una paráfrasis más amplia, manteniendo al mismo tiempo la repetición formal de «sobre la faz de» para conservar el paralelismo hebreo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del texto porque este versículo es una cláusula relativa que continúa la descripción divina iniciada en el contexto inmediato, y el presente encargo solo pide la línea correspondiente.
  - Se preservó la metáfora de «faz» porque el hebreo repite פְּנֵי en ambos miembros y el español puede reflejarla sin resultar oscuro.
  - Se evitó «aguas» como plural estilístico porque el hebreo מַיִם suele funcionar como sustantivo colectivo en español bíblico moderno.
