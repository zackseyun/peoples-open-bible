translation:
  language: es
  text: Entonces, por la mañana, tan pronto como salga el sol, te levantarás temprano y te desplegarás contra la ciudad. Y mira, cuando él y la gente que está con él salgan a tu encuentro, harás con él como tu mano halle[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebraísmo: «como tu mano halle», es decir, conforme a lo que esté dentro de tu poder o de tu oportunidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y sucederá
  - Y será
  lexicon: HALOT
  rationale: Funciona como avance discursivo e introduce la instrucción siguiente; 'Entonces' conserva esa secuencia sin sonar forzado en español.
- source_word: בַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: en la mañana
  alternatives_spanish:
  - por la mañana
  - en la mañana temprano
  lexicon: HALOT
  rationale: Expresión temporal natural y clara en español; mantiene el valor temporal básico.
- source_word: כִּזְרֹחַ הַשֶּׁמֶשׁ
  english_pob_choice: as soon as the sun rises
  chosen_spanish: tan pronto como salga el sol
  alternatives_spanish:
  - cuando salga el sol
  - al salir el sol
  lexicon: HALOT
  rationale: El infinitivo constructo con כ marca tiempo inmediato; 'tan pronto como' refleja bien la prontitud del mandato militar.
- source_word: תַּשְׁכִּים
  english_pob_choice: you must get up early
  chosen_spanish: te levantarás temprano
  alternatives_spanish:
  - debes levantarte temprano
  - te alzarás temprano
  lexicon: HALOT
  rationale: El hiphil de שכם expresa levantarse temprano o comenzar temprano; en español, el futuro con valor exhortativo conserva el carácter directivo sin sobrecargar el estilo.
- source_word: וּפָשַׁטְתָּ עַל הָעִיר
  english_pob_choice: and spread out against the city
  chosen_spanish: y te desplegarás contra la ciudad
  alternatives_spanish:
  - y te extenderás contra la ciudad
  - y atacarás la ciudad
  - y te lanzarás contra la ciudad
  lexicon: HALOT
  rationale: פשט en contexto militar puede significar desplegarse, extenderse en ataque o hacer incursión. 'Desplegarás' preserva la imagen táctica del avance sin especificar más de lo que dice el hebreo.
- source_word: וְהִנֵּה
  english_pob_choice: And look
  chosen_spanish: Y mira
  alternatives_spanish:
  - Y he aquí
  - Y mira bien
  lexicon: HALOT
  rationale: Marca deíctica que llama la atención sobre el siguiente evento; 'Y mira' es natural y conserva la función discursiva.
- source_word: הוּא וְהָעָם אֲשֶׁר אִתּוֹ
  english_pob_choice: he and the people who are with him
  chosen_spanish: él y la gente que está con él
  alternatives_spanish:
  - él y el pueblo que está con él
  - él y la gente que va con él
  lexicon: HALOT
  rationale: '''עָם'' puede ser ''gente'', ''pueblo'' o ''hombres''. ''Gente'' es amplio y seguro; evita estrechar indebidamente el alcance del término.'
- source_word: יֹצְאִים אֵלֶיךָ
  english_pob_choice: come out to you
  chosen_spanish: salgan hacia ti
  alternatives_spanish:
  - salgan a ti
  - salgan contra ti
  lexicon: HALOT
  rationale: '''אֵלֶיךָ'' significa ''hacia ti'' / ''a ti''; se mantiene esa dirección sin intensificarla a ''contra ti'', aunque el contexto sea hostil.'
- source_word: וְעָשִׂיתָ לּוֹ
  english_pob_choice: you shall do to him
  chosen_spanish: le harás
  alternatives_spanish:
  - harás con él
  - harás para él
  lexicon: HALOT
  rationale: El sufijo singular se refiere primariamente al líder; en español, 'le harás' conserva la brevedad del hebreo y evita añadir un complemento no expresado.
- source_word: כַּאֲשֶׁר תִּמְצָא יָדֶךָ
  english_pob_choice: as your hand finds
  chosen_spanish: según lo que tu mano encuentre
  alternatives_spanish:
  - como encuentre tu mano
  - de acuerdo con lo que tu mano pueda
  lexicon: HALOT
  rationale: Se mantiene el idiomatismo hebreo para transparencia auditiva. En español, 'según lo que tu mano encuentre' preserva la metáfora y sugiere capacidad u अवसर sin explicitarla en el texto principal.
theological_decisions:
- issue: Tensión entre literalidad idiomática y sentido de capacidad/oportunidad en 'כַּאֲשֶׁר תִּמְצָא יָדֶךָ'
  english_pob_reading: The main text keeps the Hebrew idiom 'as your hand finds'; the English footnote explains that it means according to what is within your power or opportunity.
  chosen_spanish_reading: le harás según lo que tu mano encuentre[a]
  alternative_spanish_readings:
  - le harás conforme a lo que puedas
  - le harás como tu mano alcance
  - harás con él según la oportunidad
  rationale: La frase mantiene la literalidad del hebreo en el texto principal, y la nota aclara el sentido idiomático de poder u अवसर. Así se conserva la tensión semántica que el POB inglés decidió no resolver por completo en la línea principal.
  doctrine_reference: No aplica; decisión lexical/idiomática, no doctrinal.
translation_notes:
  revision_awareness: El contexto inglés fue revisado desde 'come out against you' a 'come out to you' para ajustarse más de cerca a אֵלֶיךָ; la traducción española sigue esa revisión con 'salgan hacia ti'. También se preservó la nota idiomática final, ahora anclada correctamente en el texto español.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en lugar de 'SEÑOR' cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se mantiene un estilo formal y publicable, con futuro exhortativo donde el hebreo presenta una instrucción militar.
  - '''Gente'' traduce עָם con amplitud semántica sin forzar ''hombres'' o ''tropas''.'
  - Se conserva el idiomatismo de la última cola verbal para respetar la transparencia de la POB.
