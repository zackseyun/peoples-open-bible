translation:
  language: es
  text: Pues, aunque por ahora logre escapar del castigo de los hombres[a], no escaparé[b] ni vivo ni muerto de las manos del Todopoderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «el castigo infligido por los hombres».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, no puedo escapar del juicio divino ni en vida ni por medio de la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ γὰρ καὶ
  english_pob_choice: For even if
  chosen_spanish: Pues aun si
  alternatives_spanish:
  - Porque aun si
  - Pues si incluso
  lexicon: LSJ
  rationale: «γάρ» aporta la conexión explicativa y «εἰ...καί» introduce una concesión; «Pues aun si» conserva ambas fuerzas en un español natural y sobrio.
- source_word: ἐπὶ τοῦ παρόντος
  english_pob_choice: for the present
  chosen_spanish: por ahora
  alternatives_spanish:
  - por el momento
  - para el presente
  lexicon: LSJ
  rationale: La frase marca una limitación temporal; «por ahora» comunica bien esa restricción sin perder el matiz de temporalidad inmediata.
- source_word: ἐξελοῦμαι
  english_pob_choice: I escape
  chosen_spanish: me librara
  alternatives_spanish:
  - escapara
  - me salvara
  lexicon: LSJ
  rationale: El medio aquí expresa salir de una pena o quedar libre de ella; «me librara» captura mejor en español la idea de zafarse del castigo, sin reducirlo a una mera huida física.
- source_word: τὴν ἐξ ἀνθρώπων τιμωρίαν
  english_pob_choice: the punishment from men
  chosen_spanish: el castigo de los hombres
  alternatives_spanish:
  - el castigo infligido por los hombres
  - el castigo humano
  lexicon: LSJ
  rationale: «ἐξ ἀνθρώπων» presenta el origen humano del castigo; «de los hombres» mantiene ese contraste con la siguiente cláusula sobre el Todopoderoso.
- source_word: τὰς τοῦ παντοκράτορος χεῖρας
  english_pob_choice: the hands of the Almighty
  chosen_spanish: las manos del Todopoderoso
  alternatives_spanish:
  - las manos del Omnipotente
  - las manos del Dios Todopoderoso
  lexicon: LSJ
  rationale: «Todopoderoso» es la equivalencia más clara y reverente de παντοκράτωρ en español; se conserva literalmente «manos» para mantener la imagen de poder ineludible.
- source_word: οὔτε ζῶν οὔτε ἀποθανών
  english_pob_choice: neither alive nor dead
  chosen_spanish: ni vivo ni muerto
  alternatives_spanish:
  - ni estando vivo ni muerto
  - ni vivo ni después de muerto
  lexicon: LSJ
  rationale: La polaridad griega se reproduce de forma directa con «ni vivo ni muerto», que suena natural y mantiene el paralelismo contundente.
- source_word: ἐκφεύξομαι
  english_pob_choice: I will escape neither alive nor dead from
  chosen_spanish: no escaparé
  alternatives_spanish:
  - no me libraré
  - no huiré
  lexicon: LSJ
  rationale: El futuro medio/futuro de escape se expresa con una negación enfática en español; el complemento final «de las manos del Todopoderoso» hace explícito el alcance de la huida imposible.
theological_decisions:
- issue: Título divino παντοκράτωρ
  english_pob_reading: the Almighty
  chosen_spanish_reading: el Todopoderoso
  alternative_spanish_readings:
  - el Omnipotente
  - el Dios Todopoderoso
  rationale: Se preserva el título de soberanía divina sin añadir «Dios», porque el griego nombra el atributo/título y no lo explicita aquí; «Todopoderoso» es idiomático y teológicamente fuerte en español.
  doctrine_reference: Original-language primacy; preserve divine-title force without unnecessary expansion.
- issue: Alcance de la afirmación sobre juicio divino más allá de la muerte
  english_pob_reading: neither alive nor dead
  chosen_spanish_reading: ni vivo ni muerto
  alternative_spanish_readings:
  - ni estando vivo ni después de muerto
  - sea vivo o muerto
  rationale: 'La frase se mantiene en su tensión: la muerte no libera del alcance de Dios. No se explicita una doctrina más amplia sobre el estado postmortem; se conserva solo lo que el texto afirma.'
  doctrine_reference: Preserve theological tension rather than resolving it beyond the verse.
translation_notes:
  revision_awareness: Se siguió el pasaje base griego de 2 Maccabees 6:26 y el expediente de auditoría en inglés, manteniendo la concesión inicial, el contraste entre castigo humano y manos del Todopoderoso, y la tensión teológica de que ni la vida ni la muerte ofrecen escape. No se detectaron revisiones adicionales en el historial reciente; la formulación se alineó con la lectura de alta concordancia.
  spanish_consistency_notes:
  - Se usa «Todopoderoso» para παντοκράτωρ, coherente con el valor del título en el griego y con el estilo bíblico español contemporáneo.
  - «Castigo» conserva la fuerza penal de τιμωρία; se evita suavizarlo a «corrección» o «pena» sin base textual.
  - La estructura concesiva «Pues aun si...» refleja el enlace lógico de γάρ sin sonar forzada.
  - Se mantuvo la imagen corporal de «manos» para conservar la concreción bíblica del acceso o la imposibilidad de escape.
