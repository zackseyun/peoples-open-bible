  glossary_alignment: 'No hay términos del glosario principal en juego (Yahvé, Mesías, etc.). Las decisiones léxicas principales están alineadas con el proyecto: ''gozo'', ''camino'', ''polvo'', ''brotarán''. La única desalineación real está en la nota [a], que debe reflejar la alternativa documentada sobre הוּא (''él es / él'') y no una simple variante estilística para הֶן.'
