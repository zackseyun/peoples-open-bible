translation:
  language: es
  text: Pero las manos de Moisés estaban pesadas[a]; entonces tomaron una piedra y la pusieron debajo de él, y él se sentó sobre ella. Y Aarón y Hur sostuvieron sus manos, uno de este lado y otro de aquel lado, de modo que sus manos permanecieron firmes[b] hasta que se puso el sol.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cansadas' o 'agotadas'; el hebreo dice literalmente 'pesadas'.
    reason: lexical_alternative
  - marker: b
    text: O 'estables' o 'constantes'; el hebreo también puede expresar 'firmeza' o 'constancia', aunque aquí se refiere a la estabilidad física de las manos de Moisés.
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידֵי
  english_pob_choice: hands
  chosen_spanish: manos
  alternatives_spanish:
  - brazos
  lexicon: HALOT
  rationale: La referencia hebrea es al plural de יָד, y 'manos' conserva la imagen concreta y la repetición del versículo mejor que 'brazos'.
- source_word: כְּבֵדִים
  english_pob_choice: were heavy
  chosen_spanish: estaban pesadas
  alternatives_spanish:
  - estaban cansadas
  - se volvieron pesadas
  lexicon: HALOT
  rationale: '''Pesadas'' sigue de cerca el sentido literal de ''pesadas'' y mantiene la imagen corporal sin interpretar de más como fatiga, aunque esa sea una implicación posible en el contexto.'
- source_word: וַיִּקְחוּ
  english_pob_choice: they took
  chosen_spanish: tomaron
  alternatives_spanish:
  - agarraron
  - levantaron
  lexicon: HALOT
  rationale: El plural no especifica sujetos en el hebreo; 'tomaron' reproduce la acción de manera natural en español.
- source_word: אֶבֶן
  english_pob_choice: a stone
  chosen_spanish: una piedra
  alternatives_spanish:
  - una roca
  lexicon: HALOT
  rationale: '''Piedra'' es el equivalente común y preciso para אֶבֶן en este contexto de apoyo para sentarse.'
- source_word: תַחְתָּיו
  english_pob_choice: under him
  chosen_spanish: debajo de él
  alternatives_spanish:
  - bajo él
  lexicon: HALOT
  rationale: '''Debajo de él'' expresa con claridad la colocación inferior de la piedra antes de que el texto diga que se sentó sobre ella.'
- source_word: וַיֵּשֶׁב עָלֶיהָ
  english_pob_choice: and he sat on it
  chosen_spanish: y él se sentó sobre ella
  alternatives_spanish:
  - y se sentó en ella
  - y se sentó encima de ella
  lexicon: HALOT
  rationale: '''Sobre ella'' mantiene la referencia directa a la piedra como apoyo y conserva la secuencia narrativa del hebreo.'
- source_word: תָּמְכוּ
  english_pob_choice: supported
  chosen_spanish: sostenían
  alternatives_spanish:
  - apoyaban
  - sustentaban
  lexicon: HALOT
  rationale: '''Sostenían'' comunica el sostén físico continuo que el verbo implica y encaja con la escena de apoyo manual.'
- source_word: בְיָדָיו
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus brazos
  lexicon: HALOT
  rationale: Se mantiene la misma imagen corporal del hebreo y la consistencia con la primera mitad del versículo.
- source_word: מִזֶּה אֶחָד וּמִזֶּה אֶחָד
  english_pob_choice: one on this side and one on that side
  chosen_spanish: uno de un lado y otro del otro
  alternatives_spanish:
  - uno de este lado y otro del otro lado
  - uno a cada lado
  lexicon: HALOT
  rationale: La frase distributiva se expresa de manera clara y simétrica en español, preservando la colocación de Aarón y Hur a ambos lados.
- source_word: וַיְהִי יָדָיו אֱמוּנָה
  english_pob_choice: so his hands remained steady
  chosen_spanish: de modo que sus manos permanecían firmes
  alternatives_spanish:
  - de modo que sus manos permanecían estables
  - de modo que sus manos quedaban firmes
  - de modo que sus manos eran fieles
  lexicon: HALOT
  rationale: אֱמוּנָה puede aludir a firmeza/estabilidad y también a fidelidad; en esta escena física, 'firmes' preserva la tensión semántica sin imponer la lectura moral de 'fieles'.
- source_word: עַד בֹּא הַשָּׁמֶשׁ
  english_pob_choice: until the sun set
  chosen_spanish: hasta que se puso el sol
  alternatives_spanish:
  - hasta la puesta del sol
  - hasta el ocaso
  lexicon: HALOT
  rationale: '''Se puso el sol'' es una forma natural y digna en español para el punto temporal final del hebreo.'
theological_decisions:
- issue: Valor de אֱמוּנָה aplicado a las manos de Moisés
  english_pob_reading: physical steadiness/firmness rather than moral 'faithfulness'
  chosen_spanish_reading: firmeza física, no fidelidad moral en primer plano
  alternative_spanish_readings:
  - fieles
  - estables
  - firmes
  rationale: El contexto inmediato es la fatiga de Moisés y el apoyo físico de Aarón y Hur. 'Firmes' mantiene abierta la gama semántica del hebreo sin convertir el término en una afirmación ética que el pasaje no exige.
  doctrine_reference: Preservar la tensión léxica del original sin resolverla excesivamente; primacía del hebreo sobre la tradición traductora.
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del expediente inglés y conserva su decisión revisada de cerrar con una forma más formal y natural: ''se puso el sol''. También mantiene la distinción semántica de אֱמוּנָה como firmeza física en este contexto, sin borrar la posible resonancia de fidelidad.'
  spanish_consistency_notes:
  - Se mantiene 'Moisés', 'Aarón' y 'Hur' conforme al estándar del proyecto.
  - Se usa 'manos' de manera consistente para יָד en todo el versículo.
  - '''Pesadas'' y ''firmes'' conservan la literalidad básica del hebreo y la tensión semántica documentada.'
  - La traducción evita el reemplazo por lenguaje eclesiástico tradicional no respaldado por el texto fuente.
