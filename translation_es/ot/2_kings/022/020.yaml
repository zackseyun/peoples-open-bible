translation:
  language: es
  text: Por tanto, mira, yo te reuniré con tus padres, y serás reunido en tus sepulcros en paz[a], y tus ojos no verán toda la calamidad que yo traigo sobre este lugar.” Y llevaron la noticia al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pacíficamente'. El hebreo dice 'en paz', lo cual puede significar que Josías moriría antes de ver el juicio venidero, más que especificar el modo exacto de su muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por esta razón
  lexicon: HALOT
  rationale: Conserva la fuerza inferencial de conclusión a partir del contexto previo, con un español natural y solemne para discurso profético.
- source_word: הִנְנִי
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - he aquí, yo
  lexicon: HALOT
  rationale: Busca reproducir el deíctico enfático del anuncio divino sin sonar forzado. 'Mira' comunica la solemnidad y la presentación inmediata de la sentencia.
- source_word: אֹסִפְךָ / נֶאֱסַפְתָּ
  english_pob_choice: I will gather you ... you shall be gathered
  chosen_spanish: te reuniré ... serás reunido
  alternatives_spanish:
  - te juntaré ... serás juntado
  - te recogeré ... serás recogido
  lexicon: HALOT
  rationale: Se preserva el campo léxico de אסף mediante 'reunir', manteniendo en español la imagen de ser unido a los padres/antepasados y el paralelismo verbal del hebreo.
- source_word: עַל אֲבֹתֶיךָ
  english_pob_choice: to your fathers
  chosen_spanish: con tus padres
  alternatives_spanish:
  - a tus padres
  - con tus antepasados
  lexicon: HALOT
  rationale: En este contexto funerario/relacional, 'con' expresa mejor la idea de ser incorporado al grupo de los que ya murieron. Se conserva la idiomática filial del hebreo sin sobreexplicar.
- source_word: קִבְרֹתֶיךָ
  english_pob_choice: your graves
  chosen_spanish: tus sepulcros
  alternatives_spanish:
  - tus tumbas
  - tus sepulturas
  lexicon: HALOT
  rationale: Se elige 'sepulcros' por su dignidad literaria y porque puede abarcar el plural hebreo sin sonar extrañamente material. Mantiene la referencia a lugares de entierro.
- source_word: בְּשָׁלוֹם
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  lexicon: HALOT
  rationale: Conserva el sustantivo 'paz', como en el hebreo, para no resolver la tensión interpretativa sobre la manera exacta de la muerte. 'En paz' sigue siendo literal y natural.
- source_word: וְלֹא תִרְאֶינָה עֵינֶיךָ
  english_pob_choice: your eyes shall not see
  chosen_spanish: tus ojos no verán
  alternatives_spanish:
  - no verás tú
  - no llegarán a ver tus ojos
  lexicon: HALOT
  rationale: Se mantiene la imagen corporal del hebreo, que enfatiza la experiencia personal de no presenciar el desastre venidero.
- source_word: הָרָעָה
  english_pob_choice: the disaster
  chosen_spanish: la calamidad
  alternatives_spanish:
  - el mal
  - la desgracia
  - el desastre
  lexicon: HALOT
  rationale: En este contexto de juicio, רָעָה apunta a calamidad/juicio inminente más que a mal moral. 'Calamidad' comunica esa carga sin perder solemnidad.
- source_word: מֵבִיא עַל
  english_pob_choice: I am bringing on
  chosen_spanish: traigo sobre
  alternatives_spanish:
  - estoy trayendo sobre
  - voy a traer sobre
  lexicon: HALOT
  rationale: El participio hebreo expresa acción inminente; en español, el presente de acción profética 'traigo sobre' suena natural y conserva la inmediatez.
- source_word: הַמָּקוֹם הַזֶּה
  english_pob_choice: this place
  chosen_spanish: este lugar
  alternatives_spanish:
  - este sitio
  - este lugar mismo
  lexicon: HALOT
  rationale: Expresión directa y amplia, adecuada para el alcance del juicio en el contexto narrativo y profético.
- source_word: וַיָּשִׁיבוּ אֶת־הַמֶּלֶךְ דָּבָר
  english_pob_choice: And they brought back word to the king
  chosen_spanish: ellos llevaron la respuesta al rey
  alternatives_spanish:
  - y dieron al rey la respuesta
  - y volvieron con la respuesta al rey
  lexicon: HALOT
  rationale: La fórmula hebrea de reporte se vierte de modo natural en español. 'Llevaron la respuesta' conserva la idea de regresar con un mensaje sin sonar arcaico.
theological_decisions:
- issue: Tensión entre 'en paz' y la muerte posterior de Josías en 2 Reyes 23:29
  english_pob_reading: Render literally as 'in peace' without harmonizing away the tension.
  chosen_spanish_reading: Traducir literalmente 'en paz' y no explicar dentro del verso una resolución del aparente conflicto.
  alternative_spanish_readings:
  - '''pacíficamente'' como descripción del modo de morir'
  - '''antes de ver la calamidad'' como paráfrasis interpretativa'
  rationale: El hebreo dice 'en paz', y la traducción debe conservar esa formulación. El contexto inmediato ya aclara que Josías no vería la calamidad que viene sobre el lugar; no conviene aplanar la tensión histórica o teológica con una explicación añadida en el cuerpo del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del POB en inglés: se mantiene ''I will gather'' como futuro, se conserva ''in peace'' sin armonización, y se respeta la fórmula final de informe al rey. La traducción española procura equivalencia formal con fluidez natural, sin resolver la tensión interpretativa documentada.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; en este versículo no aparece el Tetragrámaton.
  - '''Reunir'' se usa para אסף con el fin de conservar el paralelismo verbal entre la acción divina y la pasiva sobre Josías.'
  - '''Calamidad'' refleja el sentido de juicio inminente de הָרָעָה; no se traduce como ''mal'' para evitar ambigüedad moral.'
  - Se mantiene la imagen de los 'ojos' para conservar el énfasis hebreo sobre la experiencia de ver o no ver el desastre.
