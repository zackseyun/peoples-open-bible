  lexicon: BDAG
  rationale: 바울의 논증이 단수 「씨」의 문법적 형태에 기대므로, 「씨」를 그대로 보존한다. 「후손」은 단·복수의 구분이 약하다.
theological_decisions:
- issue: σπέρμα를 「씨」로 보존
  chosen_reading: 씨 (단수 집합명사 그대로)
  alternative_readings:
