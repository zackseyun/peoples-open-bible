translation:
  language: es
  text: Y vi que la casa tenía una altura por todo alrededor; los cimientos de las cámaras laterales eran de una caña completa de seis codos, hasta la unión[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta el lugar de unión», «hasta la juntura», «hasta el saliente» o posiblemente «en la base». El término hebreo aquí es arquitectónicamente oscuro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָאִיתִי
  english_pob_choice: And I saw
  chosen_spanish: Y vi
  alternatives_spanish:
  - Entonces vi
  - Y miré
  lexicon: HALOT
  rationale: La forma narrativa primera persona de ראה se rinde de manera directa con «vi». Mantiene el reporte profético sin añadir matices interpretativos.
- source_word: לַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - el edificio del templo
  lexicon: HALOT
  rationale: «Casa» reproduce el equivalente léxico básico de בַּיִת y conserva el modo de hablar propio de Ezequiel sobre la estructura del templo.
- source_word: גֹּבַהּ
  english_pob_choice: height
  chosen_spanish: altura
  alternatives_spanish:
  - elevación
  - altura elevada
  lexicon: HALOT
  rationale: El sustantivo expresa altura/elevación de forma bastante directa. En español, «altura» es la opción más clara y menos interpretativa, evitando convertir el dato arquitectónico en una imagen más específica de la que el hebreo asegura.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: todo alrededor
  alternatives_spanish:
  - alrededor
  - por todos lados
  lexicon: HALOT
  rationale: La repetición intensifica la idea de circunferencia o encierro. «Todo alrededor» transmite bien ese valor enfático en español actual.
- source_word: מיסדות
  english_pob_choice: the foundations
  chosen_spanish: los cimientos
  alternatives_spanish:
  - las bases
  - los fundamentos
  lexicon: HALOT
  rationale: En contexto arquitectónico, מיסדות se entiende naturalmente como los elementos de base. «Cimientos» es transparente y fiel al campo semántico.
- source_word: הַ/צְּלָעוֹת
  english_pob_choice: the side chambers
  chosen_spanish: las cámaras laterales
  alternatives_spanish:
  - los aposentos laterales
  - los cuartos laterales
  lexicon: HALOT
  rationale: En este pasaje de arquitectura del templo, צלע apunta a estructuras anexas laterales. «Cámaras laterales» conserva el sentido arquitectónico técnico sin forzar una equivalencia moderna excesiva.
- source_word: מְל֣וֹ הַ/קָּנֶ֔ה
  english_pob_choice: a full reed
  chosen_spanish: de un codo y medio de ancho
  alternatives_spanish:
  - de una vara completa
  - de un junco completo
  lexicon: HALOT
  rationale: El hebreo presenta una medida arquitectónica difícil. El contexto y la tradición de lectura toman la frase como una especificación dimensional de la base/espesor relacionado con la vara de medición; en español, expresar la medida como «de un codo y medio de ancho» comunica la idea dimensional de forma legible sin ocultar que el hebreo es oscuro.
- source_word: שֵׁ֥שׁ אַמּ֖וֹת
  english_pob_choice: of six cubits
  chosen_spanish: de un codo y medio de ancho
  alternatives_spanish:
  - de seis codos
  - seis codos
  lexicon: HALOT
  rationale: La combinación es problemática en el hebreo transmitido. Dado el contexto arquitectónico y la solución de la POB inglesa al mantener una lectura medida con nota, el español opta por una formulación dimensional prudente y legible, sin afirmar más de lo que el texto permite.
- source_word: אַצִּֽילָה
  english_pob_choice: to the joint
  chosen_spanish: hasta la unión
  alternatives_spanish:
  - hasta el empalme
  - hasta la juntura
  - hasta el borde
  lexicon: HALOT
  rationale: El término es arquitectónicamente oscuro. «Unión» es una solución sobria que preserva la idea de un punto de encuentro o juntura, sin fijar indebidamente si se trata de borde, saliente o encaje.
translation_notes:
  revision_awareness: 'Se siguió el trazado auditado del inglés POB, pero se ajustó al español para mantener la misma prudencia exegética: גבה quedó como «altura» (en lugar de una imagen más interpretativa), y אַצִּילָה se vertió con una solución neutral («unión») que conserva la oscuridad arquitectónica señalada por la nota inglesa. También se evitó calcar la sintaxis inglesa; el resultado español conserva el orden informativo natural de la lengua meta sin perder las unidades de medida y la relación arquitectónica del versículo.'
  spanish_consistency_notes:
  - Se mantiene «casa» para בַּיִת en sentido del edificio del templo.
  - Se usa «cámaras laterales» para צלעות conforme al campo arquitectónico del pasaje.
  - Se preserva la ambigüedad técnica del último término con una nota breve, en línea con la cautela de la POB inglesa.
  - La medida se expresa de modo comprensible en español, pero sin añadir detalles no explicitados con seguridad por el hebreo.
