review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo: agotamiento de la ira, reposo del furor sobre ellos, consuelo/apaciguamiento divino, reconocimiento de que Yahvé ha hablado, y la cláusula temporal final. Sin embargo, en בְּקִנְאָתִי el borrador cambia una decisión significativa del rastro POB en inglés (''jealousy'') a ''celo'', aunque el expediente inglés documenta que ''jealousy'' preserva mejor la fuerza relacional pactual. En español, ''celos'' es viable y más alineado con esa justificación que ''celo''.'
  spanish_quality_summary: El español es claro, natural y digno. 'Mi ira se agotará', 'haré reposar mi furor sobre ellos' y 'me consolaré' son legibles y fieles. La única reparación necesaria es léxica/teológica en 'en mi celo', y la nota b además está mal formulada porque repite 'celo' como alternativa del propio texto en vez de ofrecer la alternativa relevante.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יְהוָה -> ''Yahvé'' está correcto; se mantienen distinciones entre ''ira'' y ''furor''. La principal desalineación es קִנְאָה, donde por el expediente POB y la rationale documentada conviene ''celos'' con nota alternativa ''celo'', no al revés.'
  issues:
  - severity: medium
    issue: בְּקִנְאָתִי se tradujo 'en mi celo' en lugar de una forma que preserve 'jealousy'/'celos'.
    rationale: El expediente inglés documenta explícitamente que 'jealousy' preserva mejor la fuerza relacional y pactual que 'zeal'. En español, 'celos' comunica mejor esa dimensión que 'celo', aunque conviene conservar 'celo' como alternativa en nota por razones idiomáticas.
  - severity: medium
    issue: La nota b no ofrece una alternativa real al texto y no refleja bien la decisión léxica auditada.
    rationale: 'Actualmente dice ''O «en mi celo»'' cuando el texto ya usa ''celo''. Debe invertirse: el texto principal puede llevar ''en mis celos'' y la nota ofrecer ''en mi celo'' como alternativa.'
  - severity: low
    issue: La nota a introduce 'mi furor se agotará', una alternativa menos necesaria que la documentada en inglés.
    rationale: No es errónea, pero la alternativa más pertinente en el expediente inglés está en וְהִנֶּחָמְתִּי y בְּקִנְאָתִי. Se puede mantener la nota a si se desea, pero no es imprescindible para la reparación mínima.
