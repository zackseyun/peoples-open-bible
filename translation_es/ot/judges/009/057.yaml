  glossary_alignment: No hay términos del glosario mayor en conflicto. «Dios» para אֱלֹהִים, «los hombres de Siquem» para אַנְשֵׁי שְׁכֶם, y «la maldición» para קִלֲלַת están bien alineados. Los nombres «Jotam» y «Jerobaal» son aceptables según la transliteración usada en el borrador.
