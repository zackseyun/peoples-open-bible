revisions:
- from: 'Pero tú dijiste[a]: «Ciertamente te haré bien, y pondré[a] tu descendencia[b] como la arena del mar[c], que no se podrá contar por su multitud».'
  to: 'Pero tú dijiste: «Ciertamente[a] te haré bien, y haré tu descendencia[b] como la arena del mar, que no se podrá contar[c] por su multitud».'
  rationale: Se corrige la duplicación inválida del marcador [a], se reancla la nota intensiva al segmento correcto, y se sustituye «pondré» por «haré» para reflejar mejor el valor contextual de וְשַׂמְתִּי y mejorar la naturalidad del español sin apartarse del hebreo ni de la auditoría inglesa.
