translation:
  language: es
  text: 'No se volverá a los altares, obra de sus manos; ni mirará lo que hicieron sus dedos: los Asherim[a] y los altares de incienso[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'postes de Asera'. El término hebreo se refiere a objetos de culto asociados con la adoración de Asera.
    reason: lexical_alternative
  - marker: b
    text: O 'pilares solares' o 'imágenes del sol'. El término hebreo probablemente se refiere a un objeto de culto pagano; su forma precisa es incierta.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשְׁעֶה
  english_pob_choice: will look to
  chosen_spanish: se volverá a
  alternatives_spanish:
  - mirará a
  - prestará atención a
  - pondrá su mirada en
  lexicon: HALOT
  rationale: El hebreo expresa un volverse con atención o dependencia hacia algo. En español, ‘se volverá a’ conserva mejor esa orientación relacional que un simple ‘mirará’, y evita sonar demasiado físico o neutral.
- source_word: הַמִּזְבְּחוֹת
  english_pob_choice: the altars
  chosen_spanish: los altares
  alternatives_spanish:
  - los altares sacrificiales
  - los altares de culto
  lexicon: HALOT
  rationale: מִזְבְּחוֹת denota ‘altares’ sin necesidad de ampliar el término en el texto principal. El contexto idolátrico ya queda claro por la continuación.
- source_word: מַעֲשֵׂה יָדָיו
  english_pob_choice: the work of his hands
  chosen_spanish: obra de sus manos
  alternatives_spanish:
  - hechura de sus manos
  - lo que hicieron sus manos
  - su obra manual
  lexicon: HALOT
  rationale: La expresión hebrea es una fórmula idiomática para algo hecho por una persona. ‘Obra de sus manos’ mantiene el paralelismo bíblico y la carga polémica contra lo fabricado por el hombre.
- source_word: וַאֲשֶׁר עָשׂוּ אֶצְבְּעֹתָיו
  english_pob_choice: what his fingers have made
  chosen_spanish: lo que hicieron sus dedos
  alternatives_spanish:
  - lo que sus dedos han hecho
  - lo que sus dedos fabricaron
  - lo que formaron sus dedos
  lexicon: HALOT
  rationale: El hebreo repite y refuerza la idea de fabricación manual. ‘Lo que hicieron sus dedos’ conserva la imaginería y el paralelismo, y suena natural en español sin perder la fuerza del original.
- source_word: יִרְאֶה
  english_pob_choice: will regard
  chosen_spanish: mirará
  alternatives_spanish:
  - verá
  - considerará
  - prestará atención
  lexicon: HALOT
  rationale: Aquí el verbo funciona en paralelo con יִשְׁעֶה y expresa atención dirigida. ‘Mirará’ permite mantener esa relación visual-atencional sin introducir un término demasiado abstracto.
- source_word: הָאֲשֵׁרִים
  english_pob_choice: the Asherim
  chosen_spanish: los aserim
  alternatives_spanish:
  - los asherim
  - las Aseras
  - las imágenes de Asera
  lexicon: HALOT
  rationale: Se conserva la transliteración del término cultual para no interpretar prematuramente el objeto. ‘Aserim’ es una forma española legible y mantiene visible la dificultad lexical del hebreo.
- source_word: הַחַמָּנִים
  english_pob_choice: the incense altars
  chosen_spanish: los altares de incienso
  alternatives_spanish:
  - los pilares solares
  - las imágenes del sol
  - los soportes de incienso
  lexicon: HALOT
  rationale: El término es difícil y admite varias posibilidades. Dado el contexto de objetos de culto fabricados por manos humanas, ‘altares de incienso’ ofrece una solución comprensible en español sin borrar la ambigüedad documentada.
theological_decisions:
- issue: Objetos de culto pagano en la denuncia profética
  english_pob_reading: Translate the terms as concrete idol-related objects without importing extra theological explanation into the main text.
  chosen_spanish_reading: Conservar los objetos concretos de culto en el texto principal, sin convertirlos en una explicación interpretativa más amplia.
  alternative_spanish_readings:
  - sustituirlos por ‘ídolos’
  - explicar ‘aserim’ como ‘postes de Asera’ en el texto principal
  rationale: La profecía denuncia la confianza en obras humanas de culto. Mantener los nombres concretos preserva la tensión lexical y deja que el reproche se exprese por el propio listado, como en el hebreo y en la decisión inglesa.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión reciente del equipo inglés no introdujo cambios; el borrador se alinea con el estado final aprobado y conserva la lectura alta concordancia del original.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - ‘Aserim’ se translitera para conservar la dificultad del término cultual; no se sustituye por una glosa más interpretativa en el cuerpo principal.
  - ‘Altares de incienso’ refleja la solución contextual elegida para הַחַמָּנִים, dejando abierta la alternativa documentada en la nota.
