id: PRO.13.23
reference: Proverbs 13:23
source:
  edition: WLC
  text: רָב אֹ֭כֶל נִ֣יר רָאשִׁ֑ים וְ/יֵ֥שׁ נִ֝סְפֶּ֗ה בְּ/לֹ֣א מִשְׁפָּֽט־׃
translation:
  text: The fallow ground of the poor[b][a] yields abundant food, but some are swept away for lack of justice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'There is that which is swept away without justice.' The Hebrew second colon is compact and can be rendered more impersonally.
    reason: alternative_reading
  - marker: b
    text: '''Fallow ground'' may also be rendered ''tilled field'' or ''freshly plowed land.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: רָב
  chosen: abundant
  alternatives:
  - much
  - plentiful
  lexicon: HALOT
  rationale: As a predicate/adjectival term modifying the amount of food, it conveys abundance or plenty. 'Abundant' is natural modern English and preserves the sense of great quantity.
- source_word: אֹכֶל
  chosen: food
  alternatives:
  - produce
  - eating
  lexicon: HALOT
  rationale: The noun denotes food or edible produce. In this agricultural proverb, 'food' is broad enough to include the yield of the field without over-specifying the crop.
- source_word: נִיר
  chosen: fallow ground
  alternatives:
  - tilled field
  - freshly plowed land
  lexicon: HALOT
  rationale: The term refers to arable ground, often newly broken or fallow land. 'Fallow ground' fits the proverbial image and the common sense that even marginal land of the poor can produce much.
- source_word: רָאשִׁים
  chosen: the poor
  alternatives:
  - poor people
  - the needy
  lexicon: HALOT
  rationale: Though the form is unusual in this context, it is traditionally understood here as referring to poor or impoverished persons. 'The poor' is concise and idiomatic in English.
- source_word: וְיֵשׁ
  chosen: but some are
  alternatives:
  - and there is
  - yet there is
  lexicon: HALOT
  rationale: The construction introduces a contrasting second colon. Rendering with 'but some are' brings out the adversative sense in smooth English while preparing for the passive participle that follows.
- source_word: נִסְפֶּה
  chosen: swept away
  alternatives:
  - destroyed
  - consumed
  - ruined
  lexicon: HALOT
  rationale: The Niphal participle of ספָה carries the sense of being swept away, destroyed, or perishing. 'Swept away' preserves the passive nuance and vividness without overcommitting to a specific mechanism of destruction.
- source_word: בְּלֹא מִשְׁפָּט
  chosen: for lack of justice
  alternatives:
  - through injustice
  - without justice
  - for want of judgment
  lexicon: HALOT
  rationale: מִשְׁפָּט can mean justice, judgment, or legal right/order. Here the phrase points to the absence of just treatment or due process as the cause of ruin. 'For lack of justice' is clear and captures the social-ethical thrust of the proverb.
