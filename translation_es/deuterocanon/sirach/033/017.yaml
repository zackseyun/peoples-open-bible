review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: súplica de misericordia, referencia al pueblo vinculado al nombre divino, e Israel comparado con un primogénito. Sin embargo, hay dos desajustes importantes: «que es llamado con tu nombre» no expresa bien el modismo ni concuerda naturalmente con «pueblo», y la nota de modismo está anclada en «Israel[a]» en vez de la frase relevante. Además, «con tu nombre» es menos fiel y menos idiomático que «por tu nombre».'
  spanish_quality_summary: El texto es mayormente claro, pero «que es llamado con tu nombre» suena forzado en español bíblico natural; «que es llamado por tu nombre» o mejor «que es llamado por tu nombre» mantiene el modismo con mejor gramática. También conviene mover la marca de nota cultural a la frase correspondiente. «oh Yahvé» es aceptable dentro de la política del proyecto, aunque el sustento desde el griego κύριε debe presentarse con cautela en la explicación, no como certeza de nombre divino subyacente.
  glossary_alignment: «Yahvé» concuerda con la política del proyecto, aunque aquí el original griego dice κύριε. «Primogénito» preserva bien πρωτογόνῳ. No hay conflicto con otras terminologías clave. La principal corrección terminológica es usar el modismo español estándar «llamado por tu nombre».
  issues:
  - severity: high
    issue: La expresión «que es llamado con tu nombre» es poco natural y menos fiel al modismo bíblico.
    rationale: κεκλημένον ἐπ᾽ ὀνόματί σου corresponde al modismo «llamado por tu nombre», no «con tu nombre». Además, «con» debilita la idea de pertenencia o identificación divina que la nota misma intenta explicar.
  - severity: high
    issue: La nota cultural está anclada al lugar equivocado.
    rationale: La nota sobre «llamado por tu nombre» aparece como [b] en «primogénito», mientras que debe ir en la frase «llamado por tu nombre». Esto incumple la disciplina de anclaje de notas.
  - severity: medium
    issue: La explicación léxica de «Yahvé» sobreafirma un nombre divino subyacente en un texto griego que explícitamente tiene κύριε.
    rationale: El proyecto permite «Yahvé», pero la justificación debe reconocer que es una decisión de política terminológica aplicada al vocativo divino, no una certeza textual del término griego en este versículo.
  revised_spanish_text: Ten misericordia del pueblo, oh Yahvé, que es llamado por tu nombre[b], y de Israel[a], a quien hiciste igual a un primogénito.
  revised_footnotes:
  - marker: a
    text: 'Posible también: «Israel, hazlo igual a un primogénito». La redacción griega al final del versículo es sintácticamente difícil, y el verbo final puede entenderse como una nueva súplica, no solo como descripción de un trato previo de Dios con Israel.'
    reason: alternative_reading
  - marker: b
    text: «Llamado por tu nombre» es un modismo bíblico que significa marcado como perteneciente a Dios.
    reason: cultural_note
  revision_rationale: Se corrige el modismo a «llamado por tu nombre» para reflejar mejor el griego y el uso bíblico natural en español, y se reubica la nota cultural al lugar exacto que explica. Se mantiene el resto del versículo, incluida la lectura principal sobre Israel y el primogénito, por estar bien alineada con la POB inglesa y la dificultad sintáctica del griego.
