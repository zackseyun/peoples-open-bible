review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo: procedencia tribal, tres ciudades y la repetición de «con sus …» para cada una. También mantiene correctamente «en Galilea» para בַּגָּלִיל y el valor distributivo de מִגְרָשֶׁיהָ. Sin embargo, dos topónimos españoles no son fieles ni legibles: «Jamón» para חַמּוֹן crea una lectura equivocada en español por coincidir con el sustantivo común, y «Quedes» para קֶדֶשׁ es una castellanización poco estable; una transliteración más transparente y reconocible es «Cedes».'
  spanish_quality_summary: La frase suena natural en español bíblico moderno, pero «Jamón» es seriamente inadecuado por su asociación inmediata con el alimento, lo que daña la dignidad y comprensión del texto. «Pastizales» es entendible, aunque algo más estrecho que el hebreo; se puede mantener si se conserva la nota aclaratoria. La puntuación y sintaxis general son buenas.
  glossary_alignment: No hay términos teológicos de proyecto en juego. La decisión para מִגְרָשׁ como «pastizales» es aceptable con nota de alternativa («tierras comunes»). Los nombres propios deben priorizar fidelidad y legibilidad española; por eso conviene «Cedes» y «Hamón» en lugar de «Quedes» y «Jamón».
  issues:
  - severity: high
    issue: «Jamón» para חַמּוֹן
    rationale: Aunque intenta adaptar la gutural, en español moderno «jamón» se lee inevitablemente como el alimento, no como topónimo. Esto afecta gravemente la dignidad, legibilidad y fidelidad percibida del texto.
  - severity: medium
    issue: «Quedes» para קֶדֶשׁ
    rationale: Es una forma poco reconocible y menos natural en tradición bíblica española. «Cedes» refleja bien el topónimo Kedesh/Qedesh en español y evita una transliteración forzada.
  - severity: low
    issue: «pastizales» puede estrechar algo el sentido de מִגְרָשׁ
    rationale: El hebreo se refiere al terreno abierto perteneciente a la ciudad, no solo al pasto en sentido agrícola. La nota actual compensa bien esta posible estrechez, por lo que no exige cambio obligatorio.
  revised_spanish_text: 'Y de la tribu de Neftalí: Cedes en Galilea con sus pastizales[a], Hamón con sus pastizales, y Quiriataim con sus pastizales.'
  revised_footnotes:
