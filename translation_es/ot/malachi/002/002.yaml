revisions:
- from: Si no escuchan[a], y si no ponen atención para dar gloria a mi nombre, dice Yahvé de los Ejércitos, enviaré entre ustedes la maldición; y maldeciré sus bendiciones; sí, ya las he maldecido[b], porque ustedes no ponen atención.
  to: Si no escuchan[a], y si no lo toman en serio para dar gloria a mi nombre, dice Yahvé de los Ejércitos[b], entonces enviaré entre ustedes la maldición, y maldeciré sus bendiciones; sí, ya las he maldecido[c], porque ustedes no lo toman en serio.
  rationale: Se revisa principalmente el modismo עַל לֵב para conservar mejor la fuerza de interiorización y la repetición retórica del hebreo mediante 'lo toman en serio'. También se añade una nota para la alternativa tradicional del título divino, preservando una alternativa significativa del expediente inglés, sin alterar la decisión principal 'Yahvé de los Ejércitos'. La sintaxis se pule levemente con 'entonces' y se mantiene el perfecto final como juicio ya en curso.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:43:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura principal del hebreo: doble condición, propósito de dar gloria al nombre de Yahvé, envío de la maldición, maldición de las bendiciones y razón final. También preserva correctamente Yahvé y el valor ya-iniciado del perfecto final con nota alternativa. Sin embargo, el modismo repetido תָשִׂימוּ עַל לֵב / שָׂמִים עַל לֵב queda debilitado como ''ponen atención'', y además se pierde el objeto implícito que el inglés explicitó como ''it''.'
  spanish_quality_summary: El texto es claro y legible, pero 'poner atención' suena algo superficial para un modismo hebreo de interiorización seria. 'Lo toman en serio' o 'lo toman a pecho' comunica mejor la fuerza exhortativa en español moderno y permite repetir la misma formulación en ambas apariciones, preservando la retórica del original. También conviene mantener coherencia con la nota al pie sobre Yahvé de los Ejércitos como alternativa tradicional.
  glossary_alignment: 'Alineación general buena: יְהוָה -> ''Yahvé'' conforme al proyecto; צְבָאוֹת -> ''de los Ejércitos'' aceptable; כָּבוֹד -> ''gloria'' correcto; הַמְּאֵרָה -> ''la maldición'' correcto. No hay conflicto doctrinal importante. El principal ajuste léxico es mejorar עַל לֵב con una expresión española que preserve la interiorización, no solo la atención momentánea.'
  issues:
