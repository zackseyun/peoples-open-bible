    rationale: Aunque «justicia» es léxicamente posible, el expediente documenta que aquí se prefirió el sentido ético-covenantal de «righteousness». En español, «rectitud» representa mejor ese valor en el texto principal, dejando «justicia» como alternativa de nota.
