    text: Or 'I will visit/call to account the king of Babylon and his land ... as I visited/called to account the king of Assyria.' The Hebrew verb פקד can mean 'visit,' 'attend to,' or 'call to account'; here it carries a punitive sense in context.
    reason: lexical_alternative
