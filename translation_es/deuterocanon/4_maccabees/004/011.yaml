  yaml_path: translation/deuterocanon/4_maccabees/004/011.yaml
  text: So Apollonius[a], having fallen half-dead upon the lifeless court of the sanctuary, stretched out his hands to heaven and with tears begged the Hebrews to pray for him[c][b], so that they might appease the heavenly host.
  footnotes:
