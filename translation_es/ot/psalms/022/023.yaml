translation:
  language: es
  text: Declararé tu nombre a mis hermanos[a]; en medio de la asamblea te alabaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a mis hermanos y hermanas», si en el contexto se entiende el parentesco de manera inclusiva; el hebreo dice literalmente «a mis hermanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲסַפְּרָה
  english_pob_choice: I will declare
  chosen_spanish: Yo declararé
  alternatives_spanish:
  - Yo contaré
  - Yo relataré
  lexicon: HALOT
  rationale: El piel de ספר expresa aquí una acción pública de dar a conocer o declarar. «Declararé» conserva el sentido testimonial y suena natural en español sin volverlo más explicativo de lo que permite el hebreo.
- source_word: שִׁמְךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu reputación
  lexicon: HALOT
  rationale: Se conserva el idioma hebreo de «nombre», que en contexto implica la identidad revelada y el carácter de Dios. «Tu nombre» es fiel y comprensible en español; «fama» o «reputación» explicitan demasiado el matiz.
- source_word: לְאֶחָי
  english_pob_choice: to my brothers
  chosen_spanish: a mis hermanos
  alternatives_spanish:
  - a mis hermanos y hermanas
  - a mis hermanos
  lexicon: HALOT
  rationale: El hebreo es explícitamente masculino plural con sufijo de primera persona. «A mis hermanos» respeta la forma del original; la ampliación inclusiva queda como alternativa, no en el texto principal.
- source_word: בְּתוֹךְ
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en medio de
  - entre
  lexicon: HALOT
  rationale: «En medio de» reproduce el valor espacial y público de בְּתוֹךְ y mantiene el tono poético sin sonar arcaico.
- source_word: קָהָל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la reunión
  lexicon: HALOT
  rationale: «Asamblea» refleja el grupo reunido sin imponer un matiz eclesiástico posterior. Es una equivalencia clara y sobria para קָהָל.
- source_word: אֲהַלְלֶךָּ
  english_pob_choice: I will praise you
  chosen_spanish: te alabaré
  alternatives_spanish:
  - te alabaré con canto
  - te ensalzaré
  lexicon: HALOT
  rationale: El verbo הלל en piel se traduce de forma directa como «alabar». El sufijo de segunda persona se conserva con «te»; «alabaré» evita añadir una connotación musical que no está explícita.
theological_decisions:
- issue: Posible lectura inclusiva de «hermanos»
  english_pob_reading: to my brothers, with a footnote allowing 'brothers and sisters' if the context is understood inclusively
  chosen_spanish_reading: a mis hermanos, con nota que permite una lectura inclusiva contextual
  alternative_spanish_readings:
  - a mis hermanos y hermanas
  - a mis hermanos
  rationale: El hebreo literal es masculino plural. Para mantener fidelidad formal, el texto principal conserva «hermanos», pero se reconoce en nota la posibilidad contextual de una lectura inclusiva, como hizo la POB en inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios: el texto quedó confirmado por el control de alta concordancia. Por eso la redacción española sigue de cerca el registro y las decisiones léxicas del audit trail en inglés, sin introducir ajustes no sustentados.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; aquí el hebreo dice «tu nombre», por lo que no aparece el nombre divino explícito.
  - «Asamblea» se mantiene para קָהָל por coherencia con la preferencia POB de evitar «congregación» cuando puede sonar más eclesial de lo que permite el hebreo.
  - La puntuación con punto y coma conserva la paralelismo poético de dos hemistiquios.
