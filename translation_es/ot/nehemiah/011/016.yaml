review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: dos nombres coordinados, su procedencia de entre los principales levitas, y su responsabilidad administrativa sobre un tipo de trabajo relacionado con la casa de Dios. Sin embargo, ‘estaban sobre’ es un calco poco natural en español para עַל en este contexto administrativo; ‘estaban a cargo de’ preserva mejor el sentido supervisivo documentado. El resto del contenido se alinea con la fuente, incluido ‘de entre los jefes de los levitas’ para מֵרָאשֵׁי הַלְוִיִּם y ‘obra exterior’ para הַחִיצֹנָה, con la nota alternativa apropiada.'
  spanish_quality_summary: El texto es mayormente claro, pero ‘estaban sobre la obra exterior’ suena forzado e idiomáticamente débil en español eclesial moderno. ‘Estaban a cargo de la obra exterior’ mejora la legibilidad sin perder precisión. La transliteración de nombres es aceptable; la puntuación y el registro son adecuados.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. ‘Dios’ está bien para אֱלֹהִים. No aparece Yahvé, Mesías, Espíritu, etc. La decisión ‘obra exterior’ es compatible con el razonamiento auditado, y la nota conserva la alternativa semántica de trabajo hecho fuera del templo.
  issues:
  - severity: medium
    issue: ‘Estaban sobre’ suena poco natural para una función administrativa
    rationale: Aunque reproduce de cerca la preposición עַל, en español moderno esa formulación resulta rígida y menos clara que ‘estaban a cargo de’, que expresa supervisión con fidelidad al valor documentado.
  - severity: low
    issue: La nota al pie no refleja plenamente la alternativa inglesa ‘for the house of God’
    rationale: No es indispensable añadir otra nota, porque el español principal ‘de la casa de Dios’ es defendible y la nota actual ya cubre la ambigüedad principal de הַחִיצֹנָה. Pero conviene mantener el foco de la nota en el contraste externo/interno, como en la auditoría inglesa.
  revised_spanish_text: Y Shabetai y Jozabad[a], de entre los jefes de los levitas, estaban a cargo de la obra exterior de la casa de Dios.
  revised_footnotes:
  - marker: a
    text: O ‘la obra de afuera para la casa de Dios’. La frase hebrea también puede entenderse como trabajo hecho fuera del templo propiamente dicho, en contraste con las tareas internas.
    reason: lexical_alternative
