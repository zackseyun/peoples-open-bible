translation:
  language: es
  text: Y la entrada de la cámara lateral estaba hacia el espacio libre[a], una entrada hacia el norte y una entrada hacia el sur; y el ancho del espacio libre era de cinco codos por todo alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espacio abierto» o «área vacía» para «espacio libre» (hebreo מֻנָּח), refiriéndose al área dejada abierta alrededor de la estructura.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶתַח
  english_pob_choice: doorway
  chosen_spanish: entrada
  alternatives_spanish:
  - portal
  - vano
  - acceso
  lexicon: HALOT
  rationale: En este contexto arquitectónico, «entrada» comunica con naturalidad la abertura de acceso sin cargar el texto con tecnicismo innecesario. «Portal» o «vano» pueden sonar más técnicos, pero «entrada» mantiene claridad y fidelidad al sentido concreto.
- source_word: הַצֵּלָע
  english_pob_choice: the side chamber
  chosen_spanish: la cámara lateral
  alternatives_spanish:
  - la habitación lateral
  - la estancia lateral
  - la cámara de lado
  lexicon: HALOT
  rationale: La frase describe una unidad arquitectónica del templo; «cámara lateral» reproduce bien el valor técnico de צֵלָע en Ezequiel y es idiomática en español bíblico contemporáneo.
- source_word: לַמֻּנָּח
  english_pob_choice: to the free space
  chosen_spanish: hacia el espacio libre[a]
  alternatives_spanish:
  - hacia el espacio abierto
  - hacia el área vacía
  - hacia el lugar dejado libre
  lexicon: HALOT
  rationale: El hebreo apunta al espacio dejado abierto alrededor de la estructura. «Espacio libre» conserva la idea de área no ocupada sin sugerir un sentido devocional de «descanso».
- source_word: דֶּרֶךְ הַצָּפוֹן / לַדָּרוֹם
  english_pob_choice: toward the north / toward the south
  chosen_spanish: hacia el norte / hacia el sur
  alternatives_spanish:
  - al norte / al sur
  - en dirección norte / en dirección sur
  lexicon: HALOT
  rationale: La construcción indica orientación espacial. «Hacia» preserva la direccionalidad de manera natural en español y mantiene el paralelismo del hebreo.
- source_word: רֹחַב
  english_pob_choice: width
  chosen_spanish: el ancho
  alternatives_spanish:
  - la anchura
  - el ancho total
  lexicon: HALOT
  rationale: En español, «ancho» funciona con naturalidad para una medida arquitectónica. «Anchura» también es válida, pero «ancho» resulta más directo y fluido.
- source_word: מְקוֹם הַמֻּנָּח
  english_pob_choice: the free space
  chosen_spanish: el espacio libre
  alternatives_spanish:
  - el espacio abierto
  - el lugar dejado libre
  - el área vacía
  lexicon: HALOT
  rationale: La expresión completa designa el área reservada alrededor de la construcción. «Espacio libre» conserva el valor espacial y evita introducir una noción extra ajena al pasaje.
- source_word: חָמֵשׁ אַמּוֹת
  english_pob_choice: five cubits
  chosen_spanish: cinco codos
  alternatives_spanish:
  - cinco codos de ancho
  - cinco codos de medida
  lexicon: HALOT
  rationale: Se mantiene la unidad antigua «codos» por precisión histórica y porque el contexto de medidas del templo la requiere. No se moderniza a metros para no perder el registro del texto.
- source_word: סָבִיב סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor, alrededor
  alternatives_spanish:
  - todo alrededor
  - por todos lados
  lexicon: HALOT
  rationale: La duplicación hebrea intensifica la idea de circunferencia completa. La repetición en español intenta reflejar esa fuerza enfática sin perder naturalidad.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura revisada del inglés POB: «was toward the free space» en lugar de una formulación más dinámica como «opened to». En español se optó por una construcción igualmente directa («estaba hacia») para conservar la relación espacial explícita sin añadir movimiento que el hebreo no exige. También se respetó la repetición enfática final de סָבִיב סָבִיב mediante una duplicación adverbial.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo o el contexto lo exijan explícitamente; este versículo no lo contiene.
  - 'Se mantiene terminología arquitectónica coherente: «cámara lateral», «entrada», «espacio libre», «codos».'
  - La nota al pie marca la ambigüedad legítima de מֻנָּח sin borrar la opción principal adoptada en el texto.
  - La repetición final busca reproducir la intensificación del hebreo, aun si en español suena marcada; se ha conservado por fidelidad estilística.
