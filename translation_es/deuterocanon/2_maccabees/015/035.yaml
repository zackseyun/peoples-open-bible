review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en gran parte el sentido del griego: ἐξέδησεν = «colgó», προτομήν = la cabeza exhibida de Nicanor, ἐπίδηλον πᾶσιν = «visible para todos», y φανερὸν ... σημεῖον = «señal clara ...». Sin embargo, «desde la acrópolis» no representa bien ἐκ τῆς ἄκρας en español natural; suena más a punto de origen que a lugar de exhibición. Además, la coordinación final queda elíptica en español («visible para todos, y señal clara...»), donde conviene repetir el verbo copulativo implícito para claridad.'
  spanish_quality_summary: El texto es comprensible, pero «acrópolis» resulta demasiado especializado/grequizante para un texto bíblico de lectura eclesial general, y «desde la acrópolis» suena poco idiomático. También «cabeza cortada» puede mejorarse a «cabeza cercenada» o «cabeza cortada»; la primera suena más digna, pero la segunda es entendible. La frase final mejora con «como una señal clara» para lograr español fluido y conservar la estructura predicativa.
  glossary_alignment: 'No hay conflicto grave con la terminología del proyecto. «Señor» para κύριος está bien justificado aquí. La principal divergencia es léxica-estilística: para ἄκρας, el inglés auditado prefirió «citadel» y la nota conservó la idea de altura fortificada; en español «ciudadela» preserva mejor ese valor que «acrópolis» en lectura general.'
  issues:
  - severity: medium
    issue: «desde la acrópolis» no suena natural para ἐκ τῆς ἄκρας
    rationale: El griego expresa el lugar alto/fortificado desde el cual fue colgada la cabeza para exhibición pública. En español bíblico general, «de la ciudadela» o «en la ciudadela» comunica mejor que «desde la acrópolis», que suena técnico y algo espacialmente torpe.
  - severity: medium
    issue: La coordinación final queda incompleta en español
    rationale: «visible para todos, y señal clara de la ayuda del Señor» omite un nexo explicativo natural. «Visible para todos y como una señal clara...» o «visible para todos, y era una señal clara...» transmite mejor el predicado doble del griego.
  - severity: low
    issue: «acrópolis» es demasiado helenizante para el registro objetivo
    rationale: Aunque etimológicamente defendible, no es la opción más legible para una Biblia en español neutral y ampliamente eclesial. «Ciudadela» mantiene el sentido fortificado sin sonar académico.
  revised_spanish_text: Y colgó la cabeza cercenada[a] de Nicanor de la ciudadela[b], visible para todos y como una señal clara de la ayuda del Señor.
  revised_footnotes:
  - marker: a
    text: O «la cabeza de Nicanor». El griego προτομή puede denotar la parte frontal o la cabeza; aquí, como el contexto ya ha narrado su decapitación, «cabeza cercenada» hace explícito el sentido.
    reason: lexical_alternative
  - marker: b
    text: O «fortaleza» o «altura fortificada». El griego ἄκρα se refiere a un lugar alto fortificado; «ciudadela» preserva bien ese sentido en español general.
    reason: lexical_alternative
  revision_rationale: Se ajusta ἄκρας a «ciudadela» para mayor fidelidad funcional y legibilidad en español, se añade la nota léxica correspondiente, y se mejora la sintaxis final con «como una señal clara» para reflejar naturalmente el doble predicado del griego. También se incorpora la alternativa léxica para προτομή, ya preservada en el audit trail inglés.
