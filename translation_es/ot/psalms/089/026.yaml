translation:
  language: es
  text: Pondré su mano sobre el mar[a], y su mano derecha sobre los ríos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sobre el mar»; o «por encima del mar». La imagen probablemente expresa dominio o alcance.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: I will set
  chosen_spanish: Pondré
  alternatives_spanish:
  - pondré
  - colocaré
  - estableceré
  lexicon: HALOT
  rationale: El verbo hebreo mantiene una acción concreta de poner/colocar. «Pondré» conserva la imagen corporal y la forma futura promissoria sin volverla abstracta como «estableceré».
- source_word: בַיָּם
  english_pob_choice: on the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - en el mar
  - sobre el mar
  - en el mar y sobre él
  lexicon: HALOT
  rationale: La preposición ב con יָם puede leerse en una imagen de dominio o contacto. «Sobre el mar» refleja mejor la posibilidad espacial de la imagen y sigue de cerca la nota inglesa de colocación «over/on» sin borrar la metáfora.
- source_word: יָדוֹ
  english_pob_choice: his hand
  chosen_spanish: su mano
  alternatives_spanish:
  - su mano
  - la mano de él
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «mano», porque el hebreo presenta la imagen corporal directamente. El posesivo español ya permite la referencia al sujeto del contexto.
- source_word: וּבַנְּהָרֹות
  english_pob_choice: and ... on the rivers
  chosen_spanish: y su mano derecha sobre los ríos
  alternatives_spanish:
  - y sobre los ríos
  - y su diestra sobre los ríos
  - y su mano derecha en los ríos
  lexicon: HALOT
  rationale: Se repite la estructura preposicional para mantener el paralelismo. «Ríos» sigue la glosa estándar de נְהָרוֹת y conserva la pareja poética con «mar».
- source_word: יְמִינוֹ
  english_pob_choice: his right hand
  chosen_spanish: su mano derecha
  alternatives_spanish:
  - su diestra
  - su mano derecha
  lexicon: HALOT
  rationale: Se mantiene la referencia literal al lado derecho, que en español se expresa con naturalidad como «mano derecha». Así se preserva la fuerza simbólica de poder y autoridad sin explicitarla en el cuerpo del verso.
theological_decisions:
- issue: Imagen de dominio real sin explicitarla en el texto principal
  english_pob_reading: Retain the concrete imagery of hand and right hand placed on sea and rivers, implying expansive rule without making the implication explicit in the main text.
  chosen_spanish_reading: Mantener la imagen concreta de la mano y la mano derecha sobre el mar y los ríos, dejando implícida la idea de dominio o alcance.
  alternative_spanish_readings:
  - Extenderá su poder sobre el mar y sobre los ríos.
  - Pondré su autoridad sobre el mar y sobre los ríos.
  rationale: El hebreo es poético y metafórico; el texto habla de manos sobre mar y ríos. La versión española conserva esa concreción en vez de convertirla en una paráfrasis interpretativa sobre autoridad política.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés no introdujo cambios; el contexto de auditoría muestra acuerdo alto y ninguna enmienda aplicada. Por eso la redacción española sigue de cerca la decisión inglesa de conservar la metáfora concreta.
  spanish_consistency_notes:
  - Se usa «mar» y no «océano», en continuidad con el hebreo יָם y la glosa inglesa.
  - Se repite «sobre» en paralelo para reflejar la estructura de dos miembros del verso.
  - «Mano derecha» traduce literalmente יְמִינוֹ y evita reemplazarlo por una interpretación abstracta.
  - Se mantiene un registro bíblico moderno y claro, sin arcaísmos innecesarios.
