translation:
  language: es
  text: 'Y Tobías dijo[a]: «Déjame partir hacia mi padre»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego emplea presente histórico: literalmente, «Tobías dice». En español narrativo se puede verter naturalmente como pasado simple.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: El griego usa presente histórico (λέγει), pero en español narrativo fluido la equivalencia óptima suele ser el pretérito simple. «Dijo» conserva el valor narrativo sin sonar forzado; «dice» sería más literal pero menos natural en esta secuencia.
- source_word: Ἐξαπόστειλόν
  english_pob_choice: Send me away
  chosen_spanish: Envíame
  alternatives_spanish:
  - Envíame lejos
  - Despídeme
  - Déjame ir
  lexicon: BDAG
  rationale: El imperativo ἐξαποστέλλω expresa enviar fuera o lejos. «Envíame» mantiene el movimiento direccional implícito y evita añadir matices no explícitos como «volver» o «ir». «Despídeme» se acerca al sentido, pero puede sonar más relacional que direccional.
- source_word: πρὸς τὸν πατέρα μου
  english_pob_choice: to my father
  chosen_spanish: a mi padre
  alternatives_spanish:
  - hacia mi padre
  - a donde está mi padre
  - a la casa de mi padre
  lexicon: BDAG
  rationale: La preposición πρός con acusativo indica movimiento hacia una persona. «A mi padre» reproduce ese valor de dirección personal sin añadir «casa» ni «de vuelta», que no están en el griego.
- source_word: Τωβείας
  english_pob_choice: Tobias
  chosen_spanish: Tobías
  alternatives_spanish:
  - Tobias
  lexicon: LSJ
  rationale: El nombre griego Τωβείας se translitera de forma normal en español como «Tobías». Se mantiene el nombre propio sin hispanizarlo por traducción semántica.
translation_notes:
  revision_awareness: El texto fuente griego coincide bien con el audit trail en inglés; se preserva la decisión de nombre propio, el valor direccional del imperativo y la observación sobre el presente histórico, adaptándolos a un español natural sin añadir contenido interpretativo.
  spanish_consistency_notes:
  - Se mantiene «Tobías» de manera consistente con la transliteración habitual del nombre griego.
  - «Envíame» conserva la fuerza direccional del mandato sin sobreinterpretar el alcance de la acción.
  - No se introduce «volver» ni «casa» porque esos matices no están explícitos en el griego.
  - La nota de pie de página refleja la misma tensión verbal que el audit trail inglés entre presente histórico y pasado narrativo.
