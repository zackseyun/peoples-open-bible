translation:
  language: es
  text: La tierra de Egipto está delante de ti[a]. Asienta a tu padre y a tus hermanos en lo mejor de la tierra; que vivan en la tierra de Gosén. Y si sabes que entre ellos hay hombres capaces[b], entonces ponlos por supervisores del ganado que me pertenece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea «está delante de ti» puede implicar disponibilidad o libertad de escoger dentro de Egipto, no solo ubicación espacial.
    reason: cultural_note
  - marker: b
    text: También puede entenderse como «hombres aptos», «hombres competentes» o, más literalmente, «hombres de fuerza/capacidad». El contexto aquí no exige un matiz militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ מִצְרַיִם לְפָנֶיךָ הִוא
  english_pob_choice: The land of Egypt is before you
  chosen_spanish: La tierra de Egipto está delante de ti
  alternatives_spanish:
  - Egipto está delante de ti
  - La tierra de Egipto está a tu disposición
  lexicon: HALOT
  rationale: Mantiene la imagen hebrea de «delante de ti» y conserva el valor idiomático de disponibilidad sin sustituirlo por una paráfrasis más interpretativa.
- source_word: בְּמֵיטַב הָאָרֶץ
  english_pob_choice: in the best of the land
  chosen_spanish: en lo mejor de la tierra
  alternatives_spanish:
  - en la mejor parte de la tierra
  - en lo más fino de la tierra
  lexicon: HALOT
  rationale: «מֵיטַב» expresa lo mejor o más escogido; «en lo mejor de la tierra» es natural en español y preserva el grado superlativo del hebreo.
- source_word: הוֹשֵׁב
  english_pob_choice: Settle
  chosen_spanish: Haz habitar allí
  alternatives_spanish:
  - Asienta allí
  - Haz morar allí
  lexicon: HALOT
  rationale: El valor causativo del hifil se conserva con una expresión que indica hacer que otros habiten; «allí» explicita el lugar ya mencionado en el contexto.
- source_word: יֵשְׁבוּ
  english_pob_choice: let them live
  chosen_spanish: que vivan
  alternatives_spanish:
  - que habiten
  - que moren
  lexicon: HALOT
  rationale: En este contexto de residencia, «vivan» comunica con naturalidad la idea de asentarse y vivir en Gosén sin perder el sentido locativo del verbo.
- source_word: בְּאֶרֶץ גֹּשֶׁן
  english_pob_choice: in the land of Goshen
  chosen_spanish: en la tierra de Gosén
  alternatives_spanish:
  - en Gosén
  - en la región de Gosén
  lexicon: HALOT
  rationale: Se conserva el sustantivo «tierra» porque el hebreo lo incluye explícitamente y aporta transparencia estructural.
- source_word: וְאִם יָדַעְתָּ
  english_pob_choice: And if you know
  chosen_spanish: Y si sabes
  alternatives_spanish:
  - Y si conoces
  - Ahora bien, si sabes
  lexicon: HALOT
  rationale: «Y si sabes» reproduce de forma directa la condición planteada, sin añadir matices que el hebreo no obliga a expresar.
- source_word: אַנְשֵׁי חַיִל
  english_pob_choice: capable men
  chosen_spanish: hombres capaces
  alternatives_spanish:
  - hombres competentes
  - hombres de valor
  - hombres de fuerza
  lexicon: HALOT
  rationale: La expresión hebrea puede abarcar capacidad, competencia o fuerza; «hombres capaces» respeta esa amplitud sin imponer un matiz militar de «valientes».
- source_word: וְשַׂמְתָּם
  english_pob_choice: appoint them
  chosen_spanish: ponlos como
  alternatives_spanish:
  - nómbralos como
  - asígnalos como
  lexicon: HALOT
  rationale: El verbo «poner» refleja con fidelidad el hebreo de colocar/asignar, y la construcción «como» hace explícita la función administrativa.
- source_word: שָׂרֵי מִקְנֶה
  english_pob_choice: overseers of the livestock
  chosen_spanish: supervisores del ganado
  alternatives_spanish:
  - encargados del ganado
  - administradores del ganado
  - sobreveedores del ganado
  lexicon: HALOT
  rationale: «שָׂרִים» designa jefes o supervisores, y «מִקְנֶה» se refiere al ganado/livestock; «supervisores del ganado» comunica con claridad la función en español.
- source_word: עַל אֲשֶׁר לִי
  english_pob_choice: of the livestock that belongs to me
  chosen_spanish: del ganado que me pertenece
  alternatives_spanish:
  - sobre lo que es mío
  - de mi ganado
  lexicon: HALOT
  rationale: Se explicita la posesión de manera natural en español, manteniendo el referente de los bienes de Faraón sin oscurecer el vínculo posesivo del hebreo.
translation_notes:
  revision_awareness: 'Coincide con el pasaje hebreo y con la solución auditada en inglés: se mantiene la imagen idiomática de «delante de ti», el sentido causativo de הוֹשֵׁב, la opción administrativa para שָׂרֵי מִקְנֶה y la amplitud semántica de אַנְשֵׁי חַיִל sin militarizarla. No se registraron revisiones posteriores que alteren el contenido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa «tierra» para traducir אֶרֶץ de manera consistente con la transparencia del hebreo.
  - «Ganado» se emplea como equivalente amplio de מִקְנֶה, sin restringirlo innecesariamente a una especie animal concreta.
  - La puntuación y el orden de cláusulas siguen de cerca la sintaxis hebrea y la organización del texto auditado en inglés.
