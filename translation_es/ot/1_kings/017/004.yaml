translation:
  language: es
  text: Y sucederá que beberás del arroyo[a], y he mandado a los cuervos[c] que te provean[b] allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «del wadi» o «del torrente» para «arroyo».
    reason: lexical_alternative
  - marker: b
    text: 'O: «que te sustenten» o «que te alimenten».'
    reason: lexical_alternative
  - marker: c
    text: Algunos han propuesto una lectura no aviar de «cuervos», pero el sentido hebreo ordinario se refiere a las aves, y el contexto siguiente apoya esa lectura.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be that
  chosen_spanish: Y será que
  alternatives_spanish:
  - Y acontecerá que
  - Y sucederá que
  lexicon: HALOT
  rationale: La fórmula hebrea introduce la circunstancia siguiente con tono formal. «Y será que» conserva esa apertura predictiva sin volverla rígida o demasiado arcaica en español.
- source_word: מֵהַנַּחַל
  english_pob_choice: from the brook
  chosen_spanish: del arroyo
  alternatives_spanish:
  - del wadi
  - de la corriente
  lexicon: HALOT
  rationale: נחל puede referirse a un cauce estacional, arroyo o wadi. En español, «arroyo» es natural y comunica el sentido narrativo; «wadi» se reservaría como precisión geográfica, pero sería menos transparente para la lectura pública.
- source_word: תִּשְׁתֶּה
  english_pob_choice: you will drink
  chosen_spanish: beberás
  alternatives_spanish:
  - has de beber
  - vas a beber
  lexicon: HALOT
  rationale: El imperfecto 2ms indica acción futura. «Beberás» expresa directamente esa referencia futura en un español claro y digno.
- source_word: הָעֹרְבִים
  english_pob_choice: the ravens
  chosen_spanish: los cuervos
  alternatives_spanish:
  - los ravens
  lexicon: HALOT
  rationale: El hebreo ordinariamente designa aves córvidas; en español, «cuervos» es el equivalente más natural y tradicional para el grupo de aves, sin necesidad de forzar un tecnicismo.
- source_word: צִוִּיתִי
  english_pob_choice: I have commanded
  chosen_spanish: yo he mandado
  alternatives_spanish:
  - yo mandé
  - yo he ordenado
  lexicon: HALOT
  rationale: El perfecto puede expresar una acción ya dispuesta con relevancia presente. «Yo he mandado» conserva ese valor anterior y completo, y «mandado» refleja bien el matiz de ordenar con autoridad.
- source_word: לְכַלְכֶּלְךָ
  english_pob_choice: to provide for you
  chosen_spanish: para que te sustenten
  alternatives_spanish:
  - para sustentarte
  - para alimentarte
  - para proveerte
  lexicon: HALOT
  rationale: El verbo hebreo abarca sostener, mantener y proveer. «Para que te sustenten» recoge esa amplitud sin reducirlo solo a comida; además mantiene el sentido del contexto inmediato, donde los cuervos traen alimento.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: Adverbio simple de lugar. «Allí» es la equivalencia directa y natural en español.
theological_decisions:
- issue: Identidad de הָעֹרְבִים
  english_pob_reading: Literal ravens are in view as agents commanded by God to sustain Elijah.
  chosen_spanish_reading: Se entienden aves reales, «los cuervos», como agentes enviados por Dios para sustentar a Elías.
  alternative_spanish_readings:
  - una lectura no aviar del término
  - una reinterpretación como un topónimo o grupo humano
  rationale: La lectura ordinaria del hebreo apunta a aves, y el contexto narrativo posterior las presenta trayendo alimento. No hay base suficiente para desdibujar ese sentido en la traducción principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo con el control inglés y no presenta revisiones aplicadas en el historial reciente; la redacción española sigue directamente la decisión léxica y teológica ya auditada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero en este versículo no aparece el tetragrámaton.
  - «Cuervos» se usa en sentido zoológico ordinario, coherente con la lectura auditada del hebreo.
  - Se conserva el valor futuro de la secuencia verbal sin volverla excesivamente literal o arcaizante.
