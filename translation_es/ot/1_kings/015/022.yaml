base_translation:
  language: en
  yaml_path: translation/ot/1_kings/015/022.yaml
  text: Then King Asa summoned all Judah—no one was exempt—and they carried away the stones of Ramah and its timber[a], with which Baasha had built[c][b], and King Asa built with them Geba of Benjamin and Mizpah.
  footnotes:
  - marker: a
    text: Or 'proclaimed to all Judah.' The Hebrew verb literally means 'caused to hear.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''there is no exempt one,'' meaning that no person was excused from the labor.'
    reason: lexical_alternative
  - marker: c
    text: The clause 'with which Baasha had built' refers to the stones and timber as the materials Baasha used in fortifying Ramah.
    reason: lexical_alternative
