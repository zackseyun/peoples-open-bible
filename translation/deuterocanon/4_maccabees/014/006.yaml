translation:
  text: For just as hands and feet move in harmony with the directions of the soul[a], so those holy youths also, as if by the immortal soul of godliness[b], were in harmony with death for its sake.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'piety' for 'godliness' (εὐσέβεια).
    reason: lexical_alternative
  - marker: b
    text: 'The Greek repeats συμφων- language: the limbs move ''in harmony,'' and the youths ''were in accord'' with death, highlighting their unified resolve.'
    reason: cross_reference
lexical_decisions:
- source_word: καθάπερ
  chosen: just as
  alternatives:
  - even as
  - just as indeed
  lexicon: LSJ
  rationale: Introduces the first half of a comparison; 'just as' is natural English and preserves the simile structure carried forward by οὕτως.
- source_word: συμφώνως
  chosen: in harmony
  alternatives:
  - harmoniously
  - in agreement
  lexicon: LSJ
  rationale: The adverb conveys concord or accord. 'In harmony' fits the body-part metaphor and prepares for the repeated συμφων- wordplay later in the verse.
- source_word: τοῖς τῆς ψυχῆς ἀφηγήμασιν
  chosen: the directives of the soul
  alternatives:
  - the commands of the soul
  - the leadings of the soul
  - the instructions of the soul
  lexicon: LSJ
  rationale: ἀφήγημα can denote guidance, direction, or command. 'Directives' preserves the sense of governing guidance without sounding overly harsh, matching the analogy of limbs obeying the soul.
- source_word: ἱεροὶ μειρᾶκες
  chosen: holy youths
  alternatives:
  - sacred youths
  - holy young men
  lexicon: LSJ
  rationale: μειρᾶκες refers to young men/youths. 'Holy youths' is concise, readable, and preserves the consecrated moral status marked by ἱεροί.
- source_word: ὡς ὑπὸ ψυχῆς ἀθανάτου τῆς εὐσεβείας
  chosen: as if by the immortal soul of godliness
  alternatives:
  - as though by the immortal soul of piety
  - as if under the immortal soul of reverence
  lexicon: LSJ
  rationale: ὡς here marks comparison rather than a literal metaphysical claim. εὐσέβεια in 4 Maccabees is a key virtue often rendered 'piety' or 'godliness'; 'godliness' is more accessible modern English while retaining religious weight.
- source_word: πρὸς τὸν ὑπὲρ αὐτῆς ... θάνατον
  chosen: with death for its sake
  alternatives:
  - toward death on its behalf
  - for the death endured for it
  - with the death for her sake
  lexicon: LSJ
  rationale: The phrase indicates death undergone on behalf of godliness. English requires some smoothing; 'with death for its sake' keeps the preposition's orientation while remaining readable.
- source_word: συνεφώνησαν
  chosen: were in accord with
  alternatives:
  - agreed with
  - were in harmony with
  - consented to
  lexicon: LSJ
  rationale: This verb echoes συμφώνως earlier, creating a deliberate concord motif. 'Were in accord with' preserves that semantic link better than a flatter 'accepted' or 'submitted to'.
