  - severity: medium
    issue: '''inclinándose hacia lo vil'' no refleja del todo el matiz de ἐκνεύοντες'
    rationale: El participio sugiere desviación o apartamiento moral continuo; 'inclinándose' puede expresar mera tendencia. 'Desviándose hacia lo vil' preserva mejor la imagen de torcerse hacia lo bajo.
  revised_spanish_text: Pero los que esperaban lo contrario, y en su maldad innata rechazaron lo bueno, desviándose sin cesar hacia lo vil,
