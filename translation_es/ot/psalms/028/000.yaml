review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: encabezado davídico, invocación a Yahvé, metáfora «mi roca», distinción entre los dos verbos (no oír / callar) y descenso a la fosa. Sin embargo, «para que no calles ante mí» introduce un matiz final impropio del hebreo; aquí פן expresa prevención negativa, mejor «no sea que calles». Además, «ante mí» es menos fiel que «a mí»/«conmigo» para מִמֶּנִּי en esta cláusula.'
  spanish_quality_summary: El texto es legible y digno, pero «no seas sordo para conmigo» suena algo rígido en español actual, y la secuencia «para que no calles ante mí» resulta poco natural y semánticamente imprecisa. Una leve revisión mejora claridad y fluidez sin perder el paralelismo poético.
  glossary_alignment: 'Correcto en lo principal: «Yahvé» sigue la política del proyecto; «mi roca» preserva la metáfora; «la fosa» mantiene la amplitud de בור. La distinción entre «sordo» y «calles/guardes silencio» debe mantenerse, pero conviene expresarla con sintaxis más natural en español.'
  issues:
  - severity: medium
    issue: Uso de «para que no» para traducir פן
    rationale: En este contexto expresa «no sea que / para que no suceda que», no un propósito directo. «Para que no calles» puede leerse como finalidad del ruego, no como consecuencia temida.
  - severity: medium
    issue: «ante mí» para מִמֶּנִּי en la segunda cláusula
    rationale: La preposición hebrea aquí se refleja mejor con «a mí» o «conmigo/de mí», como en el inglés POB «silent to me». «Ante mí» desplaza el foco a presencia espacial.
  - severity: low
    issue: «para conmigo» suena acartonado
    rationale: No es incorrecto, pero «no te hagas el sordo conmigo» sería demasiado coloquial; una solución más natural y digna es «no te hagas sordo a mi clamor» o mantener una formulación formal más directa.
  - severity: low
    issue: Nota a en razón mal categorizada
    rationale: La alternativa «Salmo de David» no es variante textual sino alternativa de encabezado/traducción. No impide comprensión, pero la justificación podría alinearse mejor con la evidencia.
