revisions:
- from: 'diciendo[a]: «Por favor, volved, cada uno de su camino malo y de la maldad de sus obras[b], y habitad en la tierra que Yahvé les dio a ustedes y a sus padres, desde hace mucho tiempo y para siempre».'
  to: 'diciendo[a]: «Por favor, vuélvanse, cada uno de su mal camino y de la maldad de sus obras, y habiten en la tierra que Yahvé les dio a ustedes y a sus padres, desde antiguo[b] y para siempre»'
  rationale: Se ajustó el texto al español neutral latinoamericano sustituyendo las formas de vosotros por «vuélvanse» y «habiten». Se mejoró la naturalidad con «mal camino». Se afinó לְמִן עוֹלָם como «desde antiguo», más fiel al registro y al modismo temporal hebreo. Se simplificaron las notas para que expliquen el hebreo y la decisión española directamente. No se requiere adjudicación especial.
  reviewer_model: gpt-5.4
