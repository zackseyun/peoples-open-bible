review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: mantiene los dos verbos iniciales, conserva «palabras», la finalidad de bienestar, la causalidad de כִּי, y el nombre divino «Yahvé». Sin embargo, no sigue del todo la decisión auditada del POB sobre בָנֶיךָ como sentido amplio de posteridad. En español, «hijos» tiende a leerse más estrechamente que «children» en inglés, por lo que conviene ajustar a «hijos[a]» con nota más clara o preferiblemente a «hijos[a] ...»? No; para fidelidad a la auditoría y claridad española, «hijos[a]» sigue siendo más estrecho. Además, la colocación de las notas tiene un pequeño problema de anclaje/fluidez.'
  spanish_quality_summary: 'El español es claro y digno, pero hay detalles mejorables: la nota [a] está separada de «escucha» por un espacio innecesario; «para siempre» suena algo rígido unido a «después de ti», donde «por siempre» o «para siempre» ambos valen, pero el conjunto mejora si se conserva y se reordena mínimamente. La mayor mejora de legibilidad y fidelidad es usar «tus hijos[a]» solo si la nota explica posteridad; aun mejor, «tus hijos[a] después de ti» sigue siendo natural. El resto del versículo suena bien.'
  glossary_alignment: 'Alineado con el glosario en «Yahvé», «Dios», y el mantenimiento de «palabras». No hay conflicto teológico mayor. La principal desalineación es con la decisión documentada del POB sobre בָנֶיךָ: el inglés eligió «children» por sentido amplio; en español «hijos» puede conservarse solo con nota suficientemente explícita, pero «hijos» no reproduce por sí solo ese ensanchamiento semántico. Dado que «hijos» es también bastante bíblico y directo, basta una reparación menor en texto/nota, sin requerir adjudicación superior.'
  issues:
  - severity: medium
    issue: «tus hijos» estrecha más que la decisión auditada «children»
    rationale: Aunque בָנֶיךָ puede traducirse literalmente «hijos», la auditoría inglesa documenta un sentido amplio de posteridad. En español, «hijos» suele sentirse más masculino/específico que «children» en inglés, así que la nota debe compensarlo con mayor precisión.
  - severity: low
    issue: Anclaje de nota con espacio antes de [a] y [b]
    rationale: Las notas deben ir pegadas al término o frase relevante en `spanish_text` para cumplir la disciplina formal del proyecto.
  - severity: low
    issue: Redacción de la nota [b] mejorable
    rationale: La nota actual dice «se conserva el sentido de descendencia/posteridad», pero el texto principal sigue usando «hijos». Conviene explicar que aquí «hijos» se entiende en sentido amplio de descendencia/posteridad.
  revised_spanish_text: Guarda y escucha[a] todas estas palabras que yo te mando, para que te vaya bien a ti y a tus hijos[b] después de ti para siempre, porque harás lo bueno y lo recto ante los ojos de Yahvé tu Dios.
  revised_footnotes:
