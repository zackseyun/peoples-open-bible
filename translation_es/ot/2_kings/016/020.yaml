translation:
  language: es
  text: Y Ahaz durmió con sus padres[a] y fue sepultado con sus padres en la ciudad de David, y Ezequías su hijo reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo 'durmió con sus padres' es una fórmula real convencional para indicar que Ahaz murió y se reunió con sus antepasados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: se acostó
  alternatives_spanish:
  - durmió
  - murió
  lexicon: HALOT
  rationale: En la fórmula real de muerte, שׁכב con 'con sus padres' funciona como un modismo convencional. En español, 'se acostó' conserva la imagen idiomática sin convertirla demasiado pronto en una glosa interpretativa como 'murió'.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  - con sus padres ancestrales
  lexicon: HALOT
  rationale: '''Padres'' sigue de cerca el hebreo y mantiene el valor dinástico/formular. ''Antepasados'' explicita el sentido, pero pierde la textura tradicional de la fórmula real.'
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - fue inhumado
  lexicon: HALOT
  rationale: El nifal pide una pasiva natural. 'Sepultado' es digna y clara en registro bíblico actual; 'enterrado' también es posible, pero algo menos formal.
- source_word: בְּעִיר דָּוִד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la ciudad de David
  - en la ciudad de David
  lexicon: HALOT
  rationale: Se conserva el nombre tradicional y transparente del lugar. No se introduce una paráfrasis posesiva porque el hebreo usa la forma fija 'ciudad de David'.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - empezó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: '''Reinó'' reproduce de manera natural la fórmula de sucesión. ''Empezó a reinar'' añade un matiz aspectual que el hebreo no requiere aquí.'
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Hizquías
  - Jizquías
  lexicon: Standard Spanish biblical proper name convention
  rationale: Se usa la forma española bíblica establecida para el nombre propio, que es inteligible y reconocible para la audiencia hispanohablante.
- source_word: בְנ֖/וֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su hijo
  - el hijo de él
  lexicon: HALOT
  rationale: La relación filial es directa y debe mantenerse explícita en la fórmula sucesoria.
- source_word: תַּחְתָּֽי/ו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - después de él
  - en vez de él
  lexicon: HALOT
  rationale: En contexto de sucesión, 'en su lugar' expresa bien la sustitución regia y suena natural en español contemporáneo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y concuerda con la lectura final del POB en inglés: fórmula real de muerte con sentido idiomático preservado, sepultura en la Ciudad de David y sucesión de Ezequías sin cambios de contenido.'
  spanish_consistency_notes:
  - Se mantuvo 'padres' para preservar la fórmula dinástica hebrea, no 'antepasados'.
  - '''Se acostó'' conserva el modismo, mientras la nota aclara el sentido de muerte para evitar ambigüedad.'
  - '''En su lugar'' refleja la idea sucesoria de תַּחְתָּיו sin forzar ''después de él''.'
  - Se usó 'Ezequías' como forma española estándar del nombre propio.
