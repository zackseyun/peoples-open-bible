translation:
  language: es
  text: a quien yo mismo veré para mí mismo, y mis ojos verán, y no otro[a]. Mis riñones[b] se consumen dentro de mi seno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente, «y no un extraño». El sentido puede ser: «yo mismo lo veré, no otra persona».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «mis riñones», imagen del interior o de las emociones profundas.'
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: whom
  chosen_spanish: al que
  alternatives_spanish:
  - a quien
  - quien
  lexicon: HALOT
  rationale: El relativo apunta al antecedente personal del versículo anterior. En español, 'al que' conserva la relación pronominal con valor personal sin forzar una construcción más marcada que el hebreo no exige.
- source_word: אֲנִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - mismo yo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. 'Yo mismo' reproduce esa insistencia de manera natural en español.
- source_word: אֶחֱזֶה
  english_pob_choice: will see
  chosen_spanish: veré
  alternatives_spanish:
  - contemplaré
  - veré con mis propios ojos
  lexicon: HALOT
  rationale: חזָה puede tener matiz de contemplar o ver con intensidad, pero el contexto poético y la revisión inglesa favorecen el verbo simple 'ver'. 'Veré' mantiene claridad y evita añadir una interpretación no exigida.
- source_word: לִּי
  english_pob_choice: for myself
  chosen_spanish: por mí
  alternatives_spanish:
  - para mí
  - para mí mismo
  lexicon: HALOT
  rationale: La partícula dativa es difícil y enfática. 'Por mí' conserva la apropiación personal sin convertirlo en una expresión más interpretativa que el hebreo.
- source_word: וְעֵינַי
  english_pob_choice: and my eyes
  chosen_spanish: y mis ojos
  alternatives_spanish:
  - y mis propios ojos
  lexicon: HALOT
  rationale: Se mantiene el paralelismo literal del miembro poético y la referencia explícita a los ojos.
- source_word: רָאוּ
  english_pob_choice: will see
  chosen_spanish: verán
  alternatives_spanish:
  - mirarán
  - contemplarán
  lexicon: HALOT
  rationale: La forma verbal se vierte también en futuro para conservar el paralelismo con la cláusula anterior y la repetición del campo semántico de 'ver'.
- source_word: וְלֹא זָר
  english_pob_choice: and not another
  chosen_spanish: y no otro
  alternatives_spanish:
  - y no un extraño
  - y no un forastero
  lexicon: HALOT
  rationale: זָר puede significar 'extraño/forastero' o simplemente 'otro'. En este contexto el contraste principal es que Job mismo, y no otra persona, verá. 'Y no otro' preserva esa tensión y sigue la decisión inglesa revisada.
- source_word: כָּלוּ
  english_pob_choice: fail
  chosen_spanish: se consumen
  alternatives_spanish:
  - desfallecen
  - se acaban
  - perecen
  lexicon: HALOT
  rationale: כלה expresa agotamiento o consumición interna. 'Se consumen' refleja con mayor fuerza el desgaste vital/emocional sin suavizarlo.
- source_word: כִלְיֹתַי
  english_pob_choice: my kidneys
  chosen_spanish: mis riñones
  alternatives_spanish:
  - mis entrañas
  - mi interior
  lexicon: HALOT
  rationale: Se conserva el término literal y corporal del hebreo, tal como hace la POB inglesa, para no borrar la imagen del órgano como sede del afecto y la interioridad.
- source_word: בְּחֵקִי
  english_pob_choice: within my bosom
  chosen_spanish: dentro de mi seno
  alternatives_spanish:
  - en mi seno
  - dentro de mí
  lexicon: HALOT
  rationale: חֵיק es 'seno/bosom/lap'. 'Dentro de mi seno' preserva la imagen concreta con un español digno y comprensible.
theological_decisions:
- issue: Naturaleza de la expectativa de Job al ver al redentor/defensor
  english_pob_reading: The verse describes Job's personal future seeing of the one mentioned previously, without specifying whether this is bodily resurrection, vindication before death, or a purely spiritual encounter.
  chosen_spanish_reading: El versículo describe que Job mismo lo verá en el futuro, sin precisar si se trata de resurrección corporal, vindicación en esta vida o un encuentro espiritual.
  alternative_spanish_readings:
  - resurrección corporal
  - vindicación en esta vida
  - visión espiritual después de la muerte
  rationale: El hebreo subraya la certeza de la visión personal, pero no resuelve el debate doctrinal más amplio. La traducción conserva esa tensión en vez de decidirla por adelantado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió repetir 'see' en ambas cláusulas visuales por mayor consistencia léxica. En español se conserva esa repetición con 'veré/verán', y se mantiene la imagen corporal de 'riñones' y 'seno' por fidelidad al hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención general del proyecto, pero este versículo no lo menciona explícitamente.
  - Se mantiene el paralelismo poético de primera persona y visión directa.
  - Se evita 'Cristo' y se evita resolver aquí la identificación teológica del antecedente.
  - La duplicación de 'ver' sigue el movimiento del hebreo y la revisión inglesa.
  - '''Riñones'' se conserva por primacía de la imagen hebrea, con nota explicativa para lectores modernos.'
