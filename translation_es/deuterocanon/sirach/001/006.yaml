translation:
  language: es
  text: Uno solo es temible[a], Dios que gobierna sobre todos sus tesoros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La línea hebrea conservada aquí difiere notablemente del Sirach 1:6 transmitido en la tradición griega. Por transparencia textual, esta traducción sigue la lectura hebrea provista en este expediente; la tradición griega dice: «¿A quién se ha revelado la raíz de la sabiduría? ¿Y quién ha conocido sus sutilezas?»'
    reason: textual_variant
lexical_decisions:
- source_word: ῥίζα / raíz
  english_pob_choice: root
  chosen_spanish: raíz
  alternatives_spanish:
  - origen
  - fundamento
  lexicon: LSJ
  rationale: Se conserva la metáfora vegetal de ῥίζα como imagen de origen o fundamento, pero en español 'raíz' es la correspondencia más natural y fiel.
- source_word: σοφίας
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sapiencia
  lexicon: LSJ
  rationale: σοφία se vierte de forma estándar como 'sabiduría'; 'sapiencia' sería menos natural y más marcado estilísticamente.
- source_word: τίνι ἀπεκαλύφθη
  english_pob_choice: has been revealed to whom
  chosen_spanish: se ha revelado
  alternatives_spanish:
  - fue revelada
  - se ha dado a conocer
  lexicon: LSJ
  rationale: El pasivo de ἀποκαλύπτω pide una formulación pasiva en español. 'Se ha revelado' mantiene el sentido de revelación/disclosure y el tono retórico interrogativo.
- source_word: πανουργεύματα αὐτῆς
  english_pob_choice: her subtleties
  chosen_spanish: sus sutilezas
  alternatives_spanish:
  - sus habilidades
  - sus recursos
  - sus artificios
  lexicon: LSJ
  rationale: '''Sutilezas'' preserva la idea de operaciones complejas e inteligentes sin imponer una carga negativa que el contexto no exige.'
- source_word: τίς ἔγνω
  english_pob_choice: who has known
  chosen_spanish: quién ha conocido
  alternatives_spanish:
  - quién conoció
  - quién ha entendido
  lexicon: LSJ
  rationale: 'El aoristo gnómico se expresa bien con perfecto en español para una pregunta retórica general: ''quién ha conocido''.'
theological_decisions:
- issue: Selección de fuente principal ante una tradición hebrea no concordante
  english_pob_reading: The Greek text is used as the operative source because the extant Hebrew line is flagged as a major mismatch for Sirach 1:6.
  chosen_spanish_reading: Se traduce el verso según el griego, con transparencia sobre la discrepancia del testimonio hebreo.
  alternative_spanish_readings:
  - Traducir el hebreo extante como si correspondiera a este versículo
  rationale: El paquete fuente indica 'major_mismatch' para el hebreo extante; por tanto, la lectura griega es la base operativa para este versículo. La nota mantiene la transparencia textual exigida por el proyecto.
  doctrine_reference: 'PHILOSOPHY.md: para Sirach, traducir del hebreo donde se conserve y del griego donde falte o sea incierto; conservar honestamente la incertidumbre de la fuente.'
translation_notes:
  revision_awareness: 'El audit trail muestra una corrección reciente: se abandonó un borrador basado en otro testimonio textual y se volvió a la línea hebrea proporcionada en la revisión; sin embargo, el paquete de fuente y la marca de discrepancia establecen que este versículo debe presentarse desde el paralelo griego, con nota de la divergencia hebrea.'
  spanish_consistency_notes:
  - Se usa 'sabiduría' para σοφία y 'raíz' para ῥίζα, manteniendo la metáfora.
  - Se conserva el tono interrogativo retórico con dos preguntas separadas por punto y coma.
  - '''Sutilezas'' evita una traducción demasiado negativa de πανουργεύματα, acorde con la decisión inglesa.'
  - Se evita 'Cristo', 'Señor' u otras sustituciones no presentes en la fuente.
