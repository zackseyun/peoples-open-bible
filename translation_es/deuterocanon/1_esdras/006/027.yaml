translation:
  language: es
  text: Y yo también di órdenes de que se reconstruyera por completo, y de que se prestara atención[a] para que cooperaran con los del cautiverio de Judea[b], hasta que la casa del Señor quedara terminada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se mirara atentamente», «se velara». El verbo griego significa literalmente «mirar fijamente», pero aquí probablemente tiene un sentido administrativo de supervisión: «ocuparse de ello» o «asegurarse de ello».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con los exiliados de Judea». La expresión griega dice literalmente «con los de la cautividad de Judea».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀγὼ δὲ
  english_pob_choice: And I also
  chosen_spanish: Y yo también
  alternatives_spanish:
  - Y también yo
  - Yo también
  lexicon: LSJ
  rationale: Mantiene el valor aditivo de κἀγώ y el enlace discursivo de δέ sin perder naturalidad en español. El pronombre explícito conserva el tono personal y autoritativo del decreto.
- source_word: ἐπέταξα
  english_pob_choice: gave orders
  chosen_spanish: di órdenes
  alternatives_spanish:
  - mandé
  - di un mandato
  lexicon: LSJ
  rationale: Ἐπιτάσσω expresa una orden con autoridad; 'di órdenes' suena natural en español moderno y conserva la fuerza directiva sin cargar el texto con una formulación más técnica de edicto.
- source_word: ὁλοσχερῶς
  english_pob_choice: fully
  chosen_spanish: por completo
  alternatives_spanish:
  - completamente
  - totalmente
  lexicon: LSJ
  rationale: Reproduce el matiz de totalidad del adverbio y encaja bien con la reconstrucción del edificio.
- source_word: οἰκοδομῆσαι
  english_pob_choice: be fully rebuilt
  chosen_spanish: se reconstruyera
  alternatives_spanish:
  - se edificara de nuevo
  - se volviera a construir
  lexicon: LSJ
  rationale: El infinitivo de propósito/decreto apunta a la acción sobre el edificio existente; 'reconstruyera' comunica mejor que un simple 'edificar' la restauración del templo.
- source_word: ἀτενίσαι
  english_pob_choice: that attention be given
  chosen_spanish: se prestara atención
  alternatives_spanish:
  - se mirara atentamente
  - se velara
  lexicon: LSJ
  rationale: El verbo literalmente es 'mirar fijamente', pero en contexto administrativo implica vigilancia cuidadosa. 'Se prestara atención' refleja esa supervisión requerida por el rey.
- source_word: ἵνα συνποιῶσιν
  english_pob_choice: so that they may work together
  chosen_spanish: para que cooperaran
  alternatives_spanish:
  - para que trabajaran juntos
  - para que ayudaran
  lexicon: LSJ
  rationale: El compuesto sugiere actuar conjuntamente o colaborar en la obra. 'Cooperaran' conserva la idea de trabajo conjunto con un registro claro y bíblico.
- source_word: τοῖς ἐκ τῆς αἰχμαλωσίας τῆς Ἰουδαίας
  english_pob_choice: with those from the captivity of Judea
  chosen_spanish: con los que venían del cautiverio de Judea
  alternatives_spanish:
  - con los exiliados de Judea
  - con los que salían del cautiverio de Judea
  lexicon: LSJ
  rationale: La frase identifica a los retornados desde el cautiverio/exilio de Judea. 'Venían del cautiverio de Judea' conserva el sentido de procedencia y la fuerza del sustantivo cautiverio.
- source_word: μέχρι τοῦ ἐπιτελεσθῆναι
  english_pob_choice: until ... is finished
  chosen_spanish: hasta que ... quedara terminada
  alternatives_spanish:
  - hasta que ... se terminara
  - hasta el término de
  lexicon: LSJ
  rationale: La construcción temporal marca duración hasta la finalización. 'Quedara terminada' expresa bien el resultado completo del edificio y mantiene el sentido de telos/completitud.
- source_word: τὸν οἶκον
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa del templo
  lexicon: LSJ
  rationale: Se conserva la imagen fuente 'house' en vez de sustituirla por 'templo', tal como hace la POB en inglés, para mantener la metáfora bíblica del lugar de culto.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  - del Señor Dios
  lexicon: LSJ
  rationale: En este texto griego de 1 Esdras, κυρίου corresponde al título reverencial 'Lord/Señor'. La traducción 'Señor' preserva el paralelo auditado del POB inglés y evita introducir una equivalencia hebraizante no presente en el griego base.
theological_decisions:
- issue: Valor de κυρίου en un contexto del templo
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: El texto griego usa κυρίου, no el tetragrama hebreo. Siguiendo el audit trail del POB inglés, 'Señor' mantiene la lectura directa del griego y la referencia al dueño/soberano del templo sin forzar una sustitución por Yahvé.
  doctrine_reference: 'DOCTRINE.md contested terms: κύριος → Lord; יְהוָה → Yahvé'
translation_notes:
  revision_awareness: 'La versión sigue de cerca la decisión auditada en inglés: orden real, reconstrucción completa, supervisión administrativa y cooperación con los retornados de Judea hasta la terminación del edificio. No se introdujeron ampliaciones interpretativas ni cambios de terminología que alteren el alcance del griego.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κυρίου, coherente con el POB inglés y con el uso reverencial en español.
  - '''Cautiverio de Judea'' preserva la procedencia del grupo y la tensión entre cautiverio/exilio documentada en el inglés.'
  - '''Casa'' se conserva frente a ''templo'' para respetar la imagen del texto fuente.'
  - El estilo es formal y publicable, sin depender de calcos duros cuando el español requiere fluidez.
