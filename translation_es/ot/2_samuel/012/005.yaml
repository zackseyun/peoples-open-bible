translation:
  language: es
  text: 'Entonces David se encendió muchísimo de ira contra el hombre, y dijo a Natán: «¡Vive Yahvé! El hombre que ha hecho esto es hijo de muerte[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijo de muerte», es decir, uno que merece morir o es digno de muerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: burned with anger
  chosen_spanish: se encendió de ira
  alternatives_spanish:
  - ardió de ira
  - se llenó de ira
  - se enfureció
  lexicon: HALOT
  rationale: El hebreo expresa literalmente una ira que ‘arde’. En español, «se encendió de ira» conserva la imagen y suena natural; «ardió de ira» es posible pero algo más marcado, y «se enfureció» pierde la metáfora.
- source_word: בָּאִישׁ
  english_pob_choice: against the man
  chosen_spanish: contra el hombre
  alternatives_spanish:
  - contra ese hombre
  - al hombre
  lexicon: HALOT
  rationale: La preposición marca el objeto de la ira de David. «Contra el hombre» mantiene el matiz de enfrentamiento/judicialidad presente en el contexto de la parábola de Natán.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: mucho
  alternatives_spanish:
  - grandemente
  - en gran manera
  - muy
  lexicon: HALOT
  rationale: El adverbio intensifica la ira. En español, «mucho» funciona como intensificador adverbial sin recargar la frase; también puede entenderse con la fuerza de la revisión inglesa que restituyó מְאֹד.
- source_word: חַי יְהוָה
  english_pob_choice: As Yahweh lives
  chosen_spanish: ¡Vive Yahvé!
  alternatives_spanish:
  - Por la vida de Yahvé
  - Tan cierto como vive Yahvé
  lexicon: HALOT
  rationale: Es una fórmula de juramento. «¡Vive Yahvé!» reproduce el hebreo de forma breve, solemne y fiel al nombre divino pedido por la política terminológica del proyecto.
- source_word: בֶן מָוֶת
  english_pob_choice: a son of death
  chosen_spanish: digno de muerte
  alternatives_spanish:
  - hijo de muerte
  - merecedor de muerte
  - condenado a muerte
  lexicon: HALOT
  rationale: El hebreo es un modismo que significa que la persona merece morir o es culpable de muerte. En español, el modismo literal «hijo de muerte» resultaría opaco; por eso se explicita el sentido en la línea principal. La nota preserva la lectura literal como alternativa auditable.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - ese hombre
  - aquel hombre
  lexicon: HALOT
  rationale: Se refiere al hombre rico de la parábola. «El hombre» es la equivalencia directa y mantiene la definitud del hebreo.
- source_word: הָעֹשֶׂה זֹאת
  english_pob_choice: who has done this
  chosen_spanish: que ha hecho esto
  alternatives_spanish:
  - que hizo esto
  - el que ha hecho esto
  lexicon: HALOT
  rationale: El participio identifica al culpable por su acción. La oración relativa en español es la forma más clara y natural de reflejarlo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto contiene el Tetragrama directamente y el proyecto pide «Yahvé» en el texto principal. Se conserva así el nombre propio del pacto en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tratamiento del modismo בֶן מָוֶת
  english_pob_reading: a son of death
  chosen_spanish_reading: digno de muerte
  alternative_spanish_readings:
  - hijo de muerte
  - merecedor de muerte
  - es hombre de muerte
  rationale: No se borra la fuerza judicial del hebreo; simplemente se la hace inteligible en español. La nota conserva la tensión entre la forma idiomática del original y su sentido jurídico.
  doctrine_reference: DOCTRINE.md Translation philosophy 1, 3, 6
translation_notes:
  revision_awareness: La revisión inglesa añadió explícitamente la intensificación de מְאֹד con «greatly» y mantuvo «burned with anger» y «son of death». La versión española refleja esa intensificación con «mucho» y conserva la imagen de ira encendida, pero evita el modismo literal opaco «hijo de muerte» en el texto principal, explicándolo en nota para mantener auditabilidad.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה según la terminología del proyecto.
  - Se traduce δοῦλος no relevante aquí; no aplica.
  - Se preserva el tono judicial y solemne del juramento.
  - La frase «el hombre» corresponde al referente definido del relato y no introduce matiz interpretativo extra.
