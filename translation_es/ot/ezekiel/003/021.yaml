revisions:
- from: Pero si adviertes al justo para que no peque[a], y él no peca, ciertamente vivirá, porque tomó advertencia; y tú habrás librado tu vida.
  to: Pero si adviertes al justo para que no peque, y él no peca, ciertamente vivirá, porque hizo caso a la advertencia[a]; y tú habrás librado tu vida.
  rationale: Se conserva el sentido del hebreo y del POB inglés, pero se corrige la ubicación de la nota al pie para reflejar la ambigüedad real de נִזְהָר y se sustituye una expresión poco natural ('tomó advertencia') por una formulación idiomática en español que sigue preservando el sentido mediante nota.
