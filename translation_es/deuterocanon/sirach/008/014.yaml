review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo primario de Sirácides 8:14 y conserva la variante griega en nota. Los elementos clave del hebreo están bien representados: prohibición con צלח, imagen concreta de נחלה, singular representativo רשע, consecuencia ardiente con בער, y la metáfora de las chispas de su fuego.'
  spanish_quality_summary: 'El español es claro y fiel, pero tiene una aspereza importante: «No prosperes en la herencia de un hombre malvado» suena poco natural en español y puede interpretarse como prosperar dentro de la herencia ya poseída, más que buscar medro por medio de ella. Además, «no sea que seas quemado» es gramatical, pero menos idiomático que «no sea que termines quemado». Conviene un ajuste mínimo para mejorar legibilidad sin perder la extrañeza deliberada del hebreo.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hombre malvado», «herencia», «chispas» y «su fuego» son compatibles con las decisiones auditadas. La nota textual sobre la divergencia griego/hebreo también está bien orientada.
  issues:
  - severity: medium
    issue: La frase «prosperes en la herencia» resulta poco idiomática en español.
    rationale: Aunque refleja de cerca «in the inheritance of», en español puede sonar torpe o ambigua. «Prosperes por la herencia» expresa mejor la idea de medro por asociación con el patrimonio del malvado, que es la advertencia contextual indicada por la auditoría.
  - severity: low
    issue: «No sea que seas quemado» es algo rígido.
    rationale: No es incorrecto, pero «no sea que termines quemado» o «no sea que te quemes» lee mejor en español moderno. Como el inglés auditado preserva una voz pasiva-like, «termines quemado» mantiene bien el efecto sin sonar calcado.
  revised_spanish_text: No prosperes por la herencia de un hombre malvado[a], no sea que termines quemado por las chispas de su fuego.
  revised_footnotes:
  - marker: a
    text: 'El testigo griego (Swete/LXX) tiene aquí una sentencia diferente: «No litigues con un juez, porque juzgarán a su favor según su prestigio». En cambio, el texto hebreo de la Geniza de El Cairo advierte contra la participación en la herencia de un hombre malvado.'
    reason: textual_variant
  revision_rationale: Se hizo una reparación menor para que el español exprese con mayor naturalidad la advertencia hebrea sin perder su fuerza léxica. «Por la herencia» comunica mejor la idea de prosperar mediante o a costa del patrimonio del malvado, y «termines quemado» mejora la fluidez manteniendo la imagen de sufrir daño por su fuego. También se pulió ligeramente la nota para un español más natural.
