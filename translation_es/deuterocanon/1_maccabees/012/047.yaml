    text: Griego literalmente, «consigo mismo».
    reason: lexical_alternative
  - marker: b
    text: O «se unieron a él»; el verbo griego más literalmente significa «vinieron juntamente con él».
    reason: lexical_alternative
  revision_rationale: Se ajusta el último verbo a un español más sobrio y más cercano al griego narrativo, y se añaden las notas léxicas significativas ya preservadas en el expediente inglés para mantener la trazabilidad de las decisiones de traducción.
