translation:
  language: es
  text: Si le eres útil, hará uso de ti; y si te inclinas, no tendrá compasión de ti.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Tradición griega: «El rico hace mal, y hasta bravuconea; el pobre es agraviado, y hasta tiene que suplicar». El testimonio hebreo aquí preservado da otra advertencia sobre cómo una persona poderosa hace uso de ti cuando le eres útil y no muestra piedad cuando te doblegas.'
    reason: alternative_reading
lexical_decisions:
- source_word: אִם תִּכְשַׁר לוֹ
  english_pob_choice: if you are useful to him
  chosen_spanish: si eres útil para él
  alternatives_spanish:
  - si le resultas apto
  - si le eres de provecho
  - si le sirves
  lexicon: HALOT
  rationale: El hebreo expresa idoneidad o conveniencia práctica, no mérito moral. «Útil para él» conserva el matiz de conveniencia personal y encaja con el tono social-explotador del dicho.
- source_word: יַעֲבֹד בָּךְ
  english_pob_choice: he will make use of you
  chosen_spanish: te hará trabajar
  alternatives_spanish:
  - te explotará
  - te empleará
  - te hará servir
  lexicon: HALOT
  rationale: La forma hebrea es idiomática y puede significar ‘usar’ o ‘hacer trabajar’. En español, «te hará trabajar» reproduce la acción de usar a alguien para beneficio propio sin añadir una interpretación más fuerte que el texto exige directamente.
- source_word: וְאִם תִּכְרַע
  english_pob_choice: if you bow down
  chosen_spanish: y si te inclinas
  alternatives_spanish:
  - y si te arrodillas
  - y si caes abatido
  - y si te humillas
  lexicon: HALOT
  rationale: כרע literalmente apunta a doblarse, arrodillarse o inclinarse. «Te inclinas» mantiene esa imagen corporal y su posible sentido de abatimiento o sumisión, con español natural y sobrio.
- source_word: לֹא יַחְמֹל עָלֶיךָ
  english_pob_choice: he will not spare you
  chosen_spanish: no tendrá compasión de ti
  alternatives_spanish:
  - no te perdonará
  - no te tendrá piedad
  - no te mostrará misericordia
  lexicon: HALOT
  rationale: חמל puede expresar ‘compadecerse’, ‘tener piedad’ o ‘perdonar’. En español, «no tendrá compasión de ti» mantiene la dureza del aviso y permite tanto la falta de pity como la falta de clemencia.
- source_word: πλούσιος / πτωχός
  english_pob_choice: kept implicit in the English rather than explicit
  chosen_spanish: implícito en la traducción española
  alternatives_spanish:
  - el rico... el pobre
  - rico... pobre
  lexicon: BDAG
  rationale: La tradición griega ofrece una formulación alternativa centrada en rico/pobre, pero el texto hebreo conservado usa segunda persona. En español se sigue el hebreo principal, dejando la alternativa griega en nota para no perder la tensión textual.
theological_decisions:
- issue: Prioridad del hebreo preservado frente a la tradición griega divergente
  english_pob_reading: Translate the extant Hebrew directly, with the Greek used as a control on sense rather than as the main text
  chosen_spanish_reading: Traducir directamente el hebreo conservado y usar el griego como control de sentido, no como texto base
  alternative_spanish_readings:
  - 'Traducir desde el griego: «El rico hace mal, y hasta bravuconea; el pobre es agraviado, y hasta tiene que suplicar»'
  rationale: La política del proyecto para Sirácida da primacía al hebreo cuando está preservado. Dado el desajuste notable con el griego, la versión española sigue el hebreo, pero una nota conserva la lectura alternativa del testimonio griego para transparencia textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirach desde el hebreo donde se conserva; usar Swete LXX como control paralelo'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que prefirió una imagen corporal cercana a ‘bow down’. En español se optó por «te inclinas», que conserva el gesto de doblarse y su valor social de sumisión o abatimiento, sin introducir un modismo excesivamente literal.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento en segunda persona singular, conforme al hebreo.
  - Se evitó ‘SEÑOR’ u otra sustitución, porque no aparece el Tetragrámaton en este versículo.
  - Se conservó una dicción sobria y sapiencial, sin intensificar innecesariamente a ‘explotar’ o ‘misericordia’ como única opción.
  - La nota a pie preserva la tensión entre el hebreo y la tradición griega, siguiendo la práctica POB de transparencia textual.
