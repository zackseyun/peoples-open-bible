base_translation:
  language: en
  yaml_path: translation/ot/judges/007/025.yaml
  text: And they captured the two princes of Midian[a], Oreb and Zeeb. They killed Oreb at the rock of Oreb, and they killed Zeeb at the winepress of Zeeb. Then they pursued Midian[b], and they brought the heads of Oreb and Zeeb to Gideon from across the Jordan.
  footnotes:
  - marker: a
    text: Oreb is related to the Hebrew word for 'raven,' and Zeeb to the word for 'wolf,' but both are rendered as personal names in the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'from beyond the Jordan.'
    reason: lexical_alternative
