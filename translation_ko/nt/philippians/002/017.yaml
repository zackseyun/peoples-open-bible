id: PHP.2.17
reference: Philippians 2:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ εἰ καὶ σπένδομαι ἐπὶ τῇ θυσίᾳ καὶ λειτουργίᾳ τῆς πίστεως ὑμῶν, χαίρω καὶ συγχαίρω πᾶσιν ὑμῖν·
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/017.yaml
  text: 'But even if I am being poured out as a drink offering upon the sacrifice and service of your faith, I rejoice and rejoice with all of you.'
translation:
  language: ko
  text: 비록 내가 여러분의 믿음[c]의 제물[b]과 제사장적 섬김[a] 위에 부어지는 전제(奠祭)가 된다 할지라도, 나는 기뻐하며 여러분 모두와 함께 그 기쁨을 나눕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「섬김」, 「봉사」. 헬라어 λειτουργία는 일반 섬김도, 제사적 봉사도 가리킬 수 있는데, 「제물」과 함께 쓰인 본 문맥에서는 제사적 어조가 살아 있다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「희생」, 「제사」. 헬라어 θυσία는 제사 행위와 그 제물을 모두 가리킬 수 있다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「여러분의 신실함」. 「믿음」이 본 문맥의 기본 의미이다.
    reason: alternative_reading
lexical_decisions:
- source_word: σπένδομαι
  english_pob_choice: I am being poured out as a drink offering
  chosen_korean: 부어지는 전제가 되다
  alternatives_korean:
  - 전제로 부어지다
  - 음료 제물로 부어지다
  lexicon: BDAG
  rationale: 본 동사는 제사의 전제(奠祭, drink offering)를 부어 드리는 비유를 환기한다. 「전제」를 명시해 제사 비유를 분명히 살리되, 한국어로 「부어지는 전제가 된다」로 자연스럽게 옮긴다.
- source_word: ἐπὶ
  english_pob_choice: upon
  chosen_korean: ~위에
  alternatives_korean:
  - ~에
  - ~과 함께
  lexicon: BDAG
  rationale: 여격과 함께 쓰인 ἐπί는 빌립보 성도의 제물 위에 부어지는 전제의 비유를 보존한다.
- source_word: θυσίᾳ
  english_pob_choice: sacrifice
  chosen_korean: 제물
  alternatives_korean:
  - 제사
  - 희생
  lexicon: BDAG
  rationale: θυσία는 제사적 표준 어휘. 「제물」이 한국어로 제사의 그림을 자연스럽게 환기한다.
- source_word: λειτουργίᾳ
  english_pob_choice: priestly service
  chosen_korean: 제사장적 섬김
  alternatives_korean:
  - 섬김
  - 봉사
  - 사역
  lexicon: BDAG
  rationale: 영어 POB의 결정에 따라, 「제물」과 함께 쓰인 본 문맥의 제사적 어조를 살리기 위해 「제사장적 섬김」으로 옮긴다. 일반적 의미는 각주로 보존한다.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_korean: 믿음
  alternatives_korean:
  - 신실함
  - 신뢰
  lexicon: BDAG
  rationale: 글로사리 기본형. 본 문맥에서는 하나님께 드려지는 제물로서 빌립보 성도의 「믿음의 응답」을 가리킨다.
- source_word: χαίρω
  english_pob_choice: I rejoice
  chosen_korean: 기뻐하다
  alternatives_korean:
  - 즐거워하다
  lexicon: BDAG
  rationale: 빌립보서의 핵심 주제어 「기쁨」을 보존한다. 현재 시제 선언을 한국어로 자연스럽게 옮긴다.
- source_word: συγχαίρω
  english_pob_choice: share my joy with
  chosen_korean: 함께 그 기쁨을 나누다
  alternatives_korean:
  - 함께 기뻐하다
  - 더불어 즐거워하다
  lexicon: BDAG
  rationale: 영어 POB의 결정에 따라 단순 「축하」가 아니라 상호 공유적 기쁨을 살린다. 한국어로 「함께 그 기쁨을 나눈다」가 그 의미를 자연스럽게 담는다.
- source_word: πᾶσιν ὑμῖν
  english_pob_choice: with all of you
  chosen_korean: 여러분 모두와 함께
  alternatives_korean:
  - 여러분 모두와
  lexicon: BDAG
  rationale: 공동체 전체를 가리키는 강조를 보존한다.
theological_decisions:
- issue: 바울의 가능한 죽음에 대한 제사적 비유
  chosen_reading: 바울이 자신을 빌립보 성도의 제물과 제사장적 섬김 위에 부어지는 전제로 비유적으로 묘사함
  alternative_readings:
  - 제사적 강조 없이 단순한 섬김 옆에 부어짐
  rationale: 한 곳에 모인 제사적 어휘 σπένδομαι, θυσία, λειτουργία는 단순 섬김 어휘로 평준화하지 말고 제사·예배의 비유를 보존해야 한다.
