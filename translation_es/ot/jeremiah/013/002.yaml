translation:
  language: es
  text: Así que compré la faja[a], conforme a la palabra de Yahvé, y me la puse en la cintura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cinturón» o «ceñidor»; el hebreo se refiere a una prenda ceñida a la cintura, llevada pegada al cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָ/אֶקְנֶה
  english_pob_choice: So I bought
  chosen_spanish: Entonces compré
  alternatives_spanish:
  - Y compré
  - Luego compré
  lexicon: HALOT
  rationale: El wayyiqtol hebreo narra la acción siguiente en secuencia. En español, «Entonces» mantiene la continuidad narrativa y suena natural, sin perder el valor de avance temporal de la forma verbal.
- source_word: הָ/אֵזוֹר
  english_pob_choice: the loincloth
  chosen_spanish: el cinto
  alternatives_spanish:
  - el cinturón
  - la faja
  - el cinturón de cintura
  lexicon: HALOT
  rationale: אֵזוֹר designa una prenda o pieza ceñida a la cintura. En español, «cinto» preserva mejor que «cinturón» la idea de una prenda/ceñidor cercana al cuerpo; «faja» podría sugerir otro tipo de prenda. Se evita «loincloth» literal por ser poco natural en español, pero se conserva el sentido de una prenda ceñida.
- source_word: כִּ/דְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: La construcción expresa conformidad con el mandato divino. «Conforme a» reproduce bien el matiz formal de la frase y mantiene la referencia explícita a la palabra pronunciada por Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en su forma acordada para español, en lugar de sustituirlo por un título. Esto sigue la decisión doctrinal del proyecto y evita ocultar el Tetragrámaton.
- source_word: וָ/אָשִׂם
  english_pob_choice: and put
  chosen_spanish: y lo puse
  alternatives_spanish:
  - y lo coloqué
  - y lo puse sobre
  lexicon: HALOT
  rationale: El verbo שׂים se traduce de forma directa y natural como «poner». Aquí el objeto ya es claro, por lo que «lo puse» transmite con precisión la acción de colocarlo sobre el cuerpo.
- source_word: עַל מָתְנָי
  english_pob_choice: on my waist
  chosen_spanish: sobre mi cintura
  alternatives_spanish:
  - en mi cintura
  - sobre mis lomos
  - en mis lomos
  lexicon: HALOT
  rationale: מָתְנַיִם refiere a la zona de la cintura/lomos. «Cintura» es la opción más clara y natural en español contemporáneo; «lomos» o «lomos» son más literales pero menos idiomáticos.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo contiene el Nombre divino directamente. Se mantiene «Yahvé» para preservar la distinción entre el Nombre y cualquier título, en continuidad con la política del POB en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo consonante-vocalizado y la auditoría inglesa sin cambios de sentido. Se conserva la secuencia narrativa del wayyiqtol, el matiz de prenda ceñida de אֵזוֹר y la representación explícita del Nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantiene el uso de «Yahvé» para יְהוָה en lugar de «SEÑOR».
  - «Cinto» se emplea como término funcional para una prenda ceñida; la nota preserva las alternativas léxicas relevantes.
  - La sintaxis española mantiene el orden narrativo sin calcar de forma rígida el hebreo.
