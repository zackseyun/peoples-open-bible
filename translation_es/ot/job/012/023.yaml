translation:
  language: es
  text: Él engrandece a las naciones, y las destruye; ensancha a las naciones, y las conduce lejos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las guía». El hebreo puede entenderse como expansión seguida de conducción; el texto principal refleja la probabilidad de un paralelismo de reversa en el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: מַשְׂגִּיא
  english_pob_choice: makes great
  chosen_spanish: engrandece
  alternatives_spanish:
  - hace grandes
  - aumenta
  - magnifica
  lexicon: HALOT
  rationale: El hifil expresa hacer grande o aumentar. «Engrandece» conserva el valor causativo y suena natural en español bíblico actual.
- source_word: לַגּוֹיִם
  english_pob_choice: nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los pueblos
  - a las gentes
  lexicon: HALOT
  rationale: Aquí גּוֹיִם se refiere a entidades políticas o colectividades amplias. «Naciones» mantiene ese alcance sin introducir la oposición técnica «gentiles».
- source_word: וַיְאַבְּדֵם
  english_pob_choice: he destroys them
  chosen_spanish: las destruye
  alternatives_spanish:
  - las hace perecer
  - las arruina
  - las borra
  lexicon: HALOT
  rationale: El verbo de אבד en este contexto tiene fuerza de destruir o hacer perecer. «Las destruye» es breve y conserva el paralelismo con «engrandece».
- source_word: שֹׁטֵחַ
  english_pob_choice: enlarges
  chosen_spanish: ensancha
  alternatives_spanish:
  - extiende
  - amplía
  - alarga
  lexicon: HALOT
  rationale: Aunque la imagen literal sugiere «extender/estirar», en el paralelismo del verso el sentido es expandir el alcance o la extensión de las naciones. «Ensancha» refleja bien esa expansión.
- source_word: וַיַּנְחֵם
  english_pob_choice: he leads them away
  chosen_spanish: las conduce lejos
  alternatives_spanish:
  - las guía
  - las lleva
  - las dirige
  lexicon: HALOT
  rationale: נחה suele significar guiar o conducir. El contexto poético, sin embargo, no exige una idea benévola; por eso «las conduce lejos» preserva el movimiento y la posible tensión de reversa sin forzar una lectura pastoral.
theological_decisions:
- issue: La dirección final de las naciones en el segundo hemistiquio
  english_pob_reading: God enlarges nations and then directs/removes them, not necessarily benevolently guides them.
  chosen_spanish_reading: Dios ensancha a las naciones y luego las conduce lejos, sin convertir el verbo en una guía favorable.
  alternative_spanish_readings:
  - las guía
  - las conduce
  - las aparta
  rationale: El paralelismo del verso presenta soberanía divina sobre crecimiento, destrucción y desplazamiento. «Las conduce lejos» conserva esa tensión y evita suavizar el cierre como si fuera necesariamente benévolo.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que prefirió «enlarges nations» sobre «spreads out nations» por ser más natural y más ajustado al valor léxico de שֹׁטֵחַ; la versión española sigue esa decisión con «ensancha».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exija; este versículo no contiene el nombre divino.
  - Se preserva «naciones» para גּוֹיִם por coherencia con el uso contextual y sin cargar el término con una oposición técnica a Israel.
  - «Conduce lejos» se eligió para reflejar el posible matiz de alejamiento/reversión que el audit trail inglés quiso conservar.
  - La puntuación reproduce el paralelismo del hebreo con dos miembros coordinados por punto y coma.
