base_translation:
  language: en
  yaml_path: translation/ot/judges/016/017.yaml
  text: So he told her all his heart and said to her[a], “A razor has never come upon my head, for I have been a Nazirite of God from my mother’s womb. If I am shaved, then my strength will leave me[c][b], and I will become weak and be like every other man.”
