theological_decisions:
- issue: Syntactic subject of the final participial clause
  chosen_reading: 'The clause is rendered as referring to Naphtali in apposition to the poetic image: ''Naphtali is a doe set free, giving beautiful words.'''
  alternative_readings:
  - 'The final clause refers to the doe image itself: ''a doe let loose that bears beautiful fawns/branches'''
  - 'The line may describe eloquence metaphorically: ''he gives beautiful sayings'''
  rationale: The Hebrew is terse and poetic. The Masoretic pointing supports 'giving words of beauty,' and the participle can naturally continue the description of Naphtali through the metaphor of the doe. This avoids over-resolving the imagery while preserving the MT's lexical data.
  doctrine_reference: Preserve theological/interpreive tension rather than resolve it where the source is genuinely ambiguous.
