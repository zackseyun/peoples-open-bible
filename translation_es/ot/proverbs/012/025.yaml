translation:
  language: es
  text: La angustia en el corazón de un hombre lo deprime[a][b], pero una buena palabra lo alegra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo hace inclinarse». El verbo hebreo presenta la imagen de ser llevado hacia abajo o hecho encorvarse.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «en el corazón de un hombre». El singular «hombre» es representativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: דְּאָגָה
  english_pob_choice: anxiety
  chosen_spanish: angustia
  alternatives_spanish:
  - ansiedad
  - preocupación
  - inquietud
  lexicon: HALOT
  rationale: El hebreo denota un peso interior de preocupación ansiosa. En español, «angustia» comunica bien esa presión interna sin suavizarla como «preocupación» ni volverla demasiado psicológica con «ansiedad» en un contexto proverbial.
- source_word: בְּלֶב אִישׁ
  english_pob_choice: in a man's heart
  chosen_spanish: en el corazón de un hombre
  alternatives_spanish:
  - en el corazón de una persona
  - en el corazón del hombre
  - en el interior de un hombre
  lexicon: HALOT
  rationale: «Corazón» conserva el sentido hebreo del centro interior de la persona. «Un hombre» mantiene el singular representativo del hebreo אִישׁ, sin neutralizar indebidamente el masculino gramatical del texto fuente.
- source_word: יַשְׁחֶנָּה
  english_pob_choice: weighs it down
  chosen_spanish: lo abate
  alternatives_spanish:
  - lo inclina hacia abajo
  - lo hace bajar
  - lo derriba
  lexicon: HALOT
  rationale: El verbo expresa hacer que algo baje o se incline hacia abajo. «Lo abate» mantiene la imagen de descenso/abatimiento en un español natural y breve. El pronombre «lo» sigue la referencia al corazón o al estado interior afectado.
- source_word: וְדָבָר טוֹב
  english_pob_choice: but a good word
  chosen_spanish: pero una buena palabra
  alternatives_spanish:
  - y una buena palabra
  - pero una palabra buena
  - pero un buen mensaje
  lexicon: HALOT
  rationale: Aunque וְ puede ser simplemente «y», el paralelismo antitético pide una relación adversativa en español. «Palabra» es la opción más directa para דָבָר, que aquí puede significar palabra, mensaje o expresión oportuna.
- source_word: יְשַׂמְּחֶנָּה
  english_pob_choice: makes it glad
  chosen_spanish: lo alegra
  alternatives_spanish:
  - lo llena de alegría
  - lo hace feliz
  - lo regocija
  lexicon: HALOT
  rationale: El piel de שׂמח expresa causar alegría. «Lo alegra» es idiomático y fiel al efecto causativo. El pronombre «lo» reproduce la referencia al mismo objeto afectado por el primer hemistiquio.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto fuente y con el audit trail inglés. Se conservó el paralelismo antitético y la imagen corporal de abatimiento/gladness sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se mantuvo «corazón» para לֵב como centro interior de la persona.
  - Se prefirió «una buena palabra» sobre «buen mensaje» por ser más directo y conciso en español.
  - Se usó «lo» para reflejar el pronombre enclítico hebreo de ambos verbos y mantener la cohesión del proverbio.
  - Se optó por un registro bíblico moderno y digno, sin depender de fórmulas eclesiásticas tradicionales.
