  to: 'Los filisteos tuvieron miedo[a], porque dijeron: «Dios ha entrado en el campamento». Y dijeron: «¡Ay de nosotros! Porque nada como esto ha sucedido antes».'
  rationale: Se ajustan los verbos de habla a pasado puntual («dijeron») para reflejar mejor la secuencia narrativa hebrea y el audit trail inglés. También se mejora la naturalidad de la cláusula final con «ha sucedido antes», que expresa con claridad la idea idiomática de que nada semejante había ocurrido previamente, sin sobrecargar el aspecto verbal.
