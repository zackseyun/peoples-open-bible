translation:
  language: es
  text: De la mañana a la tarde cambia el tiempo[a], y todas las cosas son veloces[b] ante Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la temporada cambia» o «la circunstancia cambia»; καιρός puede denotar tiempo, temporada u ocasión según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todas las cosas son rápidas ante Yahvé». La frase puede subrayar cuán rápidamente cambian las cosas ante Dios.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπὸ πρωΐθεν ἕως ἑσπέρας
  english_pob_choice: From morning until evening
  chosen_spanish: Desde la mañana hasta la tarde
  alternatives_spanish:
  - Desde temprano hasta la tarde
  - Desde el amanecer hasta la tarde
  lexicon: LSJ
  rationale: La expresión marca un tramo temporal cotidiano y continuo. «Desde la mañana hasta la tarde» suena natural en español y conserva el alcance idiomático sin sobreespecificar el inicio como «amanecer».
- source_word: μεταβάλλει
  english_pob_choice: changes
  chosen_spanish: cambia
  alternatives_spanish:
  - se altera
  - se modifica
  - se transforma
  lexicon: LSJ
  rationale: El verbo expresa cambio o alteración. «Cambia» reproduce con sencillez la idea proverbial de mutabilidad que presenta el griego.
- source_word: καιρός
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - la temporada
  - la ocasión
  - la circunstancia
  lexicon: LSJ
  rationale: En este contexto, καιρός puede abarcar tiempo, ocasión o circunstancia. «El tiempo» mantiene esa amplitud en español y sigue la decisión auditable del texto inglés de no estrecharlo indebidamente.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo ello
  - todo cuanto
  lexicon: LSJ
  rationale: El plural neutro es comprensivo. «Todas las cosas» conserva el peso formal y la amplitud del griego mejor que una forma más coloquial.
- source_word: ταχινὰ
  english_pob_choice: swift
  chosen_spanish: veloces
  alternatives_spanish:
  - rápidas
  - prontas
  - ligeras
  lexicon: LSJ
  rationale: El adjetivo expresa rapidez. «Veloces» comunica bien esa idea en español y permite mantener la observación general sobre la rapidez de lo que acontece ante Dios.
- source_word: ἔναντι Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - en la presencia de Yahvé
  - a la vista de Yahvé
  lexicon: LSJ
  rationale: La frase significa «delante de / en la presencia de». Se usa «Yahvé» según la norma del proyecto para el nombre divino, manteniendo la orientación relacional y testimonial del original.
theological_decisions:
- issue: Valor de καιρός en un proverbio sapiencial
  english_pob_reading: the time
  chosen_spanish_reading: el tiempo
  alternative_spanish_readings:
  - la temporada
  - la ocasión
  - la circunstancia
  rationale: El verso no limita el sentido a una estación agrícola ni a un instante puntual. «El tiempo» preserva la amplitud sapiencial del término y el carácter general de la observación.
  doctrine_reference: Preservar la amplitud semántica del original sin resolverla prematuramente
- issue: Alcance de πάντα ἐστὶν ταχινὰ ἔναντι Κυρίου
  english_pob_reading: all things are swift before the Lord
  chosen_spanish_reading: todas las cosas son veloces ante Yahvé
  alternative_spanish_readings:
  - todo es rápido ante Yahvé
  - todas las cosas son prontas ante Yahvé
  - todo se mueve con rapidez ante Yahvé
  rationale: La lectura principal enfatiza la rapidez, no la facilidad. Se evita convertir el texto en una afirmación sobre lo «fácil» para Dios, porque el griego apoya mejor la idea de rapidez o celeridad en la perspectiva divina.
  doctrine_reference: Preservar la tensión teológica documentada en el audit trail
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el análisis de control indica alta concordancia; por eso se conserva la lectura principal del audit trail inglés, ajustando únicamente la formulación al español y al criterio del nombre divino del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton conforme a la política del proyecto.
  - «El tiempo» conserva la amplitud de καιρός, sin forzar «temporada» o «ocasión» en el cuerpo principal.
  - «Veloces» refleja rapidez, no facilidad, para no borrar la tensión semántica documentada en el inglés.
  - La estructura sintáctica sigue de cerca el original sin sonar literalista en español.
