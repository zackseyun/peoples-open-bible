translation:
  language: es
  text: No te reprendo por tus sacrificios[a]; tus holocaustos están siempre delante de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te repruebo por tus sacrificios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא
  english_pob_choice: do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No te
  - No te estoy
  lexicon: HALOT
  rationale: La negación simple introduce naturalmente la frase en español y mantiene el tono directo del discurso divino.
- source_word: עַל
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - a causa de
  - con respecto a
  - sobre
  lexicon: HALOT
  rationale: Con un verbo de reprensión, עַל señala el motivo o asunto de la reprensión; «por» comunica bien esa relación sin añadir más de lo que el hebreo dice.
- source_word: זְבָחֶיךָ
  english_pob_choice: your sacrifices
  chosen_spanish: tus sacrificios
  alternatives_spanish:
  - tus ofrendas sacrificiales
  - tus ofrendas
  lexicon: HALOT
  rationale: זֶבַח designa sacrificios en general; «sacrificios» conserva el sentido cultual amplio sin especificar más de la cuenta.
- source_word: אוֹכִיחֶךָ
  english_pob_choice: I do not rebuke you
  chosen_spanish: No te reprendo
  alternatives_spanish:
  - No te repruebo
  - No te acuso
  - No te corrijo
  lexicon: HALOT
  rationale: El verbo en hifil expresa reprobación/reprensión. «Reprendo» es claro en español y preserva la fuerza del reclamo divino.
- source_word: וְעוֹלֹתֶיךָ
  english_pob_choice: your burnt offerings
  chosen_spanish: tus holocaustos
  alternatives_spanish:
  - tus ofrendas quemadas
  - tus holocaustos completos
  lexicon: HALOT
  rationale: עוֹלָה es el término técnico para la ofrenda totalmente quemada. En español bíblico y culto, «holocaustos» comunica ese carácter técnico con precisión.
- source_word: לְנֶגְדִּי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - en mi presencia
  lexicon: HALOT
  rationale: La expresión denota estar a la vista o en la presencia de Dios. «Delante de mí» preserva la imagen espacial y es idiomático en español.
- source_word: תָמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - de continuo
  - constantemente
  lexicon: HALOT
  rationale: El adverbio indica permanencia o continuidad. «Continuamente» reproduce esa idea con claridad y sin matices innecesarios.
theological_decisions:
- issue: Sentido de la reprensión divina respecto de los sacrificios
  english_pob_reading: The verse denies that God's rebuke is based on a lack of sacrifices, not that sacrifices are inherently illegitimate.
  chosen_spanish_reading: El versículo no dice que Dios reprenda por la mera existencia de los sacrificios; más bien, afirma que los holocaustos están siempre delante de él.
  alternative_spanish_readings:
  - Dios no reprende por los sacrificios en sí mismos
  - Dios no acusa por falta de sacrificios
  rationale: La segunda mitad del versículo muestra que el problema no es la ausencia del rito, sino otra cosa en el marco del salmo. La traducción debe conservar esa tensión y no convertir el texto en un rechazo general del sacrificio.
  doctrine_reference: Salmo 50 en su contexto literario; cf. el desarrollo del tema del culto aceptable en los profetas
- issue: Término técnico para עוֹלָה
  english_pob_reading: your burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - burnt offerings
  - ofrendas quemadas
  rationale: Aunque «holocausto» puede tener usos no bíblicos en español moderno, aquí mantiene el valor técnico de la ofrenda totalmente consumida por fuego. Evita perder la precisión cultual del término hebreo.
  doctrine_reference: Lexicografía cultual de la Torá; ofrenda עולה como sacrificio íntegramente quemado
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en la estructura básica: negación de reprensión + relación con los sacrificios + afirmación de la presencia continua de los holocaustos delante de Dios. No se requieren revisiones adicionales frente al último pasaje auditado; se mantuvo la tensión lexical entre reprender/reprobar y la terminología técnica de עוֹלָה.'
  spanish_consistency_notes:
  - Se preservó el trato directo de segunda persona singular.
  - Se mantuvo «holocaustos» como término técnico para עוֹלֹת, evitando una paráfrasis más general que debilitara la precisión cultual.
  - «Delante de mí» conserva la imagen espacial del hebreo y armoniza con el registro bíblico en español.
  - La nota alternativa se ancla en «reprendo» porque el inglés POB documenta la alternancia entre rebuke y reprove.
