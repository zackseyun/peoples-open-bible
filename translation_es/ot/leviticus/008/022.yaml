translation:
  language: es
  text: Entonces presentó el segundo carnero[a], el carnero de la ordenación, y Aarón y sus hijos pusieron sus manos sobre la cabeza del carnero.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, "el carnero de la consagración". La expresión hebrea es un término técnico sacerdotal para el rito de instalación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְרֵב
  english_pob_choice: Then he brought near
  chosen_spanish: Entonces hizo acercar
  alternatives_spanish:
  - Entonces presentó
  - Entonces trajo adelante
  lexicon: HALOT
  rationale: El verbo en Hifil conserva el sentido ritual de hacer que la ofrenda se acerque/presentar. En español, 'hizo acercar' mantiene esa fuerza cultual sin perder naturalidad narrativa.
- source_word: הָאַיִל הַשֵּׁנִי
  english_pob_choice: the second ram
  chosen_spanish: el segundo carnero
  alternatives_spanish:
  - el otro carnero
  - el segundo cordero macho
  lexicon: HALOT
  rationale: אַיִל designa un carnero, y הַשֵּׁנִי indica el segundo en la secuencia. 'Carnero' es más preciso que 'oveja' o 'cordero', y sigue el orden del texto.
- source_word: אֵיל הַמִּלֻּאִים
  english_pob_choice: the ram of ordination
  chosen_spanish: el carnero de la ordenación
  alternatives_spanish:
  - el carnero de la consagración
  - el carnero de la investidura
  - el carnero de llenura
  lexicon: HALOT
  rationale: מִלֻּאִים es un término técnico sacerdotal para el rito de instalación. 'Ordenación' comunica bien la función del rito en español y preserva el carácter técnico sin forzar una traducción demasiado literal.
- source_word: וַיִּסְמְכוּ
  english_pob_choice: and ... laid
  chosen_spanish: pusieron
  alternatives_spanish:
  - impusieron
  - apoyaron
  lexicon: HALOT
  rationale: En contextos sacrificiales סמך describe poner o imponer las manos sobre la víctima. 'Pusieron sus manos' expresa la acción de manera clara y natural; 'impusieron' sería posible, pero en español eclesial puede sonar más interpretativo.
- source_word: אֶת יְדֵיהֶם
  english_pob_choice: their hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - las manos de ellos
  - una mano cada uno
  lexicon: HALOT
  rationale: El plural hebreo se refleja de forma natural en español con 'sus manos'. Mantiene la referencia a Aarón y a sus hijos sin sobrecargar la frase.
- source_word: עַל רֹאשׁ הָאָיִל
  english_pob_choice: on the head of the ram
  chosen_spanish: sobre la cabeza del carnero
  alternatives_spanish:
  - sobre la cabeza del carnero
  - encima de la cabeza del carnero
  lexicon: HALOT
  rationale: '''Sobre la cabeza'' reproduce bien la preposición de contacto ritual y es la forma más idiomática en español para este gesto sacrificial.'
- source_word: אַהֲרֹן וּבָנָיו
  english_pob_choice: Aaron and his sons
  chosen_spanish: Aarón y sus hijos
  alternatives_spanish:
  - Aarón y sus hijos varones
  - Aarón y sus descendientes
  lexicon: HALOT
  rationale: En este contexto בָּנִים se refiere a los hijos varones de Aarón que participan en la ordenación sacerdotal. 'Hijos' es la forma más directa y natural en español, y el contexto cultual delimita el sentido.
theological_decisions:
- issue: Término técnico priestly מִלֻּאִים
  english_pob_reading: the ram of ordination
  chosen_spanish_reading: el carnero de la ordenación
  alternative_spanish_readings:
  - el carnero de la consagración
  - el carnero de la investidura
  rationale: La elección 'ordenación' refleja que el rito instala a Aarón y a sus hijos en su oficio sacerdotal. 'Consagración' también es válida, pero puede sonar más general y menos técnica; 'investidura' es posible, aunque menos transparente para lectores amplios.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'La comparación con la POB en inglés muestra alta concordancia y no requiere ajuste sustantivo: se mantiene la secuencia narrativa, el paralelismo de la ofrenda y el valor técnico de מִלֻּאִים. La revisión más reciente no introdujo cambios, y el veredicto de control cruzado fue de acuerdo total.'
  spanish_consistency_notes:
  - Se conserva 'Aarón' con tilde según uso español.
  - Se traduce 'ram' como 'carnero' para mantener precisión zoológica en el contexto sacrificial.
  - Se usa 'ordenación' de forma consistente con el carácter técnico del rito sacerdotal.
  - Se mantiene el gesto ritual con 'pusieron sus manos sobre la cabeza' como expresión natural y fiel.
