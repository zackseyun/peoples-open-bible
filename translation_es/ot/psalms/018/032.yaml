translation:
  language: es
  text: Porque ¿quién es Dios aparte de Yahvé? ¿Y quién es una roca sino nuestro Dios?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuera de Yahvé» en la primera cláusula y «aparte de nuestro Dios» en la segunda; ambas expresiones hebreas comunican exclusividad.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduces la afirmación como fundamento retórico de lo anterior. «Porque» conserva la fuerza explicativa en español natural.
- source_word: מִי
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - quién será
  - quién es
  lexicon: HALOT
  rationale: Interrogativo retórico directo; «quién» reproduce la pregunta sin añadir contenido.
- source_word: אֱלוֹהַּ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  - el Dios verdadero
  lexicon: HALOT
  rationale: Se refiere al Dios verdadero en contraste exclusivo; en español «Dios» mantiene la referencia reverente sin forzar una perífrasis.
- source_word: מִבַּלְעֲדֵי
  english_pob_choice: besides
  chosen_spanish: aparte de
  alternatives_spanish:
  - fuera de
  - además de
  - sin
  lexicon: HALOT
  rationale: 'Expresa exclusión: nadie es Dios fuera de Yahvé. «Aparte de» es idiomático y conserva la exclusividad del hebreo.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al criterio POB, en vez de sustituirlo por un título.
- source_word: וּמִי
  english_pob_choice: And who
  chosen_spanish: ¿Y quién
  alternatives_spanish:
  - ¿Quién también
  - ¿Quién además
  lexicon: HALOT
  rationale: La conjunción enlaza la segunda pregunta con la primera; «¿Y quién» mantiene el paralelismo y el tono retórico.
- source_word: צוּר
  english_pob_choice: a rock
  chosen_spanish: una roca
  alternatives_spanish:
  - Roca
  - un refugio
  - una peña
  lexicon: HALOT
  rationale: La metáfora presenta a Dios como firmeza y protección. «Una roca» conserva la imagen bíblica sin convertirla en título fijo.
- source_word: זוּלָתִי
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - aparte de
  - fuera de
  lexicon: HALOT
  rationale: Segundo término de exclusión paralelo a מִבַּלְעֲדֵי. En español, «sino» funciona bien en preguntas retóricas negativas implícitas y preserva la oposición.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  - el Dios nuestro
  lexicon: HALOT
  rationale: El sufijo posesivo es significativo y debe conservarse; «nuestro Dios» mantiene el sentido comunitario y de pacto.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa יְהוָה directamente. La decisión POB de transliterar el nombre divino se mantiene en español como «Yahvé» para preservar el nombre personal de Dios y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metáfora de צוּר aplicada a Dios
  english_pob_reading: a rock
  chosen_spanish_reading: una roca
  alternative_spanish_readings:
  - Roca
  - un refugio
  rationale: El hebreo presenta un predicado metafórico. «Una roca» conserva la imagen de estabilidad y protección sin reificarla como nombre propio.
  doctrine_reference: SALMOS 18:32 — metáfora divina de firmeza/protección
translation_notes:
  revision_awareness: 'Sin cambios respecto del contexto de auditoría inglés: la traducción española sigue la misma lectura optimizada, con preservación de la exclusividad de ambos términos hebreos y del paralelismo retórico.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se preserva la posesión comunitaria con «nuestro Dios».
  - Se mantiene la metáfora de «roca» en minúscula como imagen predicativa, no como título fijo.
  - La partícula de exclusión se distribuye de manera natural en español («aparte de» / «sino») sin perder el paralelismo semántico.
