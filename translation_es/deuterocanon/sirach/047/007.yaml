translation:
  language: es
  text: Él dio ciudades entre los filisteos[a][b], y hasta hoy ha quebrado el cuerno de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «de los filisteos» o «en Filistea». La expresión hebrea es condensada; el paralelo griego deja claro que el sentido es la derrota duradera de los filisteos.'
    reason: alternative_reading
  - marker: b
    text: «Cuerno» es una imagen bíblica de fuerza o poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: ויתן
  english_pob_choice: he gave
  chosen_spanish: él dio
  alternatives_spanish:
  - él puso
  - él entregó
  - él concedió
  lexicon: HALOT
  rationale: Dado que el hebreo נתן puede abarcar dar, poner o asignar, «dio» conserva la forma verbal simple del original sin forzar una paráfrasis. En este contexto de ciudades y derrota militar, el giro permite entender que David las puso en una nueva relación de posesión o dominio, conforme al rastro hebreo y al paralelo griego.
- source_word: בפלשתים
  english_pob_choice: among the Philistines
  chosen_spanish: entre los filisteos
  alternatives_spanish:
  - de los filisteos
  - en Filistea
  - contra los filisteos
  lexicon: HALOT
  rationale: La preposición hebrea con etnónimo es comprimida y admite varios matices. «Entre los filisteos» reproduce bien la construcción breve sin decidir de manera excesiva entre localización, procedencia o relación hostil; además deja abierto el sentido apoyado por el paralelo griego de humillación y derrota de los filisteos.
- source_word: ערים
  english_pob_choice: cities
  chosen_spanish: ciudades
  alternatives_spanish:
  - poblados
  - towns
  lexicon: HALOT
  rationale: «Ciudades» es la equivalencia más directa y solemne para ערים, y encaja con el registro histórico-político del pasaje.
- source_word: שבר
  english_pob_choice: has broken
  chosen_spanish: ha quebrado
  alternatives_spanish:
  - ha roto
  - ha destruido
  - quebró
  lexicon: HALOT
  rationale: «Quebrado» mantiene el valor básico de «romper/quebrar» y conserva el tono bíblico sin perder claridad en español. El perfecto con ועד היום se refleja naturalmente con «ha quebrado» para expresar una acción cuyo efecto perdura hasta el presente.
- source_word: קרנם
  english_pob_choice: their horn
  chosen_spanish: su cuerno
  alternatives_spanish:
  - su fuerza
  - su poder
  - su cuerno (como símbolo de fuerza)
  lexicon: HALOT / LXX κέρας
  rationale: Se conserva la imagen literal «cuerno», porque el hebreo y el griego coinciden en esa metáfora. En español, el símbolo de fuerza o poder puede entenderse sin eliminar la imagen bíblica; por eso no se sustituye en el texto principal por una abstracción.
theological_decisions:
- issue: Relación entre el hebreo breve y el paralelo griego en la primera cola
  english_pob_reading: Retain the Hebrew's concise wording about giving cities among the Philistines, without expanding it into a fuller paraphrase about destroying enemies.
  chosen_spanish_reading: Mantener la formulación concisa acerca de dar ciudades entre los filisteos, sin ampliarla a una paráfrasis de sometimiento total.
  alternative_spanish_readings:
  - Él sometió a los filisteos por todos lados
  - Él tomó ciudades de los filisteos
  - Él destruyó a sus enemigos alrededor
  rationale: El hebreo conservado es primario y debe gobernar la traducción principal. El griego, sin embargo, confirma que el pasaje tiene trasfondo de victoria y humillación militar; por eso la versión española preserva la brevedad hebrea, pero deja reconocible el sentido histórico de dominio sobre los filisteos.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; optimal equivalence'
- issue: Metáfora de «cuerno» como fuerza o poder
  english_pob_reading: '''Horn'' is a biblical image for strength or power.'
  chosen_spanish_reading: Conservar «cuerno» como imagen bíblica de fuerza o poder.
  alternative_spanish_readings:
  - ha destruido su fuerza
  - ha quebrado su poder
  - ha quebrado su autoridad
  rationale: Como el hebreo קרן y el griego κέρας coinciden en la metáfora, conviene mantenerla en el texto principal. La abstracción interpretativa puede explicarse en nota para no borrar la tensión simbólica del original.
  doctrine_reference: Lexical transparency; figurative language preservation
translation_notes:
  revision_awareness: Se revisó el pasaje con atención al hebreo fuente y al paralelo griego. La versión inglesa POB ya señalaba la compresión de בפלשתים y preservaba la metáfora de horn; por eso el español mantiene ambas tensiones sin expandir el sentido más allá del respaldo textual.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exige; aquí no aparece el tetragrámaton.
  - «Filisteos» se escribe en minúscula por tratarse de un etnónimo común en español.
  - Se preservó el paralelismo bíblico y la imagen metafórica sin introducir vocabulario eclesiástico ajeno al registro del pasaje.
