translation:
  text: Jesus said[a], “I will give you what eye has not seen, and what ear has not
    heard[e][d][c][b], and what hand has not touched—and it has not arisen upon the
    human heart.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: “You” is plural in Coptic (ⲛⲁⲛⲧⲱⲧⲛ).
    reason: dialect_note
  - marker: b
    text: The prepositional phrase is literally “upon the heart” (ϩⲓ ⲡϩⲏⲧ), not the
      more idiomatic English “in/into the heart.”
    reason: lexical_alternative
  - marker: c
    text: Cf. Isaiah 64:4; 1 Corinthians 2:9 for a related triad (“eye has not seen
      …”), though Thomas’s wording is translated directly from the Coptic here.
    reason: cross_reference
  - marker: d
    text: 'MS object marking after the perception verbs appears as ⲉⲣⲟϥ in the first
      clause; Dilley normalizes with ⲛⲧⲟϥ across the triad. Sense: “see/hear/touch
      it.”'
    reason: textual_variant
  - marker: e
    text: Or 'I myself will give you'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲁⲛⲟⲕ ⲛⲁϯ
  chosen: I myself will give
  alternatives:
  - I will give
  - I shall give
  lexicon: Layton, s.v. ⲁⲛⲟⲕ; Crum, s.v. ϯ
  rationale: ⲁⲛⲟⲕ adds emphatic force; ⲛⲁϯ marks a prospective/future sense. Rendering
    with “I myself will give” preserves emphasis and future.
- source_word: ⲛⲁⲛⲧⲱⲧⲛ
  chosen: to you (plural)
  alternatives:
  - to you
  - to you all
  lexicon: Layton, s.v. ⲧⲱⲧ
  rationale: Second person plural indirect object; English “you” is kept, but understanding
    is plural.
- source_word: ⲙⲡⲉⲃⲁⲗ … ⲛⲁⲩ
  chosen: eye … has not seen
  alternatives:
  - an eye … has not seen
  lexicon: Crum, s.v. ⲃⲁⲗ; Layton, s.v. ⲛⲁⲩ
  rationale: Generic singular with negative perfect; idiomatic English keeps articleless
    “eye” for gnomic sense.
- source_word: ⲙⲁⲁϫⲉ … ⲥⲱⲧⲙ
  chosen: ear … has not heard
  alternatives:
  - an ear … has not heard
  lexicon: Crum, s.v. ⲙⲁⲁϫⲉ; Crum, s.v. ⲥⲱⲧⲙ
  rationale: Standard lexemes for ‘ear’ and ‘hear’ in Sahidic; kept parallel to the
    first clause.
- source_word: ϭⲓϫ … ϭⲙϭⲱⲙ
  chosen: hand … has not touched
  alternatives:
  - hand … has not grasped
  - hand … has not handled
  lexicon: Crum, s.v. ϭⲓϫ; Crum, s.v. ϭⲙϭⲱⲙ
  rationale: ϭⲙϭⲱⲙ covers tactile contact/handling; “touched” fits the parallel triad
    and is concise.
- source_word: ⲙⲡⲉⲛⲧⲟϥ ⲉϩⲣⲁⲓ
  chosen: it has not arisen
  alternatives:
  - it has not come up
  - it has not entered
  lexicon: Crum, s.v. ⲉϩⲣⲁⲓ
  rationale: ⲉϩⲣⲁⲓ literally ‘rise/come up’; retained as “arisen” to preserve Thomas’s
    distinctive diction rather than smoothing to ‘enter’.
- source_word: ϩⲓ ⲡϩⲏⲧ
  chosen: upon the heart
  alternatives:
  - in the heart
  - into the heart
  lexicon: Layton, s.v. ϩⲓ (prepositions); Crum, s.v. ⲡϩⲏⲧ
  rationale: Preposition ϩⲓ marks contact/surface ‘upon’; kept literally to reflect
    the imagery rather than idiomatic ‘into/in’.
- source_word: ⲡⲣⲱⲙⲉ
  chosen: the human
  alternatives:
  - man
  - a person
  lexicon: Crum, s.v. ⲣⲱⲙⲉ
  rationale: Generic human being; “the human” preserves the generic force and matches
    the article in Coptic, avoiding gendered English while staying literal.
textual_note: No lacunae are present in NH II for this saying. The manuscript shows
  object marking after the perception verbs; line-level print has ⲛⲁⲩ ⲉⲣⲟϥ, while
  Dilley’s normalized lemmatization aligns the three clauses as ⲛⲁⲩ ⲉⲛⲧⲟϥ / ⲥⲱⲧⲙⲛⲧⲟϥ
  / ϭⲙϭⲱⲙⲛⲧⲟϥ, treating the anaphoric object ‘it’ uniformly. This orthographic/dialectal
  variation does not affect sense. The sequence uses the negative perfect (ⲙⲡⲉ-) for
  ‘has not’ in each clause, and the final clause shifts from relative ⲡⲉⲧⲉⲣⲉ… to an
  independent negative perfect ⲙⲡⲉⲛⲧⲟϥ ⲉϩⲣⲁⲓ, a structural asymmetry preserved in
  translation by keeping “—and it has not arisen …” rather than supplying another
  “what.”
