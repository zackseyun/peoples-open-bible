translation:
  language: es
  text: 'Y dijo[a]: «Por favor, mis hermanos, no obren mal».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis parientes» o «mis amigos», ya que el hebreo «mis hermanos» puede funcionar como un apelativo social respetuoso y no necesariamente indicar parentesco literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמַר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; en español, «Y dijo» reproduce de forma natural y sobria la progresión narrativa sin sobrecargar el matiz temporal.
- source_word: אַל נָא
  english_pob_choice: Please / do not
  chosen_spanish: Por favor, no
  alternatives_spanish:
  - Les ruego que no
  - No, por favor
  lexicon: HALOT
  rationale: La partícula de ruego נָא se expresa bien con «por favor», conservando el tono cortés y apremiante de la súplica junto con la prohibición de אַל.
- source_word: אַחַי
  english_pob_choice: my brothers
  chosen_spanish: mis hermanos
  alternatives_spanish:
  - mis parientes
  - mis amigos
  lexicon: HALOT
  rationale: Se mantiene el sustantivo de parentesco «hermanos» porque el hebreo dice literalmente «mis hermanos». Aunque puede funcionar como apelativo social respetuoso, el texto no autoriza sustituirlo por un término más general en el cuerpo principal.
- source_word: תָּרֵעוּ
  english_pob_choice: do not act wickedly
  chosen_spanish: no obren mal
  alternatives_spanish:
  - no hagan maldad
  - no actúen perversamente
  lexicon: HALOT
  rationale: El verbo רעע en esta forma expresa hacer el mal o obrar perversamente. «No obren mal» es natural en español, conserva la fuerza moral y evita una paráfrasis más intensa de lo que el hebreo exige.
theological_decisions:
- issue: Uso de un apelativo de parentesco en un contexto social amplio
  english_pob_reading: my brothers
  chosen_spanish_reading: mis hermanos
  alternative_spanish_readings:
  - mis amigos
  - mis parientes
  rationale: El hebreo conserva la forma de parentesco masculina plural con sufijo de primera persona. Aunque el contexto muestra un uso retórico y no necesariamente literal, la traducción principal mantiene el término fuente y deja la ampliación semántica para nota.
  doctrine_reference: Principios de primacía del texto fuente y precisión léxica
- issue: Intensidad moral del verbo final
  english_pob_reading: do not act wickedly
  chosen_spanish_reading: no obren mal
  alternative_spanish_readings:
  - no hagan maldad
  - no actúen perversamente
  rationale: La POB inglesa opta por una formulación que refleja el valor moral del verbo sin exagerarlo. En español, «obren mal» comunica ese mismo peso ético de manera idiomática y suficientemente precisa.
  doctrine_reference: Principios de equivalencia óptima y precisión semántica
translation_notes:
  revision_awareness: La versión inglesa más reciente revisó «do evil» por «act wickedly» para reflejar con mayor naturalidad y precisión el verbo hebreo. La redacción española sigue esa decisión semántica con «obren mal», que mantiene el registro moral y evita un calco demasiado fuerte o demasiado débil.
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reflejar el avance narrativo del waw consecutivo.
  - Se preserva el plural masculino «mis hermanos» por fidelidad al hebreo y por coherencia con la política de precisión de género cuando el texto fuente lo especifica.
  - El verbo se vierte en forma plural impersonal de trato directo («obren») para conservar el tono exhortativo del original.
  - La nota ofrece alternativas semánticas sin desplazar la lectura principal del cuerpo del texto.
