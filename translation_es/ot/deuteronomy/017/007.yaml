translation:
  language: es
  text: La mano de los testigos será la primera contra él para darle muerte, y después la mano de todo el pueblo[a]. Así purgarás el mal de en medio de ti[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “la mano de los testigos... y la mano de todo el pueblo”, un modismo jurídico que asigna a los testigos la responsabilidad de iniciar la ejecución.'
    reason: cultural_note
  - marker: b
    text: 'O: “de entre ti”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַד
  english_pob_choice: hand
  chosen_spanish: la mano
  alternatives_spanish:
  - la responsabilidad
  - la participación
  - el brazo
  lexicon: HALOT
  rationale: Conserva la imagen jurídica del hebreo y la formulación fija de 'mano' como agente de la ejecución. En español, 'mano' también puede expresar participación o responsabilidad sin perder el paralelismo del texto.
- source_word: הָעֵדִים
  english_pob_choice: the witnesses
  chosen_spanish: los testigos
  alternatives_spanish:
  - los testigos de cargo
  - los acusadores
  lexicon: HALOT
  rationale: '''Testigos'' refleja mejor el valor legal del sustantivo que ''acusadores''. Mantiene el marco judicial y la obligación especial de quienes testifican.'
- source_word: בּוֹ
  english_pob_choice: against him
  chosen_spanish: sobre él
  alternatives_spanish:
  - contra él
  - en él
  lexicon: HALOT
  rationale: Con 'la mano' en contexto punitivo, 'sobre él' suena natural en español y conserva la referencia al reo sin introducir una interpretación más explícita que el hebreo.
- source_word: בָרִאשֹׁנָה
  english_pob_choice: first
  chosen_spanish: la primera
  alternatives_spanish:
  - primero
  - en primer lugar
  lexicon: HALOT
  rationale: Se ajusta al sintagma nominal hebreo y mantiene la prioridad temporal de la acción de los testigos.
- source_word: לַהֲמִיתוֹ
  english_pob_choice: to put him to death
  chosen_spanish: para darle muerte
  alternatives_spanish:
  - para matarlo
  - para ejecutarlo
  lexicon: HALOT
  rationale: '''Dar muerte'' conserva el tono jurídico-formal de ''put him to death'' y evita la posible crudeza o excesiva modernización de ''matarlo''.'
- source_word: וְיַד כָּל הָעָם
  english_pob_choice: and afterward the hand of all the people
  chosen_spanish: y después la mano de todo el pueblo
  alternatives_spanish:
  - y luego la mano de todo el pueblo
  - y después todo el pueblo
  lexicon: HALOT
  rationale: Preserva la estructura hebrea con 'mano' singular y el sujeto comunitario. 'Todo el pueblo' comunica la participación de la comunidad del pacto.
- source_word: בָּאַחֲרֹנָה
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - luego
  - al final
  lexicon: HALOT
  rationale: Equivale con naturalidad al valor adverbial de secuencia posterior y mantiene el contraste con 'la primera'.
- source_word: וּבִעַרְתָּ
  english_pob_choice: you shall purge
  chosen_spanish: purgarás
  alternatives_spanish:
  - eliminarás
  - quitarás
  lexicon: HALOT
  rationale: '''Purgar'' conserva la fuerza de la fórmula deuteronómica para remover el mal del pueblo y reproduce bien el valor legal y cultual del verbo en este contexto.'
- source_word: הָרָע
  english_pob_choice: the evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - lo malo
  lexicon: HALOT
  rationale: El hebreo usa una fórmula fija que en español se expresa de manera más natural y fiel como 'el mal'. Mantiene la amplitud del referente sin reducirlo solo al delincuente.
- source_word: מִקִּרְבֶּךָ
  english_pob_choice: from your midst
  chosen_spanish: de en medio de ti
  alternatives_spanish:
  - de tu medio
  - de entre ustedes
  lexicon: HALOT
  rationale: '''De en medio de ti'' reproduce bien el hebreo comunitario y suena bíblico sin recurrir a una expresión demasiado eclesiástica o arcaica.'
theological_decisions:
- issue: Fórmula legal de remover el mal de la comunidad del pacto
  english_pob_reading: So you shall purge the evil from your midst
  chosen_spanish_reading: Así purgarás el mal de en medio de ti
  alternative_spanish_readings:
  - Así eliminarás el mal de en medio de ti
  - Así purificarás la comunidad de tu medio
  rationale: 'La frase deuteronómica es fórmula judicial y teológica a la vez: no solo describe castigo, sino la expulsión del mal que contamina a la comunidad. ''Purgarás el mal'' preserva esa densidad sin restringir el referente únicamente al culpable individual.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
- issue: Responsabilidad inicial de los testigos en la ejecución
  english_pob_reading: The hand of the witnesses shall be first against him to put him to death
  chosen_spanish_reading: La mano de los testigos será la primera sobre él para darle muerte
  alternative_spanish_readings:
  - La mano de los testigos será la primera contra él para matarlo
  - Los testigos serán los primeros en actuar contra él
  rationale: El hebreo asigna a los testigos la iniciativa en la ejecución. Mantener 'la mano' y 'la primera' conserva el idiomatismo legal y evita suavizar una exigencia procesal explícita.
  doctrine_reference: Deuteronomio 17:6-7; consistencia legal del texto
- issue: Identidad del objeto removido en la fórmula final
  english_pob_reading: purge the evil
  chosen_spanish_reading: purgarás el mal
  alternative_spanish_readings:
  - purgarás al malhechor
  - purgarás la maldad
  rationale: El hebreo permite una referencia más amplia que 'el malhechor'; la fórmula apunta al mal como realidad contaminante dentro de Israel. 'El mal' conserva mejor esa ambigüedad productiva.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: Se siguió el pasaje hebreo masorético y el audit trail inglés sin cambios textuales relevantes; la versión española mantiene el paralelismo, la secuencia legal y la fórmula deuteronómica, ajustando solo la naturalidad idiomática necesaria en español.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando el hebreo lo requiera; este versículo no contiene el tetragrámaton.
  - Se preservó 'testigos' y no 'acusadores' para respetar el contexto jurídico del texto.
  - '''Purgarás el mal'' conserva la fórmula deuteronómica sin sustituirla por un lenguaje meramente moralizante.'
  - La coordinación 'la primera... y después' refleja con claridad la secuencia de responsabilidad establecida en el hebreo.
