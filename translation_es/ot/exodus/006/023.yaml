translation:
  language: es
  text: 'Aarón tomó a Eliseba, hija de Amminadab y hermana de Najsón, como su esposa, y ella le dio hijos: Nadab, Abiú, Eleazar e Itamar.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - tomó para esposa
  - se casó con
  lexicon: HALOT
  rationale: El verbo básico לקח significa 'tomar'; en contexto matrimonial puede equivaler a 'tomar como esposa'. 'Tomó' conserva el valor verbal de la fuente, mientras que la frase siguiente aclara el sentido matrimonial.
- source_word: אֱלִישֶׁבַע
  english_pob_choice: Elisheba
  chosen_spanish: Elisaba
  alternatives_spanish:
  - Elisheba
  - Elisabet
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio. 'Elisaba' refleja de forma cercana la forma hebrea y evita la asociación impropia con 'Elisabet'.
- source_word: בַּת
  english_pob_choice: daughter of
  chosen_spanish: hija de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: La construcción de filiación se expresa naturalmente en español como 'hija de'.
- source_word: אֲחוֹת
  english_pob_choice: sister of
  chosen_spanish: hermana de
  alternatives_spanish:
  - parienta de
  lexicon: HALOT
  rationale: El sustantivo identifica una relación de hermandad con Najsón; 'hermana de' es la equivalencia directa y clara.
- source_word: לּוֹ לְאִשָּׁה
  english_pob_choice: as his wife
  chosen_spanish: como su esposa
  alternatives_spanish:
  - para ser su esposa
  - para esposa
  lexicon: HALOT
  rationale: La expresión matrimonial hebrea se vierte con una fórmula idiomática natural en español. 'Como su esposa' preserva el sentido formal sin añadir una implicación distinta.
- source_word: וַתֵּלֶד לוֹ
  english_pob_choice: and she bore him
  chosen_spanish: y ella le dio a luz
  alternatives_spanish:
  - y ella le dio hijos
  - y ella parió
  lexicon: HALOT
  rationale: ילד con objeto indirecto personal se expresa de manera natural con 'dar a luz' en español. Se mantiene la relación directa entre la madre y los hijos.
- source_word: נָדָב
  english_pob_choice: Nadab
  chosen_spanish: Nadab
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de forma estándar.
- source_word: אֲבִיהוּא
  english_pob_choice: Abihu
  chosen_spanish: Abiú
  alternatives_spanish:
  - Abihú
  lexicon: convención onomástica
  rationale: Nombre propio transliterado en una forma española reconocible y pronunciable.
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de forma estándar.
- source_word: אִיתָמָר
  english_pob_choice: Ithamar
  chosen_spanish: Itamar
  alternatives_spanish:
  - Itamár
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de forma estándar en español.
theological_decisions:
- issue: Fórmula matrimonial de לקח
  english_pob_reading: Aaron took Elisheba ... as his wife
  chosen_spanish_reading: Aarón tomó ... como su esposa
  alternative_spanish_readings:
  - Aarón se casó con ...
  - Aarón tomó ... para esposa
  rationale: El hebreo conserva la acción de 'tomar' seguida de una aclaración marital. La traducción mantiene ambas capas para no borrar la formulación semítica ni reemplazarla por una paráfrasis explicativa.
  doctrine_reference: Cuidado hermenéutico sobre formulaciones matrimoniales del AT; fidelidad semántica al hebreo.
translation_notes:
  revision_awareness: El texto inglés auditado ya había resuelto correctamente la lectura marital de לקח mediante 'took ... as his wife', sin notas ni revisiones aplicadas; la versión española sigue esa misma decisión, con adaptación idiomática natural.
  spanish_consistency_notes:
  - Se mantiene el orden de los cuatro hijos como en el hebreo y en el inglés auditado.
  - Se transliteran todos los nombres propios de manera coherente y sin sustituirlos por formas tradicionales no requeridas por la fuente.
  - No se introduce mayúscula especial en 'esposa' porque no se trata de un título divino ni de un nombre propio.
