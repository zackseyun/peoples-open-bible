    rationale: El hebreo presenta 'mi pueblo' como sujeto colectivo singular con יֵדַע; cambiar luego a plural no es necesario y debilita la cohesión de la oración en español.
  - severity: medium
    issue: '''yo soy'' omite el elemento pronominal de autoidentificación enfática en אֲנִי הוּא'
    rationale: Aunque natural, 'yo soy' por sí solo no refleja plenamente 'I am he' / אֲנִי הוּא, que el rastro auditado consideró importante preservar por su gravedad teológica y retórica.
