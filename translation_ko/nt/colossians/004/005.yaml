  text: Ἐν σοφίᾳ περιπατεῖτε πρὸς τοὺς ἔξω, τὸν καιρὸν ἐξαγοραζόμενοι.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/004/005.yaml
  text: Walk in wisdom toward outsiders, making the most of the time.
translation:
  language: ko
  text: 외부 사람들[a]을 대하여 지혜로 행하며, 시간[b]을 최대한 활용하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「밖에 있는 사람들」, 곧 믿는 공동체 밖의 사람들.
    reason: lexical_alternative
  - marker: b
    text: 직역하면 「때를 사들이다」(ἐξαγοράζω). 「기회를 최대한 활용하다」의 관용 의미.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν σοφίᾳ περιπατεῖτε
  english_pob_choice: Walk in wisdom
  chosen_korean: 지혜로 행하며
  alternatives_korean:
  - 지혜 안에서 행하며
  - 지혜롭게 살아가며
  lexicon: BDAG
  rationale: 「~로 행하다」는 한국 교회의 정립된 표현으로 περιπατέω의 삶의 방식 비유 보존.
- source_word: πρὸς τοὺς ἔξω
  english_pob_choice: toward outsiders
  chosen_korean: 외부 사람들을 대하여
  alternatives_korean:
  - 밖에 있는 사람들을 향하여
  - 외인들에 대하여
  lexicon: BDAG
  rationale: 신앙 공동체 밖의 사람들을 「외부 사람들」로 옮긴다.
- source_word: τὸν καιρὸν ἐξαγοραζόμενοι
  english_pob_choice: making the most of the time
  chosen_korean: 시간을 최대한 활용하십시오
  alternatives_korean:
  - 기회를 사들여 쓰십시오
  - 때를 아껴 쓰십시오
  lexicon: BDAG
  rationale: 분사를 합쇼체 명령으로 풀어 옮김. καιρός의 「적절한 때·기회」를 살림.
