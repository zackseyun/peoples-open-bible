translation:
  language: es
  text: Al volver el año[a], el rey Nabucodonosor envió y lo llevó a Babilonia, junto con los vasos preciosos[b] de la casa de Yahvé, e hizo rey sobre Judá y Jerusalén a Sedequías, su hermano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «al retorno/vuelta del año», un modismo para cuando el año daba la vuelta.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los vasos valiosos» o «los objetos preciados de la casa de Yahvé».'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «su hermano»; Sedequías era un pariente real cercano de Jeconías, más precisamente su tío.'
    reason: cultural_note
lexical_decisions:
- source_word: וְלִתְשׁוּבַת הַשָּׁנָה
  english_pob_choice: At the turn of the year
  chosen_spanish: Al comienzo del año
  alternatives_spanish:
  - Al volver el año
  - Cuando el año daba la vuelta
  - Al retorno del año
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y señala el giro del año. En español, «Al comienzo del año» comunica con naturalidad ese marco temporal sin forzar una estación específica que el hebreo no explicita.
- source_word: שָׁלַח
  english_pob_choice: sent
  chosen_spanish: mandó
  alternatives_spanish:
  - envió
  - despachó
  lexicon: HALOT
  rationale: Aquí el verbo introduce la acción real de Nabucodonosor en la captura y traslado de Jeconías. «Mandó» conserva el sentido de ordenar/enviar la acción, con un matiz de iniciativa regia natural en español.
- source_word: וַיְבִאֵהוּ
  english_pob_choice: brought him
  chosen_spanish: lo llevó
  alternatives_spanish:
  - lo trajo
  - lo hizo llevar
  lexicon: HALOT
  rationale: El hifil de בוא expresa hacer venir o llevar. «Lo llevó» mantiene el movimiento hacia Babilonia de forma clara y fluida en español.
- source_word: בָבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - hasta Babilonia
  lexicon: HALOT
  rationale: La he local indica dirección. «A Babilonia» es la equivalencia natural y fiel.
- source_word: כְּלֵי חֶמְדַּת
  english_pob_choice: the precious vessels
  chosen_spanish: los vasos preciosos
  alternatives_spanish:
  - los utensilios preciosos
  - los objetos valiosos
  - los vasos valiosos
  lexicon: HALOT
  rationale: כְּלֵי se refiere a recipientes/utensilios, y חֶמְדַּת expresa lo deseable, precioso o valioso. «Vasos preciosos» conserva el lenguaje tradicional de objetos del templo y el valor semántico del adjetivo sin ampliar el texto.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como «Yahvé», conforme al criterio del proyecto, y se traduce literalmente בית como «casa», preservando la expresión hebrea.
- source_word: וַיַּמְלֵךְ
  english_pob_choice: made ... king
  chosen_spanish: nombró rey
  alternatives_spanish:
  - hizo rey
  - lo puso como rey
  - lo estableció como rey
  lexicon: HALOT
  rationale: El hifil significa hacer/revestir de realeza. «Nombró rey» comunica de forma idiomática que Nabucodonosor lo constituyó en la realeza, sin añadir una formulación más interpretativa.
- source_word: אָחִיו
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su pariente
  - su familiar
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su hermano». Se conserva esa formulación y se explica la relación más amplia en una nota, sin sustituir el dato del texto por una aclaración interpretativa en el cuerpo.
- source_word: עַל יְהוּדָה וִירוּשָׁלָם
  english_pob_choice: over Judah and Jerusalem
  chosen_spanish: sobre Judá y Jerusalén
  alternatives_spanish:
  - como rey de Judá y Jerusalén
  - en Judá y Jerusalén
  lexicon: HALOT
  rationale: עַל marca autoridad sobre un dominio. «Sobre Judá y Jerusalén» conserva la estructura del hebreo y el alcance geopolítico del reinado.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Según la convención del proyecto, se vierte como «Yahvé» para no ocultar el nombre propio divino bajo un sustituto litúrgico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación de parentesco en אָחִיו
  english_pob_reading: his brother; Zedekiah was Jehoiachin's close royal relative, more specifically his uncle.
  chosen_spanish_reading: su hermano
  alternative_spanish_readings:
  - su tío
  - su pariente cercano
  rationale: Se conserva la palabra del texto («su hermano») porque el hebreo emplea un término de parentesco amplio. La precisión genealógica se deja para la nota, evitando sustituir el dato del versículo por una armonización interpretativa.
  doctrine_reference: Principio de equivalencia textual y nota aclaratoria, no doctrinal
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente hebreo y el audit trail inglés, manteniendo el idiomatismo temporal, el valor semántico de כְּלֵי חֶמְדַּת, el nombre divino como Yahvé y la relación de parentesco literal con nota aclaratoria. No se registran revisiones previas aplicadas en el paquete base.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se preserva el registro bíblico sobrio y contemporáneo, evitando tanto arcaísmos innecesarios como paráfrasis expansivas.
  - «Casa de Yahvé» mantiene la expresión hebrea בית יְהוָה sin sustituirla por «templo» en el texto principal.
  - Las notas usan alternativas reales de traducción donde el español crea o conserva ambigüedad léxica.
