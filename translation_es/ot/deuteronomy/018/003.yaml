review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en gran medida la estructura y el sentido del hebreo: presenta la porción asignada a los sacerdotes, mantiene la repetición sacrificial en «de los que sacrifican un sacrificio», conserva la singular distributiva en «dará», y enumera las tres partes del animal. Sin embargo, hay dos desajustes relevantes con la evidencia y la auditoría inglesa: (1) el anclaje de la nota [a] está puesto en «sacerdotes» cuando la alternativa corresponde a «de los que sacrifican un sacrificio»; (2) «el cuajar» se aparta de la decisión léxica inglesa documentada para הַקֵּבָה como «stomach», dejando «maw/cuajar» solo como alternativa tradicional, y en español «cuajar» puede sonar regional/técnico y menos claro que «estómago».'
  spanish_quality_summary: El español es generalmente claro y digno, pero requiere ajuste menor para precisión y naturalidad editorial. «La espaldilla» funciona aceptablemente; «las dos quijadas» es posible aunque algo más óseo que «mejillas», pero sigue dentro de las alternativas documentadas. El principal problema de legibilidad/edición es la mala colocación de la nota [a]. Además, «del pueblo, de los que…» es entendible y refleja el hebreo.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. En el plano léxico local, «derecho» para מִשְׁפַּט es defendible. La revisión propuesta alinea mejor הַקֵּבָה con la decisión POB documentada («estómago») y conserva las alternativas tradicionales en nota.
  issues:
  - severity: high
    issue: La nota [a] está anclada a «sacerdotes» pero su contenido explica «de los que sacrifican un sacrificio».
    rationale: Esto crea una correspondencia editorial incorrecta entre texto y nota, y puede confundir al lector sobre qué expresión tiene la alternativa léxica.
  - severity: medium
    issue: «El cuajar» en el texto principal no sigue la decisión auditada del POB para הַקֵּבָה.
    rationale: La auditoría inglesa eligió «stomach» como opción principal y dejó «maw» como tradicional. En español, «estómago» comunica con más claridad el sentido básico; «cuajar» puede conservarse en nota tradicional.
  - severity: low
    issue: La nota sobre «espaldilla» dice «la pata/espaldilla».
    rationale: La barra resulta poco elegante; conviene una formulación más limpia como «la pata delantera o espaldilla del animal».
  revised_spanish_text: 'Y este será el derecho de los sacerdotes del pueblo, de los que sacrifican un sacrificio[a], sea un toro o una oveja: dará al sacerdote la espaldilla[b], las dos quijadas[c] y el estómago[d].'
  revised_footnotes:
