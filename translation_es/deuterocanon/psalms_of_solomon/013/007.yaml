translation:
  language: es
  text: Un justo es disciplinado en secreto[b][c], para que el pecador no se regocije sobre[a] el justo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «exulte sobre».
    reason: lexical_alternative
  - marker: b
    text: O «bajo restricción».
    reason: lexical_alternative
  - marker: c
    text: O «con restricción».
    reason: previous_rendering
lexical_decisions:
- source_word: ἐν περιστολῇ
  english_pob_choice: in secret / with restraint
  chosen_spanish: en secreto
  alternatives_spanish:
  - con restricción
  - bajo restricción
  - con moderación
  lexicon: LSJ
  rationale: El audit trail inglés revisó la lectura de ‘with restraint’ hacia ‘in secret’ porque περιστολή, relacionado con περιστέλλω, puede expresar cobertura u ocultamiento. En español, ‘en secreto’ comunica mejor esa idea de ocultamiento y encaja con la cláusula final, que presupone que el pecador no ve la disciplina.
- source_word: παιδεύεται
  english_pob_choice: is disciplined
  chosen_spanish: es disciplinado
  alternatives_spanish:
  - es instruido
  - es corregido
  - es castigado
  lexicon: BDAG
  rationale: El verbo puede abarcar instrucción o formación, pero aquí el contexto contrasta la disciplina del justo con la posible jactancia del pecador. ‘Es disciplinado’ conserva ese sentido correctivo sin reducirlo a mero castigo.
- source_word: δίκαιος
  english_pob_choice: a righteous man
  chosen_spanish: Un justo
  alternatives_spanish:
  - El justo
  - Una persona justa
  - Un hombre justo
  lexicon: BDAG
  rationale: El griego usa singular masculino con valor representativo. ‘Un justo’ mantiene la fuerza proverbial y evita introducir una especificación innecesaria de ‘hombre’ donde el español ya puede expresar el tipo humano con naturalidad.
- source_word: ἐπιχαρῇ
  english_pob_choice: may gloat over
  chosen_spanish: se gloríe sobre
  alternatives_spanish:
  - se regocije sobre
  - exulte sobre
  - se jacte sobre
  lexicon: LSJ
  rationale: Aunque el inglés opta por ‘gloat over’, el verbo griego señala alegrarse ante la situación de otro, con tono hostil. En español, ‘se gloríe sobre’ comunica bien esa actitud de satisfacción arrogante y mantiene la relación preposicional con el objeto indirecto semántico del pasaje.
- source_word: ἁμαρτωλός
  english_pob_choice: the sinner
  chosen_spanish: el pecador
  alternatives_spanish:
  - un pecador
  - el impío
  - el hombre pecador
  lexicon: BDAG
  rationale: Con artículo, el término funciona como tipo representativo. ‘El pecador’ preserva el contraste proverbial entre el justo y el pecador y sigue de cerca la fuerza del griego y del inglés POB.
theological_decisions:
- issue: Valor de περιστολή como ocultamiento y no solo moderación
  english_pob_reading: in secret / with restraint
  chosen_spanish_reading: en secreto
  alternative_spanish_readings:
  - con restricción
  - bajo restricción
  - en moderación
  rationale: 'La revisión auditada concluye que el contexto exige ocultamiento: la disciplina ocurre de modo que el pecador no pueda verla ni regocijarse sobre el justo. Por eso la traducción española adopta ‘en secreto’ y no una mera idea de moderación.'
  doctrine_reference: Lectura contextual del léxico; coherencia semántica del paralelismo
- issue: Mantenimiento del singular representativo masculino de δίκαιος
  english_pob_reading: a righteous man
  chosen_spanish_reading: Un justo
  alternative_spanish_readings:
  - El justo
  - Una persona justa
  - Un hombre justo
  rationale: El griego es masculino singular con valor proverbial. La traducción conserva esa forma representativa sin neutralizarla, de acuerdo con la política del proyecto sobre precisión de género gramatical cuando tiene valor textual.
  doctrine_reference: Gender-accurate over gender-neutral
- issue: Matiz de ἐπιχαρῇ como alegría hostil o jactancia
  english_pob_reading: may gloat over
  chosen_spanish_reading: se gloríe sobre
  alternative_spanish_readings:
  - se regocije sobre
  - exulte sobre
  - se jacte sobre
  rationale: El compuesto griego implica una alegría dirigida contra otro. En español, ‘se gloríe sobre’ retiene la idea de una satisfacción orgullosa ante el bien ajeno o la aflicción ajena, sin perder la relación de superioridad implícita.
  doctrine_reference: Semántica verbal contextual
translation_notes:
  revision_awareness: El contexto de revisión auditada corrigió la lectura inicial de περιστολή desde una idea de ‘restricción’ hacia ‘secreto/ocultamiento’. La versión española sigue esa adjudicación, porque el propósito del versículo exige que la disciplina del justo no quede a la vista del pecador. También se conservó el valor proverbial del singular masculino δίκαιος y el tono hostil de ἐπιχαρῇ.
  spanish_consistency_notes:
  - Se mantiene ‘justo’ para δίκαιος y ‘pecador’ para ἁμαρτωλός, en contraste proverbial directo.
  - ‘En secreto’ refleja la revisión del audit trail y evita una lectura meramente modal de περιστολή.
  - Se usa ‘es disciplinado’ para παιδεύεται, coherente con el inglés POB y el contexto correctivo.
  - Las notas a/b/c recogen alternativas léxicas reales sin duplicar marcadores.
