translation:
  language: es
  text: En el tercer año de Asa rey de Judá, Baasa hijo de Ahías llegó a ser rey sobre todo Israel en Tirsa, y reinó veinticuatro años.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בִּ/שְׁנַת שָׁלֹשׁ
  english_pob_choice: In the third year
  chosen_spanish: En el tercer año
  alternatives_spanish:
  - En año tres
  lexicon: HALOT
  rationale: 'La fórmula cronológica hebrea con ב se vierte de manera idiomática en español como una referencia temporal: «En el tercer año». Conserva el valor de datación regnal sin forzar un calco extraño.'
- source_word: לְ/אָסָא מֶלֶךְ יְהוּדָה
  english_pob_choice: of Asa king of Judah
  chosen_spanish: de Asa, rey de Judá
  alternatives_spanish:
  - de Asa rey de Judá
  - del rey Asa de Judá
  lexicon: HALOT
  rationale: El lamed introduce la esfera temporal del reinado de Asa. En español, «de Asa, rey de Judá» mantiene la relación genitiva y la identificación regnal con claridad natural.
- source_word: מָלַךְ
  english_pob_choice: became king
  chosen_spanish: llegó a ser rey
  alternatives_spanish:
  - comenzó a reinar
  - reinó
  lexicon: HALOT
  rationale: Aquí el verbo introduce el momento de ascenso al trono, no solo la duración del gobierno. «Llegó a ser rey» conserva el matiz ingrésivo mejor que «reinó», que ya aparece después para la duración.
- source_word: בַּעְשָׁא בֶן אֲחִיָּה
  english_pob_choice: Baasha son of Ahijah
  chosen_spanish: Baasa hijo de Ahías
  alternatives_spanish:
  - Baasa, hijo de Ahías
  lexicon: HALOT
  rationale: Se transliteran los nombres propios según uso bíblico en español y se conserva la filiación patronímica con «hijo de» como equivalente directo de בן.
- source_word: עַל כָּל יִשְׂרָאֵל
  english_pob_choice: over all Israel
  chosen_spanish: sobre todo Israel
  alternatives_spanish:
  - sobre todo el Israel
  - sobre Israel en su totalidad
  lexicon: HALOT
  rationale: עַל con מלך expresa dominio o gobierno sobre un pueblo. «Sobre todo Israel» preserva el alcance total del reinado y suena natural en español.
- source_word: בְּ/תִרְצָה
  english_pob_choice: in Tirzah
  chosen_spanish: en Tirsa
  alternatives_spanish:
  - en Tirsá
  lexicon: HALOT
  rationale: El prefijo ב marca ubicación. «Tirsa» es la forma habitual en español bíblico y mantiene la referencia geográfica del texto.
- source_word: עֶשְׂרִים וְ/אַרְבַּע שָׁנָה
  english_pob_choice: twenty-four years
  chosen_spanish: veinticuatro años
  alternatives_spanish:
  - por veinticuatro años
  - durante veinticuatro años
  lexicon: HALOT
  rationale: La expresión numérica indica la duración del reinado. El español puede dejar implícita la idea durativa con el verbo «reinó», sin añadir elementos ajenos al hebreo.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto español sigue de cerca la lectura estable del POB inglés y del hebreo masorético, sin notas textuales requeridas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «rey» y no «monarca» para conservar el registro bíblico natural en español.
  - Se translitera «Baasa» y «Ahías» con formas usuales en español bíblico para legibilidad pública.
