  category: mistranslation
  tier: 2
  from: from the day of their march
  to: from a day's journey away
  rationale: The Latin phrase `dies itineris` is a standard measure of distance ('a day's journey'). Governed by the preposition `a` (used here to express distance or separation, 'at a distance of'), `a die itineris` means 'from a day's journey away.' It describes how far the terrifying hissing carries, not when it started. The draft mistranslates this as a temporal phrase.
