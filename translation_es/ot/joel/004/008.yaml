    text: 'O: «a una nación distante».'
    reason: lexical_alternative
  revision_rationale: Se corrigen los marcadores de notas para que coincidan con las frases pertinentes del texto, preservando el contenido del rastro inglés. También se pule 'en manos de' a 'en poder de' para una expresión más idiomática del sentido de control implícito en ביד. Se usa 'nación lejana' en el texto principal por naturalidad, manteniendo 'nación distante' como alternativa léxica en nota.
