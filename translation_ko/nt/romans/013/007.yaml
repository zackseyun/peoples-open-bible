id: ROM.13.7
reference: Romans 13:7
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀ἀπόδοτε πᾶσι τὰς ὀφειλάς, τῷ τὸν φόρον τὸν φόρον, τῷ τὸ τέλος τὸ τέλος, τῷ τὸν φόβον τὸν φόβον, τῷ τὴν τιμὴν τὴν τιμήν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/007.yaml
  text: 'Pay to all what is owed: to the one due tax, tax; to the one due revenue, revenue; to the one due fear, fear; to the one due honor, honor.'
translation:
  language: ko
  text: '모든 이에게 마땅한 것을 갚으십시오. 세금을 받을 자에게는 세금을, 관세를 받을 자에게는 관세를, 두려움을 받을 자에게는 두려움을, 존귀를 받을 자에게는 존귀를 갚으십시오.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀπόδοτε ... τὰς ὀφειλάς
  english_pob_choice: Pay ... what is owed
  chosen_korean: 마땅한 것을 갚다
  alternatives_korean:
  - 빚진 것을 갚다
  - 갚을 것을 갚다
  lexicon: BDAG
  rationale: ὀφειλή는 마땅히 갚아야 할 것. ἀποδίδωμι는 「되돌려 주다·갚다」. 빚 갚음의 정형을 보존한다.
- source_word: φόρον / τέλος
  english_pob_choice: tax / revenue
  chosen_korean: 세금 / 관세
  alternatives_korean:
  - 직접세 / 간접세
  - 조세 / 통행세
  lexicon: BDAG
  rationale: 두 어휘의 구분을 살려 φόρος→「세금」(직접세), τέλος→「관세」(간접세·통행세)로 자연스럽게 분리한다.
- source_word: φόβον
  english_pob_choice: fear
  chosen_korean: 두려움
  alternatives_korean:
  - 경외
  lexicon: BDAG
  rationale: '정책: 「두려움」으로 옮긴다. doctrine-realignment가 「존경」으로 약화시킨 azure 수정안을 되돌려 본문의 강도를 회복했다.'
- source_word: τιμήν
  english_pob_choice: honor
  chosen_korean: 존귀
  alternatives_korean:
  - 영예
  - 존경
  lexicon: BDAG
  rationale: τιμή는 가치 있게 여김. 「존귀」가 공경의 무게를 살린다.
theological_decisions:
- issue: φόβος를 약화시켜 옮기지 않음
  chosen_reading: 두려움
  alternative_readings:
  - 존경
  rationale: 본문은 칼을 든 권세를 두려워하라는 13:4과 평행한다. 「존경」으로 약화시키면 본문의 무게가 사라진다. 정책 글로사리와 doctrine-realignment 결정에 부합한다.
  doctrine_reference: 'DOCTRINE.md: 원어 우선·본문의 강도를 약화시키지 말 것'
