  yaml_path: translation/deuterocanon/sirach/036/031.yaml
  text: For who will trust a well-armed robber[b][a], stumbling from city to city? So it is with a man who has no nest and lodges wherever evening finds him.
  footnotes:
  - marker: a
    text: Or 'well-girded robber'—the Greek adjective literally refers to being well-belted or equipped, here likely implying readiness for action.
    reason: lexical_alternative
  - marker: b
    text: Literally 'has no nest,' a metaphor for having no settled home or secure resting place.
    reason: lexical_alternative
