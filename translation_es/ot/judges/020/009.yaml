translation:
  language: es
  text: 'Pero ahora esto es lo que haremos a Gabaa: contra ella por sorteo[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «contra ella por echar suertes». El hebreo es muy breve y puede entenderse como una acción militar decidida u ordenada mediante sorteo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Y ahora
  - Ahora
  lexicon: HALOT
  rationale: La conjunción con valor discursivo introduce un paso siguiente con matiz de contraste o transición; «Pero ahora» conserva bien ese giro sin volverlo demasiado enfático.
- source_word: זֶה הַדָּבָר אֲשֶׁר
  english_pob_choice: this is what
  chosen_spanish: esto es lo que
  alternatives_spanish:
  - esta es la cosa que
  - esto es el asunto que
  lexicon: HALOT
  rationale: La construcción hebrea es una introducción breve a una decisión concreta; «esto es lo que» es natural en español y mantiene la concisión del original.
- source_word: נַעֲשֶׂה
  english_pob_choice: we will do
  chosen_spanish: haremos
  alternatives_spanish:
  - vamos a hacer
  - haremos nosotros
  lexicon: HALOT
  rationale: El imperfecto 1cp expresa acción planificada o futura; el futuro simple español transmite adecuadamente la deliberación sin añadir un matiz de mandato que no está explícito.
- source_word: לַגִּבְעָה
  english_pob_choice: to Gibeah
  chosen_spanish: con Gabaa
  alternatives_spanish:
  - a Gabaa
  - contra Gabaa
  lexicon: HALOT
  rationale: El lamed aquí marca el objetivo o referencia del plan. En español, como el giro final ya expresa la hostilidad con «contra ella», «con Gabaa» mantiene mejor la estructura compacta del hebreo, aunque suene elíptico. Se mantiene el topónimo en forma castellana habitual «Gabaa».
- source_word: עָלֶיהָ
  english_pob_choice: against it
  chosen_spanish: contra ella
  alternatives_spanish:
  - sobre ella
  - contra ello
  lexicon: HALOT
  rationale: En contexto militar, על con עיר/ciudad expresa movimiento hostil o acción contra un lugar; en español «contra ella» conserva ese valor y refleja la referencia femenina implícita del topónimo hebreo.
- source_word: בְּגוֹרָל
  english_pob_choice: by lot
  chosen_spanish: por sorteo
  alternatives_spanish:
  - por suerte
  - mediante sorteo
  lexicon: HALOT
  rationale: El sustantivo גּוֹרָל designa la determinación por sorteo/lotes. «Por sorteo» es claro y moderno; evita ambigüedad con «suerte», que en español puede sonar demasiado genérico.
translation_notes:
  revision_awareness: La redacción española sigue de cerca la revisión final del POB en inglés, que eliminó un verbo añadido («we will go up») para respetar la concisión del hebreo. Por eso se conserva una estructura igualmente breve y elíptica, sin introducir un verbo de movimiento no presente en el texto fuente.
  spanish_consistency_notes:
  - Se usa «Gabaa» como forma española del topónimo Gibeah para lectura eclesial en español.
  - Se mantiene el tono sobrio y conciso, evitando expandir la elipsis hebrea más allá de lo necesario.
  - «Por sorteo» traduce el valor instrumental de בְּגוֹרָל y armoniza con la nota alternativa sobre echar suertes.
