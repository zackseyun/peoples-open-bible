translation:
  language: es
  text: ¿Cómo podrá volverse sabio[a] el que maneja el arado, que conduce los bueyes y cuyos afanes están en el ganado[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es algo difícil en la primera cláusula; el paralelo griego dice más explícitamente: «¿Cómo podrá volverse sabio el que sostiene un arado… conduciendo bueyes…?». La traducción sigue el hebreo, usando el griego para aclarar el sentido agrícola.'
    reason: alternative_reading
  - marker: b
    text: O «cuya conversación es sobre el ganado». El hebreo puede referirse tanto a sus preocupaciones en general como, más específicamente, a lo que dice sobre el ganado; el paralelo griego se inclina hacia la idea de discurso o relato.
    reason: lexical_alternative
lexical_decisions:
- source_word: אלוף
  english_pob_choice: one who guides
  chosen_spanish: el que maneja
  alternatives_spanish:
  - el que guía
  - el experto
  - el capataz
  lexicon: HALOT
  rationale: El hebreo es difícil; el audit trail inglés lo toma funcionalmente como la persona que dirige el trabajo agrícola. En español, 'maneja' expresa con naturalidad esa función sin convertirlo en un título social o técnico no atestiguado.
- source_word: ינהג
  english_pob_choice: guides
  chosen_spanish: maneja
  alternatives_spanish:
  - guía
  - conduce
  - dirige
  lexicon: HALOT
  rationale: El verbo denota conducir o manejar animales o implementos. 'Maneja' funciona bien con 'el arado' y mantiene la idea de control operativo del trabajo del campo.
- source_word: ישובב
  english_pob_choice: drives
  chosen_spanish: conduciendo
  alternatives_spanish:
  - arando
  - volviendo a y de
  - ocupándose en
  lexicon: HALOT
  rationale: El hebreo es incierto; el paralelo griego describe movimiento y actividad con los bueyes. 'Conduciendo' conserva la acción continua y el manejo del ganado sin forzar una interpretación demasiado específica.
- source_word: לשדד
  english_pob_choice: the plow
  chosen_spanish: el arado
  alternatives_spanish:
  - la labor de arar
  - el trabajo de romper la tierra
  - el apero de arar
  lexicon: HALOT
  rationale: El audit trail inglés resuelve el sentido agrícola implícito con 'the plow'; en español 'el arado' es la manera más directa y clara de expresar el implemento de labranza que subyace al texto.
- source_word: בשור
  english_pob_choice: the ox
  chosen_spanish: los bueyes
  alternatives_spanish:
  - el buey
  - con un buey
  - los toros
  lexicon: HALOT
  rationale: El contexto agrícola y el paralelo griego hablan del animal de tiro en plural. 'Los bueyes' refleja mejor el cuadro de trabajo del verso y evita una singularidad innecesaria.
- source_word: שעיותיו
  english_pob_choice: whose concerns are with
  chosen_spanish: ocupándose en sus labores
  alternatives_spanish:
  - cuyos asuntos son con
  - cuya conversación gira en torno a
  - cuyo pensamiento está en
  lexicon: HALOT
  rationale: El sustantivo puede referirse a ocupación, preocupación o discurso. Dado que el versículo describe la vida laboral del campesino, 'ocupándose en sus labores' captura la idea general de estar absorbido por el trabajo, sin perder la alternativa de 'hablar de ellos' que el inglés preserva en nota.
- source_word: בני בקר
  english_pob_choice: the cattle
  chosen_spanish: ellos
  alternatives_spanish:
  - el ganado
  - los bueyes
  - los novillos
  lexicon: HALOT
  rationale: La expresión hebrea puede referirse al ganado bovino o, según el paralelo griego, a los animales relacionados con el trabajo de tiro. En la cláusula final, el pronombre retoma naturalmente a los bueyes ya mencionados; esto evita repetición pesada y mantiene fluidez en español.
theological_decisions:
- issue: Tensión textual entre hebreo y griego sobre la estructura agrícola del verso
  english_pob_reading: The translation follows the Hebrew while using the Greek to clarify the agricultural sense.
  chosen_spanish_reading: La traducción sigue el hebreo, pero deja visible la ayuda del griego para precisar el cuadro agrícola.
  alternative_spanish_readings:
  - Seguir solo el hebreo, sin aclaración.
  - Reformular enteramente según el griego.
  rationale: El hebreo de la primera cláusula es difícil, y el paralelo griego explicita al que sostiene el arado y a los bueyes. En español conviene mantener la base hebrea del versículo, pero sin ocultar la aclaración que aporta el griego en el aparato de decisión.
  doctrine_reference: Principio textual de testigos paralelos en la tradición sapiencial; crítica textual comparada
- issue: 'Ambigüedad de שעיותיו: preocupación/ocupación frente a conversación'
  english_pob_reading: Or 'whose talk is about the cattle.' The Hebrew can point either to his concerns generally or more specifically to what he speaks about; the Greek parallel leans toward 'speech/account.'
  chosen_spanish_reading: O ‘cuya conversación es sobre ellos’.
  alternative_spanish_readings:
  - ‘cuyos asuntos son con ellos’
  - ‘quien habla de ellos’
  rationale: La ambigüedad es real y no debe borrarse. Como el español puede sonar más natural con una formulación relacional, la redacción principal expresa ocupación en el trabajo y la nota preserva la lectura alternativa de conversación/discurso.
  doctrine_reference: Respeto por la polisemia del hebreo sapiencial y por el testimonio del paralelo griego
translation_notes:
  revision_awareness: El pasaje fue revisado recientemente y quedó sin cambios; aun así, este borrador español reevalúa la ambigüedad de la primera cláusula y la última expresión a la luz del hebreo y del paralelo griego, manteniendo visible la tensión textual donde corresponde.
  spanish_consistency_notes:
  - 'Se mantuvo una solución formal-optativa: base hebrea con apoyo explícito del griego en nota.'
  - Se evitó ‘SEÑOR’ o terminología no pertinente; el pasaje es sapiencial y no contiene el nombre divino.
  - Se prefirió ‘arado’ y ‘bueyes’ por claridad agrícola, coherentes con el campo semántico del texto.
  - Se preservó la ambigüedad de la última cláusula mediante nota, sin cerrarla demasiado en el cuerpo del texto.
