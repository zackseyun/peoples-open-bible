translation:
  language: es
  text: Pero los salvó[a] por causa de su nombre[b], para dar a conocer su poderío[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y los salvó» o «Sin embargo, los salvó»; la conjunción hebrea puede verterse de varias maneras y aquí expresa contraste con el versículo anterior.'
    reason: lexical_alternative
  - marker: b
    text: «Nombre» también puede entenderse como «reputación», aunque en hebreo suele abarcar el carácter revelado y el honor de Dios.
    reason: lexical_alternative
  - marker: c
    text: 'O: «para dar a conocer su poder».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשִׁיעֵם
  english_pob_choice: Yet he saved them
  chosen_spanish: Sin embargo, los salvó
  alternatives_spanish:
  - Y los salvó
  - Pero los salvó
  - Y los libró
  lexicon: HALOT
  rationale: El verbo ישׁע expresa salvar/librar. «Los salvó» mantiene la fuerza teológica natural en español. Para la conjunción inicial, «Sin embargo» transmite bien el contraste que el audit trail identifica con el versículo anterior, sin forzar demasiado el hebreo.
- source_word: לְמַעַן
  english_pob_choice: for the sake of
  chosen_spanish: por amor de
  alternatives_spanish:
  - por causa de
  - a favor de
  - en atención a
  lexicon: HALOT
  rationale: La expresión hebrea indica motivo o propósito. En este contexto, «por amor de» comunica de forma idiomática la idea de actuar en consideración a algo valioso para Dios, manteniendo el énfasis en su nombre y honor.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su reputación
  - su fama
  - su nombre revelado
  lexicon: HALOT
  rationale: 'Se conserva «nombre» porque el hebreo incluye más que reputación pública: implica identidad revelada, honor y memoria del carácter de Dios. Por eso no se reduce a «reputación» en el texto principal.'
- source_word: לְהוֹדִיעַ
  english_pob_choice: to make known
  chosen_spanish: para dar a conocer
  alternatives_spanish:
  - para hacer conocer
  - para manifestar
  - para revelar
  lexicon: HALOT
  rationale: El infinitivo hifil de ידע tiene sentido causativo. «Dar a conocer» es una equivalencia natural en español y preserva la idea de hacer algo público y perceptible.
- source_word: גְּבוּרָתוֹ
  english_pob_choice: his might
  chosen_spanish: su poder
  alternatives_spanish:
  - su fuerza
  - su poderío
  - su might
  lexicon: HALOT
  rationale: Aunque el inglés eligió «might», en español «poder» comunica con claridad la capacidad eficaz de Dios y funciona bien con «dar a conocer». No se traduce como mera fuerza física; aquí se trata de la capacidad poderosa de Dios para salvar.
theological_decisions:
- issue: Sentido de 'por amor de su nombre'
  english_pob_reading: God's saving act is grounded in concern for the honor and revelation of his own name/character.
  chosen_spanish_reading: La salvación de Dios se fundamenta en la consideración de su propio nombre, es decir, de su honor y carácter revelado.
  alternative_spanish_readings:
  - por su reputación
  - por causa de su fama
  rationale: «Nombre» se conserva por su densidad bíblica. En español, agregar «por amor de» puede sonar devocional, pero aquí expresa adecuadamente la motivación divina sin vaciar la carga de honor y revelación que el hebreo lleva.
  doctrine_reference: Teología bíblica del nombre de Dios; revelación del carácter divino
- issue: Matiz de contraste en la conjunción inicial
  english_pob_reading: '''Yet'' reflects an adversative force in context.'
  chosen_spanish_reading: «Sin embargo» marca el contraste con la rebelión del versículo anterior.
  alternative_spanish_readings:
  - Y
  - Pero
  rationale: El hebreo permite una conexión simple, pero el contexto poético exige un matiz adversativo. «Sin embargo» expresa mejor esa tensión sin sobreinterpretar el texto.
  doctrine_reference: Lectura contextual de la poesía hebrea
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo entre la revisión más reciente y la auditoría: no se registraron revisiones aplicadas y el veredicto fue de alta concordancia. La redacción española conserva ese consenso y no introduce cambios interpretativos nuevos.'
  spanish_consistency_notes:
  - Se mantiene la terminología POB de «nombre» para שֵׁם y no se sustituye por una paráfrasis más débil.
  - «Poder» se usa como equivalente natural de גְּבוּרָה en este contexto; la nota conserva la alternativa «fuerza» para reflejar el matiz semántico.
  - La lectura adversativa inicial queda explícita en el texto principal y en la nota, conforme al contexto poético del versículo.
