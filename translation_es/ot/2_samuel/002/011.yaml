translation:
  language: es
  text: El tiempo[a] que David fue rey en Hebrón sobre la casa de Judá fue de siete años y seis meses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el número de los días». El hebreo usa este modismo para referirse a la duración del reinado de David en Hebrón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: was
  chosen_spanish: fue
  alternatives_spanish:
  - y fue
  - y aconteció
  lexicon: HALOT
  rationale: Aquí el verbo introduce una afirmación de duración; en español natural, 'fue' comunica el estado/periodo sin forzar un calco narrativo innecesario.
- source_word: מִסְפַּר הַיָּמִים
  english_pob_choice: The length of time
  chosen_spanish: La duración del tiempo
  alternatives_spanish:
  - el número de los días
  - el tiempo
  lexicon: HALOT
  rationale: 'Sigo el valor idiomático señalado por el POB inglés: no se trata de contar días literalmente, sino de expresar duración. ''Duración del tiempo'' preserva esa función y mantiene transparencia con el hebreo.'
- source_word: אֲשֶׁר הָיָה
  english_pob_choice: that ... was
  chosen_spanish: que ... fue
  alternatives_spanish:
  - durante el cual ... fue
  - cuando ... fue
  lexicon: HALOT
  rationale: La relativa une la duración con el reinado de David. 'Que ... fue' es directo y fiel al enlace sintáctico del hebreo.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  lexicon: HALOT
  rationale: '''Rey'' es la equivalencia normal y precisa para el título real hebreo.'
- source_word: בְּחֶבְרוֹן
  english_pob_choice: in Hebron
  chosen_spanish: en Hebrón
  alternatives_spanish:
  - en Hebron
  lexicon: HALOT
  rationale: La preposición locativa pide 'en'; mantengo la forma española habitual del topónimo.
- source_word: עַל בֵּית יְהוּדָה
  english_pob_choice: over the house of Judah
  chosen_spanish: sobre la casa de Judá
  alternatives_spanish:
  - sobre Judá
  - sobre la familia de Judá
  lexicon: HALOT
  rationale: Conservo 'casa' para no borrar la expresión hebrea y su sentido corporativo. 'Sobre' reproduce la relación de gobierno del original y coincide con la decisión auditada en inglés.
- source_word: שֶׁבַע שָׁנִים וְשִׁשָּׁה חֳדָשִׁים
  english_pob_choice: seven years and six months
  chosen_spanish: siete años y seis meses
  alternatives_spanish:
  - siete años, seis meses
  lexicon: HALOT
  rationale: Traducción directa e idiomática de la duración explícita del texto.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés y la revisión confirmada como sin cambios; solo se adapta la formulación al español natural y se restaura el anclaje de la nota [a] en la frase correspondiente.
  spanish_consistency_notes:
  - He mantenido 'casa de Judá' para reflejar la imagen corporativa del hebreo.
  - He usado 'Hebrón' y 'Judá' con la ortografía española estándar.
  - La nota [a] está anclada en 'tiempo' para señalar la alternativa léxica del modismo 'número de los días'.
