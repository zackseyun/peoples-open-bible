  yaml_path: translation/ot/deuteronomy/033/029.yaml
  text: Blessed are you[a], Israel! Who is like you, a people saved by Yahweh, the shield of your help and the sword of your majesty? Your enemies will come cringing to you[b], and you will tread on their high places.
