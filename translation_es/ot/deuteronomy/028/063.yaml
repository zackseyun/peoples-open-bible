translation:
  language: es
  text: Y sucederá que, así como Yahvé se alegró por ustedes para hacerles bien y multiplicarlos, así Yahvé se alegrará por ustedes para destruirlos y aniquilarlos; y serán arrancados de la tierra en la cual estás[a] por entrar para poseerla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa singular en 'estás ... entrar' al dirigirse a Israel como un solo pueblo.
    reason: cultural_note
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it shall be that
  chosen_spanish: Y sucederá que
  alternatives_spanish:
  - Y será que
  - Y acontecerá que
  lexicon: HALOT
  rationale: Introduce una consecuencia futura con tono formal pero natural en español. 'Sucederá que' conserva el valor prospectivo sin sonar tan arcaico como una fórmula más calcada.
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - del mismo modo que
  lexicon: HALOT
  rationale: Expresa claramente la comparación entre la alegría de Yahvé al bendecir y su alegría al juzgar, manteniendo el paralelismo retórico.
- source_word: שָׂשׂ / יָשִׂישׂ
  english_pob_choice: rejoiced / will rejoice
  chosen_spanish: se alegró / se alegrará
  alternatives_spanish:
  - se regocijó / se regocijará
  - se gozó / se gozará
  lexicon: HALOT
  rationale: '''Alegrarse'' reproduce bien el campo semántico de gozo y mantiene el mismo verbo en ambos miembros para conservar la correspondencia del texto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se sigue el término identitario del proyecto para el nombre divino, evitando la sustitución por una convención de máscara litúrgica.
- source_word: לְהֵיטִיב אֶתְכֶם
  english_pob_choice: to do you good
  chosen_spanish: para hacerles bien
  alternatives_spanish:
  - para beneficiarlos
  - para hacerlos prosperar
  lexicon: HALOT
  rationale: '''Hacerles bien'' preserva el sentido amplio y pactal de היטיב sin restringirlo a prosperidad material. Se mantiene el trato plural respetuoso ''les'' por la dirección a Israel como pueblo.'
- source_word: וּלְהַרְבּוֹת אֶתְכֶם
  english_pob_choice: and to multiply you
  chosen_spanish: y multiplicarlos
  alternatives_spanish:
  - y aumentarlos
  - y hacerlos muchos
  lexicon: HALOT
  rationale: '''Multiplicar'' es el equivalente covenantal más directo y reconocible, fiel al paralelismo bíblico de bendición.'
- source_word: לְהַאֲבִיד אֶתְכֶם
  english_pob_choice: to destroy you
  chosen_spanish: para destruirlos
  alternatives_spanish:
  - para hacerlos perecer
  - para arruinarlos
  lexicon: HALOT
  rationale: '''Destruir'' traduce con fuerza estándar el causativo de אבד, sin suavizar el juicio anunciado.'
- source_word: וּלְהַשְׁמִיד אֶתְכֶם
  english_pob_choice: and to annihilate you
  chosen_spanish: y aniquilarlos
  alternatives_spanish:
  - y exterminarlos
  - y eliminarlos
  lexicon: HALOT
  rationale: '''Aniquilar'' reproduce la intensidad de שׁמד con una forma formal y auditable en español, coherente con el audit trail inglés.'
- source_word: וְנִסַּחְתֶּם
  english_pob_choice: and you will be uprooted
  chosen_spanish: y serán arrancados
  alternatives_spanish:
  - y serán desarraigados
  - y serán expulsados
  lexicon: HALOT
  rationale: La imagen agrícola de arrancar/desarraigar comunica bien el verbo de remoción forzada. 'Arrancados' conserva la metáfora de extracción violenta y permite una lectura fluida en español.
- source_word: מֵעַל הָאֲדָמָה
  english_pob_choice: from the land / from upon the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de sobre la tierra
  - de encima de la tierra
  lexicon: HALOT
  rationale: En español, 'de la tierra' comunica el lugar de expulsión con naturalidad. La fuerza de מֵעַל queda implícita por el verbo 'arrancados' y no requiere una sobrecarga preposicional.
- source_word: אֲשֶׁר אַתָּה בָא שָׁמָּה
  english_pob_choice: that you are entering
  chosen_spanish: que van a entrar
  alternatives_spanish:
  - que están entrando
  - que van allí a entrar
  lexicon: HALOT
  rationale: Se refleja el movimiento futuro hacia la tierra prometida. Aunque el hebreo tiene singular en el verbo, el español puede naturalizarlo al plural por tratarse de Israel como colectivo, sin perder el sentido corporativo.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess it
  chosen_spanish: a poseer
  alternatives_spanish:
  - para poseerla
  - a tomar posesión de ella
  lexicon: HALOT
  rationale: '''Poseer'' conserva el valor jurídico-covenantal de ירשׁ. Se omite el pronombre por fluidez en español, dado que el referente ya está claro en ''la tierra''.'
theological_decisions:
- issue: Alegría divina en juicio
  english_pob_reading: The LORD will rejoice over you to destroy you and to annihilate you.
  chosen_spanish_reading: Yahvé se alegrará sobre ustedes para destruirlos y aniquilarlos.
  alternative_spanish_readings:
  - Yahvé se gozará sobre ustedes para destruirlos y aniquilarlos
  - Yahvé se deleitará sobre ustedes para destruirlos y aniquilarlos
  rationale: 'Se preserva sin atenuación la tensión teológica del paralelismo: la misma alegría divina que acompañó el bien ahora acompaña el juicio. No se suaviza ni se explica apologéticamente, porque el hebreo la formula de manera deliberada.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: Se sigue el término estándar del proyecto para el Tetragrámaton, manteniendo coherencia con la serie española y evitando la convención de reemplazar el nombre por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se prefirió una equivalencia formal y natural para el segundo verbo de destrucción (''aniquilar'') y una imagen de remoción más idiomática que ''arrancados de sobre la tierra''. En español, ''serán arrancados de la tierra'' mantiene la metáfora y la claridad sin depender de un calco pesado de la preposición.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene el paralelismo verbal 'se alegró / se alegrará' para reflejar la repetición retórica del hebreo.
  - '''Multiplicarlos'' y ''aniquilarlos'' conservan el contraste semántico fuerte entre bendición y juicio.'
  - El colectivo 'ustedes' / 'les' / 'los' sigue la referencia corporativa a Israel, sin intentar marcar el singular hebreo en la superficie del texto.
