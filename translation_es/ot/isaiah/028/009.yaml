translation:
  language: es
  text: ¿A quién enseñará conocimiento, y a quién hará entender el mensaje[a]? A los destetados de la leche[b], a los separados de los senos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «informe», o «lo oído» para «el mensaje».
    reason: lexical_alternative
  - marker: b
    text: El hebreo deja implícito el sujeto de «enseñará» y «hará entender»; el contexto puede sugerir que el hablante se refiere sarcásticamente a Isaías.
    reason: alternative_reading
lexical_decisions:
- source_word: יוֹרֶה
  english_pob_choice: will he teach
  chosen_spanish: enseñará
  alternatives_spanish:
  - instruirá
  - impartirá enseñanza
  lexicon: HALOT
  rationale: El hiphil de ירה tiene sentido de enseñar/instruir. «Enseñará» conserva el valor pedagógico de forma natural en español y mantiene el tono interrogativo-retórico del hebreo.
- source_word: דֵעָה
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - saber
  lexicon: HALOT
  rationale: El sustantivo denota conocimiento o entendimiento. «Conocimiento» es la opción más directa y armoniza con la pregunta paralela.
- source_word: יָבִין
  english_pob_choice: will he explain
  chosen_spanish: hará entender
  alternatives_spanish:
  - explicará
  - causará entender
  lexicon: HALOT
  rationale: El hiphil de בין expresa hacer comprender. «Hará entender» conserva la fuerza causativa con un español claro, sin perder la relación con el término anterior.
- source_word: שְׁמוּעָה
  english_pob_choice: the message
  chosen_spanish: el mensaje
  alternatives_spanish:
  - el informe
  - lo oído
  - la noticia
  lexicon: HALOT
  rationale: En este contexto puede significar reporte, mensaje o noticia. «El mensaje» comunica bien el contenido transmitido y sigue de cerca la decisión auditada del inglés POB.
- source_word: גְּמוּלֵי
  english_pob_choice: those weaned
  chosen_spanish: los destetados
  alternatives_spanish:
  - los destetados de la leche
  - los que han sido destetados
  lexicon: HALOT
  rationale: La forma participial indica a los que han sido destetados. «Los destetados» es idiomático y preserva el sentido pasivo/plural del hebreo.
- source_word: מֵחָלָב
  english_pob_choice: from milk
  chosen_spanish: de la leche
  alternatives_spanish:
  - de leche
  - de la leche materna
  lexicon: HALOT
  rationale: La preposición מן marca separación. En español, con «destetados» lo más natural es «de la leche», que conserva la imagen sin sobreexplicar.
- source_word: עַתִּיקֵי
  english_pob_choice: those taken
  chosen_spanish: los separados
  alternatives_spanish:
  - los retirados
  - los apartados
  lexicon: HALOT
  rationale: La raíz sugiere ser movidos o apartados. «Separados» refleja la idea de haber sido apartados del amamantamiento y funciona bien en paralelo con «destetados».
- source_word: מִשָּׁדָיִם
  english_pob_choice: from the breasts
  chosen_spanish: de los pechos
  alternatives_spanish:
  - de los senos
  - de las pechugas
  lexicon: HALOT
  rationale: El dual/plural hebreo es literal. «Pechos» es una equivalencia directa, comprensible y sobria en español bíblico actual.
- source_word: אֶת מִי ... וְאֶת מִי
  english_pob_choice: Whom ... and to whom
  chosen_spanish: ¿A quién ... y a quién ...?
  alternatives_spanish:
  - ¿A quién ... y para quién ...?
  lexicon: Hebrew grammar
  rationale: La estructura con אֶת y el interrogativo «quién» se reproduce de forma natural con «a quién». Mantener la repetición conserva el paralelismo retórico.
theological_decisions:
- issue: Sujeto implícito de los verbos en tercera persona singular
  english_pob_reading: Render with generic 'he' without identifying the referent in translation.
  chosen_spanish_reading: Mantener los verbos sin identificar al sujeto explícito, dejando la referencia implícita.
  alternative_spanish_readings:
  - ¿Quién les enseñará conocimiento...?
  - ¿Y a quién explicará el mensaje? (identificando al hablante en nota o en el texto)
  - Isaías como sujeto implícito
  rationale: El hebreo usa verbos en tercera persona singular sin sujeto explícito. Dado que el contexto puede sugerir una referencia irónica o indirecta, la traducción preserva esa ambigüedad y no resuelve la identidad del sujeto en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; se mantiene la lectura auditada con equivalencia óptima y sin alteraciones textuales.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; en este versículo no aparece el tetragrámaton.
  - Se conserva la distinción entre «conocimiento» y «mensaje» para reflejar dos objetos semánticos distintos.
  - Se mantiene «destetados» para גְּמוּלֵי y «separados» para עַתִּיקֵי, preservando el paralelismo sin colapsar ambas imágenes.
  - La repetición de «a quién» reproduce el paralelismo interrogativo hebreo con fluidez española.
  - «Pechos» se conserva como imagen corporal literal del hebreo, sin sustituirla por una paráfrasis eufemística.
