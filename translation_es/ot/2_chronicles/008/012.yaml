translation:
  language: es
  text: Entonces Salomón ofreció holocaustos a Yahvé sobre el altar de Yahvé, que había construido delante del vestíbulo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pórtico» o «el pórtico de entrada». El hebreo se refiere a la sala de entrada del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - En ese momento
  lexicon: HALOT
  rationale: Marca temporal y narrativa. «Entonces» conserva la secuencia del relato de manera natural en español sin añadir matices no presentes en el hebreo.
- source_word: הֶעֱלָה
  english_pob_choice: offered up
  chosen_spanish: ofreció
  alternatives_spanish:
  - ofreció en sacrificio
  - elevó
  lexicon: HALOT
  rationale: En contexto sacrificial, el hiphil de עלה refiere a presentar un sacrificio. «Ofreció» es idiomático en español; el añadido explícito «en sacrificio» no es necesario porque «holocaustos» ya fija el sentido ritual.
- source_word: עֹלֹות
  english_pob_choice: burnt offerings
  chosen_spanish: holocaustos
  alternatives_spanish:
  - ofrendas quemadas
  - ofrendas totalmente quemadas
  lexicon: HALOT
  rationale: «Holocaustos» es el término español bíblico técnico para עֹלָה y mantiene la fuerza cultual del hebreo. Las alternativas son más explicativas pero menos tradicionales y menos precisas como término sacrificial.
- source_word: לַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
  rationale: Se preserva el nombre divino explícito del hebreo. En español, la forma de referencia adoptada es «Yahvé», que comunica el Tetragrama sin ocultarlo detrás de un título.
- source_word: מִזְבַּח יְהוָה
  english_pob_choice: the altar of Yahweh
  chosen_spanish: el altar de Yahvé
  alternatives_spanish:
  - el altar de Yahweh
  - el altar del SEÑOR
  lexicon: HALOT
  rationale: La cadena constructa se rinde de forma transparente con «de». Se evita «SEÑOR» porque el texto hebreo usa directamente el nombre divino.
- source_word: אֲשֶׁר בָּנָה
  english_pob_choice: that he had built
  chosen_spanish: que había construido
  alternatives_spanish:
  - que construyó
  - que él había construido
  lexicon: HALOT
  rationale: El pluscuamperfecto español ayuda a distinguir la acción previa de construir respecto de la ofrenda posterior, como en el audit trail inglés.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - frente a
  - ante
  lexicon: HALOT
  rationale: En una descripción arquitectónica del templo, «delante de» comunica mejor la ubicación espacial que «antes de», que en español sería temporal.
- source_word: הָאוּלָם
  english_pob_choice: the vestibule
  chosen_spanish: el vestíbulo
  alternatives_spanish:
  - el pórtico
  - el portal
  - el atrio de entrada
  lexicon: HALOT
  rationale: «Vestíbulo» reproduce el valor arquitectónico del término hebreo y coincide con la decisión auditada en inglés. Las alternativas son posibles, pero menos exactas o más interpretativas.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo contiene el Tetragrama en ambos lugares del versículo. Se conserva como nombre propio divino en español para no enmascarar el texto fuente ni diluir su referencia covenantal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Término sacrificial עֹלֹות
  english_pob_reading: burnt offerings
  chosen_spanish_reading: holocaustos
  alternative_spanish_readings:
  - ofrendas quemadas
  - holocausto
  rationale: El contexto de altar y sacrificio exige un término cultual. «Holocaustos» preserva la categoría ritual concreta de עֹלָה y evita una paráfrasis que debilite la fuerza sacrificial.
  doctrine_reference: Lexical/theological consistency in sacrificial terms
translation_notes:
  revision_awareness: 'Se revisó el uso del nombre divino según el contexto auditado: aunque el inglés POB traduce יהוה como «Yahweh», en español se normaliza a «Yahvé» por consistencia terminológica del proyecto. No se introdujeron cambios de sentido; solo se adaptó la forma del nombre propio y se mantuvo la precisión arquitectónica de הָאוּלָם.'
  spanish_consistency_notes:
  - Se mantuvo la secuencia narrativa con «Entonces».
  - «Holocaustos» conserva el término técnico sacrificial sin añadir explicaciones al texto principal.
  - «Delante de» expresa ubicación espacial, no temporal.
  - La repetición de «Yahvé» refleja ambas ocurrencias de יְהוָה en el versículo.
  - «Vestíbulo» mantiene la equivalencia arquitectónica; la nota ofrece alternativas idiomáticas cercanas.
