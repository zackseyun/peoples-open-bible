revisions:
- from: para hacer justicia al huérfano y al oprimido[a][b], de modo que el hombre de la tierra[c] no siga aterrorizando nunca más.
  to: para hacer justicia al huérfano[a] y al oprimido[b], de modo que el hombre desde la tierra[c] ya no vuelva a aterrorizar.
  rationale: Se ajusta el último sintagma para alinearlo mejor con la revisión inglesa auditada («man from the earth») mediante «el hombre desde la tierra», y se simplifica la cláusula final a «ya no vuelva a aterrorizar» para un español más natural. También se rehace la nota c para conservar la alternativa significativa «hombre de la tierra» y su matiz de mortalidad.
