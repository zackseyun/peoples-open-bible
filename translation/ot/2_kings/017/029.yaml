id: 2KI.17.29
reference: 2 Kings 17:29
source:
  edition: WLC
  text: וַ/יִּהְי֣וּ עֹשִׂ֔ים גּ֥וֹי גּ֖וֹי אֱלֹהָ֑י/ו וַ/יַּנִּ֣יחוּ בְּ/בֵ֣ית הַ/בָּמ֗וֹת אֲשֶׁ֤ר עָשׂוּ֙ הַ/שֹּׁ֣מְרֹנִ֔ים גּ֥וֹי גּוֹי֙ בְּ/עָ֣רֵי/הֶ֔ם אֲשֶׁ֛ר הֵ֥ם יֹשְׁבִ֖ים שָֽׁם׀׃
translation:
  text: But each nation kept making its own gods[a], and they set them in the shrines of the high places that the people of Samaria had made, each nation in the cities where they lived.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'the Samaritans had made.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּהְיוּ עֹשִׂים
  chosen: kept making
  alternatives:
  - were making
  - made
  lexicon: HALOT
  rationale: The combination of היה + participle expresses ongoing or customary action in past narrative. 'Kept making' captures the iterative sense better than a simple past.
- source_word: גּוֹי גּוֹי
  chosen: each nation
  alternatives:
  - nation by nation
  - every nation
  lexicon: HALOT
  rationale: The distributive repetition indicates that each distinct ethnic group acted separately. 'Each nation' is natural English and preserves the distributive force.
- source_word: אֱלֹהָיו
  chosen: its own gods
  alternatives:
  - its gods
  - his gods
  lexicon: HALOT
  rationale: With גוי as a collective singular repeated distributively, the suffix is best rendered with singular English reference to each nation. 'Its own gods' makes explicit the possessive and the contrast among the nations' separate deities.
- source_word: וַיַּנִּיחוּ
  chosen: they set
  alternatives:
  - they placed
  - they put
  lexicon: HALOT
  rationale: The verb here means to place or deposit. 'Set' is concise and idiomatic in a cultic-placement context.
- source_word: בְּבֵית הַבָּמוֹת
  chosen: in the shrines of the high places
  alternatives:
  - in the house of the high places
  - in the temples of the high places
  lexicon: HALOT
  rationale: The singular construct 'house of the high places' is an idiom for a cult-site structure associated with high places. 'Shrines of the high places' communicates the sense in clear modern English without wooden literalism.
- source_word: אֲשֶׁר עָשׂוּ הַשֹּׁמְרֹנִים
  chosen: that the people of Samaria had made
  alternatives:
  - that the Samaritans had made
  - which the Samarians made
  lexicon: HALOT
  rationale: At this historical point the reference is to inhabitants of Samaria rather than the later sectarian sense often associated with 'Samaritans.' 'People of Samaria' avoids anachronistic misunderstanding.
- source_word: בְּעָרֵיהֶם
  chosen: in the cities
  alternatives:
  - in their cities
  lexicon: HALOT
  rationale: The suffix refers back to the nations in a distributive sense. Because English already has 'each nation,' simply 'in the cities' reads smoothly; the possessive idea is still carried by the following clause 'where they lived.'
- source_word: אֲשֶׁר הֵם יֹשְׁבִים שָׁם
  chosen: where they lived
  alternatives:
  - where they were living
  - where they dwelt there
  lexicon: HALOT
  rationale: The clause identifies the locations of settlement. 'Where they lived' is idiomatic and sufficiently reflects the participial sense without awkwardness.
