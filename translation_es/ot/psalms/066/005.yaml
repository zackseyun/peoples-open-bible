revisions:
- from: Vengan y vean las obras de Dios[a]; es impresionante en sus hechos hacia los hijos de los hombres.
  to: Vengan y vean las obras de Dios; él es sobrecogedor en sus hechos hacia los hijos del hombre[a].
  rationale: Se corrige la nota para que refleje la alternativa realmente significativa del hebreo y del audit trail inglés; se mejora la naturalidad y fidelidad de בְּנֵי אָדָם con «los hijos del hombre» en lugar de «los hijos de los hombres»; y se refuerza el matiz reverente de נוֹרָא con «sobrecogedor». No se requiere adjudicación adicional porque son ajustes claros de fidelidad y estilo.
