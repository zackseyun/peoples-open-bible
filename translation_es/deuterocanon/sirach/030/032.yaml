translation:
  language: es
  text: El día en que se completen los días de tu vida[a], y en el tiempo de tu muerte, distribuye tu herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando los días de tu vida estén en su cumplimiento». El giro griego es compacto y puede traducirse más literalmente como «en el día de la consumación de los días de tu vida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἡμέρᾳ
  english_pob_choice: On the day
  chosen_spanish: En el día
  alternatives_spanish:
  - El día
  - En aquel día
  lexicon: LSJ
  rationale: La construcción temporal con ἐν se expresa de manera natural en español con «en el día». Mantiene el marco temporal sin añadir énfasis interpretativo.
- source_word: συντελείας
  english_pob_choice: are completed
  chosen_spanish: se cumplan
  alternatives_spanish:
  - se completen
  - lleguen a su fin
  - se consumen
  lexicon: LSJ
  rationale: συντέλεια comunica la idea de llegar a término o completarse. «Se cumplan» conserva ese sentido de culminación y suena natural en español bíblico contemporáneo.
- source_word: ἡμερῶν ζωῆς σου
  english_pob_choice: the days of your life
  chosen_spanish: los días de tu vida
  alternatives_spanish:
  - los días de tu existencia
  - tus días de vida
  lexicon: LSJ
  rationale: La secuencia genitiva se vierte de forma transparente como «los días de tu vida», preservando el giro semítico sin forzarlo.
- source_word: καιρῷ τελευτῆς
  english_pob_choice: the time of your death
  chosen_spanish: el tiempo de tu muerte
  alternatives_spanish:
  - el momento de tu muerte
  - el tiempo de tu fin
  lexicon: LSJ
  rationale: τελευτή aquí se refiere al final de la vida, y el contexto de herencia favorece «muerte» como el sentido más claro y directo en español.
- source_word: διάδος
  english_pob_choice: distribute
  chosen_spanish: distribuye
  alternatives_spanish:
  - reparte
  - da
  - asigna
  lexicon: LSJ
  rationale: El imperativo aoristo pide una acción concreta de asignar o repartir bienes. «Distribuye» conserva el matiz legal/práctico del reparto de herencia.
- source_word: κληρονομίαν
  english_pob_choice: your inheritance
  chosen_spanish: tu herencia
  alternatives_spanish:
  - tu heredad
  - tu patrimonio
  lexicon: LSJ
  rationale: κληρονομία es el término usual para herencia. «Tu herencia» es la forma más clara y fiel en español para este contexto de bienes a disponer antes de morir.
theological_decisions:
- issue: Sentido práctico del mandamiento sobre la herencia
  english_pob_reading: A practical wisdom instruction to assign one's estate at life's end, without importing later legal or doctrinal frameworks.
  chosen_spanish_reading: Una instrucción sapiencial práctica para disponer de la herencia al final de la vida, sin añadir marcos doctrinales ajenos al texto.
  alternative_spanish_readings:
  - Una exhortación general a la generosidad antes de morir
  - Una instrucción sobre testamentos en sentido técnico moderno
  rationale: El verso combina lenguaje de muerte e herencia; por eso la traducción debe mantener su referencia directa al reparto de bienes al final de la vida, sin ampliar ni tecnificar indebidamente el enunciado.
  doctrine_reference: Principio de primacía del texto original y de preservación del sentido llano, evitando importar categorías posteriores.
translation_notes:
  revision_awareness: La revisión inglesa sustituyó una redacción más literal pero menos natural por «the days of your life», sin cambiar el sentido. El español adopta una formulación igualmente natural («los días de tu vida») y mantiene visible la idea de culminación con «se cumplan».
  spanish_consistency_notes:
  - Se conserva «herencia» para κληρονομίαν por claridad y por concordancia con el contexto de reparto de bienes.
  - Se usa «muerte» para τελευτῆς porque en este contexto funerario y patrimonial resulta más preciso que «fin».
  - El registro es formal y bíblico, pero no arcaizante.
