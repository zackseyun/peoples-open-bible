  from: 'And he answered and said to me[a], “Because you have asked me to show you what has happened and what is to happen after these things, this is the instruction concerning corruption. For when Adam transgressed, death was decreed against those who were to be born. Then the multitude of those who would be born was numbered, and for that created thing a place was prepared where the living might dwell and the dead might be guarded. Therefore, as many as have come have known these things, and those who come after shall know them. Therefore do not ask concerning these things any further, but instruct the people as much as you are able, so that they may not die in the last time[d][c][b], but may learn so that they may live in the last time.”'
