  to: 'Y ahora, permítanme darles a conocer lo que voy a hacer a mi viña: quitaré su cerca, y será consumida[a]; derribaré su muro, y será hollada[b].'
  rationale: Se corrige un problema material de anclaje de nota, moviendo [a] desde ‘Y ahora’ a ‘será consumida’, que es donde corresponde según el hebreo y la auditoría inglesa. También se pule levemente el registro con ‘permítanme’, sin cambiar el sentido. No se requieren cambios doctrinales ni de fondo.
