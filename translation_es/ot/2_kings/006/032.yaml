translation:
  language: es
  text: 'Ahora Eliseo estaba sentado en su casa, y los ancianos estaban sentados con él. Y el rey había enviado a un hombre desde su presencia, pero antes de que el mensajero llegara a él, dijo a los ancianos: «¿Ven cómo este hijo de un asesino ha enviado a alguien para quitarme la cabeza[a]? Miren, cuando llegue el mensajero, cierren la puerta y empújenlo hacia atrás en la puerta[b]. ¿No es el sonido de los pasos de su señor detrás de él?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “cortarme la cabeza”. El hebreo dice literalmente “quitar mi cabeza”, un modismo de ejecución por decapitación.
    reason: lexical_alternative
  - marker: b
    text: Aquí “mensajero” se refiere a un enviado humano del rey, no a un ángel.
    reason: cultural_note
lexical_decisions:
- source_word: יֹשֵׁב / יֹשְׁבִים
  english_pob_choice: was sitting / were sitting
  chosen_spanish: estaba sentado / estaban sentados
  alternatives_spanish:
  - estaba reclinado / estaban reclinados
  - se encontraba sentado / se encontraban sentados
  lexicon: HALOT
  rationale: Los participios hebreos presentan una escena en desarrollo; en español, el imperfecto progresivo no siempre suena natural, así que el imperfecto simple con valor durativo preserva mejor el sentido narrativo sin sonar forzado.
- source_word: וַיִּשְׁלַח אִישׁ מִלְּפָנָיו
  english_pob_choice: the king had sent a man from before him
  chosen_spanish: el rey había enviado a un hombre de delante de él
  alternatives_spanish:
  - el rey envió a un hombre delante de él
  - el rey había mandado a un hombre desde su presencia
  lexicon: HALOT
  rationale: La construcción indica procedencia ‘de delante de’ y la revisión inglesa subraya el valor anterior al discurso. ‘De delante de él’ mantiene la relación espacial/jerárquica sin perder la referencia al rey.
- source_word: הַמַּלְאָךְ
  english_pob_choice: the messenger
  chosen_spanish: el mensajero
  alternatives_spanish:
  - el enviado
  - el ángel
  lexicon: HALOT
  rationale: En este contexto narrativo se trata de un emisario humano real; ‘mensajero’ evita la lectura angélica y coincide con la decisión auditada en inglés.
- source_word: הֲרְאִיתֶם
  english_pob_choice: Do you see
  chosen_spanish: ¿Ven?
  alternatives_spanish:
  - ¿Han visto?
  - ¿Se dan cuenta?
  lexicon: HALOT
  rationale: El hebreo funciona como apelación retórica al grupo. En español, ‘¿Ven?’ es breve, directo y conserva la urgencia del discurso.
- source_word: בֶּן הַמְרַצֵּחַ הַזֶּה
  english_pob_choice: this son of a murderer
  chosen_spanish: este hijo de un asesino
  alternatives_spanish:
  - este hijo de un homicida
  - este hijo del asesino
  lexicon: HALOT
  rationale: ‘Asesino’ transmite la carga insultante y la idea de sangre culpable que el contexto reclama. Mantiene el tono despectivo del original y de la POB inglesa.
- source_word: לְהָסִיר אֶת רֹאשִׁי
  english_pob_choice: to take away my head
  chosen_spanish: quitarme la cabeza
  alternatives_spanish:
  - removerme la cabeza
  - cortarme la cabeza
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente ‘quitar la cabeza’, un giro idiomático para ejecución por decapitación. ‘Quitarme la cabeza’ preserva la metáfora corporal; ‘cortarme la cabeza’ explicita el sentido pero interpreta el idioma.
- source_word: רְאוּ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Fíjense
  lexicon: HALOT
  rationale: Imperativo plural de atención urgente. ‘Miren’ es natural en español y conserva la fuerza de advertencia.
- source_word: סִגְרוּ הַדֶּלֶת
  english_pob_choice: shut the door
  chosen_spanish: cierren la puerta
  alternatives_spanish:
  - cierren de golpe la puerta
  - sellen la puerta
  lexicon: HALOT
  rationale: ‘Shut’ aquí expresa una acción defensiva e inmediata. ‘Cierren la puerta’ es claro; ‘de golpe’ añade matiz no explícito en el hebreo.
- source_word: וּלְחַצְתֶּם אֹתוֹ בַּדֶּלֶת
  english_pob_choice: press him back at the door
  chosen_spanish: apérchenlo contra la puerta
  alternatives_spanish:
  - presiónenlo contra la puerta
  - háganlo retroceder en la puerta
  lexicon: HALOT
  rationale: El verbo לחץ comunica empujar/oprimir para impedir el paso. ‘Apérchenlo contra la puerta’ conserva la imagen física de inmovilización; aunque es menos común, refleja mejor la fuerza del hebreo y la POB inglesa que ‘restrain’/‘hold him fast’ evitaban suavizar.
- source_word: הֲלוֹא קוֹל רַגְלֵי אֲדֹנָיו אַחֲרָיו
  english_pob_choice: Is not the sound of his master’s feet behind him?
  chosen_spanish: ¿No es el sonido de los pasos de su señor detrás de él?
  alternatives_spanish:
  - ¿No es el sonido de los pasos de su amo detrás de él?
  - ¿No se oye a su señor venir detrás de él?
  lexicon: HALOT
  rationale: ‘Pasos’ aclara el hebreo ‘pies’ en español natural sin perder literalidad; ‘señor’ refleja la relación jerárquica del hebreo y evita una lectura meramente religiosa.
theological_decisions:
- issue: Referente de הַמַּלְאָךְ en un contexto real de corte
  english_pob_reading: the messenger refers to a human royal envoy, not an angel
  chosen_spanish_reading: el mensajero es un enviado humano del rey, no un ángel
  alternative_spanish_readings:
  - el ángel
  - el enviado
  rationale: El contexto inmediato de corte y la secuencia narrativa obligan a leer el término como mensajero humano. Esto evita introducir una lectura angélica ajena al pasaje y coincide con la nota auditada en inglés.
  doctrine_reference: Historia narrativa; semántica contextual del hebreo מַלְאָךְ
- issue: Idiom of decapitation in לְהָסִיר אֶת רֹאשִׁי
  english_pob_reading: to take away my head
  chosen_spanish_reading: quitarme la cabeza, como idiomático de ejecución
  alternative_spanish_readings:
  - cortarme la cabeza
  - removerme la cabeza
  rationale: El hebreo literaliza la violencia de forma idiomática. Conservar la metáfora en español permite mantener la tensión léxica sin borrar el sentido de amenaza de muerte; la alternativa explícita ‘cortarme la cabeza’ interpreta el idiomá.
  doctrine_reference: Uso idiomático hebreo; decapitación como figura de ejecución
- issue: Despacho del rey y la referencia implícita al ‘señor’ de los pasos
  english_pob_reading: his master’s feet behind him
  chosen_spanish_reading: los pasos de su señor detrás de él
  alternative_spanish_readings:
  - los pasos de su amo detrás de él
  - los pasos de su señor detrás de él
  rationale: ‘Señor’ conserva la relación de superioridad del hebreo אֲדֹנָיו y evita trivializarla. En un registro bíblico español, ‘señor’ es inteligible y no requiere sustitución por un término más doméstico.
  doctrine_reference: Semántica de dominio/autoridad en אדון
translation_notes:
  revision_awareness: 'La versión española sigue la última revisión inglesa en dos puntos clave: mantiene el valor temporal de ‘había enviado’ frente a una acción simple, y conserva la imagen de presión física con ‘apérchenlo contra la puerta’ en lugar de una restricción más genérica. También evita borrar el modismo hebreo de ‘quitar la cabeza’ mediante una paráfrasis totalmente explícita.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ cuando aparezca el nombre divino; en este versículo no aparece.
  - ‘Mensajero’ se reserva para הַמַּלְאָךְ en este contexto cortesano, sin lectura angélica.
  - Se conserva el insulto ‘hijo de un asesino’ con carga despectiva equivalente a la POB inglesa.
  - ‘Señor’ se usa en sentido de amo/superior, no como sustituto del nombre divino.
  - La puntuación y comillas siguen norma española; el discurso directo queda claramente segmentado.
