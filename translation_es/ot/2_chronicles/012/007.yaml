translation:
  language: es
  text: 'Cuando Yahvé vio que se habían humillado, la palabra de Yahvé vino a Semaías, diciendo: «Se han humillado; no los destruiré, sino que les daré cierto alivio[a], y mi ira no se derramará sobre Jerusalén por mano de Sisac».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les daré un poco de escape» o «les concederé unos pocos sobrevivientes». La expresión hebrea es muy compacta y puede destacar un rescate limitado más que la destrucción total.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto, no un sustituto de título. 'Yahvé' es la forma establecida en este proyecto para יְהוָה y funciona de manera natural en español bíblico moderno.
- source_word: נִכְנָעוּ
  english_pob_choice: they had humbled themselves
  chosen_spanish: se habían humillado
  alternatives_spanish:
  - se sometieron
  - habían sido humillados
  lexicon: HALOT
  rationale: El nifal aquí expresa humillación asumida en respuesta al mensaje profético. 'Se habían humillado' preserva el matiz reflexivo mejor que una pasiva.
- source_word: הָיָה דְבַר יְהוָה אֶל
  english_pob_choice: the word of Yahweh came to
  chosen_spanish: la palabra de Yahvé vino a
  alternatives_spanish:
  - la palabra de Yahvé llegó a
  - Yahvé habló a
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética idiomática sin vaciarla en un verbo genérico. 'Vino a' reproduce bien la construcción hebrea y es natural en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  - y dijo
  lexicon: HALOT
  rationale: Es la introducción estándar del discurso directo; 'diciendo' conserva la dependencia sintáctica del hebreo sin añadir énfasis innecesario.
- source_word: לֹא אַשְׁחִיתֵם
  english_pob_choice: I will not destroy them
  chosen_spanish: no los destruiré
  alternatives_spanish:
  - no los arruinaré
  - no los aniquilaré
  lexicon: HALOT
  rationale: El hifil de שׁחת en contexto de juicio se traduce con el verbo claro 'destruir'. 'Aniquilar' sería más fuerte de lo que exige el texto; 'arruinar' debilita el juicio.
- source_word: וְנָתַתִּי לָהֶם כִּמְעַט לִפְלֵיטָה
  english_pob_choice: I will grant them some deliverance
  chosen_spanish: les daré algo de liberación
  alternatives_spanish:
  - les concederé una pequeña liberación
  - les daré un poco de escape
  lexicon: HALOT
  rationale: La frase es compacta y admite el matiz de escape/rescate limitado. 'Algo de liberación' conserva la idea de auxilio restringido sin forzar un sustantivo como 'remanente' que en español podría sonar más interpretativo.
- source_word: תִתַּךְ חֲמָתִי
  english_pob_choice: my wrath will not be poured out
  chosen_spanish: mi ira no se derramará
  alternatives_spanish:
  - mi furor no se derramará
  - mi ira no será vertida
  lexicon: HALOT
  rationale: Se mantiene la metáfora de derramamiento propia del hebreo. 'Ira' es más natural y menos marcada que 'furor' en español general, sin perder el registro judicial.
- source_word: בִּירוּשָׁלַם
  english_pob_choice: on Jerusalem
  chosen_spanish: sobre Jerusalén
  alternatives_spanish:
  - en Jerusalén
  - contra Jerusalén
  lexicon: HALOT
  rationale: Aunque el hebreo usa ב, el español idiomático con 'derramarse' pide una relación de impacto. 'Sobre Jerusalén' transmite bien el blanco del juicio.
- source_word: בְּיַד שִׁישָׁק
  english_pob_choice: by the hand of Shishak
  chosen_spanish: por mano de Sisac
  alternatives_spanish:
  - por la mano de Sisac
  - mediante Sisac
  lexicon: HALOT
  rationale: Se conserva el hebraísmo de agencia de manera comprensible en español. 'Por mano de' es más directo y bíblico que una paráfrasis como 'mediante'.
- source_word: שִׁישָׁק
  english_pob_choice: Shishak
  chosen_spanish: Sisac
  alternatives_spanish:
  - Shishak
  lexicon: HALOT
  rationale: Se adopta la forma tradicional en español bíblico para el nombre propio, ya asentada en la recepción hispana.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma directa. El proyecto pide preservarlo como nombre propio audible; 'Yahvé' cumple esa función sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Naturaleza de כִּמְעַט לִפְלֵיטָה
  english_pob_reading: some deliverance
  chosen_spanish_reading: algo de liberación
  alternative_spanish_readings:
  - una pequeña liberación
  - unos pocos sobrevivientes
  rationale: La expresión hebrea es compacta y puede enfatizar rescate limitado más que destrucción total. 'Algo de liberación' conserva la indeterminación y evita fijar prematuramente la imagen en sobrevivientes concretos.
  doctrine_reference: English footnote a; HALOT פלט / פְּלֵיטָה
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'a little deliverance' por 'some deliverance' para sonar más natural, manteniendo el sentido de rescate limitado. En español se refleja con 'algo de liberación', que conserva la ambigüedad controlada de כִּמְעַט לִפְלֵיטָה y sugiere un auxilio parcial sin especificarlo más de lo debido.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de manera uniforme para יְהוָה, conforme al estándar del proyecto.
  - '''Sisac'' se usa como forma española estable para el nombre propio.'
  - '''mi ira'' conserva el registro judicial y es coherente con otras formulaciones proféticas del corpus.'
  - La construcción 'la palabra de Yahvé vino a' sigue la fórmula profética tradicional sin sustituirla por una paráfrasis explicativa.
