lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: El wayyiqtol de דבר introduce un nuevo acto de habla narrativo. En español, 'habló' conserva el valor de introducción solemne y evita la repetición mecánica de 'dijo' en esta fórmula, manteniendo el matiz de que se inicia un discurso divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio en español como 'Yahvé', siguiendo la decisión editorial de no sustituir el tetragrámaton por un título. 'Jehová' y 'el SEÑOR' quedan descartados por no reflejar directamente el nombre revelado.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, 'a' es la equivalencia natural y precisa para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico establecido en español, conservando la forma tradicional y reconocible.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La fórmula infinitiva introduce el contenido del discurso. 'Diciendo' reproduce de manera natural la construcción formularia hebrea sin añadir contenido interpretativo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La elección preserva el nombre personal del pacto en español y evita la sustitución por un título, en coherencia con la decisión doctrinal del POB de transparentar el tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La fuente inglesa no presenta revisiones ni cambios pendientes; el texto se mantiene estable. La versión española sigue directamente la lectura del hebreo y conserva la decisión auditada sobre el nombre divino.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en todo el texto.
  - La fórmula narrativa se conserva breve y solemne, sin expandirla más allá del hebreo.
  - 'Se usa acentuación y puntuación españolas estándar: ''Moisés[a], diciendo,'' con coma final para reflejar la continuación del discurso.'
