translation:
  language: es
  text: y en la canasta superior había toda clase de alimentos para Faraón, obra de panadero[a], y las aves se los comían de la canasta sobre mi cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «trabajo de panadero», es decir, productos horneados preparados para Faraón.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַסַּל הָעֶלְיוֹן
  english_pob_choice: and in the top basket
  chosen_spanish: y en la canasta superior
  alternatives_spanish:
  - y en la canasta de arriba
  - y en la canasta alta
  lexicon: HALOT
  rationale: עֶלְיוֹן expresa altura o posición superior. En español, «canasta superior» conserva el dato espacial de forma natural y cercana al texto, sin añadir interpretación.
- source_word: מִכֹּל מַאֲכַל פַּרְעֹה
  english_pob_choice: were all kinds of food for Pharaoh
  chosen_spanish: había toda clase de alimentos para Faraón
  alternatives_spanish:
  - había toda suerte de alimentos para Faraón
  - había todos los alimentos de Faraón
  lexicon: HALOT
  rationale: La construcción hebrea comunica variedad dentro de un conjunto. «Toda clase de alimentos» transmite ese valor mejor que una traducción más literal pero menos natural.
- source_word: מַעֲשֵׂה אֹפֶה
  english_pob_choice: the work of a baker
  chosen_spanish: obra de panadero
  alternatives_spanish:
  - trabajo de panadero
  - hecho de panadero
  - productos de panadero
  lexicon: HALOT
  rationale: El hebreo dice literalmente «obra/trabajo de panadero». «Obra de panadero» mantiene la cercanía lexical sin forzar una paráfrasis; se conserva la ambigüedad entre oficio y productos preparados.
- source_word: וְהָעוֹף
  english_pob_choice: and the birds
  chosen_spanish: y las aves
  alternatives_spanish:
  - y los pájaros
  - y las aves del cielo
  lexicon: HALOT
  rationale: עוֹף puede referirse colectivamente a aves o criaturas voladoras. «Aves» es neutro, sobrio y adecuado al registro bíblico en español.
- source_word: אֹכֵל
  english_pob_choice: were eating
  chosen_spanish: se los comían
  alternatives_spanish:
  - estaban comiéndolos
  - comían
  lexicon: HALOT
  rationale: El participio muestra acción en curso en la escena del sueño. En español, «se los comían» reproduce mejor la vividez aspectual que un simple pretérito.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: se los
  alternatives_spanish:
  - los
  - a ellos
  lexicon: HALOT
  rationale: El sufijo plural masculino se refiere a los alimentos. En español, la combinación clítica «se los» expresa correctamente el objeto plural en una estructura natural.
- source_word: מִן הַסַּל
  english_pob_choice: from the basket
  chosen_spanish: de la canasta
  alternatives_spanish:
  - desde la canasta
  - fuera de la canasta
  lexicon: HALOT
  rationale: מן marca origen o procedencia. En esta escena, «de la canasta» comunica bien la relación de fuente sin añadir énfasis innecesario.
- source_word: מֵעַל רֹאשִׁי
  english_pob_choice: above my head
  chosen_spanish: de encima de mi cabeza
  alternatives_spanish:
  - sobre mi cabeza
  - por encima de mi cabeza
  lexicon: HALOT
  rationale: מֵעַל indica ubicación encima o por arriba de. «De encima de mi cabeza» conserva la relación espacial exacta y suena natural en español narrativo.
translation_notes:
  revision_awareness: Se siguió el texto hebreo WLC y el criterio de la POB en inglés sin cambios de revisión recientes; el pasaje mantiene el paralelismo visual del sueño y la ambigüedad léxica de מַעֲשֵׂה אֹפֶה.
  spanish_consistency_notes:
  - Se usó «Faraón» como nombre/título propio, en consonancia con la práctica bíblica estándar en español.
  - Se prefirió «canasta» por naturalidad contemporánea; «cesta» sería posible, pero no es necesaria para la fidelidad del pasaje.
  - Se mantuvo el plural «aves» para reflejar el sentido colectivo del hebreo.
  - La nota al pie conserva la alternativa semántica documentada por el audit trail inglés.
