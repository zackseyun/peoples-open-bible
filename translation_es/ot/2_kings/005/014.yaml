translation:
  language: es
  text: Entonces bajó y se sumergió en el Jordán siete veces[a], conforme a la palabra del hombre de Dios; y su carne fue restaurada como la carne de un niño pequeño, y fue purificado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se zambulló». El verbo hebreo puede denotar zambullirse o sumergirse.
    reason: lexical_alternative
  - marker: b
    text: O «quedó limpio». El hebreo puede entenderse como un estado («estaba limpio») o como el resultado de ser purificado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּרֶד
  english_pob_choice: So he went down
  chosen_spanish: Entonces bajó
  alternatives_spanish:
  - Y bajó
  - Luego bajó
  lexicon: HALOT
  rationale: El verbo ירד conserva el movimiento concreto de descenso; «entonces» reproduce en español el avance narrativo del waw-consecutivo sin volver pesado el estilo.
- source_word: וַיִּטְבֹּל
  english_pob_choice: dipped himself
  chosen_spanish: se sumergió
  alternatives_spanish:
  - se zambulló
  - se metió
  lexicon: HALOT
  rationale: טבל puede expresar sumergir o hundir en un líquido. «Se sumergió» mantiene la acción física y, en español, comunica mejor el gesto que «se sumergió a sí mismo» o un calco más rígido.
- source_word: בַּיַּרְדֵּן
  english_pob_choice: in the Jordan
  chosen_spanish: en el Jordán
  alternatives_spanish:
  - en el río Jordán
  lexicon: HALOT
  rationale: Se conserva el nombre propio bíblico con la forma habitual en español. Añadir «río» es posible, pero no es necesario en este contexto.
- source_word: שֶׁבַע פְּעָמִים
  english_pob_choice: seven times
  chosen_spanish: siete veces
  alternatives_spanish:
  - siete ocasiones
  lexicon: HALOT
  rationale: La expresión es directa y repetitiva; «veces» es el equivalente natural de פעמים.
- source_word: כִּדְבַר
  english_pob_choice: according to the word of
  chosen_spanish: conforme a la palabra de
  alternatives_spanish:
  - según la palabra de
  - de acuerdo con la palabra de
  lexicon: HALOT
  rationale: דבר puede significar palabra, dicho o mandato. «Conforme a la palabra de» conserva la referencia a la orden pronunciada por Elisha sin forzar «mandato» en el texto principal.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  lexicon: HALOT
  rationale: Se mantiene el título profético literal y reconocido en español bíblico. «El hombre de Dios» es más transparente y evita introducir una variante menos natural.
- source_word: וַיָּשָׁב בְּשָׂרוֹ
  english_pob_choice: his flesh was restored
  chosen_spanish: su carne fue restaurada
  alternatives_spanish:
  - su carne volvió
  - su cuerpo fue restaurado
  lexicon: HALOT
  rationale: בשר se conserva como «carne» para mantener el cuerpo concreto del hebreo. «Fue restaurada» sigue el valor resultativo de שוב sin perder el matiz de renovación corporal.
- source_word: כִּבְשַׂר נַעַר קָטֹן
  english_pob_choice: like the flesh of a little boy
  chosen_spanish: como la carne de un muchacho pequeño
  alternatives_spanish:
  - como la carne de un joven pequeño
  - como la carne de un niño pequeño
  lexicon: HALOT
  rationale: נער aquí indica un muchacho/joven, y קטן intensifica la pequeñez o juventud. «Muchacho pequeño» conserva la imagen sin volverla excesivamente interpretativa.
- source_word: וַיִּטְהָר
  english_pob_choice: he was cleansed
  chosen_spanish: fue purificado
  alternatives_spanish:
  - fue limpiado
  - quedó limpio
  - fue очищado
  lexicon: HALOT
  rationale: טהר expresa volverse puro/limpio. En español, «fue purificado» comunica mejor el resultado de la limpieza ritual y física, manteniendo el peso bíblico del término sin reducirlo a una mera higiene.
theological_decisions:
- issue: Restauración corporal y limpieza ritual
  english_pob_reading: Render the result in terms of bodily restoration and cleanliness without importing sacramental or typological claims into the main text.
  chosen_spanish_reading: Mantener en el texto principal tanto la restauración de la carne como la purificación, sin añadir interpretaciones sacramentales o tipológicas.
  alternative_spanish_readings:
  - Resaltar solo la sanidad corporal
  - Resaltar solo la pureza ritual
  rationale: El versículo une restauración física y limpieza; ambas deben permanecer visibles. «Su carne fue restaurada» y «fue purificado» preservan esa tensión teológica sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión bíblica entre sanidad/restauración y pureza ritual.
translation_notes:
  revision_awareness: El texto inglés de trabajo pasó por una revisión reciente que ajustó la cláusula final de «he was clean» a «he was cleansed» para reflejar mejor el valor de טהר; por eso el español principal usa «fue purificado», y la nota conserva la alternativa de estado/resultad o «fue limpiado».
  spanish_consistency_notes:
  - Se mantiene «carne» para בשר, en coherencia con la decisión del POB de conservar la imaginería corporal concreta.
  - «Jordán» se usa como nombre bíblico estándar en español, sin añadir «río» salvo necesidad contextual.
  - La secuencia narrativa reproduce el avance del hebreo con un enlace temporal natural en español.
