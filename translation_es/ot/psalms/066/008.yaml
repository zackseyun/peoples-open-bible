revisions:
- from: Bendigan[a] a nuestro Dios, pueblos[b]; hagan oír el sonido de su alabanza.
  to: ¡Pueblos, bendigan[a] a nuestro Dios, y hagan oír el sonido de su alabanza!
  rationale: Se hizo una reparación pequeña de estilo y puntuación para expresar con mayor naturalidad el vocativo plural del hebreo en español, sin cambiar el contenido. Se eliminó la nota [b] porque no aporta una ambigüedad necesaria en español y no corresponde bien al motivo documentado en el audit trail inglés. Se conservó «hagan oír el sonido de su alabanza» por su fidelidad al causativo hebreo y a la decisión POB.
