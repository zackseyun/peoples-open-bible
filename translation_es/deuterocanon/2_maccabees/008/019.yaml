translation:
  language: es
  text: Y también les recordó los auxilios que habían recibido sus antepasados, y la intervención contra Senaquerib[a], cómo perecieron ciento ochenta y cinco mil.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Alusión a la destrucción del ejército de Senaquerib en tiempos de Ezequías; véanse 2 Reyes 19:35 e Isaías 37:36.
    reason: cross_reference
  - marker: b
    text: O «auxilios» puede traducirse «liberaciones»; el término griego puede denotar actos de socorro o rescate.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσαναλεξάμενος
  english_pob_choice: recounted
  chosen_spanish: les recordó
  alternatives_spanish:
  - les refirió
  - les recapitულó
  - les contó
  lexicon: LSJ
  rationale: El participio introduce la acción de repasar verbalmente hechos previos para animar a sus hombres. «Les recordó» comunica esa función de evocación y exhortación en español natural, sin perder el matiz de reexposición histórica.
- source_word: ἀντιλήμψεις
  english_pob_choice: help
  chosen_spanish: ayudas
  alternatives_spanish:
  - auxilios
  - rescatos
  - ayuda
  lexicon: LSJ
  rationale: El término puede abarcar actos de apoyo, socorro o liberación. «Ayudas» conserva la amplitud semántica en plural, acorde con «las ...» del griego y con la serie de intervenciones históricas recordadas.
- source_word: ἐπὶ τῶν προγόνων γενομένας
  english_pob_choice: that had come to their forefathers
  chosen_spanish: que habían venido sobre sus antepasados
  alternatives_spanish:
  - que les habían sobrevenido a sus antepasados
  - que habían ocurrido para sus antepasados
  - que les habían llegado a sus antepasados
  lexicon: LSJ
  rationale: La frase indica que estas ayudas acontecieron respecto de los antepasados. «Habían venido sobre» refleja bien la idea de eventos que recayeron o se presentaron sobre ellos, sin añadir explícitamente un agente que el griego no nombra en esta cláusula.
- source_word: τὴν ἐπὶ Σεναχηρεὶμ
  english_pob_choice: the one against Sennacherib
  chosen_spanish: la de Senaquerib
  alternatives_spanish:
  - la contra Senaquerib
  - la de la campaña de Senaquerib
  - la del caso de Senaquerib
  lexicon: LSJ
  rationale: El griego usa una elipsis que remite a la ayuda/intervención anterior. En español, «la de Senaquerib» mantiene esa referencia abreviada y resulta más natural y fluida que repetir «ayuda» explícitamente dentro de la misma construcción.
- source_word: ἑκατὸν ὀγδοήκοντα πέντε χιλιάδες
  english_pob_choice: a hundred eighty-five thousand
  chosen_spanish: ciento ochenta y cinco mil
  alternatives_spanish:
  - ciento ochenta y cinco mil hombres
  - ciento ochenta y cinco mil personas
  lexicon: LSJ
  rationale: La cifra se traduce de manera directa y precisa. Se omite una expansión como «hombres» porque el griego tampoco la expresa en esta frase.
- source_word: ὡς ἀπώλοντο
  english_pob_choice: how ... were destroyed
  chosen_spanish: cómo perecieron
  alternatives_spanish:
  - cómo fueron destruidos
  - cómo murieron
  - cómo fueron aniquilados
  lexicon: LSJ
  rationale: «Πerecieron» conserva el registro sobrio de una derrota mortal y evita forzar una pasiva más explícita que no aparece en el griego. Introducida por «cómo», la cláusula reproduce la forma del recuerdo narrado.
theological_decisions:
- issue: La alusión implícita a la intervención divina en las antiguas ayudas y en la derrota de Senaquerib
  english_pob_reading: Retain the historical reference without explicitly adding 'by God' in the main text.
  chosen_spanish_reading: Mantener la referencia histórica sin añadir explícitamente «por Dios» en el texto principal.
  alternative_spanish_readings:
  - Las ayudas que Dios había dado a sus antepasados
  - la de Senaquerib, cómo Dios hizo perecer a ciento ochenta y cinco mil
  rationale: 'El griego no nombra a Dios en esta cláusula, aunque el contexto bíblico remite claramente a intervenciones divinas conocidas. La traducción conserva esa tensión: deja que la alusión histórica y canónica cargue el sentido teológico sin introducir una explicitación no presente en el enunciado.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete (1909) y el audit trail inglés. No se requirieron revisiones respecto del pasaje de referencia; se preservó la elipsis de «la de Senaquerib» y la ambigüedad teológica implícita en el original.
  spanish_consistency_notes:
  - Se usa «antepasados» para τῶν προγόνων en un registro bíblico claro y natural.
  - Se mantiene «Senaquerib» con la ortografía española estándar.
  - «Perecieron» conserva el tono histórico y judicial del contexto militar.
  - Las notas a y b respetan las alternativas lexicales documentadas en el audit trail inglés sin ampliar indebidamente el texto principal.
