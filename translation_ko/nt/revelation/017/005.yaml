translation:
  language: ko
  text: '그리고 그 여자의 이마에 한 이름이 기록되어 있었으니, 「비밀, 큰 바벨론, 땅의 창녀들과 가증한 것들의 어머니」였습니다.'
  philosophy: optimal-equivalence
