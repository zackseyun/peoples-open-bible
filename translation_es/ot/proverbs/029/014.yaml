translation:
  language: es
  text: Un rey que juzga a los pobres con verdad[a]—su trono será establecido para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juzga a los pobres con fidelidad», o «juzga a los pobres con justicia». La expresión hebrea «con verdad» puede llevar el sentido de veracidad, fidelidad o justicia en el juicio.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: A king
  chosen_spanish: Un rey
  alternatives_spanish:
  - El rey
  - Un gobernante
  lexicon: HALOT
  rationale: El hebreo presenta un dicho general, no un monarca específico. «Un rey» conserva el marco real concreto y el valor proverbial de la afirmación, sin particularizar indebidamente.
- source_word: שׁוֹפֵט
  english_pob_choice: who judges
  chosen_spanish: que juzga
  alternatives_spanish:
  - juzgando
  - que gobierna
  lexicon: HALOT
  rationale: El participio describe al rey por su acción judicial. «Que juzga» mantiene el sentido forense de manera natural en español y evita diluirlo en «gobierna».
- source_word: בֶּאֱמֶת
  english_pob_choice: with truth
  chosen_spanish: con verdad
  alternatives_spanish:
  - con fidelidad
  - con justicia
  - en verdad
  lexicon: HALOT
  rationale: אֱמֶת puede abarcar verdad, fidelidad o confiabilidad. «Con verdad» conserva la relación léxica directa con el término hebreo y deja abierta la amplitud semántica documentada por la nota inglesa.
- source_word: דַּלִּים
  english_pob_choice: the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - a los necesitados
  - a los débiles
  lexicon: HALOT
  rationale: En un contexto de justicia real, «los pobres» es la equivalencia más estable y clara para דַּלִּים. En español mantiene la referencia social concreta sin perder la fuerza de vulnerabilidad del término.
- source_word: כִּסְאוֹ
  english_pob_choice: his throne
  chosen_spanish: su trono
  alternatives_spanish:
  - su asiento real
  - su trono real
  lexicon: HALOT
  rationale: «Su trono» reproduce la imagen concreta y la implicación metonímica de gobierno estable. No hace falta explicitar «real» porque el sujeto ya es un rey.
- source_word: לָעַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  - para siempre jamás
  lexicon: HALOT
  rationale: «Para siempre» es la forma idiomática y digna en español para expresar duración perdurable. En un proverbio, conserva el valor de estabilidad duradera sin sobrecargar el verso.
- source_word: יִכּוֹן
  english_pob_choice: will be established
  chosen_spanish: será establecido
  alternatives_spanish:
  - estará firme
  - será afirmado
  - quedará firme
  lexicon: HALOT
  rationale: El nifal de כון expresa fijación/establecimiento. «Será establecido» conserva bien el matiz resultativo y la imagen del trono como algo firme y constituido.
theological_decisions:
- issue: Alcance de לָעַד en un proverbio de sabiduría
  english_pob_reading: Rendered as 'forever' as a conventional expression of enduring royal stability, without importing an absolute metaphysical guarantee.
  chosen_spanish_reading: Traducido como «para siempre» como expresión convencional de estabilidad perdurable del reinado, sin convertirlo en una garantía metafísica absoluta.
  alternative_spanish_readings:
  - «por mucho tiempo»
  - «duraderamente»
  rationale: En Proverbios, este lenguaje suele expresar una estabilidad aprobada por Dios o socialmente durable, no una promesa técnica de perpetuidad absoluta en todos los casos. «Para siempre» es la equivalencia más directa y reconocible, y el género sapiencial provee la matización necesaria.
  doctrine_reference: 'Filosofía de traducción: preservar el sentido llano del texto sin añadir afirmaciones doctrinales que el verso no formula.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el consenso alto del expediente inglés. No se introdujeron revisiones recientes porque el pasaje quedó estable en el último pase; se mantuvo la ambigüedad léxica de אֱמֶת mediante una nota alternativa, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó «SEÑOR» y también «Cristo», por no corresponder al texto.
  - Se prefirió «pobres» para דַּלִּים y «trono» para כִּסְאוֹ, en continuidad con la imaginería real del hebreo.
  - La puntuación con raya larga separa la primera cola de la segunda sin alterar el paralelismo poético.
