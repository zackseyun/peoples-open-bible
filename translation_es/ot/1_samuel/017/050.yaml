    issue: «lo hirió» para וַיַּךְ es más interpretativo que el hebreo básico
    rationale: נכה se traduce de forma más directa como «golpear» o «herir», pero aquí la secuencia hebrea distingue entre el golpe y la muerte posterior. «Lo hirió» no es imposible, pero acerca demasiado el primer verbo al resultado letal ya expresado por «lo mató».
  - severity: low
