  text: For if someone comes and proclaims another Jesus[a], whom we did not proclaim, or if you receive a different spirit, which you did not receive, or a different gospel, which you did not accept[c][b],
    you put up with it well enough.
translation:
  language: ko
  text: 만일 누가 와서 우리가 전파하지 않은 다른 예수를 전파하거나, 여러분이 받지 않은 다른 영을 받거나, 받아들이지 않은 다른 복음을 받아들인다면, 여러분은 그것을 잘도 참아 줍니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἄλλον / ἕτερον
  english_pob_choice: another / different
  chosen_korean: 다른
  lexicon: BDAG
  rationale: 두 형용사가 미묘하게 다르나(같은 종류의 다른 것 vs 다른 종류) 한국어에서 「다른」으로 일관 옮기며 비꼬는 어조를 그대로 살린다.
- source_word: κηρύσσει
  english_pob_choice: proclaims
  chosen_korean: 전파하는
