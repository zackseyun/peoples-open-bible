review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: universalidad de «todas las naciones», giro sincero expresado por ἐπιστρέψουσιν + ἀληθινῶς, mantenimiento de «temer», y la imagen concreta de «enterrar» los ídolos. Sin embargo, «se volverán verdaderamente a temer» no es español natural y desajusta la sintaxis del infinitivo φοβεῖσθαι, que expresa el propósito/resultado del volverse.'
  spanish_quality_summary: 'La principal falla es de naturalidad y gramática: «se volverán verdaderamente a temer» suena calcado e incluso ambiguo. En español bíblico natural, «se volverán de verdad para temer a…» o «verdaderamente se volverán para temer a…» expresa mejor la construcción. Además, por la política terminológica del proyecto, κύριον no debe mantenerse como «Señor» por convención doctrinal inglesa; debe revisarse a «Yahvé» cuando corresponde al nombre divino en el texto principal.'
  glossary_alignment: 'Hay un desajuste importante con la terminología del proyecto: Κύριον τὸν θεόν fue vertido «el Señor Dios», pero la política española pide «Yahvé» en el texto principal para el nombre divino, no «SEÑOR» ni «Señor» como convención enmascaradora. Dado que Tobit está en griego con κύριος, la mejor aplicación aquí es «Yahvé Dios», con nota explicativa opcional solo si fuera necesaria; en este caso no es indispensable. «Temer», «ídolos» y «todas las naciones» sí están alineados.'
  issues:
  - severity: high
    issue: Construcción española antinatural en «se volverán verdaderamente a temer»
    rationale: El griego ἐπιστρέψουσιν ... φοβεῖσθαι expresa que las naciones se vuelven para temer a Dios. En español, «volverse a temer» suele significar empezar de nuevo a sentir miedo, no girarse hacia Dios con el fin de temerle. La frase requiere reestructuración para preservar el sentido con claridad.
  - severity: high
    issue: Uso de «Señor Dios» en vez de «Yahvé Dios»
    rationale: La guía terminológica del proyecto para español exige «Yahvé» en el texto principal para el nombre divino. Mantener «Señor» contradice esa política y oscurece la distinción que el proyecto busca preservar.
  - severity: low
    issue: Redacción de la nota al pie poco idiomática
    rationale: La nota actual repite una formulación española defectuosa («se volverán verdaderamente a temer...»). Conviene ajustar la alternativa para que refleje bien la opción léxica «volver/retornar» sin arrastrar la sintaxis problemática.
  revised_spanish_text: Y todas las naciones verdaderamente se volverán para temer a Yahvé Dios[a]; enterrarán sus ídolos.
