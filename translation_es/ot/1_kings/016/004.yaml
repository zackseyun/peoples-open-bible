translation:
  language: es
  text: Quienquiera que entre los de Baasá muera en la ciudad[a], los perros lo comerán; y quienquiera que entre los suyos muera en el campo[b], las aves del cielo lo comerán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de Baasá» / «perteneciente a Baasá». El hebreo usa una construcción relacional que apunta a los que pertenecen a Baasá, probablemente su casa o dinastía.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las aves de los cielos» / «los pájaros del cielo».'  
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֵּת
  english_pob_choice: whoever ... dies
  chosen_spanish: quienquiera que ... muera
  alternatives_spanish:
  - el que muera
  - la persona que muera
  lexicon: HALOT
  rationale: El participio singular funciona genéricamente; en español, una relativa indefinida con «quienquiera que» mantiene ese valor sin volverlo rígidamente nominal.
- source_word: לְבַעְשָׁא
  english_pob_choice: belonging to Baasha
  chosen_spanish: entre los de Baasá
  alternatives_spanish:
  - de Baasá
  - perteneciente a Baasá
  lexicon: HALOT
  rationale: El lamed expresa relación/pertenencia. «Entre los de Baasá» comunica pertenencia al grupo o casa de Baasá sin forzar una precisión mayor que el hebreo no explicita.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  lexicon: HALOT
  rationale: La preposición beth con עיר es locativa directa; «en la ciudad» es natural y fiel.
- source_word: יֹאכְלוּ הַכְּלָבִים
  english_pob_choice: the dogs will eat
  chosen_spanish: los perros lo comerán
  alternatives_spanish:
  - los perros lo devorarán
  - los perros lo consumirán
  lexicon: HALOT
  rationale: Se conserva el verbo básico «comer» para reflejar אָכַל con fuerza sencilla y directa; el objeto implícito se expresa con «lo» por claridad española.
- source_word: וְהַמֵּת לוֹ
  english_pob_choice: and whoever belonging to him dies
  chosen_spanish: y quienquiera que entre los suyos muera
  alternatives_spanish:
  - y quienquiera que de él muera
  - y el que le pertenezca y muera
  lexicon: HALOT
  rationale: El pronombre pasa de Baasá a «él», pero sigue refiriéndose al mismo referente. «Entre los suyos» mantiene la relación de pertenencia y el paralelismo con la primera cola.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la campaña
  lexicon: HALOT
  rationale: «Campo» es el equivalente más natural y conserva el contraste ciudad/campo.
- source_word: עוֹף הַשָּׁמַיִם
  english_pob_choice: the birds of the heavens
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves de los cielos
  - los pájaros del cielo
  lexicon: HALOT
  rationale: עוֹף es un colectivo de aves/voladores; «aves» suena más amplio y bíblico en español. «Del cielo» transmite el genitivo hebreo con una fórmula clara y reverente.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y la auditoría inglesa, conservando la construcción relacional de לְבַעְשָׁא y el paralelismo entre ciudad/campo. No se registraron revisiones textuales en el flujo auditado; la formulación se ajusta a la lectura estable con equivalencia óptima.
  spanish_consistency_notes:
  - Se usa «Baasá» con acentuación española normalizada para el nombre propio.
  - Se mantuvo «cielo» en singular para una expresión bíblica natural, aunque el hebreo usa plural («heavens»).
  - Se evitó «SEÑOR» o equivalentes porque no aparece el nombre divino en este versículo.
  - Se preservó la simetría sintáctica de las dos cláusulas para reflejar el paralelismo hebreo.
