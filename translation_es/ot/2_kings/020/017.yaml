translation:
  language: es
  text: He aquí, vienen días en que todo lo que hay en tu casa, y lo que tus padres[a] han atesorado hasta este día, será llevado a Babilonia. No quedará cosa alguna, dice Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus antepasados».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una घोषणा profética solemne. «He aquí» mantiene el tono formal y deíctico sin sonar tan arcaico como otras opciones.
- source_word: יָמִים בָּאִים
  english_pob_choice: days are coming
  chosen_spanish: vienen días
  alternatives_spanish:
  - se acercan días
  - están viniendo días
  - vienen días
  lexicon: HALOT
  rationale: El giro profético anuncia futuro cierto; «vienen días» es natural en español y conserva la inminencia del hebreo.
- source_word: וְנִשָּׂא
  english_pob_choice: will be carried
  chosen_spanish: será llevado
  alternatives_spanish:
  - será transportado
  - será arrebatado
  - será llevado
  lexicon: HALOT
  rationale: El nifal expresa pasividad y desplazamiento hacia el exilio/plunder. «Será llevado» comunica la remoción sin sobreespecificar el modo.
- source_word: כָּל אֲשֶׁר בְּבֵיתֶךָ
  english_pob_choice: all that is in your house
  chosen_spanish: todo lo que hay en tu casa
  alternatives_spanish:
  - todo cuanto hay en tu casa
  - todo lo que está en tu casa
  - todo lo que hay en tu casa
  lexicon: HALOT
  rationale: «Casa» reproduce el hebreo בַּיִת sin interpretar en exceso como «palacio». «Todo lo que hay» refleja bien el valor inclusivo de כָּל אֲשֶׁר.
- source_word: וַאֲשֶׁר אָצְרוּ אֲבֹתֶיךָ
  english_pob_choice: what your fathers have stored up
  chosen_spanish: y lo que tus padres han almacenado
  alternatives_spanish:
  - y lo que tus padres han guardado
  - y lo que tus antepasados han almacenado
  - y lo que tus padres han almacenado
  lexicon: HALOT
  rationale: אָצְרוּ refiere a guardar/atesorar en depósito. «Han almacenado» conserva la idea de acumulación guardada; «padres» sigue el literal del hebreo, con la alternativa contextual de «antepasados».
- source_word: אֲבֹתֶיךָ
  english_pob_choice: your fathers
  chosen_spanish: tus padres
  alternatives_spanish:
  - tus padres
  - tus antepasados
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tus padres». En español, «padres» puede abarcar antecesores/generaciones previas sin perder claridad; se conserva la alternativa «antepasados» por si se desea explicitar el alcance.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: until this day
  chosen_spanish: hasta este día
  alternatives_spanish:
  - hasta hoy
  - hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es una expresión temporal fija. «Hasta este día» sigue de cerca el hebreo y suena natural en registro bíblico.
- source_word: בָּבֶלָה
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - a Babilonia
  - hacia Babilonia
  - a Babilonia
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia Babilonia. «A Babilonia» es la forma directa y transparente en español.
- source_word: לֹא יִוָּתֵר דָּבָר
  english_pob_choice: Not a thing will be left
  chosen_spanish: No quedará cosa alguna
  alternatives_spanish:
  - No quedará nada
  - No quedará cosa alguna
  - No permanecerá ninguna cosa
  lexicon: HALOT
  rationale: La negación total con singular genérico דָּבָר se expresa bien con «cosa alguna». Se preserva el énfasis de pérdida total sin sonar forzado.
- source_word: אָמַר יְהוָה
  english_pob_choice: says Yahweh
  chosen_spanish: dice Yahvé
  alternatives_spanish:
  - dice Yahvé
  - ha dicho Yahvé
  - dice el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el principio del proyecto de traducir directamente יְהוָה como «Yahvé», manteniendo la fórmula profética en presente con «dice».
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, se preserva el nombre del pacto como «Yahvé» en lugar de sustituirlo por un título enmascarado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de אֲבֹתֶיךָ
  english_pob_reading: your fathers / your ancestors
  chosen_spanish_reading: tus padres
  alternative_spanish_readings:
  - tus padres
  - tus antepasados
  rationale: 'El hebreo es literal: «padres». En contexto histórico refiere a generaciones anteriores de la casa real; en español «padres» conserva la forma del original y la ambigüedad heredada, sin imponer una paráfrasis.'
  doctrine_reference: 'DOCTRINE.md: Lexical fidelity and context-sensitive kinship terms'
translation_notes:
  revision_awareness: El audit trail inglés muestra un ajuste reciente desde un inicio más coloquial («Look») a un registro más formal («Behold»). La versión española adopta un equivalente igualmente formal («He aquí») para conservar el tono profético solemnizador y la fuerza deíctica del hebreo, sin depender mecánicamente de la redacción inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de acuerdo con la norma del proyecto para יְהוָה.
  - «Babilonia» se conserva como topónimo sin artículo, siguiendo el movimiento direccional del hebreo.
  - «Padres» refleja el literal hebreo y queda semánticamente abierto a antepasados en contexto.
  - 'El orden de cláusulas preserva la progresión de la sentencia: anuncio, alcance total, destino, y cierre oracular.'
