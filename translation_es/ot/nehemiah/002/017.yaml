  yaml_path: translation/ot/nehemiah/002/017.yaml
  text: 'Then I said to them[a], “You see the trouble we are in: Jerusalem lies in ruins, and its gates have been burned with fire. Come, let us rebuild the wall of Jerusalem[c][b], so that we may no longer be a reproach.”'
  footnotes:
