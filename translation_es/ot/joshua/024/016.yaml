translation:
  language: es
  text: 'Entonces el pueblo respondió y dijo[a]: «Lejos esté de nosotros abandonar a Yahvé y servir a otros dioses.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios no lo permita que abandonemos a Yahvé y sirvamos a otros dioses». El hebreo usa un modismo de fuerte repudio, pero no nombra explícitamente a Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - replicó
  lexicon: HALOT
  rationale: En un contexto de diálogo narrativo, ענה se expresa naturalmente como 'responder'; 'respondió' conserva el valor de réplica sin añadir matiz innecesario.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: HALOT
  rationale: Aquí se refiere a la comunidad reunida en pacto; 'el pueblo' es la forma más natural y fiel en español.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - expresó
  lexicon: HALOT
  rationale: '''Dijo'' mantiene el verbo común de habla y el tono narrativo simple del hebreo.'
- source_word: חָלִילָה לָּנוּ
  english_pob_choice: Far be it from us
  chosen_spanish: Lejos esté de nosotros
  alternatives_spanish:
  - Dios no lo permita
  - Nunca tal hagamos
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y de fuerte repudio. 'Lejos esté de nosotros' comunica esa fuerza sin introducir explícitamente a Dios, como tampoco lo hace el hebreo.
- source_word: מֵעֲזֹב
  english_pob_choice: to forsake
  chosen_spanish: abandonar
  alternatives_spanish:
  - dejar
  - desamparar
  - apartarnos de
  lexicon: HALOT
  rationale: En este contexto de pacto, עזב implica dejar la lealtad debida. 'Abandonar' en español transmite esa ruptura relacional con claridad; 'forsake' puede sonar más literario, pero 'abandonar' es más natural y preciso aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de rendir el Nombre divino como 'Yahvé', preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: לַעֲבֹד
  english_pob_choice: to serve
  chosen_spanish: servir
  alternatives_spanish:
  - adorar
  - rendir culto a
  lexicon: HALOT
  rationale: '''Servir'' conserva la amplitud del hebreo עבד con deidades: servicio/lealtad religiosa, sin restringirlo solo a ''adorar''.'
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - dioses extraños
  lexicon: HALOT
  rationale: La frase significa de manera directa 'otros dioses'; 'ajenos' o 'extraños' añadirían un matiz no exigido por el hebreo.
theological_decisions:
- issue: Representación del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrámaton. En español se conserva como nombre propio 'Yahvé' según la convención del proyecto, evitando la sustitución por un título como 'el SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor idiomático de חָלִילָה
  english_pob_reading: Far be it from us
  chosen_spanish_reading: Lejos esté de nosotros
  alternative_spanish_readings:
  - Dios no lo permita
  rationale: La locución expresa rechazo enfático. 'Lejos esté de nosotros' mantiene ese repudio sin añadir un sujeto divino explícito que el hebreo no menciona.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: 'La redacción española sigue el ajuste final del audit trail inglés: la segunda acción está coordinada con la primera (''abandonar a Yahvé y servir a otros dioses''), no subordinada con una construcción final separada. Se respetó además la decisión de preservar el Nombre divino y el carácter idiomático de חָלִילָה sin sobrerrepresentarlo.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme a la terminología base del proyecto.
  - Se prefirió 'servir' para עבד en paralelo con el inglés auditado y con el contexto de lealtad/culto.
  - '''Lejos esté de nosotros'' evita el calco rígido y suena natural en español bíblico contemporáneo.'
  - La nota al pie conserva la alternativa teológica tradicional sin imponerla en el texto principal.
