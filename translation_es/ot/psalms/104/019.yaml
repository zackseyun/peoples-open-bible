translation:
  language: es
  text: Hizo la luna para[a] tiempos señalados; el sol conoce su puesta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘para estaciones’ o ‘para fiestas’; el hebreo puede referirse a tiempos fijos o señalados, incluidos tiempos festivos.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: Hizo
  alternatives_spanish:
  - hizo
  - fabricó
  - formó
  lexicon: HALOT
  rationale: El hebreo en qal expresa ‘hacer’. En español, ‘hizo’ comunica con naturalidad la acción creadora divina sin añadir matices ajenos como ‘fabricó’. Se evita ‘formó’ porque introduce una imagen más específica que el contexto no exige.
- source_word: יָרֵחַ
  english_pob_choice: moon
  chosen_spanish: la luna
  alternatives_spanish:
  - luna
  lexicon: HALOT
  rationale: Corresponde al astro lunar; en español se mantiene el sustantivo común con artículo para fluidez natural.
- source_word: לְמוֹעֲדִים
  english_pob_choice: for appointed times
  chosen_spanish: para tiempos señalados
  alternatives_spanish:
  - para tiempos fijados
  - para estaciones
  - para fiestas
  lexicon: HALOT
  rationale: La idea de מוֹעֲדִים abarca tiempos fijados o señalados, con posible resonancia de calendario festivo. ‘Tiempos señalados’ conserva la amplitud semántica del inglés POB (‘appointed times’) sin restringirla solo a estaciones ni solo a fiestas.
- source_word: שֶׁמֶשׁ
  english_pob_choice: sun
  chosen_spanish: el sol
  alternatives_spanish:
  - sol
  lexicon: HALOT
  rationale: Equivalente directo y natural del sustantivo hebreo.
- source_word: יָדַע
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - conoce bien
  - reconoce
  lexicon: HALOT
  rationale: ‘Conoce’ preserva la personificación poética del sol y reproduce bien el valor de ידע sin volverlo una paráfrasis funcional.
- source_word: מְבוֹאוֹ
  english_pob_choice: its setting
  chosen_spanish: su puesta
  alternatives_spanish:
  - su ocaso
  - su entrada
  - su lugar de puesta
  lexicon: HALOT
  rationale: Para el sol, el sentido idiomático es ‘puesta/ocaso’. ‘Su puesta’ es claro y poético en español; evita ‘entrada’, que sería más literal pero menos natural en este contexto.
theological_decisions:
- issue: Alcance de לְמוֹעֲדִים
  english_pob_reading: broadly 'appointed times' rather than narrowly 'seasons' or explicitly 'festivals'
  chosen_spanish_reading: ‘tiempos señalados’ como sentido amplio, con posible resonancia festiva sin limitarse a ella
  alternative_spanish_readings:
  - estaciones
  - fiestas
  - tiempos de fiesta
  rationale: La creación ordenada por Dios en este versículo sugiere una función calendárica amplia. ‘Tiempos señalados’ preserva esa amplitud y deja abierta la posible referencia a tiempos litúrgicos o festivos, sin imponerla.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con la decisión inglesa auditada: mantener la amplitud de לְמוֹעֲדִים y la personificación del sol, sin estrechar ‘appointed times’ a una sola lectura.'
  spanish_consistency_notes:
  - 'Se mantiene el mismo paralelismo poético del original: luna / sol, tiempos señalados / puesta.'
  - Se evita ‘SEÑOR’ o equivalentes no presentes; el verso no contiene el tetragrámaton.
  - ‘Conoce’ y ‘puesta’ conservan la personificación sin sobreexplicar el hebreo.
