    text: O «no lo abandones» o «no lo dejes».
    reason: lexical_alternative
  - marker: c
    text: Es decir, el levita no tiene un reparto tribal normal de tierra entre Israel.
    reason: cross_reference
  revision_rationale: Se ajusta el modismo a un español más natural («en tus ciudades») mientras la nota conserva la imagen literal hebrea. También se mejora la puntuación y la redacción de la nota cultural sin alterar el sentido ni las decisiones léxicas principales.
