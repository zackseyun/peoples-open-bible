    text: Hebreo nephesh, a menudo “vida”, “ser” o “alma” según el contexto; en este versículo el sentido es “vida”.
    reason: lexical_alternative
  - marker: b
    text: Hebreo nephesh; en este versículo se entiende como “vidas”.
    reason: lexical_alternative
  - marker: c
    text: O, “porque la sangre hace expiación por medio de la vida que hay en ella”. La frase hebrea es compacta y algo debatida.
    reason: alternative_reading
  revision_rationale: 'Se explicitó “la sangre” como objeto de “he dado” para corregir una ambigüedad significativa introducida por el clítico femenino. También se redujeron y alinearon las notas con el rastro de auditoría inglés: se conservaron las dos notas léxicas sobre nephesh y una nota de lectura alternativa para la cláusula final debatida, formulada de manera más cercana al POB inglés.'
