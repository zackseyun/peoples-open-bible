translation:
  language: es
  text: Y hubo una gran desbandada entre el pueblo[a], porque no habían escuchado a Judas y a sus hermanos[b], pensando que ellos mismos actuarían con valentía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una gran derrota» o «un gran pánico»; el término griego denota una vuelta a la huida, de ahí «desbandada».
    reason: lexical_alternative
  - marker: b
    text: O «pensando que ellos mismos se mostrarían valientes».
    reason: lexical_alternative
lexical_decisions:
- source_word: τροπὴ μεγάλη
  english_pob_choice: a great rout
  chosen_spanish: una gran derrota
  alternatives_spanish:
  - un gran desbarajuste
  - una gran huida
  - una gran derrota en fuga
  lexicon: LSJ
  rationale: En contexto militar, τροπή expresa una vuelta a la huida o una desbandada. En español, «derrota» comunica bien el colapso del combate; «rout» no tiene un equivalente único tan natural, así que «gran derrota» mantiene la fuerza narrativa sin sonar artificial.
- source_word: ἐν τῷ λαῷ
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - entre la gente
  - en el pueblo
  lexicon: LSJ
  rationale: El griego dice literalmente «en el pueblo». «Entre el pueblo» conserva el valor colectivo y funciona con naturalidad en español bíblico.
- source_word: οὐκ ἤκουσαν
  english_pob_choice: had not listened to
  chosen_spanish: no habían escuchado
  alternatives_spanish:
  - no habían obedecido
  - no habían atendido
  lexicon: LSJ
  rationale: Ἀκούω con genitivo puede implicar oír con atención y, por extensión, hacer caso. «No habían escuchado» mantiene la imagen verbal básica; la desobediencia queda sugerida por el contexto sin forzar una paráfrasis.
- source_word: Ἰούδα καὶ τῶν ἀδελφῶν αὐτοῦ
  english_pob_choice: Judas and his brothers
  chosen_spanish: Judas y a sus hermanos
  alternatives_spanish:
  - Judas y sus hermanos
  - Judá y a sus hermanos
  lexicon: standard transliteration
  rationale: Se conserva «Judas» como nombre propio convencional en 1 Macabeos. «Sus hermanos» sigue el plural natural del texto y evita ambigüedad.
- source_word: οἰόμενοι
  english_pob_choice: thinking
  chosen_spanish: pensando
  alternatives_spanish:
  - suponiendo
  - imaginando
  lexicon: LSJ
  rationale: El participio expresa la motivación o supuesto interno. «Pensando» es idiomático y suficientemente cercano al griego.
- source_word: ἀνδραγαθῆσαι
  english_pob_choice: would act bravely
  chosen_spanish: actuarían con valentía
  alternatives_spanish:
  - se mostrarían valientes
  - harían hazañas valerosas
  lexicon: LSJ
  rationale: El verbo denota actuar con valor o destacarse en hazañas valerosas. «Actuar con valentía» transmite la idea de manera clara y digna en español.
- source_word: αὐτοί
  english_pob_choice: they themselves
  chosen_spanish: ellos mismos
  alternatives_spanish:
  - sí mismos
  - por su cuenta
  lexicon: LSJ
  rationale: El pronombre es enfático. «Ellos mismos» preserva ese énfasis y evita suavizar la presunción del original.
theological_decisions:
- issue: Relación causal entre no escuchar y la derrota
  english_pob_reading: The defeat happened because they had not listened to Judas and his brothers.
  chosen_spanish_reading: La gran derrota se presenta como consecuencia de que no escucharon a Judas y a sus hermanos.
  alternative_spanish_readings:
  - La frase puede leerse solo como explicación narrativa sin peso causal fuerte.
  - 'La conexión causal podría expresarse de modo más débil: «cuando no escucharon...».'
  rationale: Ὅτι introduce la razón del desastre. La traducción conserva esa causalidad narrativa sin añadir una interpretación doctrinal externa.
  doctrine_reference: Mantener la relación causal explícita del texto; no añadir teología ajena a la narración.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «there was a great rout» como forma más natural para ἐγενήθη. En español se refleja con «hubo una gran derrota», manteniendo la equivalencia formal y la naturalidad idiomática.
  spanish_consistency_notes:
  - Se conserva «Judas» como transliteración estable del nombre propio.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el versículo.
  - «No habían escuchado» mantiene abierta la conexión semántica con la desobediencia sin imponer un léxico más explicativo que el del griego.
  - La nota sobre τροπή preserva la tensión lexical entre «derrota», «desbandada» y «pánico» sin resolverla de manera excesiva.
