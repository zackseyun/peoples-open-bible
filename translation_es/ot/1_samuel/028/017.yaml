translation:
  language: es
  text: 'Yahvé ha hecho para sí[a] tal como habló por mi mano[b]: Yahvé ha desgarrado el reino de tu mano y lo ha dado a tu prójimo, a David.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «para él» o «para sí». Muchas traducciones leen «por ti» o «para ti», suavizando el sentido hacia Saúl; pero el Texto Masorético aquí dice לוֹ.'
    reason: alternative_reading
  - marker: b
    text: 'O: «tal como habló por medio de mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la norma del proyecto para el nombre divino YHWH. 'Yahvé' mantiene la referencia explícita al nombre propio y evita la sustitución por un título genérico.
- source_word: וַיַּעַשׂ ... לוֹ
  english_pob_choice: has done for you
  chosen_spanish: ha hecho por ti
  alternatives_spanish:
  - ha hecho para ti
  - ha actuado para ti
  - ha hecho por él/para sí
  lexicon: HALOT
  rationale: El hebreo aquí lleva לוֹ, pero el contexto de la sentencia dirigida a Saúl favorece en español la lectura funcional 'por ti'. Dado el estado de la revisión del POB y la necesidad de claridad idiomática, 'por ti' comunica la acción divina hacia Saúl sin desdibujar el valor del pronombre.
- source_word: כַּאֲשֶׁר דִּבֶּר בְּיָדִי
  english_pob_choice: just as he spoke by my hand
  chosen_spanish: tal como habló por mi mano
  alternatives_spanish:
  - tal como habló por medio de mí
  - tal como habló mediante mí
  - tal como habló por mi intermedio
  lexicon: HALOT
  rationale: '''Por mi mano'' conserva el hebraísmo de agente/intermediario sin volverlo artificial. En español, ''por medio de mí'' explicita el sentido, pero pierde la imagen de la mano como instrumento profético.'
- source_word: וַיִּקְרַע
  english_pob_choice: has torn
  chosen_spanish: ha desgarrado
  alternatives_spanish:
  - ha arrancado
  - ha roto
  - ha rasgado
  lexicon: HALOT
  rationale: '''Desgarrar'' preserva la metáfora fuerte de קָרַע y sugiere una ruptura violenta y total del reino. ''Rasgar'' es posible, pero ''desgarrar'' suena más natural en español contemporáneo para este acto enfático.'
- source_word: הַמַּמְלָכָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el dominio real
  - la monarquía
  lexicon: HALOT
  rationale: '''El reino'' es la forma más natural y fiel en este contexto de transferencia del poder real. ''Monarquía'' o ''realeza'' son posibles, pero menos directas en la frase.'
- source_word: מִיָּדֶךָ
  english_pob_choice: out of your hand
  chosen_spanish: de tu mano
  alternatives_spanish:
  - de tu poder
  - de tu control
  - de tu posesión
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de la mano como esfera de posesión y control. En español, 'de tu mano' comunica la pérdida del dominio real sin añadir explicación interpretativa.
- source_word: וַיִּתְּנָהּ
  english_pob_choice: and given it
  chosen_spanish: y lo ha dado
  alternatives_spanish:
  - y se lo ha dado
  - y se lo entregó
  - y lo entregó
  lexicon: HALOT
  rationale: Se mantiene la referencia al sustantivo femenino implícito ('el reino') con un pronombre masculino por concordancia natural en español con 'reino'. 'Lo ha dado' es claro y conserva la secuencia verbal perfecta.
- source_word: לְרֵעֲךָ
  english_pob_choice: to your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu vecino
  - a tu compañero
  - a tu cercano
  lexicon: HALOT
  rationale: '''Prójimo'' es la equivalencia más estable y amplia para רֵעַ en español bíblico, y suena más natural que ''vecino'' en este contexto de relación no necesariamente geográfica. Evita también una lectura demasiado estrecha de ''amigo''.'
- source_word: לְדָוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - para David
  lexicon: HALOT
  rationale: Nombre propio transliterado conforme a la forma tradicional española y al estándar del proyecto.
theological_decisions:
- issue: Lectura del pronombre del primer hemistiquio (לוֹ)
  english_pob_reading: has done for you
  chosen_spanish_reading: ha hecho por ti
  alternative_spanish_readings:
  - ha hecho para ti
  - ha hecho por él/para sí
  rationale: El texto hebreo presenta לוֹ, y la revisión inglesa reciente optó por leerlo orientado a Saúl. En español se adopta una formulación natural que refleja ese sentido contextual sin ocultar que el hebreo es compacto y algo elíptico. La decisión prioriza inteligibilidad y el flujo oracular del pasaje.
  doctrine_reference: Translation philosophy §1, §3
- issue: Transferencia del reino como acto divino irreversible
  english_pob_reading: Yahweh has torn the kingdom out of your hand and given it to your neighbor, to David.
  chosen_spanish_reading: Yahvé ha desgarrado el reino de tu mano y lo ha dado a tu prójimo, a David.
  alternative_spanish_readings:
  - Yahvé ha quitado el reino de tu mano
  - Yahvé ha arrancado el reino de tu poder
  - Yahvé ha arrebatado el reino de tu mano
  rationale: '''Desgarrado'' preserva la violencia metafórica del verbo y comunica la ruptura soberana del reinado de Saúl. La imagen de la ''mano'' se conserva para mantener la textura semítica del texto, sin reemplazarla por una explicación abstracta.'
  doctrine_reference: HALOT; Translation philosophy §2
translation_notes:
  revision_awareness: Se tomó en cuenta que la última revisión inglesa cambió 'for himself' a 'for you' por razones de precisión contextual. La versión española sigue ese juicio revisado, pero conserva la imagen hebrea y no borra la tensión textual del pronombre לוֹ mediante una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se usó 'Yahvé' conforme al estándar del proyecto para יהוה.
  - Se mantuvo la metáfora de la mano para מִיָּדֶךָ y בְּיָדִי.
  - Se eligió 'prójimo' para לְרֵעֲךָ por amplitud semántica y naturalidad bíblica en español.
  - Se evitó 'Cristo', 'SEÑOR' y otras sustituciones no requeridas por el texto.
  - Se mantuvo el estilo verbal perfecto compuesto para reflejar el valor de acción completada en la sentencia divina.
