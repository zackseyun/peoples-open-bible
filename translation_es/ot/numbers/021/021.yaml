translation:
  language: es
  text: 'Entonces Israel envió mensajeros a Sehón, rey de los amorreos[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rey amorreo». El constructo hebreo puede entenderse de ambas maneras.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - y envió
  - entonces envió
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; en español, «envió» comunica con naturalidad la acción principal, mientras que «entonces» mantiene el progreso narrativo sin forzar una repetición conjuntiva.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio tal como designa al sujeto colectivo en el contexto narrativo.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: El contexto diplomático indica representantes humanos, no seres celestiales. «Mensajeros» es el equivalente más amplio y transparente en español.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional se expresa de manera natural con «a» en español cuando introduce el destinatario del envío.
- source_word: סִיחֹן
  english_pob_choice: Sihon
  chosen_spanish: Sehón
  alternatives_spanish:
  - Sijón
  lexicon: HALOT
  rationale: Se adopta la forma española tradicional y legible del nombre propio, manteniendo la identificación con el personaje bíblico.
- source_word: מֶלֶךְ הָאֱמֹרִי
  english_pob_choice: king of the Amorites
  chosen_spanish: rey de los amorreos
  alternatives_spanish:
  - rey amorreo
  - el rey amorreo
  lexicon: HALOT
  rationale: El hebreo en constructo permite el sentido de pertenencia étnica; en español, «rey de los amorreos» conserva con claridad la relación y evita una paráfrasis excesiva.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: La fórmula introductoria de discurso directo se rinde con una forma participial natural en español, apta para preparar la cita siguiente.
theological_decisions:
- issue: 'Construcción hebrea en aposición/constructo: ''rey de los amorreos'' vs. ''el rey amorreo'''
  english_pob_reading: Or 'the Amorite king.' The Hebrew construct can be rendered either way in English.
  chosen_spanish_reading: rey de los amorreos
  alternative_spanish_readings:
  - el rey amorreo
  rationale: Se prefiere la relación genitiva explícita porque reproduce mejor la ambigüedad del constructo hebreo y evita imponer una lectura adjetival que suavizaría el vínculo étnico-político del título.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo de Números 21:21 y el audit trail inglés: se mantuvo el avance narrativo del waw consecutivo, se reconoció a מַלְאָכִים como emisarios humanos y se conservó la ambigüedad del constructo מֶלֶךְ הָאֱמֹרִי mediante una nota alternativa en español. No hubo revisiones aplicadas en el contexto inglés.'
  spanish_consistency_notes:
  - Se usa «Sehón» como forma española tradicional y clara del nombre propio.
  - Se mantiene «amorreos» en plural para reflejar el colectivo étnico del constructo hebreo.
  - La puntuación con coma antes de «diciendo» sigue la cadencia narrativa española y prepara el discurso directo.
