review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta la estructura básica del versículo y preserva bien «Esta vez», «me honrará» con nota alternativa, y la explicación del nombre. Sin embargo, debilita de manera importante el juego léxico entre זְבָדַנִי y זֵבֶד con «me ha favorecido / un buen favor», que no refleja bien la idea de don/endowment y suena poco natural en español. También la nota está anclada en el lugar equivocado: el marcador [a] aparece tras «Lea», pero la nota corresponde a «me honrará». Además, «Y llamó su nombre Zabulón» es menos natural en español que «le puso por nombre», y «le he dado a luz seis hijos» resulta forzado.'
  spanish_quality_summary: La legibilidad es aceptable, pero «un buen favor» suena impropio y redundante. «Le he dado a luz seis hijos» no es idiomático; «le he dado seis hijos» o «le he dado a luz seis hijos varones» serían más naturales, pero en este contexto conviene una formulación más directa. «Le puso por nombre Zabulón» ofrece mejor español sin perder fidelidad. También debe corregirse la ubicación de la nota al verbo relevante.
  glossary_alignment: 'No hay conflicto con la terminología teológica principal del proyecto. «Dios» está bien. El nombre propio «Zabulón» es aceptable como forma española tradicional. La decisión principal que requiere ajuste es léxica: para זבד / זבד, el español debe conservar el campo de «don / dádiva / regalo» más que «favor».'
  issues:
  - severity: high
    issue: La pareja «me ha favorecido con un buen favor» no preserva fielmente el sentido léxico ni suena natural en español.
    rationale: El hebreo usa un verbo y un sustantivo emparentados del campo de otorgar un don/endowment. «Favor» desplaza el significado hacia benevolencia y produce una expresión torpe. Conviene «me ha dado un buen don» o equivalente, que además conserva mejor el juego verbal-nominal.
  - severity: high
    issue: La nota [a] está anclada después de «Lea», pero explica «me honrará».
    rationale: Según las instrucciones del proyecto, el marcador debe aparecer exactamente en la palabra o frase pertinente. La nota debe ir junto a «me honrará[a]».
  - severity: medium
    issue: «Le he dado a luz seis hijos» es poco idiomático en esta construcción.
    rationale: En español normal, «dar a luz» no suele tomar complemento indirecto de esta manera. «Le he dado seis hijos» es natural y conserva el sentido contextual del hebreo.
  - severity: medium
    issue: «Y llamó su nombre Zabulón» es demasiado calcado y menos natural en español.
    rationale: Aunque transparente al hebreo, en español bíblico actual «le puso por nombre Zabulón» comunica la fórmula de nombrar con mejor fluidez sin perder contenido.
  revised_spanish_text: 'Y Lea dijo: «Dios me ha dado un buen don. Esta vez mi marido me honrará[a], porque le he dado seis hijos». Y le puso por nombre Zabulón.'
  revised_footnotes:
  - marker: a
    text: O «habitará conmigo». El verbo hebreo es raro y se vincula mediante juego de palabras con el nombre Zabulón; el sentido puede incluir tanto honra como habitación o permanencia con Lea.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para preservar mejor el campo léxico de זבד/זבד con «me ha dado un buen don», corregir el anclaje de la nota al verbo «me honrará», mejorar la naturalidad de «le he dado seis hijos» y usar una fórmula de nombramiento más idiomática en español: «le puso por nombre Zabulón».'
