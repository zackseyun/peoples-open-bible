revisions:
- from: o, si no, la despojaré de sus vestidos, y la pondré al descubierto, como en el día en que nació[a]; y la pondré como el desierto, y la haré como tierra árida[b], y la haré morir de sed.
  to: de lo contrario, la despojaré de sus vestidos y la presentaré desnuda, como en el día en que nació[a]; la pondré como el desierto, la haré como tierra árida[b], y la haré morir de sed.
  rationale: La revisión restaura mejor la correspondencia con el hebreo distinguiendo el resultado «desnuda» de la acción posterior «la presentaré», mantiene la imaginería concreta de juicio, mejora la fluidez inicial en español y corrige la nota alternativa sobre פֶּן para que sea idiomática y fiel al audit trail.
