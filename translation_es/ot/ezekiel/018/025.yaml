  text: וַ/אֲמַרְתֶּ֕ם לֹ֥א יִתָּכֵ֖ן דֶּ֣רֶךְ אֲדֹנָ֑/י שִׁמְעוּ נָא֙ בֵּ֣ית יִשְׂרָאֵ֔ל הֲ/דַרְכִּ/י֙ לֹ֣א יִתָּכֵ֔ן הֲ/לֹ֥א דַרְכֵי/כֶ֖ם לֹ֥א יִתָּכֵֽנוּ־׃
