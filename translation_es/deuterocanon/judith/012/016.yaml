translation:
  language: es
  text: Y cuando ella entró, Judit se recostó[b], y el corazón de Holofernes quedó fuera de sí por causa de ella; su alma fue sacudida. Tenía gran deseo de tener relaciones con ella, y estaba atento a una oportunidad para engañarla[a] desde el día en que la vio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seducirla» o «tenderle una trampa». El griego dice «engañarla», lo cual puede incluir manipulación sexual en este contexto.
    reason: lexical_alternative
  - marker: b
    text: «Se recostó» refleja la costumbre de los banquetes de comer reclinados a la mesa.
    reason: cultural_note
lexical_decisions:
- source_word: εἰσελθοῦσα
  english_pob_choice: when she entered
  chosen_spanish: cuando ella entró
  alternatives_spanish:
  - habiendo entrado
  - después de que entró
  lexicon: LSJ
  rationale: El participio aoristo introduce la acción de manera temporal. En español, «cuando ella entró» conserva la secuencia natural sin volverla pesada o excesivamente literal.
- source_word: ἀνέπεσεν
  english_pob_choice: reclined
  chosen_spanish: se recostó
  alternatives_spanish:
  - se reclinó
  - se acostó
  lexicon: LSJ
  rationale: En contexto de banquete, el verbo alude a la postura de comer reclinado. «Se recostó» comunica la costumbre sin sonar forzado; «se reclinó» también sería posible, pero menos natural en español corriente.
- source_word: ἐξέστη ἡ καρδία
  english_pob_choice: the heart ... was beside itself
  chosen_spanish: el corazón ... quedó fuera de sí
  alternatives_spanish:
  - el corazón ... fue sacado de su lugar
  - el corazón ... quedó desbordado
  lexicon: LSJ
  rationale: Se conserva la imagen idiomática de alteración intensa. «Quedó fuera de sí» mantiene la vivacidad del giro griego y es idiomático en español.
- source_word: ἐπʼ αὐτῇ
  english_pob_choice: over her
  chosen_spanish: por causa de ella
  alternatives_spanish:
  - ante ella
  - hacia ella
  lexicon: LSJ
  rationale: Aquí la preposición marca a Judit como causa del trastorno emocional. «Por causa de ella» evita una imagen extraña en español y conserva la relación causal.
- source_word: ἐσαλεύθη ἡ ψυχὴ αὐτοῦ
  english_pob_choice: his soul was shaken
  chosen_spanish: su alma fue sacudida
  alternatives_spanish:
  - su alma fue conmovida
  - su interior fue sacudido
  lexicon: LSJ
  rationale: Se mantiene «alma» para preservar el lenguaje antropológico del griego y la fuerza de σαλεύω. «Fue sacudida» sigue de cerca la imagen verbal sin reducirla a un simple estado psicológico.
- source_word: κατενθύμως σφόδρα
  english_pob_choice: very eager
  chosen_spanish: tenía gran deseo
  alternatives_spanish:
  - estaba muy resuelto
  - estaba sumamente ansioso
  lexicon: LSJ
  rationale: La expresión indica fuerte intención o deseo interior. «Tenía gran deseo» transmite la intensidad de forma clara y digna en español.
- source_word: τοῦ συγγενέσθαι μετʼ αὐτῆς
  english_pob_choice: to have relations with her
  chosen_spanish: tener relaciones con ella
  alternatives_spanish:
  - yacer con ella
  - estar con ella
  lexicon: LSJ
  rationale: El infinitivo es un eufemismo sexual. «Tener relaciones con ella» hace explícito el sentido sin vulgaridad, como buscó la POB en inglés.
- source_word: ἐτήρει καιρὸν
  english_pob_choice: he was watching for an opportunity
  chosen_spanish: estaba esperando una oportunidad
  alternatives_spanish:
  - estaba vigilando el momento
  - buscaba una ocasión
  lexicon: LSJ
  rationale: El imperfecto sugiere vigilancia sostenida. «Estaba esperando una oportunidad» es natural y conserva el aspecto durativo e intencional.
- source_word: τοῦ ἀπατῆσαι αὐτήν
  english_pob_choice: to deceive her
  chosen_spanish: para engañarla
  alternatives_spanish:
  - para seducirla
  - para traicionarla
  lexicon: LSJ
  rationale: El verbo significa primariamente engañar o defraudar. En el contexto puede implicar manipulación sexual, pero la traducción conserva el verbo más amplio sin añadir especificidad no expresada de forma directa.
- source_word: ἀφʼ ἧς ἡμέρας εἶδεν αὐτήν
  english_pob_choice: from the day he saw her
  chosen_spanish: desde el día en que la vio
  alternatives_spanish:
  - desde el día que la vio
  - desde que la vio
  lexicon: LSJ
  rationale: Es una expresión temporal directa. La formulación elegida suena natural en español y sigue de cerca la estructura griega.
theological_decisions:
- issue: Eufemismo sexual en el infinitivo
  english_pob_reading: to have relations with her
  chosen_spanish_reading: tener relaciones con ella
  alternative_spanish_readings:
  - yacer con ella
  - estar con ella
  rationale: La frase griega usa un eufemismo para unión sexual. Se elige una expresión clara, sobria y moderna que preserve el sentido sin volverlo más crudo de lo necesario.
  doctrine_reference: 'Translation philosophy: preserve source meaning and documented lexical force; avoid unnecessary euphemism or obscenity.'
- issue: Lenguaje antropológico de ψυχή
  english_pob_reading: his soul was shaken
  chosen_spanish_reading: su alma fue sacudida
  alternative_spanish_readings:
  - su interior fue sacudido
  - quedó profundamente perturbado
  rationale: Se conserva «alma» porque el texto no se limita a un estado emocional superficial. Esto mantiene la tensión antropológica del original y evita una reducción psicológica.
  doctrine_reference: 'Translation philosophy: preserve source wording and theological tension; do not flatten ψυχή into mere emotion.'
translation_notes:
  revision_awareness: 'Se siguió la lectura auditada del inglés POB sin cambios de fondo; la principal adaptación fue naturalizar el orden y la idiomaticidad del español, manteniendo los paralelos semánticos clave: entrada, postura de banquete, trastorno interior, deseo sexual e intención de engaño.'
  spanish_consistency_notes:
  - Se conserva «Judit» para el nombre propio, de acuerdo con el uso estándar en español bíblico.
  - Se mantiene «alma» para ψυχή y «corazón» para καρδία, distinguiendo ambos términos según el griego.
  - «Engañarla» reproduce el verbo amplio ἀπατῆσαι sin sustituirlo por un término más específico que el texto no exige.
  - El registro es formal y eclesialmente legible, evitando arcaísmos innecesarios.
