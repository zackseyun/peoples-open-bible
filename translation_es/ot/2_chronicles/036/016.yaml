base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/036/016.yaml
  text: But they kept mocking the messengers of God[a], despising his words, and scoffing at his prophets, until the wrath of Yahweh rose against his people[b], until there was no remedy.
  footnotes:
  - marker: a
    text: Or 'the angels of God'; here the context strongly favors 'messengers,' that is, God's human envoys, because the next clause speaks of 'his prophets.'
    reason: lexical_alternative
  - marker: b
    text: Or 'until there was no healing' or 'until it was beyond cure.'
    reason: lexical_alternative
