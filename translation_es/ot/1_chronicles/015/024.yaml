base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/015/024.yaml
  text: And Shebaniah[a], Jehoshaphat, Nethanel, Amasai, Zechariah, Benaiah, and Eliezer the priests were blowing the trumpets before the ark of God[c][b], and Obed-edom and Jehiah were gatekeepers for the ark.
  footnotes:
  - marker: a
    text: Or 'were sounding the trumpets.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew term for these trumpets often refers to the straight priestly trumpets used in worship.
    reason: cultural_note
  - marker: c
    text: Or 'doorkeepers for the ark.'
    reason: lexical_alternative
