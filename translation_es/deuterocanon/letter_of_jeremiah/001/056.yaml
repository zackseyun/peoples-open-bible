    rationale: El griego distingue dos grupos cercanos pero no idénticos mediante οὔτε...οὔτε. El English POB preserva esa distinción con «thieves or robbers». En español, «ladrones ni salteadores» o equivalente mantiene mejor el contraste.
  - severity: medium
