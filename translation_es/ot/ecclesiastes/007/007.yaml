translation:
  language: es
  text: Porque la opresión vuelve loco al sabio, y un soborno[a] destruye el corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una dádiva». El hebreo puede significar «regalo» en general, pero aquí el contexto favorece claramente el sentido negativo de «soborno».
    reason: lexical_alternative
  - marker: b
    text: En hebreo, «corazón» suele referirse al interior de la persona, incluyendo juicio, entendimiento y voluntad.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa/causal del proverbio con el versículo previo. «Porque» conserva bien esa función discursiva en español y suena natural en una afirmación sapiencial.
- source_word: הָעֹשֶׁק
  english_pob_choice: oppression
  chosen_spanish: la opresión
  alternatives_spanish:
  - la extorsión
  - la injusticia
  lexicon: HALOT
  rationale: El sustantivo hebreo denota abuso opresivo o explotación. «Opresión» mantiene amplitud semántica y encaja con el contraste moral del texto.
- source_word: יְהוֹלֵל
  english_pob_choice: drives ... mad
  chosen_spanish: vuelve loco
  alternatives_spanish:
  - hace enloquecer
  - trastorna
  lexicon: HALOT
  rationale: El verbo expresa causar irracionalidad o desvarío. «Vuelve loco» reproduce con claridad el efecto idiomático sin perder fuerza.
- source_word: חָכָם
  english_pob_choice: a wise man
  chosen_spanish: al sabio
  alternatives_spanish:
  - a un hombre sabio
  - a la persona sabia
  lexicon: HALOT
  rationale: Como sustantivo adjetival, el hebreo singular puede funcionar genéricamente. En español, «al sabio» conserva el tono proverbial y evita una formulación pesada.
- source_word: וִיאַבֵּד
  english_pob_choice: destroys
  chosen_spanish: destruye
  alternatives_spanish:
  - arruina
  - pervierte
  lexicon: HALOT
  rationale: El causativo de אבד comunica causar ruina o destrucción. «Destruye» preserva la severidad del verbo y su relación directa con el objeto.
- source_word: אֶת לֵב
  english_pob_choice: the heart
  chosen_spanish: el corazón
  alternatives_spanish:
  - la mente
  - el interior
  lexicon: HALOT
  rationale: Se mantiene el sustantivo metafórico «corazón», que en hebreo incluye juicio, entendimiento y voluntad. Es más fiel que sustituirlo por un término explicativo en el texto principal.
- source_word: מַתָּנָה
  english_pob_choice: a bribe
  chosen_spanish: un soborno
  alternatives_spanish:
  - un regalo
  - un presente
  lexicon: HALOT
  rationale: Aunque el sustantivo puede significar «regalo», el contexto lo inclina claramente al sentido negativo de dádiva corruptora. «Soborno» expresa bien ese valor en español actual.
theological_decisions:
- issue: Sentido de «corazón» como centro interior
  english_pob_reading: The heart in Hebrew commonly refers to the inner person, including judgment, understanding, and will.
  chosen_spanish_reading: «Corazón» se conserva como metáfora del centro interior de la persona, incluyendo juicio, entendimiento y voluntad.
  alternative_spanish_readings:
  - la mente
  - el entendimiento
  rationale: La imagen hebrea es más amplia que el órgano físico. Mantener «corazón» preserva la tensión semántica documentada y permite explicar su alcance en nota sin reducir el término.
  doctrine_reference: Antropología bíblica / uso semítico del término «corazón»
translation_notes:
  revision_awareness: Se siguió el estado más reciente del auditor, con alto acuerdo y sin revisiones aplicadas; por eso no hay cambios de última hora respecto del sentido lexical principal.
  spanish_consistency_notes:
  - Se mantuvo la terminología poética y sapiencial en una forma natural para el español.
  - Se evitó traducir mecánicamente desde el inglés cuando el hebreo permitía una formulación más directa.
  - Se preservó la ambigüedad documentada de מַתָּנָה mediante nota, pero se priorizó el sentido contextual de «soborno» en el texto principal.
  - Se conservó «corazón» para לֵב, con explicación de su alcance semítico en nota.
