translation:
  language: es
  text: 'Pero hay un Dios en el cielo que revela misterios[a], y ha dado a conocer al rey Nabucodonosor lo que será en los días postreros[b]. Tu sueño, y las visiones de tu cabeza sobre tu lecho[c], fueron estas:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un Dios en los cielos» o «el Dios en el cielo». La expresión aramea es formalmente indefinida, aunque en contexto se refiere claramente al Dios verdadero.
    reason: alternative_reading
  - marker: b
    text: O «en los últimos días». La expresión puede señalar un período futuro culminante sin especificar un esquema escatológico particular.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «las visiones de tu cabeza».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּרַם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: HALOT
  rationale: La partícula adversativa introduce contraste con la incapacidad de los sabios en el contexto previo. «Pero» es la equivalencia natural y concisa en español.
- source_word: אִיתַי
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - existe
  - hay un
  lexicon: HALOT
  rationale: El arameo expresa existencia; «hay» transmite bien la afirmación y suena natural en español. Se conserva el sentido afirmativo de presencia/existencia.
- source_word: אֱלָהּ בִּשְׁמַיָּא
  english_pob_choice: a God in heaven
  chosen_spanish: un Dios en los cielos
  alternatives_spanish:
  - Dios en los cielos
  - el Dios en los cielos
  lexicon: HALOT
  rationale: El hebreo-arameo es formalmente indefinido. En español, «un Dios en los cielos» preserva esa forma y el matiz retórico del escenario cortesano, sin perder la referencia al Dios verdadero.
- source_word: גָּלֵא
  english_pob_choice: who reveals
  chosen_spanish: que revela
  alternatives_spanish:
  - que descubre
  - revelador de
  lexicon: HALOT
  rationale: Es un participio con valor caracterizador. «Que revela» mantiene la acción habitual y evita convertirlo en un sustantivo.
- source_word: רָזִין
  english_pob_choice: mysteries
  chosen_spanish: misterios
  alternatives_spanish:
  - secretos
  lexicon: HALOT
  rationale: En Daniel, el término es técnico y teológicamente cargado para realidades ocultas que Dios da a conocer. «Misterios» conserva mejor ese peso temático que «secretos».
- source_word: וְהוֹדַע
  english_pob_choice: and he has made known
  chosen_spanish: y ha dado a conocer
  alternatives_spanish:
  - y ha hecho saber
  - y reveló
  lexicon: HALOT
  rationale: El verbo expresa hacer saber. «Ha dado a conocer» preserva el aspecto completado y distingue bien este verbo de גָּלֵא, evitando repetir «revelar».
- source_word: לְמַלְכָּא נְבוּכַדְנֶצַּר
  english_pob_choice: to King Nebuchadnezzar
  chosen_spanish: al rey Nabucodonosor
  alternatives_spanish:
  - al rey, Nabucodonosor
  lexicon: HALOT
  rationale: Se mantiene el dativo y el título real de manera clara y natural en español.
- source_word: מָה דִּי לֶהֱוֵא
  english_pob_choice: what will be
  chosen_spanish: lo que será
  alternatives_spanish:
  - lo que acontecerá
  - lo que vendrá a ser
  lexicon: HALOT
  rationale: La cláusula predice un estado o resultado futuro. «Lo que será» es cercano al valor del original y no añade especificación doctrinal.
- source_word: בְּאַחֲרִית יוֹמַיָּא
  english_pob_choice: in the latter days
  chosen_spanish: en los últimos días
  alternatives_spanish:
  - en los postreros días
  - al final de los días
  lexicon: HALOT
  rationale: «Últimos días» es la forma más idiomática y reverente en español para este período futuro con posible carga escatológica, sin cerrar el sentido a un esquema doctrinal específico.
- source_word: חֶלְמָךְ
  english_pob_choice: Your dream
  chosen_spanish: Tu sueño
  alternatives_spanish:
  - Tu sueño profético
  lexicon: HALOT
  rationale: Se traduce directamente el sustantivo con el posesivo de segunda persona singular.
- source_word: וְחֶזְוֵי רֵאשָׁךְ
  english_pob_choice: the visions of your head
  chosen_spanish: y las visiones de tu cabeza
  alternatives_spanish:
  - y las visiones de tu mente
  - y las visiones de tu cabeza
  lexicon: HALOT
  rationale: La expresión aramea es literal y algo idiomática. «Visiones de tu cabeza» conserva la imagen sin suavizarla; se mantiene la referencia a la sede de la percepción en el sueño.
- source_word: עַל מִשְׁכְּבָךְ
  english_pob_choice: upon your bed
  chosen_spanish: sobre tu cama
  alternatives_spanish:
  - en tu cama
  - al estar en tu lecho
  lexicon: HALOT
  rationale: «Sobre tu cama» refleja con fidelidad la preposición y su relación espacial, con una formulación natural en español.
- source_word: דְּנָה הוּא
  english_pob_choice: 'were these:'
  chosen_spanish: 'fueron estas:'
  alternatives_spanish:
  - 'esto fue:'
  - 'esto era:'
  lexicon: HALOT
  rationale: La frase deíctica introduce la exposición del sueño que sigue. «Fueron estas» reproduce bien el cierre catáforico en español.
theological_decisions:
- issue: Forma indefinida de אֱלָהּ en un contexto monoteísta
  english_pob_reading: a God in heaven
  chosen_spanish_reading: un Dios en los cielos
  alternative_spanish_readings:
  - Dios en los cielos
  - el Dios en los cielos
  rationale: El arameo es formalmente indefinido, y el contexto es el discurso de Daniel en una corte pagana, contrastando al verdadero revelador con otros reclamos religiosos. «Un Dios en los cielos» preserva esa forma sin negar la identificación con el Dios verdadero.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor temporal de בְּאַחֲרִית יוֹמַיָּא
  english_pob_reading: in the latter days
  chosen_spanish_reading: en los últimos días
  alternative_spanish_readings:
  - en los postreros días
  - al final de los días
  rationale: La expresión puede tener fuerza escatológica, pero no conviene forzar un sistema doctrinal posterior. «En los últimos días» conserva la tensión temporal y profética del original.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión final del inglés POB que prefirió una correspondencia más cercana en «what will be» y «upon your bed». La versión española sigue esa línea: usa una predicación futura simple («lo que será») y una preposición espacial directa («sobre tu cama») sin añadir expansión interpretativa.'
  spanish_consistency_notes:
  - Se preserva «Dios» con mayúscula para la referencia al Dios verdadero, aunque el arameo sea formalmente indefinido.
  - «Misterios» se mantiene como término técnico de Daniel para realidades ocultas reveladas por Dios.
  - Se usa «últimos días» como equivalente natural de la fórmula temporal, sin sobreespecificar la escatología.
  - «Tu sueño» y «las visiones de tu cabeza» conservan la duplicación poética del original, sin fusionar los miembros.
