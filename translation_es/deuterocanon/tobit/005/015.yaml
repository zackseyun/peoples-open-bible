translation:
  language: es
  text: Pero dime[a], ¿qué salario te daré? Una dracma al día, y lo que necesites, igual que a mi hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿qué te pagaré?». El griego pregunta directamente por la compensación que Tobit debe dar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μισθὸν
  english_pob_choice: wages
  chosen_spanish: salario
  alternatives_spanish:
  - pago
  - jornal
  - remuneración
  lexicon: BDAG
  rationale: μισθός denota pago por servicio o trabajo. En español, «salario» comunica bien la compensación laboral sin sonar tan administrativo como «remuneración» ni tan poco natural como un calco de «wages».
- source_word: δραχμὴν τῆς ἡμέρας
  english_pob_choice: A drachma a day
  chosen_spanish: Un dracma al día
  alternatives_spanish:
  - un dracma por día
  - un dracma cada día
  lexicon: LSJ
  rationale: La construcción griega expresa una tarifa por día. Mantener «dracma» preserva la moneda antigua, y «al día» reproduce de forma natural la tasa temporal sin modernizar la medida.
- source_word: τὰ δέοντά σοι
  english_pob_choice: what you need
  chosen_spanish: lo que necesites
  alternatives_spanish:
  - tus necesidades
  - lo necesario para ti
  - lo que te haga falta
  lexicon: LSJ
  rationale: La frase se refiere a lo que es necesario o debido. «Lo que necesites» sigue la revisión inglesa más natural y conserva el sentido de provisión suficiente sin especificar de más.
- source_word: ὡς καὶ τῷ υἱῷ μου
  english_pob_choice: as for my own son
  chosen_spanish: como también a mi hijo
  alternatives_spanish:
  - igual que a mi propio hijo
  - como a mi propio hijo
  - así como a mi hijo
  lexicon: LSJ
  rationale: La comparación en griego indica trato semejante al que recibiría su hijo. «Como también a mi hijo» conserva la comparación directa y evita añadir el intensificador «propio» que no está explícito en el griego.
- source_word: τίνα σοὶ ἔσομαι ... διδόναι
  english_pob_choice: what wages shall I give you
  chosen_spanish: ¿qué salario te daré?
  alternatives_spanish:
  - ¿qué te pagaré?
  - ¿qué retribución te daré?
  lexicon: BDAG
  rationale: La construcción con futuro e infinitivo funciona idiomáticamente como pregunta de pago o compensación. «¿Qué salario te daré?» mantiene la literalidad funcional y el matiz de compensación por servicio.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «what you need» sobre «your necessities» por naturalidad. En español se siguió esa misma línea con «lo que necesites», conservando el sentido del griego τὰ δέοντά σοι sin sobreexplicarlo.
  spanish_consistency_notes:
  - Se mantuvo «dracma» como moneda antigua, en continuidad con la decisión inglesa de no modernizar la unidad.
  - Se prefirió el trato natural de segunda persona singular («te daré», «necesites») para reflejar la dirección personal del habla griega.
  - No se introdujo ningún término eclesiástico tradicional que desplazara el sentido económico del pasaje.
