translation:
  language: es
  text: 'Y este era su número: 30 palanganas de oro, 1.000 palanganas de plata y 29 cuchillos[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «29 otros utensilios», «29 duplicados» o «29 vasos de reemplazo»; el término hebreo es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: And this
  chosen_spanish: Y esta era
  alternatives_spanish:
  - Y estos eran
  - Y esto era
  lexicon: HALOT
  rationale: La expresión introduce un inventario total. En español, "esta era" conserva el carácter resumidor y permite concordar naturalmente con "la cuenta", siguiendo la lógica del audit trail inglés sin mecanizar el plural hebreo.
- source_word: מִסְפָּרָם
  english_pob_choice: was their number
  chosen_spanish: la cuenta de ellos
  alternatives_spanish:
  - el número de ellos
  - su número
  lexicon: HALOT
  rationale: El sustantivo con sufijo plural indica pertenencia de la cuenta; "la cuenta de ellos" comunica la misma relación sin sonar forzado. "Cuenta" mantiene el sentido enumerativo del contexto.
- source_word: אֲגַרְטְלֵי
  english_pob_choice: basins
  chosen_spanish: palanganas
  alternatives_spanish:
  - cuencos
  - vasos
  - tazones
  lexicon: HALOT
  rationale: El término parece designar recipientes/vasijas del templo. "Palanganas" es una equivalencia funcional comprensible en español, aunque no idéntica a un recipiente doméstico moderno; se eligió por claridad inventarial y porque el inglés POB optó por un término de recipiente genérico y concreto.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: de oro
  alternatives_spanish:
  - doradas
  - de oro fino
  lexicon: HALOT
  rationale: Se mantiene el material del original con una construcción natural en español para objetos contables.
- source_word: שְׁלֹשִׁים
  english_pob_choice: '30'
  chosen_spanish: '30'
  alternatives_spanish:
  - treinta
  lexicon: HALOT
  rationale: Se conserva el número en cifras, como en el registro inglés, para legibilidad en una lista de inventario.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: de plata
  alternatives_spanish:
  - plateadas
  - de plata fina
  lexicon: HALOT
  rationale: '"Plata" es el equivalente natural y directo en español para el metal mencionado.'
- source_word: אָלֶף
  english_pob_choice: 1,000
  chosen_spanish: '1.000'
  alternatives_spanish:
  - mil
  lexicon: HALOT
  rationale: Se usa cifra con punto decimal latino para mantener claridad tipográfica en la lista.
- source_word: מַחֲלָפִים
  english_pob_choice: knives
  chosen_spanish: cuchillos
  alternatives_spanish:
  - otros utensilios
  - duplicados
  - vasos de repuesto
  lexicon: HALOT
  rationale: Se conserva la lectura principal del POB inglés, pero en español "cuchillos" es el término más natural para un utensilio cortante asociado al servicio del templo. La incertidumbre léxica del hebreo queda implícita en la decisión contextual, sin ocultar que el término es discutido.
- source_word: תִּשְׁעָה וְעֶשְׂרִים
  english_pob_choice: '29'
  chosen_spanish: '29'
  alternatives_spanish:
  - veintinueve
  lexicon: HALOT
  rationale: Número cardinal en cifras, en armonía con la lista inventarial.
theological_decisions:
- issue: Inventario de objetos del templo sin carga doctrinal explícita
  english_pob_reading: No theological decision; plain inventory list
  chosen_spanish_reading: No se introduce lectura doctrinal adicional; se mantiene el carácter de inventario
  alternative_spanish_readings:
  - Interpretar simbólicamente los objetos
  - Añadir explicitaciones litúrgicas
  rationale: El versículo presenta un recuento de objetos; la traducción debe permanecer descriptiva y no añadir significado devocional no sustentado por el hebreo.
  doctrine_reference: Principio de literalidad contextual y no-eiségesis
translation_notes:
  revision_awareness: El texto en inglés fue revisado y quedó sin cambios; se siguió la lectura aprobada de POB con atención especial al término incierto מַחֲלָפִים, preservando en español la misma prudencia léxica.
  spanish_consistency_notes:
  - Se emplea "Yahvé" por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene el estilo de lista contable con cifras para facilitar comparación con el texto hebreo y el audit trail inglés.
  - '"Palanganas" y "cuchillos" se entienden aquí como términos de inventario de templo, no como utensilios domésticos modernos.'
