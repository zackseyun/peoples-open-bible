translation:
  language: es
  text: el avestruz[a], el halcón, la gaviota y el halcón según su especie[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación de varias aves en este versículo es incierta. «Halcón» para תַּחְמָס también puede entenderse como «búho» u otra ave; «gaviota» para שָׁחַף también se ha traducido como «cuco»; y el segundo «halcón» para נֵץ también puede traducirse «falcón».
    reason: lexical_alternative
  - marker: b
    text: Hebreo, literalmente, «hija del avestruz», un nombre idiomático de especie para el avestruz.
    reason: cultural_note
lexical_decisions:
- source_word: בַּת הַיַּעֲנָה
  english_pob_choice: the ostrich
  chosen_spanish: el avestruz
  alternatives_spanish:
  - la hija del avestruz
  - el búho
  lexicon: HALOT, BDB
  rationale: El hebreo es un giro idiomático literal, pero en listas de aves impuras designa a la especie conocida como avestruz. En español, «avestruz» comunica mejor el valor zoológico sin perder fidelidad al referente.
- source_word: הַתַּחְמָס
  english_pob_choice: the hawk
  chosen_spanish: el halcón
  alternatives_spanish:
  - el búho
  - un ave marina
  lexicon: HALOT, BDB
  rationale: La identificación precisa es incierta. El inglés POB optó por un ave rapaz moderna; en español, «halcón» mantiene ese campo semántico y es natural en una lista de aves impuras, aunque no pretende fijar la identificación con certeza.
- source_word: הַשָּׁחַף
  english_pob_choice: the gull
  chosen_spanish: la gaviota
  alternatives_spanish:
  - el cuco
  - un ave marina
  lexicon: HALOT, BDB
  rationale: El término es difícil, pero la lectura léxica moderna favorece un ave marina como «gaviota». En español se conserva la misma línea interpretativa del POB inglés.
- source_word: הַנֵּץ
  english_pob_choice: the falcon
  chosen_spanish: el falcón
  alternatives_spanish:
  - el halcón
  lexicon: HALOT, BDB
  rationale: También es un ave de rapiña. Se eligió «falcón» para distinguirlo de תַּחְמָס dentro del mismo versículo, siguiendo la intención del POB inglés de diferenciar ambas aves sin borrar su parentesco semántico.
- source_word: לְמִינֵהוּ
  english_pob_choice: according to its kind
  chosen_spanish: según su especie
  alternatives_spanish:
  - según su género
  - de cada clase
  lexicon: HALOT, BDB
  rationale: La fórmula hebrea clasifica por tipo o especie. «Según su especie» es natural en español bíblico moderno y preserva el sentido taxonómico del original.
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo total y no introdujo cambios; este borrador sigue la línea léxica estable del POB inglés, manteniendo las incertidumbres botánicas/ornitológicas explícitas en nota.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o cualquier mascaramiento, porque el versículo no contiene el nombre divino.
  - Se mantuvo el valor de lista de aves impuras sin añadir explicación interpretativa ajena al texto.
  - «Falcón» se usa como opción diferenciada para נֵץ, en coherencia con la distinción del audit trail inglés entre dos rapaces cercanas semánticamente.
