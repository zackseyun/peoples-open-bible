- from: 'El rey le dijo: «¿Qué te pasa?» Ella respondió: «Sí, soy viuda[a], y mi marido ha muerto[b]».'
  to: 'El rey le dijo: «¿Qué te pasa?[a]» Ella respondió: «En verdad,[b] soy viuda, y mi esposo está muerto[c]».'
  rationale: Se reemplaza «Sí» por «En verdad» para reflejar mejor el valor aseverativo de אֲבָל. Se cambia «ha muerto» en el texto principal a «está muerto» para seguir la revisión final del inglés POB y expresar el estado resultante de manera más directa. Se reubican las notas para conservar alternativas realmente significativas del expediente auditado y mejorar la legibilidad española en un registro digno y natural.
