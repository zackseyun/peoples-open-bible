    issue: «de ello» es poco idiomático en este contexto
    rationale: Aunque gramaticalmente posible, «de ello» suena abstracto y menos natural que «de él» para retomar el maná en español bíblico legible. El proyecto pide español moderno y digno, evitando calcos innecesarios.
  revised_spanish_text: 'Y Moisés les dijo[a]: «Nadie deje nada de él hasta la mañana».'
