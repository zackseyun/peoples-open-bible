review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: traslado inicial a Anás, relación de parentesco con Caifás y referencia correcta de la cláusula relativa a Caifás. Sin embargo, «ante Anás» introduce un matiz judicial más interpretativo que el simple movimiento de πρὸς Ἅνναν, y la nota sobre «alto sacerdote» no está justificada por la evidencia ni por el uso bíblico estándar de ἀρχιερεύς.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse ligeramente para mayor fidelidad y fluidez. «A Anás» es más directo y más ajustado al griego que «ante Anás». «Porque» después de punto y coma suena un poco pesado; «pues» enlaza mejor en registro bíblico moderno. El resto del verso lee bien.
  glossary_alignment: No hay términos del glosario mayor implicados salvo nombres propios y ἀρχιερεύς. «Anás» y «Caifás» están bien. «Sumo sacerdote» es la opción española correcta y ampliamente inteligible para ἀρχιερεύς; la nota con «alto sacerdote» no debe conservarse como alternativa preferible.
  issues:
  - severity: medium
    issue: «ante Anás» para πρὸς Ἅνναν
    rationale: 'πρός con acusativo aquí indica movimiento hacia una persona: «a Anás». «Ante» no es imposible en contexto narrativo, pero añade un matiz de comparecencia judicial que no está explícito en el griego y va más allá de la evidencia fuente.'
  - severity: low
    issue: Conector «porque» tras punto y coma
    rationale: No es incorrecto, pero «pues» suena más natural y literario en español bíblico continuo para γάρ en esta posición.
  - severity: medium
    issue: Nota alternativa «alto sacerdote»
    rationale: La alternativa no mejora la fidelidad ni la claridad. Para ἀρχιερεύς, «sumo sacerdote» es la equivalencia bíblica estándar en español. Mantener la nota puede sugerir una equivalencia léxica preferible que no está respaldada por la práctica eclesial ni por la necesidad contextual.
  revised_spanish_text: Y lo llevaron primero a Anás; pues era suegro de Caifás, quien era sumo sacerdote de aquel año.
  revised_footnotes: []
  revision_rationale: Se ajusta «ante Anás» a «a Anás» para reflejar con más precisión el simple movimiento de πρός sin añadir matiz judicial. Se cambia «porque» por «pues» para una conexión más natural en español. Se elimina la nota sobre «alto sacerdote» porque «sumo sacerdote» ya expresa adecuadamente ἀρχιερεύς y la alternativa no aporta una mejora real.
