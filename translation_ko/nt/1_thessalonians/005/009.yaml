id: 1TH.5.9
reference: 1 Thessalonians 5:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι οὐκ ἔθετο ἡμᾶς ὁ θεὸς εἰς ὀργὴν ἀλλὰ εἰς περιποίησιν σωτηρίας διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/009.yaml
  text: For God did not appoint us for wrath[a], but for obtaining salvation through our Lord Jesus Messiah[b],
  footnotes:
  - marker: a
    text: Or 'for possession of salvation,' 'for acquiring salvation,' or possibly 'for preservation unto salvation'; the Greek noun περιποίησις has a broader range than the English 'obtaining.'
    reason: lexical_alternative
  - marker: b
    text: 'Traditional: ''through our Lord Jesus Christ.'' The Greek title Χριστός is rendered ''Messiah'' here to preserve its meaning.'
    reason: alternative_reading
translation:
  language: ko
  text: 하나님께서는 우리를 진노를 위하여 정하신 것이 아니라, 우리 주 예수 메시아[b]를 통하여 구원을 얻게[a] 하려고 정하셨기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「구원의 소유」, 「구원의 획득」, 가능적으로 「구원에 이르는 보존」. 헬라어 명사 περιποίησις는 영어 「obtaining」보다 폭이 넓다.
    reason: lexical_alternative
  - marker: b
    text: 전통적 옮김은 「우리 주 예수 그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔθετο ἡμᾶς ὁ θεὸς εἰς ὀργήν
  english_pob_choice: God did not appoint us for wrath
  chosen_korean: 하나님께서는 우리를 진노를 위하여 정하신 것이 아니라
  alternatives_korean:
  - 하나님께서 우리를 진노에 두신 것이 아니라
  - 우리를 진노로 향하게 하신 것이 아니라
  lexicon: BDAG
  rationale: τίθημι의 「두다·정하다」를 「정하다」로 옮겨 신적 작정 의미를 보존한다. 1:10의 「다가오는 진노」와 연속성.
- source_word: εἰς περιποίησιν σωτηρίας
  english_pob_choice: for obtaining salvation
  chosen_korean: 구원을 얻게
  alternatives_korean:
  - 구원의 획득에 이르게
  - 구원의 소유로
  lexicon: BDAG
  rationale: περιποίησις의 폭(얻음·소유·보존)을 「얻게」로 자연스럽게 담는다. 폭은 각주에 살린다.
