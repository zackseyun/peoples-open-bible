lexical_decisions:
- source_word: וַיֹּאמַר
  english_pob_choice: And he said
  chosen_spanish: Y dijo
  alternatives_spanish:
  - Entonces dijo
  - Así dijo
  lexicon: HALOT
  rationale: El wayyiqtol de אמר avanza la narración con una unión simple; en español, «Y dijo» conserva ese flujo narrativo sin añadir una relación temporal o causal más fuerte de la que da el hebreo.
- source_word: עֶבֶד
  english_pob_choice: servant
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: HALOT
  rationale: El audit trail inglés documenta la tensión lexical entre 'servant' y 'slave'. Como el hebreo עֶבֶד puede designar una condición de dependencia vinculada a propiedad o pertenencia, y la POB en inglés preserva la alternativa más fuerte, aquí se usa «esclavo» para no suavizar el término; aunque el contexto es una autoidentificación respetuosa, la forma lexical sigue siendo más marcada que «siervo».
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  lexicon: nombre propio
  rationale: Los nombres propios se conservan según la forma habitual en español, sin cambio semántico.
- source_word: אָנֹכִי
  english_pob_choice: I am
  chosen_spanish: soy
  alternatives_spanish:
  - yo soy
  - soy yo
  lexicon: HALOT
  rationale: El pronombre independiente hebreo enfatiza la autoidentificación. En español, la copula «soy» comunica naturalmente ese valor sin necesidad de repetir el pronombre, que en esta línea resultaría menos idiomático.
translation_notes:
  revision_awareness: Se corrige la validación anterior añadiendo una nota anclada al marcador [a] en el texto español, manteniendo la distinción lexical documentada entre el hebreo עֶבֶד y las opciones españolas posibles.
  spanish_consistency_notes:
  - Se mantiene la puntuación castellana con dos puntos tras el verbo de dicción y comillas angulares.
  - «Esclavo» se usa como decisión lexical marcada, mientras que la nota ofrece la alternativa más suave «sirviente» para reflejar la tensión del término hebreo sin borrarla.
  - El sujeto implícito en «dijo» es adecuado para el hebreo narrativo y no requiere pronombre explícito.
