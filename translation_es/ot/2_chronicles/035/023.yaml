translation:
  language: es
  text: 'Y los arqueros hirieron al rey Josías[a], y el rey dijo a sus siervos: «Llévenme lejos, porque estoy gravemente herido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Llévenme lejos, porque estoy severamente herido». El verbo hebreo puede abarcar la idea de estar débil, enfermo o gravemente herido; en este contexto de batalla, «herido» expresa mejor el sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּרוּ / הַיֹּרִים
  english_pob_choice: shot / the archers
  chosen_spanish: hirieron / los arqueros
  alternatives_spanish:
  - dispararon / los arqueros
  - tiraron / los arqueros
  lexicon: HALOT
  rationale: En el contexto militar, la raíz ירה se refiere a lanzar flechas; en español, «herir» comunica de forma natural el resultado inmediato del disparo sobre Josías, mientras que «los arqueros» conserva el sentido idiomático del participio como combatientes que disparan.
- source_word: לַמֶּלֶךְ יֹאשִׁיָּהוּ
  english_pob_choice: King Josiah
  chosen_spanish: al rey Josías
  alternatives_spanish:
  - al rey Josías
  - contra el rey Josías
  lexicon: HALOT
  rationale: El ל indica aquí el blanco de la acción. «Al rey Josías» conserva la relación directa del hebreo sin sobreexplicar con una preposición interpretativa como «contra».
- source_word: הַעֲבִירוּנִי
  english_pob_choice: Take me away
  chosen_spanish: Llévenme lejos
  alternatives_spanish:
  - Cárguenme y llévenme
  - Sáquenme de aquí
  lexicon: HALOT
  rationale: El causativo de עבר expresa hacer pasar o mover a alguien. «Llévenme lejos» es una equivalencia natural en español y mantiene la petición urgente de ser trasladado fuera del lugar.
- source_word: הָחֳלֵיתִי מְאֹד
  english_pob_choice: I am severely wounded
  chosen_spanish: estoy gravemente herido
  alternatives_spanish:
  - estoy severamente herido
  - estoy muy mal herido
  - estoy muy enfermo
  lexicon: HALOT
  rationale: Aunque חלה puede significar estar enfermo o débil, el contexto de batalla y la herida por flechas favorecen «herido». «Gravemente» conserva la fuerza de מְאֹד y el tono formal del registro inglés revisado.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la orden. «Porque» resulta claro y natural en el discurso directo en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo base y el archivo auditado en inglés. Se conservó la lectura contextual de la herida de Josías en batalla, reflejando la revisión inglesa de «badly wounded» a «severely wounded» sin perder el matiz amplio posible del verbo חלה. También se mantuvo el blanco de la acción con la preposición directa «al rey Josías» y la urgencia del mandato con un imperativo plural natural en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se prefirió «siervos» para עבדים en este contexto cortesano porque la escena presenta asistentes reales, no una afirmación lexical sobre δοῦλος.
  - «Herido» se eligió por el contexto narrativo de combate, aunque la nota preserva la alternativa más amplia «enfermo»/«débil» implícita en el verbo hebreo.
  - El plural de cortesía bíblica no es necesario aquí; el mandato va dirigido a varios servidores, por lo que «Llévenme» es apropiado.
