translation:
  language: es
  text: Su primer esposo[a], que la despidió, no podrá volver a tomarla para que sea su esposa, después de que ella haya sido mancillada, porque eso es una abominación delante de Yahvé; y no traerás pecado sobre la tierra que Yahvé tu Dios te da en herencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “después de que haya quedado impura” o “después de que haya sido hecha impura”. El hebreo dice “después de que ella haya sido mancillada”, sin especificar la naturaleza exacta de la impureza.
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּעְלָהּ הָרִאשׁוֹן
  english_pob_choice: her first husband
  chosen_spanish: su primer esposo
  alternatives_spanish:
  - su antiguo esposo
  - su primer marido
  lexicon: HALOT
  rationale: בעל en contexto matrimonial significa “esposo” o “marido”. “Primer esposo” reproduce de forma directa הָרִאשׁוֹן y conserva el contraste legal con una unión posterior.
- source_word: שִׁלְּחָהּ
  english_pob_choice: sent her away
  chosen_spanish: que la había enviado
  alternatives_spanish:
  - que la había despedido
  - que la había repudiado
  lexicon: HALOT
  rationale: El verbo básico es “enviar”. En este contexto jurídico alude al divorcio, pero “la había enviado” mantiene más de cerca la formulación hebrea sin forzar un término interpretativo más específico.
- source_word: לָשׁוּב לְקַחְתָּהּ
  english_pob_choice: take her again
  chosen_spanish: volver a tomarla
  alternatives_spanish:
  - tomarla de nuevo
  - volver a llevarla consigo
  lexicon: HALOT
  rationale: 'La cadena infinitiva expresa reanudación: no puede volver a tomarla. “Volver a tomarla” es natural en español y conserva la idea de un nuevo matrimonio con la misma mujer.'
- source_word: לִהְיוֹת ל֣וֹ לְאִשָּׁה
  english_pob_choice: to be his wife
  chosen_spanish: para que sea su esposa
  alternatives_spanish:
  - para serle esposa
  - para que le pertenezca como esposa
  lexicon: HALOT
  rationale: La expresión es un modismo marital. “Para que sea su esposa” mantiene claridad y fidelidad al hebreo sin cargar el texto con un giro demasiado literal.
- source_word: אַחֲרֵי אֲשֶׁר הֻטַּמָּאָה
  english_pob_choice: after she has been defiled
  chosen_spanish: después de que ella haya sido defileada
  alternatives_spanish:
  - después de que haya sido contaminada
  - después de que haya quedado impura
  lexicon: HALOT
  rationale: El pasivo de טמא expresa haber sido hecha impura/defilada, pero no especifica el mecanismo exacto. Se conserva esa amplitud para no resolver la tensión legal y moral del pasaje.
- source_word: תוֹעֵבָה
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - una cosa repugnante
  lexicon: HALOT
  rationale: “Abominación” preserva la gravedad del término de alianza y su fuerza ética tradicional.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La frase indica estar en presencia de YHWH. El nombre divino se vierte como “Yahvé” según el criterio del proyecto, manteniendo el nombre del pacto.
- source_word: וְלֹא תַחֲטִיא אֶת הָאָרֶץ
  english_pob_choice: and you shall not bring sin upon the land
  chosen_spanish: y no harás pecar a la tierra
  alternatives_spanish:
  - y no traerás pecado sobre la tierra
  - y no contaminarás la tierra con pecado
  lexicon: HALOT
  rationale: El hifil de חטא puede tener el sentido causativo de hacer incurrir en pecado o culpa. En español, “hacer pecar a la tierra” conserva la personificación del objeto y el peso moral sin añadir una interpretación más estrecha.
- source_word: נֹתֵן לְךָ נַחֲלָה
  english_pob_choice: is giving you as an inheritance
  chosen_spanish: te da en herencia
  alternatives_spanish:
  - te está dando como herencia
  - te da como heredad
  lexicon: HALOT
  rationale: נחלה es “herencia” o “heredad”. “Te da en herencia” expresa con naturalidad el don de la tierra y la idea de posesión heredada.
theological_decisions:
- issue: Sentido de “después de que ella haya sido defilada”
  english_pob_reading: Retain the broad term 'defiled' without specifying ritual impurity, sexual immorality, or mere second marriage as the sole mechanism.
  chosen_spanish_reading: Mantener el verbo amplio “haya sido defileada” sin precisar si la impureza es ritual, moral, sexual o legal.
  alternative_spanish_readings:
  - después de que haya quedado ritualmente impura
  - después de que haya sido sexualmente profanada
  - después de que haya quedado inhabilitada por el matrimonio intermedio
  rationale: El hebreo usa el pasivo de טמא, pero no define el modo exacto de la impureza. La traducción conserva esa ambigüedad para no cerrar una cuestión debatida del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo emplea el Tetragrámaton. Se mantiene “Yahvé” conforme al criterio terminológico del proyecto en español, preservando el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El testimonio inglés de POB permanece esencialmente estable en esta sección: conserva “defiled”, “abomination”, “before Yahweh” y “inheritance”, sin revisiones sustantivas en la última pasada. La redacción española sigue esa misma línea y preserva la ambigüedad deliberada del pasaje.'
  spanish_consistency_notes:
  - Se usa “Yahvé” de manera uniforme para יְהוָה.
  - Se conserva el tono jurídico y solemne sin recurrir a un castellano arcaizante.
  - “Su primer esposo” y “volver a tomarla” reflejan el vínculo matrimonial y la prohibición legal sin sobrerresolver el caso.
