translation:
  language: es
  text: No se raparán la cabeza,[a] ni dejarán crecer su cabello; deberán recortar bien el cabello de sus cabezas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mantendrán bien recortado el cabello de sus cabezas». La expresión hebrea del último miembro es compacta y puede traducirse de varias maneras muy cercanas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְגַלֵּחוּ
  english_pob_choice: shall shave
  chosen_spanish: se raparán
  alternatives_spanish:
  - se afeitarán
  - se rasurarán
  lexicon: HALOT
  rationale: En este contexto sacerdotal, el verbo expresa quitar el cabello de la cabeza. ‘Rapar(se)’ comunica mejor en español la idea de dejar la cabeza desnuda que ‘afeitar(se)’, que puede sonar más general o aplicar al rostro.
- source_word: פֶרַע
  english_pob_choice: their hair grow long
  chosen_spanish: dejarán crecer su cabello
  alternatives_spanish:
  - dejarán su cabello suelto
  - lo llevarán sin recortar
  lexicon: HALOT
  rationale: פֶרַע indica cabello suelto, desordenado o sin recortar. ‘Dejarán crecer su cabello’ transmite en español moderno la prohibición de dejarlo sin control, sin perder la referencia al cabello de la cabeza.
- source_word: יְשַׁלֵּחוּ
  english_pob_choice: let ... grow
  chosen_spanish: dejarán crecer
  alternatives_spanish:
  - dejarán suelto
  - soltarán
  lexicon: HALOT
  rationale: El verbo hebreo puede implicar ‘dejar ir/soltar’; aquí, junto con פֶרַע, describe permitir que el cabello crezca sin restricción. ‘Dejarán crecer’ conserva esa fuerza idiomática en español.
- source_word: כָּסוֹם יִכְסְמוּ
  english_pob_choice: shall surely trim
  chosen_spanish: seguramente recortarán
  alternatives_spanish:
  - ciertamente recortarán
  - deberán recortar con cuidado
  - recortarán parejamente
  lexicon: HALOT
  rationale: La forma enfática del hebreo pide una intensificación en español. ‘Seguramente recortarán’ mantiene el valor insistente y la idea de un recorte cuidadoso, sin introducir una precisión no explícita en el hebreo.
- source_word: רֹאשָׁם / רָאשֵׁיהֶם
  english_pob_choice: their heads / the hair of their heads
  chosen_spanish: la cabeza / el cabello de su cabeza
  alternatives_spanish:
  - sus cabezas / el cabello de sus cabezas
  - el cabello de la cabeza
  lexicon: HALOT
  rationale: El hebreo formula la norma en torno a la cabeza, pero el último hemistiquio apunta al cabello. En español, ‘el cabello de su cabeza’ evita la ambigüedad de ‘recortar sus cabezas’ y preserva la relación original entre cabeza y cabello.
theological_decisions:
- issue: Norma de arreglo del cabello en contexto sacerdotal
  english_pob_reading: 'The verse gives a grooming prohibition and command for priests: no shaving the head, no letting the hair grow long, and a required trimming of the hair.'
  chosen_spanish_reading: 'El versículo presenta una regulación de arreglo personal para los sacerdotes: no raparse la cabeza, no dejar crecer el cabello y sí recortarlo.'
  alternative_spanish_readings:
  - Una prohibición ceremonial sobre el peinado.
  - Una norma sobre el largo del cabello únicamente.
  rationale: No hay tensión doctrinal adicional que resolver, pero sí conviene conservar el carácter regulativo y sacerdotal del texto. La formulación española evita moralizar o generalizar más allá del contexto ritual del pasaje.
  doctrine_reference: Regulación sacerdotal en Levítico/Ezequiel; santidad ritual y orden del ministerio.
translation_notes:
  revision_awareness: Se siguió el auditorio inglés como apoyo para identificar la compactación del último miembro hebreo y la preferencia por una traducción formal pero idiomática. La revisión inglesa pasó de una expresión artificial a ‘the hair of their heads’; en español se resolvió de forma natural con ‘el cabello de su cabeza’, manteniendo la relación hebrea entre cabeza y cabello.
  spanish_consistency_notes:
  - Se mantuvo ‘cabello’ de manera consistente para el hebreo del verso, evitando alternar innecesariamente con ‘pelo’ o ‘cabello’ sin razón semántica.
  - Se usó ‘raparse’ para la prohibición de shaving por su claridad en español eclesial amplio.
  - Se conservó el adverbio intensificador ‘seguramente’ para reflejar la fuerza enfática de la forma hebrea con verbos plenos en español.
