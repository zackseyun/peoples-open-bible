translation:
  language: es
  text: Tomó la corona del rey de ellos[a] de su cabeza. Su peso era un talento de oro, y tenía una piedra preciosa, y fue puesta sobre la cabeza de David[b]. Sacó de la ciudad muchísimo botín.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la corona de Milcom» (también escrito «Malcam»), tomando מַלְכָּם como el nombre de la deidad amonita y no como «el rey de ellos».
    reason: alternative_reading
  - marker: b
    text: Un talento era una unidad de peso muy grande, a menudo estimada en unos 34 kilogramos, aunque los patrones antiguos exactos variaban.
    reason: cultural_note
lexical_decisions:
- source_word: עֲטֶרֶת
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - diadema
  - cetro
  lexicon: HALOT
  rationale: עֲטֶרֶת designa un adorno real para la cabeza; en español, «corona» es el equivalente natural y transparente en este contexto regio.
- source_word: מַלְכָּם
  english_pob_choice: their king
  chosen_spanish: su rey
  alternatives_spanish:
  - Milcom
  - Malcam
  lexicon: HALOT
  rationale: La lectura morfológica aportada entiende מַלְכָּם como «rey» con sufijo de 3.ª persona plural. En español, «su rey» mantiene esa lectura y evita introducir el nombre propio sin necesidad. Se preserva la alternativa de deidad en nota.
- source_word: מֵעַל רֹאשׁוֹ
  english_pob_choice: from his head
  chosen_spanish: de sobre su cabeza
  alternatives_spanish:
  - de su cabeza
  - de encima de su cabeza
  lexicon: HALOT
  rationale: מֵעַל expresa la idea de «de encima/de sobre». «De sobre su cabeza» conserva el matiz espacial sin volverlo oscuro o arcaico.
- source_word: וּמִשְׁקָלָהּ
  english_pob_choice: Its weight was
  chosen_spanish: Su peso era
  alternatives_spanish:
  - Y su peso era
  - Su peso fue
  lexicon: HALOT
  rationale: El hebreo introduce una cláusula descriptiva sobre el peso; «Su peso era» suena natural en español y conserva el valor descriptivo del original.
- source_word: כִּכַּר זָהָב
  english_pob_choice: a talent of gold
  chosen_spanish: un talento de oro
  alternatives_spanish:
  - un talento de oro puro
  - un talento de oro
  lexicon: HALOT
  rationale: כִּכָּר es una unidad de peso antigua que en traducción bíblica se rinde comúnmente como «talento». Mantenerlo conserva la fuerza cuantitativa del hebreo.
- source_word: וְאֶבֶן יְקָרָה
  english_pob_choice: and it had a precious stone
  chosen_spanish: y tenía una piedra preciosa
  alternatives_spanish:
  - y había una piedra preciosa
  - y llevaba una piedra preciosa
  lexicon: HALOT
  rationale: 'El hebreo es breve: «y piedra preciosa». En español, «tenía» expresa con naturalidad que la corona llevaba engastada una piedra preciosa, sin forzar el detalle técnico.'
- source_word: וַתְּהִי עַל רֹאשׁ דָּוִד
  english_pob_choice: and it was placed on David’s head
  chosen_spanish: y fue puesta sobre la cabeza de David
  alternatives_spanish:
  - y estuvo sobre la cabeza de David
  - y fue colocada sobre la cabeza de David
  lexicon: HALOT
  rationale: La construcción marca el resultado de que la corona llegó a estar sobre David; «fue puesta» expresa ese evento en español de forma clara y fiel.
- source_word: וּשְׁלַל הָעִיר
  english_pob_choice: the spoil of the city
  chosen_spanish: el botín de la ciudad
  alternatives_spanish:
  - el botín tomado de la ciudad
  - el saqueo de la ciudad
  lexicon: HALOT
  rationale: שָׁלָל se refiere al botín de guerra. «Botín» es el término español más directo y fiel; «saqueo» desplaza el foco al acto más que al resultado.
- source_word: הוֹצִיא
  english_pob_choice: He brought out
  chosen_spanish: sacó
  alternatives_spanish:
  - hizo sacar
  - trajo afuera
  lexicon: HALOT
  rationale: En contexto narrativo, el hifil de יצא se puede expresar con un verbo natural como «sacó», que comunica bien la idea de retirar o extraer el botín.
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: in very great quantity
  chosen_spanish: muy gran
  alternatives_spanish:
  - en muy gran cantidad
  - en grandísima cantidad
  lexicon: HALOT
  rationale: La duplicación intensiva del hebreo pide una expresión fuerte. «Muy gran» es breve y bíblica en tono, y al unirse con «botín» produce la idea de abundancia extrema; en lectura natural se entiende como «muy gran botín».
theological_decisions:
- issue: 'Lectura de מַלְכָּם: «su rey» frente al nombre del dios amonita Milcom/Malcam'
  english_pob_reading: their king
  chosen_spanish_reading: su rey
  alternative_spanish_readings:
  - Milcom
  - Malcam
  rationale: La POB inglesa sigue la lectura morfológica «their king» en el texto principal y reserva la lectura del nombre de la deidad en nota. En español se conserva esa misma decisión para no ocultar la ambigüedad textual, pero sin adoptar como texto principal la opción menos respaldada por la morfología dada.
  doctrine_reference: Translation philosophy §3 (preserve genuine lexical/theological ambiguity)
- issue: Interpretación de la relación de la piedra preciosa con la corona
  english_pob_reading: and it had a precious stone
  chosen_spanish_reading: y tenía una piedra preciosa
  alternative_spanish_readings:
  - y había una piedra preciosa
  - y con una piedra preciosa
  rationale: No se afirma el modo técnico de engaste; la traducción mantiene la relación general del hebreo sin añadir precisión no documentada. Esto evita sobreinterpretar el objeto.
  doctrine_reference: Translation philosophy §2 (do not paraphrase beyond source evidence)
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés en cuanto a la fluidez de la cláusula del peso y la relación de la piedra preciosa con la corona. Se evitó una traducción demasiado literal de 'from off his head' porque el hebreo solo exige la idea espacial 'de sobre', y se mantuvo la ambigüedad de מַלְכָּם con nota, como en el expediente inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo lo requiera explícitamente; aquí no aparece.
  - Se mantuvo «corona» para עֲטֶרֶת por ser el equivalente más claro y digno en español.
  - «Talento» se conserva como unidad bíblica tradicional sin sustituirla por una paráfrasis moderna en el texto principal.
  - «Botín» traduce שָׁלָל con fuerza militar adecuada al contexto narrativo.
