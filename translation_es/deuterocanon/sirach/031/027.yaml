translation:
  language: es
  text: '[Y si te apremian a comer[a],] sal del banquete, y hallarás descanso.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado dice: «Y si te apremian a comer, sal del banquete, y hallarás descanso». El paralelo griego aquí suministrado, en cambio, dice: «y el que priva de salario al jornalero derrama sangre», lo que indica una discrepancia textual o una alineación distinta del versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: ואם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: La conjunción condicional con waw se expresa con naturalidad en español como 'Y si' al inicio de la cláusula, manteniendo la continuidad del consejo sin forzar el orden hebreo.
- source_word: יפצירו
  english_pob_choice: they press
  chosen_spanish: te apremian
  alternatives_spanish:
  - te insisten
  - te urgen
  lexicon: HALOT
  rationale: El verbo comunica una insistencia social fuerte; 'apremian' conserva la presión implícita mejor que un simple 'insisten' y suena natural en español actual.
- source_word: בך
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: HALOT
  rationale: 'El sufijo pronominal se integra idiomáticamente como objeto directo indirecto en español: ''te apremian''.'
- source_word: לאכול
  english_pob_choice: to eat
  chosen_spanish: a comer
  alternatives_spanish:
  - para comer
  - a la comida
  lexicon: HALOT
  rationale: El infinitivo de אכל se vierte de forma directa. 'A comer' encaja de manera natural tras 'apremian'.
- source_word: סור
  english_pob_choice: leave
  chosen_spanish: sal
  alternatives_spanish:
  - aléjate
  - retírate
  - apártate
  lexicon: HALOT
  rationale: El imperativo de סור indica apartarse o retirarse; 'sal' es la opción más breve y clara en contexto de comida compartida, y preserva la idea de abandonar el lugar.
- source_word: מן
  english_pob_choice: from
  chosen_spanish: del
  alternatives_spanish:
  - de la
  lexicon: HALOT
  rationale: 'La preposición se fusiona naturalmente con el sustantivo en español: ''del banquete''.'
- source_word: הסבה
  english_pob_choice: the banquet
  chosen_spanish: banquete
  alternatives_spanish:
  - mesa
  - convivio
  - comida reclinada
  lexicon: HALOT
  rationale: En el contexto de Ben Sira, הסבה alude al entorno de la comida compartida/reclinada. 'Banquete' comunica de forma clara y digna la escena social sin introducir una glosa excesiva.
- source_word: ותמצא
  english_pob_choice: and you will find
  chosen_spanish: y hallarás
  alternatives_spanish:
  - y encontrarás
  - y vas a encontrar
  lexicon: HALOT
  rationale: El verbo expresa una consecuencia futura. 'Hallarás' mantiene el tono sobrio y literario del sapiencial, a la vez que suena natural en español.
- source_word: נחת
  english_pob_choice: rest
  chosen_spanish: descanso
  alternatives_spanish:
  - reposo
  - alivio
  - tranquilidad
  lexicon: HALOT
  rationale: נחת puede abarcar descanso, alivio o calma. 'Descanso' conserva la idea de alivio resultante de retirarse de la presión social y es idiomático en español.
theological_decisions:
- issue: Gran desajuste textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the extant Hebrew clause as the main text, while preserving the Greek mismatch in a footnote as a textual variant.
  chosen_spanish_reading: Traducir como texto principal la cláusula hebrea conservada, y anotar en una nota la lectura griega divergente como variante textual importante.
  alternative_spanish_readings:
  - 'Seguir la lectura griega: ''y el que priva de su salario al jornalero derrama sangre'''
  - Combinar ambas lecturas en una paráfrasis armonizada
  rationale: En Sirácides, el hebreo conservado debe funcionar como texto base cuando está disponible; sin embargo, el griego ofrecido es materialmente distinto y no puede ocultarse. La nota conserva honestamente la tensión textual para el lector español.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirácides se conserva; exponer con honestidad la incertidumbre textual.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente sin cambios sustantivos; se mantiene la prioridad del hebreo conservado y se documenta la discrepancia con el griego paralelo.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usó 'banquete' por ser la forma española más clara para el contexto de comida compartida/reclinada de Ben Sira.
  - Se prefirió 'descanso' a 'alivio' o 'reposo' por su mayor naturalidad y estabilidad semántica en español.
