review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del hebreo: nombrar el lugar, el topónimo בֹּכִים, y el sacrificio allí a Yahvé. También preserva bien el demostrativo en «aquel lugar» y el nombre divino «Yahvé». Sin embargo, «llamaron al nombre de aquel lugar» no es español natural ni fielmente idiomático; en español debe decirse «llamaron a aquel lugar...» o «le pusieron por nombre...».'
  spanish_quality_summary: La redacción es mayormente clara, pero la frase «llamaron al nombre de» suena forzada y poco idiomática. El resto es legible y digno. «Boquim» es defendible como adaptación ortográfica, aunque conviene mantener consistencia con la nota explicativa y el carácter de topónimo transliterado.
  glossary_alignment: Se alinea bien con la terminología del proyecto en «Yahvé». No hay conflicto mesiánico ni otros términos doctrinales clave. La transliteración del topónimo puede mantenerse como «Boquim» si esa es la política ortográfica española adoptada; el problema principal no es terminológico sino sintáctico.
  issues:
  - severity: medium
    issue: 'Construcción no idiomática: «llamaron al nombre de aquel lugar»'
    rationale: Aunque intenta conservar la textura de קרא + שֵׁם, en español esa construcción resulta antinatural. El sentido hebreo se expresa mejor como «llamaron a aquel lugar...» o «le pusieron por nombre...».
  - severity: low
    issue: Leve tensión entre literalidad y fluidez en la reproducción de שֵׁם
    rationale: El hebreo incluye explícitamente «nombre», pero el español no necesita conservarlo de forma tan literal en esta construcción. Omitirlo en la traducción principal mejora la fidelidad idiomática sin pérdida semántica.
  revised_spanish_text: Así que llamaron a aquel lugar Boquim[a], y allí sacrificaron a Yahvé.
  revised_footnotes:
  - marker: a
    text: Boquim suena al hebreo para «los que lloran» o «lloradores».
    reason: lexical_alternative
  revision_rationale: Se corrige una construcción española no idiomática para expresar con naturalidad el sentido de קרא שֵׁם, manteniendo el topónimo transliterado, el demostrativo, la ubicación «allí» y el nombre divino «Yahvé». No se requieren cambios doctrinales ni de fondo.
