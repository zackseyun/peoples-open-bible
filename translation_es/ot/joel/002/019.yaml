revisions:
- from: 'Entonces Yahvé respondió y dijo a su pueblo[a]: «Mira, estoy enviándoles el grano, el vino nuevo y el aceite; y se saciarán de ello[b], y ya no haré de ustedes un oprobio entre las naciones».'
  to: 'Entonces Yahvé respondió y dijo a su pueblo: «He aquí, les envío el grano, el vino nuevo y el aceite[a]; se saciarán de ello[b], y ya no los haré un oprobio entre las naciones».'
  rationale: Se reubicó la nota lexical al término correcto («aceite»), se elevó el registro de «Mira» a «He aquí» para ajustarlo al tono del proyecto y se simplificó «estoy enviándoles» a «les envío», manteniendo la inmediatez del hebreo en un español más natural y digno. También se quitó la conjunción innecesaria antes de «se saciarán» para mejorar la fluidez.
