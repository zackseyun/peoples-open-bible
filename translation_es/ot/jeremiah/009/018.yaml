source:
  edition: WLC
  text: כִּ֣י ק֥וֹל נְהִ֛י נִשְׁמַ֥ע מִ/צִּיּ֖וֹן אֵ֣יךְ שֻׁדָּ֑דְנוּ בֹּ֤שְׁנֽוּ מְאֹד֙ כִּֽי עָזַ֣בְנוּ אָ֔רֶץ כִּ֥י הִשְׁלִ֖יכוּ מִשְׁכְּנוֹתֵֽי/נוּ־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/009/018.yaml
  text: 'For the sound of wailing is heard from Zion: “How we are devastated! We are utterly ashamed[a], because we have left the land[c][b], because they have cast down our dwellings.”'
  footnotes:
  - marker: a
    text: Or “we have been plundered” for “we have been devastated.” The Hebrew verb can emphasize either ruin in general or despoiling by an enemy.
    reason: lexical_alternative
  - marker: b
    text: Or “because we have abandoned the land.” The Hebrew may describe either forced departure or forsaking the land; the context of lament favors departure under judgment.
    reason: lexical_alternative
  - marker: c
    text: Or “our homes” or “our habitations” for “our dwellings.”
    reason: lexical_alternative
