    reason: lexical_alternative
  - marker: b
    text: O «en la montaña».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «sus hermanos»; aquí probablemente significa sus parientes o miembros de su clan.
    reason: lexical_alternative
  - marker: d
    text: O «en el monte de Galaad» o «en las montañas de Galaad».
    reason: lexical_alternative
  revision_rationale: Se reemplazó «plantó su tienda» por «levantó su tienda» y «había plantado la suya» por «levantó campamento» para expresar de forma natural en español el modismo hebreo de acampar. Se corrigió la distribución de notas para que las alternativas topográficas de Galaad queden ancladas en la segunda ubicación, y se añadió una nota para preservar el literal «sus hermanos» detrás de «sus parientes». También se ajustó «Laban» a «Labán» por ortografía española usual.
