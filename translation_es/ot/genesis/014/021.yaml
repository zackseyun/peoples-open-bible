translation:
  language: es
  text: 'Entonces el rey de Sodoma dijo a Abram: «Dame las personas[a], y toma los bienes[b] para ti mismo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el alma» en singular, usado aquí de manera colectiva para las personas o cautivos recuperados.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las posesiones», «los bienes» o «la propiedad» para traducir הָרְכֻשׁ.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva bien la secuencia en español y suena natural en estilo bíblico moderno.
- source_word: מֶלֶךְ סְדֹם
  english_pob_choice: the king of Sodom
  chosen_spanish: el rey de Sodoma
  alternatives_spanish:
  - el monarca de Sodoma
  lexicon: HALOT
  rationale: Se mantiene la construcción simple y directa del hebreo; «Sodoma» se conserva como nombre propio en forma habitual en español.
- source_word: אֶל אַבְרָם
  english_pob_choice: to Abram
  chosen_spanish: a Abram
  alternatives_spanish:
  - para Abram
  lexicon: HALOT
  rationale: La preposición אֶל se expresa naturalmente con «a» ante persona destinataria.
- source_word: תֶּן לִי
  english_pob_choice: Give me
  chosen_spanish: Dame
  alternatives_spanish:
  - Dame a mí
  lexicon: HALOT
  rationale: El imperativo con sufijo pronominal se vierte de forma idiomática como una sola forma verbal en español.
- source_word: הַנֶּפֶשׁ
  english_pob_choice: the people
  chosen_spanish: las personas
  alternatives_spanish:
  - la gente
  - las almas
  lexicon: HALOT
  rationale: Se conserva la nota semántica de נֶפֶשׁ como referencia colectiva a seres humanos recuperados, evitando «almas» por sonar menos natural y más interpretativo en este contexto.
- source_word: וְהָרְכֻשׁ
  english_pob_choice: the possessions
  chosen_spanish: los bienes
  alternatives_spanish:
  - las posesiones
  - la propiedad
  lexicon: HALOT
  rationale: רְכוּשׁ denota propiedad móvil o bienes; «bienes» es claro, natural y suficientemente amplio en español.
- source_word: קַח לָךְ
  english_pob_choice: take ... for yourself
  chosen_spanish: toma para ti mismo
  alternatives_spanish:
  - toma para ti
  - llévate para ti
  lexicon: HALOT
  rationale: La combinación del imperativo con לָךְ expresa beneficio personal; «para ti mismo» lo hace explícito sin añadir contenido ajeno al hebreo.
translation_notes:
  revision_awareness: Coincide con el texto hebreo masorético y con el audit trail inglés; no se registran revisiones aplicadas en el expediente consultado.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo de dos mandatos: primero las personas, luego los bienes.'
  - Se evita «almas» en el cuerpo principal para mantener claridad moderna, dejando la tensión léxica en nota.
  - «Para ti mismo» refleja el valor dativo de לָךְ sin sobretraducir.
