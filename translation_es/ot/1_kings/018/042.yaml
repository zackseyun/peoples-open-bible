base_translation:
  language: en
  yaml_path: translation/ot/1_kings/018/042.yaml
  text: So Ahab went up to eat and to drink[a], but Elijah went up to the top of Carmel[c][b], and he bent down to the ground and put his face between his knees.
  footnotes:
  - marker: a
    text: Or 'and Elijah'; the Hebrew conjunction is simply 'and,' though the contrast with Ahab's action may be brought out in English as 'but.'
    reason: lexical_alternative
  - marker: b
    text: Or 'to the summit of Carmel' or 'to the top of Mount Carmel.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew describes Elijah's physical posture; the wider context suggests prayer, but the verse itself does not state it explicitly.
    reason: cultural_note
