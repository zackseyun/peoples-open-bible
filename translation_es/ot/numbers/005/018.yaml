    text: O 'dejará suelto el cabello de la mujer'. El giro hebreo dice literalmente 'soltar/desatar la cabeza de la mujer' y probablemente alude a desatarle el cabello como parte del rito.
    reason: lexical_alternative
  - marker: b
    text: O 'las aguas amargas que traen la maldición'. El participio hebreo puede entenderse como aguas que producen o acarrean una maldición.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la traducción para reflejar mejor la sintaxis y la terminología cultual de la fuente: ''pondrá a la mujer'' simplifica el acto ritual de הֶעֱמִיד; ''ofrenda de grano'' recupera la especificidad de מִנְחָה; y ''mientras'' sustituye al adversativo ''pero'' para expresar correctamente la cláusula circunstancial. Se mantiene ''descubrirá la cabeza de la mujer'' en el texto principal por cercanía léxica al hebreo, con nota que preserva la alternativa relacionada con el cabello.'
