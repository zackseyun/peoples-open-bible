  from: but to the rest in parables
  to: but for the rest it is in parables
  rationale: The current rendering is a very literal translation of an elliptical Greek phrase (`τοῖς δὲ λοιποῖς ἐν παραβολαῖς`). While this mirrors the source structure, it creates an abrupt and grammatically incomplete clause in English. Supplying the implied verb ('it is') makes the sentence flow more naturally for the English reader without altering the core meaning, as seen in translations like the NASB.
