source:
  edition: WLC
  text: כַּ/אֲשֶׁ֨ר שָׁמְמ֤וּ עָלֶ֨י/ךָ֙ רַבִּ֔ים כֵּן מִשְׁחַ֥ת מֵ/אִ֖ישׁ מַרְאֵ֑/הוּ וְ/תֹאֲר֖/וֹ מִ/בְּנֵ֥י אָדָֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/052/014.yaml
  text: Just as many were appalled at you—so marred was his appearance[a], beyond that of a man[c][b], and his form beyond the sons of mankind—
  footnotes:
  - marker: a
    text: 'Hebrew shifts from ''you'' to ''his'' within the verse: ''many were appalled at you ... his appearance ... his form.'''
    reason: alternative_reading
  - marker: b
    text: Or 'marred' for 'disfigured.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'beyond the sons of man,' an idiom for human beings.
    reason: lexical_alternative
