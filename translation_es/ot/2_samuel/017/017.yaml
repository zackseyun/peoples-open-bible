translation:
  language: es
  text: Jonatán y Ahimaaz estaban en En-rógel[a], y una sirvienta[b] iba y les avisaba; y ellos iban y avisaban al rey David, porque no podían ser vistos al entrar en la ciudad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaban de pie»; el participio hebreo dice literalmente «de pie/puestos», pero en contexto indica que estaban apostados allí.
    reason: lexical_alternative
  - marker: b
    text: O «criada». El hebreo שִׁפְחָה designa específicamente a una servidora mujer.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹמְדִים
  english_pob_choice: standing
  chosen_spanish: estaban
  alternatives_spanish:
  - estaban de pie
  - permanecían
  - se hallaban
  lexicon: HALOT
  rationale: El participio puede describir estar puestos o estacionados en un lugar; en español, «estaban en» comunica con naturalidad la ubicación continua sin forzar una imagen corporal demasiado literal.
- source_word: בְּעֵין רֹגֵל
  english_pob_choice: at En-rogel
  chosen_spanish: en En-rogel
  alternatives_spanish:
  - junto a En-rogel
  - en la fuente de En-rogel
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se conserva la transliteración y la preposición locativa simple «en» por claridad y naturalidad.
- source_word: הַשִּׁפְחָה
  english_pob_choice: a female servant
  chosen_spanish: una sierva
  alternatives_spanish:
  - una criada
  - una sirvienta
  - una esclava
  lexicon: HALOT
  rationale: שִׁפְחָה designa una mujer en condición de servicio. «Sierva» mantiene esa fuerza sin introducir un matiz demasiado moderno o doméstico como «criada».
- source_word: וְהָלְכָה
  english_pob_choice: would go
  chosen_spanish: iba
  alternatives_spanish:
  - iría
  - fue
  - andaba
  lexicon: HALOT
  rationale: En esta secuencia narrativa habitual/procedimental, «iba» expresa bien la acción repetida o característica sin sonar artificial en español.
- source_word: וְהִגִּידָה לָהֶם
  english_pob_choice: tell them
  chosen_spanish: les avisaba
  alternatives_spanish:
  - les decía
  - les informaba
  - les notificaba
  lexicon: HALOT
  rationale: נגד en hifil aquí es «decir, comunicar, informar». «Avisar» funciona bien en el flujo de mensajería clandestina y conserva el sentido de notificar.
- source_word: וְהֵם יֵלְכוּ וְהִגִּידוּ
  english_pob_choice: they would go and tell
  chosen_spanish: ellos iban y avisaban
  alternatives_spanish:
  - ellos iban y lo comunicaban
  - ellos iban y decían
  - ellos irían y avisarían
  lexicon: HALOT
  rationale: La cadena verbal mantiene el procedimiento narrativo. «Iban y avisaban» conserva la iteración/función habitual mejor que un pretérito simple.
- source_word: לַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: al rey David
  alternatives_spanish:
  - al rey, David
  - al rey David
  lexicon: HALOT
  rationale: En español, «el rey David» es claro y natural; la combinación título-nombre se mantiene sin necesidad de coma.
- source_word: לֹא יוּכְלוּ
  english_pob_choice: could not
  chosen_spanish: no podían
  alternatives_spanish:
  - no pudieron
  - no serían capaces
  - no podían hacerlo
  lexicon: HALOT
  rationale: El valor de incapacidad/posibilidad se expresa mejor con «no podían» en este contexto explicativo.
- source_word: לְהֵרָאוֹת
  english_pob_choice: be seen
  chosen_spanish: ser vistos
  alternatives_spanish:
  - verse
  - aparecer
  - mostrarse
  lexicon: HALOT
  rationale: 'El nifal de ראה aquí es pasivo: el problema era quedar expuestos. «Ser vistos» reproduce esa pasividad con claridad.'
- source_word: לָבוֹא הָעִירָה
  english_pob_choice: entering the city
  chosen_spanish: al entrar en la ciudad
  alternatives_spanish:
  - al ir a la ciudad
  - al entrar a la ciudad
  - para entrar en la ciudad
  lexicon: HALOT
  rationale: La forma direccional apunta a movimiento hacia la ciudad. «Al entrar en la ciudad» es idiomático y mantiene la relación con el infinitivo.
translation_notes:
  revision_awareness: La base inglesa revisó una redacción anterior de «were staying» a «were standing» para reflejar con mayor cercanía el participio hebreo עֹמְדִים; la versión española preserva esa cercanía semántica mediante «estaban en» y la nota alternativa «estaban de pie», evitando una paráfrasis que borre la idea de estar apostados en el lugar.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» no aplicable aquí, ya que no aparece el Tetragrámaton.
  - «Señor» no corresponde en este versículo; el término es «rey David».
  - Se eligió «sierva» para שִׁפְחָה por coherencia con el valor lexical de servicio femenino y para evitar suavizarlo indebidamente.
