translation:
  language: es
  text: Y también había un hombre que profetizaba en nombre de Yahvé, Urías[a] hijo de Semaías, de Quiriat-jearim; y profetizó contra[b] esta ciudad y contra esta tierra, conforme a todas las palabras de Jeremías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Uría»; algunas versiones españolas escriben el nombre como «Urija».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «acerca de esta ciudad y de esta tierra». El hebreo puede introducir el tema de la profecía de manera más general, aunque aquí el contexto favorece el sentido de juicio: «contra».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And there was also
  chosen_spanish: Y también había
  alternatives_spanish:
  - Y además había
  - También había
  lexicon: HALOT
  rationale: La combinación de la conjunción y la partícula aditiva se expresa de forma natural con «y también», manteniendo el valor de suma respecto del caso anterior.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - una persona
  lexicon: HALOT
  rationale: El sustantivo refiere simplemente a un individuo masculino; «un hombre» es claro, idiomático y fiel al sentido básico.
- source_word: הָיָה מִתְנַבֵּא
  english_pob_choice: there was ... prophesying
  chosen_spanish: había ... profetizaba
  alternatives_spanish:
  - estaba profetizando
  - andaba profetizando
  lexicon: HALOT
  rationale: El hebreo presenta una situación descriptiva continua; en español, «había un hombre que profetizaba» comunica esa idea sin forzar una construcción literal poco natural.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en nombre de Yahvé
  alternatives_spanish:
  - en el nombre de Yahvé
  - por el nombre de Yahvé
  lexicon: HALOT
  rationale: 'Se conserva el modismo de autoridad profética con la forma editorial requerida para el Nombre divino: «Yahvé».'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms'
  rationale: La norma del proyecto para יהוה es «Yahvé», no un reemplazo por «SEÑOR». Se mantiene el nombre pactal explícito del texto fuente.
- source_word: אֽוּרִיָּהוּ
  english_pob_choice: Uriah
  chosen_spanish: Urías
  alternatives_spanish:
  - Urija
  - Uria
  lexicon: HALOT
  rationale: Se usa la forma española tradicional y reconocible del nombre propio, sin alterar la identidad del personaje.
- source_word: בֶּן שְׁמַעְיָהוּ
  english_pob_choice: son of Shemaiah
  chosen_spanish: hijo de Semaías
  alternatives_spanish:
  - el hijo de Semaías
  lexicon: HALOT
  rationale: La relación genealógica se expresa de manera directa y natural en español.
- source_word: מִקִּרְיַת הַיְּעָרִים
  english_pob_choice: from Kiriath-jearim
  chosen_spanish: de Quiriat-jearim
  alternatives_spanish:
  - de Quiriat Jearim
  lexicon: HALOT
  rationale: Se translitera el topónimo, conservando su forma bíblica reconocible en español y evitando traducirlo como nombre común.
- source_word: וַיִּנָּבֵא
  english_pob_choice: and he prophesied
  chosen_spanish: y profetizó
  alternatives_spanish:
  - y volvió a profetizar
  - y habló como profeta
  lexicon: HALOT
  rationale: Se mantiene la repetición verbal con el mismo lexema «profetizar», preservando la cohesión con el participio anterior.
- source_word: עַל הָעִיר הַזֹּאת
  english_pob_choice: against this city
  chosen_spanish: contra esta ciudad
  alternatives_spanish:
  - acerca de esta ciudad
  - sobre esta ciudad
  lexicon: HALOT
  rationale: En este contexto profético-jurídico, עַל tiene fuerza adversativa; «contra» refleja mejor el sentido de oráculo de juicio.
- source_word: וְעַל הָאָרֶץ הַזֹּאת
  english_pob_choice: and against this land
  chosen_spanish: y contra esta tierra
  alternatives_spanish:
  - y acerca de esta tierra
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «contra esta ciudad». «Tierra» traduce el territorio en cuestión con mayor precisión que «mundo» o «país».
- source_word: כְּכֹל דִּבְרֵי יִרְמְיָהוּ
  english_pob_choice: according to all the words of Jeremiah
  chosen_spanish: conforme a todas las palabras de Jeremías
  alternatives_spanish:
  - según todas las palabras de Jeremías
  - de acuerdo con todas las palabras de Jeremías
  lexicon: HALOT
  rationale: כְּכֹל expresa conformidad o correspondencia; «conforme a» conserva bien esa relación sin perder fluidez en español.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. Según la norma editorial del proyecto, se preserva como «Yahvé» para evitar el ocultamiento del Nombre pactal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de עַל en la profecía
  english_pob_reading: against this city and against this land
  chosen_spanish_reading: contra esta ciudad y contra esta tierra
  alternative_spanish_readings:
  - acerca de esta ciudad y acerca de esta tierra
  rationale: El contexto inmediato es el de profecía de juicio, en paralelo con Jeremías; por eso el valor adversativo de עַל queda mejor expresado con «contra», sin negar la posibilidad semántica más general de «acerca de».
  doctrine_reference: Contexto literario de Jeremías 26 y uso profético de עַל
translation_notes:
  revision_awareness: El registro inglés auditado mantiene su lectura de alta concordancia y no muestra revisiones aplicadas; la versión española sigue esa línea estable, preservando el valor aditivo inicial, el nombre divino como Yahvé, la referencia geográfica transliterada y la fuerza adversativa de עַל en contexto profético.
  spanish_consistency_notes:
  - Se evita «SEÑOR» para יהוה y se usa «Yahvé» conforme a la terminología del proyecto.
  - Se conserva la repetición léxica de «profetizar» para reflejar la continuidad verbal del hebreo.
  - 'Los topónimos propios se transliteran de manera consistente: «Quiriat-jearim».'
  - «Tierra» se usa en sentido territorial, no cosmológico.
  - La puntuación con punto y coma respeta la estructura acumulativa del hebreo sin fragmentar indebidamente la cláusula.
