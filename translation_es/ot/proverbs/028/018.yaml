    rationale: Si el texto principal usa una forma más sobria como 'de inmediato', la nota puede seguir preservando el literal 'en uno' y las alternativas 'en un solo momento' o 'de repente' sin tensión innecesaria.
  revised_spanish_text: El que anda en integridad será librado[a], pero el torcido en sus caminos caerá de inmediato[b].
