    issue: '''novillo'' no preserva de forma transparente בֶּן בָּקָר'
    rationale: El hebreo distingue פַּר y luego añade בֶּן בָּקָר; la auditoría inglesa lo refleja con 'bull from the herd'. En español, 'novillo' no expresa claramente esa segunda especificación y además puede sugerir juventud de forma más estrecha de lo requerido.
  - severity: low
