review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: transición exhortativa («Ahora»), búsqueda/selección de un oficial competente, y su colocación en autoridad sobre Egipto. Sin embargo, hay dos ajustes importantes para alinearse mejor con la evidencia fuente y con el rastro de auditoría inglés: (1) la nota al pie está anclada en «hombre», pero la alternativa léxica en realidad corresponde al verbo יֵרֶא («ver/buscar/escoger»), no a אִישׁ; (2) «póngalo sobre la tierra de Egipto» suena demasiado literal y menos idiomático para una designación oficial; «nómbrelo» o «desígnelo» expresa mejor el sentido administrativo documentado para וִישִׁיתֵהוּ.'
  spanish_quality_summary: El texto es generalmente claro y de registro bíblico moderno. «Ahora» y «Faraón» funcionan bien. «Inteligente y sabio» es aceptable, aunque «discerniente» o «prudente» se acercan más al matiz de נָבוֹן; no obstante, no es un error grave. El problema principal de calidad es la colocación de la nota y la leve torpeza de «póngalo sobre la tierra de Egipto», que en español eclesial general suena menos natural que una formulación de nombramiento y autoridad.
  glossary_alignment: No hay conflicto con la terminología de proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión «Faraón» es correcta. «Hombre» preserva bien el masculino singular de אִישׁ. La mejora propuesta mantiene fidelidad léxica y mayor naturalidad administrativa.
  issues:
  - severity: high
    issue: La nota al pie está anclada en el término equivocado.
    rationale: La nota explica alternativas del verbo hebreo יֵרֶא («ver/buscar/escoger»), pero el marcador [a] aparece en «hombre». Esto desinforma al lector sobre qué elemento textual tiene la variante.
  - severity: medium
    issue: «Y póngalo sobre la tierra de Egipto» es demasiado literal y poco natural en contexto administrativo.
    rationale: Aunque שׂים literalmente puede ser «poner», el rastro léxico inglés justificó «appoint him». En español, «nómbrelo sobre toda la tierra de Egipto» o «desígnelo sobre la tierra de Egipto» comunica mejor la acción de investidura oficial.
  - severity: low
    issue: La nota al pie actual menciona «un hombre discerniente y sabio», pero eso no corresponde a la alternativa preservada en el inglés.
    rationale: La nota inglesa conserva una alternativa del verbo («see/select»), no del adjetivo ni del sustantivo. La nota española debe reflejar esa misma decisión léxica documentada.
  revised_spanish_text: Ahora, que Faraón busque[a] un hombre inteligente y sabio, y lo nombre sobre la tierra de Egipto.
  revised_footnotes:
  - marker: a
    text: 'O: «que Faraón vea» o «que Faraón escoja»; el verbo hebreo puede llevar el sentido de ver, hallar o seleccionar según el contexto.'
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al verbo correspondiente para reflejar correctamente la alternativa léxica documentada para יֵרֶא. También se cambia «póngalo» por «lo nombre» para expresar con español más natural el sentido administrativo de designar a alguien para autoridad, manteniendo «sobre la tierra de Egipto» como reflejo fiel de la construcción hebrea. No se requiere adjudicación adicional.
