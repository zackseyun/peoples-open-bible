  spanish_consistency_notes:
  - Se usa «Moab» de forma uniforme como nombre propio.
  - Se conserva el paralelismo de dos cláusulas de juicio y una serie de imperativos enfáticos.
  - Las notas al pie reflejan alternativas reales del hebreo y del registro profético, sin introducir glosas interpretativas ajenas al texto.
