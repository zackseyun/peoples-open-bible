revisions:
- from: Y darás a los sacerdotes levitas que son de la descendencia de Zadoc[a], los que se acercan a mí para ministrarme —declara el Señor Yahvé—, un toro[b] de entre el ganado, para ofrenda por el pecado.
  to: Y darás a los sacerdotes levitas que son de la descendencia de Sadoc[a], los que se acercan a mí para ministrarme —declara el Señor Yahvé—, un toro[b] del ganado, para ofrenda por el pecado.
  rationale: Se corrige «Zadoc» a «Sadoc» por fidelidad al uso español bíblico y por consistencia interna. También se suaviza «de entre el ganado» a «del ganado» para mayor naturalidad, y se ajusta la nota b para alinearla mejor con la decisión auditada de usar una equivalencia idiomática en el texto principal, conservando la literalidad hebrea solo en la explicación.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:21:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: mandato injuntivo («Y darás»), identificación de los sacerdotes levíticos descendientes de Sadoc, acercamiento cultual para servicio, fórmula profética y entrega de un bovino para sacrificio por el pecado. Sin embargo, hay dos desajustes importantes con la evidencia y con la pauta del proyecto: el nombre propio debe ir como «Sadoc» en español, no «Zadoc», y la nota sobre «toro, hijo del ganado» ya no corresponde al texto principal auditado, que adoptó la forma idiomática equivalente.'
  spanish_quality_summary: La redacción es generalmente clara y digna. «Se acercan a mí para ministrarme» es comprensible, aunque «ministrar ante mí» no es necesario aquí; «ministrarme» puede mantenerse. «Un toro de entre el ganado» suena algo más pesado de lo necesario; «un toro del ganado» o «un toro de la vacada» sería más llano, pero la formulación actual sigue siendo aceptable. El problema principal de calidad es la inconsistencia onomástica «Zadoc» frente a la forma española asentada «Sadoc».
  glossary_alignment: 'Alinea bien con varias pautas del proyecto: «Yahvé» preserva el Tetragrámaton; «ofrenda por el pecado» representa adecuadamente חַטָּאת; «sacerdotes levitas» es aceptable para הַכֹּהֲנִים הַלְוִיִּם. No obstante, la forma del nombre צָדוֹק debería normalizarse como «Sadoc» en español bíblico. Además, la nota b conserva una literalidad («un toro, un hijo del ganado») que el expediente inglés ya decidió no mantener en el texto principal.'
  issues:
  - severity: high
    issue: El nombre propio aparece como «Zadoc» en vez de «Sadoc».
    rationale: En español bíblico y eclesial la forma normal es «Sadoc». La propia decisión léxica habla de «forma española usual», pero el texto y las notas usan «Zadoc», creando inconsistencia y menor naturalidad.
  - severity: medium
    issue: La nota b ya no sigue el estado auditado del POB inglés.
    rationale: La revisión inglesa sustituyó la literalidad «a bull, a son of the herd» por «a bull from the herd». Mantener como nota principal la glosa de la literalidad hebrea no es incorrecto en sí, pero desalineada del rastro de auditoría actual. Conviene ajustar la nota para presentar las alternativas idiomáticas, con la literalidad solo como explicación secundaria si se conserva.
  - severity: low
    issue: «de entre el ganado» es algo más pesado que otras opciones naturales.
    rationale: Es fiel, pero «del ganado» suena más fluido en español general sin pérdida de sentido. Es una mejora estilística menor, no un error de fidelidad.
  revised_spanish_text: Y darás a los sacerdotes levitas que son de la descendencia de Sadoc[a], los que se acercan a mí para ministrarme —declara el Señor Yahvé—, un toro[b] del ganado, para ofrenda por el pecado.
  revised_footnotes:
  - marker: a
    text: O, más idiomáticamente, «descendientes de Sadoc». El hebreo dice literalmente «de la descendencia de Sadoc».
    reason: lexical_alternative
  - marker: b
    text: O «un novillo» o «un toro del hato». El hebreo usa una expresión que literalmente dice «un toro, hijo del ganado».
    reason: lexical_alternative
  revision_rationale: Se corrige «Zadoc» a «Sadoc» por fidelidad al uso español bíblico y por consistencia interna. También se suaviza «de entre el ganado» a «del ganado» para mayor naturalidad, y se ajusta la nota b para alinearla mejor con la decisión auditada de usar una equivalencia idiomática en el texto principal, conservando la literalidad hebrea solo en la explicación.
