lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: LSJ
  rationale: Introduce la base de la petición en español con una causal natural y digna, equivalente al valor explicativo/causal de ὅτι en este contexto.
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un dios
  lexicon: LSJ
  rationale: El contexto monoteísta exige el sentido de deidad única; en español se conserva la mayúscula reverente 'Dios' como referente único, no un ser divino cualquiera.
- source_word: πλὴν σοῦ
  english_pob_choice: except you
  chosen_spanish: fuera de ti
  alternatives_spanish:
  - excepto tú
  - aparte de ti
  lexicon: LSJ
  rationale: '''Fuera de ti'' expresa exclusión absoluta de manera natural en español y conserva la fuerza de excepción exclusiva del griego.'
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Maestro
  lexicon: LSJ
  rationale: En dirección a Dios, 'Señor' es el equivalente culto y directo de κύριε; no se usa 'SEÑOR' como máscara del nombre divino porque el texto fuente es griego con κύριος.
- source_word: ἐγκαίνισον
  english_pob_choice: Renew
  chosen_spanish: Renueva
  alternatives_spanish:
  - Haz de nuevo
  - Renueva de nuevo
  - Dedic[a] de nuevo
  lexicon: LSJ
  rationale: El imperativo pide que Dios haga de nuevo lo que ya ha hecho en su obrar poderoso; 'renueva' mantiene el valor verbal sin sobrecargarlo con un matiz cultual de dedicación.
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - portentos
  lexicon: LSJ
  rationale: '''Señales'' es el término bíblico más claro y natural en español para obras divinas que significan o autentican la acción de Dios.'
- source_word: ἀλλοίωσον
  english_pob_choice: change
  chosen_spanish: cambia
  alternatives_spanish:
  - altera
  - transforma
  lexicon: LSJ
  rationale: '''Cambia'' preserva la idea de hacer diferente sin intensificarla indebidamente; es una correspondencia directa y fluida para el imperativo griego.'
- source_word: θαυμάσια
  english_pob_choice: wonders
  chosen_spanish: maravillas
  alternatives_spanish:
  - prodigios
  - cosas maravillosas
  lexicon: LSJ
  rationale: '''Maravillas'' transmite bien los actos extraordinarios de Dios y mantiene el paralelismo bíblico con ''señales''.'
theological_decisions:
- issue: Tratamiento de κύριος en dirección directa a Dios
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - SEÑOR
  - Maestro
  rationale: El griego presenta κύριε como vocativo dirigido a Dios; en español 'Señor' conserva la relación de honor y adoración. Se evita la convención tipográfica 'SEÑOR' porque aquí no se está ocultando un tetragrámaton hebreo, sino traduciendo el vocativo griego.
  doctrine_reference: 'DOCTRINE.md: κύριος → Lord; en español, κύριος vocativo se vierte como Señor'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada. La redacción sigue de cerca el griego y el audit trail inglés, manteniendo la petición fragmentaria como en el original.
  spanish_consistency_notes:
  - Se preserva la diferencia entre 'Dios' y 'Señor' conforme al monoteísmo explícito del verso.
  - '''Renueva'' y ''cambia'' reproducen el contraste verbal entre ἐγκαίνισον y ἀλλοίωσον sin añadir explicación interpretativa.'
  - No se introducen términos litúrgicos ajenos al griego; 'señales' y 'maravillas' mantienen el par bíblico natural en español.
