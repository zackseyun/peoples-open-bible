translation:
  language: es
  text: 'Estaba sobre doce bueyes: tres vueltos hacia el norte, tres vueltos hacia el oeste[a], tres vueltos hacia el sur y tres vueltos hacia el este; y el Mar estaba sobre ellos arriba, y todas sus partes traseras estaban hacia adentro[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: "hacia el mar", una manera bíblica estándar de indicar el oeste.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "todas sus ancas estaban hacia el interior".'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹמֵד
  english_pob_choice: It stood
  chosen_spanish: Estaba
  alternatives_spanish:
  - Permanecía
  - Se alzaba
  lexicon: HALOT
  rationale: El participio hebreo funciona aquí de modo descriptivo y remite al objeto anterior; en español, un imperfecto simple comunica mejor la स्थिति/estado continuo que un perfecto puntual.
- source_word: בָּקָר
  english_pob_choice: oxen
  chosen_spanish: bueyes
  alternatives_spanish:
  - toros
  - ganado
  lexicon: HALOT
  rationale: En español bíblico y técnico, 'bueyes' es el equivalente natural para estos soportes bovinos. 'Toros' podría sugerir fuerza, pero es menos preciso; 'ganado' es demasiado general.
- source_word: פֹנִים
  english_pob_choice: facing
  chosen_spanish: mirando
  alternatives_spanish:
  - orientados hacia
  - vueltos hacia
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'con rostro hacia', pero en esta lista direccional la idea es orientación. 'Mirando' conserva la imagen de los rostros sin sonar rígido en español.
- source_word: צָפוֹנָה
  english_pob_choice: north
  chosen_spanish: al norte
  alternatives_spanish:
  - hacia el norte
  - norte
  lexicon: HALOT
  rationale: La forma direccional se traduce de modo natural con 'al norte', manteniendo la orientación sin forzar un adverbio más pesado.
- source_word: יָמָּה
  english_pob_choice: west
  chosen_spanish: al oeste
  alternatives_spanish:
  - hacia el mar
  - seaward
  lexicon: HALOT
  rationale: 'El valor contextual es cardinal: ''oeste''. Se mantiene la nota implícita de ''mar-ward'' mediante la nota al pie, como en el POB inglés.'
- source_word: נֶגְבָּה
  english_pob_choice: south
  chosen_spanish: al sur
  alternatives_spanish:
  - hacia el sur
  - al Neguev
  lexicon: HALOT
  rationale: Aquí la referencia es direccional, no geográfica regional; 'al sur' reproduce el sentido cardinal de manera clara.
- source_word: מִזְרָחָה
  english_pob_choice: east
  chosen_spanish: al este
  alternatives_spanish:
  - hacia el este
  - al oriente
  lexicon: HALOT
  rationale: '''Al este'' corresponde al cuarto punto cardinal y equilibra la serie direccional.'
- source_word: הַיָּם
  english_pob_choice: the Sea
  chosen_spanish: el Mar
  alternatives_spanish:
  - la fuente
  - la pila
  lexicon: HALOT
  rationale: Se conserva el término técnico y la mayúscula por tratarse del gran recipiente fundido descrito en el contexto, evitando una sustitución explicativa que borre la imagen del hebreo.
- source_word: עֲלֵיהֶם מִלְמָעְלָה
  english_pob_choice: was on them above
  chosen_spanish: estaba sobre ellos, por encima
  alternatives_spanish:
  - estaba encima de ellos
  - reposaba sobre ellos
  lexicon: HALOT
  rationale: La frase hebrea afirma la ubicación del Mar sobre los bueyes. 'Por encima' conserva el matiz de posición superior sin añadir un verbo interpretativo como 'reposaba' o 'se apoyaba'.
- source_word: אֲחֹרֵיהֶם
  english_pob_choice: their rear parts
  chosen_spanish: sus partes traseras
  alternatives_spanish:
  - sus ancas
  - sus partes posteriores
  lexicon: HALOT
  rationale: La expresión apunta anatómicamente a la parte posterior de las figuras bovinas. 'Partes traseras' es claro y digno en español contemporáneo.
- source_word: בָּיְתָה
  english_pob_choice: inward
  chosen_spanish: hacia adentro
  alternatives_spanish:
  - al interior
  - para adentro
  lexicon: HALOT
  rationale: La dirección se expresa con naturalidad como 'hacia adentro', equivalente a la orientación interna del texto hebreo.
theological_decisions:
- issue: El nombre divino no aparece en este versículo, pero sí el sustantivo técnico 'el Mar' para el basamento/vasija monumental.
  english_pob_reading: the Sea was on them above
  chosen_spanish_reading: el Mar estaba sobre ellos, por encima
  alternative_spanish_readings:
  - el Mar estaba encima de ellos
  - el Mar reposaba sobre ellos
  rationale: Se mantiene el nombre técnico con mayúscula, sin sustituirlo por una explicación que eliminaría la resonancia del objeto cultual en el contexto del templo.
  doctrine_reference: Teología del templo y terminología cultual de 1 Reyes 7
- issue: La orientación final de las partes traseras puede leerse como descripción anatómica o como una precisión espacial de montaje.
  english_pob_reading: and all their rear parts were inward
  chosen_spanish_reading: y todas sus partes traseras quedaban hacia adentro
  alternative_spanish_readings:
  - y todas sus partes posteriores estaban hacia adentro
  - y sus ancas quedaban hacia el interior
  rationale: '''Quedaban hacia adentro'' preserva la imagen espacial sin endurecerla en un tecnicismo innecesario; no se añade interpretación sobre intención simbólica no explicitada por el texto.'
  doctrine_reference: Principios de traducción literal-controlada en descripciones arquitectónicas bíblicas
translation_notes:
  revision_awareness: La traducción sigue la revisión más reciente del inglés POB, que eliminó 'set' para reflejar más directamente el hebreo ('the Sea was on them above'). Por eso en español se evita añadir un verbo de colocación o apoyo no presente en la formulación hebrea, y se conserva una relación espacial directa.
  spanish_consistency_notes:
  - Se usa 'Mar' con mayúscula para el recipiente cultual, en continuidad con la decisión inglesa de 'Sea'.
  - Se opta por 'bueyes' para בָּקָר en vez de 'toros', por mayor precisión en un contexto de soporte arquitectónico.
  - 'Las direcciones cardinales se mantienen uniformes: norte, oeste, sur, este.'
  - '''Hacia adentro'' reproduce el valor direccional de בָּיְתָה sin sobrerreformular.'
  - No se introduce 'Señor' ni otros equivalentes teológicos ajenos al versículo.
