translation:
  language: es
  text: Entonces los corderos[a] pastarán como en su pastizal[b], y los residentes temporales[d] comerán entre las ruinas de los bien alimentados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ovejas» en lugar de «corderos».
    reason: lexical_alternative
  - marker: b
    text: El hebreo כדברם es difícil; probablemente significa «como en su pastizal» o «en su propio lugar de pastoreo».
    reason: lexical_alternative
  - marker: c
    text: O «los engordados» o «los ricos» para «los bien alimentados».
    reason: lexical_alternative
  - marker: d
    text: O «forasteros» o «extranjeros residentes» para «residentes temporales».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְרָעוּ
  english_pob_choice: Then ... will graze
  chosen_spanish: Entonces ... pastarán
  alternatives_spanish:
  - Y ... pastarán
  - Entonces ... comerán pasto
  lexicon: HALOT
  rationale: La forma qal describe a animales que pacen; en español, «pastarán» comunica bien la acción. «Entonces» reproduce el valor consecutivo que el POB inglés expresa con 'Then', en vez de un mero enlace aditivo.
- source_word: כְבָשִׂים
  english_pob_choice: lambs
  chosen_spanish: corderos
  alternatives_spanish:
  - ovejas
  - borregos
  lexicon: HALOT
  rationale: El hebreo puede referirse a ovejas en general, pero el contexto imagístico favorece una referencia concreta a animales jóvenes y vulnerables. «Corderos» mantiene esa fuerza en español.
- source_word: כְדָבְרָם
  english_pob_choice: as in their pasture
  chosen_spanish: como en su pastizal
  alternatives_spanish:
  - como en su pasto
  - como en su lugar de pastoreo
  - en su propio lugar de pastoreo
  lexicon: HALOT
  rationale: La expresión es difícil. Sigo la solución auditada del POB, que entiende un sentido locativo ligado al pastoreo. «Pastizal» da una salida natural en español sin perder el matiz de lugar propio de alimento/pastoreo.
- source_word: וְחָרְבוֹת
  english_pob_choice: among the ruins
  chosen_spanish: entre las ruinas
  alternatives_spanish:
  - en medio de las ruinas
  - entre lugares desolados
  - en las ruinas
  lexicon: HALOT
  rationale: El sustantivo indica lugares arruinados o desolados; «entre las ruinas» reproduce bien la fuerza locativa natural del hebreo y del inglés auditado.
- source_word: מֵחִים
  english_pob_choice: of the well-fed
  chosen_spanish: de los engordados
  alternatives_spanish:
  - de los bien alimentados
  - de los gordos
  - de los ricos
  lexicon: HALOT
  rationale: La forma es rara y alude a los prósperos/engordados. «Engordados» conserva el contenido concreto que el POB inglés deja abierto con 'well-fed', sin convertirlo prematuramente en una interpretación social más amplia.
- source_word: גָּרִים
  english_pob_choice: sojourners
  chosen_spanish: forasteros
  alternatives_spanish:
  - forasteros residentes
  - extranjeros
  - peregrinos
  lexicon: HALOT
  rationale: El POB revisado prefirió 'sojourners' para גרים. En español, «forasteros» comunica la alteridad y la idea de personas ajenas al lugar; «forasteros residentes» sería más técnico, pero menos natural en la línea poética.
- source_word: יֹאכֵלוּ
  english_pob_choice: will eat
  chosen_spanish: comerán
  alternatives_spanish:
  - se alimentarán
  - ingerirán
  lexicon: HALOT
  rationale: El verbo simple «comerán» corresponde directamente al hebreo y mantiene la imagen de consumir lo que quedó en los lugares devastados.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el juicio revisado del POB inglés: ''Then lambs will graze as in their pasture, and sojourners will eat among the ruins of the well-fed.'' Se conserva la decisión de tomar כדברם en sentido locativo difícil, y se refleja el cambio de ''strangers'' a ''sojourners'' para גרים. También se evita una paráfrasis interpretativa excesiva, manteniendo el paralelismo imagen-desolación del verso.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre corderos y forasteros para reflejar el contraste poético del hebreo.
  - «Pastizal» se usa de manera consistente con un valor de lugar de pastoreo, no como simple adorno poético.
  - «Engordados» preserva el matiz concreto del original; no se sustituye por una abstracción como «ricos» en el texto principal.
  - La puntuación y el orden siguen la secuencia del hebreo y del POB auditado.
