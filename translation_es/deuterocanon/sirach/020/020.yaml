translation:
  language: es
  text: De la boca de un necio[a] se rechazará un proverbio, porque ciertamente no lo dirá en su debido tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una parábola», si παραβολή se toma en sentido más amplio que «proverbio».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ στόματος
  english_pob_choice: from the mouth of
  chosen_spanish: de la boca de
  alternatives_spanish:
  - de la boca de
  - de parte de la boca de
  lexicon: LSJ
  rationale: La frase indica origen o procedencia del dicho. «De la boca de» conserva la imagen concreta y el valor idiomático de la fuente de donde sale la sentencia.
- source_word: μωροῦ
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un necio
  - un insensato
  - una persona necia
  lexicon: LSJ
  rationale: En literatura sapiencial, μωρός designa a una persona moral y prácticamente insensata. «Neceo» comunica esa fuerza sin reducirlo a simple falta de inteligencia.
- source_word: ἀποδοκιμασθήσεται
  english_pob_choice: will be rejected
  chosen_spanish: se rechazará
  alternatives_spanish:
  - será rechazado
  - será desaprobado
  - será repudiado
  lexicon: LSJ
  rationale: El pasivo futuro presenta al proverbio como objeto de rechazo por su procedencia. «Se rechazará» mantiene el sentido pasivo y suena natural en español.
- source_word: παραβολή
  english_pob_choice: a proverb
  chosen_spanish: un proverbio
  alternatives_spanish:
  - una parábola
  - un dicho
  - una sentencia
  lexicon: LSJ
  rationale: En Sirácida, παραβολή suele referirse a una sentencia sapiencial o proverbio, no a una narración parabólica. «Proverbio» refleja mejor el género y el contexto.
- source_word: οὐ γὰρ μὴ
  english_pob_choice: for he will certainly not
  chosen_spanish: porque ciertamente no
  alternatives_spanish:
  - porque de ningún modo
  - porque seguramente no
  - pues no
  lexicon: Greek grammar / LSJ
  rationale: La doble negación enfática refuerza la certeza de la negación. «Porque ciertamente no» comunica esa intensidad sin sonar forzado.
- source_word: εἴπῃ αὐτὴν
  english_pob_choice: speak it
  chosen_spanish: lo dirá
  alternatives_spanish:
  - lo hablará
  - lo pronunciará
  - lo expresará
  lexicon: LSJ
  rationale: El verbo se refiere a decir o pronunciar el proverbio. «Lo dirá» es el equivalente más natural en español para este contexto.
- source_word: ἐν καιρῷ αὐτῆς
  english_pob_choice: at its proper time
  chosen_spanish: en su tiempo oportuno
  alternatives_spanish:
  - en su tiempo
  - en el momento adecuado
  - a su debido tiempo
  lexicon: LSJ
  rationale: καιρός expresa el momento oportuno o conveniente. «En su tiempo oportuno» preserva tanto el matiz temporal como el de conveniencia.
translation_notes:
  revision_awareness: Traducción alineada con el texto griego de Swete y con el audit trail inglés; se conserva la tensión léxica de παραβολή mediante una nota alternativa. No hay cambios de revisión aplicados en el registro fuente.
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial y sobrio del texto.
  - «Necio» se usa para μωρός en sentido moral-sapiencial, coherente con el uso bíblico.
  - «Proverbio» se preserva como lectura principal, con «parábola» como alternativa anotada.
  - La negación enfática se vierte de forma idiomática sin perder el énfasis del griego.
