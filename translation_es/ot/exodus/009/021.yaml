translation:
  language: es
  text: Pero el que no prestó atención a la palabra de Yahvé dejó a sus siervos y a su ganado en el campo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no puso su corazón en la palabra de Yahvé», es decir, no la tomó a pecho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲשֶׁר
  english_pob_choice: But whoever
  chosen_spanish: Pero cualquiera que
  alternatives_spanish:
  - Y cualquiera que
  - Mas cualquiera que
  lexicon: HALOT
  rationale: La partícula con waw introduce contraste con el grupo obediente del versículo anterior. En español, «Pero cualquiera que» conserva el valor adversativo y el sentido indefinido del relativo sin endurecer el orden natural de la frase.
- source_word: לֹא שָׂם לִבּוֹ אֶל
  english_pob_choice: did not pay attention to
  chosen_spanish: no prestó atención a
  alternatives_spanish:
  - no puso su corazón en
  - no tomó en serio
  - no puso atención a
  lexicon: HALOT
  rationale: El hebreo es idiomático, literalmente «no puso su corazón a». La POB inglesa eligió un sentido funcional de no atender/no tomar en serio; «no prestó atención a» comunica esa idea de forma natural en español sin borrar la imagen idiomática subyacente.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: דבר puede significar palabra, asunto o mensaje. Aquí se trata de la advertencia pronunciada por Dios; «la palabra de Yahvé» conserva la fórmula bíblica y sigue el criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino prescrita por el proyecto. En español, «Yahvé» preserva el nombre personal del pacto sin sustituirlo por un título.
- source_word: וַיַּעֲזֹב
  english_pob_choice: left
  chosen_spanish: dejó
  alternatives_spanish:
  - abandonó
  - dejó atrás
  lexicon: HALOT
  rationale: El verbo expresa dejar o abandonar. En este contexto narrativo, «dejó» es la forma más natural y mantiene la concreción de la acción.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  - sus servidores
  lexicon: HALOT
  rationale: Aunque עבד puede significar esclavo/siervo, el contexto apunta a personas a su cargo en la casa o en la labor. La POB inglesa optó por «servants»; en español, «siervos» sigue esa opción contextual sin introducir una dureza innecesaria. Si el contexto exigiera fuerza léxica de esclavitud, se escogería «esclavos».
- source_word: מִקְנֵהוּ
  english_pob_choice: his livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - su ganado doméstico
  - sus animales
  lexicon: HALOT
  rationale: El sustantivo puede abarcar ganado y bienes en forma de rebaños. «Ganado» es el equivalente español más breve y claro en este contexto agrícola, y coincide con el sentido colectivo de la POB inglesa.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en el sembrado
  lexicon: HALOT
  rationale: La locución es locativa simple. «En el campo» es natural en español y transmite la exposición al exterior sin añadir información no presente en el texto.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama directamente. Conforme a la política del proyecto, se preserva el nombre divino como transliteración y no como sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido del idiomático לֹא שָׂם לִבּוֹ
  english_pob_reading: did not pay attention to
  chosen_spanish_reading: no prestó atención a
  alternative_spanish_readings:
  - no lo tomó en serio
  - no puso su corazón en
  rationale: El hebreo literal expresa «no puso su corazón a». La redacción española conserva el sentido de desatender la advertencia sin ocultar la fuerza idiomática del original.
  doctrine_reference: HALOT; uso contextual del modismo hebreo
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y concuerda con la decisión inglesa revisada de mantener el nombre divino como Yahweh/Yahvé. No se detectaron revisiones pendientes relevantes; se preserva la alternancia idiomática de לֹא שָׂם לִבּוֹ mediante nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente con la terminología del proyecto para יְהוָה.
  - Se evita «SEÑOR» como sustitución del nombre divino.
  - «Siervos» se eligió por continuidad contextual con la POB inglesa; «esclavos» queda como alternativa léxica documentada.
  - «Ganado» resume naturalmente el valor colectivo de מִקְנֶה en este contexto.
  - La nota a conserva la alternativa idiomática más literal del hebreo para no borrar la tensión entre literalidad y claridad.
