translation:
  language: es
  text: Y él hirió al egipcio[a], un hombre de cinco codos[b] de estatura. En la mano del egipcio había una lanza como el rodillo de un telar, y descendió hacia él con un bastón[c], le arrebató la lanza de la mano del egipcio y lo mató con su propia lanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, «un hombre de gran estatura, de cinco codos». La expresión hebrea literalmente dice: «un hombre de medida».'
    reason: lexical_alternative
  - marker: b
    text: El codo era una unidad antigua de longitud, aproximadamente la distancia del codo a la punta de los dedos.
    reason: cultural_note
  - marker: c
    text: O, «con una vara» o «con un palo».
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכָּה
  english_pob_choice: struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - derribó
  lexicon: HALOT
  rationale: En este contexto de combate, הִכָּה expresa un golpe violento que conduce al desenlace mortal, pero el verbo de matar aparece después. «Hirió» conserva la acción agresiva sin anticipar la muerte explícita.
- source_word: הָאִישׁ הַמִּצְרִי
  english_pob_choice: the Egyptian
  chosen_spanish: al egipcio
  alternatives_spanish:
  - al hombre egipcio
  lexicon: HALOT
  rationale: Como en el inglés auditado, el hebreo ya identifica al individuo como egipcio; en español no es necesario repetir «hombre» aquí. «Al egipcio» suena natural y mantiene la referencia personal.
- source_word: אִישׁ מִדָּה חָמֵשׁ בָּאַמָּה
  english_pob_choice: a man five cubits tall
  chosen_spanish: un hombre de cinco codos de estatura
  alternatives_spanish:
  - un hombre de gran estatura, de cinco codos
  - un hombre de cinco codos de altura
  lexicon: HALOT
  rationale: La expresión hebrea literalmente habla de «un hombre de medida» y luego especifica la medida. Sigo la decisión auditada de conservar la unidad antigua; «de estatura» hace natural la frase en español sin perder la transparencia de la medida.
- source_word: חָמֵשׁ בָּאַמָּה
  english_pob_choice: five cubits tall
  chosen_spanish: cinco codos
  alternatives_spanish:
  - cinco codos de altura
  lexicon: HALOT
  rationale: «Codo» preserva la unidad antigua como en el audit trail inglés. No se convierte la medida para mantener la forma fuente y la auditableidad.
- source_word: חֲנִית
  english_pob_choice: spear
  chosen_spanish: lanza
  alternatives_spanish:
  - spear
  - jabalina
  lexicon: HALOT
  rationale: Para español bíblico, «lanza» comunica con claridad el arma y evita el anglicismo. El contexto de una asta comparada con un rodillo de telar confirma un arma larga de asta.
- source_word: כִּמְנוֹר אֹרְגִים
  english_pob_choice: like a weaver’s beam
  chosen_spanish: como el rodillo de un telar
  alternatives_spanish:
  - como la viga de un tejedor
  - como el madero de un telar
  lexicon: HALOT
  rationale: La imagen apunta al elemento del telar comparable por grosor o forma. «Rodillo de un telar» es una solución española natural que mantiene la metáfora de la pieza del telar sin alejarse de la imagen original.
- source_word: וַיֵּרֶד אֵלָיו
  english_pob_choice: he went down to him
  chosen_spanish: descendió hacia él
  alternatives_spanish:
  - fue hacia él
  - bajó hacia él
  lexicon: HALOT
  rationale: Conservo el movimiento de descender, como en la lectura auditada inglesa. «Descendió hacia él» mantiene la textura narrativa sin añadir interpretación excesiva.
- source_word: בַּשָּׁבֶט
  english_pob_choice: with a staff
  chosen_spanish: con un bastón
  alternatives_spanish:
  - con una vara
  - con un palo
  lexicon: HALOT
  rationale: שבט puede significar vara, bastón o garrote según contexto. En español, «bastón» es la opción más neutra y clara para un instrumento de madera, sin cargarlo de connotaciones disciplinarias.
- source_word: וַיִּגְזֹל
  english_pob_choice: snatched
  chosen_spanish: le arrebató
  alternatives_spanish:
  - le quitó con fuerza
  - se lo arrancó
  lexicon: HALOT
  rationale: El verbo expresa una toma enérgica y rápida. «Le arrebató» transmite mejor la brusquedad del combate que un simple «tomó».
- source_word: וַיַּהַרְגֵהוּ
  english_pob_choice: killed him
  chosen_spanish: lo mató
  alternatives_spanish:
  - lo hirió de muerte
  - lo mató de muerte
  lexicon: HALOT
  rationale: Aquí aparece el verbo explícito de muerte; «lo mató» es la forma más directa y sobria en español moderno.
- source_word: בַּחֲנִיתוֹ
  english_pob_choice: with his own spear
  chosen_spanish: con su propia lanza
  alternatives_spanish:
  - con la lanza misma
  - con su lanza
  lexicon: HALOT
  rationale: El sufijo posesivo remite naturalmente a la lanza del egipcio recién arrebatada. «Su propia lanza» conserva la ironía del arma devuelta contra su dueño.
theological_decisions:
- issue: Medida antigua y posible lectura de estatura excepcional
  english_pob_reading: 'a man five cubits tall, with a footnote noting an alternative: ''a man of great stature, five cubits tall,'' and the literal phrase ''a man of measure.'''
  chosen_spanish_reading: un hombre de cinco codos de estatura, con nota que reconoce la alternativa de «un hombre de gran estatura» y la literalidad «un hombre de medida»
  alternative_spanish_readings:
  - un hombre de gran estatura
  - un hombre de medida
  rationale: 'No hay controversia doctrinal, pero sí una tensión lexical importante: el hebreo puede leerse como descripción de medida o de gran estatura. Mantengo la traducción medida + estatura para ser transparente y natural, y dejo constancia de la alternativa literal.'
  doctrine_reference: Hermenéutica lexical; no aplica doctrina específica.
- issue: Arma del egipcio y del propio egipcio al final
  english_pob_reading: killed him with his own spear
  chosen_spanish_reading: lo mató con su propia lanza
  alternative_spanish_readings:
  - lo mató con la lanza
  - lo mató con su lanza
  rationale: 'El sufijo posesivo apunta al egipcio, y el inglés auditado lo hace explícito. La traducción conserva el contraste narrativo: el arma del enemigo termina causándole la muerte.'
  doctrine_reference: Narrativa histórica; no aplica doctrina específica.
translation_notes:
  revision_awareness: La versión inglesa auditada fue ajustada en una revisión menor, reemplazando «yet» por «and» para alinearse mejor con la conjunción del hebreo. En español se siguió directamente la coordinación simple con «y», sin añadir contraste no presente en la fuente.
  spanish_consistency_notes:
  - Se preserva el nombre divino no aplicable en este versículo.
  - 'Se mantiene un registro de arma consistente: «lanza» para חֲנִית, con nota sobre posibles alternativas en español.'
  - «Codos» conserva la unidad antigua, coherente con la transparencia fuente-base del proyecto.
  - 'La secuencia verbal sigue el hebreo: herir -> describir la lanza -> descender -> arrebatar -> matar.'
