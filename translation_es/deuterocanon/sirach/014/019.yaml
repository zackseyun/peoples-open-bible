translation:
  language: es
  text: Todas sus obras se pudren[a], y la obra de sus manos es arrastrada tras él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «y el que lo hace se irá con ello». El hebreo, en cambio, dice que la obra de sus manos es arrastrada tras él.'
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל
  english_pob_choice: All
  chosen_spanish: Todas
  alternatives_spanish:
  - Cada una de
  - Todas las
  lexicon: HALOT
  rationale: El cuantificador hebreo abarca la totalidad de las obras; «Todas» conserva esa amplitud con naturalidad en español.
- source_word: מַעֲשָׂיו
  english_pob_choice: his works
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - lo que hace
  lexicon: HALOT
  rationale: מַעֲשָׂיו designa en general lo que alguien realiza o produce. «Obras» mantiene el tono concreto y la correspondencia con el campo semántico de ἔργον.
- source_word: רָקוֹב יִרְקָבוּ
  english_pob_choice: rot away
  chosen_spanish: se pudren
  alternatives_spanish:
  - se descomponen
  - se corrompen
  lexicon: HALOT
  rationale: La duplicación hebrea intensifica la idea de descomposición. «Se pudren» comunica bien esa imagen en español y evita una paráfrasis excesiva.
- source_word: וּפֹעַל
  english_pob_choice: and the work
  chosen_spanish: y la obra
  alternatives_spanish:
  - y el trabajo
  - y el producto
  lexicon: HALOT
  rationale: פֹעַל puede referirse al resultado de la acción. «Obra» conserva el vínculo con «obras» y suena natural en el paralelismo poético.
- source_word: יָדָיו
  english_pob_choice: of his hands
  chosen_spanish: de sus manos
  alternatives_spanish:
  - de su mano
  - de su labor
  lexicon: HALOT
  rationale: La expresión idiomática menciona explícitamente las manos. «De sus manos» preserva esa imaginería concreta sin suavizarla.
- source_word: יִמָּשֵׁךְ אַחֲרָיו
  english_pob_choice: is dragged along behind him
  chosen_spanish: es arrastrada tras él
  alternatives_spanish:
  - es arrastrada detrás de él
  - lo sigue arrastrándose tras él
  lexicon: HALOT
  rationale: El hebreo sugiere una acción pasiva de ser tirado o arrastrado. «Tras él» reproduce directamente אַחֲרָיו y mantiene la imagen de algo que queda siguiendo a su dueño.
theological_decisions:
- issue: Divergencia hebreo-griego en el segundo colon
  english_pob_reading: 'Follow the extant Hebrew: ''the work of his hands is dragged along behind him.'''
  chosen_spanish_reading: 'Seguir el hebreo: «la obra de sus manos es arrastrada tras él».'
  alternative_spanish_readings:
  - 'Seguir más de cerca el griego: «y el que lo hace se irá con ello».'
  - «y quien la hizo se marchará con ella».
  rationale: En Sirácida, cuando el hebreo está atestiguado con alta confianza, la POB privilegia esa forma y deja la variante griega como nota. La frase española conserva la tensión entre el texto hebreo y el paralelo griego sin fusionarlos en una lectura armonizada.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirácida lo permite; preservar en nota las alternativas relevantes del griego.'
translation_notes:
  revision_awareness: La redacción sigue la decisión revisada de la POB inglesa de expresar de manera directa la podredumbre/ruina de las obras, pero en español se eligió «se pudren» por ser la formulación más natural y fiel al hebreo repetitivo. También se mantuvo la opción hebrea en el segundo hemistiquio, con la alternativa griega preservada en nota.
  spanish_consistency_notes:
  - Se usa «obras» para מַעֲשָׂיו y «obra» para פֹעַל, manteniendo el paralelismo léxico sin forzarlo.
  - «Tras él» conserva el valor espacial de אַחֲרָיו con español claro y bíblicamente digno.
  - No se introdujo terminología eclesiástica ajena al contexto; el verso permanece en registro sapiencial breve y directo.
