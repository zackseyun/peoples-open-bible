base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/013/027.yaml
  text: Your adulteries[a], your lustful neighings, the depravity of your prostitution on the hills in the field—I have seen your abominations. Woe to you, Jerusalem! You will not be made clean[d][c][b]. How much longer will it be?
  footnotes:
  - marker: a
    text: Or 'the lewdness of your whoredom.' The Hebrew combines terms for depravity/lewdness and prostitution.
    reason: lexical_alternative
  - marker: b
    text: '''Lustful neighings'' echoes the horse imagery of sexual craving used elsewhere in Jeremiah.'
    reason: cross_reference
  - marker: c
    text: Or 'Will you not become clean?' The Hebrew may also be understood less passively.
    reason: alternative_reading
  - marker: d
    text: 'Hebrew is elliptical: literally, ''after when/still?'' meaning ''How much longer?'''
    reason: lexical_alternative
