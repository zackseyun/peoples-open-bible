translation:
  language: es
  text: de un fuego asfixiante[a] por todos lados, y de en medio de un fuego que yo no encendí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo conservado de este versículo es difícil y difiere mucho del griego. Una versión más cercana a la forma hebrea de la segunda mitad sería algo como: ''del vientre del abismo, de mi madre'', pero el sentido resulta oscuro en contexto.'
    reason: textual_variant
lexical_decisions:
- source_word: ἀπὸ πνιγμοῦ / מְכַבּוֹת
  english_pob_choice: from a choking fire
  chosen_spanish: de un fuego asfixiante
  alternatives_spanish:
  - de un fuego que sofoca
  - de un fuego ahogante
  lexicon: BDAG; HALOT
  rationale: La idea principal transmitida por el griego es de sofocación/asfixia, no simplemente de fuego en sentido general. 'Asfixiante' expresa bien ese valor en español y mantiene la imagen de peligro físico.
- source_word: πυρᾶς / אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llamas
  - incendio
  lexicon: BDAG; HALOT
  rationale: '''Fuego'' es la equivalencia más directa y natural para πυρᾶς/πῦρ y para אֵשׁ, sin sobreinterpretar la imagen.'
- source_word: κυκλόθεν / לְאֵין פֶּחָה
  english_pob_choice: all around
  chosen_spanish: por todos lados
  alternatives_spanish:
  - alrededor
  - en torno
  lexicon: BDAG; HALOT
  rationale: El griego aporta con claridad la noción de circundante. 'Por todos lados' conserva esa totalidad espacial con español fluido.
- source_word: ἐκ μέσου
  english_pob_choice: from the midst of
  chosen_spanish: de en medio de
  alternatives_spanish:
  - del medio de
  - desde el centro de
  lexicon: BDAG
  rationale: '''De en medio de'' reproduce de manera natural la localización interna del griego sin volverla demasiado literal o extraña.'
- source_word: οὗ οὐκ ἐξέκαυσα
  english_pob_choice: that I did not kindle
  chosen_spanish: que yo no encendí
  alternatives_spanish:
  - que yo no prendí
  - que no había encendido
  lexicon: BDAG
  rationale: El verbo griego en primera persona activa se entiende mejor como 'encender/prender', no como pasivo. 'Encendí' mantiene la acción del hablante y la tensión del texto.
theological_decisions:
- issue: Prioridad del griego paralelo cuando el hebreo transmitido es textualmente inestable
  english_pob_reading: Main text follows the coherent Greek sense while remaining anchored to the extant Hebrew's fire imagery.
  chosen_spanish_reading: El texto principal sigue el sentido coherente del griego, sin perder la imagen de fuego preservada por el hebreo.
  alternative_spanish_readings:
  - Una traducción más pegada al hebreo transmitido, aunque resulte oscura
  - Una reconstrucción híbrida que mezclara ambos testigos sin distinguirlos
  rationale: En esta unidad el hebreo conservado diverge de modo fuerte y no ofrece una continuación clara; por eso el griego funciona como entrada real de traducción. La decisión conserva honestamente la incertidumbre textual en nota y evita forzar un hebreo oscuro como si fuera seguro.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva, pero usar el paralelo griego como entrada real cuando sea necesario; declarar con honestidad la incertidumbre de la fuente.'
translation_notes:
  revision_awareness: Se siguió el sentido coherente del paralelo griego para la línea principal, como en el audit trail inglés, y se dejó constancia de la fuerte discrepancia del hebreo en una nota textual. La añadidura del artículo indefinido se resolvió de forma natural en español con 'un fuego asfixiante'.
  spanish_consistency_notes:
  - Se mantuvo 'fuego' de manera uniforme para πυρᾶς/πῦρ y אֵשׁ.
  - '''De en medio de'' preserva la localización interna del griego sin introducir interpretaciones adicionales.'
  - Se evitó 'SEÑOR' o equivalentes no pertinentes; el versículo no contiene el nombre divino.
  - La nota [a] se ancla en 'asfixiante' para señalar que la primera mitad sigue el sentido del griego frente al hebreo transmitido.
