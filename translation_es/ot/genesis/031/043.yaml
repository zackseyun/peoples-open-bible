translation:
  language: es
  text: 'Entonces Labán respondió y dijo a Jacob: «Las hijas son mis hijas, y los hijos son mis hijos, y el rebaño es mi rebaño, y todo lo que tú ves es mío. Pero ¿qué puedo hacer este día por estas mis hijas, o por sus hijos[a], que ellas han dado a luz?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «o por sus hijos varones, que ellas han dado a luz», si בְנֵיהֶן se toma de manera más restringida como descendencia masculina y no como hijos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַן / וַיֹּאמֶר
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - contestó y dijo
  - respondió
  lexicon: HALOT
  rationale: Conservo la doble fórmula narrativa hebrea con un español natural y digno. «Respondió y dijo» refleja el paralelismo sin perder fluidez; «contestó» es posible, pero menos neutro en este contexto.
- source_word: הַבָּנוֹת בְּנֹתַי
  english_pob_choice: The daughters are my daughters
  chosen_spanish: Las hijas son mis hijas
  alternatives_spanish:
  - Estas hijas son mis hijas
  - Las hijas son hijas mías
  lexicon: HALOT
  rationale: La repetición posesiva se mantiene para conservar la fuerza de la reclamación de Labán. «Hijas» expresa el parentesco y la posesión sin suavizar el reclamo.
- source_word: וְהַבָּנִים בָּנַי
  english_pob_choice: and the sons are my sons
  chosen_spanish: y los hijos son mis hijos
  alternatives_spanish:
  - y los varones son mis varones
  - y los hijos varones son mis hijos
  lexicon: HALOT
  rationale: Aunque el hebreo es masculino plural, en español «hijos» funciona de manera natural para hijos varones y mantiene el paralelismo familiar con «hijas». Evita una construcción forzada como «varones» en este registro.
- source_word: וְהַצֹּאן צֹאנִי
  english_pob_choice: and the flock is my flock
  chosen_spanish: y el rebaño es mi rebaño
  alternatives_spanish:
  - y el ganado menor es mi ganado menor
  - y la grey es mi grey
  lexicon: HALOT
  rationale: «Rebaño» comunica bien el colectivo de ganado pequeño y suena natural en español bíblico contemporáneo. Preserva el valor colectivo de צֹאן sin tecnicismo innecesario.
- source_word: וְכֹל אֲשֶׁר אַתָּה רֹאֶה לִי הוּא
  english_pob_choice: and all that you see is mine
  chosen_spanish: y todo lo que tú ves es mío
  alternatives_spanish:
  - y cuanto ves me pertenece
  - y todo lo que ves pertenece a mí
  lexicon: HALOT
  rationale: «Es mío» reproduce la afirmación posesiva directa del hebreo y del inglés POB. Mantengo «tú» para hacer explícito el sujeto, como en el discurso directo.
- source_word: וְלִבְנֹתַי
  english_pob_choice: for these my daughters
  chosen_spanish: por estas, mis hijas
  alternatives_spanish:
  - para estas, mis hijas
  - a favor de estas, mis hijas
  lexicon: HALOT
  rationale: La partícula con valor benefactivo se vierte con naturalidad como «por» en esta pregunta retórica. Conservo el deíctico «estas» y el posesivo «mis» para reflejar la cercanía polémica del hebreo.
- source_word: מָה אֶעֱשֶׂה
  english_pob_choice: what can I do
  chosen_spanish: ¿qué puedo hacer?
  alternatives_spanish:
  - ¿qué haré?
  - ¿qué debo hacer?
  lexicon: HALOT
  rationale: El imperfecto en contexto expresa posibilidad/limitación práctica. «Puedo hacer» reproduce la fuerza retórica de incapacidad que documenta la lectura inglesa revisada.
- source_word: הַיּוֹם
  english_pob_choice: this day
  chosen_spanish: hoy
  alternatives_spanish:
  - en este día
  - este día
  lexicon: HALOT
  rationale: «Hoy» es la forma idiomática natural en español para el adverbio temporal. Aunque el inglés POB revisó a «this day» por registro, en español «hoy» comunica la misma referencia temporal sin artificio.
- source_word: לִבְנֵיהֶן
  english_pob_choice: their children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus niños
  - su descendencia
  lexicon: HALOT
  rationale: El hebreo puede leerse más ampliamente como descendencia, pero el paralelo inmediato con «hijas» favorece «hijos» en el contexto. En español, «sus hijos» deja abierta la referencia a la prole sin perder el posible matiz masculino del lexema.
- source_word: אֲשֶׁר יָלָדוּ
  english_pob_choice: whom they have borne
  chosen_spanish: que han dado a luz
  alternatives_spanish:
  - a quienes han dado a luz
  - que ellas han parido
  lexicon: HALOT
  rationale: «Han dado a luz» es fiel y suficientemente solemne para ילד en este contexto genealógico. Evita una formulación demasiado cruda y conserva el énfasis maternal del relativo.
theological_decisions:
- issue: Uso posesivo repetido para parentesco y bienes
  english_pob_reading: The daughters are my daughters, and the sons are my sons, and the flock is my flock, and all that you see is mine.
  chosen_spanish_reading: Las hijas son mis hijas, y los hijos son mis hijos, y el rebaño es mi rebaño, y todo lo que tú ves es mío.
  alternative_spanish_readings:
  - Las hijas me pertenecen, y los hijos me pertenecen, y el rebaño me pertenece
  - Las hijas son mías, y los hijos son míos, y el rebaño es mío
  rationale: El hebreo amontona posesivos para reforzar la apropiación total de Labán. Mantener la repetición evita suavizar la tensión entre parentesco y propiedad, que es central en el pasaje.
  doctrine_reference: Narrativa patriarcal; ética de la posesión y la familia en Génesis 31
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «today» a «this day» para un registro más formal; en español se optó por «hoy», que conserva la misma referencia temporal con naturalidad idiomática. También se preservó la decisión auditada de leer בְּנֵיהֶן como «children» en sentido amplio, aunque el contexto español permite mantener la ambigüedad con «sus hijos» y una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como estándar del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se conserva «hijos» para בנים y בני/beney en continuidad con el paralelo de «hijas», sin imponer «niños».
  - La puntuación española usa comillas angulares para el discurso directo dentro del versículo, con interrogación de apertura en la pregunta retórica.
  - No se introduce terminología eclesial tradicional ajena al hebreo; «rebaño» traduce צאן con neutralidad pastoral y bíblica.
