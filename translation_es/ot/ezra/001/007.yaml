- from: Y el rey Ciro sacó los utensilios de la casa de Yahvé[a], los cuales Nabucodonosor había sacado[b] de Jerusalén y había puesto en la casa de su dios.
  to: Y el rey Ciro sacó los vasos de la casa de Yahvé[a], que Nabucodonosor había sacado[b] de Jerusalén y había puesto en la casa de su dios.
  rationale: Se reemplaza «utensilios» por «vasos» para preservar mejor el valor cultual de כְּלֵי y la decisión auditada «vessels». Se simplifica el relativo a «que» para una fluidez más natural sin pérdida de precisión. Se corrige la nota [b] para que registre una alternativa léxica auténtica, en vez de repetir casi exactamente el texto principal.
