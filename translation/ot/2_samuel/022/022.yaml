id: 2SA.22.22
reference: 2 Samuel 22:22
source:
  edition: WLC
  text: כִּ֥י שָׁמַ֖רְתִּי דַּרְכֵ֣י יְהוָ֑ה וְ/לֹ֥א רָשַׁ֖עְתִּי מֵ/אֱלֹהָֽ/י׃
translation:
  text: For I have kept the ways of Yahweh[a], and have not wickedly departed from my God.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'have not wickedly departed from my God.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  chosen: For
  alternatives:
  - Because
  lexicon: HALOT
  rationale: Introduces the reason for the preceding statement in the song. 'For' fits the explanatory force in English poetic discourse.
- source_word: שָׁמַרְתִּי
  chosen: I have kept
  alternatives:
  - I kept
  - I have observed
  lexicon: HALOT
  rationale: שׁמר commonly means 'keep, observe, guard.' 'Have kept' reflects the perfect as a completed pattern with present relevance in this poetic context.
- source_word: דַּרְכֵי
  chosen: the ways
  alternatives:
  - the paths
  - the ways of life
  lexicon: HALOT
  rationale: Plural construct of דֶּרֶךְ is idiomatic for manner of conduct or prescribed ways. 'Ways' is the most natural and established rendering here.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives: []
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: וְלֹא
  chosen: and have not
  alternatives:
  - and did not
  lexicon: HALOT
  rationale: Coordinates the second clause negatively; 'have not' matches the aspectual choice made in the first verb for smooth parallelism.
- source_word: רָשַׁעְתִּי
  chosen: acted wickedly by turning from
  alternatives:
  - been wicked toward
  - done wickedly against
  - departed wickedly from
  lexicon: HALOT
  rationale: The verb רשע means 'to act wickedly, be guilty/wicked.' With the preposition מִן attached to 'my God,' the sense is not merely abstract wickedness but wicked action expressed in turning away from God. The English expansion makes explicit the relational force carried by the Hebrew construction without over-paraphrasing.
- source_word: מֵאֱלֹהָי
  chosen: from my God
  alternatives:
  - against my God
  lexicon: HALOT
  rationale: The preposition מִן most naturally means 'from,' indicating separation or departure. 'Against' is possible interpretively, but 'from my God' better preserves the Hebrew wording and the covenantal relational nuance.
