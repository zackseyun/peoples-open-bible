    issue: «fragancias agradables» no refleja tan bien la fórmula sacrificial רֵיחַ נִיחוֹחַ
    rationale: En español bíblico/cultual, «aroma(s) agradable(s)/grato(s)» comunica mejor el trasfondo sacrificial. «Fragancias» suena más cosmético que ritual.
  - severity: medium
