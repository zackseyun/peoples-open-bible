  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Porteros» es aceptable para θυρωροὶ en contexto templario, aunque «guardianes de las puertas» también sería posible. «Levitas» está bien. No se observan problemas teológicos ni de nombres sagrados en este versículo.
