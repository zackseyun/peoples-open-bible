  rationale: 'Se corrige el español para seguir la decisión auditada del POB: mantener la primera cola con su dificultad hebrea, pero con una formulación española legible, y devolver las dos cláusulas finales al sentido matrimonial del hebreo que la versión inglesa adoptó. La alternativa griega se conserva en notas, no en el texto principal. También se normaliza el español de la nota y se mejora la naturalidad de la frase sobre el sueño.'
