translation:
  language: es
  text: para Hilcías[a], Hashabías; para Jedaías, Netanel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Hilcías ... de Jedaías». La preposición hebrea ל puede denotar asociación o representación en esta lista.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְ/חִלְקִיָּה
  english_pob_choice: for Hilkiah
  chosen_spanish: para Hilcías
  alternatives_spanish:
  - de Hilcías
  - perteneciente a Hilcías
  lexicon: HALOT
  rationale: El prefijo ל en esta lista señala asociación o representación, no posesión estricta. En español, «para» conserva mejor la función relacional y la forma breve de la lista, sin convertirla en una construcción más pesada como «de».
- source_word: חֲשַׁבְיָה
  english_pob_choice: Hashabiah
  chosen_spanish: Hasabías
  alternatives_spanish:
  - Hashabías
  lexicon: HALOT
  rationale: Es un nombre propio. Se translitera en forma natural para español; se prefiere «Hasabías» como adaptación habitual y legible en español, manteniendo la referencia inequívoca al nombre hebreo.
- source_word: לִֽ/ידַֽעְיָה
  english_pob_choice: for Jedaiah
  chosen_spanish: para Jedaías
  alternatives_spanish:
  - de Jedaías
  - perteneciente a Jedaías
  lexicon: HALOT
  rationale: Como en la primera frase, el ל introduce relación o representación dentro de la lista. «Para» reproduce esa función de manera idiomática en español y conserva el paralelismo con la línea anterior.
- source_word: נְתַנְאֵל
  english_pob_choice: Nethanel
  chosen_spanish: Netanel
  alternatives_spanish:
  - Netanel
  - Natanael
  lexicon: HALOT
  rationale: Nombre propio transliterado. «Netanel» sigue de cerca la forma hebrea y es suficientemente transparente en español, sin sustituirlo por una forma más familiar que podría desdibujar la lista nominativa.
theological_decisions:
- issue: Valor del prefijo ל en una lista de nombres
  english_pob_reading: The Hebrew preposition ל may denote association or representation in this list.
  chosen_spanish_reading: La preposición hebrea ל puede denotar asociación o representación en esta lista.
  alternative_spanish_readings:
  - La preposición ל puede indicar pertenencia.
  - La preposición ל puede indicar relación con.
  rationale: No se trata de una posesión simple; el contexto de la lista permite una relación representativa o asociativa. La redacción española conserva esa tensión y evita cerrar el sentido de manera excesiva.
  doctrine_reference: Nehemías 12:21; función listativa/representativa del hebreo ל
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del texto fuente: no hubo cambios necesarios y el acuerdo de la auditoría fue alto.'
  spanish_consistency_notes:
