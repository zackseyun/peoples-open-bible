  to: Entonces se abrió una brecha en la ciudad, y todos los hombres de guerra huyeron de noche por el camino de la puerta entre los dos muros, que estaba junto al jardín del rey; y los caldeos rodeaban la ciudad por todos lados[a]; y el rey[b] fue por el camino del Arabá[c].
  rationale: Se reemplaza «fue brechada» por «se abrió una brecha en la ciudad» para expresar con español natural el sentido militar de וַתִּבָּקַע sin perder la imagen de asedio. Se elimina la nota explicativa sobre «brechada» porque ya no es necesaria una defensa metalingüística de un término extraño. Se añade la nota sobre el sujeto implícito de וַיֵּלֶךְ, en continuidad con el rastro auditado en inglés. También se mejora la fluidez con «rodeaban la ciudad por todos lados».
