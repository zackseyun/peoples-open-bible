    rationale: El texto griego simplemente dice Κυρίῳ τῷ θεῷ ἡμῶν. En esta línea no hay razón especial para una nota de fuente sobre κύριος, y la nota puede crear tensión superflua con la política del proyecto sobre Yahvé sin aportar claridad exegética.
  - severity: low
