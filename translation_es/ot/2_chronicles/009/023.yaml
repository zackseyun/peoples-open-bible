translation:
  language: es
  text: Y todos los reyes de la tierra buscaban la presencia de Salomón[a], para oír su sabiduría que Dios había puesto en su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «buscaban el rostro de Salomón», un modismo para buscar su presencia o audiencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכֹל
  english_pob_choice: And all
  chosen_spanish: Y todos
  alternatives_spanish:
  - Ahora todos
  lexicon: HALOT
  rationale: La conjunción y el cuantificador continúan naturalmente la narración. «Y todos» conserva la continuidad y suena natural en español.
- source_word: מַלְכֵי הָאָרֶץ
  english_pob_choice: the kings of the earth
  chosen_spanish: los reyes de la tierra
  alternatives_spanish:
  - los reyes del país
  - los reyes del mundo
  lexicon: HALOT
  rationale: «אָרֶץ» puede significar tierra o país, pero aquí el contexto internacional de la fama de Salomón favorece «tierra», que además reproduce bien el giro idiomático.
- source_word: מְבַקְשִׁים אֶת־פְּנֵי
  english_pob_choice: sought the presence of
  chosen_spanish: buscaban el rostro de
  alternatives_spanish:
  - buscaban la presencia de
  - solicitaban audiencia con
  lexicon: HALOT
  rationale: El hebreo usa un modismo literal, «buscar el rostro de», que puede significar buscar acceso o audiencia. En español, «buscaban el rostro de» conserva la imagen; la nota explica el valor idiomático.
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: standard proper name
  rationale: Es el nombre propio usual en español bíblico; «Salomón» es la forma establecida y clara.
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Oír» sigue de cerca el valor directo del verbo y funciona bien con «sabiduría».
- source_word: חָכְמָתוֹ
  english_pob_choice: his wisdom
  chosen_spanish: su sabiduría
  alternatives_spanish:
  - su sabiduría e inteligencia
  lexicon: HALOT
  rationale: «חָכְמָה» es «sabiduría»; no hay razón para expandirla. El posesivo se mantiene de modo directo.
- source_word: אֲשֶׁר נָתַן הָאֱלֹהִים
  english_pob_choice: that God had put
  chosen_spanish: que Dios había puesto
  alternatives_spanish:
  - que Dios le había dado
  - que Dios había concedido
  lexicon: HALOT
  rationale: Aunque «נתן» significa «dar», el contexto con «en su corazón» favorece en español «poner», como hizo la traducción inglesa, para preservar la idea de una sabiduría implantada en el interior.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: En español bíblico normal se omite el artículo con el único referente divino. «Dios» es la forma más natural y fiel aquí.
- source_word: בְּלִבּוֹ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en su mente
  - en su interior
  lexicon: HALOT
  rationale: «לֵב» abarca el centro interior de la persona, pero «corazón» preserva mejor la antropología bíblica que «mente». «En su corazón» es idiomático y fiel.
theological_decisions:
- issue: La sabiduría de Salomón como don divino interior
  english_pob_reading: that God had put in his heart
  chosen_spanish_reading: que Dios había puesto en su corazón
  alternative_spanish_readings:
  - que Dios le había dado
  - que Dios había concedido
  rationale: La frase mantiene la atribución explícita de la sabiduría a la acción de Dios y conserva la imagen bíblica del corazón como centro interior de la persona. Evita reducir el texto a una concesión abstracta sin referencia al interior.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Modismo hebreo «buscar el rostro de»
  english_pob_reading: sought the presence of Solomon
  chosen_spanish_reading: buscaban el rostro de Salomón
  alternative_spanish_readings:
  - buscaban la presencia de Salomón
  - solicitaban audiencia con Salomón
  rationale: Se preserva la metáfora hebrea «rostro» y se aclara en nota su sentido de presencia o audiencia. Así no se borra la tensión entre literalidad e idiomatismo que el texto original presenta.
  doctrine_reference: Translation philosophy §§2, 4
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió «sought» por una equivalencia más natural sin perder el matiz del hebreo. En español se refleja esa misma decisión con un pretérito imperfecto de valor durativo, «buscaban», porque el contexto sugiere una búsqueda repetida o continuada; se conserva además «el rostro de Salomón» para mantener el modismo señalado en la nota.
  spanish_consistency_notes:
  - Se usó «Dios» sin artículo, conforme al uso normal en español para el referente divino único.
  - Se mantuvo «corazón» y no «mente» para no aplanar el lenguaje antropológico bíblico.
  - Se evitó «SEÑOR» porque el hebreo aquí dice הָאֱלֹהִים, no el nombre divino.
  - «Buscaban» conserva el aspecto progresivo implícito del participio hebreo mejor que un simple pretérito puntual.
