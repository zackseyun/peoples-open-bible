translation:
  language: es
  text: Talló[a] querubines, palmeras y flores abiertas[b], y los revistió de oro[c], aplicado uniformemente sobre la obra tallada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grabó» o «esculpió» para «Talló».
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea traducida «flores abiertas» designa ornamentación floral, quizá flores en flor o brotes.
    reason: lexical_alternative
  - marker: c
    text: O «y lo revistió de oro, aplicado uniformemente sobre la obra tallada». La cláusula final es difícil y describe el oro como cuidadosamente ajustado a la superficie tallada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְקָלַע
  english_pob_choice: He carved
  chosen_spanish: Talló
  alternatives_spanish:
  - Grabó
  - Esculpió
  lexicon: HALOT
  rationale: En este contexto de decoración del templo, el verbo describe trabajo ornamental sobre madera o superficie tallada. «Talló» es natural en español y conserva la idea de dar forma mediante talla; no reduce el término a una sola técnica moderna.
- source_word: כְּרוּבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines alados
  - querubines
  lexicon: HALOT
  rationale: Se conserva el término bíblico tradicional en español como nombre de estos seres asociados al trono divino. «Querubines» mantiene el sentido técnico sin sustituirlo por una imagen devocional posterior.
- source_word: וְתִמֹרוֹת
  english_pob_choice: and palm trees
  chosen_spanish: palmeras
  alternatives_spanish:
  - figuras de palmeras
  - motivos de palmera
  lexicon: HALOT
  rationale: El sustantivo designa formas de palmera dentro del adorno arquitectónico. «Palmeras» es breve, claro y coherente con el campo decorativo del pasaje.
- source_word: וּפְטֻרֵי צִצִּים
  english_pob_choice: and open flowers
  chosen_spanish: flores abiertas
  alternatives_spanish:
  - flores abiertas
  - capullos abiertos
  - motivos florales
  lexicon: HALOT
  rationale: La expresión apunta a ornamentación floral, probablemente flores abiertas o en flor. «Flores abiertas» conserva la ambigüedad útil del hebreo sin forzar una precisión botánica que el texto no exige.
- source_word: וְצִפָּה זָהָב
  english_pob_choice: and overlaid them with gold
  chosen_spanish: y los revistió de oro
  alternatives_spanish:
  - y los cubrió de oro
  - y los plateó de oro
  lexicon: HALOT
  rationale: «Revestir» expresa bien el acto de cubrir una superficie con una capa de oro en lenguaje arquitectónico. En español resulta más natural que «superponer» y conserva el valor material del verbo.
- source_word: מְיֻשָּׁר
  english_pob_choice: applied evenly
  chosen_spanish: aplicado de manera uniforme
  alternatives_spanish:
  - aplicado uniformemente
  - nivelado
  - parejo
  lexicon: HALOT
  rationale: El participio comunica la idea de algo ajustado, nivelado o aplicado de forma pareja. «Aplicado de manera uniforme» sigue de cerca la revisión inglesa y evita perder la noción de distribución regular sobre la superficie.
- source_word: עַל הַמְּחֻקֶּה
  english_pob_choice: over the carved work
  chosen_spanish: sobre la obra tallada
  alternatives_spanish:
  - sobre la talla
  - sobre el trabajo tallado
  - sobre la superficie tallada
  lexicon: HALOT
  rationale: El término se refiere a lo que fue grabado o tallado. «Obra tallada» mantiene la referencia al trabajo artesanal y suena natural en español bíblico contemporáneo.
translation_notes:
  revision_awareness: La traducción inglesa fue revisada para pasar de «fitted over» a «applied evenly over» a fin de reflejar mejor מְיֻשָּׁר como algo hecho nivelado o aplicado de forma pareja. Por eso el español evita una simple idea de ajuste mecánico y opta por «aplicado de manera uniforme», manteniendo la relación con la obra tallada.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando el hebreo contiene el nombre divino; aquí no aparece.
  - Se mantiene el registro arquitectónico-artesanal con verbos como «talló», «revistió» y la frase nominal «obra tallada».
  - Se conserva la ambigüedad de la ornamentación floral sin especificar más de lo que el hebreo permite.
  - No se emplea terminología eclesiástica posterior que altere el sentido material del pasaje.
