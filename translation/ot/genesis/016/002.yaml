id: GEN.16.2
reference: Genesis 16:2
source:
  edition: WLC
  text: וַ/תֹּ֨אמֶר שָׂרַ֜י אֶל אַבְרָ֗ם הִנֵּה נָ֞א עֲצָרַ֤/נִי יְהוָה֙ מִ/לֶּ֔דֶת בֹּא נָא֙ אֶל שִׁפְחָתִ֔/י אוּלַ֥י אִבָּנֶ֖ה מִמֶּ֑/נָּה וַ/יִּשְׁמַ֥ע אַבְרָ֖ם לְ/ק֥וֹל שָׂרָֽי־־־־׃
translation:
  text: Then Sarai said to Abram[a], “Look now, Yahweh has kept me from bearing children. Please go in to my female slave; perhaps I will be built up through her.” And Abram listened to the voice of Sarai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, “perhaps I may obtain children through her” or “perhaps I may be established through her.” The Hebrew says, literally, “perhaps I will be built up from/through her.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  chosen: Then ... said
  alternatives:
  - And ... said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then' gives natural English narrative flow while preserving sequence.
- source_word: שָׂרַי
  chosen: Sarai
  rationale: Personal name is transliterated per project philosophy.
- source_word: הִנֵּה נָא
  chosen: Look now
  alternatives:
  - See now
  - Behold, please
  lexicon: HALOT
  rationale: Combines the deictic/interjection הִנֵּה with the particle נָא in readable modern English. 'Look now' preserves the attention-getting force without archaic 'behold.'
- source_word: עֲצָרַנִי
  chosen: has kept me from
  alternatives:
  - has restrained me from
  - has shut me up from
  lexicon: HALOT
  rationale: The verb עצר here expresses being withheld/prevented. 'Has kept me from' is idiomatic and accurately conveys divine prevention.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  rationale: Follows the project's default rendering for the divine name.
- source_word: מִלֶּדֶת
  chosen: from bearing children
  alternatives:
  - from giving birth
  - from bearing
  lexicon: HALOT
  rationale: The infinitive of ילד refers to childbearing. 'Bearing children' makes the sense explicit and natural in English.
- source_word: בֹּא נָא אֶל
  chosen: Please go in to
  alternatives:
  - Please come in to
  - Please have relations with
  lexicon: HALOT
  rationale: This idiom is a conventional euphemism for sexual union. 'Go in to' preserves the source idiom and remains understandable; 'please' renders נָא.
- source_word: שִׁפְחָתִי
  chosen: my female slave
  alternatives:
  - my slave girl
  - my maidservant
  - my servant-girl
  lexicon: HALOT
  rationale: שִׁפְחָה denotes a female slave/maidservant of lower status. 'Female slave' best preserves the bonded status, in line with the project's preference not to soften servile terms.
- source_word: אוּלַי
  chosen: perhaps
  alternatives:
  - maybe
  lexicon: HALOT
  rationale: Standard rendering of tentative hope.
- source_word: אִבָּנֶה מִמֶּנָּה
  chosen: I will be built up from her
  alternatives:
  - I will be built up through her
  - I may obtain children by her
  - I may be established through her
  lexicon: HALOT
  rationale: The Niphal of בנה is a wordplay likely referring metaphorically to being built up as a family/house through Hagar's childbearing. The more literal 'built up from her' preserves the metaphor and allows readers to sense the Hebrew imagery; the idiomatic childbearing sense is preserved in a footnote.
- source_word: וַיִּשְׁמַע ... לְקוֹל
  chosen: And ... listened to the voice of
  alternatives:
  - And ... obeyed
  - And ... listened to
  lexicon: HALOT
  rationale: The Hebrew idiom is literally 'listened to the voice of.' Retaining 'voice' preserves intertextual resonance with similar constructions elsewhere, while still being intelligible.
