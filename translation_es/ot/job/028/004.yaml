review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la lectura minera de la POB inglesa para פָּרַץ + נחל y preserva la dificultad del verso con notas. Sin embargo, cambia indebidamente el sujeto y el número en la segunda mitad: el hebreo y la POB inglesa pasan a un plural implícito (''olvidados... cuelgan... se balancean''), mientras que el español lo rehace como singular femenino referido a ''galería''. Eso reduce una ambigüedad importante y desalinea דלו / נעו, ambos 3cp, con la evidencia fuente.'
  spanish_quality_summary: El español es legible y digno, pero la cadena 'olvidada... cuelga... se balancea' suena sintácticamente forzada y menos natural que una formulación plural. 'Lejos de donde habita la gente' es aceptable, aunque 'lejos de donde vive la gente' sería un poco más idiomático; no es necesario cambiarlo. La revisión principal debe corregir concordancia, sujeto y fluidez en la escena minera.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones ''galería'', ''lejos de'', y ''los hombres'' son defendibles en contexto. El problema principal no es glosarial sino sintáctico-lexical: דלו / נעו deben mantenerse en plural, idealmente con un sujeto tácito humano, y la nota sobre ''olvidados por el pie'' debe concordar con esa lectura principal sin borrar la ambigüedad.'
  issues:
  - severity: high
    issue: Cambio de sujeto y número en la segunda mitad del verso
    rationale: הנשכחים, דלו, y נעו están en plural; la POB inglesa refleja 'forgotten ... they hang ... they sway'. El borrador español los convierte en singular femenino ('olvidada... cuelga... se balancea') refiriéndolos a 'galería', lo que altera el sentido probable y la imaginería de mineros suspendidos.
  - severity: medium
    issue: La nota [c] no corresponde bien al texto principal
    rationale: La nota [c] explica un verbo que puede significar 'estar suspendidos' o 'quedar colgados', pero el texto principal usa singular femenino y aplica la imagen a la galería. La relación entre nota y anclaje queda debilitada.
  - severity: low
    issue: La ambigüedad del referente en 'olvidados por el pie' podría conservarse mejor
    rationale: La POB mantiene la compresión del hebreo sin fijar del todo si se trata del lugar o de los trabajadores. Un plural impersonal/humano en español preserva mejor la escena sin eliminar del todo la dificultad.
  revised_spanish_text: Él abre una galería[a] lejos de donde habita la gente; olvidados por el pie[b], cuelgan lejos de los hombres[c], se balancean.
  revised_footnotes:
