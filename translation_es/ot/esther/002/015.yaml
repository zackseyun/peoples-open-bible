  to: Cuando llegó el turno de Ester —la hija de Abihail, tío de Mardoqueo, quien la había tomado como hija[a]— para entrar ante el rey, no pidió nada, sino solo lo que le indicó Hegai, el eunuco[b] del rey, guardián de las mujeres. Y Ester iba ganando favor ante los ojos de todos los que la veían.
  rationale: Se reubicó la nota [a] a la frase que realmente explica, se suavizó el calco «para sí» para lograr un español más natural sin perder el sentido adoptivo/filial, y se cambió «aconsejaba» por «indicó» para expresar mejor la recomendación concreta de Hegai en este contexto.
