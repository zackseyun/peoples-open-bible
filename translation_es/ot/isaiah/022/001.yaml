revisions:
- from: 'Un oráculo acerca del Valle de la Visión: ¿Qué te pasa ahora[a], que todos ustedes han subido a las azoteas?'
  to: 'Un oráculo acerca del Valle de la Visión: ¿Qué te pasa ahora[a], que todos los tuyos han subido a las azoteas?'
  rationale: Se revisa únicamente la expresión de כֻּלָּךְ para conservar mejor la personificación de la ciudad en singular y, a la vez, el sentido colectivo de sus habitantes. «Todos los tuyos» suena más natural y más fiel al hebreo que «todos ustedes» en este contexto.
