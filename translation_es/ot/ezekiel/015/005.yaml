base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/015/005.yaml
  text: Look[a], when it was whole, it was not made for any work. How much less, when the fire has consumed it and it is charred[c][b], can it still be made for any work?
  footnotes:
  - marker: a
    text: Or 'sound' or 'intact' for 'whole.' The Hebrew describes the wood before it has been damaged by fire.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew ''How much less,'' an argument from the lesser to the greater: if it was useless when intact, it is even less useful after being burned.'
    reason: lexical_alternative
  - marker: c
    text: Or 'scorched' for 'charred.'
    reason: lexical_alternative
