translation:
  language: es
  text: 'No te enojes demasiado, Yahvé, ni recuerdes la iniquidad[a] para siempre. Mira, por favor: todos nosotros somos tu pueblo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «culpa»; el hebreo עָוֹן puede referirse tanto a la mala acción como a la culpa que de ella resulta.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תִּקְצֹף
  english_pob_choice: Do not be ... angry
  chosen_spanish: No te enojes
  alternatives_spanish:
  - No te irrites
  - No estés airado
  - No te enfurezcas
  lexicon: HALOT
  rationale: La forma hebrea expresa una prohibición/petición de no entrar en ira. En español, «enojarse» comunica de manera natural la fuerza interpersonal del ruego sin sonar mecánico; mantiene el tono suplicante del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto fuente usa el Tetragrámaton; en la política del proyecto, se rinde como «Yahvé» para preservar el nombre propio del pacto y no sustituirlo por un título.
- source_word: עַד מְאֹד
  english_pob_choice: exceedingly
  chosen_spanish: demasiado
  alternatives_spanish:
  - muchísimo
  - en gran manera
  - excesivamente
  lexicon: HALOT
  rationale: La combinación intensifica la prohibición. «Demasiado» es breve y natural en español, y conserva la idea de exceso sin volver la frase pesada.
- source_word: וְאַל לָעַד תִּזְכֹּר עָוֹן
  english_pob_choice: and do not remember iniquity forever
  chosen_spanish: ni recuerdes la iniquidad para siempre
  alternatives_spanish:
  - ni guardes en memoria la iniquidad para siempre
  - ni recuerdes la culpa para siempre
  - ni tengas presente el pecado para siempre
  lexicon: HALOT
  rationale: 'זכר con עָוֹן aquí tiene un sentido forense: mantener culpabilidad/injusticia en cuenta. «Recordar la iniquidad» preserva la formulación bíblica y su peso judicial sin suavizarla.'
- source_word: עָוֹן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - culpa
  - maldad
  - pecado
  lexicon: HALOT
  rationale: «Iniquidad» reproduce mejor la densidad moral de עָוֹן que «pecado» o «culpa» solamente; mantiene el doble matiz de wrongdoing y culpabilidad.
- source_word: הֵן הַבֶּט נָא
  english_pob_choice: Look, please
  chosen_spanish: Mira, por favor
  alternatives_spanish:
  - Mira ahora, por favor
  - Mira, te ruego
  - Mira, por favor,
  lexicon: HALOT
  rationale: הֵן llama la atención y הַבֶּט נָא añade una súplica. «Mira, por favor» concentra ambos elementos en un español fluido y reverente.
- source_word: עַמְּךָ כֻלָּנוּ
  english_pob_choice: we are all your people
  chosen_spanish: todos nosotros somos tu pueblo
  alternatives_spanish:
  - todos somos tu pueblo
  - somos todos tu pueblo
  - somos tu pueblo, todos nosotros
  lexicon: HALOT
  rationale: 'El hebreo es nominal: «tu pueblo, todos nosotros». «Todos nosotros somos tu pueblo» conserva el énfasis colectivo y la relación de pertenencia del pacto.'
theological_decisions:
- issue: Rendering the divine name יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio del Dios de Israel, en coherencia con la directriz del proyecto y con el valor del Tetragrámaton en el texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of עָוֹן in a penitential prayer
  english_pob_reading: iniquity
  chosen_spanish_reading: iniquidad
  alternative_spanish_readings:
  - culpa
  - pecado
  rationale: En este contexto penitencial, «iniquidad» sostiene tanto el acto torcido como la responsabilidad moral que de él deriva, sin limitarlo a una sola faceta semántica.
  doctrine_reference: HALOT / covenant-judicial context
translation_notes:
  revision_awareness: Alineado con la última revisión indicada como sin cambios y con el resumen de alta concordancia; se corrigió la ancla de nota al incluir [a] en el texto español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se conserva «iniquidad» para עָוֹן por su densidad moral y judicial.
  - La petición doble se vierte con dos imperativos negativos en español, evitando un calco rígido.
  - «Mira, por favor» integra el deíctico הֵן y la súplica נא sin duplicación artificial.
