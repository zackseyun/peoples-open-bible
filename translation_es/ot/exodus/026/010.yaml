  text: וְ/עָשִׂ֜יתָ חֲמִשִּׁ֣ים לֻֽלָאֹ֗ת עַ֣ל שְׂפַ֤ת הַ/יְרִיעָה֙ הָֽ/אֶחָ֔ת הַ/קִּיצֹנָ֖ה בַּ/חֹבָ֑רֶת וַ/חֲמִשִּׁ֣ים לֻֽלָאֹ֗ת עַ֚ל שְׂפַ֣ת הַ/יְרִיעָ֔ה הַ/חֹבֶ֖רֶת הַ/שֵּׁנִֽית׃
base_translation:
  language: en
  yaml_path: translation/ot/exodus/026/010.yaml
  text: And you shall make fifty loops on the edge of the one curtain[a], the outermost in the first set, and fifty loops on the edge of the curtain in the second set.
  footnotes:
