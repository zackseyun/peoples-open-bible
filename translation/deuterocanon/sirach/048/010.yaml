theological_decisions:
- issue: Use of Hebrew and Greek witnesses in a surviving Hebrew Sirach verse with minor mismatch
  chosen_reading: Main translation follows the surviving Hebrew sense while using the Greek parallel to clarify obscure phrasing.
  alternative_readings:
  - 'A more formally Greek-based rendering: ''who was recorded for rebukes at appointed times'''
  - 'A more formally Hebrew-based rendering: ''who is written/appointed for the time'''
  rationale: PHILOSOPHY gives primacy to the Hebrew where Sirach survives in Hebrew, but the prompt requires the Greek parallel to be used as actual translation input. The opening clause is textually and lexically awkward in Hebrew, so the Greek helps confirm a sense of designation for future times without forcing a wooden rendering of either witness.
  doctrine_reference: 'PHILOSOPHY.md: Hebrew Sirach where it survives; Translation philosophy §1, §5'
- issue: Rendering the Malachi-like restoration formula without overinterpreting it
  chosen_reading: Retain the idiom 'turn the heart' rather than paraphrasing as full social reconciliation.
  alternative_readings:
  - reconcile fathers and children
  rationale: The verse echoes prophetic language associated with Elijah. Preserving the idiom maintains theological and intertextual tension and avoids importing a fuller interpretation than the text itself states.
  doctrine_reference: Translation philosophy §3
