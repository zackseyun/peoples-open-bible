translation:
  language: es
  text: Estaban emparejados[a] en la parte inferior, y juntos estaban completos[b] en su parte superior, hacia el aro único. Así lo hizo con ambos[c], para las dos esquinas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «correspondidos» o «gemelos» en la parte inferior; el hebreo subraya que las dos piezas correspondían estructuralmente.
    reason: lexical_alternative
  - marker: b
    text: O «íntegros» o «enteros» en su parte superior. La idea es que cada pieza estaba completamente unida o terminada desde abajo hasta arriba.
    reason: lexical_alternative
  - marker: c
    text: O «para las dos piezas de esquina». El hebreo dice literalmente «para las dos esquinas», probablemente en referencia a los marcos o tablones de las esquinas.
    reason: lexical_alternative
lexical_decisions:
- source_word: תוֹאֲמִם
  english_pob_choice: paired together
  chosen_spanish: emparejados
  alternatives_spanish:
  - pareados
  - gemelos
  - acoplados
  lexicon: HALOT
  rationale: El hebreo enfatiza correspondencia estructural entre dos piezas. "Emparejados" comunica bien la relación de par sin forzar un tecnicismo; evita "gemelos", que suena más natural a personas que a piezas arquitectónicas.
- source_word: מִלְּמַטָּה
  english_pob_choice: at the bottom
  chosen_spanish: por abajo
  alternatives_spanish:
  - en la parte inferior
  - desde abajo
  - abajo
  lexicon: HALOT
  rationale: La expresión sitúa el punto de correspondencia en la base. "Por abajo" mantiene claridad espacial y fluidez en español, con menor rigidez que una traducción demasiado literal.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - en conjunto
  lexicon: HALOT
  rationale: Se conserva el énfasis adverbial del hebreo. "Juntos" es la forma más natural y directa en español.
- source_word: תַמִּים
  english_pob_choice: complete
  chosen_spanish: completos
  alternatives_spanish:
  - enteros
  - íntegros
  - acabados
  lexicon: HALOT
  rationale: Aquí el adjetivo describe una pieza unida o terminada de modo íntegro desde abajo hasta arriba. "Completos" preserva la idea de plenitud estructural sin confundirla con la primera palabra de correspondencia.
- source_word: אֶל רֹאשׁוֹ
  english_pob_choice: at its top
  chosen_spanish: en su parte superior
  alternatives_spanish:
  - hasta su parte superior
  - en la cima
  - hasta arriba
  lexicon: HALOT
  rationale: La frase indica la extensión hacia el extremo superior de la pieza. "En su parte superior" es una forma clara y natural en español arquitectónico.
- source_word: הַטַּבַּעַת הָאֶחָת
  english_pob_choice: the one ring
  chosen_spanish: el único aro
  alternatives_spanish:
  - el aro único
  - el primer aro
  - el solo aro
  lexicon: HALOT
  rationale: En contexto de herraje/tabernáculo, "aro" es más natural que "anillo". "El único aro" conserva la singularidad marcada por el hebreo sin añadir una interpretación como "primer".
- source_word: כֵּן עָשָׂה
  english_pob_choice: Thus he did
  chosen_spanish: Así hizo
  alternatives_spanish:
  - De este modo hizo
  - Así lo hizo
  lexicon: HALOT
  rationale: La fórmula resumen sigue el registro narrativo y constructivo del hebreo. Se mantiene la tersura formal de la revisión inglesa reciente.
- source_word: לִשְׁנֵיהֶם
  english_pob_choice: for both of them
  chosen_spanish: para ambos
  alternatives_spanish:
  - para los dos
  - para ambos de ellos
  lexicon: HALOT
  rationale: Se refiere a las dos piezas correspondientes. "Para ambos" es conciso y evita redundancia.
- source_word: לִשְׁנֵי הַמִּקְצֹעֹת
  english_pob_choice: for the two corners
  chosen_spanish: para las dos esquinas
  alternatives_spanish:
  - para las dos piezas de esquina
  - para los dos ángulos
  lexicon: HALOT
  rationale: '"Esquinas" preserva el sentido espacial básico de מִקְצֹעֹת y es comprensible en español. "Piezas de esquina" sería más interpretativo y solo sería necesario en nota.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión inglesa más reciente: se evita una repetición innecesaria tras el verbo de correspondencia, se expresa de modo más natural la extensión hacia la parte superior y se conserva el tono formal de resumen narrativo. También se ajusta terminología para español bíblico claro, especialmente en el objeto de metal como «aro».'
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» según corresponda, aunque este versículo no contiene el nombre divino.
  - Se usa «aro» para טַבַּעַת en un contexto artesanal-tabernacular, por ser más idiomático que «anillo» en español.
  - Se conserva la distinción entre correspondencia estructural («emparejados») y plenitud constructiva («completos»), como en el hebreo y el audit trail inglés.
