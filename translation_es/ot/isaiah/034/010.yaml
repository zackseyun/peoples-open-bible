translation:
  language: es
  text: De noche y de día no se apagará; su humo subirá para siempre. De generación en generación quedará devastada[a]; por los siglos de los siglos no pasará nadie por ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quedará desolada». El verbo hebreo puede expresar quedar devastada o quedar desolada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַיְלָה וְיוֹמָם
  english_pob_choice: Night and day
  chosen_spanish: De noche y de día
  alternatives_spanish:
  - De noche y de día
  - Noche y día
  - By night and by day
  lexicon: HALOT
  rationale: La expresión hebrea es un merismo de duración continua. «De noche y de día» mantiene ese valor de continuidad en un español natural, sin perder el paralelismo temporal.
- source_word: לֹא תִכְבֶּה
  english_pob_choice: it shall not be quenched
  chosen_spanish: no se apagará
  alternatives_spanish:
  - no será apagado
  - no se extinguirá
  - no se sofocará
  lexicon: HALOT
  rationale: כבה en este contexto se refiere a fuego que se apaga. «No se apagará» es idiomático en español y conserva la imagen de una llama que no llega a extinguirse.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para siempre
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: עוֹלָם expresa duración indefinida. «Para siempre» es la forma más natural y directa en español, sin suavizar la fuerza temporal del hebreo.
- source_word: יַעֲלֶה עֲשָׁנָהּ
  english_pob_choice: its smoke shall go up
  chosen_spanish: su humo subirá
  alternatives_spanish:
  - su humo subirá
  - subirá su humo
  - su humo se alzará
  lexicon: HALOT
  rationale: עלה con עשן es una combinación estable para humo que asciende. «Su humo subirá» refleja bien el hebreo y evita una personificación innecesaria.
- source_word: מִדּוֹר לָדוֹר
  english_pob_choice: From generation to generation
  chosen_spanish: De generación en generación
  alternatives_spanish:
  - De generación en generación
  - De una generación a otra
  lexicon: HALOT
  rationale: Es una fórmula fija de continuidad sucesiva. La opción elegida es la más natural y reconocible en español bíblico contemporáneo.
- source_word: תֶּחֱרָב
  english_pob_choice: it shall lie waste
  chosen_spanish: quedará devastada
  alternatives_spanish:
  - quedará devastada
  - quedará desolada
  - será arruinada
  lexicon: HALOT
  rationale: חרב puede expresar quedar en ruina o desolación. «Quedará devastada» conserva el resultado de la acción y dialoga con el paralelo siguiente sobre la ausencia de tránsito.
- source_word: לְנֵצַח נְצָחִים
  english_pob_choice: forever and ever
  chosen_spanish: por los siglos de los siglos
  alternatives_spanish:
  - por los siglos de los siglos
  - para siempre y para siempre
  - por eternidades
  lexicon: HALOT
  rationale: La duplicación intensifica la perpetuidad. «Por los siglos de los siglos» es una equivalencia española estable para esa intensificación y preserva el énfasis retórico.
- source_word: אֵין עֹבֵר בָּהּ
  english_pob_choice: no one shall pass through it
  chosen_spanish: no pasará nadie por ella
  alternatives_spanish:
  - no pasará nadie por ella
  - nadie la atravesará
  - no habrá quien pase por ella
  lexicon: HALOT
  rationale: אֵין con participio expresa ausencia de transeúntes. «No pasará nadie por ella» transmite de forma clara el sentido resultante en español y mantiene el referente femenino implícito.
theological_decisions:
- issue: Lenguaje de duración en el oráculo de juicio
  english_pob_reading: Render the repeated duration terms straightforwardly as 'forever' and 'forever and ever' without softening them.
  chosen_spanish_reading: Traducir los términos de duración de manera directa como «para siempre» y «por los siglos de los siglos», sin atenuar su alcance.
  alternative_spanish_readings:
  - forzar un sentido de duración meramente larga como «por mucho tiempo»
  - interpretar el lenguaje como simple hipérbole y reducirlo en la traducción
  rationale: El hebreo acumula עוֹלָם y נֵצַח נְצָחִים para intensificar la permanencia. La traducción debe conservar esa tensión teológica y retórica, en vez de resolverla anticipadamente.
  doctrine_reference: Preservar la tensión teológica del texto profético sin domesticar el juicio.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el pasaje mantiene alto acuerdo con la auditoría inglesa y no se identificaron ajustes de fondo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino explícito.
  - Se traduce el paralelismo temporal y de duración con equivalencias españolas naturales, sin introducir interpretaciones ajenas al hebreo.
  - Se conserva el valor intensificador de las fórmulas de perpetuidad sin debilitarlas con paráfrasis.
  - El femenino singular de la referencia final se refleja con «ella», coherente con el sustantivo implícito del contexto del oráculo.
