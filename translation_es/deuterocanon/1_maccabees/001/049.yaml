translation:
  language: es
  text: para que olvidaran la ley y cambiaran todas las ordenanzas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con el resultado de que olvidaran la ley y cambiaran todos los estatutos». El griego ὥστε puede expresar finalidad o resultado; δικαιώματα también puede traducirse «estatutos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - con el resultado de que
  lexicon: LSJ
  rationale: En español, «para que» comunica con naturalidad la relación de resultado o propósito que introduce ὥστε, sin forzar una lectura exclusivamente final ni exclusivamente consecutiva.
- source_word: ἐπιλαθέσθαι
  english_pob_choice: might forget
  chosen_spanish: olvidaran
  alternatives_spanish:
  - olvidasen
  - se olvidaran
  lexicon: BDAG
  rationale: El infinitivo aoristo medio se vierte con un imperfecto de subjuntivo en la construcción dependiente. «Olvidaran» es natural y mantiene el sentido directo de olvidar la ley.
- source_word: τοῦ νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la Torá
  lexicon: LSJ
  rationale: «Ley» es la equivalencia transparente de νόμος en este contexto macabeo. «La Torá» explicita el referente judío, pero añade una transliteración que no está en el griego; la mayúscula no es necesaria para la precisión semántica.
- source_word: ἀλλάξαι
  english_pob_choice: change
  chosen_spanish: cambiar
  alternatives_spanish:
  - alterar
  - modificar
  lexicon: LSJ
  rationale: «Cambiar» reproduce de forma directa la idea de modificar lo existente. «Alterar» es posible, pero en español puede sonar menos natural y «modificar» suaviza demasiado el verbo.
- source_word: πάντα
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - todos los
  lexicon: LSJ
  rationale: «Todos» conserva el alcance total de πάντα y funciona bien con el sintagma plural en español.
- source_word: τὰ δικαιώματα
  english_pob_choice: the ordinances
  chosen_spanish: los estatutos
  alternatives_spanish:
  - las ordenanzas
  - los decretos
  lexicon: LSJ
  rationale: En griego bíblico, δικαιώματα puede referirse a prescripciones establecidas. «Estatutos» conserva el matiz jurídico-religioso con un término natural en español; «ordenanzas» también es viable, pero puede sonar más administrativo que covenantal.
theological_decisions:
- issue: Relación entre νόμος y el marco pactal judío
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la Ley
  - la Torá
  rationale: Se mantiene una traducción directa y sobria del sustantivo griego sin imponer una glosa interpretativa. «La ley» comunica la referencia a la ley judía/pactual sin añadir un término técnico no presente en el texto.
  doctrine_reference: Original-language primacy over translation tradition; readable modern Spanish
- issue: Sentido de δικαιώματα en contexto legal-religioso
  english_pob_reading: ordinances
  chosen_spanish_reading: estatutos
  alternative_spanish_readings:
  - ordenanzas
  - prescripciones
  rationale: El término griego apunta a disposiciones normativas establecidas. «Estatutos» preserva el peso normativo y religioso del pasaje sin reducirlo a edictos civiles.
  doctrine_reference: Consistency of key terms, or documented exception; readable modern Spanish
- issue: 'Valor de ὥστε: propósito o resultado'
  english_pob_reading: so that / with the result that
  chosen_spanish_reading: para que
  alternative_spanish_readings:
  - de modo que
  - con el resultado de que
  rationale: 'La construcción española permite reflejar la misma apertura semántica que el griego: puede leerse como finalidad o como resultado. No se decide más de lo que el texto griego obliga.'
  doctrine_reference: Preserve documented lexical/theological tension
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «alter» a «change» para ἀλλάξαι, manteniendo un tono formal. La redacción española adopta «cambiar» por la misma razón de directitud, y usa una nota para conservar la ambigüedad de ὥστε y la variación posible de δικαιώματα.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o mayúsculas teológicas no presentes en el griego; aquí no interviene el nombre divino.
  - Se mantiene un español claro y eclesialmente legible sin depender de formulaciones tradicionales ajenas al texto.
  - «Estatutos» se eligió para reflejar el valor normativo de δικαιώματα; en otras secciones, si el contexto lo exige, podría preferirse «ordenanzas».
