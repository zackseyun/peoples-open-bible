revisions:
- from: Y aconteció en el día en que Yahvé habló a Moisés en la tierra de Egipto—[a][b]
  to: Y sucedió el día que Yahvé habló a Moisés en la tierra de Egipto—[a][b]
  rationale: Se suaviza el arranque narrativo para evitar un arcaísmo innecesario en español, en línea con la filosofía auditada del inglés, mientras se conserva la estructura temporal y el resto de las decisiones léxicas fieles al hebreo.
