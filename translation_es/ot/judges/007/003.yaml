translation:
  language: es
  text: 'Ahora, por favor, proclama a oídos del pueblo, diciendo: «El que tenga miedo y tiemble, que regrese y se retire[a] del monte de Galaad». Entonces regresaron veintidós mil del pueblo[b], y quedaron diez mil.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo traducido «se retire» (וְיִצְפֹּר) es poco común y discutido; puede implicar «irse temprano» o «escabullirse».
    reason: lexical_alternative
  - marker: b
    text: «Monte de Galaad» es una traducción directa del hebreo; el referente geográfico es difícil en este contexto, y algunos lo entienden de manera más amplia como la región montañosa de Galaad.
    reason: cultural_note
lexical_decisions:
- source_word: קְרָא נָא
  english_pob_choice: please proclaim
  chosen_spanish: por favor proclama
  alternatives_spanish:
  - anuncia, por favor
  - llama, por favor
  lexicon: HALOT
  rationale: קרא con נָא expresa una orden pública con cortesía o insistencia. «Proclama» mantiene el carácter formal y público mejor que «llama», y «por favor» refleja bien נָא sin sonar excesivamente coloquial.
- source_word: בְּאָזְנֵי הָעָם
  english_pob_choice: in the hearing of the people
  chosen_spanish: a oídos del pueblo
  alternatives_spanish:
  - en los oídos del pueblo
  - al pueblo
  lexicon: HALOT
  rationale: El hebreo es idiomático, literalmente «en los oídos de». En español, «a oídos del pueblo» conserva la imagen auditiva y la publicidad del anuncio con naturalidad.
- source_word: מִי יָרֵא וְחָרֵד
  english_pob_choice: Whoever is fearful and trembling
  chosen_spanish: ¿Quién teme y tiembla?
  alternatives_spanish:
  - ¿Quién es temeroso y tembloroso?
  - ¿Quién tiene miedo y tiembla?
  lexicon: HALOT
  rationale: 'La pareja verbal intensifica el temor y la reacción física. En español, la pregunta directa con verbos finitos suena más natural y conserva la fuerza: «teme y tiembla».'
- source_word: יָשֹׁב
  english_pob_choice: let him return
  chosen_spanish: que regrese
  alternatives_spanish:
  - que vuelva
  - que retorne
  lexicon: HALOT
  rationale: El jussivo expresa una directiva/permisión. «Que regrese» comunica bien la orden en español moderno sin añadir matices ajenos.
- source_word: וְיִצְפֹּר
  english_pob_choice: and depart
  chosen_spanish: y se aparte
  alternatives_spanish:
  - y salga
  - y se retire
  - y parta
  lexicon: HALOT
  rationale: El verbo hebreo es raro y debatido; la POB inglesa opta por un sentido general de apartarse/irse. «Se aparte» mantiene esa cautela semántica y evita precisar indebidamente «salir temprano» o «escaparse».
- source_word: מֵהַר הַגִּלְעָד
  english_pob_choice: from Mount Gilead
  chosen_spanish: del monte de Galaad
  alternatives_spanish:
  - del monte Galaad
  - de la sierra de Galaad
  - de la región montañosa de Galaad
  lexicon: HALOT
  rationale: «Monte» es un equivalente natural de הַר en este contexto y conserva la referencia geográfica directa. Se usa «Galaad» como forma española común del topónimo.
- source_word: וַיָּשָׁב מִן הָעָם
  english_pob_choice: Then twenty-two thousand of the people returned
  chosen_spanish: Entonces regresaron del pueblo veintidós mil
  alternatives_spanish:
  - Entonces volvieron del pueblo veintidós mil
  - Y regresaron de entre el pueblo veintidós mil
  lexicon: HALOT
  rationale: 'El hebreo presenta una construcción colectiva con verbo singular y numeración. En español, se hace natural con plural: «regresaron». «Del pueblo» reproduce de manera breve la idea de salida del grupo.'
- source_word: עֶשְׂרִים וּשְׁנַיִם אֶלֶף
  english_pob_choice: twenty-two thousand
  chosen_spanish: veintidós mil
  alternatives_spanish:
  - veinte y dos mil
  lexicon: HALOT
  rationale: Es la forma numérica estándar y más legible en español contemporáneo.
- source_word: וַעֲשֶׂרֶת אֲלָפִים נִשְׁאָרוּ
  english_pob_choice: and ten thousand remained
  chosen_spanish: y quedaron diez mil
  alternatives_spanish:
  - y permanecieron diez mil
  - y se quedaron diez mil
  lexicon: HALOT
  rationale: נִשְׁאָרוּ significa «quedaron / permanecieron». «Quedaron» es breve, natural y narrativo en español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el sentido del hebreo WLC y el criterio del POB inglés: anuncio público, temor intensificado, verbo raro traducido con cautela, y el resultado numérico expresado de forma natural en español. No se introducen revisiones textuales ni cambios doctrinales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se usó «Galaad» como forma española estable del topónimo.
  - Se evitó «SEÑOR» y «Cristo» por no corresponder al versículo.
  - La puntuación y las comillas siguen norma española y la frase directa respeta el tono imperativo del hebreo.
