base_translation:
  language: en
  yaml_path: translation/nt/matthew/004/004.yaml
  text: 'But he answered[a], “It is written: ‘Man will not live by bread alone[b], but by every word that proceeds from the mouth of God.’”'
  footnotes:
  - marker: a
    text: Or “the human being”; the Greek uses a masculine singular form with representative force, referring to humanity generally.
    reason: lexical_alternative
  - marker: b
    text: Many English translations read “from the mouth of God.” The Greek here is literally “through the mouth of God,” preserving the image of every spoken word that comes by God's utterance.
    reason: lexical_alternative
