translation:
  language: es
  text: Bendigan al Señor, espíritus y almas de los justos; canten himnos y exáltenlo en gran manera para siempre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «por los siglos»; la fórmula es una expresión doxológica estándar de duración permanente. O «para las edades».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendecid
  alternatives_spanish:
  - Bendigan
  - Alabad
  lexicon: BDAG
  rationale: El imperativo plural conserva el tono litúrgico y exhortativo de εὐλογεῖτε. Se eligió «Bendecid» para mantener la misma fuerza doxológica que el inglés POB «Bless», sin reducirlo al más genérico «alabad».
- source_word: πνεύματα
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - seres espirituales
  lexicon: BDAG
  rationale: El sustantivo se mantiene en su sentido ordinario de «espíritus», en paralelo con ψυχαί. «Seres espirituales» interpretaría más de lo que el griego expresa.
- source_word: ψυχαὶ
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - personas
  lexicon: BDAG
  rationale: «Almas» es el equivalente más transparente y natural en español para ψυχαί en esta pareja expresa con «espíritus». Conserva la distinción deliberada del griego.
- source_word: δικαίων
  english_pob_choice: of the righteous
  chosen_spanish: de los justos
  alternatives_spanish:
  - de los rectos
  - de los justos y rectos
  lexicon: BDAG
  rationale: El genitivo modifica tanto a «espíritus» como a «almas». «Los justos» es idiomático en español bíblico y conserva el sentido moral-religioso sin tecnicismo innecesario.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Dueño
  lexicon: BDAG
  rationale: En este contexto litúrgico judío-griego, κύριος se traduce con el equivalente reverente habitual «Señor». La preposición «al» refleja el objeto directo de la exhortación.
- source_word: ὑμνεῖτε
  english_pob_choice: sing hymns
  chosen_spanish: entonad himnos
  alternatives_spanish:
  - cantad himnos
  - cantad alabanzas
  lexicon: BDAG
  rationale: El verbo alude específicamente al canto hímnico. «Entonad himnos» preserva mejor que «cantad alabanzas» el matiz musical-litúrgico señalado en el auditable inglés.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: exaltadlo sobre toda medida
  alternatives_spanish:
  - exaltadlo grandemente
  - levantadlo en alto
  lexicon: BDAG
  rationale: El compuesto intensifica la elevación/exaltación. «Sobre toda medida» comunica en español la sobreelevación enfática y evita una repetición demasiado plana con «exaltad».
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por toda la eternidad
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por «forever» como equivalencia dinámica, el griego dice literalmente «para los siglos». «Por los siglos» conserva la fórmula doxológica y su resonancia bíblica sin perder inteligibilidad.
theological_decisions:
- issue: Pareja antropológica «espíritus y almas»
  english_pob_reading: 'Retain both terms distinctly: ''spirits and souls of the righteous.'''
  chosen_spanish_reading: 'Mantener ambos términos de manera distinta: «espíritus y almas de los justos».'
  alternative_spanish_readings:
  - «almas de los justos» como paráfrasis unificadora
  - «personas justas» como equivalencia dinámica
  rationale: El griego nombra explícitamente πνεύματα y ψυχαί. La traducción española conserva la duplicidad sin resolverla doctrinalmente, manteniendo la tensión antropológica documentada por el POB inglés.
  doctrine_reference: Preservar la tensión teológica sin armonizarla artificialmente.
translation_notes:
  revision_awareness: El texto griego y la capa de traducción auditada concuerdan de forma alta; no se registran revisiones sustantivas en el pasaje. Se conserva la distinción antropológica y la fórmula doxológica sin cambios respecto del sentido base auditado.
  spanish_consistency_notes:
  - Se mantuvo «Señor» como traducción de κύριος en este contexto litúrgico, conforme al uso base del proyecto para esta lectura.
  - Se prefirió «por los siglos» para reflejar con mayor literalidad la fórmula final griega, aunque el inglés POB la parafrasea como «forever».
  - «Entonad himnos» conserva el matiz de canto explícito de ὑμνεῖτε mejor que un simple «alabad».
