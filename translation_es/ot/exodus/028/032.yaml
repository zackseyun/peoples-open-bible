  english_pob_reading: No theological decision noted in the English audit trail for this verse.
  chosen_spanish_reading: Sin decisión teológica especial en el texto; se mantiene una descripción técnica de la prenda.
  alternative_spanish_readings:
  - —
  rationale: El versículo es de descripción cultual y no presenta una variante doctrinal o confesional que requiera resolución teológica adicional.
  doctrine_reference: No aplica
translation_notes:
  revision_awareness: El texto inglés auditado revisó 'woven binding' a 'woven edge' para una correspondencia más estrecha con el valor de ‘borde/labio’ de שָׂפָה. La versión española refleja esa revisión con 'borde tejido', manteniendo el matiz de remate reforzado sin cargarlo como una unión o costura específica.
  spanish_consistency_notes:
  - Se usó 'abertura' para פִּי en un contexto de prenda, evitando 'boca' por impropio en español.
  - Se eligió 'coraza' como equivalente amplio de תַחְרָא, pero se dejó nota con alternativas porque el término hebreo es raro y el tipo exacto de armadura no es seguro.
  - Se mantuvo una sintaxis fluida y directa, con ‘para que’ para expresar el resultado/propósito del cierre hebreo final.
  - No se introdujo ‘SEÑOR’ ni terminología litúrgica ajena, porque este versículo no lo requiere.
