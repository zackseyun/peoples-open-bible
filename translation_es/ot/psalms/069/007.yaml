translation:
  language: es
  text: No sean avergonzados por causa de mí los que esperan en ti[a], Señor Yahvé de los ejércitos[b]; no sean humillados por causa de mí los que te buscan, Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que te esperan». El participio hebreo puede expresar espera con esperanza confiada.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «Señor Yahvé de los ejércitos», que representa אֲדֹנָי יְהוָה צְבָאוֹת; alternativamente, «Señor DIOS de los ejércitos».
    reason: alternative_reading
lexical_decisions:
- source_word: יֵבֹשׁוּ
  english_pob_choice: be put to shame
  chosen_spanish: sean avergonzados
  alternatives_spanish:
  - sean puestos en vergüenza
  - queden avergonzados
  - sean humillados
  lexicon: HALOT
  rationale: El verbo בוש expresa vergüenza o deshonra experimentada. En español, «sean avergonzados» conserva el sentido pasivo/resultativo y suena natural en una súplica poética.
- source_word: בִי
  english_pob_choice: because of me
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - a causa de mí
  - por mí
  - a mi cuenta
  lexicon: HALOT
  rationale: La preposición con pronombre personal comunica aquí que el salmista pudiera ser la ocasión de la vergüenza ajena. «Por causa de mí» expresa bien la fuerza causal sin sonar mecánico.
- source_word: קֹוֶי/ךָ
  english_pob_choice: those who hope in you
  chosen_spanish: los que esperan en ti
  alternatives_spanish:
  - los que confían en ti
  - los que aguardan en ti
  - los que esperan por ti
  lexicon: HALOT
  rationale: El participio de קוה puede significar esperar con confianza o esperanza. En este contexto de oración, «esperan en ti» preserva la expectativa confiada y es idiomático en español bíblico actual.
- source_word: אֲדֹנָי יְהוָה צְבָאוֹת
  english_pob_choice: Lord Yahweh of hosts
  chosen_spanish: Señor Yahvé de los ejércitos
  alternatives_spanish:
  - Señor Yahvé de las huestes
  - Señor Yahvé Todopoderoso
  - Señor Yahvé de los ejércitos celestiales
  lexicon: HALOT
  rationale: Se mantiene «Yahvé» para יהוה según la convención del proyecto, y «de los ejércitos» para צְבָאוֹת, preservando el título hebreo sin sustituirlo por una paráfrasis como «Todopoderoso». «Señor» traduce אֲדֹנָי.
- source_word: יִכָּלְמוּ
  english_pob_choice: be humiliated
  chosen_spanish: sean humillados
  alternatives_spanish:
  - queden humillados
  - sean avergonzados
  - sean deshonrados
  lexicon: HALOT
  rationale: כלם puede intensificar el matiz de vergüenza hacia humillación o deshonra. Se traduce distinto de בוש para conservar el paralelismo poético y la ligera diferencia léxica.
- source_word: מְבַקְשֶׁיךָ
  english_pob_choice: those who seek you
  chosen_spanish: los que te buscan
  alternatives_spanish:
  - los que te buscan diligentemente
  - tus buscadores
  - los que te procuran
  lexicon: HALOT
  rationale: El participio de בקש denota búsqueda activa. «Los que te buscan» es natural, fiel y conserva el aspecto durativo de la forma participial.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - Oh Dios de Israel
  - Dios de Israel mismo
  lexicon: HALOT
  rationale: La construcción nominal identifica al Dios de Israel; en contexto funciona como vocativo. En español, «Dios de Israel» transmite la apelación sin añadir elementos no explicitados.
theological_decisions:
- issue: Cómo representar el Tetragrámaton יהוה en el título compuesto אֲדֹנָי יְהוָה
  english_pob_reading: Lord Yahweh of hosts
  chosen_spanish_reading: Señor Yahvé de los ejércitos
  alternative_spanish_readings:
  - Señor Yahvé
  - Señor el Yahvé de los ejércitos
  - Señor, Yahvé de los ejércitos
  rationale: Se sigue la directriz del proyecto de traducir יהוה como «Yahvé» en el texto principal, incluso dentro del compuesto con אֲדֹנָי. Así se preserva el nombre divino sin la convención de ocultarlo tras «SEÑOR» o «GOD».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Diferenciación entre los dos verbos de vergüenza
  english_pob_reading: be put to shame / be humiliated
  chosen_spanish_reading: sean avergonzados / sean humillados
  alternative_spanish_readings:
  - sean avergonzados / sean avergonzados
  - sean puestos en vergüenza / queden avergonzados
  - queden avergonzados / sean humillados
  rationale: El hebreo usa dos verbos emparentados pero no idénticos. Conservar dos verbos distintos en español evita aplanar el paralelismo y mantiene una leve progresión desde vergüenza hacia humillación.
  doctrine_reference: Poética hebrea y equivalencia léxica en salmos de súplica
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail al representar directamente el nombre divino יהוה como «Yahvé»; además mantiene la equivalencia óptima del borrador inglés en los dos paralelismos de vergüenza/humillación y en la rendición de los participios hebreos como acciones continuadas de esperanza y búsqueda.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה, conforme al estándar del proyecto.
  - «Señor» traduce אֲדֹנָי en el compuesto vocativo.
  - 'Se conserva el paralelismo poético con dos verbos distintos: «avergonzados» y «humillados».'
  - La preposición causal de בִי se expresa con «por causa de mí» para evitar un calco opaco.
  - Se mantiene el tono de súplica directa y culto, sin introducir «O» ni formulaciones arcaizantes innecesarias.
