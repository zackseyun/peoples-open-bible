translation:
  language: es
  text: Estos fueron los inscritos en el censo de las familias de los hijos de Gersón[a], todos los que servían en el tabernáculo de reunión, a quienes Moisés y Aarón contaron conforme al mandato de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estos son los inscritos en el censo de las familias de los hijos de Gersón, todos los que servían en el tabernáculo de reunión».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These were
  chosen_spanish: Estos fueron
  alternatives_spanish:
  - Estos son
  lexicon: HALOT
  rationale: La forma deíctica plural introduce un resumen de censo en pasado narrativo; «Estos fueron» reproduce bien esa referencia retrospectiva en español.
- source_word: פְקוּדֵי
  english_pob_choice: the counted men
  chosen_spanish: los contados
  alternatives_spanish:
  - los numerados
  - los inscritos
  - los contabilizados
  lexicon: HALOT
  rationale: En contexto censal, el participio pasivo de פקד señala a los que fueron contados. «Los contados» mantiene la concisión y la fuerza del registro administrativo sin añadir interpretación.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: the families
  chosen_spanish: las familias
  alternatives_spanish:
  - los clanes
  lexicon: HALOT
  rationale: «Familias» es una equivalencia clara y fiel para los grupos genealógicos israelitas; «clanes» sería posible, pero menos transparente para lectura eclesial amplia.
- source_word: בְּנֵי גֵרְשׁוֹן
  english_pob_choice: the sons of Gershon
  chosen_spanish: los hijos de Gersón
  alternatives_spanish:
  - los gersonitas
  lexicon: HALOT
  rationale: Se conserva la construcción de parentesco del hebreo. «Gersón» respeta la forma española del nombre propio y evita sustituir la estructura fuente por un gentilicio más interpretativo.
- source_word: כָּל הָעֹבֵד
  english_pob_choice: all who served
  chosen_spanish: todos los que servían
  alternatives_spanish:
  - todos los que trabajaban
  - todos los que ministraban
  lexicon: HALOT
  rationale: El participio expresa personas en servicio continuo; «servían» conserva ese matiz colectivo y la lectura natural en español. «Ministraban» introduciría un registro más eclesiástico no exigido por el hebreo.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en el tabernáculo de reunión
  alternatives_spanish:
  - en la tienda de reunión
  - en la tienda del encuentro
  lexicon: HALOT
  rationale: «Tabernáculo de reunión» es la designación bíblica tradicional en español para אֹהֶל מוֹעֵד y comunica de manera reconocible la unidad sagrada del santuario. «Tienda de reunión» sería más literal, pero menos idiomática para este contexto.
- source_word: אֲשֶׁר פָּקַד
  english_pob_choice: whom ... counted
  chosen_spanish: a quienes ... contaron
  alternatives_spanish:
  - que ... contaron
  - a quienes ... numeraron
  lexicon: HALOT
  rationale: El relativo vuelve a vincular al grupo censado con el acto de contar. «Contaron» mantiene la correspondencia con פקד en su sentido censal; el pronombre objeto evita ambigüedad en español.
- source_word: עַל פִּי יְהוָה
  english_pob_choice: at the command of Yahweh
  chosen_spanish: conforme al mandato de Yahvé
  alternatives_spanish:
  - por mandato de Yahvé
  - según el mandato de Yahvé
  - por la orden de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea «según la boca de Yahvé» funciona idiomáticamente como mandato divino. «Conforme al mandato de Yahvé» preserva la idea de autoridad recibida sin calcar una fórmula extraña al español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, preservando el Tetragrámaton como nombre propio y no como máscara litúrgica.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo contiene el nombre de pacto de Dios, no un título genérico. «Yahvé» conserva esa identidad nominal y evita ocultarla tras una sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de עַל פִּי יְהוָה
  english_pob_reading: at the command of Yahweh
  chosen_spanish_reading: conforme al mandato de Yahvé
  alternative_spanish_readings:
  - por la orden de Yahvé
  - según la palabra de Yahvé
  rationale: La locución hebrea indica autoridad normativa procedente de Yahvé. «Conforme al mandato» expresa esa dependencia obediente sin perder el carácter de orden divina.
  doctrine_reference: 'DOCTRINE.md Contested terms: divine command formulas'
translation_notes:
  revision_awareness: 'El inglés auditado pasó de una forma más literal (''everyone serving'') a una versión más natural (''all who served''). La redacción española sigue ese ajuste: conserva el sentido colectivo del participio hebreo, pero con sintaxis fluida y publicable. También se mantuvo la decisión consistente de traducir יְהוָה como «Yahvé».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para יְהוָה conforme al criterio del proyecto.
  - Se eligió «hijos de Gersón» en lugar de un gentilicio ('gersonitas') para conservar la construcción fuente.
  - «Tabernáculo de reunión» se usó como equivalente bíblico establecido de אֹהֶל מוֹעֵד.
  - El verbo «contaron» mantiene la repetición semántica de פקד en contexto censal.
