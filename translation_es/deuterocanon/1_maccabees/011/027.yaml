translation:
  language: es
  text: Y le confirmó el sumo sacerdocio[a], y los demás honores que antes tenía, y lo hizo figurar entre los primeros amigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los principales amigos». El griego probablemente refleja un rango cortesano formal en la administración seléucida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐστήρισεν
  english_pob_choice: confirmed
  chosen_spanish: le confirmó
  alternatives_spanish:
  - le estableció
  - le aseguró
  - le ratificó
  lexicon: LSJ
  rationale: En este contexto administrativo-político, el verbo expresa hacer firme o ratificar una dignidad ya concedida. «Le confirmó» comunica mejor la ratificación de un cargo que una nueva designación.
- source_word: ἀρχιερωσύνην
  english_pob_choice: the high priesthood
  chosen_spanish: el sumo sacerdocio
  alternatives_spanish:
  - el oficio de sumo sacerdote
  - la dignidad de sumo sacerdote
  lexicon: LSJ
  rationale: El sustantivo nombra el cargo o dignidad del sumo sacerdote. «El sumo sacerdocio» es natural en español y conserva el valor institucional del término.
- source_word: τίμια
  english_pob_choice: honors
  chosen_spanish: honores
  alternatives_spanish:
  - distinciones
  - privilegios
  - cosas de honor
  lexicon: LSJ
  rationale: Aquí el adjetivo funciona sustantivamente para bienes de honor o distinción previamente poseídos. «Honores» mantiene la referencia a rango y favor real sin volverlo material.
- source_word: τὸ πρότερον
  english_pob_choice: formerly
  chosen_spanish: antes
  alternatives_spanish:
  - anteriormente
  - antes de eso
  - en otro tiempo
  lexicon: LSJ
  rationale: La referencia temporal indica lo que tenía con anterioridad. «Antes» es breve y natural en español, y conserva la relación con una posesión previa.
- source_word: τῶν πρώτων φίλων
  english_pob_choice: among the first friends
  chosen_spanish: entre los primeros amigos
  alternatives_spanish:
  - entre los principales amigos
  - entre los amigos principales
  - entre los primeros consejeros
  lexicon: LSJ
  rationale: La expresión refleja un título cortesano helenístico. «Primeros amigos» preserva la forma del título y evita sustituirlo por una paraprástica más interpretativa.
- source_word: ἡγεῖσθαι
  english_pob_choice: rank
  chosen_spanish: ser contado
  alternatives_spanish:
  - ser considerado
  - ocupar rango
  - figurar
  lexicon: LSJ
  rationale: Con la construcción de acusativo y genitivo, el sentido es considerar o situar a alguien dentro de una clase. «Ser contado entre» transmite inclusión honorífica y jerárquica en un español claro.
theological_decisions:
- issue: Título cortesano seléucida y lenguaje de rango
  english_pob_reading: The Greek likely reflects a formal court rank in the Seleucid administration.
  chosen_spanish_reading: La expresión «los primeros amigos» se conserva como título cortesano, sin convertirla en una equivalencia libre.
  alternative_spanish_readings:
  - los amigos principales
  - los consejeros principales
  - la primera nobleza
  rationale: No se debe borrar el matiz técnico del griego. Mantener «primeros amigos» permite que el lector vea la forma del honor cortesano y, a la vez, admite la lectura institucional señalada en el aparato inglés.
  doctrine_reference: Lexical-historical note; no doctrinal issue.
translation_notes:
  revision_awareness: 'Coincide con el último control del texto fuente: no se registraron revisiones aplicadas y el estado de concordancia fue alto. La redacción española sigue la lectura confirmada sin introducir cambios interpretativos adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; aquí no aparece el Tetragrámaton.
  - «Sumo sacerdocio» conserva el cargo institucional del griego ἀρχιερωσύνην.
  - «Primeros amigos» mantiene la posible titulación cortesana documentada en el aparato inglés.
  - Se evita «SEÑOR» o una paráfrasis que diluya el rango administrativo del pasaje.
