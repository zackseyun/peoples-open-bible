- from: Y eligieron a cien hombres de entre ellos, y la escoltaron a ella y a su sirvienta, y las llevaron a la tienda de Holofernes.
  to: Y eligieron a cien hombres de entre ellos, y las escoltaron, a ella y a su criada, y las llevaron a la tienda de Holofernes.
  rationale: Se ajusta el español para que el verbo de escolta concuerde naturalmente con las dos mujeres mencionadas en el griego y se sustituye «sirvienta» por «criada», que suena más adecuado al registro narrativo bíblico sin cambiar el sentido.
