review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: fórmula narrativa, autoidentificación enfática de Daniel, búsqueda de comprensión, presentación vívida de la figura y descripción fenomenológica de su apariencia. Sin embargo, hay un ajuste menor necesario en la nota alternativa para alinearla más estrechamente con la alternativa inglesa y con el valor de עֹמֵד לְנֶגְדִּי, evitando «se puso» que añade un matiz ingresivo no presente en la alternativa auditada.'
  spanish_quality_summary: El texto es legible, digno y natural en español eclesial amplio. «Y aconteció», «he aquí» y «tenía la apariencia de un hombre» funcionan bien. «Buscaba entendimiento» es aceptable, aunque algo literal; no exige cambio. La única reparación conveniente es una nota al pie más precisa y menos interpretativa.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. «Hombre» para גבר y «visión» para חזון están bien alineados; la decisión teológica de no identificar a la figura más allá de su apariencia humana se preserva correctamente.
  issues:
  - severity: medium
    issue: La nota al pie usa «allí se puso delante de mí uno»
    rationale: La alternativa inglesa auditada es «there stood before me one like the appearance of a man». «Se puso» introduce un matiz de movimiento o cambio de posición que no es necesario en la alternativa y puede sobreinterpretar עֹמֵד. Conviene reformular la nota para reflejar mejor «había/estaba delante de mí uno…» o «estaba de pie delante de mí…».
  revised_spanish_text: Y aconteció[a], cuando yo, Daniel, había visto la visión y buscaba entendimiento, he aquí, uno que estaba delante de mí tenía la apariencia de un hombre.
  revised_footnotes:
  - marker: a
    text: 'O: «había delante de mí uno como con apariencia de hombre»; también: «estaba delante de mí uno con apariencia de hombre».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural, y se corrige únicamente la nota al pie para que refleje con más precisión la alternativa auditada y el valor descriptivo de la escena, sin añadir un matiz ingresivo no exigido por el hebreo.
