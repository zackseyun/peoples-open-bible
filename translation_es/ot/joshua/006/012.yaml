translation:
  language: es
  text: Josué se levantó temprano por la mañana, y los sacerdotes llevaron el arca de Yahvé[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el arca de Yahvé». El proyecto vierte el nombre divino יְהוָה como «Yahvé», no con la sustitución «el Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó temprano
  alternatives_spanish:
  - se levantó de madrugada
  - se levantó muy temprano
  lexicon: HALOT
  rationale: El hifil de שׁכם expresa la acción de levantarse o empezar temprano. En español, «se levantó temprano» transmite con naturalidad el énfasis temporal sin perder la fuerza del hebreo.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Joshua
  lexicon: Convención bíblica española
  rationale: El nombre propio se adapta a la forma usual en español bíblico, «Josué», que es transparente y reconocible para lectores hispanohablantes.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - esa mañana
  lexicon: HALOT
  rationale: La expresión hebrea sitúa la acción en la franja matutina. «Por la mañana» es idiomático en español y preserva la referencia temporal junto con «temprano».
- source_word: וַיִּשְׂאוּ
  english_pob_choice: carried
  chosen_spanish: llevaron
  alternatives_spanish:
  - cargaron
  - portaron
  lexicon: HALOT
  rationale: נשא puede significar llevar, cargar o portar. En el contexto del arca, «llevaron» comunica con claridad la acción de transportarla en español actual sin introducir una connotación demasiado física o técnica.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los clérigos
  - los ministros
  lexicon: HALOT
  rationale: «Los sacerdotes» es la correspondencia natural y exacta del plural con artículo en el contexto cultual del relato.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahweh
  - el arca del SEÑOR
  lexicon: HALOT
  rationale: Se conserva «arca» como término técnico del objeto sagrado. Para יְהוָה se adopta la forma del proyecto, «Yahvé», en vez de sustituir por «Señor», manteniendo el nombre divino explícito conforme a la política editorial.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La decisión doctrinal del proyecto es verter el Tetragrámaton como «Yahvé». En español, esa forma es la adaptación habitual y legible del nombre divino preservado por el original.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Yahweh
  rationale: El texto hebreo usa explícitamente el nombre propio divino. La política del proyecto evita la sustitución litúrgica por un título, y en español la forma establecida es «Yahvé», que mantiene el valor nominal y la distinción respecto de un simple apelativo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto auditado en inglés no presenta cambios recientes ni problemas textuales; el pasaje muestra alto acuerdo entre revisión y verificación cruzada, por lo que la versión española sigue de cerca el sentido hebreo sin necesidad de emendas adicionales.
  spanish_consistency_notes:
  - Se mantuvo el orden natural del español con sujeto explícito al inicio para Josué.
  - «Arca de Yahvé» conserva el vínculo constructo del hebreo sin añadir artículo posesivo.
  - Se evitó «SEÑOR» en el cuerpo del texto para respetar la decisión doctrinal del proyecto sobre el nombre divino.
  - 'La combinación «temprano por la mañana» refleja la duplicación semántica del hebreo: inicio temprano y marco matutino.'
