    rationale: 'En español, tras ''y a los levitas:'' lo más natural es presentar directamente los nombres en aposición: ''Uriel, Asaías...''. Repetir ''a'' antes de ''Uriel'' no es incorrecto, pero resulta menos elegante y menos acorde con la puntuación escogida.'
