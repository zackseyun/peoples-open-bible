review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la sintaxis y el sentido general del griego: confesión de pecado, merecimiento de muerte, y promesa contingente de alabanza si es librado. Sin embargo, πᾶσίν τε ἀνθρώποις significa ''a todas las personas'' o ''a todo el mundo'', no ''a todos los pueblos'', que introduce una noción étnico-colectiva ausente del texto. Además, en español ''alabar ... a todos los pueblos'' suena gramaticalmente forzado; conviene expresar con claridad que el destinatario de la proclamación son las personas.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene dos tropiezos de naturalidad: ''a todos los pueblos'' no solo se desvía semánticamente sino que también suena poco idiomático tras ''alabaría la bienaventuranza...''; y ''si fuera salvado'' es comprensible, aunque ''si fuera salvado/librado'' podría sonar algo rígido. Aun así, basta una corrección mínima: cambiar ''pueblos'' por ''personas''. El resto es legible y fiel.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Lugar santo' y 'bienaventuranza' son defendibles aquí. 'Salvado' mantiene la ambigüedad contextual documentada para σωθεὶς. La principal desalineación es léxica respecto de ἀνθρώποις, que debe reflejar 'personas/gente' y no 'pueblos'.
  issues:
  - severity: medium
    issue: πᾶσίν τε ἀνθρώποις fue traducido como 'a todos los pueblos'
    rationale: ἀνθρώποις significa 'personas/seres humanos/gente', no 'pueblos' en sentido de naciones o colectivos étnicos. La versión actual agrega una idea no presente en la fuente.
  - severity: medium
    issue: La construcción 'alabaría la bienaventuranza del lugar santo a todos los pueblos' suena poco natural en español
    rationale: Aunque formalmente calcada, la combinación con 'pueblos' vuelve opaca la función dativa. 'A todas las personas' hace más claro y natural el alcance público de la alabanza sin apartarse del griego.
  revised_spanish_text: Porque decía que había pecado[a], de modo que era digno incluso de morir, y que, si fuera salvado, alabaría la bienaventuranza del lugar santo a todas las personas.
  revised_footnotes:
  - marker: a
    text: 'O: «entonaría alabanzas». El verbo griego puede referirse a alabanza de tipo himnódico en general, no solo a canto literal.'
    reason: lexical_alternative
  revision_rationale: Se corrige únicamente 'a todos los pueblos' a 'a todas las personas' para reflejar con fidelidad ἀνθρώποις y mejorar la naturalidad española. Se conserva la nota léxica sobre ὑμνήσειεν y el resto del texto, que ya representa adecuadamente el sentido del original y del expediente POB inglés.
