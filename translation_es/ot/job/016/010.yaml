- from: Han abierto grande su boca contra mí[a]; con reproche han golpeado mi mejilla; juntos se agrupan contra mí.
  to: Han abierto mucho la boca contra mí; con reproche han golpeado mi mejilla; juntos se agrupan contra mí[a].
  rationale: Se corrige un calco poco natural («han abierto grande») por una expresión española clara y fiel al modismo hebreo. Se reubica la nota al verbo final, que es donde realmente existe la dificultad léxica documentada. Se conserva el resto del verso porque refleja adecuadamente el sentido del original y del rastro de auditoría inglés.
