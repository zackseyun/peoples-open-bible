base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/003/015.yaml
  text: And Shallun son of Col-hozeh[a], official of the district of Mizpah, repaired the Fountain Gate. He rebuilt it and roofed it, and set up its doors, its bolts, and its bars, and repaired the wall of the Pool of Shelah by the king’s garden, as far as the stairs that go down from the City of David.
  footnotes:
