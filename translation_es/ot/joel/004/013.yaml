revisions:
- from: Pongan la hoz[a], porque la mies está madura. Vengan, pisen, porque el lagar está lleno; las tinajas rebosan[b], porque grande es su maldad.
  to: Metan la hoz[a], porque la mies está madura. Vengan, pisen, porque el lagar está lleno; las cubas rebosan, porque grande es su maldad[b].
  rationale: Se ajusta שִׁלְחוּ מַגָּל a un español más fiel y natural («Metan la hoz»), se mejora la precisión contextual de יְקָבִים con «las cubas», y se corrige la ubicación de la nota [b] para que corresponda a la cláusula final sobre su maldad. Se conserva «pisen» siguiendo la revisión auditada del POB inglés, con la nota que preserva la alternativa más literal «desciendan».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:01:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura imperativa y la imaginería agrícola/lagar del hebreo, y mantiene correctamente la lectura de juicio metafórico sin explicitarla. Sin embargo, hay dos desajustes principales con la evidencia fuente y el rastro POB: (1) שִׁלְחוּ מַגָּל se refleja mejor como «Metan la hoz» o «Echen la hoz» que como «Pongan la hoz», ya que el hebreo expresa aplicar/enviar el instrumento a la mies, no simplemente colocarlo; (2) יְקָבִים se vierte mejor como «las cubas» o «los lagares/vats» que como «las tinajas», porque el contexto es el receptáculo del lagar que rebosa, no vasijas genéricas. Además, la nota [b] actual no corresponde al lugar anclado: el alternativo «su maldad es grande» no explica «rebosan», sino la cláusula final.'
  spanish_quality_summary: El español es claro y digno, pero «Pongan la hoz» suena algo débil e impreciso para un mandato de siega, y «tinajas» introduce una imagen menos exacta y algo doméstica frente al contexto del lagar. «La mies está madura», «Vengan, pisen», «el lagar está lleno» y «grande es su maldad» son plenamente legibles y apropiados. Conviene reubicar la nota [b] al sintagma final para que coincida con el alternativo semántico.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. No aparece Yahvé, Mesías, Cristo, Espíritu, etc. La decisión «maldad» para רָעָתָם concuerda con la justificación teológica del POB. La elección de «lagar» también encaja bien. La excepción necesaria es léxica: preferir «cubas» sobre «tinajas» para יְקָבִים por mayor precisión contextual.'
  issues:
  - severity: medium
    issue: «Pongan la hoz» debilita el valor de שִׁלְחוּ מַגָּל
    rationale: El hebreo expresa enviar/aplicar la hoz a la cosecha. «Poner» puede entenderse como simplemente colocarla, mientras que «meter» o «echar» conserva mejor la fuerza de iniciar la siega.
  - severity: medium
    issue: «las tinajas» no representa con suficiente precisión יְקָבִים
    rationale: El término se refiere a los receptáculos del proceso del vino asociados al lagar. «Tinajas» puede sonar genérico o doméstico; «cubas» refleja mejor ‘vats’ y el paralelismo con el lagar.
  - severity: medium
    issue: La nota [b] está anclada en «rebosan» pero comenta la cláusula final
    rationale: La variante «O “su maldad es grande”» corresponde a רָעָתָם / רַבָּה, no a הֵשִׁיקוּ. Debe colocarse junto a «grande es su maldad» para mantener trazabilidad exacta.
  revised_spanish_text: Metan la hoz[a], porque la mies está madura. Vengan, pisen, porque el lagar está lleno; las cubas rebosan, porque grande es su maldad[b].
  revised_footnotes:
  - marker: a
    text: O «desciendan»; algunas traducciones ponen «pisen» porque el mandato probablemente imagina entrar al lagar para pisar las uvas.
    reason: lexical_alternative
  - marker: b
    text: O «su mal es grande».
    reason: lexical_alternative
  revision_rationale: Se ajusta שִׁלְחוּ מַגָּל a un español más fiel y natural («Metan la hoz»), se mejora la precisión contextual de יְקָבִים con «las cubas», y se corrige la ubicación de la nota [b] para que corresponda a la cláusula final sobre su maldad. Se conserva «pisen» siguiendo la revisión auditada del POB inglés, con la nota que preserva la alternativa más literal «desciendan».
