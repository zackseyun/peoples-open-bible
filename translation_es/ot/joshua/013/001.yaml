translation:
  language: es
  text: 'Josué era viejo, avanzado en años, y Yahvé le dijo: «Tú eres viejo, avanzado en años, y queda todavía muchísima tierra por poseer[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «heredarla». El verbo hebreo puede expresar tomar posesión de la tierra como herencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: זָקֵן
  english_pob_choice: was old
  chosen_spanish: ya era viejo
  alternatives_spanish:
  - era anciano
  - había envejecido
  lexicon: HALOT
  rationale: El hebreo describe el estado de Josué; en español, «ya era viejo» conserva la afirmación directa y natural sin añadir solemnidad innecesaria. Se evita «anciano» porque puede sonar más institucional que descriptivo en este contexto narrativo.
- source_word: בָּא בַּיָּמִים
  english_pob_choice: advanced in years
  chosen_spanish: avanzado en años
  alternatives_spanish:
  - bien entrado en años
  - de muchos años
  lexicon: HALOT
  rationale: La expresión idiomática hebrea indica edad avanzada. «Avanzado en años» reproduce con claridad ese sentido idiomático en un registro bíblico y moderno, manteniendo la repetición enfática del verso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton directamente; la norma del proyecto es verterlo como «Yahvé» y no ocultarlo con un título. Se mantiene así el nombre propio del pacto, con forma ya establecida en el proyecto en español.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  lexicon: HALOT
  rationale: En Josué, el campo semántico apunta a la tierra dada por pacto. En español «la tierra» conserva ese valor sin recargar el verso; «el país» sería más político y «tierra prometida» añadiría una especificación que el hebreo no expresa aquí.
- source_word: נִשְׁאֲרָה
  english_pob_choice: remains
  chosen_spanish: queda todavía
  alternatives_spanish:
  - permanece
  - ha quedado
  lexicon: HALOT
  rationale: El Niphal expresa lo que aún queda sin ser asignado o tomado. «Queda todavía» comunica con naturalidad la idea de resto pendiente, conservando el sentido de continuación y expectativa del texto.
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: very much
  chosen_spanish: en gran manera
  alternatives_spanish:
  - muchísimo
  - sobremanera
  lexicon: HALOT
  rationale: La doble intensificación hebrea debe preservarse como énfasis fuerte. «En gran manera» mantiene el valor adverbial intensivo en un tono bíblico sobrio; «muchísimo» sería más coloquial.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to be possessed
  chosen_spanish: para ser tomada en posesión
  alternatives_spanish:
  - para poseerla
  - para heredarla
  lexicon: HALOT
  rationale: ירשׁ puede implicar poseer o heredar, pero aquí el foco es la apropiación de la tierra aún no ocupada. «Tomada en posesión» conserva la fuerza de «possesión» sin reducir el matiz a herencia ni usar una formulación demasiado interpretativa.
theological_decisions:
- issue: Nombre divino יְהוָה en el discurso directo de Yahvé
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: La elección sigue el principio del proyecto de transliterar el nombre divino en lugar de sustituirlo por un título. En este versículo, además, el nombre aparece en el discurso narrativo y no como cita indirecta; por eso se mantiene explícito en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor de לְרִשְׁתָּהּ en contexto de conquista de la tierra
  english_pob_reading: to be possessed
  chosen_spanish_reading: para ser tomada en posesión
  alternative_spanish_readings:
  - para heredarse
  - para poseerse
  rationale: 'En el contexto de Josué, el verbo no es meramente abstracto: la tierra aún debe ser adquirida/ocupada por Israel. «Tomada en posesión» conserva esa dimensión de conquista y apropiación territorial sin imponer de manera rígida solo el matiz legal de herencia.'
  doctrine_reference: 'DOCTRINE.md: Land promise / possession terminology'
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje hebreo de forma directa y coincide sustancialmente con la solución auditada en inglés: mantiene la doble descripción de la edad, el nombre divino explícito y la idea de que aún queda mucha tierra por tomar en posesión. No se detectaron revisiones previas que exigieran ajuste adicional.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se conservó la repetición enfática «viejo, avanzado en años» para reflejar tanto la narración como el discurso divino.
  - «La tierra» se mantuvo sin expansión interpretativa, en armonía con el vocabulario pactual habitual de Josué.
  - «Tomada en posesión» preserva el matiz de ירשׁ sin forzar «heredar» donde el contexto inmediato es de ocupación de la tierra.
