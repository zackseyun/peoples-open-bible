translation:
  language: es
  text: El viento[a] la ha envuelto en sus alas, y quedarán avergonzados a causa de sus sacrificios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espíritu». El hebreo רוּחַ puede significar «viento», «aliento» o «espíritu»; aquí se ha preferido «viento» por el contexto inmediato y la imagen de las «alas», aunque la alternativa sigue siendo posible.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָרַר
  english_pob_choice: has wrapped
  chosen_spanish: ha envuelto
  alternatives_spanish:
  - ha atado
  - ha encerrado
  - ha arrollado
  lexicon: HALOT
  rationale: En este contexto poético, con 'viento' y 'alas', 'ha envuelto' conserva la imagen de quedar rodeada o atrapada sin endurecer el giro en una atadura demasiado literal.
- source_word: רוּחַ
  english_pob_choice: wind
  chosen_spanish: viento
  alternatives_spanish:
  - espíritu
  - aliento
  lexicon: HALOT
  rationale: El paralelo con 'alas' y el contexto de juicio favorecen una imagen natural de viento; 'espíritu' es posible léxicamente, pero aquí queda menos probable y se reserva en la nota como alternativa.
- source_word: בכנפיה
  english_pob_choice: in its wings
  chosen_spanish: en sus alas
  alternatives_spanish:
  - con sus alas
  - en las alas de ella
  lexicon: HALOT
  rationale: En español, 'en sus alas' reproduce la imagen de estar dentro o rodeada por el viento y evita la extrañeza de un posesivo demasiado explícito en femenino.
- source_word: וְיֵבֹשׁוּ
  english_pob_choice: and they will be put to shame
  chosen_spanish: y serán avergonzados
  alternatives_spanish:
  - y se avergonzarán
  - y caerán en vergüenza
  lexicon: HALOT
  rationale: El verbo hebreo expresa vergüenza/deshonra en sentido resultativo; 'serán avergonzados' mantiene ese valor pasivo y judicial mejor que una forma reflexiva.
- source_word: מִזִּבְחוֹתָם
  english_pob_choice: because of their sacrifices
  chosen_spanish: a causa de sus sacrificios
  alternatives_spanish:
  - por sus sacrificios
  - debido a sus sacrificios
  lexicon: HALOT
  rationale: La preposición מִ tiene aquí fuerza causal; 'a causa de' comunica con claridad que la vergüenza proviene de sus sacrificios, sin especificar en exceso el tipo de sacrificios.
theological_decisions:
- issue: Sentido de רוּחַ y alcance del juicio
  english_pob_reading: The verse depicts Israel/Ephraim as seized by a destructive wind, leading to shame because of idolatrous sacrifices.
  chosen_spanish_reading: El verso presenta a Israel/Efraín atrapado por un viento devastador y conducido a la vergüenza por sus sacrificios.
  alternative_spanish_readings:
  - El verso podría leerse de modo más general como calamidad o destierro que alcanza a la nación.
  - רוּחַ podría entenderse como 'espíritu', aunque es menos probable en este contexto.
  rationale: La traducción conserva la ambigüedad entre calamidad, juicio y desplazamiento forzado sin resolverla. Así se mantiene la tensión textual del hebreo y el trasfondo cultual del pasaje.
  doctrine_reference: Preservar la tensión teológica y poética del texto sin cerrarla artificialmente.
translation_notes:
  revision_awareness: El borrador español sigue la revisión más reciente del audit trail al usar el artículo definido implícito en español mediante 'El viento', en armonía con la decisión revisada del inglés. La redacción evita una traducción mecánica y conserva la metáfora poética y el matiz causal del cierre.
  spanish_consistency_notes:
  - Se usa 'Yahvé' cuando el texto lo requiera en esta serie, pero en este versículo no aparece el nombre divino.
  - '''Sacrificios'' se mantiene en sentido cultual general, sin añadir ''ídolos'' ni ''ídolos'' explícitamente porque el contexto inmediato lo sugiere pero no lo dice aquí.'
  - '''Avergonzados'' conserva el valor de deshonra pública/judicial del hebreo, coherente con el registro profético.'
