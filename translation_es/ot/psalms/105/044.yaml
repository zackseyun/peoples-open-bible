review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el hebreo y el rastro de auditoría inglés: Dios da las tierras de las naciones y ellos heredan lo producido por el esfuerzo de los pueblos. Se preservan correctamente el plural de ''tierras'', la distinción ''naciones/pueblos'' y el matiz de ירש como posesión recibida. La única reparación necesaria es léxica y estilística en la nota y, preferiblemente, en el cuerpo: para עמל, ''labor'' o ''trabajo arduo'' se alinea mejor que ''trabajo'', porque ''heredar el trabajo'' en español puede sugerir que heredaron la tarea misma más que su fruto.'
  spanish_quality_summary: El texto es claro y digno, pero 'heredaron el trabajo de los pueblos' suena algo forzado en español. 'La labor de los pueblos' conserva mejor la ambigüedad del hebreo entre el esfuerzo y lo obtenido por él. Además, en la nota 'tomaron posesión del trabajo' puede mejorarse a 'de la labor' para mantener coherencia léxica con el texto principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. 'Naciones' para גוים y 'pueblos' para לאמים están bien; 'heredaron' para ירש también está bien por su matiz pactual.
  issues:
  - severity: medium
    issue: '''el trabajo de los pueblos'' suena menos natural y puede sugerir la tarea misma'
    rationale: עמל puede significar labor/toil y también lo adquirido por esa labor. En español, 'heredar el trabajo' tiende a leerse como recibir una carga laboral. 'La labor de los pueblos' preserva mejor la ambigüedad y suena más idiomático.
  - severity: low
    issue: La nota al pie debería armonizar con la mejor opción léxica del texto principal
    rationale: Si se ajusta el cuerpo a 'la labor', conviene que la alternativa diga 'tomaron posesión de la labor de los pueblos' para consistencia y mejor español.
  revised_spanish_text: Él les dio las tierras de las naciones[a], y ellos heredaron la labor de los pueblos.
  revised_footnotes:
  - marker: a
    text: O 'tomaron posesión de la labor de los pueblos'. El hebreo puede enfatizar tanto la labor misma como aquello que se obtuvo mediante esa labor.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'trabajo' por 'labor' para reflejar mejor עמל y evitar una lectura poco natural en español. Se mantiene 'heredaron' por el matiz de posesión recibida por don divino. La nota se ajusta para coherencia léxica con el texto revisado.
