revisions:
- from: y los arvaditas[a], los zemaritas y los hamatitas. Después, las familias[b] de los cananeos fueron dispersadas.
  to: y los arvaditas, los zemaritas y los hamatitas. Después, los clanes[a] de los cananeos fueron dispersados.
  rationale: 'Se revisa para alinearse con la decisión léxica auditada del POB: «clanes» en vez de «familias» para מִשְׁפְּחוֹת en contexto etnográfico, y una única nota que preserva la alternativa significativa documentada para la expresión final con el gentilicio colectivo singular hebreo. Se elimina la nota innecesaria sobre «arvaditas», porque el inglés no pedía nota allí como alternativa principal sino solo una explicación léxica ya resuelta en el texto.'
