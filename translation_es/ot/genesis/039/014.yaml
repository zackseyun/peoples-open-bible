translation:
  language: es
  text: 'Entonces ella llamó a los hombres de su casa y les dijo: «Miren, él ha traído entre nosotros a un hombre hebreo[a] para burlarse de nosotros[b]. Él vino a mí para acostarse conmigo, y yo grité a gran voz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «un hombre hebreo» conserva explícitamente el sustantivo masculino אִישׁ junto con el adjetivo étnico עִבְרִי; no se reduce a «un hebreo», porque el hebreo enfatiza aquí también que es un hombre.
    reason: lexical_alternative
  - marker: b
    text: O también «para reírse de nosotros» o «para hacer escarnio de nosotros». El verbo hebreo puede denotar burla o juego abusivo; en este contexto, la acusación de la esposa de Potifar sugiere humillación vergonzosa, incluso con matiz sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרָא
  english_pob_choice: Then she called
  chosen_spanish: Entonces ella llamó
  alternatives_spanish:
  - Y ella llamó
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «Entonces» conserva la secuencia sin sonar forzado en español.
- source_word: לְאַנְשֵׁי בֵיתָהּ
  english_pob_choice: the men of her household
  chosen_spanish: los hombres de su casa
  alternatives_spanish:
  - los hombres de su hogar
  - los varones de su casa
  lexicon: HALOT
  rationale: אַנְשֵׁי exige «hombres/varones» y בֵיתָהּ es «su casa». «Casa» comunica bien el ámbito doméstico y social sin diluir el referente masculino.
- source_word: וַתֹּאמֶר לָהֶם לֵאמֹר
  english_pob_choice: and said to them
  chosen_spanish: y les dijo
  alternatives_spanish:
  - y les habló diciendo
  - y les dijo diciendo
  lexicon: HALOT
  rationale: La fórmula introductoria hebrea se expresa de manera natural en español omitiendo el redundante «diciendo», sin perder la transición al discurso directo.
- source_word: רְאוּ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren ustedes
  lexicon: HALOT
  rationale: Imperativo plural para llamar la atención; «Miren» es idiomático y conserva el tono acusatorio.
- source_word: הֵבִיא לָנוּ
  english_pob_choice: he has brought to us
  chosen_spanish: nos ha traído
  alternatives_spanish:
  - ha traído a nosotros
  - nos trajo
  lexicon: HALOT
  rationale: El hifil de בוא tiene sentido causativo de traer. En español, la dativa «nos» preserva el destinatario implícito sin recargar la frase.
- source_word: אִישׁ עִבְרִי
  english_pob_choice: a Hebrew man
  chosen_spanish: un hombre hebreo
  alternatives_spanish:
  - un hebreo
  - un varón hebreo
  lexicon: HALOT
  rationale: «Hombre hebreo» conserva tanto el sustantivo אִישׁ como el adjetivo étnico עִבְרִי. Se evita «hebreo» solo, porque perdería el matiz de masculinidad explícita.
- source_word: לְצַחֶק בָּנוּ
  english_pob_choice: to mock us
  chosen_spanish: para burlarse de nosotros
  alternatives_spanish:
  - para mofarse de nosotros
  - para hacernos burla
  lexicon: HALOT
  rationale: צחק aquí puede abarcar burla, escarnio o juego abusivo; «burlarse de nosotros» es natural en español y mantiene la fuerza deshonrosa de la acusación, sin cerrar otras resonancias contextuales.
- source_word: בָּא אֵלַי
  english_pob_choice: He came in to me
  chosen_spanish: Él vino a mí
  alternatives_spanish:
  - Él entró a mí
  - Él se acercó a mí
  lexicon: HALOT
  rationale: בוא + אֶל puede expresar «venir a». En español, «vino a mí» es la forma más clara y fiel, sin añadir una imagen corporal más explícita que la del hebreo.
- source_word: לִשְׁכַּב עִמִּי
  english_pob_choice: to lie with me
  chosen_spanish: para acostarse conmigo
  alternatives_spanish:
  - para yacer conmigo
  - para dormir conmigo
  lexicon: HALOT
  rationale: Es un eufemismo sexual. «Acostarse conmigo» comunica el sentido sin caer en coloquialismo excesivo; «yacer conmigo» sería más literal pero menos corriente para lectura pública.
- source_word: וָאֶקְרָא בְּקוֹל גָּדוֹל
  english_pob_choice: and I cried out with a loud voice
  chosen_spanish: y yo grité con voz fuerte
  alternatives_spanish:
  - y yo clamé con voz fuerte
  - y grité a gran voz
  lexicon: HALOT
  rationale: El hebreo expresa un clamor de auxilio. «Grité» reproduce bien la urgencia; «con voz fuerte» sigue de cerca בְּקוֹל גָּדוֹל sin depender de una fórmula tradicional fija.
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó un «in» innecesario tras «brought» y sustituyó «but» por «and» para ajustarse mejor al hebreo. Por eso el español evita añadidos contrastivos y usa una construcción simple con dativo («nos ha traído»), manteniendo la secuencia narrativa y el tono acusatorio sin sobreinterpretar el conector.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera de este versículo porque no aparece vocabulario divino.
  - Se conserva un registro público y sobrio, apto para lectura eclesial.
  - Se evita «Cristo» o terminología doctrinal ajena al pasaje.
  - La voz de la acusación se mantiene sin suavizar el matiz de escarnio implícito en לְצַחֶק.
