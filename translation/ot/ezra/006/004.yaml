id: EZR.6.4
reference: Ezra 6:4
source:
  edition: WLC
  text: נִדְבָּכִ֞ין דִּי אֶ֤בֶן גְּלָל֙ תְּלָתָ֔א וְ/נִדְבָּ֖ךְ דִּי אָ֣ע חֲדַ֑ת וְ/נִ֨פְקְתָ֔/א מִן בֵּ֥ית מַלְכָּ֖/א תִּתְיְהִֽב־־־׃
translation:
  text: with three layers of dressed stone and one layer of new timber[b][a], and let the cost be given from the king’s house.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “three courses of hewn stone.”
    reason: lexical_alternative
  - marker: b
    text: “The king’s house” likely refers to the royal treasury or royal funds.
    reason: cultural_note
lexical_decisions:
- source_word: נִדְבָּכִין
  chosen: layers
  alternatives:
  - courses
  - rows
  lexicon: HALOT
  rationale: The noun refers to structural layers or courses in construction. 'Layers' is natural modern English; 'courses' is a viable architectural alternative preserved in a footnote-worthy lexical note.
- source_word: אֶבֶן גְּלָל
  chosen: dressed stone
  alternatives:
  - rolled stone
  - great stones
  - hewn stone
  lexicon: HALOT
  rationale: In this building context, the phrase most likely denotes shaped or finished masonry stones rather than literally 'rolled stone.' 'Dressed stone' best captures construction sense in readable English; 'hewn stone' is a close alternative.
- source_word: תְּלָתָא
  chosen: three
  lexicon: HALOT
  rationale: Cardinal number modifying the preceding construction unit.
- source_word: וְנִדְבָּךְ
  chosen: and one layer
  alternatives:
  - and one course
  lexicon: HALOT
  rationale: Singular repetition of the same construction term; rendered consistently with the plural above.
- source_word: אָע חֲדַת
  chosen: new timber
  alternatives:
  - new wood
  - fresh timber
  lexicon: HALOT
  rationale: אָע denotes wood/timber. In a building decree, 'timber' is more idiomatic than 'wood.' 'New' is retained from חֲדַת.
- source_word: נִפְקְתָא
  chosen: the cost
  alternatives:
  - the expense
  - the outlay
  lexicon: HALOT
  rationale: The noun denotes expenditure or expense. 'Cost' is concise and idiomatic in an administrative decree.
- source_word: מִן בֵּית מַלְכָּא
  chosen: from the king’s house
  alternatives:
  - from the royal treasury
  - from the king’s palace
  lexicon: HALOT
  rationale: Literally 'from the house of the king.' In context this likely refers to royal funds, but the translation keeps the literal expression while remaining intelligible.
- source_word: תִּתְיְהִב
  chosen: let ... be given
  alternatives:
  - shall be given
  lexicon: HALOT
  rationale: The verbal form expresses that the expense is to be provided. 'Let ... be given' fits the decree style and preserves the jussive/administrative force.
