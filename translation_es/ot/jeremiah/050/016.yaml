    rationale: El hebreo repite אִישׁ distributivamente en ambas cláusulas. Mantener «cada hombre ... y cada hombre ...» o «cada uno ... y cada uno ...» daría mejor paralelismo. Dado el audit trail doctrinal, conviene conservar «cada hombre» en ambas.
