  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. «Ciudadela», «Jonatán», «rehenes» y «devolvió» concuerdan con las decisiones léxicas auditadas. La nota sobre Acra debe seguir presente, pero anclada en el término histórico pertinente.
