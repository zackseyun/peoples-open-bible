translation:
  language: es
  text: 'Entonces los hombres de Efraín[b] fueron reunidos, y pasaron a Zafón[a], y dijeron a Jefté: «¿Por qué pasaste para combatir contra los amonitas y no nos llamaste para ir contigo? Vamos a quemar tu casa sobre ti con fuego[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el norte» si צָפוֹנָה se entiende como adverbio direccional y no como el nombre propio Zafón.
    reason: alternative_reading
  - marker: b
    text: 'El hebreo dice literalmente «hombre de Efraín», pero el contexto exige un sentido colectivo: los efraimitas como grupo.'
    reason: lexical_alternative
  - marker: c
    text: 'La amenaza probablemente significa: «Vamos a quemar tu casa contigo dentro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצָּעֵק אִישׁ אֶפְרַיִם
  english_pob_choice: the men of Ephraim were called together
  chosen_spanish: los hombres de Efraín fueron reunidos
  alternatives_spanish:
  - el hombre de Efraín gritó
  - los hombres de Efraín gritaron
  - Efraín fue convocado
  lexicon: HALOT
  rationale: El hebreo presenta un singular morfológico ('un hombre de Efraín'), pero el verbo siguiente va en plural, lo que muestra un sujeto colectivo. En español, 'fueron reunidos' conserva ese valor grupal y evita una discordancia singular/plural.
- source_word: וַיַּעֲבֹר צָפוֹנָה
  english_pob_choice: they crossed over to Zaphon
  chosen_spanish: pasaron a Zafón
  alternatives_spanish:
  - pasaron hacia el norte
  - cruzaron hacia Zafón
  lexicon: HALOT
  rationale: Se mantiene la lectura de צָפוֹנָה como nombre propio, Zafón, conforme a la decisión auditada en inglés. 'Pasaron' reproduce el movimiento militar del verbo עבר sin forzar una perífrasis innecesaria.
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Por qué razón?
  - ¿Para qué?
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español para introducir la queja.
- source_word: עָבַרְתָּ
  english_pob_choice: did you cross over
  chosen_spanish: pasaste
  alternatives_spanish:
  - cruzaste
  - pasaste al otro lado
  lexicon: HALOT
  rationale: '''Pasaste'' conserva la repetición del campo semántico de עבר en español con una forma natural y breve.'
- source_word: לְהִלָּחֵם בִּבְנֵי עַמּוֹן
  english_pob_choice: to fight against the Ammonites
  chosen_spanish: para combatir contra los amonitas
  alternatives_spanish:
  - para pelear contra los amonitas
  - para guerrear contra los amonitas
  lexicon: HALOT
  rationale: '''Combatir contra'' expresa la acción bélica con dignidad y claridad; ''amonitas'' traduce de manera idiomática ''los hijos de Amón''.'
- source_word: וְלָנוּ לֹא קָרָאתָ לָלֶכֶת עִמָּךְ
  english_pob_choice: and not call us to go with you
  chosen_spanish: y no nos llamaste para ir contigo
  alternatives_spanish:
  - y no nos convocaste para ir contigo
  - y no nos invitaste a ir contigo
  lexicon: HALOT
  rationale: '''Llamaste'' reproduce קרא en su sentido de convocar para participar. ''Ir contigo'' es la manera más natural en español de expresar la participación en la campaña.'
- source_word: בֵּיתְךָ
  english_pob_choice: your house
  chosen_spanish: tu casa
  alternatives_spanish:
  - tu casa
  - tu hogar
  lexicon: HALOT
  rationale: '''Casa'' es la traducción más directa y concreta del hebreo, y encaja mejor con la amenaza de incendio.'
- source_word: נִשְׂרֹף עָלֶיךָ בָּאֵשׁ
  english_pob_choice: We will burn your house down over you with fire
  chosen_spanish: Vamos a quemar tu casa sobre ti con fuego
  alternatives_spanish:
  - Vamos a incendiar tu casa contigo dentro
  - Vamos a quemar tu casa con fuego
  lexicon: HALOT
  rationale: 'Se conserva la imagen fuerte del hebreo y la ambigüedad retórica: la casa arde ''sobre ti'', sugiriendo que Jefté está dentro o bajo ella. ''Vamos a quemar'' mantiene el tono de amenaza inmediata.'
translation_notes:
  revision_awareness: Se mantuvo la lectura ya auditada en inglés para צָפוֹנָה como Zafón, junto con la nota alternativa direccional; se preservó el sentido colectivo de ‘hombre de Efraín’ y la fuerza amenazante de la última cláusula sin suavizarla.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ por defecto solo cuando aparezca el nombre divino; aquí no aparece.
  - Se conserva ‘amonitas’ como gentilicio idiomático para בְּנֵי עַמּוֹן.
  - Se mantiene un registro narrativo sobrio y bíblico, sin arcaísmos innecesarios.
  - Las comillas y signos de interrogación siguen la norma española.
  - Se evita traducir mecánicamente desde el inglés cuando el español requiere un sujeto colectivo explícito.
