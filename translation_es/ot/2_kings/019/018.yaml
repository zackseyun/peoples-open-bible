translation:
  language: es
  text: y echaron[a] a sus dioses al fuego, porque no eran dioses, sino obra de manos humanas, madera y piedra; por eso los destruyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "los pusieron en el fuego". El verbo hebreo significa literalmente "dar/poner", y aquí se usa con el sentido de echar o arrojar al fuego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתְנוּ
  english_pob_choice: they have cast
  chosen_spanish: echaron
  alternatives_spanish:
  - pusieron
  - arrojaron
  - lanzaron
  - echaron al fuego
  lexicon: HALOT
  rationale: El hebreo נתן aquí funciona idiomáticamente con la idea de meter o arrojar algo al fuego. En español, "echar" comunica bien ese movimiento en un registro natural y sobrio; "arrojaron" o "lanzaron" son más intensos, y "pusieron" queda demasiado neutro.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their gods
  chosen_spanish: sus dioses
  alternatives_spanish:
  - sus ídolos
  - sus falsos dioses
  lexicon: HALOT
  rationale: Se conserva el sustantivo "dioses" para reflejar la acusación textual antes de la negación de su verdadera divinidad en la cláusula siguiente. "Ídolos" interpreta el referente pero atenúa la fuerza retórica del hebreo.
- source_word: בָּאֵשׁ
  english_pob_choice: into the fire
  chosen_spanish: al fuego
  alternatives_spanish:
  - en el fuego
  - dentro del fuego
  lexicon: HALOT
  rationale: Con un verbo de movimiento, "al fuego" suena natural en español y conserva la idea direccional. "En el fuego" sería más estático.
- source_word: מַעֲשֵׂה יְדֵי אָדָם
  english_pob_choice: the work of human hands
  chosen_spanish: obra de manos humanas
  alternatives_spanish:
  - obra de manos de hombre
  - obra hecha por manos humanas
  - lo que manos humanas hicieron
  lexicon: HALOT
  rationale: '"Obra de manos humanas" reproduce de forma clara el énfasis en fabricación humana y mantiene el paralelismo del hebreo. "Humanas" preserva el valor genérico de אָדָם sin forzar un masculino exclusivo.'
- source_word: אָדָם
  english_pob_choice: human
  chosen_spanish: humanas
  alternatives_spanish:
  - de hombres
  - del hombre
  - humanas, en general
  lexicon: HALOT
  rationale: El hebreo es genérico, no individual. "Humanas" evita una lectura restringida a varones y conserva la oposición entre el Dios vivo y objetos manufacturados.
- source_word: עֵץ וָאֶבֶן
  english_pob_choice: wood and stone
  chosen_spanish: madera y piedra
  alternatives_spanish:
  - leño y piedra
  - madera y roca
  lexicon: HALOT
  rationale: '"Madera y piedra" es la manera más natural y directa de expresar los materiales de los ídolos en español. Mantiene el contraste material del original sin añadir interpretación.'
- source_word: וַיְאַבְּדֽוּם
  english_pob_choice: therefore they destroyed them
  chosen_spanish: por eso los destruyeron
  alternatives_spanish:
  - y los destruyeron
  - así que los destruyeron
  - por tanto, los destruyeron
  lexicon: HALOT
  rationale: El hebreo final expresa resultado/conclusión. "Por eso" recoge bien ese nexo inferencial en español y queda más natural que un simple "y".
theological_decisions:
- issue: Distinguir entre una afirmación descriptiva sobre ídolos y la negación de su divinidad
  english_pob_reading: for they were not gods, but the work of human hands
  chosen_spanish_reading: porque no eran dioses, sino obra de manos humanas
  alternative_spanish_readings:
  - porque no eran dioses, sino ídolos hechos por manos humanas
  - porque no eran verdaderos dioses, sino obra de manos humanas
  rationale: 'La traducción mantiene la tensión del texto: primero llama a los objetos "dioses" según la pretensión de quienes los poseen, y luego niega que lo sean en verdad. No se sustituye directamente por "ídolos" para no borrar esa progresión retórica.'
  doctrine_reference: DOCTRINE.md; principio de mantener la fuerza polémica del texto contra la idolatría
- issue: Valor genérico de אָדָם en una expresión sobre fabricación
  english_pob_reading: human hands
  chosen_spanish_reading: manos humanas
  alternative_spanish_readings:
  - manos de hombre
  - manos del hombre
  - manos humanas, en sentido genérico
  rationale: Se preserva el sentido genérico del término hebreo sin introducir un masculino exclusivo. Esto mantiene la referencia a la humanidad en general como autora del objeto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; tabla de términos controvertidos para אָדָם
- issue: Relación lógica de la cláusula final
  english_pob_reading: therefore they destroyed them
  chosen_spanish_reading: por eso los destruyeron
  alternative_spanish_readings:
  - y los destruyeron
  - así que los destruyeron
  - por tanto, los destruyeron
  rationale: El hebreo וַיְאַבְּדוּם continúa la consecuencia de que eran solo madera y piedra. "Por eso" expresa mejor la inferencia que un mero enlace aditivo y conserva el sentido causal del pasaje.
  doctrine_reference: Observación sintáctica del hebreo WLC; revisión inglesa reciente sobre el valor de la conjunción final
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente en su registro formal y en la conclusión inferencial de la última cláusula. También conserva la nota sobre el valor idiomático de נתן con el fuego, trasladándola a una alternativa española natural.
  spanish_consistency_notes:
  - Se usa "dioses" y no "ídolos" en la primera mitad para conservar la acusación del texto antes de la negación explícita.
  - '"Madera y piedra" se traduce como "madera y piedra" sin ampliarlo a "leño" o "roca", porque el hebreo enumera materiales simples y genéricos.'
  - La clausula final se une con "por eso" para reflejar la consecuencia implícita del hebreo y la revisión inglesa más reciente.
  - Se mantiene un registro sobrio y publicable, sin calcos excesivamente literales como "dieron a sus dioses en el fuego".
