    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘Benjamín se volvió tras de él’. Esto puede significar que se volvió hacia atrás o que se volvió para mirar detrás de sí.'
    reason: lexical_alternative
  - marker: c
    text: O ‘he aquí que toda la ciudad subió a los cielos’, es decir, en llamas y humo.
    reason: lexical_alternative
  revision_rationale: 'Se ajustó la redacción para que el español suene natural sin perder la imagen hebrea: ‘se volvió hacia atrás’ conserva el sentido de ‘turn’ mejor que la formulación forzada ‘tras de sí’. También se corrigió la alternativa léxica de la nota a para alinearla con la evidencia auditada (‘beacon’, no ‘torch’) y se pulió la nota b. Se mantuvo ‘he aquí’, ‘columna de humo’ y ‘a los cielos’ por fidelidad y legibilidad.'
