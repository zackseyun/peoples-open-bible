translation:
  language: es
  text: Recuerden sus obras maravillosas[a] que ha hecho, sus señales[b], y los juicios de su boca[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus maravillas» para «sus obras maravillosas».
    reason: lexical_alternative
  - marker: b
    text: O «sus prodigios» o «sus portentos» para «sus señales».
    reason: lexical_alternative
  - marker: c
    text: O «los decretos» o «las ordenanzas de su boca» para «los juicios de su boca».
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוּ
  english_pob_choice: Remember
  chosen_spanish: Acordaos de
  alternatives_spanish:
  - Recordad
  - Recordad con atención
  - No olvidéis
  lexicon: HALOT
  rationale: El imperativo plural exige una exhortación directa. «Acordaos de» es natural en español bíblico y conserva el llamado activo a la memoria.
- source_word: נִפְלְאֹתָיו
  english_pob_choice: his wondrous deeds
  chosen_spanish: sus obras maravillosas
  alternatives_spanish:
  - sus maravillas
  - sus hechos maravillosos
  - sus obras portentosas
  lexicon: HALOT
  rationale: נִפְלְאֹת indica actos extraordinarios que suscitan asombro. «Obras maravillosas» mantiene el matiz de hazañas realizadas y no solo la idea abstracta de «maravillas».
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he has done
  chosen_spanish: —implícito en el sintagma anterior—
  alternatives_spanish:
  - que ha hecho
  - que hizo
  lexicon: HALOT
  rationale: La cláusula relativa especifica las obras maravillosas ya mencionadas; en español puede quedar integrada de forma natural en el grupo nominal sin repetir una subordinación pesada.
- source_word: מֹפְתָיו
  english_pob_choice: his signs
  chosen_spanish: sus prodigios
  alternatives_spanish:
  - sus señales
  - sus portentos
  - sus milagros
  lexicon: HALOT
  rationale: מופת suele referirse a señales o prodigios que certifican poder divino. «Prodigios» conserva la fuerza extraordinaria del término sin reducirlo a un solo aspecto.
- source_word: וּמִשְׁפְּטֵי פִיהוּ
  english_pob_choice: and the judgments of his mouth
  chosen_spanish: y los juicios de su boca
  alternatives_spanish:
  - y los decretos de su boca
  - y las sentencias de su boca
  - y las ordenanzas de su boca
  lexicon: HALOT
  rationale: משפטים puede expresar juicios, decretos u ordenanzas. «Juicios de su boca» preserva la imagen hebrea y la posible mezcla de pronunciamiento judicial y decreto verbal.
theological_decisions:
- issue: Paralelismo de dos términos cercanos pero no idénticos para actos divinos
  english_pob_reading: 'Different English terms are preserved for פלאות and מופתים: ''wondrous deeds'' and ''signs''.'
  chosen_spanish_reading: Se preserva la distinción entre «obras maravillosas» y «prodigios».
  alternative_spanish_readings:
  - «maravillas» y «señales»
  - «hechos maravillosos» y «milagros»
  - «maravillas» y «prodigios»
  rationale: El hebreo usa dos vocablos relacionados en paralelismo poético. Mantener dos equivalentes distintos en español evita aplanar la textura del verso y respeta la diferenciación semántica documentada en el audit trail.
  doctrine_reference: Translation philosophy §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El texto corrige la validación anterior porque cada nota al pie aparece anclada explícitamente en el cuerpo del versículo: [a], [b] y [c]. También se ajusta la puntuación final y se mantiene el paralelismo hebreo sin sobreparafrasear.'
  spanish_consistency_notes:
  - «Yahvé» no aparece en este versículo; no se requiere decisión de nombre divino.
  - Se mantiene un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se conserva la distinción poética entre términos cercanos para no perder el relieve semántico del hebreo.
