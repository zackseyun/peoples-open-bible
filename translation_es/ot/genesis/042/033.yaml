  to: 'Entonces el hombre[a], el señor de la tierra, nos dijo: «Por esto sabré que ustedes son honestos: dejen conmigo a uno de sus hermanos, tomen provisiones para el hambre de sus hogares, y váyanse.»'
  rationale: Se reemplaza 'sinceros' por 'honestos' para reflejar mejor כֵנִים según la justificación léxica auditada. Se cambia 'sus casas' por 'sus hogares' para expresar el sentido de 'households' de manera más natural en español. Se mantiene 'provisiones' como explicitación contextual válida del objeto elíptico, apoyada por la nota. También se normaliza la puntuación y comillas para una presentación más natural en español.
