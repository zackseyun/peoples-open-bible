  rationale: Se revisa «a los fieles» a «a los dignos de confianza» para reflejar mejor el matiz de נֶאֱמָנִים documentado en el expediente inglés como «the trusted», evitando una lectura religiosa innecesaria. Se cambia «arrebata» a «quita» para mantener el paralelismo sobrio del hebreo sin intensificación extra. Se conserva «el habla», «discernimiento» y «los ancianos» por ser fieles, naturales y consistentes con el análisis léxico.
