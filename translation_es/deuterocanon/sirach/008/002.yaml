translation:
  language: es
  text: No riñas con uno más fuerte que tú[a], no sea que caigas en sus manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo de Kahana dice literalmente: ''no disputes con uno más duro que tú''. El paralelo griego lee: ''con un hombre rico'' y añade la advertencia sobre el oro: ''pues el oro ha destruido a muchos''. El texto principal sigue el testimonio hebreo como base primaria.'
    reason: alternative_reading
  - marker: b
    text: La palabra hebrea subyacente a 'no sea que' significa literalmente 'por qué', pero aquí funciona mejor como advertencia de consecuencia probable. El paralelo griego apoya claramente ese valor preventivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No hagas
  - No riñas
  lexicon: HALOT
  rationale: La partícula prohibitiva se traduce naturalmente con una negación imperativa simple en español. La forma breve mantiene el tono sapiencial admonitorio.
- source_word: תָּרִיב
  english_pob_choice: quarrel
  chosen_spanish: riñas
  alternatives_spanish:
  - contiendas
  - disputes
  - pleitees
  lexicon: HALOT
  rationale: El verbo ריב expresa entrar en disputa o contienda. 'Reñir'/'riñar' conserva el matiz de conflicto interpersonal de manera natural en español; aquí se usó 'riñas' para ajustar el imperativo prohibitivo.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - contra
  lexicon: HALOT
  rationale: La preposición se mantiene con su sentido básico relacional, no adversativo. En español, 'riñir con' es idiomático y fiel al vínculo personal del dicho.
- source_word: קָשֶׁה
  english_pob_choice: stronger
  chosen_spanish: más fuerte
  alternatives_spanish:
  - más duro
  - más poderoso
  - más severo
  lexicon: HALOT
  rationale: El hebreo literalmente significa 'duro' o 'firme', y el auditorio inglés ya optó por 'stronger' por contexto. En español, 'más fuerte' comunica mejor la idea de una persona más formidable sin perder la tensión del hebreo. La alternativa griega 'rico' queda consignada en nota.
- source_word: מִמְּךָ
  english_pob_choice: than you
  chosen_spanish: que tú
  alternatives_spanish:
  - que usted
  - que uno
  lexicon: HALOT
  rationale: La construcción comparativa se expresa de forma directa y natural en español con 'más fuerte que tú'.
- source_word: לָמָּה
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - porque
  lexicon: HALOT
  rationale: Aunque la forma hebrea literalmente dice 'por qué', el contexto funciona como advertencia preventiva. 'No sea que' reproduce en español ese valor de precaución sin convertir el texto en paráfrasis extensa.
- source_word: תִפּוֹל
  english_pob_choice: you fall
  chosen_spanish: caigas
  alternatives_spanish:
  - caigas derrotado
  - vayas a caer
  - caigas en desgracia
  lexicon: HALOT
  rationale: El verbo נפל se conserva con su sentido básico de 'caer'. En una advertencia sapiencial, el español 'caigas' es claro y suficientemente abierto para implicar la derrota o el fracaso que el contexto sugiere.
- source_word: בְּיָדוֹ
  english_pob_choice: into his hand
  chosen_spanish: en sus manos
  alternatives_spanish:
  - en su mano
  - bajo su poder
  lexicon: HALOT
  rationale: El hebreo idiomático de 'mano' para poder o control se traduce en español con el plural natural 'manos', que mantiene la imagen bíblica y su sentido de quedar bajo dominio.
translation_notes:
  revision_awareness: La versión inglesa más reciente sustituyó 'harder' por 'stronger' para mayor naturalidad y precisión contextual. La presente redacción española sigue esa resolución, pero conserva en nota la tensión del hebreo 'duro' frente al testimonio griego 'rico'.
  spanish_consistency_notes:
  - Se mantuvo un registro sapiencial sobrio y directo, sin elevar el tono a lenguaje litúrgico arcaizante.
  - Se prefirió 'más fuerte' sobre 'más duro' por claridad idiomática, pero se documenta la diferencia textual en nota.
  - Se conservó la imagen bíblica de la 'mano' como poder o control, expresada en español natural como 'en sus manos'.
  - La advertencia preventiva se expresó con 'no sea que' para reproducir la fuerza de לָמָּה según el audit trail.
