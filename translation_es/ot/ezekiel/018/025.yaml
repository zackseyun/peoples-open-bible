review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura del hebreo: objeción de Israel, llamado a oír, y doble pregunta retórica que contrasta «mi camino» con «sus caminos». Conserva adecuadamente «camino» para דֶּרֶךְ y «justo» para יִתָּכֵן, en línea con la evidencia fuente y el rastro del POB inglés. La nota léxica también preserva las alternativas documentadas.'
  spanish_quality_summary: El español es claro y natural. Sin embargo, «Sin embargo» al inicio es algo más pesado de lo necesario; «Pero» suena más directo en registro profético. Además, «más bien» en la última pregunta introduce un matiz interpretativo no exigido por el hebreo; el contraste ya queda claro sin esa adición. El resto del verso es legible y digno.
  glossary_alignment: Hay una desalineación importante en el tratamiento de אֲדֹנָי. El borrador usa «Yahvé», pero la pauta del proyecto asigna «Yahvé» específicamente a יהוה / YHWH. Aquí la fuente hebrea es אֲדֹנָי, y el rastro inglés lo documenta como «the Lord». En español corresponde «el Señor», no «Yahvé». «Mesías/Cristo», «espíritu», y demás glosario no intervienen en este verso.
  issues:
  - severity: high
    issue: Se traduce אֲדֹנָי como «Yahvé».
    rationale: La fuente no tiene יהוה sino אֲדֹנָי. La directriz del proyecto sobre «Yahvé» aplica al nombre divino YHWH, no a todo referente divino indistintamente. Además, el POB inglés auditado eligió «the Lord» precisamente para este título.
  - severity: medium
    issue: «más bien» añade un matiz no explícito en הֲלֹא דַרְכֵיכֶם לֹא יִתָּכֵנוּ.
    rationale: El hebreo ya marca el contraste por la colocación de «sus caminos» frente a «mi camino». Añadir «más bien» no distorsiona gravemente, pero sí interpreta y sobreexplica el giro retórico.
  - severity: low
    issue: «Sin embargo» suena algo pesado al inicio.
    rationale: El valor adversativo está bien captado, pero «Pero» refleja con más sencillez y naturalidad la réplica profética sin perder fidelidad.
  revised_spanish_text: 'Pero ustedes dicen[a]: «El camino del Señor no es justo». Escuchen ahora, casa de Israel: ¿No es justo mi camino? ¿No son sus caminos los que no son justos?'
  revised_footnotes:
  - marker: a
    text: O «recto» o «equitativo» para «justo» en cada ocurrencia de «no es justo». El término hebreo aquí se refiere a lo que es apropiado o equitativo.
    reason: lexical_alternative
  revision_rationale: Se corrige «Yahvé» a «el Señor» porque la fuente usa אֲדֹנָי, no יהוה. También se elimina «más bien» para evitar una intensificación no necesaria y se simplifica el arranque a «Pero» para un español más natural, manteniendo el tono adversativo del hebreo.
