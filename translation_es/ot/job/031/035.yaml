translation:
  language: es
  text: ¡Oh, si tuviera quien me escuchara! Aquí está mi firma[a]; que el Todopoderoso me responda, y que mi acusador escriba la acusación por escrito[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘mi marca’ o ‘mi señal’. El hebreo probablemente se refiere a la marca de atestación que Job pone en su declaración.
    reason: lexical_alternative
  - marker: b
    text: O ‘y que el hombre de mi disputa escriba un documento’. El hebreo es más literalmente ‘y un documento escribió el hombre de mi disputa’, pero en el contexto expresa el deseo de Job de una acusación escrita por su acusador.
    reason: alternative_reading
lexical_decisions:
- source_word: מִי יִתֶּן
  english_pob_choice: Oh, that I had
  chosen_spanish: ¡Oh, si tuviera...!
  alternatives_spanish:
  - ¡Quién diera...!
  - Si tan solo tuviera...
  lexicon: HALOT
  rationale: El idiom hebreo expresa deseo u anhelo, no una pregunta literal. En español, «¡Oh, si tuviera...!» comunica bien el valor optativo sin sonar mecánico.
- source_word: שֹׁמֵעַ לִי
  english_pob_choice: someone to hear me
  chosen_spanish: quien me oyera
  alternatives_spanish:
  - alguien que me escuchara
  - quien escuchara mi causa
  lexicon: HALOT
  rationale: El participio con לִי apunta a una persona que atienda/escuche el caso de Job. «Quien me oyera» mantiene naturalidad y el matiz jurídico-auditivo.
- source_word: הֶן
  english_pob_choice: Here is
  chosen_spanish: Aquí está
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: Es una partícula de señalamiento. «Aquí está» es claro en español moderno y conserva el gesto de presentación inmediata de la prueba o señal.
- source_word: תָּוִי
  english_pob_choice: my signature
  chosen_spanish: mi señal
  alternatives_spanish:
  - mi marca
  - mi firma
  lexicon: HALOT
  rationale: La palabra hebrea probablemente se refiere a una marca de atestación. En español, «mi señal» preserva la ambigüedad documentada entre marca, signo y firma sin imponer una equivalencia demasiado moderna.
- source_word: שַׁדַּי
  english_pob_choice: the Almighty
  chosen_spanish: el Todopoderoso
  alternatives_spanish:
  - el Omnipotente
  lexicon: HALOT
  rationale: Es el título divino estándar en Job. «El Todopoderoso» mantiene la fuerza del título sin alterar el valor tradicional reconocido en español bíblico.
- source_word: יַעֲנֵנִי
  english_pob_choice: answer me
  chosen_spanish: me responda
  alternatives_spanish:
  - me conteste
  - me dé respuesta
  lexicon: HALOT
  rationale: En el contexto forense, ענה significa responder a la causa o contestar. «Me responda» es natural y preserva el tono judicial del pasaje.
- source_word: וְסֵפֶר כָּתַב
  english_pob_choice: and let my accuser write out the indictment
  chosen_spanish: y que mi acusador escriba el documento de la acusación
  alternatives_spanish:
  - y que mi acusador escriba la acusación
  - y que mi litigante redacte un escrito
  lexicon: HALOT
  rationale: סֵפֶר es un documento escrito; en el entorno legal del verso, la mejor equivalencia es «documento de la acusación». «Escriba» refleja bien el valor volitivo de la secuencia, y evita reducirlo a un simple objeto físico como «libro» o «rollo».
- source_word: אִישׁ רִיבִי
  english_pob_choice: my accuser
  chosen_spanish: mi acusador
  alternatives_spanish:
  - el hombre de mi disputa
  - mi adversario en el pleito
  lexicon: HALOT
  rationale: La expresión significa literalmente «el hombre de mi disputa/contienda», pero en este contexto forense el rol es el de quien acusa. «Mi acusador» comunica esa función con precisión y sin perder el matiz judicial.
theological_decisions:
- issue: Imaginería forense de la apelación de Job
  english_pob_reading: Render the verse in explicit legal language ('signature,' 'accuser,' 'indictment')
  chosen_spanish_reading: Traducir con lenguaje jurídico explícito ('señal,' 'acusador,' 'documento de la acusación')
  alternative_spanish_readings:
  - 'usar un lenguaje más literal y menos explícito: ''marca'', ''el hombre de mi disputa'', ''escrito'''
  rationale: El pasaje presenta una petición formal de vindicación en un marco judicial. El español puede preservar esa fuerza con vocabulario legal comprensible, sin añadir doctrina ni suavizar la confrontación del texto.
  doctrine_reference: Primacía del sentido original; equivalencia óptima; lectura contextual de Job como litigio/vindicación
- issue: Ambigüedad lexical de תָּוִי
  english_pob_reading: my signature / my mark / my sign
  chosen_spanish_reading: mi señal
  alternative_spanish_readings:
  - mi marca
  - mi firma
  rationale: La evidencia del hebreo permite más de una lectura. «Mi señal» deja abierta la tensión entre marca, signo y firma, como hace la nota inglesa, y evita elegir demasiado pronto un tecnicismo moderno que pueda estrechar el sentido.
  doctrine_reference: Respeto de la ambigüedad textual documentada; transparencia lexical
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó solo la puntuación para suavizar la lectura formal; no cambió el sentido. En español se mantuvo esa misma unidad de sentido, con puntuación equivalente y sin añadir o quitar contenido.
  spanish_consistency_notes:
  - Se usa 'Todopoderoso' para שַׁדַּי, en coherencia con el título divino del libro de Job.
  - Se evita 'SEÑOR' porque el hebreo aquí no es יהוה sino שַׁדַּי.
  - '''Mi señal'' conserva la tensión entre marca, signo y firma sin cerrar la lectura.'
  - '''Documento de la acusación'' explicita el valor jurídico de סֵפֶר sin depender de un término arcaico como ''libro'' o ''rollo''.'
