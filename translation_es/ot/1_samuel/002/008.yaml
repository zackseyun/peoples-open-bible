translation:
  language: es
  text: Él levanta del polvo al pobre; alza al necesitado del basurero, para sentarlos con los nobles y hacerlos heredar un asiento de honor[a]. Porque de Yahvé son los pilares de la tierra[b], y sobre ellos puso el mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un trono de honor».
    reason: lexical_alternative
  - marker: b
    text: O «los fundamentos de la tierra».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵקִים
  english_pob_choice: raises
  chosen_spanish: levanta
  alternatives_spanish:
  - alza
  - hace subir
  lexicon: HALOT
  rationale: El hiphil de קום expresa hacer que alguien se ponga en pie o salga de una condición baja. «Levanta» conserva la acción dinámica y funciona bien con el paralelismo poético.
- source_word: מֵעָפָר
  english_pob_choice: from the dust
  chosen_spanish: del polvo
  alternatives_spanish:
  - del polvo de la tierra
  - de entre el polvo
  lexicon: HALOT
  rationale: «Polvo» preserva la imagen concreta de humillación extrema y coincide naturalmente con el español bíblico actual.
- source_word: דָּל
  english_pob_choice: the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al débil
  - al humilde
  lexicon: HALOT
  rationale: En este contexto de reversión social, דָּל refiere a una persona de condición baja y sin recursos. «El pobre» expresa con claridad ese valor social y económico.
- source_word: מֵֽאַשְׁפֹּת
  english_pob_choice: from the ash heap
  chosen_spanish: de entre las cenizas
  alternatives_spanish:
  - del montón de ceniza
  - del basurero
  lexicon: HALOT
  rationale: La imagen hebrea es la de un montón de desechos/refuse. «Cenizas» mantiene la degradación y suena más natural en español que una transliteración literal de la idea de «montón de basura».
- source_word: יָרִים
  english_pob_choice: lifts
  chosen_spanish: alza
  alternatives_spanish:
  - levanta
  - exalta
  lexicon: HALOT
  rationale: Se eligió «alza» para conservar el paralelismo con «levanta» sin perder el matiz de elevación desde la humillación.
- source_word: אֶבְיוֹן
  english_pob_choice: the needy
  chosen_spanish: al necesitado
  alternatives_spanish:
  - al pobre
  - al indigente
  lexicon: HALOT
  rationale: Este término intensifica la carencia. «Necesitado» comunica la idea de una persona en verdadera falta sin repetir exactamente «pobre».
- source_word: לְהוֹשִׁיב עִם נְדִיבִים
  english_pob_choice: to seat them with nobles
  chosen_spanish: para sentarlo con los nobles
  alternatives_spanish:
  - para hacerlo sentar con los nobles
  - para sentarlo entre príncipes
  lexicon: HALOT
  rationale: El infinitivo indica propósito. «Sentarlo con los nobles» conserva la imagen de elevación social; «nobles» es una equivalencia clara y amplia para נְדִיבִים.
- source_word: וְכִסֵּא כָבוֹד
  english_pob_choice: a seat of honor
  chosen_spanish: un asiento de honor
  alternatives_spanish:
  - un trono de honor
  - un sitial de honor
  lexicon: HALOT
  rationale: כִסֵּא puede ser «trono» o «asiento». Como el contexto habla de status social más que de realeza estricta, «asiento de honor» mantiene la fuerza honorífica sin sobrerrestringir la imagen.
- source_word: יַנְחִלֵם
  english_pob_choice: make them inherit
  chosen_spanish: hacerle heredar
  alternatives_spanish:
  - hacerlos heredar
  - darle en herencia
  lexicon: HALOT
  rationale: El causativo de נחל se refleja mejor con «hacer heredar». Se usa singular genérico en español por concordancia con «al pobre / al necesitado» entendido colectivamente en el paralelismo poético.
- source_word: לַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de Jehová
  - del Señor
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de traducir el nombre divino como «Yahvé», manteniendo la transparencia del texto hebreo.
- source_word: מְצֻקֵי אֶרֶץ
  english_pob_choice: the pillars of the earth
  chosen_spanish: las columnas de la tierra
  alternatives_spanish:
  - los pilares de la tierra
  - los fundamentos de la tierra
  lexicon: HALOT
  rationale: Se conserva la metáfora cosmológica. «Columnas» es una forma natural en español para el soporte imaginado, equivalente al inglés POԲ «pillars».
- source_word: תֵּבֵל
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la tierra habitable
  - el orbe
  lexicon: HALOT
  rationale: תֵּבֵל designa el mundo habitado/ordenado. «El mundo» es la opción más concisa y clara en español.
theological_decisions:
- issue: Imagen cosmológica de "las columnas de la tierra"
  english_pob_reading: Retain the poetic image 'the pillars of the earth' as metaphorical cosmological language.
  chosen_spanish_reading: Conservar "las columnas de la tierra" como imagen poética sin explicarla en el texto principal.
  alternative_spanish_readings:
  - los fundamentos de la tierra
  rationale: El hebreo usa lenguaje cosmológico antiguo para afirmar el dominio soberano de Yahvé. Mantener la metáfora hace visible el giro poético del versículo y evita aplanarlo en una abstracción.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de כִסֵּא כָבוֹד
  english_pob_reading: Render as 'a seat of honor' in the main text.
  chosen_spanish_reading: '"un asiento de honor" en el texto principal.'
  alternative_spanish_readings:
  - un trono de honor
  - un sitial de honor
  rationale: El contexto es de elevación social de los humildes; por eso conviene una expresión amplia de honor más que una formulación que sugiera exclusivamente entronización real.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del texto inglés, que ajustó la frase sobre heredar para reflejar mejor el causativo hebreo. En español se reflejó con «hacerle heredar», manteniendo la misma decisión auditable. También se conservaron las dos imágenes paralelas de humillación y exaltación, y la nota alternativa para כִסֵּא כָבוֹד.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la convención del proyecto para יהוה.
  - Se evitó «SEÑOR» como máscara editorial, para conservar transparencia con el hebreo.
  - Se usó «al pobre / al necesitado» para reflejar el paralelismo social de דָּל / אֶבְיוֹן.
  - Se conservó la metáfora cosmológica sin interpretarla en el texto principal.
  - Se eligió un registro bíblico moderno y claro, sin arcaísmos innecesarios.
