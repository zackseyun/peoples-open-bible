translation:
  language: es
  text: Entonces Judas ordenó a unos hombres combatir a los que estaban en la ciudadela[a], hasta que hubiera purificado el santuario.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los del Acra», la fortaleza amurallada de Jerusalén.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπέταξεν
  english_pob_choice: ordered
  chosen_spanish: ordenó
  alternatives_spanish:
  - dio órdenes a
  - mandó
  lexicon: BDAG
  rationale: El aoristo de ἐπιτάσσω expresa dar una orden o disposición autoritativa. «Ordenó» conserva bien esa fuerza en español actual sin sonar rebuscado.
- source_word: ἀνδράσιν
  english_pob_choice: men
  chosen_spanish: a hombres
  alternatives_spanish:
  - a soldados
  - a algunos hombres
  lexicon: LSJ
  rationale: El dativo plural significa literalmente «a hombres». Aunque el contexto es militar, el griego no dice explícitamente «soldados»; por eso se mantiene la referencia general.
- source_word: πολεμεῖν
  english_pob_choice: to fight
  chosen_spanish: pelear
  alternatives_spanish:
  - hacer guerra contra
  - combatir
  lexicon: BDAG
  rationale: El infinitivo expresa la acción encomendada. «Pelear» es natural en español y conserva la idea de conflicto militar sin sobrecargarla.
- source_word: τοὺς ἐν τῇ ἄκρᾳ
  english_pob_choice: those in the citadel
  chosen_spanish: los que estaban en la ciudadela
  alternatives_spanish:
  - los que estaban en el Acra
  - los que estaban en la fortaleza
  lexicon: LSJ
  rationale: ἄκρα puede significar «ciudadela» o «fortaleza». En 1 Macabeos alude al fuerte de Jerusalén conocido como el Acra; «ciudadela» comunica el sentido en el texto principal, mientras que la forma más técnica se preserva en la nota.
- source_word: ἕως
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - mientras
  - hasta el punto de que
  lexicon: BDAG
  rationale: ἕως marca el límite temporal de la acción. «Hasta que» expresa con claridad el punto final de la orden.
- source_word: καθαρίσῃ
  english_pob_choice: he had cleansed
  chosen_spanish: hubiera purificado
  alternatives_spanish:
  - purificara
  - purificó
  lexicon: BDAG
  rationale: El aoristo subjuntivo tras ἕως indica la meta de la acción anterior. En español, el pluscuamperfecto de subjuntivo expresa bien ese límite retrospectivo dentro de la narración.
- source_word: τὰ ἅγια
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - los recintos sagrados
  lexicon: LSJ
  rationale: En este contexto del templo, τὰ ἅγια designa el santuario. «Santuario» es la equivalencia española más clara y idiomática, manteniendo el referente sagrado sin expandirlo innecesariamente.
theological_decisions:
- issue: Referente histórico de ἄκρα / Acra
  english_pob_reading: '''those in the citadel'' in the main text, with ''Acra'' preserved in a footnote'
  chosen_spanish_reading: «los que estaban en la ciudadela» en el texto principal, con «Acra» en nota
  alternative_spanish_readings:
  - «los que estaban en el Acra»
  - «los que estaban en la fortaleza»
  rationale: La decisión es histórico-geográfica, no doctrinal. Como el griego usa el sustantivo común con artículo, «ciudadela» funciona bien en el texto principal; la nota conserva la identificación técnica tradicional del fuerte de Jerusalén.
  doctrine_reference: Principio de auditabilidad histórica y consistencia terminológica del POB, sin ocultar el nombre propio contextual.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; la presente propuesta mantiene el sentido del griego y la decisión auditada del inglés POB, adaptándola a un español natural y preciso.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - «Santuario» mantiene el valor cultual de τὰ ἅγια en contexto del templo.
  - La nota preserva la alternativa histórica «Acra» para no perder la identificación específica del lugar.
  - No se introduce léxico eclesiástico ajeno al contexto macabeo.
