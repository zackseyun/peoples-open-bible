translation:
  language: es
  text: Y viajó por etapas[a] desde el Neguev hasta Betel, hasta el lugar donde había estado su tienda al principio, entre Betel y Hai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «según sus jornadas», es decir, avanzando en tramos sucesivos de campamento en campamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: And he journeyed
  chosen_spanish: Y caminó
  alternatives_spanish:
  - Y fue
  - Y viajó
  lexicon: HALOT
  rationale: El verbo הלך expresa movimiento de ir/caminar. En español, "caminó" conserva el sentido básico de desplazamiento sin introducir una interpretación más específica que el hebreo no exige.
- source_word: לְמַסָּעָיו
  english_pob_choice: by stages
  chosen_spanish: por etapas
  alternatives_spanish:
  - según sus jornadas
  - de campamento en campamento
  - en etapas
  lexicon: HALOT
  rationale: מַסָּעָיו señala desplazamiento por jornadas o tramos sucesivos. "Por etapas" comunica bien la idea de avance en segmentos, con naturalidad en español y sin perder el matiz de viaje progresivo.
- source_word: מִנֶּגֶב
  english_pob_choice: from the Negev
  chosen_spanish: desde el Neguev
  alternatives_spanish:
  - desde el sur
  lexicon: HALOT
  rationale: En este contexto patriarcal, נֶגֶב puede referirse al desierto/región del Neguev, no solo a la dirección "sur". Se conserva el topónimo regional para mayor precisión geográfica.
- source_word: וְעַד בֵּית אֵל
  english_pob_choice: as far as Bethel
  chosen_spanish: hasta Betel
  alternatives_spanish:
  - y hasta Betel
  - así como Betel
  lexicon: HALOT
  rationale: עַד marca límite o alcance. "Hasta Betel" es la forma natural en español para indicar el punto alcanzado por el viaje.
- source_word: עַד הַמָּקוֹם
  english_pob_choice: to the place
  chosen_spanish: hasta el lugar
  alternatives_spanish:
  - al lugar
  lexicon: HALOT
  rationale: El segundo עַד precisa el destino. "Hasta el lugar" mantiene el doble encaje del hebreo, reforzando que no se trata solo de Betel en general, sino del sitio concreto.
- source_word: אֲשֶׁר הָיָה שָׁם אָהֳלֹה
  english_pob_choice: where his tent had been
  chosen_spanish: donde había estado su tienda
  alternatives_spanish:
  - donde estaba su tienda
  - donde su tienda había estado
  lexicon: HALOT
  rationale: El hebreo remite retrospectivamente a la ubicación anterior de la tienda. El pluscuamperfecto español comunica bien esa anterioridad relativa sin sobrecargar la frase.
- source_word: בַּתְּחִלָּה
  english_pob_choice: at the beginning
  chosen_spanish: al principio
  alternatives_spanish:
  - al comienzo
  - al inicio
  lexicon: HALOT
  rationale: La expresión mira hacia la primera estancia previa de Abram. "Al principio" es idiomático y fiel al valor temporal del término en este contexto narrativo.
- source_word: בֵּין בֵּית אֵל וּבֵין הָעָי
  english_pob_choice: between Bethel and Ai
  chosen_spanish: entre Betel y Hai
  alternatives_spanish:
  - entre Betel y la ciudad de Hai
  lexicon: HALOT
  rationale: בֵּין ... וּבֵין indica localización entre dos lugares. "Hai" reproduce el nombre propio de la ciudad, manteniendo la forma breve y reconocible en español bíblico contemporáneo.
theological_decisions:
- issue: Descripción del movimiento de Abram
  english_pob_reading: And he journeyed by stages
  chosen_spanish_reading: Y caminó por etapas
  alternative_spanish_readings:
  - Y viajó por etapas
  - Y fue por etapas
  rationale: No hay carga doctrinal especial; se conserva el carácter narrativo y concreto del desplazamiento. La decisión evita elevar innecesariamente el registro a una interpretación teológica o litúrgica.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto sigue de cerca el sentido auditado del hebreo y coincide sustancialmente con la solución inglesa aprobada: movimiento por etapas desde el Neguev hasta Betel, con regreso al lugar anterior de la tienda entre Betel y Hai. No se requieren revisiones respecto del contexto auditado.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como terminología estándar del proyecto solo cuando aparezca el nombre divino; aquí no aplica.
  - Se usa "Betel" y "Hai" como topónimos bíblicos habituales en español, sin añadir artículos innecesarios.
  - '"Por etapas" conserva la idea de sucesivas jornadas de viaje y armoniza con el registro narrativo bíblico.'
