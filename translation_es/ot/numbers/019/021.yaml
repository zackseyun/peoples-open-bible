review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: estatuto duradero, el que rocía, lavado de ropa, el que toca, y estado de impureza hasta la tarde. También conserva la nota léxica sobre מֵי הַנִּדָּה. Sin embargo, hay dos ajustes recomendables para fidelidad y claridad: ''norma perpetua'' debilita el matiz de חֻקַּת como disposición/estatuto fijo, y ''agua para impureza'' en singular pierde el matiz formal del hebreo plural ''aguas de impureza'' preservado en la nota.'
  spanish_quality_summary: El español es claro y digno. No obstante, 'norma perpetua' suena algo genérico frente al registro legal-cultual del pasaje, y 'lavará sus vestidos' es comprensible pero menos natural que 'lavará su ropa' o 'sus vestidos'; aquí puede mantenerse por registro. La frase 'hasta el atardecer' es natural y fiel.
  glossary_alignment: No hay conflicto con la terminología global principal. 'Impuro' para טמא está bien. La decisión sobre מֵי הַנִּדָּה conviene ajustarla a 'el agua de impureza' en el texto principal para sonar más idiomática en español y seguir cerca del hebreo, dejando en nota la alternativa explicativa y la forma tradicional.
  issues:
  - severity: medium
    issue: '''norma perpetua'' para לְחֻקַּת עוֹלָם'
    rationale: Aunque entendible, 'norma' es demasiado general para חֻקָּה en un contexto legal-ritual. 'Estatuto permanente' o 'estatuto perpetuo' preserva mejor el valor jurídico-cultual documentado en el audit trail inglés.
  - severity: medium
    issue: '''agua para impureza'' en lugar de ''agua de impureza'''
    rationale: El español 'para impureza' suena menos natural y puede insinuar finalidad de producir impureza. 'Agua de impureza' preserva mejor la construcción hebrea y evita una lectura equívoca, mientras la nota puede mantener 'para la limpieza de la impureza' como alternativa explicativa.
  revised_spanish_text: 'Y esto será para ellos un estatuto permanente: el que rocía el agua de impureza[a] lavará sus vestidos, y el que toque el agua de impureza quedará impuro hasta el atardecer.'
  revised_footnotes:
  - marker: a
    text: 'O: «el agua para la limpieza de la impureza»; tradicionalmente, «el agua de separación». Hebreo: «las aguas de impureza».'
    reason: lexical_alternative
  revision_rationale: Se ajusta 'norma perpetua' a 'estatuto permanente' para reflejar mejor חֻקַּת עוֹלָם en registro legal-cultual y alinearse con el audit trail inglés. Se cambia 'agua para impureza' a 'agua de impureza' por mayor naturalidad en español y menor riesgo de malentendido, preservando en nota la alternativa explicativa y la forma tradicional. El resto del versículo queda sustancialmente fiel al hebreo y bien redactado.
