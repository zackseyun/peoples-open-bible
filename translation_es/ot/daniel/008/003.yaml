base_translation:
  language: en
  yaml_path: translation/ot/daniel/008/003.yaml
  text: Then I lifted up my eyes and saw[a], and behold, one ram was standing before the canal, and it had two horns. The horns were high, but one was higher than the other[b], and the higher one came up last.
  footnotes:
