translation:
  language: es
  text: Y vinieron los castigos sobre los pecadores[a], no sin la evidencia de los hechos que habían sucedido en la violencia de los rayos; porque con justicia padecían por sus propias maldades[b], pues practicaron un odio aún más duro hacia los extraños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no sin pruebas de los hechos, en la fuerza de los rayos». La sintaxis griega es comprimida y permite una ligera variación sin cambiar el sentido general.
    reason: alternative_reading
  - marker: b
    text: «Odio hacia los extraños» también puede entenderse como «inhospitalidad», pero el término griego puede implicar hostilidad activa hacia forasteros o huéspedes, no solo falta de acogida.
    reason: lexical_alternative
lexical_decisions:
- source_word: τιμωρίαι
  english_pob_choice: punishments
  chosen_spanish: castigos
  alternatives_spanish:
  - penas
  - penas punitivas
  lexicon: LSJ
  rationale: τιμωρίαι alude a actos punitivos o penas infligidas. «Castigos» es natural en español y conserva el sentido retributivo sin cargarlo con una connotación demasiado técnica o vengativa.
- source_word: ἁμαρτωλοῖς
  english_pob_choice: the sinners
  chosen_spanish: los pecadores
  alternatives_spanish:
  - los que pecan
  - los malvados
  lexicon: LSJ
  rationale: El adjetivo sustantivado designa a quienes están caracterizados por el pecado. «Pecadores» reproduce de manera directa la categoría moral del griego.
- source_word: οὐκ ἄνευ τῶν γεγονότων τεκμηρίων
  english_pob_choice: not without the evidence of what had happened
  chosen_spanish: no sin la evidencia de los hechos que habían ocurrido
  alternatives_spanish:
  - no sin pruebas de los acontecimientos
  - no sin evidencias de los sucesos
  lexicon: LSJ
  rationale: τεκμήρια son evidencias o pruebas, y γεγονότων remite a hechos ya ocurridos. «La evidencia de los hechos que habían ocurrido» conserva el valor forense y la referencia a acontecimientos previos, en una forma idiomática para el español.
- source_word: τῇ βίᾳ τῶν κεραυνῶν
  english_pob_choice: in the violence of the thunderbolts
  chosen_spanish: en la violencia de los rayos
  alternatives_spanish:
  - por la fuerza de los rayos
  - en la violencia de los relámpagos
  lexicon: LSJ
  rationale: βία expresa fuerza o violencia, y κεραυνοί son rayos/truenos en sentido de rayo fulminante. «Rayos» resulta claro para el lector español y mantiene la imagen destructiva sin forzar la expresión.
- source_word: δικαίως
  english_pob_choice: justly
  chosen_spanish: con justicia
  alternatives_spanish:
  - justamente
  - con rectitud
  lexicon: LSJ
  rationale: El adverbio marca la adecuación moral y judicial del sufrimiento. «Con justicia» suena natural en español y conserva el matiz ético-jurídico.
- source_word: ἔπασχον
  english_pob_choice: they suffered
  chosen_spanish: padecían
  alternatives_spanish:
  - sufrían
  - eran afligidos
  lexicon: LSJ
  rationale: El verbo indica sufrir o padecer. «Padecían» mantiene el tono formal y el carácter continuo del imperfecto griego.
- source_word: ταῖς ἰδίαις αὐτῶν πονηρίαις
  english_pob_choice: for their own wicked deeds
  chosen_spanish: por sus propias maldades
  alternatives_spanish:
  - por sus propias maldades obras
  - por su propia perversidad
  lexicon: LSJ
  rationale: πονῃρίαι puede referirse a maldades concretas o a la maldad practicada. «Maldades» conserva el plural concreto y el sentido causal de la frase, sin volverlo excesivamente abstracto.
- source_word: χαλεπωτέραν
  english_pob_choice: even harsher
  chosen_spanish: aún más dura
  alternatives_spanish:
  - más severa
  - todavía más grave
  lexicon: LSJ
  rationale: El comparativo de χαλεπός expresa algo más severo o duro. «Aún más dura» conserva la gradación y es idiomática en español.
- source_word: μισοξενίαν
  english_pob_choice: hatred of strangers
  chosen_spanish: enemistad contra los extranjeros
  alternatives_spanish:
  - odio a los extraños
  - inhospitalidad
  lexicon: LSJ
  rationale: El término es más fuerte que mera falta de hospitalidad y puede implicar hostilidad activa hacia forasteros o huéspedes. «Enemistad contra los extranjeros» preserva esa severidad sin depender de una fórmula poco transparente.
- source_word: ἐπετήδευσαν
  english_pob_choice: they practiced
  chosen_spanish: practicaron
  alternatives_spanish:
  - cultivaron
  - se dedicaron a
  lexicon: LSJ
  rationale: El verbo indica una conducta asumida como práctica habitual. «Practicaron» comunica bien esa idea de ejercicio sostenido.
theological_decisions:
- issue: Intensidad moral de μισοξενία
  english_pob_reading: Rendered as 'hatred of strangers' rather than the milder 'inhospitality.'
  chosen_spanish_reading: «enemistad contra los extranjeros» en lugar de una versión suavizada como «inhospitalidad».
  alternative_spanish_readings:
  - inhospitalidad
  - odio a los extraños
  rationale: El contexto subraya la justicia del castigo y el comparativo χαλεπωτέραν intensifica la falta. «Enemistad» conserva la carga moral fuerte del término y evita rebajar el juicio del pasaje.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Relación causal entre su conducta y el sufrimiento
  english_pob_reading: Expressed as 'for their own wicked deeds.'
  chosen_spanish_reading: «con justicia padecían por sus propias maldades».
  alternative_spanish_readings:
  - padecían por su propia maldad
  - sufrían a causa de sus propias maldades
  rationale: 'La frase mantiene el carácter retributivo y la idea de causalidad moral: el sufrimiento se presenta como debido a sus propios actos. «Con justicia» traduce δικαίως y enlaza con el juicio moral del contexto.'
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'La redacción sigue la versión inglesa revisada más literal: conserva la referencia a «hechos que habían ocurrido», mantiene el paralelismo causal con γὰρ mediante «porque» y reproduce el comparativo χαλεπωτέραν con «aún más dura». También preserva la tensión lexical de μισοξενία al traducirla con una expresión más fuerte que «inhospitalidad».'
  spanish_consistency_notes:
  - Se usa «castigos» para τιμωρίαι, en coherencia con una retribución punitiva divina y con el tono formal del pasaje.
  - Se traduce κεραυνοί como «rayos» para un español natural, sin perder la imagen de fuerza destructiva.
  - «Padecían» mantiene el valor imperfectivo del griego ἔπασχον.
  - «Enemistad contra los extranjeros» conserva la severidad moral de μισοξενία y evita suavizarla indebidamente.
  - 'Se mantiene el orden lógico del griego: castigo, evidencia, justicia del sufrimiento y explicación moral final.'
