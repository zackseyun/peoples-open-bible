base_translation:
  language: en
  yaml_path: translation/nt/1_john/003/001.yaml
  text: See what kind of love the Father has given to us[a], that we should be called children of God—and we are. For this reason the world does not know us[e][d][c][b], because it did not know him.
  footnotes:
  - marker: a
    text: Or 'what sort of love'; traditionally 'how great a love.' The Greek emphasizes the kind or quality of the Father's love, expressed with astonishment.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts omit 'and we are.'
    reason: textual_variant
  - marker: c
    text: Or 'does not recognize us ... did not recognize him.'
    reason: lexical_alternative
  - marker: d
    text: '''Him'' most naturally refers to the Father in this verse; some understand it as referring to Christ in Johannine context.'
    reason: alternative_reading
  - marker: e
    text: 'Or ''the world does not know us: because it did not know him.''.'
    reason: previous_rendering
