  text: For these things[a], divine justice is storing up for you a more intense and eternal fire and torments[c][b], which through the whole age will not release you.
  footnotes:
  - marker: a
    text: Or 'more intense fire.' The Greek comparative πυκνοτέρῳ is literally 'denser' or 'thicker,' here expressing intensified punishment.
    reason: lexical_alternative
  - marker: b
    text: Or 'age-long fire.' The Greek αἰώνιος can be rendered more literally in relation to an age, though in this context it commonly carries the sense 'eternal.'
    reason: alternative_reading
  - marker: c
    text: Literally 'through the whole age.'
    reason: lexical_alternative
