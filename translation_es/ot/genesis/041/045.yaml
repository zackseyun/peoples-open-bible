translation:
  language: es
  text: Y el faraón le puso a José el nombre de Zafnat-panea[a], y le dio por esposa a Asenat, hija de Potifera, sacerdote de On[b]. Y José salió por toda[c] la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Zafnat-paanea». El significado del nombre egipcio es incierto, y las traducciones propuestas varían.
    reason: lexical_alternative
  - marker: b
    text: On es la ciudad egipcia que más tarde fue conocida en griego como Heliópolis.
    reason: cultural_note
  - marker: c
    text: O «sobre la tierra de Egipto». El hebreo también puede sugerir movimiento o actividad sobre el territorio.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  - dio el nombre de
  lexicon: HALOT
  rationale: קרא con complemento de nombre expresa el acto de dar un nombre. «Llamó a José por nombre» sería muy literal, pero en español «llamó a José por nombre X» suena menos natural; «llamó a José por nombre» se conserva en la sintaxis del verso, mientras que el verbo «llamó» mantiene el acto nominal explícito.
- source_word: שֵׁם יוֹסֵף
  english_pob_choice: Joseph’s name
  chosen_spanish: a José por nombre
  alternatives_spanish:
  - el nombre de José
  - a José
  lexicon: HALOT
  rationale: La construcción hebrea «llamó el nombre de José» se refleja mejor manteniendo la idea de nombre impuesto. El español requiere reordenamiento para sonar natural, pero sin perder el acto formal de nombrar.
- source_word: צָפְנַת פַּעְנֵחַ
  english_pob_choice: Zaphenath-paneah
  chosen_spanish: Zafnat-panea
  alternatives_spanish:
  - Zafnat-paneah
  - Zafenat-panea
  lexicon: HALOT
  rationale: Es un nombre egipcio de etimología incierta; no debe traducirse. Se translitera en forma hispanizada y con guion para reflejar el binomio hebreo. «Zafnat-panea» sigue la decisión inglesa de preservar la incertidumbre y evita fijar un significado no seguro.
- source_word: וַיִּתֶּן לוֹ
  english_pob_choice: he gave him
  chosen_spanish: le dio
  alternatives_spanish:
  - se la dio
  - le entregó
  lexicon: HALOT
  rationale: נתן con sufijo indirecto se expresa naturalmente en español con «le dio». Mantiene el sentido de otorgamiento matrimonial sin añadir matices no presentes en el hebreo.
- source_word: אָסְנַת
  english_pob_choice: Asenath
  chosen_spanish: Asenat
  alternatives_spanish:
  - Asenet
  - Asenath
  lexicon: HALOT
  rationale: Nombre propio transliterado al español con adaptación fonética mínima y forma comúnmente inteligible. Se evita la grafía inglesa cuando el español puede representar el nombre de manera más fluida.
- source_word: בַּת פּוֹטִי פֶרַע
  english_pob_choice: the daughter of Potiphera
  chosen_spanish: hija de Potifera
  alternatives_spanish:
  - hija de Potífera
  - hija de Potiphera
  lexicon: HALOT
  rationale: La relación de filiación es directa. La forma hispanizada «Potifera» es clara y conserva la referencia al nombre propio sin introducir una traducción interpretativa.
- source_word: כֹּהֵן אֹן
  english_pob_choice: priest of On
  chosen_spanish: sacerdote de On
  alternatives_spanish:
  - sacerdote de Heliópolis
  - sacerdote de On
  lexicon: HALOT
  rationale: כֹּהֵן significa «sacerdote». En español, «sacerdote» es el equivalente natural y digno. Se conserva «On» en el texto principal como la forma hebrea del topónimo, con la alternativa cultural conocida reservada para nota.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: por esposa
  alternatives_spanish:
  - como esposa
  - para mujer
  lexicon: HALOT
  rationale: La frase formula la entrega matrimonial. «Por esposa» es idiomático en español y preserva el valor relacional del hebreo sin hacer la frase pesada.
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió fuera
  - partió
  lexicon: HALOT
  rationale: יצא se traduce de forma directa y natural con «salió». Evita una paráfrasis más fuerte que alteraría el movimiento simple del texto.
- source_word: עַל אֶרֶץ מִצְרַיִם
  english_pob_choice: over the land of Egypt
  chosen_spanish: sobre la tierra de Egipto
  alternatives_spanish:
  - por toda la tierra de Egipto
  - a través de la tierra de Egipto
  lexicon: HALOT
  rationale: Se conserva la preposición עַל con «sobre», como hace el inglés POB, porque puede sugerir desplazamiento en relación con la tierra y también cierto ámbito de autoridad. «Tierra» mantiene el registro bíblico adecuado en español.
theological_decisions:
- issue: El sentido de עַל אֶרֶץ מִצְרַיִם y su posible matiz de autoridad o extensión territorial
  english_pob_reading: over the land of Egypt
  chosen_spanish_reading: sobre la tierra de Egipto
  alternative_spanish_readings:
  - por toda la tierra de Egipto
  - a través de la tierra de Egipto
  rationale: El hebreo permite una lectura espacial y otra de alcance/administración. Se mantiene «sobre» para no fijar demasiado pronto una sola interpretación. La nota alternativa puede explicitar la extensión si el lector la necesita.
  doctrine_reference: Énfasis narrativo del texto; sin carga doctrinal directa
- issue: Identificación de On con Heliópolis
  english_pob_reading: On is the Egyptian city later known in Greek as Heliopolis.
  chosen_spanish_reading: On como topónimo hebreo, con Heliópolis como referencia cultural alternativa
  alternative_spanish_readings:
  - Heliópolis
  - 'On'
  rationale: El texto hebreo dice On; la equivalencia con Heliópolis es histórica y útil, pero no debe reemplazar la forma del texto principal. Se conserva el nombre bíblico y se deja la identificación en nota.
  doctrine_reference: Toponimia histórica bíblica
translation_notes:
  revision_awareness: He tomado en cuenta la revisión inglesa que aclaró la apposición en «Potiphera, the priest of On». En español, la apposición se resuelve con comas implícitas por la estructura nominal «hija de Potifera, sacerdote de On», manteniendo clara la relación entre nombre y título. También he conservado la alternativa de traducción del topónimo y del alcance de עַל, conforme al aparato inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - «Mesías/Cristo» no aplica aquí.
  - Se usa «sacerdote» para כֹּהֵן por ser el equivalente semántico directo y natural en español.
  - Los nombres propios se hispanizan con moderación para legibilidad, sin traducir su significado incierto.
  - Se conserva la ambigüedad de עַל con «sobre» y se documenta en nota la opción «por toda la tierra de Egipto».
