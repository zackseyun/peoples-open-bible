review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido básico del hebreo: lamento visceral dirigido por Moab, comparación con un instrumento de cuerdas, y paralelismo entre «mis entrañas» y «mi ser íntimo». Sin embargo, no preserva completamente el rastro de auditoría del POB en dos puntos: falta la nota alternativa sobre Quir-heres/Kir-hareseth que el inglés sí conserva, y el marcador de nota usa «g» en lugar de reiniciar ordenadamente con «a».'
  spanish_quality_summary: 'La redacción es natural y digna en español: «mis entrañas» y «mi ser íntimo» leen bien y reflejan la imaginería antropológica hebrea. «Gimen como un arpa» es aceptable, aunque el orden «como arpa» sin artículo sonaría algo más idiomático; no es necesario cambiarlo. «Quir-heres» es una transliteración razonable y legible.'
  glossary_alignment: 'No hay términos de glosario mayor en disputa. El tratamiento de antropología hebrea es fiel: מֵעַי -> «mis entrañas» y קִרְבִּי -> «mi ser íntimo». La elección «por Moab» sigue adecuadamente la decisión inglesa «for Moab». Debe añadirse la nota de topónimo alternativa y corregirse la secuencia de marcadores a «a», «b».'
  issues:
  - severity: medium
    issue: Falta la nota sobre el topónimo לְקִיר חָרֶשׂ
    rationale: El inglés POB preserva explícitamente la alternativa tradicional «Kir-hareseth» para el nombre de ciudad. El español debe conservar esa información en nota, especialmente porque el texto principal usa una transliteración.
  - severity: medium
    issue: Marcador de nota incorrecto
    rationale: El borrador usa «[g]» aunque solo hay una nota. Las instrucciones exigen marcadores únicos en orden (a, b, c...).
  - severity: low
    issue: La nota léxica usa «laúd» en vez de una alternativa más cercana a harp/lyre
    rationale: «Laúd» no es imposible para un instrumento de cuerdas, pero se aparta del rastro inglés «harp/lyre». «Lira» preserva mejor la alternativa documentada del POB y evita desplazar el campo léxico.
  revised_spanish_text: Por eso mis entrañas gimen como un arpa[a] por Moab, y mi ser íntimo por Quir-heres[b].
  revised_footnotes:
  - marker: a
    text: O «como una lira»; el hebreo kinnor designa un instrumento de cuerdas.
    reason: lexical_alternative
  - marker: b
    text: Quir-heres es una ciudad moabita; tradicionalmente, «Quir-hareset».
    reason: alternative_reading
  revision_rationale: Se reordenó la frase ligeramente para mayor naturalidad en español sin alterar el sentido. Se corrigió la secuencia de marcadores, se ajustó la nota léxica para reflejar mejor la alternativa inglesa «lyre», y se añadió la nota toponímica que forma parte del rastro auditado del POB.
