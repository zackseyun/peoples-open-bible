translation:
  language: es
  text: Los pilares del cielo[a] tiemblan y quedan atónitos[b] ante su reprensión[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las columnas del cielo'; el hebreo conserva la imagen poética y cósmica de soportes del cielo.
    reason: lexical_alternative
  - marker: b
    text: O 'se asombran' / 'quedan pasmados'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'de su reprensión'; también puede entenderse 'por' o 'a causa de' su reprensión.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַמּוּדֵי שָׁמַיִם
  english_pob_choice: the pillars of heaven
  chosen_spanish: las columnas de los cielos
  alternatives_spanish:
  - los pilares de los cielos
  - las columnas del cielo
  - los pilares del cielo
  lexicon: HALOT
  rationale: עַמּוּדֵי es el plural constructo de עַמּוּד, con el sentido de 'pilares/columnas'. En español, 'columnas' conserva bien la imagen arquitectónica y resulta natural; 'cielos' refleja el plural hebreo שָׁמַיִם sin reducirlo de forma indebida a un singular teológico automático.
- source_word: יְרוֹפָפוּ
  english_pob_choice: tremble
  chosen_spanish: tiemblan
  alternatives_spanish:
  - tiritan
  - se estremecen
  - se sacuden
  lexicon: HALOT
  rationale: El verbo expresa temblor o sacudida. 'Tiemblan' es la opción más directa y natural en español para mantener la intensidad poética sin añadir matices no exigidos por el hebreo.
- source_word: וְיִתְמְהוּ
  english_pob_choice: and are astonished
  chosen_spanish: se asombran
  alternatives_spanish:
  - se atónan
  - quedan maravillados
  - quedan pasmados
  lexicon: HALOT
  rationale: תמהּ comunica quedar aturdido o asombrado. 'Se asombran' preserva la reacción de estupefacción en un registro claro y publicable; evita 'se espantan', que podría cargar el verso con miedo no explícito en el verbo.
- source_word: מִגַּעֲרָתוֹ
  english_pob_choice: at his rebuke
  chosen_spanish: ante su reprensión
  alternatives_spanish:
  - por su reprensión
  - a causa de su reprensión
  - de su reprensión
  lexicon: HALOT
  rationale: La preposición מִן puede indicar fuente o causa. 'Ante su reprensión' comunica en español la reacción provocada por la palabra amenazante de Dios sin volverse rígidamente literal; conserva la fuerza relacional del verso y la causalidad implícita.
theological_decisions:
- issue: Imaginería cósmica de 'las columnas de los cielos'
  english_pob_reading: Retain the poetic cosmological image without demythologizing or literalizing it.
  chosen_spanish_reading: Conservar la imagen poética de las 'columnas de los cielos' sin explicarla ni suavizarla.
  alternative_spanish_readings:
  - Interpretarlo como metáfora de montes
  - Traducirlo como una cosmología literal
  rationale: La poesía de Job utiliza imágenes cósmicas antiguas de manera deliberada. La versión española debe mantener esa tensión imaginativa en lugar de reinterpretarla o corregirla desde una cosmología moderna.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto español sigue de cerca el hebreo y el audit trail inglés, conservando la imagen cósmica y las opciones léxicas documentadas sin introducir explicaciones ajenas al verso. No se requieren revisiones adicionales según el último pass, que marcó alta concordancia.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo lo exige explícitamente; aquí el posesivo 'su' preserva la referencia implícita sin añadir un nombre divino innecesario.
  - Se mantiene el plural 'cielos' para שָׁמַיִם, coherente con el hebreo y con el estilo poético del libro de Job.
  - '''Reprensión'' conserva el tono de advertencia o amonestación del sustantivo hebreo sin forzar una lectura moralizante.'
