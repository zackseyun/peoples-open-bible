review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: la declaración introductoria, la colocación de la piedra en Sion, la serie descriptiva arquitectónica y la promesa final al creyente. Sin embargo, hay desajustes en el anclaje y contenido de las notas: la nota sobre ''el que confía'' está anclada a ''cimiento firme'' en vez de a ''cree'', la nota mesiánica/canónica del inglés POB falta por completo, y la nota sobre ''no tendrá prisa'' está anclada al verbo correcto pero desplazada de la secuencia documental. Además, ''yo pongo'' es aceptable, pero ''yo pongo'' puede conservarse sin problema.'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. ''He aquí'' y ''piedra angular preciosa'' funcionan bien. ''Cimiento firme'' es natural, aunque ''cimiento seguro'' o ''fundamento firme'' también serían válidos. La principal deficiencia es editorial/documental: notas mal asociadas y omisión de la nota canónica presente en el audit trail inglés.'
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: יהוה se conserva como ''Yahvé'', no se fuerza una lectura mesiánica en el texto principal, y הַמַּאֲמִין se traduce de forma contextualmente adecuada como ''el que cree''. La combinación ''el Señor Yahvé'' es defendible en español POB para אֲדֹנָי יְהוִה.'
  issues:
  - severity: high
    issue: 'La nota ''O: «el que confía»'' está anclada al lugar equivocado.'
    rationale: Esa alternativa corresponde a הַמַּאֲמִין ('el que cree'), no a 'cimiento firme'. Según las reglas del proyecto, el marcador debe aparecer en la palabra o frase pertinente del texto.
  - severity: high
    issue: Falta la nota canónica/cristológica del inglés POB sobre la 'piedra'.
    rationale: El audit trail inglés preserva explícitamente la aplicación posterior al Mesías en Romanos 9:33 y 1 Pedro 2:6. Debe conservarse en español, preferiblemente anclada a 'piedra' o a la frase de la piedra/fundamento.
  - severity: medium
    issue: La secuencia y distribución de marcadores no sigue bien la lógica de las notas.
    rationale: 'Las notas deben ir en orden y corresponder claramente a sus referentes: primero la piedra/cross-reference, luego el creyente/confía, luego el verbo final/no tendrá prisa. La nota sobre ''cimiento firme'' es útil, pero no está en el audit trail inglés y no es necesaria como nota si no resuelve una ambigüedad nueva en español.'
