review_pass:
  verdict: revise
  source_alignment_summary: El borrador español conserva bien la fuerza condicional heredada del v. 25, el referente davídico de «su descendencia» y la estructura general del hebreo. Sin embargo, en la cláusula final se aparta del audit trail inglés y de la mejor idiomaticidad española al traducir שְׁבוּת como «cautiverio» en el texto principal, cuando la decisión POB preferida es el sentido más amplio «restaurar su fortuna/situación», dejando «cautiverio/exiliados» como alternativa en nota. También «tendré compasión de ellos» es comprensible, pero «de ellos» suena menos natural que «de ellos»/«de ellos»? mejor «de ellos» puede mantenerse; no es error de sentido.
  spanish_quality_summary: El texto es generalmente claro y digno, pero «haré volver su cautiverio» suena calcado y poco natural en español moderno eclesial. Además, la nota [b] está anclada en «Jacob[b]», aunque semánticamente corresponde a la cláusula de restauración final; conviene mover el anclaje al verbo de restauración. El resto del verso fluye bien.
  glossary_alignment: No hay conflictos con la terminología global salvo la preferencia contextual por una traducción más idiomática de שְׁבוּת. «Mi siervo», «gobernantes», «descendencia/linaje» y la fuerza modal están alineados con el audit trail. La alternancia «linaje» / «descendencia» para זֶרַע es aceptable, aunque «descendencia» sería algo más transparente.
  issues:
  - severity: medium
    issue: שְׁבוּת traducido en el texto principal como «cautiverio»
    rationale: El audit trail inglés eligió como principal «restore their fortunes», dejando «captivity/exiles» como alternativa. «Haré volver su cautiverio» es posible, pero en español resulta menos natural y estrecha el sentido donde el POB quiso mantener la amplitud restauradora del idiomismo hebreo.
  - severity: low
    issue: Anclaje de la nota [b] en el lugar equivocado
    rationale: La nota [b] explica שְׁבוּת, pero el marcador aparece tras «Jacob» en vez de junto a la cláusula «restauraré...». Esto dificulta la correspondencia exacta entre nota y término anotado.
  - severity: low
    issue: Leve calco en «haré volver su cautiverio»
    rationale: Aunque defendible lexicalmente, la frase no suena natural en español bíblico contemporáneo. «Restauraré su fortuna» o «restauraré su situación» comunica mejor el idiomatismo.
