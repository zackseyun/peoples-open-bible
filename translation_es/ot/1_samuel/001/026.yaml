revisions:
- from: 'Y ella dijo[a]: «Por favor, mi señor, ¡viva tu alma!, mi señor; yo soy la mujer que estaba aquí junto a ti, orando a Yahvé».'
  to: 'Y ella dijo: «Por favor, mi señor, tan cierto como que vives[a], mi señor, yo soy la mujer que estaba aquí junto a ti, orando a Yahvé».'
  rationale: Se revisa únicamente la fórmula juratoria para reflejar con fidelidad su sentido idiomático y producir un español natural y digno. También se mueve la nota al punto exacto que explica. Se conservan «Yahvé», «mi señor», «junto a ti» y «orando», que están bien fundamentados por el hebreo y por la auditoría inglesa.
