translation:
  language: es
  text: 'Estos son los clanes de los hijos de Aser, según sus censados: cincuenta y tres mil cuatrocientos[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: "según los contados de ellos". El hebreo refleja la terminología censal del verbo פקד, refiriéndose a los que fueron registrados o contados oficialmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estas son
  alternatives_spanish:
  - Estas
  lexicon: HALOT
  rationale: La fórmula demostrativa introduce un resumen de censo; en español, la cópula expresa naturalmente el valor de presentación sin añadir contenido extra.
- source_word: מִשְׁפְּחֹת
  english_pob_choice: clans
  chosen_spanish: familias
  alternatives_spanish:
  - clanes
  lexicon: HALOT
  rationale: En contexto tribal/censal, el término puede referirse a grupos de parentesco extendido. En español, 'familias' comunica esa unidad social sin forzar un tecnicismo poco natural; 'clanes' se reserva si el contexto requiere destacar la estructura tribal como tal.
- source_word: בְּנֵי אָשֵׁר
  english_pob_choice: the sons of Asher
  chosen_spanish: los hijos de Aser
  alternatives_spanish:
  - los descendientes de Aser
  - los hijos de Asher
  lexicon: HALOT
  rationale: Se conserva la expresión genealógica literal del hebreo. 'Hijos' mantiene el paralelismo bíblico y el vínculo de descendencia tribal.
- source_word: לִפְקֻדֵיהֶם
  english_pob_choice: according to those numbered of them
  chosen_spanish: según los inscritos de ellos
  alternatives_spanish:
  - según los contados de ellos
  - según su número
  - según los censados de ellos
  lexicon: HALOT
  rationale: פקד aquí pertenece al campo censal de 'contar/inscribir/muster'. 'Inscritos' conserva la idea de registro oficial y evita reducir el sentido a un simple número abstracto. La expresión 'de ellos' refleja el sufijo pronominal sin suavizar la tensión censal.
- source_word: שְׁלֹשָׁה וַחֲמִשִּׁים אֶלֶף וְאַרְבַּע מֵאוֹת
  english_pob_choice: fifty-three thousand four hundred
  chosen_spanish: cincuenta y tres mil cuatrocientos
  alternatives_spanish:
  - tres y cincuenta mil y cuatrocientos
  lexicon: HALOT
  rationale: Se vierte en el orden numérico natural del español, preservando exactamente el total del hebreo.
theological_decisions:
- issue: Terminología censal de פקד y la posible lectura de 'contados' vs. 'inscritos'
  english_pob_reading: according to those numbered of them
  chosen_spanish_reading: según los inscritos de ellos
  alternative_spanish_readings:
  - según los contados de ellos
  - según su número
  - según los censados de ellos
  rationale: 'No hay tensión doctrinal, pero sí una decisión lexical relevante: el hebreo no describe solo cantidad, sino un grupo oficialmente registrado en el censo. ''Inscritos'' preserva ese valor administrativo y evita diluir la terminología del pasaje.'
  doctrine_reference: Números 1; Números 26 (censos tribales de Israel)
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó la coma y mantuvo 'of them' para acercarse más al hebreo. En español se conserva igualmente la relación pronominal mediante 'de ellos' y se evita añadir puntuación que rompa la cadencia del miembro censal.
  spanish_consistency_notes:
  - Se mantiene 'Aser' como forma española estándar del nombre tribal.
  - Se usa 'familias' en plural para מִשְׁפְּחֹת, coherente con listas de censo tribales.
  - La nota al pie preserva la alternativa más formal del campo de פקד sin imponerla en el texto principal.
  - El número se escribe con palabras siguiendo el estilo bíblico español y la legibilidad publicable.
