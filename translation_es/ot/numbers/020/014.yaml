translation:
  language: es
  text: 'Entonces Moisés envió mensajeros desde Cades al rey de Edom: «Así dice tu hermano Israel: Tú sabes todo el sufrimiento[a][b][c] que nos ha sobrevenido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu pariente Israel». El hebreo usa lenguaje familiar, «tu hermano Israel», para invocar la relación ancestral entre Edom e Israel.
    reason: lexical_alternative
  - marker: b
    text: O «toda la angustia» o «toda la aflicción».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «que nos encontró»; es decir, «que nos ha sobrevenido» o «que nos ha acontecido».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y ... envió
  - Luego ... envió
  lexicon: HALOT
  rationale: La forma narrativa hebrea con waw consecutiva avanza la acción; «Entonces» conserva la secuencia natural en español sin perder el enlace narrativo.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: En este contexto diplomático se trata de representantes humanos. «Mensajeros» mantiene la amplitud semántica sin introducir una precisión no garantizada por el hebreo.
- source_word: מִקָּדֵשׁ
  english_pob_choice: from Kadesh
  chosen_spanish: desde Cades
  alternatives_spanish:
  - de Cades
  - desde Cades-barnea
  lexicon: HALOT
  rationale: El hebreo dice solo «Cades». Se conserva ese topónimo breve sin importar «Cades-barnea», que no aparece en el verso.
- source_word: מֶלֶךְ אֱדוֹם
  english_pob_choice: the king of Edom
  chosen_spanish: al rey de Edom
  alternatives_spanish:
  - al rey de Edom
  - para el rey de Edom
  lexicon: HALOT
  rationale: La construcción de destinatario se expresa de forma natural con «al rey de Edom», manteniendo el sentido del hebreo constructo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: Es una fórmula mensajera estándar. «Así dice» reproduce su tono formal y su valor de anuncio en tiempo presente.
- source_word: אָחִיךָ יִשְׂרָאֵל
  english_pob_choice: your brother Israel
  chosen_spanish: tu hermano Israel
  alternatives_spanish:
  - tu pariente Israel
  - Israel, tu hermano
  lexicon: HALOT
  rationale: Se conserva la metáfora de parentesco literal. «Tu hermano Israel» refleja la relación fraterna evocada por el texto, sin suavizarla a una expresión menos concreta.
- source_word: אַתָּה יָדַעְתָּ
  english_pob_choice: You know
  chosen_spanish: Tú sabes
  alternatives_spanish:
  - Tú conoces
  - Tú bien sabes
  lexicon: HALOT
  rationale: El perfecto expresa un estado presente de conocimiento. «Tú sabes» es natural en español y conserva el énfasis del pronombre explícito.
- source_word: כָּל הַתְּלָאָה
  english_pob_choice: all the hardship
  chosen_spanish: toda la calamidad
  alternatives_spanish:
  - todo el sufrimiento
  - toda la angustia
  - todo el dolor
  lexicon: HALOT
  rationale: «תְּלָאָה» puede abarcar dificultad, angustia o calamidad. Aquí se eligió «calamidad» para reflejar el peso global del sufrimiento sin reducirlo a una sola esfera emocional.
- source_word: אֲשֶׁר מְצָאָתְנוּ
  english_pob_choice: that has come upon us
  chosen_spanish: que nos ha sobrevenido
  alternatives_spanish:
  - que nos ha acontecido
  - que nos ha alcanzado
  - que nos ha ocurrido
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «que nos halló/encontró». «Nos ha sobrevenido» conserva el sentido de algo que irrumpe o cae sobre ellos, evitando la madera de una traducción demasiado literal.
theological_decisions:
- issue: Lenguaje de parentesco entre Israel y Edom
  english_pob_reading: your brother Israel
  chosen_spanish_reading: tu hermano Israel
  alternative_spanish_readings:
  - tu pariente Israel
  rationale: La apelación intencionalmente usa un lenguaje familiar que conecta a Edom e Israel por su ascendencia común. Mantener «hermano» preserva esa carga retórica y teológica en vez de neutralizarla.
  doctrine_reference: Translation philosophy §3, §4
translation_notes:
  revision_awareness: El texto base en inglés no recibió cambios en la última revisión; el presente borrador sigue de cerca la decisión auditada y conserva las tres notas alternativas donde el hebreo permite matices léxicos significativos.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en este proyecto, pero este verso no contiene el nombre divino.
  - Se mantiene la metáfora de parentesco «hermano» por estar explícitamente documentada en el audit trail inglés.
  - «Mensajeros» se eligió frente a «embajadores» para no restringir indebidamente el término hebreo.
  - «Calamidad» comunica el peso global de תְּלָאָה; en notas se preservan alternativas válidas sin borrar la tensión semántica.
