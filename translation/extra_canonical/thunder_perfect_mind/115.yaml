translation:
  text: I am the name cried out among those who are dead; and I am the one who is
    present—alone and in unity. The one who will judge me by the law—
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: The OCR shows ⲡⲓⲛⲁ, but context and common Thunder diction suggest ⲡⲓⲣⲁⲛ
      (“the name”).
    reason: alignment_note
  - marker: '2'
    text: ⲧⲱⲱⲛ + ⲉⲃⲟⲗ can mean ‘cast out’ or ‘proclaimed out’; ‘cried out’ was chosen
      to preserve the audible/voiced motif.
    reason: lexical_alternative
  - marker: '3'
    text: The OCR reads ⲛⲉⲗⲟⲥ; I take this as ⲛⲟⲙⲟⲥ (Greek ‘law’). If this is wrong,
      the juridical sense would change.
    reason: alignment_note
  - marker: '4'
    text: I read ⲙⲛⲧⲟⲩⲁⲁⲧ (‘unity’). Alternatives like ‘oneness’ are possible; the
      OCR may have dropped ⲟⲩ.
    reason: lexical_alternative
  - marker: a
    text: Or 'solitary and as unity'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲁⲛⲟⲕ
  chosen: I am
  alternatives:
  - I
  lexicon: Sahidic Coptic basic grammar
  rationale: Maintain the recurring first-person self-identification formula central
    to the poem’s cadence and paradox.
- source_word: '(ⲡⲓ)ⲣⲁⲛ (OCR: ⲡⲓⲛⲁ)'
  chosen: the name
  alternatives:
  - name
  lexicon: Coptic (Crum) s.v. ⲣⲁⲛ
  rationale: OCR likely dropped ⲣ; the expected form for “name” is ⲣⲁⲛ with the masculine
    article ⲡⲓ. Rendering as “the name” keeps the formal force.
- source_word: ⲧⲁⲧⲧⲱⲱⲛ ⲉⲃⲟⲗ
  chosen: cried out
  alternatives:
  - cast out
  - proclaimed
  lexicon: Coptic verbal stem tⲱⲛ/tⲱⲱⲛ; ebol = out
  rationale: The reduplicated form with ⲉⲃⲟⲗ suggests outward vocalization/expulsion.
    “Cried out” preserves the audible force fitting Thunder’s motifs of voice/sound.
- source_word: ϩⲛ ⲛⲉⲧⲙⲟⲟⲩⲧ
  chosen: among those who are dead
  alternatives:
  - in the dead
  - among the dead
  lexicon: Coptic preposition ϩⲛ + relative plural ⲛⲉⲧ-; ⲙⲟⲟⲩⲧ = die/dead
  rationale: ⲛⲉⲧ- marks a plural relative clause; “among those who are dead” best
    captures ϩⲛ with the plural relative.
- source_word: ⲭⲉ
  chosen: and
  alternatives:
  - and also
  lexicon: Sahidic particle ⲭⲉ
  rationale: Simple copulative “and” keeps cadence tight; “also” is implied by the
    parallel structure.
- source_word: ⲡⲉⲧ ϣⲟⲟⲡ
  chosen: the one who is present
  alternatives:
  - the one who exists
  - the one who appears
  lexicon: Coptic ϣⲟⲟⲡ = be present/appear
  rationale: “Is present” preserves the nuance of presence rather than mere existence,
    matching Thunder’s self-manifestation theme.
- source_word: ⲟⲩⲁⲁⲧ
  chosen: solitary
  alternatives:
  - alone
  - one
  lexicon: Coptic ⲟⲩⲁⲁⲧ (from ⲟⲩⲁ = one)
  rationale: Abstract/qualitative sense of being ‘single/solitary’ contrasts well
    with the following abstract noun for ‘unity’ to preserve paradox.
- source_word: 'ⲙⲛⲧⲟⲩⲁⲁⲧ (OCR: ⲙⲛⲧⲁⲓ)'
  chosen: unity
  alternatives:
  - oneness
  lexicon: Coptic ⲙⲛⲧ- abstract noun former + ⲟⲩⲁⲁⲧ
  rationale: OCR likely omitted ⲟⲩ; ⲙⲛⲧⲟⲩⲁⲁⲧ is the standard abstract ‘unity/oneness’.
    ‘Unity’ keeps the paradox with ‘solitary’ sharp.
- source_word: ⲡⲉⲧⲛⲁⲕⲣⲓⲛⲉ ⲙⲙⲟⲓ
  chosen: the one who will judge me
  alternatives:
  - the one judging me
  lexicon: Greek loan κρίνειν in Coptic; future marker ⲛⲁ-
  rationale: ⲛⲁ- marks futurity; keep explicit agentive relative clause to preserve
    the line’s juridical tone.
- source_word: 'ϩⲁ ⲡⲓ ⲛⲟⲙⲟⲥ (OCR: ⲛⲉⲗⲟⲥ)'
  chosen: by the law
  alternatives:
  - according to the law
  lexicon: Greek νόμος (law) in Coptic script
  rationale: The sequence fits the frequent juridical collocation; OCR likely misread
    ⲛⲟⲙⲟⲥ. ‘By the law’ is concise and rhythmic.
parallelism_check: 'This block preserves the poem’s antithetical cadence by retaining
  the doubled “I am” and a stark paradox: “solitary” versus “unity.” The initial clause
  “the name cried out among those who are dead” carries the poem’s recurrent inversion
  of presence/absence and life/death. I avoided collapsing the opposites into a single
  domesticated idea and kept parallel structure across the clauses.'
voice_check: The self-revelatory first-person voice is maintained with explicit “I
  am” repetitions. I did not drop the second “I am,” and I kept short, declarative
  clauses to echo the authoritative, oracular tone characteristic of Thunder.
alignment_risk_note: Alignment confidence is low and the OCR is noisy. I infer ⲡⲓⲣⲁⲛ
  (‘the name’) from OCR ⲡⲓⲛⲁ; ⲙⲛⲧⲟⲩⲁⲁⲧ (‘unity’) from OCR ⲙⲛⲧⲁⲓ; and ⲛⲟⲙⲟⲥ (‘law’)
  from OCR ⲛⲉⲗⲟⲥ. The final clause is fragmentary (ⲉⲧ ϩⲁⲭⲉⲓⲛ ⲉⲛⲉⲧ …), so I render
  only what precedes it and mark the line with a dash to signal incompleteness rather
  than conjecture. The consult hint (“light … and shadow”) may pertain to adjacent
  lines, not this exact snippet.
