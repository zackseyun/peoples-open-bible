translation:
  language: es
  text: Morirán de enfermedades mortales[a]. No serán lamentados ni sepultados; serán estiércol sobre la superficie de la tierra[b]. Serán consumidos por la espada y por el hambre, y sus cadáveres[c] serán alimento para las aves del cielo y para las bestias de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: ''muertes de enfermedades''; la frase significa muerte causada por una enfermedad grave.'
    reason: lexical_alternative
  - marker: b
    text: O 'sobre la faz de la tierra'.
    reason: lexical_alternative
  - marker: c
    text: O 'sus cuerpos muertos' en lugar de 'sus cadáveres'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְמוֹתֵי תַחֲלֻאִים
  english_pob_choice: deadly diseases
  chosen_spanish: enfermedades mortales
  alternatives_spanish:
  - muertes de enfermedades
  - enfermedades de muerte
  - males mortales
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente 'muertes de enfermedades/sufrimientos', una expresión idiomática de muerte causada por enfermedad grave. 'Enfermedades mortales' comunica ese sentido con naturalidad en español sin perder la fuerza del original.
- source_word: יָמֻתוּ
  english_pob_choice: they will die
  chosen_spanish: morirán
  alternatives_spanish:
  - van a morir
  - ellos morirán
  lexicon: HALOT
  rationale: El imperfecto qal expresa aquí futuro profético/judicial. 'Morirán' es el equivalente directo y digno en español.
- source_word: לֹא יִסָּפְדוּ
  english_pob_choice: they will not be mourned
  chosen_spanish: No serán lamentados
  alternatives_spanish:
  - No se los llorará
  - No habrá duelo por ellos
  lexicon: HALOT
  rationale: El nifal de ספד se refiere al lamento fúnebre. 'Lamentados' conserva el matiz ritual y solemne mejor que una paráfrasis más libre.
- source_word: וְלֹא יִקָּבֵרוּ
  english_pob_choice: or buried
  chosen_spanish: ni sepultados
  alternatives_spanish:
  - ni enterrados
  - y no serán sepultados
  lexicon: HALOT
  rationale: Mantengo el paralelismo negativo con la cláusula anterior. 'Sepultados' es más formal y encaja con el registro funerario del verso.
- source_word: לְדֹמֶן
  english_pob_choice: dung
  chosen_spanish: estiércol
  alternatives_spanish:
  - boñiga
  - dung
  lexicon: HALOT
  rationale: דֹּמֶן denota excremento animal usado como abono. En español, 'estiércol' comunica la degradación con mayor inteligibilidad que 'dung', sin suavizar el insulto visual del texto.
- source_word: עַל פְּנֵי הָאֲדָמָה
  english_pob_choice: on the surface of the ground
  chosen_spanish: sobre la superficie de la tierra
  alternatives_spanish:
  - sobre la faz de la tierra
  - sobre la superficie del suelo
  lexicon: HALOT
  rationale: '''Sobre la superficie de la tierra'' preserva la imagen de exposición pública y de cuerpos no enterrados, en un español natural.'
- source_word: יִהְי֑וּ
  english_pob_choice: they will become
  chosen_spanish: serán
  alternatives_spanish:
  - llegarán a ser
  - quedarán
  lexicon: HALOT
  rationale: En español, con un sustantivo predicativo como 'estiércol', el sentido resultativo puede expresarse de forma natural con 'serán'. No se pierde la idea de degradación contextual.
- source_word: וּבַחֶרֶב וּבָרָעָב יִכְלוּ
  english_pob_choice: They will be consumed by the sword and by famine
  chosen_spanish: Serán consumidos por la espada y por el hambre
  alternatives_spanish:
  - Perecerán por la espada y por el hambre
  - La espada y el hambre los consumirán
  lexicon: HALOT
  rationale: כלה aquí expresa ser acabados o consumidos. 'Consumidos' mantiene la intensidad del juicio y corresponde al giro instrumental hebreo.
- source_word: נִבְלָתָם
  english_pob_choice: their carcasses
  chosen_spanish: sus cadáveres
  alternatives_spanish:
  - sus cuerpos muertos
  - sus carcasas
  lexicon: HALOT
  rationale: נְבֵלָה alude a un cuerpo muerto expuesto. 'Cadáveres' es el equivalente digno y claro en español; 'carcasas' resulta demasiado zoológico para el registro principal.
- source_word: לְמַאֲכָל
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - presa
  lexicon: HALOT
  rationale: El sustantivo significa alimento/comida. 'Alimento' conserva el tono elevado y la relación de uso por animales carroñeros.
- source_word: לְעוֹף הַשָּׁמַיִם
  english_pob_choice: for the birds of the heavens
  chosen_spanish: para las aves del cielo
  alternatives_spanish:
  - para las aves de los cielos
  - para los pájaros del cielo
  lexicon: HALOT
  rationale: '''עוֹף'' designa aves en general; ''aves del cielo'' mantiene el hebraísmo sin sonar forzado. ''Cielo'' resulta más natural que ''cielos'' en español corriente.'
- source_word: וּלְבֶהֱמַת הָאָרֶץ
  english_pob_choice: for the beasts of the earth
  chosen_spanish: para las bestias de la tierra
  alternatives_spanish:
  - para los animales de la tierra
  - para las fieras de la tierra
  lexicon: HALOT
  rationale: בְּהֵמָה puede significar animal o bestia. 'Bestias' conserva el tono ominoso y el paralelismo con 'aves del cielo' que documenta la versión inglesa POB.
translation_notes:
  revision_awareness: 'La revisión más reciente en el flujo inglés indica que no hubo cambios: se mantuvo la lectura de alta concordancia entre el texto fuente y la traducción auditada. Este borrador español sigue esa misma línea, conservando las tres notas léxicas principales del inglés (enfermedad mortal, superficie/faz de la tierra, cadáveres/cuerpos muertos) y el tono de juicio degradante del verso.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca explícitamente en este versículo, sino por coherencia terminológica del proyecto cuando el contexto lo requiera; aquí no fue necesario.
  - Se mantuvo 'aves del cielo' y 'bestias de la tierra' por ser fórmulas bíblicas transparentes y fieles al paralelismo.
  - No se introdujeron términos eclesiásticos tradicionales que suavicen el lenguaje de degradación del texto.
