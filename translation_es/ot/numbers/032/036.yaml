translation:
  language: es
  text: y Bet-nimra y Bet-haran, ciudades fortificadas[a], y rediles de ovejas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «ciudades de fortaleza».
    reason: lexical_alternative
  - marker: b
    text: O «rediles para ovejas» o «corrales para rebaños».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית נִמְרָה
  english_pob_choice: Beth-nimrah
  chosen_spanish: Bet-nimra
  alternatives_spanish:
  - Casa de Nimra
  - Beth-nimra
  lexicon: HALOT
  rationale: Se trata de un topónimo; se conserva el nombre tradicional transliterado. En español, «Bet-» refleja mejor el valor toponímico de בֵּית que una traducción literal por «casa de», que ocultaría que es un nombre propio.
- source_word: בֵּית הָרָן
  english_pob_choice: Beth-haran
  chosen_spanish: Bet-harán
  alternatives_spanish:
  - Casa de Harán
  - Beth-harán
  lexicon: HALOT
  rationale: Igualmente es un nombre de lugar en forma constructa fijado como topónimo. Mantener «Bet-harán» sigue el dato léxico y evita deshacer el nombre propio en una perífrasis.
- source_word: עָרֵי מִבְצָר
  english_pob_choice: fortified cities
  chosen_spanish: ciudades fortificadas
  alternatives_spanish:
  - ciudades de fortaleza
  - ciudades fortaleza
  lexicon: HALOT
  rationale: La frase hebrea denota ciudades dotadas de defensas. «Ciudades fortificadas» es la equivalencia natural en español y conserva el sentido militar-defensivo sin forzar una calca.
- source_word: גִדְרֹת צֹאן
  english_pob_choice: sheepfolds
  chosen_spanish: rediles de ovejas
  alternatives_spanish:
  - rediles
  - corrales para ovejas
  - rediles para rebaños
  lexicon: HALOT
  rationale: El hebreo designa cercados o recintos para el ganado menor. «Rediles de ovejas» mantiene la imagen pastoral con transparencia semántica; «rediles» a secas sería más breve, pero menos explícito en este contexto.
- source_word: וְ / אֶת ... וְ / אֶת ... וְ
  english_pob_choice: and ... and ... and
  chosen_spanish: y ... y ... y
  alternatives_spanish:
  - también ... y ... y
  - y ... y ... además ...
  lexicon: Hebrew grammar
  rationale: La serie continúa la enumeración del versículo anterior. En español, repetir «y» refleja la suma coordinada sin sobretraducir la partícula objeto אֶת.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto fuente y con la auditoría inglesa; no se detectaron revisiones aplicadas ni cambios textuales recientes que requirieran ajuste en la formulación española.
  spanish_consistency_notes:
  - Se conserva la secuencia coordinada simple del hebreo con repetición de «y».
  - Se transliteran los topónimos como nombres propios, con «Bet-» para reflejar el valor toponímico de בֵּית.
  - «Ciudades fortificadas» y «rediles de ovejas» mantienen el registro bíblico sin recurrir a terminología eclesiástica ajena al hebreo.
