translation:
  language: es
  text: 'Ahora el mensajero que había ido a llamar a Micaías le habló, diciendo: «Mira, las palabras de los profetas son favorables al rey por unanimidad[a]. Por favor, que tu palabra sea como una de las de ellos, y habla favorablemente».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «con una sola boca», un modismo que significa estar completamente de acuerdo o hablar con una sola voz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּלְאָךְ
  english_pob_choice: messenger
  chosen_spanish: mensajero
  alternatives_spanish:
  - ángel
  lexicon: HALOT
  rationale: En este contexto narrativo se trata del enviado que va a llamar a Micaías ante el rey; 'mensajero' conserva ese sentido humano mejor que 'ángel'.
- source_word: לִקְרֹא
  english_pob_choice: to summon
  chosen_spanish: a llamar
  alternatives_spanish:
  - a convocar
  - a citar
  lexicon: HALOT
  rationale: '''Llamar'' expresa con naturalidad la acción de hacer venir a alguien; en castellano, ''convocar'' o ''citar'' sonarían más técnicos y no aportan más precisión aquí.'
- source_word: לְמִיכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaía
  - Micaiahu
  lexicon: Convención onomástica bíblica
  rationale: Se adopta la forma española más reconocible y eclesialmente legible del nombre propio.
- source_word: דִּבֶּר אֵלָיו לֵאמֹר
  english_pob_choice: spoke to him, saying
  chosen_spanish: le habló, diciendo
  alternatives_spanish:
  - le dijo
  - habló con él, diciendo
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se conserva de manera natural en español sin perder la secuencia verbal.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira, pues
  lexicon: HALOT
  rationale: '''Mira'' mantiene la fuerza deíctica y el tono exhortativo sin recurrir a un giro arcaizante.'
- source_word: דִּבְרֵי הַנְּבִאִים
  english_pob_choice: the words of the prophets
  chosen_spanish: las palabras de los profetas
  alternatives_spanish:
  - el dicho de los profetas
  - el mensaje de los profetas
  lexicon: HALOT
  rationale: Se conserva el plural constructo de manera directa; 'palabras' es la correspondencia más inmediata y transparente.
- source_word: פֶּה אֶחָד
  english_pob_choice: unanimously
  chosen_spanish: unánimemente
  alternatives_spanish:
  - con una sola boca
  - con una misma voz
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'una boca'; siguiendo la revisión inglesa, se vierte el sentido idiomático como acuerdo total, sin perder la observación del idioma original en nota.
- source_word: טוֹב אֶל הַמֶּלֶךְ
  english_pob_choice: favorable to the king
  chosen_spanish: favorables al rey
  alternatives_spanish:
  - buenas para el rey
  - benéficas para el rey
  lexicon: HALOT
  rationale: En este contexto 'bueno' describe palabras proféticas que favorecen al rey; 'favorables' comunica el valor idiomático con claridad en español.
- source_word: וִיהִי נָא
  english_pob_choice: Please let ... be
  chosen_spanish: Por favor, que ...
  alternatives_spanish:
  - Que ... por favor
  - Te ruego que ...
  lexicon: HALOT
  rationale: La combinación jussiva con נָא expresa súplica cortés; 'Por favor, que' reproduce adecuadamente ese tono.
- source_word: דְבָרְךָ
  english_pob_choice: your word
  chosen_spanish: tu palabra
  alternatives_spanish:
  - tu dicho
  - tu mensaje
  lexicon: HALOT
  rationale: El singular hebreo se preserva porque designa la declaración profética de Micaías como una unidad.
- source_word: כְּאַחַד מֵהֶם
  english_pob_choice: like one of theirs
  chosen_spanish: como la de uno de ellos
  alternatives_spanish:
  - como uno de ellos
  - como una de las de ellos
  lexicon: HALOT
  rationale: La comparación remite a las palabras de los profetas mencionadas antes; 'la de uno de ellos' hace claro el referente en español.
- source_word: וְדִבַּרְתָּ טּוֹב
  english_pob_choice: and speak favorably
  chosen_spanish: y habla favorablemente
  alternatives_spanish:
  - y habla bien
  - y di cosas favorables
  lexicon: HALOT
  rationale: 'Se conserva el valor idiomático de la exhortación: hablar de manera favorable, no simplemente ''hablar bien'' en sentido moral genérico.'
theological_decisions:
- issue: Sentido de פה אחד como unidad de acuerdo, no literalismo opaco
  english_pob_reading: unanimously favorable
  chosen_spanish_reading: unánimemente favorables
  alternative_spanish_readings:
  - con una sola boca favorables
  - con una misma voz favorables
  rationale: La POB inglesa decidió resolver el hebraísmo con el sentido idiomático de acuerdo total. En español, 'unánimemente' comunica el mismo valor semántico con claridad, mientras la nota preserva la imagen original.
  doctrine_reference: Principio de claridad sin ocultar el hebraísmo; fidelidad semántica al texto fuente.
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó la expresión literal incómoda por 'unanimously', confirmando que el sentido de פה אחד debe presentarse como acuerdo total. Esta versión española sigue esa decisión con 'unánimemente' y añade nota para no perder la textura del hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando corresponda; este versículo no lo contiene.
  - '''Micaías'' sigue la convención española estándar del nombre propio.'
  - Se mantiene el registro narrativo sobrio y eclesialmente legible sin calcos rígidos.
  - '''Mensajero'' evita la lectura angélica impropia del contexto narrativo humano.'
