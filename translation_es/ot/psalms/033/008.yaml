review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura exhortativa, el alcance universal ('toda la tierra' / 'todos los habitantes del mundo') y respeta correctamente יְהוָה como 'Yahvé'. Sin embargo, la nota [a] introduce 'reverencie', que debilita indebidamente יִירְאוּ, y la combinación 'se estremezcan ante él' más su nota tiende a desplazar מִמֶּנּוּ / יָגוּרוּ hacia una lectura demasiado espacial/corporal. El sentido básico de temor reverente/awe sí está presente, pero conviene ajustarlo para reflejar mejor la evidencia fuente y el razonamiento auditado en inglés.
  spanish_quality_summary: El español es natural y digno. No obstante, 'se estremezcan' suena algo más físico que reverencial en registro bíblico general, mientras que 'queden sobrecogidos ante él' o 'sientan temor ante él' transmite mejor el matiz poético. También la nota [a] debe evitar sugerir 'reverencie' como alternativa principal, porque reduce el componente de temor.
  glossary_alignment: Alineación buena en el uso de 'Yahvé'. No hay conflicto con otros términos del glosario. La principal corrección terminológica es mantener la fuerza de ירא como 'temer' y no suavizarla a 'reverenciar'.
  issues:
  - severity: medium
    issue: La nota [a] ofrece 'reverencie' como alternativa para יִירְאוּ.
    rationale: Según la decisión léxica auditada, ירא aquí conserva temor reverente; 'reverenciar' puede sonar demasiado débil y no preserva bien la carga de temor.
  - severity: medium
    issue: '''Se estremezcan'' para יָגוּרוּ puede sonar demasiado físico y menos cercano a ''stand in awe''.'
    rationale: Aunque HALOT permite matices de estremecimiento, la línea inglesa privilegia asombro/temor reverente. En español, 'queden sobrecogidos' preserva mejor ese matiz sin repetir 'teman'.
  - severity: low
    issue: La explicación de מִמֶּנּוּ como 'ante él' en la nota y en la decisión léxica enfatiza una orientación espacial.
    rationale: El audit trail inglés favorece el sentido idiomático del objeto del temor ('de él') más que una localización espacial, aunque 'ante él' es posible. Conviene no sobreinterpretarlo.
  revised_spanish_text: Que toda la tierra tema a Yahvé[a]; que todos los habitantes del mundo queden sobrecogidos[b] ante él.
