translation:
  language: es
  text: 'Y de Benjamín dijo: «El amado de Yahvé habita seguro junto a él[a]; lo protege todo el día, y mora entre sus hombros[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habita seguro cerca de él», o «habita seguro bajo él/sobre él»; la preposición hebrea es compacta y puede expresar cercanía o tutela protectora.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «entre sus hombros». Algunos entienden la expresión en sentido figurado como cercanía protectora; otros la toman topográficamente, como las montañas del territorio de Benjamín o el santuario situado en su territorio.
    reason: alternative_reading
lexical_decisions:
- source_word: לְבִנְיָמִן
  english_pob_choice: of Benjamin
  chosen_spanish: de Benjamín
  alternatives_spanish:
  - para Benjamín
  - a Benjamín
  lexicon: HALOT
  rationale: En la fórmula de bendición tribal, «de Benjamín» conserva el sentido de encabezado del destinatario y suena natural en español, sin forzar la preposición más literal cuando esta sería áspera en español.
- source_word: יְדִיד
  english_pob_choice: the beloved
  chosen_spanish: el amado
  alternatives_spanish:
  - el querido
  - el amado de Yahvé
  lexicon: HALOT
  rationale: El sustantivo/adjetivo expresa a uno amado o apreciado. «El amado» reproduce con concisión la carga afectiva del término y mantiene el tono de bendición.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio del Tetragrámaton, en línea con la política terminológica del proyecto, en lugar de sustituirlo por un título.
- source_word: יִשְׁכֹּן
  english_pob_choice: dwells
  chosen_spanish: habita
  alternatives_spanish:
  - morará
  - vive
  - se asienta
  lexicon: HALOT
  rationale: El verbo שׁכן denota residencia o permanencia. «Habita» es claro, reverente y suficientemente cercano al valor verbal de residencia permanente.
- source_word: לָבֶטַח
  english_pob_choice: in safety
  chosen_spanish: seguro
  alternatives_spanish:
  - en seguridad
  - con seguridad
  - seguramente
  lexicon: HALOT
  rationale: En español, la idea adverbial de seguridad se expresa de manera natural con «seguro» dentro de la locución «habita seguro», que preserva el matiz de confianza y resguardo.
- source_word: עָלָיו
  english_pob_choice: by him
  chosen_spanish: junto a él
  alternatives_spanish:
  - cerca de él
  - sobre él
  - bajo él
  lexicon: HALOT
  rationale: La preposición עַל con sufijo es compacta y puede expresar cercanía o sobrecobertura protectora. «Junto a él» comunica proximidad sin decidir en exceso entre las posibilidades espaciales o de tutela, y conserva la ambigüedad documentada.
- source_word: חֹפֵף
  english_pob_choice: he shields
  chosen_spanish: lo protege
  alternatives_spanish:
  - lo cubre
  - lo resguarda
  - lo ampara
  lexicon: HALOT
  rationale: El participio comunica resguardo protector. «Lo protege» es transparente en español y retiene la imagen de cobertura defensiva sin volverla demasiado interpretativa.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all the day
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día entero
  - durante todo el día
  lexicon: HALOT
  rationale: La expresión temporal se vierte con la locución natural «todo el día», que conserva la totalidad continua del hebreo en un español fluido.
- source_word: וּבֵין כְּתֵיפָיו
  english_pob_choice: between his shoulders
  chosen_spanish: entre sus hombros
  alternatives_spanish:
  - sobre sus hombros
  - entre las laderas de su territorio
  lexicon: HALOT
  rationale: Se mantiene la imagen literal antropomórfica del hebreo para no resolver prematuramente la ambigüedad, dejando abierta la lectura figurada o topográfica.
- source_word: שָׁכֵן
  english_pob_choice: he dwells
  chosen_spanish: mora
  alternatives_spanish:
  - habita
  - vive
  - se establece
  lexicon: HALOT
  rationale: La repetición del tema de morar/habitar se conserva con «mora», que en español bíblico suena digno y mantiene el paralelismo con el primer verbo de residencia.
theological_decisions:
- issue: Referencia del pronombre y dirección de la protección en la primera mitad del versículo
  english_pob_reading: Benjamin/the beloved dwells securely near the LORD, and the LORD shields him.
  chosen_spanish_reading: Benjamín, como el amado, habita seguro junto a Yahvé, y Yahvé lo protege.
  alternative_spanish_readings:
  - Yahvé habita sobre Benjamín y entre sus hombros
  - Benjamín habita bajo la protección de Yahvé
  rationale: El hebreo admite una relación cercana de protección más que una localización rígida. La redacción principal conserva esa cercanía sin fijar un solo esquema espacial más allá de lo que el texto exige.
  doctrine_reference: Preservar la tensión lexical y pronómica sin sobreexplicar la imagen poética.
- issue: Cláusula final sobre «entre sus hombros»
  english_pob_reading: he dwells between his shoulders.
  chosen_spanish_reading: mora entre sus hombros
  alternative_spanish_readings:
  - mora sobre sus hombros
  - mora en su territorio montañoso
  rationale: Se conserva la forma más cercana al hebreo y se evita decidir en el texto principal si la imagen es corporal o territorial. La ambigüedad es significativa y debe permanecer auditable.
  doctrine_reference: Mantener la ambigüedad exegética reconocida por la tradición de traducción del POB.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete inglés; la versión española sigue el consenso auditado y conserva las ambigüedades documentadas sin introducir soluciones nuevas.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según la terminología del proyecto.
  - Se conserva la ambigüedad de עָלָיו con una formulación neutral en el texto principal y una nota explicativa.
  - Se mantiene la imagen literal de «entre sus hombros» para respetar la tensión entre lectura antropomórfica y lectura topográfica.
  - Se emplea «el amado» para יְדִיד por fidelidad léxica y naturalidad en español.
  - La puntuación de cita sigue el uso editorial español con comillas angulares no requeridas; se opta por comillas latinas dobles para claridad de publicación.
