base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/003/006.yaml
  text: And now deal with me according to what is pleasing to you[a]. Command that my spirit be taken up, so that I may be released and become dust. For it is better for me to die than to live, because I have heard false reproaches, and there is great grief within me. Command that I be released now from this distress into the everlasting place[b], and do not turn your face away from me.
  footnotes:
  - marker: a
    text: Or 'become earth.' The Greek literally says 'become earth,' a death idiom rendered here as 'become dust.'
    reason: lexical_alternative
  - marker: b
    text: '''The everlasting place'' is a general expression for the place of the dead; the Greek does not specify a more developed doctrinal term here.'
    reason: cultural_note
