    reason: textual_variant
  - marker: b
    text: The Hebrew parallel in Ezra 1:9 lists different items and numbers at this point; 1 Esdras appears to preserve a reordered or expanded Greek inventory rather than a word-for-word equivalent of the Hebrew.
