translation:
  language: es
  text: Y en el séptimo mes, el primer día del mes, tendrán una santa convocación. No harán ninguna obra laboriosa. Será para ustedes un día de toques de trompeta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "un día de gritos de júbilo/aclamación". El hebreo teruá designa un sonido fuerte y levantado; según el contexto puede ser señal de trompeta, grito o aclamación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/חֹ֨דֶשׁ הַ/שְּׁבִיעִ֜י
  english_pob_choice: And in the seventh month
  chosen_spanish: Y en el séptimo mes
  alternatives_spanish:
  - Y durante el séptimo mes
  - Y en el mes séptimo
  lexicon: HALOT
  rationale: La preposición hebrea marca tiempo y el giro natural en español es 'en el séptimo mes'. Mantengo la conjunción inicial para conservar el tono legal-secuencial del mandamiento.
- source_word: בְּ/אֶחָ֣ד לַ/חֹ֗דֶשׁ
  english_pob_choice: on the first day of the month
  chosen_spanish: el primer día del mes
  alternatives_spanish:
  - el día primero del mes
  - el primero del mes
  lexicon: HALOT
  rationale: La expresión calendárica hebrea significa el primer día del mes. 'El primer día del mes' es claro y fiel sin sobrecargar el español con un calco.
- source_word: מִקְרָא קֹ֨דֶשׁ
  english_pob_choice: a holy convocation
  chosen_spanish: una santa convocación
  alternatives_spanish:
  - una asamblea santa
  - una convocación sagrada
  lexicon: HALOT
  rationale: Conservo la formulación litúrgica tradicional 'santa convocación', que reproduce bien el carácter oficial y cultual de la frase sin introducir una paráfrasis interpretativa.
- source_word: כָּל מְלֶ֥אכֶת עֲבֹדָ֖ה
  english_pob_choice: laborious work
  chosen_spanish: ninguna obra laboriosa
  alternatives_spanish:
  - ningún trabajo laborioso
  - ninguna labor servil
  - ningún trabajo ordinario
  lexicon: HALOT
  rationale: El hebreo no prohíbe toda actividad sin matiz, sino la obra/trabajo de carácter laborioso o servicial propio de la labor ordinaria. 'Obra laboriosa' conserva esa distinción mejor que 'trabajo' a secas y evita el giro tradicional 'servil' cuando no es el más transparente en español.
- source_word: לֹ֣א תַעֲשׂ֑וּ
  english_pob_choice: You shall do no
  chosen_spanish: No harán
  alternatives_spanish:
  - No harán ustedes
  - No deberán hacer
  lexicon: HALOT
  rationale: La prohibición legal en segunda persona plural se expresa de manera natural y sobria con 'No harán', manteniendo el tono normativo del texto.
- source_word: י֥וֹם תְּרוּעָ֖ה
  english_pob_choice: a day of trumpet blasts
  chosen_spanish: un día de[toques de trompeta][a]
  alternatives_spanish:
  - un día de trompetas
  - un día de clamores
  - un día de gritos de júbilo
  lexicon: HALOT
  rationale: תְּרוּעָה describe un sonido fuerte, que en este contexto cultual se asocia con señales de trompeta; por eso traduzco descriptivamente 'toques de trompeta'. Se evita convertir el giro en un nombre festivo posterior o borrar la amplitud semántica del término.
- source_word: יִהְיֶ֥ה לָ/כֶֽם
  english_pob_choice: It shall be ... for you
  chosen_spanish: habrá para ustedes
  alternatives_spanish:
  - será para ustedes
  - les será
  lexicon: HALOT
  rationale: '''Habrá para ustedes'' comunica la institución o designación del día con naturalidad en español. Mantiene el valor declarativo del hebreo sin forzar una construcción demasiado literal.'
theological_decisions:
- issue: Naturaleza de יוֹם תְּרוּעָה
  english_pob_reading: a day of trumpet blasts
  chosen_spanish_reading: un día de toques de trompeta
  alternative_spanish_readings:
  - un día de clamores
  - un día de gritos de júbilo
  - un día de trompetas
  rationale: El texto nombra el día por su sonido característico, no por un título festivo posterior. Por eso la redacción principal conserva el matiz sonoro y evita imponer una nomenclatura tradicional que el hebreo aquí no explicita.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de כָּל מְלֶאכֶת עֲבֹדָה
  english_pob_reading: laborious work
  chosen_spanish_reading: ninguna obra laboriosa
  alternative_spanish_readings:
  - ningún trabajo ordinario
  - ninguna labor servil
  rationale: La prohibición apunta a la labor ordinaria o exigente asociada al trabajo servil, no necesariamente a toda acción imaginable. La formulación elegida preserva esa tensión lexical sin diluir la restricción del día santo.
  doctrine_reference: HALOT; translation philosophy §§2, 4
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó 'trumpet-blast' a 'trumpet blasts' para reflejar mejor תְּרוּעָה en este contexto festivo. La versión española adopta una solución igualmente plural y descriptiva ('toques de trompeta') para conservar ese ajuste y la amplitud semántica del hebreo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca en este versículo, sino como norma del proyecto para el Tetragrámaton cuando corresponda en otros pasajes.
  - Se mantuvo 'santa convocación' como término cultual estable, coherente con el estilo del POB en contextos festivos.
  - '''Obra laboriosa'' busca ser transparente y evita modernizar el mandato hasta hacerlo demasiado general.'
  - La nota de pie de página preserva la alternativa semántica principal de תְּרוּעָה sin introducir una reinterpretación litúrgica posterior.
