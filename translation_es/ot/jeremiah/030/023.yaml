translation:
  language: es
  text: ¡Mira[a]! La tempestad de Yahvé, de ira, ha salido; un torbellino arrollador[b] se arremolinará sobre la cabeza de los malvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La tempestad de Yahvé, de ira, ha salido; un torbellino arrollador…». El hebreo acumula términos de tormenta para dar énfasis.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «caerá sobre la cabeza de los malvados». El verbo final es difícil; «se arremolinará» procura conservar la imaginería de tormenta en movimiento violento.'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira aquí!
  - He aquí
  lexicon: HALOT
  rationale: El hebreo introduce la declaración con fuerza deíctica e inmediata. «¡Mira!» comunica bien esa urgencia en español moderno sin la carga arcaizante de «He aquí».
- source_word: סַעֲרַת יְהוָה
  english_pob_choice: Yahweh’s storm
  chosen_spanish: la tempestad de ira de Yahvé
  alternatives_spanish:
  - la tempestad de Yahvé
  - la tempestad de Yahvé, de ira
  - la tormenta de ira de Yahvé
  lexicon: HALOT
  rationale: La construcción hebrea acumula términos de tempestad y asocia esa imagen con la ira divina. «Tempestad de ira» conserva el valor genitivo y la fuerza judicial del original, mientras «Yahvé» sigue la norma del proyecto para יְהוָה.
- source_word: חֵמָה
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - enojo
  - ira ardiente
  lexicon: HALOT
  rationale: En este contexto profético, חֵמָה expresa la ira judicial de Dios. «Ira» es natural y fiel en español; «furor» sería posible, pero resulta menos sobrio para lectura pública.
- source_word: יָצְאָה
  english_pob_choice: has gone out
  chosen_spanish: ha salido
  alternatives_spanish:
  - ha salido fuera
  - ha salido ya
  - ha salido de
  lexicon: HALOT
  rationale: El perfecto verbal comunica una acción ya puesta en marcha. «Ha salido» conserva el movimiento del hebreo sin forzar una construcción más literaria que la española.
- source_word: סַעַר מִתְגּוֹרֵר
  english_pob_choice: a sweeping tempest
  chosen_spanish: una tormenta arrolladora
  alternatives_spanish:
  - una tempestad arrolladora
  - una tormenta que barre
  - una tempestad que se abate
  lexicon: HALOT
  rationale: La imagen apila vocabulario de tormenta y movimiento violento. «Arrolladora» transmite bien el participio activo sin repetir innecesariamente el verbo, y mantiene la intensidad meteorológica del hebreo.
- source_word: עַל רֹאשׁ
  english_pob_choice: on the head of
  chosen_spanish: sobre la cabeza de
  alternatives_spanish:
  - sobre el cabeza de
  - encima de la cabeza de
  lexicon: HALOT
  rationale: Se conserva el modismo concreto de juicio que cae «sobre la cabeza» de alguien, en lugar de generalizarlo a una mera referencia abstracta al castigo.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  - los malhechores
  lexicon: HALOT
  rationale: «Malvados» comunica bien el sustantivo/adjetivo plural en español contemporáneo. «Impíos» es posible, pero en lectura pública puede sonar más confesional o tradicional que el hebreo exige.
- source_word: יָחֽוּל
  english_pob_choice: will whirl down
  chosen_spanish: se abatirá
  alternatives_spanish:
  - caerá
  - se precipitará
  - descenderá con violencia
  lexicon: HALOT
  rationale: El verbo final es difícil y el audit trail en inglés mantiene abierta la imagen de descenso violento. «Se abatirá» conserva la idea de llegada poderosa desde arriba y funciona de manera natural con la imagen de la tempestad, sin encubrir la dificultad del término.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Se mantiene el nombre propio divino «Yahvé» según la norma del proyecto, evitando el reemplazo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Naturaleza de la imagen final del verbo יָחֽוּל
  english_pob_reading: it will whirl down
  chosen_spanish_reading: se abatirá
  alternative_spanish_readings:
  - caerá
  - se precipitará
  - descenderá con violencia
  rationale: La POB inglesa preserva la dificultad del verbo y la vincula con el lenguaje de tormenta. En español, «se abatirá» mantiene la idea de un golpe descendente y violento sin borrar el trasfondo imagético ni sobreexplicar el matiz incierto.
  doctrine_reference: 'POB audit trail: retention of lexical tension in final verb'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «a sweeping tempest» frente a «a whirling tempest» para reflejar mejor el participio hebreo, sin abandonar la dificultad del verbo final. La versión española sigue esa decisión al usar una imagen de tormenta arrolladora y un final dinámico pero no simplificado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se evitó «SEÑOR» como máscara del nombre divino.
  - Se eligió un registro bíblico claro y público, sin arcaísmos innecesarios.
  - Se preservó la metáfora concreta de la cabeza como lugar del juicio.
  - Se mantuvo abierta la tensión lexical del verbo final, sin reducirlo a una simple caída.
