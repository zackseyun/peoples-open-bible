translation:
  language: es
  text: Estos fueron los hijos de Benjamín por sus clanes, y los contados entre ellos fueron cuarenta y cinco mil seiscientos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: אֵ֥לֶּה
  english_pob_choice: These were
  chosen_spanish: Estos fueron
  alternatives_spanish:
  - Estos son
  - Estos
  lexicon: HALOT
  rationale: En un registro de censo concluyente, el demostrativo con verbo en pasado expresa adecuadamente el cierre del listado. «Estos fueron» mantiene el valor retrospectivo del inglés POB y la fuerza resumidora del hebreo.
- source_word: בְנֵי בִנְיָמִ֖ן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los descendientes de Benjamín
  - los hijos/descendientes de Benjamín
  lexicon: HALOT
  rationale: «Hijos» conserva la correspondencia formal con el hebreo בְנֵי y es natural en español bíblico para designar a los descendientes tribales. Se evita «descendientes» porque suaviza el registro genealógico del texto.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En contexto censal, מִשְׁפָּחָה apunta a subdivisiones tribales, no solo a familias nucleares. «Clanes» es más preciso y sigue la decisión auditada del POB inglés.
- source_word: וּפְקֻדֵיהֶם
  english_pob_choice: those numbered of them
  chosen_spanish: los contados de ellos
  alternatives_spanish:
  - los registrados de ellos
  - los enumerados de ellos
  - los censados de ellos
  lexicon: HALOT
  rationale: El sustantivo verbal de פקד aquí señala a los que fueron contados o inscritos en el censo. «Los contados de ellos» preserva la relación partitiva del hebreo y evita añadir explícitamente «varones», que el verso no repite.
- source_word: חֲמִשָּׁה וְאַרְבָּעִים אֶלֶף וְשֵׁשׁ מֵאוֹת
  english_pob_choice: forty-five thousand six hundred
  chosen_spanish: cuarenta y cinco mil seiscientos
  alternatives_spanish:
  - cuarenta y cinco mil y seiscientos
  lexicon: HALOT
  rationale: Se usa la forma numérica corriente en español contemporáneo para la cifra exacta, sin alterar el total ni la secuencia cuantitativa del hebreo.
translation_notes:
  revision_awareness: La redacción sigue de cerca el cierre censal del hebreo y la solución inglesa revisada («those numbered of them») al traducir el valor partitivo de וּפְקֻדֵיהֶם sin expandir innecesariamente el sentido.
  spanish_consistency_notes:
  - Se mantiene «Benjamín» como nombre propio estándar en español.
  - Se conserva el registro censal/genealógico con términos sobrios y no interpretativos.
  - No se introducen notas porque el verso no presenta una tensión textual o teológica que requiera alternativa publicada.
