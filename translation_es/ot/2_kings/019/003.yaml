translation:
  language: es
  text: 'Y le dijeron: «Así dice Ezequías: Este día es día de angustia, reprensión y afrenta[c]; porque los niños han llegado hasta el punto del parto[a][b], pero no hay fuerza para dar a luz».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los niños han llegado hasta el punto del parto». La imagen es la del trabajo de parto que alcanza el momento decisivo del parto, pero la fuerza falla.'
    reason: cultural_note
  - marker: b
    text: O «hasta la silla de parto». El término hebreo מַשְׁבֵּר es difícil y puede referirse más concretamente al lugar o al momento del parto.
    reason: lexical_alternative
  - marker: c
    text: O «desprecio» o «escarnio» para «afrenta».
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así dijo
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética/mensajera en español se expresa de manera natural con «Así dice», que conserva el valor convencional de proclamación vigente del discurso citado. «Así dijo» sonaría más retrospectivo y menos formularia.
- source_word: יוֹם צָרָה
  english_pob_choice: a day of distress
  chosen_spanish: día de angustia
  alternatives_spanish:
  - día de aflicción
  - día de tribulación
  lexicon: HALOT
  rationale: צָרָה denota presión, apuro o aflicción; «angustia» comunica bien la gravedad del momento en español moderno y mantiene la idea de estrechez/oprimimiento sin suavizarla.
- source_word: וְתוֹכֵחָה
  english_pob_choice: rebuke
  chosen_spanish: reprensión
  alternatives_spanish:
  - reproche
  - repruebo
  lexicon: HALOT
  rationale: El sustantivo tiene el sentido de reproche, corrección o reprensión. «Reprensión» encaja bien en la serie nominal y conserva el matiz de censura pública o correctiva.
- source_word: וּנְאָצָה
  english_pob_choice: disgrace
  chosen_spanish: afrenta
  alternatives_spanish:
  - deshonra
  - desprecio
  - oprobio
  lexicon: HALOT
  rationale: El término puede implicar desprecio, escarnio o deshonra pública. «Afrenta» preserva el peso de humillación y agravio social, sin reducirlo solo a una emoción interna.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: This day
  chosen_spanish: Este día
  alternatives_spanish:
  - hoy
  - este mismo día
  lexicon: HALOT
  rationale: Se conserva la deixis enfática del hebreo con una forma solemne y natural en español.
- source_word: בָאוּ בָנִים
  english_pob_choice: children have come
  chosen_spanish: los hijos han llegado
  alternatives_spanish:
  - los niños han llegado
  - los hijos han venido
  lexicon: HALOT
  rationale: En la metáfora de parto, «hijos» sigue de cerca el hebreo בָנִים, mientras que «han llegado» expresa el arribo al momento decisivo. Se mantiene el sustantivo plural masculino porque la imagen no exige neutralizarlo a «niños».
- source_word: עַד מַשְׁבֵּר
  english_pob_choice: to the point of birth / birthstool
  chosen_spanish: hasta el punto del parto
  alternatives_spanish:
  - hasta la silla de parto
  - hasta el momento del alumbramiento
  lexicon: HALOT
  rationale: מַשְׁבֵּר es difícil y puede aludir al lugar o al momento de la entrega. «Punto del parto» comunica la imagen central de labor llegada a su clímax, manteniendo la ambigüedad textual sin forzar una identificación concreta.
- source_word: וְכֹחַ אַיִן לְלֵדָה
  english_pob_choice: but there is no strength to give birth
  chosen_spanish: pero no hay fuerza para dar a luz
  alternatives_spanish:
  - pero no hay vigor para alumbrar
  - y no hay fuerzas para parir
  lexicon: HALOT
  rationale: «Dar a luz» es la forma más natural y digna en español para לֵדָה en este contexto. Conserva el contraste entre la llegada al momento de parto y la falta de fuerza para completarlo.
- source_word: בָנִים
  english_pob_choice: children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - la descendencia
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por «children» por el valor idiomático de la imagen, en español conviene mantener la cercanía al hebreo con «hijos», que funciona bien en la metáfora y evita una generalización innecesaria.
theological_decisions:
- issue: La afrenta/reprensión como triple descripción del día
  english_pob_reading: This day is a day of distress, rebuke, and disgrace
  chosen_spanish_reading: Este día es día de angustia, reprensión y afrenta
  alternative_spanish_readings:
  - día de angustia, reproche y deshonra
  - día de angustia, corrección y oprobio
  rationale: No hay un problema doctrinal directo, pero sí una tensión semántica entre censura moral y humillación pública. Se mantiene la tríada como un juicio sobre la situación nacional y su vergüenza, sin convertirla en terminología eclesiástica más suave.
  doctrine_reference: None
- issue: La metáfora de parto para una crisis nacional
  english_pob_reading: children have come to the point of birth, but there is no strength to give birth
  chosen_spanish_reading: los hijos han llegado hasta el punto del parto, pero no hay fuerza para dar a luz
  alternative_spanish_readings:
  - los hijos han llegado a la silla de parto, pero no hay fuerza para alumbrar
  - han llegado al momento del alumbramiento, pero no hay fuerzas para parir
  rationale: Se conserva la imagen completa de crisis inminente y agotamiento incapacitante. La metáfora no se espiritualiza ni se suaviza, porque el hebreo presenta una comparación concreta de trabajo de parto que ilustra una emergencia nacional.
  doctrine_reference: None
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada y quedó sin cambios en el último pase (high agreement, minor issues). En español se ha mantenido la misma estructura y sentido, con decisiones léxicas transparentes para el hebreo difícil מַשְׁבֵּר y para la tríada semántica final.
  spanish_consistency_notes:
  - Se conserva el nombre divino implícito del contexto sin introducirlo en este versículo.
  - «Así dice» sigue la fórmula mensajera y mantiene un registro bíblico claro.
  - «Hijos» se usa para reflejar con más cercanía el hebreo בָנִים dentro de la metáfora de parto.
  - Se mantiene la ambigüedad de מַשְׁבֵּר mediante nota, sin fijar prematuramente una sola solución.
  - «Afrenta» y «reprensión» conservan la fuerza de reproche y humillación pública sin rebajarlas a un simple malestar.
