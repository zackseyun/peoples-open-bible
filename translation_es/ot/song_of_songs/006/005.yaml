    issue: Las notas al pie están ancladas en las palabras equivocadas.
    rationale: La nota [a] actual explica el verbo raro «הִרְהִיבֻנִי», pero está colocada tras «de mí»; la nota [b] trata la imagen de descenso/Galaad, pero está colocada tras «me deslumbran». Esto desajusta la evidencia y puede confundir al lector.
  - severity: medium
    issue: «me deslumbran» sobreinterpreta el verbo raro con una imagen visual ajena al original.
    rationale: Aunque busca fuerza poética, «deslumbrar» en español sugiere brillo o luz que no aparece en el hebreo. Dado que el POB inglés optó por «overwhelm me» y mantuvo alternativas como «disconcert me», «me abruman» refleja mejor el rango semántico debatido.
  - severity: low
    issue: La nota sobre Galaad puede formularse de modo más ceñido al rastro inglés.
    rationale: El inglés ofrece como principal «from Gilead» con alternativas «descending from Gilead» o «on the slopes of Gilead». Conviene que la nota española preserve esa relación con más precisión.
