translation:
  language: es
  text: Permíteme habitar en tu tienda[a] para siempre; permíteme refugiarme en el abrigo de tus alas. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habitaré en tu tienda para siempre»; o «permíteme habitar en tu tienda para siempre»; la forma hebrea expresa un deseo fuerte o una resolución. «Tienda» puede evocar el santuario o lugar de morada de Dios; el español tradicional a menudo traduce aquí «tabernáculo».
    reason: lexical_alternative_and_cultural_note
lexical_decisions:
- source_word: אָג֣וּרָה
  english_pob_choice: Let me dwell
  chosen_spanish: Permíteme habitar
  alternatives_spanish:
  - Quiero habitar
  - Déjame habitar
  - Permíteme morar
  lexicon: HALOT
  rationale: La forma cohortativa expresa deseo o resolución del hablante; en español, «permíteme» comunica bien ese matiz volitivo sin forzar un futuro simple. «Habitar» conserva el sentido de residir de manera estable mejor que un giro más moderno o más eclesiástico.
- source_word: בְ֭/אָהָלְ/ךָ
  english_pob_choice: in your tent
  chosen_spanish: en tu tienda
  alternatives_spanish:
  - en tu tabernáculo
  - en tu morada
  - en tu tienda de campaña
  lexicon: HALOT
  rationale: אָהֶל significa literalmente «tienda». Se conserva la imagen concreta y transparente del hebreo; «tabernáculo» sería más tradicional pero introduce una terminología cultual más cargada. «Tienda» mantiene la metáfora de manera fiel y comprensible.
- source_word: עוֹלָמִ֑ים
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - por los siglos
  - para edades
  lexicon: HALOT
  rationale: El plural intensivo de עוֹלָם pide una expresión natural de perpetuidad. «Para siempre» es la equivalencia idiomática más clara en español y conserva el alcance durativo sin literalismo pesado.
- source_word: אֶֽחֱסֶ֨ה
  english_pob_choice: let me take refuge
  chosen_spanish: permíteme refugiarme
  alternatives_spanish:
  - me refugiaré
  - déjame refugiarme
  - quiero refugiarme
  lexicon: HALOT
  rationale: El imperfecto con valor volitivo encaja bien con una petición. «Refugiarme» mantiene el sentido de buscar protección; «permíteme» reproduce la fuerza de ruego/resolución del paralelismo con el verbo anterior.
- source_word: בְ/סֵ֖תֶר
  english_pob_choice: in the shelter
  chosen_spanish: en el abrigo
  alternatives_spanish:
  - en el escondite
  - bajo el refugio
  - en el amparo
  lexicon: HALOT
  rationale: סֵתֶר denota un lugar oculto y protector. «Abrigo» expresa cobijo y protección en español actual, evitando una locución demasiado literal que sonaría extraña, pero sin perder la idea de resguardo.
- source_word: כְּנָפֶ֣י/ךָ
  english_pob_choice: of your wings
  chosen_spanish: de tus alas
  alternatives_spanish:
  - bajo tus alas
  - de tus plumas
  - de tus alas protectoras
  lexicon: HALOT
  rationale: La imagen literal es «alas». Como el español permite la metáfora de manera natural, se conserva directamente. El genitivo «de tus alas» corresponde al hebreo sin desplazar la relación preposicional a «bajo».
- source_word: סֶּֽלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  alternatives_spanish:
  - Selá
  lexicon: HALOT
  rationale: El término es incierto y se translitera por transparencia textual. Se mantiene la forma tradicional de marcador litúrgico/musical sin intentar traducirlo con conjetura.
theological_decisions:
- issue: Imagen de la tienda de Dios
  english_pob_reading: Retain the metaphor 'your tent' rather than interpretively expanding it to temple/heavenly dwelling.
  chosen_spanish_reading: Conservar «tu tienda» como metáfora concreta de la presencia y el lugar de Dios.
  alternative_spanish_readings:
  - tu tabernáculo
  - tu santuario
  - tu morada celestial
  rationale: El hebreo dice literalmente «tienda»; traducirla así preserva la imagen y evita imponer una interpretación cultual más específica que el texto no exige. La frase puede evocar el santuario divino, pero esa implicación queda como resonancia, no como sustitución del término.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El texto sigue de cerca la lectura auditada del inglés POB: mantiene la fuerza volitiva de las dos formas verbales, conserva la metáfora concreta de la «tienda» y traduce «Selah» por transliteración. No se registran revisiones pendientes en el audit trail consultado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto cuando el hebreo presenta el nombre divino; aquí no aparece explícitamente en el versículo.
  - Se conserva un registro bíblico digno pero moderno, evitando tanto arcaísmos innecesarios como paráfrasis expansivas.
  - «Abrigo de tus alas» mantiene la imagen hebrea sin añadir elementos interpretativos ajenos al texto.
