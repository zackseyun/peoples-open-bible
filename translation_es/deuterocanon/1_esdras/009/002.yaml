translation:
  language: es
  text: Y alojándose allí[a], no probó pan ni bebió agua[b], haciendo duelo por los grandes actos sin ley de la multitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'acampando allí', 'pernoctando allí' o 'pasando allí la noche'. El participio griego señala que permaneció allí durante la noche.
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo en Esdras 10 describe el acto con más especificidad como tomar mujeres extranjeras; aquí el griego lo resume de manera más general como 'actos sin ley'.
    reason: alternative_reading
lexical_decisions:
- source_word: αὐλισθεὶς
  english_pob_choice: lodging
  chosen_spanish: acampando allí
  alternatives_spanish:
  - alojándose allí
  - pasando allí la noche
  - pernoctando allí
  lexicon: LSJ
  rationale: El participio indica permanecer o pasar la noche en un lugar. 'Acampando allí' conserva la idea de estancia temporal y refleja bien la nota de quedarse en ese sitio, sin imponer un matiz más doméstico que 'alojarse'.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  lexicon: LSJ
  rationale: El griego dice literalmente 'pan'. En este contexto de ayuno, mantener 'pan' conserva la expresión concreta y la imagen textual, igual que en el audit trail inglés.
- source_word: οὐκ ἐγεύσατο
  english_pob_choice: tasted no
  chosen_spanish: no probó
  alternatives_spanish:
  - no comió
  - no participó de
  lexicon: BDAG
  rationale: γεύομαι significa literalmente 'probar'. En un contexto de ayuno, 'no probó' mantiene la cercanía al giro griego y sigue siendo natural en español.
- source_word: ὕδωρ ἔπιεν
  english_pob_choice: drank no water
  chosen_spanish: ni bebió agua
  alternatives_spanish:
  - ni tomó agua
  lexicon: LSJ
  rationale: Es una correspondencia directa de la fórmula de ayuno. 'Ni bebió agua' conserva la sencillez y el paralelismo con 'no probó pan'.
- source_word: πενθῶν
  english_pob_choice: mourning
  chosen_spanish: haciendo duelo
  alternatives_spanish:
  - mientras lloraba
  - lamentando
  - en duelo
  lexicon: BDAG
  rationale: πενθέω expresa luto o duelo profundo. 'Haciendo duelo' transmite el tono penitencial con un español claro y solemne, sin reducirlo a una tristeza genérica.
- source_word: ἀνομιῶν
  english_pob_choice: lawless deeds
  chosen_spanish: iniquidades
  alternatives_spanish:
  - actos sin ley
  - desobediencias
  - transgresiones
  lexicon: BDAG
  rationale: El inglés optó por una expresión que conserve la fuerza de ἀνομία sin volverla un término técnico eclesiástico. En español, 'iniquidades' comunica gravedad moral y legal, aunque es menos literal; se elige por legibilidad y porque el contexto de duelo exige un término fuerte. La idea de violación del orden de Dios permanece.
- source_word: τῶν μεγάλων
  english_pob_choice: great
  chosen_spanish: las grandes
  alternatives_spanish:
  - las graves
  - las serias
  lexicon: LSJ
  rationale: El adjetivo es literalmente 'grandes'. Mantenerlo en español conserva la textura del griego y la intensificación del juicio moral.
- source_word: τοῦ πλήθους
  english_pob_choice: the multitude
  chosen_spanish: de la multitud
  alternatives_spanish:
  - del pueblo
  - de la muchedumbre
  - de la asamblea
  lexicon: LSJ
  rationale: πλῆθος denota una masa o multitud de personas. 'Multitud' es la equivalencia más directa y formal en español, alineada con el inglés auditado.
theological_decisions:
- issue: Fuerza moral de ἀνομία en un contexto penitencial
  english_pob_reading: lawless deeds
  chosen_spanish_reading: iniquidades
  alternative_spanish_readings:
  - transgresiones
  - actos sin ley
  rationale: Se evita suavizar el término en un simple 'pecados', porque el griego enfatiza conducta contraria al orden/ley de Dios. 'Iniquidades' comunica gravedad y culpabilidad, aunque no reproduce el componente léxico de 'sin ley' con total literalidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: Relación entre la gula/ayuno y el gesto de duelo
  english_pob_reading: tasted no bread and drank no water, mourning
  chosen_spanish_reading: no probó pan ni bebió agua, haciendo duelo
  alternative_spanish_readings:
  - no comió pan ni bebió agua, lamentando
  - no gustó pan ni agua, en duelo
  rationale: La secuencia conserva el paralelismo de abstinencia total y el sentido de luto penitencial. 'Haciendo duelo' refleja mejor πενθῶν que un simple 'triste' o 'lamentando', y mantiene el tono ritual-moral del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Swete (1909) y toma el auditable English POB como control secundario. No se introdujeron cambios de sentido respecto del audit trail: se preservó la estancia nocturna, la fórmula de ayuno y el tono penitencial. La única adaptación relevante es ''iniquidades'' para ἀνομιῶν, elegida por claridad y peso moral en español, manteniendo la tensión entre una traducción más literal (''sin ley'') y una más idiomática.'
  spanish_consistency_notes:
  - Se usó 'Y' al inicio para reflejar la continuidad narrativa del griego.
  - '''Pan'' se mantuvo literal en vez de generalizar a ''alimento''.'
  - '''Multitud'' conserva el valor colectivo de πλῆθος.'
  - No se usó 'Señor' ni otra terminología no presente en el versículo.
  - '''Haciendo duelo'' se eligió para sostener el tono de luto penitencial sin arcaísmo excesivo.'
