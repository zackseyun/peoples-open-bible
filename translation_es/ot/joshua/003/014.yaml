translation:
  language: es
  text: Y aconteció, cuando el pueblo salió de sus tiendas para cruzar el Jordán, y los sacerdotes que llevaban el arca del pacto iban delante[a] del pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por delante del pueblo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y aconteció
  alternatives_spanish:
  - Y sucedió
  - Y ocurrió
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce un nuevo acontecimiento; «aconteció» conserva ese valor discursivo con un tono natural y digno en español, sin caer en arcaísmo excesivo.
- source_word: בִּנְסֹעַ
  english_pob_choice: when the people set out
  chosen_spanish: cuando el pueblo partía
  alternatives_spanish:
  - cuando el pueblo se ponía en marcha
  - cuando el pueblo se alejaba
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa circunstancia temporal. «Partía» comunica el hecho de salir del campamento de manera breve y fiel, sin añadir un matiz interpretativo indebido.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  lexicon: HALOT
  rationale: En este contexto narrativo se refiere a Israel como colectividad; «el pueblo» es la equivalencia estable y precisa en español bíblico.
- source_word: מֵאָהֳלֵיהֶם
  english_pob_choice: from their tents
  chosen_spanish: de sus tiendas
  alternatives_spanish:
  - de sus campamentos
  - de sus carpas
  lexicon: HALOT
  rationale: אהל significa literalmente «tienda». «Tiendas» conserva la imagen concreta del campamento israelita y evita una generalización innecesaria.
- source_word: לַעֲבֹר
  english_pob_choice: to cross
  chosen_spanish: para cruzar
  alternatives_spanish:
  - para pasar
  - para atravesar
  lexicon: HALOT
  rationale: En el contexto de un río, «cruzar» expresa con claridad el propósito de מעבר sin forzar un calco como «pasar sobre».
- source_word: הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: Como nombre propio del río, «el Jordán» es natural y suficiente en español; el contexto ya implica que se trata del río.
- source_word: וְהַכֹּהֲנִים נֹשְׂאֵי
  english_pob_choice: and the priests carrying
  chosen_spanish: y los sacerdotes que llevaban
  alternatives_spanish:
  - y los sacerdotes, portadores de
  - y los sacerdotes llevando
  lexicon: HALOT
  rationale: La construcción nominal hebrea se vuelve más transparente en español con una oración relativa. «Llevaban» mantiene la acción de portar sin introducir una perífrasis menos natural.
- source_word: הָאָרוֹן
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - el cofre
  lexicon: HALOT
  rationale: «Arca» es el término bíblico establecido para ארון en este contexto cultual; «cofre» perdería resonancia terminológica y precisión litúrgica.
- source_word: הַבְּרִית
  english_pob_choice: of the covenant
  chosen_spanish: del pacto
  alternatives_spanish:
  - de la alianza
  - del convenio
  lexicon: HALOT
  rationale: Aunque «covenant» suele traducirse «pacto» o «alianza», aquí se eligió «pacto» por su naturalidad en español bíblico y por mantener la relación nominal tradicional sin diluir el término técnico.
- source_word: לִפְנֵי הָעָם
  english_pob_choice: before the people
  chosen_spanish: delante del pueblo
  alternatives_spanish:
  - ante el pueblo
  - en frente del pueblo
  lexicon: HALOT
  rationale: לִפְנֵי denota posición espacial en frente. «Delante del pueblo» refleja bien esa ubicación y evita una formulación demasiado abstracta.
theological_decisions:
- issue: Posición de los sacerdotes respecto del pueblo
  english_pob_reading: the priests carrying the ark of the covenant were before the people
  chosen_spanish_reading: los sacerdotes que llevaban el arca del pacto estaban delante del pueblo
  alternative_spanish_readings:
  - los sacerdotes que llevaban el arca del pacto iban delante del pueblo
  - los sacerdotes portadores del arca del pacto estaban ante el pueblo
  rationale: El hebreo describe una posición frontal, no solo una prioridad simbólica. «Estaban delante del pueblo» conserva la localización espacial sin exagerar más de lo que dice el texto.
  doctrine_reference: Josué 3:14; cf. Josué 3:3-4 para el marco narrativo de la marcha y el arca delante del pueblo
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste del audit trail inglés que pasó de una frase con «with» a una estructura más directa con «and the priests carrying ... were before the people». En español se evitó una solución demasiado libre como «con los sacerdotes» y se optó por una relativa que refleja con mayor precisión la relación sintáctica hebrea. También se mantuvo la imagen concreta de «tiendas» y el término técnico «arca del pacto» por ser lexemas estables y auditables.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - «Pueblo» se mantiene como colectivo de Israel, en línea con el uso narrativo habitual.
  - «Arca» y «pacto» conservan el registro bíblico técnico sin reemplazos eclesiásticos no requeridos por la fuente.
  - La puntuación sigue la cadencia narrativa del hebreo y de la versión inglesa auditada, con una sola frase larga bien segmentada por comas.
