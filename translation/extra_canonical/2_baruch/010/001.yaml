    ܘܐܬܩܒܠ ܗܘ̣ ܕܐܫܬܡܥ.

    ܀ ܕܟܕ ܠܒܝܫ ܡܢ ܚܛܝ̈ܗ̣ܐ

    ܗܘ̣ ܕܠܐ ܐܬܚܙܝ ܒܥܒܕܘܗܝ

