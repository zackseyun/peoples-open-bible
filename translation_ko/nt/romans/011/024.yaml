  text: εἰ γὰρ σὺ ἐκ τῆς κατὰ φύσιν ἐξεκόπης ἀγριελαίου καὶ παρὰ φύσιν ἐνεκεντρίσθης εἰς καλλιέλαιον, πόσῳ μᾶλλον οὗτοι οἱ κατὰ φύσιν ἐγκεντρισθήσονται τῇ ἰδίᾳ ἐλαίᾳ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/011/024.yaml
  text: For if you were cut from what is by nature a wild olive tree and[a], contrary to nature, were grafted into a cultivated olive tree, how much more will these, the natural branches[b], be grafted into their own olive tree.
  footnotes:
  - marker: a
    text: Or 'these, who are natural'; Greek simply says 'these, the ones according to nature,' with 'branches' supplied from the olive-tree metaphor in the context.
    reason: lexical_alternative
  - marker: b
    text: Or 'will be grafted back into their own olive tree.' The idea of return is contextually implied, though 'back' is not explicit in the Greek verb.
    reason: lexical_alternative
translation:
  language: ko
  text: 당신이 본래 야생 올리브나무에서 잘려나와 본성을 거슬러 좋은 올리브나무에 접붙임을 받았다면, 본래의 가지들인 이들이 자기 올리브나무에 접붙임을 받는 일은 얼마나 더 쉽겠습니까!
  philosophy: optimal-equivalence
