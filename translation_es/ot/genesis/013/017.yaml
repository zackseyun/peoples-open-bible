    text: 'O: «Álzate, camina por la tierra, por toda su longitud y su anchura».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «recorre la tierra, por toda su longitud y su anchura».'
    reason: previous_rendering
  revision_rationale: La revisión conserva el sentido del borrador pero mejora la fidelidad léxica al hebreo y al audit trail inglés. «Longitud» y «anchura» reflejan mejor el par fuente que «extensión» y «anchura», y la nota b se ajusta a la alternativa documentada. También se corrige la acentuación de «Álzate».
