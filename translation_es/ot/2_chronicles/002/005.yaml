revisions:
- from: Pero ¿quién tendrá la fuerza para edificarle una casa[a], si los cielos, aun los cielos de los cielos, no pueden contenerlo? ¿Y quién soy yo, para que le edifique una casa[b], sino para quemar incienso delante de él?
  to: Pero ¿quién tiene la fuerza para edificarle una casa[a], si los cielos, aun los cielos más altos, no pueden contenerlo? ¿Y quién soy yo para edificarle una casa[b], sino para quemar incienso delante de él?
  rationale: Se ajusta el texto para seguir más de cerca la decisión POB sobre la expresión idiomática hebrea («los cielos, aun los cielos más altos») y para mejorar la naturalidad española en la segunda pregunta («¿quién soy yo para edificarle...?»). También se conserva la nota literal del hebreo y la alternativa sobre «ofrecer incienso».
