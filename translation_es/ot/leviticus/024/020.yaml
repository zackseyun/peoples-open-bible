translation:
  language: es
  text: fractura por fractura, ojo por ojo, diente por diente; como él cause una lesión[a] en una persona[b], así se le causará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como él cause una deformidad o defecto en una persona, así se le hará». El hebreo usa «dar» con «defecto/lesión», un giro idiomático que aquí se vierte como «cause una lesión».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en un hombre». Aquí el singular funciona como representativo genérico de un ser humano en lenguaje legal.'
    reason: cultural_note
lexical_decisions:
- source_word: שֶׁבֶר
  english_pob_choice: fracture
  chosen_spanish: fractura
  alternatives_spanish:
  - quebradura
  - rotura
  lexicon: HALOT
  rationale: En este contexto jurídico corporal, el sustantivo denota una lesión por ruptura; «fractura» conserva la precisión médica y la concisión de la fórmula taliónica.
- source_word: תַּחַת
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en lugar de
  - a cambio de
  - bajo
  lexicon: HALOT
  rationale: En la fórmula de equivalencia legal, «por» reproduce de manera natural la correspondencia recíproca de «fractura por fractura, ojo por ojo, diente por diente».
- source_word: עַיִן
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - vista
  lexicon: HALOT
  rationale: Término anatómico directo; se mantiene literal en la fórmula legal.
- source_word: שֵׁן
  english_pob_choice: tooth
  chosen_spanish: diente
  alternatives_spanish:
  - muela
  lexicon: HALOT
  rationale: Término anatómico directo; «diente» es la equivalencia literal y más amplia.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - según
  lexicon: HALOT
  rationale: Introduce la cláusula comparativa que fundamenta el principio jurídico; «como» es natural y conserva la relación de correspondencia.
- source_word: יִתֵּן
  english_pob_choice: inflicts
  chosen_spanish: cause
  alternatives_spanish:
  - dé
  - imparta
  - infiera
  lexicon: HALOT
  rationale: Aunque el verbo básico es «dar», en la coligación «dar un daño/lesión» el español exige una formulación idiomática. «Cause» conserva la idea de producir activamente el daño sin añadir una interpretación ajena.
- source_word: מוּם
  english_pob_choice: injury
  chosen_spanish: lesión
  alternatives_spanish:
  - defecto
  - mutilación
  - daño
  lexicon: HALOT
  rationale: Aquí se trata de un perjuicio corporal infligido a otra persona; «lesión» expresa el daño físico en español actual sin reducirlo a una mera imperfección estética.
- source_word: אָדָם
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - hombre
  - ser humano
  - humano
  lexicon: HALOT
  rationale: El hebreo funciona aquí como singular representativo en una ley de caso. «Persona» reproduce con naturalidad el sentido genérico que el propio contexto jurídico pide en español.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - entonces
  lexicon: HALOT
  rationale: Marca la consecuencia correspondiente; «así» preserva la simetría legal del texto.
- source_word: יִנָּתֶן בּוֹ
  english_pob_choice: it shall be inflicted on him
  chosen_spanish: se le causará a él
  alternatives_spanish:
  - se le dará
  - se le hará
  - se le impondrá
  lexicon: HALOT
  rationale: El nifal de נתן expresa pasividad («ser dado/hecho»), pero en español una construcción impersonal con «se» y verbo de causación comunica mejor el resultado jurídico. Se evita suavizar el parallelismo taliónico, manteniendo la fuerza recíproca de la frase.
theological_decisions:
- issue: Fórmula taliónica concreta vs. interpretación compensatoria
  english_pob_reading: Render the legal formula literally ('fracture for fracture, eye for eye, tooth for tooth') without softening it into abstract compensation language.
  chosen_spanish_reading: «fractura por fractura, ojo por ojo, diente por diente» se mantiene de forma concreta, sin convertirla en una paráfrasis de compensación abstracta.
  alternative_spanish_readings:
  - lesión equivalente a lesión
  - reparación proporcional al daño
  rationale: El hebreo presenta una fórmula legal concreta y recíproca. La traducción debe preservar ese peso textual y dejar la interpretación jurisprudencial para el comentario, no para el texto principal.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Sentido genérico de אָדָם
  english_pob_reading: person
  chosen_spanish_reading: persona
  alternative_spanish_readings:
  - hombre
  - ser humano
  rationale: En este caso jurídico, el singular hebreo funciona como representante de cualquier ser humano afectado por la ley. «Persona» conserva el sentido genérico sin imponer una lectura masculina exclusiva.
  doctrine_reference: 'DOCTRINE.md: Contested terms table; Translation philosophy §4'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión auditada del inglés: el cambio de «man» a «person» confirma el valor genérico de אָדָם en este versículo. La redacción española sigue esa revisión y mantiene la fórmula taliónica concreta, con un verbo idiomático para reflejar יִתֵּן/יִנָּתֶן sin desdibujar el paralelismo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - Se mantiene «persona» para אָדָם en coherencia con el paso de revisión del inglés y para evitar una restricción masculina no necesaria.
  - «Lesión» se eligió por claridad moderna; no se quiso sustituir por «defecto» en el texto principal porque en español suena más estético que corporal.
  - La construcción pasiva con «se» preserva la impersonalidad jurídica del nifal hebreo.
