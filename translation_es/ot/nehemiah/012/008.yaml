    text: Or 'he and his brothers were over the thanksgivings'; the Hebrew may be understood more collectively, though the singular pronoun most naturally points to Mattaniah.
    reason: alternative_reading
  - marker: b
    text: The Hebrew 'thanksgivings' likely refers to liturgical songs or expressions of praise offered in thanksgiving.
    reason: lexical_alternative
