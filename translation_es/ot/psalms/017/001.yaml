translation:
  language: es
  text: Oración de David. Escucha, Yahvé, una causa justa[a]; atiende a mi clamor; presta oído a mi oración que sale de labios sin engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oye lo que es justo»; también «justicia». El hebreo צֶדֶק puede denotar justicia, rectitud o una causa justa; aquí probablemente se refiere a la causa justa del salmista.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְּפִלָּה לְדָוִד
  english_pob_choice: A prayer of David
  chosen_spanish: Oración de David
  alternatives_spanish:
  - Una oración de David
  - Oración para David
  lexicon: HALOT
  rationale: La fórmula del encabezado se expresa naturalmente en español con el genitivo «de David», indicando asociación o autoría. «Oración» mantiene la relación léxica con תְּפִלָּה y su tono cultual.
- source_word: שִׁמְעָה
  english_pob_choice: Hear
  chosen_spanish: Escucha
  alternatives_spanish:
  - Oye
  - Escucha atentamente
  lexicon: HALOT
  rationale: El imperativo de שׁמע pide oír con atención. «Escucha» es claro y digno en español, y funciona bien en la serie paralela de peticiones a Dios.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma adoptada por el proyecto en español. No se sustituye por un título, para mantener la transparencia del Tetragrámaton.
- source_word: צֶדֶק
  english_pob_choice: a just cause
  chosen_spanish: una causa justa
  alternatives_spanish:
  - justicia
  - rectitud
  - lo justo
  lexicon: HALOT
  rationale: En este contexto, צֶדֶק funciona como el objeto de la petición y se refiere a la causa o reclamación justa del salmista. «Una causa justa» comunica esa fuerza forense sin perder la ambigüedad lexical de justicia/rectitud.
- source_word: הַקְשִׁיבָה
  english_pob_choice: attend to
  chosen_spanish: atiende a
  alternatives_spanish:
  - presta atención a
  - escucha atentamente
  lexicon: HALOT
  rationale: El hiphil de קשׁב implica una escucha deliberada. «Atiende a» conserva esa intensidad y evita repetir exactamente el mismo verbo de la primera cláusula.
- source_word: רִנָּתִי
  english_pob_choice: my cry
  chosen_spanish: mi clamor
  alternatives_spanish:
  - mi grito
  - mi voz
  - mi grito de júbilo
  lexicon: HALOT
  rationale: En un contexto de súplica, רִנָּה comunica una exclamación o clamor urgente. «Clamor» transmite bien la súplica intensa sin imponer un matiz de júbilo que aquí no domina.
- source_word: הַאֲזִינָה
  english_pob_choice: give ear to
  chosen_spanish: presta oído a
  alternatives_spanish:
  - inclina tu oído a
  - escucha
  lexicon: HALOT
  rationale: El idiomatismo de אזן se expresa en español con una imagen equivalente. «Presta oído a» conserva el registro poético y la idea de una escucha activa.
- source_word: תְפִלָּתִי
  english_pob_choice: my prayer
  chosen_spanish: mi oración
  alternatives_spanish:
  - mi ruego
  - mi plegaria
  lexicon: HALOT
  rationale: Se traduce de forma directa para mantener la conexión léxica con el encabezado y la naturalidad en español.
- source_word: בְּלֹא שִׂפְתֵי מִרְמָה
  english_pob_choice: from lips without deceit
  chosen_spanish: de labios sin engaño
  alternatives_spanish:
  - de labios sin mentira
  - sin labios engañosos
  - de labios sin fraude
  lexicon: HALOT
  rationale: La construcción califica la oración como procedente de labios libres de engaño. «De labios sin engaño» es fiel, natural y evita una doble negación incómoda en español.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue la convención del proyecto de renderizar el Tetragrámaton como el nombre propio «Yahvé», preservando la transparencia del texto original y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de צֶדֶק como petición forense
  english_pob_reading: a just cause
  chosen_spanish_reading: una causa justa
  alternative_spanish_readings:
  - justicia
  - rectitud
  - lo justo
  rationale: El hebreo puede designar justicia abstracta, pero aquí el contexto de súplica favorece la lectura de una causa o reivindicación justa. «Una causa justa» preserva esa tensión y evita reducir el término a una virtud abstracta.
  doctrine_reference: HALOT; contexto inmediato del salmo
translation_notes:
  revision_awareness: 'La versión inglesa auditada ajustó el orden de la primera cláusula para reflejar mejor el vocativo hebreo: «Hear, O Yahweh, a just cause». La versión española adopta esa misma estructura directa («Escucha, Yahvé, una causa justa») y mantiene la equivalencia óptima sin calcar de manera rígida el inglés. También se preserva la tensión lexical de צֶדֶק mediante una nota de causa justa, en lugar de reducirla a una sola noción abstracta.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יהוה, en coherencia con el estándar del proyecto.
  - Se usa «oración» para תְּפִלָּה y «mi oración» para תְפִלָּתִי, preservando la conexión léxica interna.
  - «Causa justa» traduce el valor forense de צֶדֶק sin eliminar su ambigüedad de justicia/rectitud.
  - 'La serie verbal conserva un paralelismo claro en español: escucha / atiende / presta oído.'
  - La nota [a] aparece anclada explícitamente en el texto para evitar problemas de validación.
