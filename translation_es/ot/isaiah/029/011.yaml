translation:
  language: es
  text: 'Y la visión de todo esto ha llegado a ser para ustedes como las palabras de un rollo sellado, que entregan a uno que sabe leer[a], diciendo: «Por favor, lee esto», y él dice: «No puedo, porque está sellado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a uno que conoce la escritura»; literalmente, «a uno que conoce el rollo/libro».
    reason: lexical_alternative
lexical_decisions:
- source_word: חָזוּת
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - revelación
  - visión profética
  lexicon: HALOT
  rationale: חָזוּת denota una visión o revelación profética. «Visión» es la equivalencia más directa y natural en español, y conserva el marco profético sin ampliar el sentido.
- source_word: הַכֹּל
  english_pob_choice: all this
  chosen_spanish: todo esto
  alternatives_spanish:
  - el todo
  - todo
  lexicon: HALOT
  rationale: Con el artículo, כֹּל apunta a la totalidad del contenido revelado previo. «Todo esto» es natural en español y mantiene la referencia retrospectiva al mensaje entero.
- source_word: כְּדִבְרֵי
  english_pob_choice: like the words of
  chosen_spanish: como las palabras de
  alternatives_spanish:
  - como las expresiones de
  - como el contenido de
  lexicon: HALOT
  rationale: דִּבְרֵי es el plural constructo de «palabras / dichos». «Como las palabras de» reproduce bien la comparación y encaja con la frase siguiente.
- source_word: הַסֵּפֶר
  english_pob_choice: scroll
  chosen_spanish: libro
  alternatives_spanish:
  - rollo
  - documento
  lexicon: HALOT
  rationale: En español, «libro» es más transparente para el lector general; sin embargo, el trasfondo histórico es un rollo. Se preserva el matiz de escrito sellado, y la nota explica la posibilidad histórica de «rollo».
- source_word: הֶחָתוּם / חָתוּם
  english_pob_choice: sealed
  chosen_spanish: sellado
  alternatives_spanish:
  - cerrado
  - lacrado
  lexicon: HALOT
  rationale: חתם significa ser sellado. «Sellado» comunica con precisión la inaccesibilidad del escrito y conserva la imagen del sello.
- source_word: יוֹדֵעַ הַסֵּפֶר
  english_pob_choice: one who knows writing
  chosen_spanish: uno que sabe leer
  alternatives_spanish:
  - uno que conoce la escritura
  - uno que es letrado
  - uno que sabe del libro
  lexicon: HALOT
  rationale: La frase hebrea describe a una persona letrada; la revisión inglesa corrigió el énfasis desde «sabe el libro» hacia «sabe leer». En español, «uno que sabe leer» comunica de manera natural la capacidad lectora implícita sin perder el sentido de alfabetización.
- source_word: קְרָא נָא
  english_pob_choice: Please read
  chosen_spanish: Por favor, lee esto
  alternatives_spanish:
  - Lee, por favor, esto
  - Te ruego que leas esto
  lexicon: HALOT
  rationale: El imperativo con נָא expresa una petición cortés. «Por favor» conserva ese tono de solicitud, y «lee esto» corresponde al objeto implícito de lectura.
- source_word: לֹא אוּכַל
  english_pob_choice: I cannot
  chosen_spanish: No puedo
  alternatives_spanish:
  - No soy capaz
  - No puedo leerlo
  lexicon: HALOT
  rationale: יָכֹל expresa capacidad. «No puedo» es la forma más directa y natural; no se añade «leerlo» porque el hebreo tampoco lo explicita.
- source_word: וַתְּהִי לָכֶם
  english_pob_choice: has become to you
  chosen_spanish: ha llegado a ser para ustedes
  alternatives_spanish:
  - les ha resultado
  - les ha llegado a ser
  lexicon: HALOT
  rationale: El waw consecutivo presenta un resultado presente. «Ha llegado a ser para ustedes» comunica el estado resultante de manera fluida en español y mantiene la fuerza de juicio de la frase.
theological_decisions:
- issue: Metáfora de revelación inaccesible
  english_pob_reading: Retain the image of a sealed scroll without interpretive expansion
  chosen_spanish_reading: Conservar la imagen de un escrito sellado sin ampliarla a una explicación doctrinal más explícita
  alternative_spanish_readings:
  - Parafrasear como incapacidad de comprender la palabra de Dios
  - Expresar que toda la revelación se volvió ininteligible
  rationale: 'El versículo usa una comparación: la visión se vuelve como las palabras de un escrito sellado. Mantener la metáfora preserva su fuerza profética y evita importar una explicación que el texto no formula directamente.'
  doctrine_reference: Isaías 29:11; principio de preservar la figura retórica del texto fuente
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al expresar la persona como «uno que sabe leer», en vez de una formulación más literal pero menos natural. A la vez, se mantiene la metáfora del escrito sellado y la secuencia retórica completa del versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; en este versículo no aparece.
  - Se mantiene «visión» para חָזוּת, coherente con el uso profético del término.
  - «Sellado» se usa de forma consistente para חָתוּם.
  - La frase «uno que sabe leer» traduce la lectura literata del hebreo sin introducir innecesariamente «escuchar» o «entender».
