  rationale: El hebreo nominal de פקד aquí se refiere a los que fueron registrados o contados en el censo. En español, «los contados» conserva la idea pasiva de personas ya computadas sin añadir explícitamente «hombres» donde el hebreo lo da por entendido en esta fórmula censal.
- source_word: לְמַטֵּה
