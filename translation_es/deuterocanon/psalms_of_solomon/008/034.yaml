translation:
  language: es
  text: Reúne a los dispersos[a] de Israel con misericordia y bondad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «la dispersión de Israel»; también puede entenderse como «el pueblo disperso de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «benevolencia» para «bondad».
    reason: lexical_alternative
lexical_decisions:
- source_word: συνάγαγε
  english_pob_choice: Gather
  chosen_spanish: Reúne
  alternatives_spanish:
  - Junta
  - Agrupa
  - Recoge
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción de ingathering o reunión. «Reúne» es natural en español, conserva el tono de súplica y evita un calco demasiado rígido.
- source_word: διασπορά
  english_pob_choice: the dispersed
  chosen_spanish: la dispersión
  alternatives_spanish:
  - los dispersos
  - las personas dispersas
  - la diáspora
  lexicon: BDAG
  rationale: La forma griega es un sustantivo colectivo con peso histórico y teológico. «La dispersión» mantiene ese valor nominal sin convertirlo solo en un adjetivo; «diáspora» sería posible, pero menos transparente para lectura litúrgica general.
- source_word: Ἰσραήλ
  english_pob_choice: of Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de Israel
  lexicon: BDAG
  rationale: 'Se conserva la relación posesiva/genitiva de manera directa y natural en español: «la dispersión de Israel».'
- source_word: ἐλέους
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - piedad
  lexicon: BDAG
  rationale: «Misericordia» es la correspondencia más estable y reverente en español bíblico para ἔλεος, sin perder claridad.
- source_word: χρηστότητος
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - amabilidad
  - benevolencia
  lexicon: BDAG
  rationale: Aunque «kindness» puede ser «bondad» o «amabilidad», aquí «bondad» recoge mejor la cualidad benévola general de χρηστότης y evita reducirla a mera cortesía.
theological_decisions:
- issue: Cómo rendir διασπορά sin perder su peso colectivo e histórico
  english_pob_reading: the dispersed
  chosen_spanish_reading: la dispersión
  alternative_spanish_readings:
  - los dispersos
  - la diáspora
  rationale: La revisión inglesa reciente osciló entre una formulación más abstracta («dispersion») y una más personal («dispersed»). En español, «la dispersión» preserva el sustantivo técnico y su resonancia judía del Segundo Templo, sin forzar una paráfrasis personal que diluya el término.
  doctrine_reference: Historia y lenguaje del exilio/reunión de Israel en la oración bíblica y judía del Segundo Templo
translation_notes:
  revision_awareness: 'El inglés POB muestra una revisión importante en διασπορά: de «the dispersion of Israel» a «the dispersed of Israel» por naturalidad y sentido colectivo. Para el español, se optó por «la dispersión de Israel», porque conserva el sustantivo técnico, la gravedad histórica y la transparencia semántica del griego, mientras sigue siendo idiomático. También se evitó «Cristo/SEÑOR» u otras terminologías no presentes en el verso.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este verso no contiene el tetragrámaton.
  - «Misericordia» y «bondad» siguen el registro bíblico común y no introducen tecnicismos innecesarios.
  - La puntuación reproduce el carácter breve y oracional del original griego.
