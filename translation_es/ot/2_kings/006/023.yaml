translation:
  language: es
  text: Así que les preparó un gran banquete[a], y comieron y bebieron. Luego los despidió, y fueron a su amo[b]. Y las partidas de saqueo de Aram[c] no volvieron a entrar en la tierra de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un gran convite» o «una gran comida». El hebreo une un verbo y un sustantivo emparentados para expresar la preparación de una comida abundante.
    reason: lexical_alternative
  - marker: b
    text: O «a su señor». La expresión probablemente se refiere al rey de Aram.
    reason: lexical_alternative
  - marker: c
    text: «Aram» es el nombre hebreo que a menudo se traduce «Siria» en versiones antiguas.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְרֶה ... כֵּרָה גְדוֹלָה
  english_pob_choice: he prepared a great feast
  chosen_spanish: les preparó un gran banquete
  alternatives_spanish:
  - les preparó una gran comida
  - les dispuso un gran convite
  lexicon: HALOT
  rationale: El hebreo usa una combinación verbal-sustantiva idiomática para indicar la preparación de una comida abundante. «Preparó» conserva el valor verbal, y «gran banquete» comunica bien el carácter festivo y copioso sin perder la fuerza del original.
- source_word: לָהֶם
  english_pob_choice: for them
  chosen_spanish: les
  alternatives_spanish:
  - para ellos
  - para esos hombres
  lexicon: HALOT
  rationale: El objeto pronominal se refiere a los arameos capturados. En español, «les» integra naturalmente el sentido de destinatarios de la acción sin sobrecargar la frase.
- source_word: וַיֹּאכְלוּ וַיִּשְׁתּוּ
  english_pob_choice: they ate and drank
  chosen_spanish: comieron y bebieron
  alternatives_spanish:
  - y comieron y bebieron
  - comieron y tomaron
  lexicon: HALOT
  rationale: La pareja verbal se traduce de forma directa y natural en español. Se mantiene la coordinación simple para reproducir la secuencia narrativa.
- source_word: וַיְשַׁלְּחֵם
  english_pob_choice: he sent them away
  chosen_spanish: los despidió
  alternatives_spanish:
  - los envió lejos
  - los dejó ir
  lexicon: HALOT
  rationale: «Despidió» transmite bien la idea de soltarlos o enviarlos fuera después de la comida. En español es más idiomático que una calca literal, y no añade matices no presentes en el contexto.
- source_word: אֶל אֲדֹנֵיהֶם
  english_pob_choice: to their master
  chosen_spanish: a su señor
  alternatives_spanish:
  - a su amo
  - a su dueño
  lexicon: HALOT
  rationale: El POB inglés opta por «master» en sentido de autoridad, probablemente el rey de Aram. «Señor» mantiene esa relación de rango sin forzar una lectura litúrgica de «Señor» como nombre divino, y respeta la ambigüedad documentada.
- source_word: וְלֹא יָסְפוּ עוֹד
  english_pob_choice: did not come again
  chosen_spanish: no volvieron
  alternatives_spanish:
  - no volvieron otra vez
  - ya no siguieron viniendo
  lexicon: HALOT
  rationale: El hebreo expresa cese de repetición. En español, «no volvieron» reproduce de manera concisa y natural que los grupos no regresaron a realizar esas incursiones.
- source_word: גְּדוּדֵי אֲרָם
  english_pob_choice: the raiding bands of Aram
  chosen_spanish: las bandas de saqueo de Aram
  alternatives_spanish:
  - las partidas de saqueo de Aram
  - las tropas de Aram
  lexicon: HALOT
  rationale: גְּדוּד suele designar partidas o bandas de incursión, no un ejército formal. «Bandas de saqueo» conserva esa connotación de raid y evita suavizar el término.
- source_word: לָבוֹא בְּאֶרֶץ יִשְׂרָאֵל
  english_pob_choice: into the land of Israel
  chosen_spanish: entrar en la tierra de Israel
  alternatives_spanish:
  - venir a la tierra de Israel
  - invadir la tierra de Israel
  lexicon: HALOT
  rationale: Con בוא + ב, la idea es entrar en un territorio. «Entrar en la tierra de Israel» sigue de cerca el sentido espacial del hebreo y preserva la formulación territorial.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; esta propuesta mantiene la lectura de alta concordancia con el texto fuente y con el audit trail en inglés, ajustándola a un español natural y auditable.
  spanish_consistency_notes:
  - Se conserva «Aram» para mantener la primacía del nombre hebreo, en lugar de «Siria».
  - Se traduce el sustantivo cognado כֵּרָה con un término español de comida festiva y se documenta la alternativa.
  - «Señor» en este contexto se usa como título de rango humano, no como sustituto divino.
  - La frase final sigue la idea de cese de incursiones, evitando añadir intensidad no marcada por el hebreo.
