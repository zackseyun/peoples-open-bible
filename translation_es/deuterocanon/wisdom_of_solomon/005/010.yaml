translation:
  language: es
  text: como un barco que pasa por aguas agitadas[a], después de haber pasado no se puede encontrar huella alguna, ni rastro de su quilla en las olas[b];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aguas zarandeadas por las olas». El griego destaca agua puesta en oleaje.
    reason: lexical_alternative
  - marker: b
    text: El término griego traducido «quilla» es un vocablo náutico; algunas versiones lo entienden de modo más general como la trayectoria o el rumbo del barco.
    reason: lexical_alternative
lexical_decisions:
- source_word: ναῦς
  english_pob_choice: ship
  chosen_spanish: barco
  alternatives_spanish:
  - navío
  - buque
  lexicon: LSJ
  rationale: El griego designa una embarcación grande de navegación; en español, «barco» es natural y suficientemente amplio para la comparación. «Navío» y «buque» son posibles, pero suenan más marcados o técnicos.
- source_word: διερχομένη
  english_pob_choice: passing through
  chosen_spanish: que pasa por
  alternatives_spanish:
  - que atraviesa
  - que cruza
  lexicon: LSJ
  rationale: El participio expresa movimiento a través de un medio. «Que pasa por» conserva la imagen con español fluido y no añade matices que el griego no exige.
- source_word: κυμαινόμενον ὕδωρ
  english_pob_choice: surging water
  chosen_spanish: aguas agitadas
  alternatives_spanish:
  - aguas encrespadas
  - aguas con olas
  - aguas movedizas
  lexicon: LSJ
  rationale: El participio subraya agua convertida en oleaje. «Aguas agitadas» comunica bien la idea de mar revuelto y evita un calco pesado.
- source_word: ἧς διαβάσης
  english_pob_choice: after it has gone by
  chosen_spanish: después de haber pasado
  alternatives_spanish:
  - cuando haya pasado
  - luego de pasar
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto marca una acción ya cumplida antes de la siguiente. «Después de haber pasado» transmite con claridad esa anterioridad temporal.
- source_word: ἴχνος
  english_pob_choice: trace
  chosen_spanish: huella alguna
  alternatives_spanish:
  - rastro alguno
  - señal alguna
  - marca alguna
  lexicon: LSJ
  rationale: El punto es que no queda evidencia visible. «Huella alguna» en negación expresa bien la ausencia total de marca, y suena natural en español.
- source_word: ἀτραπός
  english_pob_choice: track
  chosen_spanish: rastro
  alternatives_spanish:
  - sendero
  - camino
  - trayecto
  lexicon: LSJ
  rationale: Aquí el término funciona metafóricamente como trayectoria. En español, «rastro» se empareja bien con la negación de huella y evita una repetición innecesaria de «huella».
- source_word: τρόπιος αὐτῆς
  english_pob_choice: its keel
  chosen_spanish: su quilla
  alternatives_spanish:
  - su quillote
  - su obra viva
  - su casco
  lexicon: LSJ
  rationale: En contexto náutico, el término remite a la quilla del barco. «Quilla» es el equivalente directo y conserva la imagen específica que el texto enfatiza.
- source_word: ἐν κύμασιν
  english_pob_choice: in the waves
  chosen_spanish: en las olas
  alternatives_spanish:
  - entre las olas
  - en las aguas
  - sobre las olas
  lexicon: LSJ
  rationale: La expresión sitúa el rastro perdido en el oleaje. «En las olas» es natural en español y mantiene el campo imagético acuático.
translation_notes:
  revision_awareness: Se corrigió la omisión previa del marcador [a] en el texto español, añadiéndolo en el lugar exacto correspondiente. Se mantuvo la opción [b] para la aclaración náutica, ambas ancladas explícitamente en el versículo.
  spanish_consistency_notes:
  - 'Se prefirió un español sobrio y literal en la imagen central, sin suavizar el doble énfasis de desaparición: no queda huella ni rastro.'
