translation:
  language: es
  text: 'Y los hijos de Shemer: Ahi[a], Rohgah, Jehubbah[b] y Aram.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En fórmulas genealógicas hebreas, ‘hijos de’ suele designar descendientes o miembros del linaje, no necesariamente hijos inmediatos.
    reason: cultural_note
  - marker: b
    text: El nombre hebreo permite variación transliterada; algunas versiones lo escriben ‘Hubbah’ o ‘Jehubbah’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Y los descendientes de
  - Y los hijos de familia de
  lexicon: HALOT
  rationale: En una fórmula genealógica, בְנֵי se puede traducir de forma literal como ‘hijos’, pero en español bíblico natural también puede abarcar descendientes o miembros de un linaje. ‘Los hijos de’ conserva la estructura breve del hebreo y sigue siendo claro en una lista genealógica.
- source_word: שָׁמֶר
  english_pob_choice: Shemer
  chosen_spanish: Shemer
  alternatives_spanish:
  - Shémer
  - Shamer
  lexicon: transliteración convencional
  rationale: Es un nombre propio y no debe verterse. ‘Shemer’ mantiene una transliteración reconocible y cercana al uso bíblico en español.
- source_word: אֲחִי
  english_pob_choice: Ahi
  chosen_spanish: Ahi
  alternatives_spanish:
  - Ají
  - Achi
  lexicon: transliteración convencional
  rationale: Aunque la forma consonántica puede sugerir relación con ‘hermano’, aquí funciona como nombre personal dentro de la genealogía. Se conserva como transliteración.
- source_word: ו/רוהגה
  english_pob_choice: Rohgah
  chosen_spanish: Rohgah
  alternatives_spanish:
  - Rohga
  - Rogá
  lexicon: transliteración convencional
  rationale: Nombre propio. Se mantiene la transliteración del POB inglés para preservar la correspondencia auditada con el hebreo y evitar una domesticación innecesaria.
- source_word: יחבה
  english_pob_choice: Jehubbah
  chosen_spanish: Jehubbah
  alternatives_spanish:
  - Jehubbah
  - Hubbah
  - Yehubbah
  lexicon: transliteración convencional
  rationale: Nombre propio con variación ortográfica entre tradiciones. Se conserva la forma inglesa auditada porque refleja una transliteración reconocible y respeta la posibilidad de variantes sin introducir una nueva forma no documentada.
- source_word: וַ/אֲרָם
  english_pob_choice: and Aram
  chosen_spanish: y Aram
  alternatives_spanish:
  - y Ram
  lexicon: transliteración convencional
  rationale: El hebreo presenta אֲרָם, por lo que ‘Aram’ es la transliteración directa. Se evita la variante ‘Ram’ porque no es la lectura indicada en el paquete fuente para este versículo.
theological_decisions:
- issue: Alcance genealógico de ‘hijos’
  english_pob_reading: Hebrew genealogical formulas often use 'sons of' for male descendants or clan members, not only immediate sons.
  chosen_spanish_reading: ‘Hijos de’ se conserva como fórmula genealógica amplia, sin restringirla a hijos inmediatos.
  alternative_spanish_readings:
  - ‘Descendientes de’
  - ‘Miembros del clan de’
  rationale: La advertencia del POB inglés señala que la expresión puede abarcar más que hijos biológicos inmediatos. En español, ‘hijos de’ mantiene la forma del texto y deja abierta esa amplitud genealógica sin sobrerinterpretar.
  doctrine_reference: Uso genealógico y tribal del Antiguo Testamento; cf. fórmulas de linaje en Crónicas.
translation_notes:
  revision_awareness: El pasaje muestra un alto grado de acuerdo con el texto fuente y con la revisión inglesa más reciente, sin cambios sustantivos en la lectura; se mantiene la misma segmentación genealógica y la misma identificación de los nombres propios.
  spanish_consistency_notes:
  - Se conserva ‘Shemer’, ‘Ahi’, ‘Rohgah’, ‘Jehubbah’ y ‘Aram’ como nombres propios transliterados, siguiendo el patrón del POB inglés.
  - Se usa ‘hijos de’ para reflejar la fórmula genealógica hebrea sin añadir información interpretativa.
  - La puntuación con dos puntos reproduce bien la introducción de una lista nominal en español bíblico actual.
