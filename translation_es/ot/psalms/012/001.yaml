translation:
  language: es
  text: 'Para el director del coro: según la Octava[a]. Un salmo de David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la octava»; probablemente una designación musical o litúrgica, quizá una melodía, un instrumento o una afinación en la octava. Tradicionalmente se translitera «Sheminit».'
    reason: cultural_note
  - marker: b
    text: O «por David» o «para David»; el hebreo «de David» deja abierta la relación exacta.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Para el maestro de coro
  - Para el director
  - Para el líder musical
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término señala a la persona encargada de la ejecución musical. «Director del coro» comunica bien esa función en español natural y conserva el matiz litúrgico-musical.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - conforme a
  - sobre
  - al compás de
  lexicon: HALOT
  rationale: En superscripciones, esta preposición introduce con frecuencia una indicación de melodía, estilo o ajuste musical. «Según» transmite esa relación funcional sin forzar una lectura demasiado literal.
- source_word: הַשְּׁמִינִית
  english_pob_choice: The Eighth
  chosen_spanish: La Octava
  alternatives_spanish:
  - la octava
  - Sheminit
  - la octava cuerda
  lexicon: HALOT
  rationale: El hebreo significa literalmente «la octava» y probablemente designa una indicación musical o litúrgica. Se conserva la transparencia del término con capitalización por tratarse de un título o designación del encabezado.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Canto
  - Melodía
  - Salmo poético
  lexicon: HALOT
  rationale: En español bíblico, «salmo» es el equivalente directo y más reconocido para este rótulo de género.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - por David
  - para David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición hebrea permite ambigüedad entre autoría, dedicación o asociación. «De David» preserva esa apertura sin resolver el vínculo de manera más específica de lo que el texto exige.
theological_decisions:
- issue: Relación exacta de לְדָוִד con David en el encabezado
  english_pob_reading: of David
  chosen_spanish_reading: de David
  alternative_spanish_readings:
  - por David
  - para David
  rationale: La construcción hebrea no obliga a una sola relación precisa. Mantener «de David» preserva la ambigüedad documental del encabezado y evita cerrar una cuestión histórica más allá de la evidencia textual.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente y el audit trail en inglés; no se detectaron revisiones posteriores que obliguen a ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no se presenta.
  - «Salmo» se usa como rótulo genérico de género, sin ampliar el texto.
  - Se conserva la ambigüedad de לְדָוִד con una nota al pie, en paralelo con el inglés POB.
