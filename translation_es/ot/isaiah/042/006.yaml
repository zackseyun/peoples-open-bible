translation:
  language: es
  text: Yo soy Yahvé[a]; te he llamado en justicia, y te tomaré de la mano; te guardaré[b] y te daré como pacto para el pueblo, como luz para las naciones[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en rectitud». La palabra hebrea צֶדֶק puede denotar justicia o rectitud.
    reason: lexical_alternative
  - marker: b
    text: O «te protegeré» o «te preservaré».
    reason: lexical_alternative
  - marker: c
    text: O «como luz a las naciones»; «naciones» también puede traducirse «gentiles» en algunos contextos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino en transliteración española estándar, siguiendo la política del POB de no sustituirlo por un título. 'Yahvé' es la forma más reconocible y natural en español bíblico contemporáneo.
- source_word: קְרָאתִיךָ
  english_pob_choice: I have called you
  chosen_spanish: te he llamado
  alternatives_spanish:
  - te llamé
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción completada con vigencia en el presente. El pretérito perfecto compuesto español comunica bien la llamada ya efectuada con efecto actual.
- source_word: בְצֶדֶק
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  lexicon: HALOT
  rationale: Se opta por 'justicia' porque la raíz צֶדֶק abarca tanto justicia como rectitud; aquí el contexto de comisión divina y el audit trail inglés permiten conservar la amplitud semántica sin forzar una sola acepción.
- source_word: וְאַחְזֵק בְּיָדֶךָ
  english_pob_choice: and I will take hold of your hand
  chosen_spanish: tomaré tu mano
  alternatives_spanish:
  - tomaré tu mano con firmeza
  - te sostendré de la mano
  lexicon: HALOT
  rationale: La imagen concreta de tomar la mano se mantiene en español de modo natural. 'Tomaré tu mano' conserva el gesto de apoyo divino sin sobreexplicar la metáfora.
- source_word: וְאֶצָּרְךָ
  english_pob_choice: I will keep you
  chosen_spanish: te guardaré
  alternatives_spanish:
  - te protegeré
  - te preservaré
  lexicon: HALOT
  rationale: '''Guardar'' refleja bien el valor de נצר como custodiar/velar/proteger. Además mantiene la correspondencia lexical con la revisión inglesa final ''keep you'' sin caer en un calco torpe.'
- source_word: וְאֶתֶּנְךָ
  english_pob_choice: and give you
  chosen_spanish: te daré
  alternatives_spanish:
  - te entregaré
  - te pondré
  lexicon: HALOT
  rationale: Se conserva el verbo general 'dar', que el hebreo usa de forma amplia. En esta construcción, el complemento posterior define el rol otorgado.
- source_word: לִבְרִית עָם
  english_pob_choice: as a covenant for the people
  chosen_spanish: como pacto para el pueblo
  alternatives_spanish:
  - como alianza para el pueblo
  - como pacto del pueblo
  lexicon: HALOT
  rationale: '''Pacto'' transmite ברית en un registro bíblico claro y amplio. Se evita ''alianza'' por ser menos estable en la terminología bíblica del POB y porque ''pacto'' preserva mejor la carga teológica del texto.'
- source_word: עָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - un pueblo
  - su pueblo
  lexicon: HALOT
  rationale: Aunque el hebreo no lleva artículo, el paralelismo con 'las naciones' favorece una referencia colectiva definida. 'El pueblo' es la opción más natural y coherente con el contraste del pasaje.
- source_word: לְאוֹר גּוֹיִם
  english_pob_choice: as a light for the nations
  chosen_spanish: como luz para las naciones
  alternatives_spanish:
  - como luz de las naciones
  - como luz a las naciones
  lexicon: HALOT
  rationale: Se mantiene el paralelismo poético con 'como... para...'. 'Naciones' reproduce גּוֹיִם de forma menos cargada que 'gentiles' y preserva el horizonte universal de Isaías.
theological_decisions:
- issue: El Siervo dado 'como pacto para el pueblo'
  english_pob_reading: Retain the direct wording that the addressed figure is given as a covenant for the people rather than interpretively expanding it.
  chosen_spanish_reading: 'Conservar la formulación directa: ''te daré como pacto para el pueblo''.'
  alternative_spanish_readings:
  - te daré como mediador de un pacto para el pueblo
  - te haré mediador del pacto para el pueblo
  rationale: El hebreo presenta al personaje mismo con función pactal; no conviene resolverlo en una perífrasis interpretativa que atenúe la fuerza del enunciado. La redacción elegida preserva la tensión teológica y deja abierta la lectura mesiánica sin imponerla.
  doctrine_reference: Preservar la tensión interpretativa del texto original.
- issue: Contraste entre 'el pueblo' y 'las naciones'
  english_pob_reading: Render עָם as 'the people' and גּוֹיִם as 'the nations,' preserving the likely Israel/nations contrast.
  chosen_spanish_reading: Mantener 'el pueblo' / 'las naciones'.
  alternative_spanish_readings:
  - un pueblo / las naciones
  - el pueblo / los gentiles
  rationale: La oposición poética se entiende mejor con un referente colectivo definido y otro universal. 'Las naciones' evita estrechar גּוֹיִם a un tecnicismo eclesial posterior y conserva la amplitud profética.
  doctrine_reference: Primacía del texto hebreo sobre la terminología tradicional.
translation_notes:
  revision_awareness: La versión inglesa más reciente ajustó 'watch over you' a 'keep you' para acercarse más a אֶצָּרְךָ. La redacción española sigue esa actualización con 'te guardaré', manteniendo una equivalencia léxica natural. No se requieren otros cambios respecto del audit trail.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como nombre divino en lugar de una sustitución por título.
  - '''Pacto'' se usa de manera consistente para ברית, conforme al registro bíblico del proyecto.'
  - '''Naciones'' se prefiere sobre ''gentiles'' por neutralidad contextual y mayor ajuste a Isaías.'
  - La puntuación reproduce el ritmo poético del hebreo con segmentos coordinados por punto y coma y coma final.
