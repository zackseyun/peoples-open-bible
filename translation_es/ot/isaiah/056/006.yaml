    rationale: La nota explica la alternativa para וּבְנֵי הַנֵּכָר ('los extranjeros'), no para el nombre divino. Así como está, induce a una lectura errónea y no cumple la disciplina de anclar cada nota al término pertinente.
  - severity: medium
    issue: '''se mantienen firmes en mi pacto'' atenúa el verbo de asirse/aferrarse de וּמַחֲזִיקִים.'
    rationale: La frase es comprensible, pero el hebreo y el audit trail apuntan más a 'aferrarse' o 'asirse fuertemente' al pacto que a una mera perseverancia en él. 'Se aferran a mi pacto' es más preciso y natural.
