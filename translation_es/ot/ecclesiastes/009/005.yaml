translation:
  language: es
  text: Porque los que viven saben que morirán[a], pero los muertos no saben nada en absoluto, y ya no hay para ellos recompensa, porque su recuerdo ha caído en el olvido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no saben nada». La expresión hebrea es enfática: «no saben nada en absoluto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT 3588
  rationale: Introduce la explicación causal del dicho anterior; «porque» conserva la relación discursiva natural en español.
- source_word: הַחַיִּים
  english_pob_choice: the living
  chosen_spanish: los que viven
  alternatives_spanish:
  - los vivientes
  - los vivos
  lexicon: HALOT 2416
  rationale: El sustantivo adjetival hebreo se refiere a personas vivas; «los que viven» es claro y evita un posible tono demasiado abstracto.
- source_word: יוֹדְעִים
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - están conscientes
  lexicon: HALOT 3045
  rationale: En este contexto, ידע expresa conocimiento efectivo; «saben» es la forma más natural en español.
- source_word: שֶׁיָּמֻתוּ
  english_pob_choice: that they will die
  chosen_spanish: que morirán
  alternatives_spanish:
  - que van a morir
  - que han de morir
  lexicon: HALOT 4191
  rationale: El futuro español comunica bien la certeza del hecho conocido por los vivos y respeta el valor del verbo en la cláusula.
- source_word: וְהַמֵּתִים
  english_pob_choice: but the dead
  chosen_spanish: pero los muertos
  alternatives_spanish:
  - y los muertos
  lexicon: HALOT 4191
  rationale: Aunque el waw es formalmente conjuntivo, el contraste del contexto pide en español una coordinación adversativa para reflejar el sentido del hebreo.
- source_word: אֵינָם יוֹדְעִים מְא֗וּמָה
  english_pob_choice: know nothing at all
  chosen_spanish: no saben nada en absoluto
  alternatives_spanish:
  - no saben nada
  - no conocen nada en absoluto
  lexicon: HALOT 3045; HALOT 3972
  rationale: La negación más מְאוּמָה es enfática; «nada en absoluto» preserva esa fuerza sin sonar forzado.
- source_word: וְאֵין עוֹד לָהֶם שָׂכָר
  english_pob_choice: there is no longer any reward for them
  chosen_spanish: ya no hay para ellos recompensa
  alternatives_spanish:
  - ya no tienen recompensa
  - no hay más recompensa para ellos
  lexicon: HALOT 7939; HALOT 5750
  rationale: שָׂכָר puede ser recompensa o paga; «recompensa» encaja bien en Qohelet y conserva el alcance semántico sin reducirlo a salario.
- source_word: כִּי נִשְׁכַּח זִכְרָם
  english_pob_choice: because their memory is forgotten
  chosen_spanish: porque su memoria ha sido olvidada
  alternatives_spanish:
  - porque su recuerdo ha sido olvidado
  - pues se ha olvidado su memoria
  lexicon: HALOT 7911; HALOT 2143
  rationale: Mantiene el pasivo hebreo de נִשְׁכַּח y el objeto posesivo זִכְרָם; «su memoria» es una manera idiomática y fiel de expresar el recuerdo del cual ya no se hace memoria.
theological_decisions:
- issue: Alcance de la afirmación sobre los muertos
  english_pob_reading: 'Render the verse according to its plain literary sense within Qoheleth''s under-the-sun perspective: ''the dead know nothing at all'' and ''there is no longer any reward for them,'' without added harmonizing qualifiers.'
  chosen_spanish_reading: 'Traducir la afirmación en su sentido literario directo dentro de la perspectiva de Qohelet, sin añadir aclaraciones doctrinales: «los muertos no saben nada en absoluto» y «ya no hay para ellos recompensa».'
  alternative_spanish_readings:
  - «los muertos no saben nada bajo el sol»
  - «los muertos no saben nada, en el sentido del asunto que aquí se trata»
  rationale: El hebreo expresa la afirmación con contundencia; la traducción debe conservar esa tensión en vez de suavizarla con precisiones que no están en el versículo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión sigue el consenso del control cruzado como de alta concordancia y no introduce cambios sustanciales respecto del análisis previo; se preserva la fuerza enfática de la negación y el contraste adversativo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usa «recompensa» para שָׂכָר, coherente con el audit trail en inglés y más amplio que «paga» o «salario».
  - Se conserva la tensión teológica del texto sin interpretaciones armonizadoras añadidas.
