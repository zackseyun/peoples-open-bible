  chosen_reading: human
  alternative_readings:
  - man
  - humankind
  rationale: The verse contrasts false gods with artifacts made by people in general, not by a male individual. Following the translation philosophy's gender-accurate principle, the generic sense is best conveyed by 'human' in the phrase 'human hands.'
