translation:
  language: es
  text: Sobre la Puerta de los Caballos[a], los sacerdotes hicieron reparaciones, cada uno frente a su propia casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la puerta de los caballos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעַל
  english_pob_choice: Above
  chosen_spanish: Sobre
  alternatives_spanish:
  - Encima de
  - Más allá de
  lexicon: HALOT
  rationale: En este contexto de lista de tramos de muro, la relación espacial se expresa de manera natural en español con 'sobre', manteniendo la referencia al punto del recorrido sin sonar rígido.
- source_word: שַׁעַר הַסּוּסִים
  english_pob_choice: the Horse Gate
  chosen_spanish: la Puerta de los Caballos
  alternatives_spanish:
  - la Puerta de los Caballos
  - la Puerta del Caballo
  - la Puerta de los caballos
  lexicon: HALOT
  rationale: El hebreo presenta un sintagma nominal de nombre de lugar; en español, 'Puerta de los Caballos' conserva el sentido toponímico y refleja con transparencia la alternativa léxica posible 'puerta de los caballos'.
- source_word: הֶחֱזִיקוּ
  english_pob_choice: made repairs
  chosen_spanish: hicieron reparaciones
  alternatives_spanish:
  - repararon
  - fortalecieron
  lexicon: HALOT
  rationale: En Nehemías 3 el verbo se refiere al trabajo constructivo sobre el muro. 'Hicieron reparaciones' conserva esa acción de obra sin perder el matiz de intervención práctica.
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  lexicon: HALOT
  rationale: La equivalencia directa es clara y natural en español bíblico contemporáneo.
- source_word: אִישׁ
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - uno por uno
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular, aquí tiene valor distributivo. 'Cada uno' preserva ese sentido en español sin introducir una lectura masculina innecesariamente restrictiva.
- source_word: לְנֶגֶד
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - enfrente de
  - opuesto a
  lexicon: HALOT
  rationale: La relación posicional de frente/oposición se expresa con naturalidad en español como 'frente a', especialmente en una descripción arquitectónica.
- source_word: בֵּיתוֹ
  english_pob_choice: his own house
  chosen_spanish: su propia casa
  alternatives_spanish:
  - su casa
  - la casa de cada uno
  lexicon: HALOT
  rationale: El sufijo singular de tercera persona se distribuye sobre 'cada uno'; 'su propia casa' deja claro el vínculo personal y mantiene la fuerza distributiva del hebreo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide sustancialmente con la solución auditada en inglés: ubicación relativa, nombre de la puerta, acción de reparación y distribución individual de los sacerdotes.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u այլ substitución innecesaria porque no aparece el Tetragrámaton en este versículo.
  - '''Sacerdotes'' y no ''sacerdotes'' with archaic phrasing keeps clarity and dignity in contemporary Spanish.'
  - La nota conserva la alternativa léxica documentada para el nombre de la puerta sin expandir el sentido más allá del atestiguado.
