translation:
  language: es
  text: Y se levantará de un retoño de sus raíces en su lugar[a], y vendrá contra el ejército y entrará en la fortaleza[b] del rey del norte, y actuará contra ellos[c] y prevalecerá[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de un retoño/vástago de sus raíces», es decir, de su linaje familiar.
    reason: lexical_alternative
  - marker: b
    text: O «el baluarte del rey del norte».
    reason: lexical_alternative
  - marker: c
    text: O «tratará con ellos» o «actuará entre ellos»; el modismo hebreo es amplio.
    reason: lexical_alternative
  - marker: d
    text: O «mostrará fuerza» o «obtendrá ventaja».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָמַד
  english_pob_choice: shall arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - surgirá
  - aparecerá
  lexicon: HALOT
  rationale: En un contexto de sucesión dinástica o de relevo, עמד puede expresar la idea de presentarse o levantarse como sucesor. «Se levantará» comunica ese valor de surgimiento sin perder naturalidad en español.
- source_word: מִנֵּצֶר שָׁרָשֶׁיהָ
  english_pob_choice: from a branch of her roots
  chosen_spanish: de un retoño de sus raíces
  alternatives_spanish:
  - de una rama de sus raíces
  - de un brote de sus raíces
  lexicon: HALOT
  rationale: נֵצֶר conserva una imagen vegetal de brote/renuevo. «Retoño» mantiene la metáfora y en español sugiere con claridad una línea familiar o genealógica, como indica el contexto.
- source_word: כַּנּוֹ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - como su sucesor
  - en su puesto
  lexicon: HALOT
  rationale: La frase marca sustitución o sucesión. «En su lugar» es fiel, sobrio y preserva la ambigüedad del referente sin explicitar más de lo que exige el hebreo.
- source_word: הַחַיִל
  english_pob_choice: the army
  chosen_spanish: el ejército
  alternatives_spanish:
  - la fuerza
  - el host
  lexicon: HALOT
  rationale: En este pasaje militar, חַיִל refiere a fuerza armada. «Ejército» es el equivalente más natural y preciso en español.
- source_word: בְּמָעוֹז מֶלֶךְ הַצָּפוֹן
  english_pob_choice: the fortress of the king of the north
  chosen_spanish: la fortaleza del rey del norte
  alternatives_spanish:
  - la fortaleza fuerte del rey del norte
  - el baluarte del rey del norte
  lexicon: HALOT
  rationale: מָעוֹז designa una plaza fuerte o lugar de protección. «Fortaleza» transmite bien la idea de fortificación; en español resulta más fluido que una traducción demasiado literal de la raíz de fuerza.
- source_word: וְעָשָׂה בָהֶם
  english_pob_choice: he shall act against them
  chosen_spanish: y actuará contra ellos
  alternatives_spanish:
  - y tratará con ellos
  - y hará contra ellos
  lexicon: HALOT
  rationale: El hebreo es idiomático y amplio. La preposición y el contexto permiten una lectura hostil; por eso «actuará contra ellos» conserva la amplitud del giro sin volverlo más específico de lo que el texto muestra.
- source_word: וְהֶחֱזִיק
  english_pob_choice: and prevail
  chosen_spanish: y prevalecerá
  alternatives_spanish:
  - y mostrará fuerza
  - y saldrá vencedor
  - y ganará la ventaja
  lexicon: HALOT
  rationale: El hifil de חזק puede indicar fortalecerse, hacerse fuerte o imponerse. «Prevalecerá» recoge el resultado de victoria o superioridad en el contexto bélico sin exagerar el matiz.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete fuente hebreo y el audit trail inglés. Se conservan las ambigüedades señaladas por POB: el valor genealógico de נֵצֶר, el sentido de reemplazo en כַּנּוֹ, la amplitud idiomática de עשה ב + pronombre y el matiz de superioridad de חזק en hifil.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término estándar cuando aparezca el nombre divino; en este versículo no aparece.
  - Se usó «ejército» para הַחַיִל por el contexto bélico inmediato.
  - «Fortaleza» se eligió como equivalente idiomático de מָעוֹז, sin convertirlo en un término eclesiástico o interpretativo.
  - Las notas preservan alternativas reales donde el español introduce una ambigüedad o donde el POB inglés documentó varias posibilidades.
