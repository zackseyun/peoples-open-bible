review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y del POB inglés: una situación recurrente en la que los sacerdotes toman oro y plata de sus dioses y lo usan para beneficio propio. También conserva la alternativa léxica de ὑφαιρούμενοι en nota. Sin embargo, el texto principal tiene un problema de concordancia y no sigue su propia decisión léxica para εἰς ἑαυτοὺς.'
  spanish_quality_summary: La redacción es clara y natural, pero «la gastan» es incorrecto porque el antecedente es «oro y plata», que en esta construcción debe retomarse como «lo» o reformularse. Además, «en sí mismos» en el texto principal suena poco idiomático para este contexto; «para sí mismos» es la opción natural y ya está documentada en las decisiones léxicas.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Sacerdotes», «dioses», «oro y plata» y la nota léxica están bien alineados. La revisión solo ajusta gramática y naturalidad para corresponder mejor a εἰς ἑαυτοὺς καταναλοῦσιν.
  issues:
  - severity: medium
    issue: Concordancia pronominal incorrecta en «la gastan»
    rationale: «Oro y plata» no puede retomarse naturalmente con «la» en singular femenino. El español idiomático aquí pide «lo gastan» como referencia al conjunto, o una reformulación equivalente.
  - severity: medium
    issue: El texto principal dice «en sí mismos», pero la decisión léxica aprobada es «para sí mismos»
    rationale: «En sí mismos» suena extraño y no expresa con claridad el destino beneficiario de εἰς ἑαυτοὺς. «Para sí mismos» comunica mejor la idea de gasto dirigido al propio provecho.
  revised_spanish_text: Y hay ocasiones en que los sacerdotes[a], tomando oro y plata de sus dioses, lo gastan para sí mismos.
  revised_footnotes:
  - marker: a
    text: O «robando» o «sustrayendo en secreto» oro y plata de sus dioses.
    reason: lexical_alternative
  revision_rationale: Se corrige la concordancia pronominal («lo gastan») y se reemplaza la expresión poco natural «en sí mismos» por «para sí mismos», en línea con el griego εἰς ἑαυτοὺς, con la decisión léxica ya documentada y con un español claro y fiel. La nota se conserva con una leve normalización tipográfica.
