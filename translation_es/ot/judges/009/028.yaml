translation:
  language: es
  text: 'Y Gaal, hijo de Ebed, dijo[a]: «¿Quién es Abimélec, y quién es Siquem, para que lo sirvamos? ¿No es hijo de Jerubaal, y Zebul su oficial[b]? ¡Sirvan a los hombres de Hamor[c], padre de Siquem! Pero ¿por qué habríamos de servirlo nosotros?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién es Abimélec, y qué es Siquem...?» El hebreo menciona directamente «Siquem», probablemente por metonimia para la ciudad o su comunidad gobernante.'
    reason: lexical_alternative
  - marker: b
    text: «Oficial» también puede entenderse como «diputado», «administrador nombrado» o «encargado».
    reason: lexical_alternative
  - marker: c
    text: Es decir, el pueblo descendiente de Hamor o asociado con él, recordado como padre o fundador de Siquem; compárese Génesis 34.
    reason: cross_reference
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who is
  chosen_spanish: ¿Quién es
  alternatives_spanish:
  - ¿Qué es
  lexicon: HALOT
  rationale: El interrogativo expresa desafío despectivo sobre la legitimidad de Abimélec y de Siquem. En español, «¿Quién es…?» conserva mejor ese tono que «¿Qué es…?», aunque esta última queda como alternativa posible por el juego metonímico con Siquem.
- source_word: שְׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Siquem
  alternatives_spanish:
  - la ciudad de Siquem
  - los hombres de Siquem
  lexicon: HALOT
  rationale: Se mantiene el nombre propio para respetar la retórica del hebreo y la ambigüedad metonímica señalada en el audit trail. La referencia puede abarcar la ciudad o su comunidad gobernante sin forzar el texto.
- source_word: כִּי נַעַבְדֶנּוּ
  english_pob_choice: that we should serve him
  chosen_spanish: para que lo sirvamos
  alternatives_spanish:
  - para estar sujetos a él
  - para trabajarlo
  lexicon: HALOT
  rationale: נַעַבְדֶנּוּ aquí tiene fuerza política de servicio/sujeción, no de trabajo común. «Para que lo sirvamos» conserva esa relación de subordinación y suena natural en español.
- source_word: הֲלֹא
  english_pob_choice: Is he not
  chosen_spanish: ¿No es
  alternatives_spanish:
  - ¿Acaso no es
  - ¿No será
  lexicon: HALOT
  rationale: La construcción retórica pide una formulación que espere respuesta afirmativa. «¿No es…?» mantiene el tono formal y confrontativo.
- source_word: בֶן יְרֻבַּעַל
  english_pob_choice: the son of Jerubbaal
  chosen_spanish: hijo de Jerubaal
  alternatives_spanish:
  - hijo de Jerobaal
  - Jerubaal, su hijo
  lexicon: HALOT
  rationale: Se preserva el parentesco como formulación directa y natural en español. «Jerubaal» sigue la transliteración usual en español y mantiene el énfasis en la línea familiar de Abimélec.
- source_word: פְּקִידוֹ
  english_pob_choice: his officer
  chosen_spanish: su oficial
  alternatives_spanish:
  - su diputado
  - su administrador nombrado
  - su encargado
  lexicon: HALOT
  rationale: פָּקִיד designa a un funcionario subordinado o administrador nombrado. «Oficial» reproduce bien esa función sin precisar indebidamente el cargo; las alternativas muestran posibles matices, pero «oficial» es la más equilibrada en español.
- source_word: עִבְדוּ
  english_pob_choice: Serve
  chosen_spanish: ¡Sirvan
  alternatives_spanish:
  - ¡Servid
  - ¡Sean siervos de
  lexicon: HALOT
  rationale: El imperativo plural exige una orden directa. «¡Sirvan!» conserva la energía del mandato y el uso político de עבד en este contexto.
- source_word: אַנְשֵׁי חֲמוֹר אֲבִי שְׁכֶם
  english_pob_choice: the men of Hamor, the father of Shechem
  chosen_spanish: a los hombres de Hamor, padre de Siquem
  alternatives_spanish:
  - a los descendientes de Hamor, padre de Siquem
  - a la gente de Hamor, padre de Siquem
  lexicon: HALOT
  rationale: «Hombres de Hamor» sigue de cerca el hebreo y conserva la alusión genealógica e histórica a Génesis 34. Se añade «padre de Siquem» como aposición para explicitar la relación sin expandir el sentido más allá de lo que el texto permite.
- source_word: וּמַדּוּעַ
  english_pob_choice: But why
  chosen_spanish: ¿Y por qué
  alternatives_spanish:
  - Pero ¿por qué
  - ¿Por qué entonces
  lexicon: HALOT
  rationale: La partícula introduce una nueva objeción o reto. «¿Y por qué…?» mantiene la continuidad discursiva del hebreo; el matiz adversativo queda implícito en el contexto.
- source_word: אֲנָחְנוּ
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  - nosotros, precisamente
  lexicon: HALOT
  rationale: El pronombre explícito aporta énfasis. «Nosotros» lo refleja de manera natural en la pregunta final sin recargar el español.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y la solución del POB en inglés, preservando la ironía retórica, la posible metonimia de «Siquem» y la referencia histórica a Hamor. No se introdujeron revisiones textuales; el pasaje coincide con el estado de alta concordancia del expediente inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «Siquem» como transliteración estándar en español para el nombre propio.
  - Se traduce עבד con «servir» por su valor político de subordinación en este contexto, no como labor servil cotidiana.
  - Se evita «Cristo» y otras terminologías no pertinentes al versículo.
  - La puntuación con comillas angulares y signos de interrogación de apertura sigue la norma tipográfica española.
