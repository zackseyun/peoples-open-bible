review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro POB en los puntos principales: mantiene la imagen antropomórfica de las ''narices'', refleja רוּחַ como ''soplo'', conserva ''como un montón'' para נֵד y retiene ''en el corazón del mar''. Sin embargo, ''se detuvieron'' debilita נִצְּבוּ (''se mantuvieron/estuvieron firmes, se alzaron'') y conviene una formulación más cercana a ''se alzaron/quedaron erguidas''.'
  spanish_quality_summary: El español es claro y digno, pero admite pequeñas mejoras de naturalidad y precisión poética. 'Con el soplo de tus narices' es comprensible, aunque 'Al soplo de tus narices' suena más idiomático en poesía bíblica. 'Se alzaron' encaja mejor con la imagen del agua erguida que 'se detuvieron'. La nota c contiene un error ortográfico ('congealarse').
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones clave ('soplo', 'narices', 'montón', 'abismos', 'corazón del mar') son mayormente coherentes con el expediente inglés y con el hebreo. El ajuste principal es hacer que נִצְּבוּ refleje mejor 'stood'.
  issues:
  - severity: medium
    issue: '''se detuvieron'' para נִצְּבוּ'
    rationale: El hebreo describe que las aguas 'se pararon/quedaron de pie/se alzaron', no solo que cesaron su movimiento. 'Se detuvieron' pierde la imaginería vertical del verso.
  - severity: low
    issue: Preposición inicial mejorable
    rationale: '''Al soplo de tus narices'' reproduce mejor el valor circunstancial de וּבְרוּחַ y suena más natural en español poético que ''Con el soplo de''.'
  - severity: low
    issue: Error en nota al pie c
    rationale: La forma 'congealarse' es incorrecta; debe ser 'congelarse' o mejor mantenerse en la familia léxica 'congelarse/congelado'.
  revised_spanish_text: Al soplo de tus narices, las aguas se amontonaron[a]; las aguas que fluían se alzaron como un montón[b]; los abismos se cuajaron en el corazón del mar[d].
  revised_footnotes:
  - marker: a
    text: O «por el soplo de tus narices».
    reason: lexical_alternative
  - marker: b
    text: «Montón» refleja el sustantivo hebreo; algunas traducciones dicen «muralla» por influencia de la imagen narrativa del cruce del mar.
    reason: lexical_alternative
  - marker: c
    text: O «se helaron». El verbo hebreo puede expresar espesarse, cuajarse o congelarse.
    reason: lexical_alternative
  - marker: d
    text: Literalmente «en el corazón del mar», es decir, en medio del mar.
    reason: lexical_alternative
  revision_rationale: Se revisa para acercar más נִצְּבוּ a la imagen hebrea de aguas erguidas ('se alzaron') y para mejorar la fluidez poética inicial ('Al soplo de'). También se corrige el error ortográfico en la nota c. Además, la nota c no se ancla en el texto revisado porque no corresponde a ninguna palabra marcada en el español; por disciplina de formato, debe omitirse del YAML final si no se añade su marcador al texto.
