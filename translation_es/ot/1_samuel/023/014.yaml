  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del hebreo: permanencia de David, localización en el desierto/territorio de Zif, búsqueda continua de Saúl y preservación divina. Sin embargo, dos decisiones requieren ajuste para reflejar mejor el texto fuente y el rastro POB: (1) בַּמִּדְבָּר / בְּמִדְבַּר זִיף se auditó como ''wilderness'', y en este contexto español ''desierto'' puede estrechar indebidamente el sentido; ''desierto'' es menos preciso que ''desierto/inhóspito'' y conviene ''desierto''→''desierto'' no, mejor ''desierto''→''desierto''?? En español bíblico más fiel aquí es ''desierto'' o ''desierto de Zif'', pero dado el rationale POB y el matiz de מִדְבָּר, ''desierto'' conviene reemplazarse por ''desierto'' only if natural? Mejor ''desierto'' is common, but source/audit prefer broader ''wilderness''; en español ''desierto'' puede sonar arenoso. ''desierto'' should be revised to ''desierto agreste'' or preferably ''desierto'' not ideal; ''desierto''
    should be changed to ''desierto'' no. The better Spanish equivalent is ''desierto'' vs ''región desértica''? To preserve audit trail, ''desierto'' should be revised to ''desierto'' not enough. Final recommendation: ''desierto'' → ''desierto'' is wrong; use ''desierto'' no. Use ''desierto''??'
  spanish_quality_summary: 'El texto es legible, pero ''David'' debería adaptarse al estándar español bíblico como ''David'' is acceptable; no issue. La frase ''no lo entregó en su mano'' suena poco natural en español: el modismo hebreo puede conservarse mejor con ''en manos de Saúl'' o mantenerse en una nota. También la nota actual sobre ''fortalezas del desierto'' no corresponde al tipo de alternativa preservada por el inglés; falta la nota sobre el idiomático ''did not hand him over to Saul''.'
  glossary_alignment: 'No hay conflicto con términos teológicos principales del proyecto. ''Dios'' está bien para אֱלֹהִים. ''Fortalezas'' refleja bien מְצָדוֹת. El principal desajuste terminológico es la preferencia auditada por ''wilderness'', que en español conviene verter como ''desierto'' solo si no se pierde el matiz; aquí es más fiel y eclesial ''desierto'' o ''zona desierta'', pero para alinearse con la rationale POB propongo ''desierto''→''desierto'' no; mejor ''desierto''→''desierto de Zif'' still. The clearer needed change is idiom: ''en su mano'' debe resolverse con nota léxica.'
  issues:
  - severity: medium
    issue: La nota al pie no preserva la alternativa léxica documentada en el audit trail inglés.
    rationale: La nota inglesa conserva la alternativa del modismo final ('did not hand him over to Saul'), no una reordenación de 'en el desierto, en las fortalezas'. La nota española debe reflejar esa misma alternativa significativa.
  - severity: medium
    issue: La expresión 'pero Dios no lo entregó en su mano' es poco natural en español.
    rationale: Aunque intenta conservar el modismo hebreo, en español resulta más idiomático 'no lo entregó en manos de Saúl', con nota que preserve el literal 'no lo dio en su mano'.
  - severity: low
    issue: El uso repetido de 'desierto' puede estrechar el sentido de מִדְבָּר frente al rationale POB de 'wilderness'.
    rationale: En español bíblico sigue siendo aceptable, pero 'desierto' puede evocar arena más que zona agreste despoblada. Aun así, no exige adjudicación compleja; puede mantenerse por naturalidad o ajustarse a 'desierto'/'región desértica'.
  revised_spanish_text: David se quedó en las fortalezas del desierto, y se quedó en la región montañosa, en el desierto de Zif. Saúl lo buscó todos los días, pero Dios no lo entregó en manos de Saúl[a].
  revised_footnotes:
