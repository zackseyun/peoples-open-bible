translation:
  language: es
  text: Si les dice que hagan guerra unos contra otros, lo hacen; pero si los envía contra los enemigos, van y derriban[a] los montes, las murallas y las torres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «destruyen» o «demuelen» para «derriban»; el verbo griego indica una acción violenta contra terrenos y fortificaciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν εἴπῃ
  english_pob_choice: If she tells
  chosen_spanish: Si le dice
  alternatives_spanish:
  - Si les dice
  - Si les ordena
  - Si ella dice
  lexicon: LSJ
  rationale: El griego introduce una condición general con verbo de habla; en español, «le dice» conserva la sencillez del enunciado sin volverlo más formal de lo que exige el texto. Se evita forzar «ordena» porque el griego no lo explicita.
- source_word: ποιῆσαι πόλεμον
  english_pob_choice: to make war
  chosen_spanish: que hagan guerra
  alternatives_spanish:
  - que hagan la guerra
  - que guerreen
  - que emprendan guerra
  lexicon: LSJ
  rationale: «Hacer guerra» refleja de cerca la locución griega y mantiene el valor de acción bélica concreta. Se prefirió la forma verbal subordinada para que la frase fluya naturalmente en español.
- source_word: ἕτερος πρὸς τὸν ἕτερον
  english_pob_choice: one against another
  chosen_spanish: unos contra otros
  alternatives_spanish:
  - el uno contra el otro
  - cada uno contra el otro
  lexicon: LSJ
  rationale: La construcción recíproca se expresa de manera natural con «unos contra otros». Conserva el sentido distributivo y el paralelismo del griego.
- source_word: ποιοῦσιν
  english_pob_choice: they do it
  chosen_spanish: lo hacen
  alternatives_spanish:
  - lo ejecutan
  - lo llevan a cabo
  lexicon: LSJ
  rationale: El verbo es resumptivo y se refiere a la orden anterior; «lo hacen» es la forma más directa y fiel al carácter general del griego.
- source_word: ἐξαποστείλῃ
  english_pob_choice: sends them out
  chosen_spanish: los envía
  alternatives_spanish:
  - los envía fuera
  - los despacha
  - los manda
  lexicon: LSJ
  rationale: El compuesto griego puede sugerir envío hacia fuera, pero en español «los envía» comunica bien la acción sin añadir torpeza estilística. El contexto militar ya provee la dirección.
- source_word: πρὸς τοὺς πολεμίους
  english_pob_choice: against the enemies
  chosen_spanish: contra los enemigos
  alternatives_spanish:
  - hacia los enemigos
  - para enfrentarse a los enemigos
  lexicon: LSJ
  rationale: «Contra» reproduce mejor el valor hostil de πρὸς en contexto militar que una mera dirección neutral.
- source_word: βαδίζουσιν
  english_pob_choice: they go
  chosen_spanish: van
  alternatives_spanish:
  - marchan
  - se dirigen
  lexicon: LSJ
  rationale: «Van» es el equivalente más natural y amplio para βαδίζουσιν. No se introduce «marchan» porque el griego no exige matiz técnico militar.
- source_word: κατεργάζονται
  english_pob_choice: tear down
  chosen_spanish: derriban
  alternatives_spanish:
  - destruyen
  - derriban por completo
  - demuelen
  lexicon: LSJ
  rationale: La serie de objetos («montes, murallas, torres») pide una acción violenta y concreta. «Derriban» conserva la fuerza del verbo sin expandirlo a un significado demasiado general como «destruyen».
- source_word: τὰ ὄρη
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  lexicon: LSJ
  rationale: Se eligió «montes» porque en español puede sonar más sobrio y frecuente en registro bíblico, sin perder el sentido literal de ὄρη.
- source_word: τὰ τείχη
  english_pob_choice: the walls
  chosen_spanish: las murallas
  alternatives_spanish:
  - los muros
  - las paredes
  lexicon: LSJ
  rationale: En contexto de asedio, «murallas» comunica mejor que «muros» la defensa fortificada que expresa τείχη.
- source_word: τοὺς πύργους
  english_pob_choice: the towers
  chosen_spanish: las torres
  alternatives_spanish:
  - los torreones
  - las atalayas
  lexicon: LSJ
  rationale: «Torres» es la equivalencia directa y suficientemente precisa para πύργους en un contexto de fortificación.
theological_decisions:
- issue: Referente del sujeto femenino implícito
  english_pob_reading: Use 'she' throughout, referring to the woman described in the surrounding argument about the power of women.
  chosen_spanish_reading: Mantener un sujeto pronominal femenino implícito en español mediante «le dice / los envía», que remite a la mujer del contexto.
  alternative_spanish_readings:
  - la mujer le dice
  - si ella les dice
  - si la mujer los envía
  rationale: El texto griego no repite el sujeto, pero el contexto inmediato lo provee. En español, una formulación con pronombres evita redundancia y mantiene la referencia femenina sin sobreespecificarla.
  doctrine_reference: Respeto del sentido llano del pasaje y de su cohesión contextual, sin introducir elementos ajenos al argumento.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; se siguió el estado auditado vigente. Se atendió además la observación de revisión cruzada, ajustando el español para que el valor militar de los verbos y la referencia femenina contextual quedaran claros sin sobretraducción.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este verso no contiene el nombre divino.
  - 'Se mantiene un registro bíblico sobrio y contemporáneo: «montes», «murallas» y «torres» siguen el campo fortificado del griego.'
  - La secuencia verbal en español imita la cadencia condicional del original sin copiar la sintaxis griega de forma rígida.
