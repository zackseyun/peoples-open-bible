translation:
  language: es
  text: Y sus puertas lamentarán y harán duelo, y ella será despojada[a] y se sentará en el suelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vaciada» o «dejada al descubierto». El verbo hebreo puede comunicar ser vaciado o quedar despojado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָנ֥וּ
  english_pob_choice: will lament
  chosen_spanish: lamentarán
  alternatives_spanish:
  - gemirán
  - se lamentarán
  lexicon: HALOT
  rationale: La forma expresa lamento audible en paralelo con el verbo siguiente; «lamentarán» conserva el tono poético y la personificación de las puertas de la ciudad.
- source_word: וְאָבְל֖וּ
  english_pob_choice: and mourn
  chosen_spanish: y harán duelo
  alternatives_spanish:
  - y llorarán
  - y se entristecerán
  lexicon: HALOT
  rationale: אָבל suele referirse al duelo/mourning por pérdida o desastre. «Harán duelo» distingue este verbo de «lamentarán» sin fusionarlos.
- source_word: פְּתָחֶ֑י/הָ
  english_pob_choice: her gates
  chosen_spanish: sus puertas
  alternatives_spanish:
  - sus entradas
  - sus portones
  lexicon: HALOT
  rationale: En el marco de la ciudad personificada, «puertas» es la imagen urbana natural y fiel al uso del término en este contexto.
- source_word: וְנִקָּ֖תָה
  english_pob_choice: stripped bare
  chosen_spanish: será despojada hasta quedar vacía
  alternatives_spanish:
  - será vaciada
  - quedará despojada
  - será dejada vacía
  lexicon: HALOT
  rationale: El nifal de נקה aquí comunica ser vaciada o dejada desnuda. La traducción elegida intenta conservar la fuerza de despojo/emptiness sin perder la imagen concreta que el inglés POB dejó abierta con su nota.
- source_word: לָ/אָ֥רֶץ
  english_pob_choice: on the ground
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el suelo
  - sobre la tierra
  lexicon: HALOT
  rationale: Con ישב, el valor es postura humillada. «En la tierra» reproduce el hebreo con naturalidad en español y deja ver el contraste de abatimiento.
- source_word: תֵּשֵֽׁב
  english_pob_choice: she will sit
  chosen_spanish: se sentará
  alternatives_spanish:
  - habitará
  - permanecerá sentada
  lexicon: HALOT
  rationale: ישב aquí describe la acción concreta de sentarse, no simplemente residir. «Se sentará» mantiene la imagen de humillación corporal.
theological_decisions:
- issue: Sujeto femenino personificado
  english_pob_reading: The feminine subject is personified daughter Zion/Jerusalem continuing from the surrounding context.
  chosen_spanish_reading: El sujeto femenino se entiende como la personificación de la hija de Sion/Jerusalén en continuidad con el contexto inmediato.
  alternative_spanish_readings:
  - una figura urbana femenina genérica
  - la ciudad como sujeto poético sin especificar
  rationale: La traducción con «sus» y «se sentará» preserva la personificación sin añadir más especificación que la que el contexto sostiene. No se explicita «Sion» en el texto por fidelidad al alcance del versículo.
  doctrine_reference: Isaías 3:24–26; personificación poética de Jerusalén
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que reordenó la cláusula final para hacer explícito el sujeto antes de ambos verbos. En español se reflejó con «y será despojada hasta quedar vacía, y se sentará en la tierra», manteniendo el orden natural y la progresión del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se optó por un registro poético pero claro, evitando arcaísmos innecesarios.
  - «Puertas» conserva la personificación urbana sin introducir términos interpretativos como «entradas» salvo necesidad contextual.
