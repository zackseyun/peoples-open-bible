translation:
  language: es
  text: 'Y Demetrio envió a Jonatán, diciendo: «No solo haré estas cosas por ti y por tu nación, sino que te honraré grandemente[a] a ti y a tu nación, si encuentro una oportunidad favorable».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «te honraré con honor/gloria», una expresión enfática que significa «te honraré grandemente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: El aoristo de ἀποστέλλω en este contexto epistolar se expresa naturalmente en español como «envió»; conserva el acto de remitir un mensaje sin añadir matices innecesarios.
- source_word: πρὸς Ἰωνάθαν
  english_pob_choice: to Jonathan
  chosen_spanish: a Jonatán
  alternatives_spanish:
  - para Jonatán
  - hacia Jonatán
  lexicon: LSJ
  rationale: Con πρός + acusativo aquí se indica el destinatario del mensaje; «a Jonatán» es la forma más natural y fiel en español.
- source_word: Οὐ μόνον ταῦτα ποιήσω
  english_pob_choice: Not only will I do these things
  chosen_spanish: No solo haré estas cosas
  alternatives_spanish:
  - No solo voy a hacer estas cosas
  - No solamente haré estas cosas
  lexicon: LSJ
  rationale: La construcción negativa con intensificación se conserva mejor con un orden natural en español que mantiene el énfasis de la promesa.
- source_word: τῷ ἔθνει σου
  english_pob_choice: your nation
  chosen_spanish: tu nación
  alternatives_spanish:
  - tu pueblo
  - tu gente
  lexicon: LSJ
  rationale: ἔθνος en 1 Macabeos suele referirse a la comunidad nacional/política; «nación» preserva ese alcance mejor que «pueblo».
- source_word: ἀλλʼ ἢ δόξῃ δοξάσω
  english_pob_choice: I will greatly honor
  chosen_spanish: te honraré grandemente
  alternatives_spanish:
  - te glorificaré grandemente
  - te honraré con gran honor
  lexicon: LSJ
  rationale: La expresión griega es enfática y casi redundante; en español «honraré grandemente» comunica la intensificación sin sonar forzado. Se conserva el verbo «honrar» porque el contexto es de prestigio y favor, no de alabanza cultual.
- source_word: σε καὶ τὸ ἔθνος σου
  english_pob_choice: you and your nation
  chosen_spanish: a ti y a tu nación
  alternatives_spanish:
  - a ti y a tu pueblo
  - a vos y a tu nación
  lexicon: LSJ
  rationale: Se mantiene el paralelismo entre la persona y la colectividad, reflejando el doble objeto del verbo.
- source_word: ἐὰν εὐκαιρίας τύχω
  english_pob_choice: if I find a suitable opportunity
  chosen_spanish: si encuentro una oportunidad favorable
  alternatives_spanish:
  - si tengo ocasión propicia
  - si hallo tiempo oportuno
  lexicon: LSJ
  rationale: τύχω con genitivo expresa obtener o dar con algo; εὐκαιρία es una ocasión favorable. «Oportunidad favorable» reproduce bien ambas ideas en español contemporáneo.
theological_decisions:
- issue: El sentido de δόξα/δοξάζω en una promesa política
  english_pob_reading: I will greatly honor
  chosen_spanish_reading: te honraré grandemente
  alternative_spanish_readings:
  - te glorificaré grandemente
  - te daré gran honor
  rationale: Aunque δόξα puede relacionarse con «gloria», aquí el marco es diplomático y político. El POB inglés decidió «greatly honor», y en español «honraré grandemente» conserva esa fuerza sin introducir un matiz litúrgico ajeno.
  doctrine_reference: Uso contextual del léxico; no implica doxología ni lenguaje de adoración.
translation_notes:
  revision_awareness: El texto sigue la lectura consolidada del POB inglés, sin cambios de sentido respecto del audit trail disponible. Se mantuvo la equivalencia óptima para conservar el paralelismo y la intensidad del griego.
  spanish_consistency_notes:
  - Se usa «Jonatán» para el nombre propio, en forma castellana estándar.
  - Se traduce ἔθνος como «nación» de manera consistente con el valor político-colectivo que documenta el POB inglés.
  - Se evita «glorificar» en el cuerpo principal para no desplazar el sentido hacia alabanza religiosa; la nota recoge la alternativa literal.
  - La puntuación reproduce una sola cita directa con estilo publicable y claro.
