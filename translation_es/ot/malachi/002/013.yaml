    text: Nombre divino traducido aquí como transliteración de יְהוָה, siguiendo el criterio del proyecto para conservar el nombre personal de Dios.
    reason: theological_note
  - marker: b
    text: O «la ofrenda vegetal». El hebreo מִנְחָה puede designar una ofrenda de cereal o, más ampliamente, una ofrenda.
    reason: lexical_alternative
  revision_rationale: 'Se corrigió el error de persona/número en מִיֶּדְכֶם con «de sus manos». También se mejoró la naturalidad y precisión de la cláusula final: «presta atención a» refleja bien el valor contextual de פנה אל, y «la acepta con agrado de sus manos» comunica de manera más idiomática la aceptación cultual. Además, se suavizó el arranque a «Y esto segundo hacen» para un español más natural sin perder la fuerza ordinal.'
