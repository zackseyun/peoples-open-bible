translation:
  language: es
  text: 'Entonces se fue y se sentó enfrente de él, a cierta distancia, como a un tiro de arco, porque dijo: «No quiero ver la muerte del muchacho[a]». Y se sentó enfrente de él, alzó su voz y lloró.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No quiero ver al muchacho morir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנֶּגֶד
  english_pob_choice: opposite him / at a distance
  chosen_spanish: de frente
  alternatives_spanish:
  - enfrente
  - opuesta a él
  - a distancia
  lexicon: HALOT
  rationale: El hebreo indica estar frente a alguien o algo, con la idea de separación espacial. En español, «de frente» conserva la relación de oposición visual y espacial sin sonar forzado. Mantengo además «a distancia» y «como a un tiro de arco» para reflejar el segundo y tercer miembro de la frase.
- source_word: הַרְחֵק
  english_pob_choice: at a distance
  chosen_spanish: a distancia
  alternatives_spanish:
  - lejos
  - muy lejos
  - a lo lejos
  lexicon: HALOT
  rationale: La forma intensifica la lejanía. «A distancia» es natural en español y conserva el matiz sin añadir exageración.
- source_word: כִּמְטַחֲוֵי קֶשֶׁת
  english_pob_choice: about a bowshot away
  chosen_spanish: como a un tiro de arco
  alternatives_spanish:
  - a la distancia de un tiro de arco
  - como a un alcance de arco
  - a un tiro de flecha
  lexicon: HALOT
  rationale: Es un modismo de distancia aproximada. «Tiro de arco» comunica la imagen de un alcance lanzado con arco y evita un calco pesado; «de arco» mantiene el referente original sin reemplazarlo por una flecha distinta.
- source_word: הַיָּלֶד
  english_pob_choice: the boy
  chosen_spanish: el muchacho
  alternatives_spanish:
  - el niño
  - el chico
  - el joven
  lexicon: HALOT
  rationale: «Muchacho» recoge la referencia a un hijo/joven sin infantilizarlo demasiado. En este contexto emocional, es más flexible que «niño» y más claro que «joven».
- source_word: אַל אֶרְאֶה בְּמוֹת הַיָּלֶד
  english_pob_choice: Let me not look on the death of the boy
  chosen_spanish: No quiero ver la muerte del muchacho
  alternatives_spanish:
  - No quiero ver morir al muchacho
  - Que no vea la muerte del muchacho
  - No me dejes ver la muerte del muchacho
  lexicon: HALOT
  rationale: El hebreo expresa una negativa volitiva ante la visión de la muerte. «No quiero ver la muerte del muchacho» preserva el tono directo y el sustantivo «muerte», que la POB inglesa retuvo. La alternativa «ver morir» es más idiomática, pero desplaza un poco la forma nominal del original.
- source_word: וַתִּשָּׂא אֶת קֹלָהּ
  english_pob_choice: lifted up her voice
  chosen_spanish: alzó su voz
  alternatives_spanish:
  - levantó la voz
  - levantó su voz
  - clamó
  lexicon: HALOT
  rationale: Es un modismo hebreo de lamento audible. «Alzó su voz» preserva la imagen idiomática sin volverla demasiado interpretativa. Conserva también el paralelismo con el llanto final.
- source_word: וַתֵּבְךְּ
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - lloraba
  - sollozó
  - se puso a llorar
  lexicon: HALOT
  rationale: «Lloró» es la equivalencia natural y digna para el verbo final de duelo. «Sollozó» añade intensidad que no está explícita en el hebreo.
theological_decisions:
- issue: No ocultar la relación espacial repetida en el versículo
  english_pob_reading: Then she went and sat down opposite him... So she sat opposite him
  chosen_spanish_reading: Entonces se fue y se sentó de frente... Y se sentó de frente
  alternative_spanish_readings:
  - entonces se fue y se sentó sola... y se sentó sola
  - entonces se fue y se sentó enfrente de él... y se sentó enfrente de él
  rationale: El hebreo repite מִנֶּגֶד, y la revisión inglesa corrigió una expansión previa para preservar esa repetición. En español conservo esa misma recurrencia para no diluir el énfasis narrativo en la separación física y emocional.
  doctrine_reference: No aplica; decisión de fidelidad textual y narrativa.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión importante: se eliminó una expansión interpretativa (''by herself'') y se restableció la repetición de ''opposite him'' para reflejar מִנֶּגֶד con mayor precisión. La versión española sigue esa corrección y mantiene el modismo de distancia (''como a un tiro de arco'') sin suavizar la escena.'
  spanish_consistency_notes:
  - He usado «Yahvé» no porque aparezca en este versículo, sino como norma del proyecto cuando corresponda; aquí no aplica.
  - He evitado «Señor» o lenguaje litúrgico no presente en el hebreo.
  - 'Mantengo un registro narrativo sobrio, con vocabulario común pero digno: «muchacho», «alzó su voz», «lloró».'
  - La puntuación reproduce una pausa natural antes de la cita directa y conserva el paralelismo del verso.
