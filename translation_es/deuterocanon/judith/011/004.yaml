translation:
  language: es
  text: Toma valor; vivirás esta noche y también después. Porque no hay nadie que te trate injustamente; más bien, te tratará bien, como se hace con los siervos[a] de mi señor el rey Nabucodonosor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'esclavos'. El griego δοῦλοι puede significar 'siervos' o 'esclavos' según el contexto; aquí se prefiere 'siervos' por el contexto de servicio en la corte real, aunque la otra posibilidad sigue siendo léxicamente válida.
    reason: lexical_alternative
lexical_decisions:
- source_word: θάρσει
  english_pob_choice: Take courage
  chosen_spanish: Toma valor
  alternatives_spanish:
  - Ten ánimo
  - Toma coraje
  - Cobrad ánimo
  lexicon: LSJ
  rationale: El imperativo de θαρσέω pide una exhortación de ánimo y confianza. 'Toma valor' transmite bien el impulso de aliento en español moderno y evita el tono algo arcaico de otras opciones.
- source_word: ἐν τῇ νυκτὶ ταύτῃ
  english_pob_choice: through this night
  chosen_spanish: esta noche
  alternatives_spanish:
  - durante esta noche
  - en esta noche
  - a lo largo de esta noche
  lexicon: LSJ
  rationale: Con ζήσῃ, el sentido es sobrevivir la noche presente. En español, 'esta noche' unido a 'vivirás' comunica naturalmente esa supervivencia inmediata sin añadir una paráfrasis excesiva.
- source_word: ζήσῃ καὶ εἰς τὸ λοιπόν
  english_pob_choice: you will live through this night and beyond
  chosen_spanish: vivirás esta noche y también después
  alternatives_spanish:
  - vivirás esta noche y en adelante
  - sobrevivirás esta noche y después
  - vivirás esta noche y para lo que queda
  lexicon: LSJ
  rationale: La expresión combina la supervivencia inmediata con la continuación posterior. 'Y también después' mantiene la amplitud de εἰς τὸ λοιπόν de manera clara y breve en español.
- source_word: ἀδικήσει
  english_pob_choice: wrong
  chosen_spanish: te haga injusticia
  alternatives_spanish:
  - te haga daño
  - te agraviare
  - te maltrate
  lexicon: LSJ
  rationale: ἀδικέω puede significar obrar injustamente o hacer agravio. 'Te haga injusticia' conserva esa fuerza moral-jurídica mejor que un simple 'dañar'.
- source_word: ἀλλʼ εὖ σε ποιήσει
  english_pob_choice: rather, he will treat you well
  chosen_spanish: antes, te tratará bien
  alternatives_spanish:
  - sino que te tratará bien
  - más bien, te hará bien
  - al contrario, te beneficiará
  lexicon: LSJ
  rationale: '''Antes'' en español bíblico-natural funciona como contraste correctivo equivalente a ἀλλά; ''te tratará bien'' comunica con naturalidad la acción benévola del sujeto.'
- source_word: καθὰ γίνεται
  english_pob_choice: as is done
  chosen_spanish: como se hace
  alternatives_spanish:
  - como sucede
  - como se acostumbra
  - según se hace
  lexicon: LSJ
  rationale: La frase introduce un uso habitual. 'Como se hace' preserva el valor general e impersonal del griego sin cargarlo de especificaciones innecesarias.
- source_word: τοῖς δούλοις
  english_pob_choice: the servants
  chosen_spanish: los esclavos
  alternatives_spanish:
  - los siervos
  - los servidores
  lexicon: LSJ
  rationale: En POB, δοῦλος suele rendirse 'esclavo' cuando la fuerza léxica debe mantenerse. Aquí el contexto cortesano admite 'esclavos' como alternativa conservadora, y además el texto griego sí usa el término de esclavitud; el español debe conservar esa tensión aun cuando el marco sea de servicio real.
- source_word: τοῦ κυρίου μου βασιλέως Ναβουχοδονόσορ
  english_pob_choice: of my lord King Nebuchadnezzar
  chosen_spanish: de mi señor el rey Nabucodonosor
  alternatives_spanish:
  - de mi señor, el rey Nabucodonosor
  - de mi señor rey Nabucodonosor
  - de mi soberano, el rey Nabucodonosor
  lexicon: LSJ
  rationale: κύριος aquí es un título cortesano de respeto, no una referencia divina. 'Mi señor el rey Nabucodonosor' preserva el tono deferencial y la estructura del genitivo griego.
theological_decisions:
- issue: δοῦλοι en un contexto de corte real
  english_pob_reading: servants
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: Aunque el contexto describe el trato en la casa real, el término griego δοῦλοι tiene fuerza de esclavitud y el proyecto prioriza no suavizarlo sin base. En español, 'esclavos' mantiene esa tensión semántica y evita borrar el contraste que el original sí ofrece.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; context-sensitive but force-preserving rendering'
translation_notes:
  revision_awareness: Se revisó el audit trail inglés y la lectura griega de Swete. La versión inglesa optó por 'servants' para δοῦλοι por el contexto cortesano; esta propuesta decide retener 'esclavos' para no suavizar la fuerza léxica del término, siguiendo la instrucción del proyecto de no borrar la tensión documentada. El resto de la línea se alinea estrechamente con el sentido griego y con las decisiones léxicas del POB inglés, ajustadas a español natural.
  spanish_consistency_notes:
  - Se usa 'Toma valor' como equivalente idiomático de θάρσει.
  - Se evita 'SEÑOR' para κύριος porque aquí es título humano cortesano.
  - '''Antes'' funciona como contraste natural para ἀλλά en español bíblico actual.'
  - Se conserva la tensión entre el marco cortesano y δοῦλοι mediante 'esclavos'.
  - '''Nabucodonosor'' se mantiene sin transliteración adicional para conformidad bíblica en español.'
