revisions:
- from: El diez del séptimo mes[a], habrá para ustedes una santa convocatoria; se afligirán ustedes mismos, y no harán ninguna clase de trabajo.
  to: En el décimo día de este séptimo mes, habrá para ustedes una santa convocatoria; se afligirán[a], y no harán ninguna clase de trabajo.
  rationale: Se corrige la fecha para reflejar con fidelidad y naturalidad el valor calendárico del hebreo y se restituye 'este'. Se aligera el reflexivo redundante en español. La nota se reubica en la expresión ritual clave, conforme al rastro auditado inglés y a la importancia teológica/lexical de וְעִנִּיתֶם אֶת נַפְשֹׁתֵיכֶם.
