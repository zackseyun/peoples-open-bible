base_translation:
  language: en
  yaml_path: translation/deuterocanon/4_maccabees/012/004.yaml
  text: You see the outcome of your brothers’ madness[a]; for because of disobedience they have been tortured and have died. But you, if you do not obey, will yourself also die before your time[c][b], after being miserably tortured.
  footnotes:
  - marker: a
    text: Or 'the end' or 'the result' of your brothers' madness.
    reason: lexical_alternative
  - marker: b
    text: The Greek verb for 'have been tortured' can more specifically refer to being stretched on the rack.
    reason: cultural_note
  - marker: c
    text: Or 'if you are not persuaded'; here the sense is practical compliance, hence 'obey.'
    reason: lexical_alternative
