translation:
  language: es
  text: 'Pero, para que no llegara a ser odiado por todos a causa de su hostilidad, emitió un decreto por escrito: «Pero si algunos de ellos eligen conducirse entre los iniciados en los ritos[a], a estos los hace ciudadanos con igualdad de derechos con los alejandrinos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre los iniciados en los misterios». La frase griega usa lenguaje de iniciación cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα δὲ μὴ
  english_pob_choice: But so that ... not
  chosen_spanish: Pero, para que no...
  alternatives_spanish:
  - Y para que no...
  - Con el fin de que no...
  lexicon: LSJ
  rationale: Conserva la fuerza final de ἵνα y el contraste de δέ con un español natural y publicable.
- source_word: τοῖς πᾶσιν
  english_pob_choice: to everyone
  chosen_spanish: por todos
  alternatives_spanish:
  - ante todos
  - por toda la gente
  lexicon: LSJ
  rationale: 'La relación dativa con ἐχθόμενος/ἐχθαίνηται se expresa de manera natural como una reacción social universal: ''por todos''.'
- source_word: ἐχθόμενος ... ἐχθαίνηται
  english_pob_choice: because of his hostility ... become hated
  chosen_spanish: se volviera aborrecido ... a causa de su hostilidad
  alternatives_spanish:
  - fuera odiado ... por su hostilidad
  - se hiciera detestable ... por su enemistad
  lexicon: LSJ
  rationale: Se mantiene el juego de la hostilidad que produce ser aborrecido, sin suavizar la tensión léxica del griego.
- source_word: ὑπέγραψεν
  english_pob_choice: he issued a written decree
  chosen_spanish: redactó un decreto escrito
  alternatives_spanish:
  - expidió un decreto escrito
  - emitió un decreto escrito
  lexicon: LSJ
  rationale: El verbo introduce una orden oficial por escrito; 'redactó' y 'decreto escrito' preservan el registro administrativo.
- source_word: Ἐὰν δέ τινες ἐξ αὐτῶν προαιρῶνται
  english_pob_choice: But if any of them choose
  chosen_spanish: Pero si algunos de ellos prefieren
  alternatives_spanish:
  - Pero si algunos de ellos eligen
  - Pero si algunos de ellos deciden
  lexicon: LSJ
  rationale: προαιρῶνται implica elección deliberada; 'prefieren' conserva la noción de inclinación elegida, aunque 'eligen' también sería posible.
- source_word: ἐν τοῖς κατὰ τελετὰς μεμυημένοις
  english_pob_choice: among those initiated in the rites
  chosen_spanish: entre los iniciados en los ritos
  alternatives_spanish:
  - entre los iniciados en los misterios
  - entre quienes han sido iniciados en los ritos
  lexicon: LSJ
  rationale: τελεταί y μεμυημένοις conservan un lenguaje cultual de iniciación; 'ritos' evita sobrecargar con un tecnicismo más fuerte en el cuerpo principal.
- source_word: ἀναστρέφεσθαι
  english_pob_choice: to conduct themselves
  chosen_spanish: comportarse
  alternatives_spanish:
  - vivir
  - moverse
  lexicon: LSJ
  rationale: En este contexto de asociación social y ritual, 'comportarse' comunica la idea de modo de vida sin añadir paráfrasis.
- source_word: τούτους ἰσοπολίτας Ἀλεξανδρεῦσι ποιεῖ
  english_pob_choice: he makes these equal citizens with the Alexandrians
  chosen_spanish: a estos los hace ciudadanos iguales a los alejandrinos
  alternatives_spanish:
  - a estos les concede ciudadanía igual a la de los alejandrinos
  - a estos los convierte en co-ciudadanos de los alejandrinos
  lexicon: LSJ
  rationale: ἰσοπολίτας expresa igualdad cívica/citadina; 'ciudadanos iguales' preserva la fuerza legal sin introducir un verbo de concesión que el griego no explicita.
theological_decisions:
- issue: Lenguaje de iniciación cultual
  english_pob_reading: among those initiated in the rites
  chosen_spanish_reading: entre los iniciados en los ritos
  alternative_spanish_readings:
  - entre los iniciados en los misterios
  - entre los que han sido iniciados en ceremonias
  rationale: El griego usa τελεταί y μεμυημένοις, un lenguaje de iniciación cultual. Se mantiene 'ritos' en el texto principal para no imponer una lectura técnica más específica que la que el pasaje exige, pero se deja abierta la alternativa de 'misterios'.
  doctrine_reference: Lexical and cultic context only; no doctrinal claim beyond the source's social-religious setting.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que afinó ὑπέγραψεν como 'issued a written decree' y que clarificó ἐχθόμενος como hostilidad que provoca ser odiado/aborrecido; por eso el español usa un registro administrativo ('decreto escrito') y una relación causal explícita ('a causa de su hostilidad'). También se preservó la oscilación cultual de τελεταί/μεμυημένοις sin forzar 'misterios' en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera de este versículo porque no aparece el tetragrámaton ni κύριος con valor de nombre divino.
  - Se usó 'ciudadanos iguales' para ἰσοπολίτας, manteniendo la igualdad cívica sin introducir una terminología eclesiástica.
  - Se evitó 'Cristo', 'Señor' o vocabulario confesional ajeno al contexto histórico-social del pasaje.
  - La puntuación reproduce el flujo de decreto citado, con dos niveles de discurso claramente marcados.
