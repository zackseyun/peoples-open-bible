translation:
  language: es
  text: 'Y cuando dice[b]: «He encontrado reposo», ahora comerá de sus bienes[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Y ahora comeré de mis bienes». La cláusula puede entenderse como continuación del habla en primera persona; el texto principal la vierte como narración para mayor fluidez.'
    reason: alternative_reading
  - marker: b
    text: 'El paralelo griego difiere sustancialmente: «La bendición de Yahvé está en la recompensa del piadoso, y en una hora rápida su bendición hace florecer». El hebreo y el griego parecen reflejar formas textuales distintas en este punto.'
    reason: textual_variant
lexical_decisions:
- source_word: וּבְעֵת / εὐλογία Κυρίου (temporal frame in Hebrew vs. blessing statement in Greek)
  english_pob_choice: And at the time he says, “I have found rest,” now he will eat from his good things.
  chosen_spanish: Y cuando dice
  alternatives_spanish:
  - Y en el tiempo cuando
  - Y al tiempo que dice
  lexicon: HALOT; Swete LXX 1909
  rationale: El hebreo marca un momento temporal con וּבְעֵת, y el contexto narrativo permite una traducción natural con ‘cuando’. No se sigue la forma griega, porque aquí el texto base hebreo y la POB inglesa dan prioridad al dicho del hombre y no a la paráfrasis de bendición/prosperidad del LXX.
- source_word: יֹאמַר
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dirá
  - dice él
  lexicon: HALOT
  rationale: El yiqtol hebreo puede funcionar como presente vividizante en este contexto. ‘Dice’ conserva ese valor y suena natural en español, manteniendo la escena de autoconfianza inmediata.
- source_word: מָצָאתִי נַחַת
  english_pob_choice: I have found rest
  chosen_spanish: He encontrado reposo
  alternatives_spanish:
  - He hallado descanso
  - He encontrado paz
  lexicon: HALOT
  rationale: ‘Reposo’ transmite bien נַחַת como estado de calma y seguridad, sin sobrecargarlo con ‘paz’, que podría desplazar el sentido hacia un matiz más espiritual del que exige el hebreo.
- source_word: וְעַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - y ahora
  - entonces ahora
  lexicon: HALOT
  rationale: Se conserva el adverbio directo ‘ahora’, que en español expresa el giro consecuente sin introducir una coordinación pesada ni duplicar la idea con ‘entonces’.
- source_word: אֹכַל מִטּוֹבָתִי
  english_pob_choice: he will eat from his good things
  chosen_spanish: comerá de sus bienes
  alternatives_spanish:
  - comeré de mis bienes
  - comerá de sus cosas buenas
  - comerá de su prosperidad
  lexicon: HALOT
  rationale: Aunque la vocalización masorética sugiere primera persona, la POB inglesa decidió por una lectura narrativa de tercera persona para el sentido global. En español, ‘bienes’ comunica posesiones/prosperidad de manera idiomática; ‘comer de’ conserva la imagen concreta del texto.
theological_decisions:
- issue: Tensión textual entre el hebreo y el griego
  english_pob_reading: The Greek parallel differs substantially; the Hebrew and Greek appear to reflect different textual forms at this point.
  chosen_spanish_reading: Se mantiene la línea hebrea del dicho del hombre, y se señala en nota que el paralelo griego ofrece una formulación distinta.
  alternative_spanish_readings:
  - 'Seguir el griego: ‘La bendición del Señor está en la recompensa del piadoso…’'
  - Suavizar la diferencia sin nota
  rationale: El testimonio hebreo de base y la decisión de la POB inglesa apuntan a no armonizar los textos. La nota preserva la tensión textual sin borrar la existencia de una tradición griega significativamente distinta.
  doctrine_reference: Crítica textual; no doctrinal
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente de la POB inglesa, que eliminó el incómodo 'then' antes de 'now' y mantuvo 'rest' y 'eat from his good things'. La presente versión española evita ese tropiezo con ‘ahora’ y conserva la imagen concreta de comer de los bienes, sin forzar una armonización con el LXX.
  spanish_consistency_notes:
  - Se usa ‘reposo’ para נַחַת en coherencia con el valor de calma/seguridad indicado por la auditoría inglesa.
  - Se preserva la tercera persona narrativa en el cuerpo del texto, pero se documenta en nota la posibilidad de primera persona.
  - No se introduce ‘Mesías’, ‘Cristo’ ni terminología eclesial ajena al pasaje.
  - La nota del LXX queda anclada en el texto mediante [b], y la alternativa de lectura del hebreo mediante [a].
