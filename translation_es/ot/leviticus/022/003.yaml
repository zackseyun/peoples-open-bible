translation:
  language: es
  text: 'Diles, para todas sus generaciones: Cualquier hombre de entre cualquiera de sus descendientes que se acerque a las cosas santas que los hijos de Israel consagran a Yahvé, mientras su impureza está sobre él, esa persona será cortada[a] de delante de mí[b]. Yo soy Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '"Será cortada" es una fórmula pactual/judicial estable; el modo preciso de esa remoción es debatido.'
    reason: alternative_reading
  - marker: b
    text: O "de mi presencia".
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱמֹר
  english_pob_choice: Say
  chosen_spanish: Habla
  alternatives_spanish:
  - Di
  - Habla
  lexicon: HALOT
  rationale: El imperativo singular de אמר se dirige a Moisés; en español, 'Habla' comunica de forma natural la instrucción oral directa sin perder el carácter mandado.
- source_word: לְדֹרֹתֵיכֶם
  english_pob_choice: throughout your generations
  chosen_spanish: por vuestras generaciones
  alternatives_spanish:
  - a través de vuestras generaciones
  - para vuestras generaciones
  lexicon: HALOT
  rationale: La fórmula legal/covenantal indica vigencia continua a lo largo de sucesivas generaciones. 'Por vuestras generaciones' conserva ese valor idiomático en español sin sonar forzado.
- source_word: כָּל אִישׁ
  english_pob_choice: Any man
  chosen_spanish: Cualquier hombre
  alternatives_spanish:
  - Cualquier persona
  - Todo hombre
  lexicon: HALOT
  rationale: אִישׁ mantiene la forma masculina singular en un contexto legal. 'Cualquier hombre' preserva la forma del hebreo y su alcance representativo.
- source_word: יִקְרַב
  english_pob_choice: comes near
  chosen_spanish: se acerque
  alternatives_spanish:
  - se aproxime
  - vaya cerca
  lexicon: HALOT
  rationale: En contextos sacerdotales, קרב expresa aproximación ritual a lo sagrado. 'Se acerque' es claro y conserva la imagen espacial/ritual.
- source_word: מִכָּל זַרְעֲכֶם
  english_pob_choice: from any of your offspring
  chosen_spanish: de entre cualquiera de tus descendientes
  alternatives_spanish:
  - de entre cualquiera de vuestra descendencia
  - de entre cualquiera de tus hijos
  lexicon: HALOT
  rationale: '''Descendientes'' preserva el sentido genealógico de זֶרַע sin el literalismo de ''semilla''. ''De entre'' ayuda a reflejar la partícula distributiva.'
- source_word: הַקֳּדָשִׁים
  english_pob_choice: the holy things
  chosen_spanish: las cosas santas
  alternatives_spanish:
  - las cosas consagradas
  - las ofrendas santas
  lexicon: HALOT
  rationale: El plural cultual puede abarcar cosas/elementos consagrados. 'Las cosas santas' sigue el alcance amplio del hebreo y evita especificar más de lo que el texto dice.
- source_word: יַקְדִּישׁוּ
  english_pob_choice: consecrate
  chosen_spanish: consagran
  alternatives_spanish:
  - santifican
  - dedican
  lexicon: HALOT
  rationale: El hiphil de קדשׁ expresa dedicar/consagrar a uso santo. 'Consagran' es el equivalente español más natural y fiel al registro cultual.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea formal, frecuente en textos legales. 'Hijos de Israel' mantiene mejor la forma fuente que 'israelitas'.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el criterio del proyecto para el nombre divino en español. 'A Yahvé' refleja la preposición de destinatario/ofrecimiento en una consagración cultual.
- source_word: וְטֻמְאָתוֹ עָלָיו
  english_pob_choice: while his uncleanness is on him
  chosen_spanish: mientras su impureza está sobre él
  alternatives_spanish:
  - con su impureza sobre él
  - mientras está impuro
  lexicon: HALOT
  rationale: '''Impureza'' traduce טֻמְאָה en clave ritual, y ''está sobre él'' conserva la imagen hebrea de un estado que permanece vigente.'
- source_word: וְנִכְרְתָה
  english_pob_choice: shall be cut off
  chosen_spanish: será cortada
  alternatives_spanish:
  - será extirpada
  - será excluida
  lexicon: HALOT
  rationale: La fórmula כרת en pasivo/nifal conserva la pena de pacto sin resolver su mecanismo. 'Será cortada' preserva la tensión lexical y jurídica del hebreo.
- source_word: הַנֶּפֶשׁ הַהִוא
  english_pob_choice: that person
  chosen_spanish: esa persona
  alternatives_spanish:
  - esa alma
  - ese individuo
  lexicon: HALOT
  rationale: Aunque נפש puede significar 'alma' o 'vida', en una fórmula legal designa al individuo concreto. 'Esa persona' es idiomático en español y mantiene el referente.
- source_word: מִלְּפָנַי
  english_pob_choice: from before me
  chosen_spanish: de delante de mí
  alternatives_spanish:
  - de mi presencia
  - de ante mí
  lexicon: HALOT
  rationale: '''De delante de mí'' reproduce con cercanía la imagen relacional y solemne del hebreo, sin resolverla en una sola interpretación conceptual.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se mantiene el nombre propio divino según la norma del proyecto y la evidencia fuente, en vez de una sustitución reverencial.
theological_decisions:
- issue: Fórmula de pena 'será cortada'
  english_pob_reading: Retained as 'shall be cut off' without specifying death, excommunication, or childlessness.
  chosen_spanish_reading: Se mantiene 'será cortada' sin precisar si implica muerte, exclusión o alguna otra forma de remoción.
  alternative_spanish_readings:
  - será ejecutada
  - será excluida de la comunidad
  - será eliminada
  rationale: El hebreo presenta una fórmula legal y teológicamente debatida. En español conviene conservar la ambigüedad heredada del texto en vez de resolverla más allá de la evidencia.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto fuente usa directamente el Tetragrámaton. Se sigue la política del proyecto de traducirlo como 'Yahvé' para preservar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota al pie aparezca exactamente en el texto español. Se eliminó el marcador no anclado y se mantuvo una puntuación fluida y publicable.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva la fórmula legal 'será cortada' para no resolver la tensión del hebreo.
  - Se mantiene la imagen ritual de impureza 'sobre él' en vez de simplificarla a un estado abstracto.
  - Se evita 'siervo' porque el hebreo usa איש en un marco jurídico.
  - Se prefiere 'hijos de Israel' por fidelidad a la expresión fuente en este contexto.
