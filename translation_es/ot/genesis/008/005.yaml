translation:
  language: es
  text: Y las aguas siguieron retirándose hasta el décimo mes. En el décimo mes[a], el primer día del mes, se hicieron visibles las cimas de los montes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría traducirse «fueron vistas» o «aparecieron» para el verbo hebreo; «se hicieron visibles» subraya el paso de quedar a la vista a medida que bajaban las aguas.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: מַיִם es morfológicamente plural y, en contexto de diluvio, funciona como sustantivo colectivo. «Las aguas» conserva ese valor y suena natural en español; «el agua» suavizaría indebidamente el plural colectivo del hebreo.
- source_word: הָיוּ הָלֹךְ וְחָסוֹר
  english_pob_choice: continued to recede
  chosen_spanish: siguieron retirándose
  alternatives_spanish:
  - continuaron retirándose
  - seguían disminuyendo
  - iban menguando
  lexicon: HALOT
  rationale: La construcción expresa acción durativa/progresiva. «Siguieron retirándose» reproduce el avance gradual en un español fluido y mantiene la imagen del agua alejándose; «disminuyendo» sería más abstracto y menos visual.
- source_word: עַד הַחֹדֶשׁ הָעֲשִׂירִי
  english_pob_choice: until the tenth month
  chosen_spanish: hasta el décimo mes
  alternatives_spanish:
  - hasta el mes décimo
  lexicon: HALOT
  rationale: חֹדֶשׁ aquí marca tiempo calendario y se traduce directamente como «mes». «Décimo» mantiene el orden temporal exacto sin añadir interpretaciones.
- source_word: בָּעֲשִׂירִי בְּאֶחָד לַחֹדֶשׁ
  english_pob_choice: In the tenth month, on the first day of the month
  chosen_spanish: En el décimo mes, el primer día del mes
  alternatives_spanish:
  - En el décimo, el primer día del mes
  - En el décimo mes, el día primero del mes
  lexicon: HALOT
  rationale: El hebreo presenta una datación idiomática y algo elíptica. En español conviene explicitarla con una fórmula estándar y sobria, conservando tanto el mes como el día exactos.
- source_word: נִרְאוּ
  english_pob_choice: became visible
  chosen_spanish: se hicieron visibles
  alternatives_spanish:
  - fueron vistos
  - aparecieron
  - quedaron a la vista
  lexicon: HALOT
  rationale: 'El nifal de ראה aquí es pasivo/incoativo: las cumbres pasan a ser visibles. «Se hicieron visibles» refleja mejor ese cambio de estado que «fueron vistos», que introduciría implícitamente observadores.'
- source_word: רָאשֵׁי הֶהָרִים
  english_pob_choice: the tops of the mountains
  chosen_spanish: las cumbres de los montes
  alternatives_spanish:
  - las cimas de los montes
  - las cumbres de las montañas
  - los altos de los montes
  lexicon: HALOT
  rationale: רֹאשׁ significa literalmente «cabeza», pero en topografía se refiere a la parte superior. «Cumbres» transmite el relieve superior con naturalidad; «montes» preserva el tono bíblico más cercano a la forma hebrea que «montañas».
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido y la estructura del texto hebreo, en línea con la traducción inglesa auditada: acción progresiva de las aguas, fecha precisa y aparición gradual de las cumbres. No se detectaron revisiones pendientes en el registro inglés, y la formulación española conserva esa misma lectura sin añadir ampliaciones innecesarias.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé»/«Mesías»/«esclavo» como terminología por defecto del proyecto cuando aparezcan en otros pasajes; este versículo no los contiene.
  - Se usa «aguas» en plural colectivo para respetar el hebreo y la imaginería del diluvio.
  - Se evita «SEÑOR» y otras sustituciones no presentes en el versículo.
  - La nota a pie marca únicamente una alternativa verbal real en español, correspondiente al matiz ya documentado en el audit trail inglés.
