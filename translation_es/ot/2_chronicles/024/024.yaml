translation:
  language: es
  text: Porque con pocos hombres vino el ejército de Aram[a], pero Yahvé entregó en sus manos[b] un ejército muy numeroso, porque habían abandonado a Yahvé, el Dios de sus padres. Así ejecutaron juicio[c] sobre Joás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con un pequeño número de hombres».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en sus manos», un modismo que significa «en su poder».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «llevaron a cabo juicio sobre Joás».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּמִצְעַר אֲנָשִׁים
  english_pob_choice: with few men
  chosen_spanish: con pocos hombres
  alternatives_spanish:
  - con un pequeño número de hombres
  - con una reducida cantidad de hombres
  lexicon: HALOT
  rationale: La expresión hebrea indica escasez de efectivos; en español, «con pocos hombres» es natural y conserva el contraste con el ejército muy numeroso mencionado después.
- source_word: חֵיל אֲרָם
  english_pob_choice: the army of Aram
  chosen_spanish: el ejército de Aram
  alternatives_spanish:
  - la fuerza de Aram
  - el ejército de Siria
  lexicon: HALOT
  rationale: חֵיל aquí es una fuerza militar; «ejército» comunica bien el sentido. Se conserva «Aram» como nombre hebreo del pueblo/territorio, en línea con la primacía del original.
- source_word: וַיהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: 'DOCTRINE.md contested term: יְהוָה / YHWH'
  rationale: Se mantiene el nombre divino como transliteración reverente y transparente. En español del proyecto, la forma establecida es «Yahvé».
- source_word: נָתַן בְּיָדָם
  english_pob_choice: gave ... into their hand
  chosen_spanish: entregó en su mano
  alternatives_spanish:
  - entregó en su poder
  - los puso en su mano
  lexicon: HALOT
  rationale: La construcción idiomática hebrea se conserva con «en su mano», que mantiene la imagen de dominio o poder sin explicitarla en exceso.
- source_word: חַיִל לָרֹב מְאֹד
  english_pob_choice: a very great army
  chosen_spanish: un ejército muy numeroso
  alternatives_spanish:
  - una fuerza muy grande
  - un ejército sumamente grande
  lexicon: HALOT
  rationale: El segundo חַיִל sigue siendo fuerza militar; en español «ejército» es idiomático. «Muy numeroso» expresa bien לָרֹב מְאֹד y el contraste cuantitativo.
- source_word: עָזְבוּ
  english_pob_choice: had forsaken
  chosen_spanish: habían abandonado
  alternatives_spanish:
  - habían dejado
  - habían desamparado
  lexicon: HALOT
  rationale: Aquí el hebreo describe una ruptura de lealtad hacia Yahvé. «Abandonado» conserva esa gravedad sin forzar un tecnicismo religioso menos natural en español.
- source_word: אֱלֹהֵי אֲבוֹתֵיהֶם
  english_pob_choice: the God of their fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  lexicon: HALOT
  rationale: Se preserva la fórmula covenantal y genealógica del hebreo; «padres» es directo y fiel, y se ajusta al uso del proyecto.
- source_word: עָשׂוּ שְׁפָטִים
  english_pob_choice: they executed judgment on Joash
  chosen_spanish: ejecutaron juicio sobre Joás
  alternatives_spanish:
  - llevaron a cabo juicio sobre Joás
  - hicieron juicio contra Joás
  lexicon: HALOT
  rationale: El plural hebreo permite una traducción natural en singular colectivo («juicio») como en la revisión inglesa, manteniendo la idea de retribución judicial/punitiva. «Sobre Joás» conserva la relación directa del acto con él.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrama de forma directa. El proyecto en español lo vierte como «Yahvé» para preservar el nombre propio del Dios de Israel sin reemplazarlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido retributivo del acto contra Joás
  english_pob_reading: Thus they executed judgment on Joash.
  chosen_spanish_reading: Así ejecutaron juicio sobre Joás.
  alternative_spanish_readings:
  - Así llevaron a cabo juicio sobre Joás.
  - Así hicieron juicio contra Joás.
  rationale: El hebreo presenta la acción militar como instrumento del juicio divino. La formulación española mantiene esa conexión causal sin añadir explicación interpretativa ajena al verso.
  doctrine_reference: Narrative theology of divine judgment in the Chronicler
- issue: Idiomatismo de בְּיָדָם
  english_pob_reading: into their hand
  chosen_spanish_reading: en su mano
  alternative_spanish_readings:
  - en su poder
  - en sus manos
  rationale: Se conserva el modismo hebreo con una expresión española clara; así no se pierde la imagen de control otorgado por Dios.
  doctrine_reference: Hebrew idiom preservation policy
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió el singular «judgment» frente a «judgments» para mayor naturalidad; por ello, el español usa también el singular «juicio», manteniendo el sentido colectivo/retributivo del plural hebreo. También se conservó la decisión del audit trail de traducir el Tetragrama directamente y de mantener el modismo «en su mano».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del Tetragrama en el texto principal.
  - Se conserva «Aram» en lugar de «Siria» por primacía del nombre hebreo.
  - «Ejército» se usa para חֵיל por ser natural en español y fiel al contexto militar.
  - «Juicio» en singular refleja mejor la naturalidad española, sin perder el valor punitivo del plural hebreo.
  - La preposición «sobre» en «juicio sobre Joás» mantiene una relación directa y legible entre la acción y su destinatario.
