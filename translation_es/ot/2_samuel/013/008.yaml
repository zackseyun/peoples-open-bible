base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/013/008.yaml
  text: So Tamar went to the house of her brother Amnon[a], while he was lying down. She took the dough, kneaded it, shaped it into cakes in his sight[b], and cooked the cakes.
  footnotes:
