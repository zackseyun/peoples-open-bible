  text: כִּֽי שְׁמַ֤עְנָה נָשִׁים֙ דְּבַר יְהוָ֔ה וְ/תִקַּ֥ח אָזְנְ/כֶ֖ם דְּבַר פִּ֑י/ו וְ/לַמֵּ֤דְנָה בְנֽוֹתֵי/כֶם֙ נֶ֔הִי וְ/אִשָּׁ֥ה רְעוּתָ֖/הּ קִינָֽה־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/009/019.yaml
  text: For hear the word of Yahweh[a], O women, and let your ear receive the word of his mouth; teach your daughters a lament[c][b], and each woman her neighbor a dirge.
