translation:
  language: es
  text: 'Y Tobit daba gracias delante de ellos porque Dios les había mostrado misericordia. Y cuando Tobit se acercó a Sara, su nuera[a], la bendijo diciendo: «Que vengas con salud, hija. Bendito es Dios, que te ha traído a nosotros, y tu padre y tu madre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego termina abruptamente con «y tu padre y tu madre». Algunos lectores podrían entender una continuación implícita como «y [benditos sean] tu padre y tu madre», pero el verbo no está expresado en este testigo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξωμολογεῖτο
  english_pob_choice: gave thanks
  chosen_spanish: daba gracias
  alternatives_spanish:
  - confesaba
  - alababa públicamente
  lexicon: LSJ
  rationale: En este contexto el verbo expresa reconocimiento agradecido ante la acción misericordiosa de Dios, no confesión de pecado. «Daba gracias» conserva ese valor de gratitud pública de manera natural en español.
- source_word: ἠλέησεν
  english_pob_choice: had shown ... mercy
  chosen_spanish: les había mostrado misericordia
  alternatives_spanish:
  - había tenido misericordia de ellos
  - les había compadecido
  lexicon: LSJ
  rationale: «Mostrar misericordia» refleja bien el verbo ἐλεέω y evita suavizar el peso teológico de la acción divina.
- source_word: τῇ νύμφῃ αὐτοῦ
  english_pob_choice: his daughter-in-law
  chosen_spanish: su nuera
  alternatives_spanish:
  - su esposa
  - su novia
  lexicon: LSJ
  rationale: Aquí νύμφη nombra con precisión la relación familiar desde la perspectiva de Tobit; en español «nuera» es el equivalente claro y natural.
- source_word: κατευλόγησεν
  english_pob_choice: he blessed
  chosen_spanish: la bendijo
  alternatives_spanish:
  - la bendijo con intensidad
  - pronunció una bendición sobre ella
  lexicon: LSJ
  rationale: El compuesto intensifica la acción, pero «la bendijo» comunica fielmente el acto de bendecir sin sobrecargar el español.
- source_word: Ἔλθοις ὑγιαίνουσα
  english_pob_choice: May you come in good health
  chosen_spanish: Que vengas sana
  alternatives_spanish:
  - Que llegues sana
  - Ojalá vengas con salud
  lexicon: LSJ
  rationale: El optativo expresa un deseo o bendición. «Que vengas sana» preserva el matiz volitivo y el sentido de bienestar/shalom sin volverlo una orden.
- source_word: θύγατερ
  english_pob_choice: daughter
  chosen_spanish: hija
  alternatives_spanish:
  - hija mía
  - querida hija
  lexicon: LSJ
  rationale: El vocativo afectuoso puede traducirse simplemente como «hija»; en español el posesivo no es necesario y podría añadir una relación no explicitada en el griego.
- source_word: εὐλογητὸς ὁ θεός
  english_pob_choice: Blessed is God
  chosen_spanish: Bendito es Dios
  alternatives_spanish:
  - Bendito sea Dios
  - Alabado sea Dios
  lexicon: LSJ
  rationale: «Bendito es Dios» sigue de cerca la fórmula griega y mantiene el tono doxológico sin introducir un giro más litúrgico que el texto no exige.
- source_word: ὃς ἤγαγέν σε πρὸς ἡμᾶς
  english_pob_choice: who has brought you to us
  chosen_spanish: que te ha traído a nosotros
  alternatives_spanish:
  - que te llevó a nosotros
  - que te ha conducido hasta nosotros
  lexicon: LSJ
  rationale: 'El perfecto español reproduce bien el resultado presente de la acción completada: Sara ya está con la familia.'
- source_word: καὶ ὁ πατήρ σου καὶ ἡ μήτηρ σου
  english_pob_choice: and your father and your mother
  chosen_spanish: y tu padre y tu madre
  alternatives_spanish:
  - y tu padre y tu madre también
  - y también tu padre y tu madre
  lexicon: LSJ
  rationale: Se preserva la cláusula abrupta tal como está en el testigo griego. En español conviene mantenerla literal para no introducir una continuación no atestiguada.
theological_decisions:
- issue: Sentido de ἐξωμολογεῖτο ante Dios
  english_pob_reading: public thanksgiving/praise
  chosen_spanish_reading: acción de gracias pública
  alternative_spanish_readings:
  - confesión
  - alabanza abierta
  rationale: El contenido subordinado («porque Dios les había mostrado misericordia») orienta claramente el verbo hacia gratitud y reconocimiento, no hacia confesión de culpa.
  doctrine_reference: Translation philosophy §1, §6
- issue: Mantenimiento de la clausula final abrupta
  english_pob_reading: preserved in main text as a literal continuation
  chosen_spanish_reading: se conserva literalmente como continuación abrupta
  alternative_spanish_readings:
  - 'entenderla elípticamente como parte de la bendición: «y bendito sea tu padre y tu madre»'
  rationale: El testigo griego transmite la frase sin verbo repetido. Para no importar contenido ausente, la traducción conserva el final tal como llega en la fuente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB que ajustó el saludo de una forma imperativa a un optativo más exacto («May you come in good health»). Por eso se eligió «Que vengas sana» para reflejar el valor desiderativo de Ἔλθοις. También se conservó la clausula final abrupta sin expandirla.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, en coherencia con el estándar del proyecto.
  - Se traduce νύμφη como «nuera» por el contexto relacional concreto, no como «novia» o «esposa».
  - Se conserva la estructura de bendición directa, con un registro reverente pero natural en español.
  - No se introduce «Cristo» ni terminología eclesiástica ajena al pasaje.
