  - severity: low
    issue: Topónimo 'Gabaa' puede resultar menos reconocible que 'Gibeá'
    rationale: '''Gabaa'' tiene precedentes tradicionales, pero ''Gibeá'' refleja mejor el nombre reconocido en biblias modernas en español y se alinea mejor con la referencia inglesa ''Gibeah''. Es un ajuste de legibilidad, no de fondo.'
