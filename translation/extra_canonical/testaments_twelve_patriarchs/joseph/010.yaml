theological_decisions:
- issue: Divine indwelling language in a Jewish testamentary text
  chosen_reading: Translate κατοικήσει / κατοικεῖ straightforwardly as the Lord or the Most High dwelling among/with the righteous.
  alternative_readings:
  - Metaphorical favor only
  - Later Christianized indwelling language
  rationale: The Greek witness presents divine presence as the reward of purity and endurance. The language can stand in its Jewish ethical setting without importing later doctrinal precision; translation should preserve the theological tension rather than reduce it.
  doctrine_reference: DOCTRINE.md §Preserve theological tension rather than resolve it
- issue: Moral scope of σωφροσύνη
  chosen_reading: Render as 'self-control' rather than narrowly 'chastity' in the main text.
  alternative_readings:
  - chastity
  - temperance
  rationale: Joseph's immediate concern is sexual purity, but the virtue in Greek moral-religious discourse is broader disciplined mastery of self. Pairing it with 'purity' lets the chapter retain both breadth and sexual relevance.
  doctrine_reference: DOCTRINE.md §Consistency of key terms, or documented exception
