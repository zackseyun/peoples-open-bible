translation:
  language: es
  text: Entre los arbustos rebuznan[a]; debajo de las ortigas[b] se apiñan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «braman» o «gimen». El hebreo sugiere el sonido característico de un asno, y el matiz animalizador es intencional.
    reason: lexical_alternative
  - marker: b
    text: O «debajo de la zarza» o «del espino». El nombre hebreo de la planta es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּין
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - entre medio de
  - en medio de
  lexicon: HALOT
  rationale: La preposición expresa ubicación en un grupo o conjunto; en español, «entre» reproduce bien el sentido relacional de «among» sin forzar una construcción más pesada.
- source_word: שִׂיחִים
  english_pob_choice: bushes
  chosen_spanish: arbustos
  alternatives_spanish:
  - matorrales
  - zarzas
  lexicon: HALOT
  rationale: El término designa vegetación baja y silvestre. «Arbustos» es natural en español y conserva la imagen general sin precisar indebidamente la especie.
- source_word: יִנְהָקוּ
  english_pob_choice: they bray
  chosen_spanish: braman
  alternatives_spanish:
  - rebuznan
  - gimen
  - claman
  lexicon: HALOT
  rationale: El verbo se usa normalmente del rebuzno de asnos. «Braman» preserva el matiz animalizador y degradante que el POB inglés quiso mantener con «bray».
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - under
  lexicon: HALOT
  rationale: Es una preposición espacial simple; «debajo de» resulta claro y natural en español.
- source_word: חָרוּל
  english_pob_choice: nettles
  chosen_spanish: ortigas
  alternatives_spanish:
  - zarzas
  - espinos
  lexicon: HALOT
  rationale: El término hebreo nombra una planta áspera o dañina. «Ortigas» comunica bien en español una vegetación molesta y silvestre, aunque la identificación botánica exacta sigue siendo incierta.
- source_word: יְסֻפָּחוּ
  english_pob_choice: they huddle together
  chosen_spanish: se apiñan juntos
  alternatives_spanish:
  - se agrupan
  - se juntan
  - se acurrucan juntos
  lexicon: HALOT
  rationale: La forma pasiva/intensiva sugiere ser juntados o amontonados. «Se apiñan juntos» conserva la idea de agrupación compacta y la miseria de la escena, sin perder la incertidumbre léxica.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: todos los marcadores de nota ahora aparecen anclados en el texto español. Además, se evitó depender de la forma inglesa como plantilla, manteniendo la imagen poética y la incertidumbre botánica del hebreo.'
  spanish_consistency_notes:
  - Se mantuvo el registro poético y sobrio, apto para lectura pública.
  - «Braman» conserva el tono dehumano/animal del original mejor que una glosa neutral.
  - No se introdujo terminología eclesiástica ajena al texto.
  - La segunda nota queda anclada en «ortigas», permitiendo la alternativa botánica sin perder claridad en el texto principal.
