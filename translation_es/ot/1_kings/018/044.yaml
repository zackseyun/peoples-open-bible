revisions:
- from: 'Y aconteció en la séptima vez que dijo[a]: «Mira, una nube pequeña, como la palma de un hombre, sube del mar». Entonces dijo: «Sube; di a Acab: “Prepara tu carro y desciende, para que la lluvia no te detenga”»[b][c].'
  to: 'Y aconteció la séptima vez que dijo: «Mira, una nube pequeña, como la palma de un hombre[a], sube del mar». Entonces dijo: «Sube; di a Acab: “Apareja tu carro[b] y desciende, para que la lluvia no te detenga[c]”».'
  rationale: Se corrige la nota alternativa para preservar el sentido comparativo de כְּכַף אִישׁ, se ajusta אֱסֹר a «Apareja tu carro» para reflejar mejor la decisión léxica documentada, se mejora levemente la naturalidad de la frase temporal en español y se reubican las notas en sus anclajes correspondientes.
