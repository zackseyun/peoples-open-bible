    rationale: La secuencia 'sobre la cama o sobre el objeto... sobre el cual ella se sienta' es fiel, pero puede leerse más naturalmente con 'que ella usa para sentarse' o manteniendo la relativa actual. No es error, solo cuestión de fluidez.
