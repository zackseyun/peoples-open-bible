translation:
  language: es
  text: Por tanto, amarás a Yahvé tu Dios y guardarás lo que él te ha encomendado,[a] sus estatutos, sus juicios[b] y sus mandamientos todos tus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y amarás a Yahvé tu Dios». La conjunción hebrea puede rendirse simplemente como «y»; aquí se toma con fuerza inferencial a partir del contexto previo. La expresión «lo que él te ha encomendado» traduce un término hebreo que también puede expresarse de forma más compacta como «su obligación» o «su observancia».'
    reason: alternative_reading_and_lexical_clarification
  - marker: b
    text: 'O: «sus ordenanzas» para «sus juicios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָהַבְתָּ
  english_pob_choice: Therefore you shall love
  chosen_spanish: Por tanto, amarás
  alternatives_spanish:
  - Y amarás
  - Así que amarás
  lexicon: HALOT
  rationale: אָהַב significa 'amar'. El ו inicial puede traducirse simplemente como 'y', pero en el flujo discursivo este versículo concluye y aplica el contexto precedente; 'Por tanto' expresa bien esa fuerza inferencial en español natural sin cambiar el vínculo hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' en el texto español para preservar el nombre divino propio, en línea con la decisión doctrinal del proyecto, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el Dios tuyo
  lexicon: HALOT
  rationale: 'La forma constructa con sufijo de segunda persona singular expresa relación de pacto: ''tu Dios''. ''Dios'' conserva el referente singular del hebreo en este contexto.'
- source_word: וְ/שָׁמַרְתָּ
  english_pob_choice: and keep
  chosen_spanish: y guardarás
  alternatives_spanish:
  - y observarás
  - y custodiarás
  lexicon: HALOT
  rationale: שׁמר abarca 'guardar, observar, custodiar'. 'Guardarás' es natural en español bíblico actual y conserva la idea de cumplir y proteger lo mandado.
- source_word: מִשְׁמַרְתּוֹ
  english_pob_choice: his charge
  chosen_spanish: su encargo
  alternatives_spanish:
  - su cargo
  - su obligación
  lexicon: HALOT
  rationale: מִשְׁמֶרֶת puede significar carga, encargo, obligación o aquello que debe guardarse. 'Encargo' evita la posible ambigüedad de 'cargo' en español y mantiene la densidad de deber asignado por Dios. Se evita 'cargo' porque en español moderno puede sonar administrativo o jerárquico más que mandado a cumplir.
- source_word: חֻקֹּתָיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  lexicon: HALOT
  rationale: חֹק / חֻקָּה se traduce de manera regular como 'estatuto' en contexto legal. Mantiene distinción frente a los términos vecinos.
- source_word: וּמִשְׁפָּטָיו
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus ordenanzas
  - sus decisiones judiciales
  lexicon: HALOT
  rationale: מִשְׁפָּט puede significar juicio, justicia, decisión legal u ordenanza. 'Juicios' conserva la cercanía léxica con el hebreo y mantiene la serie legal del versículo junto con 'estatutos' y 'mandamientos'.
- source_word: וּמִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus órdenes
  - sus preceptos
  lexicon: HALOT
  rationale: מִצְוָה es el término habitual para mandamiento. 'Mandamientos' es claro, formal y coherente con el registro legal del pasaje.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all your days
  chosen_spanish: todos tus días
  alternatives_spanish:
  - todos los días
  - siempre
  lexicon: HALOT
  rationale: Literalmente, 'todos los días'. En español, con la serie de verbos en segunda persona singular, 'todos tus días' explicita de manera natural el alcance personal implícito en el hebreo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa directamente el nombre del pacto, יְהוָה. El proyecto español conserva ese nombre como 'Yahvé' para no ocultar el Tetragrámaton tras una sustitución titulada.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nuance of מִשְׁפָּטָיו within the legal triad
  english_pob_reading: his judgments
  chosen_spanish_reading: sus juicios
  alternative_spanish_readings:
  - sus ordenanzas
  - sus reglas
  rationale: No hay disputa doctrinal, pero 'juicios' conserva la categoría jurídica distinta frente a 'estatutos' y 'mandamientos', evitando aplanar la tríada legal del versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms)
- issue: Force of the conjunction וְ at the opening of the verse
  english_pob_reading: Therefore
  chosen_spanish_reading: Por tanto
  alternative_spanish_readings:
  - Y
  - Así que
  rationale: El contexto previo impulsa una conclusión; 'Por tanto' reproduce esa fuerza inferencial de modo natural en español, tal como la auditoría inglesa lo hizo con 'Therefore'.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (discourse-level equivalence)
translation_notes:
  revision_awareness: La revisión más reciente quedó sin cambios sustantivos; el texto español sigue la misma lectura de alta concordancia, preservando la fuerza inferencial de la conjunción inicial, el nombre divino 'Yahvé' y la tríada legal diferenciada 'estatutos / juicios / mandamientos'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva la secuencia legal 'estatutos, juicios y mandamientos' para reflejar tres términos hebreos distintos.
  - '''Guardarás'' traduce שׁמר con un registro bíblico claro y natural en español.'
  - La nota [a] se ancla en la alternativa conjuntiva, y [b] marca la alternativa léxica de מִשְׁפָּטָיו.
