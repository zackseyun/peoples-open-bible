  glossary_alignment: 'Alineado en general con la terminología del proyecto: YHWH se traduce correctamente como «Yahvé»; «salvación» es una opción válida con nota para «liberación». No hay conflictos doctrinales relevantes. La principal desviación es léxica-estilística en תָּשִׂישׂ, donde conviene «exultará» en lugar de «se exaltará».'
