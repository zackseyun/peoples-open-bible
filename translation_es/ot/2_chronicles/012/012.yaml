translation:
  language: es
  text: Y cuando se humilló, la ira de Yahvé[a] se apartó de él, para no destruirlo por completo; y también en Judá había cosas buenas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la ira de Yahvé se volvió de él» o «se apartó de sobre él». El hebreo expresa que la ira divina se volvió/apartó de Roboam.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «cosas buenas»; la expresión es amplia y puede referirse a condiciones, acciones o asuntos encomiables en Judá.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהִכָּנְעוֹ
  english_pob_choice: when he humbled himself
  chosen_spanish: cuando se humilló
  alternatives_spanish:
  - cuando se sometió
  - cuando fue humillado
  lexicon: HALOT
  rationale: El verbo hitpael de כנע tiene fuerza reflexiva; en español, «se humilló» comunica mejor la acción voluntaria de humillarse que una pasiva como «fue humillado». Mantiene el valor temporal de la construcción con בְ.
- source_word: שָׁב
  english_pob_choice: turned away
  chosen_spanish: se apartó
  alternatives_spanish:
  - volvió
  - se retiró
  - se apartó de él
  lexicon: HALOT
  rationale: Con מִמֶּנּוּ y el sujeto «la ira de Yahvé», el hebreo expresa separación/dirección. «Se apartó» conserva ese movimiento idiomático en español sin convertirlo en una glosa interpretativa como «se calmó».
- source_word: אַף יְהוָה
  english_pob_choice: the anger of Yahweh
  chosen_spanish: la ira de Yahvé
  alternatives_spanish:
  - la cólera de Yahvé
  - el enojo de Yahvé
  lexicon: HALOT
  rationale: אַף es el modismo habitual para ira/enojo. «Ira» es natural, solemne y fiel al campo semántico. Se mantiene «Yahvé» conforme al criterio del proyecto para el Tetragrama.
- source_word: וְלֹא לְהַשְׁחִית לְכָלָה
  english_pob_choice: so as not to destroy him completely
  chosen_spanish: para no destruirlo por completo
  alternatives_spanish:
  - para no destruirlo totalmente
  - a fin de no aniquilarlo por completo
  - y no destruirlo hasta el fin
  lexicon: HALOT
  rationale: La construcción negativa con infinitivo expresa propósito o resultado; en español, «para no destruirlo por completo» conserva la finalidad y la intensidad de לְכָלָה sin exagerar a «aniquilar» ni debilitar a «destruir».
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - además
  - e incluso
  lexicon: HALOT
  rationale: La partícula añade una observación adicional. «Y también» es transparente y no sobreinterpreta el nexo como contraste o conclusión.
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - entre Judá
  - dentro de Judá
  lexicon: HALOT
  rationale: El valor locativo es directo. «En Judá» es la forma más natural y precisa en español.
- source_word: הָיָה דְּבָרִים טוֹבִים
  english_pob_choice: there were good things
  chosen_spanish: había cosas buenas
  alternatives_spanish:
  - había asuntos buenos
  - había cosas favorables
  - había bienes
  lexicon: HALOT
  rationale: 'דְּבָרִים es amplio: asuntos, cosas, hechos, circunstancias o palabras. «Cosas buenas» conserva esa amplitud sin resolver el sentido hacia una sola idea moral o institucional.'
theological_decisions:
- issue: Cómo expresar la mitigación del juicio divino sin borrar la realidad de la ira
  english_pob_reading: the anger of Yahweh turned away from him, so as not to destroy him completely
  chosen_spanish_reading: la ira de Yahvé se apartó de él, para no destruirlo por completo
  alternative_spanish_readings:
  - Yahvé se arrepintió y no lo destruyó por completo
  - la ira de Yahvé retrocedió de él, para no aniquilarlo
  rationale: El verso afirma una verdadera atenuación del juicio en respuesta a la humillación, pero no una anulación total de la disciplina. «Se apartó» mantiene la imagen verbal y evita introducir una formulación teológicamente más cargada como «se arrepintió».
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de «דְּבָרִים טוֹבִים» en la cláusula final
  english_pob_reading: and also in Judah there were good things
  chosen_spanish_reading: y también en Judá había cosas buenas
  alternative_spanish_readings:
  - y también en Judá había buenos asuntos
  - y también en Judá había condiciones buenas
  - y también en Judá había buenas obras
  rationale: La frase hebrea es deliberadamente amplia. Se conserva esa amplitud para no decidir de antemano si se trata de condiciones, acciones, asuntos o circunstancias favorables.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se registraron cambios necesarios; la traducción sigue el acuerdo alto con la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en todo el texto, conforme al estándar del proyecto.
  - Se conserva la amplitud semántica de דְּבָרִים con «cosas» en lugar de especificar «obras» o «asuntos».
  - La puntuación reproduce la relación causal/temporal con una coma antes de «para no destruirlo por completo».
  - El marcador [a] está anclado en el verbo reflexivo para señalar la alternativa de lectura del hebreo.
