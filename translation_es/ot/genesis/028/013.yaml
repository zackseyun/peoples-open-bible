translation:
  language: es
  text: 'Y he aquí[a] Yahvé estaba de pie sobre ella, y dijo: «Yo soy Yahvé, el Dios de tu padre Abraham y el Dios de Isaac. La tierra sobre la que estás acostado te la daré a ti y a tu descendencia[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junto a él» / «sobre él», si el pronombre se refiere a Jacob y no a la escalera.
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «tu semilla»; se vierte «tu descendencia» para preservar el sentido colectivo singular en español natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Ahora bien, he aquí
  lexicon: HALOT
  rationale: Conserva la fuerza discursiva y el tono solemne de la apertura visionaria sin volverlo arcaico en exceso. «He aquí» corresponde bien a la función de atención del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el Tetragrama se vierte como el nombre propio «Yahvé», no como sustitución titulada. Es la forma española estable y auditada para preservar el nombre del pacto.
- source_word: נִצָּב
  english_pob_choice: was standing
  chosen_spanish: estaba de pie
  alternatives_spanish:
  - estaba erguido
  - estaba parado
  lexicon: HALOT
  rationale: El participio expresa estado/duración en la escena; «estaba de pie» comunica mejor esa presencia continua que un simple pretérito puntual.
- source_word: עָלָיו
  english_pob_choice: above it
  chosen_spanish: sobre ella
  alternatives_spanish:
  - encima de ella
  - sobre él
  lexicon: HALOT
  rationale: El antecedente inmediato más natural es la escalera/la escalera del contexto, de género femenino en español; por eso se usa «sobre ella». Mantiene la lectura principal sin eliminar la tensión interpretativa documentada.
- source_word: אֱלֹהֵי אַבְרָהָם אָבִיךָ
  english_pob_choice: the God of Abraham your father
  chosen_spanish: el Dios de Abraham, tu padre
  alternatives_spanish:
  - el Dios de Abraham tu padre
  - el Dios de tu padre Abraham
  lexicon: HALOT
  rationale: La versión española sigue de cerca la cadena constructa y hace natural la aposición con coma. No sobreinterpreta la sintaxis y conserva la referencia ancestral del título.
- source_word: וֵאלֹהֵי יִצְחָק
  english_pob_choice: and the God of Isaac
  chosen_spanish: y el Dios de Isaac
  alternatives_spanish:
  - y Dios de Isaac
  lexicon: HALOT
  rationale: Traducción directa y formal de la coordinación, preservando la repetición del título divino.
- source_word: הָאָרֶץ
  english_pob_choice: The land
  chosen_spanish: La tierra
  alternatives_spanish:
  - El territorio
  - El país
  lexicon: HALOT
  rationale: En el contexto patriarcal, «tierra» es la forma más fiel y natural para la promesa territorial/covenantal, sin reducirla a suelo físico.
- source_word: שֹׁכֵב עָלֶיהָ
  english_pob_choice: on which you are lying
  chosen_spanish: sobre la que estás acostado
  alternatives_spanish:
  - en la que estás acostado
  - sobre la cual yaces
  lexicon: HALOT
  rationale: El participio expresa la acción en curso; «estás acostado» es natural y conserva el sentido espacial de עַל. Se usa «la que» para concordar con «tierra».
- source_word: לְךָ אֶתְּנֶנָּה
  english_pob_choice: I will give to you
  chosen_spanish: te la daré
  alternatives_spanish:
  - te la voy a dar
  - la daré a ti
  lexicon: HALOT
  rationale: En esta promesa, el imperfecto funciona como futuro; el objeto directo femenino ya está claro por «la tierra», por lo que el clítico español expresa con naturalidad la referencia implícita.
- source_word: וּלְזַרְעֶךָ
  english_pob_choice: and to your offspring
  chosen_spanish: y a tu descendencia
  alternatives_spanish:
  - y a tu simiente
  - y a tu prole
  lexicon: HALOT
  rationale: «Descendencia» preserva el sentido colectivo de זֶרַע y es idiomática en español bíblico actual. Evita «simiente», que suena demasiado tradicional y menos transparente para lectores modernos.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo nombra directamente a YHWH; la traducción debe preservar ese nombre propio del pacto. «Yahvé» es la forma española elegida por el proyecto para evitar la sustitución por un título y mantener transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Referencia de עָלָיו en la visión
  english_pob_reading: above it
  chosen_spanish_reading: sobre ella
  alternative_spanish_readings:
  - sobre él
  - junto a él
  rationale: La lectura principal toma el sufijo como referido a la escalera, y en español la concordancia femenina de «escalera» hace natural «sobre ella». Se preserva así la opción textual más probable sin borrar la alternativa interpretativa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente, que no introdujo cambios y mantuvo alta concordancia con la evaluación cruzada; por tanto, la redacción española se ajusta al texto hebreo y al audit trail inglés sin modificaciones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma constante del Tetragrama.
  - Se conserva el valor colectivo de זֶרַע con «descendencia».
  - La ambigüedad de עָלָיו queda visible mediante nota sin alterar la lectura principal del texto.
  - La puntuación sigue el uso español con comillas de apertura y cierre para el discurso directo.
