review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y preserva correctamente ''Yahvé'', ''casa de Yahvé'', ''los sacerdotes, los levitas'' y la idea cultual de los holocaustos conforme a la Ley de Moisés. Sin embargo, dos elecciones no reflejan bien el valor contextual documentado en el audit trail: חָלַק en este contexto administrativo se expresa mejor como ''había asignado'' que ''había distribuido'', y עַל יְדֵי דָוִיד suena más natural y preciso en español como ''según lo dispuesto por David'' que ''según la dirección de David''. Además, falta conservar en español las notas de alternativa del inglés sobre ''los sacerdotes, los levitas'' y sobre la expresión final relacionada con David.'
  spanish_quality_summary: El texto es claro y eclesialmente legible, pero 'Joiada' debería ajustarse a la forma más reconocible 'Joyadá' en español bíblico moderno. 'En manos de' funciona con nota, pero 'en mano de' en la nota resulta menos natural que 'en la mano de'. 'Había distribuido sobre la casa de Yahvé' suena algo torpe en español; 'había asignado para la casa de Yahvé' o mantener 'sobre' con 'asignado' mejora la fluidez sin perder cercanía. 'Según la dirección de David' es comprensible, pero poco idiomático.
  glossary_alignment: 'Alineación buena con la terminología del proyecto en ''Yahvé'', ''casa de Yahvé'', ''holocaustos'', ''Ley de Moisés'' y la preservación de ''los sacerdotes, los levitas''. Conviene ajustar las decisiones léxicas para reflejar mejor el razonamiento documentado del POB: פקדות puede quedar como ''responsabilidades'' o mejor ''supervisión''; חָלַק debe evitar un matiz meramente distributivo; y עַל יְדֵי דָוִיד debe expresar disposición/prescripción más que ''dirección''.'
  issues:
  - severity: medium
    issue: '''había distribuido'' para חָלַק no encaja bien en este contexto'
    rationale: El hebreo aquí habla de asignación/organización de personal para el servicio del templo, no solo de distribución general. 'Había asignado' refleja mejor el sentido contextual y el audit trail inglés.
  - severity: medium
    issue: '''según la dirección de David'' suena poco natural y algo ambiguo'
    rationale: La frase עַל יְדֵי דָוִיד apunta a disposición, prescripción o arreglo davídico. En español, 'según lo dispuesto por David' comunica mejor ese valor administrativo-litúrgico.
  - severity: low
    issue: Faltan dos notas de alternativa presentes en el audit trail inglés
    rationale: El inglés conserva la ambigüedad de 'los sacerdotes, los levitas' y una alternativa para la frase final sobre David. El español debería preservar esas alternativas, especialmente porque ayudan a no sobreinterpretar el hebreo.
  - severity: low
    issue: Forma onomástica 'Joiada' menos natural que 'Joyadá'
    rationale: '''Joyadá'' es más reconocible y natural en español bíblico general.'
