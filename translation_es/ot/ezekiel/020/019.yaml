revisions:
- from: Yo soy Yahvé, su Dios; caminen[a] en mis estatutos, y guarden mis decretos y pónganlos por obra.
  to: Yo soy Yahvé, su Dios; caminen en mis estatutos, y guarden mis ordenanzas[a] y háganlas.
  rationale: Se corrige la ubicación y el contenido de la nota para que corresponda al término hebreo מִשְׁפָּטַי, conforme al audit trail inglés. Se sustituye «decretos» por «ordenanzas» para preservar mejor el campo jurídico-normativo documentado, con nota alternativa «juicios». También se ajusta «pónganlos por obra» a «háganlas» para reflejar más directamente וַעֲשׂוּ אוֹתָם en español natural y fiel. Se mantiene «caminen en mis estatutos» por fidelidad al modismo pactual הלך + ב.
