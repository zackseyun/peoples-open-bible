translation:
  language: es
  text: Y destruiré todas sus bestias de junto a sus abundantes aguas[a], y ningún pie humano las enturbiará[b] nunca más, ni las enturbiarán las pezuñas de las bestias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchas aguas».
    reason: lexical_alternative
  - marker: b
    text: El verbo significa volver turbias o lodosas las aguas al pisarlas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַאֲבַדְתִּי
  english_pob_choice: And I will destroy
  chosen_spanish: Y destruiré
  alternatives_spanish:
  - Y haré perecer
  - Y barreré
  lexicon: HALOT
  rationale: El hiphil de אבד expresa una acción causativa de destrucción o eliminación. «Destruiré» comunica bien esa fuerza en español moderno, con un tono adecuado al oráculo de juicio.
- source_word: בְּהֶמְתָּהּ
  english_pob_choice: its beasts
  chosen_spanish: su ganado
  alternatives_spanish:
  - sus bestias
  - sus animales
  - su hacienda
  lexicon: HALOT
  rationale: בְּהֵמָה puede referirse a animales o ganado. En este contexto de aguas y paso de pies/pezuñas, «ganado» es una opción natural y fiel al campo semántico, aunque «bestias» también sería posible.
- source_word: מֵעַל מַיִם רַבִּים
  english_pob_choice: from beside its abundant waters
  chosen_spanish: de junto a sus abundantes aguas
  alternatives_spanish:
  - de sobre sus muchas aguas
  - lejos de sus muchas aguas
  lexicon: HALOT
  rationale: מֵעַל literalmente es «de sobre» o «desde encima de», pero aquí la idea es de separación local respecto de las aguas. «De junto a» refleja bien esa ubicación. רַבִּים con מַיִם se puede verter como «abundantes» o «muchas»; se eligió «abundantes» por naturalidad.
- source_word: תִדְלָחֵם
  english_pob_choice: will muddy them
  chosen_spanish: las enturbiará
  alternatives_spanish:
  - las muddará
  - las ensuciará
  - las removerá
  lexicon: HALOT
  rationale: El verbo indica volver turbias las aguas por pisarlas o agitarlas. «Enturbiar» es el equivalente más claro y digno en español; conserva la imagen sin sonar forzado. Como en el inglés, el pronombre se refiere a las aguas.
- source_word: רֶגֶל אָדָם
  english_pob_choice: human foot
  chosen_spanish: ningún pie humano
  alternatives_spanish:
  - pie de hombre
  - pie humano alguno
  lexicon: HALOT
  rationale: אָדָם es genérico; el español puede expresarlo de forma inclusiva y natural como «humano». «Pie humano» mantiene el sentido de cualquier persona, no de un varón específico.
- source_word: עוֹד
  english_pob_choice: anymore
  chosen_spanish: nunca más
  alternatives_spanish:
  - ya no
  - más
  lexicon: HALOT
  rationale: 'En una negación futura, עוֹד señala continuación cesada: «anymore». «Nunca más» transmite con claridad esa idea de cese definitivo en español bíblico contemporáneo.'
- source_word: וּפַרְסוֹת בְּהֵמָה
  english_pob_choice: nor will the hooves of beasts
  chosen_spanish: ni las enturbiarán las pezuñas del ganado
  alternatives_spanish:
  - ni las pezuñas de las bestias
  - ni las patas del ganado
  lexicon: HALOT
  rationale: פַּרְסוֹת son pezuñas hendidas. «Pezuñas» es preciso y más específico que «patas». Se mantiene el paralelismo con el miembro anterior y el verbo implícito de enturbiar.
theological_decisions:
- issue: Traducción genérica de אָדָם
  english_pob_reading: human foot
  chosen_spanish_reading: pie humano
  alternative_spanish_readings:
  - pie de hombre
  - pie humano alguno
  rationale: El hebreo usa un singular genérico. «Pie humano» evita restringir el sentido a un varón y conserva la referencia universal a cualquier persona.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: Valor de מַיִם רַבִּים
  english_pob_reading: abundant waters
  chosen_spanish_reading: abundantes aguas
  alternative_spanish_readings:
  - muchas aguas
  - aguas numerosas
  rationale: El plural con רַבִּים puede indicar abundancia o multiplicidad. «Abundantes aguas» mantiene la riqueza del hebreo y suena natural en español; no se apaga la posible lectura de «muchas» porque la abundancia ya la incluye.
  doctrine_reference: HALOT / source-context lexical decision
translation_notes:
  revision_awareness: El paquete de auditoría indica alta coincidencia y que la última revisión no introdujo cambios. La redacción española sigue la lectura inglesa auditada, pero vuelve al hebreo para decidir entre los matices de מֵעַל, רַבִּים y תִדְלָחֵם.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; en este versículo no aplica.
  - Se usa «enturbiar» para תִדְלָחֵם por claridad idiomática y precisión semántica; no se suaviza a un término más general.
  - «Ganado» se eligió como equivalente contextualmente más natural de בְּהֵמָה en este oráculo, sin excluir la lectura más amplia de animales.
  - Se conserva el paralelismo entre «pie humano» y «pezuñas del ganado» para reflejar la estructura del hebreo.
