translation:
  language: es
  text: Y el rey de Babilonia hizo rey a Matanías[a], su tío, en su lugar, y cambió su nombre por el de Sedecías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nombró rey a Matanías ...». El verbo hebreo es causativo: el rey de Babilonia lo instaló como gobernante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּמְלֵךְ
  english_pob_choice: made ... king
  chosen_spanish: hizo rey a
  alternatives_spanish:
  - lo nombró rey
  - lo hizo gobernante
  lexicon: HALOT
  rationale: El piel causativo de מלך expresa instalación en el cargo. «Hizo rey a» conserva ese valor causativo con buena naturalidad en español, sin borrar que la acción viene del rey de Babilonia.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: the king of Babylon
  chosen_spanish: el rey de Babilonia
  alternatives_spanish:
  - el rey babilonio
  - el rey de Babel
  lexicon: HALOT
  rationale: La construcción posesiva en español se expresa de forma natural como «el rey de Babilonia». Mantiene la identificación histórica sin introducir un giro más técnico de lo necesario.
- source_word: מַתַּנְיָה
  english_pob_choice: Mattaniah
  chosen_spanish: Matanías
  alternatives_spanish:
  - Matanías
  - Mattanías
  lexicon: convención onomástica española
  rationale: Se usa la forma española asentada del nombre propio, manteniendo el vínculo reconocible con la tradición bíblica en español.
- source_word: דֹדוֹ
  english_pob_choice: his uncle
  chosen_spanish: su tío
  alternatives_spanish:
  - su tío paterno
  - su pariente
  lexicon: HALOT
  rationale: En este contexto histórico, דּוֹד indica el parentesco de tío. «Su tío» es idiomático y suficientemente preciso; «tío paterno» añadiría un matiz no exigido por el texto.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en lugar de él
  alternatives_spanish:
  - en su lugar
  - en vez de él
  lexicon: HALOT
  rationale: La idea de sustitución o sucesión se expresa bien con «en lugar de él». Es fiel al uso contextual de תחת en un escenario de entronización.
- source_word: וַיַּסֵּב
  english_pob_choice: changed
  chosen_spanish: cambió
  alternatives_spanish:
  - alteró
  - modificó
  - le cambió
  lexicon: HALOT
  rationale: Con el objeto «su nombre», סבב funciona idiomáticamente como «cambiar». «Cambió» comunica directamente la acción de renombrar.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - el nombre de él
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente el objeto del cambio; español también lo conserva de manera natural como «su nombre».
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Sedequías
  alternatives_spanish:
  - Sedecías
  - Ṣidquiyahu
  lexicon: convención onomástica española
  rationale: Se adopta la forma española tradicional y ampliamente entendida para el nombre. No se translitera el hebreo aquí porque el uso bíblico en español favorece la adaptación establecida.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo de WLC y coincide sustancialmente con el razonamiento auditado en inglés: el verbo causativo de מלך se mantiene explícito, דֹדוֹ se entiende como parentesco de tío en contexto histórico, תַּחְתָּיו como sustitución/sucesión, y וַיַּסֵּב con su complemento nominal se rinde como cambio de nombre. No se requiere revisión adicional según el control de concordancia alto.'
  spanish_consistency_notes:
  - Se conserva el paralelismo narrativo simple del versículo con coordinación por «y».
  - Se prefiere una adaptación onomástica española estable para el destinatario y el nuevo nombre.
  - La nota mantiene la alternativa de «nombró rey» para reflejar la posibilidad semántica del causativo sin perder la lectura principal.
