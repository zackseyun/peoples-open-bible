translation:
  language: es
  text: Tomarás dos piedras de ónice[a] y grabarás sobre ellas los nombres de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo shoham designa una piedra preciosa; tradicionalmente se traduce «ónice», aunque su identificación exacta es incierta y se han propuesto alternativas como «sardónice» o «berilo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: And you shall take
  chosen_spanish: Tomarás
  alternatives_spanish:
  - Y tomarás
  - Entonces tomarás
  lexicon: HALOT
  rationale: La forma verbal en secuencia tiene fuerza directiva; en español, el futuro de mandato expresa bien la orden. Omitir la conjunción inicial aquí hace la frase más natural y fluida, sin perder el valor sucesivo del contexto.
- source_word: שְׁתֵּי אַבְנֵי שֹׁהַם
  english_pob_choice: two onyx stones
  chosen_spanish: dos piedras de ónice
  alternatives_spanish:
  - dos piedras de shoham
  - dos piedras de sardónice
  - dos piedras de berilo
  lexicon: HALOT
  rationale: «Ónice» conserva la identificación tradicional y legible para el lector español, mientras que el término hebreo deja incertidumbre sobre la especie exacta de la piedra. «Piedras de ónice» mantiene la relación material del original sin forzar una identificación mineral absoluta.
- source_word: וּפִתַּחְתָּ
  english_pob_choice: and engrave
  chosen_spanish: grabarás
  alternatives_spanish:
  - esculpirás
  - inscribirás
  lexicon: HALOT
  rationale: En este contexto de incidir nombres sobre piedras preciosas, «grabar» comunica bien la acción técnica de hacer la inscripción en la superficie. «Inscribir» es posible, pero «grabar» conserva mejor la idea de tallar sobre la piedra.
- source_word: עֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellas
  alternatives_spanish:
  - en ellas
  - encima de ellas
  lexicon: HALOT
  rationale: «Sobre ellas» reproduce con naturalidad la relación espacial del hebreo y mantiene el referente femenino plural de «piedras».
- source_word: שְׁמוֹת
  english_pob_choice: the names
  chosen_spanish: los nombres
  alternatives_spanish:
  - nombres
  lexicon: HALOT
  rationale: El artículo definido ayuda en español a señalar el conjunto específico de nombres que deben grabarse, conforme al contexto.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos varones de Israel
  - los israelitas
  lexicon: HALOT
  rationale: Se conserva «hijos de Israel» para reflejar con precisión la referencia genealógica/tribal del hebreo. «Israelitas» suaviza el parentesco explícito y «hijos varones» añade una explicitación que el texto no formula.
translation_notes:
  revision_awareness: 'El pasaje coincide con la línea inglesa auditada: mando secuencial, dos piedras preciosas identificadas tradicionalmente como ónice, acción de grabar y referencia a los hijos de Israel. No se detectan revisiones textuales o cambios de sentido relevantes en el expediente recibido.'
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» por correspondencia directa con el hebreo y con la decisión inglesa de preservar la precisión genealógica.
  - Se evita «SEÑOR» porque en este versículo no aparece el tetragrámaton ni una cita del nombre divino.
  - «Grabar» se usa en sentido artesanal/técnico, no ornamental, para reflejar la incisión de nombres en piedra.
