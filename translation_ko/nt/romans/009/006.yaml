  yaml_path: translation/nt/romans/009/006.yaml
  text: But it is not as though the word of God has failed[b][a]. For not all those from Israel are Israel.
  footnotes:
  - marker: a
    text: Or 'those descended from Israel.' The Greek phrase denotes origin or descent.
    reason: lexical_alternative
  - marker: b
    text: The second 'Israel' is used in a narrower sense than the first; Paul distinguishes physical descent from the fuller covenantal sense of 'Israel.'
    reason: cross_reference
translation:
  language: ko
  text: 그러나 하나님의 말씀이 폐하여진 것은 아닙니다. 이스라엘에게서 난 사람이 다 이스라엘은 아니기 때문입니다.
  philosophy: optimal-equivalence
