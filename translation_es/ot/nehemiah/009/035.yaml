revisions:
- from: Aun en su reino[a], y en medio de tu gran bondad que les diste, y en la tierra ancha y fértil[b] que pusiste delante de ellos, no te sirvieron[c] y no se volvieron de sus malas obras[d].
  to: Aun en su reino, y en medio de tu gran bondad[a] que les diste, y en la tierra ancha y fértil[b] que pusiste delante de ellos, no te sirvieron[c] y no se apartaron de sus malas obras[d].
  rationale: Se reubica la nota [a] para que ancle correctamente en 'tu gran bondad' y se sustituye 'no se volvieron de sus malas obras' por 'no se apartaron de sus malas obras', que comunica el mismo sentido de שׁוּב מִן con español más natural y claro. Se conservan las demás decisiones léxicas del borrador por ser fieles al hebreo y al audit trail inglés.
