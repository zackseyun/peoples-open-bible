id: GEN.34.10
reference: Genesis 34:10
source:
  edition: WLC
  text: וְ/אִתָּ֖/נוּ תֵּשֵׁ֑בוּ וְ/הָ/אָ֨רֶץ֙ תִּהְיֶ֣ה לִ/פְנֵי/כֶ֔ם שְׁבוּ֙ וּ/סְחָר֔וּ/הָ וְ/הֵֽאָחֲז֖וּ בָּֽ/הּ׃
translation:
  text: You may dwell with us[a], and the land will be before you. Settle in it, trade in it[b], and acquire property in it.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and the land will be available to you'; literally, 'the land will be before you.'
    reason: lexical_alternative
  - marker: b
    text: Or 'take possession in it' or 'hold property in it.' The Hebrew likely refers to obtaining a landed holding or property rights.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִתָּנוּ תֵּשֵׁבוּ
  chosen: You may dwell with us
  alternatives:
  - you shall dwell with us
  - live with us
  - settle with us
  lexicon: HALOT
  rationale: יָשַׁב commonly means 'sit, dwell, live, settle.' In this invitation context, 'dwell with us' preserves the residential sense without sounding wooden. 'May' reflects the permissive/invitational force in context rather than a strict future prediction.
- source_word: וְהָאָרֶץ תִּהְיֶה לִפְנֵיכֶם
  chosen: and the land will be open before you
  alternatives:
  - and the land will be before you
  - and the land will lie before you
  - and the land will be available to you
  lexicon: HALOT
  rationale: The idiom 'be before' someone can denote availability or accessibility. 'Open before you' renders the idiomatic sense in natural English while retaining the image of the land being set before them.
- source_word: שְׁבוּ
  chosen: Settle in it
  alternatives:
  - dwell there
  - live there
  - remain there
  lexicon: HALOT
  rationale: A second imperative from יָשַׁב follows the statement about the land's availability. Since English style benefits from variation and the context concerns taking up residence in the land, 'Settle in it' is a natural contextual rendering.
- source_word: וּסְחָרוּהָ
  chosen: trade in it
  alternatives:
  - do business in it
  - travel about it for trade
  - engage in commerce in it
  lexicon: HALOT
  rationale: From סחר, the sense is commercial activity. 'Trade in it' is concise and clear; 'do business in it' is possible but slightly broader and less directly tied to commerce.
- source_word: וְהֵאָחֲזוּ בָּהּ
  chosen: and acquire property in it
  alternatives:
  - and get possessions in it
  - and take possession in it
  - and hold property in it
  lexicon: HALOT
  rationale: The Niphal of אָחַז here likely carries the sense of gaining a holding or property-right in the land, not merely physically grasping it. 'Acquire property in it' best communicates the socio-legal force in idiomatic English.
