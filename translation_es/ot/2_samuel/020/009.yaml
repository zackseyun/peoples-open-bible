translation:
  language: es
  text: 'Joab le dijo a Amasa[a]: «¿Estás bien, mi hermano?». Y Joab tomó la barba de Amasa con su mano derecha para besarlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tomar la barba y besar eran gestos asociados con un saludo familiar; aquí el gesto es engañoso en su contexto.
    reason: cultural_note
lexical_decisions:
- source_word: הֲשָׁלוֹם
  english_pob_choice: Is it well with you
  chosen_spanish: ¿Estás en paz?
  alternatives_spanish:
  - ¿Te va bien?
  - ¿Está todo bien?
  lexicon: HALOT
  rationale: La expresión hebrea es una pregunta idiomática por bienestar o paz. En español, «¿Estás en paz?» conserva el valor de saludo/fórmula de bienestar y mantiene la cercanía semántica con shalom sin sonar forzado.
- source_word: אָחִי
  english_pob_choice: my brother
  chosen_spanish: hermano mío
  alternatives_spanish:
  - mi hermano
  - hermano
  lexicon: HALOT
  rationale: El sufijo posesivo está explícito en hebreo. «Hermano mío» reproduce de forma directa la apelación fraternal y la calidez fingida del habla de Joab.
- source_word: וַתֹּחֶז
  english_pob_choice: took hold of
  chosen_spanish: tomó con su mano derecha
  alternatives_spanish:
  - agarró
  - se apoderó de
  lexicon: HALOT
  rationale: El verbo indica asir o tomar firmemente. En español, la idea se integra mejor con la frase siguiente para expresar la acción concreta de la mano sin cargar demasiado la violencia en el verbo mismo.
- source_word: יַד יְמִין יוֹאָב
  english_pob_choice: with his right hand Joab
  chosen_spanish: con su mano derecha
  alternatives_spanish:
  - con la mano derecha de Joab
  - con la diestra de Joab
  lexicon: HALOT
  rationale: El hebreo menciona literalmente la mano derecha de Joab. «Con su mano derecha» es natural en español y conserva el detalle corporal y narrativo del texto.
- source_word: בִּזְקַן עֲמָשָׂא
  english_pob_choice: Amasa’s beard
  chosen_spanish: la barba de Amasa
  alternatives_spanish:
  - la barba de Amasá
  - el mentón/barba de Amasa
  lexicon: HALOT
  rationale: El sustantivo designa la barba de manera directa. «La barba de Amasa» es la forma más clara y fiel en español, y mantiene el gesto cultural de saludo previamente descrito por la tradición POB.
- source_word: לִנְשָׁק לוֹ
  english_pob_choice: to kiss him
  chosen_spanish: para besarlo
  alternatives_spanish:
  - para darle un beso
  - para besarlo
  lexicon: HALOT
  rationale: El infinitivo final expresa propósito. «Para besarlo» transmite de forma natural la finalidad de la acción y conserva la lectura de un gesto amistoso usado engañosamente.
theological_decisions:
- issue: El saludo «shalom» como fórmula de bienestar o paz, no como afirmación doctrinal
  english_pob_reading: Is it well with you
  chosen_spanish_reading: ¿Estás en paz?
  alternative_spanish_readings:
  - ¿Te va bien?
  - ¿Todo está bien?
  rationale: No hay una tesis doctrinal aquí; el punto es pragmático y narrativo. Mantener «paz» conserva el campo semántico de shalom sin perder la función de saludo interpersonal.
  doctrine_reference: N/A
- issue: La señal de saludo resulta fingida en contexto
  english_pob_reading: the action is deceptive in context
  chosen_spanish_reading: la acción es engañosa en contexto
  alternative_spanish_readings:
  - el gesto es fingido
  - la intención es traicionera
  rationale: Aunque el verso no lo dice explícitamente, el contexto narrativo inmediato revela que el beso y el gesto de la barba son una apariencia de amistad. La redacción principal no lo agrega al texto, pero el sentido de la escena queda compatible con la nota.
  doctrine_reference: 2 Samuel 20:10
- issue: Uso de «hermano» como apelación fraternal y no necesariamente de parentesco estricto
  english_pob_reading: my brother
  chosen_spanish_reading: hermano mío
  alternative_spanish_readings:
  - mi hermano
  - hermano
  rationale: La forma reproduce la cercanía discursiva del hebreo. En español puede sonar más afectiva que genealógica, lo que encaja con el contexto de camaradería fingida.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail, que ajustó el orden para reflejar más naturalmente el hebreo sin cambiar el sentido: «And Joab took hold of Amasa’s beard with his right hand to kiss him». La versión española conserva ese orden narrativo: primero el saludo, luego la acción de la mano derecha sobre la barba, y finalmente el propósito de besar.'
  spanish_consistency_notes:
  - Se usa «Amasa» de manera uniforme como forma del nombre propia del apéndice auditado.
  - Se mantiene «Joab» como transliteración estable del nombre propio, sin castellanizarlo.
  - Se evita introducir «SEÑOR» o sustituciones litúrgicas, porque el versículo no contiene el nombre divino.
  - La puntuación reproduce una estructura de discurso directo seguida de narración, adecuada para lectura bíblica pública.
  - La nota al pie se vincula solo al nombre Amasa, según el patrón del texto base.
