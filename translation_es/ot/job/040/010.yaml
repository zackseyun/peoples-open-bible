translation:
  language: es
  text: Adórnate[a], por favor, de majestad y de elevación, y revístete de esplendor y de honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Engalánate ahora con orgullo y dignidad; revístete de gloria y majestad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲדֵה
  english_pob_choice: Adorn yourself
  chosen_spanish: Vístete
  alternatives_spanish:
  - Adórnate
  - Engálanate
  - Póntelo
  lexicon: HALOT
  rationale: El imperativo reflexivo de עדה expresa ponerse ornamento o vestidura de realce. En español, «Vístete» comunica de manera natural la imagen de revestirse para mostrar grandeza, y encaja con el paralelo final «cúbrete».
- source_word: נָא
  english_pob_choice: please
  chosen_spanish: te ruego
  alternatives_spanish:
  - por favor
  - ahora
  lexicon: HALOT
  rationale: La partícula introduce súplica o exhortación. «Te ruego» conserva mejor el tono de ruego solemne del contexto poético que un «por favor» más coloquial, y evita forzar el sentido temporal de «ahora».
- source_word: גָּאוֹן
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - exaltación
  - orgullo
  lexicon: HALOT
  rationale: En este contexto la palabra designa grandeza regia o imponente, no orgullo moral. «Majestad» refleja bien ese campo semántico en español y mantiene la lectura positiva del POB en inglés.
- source_word: גֹּבַהּ
  english_pob_choice: loftiness
  chosen_spanish: altura
  alternatives_spanish:
  - elevación
  - loftitud
  - altivez
  lexicon: HALOT
  rationale: El sentido literal es «altura», pero aquí acompaña a גָּאוֹן y refuerza la idea de elevación y grandeza. «Altura» es clara y no introduce la carga negativa de «altivez».
- source_word: הוֹד
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - gloria
  - magnificencia
  lexicon: HALOT
  rationale: Se refiere al brillo o magnificencia visible. «Esplendor» es un equivalente directo y distinguible de «majestad».
- source_word: הָדָר
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - dignidad
  - majestad
  - belleza
  lexicon: HALOT
  rationale: El término puede denotar dignidad, ornato u honor. Se conserva «honor» para respetar la distinción que el POB establece frente a הוֹד, y porque funciona bien en la acumulación poética del verso.
- source_word: תִּלְבָּשׁ
  english_pob_choice: clothe yourself
  chosen_spanish: cúbrete
  alternatives_spanish:
  - revístete
  - ponte
  - vístete
  lexicon: HALOT
  rationale: La forma verbal continúa la imagen de vestirse. «Cúbrete» mantiene la metáfora corporal y suena natural junto con «de esplendor y de honor»; «revístete» sería más literal, pero menos fluido en español.
theological_decisions:
- issue: Si גָּאוֹן y גֹּבַהּ deben tener matiz moral negativo o de grandeza regia/divina
  english_pob_reading: Rendered as positive attributes of majesty and loftiness in the divine challenge to Job.
  chosen_spanish_reading: 'Se traducen como atributos de grandeza e imponente elevación: «majestad» y «altura».'
  alternative_spanish_readings:
  - orgullo y altivez
  - soberbia y altivez
  - exaltación y elevación
  rationale: El contexto inmediato es un desafío divino que describe atributos de majestad. La secuencia con הוֹד y הָדָר favorece una acumulación de esplendor, no una acusación moral de soberbia. Traducir con «orgullo» o «altivez» introduciría una connotación que el marco no exige.
  doctrine_reference: Job 40:10; cf. el contraste retórico del discurso divino en Job 38–41
- issue: Cómo conservar la fuerza exhortativa de נָא sin hacer el español artificial
  english_pob_reading: please
  chosen_spanish_reading: «te ruego» como súplica solemne.
  alternative_spanish_readings:
  - por favor
  - ahora
  rationale: En poesía bíblica, la partícula puede funcionar como un llamado enfático o suplicante. «Te ruego» preserva el tono de exhortación respetuosa y evita que el verso suene meramente conversacional.
  doctrine_reference: HALOT, נָא; uso exhortativo en poesía hebrea
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo masorético de Job 40:10 y conserva la decisión del POB inglés de leer los sustantivos como rasgos de grandeza positiva en el contexto del discurso divino. Frente al inglés, se ajustó el arranque a una solución española más idiomática y solemne («Vístete, te ruego») sin alterar la imagen de revestirse.
  spanish_consistency_notes:
  - Se mantiene una distinción terminológica entre «majestad», «altura», «esplendor» y «honor» para reflejar la acumulación poética del hebreo.
  - No se usa «SEÑOR» ni terminología eclesiástica añadida; el versículo no contiene el tetragrámaton.
  - La nota alternativa conserva la posibilidad semántica de una lectura más cercana a «orgullo y dignidad» que el propio audit trail inglés documenta.
