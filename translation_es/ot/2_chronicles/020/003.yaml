translation:
  language: es
  text: Y Josafat tuvo miedo[a], y puso su rostro para buscar a Yahvé[b], y proclamó un ayuno en todo Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llegó a tener miedo». El verbo hebreo puede señalar el inicio del temor en la secuencia narrativa.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «puso su rostro». Es un modismo que expresa resolución firme o intención deliberada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרָא
  english_pob_choice: was afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - se atemorizó
  - llegó a temer
  - tuvo temor
  lexicon: HALOT
  rationale: El hebreo ירא expresa miedo real en la secuencia narrativa. «Tuvo miedo» es español natural y conserva la respuesta emocional directa sin suavizarla hacia una reverencia genérica. La alternativa «tuvo temor» es posible, pero «miedo» comunica con más claridad el valor básico del verbo en este contexto.
- source_word: וַיִּתֵּן ... אֶת־פָּנָיו
  english_pob_choice: set his face
  chosen_spanish: puso su rostro
  alternatives_spanish:
  - se determinó
  - resolvió
  - se volvió firmemente
  lexicon: HALOT
  rationale: La expresión idiomática hebrea literalmente dice «puso su rostro». Se conserva la imagen para reflejar la determinación deliberada de Josafat, siguiendo la decisión auditada del inglés POB de mantener la metáfora.
- source_word: לִדְרוֹשׁ
  english_pob_choice: to seek
  chosen_spanish: buscar
  alternatives_spanish:
  - consultar
  - acudir en busca de
  - buscar la ayuda de
  lexicon: HALOT
  rationale: דרש con Dios puede implicar buscar su ayuda o dirección. «Buscar» es el equivalente más amplio y menos restrictivo en español; «consultar» estrecha demasiado el sentido a una consulta oracular.
- source_word: לַיהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la terminología del proyecto en español, se vierte «Yahvé» para preservar el nombre del pacto y evitar el ocultamiento devocional de la forma divina.
- source_word: וַיִּקְרָא צ֖וֹם
  english_pob_choice: proclaimed a fast
  chosen_spanish: proclamó un ayuno
  alternatives_spanish:
  - declaró un ayuno
  - convocó un ayuno
  - publicó un ayuno
  lexicon: HALOT
  rationale: La combinación verbal indica una proclamación pública de ayuno. «Proclamó un ayuno» mantiene el tono formal y oficial del mandato real mejor que una formulación más coloquial.
- source_word: עַל כָּל יְהוּדָה
  english_pob_choice: throughout all Judah
  chosen_spanish: sobre todo Judá
  alternatives_spanish:
  - en todo Judá
  - por todo Judá
  - para todo Judá
  lexicon: HALOT
  rationale: El hebreo con עַל en este contexto señala el alcance de la proclamación sobre el conjunto de Judá. «Sobre todo Judá» conserva la fuerza distributiva y la cobertura pública del anuncio; en español puede sonar un poco más literal que «en todo Judá», pero refleja bien la amplitud del mandato.
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh / the LORD
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La decisión sigue el criterio del proyecto de representar el nombre divino revelado en hebreo con «Yahvé», en lugar de sustituirlo por un título. Esto mantiene visible la identidad del Dios del pacto en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'Se siguió el sentido confirmado por la auditoría inglesa: temor real de Josafat, conservación del modismo «poner su rostro», búsqueda dirigida a Yahvé y proclamación pública de ayuno. No hubo cambios sustanciales en la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» de forma consistente con la política terminológica del proyecto para יְהוָה.
  - Se preservó la metáfora hebrea «puso su rostro» porque el POB inglés la documenta como idiomática y significativa.
  - «Proclamó un ayuno» conserva el matiz público y oficial del verbo hebreo.
  - El verso se tradujo con estilo formal y publicación-readable, sin añadir explicaciones al cuerpo principal que excedan la evidencia del texto.
