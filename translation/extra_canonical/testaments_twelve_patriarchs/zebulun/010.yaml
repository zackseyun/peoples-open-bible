translation:
  text: |-
    And you will return to your land, and you will see him in Jerusalem because of his holy name; and healing and compassion will be in his wings. He himself will redeem every captivity of the sons of men from Beliar, and every spirit of deceit will be trampled down. And he will turn all the nations to zeal for him, and you will see God in the form of a man, whom the Lord will choose—Jerusalem is his name.
    
    9. And again, by the craftiness of your deeds you will provoke him to anger, and you will be cast away from him until the time of completion.
    
    10. And now, my children, do not be grieved because I am dying, nor fall down in sorrow because I am coming to my end. For I will rise again in your midst, as a ruler in the midst of the sons of righteousness; and I will rejoice in the midst of my tribe, all who keep the law of the Lord. But upon the ungodly the Lord will bring eternal fire, and he will destroy them for generations of generations. But as for me, I now hasten to my rest, as also my fathers did. But you, fear the Lord all the days of your life with all your strength.
    
    And when he had said these things, he fell asleep, and his sons placed him in a wooden coffin. Later they carried him up and buried him in Hebron with his fathers.
