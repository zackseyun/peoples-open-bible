translation:
  language: es
  text: Porque si tengo hambre, clamaré a ti, oh, Dios, y tú me darás[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice literalmente: «tú me darás»; el objeto no está expresado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πεινάσω
  english_pob_choice: am hungry
  chosen_spanish: tengo hambre
  alternatives_spanish:
  - si llego a tener hambre
  - si me da hambre
  lexicon: LEH; LSJ
  rationale: El aoristo subjuntivo con ἐὰν expresa una eventualidad futura. En español, «si tengo hambre» comunica esa contingencia de manera natural y directa, sin sobrecargar el verbo con perífrasis interpretativas.
- source_word: κεκράξομαι
  english_pob_choice: I will cry out
  chosen_spanish: clamaré
  alternatives_spanish:
  - gritaré
  - invocaré
  lexicon: LEH; LSJ
  rationale: «Clamar» preserva la fuerza intensa de κράζω y es un verbo bíblico claro en español. «Gritaré» puede sonar más físico que devocional; «invocaré» sería más interpretativo.
- source_word: ὁ θεός
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  lexicon: LEH; LSJ
  rationale: Aunque formalmente el griego tiene artículo nominativo, funciona como vocativo de dirección. «Oh Dios» reproduce bien la apelación directa en español y mantiene el tono de oración.
- source_word: δώσεις μοι
  english_pob_choice: you will give to me
  chosen_spanish: tú me darás
  alternatives_spanish:
  - me darás
  - tú me darás de
  lexicon: LEH; LSJ
  rationale: Se conserva el verbo simple «dar», en línea con la revisión inglesa que evitó expandirlo a «proveer». El objeto queda implícito, como en el griego, y el complemento dativo se refleja naturalmente con «me».
translation_notes:
  revision_awareness: La revisión inglesa final volvió de una expansión interpretativa («provide for me») a una traducción más literal («give to me»). La versión española sigue esa decisión y evita añadir «proveer» o explicitar un objeto no presente en el griego.
  spanish_consistency_notes:
  - Se mantiene el registro de súplica directa y poético-devocional.
  - «Oh Dios» conserva el valor vocativo sin convertirlo en una fórmula litúrgica rígida.
  - No se introduce «proveer», para no ir más allá del verbo griego y de la revisión final del POB inglés.
