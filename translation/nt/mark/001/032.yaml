theological_decisions:
- issue: Rendering of δαιμονιζομένους in a way that neither demythologizes nor over-specifies beyond the Greek
  chosen_reading: those who were demon-possessed
  alternative_readings:
  - the demonized
  - those oppressed by demons
  rationale: In keeping with historic Christian orthodoxy and original-language primacy, the translation preserves the text's reference to real demonic activity rather than reducing it to illness alone. 'Demon-possessed' is idiomatic English and communicates the basic sense without importing a detailed demonology beyond the verse.
  doctrine_reference: Affirmations; Translation philosophy §1 and §6
- issue: Aspect of ἔφερον
  chosen_reading: they were bringing
  alternative_readings:
  - they brought
  rationale: The imperfect portrays ongoing action. Preserving this avoids flattening the narrative flow and shows a continuing stream of people coming to Jesus.
  doctrine_reference: Translation philosophy §1 and §5
