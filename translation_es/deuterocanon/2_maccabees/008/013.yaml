translation:
  language: es
  text: Pero los que se habían vuelto cobardes y desconfiaban de la justicia de Dios seguían escapándose y yéndose al exilio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como “el juicio de Dios”; según el contexto, incluso “la venganza de Dios”.
    reason: lexical_alternative
lexical_decisions:
- source_word: δειλανδροῦντες
  english_pob_choice: had become cowardly
  chosen_spanish: se habían vuelto cobardes
  alternatives_spanish:
  - eran cobardes
  - habían actuado cobardemente
  - se mostraban tímidos
  lexicon: LSJ
  rationale: El participio expresa una cobardía ya asumida o resultante; el perfecto perifrástico en español, 'se habían vuelto cobardes', conserva ese matiz inceptivo/resultativo sin sonar rígido.
- source_word: ἀπιστοῦντες
  english_pob_choice: distrusted
  chosen_spanish: desconfiaban
  alternatives_spanish:
  - no creían
  - eran infieles
  - carecían de confianza en
  lexicon: BDAG/LSJ
  rationale: Como el objeto es 'la justicia de Dios', el sentido es falta de confianza en la acción justa de Dios, no incredulidad genérica. 'Desconfiaban' reproduce bien esa relación y funciona naturalmente en español.
- source_word: τὴν τοῦ θεοῦ δίκην
  english_pob_choice: the justice of God
  chosen_spanish: la justicia de Dios
  alternatives_spanish:
  - el juicio de Dios
  - la venganza de Dios
  - el castigo de Dios
  lexicon: LSJ
  rationale: La revisión inglesa prefirió 'justice' para δίκην; en español, 'justicia de Dios' preserva la amplitud semántica entre justicia recta y acto judicial, sin cerrar el sentido a venganza o castigo.
- source_word: διεδίδρασκον ἑαυτούς
  english_pob_choice: kept slipping away
  chosen_spanish: seguían escapándose
  alternatives_spanish:
  - seguían huyendo
  - se iban escapando
  - seguían retirándose
  lexicon: LSJ
  rationale: El imperfecto indica acción repetida o prolongada; 'seguían escapándose' comunica esa continuidad y el matiz de retirarse furtivamente o irse poco a poco.
- source_word: ἐξετόπιζον
  english_pob_choice: going into exile
  chosen_spanish: yéndose al exilio
  alternatives_spanish:
  - marchándose de la región
  - volviéndose fugitivos
  - saliendo de su tierra
  lexicon: LSJ
  rationale: El verbo sugiere ser desplazados o quedar fuera de su lugar; 'irse al exilio' conserva la idea de desarraigo y desplazamiento. En español, la construcción progresiva enlaza bien con el imperfecto anterior.
theological_decisions:
- issue: Sentido de τὴν τοῦ θεοῦ δίκην
  english_pob_reading: the justice of God
  chosen_spanish_reading: la justicia de Dios
  alternative_spanish_readings:
  - el juicio de Dios
  - la venganza de Dios
  rationale: La frase puede abarcar justicia, juicio o retribución. Se mantiene 'justicia' para seguir la revisión inglesa y no reducir la tensión teológica a una sola noción retributiva.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica cuando el texto permite más de una lectura legítima.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del texto inglés, que cambió 'judgment of God' por 'justice of God' para reflejar δίκην de manera más natural. La versión española sigue esa decisión y mantiene la posibilidad semántica alternativa mediante nota.
  spanish_consistency_notes:
  - Se usa 'Dios' de forma directa, sin sustituirlo por una convención de máscara litúrgica.
  - '''Justicia de Dios'' se mantiene consistente con la preferencia revisada en inglés para δίκην.'
  - Se conservó el imperfecto aspectual con 'seguían escapándose' para reflejar la iteración del griego.
  - '''Al exilio'' evita una paráfrasis excesiva y mantiene la idea de desplazamiento.'
