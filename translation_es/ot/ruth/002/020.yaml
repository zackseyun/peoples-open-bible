translation:
  language: es
  text: 'Noemí dijo a su nuera[a]: «Bendito sea él por Yahvé, cuya bondad[b] no ha abandonado a los vivos ni a los muertos». Luego Noemí le dijo: «Ese hombre es un pariente cercano; él es uno de nuestros redentores[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Bendito sea por Yahvé, cuya bondad no ha abandonado a los vivos ni a los muertos»; también puede entenderse que la bondad es la de Booz, no la de Yahvé, es decir, «que no ha dejado su bondad hacia los vivos y los muertos».'
    reason: alternative_reading
  - marker: b
    text: 'O: «lealtad de pacto» o «amor fiel»; el hebreo חֶסֶד tiene un campo semántico más amplio que «bondad».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «uno de nuestros parientes redentores»; el hebreo se refiere a un pariente cercano con el deber o el derecho reconocido de rescatar o redimir a un miembro de la familia o su propiedad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּרוּךְ הוּא לַיהוָה
  english_pob_choice: Blessed be he by Yahweh
  chosen_spanish: Bendito sea él por Yahvé
  alternatives_spanish:
  - Sea bendito por Yahvé
  - Bendito es él por Yahvé
  lexicon: HALOT
  rationale: La fórmula hebrea es una bendición desiderativa/pronunciativa. «Bendito sea» reproduce mejor esa fuerza que un simple presente descriptivo. «Por Yahvé» mantiene el valor del lamed con el nombre divino, sin sustituirlo por una máscara litúrgica.
- source_word: חַסְדּוֹ
  english_pob_choice: his kindness
  chosen_spanish: su bondad
  alternatives_spanish:
  - su misericordia
  - su lealtad de pacto
  - su amor fiel
  lexicon: HALOT
  rationale: El sustantivo hebreo חֶסֶד admite un campo semántico amplio. En este contexto, la lectura puede referirse a la bondad mostrada por Boaz o a la bondad de Yahvé; «bondad» es natural en español y conserva esa amplitud sin resolver en exceso la tensión del texto.
- source_word: לֹא עָזַב
  english_pob_choice: has not forsaken
  chosen_spanish: no ha abandonado
  alternatives_spanish:
  - no ha dejado
  - no ha forsado
  - no ha desamparado
  lexicon: HALOT
  rationale: «Abandonar» transmite bien el valor relacional de עזב en este contexto. Es claro en español y evita un giro arcaico, sin perder la fuerza de la afirmación negativa.
- source_word: אֶת הַחַיִּים וְאֶת הַמֵּתִים
  english_pob_choice: the living or the dead
  chosen_spanish: a los vivos ni a los muertos
  alternatives_spanish:
  - a los vivos y a los muertos
  - a los vivos o a los muertos
  lexicon: HALOT
  rationale: En español, tras una negación, «ni ... ni ...» expresa con naturalidad la totalidad abarcada por la frase. Mantiene el paralelismo de los dos grupos y la amplitud del dicho.
- source_word: קָרוֹב לָנוּ
  english_pob_choice: a close relative of ours
  chosen_spanish: un pariente cercano nuestro
  alternatives_spanish:
  - un pariente próximo nuestro
  - está emparentado cercanamente con nosotros
  lexicon: HALOT
  rationale: Aquí קָרוֹב tiene sentido de parentesco, no de cercanía espacial. «Pariente cercano» es la manera más directa y fiel de expresarlo en español.
- source_word: מִגֹּאֲלֵנוּ
  english_pob_choice: one of our redeemers
  chosen_spanish: uno de nuestros redentores
  alternatives_spanish:
  - uno de nuestros parientes redentores
  - uno de los que tienen derecho a rescatarnos
  lexicon: HALOT
  rationale: Se conserva «redentores» porque la POB inglesa ya documenta ese término como traducción del oficio familiar-jurídico de גֹּאֵל. «Pariente redentor» explica la relación, pero en el texto principal mantiene la terminología establecida por el proyecto.
theological_decisions:
- issue: Referente de la bendición y de «su bondad» en la cláusula inicial
  english_pob_reading: Naomi blesses Boaz ('Blessed be he by Yahweh'), and 'whose kindness has not forsaken...' refers to the LORD.
  chosen_spanish_reading: Noemí bendice a Booz, y «cuya bondad» puede oírse como la de Yahvé, aunque el hebreo también permite entenderla como la de Booz.
  alternative_spanish_readings:
  - Noemí bendice a Booz, y «su bondad» se refiere a Booz
  - La cláusula se deja más ambigua sin fijar el referente
  rationale: El hebreo permite debate sobre el referente pronominal. La traducción principal mantiene la bendición dirigida a Booz y deja abierta la posibilidad de que la bondad pertenezca a Yahvé o a Booz, sin borrar la tensión observada en el aparato inglés.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Naturaleza de «redentores» en מִגֹּאֲלֵנוּ
  english_pob_reading: one of our redeemers
  chosen_spanish_reading: uno de nuestros redentores
  alternative_spanish_readings:
  - uno de nuestros parientes redentores
  - uno de los que tienen derecho a rescatarnos
  rationale: La palabra גֹּאֵל designa una figura de parentesco con deberes y derechos legales de rescate. «Redentores» preserva el término establecido por la POB, y la nota puede aclarar su sentido familiar-jurídico.
  doctrine_reference: Lexical transparency for kinship-law terms in Ruth.
translation_notes:
  revision_awareness: La redacción inglesa revisada sustituyó «May he be blessed by the LORD» por «Blessed be he by the LORD» para reflejar más de cerca la fórmula hebrea. La versión española adopta una fórmula igualmente directa y solemne («Bendito sea él por Yahvé») y conserva la apertura interpretativa sobre el referente de «cuya bondad», siguiendo el criterio de revisión y la nota alternativa del aparato inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - «Redentores» mantiene la terminología POB para גֹּאֵל; la aclaración en nota preserva el valor familiar-jurídico.
  - «Noemí» y «Booz» siguen la transliteración española habitual del relato, sin introducir equivalentes ajenos al canon del proyecto.
  - La puntuación con comillas angulares y el orden de las cláusulas buscan una lectura natural en español sin alterar la estructura del hebreo.
