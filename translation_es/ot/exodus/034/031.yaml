translation:
  language: es
  text: Pero Moisés los llamó[a], y Aarón y todos los jefes de la asamblea volvieron a él, y Moisés les habló.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los jefes de la congregación» o «los jefes de la comunidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: los llamó
  alternatives_spanish:
  - los convocó
  - los llamó hacia sí
  lexicon: HALOT
  rationale: קרא, con אֲלֵהֶם, indica que Moisés se dirige a ellos. «Llamó» es la equivalencia natural y fiel; «convocó» intensifica la autoridad, y «los llamó hacia sí» resulta más explícito de lo que el hebreo exige.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - hacia ellos
  lexicon: HALOT
  rationale: El complemento directo e indirecto queda bien integrado en español con el pronombre átono «los» dentro de «los llamó». Mantiene la dirección del acto de habla sin repetir innecesariamente la preposición.
- source_word: וַיָּשֻׁבוּ אֵלָיו
  english_pob_choice: returned to him
  chosen_spanish: volvieron a él
  alternatives_spanish:
  - regresaron a él
  - volvieron hacia él
  lexicon: HALOT
  rationale: שׁוּב normalmente significa «volver/retornar». «Volvieron a él» conserva el movimiento de regreso y suena natural en español bíblico contemporáneo.
- source_word: הַנְּשִׂאִים
  english_pob_choice: the leaders
  chosen_spanish: los jefes
  alternatives_spanish:
  - los líderes
  - los principales
  lexicon: HALOT
  rationale: נָשִׂיא puede referirse a los dirigentes del pueblo. «Jefes» es un equivalente breve y bíblicamente sobrio; «líderes» es más moderno, y «principales» puede sonar menos claro.
- source_word: בָּעֵדָה
  english_pob_choice: of the congregation
  chosen_spanish: de la asamblea
  alternatives_spanish:
  - de la congregación
  - de la comunidad
  lexicon: HALOT
  rationale: עֵדָה designa al cuerpo reunido del pueblo. «Asamblea» comunica bien la reunión corporativa y evita un posible tono eclesiástico demasiado específico de «congregación».
- source_word: וַיְדַבֵּר
  english_pob_choice: spoke
  chosen_spanish: les habló
  alternatives_spanish:
  - habló con ellos
  - les dijo
  lexicon: HALOT
  rationale: דבר en piel es el verbo estándar de hablar. «Les habló» conserva la forma verbal y la relación personal del discurso; «les dijo» podría sonar más puntual, y «habló con ellos» añade reciprocidad no expresada aquí.
translation_notes:
  revision_awareness: Se mantuvo la estructura narrativa breve del hebreo y la leve oposición introducida por el waw inicial con «Pero», conforme al contexto inmediato en que Aarón y los dirigentes habían retrocedido antes de acercarse de nuevo a Moisés.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - Se prefirió «asamblea» para עֵדָה por su valor colectivo; «congregación» queda preservado en la nota como alternativa documentada.
  - «Jefes» traduce de forma concisa הַנְּשִׂאִים sin introducir jerarquía eclesiástica ajena al contexto.
  - La cláusula final «les habló» mantiene el verbo de hablar sin sobreinterpretar contenido adicional.
