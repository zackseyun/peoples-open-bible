translation:
  language: es
  text: 'Entonces Débora y Barac, hijo de Abinoam, cantaron aquel día[a], diciendo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa un verbo singular femenino, literalmente 'y cantó Débora', seguido de 'y Barac'; por el contexto, el sentido es que Débora y Barac cantaron juntos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּשַׁר
  english_pob_choice: sang
  chosen_spanish: cantaron
  alternatives_spanish:
  - cantó
  - entonaron
  lexicon: HALOT
  rationale: El verbo hebreo שׁיר significa 'cantar'. Como en el inglés POB, el sujeto de sentido es compuesto ('Débora y Barac'); por eso en español se expresa en plural, aunque la forma verbal hebrea sea singular y femenina concordando con Débora. 'Cantaron' transmite el acto de cantar sin añadir 'cántico' o 'canción', que no aparecen en este versículo.
- source_word: דְּבוֹרָה
  english_pob_choice: Deborah
  chosen_spanish: Débora
  alternatives_spanish:
  - Deborah
  lexicon: nombre propio
  rationale: Se usa la forma hispana usual del nombre propio, plenamente reconocible y fiel al referente original.
- source_word: וּבָרָק
  english_pob_choice: and Barak
  chosen_spanish: y Barac
  alternatives_spanish:
  - Barak
  lexicon: nombre propio
  rationale: Se conserva el nombre propio en forma española tradicional 'Barac', con la conjunción explícita 'y'.
- source_word: בֶּן אֲבִינֹעַם
  english_pob_choice: son of Abinoam
  chosen_spanish: hijo de Abinoam
  alternatives_spanish:
  - el hijo de Abinoam
  lexicon: patronímico
  rationale: 'La construcción patronímica hebrea se vierte de manera natural como ''hijo de Abinoam''. Se omite el artículo por la misma razón que en el inglés POB: la apposición funciona de forma transparente sin él.'
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  - ese día
  lexicon: HALOT
  rationale: El sentido temporal específico del hebreo se expresa con 'aquel día', que suena natural en español y conserva la referencia puntual al día de la victoria. 'En aquel día' sería más literal, pero menos idiomático aquí.
- source_word: לֵאמֹר
  english_pob_choice: '''saying:'''
  chosen_spanish: 'diciendo:'
  alternatives_spanish:
  - 'así diciendo:'
  - 'y dijo:'
  lexicon: HALOT
  rationale: La partícula quotativa introduce lo que sigue. 'Diciendo:' mantiene la transparencia formal y la relación directa con el discurso siguiente sin añadir contenido interpretativo.
theological_decisions:
- issue: Concordancia del verbo con el sujeto compuesto frente a la forma hebrea singular femenina
  english_pob_reading: The sense in context is that Deborah and Barak sang together.
  chosen_spanish_reading: 'La oración se formula con sujeto compuesto en plural: ''Débora y Barac ... cantaron''.'
  alternative_spanish_readings:
  - Entonces Débora cantó, y Barac, hijo de Abinoam, ...
  - Entonces cantó Débora y Barac, hijo de Abinoam, ...
  rationale: La forma hebrea del verbo es singular femenino y concuerda gramaticalmente con Débora, pero el propio contexto y la lectura auditada del POB entienden que Débora y Barac cantaron juntos. El español exige resolver la coordinación de modo natural, sin borrar la tensión gramatical del hebreo en la nota.
  doctrine_reference: Poética narrativa hebrea; nota de sintaxis textual
- issue: Inicio del discurso con partícula quotativa
  english_pob_reading: 'saying:'
  chosen_spanish_reading: 'diciendo:'
  alternative_spanish_readings:
  - 'así diciendo:'
  - 'y dijo:'
  rationale: La partícula לֵאמֹר introduce la cita del cántico que sigue. En español, 'diciendo:' preserva la función quotativa sin convertirla en una oración autónoma ni forzar un sujeto verbal que el hebreo no expresa aquí.
  doctrine_reference: Uso narrativo de fórmulas de cita en hebreo bíblico
translation_notes:
  revision_awareness: Se revisó el pasaje frente al audit trail inglés y el texto hebreo. No se detectaron revisiones posteriores que alteren el sentido; se mantiene la solución del POB inglés para el sujeto compuesto, adaptada al español con concordancia plural y nota sobre la forma verbal hebrea singular.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó 'Barac' como forma española del nombre propio, coherente con el registro bíblico en español.
  - No se añadió 'cántico' porque el versículo solo dice 'cantaron' y la canción se desarrolla en el discurso siguiente.
