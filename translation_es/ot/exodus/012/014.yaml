revisions:
- from: Y este día les será para memoria[a], y lo celebrarán como fiesta para Yahvé; por todas sus generaciones, lo celebrarán como estatuto perpetuo.
  to: Y este día les será como memorial, y lo celebrarán como fiesta para Yahvé; por todas sus generaciones, lo celebrarán como estatuto perpetuo[a].
  rationale: Se corrigió el anclaje de la nota para que corresponda a ‘estatuto perpetuo’, que es la frase explicada por la nota en el expediente inglés. También se ajustó ‘para memoria’ a ‘como memorial’ por mayor naturalidad y precisión cultual en español, sin alterar el sentido fuente.
