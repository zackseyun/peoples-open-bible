base_translation:
  language: en
  yaml_path: translation/ot/genesis/042/016.yaml
  text: Send one of you[a], and let him bring your brother, while you remain confined, so that your words may be tested, whether the truth is with you. But if not, as Pharaoh lives[d][c][b], surely you are spies.
  footnotes:
  - marker: a
    text: Or, more literally, 'and let him take your brother.' The Hebrew verb commonly means 'take,' but here it refers to fetching the brother and bringing him back.
    reason: lexical_alternative
  - marker: b
    text: Or 'and you be imprisoned' / 'and you remain under guard.' The Hebrew verb can denote being bound or held in custody.
    reason: lexical_alternative
  - marker: c
    text: Literally, 'whether the truth is with you,' that is, whether you are telling the truth.
    reason: lexical_alternative
  - marker: d
    text: '''As Pharaoh lives'' is an oath formula invoking Pharaoh''s life.'
    reason: cultural_note
