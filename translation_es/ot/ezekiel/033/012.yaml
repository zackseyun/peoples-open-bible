  to: 'Y tú, hijo de hombre, di a los hijos[a] de tu pueblo: la justicia del justo no lo librará en el día de su transgresión, y la maldad del impío no lo hará tropezar[b] en el día en que se aparte de su maldad[c]; y el justo no podrá vivir por ella en el día de su pecado.'
  rationale: 'Se corrigió la segunda cláusula para reflejar fielmente el hebreo: el sujeto del tropiezo es el impío, no su maldad como agente causativo. También se movió la nota [a] a la frase que realmente comenta y se añadieron las notas alternativas preservadas en el POB inglés para ''caer por ella'' y para el referente de ''ella'' en la simetría del verso.'
