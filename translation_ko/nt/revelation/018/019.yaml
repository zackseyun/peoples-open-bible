  text: καὶ ἔβαλον χοῦν ἐπὶ τὰς κεφαλὰς αὐτῶν καὶ ⸀ἔκραξαν κλαίοντες καὶ ⸀πενθοῦντες λέγοντες· Οὐαὶ οὐαί, ἡ πόλις ἡ μεγάλη, ἐν ᾗ ἐπλούτησαν πάντες οἱ ἔχοντες τὰ πλοῖα ἐν τῇ θαλάσσῃ ἐκ τῆς τιμιότητος αὐτῆς, ὅτι μιᾷ ὥρᾳ ἠρημώθη.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/018/019.yaml
  text: And they threw dust on their heads and cried out[a], weeping and mourning, saying, “Woe, woe, the great city, in which all who had ships on the sea became rich from her wealth[b], because in one hour she has been laid waste.”
  footnotes:
  - marker: a
    text: Or “Alas, alas.” The Greek interjection can express lament; “Woe, woe” is retained here to preserve the prophetic tone of judgment.
    reason: lexical_alternative
  - marker: b
    text: Or “from her costly luxury” or “from her splendor” for “from her wealth.” The Greek term can denote costliness, magnificence, or wealth.
    reason: lexical_alternative
translation:
  language: ko
  text: '그리고 그들은 자기들의 머리에 흙먼지를 뿌리고 울며 슬퍼하여 외쳐 말하였습니다. 「화로다, 화로다, 큰 도성이여! 바다에 배를 가진 모든 자가 그의 부유함으로 부유해졌더니, 한 시간에 그가 황폐하게 되었도다.」'
