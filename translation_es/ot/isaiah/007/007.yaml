translation:
  language: es
  text: 'Así dice el Señor Yahvé: no prevalecerá, y no llegará a cumplirse[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «no prevalecerá, y no será». La segunda cláusula significa que el plan no llegará a realizarse ni a suceder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּה
  english_pob_choice: Thus / This is what
  chosen_spanish: Así
  alternatives_spanish:
  - De este modo
  - Esto dice
  lexicon: HALOT
  rationale: En una fórmula profética, 'Así dice' conserva el carácter de declaración solemne y directa del hebreo, con español natural y digno.
- source_word: אָמַר
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: HALOT
  rationale: Aunque el verbo hebreo está en perfecto, en la fórmula profética el español idiomático usa presente para expresar la vigencia de la proclamación divina.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahveh
  lexicon: HALOT
  rationale: 'Se conserva la distinción del título compuesto: אֲדֹנָי como ''Señor'' y יְהוִה como ''Yahvé'', siguiendo el criterio del proyecto de no enmascarar el nombre divino. ''Señor Yahvé'' es más transparente que ''el Señor Dios'' y evita la redundancia de ''Señor Señor''.'
- source_word: לֹא תָקוּם
  english_pob_choice: It shall not stand
  chosen_spanish: no se sostendrá
  alternatives_spanish:
  - no permanecerá en pie
  - no se afirmará
  lexicon: HALOT
  rationale: קום aplicado a un plan o propósito expresa que no se mantendrá firme ni tendrá éxito. 'No se sostendrá' mantiene esa fuerza idiomática sin perder claridad en español.
- source_word: וְלֹא תִהְיֶה
  english_pob_choice: and it shall not come to pass
  chosen_spanish: y no sucederá
  alternatives_spanish:
  - y no llegará a ocurrir
  - y no se realizará
  lexicon: HALOT
  rationale: היה aquí apunta a la realización efectiva del plan o evento anunciado. 'Sucederá' comunica bien la idea de llegar a acontecer; se evita una paráfrasis excesiva y se preserva la coordinación negativa.
theological_decisions:
- issue: Rendering the divine name in the compound title אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé, con nota explicativa
  rationale: La base hebrea contiene directamente el Tetragrámaton. En español, 'Yahvé' responde al criterio doctrinal del proyecto y conserva el nombre pactual. El título compuesto se resuelve de forma natural como 'el Señor Yahvé'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El texto español sigue el audit trail del inglés POB: mantiene la fórmula profética solemne, conserva la tensión semántica de קום (''sostenerse'' / ''permanecer firme'') y de היה (''suceder'' / ''realizarse''), y adopta ''Yahvé'' conforme a la política del proyecto para el nombre divino.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' como máscara tipográfica; se usa 'Yahvé' para יְהוִה.
  - '''Señor'' se reserva para אֲדֹנָי en el título compuesto.'
  - La pareja 'no se sostendrá, y no sucederá' procura reflejar ambas cláusulas sin diluir la repetición negativa del hebreo.
  - El registro es formal pero contemporáneo, apto para lectura eclesial.
