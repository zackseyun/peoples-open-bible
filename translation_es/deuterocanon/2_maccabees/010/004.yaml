translation:
  language: es
  text: de ningún modo tomando en cuenta el poder de Dios[a], sino ensoberbecido por las decenas de miles de soldados de a pie, los millares de jinetes y los ochenta elefantes.
  philosophy: optimal-equivalence
  footnotes:
