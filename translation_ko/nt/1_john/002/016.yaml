id: 1JN.2.16
reference: 1 John 2:16
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅτι πᾶν τὸ ἐν τῷ κόσμῳ, ἡ ἐπιθυμία τῆς σαρκὸς καὶ ἡ ἐπιθυμία τῶν ὀφθαλμῶν καὶ ἡ ἀλαζονεία τοῦ βίου, οὐκ ἔστιν ἐκ τοῦ πατρός, ἀλλὰ ἐκ τοῦ κόσμου ἐστίν·
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/016.yaml
  text: For everything in the world—the desire of the flesh[a], the desire of the eyes, and the pride of life—is not from the Father[c][b], but is from the world.
  footnotes:
  - marker: a
    text: Or 'the lust of the flesh.' The Greek word can mean strong desire, craving, or lust; 'desire' is used here to avoid narrowing the sense to sexual desire alone.
    reason: lexical_alternative
  - marker: b
    text: Or 'the desire of the sinful nature.' Greek 'flesh' can, in some contexts, refer metaphorically to fallen human nature.
    reason: alternative_reading
  - marker: c
    text: Or 'the arrogance of life' or 'the pretension of worldly living.' The phrase may include pride in one's status, possessions, or way of life.
    reason: lexical_alternative
translation:
  language: ko
  text: 세상에 있는 모든 것 — 곧 육신의 욕망과 눈의 욕망과 인생의 자만 — 은 아버지께로부터 온 것이 아니라, 세상으로부터 온 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπιθυμία τῆς σαρκὸς / τῶν ὀφθαλμῶν
  english_pob_choice: desire of the flesh / of the eyes
  chosen_korean: 육신의 욕망 / 눈의 욕망
  alternatives_korean:
  - 육체의 정욕
  - 눈의 정욕
  lexicon: BDAG
  rationale: ἐπιθυμία는 강한 갈망 — 부정적 함의가 본 문맥에서 분명하다. 「욕망」이 한국어에서 그 강도를 담는다. 「정욕」도 가능하나 성적 함의로 좁아질 수 있다.
- source_word: ἀλαζονεία τοῦ βίου
  english_pob_choice: pride of life
  chosen_korean: 인생의 자만
  alternatives_korean:
  - 삶의 허영
  - 생활의 자랑
  lexicon: BDAG
  rationale: ἀλαζονεία는 자기 자랑·허영·과시. βίος는 외적 삶·생활 수단. 「인생의 자만」으로 옮기되 사회적 과시의 함의를 「자만」으로 담는다.
