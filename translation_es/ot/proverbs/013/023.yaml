  glossary_alignment: 'No hay términos del glosario maestro especialmente controvertidos aquí. «Justicia» alinea bien con מִשְׁפָּט. La principal desviación es léxica frente a la decisión auditada sobre נִיר: conviene mantener «barbecho» o expresión equivalente en el texto principal, no relegarla solo a nota.'
