    rationale: La nota dice «O ‘en el lugar santo’», que corresponde a בַּקֹּדֶשׁ, no a «los vestidos santos». El marcador debe ir sobre «en el santuario» o expresión equivalente.
  - severity: low
    issue: «Vestidos» es menos idiomático que «vestiduras» para prendas sacerdotales.
    rationale: Aunque comprensible, «vestidos» puede sonar más cotidiano o ambiguo en español actual. «Vestiduras» conserva el registro digno y natural en contexto cultual.
