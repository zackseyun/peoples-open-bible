translation:
  language: es
  text: Las ciudades serán para ustedes como refugio[a] del vengador, para que el homicida no muera hasta que comparezca ante la congregación para juicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vengador de sangre» o «pariente-vengador»; hebreo go'el, término de parentesco usado aquí para el que vengaría la sangre derramada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיוּ
  english_pob_choice: shall be
  chosen_spanish: serán
  alternatives_spanish:
  - habrán de ser
  - serán para ustedes
  lexicon: HALOT
  rationale: En legislación hebrea, el imperfecto con waw puede tener fuerza prescriptiva/futura. En español, «serán» comunica con naturalidad la disposición establecida sin forzar perífrasis.
- source_word: הֶעָרִים
  english_pob_choice: The cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - estas ciudades
  - los pueblos
  lexicon: HALOT
  rationale: «Ciudades» es el equivalente normal de עָרִים y mantiene el marco legal-administrativo del contexto de ciudades de refugio.
- source_word: לְמִקְלָט
  english_pob_choice: as a refuge
  chosen_spanish: como refugio
  alternatives_spanish:
  - para refugio
  - como asilo
  lexicon: HALOT
  rationale: La preposición y el sustantivo expresan función/provisión de protección. «Como refugio» es natural en español y conserva el valor de lugar de amparo.
- source_word: מִגֹּאֵל
  english_pob_choice: from the avenger
  chosen_spanish: de parte del vengador[a]
  alternatives_spanish:
  - del vengador de sangre
  - del pariente-vengador
  - del redentor-vengador
  lexicon: HALOT
  rationale: El hebreo גֹאֵל puede abarcar al pariente redentor/vengador, pero aquí su función es la venganza de sangre. El texto principal usa «vengador» por claridad; la nota conserva la amplitud kinship/legal del término.
- source_word: וְלֹא יָמוּת
  english_pob_choice: so that ... may not die
  chosen_spanish: para que ... no muera
  alternatives_spanish:
  - y ... no muera
  - para que ... no sea muerto
  lexicon: HALOT
  rationale: La cláusula expresa finalidad/protección. «Para que no muera» refleja bien el propósito sin añadir agente explícito que el hebreo no especifica aquí.
- source_word: הָרֹצֵחַ
  english_pob_choice: the manslayer
  chosen_spanish: el homicida
  alternatives_spanish:
  - el asesino
  - el matador
  - el homicida involuntario
  lexicon: HALOT
  rationale: En esta legislación, רֹצֵחַ puede abarcar al que ha dado muerte antes de la determinación judicial. «Homicida» mantiene la categoría legal amplia sin adjudicar todavía culpabilidad plena como «asesino».
- source_word: עַד עָמְדוֹ
  english_pob_choice: until he stands
  chosen_spanish: hasta que comparezca
  alternatives_spanish:
  - hasta que esté de pie
  - hasta que se presente
  - hasta que haya comparecido
  lexicon: HALOT
  rationale: El giro temporal indica comparecencia ante una instancia judicial. «Comparezca» expresa de forma natural y formal la acción de presentarse ante la autoridad para ser juzgado.
- source_word: לִפְנֵי הָעֵדָה
  english_pob_choice: before the congregation
  chosen_spanish: ante la congregación
  alternatives_spanish:
  - delante de la congregación
  - ante la asamblea
  - ante la comunidad
  lexicon: HALOT
  rationale: עֵדָה señala a la comunidad reunida con función judicial. «Congregación» conserva el tono pentateucal y corporativo; «ante» refleja la comparecencia pública.
- source_word: לַמִּשְׁפָּט
  english_pob_choice: for judgment
  chosen_spanish: para juicio
  alternatives_spanish:
  - para juzgamiento
  - para sentencia
  - para juicio legal
  lexicon: HALOT
  rationale: מִשְׁפָּט aquí designa el proceso/decisión judicial. «Para juicio» es breve, sobrio y suficientemente amplio para el sentido legal del término.
theological_decisions:
- issue: Estado del homicida antes de la decisión judicial
  english_pob_reading: Render as 'manslayer' rather than 'murderer'
  chosen_spanish_reading: Traducir como «homicida» y no como «asesino»
  alternative_spanish_readings:
  - asesino
  - matador
  rationale: El texto pospone la determinación hasta la comparecencia y el juicio. «Homicida» preserva la condición de quien ha causado una muerte sin cargar de antemano una condena moral-jurídica más fuerte que la que el hebreo exige aquí.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de גֹאֵל en la ley de sangre
  english_pob_reading: Main text 'avenger' with footnote preserving 'blood avenger/kinsman-avenger'
  chosen_spanish_reading: Texto principal «vengador» con nota que conserva la posibilidad «vengador de sangre» o «pariente-vengador»
  alternative_spanish_readings:
  - vengador de sangre
  - pariente-vengador
  - redentor-vengador
  rationale: El término hebreo tiene un trasfondo de parentesco y rescate, pero en este contexto funciona como el que vindica la sangre. El español principal mantiene la claridad; la nota resguarda la tensión semántica documentada.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión; no se reportaron problemas en la concordancia de revisión cruzada. Esta propuesta sigue esa lectura estable y mantiene la misma distinción legal entre refugio, comparecencia y juicio.
  spanish_consistency_notes:
  - Se mantiene «congregación» para עֵדָה por coherencia con el registro legal del Pentateuco.
  - Se usa «vengador» en el texto principal y se reserva la especificación kinship/legal para la nota, conforme al equilibrio de claridad y precisión del POB inglés.
  - «Homicida» evita imponer la etiqueta moral «asesino» antes del juicio, en línea con la cautela del original.
