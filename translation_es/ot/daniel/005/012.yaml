translation:
  language: es
  text: porque en Daniel, a quien el rey puso por nombre Belsasar, fueron hallados un espíritu[a] extraordinario, conocimiento y entendimiento para interpretar sueños, explicar enigmas y resolver dificultades. Ahora que se llame a Daniel, y él dará a conocer la interpretación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un espíritu excelente».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל קֳבֵל דִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: La expresión aramea introduce la razón de la recomendación de la reina. «Porque» reproduce con naturalidad la fuerza causal sin añadir matices no presentes en el texto.
- source_word: ר֣וּחַ יַתִּירָ֡ה
  english_pob_choice: an extraordinary spirit
  chosen_spanish: un espíritu extraordinario
  alternatives_spanish:
  - un espíritu excelente
  - un espíritu excepcional
  lexicon: HALOT
  rationale: «Espíritu» conserva la ambigüedad productiva del hebreo/arameo entre disposición, capacidad interior o endowment personal; «extraordinario» mantiene el valor intensivo de יַתִּירָה sin forzar una lectura específicamente pneumatológica.
- source_word: וּ/מַנְדַּ֡ע
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - conocimiento y sabiduría
  lexicon: HALOT
  rationale: El término expresa conocimiento o saber adquirido; «conocimiento» es el equivalente más directo y permite distinguirlo del siguiente término de discernimiento.
- source_word: וְ/שָׂכְלְתָנ֡וּ
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - inteligencia
  lexicon: HALOT
  rationale: El segundo sustantivo añade la idea de comprensión práctica o discernimiento. «Entendimiento» mantiene la distinción con «conocimiento» y suena natural en español bíblico contemporáneo.
- source_word: מְפַשַּׁ֣ר חֶלְמִין֩
  english_pob_choice: to interpret dreams
  chosen_spanish: para interpretar sueños
  alternatives_spanish:
  - para interpretar los sueños
  - para explicar sueños
  lexicon: HALOT
  rationale: La construcción participial describe capacidad habitual. «Para interpretar sueños» conserva la función y el contenido sin sobredeterminar el aspecto verbal.
- source_word: וַֽ/אַֽחֲוָיַ֨ת אֲחִידָ֜ן
  english_pob_choice: explain riddles
  chosen_spanish: explicar enigmas
  alternatives_spanish:
  - explicar acertijos
  - dar a conocer enigmas
  lexicon: HALOT
  rationale: El sustantivo arameo apunta a dichos oscuros o cuestiones enigmáticas. «Enigmas» es más amplio y elegante que «acertijos», y encaja bien con el marco sapiencial de la corte.
- source_word: וּ/מְשָׁרֵ֣א קִטְרִ֗ין
  english_pob_choice: solve difficulties
  chosen_spanish: resolver dificultades
  alternatives_spanish:
  - desatar nudos
  - resolver problemas
  lexicon: HALOT
  rationale: El giro es literalmente metafórico («desatar nudos»), pero el inglés POB ya optó por una equivalencia más natural. «Resolver dificultades» comunica con claridad la metáfora de solucionar asuntos complejos sin sonar forzado en español.
- source_word: הִשְׁתְּכַ֤חַת בֵּ/הּ֙
  english_pob_choice: were found in him
  chosen_spanish: se hallaron en él
  alternatives_spanish:
  - se encontraron en él
  - fueron halladas en él
  lexicon: HALOT
  rationale: La forma verbal refleja que estas cualidades estaban presentes en Daniel. El español impersonal plural mantiene el conjunto de atributos enumerados y suena natural.
- source_word: דִּֽי מַלְכָּ֥/א שָׂם שְׁמֵ֖/הּ בֵּלְטְשַׁאצַּ֑ר
  english_pob_choice: whom the king named Belteshazzar
  chosen_spanish: a quien el rey puso por nombre Belsasar
  alternatives_spanish:
  - a quien el rey llamó Belsasar
  - a quien el rey nombró Belsasar
  lexicon: HALOT
  rationale: La expresión aramea literalmente dice que el rey «puso su nombre». «Puso por nombre» conserva mejor esa formulación que «llamó» y evita perder el matiz de imposición/otorgamiento del nombre.
- source_word: כְּעַ֛ן
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pues ahora
  - Así que ahora
  lexicon: HALOT
  rationale: Marca el paso de la descripción a la exhortación. «Ahora» es breve, claro y adecuado al tono discursivo del pasaje.
- source_word: יִתְקְרֵ֖י
  english_pob_choice: let Daniel be called
  chosen_spanish: que llamen a Daniel
  alternatives_spanish:
  - que se llame a Daniel
  - llámen a Daniel
  lexicon: HALOT
  rationale: El jussivo/pasivo pide una orden indirecta. «Que llamen a Daniel» expresa bien la convocatoria en español contemporáneo; la pasiva «que se llame» es posible, pero menos directa.
- source_word: וּ/פִשְׁרָ֥/ה יְהַֽחֲוֵֽה
  english_pob_choice: he will show the interpretation
  chosen_spanish: él dará a conocer la interpretación
  alternatives_spanish:
  - él mostrará la interpretación
  - él hará conocer la interpretación
  lexicon: HALOT
  rationale: El verbo significa hacer saber, declarar o dar a conocer. Esta opción mantiene la idea de exposición del sentido sin calcar una metáfora menos natural en español.
theological_decisions:
- issue: Sentido de «espíritu» en la descripción de Daniel
  english_pob_reading: human spirit/disposition marked by extraordinary wisdom
  chosen_spanish_reading: un espíritu extraordinario como cualidad interior de Daniel
  alternative_spanish_readings:
  - el Espíritu de Dios
  - un don espiritual
  rationale: El contexto enumera capacidades sapienciales atribuidas a Daniel y no identifica de forma explícita al Espíritu de Dios en esta cláusula. «Un espíritu extraordinario» preserva la ambigüedad textual y evita resolver prematuramente una tensión interpretativa.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Intensidad de la lista sapiencial
  english_pob_reading: 'accumulated qualities: spirit, knowledge, understanding, dream interpretation, riddles, knots/difficulties'
  chosen_spanish_reading: acumulación de capacidades sapienciales y prácticas
  alternative_spanish_readings:
  - lista de dones espirituales
  - lista de aptitudes
  rationale: El pasaje funciona como elogio cortesano mediante acumulación retórica. La traducción debe conservar esa serie de capacidades sin reducirla a una sola idea abstracta.
  doctrine_reference: Narrative/sapiential context of Daniel 5.
translation_notes:
  revision_awareness: La base inglesa fue ajustada en su última revisión para reemplazar «solve knots» por «solve difficulties» como una equivalencia más natural del idiom arameo. La presente redacción sigue esa decisión, pero conserva en español la posibilidad metafórica subyacente sin volver a una literalidad extraña.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino.
  - Se prefirió «Belsasar» como forma española del nombre Belteshazzar para lectura fluida y tradicionalmente reconocible, manteniendo el referente histórico del nombre impuesto por el rey.
  - 'Se mantuvo la progresión retórica del original: razón causal, lista de cualidades, identificación de Daniel y orden final de convocatoria.'
  - Se evitó «Cristo/Mesías» y otras terminologías ajenas al versículo.
  - «Enigmas» y «dificultades» conservan mejor en español la amplitud semántica de los términos arameos que opciones más estrechas como «acertijos» o «problemas».
