  to: 'Después de estas cosas, la palabra de Yahvé vino a Abram en una visión, diciendo: «No temas, Abram. Yo soy un escudo para ti[a]; tu recompensa será muy grande».'
  rationale: Se ajusta «en visión» a «en una visión» por naturalidad y fidelidad idiomática en español. Se reemplaza la nota temporal por la alternativa textual/interpretativa realmente documentada en la auditoría inglesa para la cláusula final, y se mueve el marcador al punto pertinente del texto.
