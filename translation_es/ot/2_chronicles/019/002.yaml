translation:
  language: es
  text: 'Jehú hijo de Hanani, el vidente, salió a encontrarlo[a] y dijo al rey Josafat: «¿Acaso debes ayudar al malo y amar a los que odian a Yahvé? Por eso, hay ira sobre ti[b] de la presencia de Yahvé».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «salió delante de él». El hebreo expresa un modismo de encuentro.'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «de delante de Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא אֶל־פָּנָיו
  english_pob_choice: went out to meet him
  chosen_spanish: salió a encontrarlo
  alternatives_spanish:
  - salió delante de él
  - salió a su presencia
  lexicon: HALOT
  rationale: El hebreo es un modismo de encuentro, no una salida física 'ante su rostro' en sentido literal. 'Salir a encontrarlo' comunica bien la acción narrativa sin calcar de forma extraña en español.
- source_word: הַחֹזֶה
  english_pob_choice: the seer
  chosen_spanish: el vidente
  alternatives_spanish:
  - el profeta
  lexicon: HALOT
  rationale: '''חֹזֶה'' es un título profético específico. ''Vidente'' conserva mejor esa distinción lexical que el término más general ''profeta''.'
- source_word: הֲלָרָשָׁע לַעְזֹר
  english_pob_choice: Should you help the wicked
  chosen_spanish: ¿Acaso debes ayudar al malo?
  alternatives_spanish:
  - ¿Debes ayudar al impío?
  - ¿Acaso es para ayudar al malo?
  lexicon: HALOT
  rationale: La pregunta retórica expresa reprensión. 'Al malo' mantiene el artículo genérico del hebreo y es natural en español; 'impío' también sería posible, pero 'malo' sigue mejor la fuerza amplia del término sin sobrecargarlo teológicamente.
- source_word: וּלְשֹׂנְאֵי יְהוָה
  english_pob_choice: and love those who hate Yahweh
  chosen_spanish: y amar a los que odian a Yahvé
  alternatives_spanish:
  - y amar a los que aborrecen a Yahvé
  - y amar a los enemigos de Yahvé
  lexicon: HALOT
  rationale: Se conserva la forma participial 'los que odian' para mantener el carácter verbal del hebreo. 'Amar a los que odian' refleja bien la ironía moral de la reprensión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: ''Yahvé''. Mantiene el nombre divino propio en lugar de sustituirlo por un título.'
- source_word: וּבָזֹאת
  english_pob_choice: Because of this
  chosen_spanish: Por esto
  alternatives_spanish:
  - Y por esto
  - A causa de esto
  - Por esa razón
  lexicon: HALOT
  rationale: La frase es causal y remite al acto previo de Josafat. 'Por esto' es breve, claro y conserva la relación causal sin añadir explicaciones.
- source_word: עָלֶיךָ קֶּצֶף
  english_pob_choice: wrath is upon you
  chosen_spanish: sobre ti hay ira
  alternatives_spanish:
  - hay indignación contra ti
  - la ira está sobre ti
  lexicon: HALOT
  rationale: En español, 'sobre ti hay ira' preserva la construcción concreta del hebreo con mejor fluidez que una paráfrasis más abstracta. 'Ira' reproduce el peso judicial del término.
- source_word: מִלִּפְנֵי יְהוָה
  english_pob_choice: from the presence of Yahweh
  chosen_spanish: de parte de Yahvé
  alternatives_spanish:
  - de la presencia de Yahvé
  - desde delante de Yahvé
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'de delante de Yahvé', pero en este contexto la idea es origen/procedencia del juicio divino. 'De parte de Yahvé' comunica esa procedencia con naturalidad en español y evita un giro demasiado literal.
theological_decisions:
- issue: Traducción del Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la política del proyecto de renderizar el Tetragrámaton como 'Yahvé'. Esto conserva el nombre personal del Dios de Israel sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance moral de 'the wicked' y 'those who hate Yahweh'
  english_pob_reading: generic moral categories rather than naming Ahab explicitly in the wording
  chosen_spanish_reading: categorías morales generales
  alternative_spanish_readings:
  - el malo (es decir, Acab)
  - los enemigos de Yahvé
  rationale: El hebreo formula la reprensión en categorías morales amplias, no en una paráfrasis con nombre propio. La traducción mantiene ese alcance y evita estrechar indebidamente el texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: Never paraphrase beyond what the source text warrants'
translation_notes:
  revision_awareness: 'La redacción sigue la lectura revisada del POB inglés, que ajustó la última cláusula para expresar con más naturalidad la procedencia del juicio divino: no como una formulación literal rígida, sino como una relación de origen desde la presencia de Yahvé. En español, se optó por ''de parte de Yahvé'' para preservar ese sentido sin perder fluidez.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' de forma consistente para יְהוָה.
  - '''Vidente'' se usa como título técnico para הַחֹזֶה, no como simple adjetivo.'
  - La sintaxis reproduce la pregunta retórica con tono de reprensión, sin añadir elementos no presentes en el hebreo.
  - '''Ira'' traduce קֶּצֶף con fuerza judicial, evitando suavizar el término.'
