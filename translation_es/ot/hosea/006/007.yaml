  to: Pero ellos[a], como Adán, transgredieron el pacto; allí me fueron infieles.
  rationale: Se mantiene intacta la estructura principal del borrador, pero se ajusta la última cláusula para reflejar mejor בָּגְדוּ בִי con un giro español más natural y más fiel al matiz de deslealtad relacional de pacto. También se conserva la nota de ambigüedad sobre אָדָם, con una formulación idiomática suficiente en español.
