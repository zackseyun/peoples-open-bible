id: 1CO.16.19
reference: 1 Corinthians 16:19
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀσπάζονται ὑμᾶς αἱ ἐκκλησίαι τῆς Ἀσίας. ⸀ἀσπάζεται ὑμᾶς ἐν κυρίῳ πολλὰ Ἀκύλας καὶ ⸀Πρίσκα σὺν τῇ κατ’ οἶκον αὐτῶν ἐκκλησίᾳ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/016/019.yaml
  text: The churches of Asia greet you[a]. Aquila and Prisca, together with the church in their house[b], greet you warmly in the Lord.
  footnotes:
  - marker: a
    text: '"Asia" here refers to the Roman province of Asia in western Asia Minor, not the modern continent.'
    reason: cultural_note
  - marker: b
    text: Greek has "Prisca"; elsewhere she is also called "Priscilla" (for example, Acts 18:2, 18, 26; Rom. 16:3).
    reason: lexical_alternative
translation:
  language: ko
  text: 아시아의 교회들이 여러분에게 문안합니다. 아굴라와 브리스가가 그들 집에 있는 교회와 함께 주 안에서 여러분에게 간곡히 문안합니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 여기서 「아시아」는 소아시아 서부의 로마 속주 「아시아」를 가리키며, 현대의 아시아 대륙이 아니다.
    reason: cultural_note
  - marker: b
    text: 헬라어는 「브리스가」(Πρίσκα)이며, 다른 본문에서는 「브리스길라」(Πρίσκιλλα)로도 불린다(행 18:2, 18, 26; 롬 16:3 등).
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀκύλας καὶ Πρίσκα
  english_pob_choice: Aquila and Prisca
  chosen_korean: 아굴라와 브리스가
  alternatives_korean:
  - 아굴라와 브리스길라
  lexicon: BDAG
  rationale: 본 절의 헬라어 「브리스가」를 그대로 음역. 별칭 「브리스길라」는 각주.
