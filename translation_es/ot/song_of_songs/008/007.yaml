review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del POB inglés: conserva la imaginería de «muchas aguas», «apagar el amor», la hipótesis «si un hombre diera», y la idea final de desprecio intenso. Sin embargo, en la segunda línea «ni lo arrastran los ríos» debilita y altera levemente la modalidad de imposibilidad del hebreo, que repite la negación con verbo de capacidad/resultado en paralelismo. También la nota al pie está mal anclada: el marcador [a] aparece junto a «amor» en el texto, pero la nota explica la cláusula final «bōz yābûzû lô».'
  spanish_quality_summary: El español es generalmente claro y digno, pero «ni lo arrastran los ríos» suena menos natural poéticamente que «ni los ríos pueden arrastrarlo» o «ni los ríos lo arrasan». Además, la colocación del marcador de nota en «amor[a]» confunde al lector, porque la variante se refiere al verbo final de desprecio, no al sustantivo «amor».
  glossary_alignment: 'No hay términos del glosario mayor en juego aparte de usos comunes. «Amor», «riqueza» y «casa» están bien. La decisión poética principal debe preservar el paralelismo verbal: «no pueden apagar... ni los ríos pueden arrastrarlo».'
  issues:
  - severity: medium
    issue: La cláusula «ni lo arrastran los ríos» no refleja plenamente la fuerza paralela del hebreo.
    rationale: 'El hebreo tiene una segunda negación paralela: וּנְהָרוֹת לֹא יִשְׁטְפוּהָ. En español, el presente simple «arrastran» puede leerse gnómico o descriptivo; «ni los ríos pueden arrastrarlo» conserva mejor la idea de imposibilidad, en línea con «no pueden apagar».'
  - severity: high
    issue: La nota al pie está anclada en el lugar equivocado.
    rationale: El marcador [a] aparece después de «amor», pero la nota explica la intensificación de בּוֹז יָבֻזוּ לוֹ al final del versículo. Según las instrucciones, el marcador debe aparecer en la palabra o frase relevante.
  - severity: low
    issue: La redacción de la nota al pie puede naturalizarse un poco más en español.
    rationale: «El hebreo expresa fuerte desprecio» suena algo rígido; «expresa un desprecio intenso» es más natural sin perder precisión.
  revised_spanish_text: Muchas aguas no pueden apagar el amor, ni los ríos pueden arrastrarlo. Si un hombre diera toda la riqueza de su casa por amor, sería despreciado por completo[a].
  revised_footnotes:
  - marker: a
    text: 'O: «seguramente lo despreciarían». El hebreo expresa un desprecio intenso mediante un infinitivo absoluto junto con un verbo finito.'
    reason: lexical_alternative
  revision_rationale: Se corrige la segunda línea para reflejar mejor el paralelismo y la modalidad del hebreo, y se mueve la nota al pie a la cláusula final, que es donde realmente aplica la alternativa léxica documentada por el POB inglés. También se pule levemente la redacción de la nota para que suene más natural en español.
