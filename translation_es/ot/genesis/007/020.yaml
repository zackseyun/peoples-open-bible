translation:
  language: es
  text: Las aguas prevalecieron quince codos por encima[b][a], y los montes quedaron cubiertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: ''Las aguas prevalecieron quince codos hacia arriba, y los montes quedaron cubiertos.'''
    reason: lexical_alternative
  - marker: b
    text: Un codo era una antigua unidad de longitud, aproximadamente la distancia del codo a la punta de los dedos.
    reason: cultural_note
lexical_decisions:
- source_word: חֲמֵשׁ עֶשְׂרֵה
  english_pob_choice: fifteen
  chosen_spanish: quince
  alternatives_spanish:
  - quince
  lexicon: HALOT
  rationale: El numeral hebreo expresa simplemente la cantidad 'quince'; en español se mantiene sin expansión.
- source_word: אַמָּה
  english_pob_choice: cubits
  chosen_spanish: codos
  alternatives_spanish:
  - codos
  - aproximadamente 45 cm / unos 45 centímetros
  lexicon: HALOT
  rationale: אַמָּה designa la medida antigua 'cubit'; en español bíblico claro, 'codo' conserva la unidad histórica sin convertirla en la línea principal.
- source_word: מִלְמַעְלָה
  english_pob_choice: upward
  chosen_spanish: hacia arriba
  alternatives_spanish:
  - arriba
  - hacia arriba
  - por encima
  lexicon: HALOT
  rationale: La frase marca extensión vertical respecto del nivel de referencia; 'hacia arriba' es natural en español y conserva el sentido direccional.
- source_word: גָּבְרוּ
  english_pob_choice: prevailed
  chosen_spanish: prevalecieron
  alternatives_spanish:
  - prevalecieron
  - se impusieron
  - subieron
  lexicon: HALOT
  rationale: El verbo גבר en este contexto no solo describe aumento de nivel, sino una fuerza de las aguas que domina; 'prevalecieron' mantiene esa fuerza lexical que el POB inglés preservó.
- source_word: הַמָּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - las aguas
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo se refleja mejor con 'las aguas', que además suena natural en el relato del diluvio.
- source_word: וַיְכֻסּוּ
  english_pob_choice: were covered
  chosen_spanish: fueron cubiertos
  alternatives_spanish:
  - fueron cubiertos
  - quedaron cubiertos
  - se cubrieron
  lexicon: HALOT
  rationale: El pasivo verbal se conserva en español para reflejar la morfología hebrea; se mantiene la cobertura como resultado sobre los montes.
- source_word: הֶהָרִים
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - los montes
  - las montañas
  lexicon: HALOT
  rationale: '''הרים'' puede traducirse ''montes'' o ''montañas''; ''montes'' es una opción bíblica natural en español y evita una posible connotación geográfica demasiado moderna.'
theological_decisions:
- issue: Describir la altura del agua con fuerza más que solo con elevación física
  english_pob_reading: The waters prevailed fifteen cubits upward
  chosen_spanish_reading: Las aguas prevalecieron quince codos hacia arriba
  alternative_spanish_readings:
  - Las aguas subieron quince codos hacia arriba
  - Las aguas se elevaron quince codos hacia arriba
  rationale: Se conserva el matiz de dominio/fuerza de גבר, no reducido a simple ascenso; esto sigue la decisión inglesa de 'prevailed' y evita borrar la intensidad del diluvio.
  doctrine_reference: Génesis 7:20; léxico verbal de גבר
- issue: Mantener la cobertura pasiva de los montes
  english_pob_reading: and the mountains were covered
  chosen_spanish_reading: y fueron cubiertos los montes
  alternative_spanish_readings:
  - y los montes quedaron cubiertos
  - y los montes fueron cubiertos
  rationale: El pasivo respeta la forma hebrea y no introduce un agente explícito inexistente en el texto.
  doctrine_reference: Génesis 7:20; pasivo verbal hebreo
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa que reemplazó 'rose ... higher' por una formulación que refleja mejor גברו y מִלְמַעְלָה. En español se adoptó 'prevalecieron ... hacia arriba' para conservar ese matiz de fuerza y verticalidad sin convertirlo en una paráfrasis amplia.
  spanish_consistency_notes:
  - Se mantiene 'codos' como unidad antigua, coherente con el POB inglés que retuvo 'cubits'.
  - Se eligió 'las aguas' en plural para reflejar el hebreo y el estilo narrativo del diluvio.
  - Se prefirió 'montes' como equivalente bíblico natural de הָרִים en este contexto.
