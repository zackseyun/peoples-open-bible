translation:
  language: es
  text: Pan sin levadura[a] se comerá durante los siete días, y no se verá contigo[b] alimento leudado[c], ni se verá contigo levadura[d] en todo tu territorio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «panes sin levadura». El hebreo מַצּוֹת designa pan hecho sin levadura; el plural puede reflejar varias piezas o el alimento de la fiesta en conjunto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no se verá contigo». La expresión implica que no debe quedar nada de ello en tu posesión o ámbito durante esos siete días.
    reason: lexical_alternative
  - marker: c
    text: O «cosa leudada». El hebreo חָמֵץ se refiere aquí a lo leudado o fermentado en general, en contraste con שְׂאֹר en la cláusula siguiente, que señala más específicamente el agente leudante.
    reason: lexical_alternative
  - marker: d
    text: El hebreo שְׂאֹר se refiere más específicamente al agente leudante, como levadura o fermento.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַצּוֹת
  english_pob_choice: unleavened bread
  chosen_spanish: pan sin levadura
  alternatives_spanish:
  - pan ácimo
  - panes sin levadura
  - matzot
  lexicon: HALOT
  rationale: En el contexto pascual, la expresión designa pan hecho sin levadura. 'Pan sin levadura' comunica con claridad el sentido ritual y mantiene el referente alimentario sin transliterar.
- source_word: יֵאָכֵל
  english_pob_choice: shall be eaten
  chosen_spanish: se comerá
  alternatives_spanish:
  - deberá comerse
  - ha de comerse
  - será comido
  lexicon: HALOT
  rationale: El nifal pasivo exige una construcción pasiva o media en español. 'Se comerá' conserva la pasividad de la forma hebrea y su valor normativo sin forzar una orden explícita más fuerte que el texto.
- source_word: אֵת שִׁבְעַת הַיָּמִים
  english_pob_choice: throughout the seven days
  chosen_spanish: durante los siete días
  alternatives_spanish:
  - a lo largo de los siete días
  - por los siete días
  - a través de los siete días
  lexicon: HALOT
  rationale: La frase marca duración completa. 'Durante los siete días' es natural en español y conserva el alcance temporal total del mandato.
- source_word: יֵרָאֶה לְךָ
  english_pob_choice: shall be seen with you
  chosen_spanish: se verá contigo
  alternatives_spanish:
  - se verá junto a ti
  - se hallará contigo
  - aparecerá contigo
  lexicon: HALOT
  rationale: La literalidad hebrea dice 'no será visto contigo'. En español, 'se verá contigo' preserva la cercanía al original y permite la lectura idiomática de presencia/posesión dentro del ámbito de la persona.
- source_word: חָמֵץ
  english_pob_choice: leaven
  chosen_spanish: levadura
  alternatives_spanish:
  - leudado
  - cosa leudada
  - pan leudado
  lexicon: HALOT
  rationale: Siguiendo la revisión inglesa, חָמֵץ aquí se refiere al leudado/leaven de manera amplia, no al agente específico. En español, 'levadura' funciona como término general y evita redundancia con la segunda cláusula.
- source_word: שְׂאֹר
  english_pob_choice: yeast
  chosen_spanish: levadura
  alternatives_spanish:
  - fermento
  - masa madre
  - agente leudante
  lexicon: HALOT
  rationale: El término apunta al agente fermentador. 'Levadura' es el equivalente más accesible y, aunque no distingue tan finamente como el inglés 'yeast', comunica el sentido básico para lectores bíblicos en español.
- source_word: בְּכָל גְּבֻלֶךָ
  english_pob_choice: within all your territory
  chosen_spanish: en todo tu territorio
  alternatives_spanish:
  - dentro de todo tu territorio
  - en todos tus límites
  - por todo tu territorio
  lexicon: HALOT
  rationale: La frase expresa extensión total de la jurisdicción o posesión. 'En todo tu territorio' es claro, amplio y fiel al marco legal-ritual del verso.
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo de Éxodo 13:7 y toma en cuenta el ajuste del POB inglés que prefirió 'leaven' para חָמֵץ y 'yeast' para שְׂאֹר. Se evitó traducir mecánicamente desde el inglés y se mantuvo la distinción lexical básica entre el producto/leudado y el agente leudante, aunque en español ambas nociones pueden solaparse parcialmente.
  spanish_consistency_notes:
  - Se prefirió 'pan sin levadura' como equivalente natural y reverente de מַצּוֹת.
  - Se mantuvo el pasivo con 'se comerá' para respetar el valor verbal del nifal.
  - La repetición de 'levadura' en las dos cláusulas refleja una limitación real del español frente a la distinción del hebreo entre חָמֵץ y שְׂאֹר; la nota aclara el matiz.
  - '''En todo tu territorio'' conserva el alcance total de בְּכָל גְּבֻלֶךָ sin recurrir a un calco duro de ''fronteras''.'
