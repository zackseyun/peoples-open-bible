translation:
  language: es
  text: Que recuerde todas tus ofrendas[a] y reciba con agrado[b] tu holocausto. Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tus ofrendas de cereal'; hebreo minḥah puede referirse específicamente a una ofrenda de cereal o, de modo más amplio, a una ofrenda o presente.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'haga engordar' o 'considere rico', un modismo para recibir el sacrificio favorablemente.
    reason: lexical_alternative
lexical_decisions:
- source_word: יִזְכֹּ֥ר
  english_pob_choice: May he remember
  chosen_spanish: Que recuerde
  alternatives_spanish:
  - Que se acuerde
  - Que tenga presente
  - Que recuerde él
  lexicon: HALOT
  rationale: El verbo qal imperfecto en este contexto de súplica funciona como deseo u oración; en español, el subjuntivo exhortativo 'Que recuerde' expresa mejor la petición que un futuro o un imperativo directo.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todas las
  - cada una de
  - todos
  lexicon: HALOT
  rationale: En plural concuerda naturalmente con 'ofrendas' y conserva la fuerza comprehensiva de כָּל sin añadir expansión innecesaria.
- source_word: מִנְחֹתֶךָ
  english_pob_choice: your offerings
  chosen_spanish: tus ofrendas
  alternatives_spanish:
  - tus ofrendas de cereal
  - tu ofrenda de cereal
  - tus dones
  lexicon: HALOT
  rationale: מִנְחָה puede ser ofrenda, presente o específicamente ofrenda de cereal. En paralelo con 'holocausto', 'ofrendas' mantiene la amplitud semántica del hebreo y evita decidir en el cuerpo principal una especificación cultual que el verso no fuerza de manera exclusiva.
- source_word: וְעוֹלָתְךָ
  english_pob_choice: and your burnt offering
  chosen_spanish: tu holocausto
  alternatives_spanish:
  - tu ofrenda quemada
  - tu ofrenda íntegramente quemada
  - tu sacrificio quemado
  lexicon: HALOT
  rationale: עוֹלָה es el término técnico para el holocausto. 'Holocausto' es el equivalente cultual tradicional y preciso en español bíblico; se prefiere a perífrasis menos idiomáticas.
- source_word: יְדַשְּׁנֶה
  english_pob_choice: accept
  chosen_spanish: reciba con agrado
  alternatives_spanish:
  - lo considere graso
  - lo haga prosperar
  - lo estime rico
  lexicon: HALOT
  rationale: El piel de דשן conserva la imagen de gordura/riqueza, pero en contexto sacrificial la POB la interpreta como recepción favorable. 'Reciba con agrado' comunica esa aceptación benevolente sin perder del todo la idea de favor implícita.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se mantiene la transliteración porque la función exacta del término es incierta y no conviene sobretraducirlo.
theological_decisions:
- issue: Sujeto implícito de los verbos en tercera persona singular
  english_pob_reading: 'The implied subject is God, rendered simply as ''he'' in the prayer: ''May he remember... and accept...'''
  chosen_spanish_reading: 'Se deja implícito en español: ''Que recuerde... y reciba...'''
  alternative_spanish_readings:
  - Que Dios recuerde... y reciba...
  - Que él recuerde... y reciba...
  rationale: El hebreo presenta formas verbales de 3ª persona sin sujeto explícito; en el marco del salmo la oración va dirigida a Yahvé. El español puede omitir el sujeto sin pérdida de referencia, evitando una sobreexplicación que el texto no exige.
  doctrine_reference: Contexto litúrgico de oración a Yahvé en el Salmo 20
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, manteniendo la tensión léxica de מִנְחָה y el modismo de דשן mediante una traducción principal natural en español y notas de alternativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma de referencia divina en el proyecto cuando aparezca el nombre divino; aquí el versículo no lo expone explícitamente, así que no se inserta.
  - '''Holocausto'' se usa en sentido cultual bíblico, no en su uso moderno extrabíblico.'
  - '''Selah'' se conserva sin traducir por la misma razón que en el POB inglés.'
