translation:
  language: es
  text: El primer día habrá para ustedes una santa asamblea[a], y el séptimo día una santa asamblea. No se hará ningún trabajo en esos días[b], excepto lo que cada persona deba comer[c]; solo eso podrá prepararse para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una asamblea sagrada» o, tradicionalmente, «una santa convocación».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «en ellos»; la referencia es a los días mencionados.'
    reason: source_note
  - marker: c
    text: 'Hebreo: «para toda néfesh», es decir, para toda persona; no «alma» en sentido moderno. Lit. «solo eso se hará para ustedes»; el sentido es que únicamente se permite la preparación del alimento necesario para comer.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְרָא קֹדֶשׁ
  english_pob_choice: holy assembly
  chosen_spanish: santa asamblea
  alternatives_spanish:
  - asamblea sagrada
  - santa convocación
  lexicon: HALOT
  rationale: La expresión hebrea designa una reunión convocada con carácter sagrado. «Santa asamblea» conserva el sentido de reunión y de consagración, es natural en español y evita un tecnicismo eclesiástico innecesario.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: there shall be ... for you
  chosen_spanish: habrá para ustedes
  alternatives_spanish:
  - será para ustedes
  - ustedes tendrán
  lexicon: HALOT
  rationale: El hebreo expresa existencia/establecimiento con el complemento dativo. «Habrá para ustedes» mantiene esa fuerza y suena más natural que una traducción más rígida.
- source_word: כָּל מְלָאכָה
  english_pob_choice: No work
  chosen_spanish: ningún trabajo
  alternatives_spanish:
  - ninguna obra
  - ningún labor
  lexicon: HALOT
  rationale: En este contexto legal y festivo, מְלָאכָה abarca trabajo en general. «Ningún trabajo» comunica bien el alcance total de כָּל sin especificar más de lo que el hebreo dice.
- source_word: לֹא יֵעָשֶׂה בָהֶם
  english_pob_choice: shall be done on them
  chosen_spanish: no se hará en ellos
  alternatives_spanish:
  - no se realizará en ellos
  - no se hará durante ellos
  lexicon: HALOT
  rationale: Se conserva la pasiva impersonal del hebreo. «En ellos» refleja literalmente el sufijo plural, y el contexto temporal de los días deja claro el sentido.
- source_word: אַךְ
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - pero
  - sólo que
  lexicon: HALOT
  rationale: Aquí introduce una excepción a la prohibición. «Excepto» expresa esa función de manera directa y precisa.
- source_word: אֲשֶׁר יֵאָכֵל לְכָל נֶפֶשׁ
  english_pob_choice: what every person must eat
  chosen_spanish: lo que haya de comerse por toda persona
  alternatives_spanish:
  - lo que cada persona deba comer
  - lo que toda persona comerá
  lexicon: HALOT
  rationale: נֶפֶשׁ en este contexto significa persona, no «alma». «Lo que haya de comerse» conserva la referencia a alimento y la necesidad práctica implícita, sin introducir una idea ajena al texto.
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - vida
  - alma
  lexicon: HALOT
  rationale: En esta ley, נֶפֶשׁ refiere a un individuo humano. «Persona» evita la carga metafísica que tendría «alma» en español moderno.
- source_word: הוּא לְבַדּוֹ
  english_pob_choice: that alone
  chosen_spanish: eso solo
  alternatives_spanish:
  - eso únicamente
  - eso mismo solo
  lexicon: HALOT
  rationale: La construcción enfatiza exclusividad. «Eso solo» mantiene el contraste restrictivo con fluidez en español.
- source_word: יֵעָשֶׂה לָכֶם
  english_pob_choice: may be prepared for you
  chosen_spanish: se hará para ustedes
  alternatives_spanish:
  - se preparará para ustedes
  - les será hecho
  lexicon: HALOT
  rationale: El verbo hebreo es general («ser hecho/realizado»), pero en el contexto se refiere a la preparación del alimento permitido. «Se hará para ustedes» conserva el valor básico sin añadir una explicitación innecesaria en el texto principal.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el rastro auditado en inglés: conserva la repetición de «santa asamblea», la negación absoluta de todo trabajo y la excepción limitada a la comida necesaria. Se evitó un calco de «convocación» en el texto principal por claridad, pero se dejó como alternativa documentada en la nota.'
  spanish_consistency_notes:
  - Se usó «Yahvé» según el estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se prefirió «santa asamblea» como equivalente natural de מִקְרָא קֹדֶשׁ, manteniendo abierta la alternativa tradicional «santa convocación» en la nota.
  - «Persona» traduce נֶפֶשׁ por su valor legal concreto y evita «alma» como falso amigo.
  - La excepción final se mantuvo restringida al alimento, conforme al contexto del pasaje y al rastro auditado en inglés.
