translation:
  language: es
  text: Llegó a los rediles de las ovejas junto al camino, y allí había una cueva. Saúl entró para aliviarse[a], y David y sus hombres estaban sentados en lo más hondo de la cueva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'para cubrir sus pies', un modismo hebreo para decir que iba a aliviarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: גִּדְר֨וֹת הַצֹּאן
  english_pob_choice: the sheepfolds
  chosen_spanish: los rediles de las ovejas
  alternatives_spanish:
  - los apriscos de las ovejas
  - los corrales de ovejas
  lexicon: HALOT
  rationale: גִּדְרוֹת refiere a enclosures o cercados; con הַצֹּאן, el sentido concreto es el de lugares cerrados para el rebaño. 'Rediles de las ovejas' conserva la imagen física y es claro en español.
- source_word: עַל הַדֶּרֶךְ
  english_pob_choice: by the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - por el camino
  - al borde del camino
  lexicon: HALOT
  rationale: La frase sitúa los rediles en relación con la ruta. 'Junto al camino' transmite bien la proximidad sin volver la expresión innecesariamente rígida.
- source_word: מְעָרָה
  english_pob_choice: a cave
  chosen_spanish: una cueva
  alternatives_spanish:
  - una gruta
  - una caverna
  lexicon: HALOT
  rationale: '''Cueva'' es el equivalente natural y fiel para מְעָרָה en este contexto narrativo.'
- source_word: לְהָסֵךְ אֶת רַגְלָיו
  english_pob_choice: to relieve himself
  chosen_spanish: para cubrir sus pies
  alternatives_spanish:
  - para aliviarse
  - para hacer sus necesidades
  lexicon: HALOT
  rationale: Se conserva la metáfora hebrea literal porque el texto fuente la usa y el POB inglés la documenta en nota. En el cuerpo se mantiene la formulación idiomática original, y el sentido se explica en nota.
- source_word: בְּיַרְכְּתֵי הַמְּעָרָה
  english_pob_choice: in the innermost parts of the cave
  chosen_spanish: en lo más hondo de la cueva
  alternatives_spanish:
  - en el fondo de la cueva
  - en sus rincones más apartados
  lexicon: HALOT
  rationale: יַרְכְּתֵי expresa la parte más remota o profunda. 'Lo más hondo' comunica esa distancia espacial de manera natural en español.
- source_word: יֹשְׁבִים
  english_pob_choice: were sitting
  chosen_spanish: estaban sentados
  alternatives_spanish:
  - se hallaban sentados
  - estaban allí sentados
  lexicon: HALOT
  rationale: El participio describe su postura/presencia inmediata dentro de la cueva. 'Estaban sentados' preserva la escena con fluidez narrativa.
- source_word: וַיָּבֹא ... וַיָּבֹא
  english_pob_choice: He came ... Saul went in
  chosen_spanish: Llegó ... Saúl entró
  alternatives_spanish:
  - Vino ... Saúl entró
  - Se acercó ... Saúl entró
  lexicon: HALOT
  rationale: Se conserva la secuencia narrativa con un español natural. La variación evita la repetición dura y mantiene el avance de la escena.
translation_notes:
  revision_awareness: El texto base en inglés permanece sin cambios sustantivos en la auditoría más reciente; el español sigue de cerca el hebreo y conserva la nota idiomática sobre ‘cubrir sus pies’ para no perder la tensión lexical documentada.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable aquí porque el versículo no contiene el tetragrámaton ni un título divino explícito.
  - Se usa 'cueva' para מְעָרָה y no 'gruta' por ser la opción más natural en narración bíblica.
  - Se evita 'SEÑOR' para cualquier nombre divino, conforme a la política general, aunque este versículo no la requiere.
  - Se preserva la nota idiomática hebrea en el cuerpo y en la nota al pie para reflejar la decisión auditada del POB inglés.
