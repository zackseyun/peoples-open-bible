translation:
  language: es
  text: Y así como él llamó y ellos no quisieron escuchar, así también ellos llamarán y yo no escucharé, dice Yahvé de los Ejércitos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «el SEÑOR de los ejércitos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַאֲשֶׁר
  english_pob_choice: And just as
  chosen_spanish: Y así como
  alternatives_spanish:
  - Y aconteció que cuando
  - Y como
  lexicon: HALOT
  rationale: La construcción introduce una comparación correlativa; en español, «Y así como» conserva la relación de correspondencia sin cargar el inicio con una fórmula más pesada que no aporta más sentido aquí.
- source_word: קָרָא
  english_pob_choice: he called
  chosen_spanish: él llamó
  alternatives_spanish:
  - él proclamó
  - él gritó
  lexicon: HALOT
  rationale: «Llamó» mantiene el valor amplio de קרא y, además, preserva el paralelismo verbal con יִקְרְאוּ («llamarán») en la segunda mitad del versículo.
- source_word: וְלֹא שָׁמֵעוּ
  english_pob_choice: they would not listen
  chosen_spanish: no quisieron escuchar
  alternatives_spanish:
  - no escucharon
  - no oyeron
  lexicon: HALOT
  rationale: Aquí שׁמע expresa una negativa a atender obedientemente; «no quisieron escuchar» comunica mejor la resistencia volitiva que un simple «no escucharon» o «no oyeron».
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - entonces
  - de la misma manera
  lexicon: HALOT
  rationale: «Así» funciona bien como correlativo del «Y así como» anterior y expresa la correspondencia justa entre la acción humana y la respuesta divina.
- source_word: יִקְרְאוּ
  english_pob_choice: they will call
  chosen_spanish: ellos llamarán
  alternatives_spanish:
  - ellos clamarán
  - ellos pedirán
  lexicon: HALOT
  rationale: 'Se conserva la misma raíz verbal en español para reflejar el paralelismo deliberado del hebreo: llamar / escuchar.'
- source_word: וְלֹא אֶשְׁמָע
  english_pob_choice: and I will not listen
  chosen_spanish: y yo no escucharé
  alternatives_spanish:
  - y no oiré
  - pero no escucharé
  lexicon: HALOT
  rationale: «Escucharé» reproduce el sentido relacional y responsivo de שׁמע. Se añade «yo» para hacer explícito el contraste enfático del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: La política del proyecto para español usa «Yahvé» como forma principal del nombre divino. Se evita la sustitución por un título y se mantiene el nombre propio del pacto.
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de las Huestes
  - de los Ejércitos celestiales
  lexicon: HALOT
  rationale: «Ejércitos» traduce con mayor claridad moderna el título צְבָאוֹת que el tradicional «Huestes». El plural articula el carácter majestuoso y militar del título sin volverlo opaco.
theological_decisions:
- issue: Título divino יְהוָה צְבָאוֹת
  english_pob_reading: Yahweh of Armies
  chosen_spanish_reading: Yahvé de los Ejércitos
  alternative_spanish_readings:
  - el SEÑOR de los ejércitos
  - Yahvé de las Huestes
  rationale: Se preserva el nombre divino Yahvé y se traduce צְבָאוֹת con «de los Ejércitos» para comunicar el sentido del título sin recurrir a la sustitución litúrgica del Tetragrama ni a una expresión demasiado arcaica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Simetría de respuesta entre el llamado humano y el divino
  english_pob_reading: they would not listen ... I will not listen
  chosen_spanish_reading: no quisieron escuchar ... yo no escucharé
  alternative_spanish_readings:
  - no escucharon ... no escucharé
  - no quisieron oír ... no oiré
  rationale: 'La formulación española conserva la reciprocidad judicial del texto: el rechazo previo del pueblo es respondido por la negativa divina. «Escuchar» mantiene el vínculo semántico con שׁמע y su dimensión de obediencia.'
  doctrine_reference: Principio contextual de retribución justa en la profecía; cf. el paralelismo del versículo
translation_notes:
  revision_awareness: Se revisó el último pase y no se detectaron cambios necesarios; la presente redacción sigue la misma solución exegética y solo adapta la realización española para mantener el paralelismo verbal y la claridad lectora.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del Tetragrama en español, conforme a la política del proyecto.
  - Se conserva el paralelismo llamar/escuchar para reflejar la estructura retórica del hebreo.
  - «Ejércitos» se usa de manera consistente para צְבָאוֹת en el título divino.
  - No se introduce vocabulario eclesiástico sustitutivo que atenúe el valor del texto fuente.
