translation:
  language: es
  text: Yahvé tu Dios mismo va cruzando delante de ti[a]. Él mismo destruirá a estas naciones de delante de ti, y tú las desposeerás[b]. Josué mismo va cruzando delante de ti, tal como Yahvé ha hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘va delante de ti’ / ‘cruzará delante de ti’. El participio hebreo puede expresar acción continua, inminente o futura cierta.
    reason: lexical_alternative
  - marker: b
    text: O ‘tomarás posesión de ellas/de su tierra’. El verbo hebreo puede incluir la idea de tomar posesión al desposeer a los ocupantes previos.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrama se conserva como nombre propio divino en la línea del proyecto; en español, ‘Yahvé’ es la forma estándar elegida para mantener el nombre de pacto y no sustituirlo por un título.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios del pacto
  - tu Dios, tu Dios
  lexicon: HALOT
  rationale: La forma con sufijo de segunda persona se expresa de manera directa y natural como ‘tu Dios’, manteniendo la relación de pacto sin añadir matices no presentes en el hebreo.
- source_word: הוּא
  english_pob_choice: himself
  chosen_spanish: mismo
  alternatives_spanish:
  - él
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático; en español, añadir ‘mismo’ preserva esa fuerza sin sonar forzado. Se repite tanto para Yahvé como para Josué para conservar el paralelismo enfático.
- source_word: עֹבֵר לְפָנֶיךָ
  english_pob_choice: is crossing over before you
  chosen_spanish: irá delante de ti
  alternatives_spanish:
  - está cruzando delante de ti
  - cruza delante de ti
  - irá cruzando delante de ti
  lexicon: HALOT
  rationale: El participio hebreo puede expresar acción inminente o cierta; en español, ‘irá delante de ti’ comunica adecuadamente la certeza/proximidad futura en un registro natural. Se evita una calca incómoda que oscurezca la lectura.
- source_word: יַשְׁמִיד
  english_pob_choice: will destroy
  chosen_spanish: destruirá
  alternatives_spanish:
  - aniquilará
  - exterminará
  lexicon: HALOT
  rationale: El hifil de שׁמד expresa causar destrucción. ‘Destruirá’ reproduce la fuerza del verbo sin intensificarla con términos más específicos que el contexto inmediato no obliga.
- source_word: הַגּוֹיִם הָאֵלֶּה
  english_pob_choice: these nations
  chosen_spanish: estas naciones
  alternatives_spanish:
  - estos pueblos
  - estas gentes
  lexicon: HALOT
  rationale: ‘Naciones’ conserva el valor político-ethnic del hebreo en Deuteronomio y sigue bien el contraste con la toma de posesión de la tierra.
- source_word: מִלְּפָנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - ante ti
  lexicon: HALOT
  rationale: La secuencia con מִן más לִפְנֵי se expresa con naturalidad como ‘de delante de ti’, manteniendo la idea espacial de remoción fuera del camino de Israel.
- source_word: וִירִשְׁתָּם
  english_pob_choice: you will dispossess them
  chosen_spanish: las desposeerás
  alternatives_spanish:
  - las tomarás en posesión
  - las heredarás
  - tomarás posesión de ellas
  lexicon: HALOT
  rationale: En contexto de conquista, ירשׁ incluye la idea de tomar posesión mediante despojar a los ocupantes previos. ‘Desposeerás’ conserva esa tensión léxica mejor que una simple ‘heredarás’.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Yehoshúa
  lexicon: HALOT
  rationale: Nombre propio bíblico asentado en español; ‘Josué’ es la forma inteligible y tradicional sin perder la referencia al personaje histórico.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה
  english_pob_choice: just as Yahweh has spoken
  chosen_spanish: tal como Yahvé ha hablado
  alternatives_spanish:
  - como Yahvé ha hablado
  - según ha dicho Yahvé
  lexicon: HALOT
  rationale: דִּבֶּר es ‘hablar/decir’ en forma enfática; ‘ha hablado’ conserva el carácter solemne y completo de la palabra divina sin convertirla en ‘promesa’, que sería interpretativo.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio de pacto, no un título. Mantener ‘Yahvé’ preserva la intención textual y la política terminológica del proyecto en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Énfasis en la agencia divina y humana
  english_pob_reading: Retain emphatic 'himself' for both subjects
  chosen_spanish_reading: Él mismo / mismo
  alternative_spanish_readings:
  - él
  - solo
  rationale: El verso subraya que Yahvé va delante de Israel y que Josué también va delante de ellos bajo comisión divina. Reproducir el énfasis evita suavizar la retórica y conserva la tensión entre dirección divina y liderazgo humano.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve tension rather than resolve it'
translation_notes:
  revision_awareness: Coincide con el pasaje inglés auditado de alta concordancia; no se requirieron revisiones sustantivas respecto del último paso de revisión. Se mantuvo la tensión léxica de עֹבֵר y וִירִשְׁתָּם, y el énfasis pronominal para Yahvé y Josué.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de manera consistente para el Tetragrama.
  - ‘Josué’ se mantiene como forma española estándar del nombre propio.
  - ‘De delante de ti’ conserva el valor espacial del hebreo sin sustituirlo por una paráfrasis más general.
  - Las notas al pie preservan las alternativas del audit trail inglés donde el hebreo admite más de una lectura legítima.
