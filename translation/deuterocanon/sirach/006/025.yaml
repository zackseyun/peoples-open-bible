  - marker: a
    text: Hebrew 'her tahbulot' is difficult here; the Greek parallel reads 'her bonds,' which likely preserves the intended image of wisdom's restraining discipline.
    reason: textual_variant
lexical_decisions:
- source_word: הַט
  chosen: Bend
  alternatives:
  - Incline
  - Lower
  lexicon: HALOT
  rationale: Imperative of נטה, here calling for a deliberate physical metaphor of yielding oneself to wisdom's yoke. 'Bend' is idiomatic and concrete in English.
- source_word: שִׁכְמְךָ
  chosen: your shoulder
  alternatives:
  - your back
  - your neck
  lexicon: HALOT
  rationale: שכם is literally 'shoulder,' fitting the burden/yoke imagery also supported by the Greek ὦμος. 'Shoulder' preserves the bodily metaphor better than broader paraphrases.
- source_word: וְשָׂאֶהָ
  chosen: and carry her
  alternatives:
  - and bear her
  - and lift her
  lexicon: HALOT
  rationale: From נשׂא, with feminine object referring to wisdom. 'Carry' communicates sustained bearing, not merely momentary lifting, and matches the exhortational context.
- source_word: וְאַל תָּקוֹץ
  chosen: and do not be disgusted
  alternatives:
  - and do not loathe
  - and do not grow weary
  - and do not be impatient
  lexicon: HALOT
  rationale: קוץ in this stem commonly conveys abhorrence or revulsion. The Greek προσοχθίζω can shade toward irritation or resentment, but the Hebrew points more strongly to recoiling from what wisdom requires. 'Be disgusted' preserves that force.
- source_word: בְּתַחְבּוּלוֹתֶיהָ
  chosen: by her bonds
  alternatives:
  - by her restraints
  - by her cords
  - by her disciplines
  lexicon: HALOT
  rationale: The Hebrew form is difficult, and the source validation flags mismatch; the Greek parallel reads τοῖς δεσμοῖς αὐτῆς, 'her bonds.' Given the parallel source must be used as translation input and clarifies the metaphor, 'bonds' is the most defensible rendering while honestly reflecting the burden/restraint imagery of wisdom's discipline.
