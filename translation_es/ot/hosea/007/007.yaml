translation:
  language: es
  text: Todos ellos están ardientes como un horno[a], y devoran a sus jueces; todos sus reyes han caído. Nadie entre ellos clama a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus gobernantes». El término hebreo puede referirse de manera más amplia a autoridades de gobierno, no solo a autoridades judiciales.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֻּלָּם
  english_pob_choice: All of them
  chosen_spanish: Todos ellos
  alternatives_spanish:
  - Ellos todos
  - Todos
  lexicon: HALOT
  rationale: El hebreo es distributivo y totalizante; «Todos ellos» conserva esa amplitud de manera natural en español.
- source_word: יֵחַמּוּ
  english_pob_choice: are hot
  chosen_spanish: están ardientes
  alternatives_spanish:
  - están calientes
  - se encienden
  - se inflaman
  lexicon: HALOT
  rationale: La imagen del horno pide una expresión que mantenga la intensidad metafórica. «Ardientes» comunica calentamiento/inflamación sin decidir excesivamente el tipo de pasión.
- source_word: כַּתַּנּוּר
  english_pob_choice: like an oven
  chosen_spanish: como un horno
  alternatives_spanish:
  - como un horno de barro
  - como un horno encendido
  lexicon: HALOT
  rationale: «Horno» preserva la metáfora directa y es más natural en español que una traducción más técnica o explicativa.
- source_word: וְאָכְלוּ
  english_pob_choice: and they devour
  chosen_spanish: y devoran
  alternatives_spanish:
  - y consumen
  - y comen
  - y se lo tragan
  lexicon: HALOT
  rationale: El verbo español «devoran» reproduce bien la fuerza violenta del hebreo en este contexto profético.
- source_word: אֶת שֹׁפְטֵיהֶם
  english_pob_choice: their judges
  chosen_spanish: a sus jueces
  alternatives_spanish:
  - a sus gobernantes
  - a sus magistrados
  lexicon: HALOT
  rationale: «Jueces» sigue de cerca la forma léxica principal del hebreo y mantiene la opción principal del POB en inglés. En español, «gobernantes» puede sugerirse como amplitud semántica, pero no sustituye el término principal.
- source_word: כָּל מַלְכֵיהֶם
  english_pob_choice: all their kings
  chosen_spanish: todos sus reyes
  alternatives_spanish:
  - cada uno de sus reyes
  - todos sus monarcas
  lexicon: HALOT
  rationale: La repetición de «todos» refuerza el carácter total de la acusación. «Reyes» es el equivalente directo y claro de מַלְכֵיהֶם.
- source_word: נָפָלוּ
  english_pob_choice: have fallen
  chosen_spanish: han caído
  alternatives_spanish:
  - cayeron
  - han sido derribados
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un resultado consumado; «han caído» es idiomático y deja abierta la clase exacta de caída (muerte, derrota, deposición).
- source_word: אֵין קֹרֵא בָהֶם אֵלַי
  english_pob_choice: None among them calls to me
  chosen_spanish: Ninguno entre ellos clama a mí
  alternatives_spanish:
  - Nadie entre ellos me invoca
  - No hay quien entre ellos clame a mí
  lexicon: HALOT
  rationale: «No hay quien» o «ninguno» reflejan bien la negación existencial del hebreo. «Clama a mí» conserva el lenguaje relacional/covenantal y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: 'Alcance de שֹׁפְטֵיהֶם: ¿«jueces» o una noción más amplia de autoridades políticas?'
  english_pob_reading: Use 'judges' in the main text and preserve 'rulers' in a footnote
  chosen_spanish_reading: Usar «jueces» en el texto principal y preservar en nota la amplitud posible hacia «gobernantes» o autoridades.
  alternative_spanish_readings:
  - a sus gobernantes
  - a sus magistrados
  rationale: El hebreo designa primariamente «jueces», pero en el marco profético puede abarcar autoridades de gobierno. El texto principal sigue la lectura más directa; la nota conserva la amplitud semántica sin borrar la tensión lexical.
  doctrine_reference: Translation philosophy §3, §5
- issue: 'Imagen del horno: si debe explicitarse una pasión concreta o mantenerse la metáfora abierta'
  english_pob_reading: Retain the metaphor without specifying the exact inner passion
  chosen_spanish_reading: Mantener la metáfora abierta sin especificar si se trata de lujuria, ira o conspiración.
  alternative_spanish_readings:
  - Todos ellos arden de lujuria como un horno
  - Todos ellos se inflaman como un horno
  rationale: El contexto cercano sugiere pasión y violencia, pero este versículo no nombra de manera explícita la pasión. La traducción conserva la imagen sin añadir una interpretación más estrecha que el hebreo no exige.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto coincide con la lectura inglesa aprobada y no requiere cambios sustantivos; se ha mantenido la metáfora del horno, la violencia de «devoran», el totalizador «todos», y la posibilidad semántica de שֹׁפְטֵיהֶם con una nota lexical.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en otros pasajes; aquí no aparece el nombre divino, solo la primera persona singular en «a mí».
  - Se mantuvo «jueces» como equivalente principal de שֹׁפְטֵיהֶם, coherente con la política terminológica del proyecto.
  - «Han caído» conserva el valor resultativo del perfecto hebreo sin forzar un pasado simple.
  - La nota a[a] preserva la alternativa documentada por el POB inglés sin introducir una glosa interpretativa más amplia en el texto principal.
