translation:
  language: es
  text: 'Así quedó terminada toda la obra que el rey Salomón hizo para la casa de Yahvé. Y Salomón trajo las cosas consagradas[a] de David, su padre: la plata, el oro y los utensilios; y los puso en las tesorerías de la casa de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las cosas dedicadas de David, su padre». El hebreo se refiere a objetos apartados como sagrados para Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּשְׁלַם
  english_pob_choice: was finished
  chosen_spanish: fue terminada
  alternatives_spanish:
  - se terminó
  - quedó terminada
  lexicon: HALOT
  rationale: El hebreo expresa que la obra quedó completa; en español, la pasiva perifrástica transmite bien el resultado final sin añadir interpretación. 'Fue terminada' conserva la pasividad del sentido y suena natural en registro bíblico actual.
- source_word: כָּל הַמְּלָאכָה
  english_pob_choice: all the work
  chosen_spanish: toda la obra
  alternatives_spanish:
  - todo el trabajo
  - toda la labor
  lexicon: HALOT
  rationale: Aquí מְלָאכָה se refiere al proyecto completo de construcción y preparación del templo. 'Obra' es más preciso y natural que 'trabajo' en este contexto, y preserva el sentido global del conjunto.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del Señor
  lexicon: HALOT
  rationale: Se conserva 'casa' para seguir de cerca el hebreo בֵּית, y 'Yahvé' para el Nombre divino según la política del proyecto. 'Templo' sería una aclaración contextual válida, pero aquí 'casa' mantiene mejor la forma del original.
- source_word: וַיָּבֵא
  english_pob_choice: brought in
  chosen_spanish: hizo entrar
  alternatives_spanish:
  - trajo
  - introdujo
  lexicon: HALOT
  rationale: El causativo de בוא puede expresarse en español con 'hacer entrar' cuando se quiere retener la direccionalidad de entrada hacia un lugar concreto. En el contexto de los tesoros del templo, esta opción es precisa y auditable.
- source_word: קָדְשֵׁי דָּוִד אָבִיו
  english_pob_choice: the holy things of David his father
  chosen_spanish: las cosas consagradas de David, su padre
  alternatives_spanish:
  - los objetos santos de David, su padre
  - las cosas dedicadas de David, su padre
  lexicon: HALOT
  rationale: קָדְשֵׁי denota cosas apartadas/consagradas; en español 'cosas consagradas' comunica bien la dedicación a Yahvé sin obligar a una lectura exclusivamente cultual de 'santas'. Se mantiene la relación filial 'su padre' como apposición clara y natural.
- source_word: הַכֶּסֶף ... הַזָּהָב ... הַכֵּלִים
  english_pob_choice: the silver, the gold, and the vessels
  chosen_spanish: la plata, el oro y los utensilios
  alternatives_spanish:
  - la plata, el oro y los vasos
  - la plata, el oro y los recipientes
  lexicon: HALOT
  rationale: En español, 'la plata' y 'el oro' funcionan de forma sustantivada como en hebreo. כֵּלִים es un término amplio; 'utensilios' es comprensible y suficientemente abierto para el contexto del templo, sin forzar una función específica.
- source_word: נָתַן
  english_pob_choice: put
  chosen_spanish: los puso
  alternatives_spanish:
  - los colocó
  - los depositó
  lexicon: HALOT
  rationale: '''Puso'' mantiene la sencillez del verbo hebreo y resulta natural en relación con el depósito en los tesoros. El pronombre los retoma los objetos consagrados, la plata, el oro y los utensilios.'
- source_word: בְּאֹצְרוֹת
  english_pob_choice: in the treasuries
  chosen_spanish: en los tesoros
  alternatives_spanish:
  - en los depósitos
  - en las cámaras del tesoro
  lexicon: HALOT
  rationale: אֹצְרוֹת designa lugares de almacenamiento valioso; 'tesoros' reproduce tanto la función de depósito como el matiz de valor. En el contexto del templo, la forma plural queda bien como espacio reservado para ofrendas y bienes sagrados.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; por la política del proyecto, se translitera como 'Yahvé' en vez de ocultarlo con una sustitución reverencial. Esto preserva la identidad del Nombre en la lectura española.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Meaning of קָדְשֵׁי in the temple context
  english_pob_reading: the holy things / the dedicated things of David his father
  chosen_spanish_reading: las cosas consagradas de David, su padre
  alternative_spanish_readings:
  - las cosas santas de David, su padre
  - las cosas dedicadas de David, su padre
  rationale: La POB inglesa deja abierta la alternativa 'dedicated things' para reflejar la tensión lexical de קָדְשֵׁי. En español, 'consagradas' mantiene esa tensión entre santidad y dedicación sin volverla más estrecha de lo que permite el hebreo.
  doctrine_reference: HALOT s.v. קדש; contexto cultual de ofrendas apartadas a Yahvé
translation_notes:
  revision_awareness: Se ha seguido el pasaje tal como aparece en el paquete fuente, sin cambios editoriales posteriores en el contexto inglés. La solución española conserva el paralelismo del hebreo, el Nombre divino con la terminología del proyecto y la ambigüedad lexical de קָדְשֵׁי mediante una nota alternativa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera uniforme para יְהוָה.
  - Se conserva 'casa' en vez de 'templo' para בֵּית יְהוָה, siguiendo el hebreo y la práctica del POB inglés.
  - '''Cosas consagradas'' evita reducir קָדְשֵׁי a una sola noción, manteniendo la posibilidad de ''dedicadas'' en nota.'
  - La puntuación con coma aposicional en 'David, su padre' refleja el hebreo y mejora la fluidez en español.
