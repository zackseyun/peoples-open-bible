id: LUK.4.37
reference: Luke 4:37
source:
  edition: SBLGNT
  text: καὶ ἐξεπορεύετο ἦχος περὶ αὐτοῦ εἰς πάντα τόπον τῆς περιχώρου.
translation:
  text: And news about him was spreading into every place in the surrounding region[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'a report about him was going out to every place in the surrounding region.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεπορεύετο
  chosen: was spreading
  alternatives:
  - was going out
  - went out
  lexicon: BDAG
  rationale: The imperfect middle/passive form conveys ongoing action in past time. A literal 'was going out' is possible, but with ἦχος as subject in this idiom, English 'was spreading' more naturally communicates the sense of a report or fame extending outward.
- source_word: ἦχος
  chosen: news
  alternatives:
  - report
  - sound
  - rumor
  - fame
  lexicon: BDAG
  rationale: Although ἦχος literally denotes 'sound' or 'noise,' in this context with περὶ αὐτοῦ and ἐξεπορεύετο it refers to the report about Jesus. 'News' is clear modern English and fits the narrative context better than the more ambiguous 'sound.'
- source_word: περὶ αὐτοῦ
  chosen: about him
  alternatives:
  - concerning him
  lexicon: BDAG
  rationale: A straightforward rendering of the prepositional phrase indicating the content of the report.
- source_word: εἰς πάντα τόπον
  chosen: into every place
  alternatives:
  - to every place
  - everywhere
  lexicon: BDAG
  rationale: This preserves the distributive force of πάντα τόπον while remaining readable. 'Everywhere' is smoother but less formally transparent to the singular τόπον with πᾶς.
- source_word: τῆς περιχώρου
  chosen: in the surrounding region
  alternatives:
  - of the surrounding country
  - of the neighboring district
  - of the surrounding area
  lexicon: BDAG
  rationale: περίχωρος denotes the surrounding district or region. Rendering it as 'the surrounding region' gives natural English while preserving the geographical sense.
- source_word: καὶ
  chosen: And
  alternatives:
  - So
  - Then
  lexicon: BDAG
  rationale: The conjunction links this verse to the preceding event in a simple narrative way. 'And' preserves the Greek connective without adding interpretive nuance.
