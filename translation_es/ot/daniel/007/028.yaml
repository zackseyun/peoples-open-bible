  rationale: Se corrige la apertura para un español natural que preserve la función discursiva de עַד כָּה. Se sustituye «palabra» por «asunto» en ambas ocurrencias de מִלְּתָא, en línea con el contexto, la evidencia léxica y el audit trail inglés. Se mantienen «corazón» y las alternativas sobre «semblante/resplandor».
