translation:
  language: es
  text: Y granizará cuando el bosque caiga[a], y en las tierras bajas la ciudad será derribada por completo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Y granizo caerá cuando el bosque caiga". El hebreo permite una lectura más formal en la que "granizo" funciona como sujeto y "el bosque" es el que desciende o cae.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָרַד
  english_pob_choice: And it will hail
  chosen_spanish: Y granizo
  alternatives_spanish:
  - Y caerá granizo
  - Y granizará
  lexicon: HALOT
  rationale: El hebreo admite un valor meteorológico impersonal de ברד. En español, “granizo” como sujeto nominal mantiene la literalidad de la imagen y evita una construcción menos natural. Se conserva el enlace con la cláusula previa mediante “Y”.
- source_word: בְּרֶדֶת
  english_pob_choice: when ... falls
  chosen_spanish: cuando ... caiga
  alternatives_spanish:
  - al caer
  - cuando descienda
  lexicon: HALOT
  rationale: 'El infinitivo constructo con ב expresa simultaneidad o tiempo: “cuando”. En español, el subjuntivo futuro de evento (“caiga”) es natural en una cláusula temporal anticipada y refleja el movimiento de descenso del hebreo.'
- source_word: הַיָּעַר
  english_pob_choice: the forest
  chosen_spanish: el bosque
  alternatives_spanish:
  - el bosquejo
  - la selva
  lexicon: HALOT
  rationale: יער puede abarcar un área arbolada; “bosque” es el equivalente más claro y sobrio en español. Se evita “selva”, que desplaza el registro y la imagen geográfica.
- source_word: וּבַשִּׁפְלָה
  english_pob_choice: and in the lowland
  chosen_spanish: en la llanura baja
  alternatives_spanish:
  - en el llano
  - en la región baja
  lexicon: HALOT
  rationale: שִׁפְלָה designa una zona baja/topográfica. “Llanura baja” conserva la referencia espacial y suena más idiomático que “lowland” calcado como “tierras bajas”, aunque esta última sería posible. La conjunción queda implícita en el flujo español sin perder el paralelo.
- source_word: תִּשְׁפַּל
  english_pob_choice: will be utterly laid low
  chosen_spanish: será derribada por completo
  alternatives_spanish:
  - será abatida
  - caerá totalmente
  lexicon: HALOT
  rationale: שׁפל describe quedar rebajado o abatido; con “la ciudad” como sujeto, el contexto apunta a ruina/destrucción figurada, no a humildad moral. “Será derribada por completo” preserva la violencia del abatimiento con una formulación natural en español.
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  lexicon: HALOT
  rationale: El sustantivo común עיר se traduce de forma directa por “la ciudad”. “Urbe” sería demasiado literario y menos transparente.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de su sintaxis. La única tensión principal es la voz de la primera cláusula: el hebreo permite tanto un granizo impersonal como un granizo sujeto nominal; el español opta por una forma pública y natural, dejando la alternativa en nota.'
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” fuera de la línea porque este versículo no contiene el nombre divino.
  - Se evitó “SEÑOR” y otros reemplazos no presentes en el texto fuente.
  - Se prefirió un tono bíblico moderno, sobrio y publicable, sin arcaísmos innecesarios.
