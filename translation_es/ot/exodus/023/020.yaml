translation:
  language: es
  text: He aquí,[a] yo envío un ángel delante de ti, para guardarte en el camino y para llevarte al lugar que he preparado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mensajero». El hebreo מַלְאָךְ puede significar tanto un mensajero humano como un mensajero angelical; aquí «ángel» encaja mejor con el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención con solemnidad. En español, «¡Mira!» transmite esa función con naturalidad; «He aquí» es posible, pero suena más arcaico.
- source_word: אָנֹכִי
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  - Yo soy
  lexicon: HALOT
  rationale: El pronombre independiente aporta énfasis. «Yo» lo conserva de modo natural en español; «Yo mismo» intensificaría más de lo que exige el contexto.
- source_word: שֹׁלֵחַ
  english_pob_choice: am sending
  chosen_spanish: envío
  alternatives_spanish:
  - estoy enviando
  - voy a enviar
  lexicon: HALOT
  rationale: El participio con אָנֹכִי en discurso directo expresa una acción en curso o inminente. En español, el presente «envío» comunica bien esa fuerza sin sonar forzado.
- source_word: מַלְאָךְ
  english_pob_choice: an angel
  chosen_spanish: un ángel
  alternatives_spanish:
  - un mensajero
  lexicon: HALOT
  rationale: Aunque el hebreo puede significar «mensajero», el contexto de protección y guía divina favorece «ángel». Se preserva la alternativa léxica en nota.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - ante ti
  - frente a ti
  lexicon: HALOT
  rationale: «Delante de ti» es idiomático en español y conserva la idea de ir en avance. «Antes de ti» podría sonar temporal en vez de espacial.
- source_word: לִשְׁמָרְךָ
  english_pob_choice: to guard you
  chosen_spanish: para guardarte
  alternatives_spanish:
  - para cuidarte
  - para velar por ti
  lexicon: HALOT
  rationale: שׁמר tiene el sentido de proteger, custodiar y guardar. «Guardarte» mantiene esa fuerza y el matiz de protección en el camino.
- source_word: בַּדָּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - a lo largo del camino
  - durante el viaje
  lexicon: HALOT
  rationale: La expresión se refiere al trayecto. «En el camino» es natural y evita ambigüedad en español.
- source_word: וְלַהֲבִיאֲךָ
  english_pob_choice: and to bring you
  chosen_spanish: y para llevarte
  alternatives_spanish:
  - y para conducirte
  - y para traerte
  lexicon: HALOT
  rationale: El hiphil de בוא implica hacer llegar o traer. «Llevarte» funciona bien en español y conserva la idea direccional sin añadir dureza innecesaria; «traerte» sugeriría el punto de vista opuesto.
- source_word: הַמָּקוֹם
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - la tierra
  lexicon: HALOT
  rationale: «Lugar» es la correspondencia directa y clara para מקום en este contexto de destino preparado.
- source_word: אֲשֶׁר הֲכִנֹתִי
  english_pob_choice: that I have prepared
  chosen_spanish: que he preparado
  alternatives_spanish:
  - que he dispuesto
  - que he dejado listo
  lexicon: HALOT
  rationale: כּוּן en hiphil puede significar preparar, disponer o establecer. «He preparado» es la opción más directa para un lugar destinado por Dios.
theological_decisions:
- issue: Identidad de מַלְאָךְ
  english_pob_reading: Render the term lexically as 'an angel' without specifying in the main text whether this is a created angelic being or a special manifestation of the LORD.
  chosen_spanish_reading: Traducirlo como «un ángel» sin especificar en el texto principal si se trata de un ser angélico creado o de una manifestación especial de Yahvé.
  alternative_spanish_readings:
  - un mensajero
  - el Ángel de Yahvé
  rationale: El versículo solo dice מַלְאָךְ. Dado que el contexto más amplio plantea preguntas sobre su identidad, la traducción preserva la tensión léxica y no la resuelve en el cuerpo principal.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión; no se registran revisiones aplicadas. El borrador español sigue esa lectura estable y conserva la misma tensión léxica en מַלְאָךְ.
  spanish_consistency_notes:
  - Se usa «Yahvé» en las notas teológicas cuando corresponde al nombre divino, conforme al criterio del proyecto.
  - Se eligió «ángel» en el texto principal porque el contexto de protección y guía favorece ese sentido, pero se mantiene la alternativa «mensajero» en nota.
  - «Delante de ti» y «para guardarte» conservan el paralelismo del hebreo sin introducir explicaciones interpretativas adicionales.
