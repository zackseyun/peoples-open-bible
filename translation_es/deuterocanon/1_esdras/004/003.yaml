  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia del griego: comieron, bebieron, al quedar saciados se fueron; Darío fue a su aposento, durmió y despertó. La nota sobre ἐμπλησθέντες preserva adecuadamente la alternativa léxica del POB en inglés. El único desajuste relevante es «cámara de dormir», que suena poco idiomático en español y no es la mejor forma de representar κοιτών.'
  spanish_quality_summary: El español es claro y mayormente natural, pero «cámara de dormir» resulta forzado y calcado. «Alcoba» o «aposento» transmite mejor un dormitorio real con dignidad y legibilidad. También conviene suavizar «y luego despertó» a «y después despertó» o simplemente «y despertó»; no es error, pero puede afinarse el ritmo.
  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales están alineadas con el POB: «comieron», «bebieron», «quedaron satisfechos», «se retiraron», «durmió», «despertó». Se recomienda sustituir «cámara de dormir» por «alcoba», que corresponde mejor a κοιτών y al registro narrativo.'
  issues:
  - severity: medium
    issue: «cámara de dormir» es poco idiomático en español
    rationale: Aunque intenta reflejar «bedchamber», en español suena artificial y semicalcado. «Alcoba» conserva mejor el sentido de un aposento de dormir, especialmente en contexto regio, sin perder claridad.
  - severity: low
    issue: La transición «y luego despertó» puede refinarse
    rationale: No es infiel al griego, pero «y después despertó» o «y despertó» fluye mejor en español bíblico narrativo y mantiene la progresión temporal.
