    issue: 'נֵלְכָה se tradujo como futuro simple: ''Iremos con ustedes'''
    rationale: El hebreo usa un cohortativo de primera persona plural, que aquí expresa invitación/resolución ('Vayamos con ustedes', 'Vamos con ustedes'), no mera predicción futura. El inglés auditado también preserva este matiz con 'Let us go with you'.
  - severity: low
    issue: '''tomarán[a] ... del borde'' es menos idiomático que una forma reflexiva/pronominal'
    rationale: Aunque no es incorrecto, el gesto físico de חזק ב funciona más naturalmente en español como 'se asirán del borde' o 'se agarrarán del borde'. Dado que la nota ya menciona 'se asirán', conviene usarlo en el texto principal.
