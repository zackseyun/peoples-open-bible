revisions:
- from: 'Y sucedió que, al oír Hiram las palabras de Salomón, se alegró mucho y dijo: «Bendito sea Yahvé en este día, que ha dado a David un hijo sabio sobre este gran pueblo».'
  to: 'Y cuando Hiram oyó las palabras de Salomón, se alegró mucho y dijo: «Bendito sea Yahvé este día, que ha dado a David un hijo sabio para este gran pueblo».'
  rationale: Se ajusta el inicio para reflejar de manera más natural la cláusula temporal hebrea, se elimina la preposición innecesaria en «este día», y se sustituye «sobre este gran pueblo» por «para este gran pueblo», que preserva mejor el sentido contextual de עַל en español sin añadir una paráfrasis interpretativa como «para gobernar».
