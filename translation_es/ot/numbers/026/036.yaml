translation:
  language: es
  text: 'Y estos fueron los hijos[a] de Shutéla: de Erán, el clan de los eranitas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente, «Y estos fueron los hijos de Shutéla: de Erán, el clan del eranita». Aquí «hijos de» funciona como lenguaje genealógico para descendientes o líneas de clan, no necesariamente solo hijos inmediatos.'
