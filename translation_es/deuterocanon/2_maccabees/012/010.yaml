    issue: La nota [a] está colocada en 'Desde allí' en vez de en 'él'.
    rationale: La nota explica el singular αὐτῷ ('a él'), no Ἐκεῖθεν ('desde allí'). Debe anclarse exactamente donde aparece la forma española correspondiente para cumplir la disciplina de notas del proyecto.
  - severity: low
    issue: '''Mientras avanzaban contra Timoteo'' pierde parte del matiz militar de ποιουμένων τὴν πορίαν.'
    rationale: El inglés auditado eligió 'while making their march'. En español, 'avanzaban' es aceptable pero más general; 'hacían su marcha' conserva mejor el carácter de marcha militar del contexto.
  revised_spanish_text: Desde allí, después de haber recorrido nueve estadios, mientras hacían su marcha contra Timoteo, los árabes cayeron sobre él[a], no menos de cinco mil, y quinientos jinetes.
  revised_footnotes:
