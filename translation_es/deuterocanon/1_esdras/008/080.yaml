review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la sintaxis y el sentido básico del griego: mantiene «la tierra», la entrada para heredar, la doble formulación cognada de contaminación y el complemento «de los extranjeros de la tierra». Sin embargo, «profanada / profanación» desplaza μολυσμός/μεμολυσμένη hacia el campo semántico de sacrilegio o violación de lo sagrado, mientras que el griego y la auditoría inglesa buscan conservar un término amplio de impureza/contaminación/contaminación cultual-moral. Además, falta en español la nota equivalente a la nota inglesa sobre «uncleanness» con fuerza ritual y moral.'
  spanish_quality_summary: El español es claro y legible, pero «entráis» suena más peninsular que neutral latinoamericano; «están entrando» sería demasiado pesado, pero «entran» o «van a entrar» perdería matiz. Puede mantenerse «entran» como registro bíblico neutral suficiente. También conviene evitar la repetición algo dura «es tierra» con una formulación natural como «es una tierra». La principal mejora de calidad es sustituir «profanada/profanación» por «contaminada/contaminación» o equivalente más natural para este contexto.
  glossary_alignment: 'No hay conflictos con términos del glosario principal como Yahvé/Mesías. Sí hay una desalineación parcial con la decisión léxica POB sobre μολυσμός/ἀκαθαρσία: el proyecto quiere preservar fuerza moral-ritual sin estrecharla; «profanación» la estrecha indebidamente. «Extranjeros de la tierra» está bien y la nota sobre «pueblos de la tierra» preserva la alternativa documentada.'
  issues:
  - severity: medium
    issue: «Profanada por la profanación» no refleja con suficiente precisión μεμολυσμένη μολυσμῷ
    rationale: El griego apunta a contaminación/impureza/estado de deshonra moral-ritual, no específicamente a profanación de algo sagrado. «Profanación» introduce un matiz más estrecho que el audit trail inglés evitó.
  - severity: medium
    issue: Falta una nota para «impureza» que preserve explícitamente la doble fuerza ritual y moral de ἀκαθαρσία
    rationale: La auditoría inglesa incluyó una nota importante para no reducir el sentido. En español, «impureza» puede funcionar, pero la nota sigue siendo útil y debe conservarse.
  - severity: low
    issue: «Entráis» no es la opción más neutral latinoamericana
    rationale: Aunque es comprensible, el encargo pide español neutral latinoamericano. «entran» suena más amplio y mantiene buena legibilidad en registro bíblico.
