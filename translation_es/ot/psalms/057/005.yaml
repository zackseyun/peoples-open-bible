revisions:
- from: Mi alma está en medio de leones[a]; me acuesto entre los que están en llamas[b]—hijos de hombre, cuyos dientes son lanzas y flechas, y cuya lengua es una espada afilada.
  to: Mi alma está en medio de leones; me acuesto entre los que están en llamas[b]—hijos de Adán[a], cuyos dientes son lanzas y flechas, y cuya lengua es una espada afilada.
  rationale: Se corrige el anclaje de la nota [a] para que corresponda al término explicado y se sustituye 'hijos de hombre' por 'hijos de Adán', que mantiene mejor la forma poética masculina del hebreo en un español más natural y legible. Se conserva el resto del verso porque refleja fielmente las imágenes y relaciones del texto fuente.
