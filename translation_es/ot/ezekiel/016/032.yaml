translation:
  language: es
  text: La esposa adúltera toma a otros hombres en lugar de su marido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La mujer adúltera toma a extraños en lugar de su marido»; o «La mujer que comete adulterio toma a otros hombres en lugar de su marido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאִשָּׁה
  english_pob_choice: wife
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  - mujer-esposa
  lexicon: HALOT
  rationale: El hebreo puede significar 'mujer' o 'esposa'. En español, 'mujer' mantiene la amplitud semántica y deja que la frase 'su marido' haga explícito el sentido matrimonial sin sobrecargar el verso con una equivalencia menos natural.
- source_word: הַמְּנָאָפֶת
  english_pob_choice: adulterous
  chosen_spanish: adúltera
  alternatives_spanish:
  - que comete adulterio
  - adúltera
  lexicon: HALOT
  rationale: El participio describe a la mujer por su conducta. 'Adúltera' preserva esa caracterización de forma breve y natural en español, y evita una paráfrasis más larga que suavizaría el tono acusatorio.
- source_word: תַּחַת
  english_pob_choice: instead of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en lugar de
  lexicon: HALOT
  rationale: Aquí la preposición expresa sustitución, no posición espacial. 'En lugar de' comunica de manera clara la idea de intercambio o reemplazo con el mismo valor que el inglés de la POB.
- source_word: אִישָׁהּ
  english_pob_choice: her husband
  chosen_spanish: su marido
  alternatives_spanish:
  - su esposo
  - su hombre
  lexicon: HALOT
  rationale: En contexto marital, el hebreo apunta al marido de la mujer. 'Marido' es claro y conserva el matiz relacional del insulto profético, sin sonar excesivamente formal.
- source_word: תִּקַּח
  english_pob_choice: takes
  chosen_spanish: toma
  alternatives_spanish:
  - toma
  - recibe
  lexicon: HALOT
  rationale: לקח significa normalmente 'tomar'. 'Toma' reproduce la acción en presente y mantiene la fuerza directa del reproche profético.
- source_word: זָרִים
  english_pob_choice: strangers
  chosen_spanish: extraños
  alternatives_spanish:
  - forasteros
  - extraños
  - hombres extraños
  lexicon: HALOT
  rationale: '''Extraños'' conserva la idea de personas ajenas al vínculo conyugal y permite el sentido figurado sin especificar etnicidad. En español, además, funciona bien dentro de la metáfora sexual y de pacto.'
theological_decisions:
- issue: Imagen matrimonial de infidelidad como metáfora de la infidelidad de pacto
  english_pob_reading: 'Retain the marital/adultery imagery directly: ''The adulterous wife takes strangers instead of her husband.'''
  chosen_spanish_reading: 'Conservar directamente la imagen matrimonial y la acusación de adulterio: ''La mujer adúltera toma extraños en lugar de su marido.'''
  alternative_spanish_readings:
  - La esposa adúltera toma extraños en lugar de su marido.
  - La mujer que comete adulterio toma extraños en lugar de su marido.
  rationale: El verso forma parte de la alegoría profética de la infidelidad de Jerusalén. Mantener la imagen de adulterio evita diluir la fuerza moral y sexual del texto, y preserva la tensión entre literalidad y metáfora que el original presenta.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requieren cambios; la propuesta sigue de cerca el análisis hebreo y la decisión inglesa de conservar la imagen matrimonial sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene el presente gnómico/profético, como en la POB inglesa.
  - No se usa 'SEÑOR' ni 'Cristo'; no hay términos divinos o cristológicos en este versículo.
  - '''Extraños'' conserva la ambigüedad útil entre personas ajenas y hombres no pertenecientes al pacto matrimonial, coherente con la POB inglesa.'
