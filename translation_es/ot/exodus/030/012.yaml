base_translation:
  language: en
  yaml_path: translation/ot/exodus/030/012.yaml
  text: When you take a census of the sons of Israel according to those numbered among them[a], then each man shall give to Yahweh a ransom for his life when you number them[c][b], so that there will be no plague among them when you number them.
  footnotes:
  - marker: a
    text: Literally, 'lift up the head of the sons of Israel,' an idiom for taking a census.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Israelites.'
    reason: lexical_alternative
  - marker: c
    text: Or 'a ransom for himself'; Hebrew nephesh often means 'life' or 'self,' not only 'soul.'
    reason: lexical_alternative
