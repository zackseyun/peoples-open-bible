  text: Now please run to meet her and say to her[a], ‘Is it well with you? Is it well with your husband? Is it well with the child?’ And she said[b], ‘It is well.’
  footnotes:
  - marker: a
    text: 'Hebrew shalom, repeated four times in this verse, can denote peace, wholeness, or well-being. Here it refers to welfare: ''Is it well...?'' / ''It is well.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'Is the boy well?' The Hebrew yeled can mean 'child' or 'boy.'
    reason: lexical_alternative
