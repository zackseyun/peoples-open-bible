theological_decisions:
- issue: How to render the Messiah's role in the judgment of the final ruler
  chosen_reading: The passage presents a personal messianic ruler who judges the last enemy on Mount Zion.
  alternative_readings:
  - A purely symbolic messianic age
  - A generic anointed agent without explicit messianic identity
  rationale: The text explicitly says 'my Messiah' and gives him judicial action against the final ruler, so the personal royal sense should remain visible.
  doctrine_reference: DOCTRINE.md translation philosophy §3
- issue: How to handle 'forever' in relation to the end of the corrupt world
  chosen_reading: The Messiah's dominion is rendered as enduring forever within the chapter's apocalyptic frame, while the line's further qualification is retained.
  alternative_readings:
  - An unqualified endless earthly reign
  - A merely hyperbolic long reign
  rationale: The Syriac-style apocalyptic rhetoric holds together enduring dominion and consummation language; the translation should preserve that tension rather than resolve it.
  doctrine_reference: DOCTRINE.md translation philosophy §3
