translation:
  language: es
  text: Porque el rey tenía en alta mar una flota de naves de Tarsis[a], junto con la flota de Hiram. Una vez cada tres años venía la flota de naves de Tarsis, trayendo oro y plata, marfil, simios[c], y pavos reales[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «naves de Tarsis»; la expresión puede referirse a naves asociadas con Tarsis o, más generalmente, a grandes embarcaciones de navegación marítima.
    reason: lexical_alternative
  - marker: b
    text: La identificación exacta del animal es incierta; tradicionalmente «pavos reales», aunque algunos entienden «papagayos» o «loros».
    reason: lexical_alternative
  - marker: c
    text: «Simios» también puede traducirse más ampliamente como «monos».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  lexicon: HALOT
  rationale: Introducción explicativa causal o de fundamento. En español, «Porque» comunica con naturalidad la relación discursiva sin sobrecargar el verso.
- source_word: אֳנִי תַרְשִׁישׁ
  english_pob_choice: fleet of Tarshish ships
  chosen_spanish: una flota de naves de Tarsis
  alternatives_spanish:
  - unas naves de Tarsis
  - una flota tarshisita
  - naves de Tarsis
  lexicon: HALOT
  rationale: El hebreo usa el singular colectivo אֳנִי; «una flota» refleja bien el valor colectivo, y «naves de Tarsis» conserva la forma tradicional del topónimo sin convertirlo en una paráfrasis más amplia.
- source_word: לַמֶּלֶךְ
  english_pob_choice: the king had
  chosen_spanish: el rey tenía
  alternatives_spanish:
  - pertenecía al rey
  - era del rey
  lexicon: HALOT
  rationale: El hebreo expresa posesión; en español, «tenía» es la manera natural de reproducir esa relación sin añadir un verbo más interpretativo.
- source_word: בַּיָּם
  english_pob_choice: at sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - mar adentro
  - sobre el mar
  lexicon: HALOT
  rationale: La frase se refiere al ámbito marítimo donde operaban las naves. «En el mar» mantiene el sentido directo del original.
- source_word: עִם אֳנִי חִירָם
  english_pob_choice: with Hiram’s fleet
  chosen_spanish: junto con la flota de Hiram
  alternatives_spanish:
  - con la flota de Hiram
  - junto con las naves de Hiram
  lexicon: HALOT
  rationale: El singular colectivo se mantiene como colectivo en español. «Junto con» reproduce la idea de asociación o cooperación entre las flotas.
- source_word: אַחַת לְשָׁלֹשׁ שָׁנִים
  english_pob_choice: Once every three years
  chosen_spanish: Una vez cada tres años
  alternatives_spanish:
  - cada tres años
  - una vez en tres años
  - al cabo de tres años
  lexicon: HALOT
  rationale: Es la equivalencia natural del modismo hebreo para una recurrencia periódica.
- source_word: תָּבֹא
  english_pob_choice: would come
  chosen_spanish: venía
  alternatives_spanish:
  - venía de regreso
  - llegaba
  lexicon: HALOT
  rationale: El imperfecto expresa acción habitual en el pasado; «venía» comunica mejor la repetición que un simple pretérito puntual.
- source_word: נֹשֵׂאת
  english_pob_choice: carrying
  chosen_spanish: trayendo
  alternatives_spanish:
  - llevando
  - cargando
  lexicon: HALOT
  rationale: El participio describe lo que transportaban las naves al llegar. «Trayendo» es una solución idiomática y clara en español.
- source_word: זָהָב וָכֶסֶף
  english_pob_choice: gold and silver
  chosen_spanish: oro y plata
  alternatives_spanish:
  - oro y plata fina
  lexicon: HALOT
  rationale: Términos materiales directos, sin ambigüedad especial.
- source_word: שֶׁנְהַבִּים
  english_pob_choice: ivory
  chosen_spanish: marfil
  alternatives_spanish:
  - colmillos de elefante
  lexicon: HALOT
  rationale: La acepción convencional es «marfil», la forma más clara y natural para el lector español.
- source_word: קֹפִים
  english_pob_choice: apes
  chosen_spanish: monos
  alternatives_spanish:
  - simios
  lexicon: HALOT
  rationale: Aunque el inglés POB conserva «apes» con nota, en español «monos» es el término más comprensible y puede abarcar el valor genérico sin perder la referencia a primates no humanos.
- source_word: תֻכִּיִּים
  english_pob_choice: peacocks
  chosen_spanish: pavos reales
  alternatives_spanish:
  - papagayos
  - loros
  lexicon: HALOT
  rationale: Se conserva la lectura tradicional más probable en el texto principal, equivalente natural en español; la incertidumbre léxica se preserva en nota.
theological_decisions:
- issue: Cómo verter el singular colectivo אֳנִי sin borrar el matiz de flota o conjunto de naves
  english_pob_reading: fleet of Tarshish ships / Hiram’s fleet
  chosen_spanish_reading: una flota de naves de Tarsis / la flota de Hiram
  alternative_spanish_readings:
  - naves de Tarsis
  - una armada de naves de Tarsis
  rationale: El texto hebreo usa singular colectivo; en español, «flota» conserva la idea corporativa que la revisión inglesa quiso reflejar, evitando una pluralización que diluya el matiz.
  doctrine_reference: No doctrinal; decisión de precisión semántica y aspecto colectivo del sustantivo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que cambió a «fleet of Tarshish ships» y «Hiram’s fleet» para reflejar mejor el singular colectivo hebreo אֳנִי. La redacción española sigue esa decisión con «una flota de naves de Tarsis» y «la flota de Hiram», manteniendo el mismo valor colectivo en lugar de un plural meramente literal.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el Nombre divino.
  - «Tarsis» se conserva como topónimo tradicional en español.
  - 'Se mantiene el orden de los bienes enumerados del hebreo: oro, plata, marfil, monos y pavos reales.'
  - Los marcadores de nota aparecen en el texto exactamente donde corresponde la ambigüedad léxica.
