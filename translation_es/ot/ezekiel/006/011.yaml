revisions:
- from: 'Así dice el Señor Yahvé: Golpea tu mano y golpea tu pie[a], y di: «¡Ay!» por causa de todas las abominaciones malas de la casa de Israel, que caerán por la espada, por el hambre y por la peste.'
  to: 'Así dice el Señor Yahvé: Golpea tu mano[a] y da un pisotón[b], y di: «¡Ay!»[c] por causa de todas las malvadas abominaciones[d] de la casa de Israel, que caerán por la espada, por el hambre y por la peste.'
  rationale: La revisión corrige una traducción engañosa del gesto con el pie, añade las notas significativas conservadas en la auditoría inglesa y mejora la naturalidad de la frase sobre las abominaciones sin apartarse del sentido hebreo. Se mantiene ‘el Señor Yahvé’ conforme a la política del proyecto y al razonamiento teológico documentado.
