translation:
  language: es
  text: 'hasta que yo venga y los lleve a una tierra como su propia tierra, tierra de grano y mosto[a], tierra de pan y viñedos, tierra de aceite de oliva y miel[b], para que vivan y no mueran. Y no escuchen a Ezequías, porque los está extraviando al decir: «Yahvé nos librará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tierra de grano y vino»; «mosto» refleja el sentido específico de תִּירוֹשׁ.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «tierra de aceite de oliva y miel», con una expresión comprimida que alude al producto del olivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עַד בֹּאִי
  english_pob_choice: until I come
  chosen_spanish: hasta que yo venga
  alternatives_spanish:
  - hasta que yo llegue
  lexicon: HALOT
  rationale: El hebreo expresa un punto futuro límite con בוא en primera persona. «Venga» conserva la forma verbal natural en español y mantiene el sentido temporal sin añadir matices.
- source_word: וְלָקַחְתִּי אֶתְכֶם
  english_pob_choice: and take you away
  chosen_spanish: y los lleve
  alternatives_spanish:
  - y los tome
  - y los lleve consigo
  lexicon: HALOT
  rationale: לקח en este contexto de deportación implica traslado forzado. «Llevar» comunica ese movimiento sin sobrecargar el verso; el complemento contextual ya hace claro que no es un simple acompañamiento.
- source_word: אֶל אֶרֶץ כְּאַרְצְכֶם
  english_pob_choice: to a land like your own land
  chosen_spanish: a una tierra como su propia tierra
  alternatives_spanish:
  - a una tierra como la suya
  - a una tierra parecida a la suya
  lexicon: HALOT
  rationale: 'כְ marca comparación, no identidad. «Como su propia tierra» reproduce la propaganda del asirio: una tierra semejante a Judá, no la misma tierra.'
- source_word: אֶרֶץ דָּגָן וְתִירוֹשׁ
  english_pob_choice: a land of grain and new wine
  chosen_spanish: tierra de grano y mosto
  alternatives_spanish:
  - tierra de grano y vino
  - tierra de cereal y mosto
  lexicon: HALOT
  rationale: דגן es grano/cereal. תירוש se entiende mejor como «mosto» o vino nuevo; «mosto» preserva la referencia a vino recién producido y suena más natural que una perífrasis larga.
- source_word: אֶרֶץ לֶחֶם וּכְרָמִים
  english_pob_choice: a land of bread and vineyards
  chosen_spanish: tierra de pan y viñedos
  alternatives_spanish:
  - tierra de alimento y viñedos
  lexicon: HALOT
  rationale: לֶחֶם es literalmente «pan» y debe mantenerse; כרמים son «viñedos», no solo uvas. La repetición de «tierra» conserva la cadencia del hebreo.
- source_word: אֶרֶץ זֵית יִצְהָר וּדְבַשׁ
  english_pob_choice: a land of olive oil and honey
  chosen_spanish: tierra de aceite de oliva y miel
  alternatives_spanish:
  - tierra de aceite y miel
  - tierra de oliva, aceite y miel
  lexicon: HALOT
  rationale: La expresión hebrea es comprimida y alude al producto del olivo. «Aceite de oliva» explicita el sentido sin perder la referencia agrícola; «miel» conserva el paralelo de abundancia.
- source_word: וִחְיוּ וְלֹא תָמֻתוּ
  english_pob_choice: so that you may live and not die
  chosen_spanish: para que vivan y no mueran
  alternatives_spanish:
  - y vivan y no mueran
  - de modo que vivan y no mueran
  lexicon: HALOT
  rationale: La secuencia funciona como resultado o propósito en el discurso. «Para que» expresa bien la intención persuasiva del hablante y mantiene el contraste vida/muerte.
- source_word: וְאַל תִּשְׁמְעוּ אֶל חִזְקִיָּהוּ
  english_pob_choice: And do not listen to Hezekiah
  chosen_spanish: Y no escuchen a Ezequías
  alternatives_spanish:
  - Y no obedezcan a Ezequías
  lexicon: HALOT
  rationale: שמע אל significa atender, escuchar, hacer caso. «Escuchen» es más directo que «obedezcan» y conserva el matiz de prestar oído a sus palabras.
- source_word: כִּי יַסִּית אֶתְכֶם
  english_pob_choice: for he is misleading you
  chosen_spanish: porque los está engañando
  alternatives_spanish:
  - porque los está incitando
  - porque los está persuadiendo
  lexicon: HALOT
  rationale: El verbo en hifil puede significar incitar, seducir o desviar. «Engañando» refleja la acusación en el discurso asirio y resulta idiomático en español, aunque el hebreo también puede tener matiz de incitación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio español del proyecto para el Tetragrámaton: «Yahvé». Esta forma mantiene el nombre propio divino en vez de sustituirlo por un título.'
- source_word: יַצִּילֵנוּ
  english_pob_choice: will deliver us
  chosen_spanish: nos librará
  alternatives_spanish:
  - nos salvará
  - nos rescatará
  lexicon: HALOT
  rationale: נצל en hifil suele expresar librar o rescatar del peligro. «Librará» es natural en español bíblico actual y conserva el sentido de liberación eficaz.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Conforme al criterio del proyecto, no se lo sustituye por un equivalente genérico; se mantiene el nombre propio divino en español como «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador sigue de cerca la lectura auditada en inglés y no requiere cambios respecto del pasaje fuente. Se conserva la tensión léxica de תִּירוֹשׁ (mosto/vino nuevo) y la expresión comprimida de זֵית יִצְהָר, explicitando en notas las alternativas relevantes.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה según la terminología del proyecto.
  - Se prefirió «librará» para יַצִּילֵנוּ, en línea con el valor de rescate/liberación del verbo.
  - Se preservó la repetición de «tierra» para reflejar la cadencia y la estructura del hebreo.
  - «Mosto» y «aceite de oliva» son elecciones explicativas que buscan claridad sin borrar la base agrícola del texto.
