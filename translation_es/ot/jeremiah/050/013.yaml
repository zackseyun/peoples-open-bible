revisions:
- from: Por la ira de Yahvé[a], no será habitada, sino que llegará a ser una desolación completa. Todo el que pase por Babilonia quedará asombrado y silbará por causa de todas sus heridas.
  to: Por la ira de Yahvé, no será habitada, sino que llegará a ser una desolación completa. Todo el que pase por Babilonia quedará horrorizado y silbará[a] por todas sus heridas.
  rationale: La revisión corrige el anclaje de la nota al término correcto, ajusta la preposición para no sobreinterpretar עַל, mejora la nota léxica para reflejar adecuadamente la alternativa preservada por el POB inglés, y fortalece «quedará horrorizado» para reflejar mejor el tono de appalled en este contexto de juicio. No hace falta adjudicación adicional, porque los cambios son claros y localizados.
