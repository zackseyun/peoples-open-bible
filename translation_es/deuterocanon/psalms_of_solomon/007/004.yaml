translation:
  language: es
  text: Porque si envías la muerte[a], tú le ordenarás respecto de nosotros; porque eres misericordioso, y no te enojarás de modo que nos lleves al fin.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la peste» o «la pestilencia»; el griego dice literalmente «muerte», y aquí se conserva ese valor léxico.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y no te enojarás como para destruirnos por completo». El griego expresa resultado o grado, no una secuencia temporal. Además, «le» retiene la referencia a «la muerte» sin forzar una personificación más explícita en español.'
    reason: lexical_and_syntactic_note
lexical_decisions:
- source_word: ἐὰν γὰρ ἀποστείλῃς
  english_pob_choice: For if you send
  chosen_spanish: Porque si envías
  alternatives_spanish:
  - Pues si envías
  - Porque si mandas
  lexicon: BDAG
  rationale: ἐὰν γάρ introduce una condición con explicación causal; en español, «Porque si» conserva el matiz argumentativo sin forzar la sintaxis. ἀποστείλῃς se rinde de forma directa como «envías», que es natural y fiel.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  - el morir
  lexicon: BDAG
  rationale: El griego dice literalmente «muerte»; no hay base suficiente aquí para especificar «pestilencia». Mantener «la muerte» conserva la fuerza léxica del sustantivo sin añadir concreción no atestiguada en este versículo.
- source_word: ἐντελῇ
  english_pob_choice: you will command
  chosen_spanish: le darás orden
  alternatives_spanish:
  - le mandarás
  - le ordenarás
  lexicon: BDAG
  rationale: El verbo expresa dar una orden o encargo. «Le darás orden» comunica bien la relación de autoridad sin sonar excesivamente rígido en español.
- source_word: αὐτῷ
  english_pob_choice: him/it
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a ello
  lexicon: BDAG
  rationale: El pronombre griego es masculino por la personificación de «muerte». En español, el dativo «le» mantiene la referencia sin necesidad de decidir explícitamente entre persona y cosa en el cuerpo del texto.
- source_word: περὶ ἡμῶν
  english_pob_choice: concerning us
  chosen_spanish: acerca de nosotros
  alternatives_spanish:
  - sobre nosotros
  - con respecto a nosotros
  lexicon: BDAG
  rationale: «Acerca de nosotros» es una equivalencia natural para περὶ ἡμῶν y conserva el sentido de disposición o instrucción relativa a los suplicantes.
- source_word: ἐλεήμων
  english_pob_choice: merciful
  chosen_spanish: misericordioso
  alternatives_spanish:
  - compasivo
  - misericordioso y compasivo
  lexicon: BDAG
  rationale: «Misericordioso» es el equivalente bíblico más directo y digno en español, adecuado para el atributo divino afirmado en el contexto.
- source_word: ὀργισθήσῃ
  english_pob_choice: will not be angry so as to
  chosen_spanish: no te enojarás
  alternatives_spanish:
  - no te indignarás
  - no te airarás
  lexicon: BDAG
  rationale: El futuro pasivo/middle de ὀργίζομαι expresa llegar a estar enojado o airado. «No te enojarás» es claro y natural en español; la relación con el infinitivo siguiente se expresa en la cláusula final.
- source_word: τοῦ συντελέσαι ἡμᾶς
  english_pob_choice: to bring us to an end
  chosen_spanish: hasta destruirnos por completo
  alternatives_spanish:
  - para consumirnos por completo
  - hasta acabarnos
  lexicon: BDAG
  rationale: 'El infinitivo articular indica resultado/fin: «bringing us to an end». «Destruirnos por completo» comunica la idea de final total sin exagerar más allá del griego.'
theological_decisions:
- issue: Alcance de θάνατον
  english_pob_reading: death
  chosen_spanish_reading: la muerte
  alternative_spanish_readings:
  - la peste
  - la pestilencia
  rationale: Aunque un revisor propuso «pestilencia» por posibles trasfondos de LXX, el texto griego recibido dice θάνατον, no δέβερ ni un equivalente explícito de pestilencia. Por fidelidad al texto base, se mantiene el término general «la muerte».
  doctrine_reference: Fidelidad textual y semántica; evitar especificaciones no presentes en el griego transmitido.
- issue: Personificación de la muerte
  english_pob_reading: you will command him
  chosen_spanish_reading: le darás orden
  alternative_spanish_readings:
  - le darás orden a él
  - le darás órdenes
  rationale: El griego usa αὐτῷ con θάνατος en masculino, personificando la muerte. En español, el dativo átono «le» preserva esa referencia sin recargar el verso con una nota en el texto principal.
  doctrine_reference: Personificación poética en literatura bíblica; respeto al sujeto gramatical griego.
- issue: Matiz de ὀργισθήσῃ con infinitivo de resultado
  english_pob_reading: you will not be angry so as to bring us to an end
  chosen_spanish_reading: no te enojarás hasta destruirnos por completo
  alternative_spanish_readings:
  - no te enojarás para destruirnos por completo
  - no te enojarás como para destruirnos
  rationale: El griego expresa que la ira no llegará al punto de acabar con el pueblo. «Hasta destruirnos por completo» conserva la finalidad/resultado sin añadir una glosa demasiado interpretativa.
  doctrine_reference: Lectura del infinitivo articular de resultado; preservación de la tensión entre ira divina y misericordia.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: una propuesta intermedia quiso especificar «pestilencia», pero la revisión posterior corrigió el texto a «muerte» por exactitud léxica. La versión española sigue el texto griego transmitido y conserva el sentido de personificación sin introducir una especificación no sustentada.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no aparece, por lo que se usa «Dios» implícito mediante pronombres y atributos.
  - Se conserva un estilo bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se evita traducir «ὀργισθήσῃ» con una formulación excesivamente interpretativa; la consecuencia se expresa en la cláusula final.
  - No se introduce «pestilencia» en el texto principal porque no está en el griego de este versículo.
