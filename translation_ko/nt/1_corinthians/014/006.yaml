  text: ⸀Νῦν δέ, ἀδελφοί, ἐὰν ἔλθω πρὸς ὑμᾶς γλώσσαις λαλῶν, τί ὑμᾶς ὠφελήσω, ἐὰν μὴ ὑμῖν λαλήσω ἢ ἐν ἀποκαλύψει ἢ ἐν γνώσει ἢ ἐν προφητείᾳ ἢ ἐν διδαχῇ;
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/006.yaml
  text: Now[a], brothers, if I come to you speaking in tongues[b], what will I benefit you unless I speak to you either by revelation or by knowledge or by prophecy or by teaching?
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; Greek 'brothers' can address a mixed congregation.
    reason: lexical_alternative
  - marker: b
    text: Or 'speaking in languages'; the Greek term can mean 'languages,' but in this context it refers to the phenomenon discussed throughout 1 Corinthians 12–14.
    reason: lexical_alternative
translation:
  language: ko
  text: 이제 형제 여러분, 내가 여러분에게 가서 방언으로 말한다면, 계시나 지식이나 예언이나 가르침으로 여러분에게 말하지 않는다면, 내가 여러분에게 무슨 유익을 끼치겠습니까?
  philosophy: optimal-equivalence
