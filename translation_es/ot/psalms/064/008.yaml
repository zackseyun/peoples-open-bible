    rationale: Aunque «lanzar» es posible, en este contexto con «flecha» el hebreo representa más naturalmente la acción de disparar/tirar un proyectil. «Dispara una flecha» preserva mejor la imaginería y se alinea más de cerca con la POB inglesa.
  - severity: medium
