revisions:
- from: Y además[a], enviaron por hombres que venían de lejos, a quienes se había enviado un mensajero; y he aquí que vinieron, a la que se había lavado, se había pintado los ojos y se había adornado con joyas.
  to: 'Y además, enviaron por hombres que venían de lejos, a quienes se había enviado un mensajero; y he aquí que vinieron: a la que se había lavado, se había pintado[a] los ojos y se había adornado con joyas.'
  rationale: Se conserva la traducción base por ser fiel al hebreo y al POB inglés, pero se corrige el anclaje de la nota para asociarla con el verbo de maquillaje ocular, y se ajusta la puntuación para una lectura más natural y precisa en español.
