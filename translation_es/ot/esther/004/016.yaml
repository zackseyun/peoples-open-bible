  language: en
  yaml_path: translation/ot/esther/004/016.yaml
  text: Go[a], gather all the Jews who are found in Susa, and fast for me. Do not eat or drink for three days[b], night and day. I and my young women also will fast in the same way. Then I will go to the king, though it is not according to the law; and if I perish[e][d][c], I perish.
  footnotes:
  - marker: a
    text: Or, 'all the Jews who are in Susa.' The Hebrew participle literally means 'who are found' or 'who are present.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'fast on my behalf.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'my maids' or 'my female attendants.'
    reason: lexical_alternative
  - marker: d
    text: Or, 'contrary to the law.'
    reason: lexical_alternative
  - marker: e
    text: Or, 'and when I perish, I perish.' The Hebrew wording is terse and emphatic, expressing Esther's acceptance of the risk.
    reason: lexical_alternative
