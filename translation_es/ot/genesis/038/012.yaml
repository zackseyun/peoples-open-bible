revisions:
- from: Pasados muchos días[a], murió la hija de Súa, la mujer de Judá. Cuando Judá fue consolado[c][b], subió a Timnat, a donde estaban los esquiladores de sus ovejas, él y su amigo Hirah, el adulamita.
  to: Pasados muchos días[a], murió la hija de Súa, la esposa de Judá. Cuando Judá fue consolado[c][b], subió a Timná, a sus esquiladores de ovejas, él y su amigo Hirah, el adulamita.
  rationale: Se ajusta el topónimo a 'Timná' por legibilidad y consistencia, se simplifica la frase sobre los esquiladores para reflejar mejor el hebreo y el audit trail inglés, y se mejora la naturalidad de 'esposa de Judá' sin alterar el sentido fuente. Las notas pueden mantenerse con mínima normalización tipográfica.
  reviewer_model: gpt-5.4
