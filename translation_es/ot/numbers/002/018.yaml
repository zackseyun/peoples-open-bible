translation:
  language: es
  text: La bandera del campamento de Efraín[a], según sus divisiones[b], estará al oeste; y el jefe de los hijos de Efraín[c] será Elishama hijo de Ammihud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estandarte» para «bandera».
    reason: lexical_alternative
  - marker: b
    text: O «según sus compañías/huestes». El hebreo tiene un sentido militar-organizativo ordenado.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «hijos de Efraín», designación tribal para los descendientes o el pueblo de Efraín.
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּגֶל
  english_pob_choice: banner
  chosen_spanish: bandera
  alternatives_spanish:
  - estandarte
  - señal
  lexicon: HALOT
  rationale: דֶּגֶל designa la insignia visible que identifica al campamento tribal. En español, "bandera" comunica bien esa función organizativa y es más natural que "estandarte"; "señal" sería demasiado general.
- source_word: מַחֲנֵה
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento
  - campamento militar
  - tropa
  lexicon: HALOT
  rationale: El contexto es la disposición tribal del desierto, no un campamento casual. "Campamento" mantiene el valor organizativo de מַחֲנֵה sin sonar forzado.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their divisions
  chosen_spanish: según sus divisiones
  alternatives_spanish:
  - por sus divisiones
  - según sus compañías
  - según sus huestes
  lexicon: HALOT
  rationale: צָבָא aquí expresa ordenamiento por grupos. "Según sus divisiones" conserva el sentido organizativo y evita sobrecargar con un matiz bélico que el contexto no exige.
- source_word: יָמָּה
  english_pob_choice: on the west
  chosen_spanish: al oeste
  alternatives_spanish:
  - hacia el oeste
  - en el occidente
  - hacia el mar
  lexicon: HALOT
  rationale: La forma adverbial señala la ubicación en el lado occidental del campamento. "Al oeste" es la formulación natural en español para esta disposición espacial.
- source_word: וְנָשִׂיא
  english_pob_choice: and the leader
  chosen_spanish: y el líder
  alternatives_spanish:
  - y el jefe
  - y el príncipe
  - y el caudillo
  lexicon: HALOT
  rationale: נָשִׂיא se refiere al jefe tribal o representante principal. "Líder" es claro y contemporáneo; "príncipe" podría sugerir un rango dinástico ajeno al contexto.
- source_word: לִבְנֵי אֶפְרַיִם
  english_pob_choice: of the sons of Ephraim
  chosen_spanish: de los hijos de Efraín
  alternatives_spanish:
  - de los descendientes de Efraín
  - del pueblo de Efraín
  lexicon: HALOT
  rationale: Se conserva la fórmula genealógico-tribal del hebreo. "Hijos de Efraín" es más literal y transparente que "descendientes", y mantiene el lenguaje de pertenencia tribal.
- source_word: אֱלִישָׁמָע בֶּן עַמִּיהוּד
  english_pob_choice: Elishama son of Ammihud
  chosen_spanish: Elishama hijo de Ammihud
  alternatives_spanish:
  - Elishama, hijo de Ammihud
  lexicon: Transliteration/kinship formula
  rationale: Los nombres propios se transliteran de forma directa. "Hijo de" reproduce de manera simple y fiel la relación filial del hebreo בֶּן.
theological_decisions:
- issue: Tribu/campamento como organización militar-tribal, no solo geografía
  english_pob_reading: The banner of the camp ... by their divisions ... on the west
  chosen_spanish_reading: La bandera del campamento ... según sus divisiones ... al oeste
  alternative_spanish_readings:
  - El estandarte del campamento ... por sus compañías ... hacia el mar
  - La insignia del campamento ... según sus huestes ... al occidente
  rationale: El versículo describe una disposición ordenada dentro del campamento israelita. La redacción española mantiene ese marco organizativo sin convertirlo en una escena de combate activo, preservando el sentido del hebreo y del audit trail inglés.
  doctrine_reference: Números 2:1-34; organización del campamento de Israel
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones sustantivas; la versión española sigue de cerca el sentido confirmado por la evaluación de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se eligió «hijos de Efraín» para conservar la fórmula tribal hebrea y su paralelismo con el audit trail inglés.
  - «Bandera» y «líder» buscan equilibrio entre fidelidad léxica y naturalidad en español bíblico contemporáneo.
