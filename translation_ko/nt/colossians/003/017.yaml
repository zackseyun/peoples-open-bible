id: COL.3.17
reference: Colossians 3:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ πᾶν ⸂ὅ τι⸃ ⸀ἐὰν ποιῆτε ἐν λόγῳ ἢ ἐν ἔργῳ, πάντα ἐν ὀνόματι κυρίου Ἰησοῦ, εὐχαριστοῦντες τῷ ⸀θεῷ πατρὶ δι’ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/017.yaml
  text: And whatever you do, in word or in deed, do everything in the name of the Lord Jesus, giving thanks to God the Father through him.
translation:
  language: ko
  text: 무엇을 하든지, 말로 하든지 행위로 하든지, 모든 것을 주 예수의 이름으로[a] 하며, 그분을 통하여 아버지 하나님께 감사드리십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「~의 이름으로」는 또한 「~의 권위 아래」, 「~를 대표하여」를 함의할 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν ὅ τι ἐὰν ποιῆτε
  english_pob_choice: whatever you do
  chosen_korean: 무엇을 하든지
  alternatives_korean:
  - 너희가 행하는 모든 것은
  - 무엇이든 행할 때
  lexicon: BDAG
  rationale: 포괄적 부정 관계 구문을 자연스러운 한국어로 옮긴다.
- source_word: ἐν λόγῳ ἢ ἐν ἔργῳ
  english_pob_choice: in word or in deed
  chosen_korean: 말로 하든지 행위로 하든지
  alternatives_korean:
  - 말에서나 행위에서나
  - 말이나 행동으로
  lexicon: BDAG
  rationale: 정형적 대조. 「말·행위」 두 영역 보존.
- source_word: πάντα ἐν ὀνόματι κυρίου Ἰησοῦ
  english_pob_choice: do everything in the name of the Lord Jesus
  chosen_korean: 모든 것을 주 예수의 이름으로 하며
  alternatives_korean:
  - 모든 것을 주 예수의 이름으로
  - 모든 일을 주 예수의 이름으로 행하며
  lexicon: BDAG
  rationale: 「주 예수의 이름으로」는 한국 교회의 정립된 표현. 「~으로 하다」 동사 보완.
- source_word: εὐχαριστοῦντες τῷ θεῷ πατρὶ
  english_pob_choice: giving thanks to God the Father
  chosen_korean: 아버지 하나님께 감사드리십시오
  alternatives_korean:
  - 하나님 아버지께 감사하며
  lexicon: BDAG
  rationale: 동격 「하나님 — 곧 아버지」를 자연스럽게 「아버지 하나님」으로 옮긴다. 합쇼체 명령으로 마무리.
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_korean: 그분을 통하여
  alternatives_korean:
  - 그분으로 말미암아
  - 예수님을 통하여
  lexicon: BDAG
  rationale: 직전의 「주 예수」를 받는 인격적 대명사. 「통하여」로 매개를 살린다.
