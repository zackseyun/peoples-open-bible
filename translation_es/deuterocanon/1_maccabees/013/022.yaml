translation:
  language: es
  text: Y Trifón preparó toda su caballería para venir; pero aquella noche hubo una nevada muy grande, y no vino a causa de la nieve. Así que levantó el campamento y fue a la región de Galaad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «a la Galaaditis/Gileaditis», es decir, la región de Galaad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡτοίμασεν
  english_pob_choice: prepared
  chosen_spanish: preparó
  alternatives_spanish:
  - dejó listo
  - dispuso
  lexicon: LSJ
  rationale: «Preparó» reproduce de modo natural la acción de dejar listo el contingente militar sin añadir matices innecesarios.
- source_word: πᾶσαν τὴν ἵππον αὐτοῦ
  english_pob_choice: all his cavalry
  chosen_spanish: toda su caballería
  alternatives_spanish:
  - todos sus jinetes
  - toda su fuerza de caballería
  lexicon: LSJ
  rationale: En contexto militar, ἵππος designa la tropa montada; «caballería» conserva ese valor colectivo mejor que una traducción literal de «caballos».
- source_word: ἐλθεῖν
  english_pob_choice: to come
  chosen_spanish: venir
  alternatives_spanish:
  - llegar
  - avanzar
  lexicon: LSJ
  rationale: El infinitivo depende de «preparó»; «venir» sigue de cerca el griego sin cargarlo de una interpretación táctica mayor que la requerida por el texto.
- source_word: χιών πολλὴ σφόδρα
  english_pob_choice: a very great snowfall
  chosen_spanish: una nevada muy grande
  alternatives_spanish:
  - una nevada muy intensa
  - mucha nieve
  lexicon: LSJ
  rationale: La expresión intensifica la cantidad de nieve; «nevada» comunica el evento climático de manera natural en español y evita una construcción torpe.
- source_word: οὐκ ἦλθεν διὰ τὴν χιόνα
  english_pob_choice: he did not come because of the snow
  chosen_spanish: no vino a causa de la nieve
  alternatives_spanish:
  - no llegó por la nieve
  - no pudo venir a causa de la nieve
  lexicon: LSJ
  rationale: «A causa de» preserva la fuerza causal explícita de διά con acusativo, sin añadir la inferencia de incapacidad que no está dicha.
- source_word: ἀπῆρεν
  english_pob_choice: broke camp
  chosen_spanish: levantó el campamento
  alternatives_spanish:
  - partió
  - se puso en marcha
  lexicon: LSJ
  rationale: En narración militar, el verbo sugiere abandonar el campamento y marcharse; «levantó el campamento» transmite bien esa escena en español.
- source_word: Γαλααδῖτιν
  english_pob_choice: the Gilead region
  chosen_spanish: la región de Galaad
  alternatives_spanish:
  - Galaaditis
  - Gileaditis
  lexicon: LSJ
  rationale: El formante griego señala el distrito de Galaad; «la región de Galaad» es claro para el lector moderno y conserva el referente geográfico.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia; no se observaron revisiones sustantivas aplicadas. La presente versión sigue esa lectura con ajustes naturales al español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el nombre divino.
  - Se prefirió «caballería» por el valor militar colectivo de ἵππος.
  - Se evitó traducir ἦλθεν como «llegó» para no introducir una focalización distinta de la del griego.
  - Se conservó el matiz causal de διὰ τὴν χιόνα con «a causa de la nieve».
