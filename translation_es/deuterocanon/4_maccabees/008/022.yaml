translation:
  language: es
  text: Pero también la justicia divina nos perdonará[a] si, bajo coacción, tememos al rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el juicio divino también nos perdonará» o «el castigo divino nos perdonará». El griego δίκη puede significar justicia, juicio o pena.
    reason: lexical_alternative
lexical_decisions:
- source_word: συγγνώσεται
  english_pob_choice: will pardon
  chosen_spanish: nos perdonará
  alternatives_spanish:
  - nos excusará
  - mostrará indulgencia con nosotros
  lexicon: LSJ
  rationale: El verbo griego puede expresar perdón, indulgencia o excusa. En español, «perdonará» conserva bien el sentido de clemencia personal y encaja con el objeto indirecto «nos», sin debilitar la fuerza moral del contexto.
- source_word: ἡ θεία δίκη
  english_pob_choice: divine justice
  chosen_spanish: la justicia divina
  alternatives_spanish:
  - el juicio divino
  - el castigo divino
  - la justicia de Dios
  lexicon: LSJ
  rationale: «δίκη» admite justicia, juicio o pena. «Justicia divina» preserva la amplitud del término y mantiene la tensión entre justicia y perdón sin reducirlo prematuramente a castigo.
- source_word: διʼ ἀνάγκην
  english_pob_choice: if, under compulsion
  chosen_spanish: bajo compulsión
  alternatives_spanish:
  - por necesidad
  - forzados
  - bajo necesidad
  lexicon: LSJ
  rationale: La frase indica coacción o necesidad externa. «Bajo compulsión» refleja esa presión causal de manera clara en español y conserva la relación con el temor al rey.
- source_word: τὸν βασιλέα
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al soberano
  lexicon: LSJ
  rationale: βασιλεύς significa literalmente «rey». No hay motivo contextual para ampliar o suavizar el título.
- source_word: φοβηθεῖσιν
  english_pob_choice: become afraid
  chosen_spanish: llegamos a temer
  alternatives_spanish:
  - tememos
  - lleguemos a temer
  - nos asustamos
  lexicon: LSJ
  rationale: El participio aoristo pasivo transmite el hecho de quedar atemorizados. En español, «llegamos a temer» reproduce el valor ingresivo sin sonar forzado, y permite enlazarlo con la condición general de la cláusula.
theological_decisions:
- issue: Cómo traducir δίκη sin resolver de antemano si implica justicia, juicio o castigo
  english_pob_reading: divine justice
  chosen_spanish_reading: justicia divina
  alternative_spanish_readings:
  - juicio divino
  - castigo divino
  rationale: El texto habla de perdón concedido a personas que actuaron bajo compulsión; por eso conviene conservar un término amplio. «Justicia divina» mantiene la tensión teológica entre justicia y clemencia, en lugar de identificar δίκη sólo con castigo.
  doctrine_reference: Preservar la tensión teológica, no resolverla prematuramente.
translation_notes:
  revision_awareness: Tomé como base la última revisión inglesa, que ajustó la relación de διʼ ἀνάγκην con el participio y prefirió una formulación más natural de la coacción. En español, eso se refleja con «bajo compulsión» y con una cláusula condicional que conserva la referencia al temor al rey sin reordenar el sentido.
  spanish_consistency_notes:
  - Se mantiene «justicia divina» para ἡ θεία δίκη, en coherencia con el criterio POB de preservar la amplitud semántica de δίκη.
  - Se evita «SEÑOR» o equivalentes litúrgicos porque el texto no contiene κύριος ni una cita directa del Tetragrámaton.
  - «Compulsión» se usa como equivalente de coacción/ανάγκη, no como término doctrinal técnico.
  - La puntuación busca reflejar la clausula condicional del ajuste revisado en inglés sin perder fluidez en español.
