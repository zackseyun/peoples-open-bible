base_translation:
  language: en
  yaml_path: translation/ot/joel/004/002.yaml
  text: I will gather all the nations and bring them down to the Valley of Jehoshaphat[a], and there I will enter into judgment with them concerning my people and my inheritance, Israel[b], whom they scattered among the nations and divided my land.
  footnotes:
  - marker: a
    text: Or 'because of my people and my inheritance, Israel' or 'concerning my people and my inheritance, Israel.' The Hebrew preposition can be understood in more than one closely related judicial sense.
    reason: alternative_reading
  - marker: b
    text: '''The Valley of Jehoshaphat'' is a place name; the name itself may echo the idea ''the LORD judges.'''
    reason: cultural_note
