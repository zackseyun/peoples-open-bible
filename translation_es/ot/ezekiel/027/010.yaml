    rationale: El hebreo אַנְשֵׁי מִלְחַמְתֵּךְ se expresa mejor en español como «tus hombres de guerra» o «tus guerreros». Dado el rastro POB, «como tus hombres de guerra» conserva mejor forma y sentido.
  - severity: low
