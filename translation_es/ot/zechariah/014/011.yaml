review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: dos usos de ישׁב como «habitar», la cesación futura de חֵרֶם, y la personificación de Jerusalén que «habitará». Sin embargo, «cosa dedicada al anatema» no preserva tan fielmente la decisión auditada del POB como «algo/cosa dedicada a la destrucción», porque «anatema» en español eclesial puede sugerir excomunión o maldición más que algo puesto bajo destrucción.'
  spanish_quality_summary: El español es legible y digno, pero «cosa dedicada al anatema» suena algo forzado y menos claro para un lector general. También «ya más» es posible, aunque «ya no habrá» fluye mejor en español contemporáneo bíblico. «Habitará con seguridad» es correcto y natural.
  glossary_alignment: No hay términos del glosario mayor en juego salvo la necesidad de mantener חֵרֶם con su fuerza de destrucción. Conviene alinear el texto principal con la decisión inglesa «anything devoted to destruction» usando «nada dedicado a la destrucción» o equivalente, y dejar «anatema» solo como alternativa si se desea, no como texto principal.
  issues:
  - severity: medium
    issue: «dedicada al anatema» para חֵרֶם en el texto principal
    rationale: La auditoría inglesa privilegia «anything devoted to destruction» sobre «curse/the ban». En español, «anatema» añade ambigüedad eclesiástica y no comunica con suficiente claridad la idea de destrucción consagrada bajo juicio divino.
  - severity: low
    issue: «no habrá ya más» puede mejorarse a «ya no habrá»
    rationale: Ambas son fieles, pero «ya no habrá» es más natural en español actual sin perder el valor aspectual de לֹא יִהְיֶה עוֹד.
  - severity: low
    issue: Nota al pie anclada en «cosa» en vez del término problemático
    rationale: El marcador funciona, pero es más lógico anclar la nota en la frase de destrucción/alternativa léxica; aun así, basta con conservar un único anclaje claro en la cláusula pertinente.
  revised_spanish_text: Y habitarán en ella, y ya no habrá nada[a] dedicado a la destrucción, y Jerusalén habitará con seguridad.
  revised_footnotes:
  - marker: a
    text: O «ya no habrá anatema». Hebreo חֵרֶם puede referirse también a algo puesto bajo prohibición o dedicado a la destrucción.
    reason: lexical_alternative
  revision_rationale: Se reemplazó «cosa dedicada al anatema» por «nada dedicado a la destrucción» para alinearse mejor con la decisión léxica y teológica documentada del POB y evitar la ambigüedad de «anatema» en español. También se ajustó «no habrá ya más» a «ya no habrá» por mayor naturalidad. Se mantuvo «habitarán / habitará» y «con seguridad» por su fidelidad y buena legibilidad.
