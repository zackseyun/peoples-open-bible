id: 2CH.1.11
reference: 2 Chronicles 1:11
source:
  edition: WLC
  text: וַ/יֹּ֣אמֶר אֱלֹהִ֣ים לִ/שְׁלֹמֹ֡ה יַ֣עַן אֲשֶׁר֩ הָיְתָ֨ה זֹ֜את עִם לְבָבֶ֗/ךָ וְ/לֹֽא שָׁ֠אַלְתָּ עֹ֣שֶׁר נְכָסִ֤ים וְ/כָבוֹד֙ וְ/אֵת֙ נֶ֣פֶשׁ שֹׂנְאֶ֔י/ךָ וְ/גַם יָמִ֥ים רַבִּ֖ים לֹ֣א שָׁאָ֑לְתָּ וַ/תִּֽשְׁאַל לְ/ךָ֙ חָכְמָ֣ה וּ/מַדָּ֔ע אֲשֶׁ֤ר תִּשְׁפּוֹט֙ אֶת עַמִּ֔/י אֲשֶׁ֥ר הִמְלַכְתִּ֖י/ךָ עָלָֽי/ו־׀־־־־־׃
translation:
  text: And God said to Solomon[a], “Because this was in your heart, and you did not ask for wealth, possessions, or honor, or for the life of those who hate you, nor did you ask for many days, but asked for wisdom and knowledge for yourself[b], that you might judge my people over whom I have made you king,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'long life' for 'many days.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the lives of your enemies'; literally 'the life of those who hate you.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעַן אֲשֶׁר
  chosen: Because
  alternatives:
  - Since
  - Inasmuch as
  lexicon: HALOT
  rationale: Introduces the reason for God's response. 'Because' is natural modern English and preserves the causal force without sounding archaic.
- source_word: הָיְתָה זֹאת עִם לְבָבֶךָ
  chosen: this was in your heart
  alternatives:
  - this was with your heart
  - this was your heart's desire
  lexicon: HALOT
  rationale: The idiom refers to an inward disposition or intention. 'In your heart' is both idiomatic English and close to the Hebrew imagery; 'your heart's desire' is interpretive and therefore not preferred in the main text.
- source_word: שָׁאַלְתָּ
  chosen: ask
  alternatives:
  - request
  - seek
  lexicon: HALOT
  rationale: '''Ask'' is the plain and repeated sense of the verb in this verse and should be kept consistently across its occurrences.'
- source_word: עֹשֶׁר
  chosen: wealth
  alternatives:
  - riches
  lexicon: HALOT
  rationale: '''Wealth'' is clear modern English; ''riches'' is traditional but slightly more stylized.'
- source_word: נְכָסִים
  chosen: possessions
  alternatives:
  - property
  - assets
  lexicon: HALOT
  rationale: Distinguishes this term from עֹשֶׁר while keeping accessible English. 'Possessions' captures tangible holdings better than the more technical 'assets.'
- source_word: כָבוֹד
  chosen: honor
  alternatives:
  - glory
  lexicon: HALOT
  rationale: In this royal context the term refers to status and esteem. 'Honor' fits the list of things Solomon did not request; 'glory' is possible but can sound more abstract or overtly theological in English.
- source_word: נֶפֶשׁ שֹׂנְאֶיךָ
  chosen: the life of those who hate you
  alternatives:
  - the lives of your enemies
  - the life of your haters
  lexicon: HALOT
  rationale: נֶפֶשׁ here idiomatically refers to life, especially in the sense of a person's life being taken. 'Those who hate you' follows the participial form closely; 'your enemies' is smoother but less literal.
- source_word: יָמִים רַבִּים
  chosen: many days
  alternatives:
  - long life
  - many years
  lexicon: HALOT
  rationale: The Hebrew expression is literally 'many days.' This preserves the wording while remaining understandable. 'Long life' is a valid dynamic alternative but slightly more interpretive.
- source_word: חָכְמָה
  chosen: wisdom
  lexicon: HALOT
  rationale: Standard rendering; central to the passage and best preserved directly.
- source_word: מַדָּע
  chosen: knowledge
  alternatives:
  - understanding
  lexicon: HALOT
  rationale: Keeps distinction from חָכְמָה. 'Knowledge' is the most straightforward gloss; 'understanding' would blur the pair.
- source_word: לְךָ
  chosen: for yourself
  alternatives:
  - for yourself alone
  - for you
  lexicon: HALOT
  rationale: 'Makes explicit the reflexive/dative nuance in English: Solomon asked wisdom and knowledge for his own endowment. This is not selfish in context but marks the recipient of the gift.'
- source_word: אֲשֶׁר תִּשְׁפּוֹט
  chosen: so that you may judge
  alternatives:
  - with which you may judge
  - that you may govern
  lexicon: HALOT
  rationale: Expresses purpose/result in natural English. 'Judge' is retained rather than 'govern' because the Hebrew verb is the standard term for judging, though governance is included in the royal context.
- source_word: הִמְלַכְתִּיךָ עָלָיו
  chosen: I have made you king over
  alternatives:
  - I have caused you to reign over
  - I have enthroned you over
  lexicon: HALOT
  rationale: The hiphil of מלך means to make someone king. 'I have made you king over' is accurate and idiomatic.
