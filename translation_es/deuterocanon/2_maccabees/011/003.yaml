review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego y conserva las dos propuestas infinitivas: convertir el santuario en fuente de ingresos monetarios y hacer vendible el sumo sacerdocio anualmente. «Santuario», «templos» y «sumo sacerdocio» están bien alineados con ἱερὸν, τεμένη y ἀρχιερωσύνην. Sin embargo, «gravado en plata» suena poco idiomático y puede leerse como mera carga fiscal sin expresar con suficiente claridad la idea de tributo monetario; además, «y vender el sumo sacerdocio» atenúa el valor causativo de ποιήσειν y el matiz de πρατὴν como ‘puesto en venta/vendible’.'
  spanish_quality_summary: 'El español es en general claro y digno, pero requiere un ajuste pequeño para mayor naturalidad y precisión. «Sujeto a tributo en plata» o una fórmula equivalente comunica mejor ἀργυρολόγητον en español publicable. También conviene mantener el paralelismo con «hacer» en la segunda cláusula: «hacer que el sumo sacerdocio se vendiera cada año» o «poner en venta el sumo sacerdocio cada año».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Santuario» y «sumo sacerdocio» concuerdan con las decisiones auditadas. La revisión propuesta no afecta términos doctrinales sensibles; solo mejora la representación léxica de ἀργυρολόγητον y πρατὴν/ποιήσειν.
  issues:
  - severity: medium
    issue: «gravado en plata» es poco natural en español bíblico moderno
    rationale: Aunque intenta seguir de cerca el inglés auditado, la combinación no suena idiomática y puede resultar ambigua. El griego expresa que el santuario sería sometido a tributación monetaria o convertido en fuente de ingresos; «sujeto a tributo en plata» lo comunica con mayor claridad.
  - severity: medium
    issue: «y vender el sumo sacerdocio cada año» debilita el valor causativo y vendible del griego
    rationale: ποιήσειν gobierna también esta cláusula, y πρατὴν describe el cargo como algo puesto en venta. La formulación actual suena más como una acción simple que como una política de mercantilización del oficio. «Hacer que el sumo sacerdocio se vendiera cada año» preserva mejor el sentido.
  revised_spanish_text: y hacer que el santuario estuviera sujeto a tributo en plata[a], como los demás templos de las naciones, y hacer que el sumo sacerdocio se vendiera cada año[b];
  revised_footnotes:
  - marker: a
    text: 'O: «gravado en plata» / «tasado en moneda». El raro adjetivo ἀργυρολόγητον indica que el santuario sería tratado como una fuente de ingresos monetarios, en paralelo con los templos paganos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «poner en venta el sumo sacerdocio cada año». El griego presenta el cargo mismo como vendible, subrayando la profanación propuesta.'
    reason: lexical_alternative
  revision_rationale: Se ajustó «gravado en plata» a una expresión más natural y precisa en español («sujeto a tributo en plata») para reflejar mejor ἀργυρολόγητον. También se restauró el paralelismo causativo de ποιήσειν en la segunda cláusula y se explicitó que el cargo era tratado como vendible, no solo vendido incidentalmente.
