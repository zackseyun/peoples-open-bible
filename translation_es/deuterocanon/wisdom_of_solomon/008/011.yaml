translation:
  language: es
  text: Seré hallado perspicaz en el juicio[a], y a la vista de los gobernantes[b] seré admirado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agudo en el juicio». El adjetivo griego también puede traducirse más literalmente como «agudo» o «afilado».
    reason: lexical_alternative
  - marker: b
    text: O «ante los gobernantes» o «en presencia de los gobernantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀξεῖς
  english_pob_choice: keen
  chosen_spanish: agudo
  alternatives_spanish:
  - perspicaz
  - agudo de juicio
  - penetrante
  lexicon: LSJ
  rationale: El griego significa literalmente 'agudo' o 'afilado'. En este contexto de discernimiento judicial, 'agudo' conserva la imagen intelectual sin forzar un giro más interpretativo que el texto.
- source_word: εὑρεθήσομαι
  english_pob_choice: I will be found
  chosen_spanish: seré hallado
  alternatives_spanish:
  - se me reconocerá como
  - resultaré ser
  - seré descubierto como
  lexicon: BDAG
  rationale: El futuro pasivo de εὑρίσκω mantiene la idea de ser encontrado o reconocido como algo. 'Seré hallado' conserva bien el giro pasivo y la ambigüedad del agente.
- source_word: ἐν κρίσει
  english_pob_choice: in judgment
  chosen_spanish: en el juicio
  alternatives_spanish:
  - en juicio
  - en la decisión
  - en el proceso judicial
  lexicon: LSJ
  rationale: κρίσις puede abarcar juicio, decisión o proceso judicial. 'En el juicio' es natural en español y retiene la amplitud judicial/deliberativa sin precisar demasiado.
- source_word: ἐν ὄψει
  english_pob_choice: in the sight of
  chosen_spanish: a la vista de
  alternatives_spanish:
  - ante
  - en presencia de
  - delante de
  lexicon: LSJ
  rationale: La expresión literal apunta a la esfera de la visión o presencia pública. 'A la vista de' preserva ese matiz visual y público en español.
- source_word: δυναστῶν
  english_pob_choice: rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los poderosos
  - los príncipes
  - las autoridades
  lexicon: LSJ
  rationale: δυνάστης designa a quien tiene poder. 'Gobernantes' comunica bien la referencia pública y política, y evita la arcaización de 'príncipes'.
- source_word: θαυμασθήσομαι
  english_pob_choice: I will be admired
  chosen_spanish: seré admirado
  alternatives_spanish:
  - seré objeto de admiración
  - causaré admiración
  - seré asombrado
  lexicon: BDAG
  rationale: El futuro pasivo expresa que se convertirá en objeto de admiración o asombro. 'Seré admirado' transmite esa evaluación positiva de forma natural y fiel.
theological_decisions:
- issue: Valor de κρίσις como juicio/deliberación pública
  english_pob_reading: in judgment
  chosen_spanish_reading: en el juicio
  alternative_spanish_readings:
  - en juicio
  - en la decisión
  - en el proceso judicial
  rationale: No hay motivo para reducir κρίσις a una escena de tribunal estrictamente formal; 'en el juicio' mantiene la amplitud del término y su peso evaluativo.
  doctrine_reference: Uso semántico de κρίσις en sabiduría bíblica y literatura judicial
- issue: Sentido de θαυμασθήσομαι como admiración o asombro positivo
  english_pob_reading: I will be admired
  chosen_spanish_reading: seré admirado
  alternative_spanish_readings:
  - seré objeto de admiración
  - causaré admiración
  - seré admirado y mirado con asombro
  rationale: El pasivo indica convertirse en objeto de asombro/admiración; en español, 'seré admirado' conserva el resultado sin introducir una valoración extra no presente en el griego.
  doctrine_reference: Recepción honorífica del sabio ante autoridades en literatura sapiencial
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa están en alto acuerdo; no se requieren correcciones de fondo. Se conserva la estructura paralela del verso y solo se ajusta la elección léxica al español natural sin perder el tono sapiencial.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se eligió 'ser hallado' para reflejar el pasivo futuro de εὑρεθήσομαι y conservar la voz pasiva del original.
  - '''Gobernantes'' se usa como equivalente funcional de δυναστῶν, evitando tanto la arcaización como la generalización excesiva.'
