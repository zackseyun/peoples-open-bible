translation:
  language: es
  text: 'Entonces Safán, el escriba, informó al rey[a], diciendo: «Hilkías, el sacerdote, me ha dado un libro». Y Safán lo leyó delante del rey.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Libro» aquí traduce un término hebreo amplio que puede referirse también a un «rollo» o documento escrito; el texto no especifica el formato material.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּגֵּד
  english_pob_choice: told
  chosen_spanish: informó
  alternatives_spanish:
  - dijo
  - comunicó
  lexicon: HALOT
  rationale: נגד en hifil significa hacer saber o comunicar. «Informó» conserva el valor de dar noticia en un registro narrativo digno, sin añadir formalidad excesiva.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  lexicon: HALOT
  rationale: «Escriba» mantiene la correspondencia léxica con סֹפֵר y preserva el oficio histórico. «Secretario» sería posible en contexto cortesano, pero pierde la forma lexical más directa.
- source_word: סֵפֶר
  english_pob_choice: a book
  chosen_spanish: un libro
  alternatives_spanish:
  - un rollo
  - un documento escrito
  lexicon: HALOT
  rationale: ספר designa de manera amplia un escrito o documento. «Un libro» sigue bien la referencia general sin afirmar de antemano el formato físico; en español puede abarcar un escrito importante, aunque la nota aclara la alternativa de «rollo».
- source_word: נָתַן לִי
  english_pob_choice: has given me
  chosen_spanish: me ha dado
  alternatives_spanish:
  - me dio
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción ya cumplida con relevancia presente en el discurso directo. El pretérito perfecto compuesto lo refleja naturalmente en español.
- source_word: וַיִּקְרָאֵהוּ
  english_pob_choice: read it
  chosen_spanish: lo leyó
  alternatives_spanish:
  - lo leyó en voz alta
  - lo proclamó
  lexicon: HALOT
  rationale: קרא con objeto escrito significa leer, normalmente en voz alta. «Lo leyó» es suficiente en español y el contexto «delante del rey» deja claro el acto público de lectura.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - en presencia del rey
  lexicon: HALOT
  rationale: La locución idiomática se expresa de forma natural como «delante del rey». Conserva la escena cortesana y evita un calco rígido.
- source_word: חִלְקִיָּה
  english_pob_choice: Hilkiah
  chosen_spanish: Hilkías
  alternatives_spanish:
  - Jilquías
  lexicon: convención onomástica
  rationale: Se translitera el nombre propio al español con adaptación fonética habitual, manteniendo la identificación del personaje bíblico.
- source_word: שָׁפָן
  english_pob_choice: Shaphan
  chosen_spanish: Safán
  alternatives_spanish:
  - Safán el escriba
  lexicon: convención onomástica
  rationale: Se adapta el nombre propio a la forma española habitual. El oficio permanece explícito en «el escriba».
translation_notes:
  revision_awareness: El texto base en inglés del POB se mantuvo sin cambios sustanciales en la revisión más reciente; no se detectaron ajustes textuales que afecten esta línea. Se atendió el punto léxico ya señalado por el POB sobre ספר y su posible sentido de «scroll».
  spanish_consistency_notes:
  - Se conserva el tratamiento narrativo en pasado y la secuencia de dos cláusulas coordinadas como en el hebreo.
  - Se mantiene la distinción entre el escriba real y el sacerdote mediante los títulos explícitos.
  - La nota sobre «libro/rollo» preserva la tensión léxica documentada por el POB sin imponer una identificación material más precisa de la que ofrece el hebreo.
