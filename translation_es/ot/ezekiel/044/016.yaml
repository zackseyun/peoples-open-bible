translation:
  language: es
  text: Ellos mismos entrarán en mi santuario[a], y ellos mismos se acercarán a mi mesa para ministrarme, y guardarán mi obligación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi altar» o «mi altar-mesa», ya que aquí «mesa» se usa en un contexto de servicio del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵמָּה
  english_pob_choice: they themselves
  chosen_spanish: ellos mismos
  alternatives_spanish:
  - ellos
  - estos mismos
  lexicon: HALOT
  rationale: El pronombre independiente es enfático y se repite dos veces en el versículo. «Ellos mismos» conserva esa fuerza de exclusividad y énfasis en el privilegio sacerdotal.
- source_word: יָבֹאוּ
  english_pob_choice: shall enter
  chosen_spanish: entrarán
  alternatives_spanish:
  - vendrán
  - entrarán en
  lexicon: HALOT
  rationale: Con אֶל + objeto de lugar sagrado, el verbo expresa ingreso. «Entrarán» es natural en español y conserva el valor de acceso al santuario.
- source_word: מִקְדָּשִׁי
  english_pob_choice: my sanctuary
  chosen_spanish: mi santuario
  alternatives_spanish:
  - mi lugar santo
  - mi templo
  lexicon: HALOT
  rationale: מִקְדָּשׁ designa un lugar santo o santuario. «Santuario» reproduce el sentido directo y mantiene el tono culto del contexto del templo.
- source_word: יִקְרְבוּ
  english_pob_choice: shall come near
  chosen_spanish: se acercarán
  alternatives_spanish:
  - se aproximarán
  - se presentarán
  lexicon: HALOT
  rationale: El verbo tiene matiz cultual de aproximarse para servicio sacerdotal. «Se acercarán» preserva ese matiz sin volverlo demasiado técnico.
- source_word: שֻׁלְחָנִי
  english_pob_choice: my table
  chosen_spanish: mi mesa
  alternatives_spanish:
  - mi mesa de sacrificio
  - mi altar-mesa
  - mi altar
  lexicon: HALOT
  rationale: La palabra hebrea significa literalmente «mesa». Aunque en el contexto del templo puede aludir funcionalmente al lugar de ofrenda, el texto no dice «altar»; por eso se mantiene «mesa» en el cuerpo principal.
- source_word: לְשָׁרְתֵנִי
  english_pob_choice: to minister to me
  chosen_spanish: para ministrarme
  alternatives_spanish:
  - para servirme
  - para ejercer su ministerio ante mí
  lexicon: HALOT
  rationale: En contexto sacerdotal, שׁרת denota servicio sagrado o ministerio. «Ministrarme» conserva el registro litúrgico y la dirección personal del servicio a Dios.
- source_word: וְשָׁמְרוּ
  english_pob_choice: and they shall keep
  chosen_spanish: y guardarán
  alternatives_spanish:
  - y observarán
  - y mantendrán
  lexicon: HALOT
  rationale: שׁמר con מִשְׁמַרֶת indica guardar una responsabilidad asignada. «Guardarán» es breve y fiel al sentido de observar/custodiar una obligación.
- source_word: מִשְׁמַרְתִּי
  english_pob_choice: my charge
  chosen_spanish: mi encargo
  alternatives_spanish:
  - mi cargo
  - mi deber
  - mi comisión
  lexicon: HALOT
  rationale: En contexto sacerdotal, el sustantivo señala una tarea u obligación confiada. «Encargo» comunica bien la idea de responsabilidad asignada sin desplazar el matiz de comisión o deber.
theological_decisions:
- issue: Naturaleza de la cercanía al «santuario» y a la «mesa» en contexto sacerdotal
  english_pob_reading: The verse highlights exclusive priestly access and service in the sanctuary; 'table' is retained, with altar/altar-table noted as alternatives.
  chosen_spanish_reading: El versículo destaca el acceso exclusivo de los sacerdotes al santuario y a la mesa; se conserva «mesa» en el texto principal, sin imponer «altar».
  alternative_spanish_readings:
  - El texto podría leerse con «altar»
  - Podría entenderse como «mesa de ofrenda» o «altar-mesa»
  rationale: El hebreo usa literalmente «mesa». Aunque el contexto del templo sugiere una función sacrificial, no conviene fijar en el texto principal una identificación más específica que la forma hebrea no explicita. La nota preserva la alternativa interpretativa.
  doctrine_reference: Tradición textual y filosofía de traducción; contexto cultual de Ezequiel 44
- issue: Fuerza enfática del pronombre independiente repetido
  english_pob_reading: They themselves shall enter... and they themselves shall come near...
  chosen_spanish_reading: «Ellos mismos» se repite para conservar el énfasis exclusivista del pasaje.
  alternative_spanish_readings:
  - «ellos»
  - «esos mismos»
  rationale: La repetición del pronombre independiente no es meramente redundante; enfatiza quiénes tienen derecho a entrar y acercarse. La traducción mantiene esa carga enfática en español.
  doctrine_reference: Exégesis gramatical del hebreo bíblico
translation_notes:
  revision_awareness: Basado en el texto hebreo consonante-vocalizado del WLC y en la traducción auditada en inglés. No se detectaron revisiones previas aplicables; se conservó la decisión inglesa de mantener «table» en el texto principal y registrar la alternativa cultual en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se mantuvo un registro bíblico contemporáneo y digno, evitando calcos innecesarios.
  - «Ministrarme» conserva el tono litúrgico del servicio sacerdotal y armoniza con otros pasajes cultuales.
  - «Encargo» se eligió para no diluir el sentido de obligación confiada implícito en מִשְׁמַרְתִּי.
