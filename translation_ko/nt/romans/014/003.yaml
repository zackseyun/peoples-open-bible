id: ROM.14.3
reference: Romans 14:3
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὁ ἐσθίων τὸν μὴ ἐσθίοντα μὴ ἐξουθενείτω, ⸂ὁ δὲ⸃ μὴ ἐσθίων τὸν ἐσθίοντα μὴ κρινέτω, ὁ θεὸς γὰρ αὐτὸν προσελάβετο.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/003.yaml
  text: The one who eats must not despise the one who does not eat, and the one who does not eat must not judge the one who eats, for God has welcomed him.
translation:
  language: ko
  text: 먹는 자는 먹지 않는 자를 업신여기지 말고, 먹지 않는 자는 먹는 자를 판단하지 마십시오. 하나님께서 그를 받아들이셨기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξουθενείτω
  english_pob_choice: must not despise
  chosen_korean: 업신여기지 말다
  alternatives_korean:
  - 멸시하지 말다
  lexicon: BDAG
  rationale: 무가치하게 여기는 강한 경멸. 「업신여기다」가 한국어에서 자연스럽고 강하다.
- source_word: κρινέτω
  english_pob_choice: must not judge
  chosen_korean: 판단하지 말다
  alternatives_korean:
  - 정죄하지 말다
  - 비판하지 말다
  lexicon: BDAG
  rationale: 동료 신자에 대한 평가적 판단. 「판단」이 「정죄」보다 본문에 충실하다.
- source_word: προσελάβετο
  english_pob_choice: has welcomed
  chosen_korean: 받아들이시다
  alternatives_korean:
  - 영접하시다
  lexicon: BDAG
  rationale: 14:1, 15:7의 동족어와 어휘적 일관성. 교제 안으로 받아들임의 관계적 의미를 살린다.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_korean: 그를
  alternatives_korean:
  - 그 사람을
  lexicon: BDAG
  rationale: 헬라어 단수 대명사를 그대로 보존. 문맥상 직전의 「먹는 자」 또는 판단의 대상이 되는 동료 신자를 가리킨다.
