  yaml_path: translation/ot/isaiah/029/012.yaml
  text: And the book is given to one who does not know how to read[a], saying, “Please read this,” and he says[b], “I do not know how to read.”
  footnotes:
  - marker: a
    text: Or, more idiomatically, “to one who cannot read” … “I cannot read.” The Hebrew repeats the expression “know writing/book,” emphasizing illiteracy by lexical repetition.
    reason: lexical_alternative
  - marker: b
    text: “Book” may also be rendered “scroll” or “document.”
    reason: cultural_note
