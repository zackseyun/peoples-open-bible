translation:
  language: es
  text: Después de esto, aconteció que Ben-hadad, rey de Aram[b], reunió todo su ejército[a], y subió y asedió Samaria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todas sus fuerzas»; el hebreo dice literalmente «todo su campamento/ejército».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «rey de Aram»; tradicionalmente «rey de Siria».
    reason: alternative_reading
lexical_decisions:
- source_word: וַֽיְהִי אַחֲרֵי כֵן
  english_pob_choice: And it happened after this
  chosen_spanish: Y aconteció después de esto
  alternatives_spanish:
  - Después de esto aconteció
  - Y sucedió después de esto
  - Y ocurrió después de esto
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce un hecho posterior. «Aconteció» conserva el tono narrativo y la secuencia temporal sin sonar excesivamente arcaico. Se evita una paráfrasis más libre como «tiempo después» porque el hebreo expresa literalmente una sucesión de eventos.
- source_word: וַיִּקְבֹּץ
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - agrupó
  - movilizó
  lexicon: HALOT
  rationale: El verbo significa reunir o congregar. En este contexto militar, «reunió» es natural en español y mantiene el valor básico sin añadir tecnicismos no exigidos por el hebreo. «Movilizó» explicitaría demasiado el matiz bélico.
- source_word: בֶּן הֲדַד
  english_pob_choice: Ben-hadad
  chosen_spanish: Ben-adad
  alternatives_spanish:
  - Ben-hadad
  lexicon: Convención onomástica hebrea
  rationale: Se prefiere «Ben-adad» para reflejar la forma hebrea del nombre con la consonante ד/ד, siguiendo la primacía del texto original. La variante con h es una transliteración tradicional inglesa, pero no es necesaria en español.
- source_word: מֶלֶךְ אֲרָם
  english_pob_choice: king of Aram
  chosen_spanish: rey de Aram
  alternatives_spanish:
  - rey de Siria
  lexicon: HALOT
  rationale: Se conserva «Aram» por fidelidad al nombre del pueblo/reino en el hebreo. «Siria» es una equivalencia tradicional pero interpretativa; aquí se evita porque el proyecto prioriza la fuente original.
- source_word: כָּל מַחֲנֵהוּ
  english_pob_choice: all his army
  chosen_spanish: todo su ejército
  alternatives_spanish:
  - todo su campamento
  - todas sus fuerzas
  lexicon: HALOT
  rationale: מַחֲנֶה puede significar campamento, ejército o fuerzas; en este contexto militar, «ejército» comunica con claridad el referente. Se evita «campamento» por sonar menos natural y más ambiguo en español. La alternativa «fuerzas» también es posible, pero menos precisa para el conjunto organizado que sugiere el hebreo.
- source_word: וַיַּעַל
  english_pob_choice: he went up
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - marchó hacia arriba
  - se encaminó
  lexicon: HALOT
  rationale: Se mantiene el valor direccional básico del hebreo. «Subió» reproduce el idioma bíblico sin añadir información; en este caso también es español natural. No se expande a «marchó» porque el hebreo no especifica el modo de avance.
- source_word: וַיָּצַר עַל
  english_pob_choice: besieged
  chosen_spanish: sitió
  alternatives_spanish:
  - asedió
  - puso sitio a
  lexicon: HALOT
  rationale: El giro verbal con עַל indica cercar una ciudad con intención militar. «Sitió» es un equivalente directo y sobrio en español. «Asedió» también sería válido, pero «sitió» conserva mejor la concisión del verbo hebreo.
- source_word: שֹׁמְרוֹן
  english_pob_choice: Samaria
  chosen_spanish: Samaria
  lexicon: Uso geográfico estándar
  rationale: Se conserva el nombre geográfico tradicional y reconocido en español. No hay tensión lexical relevante aquí.
translation_notes:
  revision_awareness: 'El texto inglés auditado no muestra revisiones sustantivas aplicadas; la lectura final coincide con el pasaje fuente y con el dictamen de alta concordancia. La draft española sigue esa estabilidad textual y preserva la única ambigüedad lexical relevante en nota: מַחֲנֶה (''ejército'' / ''campamento'').'
  spanish_consistency_notes:
  - Se mantiene «Aram» en lugar de «Siria» por primacía del nombre hebreo.
  - Se traduce el nombre propio como «Ben-adad» para reflejar la forma hebrea sin depender de la convención inglesa.
  - Se conserva un registro bíblico sobrio con verbos simples («aconteció», «reunió», «subió», «sitió») sin arcaísmos innecesarios.
  - La nota sobre מַחֲנֶה preserva la tensión semántica entre «campamento» y «ejército» que el texto permite.
