translation:
  language: es
  text: el peso del oro para todos los objetos de todo tipo de servicio[a], y el peso de la plata para todos los objetos de todo tipo de servicio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo repite «servicio y servicio», una expresión distributiva que significa algo como «para cada clase de servicio» o «para todo uso».
    reason: lexical_alternative
lexical_decisions:
- source_word: זָּהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - el oro
  lexicon: HALOT
  rationale: El término designa el material precioso; en español, «oro» funciona de modo natural y mantiene la misma referencia sustantiva que el inglés. Se evita añadir un artículo innecesario en una frase inventarial y elipsis.
- source_word: מִשְׁקָל
  english_pob_choice: by weight
  chosen_spanish: el peso de
  alternatives_spanish:
  - por peso
  - según el peso
  - de peso
  lexicon: HALOT
  rationale: La construcción hebrea expresa medición/atribución de peso. En español, «el peso de» reproduce con claridad la idea de cantidad asignada por peso y permite paralelismo entre oro y plata.
- source_word: כְּלֵי
  english_pob_choice: articles
  chosen_spanish: utensilios
  alternatives_spanish:
  - artículos
  - vasos
  - implementos
  lexicon: HALOT
  rationale: En contexto de servicio del templo, כְּלִי abarca objetos de uso. «Utensilios» conserva amplitud semántica y suena más concreto que «artículos» en español, sin restringirlo a recipientes.
- source_word: עֲבוֹדָה
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - trabajo
  - ministerio
  lexicon: HALOT
  rationale: En contexto cultual, «servicio» comunica bien la función sagrada u operativa. No se opta por «ministerio» porque en español eclesiástico moderno puede introducir una connotación más específica que el hebreo aquí.
- source_word: עֲבוֹדָה וַעֲבוֹדָה
  english_pob_choice: each kind of service
  chosen_spanish: todo tipo de servicio
  alternatives_spanish:
  - cada clase de servicio
  - para todo servicio y servicio
  - para cada tipo de servicio
  lexicon: HALOT
  rationale: La repetición hebrea tiene valor distributivo. «Todo tipo de servicio» preserva esa distribución de manera idiomática en español y evita una repetición literal poco natural.
- source_word: כֶּסֶף
  english_pob_choice: silver
  chosen_spanish: plata
  alternatives_spanish:
  - la plata
  lexicon: HALOT
  rationale: El sustantivo nombra el material; «plata» corresponde naturalmente al inglés «silver» y mantiene el paralelismo con «oro».
- source_word: לְכָל / לְכֹל
  english_pob_choice: for all
  chosen_spanish: para todos
  alternatives_spanish:
  - para cada uno
  - para todo
  lexicon: HALOT
  rationale: La preposición con כֹּל expresa alcance distributivo. «Para todos» conserva la apertura total del inventario, y funciona bien con la frase siguiente.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para hacer explícito el paralelismo entre oro y plata y para suavizar la repetición distributiva de עֲבוֹדָה. La versión española sigue esa misma lectura revisada, manteniendo el sentido inventarial y la distribución por clases de uso, sin introducir términos más técnicos que el hebreo no exige.
  spanish_consistency_notes:
  - Se mantiene «servicio» para עֲבוֹדָה en sentido cultual/inventarial.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, porque el versículo no contiene el nombre divino.
  - La repetición distributiva hebrea se conserva en una nota, no en una reiteración literal en el cuerpo para no volverlo artificial en español.
  - «Oro» y «plata» se usan como materiales, en paralelo directo con el inglés auditado.
