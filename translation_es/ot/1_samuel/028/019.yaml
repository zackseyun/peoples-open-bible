  rationale: Se corrigen los anclajes de las notas para que correspondan a las expresiones que explican, y se ajusta ‘en mano de’ a ‘en manos de’ por naturalidad idiomática en español sin perder la imagen hebrea. Se mantiene ‘Y Yahvé’, ‘contigo’, ‘conmigo’ y ‘campamento’ porque reflejan fielmente el hebreo y la auditoría inglesa.
