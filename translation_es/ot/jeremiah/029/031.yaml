translation:
  language: es
  text: '«Envía a todos los exiliados, diciendo: “Así dice Yahvé acerca de Semaías el Nehelamita[a]: Porque Semaías les ha profetizado, aunque yo no lo envié, y los ha hecho confiar en una mentira”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Posiblemente «Semaías el soñador», si el título se deriva de una palabra relacionada con los sueños y no de un nombre de lugar o de clan.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַח
  english_pob_choice: Send
  chosen_spanish: Envía
  alternatives_spanish:
  - Envía un mensaje
  - Manda
  lexicon: HALOT
  rationale: El imperativo singular se dirige a Jeremías y encabeza la comunicación que debe transmitirse. «Envía» conserva el mandato directo con español natural.
- source_word: עַל כָּל הַגּוֹלָה
  english_pob_choice: to all the exiles
  chosen_spanish: a todos los cautivos
  alternatives_spanish:
  - a todos los exiliados
  - a toda la comunidad del exilio
  lexicon: HALOT
  rationale: גּוֹלָה designa a la comunidad deportada; «cautivos» comunica bien la condición de destierro en español bíblico actual, sin perder referencia al grupo entero.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - con estas palabras
  lexicon: HALOT
  rationale: Función quotativa estándar que introduce el contenido del mensaje.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice Yahvé Dios
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva de manera idiomática y solemne. Se usa «Yahvé» según la política del proyecto para יְהוָה.
- source_word: אֶל שְׁמַעְיָה הַנֶּחֱלָמִי
  english_pob_choice: concerning Shemaiah the Nehelamite
  chosen_spanish: acerca de Semaías el Nehelamita
  alternatives_spanish:
  - sobre Semaías el Nehelamita
  - con respecto a Semaías el Nehelamita
  lexicon: HALOT
  rationale: אֶל tras la fórmula profética introduce aquí el asunto del oráculo; «acerca de» refleja mejor ese matiz que un dativo simple. Se translitera el nombre propio como «Semaías».
- source_word: הַנֶּחֱלָמִי
  english_pob_choice: the Nehelamite
  chosen_spanish: el Nehelamita
  alternatives_spanish:
  - el soñador
  - el hombre de Nehelam
  lexicon: HALOT
  rationale: La derivación es incierta; la transliteración gentilicia mantiene la ambigüedad documentada y evita cerrar el sentido a «soñador» sin base suficiente.
- source_word: נִבָּא לָכֶם
  english_pob_choice: has prophesied to you
  chosen_spanish: ha profetizado para ustedes
  alternatives_spanish:
  - les ha profetizado
  - ha profetizado entre ustedes
  lexicon: HALOT
  rationale: El verbo נבא en este contexto es profético. «Para ustedes» conserva la dirección del mensaje y funciona de forma natural en español; «les ha profetizado» también es posible.
- source_word: וַאֲנִי לֹא שְׁלַחְתִּיו
  english_pob_choice: though I did not send him
  chosen_spanish: aunque yo no lo envié
  alternatives_spanish:
  - pero yo no lo envié
  - y yo no lo envié
  lexicon: HALOT
  rationale: La concesión de la cláusula contrasta la afirmación profética con la negación divina. «Aunque» reproduce bien ese valor sin forzar la sintaxis española.
- source_word: וַיַּבְטַח אֶתְכֶם
  english_pob_choice: has made you trust
  chosen_spanish: hizo que ustedes confiaran
  alternatives_spanish:
  - los hizo confiar
  - les dio confianza
  lexicon: HALOT
  rationale: 'בטח en piel/hiphil expresa causación: provocar confianza. «Hizo que ustedes confiaran» conserva la fuerza causativa con claridad.'
- source_word: עַל שָׁקֶר
  english_pob_choice: in a lie
  chosen_spanish: en una mentira
  alternatives_spanish:
  - sobre una mentira
  - en falsedad
  lexicon: HALOT
  rationale: La preposición expresa la base errónea de la confianza. «En una mentira» es una equivalencia natural y contundente en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: usar una forma del nombre propio divino en vez de sustituirlo por un título. «Yahvé» es la forma establecida para el texto español.'
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura auditada en inglés POB y el hebreo masorético, manteniendo la ambigüedad de הַנֶּחֱלָמִי con una nota alternativa y preservando la fuerza causativa de וַיַּבְטַח. No se introdujeron cambios revisionales en el pasaje base.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se prefiere «cautivos» para הַגּוֹלָה en este contexto de deportación comunitaria.
  - «Profetizado» se mantiene para נבא; no se suaviza a «hablado» ni «dicho».
  - Se conserva la ambigüedad de הַנֶּחֱלָמִי mediante transliteración y nota alternativa.
  - «Mentira» traduce שָׁקֶר con un valor directo y comprensible en español contemporáneo.
