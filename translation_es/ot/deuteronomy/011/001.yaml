  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto: «Yahvé», «estatutos», «juicios», «mandamientos». La principal excepción es מִשְׁמַרְתּוֹ, donde «encargo» no comunica tan bien el valor de obligación/observancia. En español bíblico legible, «lo que él te ha encomendado» o «su observancia» funciona mejor que «su encargo».'
  issues:
