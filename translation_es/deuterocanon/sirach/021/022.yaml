translation:
  language: es
  text: El pie del necio se apresura a una casa[a], pero un hombre de maquinaciones se inclina ante los grandes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «pero un hombre muy experimentado se avergonzará ante un rostro/presencia». El hebreo y el griego difieren notablemente en el segundo hemistiquio.'
    reason: alternative_reading
lexical_decisions:
- source_word: רֶגֶל / ποὺς
  english_pob_choice: foot
  chosen_spanish: pie
  alternatives_spanish:
  - paso
  - pie
  lexicon: HALOT
  rationale: Conserva la imagen proverbial concreta del órgano que se mueve con prisa; «pie» corresponde bien al singular hebreo y al griego ποὺς. «Paso» suavizaría demasiado la imagen.
- source_word: נָבָל / μωροῦ
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - tonto
  - insensato
  - fool
  lexicon: HALOT
  rationale: En español bíblico y sapiencial, «necio» comunica mejor la carga moral y de juicio prudencial que «tonto», sin perder naturalidad. Mantiene el registro de sabiduría.
- source_word: מִהֲרָה / ταχὺς
  english_pob_choice: hurries
  chosen_spanish: se apresura
  alternatives_spanish:
  - corre
  - va de prisa
  - se precipita
  lexicon: HALOT
  rationale: Expresa la idea de prisa impulsiva sin exagerar el movimiento físico. «Se apresura» es más idiomático y conserva el matiz negativo de precipitación.
- source_word: אֶל בָּיִת / εἰς οἰκίαν
  english_pob_choice: to a house
  chosen_spanish: a una casa
  alternatives_spanish:
  - a la casa
  - hacia una casa
  - en una casa
  lexicon: HALOT
  rationale: La forma indefinida del hebreo y del griego se refleja con «a una casa». Evita imponer definitud donde el texto no la da.
- source_word: אִישׁ מְזִימוֹת
  english_pob_choice: a man of schemes
  chosen_spanish: un hombre de esquemas
  alternatives_spanish:
  - un hombre de planes
  - un hombre de maquinaciones
  - un hombre de astucias
  lexicon: HALOT
  rationale: «Esquemas» conserva el sentido de planes o tramas calculadas y deja abierta la ambivalencia moral del hebreo. «Planes» sería más neutro, pero menos exacto al potencial matiz de designios calculados.
- source_word: יַכְנִיעַ
  english_pob_choice: bows low
  chosen_spanish: se inclina
  alternatives_spanish:
  - se humilla
  - se somete
  - se inclina con reverencia
  lexicon: HALOT
  rationale: La revisión inglesa se inclinó hacia la imagen física de bajar el cuerpo; en español, «se inclina» reproduce bien esa lowering posture sin añadir reflexividad excesiva ni una lectura demasiado espiritual.
- source_word: לָרַבִּים
  english_pob_choice: before the great
  chosen_spanish: ante los grandes
  alternatives_spanish:
  - ante muchos
  - ante la multitud
  - ante los poderosos
  lexicon: HALOT
  rationale: «Los grandes» preserva la posible referencia a personas de rango o prestigio, coherente con el hebreo רבים y con la lectura proverbial de deferencia social. «Poderosos» sería más interpretativo.
theological_decisions:
- issue: Divergencia hebreo-griego en el segundo colon
  english_pob_reading: Translate from the Hebrew Cairo Geniza text while allowing the Greek to inform uncertainty in the second colon.
  chosen_spanish_reading: Traducir el hebreo como texto principal, dejando visible la lectura divergente del griego en una nota.
  alternative_spanish_readings:
  - Un hombre muy experimentado se avergonzará ante un rostro/presencia.
  - Un hombre muy experto se avergonzará delante de alguien.
  rationale: Siguiendo la política del proyecto, el hebreo conservado tiene prioridad como testimonio principal. Sin embargo, la divergencia con el griego afecta de manera real el sentido del segundo colon; por eso se mantiene una nota que explicita la alternativa griega sin incorporarla al texto principal.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserve; preservar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que prefirió una imagen más física y directa («bows low») para יַכְנִיעַ. En español se adoptó «se inclina» por ser la manera más natural de conservar ese matiz corporal y deferente, sin perder la formalidad requerida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda; este versículo no lo contiene.
  - Se evitó «Señor» y «Cristo», que no aparecen en el texto.
  - Se prefirió «necio» para נָבָל dentro del registro sapiencial.
  - La nota al pie conserva la tensión textual hebreo-griego en el segundo colon.
  - «Los grandes» refleja la ambigüedad social de רבים sin cerrarla excesivamente.
