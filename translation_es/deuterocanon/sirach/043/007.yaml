translation:
  language: es
  text: De ellos provienen el tiempo señalado y los tiempos fijos por estatuto[a], y su obra querida está en su ciclo.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El rollo de Masada dice: «porque grande es el Señor que la hizo», donde el texto de la Geniza de El Cairo tiene una redacción distinta y más difícil.'
    reason: textual_variant
  - marker: b
    text: 'El hebreo de la segunda línea es difícil. El texto de la Geniza de El Cairo se aproxima a «y el objeto/obra deseada ... en su ciclo». El paralelo griego dice: «De la luna, señal de una fiesta; lumbrera menguante al cumplirse».'
    reason: alternative_reading
lexical_decisions:
- source_word: בם
  english_pob_choice: From them come
  chosen_spanish: De ellos provienen
  alternatives_spanish:
  - En ellos están
  - Por ellos vienen
  lexicon: HALOT
  rationale: El hebreo בם puede expresar relación local o instrumental, pero en este contexto poético se entiende como origen de las señales calendáricas. «De ellos provienen» conserva esa relación de procedencia sin volver el español rígido.
- source_word: מועד
  english_pob_choice: appointed time
  chosen_spanish: tiempo señalado
  alternatives_spanish:
  - festividad
  - tiempo designado
  - fecha señalada
  lexicon: HALOT
  rationale: מועד puede ser tiempo señalado o fiesta. Como el contexto habla del orden calendárico, «tiempo señalado» mantiene amplitud y evita restringirlo solo a una fiesta.
- source_word: וזמני חוק
  english_pob_choice: the fixed seasons by statute
  chosen_spanish: las estaciones fijas por estatuto
  alternatives_spanish:
  - los tiempos fijados por decreto
  - las temporadas establecidas por ley
  - los tiempos regidos por estatuto
  lexicon: HALOT
  rationale: זמנים son tiempos o estaciones; חוק aporta la idea de norma fija. «Estaciones fijas por estatuto» conserva el carácter ordenado y prescrito del calendario.
- source_word: וחפץ
  english_pob_choice: his desired work
  chosen_spanish: su obra deseada
  alternatives_spanish:
  - su obra querida
  - lo que él quiso
  - su obra querida por él
  lexicon: HALOT
  rationale: חפץ expresa deseo, placer o voluntad. Dado que la lectura hebrea es difícil, «su obra deseada» mantiene la ambigüedad entre deseo y obra sin forzar una interpretación más precisa de la que el texto permite.
- source_word: עשיו
  english_pob_choice: his desired
  chosen_spanish: deseada
  alternatives_spanish:
  - querida
  - anhelada
  - querida por él
  lexicon: HALOT
  rationale: La forma transmitida es oscura. El español debe reflejar esa incertidumbre sin resolverla con una glosa doctrinal; por eso se integra en la frase como adjetivo posesivo-adjetival, siguiendo el sentido general de intención o deseo.
- source_word: בתקופתו
  english_pob_choice: in its cycle
  chosen_spanish: en su ciclo
  alternatives_spanish:
  - en su temporada
  - en su giro
  - en su curso
  lexicon: HALOT
  rationale: תקופה puede ser giro, vuelta o ciclo. En un contexto astronómico, «en su ciclo» es la opción más natural y precisa en español.
theological_decisions:
- issue: Relación entre el hebreo difícil y el paralelo griego sobre la luna y el calendario
  english_pob_reading: The line refers generally to the creator's intended ordering of the heavenly body's calendrical cycle.
  chosen_spanish_reading: La línea presenta el orden calendárico de los cuerpos celestes de manera general, sin explicitar aquí la luna.
  alternative_spanish_readings:
  - La línea podría referirse más específicamente a la luna como señal de fiesta.
  - El texto pudo aludir a una grandeza del Señor como creador, según la variante de Masada.
  rationale: El hebreo conservado es difícil en el segundo colon, y el griego paralelo sí menciona expresamente la luna como señal de fiesta. Para no imponer una solución más allá de la evidencia, el texto principal mantiene una formulación general sobre el orden cíclico, y la tensión textual queda documentada.
  doctrine_reference: Primacía de los idiomas originales y preservación honesta de la incertidumbre textual.
translation_notes:
  revision_awareness: Se siguió la última revisión del audit trail al preferir una formulación más directa y natural para וחפץ עשיו, pero en español se mantuvo la ambigüedad del hebreo difícil con «su obra deseada». Se conservó también la tensión con el paralelo griego en una nota, sin resolverla de manera interpretativa en el cuerpo principal.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando aparece el nombre divino; aquí no es necesario.
  - «tiempo señalado» mantiene el valor calendárico sin convertirlo en mera festividad.
  - «estatuto» conserva el matiz normativo de חוק, evitando reducirlo a costumbre.
  - «ciclo» refleja el sentido astronómico de תקופה de forma natural en español.
  - Se evitó introducir «Cristo», «Señor» o terminología litúrgica no presente en la fuente.
