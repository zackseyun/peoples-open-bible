  glossary_alignment: 'Alineación buena con la glosa del proyecto: יהוה -> ''Yahvé'' correctamente; עֲזָאזֵל -> ''Azazel'' correctamente en el texto principal; גּוֹרָל/גּוֹרָלוֹת -> ''suerte/suertes'' bien; el registro general es digno y legible en español eclesial amplio.'
