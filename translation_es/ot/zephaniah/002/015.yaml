translation:
  language: es
  text: 'Esta es la ciudad exultante, que habitaba confiada, que decía en su corazón: «Yo soy, y fuera de mí no hay otro». ¡Cómo se ha convertido en una desolación[a], en un lugar de descanso para animales salvajes! Todo el que pase por ella silbará[b] y sacudirá la mano.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «un objeto de horror». El término hebreo puede incluir la idea de devastación que provoca espanto, no solo desolación física.
    reason: lexical_alternative
  - marker: b
    text: O, «siseará». El verbo hebreo puede expresar un sonido agudo de asombro o de burla.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעִיר
  english_pob_choice: city
  chosen_spanish: ciudad
  alternatives_spanish:
  - poblado
  - villa
  lexicon: HALOT
  rationale: El sentido básico es un centro urbano; «ciudad» es natural en español y conserva la escala y el tono profético del pasaje.
- source_word: הָעַלִּיזָה
  english_pob_choice: exultant
  chosen_spanish: exultante
  alternatives_spanish:
  - alegre
  - regocijada
  - jubilosa
  lexicon: HALOT
  rationale: El adjetivo implica regocijo con autosatisfacción u orgullo; «exultante» preserva mejor ese matiz que un simple «alegre».
- source_word: הַיּוֹשֶׁבֶת לָבֶטַח
  english_pob_choice: dwelt securely
  chosen_spanish: moraba segura
  alternatives_spanish:
  - moraba en seguridad
  - vivía segura
  - habitaba con seguridad
  lexicon: HALOT
  rationale: «Moraba» mantiene un registro solemne y continuo, y «segura» conserva la idea de seguridad estable sin hacer la frase pesada.
- source_word: הָאֹמְרָה בִּלְבָבָהּ
  english_pob_choice: that said in her heart
  chosen_spanish: la que decía en su corazón
  alternatives_spanish:
  - la que se decía a sí misma
  - la que decía en su mente
  lexicon: HALOT
  rationale: La expresión conserva el modismo hebreo de habla interior y la personificación femenina de la ciudad.
- source_word: אֲנִי וְאַפְסִי עוֹד
  english_pob_choice: I am, and there is none besides me
  chosen_spanish: Yo soy, y no hay nadie más
  alternatives_spanish:
  - Yo soy, y no existe nadie más
  - Yo soy, y fuera de mí no hay otro
  lexicon: HALOT
  rationale: Se conserva la fórmula de autoexaltación y su eco intertextual. «Yo soy» reproduce la brevedad enfática del hebreo; «no hay nadie más» es idiomático en español y mantiene la exclusividad absoluta sin añadir explicación.
- source_word: לְשַׁמָּה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - un horror
  - una devastación
  - un lugar desolado
  lexicon: HALOT
  rationale: «Desolación» es la equivalencia más directa y amplia; permite además conservar la posible connotación de devastación ominosa sin sobreinterpretar.
- source_word: מַרְבֵּץ
  english_pob_choice: a resting place
  chosen_spanish: un lugar de descanso
  alternatives_spanish:
  - un sitio donde se echan
  - un refugio
  - una guarida
  lexicon: HALOT
  rationale: El término designa un lugar donde los animales se echan o reposan; «lugar de descanso» es claro y no estrecha indebidamente el sentido.
- source_word: לַחַיָּה
  english_pob_choice: for wild animals
  chosen_spanish: para animales salvajes
  alternatives_spanish:
  - para bestias
  - para fieras
  - para animales
  lexicon: HALOT
  rationale: «Animales salvajes» comunica bien el contexto de ruina habitada por criaturas silvestres, sin recurrir a un arcaísmo.
- source_word: יִשְׁרֹק
  english_pob_choice: will hiss
  chosen_spanish: silbará
  alternatives_spanish:
  - silvará
  - chiflará
  - chistará
  lexicon: HALOT
  rationale: El verbo puede denotar un silbido de sorpresa o burla; «silbará» es la opción más neutra y puede abarcar esa ambivalencia en español.
- source_word: יָנִ֥יעַ יָדֽוֹ
  english_pob_choice: shake his hand
  chosen_spanish: agitará su mano
  alternatives_spanish:
  - moverá su mano
  - hará un gesto con la mano
  - sacudirá su mano
  lexicon: HALOT
  rationale: La expresión describe un gesto visible de burla o asombro; «agitará su mano» mantiene la literalidad básica y sugiere el ademán sin fijarlo en exceso.
theological_decisions:
- issue: La fórmula de soberbia «Yo soy, y no hay nadie más»
  english_pob_reading: I am, and there is none besides me
  chosen_spanish_reading: Yo soy, y no hay nadie más
  alternative_spanish_readings:
  - Yo soy, y no existe nadie más
  - Yo soy, y fuera de mí no hay otro
  rationale: Se conserva el eco deliberado del lenguaje de exclusividad absoluta, usado irónicamente para una ciudad humana orgullosa. No se suaviza a una simple afirmación de autosuficiencia, porque el hebreo retiene una carga teológica y literaria importante.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al preferir un registro más formal («moraba segura») y una correspondencia más precisa para el gesto final; también preserva la ambigüedad léxica señalada en las notas del original inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto para el nombre divino solo cuando aparezca explícitamente en el pasaje; aquí no aplica.
  - Se conserva el paralelismo y la personificación femenina de la ciudad con pronombres y relativos femeninos.
  - «Desolación» y «animales salvajes» se usan con un rango semántico compatible con las notas del texto fuente, sin cerrar la posibilidad de una devastación que inspire horror.
