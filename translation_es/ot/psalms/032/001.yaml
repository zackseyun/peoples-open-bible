translation:
  language: es
  text: De David[a]. Un Maskil. Bienaventurado el que tiene perdonada[b] su transgresión, cuyo pecado está cubierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Maskil, un encabezado de salmo cuyo sentido preciso es incierto; quizá una composición instructiva o contemplativa.
    reason: cultural_note
  - marker: b
    text: Literalmente, «levantada» o «llevada»; aquí, idiomáticamente, «perdonada».
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  lexicon: HALOT
  rationale: En los encabezados de salmos, ל con nombre propio admite relación de pertenencia, atribución o asociación. «De David» conserva esa amplitud en español sin decidir indebidamente entre autoría, dedicación o vinculación.
- source_word: מַשְׂכִּיל
  english_pob_choice: A Maskil
  chosen_spanish: Un Maskil
  alternatives_spanish:
  - Un salmo instructivo
  - Una composición contemplativa
  lexicon: HALOT
  rationale: El término técnico tiene sentido incierto; mantenerlo transliterado preserva la transparencia del encabezado y evita imponer una interpretación cerrada en el texto principal.
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed is
  chosen_spanish: Dichoso
  alternatives_spanish:
  - Bienaventurado
  - Feliz
  lexicon: HALOT
  rationale: «Dichoso» expresa bien la fórmula hebrea de bienaventuranza en un registro natural y digno. «Bienaventurado» es más tradicional, pero puede sonar más eclesiástico y menos directo; «feliz» pierde fuerza teológica.
- source_word: נְשׂוּי
  english_pob_choice: forgiven
  chosen_spanish: absuelto
  alternatives_spanish:
  - perdonado
  - levantado
  - llevado
  lexicon: HALOT
  rationale: La raíz נשׂא significa literalmente «levantar/cargar/llevar». En este paralelismo con pecado y transgresión, el sentido idiomático es liberación de culpa. «Absuelto» comunica bien la remoción judicial del pecado, mientras que la imagen literal queda implícita y puede explicarse aparte.
- source_word: פֶּשַׁע
  english_pob_choice: transgression
  chosen_spanish: transgresión
  alternatives_spanish:
  - rebeldía
  - rebelión
  lexicon: HALOT
  rationale: «Transgresión» mantiene el matiz de violación deliberada de un límite y encaja con el paralelismo con «pecado». «Rebelión» es posible, pero intensifica más el matiz político o interpersonal.
- source_word: כְּסוּי
  english_pob_choice: covered
  chosen_spanish: cubierto
  alternatives_spanish:
  - oculto
  - velado
  lexicon: HALOT
  rationale: El participio pasivo de כסה es «cubierto». En el paralelo poético con el primer miembro, conserva la metáfora sin añadir interpretación ajena.
- source_word: חֲטָאָה
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - falta
  lexicon: HALOT
  rationale: En este contexto moral, no sacrificial, el término se rinde naturalmente por «pecado». «Culpa» desplaza el foco al estado legal; «falta» debilita la fuerza del término hebreo.
theological_decisions:
- issue: Cómo reflejar el sujeto genérico del bienaventurado
  english_pob_reading: Blessed is the one whose transgression is forgiven...
  chosen_spanish_reading: Dichoso el que...
  alternative_spanish_readings:
  - Dichosos los que...
  - Dichoso el hombre...
  rationale: El hebreo presenta una bienaventuranza de valor representativo; el singular genérico es el mejor equivalente. «El que» evita marcar género masculino explícito y conserva la construcción proverbial.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Cómo tratar la tensión entre imagen literal y sentido idiomático en נְשׂוּי
  english_pob_reading: Literally 'lifted' or 'borne away' for 'forgiven.'
  chosen_spanish_reading: absuelto
  alternative_spanish_readings:
  - perdonado
  - levantado
  - llevado
  rationale: La POB inglesa reconoce la imagen literal de «levantado/llevado» pero opta por una equivalencia idiomática. En español, «absuelto» comunica con claridad la remoción de culpa y el tono declarativo del versículo, sin negar la metáfora subyacente.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 y 5
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con la fuente es alto; este borrador sigue de cerca la solución inglesa auditada, ajustándola a un español natural sin perder la imagen hebrea subyacente.
  spanish_consistency_notes:
  - Se preserva la transliteración de Maskil para mantener transparencia y evitar falsa precisión.
  - Se usa «transgresión» y «pecado» para reflejar el paralelismo léxico del hebreo.
  - La elección de «absuelto» intenta equilibrar claridad española con la nota de literalidad de נשׂוּי.
  - La mayúscula en «Maskil» se mantiene como etiqueta de encabezado técnico.
  - Se evita «SEÑOR» porque el versículo no contiene el Tetragrámaton en el texto base.
