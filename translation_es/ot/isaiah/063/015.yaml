translation:
  language: es
  text: Mira desde el cielo y ve, desde tu santa y gloriosa morada. ¿Dónde están tu celo[a] y tus obras poderosas? La agitación de tus entrañas y tus compasiones se han contenido lejos de mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tus celos'; aquí se refiere al celo apasionado de Dios por intervenir en favor de su pueblo.
    reason: lexical_alternative
  - marker: b
    text: O 'se han retenido de mí' o 'se han contenido de mí'; el verbo expresa que la compasión divina se frena o se guarda.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַבֵּט
  english_pob_choice: Look down
  chosen_spanish: Mira desde los cielos
  alternatives_spanish:
  - Mira
  - Mira hacia abajo
  lexicon: HALOT
  rationale: El imperativo pide una mirada desde lo alto hacia la situación del orante. En español, 'Mira desde los cielos' comunica esa perspectiva vertical sin forzar un calco poco natural; 'hacia abajo' quedaría demasiado explícito frente al hebreo.
- source_word: מִשָּׁמַיִם
  english_pob_choice: from heaven
  chosen_spanish: desde los cielos
  alternatives_spanish:
  - desde el cielo
  - desde los cielos
  lexicon: HALOT
  rationale: El hebreo es plural morfológicamente. 'Cielos' conserva mejor ese plural, aunque en español también sería posible el singular idiomático.
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y ve
  alternatives_spanish:
  - y mira
  - y contempla
  lexicon: HALOT
  rationale: El par imperativo se rinde con una forma breve y directa. 'Ve' preserva el mandato simple del hebreo y funciona bien junto con 'mira' en la primera cláusula.
- source_word: מִזְּבֻל קָדְשְׁךָ וְתִפְאַרְתֶּךָ
  english_pob_choice: from your holy and glorious dwelling
  chosen_spanish: desde tu santa y gloriosa morada
  alternatives_spanish:
  - desde tu morada santa y gloriosa
  - desde la morada de tu santidad y tu gloria
  - desde tu exaltada morada santa
  lexicon: HALOT
  rationale: זְבֻל designa una morada elevada o habitáculo. 'Morada' es claro y solemne en español; los adjetivos 'santa y gloriosa' reflejan el sustantivo-atributo hebreo con naturalidad.
- source_word: קִנְאָתְךָ
  english_pob_choice: your zeal
  chosen_spanish: tu celo
  alternatives_spanish:
  - tu celo ardiente
  - tu celosía
  - tu celo/tu celosía
  lexicon: HALOT
  rationale: Para Dios, קנאה expresa un celo pactual e interventor. 'Celo' evita la carga negativa de 'celos' en español y preserva la fuerza de la súplica; se mantiene la alternativa semántica implícita mediante la nota textual.
- source_word: גְבוּרֹתֶיךָ
  english_pob_choice: your mighty deeds
  chosen_spanish: tus hazañas poderosas
  alternatives_spanish:
  - tus hechos poderosos
  - tus proezas poderosas
  - tus poderosos actos
  lexicon: HALOT
  rationale: El plural remite a manifestaciones concretas de poder. 'Hazañas poderosas' comunica acción vigorosa y mantiene un registro elevado; aunque 'hechos poderosos' es más literal, suena más prosaico en español.
- source_word: הֲמוֹן מֵעֶיךָ
  english_pob_choice: The stirring of your inward parts
  chosen_spanish: El movimiento de tus entrañas
  alternatives_spanish:
  - El tumulto de tus entrañas
  - El agitarse de tus entrañas
  - El movimiento de tu ser interior
  lexicon: HALOT
  rationale: Se conserva la metáfora corporal del hebreo para no suavizar la carga afectiva. 'Entrañas' es la equivalencia española más apta para expresar compasión profunda sin reemplazarla por una abstracción como 'corazón'.
- source_word: רַחֲמֶיךָ
  english_pob_choice: your compassions
  chosen_spanish: tus compasiones
  alternatives_spanish:
  - tus misericordias
  - tu compasión
  lexicon: HALOT
  rationale: El plural hebreo intensifica la abundancia de misericordias/compasiones. 'Compasiones' mantiene esa pluralidad, aunque 'misericordias' sería otra posibilidad aceptable.
- source_word: אֵלַי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: Con el verbo reflexivo de restricción, el español natural requiere 'de mí' para expresar el punto de retirada o contención, aunque el hebreo lleva la preposición 'a/toward me'.
- source_word: הִתְאַפָּקוּ
  english_pob_choice: are withheld
  chosen_spanish: se han retraído
  alternatives_spanish:
  - se han contenido
  - se han reprimido
  - se han detenido
  lexicon: HALOT
  rationale: El hitpael expresa contención/retención. 'Se han retraído' comunica en español el efecto de una compasión que no se deja desplegar; evita una pasiva menos natural y conserva el lamento.
theological_decisions:
- issue: Lenguaje antropopático de la compasión divina
  english_pob_reading: Retain bodily-emotional imagery ('inward parts') rather than flattening to an abstract phrase like 'heart' or 'feelings.'
  chosen_spanish_reading: Mantener la imagen corporal ('entrañas') en lugar de abstraerla a 'corazón' o 'sentimientos'.
  alternative_spanish_readings:
  - tu corazón
  - tus sentimientos
  - tu ternura
  rationale: El versículo usa deliberadamente lenguaje encarnado para expresar la intensidad de la compasión divina. En español, 'entrañas' conserva ese impacto y evita diluir la figura bíblica.
  doctrine_reference: Translation philosophy §3, §6
- issue: Rendering of divine קִנְאָה
  english_pob_reading: Translate as 'zeal' in the main text.
  chosen_spanish_reading: Traducirlo como 'celo' en el texto principal.
  alternative_spanish_readings:
  - celos
  - ardor
  - zeal
  rationale: En este contexto la idea es la pasión pactual de Yahvé para intervenir. 'Celo' es la forma española más clara y menos equívoca; 'celos' sugeriría una emoción posesiva humana.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: The English POB revised 'mighty acts' to 'mighty deeds' for a more natural formal rendering of גבורות. The Spanish draft reflects that by using 'hazañas poderosas' as an elevated, action-oriented plural, while preserving the concrete force of divine acts. The draft also preserves the English audit trail's concern for embodied compassion and the ambiguity of קנאה.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el proyecto cuando el texto hebreo contiene el nombre divino; aquí el versículo habla en segunda persona sin el Tetragrámaton explícito, por lo que no se introduce ninguna sustitución.
  - Se mantiene 'celo' para קנאה, siguiendo el valor pactual indicado por la auditoría en lugar de 'celos'.
  - '''Entrañas'' conserva el hebraísmoforal de emoción profunda, en coherencia con el criterio POB de no aplanar la metáfora corporal.'
  - '''Desde los cielos'' respeta el plural hebreo sin sonar forzado en español.'
