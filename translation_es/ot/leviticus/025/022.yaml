revisions:
- from: Sembrarán en el año octavo y comerán del producto viejo hasta el año noveno; hasta que llegue su producto[a], comerán lo viejo.
  to: Sembrarán en el octavo año y comerán de la cosecha antigua hasta el noveno año; hasta que llegue la cosecha de ese año[a], comerán lo antiguo.
  rationale: 'Se ajusta el español para sonar más natural y preciso en un contexto agrícola: תְּבוּאָה se vierte mejor como ''cosecha'' que como ''producto''; se mejora la fluidez con ''octavo año/noveno año''; y se mantiene la repetición de יָשָׁן mediante ''antigua'' / ''lo antiguo'', conservando en nota que el hebreo dice solo ''viejo/antiguo''. No se requiere adjudicación adicional.'
