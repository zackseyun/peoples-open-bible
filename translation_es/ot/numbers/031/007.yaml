review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: acción militar contra Madián, conformidad con el mandato de Yahvé dado a Moisés, y muerte de todos los varones. También preserva correctamente יְהוָה como «Yahvé» y mantiene la nota léxica sobre וַיִּצְבְּאוּ. Sin embargo, «hicieron guerra» suena menos idiomático que una formulación más natural en español, y «varón» no preserva con suficiente precisión el valor biológico general de זָכָר que el expediente inglés justificó expresamente como «male», no «man».'
  spanish_quality_summary: 'El texto es claro y digno, pero requiere una leve mejora de naturalidad y precisión. «Libraron guerra» o «combatieron» resulta más fluido que «hicieron guerra»; y «todo varón» en español suele oírse más como masculino humano adulto o registro tradicional, mientras que «todo varón» aquí no comunica tan claramente la amplitud sexual general del hebreo como «todo hombre de sexo masculino» tampoco sería idiomático. La opción más fiel y legible es reformular el sintagma final en plural: «mataron a todos los varones».'
  glossary_alignment: 'Alineación buena en «Yahvé», «Madián», «Moisés» y el resto del léxico principal. La principal desviación está en זָכָר: dado que la auditoría inglesa subraya una decisión doctrinal de precisión de sexo biológico frente a «man», el español «varón» queda demasiado cercano a «man/men» en uso común. «Varones» sigue siendo más natural que «machos», pero conviene señalar que es una solución de compromiso estilístico; en esta frase plural funciona mejor y evita el calco singular incómodo.'
  issues:
  - severity: medium
    issue: «Hicieron guerra» es poco idiomático en español bíblico moderno.
    rationale: Aunque comprensible, suena calcado. El hebreo denota acción militar; «libraron guerra» preserva mejor ese sentido con español natural y digno.
  - severity: medium
    issue: «Todo varón» no comunica con suficiente precisión el alcance de זָכָר.
    rationale: La base documental recalca que el hebreo se refiere a los masculinos como tales, no específicamente a hombres adultos. En español, «varón» suele inclinarse hacia humano masculino adulto. El plural «todos los varones» mejora la naturalidad, aunque sigue siendo una aproximación estilística aceptable en contexto narrativo.
  revised_spanish_text: Así libraron guerra contra Madián[a], tal como Yahvé había mandado a Moisés, y mataron a todos los varones.
  revised_footnotes:
  - marker: a
    text: O «combatieron contra Madián». El verbo hebreo puede denotar participación militar o guerra.
    reason: lexical_alternative
  revision_rationale: Se ajusta «hicieron guerra» a «libraron guerra» por naturalidad idiomática sin perder fuerza militar. Se cambia «a todo varón» por «a todos los varones» para lograr un español más fluido y evitar el giro singular calcado, manteniendo en contexto la referencia a los masculinos indicada por זָכָר. No se requiere adjudicación adicional porque es una corrección estilística y de precisión menor dentro de opciones ya documentadas.
