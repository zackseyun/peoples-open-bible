    issue: Marcador de nota mal anclado
    rationale: La nota [a] comenta דְּבָרָיו ('sus palabras'), pero el marcador está colocado después de 'le dijeron'. Esto incumple la disciplina requerida de anclar la nota exactamente en la palabra o frase relevante del texto.
  - severity: medium
    issue: Redacción incorrecta en la nota
    rationale: La frase 'porque de lo que dijo' no es español natural ni correcto en este contexto. Debe ser 'por lo que dijo' o equivalente, manteniendo la alternativa léxica del inglés POB.
  - severity: low
    issue: Conector narrativo mejorable
    rationale: '''Así que'' no es incorrecto, pero introduce una inferencia más explícita. El hebreo simplemente continúa la narración; ''Y lo odiaron aún más'' o ''Y lo odiaron todavía más'' preserva mejor ese flujo.'
