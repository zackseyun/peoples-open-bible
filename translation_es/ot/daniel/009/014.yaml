  text: וַ/יִּשְׁקֹ֤ד יְהוָה֙ עַל הָ֣/רָעָ֔ה וַ/יְבִיאֶ֖/הָ עָלֵ֑י/נוּ כִּֽי צַדִּ֞יק יְהוָ֣ה אֱלֹהֵ֗י/נוּ עַל כָּל מַֽעֲשָׂי/ו֙ אֲשֶׁ֣ר עָשָׂ֔ה וְ/לֹ֥א שָׁמַ֖עְנוּ בְּ/קֹלֽ/וֹ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/009/014.yaml
  text: So Yahweh kept watch over the disaster and brought it upon us[a], for Yahweh our God is righteous in all the works that he has done[c][b], and we have not listened to his voice.
  footnotes:
  - marker: a
    text: Or 'the calamity.' The Hebrew word can also mean 'evil,' but here it refers to the disaster of judgment brought on the people.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'kept watch over' can also be understood as 'was vigilant concerning' or, more interpretively, 'hastened.'
    reason: lexical_alternative
  - marker: c
    text: '''Listened to his voice'' carries the sense of obeying what he said.'
    reason: lexical_alternative
