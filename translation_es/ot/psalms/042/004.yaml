translation:
  language: es
  text: 'Mis lágrimas han sido mi pan día y noche[a], mientras me dicen todo el día: «¿Dónde está tu Dios?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mi lágrima ha sido mi pan», con el singular funcionando colectivamente en hebreo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָיְתָה לִּי
  english_pob_choice: have been my
  chosen_spanish: han sido mi
  alternatives_spanish:
  - me han servido de
  - fueron para mí
  lexicon: HALOT
  rationale: 'La construcción hebrea con היה + ל expresa función o resultado: algo llega a ser o actúa como algo para el hablante. En español, «han sido mi» conserva bien ese valor estativo/resultativo y suena natural en un lamento poético.'
- source_word: דִמְעָתִי
  english_pob_choice: my tears
  chosen_spanish: mis lágrimas
  alternatives_spanish:
  - mi lágrima
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular con valor colectivo, el contexto de duelo favorece el plural natural en español. «Mis lágrimas» mantiene el sentido colectivo sin perder fluidez poética.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de «pan», no se generaliza a «alimento», porque la metáfora es fuerte y transparente también en español.
- source_word: יוֹמָם וָלָיְלָה
  english_pob_choice: day and night
  chosen_spanish: de día y de noche
  alternatives_spanish:
  - día y noche
  - todo el día y toda la noche
  lexicon: HALOT
  rationale: La locución hebrea es un merismo de continuidad. «De día y de noche» expresa duración constante con un registro natural y bíblico en español.
- source_word: בֶּאֱמֹר
  english_pob_choice: while they say
  chosen_spanish: mientras me dicen
  alternatives_spanish:
  - cuando me dicen
  - al decirme
  lexicon: HALOT
  rationale: La preposición con infinitivo marca simultaneidad. «Mientras me dicen» conserva la acción acompañante y el carácter continuo de la burla.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - contra mí
  lexicon: HALOT
  rationale: En español, el dativo átono «me» comunica de modo natural la dirección del habla hacia el salmista. Se evita sobrecargar la frase.
- source_word: כָּל הַיּוֹם
  english_pob_choice: all day long
  chosen_spanish: todo el día
  alternatives_spanish:
  - todo el día long
  - continuamente
  lexicon: HALOT
  rationale: La expresión idiomática enfatiza repetición continua. «Todo el día» es claro y conserva la fuerza del hebreo sin añadir explicación.
- source_word: אַיֵּה
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está
  alternatives_spanish:
  - ¿Dónde se encuentra
  - ¿Dónde queda
  lexicon: HALOT
  rationale: La pregunta es una burla directa sobre la aparente ausencia de Dios. «¿Dónde está» transmite con naturalidad la fuerza interrogativa del hebreo.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu dios
  lexicon: HALOT
  rationale: Se conserva «Dios» con mayúscula porque la burla apunta al Dios conocido del salmista, no a una deidad genérica.
theological_decisions:
- issue: Preservación de la tensión teológica de la aparente ausencia divina
  english_pob_reading: 'Render the question as a taunt about God''s apparent absence: ''Where is your God?'''
  chosen_spanish_reading: 'Mantener la burla directa: «¿Dónde está tu Dios?»'
  alternative_spanish_readings:
  - «¿Qué ha sido de tu Dios?»
  - «¿Dónde anda tu Dios?»
  rationale: El hebreo formula una pregunta directa y despectiva; la versión española conserva esa tensión sin resolverla interpretativamente. No se suaviza el golpe retórico del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El audit trail inglés no requiere cambios de sentido: se mantiene la imagen concreta del pan, la simultaneidad del habla hostil y la pregunta despectiva sobre la aparente ausencia de Dios. Se adopta una equivalencia óptima en español, con una nota para la posible lectura singular colectiva de דִמְעָתִי.'
  spanish_consistency_notes:
  - Se usa «Dios» con mayúscula en coherencia con el referente teísta específico del salmista.
  - Se evita «SEÑOR» porque aquí no aparece el Tetragrámaton ni una cita directa que obligue a esa convención.
  - La cadencia poética «de día y de noche» conserva el merismo hebreo con registro bíblico natural.
  - La nota a distingue la alternativa singular colectiva sin romper el flujo principal del verso.
