translation:
  language: es
  text: Y vendrá el devastador contra toda ciudad, y ninguna ciudad escapará; el valle perecerá, y la llanura será destruida, como ha dicho Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: שֹׁדֵד
  english_pob_choice: the destroyer
  chosen_spanish: el devastador
  alternatives_spanish:
  - el destructor
  - el destructor devastador
  - el saqueador
  lexicon: HALOT
  rationale: El participio sustantivado expresa al agente que arruina y saquea. En español, «devastador» conserva mejor la fuerza de ruina/judicio que un calco menos natural, y evita perder el matiz activo del agente.
- source_word: וְיָבֹא
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - vendrá contra
  - irá a venir
  lexicon: HALOT
  rationale: El imperfecto profético se rinde naturalmente en futuro español. «Vendrá» preserva el valor predictivo sin introducir una perífrasis innecesaria.
- source_word: אֶל כָּל עִיר
  english_pob_choice: against every city
  chosen_spanish: contra toda ciudad
  alternatives_spanish:
  - a toda ciudad
  - sobre toda ciudad
  lexicon: HALOT
  rationale: Aunque אֶל significa literalmente «a», el contexto de invasión exige el valor hostil «contra». «Toda ciudad» comunica el alcance distributivo del hebreo.
- source_word: וְעִיר לֹא תִמָּלֵט
  english_pob_choice: and no city will escape
  chosen_spanish: y ninguna ciudad escapará
  alternatives_spanish:
  - y no escapará ciudad alguna
  - y no se escapará ninguna ciudad
  lexicon: HALOT
  rationale: 'El singular distributivo hebreo se expresa con un plural lógico en español: «ninguna ciudad». «Escapará» mantiene la idea de librarse del juicio sin forzar una construcción antinatural.'
- source_word: הָעֵמֶק
  english_pob_choice: the valley
  chosen_spanish: el valle
  alternatives_spanish:
  - la valléada
  - la hondonada
  lexicon: HALOT
  rationale: עֵמֶק denota un valle; el artículo sugiere una región reconocible. «El valle» es la forma más directa y transparente en español.
- source_word: וְאָבַד
  english_pob_choice: will perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - se perderá
  - morirá
  lexicon: HALOT
  rationale: Aquí el verbo expresa ruina de una región, no muerte personal. «Perecerá» conserva el tono profético de destrucción total.
- source_word: הַמִּישֹׁר
  english_pob_choice: the plain
  chosen_spanish: la llanura
  alternatives_spanish:
  - el llano
  - la meseta
  - el plateau
  lexicon: HALOT
  rationale: El inglés POB revisó esta expresión desde «plateau» a «plain» por naturalidad y estándar contextual. En español, «llanura» es la equivalencia natural de מִישׁוֹר y mantiene el contraste geográfico con «el valle».
- source_word: וְנִשְׁמַד
  english_pob_choice: will be destroyed
  chosen_spanish: será destruida
  alternatives_spanish:
  - será aniquilada
  - será arrasada
  lexicon: HALOT
  rationale: El nifal de שׁמד indica destrucción total. «Será destruida» es fiel y no intensifica más allá de lo que el texto exige.
- source_word: אֲשֶׁר אָמַר יְהוָה
  english_pob_choice: as Yahweh has said
  chosen_spanish: como ha dicho Yahvé
  alternatives_spanish:
  - como dijo Yahvé
  - tal como ha hablado Yahvé
  lexicon: HALOT
  rationale: El nombre divino se vierte como «Yahvé» según la política del proyecto. «Ha dicho» reproduce con naturalidad la fórmula de autoridad profética del relativo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Según la pauta del proyecto, en español se preserva el nombre propio divino como «Yahvé» en vez de ocultarlo tras un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor geográfico de הַמִּישֹׁר
  english_pob_reading: the plain
  chosen_spanish_reading: la llanura
  alternative_spanish_readings:
  - la meseta
  - el altiplano
  rationale: El audit trail inglés decidió revisar «plateau» a «plain» para reflejar el uso más natural del término en este contexto. En español, «llanura» conserva esa revisión y evita introducir una precisión topográfica no exigida por el verso.
  doctrine_reference: 'DOCTRINE.md: Translation method — source-governed geographic terms'
translation_notes:
  revision_awareness: El borrador inglés pasó de «plateau» a «plain» en una revisión posterior para hacer más natural el término מִישׁוֹר; esta versión española sigue esa última decisión y mantiene el contraste con «el valle».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la política del proyecto.
  - Se usa «devastador» para שֹׁדֵד, en línea con el valor de agente destructor del hebreo.
  - Se traduce el paralelismo geográfico con «el valle» / «la llanura» para conservar la estructura del verso.
  - No se añaden notas al pie porque no hay una alternativa textual o lexical que requiera anclaje específico en el texto español.
