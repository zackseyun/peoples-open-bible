    rationale: Las notas deben usar marcadores únicos en orden. Es mejor que en el texto aparezcan [a][b] en la primera expresión y [c] en la segunda, o una secuencia ordenada equivalente, para facilitar lectura y control editorial.
  - severity: low
    issue: '''de corazón pequeño'' es fiel pero algo rígido'
    rationale: No obliga a una corrección mayor, porque la nota explica bien el sentido y la imagen hebrea merece conservarse. Puede mantenerse si se prioriza trazabilidad sobre idiomaticidad.
  revised_spanish_text: La riqueza no es conveniente para un hombre de corazón pequeño[a][b], ni el tesoro para un hombre de mal ojo[c].
