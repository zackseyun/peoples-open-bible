translation:
  language: es
  text: Y el resto de los hechos de Pekaía[a], y todo lo que hizo, he aquí, están escritos en el libro de los anales de los reyes de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «El resto de los hechos de Pekaía ... ciertamente están escritos en los anales de los reyes de Israel».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: Ahora, el resto de
  alternatives_spanish:
  - Y el resto de
  - El resto de
  lexicon: HALOT
  rationale: En esta fórmula regia, יֶתֶר expresa 'el resto' o 'lo demás'. En español, 'Ahora' funciona como marcador discursivo natural para introducir el resumen, sin alterar el sentido del hebreo.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - actos
  - obras
  - asuntos
  lexicon: HALOT
  rationale: En esta fórmula de Crónicas/Reyes, דִּבְרֵי no se refiere a 'palabras' literales, sino al conjunto de acciones o hechos registrados de un rey. 'Hechos' mantiene esa amplitud y suena natural en español.
- source_word: פְקַחְיָה
  english_pob_choice: Pekahiah
  chosen_spanish: Pekaía
  alternatives_spanish:
  - Pekajía
  - Pekahías
  lexicon: transliteración tradicional ajustada al español
  rationale: Se translitera el nombre propio al español de forma reconocible y pronunciable. 'Pekaía' conserva la referencia al hebreo sin depender del patrón ortográfico inglés.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo cuanto hizo
  - y todo lo que realizó
  lexicon: HALOT
  rationale: La cláusula relativa se vierte de manera directa y completa. 'Hizo' preserva el alcance general de עשה sin restringirlo a logros específicos.
- source_word: הִנָּם
  english_pob_choice: behold, they are
  chosen_spanish: están
  alternatives_spanish:
  - he aquí que están
  - he aquí, están
  - ciertamente están
  lexicon: HALOT
  rationale: El hebreo contiene una partícula presentativa marcada, pero en español una repetición como 'he aquí' resultaría pesada en esta fórmula archivística. Se mantiene el contenido informativo con 'están', dejando la lectura fluida.
- source_word: כְּתוּבִים
  english_pob_choice: written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - anotados
  - redactados
  lexicon: HALOT
  rationale: El participio pasivo significa 'escritos'. 'Escritos' es la correspondencia más directa y, en español, suena más natural que un calco como 'escrito' en esta construcción.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el libro
  alternatives_spanish:
  - en el rollo
  - sobre el libro
  lexicon: HALOT
  rationale: Aunque עַל es literalmente 'sobre', la fórmula documental en español se expresa mejor con 'en el libro'. 'Libro' traduce סֵפֶר de modo idiomático y claro.
- source_word: דִּבְרֵי הַיָּמִים
  english_pob_choice: the Chronicles
  chosen_spanish: de los Anales
  alternatives_spanish:
  - de las Crónicas
  - de los registros
  lexicon: HALOT
  rationale: La expresión designa un registro histórico-anual. 'Anales' reproduce bien ese carácter archivístico sin imponer de entrada el título bíblico posterior de 'Crónicas' donde el hebreo aquí alude a un libro de registros.
- source_word: לְמַלְכֵי יִשְׂרָאֵל
  english_pob_choice: of the Kings of Israel
  chosen_spanish: de los reyes de Israel
  alternatives_spanish:
  - para los reyes de Israel
  - de parte de los reyes de Israel
  lexicon: HALOT
  rationale: El prefijo ל en este título funciona de manera posesiva o clasificatoria. En español, 'de los reyes de Israel' expresa con naturalidad la relación de pertenencia del archivo a esa serie real.
theological_decisions:
- issue: Valor de la partícula presentativa הִנָּם
  english_pob_reading: behold, they are
  chosen_spanish_reading: están
  alternative_spanish_readings:
  - he aquí que están
  - he aquí, están
  - ciertamente están
  rationale: No hay carga doctrinal aquí, pero sí una tensión entre fidelidad formal y naturalidad española. Se opta por una traducción sobria que no sobrecarga una fórmula de cierre archivística.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el hebreo masorético y con la lectura auditada en inglés. No se detectaron revisiones textuales ni variantes que requirieran ajuste adicional; solo se resolvieron las equivalencias idiomáticas propias de la fórmula regia.
  spanish_consistency_notes:
  - Se usa 'Pekaía' de manera consistente para el nombre אישי פְקַחְיָה.
  - Se prefirió 'Anales' para דִּבְרֵי הַיָּמִים por su valor archivístico en español, manteniendo la referencia a un registro histórico oficial.
  - Se conservó el tono formal y la estructura de cierre regia sin introducir explicaciones interpretativas.
