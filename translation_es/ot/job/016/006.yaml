translation:
  language: es
  text: Si hablo, no se alivia mi dolor; y si me callo, ¿qué me deja[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿qué se va de mí?» o «¿qué se aparta de mí?». El hebreo es conciso y puede implicar: «¿qué de mi dolor se va de mí?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Aunque
  - Cuando
  lexicon: HALOT
  rationale: Introduzca la primera cláusula condicional de manera natural en español, manteniendo el paralelo con la segunda cláusula.
- source_word: אֲדַבְּרָה
  english_pob_choice: I speak
  chosen_spanish: hablo
  alternatives_spanish:
  - hablara
  - hablaría
  lexicon: HALOT
  rationale: 'El cohortativo en este contexto condicional se vierte de forma idiomática con presente simple en español: ''si hablo''.'
- source_word: יֵחָשֵׂךְ
  english_pob_choice: is not eased
  chosen_spanish: no se alivia
  alternatives_spanish:
  - no se restringe
  - no se detiene
  - no se calma
  lexicon: HALOT
  rationale: El contexto con 'mi dolor' favorece la idea de que no disminuye ni se alivia. 'No se alivia' conserva el sentido resultante del audit trail inglés sin forzar una imagen demasiado literal de 'retener'.
- source_word: כְּאֵבִי
  english_pob_choice: my pain
  chosen_spanish: mi dolor
  alternatives_spanish:
  - mi pena
  - mi sufrimiento
  lexicon: HALOT
  rationale: '''Dolor'' es el equivalente más amplio y natural para כְּאֵב, conservando la angustia física y emocional de Job.'
- source_word: וְאַחְדְּלָה
  english_pob_choice: and if I refrain
  chosen_spanish: y si me callo
  alternatives_spanish:
  - y si me abstengo
  - y si dejo de hablar
  - y si me refreno
  lexicon: HALOT
  rationale: En el paralelismo con 'hablar', el sentido es refrendarse de hablar; 'me callo' es el español más directo y natural para ese valor contextual.
- source_word: מַה מִנִּי יַהֲלֹךְ
  english_pob_choice: what goes away from me?
  chosen_spanish: ¿qué se aparta de mí?
  alternatives_spanish:
  - ¿qué se va de mí?
  - ¿qué me deja?
  - ¿qué pasa de mí?
  lexicon: HALOT
  rationale: La cláusula es elíptica y admite la idea de 'apartarse' o 'marcharse'. 'Se aparta de mí' conserva la tersura retórica y la ambigüedad del hebreo, sin añadir el objeto implícito.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente, que prefirió ''is not eased'' frente a ''is not held back''. Por eso la versión española evita el calco de contención y expresa el efecto resultante: el dolor no disminuye ni se alivia.'
  spanish_consistency_notes:
  - Se mantuvo una dicción sobria y publicada, sin añadir explicaciones al cuerpo del verso.
  - No se introdujeron notas al pie porque la ambigüedad hebrea puede preservarse dentro del español sin anclajes adicionales.
  - '''Dolor'' se usó de forma amplia para no estrechar el campo semántico de כְּאֵב.'
