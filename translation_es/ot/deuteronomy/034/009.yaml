revisions:
- from: Y Josué, hijo de Nun, estaba lleno[a] del espíritu de sabiduría, porque Moisés había puesto sus manos sobre él. Y los hijos de Israel le escucharon y hicieron como Yahvé había mandado a Moisés.
  to: Y Josué, hijo de Nun, estaba lleno del espíritu de sabiduría[a], porque Moisés había impuesto sus manos sobre él. Y los hijos de Israel le escucharon y hicieron como Yahvé había mandado a Moisés.
  rationale: Se conserva la traducción base por ser fiel y natural, pero se ajusta el verbo a «había impuesto sus manos» para reflejar mejor el gesto ritual del hebreo y se corrige la nota para representar con más precisión las alternativas documentadas en el audit trail inglés. También se ancla la nota directamente a la frase «espíritu de sabiduría», que es donde surge la ambigüedad interpretativa.
  reviewer_model: gpt-5.4
