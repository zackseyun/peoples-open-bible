  language: en
  yaml_path: translation/ot/2_kings/012/012.yaml
  text: And they gave the weighed-out silver into the hand of the workmen who were appointed over the house of Yahweh[c][b][a], and they paid it out to the carpenters and the builders who were working on the house of Yahweh.
