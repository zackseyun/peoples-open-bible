translation:
  language: es
  text: Un estruendo[a] ha llegado hasta el extremo de la tierra, porque Yahvé tiene una causa[b] contra las naciones; él entra en juicio con toda carne[c]. Ha entregado a los malvados a la espada[d], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Estruendo» también puede traducirse «tumulto» o «rugido».
    reason: lexical_alternative
  - marker: b
    text: «Causa» traduce un término legal hebreo que también puede entenderse como «controversia» o «litigio».
    reason: lexical_alternative
  - marker: c
    text: «Toda carne» es un hebraísmo que significa toda la humanidad.
    reason: lexical_alternative
  - marker: d
    text: 'O: «los ha entregado a la espada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁאוֹן
  english_pob_choice: uproar
  chosen_spanish: estruendo
  alternatives_spanish:
  - tumulto
  - ruido
  - rugido
  lexicon: HALOT
  rationale: El término hebreo denota una conmoción sonora y caótica en un contexto de juicio. «Estruendo» comunica bien esa intensidad en español sin sonar demasiado técnico o demasiado débil.
- source_word: בָּא
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - viene
  - está llegando
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte como acción consumada o ya segura en el discurso profético. «Ha llegado» preserva ese matiz de certeza cumplida sin volverlo un simple presente.
- source_word: עַד קְצֵה הָאָרֶץ
  english_pob_choice: to the end of the earth
  chosen_spanish: hasta el extremo de la tierra
  alternatives_spanish:
  - hasta el fin de la tierra
  - hasta los confines de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea es singular y habla del límite o alcance total de la tierra. «Hasta el extremo de la tierra» mantiene la imagen y evita pluralizarla innecesariamente.
- source_word: רִיב
  english_pob_choice: a case
  chosen_spanish: pleito
  alternatives_spanish:
  - caso
  - controversia
  - litigio
  lexicon: HALOT
  rationale: En contexto profético-jurídico, ריב tiene fuerza forense y puede implicar una demanda o disputa legal. «Pleito» comunica esa dimensión de conflicto judicial en un español natural y accesible.
- source_word: בַּגּוֹיִם
  english_pob_choice: against the nations
  chosen_spanish: con las naciones
  alternatives_spanish:
  - contra las naciones
  - entre las naciones
  lexicon: HALOT
  rationale: La preposición hebrea es locativa, pero en español el verbo judicial «tener un pleito» suele construirse con «con». Esa opción conserva la idea de litigio sin forzar un calco torpe; «contra» queda como alternativa posible, pero menos idiomática aquí.
- source_word: נִשְׁפָּט הוּא
  english_pob_choice: he is entering into judgment
  chosen_spanish: él entra en juicio
  alternatives_spanish:
  - él juzga
  - él comparece en juicio
  - él entra a juicio
  lexicon: HALOT
  rationale: La forma nifal de שׁפט en este entorno legal sugiere participación en el proceso judicial. «Entra en juicio» mantiene la formalidad y la escena forense sin reducirla a un simple veredicto.
- source_word: לְכָל בָּשָׂר
  english_pob_choice: with all flesh
  chosen_spanish: con toda carne
  alternatives_spanish:
  - con toda la humanidad
  - con todos
  lexicon: HALOT
  rationale: Se conserva el hebraísmo «toda carne» para respetar el lenguaje bíblico y su alcance universal. En español suena más sobrio y fuente-cercano que reemplazarlo de inmediato por una paráfrasis interpretativa.
- source_word: הָרְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los culpables
  - los malos
  lexicon: HALOT
  rationale: El sustantivo/adjetivo sustantivado señala una categoría moral negativa. «Malvados» es claro y fiel, aunque «impíos» también sería posible en registro más tradicional.
- source_word: נְתָנָם לַחֶרֶב
  english_pob_choice: has given the wicked to the sword
  chosen_spanish: ha entregado a los malvados a la espada
  alternatives_spanish:
  - los ha puesto a la espada
  - los ha entregado a la guerra
  lexicon: HALOT
  rationale: La imagen hebrea expresa consignación a muerte violenta. «Ha entregado ... a la espada» reproduce el idiomatismo bíblico con naturalidad en español y mantiene la fuerza de juicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la política del proyecto para el Tetragrámaton: usar «Yahvé» como forma del nombre divino, en vez de la sustitución tradicional por título.'
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se vierte de modo sobrio con «declara», que transmite autoridad oracular en un español contemporáneo y eclesialmente legible.
theological_decisions:
- issue: Lenguaje jurídico de juicio divino
  english_pob_reading: The verse is rendered with explicit legal/judicial language ('has a case,' 'entering into judgment') rather than softened general conflict language.
  chosen_spanish_reading: Se conserva el marco forense con «tiene un pleito» y «entra en juicio».
  alternative_spanish_readings:
  - tiene una controversia
  - está juzgando a las naciones
  - tiene un litigio con las naciones
  rationale: El hebreo combina ריב y נשפט, ambos con fuerte sabor judicial. Mantener ese campo semántico evita diluir la imagen de Yahvé como parte litigante y juez a la vez.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance universal de כָל־בָּשָׂר
  english_pob_reading: Rendered 'all flesh' in the main text.
  chosen_spanish_reading: Se mantiene «toda carne» en el texto principal.
  alternative_spanish_readings:
  - toda la humanidad
  - todos
  rationale: La expresión bíblica conserva tanto la universalidad del juicio como el tono idiomático del hebreo. Una paráfrasis aclaratoria puede leerse fácilmente como nota implícita, pero no debe desplazar el texto principal sin necesidad.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «the ends of the earth» a «the end of the earth» para reflejar mejor el singular hebreo. La propuesta española sigue esa decisión con «hasta el extremo de la tierra», sin pluralizar la frase. También se mantiene la lectura forense marcada por el audit trail inglés y la equivalencia óptima revisada.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme a la política del proyecto.
  - Se preserva el hebraísmo «toda carne» en el texto principal, con nota explicativa para accesibilidad.
  - El registro es bíblico contemporáneo, evitando tanto arcaísmos innecesarios como paráfrasis excesivas.
  - La puntuación separa claramente las dos proposiciones principales y la fórmula profética final.
