translation:
  language: es
  text: Y si una persona toca cualquier cosa impura —ya sea impureza humana, o un animal impuro, o cualquier cosa impura y detestable— y come de la carne del sacrificio de las ofrendas de paz que es de Yahvé, esa persona será cortada de entre su pueblo[a].[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de su pueblo'. El hebreo tiene 'de su pueblo' con forma femenina porque 'persona' (néfesh) es gramaticalmente femenina, no porque esta ley se aplique solo a una mujer.
    reason: lexical_alternative
  - marker: b
    text: '''Será cortada'' reproduce una fórmula de sanción del pacto. El hebreo no especifica aquí el modo exacto; puede implicar exclusión o juicio divino.'
    reason: alternative_reading
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - alma
  - vida
  lexicon: HALOT
  rationale: En material legal, נֶפֶשׁ suele referirse a un individuo concreto más que al alma inmortal. 'Persona' es natural en español y conserva el sentido jurídico del pasaje.
- source_word: תִגַּע
  english_pob_choice: touches
  chosen_spanish: toca
  alternatives_spanish:
  - entra en contacto con
  - hace contacto con
  lexicon: HALOT
  rationale: '''Toca'' expresa de forma clara el contacto ritual y sigue de cerca el verbo hebreo sin volverse técnico o pesado.'
- source_word: בְּכָל טָמֵא
  english_pob_choice: anything unclean
  chosen_spanish: cualquier cosa impura
  alternatives_spanish:
  - cualquier cosa inmunda
  - cualquier cosa impura o contaminada
  lexicon: HALOT
  rationale: La expresión es amplia e indefinida. 'Cualquier cosa impura' comunica bien el alcance total y evita restringir innecesariamente el término.
- source_word: טֻמְאַת אָדָם
  english_pob_choice: human uncleanness
  chosen_spanish: la impureza humana
  alternatives_spanish:
  - la impureza del ser humano
  - la impureza de hombre
  lexicon: HALOT
  rationale: '''Impureza humana'' resulta claro y conserva la categoría ritual asociada con אדם. ''Del ser humano'' sería más explícito, pero algo más pesado; ''de hombre'' introduciría una lectura masculina indebida.'
- source_word: אָדָם
  english_pob_choice: human
  chosen_spanish: humana
  alternatives_spanish:
  - humano
  - del ser humano
  lexicon: HALOT
  rationale: Aquí el término es genérico, no masculino. El español requiere concordancia con 'impureza', por lo que 'humana' preserva el valor contextual sin forzar el género.
- source_word: בִּבְהֵמָה טְמֵאָה
  english_pob_choice: an unclean animal
  chosen_spanish: un animal impuro
  alternatives_spanish:
  - un animal inmundo
  - una bestia impura
  lexicon: HALOT
  rationale: '''Animal'' es el equivalente más claro y natural en español para este contexto ritual. ''Impuro'' mantiene la repetición léxica con טמא/טמאה.'
- source_word: שֶׁקֶץ
  english_pob_choice: detestable thing
  chosen_spanish: cosa detestable
  alternatives_spanish:
  - abominación
  - cosa repugnante
  lexicon: HALOT
  rationale: En contextos de pureza, שֶׁקֶץ designa algo ritualmente aborrecible. 'Detestable' preserva el matiz sin cargar el texto con un tecnicismo excesivo; aquí se mantiene en una construcción más natural en español.
- source_word: וְאָכַל מִבְּשַׂר
  english_pob_choice: and eats some of the flesh
  chosen_spanish: y come de la carne
  alternatives_spanish:
  - y come parte de la carne
  - y come algo de la carne
  lexicon: HALOT
  rationale: El partitivo מִן se expresa de forma natural con 'de'. 'Carne' mantiene la terminología sacrificial clásica y coherente con Levítico.
- source_word: זֶבַח הַשְּׁלָמִים
  english_pob_choice: the sacrifice of peace offerings
  chosen_spanish: el sacrificio de las ofrendas de paz
  alternatives_spanish:
  - el sacrificio de las ofrendas de comunión
  - la ofrenda de paz
  lexicon: HALOT
  rationale: '''Ofrendas de paz'' es la opción más estable y reconocible para שְׁלָמִים. Se conserva la fórmula sacrificial en plural, como en el hebreo.'
- source_word: אֲשֶׁר לַיהוָה
  english_pob_choice: that belongs to Yahweh
  chosen_spanish: que pertenecen a Yahvé
  alternatives_spanish:
  - que son de Yahvé
  - que están dedicadas a Yahvé
  lexicon: HALOT
  rationale: El plural concuerda con 'las ofrendas'. 'Pertenecen a Yahvé' expresa bien la idea de pertenencia/dedicación cultual sin desplazar el matiz de posesión del hebreo.
- source_word: יהוה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: Según la pauta del proyecto, el nombre divino se renderiza como 'Yahvé' en el texto principal, no como una máscara litúrgica.
- source_word: וְנִכְרְתָה
  english_pob_choice: shall be cut off
  chosen_spanish: será cortada
  alternatives_spanish:
  - será eliminada
  - será excluida
  lexicon: HALOT
  rationale: Se conserva la fórmula pactual 'cortada' para no resolver la ambigüedad del hebreo. En español, el pasivo mantiene el peso sancionatorio del original.
- source_word: מֵעַמֶּיהָ
  english_pob_choice: from his people
  chosen_spanish: de entre su pueblo
  alternatives_spanish:
  - de entre sus pueblos
  - de su pueblo
  lexicon: HALOT
  rationale: El sufijo femenino concuerda con נֶפֶשׁ, no necesariamente con el sexo del infractor. 'De entre su pueblo' preserva el valor genérico y evita un masculino engañoso.
theological_decisions:
- issue: Sentido de la sanción וְנִכְרְתָה ... מֵעַמֶּיהָ
  english_pob_reading: retain 'shall be cut off from his people' without specifying death, exclusion, or divine judgment
  chosen_spanish_reading: mantener 'será cortada de entre su pueblo' sin precisar si implica muerte, exclusión o juicio divino
  alternative_spanish_readings:
  - será excluida de entre su pueblo
  - será muerta
  - será eliminada de entre su pueblo
  rationale: El hebreo preserva una fórmula de sanción del pacto cuya mecánica exacta no se explicita aquí. La traducción conserva esa tensión en lugar de resolverla interpretativamente.
  doctrine_reference: Preservar la tensión teológica del texto sin sobreinterpretar la forma de la sanción.
translation_notes:
  revision_awareness: El texto español sigue de cerca el audit trail inglés, pero ajusta la sintaxis para que suene natural en español y conserva las tensiones léxicas y teológicas documentadas. No se introdujeron decisiones nuevas no sustentadas por el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al estándar del proyecto para el nombre divino.
  - '''Impura/impureza'' conserva la red de טמא/טמאה/טֻמְאָה sin reemplazarla por vocabulario más interpretativo.'
  - '''Ofrendas de paz'' sigue la terminología sacrificial ya asentada para שְׁלָמִים.'
  - La sanción final se conserva con la fórmula 'será cortada' para no borrar la ambigüedad del hebreo.
