translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: Consideren, y llamen a las plañideras[a], para que vengan; y manden llamar a las mujeres expertas[b], para que vengan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'las mujeres que endechan' o 'las mujeres que hacen lamento'.
    reason: lexical_alternative
  - marker: b
    text: O 'las mujeres sabias'; aquí probablemente mujeres expertas en dirigir el lamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה צְבָאוֹת
  english_pob_choice: Yahweh of hosts
  chosen_spanish: Yahvé de los ejércitos
  alternatives_spanish:
  - Yahvé de los ejércitos celestiales
  - Yahvé de las huestes
  lexicon: HALOT
  rationale: Se conserva el nombre divino como Yahvé, conforme al criterio del proyecto, y צְבָאוֹת se vierte de manera directa como 'de los ejércitos', un equivalente natural y plenamente transparente en español.
- source_word: הִתְבּוֹנְנוּ
  english_pob_choice: Consider
  chosen_spanish: Consideren
  alternatives_spanish:
  - Pónganse a pensar
  - Presten atención
  lexicon: HALOT
  rationale: El imperativo llama a reflexión atenta antes de actuar; 'Consideren' reproduce bien esa idea en español moderno sin perder solemnidad profética.
- source_word: לַמְקוֹנְנוֹת
  english_pob_choice: the mourning women
  chosen_spanish: las mujeres endechas
  alternatives_spanish:
  - las mujeres que endechan
  - las plañideras
  - las mujeres de duelo
  lexicon: HALOT
  rationale: La forma participial apunta a mujeres dedicadas al lamento fúnebre. 'Mujeres endechas' conserva ese oficio/labor de duelo con un registro bíblico natural en español; 'plañideras' sería posible, pero más culturalmente marcado.
- source_word: וְקִרְאוּ ... וּתְבוֹאֶינָה
  english_pob_choice: call for ... that they may come
  chosen_spanish: llamen ... para que vengan
  alternatives_spanish:
  - citen ... para que vengan
  - reúnan ... para que vengan
  lexicon: HALOT
  rationale: '''Llamen a'' expresa la convocatoria; el segmento final ''para que vengan'' reproduce el valor volitivo/resultativo de los imperfectos sin forzar una traducción mecánica.'
- source_word: הַחֲכָמוֹת
  english_pob_choice: the skillful women
  chosen_spanish: las mujeres hábiles
  alternatives_spanish:
  - las mujeres sabias
  - las expertas
  lexicon: HALOT
  rationale: Aunque חכם suele ser 'sabio', aquí el contexto es el lamento ritual. 'Hábiles' comunica la pericia práctica que el English POB entendió como women skilled in leading lament.
- source_word: שִׁלְחוּ
  english_pob_choice: send for
  chosen_spanish: envíen por
  alternatives_spanish:
  - manden llamar a
  - manden buscar a
  lexicon: HALOT
  rationale: En español, 'enviar por' refleja bien la acción de mandar mensajeros para traer a esas mujeres; evita reducir el verbo a un simple 'enviar' sin objeto implícito.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la política del proyecto de no ocultar el Tetragrámaton. 'Yahvé' mantiene la distinción del nombre de pacto y es la forma base adoptada para el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de צְבָאוֹת en la fórmula divina
  english_pob_reading: of hosts
  chosen_spanish_reading: de los ejércitos
  alternative_spanish_readings:
  - de las huestes
  - de los ejércitos celestiales
  rationale: La expresión española 'de los ejércitos' conserva el valor amplio de fuerzas en servicio de Yahvé sin introducir una explicación interpretativa innecesaria.
  doctrine_reference: 'DOCTRINE.md: divine title terminology'
- issue: Valor de הַחֲכָמוֹת en el paralelismo
  english_pob_reading: the skillful women
  chosen_spanish_reading: las mujeres hábiles
  alternative_spanish_readings:
  - las mujeres sabias
  - las expertas
  rationale: No se debe diluir el matiz funcional del contexto. 'Hábiles' mantiene la idea de destreza en el lamento, evitando que 'sabias' suene meramente intelectual.
  doctrine_reference: 'DOCTRINE.md: lexical nuance in context'
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso alto del audit trail en inglés y no introduce cambios textuales. Se mantiene la doble convocatoria paralela ('llamen' / 'envíen por') y el valor volitivo de los verbos finales con 'para que vengan'.
  spanish_consistency_notes:
  - Se preserva Yahvé como forma del nombre divino, coherente con el estándar del proyecto.
  - Se evita 'SEÑOR' como máscara del Tetragrámaton.
  - '''Mujeres hábiles'' traduce la pericia práctica del paralelo hebreo, en línea con la nota inglesa sobre women skilled in leading lament.'
  - La estructura de dos cláusulas paralelas se mantiene para reflejar el hebreo.
  - La puntuación con dos puntos después de la fórmula profética sigue el registro bíblico en español.
