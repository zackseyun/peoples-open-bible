  text: And Jesus came near and spoke to them[a], saying[b], “All authority in heaven and on earth has been given to me.”
  footnotes:
  - marker: a
    text: Or “was given to me.” The Greek aorist passive can be rendered more formally this way; the main text uses present perfect to express the completed act with ongoing present force.
    reason: lexical_alternative
  - marker: b
    text: Or “All power.” The Greek word ἐξουσία more precisely denotes authority, right, or delegated rule rather than mere might.
    reason: lexical_alternative
