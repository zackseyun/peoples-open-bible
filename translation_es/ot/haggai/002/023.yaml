translation:
  language: es
  text: 'En aquel día[a], declara Yahvé de los Ejércitos: yo te tomaré, Zorobabel hijo de Salatiel, mi siervo, declara Yahvé, y te haré como un anillo de sello[b], porque te he elegido, declara Yahvé de los Ejércitos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «el SEÑOR de los Ejércitos».
    reason: lexical_alternative
  - marker: b
    text: La imagen de un «anillo de sello» sugiere autoridad valiosa, pertenencia y autenticación; compárese Jeremías 22:24.
    reason: cross_reference
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: On that day
  chosen_spanish: En aquel día
  alternatives_spanish:
  - En ese día
  - Aquel día
  lexicon: HALOT
  rationale: La fórmula profética temporal se conserva de forma idiomática y solemne en español. «En aquel día» mantiene el valor escatológico o profético sin caer en un calco áspero.
- source_word: נְאֻם יְהוָה צְבָאוֹת
  english_pob_choice: declares Yahweh of Armies
  chosen_spanish: declara Yahvé de los Ejércitos
  alternatives_spanish:
  - dice Yahvé de los Ejércitos
  - oráculo de Yahvé de los Ejércitos
  lexicon: HALOT
  rationale: «נְאֻם» se traduce como fórmula de declaración solemne, no solo como un verbo común de habla. Se mantiene «Yahvé» por la convención POB y «de los Ejércitos» para hacer transparente צְבָאוֹת en español, conservando la carga militar/cósmica.
- source_word: אֶקָּחֲךָ
  english_pob_choice: I will take you
  chosen_spanish: yo te tomaré
  alternatives_spanish:
  - yo te recibiré
  - yo te tomaré para mí
  lexicon: HALOT
  rationale: «Tomar» preserva el verbo básico de לקח y evita sustituir en exceso por «elegir», que ya aparece explícitamente después. El contexto permite la idea de selección o exaltación, pero la imagen verbal queda intacta.
- source_word: זְרֻבָּבֶל בֶּן שְׁאַלְתִּיאֵל
  english_pob_choice: Zerubbabel son of Shealtiel
  chosen_spanish: Zorobabel hijo de Salatiel
  alternatives_spanish:
  - Zerubbabel hijo de Salatiel
  - Zorobabel, hijo de Salatiel
  lexicon: HALOT
  rationale: Se translitera el nombre propio según uso hispano común («Zorobabel»). La relación filial se conserva de manera directa con «hijo de».
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: Se conserva la fuerza léxica de עבד con «esclavo», siguiendo la preferencia POB cuando la fuerza del término importa. Aunque en contextos reales/proféticos suele suavizarse a «siervo», aquí la elección resalta la pertenencia y la sujeción al hablante divino.
- source_word: וְשַׂמְתִּיךָ כַּחוֹתָם
  english_pob_choice: and I will make you like a signet ring
  chosen_spanish: y te pondré como un anillo de sello
  alternatives_spanish:
  - y te haré como un sello
  - y te pondré como un sello de sello
  lexicon: HALOT
  rationale: חותם se expresa en español como «anillo de sello», forma clara y natural que preserva la imagen administrativa y regia del original. «Como» mantiene la comparación introducida por כְּ.
- source_word: כִּי בְךָ בָחַרְתִּי
  english_pob_choice: for I have chosen you
  chosen_spanish: porque te he elegido
  alternatives_spanish:
  - pues te he elegido
  - porque en ti he elegido
  lexicon: HALOT
  rationale: «בחר» se traduce con el verbo «elegir», que expresa con más precisión la decisión divina ya realizada. «Porque» conserva la fuerza causal de כִּי.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: La repetición de la fórmula oracular se mantiene de forma consistente. «Declara» sostiene el tono solemne de la voz profética.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue el criterio POB de hacer visible el Tetragrámaton con «Yahvé», en vez de ocultarlo bajo un sustituto litúrgico. Esto preserva la identidad del nombre pactal en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahweh'
- issue: Traducción de צְבָאוֹת
  english_pob_reading: of Armies
  chosen_spanish_reading: de los Ejércitos
  alternative_spanish_readings:
  - de los Ejércitos celestiales
  - de los Ejércitos
  rationale: «De los Ejércitos» comunica con más naturalidad en español la idea de huestes/comandos asociados al título divino. Evita la opacidad de un calco menos transparente, a la vez que mantiene el sentido de poder y autoridad.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Imagen del anillo de sello y su posible resonancia davídica
  english_pob_reading: Preserve the metaphor without making its Davidic-messianic significance explicit in the main text
  chosen_spanish_reading: Conservar la metáfora sin explicitar en el texto principal su alcance davídico-mesiánico
  alternative_spanish_readings:
  - te haré mi anillo real de sello
  - te haré como un sello real
  rationale: El hebreo presenta la imagen del sello y la elección divina; la posible lectura davídica es real pero no se añade como glosa interpretativa al cuerpo del versículo. La traducción mantiene esa tensión y deja la implicación para notas o referencias cruzadas.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'Se siguió el auditoría inglesa más reciente, que no introdujo revisiones adicionales; la versión española mantiene la misma estructura semántica y las mismas dos decisiones interpretativas destacadas: el nombre divino visible y la metáfora del anillo de sello sin expansión doctrinal en el texto principal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se usa «de los Ejércitos» para צְבָאוֹת siguiendo el criterio de transparencia semántica.
  - Se conserva la fórmula oracular «declara» para נְאֻם en ambas ocurrencias.
  - «mi esclavo» se elige por coherencia con la fuerza léxica de עבד en el marco POB.
  - La metáfora «anillo de sello» se mantiene literal y se explica en nota sin sobreinterpretación.
