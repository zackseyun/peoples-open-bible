review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español preserva bien la estructura general del hebreo: protesta retórica («¿Por qué han de decir…?»), burla de las naciones («¿Dónde está su Dios?») y súplica para que la venganza por la sangre derramada sea públicamente conocida entre las naciones ante los ojos del salmista. Sin embargo, la nota al pie actual no preserva la alternativa documentada en el POB inglés; repite esencialmente el texto principal en vez de reflejar la alternativa sintáctica inglesa. Además, «tus esclavos» aquí suena menos adecuado que «tus siervos» por el contexto litúrgico-oracional y por la propia decisión léxica del POB inglés para este versículo.'
  spanish_quality_summary: El español es claro, natural y digno. «¿Por qué han de decir…?» y «ante nuestros ojos» están bien logrados. La frase final fluye mejor con «tus siervos» en este contexto devocional. La puntuación con dos puntos antes de la cita puede mejorarse a coma en español bíblico moderno.
  glossary_alignment: 'Alineación mayormente buena con el glosario del proyecto: no aparecen términos sensibles como Yahvé/Mesías. La principal desviación contextual está en עֲבָדֶיךָ, donde aunque el proyecto normalmente favorece «esclavo» para δοῦλος/עבד cuando la fuerza léxica lo requiere, en este versículo el expediente inglés ya documentó una excepción contextual a favor de «servants»; en español corresponde mejor «siervos» que «esclavos».'
  issues:
  - severity: medium
    issue: La nota al pie no refleja la alternativa real preservada por el POB inglés.
    rationale: 'La nota actual repite prácticamente la redacción principal, mientras que la nota inglesa documenta una alternativa de segmentación/sintaxis: «Let it be known among the nations before our eyes: the vengeance for the shed blood of your servants.» La revisión debe conservar esa alternativa en español.'
  - severity: medium
    issue: «Tus esclavos» no sigue la razón léxica contextual ya documentada para este versículo.
    rationale: Aunque «esclavos» puede ser una opción fuerte y válida en otros contextos, aquí el POB inglés escogió explícitamente «your servants» por adecuación contextual en una oración dirigida a Dios. En español bíblico eclesial, «tus siervos» preserva mejor ese matiz sin introducir una dureza innecesaria.
  - severity: low
    issue: Los dos puntos tras «naciones» suenan menos naturales que una coma introductoria.
    rationale: En español moderno, «¿Por qué han de decir las naciones, “¿Dónde está su Dios?”» fluye mejor que con dos puntos, sin pérdida de sentido.
  revised_spanish_text: ¿Por qué han de decir las naciones, «¿Dónde está su Dios?» Que se dé a conocer entre las naciones, ante nuestros ojos, la venganza por la sangre derramada de tus siervos[a].
  revised_footnotes:
  - marker: a
    text: 'O: «Que se dé a conocer entre las naciones ante nuestros ojos: la venganza por la sangre derramada de tus siervos».

      '
    reason: lexical_alternative
  revision_rationale: Se ajusta «esclavos» a «siervos» para seguir la decisión contextual ya documentada en el POB inglés para עֲבָדֶיךָ en este versículo; se corrige la nota para que preserve la alternativa sintáctica real del expediente inglés; y se pule la puntuación para un español más natural.
