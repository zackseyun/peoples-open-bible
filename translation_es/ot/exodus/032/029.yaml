base_translation:
  language: en
  yaml_path: translation/ot/exodus/032/029.yaml
  text: And Moses said[a], “Today fill your hand for Yahweh, for each man has been against his son and against his brother[c][b], so that he may bestow a blessing on you today.”
  footnotes:
  - marker: a
    text: Hebrew literally, 'fill your hand.' This is an idiom for consecration or ordination to sacred service.
    reason: lexical_alternative
  - marker: b
    text: Or 'for each man was against his son and against his brother'; the Hebrew is compressed and refers to the Levites acting even against close relatives in the preceding episode.
    reason: alternative_reading
  - marker: c
    text: The Hebrew does not explicitly state who gives the blessing; it may be understood as 'so that the LORD may bestow a blessing on you today.'
    reason: alternative_reading
