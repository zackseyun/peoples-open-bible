    text: «Abrir tu mano» es un modismo de dar generosamente o proveer.
    reason: cultural_note
  revision_rationale: Se ajusta ἐπιεικής a «clemente» para una mejor distinción léxica y naturalidad; se cambia «en misericordia» por «con misericordia» para mejorar el español sin perder sentido; se añade la nota del modismo «abrir tu mano» conforme al rastro auditado; y se simplifica la nota sobre «del humilde» para evitar tecnicismo innecesario y un error en el griego citado.
