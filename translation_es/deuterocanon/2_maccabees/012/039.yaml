  spanish_quality_summary: El texto es claro y legible en español neutro, pero puede ganar naturalidad y dignidad con «vinieron» y especialmente con «ponerlos a descansar» o una formulación semejante. La construcción actual «llegaron, cuando ya había surgido la necesidad» es comprensible, aunque algo rígida; una leve simplificación mejora el flujo sin perder fidelidad.
  glossary_alignment: No hay términos del glosario mayor en juego aquí. «Parientes» y «tumbas de sus antepasados» respetan bien la decisión documentada de conservar tanto el elemento de familiares como el de tumbas ancestrales.
  issues:
  - severity: medium
    issue: «depositarlos» es poco natural y algo frío en contexto funerario
    rationale: ἀποκαταστῆσαι aquí apunta a devolver/colocar los cuerpos en su lugar sepulcral correspondiente. «Depositar» puede sonar administrativo o físico sin el matiz funerario digno que el contexto exige.
  - severity: low
    issue: La nota al pie alternativa no refleja del todo la alternativa inglesa documentada
    rationale: La auditoría inglesa conserva la idea de ‘return them to their ancestral tombs’. En español conviene expresar mejor esa alternativa como «devolverlos a sus tumbas ancestrales» o equivalente, no solo «a sus tumbas ancestrales».
  - severity: low
    issue: «llegaron» puede mejorarse a «vinieron» para corresponder mejor al movimiento narrativo simple de ἦλθον
    rationale: No es un error fuerte, pero «vinieron» suena más natural en esta narración y evita una leve dureza estilística.
  revised_spanish_text: Al día siguiente[a], los hombres que estaban con Judas vinieron, cuando ya había surgido la necesidad, para recoger los cuerpos de los que habían caído y ponerlos a descansar con sus parientes en las tumbas de sus antepasados.
  revised_footnotes:
  - marker: a
    text: O «devolverlos a sus tumbas ancestrales». El griego menciona explícitamente tanto a los parientes como las tumbas de sus antepasados.
    reason: lexical_alternative
  revision_rationale: La revisión conserva todos los elementos del griego y de la auditoría POB, pero mejora la naturalidad y el tono funerario en español. «Ponerlos a descansar» expresa mejor la colocación sepulcral que «depositarlos», sin borrar la relación con sus parientes y las tumbas ancestrales. La nota al pie se ajusta para reflejar con más precisión la alternativa documentada en inglés.
