- from: Pero la señal comenzó a subir desde la ciudad como una columna de humo[a], y Benjamín se volvió tras de sí[b]; y he aquí[c] que toda la ciudad subía hasta los cielos.
  to: Pero la señal comenzó a subir desde la ciudad como una columna de humo[a], y Benjamín se volvió hacia atrás[b], y he aquí[c] que toda la ciudad subía a los cielos.
  rationale: 'Se ajustó la redacción para que el español suene natural sin perder la imagen hebrea: ‘se volvió hacia atrás’ conserva el sentido de ‘turn’ mejor que la formulación forzada ‘tras de sí’. También se corrigió la alternativa léxica de la nota a para alinearla con la evidencia auditada (‘beacon’, no ‘torch’) y se pulió la nota b. Se mantuvo ‘he aquí’, ‘columna de humo’ y ‘a los cielos’ por fidelidad y legibilidad.'
