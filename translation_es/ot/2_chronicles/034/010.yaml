translation:
  language: es
  text: Lo pusieron en manos de los obreros [a] que estaban encargados de la casa de Yahvé, y los obreros que trabajaban en la casa de Yahvé lo entregaban para reparar y fortalecer la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los encargados».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּתְּנוּ
  english_pob_choice: they put / gave
  chosen_spanish: lo pusieron / lo entregaban
  alternatives_spanish:
  - lo entregaron
  - lo dieron
  lexicon: HALOT
  rationale: El hebreo usa el mismo verbo נתן en dos cláusulas. En español, 'poner en manos de' funciona bien en la primera por el matiz de entrega bajo custodia, mientras que 'entregaban' en la segunda reproduce naturalmente la transferencia del dinero sin sonar forzado.
- source_word: עַל יַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - a cargo de
  - bajo la responsabilidad de
  lexicon: HALOT
  rationale: La imagen concreta de 'mano' se conserva de modo natural en español. 'En manos de' refleja el idiomismo hebreo de confiar algo al control o agencia de alguien.
- source_word: עֹשֵׂה הַמְּלָאכָה
  english_pob_choice: the workmen
  chosen_spanish: los obreros
  alternatives_spanish:
  - los trabajadores
  - los que hacían la obra
  lexicon: HALOT
  rationale: El participio singular tiene sentido colectivo en este contexto. 'Obreros' es claro, digno y conserva el sentido ocupacional de quienes ejecutan la labor.
- source_word: הַמֻּפְקָדִים
  english_pob_choice: who were appointed over
  chosen_spanish: que estaban encargados de
  alternatives_spanish:
  - que habían sido puestos sobre
  - que eran supervisores de
  lexicon: HALOT
  rationale: El pasivo de פקד indica responsabilidad asignada. 'Encargados de' expresa bien la idea de autoridad y supervisión sin sonar administrativo de más.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahvé
  lexicon: HALOT
  rationale: Se mantiene la expresión literal 'casa' por fidelidad al hebreo y porque el contexto identifica claramente el templo. Se conserva 'Yahvé' conforme al criterio del proyecto.
- source_word: אֹתוֹ
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - el dinero
  - esto
  lexicon: HALOT
  rationale: El pronombre retoma el dinero mencionado antes. 'Lo' es suficiente en español y evita introducir un sustantivo no presente en el verso.
- source_word: עוֹשֵׂי הַמְּלָאכָה אֲשֶׁר עֹשִׂים
  english_pob_choice: the workmen who were working
  chosen_spanish: los obreros que trabajaban
  alternatives_spanish:
  - los obreros que estaban trabajando
  - los trabajadores que hacían la obra
  lexicon: HALOT
  rationale: La repetición de עשה da idea de actividad continuada. 'Que trabajaban' conserva esa continuidad de manera natural y evita una redundancia innecesaria en español.
- source_word: לִבְדּוֹק
  english_pob_choice: for repairing
  chosen_spanish: para reparar
  alternatives_spanish:
  - para restaurar
  - para remendar
  lexicon: HALOT
  rationale: En este contexto de restauración del edificio, בדק no significa solo 'inspeccionar', sino atender daños estructurales. 'Reparar' expresa bien la función práctica.
- source_word: וּלְחַזֵּק
  english_pob_choice: and strengthening
  chosen_spanish: y fortalecer
  alternatives_spanish:
  - y reforzar
  - y hacer firme
  lexicon: HALOT
  rationale: חזק comunica hacer más sólido o seguro. 'Fortalecer' es directo y natural en español, y conserva el paralelismo con 'reparar'.
- source_word: הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: Se mantiene la correspondencia literal con la expresión anterior 'casa de Yahvé'. Aunque el referente es el templo, el hebreo dice 'casa', y esa consistencia ayuda a la transparencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el Tetragrámaton. 'Yahvé' preserva el nombre propio divino sin sustituirlo por un título.
theological_decisions:
- issue: Representación del Tetragrámaton en una frase repetida
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El verso repite el nombre del pacto dos veces. Se mantiene 'Yahvé' en ambas apariciones para reflejar de forma consistente el nombre divino y evitar la sustitución litúrgica por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de בדק en contexto de obra del templo
  english_pob_reading: for repairing
  chosen_spanish_reading: para reparar
  alternative_spanish_readings:
  - para restaurar
  - para inspeccionar
  rationale: El contexto no describe una mera revisión, sino la aplicación del dinero a trabajos concretos sobre la casa. 'Reparar' mantiene la tensión entre inspección y arreglo, pero hace explícita la acción requerida por el edificio.
  doctrine_reference: Uso contextual de בדק en pasajes de restauración del templo; no aplica una lectura puramente técnica de 'inspeccionar'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail en inglés. Se adoptó la forma singular 'en manos de' en vez de una pluralización, se conservó la repetición de 'casa de Yahvé', y se prefirió un español natural que refleje la doble cláusula con el mismo verbo נתן sin perder la progresión del verso.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' de manera uniforme para יְהוָה.
  - Se mantiene 'casa' en lugar de alternar con 'templo' para reproducir בית con consistencia.
  - '''Obreros'' traduce el participio colectivo de manera uniforme en ambas cláusulas.'
  - '''Reparar y fortalecer'' refleja el par verbal בדק / חזק sin añadir interpretaciones ajenas.'
