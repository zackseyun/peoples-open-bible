translation:
  language: es
  text: Acumula tu tesoro conforme a los mandamientos[a] del Altísimo, y te será más provechoso que el oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «según los mandamientos del Altísimo»; el plural se conserva aquí para reflejar ἐντολάς con mayor fidelidad formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: θὲς
  english_pob_choice: Store up
  chosen_spanish: Acumula
  alternatives_spanish:
  - Guarda
  - Atesora
  - Deposita
  lexicon: LSJ
  rationale: El imperativo aoristo de τίθημι aquí, unido a «tesoro», sugiere reunir y guardar con previsión. «Acumula» comunica esa idea en español natural sin perder la noción de depósito prudente.
- source_word: τὸν θησαυρόν σου
  english_pob_choice: your treasure
  chosen_spanish: tu tesoro
  alternatives_spanish:
  - tu riqueza
  - tu depósito
  - tu hacienda
  lexicon: LSJ
  rationale: θησαυρός puede ser tesoro, riqueza almacenada o depósito valioso. «Tesoro» preserva el campo semántico literal y la resonancia sapiencial del pasaje.
- source_word: κατʼ ἐντολὰς
  english_pob_choice: according to the commandments
  chosen_spanish: conforme a los mandamientos
  alternatives_spanish:
  - según los mandamientos
  - de acuerdo con los mandamientos
  - en conformidad con los mandamientos
  lexicon: LSJ
  rationale: La preposición con acusativo expresa norma o criterio. Se mantiene el plural «mandamientos» para reflejar ἐντολάς y no diluir la forma griega en un singular colectivo.
- source_word: Ὑψίστου
  english_pob_choice: the Most High
  chosen_spanish: del Altísimo
  alternatives_spanish:
  - del Dios Altísimo
  - del Supremo
  lexicon: LSJ
  rationale: «Altísimo» es el equivalente natural en español para el título divino Ὕψιστος. El artículo se integra de forma idiomática en «del Altísimo».
- source_word: λυσιτελήσει
  english_pob_choice: will profit
  chosen_spanish: te será más provechoso
  alternatives_spanish:
  - te aprovechará más
  - te beneficiará más
  - te reportará más
  lexicon: LSJ
  rationale: El verbo expresa utilidad, provecho o ventaja. «Te será más provechoso» conserva la idea económica y relacional sin sonar forzado en español bíblico moderno.
- source_word: μᾶλλον ἢ τὸ χρυσίον
  english_pob_choice: more than gold
  chosen_spanish: que el oro
  alternatives_spanish:
  - más que el oro
  - mejor que el oro
  lexicon: LSJ
  rationale: La comparación final contrapone el tesoro obediente con el oro. «Más provechoso que el oro» comunica el comparativo de utilidad sin introducir una valoración distinta a la del griego.
theological_decisions:
- issue: 'Alcance de la frase: obediencia general o aplicación específica a la limosna'
  english_pob_reading: 'Leave the wording broad: ''Store up your treasure according to the commandments of the Most High'''
  chosen_spanish_reading: 'Mantener el alcance amplio: «Acumula tu tesoro conforme a los mandamientos del Altísimo»'
  alternative_spanish_readings:
  - Da limosna y así acumula tesoro conforme al mandamiento del Altísimo
  - Atesora tu riqueza en actos de caridad según los mandamientos del Altísimo
  rationale: El contexto inmediato de Sirácida 29 trata sobre prestar y dar generosamente, pero este versículo no menciona explícitamente la limosna. Por fidelidad al griego y para no restringir el alcance más allá de lo dicho, se conserva una formulación amplia.
  doctrine_reference: Translation philosophy §1, §3
- issue: Pluralidad de ἐντολάς y su peso interpretativo
  english_pob_reading: The English audit trail revised the singular collective 'commandment' to the plural 'commandments'
  chosen_spanish_reading: Conservar el plural explícito «mandamientos»
  alternative_spanish_readings:
  - mandamiento
  - preceptos
  - instrucciones
  rationale: El plural griego es real y debe quedar visible en español. «Mandamientos» mantiene la pluralidad normativa sin introducir un matiz demasiado técnico o eclesiástico.
  doctrine_reference: Greek morphology; revision_awareness
translation_notes:
  revision_awareness: El texto español sigue la revisión auditada que corrigió el inglés de singular a plural en «commandments» para reflejar ἐντολάς. Además, se mantuvo el alcance amplio del versículo, sin insertar una mención explícita a la limosna que no está presente en el griego.
  spanish_consistency_notes:
  - Se usó «Altísimo» para Ὑψίστου conforme al término estándar del proyecto.
  - Se evitó «Señor» como sustituto del nombre/título divino, porque el griego aquí usa Ὕψιστος.
  - «Acumula» y «tesoro» mantienen el campo semántico de almacenamiento valioso sin mecanicismo.
  - La comparación final se expresó como provecho/utilidad para conservar λυσιτελήσει sin forzar una sola metáfora.
