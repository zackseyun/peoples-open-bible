  glossary_alignment: Buena alineación con la terminología del proyecto. Aunque la preferencia general para יהוה es «Yahvé», aquí el texto fuente usa יָהּ, y conservar «Yah» está bien justificado por la decisión léxica y teológica auditada. No hay conflictos con otros términos del glosario.
