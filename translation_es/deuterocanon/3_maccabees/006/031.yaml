review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro POB en los puntos principales: conserva «Hades», mantiene la imagen vívida de «poner el pie sobre» él, preserva la metáfora de beber y la inversión irónica del lugar destinado para ruina/sepulcro convertido en espacio de banquete. Sin embargo, algunas decisiones españolas no representan bien la fuerza léxica o resultan poco idiomáticas: «destino» debilita μόρου frente al inglés auditado «doom»; «banquete de salvación» pierde parte del matiz de κῶθωνα como celebración de bebida; y sobre todo «lechos de comida» no comunica bien κλισίας como lechos de banquete/comensales reclinados.'
  spanish_quality_summary: El texto es generalmente comprensible, pero suena algo calcado en varias zonas. «Habiendo preparado» es posible pero pesado; «para ellos para caída y sepulcro» es torpe; «lechos de comida» es poco natural en español e interfiere con la imagen. Una leve reestructuración mejora la fluidez sin alejarse del original.
  glossary_alignment: Buena alineación con la terminología del proyecto en «Hades» y en el mantenimiento de la imaginería fuente. No hay conflicto con términos teológicos mayores. La principal desalineación está en la decisión de traducir μόρου como «destino», que suaviza demasiado el valor de ruina/condena documentado por el audit trail.
  issues:
  - severity: medium
    issue: «destino» suaviza μόρου
    rationale: El audit trail revisado fijó «doom», no «fate». En contexto de casi muerte y contraste con rescate festivo, «condena» o «ruina» preserva mejor la fuerza negativa que «destino».
  - severity: medium
    issue: «banquete de salvación» atenúa el matiz de κῶθωνα
    rationale: κῶθων aquí apunta específicamente a una celebración de bebida/comensalidad. «Banquete festivo de salvación» o similar comunica mejor la escena y armoniza con la nota léxica.
  - severity: high
    issue: «repartieron como lechos de comida» es poco idiomático y opaco
    rationale: No transmite claramente κλισίας κατεμέρισαν. La idea es que dividieron el lugar en lechos de banquete o espacios para reclinarse en la comida. La formulación actual suena antinatural y puede confundir.
  - severity: low
    issue: «para ellos para caída y sepulcro» es una secuencia áspera
    rationale: Aunque formalmente cercana, en español conviene reordenar a «preparado para su caída y sepulcro» o equivalente, sin pérdida de sentido.
