translation:
  language: es
  text: Los herí con tizón y con añublo; sus muchos jardines y sus viñedos, sus higueras y sus olivos, los devoró la langosta[a]; pero no regresaron a mí, declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la langosta cortadora' (o 'la langosta roedora'); el hebreo nombra un insecto que devora las cosechas, tradicionalmente entendido como una especie de langosta.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִכֵּיתִי
  english_pob_choice: I struck
  chosen_spanish: os herí
  alternatives_spanish:
  - os golpeé
  - os di un golpe
  lexicon: HALOT
  rationale: El hebreo hifil de נכה expresa un acto divino de golpe/daño judicial. En español, 'herí' conserva la fuerza de castigo sufrido por el pueblo y suena más natural en este contexto profético que una transliteración demasiado literal de 'golpeé'.
- source_word: בַּשִּׁדָּפוֹן
  english_pob_choice: with blight
  chosen_spanish: con tizón
  alternatives_spanish:
  - con blight
  - con quemazón
  lexicon: HALOT
  rationale: שִׁדָּפוֹן designa un azote agrícola de secado/quemadura que arruina la cosecha. 'Tizón' comunica en español una plaga o daño vegetal reconocible y mantiene el campo semántico de juicio agrícola.
- source_word: וּבַיֵּרָקוֹן
  english_pob_choice: and mildew
  chosen_spanish: y con añublo
  alternatives_spanish:
  - y con mildiu
  - y con amarillez
  lexicon: HALOT
  rationale: יֵרָקוֹן apunta a una enfermedad o palidez amarillenta de las plantas. 'Añublo' es un término agrícola español capaz de cubrir esa plaga vegetal sin perder la idea de deterioro de la cosecha.
- source_word: הַרְבּוֹת
  english_pob_choice: your many
  chosen_spanish: vuestros muchos
  alternatives_spanish:
  - la multitud de vuestros
  - muchos de vuestros
  lexicon: HALOT
  rationale: La forma adverbial cuantifica la abundancia de los cultivos. 'Vuestros muchos' conserva la idea de multiplicidad tal como la reflejó la POB en inglés.
- source_word: גַּנּוֹתֵיכֶם
  english_pob_choice: gardens
  chosen_spanish: jardines
  alternatives_spanish:
  - huertos
  - huertas
  lexicon: HALOT
  rationale: גַּנָּה corresponde de manera directa a 'jardín'. 'Jardines' preserva el término más cercano y evita especificar indebidamente un tipo agrícola que el hebreo no obliga a fijar.
- source_word: כַרְמֵיכֶם
  english_pob_choice: vineyards
  chosen_spanish: viñedos
  alternatives_spanish:
  - viñas
  - viñas de ustedes
  lexicon: HALOT
  rationale: כֶּרֶם es 'viñedo'. 'Viñedos' es el equivalente natural y exacto en español, y mantiene el inventario agrícola del texto.
- source_word: תְאֵנֵיכֶם
  english_pob_choice: fig trees
  chosen_spanish: higuerales
  alternatives_spanish:
  - higueras
  - higueras de ustedes
  lexicon: HALOT
  rationale: La serie enumera plantaciones/cultivos más que frutos aislados. 'Higuerales' permite expresar colectivamente los árboles de higo con estilo natural en español bíblico moderno.
- source_word: זֵיתֵיכֶם
  english_pob_choice: olive trees
  chosen_spanish: olivares
  alternatives_spanish:
  - olivos
  - árboles de olivo
  lexicon: HALOT
  rationale: זַיִת puede referirse al olivo/árbol de olivo. En paralelo con 'higuerales', 'olivares' conserva el sentido de plantación y la estructura agrícola de la lista.
- source_word: יֹאכַל הַגָּזָם
  english_pob_choice: the locust devoured
  chosen_spanish: los devoró la langosta
  alternatives_spanish:
  - los comió la langosta
  - los devoró el insecto cortador
  lexicon: HALOT
  rationale: El hebreo presenta al insecto como sujeto devorador de los cultivos. 'La langosta' mantiene una traducción clara y tradicional del término, y 'los devoró' reproduce el sentido destructivo del verbo.
- source_word: שַׁבְתֶּם עָדַי
  english_pob_choice: you did not return to me
  chosen_spanish: no os volvisteis a mí
  alternatives_spanish:
  - no regresasteis a mí
  - no os arrepentisteis de volver a mí
  lexicon: HALOT
  rationale: שׁוּב con עַד expresa volver/cambiar de rumbo hacia Dios en un contexto de pacto. 'Volvisteis a mí' conserva la amplitud de retorno relacional sin cerrarlo sólo a una formulación doctrinal de 'arrepentimiento'.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' conforme a la norma del proyecto, y 'declara' mantiene la fuerza formulaica profética de נְאֻם.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. En español se adopta 'Yahvé' para preservar el nombre propio del pacto y evitar la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: contested terms — YHWH → Yahvé'
- issue: Sentido de שַׁבְתֶּם עָדַי
  english_pob_reading: you did not return to me
  chosen_spanish_reading: no os volvisteis a mí
  alternative_spanish_readings:
  - no os arrepentisteis de volver a mí
  - no regresasteis a mí
  rationale: La frase expresa una respuesta de retorno al Dios del pacto después del juicio. 'Volver' conserva la tensión entre retorno físico/relacional y arrepentimiento, sin reducir el alcance teológico del verbo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La traducción inglesa revisada reordenó la cláusula media para que los jardines, viñedos, higueras y olivos fueran objeto directo de 'devoured'. La versión española sigue ese orden del hebreo y mantiene el insecto como sujeto final de la acción destructiva. También conserva el cierre profético formal con el nombre divino explícito.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה de manera consistente con el proyecto.
  - Se evita 'SEÑOR' como sustitución del nombre divino.
  - 'Se mantiene una estructura agrícola concreta: jardines, viñedos, higuerales y olivares.'
  - '''Volverse a mí'' conserva la ambigüedad teológica de retorno/arrependimiento sin estrecharla.'
  - Los marcadores de nota se colocan solo donde el español puede abrir una alternativa lexical real.
