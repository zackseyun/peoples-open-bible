translation:
  language: es
  text: Cuando siegues la cosecha de tu tierra, no segarás por completo el borde[a] de tu campo, ni recogerás los rebuscos de tu cosecha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la esquina de tu campo». El término hebreo puede denotar borde, lado o esquina; aquí se refiere a la parte exterior del campo que debe dejarse sin segar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְקֻצְרְכֶם
  english_pob_choice: When you reap
  chosen_spanish: Cuando siegues
  alternatives_spanish:
  - Y cuando siegues
  - Al segar
  lexicon: HALOT
  rationale: El infinitivo con prefijo marca circunstancia temporal; en español, «cuando» + verbo conserva la relación legal sin sonar forzado. «Siegues» comunica el acto agrícola de manera natural y formal.
- source_word: קְצִיר
  english_pob_choice: the harvest
  chosen_spanish: la cosecha
  alternatives_spanish:
  - la siega
  - la recolección
  lexicon: HALOT
  rationale: Aquí el sustantivo alude al producto/acto de la recolección agrícola. «Cosecha» es la opción más clara y natural en español bíblico contemporáneo.
- source_word: אַרְצְכֶם
  english_pob_choice: of your land
  chosen_spanish: de tu tierra
  alternatives_spanish:
  - de vuestro país
  - de vuestra tierra
  lexicon: HALOT
  rationale: La referencia es agraria y posesiva, no política. El singular de segunda persona mantiene el paralelismo con el hebreo dirigido al israelita individual en la ley.
- source_word: לֹא תְכַלֶּה
  english_pob_choice: you shall not completely reap
  chosen_spanish: no segarás por completo
  alternatives_spanish:
  - no terminarás de segar
  - no segarás totalmente
  lexicon: HALOT
  rationale: El piel de כלה expresa completar o acabar. En español, «por completo» modifica bien el verbo y preserva la prohibición de agotar el borde del campo.
- source_word: פְּאַת שָׂדְךָ
  english_pob_choice: the edge of your field
  chosen_spanish: el borde de tu campo
  alternatives_spanish:
  - la esquina de tu campo
  - el extremo de tu campo
  lexicon: HALOT
  rationale: פאה puede significar borde, lado o esquina. «Borde» mantiene la imagen agrícola y evita estrechar indebidamente el sentido a una esquina geométrica.
- source_word: לִקְצֹר
  english_pob_choice: to reap
  chosen_spanish: segar
  alternatives_spanish:
  - cosechar
  lexicon: HALOT
  rationale: El infinitivo depende de la prohibición previa; en español se integra naturalmente en la construcción verbal «no segarás». «Segar» es preciso en un contexto de cereal y siega.
- source_word: לֶקֶט
  english_pob_choice: the gleanings
  chosen_spanish: las espigas caídas
  alternatives_spanish:
  - lo recogido del rastrojo
  - las espigas sueltas
  lexicon: HALOT
  rationale: לקט designa lo que queda esparcido y se recoge después de la siega. «Espigas caídas» expresa el referente agrícola con claridad, aunque el término técnico «espigueo» no funciona tan bien en un mandamiento directo.
- source_word: קְצִירְךָ
  english_pob_choice: of your harvest
  chosen_spanish: de tu cosecha
  alternatives_spanish:
  - de tu siega
  - de tu recolección
  lexicon: HALOT
  rationale: El constructo se vierte de forma posesiva y natural. «Cosecha» conserva la repetición semántica del versículo sin sonar arcaico.
- source_word: לֹא תְלַקֵּט
  english_pob_choice: you shall not gather
  chosen_spanish: ni recogerás
  alternatives_spanish:
  - ni espigarás
  - ni reunirás
  lexicon: HALOT
  rationale: לקט significa recoger o juntar lo restante. «Recogerás» es más transparente para el lector que un verbo técnico como «espigarás», aunque el contexto agrícola lo subraya.
translation_notes:
  revision_awareness: 'La redacción sigue el giro revisado del POB inglés: «completely» modifica el verbo y no se intensifica el sustantivo. Se mantuvo la equivalencia agraria directa sin añadir una paráfrasis explicativa innecesaria.'
  spanish_consistency_notes:
  - Se preserva el registro legal y agrícola del mandamiento.
  - Se usa «tierra» y «campo» de modo coherente con el contexto agrario inmediato.
  - No se introduce «SEÑOR» ni otros sustitutos donde el hebreo no contiene el nombre divino en este versículo.
