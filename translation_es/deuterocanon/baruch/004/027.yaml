translation:
  language: es
  text: Cobren ánimo[a], hijos, y clamen a Dios, porque serán recordados por aquel que trajo esto sobre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «porque habrá memoria de ustedes por aquel que trajo esto sobre ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Θαρρήσατε
  english_pob_choice: Take courage
  chosen_spanish: Tengan ánimo
  alternatives_spanish:
  - Tengan valor
  - Cobren ánimo
  - Tengan coraje
  lexicon: LSJ
  rationale: El imperativo aoristo plural exhorta a tomar valor/coraje. «Tengan ánimo» es natural, digno y mantiene la fuerza exhortativa sin sonar arcaico; además evita un falso calco de «courage» que en español puede resultar más rígido.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - criaturas
  - niños
  lexicon: LSJ
  rationale: El vocativo plural expresa una dirección afectuosa al pueblo. «Hijos» funciona en español bíblico como vocativo inclusivo y cercano, sin restringir el sentido a varones.
- source_word: βοήσατε
  english_pob_choice: cry out
  chosen_spanish: clamen
  alternatives_spanish:
  - griten
  - den un grito
  - clamen a
  lexicon: LSJ
  rationale: El verbo pide un clamor fuerte y súplica dirigida a Dios. «Clamen» conserva el tono de voz intensa y oración, mejor que un simple «llamen».
- source_word: πρὸς τὸν θεόν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - hacia Dios
  - ante Dios
  lexicon: LSJ
  rationale: 'La preposición con verbo de clamor se vierte naturalmente con complemento de dirección: «a Dios». Mantiene la relación verbal sin añadir matices no presentes.'
- source_word: ἔσται ... μνεία
  english_pob_choice: you will be remembered
  chosen_spanish: ustedes serán recordados
  alternatives_spanish:
  - habrá memoria de ustedes
  - se hará memoria de ustedes
  - serán tenidos en memoria
  lexicon: LSJ
  rationale: La construcción literalmente expresa «habrá memoria». En español, la pasiva «serán recordados» transmite de forma clara la promesa futura sin perder la idea de memoria conservada.
- source_word: ὑπὸ τοῦ ἐπάγοντος
  english_pob_choice: by the one who brought this upon you
  chosen_spanish: por el que trajo esto sobre ustedes
  alternatives_spanish:
  - por el que lo trajo sobre ustedes
  - por el que les hizo venir esto
  - por quien trajo la calamidad sobre ustedes
  lexicon: LSJ
  rationale: El participio sustantivado designa al agente que «trae sobre» alguien algo ya conocido por el contexto. «Trajo esto sobre ustedes» preserva la referencia implícita sin especificarla más allá de lo que el griego permite.
theological_decisions:
- issue: Identidad del agente que «trajo esto»
  english_pob_reading: An implicit reference to God as the one who brought the judgment/calamity upon the people and who will also remember them.
  chosen_spanish_reading: Se mantiene la referencia indirecta al agente como «el que trajo esto sobre ustedes», dejando implícito que el contexto identifica a Dios.
  alternative_spanish_readings:
  - el que trajo la calamidad sobre ustedes
  - Dios, que trajo esto sobre ustedes
  rationale: El griego no repite el nombre de Dios en la cláusula final; la ambigüedad es intencional y debe conservarse. La formulación española permite leer el juicio/calamidad desde el contexto sin resolverlo de manera prematura.
  doctrine_reference: Preservar la tensión teológica del texto y la primacía del original sobre una explicitación interpretativa.
translation_notes:
  revision_awareness: Concordance alta con la versión inglesa POB y con el griego de Swete. No se registran revisiones posteriores; se conservó la equivalencia óptima ya establecida en el audit trail.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός, conforme al estándar del proyecto.
  - Se evitó «Señor» porque no aparece en este versículo y el texto griego nombra explícitamente a θεός.
  - «Hijos» se usa como vocativo inclusivo y eclesial, coherente con el trato colectivo del pasaje.
  - La nota al pie preserva la alternativa literal de μνεία/ἐπάγοντος sin introducir una glosa doctrinal adicional.
