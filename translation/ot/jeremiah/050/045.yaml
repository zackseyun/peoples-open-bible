theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: Follows the project's stated default for the Tetragrammaton and aligns with the reverential convention reflected in the doctrine excerpt.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Metaphorical force of 'the little ones of the flock'
  chosen_reading: Preserve the metaphor in the main text rather than interpret it explicitly as weak invaders or least warriors.
  alternative_readings:
  - the least of the flock
  - the weakest attackers
  rationale: The Hebrew image is vivid and intelligible enough to retain. Interpreting the metaphor directly in the main text would move beyond optimal equivalence.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source-text sense without paraphrase beyond what the text warrants'
