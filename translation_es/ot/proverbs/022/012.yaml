  glossary_alignment: Se alinea correctamente con la pauta del proyecto al usar «Yahvé» para יְהוָה. «Conocimiento» para דעת es adecuado. «Traicionero» es aceptable para בוגד, con «infiel» como alternativa en nota. No hay conflicto doctrinal significativo.
