translation:
  language: es
  text: y el vino alegra el corazón del hombre[a], haciendo que el rostro resplandezca más que el aceite[b], y el pan sustenta el corazón del hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el corazón humano» / «el corazón de una persona». El hebreo «hombre» aquí funciona como singular representativo de la humanidad.
    reason: lexical_alternative
  - marker: b
    text: O «haciendo que el rostro resplandezca con aceite». La preposición hebrea puede leerse comparativamente («más que el aceite») o como medio/origen («con/de aceite»).
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/יַיִן
  english_pob_choice: and wine
  chosen_spanish: y el vino
  alternatives_spanish:
  - y vino
  lexicon: HALOT
  rationale: יַיִן nombra vino de manera directa; en español, el artículo definido en una enumeración poética suena natural y mantiene la referencia genérica del sustantivo.
- source_word: יְשַׂמַּח
  english_pob_choice: gladdens
  chosen_spanish: alegra
  alternatives_spanish:
  - regocija
  - da alegría
  lexicon: HALOT
  rationale: El piel de שׂמח expresa causar alegría. «Alegra» conserva esa fuerza causativa con un español claro y digno.
- source_word: לְבַב אֱנוֹשׁ
  english_pob_choice: the heart of man
  chosen_spanish: el corazón del hombre
  alternatives_spanish:
  - el corazón humano
  - el corazón de una persona
  lexicon: HALOT
  rationale: לְבַב se refiere al centro interior, el corazón. אֱנוֹשׁ funciona aquí como singular representativo de la humanidad; se conserva «hombre» en el texto principal por fidelidad al valor genérico masculino del hebreo, dejando la ampliación inclusiva para nota.
- source_word: לְ/הַצְהִיל
  english_pob_choice: making ... shine
  chosen_spanish: haciendo que ... resplandezca
  alternatives_spanish:
  - para hacer que ... resplandezca
  - iluminando ...
  lexicon: HALOT
  rationale: El infinitivo hifil de esta raíz expresa producir brillo o resplandor. «Haciendo que resplandezca» comunica bien el resultado poético sin forzar una paráfrasis.
- source_word: פָּנִים
  english_pob_choice: the face
  chosen_spanish: el rostro
  alternatives_spanish:
  - la cara
  - el semblante
  lexicon: HALOT
  rationale: Aunque la forma hebrea es plural, aquí funciona como referencia singular genérica a la apariencia del hombre. «Rostro» es natural en español bíblico contemporáneo y conserva un tono elevado.
- source_word: מִ/שָּׁמֶן
  english_pob_choice: more than oil
  chosen_spanish: más que el aceite
  alternatives_spanish:
  - desde el aceite
  - con aceite
  lexicon: HALOT
  rationale: La preposición מִן admite lectura comparativa. En este contexto poético, la comparación «más que el aceite» es la lectura más fluida y coherente con el paralelismo.
- source_word: וְ/לֶחֶם
  english_pob_choice: and bread
  chosen_spanish: y el pan
  alternatives_spanish:
  - y el alimento
  lexicon: HALOT
  rationale: לֶחֶם significa literalmente pan y suele designar el alimento básico. Se mantiene «pan» por ser la forma más cercana al hebreo y suficientemente clara en español.
- source_word: יִסְעָד
  english_pob_choice: sustains
  chosen_spanish: sustenta
  alternatives_spanish:
  - sostiene
  - apoya
  lexicon: HALOT
  rationale: סעד expresa sostener, apoyar, sustentar. «Sustenta» preserva el sentido nutritivo y de apoyo interno del verbo en el paralelismo con el corazón.
theological_decisions:
- issue: Uso representativo de אֱנוֹשׁ
  english_pob_reading: man as a representative singular for humanity
  chosen_spanish_reading: el hombre como singular representativo de la humanidad
  alternative_spanish_readings:
  - la persona
  - el ser humano
  - la humanidad
  rationale: Se conserva el masculino genérico del hebreo en el texto principal por fidelidad formal, pero la nota aclara que no se trata de un varón particular sino de la humanidad en general.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Lectura comparativa de מִן antes de שָּׁמֶן
  english_pob_reading: more than oil rather than from/with oil
  chosen_spanish_reading: más que el aceite
  alternative_spanish_readings:
  - con aceite
  - desde el aceite
  rationale: 'La poesía del verso favorece la comparación: el vino hace que el rostro brille más que el aceite. Se conserva la tensión con la posible lectura instrumental en la nota, sin resolverla de manera dogmática.'
  doctrine_reference: POB lexical audit trail for Psalm 104:15
translation_notes:
  revision_awareness: Se revisó el pasaje con base en el texto hebreo WLC y el rastro auditado en inglés. No se adoptaron cambios que suavicen la comparación de מִן ni la fuerza representativa de אֱנוֹשׁ; ambas tensiones se preservan en el texto y las notas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» en otros registros del proyecto según la terminología base, pero este verso no contiene el nombre divino.
  - «Rostro» se eligió por naturalidad y tono; no altera el referente de פָּנִים.
  - Las notas usan un español sobrio y accesible, sin depender de formulaciones eclesiásticas tradicionales que no estén justificadas por el hebreo.
