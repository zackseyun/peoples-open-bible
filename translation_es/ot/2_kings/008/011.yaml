    text: 'O: «hasta que Hazael se avergonzó». El hebreo deja menos explícito de lo que el español normalmente requiere quién es el sujeto de «se avergonzó».'
    reason: alternative_reading
  revision_rationale: Se mantiene la fidelidad al hebreo y al historial POB, pero se mejora la naturalidad narrativa del español con una cláusula finita. La ambigüedad del sujeto de la vergüenza permanece en el texto principal, y la nota ahora refleja con mayor precisión la alternativa interpretativa documentada en inglés.
