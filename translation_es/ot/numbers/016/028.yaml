translation:
  language: es
  text: 'Moisés dijo: «Por esto sabrán que Yahvé me ha enviado para hacer todas estas obras[a], porque no vino de mi propio corazón[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «actos» o «cosas»; el hebreo se refiere a acciones o hechos realizados.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «no de mi corazón», un modismo que significa que no fue por mi propia iniciativa o autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר מֹשֶׁה
  english_pob_choice: And Moses said
  chosen_spanish: Moisés dijo
  alternatives_spanish:
  - Entonces Moisés dijo
  - Y Moisés dijo
  lexicon: HALOT
  rationale: En español, la narración directa queda más natural con un simple «dijo»; el valor secuencial del wayyiqtol ya está implícito sin necesidad de repetir una conjunción inicial.
- source_word: בְּזֹאת
  english_pob_choice: By this
  chosen_spanish: Por esto
  alternatives_spanish:
  - Con esto
  - En esto
  lexicon: HALOT
  rationale: La preposición instrumental se expresa bien en español con «por esto» cuando introduce la señal o evidencia que hará conocer la legitimidad del envío.
- source_word: תֵּדְעוּן
  english_pob_choice: you will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - llegarán a saber
  lexicon: HALOT
  rationale: El futuro plural mantiene el sentido evidencial del hebreo y su referencia a los destinatarios del discurso.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el término POB para el nombre divino, preservando el Tetragrámaton en forma transliterada en lugar de sustituirlo por un título.
- source_word: שְׁלָחַנִי
  english_pob_choice: has sent me
  chosen_spanish: me ha enviado
  alternatives_spanish:
  - me envió
  - me envía
  lexicon: HALOT
  rationale: El pretérito perfecto compuesto expresa en español la vigencia presente del envío ya cumplido, con un matiz equivalente al inglés auditado.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para realizar
  - para llevar a cabo
  lexicon: HALOT
  rationale: «Hacer» es la correspondencia más directa y sobria del infinitivo amplio עשה, sin añadir intensidad interpretativa.
- source_word: כָּל הַמַּעֲשִׂים הָאֵלֶּה
  english_pob_choice: all these deeds
  chosen_spanish: todas estas obras
  alternatives_spanish:
  - todos estos hechos
  - todas estas acciones
  lexicon: HALOT
  rationale: «Obras» conserva la idea concreta de actos realizados y funciona bien en español bíblico sin reducir el campo semántico a «cosas».
- source_word: כִּי לֹא מִלִּבִּי
  english_pob_choice: for it was not from my own heart
  chosen_spanish: porque no salió de mi corazón
  alternatives_spanish:
  - porque no fue por mi propia iniciativa
  - porque no partió de mí
  lexicon: HALOT
  rationale: Se mantiene el modismo hebreo «corazón» para no diluir la imagen semítica; «salió de» comunica en español la idea de origen o iniciativa no autónoma.
theological_decisions:
- issue: Función de יְהוָה en el discurso de Moisés
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: El texto hebreo nombra directamente a Yahvé; se evita la sustitución litúrgica por un título para respetar la política terminológica del proyecto y la transparencia textual.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de מִלִּבִּי
  english_pob_reading: not from my own heart (not on my own initiative or authority)
  chosen_spanish_reading: no salió de mi corazón
  alternative_spanish_readings:
  - no fue por mi propia iniciativa
  - no vino de mí
  rationale: El hebreo emplea un modismo del ‘corazón’ para negar autoría u origen personal. La traducción conserva la imagen y deja abierto el alcance de iniciativa/autoridad, como en el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: idiom preservation and source transparency'
translation_notes:
  revision_awareness: La versión inglesa auditada fue ajustada para reflejar más directamente el כי final como «for» en lugar de una coordinación explicativa más débil. La presente redacción española sigue ese mismo movimiento causal con «porque», manteniendo el enlace lógico sin sobretraducir el hebreo.
  spanish_consistency_notes:
  - Se mantiene Yahvé de acuerdo con la terminología base del proyecto.
  - Se conserva el modismo de ‘corazón’ para no perder la textura semítica del original.
  - El registro es bíblico moderno, no arcaizante, y evita depender de ‘SEÑOR’ como enmascaramiento del Nombre divino.
