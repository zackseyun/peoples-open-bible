translation:
  language: es
  text: ¿Por qué se ha vuelto perpetuo mi dolor, y mi herida incurable, que rehúsa ser sanada? ¿Acaso me serás tú como un arroyo engañoso[a], como aguas en que no se puede confiar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como un arroyo que falla»; la imagen hebrea es la de un cauce que promete agua, pero resulta poco fiable.
    reason: lexical_alternative
lexical_decisions:
- source_word: כְאֵבִי
  english_pob_choice: my pain
  chosen_spanish: mi dolor
  alternatives_spanish:
  - mi dolor
  - mi pena
  - mi sufrimiento
  lexicon: HALOT
  rationale: כאב expresa dolor físico o aflicción; en español, «dolor» es la correspondencia más natural y amplia para este lamento de Jeremías.
- source_word: נֶצַח
  english_pob_choice: perpetual
  chosen_spanish: perpetuo
  alternatives_spanish:
  - para siempre
  - duradero
  - sin fin
  lexicon: HALOT
  rationale: Aquí נצח señala duración continua, no necesariamente eternidad abstracta. «Perpetuo» conserva el sentido de continuidad insistente sin volverlo más fuerte de lo que el hebreo exige.
- source_word: מַכָּתִי
  english_pob_choice: my wound
  chosen_spanish: mi herida
  alternatives_spanish:
  - mi llaga
  - mi lesión
  - mi golpe
  lexicon: HALOT
  rationale: מכה puede significar golpe o herida; con el lenguaje de curación inmediato, «herida» comunica mejor la imagen médica del pasaje.
- source_word: אֲנוּשָׁה
  english_pob_choice: incurable
  chosen_spanish: incurable
  alternatives_spanish:
  - grave
  - desesperada
  - sin remedio
  lexicon: HALOT
  rationale: El adjetivo comunica algo severo o fuera de remedio. «Incurable» refleja bien la relación con la frase siguiente sobre la negativa a ser sanada.
- source_word: מֵאֲנָה הֵרָפֵא
  english_pob_choice: refusing to be healed
  chosen_spanish: que rehúsa ser sanada
  alternatives_spanish:
  - que se niega a sanar
  - que rehúsa ser curada
  - que no quiere ser sanada
  lexicon: HALOT
  rationale: El hebreo personifica la herida como si rechazara el tratamiento. «Rehúsa ser sanada» preserva esa personificación con español claro y solemne.
- source_word: הָיוֹ תִהְיֶה לִי
  english_pob_choice: Will you indeed be to me
  chosen_spanish: ¿Acaso me serás tú
  alternatives_spanish:
  - ¿Serás tú realmente para mí
  - ¿Llegarás a ser para mí
  - ¿Me serás en verdad
  lexicon: HALOT
  rationale: La serie verbal introduce una pregunta retórica intensa dirigida a Dios. «¿Acaso me serás tú?» conserva el golpe interrogativo y el orden relacional del hebreo sin suavizar la queja.
- source_word: אַכְזָב
  english_pob_choice: deceptive brook
  chosen_spanish: arroyo engañoso
  alternatives_spanish:
  - arroyo decepcionante
  - arroyo falaz
  - arroyo mentiroso
  lexicon: HALOT
  rationale: אַכזב nombra un curso de agua que promete y falla. «Arroyo engañoso» expresa la idea de decepción y falta de fiabilidad con un giro natural en español.
- source_word: מַיִם לֹא נֶאֱמָנוּ
  english_pob_choice: waters that are not reliable
  chosen_spanish: aguas que no son seguras
  alternatives_spanish:
  - aguas en que no se puede confiar
  - aguas no fiables
  - aguas que no son confiables
  lexicon: HALOT
  rationale: נאמנו comunica fiabilidad, fidelidad o constancia. «No son seguras» transmite la idea de agua en la que no se puede confiar, manteniendo el vínculo con el símil del arroyo fallido.
theological_decisions:
- issue: Lamento directo dirigido a Dios con lenguaje de queja acusatoria
  english_pob_reading: The verse is rendered as Jeremiah's direct, accusatory rhetorical question to God without softening the force.
  chosen_spanish_reading: El versículo conserva la pregunta retórica directa e incisiva dirigida a Yahvé, sin atenuar el tono de lamento.
  alternative_spanish_readings:
  - Una formulación más suave que reduzca la apariencia de acusación
  - Una paráfrasis devocional que explique la queja en vez de reproducirla
  rationale: El hebreo presenta una queja fuerte y relacional. La traducción debe preservar esa tensión teológica en vez de resolverla o amortiguarla.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: no se registran cambios aplicados y el pasaje muestra alto acuerdo con la auditoría inglesa; por eso la redacción mantiene de cerca el sentido y la imagen del original hebreo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según el criterio editorial del proyecto para el nombre divino.
  - Se mantiene «perpetuo» y «aguas que no son seguras» para conservar la duración continua y la noción de fiabilidad del hebreo.
  - La pregunta retórica se conserva sin suavizar el reclamo, siguiendo la lectura inglesa auditada.
  - «Arroyo engañoso» traduce el valor metafórico de אַכְזָב sin introducir un término más técnico que oscurezca el español.
