translation:
  language: es
  text: Mi cuerpo no estuvo oculto para ti cuando fui hecho en secreto, tejido en las profundidades de la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en las partes más bajas de la tierra». La expresión hebrea es una metáfora poética de la formación oculta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא נִכְחַד
  english_pob_choice: was not hidden
  chosen_spanish: no estuvo oculta
  alternatives_spanish:
  - no fue escondida
  - no quedó oculta
  lexicon: HALOT
  rationale: En español, para un sustantivo como "mi estructura", la pasiva natural es "no estuvo oculta"; conserva la idea de que no permaneció fuera de la vista o el conocimiento de Yahvé sin introducir una noción distinta.
- source_word: עָצְמִי
  english_pob_choice: my frame
  chosen_spanish: mi estructura
  alternatives_spanish:
  - mis huesos
  - mi cuerpo
  - mi armazón
  lexicon: HALOT
  rationale: El hebreo apunta a la constitución corporal del salmista. "Mi estructura" comunica esa formación corporal de manera amplia y digna, sin restringirla a "huesos" ni sonar demasiado técnica como "armazón".
- source_word: מִמֶּךָּ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - ante ti
  - para ti
  lexicon: HALOT
  rationale: La relación es de ocultamiento respecto de Yahvé; en español, "de ti" conserva la construcción directa de estar oculto a alguien.
- source_word: אֲשֶׁר
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - en el momento en que
  - mientras
  lexicon: HALOT
  rationale: Aquí introduce la circunstancia temporal de la formación oculta; "cuando" expresa bien el valor temporal sin forzar la sintaxis española.
- source_word: עֻשֵּׂיתִי
  english_pob_choice: I was made
  chosen_spanish: fui hecho
  alternatives_spanish:
  - fui formado
  - fui creado
  lexicon: HALOT
  rationale: El pasivo de עשה es amplio y no exige "formado" en esta primera cláusula. "Fui hecho" reproduce la pasividad de la acción divina con sobriedad, dejando que la segunda imagen, "tejido", aporte la vividez poética.
- source_word: בַסֵּתֶר
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - en oculto
  - en el secreto
  lexicon: HALOT
  rationale: '"En secreto" es la equivalencia idiomática más clara y fiel para la idea de ocultamiento.'
- source_word: רֻקַּמְתִּי
  english_pob_choice: I was woven
  chosen_spanish: tejido
  alternatives_spanish:
  - bordado
  - entrelazado
  - entretejido
  lexicon: HALOT
  rationale: El verbo evoca labor textil/intrincada. En español, el participio/adjetivo "tejido" suena natural y preserva la metáfora sin sobrecargar con "bordado", que sugiere un matiz más específico.
- source_word: בְּתַחְתִּיּוֹת אָרֶץ
  english_pob_choice: in the depths of the earth
  chosen_spanish: en las profundidades de la tierra
  alternatives_spanish:
  - en las partes más bajas de la tierra
  - en lo profundo de la tierra
  lexicon: HALOT
  rationale: '"Profundidades de la tierra" mantiene el paralelismo poético y la imagen metafórica de ocultamiento. Es más natural en español contemporáneo que "las partes más bajas de la tierra", aunque esa alternativa sigue siendo posible.'
theological_decisions:
- issue: Sentido metafórico de 'las profundidades de la tierra'
  english_pob_reading: Metaphorical language for the hiddenness and mystery of prenatal formation in the womb
  chosen_spanish_reading: Lenguaje metafórico para la ocultación y el misterio de la formación prenatal
  alternative_spanish_readings:
  - referencia más literal al subsuelo o a regiones subterráneas
  - alusión cosmológica
  rationale: En el poema, la imagen paralela a "en secreto" funciona retóricamente para subrayar que Yahvé conoce plenamente la formación humana antes de nacer. La traducción conserva la metáfora sin resolverla en una cosmología literal.
  doctrine_reference: Preservar la tensión poética del texto original; prioridad del hebreo sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'La redacción sigue la última lectura inglesa estable: mantiene la secuencia poética ''made in secret'' / ''woven in the depths of the earth'' y refleja la revisión que evitó repetir una idea temporal innecesaria en la segunda cola. Se ha optado por una equivalencia española que conserva el paralelismo sin añadir elementos no presentes en el hebreo.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el estándar del proyecto para el nombre divino cuando el contexto hebreo alude al nombre personal.
  - '''Tejido'' preserva la metáfora textil de רקם sin desplazarla a un término más interpretativo.'
  - La nota de pie conserva la alternativa lexical relevante en español para la expresión final.
