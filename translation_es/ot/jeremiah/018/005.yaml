    rationale: La razón es alternative_reading, pero la nota actual dice «O “Yahvé” para el nombre divino יְהוָה», cuando el texto principal ya tiene «Yahvé». Debe señalar la alternativa tradicional «el SEÑOR» si se conserva esa nota.
