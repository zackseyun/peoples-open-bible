translation:
  language: es
  text: Él escogió para sí la primera parte[a], porque allí estaba reservada la porción del legislador; vino con los jefes del pueblo; hizo la justicia de Yahvé[b], y sus juicios con Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la porción del dador de la ley estaba reservada». El término hebreo puede significar «gobernante» o «legislador», y algunos lo toman como referencia a Moisés.
    reason: alternative_reading
  - marker: b
    text: O «la rectitud de Yahvé» o «los actos justos de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - vio
  - eligió
  lexicon: HALOT
  rationale: El hebreo dice literalmente «vio», pero en este contexto poético la idea es la de tomar o escoger una porción para sí. «Escogió» comunica ese valor idiomático sin perder el vínculo con la imagen original.
- source_word: רֵאשִׁית
  english_pob_choice: the first part
  chosen_spanish: la primera parte
  alternatives_spanish:
  - la porción primera
  - las primicias
  - el comienzo
  lexicon: HALOT
  rationale: Aquí no se trata de un inicio temporal, sino de una porción primera o destacada. «La primera parte» sigue de cerca el sentido territorial y mantiene la ambigüedad poética del hebreo.
- source_word: חֶלְקַת
  english_pob_choice: the portion
  chosen_spanish: la porción
  alternatives_spanish:
  - la parte
  - la heredad
  - el reparto
  lexicon: HALOT
  rationale: El término apunta a una porción asignada. «Porción» es natural en español y conserva el matiz de reparto heredado o concedido.
- source_word: מְחֹקֵק
  english_pob_choice: the lawgiver
  chosen_spanish: el legislador
  alternatives_spanish:
  - el dador de la ley
  - el gobernante
  - el caudillo
  lexicon: HALOT
  rationale: La palabra puede significar «legislador» o «gobernante». Se eligió «legislador» porque refleja mejor el matiz tradicional del término y mantiene la tensión interpretativa sin identificar de manera explícita a una persona específica.
- source_word: סָפוּן
  english_pob_choice: was reserved
  chosen_spanish: estaba reservada
  alternatives_spanish:
  - estaba guardada
  - estaba escondida
  - estaba almacenada
  lexicon: HALOT
  rationale: La forma pasiva sugiere algo puesto aparte o conservado. «Estaba reservada» expresa bien esa idea en español y funciona con el sustantivo «porción».
- source_word: וַיֵּתֵא
  english_pob_choice: He came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - salió
  - marchó
  lexicon: HALOT
  rationale: El verbo indica movimiento; «vino» es breve y natural en español, y encaja con la secuencia poética «con los jefes del pueblo».
- source_word: רָאשֵׁי עָם
  english_pob_choice: the heads of the people
  chosen_spanish: los jefes del pueblo
  alternatives_spanish:
  - los líderes del pueblo
  - los cabezas del pueblo
  - los principales del pueblo
  lexicon: HALOT
  rationale: La expresión es literalmente «cabezas del pueblo». «Jefes» comunica el sentido de liderazgo con naturalidad en español y preserva el tono formal.
- source_word: צִדְקַת יְהוָה
  english_pob_choice: the righteousness of Yahweh
  chosen_spanish: la justicia de Yahvé
  alternatives_spanish:
  - la rectitud de Yahvé
  - la justicia de Yahvé
  - las obras justas de Yahvé
  lexicon: HALOT
  rationale: El sustantivo puede referirse a justicia, rectitud o actos justos. Se mantiene «justicia» para conservar la fuerza legal y de pacto del hebreo, y se usa «Yahvé» según el criterio editorial del proyecto.
- source_word: וּמִשְׁפָּטָיו
  english_pob_choice: his judgments
  chosen_spanish: sus juicios
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  - sus decisiones judiciales
  lexicon: HALOT
  rationale: El plural con sufijo señala juicios o decisiones normativas. «Juicios» es la correspondencia más directa y solemne en español.
- source_word: עִם יִשְׂרָאֵל
  english_pob_choice: with Israel
  chosen_spanish: con Israel
  alternatives_spanish:
  - para Israel
  - junto con Israel
  lexicon: HALOT
  rationale: La preposición básica es «con». Se conserva la relación de acompañamiento o asociación sin forzar una interpretación más específica.
theological_decisions:
- issue: Sentido de מְחֹקֵק en la expresión «חלקת מחקק ספון»
  english_pob_reading: The English POB preserves the tension between 'lawgiver' and possible alternative senses, without fixing the referent too narrowly.
  chosen_spanish_reading: «la porción del legislador»
  alternative_spanish_readings:
  - «la porción del gobernante»
  - «la porción del dador de la ley»
  - «la porción de Moisés»
  rationale: Se mantiene la ambigüedad documentada. «Legislador» reproduce el valor tradicional del término y no introduce una identificación que el texto hebreo no exige de manera explícita.
  doctrine_reference: Preservar la tensión interpretativa documentada.
- issue: Relación entre «justicia» y «juicios» en la segunda cola del verso
  english_pob_reading: He carried out the righteousness of Yahweh, and his judgments with Israel.
  chosen_spanish_reading: «hizo la justicia de Yahvé, y sus juicios con Israel»
  alternative_spanish_readings:
  - «hizo la rectitud de Yahvé, y sus juicios con Israel»
  - «hizo las obras justas de Yahvé, y sus juicios con Israel»
  rationale: Se conserva la estructura paralela y la carga forense/covenantal del hebreo. «Justicia» y «juicios» mantienen la distinción entre la cualidad/acción justa de Yahvé y sus decisiones normativas.
  doctrine_reference: Mantener la fuerza del lenguaje de pacto y justicia divina.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última revisión inglesa que pasó de «best land/ruler» a «first part/lawgiver», pero ajusta el español al hebreo y al marco editorial de POB: conserva la ambigüedad de מְחֹקֵק, usa «Yahvé» donde el inglés dice «LORD», y mantiene la estructura poética y forense del verso sin sobreexplicar el referente.'
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יְהוָה, conforme al criterio del proyecto.
  - Se prefirió «legislador» sobre «siervo», «guía» o «caudillo» para מְחֹקֵק, por mayor correspondencia con el audit trail y porque mantiene la tensión semántica.
  - «Sus juicios» conserva el plural hebreo y evita suavizar el carácter normativo del término.
  - Las notas a y b se anclan en el texto porque corresponden a alternativas reales documentadas en el POB inglés.
