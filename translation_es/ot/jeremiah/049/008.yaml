review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia imperativa hebrea y conserva correctamente «Esaú» con nota metonímica para Edom. «Huyan», «vuélvanse» y «habiten en lo profundo» representan adecuadamente נֻסוּ, הָפְנוּ y הֶעְמִיקוּ לָשֶׁבֶת, incluyendo la imagen de retirarse a lugares remotos. También mantiene el perfecto profético con «he traído». Sin embargo, la cláusula final עֵת פְּקַדְתִּיו se ha nominalizado como «el tiempo de su castigo», lo que borra el sujeto divino explícito «cuando yo lo castigo / de mi visitación sobre él». Además, la nota [c] introduce una alternativa no respaldada por el rastro inglés auditado, ya que עָלָיו aquí se entiende simplemente como «sobre él», no como una ambigüedad significativa «contra él».
  spanish_quality_summary: El español es claro, natural y de registro bíblico moderno. «Habiten en lo profundo» suena un poco rígido pero sigue siendo comprensible y fiel a la imagen. La principal mejora necesaria es hacer más directa y transparente la cláusula final, para que el lector perciba la acción divina explícita. También conviene eliminar una nota innecesaria que crea una ambigüedad artificial.
  glossary_alignment: No hay conflictos con la terminología de proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La conservación de «Esaú» en vez de «Edom» concuerda con la decisión lexical documentada, con nota explicativa adecuada.
  issues:
  - severity: medium
    issue: La frase «el tiempo de su castigo» omite el sujeto divino de עֵת פְּקַדְתִּיו.
    rationale: El hebreo y el POB inglés expresan explícitamente «el tiempo cuando yo lo castigo» / «the time when I punish him». La nominalización española reduce esa claridad judicial y elimina un matiz importante del original.
  - severity: medium
    issue: La nota [c] («O “contra él”») no corresponde a una alternativa preservada en el rastro auditado y añade ambigüedad innecesaria.
    rationale: El POB inglés conserva como alternativa para la cláusula final «the time of my visitation upon him», no para עָלָיו por separado. En español, «sobre él» funciona bien sin nota.
  revised_spanish_text: Huyan[a], vuélvanse, habiten en lo profundo, habitantes de Dedán, porque he traído sobre él la calamidad de Esaú[b], el tiempo en que lo castigo[c].
  revised_footnotes:
