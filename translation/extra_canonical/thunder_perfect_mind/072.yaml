- source_word: ⲛ̄ⲙⲙⲁⲉⲓ
  chosen: with me
  alternatives:
  - in my company
  - alongside me
  lexicon: Coptic preposition ⲛ̄ⲙⲙⲁ + first-person suffix
  rationale: Standard idiom for accompaniment; simple and clear.
- source_word: ⲛⲓϩⲓⲟⲙⲉ
  chosen: the wise
  alternatives:
  - the sages
  - the learned
  lexicon: Coptic ϩⲓⲟⲙ (wise)
  rationale: Conventional plural “wise” preserves gnomic tone.
- source_word: ⲛ̄ϩⲏⲧ
  chosen: within
  alternatives:
  - in the heart
  - inwardly
  lexicon: Coptic ϩⲏⲧ (heart, interior)
  rationale: General “within” keeps inclusivity; “in the heart” is more concrete but
