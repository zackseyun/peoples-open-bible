translation:
  language: es
  text: Yahvé envió contra él bandas[a] de los caldeos, bandas de Aram[b], bandas de Moab y bandas de los amonitas; los envió contra Judá para destruirlo[c], conforme a la palabra de Yahvé que había hablado por medio de sus siervos los profetas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «bandas de incursión» para «bandas».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Aram»; tradicionalmente «Siria».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «para destruirlo a él», refiriéndose a Joacim y no a Judá.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְשַׁלַּח
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: HALOT
  rationale: En español, «envió» expresa con naturalidad la acción causativa de שלח en narrativa histórica y mantiene la idea de iniciativa divina sin añadir matices ajenos.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, conservando la referencia explícita al tetragrámaton sin máscara litúrgica.
- source_word: גְּדוּדֵי
  english_pob_choice: bands
  chosen_spanish: bandas
  alternatives_spanish:
  - tropas
  - partidas de incursión
  lexicon: HALOT
  rationale: «Bandas» reproduce bien el valor de grupos militares menores o de incursión y conserva la repetición enfática del hebreo. «Tropas» sería más general y menos preciso aquí.
- source_word: כַשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva el etnónimo explícito del hebreo. «Babilonios» interpretaría históricamente el referente, pero no es la forma del texto base.
- source_word: אֲרָם
  english_pob_choice: Aram
  chosen_spanish: Aram
  alternatives_spanish:
  - Siria
  lexicon: HALOT
  rationale: Se translitera el nombre propio para mantener cercanía al hebreo. «Siria» es el exónimo tradicional, pero suaviza una distinción geográfica y etnológica presente en el original.
- source_word: בְנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  lexicon: HALOT
  rationale: «Los amonitas» es el etnónimo natural en español y refleja el grupo étnico designado por la construcción hebrea.
- source_word: וַיְשַׁלְּחֵם
  english_pob_choice: he sent them
  chosen_spanish: los envió
  alternatives_spanish:
  - los mandó
  lexicon: HALOT
  rationale: Se conserva la repetición del verbo para respetar la progresión del hebreo. En español, la forma enclítica «los envió» suena más fluida que una repetición analítica.
- source_word: בִּיהוּדָה
  english_pob_choice: against Judah
  chosen_spanish: contra Judá
  alternatives_spanish:
  - en Judá
  - sobre Judá
  lexicon: HALOT
  rationale: Aunque la preposición hebrea es locativa, el contexto hostil exige en español una relación adversativa explícita. «Contra» comunica mejor la intención militar.
- source_word: לְהַאֲבִידוֹ
  english_pob_choice: to destroy it
  chosen_spanish: para destruirlo
  alternatives_spanish:
  - para destruirlo a él
  lexicon: HALOT
  rationale: Se mantiene la ambigüedad del sufijo pronominal con un objeto neutro en español que puede referirse a la nación. La forma «lo» permite esa lectura sin decidir prematuramente entre Judá y Joacim.
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  lexicon: HALOT
  rationale: «Conforme a» conserva el valor normativo/ajustado a la palabra profética y suena natural en español bíblico contemporáneo.
- source_word: דִּבֶּר בְּיַד
  english_pob_choice: had spoken by
  chosen_spanish: había hablado por medio de
  alternatives_spanish:
  - había hablado por
  - había hablado mediante
  lexicon: HALOT
  rationale: La expresión hebrea «por la mano de» es idiomática para mediación profética. «Por medio de» comunica la mediación con claridad y sin calco rígido.
- source_word: עֲבָדָיו הַנְּבִיאִים
  english_pob_choice: his servants the prophets
  chosen_spanish: sus siervos los profetas
  alternatives_spanish:
  - sus servidores, los profetas
  lexicon: HALOT
  rationale: «Siervos» conserva la relación de servicio ministerial de עבדים en este contexto profético y evita endurecer innecesariamente el término hacia «esclavos», que no es el matiz dominante aquí.
theological_decisions:
- issue: Referente del sufijo en לְהַאֲבִידוֹ
  english_pob_reading: 'Judah is the intended object: ''to destroy it.'''
  chosen_spanish_reading: '«lo» se entiende primariamente de Judá: «para destruirlo».'
  alternative_spanish_readings:
  - '«lo» podría referirse a Joacim: «para destruirlo a él».'
  rationale: El antecedente inmediato y el marco narrativo favorecen a Judá como entidad corporativa, aunque la referencia a Joacim sigue siendo gramaticalmente posible. Se mantiene la ambigüedad en español sin resolverla en el texto principal.
  doctrine_reference: Preservar la ambigüedad donde el hebreo la permite, sin forzar una resolución que el contexto no obliga.
translation_notes:
  revision_awareness: Se revisó el pasaje a partir del texto hebreo WLC y del expediente auditado en inglés. No hubo revisiones acumuladas en el historial reciente; el diseño español conserva la estructura sintáctica, el paralelismo de «bandas de...», la ambigüedad del objeto pronominal y el lenguaje profético de fórmula.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, de acuerdo con el estándar del proyecto.
  - Se conserva «Aram» en el texto principal y se explica la alternativa tradicional «Siria» en nota.
  - Se usa «siervos» en el sentido ministerial contextual de עבדים, no como sustituto generalizado de un término de esclavitud.
  - La puntuación y el orden de miembros siguen de cerca el hebreo para conservar la cadencia y el énfasis de la repetición verbal.
