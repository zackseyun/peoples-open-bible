translation:
  language: es
  text: Para el maestro de coro[a]. De los hijos de Coré[b]. Salmo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Al maestro de coro». La preposición hebrea permite tanto dedicación como dirección.
    reason: lexical_alternative
  - marker: b
    text: O «Para los hijos de» o «Por los hijos de»; la preposición hebrea puede indicar distintas clases de relación en los encabezados de salmos.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director
  alternatives_spanish:
  - Al director
  - Para el maestro de coro
  lexicon: HALOT
  rationale: En los encabezados de salmos, la expresión indica la destinación o dedicación al responsable musical. «Director» comunica de forma natural la función litúrgico-musical en español; «para» preserva la fuerza direccional de la preposición lamed sin resolver indebidamente la relación exacta.
- source_word: לִבְנֵי
  english_pob_choice: Of the sons of
  chosen_spanish: De los hijos de
  alternatives_spanish:
  - Para los hijos de
  - Por los hijos de
  lexicon: HALOT
  rationale: La preposición puede señalar asociación, pertenencia o autoría. «De los hijos de» conserva esa ambigüedad sin imponer una decisión de autoría que el hebreo del encabezado no exige.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: Convención bíblica española
  rationale: En español bíblico, el nombre se expresa normalmente como «Coré». Mantiene identificación inmediata para el lector de habla hispana y respeta la transliteración establecida en la tradición de nombres propios bíblicos en español.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Cántico
  lexicon: HALOT
  rationale: El hebreo funciona aquí como etiqueta de género. En español, «Salmo» es la forma más natural y precisa para el encabezado; el artículo indefinido del inglés no es necesario en la línea titular española.
translation_notes:
  revision_awareness: El cotejo más reciente indicó alta concordancia y no introdujo cambios; por eso se mantiene la estructura breve del encabezado y la ambigüedad controlada de las preposiciones hebreas.
  spanish_consistency_notes:
  - Se conserva el tono de encabezado litúrgico, sin añadir elementos interpretativos.
  - «Coré» sigue la forma española usual del nombre propio y no altera el sentido del original.
  - No se fuerza un equivalente funcional más largo como «maestro de coro» porque el encabezado requiere concisión y la referencia del hebreo ya es conocida en la tradición de salmos.
