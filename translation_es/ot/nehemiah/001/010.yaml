revisions:
- from: Pero ellos son tus esclavos y tu pueblo[a][b], a quienes redimiste con tu gran poder y con tu mano fuerte.
  to: Pero ellos son tus siervos y tu pueblo, a quienes redimiste[a] con tu gran poder y con tu mano fuerte[b].
  rationale: Se cambia 'tus esclavos' a 'tus siervos' para seguir la decisión contextual documentada por el POB en este pasaje de oración y pacto. Se reubican los marcadores de notas sobre 'redimiste' y 'mano fuerte' a sus frases correspondientes. Se mantiene 'redimiste', 'gran poder' y 'mano fuerte' por fidelidad al hebreo y a la justificación teológica y léxica auditada.
