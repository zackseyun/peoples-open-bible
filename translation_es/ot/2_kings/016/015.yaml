translation:
  language: es
  text: 'Entonces el rey Acaz ordenó al sacerdote Urías, diciendo: «En el altar grande, ofrece el holocausto de la mañana y la ofrenda de grano de la tarde, el holocausto del rey y su ofrenda de grano, y el holocausto de todo el pueblo de la tierra y sus ofrendas de grano y sus libaciones; y echa sobre él toda la sangre del holocausto y toda la sangre del sacrificio. Pero el altar de bronce me servirá para consultar[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo es difícil aquí; también puede entenderse «para inspeccionar», «para considerar» o posiblemente «para buscar guía». La función exacta que Acaz asigna al altar de bronce no es segura.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיְצַוֵּהוּ
  english_pob_choice: commanded
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dio órdenes a
  lexicon: HALOT
  rationale: «Ordenó» conserva el carácter autoritativo del verbo צוה en español natural y digno, sin rebajarlo a mera sugerencia.
- source_word: הַמֶּלֶךְ אָחָז
  english_pob_choice: King Ahaz
  chosen_spanish: el rey Acaz
  alternatives_spanish:
  - Acaz el rey
  lexicon: HALOT
  rationale: En español, el orden con artículo + título + nombre es más natural y mantiene la aposición real del hebreo.
- source_word: אוּרִיָּה הַכֹּהֵן
  english_pob_choice: Uriah the priest
  chosen_spanish: el sacerdote Urías
  alternatives_spanish:
  - Urías el sacerdote
  lexicon: HALOT
  rationale: Se traduce el título de oficio y se adapta el nombre propio a la forma española usual, preservando la identificación personal.
- source_word: עַל הַמִּזְבֵּחַ הַגָּדוֹל
  english_pob_choice: On the great altar
  chosen_spanish: En el altar grande
  alternatives_spanish:
  - Sobre el altar grande
  - En el gran altar
  lexicon: HALOT
  rationale: «En» reproduce bien el ámbito del acto sacrificial. «Grande» conserva el valor del adjetivo sin convertirlo en interpretativo «principal».
- source_word: הַקְטֵר
  english_pob_choice: offer up
  chosen_spanish: ofrece
  alternatives_spanish:
  - quema
  - haz subir en humo
  lexicon: HALOT
  rationale: En contexto sacrificial, «ofrece» es la forma más natural en español para el acto de presentar la víctima sobre el altar; evita reducir el sentido a combustión física, pero sigue siendo fiel al rito.
- source_word: עֹלַת הַבֹּקֶר
  english_pob_choice: the morning burnt offering
  chosen_spanish: el holocausto de la mañana
  alternatives_spanish:
  - el holocausto matutino
  - el holocausto de la mañana
  lexicon: HALOT
  rationale: «Holocausto» refleja עֹלָה con el valor técnico de ofrenda totalmente consumida; «de la mañana» mantiene la relación temporal del hebreo.
- source_word: מִנְחַת הָעֶרֶב
  english_pob_choice: the evening grain offering
  chosen_spanish: la ofrenda vegetal de la tarde
  alternatives_spanish:
  - la ofrenda de cereal de la tarde
  - la ofrenda de la tarde
  lexicon: HALOT
  rationale: Se preserva la distinción ritual de מִנְחָה con un término reverente y claro en español; «vegetal» evita confundirla con una ofrenda genérica y refleja la realidad de grano/harina sin sonar arcaico.
- source_word: עֹלַת הַמֶּלֶךְ וְאֶת מִנְחָתוֹ
  english_pob_choice: the king’s burnt offering and his grain offering
  chosen_spanish: el holocausto del rey y su ofrenda vegetal
  alternatives_spanish:
  - el holocausto del rey y su ofrenda de cereal
  - el holocausto del rey y su ofrenda
  lexicon: HALOT
  rationale: Se conserva la estructura posesiva y la misma terminología sacrificial que en la primera pareja de ofrendas.
- source_word: עֹלַת כָּל עַם הָאָרֶץ
  english_pob_choice: the burnt offering of all the people of the land
  chosen_spanish: el holocausto de todo el pueblo de la tierra
  alternatives_spanish:
  - el holocausto de todo el pueblo del país
  - el holocausto de toda la gente de la tierra
  lexicon: HALOT
  rationale: «Pueblo de la tierra» mantiene de forma literal la expresión social-política עַם הָאָרֶץ sin especializarla indebidamente.
- source_word: מִנְחָתָם וְנִסְכֵּיהֶם
  english_pob_choice: their grain offerings and their drink offerings
  chosen_spanish: sus ofrendas vegetales y sus libaciones
  alternatives_spanish:
  - sus ofrendas de cereal y sus libaciones
  - sus ofrendas y sus libaciones
  lexicon: HALOT
  rationale: «Libaciones» es el equivalente claro para נֶסֶךְ; se mantiene el paralelismo plural y el carácter cultual de los dones asociados.
- source_word: וְכָל דַּם עֹלָה וְכָל דַּם זֶבַח
  english_pob_choice: all the blood of the burnt offering and all the blood of the sacrifice
  chosen_spanish: toda la sangre del holocausto y toda la sangre del sacrificio
  alternatives_spanish:
  - toda la sangre de holocausto y toda la sangre del sacrificio
  - toda la sangre de la ofrenda quemada y toda la sangre del sacrificio
  lexicon: HALOT
  rationale: Se conserva el paralelismo y la distinción entre עֹלָה y זֶבַח; «sacrificio» traduce bien זֶבַח en sentido general.
- source_word: עָלָיו תִּזְרֹק
  english_pob_choice: throw on it
  chosen_spanish: rocía sobre él
  alternatives_spanish:
  - lanza sobre él
  - derrama sobre él
  lexicon: HALOT
  rationale: «Rocía» es una solución española idiomática para el uso cultual de זרק con sangre, manteniendo la idea de aplicación ritual sin perder naturalidad.
- source_word: וּמִזְבַּח הַנְּחֹשֶׁת
  english_pob_choice: But the bronze altar
  chosen_spanish: Pero el altar de bronce
  alternatives_spanish:
  - Y el altar de bronce
  - Mas el altar de bronce
  lexicon: HALOT
  rationale: «Bronce» es la traducción estándar de נְחֹשֶׁת en este contexto; la conjunción adversativa «Pero» refleja el contraste funcional con el gran altar.
- source_word: יִהְיֶה לִּי
  english_pob_choice: shall be for me
  chosen_spanish: será para mí
  alternatives_spanish:
  - será mío
  - pertenecerá a mí
  lexicon: HALOT
  rationale: La dativa hebrea se conserva con una construcción española natural que no fuerza una idea exclusiva de propiedad.
- source_word: לְבַקֵּר
  english_pob_choice: to inquire by
  chosen_spanish: para consultar
  alternatives_spanish:
  - para inspeccionar
  - para considerar
  - para buscar guía
  lexicon: HALOT
  rationale: «Consultar» preserva la ambigüedad cultual del verbo y permite la posible idea de búsqueda de dirección o examen, sin resolver indebidamente el sentido difícil del hebreo.
theological_decisions:
- issue: Función del altar de bronce en la frase final
  english_pob_reading: to inquire by
  chosen_spanish_reading: para consultar
  alternative_spanish_readings:
  - para inspeccionar
  - para considerar
  - para buscar guía
  rationale: El hebreo es difícil y el contexto sugiere una función reservada y posiblemente consultiva del altar de bronce. «Para consultar» mantiene la tensión sin especificar más de lo que permite el texto.
  doctrine_reference: Translation philosophy §3 (preservar la tensión textual y teológica)
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que indicó alto acuerdo y sin cambios necesarios; la redacción española se ajusta a ese consenso sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece ningún tetragrámaton o cita directa del nombre divino en el texto base.
  - Se usó «holocausto» para עֹלָה y «ofrenda vegetal» para מִנְחָה de manera consistente en todo el versículo.
  - Se preservó la ambigüedad de לְבַקֵּר con una nota de pie, en línea con la POB inglesa.
  - Se evitó «SEÑOR» como máscara para el nombre divino, ya que no corresponde en este versículo.
  - Se mantuvo el contraste entre «altar grande» y «altar de bronce» sin armonizarlo interpretativamente.
