id: PSS.4.20
reference: Psalms of Solomon 4:20
source:
  edition: lxx-swete-1909
  text: ἐν μονίᾳ ἀτεκνίας τὸ γῆρας αὐτοῦ εἰς ἀνάλημψιν.
  language: Greek
  pages:
  - 794
  validation: swete_direct
translation:
  text: May his old age be in the solitude of childlessness[b][a], for removal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'in the solitude of childlessness.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'for removal' or 'unto being taken away.'
    reason: alternative_reading
lexical_decisions:
- source_word: μονίᾳ
  chosen: loneliness
  alternatives:
  - solitude
  - desolation
  lexicon: LSJ
  rationale: The noun denotes a solitary or isolated state. In this curse setting, 'loneliness' communicates the personal desolation more naturally than the more neutral 'solitude.'
- source_word: ἀτεκνίας
  chosen: childlessness
  alternatives:
  - barrenness
  lexicon: LSJ
  rationale: The word specifically denotes being without children. 'Childlessness' is the clearest English equivalent and fits the household-judgment context.
- source_word: γῆρας
  chosen: old age
  alternatives:
  - elder years
  lexicon: LSJ
  rationale: Standard rendering. It refers to the man's old age as the stage of life marked by this judgment.
- source_word: εἰς ἀνάλημψιν
  chosen: until he is taken away
  alternatives:
  - for removal
  - unto being taken away
  lexicon: LSJ
  rationale: ἀνάλημψις literally denotes a taking up or removal. In this imprecatory context, the phrase likely points to his old age continuing under childlessness up to his removal, probably in death. 'Until he is taken away' makes the phrase readable in English while preserving the basic sense.
- source_word: '[implicit imprecatory force]'
  chosen: May his old age be
  alternatives:
  - His old age is
  - Let his old age be
  lexicon: LSJ
  rationale: The verse is verbless, but it stands in a chain of imprecatory wishes in the surrounding context. Supplying 'May ... be' best reflects the carried-forward curse formula.
