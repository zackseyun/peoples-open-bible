translation:
  language: es
  text: y los postes alrededor del patio, con sus bases, sus estacas y sus cuerdas, con todo su equipo y con todo su servicio; y ustedes asignarán por nombre[a] los objetos del encargo de su carga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más fluidamente: «ustedes asignarán por nombre el equipo que cada uno debe llevar».'
    reason: alternative_reading
lexical_decisions:
- source_word: עַמּוּדֵי הֶחָצֵר סָבִיב
  english_pob_choice: the pillars of the surrounding court
  chosen_spanish: los postes del patio alrededor
  alternatives_spanish:
  - los pilares del patio por todos lados
  - los postes alrededor del patio
  lexicon: HALOT
  rationale: עַמּוּדִים puede ser pilares o postes; en español, 'postes' comunica mejor la idea de piezas estructurales del tabernáculo y evita una connotación arquitectónica demasiado monumental. הֶחָצֵר es 'patio', y סָבִיב expresa la disposición alrededor/perimetral.
- source_word: אַדְנֵיהֶם
  english_pob_choice: their bases
  chosen_spanish: sus bases
  alternatives_spanish:
  - sus zócalos
  - sus sockets
  lexicon: HALOT
  rationale: En contexto tabernacular, אֲדָנִים puede referirse a bases o a zócalos/sockets. 'Bases' es claro y mantiene la relación con los postes sin tecnicismo innecesario.
- source_word: יְתֵדֹתָם
  english_pob_choice: their pegs
  chosen_spanish: sus estacas
  alternatives_spanish:
  - sus clavijas
  - sus piquetas
  lexicon: HALOT
  rationale: יָתֵד es una pieza para asegurar una tienda; 'estacas' es natural en español y transmite bien la función de sujeción. 'Pegs' puede sonar demasiado genérico en español.
- source_word: מֵיתְרֵיהֶם
  english_pob_choice: their cords
  chosen_spanish: sus cuerdas
  alternatives_spanish:
  - sus cordeles
  - sus sogas
  lexicon: HALOT
  rationale: מֵיתָר denota cuerda o cordón de sujeción; 'cuerdas' es el equivalente más transparente y conserva el paralelismo con estacas.
- source_word: לְכָל כְּלֵיהֶם
  english_pob_choice: with all their equipment
  chosen_spanish: con todo su equipo
  alternatives_spanish:
  - con todos sus utensilios
  - con todos sus implementos
  lexicon: HALOT
  rationale: כְּלִים es un término amplio. Aquí el contexto es de objetos asociados al servicio de carga, por lo que 'equipo' conserva la amplitud sin reducirlo a vasos litúrgicos.
- source_word: וּלְכֹל עֲבֹדָתָם
  english_pob_choice: with all their service
  chosen_spanish: y con toda su labor
  alternatives_spanish:
  - y con todo su servicio
  - y con todas sus tareas
  lexicon: HALOT
  rationale: עֲבֹדָה puede ser 'servicio', 'trabajo' o 'labor'. 'Labor' mantiene el sentido de tarea asignada y suena natural en español, sin borrar el matiz de servicio cultual.
- source_word: וּבְשֵׁמֹת תִּפְקְדוּ
  english_pob_choice: and you shall assign by name
  chosen_spanish: y ustedes los asignarán por nombre
  alternatives_spanish:
  - y ustedes los nombrarán por su nombre
  - y ustedes los registrarán por nombre
  lexicon: HALOT
  rationale: פָּקַד en esta construcción tiene el valor de asignar/apuntar individualmente responsabilidades. 'Asignarán por nombre' comunica la designación personal mejor que un simple conteo.
- source_word: כְּלֵי מִשְׁמֶרֶת מַשָּׂאָם
  english_pob_choice: the items of the duty of their burden
  chosen_spanish: los objetos de la custodia de su carga
  alternatives_spanish:
  - los objetos de la responsabilidad de su carga
  - los artículos de la custodia de lo que llevan
  lexicon: HALOT
  rationale: 'La frase es densa: כְּלֵי son objetos/artículos, מִשְׁמֶרֶת es custodia o encargo, y מַשָּׂא es carga. ''Custodia de su carga'' preserva la estructura semítica y la relación entre responsabilidad y carga sin explicitar de más.'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece en el texto español en el lugar correspondiente a la alternativa léxica preservada por la POB en inglés.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplicable en este versículo porque el texto no contiene el nombre divino.
  - Se evitó 'siervo' para עֲבֹדָה; aquí el término describe labor/servicio asignado, no el sujeto del servicio.
  - Se preservó la densidad de la última cola hebrea con una solución comprensible en español, sin convertirla en paráfrasis amplia.
