translation:
  language: es
  text: Y la apariencia de la gloria de Yahvé era como fuego consumidor en la cima del monte, ante los ojos de los hijos de Israel[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuego devorador».
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas».
    reason: lexical_alternative
lexical_decisions:
- source_word: מַרְאֵה
  english_pob_choice: appearance
  chosen_spanish: apariencia
  alternatives_spanish:
  - aspecto
  - visión
  - manifestación
  lexicon: HALOT
  rationale: מַרְאֵה designa lo que se ve, una apariencia visible. «Apariencia» comunica bien la descripción visual inmediata sin introducir la idea de una experiencia profética de «visión».
- source_word: כְּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - peso
  lexicon: HALOT
  rationale: En este contexto, se trata de la presencia resplandeciente de Yahvé; «gloria» es la equivalencia natural y tradicional en español para esa realidad visible y teológica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino del texto hebreo como «Yahvé», de acuerdo con la norma del proyecto para el Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: כְּאֵשׁ אֹכֶלֶת
  english_pob_choice: like a consuming fire
  chosen_spanish: como fuego consumidor
  alternatives_spanish:
  - como fuego devorador
  - como fuego que consume
  lexicon: HALOT
  rationale: La comparación con כְּ se mantiene con «como». El participio אֹכֶלֶת, aplicado al fuego, expresa la idea de consumir; «fuego consumidor» es natural en español y preserva la fuerza del original.
- source_word: בְּרֹאשׁ הָהָר
  english_pob_choice: on the top of the mountain
  chosen_spanish: en la cima del monte
  alternatives_spanish:
  - en la cima de la montaña
  - sobre la cumbre del monte
  - en la cumbre del monte
  lexicon: HALOT
  rationale: La expresión señala la parte más alta del monte. «Cima» transmite con claridad la ubicación superior y suena natural en español bíblico contemporáneo.
- source_word: לְעֵינֵי
  english_pob_choice: in the sight of
  chosen_spanish: a los ojos de
  alternatives_spanish:
  - en presencia de
  - ante los ojos de
  - a la vista de
  lexicon: HALOT
  rationale: El modismo hebreo subraya la percepción visual abierta. «A los ojos de» conserva ese énfasis en la visibilidad; aunque menos idiomático que otras opciones, refleja bien la fuerza semántica del original.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Israel
  - los israelitas
  - los niños de Israel
  lexicon: HALOT
  rationale: Se mantiene la forma masculina plural del hebreo. «Hijos de Israel» conserva con transparencia la construcción fuente y es comprensible en español; «israelitas» sería más idiomático, pero menos cercano a la forma del texto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el nombre propio del pacto. Se preserva como «Yahvé» para no ocultarlo tras un título y para ser coherente con la política del proyecto en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Designación de los israelitas como בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos de Israel
  - los israelitas
  rationale: Se conserva el matiz masculino plural de la expresión hebrea. En español, «hijos de Israel» reproduce la estructura del original y mantiene la referencia covenantal sin neutralizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo entre la versión fuente y la auditoría inglesa; no se documentaron revisiones aplicadas en el último pase, por lo que el borrador español sigue de cerca las decisiones léxicas ya validadas, adaptándolas a un español natural sin perder la transparencia hacia el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se conserva la comparación explícita con «como» para כְּ.
  - Se usa «gloria» para כְּבוֹד por su valor teológico y su uso bíblico establecido en español.
  - Se mantiene la estructura masculina plural «hijos de Israel» para reflejar el hebreo.
  - La puntuación y el orden son naturales en español, sin borrar la relación entre la apariencia, la gloria, el fuego y la visibilidad pública del evento.
