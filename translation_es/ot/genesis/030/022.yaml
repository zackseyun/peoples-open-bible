translation:
  language: es
  text: Entonces Dios se acordó de Raquel[a], y Dios la escuchó[b] y abrió su matriz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “tuvo presente a Raquel” / “estuvo atento a Raquel”. El hebreo “se acordó” es un modismo bíblico de atención favorable que lleva a la acción, no una sugerencia de que Dios la hubiera olvidado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “la oyó” o “le prestó atención”. El verbo hebreo puede significar oír con atención o responder.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְכֹּר
  english_pob_choice: remembered
  chosen_spanish: se acordó de
  alternatives_spanish:
  - recordó
  - tuvo presente
  - fue atento a
  lexicon: HALOT
  rationale: 'En español, "se acordó de" conserva el valor idiomático de זכר en contexto narrativo-teológico: no implica olvido previo, sino atención favorable que conduce a acción. "Recordó" puede sonar más mental y menos relacional; "tuvo presente" es posible, pero menos natural aquí.'
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: El hebreo usa אֱלֹהִים con verbo singular y se refiere claramente al Dios único. "Dios" comunica con naturalidad esa referencia en español.
- source_word: וַיִּשְׁמַע אֵלֶיהָ
  english_pob_choice: listened to her
  chosen_spanish: la escuchó
  alternatives_spanish:
  - oyó su ruego
  - la atendió
  - la oyó
  lexicon: HALOT
  rationale: שׁמע con אֶל puede expresar oír con atención o responder. "La escuchó" conserva la relación personal y evita sobreinterpretar con "la atendió" o reducirlo a simple percepción auditiva con "la oyó".
- source_word: וַיִּפְתַּח
  english_pob_choice: opened
  chosen_spanish: abrió
  alternatives_spanish:
  - desató
  - quitó la esterilidad de
  lexicon: HALOT
  rationale: פתח es un verbo concreto y directo; "abrió" preserva la imagen verbal sin paráfrasis explicativa.
- source_word: רַחְמָהּ
  english_pob_choice: her womb
  chosen_spanish: su vientre
  alternatives_spanish:
  - su matriz
  - su útero
  - su seno materno
  lexicon: HALOT
  rationale: El término hebreo significa "womb". En español, "vientre" mantiene el registro bíblico y es ampliamente inteligible; "útero" es más técnico, y "matriz" puede sonar más tradicional o ambiguo según el lector. "Vientre" conserva la imagen corporal del texto.
theological_decisions:
- issue: Lenguaje antropomórfico de Dios que "se acordó" de Raquel
  english_pob_reading: Retain 'remembered' as a biblical idiom for God's favorable attention and action.
  chosen_spanish_reading: Mantener "se acordó de" como modismo bíblico de atención favorable y acción divina.
  alternative_spanish_readings:
  - la tuvo presente
  - la tomó en cuenta
  rationale: El hebreo no sugiere que Dios hubiera olvidado a Raquel en sentido humano. Sin embargo, conviene conservar el modismo para no diluir el patrón bíblico de recuerdo divino que introduce acción concreta. Las cláusulas siguientes explicitan ese efecto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios y el cotejo cruzado reporta alto acuerdo; no hay revisiones aplicadas que alteren el sentido del versículo.
  spanish_consistency_notes:
  - Se mantiene "Dios" para אֱלֹהִים con verbo singular, coherente con la referencia al Dios único.
  - 'Se conserva el paralelismo narrativo de tres acciones divinas: se acordó, escuchó, abrió.'
  - '"Vientre" traduce de forma idiomática y comprensible רַחְםָּהּ sin perder la imaginería corporal del hebreo.'
