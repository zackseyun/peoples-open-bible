translation:
  language: es
  text: porque hemos pecado en todas las cosas[a], y hemos obrado inicuamente al apartarnos de ti, y hemos pecado gravemente en todas las cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hemos pecado gravemente en todo». El verbo griego final es más fuerte que el primer «hemos pecado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμάρτομεν
  english_pob_choice: we have sinned
  chosen_spanish: hemos pecado
  alternatives_spanish:
  - pecamos
  lexicon: BDAG
  rationale: El aoristo confesional se expresa con perfecto compuesto para reflejar acción completada con vigencia presente en español. «Pecar» es el equivalente natural y bíblico para ἁμαρτάνω sin perder el tono penitencial.
- source_word: ἐν πᾶσι
  english_pob_choice: in all things
  chosen_spanish: en todas las cosas
  alternatives_spanish:
  - en todo
  - en todo aspecto
  lexicon: BDAG
  rationale: La frase es amplia y totalizante. «En todas las cosas» conserva la cobertura total de ἐν πᾶσι sin precisar indebidamente si el matiz es de materias, ámbitos o modos.
- source_word: ἠνομήσαμεν
  english_pob_choice: we have acted lawlessly
  chosen_spanish: hemos obrado sin ley
  alternatives_spanish:
  - hemos actuado sin ley
  - hemos transgredido la ley
  lexicon: BDAG
  rationale: El verbo subraya una conducta contraria a la ley. «Obrado sin ley» mantiene el peso lexical de ἀνομέω; «transgredido la ley» sería más interpretativo y menos cercano al giro verbal.
- source_word: ἀποστῆναι ἀπὸ σοῦ
  english_pob_choice: by turning away from you
  chosen_spanish: al apartarnos de ti
  alternatives_spanish:
  - al alejarnos de ti
  - al desviarnos de ti
  lexicon: BDAG
  rationale: El infinitivo expresa la manera o el contenido de la acción precedente. «Apartarnos de ti» preserva el sentido relacional de apostasía/alejamiento con un español claro y reverente.
- source_word: ἐξημάρτομεν
  english_pob_choice: we have sinned greatly
  chosen_spanish: hemos pecado gravemente
  alternatives_spanish:
  - hemos pecado en gran manera
  - hemos pecado mucho
  lexicon: BDAG
  rationale: El compuesto intensifica la confesión respecto del primer verbo. «Pecado gravemente» conserva la intensificación de forma natural en español y evita sonar arcaico.
theological_decisions:
- issue: Si conviene distinguir entre el pecado general y el pecado intensificado expresado por ἡμάρτομεν y ἐξημάρτομεν
  english_pob_reading: 'Different English renderings are used: ''have sinned'' and ''have sinned greatly.'''
  chosen_spanish_reading: Se distingue entre «hemos pecado» y «hemos pecado gravemente».
  alternative_spanish_readings:
  - Traducir ambos simplemente como «hemos pecado»
  - Traducir el segundo como «hemos pecado en gran manera»
  rationale: El griego repite la idea con intensificación en la segunda forma verbal. Mantener la diferencia en español evita aplanar la fuerza retórica de la confesión y reproduce mejor la progresión del texto.
  doctrine_reference: DOCTRINE.md §5 Consistency of key terms, or documented exception
translation_notes:
  revision_awareness: 'La formulación sigue el pasaje revisado en el contexto inglés: conserva la cobertura amplia de ἐν πᾶσι con «en todas las cosas» y distingue el primer verbo de pecado del verbo intensificado final, manteniendo la progresión confesional del griego de Swete.'
  spanish_consistency_notes:
  - Se mantiene «ti» para la segunda persona singular, coherente con la oración dirigida a Dios.
  - No se usa «SEÑOR» ni «Cristo»; el versículo no contiene esos términos.
  - «Sin ley» se conserva como calco semántico de ἀνομήσαμεν para no diluir el matiz jurídico de la culpa.
