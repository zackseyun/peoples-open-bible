translation:
  language: es
  text: Sobre todas las azoteas de Moab y en sus plazas, por todas partes hay duelo; porque he quebrado a Moab como una vasija en la que no hay deleite[a], declara Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, “como una vasija que nadie quiere”. El hebreo literalmente dice: “como una vasija en la que no hay deleite”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: גַּגּוֹת
  english_pob_choice: rooftops
  chosen_spanish: terrados
  alternatives_spanish:
  - azoteas
  - techos
  lexicon: HALOT
  rationale: El plural hebreo se refiere a los techos planos de las casas como lugar visible y público. 'Terrados' comunica bien ese espacio arquitectónico y sugiere naturalidad en español bíblico sin perder la imagen concreta.
- source_word: רְחֹבֹתֶיהָ
  english_pob_choice: her squares
  chosen_spanish: sus plazas
  alternatives_spanish:
  - sus calles
  - sus espacios abiertos
  - sus plazoletas
  lexicon: HALOT
  rationale: רְחוֹב puede denotar un espacio ancho y abierto, a menudo una plaza o explanada urbana. 'Plazas' conserva el carácter público del lamento y funciona bien en paralelo con los terrados.
- source_word: כֻלֹּה מִסְפֵּד
  english_pob_choice: everywhere there is mourning
  chosen_spanish: por todas partes hay duelo
  alternatives_spanish:
  - todo es duelo
  - en todas partes hay lamentación
  - todo está en duelo
  lexicon: HALOT
  rationale: 'La frase expresa una totalización: Moab queda cubierto de llanto público. ''Por todas partes hay duelo'' transmite la extensión global y mantiene un español claro y solemne.'
- source_word: מִסְפֵּד
  english_pob_choice: mourning
  chosen_spanish: duelo
  alternatives_spanish:
  - lamentación
  - luto
  - llanto
  lexicon: HALOT
  rationale: '''Duelo'' comunica tanto el dolor como la expresión pública de la pérdida. Es una opción natural en español para un contexto funerario y de aflicción nacional.'
- source_word: שָׁבַרְתִּי
  english_pob_choice: I have broken
  chosen_spanish: he quebrado
  alternatives_spanish:
  - he roto
  - he destrozado
  - he quebrantado
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una acción ya consumada. 'He quebrado' conserva el valor de ruptura/destrucción y mantiene un tono bíblico sobrio.
- source_word: כִּכְלִי
  english_pob_choice: like a vessel
  chosen_spanish: como a un vaso
  alternatives_spanish:
  - como a un recipiente
  - como a una vasija
  - como a un utensilio
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objeto o recipiente. 'Vaso' en español bíblico puede funcionar como recipiente frágil y apto para la metáfora de inutilidad posterior; además, permite una lectura fluida y cercana al imaginario tradicional sin depender de un tecnicismo.
- source_word: אֵין חֵפֶץ בּוֹ
  english_pob_choice: in which there is no delight
  chosen_spanish: en el que no hay deleite
  alternatives_spanish:
  - que nadie quiere
  - en el que no hay agrado
  - que ya no sirve
  lexicon: HALOT
  rationale: חֵפֶץ expresa deseo, agrado o deleite. 'No hay deleite' sigue de cerca la construcción hebrea y mantiene la tensión entre valor, agrado y deseo que el texto deja abierta.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  - afirma Yahvé
  lexicon: HALOT
  rationale: La fórmula profética נְאֻם se rinde naturalmente como 'declara'. El nombre divino se conserva como 'Yahvé' según la norma del proyecto, en lugar de sustituirlo por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre divino establecida por el proyecto. En español, 'Yahvé' es la forma más transparente y ampliamente inteligible para la audiencia meta.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. El proyecto pide preservar el nombre divino en la forma 'Yahvé' en el texto principal, evitando la sustitución por un título y manteniendo la referencia al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh / Yahvé'
translation_notes:
  revision_awareness: El control cruzado del contexto inglés reporta alta concordancia y ningún cambio requerido en la última revisión; esta propuesta conserva esas decisiones auditadas y las adapta al español con equivalencia óptima.
  spanish_consistency_notes:
  - Se mantiene el paralelismo espacial 'terrados' / 'plazas' para reflejar la totalidad pública del duelo.
  - Se conserva la fórmula profética con 'declara Yahvé' por coherencia con la política del proyecto para el nombre divino.
  - '''Duelo'' se usa como equivalente sobrio de ''mourning'', evitando un matiz excesivamente poético o arcaico.'
  - El comparativo 'como a un vaso' preserva la metáfora de objeto roto e inútil; se deja nota para la alternativa semántica de 'vasija/recipiente'.
