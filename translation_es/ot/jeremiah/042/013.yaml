translation:
  language: es
  text: 'Pero si ustedes dicen: «No habitaremos en esta tierra», sin obedecer[a] a la voz de Yahvé su Dios—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin escuchar la voz de Yahvé su Dios». El hebreo «oír/escuchar la voz de» suele implicar obediencia respondiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: La partícula condicional con valor contrastivo en contexto profético queda bien en español como «Pero si», conservando el matiz adversativo que sigue a la advertencia anterior.
- source_word: אֹמְרִים אַתֶּם
  english_pob_choice: you say
  chosen_spanish: ustedes dicen
  alternatives_spanish:
  - dicen
  - si dicen ustedes
  lexicon: HALOT
  rationale: El participio con pronombre explícito se vierte de modo natural como una afirmación condicional directa en español; «ustedes» explicita el sujeto plural sin forzar la sintaxis.
- source_word: לֹא נֵשֵׁב
  english_pob_choice: We will not stay
  chosen_spanish: No habitaremos
  alternatives_spanish:
  - No nos quedaremos
  - No permaneceremos
  - No viviremos
  lexicon: HALOT
  rationale: En el contexto de asentarse en la tierra, «habitar» conserva mejor la idea de residencia estable que «quedarse», y mantiene el tono bíblico sin sonar arcaico en exceso.
- source_word: בָּאָרֶץ הַזֹּאת
  english_pob_choice: in this land
  chosen_spanish: en esta tierra
  alternatives_spanish:
  - en este país
  - en esta región
  lexicon: HALOT
  rationale: «Tierra» reproduce el campo semántico de אֶרֶץ y su resonancia geográfica y pactal; «país» sonaría demasiado moderno y menos bíblico.
- source_word: לְבִלְתִּי
  english_pob_choice: not obeying
  chosen_spanish: desobedeciendo
  alternatives_spanish:
  - para no obedecer
  - sin obedecer
  lexicon: HALOT
  rationale: La construcción infinitiva negativa expresa resultado o finalidad negativa. En español, el gerundio «desobedeciendo» refleja con naturalidad el valor de la frase y evita una paráfrasis excesiva.
- source_word: שְׁמֹעַ
  english_pob_choice: obey
  chosen_spanish: desobedeciendo
  alternatives_spanish:
  - oyendo
  - escuchando
  - obedeciendo
  lexicon: HALOT
  rationale: Aunque literalmente es «oír/escuchar», en la fórmula covenantal implica responder con obediencia. El español «desobedeciendo» comunica ese valor idiomático de manera clara.
- source_word: בְּקוֹל
  english_pob_choice: the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el sonido de
  - la orden de
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática «la voz de» para preservar el modo bíblico de hablar de la palabra divina, incluso cuando el sentido práctico es de obediencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se usa «Yahvé» conforme al criterio del proyecto para el Tetragrámaton, preservando el nombre propio divino en vez de sustituirlo por un título.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - tu Dios
  lexicon: HALOT
  rationale: El posesivo plural de cortesía/pluralidad en español se expresa naturalmente como «su Dios» en un contexto dirigido a un grupo. El referente sigue siendo el Dios del pacto.
theological_decisions:
- issue: Representación del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se conserva el nombre divino propio, no un sustituto titular, en coherencia con la política textual del proyecto y con la transparencia del original hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Idioma covenantal de «oír la voz»
  english_pob_reading: not obeying the voice of the LORD your God
  chosen_spanish_reading: desobedeciendo la voz de Yahvé su Dios
  alternative_spanish_readings:
  - sin escuchar la voz de Yahvé su Dios
  - no obedeciendo la voz de Yahvé su Dios
  rationale: La expresión hebrea implica obediencia respondiente. En español, «desobedeciendo» retiene el valor teológico sin perder la imagen de la voz divina.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §6
- issue: Relación entre tierra y pacto
  english_pob_reading: in this land
  chosen_spanish_reading: en esta tierra
  alternative_spanish_readings:
  - en esta tierra prometida
  - en este país
  rationale: «Tierra» mantiene la resonancia bíblica de אֶרֶץ y evita introducir explícitamente «prometida», que no aparece en el versículo.
  doctrine_reference: 'DOCTRINE.md: source-first lexical fidelity'
translation_notes:
  revision_awareness: El registro inglés fue revisado desde una formulación más explícita de finalidad («so as not to obey») a una construcción más directa («not obeying»). La versión española sigue esa misma dirección al preferir el gerundio «desobedeciendo», que refleja con mayor cercanía la construcción infinitiva negativa hebrea.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - Se prefirió «tierra» sobre equivalentes más modernos para conservar el valor geográfico-pactual de אֶרֶץ.
  - Se conservó la metáfora de «la voz de» y se explicó en nota la posibilidad de traducirla por «escuchar» con sentido obediencial.
  - El tono es formal y publicable, sin calcos excesivos del inglés, pero sin alejarse del hebreo.
