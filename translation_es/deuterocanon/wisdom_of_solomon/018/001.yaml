base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/018/001.yaml
  text: But for your holy ones there was very great light[a]; hearing their voice but not seeing their form, since they indeed had not suffered the same things[b], they counted them blessed.
  footnotes:
  - marker: a
    text: Or 'saints' for 'holy ones.'
    reason: lexical_alternative
  - marker: b
    text: The Greek verb ἐπεπώθεισαν is difficult in context. Literally it often means 'had longed for,' but here it is taken in context to mean they had undergone or suffered the same things, which explains why they then counted them blessed.
    reason: alternative_reading
