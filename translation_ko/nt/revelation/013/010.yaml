  yaml_path: translation/nt/revelation/013/010.yaml
  text: If anyone is for captivity[a], into captivity he goes; if anyone is to be killed with the sword, with the sword he must be killed[c][b]. Here is the endurance and the faith of the saints.
  footnotes:
  - marker: a
    text: Or, 'If anyone goes into captivity, into captivity he goes'; the line may also be understood as a statement of appointed destiny rather than a command.
    reason: alternative_reading
  - marker: b
    text: Some manuscripts/readings differ in this clause, including forms that read, 'If anyone kills with the sword, he must be killed with the sword.' The adopted text is retained here, but the variant is significant for interpretation.
    reason: textual_variant
  - marker: c
    text: Or 'faithfulness of the saints.'
    reason: lexical_alternative
translation:
  language: ko
  text: 누구든 포로로 끌려갈 자는 포로로 끌려갈 것이고, 누구든 칼로 죽임당할 자는 칼로 죽임당할 것입니다. 여기에 성도들의 인내와 믿음이 있습니다.
  philosophy: optimal-equivalence
