translation:
  language: es
  text: ¿Quién prepara la presa para el cuervo, cuando sus polluelos claman a Dios y vagan por falta de alimento?[a][b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «provee alimento para el cuervo». El verbo hebreo puede significar «preparar» o «proveer», y «presa» también puede entenderse más ampliamente como «alimento».
    reason: lexical_alternative
  - marker: b
    text: O «porque sus polluelos claman a Dios». La conjunción puede leerse de modo causal («porque/pues») además de temporal («cuando»).
    reason: lexical_alternative
  - marker: c
    text: O «andan vagando» o «se extravían». El verbo hebreo puede denotar vagar o desviarse en busca de alimento.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  lexicon: HALOT
  rationale: Interrogativo directo y retórico en la voz de Yahvé; «¿Quién» reproduce mejor la fuerza breve y solemne del hebreo.
- source_word: יָכִין
  english_pob_choice: prepares
  chosen_spanish: prepara
  alternatives_spanish:
  - provee
  - dispone
  - deja listo
  lexicon: HALOT
  rationale: El hifil de כון puede significar «hacer listo» o «proveer». «Prepara» conserva la idea concreta de disponer alimento/presa para el ave sin sobrecargar el verso.
- source_word: לָעֹרֵב
  english_pob_choice: for the raven
  chosen_spanish: para el cuervo
  alternatives_spanish:
  - para un cuervo
  lexicon: HALOT
  rationale: El singular con artículo funciona de modo genérico/especie-representativo. En español, «el cuervo» suena natural y mantiene ese valor genérico.
- source_word: צֵידוֹ
  english_pob_choice: prey
  chosen_spanish: presa
  alternatives_spanish:
  - alimento
  - presa suya
  lexicon: HALOT
  rationale: El hebreo dice simplemente «presa», no «su presa». «Presa» preserva la imagen de caza y evita introducir un posesivo que el texto no tiene.
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí la conjunción marca la circunstancia temporal/situacional en que se describe la escena; «cuando» reproduce esa lectura preferida en la POB inglesa.
- source_word: יַלְדָו
  english_pob_choice: its young
  chosen_spanish: sus polluelos
  alternatives_spanish:
  - sus crías
  - sus jóvenes
  lexicon: HALOT
  rationale: Se refiere a los jóvenes del cuervo. «Polluelos» es el equivalente natural para aves y mantiene la concreción zoológica del contexto; «crías» queda como alternativa más general.
- source_word: אֶל אֵל
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a El
  lexicon: HALOT
  rationale: Aquí אֵל funciona como sustantivo común para Dios, no como nombre propio transliterado. «A Dios» es la opción española más clara y fiel al sentido.
- source_word: יְשַׁוֵּעוּ
  english_pob_choice: cry out
  chosen_spanish: claman
  alternatives_spanish:
  - claman por ayuda
  - gritan a Dios
  lexicon: HALOT
  rationale: El piel de שוע expresa clamor de auxilio. «Claman» es breve, solemne y suficientemente amplio; el complemento «a Dios» ya explicita el destinatario.
- source_word: יִתְעוּ
  english_pob_choice: wander about
  chosen_spanish: andan errantes
  alternatives_spanish:
  - vagan
  - deambulan
  - andan vagando
  lexicon: HALOT
  rationale: El qal de תעה puede significar andar vagando o extraviarse. «Andan errantes» comunica tanto la búsqueda inquieta como el desvío, sin perder el matiz del texto.
- source_word: לִבְלִי אֹכֶל
  english_pob_choice: for lack of food
  chosen_spanish: por falta de alimento
  alternatives_spanish:
  - sin alimento
  - por carecer de alimento
  lexicon: HALOT
  rationale: La frase indica privación. «Por falta de alimento» suena natural en español y conserva el valor causal de la expresión hebrea/inglesa.
theological_decisions:
- issue: Referencia de אֵל como Dios
  english_pob_reading: to God
  chosen_spanish_reading: a Dios
  alternative_spanish_readings:
  - a El
  rationale: No hay indicio en el contexto de que deba transliterarse como nombre propio; el sentido es el de Dios como destinatario del clamor de las crías. Mantener «Dios» evita oscurecer la escena.
  doctrine_reference: Uso común del término divino en el AT; coherente con la práctica POB de distinguir nombres propios y sustantivos comunes para Dios.
translation_notes:
  revision_awareness: La versión inglesa más reciente retiró «its» antes de «prey» para ajustarse mejor al hebreo, que dice simplemente «prey». La redacción española sigue esa corrección con «presa» sin posesivo. También se mantuvo la lectura preferida de «when» para כִּי, aunque se documenta la alternativa causal en nota.
  spanish_consistency_notes:
  - Se usa «Dios» para אֵל, no «El», por claridad y porque el contexto no exige transliteración.
  - Se prefiere «cuervo»/«polluelos» para conservar la imaginería animal concreta del verso.
  - Se evita añadir posesivos no presentes en el hebreo en «presa».
  - Se conserva un registro bíblico sobrio y moderno, sin calco excesivo de la sintaxis inglesa.
