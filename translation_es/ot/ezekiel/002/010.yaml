review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea: el rollo es extendido delante del profeta, está escrito en ambas caras, y su contenido consiste en una tríada de duelo/juicio. Sin embargo, hay un desajuste importante de anclaje de notas: la nota [a] está puesta en «delante de mí», pero en el rastro inglés la alternativa corresponde a «por delante y por detrás / en ambos lados», no a לְפָנַי. Además, la nota [b] está anclada a la ubicación espacial cuando su contenido alternativo corresponde a הֶגֶה («gemido/groaning»).'
  spanish_quality_summary: El español es claro y digno. «Lo extendió delante de mí» y «estaba escrito por delante y por detrás» son naturales. La secuencia final suena bien, aunque «lamentaciones, lamento y ¡ay!» repite la misma raíz y resulta algo menos nítida que una opción como «lamentaciones, gemido y ¡ay!». Aun así, esa elección es defendible; el problema principal es la colocación incorrecta de las notas.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. Las decisiones léxicas son mayormente fieles. La opción «¡ay!» para הִי y «lamentaciones» para קִנִים está bien. «Lamento» para הֶגֶה es posible, aunque la nota alternativa con «gemido» debe quedar anclada a ese término, no a la frase anterior.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a los lugares equivocados.
    rationale: La nota [a] ofrece la alternativa de פָּנִים וְאָחוֹר («en ambos lados / por dentro y por fuera»), pero está colocada tras «delante de mí». La nota [b] ofrece la alternativa de הֶגֶה («gemido»), pero está colocada tras «por detrás». Esto rompe la trazabilidad del audit trail y puede confundir al lector.
  - severity: medium
    issue: La nota [a] omite la correspondencia más literal del inglés auditado.
    rationale: El rastro inglés dice «Or 'on both sides'; traditionally, 'inside and outside.'». En español conviene reflejarlo como «O ‘en ambos lados’; tradicionalmente, ‘por dentro y por fuera’», anclado a la frase de ambas caras del rollo.
  - severity: low
    issue: «Lamentaciones, lamento y ¡ay!» produce repetición léxica cercana.
    rationale: No es infiel, pero estilísticamente la pareja «lamentaciones» / «lamento» puede sonar redundante. Sin embargo, dado que la decisión documentada la defiende y no distorsiona el hebreo, no hace falta forzar un cambio.
  revised_spanish_text: Y lo extendió delante de mí, y estaba escrito por delante y por detrás[a]; y en él estaban escritas lamentaciones, lamento[b] y ¡ay!
  revised_footnotes:
  - marker: a
    text: O ‘en ambos lados’; tradicionalmente, ‘por dentro y por fuera’.
    reason: lexical_alternative
  - marker: b
    text: O ‘gemido’.
    reason: lexical_alternative
  revision_rationale: Se conserva casi todo el texto porque es fiel y legible, pero se corrige la ubicación de las notas para que correspondan a las expresiones correctas del hebreo y del audit trail inglés. También se ajusta el contenido de la nota [b] para que anote únicamente la alternativa léxica de הֶגֶה en el punto donde aparece «lamento».
