translation:
  language: es
  text: 'Saúl dijo: «Que Yahvé los bendiga[a], porque han tenido compasión de mí[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Benditos sean ustedes de Yahvé». La fórmula expresa una bendición pronunciada como deseo o declaración.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «han tenido piedad/compasión de mí»; el verbo también puede llevar el sentido de «perdonar» o «dejar con vida» según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se expresa de forma natural en español con «dijo»; como en inglés, el matiz consecutivo de la ו narrativa no requiere reproducirse mecánicamente en el estilo directo de la oración.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  lexicon: nombre propio estándar
  rationale: Nombre propio bíblico en su forma española habitual y transparente.
- source_word: בְּרוּכִים אַתֶּם
  english_pob_choice: May you be blessed
  chosen_spanish: Benditos sean ustedes
  alternatives_spanish:
  - Sean ustedes benditos
  - Que ustedes sean benditos
  lexicon: HALOT
  rationale: La construcción es una fórmula performativa de bendición. En español, «Benditos sean ustedes» comunica bien el carácter de pronunciamiento sin sonar forzado; mantiene el valor declarativo del adjetivo predicativo con el pronombre independiente.
- source_word: לַֽ/יהוָה
  english_pob_choice: by Yahweh
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - por Yahvé
  - de parte de Yahvé
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Siguiendo la norma del proyecto, el Tetragrámaton se traduce «Yahvé» en el texto principal. En esta bendición, ל con יְהוָה funciona como relación/fuente; en español «de Yahvé» expresa de manera natural que la bendición procede de él.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la bendición; «porque» es la opción más clara y directa en español contemporáneo.
- source_word: חֲמַלְתֶּם
  english_pob_choice: have had compassion
  chosen_spanish: han tenido compasión
  alternatives_spanish:
  - han sentido compasión
  - han tenido piedad
  - han perdonado
  lexicon: HALOT
  rationale: חמל aquí expresa compasión/piedad hacia una persona concreta; «han tenido compasión» conserva ese valor afectivo-relacional y evita limitarse a «han perdonado» o a una idea meramente de omisión de daño.
- source_word: עָלָי
  english_pob_choice: on me
  chosen_spanish: de mí
  alternatives_spanish:
  - sobre mí
  - hacia mí
  lexicon: HALOT
  rationale: En español, la construcción natural con «tener compasión» suele usar complemento introducido por «de». Aunque el hebreo usa עלי, la equivalencia idiomática «compasión de mí» comunica bien la relación de compasión sin añadir dureza o extrañeza innecesarias.
theological_decisions:
- issue: Traducción del nombre divino YHWH en una bendición
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - SEÑOR
  rationale: El texto hebreo contiene directamente יהוה; conforme a la pauta del proyecto, se preserva el nombre divino en español como «Yahvé» y no se sustituye por una convención de máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Coincide con el pasaje base y con el audit trail inglés: se mantiene el carácter de bendición performativa, el nombre divino se vierte como Yahvé y el verbo חמל se conserva con el sentido primario de compasión, dejando explícita la posible extensión semántica a piedad o preservación en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יהוה en el texto principal, conforme al estándar del proyecto.
  - «Han tenido compasión» preserva el campo semántico de חמל sin sobrerreducirlo a un mero acto de no dañar.
  - La puntuación con comillas angulares y dos puntos sigue el uso editorial español y mantiene el discurso directo claro.
