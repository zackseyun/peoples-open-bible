revisions:
- from: Ciertamente[a], él ama a los pueblos; todos sus santos están en tu mano, y ellos se sientan[b] a tus pies; cada uno recibe tus palabras.
  to: Ciertamente, él ama a los pueblos; todos sus consagrados están en tu mano, y ellos se sientan[a] a tus pies; cada uno recibe[b] tus palabras.
  rationale: Se ajusta קְדֹשָׁיו a «sus consagrados» para evitar la connotación eclesiástica de «santos» y reflejar mejor la decisión léxica del POB de mantener amplitud. Se añade la nota faltante sobre la cláusula final, preservando una dificultad importante del hebreo. Se quita la nota en «Ciertamente» porque no es necesaria para el texto principal y las notas requeridas prioritarias son las documentadas para las dos expresiones difíciles del verso.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:51:08Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo y conserva correctamente el cambio poético de persona (''él... sus... tu... tus''). También refleja de forma razonable la dificultad de תֻּכּוּ y la línea final sobre recibir las palabras. Sin embargo, no preserva del todo una decisión léxica clave del POB: כָּל קְדֹשָׁיו debe mantenerse como ''todos sus santos/seres santos/consagrados'' solo si no introduce connotaciones eclesiásticas indebidas; en este contexto, ''todos sus santos'' en español tiende más que el inglés a sonar como ''los santos'' en sentido doctrinal/tradicional. ''Todos sus santos'' es posible, pero ''todos sus santos'' además no refleja la justificación explícita del audit trail de evitar ''saints''. Mejor ''todos sus santos consagrados'' sería más interpretativo; la opción más fiel y limpia es ''todos sus santos'' si se aceptara tradición, pero el rationale inglés pide amplitud. Por eso conviene ajustar a ''todos sus santos'' -> ''todos
    sus santos/seres santos'' no es ideal; la mejor reparación es ''todos sus santos'' -> ''todos sus santos'' no resuelve. Se recomienda ''todos sus consagrados'' o ''todos sus santos[a?]'' pero sin nota nueva sería incompleto. Además, falta en español la segunda nota del inglés sobre la rareza de ''recibe/toma de tus palabras''; el borrador puso la nota [b] en ''se sientan'', pero omitió la nota lexical alternativa de la última cláusula. Eso deja sin preservar una dificultad importante documentada en el audit trail.'
  spanish_quality_summary: 'El español es claro, natural y digno. ''Ciertamente'' funciona bien para אַף, y la sintaxis general es legible. No obstante, ''todos sus santos'' suena más eclesiástico y menos transparente que ''todos sus santos/seres santos'' o mejor ''todos sus consagrados'', y la puntuación puede mantenerse igual. La mayor carencia estilístico-editorial es la distribución de notas: la incertidumbre de תֻּכּוּ está bien señalada, pero la rareza de ''recibe tus palabras'' debería también reflejarse con una nota propia anclada en esa frase.'
  glossary_alignment: 'Sin conflictos con Yahvé/Mesías/etc. La principal tensión terminológica es קְדֹשָׁיו: el POB inglés evitó ''saints'' por sus connotaciones; en español ''santos'' crea un problema similar o mayor. Conviene usar ''sus consagrados'' para preservar la amplitud semántica sin importar una categoría eclesiástica específica.'
  issues:
  - severity: medium
    issue: '''todos sus santos'' introduce una connotación eclesiástica/tradicional más fuerte que la justificación del POB permite'
    rationale: El audit trail inglés eligió 'holy ones' precisamente para evitar 'saints'. En español, 'santos' tiende igualmente a evocar una categoría religiosa establecida. 'Consagrados' preserva mejor el sentido de personas apartadas/santas sin estrechar la referencia.
  - severity: high
    issue: Falta la nota sobre la cláusula final 'recibe tus palabras'
    rationale: 'El English POB conservó una nota importante: ''Or each takes up from your words / bears your sayings; the Hebrew expression is rare and difficult.'' El borrador español no la trasladó, perdiendo una incertidumbre textual/lexical significativa.'
  - severity: low
    issue: La nota [a] sobre אַף se aleja un poco del audit trail inglés
    rationale: No es incorrecta, pero el inglés resalta la función aseverativa más que una simple lista de alternativas. Puede afinarse para reflejar mejor el rationale documentado.
  revised_spanish_text: Ciertamente, él ama a los pueblos; todos sus consagrados están en tu mano, y ellos se sientan[a] a tus pies; cada uno recibe[b] tus palabras.
  revised_footnotes:
