  yaml_path: translation/ot/job/030/003.yaml
  text: Through want and hunger they are gaunt[b][a], gnawing the dry ground in the night of desolation and waste.
  footnotes:
  - marker: a
    text: Or 'In want and hunger, they are withered; they scrape at the dry land by night, in desolation and waste.' Several words in this verse are rare and difficult, especially 'gaunt' and 'gnawing.'
