review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia hebrea: presentar los animales delante de Yahvé, que los sacerdotes les echen sal encima, y luego ofrecerlos como sacrificio de ascensión/holocausto a Yahvé. Conserva correctamente el nombre divino «Yahvé» y evita confundir וְהִקְרַבְתָּם con el verbo posterior de ofrecer. Sin embargo, la nota al pie está anclada en «presentarás», cuando la alternativa léxica documentada corresponde a וְהִשְׁלִיכוּ («echarán/arrojarán»), no a וְהִקְרַבְתָּם.'
  spanish_quality_summary: El español es claro y digno, pero conviene mover la nota al verbo correcto y ajustar levemente la frase para que el anclaje sea natural. «Los ofrecerán en holocausto» es comprensible; «los ofrecerán como holocausto» suena un poco más natural y refleja mejor «as a burnt offering».
  glossary_alignment: 'Buena alineación con el glosario del proyecto: יְהוָה → «Yahvé»; הַכֹּהֲנִים → «los sacerdotes»; עֹלָה → «holocausto». La decisión «echarán» para וְהִשְׁלִיכוּ es aceptable, con nota que preserve la fuerza de «arrojar/lanzar» frente a «rociar».'
  issues:
  - severity: medium
    issue: La nota al pie [a] está colocada en «presentarás» en vez de en «echarán».
    rationale: La nota explica la alternativa de וְהִשְׁלִיכוּ («throw/cast»), no la de וְהִקְרַבְתָּם («presentar»). Tal como está, induce a error sobre qué palabra hebrea se está documentando.
  - severity: low
    issue: «en holocausto» es menos natural que «como holocausto».
    rationale: Ambas son posibles, pero «como holocausto» refleja con más claridad la función predicativa de עֹלָה y suena mejor en español contemporáneo.
  revised_spanish_text: Tú los presentarás delante de Yahvé, y los sacerdotes echarán[a] sal sobre ellos y los ofrecerán como holocausto a Yahvé.
  revised_footnotes:
  - marker: a
    text: O «arrojarán» o «lanzarán». El verbo hebreo es literalmente «arrojar/lanzar», no el más específico «rociar».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota al verbo hebreo correspondiente (וְהִשְׁלִיכוּ) y se pule «en holocausto» a «como holocausto» para mayor naturalidad y precisión sin alterar el sentido. No se requiere adjudicación adicional.
