translation:
  language: es
  text: El buen juicio se gana el favor[a], pero el camino de los traicioneros es duro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El buen juicio da favor». El verbo hebreo es literalmente «da», pero también puede expresar que algo resulta en u obtiene favor.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el camino de los traicioneros es áspero» o «rugoso». La última palabra hebrea puede sugerir algo duro, áspero o inflexible.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שֵׂכֶל
  english_pob_choice: good sense
  chosen_spanish: buen entendimiento
  alternatives_spanish:
  - buena prudencia
  - buen juicio
  - buena inteligencia
  lexicon: HALOT
  rationale: El sustantivo apunta a entendimiento práctico, juicio sano o discernimiento. «Buen entendimiento» conserva ese valor sapiencial sin forzar una sola matiz como «prudencia» o «inteligencia».
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: buen
  alternatives_spanish:
  - bueno
  - sano
  - recto
  lexicon: HALOT
  rationale: Funciona atributivamente con שֵׂכֶל. En español, «buen» es natural antes del sustantivo y reproduce bien la valoración positiva del hebreo.
- source_word: יִתֶּן
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - produce
  - obtiene
  - concede
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «dar». En el proverbio, la idea es que el buen entendimiento resulta en favor; «da» preserva la imagen verbal básica sin alejarse del paralelismo.
- source_word: חֵן
  english_pob_choice: favor
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - aceptación
  - benevolencia
  lexicon: HALOT
  rationale: En contexto sapiencial, el término puede referirse a aceptación o favor social. Opté por «gracia» porque en español comunica con soltura el efecto positivo del buen entendimiento y mantiene la amplitud semántica del hebreo; el contexto evita leerlo como gracia teológica estricta.
- source_word: דֶרֶךְ
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - conducta
  - ruta
  - sendero
  lexicon: HALOT
  rationale: Es un término sapiencial estándar para modo de vida o conducta. «Camino» es el equivalente natural en español bíblico y conserva la metáfora.
- source_word: בֹּגְדִים
  english_pob_choice: the treacherous
  chosen_spanish: los traicioneros
  alternatives_spanish:
  - los pérfidos
  - los infieles
  - los desleales
  lexicon: HALOT
  rationale: El participio describe a quienes actúan con traición o deslealtad. «Traicioneros» comunica el carácter del grupo de manera clara y sin suavizar la fuerza moral del término.
- source_word: אֵיתָן
  english_pob_choice: hard
  chosen_spanish: duro
  alternatives_spanish:
  - áspero
  - áspero y duro
  - rugoso
  lexicon: HALOT
  rationale: En este proverbio, el adjetivo contrasta con el favor del primer hemistiquio y sugiere algo áspero, difícil o resistente. «Duro» es breve, natural y mantiene la tensión semántica; «rugoso» sería más literal pero menos idiomático en español.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios sustanciales; esta versión mantiene el sentido proverbial y conserva la alternancia entre el favor del sabio y la dureza del camino del traidor.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto para el nombre divino; este versículo no lo contiene.
  - «Gracia» aquí no pretende sustituir una noción teológica, sino conservar la amplitud de חֵן en lenguaje sapiencial.
  - «Traicioneros» traduce el tipo de persona descrito por el participio hebreo sin introducir una explicación moral adicional.
  - «Duro» conserva la ambigüedad entre difícil, áspero y resistente, tal como indica la nota textual del audit trail.
