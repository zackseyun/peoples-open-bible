revisions:
- from: Porque en la ciudad de refugio permanecerá[a] hasta la muerte del sumo sacerdote, y después de la muerte del sumo sacerdote el homicida[b] volverá a la tierra de su posesión.
  to: Pues debe permanecer en su ciudad de refugio hasta la muerte del sumo sacerdote, y después de la muerte del sumo sacerdote el homicida[a] podrá volver a la tierra de su posesión[b].
  rationale: 'Se ajusta el texto para reflejar con más fidelidad el hebreo y el razonamiento documentado en el POB inglés: se restaura «su» en «su ciudad de refugio», se hace explícita la obligación legal con «debe permanecer», se expresa el permiso restaurado con «podrá volver», y se añade la nota alternativa sobre אֲחֻזָּה. También se simplifica el sistema de notas para concentrarlo en las decisiones léxicas realmente significativas.'
  reviewer_model: gpt-5.4
