  spanish_quality_summary: El español es claro y legible, pero 'Sin la pupila' suena algo anatómico y rígido en un proverbio español; además, con artículo puede sonar menos natural que una formulación existencial. Una leve mejora idiomática hace el refrán más natural sin apartarse del sentido fuente.
