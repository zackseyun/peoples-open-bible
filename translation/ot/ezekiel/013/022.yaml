id: EZK.13.22
reference: Ezekiel 13:22
source:
  edition: WLC
  text: יַ֣עַן הַכְא֤וֹת לֵב צַדִּיק֙ שֶׁ֔קֶר וַ/אֲנִ֖י לֹ֣א הִכְאַבְתִּ֑י/ו וּ/לְ/חַזֵּק֙ יְדֵ֣י רָשָׁ֔ע לְ/בִלְתִּי שׁ֛וּב מִ/דַּרְכּ֥/וֹ הָ/רָ֖ע לְ/הַחֲיֹתֽ/וֹ־־׃
translation:
  text: Because you have disheartened the heart of the righteous with falsehood[a], though I had not caused him grief, and because you have strengthened the hands of the wicked so that he does not turn from his evil way to preserve his life[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with lies.' The Hebrew noun can be rendered 'falsehood' or more concretely 'lies.'
    reason: lexical_alternative
  - marker: b
    text: Or 'that he might live' / 'and live.' The Hebrew can be read more literally this way.
    reason: alternative_reading
lexical_decisions:
- source_word: יַעַן
  chosen: Because
  alternatives:
  - Since
  - Forasmuch as
  lexicon: HALOT
  rationale: Introduces the reason for the judgment in the surrounding context. 'Because' is natural modern English and preserves the causal force.
- source_word: הַכְאֹות
  chosen: you have disheartened
  alternatives:
  - you have pained
  - you have hurt
  - you have made sad
  lexicon: HALOT
  rationale: From כאב in a causative form, with 'heart' as object. In English, 'disheartened the heart' captures emotional injury without sounding wooden; it also fits the contrast with God's statement that he had not caused such grief.
- source_word: לֵב צַדִּיק
  chosen: the heart of the righteous
  alternatives:
  - the righteous man's heart
  - the heart of a righteous man
  lexicon: HALOT
  rationale: Construct phrase retained fairly formally. 'The righteous' preserves the adjectival substantive without unnecessarily individualizing beyond the Hebrew.
- source_word: שֶׁקֶר
  chosen: with falsehood
  alternatives:
  - falsely
  - by lies
  - with lies
  lexicon: HALOT
  rationale: '''Falsehood'' renders the noun directly and keeps the instrumental sense. ''With lies'' is possible, but ''falsehood'' better reflects the abstract noun and the broader deceptive activity of the false prophetesses in context.'
- source_word: וַאֲנִי לֹא הִכְאַבְתִּיו
  chosen: though I had not caused him grief
  alternatives:
  - when I had not grieved him
  - though I had not pained him
  lexicon: HALOT
  rationale: The clause contrasts their wrongful discouragement with God's own stance toward the righteous. 'Caused him grief' is idiomatic and preserves the causative nuance of the verb with 3ms suffix.
- source_word: וּלְחַזֵּק יְדֵי רָשָׁע
  chosen: and because you have strengthened the hands of the wicked
  alternatives:
  - and strengthened the hands of a wicked man
  - and encouraged the wicked
  lexicon: HALOT
  rationale: '''Strengthened the hands'' is a common Hebrew idiom for emboldening or encouraging; it is transparent enough in English to preserve the imagery. Singular ''the wicked'' reflects the Hebrew singular adjective used substantivally.'
- source_word: לְבִלְתִּי שׁוּב
  chosen: so that he does not turn
  alternatives:
  - preventing him from turning
  - so as not to turn
  lexicon: HALOT
  rationale: 'Expresses result/purpose: the wicked is emboldened in such a way that he does not turn back. This wording is clear and preserves the moral-turning sense of שוב.'
- source_word: מִדַּרְכּוֹ הָרָע
  chosen: from his evil way
  alternatives:
  - from his evil path
  - from his wicked way
  lexicon: HALOT
  rationale: Standard prophetic idiom for sinful conduct. 'Way' is the most established and accurate rendering for דרך in this ethical sense.
- source_word: לְהַחֲיֹתוֹ
  chosen: to preserve his life
  alternatives:
  - that he might live
  - and live
  - to save his life
  lexicon: HALOT
  rationale: 'The infinitive can express the outcome of turning: turning from evil in order to live. ''Preserve his life'' makes explicit the life-preserving force in context, while avoiding over-interpretation about eternal versus temporal life.'
