translation:
  language: es
  text: Y cuando terminaron de ofrecer, el rey y todos los que estaban presentes con él se arrodillaron y adoraron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וּ/כְ/כַלּ֖וֹת
  english_pob_choice: And when they had finished
  chosen_spanish: Y cuando terminaron
  alternatives_spanish:
  - Y al terminar
  - Y cuando hubieron terminado
  lexicon: HALOT
  rationale: La construcción temporal marca la secuencia inmediata de la acción. 'Cuando terminaron' conserva el valor temporal sin sonar forzado en español.
- source_word: לְ/הַעֲל֑וֹת
  english_pob_choice: offering
  chosen_spanish: de ofrecer
  alternatives_spanish:
  - de presentar
  - de ofrecer en holocausto
  lexicon: HALOT
  rationale: El hebreo usa el infinitivo causativo de עלה en contexto sacrificial. En español, 'ofrecer' comunica la acción cultual sin añadir un objeto explícito que el hebreo aquí no repite.
- source_word: כָּרְע֗וּ
  english_pob_choice: knelt down
  chosen_spanish: se arrodillaron
  alternatives_spanish:
  - doblaron la rodilla
  - se inclinaron
  lexicon: HALOT
  rationale: כָּרַע expresa arrodillarse o doblar la rodilla. 'Se arrodillaron' es natural y distingue esta postura física del verbo siguiente de adoración/prostración.
- source_word: הַ/מֶּ֛לֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Correspondencia directa y natural del sustantivo definido.
- source_word: וְ/כָֽל הַ/נִּמְצְאִ֥ים אִתּ֖/וֹ
  english_pob_choice: and all who were present with him
  chosen_spanish: y todos los que estaban con él
  alternatives_spanish:
  - y todos los presentes con él
  - y todos los hallados con él
  lexicon: HALOT
  rationale: El participio nifal de מצא aquí designa a los que estaban presentes o en asistencia. 'Estaban con él' preserva la naturalidad del español y el sentido de compañía/presencia.
- source_word: וַ/יִּֽשְׁתַּחֲוֽוּ
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - se postraron
  - se inclinaron en adoración
  lexicon: HALOT
  rationale: En este contexto de templo y sacrificio, el verbo incluye un acto de reverencia que puede equivaler a adoración. 'Adoraron' conserva la fuerza religiosa del acto; la postura corporal ya quedó expresada con 'se arrodillaron'.
theological_decisions:
- issue: Diferenciar la postura física de la respuesta cultual
  english_pob_reading: worshiped, with 'knelt down' carrying the bodily posture
  chosen_spanish_reading: se arrodillaron y adoraron
  alternative_spanish_readings:
  - se postraron y adoraron
  - se inclinaron y adoraron
  rationale: 'El hebreo usa dos verbos distintos: uno para arrodillarse y otro para inclinarse/prostrarse en acto de culto. La versión española mantiene esa distinción para no diluir el paralelismo y para preservar el sentido litúrgico del pasaje.'
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que simplifica el objeto implícito de la acción sacrificial a 'ofrecer' en lugar de explicitar 'holocausto'. Por eso el español evita añadir 'holocausto' y se mantiene fiel al hebreo disponible.
  spanish_consistency_notes:
  - Se mantiene 'adoraron' para el gesto cultual final, en consonancia con el contexto del templo.
  - Se evita 'SEÑOR' porque no aparece el Tetragrámaton ni una cita de κύριος en este versículo.
  - No se introduce terminología sacrificial más específica que la que el hebreo repite en este punto.
