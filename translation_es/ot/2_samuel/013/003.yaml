  yaml_path: translation/ot/2_samuel/013/003.yaml
  text: Now Amnon had a friend[a], whose name was Jonadab son of Shimeah, David’s brother; and Jonadab was a very shrewd man.
  footnotes:
  - marker: a
    text: Or 'a very wise man' or 'a very clever man.' The Hebrew can denote wisdom broadly; 'shrewd' is chosen here because the narrative soon presents Jonadab’s insight in a morally dubious way.
