translation:
  text: Jesus said[1], "I stood in the midst of the world, and I appeared to them
    in flesh.[1] I found them all drunk; I found not one of them thirsting.[2] And
    my soul was pained over the children of humanity,[3] for they are blind in their
    heart and they do not see that they came into the world empty, seeking also to
    go out of the world empty.[4] But now they are drunk. When they have shaken off
    their wine[a][5][4][3][2], then they will repent."[5]
  philosophy: optimal-equivalence
  footnotes:
  - marker: '1'
    text: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ can mean ‘shone forth’ or ‘was manifested’; ‘appeared’ balances
      literal sense and English idiom.
    reason: lexical_alternative
  - marker: '2'
    text: The Coptic construction is compressed; the Greek POxy witness reads explicitly
      ‘I found not one thirsting among them,’ which supports the negative sense taken
      here.
    reason: textual_variant
  - marker: '3'
    text: Lit. ‘sons of men’ in the Greek fragment; the Coptic has ‘children of the
      human,’ here rendered inclusively as ‘children of humanity.’
    reason: cross_reference
  - marker: '4'
    text: ⲉⲓ … ⲉⲃⲟⲗ is literally ‘go out’; ‘leave’ is a possible alternative.
    reason: lexical_alternative
  - marker: '5'
    text: The idiom ‘shake off their wine’ renders ⲛⲟⲩϩⲉ with ⲡⲉⲩⲏⲣⲡ as object; alternatives
      include ‘when the wine leaves them’ or ‘when they sober up.’
    reason: lexical_alternative
  - marker: a
    text: Or 'and that they also seek'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲱϩⲉ
  chosen: stood
  alternatives:
  - took my stand
  - was standing
  lexicon: Crum; Layton
  rationale: Perfect of ⲱϩⲉ regularly means to take one’s stand; straightforward English
    "stood" preserves terseness.
- source_word: ⲉⲣⲁⲧ ϩⲛⲡⲙⲏⲧⲉ
  chosen: in the midst
  alternatives:
  - in the middle
  lexicon: Layton
  rationale: Set phrase ‘stand in the midst’; ‘midst’ preserves the marked, formal
    tone.
- source_word: ⲕⲟⲥⲙⲟⲥ
  chosen: world
  alternatives:
  - cosmos
  lexicon: Crum
  rationale: Common Coptic loan; ‘world’ is idiomatic while retaining scope.
- source_word: ⲟⲩⲱⲛϩ ⲉⲃⲟⲗ
  chosen: appeared
  alternatives:
  - shone forth
  - was manifested
  lexicon: Crum
  rationale: ⲟⲩⲱⲛϩ can mean ‘shine, be manifest’; ‘appeared’ balances literal sense
    and English idiom.
- source_word: ϩⲛⲥⲁⲣⲝ
  chosen: in flesh
  alternatives:
  - in a body
  lexicon: Crum
  rationale: Sahidic ‘flesh’ (Greek loan) is deliberately stark; retain literal phrasing.
- source_word: ⲧⲏⲣⲛⲧⲟⲟⲩ
  chosen: all (of them)
  alternatives:
  - every one of them
  lexicon: Layton
  rationale: Plural totality marker; render compactly as ‘all (of them).’
- source_word: ⲧⲁϩⲟ / ⲧⲟϩⲉ
  chosen: drunk
  alternatives:
  - intoxicated
  lexicon: Crum
  rationale: Both spellings reflect the same lexeme; ‘drunk’ is concise and concrete,
    matching the image with ‘wine.’
- source_word: ⲡⲓϩⲉ
  chosen: wine
  alternatives: []
  lexicon: Crum
  rationale: Standard term for wine; retain literal object of intoxication.
- source_word: ⲗⲁⲁⲩ (ⲉⲗⲁⲁⲩ ⲛ̄ϩⲏⲧⲟⲩ)
  chosen: thirsting (in their heart)
  alternatives:
  - thirsty (within)
  - yearning (inwardly)
  lexicon: Crum
  rationale: Verb ‘to thirst’ modified by ‘in their heart’ indicates inner desire;
    rendered as progressive ‘thirsting’ to echo Greek witness and keep vividness.
- source_word: ⲯⲩⲭⲏ
  chosen: soul
  alternatives:
  - life
  - self
  lexicon: Crum
  rationale: Loanword often denotes inner life; ‘soul’ fits with pain/affliction idiom
    (ϯⲧⲕⲁⲥ).
- source_word: ϯⲧⲕⲁⲥ
  chosen: was pained
  alternatives:
  - was distressed
  - grieved
  lexicon: Crum
  rationale: Idiomatic expression with subject ‘my soul’; ‘was pained’ preserves strong
    affect.
- source_word: ⲃⲗⲗⲉ
  chosen: blind
  alternatives:
  - blindfolded
  - darkened
  lexicon: Crum
  rationale: Basic sense ‘blind’; fits inner blindness with ‘in their heart.’
- source_word: ϩⲏⲧ
  chosen: heart
  alternatives:
  - inner self
  - mind
  lexicon: Crum
  rationale: Standard rendering; retains idiomatic ‘blind in their heart.’
- source_word: ⲛⲁⲩ ⲉⲃⲟⲗ
  chosen: see
  alternatives:
  - perceive
  lexicon: Crum
  rationale: Common verb ‘to see’; ‘do not see’ preserves literalness and terseness.
- source_word: ϣⲟⲩⲟ (predicative)
  chosen: empty
  alternatives:
  - void
  - hollow
  lexicon: Crum
  rationale: Predicate adjective; ‘empty’ is the conventional, crisp equivalent.
- source_word: ⲥⲓⲛⲉ
  chosen: seek
  alternatives:
  - try
  - attempt
  lexicon: Crum
  rationale: Active pursuit; ‘seek’ fits Thomasine diction.
- source_word: ⲉⲃⲟⲗ (with ⲉⲓ)
  chosen: go out
  alternatives:
  - leave
  - depart
  lexicon: Layton
  rationale: Motion away; ‘go out’ preserves prepositional color of ⲉⲃⲟⲗ.
- source_word: ⲧⲉⲛⲟⲩ
  chosen: now
  alternatives:
  - at present
  lexicon: Crum
  rationale: Temporal adverb; concise.
- source_word: ⲛⲟⲩϩⲉ (ⲡⲉⲩⲏⲣⲡ as object)
  chosen: shaken off (their wine)
  alternatives:
  - put off (their wine)
  - when the wine leaves them
  - when they sober up
  lexicon: Crum
  rationale: Context favors the image of casting off wine’s hold; ‘shake off’ preserves
    vivid metaphor and unusual phrasing.
- source_word: ⲙⲉⲧⲁⲛⲟⲉⲓ
  chosen: repent
  alternatives:
  - change their mind
  lexicon: Crum; Lambdin
  rationale: Standard loan; ‘repent’ is established and terse.
textual_note: 'Dialect/orthography: Sahidic with Lycopolitan features. Note ⲧⲏⲣⲛⲧⲟⲟⲩ
  (‘all of them’) and variation ⲧⲁϩⲉ/ⲧⲟϩⲉ for ‘be drunk.’ The printed line shows ⲉⲗⲁⲁⲩ
  ⲛ̄ϩⲏⲧⲟⲩ (‘thirst in their heart’), while the lemmatized lines segment this differently
  (ϩⲛⲛⲧⲟⲟⲩ), but the sense is inner thirst. There are no lacunae in this saying in
  NHC II; punctuation mid-saying (·) at lb 27 marks a clause break. The clause about
  ‘not one thirsting’ lacks an explicit negative particle in the immediate phrase
  in Coptic, but the following blindness clause and the Greek POxy witness support
  the negative interpretation. The final clause uses ⲛⲟⲩϩⲉ with object ⲡⲉⲩⲏⲣⲡ (‘their
  wine’), an unusual but vivid idiom rendered ‘shake off their wine.’'
