review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y sentido general del hebreo: כִּי como base causal, בָּחַר como elección divina, לּוֹ con matiz reflexivo/posesivo, y לִסְגֻלָּתוֹ como pertenencia especial. Sin embargo, hay dos ajustes necesarios: (1) el hebreo usa específicamente יָהּ, la forma corta del nombre divino, por lo que en español conviene preservarla en el texto principal como «Yah», no expandirla a «Yahvé»; (2) la nota actual queda incoherente porque ancla [a] a «sí mismo» cuando en realidad explica el nombre divino.'
  spanish_quality_summary: El español es claro y natural, pero «posesión preciosa» suena algo débil y menos idiomático que «posesión preciada» para expresar סְגֻלָּה. Además, la ubicación de la nota debe moverse al nombre divino para que el lector entienda correctamente la observación lexical.
  glossary_alignment: En general alinea bien con la terminología del proyecto, salvo la excepción importante de יָהּ. Aunque el estándar general es «Yahvé» para יהוה/YHWH, aquí la evidencia fuente y el audit trail inglés subrayan que se trata de la forma corta «Yah», y debe preservarse. «Jacob», «Israel» y el valor de «posesión/tesoro especial» están bien encaminados.
  issues:
  - severity: high
    issue: La forma corta divina יָהּ se tradujo como «Yahvé» en vez de «Yah».
    rationale: El texto fuente no tiene el tetragrámaton pleno sino יָהּ, y el audit trail inglés revisó explícitamente a «Yah» para reflejarlo con precisión. Expandirlo a «Yahvé» pierde una distinción poética y lexical significativa.
  - severity: medium
    issue: La nota [a] está anclada en «sí mismo» pero explica el nombre divino.
    rationale: 'La nota dice «Hebreo: “Yah”, la forma corta del nombre divino», por lo que debe colocarse junto a «Yah», no junto a «para sí mismo». Tal como está, crea confusión.'
  - severity: low
    issue: «Posesión preciosa» podría mejorarse a «posesión preciada».
    rationale: Ambas son aceptables, pero «posesión preciada» suena más natural y más cercana al matiz de pertenencia valiosa/especial de סְגֻלָּה en español bíblico moderno.
  revised_spanish_text: Pues Yah[a] ha escogido a Jacob para sí mismo, a Israel como su posesión preciada.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «Yah», la forma corta del nombre divino.'
    reason: lexical_alternative
  revision_rationale: Se corrige «Yahvé» a «Yah» para preservar la forma corta יָהּ atestiguada en el hebreo y en la revisión inglesa auditada. Se reubica la nota al nombre divino, que es lo que realmente explica. También se pule «posesión preciosa» a «posesión preciada» por naturalidad y mejor correspondencia con סְגֻלָּה.
