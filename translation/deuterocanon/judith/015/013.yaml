  text: καὶ ἔδωκαν τῇ Ἰουδεὶθ τὴν σκηνὴν Ὀλοφέρνου καὶ πάντα τὰ ἀργυρώματα καὶ τὰς κλίνας καὶ τὰ ὅλκια καὶ πάντα τὰ σκευάσματα αὐτοῦ· καὶ λαβοῦσα αὕτη ἐπέθηκεν ἐπὶ τὴν ἡμίονον αὐτῆς, καὶ ἔζευξεν τὰς ἁμάξας αὐτῆς, καὶ ἐσώρευσεν αὐτὰ ἐπʼ αὐτῶν.
