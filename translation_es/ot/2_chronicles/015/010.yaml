translation:
  language: es
  text: Así se reunieron en Jerusalén en el tercer mes, en el año decimoquinto del reinado de Asa.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  english_pob_choice: So they gathered
  chosen_spanish: Así se reunieron
  alternatives_spanish:
  - Y se reunieron
  - Entonces se juntaron
  - Fueron reunidos
  lexicon: HALOT
  rationale: El nifal de קבץ expresa reunión colectiva dentro de la secuencia narrativa. «Se reunieron» conserva el valor colectivo de forma natural en español; «así» refleja el avance del waw-consecutivo sin sonar mecánico. «Fueron reunidos» es posible, pero desplaza demasiado el matiz hacia una pasividad explícita.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: Nombre propio bíblico
  rationale: Se usa la forma española estándar del topónimo, plenamente inteligible y tradicional en español bíblico.
- source_word: בַּחֹדֶשׁ הַשְּׁלִישִׁי
  english_pob_choice: in the third month
  chosen_spanish: en el tercer mes
  alternatives_spanish:
  - en mes tercero
  lexicon: HALOT
  rationale: La expresión temporal es directa y se vierte de manera idiomática en español. «En el tercer mes» mantiene la referencia calendárica sin calco innecesario.
- source_word: לִשְׁנַת חֲמֵשׁ עֶשְׂרֵה
  english_pob_choice: in the fifteenth year
  chosen_spanish: en el año quince
  alternatives_spanish:
  - en el año decimoquinto
  - en el año quince de
  lexicon: HALOT
  rationale: En datación regnal, el sentido es cronológico; en español «año quince» es natural y fiel. Se evita «decimoquinto» por sonar más marcado sin aportar precisión adicional.
- source_word: לְמַלְכ֥וּת אָסָֽא
  english_pob_choice: of Asa's reign
  chosen_spanish: del reinado de Asa
  alternatives_spanish:
  - de la realeza de Asa
  - del reino de Asa
  lexicon: HALOT
  rationale: מַלְכוּת aquí nombra el período de gobierno, no el «reino» como territorio. «Reinado» preserva mejor la fuerza cronológica de la fórmula y evita confusión con el ámbito político-geográfico.
theological_decisions:
- issue: Fórmula de datación regnal
  english_pob_reading: in the fifteenth year of Asa's reign
  chosen_spanish_reading: en el año quince del reinado de Asa
  alternative_spanish_readings:
  - en el decimoquinto año del reinado de Asa
  - en el año quince de Asa
  rationale: No hay tensión doctrinal, pero sí una decisión de precisión histórica. La formulación española conserva el valor de marcador cronológico del hebreo sin expandir el sentido más allá de una datación regnal.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto inglés auditado y la revisión más reciente muestran alta concordancia y ningún cambio necesario; la versión española sigue esa lectura sin introducir variantes no respaldadas.
  spanish_consistency_notes:
