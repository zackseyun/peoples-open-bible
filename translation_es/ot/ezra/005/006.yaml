revisions:
- from: Esta es una copia de la carta que Tatenai[a], gobernador del Más Allá del Río, y Setar-bosnai y sus asociados, los funcionarios que estaban en el Más Allá del Río, enviaron al rey Darío.
  to: Esta es una copia de la carta que Tatenai[a], gobernador de la región de Más Allá del Río, y Setar-bozenai y sus asociados, los funcionarios que estaban en Más Allá del Río, enviaron al rey Darío.
  rationale: Se revisa la designación territorial para conservar su carácter administrativo de manera más natural en español, evitando un calco rígido. También se ajusta la transliteración del nombre compuesto para mayor fidelidad y consistencia con la auditoría. La nota alternativa se mantiene, con su marcador correctamente anclado en el nombre al que modifica, igual que en el POB en inglés.
