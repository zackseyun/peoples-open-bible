translation:
  language: es
  text: desde los treinta años de edad y en adelante, y hasta los cincuenta años de edad, todo el que entra[a] en el servicio[b] para la obra en la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "todo el que se presenta para el deber". El participio hebreo puede enfatizar a quienes se presentan o entran en el servicio asignado.'
    reason: lexical_alternative
  - marker: b
    text: '"Servicio" traduce un término que puede denotar deber organizado, con matices militares en otros contextos; aquí se refiere al servicio levítico.'
    reason: cultural_note
lexical_decisions:
- source_word: מִבֶּן ... שְׁלֹשִׁים שָׁנָה
  english_pob_choice: from thirty years old
  chosen_spanish: desde los treinta años de edad
  alternatives_spanish:
  - a partir de los treinta años
  - desde la edad de treinta años
  lexicon: HALOT
  rationale: El hebreo בן + numeral + שָׁנָה expresa edad. En español, 'años de edad' comunica naturalmente la edad mínima sin perder el sentido idiomático.
- source_word: וָמַעְלָה
  english_pob_choice: and upward
  chosen_spanish: y en adelante
  alternatives_spanish:
  - y hacia arriba
  - y más
  lexicon: HALOT
  rationale: La expresión marca un límite inferior inclusivo. 'En adelante' suena natural en español y conserva la idea de continuidad desde esa edad.
- source_word: וְעַד בֶּן חֲמִשִּׁים שָׁנָה
  english_pob_choice: and up to fifty years old
  chosen_spanish: y hasta los cincuenta años de edad
  alternatives_spanish:
  - y hasta cumplir cincuenta años
  - y hasta los cincuenta años
  lexicon: HALOT
  rationale: La frase fija el límite superior de edad. 'Hasta los cincuenta años de edad' mantiene el rango con claridad y sin añadir matices no presentes.
- source_word: כָּל הַבָּא
  english_pob_choice: everyone who enters
  chosen_spanish: todo el que entra
  alternatives_spanish:
  - todo el que se presenta
  - todos los que entran
  lexicon: HALOT
  rationale: El participio substantivado de בוא puede enfatizar a quienes se presentan o entran para el servicio. 'Todo el que entra' preserva la amplitud del grupo y funciona bien en español; la nota permite la alternativa de 'se presenta'.
- source_word: לַצָּבָא
  english_pob_choice: for service
  chosen_spanish: al servicio
  alternatives_spanish:
  - para el servicio
  - para la tarea asignada
  - para el deber
  lexicon: HALOT
  rationale: En este contexto levítico, צָבָא denota servicio ordenado o deber organizado, no un host militar literal. 'Al servicio' refleja la función sin militarizar el término. Se mantiene la posibilidad de 'deber' en la nota.
- source_word: לַעֲבֹדָה
  english_pob_choice: for the work
  chosen_spanish: para la obra
  alternatives_spanish:
  - para el trabajo
  - para el servicio
  lexicon: HALOT
  rationale: עֲבֹדָה puede significar trabajo o servicio. 'Obra' conserva el sustantivo con dignidad y distingue este término del anterior לַצָּבָא, evitando colapsar ambos en una sola idea.
- source_word: בְּאֹהֶל מוֹעֵד
  english_pob_choice: in the tent of meeting
  chosen_spanish: en el tabernáculo de reunión
  alternatives_spanish:
  - en la tienda de reunión
  - en el tabernáculo del encuentro
  lexicon: HALOT
  rationale: '''Ohel mo''ed'' es la fórmula cultual tradicional. ''Tabernáculo de reunión'' es comprensible en español bíblico y refleja el lugar de encuentro señalado por el texto; se mantiene la opción de ''tienda de reunión'' como alternativa más literal.'
theological_decisions:
- issue: Naturaleza de לַצָּבָא en contexto levítico
  english_pob_reading: for service; the Hebrew can denote organized duty, sometimes with military overtones; here it refers to Levitical service.
  chosen_spanish_reading: al servicio
  alternative_spanish_readings:
  - al deber
  - al servicio organizado
  rationale: Se evita una lectura militar literal porque el contexto es cultual y levítico. 'Al servicio' comunica la idea de obligación ordenada sin perder el trasfondo de deber asignado.
  doctrine_reference: Números 4:3, 23, 30, 35, 39-40; servicio levítico reglamentado
- issue: Relación entre לַצָּבָא y לַעֲבֹדָה
  english_pob_reading: '''for service'' ... ''for the work'' preserves the parallel structure and avoids collapsing two distinct terms into one.'
  chosen_spanish_reading: al servicio ... para la obra
  alternative_spanish_readings:
  - para el servicio ... para el trabajo
  - al deber ... para el servicio
  rationale: Se conserva la distinción entre pertenecer al cuerpo de servicio y realizar la obra concreta en el tabernáculo. 'Servicio' y 'obra' mantienen la paralelidad semántica del hebreo.
  doctrine_reference: Estructura cultual levítica en Números 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que cambió 'comes for service' a 'enters the service' para una traducción más natural y precisa de לַצָּבָא; por eso el español usa 'entra al servicio' en vez de una expresión más genérica como 'viene para el servicio'.
  spanish_consistency_notes:
  - Se mantiene 'tabernáculo de reunión' para la fórmula fija בְּאֹהֶל מוֹעֵד.
  - Se evita 'SEÑOR' y otros reemplazos no presentes en este versículo.
  - Se conserva la distinción entre 'servicio' (לַצָּבָא) y 'obra' (לַעֲבֹדָה).
