translation:
  language: es
  text: Entonces Samuel convocó al pueblo a Yahvé en Mizpa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «convocó al pueblo ante Yahvé en Mizpa». El verbo hebreo puede expresar tanto «llamar» como «convocar una asamblea».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּצְעֵק
  english_pob_choice: called ... together
  chosen_spanish: convocó
  alternatives_spanish:
  - llamó
  - reunió
  - citó
  lexicon: HALOT
  rationale: El verbo hebreo, en este contexto narrativo con objeto directo y destino, expresa la acción de reunir o hacer comparecer a una asamblea. «Convocó» conserva el sentido de convocatoria sin volver la frase pesada o demasiado literal.
- source_word: אֶת הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo reunido
  - a la gente
  - a la asamblea
  lexicon: HALOT
  rationale: עָם aquí designa al conjunto del pueblo de Israel. «Al pueblo» es natural en español y mantiene el referente colectivo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: ante
  alternatives_spanish:
  - a
  - junto a
  - para con
  lexicon: HALOT
  rationale: Aunque la preposición básica es «a/para», en esta construcción la reunión se realiza en presencia de Yahvé. «Ante» comunica mejor el valor relacional y cultual que el español necesita aquí sin perder la dirección implícita del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la transliteración preferida del nombre divino. «Yahvé» preserva el Tetragrámaton como nombre propio, no como título sustitutivo.
- source_word: הַמִּצְפָּה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - en Mispá
  - a Mizpa
  - en la atalaya
  lexicon: HALOT
  rationale: Aquí מִצְפָּה funciona como topónimo. En español bíblico es más natural «en Mizpa» para indicar el lugar de la asamblea; se evita traducirlo como sustantivo común porque el contexto exige el nombre propio.
theological_decisions:
- issue: Nombre divino en la reunión cultual
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: El texto hebreo usa directamente יְהוָה. La decisión del POB en inglés de conservar «Yahweh» se traslada a «Yahvé» en español para mantener el nombre personal del Dios del pacto, no una sustitución honorífica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahweh'
- issue: Valor del verbo de convocatoria
  english_pob_reading: called the people together
  chosen_spanish_reading: convocó al pueblo
  alternative_spanish_readings:
  - reunió al pueblo
  - llamó al pueblo juntos
  rationale: 'La lectura inglesa nota que el verbo puede denotar llamar o convocar una asamblea. En español, «convocó» conserva esa tensión: puede implicar tanto llamar como reunir, sin borrar el matiz de acto formal de asamblea.'
  doctrine_reference: HALOT, entrada de צעק; nota lexical del POB inglés
translation_notes:
  revision_awareness: El pasaje coincide con la revisión inglesa más reciente, que no introdujo cambios respecto del borrador anterior; por eso la traducción española sigue de cerca la solución auditada y mantiene la misma decisión sobre el nombre divino y el matiz de convocatoria.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para יְהוָה, conforme al criterio del proyecto.
  - «Mizpa» se conserva como topónimo y no como «atalaya», porque el contexto es locativo propio.
  - «Convocó» busca equilibrar naturalidad española y la alternativa lexical documentada entre llamar y reunir.
