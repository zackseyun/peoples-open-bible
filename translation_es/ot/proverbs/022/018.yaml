translation:
  language: es
  text: Porque es agradable si los guardas dentro de ti[a], si quedan establecidos juntos en tus labios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en tu vientre», una expresión hebrea para la persona interior.
    reason: cultural_note
  - marker: b
    text: 'O: «si están listos juntos en tus labios». El verbo puede enfatizar establecimiento firme o disposición para hablar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o motivación que sigue a la exhortación anterior; «Porque» conserva bien ese valor explicativo en español natural.
- source_word: נָעִים
  english_pob_choice: pleasant
  chosen_spanish: agradable
  alternatives_spanish:
  - delicioso
  - suave
  lexicon: HALOT
  rationale: Expresa la idea de algo deleitoso o grato sin sonar artificial en español contemporáneo.
- source_word: תִשְׁמְרֵם
  english_pob_choice: you keep them
  chosen_spanish: los guardas
  alternatives_spanish:
  - los conservas
  - los preservas
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, conservar o retener; «los guardas» mantiene la fuerza de custodiar y conservar los dichos en el interior.
- source_word: בְּבִטְנֶךָ
  english_pob_choice: within you
  chosen_spanish: dentro de ti
  alternatives_spanish:
  - en tu vientre
  - en tus entrañas
  - en tu interior
  lexicon: HALOT
  rationale: Literalmente es «en tu vientre», pero en la antropología hebrea apunta al hombre interior. «Dentro de ti» preserva la referencia interna sin importar demasiado el sentido a «corazón».
- source_word: יִכֹּנוּ
  english_pob_choice: they will be established
  chosen_spanish: quedan firmemente establecidos
  alternatives_spanish:
  - serán establecidos
  - quedarán preparados
  - se afirmarán
  lexicon: HALOT
  rationale: El nifal de כון expresa ser puesto firme, establecido o preparado. «Quedan firmemente establecidos» conserva la idea de estabilidad y de disposición lista para hablar.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - todos juntos
  - como uno
  lexicon: HALOT
  rationale: Adverbio de unidad colectiva; «juntos» es la forma más natural en español.
- source_word: עַל שְׂפָתֶיךָ
  english_pob_choice: on your lips
  chosen_spanish: sobre tus labios
  alternatives_spanish:
  - en tus labios
  - a tus labios
  lexicon: HALOT
  rationale: Conserva la imagen hebrea del habla o recitación pronta. «Sobre tus labios» mantiene mejor el paralelismo espacial del original.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del inglés POB al mantener dos cláusulas condicionales paralelas, reflejando mejor la estructura hebrea que la lectura con punto y coma. También conserva la tensión léxica entre «guardar» en el interior y la imagen de estar establecido/preparado para la խոսla.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología no presente en el versículo.
  - Se prefirió «agradable» a «delicioso» para un registro bíblico claro y sobrio.
  - Se conservó la metáfora corporal «dentro de ti» con nota explicativa sobre el hebreo.
  - «Sobre tus labios» respeta la imagen del texto y permite la alternativa de disposición para hablar en nota.
