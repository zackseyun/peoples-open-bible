base_translation:
  language: en
  yaml_path: translation/ot/exodus/006/006.yaml
  text: Therefore say to the sons of Israel[a], ‘I am Yahweh, and I will bring you out from under the burdens of Egypt, and I will deliver you from their slavery[d][c][b], and I will redeem you with an outstretched arm and with great judgments.’
  footnotes:
  - marker: a
    text: Or 'children of Israel' or 'Israelites.' The Hebrew reads literally 'sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; rendered 'the LORD' following the project's standard practice.
    reason: alternative_reading
  - marker: c
    text: Or 'from their bondage.' The Hebrew term can denote service or labor, but here refers to oppressive servitude.
    reason: lexical_alternative
  - marker: d
    text: Or 'with great acts of judgment.'
    reason: lexical_alternative
