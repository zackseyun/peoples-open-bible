  rationale: Se corrige el anclaje de la nota [a] para que corresponda al término geográfico que comenta, y se ajusta la frase a «sobre el valle del Arnón» para reflejar mejor el hebreo אֲשֶׁר עַל נַחַל אַרְנֹן con español natural y formal. El resto del texto es fiel y no requiere cambios.
