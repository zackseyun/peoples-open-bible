base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/023/009.yaml
  text: Then Jehoiada the priest gave to the commanders of hundreds the spears[a], the shields, and the large shields that belonged to King David[c][b], which were in the house of God.
  footnotes:
  - marker: a
    text: Or 'the captains of hundreds.' The Hebrew refers to military officers over units of one hundred.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew distinguishes between 'shields' and another defensive item here rendered 'large shields.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the temple of God.' Literally, 'the house of God.'
    reason: lexical_alternative
