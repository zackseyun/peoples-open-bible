    reason: alternative_reading
  revision_rationale: 'Se revisa para mejorar la naturalidad y precisión del español sin cambiar el sentido ni las decisiones teológicas del original auditado: «mudos» expresa mejor ἀφώνους que «sin voz»; «sufrirán dolor» evita el calco poco idiomático «estarán en dolor»; y «hasta el extremo» fluye mejor que «hasta lo más extremo» para ἕως ἐσχάτου.'
