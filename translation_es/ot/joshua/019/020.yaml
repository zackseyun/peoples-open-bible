review_pass:
  verdict: revise
  source_alignment_summary: 'El hebreo de Josué 19:20 es una simple lista de tres topónimos unidos por polisíndeton: הָרַבִּית, קִשְׁיוֹן, אָבֶץ. El borrador español conserva correctamente la estructura enumerativa con «y ... y ... y ...» y mantiene las notas alternativas del POB inglés. Sin embargo, dos transliteraciones principales se apartan innecesariamente de la evidencia fuente y de la línea auditada en inglés: «Rabit» reduce indebidamente la geminación/forma tradicional detrás de Rabbith, y «Quisión» adapta demasiado קִשְׁיוֹן, alejándose de una transliteración reconocible del topónimo.'
  spanish_quality_summary: 'El español es legible, pero en listas toponímicas la prioridad no es la naturalización fonética sino una transliteración fiel y estable. «Quisión» suena más española, pero introduce una castellanización excesiva; «Rabit» también simplifica demasiado. Una forma como «Rabit»/«Quisión» podría dificultar la trazabilidad con recursos bíblicos y con el propio audit trail inglés. Mejor usar formas más transparentes: «Rabith» y «Kisión».'
  glossary_alignment: No hay términos teológicos aquí. En nombres propios, el proyecto pide trabajar desde la evidencia fuente y el audit trail inglés, transliterando en vez de traducir. «Ebez» está bien y la nota sobre «Abez» se preserva correctamente. La nota de «Harabit» debe ajustarse a la forma principal revisada.
  issues:
  - severity: medium
    issue: «Rabit» como forma principal de הָרַבִּית
    rationale: La forma principal inglesa auditada es «Rabbith», con alternativa «Harabbith». En español puede simplificarse moderadamente, pero «Rabit» elimina demasiado la forma reconocible del topónimo. «Rabith» conserva mejor la correspondencia y sigue siendo legible.
  - severity: medium
    issue: «Quisión» como forma principal de קִשְׁיוֹן
    rationale: La castellanización con «Qu-» se aleja de la transliteración base «Kishion» sin necesidad. En una lista de lugares conviene una forma más trazable al hebreo y al POB inglés. «Kisión» mantiene lectura española sin perder tanta conexión formal.
  - severity: low
    issue: La nota alternativa de הָרַבִּית debe armonizarse con la forma principal revisada
    rationale: Si la forma principal pasa a «Rabith», la alternativa mecánica debe presentarse de modo consistente como «Harabith», no «Harabit».
  revised_spanish_text: y Rabith[a], y Kisión, y Ebez[b].
