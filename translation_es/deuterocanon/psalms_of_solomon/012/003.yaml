translation:
  language: es
  text: Su morada es llenar casas con una lengua mentirosa[a], cortar árboles de alegría, ardiente contra los inicuos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su estancia» o «su alojamiento»; παροικία puede significar residencia, morada o permanencia como forastero.
    reason: lexical_alternative
  - marker: b
    text: El final del griego es comprimido y gramaticalmente difícil; el participio femenino depende de la frase precedente y mantiene la imagen del fuego sin convertirla en una acción independiente del sujeto.
    reason: source_note
lexical_decisions:
- source_word: ἡ παροικία αὐτοῦ
  english_pob_choice: His dwelling
  chosen_spanish: Su morada
  alternatives_spanish:
  - Su alojamiento
  - Su estancia
  - Su residencia como forastero
  lexicon: LSJ
  rationale: παροικία puede denotar vivienda, estancia o residencia como extranjero. «Morada» conserva la idea concreta de habitar sin endurecer el español y mantiene la ambigüedad respetable entre residencia y permanencia.
- source_word: ἐμπλῆσαι οἴκους
  english_pob_choice: he fills houses
  chosen_spanish: llenar casas
  alternatives_spanish:
  - llenar hogares
  - llenar viviendas
  lexicon: LSJ
  rationale: Se conserva el objeto concreto «casas», como en el griego, para no abstraer prematuramente a «hogares». El infinitivo se vierte de modo natural en español, manteniendo la fuerza de la imagen.
- source_word: ἐν γλώσσῃ ψεύδει
  english_pob_choice: with a lying tongue
  chosen_spanish: con lengua mentirosa
  alternatives_spanish:
  - con una lengua mentirosa
  - con una lengua de mentira
  - con habla engañosa
  lexicon: LSJ
  rationale: La expresión griega conserva la imagen corporal de la lengua como instrumento del engaño. «Lengua mentirosa» refleja esa imaginería de forma directa y idiomática en español.
- source_word: ἐκκόψαι δένδρα εὐφροσύνης
  english_pob_choice: cutting down trees of gladness
  chosen_spanish: cortar árboles de alegría
  alternatives_spanish:
  - derribar árboles de alegría
  - cortar árboles de regocijo
  - cortar lo que produce alegría
  lexicon: LSJ
  rationale: Se mantiene la imagen de «árboles» y el verbo fuerte «cortar», siguiendo el griego sin convertirlo en una paráfrasis abstracta. «Alegría» comunica bien εὐφροσύνη en español actual y conserva el valor metafórico.
- source_word: φλογίζούσης παρανόμους
  english_pob_choice: flaming against the lawless
  chosen_spanish: flameando contra los inicuos
  alternatives_spanish:
  - ardiendo contra los inicuos
  - inflamando a los inicuos
  - ardiendo contra los impíos
  lexicon: LSJ
  rationale: El participio femenino genitivo debe depender del sustantivo previo, no describir una acción independiente del sujeto. «Flameando contra» preserva el matiz de fuego y la dependencia sintáctica; «inicuos» refleja bien παρανόμους en registro bíblico sin imponer el término eclesiástico tradicional por defecto.
theological_decisions:
- issue: Relación entre la ‘morada’ y la acción de llenar casas
  english_pob_reading: His dwelling is to fill houses with a lying tongue.
  chosen_spanish_reading: Su morada es llenar casas con lengua mentirosa.
  alternative_spanish_readings:
  - Donde mora, llena casas con lengua mentirosa.
  - Su estancia llena casas con lengua mentirosa.
  rationale: El griego conserva una construcción nominal e infinitiva. La versión española mantiene esa estructura en lugar de convertirla en una cláusula narrativa más libre, para no perder el tono comprimido del texto.
  doctrine_reference: Sin referencia doctrinal específica; decisión sintáctico-exegética basada en el griego transmitido.
- issue: Dependencia de φλογίζούσης y evitación de atribuir la acción final al sujeto humano
  english_pob_reading: flaming against the lawless
  chosen_spanish_reading: flameando contra los inicuos
  alternative_spanish_readings:
  - ardiendo contra los inicuos
  - inflamando a los inicuos
  rationale: La revisión del POB inglés señala que el participio femenino genitivo no debe leerse como una acción coordinada del hombre, sino como modificación dependiente de εὐφροσύνης o una relación cercana con γλώσσῃ. El español conserva esa dependencia mediante una construcción participial no finita.
  doctrine_reference: Sin referencia doctrinal específica; cuestión gramatical y de fidelidad al griego.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: conserva la estructura nominal de παροικία αὐτοῦ + infinitivos, evita convertir φλογίζούσης en una acción coordinada del sujeto y mantiene la imagen metafórica de árboles de alegría. También adopta «morada» como equivalente más natural de παροικία en español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - Se prefiere un registro bíblico moderno y digno, evitando calcos innecesarios.
  - «Inicuos» se eligió para παρανόμους por su fuerza jurídica/moral y por coherencia con el tono sapiencial.
  - La puntuación busca reflejar la estructura comprimida del griego sin sobreexplicarla.
