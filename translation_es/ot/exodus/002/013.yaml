translation:
  language: es
  text: 'Salió al día siguiente, y he aquí, dos hombres hebreos estaban peleando. Entonces dijo al malvado[a]: «¿Por qué golpeas a tu compañero[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al culpable» o «al que obra mal» para «al malvado».
    reason: lexical_alternative
  - marker: b
    text: O «tu prójimo» o «tu semejante» para «tu compañero».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: He went out
  chosen_spanish: Salió
  alternatives_spanish:
  - Fue
  - Se salió
  lexicon: HALOT
  rationale: El wayyiqtol narra avance de la acción; en español, «salió» mantiene el movimiento simple y natural, con el sujeto implícito por el contexto anterior.
- source_word: בַּיּוֹם הַשֵּׁנִי
  english_pob_choice: the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el segundo día
  lexicon: HALOT
  rationale: Aunque la forma hebrea es literalmente «en el día השני», en español narrativo «al día siguiente» expresa mejor la secuencia temporal sin perder el sentido.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mirad
  - y resulta que
  lexicon: HALOT
  rationale: La expresión introduce una observación repentina y vívida; «y he aquí» conserva esa fuerza discursiva y es comprensible en español bíblico moderno.
- source_word: שְׁנֵי אֲנָשִׁים עִבְרִים
  english_pob_choice: two Hebrew men
  chosen_spanish: dos hombres hebreos
  alternatives_spanish:
  - dos hebreos
  - dos varones hebreos
  lexicon: HALOT
  rationale: Se conservan los dos sustantivos («hombres») y el adjetivo étnico («hebreos»), como en el hebreo, sin convertirlo en un etnónimo más general que borre el matiz masculino del texto.
- source_word: נִצִּים
  english_pob_choice: were fighting
  chosen_spanish: estaban peleando
  alternatives_spanish:
  - estaban riñendo
  - estaban discutiendo
  lexicon: HALOT
  rationale: El participio expresa conflicto activo; «peleando» es natural en español y concuerda con la pregunta siguiente sobre golpear.
- source_word: לָרָשָׁע
  english_pob_choice: the wicked one
  chosen_spanish: al malvado
  alternatives_spanish:
  - al impío
  - al perverso
  - al culpable
  lexicon: HALOT
  rationale: La revisión inglesa optó por «wicked one» en un registro más directo. En español, «malvado» refleja bien el valor sustantivado de רָשָׁע sin suavizarlo ni convertirlo en una mera valoración legal.
- source_word: לָמָּה תַכֶּה
  english_pob_choice: Why are you striking
  chosen_spanish: ¿Por qué golpeas
  alternatives_spanish:
  - ¿Por qué estás golpeando
  - ¿Por qué hieres
  lexicon: HALOT
  rationale: El imperfecto en discurso directo puede expresarse en presente simple; «golpeas» suena natural y mantiene la violencia concreta del verbo en este contexto.
- source_word: רֵעֶךָ
  english_pob_choice: your companion
  chosen_spanish: tu compañero
  alternatives_spanish:
  - tu prójimo
  - tu semejante
  - tu amigo
  lexicon: HALOT
  rationale: רֵעַ denota compañero/felllow en un conflicto inmediato; «compañero» evita importar la carga legal o devocional que a veces tiene «prójimo» en español.
translation_notes:
  revision_awareness: La versión inglesa revisó «the guilty one» a «the wicked one» para dar un rendering más directo de לָרָשָׁע. La redacción española sigue esa revisión con «al malvado», manteniendo además la naturalidad narrativa de «al día siguiente» y «estaban peleando».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - «hebreos» traduce עִבְרִים de forma uniforme y mantiene el valor étnico del término.
  - «compañero» se reserva para רֵעַ en contextos interpersonales inmediatos, evitando «prójimo» salvo exigencia contextual.
