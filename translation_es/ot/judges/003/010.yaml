translation:
  language: es
  text: El Espíritu de Yahvé[a] vino sobre él, y juzgó a Israel. Salió a la batalla, y Yahvé entregó en su mano a Cusán-risataim, rey de Aram[b]; y su mano prevaleció sobre Cusán-risataim.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Espíritu de Yahvé estaba sobre él». El hebreo admite una formulación más estática, aunque el contexto narrativo favorece el matiz dinámico de «vino sobre él».'
    reason: lexical_alternative
  - marker: b
    text: «Aram» es el nombre hebreo que en traducciones más antiguas suele verterse como «Siria».
    reason: alternative_reading
lexical_decisions:
- source_word: וַ/תְּהִ֨י עָלָ֥י/ו רֽוּחַ יְהוָה
  english_pob_choice: The Spirit of the LORD came upon him
  chosen_spanish: El Espíritu de Yahvé vino sobre él
  alternatives_spanish:
  - El Espíritu de Yahvé estaba sobre él
  - El espíritu de Yahvé vino sobre él
  lexicon: HALOT
  rationale: La construcción hebrea היה על + persona con רוּחַ expresa la presencia/acción capacitadora del Espíritu sobre alguien. «Vino sobre él» reproduce bien el matiz dinámico del contexto narrativo. Se capitaliza «Espíritu» porque se trata del Espíritu de Dios, no de un viento o aliento común.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según el criterio del proyecto para preservar el nombre divino, en lugar de reemplazarlo por un título. Esta decisión evita la convención de máscara tradicional y mantiene la transparencia con el texto fuente.
- source_word: וַ/יִּשְׁפֹּ֣ט אֶת יִשְׂרָאֵל
  english_pob_choice: he judged Israel
  chosen_spanish: juzgó a Israel
  alternatives_spanish:
  - gobernó a Israel
  - actuó como juez sobre Israel
  lexicon: HALOT
  rationale: שׁפט en Jueces incluye la idea de ejercer autoridad judicial y de dirección, pero el sentido básico es «juzgar». «Juzgó a Israel» conserva la terminología del libro sin forzar una paráfrasis más amplia.
- source_word: וַ/יֵּצֵא לַ/מִּלְחָמָה
  english_pob_choice: He went out to battle
  chosen_spanish: Salió a la batalla
  alternatives_spanish:
  - Salió para la guerra
  - Salió a combatir
  lexicon: HALOT
  rationale: La expresión es un modismo militar. «Salió a la batalla» es natural en español y conserva la concreción narrativa del hebreo sin expandir innecesariamente el sentido.
- source_word: וַ/יִּתֵּן יְהוָה בְּ/יָד֔/וֹ
  english_pob_choice: Yahweh gave ... into his hand
  chosen_spanish: Yahvé entregó en su mano
  alternatives_spanish:
  - Yahvé dio en su mano
  - Yahvé lo entregó en su poder
  lexicon: HALOT
  rationale: La idiomática hebrea נתן ביד comunica entregar a un enemigo al poder de alguien. «Entregó en su mano» mantiene la imagen corporal/metonímica del original y su fuerza narrativa.
- source_word: כּוּשַׁ֥ן רִשְׁעָתַ֖יִם
  english_pob_choice: Cushan-rishathaim
  chosen_spanish: Cusán-risataim
  alternatives_spanish:
  - Cushán-risataim
  - Cusán Risataim
  lexicon: HALOT
  rationale: Se translitera el nombre propio para reflejar la forma hebrea. La adaptación fonética «Cusán-risataim» facilita la lectura en español y mantiene la identidad del compuesto nominal.
- source_word: מֶ֣לֶךְ אֲרָ֑ם
  english_pob_choice: king of Aram
  chosen_spanish: rey de Aram
  alternatives_spanish:
  - rey de Siria
  - monarca de Aram
  lexicon: HALOT
  rationale: «Aram» preserva el topónimo hebreo y evita la sustitución interpretativa por «Siria». «Rey de Aram» es suficientemente claro y fiel al original.
- source_word: וַ/תָּ֣עָז יָד֔/וֹ עַ֖ל כּוּשַׁ֥ן רִשְׁעָתָֽיִם
  english_pob_choice: his hand prevailed over Cushan-rishathaim
  chosen_spanish: y su mano prevaleció sobre Cusán-risataim
  alternatives_spanish:
  - y su mano se fortaleció contra Cusán-risataim
  - y venció a Cusán-risataim
  lexicon: HALOT
  rationale: La frase hebrea עזז יד על expresa fortaleza/dominio sobre el adversario. «Prevaleció sobre» conserva la metáfora de la mano y comunica el resultado victorioso con suficiente naturalidad en español.
theological_decisions:
- issue: Nombre divino en el texto principal
  english_pob_reading: Yahweh rather than a masked title like 'the LORD'
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la transparencia del nombre divino conforme al criterio del proyecto. En este contexto no hay razón textual para sustituir el nombre por un título genérico.
  doctrine_reference: 'DOCTRINE.md: YHWH -> Yahvé in main Spanish text'
- issue: Espíritu de Yahvé y empoderamiento narrativo
  english_pob_reading: The Spirit of the LORD came upon him
  chosen_spanish_reading: El Espíritu de Yahvé vino sobre él
  alternative_spanish_readings:
  - El Espíritu de Yahvé estaba sobre él
  rationale: La escena describe habilitación divina para juzgar y combatir. Se preserva el carácter dinámico del evento sin desarrollar más allá del texto.
  doctrine_reference: 'DOCTRINE.md: preserve narrative empowerment language; avoid doctrinal over-specification'
- issue: Topónimo antiguo אֲרָם
  english_pob_reading: Aram
  chosen_spanish_reading: Aram
  alternative_spanish_readings:
  - Siria
  rationale: Se conserva el nombre geográfico original para respetar la primacía del hebreo y evitar una equivalencia tradicional pero interpretativa.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés: la revisión más reciente no introdujo cambios y el consenso de revisión fue de alta concordancia. Por eso la redacción española sigue de cerca las decisiones ya auditadas: «vino sobre él», «Yahvé», «juzgó», «salió a la batalla», «entregó en su mano», «Aram» y «prevaleció sobre».'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma uniforme para יְהוָה.
  - Se mantiene la capitalización de «Espíritu» cuando refiere al Espíritu de Dios.
  - «Cusán-risataim» se conserva con guion para reproducir el compuesto del nombre propio.
  - «Aram» se conserva sin sustituir por «Siria».
  - 'La metáfora de la mano se mantiene de manera consistente en dos lugares: «en su mano» y «su mano prevaleció».'
