- from: Él declaró lo que sería para siempre, y las cosas ocultas antes de que vinieran.
  to: Declaró lo que sería para siempre, y las cosas ocultas antes de que sucedieran.
  rationale: 'Se hizo una reparación menor de estilo y precisión: se omitió el pronombre sujeto innecesario y se cambió «antes de que vinieran» por «antes de que sucedieran», que expresa de manera más natural en español la llegada/ocurrencia de los hechos futuros implícitos por נהיות y לפני בואן, manteniendo fielmente el sentido del hebreo y del griego paralelo.'
