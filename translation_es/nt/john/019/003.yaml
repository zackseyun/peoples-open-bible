review_pass:
  verdict: revise
  source_alignment_summary: ‘El borrador refleja bien el sentido del griego: el imperfecto iterativo/progresivo en «se acercaban» y «le decían», la aclamación burlona «¡Salve!» y la agresión física repetida. Sin embargo, la nota b está desalineada con el dato fuente y con el propio texto español: presenta como literal «le daban bofetadas», cuando el rastro inglés documenta como literal algo más cercano a «le daban golpes/blows», y «bofetadas» es la opción interpretativa natural, no la glosa más literal.’
  spanish_quality_summary: El español es natural, claro y digno. «Y se acercaban a él y le decían» fluye bien, y «¡Salve, Rey de los judíos!» conserva el tono formal y sarcástico. «Le daban bofetadas» es idiomático y fuerte. Solo conviene corregir la redacción de la nota b para evitar una explicación inexacta.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El uso de «Rey de los judíos» es correcto; no aparecen términos sensibles como Yahvé/Mesías/esclavo. «Salve» está bien justificado por el contexto de burla real.
  issues:
  - severity: medium
    issue: La nota al pie b afirma una literalidad inexacta.
    rationale: El griego ἐδίδοσαν αὐτῷ ῥαπίσματα es literalmente algo como «le daban golpes/bofetadas/blows», no específicamente «le daban bofetadas» como si esa fuera la glosa estrictamente literal. La auditoría inglesa incluso aclara «literally ‘they were giving him blows.’» La nota debe reflejar eso con precisión.
  revised_spanish_text: ‘Y se acercaban a él y le decían: «¡Salve[a], Rey de los judíos!» Y le daban bofetadas[b].’
  revised_footnotes:
  - marker: a
    text: O «saludos». El griego usa una fórmula de salutación formal en un contexto de burla.
    reason: lexical_alternative
  - marker: b
    text: O «le daban golpes» / «lo abofeteaban». La expresión griega es literalmente «le daban golpes».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural en español. Solo se corrige la nota b para ajustarla mejor al valor literal del griego y al rastro de auditoría inglés, evitando presentar «bofetadas» como si fuera la glosa estrictamente literal.
