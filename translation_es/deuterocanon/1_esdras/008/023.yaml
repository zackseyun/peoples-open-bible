translation:
  language: es
  text: Y tú, Esdras, conforme a la sabiduría de tu Dios, establece jueces y magistrados, para que juzguen en toda Siria y Fenicia a todos los que conocen la ley de tu Dios; y a los que no la conocen, les enseñarás.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνάδειξον
  english_pob_choice: appoint
  chosen_spanish: establece
  alternatives_spanish:
  - designa
  - nombra
  lexicon: BDAG
  rationale: El imperativo pide instalar o constituir oficiales para una función pública. «Establece» transmite el acto formal de nombramiento sin sonar demasiado burocrático o artificioso en español.
- source_word: κριτὰς
  english_pob_choice: judges
  chosen_spanish: jueces
  alternatives_spanish:
  - magistrados
  - árbitros
  lexicon: BDAG
  rationale: El contexto inmediato de juzgar favorece el sentido judicial directo. «Jueces» conserva la relación léxica con δικάζωσιν.
- source_word: δικαστάς
  english_pob_choice: magistrates
  chosen_spanish: magistrados
  alternatives_spanish:
  - oficiales judiciales
  - jueces
  lexicon: BDAG
  rationale: El término distingue un segundo grupo de autoridades judiciales o administrativas. «Magistrados» preserva esa diferencia sin colapsarlo con κριτὰς.
- source_word: ὅπως δικάζωσιν
  english_pob_choice: so that they may judge
  chosen_spanish: para que juzguen
  alternatives_spanish:
  - para que administren justicia
  - para que decidan casos
  lexicon: BDAG
  rationale: La finalidad se expresa de manera directa en español. «Juzguen» mantiene el vínculo con «jueces» y no amplía indebidamente el alcance del verbo.
- source_word: ἐν ὅλῃ Συρίᾳ καὶ Φοινίκῃ
  english_pob_choice: throughout all Syria and Phoenicia
  chosen_spanish: en toda Siria y Fenicia
  alternatives_spanish:
  - por toda Siria y Fenicia
  - a lo largo de toda Siria y Fenicia
  lexicon: LSJ
  rationale: Se conserva la geografía griega propia de 1 Esdras. «En toda» comunica extensión jurisdiccional de manera natural en español.
- source_word: πάντας τοὺς ἐπισταμένους
  english_pob_choice: all those who know
  chosen_spanish: a todos los que conocen
  alternatives_spanish:
  - a todos los que saben
  - a todos los que están familiarizados con
  lexicon: BDAG
  rationale: ἐπίσταμαι aquí indica conocimiento real o competencia. «Conocen» es claro y suficiente en este contexto legal-religioso.
- source_word: τὸν νόμον τοῦ θεοῦ σου
  english_pob_choice: the law of your God
  chosen_spanish: la ley de tu Dios
  alternatives_spanish:
  - la ley de tu Dios
  - la ley perteneciente a tu Dios
  lexicon: BDAG
  rationale: Se mantiene la formulación posesiva del griego y la consistencia con «tu Dios». «Ley» refleja bien νόμος en un marco normativo.
- source_word: τοὺς μὴ ἐπισταμένους
  english_pob_choice: those who do not know it
  chosen_spanish: a los que no la conocen
  alternatives_spanish:
  - a los que no saben
  - a los que no están familiarizados con ella
  lexicon: BDAG
  rationale: El objeto tácito es «la ley». «La conocen» / «no la conocen» mantiene la referencia anafórica natural en español.
- source_word: διδάξεις
  english_pob_choice: you shall teach
  chosen_spanish: tú los enseñarás
  alternatives_spanish:
  - tú los instruirás
  - debes enseñarles
  lexicon: BDAG
  rationale: El futuro de mandato en un decreto se vierte bien como futuro simple en español. «Enseñarás» conserva la fuerza directiva y el tono formal.
theological_decisions:
- issue: Geografía griega de 1 Esdras frente al paralelo hebreo de Esdras
  english_pob_reading: Retain 'Syria and Phoenicia' in the main text
  chosen_spanish_reading: Conservar «Siria y Fenicia» en el texto principal
  alternative_spanish_readings:
  - armonizar con el paralelo hebreo y cambiar la geografía
  - generalizar la región sin nombrarla
  rationale: La base primaria de 1 Esdras es el texto griego, y allí aparecen explícitamente Siria y Fenicia. No se debe importar la redacción del paralelo hebreo como sustituto del testimonio griego.
  doctrine_reference: 'PHILOSOPHY.md: the Greek source governs deuterocanonical drafting; parallels are controls, not replacements.'
- issue: Correspondencia entre «tu Dios» y las dos cláusulas dependientes
  english_pob_reading: according to the wisdom of your God ... the law of your God
  chosen_spanish_reading: Mantener «tu Dios» en ambas menciones
  alternative_spanish_readings:
  - usar solo «Dios»
  - alternar entre «Dios» y «tu Dios»
  rationale: El griego dice τοῦ θεοῦ σου y luego repite τοῦ θεοῦ σου. Conservar la posesión en ambas partes preserva la cohesión retórica del mandato.
  doctrine_reference: Source-language possessive consistency; no doctrinal change implied.
translation_notes:
  revision_awareness: 'La revisión más reciente corrigió la primera cláusula para reflejar explícitamente τοῦ θεοῦ σου, y el español final conserva esa posesión en toda la frase. También se tuvo en cuenta la validación del paralelo griego frente al hebreo: se mantiene la geografía griega («Siria y Fenicia») sin armonización.'
  spanish_consistency_notes:
  - Se preserva el paralelismo entre «jueces» y «magistrados» para no nivelar dos términos distintos.
  - «Tu Dios» aparece de forma consistente en ambas menciones, según el griego.
  - Se mantiene el objeto pronominal «la» en «no la conocen» para referir claramente a «la ley».
  - No se añadieron notas al pie para evitar desanclar marcadores del texto.
