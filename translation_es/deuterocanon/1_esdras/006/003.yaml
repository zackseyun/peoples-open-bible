  glossary_alignment: 'No hay términos teológicos sensibles en el versículo. «Gobernador», «Siria y Fenicia», «sus asociados» y «les dijo» concuerdan con las decisiones auditadas. La única desalineación menor es onomástica: el proyecto permite sensibilidad contextual en nombres, y para español «Sisines» encaja mejor que la forma inglesa/latinizada «Sisinnes».'
