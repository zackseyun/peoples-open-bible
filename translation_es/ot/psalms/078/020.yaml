translation:
  language: es
  text: Miren[a], él golpeó la roca, y las aguas brotaron, y los arroyos se desbordaron. ¿Puede también dar pan, o proveer carne[b] para su pueblo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡He aquí!»; la partícula hebrea abre con un llamado enfático a reconocer un hecho evidente.
    reason: alternative_reading
  - marker: b
    text: O «carne» en sentido literal; el término hebreo se refiere literalmente a carne, aquí probablemente en el sentido de carne comestible.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Miren!
  alternatives_spanish:
  - ¡Miren aquí!
  - ¡Vean!
  - ¡He aquí!
  lexicon: HALOT
  rationale: La partícula abre con un llamado enfático a reconocer un hecho evidente. «¡Miren!» conserva esa fuerza deíctica en español natural y publicado, mejor que una fórmula más arcaica.
- source_word: הִכָּה
  english_pob_choice: struck
  chosen_spanish: golpeó
  alternatives_spanish:
  - hirió
  - pegó
  - azotó
  lexicon: HALOT
  rationale: El verbo expresa la acción de Dios sobre la roca; «golpeó» comunica el acto de forma directa y comprensible en español moderno, sin suavizar la fuerza del original.
- source_word: צוּר
  english_pob_choice: the rock
  chosen_spanish: la roca
  alternatives_spanish:
  - una roca
  - la peña
  lexicon: HALOT
  rationale: El contexto remite al episodio conocido del desierto, y el sentido definido es adecuado. «La roca» mantiene esa referencia histórica y textual.
- source_word: וַיָּזֻבוּ מַיִם
  english_pob_choice: waters gushed out
  chosen_spanish: las aguas brotaron
  alternatives_spanish:
  - las aguas manaron
  - las aguas fluyeron
  - las aguas salieron a borbotones
  lexicon: HALOT
  rationale: El hebreo describe un fluir abundante y repentino. «Brotaron» preserva la imagen viva sin caer en una literalidad torpe.
- source_word: וּנְחָלִים יִשְׁטֹפוּ
  english_pob_choice: and streams overflowed
  chosen_spanish: los arroyos se desbordaron
  alternatives_spanish:
  - los torrentes se desbordaron
  - los cauces inundaron
  - los arroyos arrasaron
  lexicon: HALOT
  rationale: נחלים puede referirse a arroyos, torrentes o cauces estacionales; con שטף la imagen es de abundancia y desborde. «Los arroyos se desbordaron» es idiomático y conserva el movimiento de agua abundante.
- source_word: הֲגַם
  english_pob_choice: Can he also
  chosen_spanish: ¿Puede también
  alternatives_spanish:
  - ¿Puede incluso
  - ¿Podrá también
  - ¿Puede asimismo
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica de duda. «También» conserva el matiz de añadir otra provisión además del agua.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: El hebreo dice literalmente «pan». En español, «pan» retiene la concreción del paralelo con la segunda cláusula y suena más natural que un genérico.
- source_word: י֣וּכַל תֵּת
  english_pob_choice: give
  chosen_spanish: dar
  alternatives_spanish:
  - suministrar
  - conceder
  - dar de comer
  lexicon: HALOT
  rationale: El modal ya está contenido en la pregunta. Traducir simplemente «dar» evita redundancia y mantiene la sintaxis interrogativa.
- source_word: אִם
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  - si
  lexicon: HALOT
  rationale: Aquí introduce un segundo miembro de la pregunta en sentido disyuntivo. «O» reproduce mejor esa relación que «si» en español.
- source_word: יָכִין
  english_pob_choice: provide
  chosen_spanish: proveer
  alternatives_spanish:
  - preparar
  - disponer
  - suministrar
  lexicon: HALOT
  rationale: En el contexto de alimento para el pueblo, el verbo tiene el sentido de hacer disponible/proveer. «Proveer» es claro y conserva el valor contextual sin añadir interpretación.
- source_word: שְׁאֵר
  english_pob_choice: meat
  chosen_spanish: carne
  alternatives_spanish:
  - flesh
  - alimento
  - carne para comer
  lexicon: HALOT
  rationale: El término hebreo significa literalmente «carne», y en este contexto probablemente comida cárnica. «Carne» mantiene esa tensión léxica que el texto presenta entre el sentido literal y el uso alimentario.
- source_word: לְעַמּוֹ
  english_pob_choice: for his people
  chosen_spanish: para su pueblo
  alternatives_spanish:
  - para su gente
  - para su nación
  - para su pueblo de Dios
  lexicon: HALOT
  rationale: עם en este marco de pacto e historia de Israel se refiere al pueblo de Dios. «Su pueblo» es fiel, claro y suficiente en español.
theological_decisions:
- issue: Forma de la pregunta retórica final
  english_pob_reading: Render the final clauses as skeptical questions about God's ability to provide food beyond water
  chosen_spanish_reading: Mantener las cláusulas finales como preguntas retóricas de incredulidad sobre la capacidad de Dios para dar alimento, después de haber dado agua
  alternative_spanish_readings:
  - Convertirlas en afirmaciones
  - Suavizar la duda a una pregunta meramente informativa
  rationale: El hebreo usa partículas interrogativas que expresan duda desafiante; preservar la interrogación mantiene la tensión teológica del pasaje y la murmuración de Israel sin resolverla interpretativamente.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: El contexto auditado del inglés POB muestra acuerdo alto y sin revisiones aplicadas; se conserva la misma lectura semántica general, ajustando solo la expresión al español natural y manteniendo la tensión interrogativa final.
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito en el sujeto pronominal «Él», coherente con el contexto inmediato del salmo.
  - Se traduce שְׁאֵר como «carne» para preservar la base léxica, aun cuando el inglés POB optó por «meat» por claridad idiomática.
  - «Las aguas» y «los arroyos» conservan el plural poético del hebreo sin forzar singularizaciones.
  - No se introduce «Mesías», «SEÑOR» ni otras sustituciones terminológicas ajenas al texto de este versículo.
