translation:
  language: es
  text: los que se alegran[a] de hacer el mal, y se regocijan en las perversidades del mal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que se deleitan en hacer el mal».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y se regocijan en cosas perversas del mal» o «en actos de perversidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׂמֵחִים
  english_pob_choice: who rejoice
  chosen_spanish: los que se alegran
  alternatives_spanish:
  - los que se regocijan
  - los que se complacen
  lexicon: HALOT
  rationale: El participio hebreo caracteriza a un tipo de personas; en español, «los que se alegran» conserva bien ese valor descriptivo y la fuerza afectiva de שמח sin sonar artificial. «Regocijarse» queda reservado para el paralelismo intensificado del segundo cola.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to do
  chosen_spanish: de hacer
  alternatives_spanish:
  - para hacer
  - de practicar
  lexicon: HALOT
  rationale: La construcción infinitiva se expresa con naturalidad en español con «de hacer» tras «alegrarse». Se evita «practicar» porque añade habitualidad no explícita en el hebreo, y «cometer» introduciría una carga más judicial de la que exige el texto.
- source_word: רָע
  english_pob_choice: evil
  chosen_spanish: el mal
  alternatives_spanish:
  - lo malo
  - la maldad
  lexicon: HALOT
  rationale: En proverbios, רָע tiene fuerza moral. «El mal» conserva mejor esa carga que «lo malo», que suena más genérico, o «la maldad», que tiende a sustantivar la cualidad con un matiz algo más abstracto.
- source_word: יָגִילוּ
  english_pob_choice: exult
  chosen_spanish: se regocijan
  alternatives_spanish:
  - exultan
  - se alegran
  lexicon: HALOT
  rationale: Para distinguir גִיל de שמח, se usa «se regocijan», que mantiene intensidad jubilosa sin repetir exactamente el primer verbo. «Exultan» sería posible, pero en español puede sonar más literario o marcado; «se alegran» perdería el contraste.
- source_word: בְּתַהְפֻּכ֥וֹת
  english_pob_choice: in the perversities
  chosen_spanish: en las perversidades
  alternatives_spanish:
  - en las cosas perversas
  - en los actos perversos
  - en la perversión
  lexicon: HALOT
  rationale: El plural de תַהְפֻּכֹת sugiere actos o realidades torcidas/perversas. «Las perversidades» conserva el plural y el carácter moral del hebreo mejor que una singularización como «la perversión».
- source_word: רָע
  english_pob_choice: of evil
  chosen_spanish: del mal
  alternatives_spanish:
  - del maldad
  - de la maldad
  - malvadas
  lexicon: HALOT
  rationale: El segundo רָע funciona como calificativo moral del sustantivo anterior. «Del mal» respeta la relación compacta del hebreo y evita sobreinterpretar con expresiones más desarrolladas como «perversidades malvadas».
translation_notes:
  revision_awareness: El testimonio inglés fue revisado y quedó sin cambios; la versión española sigue de cerca el hebreo y mantiene el paralelismo semántico entre שמח y גיל, así como el plural moral de תַהְפֻּכֹת.
  spanish_consistency_notes:
  - Se mantiene «mal» para רָע en ambos cola, por consistencia léxica y para conservar el enlace moral del verso.
  - Se distingue «se alegran» / «se regocijan» para reflejar el paralelismo intensificado del hebreo.
  - Se conservó el plural «perversidades» para no aplanar el sustantivo hebreo a una abstracción singular.
