translation:
  language: es
  text: Y a lo largo del límite de Neftalí[a], desde el lado oriental hasta el lado occidental, Manasés, una porción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Manasés, uno». Se añade «porción» porque en esta fórmula de repartición del capítulo el hebreo es elíptico y omite el sustantivo implícito.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: And along
  chosen_spanish: Y junto al
  alternatives_spanish:
  - Y a lo largo de
  - Y sobre
  lexicon: HALOT
  rationale: La preposición על aquí introduce otra franja territorial en la serie de repartos. «Junto al» comunica la relación espacial sin sonar forzado en español, y mantiene el valor direccional del hebreo.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - lindero
  - borde
  lexicon: HALOT
  rationale: En este contexto de repartición territorial, גְּבוּל designa el borde o demarcación de la heredad. «Límite» es natural en español bíblico actual y conserva el sentido de línea de demarcación.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  lexicon: nombre propio
  rationale: Nombre tribal propio; se adapta a la forma usual en español bíblico «Neftalí».
- source_word: מִפְּאַת קָדִימָה עַד פְּאַת יָמָּה
  english_pob_choice: from the east side to the west side
  chosen_spanish: desde el lado oriental hasta el lado occidental
  alternatives_spanish:
  - desde el lado de oriente hasta el lado de occidente
  - desde el extremo oriental hasta el extremo occidental
  lexicon: HALOT
  rationale: פֵּאָה significa literalmente «lado, borde, extremo». «Lado oriental / lado occidental» conserva la estructura paralela y evita una formulación demasiado técnica, sin perder la orientación geográfica del texto.
- source_word: מְנַשֶּׁה
  english_pob_choice: Manasseh
  chosen_spanish: Manasés
  alternatives_spanish:
  - Manasés
  lexicon: nombre propio
  rationale: Nombre tribal propio; se usa la forma castellana tradicional y ampliamente reconocible «Manasés».
- source_word: אֶחָד
  english_pob_choice: one portion
  chosen_spanish: una porción
  alternatives_spanish:
  - una
  - una sola porción
  lexicon: HALOT
  rationale: El hebreo dice literalmente «uno», pero la fórmula de reparto en este capítulo es elíptica. Como en el audit trail inglés, «porción» se suministra para hacer explícita la unidad de heredad sin alterar el contenido.
translation_notes:
  revision_awareness: El cotejo disponible muestra alta concordancia y sin cambios necesarios en la última revisión; por ello la propuesta española sigue de cerca el paquete fuente y la solución inglesa auditada, conservando la elipsis del hebreo mediante una aclaración mínima.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se traduce el nombre tribal נַפְתָּלִי como «Neftalí» y מְנַשֶּׁה como «Manasés», conforme al uso bíblico establecido en español.
  - La fórmula direccional conserva la simetría oriental/occidental del hebreo sin convertirla en paráfrasis interpretativa.
