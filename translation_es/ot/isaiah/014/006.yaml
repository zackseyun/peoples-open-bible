translation:
  language: es
  text: golpeando a los pueblos con furia, con un golpe incesante[a], dominando a las naciones con ira[b], con persecución implacable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin escatimar».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo de la cláusula final es condensado y también puede entenderse como describiendo a las naciones perseguidas sin descanso.
    reason: alternative_reading
lexical_decisions:
- source_word: מַכֶּה
  english_pob_choice: striking
  chosen_spanish: golpeando
  alternatives_spanish:
  - hiriendo
  - azotando
  - derribando
  lexicon: HALOT
  rationale: El participio hifil describe una acción característica y continua. «Golpeando» conserva el valor verbal y el tono poético breve sin añadir una relativa innecesaria.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - las gentes
  - los pueblos y poblaciones
  lexicon: HALOT
  rationale: «Pueblos» mantiene la distinción frente a גּוֹיִם, que después se vierte como «naciones». También suena natural en español bíblico actual.
- source_word: בְּעֶבְרָה
  english_pob_choice: in fury
  chosen_spanish: con furia
  alternatives_spanish:
  - en furia
  - con ira
  - en ira
  lexicon: HALOT
  rationale: La preposición hebrea admite matiz instrumental o modal. «Con furia» expresa bien el desbordamiento de עֶבְרָה en un español natural y solemne.
- source_word: מַכַּת
  english_pob_choice: blow
  chosen_spanish: golpe
  alternatives_spanish:
  - azote
  - herida
  - golpeo
  lexicon: HALOT
  rationale: El sustantivo de la misma raíz se conserva con un equivalente conciso. «Golpe» reproduce la imagen violenta y la compactación poética del hebreo.
- source_word: בִּלְתִּי סָרָה
  english_pob_choice: unceasing
  chosen_spanish: incesante
  alternatives_spanish:
  - sin cesar
  - sin desviarse
  - sin detenerse
  lexicon: HALOT
  rationale: La expresión literalmente sugiere «sin apartarse/cessar». «Incesante» transmite la idea de continuidad sin forzar una paráfrasis explicativa.
- source_word: רֹדֶה
  english_pob_choice: ruling
  chosen_spanish: dominando
  alternatives_spanish:
  - gobernando
  - sometiendo
  - oprimiendo
  lexicon: HALOT
  rationale: Aunque puede significar gobernar, en este contexto la fuerza opresiva del paralelismo permite «dominando» como opción que conserva el matiz de señorío tiránico.
- source_word: בָאַף
  english_pob_choice: in anger
  chosen_spanish: con ira
  alternatives_spanish:
  - en ira
  - con enojo
  - airadamente
  lexicon: HALOT
  rationale: אַף es «nariz» en sentido idiomático de «ira». «Con ira» es breve, claro y mantiene la relación con la primera cola del verso.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las gentes
  - las naciones extranjeras
  lexicon: HALOT
  rationale: «Naciones» distingue este término de עַמִּים y sigue la decisión inglesa de reservar un equivalente diferente para cada uno.
- source_word: מֻרְדָּף
  english_pob_choice: pursued
  chosen_spanish: persecución
  alternatives_spanish:
  - perseguido
  - acosado
  - hounded
  lexicon: HALOT
  rationale: El participio pasivo es sintácticamente comprimido y, en la línea poética, puede funcionar casi adverbialmente. Se opta por un sustantivo abstracto que refleja el efecto de la persecución opresiva, en consonancia con la revisión inglesa final.
- source_word: בְּלִי חָשָׂךְ
  english_pob_choice: without restraint
  chosen_spanish: implacable
  alternatives_spanish:
  - sin escatimar
  - sin reservar nada
  - sin frenarse
  lexicon: HALOT
  rationale: El idiomático «sin escatimar / no retener» puede sonar forzado en español dentro de esta cola final. «Implacable» capta la idea de violencia sin freno y conserva el tono de la línea, en diálogo con la nota inglesa sobre «sin escatimar» como alternativa.
theological_decisions:
- issue: Sintaxis y referente de la cláusula final
  english_pob_reading: The verse continues the description of the oppressive ruler, with the last phrase expressing relentless pursuit/oppression of nations.
  chosen_spanish_reading: El verso sigue describiendo al opresor, y la última cola expresa una persecución sin tregua contra las naciones.
  alternative_spanish_readings:
  - las naciones perseguidas sin descanso
  - con persecución implacable ejercida sobre las naciones
  - las naciones, perseguidas sin cesar
  rationale: La construcción hebrea es comprimida y permite más de una lectura. La versión española conserva esa tensión, sin resolverla con una paráfrasis más interpretativa de lo que el texto exige.
  doctrine_reference: Preservar la tensión textual sin suavizarla
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés, que prefirió una formulación con «persecución implacable» para la cola final, y la nota anterior sobre la posibilidad de «sin escatimar». La versión española refleja esa decisión sin perder la ambigüedad sintáctica del hebreo.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «pueblos» y «naciones» para reflejar עַמִּים / גּוֹיִם.
  - Se evitó «SEÑOR» u otra sustitución teológica no pertinente, porque aquí no aparece el Tetragrámaton.
  - Se prefirió un registro bíblico moderno, claro y solemne, sin arcaísmos innecesarios.
