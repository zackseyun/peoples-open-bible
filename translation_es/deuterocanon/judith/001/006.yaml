translation:
  language: es
  text: Y todos los que habitaban la región montañosa se unieron a él[a], y todos los que habitaban junto al Éufrates, al Tigris y al Hidaspes, y todos los que habitaban en la llanura de Arioc[b], rey de los elimeos, se unieron a él. Y muchas naciones se reunieron para combatir[c] con los hijos de Cheleúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego puede significar literalmente 'se encontraron con él' o 'vinieron a él'; aquí se entiende como que se alinearon con él.
    reason: lexical_alternative
  - marker: b
    text: '''Arioc'' también puede escribirse ''Arioj'', siguiendo más de cerca la forma griega Ἀριὼχ.'
    reason: lexical_alternative
  - marker: c
    text: La expresión griega alude a un término militar de formación o despliegue de batalla; aquí se expresa de manera natural como propósito de combate.
    reason: cultural_note
lexical_decisions:
- source_word: συνήντησαν πρὸς αὐτόν
  english_pob_choice: joined him
  chosen_spanish: se unieron a él
  alternatives_spanish:
  - se encontraron con él
  - vinieron a él
  lexicon: BDAG
  rationale: El griego puede significar literalmente 'se encontraron' o 'vinieron a encontrarse', pero en este contexto militar-político el sentido es de adhesión o alineamiento con él. 'Se unieron a él' comunica esa idea sin perder el matiz relacional.
- source_word: οἱ κατοικοῦντες τὴν ὀρεινήν
  english_pob_choice: those who lived in the hill country
  chosen_spanish: los que habitaban la región montañosa
  alternatives_spanish:
  - los que vivían en la región montañosa
  - los habitantes de la región montañosa
  lexicon: LSJ
  rationale: τὴν ὀρεινήν es un sustantivo formado a partir de un adjetivo y designa una zona montañosa. 'Región montañosa' conserva bien el sentido geográfico y suena natural en español.
- source_word: οἱ κατοικοῦντες τὸν Εὐφράτην καὶ τὸν Τίγριν καὶ τὸν Ὑδάσπην
  english_pob_choice: those who lived along the Euphrates and the Tigris and the Hydaspes
  chosen_spanish: los que habitaban junto al Éufrates, el Tigris y el Hidaspes
  alternatives_spanish:
  - los que vivían a lo largo del Éufrates, el Tigris y el Hidaspes
  - los que habitaban en la región del Éufrates, el Tigris y el Hidaspes
  lexicon: LSJ
  rationale: Con nombres de ríos, la preposición en español más natural es 'junto a'. Mantiene la relación geográfica sin forzar una formulación demasiado literal.
- source_word: πεδίῳ
  english_pob_choice: in the plain
  chosen_spanish: en la llanura
  alternatives_spanish:
  - en el llano
  - en la planicie
  lexicon: LSJ
  rationale: El dativo es locativo. 'En la llanura' es claro, natural y fiel al valor espacial del término.
- source_word: Ἀριὼχ
  english_pob_choice: Ariok
  chosen_spanish: Arioj
  alternatives_spanish:
  - Arioc
  - Arioque
  lexicon: LSJ
  rationale: Se sigue la forma griega Ἀριὼχ con transliteración española 'Arioj'. Se conserva como nombre propio sin imponer una forma eclesiástica ajena al texto base.
- source_word: Ἐλυμαίων
  english_pob_choice: Elymaeans
  chosen_spanish: elimeos
  alternatives_spanish:
  - elimeos de Elymaida
  - elymeos
  lexicon: LSJ
  rationale: El griego se refiere al pueblo de Elymais; 'elimeos' refleja mejor esa forma que 'elamitas', que introduciría otra identificación étnico-geográfica.
- source_word: συνῆλθον
  english_pob_choice: assembled
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: BDAG
  rationale: El verbo expresa la acción colectiva de venir juntos. 'Se reunieron' es natural en español y conserva el sentido de concentración de tropas/pueblos.
- source_word: εἰς παράταξιν
  english_pob_choice: for battle
  chosen_spanish: para batalla
  alternatives_spanish:
  - para formación de combate
  - en orden de batalla
  lexicon: LSJ
  rationale: La revisión inglesa optó por 'for battle' para evitar una literalidad pesada con 'battle line'. En español, 'para batalla' recoge esa decisión y conserva el propósito militar sin introducir un giro interpretativo excesivo.
- source_word: υἱῶν Χελεούλ
  english_pob_choice: the sons of Cheleoul
  chosen_spanish: los hijos de Cheleúl
  alternatives_spanish:
  - los descendientes de Cheleúl
  - la casa de Cheleúl
  lexicon: LSJ
  rationale: υἱοί con un nombre propio se rinde de manera transparente como 'hijos de'. 'Cheleúl' sigue de cerca la transliteración griega y evita sustituirla por una tradición distinta.
theological_decisions:
- issue: Identificación étnico-geográfica de Ἐλυμαίων
  english_pob_reading: Elymaeans rather than Elamites
  chosen_spanish_reading: elimeos, no elamitas
  alternative_spanish_readings:
  - elamitas
  - habitantes de Elymaida
  rationale: La POB inglesa siguió la forma griega específica 'Elymaeans' para no importar la etnónima bíblica más conocida 'Elamites'. En español se conserva esa distinción con 'elimeos'.
  doctrine_reference: precisión histórica y geográfica del texto; no implica una cuestión doctrinal
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió 'in the plain' y 'for battle with the sons of Cheleoul' para evitar literalidad pesada. La versión española sigue esa orientación con 'en la llanura' y 'para batalla con los hijos de Cheleúl', manteniendo el sentido militar sin calco excesivo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantuvo la traducción de nombres propios cercana al griego y consistente con transliteración española.
  - '''Para batalla'' preserva el valor final de εἰς παράταξιν sin introducir una frase demasiado técnica.'
  - 'Los nombres de ríos se dejaron en su forma tradicional en español: Éufrates y Tigris; ''Hidaspes'' sigue la forma griega del pasaje.'
