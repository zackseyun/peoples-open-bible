id: 1CLEM.62.1
reference: 1 Clement 62:1
unit: verse
book: 1 Clement
source:
  edition: Funk 1901 (normalized OCR)
  text: Περὶ μὲν τῶν ἀνηκόντων τῇ θρησκείᾳ ἡμῶν καὶ τῶν ὠφελιμωτάτων εἰς ἐνάρετον βίον τοῖς θέλουσιν εὐσεβῶς καὶ δικαίως διευθύνειν, ἱκανῶς ἐπεστείλαμεν ὑμῖν, ἄνδρες ἀδελφοί. 2. περὶ γὰρ πίστεως καὶ μετανοίας καὶ γνησίας ἀγάπης καὶ ἐγκρατείας καὶ σωφροσύνης καὶ ὑπομονῆς πάντα τόπον ἐψηλαφήσαμεν, ὑπομιμνήσκοντες δεῖν ὑμᾶς ἐν δικαιοσύνῃ καὶ ἀληθείᾳ καὶ μακροθυμίᾳ τῷ παντοκράτορι θεῷ ὁσίως εὐαρεστεῖν, ὁμονοοῦντας ἀμνησικάκως ἐν ἀγάπῃ καὶ εἰρήνῃ μετὰ ἐκτενοῦς ἐπιεικείας, καθὼς καὶ οἱ προδεδηλωμένοι πατέρες ἡμῶν εὐηρέστησαν ταπεινοφρονοῦντες τὰ πρὸς τὸν πατέρα καὶ θεὸν καὶ κτίστην καὶ πάντας ἀνθρώπους. . καὶ ταῦτα τοσούτῳ μᾶλλον ὑπενήγκαμεν, ἐπειδὴ σαφῶς ᾔδειμεν γράφειν ὑμᾶς ἀνδράσιν πιστοῖς καὶ ἐλλογιμωτάτοις καὶ ἐγκεχυφόσιν εἰς τὰ λόγια τῆς παιδείας τοῦ θεοῦ.
  language: Greek
  pages:
  - 341
  note: This chapter comes from the normalized Funk 1901 OCR layer.
  verse: 1
translation:
  text: Now concerning the matters that pertain to our religion and are most beneficial for a virtuous life to those who desire to order their way in piety and righteousness, we have written to you sufficiently, brothers. For concerning faith and repentance and genuine love and self-control and sound-mindedness and endurance, we have touched on every point, reminding you that you ought to please the Almighty God in holiness, righteousness, truth, and longsuffering, being of one mind, free from resentment, in love and peace with earnest gentleness, just as also our fathers, who were spoken of before, were well-pleasing to him, humbling themselves before the Father and God and Creator and all people. And we have urged these things all the more because we clearly knew that we were writing to faithful and highly esteemed men who have been deeply instructed in the sayings of God's training.
  philosophy: optimal-equivalence
status: revised
lexical_decisions:
- source_word: θρησκεία
  chosen: religion
  alternatives:
  - worship
  - devotion
  lexicon: BDAG
  rationale: The term denotes religious practice/devotion broadly. 'Religion' best preserves the public and communal sense here without narrowing it merely to liturgical worship.
- source_word: ἐνάρετος βίος
  chosen: virtuous life
  alternatives:
  - excellent life
  - life of virtue
  lexicon: LSJ
  rationale: This phrase points to morally excellent conduct. 'Virtuous life' is idiomatic English and preserves the ethical emphasis.
- source_word: διευθύνειν
  chosen: to order their way
  alternatives:
  - to direct
  - to guide
  - to conduct
  lexicon: LSJ
  rationale: The verb carries the sense of directing or setting straight one's course. 'Order their way' keeps the moral and practical nuance in a slightly elevated register fitting the paraenetic tone.
- source_word: πίστις
  chosen: faith
  alternatives:
  - trust
  - faithfulness
  lexicon: BDAG
  rationale: In this virtue list, 'faith' is the most natural and stable rendering; the context does not require the more specific nuance 'faithfulness'.
- source_word: μετάνοια
  chosen: repentance
  alternatives:
  - change of mind
  - turning back
  lexicon: BDAG
  rationale: A standard early Christian ethical-religious term; 'repentance' preserves both moral and theological force.
- source_word: γνησία ἀγάπη
  chosen: genuine love
  alternatives:
  - sincere love
  - true love
  lexicon: BDAG
  rationale: γνησία marks authenticity. 'Genuine love' is clear and preserves the stress on love's unfeigned character.
- source_word: ἐγκράτεια
  chosen: self-control
  alternatives:
  - temperance
  lexicon: BDAG
  rationale: '''Self-control'' is the clearest modern equivalent for disciplined restraint.'
- source_word: σωφροσύνη
  chosen: sound-mindedness
  alternatives:
  - sobriety
  - prudence
  - self-restraint
  lexicon: BDAG
  rationale: The term includes sober judgment and balanced self-possession. 'Sound-mindedness' preserves more of that breadth than 'sobriety' alone.
- source_word: ὑπομονή
  chosen: endurance
  alternatives:
  - steadfastness
  - patience
  lexicon: BDAG
  rationale: The context of persevering virtue favors 'endurance' over the softer 'patience'.
- source_word: ἐψηλαφήσαμεν πάντα τόπον
  chosen: we have touched on every point
  alternatives:
  - we have explored every aspect
  - we have handled every topic
  lexicon: LSJ
  rationale: Literally the idiom suggests feeling over or tracing through every place/point. 'Touched on every point' communicates comprehensive treatment without over-literal awkwardness.
- source_word: ὁσίως εὐαρεστεῖν
  chosen: to please ... in holiness
  alternatives:
  - to serve devoutly so as to please
  - to be pleasing in a holy way
  lexicon: BDAG
  rationale: ὁσίως modifies the manner of pleasing God with a sense of pious holiness. 'Please ... in holiness' is concise and natural.
- source_word: ὁμονοοῦντας
  chosen: being of one mind
  alternatives:
  - living in harmony
  - thinking together
  lexicon: BDAG
  rationale: The ecclesial exhortation stresses unity of mind; 'being of one mind' preserves the communal and rhetorical force.
- source_word: ἀμνησικάκως
  chosen: free from resentment
  alternatives:
  - without remembering wrongs
  - without rancor
  - not bearing grudges
  lexicon: LSJ
  rationale: The adverb denotes not holding onto injuries. 'Free from resentment' is idiomatic while retaining the ethical sense.
- source_word: ἐκτενής
  chosen: earnest
  alternatives:
  - fervent
  - constant
  - intense
  lexicon: BDAG
  rationale: In the phrase with gentleness, the word conveys sustained seriousness or earnestness. 'Earnest gentleness' preserves the unusual but meaningful combination.
- source_word: ἐπιείκεια
  chosen: gentleness
  alternatives:
  - forbearance
  - clemency
  - reasonableness
  lexicon: BDAG
  rationale: The term can mean yieldingness or considerate gentleness. 'Gentleness' fits the paraenetic list and reads naturally with love and peace.
- source_word: εὐηρέστησαν
  chosen: were well-pleasing to him
  alternatives:
  - pleased him
  - found favor with him
  lexicon: BDAG
  rationale: The compound verb has a formal religious tone. 'Were well-pleasing to him' preserves that elevated cadence.
- source_word: ταπεινοφρονοῦντες
  chosen: humbling themselves
  alternatives:
  - being humble
  - thinking lowly of themselves
  lexicon: BDAG
  rationale: The participle emphasizes active humility in disposition and conduct. 'Humbling themselves' keeps the verbal force.
- source_word: λόγια
  chosen: sayings
  alternatives:
  - oracles
  - utterances
  lexicon: BDAG
  rationale: Though 'oracles' is traditional, it can sound opaque in modern English. 'Sayings' is accessible while still referring to divine instruction.
- source_word: παιδεία
  chosen: training
  alternatives:
  - instruction
  - discipline
  lexicon: BDAG
  rationale: The word includes formative instruction and discipline. 'Training' captures the educative process in accessible English.
- source_word: ἐγκεχυφόσιν εἰς
  chosen: have been deeply instructed in
  alternatives:
  - have immersed themselves in
  - have been steeped in
  lexicon: LSJ
  rationale: The expression suggests being thoroughly engaged or saturated in the divine teachings. 'Deeply instructed in' communicates the result in idiomatic English.
theological_decisions:
- issue: Rendering θρησκεία in an early Christian self-description
  chosen_reading: our religion
  alternative_readings:
  - our worship
  - our way of devotion
  rationale: The Greek refers to the sphere of Christian religious practice and devotion. 'Religion' preserves the communal and ethical breadth of the term without reducing it to ritual alone.
  doctrine_reference: 'Translation philosophy: original-language primacy; readable modern English'
- issue: Gendered address ἄνδρες ἀδελφοί and later ἀνδράσιν
  chosen_reading: brothers ... men
  alternative_readings:
  - brothers and sisters ... people
  - brothers ... persons
  rationale: Per gender-accurate policy, the masculine forms are retained. The first is a direct fraternal address; the latter explicitly refers to men. Inclusivity concerns can be noted in footnotes rather than neutralizing the Greek.
  doctrine_reference: Gender-accurate over gender-neutral
- issue: λόγια τῆς παιδείας τοῦ θεοῦ
  chosen_reading: the sayings of God's training
  alternative_readings:
  - the oracles of God's instruction
  - the words of divine discipline
  rationale: The phrase is somewhat dense. The chosen rendering keeps both the content ('sayings') and the formative aspect ('training') without importing later technical language. A footnote preserves 'oracles' as an alternative.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern English
