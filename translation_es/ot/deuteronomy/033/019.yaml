revisions:
- from: Llamarán a pueblos al monte[a]; allí ofrecerán sacrificios de justicia, porque de la abundancia de los mares sacarán[b] y de los tesoros escondidos de la arena[c].
  to: Llamarán a pueblos al monte[a]; allí ofrecerán sacrificios de justicia, porque sacarán[b] de la abundancia de los mares y de los tesoros escondidos de la arena[c].
  rationale: 'La revisión hace un ajuste mínimo pero necesario: reubica el verbo ''sacarán'' para que gobierne naturalmente ambos complementos y elimine la sensación de frase incompleta en español, preservando la metáfora documentada en el POB. Se conservan ''monte'' y ''sacrificios de justicia'' para respetar la ambigüedad y la racionalidad léxica ya establecidas. Las notas se simplifican y alinean mejor con las alternativas significativas del expediente inglés.'
