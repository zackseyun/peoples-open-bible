    issue: '''No cobrarás a él'' no refleja adecuadamente תִתֵּן לוֹ en este contexto'
    rationale: Aunque el contexto implica préstamo con interés, el hebreo usa 'dar' con sentido idiomático de prestar. 'Cobrarás' desplaza el acto prohibido desde prestar a interés hacia cobrar, lo cual altera el enfoque legal del texto y del POB inglés.
  - severity: high
    issue: '''en interés'' es español antinatural para בְּנֶשֶׁךְ'
    rationale: La expresión idiomática clara y jurídica en español es 'a interés' o 'con interés'. 'En interés' suena forzada y no sirve a la legibilidad eclesial.
  - severity: medium
    issue: 'Orden y régimen pronominal poco naturales: ''a él'''
    rationale: En español bíblico natural corresponde 'No le prestarás...' o 'No le darás...'. 'a él' aquí resulta torpe y poco idiomático.
  - severity: low
    issue: Alternativa léxica 'tu silver' es un error
    rationale: Es una intrusión del inglés en las alternativas españolas y debe eliminarse.
  revised_spanish_text: No le prestarás tu dinero a interés[a][b], ni le darás tu alimento para aumento.
