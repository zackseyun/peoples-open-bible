revisions:
- from: A ti[a], oh Dios de mis padres, doy gracias y alabo, porque me has dado sabiduría y poder, y ahora me has hecho saber lo que te pedimos[b], pues nos has hecho saber la palabra[c] del rey.
  to: A ti[a], Dios de mis padres, te doy gracias y te alabo, porque me has dado sabiduría y poder, y ahora me has hecho saber lo que te pedimos[b], pues nos has hecho saber el asunto[c] del rey.
  rationale: Se ajustó la redacción para mejorar la naturalidad del español y, sobre todo, para reflejar mejor el valor amplio de מִלַּת מַלְכָּא con 'el asunto del rey'. También se suavizó la invocación y se repitió 'te' para una coordinación verbal más idiomática.
