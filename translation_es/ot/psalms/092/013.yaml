translation:
  language: es
  text: El justo[a] florece como la palmera; crece[b] como un cedro en el Líbano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los justos». El singular hebreo puede funcionar de manera representativa.
    reason: alternative_reading
  - marker: b
    text: O «prospera» o «se engrandece» para este verbo; el hebreo expresa crecimiento vigoroso o hacerse grande.
    reason: alternative_reading
lexical_decisions:
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el justo varón
  - el justo hombre
  - los justos
  lexicon: HALOT
  rationale: El sustantivo/adjetivo hebreo se usa aquí de manera substantiva en singular. En español, «el justo» comunica naturalmente la figura singular y conserva el valor representativo sin añadir «varón» u «hombre», que no están en el texto y sonarían más interpretativos.
- source_word: כַּתָּמָר
  english_pob_choice: like the palm tree
  chosen_spanish: como la palmera
  alternatives_spanish:
  - como una palmera
  - como la palma
  - como la palmera datilera
  lexicon: HALOT
  rationale: El comparativo «como» reproduce היטב el hebreo כְּ/כַּ. «Palmera» es el equivalente español natural y claro; «palma» podría sonar menos preciso en algunos contextos, y «palmera datilera» añade especificidad botánica no exigida por el verso.
- source_word: יִפְרָח
  english_pob_choice: flourishes
  chosen_spanish: florece
  alternatives_spanish:
  - prospera
  - brota
  - se desarrolla
  lexicon: HALOT
  rationale: El verbo פרח puede abarcar florecer, brotar y prosperar. En español, «florece» preserva la imagen vegetal del paralelismo con la palmera y mantiene el tono poético sin sobreinterpretar la metáfora.
- source_word: כְּאֶרֶז
  english_pob_choice: like a cedar
  chosen_spanish: como un cedro
  alternatives_spanish:
  - como el cedro
  - como un cedro del Líbano
  lexicon: HALOT
  rationale: La comparación con un cedro se expresa de forma natural con artículo indefinido en español. «Como un cedro» mantiene la imagen del árbol sin forzar una referencia más específica de la necesaria en esta línea.
- source_word: בַּלְּבָנוֹן
  english_pob_choice: in Lebanon
  chosen_spanish: en el Líbano
  alternatives_spanish:
  - del Líbano
  - en Lebanon
  lexicon: HALOT
  rationale: La preposición ב indica ubicación. «En el Líbano» es la manera normal y fiel de preservar esa localización geográfica, evitando convertirla en una relación posesiva («del Líbano») que el hebreo no exige.
- source_word: יִשְׂגֶּה
  english_pob_choice: he grows
  chosen_spanish: crece
  alternatives_spanish:
  - crece alto
  - prospera
  - se eleva
  lexicon: HALOT
  rationale: El verbo שׂגה/שׂגא puede expresar crecer, aumentar o hacerse grande. «Crece» es breve, fiel y poético; además, evita añadir matices no necesarios, aunque el contexto del cedro permite oír una idea de crecimiento vigoroso.
theological_decisions:
- issue: Valor representativo del singular «el justo»
  english_pob_reading: The singular Hebrew can function representatively.
  chosen_spanish_reading: 'El singular se mantiene representativo: «el justo» puede abarcar al justo como tipo o figura colectiva.'
  alternative_spanish_readings:
  - los justos
  - un justo
  rationale: El hebreo singular puede funcionar de modo representativo, y el español permite conservar esa ambigüedad sin perder naturalidad. «El justo» refleja mejor la forma singular substantivada que un plural genérico, y evita introducir una individuación indefinida más fuerte que la del texto.
  doctrine_reference: Salmos 1; uso representativo del singular en la poesía hebrea
- issue: Intensidad del verbo final
  english_pob_reading: Or 'he increases' or 'he thrives' for the final verb; the Hebrew conveys vigorous growth or becoming great.
  chosen_spanish_reading: «Crece» deja abierta la idea de aumento vigoroso, grandeza y desarrollo, sin fijarla demasiado.
  alternative_spanish_readings:
  - prospera
  - se engrandece
  - se eleva
  rationale: 'El verbo hebreo tiene un campo semántico amplio: crecer, aumentar, hacerse grande. En español, «crece» permite conservar esa amplitud y la progresión poética con el cedro, sin resolver prematuramente la tensión entre crecimiento físico, prosperidad y grandeza.'
  doctrine_reference: Poética hebrea; paralelismo semántico en Salmos
translation_notes:
  revision_awareness: 'El inglés POB revisó el primer borrador para eliminar «man» y simplificar el verbo final de «grows tall» a «grows», por mayor cercanía al hebreo. La versión española sigue esa línea: evita añadir «varón» y usa «crece», manteniendo el paralelo poético con la palmera y el cedro sin sobreespecificar.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el tono poético y sintético del hebreo, evitando expansiones explicativas en el cuerpo principal.
  - «Palmera» y «cedro» son imágenes botánicas concretas; no se añaden glosas en el texto para no debilitar el paralelismo.
  - Las notas preservan la tensión representativa del singular y la amplitud semántica del verbo final.
