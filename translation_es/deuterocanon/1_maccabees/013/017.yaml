review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: Simón discernió el engaño, aun así envió el pago y los muchachos, para evitar provocar una gran hostilidad. Sin embargo, faltan las notas léxicas que el rastro inglés preserva para ἀργύριον (''dinero'' / ''plata'') y para la flexibilidad relacional de πρὸς τὸν λαόν. Además, en español ''para no'' funciona, pero ''no fuera a suscitar'' expresa mejor el matiz preventivo de μή ποτε.'
  spanish_quality_summary: 'El español es claro y natural, con buen registro narrativo. ''Con engaño'', ''envió el dinero y a los muchachos'' y ''gran hostilidad'' son legibles y dignos. La reparación necesaria es menor: añadir las notas obligadas y afinar la cláusula final para reflejar mejor el temor preventivo.'
  glossary_alignment: No hay términos del glosario maestro especialmente activados aquí. Las decisiones 'Simón', 'dinero', 'muchachos' y 'hostilidad' son compatibles con el proyecto. Conviene conservar la alternativa 'plata' en nota, como ya hizo el POB inglés.
  issues:
  - severity: medium
    issue: Faltan notas para alternativas léxicas preservadas en el POB inglés.
    rationale: El inglés documenta una nota para ἀργύριον ('silver'/'money') y otra para πρὸς τὸν λαόν por su flexibilidad relacional. La revisión española debe preservarlas o justificar claramente su omisión; aquí conviene preservarlas.
  - severity: low
    issue: La expresión 'para no suscitar' es aceptable, pero no refleja tan claramente el matiz preventivo de μή ποτε.
    rationale: Una formulación como 'no fuera a suscitar' o 'para que no provocara' comunica mejor el sentido de evitar un posible resultado temido.
  revised_spanish_text: Y Simón reconoció que le hablaban con engaño; sin embargo, envió el dinero[a] y a los muchachos, no fuera a suscitar una gran hostilidad contra el pueblo[b].
  revised_footnotes:
  - marker: a
    text: O 'la plata'. El griego ἀργύριον puede denotar plata como metal o dinero/plata de pago.
    reason: lexical_alternative
  - marker: b
    text: O 'hacia el pueblo' o 'con el pueblo'. La frase griega πρὸς τὸν λαόν es relacionalmente flexible; aquí se traduce como hostilidad dirigida contra el pueblo.
    reason: alternative_reading
  revision_rationale: Se conservó el sentido básico del borrador, pero se añadieron las notas necesarias para reflejar las alternativas léxicas y sintácticas documentadas en el POB inglés. También se ajustó 'para no suscitar' a 'no fuera a suscitar' para reproducir con más precisión el matiz preventivo de μή ποτε en español natural.
