review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura paralela del hebreo: «tu boca ... y tu lengua ...», y refleja adecuadamente שָׁלַחְתָּ como una liberación desenfrenada del habla hacia el mal. También mantiene bien מִרְמָה como «engaño». Sin embargo, «se adhiere» para תַּצְמִיד introduce un matiz más estático o medio/reflexivo que el hebreo causativo y que la auditoría inglesa buscó conservar con «frames» tras revisar «harnesses». En español conviene una formulación más activa como «trama engaño», que comunica mejor el uso de la lengua para producir/disponer el engaño sin alejarse del campo semántico de unir/encaminar la lengua al engaño.'
  spanish_quality_summary: El español es claro y digno, pero «Has soltado tu boca para el mal» suena algo rígido; aun así sigue siendo entendible y bastante fiel. El problema principal de naturalidad y precisión está en «tu lengua se adhiere al engaño», que suena poco idiomático en poesía bíblica española. «Trama engaño» lee con mayor naturalidad y fuerza poética. Además, las notas deben ajustarse al nuevo giro y mantener alternativas significativas sin crear desajuste con el texto principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Boca», «lengua» y «engaño» están bien alineados. El ajuste propuesto afecta solo la representación verbal de תַּצְמִיד para reflejar mejor la decisión léxica documentada y una expresión española más natural.
  issues:
  - severity: medium
    issue: «se adhiere al engaño» debilita el valor activo de תַּצְמִיד
    rationale: El hebreo hiphil expresa hacer unir/adjuntar; la auditoría inglesa lo movió hacia «frames» para evitar una lectura demasiado mecánica pero conservar la actividad de la lengua en producir engaño. «Se adhiere» suena más pasivo o descriptivo.
  - severity: low
    issue: La nota [b] ya no representa la mejor alternativa española para el sentido principal
    rationale: Si el texto principal se corrige a una forma más activa, las alternativas deben incluir opciones cercanas al sentido de apegarse/unirse, no quedar como si fueran explicación del texto anterior.
  revised_spanish_text: Has soltado tu boca para el mal[a], y tu lengua trama engaño[b].
  revised_footnotes:
  - marker: a
    text: 'O: «has dado rienda suelta a tu boca para el mal».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tu lengua se apega al engaño» o «tu lengua se une al engaño».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «se adhiere al engaño» por «trama engaño» para reflejar mejor el sentido activo de תַּצְמִיד en contexto de habla engañosa y para lograr una expresión española más natural y poética. Se conservan en nota alternativas más literales que preservan la idea de apego o unión al engaño. El resto del versículo puede mantenerse como fiel y legible.
