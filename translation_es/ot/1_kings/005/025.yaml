    text: '''Aceite batido'' se refiere a aceite de alta calidad obtenido de aceitunas machacadas o trituradas, no por un proceso posterior de prensado.'
    reason: cultural_note
  revision_rationale: 'La revisión corrige dos puntos para reflejar mejor el hebreo y mejorar la legibilidad del español: se cambia ''se lo daría'' por ''solía darle'' para expresar hábito anual, y se pluraliza la unidad como ''cores'' para un español más natural. Se conservan las notas y el sentido de ''su casa'' con la aclaración contextual sobre la casa real de Hiram.'
