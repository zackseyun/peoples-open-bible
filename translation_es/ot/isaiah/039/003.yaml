translation:
  language: es
  text: 'Entonces Isaías el profeta vino al rey Ezequías y le dijo: «¿Qué dijeron estos hombres, y de dónde vinieron a ti?» Y Ezequías dijo: «Vinieron a mí de una tierra lejana, de Babilonia».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: En este contexto narrativo con אֶל + persona, la idea es desplazarse hasta alguien; en español, «fue a» con el complemento expresa con naturalidad el movimiento hacia el rey sin perder el sentido de llegada al destinatario.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  lexicon: HALOT
  rationale: Nombre propio estándar del profeta en español, siguiendo la transliteración usual.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: El título definido identifica a Isaías por su oficio profético; «el profeta» es directo y fiel.
- source_word: הַמֶּלֶךְ
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: Se conserva el artículo definido del hebreo y se mantiene la referencia al cargo real sin añadir una fórmula más libre.
- source_word: חִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  lexicon: HALOT
  rationale: Forma española tradicional y ampliamente reconocible del nombre propio.
- source_word: מָה אָמְרוּ
  english_pob_choice: What did ... say
  chosen_spanish: ¿Qué dijeron ...?
  alternatives_spanish:
  - ¿Qué han dicho ...?
  lexicon: HALOT
  rationale: La pregunta en español requiere pasado simple para reflejar la acción en el relato, como en la traducción inglesa auditada.
- source_word: הָאֲנָשִׁים הָאֵלֶּה
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estas personas
  lexicon: HALOT
  rationale: אֲנָשִׁים es masculino plural; «hombres» conserva el valor gramatical y el sentido de los emisarios varones.
- source_word: וּמֵאַיִן
  english_pob_choice: and where ... from
  chosen_spanish: ¿y de dónde ...?
  alternatives_spanish:
  - ¿y de qué lugar ...?
  lexicon: HALOT
  rationale: El interrogativo de origen se expresa de modo natural en español con «de dónde», manteniendo la relación de procedencia.
- source_word: יָבֹאוּ אֵלֶיךָ
  english_pob_choice: did they come to you
  chosen_spanish: vinieron a ti
  alternatives_spanish:
  - han venido a ti
  - llegaron a ti
  lexicon: HALOT
  rationale: Aunque formalmente imperfecto, aquí funciona como pregunta sobre su procedencia y llegada; el pretérito «vinieron» comunica bien ese hecho consumado.
- source_word: מֵאֶרֶץ רְחוֹקָה
  english_pob_choice: from a distant land
  chosen_spanish: de una tierra lejana
  alternatives_spanish:
  - de una tierra distante
  - de un país lejano
  lexicon: HALOT
  rationale: «Tierra» conserva el alcance geográfico de אֶרֶץ sin imponer «país»; «lejana» expresa el adjetivo de distancia de manera natural.
- source_word: בָּאוּ אֵלַי
  english_pob_choice: They came to me
  chosen_spanish: Vinieron a mí
  alternatives_spanish:
  - Han venido a mí
  lexicon: HALOT
  rationale: La respuesta de Ezequías describe llegada efectiva; el pretérito simple en español es lo más natural y sigue la lectura narrativa del inglés auditado.
- source_word: מִבָּבֶל
  english_pob_choice: from Babylon
  chosen_spanish: de Babilonia
  lexicon: HALOT
  rationale: Nombre propio estándar en español; se mantiene la procedencia geográfica explícita.
translation_notes:
  revision_awareness: El texto base inglés ya ajustó el orden de la pregunta para reflejar con más cercanía «de dónde vinieron a ti». En español se siguió esa misma relación sintáctica con «¿y de dónde vinieron a ti?», sin introducir notas textuales porque no hay variante relevante en el paquete fuente ni tensión semántica adicional que deba conservarse.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y contemporáneo, sin calcos innecesarios.
  - «Babilonia» se conserva como topónimo estándar; no se reemplaza por una glosa.
  - No se añadieron notas de pie porque el versículo no presenta variantes textuales ni ambigüedades doctrinales significativas en el material provisto.
