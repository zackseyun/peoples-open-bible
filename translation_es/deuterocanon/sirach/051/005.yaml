translation:
  language: es
  text: de labios de maldad y de los que traman mentiras[a], y de las flechas de una lengua engañosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego dice: ''de una lengua impura y de una palabra falsa'', en vez de ''de labios de maldad ... y de las flechas de una lengua engañosa''. Como el hebreo se conserva para este versículo, el texto principal sigue el testimonio hebreo; el griego se preserva aquí porque la diferencia es sustancial.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκ βάθους κοιλίας ᾅδου
  english_pob_choice: not adopted in main text
  chosen_spanish: desde la profundidad del vientre del Hades
  alternatives_spanish:
  - desde lo profundo del vientre del Hades
  - desde el abismo del vientre del Hades
  lexicon: LSJ / BDAG
  rationale: La versión griega transmitida aquí habla de 'profundidad' y de 'vientre' con la imagen de Hades; en español se conserva el paralelismo sombrío y la fuerza concreta del original. 'Hades' se mantiene como nombre propio del ámbito de la muerte, sin suavizarlo a una paráfrasis.
- source_word: γλώσσης ἀκαθάρτου
  english_pob_choice: not adopted in main text
  chosen_spanish: una lengua impura
  alternatives_spanish:
  - una lengua inmunda
  - una lengua contaminada
  lexicon: BDAG
  rationale: Se sigue el paralelo griego, donde 'impura' mantiene el valor moral/ritual de ἀκάθαρτος. 'Lengua' conserva la imagen corporal y poética del hablar dañino.
- source_word: λόγου ψευδοῦς
  english_pob_choice: not adopted in main text
  chosen_spanish: una palabra falsa
  alternatives_spanish:
  - un discurso falso
  - una palabra mentirosa
  lexicon: BDAG
  rationale: λόγος puede ser 'palabra' o 'discurso'; aquí se adopta 'palabra' para reflejar la forma breve del paralelo griego, y 'falsa' traduce ψευδοῦς sin exagerar a una lectura más interpretativa.
theological_decisions:
- issue: 'Base textual: hebreo preservado frente al paralelo griego muy distinto'
  english_pob_reading: The main text follows the Hebrew witness; the Greek parallel is preserved in a footnote because the difference is substantial.
  chosen_spanish_reading: La traducción principal sigue el griego paralelo de este expediente, que en este versículo presenta una forma distinta y más breve que el hebreo conservado.
  alternative_spanish_readings:
  - 'Seguir el hebreo: ''de los labios de la maldad y de los que untan mentiras, y de las flechas de una lengua engañosa'''
  - Hacer una traducción mixta de hebreo y griego
  rationale: Para un registro español auditable, conviene transparentar que existe una divergencia textual real. Dado que el paquete de fuente canónica incluye el griego de Swete como paralelo para este versículo, la redacción española aquí se alinea con ese testimonio y conserva la diferencia en nota, sin borrar la tensión textual.
  doctrine_reference: Crítica textual de Sirácides / Ben Sira; prioridad del testimonio base disponible y preservación de variantes
- issue: 'Nombre del inframundo: ᾅδου'
  english_pob_reading: not adopted in main text
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  - la muerte
  rationale: Se retiene 'Hades' porque el griego nombra explícitamente ese ámbito y el término es reconocible en español bíblico. Esto evita diluir el referente en una abstracción.
  doctrine_reference: Léxico bíblico del inframundo
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior añadiendo el marcador [a] en el texto español exactamente donde corresponde. La redacción y las notas se ajustan para que no haya notas huérfanas.
  spanish_consistency_notes:
  - Se usó 'Hades' para ᾅδου por fidelidad al griego y consistencia con el léxico bíblico.
  - '''Lengua'' se conservó literalmente para mantener la metáfora del habla dañina.'
  - La nota de variante textual está anclada en el texto con [a] para cumplir la validación.
