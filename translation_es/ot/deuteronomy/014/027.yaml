  to: Y al levita que está en tus ciudades[a][b][c] no lo descuides, porque no tiene parte ni herencia contigo.
  rationale: Se ajusta el modismo a un español más natural («en tus ciudades») mientras la nota conserva la imagen literal hebrea. También se mejora la puntuación y la redacción de la nota cultural sin alterar el sentido ni las decisiones léxicas principales.
