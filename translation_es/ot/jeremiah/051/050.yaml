review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: vocativo a los escapados, doble imperativo de salir/no detenerse, recuerdo de Yahvé desde la distancia, y la imagen idiomática de Jerusalén sobre el corazón. Sin embargo, «a su corazón» debilita la correspondencia con עַל לְבַבְכֶם (''sobre su corazón'') y «suba» suena menos natural en español que una formulación que conserve la metáfora con mejor legibilidad.'
  spanish_quality_summary: 'El español es claro y mayormente natural. «Ustedes que han escapado… vayan» funciona bien en registro neutral. La principal mejora es idiomática: «que Jerusalén suba sobre su corazón» preserva mejor el hebreo, pero en español natural y digno conviene «que Jerusalén les suba al corazón», que mantiene la metáfora y evita una construcción algo rígida. También conviene pulir la nota: «venga a la mente» es más idiomático que «venga a su mente», y «desde afar» en alternativas léxicas es un anglicismo en la documentación.'
  glossary_alignment: 'Alineado con la terminología del proyecto: יְהוָה se traduce correctamente como «Yahvé»; Jerusalén se mantiene como nombre propio estándar; no hay conflicto terminológico mayor. La revisión propuesta no altera decisiones doctrinales, solo mejora la fidelidad idiomática de la cláusula final.'
  issues:
  - severity: medium
    issue: La frase «que Jerusalén suba a su corazón» no refleja plenamente la preposición hebrea עַל ('sobre').
    rationale: El original dice literalmente «suba sobre vuestro corazón». Aunque la metáfora no debe calcarsе torpemente, «a su corazón» reduce la imagen espacial preservada por el POB inglés ('come upon your heart').
  - severity: medium
    issue: La cláusula final suena algo forzada en español.
    rationale: «Suba a su corazón» es comprensible, pero menos natural y menos digna que «les suba al corazón», que mantiene el matiz volitivo e idiomático con mejor fluidez.
  - severity: low
    issue: 'La nota usa una alternativa algo menos idiomática: «venga a su mente».'
    rationale: En español general suena mejor «venga a la mente». No cambia el sentido, pero mejora la legibilidad.
  - severity: low
    issue: En la documentación léxica aparece «desde afar».
    rationale: Es un anglicismo en español y debería reemplazarse por «de lejos» o «desde lejos» en futuras limpiezas editoriales, aunque no afecta el texto bíblico principal.
  revised_spanish_text: Ustedes que han escapado de la espada[a], vayan; no se queden quietos. Recuerden a Yahvé desde lejos, y que Jerusalén les suba al corazón.
  revised_footnotes:
  - marker: a
    text: 'O: «desde lejos, recuerden a Yahvé, y que Jerusalén venga a la mente». El hebreo dice literalmente: «que Jerusalén suba sobre vuestro corazón», un modismo para recordar con intención o preocuparse interiormente por ella.'
    reason: lexical_alternative
  revision_rationale: Se conserva el sentido del original y la decisión del POB de mantener la metáfora del hebreo, pero se ajusta la última cláusula a un español más natural y más cercano a עַל לְבַבְכֶם mediante «les suba al corazón». También se pule la nota para que su alternativa suene idiomática en español.
