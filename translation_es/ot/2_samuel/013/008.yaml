    rationale: En el POB inglés, [a] explica la posible relación entre el verbo/nombre raros y ‘heart-shaped cakes’, mientras [b] explica que בשל puede significar específicamente ‘boil’. El borrador español pone [a] sobre «Amnón» con una nota no respaldada por el audit trail y usa [b] para la nota de ‘corazón’, omitiendo la alternativa de ‘hervir’.
