    text: Or 'before our God.' The Greek more literally says 'before the face of our God,' a vivid expression for being in God's presence.
    reason: lexical_alternative
  - marker: b
    text: Or 'it is not lawful' or 'it is not fitting' for any of the people even to touch them with their hands.
    reason: lexical_alternative
