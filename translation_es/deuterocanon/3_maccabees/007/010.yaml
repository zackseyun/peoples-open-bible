    text: Or 'the return' instead of 'the departure'; the Greek term can be understood from either the perspective of leaving the present place or going back to a prior one.
    reason: lexical_alternative
  - marker: b
    text: Literally 'those from the race of the Jews.'
    reason: lexical_alternative
  - marker: c
    text: Or 'might suffer at their hands the punishment that was due.'
    reason: lexical_alternative
