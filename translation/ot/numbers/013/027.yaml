id: NUM.13.27
reference: Numbers 13:27
source:
  edition: WLC
  text: וַ/יְסַפְּרוּ ל/וֹ֙ וַ/יֹּ֣אמְר֔וּ בָּ֕אנוּ אֶל הָ/אָ֖רֶץ אֲשֶׁ֣ר שְׁלַחְתָּ֑/נוּ וְ֠/גַם זָבַ֨ת חָלָ֥ב וּ/דְבַ֛שׁ הִ֖וא וְ/זֶה פִּרְיָֽ/הּ־־־׃
translation:
  text: They reported to him and said[a], “We came into the land to which you sent us. It truly flows with milk and honey, and this is its fruit.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'And indeed it flows with milk and honey.' The Hebrew וְגַם adds emphasis to the statement about the land’s abundance.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְסַפְּרוּ
  chosen: They reported
  alternatives:
  - They recounted
  - They told
  lexicon: HALOT
  rationale: The verb ספר in the piel commonly means to recount or report. 'Reported' fits the formal setting of the spies giving an account to Moses and reads naturally in English.
- source_word: לוֹ
  chosen: to him
  alternatives:
  - to Moses
  lexicon: HALOT
  rationale: The pronominal suffix is simply 'to him.' The referent is Moses from context, but the Hebrew uses the pronoun, so the translation preserves that rather than substituting the name.
- source_word: וַיֹּאמְרוּ
  chosen: and said
  alternatives:
  - saying
  lexicon: HALOT
  rationale: A standard narrative continuation. 'And said' preserves the Hebrew sequence without unnecessary paraphrase.
- source_word: בָּאנוּ
  chosen: We came into
  alternatives:
  - We went into
  - We entered
  lexicon: HALOT
  rationale: The verb בוא means 'come/enter.' 'Came into' reflects the Hebrew form straightforwardly and works idiomatically with 'the land.'
- source_word: אֶל הָאָרֶץ אֲשֶׁר שְׁלַחְתָּנוּ
  chosen: the land to which you sent us
  alternatives:
  - the land where you sent us
  - the land that you sent us to
  lexicon: HALOT
  rationale: This rendering preserves both the destination marker אֶל and the relative clause while producing natural English.
- source_word: וְגַם
  chosen: It truly
  alternatives:
  - And indeed
  - Moreover it
  lexicon: HALOT
  rationale: The conjunction plus adverb adds emphasis to the positive report. 'It truly' captures the affirming force in smooth English before the predicate.
- source_word: זָבַת חָלָב וּדְבַשׁ
  chosen: flows with milk and honey
  alternatives:
  - is flowing with milk and honey
  lexicon: HALOT
  rationale: This is a conventional Hebrew idiom for agricultural abundance. 'Flows with milk and honey' is both accurate and established English, and here it reflects the participial/adjectival sense naturally.
- source_word: הִוא
  chosen: It
  alternatives:
  - that land
  lexicon: HALOT
  rationale: The feminine pronoun refers back to 'the land.' English naturally uses 'it' here.
- source_word: וְזֶה פִּרְיָהּ
  chosen: and this is its fruit
  alternatives:
  - and this was its fruit
  - and here is its fruit
  lexicon: HALOT
  rationale: The demonstrative plus noun presents the fruit as evidence. 'This is its fruit' is the most direct rendering and suits the likely deictic gesture.
