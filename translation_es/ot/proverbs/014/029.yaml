translation:
  language: es
  text: El que tarda en airarse tiene gran entendimiento, pero el iracundo[a] enaltece la necedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «corto de espíritu»; es decir, impaciente o de temperamento irritable.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶךְ אַפַּיִם
  english_pob_choice: one who is slow to anger
  chosen_spanish: el que tarda en airarse
  alternatives_spanish:
  - el paciente
  - el que es lento para la ira
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y describe paciencia o lentitud para la ira. «Tarda en airarse» conserva bien la imagen verbal y suena natural en español; «paciente» es posible, pero pierde parte del movimiento del original.
- source_word: רַב תְּבוּנָה
  english_pob_choice: has great understanding
  chosen_spanish: tiene gran entendimiento
  alternatives_spanish:
  - abunda en entendimiento
  - tiene mucho entendimiento
  lexicon: HALOT
  rationale: רַב funciona aquí de modo predicativo con תְּבוּנָה. «Tiene gran entendimiento» expresa abundancia de discernimiento con un español claro y digno, sin forzar una construcción extraña.
- source_word: תְּבוּנָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - perspicacia
  lexicon: HALOT
  rationale: En literatura sapiencial, תְּבוּנָה puede ser entendimiento, discernimiento o insight. «Entendimiento» es la opción más directa y estable en español bíblico, y conserva el valor intelectual-moral del término.
- source_word: קְצַר רוּחַ
  english_pob_choice: one who is quick-tempered
  chosen_spanish: el de espíritu impaciente
  alternatives_spanish:
  - el de ánimo corto
  - el de espíritu corto
  - el impaciente
  lexicon: HALOT
  rationale: La imagen literal es «corto de espíritu», pero la revisión inglesa ya determinó que el sentido contextual es «quick-tempered». En español, «de espíritu impaciente» conserva la referencia al espíritu y comunica la disposición irritable sin caer en un calco oscuro.
- source_word: מֵרִים
  english_pob_choice: exalts
  chosen_spanish: enaltece
  alternatives_spanish:
  - exalta
  - levanta
  lexicon: HALOT
  rationale: El participio hifil de רום mantiene la idea de elevar o levantar. «Enaltece» reproduce bien ese movimiento metafórico en un registro natural de español; «exalta» sería posible, pero puede sonar más abstracto o eclesiástico.
- source_word: אִוֶּלֶת
  english_pob_choice: folly
  chosen_spanish: la necedad
  alternatives_spanish:
  - la insensatez
  - la locura
  lexicon: HALOT
  rationale: En Proverbios, אִוֶּלֶת designa necedad como categoría moral e intelectual. «Necedad» es un equivalente sólido y frecuente en español bíblico; «insensatez» también funciona, pero «necedad» mantiene mejor el peso proverbial.
translation_notes:
  revision_awareness: La versión inglesa más reciente revisó קְצַר רוּחַ desde una traducción más literal («short of spirit») a «quick-tempered». La redacción española sigue esa revisión y la integra de forma idiomática, sin perder la imagen del espíritu. También se mantuvo la estructura antitética del proverbio y el verbo metafórico para מֵרִים.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras máscaras porque no aparece el nombre divino en este versículo.
  - Se eligió «entendimiento» para תְּבוּנָה por consistencia con el uso sapiencial de la colección.
  - «Necedad» preserva el registro moral de Proverbios mejor que una paráfrasis más débil.
  - La nota al pie conserva la alternativa literal para no borrar la tensión entre imagen hebrea y sentido contextual.
