translation:
  language: es
  text: Y el faraón Necao lo encarceló en Ribla, en la tierra de Hamat[a], para que no reinara en Jerusalén[b]; e impuso sobre la tierra un tributo[c] de cien talentos de plata y un talento de oro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘lo ató’ o ‘lo confinó’.
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea también puede traducirse ‘de reinar en Jerusalén’.
    reason: alternative_reading
  - marker: c
    text: O ‘una pena’ o ‘una multa’ en lugar de ‘un tributo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאַסְרֵהוּ
  english_pob_choice: imprisoned him
  chosen_spanish: lo encarceló
  alternatives_spanish:
  - lo ató
  - lo confinó
  - lo apresó
  lexicon: HALOT
  rationale: El verbo אסר puede expresar tanto ‘atar’ como ‘encarcelar’ según el contexto. Como el audit trail inglés eligió ‘imprisoned him’ para comunicar la coerción política en forma natural, ‘lo encarceló’ conserva esa fuerza sin perder la posibilidad básica de restricción física.
- source_word: פַרְעֹה נְכֹה
  english_pob_choice: Pharaoh Neco
  chosen_spanish: el faraón Necao
  alternatives_spanish:
  - faraón Neco
  - el faraón Neco
  - el faraón Necó
  lexicon: transliteración convencional
  rationale: Se mantiene el título real y el nombre propio transliterado. ‘Necao’ es una forma española comprensible y estable; evita modernizar innecesariamente el nombre con una grafía menos natural para el lector hispano.
- source_word: בְרִבְלָה
  english_pob_choice: at Riblah
  chosen_spanish: en Ribla
  alternatives_spanish:
  - en Riblah
  - en la Ribla
  lexicon: topónimo
  rationale: Como lugar concreto, en español natural se prefiere la preposición ‘en’ para señalar ubicación. Se conserva la forma del topónimo sin añadir elementos interpretativos.
- source_word: בְּאֶרֶץ חֲמָת
  english_pob_choice: in the land of Hamath
  chosen_spanish: en la tierra de Hamat
  alternatives_spanish:
  - en el territorio de Hamat
  - en la región de Hamat
  lexicon: HALOT
  rationale: ‘אֶרֶץ’ aquí designa una región geográfica. ‘Tierra de Hamat’ refleja con fidelidad el valor territorial del hebreo y coincide con el registro bíblico en español.
- source_word: במלך בִּירוּשָׁלָם
  english_pob_choice: so that he might not reign in Jerusalem
  chosen_spanish: para que no reinara en Jerusalén
  alternatives_spanish:
  - para que no reinase en Jerusalén
  - de modo que no reinara en Jerusalén
  - para que no gobernara en Jerusalén
  lexicon: HALOT
  rationale: La forma hebrea con prefijo ב + infinitivo tiene sentido resultativo/preventivo. En español, ‘para que no reinara’ transmite ese resultado sin sugerir simplemente un valor temporal, como advierte el audit trail inglés.
- source_word: וַיִּתֶּן עֹנֶשׁ
  english_pob_choice: he imposed ... a tribute
  chosen_spanish: impuso ... una multa
  alternatives_spanish:
  - impuso ... un tributo
  - impuso ... una pena
  - impuso ... una sanción
  lexicon: HALOT
  rationale: עֹנֶשׁ puede significar pena, multa o pago impuesto. Aunque el inglés optó por ‘tribute’ por el carácter político-económico del pasaje, en español ‘multa’ comunica mejor la idea de un cobro forzoso impuesto como castigo, sin ocultar la tensión léxica del término.
- source_word: עַל הָאָרֶץ
  english_pob_choice: on the land
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el país
  - sobre la tierra del país
  - sobre la nación
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de una carga o gravamen ‘sobre’ el territorio. ‘Tierra’ mantiene el referente geopolítico del reino sin sobreespecificar a ‘pueblo’.
- source_word: מֵאָה כִכַּר כֶּסֶף
  english_pob_choice: a hundred talents of silver
  chosen_spanish: cien talentos de plata
  alternatives_spanish:
  - cien medidas de plata
  - cien talentos de dinero
  lexicon: HALOT
  rationale: ‘כִכָּר’ se conserva como ‘talento’, unidad antigua de peso ya asentada en español bíblico. La cifra y el metal quedan transparentes y sin conversión moderna interpretativa.
- source_word: וְכִכַּר זָהָב
  english_pob_choice: and a talent of gold
  chosen_spanish: y un talento de oro
  alternatives_spanish:
  - y un talento de oro fino
  - y otro talento de oro
  lexicon: HALOT
  rationale: Se preserva el singular del hebreo y la misma unidad de peso usada para la plata. ‘Oro’ basta para el sentido; añadir ‘fino’ introduciría una precisión no presente en el texto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés. Se mantiene la ambigüedad léxica relevante en עֹנֶשׁ mediante una nota, y se refleja la lectura preventiva de במלך como finalidad/resultativo, no como simple referencia temporal. No se aplicaron revisiones posteriores al texto fuente.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma predeterminada del proyecto solo cuando aparece el tetragrámaton; en este versículo no ocurre.
  - Se conserva la unidad antigua ‘talento’ para כִכָּר por coherencia con el proyecto y con el inglés POB.
  - ‘Tierra’ se usa en sentido territorial/geopolítico, no como referencia al suelo físico.
  - Los nombres propios se mantienen transliterados con ortografía española natural cuando existe forma establecida.
