    reason: lexical_alternative
lexical_decisions:
- source_word: אָז
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - así
  - entonces mismo
  - luego
  lexicon: HALOT
  rationale: Marca consecuencia temporal y argumentativa, manteniendo la continuidad del razonamiento de Job con un adverbio natural en español.
- source_word: בַּשַּׁחַת
  english_pob_choice: into the pit
  chosen_spanish: en el pozo
  alternatives_spanish:
  - en la fosa
  - en el hoyo
  - en el foso
  lexicon: HALOT
  rationale: El hebreo permite el campo semántico de pozo/fosa/foso/ruina. En español, 'pozo' conserva la imagen concreta y es más natural que una calca rígida; se evita explicitar 'destrucción' porque el contexto mantiene la metáfora física.
- source_word: תִּטְבְּלֵנִי
  english_pob_choice: you would plunge me
  chosen_spanish: me sumergirías
  alternatives_spanish:
  - me hundirías
  - me sumergirías en
  - me sumirías
  lexicon: HALOT
  rationale: De טבל, 'sumergir / mojar / hundir'. Aquí el verbo expresa una acción violenta contra alguien ya imaginariamente limpio; 'sumergirías' conserva el valor de inmersión y el tono de la imagen.
- source_word: וְתִעֲבוּנִי
  english_pob_choice: would abhor me
  chosen_spanish: me aborrecerían
  alternatives_spanish:
  - me detestarían
  - me abominarían
  - me tendrían asco
  lexicon: HALOT
  rationale: Se mantiene la fuerza de תעב ('aborrecer, detestar'). En español, el plural concuerda mejor con 'mis propias vestiduras', que es el sujeto inmediato probable del verbo.
- source_word: שַׂלְמוֹתָי
  english_pob_choice: my own clothes
  chosen_spanish: mis propias vestiduras
  alternatives_spanish:
  - mis vestidos
  - mi ropa
  - mis prendas
  lexicon: HALOT
  rationale: '''Vestiduras'' preserva el registro elevado y el plural del hebreo; ''propias'' comunica la ironía del hebreo: incluso lo más cercano a Job se volvería contra él.'
theological_decisions:
- issue: La dirección del reproche y la agencia divina implícita
  english_pob_reading: 'The verse addresses God directly: ''you would plunge me.'''
  chosen_spanish_reading: 'Se conserva el tratamiento directo a Dios con la segunda persona: ''me sumergirías''.'
  alternative_spanish_readings:
  - me hallarían en el pozo
  - uno me sumergiría
  - entonces caería en el pozo
  rationale: El hebreo usa segunda persona masculina singular, por lo que la traducción debe mantener la imputación directa. No se suaviza a una forma impersonal, porque eso borraría la tensión teológica del lamento de Job.
  doctrine_reference: Preservar la tensión teológica del discurso de Job sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el auditoría inglesa: se preserva el movimiento figurado de טבל, el campo semántico amplio de שַׁחַת y la revulsión expresada por תעב, sin introducir explicaciones que el hebreo no exige.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del texto porque este versículo no contiene el nombre divino explícito; la segunda persona se conserva como referencia implícita del contexto.
  - Se eligió 'pozo' en el cuerpo y 'fosa' en la nota para reflejar la amplitud semántica sin sobrecargar el texto principal.
  - '''Vestiduras'' conserva un registro bíblico sobrio y evita una banalización de ''ropa'' en un verso de alta intensidad poética.'
