translation:
  language: es
  text: En cuanto a las columnas, la altura de cada columna era de dieciocho codos; un cordel de doce codos la rodeaba, y su grosor era de cuatro dedos[a]; era hueca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuatro dedos de grosor». El hebreo dice literalmente «cuatro dedos», usando una unidad corporal de medida.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעַמּוּדִים
  english_pob_choice: As for the pillars
  chosen_spanish: En cuanto a las columnas
  alternatives_spanish:
  - Y las columnas
  - Las columnas
  lexicon: HALOT
  rationale: El contexto es una descripción inventarial de los dos elementos; «En cuanto a» reproduce bien el valor discursivo introductorio de la conjunción con sustantivo definido, sin añadir contenido. «Columnas» es el equivalente natural en español para עַמּוּדִים en este contexto arquitectónico.
- source_word: שְׁמֹנֶה עֶשְׂרֵה אַמָּה קומה הָעַמּוּד הָאֶחָד
  english_pob_choice: the height of each pillar was eighteen cubits
  chosen_spanish: la altura de cada columna era de dieciocho codos
  alternatives_spanish:
  - una columna medía dieciocho codos de altura
  - la una columna era de dieciocho codos de altura
  lexicon: HALOT
  rationale: El hebreo dice literalmente que «dieciocho codos» era la altura de «la columna una»; en español, «cada columna» expresa con naturalidad que la medida aplica individualmente a ambas columnas, como en la POB inglesa.
- source_word: חוּט
  english_pob_choice: line
  chosen_spanish: cordel
  alternatives_spanish:
  - cuerda
  - línea de medida
  lexicon: HALOT
  rationale: חוּט puede ser cordón, cuerda o línea. «Cordel» mantiene la imagen concreta de un instrumento de medición y suena más natural en español que «línea» aplicada a una circunferencia.
- source_word: שְׁתֵּים עֶשְׂרֵה אַמָּה יְסֻבֶּנּוּ
  english_pob_choice: a line of twelve cubits would go around it
  chosen_spanish: un cordel de doce codos la rodeaba
  alternatives_spanish:
  - un cordel de doce codos la circundaba
  - un cordel de doce codos la envolvía
  lexicon: HALOT
  rationale: סבב aquí expresa rodear/ceñir. «La rodeaba» comunica de modo natural el sentido de circunferencia o medición alrededor de la columna, preservando la imagen original.
- source_word: עָבְיוֹ
  english_pob_choice: its thickness
  chosen_spanish: su grosor
  alternatives_spanish:
  - su espesor
  - su anchura
  lexicon: HALOT
  rationale: En español, «grosor» transmite con claridad el espesor material de la columna. «Espesor» también sería válido, pero «grosor» resulta más fluido en una descripción física.
- source_word: אַרְבַּע אַצְבָּעוֹת
  english_pob_choice: four fingers
  chosen_spanish: cuatro dedos
  alternatives_spanish:
  - cuatro dedos de grosor
  - cuatro dedos de ancho
  lexicon: HALOT
  rationale: La expresión hebrea es literal y usa una unidad corporal de medida. «Cuatro dedos» conserva esa literalidad; el contexto ya aclara que se trata del grosor. Se evita «dedos de ancho» porque añade una especificación no presente en el hebreo.
- source_word: נָבוּב
  english_pob_choice: it was hollow
  chosen_spanish: era hueca
  alternatives_spanish:
  - estaba hueca
  - era vacía por dentro
  lexicon: HALOT
  rationale: נָבוּב describe el estado de hueco de la columna. «Era hueca» es la equivalencia más directa y natural en español, sin perder el valor descriptivo.
translation_notes:
  revision_awareness: El contexto textual y la auditoría inglesa muestran alta concordancia y no registran revisiones sustantivas; se conserva la estructura descriptiva y las decisiones léxicas centrales de la POB inglesa, adaptadas al español con mínima inferencia necesaria para la fluidez.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Columnas» se usa consistentemente para עַמּוּדִים en este contexto arquitectónico.
  - Se preserva la medida concreta «codos» y la unidad corporal «dedos» por fidelidad al hebreo.
  - La cláusula final se formula como oración completa en español para reflejar naturalmente el predicado «hueca».
