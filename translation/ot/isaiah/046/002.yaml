theological_decisions:
- issue: Personification of idols/gods in the final clause
  chosen_reading: Render וְנַפְשָׁם idiomatically as 'they themselves' rather than 'their soul/life'
  alternative_readings:
  - and their soul went into captivity
  - and their life went into captivity
  rationale: The verse mocks the Babylonian gods/idols as powerless; the Hebrew uses נֶפֶשׁ in a way that can denote the self. Rendering it idiomatically preserves the taunt's force in English without introducing a psychological or anthropological claim about the 'soul' of idols.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.
