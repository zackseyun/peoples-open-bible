  to: Por tanto, hemos instruido a los que les escriben en los documentos redactados por Amán[a], quien fue encargado de los asuntos y fue nuestro segundo padre[b], a destruirlos a todos —junto con mujeres y niños—, de raíz, con las espadas de sus enemigos, sin ninguna piedad ni clemencia, el día catorce de Adar, el mes duodécimo, de este año presente.
