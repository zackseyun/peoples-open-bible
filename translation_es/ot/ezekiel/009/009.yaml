  text: וַ/יֹּ֣אמֶר אֵלַ֗/י עֲוֺ֨ן בֵּֽית יִשְׂרָאֵ֤ל וִֽ/יהוּדָה֙ גָּדוֹל֙ בִּ/מְאֹ֣ד מְאֹ֔ד וַ/תִּמָּלֵ֤א הָ/אָ֨רֶץ֙ דָּמִ֔ים וְ/הָ/עִ֖יר מָלְאָ֣ה מֻטֶּ֑ה כִּ֣י אָמְר֗וּ עָזַ֤ב יְהוָה֙ אֶת הָ/אָ֔רֶץ וְ/אֵ֥ין יְהוָ֖ה רֹאֶֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/009/009.yaml
  text: Then he said to me[a], “The iniquity of the house of Israel and Judah is exceedingly great, and the land is filled with bloodshed, and the city is full of perversion. For they say, ‘Yahweh has forsaken the land, and Yahweh does not see.’”
  footnotes:
  - marker: a
    text: Or 'full of perversion' or 'full of distorted justice.' The Hebrew term points to crookedness or the perversion of what is right, likely including judicial injustice.
    reason: lexical_alternative
