revisions:
- from: Entonces el rey mandó a Benaía hijo de Joyadá[a], y él salió y lo hirió de muerte, y murió. Así, el reino quedó establecido en la mano de Salomón.
  to: Entonces el rey mandó a Benaía hijo de Joyadá, y él salió y lo derribó, y murió. Así, el reino quedó establecido en la mano de Salomón[a].
  rationale: Se reemplaza 'lo hirió de muerte' por 'lo derribó' para reflejar mejor פגע ב + resultado posterior explícito 'y murió', evitando redundancia y preservando la secuencia del hebreo y del audit trail inglés. También se reubica la nota al modismo 'en la mano de Salomón', que es el punto realmente explicado por la nota. No se requiere adjudicación adicional.
