  language: es
  text: el milano[a], el halcón y el águila pescadora[b], según su especie,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La identificación precisa de estas aves rapaces es incierta; las traducciones antiguas y modernas varían entre 'milano', 'halcón', 'águila pescadora' y otras aves semejantes.
