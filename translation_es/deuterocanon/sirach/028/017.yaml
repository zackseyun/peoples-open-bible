translation:
  language: es
  text: Un golpe de látigo hace moretones[a], pero un golpe de la lengua quiebra los huesos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «marcas» dejadas por los golpes; el griego se refiere a las señales o moretones causados por un azote.
    reason: lexical_alternative
lexical_decisions:
- source_word: πληγὴ
  english_pob_choice: a blow
  chosen_spanish: un golpe
  alternatives_spanish:
  - un golpe
  - un azote
  - una herida
  lexicon: LSJ
  rationale: El griego enfatiza el impacto del golpe, no solo la lesión resultante. «Golpe» conserva el paralelismo entre una agresión física y una verbal.
- source_word: μάστιγος
  english_pob_choice: from a whip
  chosen_spanish: de látigo
  alternatives_spanish:
  - de un látigo
  - de azote
  - de flagelo
  lexicon: LSJ
  rationale: El genitivo señala el instrumento. «De látigo» es natural en español y mantiene la imagen concreta del castigo corporal.
- source_word: ποιεῖ
  english_pob_choice: makes
  chosen_spanish: produce
  alternatives_spanish:
  - hace
  - causa
  - produce
  lexicon: LSJ
  rationale: El presente gnómico de la sentencia proverbial se expresa bien con «produce», que comunica el efecto inmediato del golpe.
- source_word: μώλωπας
  english_pob_choice: welts
  chosen_spanish: cardenales
  alternatives_spanish:
  - moretones
  - moretones y marcas
  - cardenales
  lexicon: LSJ
  rationale: El término apunta a marcas o moretones causados por golpes. «Cardenales» es una opción clara y natural para lectores hispanohablantes; la nota conserva la alternativa semántica «moretones» que el inglés POB documentó.
- source_word: γλώσσης
  english_pob_choice: the tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - la lengua
  - el habla
  - las palabras de la lengua
  lexicon: LSJ
  rationale: Se conserva la metáfora corporal del texto griego. «Lengua» refleja tanto el órgano como el habla dañina, sin desdibujar la imagen.
- source_word: συγκλάσει
  english_pob_choice: shatters
  chosen_spanish: quiebra
  alternatives_spanish:
  - rompe
  - quebranta
  - hace pedazos
  lexicon: LSJ
  rationale: El verbo expresa una rotura fuerte; «quiebra» conserva la fuerza proverbial y la violencia verbal sin sonar excesivamente literal o áspero en español.
- source_word: ὀστᾶ
  english_pob_choice: bones
  chosen_spanish: los huesos
  alternatives_spanish:
  - huesos
  - los huesos
  lexicon: LSJ
  rationale: El plural es literal. En español, el artículo definido ayuda a la fluidez y mantiene el alcance total de la imagen.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente quitó el futuro «will» para seguir más de cerca el presente griego y mantener el paralelismo; por eso el español usa dos presentes proverbiales: «produce» / «quiebra».'
  spanish_consistency_notes:
  - Se mantuvo «lengua» como metáfora del habla dañina, en paralelo con el látigo físico.
  - Se prefirió un registro claro y proverbial, sin añadir explicaciones que no están en el griego.
  - «Yahvé», «Mesías» y otros términos fijos no aplican en este versículo.
