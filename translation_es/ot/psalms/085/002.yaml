review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del hebreo y las decisiones del POB inglés: רָצִיתָ = «has mostrado favor», יְהוָה = «Yahvé», אַרְצְךָ = «tu tierra», y שַׁבְתָּ שבות יַעֲקֹב = restauración de la situación de Jacob con nota alternativa sobre cautiverio/exilio. Sin embargo, «las fortunas de Jacob» suena poco natural en español bíblico general y puede sugerir riqueza o suerte más que restauración de circunstancias.'
  spanish_quality_summary: 'El texto es claro y mayormente digno, pero requiere un ajuste de idiomaticidad. «Restauraste las fortunas de Jacob» es comprensible como calco del inglés, pero en español amplio de iglesia suena extraño. «Restauraste la suerte de Jacob» comunica mejor la reversión de la situación sin estrechar el sentido al exilio, y mantiene buena legibilidad. La nota también debe pulirse en español: «reversión más amplia de la situación» puede simplificarse a «restauración más amplia de la situación».'
  glossary_alignment: 'Buen alineamiento con la terminología del proyecto: «Yahvé» se preserva correctamente; «Jacob» no se sustituye por «Israel»; «tierra» para אֶרֶץ es adecuado. No hay conflicto doctrinal. El único ajuste es estilístico-lexical en la representación idiomática de שבות.'
  issues:
  - severity: medium
    issue: «las fortunas de Jacob» suena poco idiomático en español
    rationale: Aunque replica bien el inglés «fortunes», en español contemporáneo y eclesial suele entenderse como riqueza o suerte en sentido económico/azaroso. «La suerte de Jacob» es la expresión más estable para el hebraísmo de reversión de circunstancias.
  - severity: low
    issue: Redacción de la nota al pie algo forzada
    rationale: «Reversión más amplia de la situación» es entendible, pero «restauración más amplia de la situación» fluye mejor y sigue expresando el valor semántico del modismo.
  revised_spanish_text: Has mostrado favor a tu tierra[a], oh Yahvé; restauraste la suerte de Jacob.
