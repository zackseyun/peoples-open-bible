translation:
  language: es
  text: 'Había redes de entramado y cordones trenzados de trabajo de cadenas para los capiteles que estaban sobre la parte alta de las columnas: siete para el un capitel[a], y siete para el segundo capitel.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, 'entramados de labor de red y trenzados de labor de cadenas'. El hebreo usa términos artesanales emparejados para describir la ornamentación metálica decorativa de los capiteles de las columnas.
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂבָכִים
  english_pob_choice: nets
  chosen_spanish: redes
  alternatives_spanish:
  - mallas
  - enrejados
  lexicon: HALOT
  rationale: El término hebreo describe estructuras de aspecto red o enrejado en la ornamentación. 'Redes' conserva la imagen concreta sin forzar una equivalencia técnica demasiado especializada.
- source_word: מַעֲשֵׂה שְׂבָכָה
  english_pob_choice: of network
  chosen_spanish: de entramado
  alternatives_spanish:
  - de labor de red
  - de enrejado
  lexicon: HALOT
  rationale: La construcción señala trabajo o hechura en forma de red. 'Entramado' comunica bien la idea de una obra fabricada con patrón reticular y suena natural en español arquitectónico.
- source_word: גְּדִלִים
  english_pob_choice: twisted cords
  chosen_spanish: cordones trenzados
  alternatives_spanish:
  - trenzas
  - cuerdas trenzadas
  lexicon: HALOT
  rationale: El sustantivo puede referirse a elementos trenzados o retorcidos. 'Cordones trenzados' mantiene la materialidad ornamental y evita una imagen floral no asegurada por el hebreo.
- source_word: מַעֲשֵׂה שַׁרְשְׁרֹות
  english_pob_choice: of chainwork
  chosen_spanish: de labor de cadenas
  alternatives_spanish:
  - de cadenas
  - de trabajo en cadena
  lexicon: HALOT
  rationale: La frase constructa describe un trabajo hecho en forma de cadenas. 'Labor de cadenas' conserva el valor de hechura decorativa y evita simplificarlo a 'cadenas' solamente.
- source_word: לַכֹּתָרֹת
  english_pob_choice: for the capitals
  chosen_spanish: para los capiteles
  alternatives_spanish:
  - para las coronas
  - para los chapiteles
  lexicon: HALOT
  rationale: En contexto arquitectónico del templo, 'capiteles' es el equivalente español más claro y preciso para las partes superiores ornamentales de las columnas.
- source_word: אֲשֶׁר עַל רֹאשׁ הָעַמּוּדִים
  english_pob_choice: that were on the tops of the pillars
  chosen_spanish: que estaban sobre la parte superior de las columnas
  alternatives_spanish:
  - que estaban sobre la cima de las columnas
  - que estaban sobre la cabeza de las columnas
  lexicon: HALOT
  rationale: '''Rosh'' literalmente es ''cabeza'', pero en lenguaje arquitectónico español resulta más natural ''parte superior''. Se mantiene la relación espacial del hebreo sin calco duro.'
- source_word: שִׁבְעָה לַכֹּתֶרֶת הָאֶחָת וְשִׁבְעָה לַכֹּתֶרֶת הַשֵּׁנִית
  english_pob_choice: seven for the one capital, and seven for the second capital
  chosen_spanish: siete para un capitel, y siete para el segundo capitel
  alternatives_spanish:
  - siete para el primero y siete para el segundo capitel
  - siete para uno de los capiteles y siete para el otro
  lexicon: HALOT
  rationale: El hebreo distribuye explícitamente siete a cada capitel. La formulación elegida preserva esa distribución de manera clara y natural en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y toma como guía el audit trail en inglés, manteniendo el paralelismo de dos expresiones técnicas para el adorno de los capiteles. Se adoptó un español arquitectónico claro ('capiteles', 'parte superior', 'entramado') para conservar la precisión sin añadir interpretación.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' no aplicable aquí, pues el versículo no contiene el Tetragrámaton.
  - Se eligieron términos arquitectónicos comunes en español bíblico y técnico para evitar oscuridad, especialmente en 'capiteles' y 'entramado'.
  - No se introdujeron notas porque el hebreo aquí presenta una descripción ornamental directa sin variantes textuales relevantes en el paquete provisto.
