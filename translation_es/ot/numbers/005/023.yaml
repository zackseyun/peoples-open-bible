translation:
  language: es
  text: Entonces el sacerdote escribirá estas maldiciones[a] en el rollo y las lavará en el agua amarga[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estas maldiciones juradas». El hebreo puede denotar una maldición asociada con un juramento.
    reason: lexical_alternative
  - marker: b
    text: O «las borrará» / «las eliminará». El verbo hebreo se refiere a borrar o quitar de la superficie las palabras escritas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָתַב
  english_pob_choice: Then ... shall write
  chosen_spanish: Entonces ... escribirá
  alternatives_spanish:
  - Y ... escribirá
  - Luego ... escribirá
  lexicon: HALOT
  rationale: La forma verbal en contexto ritual e instruccional expresa acción secuencial futura; «Entonces ... escribirá» reproduce bien el valor injuntivo sin volverlo pasado ni excesivamente literario.
- source_word: הָאָלֹת הָאֵלֶּה
  english_pob_choice: these curses
  chosen_spanish: estas maldiciones
  alternatives_spanish:
  - estas maldiciones juradas
  - estas maldiciones del juramento
  - estas imprecaciones
  lexicon: HALOT
  rationale: אָלָה puede referirse a maldición, con matiz de maldición vinculada a juramento. En este contexto ritual, «maldiciones» es la opción más clara en español, conservando en nota la posible relación con el juramento.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote
  lexicon: HALOT
  rationale: El término hebreo designa al funcionario cultual. «Sacerdote» es el equivalente natural y fiel en español para este pasaje.
- source_word: בַּסֵּפֶר
  english_pob_choice: in the scroll
  chosen_spanish: en el rollo
  alternatives_spanish:
  - en el libro
  - en un documento
  - en un rollo
  lexicon: HALOT
  rationale: סֵפֶר aquí alude a un escrito material, no a un libro moderno. «Rollo» refleja mejor el soporte antiguo de la escritura.
- source_word: וּמָחָה
  english_pob_choice: and wash them off
  chosen_spanish: y las borrará
  alternatives_spanish:
  - y las borrará del todo
  - y las limpiará
  - y las borrará en el agua
  lexicon: HALOT
  rationale: מחה significa borrar, borrar del todo, borrar de la superficie. En español, «las borrará» comunica la acción sobre lo escrito; el destino hacia el agua queda explícito con la siguiente frase.
- source_word: אֶל
  english_pob_choice: into
  chosen_spanish: en
  alternatives_spanish:
  - dentro de
  - hacia
  - sobre
  lexicon: HALOT
  rationale: El hebreo es direccional. En español, con el verbo «borrar» y el complemento de lugar, «en el agua amarga» mantiene la relación sin forzar una construcción poco natural.
- source_word: מֵי הַמָּרִים
  english_pob_choice: the bitter water
  chosen_spanish: el agua amarga
  alternatives_spanish:
  - las aguas amargas
  - el agua de amargura
  - las aguas de amargura
  lexicon: HALOT
  rationale: La expresión constructa puede leerse literalmente como «aguas amargas» o como «agua amarga» en singular colectivo. En español, el singular es más natural para el líquido ritual y conserva la cualidad de amargura.
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se registran cambios sustanciales respecto del texto inglés auditado, y la solución española conserva el paralelismo ritual y la ambigüedad lexical principal del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino por norma del proyecto, aunque este versículo no lo contiene.
  - Se usa «sacerdote» para הַכֹּהֵן conforme al uso cultual estándar.
  - Se prefiere singular colectivo en «agua amarga» para naturalidad española sin perder el referente ritual.
  - Las notas a y b preservan las alternativas lexicológicas documentadas por el texto fuente y el audit trail inglés.
