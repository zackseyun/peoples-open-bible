translation:
  language: es
  text: Porque la misericordia y la ira están con él[a], y su furor reposa sobre los malvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'La tradición griega lee en cambio: «No avientes con todo viento, y no andes por todo camino; así es el pecador de doble lengua». Esta forma difiere de manera sustancial del hebreo conservado y probablemente refleja otra forma textual del versículo.'
    reason: textual_variant
lexical_decisions:
- source_word: כִּי / For
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque de hecho
  lexicon: HALOT
  rationale: La conjunción introduce la razón del enunciado anterior; «Porque» mantiene claramente la relación causal en español sin añadir matices inexistentes.
- source_word: רַחֲמִים
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - misericordias
  lexicon: HALOT
  rationale: El plural abstracto hebreo expresa misericordia/compasión; «misericordia» es la opción más natural y solemne en español, y conserva el paralelismo con «ira».
- source_word: אַף
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - enojo
  - cólera
  lexicon: HALOT
  rationale: Aunque literalmente es «nariz», el modismo hebreo significa enojo/ira. «Ira» es idiomática y mantiene el contraste con «misericordia».
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - están con él
  - le pertenecen
  lexicon: HALOT
  rationale: La preposición se rinde de forma directa. En contexto, el pronombre se refiere a Dios sin necesidad de explicitarlo en el texto principal.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  lexicon: HALOT
  rationale: El sustantivo plural colectivo se expresa bien como «los malvados». «Los impíos» sería también posible, pero «malvados» es más transparente para lectura amplia.
- source_word: יָנוּחַ
  english_pob_choice: comes to rest
  chosen_spanish: descansa
  alternatives_spanish:
  - se posa
  - se detiene
  - reposa
  lexicon: HALOT
  rationale: El verbo נוח denota reposar/descansar. «Descansa» conserva la idea de asentarse o quedar fijo, con español natural; el sujeto es el furor de Dios.
- source_word: רָגְזוֹ
  english_pob_choice: his wrath
  chosen_spanish: su furor
  alternatives_spanish:
  - su ira
  - su cólera
  lexicon: HALOT
  rationale: El sustantivo puede expresar agitación iracunda; «furor» mantiene un matiz más fuerte y evita repetir mecánicamente «ira» en ambos miembros del paralelismo.
theological_decisions:
- issue: Referente implícito de los sufijos («con él», «su furor»).
  english_pob_reading: God is the implied referent.
  chosen_spanish_reading: El referente implícito es Dios.
  alternative_spanish_readings:
  - Dejar el referente tácito sin aclaración
  - Explicitar «Dios» en el texto principal
  rationale: El contexto inmediato atribuye misericordia e ira a Dios; la traducción conserva el pronombre para no añadir una glosa innecesaria, pero la nota doctrinal reconoce el referente claro.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión y no borrar el referente implícito cuando el contexto lo aclara.'
- issue: Tradición textual hebrea frente a tradición griega muy divergente.
  english_pob_reading: Translate the surviving Hebrew as primary, while preserving the Greek line as an alternative textual tradition in a footnote.
  chosen_spanish_reading: Se traduce el hebreo conservado como texto principal y se preserva la lección griega en nota textual.
  alternative_spanish_readings:
  - Incorporar la versión griega al texto principal
  - Omitir la tradición griega por divergente
  rationale: La primacía del hebreo en Sirácides donde se conserva está alineada con la política del proyecto. La diferencia griega es sustancial y afecta el sentido, por lo que debe quedar visible en una nota.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando sobrevive; usar el griego paralelo como testimonio alternativo real.'
translation_notes:
  revision_awareness: Revisado frente al hebreo conservado de Kahana y al paralelo griego de Swete. Se mantuvo la prioridad del hebreo para el texto principal y se registró la variante griega por su divergencia sustancial, conforme al resumen de revisión sin cambios necesarios.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplica aquí porque el hebreo no contiene el nombre divino explícito; el referente sigue siendo implícito.
  - «Ira» y «furor» se diferenciaron para conservar el paralelismo hebreo sin aplanar ambos términos en un solo equivalente.
  - El pronombre «él» se mantuvo para respetar la referencia implícita y la fluidez natural del español.
