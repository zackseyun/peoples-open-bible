translation:
  language: es
  text: Así que Samuel volvió tras Saúl[a], y Saúl se postró ante Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «adoró a Yahvé». El verbo hebreo puede denotar postrarse o adorar, según el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: went back
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - dio media vuelta y fue tras
  lexicon: HALOT
  rationale: El verbo שׁוב expresa el regreso o la vuelta en la secuencia narrativa. «Volvió» es natural en español y conserva la idea de movimiento de retorno que el inglés POB destacó con «went back».
- source_word: אַחֲרֵי
  english_pob_choice: after
  chosen_spanish: detrás de
  alternatives_spanish:
  - tras
  - después de
  lexicon: HALOT
  rationale: La preposición puede significar «después de» o «detrás de». Aquí sigue el movimiento físico de Samuel con respecto a Saúl, por lo que «detrás de» mantiene la relación espacial sin interpretarla demasiado.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: bowed down
  chosen_spanish: se postró
  alternatives_spanish:
  - adoró
  - se inclinó
  lexicon: HALOT
  rationale: שׁחה denota postración/inclinación corporal. «Se postró» preserva el acto físico que el POB inglés quiso resguardar con «bowed down», sin forzar desde el verbo una traducción ya plenamente cultual.
- source_word: לַֽ/יהוָה
  english_pob_choice: to the LORD
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - a Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Se usa «Yahvé» según la terminología base del proyecto. «Ante» comunica bien la dirección reverencial del gesto de postración en español; aunque el hebreo marca objeto/dirección con ל, en este contexto la formulación española más idiomática para una postración es «ante».
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  alternatives_spanish:
  - —
  lexicon: standard proper name
  rationale: Nombre propio bíblico estándar en español.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - —
  lexicon: standard proper name
  rationale: Nombre propio bíblico estándar en español con tilde gráfica.
theological_decisions:
- issue: Si וַיִּשְׁתַּחוּ debe explicitarse como «adoró» o mantenerse como gesto corporal
  english_pob_reading: Rendered as 'bowed down' in the main text, with 'worshiped' in a footnote
  chosen_spanish_reading: «se postró» en el texto principal, con nota que admite «adoró»
  alternative_spanish_readings:
  - adoró a Yahvé
  - se inclinó ante Yahvé
  rationale: El verbo hebreo puede significar tanto postración física como acto de adoración, según el contexto. Como el pasaje nombra a Yahvé como objeto, la adoración está implicada, pero el verbo por sí mismo resalta la acción corporal. Por eso el texto principal preserva la ambigüedad con «se postró», y la nota recoge la alternativa cultual.
  doctrine_reference: Translation philosophy §3, §6; entrada terminológica de YHWH
translation_notes:
  revision_awareness: El auditor inglés más reciente no introdujo cambios y mantuvo alta concordancia con la propuesta anterior; por eso no se requieren ajustes de revisión en esta versión española.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se evita «SEÑOR» como máscara tipográfica, siguiendo la política terminológica del encargo.
  - «Se postró» conserva la tensión entre gesto corporal y adoración, que el POB inglés también preserva en nota.
  - «Volvió detrás de Saúl» refleja la secuencia narrativa sin añadir relaciones no explicitadas por el hebreo.
