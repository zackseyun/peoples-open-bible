translation:
  language: es
  text: No vayas tras tu corazón y tus ojos[a][b], para andar en deseos malos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No sigas tu corazón y tus ojos, para andar en codicias malas». La expresión hebrea «corazón y ojos» es un modismo concreto para el deseo interior y la atracción exterior.'
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego para este versículo difiere sustancialmente: «Y no digas: “¿Quién me dominará?” porque el Señor ciertamente se vengará de ti». Por eso se sigue aquí el testimonio hebreo como texto primario, manteniendo a la vista la tradición griega divergente.'
    reason: textual_variant
lexical_decisions:
- source_word: אַל תֵּלֵךְ / אַל...תֵּלֵךְ
  english_pob_choice: Do not go
  chosen_spanish: No vayas
  alternatives_spanish:
  - No andes
  - No sigas
  lexicon: HALOT
  rationale: 'El hebreo usa הלך en una prohibición: una forma natural en español es el imperativo negativo «No vayas». Conserva la fuerza directiva sin sonar demasiado literal o forzado.'
- source_word: אַחֲרֵי לִבְּךָ וְעֵינֵיךָ
  english_pob_choice: after your heart and your eyes
  chosen_spanish: tras tu corazón y tus ojos
  alternatives_spanish:
  - según tu corazón y tus ojos
  - tras tu mente y tus ojos
  lexicon: HALOT
  rationale: Mantengo la imagen concreta de «corazón» y «ojos», porque el original nombra la interioridad y la atracción externa. «Tras» conserva el matiz de ir detrás de un impulso o deseo.
- source_word: לָלֶכֶת
  english_pob_choice: to walk
  chosen_spanish: para caminar
  alternatives_spanish:
  - para ir
  - para andar
  lexicon: HALOT
  rationale: El infinitivo retoma el verbo de la primera cola. «Caminar» comunica el valor aspectual y mantiene una correspondencia verbal natural en español.
- source_word: בַּחֲמוּדוֹת
  english_pob_choice: in desires
  chosen_spanish: en malos deseos
  alternatives_spanish:
  - en deseos perversos
  - en codicias malas
  - en codicias
  lexicon: HALOT
  rationale: חמד puede expresar lo deseable o lo codiciable; en este contexto la calificación moral es decisiva. «Deseos» es más claro en español que «cosas deseables» y sigue el sentido ético del pasaje.
- source_word: רָעָה
  english_pob_choice: evil
  chosen_spanish: malos
  alternatives_spanish:
  - malvados
  - perversos
  - malos y perversos
  lexicon: HALOT
  rationale: La forma adjetiva suavemente califica «deseos» en español. «Malos» es directo, sobrio y suficientemente fuerte para la carga moral del hebreo.
theological_decisions:
- issue: Antropología bíblica de «corazón y ojos»
  english_pob_reading: Retain the concrete Hebrew imagery in the main text
  chosen_spanish_reading: Conservar la imaginería concreta de «corazón» y «ojos»
  alternative_spanish_readings:
  - No sigas tus propios deseos
  - No te dejes llevar por tus pasiones
  rationale: La frase une interioridad y atracción visible, y la POB inglesa decidió no desdibujar esa antropología. En español conviene mantenerla para no perder el eco bíblico ni convertir el mandato en una paráfrasis abstracta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6
- issue: Tratamiento de la tradición griega paralela
  english_pob_reading: The Greek parallel for this verse differs substantially... The Hebrew witness is therefore followed here as the primary text, with the Greek kept in view as a divergent parallel tradition.
  chosen_spanish_reading: Seguir el testimonio hebreo como texto primario y mantener a la vista la tradición griega divergente
  alternative_spanish_readings:
  - Traducir según la versión griega
  - Armonizar hebreo y griego en una sola formulación
  rationale: El hebreo de la fuente principal y el griego paralelo presentan un contenido distinto. La traducción española debe seguir el hebreo sin borrar la tensión textual; por eso la divergencia griega queda registrada en nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2, 6
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la última revisión; el texto español sigue el hebreo primario y conserva la variante griega en nota, en línea con el pass más reciente sin modificaciones sustantivas.
  spanish_consistency_notes:
  - Se usa «corazón» para לֵב y «ojos» para עֵינַיִם, sin reducir ambos a un solo término abstracto.
  - Se emplea «malos deseos» para conservar la fuerza moral de חֲמוּדוֹת רָעָה sin introducir un tecnicismo innecesario.
  - Se mantiene un español sobrio y publicable, evitando arcaísmos innecesarios y sin borrar la tensión textual hebreo-griega.
