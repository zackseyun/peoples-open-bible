translation:
  language: es
  text: 'Los lugares altos de Aven[a], el pecado de Israel, serán destruidos. Espino y cardo crecerán sobre sus altares, y dirán a los montes: «¡Cúbrannos!» y a las colinas: «¡Caigan sobre nosotros!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los lugares altos de maldad» o «los lugares altos de iniquidad». El hebreo אָוֶן puede funcionar aquí como nombre propio («Aven») y también como sustantivo con sentido de maldad o iniquidad; el juego de palabras parece intencional.
    reason: alternative_reading
lexical_decisions:
- source_word: בָּמוֹת
  english_pob_choice: high places
  chosen_spanish: alturas
  alternatives_spanish:
  - lugares altos
  - santuarios en las alturas
  lexicon: HALOT
  rationale: En español, «alturas» conserva la referencia cultual sin sonar forzado. «Lugares altos» explicita más, pero puede sonar explicativo en exceso; «santuarios en las alturas» añade interpretación no exigida por el hebreo.
- source_word: אָוֶן
  english_pob_choice: Aven
  chosen_spanish: Aven
  alternatives_spanish:
  - iniquidad
  - maldad
  - Bet-avén
  lexicon: HALOT
  rationale: 'Sigo la decisión auditada de preservar el posible nombre propio en el texto principal. Como en el inglés POB, la ambigüedad semántica queda disponible en nota: el término también puede cargar el sentido de maldad/iniquidad.'
- source_word: חַטַּאת יִשְׂרָאֵל
  english_pob_choice: the sin of Israel
  chosen_spanish: el pecado de Israel
  alternatives_spanish:
  - el pecado de Israel mismo
  - el pecado/ofrenda por el pecado de Israel
  lexicon: HALOT
  rationale: «Pecado» reproduce bien la apposición explicativa del hebreo y evita la lectura sacrificial de חַטַּאת, que aquí no encaja con el contexto.
- source_word: נִשְׁמְדוּ
  english_pob_choice: will be destroyed
  chosen_spanish: serán destruidas
  alternatives_spanish:
  - serán arrasadas
  - serán devastadas
  - serán aniquiladas
  lexicon: HALOT
  rationale: El pasivo comunica la destrucción profetizada. «Serán destruidas» es claro y conserva la fuerza del Niphal de שׁמד sin exagerar el grado de aniquilación.
- source_word: קוֹץ וְדַרְדַּר
  english_pob_choice: thorn and thistle
  chosen_spanish: espino y cardo
  alternatives_spanish:
  - espinas y cardos
  - zarza y cardo
  - espino y abrojo
  lexicon: HALOT
  rationale: «Espino y cardo» transmite bien la imaginería de desolación en un español natural y bíblicamente reconocible. Mantiene el paralelismo y el valor colectivo de los sustantivos hebreos.
- source_word: יַעֲלֶה עַל מִזְבְּחוֹתָם
  english_pob_choice: will grow up on their altars
  chosen_spanish: crecerán sobre sus altares
  alternatives_spanish:
  - brotarán sobre sus altares
  - subirán sobre sus altares
  - crecerá sobre sus altares
  lexicon: HALOT
  rationale: En español, el plural concuerda naturalmente con la pareja vegetativa del verso. «Crecerán sobre sus altares» comunica la invasión vegetal de los altares abandonados sin introducir una imagen ajena.
- source_word: כַּסּוּנוּ
  english_pob_choice: Cover us
  chosen_spanish: ¡Cúbrannos!
  alternatives_spanish:
  - ¡Cúbranos!
  - ¡Ocúltennos!
  - ¡Háganse cobertura para nosotros!
  lexicon: HALOT
  rationale: El imperativo plural español corresponde bien al plural hebreo y mantiene la urgencia. «Cúbrannos» conserva la imagen concreta de quedar sepultados o escondidos.
- source_word: נִפְלוּ עָלֵינוּ
  english_pob_choice: Fall on us
  chosen_spanish: ¡Caigan sobre nosotros!
  alternatives_spanish:
  - ¡Háganse pedazos sobre nosotros!
  - ¡Caigan encima de nosotros!
  lexicon: HALOT
  rationale: La forma plural expresa el ruego dirigido a montes y colinas. «Caigan sobre nosotros» retiene la literalidad y el peso dramático del hebreo, como en el contexto profético y apocalíptico.
theological_decisions:
- issue: Cómo traducir אָוֶן sin resolver la tensión entre nombre propio y cualidad moral
  english_pob_reading: Retained as 'Aven' in the main text, with a footnote allowing 'wickedness/iniquity'
  chosen_spanish_reading: Retener «Aven» en el texto principal, con nota que permite «maldad/iniquidad»
  alternative_spanish_readings:
  - «las alturas de maldad»
  - «las alturas de iniquidad»
  - «Bet-avén»
  rationale: La sintaxis hebrea admite una lectura toponímica y una lectura peyorativa. Siguiendo el POB inglés, el texto principal preserva la posible referencia geográfica y la nota mantiene viva la palabra cargada de juicio, sin cerrar indebidamente la ambigüedad.
  doctrine_reference: 'Translation philosophy #3: preservar la tensión teológica en vez de resolverla'
- issue: El valor de las imágenes de juicio final en el cierre del versículo
  english_pob_reading: 'Desperate cry: ''Cover us!'' ... ''Fall on us!'''
  chosen_spanish_reading: 'Conservar el clamor desesperado literal: «¡Cúbrannos!» / «¡Caigan sobre nosotros!»'
  alternative_spanish_readings:
  - «¡Ocúltennos!» / «¡Abruménnos!»
  - «¡Sepúltennos!» / «¡Tráiganse abajo sobre nosotros!»
  rationale: El hebreo usa un lenguaje directo de refugio imposible bajo el juicio. La traducción literal mantiene la fuerza profética y evita suavizar la escena.
  doctrine_reference: Apocalipsis 6:16 como eco canónico de lenguaje de juicio
- issue: La personificación plural de los montes y colinas
  english_pob_reading: Addressed to the mountains ... and to the hills ...
  chosen_spanish_reading: 'Mantener el plural vocativo: «a los montes» / «a las colinas»'
  alternative_spanish_readings:
  - «al monte» / «a la colina»
  - «a las montañas» / «a los cerros»
  rationale: El plural refleja mejor el hebreo y el recurso poético. En español, «montes» y «colinas» son términos naturales, solemnes y ampliamente comprensibles.
  doctrine_reference: Poética profética hebrea
translation_notes:
  revision_awareness: 'El borrador sigue la lectura auditada del inglés POB: conserva «Aven» como posible nombre propio, mantiene la apposición «el pecado de Israel», y reproduce de forma directa la imagen de desolación vegetal y el clamor final de juicio. No se detectaron revisiones posteriores que obliguen a cambiar la solución.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto en el proyecto, pero este versículo no contiene el tetragrámaton.
  - «Alturas» funciona aquí como equivalente natural de «high places» sin borrar su sentido cultual.
  - Se preserva la distinción entre una nota lexical sobre אָוֶן y el texto principal, para no resolver la ambigüedad en el cuerpo del versículo.
  - La concordancia verbal plural en «crecerán» y «caigan» responde al español idiomático y al plural poético del hebreo.
