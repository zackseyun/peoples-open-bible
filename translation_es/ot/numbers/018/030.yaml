revisions:
- from: 'Y hablarás a ellos[a]: “Cuando aparten su mejor parte de ello, será contado para los levitas como el producto de la era y como el producto del lagar.”'
  to: 'Y les dirás: «Cuando eleven[a] su mejor parte de él, se les contará a los levitas como el producto de la era y como el producto del lagar.»'
