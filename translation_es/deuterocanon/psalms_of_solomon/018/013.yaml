translation:
  language: es
  text: Su camino es en el temor de Dios cada día[b][a], desde el día en que Dios los creó y para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su senda» o «su conducta» para «su camino».
    reason: lexical_alternative
  - marker: b
    text: O «con reverencia a Dios» para «en el temor de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν φόβῳ θεοῦ
  english_pob_choice: in the fear of God
  chosen_spanish: en el temor de Dios
  alternatives_spanish:
  - con reverencia hacia Dios
  - en reverencia de Dios
  lexicon: BDAG
  rationale: Mantiene la fórmula bíblica directa y la fuerza reverente del griego. En español, "temor de Dios" es natural y conserva mejor la tensión religiosa que una paráfrasis como "reverencia".
- source_word: ὁδὸς
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - ruta
  - conducta
  - sendero
  lexicon: BDAG
  rationale: '"Camino" comunica bien la metáfora de la vida o conducta, y es idiomático en español. Se evita "conducta" por ser más interpretativo que el término fuente.'
- source_word: καθʼ ἑκάστην ἡμέραν
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - todos los días
  - día tras día
  lexicon: BDAG
  rationale: '"Cada día" expresa continuidad habitual de manera natural en español y preserva el valor distributivo del griego.'
- source_word: ἀφʼ ἧς ἡμέρας
  english_pob_choice: from the day
  chosen_spanish: desde el día en que
  alternatives_spanish:
  - desde que
  - a partir del día en que
  lexicon: BDAG
  rationale: La frase introduce el punto de inicio de esa manera de vivir. "Desde el día en que" suena claro en español y deja explícita la relación temporal que el griego marca.
- source_word: ἔκτισεν
  english_pob_choice: created
  chosen_spanish: los creó
  alternatives_spanish:
  - los formó
  - los hizo
  lexicon: BDAG
  rationale: Se conserva el verbo crear/crear los de la obra divina. En español, "creó" refleja con precisión el valor de κτίζω y mantiene la referencia a Dios como creador.
- source_word: ἕως αἰῶνος
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: BDAG
  rationale: '"Para siempre" es natural, solemne y transmite duración sin límite. Mantiene el sentido de continuidad indefinida del griego.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios (sin modificaciones necesarias) y el control cruzado informó alto acuerdo; por ello, el español sigue de cerca el sentido estable del texto griego y del audit trail inglés sin añadir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, sin sustituirlo por una forma reverencial implícita.
  - Se usa «crear/creó» para ἔκτισεν por su valor teológico directo.
  - Se conserva «temor de Dios» como expresión bíblica estable, con alternativa anotada por si se prefiere enfatizar reverencia.
  - 'El orden temporal en español sigue el griego: modo de vida, inicio en el acto creador, duración perpetua.'
