base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/012/041.yaml
  text: 'Also those near them[a], as far as Issachar and Zebulun and Naphtali, were bringing food on donkeys, camels, mules, and cattle: provisions of flour, fig cakes, raisin cakes, wine, oil, cattle, and sheep in abundance[c][b], for there was joy in Israel.'
  footnotes:
  - marker: a
    text: Hebrew לֶחֶם is literally 'bread,' but here it introduces a wider list of provisions, so 'food' is used in the main text.
    reason: lexical_alternative
  - marker: b
    text: Or 'even to Issachar, Zebulun, and Naphtali.' The phrase marks the geographic extent of those bringing supplies.
    reason: alternative_reading
  - marker: c
    text: Hebrew צִמּוּקִים may be rendered 'raisins' or 'dried grapes'; 'raisin cakes' reflects the likely prepared-food sense in this context.
    reason: lexical_alternative
