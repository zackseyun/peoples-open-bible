translation:
  language: es
  text: 'Y la palabra de Yahvé vino a mí[a], diciendo: «¿Qué ves, Jeremías?». Y dije: «Veo una rama de un almendro[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vino a mí la palabra de Yahvé». El hebreo usa una fórmula profética fija; el orden en español puede variar sin cambiar el sentido.
    reason: alternative_reading
  - marker: b
    text: O «vara de almendro» o «vara de madera de almendro». El hebreo puede designar una vara, un bastón o una rama; la referencia del siguiente versículo juega con almendro (shaqed) y velar/estar atento (shoqed).
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y ... vino
  alternatives_spanish:
  - Y ... sucedió
  - Y ... aconteció
  lexicon: HALOT
  rationale: La fórmula narrativa introduce una nueva escena profética. En español, «vino» con «la palabra de Yahvé» reproduce de forma natural la idea de llegada de la revelación sin el calco pesado de «sucedió»/«aconteció».
- source_word: דְבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  lexicon: HALOT
  rationale: «Palabra» preserva la fórmula profética estándar y su vínculo con los relatos de vocación. «Mensaje» sería más interpretativo y borraría esa conexión lexical.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la convención POB de transliterar el nombre divino. «Yahvé» preserva el nombre personal del texto hebreo sin sustituirlo por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  lexicon: HALOT
  rationale: El dativo es directo y en español la forma natural es «a mí». Mantiene claridad sin alterar el sentido.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: «Diciendo» conserva la estructura discursiva del hebreo antes de la cita directa, con registro claro y bíblico en español moderno.
- source_word: מָה אַתָּה רֹאֶה
  english_pob_choice: What do you see
  chosen_spanish: ¿Qué ves?
  alternatives_spanish:
  - ¿Qué estás viendo?
  lexicon: HALOT
  rationale: El participio pregunta por la percepción en curso; en español, el presente simple «ves» es la equivalencia más natural y fiel.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  lexicon: HALOT
  rationale: Nombre propio en su forma española habitual y reconocible.
- source_word: וָאֹמַר
  english_pob_choice: And I said
  chosen_spanish: Y yo respondí
  alternatives_spanish:
  - Y dije
  lexicon: HALOT
  rationale: La respuesta de Jeremías introduce una réplica al cuestionamiento divino. «Respondí» comunica mejor el intercambio dialogal que un simple «dije», sin añadir contenido ajeno.
- source_word: מַקֵּל
  english_pob_choice: branch
  chosen_spanish: vara
  alternatives_spanish:
  - vara de madera
  - bastón
  - rama
  lexicon: HALOT
  rationale: El hebreo puede referirse a un objeto tipo vara/vara-rod, y la POB inglesa preserva esa tensión con la nota sobre posible «rod/staff» frente a una lectura de rama. En español, «vara» mantiene abierta la ambigüedad mejor que «rama», que resolvería demasiado pronto el objeto.
- source_word: שָׁקֵד
  english_pob_choice: an almond tree
  chosen_spanish: de almendro
  alternatives_spanish:
  - de un almendro
  - de madera de almendro
  lexicon: HALOT
  rationale: La referencia es al almendro y al juego de palabras del verso siguiente. «De almendro» es natural en español y deja abierta la relación con la vara/ramo.
- source_word: אֲנִי רֹאֶה
  english_pob_choice: I see
  chosen_spanish: veo
  alternatives_spanish:
  - yo veo
  lexicon: HALOT
  rationale: El pronombre explícito puede omitirse en español porque el verbo ya marca la persona. Se mantiene el tono directo y breve de la respuesta visionaria.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: Se conserva el nombre divino propio en transliteración española, conforme a la política POB y al valor teológico del Tetragrámaton en el texto profético.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Preserving the lexical ambiguity of מַקֵּל שָׁקֵד
  english_pob_reading: branch of an almond tree / rod of almond wood
  chosen_spanish_reading: vara de almendro
  alternative_spanish_readings:
  - rama de almendro
  - bastón de almendro
  - vara de madera de almendro
  rationale: El POB inglés mantiene la tensión entre un objeto tipo vara y una rama, y la nota admite ambas posibilidades. «Vara de almendro» preserva esa ambigüedad mejor que una decisión cerrada por «rama», y deja intacto el juego de palabras con el verbo 'velar/estar atento' del verso siguiente.
  doctrine_reference: 'DOCTRINE.md: lexical ambiguity preservation / source-grounded alternatives'
translation_notes:
  revision_awareness: 'El pasaje sigue el último pase del POB inglés, que no introdujo cambios tras la revisión final (estado: high_agreement, verdict: agree). No se observan revisiones que obliguen a una divergencia española. La única tensión principal es la ambigüedad de מַקֵּל, que se preserva en la traducción principal y se explicita en nota.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera uniforme para el Tetragrámaton.
  - Se mantiene «palabra» en la fórmula profética para conservar el vínculo narrativo-teológico.
  - La respuesta del profeta se vierte en primera persona breve y natural («veo»), sin añadir matices inexistentes.
  - La ambigüedad léxica de מַקֵּל se conserva en el cuerpo y se amplía en nota para evitar una resolución prematura.
