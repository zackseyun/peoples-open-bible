translation:
  language: es
  text: Lea también se acercó[a], y sus hijos, y se inclinaron. Después se acercaron José y Raquel, y se inclinaron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se aproximó' en ambas cláusulas.
    reason: lexical_alternative
  - marker: b
    text: O 'se postraron'; el verbo hebreo puede expresar un gesto de profunda reverencia.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּגַּשׁ / נִגַּשׁ
  english_pob_choice: came near
  chosen_spanish: se acercó / se acercaron
  alternatives_spanish:
  - se aproximó / se aproximaron
  - se llegó / se llegaron
  lexicon: HALOT
  rationale: נגשׁ expresa la acción de acercarse. En español, 'se acercó' es natural y conserva el movimiento hacia Esaú sin añadir matices ajenos. Se mantiene la variación de número según cada sujeto del hebreo.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: HALOT
  rationale: גַּם añade a Lea al orden de presentación; 'también' transmite esa adición de manera clara y natural en español.
- source_word: וִילָדֶיהָ
  english_pob_choice: and her children
  chosen_spanish: con sus hijos
  alternatives_spanish:
  - y sus hijos
  - y sus niños
  - y su descendencia
  lexicon: HALOT
  rationale: El término puede abarcar a los hijos en general. 'Con sus hijos' comunica el grupo que acompaña a Lea y evita restringir innecesariamente el hebreo a 'varones'.
- source_word: וַיִּשְׁתַּחֲוּ
  english_pob_choice: they bowed down
  chosen_spanish: se inclinaron
  alternatives_spanish:
  - se postraron
  - se inclinaron profundamente
  lexicon: HALOT
  rationale: שׁחה en este contexto denota un gesto de reverencia/obeisancia. 'Se inclinaron' es idiomático en español y deja abierta la intensidad corporal sin imponer 'postrarse' como lectura única del texto principal.
- source_word: וְאַחַר
  english_pob_choice: Afterward
  chosen_spanish: Después
  alternatives_spanish:
  - Luego
  - Más tarde
  lexicon: HALOT
  rationale: El adverbio marca secuencia temporal. 'Después' es breve y fiel al orden narrativo del hebreo.
- source_word: יוֹסֵף וְרָחֵל
  english_pob_choice: Joseph and Rachel
  chosen_spanish: José y Raquel
  alternatives_spanish:
  - Raquel y José
  lexicon: HALOT
  rationale: Se respeta el orden hebreo, que menciona primero a José y luego a Raquel, sin ajustarlo a preferencias narrativas del español.
translation_notes:
  revision_awareness: Concordancia alta con el texto base inglés y con la fuente hebrea. No se observaron revisiones aplicadas en el registro fuente; se preserva el orden narrativo y la alternancia singular/plural del hebreo.
  spanish_consistency_notes:
  - Se usa 'también' para גַּם y 'Después' para וְאַחַר, manteniendo la secuencia narrativa.
  - Se evita 'SEÑOR' u այլ sustitución cultual; no hay nombre divino en este versículo.
  - '''Se inclinaron'' deja abierta la intensidad del verbo hebreo sin forzar ''postrarse'' en el texto principal, pero la nota preserva la alternativa documentada.'
