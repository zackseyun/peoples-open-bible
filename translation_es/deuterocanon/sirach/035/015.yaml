  yaml_path: translation/deuterocanon/sirach/035/015.yaml
  text: Hear the prayer of your servants[b][a], according to your favor toward your people.
  footnotes:
  - marker: a
    text: Or, 'according to your will.' The Hebrew רצון can denote either will or favor/good pleasure; 'favor' was chosen here because the phrase continues 'toward your people,' suggesting benevolent disposition.
    reason: lexical_alternative
  - marker: b
    text: The Greek parallel tradition at this verse reads very differently ('He who seeks the law will be filled with it, and the hypocrite will stumble in it'), indicating a major divergence between the surviving Hebrew and Greek forms of Sirach here.
    reason: textual_variant
