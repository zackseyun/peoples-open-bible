  to: Apártate de la contienda, y pecarás menos;
  rationale: 'Se conserva el imperativo exhortativo y el sentido de disputa interpersonal de μάχης con «Apártate de la contienda». Se revisa la cláusula resultativa para expresar en español natural el efecto de ἐλαττώσεις ἁμαρτίας: evitar la contienda lleva a cometer menos pecados. «Pecarás menos» transmite fielmente la enseñanza sapiencial sin la rigidez poco idiomática de «disminuirás los pecados».'
