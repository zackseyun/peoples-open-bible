  source_alignment_summary: 'El borrador español sigue bien el sentido del hebreo y del POB inglés: mantiene el alcance universal, conserva los presentes/participios sin resolver la temporalidad, retiene el lenguaje cultual explícito, y usa ''Yahvé''. Sin embargo, ''nacimiento del sol'' no es la opción más fiel ni natural para מִמִּזְרַח שֶׁמֶשׁ; ''salida del sol'' refleja mejor el modismo. Además, la distribución de las notas [c][d][b] del inglés quedó alterada de manera menos útil en español: la nota temporal conviene anclarse al segundo ''grande es mi nombre'' o a la cláusula verbal central, mientras que la nota sobre minchah debe ir en ''ofrenda pura''.'
