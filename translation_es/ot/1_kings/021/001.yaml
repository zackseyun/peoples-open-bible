translation:
  language: es
  text: Después de estas cosas, Nabot el jezreelita tenía una viña en Jezreel, junto al palacio de Acab, rey de Samaria.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Había una viña que pertenecía a Nabot el jezreelita». El hebreo expresa la posesión con una construcción como «había una viña para Nabot».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now ...
  chosen_spanish: Y después
  alternatives_spanish:
  - Y sucedió
  - Ahora
  lexicon: HALOT
  rationale: La fórmula narrativa וַיְהִי introduce una nueva escena. En español, «Y después» conserva la transición temporal de manera natural y evita una fórmula más arcaica como «Y aconteció».
- source_word: אַחַר הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: after these things
  chosen_spanish: de estas cosas
  alternatives_spanish:
  - de estos acontecimientos
  - de esto
  lexicon: HALOT
  rationale: El hebreo usa un plural temporal de transición. «De estas cosas» refleja bien el plural y mantiene la naturalidad del giro en español.
- source_word: כֶּרֶם
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  - viña de uvas
  lexicon: HALOT
  rationale: En español bíblico y moderno, «viña» es la forma más clara y fiel para כרם. «Viñedo» puede sonar más técnico o moderno sin aportar precisión adicional.
- source_word: הָיָה לְנָבוֹת
  english_pob_choice: Naboth ... had
  chosen_spanish: tenía
  alternatives_spanish:
  - había pertenecido a Nabot
  - había una viña para Nabot
  lexicon: HALOT
  rationale: El hebreo expresa posesión con una construcción existencial/posesiva. «Tenía» comunica la relación posesiva de forma idiomática en español sin perder el sentido del original; la alternativa posicional puede reservarse en nota.
- source_word: נָבוֹת
  english_pob_choice: Naboth
  chosen_spanish: Nabot
  alternatives_spanish:
  - Naboth
  lexicon: Standard transliteration adapted to Spanish phonology
  rationale: Se adapta la transliteración a la pronunciación española habitual con «Nabot», manteniendo el nombre propio reconocible.
- source_word: הַיִּזְרְעֵאלִי
  english_pob_choice: the Jezreelite
  chosen_spanish: el jezreelita
  alternatives_spanish:
  - el de Jezreel
  lexicon: HALOT
  rationale: El gentilicio se conserva como adjetivo gentilicio en español. «Jezreelita» sigue de cerca la forma hebrea y evita la perífrasis.
- source_word: אֲשֶׁר בְּיִזְרְעֶאל
  english_pob_choice: in Jezreel
  chosen_spanish: en Jezreel
  alternatives_spanish:
  - que estaba en Jezreel
  lexicon: HALOT
  rationale: La cláusula relativa sitúa la viña; en español puede integrarse con una localización simple «en Jezreel» sin pérdida de información.
- source_word: אֵצֶל
  english_pob_choice: beside
  chosen_spanish: junto al
  alternatives_spanish:
  - al lado de
  - cerca de
  lexicon: HALOT
  rationale: אצל denota proximidad. «Junto al» es natural, preciso y conserva la relación espacial inmediata con la residencia real.
- source_word: הֵיכַל
  english_pob_choice: palace
  chosen_spanish: palacio
  alternatives_spanish:
  - casa
  - residencia
  lexicon: HALOT
  rationale: En contexto real, היכל designa la residencia palaciega de Ahab, no un templo. «Palacio» es la equivalencia española más directa y clara.
- source_word: מֶלֶךְ שֹׁמְרוֹן
  english_pob_choice: king of Samaria
  chosen_spanish: rey de Samaria
  alternatives_spanish:
  - el rey de Samaria
  lexicon: HALOT
  rationale: La construcción posesiva se conserva de forma natural en español. «Rey de Samaria» funciona bien como aposición al nombre propio y mantiene el valor del título real.
translation_notes:
  revision_awareness: Se siguió el sentido y la estructura del hebreo con el apoyo del audit trail en inglés. No se requirieron revisiones textuales según el registro de revisión más reciente; la redacción española conserva la transición narrativa, la posesión hebrea y la localización espacial sin añadir contenido no atestiguado.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene «Nabot» como adaptación española del nombre propio para mayor fluidez; el gentilicium se vierte como «jezreelita».
  - «Viña» se usa como equivalente estándar de כרם, con una nota que preserva la alternativa posesiva documentada en el audit trail inglés.
