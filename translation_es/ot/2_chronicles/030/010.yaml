  - marker: b
    text: 'La expresión hebrea combina dos verbos de desprecio: se estaban «burlando de» los mensajeros y «mofándose de» ellos.'
    reason: lexical_alternative
  revision_rationale: Se reemplazó «los correos» por «los mensajeros» para evitar una resonancia demasiado moderna en español, preservando las alternativas en nota. Se cambió «iban pasando» por «pasaron» para ajustarse mejor al flujo narrativo. Se revisó la cláusula final para mantener las dos expresiones de desprecio en español natural y se añadieron las notas léxicas del expediente inglés.
