    text: Or 'do not entreat me' / 'do not press me'; the Hebrew verb can carry the sense of urgent pleading or intercession.
    reason: lexical_alternative
  - marker: b
    text: Or 'for I will not hear you.' The Hebrew may be rendered with a future sense, though the participial form also supports 'I am not listening to you.'
    reason: lexical_alternative
