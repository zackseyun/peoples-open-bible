translation:
  language: es
  text: Y en este tiempo no hay gobernante ni profeta ni guía[a], ni holocausto ni sacrificio ni ofrenda ni incienso, ni lugar para ofrecer delante de ti y hallar misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «líder» o «jefe». El griego ἡγούμενος distingue este término de ἄρχων; por eso se mantiene una segunda designación de autoridad en la lista.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρχων
  english_pob_choice: ruler
  chosen_spanish: príncipe
  alternatives_spanish:
  - gobernante
  - ruler
  lexicon: BDAG
  rationale: En español, «príncipe» puede comunicar autoridad dirigente en un registro bíblico más natural que «gobernante», sin perder el sentido de poder público del término griego. Se evita «señor» por no ser la carga semántica aquí.
- source_word: προφήτης
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - vidente
  lexicon: BDAG
  rationale: Equivalente directo y establecido en español bíblico; conserva el oficio religioso reconocido por el contexto.
- source_word: ἡγούμενος
  english_pob_choice: leader
  chosen_spanish: caudillo
  alternatives_spanish:
  - líder
  - jefe
  lexicon: BDAG
  rationale: Se elige «caudillo» para distinguirlo de ἄρχων y conservar el matiz de dirección/guía sin repetir «príncipe». Aunque «líder» sería más neutral, «caudillo» mantiene un tono bíblico y formal.
- source_word: ὁλοκαύτωσις
  english_pob_choice: whole burnt offering
  chosen_spanish: holocausto
  alternatives_spanish:
  - ofrenda totalmente quemada
  - sacrificio completamente consumido
  lexicon: LEH
  rationale: «Holocausto» es el término tradicional y preciso en español para una ofrenda totalmente consumida por el fuego. Aunque hoy puede tener otros usos, aquí sigue siendo el equivalente cultual más compacto.
- source_word: θυσία
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - víctima
  - ofrenda sacrificial
  lexicon: BDAG
  rationale: Término general y transparente en español para el acto sacrificial, manteniendo la distinción frente a ὁλοκαύτωσις.
- source_word: προσφορά
  english_pob_choice: offering
  chosen_spanish: ofrenda
  alternatives_spanish:
  - presentación
  - oblación
  lexicon: LEH
  rationale: «Ofrenda» expresa bien una entrega cultual general y es idiomática en español. «Oblación» sería más técnica o eclesiástica.
- source_word: θυμίαμα
  english_pob_choice: incense
  chosen_spanish: incienso
  alternatives_spanish:
  - perfume
  - ofrenda de incienso
  lexicon: LEH
  rationale: Se conserva el sustantivo simple «incienso», que en contexto cultual resulta natural y preciso.
- source_word: τόπος
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - espacio
  lexicon: BDAG
  rationale: «Lugar» es la correspondencia natural y clara en español para el sitio destinado a la acción cultual.
- source_word: τοῦ καρπῶσαι
  english_pob_choice: to offer
  chosen_spanish: para ofrecer
  alternatives_spanish:
  - para presentar frutos
  - para traer primicias
  lexicon: LEH
  rationale: La revisión inglesa más reciente interpretó este giro de manera general como acción de ofrecer. En español, «para ofrecer» mantiene la amplitud del griego y evita imponer con demasiada especificidad la lectura de primicias.
- source_word: ἐνώπιόν σου
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  lexicon: BDAG
  rationale: «Delante de ti» preserva el valor relacional y cultual de la expresión griega en un español natural y solemne.
- source_word: εὑρεῖν ἔλεος
  english_pob_choice: to find mercy
  chosen_spanish: hallar misericordia
  alternatives_spanish:
  - encontrar misericordia
  - recibir misericordia
  lexicon: BDAG
  rationale: Se conserva el verbo de hallazgo, como en la lectura inglesa, porque refleja el giro idiomático del griego. «Misericordia» es el equivalente bíblico usual de ἔλεος.
theological_decisions:
- issue: Lista cultual de ausencias en contexto de exilio
  english_pob_reading: The verse preserves distinct items of absent authority and worship without collapsing them into a summary.
  chosen_spanish_reading: La traducción mantiene separados los títulos de autoridad y cada elemento del culto ausente.
  alternative_spanish_readings:
  - No hay ni autoridades ni sacrificios.
  - No quedan oficios ni ritos del templo.
  rationale: El lamento depende precisamente de la acumulación de carencias. Mantener cada término en español conserva el peso retórico y la amplitud de la pérdida.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Sentido de καρπῶσαι en la frase final
  english_pob_reading: The English audit trail moved from 'bring firstfruits' to the more general 'offer' after review.
  chosen_spanish_reading: Se traduce de manera general como «para ofrecer», sin introducir «primicias» en el texto principal.
  alternative_spanish_readings:
  - para traer primicias
  - para presentar frutos
  rationale: El auditorio español no debe recibir una especificación cultual que el testimonio auditado deja en revisión. La forma general conserva la tensión lexical sin sobreinterpretar.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail inglés que retiró «bring firstfruits» y optó por un valor más general de «offer» para τοῦ καρπῶσαι. Por eso el español principal sigue esa decisión y evita fijar una lectura de primicias no asegurada por el paso revisado. También se preservó la separación entre ἄρχων y ἡγούμενος con dos términos distintos en español.
  spanish_consistency_notes:
  - Se usó «Y en este tiempo» para reflejar ἐν τῷ καιρῷ τούτῳ con un registro bíblico natural.
  - Se mantuvo una secuencia paralela con repeticiones de «ni» para reproducir la acumulación del griego.
  - Se prefirió «misericordia» para ἔλεος por coherencia con el lenguaje bíblico español.
  - Se evitó «SEÑOR» para el nombre divino porque este versículo no contiene YHWH sino una referencia directa en segunda persona a Dios.
