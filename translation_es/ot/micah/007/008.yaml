  yaml_path: translation/ot/micah/007/008.yaml
  text: Do not rejoice over me[a], my enemy; though I have fallen, I will rise. Though I sit in darkness[b], Yahweh will be a light to me.
  footnotes:
  - marker: a
    text: Or, 'Do not gloat over me, my enemy.' The Hebrew verb means 'rejoice/be glad'; 'gloat' brings out the hostile context but is more interpretive.
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew perfect verbs here are used in poetic context for confident reversal: literally, ''I have fallen, I have arisen.'' Many translators render the second verb with future sense: ''I will rise.'''
    reason: lexical_alternative
