    text: 'Or more idiomatically, ''one in human likeness'' or ''something like a human form.'' The Hebrew is unusually layered: ''something like the likeness of the sons of man.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'my anguish came upon me' or 'my pangs came upon me.' The Hebrew expression depicts intense distress overtaking Daniel.
    reason: lexical_alternative
  - marker: c
    text: Or 'and no strength remained in me.'
    reason: lexical_alternative
