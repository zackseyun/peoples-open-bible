    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, "ceñidos con armas de guerra".
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al segmento adecuado, se adopta 'clan' conforme a la racionalidad léxica documentada para מִשְׁפָּחָה, y se alisa la sintaxis española sin perder el sentido ni la imagen militar del hebreo.
