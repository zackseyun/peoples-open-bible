translation:
  language: es
  text: Mi herencia se ha vuelto para mí como un león en el bosque[a]; ha alzado su voz contra mí[b]; por tanto, la odio[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ha rugido contra mí’. El hebreo literalmente dice ‘ha dado su voz contra mí’, un modismo de hostilidad; la imagen del león hace plausible esta alternativa contextual.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa formas femeninas (‘su’, ‘la’), porque ‘mi herencia’ es un sustantivo femenino y aquí está personificada.
    reason: cultural_note
  - marker: c
    text: O ‘la he odiado’. La forma verbal hebrea puede entenderse como pasado o como perfecto resultativo según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחֲלָתִי
  english_pob_choice: My inheritance
  chosen_spanish: Mi heredad
  alternatives_spanish:
  - Mi herencia
  - Mi posesión
  lexicon: HALOT
  rationale: נַחֲלָה puede significar herencia, heredad o posesión asignada. 'Heredad' conserva mejor en español el matiz de posesión recibida y el tono bíblico sin volverse arcaizante en exceso.
- source_word: כְּאַרְיֵה
  english_pob_choice: like a lion
  chosen_spanish: como un león
  alternatives_spanish:
  - como una leona
  lexicon: HALOT
  rationale: אַרְיֵה es la forma masculina normal 'león'. Aunque los sufijos pronominales son femeninos por la concordancia con נַחֲלָה, la imagen animal lexical es masculina; por eso se traduce 'león'.
- source_word: בַיָּעַר
  english_pob_choice: in the forest
  chosen_spanish: en el bosque
  alternatives_spanish:
  - en el monte
  - en la espesura
  lexicon: HALOT
  rationale: יַעַר designa bosque o arboleda. 'Bosque' es natural en español y mantiene la imagen del depredador en su entorno.
- source_word: נָתְנָה עָלַי בְּקוֹלָהּ
  english_pob_choice: she has lifted up her voice against me
  chosen_spanish: ha levantado su voz contra mí
  alternatives_spanish:
  - ha alzado su voz contra mí
  - ha rugido contra mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'ha dado contra mí con su voz', un modismo de hostilidad verbal. 'Ha levantado su voz contra mí' conserva el modismo y la agresión sin convertir el verbo en una interpretación demasiado específica.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  lexicon: HALOT
  rationale: Conector inferencial estándar. 'Por tanto' es formal y claro, adecuado al registro profético.
- source_word: שְׂנֵאתִיהָ
  english_pob_choice: I hate her
  chosen_spanish: la detesto
  alternatives_spanish:
  - la odio
  - la he aborrecido
  lexicon: HALOT
  rationale: El qatal 1cs de שׂנא puede expresarse con fuerza como 'odiar/aborrecer'. En español, 'detesto' comunica la intensidad del juicio sin sonar tan crudo como 'odio' en un texto litúrgico, aunque se preserva la tensión semántica del verbo.
theological_decisions:
- issue: Expresión fuerte de rechazo divino en שְׂנֵאתִיהָ
  english_pob_reading: Render the verb directly as 'I hate her' without softening.
  chosen_spanish_reading: la detesto
  alternative_spanish_readings:
  - la odio
  - la he rechazado
  rationale: El hebreo presenta lenguaje severo de juicio pactual. 'La detesto' mantiene la dureza del veredicto sin diluirlo en una mera revocación administrativa. Se preserva la tensión teológica en vez de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Personificación femenina de 'mi heredad'
  english_pob_reading: Hebrew 'she/her,' referring to 'my inheritance,' a grammatically feminine noun and here personified.
  chosen_spanish_reading: Mi heredad ... ha levantado su voz contra mí
  alternative_spanish_readings:
  - Mi heredad ... ha levantado la voz contra mí
  - Mi heredad ... me ha desafiado
  rationale: Se conserva la personificación implícita en la gramática hebrea, pero en español se evita forzar el pronombre explícito femenino en todo el verso, porque la referencia sigue siendo clara por el sustantivo 'heredad'.
  doctrine_reference: Hebrew grammar and contextual personification
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del inglés POB, que privilegia 'lifted up her voice' sobre 'raised her voice' para una correspondencia más cercana al hebreo, manteniendo el mismo valor idiomático en español como 'ha levantado su voz'.
  spanish_consistency_notes:
  - Se usa 'heredad' para נַחֲלָה por su resonancia bíblica y precisión semántica.
  - Se conserva 'león' en masculino porque el lexema hebreo es אַרְיֵה, aunque la concordancia gramatical femenina se mantiene en la personificación.
  - Se evita 'SEÑOR' o sustitutos reverenciales porque el versículo no contiene el nombre divino explícito en esta forma.
  - '''Detesto'' mantiene el nivel de severidad del hebreo sin cambiar el sentido a simple rechazo.'
