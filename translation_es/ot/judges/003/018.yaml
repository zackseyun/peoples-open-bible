translation:
  language: es
  text: Y cuando hubo terminado de presentar el tributo[a], despidió a la gente que llevaba el tributo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'regalo' o 'ofrenda'. Aquí el término hebreo probablemente se refiere a un tributo presentado a un gobernante, no a una ofrenda sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי כַּאֲשֶׁר
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y aconteció cuando
  - Ahora bien, cuando
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introduce la siguiente acción. En español, 'Y cuando' conserva la transición temporal de manera natural sin añadir un calco pesado.
- source_word: כִּלָּה
  english_pob_choice: he had finished
  chosen_spanish: hubo terminado
  alternatives_spanish:
  - terminó
  - había terminado
  lexicon: HALOT
  rationale: El verbo expresa завершение/compleción. 'Hubo terminado' refleja con claridad que la acción de presentar el tributo quedó concluida antes de despedir al pueblo, manteniendo la secuencia del relato.
- source_word: לְהַקְרִיב
  english_pob_choice: presenting
  chosen_spanish: presentar
  alternatives_spanish:
  - ofrecer
  - llevar
  lexicon: HALOT
  rationale: En este contexto político, el verbo hifil de קרב alude a entregar o presentar un pago o regalo ante un superior. 'Presentar' evita una lectura demasiado cultual que 'ofrecer' podría sugerir.
- source_word: הַמִּנְחָה
  english_pob_choice: the tribute
  chosen_spanish: el tributo
  alternatives_spanish:
  - el regalo
  - la ofrenda
  lexicon: HALOT
  rationale: Aquí el término se refiere al pago impuesto por sometimiento, no a una ofrenda sacrificial. 'Tributo' reproduce mejor ese sentido político y coincide con la decisión lexical inglesa.
- source_word: וַיְשַׁלַּח
  english_pob_choice: he sent away
  chosen_spanish: despidió
  alternatives_spanish:
  - envió lejos
  - mandó fuera
  lexicon: HALOT
  rationale: El verbo significa enviar lejos o despedir. 'Despidió' es natural en español y conserva la idea de dejar ir al grupo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - al grupo
  lexicon: HALOT
  rationale: El sustantivo general 'pueblo' sigue de cerca el hebreo sin especificar indebidamente 'hombres' o 'séquito'.
- source_word: נֹשְׂאֵי הַמִּנְחָה
  english_pob_choice: who were carrying the tribute
  chosen_spanish: que llevaba el tributo
  alternatives_spanish:
  - que cargaba el tributo
  - portadores del tributo
  lexicon: HALOT
  rationale: El participio describe al pueblo por su función. En español, una relativa simple expresa con fluidez que eran los que transportaban el tributo, sin introducir un matiz técnico innecesario.
theological_decisions:
- issue: Sentido de הַמִּנְחָה en este relato
  english_pob_reading: tribute rather than sacrificial offering
  chosen_spanish_reading: tributo, no ofrenda sacrificial
  alternative_spanish_readings:
  - ofrenda
  - regalo
  rationale: El contexto de Jueces 3 muestra un envío político al rey de Moab, por lo que 'tributo' preserva la tensión semántica frente a las lecturas cultuales. Se evita 'ofrenda' como traducción principal para no borrar ese valor histórico.
  doctrine_reference: Contexto histórico-literario de Jueces 3:17-18
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se mantiene ''tributo'' para הַמִּנְחָה, el valor temporal de la secuencia verbal y la descripción del grupo como quienes cargaban el tributo, sin cambios respecto a la lectura revisada.'
  spanish_consistency_notes:
  - Se conservó la terminología 'tributo' en ambas apariciones de הַמִּנְחָה para mantener consistencia léxica.
  - Se prefirió un español narrativo fluido ('Y cuando hubo terminado') que sigue la secuencia hebrea sin perder naturalidad.
  - No se añadió especificación de género para 'el pueblo', ya que el hebreo tampoco la explicita.
