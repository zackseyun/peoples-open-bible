  text: Look[a], like a lion he will come up from the thicket of the Jordan against a secure pasture; for in an instant I will make him run from it, and I will appoint over it whomever is chosen. For who is like me[b], and who will summon me? And who is the shepherd who can stand before me?
  footnotes:
