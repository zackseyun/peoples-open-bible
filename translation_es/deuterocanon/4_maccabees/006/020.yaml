  rationale: 'Se ajustó la redacción para que suene natural y digna en español sin perder ninguno de los elementos del griego: vergüenza moral, continuación breve de la vida, burla pública generalizada y causa de esa burla. ''Por un poco más de tiempo'' expresa mejor ἐπιβιώσομεν + ὀλίγον χρόνον; ''mientras todos se burlan de nosotros'' representa idiomáticamente καταγελώμενοι πρὸς ἀπάντων; y ''por cobardía'' reproduce con claridad ἐπὶ δειλίᾳ.'
