base_translation:
  language: en
  yaml_path: translation/ot/leviticus/005/012.yaml
  text: Then he shall bring it to the priest[a], and the priest shall take from it a handful as its memorial portion and burn it on the altar, in addition to the food offerings of Yahweh[b]. It is a sin offering.
  footnotes:
  - marker: a
    text: Or, 'It is a purification offering.' The Hebrew term can denote the offering that deals with sin by purification.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'offerings by fire of the LORD'; rendered 'food offerings of the LORD' for clear modern English in this sacrificial context.
    reason: lexical_alternative
