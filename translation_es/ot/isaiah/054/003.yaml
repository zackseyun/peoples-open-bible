translation:
  language: es
  text: Porque te extenderás a la derecha y a la izquierda, y tu descendencia poseerá naciones[a] y repoblará ciudades desoladas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «heredará naciones»; ירשׁ puede expresar heredar, poseer o tomar posesión, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: Lit. «hará que ciudades desoladas sean habitadas».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación causal o fundante con el contexto anterior; 'Porque' conserva de manera natural esa conexión en español.
- source_word: יָמִין וּשְׂמֹאול
  english_pob_choice: to the right and to the left
  chosen_spanish: a la derecha y a la izquierda
  alternatives_spanish:
  - a diestra y siniestra
  - a derecha e izquierda
  lexicon: HALOT
  rationale: Mantiene la imagen espacial concreta sin forzar una reinterpretación direccional.
- source_word: תִּפְרֹצִי
  english_pob_choice: you will spread out
  chosen_spanish: te extenderás
  alternatives_spanish:
  - te abrirás paso
  - romperás hacia fuera
  lexicon: HALOT
  rationale: En español, 'extenderás' transmite expansión territorial de modo natural y conserva la idea de crecimiento amplio del verbo hebreo.
- source_word: וְזַרְעֵךְ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus hijos
  lexicon: HALOT
  rationale: '''Descendencia'' preserva el sentido colectivo de זֶרַע en un español claro y digno, sin perder la referencia genealógica.'
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: naciones
  alternatives_spanish:
  - pueblos
  - gentiles
  lexicon: HALOT
  rationale: '''Naciones'' es la equivalencia más directa y evita introducir una oposición étnico-religiosa no explícita en el versículo.'
- source_word: יִירָשׁ
  english_pob_choice: will possess
  chosen_spanish: poseerá
  alternatives_spanish:
  - heredará
  - desposeerá
  lexicon: HALOT
  rationale: La revisión del POB favorece 'possess' por cercanía léxica con ירש; en español, 'poseerá' conserva esa fuerza sin añadir explícitamente una idea de despojo.
- source_word: עָרִים נְשַׁמּוֹת
  english_pob_choice: desolate cities
  chosen_spanish: ciudades desoladas
  alternatives_spanish:
  - ciudades abandonadas
  - ciudades asoladas
  lexicon: HALOT
  rationale: '''Desoladas'' refleja el estado de devastación o abandono indicado por נְשַׁמּוֹת y mantiene el tono profético.'
- source_word: יוֹשִׁיבוּ
  english_pob_choice: will settle
  chosen_spanish: habitará
  alternatives_spanish:
  - hará habitar
  - volverá a habitar
  lexicon: HALOT
  rationale: Aunque el hebreo es causativo, en español 'habitará' con el objeto 'ciudades desoladas' comunica de forma natural el resultado de ese causativo sin volver la frase pesada.
theological_decisions:
- issue: Relación de ירשׁ con גּוֹיִם como objeto
  english_pob_reading: territorial possession expressed as 'possess nations'
  chosen_spanish_reading: poseerá naciones
  alternative_spanish_readings:
  - heredará naciones
  - desposeerá naciones
  rationale: Se sigue la revisión más reciente del POB, que opta por una correspondencia más cercana a ירשׁ. 'Poseerá' mantiene la ambigüedad útil entre heredar y tomar posesión, sin explicitar una lectura de conquista que el texto no obliga a fijar en español.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Valor del causativo de יוֹשִׁיבוּ
  english_pob_reading: cause desolate cities to be inhabited
  chosen_spanish_reading: habitará ciudades desoladas
  alternative_spanish_readings:
  - hará habitar ciudades desoladas
  - causará que ciudades desoladas sean habitadas
  rationale: El hebreo es causativo, pero el español idiomático permite expresar el resultado con un verbo simple cuando el contexto ya marca la acción restauradora. Así se conserva la fuerza sin sobrecargar la sintaxis.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: La revisión final del POB cambió 'dispossess nations' por 'possess nations' para alinearse más de cerca con יִירָשׁ. Esta versión española sigue esa decisión y evita introducir una lectura más fuerte de despojo. También ajusta la clausula causativa final a una formulación natural en español, manteniendo el sentido de restauración habitacional.
  spanish_consistency_notes:
  - Se usa 'Yahvé' según el estándar del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - '''Descendencia'' se mantiene como término colectivo para זֶרַע.'
  - '''Poseerá naciones'' conserva la tensión lexical de ירשׁ sin resolverla unilateralmente.'
  - La frase final se vierte de modo fluido en español, pero con referencia transparente al hebreo causativo de 'hacer habitar'.
