translation:
  language: es
  text: En el decimoctavo año del reinado de Iosías, se celebró[a] esta Pascua[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente 'fue llevada/conducida'; aquí el sentido es que la Pascua fue observada o celebrada en ese tiempo.
    reason: lexical_alternative
  - marker: b
    text: El paralelo hebreo de 2 Crónicas 35 presenta a Israel guardando la Pascua en ese tiempo; el griego ofrece un resumen breve de esa observancia.
    reason: cross_reference
lexical_decisions:
- source_word: ὀκτωκαιδεκάτῳ ἔτει
  english_pob_choice: in the eighteenth year
  chosen_spanish: en el año dieciocho
  alternatives_spanish:
  - en el decimoctavo año
  - en el año decimoctavo
  lexicon: LSJ
  rationale: La datación en dativo se expresa naturalmente en español como una fórmula temporal con 'en el año dieciocho'. 'Decimoctavo' también es válido, pero 'año dieciocho' mantiene la forma sobria y directa del griego.
- source_word: βασιλεύοντος Ἰωσείου
  english_pob_choice: of Iosias's reign
  chosen_spanish: del reinado de Iosías
  alternatives_spanish:
  - mientras Iosías reinaba
  - cuando reinaba Iosías
  lexicon: LSJ
  rationale: El genitivo absoluto indica el marco temporal del reinado. En español, 'del reinado de Iosías' comunica esa relación de manera natural y fiel, sin perder la referencia histórica.
- source_word: ἤχθη
  english_pob_choice: was held
  chosen_spanish: se celebró
  alternatives_spanish:
  - fue conducida
  - fue llevada a cabo
  - se llevó a cabo
  lexicon: LSJ
  rationale: Aunque el verbo griego es literalmente 'fue llevada/conducida', con πάσχα significa la realización de la fiesta. 'Se celebró' conserva el valor eventivo y es idiomático en español, sin forzar un calco.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: esta Pascua
  alternatives_spanish:
  - la Pascua
  - el Paso
  lexicon: LSJ
  rationale: El sustantivo designa la fiesta judía de la Pascua; 'Pascua' es la equivalencia clara en español. Se conserva el demostrativo 'esta' para reflejar τοῦτο y la continuidad discursiva del contexto.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - este
  - la presente
  lexicon: LSJ
  rationale: El demostrativo apunta a la Pascua concreta mencionada en el contexto. 'Esta' concuerda con 'Pascua' y mantiene la referencia inmediata del griego.
theological_decisions:
- issue: Valor contextual de ἤχθη con τὸ πάσχα
  english_pob_reading: '''this Passover was held'' renders the festival as an observance carried out at that time, while noting the literal sense ''was led/conducted''.'
  chosen_spanish_reading: '''se celebró esta Pascua'' presenta la observancia como acción ritual realizada en ese momento.'
  alternative_spanish_readings:
  - '''fue conducida esta Pascua'''
  - '''fue llevada a cabo esta Pascua'''
  - '''se llevó a cabo esta Pascua'''
  rationale: La frase española debe reflejar el sentido observacional del pasaje, no una conducción física. 'Se celebró' expresa adecuadamente la realización litúrgica sin borrar que el griego usa un verbo de conducción que merece ser notado en la documentación.
  doctrine_reference: No doctrinal issue; lexical-liturgical rendering only.
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la última revisión; la propuesta española sigue de cerca ese trazado y conserva la misma tensión léxica entre el verbo literal de 'conducir/llevar' y el sentido contextual de observancia festiva.
  spanish_consistency_notes:
  - Se mantiene 'Iosías' para seguir la forma transliterada del testimonio griego, en lugar de armonizarla a la forma hebrea tradicional 'Josías'.
  - '''Pascua'' se usa como término establecido para πάσχα, sin sustituirlo por un calco menos natural.'
  - La nota al pie conserva la tensión semántica del verbo griego sin trasladar una formulación demasiado literal al texto principal.
