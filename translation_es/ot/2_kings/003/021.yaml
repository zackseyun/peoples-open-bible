  rationale: 'Se corrigió la alineación de las notas para reflejar el audit trail: la nota cultural ahora explica el modismo hebreo de edad militar y la nota léxica queda en el verbo de movilización. También se mejoró la naturalidad del español con ''ceñirse un cinturón'' y ''tomaron posición en la frontera'', manteniendo fielmente el sentido fuente.'
