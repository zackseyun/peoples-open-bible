base_translation:
  language: en
  yaml_path: translation/ot/proverbs/004/016.yaml
  text: For they do not sleep unless they do evil[a], and their sleep is taken away unless they cause someone to stumble.
  footnotes:
  - marker: a
    text: Or, 'unless they themselves stumble.' The Hebrew form is brief and has been understood either as causing another to stumble or as stumbling themselves; the context favors harm done to others.
    reason: alternative_reading
