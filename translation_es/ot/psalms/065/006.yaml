translation:
  language: es
  text: Con hechos asombrosos en rectitud[a] tú nos respondes, oh Dios de nuestra salvación, la confianza de todos los confines de la tierra y del mar lejano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en justicia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נ֤וֹרָא֨וֹת
  english_pob_choice: awesome deeds
  chosen_spanish: hechos asombrosos
  alternatives_spanish:
  - cosas asombrosas
  - obras asombrosas
  - hechos temibles
  lexicon: HALOT
  rationale: El hebreo expresa cosas/actos que inspiran asombro o temor reverente. En español, "hechos asombrosos" comunica bien la fuerza de obras divinas sin cargar el texto con un arcaísmo fuerte como "terribles".
- source_word: בְּצֶדֶק
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  - en righteousness
  lexicon: HALOT
  rationale: La preposición ב con צֶדֶק admite sentido de esfera o modo. Aquí el inglés POB conservó la alternativa "justice"; en español, "justicia" mantiene esa tensión léxica y sigue siendo natural en el contexto de la respuesta fiel de Dios.
- source_word: תַּעֲנֵנוּ
  english_pob_choice: you answer us
  chosen_spanish: tú nos respondes
  alternatives_spanish:
  - tú nos contestas
  - tú respondes a nosotros
  lexicon: HALOT
  rationale: ענה en este contexto es responder a la oración. "Nos respondes" es claro, directo y conserva el valor de segunda persona singular con sufijo plural.
- source_word: אֱלֹהֵי יִשְׁעֵנוּ
  english_pob_choice: O God of our salvation
  chosen_spanish: oh Dios de nuestra salvación
  alternatives_spanish:
  - Dios de nuestra salvación
  - oh Dios de nuestra liberación
  - oh Dios, nuestra salvación
  lexicon: HALOT
  rationale: La construcción en genitivo se preserva de forma transparente. "Salvación" mantiene el alcance amplio de ישׁע y es la opción más fiel y natural en español devocional.
- source_word: מִבְטָח
  english_pob_choice: the confidence
  chosen_spanish: la confianza
  alternatives_spanish:
  - el refugio
  - la esperanza
  - la seguridad
  lexicon: HALOT
  rationale: מִבְטָח denota aquello en lo que se confía. "La confianza" reproduce bien el valor sustantivo-predicativo del hebreo y evita introducir una metáfora distinta como "refugio".
- source_word: כָּל קַצְוֵי אֶרֶץ
  english_pob_choice: of all the ends of the earth
  chosen_spanish: de todos los confines de la tierra
  alternatives_spanish:
  - de todos los extremos de la tierra
  - de las partes más lejanas de la tierra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para los lugares más remotos. "Confines de la tierra" es una equivalencia idiomática sobria y precisa en español bíblico contemporáneo.
- source_word: וְיָם רְחֹקִים
  english_pob_choice: and of the distant sea
  chosen_spanish: y del mar lejano
  alternatives_spanish:
  - y de los mares lejanos
  - y del mar distante
  - y del mar lejano
  lexicon: HALOT
  rationale: Se conserva el singular del hebreo y su valor colectivo posible. "Mar lejano" refleja la imagen de un mar remoto sin forzar el plural que el texto hebreo no exige.
theological_decisions:
- issue: צֶדֶק en un contexto salmódico de acción divina
  english_pob_reading: in righteousness
  chosen_spanish_reading: en justicia
  alternative_spanish_readings:
  - en rectitud
  - en justicia/rrectitud
  rationale: El inglés POB dejó abierta la alternativa léxica entre righteousness y justice. En español, "justicia" preserva la tensión entre fidelidad moral y acto judicial de Dios, sin reducir el término a una mera abstracción ética.
  doctrine_reference: 'DOCTRINE.md: contested terms on righteousness/justice; aplicado al hebreo צֶדֶק'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al conservar el singular "mar lejano" para reflejar el hebreo singular יָם, y mantiene el valor genitivo de "Dios de nuestra salvación". También respeta la alternativa documentada para צֶדֶק, integrándola como nota léxica en español.
  spanish_consistency_notes:
  - Se usa "Dios" para אֱלֹהִים, conforme al estándar del proyecto.
  - Se conserva "salvación" para יִשְׁעֵנוּ, sin sustituirlo por una formulación más explicativa.
  - La puntuación sigue el ritmo poético del hebreo y de la POB inglesa, con coma vocativa tras "salvación".
  - Se evita pluralizar "mar" para no borrar la elección revisada del texto fuente.
