review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura retórica y la mayoría de los nombres propios, pero falla en la cláusula final: el hebreo pregunta si esos dioses libraron a Samaria de la mano del hablante, no ''los libraron de Samaria''. Esa inversión altera el objeto y el sentido del desafío.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la frase final es gramatical y semánticamente defectuosa. También conviene mejorar la nota para que refleje con más precisión la variación tradicional del nombre עוה en español, sin mezclar innecesariamente una forma inglesa como principal alternativa.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'los dioses de', 'Samaria' y 'de mi mano' están bien alineados. La transliteración 'Ivvá' es defendible en español, con nota sobre 'Avvá' como variante tradicional.
  issues:
  - severity: high
    issue: Objeto incorrecto en la cláusula final
    rationale: El texto español dice '¿Acaso los libraron de Samaria de mi mano?', donde 'los' no tiene referente correcto y 'de Samaria' convierte a Samaria en origen en vez de objeto directo. El hebreo אֶת שֹׁמְרוֹן exige 'a Samaria' como objeto de 'librar'.
  - severity: medium
    issue: Construcción verbal poco natural por calco
    rationale: Aun corrigiendo el objeto, la forma más natural y fiel en español es '¿Acaso libraron a Samaria de mi mano?' sin pronombre adicional. Esto reproduce bien la pregunta retórica introducida por כִּי.
  - severity: low
    issue: Nota al pie mejorable
    rationale: La nota actual menciona 'Ivvah', forma inglesa, mientras el texto español usa 'Ivvá'. Es mejor presentar la variación tradicional en español de forma más coherente, p. ej. 'Avvá' como variante.
  revised_spanish_text: ¿Dónde están los dioses de Hamat y de Arpad? ¿Dónde están los dioses de Sefarvaim[a], Hena y Ivvá? ¿Acaso libraron a Samaria de mi mano?
  revised_footnotes:
