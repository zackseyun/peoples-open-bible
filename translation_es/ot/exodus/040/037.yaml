translation:
  language: es
  text: Pero si la nube no se levantó[a], no partieron hasta el día en que se levantó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «hasta el día de su levantarse».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La combinación introduce una condición contrastiva respecto del versículo anterior; en español, «Pero si» conserva ese matiz adversativo sin endurecer el giro sintáctico.
- source_word: יֵעָלֶה
  english_pob_choice: rise
  chosen_spanish: se levantaba
  alternatives_spanish:
  - subía
  - ascendía
  - era alzada
  lexicon: HALOT
  rationale: עלה en este contexto describe el movimiento de la nube al apartarse del santuario. «Se levantaba» es natural en español y mantiene la imagen de ascenso sin convertirla en una perífrasis más técnica.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube de presencia
  - la nube divina
  lexicon: HALOT
  rationale: El sustantivo definido remite a la nube ya identificada en el contexto inmediato; «la nube» basta y evita introducir una glosa que el hebreo no explicita aquí.
- source_word: יִסְעוּ
  english_pob_choice: set out
  chosen_spanish: partían
  alternatives_spanish:
  - salían
  - emprendían la marcha
  - levantaban el campamento
  lexicon: HALOT
  rationale: נסע en lenguaje de campamento denota la partida del pueblo. «Partían» es breve, fiel y idiomático; «levantaban el campamento» sería más explicativo, pero menos directo.
- source_word: עַד יוֹם
  english_pob_choice: until the day
  chosen_spanish: hasta el día
  alternatives_spanish:
  - hasta que llegaba el día
  - hasta el momento
  lexicon: HALOT
  rationale: La locución temporal se conserva de forma directa con «hasta el día», manteniendo la referencia explícita al día mencionado en el hebreo.
- source_word: הֵעָלֹתוֹ
  english_pob_choice: it rose
  chosen_spanish: en que se levantaba
  alternatives_spanish:
  - de su levantarse
  - de su ascenso
  - en que era levantada
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo expresa «su levantarse». En español, una subordinada temporal con «en que se levantaba» comunica con claridad el referente de la nube y conserva el sentido del original sin hacerlo más abstracto.
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés: mantiene el contraste de וְאִם con «Pero si», la negación narrativa con imperfectos en pasado, y la referencia de הֵעָלֹתוֹ a la nube mediante una subordinada temporal natural en español.'
  spanish_consistency_notes:
  - Se mantiene «la nube» de forma consistente como referente definido ya establecido en el contexto.
  - Se prefieren verbos de movimiento simples y claros («se levantaba», «partían») para conservar la concisión del hebreo.
  - La nota reproduce la alternativa más literal para הֵעָלֹתוֹ, equivalente a la observación inglesa sobre «its rising».
