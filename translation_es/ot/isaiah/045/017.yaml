revisions:
- from: Israel es salvado[a] por Yahvé con una salvación eterna; no serán avergonzados[b] ni humillados para siempre y para siempre.
  to: Israel es salvo[a] por Yahvé con una salvación eterna; no serán avergonzados[b] ni humillados por siempre jamás.
  rationale: Se reemplaza 'es salvado' por 'es salvo' para un español más natural y digno que aún refleja bien el nifal resultativo. Se cambia 'para siempre y para siempre' por 'por siempre jamás', una formulación idiomática que conserva la fuerza enfática de עַד עוֹלְמֵי עַד sin sonar calcada. También se ajusta la nota [b] para que ofrezca una alternativa real y útil.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:21:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Israel recibe salvación por/en Yahvé, la salvación es perdurable, y sigue la promesa de no sufrir vergüenza ni humillación jamás. También respeta correctamente el nombre divino como ''Yahvé'' y conserva en nota la alternativa de esfera para ביהוה. Sin embargo, dos elecciones españolas no son las más fieles ni naturales: ''es salvado'' suena forzado en español bíblico corriente, y ''para siempre y para siempre'' calca el inglés más que el hebreo idiomático.'
  spanish_quality_summary: El texto es generalmente claro, pero necesita pulido estilístico para sonar natural y digno en español eclesial amplio. 'Israel es salvado' resulta menos idiomático que 'Israel es salvo' o 'Israel es salvado por Yahvé'; y 'para siempre y para siempre' es una repetición poco natural en español. La concordancia plural en 'no serán' puede mantenerse si se entiende el destinatario como el pueblo, aunque conviene que la frase total fluya mejor.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: יהוה -> ''Yahvé'' correctamente; תְּשׁוּעַת עוֹלָמִים -> ''salvación eterna'' es aceptable; los pares de vergüenza/humillación preservan la distinción léxica. La mejora principal es estilística-idiomática, no terminológica.'
  issues:
  - severity: medium
    issue: '''Israel es salvado'' suena poco idiomático en español bíblico natural.'
    rationale: Aunque es defendible formalmente, en español amplio 'Israel es salvo' comunica mejor el valor resultativo/estativo del nifal sin sonar como traducción calcada.
  - severity: medium
    issue: '''para siempre y para siempre'' es un calco poco natural.'
    rationale: עַד עוֹלְמֵי עַד intensifica perpetuidad; en español natural y digno se expresa mejor como 'por siempre jamás' o 'por los siglos de los siglos'. La primera mantiene registro moderno sin exceso litúrgico.
  - severity: low
    issue: La nota [b] no añade una alternativa real respecto al texto principal.
    rationale: El pie dice 'O no serán avergonzados ni humillados', pero el texto ya dice eso, salvo que en el cuerpo aparece 'ni humillados' sin repetir el verbo. Conviene convertirla en una alternativa léxica genuina como 'no se avergonzarán ni serán humillados'.
  revised_spanish_text: Israel es salvo[a] por Yahvé con una salvación eterna; no serán avergonzados[b] ni humillados por siempre jamás.
  revised_footnotes:
  - marker: a
    text: O 'en Yahvé'; la preposición hebrea puede expresar esfera además de agencia.
    reason: alternative_reading
  - marker: b
    text: O 'no se avergonzarán ni serán humillados'.
    reason: lexical_alternative
