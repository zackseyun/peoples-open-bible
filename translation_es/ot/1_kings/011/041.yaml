translation:
  language: es
  text: El resto de los hechos de Salomón[a], y todo lo que hizo, y su sabiduría, ¿no están escritos en el Libro de los Hechos de Salomón?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hechos» traduce aquí el valor historiográfico de דִּבְרֵי; también podría verterse «Crónicas», pues el título hebreo literalmente contiene la idea de «palabras/asuntos de Salomón».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶתֶר
  english_pob_choice: Now the rest of
  chosen_spanish: El resto de
  alternatives_spanish:
  - Y el resto de
  - Ahora, el resto de
  lexicon: HALOT
  rationale: יֶתֶר expresa lo restante o lo que queda. En español, «el resto de» comunica con naturalidad la fórmula de cierre sin añadir contenido ajeno. Se omite un «ahora» explícito porque el valor discursivo del waw puede quedar implícito en la transición narrativa.
- source_word: דִּבְרֵי
  english_pob_choice: acts
  chosen_spanish: hechos
  alternatives_spanish:
  - palabras
  - asuntos
  - actos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «palabras/asuntos», en esta fórmula regia el sentido es el registro de lo que Salomón hizo. «Hechos» conserva el valor historiográfico y suena más natural en español que un calco como «palabras» o «asuntos».
- source_word: שְׁלֹמֹה
  english_pob_choice: Solomon
  chosen_spanish: Salomón
  alternatives_spanish:
  - Solomón
  lexicon: Convención bíblica española
  rationale: Se usa la forma bíblica estándar en español, «Salomón», por claridad y reconocimiento inmediato.
- source_word: וְכָל אֲשֶׁר עָשָׂה
  english_pob_choice: and all that he did
  chosen_spanish: y todo lo que hizo
  alternatives_spanish:
  - y todo lo que realizó
  - y todo lo que llevó a cabo
  lexicon: HALOT
  rationale: La cláusula es directa y amplia. «Hizo» mantiene el alcance general del verbo עשה sin restringirlo a logros específicos.
- source_word: וְחָכְמָתוֹ
  english_pob_choice: and his wisdom
  chosen_spanish: y su sabiduría
  alternatives_spanish:
  - y la sabiduría que tenía
  - y la sabiduría de él
  lexicon: HALOT
  rationale: Se traduce de forma natural y precisa el sustantivo con sufijo posesivo. En este contexto, la sabiduría aparece como una categoría digna de registro junto con sus hechos.
- source_word: הֲלוֹא
  english_pob_choice: are they not
  chosen_spanish: ¿no están
  alternatives_spanish:
  - ¿acaso no están
  - ¿no es cierto que están
  lexicon: HALOT
  rationale: La partícula retórica espera respuesta afirmativa. En español, «¿no están…?» preserva la fuerza interrogativa sin sonar forzado.
- source_word: הֵם כְּתֻבִים
  english_pob_choice: are they not written
  chosen_spanish: escritos
  alternatives_spanish:
  - registrados
  - anotados
  lexicon: HALOT
  rationale: El participio pasivo expresa que esos hechos están consignados por escrito. «Escritos» es la opción más directa y transparente en español; «registrados» sería una alternativa interpretativa más explícita.
- source_word: עַל סֵפֶר
  english_pob_choice: in the Book
  chosen_spanish: en el Libro
  alternatives_spanish:
  - en el rollo
  - en el libro
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «sobre/en un libro o rollo», el español bíblico puede decir simplemente «en el Libro» para reflejar la localización documental. Se mantiene la mayúscula por tratarse del título de una fuente.
- source_word: סֵפֶר דִּבְרֵי שְׁלֹמֹה
  english_pob_choice: the Book of the Acts of Solomon
  chosen_spanish: el Libro de los Hechos de Salomón
  alternatives_spanish:
  - el Libro de los Asuntos de Salomón
  - el Libro de las Crónicas de Salomón
  lexicon: HALOT
  rationale: El título hebreo contiene literalmente «las palabras/materias de Salomón», pero en este género significa el registro de sus hechos. «Hechos» mantiene la decisión contextual del inglés POB y resulta más transparente que «Crónicas», que podría confundirse con el libro bíblico de Crónicas.
translation_notes:
  revision_awareness: 'Coincide con el texto fuente y con la decisión inglesa establecida: se mantiene la lectura historiográfica de דִּבְרֵי como «hechos» en una fórmula de cierre regia, sin introducir revisiones textuales ni cambios de sentido.'
  spanish_consistency_notes:
  - Se conserva «Salomón» como forma bíblica estándar en todo el versículo.
  - Se mantiene la mayúscula en «Libro» por tratarse de un título de fuente citada.
  - Se evita «Crónicas» en el texto principal para no confundir el título con el libro bíblico homónimo; la alternativa queda documentada en nota.
