translation:
  language: es
  text: Pues[a], habiendo formado un coro sagrado de piedad, se iban animando unos a otros, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un coro santo de piedad». El griego combina una imagen cultual («sagrado») con el término clave de virtud εὐσέβεια.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱερὸν
  english_pob_choice: sacred
  chosen_spanish: sagrado
  alternatives_spanish:
  - santo
  - consagrado
  lexicon: LSJ
  rationale: ἱερός indica lo sagrado o consagrado. «Sagrado» conserva el matiz cultual sin añadir connotaciones eclesiásticas ajenas al contexto.
- source_word: εὐσεβείας
  english_pob_choice: piety
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción a Dios
  - religiosidad
  lexicon: LSJ
  rationale: En 4 Macabeos, εὐσέβεια funciona como virtud central de fidelidad devota a Dios. «Piedad» es el equivalente español más natural y directo para ese campo semántico; «devoción a Dios» explicita más, pero resulta menos compacto.
- source_word: στήσαντες
  english_pob_choice: having formed
  chosen_spanish: habiendo formado
  alternatives_spanish:
  - habiendo establecido
  - habiendo dispuesto
  lexicon: LSJ
  rationale: Con χορός, el participio expresa constituir u ორგანიზar un conjunto, no levantar algo físicamente. «Habiendo formado» reproduce bien el valor idiomático.
- source_word: χορὸν
  english_pob_choice: chorus
  chosen_spanish: coro
  alternatives_spanish:
  - coro cantado
  - grupo coral
  - círculo de danza
  lexicon: LSJ
  rationale: «Coro» conserva la imagen griega de χορός y su resonancia cultual. «Grupo coral» sería más explícito pero menos fiel al término breve; «círculo de danza» introduce una especificación no requerida por el contexto.
- source_word: παρεθάρσυνον
  english_pob_choice: kept encouraging
  chosen_spanish: se iban animando
  alternatives_spanish:
  - se seguían animando
  - se exhortaban mutuamente
  - se alentaban
  lexicon: LSJ
  rationale: El imperfecto señala acción continua o repetida. «Se iban animando» comunica esa progresividad en español natural; «se exhortaban mutuamente» enfatiza más la amonestación que el aliento.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - los unos a los otros
  lexicon: LSJ
  rationale: Equivalente recíproco idiomático en español, de registro claro y elevado.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - y dijeron
  lexicon: LSJ
  rationale: Participio introductorio estándar; «diciendo» es la forma más directa y fiel.
theological_decisions:
- issue: εὐσέβεια como virtud clave en contexto de martirio
  english_pob_reading: piety
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - religiosidad
  rationale: La POB inglesa opta por «piety» en el contexto formal, y en español «piedad» transmite de modo natural la virtud de fidelidad reverente a Dios sin cargar el texto con terminología posterior más técnica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5, 6
- issue: Imaginería cultual de χορός unido a ἱερός
  english_pob_reading: sacred chorus of piety
  chosen_spanish_reading: coro sagrado de piedad
  alternative_spanish_readings:
  - coro santo de piedad
  - coro consagrado de piedad
  rationale: Se conserva la tensión entre la imagen cultual («sagrado») y la virtud teológica («piedad»). No se suaviza la metáfora ni se sustituye por un vocabulario eclesial más familiar que podría borrar el color retórico del griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 4
translation_notes:
  revision_awareness: La POB inglesa revisó «godliness» a «piety» para εὐσεβείας. El español sigue esa última decisión con «piedad», manteniendo la imagen cultual de χορὸν con «coro sagrado» y preservando el valor durativo del imperfecto con «se iban animando».
  spanish_consistency_notes:
  - Se mantiene «piedad» como equivalente principal de εὐσέβεια en este pasaje, coherente con la revisión inglesa más reciente.
  - «Sagrado» se usa aquí para ἱερὸν por su transparencia y para conservar la imagen ritual sin imponer una traducción confesional añadida.
  - 'El orden español fluye de manera natural sin omitir ningún elemento del griego: causalidad («Porque»), participio temporal («habiendo formado»), objeto («un coro sagrado de piedad»), imperfecto iterativo («se iban animando»), reciprocidad («unos a otros») y participio de discurso («diciendo»).'
