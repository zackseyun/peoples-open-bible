lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - pasó a mejor vida
  lexicon: HALOT
  rationale: El hebreo usa el verbo narrativo directo de morir; «murió» conserva la fuerza simple y literal del original, igual que el inglés POB con «died».
- source_word: יָאִיר
  english_pob_choice: Jair
  chosen_spanish: Yair
  alternatives_spanish:
  - Jair
  lexicon: nombre propio (transliteración convencional desde el hebreo)
  rationale: Se mantiene la forma transliterada del nombre hebreo de manera directa. En español, «Yair» preserva mejor la correspondencia con el original que adaptar a la grafía inglesa «Jair».
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - fue sepultado
  lexicon: HALOT
  rationale: El nifal de קבר expresa pasividad en un registro narrativo de entierro. «Fue sepultado» conserva el sentido formal y natural en español; «enterrado» también sería posible, pero «sepultado» reproduce mejor el tono de acta narrativa.
- source_word: בְּקָמוֹן
  english_pob_choice: in Kamon
  chosen_spanish: en Camón
  alternatives_spanish:
  - en Kamón
  - en Kamon
  lexicon: HALOT
  rationale: La preposición ב marca ubicación y se traduce naturalmente como «en». Para el topónimo, «Camón» sigue la adaptación española habitual con c- inicial ante a; mantiene la referencia geográfica sin añadir interpretación.
