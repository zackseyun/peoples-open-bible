  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: vecinos, amigos y asociados en tratos que, de manera clandestina, apartaban a algunos para darles seguridades de protección y apoyo. Sin embargo, «atrayendo en secreto a ciertas personas» no preserva tan bien como debería el matiz de τινας ἐπισπώμενοι, que en contexto apunta más a apartar o llevar discretamente aparte que a atraer/ganar. Además, la nota al pie está anclada en «socios de negocios[a]», pero su contenido comenta la cláusula final; el anclaje debe moverse al lugar pertinente.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos puntos de mejora: «atrayendo en secreto» suena algo ambiguo y menos natural que «apartando discretamente» o equivalente en este contexto; y «todo esfuerzo diligente» es comprensible, aunque «todo empeño posible» o «todo esfuerzo posible» suena más idiomático. El resto fluye bien.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Vecinos», «amigos» y «socios de negocios» son aceptables; «protegerlos» concuerda con la revisión inglesa de συνασπίζειν. La principal cuestión léxica es ajustar τινας ἐπισπώμενοι a un español que conserve mejor la idea de apartar discretamente.
  issues:
  - severity: medium
    issue: «atrayendo en secreto a ciertas personas» debilita el matiz de τινας ἐπισπώμενοι
    rationale: El griego en este contexto clandestino sugiere más bien llevar aparte o apartar discretamente a algunos, no simplemente atraerlos. «Atrayendo» puede sugerir persuasión o magnetismo social más que la acción física-social de tomarlos aparte.
  - severity: medium
    issue: La nota al pie [a] está anclada en «socios de negocios», pero comenta la cláusula de protección y ayuda
    rationale: Según la disciplina del proyecto, el marcador debe aparecer en la palabra o frase relevante. Aquí la nota alternativa corresponde a «protegerlos ... en su apoyo», no a «socios de negocios».
  - severity: low
    issue: «todo esfuerzo diligente» es algo poco idiomático en español eclesial general
    rationale: Aunque transmite intensidad, suena más calcado que natural. «todo empeño posible» o «todo esfuerzo posible» conserva bien πᾶν ἐκτενὲς y mejora la legibilidad.
  revised_spanish_text: Y ya algunos vecinos, amigos y socios de negocios, apartando discretamente a ciertas personas, daban seguridades de que se unirían a protegerlos[a] y de que ofrecerían todo empeño posible en su apoyo.
