translation:
  language: es
  text: 'Le pusieron comida delante de él para comer[a], pero dijo: «No comeré hasta haber hablado mis palabras». Y dijo: «Habla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «hasta haber dicho lo que tengo que decir». El hebreo dice literalmente: «hasta haber hablado mis palabras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: was set
  chosen_spanish: se puso
  alternatives_spanish:
  - le pusieron
  - se le puso
  lexicon: HALOT
  rationale: El hebreo presenta el hecho de que la comida fue colocada delante de él; en español, la forma pasiva refleja o impersonal mantiene la naturalidad sin forzar un sujeto no expresado. «Se puso» conserva la idea de colocación y evita sobreespecificar quién actuó.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - en su presencia
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «ante su rostro/presencia». «Delante de él» es idiomático en español y conserva la relación espacial/presencial.
- source_word: לֶאֱכֹל
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - a comer
  - para que comiera
  lexicon: HALOT
  rationale: 'El infinitivo con ל expresa finalidad: la comida fue puesta con el propósito de comer. «Para comer» comunica esa finalidad con claridad y naturalidad en español.'
- source_word: לֹא אֹכַל
  english_pob_choice: I will not eat
  chosen_spanish: No comeré
  alternatives_spanish:
  - No voy a comer
  - No comeré en absoluto
  lexicon: HALOT
  rationale: El imperfecto en discurso directo expresa resolución futura; «No comeré» mantiene firmeza y sencillez, como en la POB inglesa.
- source_word: עַד אִם
  english_pob_choice: until
  chosen_spanish: hasta
  alternatives_spanish:
  - hasta que
  - antes de que
  lexicon: HALOT
  rationale: La combinación introduce el límite temporal hasta el cual no comerá. «Hasta» funciona de manera natural en español; el complemento verbal siguiente completa la idea del límite.
- source_word: דִּבַּרְתִּי
  english_pob_choice: I have spoken
  chosen_spanish: haber hablado
  alternatives_spanish:
  - haber dicho
  - haber expuesto
  lexicon: HALOT
  rationale: Después de una estructura de límite temporal, el perfecto queda bien representado por un infinitivo compuesto en español. «Haber hablado» conserva el sentido de acción completada antes de comer.
- source_word: דְּבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - lo que tengo que decir
  - mi asunto
  lexicon: HALOT
  rationale: La forma literal es «mis palabras». Aunque «lo que tengo que decir» sería más idiomático, «mis palabras» preserva la cercanía léxica y la tensión retórica del hebreo.
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Dime
  - Adelante, habla
  lexicon: HALOT
  rationale: Imperativo directo de דבר. «Habla» es breve, fiel y natural en español, sin añadir matices no presentes en el hebreo.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] exactamente en la frase correspondiente dentro del texto español.
  spanish_consistency_notes:
  - 'Se mantuvo el orden narrativo del hebreo: comida puesta, negativa a comer, condición temporal, respuesta final.'
  - Se preservó la literalidad de «mis palabras» en el texto principal, con una nota para la alternativa más idiomática.
  - Se evitó el calco rígido donde el español requiere una solución más natural, especialmente en la colocación de la comida y la estructura temporal.
