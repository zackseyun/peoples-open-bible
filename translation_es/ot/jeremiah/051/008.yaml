review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: caída súbita de Babilonia, ruina resultante, llamado al lamento, uso de un remedio, y posibilidad incierta de sanidad. Mantiene correctamente la personificación femenina. Sin embargo, hay ajustes necesarios para alinear mejor el tono y la elección léxica con el rastro auditado: הֵילִילוּ se expresa mejor como ''Giman'' o ''Lamenten'' que como ''Aullad'', y la nota al pie está mal anclada y contiene una forma ortográfica incorrecta (''balsamo'').'
  spanish_quality_summary: El texto es legible, pero mezcla registro peninsular ('Tomad', 'Aullad') con el objetivo de español neutral latinoamericano. 'Aullad' además suena poco natural y demasiado animalizante para el contexto de duelo. 'Quedó quebrantada' es aceptable, aunque 'fue destrozada' sería más vívido; no es imprescindible cambiarlo. La puntuación y la personificación funcionan bien.
  glossary_alignment: No hay conflictos con terminología doctrinal principal del proyecto. 'Bálsamo' corresponde bien a צֳרִי, pero la nota léxica debe anclarse al término 'bálsamo' en el texto, no a 'quebrantada'. También debe corregirse la alternativa ortográfica y formularse con español natural.
  issues:
  - severity: medium
    issue: La nota al pie [a] está anclada a 'quebrantada' pero explica 'bálsamo'.
    rationale: Los marcadores deben aparecer exactamente en la palabra o frase relevante. Aquí induce confusión y no cumple la disciplina de anclaje requerida.
  - severity: medium
    issue: '''Aullad'' no es la mejor opción para הֵילִילוּ en español neutral eclesial.'
    rationale: Aunque el inglés contempló 'Howl' como alternativa, la decisión auditada fue 'Wail'. En español, 'Giman' o 'Lamenten' preserva mejor el duelo intenso sin connotación animalizante ni sabor arcaizante.
  - severity: low
    issue: Registro poco neutral por el uso de 'Tomad'.
    rationale: El objetivo es español neutral latinoamericano/broadly church-readable. 'Tomen' encaja mejor que el voseo/plural peninsular.
  - severity: low
    issue: La nota contiene la forma 'balsamo' sin tilde.
    rationale: Es un error ortográfico en español; además conviene explicar la alternativa como 'bálsamo medicinal' o 'resina medicinal' en lugar de repetir una forma incorrecta.
  revised_spanish_text: De repente cayó Babilonia y quedó quebrantada. ¡Giman por ella! Tomen bálsamo[a] para su dolor; quizá sea sanada.
  revised_footnotes:
  - marker: a
    text: O 'bálsamo medicinal' o 'resina medicinal'. El hebreo se refiere a una resina usada como remedio.
    reason: lexical_alternative
