revisions:
- from: 'Y la banda tejida artísticamente de su efod[a], que está sobre él, será de la misma hechura, de una sola pieza con él: oro, azul, púrpura, escarlata[b] y lino fino torcido.'
  to: 'Y la banda tejida artísticamente de su efod[a], que está sobre el efod, será de la misma hechura, de una sola pieza con él: oro, azul, púrpura, hilo escarlata[b] y lino fino torcido.'
  rationale: 'Se hicieron ajustes menores para mejorar fidelidad y naturalidad en español: se desambiguó el referente de אֲשֶׁר עָלָיו con ''sobre el efod'' y se explicitó el valor textil de תוֹלַעַת שָׁנִי con ''hilo escarlata'', en línea con la auditoría inglesa. No se requieren cambios doctrinales ni adjudicación compleja.'
