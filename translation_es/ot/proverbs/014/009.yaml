translation:
  language: es
  text: Los necios se burlan de la culpa[a], pero entre los rectos hay favor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ofrenda de culpa». אָשָׁם puede significar «culpa» o, en contextos sacrificiales, «ofrenda de culpa».
    reason: alternative_reading
  - marker: b
    text: O «aceptación» o «buena voluntad» entre los rectos; el hebreo no especifica de quién es el favor.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱוִלִים
  english_pob_choice: Fools
  chosen_spanish: los necios
  alternatives_spanish:
  - los necios
  - los insensatos
  - los tontos
  lexicon: HALOT
  rationale: El término sapiencial describe personas moralmente torpes o faltas de juicio. «Necios» conserva el registro proverbial y la carga moral más claramente que «tontos», sin suavizar el reproche.
- source_word: יָלִיץ
  english_pob_choice: mock
  chosen_spanish: se burlan de
  alternatives_spanish:
  - se burlan de
  - hacen burla de
  - desprecian
  lexicon: HALOT
  rationale: El hifil de לוץ expresa burla o mofa. «Se burlan de» comunica bien la actitud de desprecio y funciona de manera natural en español.
- source_word: אָשָׁם
  english_pob_choice: guilt
  chosen_spanish: la culpa
  alternatives_spanish:
  - la culpa
  - la culpa ofrenda
  - la culpa/ofensa
  lexicon: HALOT
  rationale: En este proverbio de sabiduría, el contraste ético favorece el sentido abstracto de responsabilidad o culpabilidad. «La culpa» mantiene abierta la alternativa cultual sin introducir una lectura sacrificial donde el hebreo no la exige.
- source_word: וּבֵין
  english_pob_choice: but among
  chosen_spanish: pero entre
  alternatives_spanish:
  - pero entre
  - y entre
  - mientras entre
  lexicon: HALOT
  rationale: La conjunción introduce contraste entre dos colon paralelos. «Pero entre» reproduce con naturalidad el valor adversativo del hebreo en español.
- source_word: יְשָׁרִים
  english_pob_choice: the upright
  chosen_spanish: los rectos
  alternatives_spanish:
  - los rectos
  - los justos
  - los íntegros
  lexicon: HALOT
  rationale: «Rectos» recoge la imagen moral de lo derecho/recto y mantiene el paralelismo sapiencial. Se evita estrecharlo prematuramente a una categoría estrictamente jurídica.
- source_word: רָצוֹן
  english_pob_choice: favor
  chosen_spanish: favor
  alternatives_spanish:
  - favor
  - aceptación
  - buena voluntad
  lexicon: HALOT
  rationale: Como en el inglés POB, el término queda deliberadamente abierto. «Favor» es breve y puede abarcar favor humano o divino sin forzar el referente.
theological_decisions:
- issue: Sentido de אָשָׁם en un contexto sapiencial no sacrificial
  english_pob_reading: abstract 'guilt' rather than cultic 'guilt offering'
  chosen_spanish_reading: sentido abstracto de 'culpa' en vez de ofrenda de culpa
  alternative_spanish_readings:
  - ofrenda de culpa
  - culpa/ofensa
  rationale: El paralelo con «los rectos» muestra un contraste moral, no litúrgico. Traducir como «culpa» preserva la tensión documentada en el POB inglés y evita resolverla de forma indebida.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Referente de רָצוֹן
  english_pob_reading: left broad as 'favor'
  chosen_spanish_reading: queda amplio como 'favor'
  alternative_spanish_readings:
  - favor de Dios
  - buena voluntad humana
  - aceptación
  rationale: El hebreo no especifica de quién es el favor. Mantenerlo amplio respeta la ambigüedad original y permite que el proverbio funcione tanto en clave relacional como teológica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios respecto del pasaje base; se conserva la ambigüedad de אָשָׁם y רָצוֹן tal como documenta el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «los necios»/«los rectos» para sostener el paralelismo sapiencial con registro natural en español.
  - Se evitó «ofrenda de culpa» en el cuerpo principal para no imponer la lectura cultual en un proverbio ético.
