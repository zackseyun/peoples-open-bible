  - severity: medium
    issue: «retirarse» para τοῦ ἀπελθεῖν
    rationale: «Retirarse» puede sugerir retirada militar o repliegue estratégico. El griego solo expresa partir/irse. «Partir» o «irse» es más fiel y neutral.
