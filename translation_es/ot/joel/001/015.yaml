    rationale: Esto rompe la correspondencia entre ancla y nota exigida por el proyecto y puede confundir al lector, haciendo pensar erróneamente que la nota explica «Yahvé».
  - severity: medium
    issue: Hay dos notas para una sola observación de la auditoría inglesa.
    rationale: El inglés POB conserva una sola nota sobre la paronomasia; duplicarla añade peso innecesario sin aportar información sustancial nueva.
  - severity: low
    issue: «¡Ay del día!» es comprensible pero algo rígido en español actual.
    rationale: La construcción reproduce el hebreo de forma bastante literal; «¡Ay por aquel día!» suena más natural y mantiene la fuerza lamentativa.
