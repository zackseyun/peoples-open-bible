  to: Su cuerda está escondida en el suelo[a], y su trampa sobre el sendero.
  rationale: Se ajusta «en la tierra» a «en el suelo» para preservar mejor el valor contextual de בָּאָרֶץ en una escena de trampa oculta. Se mantiene «cuerda / trampa / sendero» como opciones fieles y legibles, y se actualiza la nota para que la alternativa léxica corresponda al texto revisado.
