translation:
  language: es
  text: Pero si la mujer no se ha contaminado y está limpia, entonces será declarada inocente y concebirá descendencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «será sembrada con semilla», un modismo que significa concebir o tener descendencia.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: HALOT
  rationale: El hebreo introduce el caso contrario al anterior; en español, 'Pero si' conserva mejor el matiz adversativo que un simple 'Y si'.
- source_word: לֹא נִטְמְאָה
  english_pob_choice: has not defiled herself
  chosen_spanish: no se ha contaminado
  alternatives_spanish:
  - no se ha hecho impura
  - no ha sido contaminada
  lexicon: HALOT
  rationale: En este contexto ritual-sexual, נִטְמְאָה puede expresarse como 'contaminarse' o 'hacerse impura'. 'No se ha contaminado' conserva la idea de impureza ritual con un verbo natural en español y mantiene la posibilidad de una lectura reflexiva.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: HALOT
  rationale: El sustantivo definido es directo; 'la mujer' sigue el hebreo sin introducir la relación conyugal por inferencia.
- source_word: וּטְהֹרָה הִוא
  english_pob_choice: and is clean
  chosen_spanish: y está limpia
  alternatives_spanish:
  - y es limpia
  - y está pura
  lexicon: HALOT
  rationale: טָהוֹר expresa limpieza/pureza ritual. 'Está limpia' es la formulación más natural en español y preserva el estado resultante sin cargar innecesariamente con una abstracción como 'pura'.
- source_word: וְנִקְּתָה
  english_pob_choice: then she will be cleared
  chosen_spanish: entonces será declarada inocente
  alternatives_spanish:
  - entonces será absuelta
  - entonces quedará libre
  lexicon: HALOT
  rationale: נקה en el Niphal comunica quedar libre/ser limpiada de la acusación. En este rito, 'ser declarada inocente' expresa la vindicación pública sin reducirlo a un tecnicismo jurídico ajeno al contexto.
- source_word: וְנִזְרְעָה זָרַע
  english_pob_choice: will conceive offspring
  chosen_spanish: concebirán en ella descendencia
  alternatives_spanish:
  - concebirá descendencia
  - será sembrada con semilla
  lexicon: HALOT
  rationale: El hebreo usa una idiomática literal 'ser sembrada con semilla', que POB traduce como concepción. En español, 'concebirán en ella descendencia' procura conservar el sentido de fertilidad/restauración y la referencia al cuerpo de la mujer, sin volver la frase demasiado técnica o extraña. La forma plural impersonal con 'concebirán' evita asignar sujeto explícito donde el hebreo es idiomático.
theological_decisions:
- issue: Sentido del resultado prometido tras la vindicación
  english_pob_reading: The verse promises that the innocent woman is cleared and granted/confirmed capacity to conceive.
  chosen_spanish_reading: La mujer inocente queda vindicada y se afirma su fecundidad, expresada como concepción de descendencia.
  alternative_spanish_readings:
  - La mujer simplemente concebirá
  - La frase describe solo fertilidad general
  rationale: El hebreo no presenta una fórmula abstracta sobre fertilidad en general, sino una imagen idiomática concreta ligada a la resolución del rito. La traducción mantiene la idea de concepción sin añadir explícitamente 'capacidad' ni convertirlo en un mero eufemismo genérico.
  doctrine_reference: Num 5:28; cf. el paralelismo del rito de celos en Nm 5:11–31
- issue: Alcance de la impureza/contaminación
  english_pob_reading: has not defiled herself
  chosen_spanish_reading: no se ha contaminado
  alternative_spanish_readings:
  - no ha sido contaminada
  - no se ha hecho impura
  rationale: La tensión entre impureza ritual y posible culpa moral se conserva mejor con 'contaminarse', que no elimina la dimensión ritual ni impone una lectura exclusivamente moral.
  doctrine_reference: Nm 5:12–14, 27–28
translation_notes:
  revision_awareness: La versión inglesa más reciente eliminó 'be able to' en la cláusula final para no añadir expansión interpretativa. La redacción española sigue esa revisión y evita añadir capacidad explícita; conserva la fórmula idiomática de concepción en forma natural y breve.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en la serie POB cuando aparece el nombre divino, pero este versículo no lo contiene.
  - '''Limpia'' traduce טהור en sentido ritual, no higiénico.'
  - '''Declarada inocente'' mantiene el valor de vindicación de נקה sin forzar un tecnicismo judicial excesivo.'
  - Se evita 'Cristo' u otra terminología no pertinente al texto.
  - La frase final mantiene el referente femenino implícito en español mediante la preposición 'en ella' para no perder la concreción corporal del hebreo.
