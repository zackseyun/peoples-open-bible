translation:
  language: es
  text: 'Entonces Yahvé dijo[a]: «Tú tuviste compasión de la planta, por la que no trabajaste ni la hiciste crecer, que llegó a existir en una noche y pereció en una noche».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el qiqayón»; la identificación exacta de la planta es incierta. Algunas versiones tradicionales la traducen «enredadera» o «vid».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la política del proyecto, evitando sustituirlo por un título. «Yahvé» es la forma establecida para el Tetragrámaton en español del POB.
- source_word: חַסְתָּ
  english_pob_choice: had pity
  chosen_spanish: sentiste lástima
  alternatives_spanish:
  - tuviste compasión
  - te apiadiste
  - sentiste compasión
  lexicon: HALOT
  rationale: El verbo חס expresa piedad/compasión/sentir pena en este contexto de reprensión. «Sentiste lástima» comunica con naturalidad la reacción afectiva de Jonás sin perder la fuerza del reproche; «tuviste compasión» también sería posible, pero suena algo más interpretativo en español actual.
- source_word: הַקִּיקָיוֹן
  english_pob_choice: the plant
  chosen_spanish: la planta
  alternatives_spanish:
  - el ricino
  - la enredadera
  - el kikayón
  lexicon: HALOT
  rationale: El texto hebreo nombra una planta de identificación incierta. «La planta» conserva la referencia general sin comprometer una especie debatida; se evita sobreespecificar con «ricino» o trasladar un término transliterado poco transparente.
- source_word: אֲשֶׁר לֹא עָמַלְתָּ בּוֹ
  english_pob_choice: for which you did not labor
  chosen_spanish: por la cual no trabajaste
  alternatives_spanish:
  - por la cual no te fatigaste
  - por la cual no te afanaste
  - por la cual no te esforzaste
  lexicon: HALOT
  rationale: עָמַל denota labor/toil. «Trabajaste» es una forma natural en español que comunica bien la falta de esfuerzo de Jonás; el complemento con «por la cual» mantiene la relación de beneficio/causa del hebreo.
- source_word: וְלֹא גִדַּלְתּוֹ
  english_pob_choice: which you did not make grow
  chosen_spanish: ni la hiciste crecer
  alternatives_spanish:
  - ni la cultivaste
  - ni la criaste
  - ni la hiciste aumentar
  lexicon: HALOT
  rationale: El piel de גדל aquí implica hacer crecer o causar crecimiento. «Hiciste crecer» conserva la agencia ausente de Jonás y suena más natural que una calca más técnica.
- source_word: שֶׁבִּן לַיְלָה הָיָה
  english_pob_choice: which came into being in a night
  chosen_spanish: que llegó a existir en una noche
  alternatives_spanish:
  - que apareció en una noche
  - que surgió en una noche
  - que vino a ser en una noche
  lexicon: HALOT
  rationale: La expresión apunta a una duración brevísima y al hecho de ser/ocurrir en el lapso de una noche. «Llegó a existir» refleja הָיָה sin sugerir específicamente brotar, y evita una decisión botánica que el hebreo no exige.
- source_word: וּבִן לַיְלָה אָבָד
  english_pob_choice: and perished in a night
  chosen_spanish: y pereció en una noche
  alternatives_spanish:
  - y desapareció en una noche
  - y se perdió en una noche
  - y murió en una noche
  lexicon: HALOT
  rationale: אָבַד significa perecer, ser destruido o perderse. «Pereció en una noche» mantiene el paralelismo con la cláusula anterior y el contraste retórico del hebreo.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. «Entonces» reproduce bien el encadenamiento discursivo en español sin sonar forzado.
theological_decisions:
- issue: Nombre divino en un discurso de Yahvé
  english_pob_reading: Yahweh said
  chosen_spanish_reading: Yahvé dijo
  alternative_spanish_readings:
  - el SEÑOR dijo
  - Jehová dijo
  rationale: Se mantiene el nombre propio del pacto según la norma del proyecto para יְהוָה. No se sustituye por un título litúrgico, y no hay aquí un problema de cita indirecta que requiera ocultar el nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor afectivo de חסת en la reprensión
  english_pob_reading: had pity on the plant
  chosen_spanish_reading: sentiste lástima por la planta
  alternative_spanish_readings:
  - tuviste compasión por la planta
  - te apiadaste de la planta
  rationale: La escena es una reprensión argumentativa; el término debe reflejar una reacción emocional real sin suavizarla en exceso. «Sentiste lástima» conserva el tono de la respuesta divina y la relación de pena por algo efímero.
  doctrine_reference: HALOT; contexto inmediato de Jonah 4:9–11
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del auditrail inglés, que prefirió un equivalente cercano para חסת y una formulación que refleje mejor הָיָה sin forzar una imagen botánica específica. En español se adoptó esa misma línea: se evita tanto «compasión» como única opción obligatoria, y se usa «llegó a existir» para preservar la neutralidad semántica del hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para el Tetragrámaton.
  - «Planta» conserva la incertidumbre lexical del término qiqayon sin imponer «ricino» u otra identificación.
  - Se usa el pretérito para toda la secuencia narrativa, coherente con el hebreo וַיֹּאמֶר.
  - Se preserva el paralelismo «en una noche ... en una noche» para reflejar la repetición intensiva del hebreo.
  - Los marcadores de nota [a] y [b] aparecen solo donde corresponde y no se reutilizan.
