translation:
  language: es
  text: Y un macho cabrío[a] como ofrenda por el pecado para Yahvé se ofrecerá además del holocausto continuo y su libación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «ofrenda de purificación». El hebreo חַטָּאת puede referirse a la ofrenda que trata la impureza, además del pecado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/שְׂעִיר עִזִּים
  english_pob_choice: male goat
  chosen_spanish: macho cabrío
  alternatives_spanish:
  - cabrito macho
  - macho de las cabras
  - chivo
  lexicon: HALOT
  rationale: La construcción hebrea especifica un macho de la especie cabruna para uso sacrificial. 'Macho cabrío' comunica bien el sexo y el tipo de animal en español bíblico actual sin sonar mecánico.
- source_word: אֶחָד
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  - un solo
  lexicon: HALOT
  rationale: El numeral queda implícito en el artículo indefinido español; 'un' mantiene la especificación cuantitativa del hebreo de modo natural.
- source_word: לְ/חַטָּאת
  english_pob_choice: for a sin offering
  chosen_spanish: como ofrenda por el pecado
  alternatives_spanish:
  - como ofrenda de pecado
  - para ofrenda por el pecado
  - como ofrenda de purificación
  lexicon: HALOT
  rationale: En contexto sacrificial, חַטָּאת puede designar la ofrenda que trata el pecado o la impureza. 'Ofrenda por el pecado' conserva la lectura cultual tradicional y permite anotar la alternativa sin resolver la tensión semántica.
- source_word: לַ/יהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según la norma del proyecto. En español sacrificial, 'para Yahvé' expresa la dedicación de la ofrenda de manera natural y fiel.
- source_word: עַל
  english_pob_choice: besides
  chosen_spanish: además de
  alternatives_spanish:
  - junto con
  - aparte de
  - sobre
  lexicon: HALOT
  rationale: En este contexto cultual, עַל marca adición respecto del holocausto continuo, no relación espacial. 'Además de' comunica la relación ritual con claridad y en español formal.
- source_word: עֹלַת הַ/תָּמִיד
  english_pob_choice: the regular burnt offering
  chosen_spanish: el holocausto continuo
  alternatives_spanish:
  - el holocausto regular
  - el holocausto diario
  - la ofrenda quemada continua
  lexicon: HALOT
  rationale: '''Holocausto'' es el equivalente cultual tradicional de עֹלָה y ''continuo'' refleja תָּמִיד sin forzar ''diario'' cuando el énfasis es la continuidad prescrita.'
- source_word: יֵעָשֶׂה
  english_pob_choice: shall be offered
  chosen_spanish: se ofrecerá
  alternatives_spanish:
  - será ofrecido
  - se hará
  - será presentado
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'será hecho', en lenguaje sacrificial español la pasiva natural es 'se ofrecerá', que mantiene la voz impersonal y el sentido cultual.
- source_word: וְ/נִסְכּֽ/וֹ
  english_pob_choice: and its drink offering
  chosen_spanish: y su libación
  alternatives_spanish:
  - y su ofrenda de bebida
  - y su derramamiento
  - y su bebida derramada
  lexicon: HALOT
  rationale: '''Libación'' es el término técnico más preciso para נֶסֶךְ y evita la ambigüedad de una traducción más general. Se conserva la relación posesiva con el sacrificio principal.'
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente; el proyecto español lo vierte como 'Yahvé' para preservar el nombre de pacto y mantener coherencia terminológica con el estándar del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de חַטָּאת en contexto sacrificial
  english_pob_reading: sin offering
  chosen_spanish_reading: ofrenda por el pecado
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda expiatoria
  rationale: La expresión española principal conserva la lectura cultual más reconocible y no cierra la ambigüedad del hebreo, que también puede apuntar a purificación. La nota preserva esa tensión interpretativa.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se incorporó la revisión auditada para עַל mediante 'además de', más conciso y formal que 'en adición a'. La formulación española conserva el orden sacrificial del hebreo y evita una paráfrasis más libre.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma del nombre divino, en coherencia con el estándar del proyecto.
  - '''Holocausto continuo'' conserva la terminología cultual y refleja תָּמִיד sin imponer ''diario'' en el texto principal.'
  - La nota de חַטָּאת queda anclada correctamente en la palabra 'macho cabrío[a]' para evitar marcadores huérfanos.
  - Se usa 'libación' para נִסְכּוֹ por precisión técnica y consistencia con español bíblico culto.
