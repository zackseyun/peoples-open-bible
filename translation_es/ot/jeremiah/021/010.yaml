translation:
  language: es
  text: Porque he puesto mi rostro contra esta ciudad para mal[a] y no para bien, declara Yahvé. Será entregada en manos del rey de Babilonia[b], y él la quemará con fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para desastre» o, más literalmente, «para mal». El hebreo רָעָה aquí se refiere a calamidad o juicio dañino, no a mal moral cometido por Dios.
    reason: lexical_alternative
  - marker: b
    text: Hebreo, más literalmente, «en la mano del rey de Babilonia», un modismo que significa bajo su poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׂמְתִּי פָנַי
  english_pob_choice: I have set my face against
  chosen_spanish: he puesto mi rostro contra
  alternatives_spanish:
  - he vuelto mi rostro contra
  - he fijado mi rostro contra
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y comunica determinación hostil. En español, «poner mi rostro contra» conserva la imagen original sin sonar completamente ajeno; «contra» expresa la oposición implícita en el contexto.
- source_word: בָּעִיר הַזֹּאת
  english_pob_choice: against this city
  chosen_spanish: contra esta ciudad
  alternatives_spanish:
  - sobre esta ciudad
  - hacia esta ciudad
  lexicon: HALOT
  rationale: Con el modismo de ‘poner el rostro’, el sentido resultante es de oposición dirigida a la ciudad. «Esta ciudad» refleja el demostrativo hebreo con naturalidad.
- source_word: לְרָעָה
  english_pob_choice: for harm
  chosen_spanish: para mal
  alternatives_spanish:
  - para desastre
  - para maldad
  lexicon: HALOT
  rationale: רָעָה aquí señala calamidad o daño judicial, no mal moral en Dios. «Para mal» es breve y natural en español bíblico, y conserva la antítesis con «para bien».
- source_word: וְלֹא לְטוֹבָה
  english_pob_choice: and not for good
  chosen_spanish: y no para bien
  alternatives_spanish:
  - y no para bienestar
  - y no para bendición
  lexicon: HALOT
  rationale: La oposición es directa y tajante. «Para bien» reproduce con claridad el contraste hebreo sin añadir matices no presentes en el texto.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» según la norma del proyecto, y la fórmula profética queda bien expresada con «declara», que conserva el tono solemne y auditable del hebreo.
- source_word: בְּיַד מֶלֶךְ בָּבֶל
  english_pob_choice: into the hand of the king of Babylon
  chosen_spanish: en mano del rey de Babilonia
  alternatives_spanish:
  - en poder del rey de Babilonia
  - a manos del rey de Babilonia
  lexicon: HALOT
  rationale: La imagen hebrea de «mano» es un modismo de dominio o poder. En español, «en mano de» mantiene la metáfora bíblica con buena inteligibilidad; la alternativa «en poder de» explicita el sentido idiomático.
- source_word: תִּנָּתֵן
  english_pob_choice: It will be given
  chosen_spanish: será entregada
  alternatives_spanish:
  - será dada
  - será puesta
  lexicon: HALOT
  rationale: El verbo pasivo expresa rendición o entrega a otro poder. «Será entregada» es más natural en español que un simple «será dada» y conserva la pasividad del hebreo.
- source_word: וּשְׂרָפָהּ
  english_pob_choice: and he will burn it
  chosen_spanish: y él la quemará
  alternatives_spanish:
  - y la quemará
  - y será quemada
  lexicon: HALOT
  rationale: La forma verbal es activa con sujeto masculino implícito y objeto femenino. «Él la quemará» refleja esa voz activa; el pronombre «la» conserva el referente femenino de la ciudad.
- source_word: בָּאֵשׁ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - en fuego
  - por fuego
  lexicon: HALOT
  rationale: El beth instrumental se expresa naturalmente en español con «con fuego», equivalente claro y idiomático.
theological_decisions:
- issue: Lenguaje de juicio en לְרָעָה
  english_pob_reading: for harm; not for evil in a moral sense
  chosen_spanish_reading: para mal, no en sentido de maldad moral
  alternative_spanish_readings:
  - para desastre
  - para calamidad
  rationale: El hebreo puede referirse a desastre o daño decretado. En español, «para mal» preserva el paralelismo con «para bien»; no se debe leer como si atribuyera maldad moral a Yahvé, sino juicio adverso sobre la ciudad.
  doctrine_reference: Transparencia lexical; evitar una lectura doctrinalmente indebida que el hebreo no exige.
- issue: Preservación del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El proyecto pide usar el transliterado «Yahvé» para יהוה. Se mantiene aquí para ser fiel al texto y a la terminología editorial del POB.
  doctrine_reference: Norma terminológica del proyecto para el Tetragrámaton.
- issue: Modismo de entrega en mano
  english_pob_reading: into the hand of the king of Babylon, an idiom meaning into his power
  chosen_spanish_reading: en mano del rey de Babilonia, es decir, bajo su poder
  alternative_spanish_readings:
  - en poder del rey de Babilonia
  - a manos del rey de Babilonia
  rationale: La metáfora hebrea de la mano como dominio se conserva, pero en español la expresión puede requerir esta aclaración conceptual para que no se entienda de manera meramente literal.
  doctrine_reference: Preservación de imagen bíblica con claridad semántica.
translation_notes:
  revision_awareness: 'No se registran revisiones aplicadas en el paquete fuente; la presente redacción sigue la lectura final aprobada del auditor inglés y mantiene sus dos notas léxicas principales: רָעָה como daño/calamidad y בְּיַד como modismo de poder.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - Se conserva el paralelismo «para mal / no para bien» sin suavizar la antítesis.
  - La voz activa «él la quemará» refleja el hebreo y evita ocultar el sujeto implícito.
  - Se usa «ciudad» en femenino con pronombres concordantes.
  - La imagen de «rostro» se conserva por su fuerza idiomática y porque el español la admite naturalmente en contexto bíblico.
