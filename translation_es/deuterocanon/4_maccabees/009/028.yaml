translation:
  language: es
  text: Arrastrándolo por los tendones[a] con sus manos de hierro, las bestias semejantes a leopardos[b] le arrancaron toda la carne, hasta la barba, y la piel de su cabeza[c]; pero, mientras soportaba con firmeza este dolor gravísimo[d], decía,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde los tendones». El griego ἀπὸ τῶν τενόντων señala el punto de inicio del desgarro y puede entenderse como la zona de donde se tira o como la zona desde la cual comienza la mutilación.
    reason: lexical_alternative
  - marker: b
    text: O «las bestias leopardinas» o «los leopardos». El griego es más literalmente «las bestias semejantes a leopardos», y deja abierta la cuestión de si el autor quiere describir el aspecto o identificar animales concretos.
    reason: lexical_alternative
  - marker: c
    text: O «la piel de la cabeza» o «el cuero cabelludo». El griego dice literalmente «la piel de la cabeza», expresión que conserva mejor la forma del original.
    reason: lexical_alternative
  - marker: d
    text: O «con constancia» o «con fortaleza». καρτερῶν denota un aguante perseverante; «soportaba con firmeza» intenta preservar ese matiz sin volverlo demasiado interpretativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ τῶν τενόντων
  english_pob_choice: from the tendons
  chosen_spanish: por los tendones
  alternatives_spanish:
  - desde los tendones
  - a partir de los tendones
  lexicon: LSJ
  rationale: τένων puede significar tendón o sinew; ἀπό marca el punto de inicio del desgarro. En español, «por los tendones» comunica que fue arrastrado tirando de esa zona anatómica sin volver la frase torpe.
- source_word: ταῖς σιδηραῖς χερσὶν
  english_pob_choice: with their iron hands
  chosen_spanish: con sus manos de hierro
  alternatives_spanish:
  - con garras de hierro
  - con sus garras de hierro
  lexicon: LSJ
  rationale: χείρ es literalmente «mano». Conservar «manos de hierro» mantiene la imagen literal del griego y evita sustituirla por «garras», que interpretaría más de lo que el texto dice.
- source_word: ἐπισπασάμενοι
  english_pob_choice: dragging him
  chosen_spanish: arrastrándolo
  alternatives_spanish:
  - tirando de él
  - jalándolo
  lexicon: LSJ
  rationale: El participio expresa el acto de tirar de alguien o arrastrarlo. «Arrastrándolo» encaja naturalmente con la escena y con el complemento «por los tendones».
- source_word: μέχρι γε τῶν γενείων
  english_pob_choice: even to his beard
  chosen_spanish: hasta la barba
  alternatives_spanish:
  - incluso hasta la barba
  - hasta el mentón
  lexicon: LSJ
  rationale: γενεῖον se refiere al área del mentón/barba. «Hasta la barba» comunica la extensión del desollamiento de manera idiomática en español y conserva el énfasis de γε.
- source_word: τὴν σάρκα πᾶσαν
  english_pob_choice: all his flesh
  chosen_spanish: toda la carne
  alternatives_spanish:
  - toda su carne
  - toda la carne de su cuerpo
  lexicon: LSJ
  rationale: σάρξ aquí es literal, no metafórico. «Toda la carne» conserva la crudeza anatómica del pasaje y el alcance total del daño.
- source_word: τὴν τῆς κεφαλῆς δορὰν
  english_pob_choice: the skin of his head
  chosen_spanish: la piel de la cabeza
  alternatives_spanish:
  - el cuero cabelludo
  - la piel de su cabeza
  lexicon: LSJ
  rationale: δορά significa piel o cuero. «La piel de la cabeza» sigue de cerca el griego; «cuero cabelludo» sería más específico, pero también más interpretativo.
- source_word: οἱ παρδάλιοι θῆρες
  english_pob_choice: the leopard-like beasts
  chosen_spanish: las bestias semejantes a leopardos
  alternatives_spanish:
  - las bestias leopardinas
  - los leopardos
  lexicon: LSJ
  rationale: παρδάλιος es adjetival, «leopardo-like». «Semejantes a leopardos» preserva la forma del griego mejor que reducirlo a «leopardos» y mantiene la flexibilidad sobre la identificación exacta de los animales.
- source_word: ἀπέσυραν
  english_pob_choice: stripped away
  chosen_spanish: arrancaron
  alternatives_spanish:
  - desgarraron
  - arrastraron
  lexicon: LSJ
  rationale: El verbo puede expresar retirar, arrancar o arrastrar fuera. En el contexto de carne y piel removidas, «arrancaron» transmite con fuerza el resultado violento.
- source_word: βαρέως τὴν ἀλγηδόνα
  english_pob_choice: this grievous pain
  chosen_spanish: este dolor gravísimo
  alternatives_spanish:
  - este dolor cruel
  - este intenso dolor
  lexicon: LSJ
  rationale: βαρέως modifica la manera en que soporta el dolor y puede sugerir peso/severidad. «Dolor gravísimo» mantiene la intensidad sin introducir una valoración ajena como «valientemente».
- source_word: καρτερῶν
  english_pob_choice: steadfastly enduring
  chosen_spanish: soportaba con firmeza
  alternatives_spanish:
  - perseveraba con firmeza
  - lo soportaba con constancia
  lexicon: LSJ
  rationale: καρτερέω expresa aguante constante y firme. «Soportaba con firmeza» reproduce bien la idea de resistencia perseverante antes de su discurso.
translation_notes:
  revision_awareness: He seguido la revisión más reciente del POB inglés, que ajusta ἀπὸ τῶν τενόντων ... ἐπισπασάμενοι hacia una formulación de arrastre más cercana al griego y prefiere una descripción formal de βαρέως ... καρτερῶν. También he respetado el desglose léxico que retiene la literalidad de «iron hands», la naturaleza adjetival de παρδάλιοι y la lectura anatómica de δορὰ.
  spanish_consistency_notes:
  - Usé «Dios»/«Yahvé» y otras terminologías estándar del proyecto solo cuando correspondía; este versículo no las requiere.
  - Mantengo un registro léxico consistente para σάρξ como «carne» en sentido físico, sin espiritualizarlo.
  - Conservo la imagen violenta y anatómica del original sin suavizarla ni reinterpretarla alegóricamente.
