revisions:
- from: 'Y ustedes me respondieron y dijeron[a]: «La cosa que has hablado es buena para hacer[b]».'
  to: 'Y ustedes me respondieron y dijeron: «Lo que has dicho es bueno para que lo hagamos[a]».'
  rationale: Se conserva la doble secuencia verbal del hebreo («respondieron y dijeron»), pero se reemplaza «la cosa» por «Lo que has dicho» para un español más natural y digno. También se ajusta «para hacer» a «para que lo hagamos» para reflejar con claridad la idea de poner en práctica la propuesta, en línea con la revisión del POB inglés. Se elimina la nota innecesaria sobre resumir los dos verbos y se mantiene una sola nota útil con la alternativa más literal/contextual.
