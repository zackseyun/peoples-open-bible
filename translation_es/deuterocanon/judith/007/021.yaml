translation:
  language: es
  text: Y los aljibes[a] se iban vaciando, y no tenían agua para beber hasta saciarse ni siquiera para un solo día, porque se les daba de beber por medida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Aljibes» traduce la idea de depósitos excavados para guardar agua; en este contexto es más preciso que «pozos» o «reservorios».
    reason: lexical_alternative
  - marker: b
    text: «Por medida» conserva el griego ἐν μέτρῳ, con la idea de ración limitada o distribución medida; también puede entenderse como «en cantidades medidas» o «racionadamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: λάκκοι
  english_pob_choice: cisterns
  chosen_spanish: aljibes
  alternatives_spanish:
  - cisternas
  - pozos
  - reservorios
  lexicon: LSJ
  rationale: En este contexto de sitio y almacenamiento de agua, λάκκοι no son simples hoyos, sino depósitos excavados. «Aljibes» comunica de forma natural en español la idea de depósitos de agua subterráneos o excavados, conservando la imagen concreta mejor que un término genérico como «pozos».
- source_word: ἐξεκενοῦντο
  english_pob_choice: were being emptied
  chosen_spanish: se iban vaciando
  alternatives_spanish:
  - eran vaciados
  - se vaciaban
  - iban quedando vacíos
  lexicon: LSJ
  rationale: El imperfecto expresa un proceso continuo. «Se iban vaciando» mantiene ese aspecto progresivo y resulta idiomático en español, sin forzar una interpretación más estática.
- source_word: οὐκ εἶχον πεῖν
  english_pob_choice: they did not have water to drink their fill
  chosen_spanish: no tenían agua para beber hasta saciarse
  alternatives_spanish:
  - no tenían agua para beber
  - no tenían suficiente agua para beber
  - no tenían con qué beber hasta hartarse
  lexicon: LSJ
  rationale: La construcción sugiere carencia de agua suficiente para beber. «Hasta saciarse» refleja bien la idea de πλησμονή, y «agua para beber» evita traducir el infinitivo de modo demasiado literal e incómodo en español.
- source_word: εἰς πλησμονὴν
  english_pob_choice: their fill
  chosen_spanish: hasta saciarse
  alternatives_spanish:
  - en abundancia
  - hasta la plenitud
  - suficientemente
  lexicon: LSJ
  rationale: El sentido literal es «hasta plenitud», es decir, suficiente cantidad. «Hasta saciarse» transmite la idea de beber plenamente sin añadir una interpretación extraña al español bíblico actual.
- source_word: ἡμέραν μίαν
  english_pob_choice: for even one day
  chosen_spanish: durante ni un solo día
  alternatives_spanish:
  - por un solo día
  - ni siquiera por un día
  - durante un solo día
  lexicon: LSJ
  rationale: La frase subraya la brevedad extrema del abastecimiento insuficiente. «Durante ni un solo día» reproduce ese énfasis de modo natural, sin depender de una partícula explícita equivalente a «even».
- source_word: ἐν μέτρῳ
  english_pob_choice: by measure
  chosen_spanish: por medida
  alternatives_spanish:
  - en medidas racionadas
  - con medida
  - de manera racionada
  lexicon: LSJ
  rationale: 'La expresión es concreta y literal: «por medida». Esto conserva la imagen de racionamiento sin convertirla en un comentario explicativo.'
- source_word: ἐδίδοσαν αὐτοῖς πεῖν
  english_pob_choice: it was given to them to drink
  chosen_spanish: se les daba de beber
  alternatives_spanish:
  - se les daba a beber
  - les daban de beber
  - se les proporcionaba bebida
  lexicon: LSJ
  rationale: El griego usa una construcción impersonal que no nombra al agente. «Se les daba de beber» preserva esa pasividad y suena natural en español. Se evita identificar indebidamente quién distribuía el agua.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «have enough water to drink» a «have water to drink their fill» para reflejar con mayor precisión εἰς πλησμονὴν. La traducción española sigue esa decisión y usa «hasta saciarse» para capturar el matiz de plenitud, manteniendo además el aspecto progresivo de los aljibes que se iban vaciando y la distribución del agua «por medida».
  spanish_consistency_notes:
  - Se mantuvo un estilo sobrio y publicable, evitando calcos innecesarios.
  - «Se les daba de beber» conserva la impersonalidad del griego y no introduce un agente inexistente en el texto.
  - La elección de «aljibes» sigue la línea léxica de la POB inglesa («cisterns») y preserva el contexto de sitio.
  - No se usó «SEÑOR» ni terminología teológica no pertinente, porque el versículo no contiene alusiones directas a nombres divinos.
