translation:
  language: es
  text: 'Hermón y todos los amigos[a] estaban mostrando las fieras y las fuerzas: «Están preparadas, oh rey, conforme a esa intención tuya».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Los amigos» puede referirse a asociados reales o cortesanos en un contexto de corte helenística.
    reason: cultural_note
lexical_decisions:
- source_word: ὑπεδείκνυεν
  english_pob_choice: was showing
  chosen_spanish: estaban mostrando
  alternatives_spanish:
  - estaba mostrando
  - iban mostrando
  - estaban indicando
  lexicon: LSJ
  rationale: El imperfecto griego expresa acción continua o en desarrollo; «estaban mostrando» conserva ese valor durativo y suena natural en español.
- source_word: ὁ Ἕρμων
  english_pob_choice: Hermon
  chosen_spanish: Hermón
  alternatives_spanish:
  - Hermon
  lexicon: convención de transliteración
  rationale: Se mantiene el nombre propio en forma española habitual con tilde prosódica para lectura fluida, sin cambiar la identidad del nombre griego.
- source_word: οἱ φίλοι
  english_pob_choice: the friends
  chosen_spanish: sus amigos
  alternatives_spanish:
  - los amigos
  - los compañeros
  - los cortesanos
  lexicon: LSJ
  rationale: El griego dice literalmente «los amigos». En la sintaxis española, «sus amigos» comunica con naturalidad la relación implícita con Hermón; no se adopta «cortesanos» porque esa precisión social no está marcada explícitamente en el griego.
- source_word: τὰ θηρία
  english_pob_choice: the beasts
  chosen_spanish: las bestias
  alternatives_spanish:
  - los animales
  - las fieras
  lexicon: LSJ
  rationale: «Bestias» preserva el tono ominoso del griego y encaja con el contexto de animales peligrosos o de ejecución; «animales» sería más neutro y perdería fuerza.
- source_word: τὰς δυνάμεις
  english_pob_choice: the forces
  chosen_spanish: las fuerzas
  alternatives_spanish:
  - las tropas
  - los contingentes
  - las huestes
  lexicon: LSJ
  rationale: δύναμις en plural puede referirse a fuerzas militares o poderío. «Las fuerzas» mantiene amplitud semántica y sigue de cerca el griego.
- source_word: Ἡτοίμασται
  english_pob_choice: They are prepared
  chosen_spanish: Están preparadas
  alternatives_spanish:
  - Han sido preparadas
  - Están listas
  - Ya están preparadas
  lexicon: LSJ
  rationale: El perfecto pasivo expresa un estado presente resultado de una preparación previa; «están preparadas» reproduce ese sentido y concuerda con los sustantivos plurales femeninos.
- source_word: βασιλεῦ
  english_pob_choice: O king
  chosen_spanish: oh rey
  alternatives_spanish:
  - rey
  - oh, rey
  - su majestad
  lexicon: LSJ
  rationale: El vocativo se conserva en un registro elevado y claro. «Oh rey» refleja la dirección directa sin introducir una equivalencia más interpretativa como «su majestad».
- source_word: κατὰ τὴν σὴν ἐκείνην πρόθεσιν
  english_pob_choice: according to that intention of yours
  chosen_spanish: conforme a esa intención tuya
  alternatives_spanish:
  - según ese plan tuyo
  - de acuerdo con ese propósito tuyo
  - conforme a tu anterior intención
  lexicon: LSJ
  rationale: πρόθεσις puede significar intención, propósito o plan. «Intención» conserva bien la voluntad previa del rey; «esa» reproduce el valor deíctico/retrospectivo de ἐκείνην, y «tuya» mantiene el matiz posesivo explícito.
translation_notes:
  revision_awareness: Se atendió la corrección previa del audio-trail inglés sobre el sujeto plural («Hermon and all his friends») y se evitó añadir notas no ancladas en el texto. También se priorizó una sintaxis española natural sin perder el imperfecto progresivo ni el matiz de estado resultante en el perfecto pasivo.
  spanish_consistency_notes:
  - Se usó «bestias» para τὰ θηρία y «fuerzas» para τὰς δυνάμεις, manteniendo la distinción del griego.
  - No se introdujeron notas al pie porque el objetivo era corregir el error de marcadores no anclados; toda información de matiz se incorporó en las decisiones léxicas.
  - La cita directa conserva el tono solemne del vocativo y del estado resultante («Están preparadas»).
