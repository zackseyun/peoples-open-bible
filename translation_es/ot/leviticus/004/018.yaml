review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: parte de la sangre se pone en los cuernos del altar delante de Yahvé, y toda la sangre se derrama en la base del altar del holocausto a la entrada de la tienda de reunión. Conserva correctamente «Yahvé», «cuernos del altar» y «tienda de reunión». Sin embargo, hay un problema de naturalidad/claridad sintáctica en español con el orden verbal («toda la sangre derramará») y conviene hacer explícito «algo de» en el texto principal, ya que el inglés auditado lo consideró necesario para expresar el valor partitivo de וּמִן הַדָּם en contraste con «toda la sangre».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero suena algo forzado en dos puntos: 1) «toda la sangre derramará» es poco natural en español moderno; 2) «Y de la sangre pondrá» es comprensible, pero menos claro que «Y pondrá algo de la sangre». Además, «al pie» es idiomático, aunque «en la base» se alinea mejor con יְסוֹד y con la precisión ritual del contexto.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה → «Yahvé» correctamente; אֹהֶל מוֹעֵד → «tienda de reunión» correctamente; קַרְנֹת הַמִּזְבֵּחַ → «cuernos del altar» correctamente. «Holocausto» para עֹלָה es aceptable en español bíblico. Se recomienda «base» en vez de «pie» para reflejar mejor יְסוֹד y seguir la decisión léxica auditada.'
  issues:
  - severity: medium
    issue: El valor partitivo inicial queda demasiado implícito en el texto principal.
    rationale: El hebreo וּמִן הַדָּם, junto con el contraste posterior «toda la sangre», comunica que solo una parte se pone sobre los cuernos. El audit trail inglés hizo explícito «some» por necesidad semántica; en español «algo de la sangre» mejora la fidelidad y la claridad.
  - severity: medium
    issue: 'Orden verbal poco natural: «y toda la sangre derramará».'
    rationale: Aunque intenta seguir el orden hebreo, en español moderno resulta rígido y menos legible. «Y derramará toda la sangre» preserva plenamente el sentido sin paráfrasis indebida.
  - severity: low
    issue: «Al pie» es menos preciso que «en la base» para יְסוֹד.
    rationale: «Al pie» es idiomático, pero «base» refleja con mayor exactitud la referencia estructural del altar en un contexto ritual técnico.
  revised_spanish_text: Y pondrá algo de la sangre[a] sobre los cuernos del altar que está delante de Yahvé, el cual está en la tienda de reunión; y derramará toda la sangre en la base del altar del holocausto, que está a la entrada de la tienda de reunión.
  revised_footnotes:
