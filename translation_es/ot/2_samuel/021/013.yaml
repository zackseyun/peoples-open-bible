  glossary_alignment: No hay conflicto con la terminología base del proyecto. Se mantiene la precisión de «huesos» y la fuerza de «empalados» para הַמּוּקָעִים. La revisión propuesta solo mejora la naturalidad verbal y corrige la nota léxica alternativa.
