translation:
  language: es
  text: Porque has sido mi ayuda, y en la sombra de tus alas canto con alegría[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grito de alegría». El verbo hebreo puede indicar tanto un clamor vibrante de gozo como un canto jubiloso.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduces la razón de la respuesta del salmista. «Porque» expresa bien la conexión causal en español natural sin añadir más matiz del que exige el hebreo.
- source_word: הָיִיתָ
  english_pob_choice: have been
  chosen_spanish: has sido
  alternatives_spanish:
  - fuiste
  - has estado
  lexicon: HALOT
  rationale: El perfecto hebreo señala una acción pasada con validez presente. «Has sido» conserva ese valor continuado mejor que un pretérito simple.
- source_word: עֶזְרָתָה לִּי
  english_pob_choice: my help
  chosen_spanish: mi ayuda
  alternatives_spanish:
  - ayuda para mí
  - una ayuda para mí
  lexicon: HALOT
  rationale: 'La relación personal expresada por el sustantivo con ל puede traducirse de forma idiomática como posesivo: «mi ayuda». «Ayuda» mantiene el sentido léxico directo del hebreo.'
- source_word: וּבְצֵל
  english_pob_choice: and in the shadow
  chosen_spanish: y en la sombra
  alternatives_spanish:
  - y bajo la sombra
  - y a la sombra
  lexicon: HALOT
  rationale: «Sombra» conserva la imagen bíblica de protección. «En» sigue de cerca la preposición ב, y en español suena natural en este paralelismo poético.
- source_word: כְּנָפֶיךָ
  english_pob_choice: your wings
  chosen_spanish: tus alas
  alternatives_spanish:
  - tus alas protectoras
  - tus plumas
  lexicon: HALOT
  rationale: En español, «alas» comunica la metáfora divina de cobertura con claridad y sin arcaísmo. Se mantiene la imagen concreta del original.
- source_word: אֲרַנֵּן
  english_pob_choice: I sing for joy / I shout for joy
  chosen_spanish: canto con alegría
  alternatives_spanish:
  - grito de alegría
  - canto con gozo
  lexicon: HALOT
  rationale: El verbo puede expresar canto jubiloso o un clamor gozoso. «Canto con alegría» preserva la dimensión vocal y la alegría sin obligar a elegir solo «cantar» o «gritar».
theological_decisions:
- issue: Metáfora de protección divina
  english_pob_reading: Retain the metaphor 'in the shadow of your wings' literally.
  chosen_spanish_reading: Mantener literalmente «en la sombra de tus alas».
  alternative_spanish_readings:
  - bajo tu protección
  - amparado por ti
  rationale: El hebreo usa una imagen concreta y poética. Conservarla en español respeta la textura literaria y evita reinterpretar la metáfora en términos explicativos.
  doctrine_reference: Principio de primacía del texto original; preservar la imaginería teológica sin resolverla interpretativamente.
translation_notes:
  revision_awareness: 'Coincide con el contexto auditado: la revisión más reciente no introdujo cambios y el consenso de revisión fue de alta concordancia. Se conserva la línea de traducción del inglés POB, pero se ajusta al español natural con el mismo alcance semántico.'
  spanish_consistency_notes:
  - Se conserva la metáfora corporal «alas» para כְּנָפֶיךָ, en vez de una explicación como «protección», siguiendo la elección del POB inglés.
  - «Ayuda» traduce el sustantivo hebreo de forma directa y mantiene el vínculo personal con el salmista.
  - La nota al pie distingue la ambigüedad verbal de אֲרַנֵּן sin imponer una sola opción en el texto principal.
  - Se usa «Porque» al inicio para reflejar la relación causal del verso con el contexto inmediato.
  - El tono es poético y reverente, pero en español moderno y plenamente publicable.
