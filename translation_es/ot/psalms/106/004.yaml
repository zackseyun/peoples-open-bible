translation:
  language: es
  text: Recuérdame[a], oh Yahvé, con favor hacia tu pueblo[b]; visítame con tu salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con el favor mostrado a tu pueblo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «visítame con tu salvación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זָכְרֵנִי
  english_pob_choice: Remember me
  chosen_spanish: Acuérdate de mí
  alternatives_spanish:
  - Recuérdame
  - Tenme presente
  lexicon: HALOT
  rationale: El verbo זכר en imperativo con sufijo de primera persona expresa una súplica directa para que Yahvé se acuerde del orante. «Acuérdate de mí» conserva el tono orante y natural del español, sin añadir matices que el hebreo no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el principio del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé» en vez de sustituirlo por un título. Esto preserva el nombre propio del pacto y mantiene la auditable distinción frente a «Señor».'
- source_word: בִּרְצוֹן עַמֶּךָ
  english_pob_choice: with favor toward your people
  chosen_spanish: con favor hacia tu pueblo
  alternatives_spanish:
  - con el favor mostrado a tu pueblo
  - cuando muestres favor a tu pueblo
  lexicon: HALOT
  rationale: רָצוֹן denota favor, aceptación o benevolencia. La preposición ב aquí se entiende de modo circunstancial/relacional, no como posesión del pueblo. «Con favor hacia tu pueblo» conserva la compactación del hebreo y el sentido de benevolencia divina hacia la comunidad.
- source_word: פָּקְדֵנִי
  english_pob_choice: visit me
  chosen_spanish: visítame
  alternatives_spanish:
  - atiéndeme
  - mira por mí
  - ocúpate de mí
  lexicon: HALOT
  rationale: פּקד en contextos de oración puede significar visitar en el sentido de intervenir, atender o actuar por alguien. «Visítame» mantiene la correspondencia lexical con el inglés POB y el valor bíblico de intervención divina, sin reducirse a un simple desplazamiento físico.
- source_word: בִּישׁוּעָתֶךָ
  english_pob_choice: with your salvation
  chosen_spanish: con tu salvación
  alternatives_spanish:
  - con tu liberación
  - con tu ayuda salvadora
  lexicon: HALOT
  rationale: יְשׁוּעָה se traduce por «salvación» para conservar su amplitud teológica. La preposición ב se refleja con «con», que en español funciona de manera natural para expresar acompañamiento o esfera de acción de la intervención salvadora.
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: La decisión teológica y traductológica es mantener el nombre revelado de Dios, no una sustitución reverencial. «Yahvé» preserva la identidad pactual del texto y coincide con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de בִּרְצוֹן עַמֶּךָ
  english_pob_reading: 'temporal/circumstantial: ''with favor toward your people'''
  chosen_spanish_reading: 'circunstancial/relacional: ''con favor hacia tu pueblo'''
  alternative_spanish_readings:
  - cuando muestres favor a tu pueblo
  - con el favor mostrado a tu pueblo
  rationale: Se conserva la tensión entre una lectura más literal y una lectura más clara en español. El hebreo es compacto; la elección evita convertir la frase en una paráfrasis demasiado libre, pero también evita que «con el favor de tu pueblo» sugiera erróneamente el favor del pueblo hacia Yahvé.
  doctrine_reference: 'DOCTRINE.md: lexical-theological ambiguity in prepositional phrases'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último estado del auditor inglés: se conserva «visit me» para פּקדני y se evita expandir בִּרְצוֹן עַמֶּךָ en una paráfrasis temporal como «cuando muestres favor», que fue descartada en la revisión posterior por alejarse del hebreo compacto.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, según la terminología base del proyecto.
  - «Salvación» se mantiene para יְשׁוּעָה; no se reduce a «liberación» salvo necesidad contextual clara.
  - «Visítame» conserva la forma bíblica de intervención divina y evita neutralizar פקד con un verbo demasiado general.
  - El español evita calco rígido en la primera cláusula, pero conserva la estructura de petición paralela del hebreo.
