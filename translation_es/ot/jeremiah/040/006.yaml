translation:
  language: es
  text: Entonces Jeremías fue a Guedalías, hijo de Ajicam, en Mizpa[a], y vivió con él entre el pueblo que quedó en la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que permaneció»; literalmente, «los que quedaron/permanecieron en la tierra».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - fue y llegó
  lexicon: HALOT
  rationale: En español, con Jeremías como sujeto y un destino narrativo claro, «fue» comunica el movimiento de manera natural sin forzar un calco deíctico. «Vino» también sería posible, pero suele depender más del punto de vista del destinatario; aquí «fue» sigue mejor el flujo narrativo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición direccional hebrea se expresa de forma natural con «a» en español.
- source_word: גְּדַלְיָה בֶן אֲחִיקָם
  english_pob_choice: Gedaliah son of Ahikam
  chosen_spanish: Guedalías, hijo de Ajicam
  alternatives_spanish:
  - Gedalías, hijo de Ahicam
  - Guedalías, hijo de Ahicam
  lexicon: HALOT
  rationale: Se conserva la transliteración de nombres propios según la práctica del proyecto. «Hijo de» mantiene la construcción patronímica hebrea de manera transparente.
- source_word: הַמִּצְפָּתָה
  english_pob_choice: at Mizpah
  chosen_spanish: en Mizpa
  alternatives_spanish:
  - a Mizpa
  - en Mispá
  lexicon: HALOT
  rationale: El inglés opta por una lectura locativa idiomática. En español, «en Mizpa» es la forma más natural y preserva el valor locativo del lugar mencionado en el contexto inmediato.
- source_word: וַיֵּשֶׁב
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - se quedó
  - moró
  lexicon: HALOT
  rationale: El verbo ישב en contexto de asentamiento expresa residencia continuada. «Habitó» es elevado pero natural en español bíblico y conserva la idea de permanencia mejor que «se quedó».
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  lexicon: HALOT
  rationale: Equivalente directo y natural del comitativo hebreo.
- source_word: בְּתוֹךְ
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  lexicon: HALOT
  rationale: «Entre» transmite bien la relación social de inserción en un grupo. «En medio de» sería más literal, pero menos fluido.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  lexicon: HALOT
  rationale: Aunque «people» en inglés puede ser «la gente», aquí el sustantivo colectivo hebreo se entiende mejor como «el pueblo» en estilo bíblico español, manteniendo la referencia corporativa.
- source_word: הַנִּשְׁאָרִים
  english_pob_choice: who were left
  chosen_spanish: que había quedado
  alternatives_spanish:
  - que quedaron
  - los que habían quedado
  lexicon: HALOT
  rationale: El participio niphal describe a los sobrevivientes/restantes sin convertirlos en el sustantivo técnico «remanente». «Que había quedado» reproduce la función descriptiva y evita cargar el texto con un término teológico no explícito.
- source_word: בָּאָרֶץ
  english_pob_choice: in the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en el país
  - en la tierra de Judá
  lexicon: HALOT
  rationale: «La tierra» es una traducción bíblica directa y amplia del hebreo, manteniendo la ambigüedad contextual sin sobreespecificar. En español, «tierra» suena más natural que «país» para este registro.
theological_decisions:
- issue: Si הַנִּשְׁאָרִים debe convertirse en «remanente»
  english_pob_reading: who were left
  chosen_spanish_reading: que había quedado
  alternative_spanish_readings:
  - el remanente
  - los que quedaron
  - los sobrevivientes
  rationale: El texto hebreo usa una descripción participial, no un sustantivo técnico. Mantener una formulación descriptiva preserva la tensión literaria y evita importar una categoría teológica más específica de la que el versículo expresa.
  doctrine_reference: Preservar la distinción entre descripción textual y término teológico técnico; no resolver la lectura hacia una doctrina implícita no explícita.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hubo cambios sustantivos en la base inglesa; se mantuvieron las decisiones de lectura locativa, de residencia y de evitación de «remanente» como término técnico.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - 'Se conserva una transliteración consistente de nombres propios: Guedalías, Ajicam, Mizpa.'
  - «La tierra» mantiene la ambigüedad del hebreo sin añadir «de Judá», coherente con la base inglesa.
  - «Habitó» sigue el valor durativo de ישב en un contexto de asentamiento, en línea con la decisión inglesa de «lived».
