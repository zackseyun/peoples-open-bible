translation:
  language: es
  text: Porque por todas estas cosas bendice a tu Hacedor[a], que te llena de su bondad. Quien busca la ley[b] obtendrá favor, pero el hipócrita[c] será atrapado por ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El testimonio hebreo de este versículo difiere mucho del griego, que dice: «Porque el Señor es el que retribuye, y te retribuirá siete veces».'
    reason: textual_variant
  - marker: b
    text: El hebreo de la segunda línea es difícil. «La ley» refleja una lectura contextual del texto transmitido; alternativamente, la frase puede referirse de manera más general a buscar a Dios o su instrucción.
    reason: alternative_reading
  - marker: c
    text: La palabra traducida «hipócrita» es incierta; posibles sentidos incluyen «jactancioso» o «persona autoengañada».
    reason: lexical_alternative
lexical_decisions:
- source_word: ברך
  english_pob_choice: bless
  chosen_spanish: bendice
  alternatives_spanish:
  - alaba
  lexicon: HALOT
  rationale: En este contexto sapiencial, el imperativo pide responder a Dios con palabra reverente. «Bendice» conserva el registro bíblico y la construcción directa mejor que «alaba», que suena más general.
- source_word: עושך
  english_pob_choice: your Maker
  chosen_spanish: tu Hacedor
  alternatives_spanish:
  - tu Creador
  - el que te hizo
  lexicon: HALOT
  rationale: El participio indica ‘el que te hizo’. «Hacedor» es breve, natural en español bíblico y mantiene la relación personal marcada por el sufijo.
- source_word: המרוך מטובתו
  english_pob_choice: who fills you with his goodness
  chosen_spanish: que te llena de su bondad
  alternatives_spanish:
  - que te colma de su bondad
  - que te llena con su bondad
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que prefirió «fills» por mayor cercanía léxica al hebreo y la adapto de modo natural en español. «Bondad» conserva el matiz de beneficencia divina sin sobrerrepresentar el término.
- source_word: דורש
  english_pob_choice: he who seeks
  chosen_spanish: Quien busca
  alternatives_spanish:
  - El que busca
  - Quien inquiere
  lexicon: HALOT
  rationale: El participio expresa una búsqueda activa. «Quien busca» es claro, idiomático y fiel a la forma breve del hebreo.
- source_word: אל
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - Dios
  - la instrucción divina
  lexicon: HALOT
  rationale: 'Sigo la lectura contextual adoptada por el inglés: en la línea transmitida, אל se entiende mejor como la ley/instrucción divina. «La ley» mantiene la coherencia de la cláusula y la ambigüedad se preserva en nota.'
- source_word: יקוה רצון
  english_pob_choice: will obtain favor
  chosen_spanish: obtendrá favor
  alternatives_spanish:
  - esperará favor
  - recibirá favor
  lexicon: HALOT
  rationale: El hebreo puede sugerir ‘esperar favor’, pero en español el resultado idiomático se expresa mejor como consecuencia lograda. «Obtendrá favor» conserva el sentido prospectivo sin volver la frase pesada.
- source_word: ומתלהלה
  english_pob_choice: the hypocrite
  chosen_spanish: el hipócrita
  alternatives_spanish:
  - el jactancioso
  - el autoengañado
  - el burlador
  lexicon: HALOT
  rationale: La forma es difícil y posiblemente corrupta o rara. En la antítesis sapiencial, «hipócrita» captura mejor la duplicidad moral y religiosa que el contexto contrasta con quien busca la ley.
- source_word: יוקש בו
  english_pob_choice: will be caught by it
  chosen_spanish: será atrapado por ella
  alternatives_spanish:
  - será enredado por ella
  - caerá en sus redes
  lexicon: HALOT
  rationale: El verbo implica ser ensnared/caught. «Será atrapado por ella» es claro y mantiene la referencia al antecedente inmediato («la ley»).
theological_decisions:
- issue: Divergencia textual entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the extant Hebrew as the primary witness, while preserving the Greek as a materially different textual tradition in a footnote.
  chosen_spanish_reading: Traducir el hebreo transmitido como texto principal y señalar que el griego dice otra cosa sustancialmente distinta.
  alternative_spanish_readings:
  - «Porque el Señor es el que retribuye, y te retribuirá siete veces».
  - «Porque Yahvé es quien paga, y te pagará siete veces».
  rationale: La política del proyecto da primacía al hebreo donde sobrevive. Aquí la discrepancia con el griego es grande y afecta el contenido, por lo que la traducción principal sigue el hebreo y la variante griega se conserva explícitamente en nota para no ocultar la tensión textual.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde sobreviva; usar el paralelo griego como control real y preservar honestamente la incertidumbre.'
translation_notes:
  revision_awareness: He seguido la revisión más reciente del inglés POB, que prefirió «fills you with his goodness» sobre «satisfies you with his goodness», y he reflejado esa cercanía léxica en español con «te llena de su bondad». También he mantenido la decisión principal de traducir el hebreo transmitido, dejando constancia de la discrepancia con el griego en la nota textual.
  spanish_consistency_notes:
  - Uso «Yahvé» solo cuando aparezca el nombre divino explícito; aquí el hebreo y el griego de la tradición citada no obligan a introducirlo en el texto principal.
  - He mantenido «ley» para la lectura contextual de אל, en continuidad con la auditoría inglesa, pero la nota deja abierta la posibilidad de una referencia más general a la instrucción divina.
  - «Hacedor» se usa como equivalente bíblico natural de «Maker» y armoniza con el registro sapiencial del pasaje.
  - «Hipócrita» conserva la fuerza moral de la antítesis, aunque la nota reconoce la incertidumbre léxica del término hebreo.
