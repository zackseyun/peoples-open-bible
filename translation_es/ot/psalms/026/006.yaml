translation:
  language: es
  text: Lavo mis manos en inocencia[a], y rodeo tu altar, oh Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en pureza» o «en limpieza»; el término hebreo puede designar tanto inocencia moral como limpieza ritual.
    reason: lexical_alternative
  - marker: b
    text: O «y camino alrededor de tu altar».
    reason: alternative_reading
lexical_decisions:
- source_word: אֶרְחַץ
  english_pob_choice: I wash
  chosen_spanish: Lavo
  alternatives_spanish:
  - Lavaré
  - Yo lavo
  - Lavo limpiamente
  lexicon: HALOT
  rationale: El imperfecto hebreo en poesía puede expresar acción actual o habitual; en español, el presente simple comunica mejor la acción confesional del salmista sin volverla más futura de lo necesario. 'Lavo' mantiene naturalidad y cercanía al inglés POB 'I wash'.
- source_word: בְּנִקָּיוֹן
  english_pob_choice: in innocence
  chosen_spanish: en inocencia
  alternatives_spanish:
  - en pureza
  - en limpieza
  - con inocencia
  lexicon: HALOT
  rationale: נִקָּיוֹן puede abarcar limpieza/pureza/innocencia. Aquí el contexto favorece una cualidad moral además de ritual, y 'inocencia' preserva esa fuerza ética en español sin reducirla solo a lo ceremonial.
- source_word: כַּפַּי
  english_pob_choice: my hands
  chosen_spanish: mis manos
  alternatives_spanish:
  - mis palmas
  lexicon: HALOT
  rationale: La forma dual/plural apunta literalmente a las palmas/manos. En español, 'mis manos' es la equivalencia idiomática más clara y fiel, como en la opción inglesa del POB.
- source_word: וַאֲסֹבְבָה
  english_pob_choice: I go around
  chosen_spanish: doy vueltas alrededor
  alternatives_spanish:
  - giro alrededor
  - rodeo
  - voy alrededor
  lexicon: HALOT
  rationale: El verbo סבב significa rodear o dar vueltas alrededor. 'Doy vueltas alrededor' conserva la imagen concreta del movimiento en torno al altar y es suficientemente natural en español. 'Rodeo' sería más breve, pero puede sonar más abstracto; aquí se prefiere la vividez poética.
- source_word: מִזְבַּחֲךָ
  english_pob_choice: your altar
  chosen_spanish: tu altar
  alternatives_spanish:
  - tu altar sacrificial
  lexicon: HALOT
  rationale: מִזְבֵּחַ se traduce de manera directa por 'altar'; el sufijo de segunda persona singular se conserva como 'tu' para mantener la relación personal con Yahvé.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - oh Yahweh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino como 'Yahvé', según la convención del proyecto para יְהוָה, en lugar de sustituirlo por un título. El vocativo 'oh' hace natural el llamado en español poético sin alterar el referente.
theological_decisions:
- issue: Valor moral y ritual de נִקָּיוֹן
  english_pob_reading: Or 'in purity' or 'in cleanness'; the Hebrew term can denote both moral innocence and ritual cleanness.
  chosen_spanish_reading: '''en inocencia'' mantiene el matiz moral y deja abierta la limpieza ritual implícita.'
  alternative_spanish_readings:
  - en pureza
  - en limpieza
  - con inocencia
  rationale: 'El hebreo admite una tensión semántica entre inocencia moral y pureza/limpieza ritual. La traducción elegida no elimina esa tensión: la hace recaer en ''inocencia'', con una nota que preserva las alternativas reconocidas por el POB inglés.'
  doctrine_reference: Lexical ambiguity in HALOT; purity/innocence semantic range
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: oh Yahvé
  alternative_spanish_readings:
  - oh Yahweh
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la doctrina del proyecto, se translitera como 'Yahvé' y no se sustituye por 'SEÑOR'. El vocativo mantiene la lectura devocional y poética.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete fuente y el audit trail inglés, sin depender mecánicamente del inglés: se conservan la acción presente del verbo, la ambigüedad semántica de נִקָּיוֹן y la transliteración del nombre divino como Yahvé. No se requieren correcciones derivadas de revisiones tardías; el pasaje muestra alto acuerdo en el control cruzado.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה de forma consistente con la política del proyecto.
  - Se prefiere presente simple ('Lavo', 'doy vueltas') para reflejar el valor poético del imperfecto hebreo.
  - '''Inocencia'' se toma como término de mayor carga moral, con nota para no perder el posible matiz ritual.'
  - '''Tu altar'' mantiene la segunda persona singular del hebreo.'
