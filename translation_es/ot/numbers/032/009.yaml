base_translation:
  language: en
  yaml_path: translation/ot/numbers/032/009.yaml
  text: They went up as far as the Valley of Eshcol and saw the land[c][b][a], and they discouraged the heart of the sons of Israel from going into the land that Yahweh had given them.
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew reads 'the sons of Israel,' a standard covenantal/national designation.
    reason: lexical_alternative
  - marker: b
    text: Or 'they disheartened' or 'they caused the heart of the sons of Israel to turn away.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: lexical_alternative
