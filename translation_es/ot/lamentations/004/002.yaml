  to: Los preciosos hijos de Sion, que valen su peso en oro fino[a]—¡cómo son tenidos por vasijas de barro[b], obra de manos de un alfarero!
  rationale: Se revisa para alinear mejor el español con la decisión final del expediente inglés sobre הַמְסֻלָּאִים בַּפָּז, recuperando la imagen concreta de alto valor con 'que valen su peso en oro fino'. También se mejora la naturalidad poética de נֶחְשְׁבוּ con 'son tenidos por' en lugar de 'han sido tenidos por'. El resto del verso ya era fiel y claro.
