translation:
  language: es
  text: Pero no solo eso; más bien, por la noble bondad[a] de sus hijos y por su obediencia a la ley[b], el cariño maternal que les tenía fue aún mayor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «virtud» para «noble bondad» (καλοκἀγαθίαν), si se desea resaltar más directamente la excelencia moral y la nobleza de carácter.
    reason: lexical_alternative
  - marker: b
    text: Es decir, obediencia a la ley ancestral judía.
    reason: cultural_note
lexical_decisions:
- source_word: οὐ μὴν δέ, ἀλλὰ καὶ
  english_pob_choice: But not only that; rather, because
  chosen_spanish: Pero no solo eso; más bien, debido a
  alternatives_spanish:
  - Y no solo eso; sino también, debido a
  - Pero no solo eso; al contrario, debido a
  lexicon: LSJ
  rationale: 'La secuencia griega introduce un giro fuerte: no se limita al punto anterior, sino que añade otra razón. En español, «más bien» conserva el contraste retórico y «debido a» expresa la relación causal con naturalidad sin suavizarla demasiado.'
- source_word: καλοκἀγαθίαν
  english_pob_choice: noble goodness
  chosen_spanish: noble bondad
  alternatives_spanish:
  - virtud
  - nobleza
  - excelencia moral
  lexicon: LSJ
  rationale: El compuesto une nobleza de carácter y bondad moral. «Noble bondad» mantiene ambas ideas de forma clara y digna en español, sin reducir el término a una sola cualidad.
- source_word: τῶν υἱῶν
  english_pob_choice: her sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos, los varones
  - sus hijos, sus hijos varones
  lexicon: LSJ
  rationale: El griego dice literalmente «de los hijos» en masculino, pero en el contexto inmediato se trata de la madre y sus siete hijos; «sus hijos» resulta natural y conserva la referencia familiar, aunque «hijos varones» también sería posible si se quisiera explicitar el sexo.
- source_word: εὐπείθειαν
  english_pob_choice: obedience
  chosen_spanish: obediencia
  alternatives_spanish:
  - docilidad
  - sumisión obediente
  - disposición a obedecer
  lexicon: LSJ
  rationale: El término denota obediencia voluntaria o dócil. «Obediencia» es la opción más clara y directa en español, especialmente con la frase siguiente «a la ley».
- source_word: νόμον
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la ley ancestral
  - la ley de sus padres
  lexicon: LSJ
  rationale: En 4 Macabeos el referente es la ley judía ancestral/Torá. «La ley» mantiene legibilidad y, en este contexto, sigue señalando esa ley específica sin necesitar una expansión interpretativa en el texto principal.
- source_word: μείζω
  english_pob_choice: even greater
  chosen_spanish: aún mayor
  alternatives_spanish:
  - mayor todavía
  - más grande
  - todavía más grande
  lexicon: LSJ
  rationale: El comparativo intensifica el efecto previo. «Aún mayor» reproduce bien ese aumento enfático en un español fluido y sobrio.
- source_word: φιλοστοργίαν
  english_pob_choice: motherly affection
  chosen_spanish: cariño maternal
  alternatives_spanish:
  - afecto maternal
  - amor de madre
  - ternura maternal
  lexicon: LSJ
  rationale: El término expresa un afecto familiar profundo y natural. Como el sujeto es la madre, «cariño maternal» comunica de forma idiomática esa relación afectiva, sin perder el matiz de ternura familiar.
- source_word: ἐν αὐτοῖς ἔσχεν
  english_pob_choice: for them was
  chosen_spanish: que les tenía
  alternatives_spanish:
  - que tenía por ellos
  - hacia ellos sintió
  - que guardaba hacia ellos
  lexicon: LSJ
  rationale: La construcción indica que ella poseía ese afecto en relación con ellos. «Que les tenía» es una forma española natural que conserva el sentido relacional sin forzar la sintaxis.
theological_decisions:
- issue: Referencia de «la ley»
  english_pob_reading: the Jewish law/Torah is intended
  chosen_spanish_reading: la ley judía ancestral / Torá está implícita
  alternative_spanish_readings:
  - ley en sentido moral general
  - norma religiosa genérica
  rationale: En 4 Macabeos la fidelidad de los mártires se define por la adhesión a la ley ancestral de Israel. Por eso, aunque el texto principal diga simplemente «la ley», el sentido teológico subyacente es la Torá y no una moral abstracta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Referencia de «hijos» en masculino
  english_pob_reading: sons
  chosen_spanish_reading: hijos (varones)
  alternative_spanish_readings:
  - niños
  - descendencia
  rationale: El griego usa υἱῶν, término específicamente masculino, y el contexto narra a la madre con sus siete hijos. Mantener «hijos» respeta el dato del original sin introducir neutralización innecesaria.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El borrador coincide con el sentido del griego y con la decisión auditada en inglés. Se conservó el giro retórico fuerte de οὐ μὴν δέ, ἀλλὰ καὶ, el valor intensificador de μείζω y la referencia concreta de νόμον al marco de la Torá. No se observaron revisiones aplicadas en el contexto fuente.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se prefirió «cariño maternal» para φιλστοργία, coherente con el sujeto femenino explícito en el contexto.
  - «La ley» se conservó en minúscula en el texto principal por fluidez, con aclaración contextual en nota.
  - La puntuación y el registro buscan una lectura pública, sobria y eclesialmente legible en español latinoamericano.
