translation:
  language: es
  text: 'el día en que estuviste de pie delante de Yahvé tu Dios en Horeb, cuando Yahvé me dijo: «Reúne al pueblo ante mí, y les haré oír mis palabras, para que aprendan a temerme todos los días que vivan sobre la tierra[a], y para que enseñen a sus hijos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la tierra». El hebreo אֲדָמָה puede referirse a la tierra en sentido general o a la tierra como territorio en un sentido más específico.
    reason: lexical_alternative
lexical_decisions:
- source_word: י֗וֹם אֲשֶׁר
  english_pob_choice: the day when
  chosen_spanish: el día en que
  alternatives_spanish:
  - el día cuando
  - cuando
  lexicon: HALOT
  rationale: La construcción temporal hebrea se conserva naturalmente con «el día en que», que mantiene el valor retrospectivo y la referencia a un evento específico.
- source_word: עָמַדְתָּ לִפְנֵי
  english_pob_choice: you stood before
  chosen_spanish: estuviste de pie delante de
  alternatives_spanish:
  - estabas de pie delante de
  - estuviste delante de
  lexicon: HALOT
  rationale: «Estuviste de pie» conserva la imagen concreta del verbo hebreo y el carácter solemne de presentarse ante Dios; «delante de» expresa bien לִפְנֵי.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: transliterar el nombre divino como «Yahvé», preservando el nombre propio del pacto en vez de ocultarlo con un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios del pacto
  - tu Dios
  lexicon: HALOT
  rationale: La relación posesiva directa del hebreo se expresa con claridad y sin añadir matices no presentes en el texto.
- source_word: בְּחֹרֵב
  english_pob_choice: at Horeb
  chosen_spanish: en Horeb
  alternatives_spanish:
  - en el Horeb
  - junto a Horeb
  lexicon: HALOT
  rationale: Con nombres de lugar, «en Horeb» es natural en español y mantiene el valor locativo del hebreo; el inglés POB usa «at Horeb», pero en español la preposición más idiomática aquí es «en».
- source_word: בֶּאֱמֹר
  english_pob_choice: when ... said
  chosen_spanish: cuando ... me dijo
  alternatives_spanish:
  - al decir ...
  - cuando habló
  lexicon: HALOT
  rationale: El infinitivo con preposición marca contemporaneidad; «cuando ... me dijo» es idiomático y conserva la relación temporal del discurso divino.
- source_word: הַקְהֶל לִי אֶת־הָעָם
  english_pob_choice: Assemble the people to me
  chosen_spanish: Reúneme al pueblo
  alternatives_spanish:
  - Asémblame al pueblo
  - Congrega al pueblo para mí
  lexicon: HALOT
  rationale: «Reúne» comunica bien el imperativo causativo de קהל en español y evita un calco rígido; «al pueblo» refleja el objeto directo colectivo.
- source_word: וְאַשְׁמִעֵם
  english_pob_choice: and I will let them hear
  chosen_spanish: y les haré oír
  alternatives_spanish:
  - y les dejaré oír
  - y los haré escuchar
  lexicon: HALOT
  rationale: 'Se conserva el causativo de שמע con una formulación natural en español: «haré oír». Mantiene la acción divina de hacer que el pueblo perciba la palabra.'
- source_word: דְּבָרָי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis palabras
  - mis dichos
  lexicon: HALOT
  rationale: «Palabras» retiene el plural hebreo y el carácter concreto de los dichos divinos, en línea con la decisión auditada del POB.
- source_word: אֲשֶׁר יִלְמְדוּן לְיִרְאָה אֹתִי
  english_pob_choice: so that they may learn to fear me
  chosen_spanish: para que aprendan a temerme
  alternatives_spanish:
  - para que aprendan a reverenciarme
  - para que aprendan a tenerme temor
  lexicon: HALOT
  rationale: «Temerme» preserva la fuerza teológica de ירא en contexto de pacto; evita suavizarlo con «reverenciarme», que perdería la tensión de temor reverente y obediencia.
- source_word: כָּל הַיָּמִים אֲשֶׁר הֵם חַיִּים
  english_pob_choice: all the days that they live
  chosen_spanish: todos los días que vivan
  alternatives_spanish:
  - todos los días que estén vivos
  - todos sus días
  lexicon: HALOT
  rationale: 'La perífrasis de subjuntivo futura/indefinida en español expresa bien la duración prolongada del hebreo: una vida entera sin forzar una literalidad extraña.'
- source_word: עַל הָאֲדָמָה
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre el suelo
  lexicon: HALOT
  rationale: «Sobre la tierra» mantiene la amplitud semántica de אֲדָמָה y sigue la decisión auditada de no restringir prematuramente el término a «la tierra» como territorio particular.
- source_word: וְאֶת בְּנֵיהֶם יְלַמֵּדוּן
  english_pob_choice: and that they may teach their children
  chosen_spanish: y para que enseñen a sus hijos
  alternatives_spanish:
  - y para que enseñen a sus niños
  - y para que enseñen a sus descendientes
  lexicon: HALOT
  rationale: «Hijos» es el equivalente más natural para בנים en este contexto familiar, y conserva la referencia generacional del mandato.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el nombre propio del pacto; la política del proyecto pide no sustituirlo por un título. «Yahvé» mantiene la referencia al nombre revelado en Horeb/Sinaí y es el equivalente estándar del proyecto en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de ירא en contexto de pacto
  english_pob_reading: fear me
  chosen_spanish_reading: temerme
  alternative_spanish_readings:
  - reverenciarme
  - tenerme reverencia
  rationale: En Deuteronomio, el verbo conserva peso de temor, reverencia y obediencia. «Temerme» preserva esa tensión mejor que suavizarlo a «reverenciarme».
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
- issue: Sentido de בנים
  english_pob_reading: children
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos e hijas
  - descendientes
  rationale: Aunque la forma hebrea es masculina, aquí funciona colectivamente para la descendencia familiar. «Hijos» comunica de manera natural la referencia generacional sin introducir una expansión no marcada en el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto base y el audit trail inglés muestran acuerdo alto y no requieren cambios sustantivos; la única adaptación principal al español fue elegir preposiciones y giros idiomáticos naturales («en Horeb», «estuvo de pie delante de», «haré oír») sin alterar las decisiones léxicas y teológicas ya auditadas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma del nombre divino, conforme al estándar del proyecto.
  - Se preservó el paralelismo de los propósitos con «para que... y para que...».
  - Se evitó sustituir «temerme» por un término suavizado para no borrar la fuerza covenantal del hebreo.
  - La nota de pie de página se ancló solo en «tierra» para reflejar la alternativa lexical documentada en אֲדָמָה.
