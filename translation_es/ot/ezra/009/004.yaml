translation:
  language: es
  text: Entonces se reunieron conmigo todos los que temblaban ante las palabras del Dios de Israel, a causa de la infidelidad de los exiliados[a]; y yo me quedé sentado, consternado, hasta la ofrenda de la tarde[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «a causa de la transgresión de la comunidad del exilio». El hebreo מַעַל puede expresar una ruptura de fidelidad o un traspaso culpable.'
    reason: lexical_alternative
  - marker: b
    text: «Ofrenda de la tarde» traduce minḥah; a menudo designa específicamente la ofrenda vegetal, aunque aquí funciona como la hora señalada del servicio regular del templo.
    reason: cultural_note
lexical_decisions:
- source_word: יֵאָסְפוּ
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - fueron reunidos
  lexicon: HALOT
  rationale: El nifal de אסף expresa un reunirse de personas en torno a Esdras. «Se reunieron» suena natural en español y conserva el sentido colectivo sin forzar una pasiva innecesaria.
- source_word: כֹּל חָרֵד
  english_pob_choice: everyone who trembled
  chosen_spanish: todos los que temblaban
  alternatives_spanish:
  - todo el que temblaba
  - los que temblaban
  lexicon: HALOT
  rationale: La construcción colectiva se expresa bien con «todos los que». «Temblaban» conserva el temor reverente del hebreo חרד y evita suavizarlo a simple respeto.
- source_word: בְּדִבְרֵי אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: at the words of the God of Israel
  chosen_spanish: ante las palabras del Dios de Israel
  alternatives_spanish:
  - a las palabras del Dios de Israel
  - por las palabras del Dios de Israel
  lexicon: HALOT
  rationale: «Ante» comunica mejor en español la reacción reverente y temblorosa provocada por las palabras. Se conserva «palabras» en plural, como en el hebreo, y se mantiene «Dios de Israel» sin neutralizar la referencia divina.
- source_word: עַל מַעַל הַגּוֹלָה
  english_pob_choice: because of the unfaithfulness of the exiles
  chosen_spanish: a causa de la infidelidad de los exiliados
  alternatives_spanish:
  - a causa de la traición de los exiliados
  - por el pecado de los exiliados
  - a causa de la transgresión de la comunidad del exilio
  lexicon: HALOT
  rationale: מַעַל tiene el peso de una ruptura de fidelidad, no solo una falta genérica. «Infidelidad» mantiene ese tono pactual en un español claro. «Exiliados» traduce de forma breve y personal הַגּוֹלָה, como en la auditoría inglesa.
- source_word: יֹשֵׁב מְשׁוֹמֵם
  english_pob_choice: sat appalled
  chosen_spanish: me quedé sentado, consternado
  alternatives_spanish:
  - estuve sentado, desolado
  - me mantuve sentado, atónito
  - seguí sentado, espantado
  lexicon: HALOT
  rationale: El participio junto con el verbo de postura indica permanencia. «Me quedé sentado» preserva la postura continua, y «consternado» transmite la conmoción desolada sin sonar arcaico.
- source_word: עַד לְמִנְחַת הָעָרֶב
  english_pob_choice: until the evening offering
  chosen_spanish: hasta la ofrenda de la tarde
  alternatives_spanish:
  - hasta la ofrenda vespertina
  - hasta la ofrenda de la tarde al anochecer
  - hasta el sacrificio de la tarde
  lexicon: HALOT
  rationale: מִנְחָה puede referirse al momento del servicio de la tarde y, según contexto, a la ofrenda misma. «Ofrenda de la tarde» conserva la referencia cultual sin estrecharla indebidamente a «sacrificio».
theological_decisions:
- issue: Valor covenantal de מַעַל
  english_pob_reading: unfaithfulness
  chosen_spanish_reading: infidelidad
  alternative_spanish_readings:
  - infidelidad pactual
  - transgresión
  - traición
  rationale: El término describe una ruptura de lealtad ante Dios, no solo una infracción legal. «Infidelidad» comunica bien esa tensión pactual en español contemporáneo sin perder gravedad.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Referencia comunitaria de הַגּוֹלָה
  english_pob_reading: the exiles
  chosen_spanish_reading: los exiliados
  alternative_spanish_readings:
  - la comunidad del exilio
  - los desterrados
  - los del cautiverio
  rationale: «Los exiliados» mantiene la referencia a las personas del grupo y evita abstraer el término como condición. Es cercano a la opción inglesa y funciona con claridad en español.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El contexto inglés muestra alta concordancia y sin revisiones aplicadas; la presente redacción sigue de cerca la lectura auditada, conservando la tensión léxica de מַעַל y el valor cultual de מִנְחָה sin añadir explicaciones ajenas al verso.
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהֵי y se mantiene «Dios de Israel» sin sustituirlo por un equivalente litúrgico.
  - Se conserva la distinción entre la reacción emocional («temblaban», «consternado») y la causa moral («infidelidad»).
  - «Ofrenda de la tarde» se eligió para no borrar la ambigüedad cultual del hebreo ni imponer una sola subcategoría ritual.
