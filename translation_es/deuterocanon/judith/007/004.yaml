revisions:
- from: 'Pero los hijos de Israel, al ver su gran número, se turbaron mucho, y cada uno dijo a su vecino: «Ahora estos hombres lamerán[a] toda la superficie de la tierra[b], y ni las altas montañas ni los barrancos ni las colinas soportarán su peso».'
  to: 'Pero los hijos de Israel, al ver su gran número, se turbaron mucho, y cada uno dijo a su vecino: «Ahora estos hombres lamerán[a] toda la faz de la tierra[b], y ni las altas montañas ni los barrancos ni las colinas soportarán su peso».'
  rationale: La revisión corrige la nota léxica para que no contradiga el texto principal y restituye en español la imaginería del modismo «faz de la tierra», en línea con la decisión documentada del POB de conservar tanto «lick up» como «face of the land» en el texto principal y explicar su sentido en notas.
