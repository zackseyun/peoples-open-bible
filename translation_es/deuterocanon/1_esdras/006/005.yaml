translation:
  language: es
  text: Y los ancianos de los judíos hallaron favor de parte de Yahvé,[a] habiendo sido puestos sobre el cautiverio para ejercer supervisión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del Señor». El griego dice παρὰ τοῦ κυρίου, literalmente «de parte del Señor» o «del Señor», indicando que el favor procede de Dios. Se usa «Yahvé» en español conforme a la norma terminológica del proyecto para la referencia divina.
    reason: theological_note
lexical_decisions:
- source_word: ἔσχον χάριν
  english_pob_choice: found favor
  chosen_spanish: hallaron favor
  alternatives_spanish:
  - recibieron favor
  - obtuvieron favor
  - hallaron gracia
  lexicon: BDAG
  rationale: La expresión idiomática griega ἔσχον χάριν se rinde naturalmente como un hallazgo de favor. «Hallaron favor» conserva el matiz de aprobación concedida sin convertir χάρις en «gracia» de modo abstracto en este contexto narrativo.
- source_word: ἐπισκοπῆς
  english_pob_choice: for oversight
  chosen_spanish: para ejercer supervisión
  alternatives_spanish:
  - para supervisión
  - para vigilancia
  - para visitar
  lexicon: LSJ
  rationale: ἐπισκοπή puede significar supervisión, vigilancia o visita. Aquí la frase apunta a una función de gobierno o cuidado administrativo; «para ejercer supervisión» comunica esa función sin perder el sustantivo de base.
- source_word: γενόμενοι ἐπὶ τὴν αἰχμαλωσίαν
  english_pob_choice: having been appointed over the captivity
  chosen_spanish: habiendo sido puestos sobre el cautiverio
  alternatives_spanish:
  - habiendo sido nombrados sobre los exiliados
  - habiendo sido puestos sobre los exiliados
  - habiendo llegado a estar sobre el cautiverio
  lexicon: LSJ
  rationale: γενόμενοι con ἐπὶ + acusativo puede indicar entrar en una posición o cargo sobre algo. Se conserva la dureza del giro con «habiendo sido puestos sobre», y αἰχμαλωσία se vierte como «cautiverio» para mantener la referencia literal del griego.
- source_word: παρὰ τοῦ κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - de parte de Yahvé
  - de parte del Señor
  - por Yahvé
  lexicon: BDAG
  rationale: Aunque el audit trail inglés usa «Lord» para κύριος, el proyecto español prescribe Yahvé para el nombre divino cuando el griego alude al nombre sagrado. Aquí la idea es que el favor procede de Dios; «ante Yahvé» expresa relación con la fuente divina, aunque es menos literal que «de parte de Yahvé». Se conserva la tensión entre fuente y presencia en nota.
- source_word: οἱ πρεσβύτεροι τῶν Ἰουδαίων
  english_pob_choice: the elders of the Jews
  chosen_spanish: los ancianos de los judíos
  alternatives_spanish:
  - los ancianos judíos
  - los ancianos de Judea
  - los jefes de los judíos
  lexicon: BDAG
  rationale: Ἰουδαῖοι aquí es etnorreligioso; «los judíos» sigue de cerca la estructura griega. «Ancianos» mantiene πρεσβύτεροι sin sustituirlo por una formulación eclesiástica no presente en el texto.
theological_decisions:
- issue: Renderización de κύριος en un contexto que alude al Dios de Israel
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Aunque el audit trail inglés conserva «Lord» por norma de su edición, el español de este proyecto usa Yahvé cuando κύριος funciona como referente del nombre divino. El giro «ante Yahvé» intenta preservar la referencia teológica a la fuente del favor sin ocultarla tras una máscara convencional.
  doctrine_reference: 'Project terminology default: יהוה / YHWH -> Yahvé'
- issue: Valor semántico de αἰχμαλωσία
  english_pob_reading: captivity
  chosen_spanish_reading: cautiverio
  alternative_spanish_readings:
  - exilio
  - los exiliados
  - captividad
  rationale: El griego puede referirse al estado de cautiverio o al grupo cautivo. Se conserva «cautiverio» para respetar la forma nominal del original y no resolver de más la ambigüedad, ya que el audit trail inglés también la mantiene.
  doctrine_reference: 'Translation philosophy: preserve source ambiguity rather than over-resolve'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión del inglés audit trail: la cláusula de γενόμενοι ἐπὶ τὴν αἰχμαλωσίαν no debe sonar como llegada física, sino como una posición asumida o conferida sobre la comunidad cautiva. Por eso se eligió «habiendo sido puestos sobre el cautiverio para ejercer supervisión», que conserva tanto la idea de encargo como la de vigilancia/administración.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar español del proyecto para el nombre divino.
  - Se mantuvo «ancianos» para πρεσβύτεροι y no «presbíteros», porque el contexto es civil/comunitario, no eclesiástico.
  - «Cautiverio» conserva la ambigüedad del griego αἰχμαλωσία entre estado y grupo cautivo.
  - Se evitó «gracia» para χάριν, porque en este contexto narrativo el matiz es de favor concedido.
