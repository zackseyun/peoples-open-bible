review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del hebreo: transición restrictiva, fecha calendárica, título festivo, convocatoria sagrada, autoaflicción y presentación de una ofrenda a Yahvé. También respeta la política del proyecto al usar «Yahvé». Sin embargo, dos elecciones principales no preservan bien la combinación de sentido fuente y español natural: «en el día diez» suena torpe frente al hebreo temporal idiomático, y «se afligirán a ustedes mismos» sobrerrepresenta el reflexivo con una construcción poco natural en español. Además, «ofrenda encendida» no refleja tan bien como «ofrenda de alimento»/«ofrenda por fuego» la decisión léxica documentada para אִשֶּׁה.'
  spanish_quality_summary: La redacción es comprensible pero algo rígida y calca innecesariamente el inglés/hebreo en varios puntos. «El día diez» es mucho más natural que «en el día diez», y «se afligirán» comunica mejor el mandato sin el redundante «a ustedes mismos». «Santa convocación» es aceptable y de registro bíblico digno. Conviene mejorar la nota de b para español más limpio, y la de c debe alinearse con el texto principal revisado.
  glossary_alignment: 'Buen alineamiento en «Yahvé» y en mantener «convocación». El título «Día de la Expiación» es aceptable dado el rastro POB y la nota sobre el plural hebreo. La mayor desviación está en אִשֶּׁה: el inglés auditado eligió «food offering», y el español «ofrenda encendida» se inclina en cambio hacia la alternativa tradicional «offering by fire». Para reflejar mejor la decisión documentada y mantener español claro, conviene «ofrenda de alimento» con nota para la opción tradicional.'
  issues:
  - severity: medium
    issue: «en el día diez» es una formulación poco natural en español
    rationale: Aunque intenta reflejar el hebreo, en español bíblico natural y fiel basta «el día diez» o «el décimo día». La preposición «en» aquí suena forzada.
  - severity: medium
    issue: «se afligirán a ustedes mismos» es un calco innecesario y poco idiomático
    rationale: El hebreo usa un modismo con נַפְשֹׁתֵיכֶם, pero en español «se afligirán» ya expresa correctamente el mandato sin introducir una frase pesada. La nota puede preservar alternativas como «se humillarán» o «se negarán a sí mismos».
  - severity: medium
    issue: «ofrenda encendida» no sigue bien la decisión léxica auditada para אִשֶּׁה
    rationale: El rastro inglés principal eligió «food offering», dejando «offering by fire» como alternativa en nota. «Ofrenda encendida» no corresponde claramente a ninguna de las dos y puede sonar imprecisa. «Ofrenda de alimento» refleja mejor la decisión principal, con nota para «ofrenda por fuego».
  - severity: low
    issue: La nota b tiene comillas y redacción poco pulidas
    rationale: 'Debe normalizarse a español editorial claro: «También puede traducirse: “se humillarán” o “se negarán a sí mismos”».'
