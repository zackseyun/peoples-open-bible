translation:
  language: es
  text: La suerte para el oriente cayó sobre Selemías. Luego echaron suertes por su hijo Zacarías, un consejero con discernimiento[a], y su suerte salió para el norte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un consejero sabio». La expresión hebrea lo describe literalmente como «un consejero con discernimiento/prudencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֹּל הַגּוֹרָל
  english_pob_choice: The lot ... fell
  chosen_spanish: la suerte ... cayó
  alternatives_spanish:
  - la suerte ... recayó
  - la suerte ... fue asignada
  lexicon: HALOT
  rationale: El hebreo usa el giro idiomático de caer con גורל; en español, «cayó» preserva la imagen concreta y funciona de modo natural en un contexto de reparto por suertes.
- source_word: מִזְרָחָה
  english_pob_choice: for the east
  chosen_spanish: para el oriente
  alternatives_spanish:
  - hacia el oriente
  - al oriente
  lexicon: HALOT
  rationale: La marca direccional se conserva con «para», que en este reparto expresa la asignación de una dirección o posición. «Oriente» es una forma clara y digna en español bíblico.
- source_word: לְשֶׁלֶמְיָהוּ
  english_pob_choice: to Shelemyahu
  chosen_spanish: para Selemías
  alternatives_spanish:
  - a Selemías
  - para Shelemyahu
  lexicon: HALOT
  rationale: El lamed indica destinatario/porción asignada; «para» comunica bien esa distribución. El nombre se adapta a una forma española reconocible, manteniendo la transliteración bíblica sin forzar una forma tradicional no atestiguada en el texto de trabajo.
- source_word: וּזְכַרְיָהוּ בְנוֹ
  english_pob_choice: his son Zekaryahu
  chosen_spanish: su hijo Zacarías
  alternatives_spanish:
  - Zacarías, su hijo
  - Zekaryahu, su hijo
  lexicon: HALOT
  rationale: Se preserva la relación filial de manera directa y natural en español. «Zacarías» es la forma española habitual del nombre, adecuada para lectura eclesial sin alterar el referente.
- source_word: יוֹעֵץ בְּשֶׂכֶל
  english_pob_choice: a counselor with insight
  chosen_spanish: un consejero con discernimiento
  alternatives_spanish:
  - un consejero con prudencia
  - un consejero entendido
  lexicon: HALOT
  rationale: יוֹעֵץ conserva la idea de consejero; בְּשֶׂכֶל apunta a inteligencia prudente/insight. «Discernimiento» mantiene la fuerza cognitiva y prudencial mejor que un adjetivo meramente moral.
- source_word: הִפִּילוּ גּוֹרָלוֹת
  english_pob_choice: they cast lots
  chosen_spanish: echaron suertes
  alternatives_spanish:
  - tiraron suertes
  - sacaron suertes
  lexicon: HALOT
  rationale: La expresión española estable y bíblica para הִפִּילוּ גּוֹרָלוֹת es «echar suertes». Conserva el acto ritual sin explicar de más.
- source_word: וַיֵּצֵא גוֹרָלוֹ
  english_pob_choice: and his lot came out
  chosen_spanish: y su suerte salió
  alternatives_spanish:
  - y su suerte salió asignada
  - y le tocó la suerte
  lexicon: HALOT
  rationale: Se mantiene la diferencia entre el primer giro idiomático («cayó») y el resultado final («salió»). «Su suerte salió» reproduce bien el hebreo y su valor de resultado emergente.
- source_word: צָפוֹנָה
  english_pob_choice: for the north
  chosen_spanish: para el norte
  alternatives_spanish:
  - hacia el norte
  - al norte
  lexicon: HALOT
  rationale: Se conserva la misma lógica direccional que en «para el oriente», dejando claro que se trata de una asignación por dirección.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo y el audit trail inglés: se preservó el doble uso idiomático de גורל con verbos distintos («cayó» / «salió»), la secuencia narrativa de los lotes, y la nota lexical sobre יוֹעֵץ בְּשֶׂכֶל. No se requieren revisiones adicionales respecto del contexto auditado.'
  spanish_consistency_notes:
  - Se usó «oriente» y «norte» de forma paralela para mantener la estructura direccional.
  - Se eligió «suerte» para גורל por naturalidad bíblica en español, sin perder el sentido de reparto por lotes.
  - Se mantuvo la transliteración española estándar de nombres bíblicos cuando ayuda a la lectura pública.
