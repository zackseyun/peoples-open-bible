translation:
  language: es
  text: Yahvé está cerca de los quebrantados de corazón, y salva a los quebrantados en espíritu[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los contritos en espíritu». El hebreo puede describir a quienes están interiormente aplastados o humillados.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרוֹב
  english_pob_choice: near
  chosen_spanish: está cerca
  alternatives_spanish:
  - está próximo
  - está cercano
  lexicon: HALOT
  rationale: El adjetivo predicativo expresa cercanía; en español, «está cerca» suena natural y conserva tanto la proximidad espacial como la relacional en este contexto poético.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el Nombre divino directamente. En el estándar del proyecto, se vierte como «Yahvé» para preservar el nombre personal del pacto, no un título sustitutivo.
- source_word: לְנִשְׁבְּרֵי לֵב
  english_pob_choice: to the brokenhearted
  chosen_spanish: a los quebrantados de corazón
  alternatives_spanish:
  - a los de corazón quebrantado
  - a los que tienen el corazón roto
  lexicon: HALOT
  rationale: La expresión hebrea habla de personas con el corazón quebrantado o roto. «Quebrantados de corazón» mantiene la metáfora y funciona de manera idiomática en español bíblico contemporáneo.
- source_word: דַּכְּאֵי רוּחַ
  english_pob_choice: those crushed in spirit
  chosen_spanish: los que tienen el espíritu aplastado
  alternatives_spanish:
  - los contritos de espíritu
  - los quebrantados de espíritu
  - los oprimidos en espíritu
  lexicon: HALOT
  rationale: דכא comunica la idea de estar aplastado, abatido o deshecho. Elegí «espíritu aplastado» para conservar la fuerza imagética sin convertirlo de entrada en un término específicamente penitencial como «contritos».
- source_word: יוֹשִׁיעַ
  english_pob_choice: he saves
  chosen_spanish: salva
  alternatives_spanish:
  - rescata
  - libra
  lexicon: HALOT
  rationale: El verbo en hifil de ישׁע puede significar salvar, librar o rescatar. «Salva» conserva el vínculo léxico con el campo bíblico de la salvación y encaja bien con la poesía del versículo.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El texto hebreo presenta el Tetragrámaton, y el proyecto lo representa como «Yahvé» para mantener visible el Nombre del pacto. No se usa una sustitución como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Tensión entre aflicción e implicación moral en דַּכְּאֵי רוּחַ
  english_pob_reading: those crushed in spirit
  chosen_spanish_reading: los que tienen el espíritu aplastado
  alternative_spanish_readings:
  - los contritos de espíritu
  - los quebrantados de espíritu
  rationale: La evidencia léxica favorece la idea de personas interiormente aplastadas o abatidas. En español, «aplastado» preserva esa intensidad y deja abierta la posible lectura de humildad o contrición sin imponerla.
  doctrine_reference: DOCTRINE.md §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y el último pase revisado, que no introdujo cambios. La redacción española mantiene el paralelo poético, el Nombre divino como Yahvé y la ambigüedad de דַּכְּאֵי רוּחַ sin resolverla de forma excesiva.
  spanish_consistency_notes:
  - Se conserva la distinción entre «corazón» y «espíritu» para reflejar los dos hemistiquios del hebreo.
  - «Yahvé» se mantiene de forma consistente con la terminología del proyecto para יְהוָה.
  - «Quebrantados de corazón» y «espíritu aplastado» conservan el tono poético sin caer en una traducción demasiado literal o rígida.
