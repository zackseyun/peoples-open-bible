translation:
  language: es
  text: No permitas que el oprimido[a] vuelva avergonzado[b]; que el pobre y el necesitado alaben tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el aplastado» o «el abatido» para «el oprimido».
    reason: lexical_alternative
  - marker: b
    text: O «deshonrado» para «avergonzado». El hebreo también puede incluir la idea de humillación pública.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַ֨ל / אַל
  english_pob_choice: Do not let
  chosen_spanish: No permitas que
  alternatives_spanish:
  - No dejes que
  - Que no
  lexicon: HALOT
  rationale: La partícula negativa con valor de súplica/prohibición en oración se expresa naturalmente en español con una construcción exhortativa negativa. «No permitas que» conserva el tono petitionario del hebreo sin sonar rígido.
- source_word: יָשֹׁב
  english_pob_choice: let ... turn back
  chosen_spanish: vuelva
  alternatives_spanish:
  - regrese
  - retroceda
  - se vuelva atrás
  lexicon: HALOT
  rationale: El verbo שוב comunica volver o regresar; en este contexto, «vuelva» mantiene la idea de retorno y funciona bien con la imagen de salir en vergüenza o sin rescate.
- source_word: דַּךְ
  english_pob_choice: the oppressed
  chosen_spanish: el oprimido
  alternatives_spanish:
  - el aplastado
  - el abatido
  - el pisoteado
  lexicon: HALOT
  rationale: POB opta por «the oppressed» para captar el peso social y experiencial del término. «El oprimido» es la equivalencia española más natural y transparente; «el aplastado» sería más literal pero menos idiomático.
- source_word: נִכְלָם
  english_pob_choice: ashamed
  chosen_spanish: avergonzado
  alternatives_spanish:
  - avergonzado públicamente
  - humillado
  - deshonrado
  lexicon: HALOT
  rationale: El participio indica ser puesto en vergüenza o humillación. «Avergonzado» comunica bien el estado resultante; en español también puede incluir la idea de humillación pública, aunque no se explicita en el texto principal.
- source_word: עָנִי
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el afligido
  - el humilde
  lexicon: HALOT
  rationale: Aquí el paralelo con אֶבְיוֹן favorece el sentido socioeconómico. «El pobre» conserva la pareja tradicional sin perder claridad.
- source_word: אֶבְיוֹן
  english_pob_choice: needy
  chosen_spanish: el necesitado
  alternatives_spanish:
  - el menesteroso
  - el indigente
  - el desposeído
  lexicon: HALOT
  rationale: «Necesitado» distingue este término de עָנִי y reproduce bien la pareja «pobre y necesitado» en español bíblico natural.
- source_word: יְהַלְל֥וּ
  english_pob_choice: let ... praise
  chosen_spanish: alaben
  alternatives_spanish:
  - que alaben
  - ensalcen
  lexicon: HALOT
  rationale: El imperfecto yusivo plural se vierte con un subjuntivo exhortativo en español. «Alaben» preserva el valor voluntativo y la paralelismo con la primera mitad del versículo.
- source_word: שְׁמֶךָ
  english_pob_choice: your name
  chosen_spanish: tu nombre
  alternatives_spanish:
  - tu fama
  - tu reputación
  lexicon: HALOT
  rationale: Se mantiene la expresión bíblica directa «tu nombre», que en español conserva tanto la referencia a Dios como la carga teológica del idioma hebreo.
theological_decisions:
- issue: Destino del oprimido y función de la vergüenza
  english_pob_reading: The prayer asks that the oppressed not return ashamed, but rather that the poor and needy praise God's name.
  chosen_spanish_reading: La oración pide que el oprimido no vuelva humillado/avergonzado, sino que el pobre y el necesitado alaben el nombre de Dios.
  alternative_spanish_readings:
  - que el oprimido no retroceda avergonzado
  - que el oprimido no regrese humillado
  rationale: 'El hebreo sostiene una súplica en dos miembros: evitar el retorno en vergüenza y promover la alabanza divina. La traducción conserva esa tensión sin convertirla en una afirmación causal más fuerte de lo que el texto dice.'
  doctrine_reference: Preservar la tensión del texto en vez de resolverla interpretativamente.
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre el texto fuente, la traducción auditada en inglés y la revisión posterior; no se registran cambios sustanciales en la última pasada.
  spanish_consistency_notes:
  - Se mantuvo «tu nombre» para שֵׁם en continuidad con la terminología bíblica del proyecto.
  - «Oprimido» se eligió para דַּךְ por claridad natural en español, sin perder la fuerza de opresión/crushing documentada en la nota auditada.
  - Se conservó la pareja «pobre y necesitado» para reflejar el paralelismo hebreo y la distinción semántica entre עָנִי y אֶבְיוֹן.
