review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del decreto y la mayor parte del sentido griego: prohibición de acceso para los no sacrificantes, sometimiento de los judíos a inscripción estatal y condición esclava, y pena de muerte para los que resistan. Sin embargo, hay pequeños desajustes con la auditoría inglesa: el anclaje de la nota [a] no corresponde bien a la ambigüedad de τὰ ἱερά, ''registro'' queda algo escueto frente al matiz de enrolamiento/inscripción, y ''privados de la vida'' preserva el modismo pero resulta menos claro que la decisión inglesa final ''put to death''.'
  spanish_quality_summary: El español es generalmente natural y digno. No obstante, puede mejorarse la claridad jurídica y la fluidez con 'inscripción' en vez de 'registro', y 'condenados a muerte' o 'muertos' sería demasiado interpretativo, mientras que 'ejecutados' introduciría precisión no explicitada. La mejor reparación mínima es mantener la solemnidad y hacer más transparente el final con 'muertos' no es ideal; por eso conviene 'privados de la vida' solo si se acompaña de una nota. También conviene mover la nota de τὰ ἱερά al sintagma relevante.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección 'esclavitud' concuerda con la preferencia por conservar la fuerza de slave/slavery. No aparecen términos como Yahvé, Mesías o δοῦλος fuera de este contexto. La decisión sobre οἰκετικὴν διάθεσιν está bien encaminada, aunque 'estado de esclavitud' se ajusta un poco mejor al valor de 'status' que el abstracto 'esclavitud'.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en 'nadie' en vez de en 'santuarios', que es donde recae la ambigüedad de τὰ ἱερά.
    rationale: Las notas deben anclarse en la palabra o frase relevante del texto. Aquí la alternativa léxica afecta 'sus santuarios', no 'nadie'.
  - severity: medium
    issue: '''Registro'' suena algo administrativo pero menos idiomático que ''inscripción'' para λαογραφία en esta construcción.'
    rationale: La auditoría inglesa entiende enrolamiento/registro estatal. En español bíblico claro, 'inscripción' comunica mejor la idea de ser inscritos o censados sin sonar truncado.
  - severity: low
    issue: '''Esclavitud'' comunica bien la dureza, pero ''estado de esclavitud'' refleja mejor el matiz de condición/status de οἰκετικὴν διάθεσιν.'
    rationale: El griego apunta a una condición impuesta más que al sistema abstracto de esclavitud en general.
  - severity: medium
    issue: La cláusula final 'privados de la vida' es fiel al modismo, pero menos clara que la decisión inglesa final orientada a una lectura directa de pena capital.
    rationale: El texto español principal debe ser claro. Puede conservarse la literalidad idiomática en nota y usar una formulación más transparente en el cuerpo.
  revised_spanish_text: Que nadie que no sacrifica entre en sus santuarios[a], sino que todos los judíos sean sometidos a inscripción[b] y a estado de esclavitud, y que los que se opongan sean llevados por la fuerza y muertos[c].
