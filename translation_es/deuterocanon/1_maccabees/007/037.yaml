    issue: La frase principal usa «fuera invocado sobre ella» en vez de reflejar la opción priorizada por el POB auditado.
    rationale: El inglés base escogió «for your name to be called upon it» y dejó «invoked over it» como alternativa en nota. En español, el texto principal debería preservar esa prioridad semántica para mantener la fórmula bíblica de pertenencia/consagración del templo bajo el nombre divino.
  - severity: low
    issue: La nota al pie repite como alternativa la misma formulación del texto principal actual.
    rationale: Si se revisa el texto principal a «para que tu nombre fuera llamado sobre ella», la nota puede conservar de manera más útil las alternativas «para llevar tu nombre» y «para que tu nombre fuera invocado sobre ella».
