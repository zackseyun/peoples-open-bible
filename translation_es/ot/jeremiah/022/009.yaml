translation:
  language: es
  text: 'Y dirán[a]: «Porque abandonaron el pacto de Yahvé su Dios y se inclinaron[b] ante otros dioses y les sirvieron».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dejaron» o «desampararon» por «abandonaron».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «se inclinaron» o «se postraron» ante otros dioses; los dos verbos juntos describen adoración idólatra.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמְרוּ
  english_pob_choice: And they will say
  chosen_spanish: Y ellos dirán
  alternatives_spanish:
  - Entonces dirán
  - Y dirán
  lexicon: HALOT
  rationale: El imperfecto con waw consecutiva mantiene el valor narrativo-futuro del reporte; «dirán» suena natural en español y conserva la progresión del contexto. Se explicita «ellos» para claridad sin alterar el sentido.
- source_word: עַל אֲשֶׁר
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Por cuanto
  - Debido a que
  lexicon: HALOT
  rationale: La construcción introduce la causa del juicio; «porque» reproduce bien la fuerza causal en español sin sobrecargar la frase.
- source_word: עָזְבוּ
  english_pob_choice: they abandoned
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - forsook
  lexicon: HALOT
  rationale: «Abandonaron» comunica la infidelidad de pacto que el inglés POB quiso conservar con «abandoned», y evita un arcaísmo innecesario.
- source_word: בְּרִית
  english_pob_choice: the covenant
  chosen_spanish: el pacto
  alternatives_spanish:
  - la alianza
  - el convenio
  lexicon: HALOT
  rationale: En este contexto la relación de Yahvé con su pueblo puede expresarse como «pacto»; en español es la opción más transparente y bíblicamente clara. «Alianza» también sería posible, pero «pacto» conserva mejor la referencia jurídico-relacional.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio proyectual para יְהוָה y en continuidad con la decisión inglesa de no sustituirlo por un título.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios
  - sus dioses
  lexicon: HALOT
  rationale: Aunque la forma hebrea es morfológicamente plural con sufijo, la referencia es al Dios único de Israel; «su Dios» preserva la fórmula de pacto sin crear pluralidad indebida.
- source_word: וַיִּשְׁתַּחֲווּ
  english_pob_choice: and bowed down
  chosen_spanish: se inclinaron
  alternatives_spanish:
  - se postraron
  - adoraron
  lexicon: HALOT
  rationale: El verbo expresa inclinación/prostración física; «se inclinaron» conserva el gesto y deja que el complemento idólatra y el verbo siguiente completen el sentido de adoración. «Se postraron» sería más fuerte, pero «se inclinaron» fluye mejor en español.
- source_word: לֵאלֹהִים אֲחֵרִים
  english_pob_choice: to other gods
  chosen_spanish: ante otros dioses
  alternatives_spanish:
  - a otros dioses
  - frente a otros dioses
  lexicon: HALOT
  rationale: Aunque el hebreo usa ל, en el contexto de השתחוה el sentido es hacia/ante el objeto de reverencia. «Ante otros dioses» evita confundir el movimiento con un mero destino espacial y marca el acto cultual.
- source_word: וַיַּעַבְדוּם
  english_pob_choice: and served them
  chosen_spanish: y les sirvieron
  alternatives_spanish:
  - y los sirvieron
  - y los adoraron
  lexicon: HALOT
  rationale: «Servir» mantiene la distinción lexical entre inclinarse y servir que el inglés POB preservó. El pronombre dativo «les» se adapta naturalmente a «otros dioses».
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - Jehová
  rationale: Se mantiene la transliteración del Nombre divino en vez de ocultarlo tras un título, siguiendo el criterio doctrinal del proyecto y la decisión auditada en inglés. «Yahvé» es la forma principal del proyecto en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Relación entre «se inclinaron» y «les sirvieron»
  english_pob_reading: bowed down to other gods and served them
  chosen_spanish_reading: se inclinaron ante otros dioses y les sirvieron
  alternative_spanish_readings:
  - adoraron a otros dioses y les sirvieron
  - se postraron ante otros dioses y les sirvieron
  rationale: Se conserva la tensión entre gesto corporal y servicio religioso. Traducir ambos verbos solo como «adoraron» borraría la distinción que el texto hebreo y el POB inglés mantienen. La formulación española deja ver que la idolatría incluye postura y servicio.
  doctrine_reference: Éxodo 20:5; Deuteronomio 4:19
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó una coma antes de «and bowed down» para hacer más fluida la frase sin alterar el sentido. En español se refleja la misma fluidez con una sola oración causal y la coordinación natural «y se inclinaron… y les sirvieron».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar para יְהוָה en español.
  - Se conserva la distinción verbal entre «se inclinaron» y «les sirvieron», evitando colapsar ambos verbos en «adoraron».
  - «Pacto» traduce בְּרִית con tono bíblico claro y uso eclesial amplio.
  - La puntuación española conserva la relación causal del hebreo y la comilla abierta/cerrada del discurso directo.
