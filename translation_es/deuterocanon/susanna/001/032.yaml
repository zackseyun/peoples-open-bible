translation:
  language: es
  text: Y los hombres sin ley ordenaron que ella fuera descubierta[a], para satisfacer su deseo por su hermosura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que quedaran llenos de deseo por su hermosura»; el griego habla literalmente de ser «llenados» en relación con su hermosura.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέταξαν
  english_pob_choice: ordered
  chosen_spanish: le ordenaron
  alternatives_spanish:
  - le mandaron
  - dieron orden de
  lexicon: BDAG
  rationale: El aoristo de προστάσσω expresa una orden con autoridad. «Le ordenaron» conserva esa fuerza en español sin sonar demasiado arcaico.
- source_word: οἱ παράνομοι
  english_pob_choice: the lawless men
  chosen_spanish: los hombres sin ley
  alternatives_spanish:
  - los hombres impíos
  - los transgresores
  - los malvados
  lexicon: LSJ
  rationale: παράνομοι tiene un matiz legal y moral. «Sin ley» mantiene ese campo semántico y evita suavizar la condena; se añade «hombres» por claridad, como en inglés.
- source_word: ἀποκαλύψαι αὐτήν
  english_pob_choice: her to be uncovered
  chosen_spanish: que fuera desnudada
  alternatives_spanish:
  - que la descubrieran
  - que fuera descubierta
  - que le quitaran el velo
  lexicon: BDAG
  rationale: ἀποκαλύπτω significa literalmente «descubrir/descubrir el cuerpo velado». En este contexto la referencia práctica es quitarle la cobertura delante de otros. «Desnudada» comunica la acción con naturalidad en español, aunque el griego no exige necesariamente desnudez total.
- source_word: ἵνα ἐμπλησθῶσιν
  english_pob_choice: so that they might satisfy
  chosen_spanish: para que se saciaran
  alternatives_spanish:
  - para que quedaran llenos
  - para que tuvieran su llenura
  - para satisfacer
  lexicon: BDAG
  rationale: ἐμπίμπλημι significa «llenar» y por extensión «satisfacer/saciar». «Se saciaran» preserva la imagen de llenura que el inglés POB anotó en la nota, y suena natural en español.
- source_word: τοῦ κάλλους
  english_pob_choice: her beauty
  chosen_spanish: de la hermosura de ella
  alternatives_spanish:
  - de su belleza
  - de su hermosura
  - de su atractivo
  lexicon: LSJ
  rationale: κάλλος denota belleza física o hermosura. «Hermosura» conserva un registro digno y visible en español, y «de ella» refleja el posesivo implícito del griego.
- source_word: ἐπιθυμίας αὐτῆς
  english_pob_choice: their desire for her beauty
  chosen_spanish: de la hermosura de ella
  alternatives_spanish:
  - de su deseo por ella
  - de su lujuria por su hermosura
  - de su deseo
  lexicon: BDAG
  rationale: La construcción griega vincula el saciarse con el deseo relativo a su belleza. En español, la frase completa «se saciaran de la hermosura de ella» conserva la relación semántica sin forzar una construcción demasiado literal. El contexto deja claro el carácter sexualmente desordenado del deseo.
theological_decisions:
- issue: Caracterización moral de οἱ παράνομοι
  english_pob_reading: the lawless men
  chosen_spanish_reading: los hombres sin ley
  alternative_spanish_readings:
  - los hombres impíos
  - los malvados
  - los transgresores
  rationale: El texto no solo los presenta como moralmente malos, sino como contrarios a la ley. «Sin ley» preserva el matiz jurídico y ético a la vez, coherente con la decisión inglesa.
  doctrine_reference: DOCTRINE.md § Translation philosophy, consistency of key terms/documented exception
- issue: Intensidad de ἐπιθυμία en contexto
  english_pob_reading: desire
  chosen_spanish_reading: se saciaran de la hermosura de ella
  alternative_spanish_readings:
  - satisfacieran su deseo
  - se llenaran de deseo
  - saciaran su lujuria
  rationale: La voz griega puede abarcar deseo o lujuria. El texto principal mantiene una formulación sobria, mientras la relación con la hermosura y el contexto narrativo dejan visible el impulso ilícito sin resolverlo demasiado pronto.
  doctrine_reference: DOCTRINE.md § Translation philosophy, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego de Swete y la nota de auditoría inglesa: conserva el tono legal de παράνομοι, la imagen de «ser llenados/saciados» de ἐμπλησθῶσιν y la ambigüedad controlada de ἐπιθυμία sin convertirla en una paráfrasis más fuerte de lo que permite el texto.'
  spanish_consistency_notes:
  - Se prefirió «Y» al inicio para mantener la continuidad narrativa.
  - «Hombres sin ley» se usa de forma consistente con el valor jurídico-moral de παράνομοι.
  - La nota a pie de página preserva la alternativa de «llenura» que el POB inglés documenta.
  - No se introduce lenguaje eclesiástico tradicional donde el griego no lo requiere.
