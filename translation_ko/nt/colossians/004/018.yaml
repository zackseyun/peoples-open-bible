  text: The greeting is in my own hand—Paul's. Remember my chains. Grace be with you.
translation:
  language: ko
  text: 이 문안은 나 바울이 친필로 씁니다. 나의 매인 것[a]을 기억해 주십시오. 은혜가 여러분과 함께 있기를 빕니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「나의 사슬」, 「나의 옥중 매임」. 헬라어 δεσμοί는 「사슬·결박」으로 옥중 생활을 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὁ ἀσπασμὸς τῇ ἐμῇ χειρὶ Παύλου
  english_pob_choice: The greeting is in my own hand—Paul's
  chosen_korean: 이 문안은 나 바울이 친필로 씁니다
  alternatives_korean:
  - 이 인사는 나 바울이 내 손으로 씁니다
  - 나 바울의 자필 인사입니다
  lexicon: BDAG
  rationale: 자필 서명 정형. 「친필로」가 한국 교회의 정립된 표현.
- source_word: μνημονεύετέ μου τῶν δεσμῶν
  english_pob_choice: Remember my chains
  chosen_korean: 나의 매인 것을 기억해 주십시오
  alternatives_korean:
  - 내 결박을 기억하라
  - 나의 사슬을 기억해 주십시오
  lexicon: BDAG
  rationale: δεσμοί의 「사슬·매임」을 한국 교회의 정립된 「매인 것」으로 옮긴다.
- source_word: ἡ χάρις μεθ’ ὑμῶν
  english_pob_choice: Grace be with you
  chosen_korean: 은혜가 여러분과 함께 있기를 빕니다
  alternatives_korean:
  - 은혜가 너희와 함께
  lexicon: BDAG
  rationale: 바울 서신 정형 축복. 한국 교회의 정립된 「~과 함께 있기를 빕니다」.
