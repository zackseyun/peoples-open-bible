- from: Yahvé me recompensó[a] conforme a mi justicia, conforme a la limpieza de mis manos[b] delante de sus ojos.
  to: Yahvé me retribuyó[a] conforme a mi justicia, conforme a la limpieza de mis manos[b] ante sus ojos.
  rationale: Se reemplaza «me recompensó» por «me retribuyó» para reflejar mejor el valor retributivo/correspondencial de וַיָּשֶׁב sin estrecharlo a un matiz meramente premiador. Se mantiene «mi justicia» por fidelidad al hebreo y al razonamiento teológico del POB. «Ante sus ojos» suena ligeramente más natural en español que «delante de sus ojos» y preserva la imagen concreta original. Las notas se ajustan para corresponder exactamente con el texto revisado.
