translation:
  language: es
  text: Los que acampan junto a él son la tribu de Isacar, y el jefe de los hijos de Isacar[a] es Netanel hijo de Zuar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Isacar». La expresión es una designación tribal estándar y se refiere a los descendientes o miembros de Isacar, no solo a varones individuales.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַחֹנִים
  english_pob_choice: Those camping
  chosen_spanish: Los que acampan
  alternatives_spanish:
  - Los que están acampados
  - Los que acampan allí
  lexicon: HALOT
  rationale: El participio funciona de manera sustantiva para el grupo que está establecido en campamento. En español, 'los que acampan' conserva el sentido de acción/estado sin sonar rígido.
- source_word: עָלָיו
  english_pob_choice: next to it
  chosen_spanish: junto a él
  alternatives_spanish:
  - al lado de él
  - cerca de él
  lexicon: HALOT
  rationale: En el contexto del arreglo del campamento en Números 2, la preposición con sufijo indica cercanía espacial respecto del estandarte o unidad mencionada antes. 'Junto a él' expresa con naturalidad esa proximidad.
- source_word: מַטֵּה
  english_pob_choice: the tribe of
  chosen_spanish: la tribu de
  alternatives_spanish:
  - tribu de
  - la vara de
  lexicon: HALOT
  rationale: Aquí מַטֵּה es la designación tribal estándar, no 'vara'. El español requiere 'la tribu de' para claridad y fidelidad contextual.
- source_word: יִשָּׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issachar
  lexicon: Transliteración convencional española
  rationale: Se adopta la forma bíblica habitual en español, 'Isacar', más natural para una lectura eclesial amplia que la transliteración inglesa.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - príncipe
  - caudillo
  lexicon: HALOT
  rationale: En Números, el término designa al cabeza reconocido de la tribu. 'Jefe' comunica esa función sin las connotaciones monárquicas que 'príncipe' puede tener hoy en español.
- source_word: לִבְנֵי יִשָּׂשכָר
  english_pob_choice: of the sons of Issachar
  chosen_spanish: de los hijos de Isacar
  alternatives_spanish:
  - de los descendientes de Isacar
  - de la casa de Isacar
  lexicon: HALOT
  rationale: Se conserva la expresión de parentesco/descendencia del hebreo. 'Hijos de Isacar' mantiene el lenguaje tribal tradicional y su sentido corporativo.
- source_word: נְתַנְאֵל
  english_pob_choice: Nethanel
  chosen_spanish: Netanel
  alternatives_spanish:
  - Natanel
  lexicon: Transliteración convencional española
  rationale: Nombre propio transliterado según uso bíblico en español, conservando la forma breve y reconocible.
- source_word: בֶּן צוּעָר
  english_pob_choice: son of Zuar
  chosen_spanish: hijo de Zuar
  alternatives_spanish:
  - el hijo de Zuar
  lexicon: HALOT
  rationale: La construcción patronímica hebrea se expresa de modo directo y natural en español con 'hijo de Zuar'.
theological_decisions:
- issue: Designación tribal con lenguaje de parentesco
  english_pob_reading: of the sons of Issachar
  chosen_spanish_reading: de los hijos de Isacar
  alternative_spanish_readings:
  - de los descendientes de Isacar
  - de la gente de Isacar
  rationale: Se mantiene la fórmula de parentesco del texto hebreo, que en contexto tribal funciona como designación corporativa. No se suaviza a un término más genérico para no perder la forma tradicional del pasaje.
  doctrine_reference: Números 1–2; uso tribal corporativo en la Torá
translation_notes:
  revision_awareness: 'El texto inglés auditado se mantiene sin cambios sustantivos en el sentido: grupo acampado junto a la unidad previa, tribu de Isacar, jefe tribal y patronímico final. La principal adaptación al español es la forma tradicional de los nombres propios (Isacar, Netanel) y la naturalización de la preposición espacial.'
  spanish_consistency_notes:
  - Se mantiene 'tribu' para מַטֵּה en contexto censal/campamental.
  - Se conserva 'hijos de' como fórmula tribal, con nota explicativa para su sentido corporativo.
  - Se usa 'jefe' para נָשִׂיא por claridad moderna y fidelidad funcional.
  - Los nombres propios se presentan en forma española bíblica habitual.
