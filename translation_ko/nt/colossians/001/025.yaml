id: COL.1.25
reference: Colossians 1:25
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἧς ἐγενόμην ἐγὼ διάκονος κατὰ τὴν οἰκονομίαν τοῦ θεοῦ τὴν δοθεῖσάν μοι εἰς ὑμᾶς πληρῶσαι τὸν λόγον τοῦ θεοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/025.yaml
  text: of which I became a servant according to the stewardship from God given to me for you, to fulfill the word of God,
translation:
  language: ko
  text: 나는 하나님께로부터 받은 청지기 직분을 따라 그 교회의 일꾼이 되었으니, 곧 여러분을 위하여 하나님의 말씀을 이루기[a] 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하나님의 말씀을 충만히 알리기 위함」, 「하나님의 말씀을 완성하기 위함」.
    reason: alternative_reading
lexical_decisions:
- source_word: ἧς ... διάκονος
  english_pob_choice: of which ... a servant
  chosen_korean: 그 교회의 일꾼
  alternatives_korean:
  - 그 교회의 봉사자
  - 그 교회의 사역자
  lexicon: BDAG
  rationale: 관계대명사 ἧς는 24절의 「교회」를 받는다. διάκονος는 「일꾼」으로 옮겨 후대 「집사」 직제 함의를 피한다.
- source_word: ἐγενόμην
  english_pob_choice: I became
  chosen_korean: 되었으니
  alternatives_korean:
  - 되었습니다
  lexicon: BDAG
  rationale: 부정과거. 「되었으니」로 다음 절과 연결한다.
- source_word: κατὰ τὴν οἰκονομίαν τοῦ θεοῦ
  english_pob_choice: according to the stewardship from God
  chosen_korean: 하나님께로부터 받은 청지기 직분을 따라
  alternatives_korean:
  - 하나님의 경륜을 따라
  - 하나님의 직무를 따라
  lexicon: BDAG
  rationale: οἰκονομία는 「청지기 직분·맡겨진 책무」를 가리킨다. 한국 교회의 정립된 「청지기 직분」을 사용한다.
- source_word: τὴν δοθεῖσάν μοι
  english_pob_choice: given to me
  chosen_korean: 받은
  alternatives_korean:
  - 내게 주어진
  lexicon: BDAG
  rationale: 한국어 자연성을 위해 「받은」으로 압축한다.
- source_word: εἰς ὑμᾶς
  english_pob_choice: for you
  chosen_korean: 여러분을 위하여
  alternatives_korean:
  - 여러분에게
  - 여러분에게로
  lexicon: BDAG
  rationale: 인격적 εἰς를 「위하여」로 옮긴다.
- source_word: πληρῶσαι
  english_pob_choice: to fulfill
  chosen_korean: 이루기
  alternatives_korean:
  - 충만히 알리기
  - 완성하기
  lexicon: BDAG
  rationale: 「이루다」는 「가득 채움·완성·충만한 표현」의 다층 의미를 함께 담는다. 좁은 해석을 피한다.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_korean: 하나님의 말씀
  alternatives_korean:
  - 하나님의 메시지
  lexicon: BDAG
  rationale: 한국 교회의 정립된 표현.
