translation:
  language: es
  text: Y será para ellos como una adivinación falsa ante sus ojos; han jurado juramentos sobre juramentos sobre ellos[a], pero él hace recordar la culpa, para que sean capturados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «juramentos jurados para ellos» o «juramentos sobre juramentos para ellos». La frase es difícil; el texto principal la entiende como juramentos solemnes que, aun así, desprecian.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And it will be
  chosen_spanish: Y será
  alternatives_spanish:
  - Y será que
  - Y acontecerá
  lexicon: HALOT
  rationale: El imperfecto profético se vierte naturalmente como futuro en español. ‘Será’ conserva la fuerza prospectiva sin sonar forzado.
- source_word: כקסום שוא
  english_pob_choice: like a false divination
  chosen_spanish: como una adivinación falsa
  alternatives_spanish:
  - como una adivinación vana
  - como un augurio falso
  lexicon: HALOT
  rationale: קסום apunta a adivinación/augurio, y שוא añade falsedad o vaciedad. ‘Adivinación falsa’ mantiene ambos elementos con español claro.
- source_word: בעיניהם
  english_pob_choice: in their eyes
  chosen_spanish: ante sus ojos
  alternatives_spanish:
  - en sus ojos
  - a su parecer
  lexicon: HALOT
  rationale: La idiomática hebrea se conserva con una expresión natural en español. ‘Ante sus ojos’ comunica percepción o evaluación sin perder el giro figurado.
- source_word: שבעי שבעות להם
  english_pob_choice: they have sworn sworn oaths to them
  chosen_spanish: han jurado juramentos sobre juramentos para ellos
  alternatives_spanish:
  - han jurado juramentos, juramentos para ellos
  - les han jurado juramentos sobre juramentos
  lexicon: HALOT
  rationale: La frase hebrea es difícil y repetitiva. Se preserva la dureza del doblete con una construcción cercana al texto, evitando suavizar la tensión léxica. No se introduce ‘binding’ porque el contexto inglés revisado volvió a la repetición literal del hebreo.
- source_word: והוא
  english_pob_choice: but he
  chosen_spanish: pero él
  alternatives_spanish:
  - y él
  - mas él
  lexicon: HALOT
  rationale: El pronombre apunta al rey de Babilonia por el contexto inmediato. ‘Pero él’ conserva el contraste adversativo entre la percepción humana y la acción efectiva.
- source_word: מזכיר עון
  english_pob_choice: brings guilt to remembrance
  chosen_spanish: hace recordar la culpa
  alternatives_spanish:
  - trae la culpa a memoria
  - recuerda la culpa
  lexicon: HALOT
  rationale: הזכיר es ‘hacer recordar/traer a la memoria’; עון puede ser culpa o iniquidad. ‘Culpa’ encaja bien en el marco judicial del pasaje y conserva el peso moral.
- source_word: להתפש
  english_pob_choice: so that they may be captured
  chosen_spanish: para que sean capturados
  alternatives_spanish:
  - para que sean apresados
  - para que los tomen
  lexicon: HALOT
  rationale: El infinitivo expresa resultado o propósito. ‘Ser capturados’ es natural en español y corresponde al contexto militar/judicial.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del inglés POB que prefirió conservar la repetición incómoda del hebreo en la cláusula media, en lugar de suavizarla con una glosa interpretativa como ‘binding’. La redacción española imita esa cercanía al original sin añadir explicaciones no sustentadas.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto solo cuando el tetragrámaton aparezca explícitamente; este versículo no lo contiene.
  - Se preserva la tensión léxica de la frase difícil ‘juramentos sobre juramentos’ en vez de normalizarla.
  - ‘Culpa’ se usa para עון en un marco judicial; no se sustituyó por ‘iniquidad’ para evitar una abstracción menos natural en español.
