  to: Sé para mí una roca de refugio[a], al cual pueda acudir siempre; has mandado salvación para mí[b], porque tú eres mi peñasco y mi fortaleza.
  rationale: Se ajusta «venir» a «acudir» para un español más natural en contexto de refugio, y se diferencian mejor las dos metáforas rocosas del hebreo mediante «roca» y «peñasco». También se mejora levemente la fluidez final con «porque tú eres...» y se normaliza la puntuación de la nota b. La revisión sigue de cerca el hebreo y el razonamiento del POB inglés sin introducir paráfrasis.
