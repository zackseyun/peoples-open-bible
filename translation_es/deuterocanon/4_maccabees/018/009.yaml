translation:
  language: es
  text: Pero cuando estos hijos llegaron a la edad adulta[a], murió su padre. Bienaventurado fue aquel hombre, porque, después de conocer lo que era tener buenos hijos[b], no sufrió el tiempo de quedar sin hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llegaron a la madurez». El griego puede destacar que ya eran plenamente adultos o de plena edad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «después de conocer la vida de una descendencia favorable» o «de una descendencia abundante». El griego εὐτεκνία puede enfatizar estar bendecido con hijos, incluso muchos, con sentido positivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνηλίκων γενομένων
  english_pob_choice: had reached adulthood
  chosen_spanish: llegaron a la adultez
  alternatives_spanish:
  - habían llegado a la madurez
  - se hicieron adultos
  - alcanzaron la mayoría de edad
  lexicon: LSJ
  rationale: La construcción de genitivo absoluto expresa que los hijos ya habían pasado a la condición de adultos. «Llegaron a la adultez» conserva el valor de transición completada y suena natural en español.
- source_word: ἐτελεύτησεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - llegó a su fin
  - partió
  lexicon: BDAG
  rationale: El verbo puede funcionar como un término reverente para la muerte, pero en español «murió» es claro y fiel sin añadir eufemismo innecesario.
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - bendito
  - feliz
  - afortunado
  lexicon: BDAG
  rationale: «Bienaventurado» preserva el tono elevado y religioso de μακάριος mejor que «feliz» o «afortunado». En español bíblico también comunica estado favorecido.
- source_word: εὐτεκνίας
  english_pob_choice: having good children
  chosen_spanish: tener hijos
  alternatives_spanish:
  - tener buena descendencia
  - estar bendecido con hijos
  - tener hijos buenos
  lexicon: LSJ
  rationale: El griego señala el estado de estar bien provisto de hijos, con valoración positiva. «Tener hijos» mantiene la referencia directa; la idea favorable queda sostenida por el contexto y por «bienaventurado».
- source_word: βίον ἐπιστήσας
  english_pob_choice: after seeing the life of
  chosen_spanish: después de ver la vida de
  alternatives_spanish:
  - después de conocer la vida de
  - después de experimentar la vida de
  - después de haber vivido la vida de
  lexicon: LSJ
  rationale: POB entendió ἐπιστήσας como haber llegado a conocer/experimentar una forma de vida. «Después de ver» reproduce con naturalidad esa percepción o experiencia previa sin forzar el giro en español.
- source_word: ἀτεκνίας
  english_pob_choice: childlessness
  chosen_spanish: ausencia de hijos
  alternatives_spanish:
  - esterilidad
  - sin hijos
  - falta de hijos
  lexicon: LSJ
  rationale: En contexto narrativo, ἀτεκνία apunta no solo a esterilidad abstracta sino a la condición dolorosa de quedar sin hijos. «Ausencia de hijos» mantiene ese sentido y evita sobrecargar el verso con una lectura clínica que el pasaje no exige.
- source_word: οὐκ ὠδυνήθη
  english_pob_choice: did not suffer
  chosen_spanish: no sufrió
  alternatives_spanish:
  - no padeció
  - no fue atormentado por
  - no sintió dolor por
  lexicon: BDAG
  rationale: El verbo expresa dolor o angustia experimentados. «No sufrió» conserva la amplitud semántica y encaja con el complemento temporal que sigue.
- source_word: καιρόν
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - la ocasión
  - el momento
  - la temporada
  lexicon: BDAG
  rationale: Aunque καιρός puede ser un período oportuno o marcado, el texto en español se comunica con claridad mediante «el tiempo», manteniendo la referencia al período de ausencia de hijos.
theological_decisions:
- issue: Sentido de la bienaventuranza del padre frente a la pérdida futura de sus hijos
  english_pob_reading: The verse blesses the father because he died before enduring the later state of childlessness caused by his sons' deaths.
  chosen_spanish_reading: El versículo llama bienaventurado al padre porque murió antes de llegar a la condición dolorosa de quedar sin hijos tras la muerte de ellos.
  alternative_spanish_readings:
  - El versículo simplemente contrasta haber tenido hijos con no haberlos tenido nunca.
  - El versículo elogia solo la fecundidad familiar, sin referencia al desenlace narrativo.
  rationale: El contexto inmediato de 4 Macabeos trata del martirio de los hijos; por eso ἀτεκνία debe leerse narrativamente como la pena de quedarse sin hijos. La traducción mantiene esa tensión sin explicitarla en exceso en el cuerpo del texto.
  doctrine_reference: Preservar la tensión narrativa y semántica del original; primacía del texto fuente sobre la armonización interpretativa.
translation_notes:
  revision_awareness: 'Se siguió el giro revisado del audit trail en los puntos clave: el hecho de que los hijos ya habían alcanzado la adultez, la formulación de ἐπιστήσας como experiencia/visión previa, y la elección de «tiempo» para καιρόν. También se mantuvo la tensión narrativa sobre ἀτεκνία, entendida en el contexto de la muerte de los hijos.'
  spanish_consistency_notes:
  - Se usa «bienaventurado» para μακάριος en tono bíblico elevado y coherente con el registro del libro.
  - Se evita «SEÑOR» o fórmulas sustitutivas porque este versículo no contiene el nombre divino ni κύριος en ese sentido.
  - «Hijos» se mantiene literal y no se amplía a «descendencia» en el texto principal para no diluir la escena narrativa inmediata.
  - 'La puntuación separa las dos cláusulas principales como en el griego: hecho histórico y valoración sapiencial.'
