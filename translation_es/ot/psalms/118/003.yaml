    issue: Concordancia y naturalidad de «Que la casa de Aarón diga»
    rationale: יֹאמְרוּ es 3mp jussivo en un estribillo congregacional. Aunque «la casa de Aarón» puede tratarse como colectivo singular, en español bíblico-natural aquí suena mejor «los de la casa de Aarón digan» o equivalente, reflejando mejor el plural exhortativo.
  - severity: medium
    issue: La nota [a] está anclada en «ahora» pero explica חֶסֶד
    rationale: La nota léxica trata el significado de «amor leal / fidelidad de pacto», no la partícula נָא. Debe colocarse sobre la expresión correspondiente en el texto español.
  - severity: low
    issue: «Amor leal» es correcto pero algo menos idiomático que «amor fiel» en este estribillo
    rationale: Ambas opciones son defendibles, pero «amor fiel» suena más natural para lectura pública y comunica bien la perseverancia/covenantalidad que el inglés POB expresa con «steadfast love».
  revised_spanish_text: 'Que los de la casa de Aarón digan ahora: «Su amor fiel[a] perdura para siempre».

