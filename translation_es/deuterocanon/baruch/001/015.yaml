review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: futuro directivo («Y diréis»), destinatario divino («al Señor nuestro Dios»), contraste confesional entre lo que pertenece a Dios y la vergüenza del pueblo, y referencia colectiva a Judá y Jerusalén. Sin embargo, se aparta innecesariamente del audit trail inglés y de la decisión teológica documentada en δικαιοσύνη: el inglés escogió «righteousness» con nota alternativa «justice», mientras el español invierte esa prioridad. Además, «como en este día» suena menos natural que una formulación española que exprese el sentido idiomático presente de ὡς ἡ ἡμέρα αὕτη.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero tiene varios giros poco logrados: «La justicia le pertenece a él» introduce un «a él» innecesario y menos elegante; «vergüenza de rostro» suena forzado frente a «vergüenza en el rostro», que conserva el semitismo de forma inteligible; y «como en este día» resulta duro en español bíblico actual. También conviene alinear la nota con la elección principal del texto.'
  glossary_alignment: 'Buena alineación general en «Señor», «Dios», «Judá» y «habitantes de Jerusalén». La principal desalineación está en δικαιοσύνη: por defecto del proyecto y por la rationale inglesa, debe priorizarse «rectitud»/«justicia» según contexto; aquí el audit trail estableció como lectura principal «righteousness» por el contraste penitencial. En español, «rectitud» reproduce mejor esa decisión, dejando «justicia» como alternativa en nota.'
  issues:
  - severity: medium
    issue: δικαιοσύνη se tradujo como lectura principal «justicia» en vez de reflejar la decisión inglesa principal.
    rationale: El audit trail inglés y la decisión teológica favorecen «righteousness» en este contexto penitencial, con «justice» solo como alternativa. En español, «rectitud» refleja mejor esa prioridad que «justicia».
  - severity: medium
    issue: La nota al pie contradice la prioridad léxica documentada.
    rationale: La nota dice «O “justicia”» aunque el texto ya usa «justicia», y además presenta «rectitud» como alternativa secundaria, invirtiendo la lógica del POB inglés.
  - severity: low
    issue: «La justicia le pertenece a él» es menos natural y enfática de manera no motivada.
    rationale: La elipsis griega se resuelve mejor con «A… pertenece la rectitud/justicia», que suena más idiomático y solemne en español.
  - severity: low
    issue: «como en este día» es poco natural en español.
    rationale: El griego expresa el estado patente en el presente; «como sucede en este día» o «como ocurre hoy» lo comunica mejor sin paraprasear en exceso.
  - severity: low
    issue: «vergüenza de rostro» puede resultar demasiado calcado.
    rationale: «Vergüenza en el rostro» mantiene el sentido de vergüenza visible y pública con mejor legibilidad en español general.
