  to: 'Entonces Benaías fue a la tienda de Yahvé[a] y le dijo: «Así dice el rey: “Sal”». Pero él dijo: «No, porque aquí moriré». Y Benaías llevó la respuesta de vuelta al rey, diciendo: «Así habló Joab, y así me respondió».'
