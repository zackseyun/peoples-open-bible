    text: 'O, siguiendo una traducción optativa tradicional: «Que Dios se levante; que sus enemigos queden dispersados, y que los que lo odian huyan de delante de él».'
    reason: alternative_reading
  revision_rationale: Se ajusta «son dispersados» a «quedan dispersados» para lograr un español más natural y poético, a la vez que se conserva el matiz resultativo que motivó la POB inglesa («are scattered») para יָפוּצוּ. La nota se armoniza con la misma mejora estilística. No se requieren cambios doctrinales ni de terminología del proyecto.
