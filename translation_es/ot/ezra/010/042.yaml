    issue: '''Amarías'' añade una terminación española no exigida por אֲמַרְיָה.'
    rationale: El nombre hebreo corresponde más directamente a 'Amaría' o 'Amaryah'. 'Amarías' parece una adaptación tradicional, pero se aleja de la forma singular del nombre fuente en una lista donde la precisión onomástica importa.
  - severity: medium
    issue: '''José'' hispaniza en exceso יוֹסֵף en una lista nominal.'
    rationale: Aunque 'José' es comprensible y tradicional, el rastro inglés eligió la forma convencional inglesa 'Joseph' por legibilidad propia del inglés. En español, para preservar mejor la forma hebrea sin introducir asociaciones posteriores, 'Yosef' funciona mejor en este contexto de catálogo de nombres.
  revised_spanish_text: Sallum, Amaría, Yosef.
