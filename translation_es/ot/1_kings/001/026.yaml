translation:
  language: es
  text: Pero a mí, tu esclavo, y a Sadoc el sacerdote[a], y a Benaía hijo de Joadá, y a Salomón tu esclavo, no me llamó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «convocó» o «invitó». El verbo hebreo puede significar llamar, convocar o invitar; «invitó» encaja con el banquete sacrificial inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִי / אֲנִי עַבְדֶּךָ
  english_pob_choice: But me—your servant
  chosen_spanish: Pero a mí—tu esclavo—
  alternatives_spanish:
  - Pero yo, tu esclavo
  - Y a mí—tu esclavo
  lexicon: HALOT
  rationale: El hebreo pone en relieve al hablante con contraste y autoidentificación servil. En español, «Pero a mí» conserva el contraste; «tu esclavo» sigue la fuerza léxica de עֶבֶד sin suavizarla a «siervo», que debilitaría el matiz social del término.
- source_word: צָדֹק הַכֹּהֵן
  english_pob_choice: Zadok the priest
  chosen_spanish: Sadoc el sacerdote
  alternatives_spanish:
  - Zadoc el sacerdote
  - Sadoc, el sacerdote
  lexicon: Nombre propio / HALOT
  rationale: Se translitera el nombre propio en forma española común. «Sacerdote» mantiene el título definido del hebreo sin añadir información.
- source_word: בְנָיָהוּ בֶן יְהוֹיָדָע
  english_pob_choice: Benaiah son of Jehoiada
  chosen_spanish: Benaía hijo de Joadá
  alternatives_spanish:
  - Benaía, hijo de Joadá
  - Benaía, el hijo de Joadá
  lexicon: Nombre propio / genealogía
  rationale: El patrón patronímico se vierte de modo natural en español con «hijo de». Se conserva la relación genealógica sin expansión interpretativa.
- source_word: שְׁלֹמֹה עַבְדְּךָ
  english_pob_choice: Solomon your servant
  chosen_spanish: Salomón tu esclavo
  alternatives_spanish:
  - Salomón, tu esclavo
  - Salomón tu siervo
  lexicon: HALOT
  rationale: Se mantiene la misma expresión servil que para el hablante, porque el hebreo repite עַבְדְּךָ. «Esclavo» preserva la consistencia léxica y la humillación deferente implícita.
- source_word: לֹא קָרָא
  english_pob_choice: he did not call
  chosen_spanish: no llamó
  alternatives_spanish:
  - no convocó
  - no invitó
  lexicon: HALOT
  rationale: El POB revisó la lectura desde «invite» a «call» para corresponder más de cerca a קָרָא. En español, «llamó» es la correspondencia más directa; «convocó» o «invitó» serían interpretaciones contextuales más específicas.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «invite» a «call» para acercarse a קָרָא; la línea española sigue esa revisión con «llamó», manteniendo el contraste inicial y la lista nominal en el orden del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «esclavo» para עֶבֶד en toda la frase, por coherencia con la decisión léxica documentada.
  - Se usó «Sadoc» y «Salomón» como formas españolas estándar de los nombres propios.
  - La puntuación con incisos reproduce el énfasis del hebreo y de la versión inglesa auditada.
