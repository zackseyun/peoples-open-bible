revisions:
- from: Y la casa de Israel llamó su nombre maná[a], y era como semilla de cilantro blanco[b], y su sabor como tortas sin levadura[c] con miel.
  to: La casa de Israel llamó su nombre maná[a], y este era como semilla blanca de cilantro[b], y su sabor era como obleas[c] con miel.
  rationale: Se corrige una adición no sustentada por el hebreo («sin levadura»), se refleja mejor el pronombre resumptivo de וְהוּא con «este era», y se mejora la naturalidad de la comparación descriptiva sin apartarse de la evidencia fuente ni del rastro léxico del POB inglés.
