review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: David hace subir a los hombres que estaban con él, de manera distributiva cada hombre con su unidad doméstica, y luego se establecen en los asentamientos vinculados a Hebrón. Sin embargo, dos elecciones no preservan del todo la intención auditada: «su casa» suena demasiado literal y ambigua frente al sentido doméstico de בֵּיתוֹ, y la nota al pie repite la lectura principal en vez de dar la alternativa documentada. Además, «hizo subir» es formalmente fiel, pero en español bíblico-natural «llevó consigo» o «hizo subir» depende del registro; aquí puede mantenerse «hizo subir», aunque el resto del versículo requiere ajuste.'
  spanish_quality_summary: El español es comprensible, pero «cada hombre con su casa» resulta menos idiomático que «cada hombre con su familia» o «con los de su casa». Dado que el inglés auditado fijó «household», conviene una solución más natural y precisa en español. «En las ciudades de Hebrón» es aceptable, pero la nota debe presentar la alternativa, no duplicar el texto principal. El conjunto necesita un retoque menor para mayor claridad y conformidad con el expediente.
  glossary_alignment: No hay términos teológicos sensibles aquí. «Hebrón» es apropiado. «Los hombres» concuerda con la decisión del POB. Para אִישׁ וּבֵיתוֹ, la mejor correspondencia española con el rationale auditado es «cada hombre con su familia» o «con su casa/hogar» aclarado; se prefiere «su familia» por naturalidad y por reflejar el valor de household mejor que «su casa». Para בְּעָרֵי חֶבְרוֹן, la principal puede quedarse como «las ciudades de Hebrón» o mejor «los poblados de Hebrón»/«las ciudades de la región de Hebrón»; dado el audit trail inglés, la principal puede mantenerse con nota alternativa bien formulada.
  issues:
  - severity: medium
    issue: «cada hombre con su casa» no expresa bien el sentido de household
    rationale: בֵּיתוֹ aquí no se refiere primariamente al edificio, sino a la unidad doméstica/familiar. En español, «su casa» puede sonar demasiado física y menos natural en esta construcción.
  - severity: medium
    issue: La nota al pie a repite el texto principal en vez de ofrecer la alternativa documentada
    rationale: La nota inglesa dice «Or 'in the cities of Hebron'» porque la principal inglesa usa «towns». En el borrador español, la principal ya dice «ciudades», así que la nota no añade una alternativa real y queda incoherente con la justificación.
  revised_spanish_text: Y David hizo subir a los hombres que estaban con él, cada hombre con su familia, y se establecieron en las ciudades de Hebrón[a].
