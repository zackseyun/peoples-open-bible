translation:
  language: es
  text: y la décima parte de un efa de flor de harina para una ofrenda de grano[a], mezclada con un cuarto de hin de aceite batido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El efa y el hin son antiguas unidades israelitas de medida.
    reason: cultural_note
  - marker: b
    text: 'O: «aceite prensado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַעֲשִׂירִית
  english_pob_choice: and a tenth
  chosen_spanish: y la décima parte
  alternatives_spanish:
  - y un décimo
  - y la décima
  lexicon: HALOT
  rationale: El hebreo introduce una fracción medida que continúa la serie de prescripciones. En español, 'la décima parte' comunica con claridad la fracción y mantiene el valor cuantitativo del original.
- source_word: הָאֵיפָה
  english_pob_choice: of an ephah
  chosen_spanish: de un efa
  alternatives_spanish:
  - del efa
  - de la efa
  lexicon: HALOT
  rationale: '''Efa'' conserva la unidad antigua de medida como en el texto base; el artículo indefinido se ajusta mejor al castellano en esta construcción de medida.'
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: La expresión tradicional 'flor de harina' es idiomática en español bíblico y refleja bien la harina finamente molida usada en ofrendas.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para una ofrenda de cereal
  alternatives_spanish:
  - para una ofrenda de grano
  - para una ofrenda
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacerdotal designa la ofrenda vegetal/cereal, no una dádiva general. 'Ofrenda de cereal' preserva la categoría cultual con lenguaje comprensible; 'de grano' es posible pero menos preciso en registro litúrgico.
- source_word: בְּלוּלָה
  english_pob_choice: mixed
  chosen_spanish: mezclada
  alternatives_spanish:
  - amasada
  - mezclado
  lexicon: HALOT
  rationale: El participio femenino concuerda con 'flor de harina'. 'Mezclada' es natural y exacto para indicar la combinación con aceite.
- source_word: בְּשֶׁמֶן
  english_pob_choice: with ... oil
  chosen_spanish: con ... aceite
  alternatives_spanish:
  - en ... aceite
  - junto con ... aceite
  lexicon: HALOT
  rationale: La preposición expresa el medio con el que se mezcla la harina; 'con aceite' es el equivalente natural en español.
- source_word: כָּתִית
  english_pob_choice: beaten
  chosen_spanish: batido
  alternatives_spanish:
  - prensado
  - triturado
  lexicon: HALOT
  rationale: '''Batido'' conserva la imagen tradicional de aceite obtenido por golpeado/crushing de la aceituna, cercana al valor de כָּתִית. ''Prensado'' es una alternativa interpretativa posible, pero menos literal respecto del adjetivo.'
- source_word: רְבִיעִת הַהִין
  english_pob_choice: a quarter of a hin
  chosen_spanish: un cuarto de hin
  alternatives_spanish:
  - la cuarta parte de un hin
  - un cuarto del hin
  lexicon: HALOT
  rationale: '''Un cuarto de hin'' mantiene la unidad antigua y la fracción de manera sobria y clara en español.'
translation_notes:
  revision_awareness: El texto hebreo y el audit trail en inglés están en alto acuerdo y no requieren cambios sustantivos. Se mantuvo la unidad antigua de medida y la terminología sacrificial; la única decisión notable en español fue usar 'ofrenda de cereal' para מִנְחָה y 'aceite batido' para כָּתִית, en línea con el sentido léxico documentado.
  spanish_consistency_notes:
  - Se preservó el registro cultual con terminología bíblica moderna y comprensible.
  - Se mantuvo la correspondencia de género entre 'flor de harina' y 'mezclada'.
  - Las notas al pie distinguen la explicación cultural de las alternativas léxicas sin sobrecargar el cuerpo del texto.
