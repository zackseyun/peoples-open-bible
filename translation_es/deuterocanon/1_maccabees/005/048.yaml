review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: Judas envía una propuesta pacífica, pide pasar por la tierra ajena para ir a su propia tierra, promete no hacer daño y recibe una negativa de acceso. Sin embargo, hay una inconsistencia de tratamiento pronominal en el discurso directo: el griego pasa de segunda persona plural (πρὸς αὐτούς ... ὑμᾶς) a singular posesivo σου en una formulación colectiva, y el español actual mezcla «tu» con «os». Para español neutral y legible conviene unificar en plural de cortesía contextual («su ... les») o plural tradicional completo, evitando mezcla dialectal.'
  spanish_quality_summary: La redacción es clara y digna, pero «tu tierra ... os hará» mezcla registros peninsulares y no es ideal para el objetivo de español neutral latinoamericano. «Para ir a la nuestra» suena algo elíptico; «para ir a nuestra tierra» es más natural sin añadir interpretación. El resto fluye bien y «no quisieron abrirle» preserva adecuadamente el objeto implícito.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Palabras de paz» corresponde bien a λόγους εἰρηνικούς. «Pasaremos ... a pie» preserva πλὴν τοῖς ποσὶν παρελευσόμεθα. La nota existente, sin embargo, no sigue la nota auditada en inglés, que enfatiza el objeto implícito de «abrir»; conviene trasladar esa nota al final del versículo en vez de redefinir «palabras de paz».
  issues:
  - severity: medium
    issue: 'Mezcla de tratamientos pronominales: «tu tierra» con «os hará daño».'
    rationale: Aunque el griego contiene σου junto a ὑμᾶς, en español meta neutral esta combinación suena inconsistente y dialectalmente marcada. Debe unificarse para lectura natural y eclesial amplia.
  - severity: medium
    issue: La nota al pie está anclada en «palabras de paz», pero la auditoría inglesa documenta la ambigüedad de «abrir».
    rationale: La nota española actual comenta el tono diplomático, algo ya suficientemente expresado en el texto. La evidencia auditada preserva la elipsis del objeto de ἀνοῖξαι; esa es la nota que debe mantenerse.
  - severity: low
    issue: «para ir a la nuestra» es menos natural que «para ir a nuestra tierra».
    rationale: Ambas son fieles, pero la segunda evita una elipsis algo dura en español y conserva mejor la referencia explícita de γῆν.
  revised_spanish_text: 'Y Judas les envió palabras de paz, diciendo: «Pasaremos por su tierra para ir a nuestra tierra; y nadie les hará daño; solamente pasaremos a pie». Pero no quisieron abrirle[a].'
  revised_footnotes:
  - marker: a
    text: Es decir, no quisieron darle entrada ni paso; en el griego el objeto de «abrir» queda implícito.
    reason: lexical_alternative
  revision_rationale: Se corrige la mezcla pronominal para un español neutral y coherente («su ... les»), se hace más natural la finalidad («para ir a nuestra tierra»), y se alinea la nota con la auditoría inglesa, preservando la elipsis del objeto de «abrir» en vez de comentar innecesariamente «palabras de paz».
