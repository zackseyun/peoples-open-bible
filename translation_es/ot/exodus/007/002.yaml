revisions:
- from: Tú hablarás todo lo que yo te mande[a], y Aarón tu hermano hablará a Faraón, para que él envíe a los hijos de Israel fuera de su tierra.
  to: Tú hablarás todo lo que yo te mande, y Aarón tu hermano hablará a Faraón, para que él deje salir a los hijos de Israel[a] de su tierra.
  rationale: Se reubica la nota al sintagma correcto y se sustituye ‘envíe ... fuera de su tierra’ por ‘deje salir ... de su tierra’ para lograr un español más natural y fiel al sentido contextual de שׁלח en Éxodo, sin perder la finalidad expresada por ‘para que’.
