translation:
  text: For just as Noah’s ark[a], being borne along in the world-filling flood, steadfastly endured the waves,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'being borne along in the flood that filled the world.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  chosen: just as
  alternatives:
  - even as
  - for as
  lexicon: LSJ
  rationale: Introduces a comparison; 'just as' is natural modern English and preserves the simile's force.
- source_word: Νῶε
  chosen: Noah
  lexicon: LSJ
  rationale: Standard English transliteration of the biblical name.
- source_word: κιβωτός
  chosen: ark
  alternatives:
  - chest
  - box
  lexicon: LSJ
  rationale: In the Noah context, 'ark' is the established and accurate rendering, matching the referent rather than the broader lexical range.
- source_word: κοσμοπληθεῖ
  chosen: world-engulfing
  alternatives:
  - world-filling
  - all-the-world-covering
  lexicon: LSJ
  rationale: A compound intensifying the scale of the flood. 'World-engulfing' communicates comprehensive devastation in readable English better than the more wooden 'world-filling.'
- source_word: κατακλυσμῷ
  chosen: flood
  alternatives:
  - deluge
  - cataclysm
  lexicon: LSJ
  rationale: '''Flood'' is the plain sense and fits the Noah allusion directly; ''deluge'' is possible but less natural here.'
- source_word: κοσμοφορουμένη
  chosen: being carried along
  alternatives:
  - being borne along
  - being driven through the world
  lexicon: LSJ
  rationale: The participle describes the ark's movement amid the floodwaters. 'Being carried along' is idiomatic and preserves the passive sense without overinterpreting the compound.
- source_word: καρτερῶς
  chosen: steadfastly
  alternatives:
  - firmly
  - with endurance
  lexicon: LSJ
  rationale: Conveys resolute endurance, an important motif in 4 Maccabees. 'Steadfastly' captures both firmness and moral endurance.
- source_word: ὑπήνεγκεν
  chosen: endured
  alternatives:
  - bore
  - withstood
  lexicon: LSJ
  rationale: The verb means to bear up under. 'Endured' fits the book's emphasis on endurance and works smoothly with 'the waves.'
- source_word: κλύδωνας
  chosen: the waves
  alternatives:
  - billows
  - surging waters
  lexicon: LSJ
  rationale: Refers to turbulent waves. 'The waves' is clear and sufficiently vivid; 'billows' is possible but slightly more literary.
