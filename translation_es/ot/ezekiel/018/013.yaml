revisions:
- from: Da interés y toma provecho[a]—¿y vivirá? No vivirá. Ha cometido todas estas abominaciones; ciertamente se le dará muerte[b]; su sangre caerá sobre él[c].
  to: Presta con interés y toma provecho[a]—¿y vivirá? No vivirá. Ha cometido todas estas abominaciones; ciertamente se le dará muerte[b]; su sangre estará sobre él[c].
  rationale: Se corrige «Da interés» a «Presta con interés» por fidelidad léxica y naturalidad en español, y «su sangre caerá sobre él» a «su sangre estará sobre él» para respetar mejor el modismo hebreo de imputación. Se mantienen el resto de las decisiones, que reflejan bien la estructura y el peso judicial del texto.
