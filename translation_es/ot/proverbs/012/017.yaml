translation:
  language: es
  text: El que exhala verdad[a] declara justicia[b], pero el testigo falso, engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «fidelidad»: «El que exhala fidelidad declara justicia» o «declara rectitud».'
    reason: lexical_alternative
  - marker: b
    text: O «rectitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: יָפִיחַ
  english_pob_choice: breathes out
  chosen_spanish: exhala
  alternatives_spanish:
  - sopla
  - pronuncia
  - exhala hacia afuera
  lexicon: HALOT
  rationale: La imagen verbal del hebreo conserva un sentido corporal de aliento/expulsión al hablar. En español, «exhala» mantiene esa fuerza metafórica sin sonar artificial, y evita un simple «dice» que perdería el color del original.
- source_word: אֱמוּנָה
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - fidelidad
  - lealtad
  - veracidad
  lexicon: HALOT
  rationale: En este contexto de testimonio y contraste con el testigo falso, el término apunta a una palabra confiable y verdadera. «Verdad» es la opción más clara y compacta; «fidelidad» queda como trasfondo posible por la amplitud semántica del hebreo.
- source_word: יַגִּיד
  english_pob_choice: declares
  chosen_spanish: declara
  alternatives_spanish:
  - anuncia
  - hace saber
  - cuenta
  lexicon: HALOT
  rationale: El verbo הִגִּיד expresa dar a conocer o declarar. «Declara» encaja con el registro formal del proverbio y preserva la relación con el lenguaje de testimonio.
- source_word: צֶדֶק
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - lo correcto
  - justicia
  lexicon: HALOT
  rationale: Aunque el inglés POB osciló entre «righteousness» y la nota «what is right», el hebreo permite un campo legal-moral amplio. En español, «justicia» conserva ese peso ético y forense sin reducirlo a una abstracción devocional.
- source_word: עֵד
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testigo
  - declarante
  lexicon: HALOT
  rationale: En el marco judicial del proverbio, «testigo» es el equivalente natural y preciso para עֵד.
- source_word: שְׁקָרִים
  english_pob_choice: 'false'
  chosen_spanish: falso
  alternatives_spanish:
  - mentiroso
  - falaz
  - de mentira
  lexicon: HALOT
  rationale: El sustantivo funciona de modo atributivo con «testigo», describiéndolo por su falsedad. «Falso» reproduce bien esa construcción breve y proverbial.
- source_word: מִרְמָה
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - fraude
  - fraude y engaño
  lexicon: HALOT
  rationale: El cierre hebreo es elíptico y muy breve. «Engaño» preserva la concisión y la idea de conducta fraudulenta o engañosa sin añadir elementos que el texto no expresa.
theological_decisions:
- issue: Equilibrio entre justicia, rectitud y verdad en el proverbio
  english_pob_reading: He who breathes out truth declares righteousness, but a false witness, deceit.
  chosen_spanish_reading: El que exhala verdad declara justicia, pero el testigo falso, engaño.
  alternative_spanish_readings:
  - El que exhala verdad declara rectitud, pero el testigo falso, engaño.
  - El que exhala verdad declara lo correcto, pero el testigo falso, engaño.
  rationale: El verso contrapone testimonio veraz con testimonio falso en un marco moral-jurídico. «Justicia» mantiene la fuerza de צֶדֶק y conserva el contraste con la mentira sin cerrar indebidamente el sentido a una sola categoría doctrinal.
  doctrine_reference: Sabiduría bíblica / ética del testimonio veraz
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando notas al pie no ancladas en el texto. Esta versión integra las alternativas léxicas solo en los campos de decisión, sin marcar notas en la línea de traducción.
  spanish_consistency_notes:
  - Se mantuvo un estilo breve y proverbial, acorde con la tersura del hebreo.
  - No se usó «SEÑOR» ni terminología litúrgica ajena al texto, porque aquí no aparece el nombre divino.
  - «Testigo falso» conserva la construcción adjetival del hebreo y evita ampliar el sentido a una acusación más fuerte que la del original.
  - La elipsis final se refleja con una coma antes de «engaño», siguiendo el paralelismo breve del hebreo.
