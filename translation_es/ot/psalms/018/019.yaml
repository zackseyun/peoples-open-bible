translation:
  language: es
  text: Me salieron al encuentro en el día de mi calamidad[a], pero Yahvé fue mi apoyo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Vinieron sobre mí» o «Me encontraron» en el día de mi calamidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְקַדְּמוּנִי
  english_pob_choice: They confronted me
  chosen_spanish: Me salieron al encuentro
  alternatives_spanish:
  - Me confrontaron
  - Me encontraron
  - Me atacaron primero
  lexicon: HALOT
  rationale: El verbo קדמ en piel con sufijo de 1ª persona puede expresar venir al encuentro, adelantarse o enfrentarse. En este contexto hostil, el español necesita conservar la idea de un encuentro adversarial sin volverlo más violento de lo que el hebreo exige. "Me salieron al encuentro" comunica oposición y cercanía de manera natural en español.
- source_word: בְּיוֹם
  english_pob_choice: in the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - el día de
  - el día en que
  lexicon: HALOT
  rationale: La preposición temporal básica se mantiene de forma directa. "En el día de" preserva la construcción hebrea y funciona con registro bíblico claro en español.
- source_word: אֵידִי
  english_pob_choice: my calamity
  chosen_spanish: mi calamidad
  alternatives_spanish:
  - mi desastre
  - mi angustia
  - mi ruina
  lexicon: HALOT
  rationale: אֵיד denota calamidad, desastre o ruina. "Calamidad" conserva el valor amplio y poético del término, sin reducirlo solo a un estado emocional.
- source_word: וַיְהִי
  english_pob_choice: but ... was
  chosen_spanish: pero ... fue
  alternatives_spanish:
  - y ... fue
  - y ... era
  - y ... resultó ser
  lexicon: HALOT
  rationale: Aunque la forma verbal puede avanzar narrativamente con "y fue", el sentido global es contrastivo frente a la primera cola. En español, "pero fue" transmite mejor esa oposición y mantiene la cópula sencilla del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino con la forma española establecida por el proyecto: "Yahvé". Esto evita sustituir el Tetragrámaton por un título y sigue la decisión doctrinal del POB.'
- source_word: לְמִשְׁעָן
  english_pob_choice: my support
  chosen_spanish: mi apoyo
  alternatives_spanish:
  - mi sostén
  - mi soporte
  - mi amparo
  lexicon: HALOT
  rationale: מִשְׁעָן es algo sobre lo cual uno se apoya. "Apoyo" es idiomático y claro en español, y conserva la metáfora de sostén sin cargarla con una imagen demasiado concreta como "bastón" o "vara".
- source_word: לִי
  english_pob_choice: for me / my
  chosen_spanish: mi
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: 'El ל puede expresar relación de beneficio o pertenencia. En español, la posesión resulta más natural en esta frase: "mi apoyo".'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo la política del POB, el español debe conservar el nombre propio divino en vez de reemplazarlo por un título reverencial. "Yahvé" es la forma elegida para el texto principal en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: El contexto inglés muestra acuerdo alto y sin revisiones aplicadas; la redacción española sigue de cerca las decisiones léxicas auditadas, ajustando solo la forma natural del español y manteniendo la tensión adversarial de יְקַדְּמוּנִי junto con el contraste de וַיְהִי.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «Calamidad» conserva el registro poético y amplio de אֵיד.
  - La cola final mantiene una relación de apoyo/sostén, evitando un término más técnico o demasiado concreto.
