    reason: lexical_alternative
  revision_rationale: Se corrigen las notas para que coincidan con el audit trail del POB y con sus anclajes en el texto. Se cambia 'diseño' por 'plano' para reflejar mejor el sentido arquitectónico de תָּכְנִית en español, y 'y midan' por 'y que midan' para una exhortación más natural y clara.
