translation:
  language: es
  text: Bienaventurado el hombre cuyo corazón está dispuesto a invocar el nombre del Señor[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «invocar el nombre del Señor».
    reason: lexical_alternative
  - marker: b
    text: «El hombre» traduce una forma griega masculina singular usada aquí con valor representativo; alternativamente, «la persona».
    reason: lexical_alternative
lexical_decisions:
- source_word: Μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: BDAG
  rationale: «Bienaventurado» conserva el tono solemne de bienaventuranza y la cadencia sapiencial del griego mejor que «feliz»; «dichoso» también es posible, pero suena un poco menos formal en este registro.
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - uno
  lexicon: BDAG
  rationale: El singular masculino griego se mantiene con «el hombre», que preserva la forma representativa y el tono proverbial del dicho. «La persona» suavizaría la marca gramatical del original.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - mente
  lexicon: BDAG
  rationale: «Corazón» reproduce el modismo bíblico para la sede de la disposición interior sin explicitarlo en exceso.
- source_word: ἑτοίμη
  english_pob_choice: ready
  chosen_spanish: está dispuesto
  alternatives_spanish:
  - está preparado
  - está listo
  lexicon: BDAG
  rationale: «Está dispuesto» expresa mejor en español la disponibilidad interior para la acción que un simple «está listo», y mantiene el sentido de preparación del adjetivo.
- source_word: ἐπικαλέσασθαι
  english_pob_choice: to call on
  chosen_spanish: invocar
  alternatives_spanish:
  - llamar sobre
  - llamar a
  lexicon: BDAG
  rationale: En contexto bíblico, «invocar» comunica con precisión la acción religiosa de apelar al nombre divino. La POB inglesa deja abierta la alternativa «invoke»; en español, «invocar» es natural y auditable.
- source_word: τὸ ὄνομα
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - la autoridad
  - la reputación
  lexicon: BDAG
  rationale: Se conserva la expresión literal por su peso teológico y bíblico; no se sustituye por una paráfrasis interpretativa.
- source_word: Κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de Yahvé
  lexicon: BDAG
  rationale: Aunque el proyecto suele renderizar יהוה como «Yahvé», aquí el griego cita Κυρίου y la POB inglesa mantiene «the Lord»; por eso se conserva «el Señor» como equivalente natural y consistente con la forma griega recibida.
theological_decisions:
- issue: Tratamiento de Κυρίου en una cita/eco griego del nombre divino
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: El texto griego usa Κυρίου sin señal explícita de que deba desambiguarse hacia el tetragrámaton en esta línea. Dado que la lectura auditada en inglés también mantiene «Lord», el español sigue esa decisión para no introducir una afirmación más fuerte que la del testimonio disponible.
  doctrine_reference: Nombre divino / traducción de κύριος
- issue: Valor representativo del singular masculino ἀνὴρ
  english_pob_reading: '''Man'' renders a masculine singular Greek form used here in a representative sense; alternatively, ''person.'''
  chosen_spanish_reading: «el hombre» conserva la forma masculina representativa; alternativamente, «la persona».
  alternative_spanish_readings:
  - la persona
  rationale: Se mantiene la huella formal del singular masculino, sin excluir el sentido general inclusivo del proverbio. En español, «el hombre» sigue siendo la forma más directa para reflejar la señal gramatical del original.
  doctrine_reference: Gramática representativa / estilo sapiencial
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto griego de Swete 1909 y con el audit trail inglés; no se observan revisiones aplicadas ni tensiones textuales adicionales en la fuente proporcionada.
  spanish_consistency_notes:
  - Se conserva el registro sapiencial/beatitud con «Bienaventurado».
  - Se mantiene «Señor» para Κυρίου por fidelidad a la lectura griega auditada y coherencia con el inglés POB.
  - La nota alternativa sobre «invocar» se ancla en el verbo principal para reflejar la opción lexical documentada en el inglés.
