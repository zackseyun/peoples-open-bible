translation:
  language: es
  text: Yahvé se mantuvo vigilante sobre las calamidades y las trajo sobre nosotros[a], porque Yahvé es justo en todas las obras que nos ha mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los males» o «las desgracias». El griego κακά aquí probablemente se refiere a calamidades de juicio, no al mal moral en abstracto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγρηγόρησεν
  english_pob_choice: kept watch over
  chosen_spanish: estuvo alerta ante
  alternatives_spanish:
  - veló sobre
  - estuvo vigilante ante
  - mantuvo vigilancia sobre
  lexicon: LSJ
  rationale: El verbo griego expresa estar despierto/vigilante. En este contexto judicial, «estuvo alerta ante» conserva la imagen de vigilancia activa sin sugerir aprobación del mal. Evita un calco rígido y suena natural en español bíblico moderno.
- source_word: ἐπὶ τοῖς κακοῖς
  english_pob_choice: over the calamities
  chosen_spanish: ante las calamidades
  alternatives_spanish:
  - sobre los males
  - sobre las desgracias
  - ante los males
  lexicon: LSJ
  rationale: κακά puede significar «males» o «calamidades». Dado que el contexto habla de juicio y de que Yahvé las trajo sobre el pueblo, «calamidades» comunica mejor desastres punitivos que mal moral abstracto. «Ante» ayuda a mantener el matiz de vigilancia respecto de esos eventos.
- source_word: ἐπήγαγε
  english_pob_choice: brought
  chosen_spanish: las trajo
  alternatives_spanish:
  - las hizo venir
  - las hizo caer
  - las trajo sobre nosotros
  lexicon: LSJ
  rationale: El verbo significa traer o hacer venir sobre alguien. Como el complemento «sobre nosotros» ya está expreso en español por el contexto inmediato, «las trajo» es conciso y fiel, manteniendo la idea de acción divina de juicio.
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - recto en su justicia
  - righteous
  lexicon: LSJ
  rationale: Para este lugar, la fuerza es la rectitud/justicia moral de Yahvé al juzgar. En español, «justo» preserva bien ese valor y evita una redundancia menos natural si se repitiera «justicia» en la misma cláusula.
- source_word: ἐπὶ πάντα τὰ ἔργα αὐτοῦ
  english_pob_choice: in all the works
  chosen_spanish: en todas las obras
  alternatives_spanish:
  - sobre todas sus obras
  - respecto de todas las obras
  - en todos sus hechos
  lexicon: LSJ
  rationale: La preposición aquí expresa esfera o respecto. «En todas las obras» suena natural en español y refleja el alcance total de la afirmación sin introducir una relación espacial innecesaria.
- source_word: ἃ ἐνετείλατο ἡμῖν
  english_pob_choice: that he has commanded us
  chosen_spanish: que nos ha mandado
  alternatives_spanish:
  - que nos ordenó
  - que nos encomendó
  - que nos había mandado
  lexicon: LSJ
  rationale: El relativo refiere a las obras/mandatos dados por Dios al pueblo. «Nos ha mandado» refleja con claridad la acción completada con relevancia presente y conserva el sentido normativo del mandato divino. «Mandó» sería posible, pero el perfecto español acompasa mejor el valor de la versión inglesa revisada.
theological_decisions:
- issue: Cómo traducir κακά atribuidos a la acción de Yahvé sin sugerir mal moral en Dios
  english_pob_reading: calamities rather than moral evil
  chosen_spanish_reading: calamidades de juicio, no mal moral abstracto
  alternative_spanish_readings:
  - males
  - desastres
  - maldades
  rationale: El contexto de Baruc 2:9 es de castigo pactal. Por eso, como en el inglés POB, se evita una lectura que haga de Dios el autor del mal moral. «Calamidades» preserva el sentido de juicio y mantiene la tensión textual sin suavizarla.
  doctrine_reference: Baruc 2:9; doctrina de la justicia divina en el juicio
- issue: Cómo reflejar δίκαιος aplicado a Yahvé
  english_pob_reading: righteous
  chosen_spanish_reading: justo
  alternative_spanish_readings:
  - recto
  - justo en sus obras
  rationale: La tradición de términos δικ- suele oscilar entre «justo» y «recto/righteous». Aquí «justo» comunica con claridad que Yahvé actúa con rectitud al ejecutar el juicio. La formulación no disuelve la tensión, sino que la explica teológicamente dentro del marco del texto.
  doctrine_reference: Baruc 2:9; justicia/rectitud divina
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que corrigió «his works» por «the works» y añadió el matiz perfecto en «has commanded». La versión española refleja ese ajuste con «en todas las obras» y «nos ha mandado», evitando atribuir las obras a Yahvé como posesión exclusiva cuando el griego enfatiza el ámbito de sus obras/mandatos.
  spanish_consistency_notes:
  - Se mantiene Yahvé para Κύριος según la pauta del proyecto.
  - Se eligió «justo» para δίκαιος en la línea de la nota inglesa «righteous/just», con nota alternativa para la variante.
  - «Calamidades» evita traducir κακά como mal moral y conserva el valor de juicio.
  - El pronombre «las» retoma naturalmente «las calamidades» en español y mantiene cohesión textual.
