review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del hebreo: el participio descriptivo aplicado a Dios, la tríada creadora ''cielos/tierra/mar'', el alcance total de ''todo lo que hay en ellos'' y la duración ''para siempre''. Sin embargo, en אֱמֶת el borrador se aparta de la decisión documentada del POB en inglés, que privilegia el sentido relacional de confiabilidad/fidelidad y deja ''truth'' solo como alternativa en nota. En español, ''guardar la verdad'' suena menos natural y desplaza el sentido principal del contexto.'
  spanish_quality_summary: El español es claro y legible, pero 'el que guarda la verdad para siempre' resulta algo rígido y menos idiomático en este contexto de alabanza. 'Mantiene su fidelidad para siempre' o 'guarda la fidelidad para siempre' comunica mejor la confiabilidad duradera de Dios. También conviene ajustar la nota para que la lectura principal y la alternativa queden alineadas con la evidencia y con el audit trail.
  glossary_alignment: 'No hay conflicto con los términos globales principales. La única desalineación relevante es semántica/teológica en אֱמֶת: el proyecto inglés documenta ''faithfulness/faith'' como lectura principal, con ''truth'' preservado en nota. El español debería seguir esa priorización con ''fidelidad'' como texto principal y ''verdad'' como alternativa.'
  issues:
  - severity: high
    issue: Lectura principal de אֱמֶת como 'la verdad'
    rationale: La evidencia léxica y la decisión teológica del POB favorecen aquí 'fidelidad/confiabilidad' en combinación con הַשֹּׁמֵר ... לְעוֹלָם. 'La verdad' es posible, pero no debe ocupar el texto principal cuando el audit trail ya estableció el matiz principal contrario.
  - severity: medium
    issue: Expresión española 'guarda la verdad'
    rationale: Aunque comprensible, en español suena menos natural y menos precisa para describir la constancia del carácter divino. 'Mantiene su fidelidad' o 'guarda la fidelidad' fluye mejor en registro bíblico moderno.
  - severity: low
    issue: Contenido de la nota al pie
    rationale: La nota actual justifica 'verdad' como opción principal por 'alcance léxico abierto', pero eso invierte la priorización documentada. Debe presentar 'verdad' como alternativa legítima, no como lectura principal preferida.
  revised_spanish_text: el que hizo los cielos y la tierra[a], el mar y todo lo que hay en ellos, el que mantiene su fidelidad para siempre.
  revised_footnotes:
  - marker: a
    text: O 'el que mantiene la verdad para siempre'. El hebreo אֱמֶת puede significar 'verdad' o 'fidelidad'; aquí 'fidelidad' expresa mejor la idea de confiabilidad duradera.
    reason: lexical_alternative
  revision_rationale: 'Se cambia ''la verdad'' por ''su fidelidad'' para reflejar la decisión léxica y teológica documentada del POB: אֱמֶת aquí apunta principalmente a la confiabilidad perdurable de Dios, no a una abstracción proposicional. ''Mantiene su fidelidad'' además suena más natural en español que ''guarda la verdad''. La nota conserva ''verdad'' como alternativa léxica legítima.'
