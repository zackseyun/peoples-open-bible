translation:
  language: es
  text: Porque lo poco que tenías antes de mí ha crecido hasta abundancia, y Yahvé te ha bendecido a mi paso[a]. Y ahora[b], ¿cuándo proveeré yo también para mi propia casa?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «a mi pie»; el giro probablemente significa «con mi llegada» o «por mi causa».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿cuándo haré yo también algo para mi propia casa?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: מְעַט
  english_pob_choice: the little
  chosen_spanish: lo poco
  alternatives_spanish:
  - poco
  - la poca cosa
  lexicon: HALOT
  rationale: En contexto se refiere a la pequeña cantidad de bienes que Laban tenía; «lo poco» suena natural y conserva la idea de cantidad reducida sin añadir matiz.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: antes de mí
  alternatives_spanish:
  - delante de mí
  - en mi presencia
  lexicon: HALOT
  rationale: La preposición expresa la situación anterior a la llegada o presencia de Jacob; «antes de mí» mantiene la relación temporal/posicional sin volverlo interpretativo.
- source_word: וַיִּפְרֹץ לָרֹב
  english_pob_choice: has increased to abundance
  chosen_spanish: ha crecido hasta abundancia
  alternatives_spanish:
  - ha aumentado hasta abundancia
  - se ha multiplicado en gran abundancia
  - ha brotado en abundancia
  lexicon: HALOT
  rationale: El verbo פרץ comunica expansión o irrupción de crecimiento, y לָרֹב señala abundancia; «ha crecido hasta abundancia» intenta conservar ambos elementos sin perder fluidez.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se aplica el término base del proyecto para el nombre divino en español. «Yahvé» es la forma tradicional y legible en español para YHWH, coherente con la política del proyecto.
- source_word: לְרַגְלִי
  english_pob_choice: at my foot
  chosen_spanish: a mi pie
  alternatives_spanish:
  - a mi paso
  - a mis pies
  - por mi causa
  lexicon: HALOT
  rationale: El hebreo es literalmente «a/por mi pie». Se conserva la metáfora más cercana con «a mi pie» para no ocultar la tensión idiomática documentada por el auditorio inglés.
- source_word: מָתַי
  english_pob_choice: when shall
  chosen_spanish: ¿cuándo haré yo también
  alternatives_spanish:
  - ¿cuándo también haré
  - ¿cuándo podré yo también hacer
  lexicon: HALOT
  rationale: La pregunta temporal introduce el deseo de empezar a actuar para su propio hogar; en español conviene expresar el verbo implícito en la frase siguiente con naturalidad, sin borrar la interrogación de tiempo.
- source_word: אֶעֱשֶׂה ... לְבֵיתִי
  english_pob_choice: shall I also provide for my own household
  chosen_spanish: para mi propia casa
  alternatives_spanish:
  - por mi propia casa
  - para mi casa
  - para mi familia
  lexicon: HALOT
  rationale: עשה con «casa» puede implicar atender, procurar o proveer para el hogar. Se mantiene la expresión más literal «para mi propia casa» y se deja la fuerza idiomática abierta, como en la nota inglesa.
- source_word: גַם אָנֹכִי
  english_pob_choice: I also
  chosen_spanish: yo también
  alternatives_spanish:
  - también yo
  - yo asimismo
  lexicon: HALOT
  rationale: 'La partícula enfatiza contraste: después de haber servido a Laban, Jacob desea también atender a su propia casa. «Yo también» es el giro más natural en español.'
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se mantiene la política del proyecto de no ocultar el nombre propio divino. «Yahvé» es la forma estándar en español y evita la sustitución litúrgica por «SEÑOR», que la consigna explícitamente desaconseja aquí.
  doctrine_reference: Política del proyecto para יְהוָה / YHWH
translation_notes:
  revision_awareness: El borrador sigue de cerca la revisión más reciente del inglés POB, conservando la decisión de hacer explícito el crecimiento «hasta abundancia» y de traducir el nombre divino como Yahvé/Yahweh según la política del proyecto, mientras mantiene la expresión idiomática de לְרַגְלִי como frase literal con nota.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יְהוָה, en coherencia con el estándar del proyecto.
  - Se mantiene una dicción sobria y pública, evitando un calco excesivamente rígido salvo donde el hebreo requiere transparencia idiomática.
  - «Casa» se usa en sentido de hogar/household, dejando la nota para la lectura alternativa de provisión.
  - Las comillas y la interrogación siguen la puntuación española estándar.
