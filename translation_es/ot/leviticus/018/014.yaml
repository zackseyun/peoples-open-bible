  - severity: low
    issue: La racionalidad léxica del borrador defiende un calco poco idiomático
    rationale: Aunque busca transparencia al hebreo, en este caso el calco no conserva claridad genealógica en español. La traducción debe priorizar fidelidad inteligible, no literalismo defectuoso.
