review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura general del proverbio: un rey en función judicial que separa el mal mediante su discernimiento. Sin embargo, no preserva del todo el rastro de notas del POB inglés: fusiona dos notas distintas en un solo marcador no permitido (''ab'') y omite la alternativa de כָּל רָע como ''todo malvado'' / ''toda persona malvada''. Además, ''avienta'' es entendible pero ''aventea'' expresa con más precisión el tecnicismo agrícola equivalente a ''winnows''.'
  spanish_quality_summary: El texto es legible y digno. 'Un rey sentado sobre un trono de juicio' suena natural. 'Con sus ojos' conserva bien la imagen hebrea. La principal mejora de estilo y precisión está en usar 'aventea' en vez de 'avienta', y en corregir el sistema de notas para cumplir el formato del proyecto.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones clave concuerdan en general con el expediente inglés: ''Un rey'', ''sentado'', ''trono de juicio'', y ''con sus ojos'' son apropiados. Debe preservarse mejor la metáfora agrícola de מְזָרֶה y la amplitud semántica de כָּל רָע mediante dos notas separadas.'
  issues:
  - severity: medium
    issue: Marcador de nota inválido y fusión indebida de dos notas
    rationale: El proyecto exige marcadores únicos en orden (a, b, c...) y que cada marcador aparezca en el texto. '[ab]' no cumple y además mezcla la nota léxica sobre מְזָרֶה con la alternativa semántica de כָּל רָע que el POB inglés sí conserva.
  - severity: medium
    issue: Se omitió la alternativa de כָּל רָע
    rationale: El inglés documenta que כָּל רָע puede referirse a 'all evil' o 'every evil person'. El español debe preservar esa amplitud con una nota, especialmente porque 'toda maldad' favorece la lectura abstracta.
  - severity: low
    issue: '''Avienta'' es menos preciso que ''aventea'' para la imagen de aventar/granear'
    rationale: Ambas formas existen en algunos usos, pero 'aventea' refleja más claramente la metáfora agrícola equivalente a 'winnows' y evita que 'avienta' se lea simplemente como 'arroja'.
  revised_spanish_text: Un rey sentado sobre un trono de juicio aventea[a] toda maldad[b] con sus ojos.
