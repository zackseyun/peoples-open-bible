translation:
  language: es
  text: 'Hagan esto: tomen para ustedes[a] incensarios[b], Coré y toda su congregación[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para ustedes mismos». El hebreo añade un matiz reflexivo o de uso propio.
    reason: lexical_alternative
  - marker: b
    text: O «braseros». El término hebreo se refiere a recipientes para transportar brasas, especialmente en ritos de incienso.
    reason: lexical_alternative
  - marker: c
    text: O «toda su asamblea» o «toda su compañía».
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת / עֲשׂוּ
  english_pob_choice: Do this
  chosen_spanish: Haz esto
  alternatives_spanish:
  - Hagan esto
  - Hagan tal cosa
  lexicon: HALOT
  rationale: La combinación demostrativo + imperativo se expresa con naturalidad en español como una orden directa. «Haz esto» conserva la deíxis del hebreo sin volverla rígidamente literal.
- source_word: קְחוּ
  english_pob_choice: take
  chosen_spanish: tomen
  alternatives_spanish:
  - tomen y lleven
  - tomen para sí
  lexicon: HALOT
  rationale: El imperativo plural de לקח pide un verbo directo. «Tomen» reproduce la acción mandada y funciona bien en un registro bíblico moderno.
- source_word: לָכֶם
  english_pob_choice: for yourselves
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para sí
  - para ustedes mismos
  lexicon: HALOT
  rationale: La preposición con pronombre añade matiz reflexivo/de beneficio. En español, «para ustedes» conserva ese valor sin forzar una forma marcadamente reflexiva que suene pesada; el contexto ya implica que los incensarios serán para su propio uso.
- source_word: מַחְתּוֹת
  english_pob_choice: censers
  chosen_spanish: incensarios
  alternatives_spanish:
  - braseros
  - palas para el fuego
  lexicon: HALOT
  rationale: El término hebreo designa recipientes para brasas en rito de incienso. «Incensarios» es el equivalente culto y entendible en español; «braseros» o «palas para el fuego» pueden sugerirse, pero son menos precisos para este contexto ritual.
- source_word: קֹרַח
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: Transliteración bíblica tradicional en español
  rationale: Se usa la forma bíblica asentada en español para el nombre propio. Mantiene identificabilidad y fluidez eclesial.
- source_word: וְכָל עֲדָתוֹ
  english_pob_choice: and all his congregation
  chosen_spanish: y toda su congregación
  alternatives_spanish:
  - y toda su asamblea
  - y toda su compañía
  lexicon: HALOT
  rationale: עֵדָה puede ser «asamblea» o «congregación». Aquí «congregación» reproduce bien el grupo reunido en torno a Coré y coincide con el tono comunitario/cultual del pasaje. El sufijo singular queda reflejado en «su».
theological_decisions:
- issue: Sentido de la prueba ritual implícita en el mandato
  english_pob_reading: 'Do this: take censers for yourselves, Korah and all his congregation.'
  chosen_spanish_reading: 'Haz esto: tomen para ustedes incensarios, Coré y toda su congregación.'
  alternative_spanish_readings:
  - 'Hagan esto: tomen para ustedes incensarios, Coré y toda su asamblea.'
  - 'Haz esto: tomen para ustedes incensarios, Coré y toda su compañía.'
  rationale: El versículo presenta una instrucción judicial/ritual, no una exhortación general. La traducción conserva el imperativo breve y el léxico cultual sin añadir explicación doctrinal no presente en el texto.
  doctrine_reference: Números 16:6 en su contexto narrativo-ritual
translation_notes:
  revision_awareness: El pasaje inglés POB fue revisado y se mantuvo sin cambios en su última pasada. La lectura base sigue siendo de alta concordancia con el hebreo; las únicas tensiones relevantes son la naturalidad de «for yourselves» y la elección del término ritual para מַחְתּוֹת.
  spanish_consistency_notes:
  - Se prefirió «Coré» como forma española tradicional del nombre propio.
  - Se evitó «SEÑOR» o terminología de máscara divina porque no aparece ningún nombre divino en este versículo.
  - «Congregación» conserva el matiz colectivo del sustantivo hebreo sin volverlo eclesiástico en exceso.
