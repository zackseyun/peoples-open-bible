translation:
  language: es
  text: Y ahora yo he entregado todas estas tierras en mano de Nabucodonosor, rey de Babilonia[a], mi siervo[b]; y también le he entregado las bestias del campo para que le sirvan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Nabucadrezar', reflejando otra transliteración común del nombre del rey.
    reason: lexical_alternative
  - marker: b
    text: '''Mi siervo'' significa que Nabucodonosor está siendo usado como instrumento de Dios, no que se apruebe moralmente su conducta.'
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la fuerza conectiva de ו y el valor temporal de עַתָּה como marcador discursivo que introduce una declaración presente.
- source_word: אָֽנֹכִי
  english_pob_choice: I
  chosen_spanish: yo
  lexicon: HALOT
  rationale: El pronombre independiente se mantiene explícito para reproducir el énfasis de la primera persona del hablante divino.
- source_word: נָתַתִּי
  english_pob_choice: have given
  chosen_spanish: he entregado
  alternatives_spanish:
  - he dado
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una acción ya realizada con relevancia presente en el anuncio profético. 'Entregado' comunica bien la idea de poner bajo control o dominio; 'he dado' también sería posible, pero es menos específico.
- source_word: כָּל הָאֲרָצוֹת הָאֵלֶּה
  english_pob_choice: all these lands
  chosen_spanish: todas estas tierras
  alternatives_spanish:
  - todas estas tierras/países
  - todas estas naciones
  lexicon: HALOT
  rationale: '''Tierras'' reproduce con naturalidad el alcance territorial de אֲרָצוֹת sin imponer una lectura moderna de ''países''. En este contexto el referente es geopolítico, pero el español ''tierras'' mantiene la amplitud del hebreo.'
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - en la mano de
  lexicon: HALOT
  rationale: La locución hebrea expresa transferencia de dominio o control. 'En mano de' conserva la imagen bíblica y resulta idiomática en español; 'en poder de' explicita el sentido pero pierde el giro original.
- source_word: נְבוּכַדְנֶאצַּר
  english_pob_choice: Nebuchadnezzar
  chosen_spanish: Nabucodonosor
  alternatives_spanish:
  - Nebucodonosor
  - Nebucadrezar
  lexicon: HALOT
  rationale: Se adopta la transliteración española habitual y reconocible. El POB inglés nota la variante Nebuchadrezzar; en español puede expresarse como alternativa histórica sin alterar el texto principal.
- source_word: מֶלֶךְ בָּבֶל
  english_pob_choice: king of Babylon
  chosen_spanish: rey de Babilonia
  lexicon: HALOT
  rationale: Correspondencia directa del título y del reino, conservando la estructura del hebreo.
- source_word: עַבְדִּי
  english_pob_choice: my servant
  chosen_spanish: mi esclavo
  alternatives_spanish:
  - mi siervo
  lexicon: HALOT
  rationale: Se preserva la fuerza lexical de עבד como 'esclavo', coherente con la política de traducción de la POB cuando el término porta peso semántico fuerte. Aquí el matiz teológico es de instrumento al servicio de Yahvé; 'siervo' suavizaría ese valor. La tensión entre estatus social y comisión divina se mantiene en la nota.
- source_word: וְגַם
  english_pob_choice: and ... also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  lexicon: HALOT
  rationale: Transmite el valor aditivo de la partícula conjuntiva-compuesta y mantiene la progresión de la afirmación.
- source_word: חַיַּת הַשָּׂדֶה
  english_pob_choice: the beasts of the field
  chosen_spanish: las bestias del campo
  alternatives_spanish:
  - los animales del campo
  - las fieras del campo
  lexicon: HALOT
  rationale: '''Bestias del campo'' preserva la expresión colectiva tradicional y su amplitud semántica, sin restringirla a una sola especie o categoría zoológica.'
- source_word: לְעָבְדוֹ
  english_pob_choice: to serve him
  chosen_spanish: para que le sirvan
  alternatives_spanish:
  - para servirle
  - a fin de que le sirvan
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo expresa propósito o resultado. 'Para que le sirvan' hace explícita la finalidad en español y conserva el sentido relacional de sujeción/servicio.
theological_decisions:
- issue: Título divino aplicado a Nabucodonosor como agente de Yahvé
  english_pob_reading: my servant
  chosen_spanish_reading: mi esclavo
  alternative_spanish_readings:
  - mi siervo
  rationale: El texto atribuye a Nabucodonosor una función instrumental bajo la soberanía de Yahvé. En español, 'esclavo' mantiene la crudeza del hebreo עבד y evita suavizar la afirmación; no implica aprobación moral, sino instrumento designado. La alternativa 'siervo' sería más eufónica, pero atenúa el peso lexical.
  doctrine_reference: Jeremías 27:6; principio POB sobre conservación de tensiones léxicas y teológicas
- issue: Imagen de dominio en 'en mano de'
  english_pob_reading: into the hand of
  chosen_spanish_reading: en mano de
  alternative_spanish_readings:
  - en poder de
  rationale: La imagen corporal del hebreo expresa control soberano conferido por Dios. Mantenerla evita una paráfrasis explicativa excesiva y conserva el lenguaje bíblico de dominio y entrega.
  doctrine_reference: Jeremías 27:6; principio POB sobre imágenes idiomáticas conservadas cuando son transparentes
translation_notes:
  revision_awareness: 'El texto inglés más reciente permanece sin cambios tras la revisión; el consenso de auditoría es alto. La versión española sigue de cerca ese trazado, pero adapta algunos puntos para un español natural: ''he entregado'' para el perfecto profético, ''en mano de'' para la imagen hebrea, y ''mi esclavo'' para no diluir la tensión léxica documentada en עבד.'
  spanish_consistency_notes:
  - Se mantiene Yahvé en las decisiones teológicas como nombre divino implícito en la voz profética, aunque no aparece explícito en este versículo.
  - '''En mano de'' y ''para que le sirvan'' respetan la imaginería y el propósito del hebreo sin recargar la sintaxis.'
  - Se usa 'Babilonia' como topónimo y 'rey de Babilonia' como título estable y natural en español.
  - No se introduce 'Cristo', 'SEÑOR' ni 'siervo' como sustitutos blandos donde el POB documenta una tensión lexical significativa.
