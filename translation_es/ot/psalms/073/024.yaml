review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura hebrea: בַּעֲצָתְךָ = «con tu consejo», תַנְחֵנִי = «me guías», וְאַחַר = «y después». También preserva la ambigüedad de כָּבוֹד mediante una nota alternativa. Sin embargo, «me recibirás para gloria» no suena idiomático en español y no reproduce con suficiente naturalidad la decisión auditada del POB inglés «receive me to glory».'
  spanish_quality_summary: El texto es claro y digno, pero la frase final necesita ajuste de legibilidad. En español bíblico natural, «me recibirás en gloria» comunica mejor la recepción en una condición/esfera gloriosa sin forzar la sintaxis ni sobreinterpretar tanto como «me llevarás a la gloria».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Consejo», «guías» y «gloria» están bien elegidos. La alternativa «con honor» en nota también está bien preservada.
  issues:
  - severity: medium
    issue: «me recibirás para gloria» es poco idiomático en español
    rationale: Aunque intenta calcar la apertura de «to glory», en español suena forzado y menos claro. «En gloria» conserva el tono elevado y la apertura escatológica con mejor legibilidad.
  revised_spanish_text: Con tu consejo me guías[a], y después me recibirás en gloria.
  revised_footnotes:
  - marker: a
    text: O «me recibirás con honor».
    reason: alternative_reading
  revision_rationale: 'Se ajusta únicamente la frase final para que el español sea más natural y eclesialmente legible, manteniendo la misma decisión teológica básica del POB: una recepción futura asociada con «gloria» sin cerrar del todo la ambigüedad de כָּבוֹד. La nota con «con honor» sigue preservando la alternativa documentada.'
