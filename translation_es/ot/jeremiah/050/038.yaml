translation:
  language: es
  text: Una sequía[a] está contra sus aguas, y se secarán, porque es una tierra de ídolos tallados, y se vuelven locos por cosas aterradoras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, ‘una espada’. El hebreo חֹרֶב puede aludir a ‘sequía/aridez’ o a ‘espada’, y el versículo parece aprovechar esa tensión en torno al secamiento de las aguas.
    reason: lexical_alternative
  - marker: b
    text: O, ‘por terrores’ / ‘por ídolos temibles’. El hebreo puede referirse de modo general a cosas aterradoras o, en contexto, específicamente a ídolos temibles.
    reason: alternative_reading
lexical_decisions:
- source_word: חֹרֶב
  english_pob_choice: A drought
  chosen_spanish: Una sequía
  alternatives_spanish:
  - Una espada
  - Una sequía / una espada
  lexicon: HALOT
  rationale: En este contexto, חֹרֶב puede designar sequía, aridez o, por extensión profética, espada. El texto inglés del POB revisado privilegia ‘drought’ por la referencia inmediata a las aguas que se secan; por eso en español se traduce como ‘sequía’, preservando el vínculo semántico con el secamiento y sin perder la posibilidad de una alusión doble.
- source_word: אֶל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - hacia
  lexicon: HALOT
  rationale: Con un sustantivo de juicio como חֹרֶב, la preposición se vuelve idiomática en español como ‘contra’, que expresa oposición o amenaza dirigida a las aguas.
- source_word: מֵימֶיהָ
  english_pob_choice: her waters
  chosen_spanish: sus aguas
  alternatives_spanish:
  - sus aguas de ella
  - las aguas de ella
  lexicon: HALOT
  rationale: El sufijo femenino singular se mantiene naturalmente como ‘sus’, conservando la personificación de Babilonia/la ciudad o tierra sin forzar un posesivo explícito en español.
- source_word: וְיָבֵשׁוּ
  english_pob_choice: and they will dry up
  chosen_spanish: y se secarán
  alternatives_spanish:
  - y serán secadas
  - y se volverán secas
  lexicon: HALOT
  rationale: El verbo qal funciona de manera intransitiva con ‘aguas’ como sujeto; ‘se secarán’ transmite el proceso de manera fluida y fiel.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón del juicio; ‘porque’ es natural y claro en español.
- source_word: אֶרֶץ פְּסִלִים
  english_pob_choice: a land of carved idols
  chosen_spanish: una tierra de ídolos tallados
  alternatives_spanish:
  - una tierra de imágenes talladas
  - una tierra de ídolos esculpidos
  lexicon: HALOT
  rationale: פְּסִלִים alude concretamente a imágenes talladas. ‘Ídolos tallados’ conserva la concreción material sin usar ‘imágenes de talla’ o ‘esculturas’ de forma más técnica o menos bíblica.
- source_word: הִיא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - ella es
  lexicon: HALOT
  rationale: En español, la cópula basta para reflejar la predicación nominal; repetir ‘ella’ suena forzado aunque el antecedente sea femenino.
- source_word: וּבָאֵימִים
  english_pob_choice: over terrifying things
  chosen_spanish: en cosas terribles
  alternatives_spanish:
  - sobre terrores
  - ante cosas terribles
  lexicon: HALOT
  rationale: אֵימִים puede referirse a terrores o a objetos/realidades terroríficas. ‘En cosas terribles’ conserva la amplitud del término y permite la posible referencia a ídolos temibles sin cerrar demasiado el sentido.
- source_word: יִתְהֹלָלוּ
  english_pob_choice: they are mad
  chosen_spanish: se enloquecen
  alternatives_spanish:
  - ravean
  - deliran
  - se comportan como locos
  lexicon: HALOT
  rationale: El forma hitpolel transmite conducta frenética o irracional. ‘Se enloquecen’ es formal, claro y preserva el matiz de desvarío que el POB inglés fijó como ‘are mad’.
theological_decisions:
- issue: Sentido de חֹרֶב en relación con las aguas
  english_pob_reading: The main text reads ‘A drought is against her waters,’ while preserving sword as a contextual alternative in the audit trail.
  chosen_spanish_reading: ‘Una sequía está contra sus aguas’
  alternative_spanish_readings:
  - ‘Una espada está contra sus aguas’
  - ‘Una sequía/espada está contra sus aguas’
  rationale: El hebreo permite una tensión real entre aridez y juicio bélico. Dado que la revisión más reciente del POB inglés corrigió el texto principal a ‘drought’ por precisión léxica, el español sigue esa lectura, pero la nota conserva la alternativa ‘espada’ para no borrar la ambigüedad profética documentada.
  doctrine_reference: 'Translation philosophy §3: preservar tensiones interpretativas genuinas'
- issue: Referencia de ‘ídolos tallados’ y ‘cosas terribles’
  english_pob_reading: ‘carved idols’ and ‘terrifying things’ preserve concrete idolatry while leaving the precise referent open.
  chosen_spanish_reading: ‘ídolos tallados’ y ‘cosas terribles’
  alternative_spanish_readings:
  - ‘imágenes talladas’ y ‘terrores’
  - ‘ídolos esculpidos’ y ‘objetos terribles’
  rationale: El pasaje no obliga a restringir ‘cosas terribles’ solo a imágenes; puede abarcar tanto los ídolos mismos como el ámbito de miedo que producen. La redacción española mantiene esa amplitud sin suavizar la crítica idolátrica.
  doctrine_reference: POB lexical transparency principle
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió la lectura principal de חֹרֶב de ‘sword’ a ‘drought’ y ajustó יִתְהֹלָלוּ de ‘rave’ a ‘are mad’ para mayor formalidad. El español sigue esa revisión, pero conserva en nota la alternativa de ‘espada’ para reflejar la ambigüedad léxica documentada.
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - ‘Ídolos tallados’ se prefirió sobre ‘imágenes grabadas’ para conservar concreción y naturalidad.
  - ‘Se enloquecen’ refleja el matiz de conducta irracional sin perder dignidad estilística.
  - La puntuación y el flujo sintáctico buscan ser publicables en español moderno sin borrar la estructura causal del hebreo.
