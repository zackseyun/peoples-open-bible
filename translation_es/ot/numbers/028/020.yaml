revisions:
- from: 'Y su ofrenda será flor de harina amasada con aceite: tres décimas para el becerro[a], y dos décimas para el carnero prepararéis.'
  to: 'Y su ofrenda de grano será flor de harina mezclada con aceite: tres décimas para el toro[a], y dos décimas para el carnero prepararéis.'
  rationale: Se ajusta מִנְחָה a un término sacrificial específico ('ofrenda de grano'), se acerca בְּלוּלָה a su sentido básico con 'mezclada', se corrige פַּר a 'toro' para mayor precisión contextual, y se conserva la nota cultural sobre las décimas del efá. No se requiere adjudicación especial porque son correcciones léxicas y estilísticas directas a partir de la evidencia dada.
