translation:
  language: es
  text: Vuelve hacia nosotros[a] tu misericordia, oh Dios, y ten compasión de nosotros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Vuelve tu misericordia sobre nosotros».
    reason: lexical_alternative
  - marker: b
    text: O «apiádate de nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπίστρεψον
  english_pob_choice: Turn
  chosen_spanish: Vuelve
  alternatives_spanish:
  - Turna
  - Dirige
  lexicon: BDAG
  rationale: El imperativo pide que Dios haga volver o dirija algo hacia los hablantes. «Vuelve» conserva la imagen de movimiento y suena natural en español oracional. «Dirige» sería posible, pero pierde la idea de retorno implícita en el verbo griego.
- source_word: τὸ ἔλεός σου
  english_pob_choice: mercy
  chosen_spanish: tu misericordia
  alternatives_spanish:
  - tu piedad
  - tu clemencia
  lexicon: BDAG
  rationale: ἔλεος denota misericordia o favor compasivo. «Misericordia» es el equivalente más directo y solemne en español bíblico, sin forzar un matiz distinto que el texto no exige.
- source_word: ἐφʼ ἡμᾶς
  english_pob_choice: toward us
  chosen_spanish: hacia nosotros
  alternatives_spanish:
  - sobre nosotros
  - para nosotros
  lexicon: BDAG
  rationale: La preposición con acusativo indica dirección hacia los peticionarios. «Hacia nosotros» preserva ese movimiento en un español natural; «sobre nosotros» sugiere un matiz que el griego no requiere necesariamente.
- source_word: οἰκτείρησον
  english_pob_choice: have compassion on
  chosen_spanish: ten compasión de
  alternatives_spanish:
  - apiádate de
  - mira con piedad a
  lexicon: BDAG
  rationale: El verbo expresa compasión/piedad ante la condición del otro. «Ten compasión de» reproduce bien la súplica reverente y evita repetir mecánicamente «misericordia».
translation_notes:
  revision_awareness: Texto revisado a partir del paquete griego de Swete (lxx-swete-1909) y del control de alta concordancia; se mantiene la estructura breve de súplica sin añadir contenido no sustentado por el original.
  spanish_consistency_notes:
  - Se mantiene «Dios» para ὁ θεός, conforme a la terminología POB.
  - Se evita «SEÑOR» porque el griego aquí usa θεός, no κύριος.
  - «Misericordia» y «compasión» conservan la distinción léxica entre ἔλεος y οἰκτείρησον.
  - La puntuación separa las dos peticiones, como en el griego.
