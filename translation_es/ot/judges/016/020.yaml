review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo y el audit trail inglés en casi todo: conserva el anuncio de Dalila, el despertar de Sansón, el ''saldré'', la recurrencia de כְּפַעַם בְּפַעַם y el apartamiento de Yahvé sin sobreexplicarlo. También respeta la política del proyecto al usar ''Yahvé''. El problema principal es la gestión de notas: la nota [a] está anclada en ''dijo'' pero su contenido trata de ''me sacudiré'', lo que no corresponde al inglés ni al lugar textual correcto. Además, la frase inicial ''Los filisteos sobre ti'' es demasiado calca y poco idiomática en español; conviene una formulación natural que conserve el sentido hostil inmediato.'
  spanish_quality_summary: El español general es claro y digno, pero requiere un ajuste menor de naturalidad en el grito directo y una corrección estructural de notas. '¡Los filisteos están sobre ti, Sansón!' o equivalente comunica bien la inminencia del ataque sin sonar truncado. El resto del verso lee con fluidez. Debe quedar una sola nota para 'me sacudiré' si se conserva la alternativa léxica.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה se vierte correctamente como ''Yahvé''; no hay conflictos con otros términos doctrinales. La decisión de ''me sacudiré'' para וְאִנָּעֵר es aceptable si la nota conserva la alternativa ''para librarme''.'
  issues:
  - severity: medium
    issue: La nota [a] está mal anclada y describe otra expresión.
    rationale: En el texto español, [a] aparece tras 'dijo', pero la nota explica 'me sacudiré / para librarme'. Esto desalinea texto y nota, y no refleja el audit trail inglés, donde la única nota alternativa corresponde a וְאִנָּעֵר.
  - severity: low
    issue: Hay duplicación innecesaria de notas léxicas sobre 'me sacudiré'.
    rationale: Las notas [a] y [b] tratan el mismo punto. Basta una sola nota bien anclada para evitar redundancia y mantener claridad editorial.
  - severity: low
    issue: '''¡Los filisteos sobre ti, Sansón!'' suena forzado en español.'
    rationale: Aunque busca conservar la viveza del hebreo, en español neutral resulta elíptico de manera poco natural. Añadir 'están' mantiene la inmediatez hostil con mejor legibilidad.
