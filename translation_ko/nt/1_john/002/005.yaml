  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὃς δ’ ἂν τηρῇ αὐτοῦ τὸν λόγον, ἀληθῶς ἐν τούτῳ ἡ ἀγάπη τοῦ θεοῦ τετελείωται. ἐν τούτῳ γινώσκομεν ὅτι ἐν αὐτῷ ἐσμεν·
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/005.yaml
  text: 'But whoever keeps his word[a], truly in him the love of God has been perfected[b]. By this we know that we are in him:'
  footnotes:
  - marker: a
    text: Or more literally, 'truly in this' or 'truly in this one.' The Greek phrase may point either to the person who keeps his word or to this matter as evidence.
    reason: alternative_reading
  - marker: b
    text: '''The love of God'' may mean God''s love in the believer or the believer''s love for God.'
    reason: alternative_reading
translation:
  language: ko
  text: '그러나 누구든지 그분의 말씀을 지키면, 그 사람 안에서 하나님의 사랑이 참으로 온전해졌습니다. 이로써 우리는 우리가 그분 안에 있음을 압니다:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τετελείωται
  english_pob_choice: has been perfected
  chosen_korean: 온전해졌습니다
  alternatives_korean:
  - 완성되었습니다
  - 성숙해졌습니다
  lexicon: BDAG
  rationale: τελειόω는 「목표·완성에 이르게 하다」. 1 요한서의 핵심어로 사랑이 그 의도된 목적에 도달함을 가리킨다. 「온전해졌다」가 한국어에서 그 완성의 의미를 자연스럽게 담는다.
- source_word: ἡ ἀγάπη τοῦ θεοῦ
  english_pob_choice: the love of God
  chosen_korean: 하나님의 사랑
  alternatives_korean:
  - 하나님께 대한 사랑
  lexicon: BDAG
  rationale: 주격적(하나님이 베푸시는 사랑)·목적격적(하나님에 대한 사랑) 두 해석이 가능 — 1 요한서는 둘 다 함의하므로 모호성을 보존한다.
