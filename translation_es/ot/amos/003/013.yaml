- from: ¡Escuchen y den testimonio contra la casa de Jacob[a]!, declara Yahvé[b], Dios de los ejércitos.
  to: Escuchen y den testimonio contra la casa de Jacob[a], declara el Señor Yahvé[b], Dios de los ejércitos.
  rationale: La revisión preserva mejor la fuente hebrea al reflejar explícitamente el título compuesto אֲדֹנָי יְהוִה como «el Señor Yahvé», en vez de omitir «Adonai». También mejora la naturalidad del español al eliminar la puntuación exclamativa innecesaria y afina la nota léxica para que aporte una alternativa real.
