translation:
  language: es
  text: 'Y fundirás para el arca cuatro anillos de oro, y los pondrás sobre sus cuatro pies[a]: dos anillos en un lado de ella y dos anillos en el segundo lado de ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus cuatro esquinas» para «sus cuatro pies»; el término hebreo es difícil, pero probablemente se refiere a los soportes inferiores o pies del arca más que a puntos abstractos de esquina.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצַקְתָּ
  english_pob_choice: you shall cast
  chosen_spanish: fundirás
  alternatives_spanish:
  - echarás
  - colarás (en metal)
  lexicon: HALOT
  rationale: En el contexto de piezas de oro para el arca, el verbo apunta a trabajar metal por fundición/colado, no a un simple verter. 'Fundirás' comunica la fabricación metalúrgica con naturalidad en español bíblico moderno.
- source_word: טַבְּעֹת
  english_pob_choice: rings
  chosen_spanish: anillos
  alternatives_spanish:
  - aros
  - anillos metálicos
  lexicon: HALOT
  rationale: El sustantivo denota aros o anillos de metal. 'Anillos' es claro y relativamente directo en español; 'aros' sería posible, pero 'anillos' conserva mejor la correspondencia con la forma circular prevista.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  lexicon: HALOT
  rationale: Designa el material. 'Oro' es la forma natural y precisa en español.
- source_word: וְנָתַתָּה
  english_pob_choice: and put
  chosen_spanish: y los pondrás
  alternatives_spanish:
  - y los colocarás
  - y los pondrás allí
  lexicon: HALOT
  rationale: נתן es amplio; aquí se trata de fijar o colocar las argollas en su lugar. 'Pondrás' mantiene la sencillez instructiva del hebreo.
- source_word: פַּעֲמֹתָיו
  english_pob_choice: its four feet
  chosen_spanish: sus cuatro pies
  alternatives_spanish:
  - sus cuatro bases
  - sus cuatro apoyos
  - sus cuatro esquinas
  lexicon: HALOT
  rationale: Sigo la lectura del POB en inglés, que eligió 'feet' por el soporte inferior concreto del arca. 'Pies' preserva esa imagen corpórea mejor que una solución abstracta como 'bases' o 'esquinas'.
- source_word: צַלְעוֹ
  english_pob_choice: side of it
  chosen_spanish: un lado de él
  alternatives_spanish:
  - su lado
  - uno de sus lados
  - su costado
  lexicon: HALOT
  rationale: En este contexto arquitectónico/objetual, צלע significa 'lado'. 'Un lado de él' evita introducir una interpretación técnica adicional y mantiene la relación con la pieza descrita.
- source_word: הָאֶחָת ... הַשֵּׁנִית
  english_pob_choice: one ... second
  chosen_spanish: un lado ... su segundo lado
  alternatives_spanish:
  - un lado ... el otro
  - un lado ... el segundo
  lexicon: HALOT
  rationale: El hebreo distingue el primer lado y el segundo. 'Su segundo lado' conserva esa secuencia sin forzar la lectura idiomática de 'el otro', que suavizaría la numeración explícita.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al mantener el orden fuente-específico 'anillos de oro para ello' / 'for it' y conserva la decisión léxica de 'feet' como lectura principal, con nota alternativa para la dificultad de פַּעֲמֹתָיו. No se añadió ninguna nota sin ancla en el texto.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo en segunda persona singular futuro ('fundirás', 'pondrás') para corresponder al hebreo.
  - Se preserva la distinción concreta entre 'pies' y 'lado(s)' sin mezclarla con 'esquinas' en el texto principal.
  - La nota [a] está anclada exactamente en la frase donde aparece la alternativa léxica relevante.
  - El estilo es bíblico moderno y publicable, sin calco innecesario del inglés.
