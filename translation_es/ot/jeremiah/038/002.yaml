translation:
  language: es
  text: 'Así dice Yahvé: El que permanezca en esta ciudad morirá por la espada, por el hambre y por la peste; pero el que salga a los caldeos vivirá, y su vida le será como botín[a], y vivirá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «y tendrá su vida como botín/despojo»; modismo hebreo que significa que escapará con vida.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio del pacto según la convención del proyecto en español. 'Yahvé' corresponde al mismo criterio que el inglés POB 'Yahweh', evitando el ocultamiento mediante un título y manteniendo la referencia directa al Tetragrámaton.
- source_word: הַיֹּשֵׁב
  english_pob_choice: He who remains
  chosen_spanish: El que permanezca
  alternatives_spanish:
  - el que se queda
  - el que habita
  - el que está
  lexicon: HALOT
  rationale: El participio expresa la persona que sigue dentro de la ciudad bajo amenaza; 'permanezca' conserva el valor de permanencia/continuidad y el tono sentencioso del hebreo, sin caer en un calco como 'el que se sienta'.
- source_word: בָּעִיר הַזֹּאת
  english_pob_choice: in this city
  chosen_spanish: en esta ciudad
  alternatives_spanish:
  - dentro de esta ciudad
  lexicon: HALOT
  rationale: Es una locución locativa directa y natural en español, sin necesidad de ampliar el sentido.
- source_word: יָמוּת
  english_pob_choice: will die
  chosen_spanish: morirá
  alternatives_spanish:
  - morirá ciertamente
  - morirá sin falta
  lexicon: HALOT
  rationale: El imperfecto expresa resultado futuro en el anuncio profético; el futuro simple es la equivalencia más natural en español.
- source_word: בַּחֶרֶב בָּרָעָב וּבַדָּבֶר
  english_pob_choice: by the sword, by famine, and by pestilence
  chosen_spanish: a espada, de hambre y de peste
  alternatives_spanish:
  - por la espada, por el hambre y por la peste
  - a espada, por hambre y por pestilencia
  lexicon: HALOT
  rationale: Se mantiene la tríada de juicio. 'Espada' y 'hambre' son los equivalentes directos más transparentes; 'peste' comunica bien דָּבֶר en este contexto profético, con registro solemne pero natural en español.
- source_word: וְהַיֹּצֵא אֶל הַכַּשְׂדִּים
  english_pob_choice: he who goes out to the Chaldeans
  chosen_spanish: el que salga a los caldeos
  alternatives_spanish:
  - el que vaya a los caldeos
  - el que deserte a los caldeos
  - el que salga hacia los caldeos
  lexicon: HALOT
  rationale: Se conserva 'caldeos', como en el inglés POB, por fidelidad al término del texto fuente. 'Salir a' refleja el movimiento del hebreo sin forzar una interpretación más explícita que el original, aunque el contexto implique rendición.
- source_word: יִחְיֶה
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - seguirá vivo
  - sobrevivirá
  lexicon: HALOT
  rationale: Se mantiene el verbo de vida para reproducir la repetición enfática del versículo.
- source_word: וְהָיְתָה לוֹ נַפְשׁוֹ לְשָׁלָל
  english_pob_choice: and his life will be to him as spoil
  chosen_spanish: y su vida le será como botín
  alternatives_spanish:
  - y su vida le será como saqueo
  - y su vida le será como presa
  lexicon: HALOT
  rationale: נֶפֶשׁ se entiende aquí como 'vida', no como 'alma'. 'Botín' conserva el valor metafórico de לְשָׁלָל y resulta más idiomático en español que 'espolio' o una paráfrasis explicativa.
- source_word: נַפְשׁוֹ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  lexicon: HALOT
  rationale: En este dicho de guerra y supervivencia, נֶפֶשׁ se refiere a la vida conservada, no a un componente espiritual separado. 'Vida' evita una lectura doctrinal ajena al pasaje.
- source_word: לְשָׁלָל
  english_pob_choice: as spoil
  chosen_spanish: como botín
  alternatives_spanish:
  - como presa
  - como saqueo
  lexicon: HALOT
  rationale: Se preserva la imagen bélica de algo arrancado del peligro con vida; 'botín' es claro y mantiene el campo semántico de guerra.
- source_word: וָחָי
  english_pob_choice: and he will live
  chosen_spanish: y vivirá
  alternatives_spanish:
  - y vivirá en verdad
  - y seguirá vivo
  lexicon: HALOT
  rationale: Se conserva la repetición final del verbo de vivir para reflejar el énfasis retórico del hebreo y del inglés POB.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto presenta el Tetragrámaton de forma explícita. Siguiendo la convención del proyecto y la decisión auditable del POB inglés, se mantiene el nombre propio divino en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de נֶפֶשׁ en la expresión נַפְשׁוֹ לְשָׁלָל
  english_pob_reading: his life ... as spoil
  chosen_spanish_reading: su vida ... como botín
  alternative_spanish_readings:
  - su alma ... como botín
  - su vida ... como presa
  rationale: El contexto es el asedio y la preservación física frente a la muerte. 'Vida' comunica mejor el sentido idiomático de supervivencia y evita introducir una carga antropológica o doctrinal no requerida por el pasaje.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió 'remains' frente a 'stays' por un matiz más formal. En español se reflejó ese mismo ajuste con 'permanezca'. También se conservó la repetición final de 'vivirá' para no perder el énfasis retórico del hebreo. La nota sobre el idiomático 'vida ... como botín' responde al mismo tipo de alternativa lexical registrada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como equivalente español estable para el nombre divino, coherente con la norma del proyecto.
  - Se eligió 'caldeos' en vez de 'babilonios' para seguir el término del texto fuente y del POB inglés.
  - Se tradujo נֶפֶשׁ como 'vida' de manera consistente con otros contextos de preservación/supervivencia, no como 'alma'.
  - 'Se conservó la tríada de juicio con un registro bíblico natural en español: ''espada, hambre y peste''.'
