translation:
  language: es
  text: Que se alegren los cielos, y que se regocije la tierra; que retumbe el mar[a], y cuanto lo llena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que el mar retumbe, y todo lo que contiene».'
