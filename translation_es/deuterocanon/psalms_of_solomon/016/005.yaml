translation:
  language: es
  text: Te daré gracias[a], oh Dios, porque me ayudaste[b] para salvación, y no me contaste entre[c] los pecadores[d] para destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te alabaré» o «confesaré».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «me tomaste de la mano»; la idea básica es que Dios vino en ayuda del hablante.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no me consideraste junto con».'
    reason: lexical_alternative
  - marker: d
    text: 'La expresión conserva el artículo griego: no es solo una categoría moral genérica, sino un grupo definido.'
    reason: theological_note
lexical_decisions:
- source_word: ἐξομολογήσομαί
  english_pob_choice: I will give thanks
  chosen_spanish: Te daré gracias
  alternatives_spanish:
  - Te alabaré
  - Confesaré
  lexicon: BDAG
  rationale: En este contexto de oración, el verbo expresa gratitud y alabanza dirigida a Dios. «Te daré gracias» conserva el tono devocional y es natural en español, sin reducirlo a una confesión de pecado.
- source_word: ἀντελάβου
  english_pob_choice: you helped / you took hold of
  chosen_spanish: me ayudaste
  alternatives_spanish:
  - me sostuviste
  - me tomaste de la mano
  lexicon: BDAG
  rationale: La revisión inglesa dejó claro que aquí el sentido comunicativo es «helped» y no una reproducción demasiado literal de la imagen de «tomar de». En español, «me ayudaste» transmite con claridad la acción benéfica de Dios y evita un calco poco idiomático.
- source_word: εἰς σωτηρίαν
  english_pob_choice: for salvation
  chosen_spanish: para salvación
  alternatives_spanish:
  - para liberación
  - para salvarme
  lexicon: BDAG
  rationale: «Para salvación» sigue de cerca el giro griego y mantiene el peso religioso de σωτηρία. En español resulta claro y solemne.
- source_word: ἐλογίσω με
  english_pob_choice: you did not count me
  chosen_spanish: no me contaste
  alternatives_spanish:
  - no me consideraste
  - no me computaste
  lexicon: BDAG
  rationale: «Contar» reproduce bien el sentido evaluativo/judicial de λογίζομαι en este contraste. En español es comprensible y mantiene la fuerza de inclusión/exclusión del grupo.
- source_word: μετὰ τῶν ἁμαρτωλῶν
  english_pob_choice: with the sinners
  chosen_spanish: entre los pecadores
  alternatives_spanish:
  - con los pecadores
  - entre los impíos
  lexicon: BDAG
  rationale: La adición del artículo en griego apoya una referencia grupal concreta; en español «entre los pecadores» conserva la idea de pertenencia a un conjunto. «Pecadores» sigue la elección inglesa y evita una paráfrasis más amplia.
- source_word: εἰς ἀπώλειαν
  english_pob_choice: for destruction
  chosen_spanish: para destrucción
  alternatives_spanish:
  - para ruina
  - hacia destrucción
  lexicon: BDAG
  rationale: «Para destrucción» es directo y mantiene el peso de ἀπώλεια sin suavizarlo. Conserva la relación de propósito o resultado del verbo anterior.
theological_decisions:
- issue: Referencia al grupo específico de «los pecadores»
  english_pob_reading: the sinners as a specific sociological and political group label
  chosen_spanish_reading: los pecadores como un grupo definido, no solo como categoría moral general
  alternative_spanish_readings:
  - pecadores en sentido general
  - los impíos
  rationale: La presencia del artículo en griego y el contexto del libro favorecen una lectura definida. Por eso se conserva «los pecadores» y no se diluye en una formulación más abstracta.
  doctrine_reference: Contexto histórico-literario de Psalms of Solomon; no se impone una lectura dogmática ajena al pasaje.
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió una duplicación accidental y reorientó ἀντελάβου hacia el sentido de ayuda, no hacia una literalidad excesiva. Esta propuesta refleja esa corrección y además mantiene el artículo definido del griego en la expresión sobre «los pecadores».
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός, sin ocultar el nombre divino.
  - Se conserva el registro litúrgico breve y confesional del verso.
  - «Para salvación» y «para destrucción» mantienen la estructura de finalidad/resultado del griego.
  - «Los pecadores» se deja en forma definida para respetar la lectura contextual del libro.
