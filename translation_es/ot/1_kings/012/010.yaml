translation:
  language: es
  text: 'Los jóvenes que habían crecido con él le hablaron, diciendo: “Así dirás a este pueblo que te habló, diciendo: ‘Tu padre hizo pesado nuestro yugo, pero tú hazlo más ligero para nosotros’; así les dirás: ‘Mi dedo meñique es más grueso que la cintura[a] de mi padre’”.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘los lomos de mi padre’. ‘Cintura’ expresa la idea en español moderno; ‘lomos’ es una traducción más literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַיְלָדִים
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los muchachos jóvenes
  lexicon: HALOT
  rationale: En este contexto no se trata de niños pequeños, sino de hombres jóvenes del círculo de Roboam. ‘Los jóvenes’ conserva el matiz social sin sonar infantil en español.
- source_word: גָּדְלוּ אִתּוֹ
  english_pob_choice: had grown up with him
  chosen_spanish: habían crecido con él
  alternatives_spanish:
  - habían sido criados con él
  - se habían criado con él
  lexicon: HALOT
  rationale: La expresión indica convivencia y maduración compartida. ‘Habían crecido con él’ es natural y mantiene la relación de proximidad.
- source_word: כֹּה תֹאמַר
  english_pob_choice: Thus you shall say
  chosen_spanish: Así dirás
  alternatives_spanish:
  - Así hablarás
  - De esta manera dirás
  lexicon: HALOT
  rationale: ‘Así’ reproduce el valor formulaico de כֹּה. El futuro exhortativo en español expresa con claridad la instrucción.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - esta gente
  - este pueblo este
  lexicon: HALOT
  rationale: El hebreo usa singular con demostrativo enfático. ‘Este pueblo’ conserva el tono algo distante y la forma colectiva.
- source_word: הִכְבִּיד אֶת עֻלֵּנוּ
  english_pob_choice: made our yoke heavy
  chosen_spanish: hizo pesado nuestro yugo
  alternatives_spanish:
  - hizo gravoso nuestro yugo
  - cargó nuestro yugo
  lexicon: HALOT
  rationale: Se preserva la metáfora de ‘yugo’, que el inglés POB también retiene. ‘Hizo pesado’ sigue de cerca el verbo hebreo sin perder inteligibilidad.
- source_word: הָקֵל מֵעָלֵינוּ
  english_pob_choice: lighten it for us
  chosen_spanish: aligéranoslo
  alternatives_spanish:
  - hazlo más ligero para nosotros
  - alívíanoslo
  lexicon: HALOT
  rationale: El imperativo breve reproduce la fuerza del pedido. ‘Aligéranoslo’ mantiene la referencia al yugo y sugiere el mismo movimiento verbal que el inglés auditado.
- source_word: קָטָנִּי
  english_pob_choice: My little finger
  chosen_spanish: mi dedo meñique
  alternatives_spanish:
  - mi dedo pequeño
  - mi meñique
  lexicon: HALOT
  rationale: La expresión idiomática se entiende mejor en español como parte del contraste corporal. ‘Mi dedo meñique’ comunica la imagen concreta y permite el contraste con ‘caderas’.
- source_word: עָבָה
  english_pob_choice: is thicker than
  chosen_spanish: es más grueso que
  alternatives_spanish:
  - es más robusto que
  - es más ancho que
  lexicon: HALOT
  rationale: El comparativo expresa la idea de grosor o mayor corpulencia. ‘Más grueso’ es directo y fiel al contraste físico del dicho.
- source_word: מִמָּתְנֵי אָבִי
  english_pob_choice: than my father’s waist
  chosen_spanish: que las caderas de mi padre
  alternatives_spanish:
  - que la cintura de mi padre
  - que los lomos de mi padre
  lexicon: HALOT
  rationale: ‘מָתְנַיִם’ puede abarcar cintura, lomos o caderas. Se eligió ‘caderas’ por claridad en español y para sostener el paralelo corporal con ‘dedo meñique’. La elección evita tanto el arcaísmo como una ambigüedad demasiado abstracta.
theological_decisions:
- issue: Registro del mandato y la fórmula de discurso
  english_pob_reading: Thus you shall say
  chosen_spanish_reading: Así dirás
  alternative_spanish_readings:
  - Así hablarás
  - De esta manera dirás
  rationale: 'No hay tensión doctrinal, pero sí una cuestión de registro: la fórmula funciona como instrucción solemne. ‘Así dirás’ conserva la formalidad sin sonar rígido.'
  doctrine_reference: N/A
- issue: Metáfora del yugo como opresión política
  english_pob_reading: made our yoke heavy / lighten it for us
  chosen_spanish_reading: hizo pesado nuestro yugo / aligéranoslo
  alternative_spanish_readings:
  - hizo gravoso nuestro yugo / hazlo más ligero para nosotros
  - cargó nuestro yugo / alívianoslo
  rationale: Se conserva la metáfora del yugo en lugar de sustituirla por ‘carga’ para respetar la imagen del hebreo y su fuerza política y social.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El texto sigue la revisión más reciente del POB en inglés: conserva ‘Thus’ como fórmula solemne equivalente a כֹּה, y refleja el imperativo más natural ‘aligéranoslo’ en vez de una calca más pesada. También respeta la decisión revisada de mantener el contraste corporal final en términos accesibles para el lector moderno.'
  spanish_consistency_notes:
  - Se mantuvo ‘yugo’ para preservar la metáfora principal y su continuidad con el inglés auditado.
  - Se evitó ‘SEÑOR’ o terminología de tradición eclesiástica no presente en el verso.
  - El discurso directo conserva el encadenamiento de comillas con un español claro y publicable.
  - ‘Caderas’ se usa como equivalente contextual de מָתְנַיִם; en otros contextos podría requerir ‘cintura’ o ‘lomos’.
