translation:
  language: es
  text: Y en el reinado de Ahasuero[a], al comienzo de su reinado, escribieron una acusación contra los habitantes de Judá y de Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una queja» o «una acusación hostil». El término hebreo puede expresar oposición formal en un escrito adversarial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/מַלְכוּת
  english_pob_choice: And in the reign of
  chosen_spanish: Y en el reinado de
  alternatives_spanish:
  - Y durante el reinado de
  - Ahora, en el reinado de
  lexicon: HALOT
  rationale: La construcción introduce un marco temporal del gobierno real. En español, «reinado» comunica de manera natural y precisa el período de gobierno, conservando el valor formal del hebreo sin decir «reino», que aquí sonaría menos exacto.
- source_word: אֲחַשְׁוֵר֔וֹשׁ
  english_pob_choice: Ahasuerus
  chosen_spanish: Ahasuero
  alternatives_spanish:
  - Ahasvero
  - Jerjes
  lexicon: HALOT
  rationale: Se conserva la transliteración tradicional del nombre hebreo en español bíblico. «Jerjes» identifica históricamente al personaje, pero no preserva la forma hebrea del texto fuente.
- source_word: בִּ/תְחִלַּ֖ת מַלְכוּת֑/וֹ
  english_pob_choice: at the beginning of his reign
  chosen_spanish: al comienzo de su reinado
  alternatives_spanish:
  - al principio de su reinado
  - en el inicio de su reinado
  lexicon: HALOT
  rationale: La frase señala el período inicial del gobierno. «Al comienzo de su reinado» suena natural en español y mantiene la relación temporal exacta del hebreo.
- source_word: כָּתְב֣וּ
  english_pob_choice: they wrote
  chosen_spanish: escribieron
  alternatives_spanish:
  - redactaron
  - escribieron por escrito
  lexicon: HALOT
  rationale: El verbo hebreo es el simple «escribir». En este contexto administrativo, «escribieron» reproduce fielmente la acción sin añadir matices de envío o composición que el texto no explicita.
- source_word: שִׂטְנָ֔ה
  english_pob_choice: an accusation
  chosen_spanish: una acusación
  alternatives_spanish:
  - una queja
  - una denuncia hostil
  - una acusación hostil
  lexicon: HALOT
  rationale: El término puede abarcar oposición formal o una acusación en sentido hostil. «Acusación» transmite bien el valor legal y adversarial sin forzar una interpretación más específica de la que exige el hebreo.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - acerca de
  - en contra de
  lexicon: HALOT
  rationale: En combinación con «escribieron una acusación», la preposición marca el blanco del escrito hostil. «Contra» es la equivalencia española más clara y directa.
- source_word: יֹשְׁבֵ֥י יְהוּדָ֖ה וִ/ירוּשָׁלִָֽם
  english_pob_choice: the inhabitants of Judah and Jerusalem
  chosen_spanish: los habitantes de Judá y de Jerusalén
  alternatives_spanish:
  - los residentes de Judá y de Jerusalén
  - los que habitaban en Judá y Jerusalén
  lexicon: HALOT
  rationale: El participio funciona sustantivamente como «los que habitan». «Habitantes» es natural en español y conserva el sentido colectivo del original para ambas localidades.
translation_notes:
  revision_awareness: El texto coincide sustancialmente con la línea principal de la POB en inglés; la revisión disponible no introduce cambios, por lo que se mantiene la equivalencia óptima sin necesidad de ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Ahasuero» como transliteración bíblica consistente con el nombre hebreo.
  - Se usa «reinado» para el marco temporal monárquico, no «reino», por precisión contextual.
  - Se conserva «Judá y de Jerusalén» para reflejar el doble objeto geográfico del hebreo.
  - La nota al pie preserva la tensión léxica del término שִׂטְנָה sin reducirlo a una sola glosa interpretativa.
