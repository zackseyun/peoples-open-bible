theological_decisions:
- issue: Meaning of 'the uncircumcised and the unclean' in relation to Jerusalem
  chosen_reading: Retain the covenantal and purity language without specifying whether the reference is ethnic, ritual, moral, or eschatological beyond what the text states.
  alternative_readings:
  - Interpret as excluding foreign invaders
  - Interpret as excluding ritually impure persons
  - Interpret as eschatological image of perfected holiness
  rationale: The verse uses established covenant and purity categories but does not itself fully define the scope. The translation preserves the theological tension rather than resolving it into a narrower doctrinal claim.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
