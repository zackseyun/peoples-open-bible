translation:
  language: es
  text: 'Entonces me dijo: «¿Has visto, hijo de hombre? ¿Es demasiado poca cosa para la casa de Judá hacer las abominaciones que han hecho aquí, que además llenen la tierra de violencia y vuelvan a provocarme? Y he aquí, están poniendo la rama a su nariz[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo algunos testigos antiguos: «están poniendo la rama a mi nariz». El texto hebreo dice «su nariz».'
    reason: textual_variant
lexical_decisions:
- source_word: הֲרָאִיתָ
  english_pob_choice: Have you seen
  chosen_spanish: ¿Has visto
  alternatives_spanish:
  - ¿Has observado
  - ¿Ves
  lexicon: HALOT
  rationale: El perfecto con interrogativa en discurso directo funciona como pregunta retórica sobre lo que Ezequiel acaba de contemplar; «has visto» conserva esa referencia al acto visionario sin sobretraducción.
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Se mantiene el giro profético repetido en Ezequiel. «Hijo de hombre» conserva la forma idiomática y su valor literario, en lugar de nivelarlo a un equivalente explicativo.
- source_word: הֲנָקֵל
  english_pob_choice: Is it too trivial a thing
  chosen_spanish: ¿Es cosa demasiado trivial
  alternatives_spanish:
  - ¿Es una cosa trivial
  - ¿Es cosa demasiado ligera
  lexicon: HALOT
  rationale: El hebreo expresa ligereza/insignificancia en una pregunta retórica. «Cosa demasiado trivial» comunica bien la fuerza de reproche en español sin perder el matiz de desprecio por la gravedad del pecado.
- source_word: לְבֵית יְהוּדָה
  english_pob_choice: for the house of Judah
  chosen_spanish: para la casa de Judá
  alternatives_spanish:
  - para Judá
  - para el pueblo de Judá
  lexicon: HALOT
  rationale: Se preserva la expresión colectiva y covenantal «casa de Judá», que el texto usa como sujeto del reproche.
- source_word: הַתּוֹעֵבוֹת
  english_pob_choice: the abominations
  chosen_spanish: las abominaciones
  alternatives_spanish:
  - las cosas detestables
  lexicon: HALOT
  rationale: En contextos idolátricos y de juicio, «abominaciones» es el equivalente más directo y fuerte en español, manteniendo la carga moral-religiosa del término.
- source_word: פֹה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: HALOT
  rationale: Adverbio deíctico sencillo que remite al escenario del templo en la visión; «aquí» es natural y preciso.
- source_word: מָלְאוּ אֶת הָאָרֶץ חָמָס
  english_pob_choice: fill the land with violence
  chosen_spanish: llenan la tierra de violencia
  alternatives_spanish:
  - llenan la tierra de injusticia
  - llenan la tierra de maldad
  lexicon: HALOT
  rationale: חָמָס suele denotar violencia, abuso o injusticia violenta. «Violencia» es la opción más directa y ampliamente reconocible en el lenguaje profético.
- source_word: וַיָּשֻׁבוּ לְהַכְעִיסֵנִי
  english_pob_choice: turn again to provoke me
  chosen_spanish: vuelvan a provocar mi ira
  alternatives_spanish:
  - vuelvan a provocarme
  - regresen para irritarme
  lexicon: HALOT
  rationale: הכעס en este contexto expresa provocar la ira divina. «Provocar mi ira» mantiene el sentido teológico del verbo y evita una reducción psicológica a simple enojo humano.
- source_word: וְהִנָּם
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y observa
  lexicon: HALOT
  rationale: Se conserva el tono solemne y deíctico del hebreo con una fórmula clásica pero clara en español; «he aquí» corresponde mejor al registro elevado de la señalación profética.
- source_word: שֹׁלְחִים
  english_pob_choice: they are putting
  chosen_spanish: están llevando
  alternatives_spanish:
  - están poniendo
  - están extendiendo
  lexicon: HALOT
  rationale: El verbo es literalmente «enviar/estirar», pero unido al objeto oscuro describe una acción física. «Están llevando» preserva la imagen de portar o presentar el objeto sin fijar prematuramente el gesto ritual.
- source_word: הַזְּמוֹרָה
  english_pob_choice: the branch
  chosen_spanish: la rama
  alternatives_spanish:
  - el sarmiento
  - la vara
  lexicon: HALOT
  rationale: זְמוֹרָה designa una rama o brote de vid. «Rama» es natural y suficientemente amplio; «sarmiento» sería más específico pero menos transparente para la lectura pública.
- source_word: אֶל אַפָּם
  english_pob_choice: to their nose
  chosen_spanish: a su nariz
  alternatives_spanish:
  - a sus narices
  - a mi nariz
  lexicon: HALOT
  rationale: El texto masorético dice «su nariz» con sufijo plural de tercera persona. Se traduce de forma transparente, sin emendar silenciosamente al pronombre alternativo atestiguado en algunas versiones antiguas.
theological_decisions:
- issue: 'Clausula final oscura: gesto con la rama y la nariz'
  english_pob_reading: Translate the Masoretic Text transparently as 'they are putting the branch to their nose'
  chosen_spanish_reading: Traducir transparentemente el texto masorético como «están llevando la rama a su nariz»
  alternative_spanish_readings:
  - «están llevando la rama a mi nariz»
  - «están realizando un gesto ritual idólatra con la rama»
  rationale: La frase final es difícil tanto textualmente como en su interpretación. La traducción española mantiene el hebreo de manera transparente y deja la tensión abierta, en lugar de resolverla con una explicación ritual no explicitada por el texto base. La posible lectura antigua con pronombre de primera persona se preserva como variante textual en nota.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del contexto en inglés, que sustituyó una fórmula más coloquial por «behold» para reflejar mejor el registro de הִנָּם. En español se eligió «Y he aquí» para conservar ese tono solemne, mientras que el resto de la cláusula se mantuvo fiel al texto masorético y a la tensión interpretativa documentada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto solo cuando aparece explícitamente el nombre divino; en este versículo no aparece y no se introduce ningún equivalente funcional.
  - Se conservó «casa de Judá» como expresión colectiva, coherente con el patrón del proyecto.
  - «Abominaciones» se mantuvo por su valor técnico en contextos de idolatría y juicio.
  - La nota de variante textual se ancló en la frase problemática final para no ocultar la diferencia entre el texto masorético y la lectura alternativa antigua.
