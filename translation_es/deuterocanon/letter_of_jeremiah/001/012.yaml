revisions:
- from: Se limpian el rostro[a] a causa del polvo de la casa, que cae sobre ellos en mayor cantidad.
  to: Les limpian los rostros a causa del polvo de la casa[a], que está sobre ellos en mayor cantidad.
  rationale: 'Se revisa la cláusula inicial para reflejar la lectura contextual aprobada en el POB: los ídolos no se limpian a sí mismos, sino que otros les limpian los rostros. Se mejora la naturalidad del español con ''los rostros'' y se corrige la cláusula final para evitar el añadido interpretativo ''cae'', conservando el sentido cuantitativo de πλείω y la alternativa literal en nota.'
  reviewer_model: gpt-5.4
