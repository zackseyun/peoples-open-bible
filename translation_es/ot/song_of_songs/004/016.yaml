translation:
  language: es
  text: ¡Despierta[a], viento del norte, y ven, viento del sur! Sopla sobre mi jardín, para que fluyan sus especias[b]. Que mi amado venga a su jardín[c] y coma sus frutos escogidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «norte» y «sur»; «viento» se añade en español porque en el contexto se invoca a las direcciones como agentes que soplan sobre el jardín.
    reason: lexical_alternative
  - marker: b
    text: O «sus perfumes», «sus aromas» o «su fragancia». El término hebreo puede referirse a sustancias aromáticas o al olor que producen.
    reason: lexical_alternative
  - marker: c
    text: El cambio de «mi jardín» a «su jardín» está en el hebreo y probablemente expresa la mutua pertenencia dentro de la imaginería amorosa.
    reason: cross_reference
lexical_decisions:
- source_word: ע֤וּרִי
  english_pob_choice: Awake
  chosen_spanish: ¡Despierta!
  alternatives_spanish:
  - ¡Levántate!
  - ¡Despiértate!
  lexicon: HALOT
  rationale: El hebreo es un imperativo femenino singular en apelación poética. «Despierta» conserva el tono breve y vivo del llamado sin añadir interpretación más allá del mandato inicial.
- source_word: צָפוֹן
  english_pob_choice: north wind
  chosen_spanish: viento del norte
  alternatives_spanish:
  - norte
  - viento norte
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «norte», el contexto personifica la dirección como agente que actúa sobre el jardín. En español, «viento del norte» expresa de manera natural la fuerza meteorológica implícita.
- source_word: וּ/ב֣וֹאִי
  english_pob_choice: and come
  chosen_spanish: y ven
  alternatives_spanish:
  - y entra
  - y llega
  lexicon: HALOT
  rationale: El verbo es un imperativo simple de venir. «Ven» preserva la fuerza directa y paralela del llamado.
- source_word: תֵימָן
  english_pob_choice: south wind
  chosen_spanish: viento del sur
  alternatives_spanish:
  - sur
  - viento sur
  lexicon: HALOT
  rationale: Como con «norte», el sustantivo direccional funciona aquí como referencia al viento del sur. «Viento del sur» hace explícita la referencia meteorológica requerida por el contexto.
- source_word: הָפִ֥יחִי
  english_pob_choice: Blow on
  chosen_spanish: Sopla sobre
  alternatives_spanish:
  - Sopla en
  - Respira sobre
  lexicon: HALOT
  rationale: El imperativo intensivo/causativo describe el soplar del viento sobre el jardín. «Sopla sobre» es natural en español y conserva la imagen.
- source_word: גַנִּ֖/י
  english_pob_choice: my garden
  chosen_spanish: mi jardín
  alternatives_spanish:
  - mi huerto
  - mi vergel
  lexicon: HALOT
  rationale: El sustantivo denota un jardín/huerto poético. «Jardín» es claro y mantiene la imagen metafórica de la amada.
- source_word: יִזְּל֣וּ
  english_pob_choice: may flow
  chosen_spanish: fluyan
  alternatives_spanish:
  - goteen
  - corran
  lexicon: HALOT
  rationale: El imperfecto expresa resultado deseado; «fluyan» reproduce la idea de emanación o difusión sin sobrecargarla.
- source_word: בְשָׂמָ֑י/ו
  english_pob_choice: its spices
  chosen_spanish: sus aromas
  alternatives_spanish:
  - sus especias
  - su fragancia
  lexicon: HALOT
  rationale: El término puede referirse a sustancias aromáticas o al olor que producen. En español, «aromas» mantiene la referencia sensorial sin volver demasiado literal «especias».
- source_word: יָבֹ֤א
  english_pob_choice: Let ... come
  chosen_spanish: Que ... venga
  alternatives_spanish:
  - Permite que ... venga
  - Venga
  lexicon: HALOT
  rationale: El valor volitivo/jusivo se expresa de forma natural con «que venga» en español, conservando el deseo o invitación.
- source_word: דוֹדִ/י
  english_pob_choice: my beloved
  chosen_spanish: mi amado
  alternatives_spanish:
  - mi amado mío
  - mi amor
  lexicon: HALOT
  rationale: En Cantar de los Cantares, «mi amado» es una equivalencia clara y digna para el término afectivo hebreo, sin reducirlo a un registro moderno demasiado íntimo.
- source_word: לְ/גַנּ֔/וֹ
  english_pob_choice: into his garden
  chosen_spanish: a su jardín
  alternatives_spanish:
  - hacia su jardín
  - en su jardín
  lexicon: HALOT
  rationale: El hebreo permite el movimiento «hacia/ a / en». Dado que en español «venir a» expresa bien el destino del movimiento, «a su jardín» evita una forzada duplicación preposicional.
- source_word: וְ/יֹאכַ֖ל
  english_pob_choice: and eat
  chosen_spanish: y coma
  alternatives_spanish:
  - y comerá
  - y disfrute
  lexicon: HALOT
  rationale: El jussivo se mantiene con «coma», conservando la invitación y el paralelismo con el verso anterior.
- source_word: פְּרִ֥י
  english_pob_choice: fruits
  chosen_spanish: fruto
  alternatives_spanish:
  - frutos
  - producción
  lexicon: HALOT
  rationale: El singular colectivo hebreo puede entenderse naturalmente como un conjunto; en español, «fruto» evita añadir plural donde el texto puede funcionar colectivamente.
- source_word: מְגָדָֽי/ו
  english_pob_choice: choice fruits
  chosen_spanish: escogido
  alternatives_spanish:
  - selecto
  - preciado
  - excelente
  lexicon: HALOT
  rationale: El hebreo apunta a cosas selectas/deliciosas. «Escogido» conserva la cualidad de lo elegido o selecto sin añadir un superlativo que el texto no exige.
theological_decisions:
- issue: Metáfora erótica del jardín y cambio posesivo
  english_pob_reading: Retain the sensual metaphor without allegorizing; preserve the shift from 'my garden' to 'his garden.'
  chosen_spanish_reading: Mantener la metáfora íntima del jardín sin alegorizar; conservar el paso de «mi jardín» a «su jardín».
  alternative_spanish_readings:
  - Interpretar el jardín de modo explícitamente alegórico
  - suavizar el cambio posesivo por estilo
  rationale: El hebreo presenta el lenguaje amoroso de forma directa. La traducción no debe espiritualizarlo ni ocultar el cambio posesivo que forma parte de la imagen de pertenencia mutua.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que prefirió «choice fruits» frente a «choicest fruits» para una rendición más directa del hebreo. Por eso se eligió en español «fruto escogido», evitando una intensificación superlativa no exigida por el original.
  spanish_consistency_notes:
  - Se mantuvo «amado» para דוֹדִי, en coherencia con el registro del Cantar.
  - Se evitó «SEÑOR» y cualquier sustitución reverencial no presente en el versículo.
  - Se preservó la duplicación poética de «mi jardín» / «su jardín» como en el hebreo.
  - Se usó «aromas» como solución amplia para בְשָׂמָיו, dejando abierta la posible lectura de fragancias o especias aromáticas.
