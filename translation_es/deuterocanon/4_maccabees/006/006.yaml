review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la escena y conserva los elementos principales del griego: la triple exclamación enfática, la mirada elevada al cielo, la carne expuesta bajo el suplicio, el derramamiento de sangre y el daño en los costados. Sin embargo, dos elecciones atenúan o desvían matices importantes del original y del rastro POB: «se desangraba» sugiere más específicamente pérdida de sangre hasta morir, mientras que κατερρεῖτο τῷ αἵματι enfatiza el fluir/escurrir o quedar cubierto de sangre; y «eran heridos» debilita demasiado κατετιτρώσκετο, que pide un verbo más fuerte como «traspasados» o «perforados».'
  spanish_quality_summary: El español es claro y digno, pero hay pequeñas asperezas estilísticas. «Levantando en alto sus ojos» suena algo calcado; «alzando los ojos al cielo» o «levantando los ojos hacia el cielo» es más natural. «Estaba exponiendo su carne a los azotes» es aceptable, aunque algo rígido; puede mantenerse por fidelidad. La puntuación con dos puntos tras «Pero no, no, no» funciona bien en español.
  glossary_alignment: 'Se mantiene correctamente σάρξ = «carne» en sentido literal corporal. No hay conflictos con la terminología teológica del proyecto. El ajuste principal es léxico: reforzar κατετιτρώσκετο con «traspasados» y evitar que κατερρεῖτο τῷ αἵματι se reduzca a «desangrarse».'
  issues:
  - severity: medium
    issue: «se desangraba» para κατερρεῖτο τῷ αἵματι
    rationale: El griego y la auditoría inglesa destacan el flujo abundante o el correr de sangre sobre el cuerpo, no necesariamente el proceso clínico de desangrarse. «Corría sangre» o «chorreaba sangre» reflejan mejor el aspecto visual.
  - severity: medium
    issue: «eran heridos» para κατετιτρώσκετο
    rationale: «Heridos» es demasiado general y pierde la fuerza de perforación/punción repetida presente en el verbo griego y en la decisión inglesa «were being pierced».
  - severity: low
    issue: «levantando en alto sus ojos» suena poco natural
    rationale: Aunque fiel, la colocación resulta algo forzada en español. «Alzando los ojos hacia el cielo» conserva el gesto físico con mejor fluidez.
  - severity: low
    issue: La nota b ofrece «estaba corriendo sangre», formulación poco idiomática
    rationale: La alternativa de la nota puede expresarse mejor como «chorreaba sangre» o «corría sangre de él» para sonar natural en español.
  revised_spanish_text: 'Pero no, no, no: alzando los ojos hacia el cielo[a], el anciano estaba exponiendo su carne a los azotes, y chorreaba sangre[b], y sus costados eran traspasados[c].'
