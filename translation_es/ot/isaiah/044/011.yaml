translation:
  language: es
  text: ¡Mira! Todos sus compañeros serán avergonzados, y los artesanos son solo hombres. Que todos se reúnan y se pongan de pie; temerán y serán avergonzados todos juntos.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: הֵן
  english_pob_choice: Look
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡Mira aquí!
  - ¡Mira, pues!
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce una llamada enfática a prestar atención. «¡Mira!» conserva esa fuerza deíctica en un español natural y digno, sin caer en un arcaísmo innecesario.
- source_word: חֲבֵרָיו
  english_pob_choice: his companions
  chosen_spanish: sus compañeros
  alternatives_spanish:
  - sus asociados
  - sus socios
  - sus camaradas
  lexicon: HALOT
  rationale: En este contexto se refiere a los que están vinculados con el hacedor de ídolos. «Compañeros» mantiene la idea de asociación sin precisar más de lo que el hebreo permite.
- source_word: יֵבֹשׁוּ
  english_pob_choice: will be put to shame
  chosen_spanish: serán avergonzados
  alternatives_spanish:
  - quedarán avergonzados
  - serán puestos en vergüenza
  - serán cubiertos de vergüenza
  lexicon: HALOT
  rationale: El verbo expresa vergüenza pública o derrota. «Serán avergonzados» conserva el sentido pasivo/resultativo y la tonalidad profética/judicial.
- source_word: וְחָרָשִׁים
  english_pob_choice: and the craftsmen
  chosen_spanish: y los artesanos
  alternatives_spanish:
  - y los obreros
  - y los artífices
  - y los herreros
  lexicon: HALOT
  rationale: חָרָשִׁים abarca a los trabajadores expertos que fabrican ídolos; «artesanos» es amplio, preciso y natural en español.
- source_word: הֵמָּה מֵאָדָם
  english_pob_choice: are only men
  chosen_spanish: son solo hombres
  alternatives_spanish:
  - son meramente humanos
  - son solo seres humanos
  - son de hombres
  lexicon: HALOT
  rationale: La frase resalta que esos artesanos no son divinos, sino humanos. «Son solo hombres» mantiene la fuerza contrastiva y la economía del hebreo, aunque la nota recoge la lectura alternativa más literal «de hombre/seres humanos».
- source_word: מֵאָדָם
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - humanos
  - seres humanos
  - de la humanidad
  lexicon: HALOT
  rationale: Aquí אָדָם funciona en sentido representativo de humanidad frente a la pretensión de divinidad. «Hombres» sigue el uso de POB y preserva ese contraste sin perder naturalidad en español.
- source_word: יִתְקַבְּצוּ
  english_pob_choice: Let them all gather
  chosen_spanish: Que todos se reúnan
  alternatives_spanish:
  - Que todos se congreguen
  - Que todos se junten
  - Que todos se agrupen
  lexicon: HALOT
  rationale: El imperfecto tiene fuerza jussiva en el contexto de desafío. «Que todos se reúnan» expresa bien la invitación retadora y suena más natural que una calca reflexiva más rígida.
- source_word: יַעֲמֹדוּ
  english_pob_choice: stand up
  chosen_spanish: se pongan de pie
  alternatives_spanish:
  - se mantengan en pie
  - se presenten
  - se levanten
  lexicon: HALOT
  rationale: En este desafío forense, el verbo implica presentarse y asumir posición. «Se pongan de pie» es idiomático y conserva la escena confrontativa.
- source_word: יִפְחֲדוּ
  english_pob_choice: they will be terrified
  chosen_spanish: serán aterrados
  alternatives_spanish:
  - temerán
  - quedarán aterrados
  - se llenarán de miedo
  lexicon: HALOT
  rationale: El verbo comunica temor intenso ante el juicio o la confrontación. «Serán aterrados» mantiene el matiz pasivo y la intensidad del original, aunque la nota admite la alternativa más idiomática «quedarán aterrados».
- source_word: יָחַד
  english_pob_choice: together
  chosen_spanish: todos juntos
  alternatives_spanish:
  - juntos
  - a una
  - en conjunto
  lexicon: HALOT
  rationale: El adverbio resume el destino común de los sujetos. «Todos juntos» hace explícita la idea colectiva presente en el cierre del versículo.
theological_decisions:
- issue: אָדָם como humanidad meramente humana frente a la pretensión divina
  english_pob_reading: are only men
  chosen_spanish_reading: son solo hombres
  alternative_spanish_readings:
  - son solo seres humanos
  - son meramente humanos
  - son de la humanidad
  rationale: El punto teológico-retórico del versículo es contrastar la artesanía humana con la divinidad. «Son solo hombres» preserva la contundencia del contraste sin diluir la referencia a personas reales y limitadas.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for אָדָם; Translation philosophy §4'
- issue: La fuerza jussiva de los verbos de desafío
  english_pob_reading: Let them all gather ... stand up
  chosen_spanish_reading: Que todos se reúnan y se pongan de pie
  alternative_spanish_readings:
  - Que todos se congreguen y se mantengan en pie
  - Que todos se junten y se presenten
  rationale: El hebreo encadena imperativos/jussivos de desafío, no una simple descripción. El español opta por «Que...», que conserva la función exhortativa y la escena de confrontación.
  doctrine_reference: Translational syntax note on cohortative/jussive challenge forms
- issue: La vergüenza pública como juicio
  english_pob_reading: will be put to shame
  chosen_spanish_reading: serán avergonzados
  alternative_spanish_readings:
  - quedarán avergonzados
  - serán puestos en vergüenza
  rationale: La profecía usa vergüenza como señal de fracaso y juicio. «Serán avergonzados» mantiene el tono judicial sin agregar elementos ajenos al texto.
  doctrine_reference: Prophetic shame/judgment motif in Isaiah
translation_notes:
  revision_awareness: La redacción española sigue de cerca la decisión final del POB en inglés («Let them all gather») y evita una forma más rígida como «reúnanse a sí mismos». También conserva la lectura estilística y teológica de אָדָם como humanidad meramente humana, con una nota que recoge la alternativa literal indicada en el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se traduce חָרָשִׁים por «artesanos» para respetar el rango semántico amplio, no por «herreros» en sentido estrecho.
  - Se conserva la repetición de la vergüenza al final del versículo para reflejar el paralelismo hebreo.
  - Las marcas de nota aparecen solo en los puntos donde el hebreo/POB documenta una alternativa real.
