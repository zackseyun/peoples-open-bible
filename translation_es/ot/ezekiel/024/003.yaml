revisions:
- from: 'Y habla una parábola a la casa rebelde[a], y diles: «Así dice el Señor Yahvé: Pon la olla; ponla, y también echa agua en ella».'
  to: 'Y pronuncia un proverbio[a] a la casa rebelde, y diles: «Así dice el Señor Yahvé: Pon la olla; ponla, y también echa agua en ella».'
  rationale: Se corrige la traducción principal de מָשָׁל a «proverbio» para seguir la decisión documentada del POB y se repara la nota para preservar «parábola» como alternativa real. También se mejora la naturalidad de «Y habla» a «Y pronuncia», sin perder la relación explícita entre el verbo משל y el sustantivo מָשָׁל. El resto del texto se mantiene por ser fiel, claro y consistente con la política de «Yahvé».
