- from: Y entró en la tienda donde Judith estaba alojada[a], pero no la halló; y salió de un salto hacia el pueblo, clamando[b].
  to: Y entró en la tienda donde Judith se alojaba[a], pero no la halló; y salió de un salto a donde estaba el pueblo, clamando[b].
  rationale: Se ajusta la descripción de καταλύουσα a una forma activa más natural en español («se alojaba»), y se corrige «hacia el pueblo» para expresar mejor que salió al lugar donde estaba la gente. También se mejoran las alternativas de la nota b para que sean idiomáticas y fieles al matiz vívido del griego.
