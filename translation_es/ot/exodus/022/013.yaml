    text: Or, more literally, 'it is broken.' The Hebrew can refer either to damage to a borrowed item or injury to a borrowed animal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'he shall surely pay'; that is, he must make full restitution.
    reason: lexical_alternative
