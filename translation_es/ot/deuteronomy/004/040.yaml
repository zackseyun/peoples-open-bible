revisions:
- from: Así que guardarás sus estatutos y sus mandamientos, que hoy yo te estoy mandando[a], para que te vaya bien con[b] tus hijos después de ti, y para que prolongues tus días sobre la tierra que Yahvé tu Dios te da por todos tus días.
  to: Así que guardarás sus estatutos y sus mandamientos, que hoy yo te estoy mandando[a], para que te vaya bien[b] a ti y a tus hijos[c] después de ti, y para que prolongues tus días sobre la tierra[d] que Yahvé tu Dios te da por todos tus días.
  rationale: Se corrige la cláusula central para reflejar con fidelidad que el bienestar alcanza tanto al destinatario como a su posteridad, no que le vaya bien 'con' sus hijos. También se reordenan y completan las notas al pie para alinearlas con las alternativas léxicas documentadas en el expediente inglés y con los anclajes correctos en el texto español.
