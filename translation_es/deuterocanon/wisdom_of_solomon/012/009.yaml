  glossary_alignment: No hay conflicto con la terminología global del proyecto en este versículo. «Impíos» preserva bien ἀσεβεῖς; no aparecen los términos sensibles principales (Yahvé, Mesías, δοῦλος, etc.). «Palabra tajante» es aceptable para λόγῳ ἀποτόμῳ, manteniendo la nota alternativa.
