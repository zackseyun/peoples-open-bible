translation:
  language: es
  text: Reconoce, pues, hoy que Yahvé tu Dios es el que cruza delante de ti[a], un fuego consumidor. Él los destruirá y él los someterá delante de ti; y tú los desposeerás y los harás perecer rápidamente[d][c][b], tal como Yahvé te ha dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que va delante de ti» para «que cruza delante de ti». El participio hebreo presenta a Yahvé como el que avanza al frente de Israel.
    reason: lexical_alternative
  - marker: b
    text: O «fuego devorador».
    reason: lexical_alternative
  - marker: c
    text: O «los expulsarás» para «los desposeerás».
    reason: lexical_alternative
  - marker: d
    text: O «tal como Yahvé te habló»; el sentido es que esto ocurrirá conforme a la palabra previa de Yahvé a Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָדַעְתָּ הַיּוֹם
  english_pob_choice: So know today
  chosen_spanish: Sabe, pues, hoy
  alternatives_spanish:
  - Y sabe hoy
  - Conoce hoy
  lexicon: HALOT
  rationale: El verbo con el enlace discursivo pide un tono exhortativo/resultativo. «Sabe, pues, hoy» conserva la fuerza de conclusión y suena natural en español bíblico contemporáneo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar «Yahvé» como nombre propio divino, preservando la referencia al nombre de pacto y no sustituyéndolo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La expresión de alianza se vierte de manera directa y sobria como «tu Dios», que es el sentido llano y litúrgicamente inteligible en español.
- source_word: הוּא הָעֹבֵר לְפָנֶיךָ
  english_pob_choice: is the one crossing over before you
  chosen_spanish: es el que pasa delante de ti
  alternatives_spanish:
  - es el que cruza delante de ti
  - es el que va delante de ti
  lexicon: HALOT
  rationale: «Pasa delante de ti» mantiene la imagen de avance/precedencia del participio hebreo y funciona con naturalidad en español. Se conserva la idea de ir al frente sin diluir la concreción del verbo.
- source_word: אֵשׁ אֹכְלָה
  english_pob_choice: a consuming fire
  chosen_spanish: fuego consumidor
  alternatives_spanish:
  - fuego devorador
  lexicon: HALOT
  rationale: «Fuego consumidor» reproduce el valor metafórico de destrucción divina con una fórmula ya reconocible en español bíblico, sin suavizar la imagen ni expandirla innecesariamente.
- source_word: יַשְׁמִידֵם
  english_pob_choice: He will destroy them
  chosen_spanish: él los destruirá
  alternatives_spanish:
  - él los exterminará
  - él los aniquilará
  lexicon: HALOT
  rationale: El hifil de שׁמד expresa causar destrucción; «destruirá» es fuerte y fiel sin añadir una connotación técnica moderna a la acción.
- source_word: יַכְנִיעֵם
  english_pob_choice: he will subdue them
  chosen_spanish: él los someterá
  alternatives_spanish:
  - él los humillará
  - él los dominará
  lexicon: HALOT
  rationale: En contexto militar y territorial, «someterá» conserva la idea de traerlos bajo control. Es más claro que «humillará» para el sentido bélico del pasaje.
- source_word: לְפָנֶיךָ
  english_pob_choice: before you
  chosen_spanish: delante de ti
  alternatives_spanish:
  - en tu presencia
  lexicon: HALOT
  rationale: Se mantiene de forma consistente como «delante de ti» para preservar el valor espacial y militar de la expresión repetida en el versículo.
- source_word: וְהוֹרַשְׁתָּם
  english_pob_choice: you will dispossess them
  chosen_spanish: los desposeerás
  alternatives_spanish:
  - los echarás
  - los expulsarás
  lexicon: HALOT
  rationale: El hifil de ירשׁ tiene fuerza jurídico-territorial; «desposeerás» conserva esa idea de quitar posesión, más precisa que un simple «expulsar».
- source_word: וְהַאֲבַדְתָּם
  english_pob_choice: make them perish
  chosen_spanish: los harás perecer
  alternatives_spanish:
  - los destruirás
  - los aniquilarás
  lexicon: HALOT
  rationale: Se distingue de שׁמד («destruir») mediante una forma causativa que comunica perecimiento. «Harás perecer» refleja bien esa diferencia léxica.
- source_word: מַהֵר
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - pronto
  - de prisa
  lexicon: HALOT
  rationale: El adverbio indica prontitud de ejecución; «rápidamente» es claro y mantiene el sentido de urgencia sin agregar matiz temporal ajeno.
- source_word: כַּאֲשֶׁר דִּבֶּר יְהוָה לָךְ
  english_pob_choice: just as Yahweh has spoken to you
  chosen_spanish: tal como Yahvé te ha dicho
  alternatives_spanish:
  - tal como Yahvé habló a ti
  - como Yahvé te habló
  lexicon: HALOT
  rationale: El perfecto de דבר remite a una palabra previa de Yahvé. «Te ha dicho» preserva la referencia a palabra ya pronunciada y suena natural en español bíblico.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue la directriz del proyecto de no ocultar el nombre divino tras un título. «Yahvé» preserva la identidad del Nombre revelado y es consistente con el criterio textual del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen teológica de fuego destructivo en אֵשׁ אֹכְלָה
  english_pob_reading: a consuming fire
  chosen_spanish_reading: fuego consumidor
  alternative_spanish_readings:
  - fuego devorador
  rationale: La expresión se conserva como imagen de santidad y juicio divinos, sin suavizarla ni convertirla en paráfrasis doctrinal. «Fuego consumidor» mantiene el peso teológico del original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological weight without paraphrase'
translation_notes:
  revision_awareness: Se revisó el verso contra el hebreo y el audit trail inglés; no se detectaron cambios sustantivos necesarios respecto de la decisión base. Se mantuvo la distinción entre destruir, someter, desposeer y hacer perecer, y se preservó la imagen de fuego consumidor sin atenuación.
  spanish_consistency_notes:
  - Se usó «Yahvé» de forma consistente para יהוה.
  - Se mantuvo «delante de ti» para לְפָנֶיךָ en ambas apariciones.
  - Se preservó la distinción léxica entre «destruirá» (יַשְׁמִידֵם) y «los hará perecer» (וְהַאֲבַדְתָּם).
  - Se eligió un español moderno pero reverente, evitando calcos innecesarios.
  - Los marcadores de nota siguen el orden a, b, c, d y aparecen anclados en el texto.
