translation:
  language: es
  text: Y él hizo pasar a sus hijos por el fuego en el Valle del Hijo de Hinón[a], practicó agorería, adivinación y hechicería, y trató con médiums y espiritistas[b]. Hizo mucho mal a los ojos de Yahvé, provocándolo a ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: ''sacrificó a sus hijos en el fuego''. El hebreo dice literalmente ''hizo pasar a sus hijos por el fuego''.'
    reason: lexical_alternative
  - marker: b
    text: '''Médiums y espiritistas'' traduce términos hebreos para personas asociadas con consultar a los muertos o a espíritus.'
    reason: cultural_note
lexical_decisions:
- source_word: הֶעֱבִיר אֶת בָּנָיו בָּאֵשׁ
  english_pob_choice: made his sons pass through the fire
  chosen_spanish: hizo pasar a sus hijos por el fuego
  alternatives_spanish:
  - hizo pasar a sus hijos por el fuego
  - quemó a sus hijos en el fuego
  - sacrificó a sus hijos en el fuego
  lexicon: HALOT
  rationale: Conserva el modismo hebreo sin explicitar más de lo que el texto dice. En español, 'hizo pasar ... por el fuego' suena natural y mantiene la tensión interpretativa sobre el rito subyacente.
- source_word: בְּגֵי בֶן הִנֹּם
  english_pob_choice: in the Valley of the Son of Hinnom
  chosen_spanish: en el Valle del Hijo de Hinón
  alternatives_spanish:
  - en el valle de Ben-hinón
  - en el Valle del Hijo de Hinnom
  lexicon: HALOT
  rationale: Sigue de cerca la forma hebrea del topónimo, preservando 'Hijo de Hinón' como transliteración transparente. Se capitaliza 'Valle' por su función de nombre geográfico.
- source_word: וְעוֹנֵן
  english_pob_choice: practiced soothsaying
  chosen_spanish: practicó adivinación
  alternatives_spanish:
  - practicó agüeros
  - practicó presagios
  lexicon: HALOT
  rationale: '''Adivinación'' comunica bien la práctica de leer presagios sin sonar arcaico. Aunque el inglés POB distingue este término de los siguientes, en español ''soothsaying'' puede expresarse de modo amplio con ''adivinación'' sin perder el matiz de práctica ilícita.'
- source_word: וְנִחֵשׁ
  english_pob_choice: divination
  chosen_spanish: agüeros
  alternatives_spanish:
  - interpretación de presagios
  - divinación
  lexicon: HALOT
  rationale: Se evita repetir 'adivinación' para no borrar la distinción léxica con עוֹנֵן. 'Agüeros' conserva el sentido de observar o interpretar señales/omenes, y mantiene una diferenciación audible en español.
- source_word: וְכִשֵּׁף
  english_pob_choice: sorcery
  chosen_spanish: hechicería
  alternatives_spanish:
  - sorcellería
  - magia
  lexicon: HALOT
  rationale: '''Hechicería'' es el equivalente español más natural y grave para prácticas mágicas prohibidas. Evita un tono demasiado técnico y conserva la condena moral del término.'
- source_word: וְעָשָׂה אוֹב וְיִדְּעוֹנִי
  english_pob_choice: dealt with mediums and spiritists
  chosen_spanish: trató con médiums y espiritistas
  alternatives_spanish:
  - consultó a médiums y espiritistas
  - se ocupó de médiums y espiritistas
  lexicon: HALOT
  rationale: '''Trató con'' expresa participación o relación con estas prácticas sin forzar una sola interpretación. ''Médiums y espiritistas'' es comprensible en español moderno y conserva la referencia a prácticas de consulta a los muertos o a espíritus.'
- source_word: הִרְבָּה לַעֲשׂוֹת
  english_pob_choice: He did much evil
  chosen_spanish: Hizo mucho mal
  alternatives_spanish:
  - Hizo abundantemente el mal
  - Multiplicó el mal
  lexicon: HALOT
  rationale: La revisión inglesa prefirió una forma más natural; en español, 'hizo mucho mal' reproduce bien la intensificación de רבה sin sonar forzado. Mantiene el valor de abundancia/insistencia de la acción.
- source_word: הָרַע בְּעֵינֵי יְהוָה
  english_pob_choice: what was evil in the eyes of Yahweh
  chosen_spanish: mal ante los ojos de Yahvé
  alternatives_spanish:
  - lo malo a los ojos de Yahvé
  - lo que era malo ante Yahvé
  lexicon: HALOT
  rationale: '''Ante los ojos de Yahvé'' refleja el hebreo evaluativo con naturalidad en español. ''Mal'' funciona sustantivamente aquí y mantiene la fórmula estable del texto bíblico.'
- source_word: לְהַכְעִיסוֹ
  english_pob_choice: provoking him to anger
  chosen_spanish: provocándolo a ira
  alternatives_spanish:
  - para provocarlo a ira
  - irritándolo
  lexicon: HALOT
  rationale: '''Provocándolo a ira'' conserva la relación causal y la fuerza emocional del infinitivo hebreo. ''Ira'' es una fórmula bíblica sobria y fiel al registro del pasaje.'
theological_decisions:
- issue: Divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: Se sigue el estándar del proyecto para reproducir el Nombre divino como 'Yahvé' en el texto principal, en lugar de enmascararlo con 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Implicación de sacrificio infantil en 'hizo pasar a sus hijos por el fuego'
  english_pob_reading: Retain the idiom in the main text
  chosen_spanish_reading: Retener el modismo 'hizo pasar a sus hijos por el fuego'
  alternative_spanish_readings:
  - sacrificó a sus hijos en el fuego
  - quemó a sus hijos en el fuego
  rationale: El hebreo sugiere fuertemente un rito sacrificial, pero el texto base mantiene el modismo. La traducción española conserva esa misma reserva interpretativa y deja la explicitación para una nota.
  doctrine_reference: Translation philosophy §1, §3
- issue: Distinción entre prácticas ocultistas en la serie verbal
  english_pob_reading: soothsaying, divination, sorcery, mediums and spiritists
  chosen_spanish_reading: adivinación, agüeros, hechicería, médiums y espiritistas
  alternative_spanish_readings:
  - adivinación, divinación, hechicería, médiums y espiritistas
  - agorería, adivinación, magia, médiums y espiritistas
  rationale: Se procura no aplanar los distintos términos hebreos. La secuencia española intenta conservar diferenciación semántica y un registro reconocible para lectores de iglesia.
  doctrine_reference: HALOT lexical distinctions for עוֹנֵן, נִחֵשׁ, כִשֵּׁף, אוֹב, יִדְּעוֹנִי
translation_notes:
  revision_awareness: El texto en inglés fue revisado desde 'He multiplied doing' a la forma más natural 'He did much evil'; la versión española sigue esa decisión con 'Hizo mucho mal'. También se preservó la decisión revisada de no explicitar el sacrificio infantil en el cuerpo del texto, sino mantener el modismo con nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto.
  - Se evita 'Señor' como sustituto del Nombre divino.
  - Se distinguen en lo posible los distintos campos léxicos del ocultismo hebreo.
  - El registro es solemne pero idiomático para lectura eclesial en español.
  - Los marcadores de nota [a] y [b] aparecen en el texto exactamente donde corresponde.
