translation:
  language: es
  text: De David[a]. Yahvé es mi luz y mi salvación; ¿a quién temeré? Yahvé[b] es la fortaleza de mi vida; ¿de quién tendré miedo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Por David” o “Para David” en el encabezamiento; el hebreo לְדָוִד puede indicar autoría o asociación.
    reason: alternative_reading
  - marker: b
    text: Hebreo יְהוָה, el nombre divino; aquí se vierte como “Yahvé” conforme a la práctica del proyecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Por David
  - Para David
  lexicon: HALOT
  rationale: 'La preposición ל con David en el encabezamiento de un salmo conserva la misma ambigüedad de relación que en inglés: puede indicar autoría, pertenencia o dedicación. ''De David'' es la forma más natural y sobria en español para mantener esa ambigüedad sin decidir más de lo que el hebreo permite.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el Nombre divino, no un título. Siguiendo la política del proyecto, se vierte como 'Yahvé' para preservar el nombre de pacto y no sustituirlo por 'SEÑOR'.
- source_word: אוֹרִי
  english_pob_choice: my light
  chosen_spanish: mi luz
  alternatives_spanish:
  - mi resplandor
  - mi iluminación
  lexicon: HALOT
  rationale: אוֹר significa literalmente 'luz'. Se conserva la metáfora directa, porque el contexto poético no exige una paráfrasis interpretativa.
- source_word: וְיִשְׁעִי
  english_pob_choice: and my salvation
  chosen_spanish: y mi salvación
  alternatives_spanish:
  - y mi liberación
  lexicon: HALOT
  rationale: יִשְׁעִי comunica rescate/seguridad y, en un salmo de confianza, 'salvación' es la equivalencia española más estable y teológicamente reconocible sin perder el sentido de libramiento.
- source_word: מִמִּי
  english_pob_choice: whom
  chosen_spanish: ¿a quién? / ¿de quién?
  alternatives_spanish:
  - ¿de quién (temeré)?
  lexicon: HALOT
  rationale: El hebreo incluye la preposición 'de/desde', pero en español la primera pregunta se naturaliza como '¿a quién temeré?'. En la segunda, la preposición sí se mantiene en '¿de quién tendré miedo?' para conservar el paralelismo y la variación retórica del hebreo.
- source_word: אִירָא
  english_pob_choice: shall I fear
  chosen_spanish: temeré
  alternatives_spanish:
  - habré de temer
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona aquí como pregunta retórica de futuro/modalidad. 'Temeré' reproduce esa fuerza con naturalidad en español.
- source_word: מָעוֹז
  english_pob_choice: the stronghold
  chosen_spanish: la fortaleza
  alternatives_spanish:
  - el baluarte
  - el refugio
  lexicon: HALOT
  rationale: מָעוֹז denota un lugar o fuente de protección fuerte. 'Fortaleza' mantiene la imagen defensiva de manera clara y natural en español; 'baluarte' o 'refugio' son posibles, pero 'fortaleza' comunica mejor la noción de protección resistente.
- source_word: חַיַּי
  english_pob_choice: of my life
  chosen_spanish: de mi vida
  alternatives_spanish:
  - para mi vida
  - de mi existir
  lexicon: HALOT
  rationale: La frase en constructo se vierte de forma directa como 'de mi vida', preservando el vínculo posesivo/protector que el hebreo expresa.
- source_word: אֶפְחָד
  english_pob_choice: shall I be afraid
  chosen_spanish: tendré miedo
  alternatives_spanish:
  - me asustaré
  - temeré
  lexicon: HALOT
  rationale: פחד puede expresarse en español como 'tener miedo' o 'temer'. Aquí 'tendré miedo' mantiene el paralelismo con la primera pregunta y deja ver el matiz de temor intenso del verbo.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El versículo contiene explícitamente el Tetragrámaton. Se preserva el nombre personal de Dios como 'Yahvé', conforme a la práctica del proyecto y para evitar la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail; el borrador sigue de cerca el texto hebreo, conservando la ambigüedad de לְדָוִד y el paralelismo de las dos preguntas retóricas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה de manera consistente con la política del proyecto.
  - '''Salvación'' se usa para יִשְׁעִי por claridad teológica y lexical.'
  - La segunda cláusula conserva 'de quién' para reflejar la preposición hebrea en el paralelismo.
  - Se elige 'fortaleza' como equivalente natural de מָעוֹז, sin perder el matiz de protección fuerte.
