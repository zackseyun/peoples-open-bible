translation:
  language: es
  text: No nos entregues del todo[a] por amor de tu nombre, y no rompas[b] tu pacto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta el fin», es decir, «no nos abandones del todo».
    reason: lexical_alternative
  - marker: b
    text: O «no anules tu pacto». El verbo griego literalmente puede significar «dispersar» o «esparcir».
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ παραδῷς
  english_pob_choice: Do not give us over
  chosen_spanish: No nos entregues
  alternatives_spanish:
  - No nos des
  - No nos entregues en manos de
  lexicon: BDAG
  rationale: παραδίδωμι puede significar entregar, poner en manos de, o dar en poder de alguien. En español, «entregues» comunica bien la acción de abandonarnos al juicio o a la ruina sin sonar mecánico.
- source_word: εἰς τέλος
  english_pob_choice: utterly
  chosen_spanish: del todo
  alternatives_spanish:
  - completamente
  - hasta el fin
  - totalmente
  lexicon: LSJ
  rationale: La expresión puede ser idiomática con el sentido de abandono total. «Del todo» preserva esa fuerza en un español natural sin forzar una lectura meramente temporal.
- source_word: διὰ τὸ ὄνομά σου
  english_pob_choice: for the sake of your name
  chosen_spanish: por amor de tu nombre
  alternatives_spanish:
  - por causa de tu nombre
  - por el bien de tu nombre
  - a causa de tu nombre
  lexicon: BDAG
  rationale: La petición apela al honor y la reputación del nombre divino. «Por amor de tu nombre» es una formulación digna y bíblica en español, y mantiene el valor relacional y pactual de la expresión.
- source_word: μὴ διασκεδάσῃς
  english_pob_choice: do not break your covenant
  chosen_spanish: no deshagas
  alternatives_spanish:
  - no disperses
  - no anules
  - no rompas
  lexicon: LSJ
  rationale: El verbo griego literalmente puede significar dispersar o esparcir. En español, con «pacto» como objeto, «deshagas» conserva la idea de deshacer lo establecido sin imponer de entrada una metáfora diferente o una conclusión jurídica más fuerte.
- source_word: τὴν διαθήκην
  english_pob_choice: your covenant
  chosen_spanish: tu pacto
  alternatives_spanish:
  - tu alianza
  - tu convenio
  lexicon: BDAG
  rationale: διαθήκη en contexto bíblico tiene fuerza pactual. «Pacto» es claro, reverente y ampliamente inteligible en español; «alianza» también es posible, pero «pacto» expresa mejor la solemnidad del término en este registro.
theological_decisions:
- issue: How to express the plea not to abandon the people completely
  english_pob_reading: Do not give us over utterly
  chosen_spanish_reading: No nos entregues del todo
  alternative_spanish_readings:
  - No nos entregues completamente
  - No nos abandones del todo
  - No nos entregues hasta el fin
  rationale: El giro pide que Dios no permita un abandono total. «Del todo» comunica la totalidad de manera sobria y mantiene abierto el matiz idiomático de εἰς τέλος sin reducirlo solo a tiempo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Whether to preserve the concrete image behind διασκεδάσῃς or move to the idiomatic covenantal sense
  english_pob_reading: do not break your covenant
  chosen_spanish_reading: no deshagas tu pacto
  alternative_spanish_readings:
  - no rompas tu pacto
  - no anules tu pacto
  - no disperses tu pacto
  rationale: La POB inglesa registra la tensión entre la imagen literal de «scatter/disperse» y el sentido idiomático «break/annul». En español, «deshagas» preserva cierta concreción verbal y evita borrar por completo la imagen, mientras que el contexto de pacto sigue claro.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
translation_notes:
  revision_awareness: 'La versión inglesa más reciente ajustó εἰς τέλος desde un valor más interpretativo hacia «utterly» y prefirió «break your covenant» sobre «scatter your covenant» por su naturalidad idiomática. En español se ha buscado conservar ambas tensiones: una formulación fluida para el abandono total y una expresión que no borre por completo el trasfondo literal del verbo griego en relación con el pacto.'
  spanish_consistency_notes:
  - Se mantiene «pacto» para διαθήκη, coherente con el uso bíblico-covenantal.
  - Se evita «SEÑOR» como máscara para el nombre divino; aquí el texto habla de «tu nombre», por lo que no aplica una sustitución terminológica.
  - Se usa un tono reverente pero moderno, apto para lectura pública y auditabilidad lexical.
