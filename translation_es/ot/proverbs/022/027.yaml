translation:
  language: es
  text: Si no tienes con qué pagar[a], ¿por qué habría de quitarte tu cama de debajo de ti?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu lecho» o «tu lugar para dormir». El hebreo nombra específicamente el objeto que se toma, no solo una prenda de garantía en sentido general.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: La cláusula abre una condición real, y en español «si» expresa de manera natural la advertencia condicional del proverbio.
- source_word: אֵין לְךָ
  english_pob_choice: have nothing
  chosen_spanish: no tienes
  alternatives_spanish:
  - no hay para ti
  - no tienes nada
  lexicon: HALOT
  rationale: Con la preposición y el pronombre, la idea es posesión inexistente; en español resulta más idiomático y fiel decir «no tienes» que calcar «no hay para ti».
- source_word: לְשַׁלֵּם
  english_pob_choice: with which to pay
  chosen_spanish: con qué pagar
  alternatives_spanish:
  - para pagar
  - para saldar
  lexicon: HALOT
  rationale: El infinitivo expresa pagar una deuda. «Con qué pagar» conserva el matiz instrumental implícito sin añadir contenido ajeno.
- source_word: לָמָּה
  english_pob_choice: why should
  chosen_spanish: por qué han de
  alternatives_spanish:
  - por qué
  - para qué han de
  lexicon: HALOT
  rationale: La pregunta es retórica y admonitiva; «por qué han de» reproduce mejor esa fuerza en español que un simple «por qué».
- source_word: יִקַּח
  english_pob_choice: he take
  chosen_spanish: han de quitarte
  alternatives_spanish:
  - te ha de quitar
  - te tome
  lexicon: HALOT
  rationale: Aunque el hebreo usa tercera masculina singular, el español suena más natural en una pregunta retórica general con plural impersonal. «Quitarte» mantiene la idea de retirar el objeto de tu posesión.
- source_word: מִשְׁכָּבְךָ
  english_pob_choice: your bed
  chosen_spanish: la cama
  alternatives_spanish:
  - tu cama
  - tu lecho
  - tu lugar de dormir
  lexicon: HALOT
  rationale: El sustantivo nombra el objeto concreto tomado. «La cama» comunica con claridad la imagen y evita la interpretación abstracta de «pacto» o «garantía».
- source_word: מִתַּחְתֶּיךָ
  english_pob_choice: from under you
  chosen_spanish: de debajo de ti
  alternatives_spanish:
  - de bajo de ti
  - de debajo tuyo
  lexicon: HALOT
  rationale: La expresión conserva la imagen vívida de quitar la cama desde abajo del durmiente. «De debajo de ti» es la forma más natural y exacta en español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide con el sentido auditado en inglés: una pregunta retórica que advierte sobre la toma del objeto personal, no una abstracción sobre una garantía genérica.'
  spanish_consistency_notes:
  - Se conserva el registro sapiencial y sobrio del proverbio.
  - Se evitó «SEÑOR» y términos eclesiásticos no presentes en el verso.
  - La tercera persona del hebreo se naturalizó en español con una formulación impersonal («han de»), sin perder el tono general de advertencia.
