base_translation:
  language: en
  yaml_path: translation/ot/isaiah/040/009.yaml
  text: Go up on a high mountain[a], bearer of good news to Zion; lift up your voice with strength, bearer of good news to Jerusalem; lift it up, do not fear; say to the cities of Judah[b], “Behold your God!”
  footnotes:
  - marker: a
    text: Or, 'O Zion, bearer of good news, go up on a high mountain ... O Jerusalem, bearer of good news, lift up your voice with strength.' The Hebrew can also be read with Zion and Jerusalem as the heralds addressed directly.
    reason: alternative_reading
  - marker: b
    text: Or, 'you who bring good news to Zion ... to Jerusalem.' The feminine participle may describe the messenger rather than the city personified.
    reason: lexical_alternative
