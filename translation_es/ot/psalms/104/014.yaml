translation:
  language: es
  text: Hace brotar hierba para el ganado, y plantas para el trabajo del hombre[a], para sacar de la tierra pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la humanidad». El hebreo usa אָדָם («hombre») en sentido genérico y representativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַצְמִיחַ
  english_pob_choice: He causes ... to grow
  chosen_spanish: Hace brotar
  alternatives_spanish:
  - causa que crezca
  - hace crecer
  lexicon: HALOT
  rationale: El participio hifil expresa causalidad. En español, «hace brotar» comunica de modo natural que Dios es quien provoca el crecimiento, sin perder la fuerza causativa del hebreo.
- source_word: חָצִיר
  english_pob_choice: grass
  chosen_spanish: hierba
  alternatives_spanish:
  - pasto
  - paja
  lexicon: HALOT
  rationale: En este contexto se trata de vegetación para alimento animal. «Hierba» es amplio, natural en español y suficientemente preciso para la imagen pastoral.
- source_word: לַבְּהֵמָה
  english_pob_choice: for the cattle
  chosen_spanish: para el ganado
  alternatives_spanish:
  - para las bestias
  - para el ganado mayor
  lexicon: HALOT
  rationale: בְּהֵמָה designa animales domésticos de pastoreo en sentido general. «Ganado» transmite bien esa referencia colectiva en español.
- source_word: וְעֵשֶׂב
  english_pob_choice: and plants
  chosen_spanish: y plantas
  alternatives_spanish:
  - y vegetación
  - y hierbas
  lexicon: HALOT
  rationale: עֵשֶׂב es más amplio que «hierbas» culinarias. «Plantas» mantiene la amplitud del término y funciona con naturalidad en español.
- source_word: לַעֲבֹדַת הָאָדָם
  english_pob_choice: for the service of man
  chosen_spanish: para el trabajo del hombre
  alternatives_spanish:
  - para el servicio del hombre
  - para el uso del hombre
  - para el trabajo de la humanidad
  lexicon: HALOT
  rationale: עֲבֹדָה puede significar labor, servicio o trabajo. «Trabajo del hombre» conserva la relación con la actividad humana sin restringir indebidamente el sentido a la agricultura sola. Se mantiene «hombre» porque אָדָם aparece en singular genérico y el audit trail inglés preserva esa forma representativa.
- source_word: לְהוֹצִיא
  english_pob_choice: to bring forth
  chosen_spanish: para sacar
  alternatives_spanish:
  - para producir
  - para hacer salir
  - para traer
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad. «Para sacar» es breve, natural y conserva la idea de hacer salir el alimento de la tierra.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: Aunque לֶחֶם a veces puede ampliar su sentido a alimento, aquí el sentido básico «pan» encaja con la imaginería agrícola del verso.
- source_word: מִן הָאָרֶץ
  english_pob_choice: from the earth
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - desde la tierra
  - del suelo
  lexicon: HALOT
  rationale: אֶרֶץ apunta aquí a la tierra como fuente de la producción. «De la tierra» es la opción más natural y fiel en español.
theological_decisions:
- issue: Valor genérico de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - las personas
  - la humanidad / el ser humano
  rationale: El hebreo usa אָדָם en singular genérico y representativo. Se conserva «el hombre» para reflejar esa forma del texto base; la lectura inclusiva es real, pero en esta línea poética la forma tradicional sigue siendo transparente y source-shaped.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: 'Concordante con la última revisión: no se requieren cambios sustantivos respecto del audit trail inglés; se preserva la fuerza causativa del hifil, la amplitud de עֵשֶׂב y el valor genérico de אָדָם.'
  spanish_consistency_notes:
  - Se mantiene un registro poético sobrio y bíblico, sin arcaísmos innecesarios.
  - «Hierba / plantas / pan / tierra» conservan el paralelismo del verso.
  - El orden y la estructura siguen de cerca el hebreo para mantener la claridad audit-able.
