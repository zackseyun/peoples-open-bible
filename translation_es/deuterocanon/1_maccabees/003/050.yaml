    rationale: El griego expresa intensidad, pero el modismo español añade color idiomático más fuerte y algo coloquial. «En alta voz» o «con voz fuerte» preserva mejor el equilibrio entre fidelidad y dignidad bíblica.
  - severity: low
    issue: La nota al pie tiene puntuación defectuosa
    rationale: Falta el signo de apertura en «¿adónde los conduciremos?».
