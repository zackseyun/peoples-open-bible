  text: Then the king of the north will return and raise a multitude greater than the former one[a]; and at the end of the times, after some years[c][b], he will surely come with a great army and with much equipment.
  footnotes:
  - marker: a
    text: Or 'a great multitude' for 'a multitude.' The Hebrew phrase can explicitly stress size as well as number.
    reason: lexical_alternative
  - marker: b
    text: Or 'at the end of the appointed times, after years.' The Hebrew expression is compressed and may emphasize a set period having run its course.
    reason: lexical_alternative
  - marker: c
    text: Or 'with great supplies' for 'with much equipment.' The Hebrew can refer broadly to possessions or resources accompanying the campaign.
    reason: lexical_alternative
