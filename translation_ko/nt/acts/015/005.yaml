translation:
  language: ko
  text: 그러나 바리새파에 속한 어떤 믿는 사람들이 일어나 말하기를, 「그들에게 할례를 행하고 모세의 율법을 지키도록 명령해야 합니다」 하였습니다.
  philosophy: optimal-equivalence
