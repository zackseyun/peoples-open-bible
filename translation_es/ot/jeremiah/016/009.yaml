translation:
  language: es
  text: 'Porque así dice Yahvé de los Ejércitos[a], Dios de Israel: He aquí, voy a hacer cesar de este lugar, ante los ojos de ustedes y en sus días, la voz de gozo y la voz de alegría, la voz del novio y la voz de la novia.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más tradicional, «el SEÑOR de los ejércitos».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el nombre divino: mantener el Tetragrámaton con una transliteración reconocible en español, no ocultarlo con un título. "Yahvé" es la forma española estándar elegida para preservar el nombre del pacto.'
- source_word: צְבָאוֹת
  english_pob_choice: of Armies
  chosen_spanish: de los Ejércitos
  alternatives_spanish:
  - de los ejércitos
  - de los ejércitos celestiales
  - de los ejércitos de los cielos
  lexicon: HALOT
  rationale: El inglés POB opta por una traducción transparente del título; en español, "de los Ejércitos" conserva esa literalidad y es idiomático. Se evita "de los hosts" por ser poco natural en español y por no comunicar con claridad el sentido concreto del hebreo.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: Construcción directa y transparente. "Dios de Israel" mantiene el sentido de pertenencia/covenio sin añadir explicaciones no presentes en el texto.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am about to
  chosen_spanish: He aquí, voy a
  alternatives_spanish:
  - He aquí, estoy por
  - Miren, voy a
  lexicon: HALOT
  rationale: La fórmula deíctica y anunciadora se conserva con "He aquí". Para el valor de inminencia del participio siguiente, "voy a" comunica mejor en español el matiz de acción próxima que una versión demasiado literal o dura.
- source_word: מַשְׁבִּית
  english_pob_choice: put an end
  chosen_spanish: hacer cesar
  alternatives_spanish:
  - poner fin a
  - acabar con
  - silenciar
  lexicon: HALOT
  rationale: 'El verbo hiphil de שׁבת tiene valor causativo: causar que cese. "Hacer cesar" preserva esa fuerza causal y funciona bien con los objetos sonoros y festivos del verso. Se evita "silenciar" por estrechar el campo semántico y sugerir solo sonido, cuando el verso abarca una atmósfera de celebración.'
- source_word: מִן הַמָּקוֹם הַזֶּה
  english_pob_choice: from this place
  chosen_spanish: de este lugar
  alternatives_spanish:
  - de este sitio
  - de aquí
  lexicon: HALOT
  rationale: Equivalencia simple y fiel. "Lugar" reproduce bien el referente local de juicio del hebreo.
- source_word: לְעֵינֵיכֶם
  english_pob_choice: before your eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - ante sus ojos
  - a la vista de ustedes
  - en sus ojos
  lexicon: HALOT
  rationale: Se conserva el valor de publicidad/testimonio. Se eligió "delante de sus ojos" porque corresponde bien a la imagen hebrea y es natural en español bíblico contemporáneo. El cambio de persona a tercera plural en el contexto español evita una estructura más rígida al encadenar la cita directa.
- source_word: וּבִימֵיכֶם
  english_pob_choice: and in your days
  chosen_spanish: y en sus días
  alternatives_spanish:
  - y en sus tiempos
  - y durante sus días
  - y en su tiempo
  lexicon: HALOT
  rationale: Se retiene el matiz temporal de la vida de los destinatarios. "Sus días" sigue de cerca el hebreo y mantiene el paralelismo con "delante de sus ojos". La referencia pronominal se armoniza con la solución en tercera plural usada en la cláusula anterior.
- source_word: קוֹל שָׂשׂוֹן
  english_pob_choice: the sound of joy
  chosen_spanish: la voz de gozo
  alternatives_spanish:
  - el sonido de gozo
  - la voz de alegría
  - el clamor de gozo
  lexicon: HALOT
  rationale: קוֹל puede ser "voz" o "sonido". Aquí se mantiene el paralelismo con los dos miembros siguientes y se traduce con "voz" para conservar la repetición retórica. "Gozo" refleja bien שָׂשׂוֹן como júbilo festivo; se evita igualarlo sin más con el término siguiente.
- source_word: וְקוֹל שִׂמְחָה
  english_pob_choice: and the sound of gladness
  chosen_spanish: la voz de alegría
  alternatives_spanish:
  - y la voz de gozo
  - el sonido de alegría
  - la voz de regocijo
  lexicon: HALOT
  rationale: Se distingue שִׂמְחָה de שָׂשׂוֹן con "alegría" para no borrar la pareja de términos festivos. Aunque ambos se superponen, la elección conserva la distinción que el inglés POB también quiso mantener entre joy/gladness.
- source_word: קוֹל חָתָן
  english_pob_choice: the voice of the bridegroom
  chosen_spanish: la voz del novio
  alternatives_spanish:
  - la voz del esposo
  - la voz del desposado
  lexicon: HALOT
  rationale: '"Novio" es la equivalencia natural en español para חָתָן en el marco nupcial. Se prefiere a "esposo" porque el contexto describe la celebración previa o asociada al casamiento, no necesariamente el estado marital ya consumado.'
- source_word: וְקוֹל כַּלָּה
  english_pob_choice: and the voice of the bride
  chosen_spanish: la voz de la novia
  alternatives_spanish:
  - la voz de la desposada
  - la voz de la esposa
  lexicon: HALOT
  rationale: '"Novia" corresponde de manera directa a כַּלָּה y mantiene el paralelismo con "novio". Se evita "esposa" para no desplazar el foco de la escena de boda.'
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre personal de Dios según la directriz del proyecto. No se sustituye por un título devocional ni se mascara con mayúsculas, porque el texto hebreo usa el Tetragrámaton explícitamente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tonalidad de cesación de la celebración
  english_pob_reading: put an end ... to the sound of joy ... the voice of the bridegroom and the voice of the bride
  chosen_spanish_reading: voy a hacer cesar ... la voz de gozo ... la voz del novio y la voz de la novia
  alternative_spanish_readings:
  - voy a acabar con ... el gozo ... el novio y la novia
  - voy a silenciar ...
  rationale: Se conserva la acción judicial de Dios sobre la vida festiva del pueblo. "Hacer cesar" mantiene el valor causativo sin introducir una imagen más fuerte de la que el hebreo exige. No se traduce como simple ausencia accidental, sino como interrupción deliberada y pública.
  doctrine_reference: Jeremías 16:9 en su contexto de juicio sobre Judá
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la revisión más reciente sin cambios. La principal decisión de revisión para español fue mantener la transparencia del nombre divino como "Yahvé" y evitar una traducción más eclesiástica de צְבָאוֹת. También se resolvió el paralelismo hebreo de קוֹל con una repetición de "voz" en lugar de alternar innecesariamente entre "sonido" y "voz", para conservar el ritmo retórico del verso.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" para יְהוָה conforme al estándar del proyecto.
  - Se traduce צְבָאוֹת como "de los Ejércitos" para conservar la imagen militar/concreta del hebreo.
  - Se preserva la serie paralela de cuatro sustantivos auditivos con "voz" repetido para reflejar קוֹל.
  - '"Novio/novia" se usa para el par חָתָן / כַּלָּה en un contexto de boda, sin introducir una lectura distinta.'
