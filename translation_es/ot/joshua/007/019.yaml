review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del hebreo: vocativo afectuoso «בני», el modismo «dar gloria a Yahvé», la identificación «el Dios de Israel», la petición de declarar lo hecho y la prohibición de ocultarlo. Sin embargo, la nota al pie invierte indebidamente la prioridad semántica documentada en el rastro inglés revisado: el texto principal «dale gracias» está bien, pero la nota debería presentar «dale gracias» como lectura principal ya incorporada, y conservar como alternativas «y dale gracias a él»/«hazle confesión» según la evidencia, no sugerir como alternativa algo ya puesto en el texto.'
  spanish_quality_summary: 'El español es claro, natural y digno. «Hijo mío» funciona bien como vocativo; «da gloria a Yahvé» y «no me lo ocultes» son idiomáticos. Hay solo un ajuste menor de precisión editorial: la nota al pie necesita corregirse para que no contradiga ni desordene las alternativas semánticas. También conviene incluir el pronombre explícito «a él» en la alternativa para mayor paralelismo con el inglés auditado.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יהוה -> «Yahvé» correctamente; אֱלֹהֵי יִשְׂרָאֵל -> «el Dios de Israel»; no hay conflictos con otras entradas del glosario. La única desalineación está en la documentación de תוֹדָה: el texto principal «dale gracias» concuerda con la revisión inglesa final, pero la nota española no preserva correctamente la jerarquía de alternativas documentadas.'
  issues:
  - severity: medium
    issue: La nota al pie de [a] está invertida y parcialmente contradictoria con el texto principal y el audit trail inglés.
    rationale: 'El inglés final tiene en el texto principal «give thanks to him» y en nota: «Or ''and give him thanks,'' or in this context possibly ''make confession to him.''» En español, como ya se tradujo «y dale gracias» en el texto principal, la nota no debe ofrecer «y dale gracias» como alternativa secundaria ni poner «hazle confesión» en primer lugar sin reflejar la documentación inglesa.'
  revised_spanish_text: 'Entonces Josué dijo a Acán: «Hijo mío, por favor da gloria a Yahvé, el Dios de Israel, y dale gracias[a]. Por favor, dime qué has hecho; no me lo ocultes».'
  revised_footnotes:
