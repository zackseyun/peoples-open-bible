translation:
  language: es
  text: Los que se alegran de la caída de los piadosos[a] serán atrapados en una trampa, y el dolor los consumirá antes de su muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los piadosos» o «los devotos». Griego: εὐσεβῶν.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παγίδι
  english_pob_choice: in a trap
  chosen_spanish: en una trampa
  alternatives_spanish:
  - en una red
  - en un lazo
  lexicon: LSJ
  rationale: El dativo expresa el medio o esfera del atrapamiento. «Trampa» comunica con claridad la imagen de captura en español moderno y mantiene el valor metafórico de la advertencia.
- source_word: ἁλώσονται
  english_pob_choice: will be caught
  chosen_spanish: serán atrapados
  alternatives_spanish:
  - serán capturados
  - serán apresados
  lexicon: LSJ
  rationale: El futuro pasivo exige una acción sufrida por el sujeto. «Serán atrapados» conserva la conexión inmediata con «trampa» y suena natural en español.
- source_word: οἱ εὐφραινόμενοι
  english_pob_choice: those who rejoice
  chosen_spanish: los que se alegran
  alternatives_spanish:
  - los que se deleitan
  - los que se regocijan
  lexicon: LSJ
  rationale: El participio sustantivado describe a quienes toman placer en algo. «Los que se alegran» es directo y claro, sin elevar innecesariamente el registro.
- source_word: πτώσει
  english_pob_choice: the fall
  chosen_spanish: de la caída
  alternatives_spanish:
  - de la caída en desgracia
  - de la ruina
  lexicon: LSJ
  rationale: «Caída» reproduce el sustantivo básico πτῶσις sin añadir una interpretación más fuerte que el griego no obliga a explicitar.
- source_word: εὐσεβῶν
  english_pob_choice: the godly
  chosen_spanish: los piadosos
  alternatives_spanish:
  - los devotos
  - los justos
  lexicon: LSJ
  rationale: El término griego designa a los reverentes o devotos. En español, «piadosos» refleja mejor la categoría religiosa del término y conserva la alternativa lexical que el aparato inglés anotó.
- source_word: ὀδύνη
  english_pob_choice: pain
  chosen_spanish: el dolor
  alternatives_spanish:
  - la angustia
  - el sufrimiento
  lexicon: LSJ
  rationale: La palabra puede abarcar dolor físico o aflicción intensa. «Dolor» es suficientemente amplio y conserva la fuerza del castigo anunciado.
- source_word: καταναλώσει
  english_pob_choice: will consume
  chosen_spanish: consumirá
  alternatives_spanish:
  - devorará
  - aniquilará
  lexicon: LSJ
  rationale: El verbo transmite una imagen de consumición total. «Consumirá» reproduce esa metáfora con naturalidad en español y sin endurecerla más de lo que el griego requiere.
- source_word: πρὸ τοῦ θανάτου αὐτῶν
  english_pob_choice: before their death
  chosen_spanish: antes de su muerte
  alternatives_spanish:
  - antes de morir
  - antes de que mueran
  lexicon: LSJ
  rationale: La frase temporal se rinde de forma formal y clara. «Antes de su muerte» es idiomático en español y corresponde de cerca al griego.
theological_decisions:
- issue: εὐσεβῶν como categoría moral-religiosa
  english_pob_reading: the godly
  chosen_spanish_reading: los piadosos
  alternative_spanish_readings:
  - los devotos
  - los justos
  rationale: El verso no usa un término técnico de confesión, sino una categoría de reverencia y piedad. «Piadosos» preserva el matiz religioso-moral sin convertirlo en un equivalente doctrinal más estrecho.
  doctrine_reference: DOCTRINE.md §Translation philosophy; consistencia terminológica de vocabulario moral
- issue: Reproducir la secuencia de juicio poético sin suavizarla
  english_pob_reading: will be caught in a trap, and pain will consume them before their death
  chosen_spanish_reading: serán atrapados en una trampa, y el dolor los consumirá antes de su muerte
  alternative_spanish_readings:
  - caerán en una trampa, y el sufrimiento los destruirá antes de morir
  - serán apresados en una trampa, y la angustia los consumirá antes de su muerte
  rationale: La línea sapiencial presenta retribución directa y paralela. La traducción conserva la imagen de captura y la personificación del dolor como agente de juicio, sin atenuar la advertencia.
  doctrine_reference: Sabiduría sapiencial; principio retributivo en Sirácides
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas; la redacción española sigue de cerca esa lectura estable sin introducir variantes textuales ni ajustes interpretativos mayores.
  spanish_consistency_notes:
  - Se conserva «trampa» para mantener la imagen de captura vinculada al pasivo «serán atrapados».
  - Se usa «piadosos» para εὐσεβῶν, en paralelo con la nota alternativa que reconoce «devotos».
  - 'Se mantiene el orden retórico de la cola final: juicio sobre los que se alegran, luego consumición por el dolor, luego límite temporal antes de la muerte.'
