translation:
  language: es
  text: Tú[a], que nos has hecho ver muchas aflicciones[b] y calamidades, volverás y nos darás vida[c]; y desde las profundidades de la tierra volverás y me sacarás[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que nos has mostrado muchas aflicciones y calamidades». El verbo hebreo es causativo: «has hecho ver» o «has mostrado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «adversidades» o «angustias». Aquí la palabra hebrea describe sufrimientos o aflicciones padecidas, no mal moral.'
    reason: lexical_alternative
  - marker: c
    text: 'El hebreo cambia de «nos» a «me»: «nos darás vida ... me sacarás».'
    reason: textual_variant
  - marker: d
    text: «Desde las profundidades de la tierra» puede aludir metafóricamente a extrema humillación o cercanía de la muerte, y también puede evocar la tumba.
    reason: cultural_note
lexical_decisions:
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quien
  lexicon: HALOT
  rationale: Introduce una oración relativa en español de forma natural. 'Que' evita una repetición más pesada y funciona bien con un antecedente personal implícito en el vocativo a Dios.
- source_word: הראיתנו
  english_pob_choice: have made us see
  chosen_spanish: nos has hecho ver
  alternatives_spanish:
  - nos has mostrado
  - nos has causado ver
  lexicon: HALOT
  rationale: El hiphil de ראה es causativo; 'has hecho ver' conserva esa fuerza mejor que un simple 'mostrado', y suena natural en español.
- source_word: צָרוֹת
  english_pob_choice: troubles
  chosen_spanish: males
  alternatives_spanish:
  - aflicciones
  - angustias
  lexicon: HALOT
  rationale: En este contexto de sufrimiento vivido, 'males' comunica adversidades reales de manera breve y amplia; 'aflicciones' o 'angustias' serían posibles, pero aquí 'males' funciona mejor junto con 'calamidades'.
- source_word: רַבּוֹת
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - numerosos
  - grandes
  lexicon: HALOT
  rationale: El adjetivo cuantifica las צרות; 'muchos' conserva la relación directa con el sustantivo y la cadencia del verso.
- source_word: וְרָעוֹת
  english_pob_choice: and calamities
  chosen_spanish: y calamidades
  alternatives_spanish:
  - y males
  - y desgracias
  lexicon: HALOT
  rationale: Aquí רָעוֹת se refiere a experiencias dañinas, no a mal moral. 'Calamidades' expresa con claridad la severidad del padecimiento sin atribuir maldad ética a Dios.
- source_word: תָּשׁוּב
  english_pob_choice: will return
  chosen_spanish: volverás
  alternatives_spanish:
  - te volverás
  - regresarás
  lexicon: HALOT
  rationale: El verbo שוב se repite en el verso; 'volverás' mantiene la repetición y la estructura poética de manera natural en español.
- source_word: תְּחַיֵּנוּ
  english_pob_choice: revive us
  chosen_spanish: nos darás vida
  alternatives_spanish:
  - nos revivirás
  - nos devolverás la vida
  lexicon: HALOT
  rationale: La forma piel de חיה expresa restauración a la vida o vitalidad tras gran aflicción. 'Nos darás vida' es claro y sobrio en español; evita sonar más técnica que el original.
- source_word: וּמִתְּהֹמוֹת הָאָרֶץ
  english_pob_choice: and from the depths of the earth
  chosen_spanish: y desde las profundidades de la tierra
  alternatives_spanish:
  - y desde los abismos de la tierra
  - y desde las profundidades de la tierra misma
  lexicon: HALOT
  rationale: '''Profundidades de la tierra'' preserva la imagen espacial y la posible resonancia funeraria o de extrema humillación sin explicitar una interpretación única.'
- source_word: תַּעֲלֵנִי
  english_pob_choice: bring me up
  chosen_spanish: me sacarás
  alternatives_spanish:
  - me levantarás
  - me subirás
  lexicon: HALOT
  rationale: עלה en hiphil es hacer subir. 'Me sacarás' comunica bien la salida desde abajo en español y mantiene el movimiento ascendente implícito, aunque 'me levantarás' también sería posible.
- source_word: נו ... ני
  english_pob_choice: us ... me
  chosen_spanish: nos ... me
  alternatives_spanish:
  - nos ... nos
  - me ... me
  lexicon: Hebrew grammar
  rationale: El texto masorético pasa del plural ('nos') al singular ('me'); se conserva ese cambio en lugar de nivelarlo, porque forma parte del testimonio recibido y de su fuerza literaria.
theological_decisions:
- issue: Cómo rendir רָעוֹת sin sugerir mal moral en Dios
  english_pob_reading: experiential calamities
  chosen_spanish_reading: calamidades / males padecidos
  alternative_spanish_readings:
  - males
  - desgracias
  - evils
  rationale: El salmista habla de sufrimiento y aflicción experimentados, no de mal moral cometido por Dios. 'Calamidades' mantiene la gravedad del texto y evita una implicación doctrinal no exigida por el hebreo.
  doctrine_reference: 'Principio POB: preservar el sentido llano del texto sin importar conclusiones doctrinales ajenas al pasaje.'
- issue: Cómo tratar la imagen 'desde las profundidades de la tierra'
  english_pob_reading: retain the metaphor without making resurrection explicit
  chosen_spanish_reading: conservar la metáfora sin hacer explícita la resurrección
  alternative_spanish_readings:
  - desde el sepulcro me resucitarás
  - me resucitarás desde la tierra
  rationale: La imagen puede apuntar a humillación extrema, cercanía de la muerte o eco del sepulcro. La traducción conserva esa tensión teológica en vez de resolverla prematuramente en lenguaje de resurrección corporal.
  doctrine_reference: 'Principio POB: preservar la tensión teológica cuando el texto permite más de una lectura legítima.'
translation_notes:
  revision_awareness: La revisión más reciente dejó el texto sin cambios; la redacción española sigue de cerca el auditable del inglés POB y el hebreo base, manteniendo las tensiones léxicas y teológicas relevantes sin resolverlas indebidamente.
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma principal cuando el hebreo usa el nombre divino; aquí el verso está en segunda persona y no requiere explicitarlo en el texto.
  - Se conserva la alternancia plural/singular del hebreo ('nos' / 'me') porque es un rasgo textual relevante.
  - '''Calamidades'' se usa para רָעוֹת en sentido experiencial, evitando ''mal'' moral.'
  - La imagen final permanece abierta entre humillación extrema, muerte cercana y eco sepulcral, siguiendo la cautela del POB inglés.
