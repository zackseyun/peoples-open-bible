lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de
  lexicon: HALOT
  rationale: El hebreo usa la construcción constructa «hijos de» para introducir un linaje o clan en un registro censal. En español, «los hijos de» conserva la forma transparente del original y es inteligible como designación corporativa; «descendientes de» explicita mejor el sentido colectivo, pero se aleja un poco más de la superficie del hebreo.
- source_word: פַרְעֹשׁ
  english_pob_choice: Parosh
  chosen_spanish: Paros
  alternatives_spanish:
  - Parosh
  lexicon: HALOT
  rationale: Es nombre propio; se translitera al español. Se adapta la terminación a la grafía española habitual («Paros») para una lectura más natural en español, sin cambiar la identidad del nombre.
- source_word: אַלְפַּיִם מֵאָה וְשִׁבְעִים וּשְׁנָיִם
  english_pob_choice: 2,172
  chosen_spanish: '2.172'
  alternatives_spanish:
  - dos mil ciento setenta y dos
  - 2,172
  lexicon: HALOT
  rationale: El hebreo suma 2,172. En una lista censal, los números en dígitos hacen más legible el dato en español. Se usa puntuación española para miles («2.172») sin alterar el valor numérico.
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado solo en la capitalización inicial; el sentido quedó confirmado como una entrada censal breve. La versión española mantiene esa concisión y la misma estructura de registro: grupo/clan + nombre propio + total numérico.'
  spanish_consistency_notes:
  - Se conservó el estilo de lista censal, sin añadir artículo o verbo no presentes en el hebreo.
  - Se mantuvo la alternativa «descendientes» en nota para reflejar la tensión lexical entre literalidad y sentido corporativo.
  - La cifra se adaptó a la convención tipográfica española con punto de millares.
