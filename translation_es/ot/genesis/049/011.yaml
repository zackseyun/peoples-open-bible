translation:
  language: es
  text: Atando a la vid su asno[a], y a la vid escogida[b] el pollino de su asna, lava en vino sus vestidos, y en la sangre de uvas[c] su manto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'su pollino'; עִיר puede designar un asno joven o pollino.
    reason: lexical_alternative
  - marker: b
    text: O 'a la vid noble'; שֹׂרֵקָה designa una vid selecta o de calidad.
    reason: lexical_alternative
  - marker: c
    text: '''Sangre de uvas'' es una expresión poética hebrea para el jugo de uvas o el vino, conservada aquí por su fuerza imagística.'
    reason: cultural_note
lexical_decisions:
- source_word: אֹסְרִי
  english_pob_choice: Binding
  chosen_spanish: Atando
  alternatives_spanish:
  - Él ata
  - Atando
  lexicon: HALOT
  rationale: El hebreo es un participio descriptivo en contexto poético. En español, el gerundio mantiene mejor el carácter de escena vívida y continua que un presente simple, sin perder la fuerza verbal del original.
- source_word: לַגֶּפֶן
  english_pob_choice: to the vine
  chosen_spanish: a la vid
  alternatives_spanish:
  - a la vid
  - a una vid
  lexicon: HALOT
  rationale: גפן designa la vid/vine. 'La vid' conserva el singular con valor genérico y evita una paráfrasis innecesaria.
- source_word: עִירֹה
  english_pob_choice: his donkey
  chosen_spanish: su asno
  alternatives_spanish:
  - su potrillo
  - su pollino
  - su asno joven
  lexicon: HALOT
  rationale: El inglés POB opta por 'his donkey' para evitar repetir 'colt' en la frase siguiente. En español, 'su asno' mantiene el referente animal sin forzar una repetición artificial; el matiz de cría queda aclarado en la segunda mitad de la cola.
- source_word: וְלַשֹּׂרֵקָה
  english_pob_choice: and ... to the choice vine
  chosen_spanish: y a la vid escogida
  alternatives_spanish:
  - y a la vid noble
  - y a la vid selecta
  lexicon: HALOT
  rationale: שֹׂרֵקָה expresa una vid selecta o de calidad. 'Escogida' comunica bien la idea en español y conserva el valor apreciativo del término.
- source_word: בְּנִי אֲתֹנוֹ
  english_pob_choice: his donkey’s colt
  chosen_spanish: el potro de su asna
  alternatives_spanish:
  - el pollino de su asna
  - la cría de su asna
  - el hijo de su asna
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'el hijo de su asna'. En español, 'potro' y 'asna' comunican de forma natural la relación filial/animal; 'pollino' sería también posible, pero 'potro' suena más fluido y dignificado en este verso poético.
- source_word: כִּבֵּס
  english_pob_choice: he washes
  chosen_spanish: lava
  alternatives_spanish:
  - lava
  - ha lavado
  - lavará
  lexicon: HALOT
  rationale: El perfecto hebreo en poesía puede describir una escena característica o profética. El presente 'lava' reproduce la imagen como tableau, en línea con la decisión inglesa de mantener vividez poética.
- source_word: בַּיַּיִן
  english_pob_choice: in wine
  chosen_spanish: en vino
  alternatives_spanish:
  - con vino
  - dentro del vino
  lexicon: HALOT
  rationale: La preposición ב aquí se conserva mejor con 'en', preservando la imagen concreta de lavar dentro de vino, no solo usando vino como instrumento.
- source_word: לְבֻשׁוֹ
  english_pob_choice: his garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - su ropa
  - sus prendas
  - su vestidura
  lexicon: HALOT
  rationale: '''Vestidos'' comunica el plural colectivo natural del sustantivo y mantiene el paralelo con el siguiente miembro del verso.'
- source_word: וּבְדַם עֲנָבִים
  english_pob_choice: and ... in the blood of grapes
  chosen_spanish: y en la sangre de uvas
  alternatives_spanish:
  - y en la sangre de las uvas
  - y con el jugo de uvas
  - y en el vino de uvas
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de 'sangre de uvas' sin aplanarla a 'jugo' o 'vino'. 'Uvas' en singular genérico funciona como equivalente poético natural en español.
- source_word: סוּתוֹ
  english_pob_choice: his robe
  chosen_spanish: su manto
  alternatives_spanish:
  - su capa
  - su ropa exterior
  - su vestidura
  lexicon: HALOT
  rationale: סוּתָה es un término de prenda en paralelo con לְבֻשׁוֹ. 'Manto' ofrece una equivalencia digna y reconocible en español bíblico sin imponer más precisión de la que el hebreo da.
theological_decisions:
- issue: Imaginería real/tribal y posible lectura mesiánica en la bendición de Judá
  english_pob_reading: Retain the verse as poetic imagery of extraordinary abundance and royal prosperity without making an explicit messianic interpretation in the translation itself.
  chosen_spanish_reading: Mantener el verso como imaginería poética de abundancia extraordinaria y prosperidad real/tribal, sin introducir una lectura mesiánica explícita en el texto español.
  alternative_spanish_readings:
  - Profecía mesiánica directa
  - Descripción puramente histórica de la prosperidad de Judá
  rationale: El hebreo presenta una escena poética de abundancia y dignidad. Aunque la tradición cristiana ha visto aquí un alcance mesiánico dentro del oráculo mayor sobre Judá, esa interpretación no está explicitada por el sintagma de este versículo y no debe imponerse en la traducción principal.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto hebreo masorético y coincide con el control editorial más reciente: no se introdujeron cambios respecto del último pase de revisión, que marcó el registro como sin modificaciones.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma para el nombre divino, pero este versículo no contiene el Tetragrámaton ni requiere decisión al respecto.
  - '''Vid escogida'' conserva el valor selectivo de שֹׂרֵקָה sin recurrir a un tecnicismo innecesario.'
  - Se conserva la metáfora 'sangre de uvas' en vez de explicitar 'jugo', para no borrar la tensión poética documentada por el POB inglés.
