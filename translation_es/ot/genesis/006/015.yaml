translation:
  language: es
  text: 'Y esto es cómo la harás: la longitud del arca será de trescientos codos[a], su anchura de cincuenta codos y su altura de treinta codos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un codo era una antigua unidad de longitud, aproximadamente la distancia del codo a la punta de los dedos.
    reason: cultural_note
lexical_decisions:
- source_word: וְזֶה / וְ/זֶה
  english_pob_choice: And this is how
  chosen_spanish: Y así lo harás
  alternatives_spanish:
  - Y esto es lo que harás
  - Y de esta manera lo harás
  lexicon: WLC + HALOT
  rationale: La frase introductoria no solo presenta información; introduce una instrucción precisa sobre la construcción. En español, 'Y así lo harás' transmite con naturalidad el valor directivo de la construcción sin alejarse del hebreo.
- source_word: אֲשֶׁר תַּעֲשֶׂה אֹתָהּ
  english_pob_choice: you shall make it
  chosen_spanish: lo harás
  alternatives_spanish:
  - la harás
  - lo construirás
  lexicon: WLC + HALOT
  rationale: El verbo עשה en este contexto de fabricación apunta a la construcción del arca. 'Lo harás' conserva el valor de instrucción y evita sobreexplicar; el pronombre neutro español no marca el femenino del antecedente como lo hace el hebreo.
- source_word: שְׁלֹשׁ מֵאוֹת אַמָּה
  english_pob_choice: three hundred cubits
  chosen_spanish: trescientos codos
  alternatives_spanish:
  - 300 codos
  lexicon: HALOT
  rationale: Se mantiene la unidad antigua 'codos' para conservar la especificidad del texto fuente y la equivalencia histórica, siguiendo la decisión inglesa de no convertir a medidas modernas.
- source_word: אֹרֶךְ
  english_pob_choice: the length
  chosen_spanish: la longitud
  alternatives_spanish:
  - el largo
  lexicon: HALOT
  rationale: '''Longitud'' funciona bien en una especificación técnica de medidas y corresponde directamente al sustantivo hebreo en este contexto.'
- source_word: הַתֵּבָה
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - la caja
  - la nave
  lexicon: HALOT
  rationale: '''תֵּבָה'' es el término establecido para el arca de Noé en Génesis. ''Arca'' preserva el uso bíblico tradicional y es plenamente inteligible en español.'
- source_word: חֲמִשִּׁים אַמָּה רָחְבָּהּ
  english_pob_choice: its width fifty cubits
  chosen_spanish: su anchura de cincuenta codos
  alternatives_spanish:
  - su ancho de cincuenta codos
  - cincuenta codos de anchura
  lexicon: HALOT
  rationale: '''Anchura'' reproduce con precisión el valor nominal del hebreo y mantiene el registro técnico de las dimensiones del arca. ''Su anchura de...'' refleja la relación posesiva del sufijo.'
- source_word: וּשְׁלֹשִׁים אַמָּה קוֹמָתָהּ
  english_pob_choice: and its height thirty cubits
  chosen_spanish: y su altura de treinta codos
  alternatives_spanish:
  - y treinta codos de altura
  - y su estatura de treinta codos
  lexicon: HALOT
  rationale: '''Altura'' es la equivalencia natural para el contexto arquitectónico. Se evita ''estatura'' porque en español sugiere más fuertemente seres vivos que una estructura.'
translation_notes:
  revision_awareness: El pasaje muestra acuerdo alto con el texto fuente y con la auditoría inglesa; no se observaron revisiones aplicadas ni tensiones textuales relevantes en esta unidad de medidas.
  spanish_consistency_notes:
  - Se mantuvo 'arca' para תֵּבָה en coherencia con Génesis.
  - Se conservaron las unidades antiguas sin conversión métrica, conforme al enfoque del POB inglés.
  - El tono es instructivo y sobrio, adecuado para una especificación de construcción.
  - La nota de 'codos' se ancla solo en el primer uso, como en el texto inglés auditado.
