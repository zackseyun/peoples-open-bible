translation:
  language: es
  text: 'Y dijo: «Échalo al suelo». Entonces lo echó al suelo, y se convirtió en una serpiente, y Moisés huyó de ella[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «de delante de ella» (o «de delante de él»), un modismo que significa «lejos de ella» o «de su presencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Entonces dijo
  - Y dijo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se conserva con una coordinación simple. En español, omito la repetición innecesaria de sujeto explícito si el contexto ya lo identifica, pero aquí lo mantengo para claridad y fluidez narrativa.
- source_word: הַשְׁלִיכֵהוּ
  english_pob_choice: Throw it
  chosen_spanish: Échalo
  alternatives_spanish:
  - Tíralo
  - Lánzalo
  lexicon: HALOT
  rationale: השליך expresa arrojar/verter con fuerza. «Échalo» es natural en español y preserva mejor la directividad imperativa que una paráfrasis más suave.
- source_word: אַרְצָה
  english_pob_choice: on the ground
  chosen_spanish: en tierra
  alternatives_spanish:
  - al suelo
  - sobre el suelo
  lexicon: HALOT
  rationale: El hebreo direccional hacia la tierra/terreno se rinde de manera idiomática con «en tierra», que conserva el movimiento hacia abajo sin volverlo innecesariamente explicativo.
- source_word: וַיַּשְׁלִיכֵהוּ
  english_pob_choice: So he threw it
  chosen_spanish: Y él lo echó
  alternatives_spanish:
  - Y lo echó
  - Entonces lo echó
  lexicon: HALOT
  rationale: Mantiene la secuencia narrativa y el referente del objeto. «Echó» sigue de cerca el verbo del mandato y funciona de forma natural en español.
- source_word: וַיְהִי לְנָחָשׁ
  english_pob_choice: and it became a snake
  chosen_spanish: y se convirtió en una serpiente
  alternatives_spanish:
  - y se volvió una serpiente
  - y se hizo una serpiente
  lexicon: HALOT
  rationale: El hebreo indica un cambio de estado. «Se convirtió en» expresa con claridad la transformación sin añadir matices ajenos. «Serpiente» es una alternativa válida a «snake» y conserva la amplitud semántica del hebreo נָחָשׁ.
- source_word: וַיָּנָס
  english_pob_choice: and Moses fled
  chosen_spanish: y Moisés huyó
  alternatives_spanish:
  - y Moisés corrió
  - y Moisés escapó
  lexicon: HALOT
  rationale: «Huyó» preserva la fuerza de escapar por temor y mantiene el registro bíblico sin caer en coloquialismo.
- source_word: מִפָּנָיו
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de delante de ella
  - de su presencia
  lexicon: HALOT
  rationale: El sufijo puede referirse al objeto transformado, aquí la serpiente. En español, «de ella» resulta natural y conserva la idea de apartarse de su presencia; la alternativa más literal «de delante de ella» es explicativa pero más pesada.
theological_decisions:
- issue: Referente del pronombre final
  english_pob_reading: from it
  chosen_spanish_reading: de ella
  alternative_spanish_readings:
  - de él
  - de delante de ella
  - de su presencia
  rationale: El texto español debe reflejar que el alejamiento de Moisés es respecto de la serpiente recién aparecida. Dado que el antecedente inmediato en español es femenino («serpiente»), «de ella» evita ambigüedad y no fuerza una lectura masculina del sufijo hebreo.
  doctrine_reference: Ex 4:3; uso contextual del referente pronominal en narrativa hebrea
translation_notes:
  revision_awareness: El audit trail inglés revisó la cola final de «fled from before it» a «fled from it» por naturalidad. En español se aplica la misma decisión de naturalidad sin perder el sentido hebreo de apartarse de la presencia del animal. También se mantiene la equivalencia estándar de נָחָשׁ con un término general («serpiente») y no con una denominación más técnica o más específica sin apoyo del contexto.
  spanish_consistency_notes:
  - Se conserva el tiempo narrativo perfecto simple/compuesto según el español bíblico natural, sin forzar calcos del wayyiqtol.
  - Se evita «SEÑOR» o terminología no presente en el verso.
  - La imagen espacial de אַרְצָה se rinde con una expresión idiomática española breve y clara.
  - 'Se mantiene la progresión verbal breve del hebreo: dijo → echó → se convirtió → huyó.'
