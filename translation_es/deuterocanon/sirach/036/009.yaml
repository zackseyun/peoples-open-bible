    rationale: La cláusula griega solo tiene sujeto implícito y complementos preposicionales; no expresa el referente singular de 'lo'. Añadirlo resuelve una ambigüedad que la POB inglesa conservó deliberadamente con 'he'.
  - severity: medium
    issue: Marcación de notas incorrecta y reutilizada.
    rationale: Aparece '[ a]' con espacio interno y el mismo marcador 'a' anclado dos veces para una sola nota. Las instrucciones exigen marcadores únicos y exactamente reproducidos en el texto.
  - severity: medium
