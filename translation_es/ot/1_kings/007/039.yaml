translation:
  language: es
  text: Puso cinco soportes a la derecha de la casa y cinco a la izquierda de la casa[a], y puso el Mar en el lado sureste de la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «del lado derecho de la casa, hacia el oriente, frente al sur»; una descripción espacial compacta que indica el lado sureste.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמְּכֹנוֹת
  english_pob_choice: stands
  chosen_spanish: bases
  alternatives_spanish:
  - soportes
  - estrados
  lexicon: HALOT
  rationale: En el contexto del mobiliario del templo, el término designa las estructuras de bronce que sostenían las palanganas. En español, «bases» comunica bien esa función sin añadir una mecánica no explícita en el hebreo. «Soportes» es posible, pero menos preciso aquí; «estrados» es más ambiguo para el lector moderno.
- source_word: כֶּתֶף
  english_pob_choice: side
  chosen_spanish: lado
  alternatives_spanish:
  - costado
  - hombro
  lexicon: HALOT
  rationale: Aunque literalmente es «hombro», en descripciones arquitectónicas significa el costado o lado de una estructura. «Lado» es la opción más natural y fiel al valor espacial.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa del templo
  lexicon: HALOT
  rationale: El hebreo dice «la casa». En este pasaje se refiere al templo, pero conservar «casa» respeta la formulación del original y el uso bíblico habitual. «Templo» sería una interpretación contextual válida, pero menos cercana al texto.
- source_word: מִיָּמִין
  english_pob_choice: on the right side
  chosen_spanish: a la derecha
  alternatives_spanish:
  - al lado derecho
  - a mano derecha
  lexicon: HALOT
  rationale: La expresión hebrea es direccional y corpórea. «A la derecha» mantiene esa orientación sin forzar todavía una equivalencia geográfica.
- source_word: מִשְּׂמֹאלוֹ
  english_pob_choice: on the left side
  chosen_spanish: a la izquierda
  alternatives_spanish:
  - al lado izquierdo
  - a mano izquierda
  lexicon: HALOT
  rationale: Como en el caso anterior, se preserva el lenguaje orientacional del hebreo. «A la izquierda» es claro y natural en español.
- source_word: הַיָּם
  english_pob_choice: the Sea
  chosen_spanish: el Mar
  alternatives_spanish:
  - la gran pila
  - la gran vasija
  lexicon: HALOT
  rationale: Aquí se trata del gran recipiente de bronce del templo, llamado convencionalmente «el Mar». En español, «Mar» con mayúscula preserva ese nombre técnico y evita confundirlo con un cuerpo de agua natural.
- source_word: הַיְמָנִית
  english_pob_choice: right
  chosen_spanish: sureste
  alternatives_spanish:
  - derecha
  - del sur
  lexicon: HALOT
  rationale: El hebreo combina «lado derecho», «hacia el oriente» y «frente al sur», dando una localización compacta que el sentido global identifica como el lado sureste. En español, «al lado sureste» expresa la ubicación resultante de manera natural. Se conserva la nota de la lectura espacial compleja en la nota al pie.
- source_word: קֵדְמָה
  english_pob_choice: eastward
  chosen_spanish: hacia el oriente
  alternatives_spanish:
  - al este
  - hacia adelante
  lexicon: HALOT
  rationale: Este adverbio puede indicar orientación al este o hacia delante según el marco espacial. «Hacia el oriente» preserva el valor direccional bíblico y su resonancia más formal.
- source_word: מִמּוּל נֶגֶב
  english_pob_choice: toward the south
  chosen_spanish: frente al sur
  alternatives_spanish:
  - opuesto al sur
  - hacia el sur
  lexicon: HALOT
  rationale: 'La secuencia completa es una descripción espacial compacta: «del lado derecho de la casa, hacia el oriente, frente al sur». En español, «frente al sur» conserva esa relación de oposición/ubicación y ayuda a entender que el punto final es el sector sureste.'
theological_decisions:
- issue: El nombre técnico del gran recipiente del templo
  english_pob_reading: the Sea
  chosen_spanish_reading: el Mar
  alternative_spanish_readings:
  - la gran pila
  - la gran vasija
  rationale: No hay una cuestión doctrinal en sí, pero sí una decisión terminológica importante. Se conserva el nombre tradicional del objeto como designación técnica, con mayúscula, para mantener continuidad con el original y evitar una paráfrasis descriptiva que borre su carácter nominal.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó «at the southeast side» a «on the southeast side» por naturalidad; el español adopta una solución igualmente natural («al lado sureste») sin perder la compacidad espacial del hebreo.
  spanish_consistency_notes:
  - Se ha mantenido «casa» para הַבַּיִת, conforme al registro bíblico, en vez de sustituirlo por «templo».
  - «Mar» se escribe con mayúscula por tratarse del nombre técnico del objeto cultual.
  - La nota al pie conserva la secuencia espacial hebrea para no borrar la tensión entre orientación relativa y dirección geográfica final.
