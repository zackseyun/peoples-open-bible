review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: וַיִּלְכֹּד = «capturó», מְצֻדַת צִיּוֹן = «fortaleza de Sion», הִיא con valor explicativo = «es decir», y עִיר דָּוִד = «la Ciudad de David». El contraste discursivo de וַ como «Pero» también es defendible según la auditoría inglesa.'
  spanish_quality_summary: 'El español principal es claro, natural y digno. La única falla importante está en la nota al pie: presenta como alternativa exactamente la misma expresión que ya aparece en el texto principal, por lo que no preserva la alternativa léxica documentada en inglés. Conviene además afinar la redacción de la nota para que refleje mejor que מצודה denota un lugar fortificado.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Sion» es una forma española aceptable para צִיּוֹן en este contexto. No aparecen términos sensibles como Yahvé, Mesías o δοῦλος.
  issues:
  - severity: medium
    issue: La nota al pie repite el texto principal en vez de ofrecer una alternativa real.
    rationale: 'El inglés conserva una alternativa léxica: «Or ''fortress of Zion.''» Como el texto español ya dice «fortaleza de Sion», la nota «O «la fortaleza de Sion»» no aporta nada y falla en preservar la función de alternativa. Debe ofrecer una opción distinta, como «bastión de Sion» o «ciudadela de Sion», junto con la explicación del término hebreo.'
  - severity: low
    issue: La explicación de la nota puede ser más precisa.
    rationale: «El hebreo denomina aquí una plaza fortificada» es entendible, pero «designa un lugar fortificado» refleja mejor la amplitud de מצודה y evita una posible sobreespecificación militar-administrativa de «plaza».
  revised_spanish_text: Pero David capturó la fortaleza de Sion[a], es decir, la Ciudad de David.
  revised_footnotes:
  - marker: a
    text: O «la ciudadela de Sion». El término hebreo designa un lugar fortificado.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel al hebreo y natural en español. Se corrige únicamente la nota al pie para que preserve una alternativa léxica real, tal como lo hace la auditoría inglesa, y para que la explicación del hebreo sea más precisa.
