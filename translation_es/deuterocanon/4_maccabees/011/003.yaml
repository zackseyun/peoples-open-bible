translation:
  language: es
  text: Pero yo me presenté por mi propia iniciativa[a], para que, después de matarme también a mí, incurras en castigo de parte de la justicia celestial[b] por aún más actos de maldad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «yo mismo me presenté por mi propia iniciativa»; o «di un paso al frente por mi propia iniciativa».'
    reason: lexical_alternative
  - marker: b
    text: «Justicia celestial» también puede entenderse como «la justicia del cielo» o «el juicio celestial».
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - yo personalmente
  lexicon: LSJ
  rationale: El griego refuerza la iniciativa personal junto con ἀπʼ ἐμαυτοῦ. En español, el énfasis queda bien en «yo» dentro de la frase «por mi propia iniciativa»; añadir «yo mismo» sería posible, pero sonaría más pesado sin aportar más precisión.
- source_word: ἀπʼ ἐμαυτοῦ
  english_pob_choice: of my own accord
  chosen_spanish: por mi propia iniciativa
  alternatives_spanish:
  - de mi propia voluntad
  - por mi propia cuenta
  lexicon: LSJ
  rationale: La expresión idiomática señala acción voluntaria y no movimiento espacial. «Por mi propia iniciativa» conserva la idea de espontaneidad y decisión personal en un español natural y digno.
- source_word: παρῆλθον
  english_pob_choice: came forward
  chosen_spanish: salí
  alternatives_spanish:
  - me acerqué
  - me presenté
  - avancé
  lexicon: LSJ
  rationale: Aquí el hablante se presenta ante el tirano de manera voluntaria. «Salí» transmite el movimiento hacia delante o hacia afuera en un español sobrio; el contexto de la frase completa ya deja clara la auto-presentación. «Me presenté» también es viable, pero añade una formulación más interpretativa.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: LSJ
  rationale: Introduce propósito. «Para que» es la equivalencia más natural y directa en español.
- source_word: κἀμέ
  english_pob_choice: me also
  chosen_spanish: también a mí
  alternatives_spanish:
  - a mí también
  - incluso a mí
  lexicon: LSJ
  rationale: El crasis añade la idea de inclusión adicional. «También a mí» mantiene esa fuerza y suena natural en la secuencia con «matarme».
- source_word: κατακτείνας
  english_pob_choice: after killing
  chosen_spanish: después de matarme
  alternatives_spanish:
  - habiéndome matado
  - tras matarme
  - al matarme
  lexicon: LSJ
  rationale: El participio aoristo antecede a la acción principal. «Después de matarme» explicita la relación temporal y conserva el sentido de anterioridad sin exceso de literalismo.
- source_word: περὶ πλειόνων ἀδικημάτων
  english_pob_choice: for still more acts of wrongdoing
  chosen_spanish: por aún más actos de maldad
  alternatives_spanish:
  - por crímenes todavía mayores
  - por más injusticias
  lexicon: LSJ
  rationale: La frase expresa responsabilidad por ofensas adicionales. «Actos de maldad» preserva el carácter moral de ἀδίκημα, y «aún más» refleja el comparativo πλειόνων. «Injusticias» sería demasiado abstracto en español; «crímenes» sería más fuerte de lo que el contexto obliga.
- source_word: ὀφλήσῃς
  english_pob_choice: you might incur
  chosen_spanish: incurras
  alternatives_spanish:
  - contraigas
  - quedes sujeto a
  - debas
  lexicon: LSJ
  rationale: El verbo tiene un matiz jurídico de contraer responsabilidad o deuda. «Incurras» es el verbo más natural en español para la idea de incurrir en castigo o culpa.
- source_word: τῇ οὐρανίᾳ δίκῃ
  english_pob_choice: from heavenly justice
  chosen_spanish: por parte de la justicia celestial
  alternatives_spanish:
  - de la justicia celestial
  - ante la justicia celestial
  - por la justicia celestial
  lexicon: LSJ
  rationale: El dativo griego expresa el ámbito o agente de la retribución. «Por parte de» comunica bien la procedencia o instancia de la que viene el castigo, y «justicia celestial» mantiene la referencia a una justicia transcendente sin suavizarla a «celestial» como mero adjetivo decorativo.
- source_word: τιμωρίαν
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - pena
  - sanción
  - retribución punitiva
  lexicon: LSJ
  rationale: La palabra designa retribución punitiva. «Castigo» es clara, digna y suficientemente general para el contexto; «pena» podría sonar demasiado técnico-jurídica y «retribución punitiva» demasiado pesada.
theological_decisions:
- issue: Cómo expresar τῇ οὐρανίᾳ δίκῃ sin desactivar su carga teológica
  english_pob_reading: heavenly justice
  chosen_spanish_reading: la justicia celestial
  alternative_spanish_readings:
  - la justicia del cielo
  - el juicio celestial
  - la justicia de los cielos
  rationale: El griego apunta a una justicia retributiva de origen trascendente. «Justicia celestial» conserva esa dimensión divina sin convertirla automáticamente en una perífrasis interpretativa como «juicio celestial».
  doctrine_reference: Mantener la tensión entre justicia divina y castigo retributivo sin reducirla ni moralizarla en exceso.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que reordenó la frase para hacer más natural «punishment from heavenly justice» sin cambiar el sentido. En español se reflejó esa misma relación con «castigo por parte de la justicia celestial».
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca; aquí no aparece ningún tetragrama ni κύριος equivalente.
  - Se eligió «castigo» y no «pena» para conservar un tono retributivo general y evitar tecnicismos innecesarios.
  - «Por mi propia iniciativa» recoge la fuerza voluntaria de ἀπʼ ἐμαυτοῦ sin sonar rígido.
  - 'El texto conserva la secuencia lógica del participio aoristo: voluntaria comparecencia, muerte, y luego incurrir en castigo.'
