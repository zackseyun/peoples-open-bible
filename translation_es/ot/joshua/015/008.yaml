translation:
  language: es
  text: Y el límite subía por el valle de Ben-hinón hasta la ladera[a] del jebuseo, por el sur (es decir[b], Jerusalén), y el límite subía hasta la cima del monte que está frente al valle de Hinón, al oeste[c], en el extremo norte del valle de Refaím.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el hombro»; aquí «ladera» refleja el sentido topográfico.'
    reason: lexical_alternative
  - marker: b
    text: O «es Jerusalén». El hebreo identifica explícitamente «el jebuseo» con Jerusalén.
    reason: alternative_reading
  - marker: c
    text: 'Hebreo: «hacia el mar», un modismo direccional que normalmente significa «al oeste».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָלָה
  english_pob_choice: Then ... went up
  chosen_spanish: Entonces ... subía
  alternatives_spanish:
  - Y ... subía
  - Luego ... subía
  - Y ... ascendía
  lexicon: HALOT
  rationale: En descripciones de fronteras, el hebreo usa una secuencia direccional repetida. «Entonces ... subía» mantiene el avance narrativo y el movimiento ascendente sin sonar rígido en español.
- source_word: הַגְּבוּל
  english_pob_choice: the border
  chosen_spanish: el límite
  alternatives_spanish:
  - la frontera
  - el borde
  lexicon: HALOT
  rationale: En contexto de reparto territorial, el término designa la línea delimitadora. «Límite» es natural en español y conserva la idea de demarcación geográfica.
- source_word: גֵּי בֶן הִנֹּם
  english_pob_choice: the Valley of Ben-hinnom
  chosen_spanish: el valle de Ben-hinón
  alternatives_spanish:
  - el valle del hijo de Hinón
  - el valle de Ben-Hinón
  lexicon: HALOT
  rationale: Se conserva el topónimo como nombre propio transliterado. «Ben-hinón» evita sobreexplicar el nombre y mantiene el carácter toponímico.
- source_word: כֶּתֶף
  english_pob_choice: the slope
  chosen_spanish: la ladera
  alternatives_spanish:
  - el hombro
  - el flanco
  lexicon: HALOT
  rationale: El hebreo literalmente dice «hombro», pero en topografía alude al costado de una elevación. «Ladera» comunica mejor el sentido geográfico en español.
- source_word: הַיְבוּסִי
  english_pob_choice: the Jebusite
  chosen_spanish: del jebuseo
  alternatives_spanish:
  - del jebuseo de Jerusalén
  - del sitio jebuseo
  lexicon: HALOT
  rationale: El término funciona como designación topográfica/nombre asociado al asentamiento. En español, «jebuseo» conserva la forma del etnónimo y permite la apposición explicativa siguiente.
- source_word: מִנֶּגֶב
  english_pob_choice: on the south
  chosen_spanish: por el sur
  alternatives_spanish:
  - al sur
  - en el lado sur
  - desde el sur
  lexicon: HALOT
  rationale: Aquí indica el lado meridional del accidente geográfico. «Por el sur» es fluido y preserva la orientación sin forzar una idea de origen.
- source_word: הִיא יְרוּשָׁלִָם
  english_pob_choice: that is, Jerusalem
  chosen_spanish: (es decir, Jerusalén)
  alternatives_spanish:
  - (o sea, Jerusalén)
  - (esto es, Jerusalén)
  - (Jerusalén)
  lexicon: HALOT
  rationale: La construcción hebrea identifica explícitamente el lugar. «Es decir» mantiene el valor explicativo que el POB inglés marcó con «that is».
- source_word: רֹאשׁ הָהָר
  english_pob_choice: the top of the mountain
  chosen_spanish: la cima del monte
  alternatives_spanish:
  - la cumbre del monte
  - la parte alta del monte
  - la cabeza del monte
  lexicon: HALOT
  rationale: «Cabeza» es literal, pero en español geográfico «cima del monte» expresa con claridad el punto más alto.
- source_word: אֲשֶׁר עַל פְּנֵי
  english_pob_choice: that lies
  chosen_spanish: que está frente a
  alternatives_spanish:
  - que se halla ante
  - que da hacia
  - que mira a
  lexicon: HALOT
  rationale: La locución hebrea indica posición opuesta o frontal. «Que está frente a» reproduce la relación espacial de manera natural.
- source_word: יָמָּה
  english_pob_choice: west
  chosen_spanish: al oeste
  alternatives_spanish:
  - hacia el mar
  - occidente
  - al poniente
  lexicon: HALOT
  rationale: El hebreo usa un modismo direccional vinculado al mar. En español, «al oeste» comunica directamente el valor geográfico sin perder la dirección.
- source_word: בִּקְצֵה
  english_pob_choice: at the ... end
  chosen_spanish: al extremo
  alternatives_spanish:
  - en el borde
  - en el límite
  - al final
  lexicon: HALOT
  rationale: El sustantivo expresa el punto terminal de una región. «Al extremo» conserva la idea de terminación geográfica.
- source_word: עֵמֶק רְפָאִים
  english_pob_choice: the Valley of Rephaim
  chosen_spanish: el valle de Refaím
  alternatives_spanish:
  - el valle de los refaím
  - el valle de los Refaítas
  lexicon: HALOT
  rationale: Se conserva el topónimo con transliteración. «Refaím» respeta el nombre propio sin convertirlo en una interpretación etnológica.
- source_word: צָפֹנָה
  english_pob_choice: northern
  chosen_spanish: norte
  alternatives_spanish:
  - al norte
  - septentrional
  - del lado norte
  lexicon: HALOT
  rationale: En combinación con «extremo», el valor direccional se expresa mejor como «norte» dentro de «al extremo norte».
theological_decisions:
- issue: 'Identificación explicativa del lugar: «הִיא יְרוּשָׁלִָם»'
  english_pob_reading: that is, Jerusalem
  chosen_spanish_reading: (es decir, Jerusalén)
  alternative_spanish_readings:
  - (o sea, Jerusalén)
  - (esto es, Jerusalén)
  rationale: El hebreo usa una identificación appositiva explícita, no solo una referencia implícita. La traducción mantiene esa aclaración sin suavizarla ni convertirla en mera glosa narrativa.
  doctrine_reference: Ninguna; decisión topográfica y textual
- issue: 'Topónimo con nombre etnónimo: «הַיְבוּסִי»'
  english_pob_reading: the Jebusite
  chosen_spanish_reading: del jebuseo
  alternative_spanish_readings:
  - del jebuseo de Jerusalén
  - del sitio jebuseo
  rationale: La forma hebrea puede funcionar como designación del lugar asociado con los jebuseos. Se conserva esa ambigüedad toponímica sin imponer una equivalencia interpretativa mayor que la que exige el texto.
  doctrine_reference: Ninguna; decisión geográfica/textual
translation_notes:
  revision_awareness: 'La versión española sigue de cerca la lectura auditada del POB inglés en Joshua 15:8. Se preservan las mismas decisiones de sentido: topografía «slope/ladera», identificación explicativa «that is, Jerusalem / es decir, Jerusalén», y el modismo direccional hebreo de «toward the sea / al oeste» sin añadir contenido no presente. No se registran revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «Ben-hinón» y «Refaím» como topónimos transliterados para conservar el carácter propio de los nombres.
  - «Límite» se emplea como equivalente de frontera territorial en contexto de repartición de tierras.
  - La puntuación con paréntesis reproduce la aclaración explicativa del texto fuente sin sobrecargar la sintaxis.
