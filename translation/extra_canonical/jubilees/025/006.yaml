translation:
  text: Then Jacob spoke with Rebekah his mother and said to her[a], “Look, I am now a son of nine weeks of years, and I do not know a woman, nor have I touched one, nor have I become engaged, nor do I intend to take a wife for myself from the daughters of Canaan.”
  philosophy: optimal-equivalence
