    issue: La nota al pie no sigue la prioridad de la auditoría inglesa
    rationale: El inglés conserva «high places» en texto sin nota explicativa obligatoria, pero sí añade una nota para «house/temple». El borrador español invierte esa prioridad y omite la aclaración más útil y documentada.
