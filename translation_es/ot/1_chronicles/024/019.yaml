    text: Or 'according to their prescribed order.' The Hebrew term can denote an ordinance, rule, or prescribed procedure.
    reason: lexical_alternative
  - marker: b
    text: Literally 'under/by the hand of Aaron,' an idiom for administration or authority.
    reason: lexical_alternative
