translation:
  language: es
  text: Y vendrá el levita, porque no tiene parte ni heredad contigo; y el residente extranjero[a], el huérfano y la viuda que están dentro de tus puertas[b], y comerán y se saciarán, para que Yahvé tu Dios te bendiga en toda obra de tus manos que hagas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el forastero'. El término hebreo designa a una persona no israelita que vive entre Israel.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'dentro de tus puertas', un hebraísmo para los que viven dentro de tus ciudades o comunidad local.
    reason: cultural_note
lexical_decisions:
- source_word: וּבָא
  english_pob_choice: shall come
  chosen_spanish: vendrá
  alternatives_spanish:
  - ha de venir
  - deberá venir
  lexicon: HALOT
  rationale: En este contexto legal/instructivo, el verbo perfecto con waw expresa una acción esperada o normativa; en español, el futuro simple comunica bien ese matiz prescriptivo sin añadir fuerza ajena al hebreo.
- source_word: הַלֵּוִי
  english_pob_choice: the Levite
  chosen_spanish: el levita
  alternatives_spanish:
  - el levita sacerdote
  lexicon: HALOT
  rationale: El texto nombra al grupo levítico, no específicamente a un sacerdote. 'Levita' conserva la categoría social/tribal sin importar un estatus no explícito.
- source_word: חֵלֶק וְנַחֲלָה
  english_pob_choice: portion or inheritance
  chosen_spanish: parte ni heredad
  alternatives_spanish:
  - porción ni heredad
  - participación ni herencia
  lexicon: HALOT
  rationale: La pareja hebrea combina una porción asignada y una posesión hereditaria. 'Parte' y 'heredad' suenan naturales en español bíblico y conservan el paralelismo jurídico-económico.
- source_word: עִמָּךְ
  english_pob_choice: with you
  chosen_spanish: contigo
  alternatives_spanish:
  - con vosotros
  - entre vosotros
  lexicon: HALOT
  rationale: 'El sentido directo es relacional y direccional: el levita no tiene posesión contigo/en medio de Israel. ''Contigo'' respeta la segunda persona singular del hebreo.'
- source_word: הַגֵּר
  english_pob_choice: the sojourner
  chosen_spanish: el forastero
  alternatives_spanish:
  - el residente forastero
  - el extranjero residente
  lexicon: HALOT
  rationale: Para el sustantivo גֵּר, el inglés POB optó por 'sojourner' y lo explicó como residente no israelita. En español, 'forastero' comunica la condición de no nativo, aunque la nota mantiene la precisión de residente entre Israel.
- source_word: הַיָּתוֹם
  english_pob_choice: the fatherless
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el desamparado
  - el sin padre
  lexicon: HALOT
  rationale: Aunque 'fatherless' es más literal, en español 'huérfano' es la manera natural de nombrar esa vulnerabilidad social; no se pierde el referente legal de persona sin apoyo familiar.
- source_word: הָאַלְמָנָה
  english_pob_choice: the widow
  chosen_spanish: la viuda
  lexicon: HALOT
  rationale: Equivalencia directa y estándar para la categoría social vulnerable presente en la triada bíblica.
- source_word: אֲשֶׁר בִּשְׁעָרֶיךָ
  english_pob_choice: who are within your gates
  chosen_spanish: que están dentro de tus puertas
  alternatives_spanish:
  - que están en tus ciudades
  - que están dentro de tus ciudades
  lexicon: HALOT
  rationale: '''Puertas'' reproduce el hebraísmo metonímico por la comunidad/localidad bajo jurisdicción de la ciudad. En español suena menos idiomático que ''ciudades'', pero preserva mejor la textura del original.'
- source_word: וְאָכְלוּ וְשָׂבֵעוּ
  english_pob_choice: and they shall eat and be satisfied
  chosen_spanish: y comerán y se saciarán
  alternatives_spanish:
  - y comerán y serán saciados
  - y comerán hasta quedar satisfechos
  lexicon: HALOT
  rationale: La secuencia verbal expresa resultado deseado/provisto. 'Saciarse' transmite suficiencia de alimento sin volverla más explicativa de lo que permite el texto.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Marca propósito o resultado esperado. 'Para que' es la correspondencia más natural y clara en español.
- source_word: יְבָרֶכְךָ
  english_pob_choice: may bless you
  chosen_spanish: te bendiga
  alternatives_spanish:
  - pueda bendecirte
  - te bendecirá
  lexicon: HALOT
  rationale: El imperfecto tras לְמַעַן expresa propósito/resulta esperado, no mera predicción. El subjuntivo español conserva esa finalidad sin forzar certeza futura.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El proyecto POB usa 'Yahvé' en el texto principal en español para el Tetragrámaton, manteniendo la transparencia del nombre divino sin la sustitución litúrgica 'SEÑOR'.
- source_word: בְּכָל מַעֲשֵׂה יָדְךָ
  english_pob_choice: in all the work of your hands
  chosen_spanish: en toda obra de tus manos
  alternatives_spanish:
  - en todo el trabajo de tus manos
  - en todo tu trabajo
  lexicon: HALOT
  rationale: El hebreo usa una imagen concreta de 'mano' para el trabajo humano. 'Obra de tus manos' preserva el giro idiomático y el plural de 'manos' corresponde al ajuste revisado en el audit trail inglés.
- source_word: אֲשֶׁר תַּעֲשֶׂה
  english_pob_choice: that you do
  chosen_spanish: que hagas
  alternatives_spanish:
  - que haces
  - que emprendas
  lexicon: HALOT
  rationale: La relativa finaliza la frase de modo general y prescriptivo; el subjuntivo español mantiene el valor de cláusula abierta/resultado sin añadir especificación.
theological_decisions:
- issue: Renderizar el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton, y la política del proyecto en español pide 'Yahvé' como forma principal. Se evita la sustitución por 'SEÑOR' para conservar la transparencia del nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El borrador inglés más reciente ajustó 'the work of your hand' a 'the work of your hands' para corresponder mejor al plural hebreo. La propuesta española refleja ese plural con 'tus manos' y mantiene intacta la estructura legal de la frase, sin introducir variantes doctrinales nuevas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme a la norma del proyecto para יְהוָה.
  - '''Levita'' se conserva como término tribal/social, no como ''sacerdote''.'
  - '''Forastero'' en el texto principal se aclara en nota para evitar perder la precisión del residente no israelita.'
  - La coordinación final se conserva con una sola serie verbal para reflejar el paralelismo del hebreo.
