  language: en
  yaml_path: translation/ot/ezekiel/032/030.yaml
  text: There are all the princes of the north[a], all of them, and all the Sidonians, who went down with the slain in the terror they caused by their might, ashamed. They lie uncircumcised with those slain by the sword[c][b], and they bear their disgrace with those who go down to the pit.
  footnotes:
