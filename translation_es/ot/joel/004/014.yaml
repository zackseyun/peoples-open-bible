translation:
  language: es
  text: ¡Multitudes[a], multitudes en el Valle de la Decisión! Porque está cerca el día de Yahvé en el Valle de la Decisión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Valle del Juicio» o «el Valle de la Trilla». El término hebreo conlleva la idea de un veredicto decisivo y también puede evocar la imagen de la trilla.
    reason: alternative_reading
lexical_decisions:
- source_word: הֲמוֹנִים
  english_pob_choice: Multitudes
  chosen_spanish: Multitudes
  alternatives_spanish:
  - Muchedumbres
  - Hordas
  - Turbas
  lexicon: HALOT
  rationale: El sustantivo plural expresa una gran masa o multitud; la repetición intensifica el tono profético. «Multitudes» conserva el valor léxico y la fuerza retórica sin añadir matices negativos que «hordas» o «turbas» introducirían.
- source_word: בְּעֵמֶק
  english_pob_choice: in the Valley
  chosen_spanish: en el Valle
  alternatives_spanish:
  - en el valle
  - en el valle de
  lexicon: HALOT
  rationale: עֵמֶק designa un valle real y concreto. «En el Valle» es natural en español y mantiene la imagen geográfica.
- source_word: הֶחָרוּץ
  english_pob_choice: Decision
  chosen_spanish: Decisión
  alternatives_spanish:
  - Juicio
  - Trilla
  - Determinación
  lexicon: HALOT
  rationale: El término puede implicar algo decretado o decidido, y en ciertos contextos también puede evocar imagen de trilla. «Decisión» preserva el sentido de determinación/veredicto sin reducirlo prematuramente a «juicio» ni borrar la tensión semántica documentada.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la exclamación anterior. «Porque» comunica con claridad esa relación causal en español.
- source_word: קָרוֹב
  english_pob_choice: is near
  chosen_spanish: cercano está
  alternatives_spanish:
  - está cerca
  - se acerca
  lexicon: HALOT
  rationale: El adjetivo predica proximidad. «Cercano está» conserva el énfasis poético y sigue siendo transparente en español moderno.
- source_word: יוֹם יְהוָה
  english_pob_choice: the day of Yahweh
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - el día de Yahweh
  - el día de Yavé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino «Yahvé» según la terminología base del proyecto, y la expresión profética queda en forma natural y reconocible en español.
theological_decisions:
- issue: Sentido de עֵמֶק הֶחָרוּץ
  english_pob_reading: the Valley of Decision
  chosen_spanish_reading: el Valle de la Decisión
  alternative_spanish_readings:
  - el Valle del Juicio
  - el Valle de la Trilla
  rationale: La expresión hebrea es semánticamente rica y puede evocar tanto decisión/veredicto como juicio o trilla. La forma principal mantiene «Decisión» para no cerrar la tensión interpretativa ni introducir una paráfrasis más estrecha que el hebreo.
  doctrine_reference: 'Translation philosophy §3; Contested terms: יְהוָה → Yahweh'
translation_notes:
  revision_awareness: El texto español sigue de cerca el estado revisado más reciente del POB en inglés, sin cambios sustanciales respecto del juicio léxico y teológico auditado; se conserva la misma solución principal para הֶחָרוּץ y para יְהוָה.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «Decisión» se usa como equivalente principal de הֶחָרוּץ para conservar la tensión semántica documentada.
  - La repetición «Multitudes, multitudes» se conserva en español para reflejar el énfasis retórico del hebreo.
