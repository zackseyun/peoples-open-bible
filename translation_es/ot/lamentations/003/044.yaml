revisions:
- from: Tú te has cubierto con una nube[a], para que la oración no pueda pasar.
  to: Te has cubierto con una nube, para que la oración no pueda atravesar[a].
  rationale: Se retira el «Tú» innecesario para un español más natural, se cambia «pasar» por «atravesar» para reflejar mejor la idea de obstáculo, y se corrige la nota para que conserve con mayor fidelidad la alternativa formal documentada en el POB inglés, sin añadir el referente «ella».
