translation:
  language: es
  text: 'Y en aquel tiempo mandé a sus jueces, diciendo: «Escuchen los casos entre sus hermanos[a], y juzguen justamente[b] entre un hombre y su hermano, o el extranjero residente con él[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Oigan las disputas entre sus hermanos».
    reason: lexical_alternative
  - marker: b
    text: O «juzguen con rectitud». El hebreo usa el sustantivo צֶדֶק (tsedeq), que en contextos judiciales puede implicar tanto justicia como rectitud.
    reason: lexical_alternative
  - marker: c
    text: O «el extranjero residente con él» o «el extranjero que reside con él». El hebreo גֵּר (ger) se refiere a un no nativo que vive entre Israel bajo la protección legal de la comunidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וָאֲצַוֶּה
  english_pob_choice: I commanded
  chosen_spanish: mandé
  alternatives_spanish:
  - ordené
  - di el mandato
  lexicon: HALOT
  rationale: צוה expresa dar una orden o mandato; en español, ‘mandé’ comunica con naturalidad la autoridad de Moisés sin sonar forzado. ‘Ordené’ también es posible, pero ‘mandé’ conserva mejor el tono de instrucción directa.
- source_word: שֹׁפְטֵיכֶם
  english_pob_choice: your judges
  chosen_spanish: sus jueces
  alternatives_spanish:
  - sus magistrados
  lexicon: HALOT
  rationale: El sustantivo designa a quienes deciden asuntos legales. ‘Jueces’ es la equivalencia más clara y directa. El posesivo ‘sus’ mantiene la referencia al pueblo al que Moisés se dirige.
- source_word: בָּעֵת הַהִוא
  english_pob_choice: at that time
  chosen_spanish: en aquel tiempo
  alternatives_spanish:
  - en ese tiempo
  - en aquel momento
  lexicon: HALOT
  rationale: La expresión temporal es idiomática. ‘En aquel tiempo’ suena natural en español bíblico contemporáneo y conserva la referencia al período ya descrito.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - así
  lexicon: HALOT
  rationale: La forma participial introduce el contenido del mandato; ‘diciendo’ conserva la estructura discursiva del hebreo sin añadir paráfrasis.
- source_word: שָׁמֹעַ בֵּין אֲחֵיכֶם
  english_pob_choice: Hear the cases between your brothers
  chosen_spanish: Escuchen los casos entre sus hermanos
  alternatives_spanish:
  - Escuchen las disputas entre sus hermanos
  - Atiendan los casos entre sus hermanos
  lexicon: HALOT
  rationale: 'שמוע aquí funciona en marco judicial: oír/atender con discernimiento. ‘Escuchen los casos’ explicita el contexto legal que el inglés POB ya señaló con ‘cases’. ‘Sus hermanos’ preserva el lenguaje de parentesco del texto fuente.'
- source_word: וּשְׁפַטְתֶּם צֶדֶק
  english_pob_choice: judge righteously
  chosen_spanish: juzguen con justicia
  alternatives_spanish:
  - juzguen justamente
  - juzguen con rectitud
  lexicon: HALOT
  rationale: צֶדֶק puede expresar justicia o rectitud en un contexto jurídico. ‘Con justicia’ conserva de manera clara la fuerza legal del sustantivo, sin perder su dimensión moral. En español, esta opción resulta más transparente que un adverbio derivado.
- source_word: בֵּין אִישׁ וּבֵין אָחִיו
  english_pob_choice: between a man and his brother
  chosen_spanish: entre un hombre y su hermano
  alternatives_spanish:
  - entre una persona y su hermano
  - entre un hombre y otro
  lexicon: HALOT
  rationale: La construcción es concreta y singular. ‘Entre un hombre y su hermano’ reproduce la imagen del hebreo y mantiene el lenguaje de parentesco, en vez de neutralizarlo.
- source_word: וּבֵין גֵּרוֹ
  english_pob_choice: the resident foreigner with him
  chosen_spanish: o el extranjero residente con él
  alternatives_spanish:
  - o el residente extranjero con él
  - o el extranjero que vive con él
  lexicon: HALOT
  rationale: גֵּר designa a un no nativo que reside entre el pueblo. ‘Extranjero residente’ comunica bien esa idea en español. El ‘con él’ refleja el sufijo pronominal y la relación asociada al litigante o al miembro de la comunidad.
theological_decisions:
- issue: Lenguaje de parentesco masculino plural en אֲחֵיכֶם y אָחִיו
  english_pob_reading: brothers / his brother
  chosen_spanish_reading: sus hermanos / su hermano
  alternative_spanish_readings:
  - sus compatriotas / su prójimo
  - sus hermanos y hermanas / su hermano o hermana
  rationale: El hebreo usa términos masculinos de parentesco con fuerza representativa dentro de la comunidad del pacto. Se conserva ese textura con ‘hermanos’ y ‘hermano’ para no borrar el matiz fuente ni introducir una expansión no indicada por el texto.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Sentido judicial de צֶדֶק
  english_pob_reading: judge righteously
  chosen_spanish_reading: juzguen con justicia
  alternative_spanish_readings:
  - juzguen justamente
  - juzguen con rectitud
  - juzguen rectamente
  rationale: En este contexto, צֶדֶק combina justicia legal y rectitud moral. ‘Con justicia’ preserva el valor jurídico central y suena natural en español; no elimina la tensión entre justicia y rectitud, sino que la deja implícita.
  doctrine_reference: DOCTRINE.md § Translation philosophy 5
- issue: Valor de גֵּר
  english_pob_reading: the resident foreigner with him
  chosen_spanish_reading: el extranjero residente con él
  alternative_spanish_readings:
  - el extranjero que reside con él
  - el forastero residente con él
  - el residente extranjero con él
  rationale: גֵּר no es simplemente ‘forastero’ ocasional; se trata de un residente no israelita bajo la protección legal de la comunidad. ‘Extranjero residente’ comunica residencia y alteridad, manteniendo la precisión social del término.
  doctrine_reference: DOCTRINE.md § Translation philosophy 6
translation_notes:
  revision_awareness: La redacción sigue la última revisión del inglés POB, que introdujo ‘the cases’ y corrigió la coordinación final a ‘or the resident foreigner with him’. La versión española refleja esa estructura legal y la disyunción final con ‘o’.
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ para el nombre divino cuando aparezca en el contexto mayor, conforme a la norma del proyecto.
  - Se mantiene ‘jueces’ para שֹׁפְטֵיכֶם y ‘extranjero residente’ para גֵּר, evitando el reemplazo por terminología eclesiástica tradicional no requerida por la fuente.
  - La puntuación adopta comillas tipográficas y uso de dos puntos conforme al español editorial moderno.
