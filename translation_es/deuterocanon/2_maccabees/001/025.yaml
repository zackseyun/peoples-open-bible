translation:
  language: es
  text: el único proveedor[a], el único justo, todopoderoso y eterno, el que rescata a Israel de todo mal, el que hizo de los padres sus elegidos[b] y los santificó[c];
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «benefactor» o «suministrador» para χορηγός. El griego subraya a Dios como el que provee lo necesario.
    reason: lexical_alternative
  - marker: b
    text: O «escogidos» para «elegidos».
    reason: lexical_alternative
  - marker: c
    text: O «hizo santos» / «consagró» para «santificó».
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνος
  english_pob_choice: only
  chosen_spanish: único
  alternatives_spanish:
  - solo
  - único y solo
  lexicon: BDAG
  rationale: «Único» expresa exclusividad de modo natural en español y conserva la repetición enfática del griego con cada título divino.
- source_word: χορηγός
  english_pob_choice: provider
  chosen_spanish: proveedor
  alternatives_spanish:
  - benefactor
  - suministrador
  - dador
  lexicon: LSJ
  rationale: El término griego señala al que provee o suministra lo necesario. «Proveedor» es claro y mantiene la idea de provisión divina; «benefactor» añadiría un matiz de patronazgo no exigido por el texto.
- source_word: δίκαιος
  english_pob_choice: righteous one
  chosen_spanish: justo
  alternatives_spanish:
  - el Justo
  - recto
  lexicon: BDAG
  rationale: Aquí funciona como título divino sustantivado. En español, «el único justo» preserva el valor nominal sin forzar una perífrasis demasiado pesada.
- source_word: παντοκράτωρ
  english_pob_choice: almighty
  chosen_spanish: todopoderoso
  alternatives_spanish:
  - omnipotente
  - soberano sobre todo
  lexicon: BDAG
  rationale: «Todopoderoso» es la equivalencia bíblica más natural y reconocible en español para el título divino.
- source_word: αἰώνιος
  english_pob_choice: eternal
  chosen_spanish: eterno
  alternatives_spanish:
  - perpetuo
  - de los siglos
  lexicon: BDAG
  rationale: «Eterno» comunica bien la cualidad duradera y absoluta en una serie doxológica de atributos divinos.
- source_word: διασώζων
  english_pob_choice: rescues
  chosen_spanish: rescata
  alternatives_spanish:
  - salva
  - libra
  - preserva
  lexicon: BDAG
  rationale: El participio describe una acción concreta de salvamento o liberación. «Rescata» expresa mejor el peligro implícito que «salva» en español general.
- source_word: ἐκ παντὸς κακοῦ
  english_pob_choice: from every evil
  chosen_spanish: de todo mal
  alternatives_spanish:
  - de todo mal y peligro
  - de todo mal
  lexicon: BDAG
  rationale: «Mal» mantiene la amplitud semántica de κακόν sin restringirlo sólo a mal moral o a daño físico; en español suena natural en esta fórmula de protección.
- source_word: ποιήσας
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - nombró
  - constituyó
  - estableció
  lexicon: BDAG
  rationale: El aoristo participial con complemento predicativo pide una forma verbal que conserve la causalidad. «Hizo» refleja bien la construcción sin introducir interpretación adicional.
- source_word: ἐκλεκτούς
  english_pob_choice: chosen
  chosen_spanish: elegidos
  alternatives_spanish:
  - escogidos
  - electos
  lexicon: BDAG
  rationale: «Elegidos» es el equivalente más natural y directo en español para el estado resultante de la elección; evita la carga técnica de «electos».
- source_word: ἡγίασας
  english_pob_choice: sanctified
  chosen_spanish: santificó
  alternatives_spanish:
  - hizo santos
  - consagró
  lexicon: BDAG
  rationale: «Santificó» preserva el registro cultual y teológico del verbo griego y sigue de cerca la opción inglesa documentada.
- source_word: τοὺς πατέρας
  english_pob_choice: the fathers
  chosen_spanish: a los padres
  alternatives_spanish:
  - a nuestros padres
  - a los antepasados
  lexicon: BDAG
  rationale: El griego no añade un posesivo; «a los padres» mantiene el referente a los antepasados de Israel sin sobreespecificar con «nuestros».
theological_decisions:
- issue: Títulos divinos en serie con solo/único
  english_pob_reading: the only righteous one, almighty and eternal
  chosen_spanish_reading: el único justo, todopoderoso y eterno
  alternative_spanish_readings:
  - el único justo y todopoderoso y eterno
  - el único Justo, Todopoderoso y Eterno
  rationale: El griego acumula títulos divinos en una serie solemne. La puntuación y el orden en español conservan esa cadencia sin convertir los atributos en una explicación libre.
  doctrine_reference: Translation philosophy §§4–6
- issue: Relación entre ἐκλεκτούς e ἡγίασας
  english_pob_reading: made the fathers chosen and sanctified them
  chosen_spanish_reading: hizo a los padres elegidos y los santificó
  alternative_spanish_readings:
  - constituyó a los padres como elegidos y los santificó
  - hizo a los padres escogidos y los santificó
  rationale: 'El griego presenta dos predicaciones sobre los padres: primero el estado de elección, luego la acción de santificación. La traducción conserva ambas sin fusionarlas ni reinterpretarlas.'
  doctrine_reference: Translation philosophy §§5–6
- issue: Referencia histórica de τοὺς πατέρας
  english_pob_reading: the fathers
  chosen_spanish_reading: los padres
  alternative_spanish_readings:
  - los antepasados
  - nuestros padres
  rationale: En el contexto deuterocanónico, «los padres» es una designación bíblica estable para los patriarcas y antepasados de Israel. Se evita añadir «nuestros» porque no está en el griego.
  doctrine_reference: Translation philosophy §§4–6
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de Swete y la estructura del inglés POB, incorporando la revisión menor de puntuación del audit trail al conservar una serie de títulos divinos claramente delimitada. Se mantuvo la distinción entre elección y santificación, y se optó por vocabulario español natural pero suficientemente técnico para el registro doxológico.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - «Mesías/Cristo» no aplica aquí.
  - «esclavo/siervo» no aplica aquí.
  - Se conserva «los padres» como término bíblico para los antepasados de Israel, sin expandirlo a «nuestros padres».
  - La serie de atributos divinos se traduce con paralelismo y comas para reflejar el acumulado griego.
