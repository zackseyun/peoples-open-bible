translation:
  language: es
  text: 'Se comprarán campos en esta tierra, de la cual ustedes dicen[a]: «Es una desolación, sin hombre ni bestia[b]; ha sido entregada en manos de los caldeos[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la que ustedes dicen».
    reason: lexical_alternative
  - marker: b
    text: O «sin ser humano ni animal». El modismo hebreo literalmente dice «sin hombre ni bestia».
    reason: lexical_alternative
  - marker: c
    text: 'O «los babilonios». Hebreo: «los caldeos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִקְנָה
  english_pob_choice: will be bought
  chosen_spanish: se comprará
  alternatives_spanish:
  - será comprado
  - será adquirido
  lexicon: HALOT
  rationale: El nifal expresa aquí una acción pasiva futura. En español, «se comprará» suena natural y conserva la idea de transacción futura sin añadir un matiz ajeno como «otra vez».
- source_word: הַשָּׂדֶה
  english_pob_choice: Fields
  chosen_spanish: el campo
  alternatives_spanish:
  - los campos
  - la parcela
  lexicon: HALOT
  rationale: Aunque el hebreo usa singular con artículo, el sustantivo puede funcionar colectivamente. En español, «el campo» mantiene la forma del texto base y es suficientemente natural; no se pluraliza para no introducir una generalización no marcada.
- source_word: בָּאָרֶץ הַזֹּאת
  english_pob_choice: in this land
  chosen_spanish: en esta tierra
  alternatives_spanish:
  - en este país
  - en esta tierra del país
  lexicon: HALOT
  rationale: «Tierra» reproduce bien el valor territorial y de pacto de ארץ en Jeremías, y es más fiel al registro bíblico que «país».
- source_word: אֲשֶׁר אַתֶּם אֹמְרִים
  english_pob_choice: of which you say
  chosen_spanish: de la cual ustedes dicen
  alternatives_spanish:
  - sobre la cual ustedes dicen
  - que ustedes dicen de ella
  lexicon: HALOT
  rationale: La relativa se puede verter de forma más natural en español con «de la cual ustedes dicen», preservando la relación sintáctica sin forzar una traducción mecánica.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - desolada
  - un desierto
  lexicon: HALOT
  rationale: El sustantivo predicativo se conserva como sustantivo en español para reflejar la fuerza nominal del hebreo, en vez de convertirlo en adjetivo.
- source_word: מֵאֵין אָדָם וּבְהֵמָה
  english_pob_choice: without man or beast
  chosen_spanish: sin hombre ni bestia
  alternatives_spanish:
  - sin ser humano ni animal
  - sin persona ni ganado
  lexicon: HALOT
  rationale: Se mantiene el paralelismo idiomático del hebreo. «Hombre» conserva la fórmula convencional del original; «bestia» preserva la pareja léxica establecida por el texto.
- source_word: נִתְּנָה
  english_pob_choice: it has been given
  chosen_spanish: ha sido entregada
  alternatives_spanish:
  - fue entregada
  - ha sido dada
  lexicon: HALOT
  rationale: «Entregada» comunica mejor en español la idea de haber sido puesta bajo dominio ajeno que el más literal «dada», y mantiene el matiz de transferencia de poder.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en mano de
  alternatives_spanish:
  - en poder de
  - en manos de
  lexicon: HALOT
  rationale: La expresión idiomática se conserva de forma transparente. «En mano de» sigue de cerca el hebreo y mantiene la imagen de dominio/control.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se retiene la designación histórica del hebreo. «Caldeos» corresponde de modo más directo al término מקור y evita sustituirlo por una equivalencia interpretativa.
theological_decisions:
- issue: Valor genérico de אָדָם en la fórmula de ausencia
  english_pob_reading: without man or beast
  chosen_spanish_reading: sin hombre ni bestia
  alternative_spanish_readings:
  - sin ser humano ni animal
  - sin personas ni ganado
  rationale: Se conserva la fórmula idiomática tradicional del hebreo sin neutralizarla. En este contexto, אָדָם funciona genéricamente como ausencia de población humana, no como contraste doctrinal sobre género.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral; Contested terms table for אָדָם'
- issue: Uso de «tierra» para ארץ
  english_pob_reading: in this land
  chosen_spanish_reading: en esta tierra
  alternative_spanish_readings:
  - en este país
  - en esta región
  rationale: «Tierra» conserva la resonancia territorial y teológica de ארץ en Jeremías, especialmente en un contexto de restauración y posesión de la tierra.
  doctrine_reference: Jeremiah land theology; source-text territorial resonance
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó «again» porque no está expresado en el hebreo. La redacción española evita añadir equivalentes de repetición y sigue la lectura revisada. También se mantuvo «caldeos» como correspondencia directa del hebreo, sin expandir a «babilonios» en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sin arcaísmos innecesarios.
  - Se prefirió una solución idiomática española que sigue de cerca el hebreo sin calcarlo de forma rígida.
  - No se añadieron notas al pie porque las alternativas principales quedan suficientemente documentadas en las decisiones léxicas.
