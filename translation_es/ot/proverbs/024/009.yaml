    changes_summary: Changed 'to man' to 'to mankind' for more natural English and to reflect the generic sense of לְאָדָם. Kept the rest unchanged as accurate and complete.
translation:
  language: es
  text: El plan de la insensatez es pecado, y el burlador[b] es una abominación para la humanidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Humanidad» expresa aquí el valor genérico de אָדָם; también podría entenderse «para la gente» o «para las personas».
    reason: lexical_alternative
  - marker: b
    text: «Burlador» traduce el sentido de לֵץ; otra posibilidad sería «escarnecedor» o «mofador».
    reason: lexical_alternative
lexical_decisions:
- source_word: זִמַּת
  english_pob_choice: scheme
  chosen_spanish: plan
  alternatives_spanish:
  - esquema
  - diseño
  - artificio
  - maquinación
  lexicon: HALOT
  rationale: El hebreo denota una intención o proyecto deliberado. En español, «plan» comunica con naturalidad esa idea sin exagerar hacia «maquinación», que añadiría un matiz más oscuro que el texto no exige.
- source_word: אִוֶּלֶת
  english_pob_choice: folly
  chosen_spanish: insensatez
  alternatives_spanish:
  - necedad
  - fatuidad
  - locura
  lexicon: HALOT
  rationale: Se trata de un sustantivo abstracto. «Insensatez» preserva el valor sapiencial y abstracto de la expresión, con un registro digno y claro para español bíblico.
- source_word: חַטָּאת
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - ofensa
  - error
  lexicon: HALOT
  rationale: 'El sustantivo funciona predicativamente: el plan de la insensatez «es pecado». «Pecado» es la equivalencia más directa y conserva la fuerza moral del hebreo.'
- source_word: תוֹעֲבַת
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - algo abominable
  lexicon: HALOT
  rationale: «תוֹעֵבָה» expresa fuerte repulsión moral/cultual. «Abominación» mantiene esa intensidad y es el equivalente bíblico español más estable.
- source_word: לְאָדָם
  english_pob_choice: to mankind
  chosen_spanish: para la humanidad
  alternatives_spanish:
  - para el hombre
  - para la gente
  - para las personas
  lexicon: HALOT
  rationale: El hebreo usa אָדָם de manera genérica. En español, «para la humanidad» comunica con naturalidad el sentido inclusivo sin perder el alcance universal del dicho sapiencial.
- source_word: לֵץ
  english_pob_choice: a scoffer
  chosen_spanish: el burlador
  alternatives_spanish:
  - el escarnecedor
  - el mofador
  - el escéptico
  lexicon: HALOT
  rationale: לֵץ describe a quien se burla con desprecio y rechaza corrección. «Burlador» es natural en español y conserva la postura arrogante del término; «mofador» o «escarnecedor» serían posibles, pero menos idiomáticos.
theological_decisions:
- issue: Rango genérico de אָדָם
  english_pob_reading: to mankind
  chosen_spanish_reading: para la humanidad
  alternative_spanish_readings:
  - para el hombre
  - para las personas
  - para la gente
  rationale: Se preserva el valor genérico del hebreo sin restringirlo a varón ni volverlo innecesariamente áspero en español. «Humanidad» reproduce la referencia colectiva implícita en אָדָם.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy 4; Contested terms: אָדָם adam'
- issue: Término sapiencial para לֵץ
  english_pob_reading: a scoffer
  chosen_spanish_reading: el burlador
  alternative_spanish_readings:
  - el escarnecedor
  - el mofador
  rationale: No se suaviza el juicio moral del proverbio. «Burlador» conserva el desprecio activo y la resistencia a la corrección que caracteriza a לֵץ en Proverbios.
  doctrine_reference: 'DOCTRINE.md § Wisdom terminology; Contested terms: לֵץ lēṣ'
translation_notes:
  revision_awareness: El texto hebreo presenta una estructura sapiencial breve y paralela. La versión inglesa auditada pasó de «to man» a «to mankind» para reflejar mejor el sentido genérico de אָדָם; la presente redacción española sigue esa decisión con una formulación natural y colectiva. No se introduce material interpretativo adicional fuera de la fuerza del proverbio.
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial, conciso y moralmente fuerte del hebreo.
  - «Pecado» y «abominación» conservan la dureza semántica del original.
  - Se evitó «Cristo»/«Mesías» porque no aplica al versículo.
  - Se preservó el valor genérico de אָדָם mediante una expresión inclusiva natural en español.
