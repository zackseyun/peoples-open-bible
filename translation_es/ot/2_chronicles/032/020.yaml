translation:
  language: es
  text: Entonces Ezequías el rey e Isaías, hijo de Amoz, el profeta, oraron a causa de esto y clamaron al cielo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los cielos». El sustantivo hebreo está en forma plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְפַּלֵּל
  english_pob_choice: prayed
  chosen_spanish: oraron
  alternatives_spanish:
  - oró
  lexicon: HALOT
  rationale: El hebreo tiene un verbo singular con sujeto compuesto; en español conviene coordinar el verbo con ambos sujetos nombrados, como hace la revisión inglesa al suavizar la concordancia. "Oraron" mantiene el valor básico de פלל sin añadir matices ajenos.
- source_word: יְחִזְקִיָּהוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Ezequías
  lexicon: Nombre propio estándar
  rationale: Se usa la forma bíblica común en español para el nombre del rey.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Se conserva el título apposicional explícito del hebreo para identificar a Ezequías con claridad y solemnidad.
- source_word: וִישַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Isaías
  lexicon: Nombre propio estándar
  rationale: Forma española estable del nombre del profeta.
- source_word: בֶן אָמוֹץ
  english_pob_choice: son of Amoz
  chosen_spanish: hijo de Amoz
  alternatives_spanish:
  - hijo de Amós
  lexicon: HALOT
  rationale: Se mantiene la identificación genealógica de manera transparente. Se prefiere "Amoz" como transliteración estable del padre del profeta en este contexto.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  alternatives_spanish:
  - profeta
  lexicon: HALOT
  rationale: Título apposicional explícito en hebreo; se retiene porque es narrativamente relevante y no debe ser absorbido en el nombre.
- source_word: עַל זֹאת
  english_pob_choice: because of this
  chosen_spanish: a causa de esto
  alternatives_spanish:
  - por esto
  - debido a esto
  lexicon: HALOT
  rationale: La revisión inglesa prefirió una relación causal cercana al hebreo. En español, "a causa de esto" expresa bien la relación de motivo de la oración sin forzar una causalidad más fuerte de la que el contexto exige.
- source_word: וַיִּזְעֲקוּ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron el clamor
  lexicon: HALOT
  rationale: זעק denota un clamor urgente, frecuentemente en aflicción o súplica. "Clamaron" conserva la intensidad reverente en español mejor que "llamaron" y evita una dicción demasiado coloquial.
- source_word: הַשָּׁמָיִם
  english_pob_choice: to heaven
  chosen_spanish: a los cielos
  alternatives_spanish:
  - al cielo
  lexicon: HALOT
  rationale: El plural hebreo se preserva en español con "los cielos" para no borrar la forma plural documentada. Se conserva también la dirección oracional con "a".
theological_decisions:
- issue: Plural hebreo de הַשָּׁמָיִם en un contexto de oración
  english_pob_reading: to heaven
  chosen_spanish_reading: a los cielos
  alternative_spanish_readings:
  - al cielo
  rationale: El inglés optó por "heaven" por idiomaticidad, pero el español permite conservar el plural formal del hebreo sin perder naturalidad. Esto evita ocultar el dato morfológico de que el sustantivo está en plural.
  doctrine_reference: Principio de fidelidad formal cuando el idioma meta lo permite sin oscurecer el sentido.
translation_notes:
  revision_awareness: El texto inglés revisado cambió de "about this" a "because of this" para acercarse a עַל זֹאת; en español se refleja esa decisión con "a causa de esto", manteniendo la naturalidad y la relación causal directa que sugiere el contexto. También se reconoció la tensión entre la idiomaticidad inglesa "to heaven" y el plural hebreo; el español conserva el plural con "los cielos".
  spanish_consistency_notes:
  - Se mantiene "Yahvé" solo cuando el texto lo requiera explícitamente; este versículo no contiene el tetragrámaton.
  - Se usa "profeta" como título apposicional separado, no integrado al nombre propio.
  - Se conserva la forma plural "cielos" para reflejar el hebreo sin introducir una nota doctrinal adicional.
