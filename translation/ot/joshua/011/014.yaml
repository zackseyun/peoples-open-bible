id: JOS.11.14
reference: Joshua 11:14
source:
  edition: WLC
  text: וְ֠/כֹל שְׁלַ֞ל הֶ/עָרִ֤ים הָ/אֵ֨לֶּה֙ וְ/הַ/בְּהֵמָ֔ה בָּזְז֥וּ לָ/הֶ֖ם בְּנֵ֣י יִשְׂרָאֵ֑ל רַ֣ק אֶֽת כָּל הָ/אָדָ֞ם הִכּ֣וּ לְ/פִי חֶ֗רֶב עַד הִשְׁמִדָ/ם֙ אוֹתָ֔/ם לֹ֥א הִשְׁאִ֖ירוּ כָּל נְשָׁמָֽה־־־־־׃
translation:
  text: And all the spoil of these cities[a], along with the livestock, the sons of Israel plundered for themselves; only all the people they struck with the edge of the sword until they had destroyed them[d][c][b]. They left no breathing thing.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the Israelites.' The Hebrew is literally 'the sons of Israel.'
    reason: lexical_alternative
  - marker: b
    text: Or 'all the people.' Hebrew 'every man' uses אָדָם here for the human population in contrast with the livestock.
    reason: lexical_alternative
  - marker: c
    text: Literally 'with the mouth of the sword,' a Hebrew idiom meaning 'with the edge of the sword.'
    reason: lexical_alternative
  - marker: d
    text: Or 'they left no one breathing' / 'they left alive nothing that breathed.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַל
  chosen: spoil
  alternatives:
  - plunder
  - booty
  lexicon: HALOT
  rationale: Refers to goods taken in war. 'Spoil' is clear, idiomatic, and preserves the military context without sounding overly archaic.
- source_word: הֶעָרִים הָאֵלֶּה
  chosen: these cities
  alternatives:
  - those cities
  lexicon: HALOT
  rationale: Demonstrative points to the cities just discussed; 'these cities' is the natural proximal rendering.
- source_word: הַבְּהֵמָה
  chosen: the livestock
  alternatives:
  - the cattle
  - the animals
  lexicon: HALOT
  rationale: In conquest context this denotes domesticated animals taken as property. 'Livestock' is more precise and modern than 'cattle' or the broader 'animals'.
- source_word: בָּזְזוּ לָהֶם
  chosen: plundered for themselves
  alternatives:
  - took as plunder for themselves
  - seized for themselves
  lexicon: HALOT
  rationale: The verb means to plunder or take spoil, and לָהֶם adds reflexive benefit. 'Plundered for themselves' preserves both the action and beneficiary nuance.
- source_word: בְּנֵי יִשְׂרָאֵל
  chosen: the sons of Israel
  alternatives:
  - the Israelites
  - the children of Israel
  lexicon: HALOT
  rationale: Given the project's gender-accurate policy, the literal familial expression is retained rather than flattened to the ethnic label 'Israelites.'
- source_word: רַק
  chosen: only
  alternatives:
  - except that
  - however
  lexicon: HALOT
  rationale: Marks a strong exception/contrast between taking spoil and killing the human population. 'Only' is concise and accurate.
- source_word: כָּל הָאָדָם
  chosen: every man
  alternatives:
  - all the people
  - all humankind
  lexicon: HALOT
  rationale: אָדָם here refers to the human inhabitants in contrast with livestock. Per doctrine, אָדָם is rendered 'man' or 'humankind' by context; here distributive 'every man' fits the singular collective construction and preserves the human/animal contrast.
- source_word: הִכּוּ לְפִי חֶרֶב
  chosen: they struck with the edge of the sword
  alternatives:
  - they put to the sword
  - they struck with the mouth of the sword
  lexicon: HALOT
  rationale: The idiom literally means 'to the mouth/edge of the sword.' 'With the edge of the sword' is standard, understandable English that preserves the idiom's force more transparently than the more interpretive 'put to the sword.'
- source_word: עַד הִשְׁמִדָם אֹתָם
  chosen: until they had destroyed them
  alternatives:
  - until they had annihilated them
  - until they had devoted them to destruction
  lexicon: HALOT
  rationale: The Hiphil of שׁמד means to destroy/exterminate. 'Destroyed' is the most direct rendering here. 'Devoted them to destruction' would import herem language not present in this clause.
- source_word: לֹא הִשְׁאִירוּ כָּל נְשָׁמָה
  chosen: They left no breathing thing
  alternatives:
  - they left no one breathing
  - they left no breath
  - they left alive nothing that breathed
  lexicon: HALOT
  rationale: נְשָׁמָה literally relates to breath/breathing. The phrase is an idiom for leaving no survivor. 'No breathing thing' preserves the concrete Hebrew imagery while remaining readable.
