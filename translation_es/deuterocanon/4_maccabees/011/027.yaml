    rationale: Aunque intenta reflejar la idea de estar colocados en autoridad, en español suena torpe. «están sobre nosotros» conserva la imagen de supervisión y fluye mejor.
  - severity: low
    issue: «para la ley divina» puede afinarse estilísticamente
    rationale: La frase no es incorrecta, pero «al servicio de la ley divina» expresa mejor en español el contraste de lealtad/autoridad implícito en el griego sin añadir contenido doctrinal indebido.
  - severity: low
    issue: La cláusula final admite una formulación más idiomática
    rationale: «tenemos una razón invencible» es entendible, pero «poseemos una razón invencible» suena más natural y además armoniza con la nota que preserva la alternativa.
