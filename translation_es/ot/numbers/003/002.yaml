lexical_decisions:
- source_word: וְאֵלֶּה
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Y estos son
  - Ahora bien, estos son
  lexicon: HALOT
  rationale: El hebreo introduce la lista de manera deíctica; en español, «Estos son» reproduce bien la función introductoria sin añadir énfasis innecesario.
- source_word: שְׁמוֹת
  english_pob_choice: the names
  chosen_spanish: los nombres
  alternatives_spanish:
  - nombres
  lexicon: HALOT
  rationale: 'La frase nominal en constructo se vierte naturalmente con artículo en español: «los nombres de…».'
- source_word: בְּנֵי אַהֲרֹן
  english_pob_choice: of Aaron’s sons
  chosen_spanish: de los hijos de Aarón
  alternatives_spanish:
  - de los hijos de Aarón
  - de los hijos de Aarón
  lexicon: HALOT
  rationale: Se conserva la relación posesiva/constructa de forma clara y natural en español con «los hijos de Aarón».
- source_word: הַבְּכֹר
  english_pob_choice: the firstborn
  chosen_spanish: el primogénito
  alternatives_spanish:
  - el primero en nacer
  - el hijo mayor
  lexicon: HALOT
  rationale: «Primogénito» expresa con precisión el valor léxico de בְּכוֹר y mantiene la fuerza de primogenitura; se evita «mayor» por ser más interpretativo.
- source_word: נָדָב
  english_pob_choice: Nadab
  chosen_spanish: Nadab
  alternatives_spanish:
  - Nadab
  lexicon: Transliteración tradicional
  rationale: Nombre propio transliterado de manera estándar.
- source_word: וַאֲבִיהוּא
  english_pob_choice: and Abihu
  chosen_spanish: y Abiú
  alternatives_spanish:
  - y Abihú
  - y Abihu
  lexicon: Transliteración tradicional
  rationale: Se usa la forma castellana tradicional «Abiú», ampliamente reconocible y ajustada a la pronunciación española.
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eleazar
  lexicon: Transliteración tradicional
  rationale: Nombre propio transliterado de manera estándar.
- source_word: וְאִיתָמָר
  english_pob_choice: and Ithamar
  chosen_spanish: e Itamar
  alternatives_spanish:
  - y Itamar
  lexicon: Transliteración tradicional
  rationale: Se usa «e» ante vocal inicial para mantener la eufonía del español; el nombre se vierte como «Itamar».
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del inglés POB, que colocó «the firstborn» antes de Nadab para reflejar más directamente el orden hebreo; en español se preserva esa relación con «el primogénito Nadab».
  spanish_consistency_notes:
  - Se mantiene «Aarón» con tilde por norma ortográfica del español.
  - Se usa puntuación introductoria con dos puntos para presentar la lista, en armonía con el valor deíctico del hebreo.
  - Se conserva la coordinación serial con coma antes de la última conjunción, de acuerdo con el uso editorial español.
