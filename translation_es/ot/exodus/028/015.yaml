translation:
  language: es
  text: 'Harás un pectoral[a] de juicio, obra de un diseñador hábil[b]; como la obra del efod lo harás: de oro, azul, púrpura, escarlata y lino fino torcido lo harás.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "pectoral para juicio" o "pectoral de decisión".
    reason: lexical_alternative
  - marker: b
    text: O "obra tejida con habilidad"; el hebreo se refiere a una labor artesanal expertamente diseñada.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹשֶׁן
  english_pob_choice: breastpiece
  chosen_spanish: pectoral
  alternatives_spanish:
  - pechera
  - pectoral sacerdotal
  lexicon: HALOT
  rationale: En español, "pectoral" comunica un objeto que se lleva sobre el pecho sin sugerir armadura. "Pechera" puede sonar más general o moderna, pero "pectoral" es más natural en contexto cultual y mantiene la precisión técnica del término.
- source_word: מִשְׁפָּט
  english_pob_choice: of judgment
  chosen_spanish: de juicio
  alternatives_spanish:
  - para juicio
  - de decisión
  lexicon: HALOT
  rationale: 'La construcción conserva la ambigüedad funcional del hebreo: un pectoral asociado con juicio/decisión oracular. "De juicio" mantiene la forma nominal compacta del original sin resolver el mecanismo.'
- source_word: מַעֲשֵׂה חֹשֵׁב
  english_pob_choice: the work of a skillful designer
  chosen_spanish: obra de hábil diseñador
  alternatives_spanish:
  - obra de artesano experto
  - obra tejida con habilidad
  - obra de un tejedor experto
  lexicon: HALOT
  rationale: La expresión hebrea apunta a trabajo artesanal cuidadosamente ideado. "Hábil diseñador" conserva la idea de diseño experto y también la dimensión de confección artística, sin reducirlo solo a tejido o bordado.
- source_word: כְּמַעֲשֵׂה אֵפֹד
  english_pob_choice: like the work of the ephod
  chosen_spanish: como la obra del efod
  alternatives_spanish:
  - como el trabajo del efod
  - según la obra del efod
  lexicon: HALOT
  rationale: Se conserva el término técnico "efod" por ser un objeto sacerdotal específico sin equivalente breve en español. "Como la obra" refleja la comparación de calidad/tipo de manufactura.
- source_word: זָהָב
  english_pob_choice: gold
  chosen_spanish: oro
  alternatives_spanish:
  - oro fino
  lexicon: HALOT
  rationale: Material directo y transparente. "Oro" es la correspondencia natural en español.
- source_word: תְּכֵלֶת
  english_pob_choice: blue
  chosen_spanish: azul
  alternatives_spanish:
  - azul violáceo
  - azul púrpura
  lexicon: HALOT
  rationale: En el listado textil del tabernáculo, "azul" es la forma más idiomática en español para este tinte. Se evita sobreespecificar el matiz porque el hebreo no lo delimita aquí más allá del color.
- source_word: אַרְגָּמָן
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - violeta
  lexicon: HALOT
  rationale: '"Púrpura" preserva el color de lujo asociado al texto y es más cercano al registro bíblico que "morado" en este contexto.'
- source_word: תוֹלַעַת שָׁנִי
  english_pob_choice: scarlet yarn
  chosen_spanish: carmesí
  alternatives_spanish:
  - escarlata
  - hilo carmesí
  - lana escarlata
  lexicon: HALOT
  rationale: La expresión hebrea puede referirse al material teñido de rojo intenso sin exigir en español la inserción de "hilo" o "lana" donde el verso solo enumera materias. "Carmesí" preserva el color intenso y evita añadir un sustantivo no explícito en el hebreo.
- source_word: שֵׁשׁ מָשְׁזָר
  english_pob_choice: finely twisted linen
  chosen_spanish: lino fino torcido
  alternatives_spanish:
  - lino finamente torcido
  - lino torcido fino
  - lino fino trenzado
  lexicon: HALOT
  rationale: '"Lino fino torcido" conserva el material y la cualidad de torsión/hilado del hebreo con un orden natural en español. "Torcido" aquí reproduce el valor técnico de la fibra retorcida, no una idea de deformación.'
- source_word: תַּעֲשֶׂנּוּ ... תַּעֲשֶׂה אֹתוֹ
  english_pob_choice: you shall make it ... you shall make it
  chosen_spanish: lo harás ... lo harás
  alternatives_spanish:
  - lo hacerás ... lo harás
  - lo fabricarás ... lo fabricarás
  lexicon: HALOT
  rationale: Se repite el verbo para reflejar el énfasis instructivo del hebreo. "Harás" es suficientemente amplio para fabricar un objeto ritual y evita una paráfrasis más interpretativa.
theological_decisions:
- issue: Función de חֹשֶׁן מִשְׁפָּט
  english_pob_reading: Rendered formally as 'breastpiece of judgment' without specifying more than the Hebrew states.
  chosen_spanish_reading: '"pectoral de juicio" sin explicar el mecanismo oracular o judicial'
  alternative_spanish_readings:
  - pectoral para decisión
  - pectoral de justicia
  rationale: El hebreo presenta una designación cultual con posible función de discernimiento/juicio, pero el versículo no la desarrolla. Mantener "de juicio" preserva la tensión semántica y evita resolver prematuramente la cuestión.
  doctrine_reference: Conservar la ambigüedad textual y ritual del término.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; la presente redacción sigue el texto hebreo y la decisión inglesa auditada sin introducir ajustes no motivados por la fuente.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el término técnico "efod" por coherencia con la terminología del santuario.
  - No se amplía "carmesí" con "hilo" o "lana" porque el hebreo aquí enumera materiales y colores de manera compacta.
  - '"Pectoral" se prefiere a "breastplate"-equivalentes más militares; evita una connotación de armadura inexistente en el contexto.'
