lexical_decisions:
- source_word: כַבּוֹן
  english_pob_choice: Kabbon
  chosen_spanish: Kabón
  alternatives_spanish:
  - Cabón
  lexicon: none (nombre propio)
  rationale: Es un nombre de lugar; se translitera, no se traduce. Opté por una forma española legible que conserva la oclusiva inicial /k/ y adapta la acentuación al patrón natural del español. La alternativa con C refleja una convención inglesa antigua, pero en español K resulta más transparente para esta transliteración.
- source_word: לַחְמָס
  english_pob_choice: Lahmas
  chosen_spanish: Lajmás
  alternatives_spanish:
  - Lahmás
  - Lajmas
  lexicon: none (nombre propio)
  rationale: Es un topónimo; se mantiene como transliteración. Represento ח con j para señalar el valor gutural sin recurrir a una grafía inglesa ajena al español. El acento ayuda a la pronunciación y a la lectura pública.
- source_word: כִתְלִישׁ
  english_pob_choice: Kithlish
  chosen_spanish: Kithlish
  alternatives_spanish:
  - Kitlish
  - Cithlish
  lexicon: none (nombre propio)
  rationale: Nombre propio de lugar; se conserva de forma transliterada. Mantengo la grafía K inicial del POB inglés como convención moderna y dejo intacto el grupo interno para no perder correspondencia auditiva con el original.
- source_word: וְ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: HALOT
  rationale: La conjunción simplemente coordina una lista de nombres de lugares. En español, 'y' es la forma normal; 'e' solo sería necesaria ante otra palabra que empezara con i/hi, lo cual no ocurre aquí.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió revisiones y la lista hebrea presenta solo una serie de topónimos. La versión española conserva esa economía y se limita a transliterar los tres nombres propios con adaptación mínima para lectura natural en español.
  spanish_consistency_notes:
  - Se mantiene 'y' como conjunción coordinante simple para corresponder al hebreo repetido וְ.
  - No se introducen equivalentes interpretativos porque el versículo solo enumera nombres de lugares.
  - Se preserva la naturaleza de topónimo sin añadir artículos ni preposiciones que no están en el fuente.
