id: 1TI.4.14
reference: 1 Timothy 4:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μὴ ἀμέλει τοῦ ἐν σοὶ χαρίσματος, ὃ ἐδόθη σοι διὰ προφητείας μετὰ ἐπιθέσεως τῶν χειρῶν τοῦ πρεσβυτερίου.
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/004/014.yaml
  text: Do not neglect the gift that is in you[b][a], which was given to you through prophecy with the laying on of the hands of the eldership.
  footnotes:
  - marker: a
    text: Or 'the eldership' or 'the presbytery' for the collective body of elders.
    reason: lexical_alternative
  - marker: b
    text: Or 'through prophetic utterance'; the phrase may indicate prophecy accompanying or mediating the gift's bestowal.
    reason: lexical_alternative
translation:
  language: ko
  text: 그대 안에 있는 은사를 소홀히 하지 마십시오. 그것은 장로들의 안수와 함께 예언을 통해[b] 그대에게 주어진 것입니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「장로회」 「장로단」(장로들의 공동체).
    reason: lexical_alternative
  - marker: b
    text: 또는 「예언의 말씀을 통해」. 본 어구는 예언이 은사 부여를 동반하거나 매개했음을 시사할 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ἀμέλει
  english_pob_choice: Do not neglect
  chosen_korean: 소홀히 하지 마십시오
  alternatives_korean:
  - 가볍게 여기지 마십시오
  - 등한히 하지 마십시오
  lexicon: BDAG
  rationale: ἀμελέω의 「소홀히 하다」를 자연스럽게.
- source_word: τοῦ ἐν σοὶ χαρίσματος
  english_pob_choice: the gift that is in you
  chosen_korean: 그대 안에 있는 은사
  alternatives_korean:
  - 그대 안의 선물
  - 그대 안에 주어진 은사
  lexicon: BDAG
  rationale: χάρισμα 한국 신학 정립 어휘 「은사」.
- source_word: διὰ προφητείας
  english_pob_choice: through prophecy
  chosen_korean: 예언을 통해
  alternatives_korean:
  - 예언으로 말미암아
  - 예언의 말씀을 통해
  lexicon: BDAG
  rationale: διά의 「수단·매개」를 「~을 통해」로.
- source_word: μετὰ ἐπιθέσεως τῶν χειρῶν τοῦ πρεσβυτερίου
  english_pob_choice: with the laying on of the hands of the eldership
  chosen_korean: 장로들의 안수와 함께
  alternatives_korean:
  - 장로회의 안수와 더불어
  - 장로들이 손을 얹음과 함께
  lexicon: BDAG
  rationale: πρεσβυτέριον은 장로들의 집단. 한국어로 「장로들」로 자연스럽게 옮기고, 「장로회」 해석을 각주에 둠.
