lexical_decisions:
- source_word: אַלּוּף
  english_pob_choice: chief
  chosen_spanish: jefe
  alternatives_spanish:
  - jefe de clan
  - caudillo
  - duque
  lexicon: HALOT
  rationale: En Génesis 36 el término designa un líder edomita de clan o tribu. En español, «jefe» conserva la brevedad y el paralelismo de la lista, sin añadir una especificación como «de clan» que no está expresada en cada repetición del hebreo. «Duque» sería tradicional pero arcaizante; «caudillo» introduce una connotación histórica no requerida.
- source_word: קְנַז
  english_pob_choice: Kenaz
  chosen_spanish: Kenaz
  alternatives_spanish:
  - Quenaz
  lexicon: nombre propio
  rationale: Nombre propio transliterado para preservar la forma del texto base. Se evita traducirlo, ya que aquí funciona como designación personal o clanica.
- source_word: תֵּימָן
  english_pob_choice: Teman
  chosen_spanish: Temán
  alternatives_spanish:
  - Temán
  - Temán
  lexicon: nombre propio
  rationale: Nombre propio transliterado con acentuación española para facilitar la lectura. Aunque el término puede relacionarse etimológicamente con «sur», en este contexto enumera un jefe edomita, no un topónimo traducible.
- source_word: מִבְצָר
  english_pob_choice: Mibzar
  chosen_spanish: Mibzar
  alternatives_spanish:
  - Mibsar
  lexicon: nombre propio
  rationale: Nombre propio transliterado. La forma consonántica permite «Mibzar» como transliteración principal; se conserva como nombre y no se intenta interpretar el posible sentido léxico del lexema.
translation_notes:
  revision_awareness: 'El texto hebreo y la auditoría inglesa concuerdan estrechamente: se trata de una lista nominal breve de tres jefes edomitas. No hay revisiones aplicadas ni variantes textuales relevantes en el paquete fuente; por ello la versión española conserva la estructura enumerativa y la transliteración de los nombres propios.'
  spanish_consistency_notes:
  - Se mantiene «jefe» de forma repetida para reflejar la repetición de אַלּוּף y el ritmo del original.
  - Se usa «Temán» con tilde gráfica para ajuste ortográfico español en un nombre propio; los demás nombres se conservan sin traducir.
  - No se introduce una equivalencia tradicional como «duque», ya que la auditoría inglesa la marca solo como opción histórica y no como preferida.
