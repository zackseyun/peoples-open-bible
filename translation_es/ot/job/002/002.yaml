translation:
  language: es
  text: 'Yahvé dijo al Acusador[a]: «¿De dónde has venido?» Y el Acusador respondió a Yahvé y dijo: «De andar recorriendo la tierra y de pasearme por ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el satan»; aquí probablemente un título que significa «el acusador» o «el adversario», no necesariamente un nombre propio.'
    reason: alternative_reading
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte con el nombre divino transliterado, no con una sustitución titular. «Yahvé» conserva el nombre personal revelado y mantiene la decisión auditable del POB inglés.
- source_word: הַשָּׂטָן
  english_pob_choice: the Accuser
  chosen_spanish: el Acusador
  alternatives_spanish:
  - Satanás
  - el adversario
  - el Satanás
  lexicon: HALOT
  rationale: El hebreo lleva artículo, por lo que funciona aquí como título/rol. «El Acusador» comunica mejor en español la función judicial/adversarial que el préstamo «Satanás», y preserva la tensión documental entre título y posible nombre propio.
- source_word: אֵי מִזֶּה תָּבֹא
  english_pob_choice: From where have you come?
  chosen_spanish: ¿De dónde has venido?
  alternatives_spanish:
  - ¿De dónde vienes?
  - ¿De dónde has llegado?
  lexicon: HALOT
  rationale: La pregunta pide origen o procedencia. En español, el pretérito perfecto compuesto encaja bien con el valor de origen del hebreo sin sonar forzado.
- source_word: וַיַּעַן ... וַיֹּאמַר
  english_pob_choice: answered ... and said
  chosen_spanish: respondió ... y dijo
  alternatives_spanish:
  - contestó ... y dijo
  - respondió
  lexicon: HALOT
  rationale: Conservo los dos verbos narrativos del hebreo. «Respondió ... y dijo» es natural en español bíblico contemporáneo y mantiene el ritmo narrativo.
- source_word: מִשֻּׁט בָּאָרֶץ
  english_pob_choice: from roaming about on the earth
  chosen_spanish: de andar recorriendo la tierra
  alternatives_spanish:
  - de andar de un lado a otro sobre la tierra
  - de vagar por la tierra
  lexicon: HALOT
  rationale: El infinitivo sugiere movimiento repetido o itinerante. «Andar recorriendo» preserva la idea de ir y venir sin imponer un matiz más técnico como «patrullar».
- source_word: בָּאָרֶץ
  english_pob_choice: on the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En este contexto, אֶרֶץ puede aludir al mundo habitado. «La tierra» es la opción más transparente y acorde con el español bíblico actual.
- source_word: וּמֵהִתְהַלֵּךְ בָּהּ
  english_pob_choice: and from walking around on it
  chosen_spanish: de pasearme por ella
  alternatives_spanish:
  - de caminar por ella
  - de andar por ella
  lexicon: HALOT
  rationale: El hitpael de הלך expresa movimiento reiterado o deambular. «Pasearme por ella» transmite esa idea con fluidez natural en español; se mantiene el paralelismo con «de andar recorriendo» sin sobreespecificar el verbo.
theological_decisions:
- issue: 'Cómo traducir הַשָּׂטָן en Job 2:2: título funcional o nombre propio'
  english_pob_reading: Rendered as 'the Accuser' because the article indicates a title/role in the heavenly court scene.
  chosen_spanish_reading: «el Acusador» como título funcional, no como nombre propio fijo.
  alternative_spanish_readings:
  - Satanás
  - el Satanás
  - el adversario
  rationale: El artículo definido hebreo y el contexto de la corte celestial favorecen una lectura titular. Mantener «el Acusador» evita introducir una identificación posterior no marcada explícitamente por este verso, a la vez que deja abierta la tensión interpretativa histórica.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación de la tensión teológica cuando el hebreo no la resuelve de forma explícita.'
translation_notes:
  revision_awareness: 'Coincide con el pase de revisión más reciente: no se requirieron cambios posteriores, y el acuerdo de control cruzado fue alto. La redacción española sigue la misma decisión interpretativa que el POB inglés para יְהוָה y הַשָּׂטָן, con ajuste natural de estilo en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con el estándar del proyecto.
  - Se conserva el título «el Acusador» para הַשָּׂטָן, evitando «Satanás» como nombre propio.
  - «La tierra» reproduce de forma natural el valor de אֶרֶץ sin forzar «mundo» ni «país» en este contexto.
  - La nota al pie usa una sola marca y ancla la ambigüedad titular en el término clave.
