translation:
  language: es
  text: 'Y tú, hijo de hombre, profetiza contra Gog y di: Así dice el Señor Yahvé: He aquí, estoy contra ti, Gog, príncipe de Rosh[a], Mésec y Tubal.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «príncipe principal de Mésec y Tubal». El hebreo רֹאשׁ puede entenderse como nombre propio, «Rosh», o como sustantivo común con el sentido de «principal» o «jefe».'
    reason: alternative_reading
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Mantiene el giro idiomático profético característico de Ezequiel y conserva la continuidad literaria del libro. 'Hijo de hombre' es más formal y fiel que una paráfrasis como 'ser humano' o 'mortal'.
- source_word: הִנָּבֵא
  english_pob_choice: prophesy
  chosen_spanish: profetiza
  alternatives_spanish:
  - profetiza como profeta
  - anuncia proféticamente
  lexicon: HALOT
  rationale: El imperativo niphal se vierte de forma natural como mandato profético directo. 'Profetiza' conserva el tono oracular sin añadir explicación.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - acerca de
  - sobre
  lexicon: HALOT
  rationale: En un contexto de juicio, la preposición con el destinatario tiene valor adversativo. 'Contra' refleja mejor esa carga que 'acerca de' o 'sobre'.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - Señor Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se conserva el nombre divino como 'Yahvé' según la pauta del proyecto, y se traduce אֲדֹנָי como 'Señor'. La forma evita el ocultamiento del nombre propio y mantiene la solemnidad del título compuesto.
- source_word: הִנְנִי אֵלֶיךָ
  english_pob_choice: Behold, I am against you
  chosen_spanish: He aquí, estoy contra ti
  alternatives_spanish:
  - Mira, estoy contra ti
  - He aquí que estoy contra ti
  lexicon: HALOT
  rationale: '''He aquí'' preserva la fuerza enfática de הִנְנִי en registro profético. ''Estoy contra ti'' refleja el sentido idiomático de אֶל en esta fórmula de juicio.'
- source_word: נְשִׂיא
  english_pob_choice: prince
  chosen_spanish: príncipe
  alternatives_spanish:
  - jefe
  - gobernante
  lexicon: HALOT
  rationale: '''Príncipe'' reproduce el título político elevado sin imponer una precisión monárquica que el hebreo no exige.'
- source_word: רֹאשׁ
  english_pob_choice: chief / Rosh
  chosen_spanish: Rosh
  alternatives_spanish:
  - jefe
  - principal
  lexicon: HALOT
  rationale: Se adopta la lectura documentada por la revisión más reciente del POB y la alternativa histórica conservada en la nota en inglés. Al tratarlo como nombre propio se preserva la tensión interpretativa del hebreo y se evita resolverla en la línea principal.
- source_word: מֶשֶׁךְ וְתֻבָל
  english_pob_choice: Meshech and Tubal
  chosen_spanish: Mesec y Tubal
  alternatives_spanish:
  - Meshec y Tubal
  lexicon: HALOT
  rationale: Son nombres propios; se transliteran de manera estable en español como 'Mesec' y 'Tubal' para respetar la referencia geográfica/etnónima.
theological_decisions:
- issue: Renderización del nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: La pauta del proyecto exige no ocultar יְהוָה bajo una convención de máscara. Traducirlo como 'Yahvé' conserva el nombre propio del pacto y distingue correctamente el título אֲדֹנָי.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Lectura de רֹאשׁ en la secuencia נְשִׂיא רֹאשׁ מֶשֶׁךְ וְתֻבָל
  english_pob_reading: prince of Rosh, Meshech, and Tubal
  chosen_spanish_reading: príncipe de Rosh, Mesec y Tubal
  alternative_spanish_readings:
  - príncipe principal de Mesec y Tubal
  - príncipe jefe de Mesec y Tubal
  rationale: El audit trail inglés documenta una revisión reciente que favorece la lectura de nombre propio 'Rosh' y preserva la tensión interpretativa con nota. La traducción española sigue esa revisión para ser coherente con el expediente auditado.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; document alternatives in footnotes where ambiguity is genuine'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del expediente inglés, que pasó de una lectura adjetival ('chief prince') a una lectura con nombre propio ('prince of Rosh, Meshech, and Tubal'). Por eso el texto principal adopta 'Rosh' y conserva en nota la alternativa tradicional 'príncipe principal de Mesec y Tubal'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en lugar de una convención de máscara para יְהוָה, conforme a la norma del proyecto.
  - Se prefiere 'Mesec' como transliteración estable en español.
  - Se mantiene 'hijo de hombre' por continuidad con el estilo profético de Ezequiel.
  - La puntuación reproduce el tono oracular con dos puntos antes del discurso directo final.
