translation:
  language: es
  text: 'Cuando entres en la tierra que Yahvé tu Dios te da, y la tomes en posesión y habites en ella, y digas: «Pondré un rey sobre mí[a], como todas las naciones que están alrededor de mí»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nombraré un rey sobre mí». El hebreo dice literalmente: «Pondré un rey sobre mí / sobre mí mismo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  - Pues
  lexicon: HALOT
  rationale: En este contexto legal-prospectivo, כִּי introduce una situación futura esperada; «Cuando» conserva el valor temporal y suena natural en español.
- source_word: תָבֹא
  english_pob_choice: you come
  chosen_spanish: entres
  alternatives_spanish:
  - llegues
  - vengas
  lexicon: HALOT
  rationale: El verbo בוא en esta construcción se entiende como entrar en el territorio; «entres» mantiene la idea de ingreso a la tierra de manera clara y concisa.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  lexicon: HALOT
  rationale: En Deuteronomio, הָאָרֶץ apunta a la tierra prometida; «la tierra» preserva el uso técnico-bíblico sin introducir un matiz geográfico distinto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención POB para el nombre divino: transliteración del Tetragrama como «Yahvé», no la sustitución por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  lexicon: HALOT
  rationale: La frase de pacto con sufijo de segunda persona se traduce de forma directa y idiomática como «tu Dios».
- source_word: נֹתֵן לָךְ
  english_pob_choice: is giving you
  chosen_spanish: te da
  alternatives_spanish:
  - te está dando
  - te está entregando
  lexicon: HALOT
  rationale: El participio expresa una acción divina en curso o inminente; en español, «te da» comunica bien la acción sin forzar una perífrasis que pueda sonar pesada.
- source_word: וִירִשְׁתָּהּ
  english_pob_choice: you take possession of it
  chosen_spanish: la tomes en posesión
  alternatives_spanish:
  - la posesiones
  - la heredes
  lexicon: HALOT
  rationale: ירש en contexto territorial tiene el sentido de poseer/ocupar la tierra; «tomar en posesión» conserva el valor concreto y evita la posible ambigüedad de «heredar».
- source_word: וְיָשַׁבְתָּה בָּהּ
  english_pob_choice: and live in it
  chosen_spanish: y habites en ella
  alternatives_spanish:
  - y vivas en ella
  - y te establezcas en ella
  lexicon: HALOT
  rationale: ישׁב puede significar habitar/residir; «habites en ella» refleja el asentamiento estable y es natural en español bíblico contemporáneo.
- source_word: וְאָמַרְתָּ
  english_pob_choice: and you say
  chosen_spanish: y digas
  alternatives_spanish:
  - y dirás
  - y entonces digas
  lexicon: HALOT
  rationale: En la cadena narrativa-legal, el verbo se traduce con subjuntivo en subordinación temporal tras «cuando»; «digas» mantiene la secuencia prevista.
- source_word: אָשִׂימָה עָלַי מֶלֶךְ
  english_pob_choice: I will set a king over myself
  chosen_spanish: Pondré sobre mí un rey
  alternatives_spanish:
  - Nombraré un rey sobre mí
  - Me pondré un rey
  lexicon: HALOT
  rationale: שׂים significa poner/colocar/establecer. «Pondré sobre mí» reproduce la imagen hebrea del rey colocado sobre la persona; se mantiene el matiz reflexivo de עָלַי.
- source_word: כְּכָל הַגּוֹיִם
  english_pob_choice: like all the nations
  chosen_spanish: como todas las naciones
  alternatives_spanish:
  - al igual que todas las naciones
  - como los demás pueblos
  lexicon: HALOT
  rationale: גּוֹיִם se vierte de manera literal como «naciones»; aquí expresa comparación con los pueblos circundantes.
- source_word: אֲשֶׁר סְבִיבֹתָי
  english_pob_choice: that are around me
  chosen_spanish: que están alrededor de mí
  alternatives_spanish:
  - que me rodean
  - que están a mi alrededor
  lexicon: HALOT
  rationale: La frase señala a las naciones vecinas desde la perspectiva del hablante; «alrededor de mí» conserva esa referencia espacial y la primera persona.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa explícitamente el Tetragrama. Siguiendo la política POB en español, se preserva el nombre divino como «Yahvé» para mantener la identidad del pacto y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh/Yahvé'
- issue: Imagen de autoridad real sobre la persona
  english_pob_reading: I will set a king over myself
  chosen_spanish_reading: Pondré sobre mí un rey
  alternative_spanish_readings:
  - Nombraré un rey sobre mí
  - Pondré un rey sobre mí
  rationale: 'Se conserva la tensión del hebreo: el hablante no solo pide un rey, sino que lo coloca «sobre mí». Esa formulación mantiene la fuerza de la expresión sin suavizarla hacia una mera elección administrativa.'
  doctrine_reference: 'DOCTRINE.md: Maintain documented lexical tension where the Hebrew is intentionally concrete'
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se preserva el valor temporal de כִּי, el aspecto prospectivo de נֹתֵן, el concreto territorial de ירשׁ, y la formulación reflexiva de אָשִׂימָה עָלַי מֶלֶךְ. No se requieren revisiones adicionales respecto del pase inglés marcado como unchanged.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en todo el texto para el Tetragrama, conforme al estándar del proyecto.
  - «Tierra» mantiene la terminología bíblica de Deuteronomio sin sustituirla por «país» o «territorio».
  - La construcción con subjuntivo («entres», «habites», «digas») refleja adecuadamente la subordinación temporal legal-prospectiva del hebreo.
  - Se conserva la comparación con «las naciones» y la perspectiva de primera persona («alrededor de mí») sin generalizarla.
