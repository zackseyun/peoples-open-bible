lexical_decisions:
- source_word: ⲅⲁⲣ
  chosen: for
  lexicon: Greek/Coptic particle
  rationale: Causal connective introducing the reason for the preceding admonition;
    standard rendering preserves discourse flow.
- source_word: ⲁⲛⲟⲕ
  chosen: I am
  alternatives:
  - I
  lexicon: Sahidic Coptic pronoun
  rationale: Copular identification is explicit in English; retaining “I am” preserves
    the voice and cadence of the self-assertions.
- source_word: ⲧϣⲟⲣⲡ
  chosen: the first
  alternatives:
  - the beginning
  lexicon: Crum; Sahidic noun meaning "the first, the beginning"
  rationale: Here functions as a titular identity; “the first” keeps symmetry with
    the following term and is the common Coptic sense.
- source_word: ⲁⲩⲱ
  chosen: and
  lexicon: Sahidic conjunction
  rationale: Simple coordinator joining the antithetical pair.
- source_word: ⲑⲁⲉ
  chosen: the last
  alternatives:
  - the end
  lexicon: Crum; Sahidic noun “end, last”
  rationale: As an identity title paired with ⲧϣⲟⲣⲡ; “the last” preserves the balanced
    paradox. "The end" is possible but less symmetric in English here.
