translation:
  language: es
  text: Recuerda que debes engrandecer su obra, de la cual han cantado[a] los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han visto» o «han contemplado». El verbo hebreo שֹׁרְרוּ es difícil, y algunos lo entienden en el sentido de ver más que de cantar.
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Ten presente
  lexicon: HALOT
  rationale: Imperativo masculino singular de זכר. En español, «recuerda» comunica de forma natural y solemne la exhortación directa, sin perder el tono imperativo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo que debe recordarse, no una causa. «Que» reproduce mejor la sintaxis subordinante en español.
- source_word: תַשְׂגִּיא
  english_pob_choice: you should magnify
  chosen_spanish: debes engrandecer
  alternatives_spanish:
  - debes magnificar
  - debes hacer grande
  - debes exaltar
  lexicon: HALOT
  rationale: El hiphil de שׂגא/שׂגה expresa hacer grande, engrandecer o magnificar. «Engrandecer» conserva la fuerza del verbo y suena natural en español bíblico actual.
- source_word: פָעֳלוֹ
  english_pob_choice: his work
  chosen_spanish: su obra
  alternatives_spanish:
  - su trabajo
  - su hecho
  - lo que ha hecho
  lexicon: HALOT
  rationale: פֹּעַל abarca obra, acción o actividad. «Su obra» mantiene amplitud semántica y es idiomático en español para las acciones de Dios.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: de la cual
  alternatives_spanish:
  - que
  - de lo cual
  lexicon: HALOT
  rationale: La relación relativa aquí es posesiva y partitiva respecto de «su obra». «De la cual» refleja con más precisión la construcción de la frase en español.
- source_word: שֹׁרְר֣וּ
  english_pob_choice: have sung
  chosen_spanish: han cantado
  alternatives_spanish:
  - han celebrado
  - han contemplado
  - han visto
  lexicon: HALOT
  rationale: La lectura principal sigue el sentido poético de cantar o celebrar en canto. Se conserva la alternativa de ver/contemplar porque el hebreo es difícil y la POB inglesa la documenta.
- source_word: אֲנָשִׁים
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los mortales
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino plural. Se conserva «los hombres» para respetar la forma del original y la fuerza representativa del plural humano.
theological_decisions:
- issue: Referencia del sufijo de tercera persona masculina singular en «su obra»
  english_pob_reading: God's work
  chosen_spanish_reading: la obra de Dios
  alternative_spanish_readings:
  - su obra (con referente implícito)
  - la obra de él
  rationale: El contexto habla de Dios en la exhortación de Eliú. En español se mantiene el posesivo «su» en el texto, pero la decisión interpretativa queda anclada en Dios como referente.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de שֹׁרְר֣וּ en la cláusula relativa
  english_pob_reading: have sung, with note that some take it as have beheld/contemplated
  chosen_spanish_reading: han cantado, con nota sobre «han visto/han contemplado»
  alternative_spanish_readings:
  - han visto
  - han contemplado
  - han celebrado en canto
  rationale: 'La traducción principal sigue la lectura poética tradicional, pero se preserva la tensión lexical documentada por la POB: el verbo es difícil y algunos intérpretes lo conectan con la visión o contemplación.'
  doctrine_reference: Translation philosophy §2, §3
- issue: Valor representativo de אֲנָשִׁים
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - la humanidad
  rationale: Se conserva el masculino plural del hebreo. Aunque el referente es representativo, no se neutraliza sin necesidad porque el texto fuente usa una forma masculina explícita.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió «magnify» sobre «exalt» y ajustó la relación relativa a «of which». En español, «engrandecer» reproduce mejor esa opción revisada que un calco de «exaltar», y «de la cual» refleja la relación preposicional de manera natural.
  spanish_consistency_notes:
  - Se conserva el posesivo singular «su» para el referente divino implícito, sin sustituirlo por una glosa en el texto principal.
  - Se mantiene «los hombres» para el plural masculino hebreo, en coherencia con la preferencia por precisión de género cuando el original la usa explícitamente.
  - La nota al pie recoge la ambigüedad léxica de שֹׁרְר֣וּ sin eliminar la lectura principal de «han cantado».
  - El registro es bíblico-formal, pero con sintaxis española fluida y publicación-readable.
