  english_pob_choice: for all the joy with which we rejoice because of you
  chosen_korean: 여러분으로 인하여 누리는 모든 기쁨에 대하여
  alternatives_korean:
  - 여러분 때문에 기뻐하는 모든 기쁨에 대하여
