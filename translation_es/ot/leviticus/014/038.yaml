  to: Entonces el sacerdote saldrá de la casa hasta la entrada de la casa y cerrará la casa por siete días[a].
  rationale: Se ajusta אֶל פֶּתַח הַבָּיִת a «hasta la entrada de la casa» para expresar mejor el movimiento al punto de acceso, se aligera la puntuación, y se corrige la nota para que preserve una alternativa léxica real y el matiz procedimental del hebreo.
