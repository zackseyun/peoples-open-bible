translation:
  language: es
  text: para expulsar de delante de ti[a] a todos tus enemigos, como Yahvé ha hablado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de delante de ti», un modismo para quitar a los enemigos del camino o de la esfera de acción de alguien.'
    reason: cultural_note
  - marker: b
    text: 'O: «ha hablado»; el verbo hebreo es literalmente «habló», con el sentido de una palabra divina previa que permanece en vigor.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לַהֲדֹף
  english_pob_choice: to drive out
  chosen_spanish: expulsar
  alternatives_spanish:
  - arrojar
  - hacer salir
  - rechazar
  lexicon: HALOT
  rationale: 'El infinitivo con ל expresa propósito: una acción orientada a remover a los enemigos. En español, «expulsar» comunica bien la idea de sacar a alguien fuera de un lugar o posición, con fuerza suficiente para el contexto militar, sin sonar tan literal o pesado como un calco de «empujar».'
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno de
  - la totalidad de
  lexicon: HALOT
  rationale: El plural con valor totalizante se expresa naturalmente con «todos», conservando la amplitud del hebreo.
- source_word: אֹיְבֶיךָ
  english_pob_choice: your enemies
  chosen_spanish: tus enemigos
  alternatives_spanish:
  - los que te son hostiles
  - quienes se te oponen
  lexicon: HALOT
  rationale: «Tus enemigos» es la equivalencia directa y natural para אויב con sufijo de segunda persona singular, preservando la referencia personal a Israel.
- source_word: מִפָּנֶיךָ
  english_pob_choice: from before you
  chosen_spanish: de delante de ti
  alternatives_spanish:
  - de tu presencia
  - delante de ti
  lexicon: HALOT
  rationale: La frase hebrea es un modismo de alejamiento de la ruta o esfera de alguien. «De delante de ti» mantiene ese matiz idiomático y resulta más transparente en español que «de tu presencia».
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - según como
  - tal como
  lexicon: HALOT
  rationale: Introduce correspondencia con la palabra divina previa; «como» es natural y fiel en español.
- source_word: דִּבֶּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - habló
  - ha dicho
  lexicon: HALOT
  rationale: El verbo hebreo literalmente significa «hablar». En español, «ha hablado» conserva el valor de palabra pronunciada con vigencia continua, sin convertirlo en una paráfrasis como «ha prometido».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
  rationale: Se adopta la forma española establecida en los criterios del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre propio divino y evita la sustitución por un título genérico.
theological_decisions:
- issue: El nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Nombre divino, no un título. En español se mantiene como «Yahvé» para reflejar el nombre propio revelado y conservar la transparencia textual del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
- issue: Valor aspectual de דִּבֶּר en contexto de pacto
  english_pob_reading: has spoken
  chosen_spanish_reading: ha hablado
  alternative_spanish_readings:
  - habló
  - ha dicho
  rationale: El perfecto hebreo remite a una palabra previa de Yahvé que sigue teniendo fuerza. «Ha hablado» conserva el hecho de la declaración divina y su vigencia sin intensificar indebidamente el verbo hacia «prometió».
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo consonante/vocalizado del pasaje y se mantuvo la correspondencia con la auditoría inglesa: el infinitivo de propósito, el totalizador כָּל, el modismo מִפָּנֶיךָ, el valor de דִּבֶּר y la transliteración del Nombre divino. No hubo revisiones posteriores que alteraran el sentido base del versículo.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico digno y moderno, sin arcaísmos innecesarios.
  - Se evitó «SEÑOR» para יהוה conforme a la pauta del proyecto.
  - «Ha hablado» preserva el vínculo entre palabra pronunciada y vigencia de esa palabra en el pacto.
  - La frase posicional «de delante de ti» conserva el modismo hebreo sin volverlo opaco.
