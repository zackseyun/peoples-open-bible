translation:
  language: es
  text: 'Así hicieron los hijos de Israel conforme a todo lo que Yahvé había mandado a Moisés: así acamparon por sus estandartes[a][b], y así partieron, cada uno por sus clanes, según la casa de sus padres[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El hebreo dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «bajo sus banderas».
    reason: lexical_alternative
  - marker: c
    text: O «según su casa ancestral».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - cumplieron
  lexicon: HALOT
  rationale: El hebreo resume la obediencia de Israel con un verbo general de acción. En español, «hicieron» reproduce con naturalidad ese valor sintético sin añadir matiz interpretativo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se conserva la forma literal y transparente del hebreo. «Israelitas» sería posible, pero borra la formulación fuente que el auditable inglés también preserva.
- source_word: כְּכֹל אֲשֶׁר
  english_pob_choice: according to all that
  chosen_spanish: conforme a todo lo que
  alternatives_spanish:
  - según todo lo que
  - tal como
  lexicon: HALOT
  rationale: La construcción expresa correspondencia completa con lo mandado. «Conforme a todo lo que» mantiene esa integralidad en un español natural.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrama: «Yahvé». La forma no se enmascara como «SEÑOR» y conserva la identidad del nombre pactal.'
- source_word: צִוָּה ... אֶת מֹשֶׁה
  english_pob_choice: had commanded Moses
  chosen_spanish: había mandado a Moisés
  alternatives_spanish:
  - había ordenado a Moisés
  - mandó a Moisés
  lexicon: HALOT
  rationale: «Mandado» expresa el mandato divino sin sobreformalizarlo. El pluscuamperfecto en español refleja correctamente la anterioridad respecto de la acción de Israel.
- source_word: כֵּן ... וְכֵן
  english_pob_choice: so ... and so
  chosen_spanish: así ... y así
  alternatives_spanish:
  - de ese modo ... y de ese modo
  - entonces ... y entonces
  lexicon: HALOT
  rationale: La repetición de «así» conserva la correlación enfática entre mandato y cumplimiento, como en el hebreo y en el inglés auditado.
- source_word: חָנוּ
  english_pob_choice: camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - acamparon allí
  - se instalaron en campamento
  lexicon: HALOT
  rationale: «Acamparon» es la equivalencia directa y clara para el contexto militar/campamental del pasaje.
- source_word: לְדִגְלֵיהֶם
  english_pob_choice: by their standards
  chosen_spanish: por sus estandartes
  alternatives_spanish:
  - bajo sus banderas
  - según sus estandartes
  lexicon: HALOT
  rationale: «Estandartes» preserva el sentido organizativo de דגל en el contexto tribal. «Por» refleja adecuadamente el hebreo preposicional sin convertirlo en un simple adjunto locativo.
- source_word: נָסָעוּ
  english_pob_choice: set out
  chosen_spanish: partieron
  alternatives_spanish:
  - salieron
  - se pusieron en marcha
  lexicon: HALOT
  rationale: «Partieron» expresa el inicio del desplazamiento de forma fluida y sobria, adecuada al paralelismo con «acamparon».
- source_word: אִישׁ
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada persona
  lexicon: HALOT
  rationale: El valor distributivo es lo principal aquí. «Cada uno» evita introducir un masculino explícito innecesario y respeta la función sintáctica del hebreo.
- source_word: לְמִשְׁפְּחֹתָיו
  english_pob_choice: by his clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En contexto censal y tribal, מִשְׁפָּחָה funciona a nivel de clan. «Clanes» recoge esa estructura mejor que «familias» en español.
- source_word: עַל בֵּית אֲבֹתָיו
  english_pob_choice: according to his fathers’ house
  chosen_spanish: según la casa de sus padres
  alternatives_spanish:
  - según su casa paterna
  - conforme a la casa de sus padres
  lexicon: HALOT
  rationale: La expresión conserva el paralelismo social-ancestral del hebreo. «Casa de sus padres» es clara y fiel; «casa paterna» sería más compacta, pero menos transparente.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrama. La política del proyecto exige mantener el nombre divino de manera visible en español, y «Yahvé» es la forma adoptada para la publicación.
  doctrine_reference: 'DOCTRINE.md: contested terms, YHWH / divine name'
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantiene en alta concordancia con la fuente: preserva la secuencia mandato→cumplimiento, el paralelismo «so ... and so», y las tres unidades sociales del versículo (estandartes, clanes, casa de padres). La draft española sigue esa misma estructura y refleja las alternativas léxicas documentadas sin introducir interpretación nueva.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se conserva la distinción entre «hijos de Israel» y la alternativa eclesial más general «israelitas», indicada solo en nota.
  - «Estandartes», «clanes» y «casa de sus padres» reproducen el orden social del texto, evitando nivelarlos en un solo término genérico.
  - La repetición de «así» corresponde al énfasis hebreo de כֵּן ... וְכֵן y al inglés auditado «so ... and so».
