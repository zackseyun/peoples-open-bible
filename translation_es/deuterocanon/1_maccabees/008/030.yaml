translation:
  language: es
  text: Pero si, después de estos términos, estos y aquellos deciden añadir o quitar algo, lo harán por su propia elección[a], y todo lo que añadan o quiten será válido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la una parte y a la otra»; el griego repite los demostrativos para referirse a ambos lados del acuerdo.
    reason: lexical_alternative
  - marker: b
    text: «Válido» también puede entenderse como «vinculante» o «en vigor» en este contexto legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγους
  english_pob_choice: terms
  chosen_spanish: términos
  alternatives_spanish:
  - palabras
  - cláusulas
  - artículos
  lexicon: LSJ
  rationale: En un contexto de tratado o pacto, λόγοι no alude solo a palabras dichas, sino a disposiciones formales. «Términos» conserva ese matiz jurídico y suena natural en español.
- source_word: βουλεύσωνται
  english_pob_choice: decide
  chosen_spanish: decidan
  alternatives_spanish:
  - deliberen
  - resuelvan
  - tomen consejo
  lexicon: LSJ
  rationale: El verbo expresa deliberar o formarse una decisión. En esta condición legal, «decidan» transmite el resultado de esa deliberación sin sobrerinterpretar.
- source_word: οὗτοι καὶ οὗτοι
  english_pob_choice: these and those
  chosen_spanish: estos y aquellos
  alternatives_spanish:
  - la una parte y la otra
  - estos y éstos
  lexicon: LSJ
  rationale: La repetición de demostrativos señala a las dos partes del acuerdo. «Estos y aquellos» preserva la referencia bilateral de modo literal y claro.
- source_word: προσθεῖναι ἢ ἀφελεῖν
  english_pob_choice: to add or to remove
  chosen_spanish: añadir o quitar
  alternatives_spanish:
  - agregar o retirar
  - añadir o sustraer
  - añadir o tomar
  lexicon: LSJ
  rationale: La pareja verbal expresa modificar los términos del pacto. «Añadir o quitar» es fiel, natural en español y mantiene el paralelismo.
- source_word: ἐξ αἱρέσεως αὐτῶν
  english_pob_choice: by their own choice
  chosen_spanish: por su propia elección
  alternatives_spanish:
  - a su arbitrio
  - por su propia decisión
  - de su propia voluntad
  lexicon: LSJ
  rationale: αἵρεσις aquí significa elección o decisión, no una secta. «Por su propia elección» conserva el sentido causal y el matiz de iniciativa propia.
- source_word: κύρια
  english_pob_choice: valid
  chosen_spanish: válido
  alternatives_spanish:
  - vinculante
  - con fuerza legal
  - en vigor
  lexicon: LSJ
  rationale: En lenguaje jurídico, κύρια indica que lo acordado tiene validez/eficacia. «Válido» es conciso y apto para un pacto; las otras opciones también serían posibles según el énfasis.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete y coincide con el audit trail inglés en los puntos legales clave: λόγοι como «términos», βουλεύσωνται como decisión deliberada, el doble demostrativo como referencia a ambas partes, y κύρια como validez jurídica. Se adoptó una formulación española natural, evitando un calco innecesario.'
  spanish_consistency_notes:
  - Se mantuvo el registro jurídico del pasaje, adecuado para un texto de tratado.
  - «Estos y aquellos» conserva la bilateralidad del griego sin expandir indebidamente el referente.
  - La elección de «válido» deja abierta la lectura alternativa «vinculante/en vigor», como en el inglés POB.
