translation:
  language: es
  text: Ahora, convóquenme a todos los profetas de Baal[a], a todos sus adoradores, y a todos sus sacerdotes; que no falte ningún hombre, porque tengo un gran sacrificio para Baal. Todo el que falte no vivirá. Pero Jehú lo hizo con engaño[b], para destruir a los adoradores de Baal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «que no falte nadie». El hebreo dice literalmente «que no falte un hombre», usando una forma singular masculina de manera genérica.
    reason: lexical_alternative
  - marker: b
    text: O, «con astucia» / «por medio de engaño».
    reason: lexical_alternative
lexical_decisions:
- source_word: נְבִיאֵי הַבַּעַל
  english_pob_choice: the prophets of Baal
  chosen_spanish: los profetas de Baal
  alternatives_spanish:
  - los profetas de Baal
  lexicon: HALOT
  rationale: La cadena constructa identifica a los profetas asociados con Baal; en español, «los profetas de Baal» es natural y conserva la referencia cultual sin suavizarla.
- source_word: עֹבְדָיו
  english_pob_choice: his worshipers
  chosen_spanish: sus adoradores
  alternatives_spanish:
  - sus servidores
  - los que le sirven
  lexicon: HALOT
  rationale: El sustantivo deriva de עבד en contexto religioso. «Adoradores» comunica mejor la pertenencia devocional al culto de Baal que «siervos», que sería más ambiguo en español.
- source_word: כֹּהֲנָיו
  english_pob_choice: his priests
  chosen_spanish: sus sacerdotes
  alternatives_spanish:
  - sus sacerdotes
  lexicon: HALOT
  rationale: Es el término cultual normal para los funcionarios religiosos; «sacerdotes» es la equivalencia directa y transparente en español.
- source_word: קִרְאוּ אֵלַי
  english_pob_choice: summon to me
  chosen_spanish: convóquenme
  alternatives_spanish:
  - llámenme
  - reúnanme
  lexicon: HALOT
  rationale: El imperativo plural con אֶל indica llamar o reunir a personas en presencia de Jehú. «Convóquenme» refleja mejor el tono de orden oficial que «llámenme».
- source_word: אִישׁ אַל יִפָּקֵד
  english_pob_choice: let no man be missing
  chosen_spanish: que no falte ningún hombre
  alternatives_spanish:
  - que no falte nadie
  - que ningún hombre esté ausente
  lexicon: HALOT
  rationale: פָּקַד en este pasaje tiene el sentido de faltar o estar ausente en un recuento. Se conserva el singular masculino genérico con «ningún hombre» para reflejar la forma hebrea sin volverla rígida o antinatural.
- source_word: זֶבַח גָּדוֹל
  english_pob_choice: a great sacrifice
  chosen_spanish: un gran sacrificio
  alternatives_spanish:
  - un gran sacrificio
  - un sacrificio grande
  lexicon: HALOT
  rationale: זבח designa un sacrificio/holocausto ritual; «gran sacrificio» mantiene la sencillez y el valor cultual sin precisar más de lo que el hebreo dice.
- source_word: כֹּל אֲשֶׁר יִפָּקֵד לֹא יִחְיֶה
  english_pob_choice: Whoever is missing shall not live
  chosen_spanish: Todo el que falte no vivirá
  alternatives_spanish:
  - Quien falte no vivirá
  - Todo el que esté ausente morirá
  lexicon: HALOT
  rationale: Se preserva la misma raíz con el sentido de faltar/estar ausente y la amenaza tajante de לֹא יִחְיֶה. «No vivirá» sigue de cerca el hebreo y mantiene la dureza de la advertencia.
- source_word: בְעָקְבָּה
  english_pob_choice: in deceit
  chosen_spanish: con engaño
  alternatives_spanish:
  - con astucia
  - por medio de engaño
  - con dolo
  lexicon: HALOT
  rationale: El sustantivo señala engaño o traición. «Con engaño» es claro en español y conserva la evaluación narrativa sin intentar justificar a Jehú.
- source_word: לְמַעַן הַאֲבִיד
  english_pob_choice: in order to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para exterminar
  - con el fin de destruir
  - para aniquilar
  lexicon: HALOT
  rationale: La cláusula de propósito con הַאֲבִיד expresa el objetivo de destruir. «Para destruir» es suficiente y fiel, sin introducir un matiz técnico que el hebreo no exige.
- source_word: עֹבְדֵי הַבָּעַל
  english_pob_choice: the worshipers of Baal
  chosen_spanish: a los adoradores de Baal
  alternatives_spanish:
  - a los servidores de Baal
  - a los que servían a Baal
  lexicon: HALOT
  rationale: 'Se mantiene la misma opción semántica que antes en el versículo para dar cohesión: quienes están en servicio religioso a Baal son «adoradores».'
theological_decisions:
- issue: Evaluación narrativa de la conducta de Jehú
  english_pob_reading: But Jehu did it in deceit
  chosen_spanish_reading: Pero Jehú lo hizo con engaño
  alternative_spanish_readings:
  - Pero Jehú lo hizo con astucia
  - Jehú lo hizo por medio de engaño
  rationale: La narración hebrea marca explícitamente la estratagema como engaño. Se conserva esa tensión moral sin atenuarla ni convertirla en una simple táctica neutra.
  doctrine_reference: Preservar la tensión teológica y narrativa del texto
- issue: Uso del singular masculino genérico en la advertencia
  english_pob_reading: let no man be missing
  chosen_spanish_reading: que no falte ningún hombre
  alternative_spanish_readings:
  - que no falte nadie
  - que ningún hombre esté ausente
  rationale: El hebreo usa אִישׁ en singular para cada individuo del grupo; en español se refleja con «ningún hombre» para mantener la forma del original, aunque existe una alternativa inclusiva posible.
  doctrine_reference: Precisión de forma frente a neutralización del género gramatical
translation_notes:
  revision_awareness: El inglés POB pasó de «let not a man be missing» a «let no man be missing» por naturalidad estilística, sin cambiar el sentido. La versión española adopta una formulación igualmente natural («que no falte ningún hombre») y conserva la evaluación narrativa de «in deceit» como «con engaño» para no suavizar la intención del relato.
  spanish_consistency_notes:
  - Se mantiene «Baal» sin transliteración alternativa para concordar con el audit trail inglés y la práctica del proyecto.
  - Se usa «adoradores» de manera consistente para עֹבְדֵי/עֹבְדָיו en este versículo, por el contexto cultual.
  - Se conserva el singular masculino genérico donde el hebreo lo emplea, y se explica en nota para evitar pérdida de información formal.
