translation:
  language: es
  text: Y cuando Judas supo estas cosas, mandó a la multitud invocar al Señor día y noche, para que, así como en otros tiempos, ahora también viniera en su ayuda.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μεταλαβὼν
  english_pob_choice: when Judas learned
  chosen_spanish: cuando Judas supo
  alternatives_spanish:
  - cuando Judas se enteró
  - cuando Judas recibió noticia de esto
  - cuando Judas entendió estas cosas
  lexicon: LSJ
  rationale: El participio comunica que Judas recibió la información y reaccionó a ella. «Supo» expresa ese acceso a la noticia de forma natural en español sin perder el valor contextual de información recibida.
- source_word: παρήγγειλεν
  english_pob_choice: he ordered
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio instrucciones a
  - mandó decir a
  lexicon: LSJ
  rationale: «Mandó» conserva la fuerza directiva del verbo griego y suena bien en registro narrativo bíblico. «Ordenó» sería posible, pero «mandó» resulta más fluido en español.
- source_word: τῷ πλήθει
  english_pob_choice: the multitude
  chosen_spanish: a la multitud
  alternatives_spanish:
  - al pueblo reunido
  - a la asamblea
  - a la gente
  lexicon: LSJ
  rationale: Se preserva el sentido colectivo y elevado de πλήθος. «Multitud» mantiene la referencia al cuerpo reunido bajo Judas sin reducirlo a un simple grupo informal.
- source_word: διʼ ἡμέρας καὶ νυκτός
  english_pob_choice: day and night
  chosen_spanish: de día y de noche
  alternatives_spanish:
  - día y noche
  - durante el día y la noche
  - sin cesar
  lexicon: LSJ
  rationale: La expresión española reproduce la idiomática idea de continuidad constante. «De día y de noche» es natural y refleja el paralelismo del griego.
- source_word: ἐπικαλεῖσθαι τὸν κύριον
  english_pob_choice: to call upon the Lord
  chosen_spanish: invocaran al Señor
  alternatives_spanish:
  - clamaran al Señor
  - llamaran al Señor
  - acudieran al Señor en oración
  lexicon: LSJ
  rationale: «Invocar» expresa el llamado orante y solemne del verbo en este contexto religioso. Se eligió «Señor» aquí porque el audit trail inglés ya entiende κύριος como título divino en una oración a Dios.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor Dios
  - Dueño
  - Maestro
  lexicon: LSJ
  rationale: Aunque el proyecto suele usar «Yahvé» para יהוה, aquí el texto griego dice κύριον en una fórmula de súplica. «Señor» preserva el eco bíblico y la dirección de la oración sin imponer una máscara distinta al griego.
- source_word: εἴ ποτε καὶ ἄλλοτε, καὶ νῦν
  english_pob_choice: that, as at other times, so now also
  chosen_spanish: así como en otros tiempos, ahora también
  alternatives_spanish:
  - si alguna vez también antes, ahora también
  - como en otras ocasiones, también ahora
  - tal como antes, también ahora
  lexicon: LSJ
  rationale: La construcción compara la ayuda pasada con la petición presente. La frase elegida mantiene esa continuidad histórica y evita una traducción demasiado literal que sonaría extraña en español.
- source_word: ἐπιβοηθεῖν
  english_pob_choice: he might come to their aid
  chosen_spanish: viniera en su ayuda
  alternatives_spanish:
  - les ayudara
  - acudiera en su auxilio
  - les prestara ayuda
  lexicon: LSJ
  rationale: «Venir en su ayuda» expresa bien la intervención favorable solicitada. «Viniera» conserva el matiz de petición en subjuntivo y el alcance colectivo de la ayuda.
theological_decisions:
- issue: Modo de referirse a κύριος en una oración comunitaria
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - Señor Dios
  - el Señor
  rationale: El pasaje presenta una súplica directa a Dios. Como el griego usa κύριος y no el tetragrámaton, la forma más fiel al source audit trail es «Señor», que mantiene la fuerza devocional y la referencia teológica sin añadir una identificación que el texto aquí no explicita.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: Corregido para eliminar el marcador de nota no anclado. La traducción mantiene el sentido del texto griego y la alineación con la decisión inglesa auditada, sin introducir notas sueltas ni marcadores huérfanos.
  spanish_consistency_notes:
  - Se conserva el registro narrativo bíblico con verbos como «supo», «mandó» e «invocaran».
  - Se evita la calca de «llamar sobre» y se usa una construcción idiomática española para ἐπικαλεῖσθαι.
  - No se introduce «Yahvé» porque el griego aquí usa κύριον en una oración, y el audit trail inglés ya optó por «Lord/Señor».
