base_translation:
  language: en
  yaml_path: translation/ot/leviticus/026/001.yaml
  text: You shall not make idols for yourselves[a], and you shall not set up for yourselves a carved image or a standing stone, and you shall not place a figured stone in your land to bow down to it[b], for I am Yahweh your God.
  footnotes:
  - marker: a
    text: 'Or ''carved stone'' or ''stone image'' for ''figured stone'' (Hebrew: אֶבֶן מַשְׂכִּית). The exact nuance is debated, but it refers to a stone object associated with forbidden worship.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'YHWH'; traditionally rendered 'the LORD.'
    reason: alternative_reading
