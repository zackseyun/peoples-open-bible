translation:
  language: es
  text: Cuando Samuel se volvió para irse[a], agarró el borde de su manto, y se rasgó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la esquina de su manto» o «el extremo de su manto». El hebreo puede designar una extremidad de una prenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסֹּב
  english_pob_choice: turned
  chosen_spanish: se volvía
  alternatives_spanish:
  - se giró
  - se dio la vuelta
  lexicon: HALOT
  rationale: El hebreo expresa el giro de Samuel en preparación para marcharse. «Se volvía» mantiene ese movimiento en curso y suena natural en español narrativo; además armoniza con el infinitivo siguiente «para irse».
- source_word: לָלֶכֶת
  english_pob_choice: to go
  chosen_spanish: para irse
  alternatives_spanish:
  - para partir
  - para salir
  lexicon: HALOT
  rationale: El infinitivo hebreo, después de «se volvía», indica intención de marcharse. «Para irse» conserva la sencillez del original y comunica bien la idea de salida sin sobrecargarla.
- source_word: וַיַּחֲזֵק
  english_pob_choice: he seized
  chosen_spanish: le asió
  alternatives_spanish:
  - le agarró
  - tomó fuertemente
  lexicon: HALOT
  rationale: חזק en esta forma transmite un sujetar firme y súbito. «Le asió» preserva la fuerza del gesto y permite ligar naturalmente el objeto directo implícito con el borde de la prenda.
- source_word: בִּכְנַף
  english_pob_choice: the edge of
  chosen_spanish: el borde de
  alternatives_spanish:
  - la esquina de
  - el extremo de
  lexicon: HALOT
  rationale: כָּנָף puede referirse al extremo o ala de una prenda. «El borde de» es la opción más idiomática en español y mantiene abierta la amplitud semántica del término mejor que una concretización excesiva.
- source_word: מְעִילוֹ
  english_pob_choice: his robe
  chosen_spanish: su manto
  alternatives_spanish:
  - su ropa exterior
  - su capa
  lexicon: HALOT
  rationale: מְעִיל designa una vestidura exterior, algo más cercano a «manto» que a «túnica». «Manto» conserva la dignidad del registro bíblico en español y evita reducirlo indebidamente a una prenda moderna específica.
- source_word: וַיִּקָּרַע
  english_pob_choice: and it tore
  chosen_spanish: y se rasgó
  alternatives_spanish:
  - y se rompió
  - y quedó rasgado
  lexicon: HALOT
  rationale: 'La forma nifal es intransitiva/pasiva: la prenda se desgarra. «Se rasgó» refleja bien el acontecimiento sin añadir un agente y corresponde al uso natural del español para una tela que se desgarra.'
translation_notes:
  revision_awareness: El texto inglés auditado se mantuvo sin cambios en la última revisión. La presente propuesta sigue su lectura principal y conserva la ambigüedad lexical de כָּנָף mediante una nota alternativa en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando corresponde, pero este versículo no contiene el nombre divino.
  - «Manto» se eligió por el valor de vestidura exterior de מְעִיל y por coherencia con el registro bíblico en español.
  - Se preserva la intransitividad del último verbo con «se rasgó», evitando introducir un sujeto ajeno al hebreo.
