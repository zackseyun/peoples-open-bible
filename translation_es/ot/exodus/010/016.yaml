translation:
  language: es
  text: 'Entonces el faraón se apresuró a llamar a Moisés y a Aarón, y dijo: «He pecado contra Yahvé, el Dios de ustedes, y contra ustedes».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְמַהֵר
  english_pob_choice: hurried
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - apuró su paso
  lexicon: HALOT
  rationale: El verbo מהר expresa prisa o acción acelerada. «Se apresuró» conserva la urgencia narrativa en un español natural y digno, sin volver la frase arcaica.
- source_word: לִקְרֹא
  english_pob_choice: to call for
  chosen_spanish: a llamar
  alternatives_spanish:
  - a convocar
  - a mandar llamar
  lexicon: HALOT
  rationale: En este contexto Faraón solicita urgentemente la presencia de Moisés y Aarón. «A llamar» comunica la idea central de pedir que vengan, sin añadir matices más fuertes como «convocar».
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: el faraón
  alternatives_spanish:
  - Faraón
  lexicon: uso histórico-bíblico
  rationale: En español bíblico, «el faraón» es claro y natural como título real. Se conserva el referente tradicional sin cambiar el sentido.
- source_word: לְמֹשֶׁה וּלְאַהֲרֹן
  english_pob_choice: for Moses and Aaron
  chosen_spanish: a Moisés y a Aarón
  alternatives_spanish:
  - para Moisés y Aarón
  lexicon: uso sintáctico del español
  rationale: El hebreo marca los nombres como objeto del llamado. En español, «a» expresa de manera natural la persona llamada, manteniendo la relación verbal sin forzar un calco.
- source_word: וַיֹּאמֶר
  english_pob_choice: and he said
  chosen_spanish: y dijo
  alternatives_spanish:
  - y les dijo
  lexicon: HALOT
  rationale: Es una fórmula narrativa estándar. «Y dijo» reproduce con sencillez la introducción del discurso directo; se evita añadir «les» porque el hebreo no lo expresa de forma explícita.
- source_word: חָטָאתִי
  english_pob_choice: I have sinned
  chosen_spanish: He pecado
  alternatives_spanish:
  - He cometido pecado
  - He obrado mal
  lexicon: HALOT
  rationale: חטא significa «pecar». «He pecado» mantiene la fuerza moral y confesional del original mejor que equivalentes más débiles como «he obrado mal».
- source_word: לַיהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - ante Yahvé
  - para con Yahvé
  lexicon: DOCTRINE.md Contested terms — יְהוָה YHWH → Yahweh
  rationale: Se conserva el nombre divino como «Yahvé» según el estándar del proyecto. Con חטא, la preposición ל se entiende idiomáticamente como ofensa dirigida «contra» la persona ofendida.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural se traduce de manera natural como «su» en el español de respeto/plural de ustedes. Se preserva que Faraón reconoce al Dios de ellos, no al suyo propio.
- source_word: וְלָכֶם
  english_pob_choice: and against you
  chosen_spanish: y contra ustedes
  alternatives_spanish:
  - y a ustedes
  - y para con ustedes
  lexicon: HALOT
  rationale: La misma lógica de ל con חטא requiere expresar ofensa dirigida a las personas. «Contra ustedes» es la correspondencia idiomática más clara para el plural de Moisés y Aarón.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo el estándar del proyecto, se conserva el nombre propio del pacto como «Yahvé», en lugar de sustituirlo por una máscara tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Confesión de Faraón con חטא + ל
  english_pob_reading: I have sinned against Yahweh your God and against you
  chosen_spanish_reading: He pecado contra Yahvé, su Dios, y contra ustedes
  alternative_spanish_readings:
  - He pecado ante Yahvé, su Dios, y ante ustedes
  - He pecado para con Yahvé, su Dios, y para con ustedes
  rationale: La preposición hebrea אחרי/ל en este contexto marca al ofendido. En español, «contra» expresa mejor la idea de pecado cometido contra una parte ofendida, sin suavizar la confesión.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve source meaning without paraphrase'
- issue: Relación entre «su Dios» y el discurso de Faraón
  english_pob_reading: your God
  chosen_spanish_reading: su Dios
  alternative_spanish_readings:
  - el Dios de ustedes
  - vuestro Dios
  rationale: El hebreo señala posesión de segunda persona plural. «Su Dios» refleja el registro neutro y ampliamente bíblico del español latinoamericano, manteniendo la referencia a Israel sin apropiación por parte de Faraón.
  doctrine_reference: 'Exodus 10:16 Hebrew construct + suffix: אֱלֹהֵיכֶם'
translation_notes:
  revision_awareness: 'El borrador sigue el texto hebreo WLC y el audit trail inglés sin copiar mecánicamente su formulación. Se respetan las decisiones clave ya estabilizadas: el Tetragrámaton como Yahvé/Yahvé en español y חטא con el matiz de pecado/ofensa personal en un español idiomático.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se usa «faraón» en minúscula por tratarse de un título común en español, salvo que el sistema editorial requiera capitalización por estilo propio.
  - Se mantiene «Moisés» y «Aarón» con acentos normativos del español.
  - Se evita la formulación tradicional «contra el SEÑOR» porque el proyecto exige transparencia con el nombre divino.
  - No se introducen notas al pie porque el verso no presenta una variante textual o ambigüedad que requiera anclaje explícito en este borrador.
