base_translation:
  language: en
  yaml_path: translation/ot/leviticus/023/017.yaml
  text: From your dwellings you shall bring two loaves of bread for a wave offering[a]; they shall be of two-tenths of an ephah of fine flour, baked with leaven[b], as firstfruits to Yahweh.
  footnotes:
  - marker: a
    text: Hebrew 'two-tenths'; in priestly measurement this means two-tenths of an ephah.
    reason: cultural_note
  - marker: b
    text: Or 'baked as leavened bread.' The Hebrew explicitly notes that these firstfruits loaves are made with leaven.
    reason: lexical_alternative
