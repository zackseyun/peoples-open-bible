translation:
  language: es
  text: 'Y tenemos este mandamiento de parte de él: que el que ama a Dios ame también a su hermano[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su hermano o hermana»; el griego dice «su hermano», usando una forma masculina singular que puede funcionar de manera representativa para referirse a otro creyente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντολήν
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - orden
  - mandato
  lexicon: BDAG
  rationale: «Mandamiento» conserva el peso moral y autoritativo del término en el contexto joánico. «Orden» y «mandato» son posibles, pero «mandamiento» resulta más natural en español bíblico sin perder la fuerza normativa.
- source_word: ἀπ’ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de parte de él
  alternatives_spanish:
  - de él
  - de parte de Dios
  lexicon: BDAG
  rationale: El pronombre se mantiene sin repetir «Dios» para conservar el flujo discursivo del griego. «De parte de él» expresa con claridad procedencia/origen y suena natural en español.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: Aquí ἵνα introduce el contenido del mandamiento, no una finalidad fuerte. En español, «que» comunica bien esa función declarativa y evita sobrerrepresentar la relación final.
- source_word: ὁ ἀγαπῶν τὸν θεόν
  english_pob_choice: the one who loves God
  chosen_spanish: el que ama a Dios
  alternatives_spanish:
  - quien ama a Dios
  - el que le ama a Dios
  lexicon: BDAG
  rationale: La construcción con participio articular se vierte de forma representativa y natural con «el que». Se conserva el verbo «ama» para mantener la coherencia léxica del grupo ἀγαπάω/ἀγαπᾷ.
- source_word: ἀγαπᾷ
  english_pob_choice: should also love
  chosen_spanish: ame también
  alternatives_spanish:
  - debe amar también
  - debería amar también
  lexicon: BDAG
  rationale: El subjuntivo después de ἵνα en español se expresa naturalmente con «ame». La idea de obligación queda implícita en el mandamiento, sin forzar un modal explícito que el griego no usa aquí.
- source_word: ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su hermano o hermana
  - su hermano[a]
  - su hermano de la fe
  lexicon: BDAG
  rationale: Se conserva la forma masculina singular del griego con «su hermano». El sentido comunitario e inclusivo se preserva en nota, sin neutralizar la forma fuente en el texto principal.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - además
  lexicon: BDAG
  rationale: El segundo καὶ tiene fuerza aditiva y se traduce naturalmente con «también» para marcar que el amor a Dios va acompañado por el amor al hermano.
- source_word: ἀγαπάω / ἀγαπῶν / ἀγαπᾷ
  english_pob_choice: love / loves
  chosen_spanish: amar / ama / ame
  lexicon: BDAG
  rationale: Se mantiene una correspondencia uniforme con el grupo ἀγαπάω mediante «amar/ama/ame», preservando la cohesión temática joánica y evitando variación innecesaria.
theological_decisions:
- issue: Referencia de ἀδελφὸν αὐτοῦ como masculino singular representativo
  english_pob_reading: Retain 'his brother' in the main text, with inclusive communal sense noted in a footnote.
  chosen_spanish_reading: Mantener «su hermano» en el texto principal y explicar en nota que el griego usa una forma masculina singular representativa que puede abarcar a un creyente o creyente en general.
  alternative_spanish_readings:
  - su hermano o hermana
  - su hermano de la fe
  - su semejante
  rationale: La forma griega es masculina singular y no debe neutralizarse en el cuerpo del texto sin razón textual. Dado que el contexto joánico apunta a la comunidad creyente, la amplitud inclusiva se preserva en la nota, no sustituyendo la forma fuente.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: El texto español sigue la última revisión inglesa sin cambios sustanciales; se mantuvo la decisión de conservar la forma masculina singular en la expresión referida al hermano, con nota inclusiva. Se evitó traducir mecánicamente el inglés cuando el español requiere un giro natural para ἵνα y ἀπ’ αὐτοῦ.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεόν, conforme al contexto y al uso habitual de la serie POB.
  - Se conserva la familia léxica de ἀγαπάω con «amar/ama/ame» para reflejar la repetición del original.
  - «Mandamiento» se eligió por su fuerza normativa, coherente con el uso joánico de ἐντολή.
  - La nota al pie usa un único marcador y corresponde exactamente al ancla en «hermano[a]».
