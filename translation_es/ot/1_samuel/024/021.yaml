review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: transición discursiva, énfasis de certeza en מָלֹךְ תִּמְלֹךְ, y estabilidad del reino en וְקָמָה ... מַמְלֶכֶת יִשְׂרָאֵל. También preserva la metáfora de בְּיָדְךָ con nota aclaratoria. Sin embargo, hay un problema de anclaje de la nota: la nota [a] está puesta en «Y ahora», pero la nota explica «en tu mano», por lo que no cumple la disciplina de notas ni guía correctamente al lector.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «será establecido» suena menos natural con «reino» en español e introduce discordancia implícita con «reino» como masculino si no se ajusta la forma participial; además, «yo sé» y «tú reinarás» pueden aligerarse a «sé» y «reinarás» para mejor fluidez sin pérdida de sentido. «Mira» es aceptable para הִנֵּה en registro moderno.
  glossary_alignment: No hay términos del glosario mayor implicados aparte de formulaciones generales. La elección de «reinarás» para מָלֹךְ תִּמְלֹךְ y «reino de Israel» para מַמְלֶכֶת יִשְׂרָאֵל está alineada con la auditoría inglesa. «En tu mano» conserva correctamente el modismo con alternativa en nota.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «Y ahora» pero su contenido explica «en tu mano».
    rationale: La instrucción exige que cada nota aparezca anclada en la palabra o frase relevante del texto español. Tal como está, la nota induce a error y no cumple la disciplina editorial.
  - severity: medium
    issue: «será establecido» es menos natural que «quedará establecido» o «será afirmado» en español para un reino.
    rationale: Aunque semánticamente cercano, el futuro perifrástico con participio suena más rígido y menos idiomático; «quedará establecido» conserva bien la idea de estabilidad/afirmación del reino.
  - severity: low
    issue: Los pronombres explícitos «yo» y «tú» son innecesarios.
    rationale: El español natural normalmente omite estos pronombres salvo énfasis especial; aquí no son requeridos por el hebreo ni por la claridad.
  revised_spanish_text: Y ahora, mira, sé que reinarás ciertamente, y el reino de Israel quedará establecido en tu mano[a].
  revised_footnotes:
  - marker: a
    text: 'O: «bajo tu autoridad». El hebreo dice literalmente «en tu mano», un modismo para control o poder.'
    reason: lexical_alternative
  revision_rationale: Se reubica la nota en «tu mano» para corregir el anclaje y se mejora la naturalidad del español con «sé» y «quedará establecido», manteniendo intacto el sentido del hebreo y la justificación léxica documentada. No requiere adjudicación adicional.
