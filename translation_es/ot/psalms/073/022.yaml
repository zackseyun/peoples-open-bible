    issue: «no entendía» es más interpretativo que el hebreo básico ידע
    rationale: El source dice literalmente «no sabía/conocía», y el English POB mantuvo «did not know» precisamente para no sobreinterpretar. Como «insensato» ya comunica falta de discernimiento, repetirlo con «no entendía» añade interpretación innecesaria.
  revised_spanish_text: Entonces yo era insensato y no sabía; era como una bestia[a] delante de ti.
