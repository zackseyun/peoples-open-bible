translation:
  language: ko
  text: 우리는 항상 예수의 죽음을 우리 몸에 짊어지고 다닙니다. 이는 예수의 생명 또한 우리 몸에 나타나게 하려는 것입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: νέκρωσιν
  english_pob_choice: death
  chosen_korean: 죽음
  alternatives_korean:
  - 죽임의 흔적
  - 죽음의 과정
  lexicon: BDAG
  rationale: νέκρωσις는 단순 죽음(θάνατος)보다 「죽어 감의 과정·죽임 당함의 상태」를 가리킨다. 한국어 한 단어로 옮기기 어려워 「죽음」을 채택하되 진행성 함의를 「짊어지고 다니다」로 보강.
- source_word: περιφέροντες
  english_pob_choice: carrying
  chosen_korean: 짊어지고 다니다
  alternatives_korean:
  - 이리저리 지니다
  lexicon: BDAG
  rationale: περιφέρω는 「이곳저곳 가지고 다니다」.
