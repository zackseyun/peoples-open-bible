base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/022/006.yaml
  text: So he returned to Jezreel to recover[a], because of the wounds that they had inflicted on him at Ramah when he fought against Hazael king of Aram. And Azariah son of Jehoram, king of Judah, went down to see Jehoram son of Ahab in Jezreel[b], because he was sick.
  footnotes:
  - marker: a
    text: Azariah is the name written here in Chronicles; the same king is elsewhere called Ahaziah.
    reason: alternative_reading
  - marker: b
    text: Or 'to visit Jehoram.'
    reason: lexical_alternative
