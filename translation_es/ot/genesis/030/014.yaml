translation:
  language: es
  text: 'En los días de la cosecha del trigo, Rubén fue y encontró mandrágoras[a] en el campo; y las llevó a Lea, su madre. Entonces Raquel dijo a Lea: «Por favor, dame algunas de las mandrágoras de tu hijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «manzanas del amor»; el hebreo דּוּדָאִים designa una planta tradicionalmente identificada como mandrágora, asociada en la narración circundante con la fertilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּימֵי
  english_pob_choice: In the days of
  chosen_spanish: En los días de
  alternatives_spanish:
  - Durante
  - En tiempos de
  lexicon: HALOT
  rationale: La construcción temporal se conserva con una fórmula natural en español. «En los días de» refleja bien el hebreo y mantiene el tono narrativo del texto.
- source_word: קְצִיר חִטִּים
  english_pob_choice: the wheat harvest
  chosen_spanish: la cosecha del trigo
  alternatives_spanish:
  - la siega del trigo
  - la cosecha de trigo
  lexicon: HALOT
  rationale: «קְצִיר» apunta a la recolección/cosecha, y el complemento especifica trigo. «La cosecha del trigo» es claro y fiel; «siega» sería posible pero menos neutral en español moderno.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - anduvo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo se expresa de manera simple y natural con «fue», que conserva el avance de la acción sin añadir matices no exigidos.
- source_word: דּוּדָאִים
  english_pob_choice: mandrakes
  chosen_spanish: mandrágoras
  alternatives_spanish:
  - love-apples
  lexicon: HALOT
  rationale: La identificación tradicional en español es «mandrágoras». La alternativa botánica/tradicional queda preservada en la nota porque el término hebreo admite discusión y el contexto narrativo incluye su asociación con la fertilidad.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en la llanura
  lexicon: HALOT
  rationale: «שָׂדֶה» puede abarcar campo o terreno abierto. «En el campo» es idiomático y suficientemente preciso en español.
- source_word: וַיָּבֵא אֹתָם
  english_pob_choice: he brought them
  chosen_spanish: las llevó
  alternatives_spanish:
  - las trajo
  lexicon: HALOT
  rationale: El verbo hiphil de בוא aquí significa «traer/llevar» según el punto de referencia. Dado el movimiento hacia Lea, «las llevó» comunica la escena con naturalidad en español.
- source_word: אֶל לֵאָה אִמּוֹ
  english_pob_choice: to Leah his mother
  chosen_spanish: a Lea, su madre
  alternatives_spanish:
  - a su madre Lea
  - a Lea, la madre de él
  lexicon: HALOT
  rationale: Se conserva la relación de parentesco sin forzar el orden hebreo. La coma ayuda a evitar ambigüedad en español.
- source_word: תְּנִי נָא לִי
  english_pob_choice: Please give me
  chosen_spanish: Por favor, dame
  alternatives_spanish:
  - Dame, por favor
  - Te ruego que me des
  lexicon: HALOT
  rationale: La partícula de cortesía נָא se expresa de forma natural con «por favor». El imperativo en segunda persona singular mantiene el tono directo de Raquel.
- source_word: מִדּוּדָאֵי
  english_pob_choice: some of ... mandrakes
  chosen_spanish: algunas de las mandrágoras
  alternatives_spanish:
  - parte de las mandrágoras
  - algo de las mandrágoras
  lexicon: HALOT
  rationale: El prefijo partitivo מִן se traduce naturalmente como «algunas de». Se evita un «de» demasiado literal que sonaría menos idiomático en español.
- source_word: בְּנֵךְ
  english_pob_choice: your son’s
  chosen_spanish: de tu hijo
  alternatives_spanish:
  - de tu hijo varón
  - de tu hijo propio
  lexicon: HALOT
  rationale: El posesivo simple transmite correctamente la referencia a Rubén, hijo de Lea, sin sobrecargar el español.
translation_notes:
  revision_awareness: El texto español sigue de cerca la redacción auditada en inglés y el hebreo consonante/vocalizado, conservando la secuencia narrativa, el valor partitivo de מִן y la alternativa léxica tradicional para דּוּדָאִים en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo dice יהוה; este versículo no lo contiene.
  - Se mantiene «mandrágoras» como término principal y se preserva la alternativa tradicional en nota para no ocultar la ambigüedad léxica.
  - Se prefiere «en el campo» sobre «en la región abierta» por claridad y porque el contexto agrícola ya está marcado por «la cosecha del trigo».
