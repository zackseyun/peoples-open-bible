    issue: Marcadores de notas mal anclados
    rationale: La nota a explica εἰρηνικῶς, pero el marcador [a] está puesto en «Judas». La nota b explica ἐξαρπάσαι, pero el marcador [b] está puesto en «en paz». Esto incumple la disciplina requerida de anclar cada nota exactamente a la palabra o frase pertinente.
  - severity: medium
    issue: «Prender» suena menos natural y más regional/jurídico
    rationale: Aunque puede significar capturar, «prender a Judas» no es la opción más clara ni más ampliamente natural en español contemporáneo neutral. «Apoderarse de Judas» conserva mejor el matiz de captura repentina de ἐξαρπάσαι.
  - severity: low
