translation:
  language: es
  text: Y Simón reconoció que le hablaban con engaño; sin embargo, envió el dinero[a] y a los muchachos, no fuera a suscitar una gran hostilidad contra el pueblo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la plata'. El griego ἀργύριον puede denotar plata como metal o dinero/plata de pago.
    reason: lexical_alternative
  - marker: b
    text: O 'hacia el pueblo' o 'con el pueblo'. La frase griega πρὸς τὸν λαόν es relacionalmente flexible; aquí se traduce como hostilidad dirigida contra el pueblo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔγνω
  english_pob_choice: recognized
  chosen_spanish: reconoció
  alternatives_spanish:
  - supo
  - percibió
  - se dio cuenta
  lexicon: LSJ
  rationale: El aoristo de γινώσκω aquí expresa discernimiento de la intención oculta; «reconoció» comunica que Simón vio el engaño con claridad, no solo que poseía información.
- source_word: δόλῳ
  english_pob_choice: deceitfully
  chosen_spanish: con engaño
  alternatives_spanish:
  - engañosamente
  - con dolo
  - con astucia
  lexicon: LSJ
  rationale: 'El dativo expresa modo: hablaban ''con engaño''. «Con engaño» mantiene el matiz deliberado sin sonar artificial en español.'
- source_word: λαλοῦσιν πρὸς αὐτόν
  english_pob_choice: were speaking to him
  chosen_spanish: le hablaban
  alternatives_spanish:
  - le decían
  - estaban hablando con él
  lexicon: LSJ
  rationale: La construcción indica habla dirigida a Simón. «Le hablaban» es natural en español y conserva la idea de una acción en curso orientada a él.
- source_word: πέμπει
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: Aunque el griego usa presente histórico, en español narrativo fluido corresponde el pretérito perfecto simple «envió».
- source_word: τὸ ἀργύριον
  english_pob_choice: the money
  chosen_spanish: el dinero
  alternatives_spanish:
  - la plata
  - la plata en dinero
  lexicon: LSJ
  rationale: ἀργύριον puede ser plata o dinero/pago en plata. En este contexto de entrega, «el dinero» comunica con claridad el valor entregado sin forzar una referencia material.
- source_word: τὰ παιδάρια
  english_pob_choice: the boys
  chosen_spanish: a los muchachos
  alternatives_spanish:
  - a los jóvenes
  - a los muchachos varones
  - a los chicos
  lexicon: LSJ
  rationale: παιδάρια designa muchachos/jovencitos. «Muchachos» conserva el tono directo y evita sugerir niños muy pequeños; el artículo se ajusta al objeto directo humano con «a».
- source_word: μή ποτε
  english_pob_choice: lest
  chosen_spanish: para no
  alternatives_spanish:
  - no fuera que
  - sea que
  - por temor de que
  lexicon: LSJ
  rationale: La cláusula introduce un fin preventivo. «Para no» expresa de modo idiomático el propósito de evitar un resultado adverso; la alternativa «por temor de que» sería más explicativa que el griego.
- source_word: ἔχθραν ἄρῃ μεγάλην
  english_pob_choice: he stir up great hostility
  chosen_spanish: suscitar una gran hostilidad
  alternatives_spanish:
  - levantar una gran enemistad
  - provocar una gran hostilidad
  - despertar una gran hostilidad
  lexicon: LSJ
  rationale: El verbo ἄρῃ literalmente 'levantar' enemistad/hostilidad. «Suscitar» conserva el valor causativo en español y evita una expresión demasiado coloquial.
- source_word: πρὸς τὸν λαόν
  english_pob_choice: against the people
  chosen_spanish: contra el pueblo
  alternatives_spanish:
  - entre el pueblo
  - con el pueblo
  - hacia el pueblo
  lexicon: LSJ
  rationale: Con ἔχθρα, πρός puede marcar dirección relacional. La revisión inglesa optó por 'against the people'; «contra el pueblo» reproduce bien la oposición hostil sin borrar la ambigüedad relacional subyacente.
theological_decisions:
- issue: Relación entre la hostilidad y el pueblo
  english_pob_reading: lest he stir up great hostility against the people.
  chosen_spanish_reading: para no suscitar una gran hostilidad contra el pueblo.
  alternative_spanish_readings:
  - para no suscitar una gran hostilidad entre el pueblo
  - para no provocar gran enemistad con el pueblo
  rationale: El griego permite una lectura relacional amplia, pero el contexto favorece una hostilidad dirigida hacia el pueblo si Simón rehúsa. La formulación elegida sigue la revisión inglesa reciente y conserva el peso político-comunitario del peligro.
  doctrine_reference: No aplica; decisión histórica y semántica, no doctrinal.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que ajustó el orden de «speaking deceitfully to him» y cambió la relación espacial/social de la hostilidad a «against the people». La versión española sigue esa línea, pero mantiene una sintaxis natural y transparente para lectura pública.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó «muchachos» para παιδάρια, en línea con el valor de jóvenes/niños varones sin infantilizar el término.
  - Se prefirió «hostilidad» sobre «enemistad» por su correspondencia con el registro narrativo y la flexibilidad de ἔχθρα.
  - Se evitó calcar el presente histórico griego en «envía» para que el español fluya con naturalidad narrativa.
