translation:
  language: es
  text: Y para la parte trasera[a] del tabernáculo, hacia occidente, harás seis tablas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tablas', en lugar de 'marcos', si se entiende que las piezas estructurales eran marcos abiertos y no tablones sólidos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְיַרְכְּתֵי
  english_pob_choice: And for the rear side of
  chosen_spanish: Y para la parte trasera
  alternatives_spanish:
  - Y para el lado posterior de
  - Y para la parte de atrás de
  lexicon: HALOT
  rationale: En el contexto de las instrucciones del tabernáculo, יַרְכָּה/יַרְכְּתַיִם señala la parte posterior o remota de la estructura. 'Parte trasera' conserva la relación espacial del hebreo y suena natural en español sin perder precisión arquitectónica.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el lugar de habitación
  lexicon: HALOT
  rationale: מִשְׁכָּן es el término técnico habitual para la estructura sagrada; 'tabernáculo' es la equivalencia estable en español y preserva la referencia arquitectónica y cultual.
- source_word: יָמָּה
  english_pob_choice: westward
  chosen_spanish: hacia occidente
  alternatives_spanish:
  - al oeste
  - hacia el mar
  lexicon: HALOT
  rationale: El hebreo usa una orientación direccional ligada al mar, pero en este contexto espacial el sentido es 'occidente'. 'Hacia occidente' conserva el valor direccional con registro digno y bíblico, sin depender de una paráfrasis geográfica moderna.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall make
  chosen_spanish: harás
  alternatives_spanish:
  - deberás hacer
  - has de hacer
  lexicon: HALOT
  rationale: El imperfecto 2ms funciona como instrucción. En español, 'harás' transmite con naturalidad el mandato técnico de las instrucciones del tabernáculo.
- source_word: שִׁשָּׁה
  english_pob_choice: six
  chosen_spanish: seis
  lexicon: HALOT
  rationale: Número cardinal directo sin matiz adicional.
- source_word: קְרָשִׁים
  english_pob_choice: boards
  chosen_spanish: tablas
  alternatives_spanish:
  - tablones
  - marcos
  lexicon: HALOT
  rationale: Aunque la POB inglesa mantiene 'boards' con nota de alternativa 'frames', en español 'tablas' es el término más transparente y natural para las unidades estructurales del tabernáculo. No se fuerza 'marcos', porque esa opción introduce una lectura estructural más específica que el hebreo no exige aquí.
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo y el audit trail inglés con acuerdo alto; no se detectaron revisiones aplicadas ni tensiones textuales adicionales que requirieran nota doctrinal.
  spanish_consistency_notes:
  - Se usa 'tabernáculo' de manera uniforme para מִשְׁכָּן.
  - Se mantiene la orientación espacial con 'hacia occidente' para conservar el valor direccional del hebreo.
  - '''Tablas'' refleja una solución española natural para קְרָשִׁים y deja abierta en nota la alternativa estructural ''marcos''.'
