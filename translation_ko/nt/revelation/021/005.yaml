  text: '그리고 보좌에 앉으신 분이 말씀하셨습니다. 「보라, 내가 만물을 새롭게 한다.」 그리고 또 말씀하셨습니다. 「기록하라. 이 말씀은 신실하고 참되기 때문이다.」'
  philosophy: optimal-equivalence
