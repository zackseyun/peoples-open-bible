  revision_rationale: 'Se conserva el texto principal casi sin cambios porque es fiel y natural en español. Se corrige únicamente el aparato de nota para alinearlo con la evidencia fuente y con la decisión léxica auditada del English POB: la alternativa relevante pertenece al verbo ''conspiraron'', no a ''de lejos''.'
