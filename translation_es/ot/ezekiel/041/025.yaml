    issue: «las puertas del templo» es demasiado amplio para דַּלְתוֹת הַהֵיכָל
    rationale: El expediente inglés documenta que הֵיכָל aquí es la sala principal del edificio, no el templo entero. En español conviene conservar esa especificidad con «salón del templo» o similar.
  - severity: medium
    issue: «una pieza de madera» diluye excesivamente עָב עֵץ
    rationale: Aunque el término es incierto, el audit trail preserva la noción de un elemento arquitectónico saliente (canopy/projection/overhang). «Pieza» pierde demasiado contenido semántico.
  - severity: low
    issue: «delante del frente del vestíbulo» es torpe en español
    rationale: Refleja literalmente la duplicación espacial, pero suena poco natural. «Ante el frente del vestíbulo» mantiene mejor la relación espacial sin redundancia pesada.
