base_translation:
  language: en
  yaml_path: translation/ot/1_kings/012/028.yaml
  text: So the king took counsel and made two calves of gold[a], and he said to them, “It is too much for you to go up to Jerusalem. Behold your gods, O Israel[b], who brought you up from the land of Egypt.”
  footnotes:
  - marker: a
    text: Or, “It is too much for you to go up to Jerusalem.”
    reason: lexical_alternative
  - marker: b
    text: Or, “your God, O Israel.” The Hebrew form can sometimes function as a singular title, and the wording echoes Exodus 32:4; here, however, the two calves and the plural verb favor “your gods.”
    reason: alternative_reading
