translation:
  language: es
  text: ¿Acaso me faltan locos[a], que ustedes han traído a este[b] para que actúe como loco ante mí? ¿Ha de entrar este en mi casa?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me hacen falta locos».'
    reason: lexical_alternative
  - marker: b
    text: 'El demostrativo hebreo es despectivo; «este» mantiene el menosprecio del hablante hacia David. También puede expresarse más generalmente: «para comportarse de manera insensata en mi presencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲסַר
  english_pob_choice: lack
  chosen_spanish: me faltan
  alternatives_spanish:
  - carezco de
  - estoy sin
  - me hacen falta
  lexicon: HALOT
  rationale: 'La pregunta retórica de Aquís busca sarcasmo y queja: en español, «me faltan» reproduce mejor la mordacidad de «Do I lack...?» que una construcción más literal y menos natural.'
- source_word: מְשֻׁגָּעִים
  english_pob_choice: madmen
  chosen_spanish: locos
  alternatives_spanish:
  - insensatos
  - dementes
  - locos de remate
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo despectivo en plural. «Locos» conserva el insulto y la fuerza del original sin volverlo excesivamente coloquial.
- source_word: הֲבֵאתֶם אֶת זֶה
  english_pob_choice: you have brought this one
  chosen_spanish: han traído a este
  alternatives_spanish:
  - trajeron a este
  - han traído a este hombre
  - han traído a este sujeto
  lexicon: HALOT
  rationale: «A este» mantiene el tono despreciativo del demostrativo hebreo y evita suavizarlo con una paráfrasis más explicativa.
- source_word: לְהִשְׁתַּגֵּעַ
  english_pob_choice: to act like a madman
  chosen_spanish: para que actúe como loco
  alternatives_spanish:
  - para comportarse como loco
  - para enloquecer
  - para actuar demente
  lexicon: HALOT
  rationale: El infinitivo hitpael sugiere conducta deliberada o asumida; «actúe como loco» conserva esa idea de desempeño, coherente con la simulación de David en el relato.
- source_word: עָלַי
  english_pob_choice: before me
  chosen_spanish: ante mí
  alternatives_spanish:
  - en mi presencia
  - frente a mí
  - contra mí
  lexicon: HALOT
  rationale: Aunque la forma literal es «sobre mí», el contexto de presencia real y comportamiento observado pide una expresión idiomática. «Ante mí» preserva la escena sin introducir hostilidad que el contexto no exige.
- source_word: הֲזֶה
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - este hombre
  - este sujeto
  - este tipo
  lexicon: HALOT
  rationale: La repetición del demostrativo en hebreo es despectiva. En español, repetir «este» mantiene el énfasis y el desdén sin añadir contenido interpretativo.
- source_word: יָבֹא אֶל בֵּיתִי
  english_pob_choice: come into my house
  chosen_spanish: va a entrar en mi casa
  alternatives_spanish:
  - entrará en mi casa
  - vendrá a mi casa
  - va a venir a mi casa
  lexicon: HALOT
  rationale: El verbo de movimiento con אֶל expresa entrada en el ámbito doméstico. «Va a entrar en mi casa» suena natural en español y conserva la dirección hacia dentro del recinto.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior vinculando las notas a marcas realmente presentes en el texto español: [a] en «locos[a]» y [b] en ambas ocurrencias de «este[b]».'
  spanish_consistency_notes:
  - Se mantuvo un registro neutral latinoamericano y sobrio, adecuado para lectura eclesial.
  - Se preservó el tono sarcástico y despreciativo del hablante sin suavizarlo con eufemismos.
  - No se usó «SEÑOR» ni otras sustituciones devocionales, porque el versículo no contiene el nombre divino.
  - Se evitó traducir mecánicamente desde el inglés cuando el español requería una formulación idiomática para conservar la fuerza retórica del hebreo.
