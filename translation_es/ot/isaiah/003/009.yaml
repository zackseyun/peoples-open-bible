base_translation:
  language: en
  yaml_path: translation/ot/isaiah/003/009.yaml
  text: The look on their faces testifies against them[a], and they proclaim their sin like Sodom; they do not hide it. Woe to themselves[c][b], for they have brought evil on themselves.
  footnotes:
  - marker: a
    text: Or 'The expression of their faces bears witness against them.' The Hebrew may refer to their visible countenance or expression as evidence of guilt.
    reason: lexical_alternative
  - marker: b
    text: '''Like Sodom'' evokes shameless, public wickedness; compare Genesis 13:13; 19:5.'
    reason: cross_reference
  - marker: c
    text: Or 'Woe to their soul' or 'Woe to them.' Hebrew nephesh often means 'self,' 'life,' or 'person,' depending on context.
    reason: lexical_alternative
