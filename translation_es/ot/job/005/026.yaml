  yaml_path: translation/ot/job/005/026.yaml
  text: You will come to the grave in full vigor[b][a], like a sheaf gathered up in its season.
  footnotes:
  - marker: a
    text: Or 'in ripe old age.' The Hebrew term כֶּלַח is rare and may refer to mature age; the main text renders the broader idea of full, proper maturity or vigor.
    reason: lexical_alternative
  - marker: b
    text: Or 'like a stack of grain brought up in its season.' The Hebrew image is agricultural, comparing a person's death at the proper time to harvested grain gathered when ready.
    reason: lexical_alternative
