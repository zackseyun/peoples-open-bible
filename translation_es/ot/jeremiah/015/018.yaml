    rationale: El contenido de la nota habla de la imagen hebrea de un cauce que promete agua y falla; por tanto, debe marcar el sintagma del arroyo, no «perpetuo». Esto incumple la disciplina requerida de anclar cada nota exactamente en la frase pertinente.
