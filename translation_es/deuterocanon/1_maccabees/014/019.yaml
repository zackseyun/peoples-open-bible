lexical_decisions:
- source_word: ἀνεγνώσθησαν
  english_pob_choice: were read
  chosen_spanish: se leyeron
  alternatives_spanish:
  - fueron leídos
  - se dieron lectura
  lexicon: LSJ
  rationale: El aoristo pasivo de ἀναγινώσκω indica que unos documentos fueron leídos en voz alta. En español, «se leyeron» conserva la pasividad y suena natural para un acto público de lectura.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: LSJ
  rationale: «Ante» expresa de modo formal y claro la idea de estar en la presencia de un grupo, sin sobrecargar el español con una perífrasis más larga.
- source_word: ἐκκλησίας
  english_pob_choice: assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la reunión
  lexicon: LSJ
  rationale: En este contexto judío-cívico de 1 Macabeos, ἐκκλησία no debe traducirse como «iglesia». «Asamblea» conserva el sentido de reunión pública y corporativa.
- source_word: ἐν Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: LSJ
  rationale: La frase locativa es directa y no presenta dificultad especial; se mantiene el valor espacial normal en español.
