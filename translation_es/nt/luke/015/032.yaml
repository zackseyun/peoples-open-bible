    text: O «era apropiado celebrar y alegrarse».
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «vivió»; aquí la expresión es probablemente metafórica, de restauración dentro de la parábola.
    reason: theological_note
  - marker: c
    text: O «fue hallado».
    reason: lexical_alternative
