review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el hebreo y el rastro de auditoría inglés: conserva «la joven», «la entrada de la casa de su padre», «los hombres de su ciudad», la redundancia legal «apedrearán con piedras», la fuerza de זנה con «prostituirse» y la fórmula deuteronómica final. Sin embargo, hay un desajuste notable en la cláusula causal: el hebreo לִזְנוֹת בֵּית אָבִיהָ no significa simplemente «prostituirse en la casa de su padre», sino literalmente algo como «prostituirse [siendo/estando] la casa de su padre», con matiz temporal/social mejor captado por «mientras estaba en la casa de su padre» o equivalente. El inglés POB mismo documenta como alternativa esa lectura temporal.'
  spanish_quality_summary: El español es claro, digno y generalmente natural. «La joven», «la entrada», «los hombres de su ciudad» y «Así extirparás el mal de en medio de ti» son legibles y apropiados. El principal problema de legibilidad/fidelidad es «al prostituirse en la casa de su padre», que en español sugiere con fuerza el lugar físico del acto, más que la situación legal-social de estar aún bajo la casa paterna. Conviene ajustarlo para evitar una inferencia excesiva. También la nota c puede afinarse estilísticamente porque repite «prostitución/prostitución figurada».
  glossary_alignment: 'No hay términos del glosario de proyecto en juego como Yahvé/Mesías. Las decisiones léxicas clave se alinean bien con la filosofía POB: mantener género en «los hombres», fuerza moral en «vileza», y colorido léxico en «prostituirse». La fórmula deuteronómica con «extirparás el mal» es aceptable, aunque «purgarás» también sería posible; no requiere adjudicación superior.'
  issues:
  - severity: medium
    issue: La frase «al prostituirse en la casa de su padre» sobre-localiza el hebreo.
    rationale: לִזְנוֹת בֵּית אָבִיהָ se entiende mejor como conducta cometida mientras ella estaba aún en la casa de su padre / bajo la casa paterna, no necesariamente como ubicación física estricta. El español actual puede inducir una lectura demasiado concreta.
  - severity: low
    issue: La nota c tiene redacción torpe con «prostitución/prostitución figurada».
    rationale: No afecta sustancialmente el sentido, pero conviene mejorarla para español natural y precisión explicativa.
