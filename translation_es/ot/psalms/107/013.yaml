translation:
  language: es
  text: Entonces clamaron a Yahvé en su angustia; él los salvó de sus angustias[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «de sus angustias»; el término también puede traducirse «de sus aprietos» o «de sus estrecheces».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְעֲקוּ
  english_pob_choice: Then they cried out
  chosen_spanish: Entonces clamaron
  alternatives_spanish:
  - Y clamaron
  - Entonces gritaron pidiendo ayuda
  lexicon: HALOT
  rationale: El hebreo expresa un clamor intenso y urgente; en español, "clamar" comunica mejor esa súplica vehemente que un simple "llamar" o "gritar". "Entonces" conserva el avance narrativo del waw-consecutivo y el patrón repetido del salmo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  - ante
  lexicon: HALOT
  rationale: Con verbos de clamor, el valor direccional natural en español es "a". No hace falta reforzarlo con una perífrasis más larga si el verbo ya expresa la dirección del clamor.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: Se sigue la política española del proyecto de traducir el Tetragrama como "Yahvé", manteniendo el nombre divino en vez de sustituirlo por un título. "Yahvé" es la forma estándar adoptada para el texto español del POB.
- source_word: בַּצַּר
  english_pob_choice: in their trouble
  chosen_spanish: en su angustia
  alternatives_spanish:
  - en su trouble
  - en su aflicción
  - en su aprieto
  lexicon: HALOT
  rationale: צַר aquí denota opresión, estrechez o aflicción. "Angustia" es natural en español bíblico y conserva el sentido de presión dolorosa sin perder dignidad literaria. Se evita "trouble" por no ser español y "aprieto" como texto principal por ser algo más coloquial.
- source_word: מִמְּצֻקוֹתֵיהֶם
  english_pob_choice: from their distresses
  chosen_spanish: de sus aprietos
  alternatives_spanish:
  - de sus angustias
  - de sus estrecheces
  - de sus aflicciones
  lexicon: HALOT
  rationale: El plural hebreo sugiere múltiples situaciones de constricción o dificultad. "Apretos" conserva la idea de presión/estrechez y funciona bien en español; aunque es menos técnico que "distresses", refleja el carácter concreto y plural del término. La alternativa más literal "estrecheces" resulta correcta pero menos idiomática.
- source_word: יוֹשִׁיעֵם
  english_pob_choice: he saved them
  chosen_spanish: él los salvó
  alternatives_spanish:
  - él los libró
  - los salvó
  lexicon: HALOT
  rationale: El verbo hiphil de ישׁע significa salvar o librar. "Él los salvó" es directo, fiel y coherente con el léxico bíblico español del proyecto. Se mantiene el sujeto explícito para reflejar el hebreo y dar claridad al paralelismo.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. En el POB español se adopta "Yahvé" como forma de transliteración del nombre divino, preservando el referente personal del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios y mantiene alta concordancia con el texto fuente; por ello, el borrador español sigue de cerca el valor semántico del hebreo sin introducir ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como "Yahvé" conforme al estándar del proyecto.
  - '"Clamaron" conserva mejor la intensidad del hebreo que una simple "llamaron".'
  - La elección de "angustia" y "aprietos" intenta reflejar la diferencia entre צַר y מְּצֻקוֹת, sin borrar la tensión léxica del paralelo.
  - El sujeto pronominal explícito "él" ayuda a mantener la estructura poética y el énfasis del hebreo.
