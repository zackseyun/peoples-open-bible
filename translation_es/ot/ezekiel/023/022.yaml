revisions:
- from: 'Por tanto[a], Oholibá, así dice Yahvé el Señor: He aquí, yo estoy despertando contra ti a tus amantes, aquellos de quienes tu alma se apartó, y los traeré contra ti desde alrededor.'
  to: 'Por tanto[a], Oholibá, así dice el Señor Yahvé: He aquí, yo incito contra ti a tus amantes, aquellos de quienes tu alma se apartó, y los traeré contra ti de todas partes.'
  rationale: 'Se ajusta el texto para mejorar la fidelidad contextual y la naturalidad en español: «incito» expresa mejor la movilización hostil de מֵעִיר que «despertando»; «de todas partes» comunica idiomáticamente el cerco implícito en מִסָּבִיב; y «el Señor Yahvé» suena más natural para la fórmula אֲדֹנָי יְהוִה sin ocultar el nombre divino. Se conserva la nota léxica sobre la ambigüedad de נָקְעָה.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:38:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: consecuencia judicial, fórmula profética, movilización de los amantes contra Oholibá, referencia a aquellos de quienes su alma se apartó, y cerco hostil. Sin embargo, dos elecciones no preservan bien la fuerza idiomática del original: «despertando» es menos adecuado que una forma como «incitando» o «levantando» para מֵעִיר en contexto hostil, y «desde alrededor» no suena natural ni expresa tan bien מִסָּבִיב como «de todas partes» o «por todos lados».'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero presenta dos giros poco naturales para español bíblico actual: «yo estoy despertando contra ti a tus amantes» y «desde alrededor». También conviene reorganizar el orden de la fórmula divina a «el Señor Yahvé», que suena más natural en español que «Yahvé el Señor» sin perder los dos elementos hebreos.'
  glossary_alignment: Cumple bien con Yahvé para יְהוָה, mantiene «amantes» para מְאַהֲבַיִךְ, y conserva la ambigüedad de נָקְעָה en la nota. La principal mejora terminológica es usar una expresión española más idiomática para מִסָּבִיב y una verbalización más precisa para מֵעִיר.
  issues:
  - severity: medium
    issue: «despertando» para מֵעִיר
    rationale: Aunque literalmente cercano, en español «despertar a alguien contra ti» suena torpe y no comunica con suficiente claridad la idea de movilización hostil. «Incitando» o «levantando» preserva mejor el sentido causativo en contexto judicial-militar.
  - severity: medium
    issue: «desde alrededor» para מִסָּבִיב
    rationale: Es poco idiomático en español y reduce la claridad. El hebreo expresa cerco/ataque circundante; «de todas partes» comunica bien ese sentido con naturalidad.
  - severity: low
    issue: Orden «Yahvé el Señor»
    rationale: No es incorrecto, pero «el Señor Yahvé» resulta más natural en español y refleja mejor la fórmula compuesta אֲדֹנָי יְהוִה manteniendo el nombre divino visible.
  revised_spanish_text: 'Por tanto[a], Oholibá, así dice el Señor Yahvé: He aquí, yo incito contra ti a tus amantes, aquellos de quienes tu alma se apartó, y los traeré contra ti de todas partes.'
  revised_footnotes:
  - marker: a
    text: 'O también: «aquellos de quienes tu alma sintió repulsión» / «aquellos de quienes te apartaste». El verbo hebreo puede expresar rechazo, repulsión o distanciamiento.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para mejorar la fidelidad contextual y la naturalidad en español: «incito» expresa mejor la movilización hostil de מֵעִיר que «despertando»; «de todas partes» comunica idiomáticamente el cerco implícito en מִסָּבִיב; y «el Señor Yahvé» suena más natural para la fórmula אֲדֹנָי יְהוִה sin ocultar el nombre divino. Se conserva la nota léxica sobre la ambigüedad de נָקְעָה.'
