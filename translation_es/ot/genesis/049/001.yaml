    issue: Marcador de nota al pie anclado a la frase equivocada
    rationale: La nota explica «en los últimos días», pero el marcador [a] está colocado después de «suceder». Eso falsea la relación entre nota y texto y puede hacer pensar que la alternativa afecta al verbo de suceso, no a בְּאַחֲרִית הַיָּמִים.
