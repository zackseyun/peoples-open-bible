revisions:
- from: Yahvé hirió al rey[a], y fue leproso hasta el día de su muerte; y habitó en una casa separada[b]. Y Jotam, hijo del rey, estaba sobre la casa, juzgando al pueblo de la tierra.
  to: Yahvé hirió al rey[a], y fue leproso hasta el día de su muerte, y vivía en una casa separada[b]. Y Jotam, hijo del rey, estaba a cargo de la casa real, juzgando al pueblo de la tierra.
  rationale: Se conserva la fidelidad al hebreo y a las decisiones del POB inglés, pero se corrige el calco poco natural «sobre la casa» por «a cargo de la casa real», que comunica la función administrativa de עַל הַבַּיִת en español claro. También se ajusta «habitó» a «vivía» para una lectura más natural sin pérdida de sentido. Se mantienen las dos notas existentes porque siguen siendo pertinentes y están bien ancladas.
  reviewer_model: gpt-5.4
