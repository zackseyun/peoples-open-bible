revisions:
- from: 'Y el centinela[a] informó, diciendo: «Llegó hasta ellos, pero no ha vuelto; y la manera de conducir es como la manera de conducir de Jehú hijo de Nimsi, porque conduce[b] con frenesí»[c].'
  to: 'Y el vigía[a] informó, diciendo: «Llegó hasta ellos, pero no ha vuelto; y la manera de conducir[b] es como la manera de conducir de Jehú hijo de Nimsi, porque conduce con frenesí[c]».'
  rationale: Se ajusta «centinela» a «vigía» por mayor precisión contextual para הַצֹּפֶה y se corrige el anclaje de las notas para que coincidan exactamente con las expresiones comentadas en el texto. Se conserva la estructura y el sentido del borrador, incluyendo la repetición enfática sobre la manera de conducir.
