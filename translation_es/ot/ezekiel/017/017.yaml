review_pass:
  verdict: revise
  source_alignment_summary: 'La base semántica está bien captada: Faraón no prestará ayuda efectiva en la guerra, pese a un gran ejército y un gran contingente reunido, mientras se levantan obras de asedio para causar muchas muertes. Sin embargo, dos puntos requieren ajuste para mayor fidelidad y naturalidad: «gran multitud» debilita el matiz militar de וּבְקָהָל רָב frente al audit trail inglés («large company») y «cortar muchas vidas» suena poco idiomático en español, aunque intenta preservar el hebraísmo.'
  spanish_quality_summary: El borrador es claro y legible, pero «gran multitud» puede sonar demasiado genérico y civil, y «cortar muchas vidas» resulta forzado en español. «Gran compañía» es comprensible en registro bíblico y mantiene mejor el sentido de contingente reunido; «quitar muchas vidas» conserva gravedad sin caer en un calco poco natural.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. Las decisiones militares principales son consistentes. La excepción recomendada es preferir «compañía» sobre «multitud» en este contexto para reflejar mejor קָהָל en contexto bélico, conforme al POB inglés revisado.
  issues:
  - severity: medium
    issue: «gran multitud» para וּבְקָהָל רָב
    rationale: Aunque posible, «multitud» sugiere masa numerosa más que contingente reunido. El audit trail inglés revisó a «large company» precisamente para el contexto militar. «Gran compañía» o «gran contingente» preserva mejor el matiz contextual.
  - severity: medium
    issue: «cortar muchas vidas» para לְהַכְרִית נְפָשׁוֹת רַבּוֹת
    rationale: Es demasiado calcado y poco idiomático en español. La meta pide evitar calcos de madera. «Quitar muchas vidas» conserva la severidad y la referencia a vidas, sin aplanarlo a «matar a mucha gente».
  - severity: low
    issue: La nota al pie actual favorece «multitud» sobre una opción menos ambigua
    rationale: La nota explica bien קָהָל, pero dado el contexto militar conviene anclar la lectura principal en «compañía» y dejar constancia de alternativas como «contingente» o «asamblea».
  revised_spanish_text: Faraón no le ayudará en la guerra con un gran ejército y una gran compañía[a], cuando levanten un terraplén de asedio y construyan una muralla de asedio para quitar muchas vidas.
  revised_footnotes:
  - marker: a
    text: 'O: «un gran contingente». El hebreo קָהָל significa literalmente un grupo reunido o asamblea; en este contexto militar se refiere a un gran cuerpo reunido que acompaña al ejército.'
    reason: lexical_alternative
  revision_rationale: Se ajusta «multitud» a «compañía» para reflejar mejor el matiz militar de קָהָל en armonía con el audit trail inglés, y se cambia «cortar muchas vidas» por «quitar muchas vidas» para evitar un calco poco natural, preservando a la vez la gravedad del hebreo.
