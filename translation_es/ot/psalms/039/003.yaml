    rationale: La alternativa principal relevante es «quedé mudo». «Incluso en silencio» no corresponde bien al valor de דּוּמִיָּה y puede confundir la relación entre el verbo y el sustantivo.
  revised_spanish_text: Estaba mudo[a] en silencio; guardé silencio de lo bueno[b], y mi dolor se agitó.
