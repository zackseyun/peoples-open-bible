translation:
  language: es
  text: Porque yo, Yahvé, amo la justicia; odio el robo con injusticia[a]. Y les daré su recompensa en fidelidad[b], y haré con ellos un pacto eterno[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La frase hebrea es difícil. También puede entenderse como “robo con una ofrenda quemada”, “robo en una ofrenda quemada” o “robo para una ofrenda quemada”. Puede referirse a injusticia mezclada con adoración o a bienes robados presentados como ofrenda.
    reason: alternative_reading
  - marker: b
    text: O “su salario” o “su paga”.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, “cortaré un pacto”, es decir, haré un pacto.
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto de usar el nombre divino en forma explícita, manteniendo el sentido de pacto y evitando el reemplazo por un título enmascarado.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - lo recto
  lexicon: HALOT
  rationale: En contraste con el robo y la iniquidad, el sentido es ético-social; en español, 'justicia' comunica mejor esa fuerza que un simple 'juicio'.
- source_word: גָזֵל
  english_pob_choice: robbery
  chosen_spanish: robo
  alternatives_spanish:
  - despojo
  - rapiña
  lexicon: HALOT
  rationale: '''Robo'' es la equivalencia más natural y clara para el sustantivo de apropiación violenta o injusta.'
- source_word: בְּעוֹלָה
  english_pob_choice: with wrongdoing
  chosen_spanish: con maldad
  alternatives_spanish:
  - con iniquidad
  - con injusticia
  - como ofrenda quemada
  lexicon: HALOT
  rationale: La tradición del POB en inglés preserva la dificultad del hebreo sin forzar una interpretación sacrificial. En español, 'con maldad' comunica la lectura adoptada en el texto base y mantiene el contraste moral; la nota conserva la alternativa más literal y otras posibilidades.
- source_word: פְעֻלָּתָם
  english_pob_choice: their recompense
  chosen_spanish: su recompensa
  alternatives_spanish:
  - su salario
  - su paga
  - su retribución
  lexicon: HALOT
  rationale: El contexto promesa/vindicativo favorece la idea de lo que Dios les da como justo pago; 'recompensa' mantiene ese valor sin reducirlo a 'trabajo'.
- source_word: בֶּאֱמֶת
  english_pob_choice: in faithfulness
  chosen_spanish: en fidelidad
  alternatives_spanish:
  - en verdad
  - fielmente
  lexicon: HALOT
  rationale: '''Fidelidad'' conserva la dimensión relacional y de pacto que el inglés POB quiso captar con ''faithfulness'', más rica que ''en verdad'' en este contexto.'
- source_word: בְרִית עוֹלָם
  english_pob_choice: an everlasting covenant
  chosen_spanish: un pacto eterno
  alternatives_spanish:
  - una alianza eterna
  - un pacto perpetuo
  lexicon: HALOT
  rationale: '''Pacto'' es el equivalente más transparente para בְרִית; ''eterno'' refleja עוֹלָם y es idiomático en español bíblico sin perder precisión.'
- source_word: אֶכְרֹת
  english_pob_choice: I will make
  chosen_spanish: haré
  alternatives_spanish:
  - cortaré
  - sellaré
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente 'cortar', el inglés POB ya optó por el verbo más natural 'make'. En español, 'haré un pacto' es plenamente idiomático y fiel al sentido, con la nota preservando la idiomática hebrea.
theological_decisions:
- issue: Lectura de גָזֵל בְּעוֹלָה
  english_pob_reading: robbery with wrongdoing
  chosen_spanish_reading: robo con maldad
  alternative_spanish_readings:
  - robo con ofrenda quemada
  - robo en una ofrenda quemada
  - robo para una ofrenda quemada
  rationale: El hebreo es sintácticamente difícil. La versión española sigue la revisión inglesa reciente que favorece una lectura moral general ('wrongdoing') en lugar de una reconstrucción sacrificial más específica, pero la nota preserva las alternativas principales para no borrar la tensión textual.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Fuerza de פְעֻלָּתָם
  english_pob_reading: their recompense
  chosen_spanish_reading: su recompensa
  alternative_spanish_readings:
  - su recompensa merecida
  - su salario
  - su paga
  rationale: En el contexto de vindicación divina y promesa de pacto, el sustantivo se entiende mejor como lo que Dios concede justamente. 'Recompensa' conserva la amplitud semántica sin convertirlo en una simple referencia al trabajo humano.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Idiomática de בְרִית עוֹלָם אֶכְרֹת
  english_pob_reading: I will make an everlasting covenant
  chosen_spanish_reading: haré con ellos un pacto eterno
  alternative_spanish_readings:
  - cortaré con ellos un pacto eterno
  - sellaré con ellos un pacto eterno
  rationale: Se prioriza una construcción española natural y reverente. La nota explica que el hebreo literalmente dice 'cortaré', de modo que no se pierde la transparencia auditada.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB inglés: el cambio de ‘burnt offering’ a una lectura moral general (‘wrongdoing’) para בְּעוֹלָה, y la preferencia por ‘make’ en lugar de ‘cut’ en la formulación del pacto, manteniendo en español la transparencia mediante nota cuando el hebreo conserva el idiomatismo literal.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como forma principal del nombre divino, conforme al estándar del proyecto.
  - '''Pacto'' se usó para בְרִית de manera consistente con el registro bíblico en español.'
  - '''Justicia'' y ''fidelidad'' conservan la relación ética y de pacto del versículo.'
  - La nota [a] preserva explícitamente la dificultad del hebreo para no borrar la tensión interpretativa documentada.
