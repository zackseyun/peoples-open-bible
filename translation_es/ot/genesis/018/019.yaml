base_translation:
  language: en
  yaml_path: translation/ot/genesis/018/019.yaml
  text: For I have known him[a], so that he may command his children and his household after him, and they may keep the way of Yahweh by doing righteousness and justice[d][c][b], so that Yahweh may bring upon Abraham what he has spoken concerning him.
  footnotes:
  - marker: a
    text: Or, 'For I have chosen him.' The Hebrew verb ordinarily means 'know,' but in context it can carry the sense of special regard or choice.
    reason: alternative_reading
  - marker: b
    text: '''His sons'' is masculine in Hebrew; the phrase refers first to Abraham''s male descendants, though ''his household'' broadens the scope beyond sons alone.'
    reason: lexical_alternative
  - marker: c
    text: That is, the LORD's required manner of life.
    reason: cultural_note
  - marker: d
    text: Or, 'what he has promised him.' The Hebrew more literally says, 'what he has spoken concerning him.'
    reason: lexical_alternative
