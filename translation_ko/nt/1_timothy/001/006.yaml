  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὧν τινες ἀστοχήσαντες ἐξετράπησαν εἰς ματαιολογίαν,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/001/006.yaml
  text: Some[a], having missed these things, have turned aside to empty talk[b],
  footnotes:
  - marker: a
    text: Or 'having strayed from these things.' The verb can carry the sense of missing a goal or deviating from it.
    reason: lexical_alternative
  - marker: b
    text: Or 'vain discussion' or 'meaningless speech.'
    reason: lexical_alternative
translation:
  language: ko
  text: 어떤 사람들은 이것들을 빗나가[a] 헛된 말[b]로 돌이키고 말았습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「이것들로부터 빗나가」. 헬라어 ἀστοχέω는 과녁을 놓치다·목표에서 빗나가다의 어감.
    reason: lexical_alternative
  - marker: b
    text: 또는 「공허한 논의」 「무의미한 말」.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὧν
  english_pob_choice: these things
  chosen_korean: 이것들
  alternatives_korean:
  - 그것들
  - 이러한 것들
  lexicon: BDAG
  rationale: 5절의 정결한 마음·선한 양심·거짓 없는 믿음을 받는 관계대명사. 한국어로는 명시적 「이것들」이 자연스럽다.
- source_word: τινες
  english_pob_choice: Some
  chosen_korean: 어떤 사람들
  alternatives_korean:
  - 어떤 자들
  lexicon: BDAG
  rationale: 비특정 부정대명사. 바울의 의도적 익명성을 보존한다.
- source_word: ἀστοχήσαντες
  english_pob_choice: having missed
  chosen_korean: 빗나가
  alternatives_korean:
  - 잃어버려
  - 멀어져
  lexicon: BDAG
  rationale: 「과녁을 놓치다」의 본의를 보존하며, 한국어 「빗나가」가 그 비유를 자연스럽게 담는다.
- source_word: ἐξετράπησαν
  english_pob_choice: have turned aside
  chosen_korean: 돌이키고 말았습니다
  alternatives_korean:
  - 빗나갔습니다
  - 떠나갔습니다
  lexicon: BDAG
  rationale: 본래 길에서 옆길로 돌이키는 방향적 비유를 「돌이키고 말았습니다」로 옮겨 후회·완료의 어감을 살린다.
- source_word: ματαιολογίαν
  english_pob_choice: empty talk
  chosen_korean: 헛된 말
  alternatives_korean:
  - 공허한 논의
  - 헛소리
  lexicon: BDAG
  rationale: 「헛된 말」이 간결하면서도 무익함의 평가를 담는다. 「헛소리」는 비속하다.
