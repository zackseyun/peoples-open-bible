translation:
  language: es
  text: 'Y acusaron al pueblo ante el rey[a], diciendo: «Judas y sus hermanos han destruido a todos tus amigos, y nos han dispersado de nuestra tierra».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tus aliados»; en contextos reales, «amigos» puede referirse a partidarios políticos o asociados de la corte del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατηγόρησαν
  english_pob_choice: accused
  chosen_spanish: acusaron
  alternatives_spanish:
  - presentaron cargos contra
  - denunciaron
  lexicon: BDAG
  rationale: El verbo expresa acusar o formular cargos. «Acusaron» es natural en español, reproduce el valor hostil del relato y mantiene la brevedad del griego.
- source_word: τοῦ λαοῦ
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - a la gente
  - a la nación
  lexicon: BDAG
  rationale: El genitivo funciona como objeto de la acusación; en español, «al pueblo» conserva la referencia directa sin añadir un matiz técnico de «nación» que el griego no exige.
- source_word: πρὸς τὸν βασιλέα
  english_pob_choice: before the king
  chosen_spanish: ante el rey
  alternatives_spanish:
  - delante del rey
  - al rey
  lexicon: BDAG
  rationale: La preposición con verbos de hablar o acusar puede señalar una escena formal de comparecencia. «Ante el rey» comunica mejor ese marco judicial/político que un simple «al rey».
- source_word: Ἀπώλεσεν
  english_pob_choice: have destroyed
  chosen_spanish: han destruido
  alternatives_spanish:
  - destruyeron
  - han arruinado
  - han exterminado
  lexicon: BDAG
  rationale: Aunque la forma griega es singular, la acusación cita a Judas junto con sus hermanos como sujeto compuesto; en español, el plural resulta más natural y sigue el criterio de equivalencia óptima del POB inglés. «Destruido» traduce ἀπόλλυμι en su sentido de arruinar/eliminar personas, no solo de perder algo.
- source_word: οἱ φίλοι σου
  english_pob_choice: your friends
  chosen_spanish: tus amigos
  alternatives_spanish:
  - tus aliados
  - tus partidarios
  lexicon: BDAG
  rationale: En contextos reales helenísticos, φίλοι puede funcionar como título de corte para allegados o aliados del rey. Sin embargo, «tus amigos» es fiel al valor directo del griego y preserva la observación del POB inglés sobre la posible carga política sin incorporarla a la línea principal.
- source_word: ἐσκόρπισεν
  english_pob_choice: have scattered
  chosen_spanish: nos han dispersado
  alternatives_spanish:
  - nos han esparcido
  - nos han dispersado fuera
  - nos han diseminado
  lexicon: BDAG
  rationale: El verbo significa dispersar o esparcir. «Dispersado» conserva la imagen de dispersión y, en combinación con el pronombre, expresa con claridad el desplazamiento forzado.
- source_word: ἀπὸ τῆς γῆς ἡμῶν
  english_pob_choice: from our land
  chosen_spanish: de nuestra tierra
  alternatives_spanish:
  - de nuestra tierra natal
  - de nuestro país
  - de nuestra región
  lexicon: BDAG
  rationale: γῆ puede significar tierra, territorio o país. «Nuestra tierra» es una equivalencia amplia y natural en este contexto político y de desarraigo.
theological_decisions:
- issue: Relación entre la forma verbal griega singular y el sujeto compuesto en la acusación
  english_pob_reading: 'Use idiomatic English plural verbs: ''have destroyed ... and have scattered'''
  chosen_spanish_reading: 'Usar verbos plurales idiomáticos en español: «han destruido ... nos han dispersado»'
  alternative_spanish_readings:
  - 'Mantener una estructura más literal con singular implícito: «Judas ha destruido ... y sus hermanos»'
  rationale: La acusación griega atribuye la acción a Judas como figura principal, pero el sujeto explícito incluye a sus hermanos. En español, el plural comunica mejor el sujeto compuesto y evita una construcción forzada, sin alterar la agencia central del pasaje.
  doctrine_reference: 'Philosophy of translation: equivalencia óptima; claridad moderna sin perder el perfil del texto fuente'
translation_notes:
  revision_awareness: 'El texto sigue el estado de revisión más reciente sin cambios sustanciales: el paralelismo entre la acusación ante el rey, la destrucción de los φίλοι y la dispersión de «nosotros» se mantiene conforme al griego y al audit trail inglés.'
  spanish_consistency_notes:
  - Se prefirió «Y» al inicio para reproducir la continuidad narrativa del griego.
  - «Ante el rey» conserva el marco formal de acusación señalado por el inglés POB.
  - Se mantuvo «tus amigos» en el texto principal y se explicó la posible lectura política en nota, sin reemplazarla por una equivalencia más interpretativa.
  - «Nuestra tierra» evita estrechar γῆ a «país» y conserva amplitud semántica.
