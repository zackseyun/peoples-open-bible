translation:
  language: es
  text: Y pondrás el propiciatorio sobre el arca del testimonio, en el Lugar Santísimo[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cubierta de expiación» para «propiciatorio».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el arca del testimonio»; muchas versiones en español tienen «arca del pacto».'
    reason: alternative_reading
  - marker: c
    text: O «el Lugar Santísimo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/נָתַתָּ
  english_pob_choice: And you shall place
  chosen_spanish: Y pondrás
  alternatives_spanish:
  - y colocarás
  - y pondrás allí
  lexicon: HALOT
  rationale: La forma verbal instruccional se expresa naturalmente en español con futuro de mandato. "Poner"/"ponerás" comunica con claridad la acción de ubicar un objeto sagrado sin sonar forzado; "colocarás" es posible, pero menos natural en este contexto litúrgico.
- source_word: הַ/כַּפֹּ֔רֶת
  english_pob_choice: the mercy seat
  chosen_spanish: el propiciatorio
  alternatives_spanish:
  - la cubierta de expiación
  - la cubierta
  lexicon: HALOT
  rationale: En español bíblico, "propiciatorio" es el término tradicional para la tapa del arca asociada con la expiación. Conserva la referencia cultual sin depender de una perífrasis moderna que perdería la densidad terminológica del objeto.
- source_word: עַ֖ל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - encima de
  - arriba de
  lexicon: HALOT
  rationale: '"Sobre" transmite con precisión la relación espacial de colocación del objeto sobre el arca y es el equivalente más natural en español.'
- source_word: אֲר֣וֹן הָ/עֵדֻ֑ת
  english_pob_choice: the ark of the testimony
  chosen_spanish: el arca del testimonio
  alternatives_spanish:
  - el arca del pacto
  - el arca del testimonio
  lexicon: HALOT
  rationale: El hebreo dice literalmente "arca del testimonio". Se conserva esa formulación para no armonizar con la expresión tradicional "del pacto" cuando el texto fuente usa otra designación.
- source_word: בְּ/קֹ֖דֶשׁ הַ/קֳּדָשִֽׁים
  english_pob_choice: in the Most Holy Place
  chosen_spanish: en el Lugar Santísimo
  alternatives_spanish:
  - en el Santo de los Santos
  - en el santísimo lugar
  lexicon: HALOT
  rationale: '"Lugar Santísimo" comunica bien el superlativo cultual del hebreo y es ampliamente inteligible en español bíblico. Mantiene la referencia al espacio interior del santuario sin forzar una calca literal.'
theological_decisions:
- issue: 'Terminología del כַּפֹּרֶת: conservación de su función cultual y expiatoria'
  english_pob_reading: Use 'mercy seat' in the main text, with 'atonement cover' as an alternative.
  chosen_spanish_reading: Usar "propiciatorio" en el texto principal, con nota de posible equivalencia funcional.
  alternative_spanish_readings:
  - cubierta de expiación
  - tapa de expiación
  rationale: El término español "propiciatorio" preserva la tradición bíblica y litúrgica, y además mantiene la conexión con el lugar de expiación. La alternativa más transparente puede señalarse en nota para lectores que necesiten una equivalencia descriptiva.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Designación del santuario interior
  english_pob_reading: Use 'Most Holy Place' in the main text, with 'Holy of Holies' as an alternative.
  chosen_spanish_reading: Usar "Lugar Santísimo" en el texto principal.
  alternative_spanish_readings:
  - Santo de los Santos
  - Santo Lugar
  rationale: '"Lugar Santísimo" expresa de forma clara y reverente el superlativo del hebreo. Evita la duplicación arcaizante de "Santo de los Santos" y funciona bien para lectores modernos sin perder el sentido técnico.'
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Mantener la lectura original de 'testimonio' en vez de armonizar con 'pacto'
  english_pob_reading: 'Hebrew: ''the ark of the testimony''; many English versions have ''ark of the covenant.'''
  chosen_spanish_reading: Conservar "arca del testimonio" sin armonizar con "arca del pacto".
  alternative_spanish_readings:
  - arca del pacto
  - arca del testimonio
  rationale: La prioridad del original exige respetar la designación hebrea concreta. Aunque "arca del pacto" es muy conocida, aquí introducirla borraría una distinción real del texto fuente.
  doctrine_reference: Translation philosophy §§1, 2
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés sin depender mecánicamente de la redacción inglesa. Se preservan las tres tensiones documentadas: כַּפֹּרֶת como término cultual tradicional, עֵדֻת como ''testimonio'' y קֹדֶשׁ הַקֳּדָשִׁים como espacio superlativo del santuario. No hubo cambios de revisión adicionales en el expediente inglés.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico reverente pero moderno.
  - Se conserva la terminología cultual tradicional cuando es reconocible en español y está respaldada por la función del objeto.
  - Las notas al pie usan marcadores únicos y corresponden exactamente a las alternativas documentadas.
  - No se introduce 'Cristo' ni 'SEÑOR', pues el versículo no contiene esos términos.
