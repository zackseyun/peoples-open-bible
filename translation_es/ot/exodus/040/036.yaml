translation:
  language: es
  text: Siempre que la nube era alzada de sobre el tabernáculo, los hijos de Israel partían en todas sus jornadas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los israelitas». Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בְ/הֵעָלֹת
  english_pob_choice: Whenever ... was taken up
  chosen_spanish: Siempre que ... era tomada
  alternatives_spanish:
  - Cuando ... era levantada
  - Cada vez que ... subía
  lexicon: HALOT
  rationale: La construcción temporal iterativa pide un valor repetido; "Siempre que" conserva ese matiz mejor que un simple "cuando". "Era tomada" mantiene el sentido pasivo/resultativo de la nube en movimiento sin forzar una explicación más interpretativa.
- source_word: הֶעָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - la nube de Dios
  - la nube
  lexicon: HALOT
  rationale: Es el sustantivo definido ya identificado en el contexto como la nube de la presencia divina. En español, "la nube" es suficiente y natural sin añadir contenido no expresado.
- source_word: מֵעַל
  english_pob_choice: from over
  chosen_spanish: de sobre
  alternatives_spanish:
  - de encima de
  - desde arriba de
  lexicon: HALOT
  rationale: La preposición indica alejamiento de una posición encima del tabernáculo. "De sobre" reproduce bien la relación espacial con un español sobrio y bíblico.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda del tabernáculo
  lexicon: HALOT
  rationale: '"Tabernáculo" es la equivalencia estable y precisa para מִשְׁכָּן en Éxodo, y evita reemplazarlo por un término más explicativo que alteraría la terminología bíblica.'
- source_word: יִסְעוּ
  english_pob_choice: would set out
  chosen_spanish: partían
  alternatives_spanish:
  - salían
  - se ponían en marcha
  - se levantaban y partían
  lexicon: HALOT
  rationale: El imperfecto narrativo expresa acción habitual en la secuencia del desierto. "Partían" comunica el desplazamiento de campamento con naturalidad y sin añadir elementos.
- source_word: בְּנֵ֣י יִשְׂרָאֵ֑ל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la forma más literal y transparente al hebreo, manteniendo el paralelo corporativo-masculino del original sin reducirlo a una designación más genérica.
- source_word: בְּ/כֹ֖ל מַסְעֵי/הֶם
  english_pob_choice: in all their journeys
  chosen_spanish: en todos sus viajes
  alternatives_spanish:
  - en todas sus jornadas
  - en cada una de sus etapas
  lexicon: HALOT
  rationale: La frase resume la totalidad de sus desplazamientos; "en todos sus viajes" es natural en español y no introduce la matización de duración continua que no exige el hebreo.
theological_decisions:
- issue: Designación corporativa בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: No hay controversia doctrinal, pero se preserva la forma hebrea explícita y su color corporativo, en línea con una traducción que no borra el género gramatical cuando el texto lo exhibe.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Ritmo habitual de la guía divina en el desierto
  english_pob_reading: Whenever the cloud was taken up ... the sons of Israel would set out
  chosen_spanish_reading: Siempre que la nube era tomada ... los hijos de Israel partían
  alternative_spanish_readings:
  - Cuando la nube era levantada ... los hijos de Israel salían
  rationale: La lectura refleja repetición providencial, no un hecho único. "Siempre que" y el imperfecto en español expresan esa regularidad sin añadir interpretación.
  doctrine_reference: Exod 40:36 en su marco narrativo inmediato
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó "throughout all their journeys" a "in all their journeys" para reflejar con más naturalidad el hebreo. La versión española evita añadir una idea de duración continua y usa "en todos sus viajes", que corresponde directamente al valor distributivo del original.
  spanish_consistency_notes:
  - Se mantiene "tabernáculo" como término técnico estable en Éxodo.
  - Se preserva "los hijos de Israel" para reflejar la forma hebrea masculina plural y la decisión auditada del POB inglés.
  - '"Siempre que" refleja la iteración habitual del hebreo y armoniza con el imperfecto español "partían".'
  - No se introdujo "SEÑOR" ni otra sustitución para el nombre divino, pues este versículo no contiene el tetragrámaton.
