revisions:
- from: Ahora bien, ella llevaba una túnica adornada[a], porque así vestían las hijas vírgenes del rey. Entonces su sirviente la sacó afuera y cerró la puerta tras ella.
  to: Ahora bien, ella llevaba una túnica ricamente adornada[a], porque así vestían las hijas vírgenes del rey. Entonces su asistente la sacó afuera y atrancó la puerta tras ella.
  rationale: Se fortaleció la traducción de כְּתֹנֶת פַּסִּים con 'túnica ricamente adornada' para alinearla con la decisión inglesa final y con el carácter distintivo de la prenda. Se cambió 'su sirviente' por 'su asistente' para una expresión más natural en contexto cortesano. Se reemplazó 'cerró la puerta' por 'atrancó la puerta' para reflejar mejor נעל como acción de asegurar o trabar la puerta. La nota se simplificó para no repetir exactamente el texto principal y mantener las alternativas inciertas documentadas.
