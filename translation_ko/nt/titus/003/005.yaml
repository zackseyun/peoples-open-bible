id: TIT.3.5
reference: Titus 3:5
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: οὐκ ἐξ ἔργων τῶν ἐν δικαιοσύνῃ ⸀ἃ ἐποιήσαμεν ἡμεῖς ἀλλὰ κατὰ ⸂τὸ αὐτοῦ ἔλεος⸃ ἔσωσεν ἡμᾶς διὰ λουτροῦ παλιγγενεσίας καὶ ἀνακαινώσεως πνεύματος ἁγίου,
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/005.yaml
  text: not from works done in righteousness, which we ourselves did, but according to his mercy he saved us, through the washing of regeneration and renewal by the Holy Spirit,
  footnotes:
  - marker: a
    text: Or 'works done in justice.' The Greek word can mean 'righteousness' or 'justice'; in Pauline usage the main text keeps 'righteousness.'
    reason: lexical_alternative
  - marker: b
    text: '''Washing'' may refer to baptism, cleansing imagery, or both; the Greek itself does not require the translator to make that interpretive choice explicit in the main text.'
    reason: lexical_alternative
  - marker: c
    text: Or 'renewal of the Holy Spirit.' The Greek construction allows slightly different ways of relating 'Holy Spirit' to 'renewal.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그분께서 우리를 구원하셨습니다 — 우리가 의[a] 가운데서 행한 행위로부터가 아니라 그분의 자비를 따라, 거듭남의 씻음[b]과 성령의 새롭게 하심[c]을 통하여.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「정의 가운데서 행한 일들」. 헬라어 δικαιοσύνη는 「의」 또는 「정의」를 의미할 수 있으며, 바울적 용례에서는 「의」를 본문에 둔다.
    reason: lexical_alternative
  - marker: b
    text: 「씻음」은 세례나 정결의 상징, 또는 그 둘 모두를 가리킬 수 있다. 헬라어 자체는 번역자에게 그 해석상 결정을 본문에서 명시할 것을 요구하지 않는다.
    reason: lexical_alternative
  - marker: c
    text: 또는 「성령의 새롭게 하심」. 헬라어 구문은 「성령」과 「새롭게 하심」의 관계를 약간씩 다르게 옮길 여지를 둔다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἐξ ἔργων τῶν ἐν δικαιοσύνῃ
  english_pob_choice: not from works done in righteousness
  chosen_korean: 의 가운데서 행한 행위로부터가 아니라
  alternatives_korean:
  - 우리가 행한 의로운 일들이 근거가 아니라
  - 의롭게 행한 행위로부터가 아니라
  lexicon: BDAG
  rationale: ἐξ는 근거·기원의 어감. δικαιοσύνη는 글로서리 기본값 「의」.
- source_word: ἃ ἐποιήσαμεν ἡμεῖς
  english_pob_choice: which we ourselves did
  chosen_korean: 우리가 ~ 행한
  alternatives_korean:
  - 우리 자신이 행한
  - 우리가 친히 한
  lexicon: BDAG
  rationale: 강조적 1인칭 복수 ἡμεῖς. 우리 행위의 무공로성을 강조.
- source_word: κατὰ τὸ αὐτοῦ ἔλεος
  english_pob_choice: according to his mercy
  chosen_korean: 그분의 자비를 따라
  alternatives_korean:
  - 그분의 긍휼을 따라
  - 자신의 자비대로
  lexicon: BDAG
  rationale: ἔλεος는 「자비·긍휼」. 「자비」가 일반적이고 자연스럽다.
- source_word: ἔσωσεν ἡμᾶς
  english_pob_choice: he saved us
  chosen_korean: 우리를 구원하셨습니다
  alternatives_korean:
  - 우리를 건지셨습니다
  lexicon: BDAG
  rationale: σῴζω의 표준 등가어 「구원」.
- source_word: λουτροῦ παλιγγενεσίας
  english_pob_choice: the washing of regeneration
  chosen_korean: 거듭남의 씻음
  alternatives_korean:
  - 중생의 씻음
  - 거듭남의 목욕
  lexicon: BDAG
  rationale: παλιγγενεσία는 「다시 태어남」. 한국 교회 전통의 「중생」도 가능하나, 본 번역은 더 직접적인 「거듭남」을 택한다. λουτρόν은 「목욕·씻음」.
- source_word: ἀνακαινώσεως πνεύματος ἁγίου
  english_pob_choice: renewal by the Holy Spirit
  chosen_korean: 성령의 새롭게 하심
  alternatives_korean:
  - 성령에 의한 새로워짐
  - 성령의 갱신
  lexicon: BDAG
  rationale: ἀνακαίνωσις는 「새로워짐·갱신」. 「새롭게 하심」이 합쇼체와 어울리며 성령의 능동적 행위로 자연스럽게 옮긴다. πνεύματος ἁγίου는 글로서리 표준 「성령」.
