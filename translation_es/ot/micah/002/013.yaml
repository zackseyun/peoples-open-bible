  to: El que abre brecha[a] ha subido delante de ellos; ellos han abierto brecha y han pasado por la puerta, y han salido por ella. Su rey pasa delante de ellos[b], y Yahvé va al frente de ellos.
  rationale: Se conserva el sentido del borrador, pero se añade la nota interpretativa necesaria para reflejar la documentación inglesa y preservar la tensión teológica del original. Además, se suaviza el cierre a «al frente de ellos» para mayor naturalidad en español, sin pérdida semántica.
