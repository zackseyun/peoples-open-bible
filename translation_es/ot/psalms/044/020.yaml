translation:
  language: es
  text: Porque tú nos aplastaste en un lugar de chacales[b], y nos cubriste con oscuridad profunda[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con sombra de muerte».
    reason: lexical_alternative
  - marker: b
    text: «Chacales» es el sentido más probable en esta imagen de desolación; traducciones más antiguas suelen decir «dragones».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación previa. En español, «Porque» conserva bien la relación causal/discursiva sin sonar artificial.
- source_word: דִכִּיתָנוּ
  english_pob_choice: you crushed us
  chosen_spanish: nos aplastaste
  alternatives_spanish:
  - nos quebrantaste
  - nos trituraste
  - nos oprimiste
  lexicon: HALOT
  rationale: דכה expresa la idea de aplastar, quebrar o humillar. «Aplastaste» preserva la fuerza física eינטensiva del verbo sin desplazarlo a una lectura solo social o emocional.
- source_word: בִּמְקוֹם
  english_pob_choice: in a place of
  chosen_spanish: en un lugar de
  alternatives_spanish:
  - en el lugar de
  - en una región de
  - en un sitio de
  lexicon: HALOT
  rationale: La frase es indefinida y funciona como marco poético. «En un lugar de» refleja el constructo con naturalidad en español.
- source_word: תַּנִּים
  english_pob_choice: jackals
  chosen_spanish: chacales
  alternatives_spanish:
  - dragones
  - serpientes
  - monstruos marinos
  lexicon: HALOT
  rationale: En este contexto de desolación, la referencia zoológica más probable es a chacales. «Chacales» comunica el cuadro desértico mejor que los valores tradicionales menos probables.
- source_word: וַתְּכַס
  english_pob_choice: and covered
  chosen_spanish: y nos cubriste
  alternatives_spanish:
  - y cubriste sobre nosotros
  - y nos envolviste
  - y nos abrumaste
  lexicon: HALOT
  rationale: Se mantiene la metáfora concreta de cubrir. «Nos cubriste» sigue de cerca la imagen hebrea sin convertirla en una abstracción.
- source_word: בְצַלְמָוֶת
  english_pob_choice: with deep darkness
  chosen_spanish: con profunda oscuridad
  alternatives_spanish:
  - con sombra de muerte
  - con oscuridad profunda
  - con tinieblas
  lexicon: HALOT
  rationale: צַלְמָוֶת puede significar «sombra de muerte» o, idiomáticamente, oscuridad profunda. En el cuerpo principal, «profunda oscuridad» preserva el sentido probable y la ambigüedad lexical; la alternativa tradicional queda en nota.
theological_decisions:
- issue: Sentido de בְצַלְמָוֶת
  english_pob_reading: deep darkness, with a footnote preserving shadow of death
  chosen_spanish_reading: profunda oscuridad, con nota que preserva «sombra de muerte»
  alternative_spanish_readings:
  - sombra de muerte
  - tinieblas profundas
  - oscuridad espesa
  rationale: La expresión puede leerse como una imagen de oscuridad intensa sin forzar un matiz teológico específico sobre la muerte. Mantener la alternativa tradicional en nota conserva la tensión léxica documentada por el texto fuente y el audit trail inglés.
  doctrine_reference: Preservar ambigüedad lexical sin resolverla indebidamente.
translation_notes:
  revision_awareness: El rastro de revisión inglés indica que no hubo cambios recientes y que la lectura aprobada se mantuvo estable; esta versión española sigue esa decisión, conservando «chacales» y «profunda oscuridad» con notas alternativas para la ambigüedad lexical.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda; aquí no aparecen.
  - Se mantiene el paralelismo poético hebreo con una estructura simple y directa.
  - Las notas distinguen la alternativa lexical de צַלְמָוֶת y la identificación zoológica de תַּנִּים.
  - No se introduce lenguaje eclesiástico ajeno al texto; se conserva el registro bíblico sobrio.
