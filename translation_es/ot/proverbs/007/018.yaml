review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: invitación inicial, metáfora de saciarse/beber, duración temporal hasta la mañana y goce mutuo erótico. Sin embargo, «con amores» en la cláusula final suena poco natural en español bíblico actual y no comunica con claridad la fuerza de בָּאֳהָבִים. Además, las notas al pie no preservan la alternativa importante documentada en el inglés para el primer hemistiquio («caricias» / expresión más concreta del amor erótico) ni para la frase final («regocijémonos/recreémonos en amor»).'
  spanish_quality_summary: El español es generalmente claro y digno. «Bebamos a saciedad de amores» funciona, aunque es algo literario; en contexto poético sigue siendo aceptable. El punto principal a reparar es «deleitémonos con amores», que resulta forzado e idiomáticamente débil. «Deleitémonos con amor» o «recreémonos en amor» suena más natural; la primera mantiene mejor la cercanía con la revisión inglesa.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones léxicas principales son coherentes con el expediente inglés: לְכָה = «Ven», נִרְוֶה = «bebamos a saciedad», דֹדִים = «amores», נִתְעַלְּסָה = «deleitémonos». La excepción necesaria es בָּאֳהָבִים: aunque el plural hebreo existe, en español «con amor» comunica mejor el sentido sin expansión indebida; la alternativa «con caricias» puede preservarse en nota por el matiz erótico concreto.'
  issues:
  - severity: medium
    issue: «deleitémonos con amores» es poco natural en español
    rationale: Aunque intenta conservar el plural hebreo, la frase suena extraña y menos inteligible para lectores hispanos. «Con amor» preserva el sentido mejor en español idiomático.
  - severity: medium
    issue: Falta nota léxica sobre el sentido sensual más concreto de דֹדִים
    rationale: El expediente inglés conserva la alternativa «caresses». Dado que «amores» puede sonar abstracto en español, conviene preservar esa posibilidad en nota.
  - severity: low
    issue: La nota b actual solo comenta la frase temporal y no la alternativa importante de la cláusula final
    rationale: El inglés auditado usa la nota b para señalar una alternativa de la frase final («revel in love»). En la revisión española conviene reflejar esa información donde corresponde.
