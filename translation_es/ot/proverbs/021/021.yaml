translation:
  language: es
  text: El que persigue la rectitud[a] y el amor leal[b] hallará vida, rectitud[c] y honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia» en una o ambas apariciones; el término hebreo puede incluir tanto rectitud personal como conducta justa.
    reason: lexical_alternative
  - marker: b
    text: «Amor leal» traduce el hebreo hesed, que también puede traducirse «bondad», «misericordia» o «amor fiel».
    reason: lexical_alternative
  - marker: c
    text: La segunda «rectitud» también puede entenderse como «vindicación» en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: רֹדֵף
  english_pob_choice: pursues
  chosen_spanish: persigue
  alternatives_spanish:
  - busca
  - sigue tras
  - corre tras
  lexicon: HALOT
  rationale: El participio expresa una acción continua y activa. «Persigue» conserva ese impulso verbal en español sin sonar demasiado rígido; «busca» sería más débil y menos enérgico.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justeza
  - righteousness
  lexicon: HALOT
  rationale: Aquí el término hebreo puede abarcar tanto justicia como conducta recta. En español, «justicia» comunica bien la amplitud moral y encaja con el paralelismo sapiencial; se evita «rectitud» porque suena más abstracto en este proverbio.
- source_word: חֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor leal
  alternatives_spanish:
  - misericordia
  - bondad
  - amor constante
  lexicon: HALOT
  rationale: חֶסֶד tiene una densidad de lealtad pactal y amor fiel que «amor leal» refleja con más precisión que «misericordia» o «bondad». Mantiene la fuerza relacional sin reducir el término.
- source_word: יִמְצָא
  english_pob_choice: will find
  chosen_spanish: hallará
  alternatives_spanish:
  - encontrará
  - va a encontrar
  lexicon: HALOT
  rationale: El imperfecto expresa resultado proverbial. «Hallará» es natural, digno y conserva la idea de consecuencia segura sin sobrecargar el tono.
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vidas
  - vida verdadera
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, el uso idiomático apunta a un singular de sentido general. «Vida» es la equivalencia natural en español y evita forzar el plural.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - vindicación
  lexicon: HALOT
  rationale: Se mantiene la repetición léxica del hebreo con la misma palabra española. En contexto sapiencial puede entenderse como el estado de ser reconocido como justo o como la justicia misma; «justicia» conserva esa ambigüedad útil.
- source_word: כָבוֹד
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  - estima
  - riqueza
  lexicon: HALOT
  rationale: En literatura sapiencial, כָבוֹד puede incluir honor, prestigio o incluso matices de prosperidad, pero «honor» es la opción más equilibrada para la tríada final sin introducir un sesgo material.
theological_decisions:
- issue: Sentido de צְדָקָה en ambos miembros del versículo
  english_pob_reading: righteousness in both occurrences
  chosen_spanish_reading: justicia en ambas apariciones
  alternative_spanish_readings:
  - rectitud en una o ambas apariciones
  - vindicación en la segunda aparición
  rationale: La repetición del hebreo merece preservarse en español para no borrar la simetría del proverbio. «Justicia» mantiene el campo semántico amplio sin resolver prematuramente la posible tensión entre cualidad moral y resultado forense.
  doctrine_reference: 'DOCTRINE.md: Consistency of key terms, or documented exception'
translation_notes:
  revision_awareness: Coincide con el último pase de revisión disponible; no hay cambios posteriores reportados y el resumen de comprobación indica alta concordancia sin incidencias.
  spanish_consistency_notes:
  - Se mantuvo una sola opción para חֶסֶד como «amor leal» para conservar consistencia léxica.
  - Se preservó la repetición de צְדָקָה con «justicia» en ambas posiciones.
  - Se evitó «SEÑOR» o sustitutos teológicos no presentes en este versículo.
  - El tono es sobrio y publicable, con sintaxis natural en español y sin paráfrasis añadidas.
