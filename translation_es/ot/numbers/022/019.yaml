translation:
  language: es
  text: Ahora, por favor, quédense aquí esta noche[a], ustedes también, para que yo sepa qué más me dirá Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «qué otra cosa me dirá Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  lexicon: HALOT
  rationale: Introduce una nueva instrucción en el discurso; en español, «Ahora» es natural y conserva el valor discursivo del hebreo sin sobrecargar el texto.
- source_word: שְׁבוּ נָא
  english_pob_choice: please stay
  chosen_spanish: por favor, quédense
  alternatives_spanish:
  - por favor, permanezcan
  - por favor, quédense aquí
  lexicon: HALOT
  rationale: יׁשׁב aquí tiene sentido de permanecer o quedarse, no de sentarse. «Quédense» comunica bien la idea idiomática y el valor cortés de נָא con «por favor».
- source_word: בָזֶה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: HALOT
  rationale: El sentido es locativo. «Aquí» es breve, natural y fiel al contexto.
- source_word: גַּם אַתֶּם
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - también ustedes
  - ustedes igualmente
  lexicon: HALOT
  rationale: 'Conserva el énfasis aditivo: estos mensajeros, igual que los anteriores, deben permanecer. «Ustedes también» suena natural en español.'
- source_word: הַלָּיְלָה
  english_pob_choice: tonight
  chosen_spanish: esta noche
  alternatives_spanish:
  - la noche
  - esta noche misma
  lexicon: HALOT
  rationale: El acusativo temporal apunta a la noche inmediata; «esta noche» es la equivalencia idiomática más clara en español.
- source_word: וְאֵדְעָה
  english_pob_choice: so that I may know
  chosen_spanish: para que yo sepa
  alternatives_spanish:
  - y sabré
  - para saber
  lexicon: HALOT
  rationale: La cohortativa expresa propósito. «Para que yo sepa» preserva la finalidad mejor que un simple futuro.
- source_word: מַה יֹּסֵף
  english_pob_choice: what more
  chosen_spanish: qué más
  alternatives_spanish:
  - qué otra cosa
  - qué más todavía
  lexicon: HALOT
  rationale: יסף expresa adición; «qué más» reproduce bien la idea de algo adicional sin forzar el español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se mantiene la convención del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre propio divino en vez del sustituto «SEÑOR».'
- source_word: דַּבֵּר עִמִּי
  english_pob_choice: will say to me
  chosen_spanish: hablará conmigo
  alternatives_spanish:
  - me hablará
  - dirá algo a mí
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hablar con/ conmigo». En español, «hablará conmigo» conserva la relación directa y evita reducir indebidamente el matiz conversacional a un mero «decir».
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: La pauta del proyecto exige transliterar el Tetragrámaton como «Yahvé» en el texto principal. Esto mantiene visible el nombre pactual de Dios y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo de Números 22:19 y está alineado con la auditoría inglesa: conserva el tono cortés de נָא, el valor locativo de בָזֶה, la finalidad de וְאֵדְעָה y el nombre divino יהוה como «Yahvé». No se introdujeron cambios de revisión en la fuente inglesa; por eso no se reflejan variaciones textuales adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en lugar de «SEÑOR» para mantener consistencia con la terminología del proyecto.
  - «Quédense» traduce el sentido idiomático de שְׁבוּ sin calco literal de «sentarse».
  - La frase «hablará conmigo» conserva el matiz conversacional del hebreo, mientras que la nota ofrece la alternativa «qué otra cosa hablará Yahvé conmigo».
