translation:
  language: es
  text: Cuatro mesas de este lado y cuatro mesas de aquel lado[a], al costado[b] de la puerta—ocho mesas; sobre ellas degollaban[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “de un lado y del otro lado”.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “al hombro de la puerta”, un modismo para el costado o flanco de la estructura de la puerta.
    reason: cultural_note
  - marker: c
    text: O “sacrificaban”; el hebreo imperfecto puede describir la acción de manera general o habitual, o el uso previsto de las mesas.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַרְבָּעָה
  english_pob_choice: Four
  chosen_spanish: Cuatro
  alternatives_spanish:
  - Cuatro
  lexicon: HALOT
  rationale: Número cardinal simple; se traduce de manera directa y natural al español.
- source_word: שֻׁלְחָנוֹת
  english_pob_choice: tables
  chosen_spanish: mesas
  alternatives_spanish:
  - mesas de sacrificio
  - mesas para degollar
  lexicon: HALOT
  rationale: El sustantivo básico es 'mesa'; la función de sacrificio la explicita la cláusula final. Mantengo el término simple para no incorporar la función al sustantivo más allá de lo que el hebreo dice.
- source_word: מִפֹּה ... מִפֹּה
  english_pob_choice: on this side ... on that side
  chosen_spanish: de este lado ... de aquel lado
  alternatives_spanish:
  - a este lado ... a aquel lado
  - en un lado ... en el otro lado
  lexicon: HALOT
  rationale: La pareja deíctica marca lados opuestos; 'de este lado / de aquel lado' suena natural en español y conserva el contraste espacial.
- source_word: לְכֶתֶף הַשָּׁעַר
  english_pob_choice: by the side of the gate
  chosen_spanish: junto al lado de la puerta
  alternatives_spanish:
  - junto al costado de la puerta
  - al hombro de la puerta
  lexicon: HALOT
  rationale: כָּתֵף literalmente es 'hombro', pero en contexto arquitectónico designa el costado o flanco. 'Junto al lado de la puerta' transmite el modismo sin sonar forzado en español.
- source_word: שְׁמוֹנָה
  english_pob_choice: eight
  chosen_spanish: ocho
  alternatives_spanish:
  - ocho
  lexicon: HALOT
  rationale: Cardinal sumativo directo que totaliza los dos grupos de cuatro.
- source_word: אֲלֵיהֶם
  english_pob_choice: on them
  chosen_spanish: sobre ellas
  alternatives_spanish:
  - encima de ellas
  - en ellas
  lexicon: HALOT
  rationale: La preposición con sufijo indica la superficie/ubicación de la acción de degollar respecto de las mesas; 'sobre ellas' es natural y fiel.
- source_word: יִשְׁחָטוּ
  english_pob_choice: they slaughtered
  chosen_spanish: degollaban
  alternatives_spanish:
  - degollaban allí
  - sacrificaban
  - degollaban / sacrificaban
  lexicon: HALOT
  rationale: El verbo שָׁחַט es 'degollar' o 'matar por degüello', y en contexto cultual puede implicar el sacrificio. 'Degollaban' conserva la fuerza lexical concreta sin perder el matiz ritual; el imperfecto descriptivo se expresa en castellano con imperfecto.
theological_decisions:
- issue: Función cultual de las mesas y valor del verbo de sacrificio
  english_pob_reading: The tables are ordinary 'tables' in wording, but the final clause shows that slaughter took place on them; the imperfect is descriptive/customary rather than a single past event.
  chosen_spanish_reading: Las mesas siguen siendo 'mesas' en el texto principal, y la acción final se expresa con un imperfecto descriptivo ('degollaban'), dejando que la función cultual quede dada por el contexto inmediato.
  alternative_spanish_readings:
  - mesas para sacrificio
  - sobre ellas sacrificaban
  - sobre ellas degollaban
  rationale: No se debe convertir el sustantivo en una función que el hebreo no explicita. Al mismo tiempo, el verbo debe conservar la realidad sacrificial del contexto del templo. El imperfecto español reproduce bien el carácter descriptivo/habitual de la escena visionaria.
  doctrine_reference: Ezequiel 40:41; cf. el contexto arquitectónico-cultual de la visión del templo en Ez 40–48
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que ajustó el imperfecto a un pasado descriptivo ('they slaughtered'). En español se optó por el imperfecto 'degollaban' para reflejar mejor el valor descriptivo/habitual del hebreo en una visión arquitectónica-cultual, sin introducir futuricidad.
  spanish_consistency_notes:
  - Se mantuvo 'mesas' en vez de 'mesas de sacrificio' para respetar la simplicidad léxica del sustantivo hebreo.
  - Se tradujo כָּתֵף con una expresión idiomática española que preserve el sentido espacial sin calco rígido.
  - Se usó 'degollaban' en lugar de 'sacrificaban' para conservar la concreción del verbo hebreo שָׁחַט.
  - La puntuación con raya reproduce la segmentación del original inglés y facilita la lectura del total 'ocho mesas'.
