translation:
  language: es
  text: Así que los levitas nombraron[a] a Hemán hijo de Joel, y de entre sus hermanos a Asaf hijo de Berequías, y de entre los hijos de Merari[b], sus hermanos, a Etán hijo de Cusaías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «establecieron» / «pusieron en su cargo»; el verbo hebreo puede significar causar que alguien quede en una función asignada.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de entre los hijos de Merari»; es decir, del clan merarita.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּעֲמִידוּ
  english_pob_choice: appointed
  chosen_spanish: nombraron
  alternatives_spanish:
  - designaron
  - establecieron
  - pusieron en su cargo
  lexicon: HALOT
  rationale: El verbo causativo de עמד aquí expresa colocar a alguien en una función asignada. En español, «nombraron» comunica una designación formal y natural en un contexto de organización levítica sin volverse demasiado técnico o literal.
- source_word: הַלְוִיִּם
  english_pob_choice: the Levites
  chosen_spanish: los levitas
  alternatives_spanish:
  - los levíticos
  lexicon: HALOT
  rationale: Es la designación tribal/clánica estándar. «Levitas» es la forma natural y fiel en español, manteniendo el referente colectivo.
- source_word: הֵימָן
  english_pob_choice: Heman
  chosen_spanish: Hemán
  alternatives_spanish:
  - Heman
  lexicon: transliteration standard
  rationale: Se translitera el nombre propio al uso español, con acento gráfico para lectura natural.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  lexicon: HALOT
  rationale: Se conserva la relación genealógica explícita del hebreo con la forma española habitual.
- source_word: יוֹאֵל
  english_pob_choice: Joel
  chosen_spanish: Joel
  lexicon: transliteration standard
  rationale: Nombre propio conservado en su forma habitual en español.
- source_word: וּמִן אֶחָיו
  english_pob_choice: and from his brothers
  chosen_spanish: y de entre sus hermanos
  alternatives_spanish:
  - y de sus hermanos
  - y de entre los hermanos de él
  lexicon: HALOT
  rationale: מִן marca selección dentro de un grupo. «De entre» preserva ese matiz de escogencia; «sus hermanos» mantiene el vínculo relacional de forma natural.
- source_word: אָסָף
  english_pob_choice: Asaph
  chosen_spanish: Asaf
  alternatives_spanish:
  - Asaf
  lexicon: transliteration standard
  rationale: Se usa la transliteración española usual del nombre propio.
- source_word: בֶּרֶכְיָהוּ
  english_pob_choice: Berechiah
  chosen_spanish: Berequías
  alternatives_spanish:
  - Berequiau
  - Berequíasu
  lexicon: transliteration standard
  rationale: Nombre propio adaptado al uso castellano bíblico, con forma reconocible y fluida en español.
- source_word: וּמִן בְּנֵי מְרָרִי
  english_pob_choice: and from the sons of Merari
  chosen_spanish: y de entre los hijos de Merari
  alternatives_spanish:
  - y de los hijos de Merari
  - y de entre los meraritas
  lexicon: HALOT
  rationale: Se mantiene la expresión genealógica literal «hijos de Merari», evitando sustituirla por una etnónimo/clánico más interpretativo. «De entre» conserva el matiz de selección.
- source_word: אֲחֵיהֶם
  english_pob_choice: their brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - sus hermanos
  - a sus parientes
  lexicon: HALOT
  rationale: El término fraterno se conserva porque el hebreo usa el lenguaje de parentesco para referirse a miembros del mismo grupo levítico. El giro con «a» se ajusta a la sintaxis española tras el verbo de nombramiento.
- source_word: אֵיתָן
  english_pob_choice: Ethan
  chosen_spanish: Etán
  alternatives_spanish:
  - Ethan
  lexicon: transliteration standard
  rationale: Nombre propio en forma española habitual con acento para la pronunciación.
- source_word: קוּשָׁיָהוּ
  english_pob_choice: Kushaiah
  chosen_spanish: Cusaías
  alternatives_spanish:
  - Cushayáhu
  - Kusaías
  lexicon: transliteration standard
  rationale: Se adopta una transliteración española legible y coherente con el patrón de nombres hebreos terminados en -yahu / -yahú, sin ocultar el nombre propio.
theological_decisions:
- issue: Relación clánica expresada por «hijos de Merari» y «sus hermanos»
  english_pob_reading: The English preserves both the literal clan expression and a note clarifying that this means the Merarite clan.
  chosen_spanish_reading: Se conserva «hijos de Merari» y «sus hermanos», con nota explicativa sobre el linaje merarita.
  alternative_spanish_readings:
  - «meraritas»
  - «parientes»
  rationale: No se sustituye la construcción genealógica del hebreo por un etnónimo más interpretativo, porque el texto enfatiza procedencia y parentesco dentro de la organización levítica. La nota aclara el sentido colectivo sin borrar la literalidad.
  doctrine_reference: Números 3:33-37; 1 Crónicas 6:44-47
- issue: Verbo de investidura en la organización levítica
  english_pob_reading: appointed / set in place / stationed
  chosen_spanish_reading: nombraron
  alternative_spanish_readings:
  - establecieron
  - pusieron en su cargo
  - designaron
  rationale: El hebreo permite la idea de colocar a alguien en una función asignada. «Nombraron» transmite la investidura formal con naturalidad en español y mantiene el sentido de asignación de oficio sin añadir connotaciones eclesiásticas ajenas al contexto.
  doctrine_reference: 1 Crónicas 15:16-17
translation_notes:
  revision_awareness: El inglés POB revisado eliminó comas innecesarias para una lectura más fluida, sin cambiar la estructura fuente. La versión española sigue esa misma línea, manteniendo un solo encadenamiento narrativo y la secuencia genealógica del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma por defecto solo cuando aparezca el Tetragrámaton o una referencia explícita al nombre divino; este versículo no contiene esa forma.
  - Se prefirió «levitas» y «hijos de Merari» para conservar el tejido clánico del texto hebreo, en vez de una simplificación interpretativa.
  - Los nombres propios se transliteran en formas españolas habituales y coherentes con la lectura pública.
  - «De entre» traduce el valor selectivo de מִן sin volver la frase rígida en español.
