revisions:
- from: 'Y ve, entra a los desterrados, a los hijos de tu pueblo, y háblales y diles[a]: «Así dice el Señor Yahvé: “Si escuchan, o si dejan de hacerlo”».'
  to: 'Y ve, ve a los desterrados, a los hijos[a] de tu pueblo, y háblales y diles: «Así dice el Señor Yahvé: “Ya sea que escuchen o que se nieguen”».'
  rationale: Se corrigió el anclaje de la nota para que corresponda a «hijos». Se sustituyó «entra a los desterrados» por «ve a los desterrados» para un español más natural sin perder la secuencia de movimiento del hebreo. La cláusula final se reformuló como «Ya sea que escuchen o que se nieguen» para reflejar el valor alternativo de אִם...וְאִם y el sentido contextual de חדל como rehusar atender, evitando la vaguedad de «dejan de hacerlo».
