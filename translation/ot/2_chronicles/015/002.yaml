id: 2CH.15.2
reference: 2 Chronicles 15:2
source:
  edition: WLC
  text: וַ/יֵּצֵא֮ לִ/פְנֵ֣י אָסָא֒ וַ/יֹּ֣אמֶר ל֔/וֹ שְׁמָע֕וּ/נִי אָסָ֖א וְ/כָל יְהוּדָ֣ה וּ/בִנְיָמִ֑ן יְהוָ֤ה עִמָּ/כֶם֙ בִּֽ/הְיֽוֹתְ/כֶ֣ם עִמּ֔/וֹ וְ/אִֽם תִּדְרְשֻׁ֨/הוּ֙ יִמָּצֵ֣א לָ/כֶ֔ם וְ/אִם תַּעַזְבֻ֖/הוּ יַעֲזֹ֥ב אֶתְ/כֶֽם־־־׃ס
translation:
  text: 'He went out to meet Asa and said to him[a], “Hear me, Asa, and all Judah and Benjamin: Yahweh is with you while you are with him. If you seek him, he will be found by you; but if you forsake him, he will forsake you.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more simply, “he will be found by you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  chosen: He went out
  alternatives:
  - He came out
  lexicon: HALOT
  rationale: Qal wayyiqtol of יצא, a straightforward narrative advance. 'Went out' is the most natural English rendering in context.
- source_word: לִפְנֵי אָסָא
  chosen: to meet Asa
  alternatives:
  - before Asa
  - in front of Asa
  lexicon: HALOT
  rationale: Literally 'before Asa,' but in this motion context the idiom means going out to meet or confront someone. 'To meet Asa' conveys the sense in readable English without over-paraphrase.
- source_word: שְׁמָעוּנִי
  chosen: Hear me
  alternatives:
  - Listen to me
  lexicon: HALOT
  rationale: Imperative plural with 1cs suffix. 'Hear me' preserves the direct, prophetic tone; 'listen to me' is possible but slightly softer.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: עִמָּכֶם ... עִמּוֹ
  chosen: is with you ... you are with him
  alternatives:
  - is with you ... you are with the LORD
  lexicon: HALOT
  rationale: The repeated עם construction is preserved for rhetorical symmetry. The pronoun 'him' naturally refers back to the LORD and keeps the Hebrew parallelism compact.
- source_word: בִּהְיוֹתְכֶם
  chosen: while you are
  alternatives:
  - when you are
  - in your being
  lexicon: HALOT
  rationale: Infinitive construct of היה with prefixed ב marks contemporaneous time. 'While you are' best captures the durative conditional sense.
- source_word: תִּדְרְשֻׁהוּ
  chosen: seek him
  alternatives:
  - inquire of him
  - seek after him
  lexicon: HALOT
  rationale: דרש in covenantal/religious contexts commonly means to seek God, not merely to ask him a question. 'Seek him' is the standard and clearest rendering.
- source_word: יִמָּצֵא לָכֶם
  chosen: he will let himself be found by you
  alternatives:
  - he will be found by you
  - you will find him
  lexicon: HALOT
  rationale: 'Niphal of מצא is passive/reflexive in form: ''be found.'' ''He will let himself be found by you'' brings out the theological nuance that divine accessibility is granted, while remaining faithful to the Hebrew voice. A simpler alternative is preserved in a footnote.'
- source_word: תַּעַזְבֻהוּ ... יַעֲזֹב אֶתְכֶם
  chosen: if you forsake him, he will forsake you
  alternatives:
  - if you abandon him, he will abandon you
  lexicon: HALOT
  rationale: עזב in covenant contexts is well rendered 'forsake.' Repeating the same English verb preserves the Hebrew wordplay and reciprocity.
