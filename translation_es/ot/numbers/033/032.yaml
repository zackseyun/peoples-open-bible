translation:
  language: es
  text: Salieron de Bene-jaacán[a] y acamparon en Hor-haggidgad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Bene-jaacán» se conserva como nombre de lugar, aunque la forma hebrea literalmente significa «hijos de Jaacán».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Partieron
  - Se pusieron en marcha
  lexicon: HALOT
  rationale: En la fórmula itineraria del desierto, נסע expresa el movimiento de partir de una estación. En español, «salieron» comunica de manera natural ese inicio de trayecto sin perder el valor narrativo de la secuencia.
- source_word: מִבְּנֵי יַעֲקָן
  english_pob_choice: from Bene-jaakan
  chosen_spanish: de Bene-jaacán
  alternatives_spanish:
  - de los hijos de Jaacán
  - de Bene-yaacán
  lexicon: HALOT
  rationale: El contexto de itinerario favorece tratar la expresión como topónimo. Por eso se conserva la transliteración, en vez de traducir literalmente «hijos de Jaacán», que aquí sería menos probable como sentido principal.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: acamparon
  alternatives_spanish:
  - y acamparon
  - y levantaron el campamento
  lexicon: HALOT
  rationale: חנה en estas listas de ruta significa establecer el campamento. «Acamparon» es claro, natural y fiel a la función de fórmula itineraria.
- source_word: בְּחֹר הַגִּדְגָּד
  english_pob_choice: at Hor-haggidgad
  chosen_spanish: en Hor-haggidgad
  alternatives_spanish:
  - en Hór-haggidgad
  - en Hor Haguidgad
  lexicon: HALOT
  rationale: Se mantiene el nombre propio transliterado como topónimo. La preposición בְּ se expresa con «en», que es la forma más natural en español para ubicar un campamento.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto base mantiene alta concordancia con el hebreo y no requiere ajustes adicionales. La versión española sigue esa lectura estable, preservando la naturaleza itineraria y los dos topónimos.
  spanish_consistency_notes:
  - Se usa «acamparon» para mantener el tono de lista de ruta del hebreo.
  - Se conservan los nombres propios con transliteración consistente y sin introducir equivalencias interpretativas innecesarias.
  - La nota al pie recoge la tensión léxica entre el valor literal de la forma y su función probable como topónimo.
