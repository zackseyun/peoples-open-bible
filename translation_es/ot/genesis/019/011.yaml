- from: Y golpearon a los hombres que estaban a la entrada de la casa con ceguera[a], desde el más pequeño hasta el más grande, y se agotaron tratando de encontrar la entrada.
  to: Y golpearon a los hombres que estaban a la entrada de la casa con ceguera[a], del menor al mayor, y se agotaron tratando de encontrar la puerta.
  rationale: Se ajusta el merismo a una expresión española más natural («del menor al mayor») y se cambia el último פֶּתַח a «la puerta» para dar una referencia más concreta a la abertura que no podían localizar, evitando una repetición menos precisa de «entrada». La nota se mantiene con leve pulido estilístico.
