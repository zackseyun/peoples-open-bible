    reason: lexical_alternative
  - marker: c
    text: Or 'because of arrogance.'
    reason: lexical_alternative
  - marker: d
    text: 'The Hebrew intensifies the verb: ''weeping, it will weep.'''
    reason: lexical_alternative
  - marker: e
    text: Or 'the LORD's flock.'
    reason: lexical_alternative
