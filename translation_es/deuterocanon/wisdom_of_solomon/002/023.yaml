translation:
  language: es
  text: Porque Dios creó al hombre para la incorruptibilidad[a], y lo hizo a imagen de su propia naturaleza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la inmortalidad» o «para la imperdurabilidad». El término griego incluye la idea de no estar sujeto a corrupción, decadencia o muerte.
    reason: lexical_alternative
  - marker: b
    text: O «a imagen de su propia distintividad» o «a imagen de su propio ser». La frase griega es inusual y admite más de una traducción cercana.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκτισε
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - hizo
  - formó
  lexicon: BDAG
  rationale: κτίζω aquí expresa traer a la existencia; «creó» es la opción española más natural y conserva el sentido de acto creador.
- source_word: τὸν ἄνθρωπον
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - el ser humano
  lexicon: BDAG
  rationale: El singular con artículo funciona de modo representativo para la humanidad. «El hombre» conserva esa fuerza antropológica y el eco de Génesis sin diluirlo en un plural abstracto.
- source_word: ἐπʼ ἀφθαρσίᾳ
  english_pob_choice: for incorruptibility
  chosen_spanish: para la incorruptibilidad
  alternatives_spanish:
  - para la inmortalidad
  - para la imperdurabilidad
  lexicon: BDAG
  rationale: ἀφθαρσία abarca la idea de no estar sujeto a corrupción, decadencia ni muerte. «Incorruptibilidad» mantiene ese alcance sin reducirlo solo a duración sin fin.
- source_word: εἰκόνα
  english_pob_choice: in the image of
  chosen_spanish: a imagen de
  alternatives_spanish:
  - en la imagen de
  - como imagen de
  lexicon: BDAG
  rationale: La frase griega exige expresar la relación de imagen; en español, «a imagen de» es la formulación más fiel y natural, y preserva la resonancia bíblica.
- source_word: τῆς ἰδίας ἰδιότητος
  english_pob_choice: of his own nature
  chosen_spanish: de su propia naturaleza
  alternatives_spanish:
  - de su propia distinción
  - de su propio ser
  lexicon: LSJ
  rationale: ἰδιότης puede referir una cualidad o propiedad propia. «Naturaleza» comunica bien que la imagen en el hombre refleja algo propio de Dios, sin borrar la rareza de la expresión griega.
- source_word: ἐποίησεν αὐτόν
  english_pob_choice: made him
  chosen_spanish: lo hizo
  alternatives_spanish:
  - lo formó
  - lo creó
  lexicon: BDAG
  rationale: ποιέω aquí significa simplemente hacer. «Lo hizo» mantiene la paralelismo y evita sobrecargar el verbo con matices no requeridos por el texto.
theological_decisions:
- issue: Alcance antropológico de τὸν ἄνθρωπον
  english_pob_reading: Representative singular 'man' referring to humanity
  chosen_spanish_reading: Singular representativo «el hombre» que se refiere a la humanidad
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  rationale: El versículo formula una afirmación general sobre el ser humano, pero en singular representativo. «El hombre» preserva esa forma y su conexión con la teología de la creación.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; parallel to אָדָם as a representative singular.
- issue: Sentido de ἀφθαρσία
  english_pob_reading: incorruptibility
  chosen_spanish_reading: incorruptibilidad
  alternative_spanish_readings:
  - inmortalidad
  - imperdurabilidad
  rationale: El término griego incluye la idea de no estar sujeto a corrupción o decadencia, no solo de vivir para siempre. «Incorruptibilidad» conserva mejor esa amplitud conceptual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3, 6.
- issue: Frase inusual τῆς ἰδίας ἰδιότητος
  english_pob_reading: his own nature
  chosen_spanish_reading: su propia naturaleza
  alternative_spanish_readings:
  - su propia distinción
  - su propio ser
  rationale: La expresión es rara y admite varias cercanías de sentido. «Naturaleza» comunica que la imagen humana remite a algo propio de Dios, sin convertir la frase en una paráfrasis excesiva.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail inglés, que precisó la relación de «imagen» en la segunda cláusula y mantuvo la elección de «incorruptibilidad» como término principal. También preserva la tensión léxica de ἀφθαρσία e ἰδιότης mediante notas alternativas sin suavizarla.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se sustituye por una fórmula litúrgica.
  - «El hombre» conserva el singular representativo del griego, en línea con la política del proyecto.
  - «Incorruptibilidad» se usa como término técnico principal; las alternativas quedan en nota para no perder el rango semántico.
  - «A imagen de» expresa εἰκόνα de forma natural en español y conserva el eco bíblico de Génesis.
  - «Su propia naturaleza» evita traducir ἰδιότης con un término demasiado abstracto o demasiado fuerte como «ser» sin justificación adicional.
