translation:
  language: es
  text: Tenía treinta y dos años cuando comenzó a reinar[a], y reinó ocho años en Jerusalén. Luego se fue sin pesar, y lo sepultaron en la ciudad de David, pero no en los sepulcros de los reyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se fue sin ser deseado», preservando el sentido más literal de la expresión hebrea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שְׁלֹשִׁים וּשְׁתַּיִם
  english_pob_choice: thirty-two years old
  chosen_spanish: treinta y dos años
  alternatives_spanish:
  - un hijo de treinta y dos años
  lexicon: HALOT
  rationale: La fórmula hebrea de edad es idiomática. En español, 'tenía treinta y dos años' comunica el sentido natural sin conservar de manera artificial 'hijo de'.
- source_word: בְמָלְכוֹ
  english_pob_choice: when he began to reign
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando llegó a reinar
  - al comenzar a reinar
  lexicon: HALOT
  rationale: El valor temporal de la forma marca el inicio del reinado; 'comenzó a reinar' mantiene el matiz de acceso al trono y suena natural en español.
- source_word: וּשְׁמוֹנֶה שָׁנִים מָלַךְ
  english_pob_choice: he reigned eight years
  chosen_spanish: reinó ocho años
  alternatives_spanish:
  - fue rey ocho años
  lexicon: HALOT
  rationale: מָלַךְ expresa reinar o ser rey; 'reinó ocho años' es la equivalencia directa y más natural en español.
- source_word: וַיֵּלֶךְ
  english_pob_choice: he departed
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - murió
  lexicon: HALOT
  rationale: En este contexto funerario, el hebreo usa un eufemismo para la muerte. 'Se fue' conserva ese eufemismo en español sin hacer explícito 'murió'.
- source_word: בְּלֹא חֶמְדָּה
  english_pob_choice: with no regret
  chosen_spanish: sin ser deseado
  alternatives_spanish:
  - sin deseo
  - sin aprecio
  - sin luto
  lexicon: HALOT
  rationale: חֶמְדָּה puede implicar deseo, aprecio o algo valioso. La construcción hebrea aquí sugiere que su muerte no fue lamentada ni echada de menos; 'sin ser deseado' preserva la literalidad básica y el tono del POB inglés con su nota alternativa.
- source_word: וַיִּקְבְּרֻהוּ
  english_pob_choice: they buried him
  chosen_spanish: lo sepultaron
  alternatives_spanish:
  - lo enterraron
  - lo dieron sepultura
  lexicon: HALOT
  rationale: El verbo es el de dar sepultura; 'sepultaron' es solemne y adecuado al contexto real y funerario.
- source_word: בְּעִיר דָּוִיד
  english_pob_choice: in the city of David
  chosen_spanish: en la Ciudad de David
  alternatives_spanish:
  - en la ciudad de David
  lexicon: HALOT
  rationale: Es un nombre geográfico consolidado; la capitalización en español ayuda a reconocer la designación histórica del área funeraria de Jerusalén.
- source_word: וְלֹא בְּקִבְרוֹת הַמְּלָכִים
  english_pob_choice: but not in the tombs of the kings
  chosen_spanish: pero no en los sepulcros de los reyes
  alternatives_spanish:
  - pero no en las tumbas de los reyes
  - pero no en las sepulturas de los reyes
  lexicon: HALOT
  rationale: קִבְרוֹת puede ser 'sepulcros', 'tumbas' o 'graves'. 'Sepulcros' encaja bien con el contexto regnal y conserva el contraste con la sepultura real.
theological_decisions:
- issue: El giro eufemístico para la muerte
  english_pob_reading: Then he departed
  chosen_spanish_reading: Luego se fue
  alternative_spanish_readings:
  - Luego murió
  - Luego partió
  rationale: El hebreo usa un eufemismo; el POB inglés lo mantuvo con 'departed'. 'Se fue' conserva esa reserva sin sobreexplicar, y evita perder la sutileza del texto fuente.
  doctrine_reference: Ninguna doctrina específica; decisión de estilo y semántica funeraria.
- issue: La valoración negativa de su memoria pública
  english_pob_reading: with no regret / without being desired
  chosen_spanish_reading: sin ser deseado
  alternative_spanish_readings:
  - sin que lo lamentaran
  - sin ser echado de menos
  - con ningún pesar
  rationale: La frase hebrea admite un rango entre 'no deseado', 'no apreciado' y 'sin pesar'. Mantengo una redacción que no borra la tensión entre literalidad y sentido idiomático, porque el texto enfatiza la ausencia de duelo o aprecio público.
  doctrine_reference: Ninguna doctrina específica; observación histórica y literaria.
translation_notes:
  revision_awareness: Se integró el valor eufemístico de וַיֵּלֶךְ y la ambigüedad de בְּלֹא חֶמְדָּה, siguiendo el audit trail inglés. Frente al borrador inglés, la formulación española se ajusta para sonar natural sin perder la tensión semántica del hebreo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' según la norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Ciudad de David'' y ''sepulcros de los reyes'' se mantienen como expresiones históricas estables.'
  - '''sepultaron'' y ''sepulcros'' conservan un registro solemne coherente con una nota regnal funeraria.'
