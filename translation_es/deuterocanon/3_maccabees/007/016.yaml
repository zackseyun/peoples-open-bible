translation:
  language: es
  text: Pero aquellos que habían permanecido fieles a Dios hasta la muerte[a], habiendo obtenido una completa liberación, salieron de la ciudad, adornados con toda clase de flores muy aromáticas, con alegría y gritos, dando gracias con alabanzas y con himnos plenamente entonados a Dios, el santo Salvador de Israel[b], el Dios de sus padres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta el punto de la muerte». El griego μέχρι θανάτου puede expresar fidelidad llevada al extremo de la muerte o hasta las puertas de ella.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el santo liberador de Israel». σωτήρ puede rendirse como «Salvador» o «liberador» según si se destaca el título divino o el rescate inmediato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μέχρι θανάτου
  english_pob_choice: even to death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - incluso hasta la muerte
  - hasta el punto de morir
  lexicon: LSJ
  rationale: La expresión marca fidelidad llevada al extremo de la posible muerte martirial. «Hasta la muerte» es natural en español y conserva la intensidad sin afirmar que efectivamente murieron aquí.
- source_word: τὸν θεὸν ἐσχηκότες
  english_pob_choice: had held fast to God
  chosen_spanish: habían permanecido fieles a Dios
  alternatives_spanish:
  - habían permanecido aferrados a Dios
  - habían mantenido su lealtad a Dios
  lexicon: LSJ
  rationale: El participio de ἔχω aquí expresa adhesión/lealtad sostenida más que posesión literal. «Permanecido fieles» comunica bien la perseverancia en español sin perder el sentido relacional.
- source_word: παντελῆ σωτηρίαν ἀπόλαυσιν ἐσχηκότες
  english_pob_choice: having obtained complete deliverance
  chosen_spanish: habiendo obtenido una completa liberación
  alternatives_spanish:
  - habiendo recibido una salvación completa
  - habiendo alcanzado una liberación total
  lexicon: LSJ
  rationale: σωτηρία puede significar rescate/liberación o salvación. En este contexto narrativo de preservación ante la destrucción, «liberación» refleja mejor el hecho histórico, mientras «completa» mantiene el intensificador παντελής.
- source_word: ἀνέζευξαν
  english_pob_choice: departed
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - se alejaron
  lexicon: LSJ
  rationale: El verbo puede denotar partir o levantar campamento. Aquí el movimiento fuera de la ciudad se expresa de manera clara y natural con «salieron».
- source_word: παντοίοις εὐωδεστάτοις ἄνθεσι κατεστρωμένοι
  english_pob_choice: strewn with all kinds of very fragrant flowers
  chosen_spanish: cubiertos con toda clase de flores muy aromáticas
  alternatives_spanish:
  - adornados con toda clase de flores muy fragantes
  - esparcidos con toda clase de flores muy aromáticas
  lexicon: LSJ
  rationale: κατεστρωμένοι sugiere estar extendidos o cubiertos/decorados; «cubiertos» transmite bien la imagen procesional. εὐωδεστάτοις intensifica el aroma, de ahí «muy aromáticas».
- source_word: μετʼ εὐφροσύνης καὶ βοῆς
  english_pob_choice: with rejoicing and shouting
  chosen_spanish: con alegría y gritos
  alternatives_spanish:
  - con regocijo y clamores
  - con júbilo y gritería
  lexicon: LSJ
  rationale: εὐφροσύνη es gozo festivo y βοή es un clamor o grito. «Alegría y gritos» conserva ambos elementos de celebración y voz alta.
- source_word: ἐν αἴνοις καὶ παμμελέτοις ὕμνοις
  english_pob_choice: giving thanks with praises and full songs of hymns
  chosen_spanish: dando gracias con alabanzas y cánticos plenos de himnos
  alternatives_spanish:
  - dando gracias con alabanzas y himnos plenamente entonados
  - dando gracias con alabanzas y cantos completos de himnos
  lexicon: LSJ
  rationale: αἴνοις son alabanzas. παμμελέτοις es raro y sugiere una plenitud musical; «cánticos plenos de himnos» conserva la idea de plenitud/cantos sin forzar una especificación más técnica de lo que el griego permite.
- source_word: τῷ θεῷ τῶν πατέρων αὐτῶν
  english_pob_choice: the God of their fathers
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios de sus padres
  - su Dios ancestral
  lexicon: LSJ
  rationale: La revisión inglesa ajustó el orden para mostrar que la acción de gracias se dirige a Dios y luego se le identifica en aposición. En español se mantiene esa dirección inmediata con «a Dios», y la identificación ancestral se expresa al final.
- source_word: ἁγίῳ σωτῆρι τοῦ Ἰσραήλ
  english_pob_choice: the holy Savior of Israel
  chosen_spanish: el santo Salvador de Israel
  alternatives_spanish:
  - el santo liberador de Israel
  - el Salvador santo de Israel
  lexicon: LSJ
  rationale: σωτήρ funciona aquí como título divino. «Salvador» preserva el registro titular y «santo» mantiene ἁγίῳ. «Santo Salvador» sigue la fuerza del griego sin recargarlo con un término menos natural.
theological_decisions:
- issue: Cómo traducir σωτηρία en un contexto de rescate histórico sin borrar su resonancia salvífica
  english_pob_reading: Translate σωτηρία as 'deliverance' and σωτήρ as 'Savior'
  chosen_spanish_reading: Traducir σωτηρία como 'liberación' y σωτήρ como 'Salvador'
  alternative_spanish_readings:
  - Traducir ambos con lenguaje de rescate para una coherencia narrativa más estrecha
  - Traducir ambos con lenguaje de salvación para mayor continuidad teológica
  rationale: El pasaje celebra una preservación concreta frente a la amenaza de destrucción, por lo que «liberación» encaja bien con el evento narrativo. A la vez, «Salvador» conserva el tono doxológico y la dignidad del título divino en la alabanza.
  doctrine_reference: Translation philosophy §1, §5
- issue: 'Orden de la frase final: a quién se dirige la acción de gracias'
  english_pob_reading: giving thanks with praises and full songs of hymns to God, the holy Savior of Israel, the God of their fathers
  chosen_spanish_reading: dando gracias con alabanzas y cánticos plenos de himnos a Dios, el santo Salvador de Israel, el Dios de sus padres
  alternative_spanish_readings:
  - dando gracias a Dios con alabanzas e himnos, el santo Salvador de Israel, el Dios de sus padres
  - dando gracias con alabanzas e himnos al santo Salvador de Israel, el Dios de sus padres
  rationale: La revisión inglesa corrigió la puntuación y el orden para que la acción de gracias se dirija a Dios, quedando luego en aposición 'el santo Salvador de Israel, el Dios de sus padres'. El español conserva esa estructura para no perder la relación sintáctica del griego.
  doctrine_reference: Translation philosophy §2, §4
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que ajustó el cierre para que la acción de gracias se dirija a Dios y luego lo identifique en aposición como 'the holy Savior of Israel, the God of their fathers'. En español se reflejó esa estructura, evitando trasladar mecánicamente la versión inglesa anterior.
  spanish_consistency_notes:
  - Se usa «Dios» para θεὸν y se conserva la referencia ancestral «de sus padres» sin sustituirla por un término más litúrgico.
  - Se traduce σωτήρ como «Salvador» para mantener el carácter de título divino, mientras σωτηρία se vierte como «liberación» por el marco narrativo.
  - Se evita «SEÑOR» porque el texto griego usa θεός, no κύριος.
  - El marcador [a] aparece exactamente donde la alternativa afecta al giro temporal/fiduciario; el marcador [b] aparece en el título divino final.
