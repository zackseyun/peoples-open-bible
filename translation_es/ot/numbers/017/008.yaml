lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: Then came
  chosen_spanish: se presentaron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: HALOT
  rationale: El verbo wayyiqtol de בוא avanza la narración con valor de pasado. En español, en este contexto formal-cultual, «se presentaron» comunica la llegada ante un lugar sagrado con naturalidad y sin insinuar entrar físicamente en la tienda, como también evita la repetición pesada de «vinieron/llegaron» frente a un recinto litúrgico.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: Nombre propio bíblico
  rationale: Nombre propio estándar en español bíblico.
- source_word: וְאַהֲרֹן
  english_pob_choice: and Aaron
  chosen_spanish: y Aarón
  lexicon: Nombre propio bíblico
  rationale: Nombre propio estándar en español bíblico.
- source_word: אֶל־פְּנֵי
  english_pob_choice: before
  chosen_spanish: delante del
  alternatives_spanish:
  - ante el
  - en presencia del
  lexicon: HALOT
  rationale: La expresión idiomática indica acercamiento o comparecencia ante algo/alguien. «Delante del» conserva la imagen espacial de פנים/פְּנֵי sin volverla demasiado explicativa; en español funciona bien con una entidad cultual concreta.
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the Tent of Meeting
  chosen_spanish: Tabernáculo de Reunión
  alternatives_spanish:
  - Tienda de Reunión
  - Tienda del Encuentro
  lexicon: HALOT
  rationale: «Tent of Meeting» designa el santuario específico; en español, «Tabernáculo de Reunión» es una forma clara y reverente, y preserva el valor técnico cultual del término sin reducirlo a una tienda genérica. Se mantiene la mayúscula por tratarse de un referente fijo.
theological_decisions:
- issue: Renderización del idiomático אֶל פְּנֵי sin borrar la imagen de 'rostro/faz'
  english_pob_reading: '''before the Tent of Meeting'' with a footnote glossing the Hebrew literally as ''to the face of the Tent of Meeting.'''
  chosen_spanish_reading: '''delante del Tabernáculo de Reunión'' con nota que explica la literalidad hebrea'
  alternative_spanish_readings:
  - '''ante el Tabernáculo de Reunión'''
  - '''a la presencia del Tabernáculo de Reunión'''
  rationale: 'La POB inglesa conserva la equivalencia funcional en el texto y deja la literalidad en nota. En español se hace lo mismo: la traducción principal fluye naturalmente, pero la nota mantiene la tensión lexical de פְּנֵי como ''rostro/faz''.'
  doctrine_reference: Lexical note; no doctrinal issue
- issue: Elección de 'Tabernáculo de Reunión' para אֹהֶל מוֹעֵד
  english_pob_reading: the Tent of Meeting
  chosen_spanish_reading: Tabernáculo de Reunión
  alternative_spanish_readings:
  - Tienda de Reunión
  - Tienda del Encuentro
  rationale: La referencia es al santuario del desierto, no a una tienda común. 'Tabernáculo' aporta el valor cultual ya asentado en español bíblico, mientras 'de Reunión' traduce el sentido funcional de מוֹעֵד como lugar de encuentro/convocatoria.
  doctrine_reference: Cultic terminology; no doctrinal issue
translation_notes:
  revision_awareness: 'El contexto auditado muestra alta concordancia y ninguna revisión aplicada al inglés POB. La versión española sigue la misma decisión de equivalencia óptima: texto principal natural y nota breve para la literalidad hebrea.'
  spanish_consistency_notes:
  - Se mantiene «Moisés» y «Aarón» como nombres propios estándar.
  - Se evita «SEÑOR» u otra sustitución no pertinente, pues no aparece el nombre divino en este versículo.
  - «Delante del» refleja el valor espacial/relacional de אֶל־פְּנֵי sin exagerar movimiento interno.
  - La mayúscula en «Tabernáculo de Reunión» sigue el uso de referente técnico fijo.
