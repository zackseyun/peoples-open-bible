source:
  edition: SBLGNT
  text: ὁ μὴ ἀγαπῶν οὐκ ἔγνω τὸν θεόν, ὅτι ὁ θεὸς ἀγάπη ἐστίν.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/004/008.yaml
  text: The one who does not love has not known God[a], because God is love.
  footnotes:
  - marker: a
    text: Or, 'Whoever does not love does not know God.' The Greek aorist may be rendered more simply in English, but 'has not known' preserves the sense of not having come to know God.
    reason: lexical_alternative
translation:
  language: ko
  text: 사랑하지 않는 자는 하나님을 알지 못한 것입니다. 「하나님은 사랑이시기」[a] 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: ὁ θεὸς ἀγάπη ἐστίν은 하나님의 본질에 관한 선언으로, 단순한 속성 진술이 아니라 정체성 진술이다. 4:16에서 동일한 표현이 반복된다.
    reason: cross_reference
theological_decisions:
- issue: 「하나님은 사랑이시다」의 본질 진술
  chosen_reading: 본질 진술로 직역
  alternative_readings:
  - 「하나님은 사랑하시는 분이시다」로 풀어쓰기
  rationale: ὁ θεὸς ἀγάπη ἐστίν은 동사 ἐστίν과 명사 술어 ἀγάπη의 단순 결합으로 본질·정체성 진술이다. 한국어 「하나님은 사랑이시다」로 직역하여 본질 진술의 무게를 보존한다. 풀어쓰면 본문의 함축적 무게가 약화된다.
  doctrine_reference: DOCTRINE.md §5 — preserve declarative ontology
