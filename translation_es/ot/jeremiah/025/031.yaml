base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/025/031.yaml
  text: An uproar has come to the end of the earth[a], for Yahweh has a case against the nations; he is entering into judgment with all flesh. He has given the wicked to the sword[d][c][b], declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'tumult' or 'roar' for 'uproar.'
    reason: lexical_alternative
  - marker: b
    text: '''Has a case against'' renders a Hebrew legal term that can also be translated ''has a controversy with'' or ''has a lawsuit against.'''
    reason: lexical_alternative
  - marker: c
    text: '''All flesh'' is a Hebrew idiom meaning all humanity.'
    reason: lexical_alternative
  - marker: d
    text: Or 'has handed them over to the sword.'
    reason: lexical_alternative
