    reference: Sirach 2:5
translation:
  text: For gold is tested in fire[a], and men who are accepted, in the furnace of affliction.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew has a difficult phrase in the second line; the Greek parallel reads 'accepted men in a furnace of humiliation.' The main text follows that sense while remaining anchored in the surviving Hebrew.
    reason: alternative_reading
lexical_decisions:
- source_word: יִבָּחֵן
  chosen: is tested
  alternatives:
  - is examined
  - is proved
  - is refined
  lexicon: HALOT
  rationale: The Hebrew verb from בחן denotes testing or proving. 'Is tested' is clear modern English and fits the comparison with gold in fire. 'Refined' would import the result more than the verb itself states.
- source_word: זָהָב
  chosen: gold
  lexicon: HALOT
  rationale: Straightforward lexical equivalent.
- source_word: בְּנֵי אָדָם
  chosen: men who are accepted
  alternatives:
  - human beings who are accepted
  - the accepted among men
  - people who are accepted
  lexicon: HALOT
  rationale: The Hebrew reads literally 'sons of man/humanity,' but the Greek parallel appears to reflect an adjectival idea, 'acceptable/accepted men' (ἄνθρωποι δεκτοί), likely preserving the intended sense of the Hebrew phrase as transmitted here. Following the instruction to use the Greek parallel as actual input, the translation brings out accepted persons rather than a bare generic 'human beings.' 'Men' preserves the masculine/generic force of אָדָם per project philosophy, while 'who are accepted' reflects the parallel witness.
- source_word: בְּכוּר
  chosen: who are accepted
  alternatives:
  - chosen
  - select
  - tried
  lexicon: HALOT
  rationale: The Hebrew form as transmitted is difficult in context. The Greek parallel δεκτοί ('accepted,' 'approved') strongly supports a sense of persons found acceptable. Because the Hebrew witness is composite and this word is contextually awkward if rendered literally, the Greek helps stabilize the meaning. 'Accepted' fits the wisdom context of divine testing without overstating election language.
- source_word: עֹנִי
  chosen: affliction
  alternatives:
  - humiliation
  - poverty
  - misery
  lexicon: HALOT
  rationale: The Hebrew noun can denote affliction, misery, or humiliation. The Greek ταπεινώσεως points toward humiliation/lowliness, but 'affliction' best captures the broader testing context in idiomatic English while remaining faithful to the Hebrew semantic range.
- source_word: כַּמִּין / כבשן implied by Greek καμίνῳ
  chosen: furnace
  alternatives:
  - smelting furnace
  - kiln
  lexicon: LSJ
  rationale: The Hebrew line as given lacks an explicit noun for furnace, but the Greek parallel includes καμίνῳ, clarifying the image already implied by the fire-testing metaphor. 'Furnace' is the natural English rendering.
