review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo y sigue de cerca el rastro de auditoría del POB en puntos clave: «temor de Yahvé», «añade días», el contraste adversativo «pero», y la idea de años abreviados para los malvados. También conserva correctamente «Yahvé» para יְהוָה y mantiene la nota léxica sobre «añade/prolonga».'
  spanish_quality_summary: 'La redacción es en general clara y digna. Sin embargo, «los años de los malvados serán acortados» presenta un problema de concordancia: «años» es masculino plural, por lo que debe ser «acortados» si se mantiene esa construcción, pero el adjetivo ya está en masculino plural; el problema real es de naturalidad y de ajuste semántico al femenino plural del verbo hebreo con «años» como sujeto. En español suena más natural y proverbial «se acortarán». Además, «los malvados» es aceptable, pero «los impíos» encaja mejor con el registro sapiencial y con רְשָׁעִים en este contexto; aun así, esto es de severidad baja. La reparación principal es estilística/idiomática en el segundo hemistiquio.'
  glossary_alignment: 'Alineación buena con el glosario del proyecto: יְהוָה -> «Yahvé» está correcto; no hay conflicto con otros términos doctrinales clave. «Temor de» preserva adecuadamente יִרְאַת. La nota léxica sobre תוסיף está bien mantenida.'
  issues:
  - severity: medium
    issue: La forma verbal española del segundo hemistiquio es poco idiomática.
    rationale: Aunque «serán acortados» comunica el sentido general, en español proverbial y bíblico suena más natural «se acortarán» o «serán acortados» con menos rigidez. «Se acortarán» expresa bien el resultado de תִּקְצֹרְנָה y mejora la fluidez.
  - severity: low
    issue: «Los malvados» podría sustituirse por «los impíos» en registro sapiencial.
    rationale: רְשָׁעִים en Proverbios suele tener un valor moral-religioso amplio. «Los malvados» es correcto y comprensible, pero «los impíos» puede sonar más típico del género sapiencial. No es un error, solo una posible mejora contextual.
  revised_spanish_text: El temor de Yahvé añade días[a], pero los años de los impíos se acortarán.
  revised_footnotes:
  - marker: a
    text: O «prolonga los días». El hebreo dice literalmente «añade», con «días» como objeto.
    reason: lexical_alternative
  revision_rationale: Se ajusta el segundo hemistiquio para una formulación más natural y proverbial en español («se acortarán») y se adopta «los impíos» como opción más propia del registro sapiencial para רְשָׁעִים, sin cambiar el sentido del original ni las decisiones teológicas del POB. La nota existente se conserva sin cambios porque sigue siendo exacta y útil.
