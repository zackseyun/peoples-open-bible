- from: 'Jesús respondió: «Un hombre cierto iba descendiendo de Jerusalén a Jericó, y cayó en manos de ladrones, quienes lo despojaron, lo golpearon y se fueron, dejándolo medio muerto».'
  to: 'Jesús respondió: «Cierto hombre iba descendiendo de Jerusalén a Jericó, y cayó entre ladrones, quienes lo despojaron, lo golpearon y se fueron, dejándolo medio muerto».'
  rationale: Se revisa «Un hombre cierto» a «Cierto hombre» para reflejar de forma idiomática y fiel el indefinido narrativo Ἄνθρωπός τις. Se ajusta «cayó en manos de ladrones» a «cayó entre ladrones» para alinearse mejor con περιέπεσεν y con la decisión inglesa de evitar expansión interpretativa. Se conserva «iba descendiendo» por su buen reflejo del imperfecto y la topografía del camino.
