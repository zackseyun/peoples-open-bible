review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura causal, la apostasía, la idolatría, la metáfora de ira derramada y el cierre de juicio irreversible. Sin embargo, «para provocar mi ira» desplaza levemente el sentido de לְמַעַן הַכְעִיסֵנִי, que en el inglés auditado preserva mejor el objeto personal («provocarme a ira» / «hacerme enojar»), no solo una abstracción posesiva. El resto se alinea sustancialmente con el hebreo y con la auditoría inglesa.
  spanish_quality_summary: El texto es claro, natural y digno en español. La fraseología general funciona bien. Aun así, «provocar mi ira» suena algo menos directa que el hebreo y puede leerse como si provocaran una cosa en vez de provocar a Dios mismo. Un ajuste menor mejora fidelidad y claridad sin afectar la fluidez.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Otros dioses» sigue correctamente la decisión documentada; la nota alternativa está bien. La metáfora de juicio se mantiene adecuadamente. «Furor» es aceptable para חֵמָה, aunque «ira» también habría sido viable; no requiere cambio obligatorio.
  issues:
  - severity: medium
    issue: «para provocar mi ira» atenúa la referencia personal del verbo
    rationale: לְמַעַן הַכְעִיסֵנִי significa literalmente provocar enojo en ‘mí’. El inglés POB escogió «so as to provoke me to anger». En español, «para enojarme» o «para provocarme a ira» preserva mejor el complemento personal que «provocar mi ira».
  revised_spanish_text: Porque me han abandonado y han quemado incienso a otros dioses[a], para enojarme por todas las obras de sus manos[b], mi furor será derramado sobre este lugar y no se apagará.
  revised_footnotes:
  - marker: a
    text: O «dioses extraños». El hebreo dice más literalmente «otros dioses».
    reason: lexical_alternative
  - marker: b
    text: La frase «las obras de sus manos» puede referirse ampliamente a lo que hicieron o fabricaron, especialmente ídolos hechos por ellos y actos relacionados.
    reason: cultural_note
  revision_rationale: Se hizo una reparación mínima para reflejar con mayor precisión el objeto personal de הַכְעִיסֵנִי. «Para enojarme» conserva mejor el sentido de provocar a Dios a ira y sigue siendo natural en español moderno. Se mantuvieron el resto del texto y las notas, ya que están bien alineados con la evidencia fuente y la auditoría inglesa.
