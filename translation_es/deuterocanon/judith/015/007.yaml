translation:
  language: es
  text: Pero los hijos de Israel[a], volviendo de la matanza, se apoderaron del resto; y los de las aldeas y caseríos[b] en la región montañosa y en la llanura tomaron mucho botín[c], porque había una cantidad muy grande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas». El griego dice más literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «aldeas y granjas». El término para ἐπαύλεις designa asentamientos pequeños o viviendas de campo.
    reason: lexical_alternative
  - marker: c
    text: O «mucho despojo».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ... υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: LSJ
  rationale: Conservo la estructura más literal del griego y del registro bíblico. En español, «hijos de Israel» es natural, solemne y corresponde mejor al giro del original que «israelitas».
- source_word: ἀναστρέψαντες
  english_pob_choice: returning
  chosen_spanish: volviendo
  alternatives_spanish:
  - regresando
  - habiendo vuelto
  lexicon: LSJ
  rationale: El participio expresa el regreso tras el combate; «volviendo» mantiene el valor temporal y fluye con naturalidad en español.
- source_word: ἀπὸ τῆς κοπῆς
  english_pob_choice: from the slaughter
  chosen_spanish: de la matanza
  alternatives_spanish:
  - del degüello
  - de la matanza/carnicería
  - del estrago
  lexicon: LSJ
  rationale: «Matanza» transmite el sentido violento y militar del pasaje. Evita suavizar el término y conserva la fuerza de la imagen griega.
- source_word: ἐκυρίευσαν τῶν λοιπῶν
  english_pob_choice: took possession of the rest
  chosen_spanish: se apoderaron del resto
  alternatives_spanish:
  - dominaron a los demás
  - tomaron posesión del resto
  - quedaron dueños de los demás
  lexicon: LSJ
  rationale: κυριεύω aquí implica dominar/ganar control tras la derrota enemiga. «Se apoderaron del resto» comunica esa adquisición de control sin volverla demasiado interpretativa.
- source_word: αἱ κῶμαι καὶ ἐπαύλεις
  english_pob_choice: the villages and hamlets
  chosen_spanish: las aldeas y caseríos
  alternatives_spanish:
  - los pueblos y granjas
  - las aldeas y haciendas rurales
  - las aldeas y viviendas de campo
  lexicon: LSJ
  rationale: «Aldeas» y «caseríos» reflejan bien la oposición entre κῶμαι y ἐπαύλεις, manteniendo el matiz de pequeños asentamientos rurales sin introducir una connotación de villa acomodada.
- source_word: ἐν τῇ ὀρεινῇ καὶ πεδινῇ
  english_pob_choice: in the hill country and in the plain
  chosen_spanish: de la región montañosa y de la llanura
  alternatives_spanish:
  - de la serranía y de la llanura
  - de la tierra montañosa y de la planicie
  - de la zona alta y de la llanura
  lexicon: LSJ
  rationale: Los términos geográficos griegos se entienden bien como «región montañosa» y «llanura». Conserva el contraste entre zona alta y baja con lenguaje claro y digno.
- source_word: ἐκράτησαν πολλῶν λαφύρων
  english_pob_choice: took much plunder
  chosen_spanish: tomaron mucho botín
  alternatives_spanish:
  - capturaron mucho despojo
  - se apoderaron de mucho botín
  - obtuvieron mucho botín
  lexicon: LSJ
  rationale: κρατέω en este contexto militar se traduce naturalmente como «tomaron»; λαφύρα corresponde a «botín». «Botín» es el término español más directo y fiel al contexto de guerra.
- source_word: ἦν γὰρ πλῆθος πολὺ σφόδρα
  english_pob_choice: for there was a very great quantity
  chosen_spanish: porque había una cantidad muy grande
  alternatives_spanish:
  - pues había una abundancia muy grande
  - porque era muchísimo
  - ya que había una gran abundancia
  lexicon: LSJ
  rationale: La cláusula final explica la abundancia del botín. «Cantidad muy grande» preserva el énfasis acumulativo del griego sin forzar un sustantivo más técnico.
theological_decisions:
- issue: Alcance del sujeto colectivo («sons of Israel»)
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Mantengo el giro filiativo del texto, que puede tener un tono tradicional y colectivo a la vez. No lo reduzco a una paráfrasis colectiva porque el griego conserva la formulación literal.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «seized much plunder» a «took much plunder» para mayor naturalidad. La versión española sigue esa decisión con «tomaron mucho botín», manteniendo el paralelismo verbal y el registro formal sin endurecer innecesariamente la sintaxis.
  spanish_consistency_notes:
  - Se conservó «hijos de Israel» por consistencia con el registro bíblico y con el valor más literal del griego.
  - Se eligió «botín» en vez de «despojo» en el cuerpo principal por claridad natural; la alternativa queda registrada en nota.
  - «Matanza» se usó para evitar atenuar el sentido de κοπή en contexto bélico.
  - La estructura final conserva el énfasis cuantitativo del griego con «cantidad muy grande».
