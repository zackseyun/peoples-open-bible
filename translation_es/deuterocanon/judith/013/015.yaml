revisions:
- from: 'Y saliendo adelante[a], sacó la cabeza de la bolsa y se la mostró, y les dijo: «Miren la cabeza de Holofernes, el comandante en jefe del ejército de Asur; y miren el dosel en el que yacía en medio de sus borracheras. Y el Señor lo hirió por mano de una mujer».'
  to: 'Y adelantándose[a], sacó la cabeza de la bolsa y la mostró a ellos, y les dijo: «He aquí la cabeza de Holofernes, el comandante en jefe del ejército de Asur; y he aquí el dosel[b] en el que yacía en su embriaguez. Y Yahvé lo derribó por mano de una mujer».'
  rationale: 'Se ajusta el texto para alinearlo con el griego, con el audit trail inglés y con la terminología del proyecto: «adelantándose» mejora la naturalidad de προελθοῦσα; «He aquí» refleja mejor el doble ἰδοὺ en registro solemne; se añade nota para κωνώπιον siguiendo la evidencia léxica preservada en inglés; «en su embriaguez» suena más natural que «en medio de sus borracheras»; «lo derribó» comunica mejor el golpe decisivo de ἐπάταξεν; y «Yahvé» sustituye a «el Señor» conforme al estándar del proyecto. No requiere adjudicación adicional porque las correcciones son claras y de bajo riesgo doctrinal.'
