translation:
  language: es
  text: Mira, he llamado por su nombre[a] a Bezalel, hijo de Uri, hijo de Hur, de la tribu de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Mira, he convocado por su nombre a Bezalel». El hebreo «llamar por nombre» puede expresar una designación personal y específica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Mira bien
  lexicon: HALOT
  rationale: El imperativo funciona como marcador discursivo para llamar la atención. «Mira» reproduce la fuerza directa y natural del hebreo mejor que una formulación más explicativa.
- source_word: קָרָאתִי
  english_pob_choice: I have called
  chosen_spanish: he llamado
  alternatives_spanish:
  - he llamado
  - he convocado
  - he designado
  lexicon: HALOT
  rationale: El perfecto qal de קרא con בְּשֵׁם expresa llamado/designación personal. «He llamado» es la correspondencia más directa y deja que el matiz de designación quede sostenido por el contexto y la frase siguiente.
- source_word: בְּשֵׁם
  english_pob_choice: by name
  chosen_spanish: por nombre
  alternatives_spanish:
  - por nombre
  - por su nombre
  - específicamente
  lexicon: HALOT
  rationale: La locución hebrea se conserva de forma idiomática en español con «por nombre», que mantiene el valor de designación personal explícita sin sobreinterpretar el giro.
- source_word: בְּצַלְאֵל
  english_pob_choice: Bezalel
  chosen_spanish: Bezalel
  alternatives_spanish:
  - Bezaleel
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de manera estándar en español bíblico moderno.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - hijo de
  - descendiente de
  lexicon: HALOT
  rationale: En esta fórmula genealógica, בֶּן señala filiación inmediata y se traduce de manera directa con «hijo de».
- source_word: אוּרִי
  english_pob_choice: Uri
  chosen_spanish: Uri
  alternatives_spanish:
  - Uri
  lexicon: convención onomástica
  rationale: Nombre propio transliterado según uso estándar.
- source_word: חוּר
  english_pob_choice: Hur
  chosen_spanish: Hur
  alternatives_spanish:
  - Hur
  lexicon: convención onomástica
  rationale: Nombre propio transliterado según uso estándar.
- source_word: לְמַטֵּה
  english_pob_choice: of the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - de la tribu de
  - perteneciente a la tribu de
  lexicon: HALOT
  rationale: En contexto genealógico, מַטֶּה indica tribu; el prefijo ל marca pertenencia/afiliación. «De la tribu de» es la equivalencia española natural y precisa.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judá
  lexicon: convención onomástica
  rationale: Nombre tribal bíblico en su forma española tradicional y ampliamente inteligible.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto se mantiene en acuerdo alto con la fuente hebrea y con la traducción auditada en inglés.
  spanish_consistency_notes:
  - Se preserva el tono directo del hebreo con un imperativo inicial breve.
  - Se conserva la fórmula genealógica sin ampliaciones interpretativas.
  - No se usa «SEÑOR»; el versículo no contiene el nombre divino, solo el nombre tribal de Judá.
