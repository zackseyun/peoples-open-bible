source:
  edition: SBLGNT
  text: ὡς ἀρτιγέννητα βρέφη τὸ λογικὸν ἄδολον γάλα ἐπιποθήσατε, ἵνα ἐν αὐτῷ αὐξηθῆτε εἰς σωτηρίαν,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/002.yaml
  text: 'Like newborn infants, long for the pure, rational milk, so that by it you may grow into salvation,'
translation:
  language: ko
  text: '갓 태어난 갓난아기처럼, 순전하고 신령한 젖을[a] 사모하십시오. 이는 여러분이 그 젖으로 자라 구원에 이르게 하려는 것입니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '「신령한」(λογικός)은 「말씀에 속한」 또는 「이성적인·영적인」을 뜻한다. 1:23-25의 「하나님의 말씀」과 연결되어 말씀이 곧 그 젖임을 가리킨다.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρτιγέννητα βρέφη
  english_pob_choice: newborn infants
  chosen_korean: 갓 태어난 갓난아기
  alternatives_korean:
  - 새로 난 어린아기들
  - 막 태어난 영아들
  lexicon: BDAG
  rationale: 1:23 거듭남과 연결되는 「갓 태어난」 어감을 강조한다.
- source_word: τὸ λογικὸν ἄδολον γάλα
  english_pob_choice: the pure, rational milk
  chosen_korean: 순전하고 신령한 젖
  alternatives_korean:
  - 순수하고 합리적인 젖
  - 신령하고 거짓 없는 젖
  lexicon: BDAG
  rationale: λογικός는 「말씀에 속한·영적인」 의미를 모두 함의하므로 「신령한」으로 옮긴다 (롬 12:1 「영적 예배」 참조). ἄδολος는 1절의 δόλος(속임)와 의도적 대조를 이루므로 「순전한」으로 옮긴다.
- source_word: ἐπιποθήσατε
  english_pob_choice: long for
  chosen_korean: 사모하십시오
  alternatives_korean:
  - 간절히 구하십시오
  - 갈망하십시오
  lexicon: BDAG
  rationale: ἐπιποθέω의 강한 갈망을 한국 성서 전통의 「사모하다」로 옮긴다.
- source_word: εἰς σωτηρίαν
  english_pob_choice: into salvation
  chosen_korean: 구원에 이르게
  alternatives_korean:
  - 구원에까지
  lexicon: BDAG
  rationale: 목표·도달의 εἰς를 「~에 이르게」로 옮긴다.
