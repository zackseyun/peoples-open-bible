translation:
  language: es
  text: 'Y el rey de Israel dijo a Josafat: «Todavía queda un hombre más[a], por medio de quien consultar a Yahvé; pero yo lo odio, porque no profetiza nada bueno acerca de mí, sino solo mal: Micaías hijo de Imla». Y Josafat dijo: «No diga así el rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aún otro hombre»; el hebreo puede entenderse como «todavía hay otro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio en español, siguiendo el principio del proyecto de no ocultar el Tetragrámaton; «Yahvé» es la forma establecida en la serie POB en español y preserva la referencia pactual del texto.
- source_word: עוֹד אִישׁ אֶחָד
  english_pob_choice: There is still one more man
  chosen_spanish: Todavía queda un hombre más
  alternatives_spanish:
  - Aún hay otro hombre
  - Todavía hay un hombre más
  lexicon: HALOT
  rationale: «Todavía» conserva el valor de עוֹד (‘todavía/aún’) y «un hombre más» reproduce la idea aditiva de אִישׁ אֶחָד sin volverla más enfática de lo que permite el hebreo.
- source_word: לִדְרֹשׁ אֶת־יְהוָה מֵאֹתוֹ
  english_pob_choice: through whom to inquire of the LORD
  chosen_spanish: por medio de quien consultar a Yahvé
  alternatives_spanish:
  - por quien consultar a Yahvé
  - mediante quien inquirir de Yahvé
  lexicon: HALOT
  rationale: En contexto profético, דָּרַשׁ con יהוה expresa consultar/inquirir a Dios; «por medio de quien» refleja bien מֵאֹתוֹ como mediación, y «consultar a Yahvé» suena natural y fiel en español bíblico contemporáneo.
- source_word: שְׂנֵאתִיו
  english_pob_choice: I hate him
  chosen_spanish: yo lo he aborrecido
  alternatives_spanish:
  - yo lo odio
  - yo lo detesto
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una postura asentada; «lo he aborrecido» conserva esa fuerza durativa/decidida mejor que un simple presente, y mantiene un registro algo más fuerte que «odiar» en español sin exceder el peso del original.
- source_word: לֹא יִתְנַבֵּא עָלַי טוֹב כִּי אִם רָע
  english_pob_choice: he does not prophesy good concerning me, but only evil
  chosen_spanish: no profetiza para mí nada bueno, sino solo mal
  alternatives_spanish:
  - no profetiza bueno acerca de mí, sino solo mal
  - no profetiza para mí el bien, sino el mal
  lexicon: HALOT
  rationale: יִתְנַבֵּא se traduce con «profetiza»; עָלַי se vierte naturalmente «para mí»/«acerca de mí», y «nada bueno, sino solo mal» conserva el contraste exceptivo de כִּי אִם sin introducir una interpretación moral o de catástrofe más específica que רָע.
- source_word: מִיכָיְהוּ
  english_pob_choice: Micaiah
  chosen_spanish: Micaías
  alternatives_spanish:
  - Micaíah
  - Miqueas
  lexicon: HALOT
  rationale: Se usa la transliteración bíblica habitual en español para el nombre propio, distinta del profeta Miqueas, para evitar confusión y mantener la forma reconocible del personaje.
- source_word: בֶּן־יִמְלָה
  english_pob_choice: son of Imlah
  chosen_spanish: hijo de Imla
  alternatives_spanish:
  - el hijo de Imla
  lexicon: HALOT
  rationale: Patronímico estándar en español bíblico; se conserva la forma del nombre propio Imla y se omite el artículo por naturalidad estilística.
- source_word: אַל יֹאמַר הַמֶּלֶךְ כֵּן
  english_pob_choice: Let not the king say so
  chosen_spanish: No diga así el rey
  alternatives_spanish:
  - No lo diga el rey
  - Que el rey no diga eso
  lexicon: HALOT
  rationale: El jussivo negativo expresa una prohibición o ruego respetuoso; «No diga así el rey» conserva el tono cortesano de la respuesta de Josafat y evita endurecerla en un imperativo demasiado directo.
theological_decisions:
- issue: Tratamiento del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrámaton; la POB inglesa lo rinde con el nombre propio. En español se mantiene «Yahvé» para no enmascarar la referencia pactual ni sustituirla por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de רָע en la queja de Acab
  english_pob_reading: evil
  chosen_spanish_reading: mal
  alternative_spanish_readings:
  - maldad
  - daño
  - desgracia
  rationale: En este contexto רָע puede abarcar mal, daño o calamidad. Se escogió «mal» para conservar la amplitud semántica y no cerrar prematuramente la frase a una sola lectura.
  doctrine_reference: HALOT רָע; contexto narrativo de 1 Reyes 22
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «does not prophesy good» frente a «never prophesies good» para no añadir énfasis no explícito. En español, por ello se usa «no profetiza… nada bueno» y no una expresión absoluta como «nunca».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al criterio del proyecto para יְהוָה.
  - Se conserva «profetiza» para יִתְנַבֵּא y no se sustituye por una glosa interpretativa.
  - «Mal» se usa de manera amplia y no como evaluación moral técnica.
  - 'Los nombres propios siguen la transliteración española estándar: Josafat, Micaías, Imla.'
