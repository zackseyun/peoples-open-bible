    issue: El marcador de la nota [a] está colocado en «Y ahora[a]» en lugar de «brazo levantado[a]».
    rationale: La nota explica βραχίονι ὑψηλῷ, no «ahora». Según las reglas del proyecto, el marcador exacto debe aparecer en la palabra o frase pertinente del texto.
  - severity: medium
    issue: «Te ganaste un nombre» no representa con suficiente precisión ἐποίησας σεαυτῷ ὄνομα.
    rationale: El griego usa el verbo «hiciste» con reflexivo explícito. «Te ganaste» añade un matiz de mérito adquirido que no está en primer plano; «te hiciste un nombre» preserva mejor el idiomatismo bíblico y la forma verbal del original.
  - severity: low
    issue: La fórmula final «como hasta este día» es algo forzada en español.
    rationale: Aunque comprensible y cercana al inglés auditado, «como en este día» o «como hasta el día de hoy» serían más naturales. No obstante, puede mantenerse una formulación próxima al original si se busca conservar el tono formular.
