translation:
  language: es
  text: 'Entonces David llegó a Baal-perazim[a], y allí David los derribó. Dijo[b]: «Yahvé irrumpió contra mis enemigos delante de mí, como una irrupción de aguas». Por eso llamó el nombre de aquel lugar Baal-perazim.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Baal-perazim suena como «señor de irrupciones», «dueño de brechas» o «lugar de irrupciones», en eco con la afirmación de David de que Yahvé «irrumpió» contra sus enemigos.
    reason: lexical_alternative
  - marker: b
    text: 'O: «como el romper de las aguas» o «como el desborde de las aguas». La frase hebrea conserva un juego de palabras entre «irrumpió» y «Baal-perazim».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּבַעַל פְּרָצִים / בַּעַל פְּרָצִים
  english_pob_choice: Baal-perazim
  chosen_spanish: Baal-perazim
  alternatives_spanish:
  - Señor de las brechas
  - Dueño de las rupturas
  - Lugar de las brechas
  lexicon: HALOT
  rationale: Es un nombre de lugar; por fidelidad y por la decisión auditada en inglés, se translitera en vez de traducirse. La forma preserva además el juego de palabras con פָּרַץ / פֶּרֶץ en la explicación de David.
- source_word: וַיַּכֵּם
  english_pob_choice: struck them down
  chosen_spanish: los derrotó
  alternatives_spanish:
  - los derribó
  - los golpeó
  lexicon: HALOT
  rationale: El verbo נכה tiene fuerza militar. En español, «los derrotó» comunica con naturalidad el resultado bélico sin añadir una imagen corporal no explicitada. Se evita suavizar demasiado el sentido.
- source_word: פָּרַץ
  english_pob_choice: has broken through
  chosen_spanish: ha abierto paso
  alternatives_spanish:
  - ha roto a través de
  - ha hecho una brecha en
  lexicon: HALOT
  rationale: Para conservar la imagen y el juego con el topónimo, «ha abierto paso» expresa bien el sentido de irrupción o ruptura. «Abrir paso» es idiomático en español y mantiene la idea de intervención decisiva de Yahvé.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el estándar del proyecto en español. Es la transliteración castellana usual del Tetragrama y evita la sustitución por «SEÑOR».
- source_word: אֹיְבַי
  english_pob_choice: my enemies
  chosen_spanish: mis enemigos
  alternatives_spanish:
  - los que me son hostiles
  lexicon: HALOT
  rationale: Es la correspondencia directa y natural del sustantivo con sufijo de primera persona.
- source_word: לְפָנַי
  english_pob_choice: before me
  chosen_spanish: delante de mí
  alternatives_spanish:
  - ante mí
  - frente a mí
  lexicon: HALOT
  rationale: «Delante de mí» reproduce con claridad la imagen espacial y su sentido militar. Es una opción natural en español para el contexto.
- source_word: כְּפֶרֶץ מָיִם
  english_pob_choice: like a breakthrough of waters
  chosen_spanish: como una ruptura de aguas
  alternatives_spanish:
  - como el romper de las aguas
  - como la irrupción de las aguas
  lexicon: HALOT
  rationale: Se conserva el paralelismo con פָּרַץ mediante «ruptura», manteniendo la alusión a una masa de agua que se abre o se desborda. La formulación permite leer el juego verbal sin volverlo opaco.
- source_word: קָרָא שֵׁם הַמָּקוֹם הַהוּא
  english_pob_choice: he called the name of that place
  chosen_spanish: llamó al lugar con el nombre de
  alternatives_spanish:
  - puso por nombre a aquel lugar
  - nombró aquel lugar
  lexicon: HALOT
  rationale: La construcción hebrea se refleja de modo bastante literal y claro. «Llamó al lugar con el nombre de» conserva la solemnidad narrativa del acto de nombrar.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrama directamente. En español, la forma adoptada por el proyecto es «Yahvé», que conserva el nombre propio divino y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Preservación del juego de palabras entre פָּרַץ y Baal-perazim
  english_pob_reading: The Hebrew phrase preserves a wordplay with 'broken through' and 'Baal-perazim'.
  chosen_spanish_reading: Se preserva el juego entre «ha abierto paso» y «Baal-perazim».
  alternative_spanish_readings:
  - Se preserva el juego entre «ha roto a través» y «Baal-perazim».
  - Se preserva el juego entre «ha hecho una brecha» y «Baal-perazim».
  rationale: La frase de David explica el nombre del lugar mediante un verbo que comparte raíz semántica con el topónimo. La traducción intenta mantener esa relación perceptible en español sin forzar un calco rígido.
  doctrine_reference: Poética y onomástica bíblica en el contexto narrativo
translation_notes:
  revision_awareness: Se revisó el pasaje frente al audit trail inglés y no se detectaron cambios sustantivos en la última pasada; el veredicto de revisión fue de alta concordancia y sin observaciones. La presente versión conserva la equivalencia óptima, el nombre divino «Yahvé», el topónimo transliterado y el juego verbal del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme al estándar del proyecto en español.
  - Se conserva «Baal-perazim» como nombre propio transliterado, sin traducirlo en el cuerpo del texto.
  - «Los derrotó» refleja la fuerza militar de וַיַּכֵּם sin introducir una lectura más débil.
  - La nota sobre «ruptura de aguas» preserva la ambigüedad poética que el inglés auditado también documenta.
