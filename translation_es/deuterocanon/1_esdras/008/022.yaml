  - severity: low
    issue: «imponérselo a ellos» suena redundante
    rationale: El pronombre enclítico ya incorpora el objeto indirecto; añadir «a ellos» hace la frase menos natural en español. «Imponérselo» basta y preserva el sentido legal del griego.
