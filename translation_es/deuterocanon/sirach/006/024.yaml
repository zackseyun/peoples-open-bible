translation:
  language: es
  text: Como el fruto de un árbol depende de su cultivo[a], así el razonamiento de una persona depende de su inclinación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio hebreo de este versículo fue objeto de revisión frente al paralelo griego; aquí se sigue el sentido del hebreo recibido en la última decisión de revisión.
    reason: textual_variant
lexical_decisions:
- source_word: עבודת עץ
  english_pob_choice: cultivation
  chosen_spanish: cultivo
  alternatives_spanish:
  - labranza
  - cultivación
  - trabajo del árbol
  lexicon: HALOT
  rationale: El hebreo recibido se entiende mejor aquí como una imagen de cultivo, coherente con la revisión inglesa más reciente y con el marco sapiencial de causa y efecto. «Cultivo» comunica de manera natural la relación entre cuidado y fruto sin forzar el español.
- source_word: פְּרִי
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  - resultado
  lexicon: HALOT
  rationale: «Fruto» conserva la imagen concreta del hebreo y funciona bien en español para la metáfora sapiencial de lo que produce un árbol. «Resultado» perdería la imaginería vegetal.
- source_word: חשבון
  english_pob_choice: reasoning
  chosen_spanish: razonamiento
  alternatives_spanish:
  - cálculo
  - pensamiento
  - cuenta
  lexicon: HALOT
  rationale: «Razonamiento» expresa el acto mental o el curso de pensamiento que el contexto requiere. «Cuenta» sería demasiado ambiguo en español moderno y «cálculo» podría sonar excesivamente técnico.
- source_word: יצר
  english_pob_choice: inclination
  chosen_spanish: inclinación
  alternatives_spanish:
  - impulso
  - disposición
  - tendencia
  lexicon: HALOT
  rationale: «Inclinación» reproduce bien la idea de una orientación interior o impulso dominante. Es suficientemente amplia para no reducir el sentido a una sola psicología moral.
- source_word: אחד
  english_pob_choice: a person's
  chosen_spanish: una persona
  alternatives_spanish:
  - uno
  - alguien
  - el hombre
  lexicon: HALOT
  rationale: El hebreo compacto admite un sujeto genérico; «una persona» es natural en español y evita un masculino genérico innecesario. Preserva el sentido proverbial y universal del enunciado.
theological_decisions:
- issue: Relación entre el hebreo recibido y la versión griega en este versículo
  english_pob_reading: The verse follows the Hebrew sense because the extant line is now coherent as a proverb about fruit, cultivation, reasoning, and inclination.
  chosen_spanish_reading: La traducción sigue principalmente el hebreo recibido, entendiendo el dicho como una comparación entre fruto y cultivo, y entre razonamiento e inclinación.
  alternative_spanish_readings:
  - Seguir únicamente el griego y traducir imágenes de fetters/collar
  - Mantener una traducción híbrida que mezcle ambas tradiciones
  rationale: El expediente de revisión indica que el pasaje fue reconsiderado para reflejar el hebreo, no el paralelo griego. Por eso la versión española adopta la línea sapiencial del hebreo y documenta la opción textual sin mezclar imágenes incongruentes.
  doctrine_reference: 'PHILOSOPHY.md: priorizar el testimonio original disponible, documentando variantes y evitando armonizaciones no sustentadas.'
translation_notes:
  revision_awareness: 'El contexto de revisión más reciente reemplazó una lectura basada en el griego por una traducción que refleja el hebreo: עבודת עץ = cultivo/trabajo de un árbol, פרי = fruto, חשבון = razonamiento/cuenta e יצר = inclinación/disposición. La línea española sigue esa decisión revisada y evita la imagen anterior de fetros y collar.'
  spanish_consistency_notes:
  - Se mantuvo el orden proverbial con «Como..., así...», natural en español y fiel al paralelismo.
  - Se prefirió «razonamiento» sobre «cuenta» para no introducir un doble sentido contable no explícito.
  - «Inclinación» conserva la tensión moral sin convertir el término en una etiqueta doctrinal más estrecha.
  - No se incorporó el paralelo griego en el texto principal porque la revisión disponible lo desplazó explícitamente en favor del hebreo.
