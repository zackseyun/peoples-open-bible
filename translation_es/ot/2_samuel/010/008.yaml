revisions:
- from: Entonces los hijos de Amón salieron y se ordenaron para la batalla a la entrada de la puerta[a], mientras Aram de Sobá y Rejob y los hombres de Tob y Maacá estaban aparte, en el campo.
  to: Entonces los hijos de Amón salieron y se dispusieron para la batalla a la entrada de la puerta, mientras Aram de Sobá y Rejob y los hombres de Tob[a] y Maacá estaban aparte en el campo.
  rationale: Se elimina la nota innecesaria sobre «la puerta de la ciudad», se restaura la nota importante del audit trail para אִישׁ טוֹב, y se mejora ligeramente la naturalidad militar de la frase con «se dispusieron para la batalla». No se requiere adjudicación adicional porque la corrección es pequeña y está bien sustentada por la evidencia dada.
