translation:
  language: es
  text: Entonces Abraham se levantó muy de mañana, tomó pan y un odre de agua, y se los dio a Agar[a], poniéndolos sobre su hombro, junto con el muchacho; luego la envió. Y ella se fue y vagó en el desierto de Beerseba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «poniéndolos sobre su hombro, y el muchacho». La sintaxis es comprimida; también puede entenderse como «colocándolos sobre su hombro, y [entregándole] el muchacho».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּשְׁכֵּם
  english_pob_choice: rose early
  chosen_spanish: se levantó muy de mañana
  alternatives_spanish:
  - se levantó temprano
  - se levantó de madrugada
  lexicon: HALOT
  rationale: El hifil de שׁכם expresa levantarse temprano; «muy de mañana» conserva el énfasis temporal y suena natural en español bíblico contemporáneo.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: de mañana
  alternatives_spanish:
  - por la mañana
  - en la mañana
  lexicon: HALOT
  rationale: La combinación con «se levantó» reproduce el valor temporal del hebreo sin sonar repetitiva; «de mañana» es idiomático y mantiene la cercanía al original.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: El hebreo literalmente dice «pan»; aquí no hay motivo para generalizar a «alimento», porque el sustantivo concreto está bien motivado por el texto fuente.
- source_word: חֵמַת מַיִם
  english_pob_choice: a skin of water
  chosen_spanish: un odre de agua
  alternatives_spanish:
  - una bolsa de agua
  - un recipiente de agua
  lexicon: HALOT
  rationale: חֵמֶת designa un recipiente de cuero para líquidos; «odre» preserva la imagen material del hebreo y es más natural que un tecnicismo moderno como «botella».
- source_word: וַיִּתֵּן אֶל הָגָר
  english_pob_choice: gave them to Hagar
  chosen_spanish: se los dio a Agar
  alternatives_spanish:
  - los dio a Agar
  - se los entregó a Agar
  lexicon: HALOT
  rationale: En español conviene explicitar el clítico plural porque los objetos son «pan» y «un odre de agua»; «Agar» sigue la forma española usual del nombre.
- source_word: שָׂם עַל שִׁכְמָהּ
  english_pob_choice: putting them on her shoulder
  chosen_spanish: poniéndolos sobre su hombro
  alternatives_spanish:
  - colocándolos sobre su hombro
  - poniendo las provisiones sobre su hombro
  lexicon: HALOT
  rationale: El participio describe la acción circunstancial de poner los suministros sobre el hombro; «sobre su hombro» mantiene la imagen sin forzar el orden.
- source_word: וְאֶת הַיֶּלֶד
  english_pob_choice: along with the boy
  chosen_spanish: junto con el muchacho
  alternatives_spanish:
  - y el muchacho
  - con el muchacho
  lexicon: HALOT
  rationale: «Muchacho» evita una lectura demasiado infantilizada y, al mismo tiempo, refleja el tono narrativo; «junto con» clarifica que se añade a la escena sin implicar que fuera cargado sobre el hombro.
- source_word: וַיְשַׁלְּחֶהָ
  english_pob_choice: sent her away
  chosen_spanish: la despidió
  alternatives_spanish:
  - la echó
  - la envió lejos
  lexicon: HALOT
  rationale: En este contexto, שׁלח expresa despedir o enviar lejos; «despidió» mantiene la sobriedad narrativa y evita el matiz más brusco de «echó».
- source_word: וַתֵּתַע
  english_pob_choice: wandered
  chosen_spanish: vagó
  alternatives_spanish:
  - anduvo errante
  - se perdió
  lexicon: HALOT
  rationale: תעה denota vagar o errar; «vagó» comunica el movimiento sin especificar más de lo que el hebreo dice sobre si fue extravío accidental o deambular prolongado.
- source_word: בְּמִדְבַּר
  english_pob_choice: in the wilderness
  chosen_spanish: por el desierto
  alternatives_spanish:
  - en el desierto
  - por el desierto de
  lexicon: HALOT
  rationale: «Desierto» es aceptable en español, pero el hebreo bíblico también puede abarcar una zona árida y deshabitada; aquí «por el desierto» conserva el movimiento dentro del paraje.
- source_word: בְּאֵר שָׁבַע
  english_pob_choice: Beersheba
  chosen_spanish: Beerseba
  alternatives_spanish:
  - Berseba
  - Beer-sheba
  lexicon: HALOT
  rationale: Se adopta la transliteración española tradicional «Beerseba», ampliamente reconocible y fiel al nombre propio bíblico.
theological_decisions:
- issue: Relación sintáctica de «el muchacho» con la frase sobre el hombro
  english_pob_reading: The provisions were placed on Hagar's shoulder, and the boy accompanied her when Abraham sent her away.
  chosen_spanish_reading: Los suministros fueron puestos sobre el hombro de Agar, y el muchacho la acompañó cuando Abraham la despidió.
  alternative_spanish_readings:
  - Abraham puso también al muchacho sobre su hombro
  - Abraham colocó a la vez los suministros y al muchacho sobre su hombro
  rationale: El hebreo está comprimido y podría leerse de manera engañosa si se entendiera que el muchacho fue físicamente colocado sobre el hombro. La versión española preserva la secuencia del texto y evita una imagen improbable, en línea con la lectura auditada del POB inglés.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Valor de מִדְבָּר en el entorno narrativo
  english_pob_reading: in the wilderness of Beersheba
  chosen_spanish_reading: por el desierto de Beerseba
  alternative_spanish_readings:
  - en el desierto de Beerseba
  - en la soledad de Beerseba
  rationale: Aunque מִדְבָּר puede traducirse «wilderness», en español «desierto» transmite mejor la zona inhóspita y deshabitada sin introducir una sobreinterpretación geográfica.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Concordancia revisada con el paquete fuente hebreo y el audit trail inglés: se mantiene la lectura óptima-equivalente de la frase comprimida sobre el hombro, sin cambiar el sentido narrativo ni borrar la ambigüedad documentada. No se registraron revisiones posteriores en el historial aplicado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este versículo no contiene el Tetragrámaton.
  - Se mantiene «Agar» y «Beerseba» como formas españolas estándar y bíblicamente reconocibles.
  - «Muchacho» se prefirió por claridad narrativa y para evitar una lectura demasiado infantil del hebreo.
  - «Despidió» conserva el matiz solemne del verbo hebreo sin intensificarlo a «echó».
