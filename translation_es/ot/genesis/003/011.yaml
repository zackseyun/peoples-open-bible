base_translation:
  language: en
  yaml_path: translation/ot/genesis/003/011.yaml
  text: And he said[b][a], “Who told you that you were naked? Have you eaten from the tree from which I commanded you not to eat?”
  footnotes:
  - marker: a
    text: Or, more formally, 'Did you eat from the tree ... ?' The Hebrew perfect can be represented in English either with a simple past or a present perfect in this context.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'from it.' English idiom often says 'eat from the tree' rather than 'eat from it' or 'eat of it.'
    reason: lexical_alternative
