review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: interjección inicial, participios de quienes encienden/se ciñen, imperativo irónico, consecuencia ''de mi mano'' y cierre de juicio. Sin embargo, ''brasas'' no preserva bien la imagen de זִיקוֹת en paralelo con ''ceñirse con'' y luego ''entre las ... que han encendido''; en español sugiere carbones ardientes más que teas, tizones o chispas. Además, la nota [b] está anclada en ''encendido'' pero comenta ''en tormento'', lo cual incumple la disciplina de anclaje de notas.'
  spanish_quality_summary: El texto es claro y legible, con tono digno y moderno. '¡Miren!' funciona bien, y 'caminen a la luz de su fuego' suena natural. No obstante, 'que se ciñen de brasas' resulta algo extraño y físicamente menos coherente que 'se ciñen con teas/tizones'. También conviene reubicar la nota del cierre al término que realmente comenta.
  glossary_alignment: 'No hay conflicto con la terminología doctrinal del proyecto. ''De mi mano'' preserva la agencia divina. ''En tormento'' concuerda con la decisión del POB para לְמַעֲצֵבָה. La principal cuestión léxica es זִיקוֹת: el audit trail inglés revisado favorece ''firebrands/brands'', por lo que en español conviene un equivalente como ''teas'' o ''tizones encendidos'' antes que ''brasas''.'
  issues:
  - severity: medium
    issue: זִיקוֹת traducido como 'brasas'
    rationale: Aunque pertenece al campo semántico del fuego, 'brasas' no corresponde tan bien a 'firebrands/brands' y dificulta la imagen de 'ceñirse con' algo. 'Teas' o 'tizones encendidos' preservan mejor el valor revisado en el audit trail.
  - severity: high
    issue: La nota [b] está colocada en el lugar equivocado
    rationale: La nota [b] explica alternativas para לְמַעֲצֵבָה ('en tormento'), pero en el texto está anclada a 'han encendido'. Debe moverse al sintagma 'en tormento[b]' para cumplir la regla de marcadores.
  - severity: low
    issue: Artículo omitido en 'encienden fuego'
    rationale: El hebreo tiene singular indefinido 'a fire'. En español 'encienden fuego' es comprensible, pero 'encienden un fuego' refleja con más precisión la referencia concreta sin sonar forzado.
  revised_spanish_text: '¡Miren![a] Todos ustedes que encienden un fuego, que se ciñen con teas: caminen a la luz de su fuego y entre las teas que han encendido. De mi mano les ha venido esto: en tormento[b] se acostarán.'
  revised_footnotes:
