translation:
  language: es
  text: Pero no prestaron atención a sus palabras[a], pues he aquí[b] que habían venido con gran fuerza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «no hicieron caso de sus palabras».'
    reason: lexical_alternative
  - marker: b
    text: El griego usa una expresión de llamada de atención; puede verterse también «miren» o «vean».
    reason: lexical_alternative
  - marker: c
    text: La expresión puede implicar una fuerza armada considerable o una fuerte presencia militar.
    reason: cultural_note
lexical_decisions:
- source_word: οὐ προσεῖχον
  english_pob_choice: did not pay attention
  chosen_spanish: no prestaron atención
  alternatives_spanish:
  - no hicieron caso
  - no atendieron
  - no les hicieron caso
  lexicon: LSJ
  rationale: προσέχω con dativo expresa atender, prestar atención o hacer caso. «No prestaron atención» conserva el valor de desatender el discurso ajeno y suena natural en español.
- source_word: τοῖς λόγοις αὐτῶν
  english_pob_choice: to their words
  chosen_spanish: a sus palabras
  alternatives_spanish:
  - a lo que decían
  - a sus dichos
  - a sus declaraciones
  lexicon: LSJ
  rationale: λόγοις se refiere aquí al contenido de lo que dijeron. «Palabras» es fiel y claro en español, sin introducir una paráfrasis mayor.
- source_word: ἴδου γὰρ
  english_pob_choice: for behold
  chosen_spanish: porque, miren
  alternatives_spanish:
  - porque, he aquí
  - porque, vean
  - pues, miren
  lexicon: LSJ
  rationale: ἴδου es una llamada de atención. En español, «miren» conserva esa fuerza de exhortación sin sonar excesivamente arcaico; se mantiene la relación causal de γάρ con «porque».
- source_word: ἦλθον
  english_pob_choice: they had come
  chosen_spanish: habían venido
  alternatives_spanish:
  - vinieron
  - habían llegado
  - llegaron
  lexicon: LSJ
  rationale: El aoristo indica una acción pasada, y en este contexto explicativo el pluscuamperfecto español comunica bien que su llegada ya era un hecho previo al rechazo de sus palabras.
- source_word: μετὰ δυνάμεως πολλῆς
  english_pob_choice: with great force
  chosen_spanish: con gran fuerza
  alternatives_spanish:
  - con gran poder
  - con un gran contingente
  - con mucha fuerza
  lexicon: LSJ
  rationale: δύναμις puede denotar fuerza, poder o fuerza militar. Dado el contexto narrativo, «con gran fuerza» preserva la amplitud del griego y permite la posible referencia a una presencia armada sin estrecharla demasiado.
theological_decisions:
- issue: Valor de ἴδου como marcador de atención
  english_pob_reading: for behold
  chosen_spanish_reading: porque, miren
  alternative_spanish_readings:
  - porque, he aquí
  - porque, vean
  rationale: 'No hay un problema doctrinal, pero sí de registro: el griego usa una partícula deíctica que pide atención. «Miren» reproduce esa función sin cargar el texto con un tono demasiado bíblico-arcáico.'
  doctrine_reference: No aplica; decisión estilística y discursiva.
- issue: Sentido de δύναμις en contexto militar
  english_pob_reading: with great force likely refers to a substantial armed force or military strength
  chosen_spanish_reading: con gran fuerza
  alternative_spanish_readings:
  - con un gran ejército
  - con gran poder
  - con un gran contingente armado
  rationale: Se conserva la tensión entre «fuerza» y «poder» que el griego permite. El contexto sugiere un grupo armado, pero el texto no obliga a especificar «ejército»; por eso se evita estrechar indebidamente el alcance.
  doctrine_reference: No aplica; decisión semántica contextual.
translation_notes:
  revision_awareness: El contexto inglés fue revisado desde «for look» a «for behold» para reflejar mejor el registro formal de ἴδου. La redacción española sigue esa revisión, pero evita un calco arcaizante y conserva la función deíctica con un imperativo natural («miren»).
  spanish_consistency_notes:
  - Se mantiene «palabras» para λόγοι, en paralelo con la opción inglesa.
  - Se evitó «SEÑOR» u otras convenciones de ocultamiento porque no aparece el nombre divino en este versículo.
  - «Gran fuerza» preserva la ambigüedad entre poder y fuerza militar, coherente con el audit trail inglés.
