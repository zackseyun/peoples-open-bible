revisions:
- from: Los planes se establecen[a] por consejo; haz la guerra con estrategia[b].
  to: Los planes se establecen por consejo; libra la guerra con estrategia[a].
  rationale: Se eliminó la nota innecesaria en «se establecen» porque no responde a una ambigüedad relevante en español ni a una nota preservada del POB inglés. Se cambió «haz la guerra» por «libra la guerra» para dar un español más idiomático que corresponda al valor del inglés «wage war» y al modismo hebreo עשה מלחמה. Se mantuvo «estrategia» en el texto principal, en línea con la revisión inglesa final, y se ajustó la nota para reflejar con más fidelidad las alternativas léxicas auditadas para תַחְבֻּלוֹת.
