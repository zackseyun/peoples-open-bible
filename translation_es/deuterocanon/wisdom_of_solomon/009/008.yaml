translation:
  language: es
  text: Tú dijiste edificar un templo en tu santo monte, y un altar en la ciudad de tu morada, una copia del santo tabernáculo[a] que preparaste desde el principio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «tienda»: el término griego puede significar «tienda» y, en uso bíblico, el tabernáculo sagrado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπας
  english_pob_choice: You said
  chosen_spanish: Tú dijiste
  alternatives_spanish:
  - Tú mandaste
  - Tú hablaste
  lexicon: LSJ
  rationale: El aoristo de λέγω expresa “dijiste” de manera directa. En español mantiene el tono de oración y la dirección personal sin convertir implícitamente el verbo en un mandato que el griego no formula de manera explícita.
- source_word: οἰκοδομῆσαι
  english_pob_choice: to build
  chosen_spanish: se construyera
  alternatives_spanish:
  - se edificara
  - se levantara
  lexicon: LSJ
  rationale: Como infinitivo de finalidad/complemento tras εἶπας, el sentido es ordenar o disponer la construcción. En español, la pasiva refleja hace la frase natural y conserva el valor de propósito.
- source_word: ναὸν
  english_pob_choice: a temple
  chosen_spanish: un templo
  alternatives_spanish:
  - un santuario
  - el templo
  lexicon: LSJ
  rationale: ναός designa el templo o santuario. “Un templo” reproduce bien el artículo indefinido del griego y su referencia cultual sin forzar una forma más específica que el texto no exige.
- source_word: ἐν ὄρει ἁγίῳ σου
  english_pob_choice: on your holy mountain
  chosen_spanish: en tu santo monte
  alternatives_spanish:
  - sobre tu santo monte
  - en tu monte santo
  lexicon: LSJ
  rationale: Con ἐν + lugar, el español natural es “en”. “Monte” conserva el valor de ὄρος y “santo” mantiene la cualidad sagrada del lugar. Evito “monte santo” solo por ritmo, no por diferencia de sentido.
- source_word: πόλει κατασκηνώσεώς σου
  english_pob_choice: the city of your dwelling
  chosen_spanish: la ciudad de tu morada
  alternatives_spanish:
  - la ciudad de tu habitación
  - la ciudad donde moras
  lexicon: LSJ
  rationale: κατασκήνωσις alude a morada/encampamiento/tabernáculo. “Morada” ofrece un español culto y amplio que conserva el matiz de residencia divina sin reducirlo a una simple ubicación.
- source_word: θυσιαστήριον
  english_pob_choice: an altar
  chosen_spanish: un altar
  lexicon: LSJ
  rationale: Término cultual estándar; “altar” es la equivalencia directa y clara en español.
- source_word: μίμημα
  english_pob_choice: a copy
  chosen_spanish: una copia
  alternatives_spanish:
  - una imitación
  - una representación
  - una semejanza
  lexicon: LSJ
  rationale: Aunque el primer criterio de la serie inglesa fue “imitation”, la revisión adoptó “copy” por naturalidad. En español, “copia” es la opción más idiomática y comunica bien la dependencia del modelo sin sobrecargar el pasaje con un tecnicismo.
- source_word: σκηνῆς ἁγίας
  english_pob_choice: the holy tabernacle
  chosen_spanish: del santo tabernáculo
  alternatives_spanish:
  - de la santa tienda
  - del sagrado tabernáculo
  lexicon: LSJ
  rationale: σκηνή puede ser “tienda” o, en uso bíblico, “tabernáculo”. Dado el contexto cultual y la tradición bíblica, “tabernáculo” es la forma más precisa y reconocible; “santo” refleja ἁγίας.
- source_word: ἣν προητοίμασας
  english_pob_choice: that you prepared
  chosen_spanish: que preparaste
  alternatives_spanish:
  - que preparaste de antemano
  - que dispusiste previamente
  lexicon: LSJ
  rationale: El verbo incluye la idea de preparación previa. En español, esa anterioridad queda reforzada por la frase siguiente; por eso “preparaste” conserva fluidez sin perder el sentido de anticipación.
- source_word: ἀπʼ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el origen
  lexicon: LSJ
  rationale: Expresión idiomática estándar que preserva la profundidad temporal de la preparación divina.
theological_decisions:
- issue: Correspondencia entre el templo/altar terrenales y el patrón sagrado previo en μίμημα σκηνῆς ἁγίας
  english_pob_reading: a copy of the holy tabernacle
  chosen_spanish_reading: una copia del santo tabernáculo
  alternative_spanish_readings:
  - una representación del santo tabernáculo
  - una imitación del santo tabernáculo
  rationale: 'La frase griega afirma una relación de dependencia y correspondencia, pero no detalla por sí misma toda la teología posterior del santuario celestial. “Copia” mantiene esa tensión: algo derivado de un modelo previo, sin añadir explicación doctrinal que el verso no expresa.'
  doctrine_reference: Preservar la tensión textual sin ampliar indebidamente la cristología o la escatología del santuario.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente en su preferencia por un término más natural para μίμημα, pero la traduce al español con “copia”, que es la opción más transparente y idiomática. También conserva la equivalencia cultual de σκηνή con “tabernáculo”, en coherencia con el registro bíblico y con el contexto del pasaje.
  spanish_consistency_notes:
  - Se mantiene “Dios” no aplica aquí; la dirección es a la segunda persona implícita/expresa en la oración.
  - Se conserva el lenguaje cultual con “templo”, “altar” y “tabernáculo” sin sustituirlo por vocabulario eclesiástico posterior.
  - El marcador [a] aparece en el texto justo después de “monte” porque la nota explica una alternativa léxica relevante para ὄρος / ναός en la tradición textual y de traducción.
