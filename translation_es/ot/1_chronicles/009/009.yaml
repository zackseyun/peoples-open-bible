    issue: Intrusión de texto no español en el cuerpo del versículo
    rationale: ‘Todos هؤلاء hombres’ contiene una palabra árabe y por tanto no es publicable; además altera la legibilidad y fidelidad del texto español.
  - severity: medium
    issue: La nota b está anclada al final de la frase pero explica principalmente ‘jefes de casas paternas’
    rationale: La nota cultural del inglés POB se refiere a la designación técnica de clan. En español debe anclarse donde aparece esa expresión para mayor precisión.
  - severity: low
    issue: Comillas y redacción de la nota b poco pulidas
    rationale: 'La nota actual usa comillas y puntuación torpes (‘''Expresión...’), y ‘clanica’ debería llevar tilde: ‘clánica’.'
