translation:
  language: es
  text: Ciertamente ahora me ha agotado[a]; tú has devastado a toda mi gente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me ha fatigado» / «me ha cansado».
    reason: lexical_alternative
  - marker: b
    text: O «toda mi asamblea» o «toda mi congregación». El hebreo puede referirse al círculo reunido de Job o a su compañía doméstica.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Solo
  - Pero
  - Sin duda
  lexicon: HALOT
  rationale: אַךְ introduce énfasis más que restricción. «Ciertamente» comunica bien la fuerza enfática del lamento sin convertirlo en una oposición adversativa que el hebreo no exige aquí.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - hoy
  lexicon: HALOT
  rationale: El adverbio temporal señala la situación presente de Job. «Ahora» es natural en español y conserva la inmediatez del reproche lamentoso.
- source_word: הֶלְאָנִי
  english_pob_choice: he has worn me out
  chosen_spanish: me ha agotado
  alternatives_spanish:
  - me ha consumido
  - me ha cansado
  - me ha fatigado
  lexicon: HALOT
  rationale: La raíz לאה expresa cansancio o agotamiento. «Me ha agotado» transmite el efecto completo sobre Job y suena natural en español moderno, manteniendo la intensidad del verbo sin suavizarlo.
- source_word: הֲשִׁמּוֹתָ
  english_pob_choice: you have devastated
  chosen_spanish: has devastado
  alternatives_spanish:
  - has asolado
  - has desolado
  - has dejado en ruinas
  lexicon: HALOT
  rationale: El causativo de שמם comunica devastación/desolación. «Has devastado» es fuerte, claro y fiel al alcance del término, sin perder la violencia del juicio verbal.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo el
  - entera
  lexicon: HALOT
  rationale: El cuantificador totalizador se adapta naturalmente al femenino singular de «compañía» en español. «Toda» preserva el sentido de totalidad del hebreo.
- source_word: עֲדָתִי
  english_pob_choice: my company
  chosen_spanish: mi compañía
  alternatives_spanish:
  - mi asamblea
  - mi congregación
  - mi grupo
  lexicon: HALOT
  rationale: Aunque עֵדָה puede significar «asamblea» o «congregación», en este contexto de lamentación de Job la referencia probablemente es su círculo cercano o compañía reunida. «Compañía» expresa mejor ese valor relacional en español; las alternativas litúrgicas se conservan como posibilidad semántica.
theological_decisions:
- issue: Cambio de persona gramatical entre los dos verbos
  english_pob_reading: 'Preserve the Hebrew shift: ''he has worn me out; you have devastated...'''
  chosen_spanish_reading: 'Conservar el cambio hebreo: «me ha agotado; tú has devastado...»'
  alternative_spanish_readings:
  - «me has agotado; has devastado...»
  - «me ha agotado; ha devastado...»
  rationale: El texto masorético pasa de tercera persona singular a segunda persona masculina singular. La versión española mantiene esa tensión con el paso de «me ha agotado» a «tú has devastado», evitando armonizar la frase y respetando la oscilación retórica del original.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se registraron cambios necesarios y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» fuera del texto porque el hebreo no nombra explícitamente al sujeto; la oscilación de persona queda preservada en la sintaxis.
  - «Compañía» se eligió por claridad relacional en español, sin borrar la posibilidad de «asamblea/congregación» que el hebreo permite en el contexto.
  - El tono se mantiene solemne y lamentoso, sin reforzar indebidamente la identificación del sujeto implícito del primer verbo.
