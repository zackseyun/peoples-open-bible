translation:
  language: es
  text: Pues parecía que no solo el pueblo, sino también los muros y todo el suelo resonaban[a], ya que entonces todas las cosas estaban siendo entregadas a la muerte[b], en lugar de la profanación del lugar[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reverberaban». El verbo griego comunica un sonido que reverbera.
    reason: lexical_alternative
  - marker: b
    text: O «estaban siendo cambiadas a muerte» o «estaban siendo vueltas hacia la muerte». La expresión griega es inusual y metafórica.
    reason: lexical_alternative
  - marker: c
    text: «El lugar» se refiere por el contexto al recinto sagrado, probablemente el área del templo; el griego no usa aquí la palabra más específica «templo».
    reason: cross_reference
lexical_decisions:
- source_word: δοκεῖν γὰρ ἦν
  english_pob_choice: For it seemed
  chosen_spanish: Pues parecía
  alternatives_spanish:
  - Porque parecía
  - Y parecía
  lexicon: LSJ
  rationale: La expresión impersonal introductoria se conserva con una fórmula natural en español. «Pues» refleja el valor explicativo de γάρ sin volver la frase pesada.
- source_word: τοὺς ἀνθρώπους
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - las personas
  - la gente
  lexicon: LSJ
  rationale: En este contexto de clamor colectivo, «el pueblo» transmite mejor el conjunto humano que «los hombres» y evita una traducción demasiado literal que sonaría menos natural en español.
- source_word: τὰ τείχη
  english_pob_choice: the walls
  chosen_spanish: los muros
  alternatives_spanish:
  - las murallas
  - las paredes
  lexicon: LSJ
  rationale: «Muros» mantiene el paralelo físico y solemne del texto. «Murallas» sería posible, pero aquí el griego no especifica fortificación, solo elementos construidos.
- source_word: τὸ πᾶν ἔδαφος
  english_pob_choice: the whole ground
  chosen_spanish: todo el suelo
  alternatives_spanish:
  - todo el terreno
  - toda la tierra
  lexicon: LSJ
  rationale: ἔδαφος puede referirse a suelo/superficie del terreno. «Todo el suelo» conserva la imagen física inmediata y el efecto hiperbólico del pasaje.
- source_word: ἠχεῖν
  english_pob_choice: were resounding
  chosen_spanish: resonaban
  alternatives_spanish:
  - reverberaban
  - repicaban
  lexicon: LSJ
  rationale: El verbo sugiere un sonido que vuelve y se propaga. «Resonaban» es una forma formal y natural en español para expresar ese eco colectivo. La nota permite la alternativa de «reverberaban».
- source_word: ἅτε δὴ
  english_pob_choice: since
  chosen_spanish: ya que
  alternatives_spanish:
  - puesto que
  - pues
  lexicon: LSJ
  rationale: La partícula explicativa se vierte con una causalidad clara y sobria. «Ya que» es idiomático y mantiene el enlace lógico del griego.
- source_word: τῶν πάντων
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todos los seres
  lexicon: LSJ
  rationale: La amplitud de la expresión griega se conserva con una formulación inclusiva y transparente. «Todas las cosas» reproduce el alcance retórico sin concretarlo en exceso.
- source_word: θάνατον ἀλλασσομένων
  english_pob_choice: were being changed to death
  chosen_spanish: estaban siendo cambiadas a muerte
  alternatives_spanish:
  - estaban siendo entregadas a la muerte
  - estaban siendo vueltas hacia la muerte
  lexicon: LSJ
  rationale: La construcción es extraña y metafórica en griego. Se mantiene la fuerza de cambio/transformación sin suavizarla a «morían», para no perder la tensión léxica documentada por el POB en inglés.
- source_word: ἀντὶ τῆς τοῦ τόπου βεβηλώσεως
  english_pob_choice: instead of the profanation of the place
  chosen_spanish: en lugar de la profanación del lugar
  alternatives_spanish:
  - en vez de la profanación del lugar
  - en lugar de la deshonra del lugar
  lexicon: LSJ
  rationale: «Profanación» conserva el valor cultual de βεβήλωσις. «El lugar» mantiene la literalidad del griego, sin especificar «templo» más allá de lo que el texto dice.
theological_decisions:
- issue: Referencia de «el lugar» (τοῦ τόπου)
  english_pob_reading: the place; likely the temple area, but the Greek itself says the place
  chosen_spanish_reading: el lugar
  alternative_spanish_readings:
  - el templo
  - el recinto sagrado
  - el lugar santo
  rationale: Se mantiene el término general del griego y se deja la identificación contextual implícita. Así se evita introducir una precisión que el texto fuente no formula.
  doctrine_reference: Primacía del idioma original y evitación de paráfrasis más específica que el texto base.
translation_notes:
  revision_awareness: He seguido la última revisión del inglés POB, que prefirió «resounding» sobre «echoing» y «were being changed to death» para reflejar mejor el griego ἠχεῖν y ἀλλασσομένων. En español, «resonaban» y «estaban siendo cambiadas a muerte» preservan esa misma decisión interpretativa sin volverla artificiosa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el original lo exige; aquí no aparece.
  - Se mantiene «profanación» para βεβήλωσις, en línea con la terminología cultual del proyecto.
  - Se conserva la amplitud de «el lugar» sin sustituirla por «templo».
  - La forma verbal en plural concuerda con «las cosas» y mantiene el carácter colectivo del giro griego.
