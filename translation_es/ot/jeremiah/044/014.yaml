revisions:
- from: Así que no habrá fugitivo ni sobreviviente para el remanente de Judá, de los que han venido a habitar allí en la tierra de Egipto y a volver a la tierra de Judá, a la cual están elevando su alma para volver y habitar allí; porque no volverán, sino fugitivos[a].
  to: Así no habrá fugitivo ni sobreviviente para el remanente de Judá, de los que han venido a habitar allí en la tierra de Egipto y a volver a la tierra de Judá, a la cual están elevando su alma[a] para volver y habitar allí; porque no volverán, excepto algunos fugitivos.
  rationale: 'Se corrige la excepción final para expresar con español natural y fiel el sentido de כִּי אִם פְּלֵטִים: no regresarán, salvo unos pocos que escapen. Se reubica la nota en la frase idiomática que realmente explica. También se suaviza «Así que» a «Así» para evitar una inferencia discursiva no marcada en el hebreo, manteniendo el tono solemne. No se requiere adjudicación adicional porque el problema es claro y de aplicación directa.'
  reviewer_model: gpt-5.4
