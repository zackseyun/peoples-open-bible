translation:
  language: es
  text: Pero si me recuerdas cuando te vaya bien,[a] te ruego que me muestres bondad, y me menciones a Faraón,[b] y me saques de esta casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me recuerdas contigo». El hebreo añade «contigo», un matiz idiomático de tenerme presente de manera personal, que en español normalmente se expresa de forma natural simplemente con «me recuerdas».
    reason: lexical_alternative
  - marker: b
    text: 'O «haces mención de mí a Faraón». El hebreo usa un verbo causativo: ponerme en la atención de Faraón.'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי אִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Solo si
  - Ciertamente si
  lexicon: HALOT
  rationale: La combinación introduce una súplica condicional con matiz adversativo. «Pero si» reproduce de manera natural ese giro en español sin perder la fuerza de la condición.
- source_word: זְכַרְתַּנִי
  english_pob_choice: you remember me
  chosen_spanish: me recuerdas
  alternatives_spanish:
  - te acuerdas de mí
  - me tienes presente
  lexicon: HALOT
  rationale: El qal de זכר con sufijo de primera persona expresa recordar o tener presente. «Me recuerdas» es directo y natural en español, y conserva el sentido básico del verbo.
- source_word: אִתְּךָ
  english_pob_choice: with yourself
  chosen_spanish: junto contigo
  alternatives_spanish:
  - contigo
  - con tu persona
  lexicon: HALOT
  rationale: El complemento preposicional añade una matización idiomática difícil de verter literalmente. «Junto contigo» conserva la idea de tenerme presente de manera personal sin caer en un calco poco natural.
- source_word: כַּאֲשֶׁר יִיטַב לָךְ
  english_pob_choice: when it goes well for you
  chosen_spanish: cuando te vaya bien
  alternatives_spanish:
  - cuando todo te vaya bien
  - cuando estés bien
  lexicon: HALOT
  rationale: La cláusula temporal apunta al restablecimiento y bienestar del copero. «Cuando te vaya bien» es idiomático en español y mantiene el valor temporal del hebreo.
- source_word: וְעָשִׂיתָ נָּא עִמָּדִי חָסֶד
  english_pob_choice: please show kindness to me
  chosen_spanish: te ruego que me muestres bondad
  alternatives_spanish:
  - te pido que me hagas favor
  - por favor, hazme misericordia
  lexicon: HALOT
  rationale: חֶסֶד aquí es una petición personal de benevolencia, no una fórmula técnica de pacto. «Bondad» comunica bien la acción concreta pedida en español; la expresión «te ruego» refleja נָא con solemnidad y naturalidad.
- source_word: חָסֶד
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - amabilidad
  - misericordia
  - lealtad
  lexicon: HALOT
  rationale: En este contexto interpersonal, «bondad» transmite mejor la acción benévola solicitada. «Misericordia» o «lealtad» podrían sugerir matices más especializados que el pasaje no exige.
- source_word: וְהִזְכַּרְתַּנִי אֶל פַּרְעֹה
  english_pob_choice: and mention me to Pharaoh
  chosen_spanish: y hagas mención de mí ante Faraón
  alternatives_spanish:
  - y me recuerdes ante Faraón
  - y me menciones a Faraón
  lexicon: HALOT
  rationale: 'El hifil de זכר es causativo: hacer que José quede presente ante la autoridad. «Hagas mención de mí ante Faraón» conserva ese valor y es plenamente idiomático en español.'
- source_word: וְהוֹצֵאתַנִי
  english_pob_choice: and bring me out
  chosen_spanish: y me saques
  alternatives_spanish:
  - y me hagas salir
  - y me liberes
  lexicon: HALOT
  rationale: El hifil de יצא tiene fuerza causativa, ‘hacer salir’. «Me saques» mantiene la energía del verbo original y, unido al complemento siguiente, completa bien la idea de liberación del encierro.
- source_word: מִן הַבַּיִת הַזֶּה
  english_pob_choice: of this house
  chosen_spanish: de esta casa
  alternatives_spanish:
  - de este lugar
  - de esta prisión
  lexicon: HALOT
  rationale: El hebreo dice literalmente «casa», probablemente la casa-prisión. Se conserva «casa» en el texto principal porque el término explícito del original es ese; el contexto ya orienta al lector.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que rechazó la literalidad awkward «remember me with yourself». Por eso el español evita un calco duro y conserva el matiz idiomático mediante «junto contigo» con nota. También se mantuvo la decisión de no interpretar explícitamente «casa» como «prisión», siguiendo el texto hebreo y la auditoría inglesa.
  spanish_consistency_notes:
  - Se preservó «Faraón» como transliteración estable del nombre propio en español.
  - Se evitó «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «Bondad» se eligió para חֶסֶד por tratarse de una petición interpersonal concreta, no de terminología de pacto.
  - Las notas de pie están ancladas exactamente en el texto principal con [a] y [b].
