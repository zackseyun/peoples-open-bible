translation:
  language: es
  text: Subían hasta los cielos; bajaban a las profundidades. Su alma[a] se deshacía en angustia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su vida se deshacía en angustia», pues נֶפֶשׁ puede significar «alma», «vida» o «ser», y בְּרָעָה puede denotar «angustia», «aflicción» o «desastre».
    reason: lexical_alternative
lexical_decisions:
- source_word: יַעֲלוּ
  english_pob_choice: rose up
  chosen_spanish: se elevaban
  alternatives_spanish:
  - subían
  - ascendían
  - se alzaban
  lexicon: HALOT
  rationale: El verbo expresa movimiento ascendente en poesía. «Se elevaban» conserva el dinamismo y la imagen intensificada sin sonar mecánico en español.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  - el firmamento
  lexicon: HALOT
  rationale: En el paralelo poético, el plural «los cielos» reproduce bien el tono bíblico y la amplitud imagética de שָׁמַיִם.
- source_word: יֵרְדוּ
  english_pob_choice: went down
  chosen_spanish: descendían
  alternatives_spanish:
  - bajaban
  - iban hacia abajo
  - se hundían
  lexicon: HALOT
  rationale: El verbo se contrapone al ascenso anterior. «Descendían» mantiene la antítesis y el registro poético sin añadir la idea de hundirse, que no está explícita en el hebreo.
- source_word: תְהוֹמוֹת
  english_pob_choice: the depths
  chosen_spanish: las profundidades
  alternatives_spanish:
  - los abismos
  - las honduras
  - las profundidades marinas
  lexicon: HALOT
  rationale: «Profundidades» es una equivalencia natural para el plural poético de תְהוֹמוֹת y encaja con la escena marítima. «Abismos» sería más solemne, pero algo más fuerte de lo necesario.
- source_word: נַפְשָׁם
  english_pob_choice: their soul
  chosen_spanish: su alma
  alternatives_spanish:
  - su vida
  - su ser
  - ellos mismos
  lexicon: HALOT
  rationale: Se conserva «alma» para reflejar נֶפֶשׁ sin resolverlo por completo a «vida» o «personas». En español, «alma» mantiene el efecto de disolución interior descrito por el verso.
- source_word: בְּרָעָה
  english_pob_choice: in distress
  chosen_spanish: en angustia
  alternatives_spanish:
  - en aflicción
  - en apuro
  - en calamidad
  lexicon: HALOT
  rationale: La revisión inglesa prefirió «distress» por ser más natural y ajustado al contexto. «Angustia» recoge bien ese campo semántico en español y evita el sentido moral de «maldad».
- source_word: תִּתְמוֹגָג
  english_pob_choice: melted away
  chosen_spanish: se derretía
  alternatives_spanish:
  - se deshacía
  - se consumía
  - se fundía
  lexicon: HALOT
  rationale: El verbo transmite disolución o colapso interior. «Se derretía» preserva la metáfora física del original y funciona con naturalidad en español poético.
translation_notes:
  revision_awareness: La versión inglesa fue revisada de «calamity» a «distress» para בְּרָעָה; esta decisión se reflejó en español con «angustia», manteniendo el campo semántico más natural y evitando sobredeterminar el término. También se conservó la metáfora de disolución en «se derretía», en línea con la redacción inglesa final.
  spanish_consistency_notes:
  - Se mantuvo «los cielos» y «las profundidades» para conservar el paralelismo poético.
  - Se eligió «alma» como renderización principal de נֶפֶשׁ, con nota alternativa por la amplitud semántica del término.
  - No se usó «SEÑOR» ni terminología eclesiástica sustitutiva, porque el verso no contiene el Tetragrámaton ni requiere equivalencias confesionales especiales.
