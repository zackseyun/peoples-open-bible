translation:
  language: es
  text: '[estaban] a punto de ser privados de la ley, de la patria y del santo templo[a], y [él les exhortaba] a no permitir que el pueblo, que apenas acababa de recobrar un poco, llegara a quedar sujeto a las naciones injuriadoras[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra natal» para «la patria».
    reason: lexical_alternative
  - marker: b
    text: O «las naciones que revilen / blasfemen». El término griego puede denotar hablar de manera injuriosa o profana.
    reason: lexical_alternative
lexical_decisions:
- source_word: στερεῖσθαι
  english_pob_choice: to be deprived of
  chosen_spanish: ser privados de
  alternatives_spanish:
  - quedar privados de
  - ser despojados de
  lexicon: LSJ
  rationale: El infinitivo expresa quedar sin algo por pérdida o despojo. «Ser privados de» conserva con naturalidad esa fuerza pasiva y encaja bien en español bíblico moderno.
- source_word: νόμου
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - la ley de Moisés
  lexicon: LSJ
  rationale: En el contexto judío alude a la ley ancestral/Torá. «La ley» mantiene la sobriedad del original sin introducir una aclaración no presente en el griego.
- source_word: πατρίδος
  english_pob_choice: fatherland
  chosen_spanish: la patria
  alternatives_spanish:
  - la tierra natal
  - la tierra de los padres
  lexicon: LSJ
  rationale: «Patria» reproduce en español el valor de tierra ancestral/nacional. «Fatherland» en inglés llevó a un matiz filial-histórico; en español «patria» es la equivalencia más natural y digna.
- source_word: ἱεροῦ ἁγίου
  english_pob_choice: holy temple
  chosen_spanish: el santo templo
  alternatives_spanish:
  - el templo santo
  - el sagrado templo
  lexicon: LSJ
  rationale: ἱερόν es «templo» y ἅγιον lo califica como santo. «Santo templo» conserva la estructura breve del original y suena idiomático en español.
- source_word: ἄρτι βραχέως ἀνεψυγμένα
  english_pob_choice: who had just now recovered a little
  chosen_spanish: que apenas acababa de recobrar un poco
  alternatives_spanish:
  - que apenas se había repuesto un poco
  - que hacía poco había recobrado algo de aliento
  lexicon: LSJ
  rationale: La expresión indica alivio o recuperación reciente y parcial. «Apenas acababa de recobrar un poco» comunica ambos matices sin exagerarlos.
- source_word: λαὸν
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - la nación
  lexicon: LSJ
  rationale: En este contexto se refiere al pueblo judío colectivamente. «El pueblo» es la forma más directa y reverente en español.
- source_word: δυσφήμοις ἔθνεσιν
  english_pob_choice: the reviling nations
  chosen_spanish: las naciones que los ultrajan
  alternatives_spanish:
  - las naciones revilingas
  - las naciones injuriadoras
  - las naciones blasfemas
  lexicon: LSJ
  rationale: δυσφήμοις puede aludir a hablar mal, injuriar o desacreditar. «Que los ultrajan» expresa el sentido de hostilidad verbal sin forzar un tecnicismo; «naciones» preserva ἔθνεσιν. Evita una traducción mecánica que sonaría poco natural en español.
- source_word: ὑποχειρίους γενέσθαι
  english_pob_choice: to become subject to
  chosen_spanish: llegara a quedar sujeto a
  alternatives_spanish:
  - llegara a someterse a
  - llegara a ser subyugado a
  lexicon: LSJ
  rationale: La expresión indica entrar bajo control o poder de otro. «Quedar sujeto a» transmite subordinación de forma clara y formal en español.
theological_decisions:
- issue: Construcción dependiente con verbos implícitos en el contexto
  english_pob_reading: '[they were] about to be deprived ... and [he urged them] not to allow ...'
  chosen_spanish_reading: '[estaban] a punto de ser privados ... y [él les exhortaba] a no permitir ...'
  alternative_spanish_readings:
  - '[iban] a ser privados ... y [les rogaba] que no permitieran ...'
  - '[estaban] por ser despojados ... y [les instaba] a no dejar que ...'
  rationale: El griego depende sintácticamente del contexto inmediato y no trae un verbo finito plenamente explícito en el versículo aislado. Mantener los complementos entre corchetes señala con transparencia lo suministrado por contexto y evita endurecer la frase con una paráfrasis no atestiguada.
  doctrine_reference: Transparencia textual y equivalencia óptima; preservar las relaciones sintácticas del original con mínima suplencia contextual.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «slanderous nations» por «reviling nations» para acercarse más a δυσφήμοις. En español se siguió ese ajuste con «las naciones que los ultrajan», manteniendo el tono formal y la hostilidad verbal sin imponer una lectura exclusivamente teológica. También se conservó la solución de suplir mínimamente el sujeto/verbo implícitos mediante corchetes, como en el auditorio inglés.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando aparezca el nombre divino explícito; aquí no ocurre.
  - Se usa «ley» en sentido toráico/covenantal sin ampliar a «Ley de Moisés», porque el contexto ya es judío.
  - Se evita «SEÑOR» porque el texto no contiene κύριος ni una sustitución del nombre divino.
  - «Patria» se prefiere a «homeland»/«tierra natal» por fluidez y por conservar el matiz ancestral.
  - Se mantiene «pueblo» para λαὸν por ser el colectivo histórico de Israel y no una mera multitud.
