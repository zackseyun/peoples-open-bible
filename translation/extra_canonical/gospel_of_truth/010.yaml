  consult_excerpt: 'He’s the shepherd who left behind the ninety- 32 nine sheep which
    weren’t lost. He went and searched for the one which was lost. He rejoiced when
    he found it, because ninety-nine is a number expressed with the left hand. However,
    when the one is found, the numerical sum moves to the right hand. In this way,
    what needs the one – that is, the whole right hand – draws what it needs, takes
    it from the left hand, and moves it to the right, so the number becomes one hundred.
    This is a symbol of the sound of these numbers; this is the Father.

    Even on the Sabbath, he worked for the sheep which he found fallen in the pit.
    He saved the life of the sheep, having brought it up from the pit, so that you
    may know in your hearts – you’re children of the knowledge of the heart – what
    is the Sabbath, on which it isn’t right for salvation to be idle, so that you
    may speak of the day which is above, which has no night, and of the light that
    doesn’t set, because it’s complete. Speak then from the heart, because you’re
    the completed day, and the light that doesn’t cease dwells within you. Speak of
    the Truth with those who search for it, and of knowledge with those who’ve sinned
    in their Error.'
translation:
  text: 'He is the shepherd who left the ninety‑nine sheep that had not gone astray[a],
    and he went and sought the one that had wandered. When he found it, he rejoiced
    over it, because ninety‑nine is a number on the left hand.[1] But when the one
    is found, the reckoning moves to the right hand. In this way, what needs the one—that
    is, the whole of the right hand—draws what it needs, taking it from the left hand
    and transferring it to the right, so that the number becomes a hundred. This is
    a sign of the sound of these numbers; it is the Father.[2]


    Even on the Sabbath he labored for the sake of the sheep that he found fallen
    into the pit. He saved the life of the sheep, having brought it up out of the
    pit, so that you may know in your heart—since you are children of the knowledge
    of the heart—what the Sabbath is: that on it it is not fitting for salvation to
    be idle,[3] so that you may speak of the Day which is above, which has no night,
    and of the Light that does not set, because it is complete. Speak, then, from
    the heart, for you are the perfect Day, and the light that does not fail dwells
    within you. Speak of the Truth with those who seek it[b], and of Knowledge with
    those who have sinned in their Error.[4][5]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'and he went and sought the one that had wandered in the Error.'.
    reason: previous_rendering
  - marker: b
    text: Or 'for the sake of the sheep that had fallen into the pit.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ⲥⲁⲩ
  chosen: sheep
  alternatives:
  - flock (collective)
  lexicon: Crum; Layton
  rationale: ⲥⲁⲩ is the regular Sahidic term for a sheep; singular/plural sense determined
    by context. Here individual and collective reference alternate, but the singular
    sheep that fell in the pit is explicit.
- source_word: ⲡⲗⲁⲛⲏ
  chosen: Error
  alternatives:
  - error
  - wandering
  lexicon: Greek loan (planē) attested in Coptic; Crum
  rationale: In Gospel of Truth, planē functions as a hypostatized power opposed to
    Knowledge. Capitalization signals the technical, personified use common in Valentinian
    discourse.
- source_word: ⲟⲩⲱⲡⲉ
  chosen: number
  alternatives:
  - count
  - reckoning
  lexicon: Crum
  rationale: Context discusses numeration (99, 1, 100) and hand-counting; 'number'
    or 'reckoning' fits. Main text uses 'number' for clarity.
- source_word: ⲧⲁⲉⲓⲉ
  chosen: left hand
  alternatives:
  - left
  lexicon: Crum
  rationale: The idiom explicitly contrasts left and right hands in counting; specifying
    'hand' preserves the imagery.
- source_word: ⲙⲣⲏⲧⲉ
  chosen: right hand
  alternatives:
  - right
  lexicon: Crum
  rationale: Paired with ⲧⲁⲉⲓⲉ to express the left/right-hand contrast in ancient
    finger-counting.
- source_word: ⲧⲱⲱⲛⲉ
  chosen: the one
  alternatives:
  - the One
  lexicon: Crum
  rationale: In this passage it is the numeral one completing ninety‑nine; capitalization
    (‘the One’) could imply a metaphysical title, which the numeric context does not
    require. We retain lower case.
- source_word: ⲥϣⲓⲛⲉ
  chosen: seek
  alternatives:
  - search for
  lexicon: Crum
  rationale: Standard verb for seeking; simple English 'seek' preserves the verbal
    echo with the parable frame.
- source_word: ϫⲏⲕ
  chosen: complete/perfect
  alternatives:
  - perfect
  - whole
  lexicon: Crum
  rationale: ϫⲏⲕ regularly means complete, finished, perfect. We render 'complete'
    when predicating the Light, and 'perfect' in the nominal phrase 'perfect Day'
    to preserve the rhetorical ring.
- source_word: ⲥⲁⲃⲃⲁⲧⲟⲛ
  chosen: Sabbath
  alternatives: []
  lexicon: Greek loan; Crum
  rationale: Established technical term requiring no translation to preserve Jewish
    calendrical reference.
- source_word: ⲡⲟⲩϫⲁⲉⲓ
  chosen: salvation
  alternatives:
  - rescue
  - deliverance
  lexicon: Crum
  rationale: The noun names the soteriological action; 'salvation' preserves the theological
    register of the work’s soteriology.
- source_word: ⲡⲓϩⲱⲟⲩ
  chosen: Day
  alternatives:
  - day
  lexicon: Crum
  rationale: Capitalization signals the transcendent 'Day which is above' as an aeonic
    image in Valentinian symbolism.
- source_word: ⲡⲟⲩⲁⲉⲓⲛ
  chosen: Light
  alternatives:
  - light
  lexicon: Crum
  rationale: We capitalize to mark the metaphysical/light-of-pleroma nuance when predicated
    as unsetting and indwelling.
- source_word: ⲙⲉⲉⲩⲉ
  chosen: knowledge
  alternatives:
  - understanding
  - thought
  lexicon: Crum; Thomassen
  rationale: ⲙⲉⲉⲩⲉ can be 'thought/understanding', but in Gospel of Truth it participates
    in the gnosis/planē polarity; 'knowledge' captures the technical sense.
- source_word: ⲧⲣⲁⲩ
  chosen: sound
  alternatives:
  - voice
  lexicon: Crum
  rationale: ⲧⲣⲁⲩ denotes voice/sound. We choose 'sound' to avoid personifying 'voice'
    of numbers, while footnoting 'voice' as an alternative nuance.
technical_vocabulary_note: 'We retain and capitalize key Valentinian terms where the
  text treats them as hypostatized realities: Error (ⲡⲗⲁⲛⲏ), Day (ⲡⲓϩⲱⲟⲩ) above, Light
  (ⲡⲟⲩⲁⲉⲓⲛ). ''Sabbath'' remains a proper noun. ''Knowledge'' renders ⲙⲉⲉⲩⲉ in its
  gnosis-laden context. We preserve the concrete imagery of left/right hands in ancient
  finger-counting to maintain the numerological metaphor moving from 99 (left) to
  100 (right). The phrase ''sound of these numbers'' keeps the metaphoric field of
  voice/sound (ⲧⲣⲁⲩ) tied to the Father, avoiding interpretive smoothing.'
textual_note: 'The translation follows Codex I, p. 32 as transcribed in the provided
  OCR. The left/right-hand numeration sequence is explicit (ⲧⲁⲉⲓⲉ ''left hand''; ⲙⲣⲏⲧⲉ
  ''right hand'') and frames the movement from ninety‑nine to one hundred via the
  recovery of the one. The clause about rescuing the sheep from the pit features a
  cluster of verbs of lifting and enlivening (ⲭⲓⲛⲧ-, ⲥⲁⲉⲓⲉ, ⲧⲛϩⲟ), reflecting concrete
  action on the Sabbath. The phrase ''what the Sabbath is: that on it it is not fitting
  for salvation to be idle'' reflects the syntactic force of ⲉⲧⲉ…ⲉⲧⲉⲙⲉϣϣⲉ ⲛⲧⲉⲡⲟⲩϫⲁⲉⲓ,
  where salvation is the subject of the inappropriateness. The closing imperatives
  retain the rhetorical parallelism: speak of Truth to seekers, and of Knowledge to
  those who have sinned in Error.'
