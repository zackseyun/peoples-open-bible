translation:
  language: es
  text: Porque he aquí, yo estoy dando la orden de sacudir la casa de Israel entre todas las naciones, como se sacude con una criba[a], pero no caerá a tierra ni un solo guijarro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como se agita el grano en una criba». La comparación hebrea es compacta y puede expresarse de varias maneras naturales en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «grano» o «piedra». El hebreo צְרוֹר denota un objeto pequeño y compacto; el matiz exacto de la imagen es debatido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento de la afirmación anterior. 'Porque' conserva bien la relación causal o explicativa en español natural.
- source_word: הִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - mira
  - mira bien
  lexicon: HALOT
  rationale: La forma tradicional 'he aquí' preserva el valor deíctico y la vivacidad del hebreo sin sonar forzada en un registro bíblico contemporáneo.
- source_word: מְצַוֶּה
  english_pob_choice: am commanding
  chosen_spanish: estoy mandando
  alternatives_spanish:
  - estoy ordenando
  - mando
  lexicon: HALOT
  rationale: El participio con sujeto explícito expresa acción divina activa e inminente. 'Estoy mandando' conserva ese presente progresivo; 'mandar' funciona de modo más natural que 'ordenar' en este contexto.
- source_word: וַהֲנִעוֹתִי
  english_pob_choice: I will shake
  chosen_spanish: haré temblar
  alternatives_spanish:
  - sacudiré
  - haré sacudir
  lexicon: HALOT
  rationale: El hiphil de נוע comunica causar movimiento agitado. 'Haré temblar' comunica bien la idea de sacudida violenta y mantiene el tono idiomático; también deja abierto el sentido metafórico de juicio y dispersión.
- source_word: בְכָל הַגּוֹיִם
  english_pob_choice: among all the nations
  chosen_spanish: entre todas las naciones
  alternatives_spanish:
  - en medio de todas las naciones
  - por todas las naciones
  lexicon: HALOT
  rationale: '''Entre'' expresa con naturalidad la dispersión dentro de las naciones, que es la lectura contextual más probable, y reproduce el alcance colectivo del hebreo.'
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: the house of Israel
  chosen_spanish: la casa de Israel
  alternatives_spanish:
  - Israel
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión corporativa y pactual 'casa de Israel' en lugar de reducirla a 'Israel', siguiendo la decisión inglesa de mantener el giro bíblico concreto.
- source_word: כַּאֲשֶׁר יִנּוֹעַ בַּכְּבָרָה
  english_pob_choice: as one shakes with a sieve
  chosen_spanish: como se agita en una criba[a]
  alternatives_spanish:
  - como se sacude en un tamiz
  - como se zarandea en una criba
  lexicon: HALOT
  rationale: El hebreo presenta una comparación compacta e impersonal. 'Como se agita en una criba' conserva la imagen agrícola con un español claro; se mantiene la posibilidad de lectura alternativa mediante la nota.
- source_word: כְּבָרָה
  english_pob_choice: sieve
  chosen_spanish: criba
  alternatives_spanish:
  - tamiz
  - cedazo
  lexicon: HALOT
  rationale: '''Criba'' es un equivalente concreto y bíblicamente adecuado para el instrumento de sacudida/sifting. Es más transparente en español general que ''tamiz'' y conserva bien la imagen.'
- source_word: וְלֹא יִפּוֹל צְר֖וֹר אָֽרֶץ
  english_pob_choice: yet not a pebble will fall to the ground
  chosen_spanish: y no caerá a tierra ni un solo [b]trozo compacto
  alternatives_spanish:
  - y no caerá a tierra ni una sola piedra
  - y no caerá a tierra ni un solo guijarro
  lexicon: HALOT
  rationale: צְרוֹר designa un objeto pequeño y compacto; no exige precisar 'piedra' o 'guijarro'. 'Trozo compacto' preserva la ambigüedad léxica reconocida por el texto y por el audit trail inglés, sin estrechar demasiado la imagen.
- source_word: יִפּוֹל
  english_pob_choice: will fall
  chosen_spanish: caerá
  alternatives_spanish:
  - se caerá
  - va a caer
  lexicon: HALOT
  rationale: El verbo simple 'caerá' expresa de forma directa el resultado negativo del sacudimiento.
- source_word: אָרֶץ
  english_pob_choice: the ground
  chosen_spanish: a tierra
  alternatives_spanish:
  - al suelo
  - al suelo de la tierra
  lexicon: HALOT
  rationale: En la imagen física concreta, 'a tierra' es idiomático y conserva bien la idea de caer al suelo.
theological_decisions:
- issue: Alcance del juicio y preservación en la metáfora de la criba
  english_pob_reading: The verse depicts divine judgment by dispersal and shaking among the nations while also preserving every intended member/object from being lost.
  chosen_spanish_reading: El versículo presenta el sacudimiento/juzgamiento de la casa de Israel entre las naciones, pero sin resolver todavía qué aspecto exacto de la imagen se enfatiza en términos de pérdida o preservación.
  alternative_spanish_readings:
  - El versículo enseña que ningún impío escapa al juicio.
  - El versículo enseña que ningún remanente justo se pierde.
  rationale: El hebreo culmina en una imagen compacta que no determina por sí sola la identidad teológica de lo retenido o de lo perdido; esa aclaración depende del contexto inmediato siguiente. La traducción debe conservar esa tensión y no resolverla prematuramente.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó 'look' por 'behold' para הִנֵּה y mantuvo el resto del versículo. La redacción española adopta 'he aquí' para reflejar mejor ese registro más formal, conserva 'criba' como equivalente del instrumento agrícola, y preserva la ambigüedad de צְרוֹר sin forzar una identificación léxica demasiado específica.
  spanish_consistency_notes:
  - Se mantiene 'casa de Israel' como expresión corporativa pactual, coherente con la política POB y con el hebreo.
  - Se conserva 'Yahvé' no porque aparezca en este versículo, sino como nota de consistencia del proyecto; aquí no aplica.
  - La comparación se deja suficientemente abierta para que el contexto posterior determine el énfasis teológico sin sobreinterpretación.
  - '''He aquí'' se usa por el registro bíblico digno y por la decisión inglesa revisada de preferir una forma más formal de atención.'
