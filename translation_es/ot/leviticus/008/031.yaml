revisions:
- from: 'Y Moisés dijo a Aarón y a sus hijos: «Hiervan la carne[a] a la entrada de la tienda de reunión, y allí la comerán, junto con el pan que está en la cesta de la investidura[b], tal como mandé, diciendo: “Aarón y sus hijos la comerán”».'
  to: 'Y Moisés dijo a Aarón y a sus hijos: «Hiervan la carne[a] a la entrada de la tienda de reunión, y allí la comerán, y el pan que está en la cesta de la ordenación[b], tal como mandé, diciendo: “Aarón y sus hijos lo comerán”».'
  rationale: La revisión elimina la expansión interpretativa «junto con» para seguir la coordinación simple del hebreo, alinea מִלֻּאִים con la decisión principal auditada mediante «ordenación», y ajusta la cita final a «lo comerán» para una referencia más natural y formalmente más cercana al sufijo masculino singular del original. Se conservan notas léxicas útiles y se simplifican para reflejar mejor el audit trail.
