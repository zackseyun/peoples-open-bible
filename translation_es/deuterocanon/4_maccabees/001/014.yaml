translation:
  language: es
  text: Pero determinemos[a] qué es la razón, y qué es la pasión, y cuántas clases de pasiones hay[c][b], y si la razón domina sobre todas estas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «distingamos» o «examinemos». El verbo griego puede subrayar tanto la separación de categorías como su determinación.
    reason: lexical_alternative
  - marker: b
    text: O «razonamiento» o «juicio racional» para λογισμός.
    reason: lexical_alternative
  - marker: c
    text: O «emociones» o «impulsos» para «pasiones», aunque el término griego conserva un sentido filosófico de impulsos afectivos.
    reason: lexical_alternative
lexical_decisions:
- source_word: διακρίνωμεν
  english_pob_choice: let us determine
  chosen_spanish: determinemos
  alternatives_spanish:
  - distinguamos
  - examinemos
  - definamos
  lexicon: LSJ
  rationale: El subjuntivo exhortativo pide una acción compartida de análisis. «Determinemos» conserva la idea de llegar a una delimitación precisa, no solo de separar categorías, y suena natural en español.
- source_word: λογισμός
  english_pob_choice: reason
  chosen_spanish: razonamiento
  alternatives_spanish:
  - razón
  - juicio racional
  - pensamiento racional
  lexicon: LSJ
  rationale: En este contexto filosófico, λογισμός nombra la facultad o actividad del juicio racional. «Razonamiento» preserva mejor esa cualidad dinámica en español que el más estático «razón», sin perder el registro conceptual.
- source_word: πάθος
  english_pob_choice: passion
  chosen_spanish: pasión
  alternatives_spanish:
  - emoción
  - impulso
  - afecto
  lexicon: LSJ
  rationale: Aquí πάθος no significa sufrimiento sino impulso afectivo pasional. «Pasión» mantiene el contraste filosófico con λογισμός y conserva el peso técnico del término.
- source_word: πόσα παθῶν εἰδέα
  english_pob_choice: how many kinds of passions there are
  chosen_spanish: cuántas clases de pasiones hay
  alternatives_spanish:
  - cuántas formas de pasiones hay
  - cuántas especies de pasiones hay
  lexicon: LSJ
  rationale: εἰδέα indica tipos o formas. «Clases» expresa con claridad la idea clasificatoria en español contemporáneo y evita tecnicismos innecesarios.
- source_word: ἐπικρατεῖ
  english_pob_choice: rules over
  chosen_spanish: domina sobre
  alternatives_spanish:
  - reina sobre
  - prevalece sobre
  - tiene dominio sobre
  lexicon: LSJ
  rationale: El verbo expresa supremacía o dominio. «Domina sobre» conserva la imagen de gobierno y resulta idiomático en español.
- source_word: τούτων
  english_pob_choice: all these
  chosen_spanish: todas estas
  alternatives_spanish:
  - todas ellas
  - todas estas cosas
  lexicon: LSJ
  rationale: El demostrativo retoma a las pasiones mencionadas. «Todas estas» mantiene la referencia cercana y es natural en español.
theological_decisions:
- issue: Contraste filosófico entre λογισμός y πάθος
  english_pob_reading: reason ... passion
  chosen_spanish_reading: razonamiento ... pasión
  alternative_spanish_readings:
  - razón ... pasión
  - juicio racional ... impulso
  rationale: La unidad es programática para el argumento de 4 Macabeos sobre la supremacía del juicio racional frente a los impulsos pasionales. «Razonamiento ... pasión» conserva la tensión conceptual sin reducirla a psicología moderna.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El texto griego y el control cruzado inglés muestran acuerdo alto y no requieren revisión sustantiva. Se conservó la estructura coordinada y el contraste conceptual principal entre λογισμός y πάθος, adaptándolo a un español natural sin perder el registro filosófico.
  spanish_consistency_notes:
  - Se mantuvo «pasión» para πάθος por coherencia con la decisión POB inglesa y por su valor técnico en 4 Macabeos.
  - Se evitó «SEÑOR» u այլ vocabulario de tradición litúrgica porque el verso no contiene referencias divinas.
  - La puntuación reproduce la serie interrogativa del griego con una sola oración exhortativa inicial y preguntas coordinadas.
