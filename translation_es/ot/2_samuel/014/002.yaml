revisions:
- from: 'Entonces Joab envió a Tecoa y tomó de allí a una mujer sabia[a]; y le dijo: «Por favor, finge estar de duelo, y por favor ponte vestidos de luto[b], y no te unjas con aceite[c], sino sé como una mujer que ha estado de luto por un muerto[d] muchos días».'
  to: 'Entonces Joab mandó traer de Tecoa a una mujer sabia[a], y le dijo: «Por favor, finge estar de duelo, ponte ropa de luto[b] y no te unjas con aceite[c], sino compórtate como una mujer que lleva muchos días de luto por un muerto[d]».'
  rationale: La revisión hace el español más natural y fiel al sentido narrativo del hebreo sin alterar las decisiones léxicas principales del POB. «Mandó traer de Tecoa» expresa mejor la secuencia «envió... y tomó de allí». «Ropa de luto» es más natural que «vestidos de luto» en registro general, mientras la literalidad queda en nota. «Compórtate como una mujer...» comunica mejor la instrucción de asumir un papel. La nota d se rehízo para reflejar con más claridad la literalidad del hebreo.
