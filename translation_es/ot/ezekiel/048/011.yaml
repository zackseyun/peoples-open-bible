base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/048/011.yaml
  text: It shall be for the consecrated priests from the sons of Zadok[a], who kept my charge, who did not go astray when the sons of Israel went astray[c][b], as the Levites went astray.
  footnotes:
