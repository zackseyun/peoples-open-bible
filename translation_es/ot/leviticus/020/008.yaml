translation:
  language: es
  text: Guardarán mis estatutos y los pondrán por obra. Yo soy Yahvé[a], que los santifica a ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que los hace santos a ustedes».'
