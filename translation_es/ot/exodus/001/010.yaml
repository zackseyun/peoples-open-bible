revisions:
- from: Ven[a], actuemos con astucia con él, para que no se multiplique; y si llega a haber guerra, él también se unirá[b] a nuestros enemigos, peleará contra nosotros y saldrá de la tierra[c].
  to: Vamos[a], actuemos con astucia con ellos, para que no se multipliquen; y si estalla la guerra, ellos también podrían unirse a nuestros enemigos y pelear contra nosotros y subir fuera de la tierra[c].
  rationale: Se corrige el referente colectivo para que el español no sugiera erróneamente un individuo, en línea con la decisión documentada del POB. También se añade en nota la alternativa léxica de נתחכמה y se hace más nítida la alternativa literal de ועלה מן הארץ. El resto del versículo se mantiene cercano al sentido fuente, con español natural y fiel.
