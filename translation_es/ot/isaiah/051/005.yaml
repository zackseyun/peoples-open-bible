translation:
  language: es
  text: Mi justicia[a] está cerca, mi salvación ha salido, y mis brazos[b] juzgarán a los pueblos; las costas lejanas[c] me esperarán, y en mi brazo[d] pondrán su esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi rectitud» o «mi vindicación». El hebreo צדק puede significar «justicia», «rectitud» o «vindicación» según el contexto.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo «mis brazos» aquí, pero «mi brazo» después en este mismo versículo. La imagen se refiere al poder activo de Yahvé.
    reason: lexical_alternative
  - marker: c
    text: 'O: «las islas» o «las costas distantes». El hebreo אִיִּים puede referirse a regiones marítimas lejanas.'
    reason: lexical_alternative
  - marker: d
    text: El hebreo mantiene aquí el singular «mi brazo».
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרוֹב
  english_pob_choice: is near
  chosen_spanish: está cerca
  alternatives_spanish:
  - está a la mano
  - ha llegado cerca
  lexicon: HALOT
  rationale: El adjetivo predicativo expresa cercanía o inmediatez. «Está cerca» conserva el sentido estativo sin añadir un aspecto más interpretativo que el hebreo.
- source_word: צִדְקִי
  english_pob_choice: my righteousness
  chosen_spanish: mi justicia
  alternatives_spanish:
  - mi rectitud
  - mi vindicación
  lexicon: HALOT
  rationale: צדק puede referirse a justicia, rectitud o vindicación según el contexto. Dado que el verso habla del obrar salvífico y judicial de Yahvé sobre los pueblos, «mi justicia» preserva bien la fuerza pública y forense del término, y mantiene la alternativa lexical que el contexto admite.
- source_word: יָצָא
  english_pob_choice: has gone out
  chosen_spanish: ha salido
  alternatives_spanish:
  - sale
  - ha salido fuera
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una acción realizada con vigencia presente. «Ha salido» conserva la imagen concreta del verbo mejor que una paráfrasis más abstracta.
- source_word: יִשְׁעִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi victoria
  lexicon: HALOT
  rationale: El sustantivo de ישׁע denota salvación o liberación. «Mi salvación» es la equivalencia más transparente y coherente con el contexto isaiano.
- source_word: וּזְרֹעַי
  english_pob_choice: my arms
  chosen_spanish: mis brazos
  alternatives_spanish:
  - mi brazo
  lexicon: HALOT
  rationale: La forma hebrea es plural con sufijo de primera persona. «Mis brazos» refleja mejor la forma morfológica que singularizarlo; el plural se conserva como imagen de poder activo.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos y naciones
  lexicon: HALOT
  rationale: «Los pueblos» mantiene el sentido colectivo plural de grupos humanos o naciones, y resulta natural en español bíblico moderno.
- source_word: יִשְׁפֹּטוּ
  english_pob_choice: will judge
  chosen_spanish: juzgarán
  alternatives_spanish:
  - gobernarán
  - harán justicia
  lexicon: HALOT
  rationale: שׁפט incluye juzgar y gobernar. «Juzgarán» conserva el núcleo judicial y se ajusta al contexto inmediato de justicia y salvación.
- source_word: אֵלַי
  english_pob_choice: for me
  chosen_spanish: me
  alternatives_spanish:
  - hacia mí
  - para mí
  lexicon: HALOT
  rationale: Con «esperar», el español natural expresa el complemento con objeto directo o dativo ético simple. «Me» conserva la dirección relacional sin sobrecargar la sintaxis.
- source_word: אִיִּים
  english_pob_choice: the coastlands
  chosen_spanish: las costas
  alternatives_spanish:
  - las islas
  - las tierras lejanas
  lexicon: HALOT
  rationale: En Isaías el término puede referirse a regiones marítimas lejanas. «Las costas» preserva esa amplitud sin restringirlo indebidamente a islas solamente.
- source_word: יְקַוּוּ
  english_pob_choice: will wait
  chosen_spanish: me esperarán
  alternatives_spanish:
  - esperarán
  - aguardarán
  lexicon: HALOT
  rationale: El verbo expresa espera con expectativa. «Me esperarán» comunica la orientación personal del verbo y distingue este miembro del paralelismo del siguiente «esperarán con esperanza».
- source_word: וְאֶל זְרֹעִי
  english_pob_choice: and for my arm
  chosen_spanish: y por mi brazo
  alternatives_spanish:
  - y hacia mi brazo
  - y para mi brazo
  lexicon: HALOT
  rationale: El hebreo conserva la imagen corporal singular en el segundo miembro. «Por mi brazo» mantiene la metáfora de agencia/poder de manera natural en español y evita banalizarla como abstracción.
- source_word: יְיַחֵלוּן
  english_pob_choice: they will hope
  chosen_spanish: esperarán con esperanza
  alternatives_spanish:
  - esperarán
  - pondrán su esperanza
  lexicon: HALOT
  rationale: יחל comunica espera confiada, esperanza. «Esperarán con esperanza» intenta reflejar el matiz intensivo y el paralelismo con el verbo anterior sin perder la raíz semántica.
theological_decisions:
- issue: Renderizar צדק en un oráculo de salvación con trasfondo judicial
  english_pob_reading: my righteousness
  chosen_spanish_reading: mi justicia
  alternative_spanish_readings:
  - mi rectitud
  - mi vindicación
  rationale: El verso une צדק con la acción salvífica de Yahvé y con el juicio sobre los pueblos. «Mi justicia» preserva el alcance forense y pactal del término, sin reducirlo a un matiz puramente abstracto o moral.
  doctrine_reference: 'DOCTRINE.md: términos disputados; preservar justicia/rectitud/vindicación según contexto, con preferencia por el término que mejor mantenga el campo semántico original.'
- issue: Metáfora antropomórfica del brazo divino
  english_pob_reading: retain literal 'arm/arms' imagery
  chosen_spanish_reading: conservar la imagen literal de los brazos / brazo
  alternative_spanish_readings:
  - poder
  - fuerza
  rationale: El profeta usa una metáfora corporal para la acción eficaz de Yahvé. Conservarla mantiene la textura poética y teológica del texto en vez de reinterpretarla prematuramente como abstracción.
  doctrine_reference: 'DOCTRINE.md: primacía de la evidencia original; no paraphrasear más allá de lo que el texto requiere.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo anclas explícitas para todas las notas. También se ajustó la nota del término אִיִּים para que el marcador [b] aparezca en el texto español, evitando marcadores huérfanos.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» implícito en el verso según la convención del proyecto, sin añadirlo aquí porque el texto hebreo usa la primera persona singular.
  - 'Se preservó el paralelismo poético con dos miembros esperanzados: «me esperarán» / «esperarán con esperanza».'
  - «Mis brazos» refleja el plural hebreo de וּזְרֹעַי; «mi brazo» en el segundo colon conserva el singular hebreo correspondiente.
  - El registro es bíblico moderno y digno, evitando calcos innecesarios pero sin diluir la imaginería original.
