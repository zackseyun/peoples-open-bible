theological_decisions:
- issue: Meaning of צְדָקָה in this wisdom context
  chosen_reading: ethical mercy/charity rather than abstract righteousness
  alternative_readings:
  - righteousness
  - almsgiving
  rationale: Although צְדָקָה often means 'righteousness,' the Greek parallel explicitly interprets the term as ἐλεημοσύνη ('mercy/almsgiving'). To avoid importing a more abstract theological category than the context warrants, the main text uses 'mercy,' with 'almsgiving' preserved as a lexical alternative.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; consistency of key terms or documented exception'
