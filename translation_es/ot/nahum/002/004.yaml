translation:
  language: es
  text: El escudo de sus valientes es rojo; los hombres de valor están vestidos de escarlata. Los carros centellean con el fuego del acero en el día de su preparación, y las lanzas de ciprés son blandidas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los cipreses se estremecen»; el hebreo probablemente usa «cipreses» metonímicamente para astas o lanzas de madera de ciprés.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מָגֵן
  english_pob_choice: shield
  chosen_spanish: escudo
  alternatives_spanish:
  - broquel
  lexicon: HALOT
  rationale: מָגֵן es el término militar normal para un escudo. En español, "escudo" es la opción natural y directa; "broquel" sería más arcaico y menos transparente.
- source_word: גִּבֹּרֵיהוּ
  english_pob_choice: his mighty men
  chosen_spanish: sus valientes
  alternatives_spanish:
  - sus guerreros
  - sus héroes
  - sus hombres poderosos
  lexicon: HALOT
  rationale: La expresión hebrea designa a guerreros fuertes o valientes. "Sus valientes" conserva la referencia personal del sufijo y la fuerza marcial sin sobrecargar el verso.
- source_word: מְאָדָּם
  english_pob_choice: is red
  chosen_spanish: es rojo
  alternatives_spanish:
  - está rojo
  - está enrojecido
  - es de color rojo
  lexicon: HALOT
  rationale: El hebreo presenta un estado/descripción del escudo. "Es rojo" transmite de manera natural la apariencia resultante y evita una pasiva innecesaria.
- source_word: אַנְשֵׁי חַיִל
  english_pob_choice: men of valor
  chosen_spanish: hombres de valor
  alternatives_spanish:
  - varones de valor
  - valientes
  - hombres guerreros
  lexicon: HALOT
  rationale: Es una fórmula hebrea fija para hombres capaces y valientes en combate. "Hombres de valor" preserva el idiomático y la dignidad del giro.
- source_word: מְתֻלָּעִים
  english_pob_choice: are clothed in scarlet
  chosen_spanish: están vestidos de escarlata
  alternatives_spanish:
  - van vestidos de escarlata
  - están de escarlata
  - están cubiertos de escarlata
  lexicon: HALOT
  rationale: El término apunta a vestimenta teñida de rojo intenso. "Vestidos de escarlata" mantiene la imagen de ropa y evita una paráfrasis excesiva.
- source_word: בְּאֵשׁ פְּלָדוֹת
  english_pob_choice: flash with the fire of steel
  chosen_spanish: centellean con el fuego del acero
  alternatives_spanish:
  - relucen con el fuego del acero
  - brillan como fuego de acero
  - centellean con metal ardiente
  lexicon: HALOT
  rationale: La frase es difícil y sugiere resplandor metálico en los carros. "Centellean" expresa el brillo visual, y "acero" reproduce la fuerza material de פְּלָדוֹת sin cerrar indebidamente la ambigüedad.
- source_word: הָרֶכֶב
  english_pob_choice: the chariots
  chosen_spanish: los carros
  alternatives_spanish:
  - los carros de guerra
  - los carros de combate
  - los carros
  lexicon: HALOT
  rationale: En español bíblico moderno, "carros" comunica naturalmente el vehículo militar antiguo y evita una repetición forzada de "carros de guerra".
- source_word: בְּיוֹם הֲכִינוֹ
  english_pob_choice: on the day of his preparation
  chosen_spanish: en el día de su preparación
  alternatives_spanish:
  - el día en que se prepara
  - el día de su apresto
  - el día de su preparación
  lexicon: HALOT
  rationale: La construcción admite una referencia temporal con sufijo. "Su preparación" conserva la ambigüedad del hebreo respecto de quién prepara, sin decidir prematuramente.
- source_word: וְהַבְּרֹשִׁים
  english_pob_choice: the cypress spears
  chosen_spanish: los cipreses
  alternatives_spanish:
  - las lanzas de ciprés
  - las astas de ciprés
  - los cipreses de guerra
  lexicon: HALOT
  rationale: El texto hebreo dice literalmente "los cipreses"; la POB inglesa explicita una posible metonimia militar. En español se conserva la literalidad para no cerrar la decisión interpretativa, dejando que la imagen permanezca abierta.
- source_word: הָרְעָלוּ
  english_pob_choice: are brandished
  chosen_spanish: son blandidos
  alternatives_spanish:
  - son agitadas
  - tiemblan
  - son sacudidos
  lexicon: HALOT
  rationale: El verbo es difícil y puede implicar sacudir o agitar vigorosamente. "Son blandidos" funciona en castellano para armas o lanzas y comunica el movimiento combativo sin añadir más de lo que asegura el hebreo.
theological_decisions:
- issue: Metonimia de "los cipreses" al final del verso
  english_pob_reading: the cypress spears / the cypresses shake
  chosen_spanish_reading: los cipreses son blandidos
  alternative_spanish_readings:
  - los cipreses se estremecen
  - las lanzas de ciprés son blandidas
  - los cipreses de guerra son blandidos
  rationale: El hebreo probablemente usa "cipreses" metonímicamente para astas o lanzas de madera de ciprés, pero la forma literal también es posible. La redacción española conserva el sustantivo literal y añade un verbo de movimiento para no borrar la tensión textual ni decidir de manera excesiva entre las dos lecturas.
  doctrine_reference: No aplica; decisión lexical y retórica, no doctrinal.
- issue: Valor de פְּלָדוֹת en la expresión del resplandor de los carros
  english_pob_reading: fire of steel
  chosen_spanish_reading: fuego del acero
  alternative_spanish_readings:
  - fuego metálico
  - fuego de hierro
  - destello del acero
  rationale: El hebreo es oscuro y parece aludir al brillo o resplandor de piezas metálicas. "Fuego del acero" mantiene la energía imagética del inglés POB y deja abierta la precisión material exacta.
  doctrine_reference: No aplica; decisión textual/lexical.
translation_notes:
  revision_awareness: Se revisó el contexto inglés POB y su nota sobre la posible metonimia de וְהַבְּרֹשִׁים, así como la dificultad de בְּאֵשׁ פְּלָדוֹת. La versión española conserva la imagen militar y la ambigüedad interpretativa sin mecanizar el inglés.
  spanish_consistency_notes:
  - Se usó "Yahvé" en otros contextos según la norma del proyecto, pero este verso no contiene el tetragrámaton.
  - '"Escarlata" se mantuvo para reproducir el campo semántico de rojo intenso asociado a vestimenta militar.'
  - Se prefirió "carros" sobre "carros de guerra" por naturalidad y fidelidad contextual.
  - La nota al pie se ancla en "cipreses" para reflejar la alternativa interpretativa preservada por la POB inglesa.
