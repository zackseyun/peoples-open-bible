translation:
  language: es
  text: Estaban a cargo de los cargadores y supervisaban a todos los que hacían el trabajo para cada clase de servicio[a]; y algunos de los levitas eran escribas, oficiales y porteros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para cada clase de servicio». El hebreo repite «servicio» (literalmente, «para servicio y servicio»), probablemente para expresar distribución entre varias tareas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: were over
  chosen_spanish: estaban sobre
  alternatives_spanish:
  - estaban a cargo de
  - tenían autoridad sobre
  lexicon: HALOT
  rationale: En este contexto administrativo, עַל indica supervisión o autoridad. «Estaban sobre» conserva esa relación de responsabilidad sin volverla demasiado explicativa.
- source_word: הַסַּבָּלִים
  english_pob_choice: the burden-bearers
  chosen_spanish: los cargadores
  alternatives_spanish:
  - los porteadores
  - los cargadores de cargas
  - los trabajadores de carga
  lexicon: HALOT
  rationale: El término se refiere a quienes transportaban cargas. «Cargadores» comunica bien la función en español y evita la ambigüedad de «porteros» en el uso moderno.
- source_word: וּמְנַצְּחִים
  english_pob_choice: and supervised
  chosen_spanish: y supervisaban
  alternatives_spanish:
  - y dirigían
  - y estaban a cargo
  lexicon: HALOT
  rationale: El participio expresa supervisión administrativa. «Supervisaban» conserva el valor de vigilancia y dirección, con un español natural.
- source_word: לְכָל עֹשֵׂה מְלָאכָה
  english_pob_choice: all who did the work
  chosen_spanish: a todos los que hacían el trabajo
  alternatives_spanish:
  - a todos los trabajadores
  - a cada uno que hacía la obra
  lexicon: HALOT
  rationale: La expresión es distributiva y abarca a quienes estaban ocupados en la tarea. La forma elegida mantiene el sentido participial sin rigidizarlo.
- source_word: לַעֲבוֹדָה וַעֲבוֹדָה
  english_pob_choice: for each kind of service
  chosen_spanish: para cada clase de servicio
  alternatives_spanish:
  - para servicio y servicio
  - para cada servicio
  - para toda clase de servicio
  lexicon: HALOT
  rationale: La repetición de עֲבוֹדָה tiene un sentido distributivo. «Cada clase de servicio» transmite esa distribución en español sin perder la repetición subyacente.
- source_word: וּמֵהַלְוִיִּם
  english_pob_choice: and some of the Levites were
  chosen_spanish: y algunos de los levitas eran
  alternatives_spanish:
  - y de entre los levitas eran
  - y entre los levitas había
  lexicon: HALOT
  rationale: La construcción partitiva מן indica que solo una parte de los levitas desempeñaba esos cargos. «Algunos de los levitas» expresa ese valor con claridad.
- source_word: סוֹפְרִים
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - secretarios
  - escritores
  lexicon: HALOT
  rationale: «Escribas» es el equivalente usual y preciso para este cargo de registro y escritura.
- source_word: שֹׁטְרִים
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - funcionarios
  - administradores
  - inspectores
  lexicon: HALOT
  rationale: El término designa funcionarios con autoridad administrativa. «Oficiales» es conciso y fiel al campo semántico del hebreo.
- source_word: שׁוֹעֲרִים
  english_pob_choice: gatekeepers
  chosen_spanish: porteros
  alternatives_spanish:
  - guardianes de la puerta
  - guardianes de las puertas
  - doorkeepers
  lexicon: HALOT
  rationale: En contexto del templo, el cargo corresponde a quienes custodiaban las puertas. «Porteros» es la equivalencia tradicional y entendible en español eclesial.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el ajuste final de la POB inglesa: «all who did the work for each kind of service». Se preserva la duplicación distributiva de עֲבוֹדָה con una equivalencia natural en español, sin diluir el matiz administrativo del verso.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - «Levitas», «escribas», «oficiales» y «porteros» se usan en sentido institucional-templario, no como términos modernos de empleo.
  - 'El orden de los cargos sigue el paralelo hebreo: supervisores, escribas, oficiales y porteros.'
