translation:
  language: es
  text: Y Josué circuncidó a sus hijos[a], a quienes había hecho surgir en lugar de ellos, porque eran incircuncisos, pues no los habían circuncidado en el camino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en vez de ellos'; la frase hebrea indica que estos hijos ocuparon el lugar de la generación anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶת
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: HALOT
  rationale: La conjunción abre la secuencia narrativa; en español, 'Y' conserva la conexión simple sin forzar un matiz temporal no explícito en el hebreo.
- source_word: בְּנֵיהֶם
  english_pob_choice: their sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus muchachos
  lexicon: HALOT
  rationale: En este contexto de circuncisión, el referente son descendientes masculinos; 'hijos' es natural en español, y el contexto restringe el sentido sin necesidad de añadir una glosa al texto principal.
- source_word: הֵקִים
  english_pob_choice: had raised up
  chosen_spanish: había levantado
  alternatives_spanish:
  - había hecho surgir
  - había establecido
  lexicon: HALOT
  rationale: El Hifil de קום expresa aquí levantar o hacer surgir en sentido de sucesión/reemplazo. 'Había levantado' conserva la metáfora de elevación/producción y sigue la fuerza del inglés auditado sin sonar extraño en español.
- source_word: תַּחְתָּם
  english_pob_choice: in their place
  chosen_spanish: en lugar de ellos
  alternatives_spanish:
  - en vez de ellos
  - en sustitución de ellos
  lexicon: HALOT
  rationale: La preposición indica reemplazo. 'En lugar de ellos' comunica bien la sucesión generacional y mantiene la relación de sustitución que el inglés POB preserva.
- source_word: אֹתָם ... מָל יְהוֹשֻׁעַ
  english_pob_choice: Joshua circumcised
  chosen_spanish: Josué circuncidó
  alternatives_spanish:
  - Josué les hizo la circuncisión
  - Josué cortó el prepucio de
  lexicon: HALOT
  rationale: מוּל es el verbo técnico normal para circuncidar. En español bíblico contemporáneo, 'circuncidó' es la forma precisa y digna; no hace falta explicitar el objeto duplicado del hebreo dentro del verbo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: La primera כִּי introduce la causa inmediata de la acción. 'Porque' es la correspondencia causal más directa y clara en español.
- source_word: עֲרֵלִים
  english_pob_choice: uncircumcised
  chosen_spanish: incircuncisos
  alternatives_spanish:
  - no circuncidados
  - foreskin-idos
  lexicon: HALOT
  rationale: El término bíblico se refiere al estado físico de no haber recibido la circuncisión. 'Incircuncisos' mantiene el registro bíblico y la fuerza covenantal sin perder naturalidad en español.
- source_word: כִּי לֹא מָלוּ אוֹתָם
  english_pob_choice: for they had not circumcised them
  chosen_spanish: pues no los habían circuncidado
  alternatives_spanish:
  - porque nadie los había circuncidado
  - ya que no los circuncidaron
  lexicon: HALOT
  rationale: La segunda כִּי da la explicación del estado anterior. 'Pues' enlaza bien en español la justificación; la voz impersonal del hebreo queda algo abierta, y 'no los habían circuncidado' conserva esa forma sin introducir un sujeto no explícito.
- source_word: בַּדָּרֶךְ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - durante la travesía
  - en la jornada
  lexicon: HALOT
  rationale: La frase se refiere al trayecto del éxodo/jornada. 'En el camino' es la traducción más natural y suficientemente literal en español.
theological_decisions:
- issue: Estado físico de incircuncisión en contexto de pacto
  english_pob_reading: uncircumcised
  chosen_spanish_reading: incircuncisos
  alternative_spanish_readings:
  - no circuncidados
  - foreskinned
  rationale: La referencia es a una condición física y pactual, no a una metáfora espiritual. 'Incircuncisos' preserva el valor técnico y bíblico del término sin reemplazarlo por una perífrasis menos precisa.
  doctrine_reference: Pacto de circuncisión en Génesis 17; lectura literal-histórica del rito en Josué 5.
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo y el audit trail inglés sin depender mecánicamente de una traducción inglesa; se conserva la doble explicación causal ('porque' / 'pues') y el matiz de sustitución de תַּחְתָּם.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el Tetragrámaton; aquí no ocurre.
  - '''Josué'' se conserva como nombre propio estándar.'
  - '''Incircuncisos'' se elige por precisión técnica y fluidez bíblica en español.'
  - La nota al pie marca la alternativa semántica principal de תַּחְתָּם sin duplicar el sentido en el texto principal.
