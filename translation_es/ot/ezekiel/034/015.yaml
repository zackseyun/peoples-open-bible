    text: 'Hebrew: ''my sheep''; rendered ''my flock'' to preserve the collective sense of the noun in this shepherding context.'
    reason: lexical_alternative
  - marker: b
    text: Or 'will feed my flock.' The Hebrew verb can include the sense of tending or pasturing, not only feeding.
    reason: lexical_alternative
  - marker: c
    text: 'Hebrew title: ''Lord Yahweh'' or ''the Lord Yahweh.'' The main text uses the conventional English rendering ''the Lord GOD'' for אֲדֹנָי יְהוִה.'
    reason: alternative_reading
