  glossary_alignment: 'No hay conflicto con los términos del proyecto: «levitas», «santo» y el resto están bien alineados. La decisión de «santo» para קָדֹשׁ concuerda con la racionalidad teológica documentada. No intervienen términos sensibles como Yahvé/Mesías/esclavo.'
