lexical_decisions:
- source_word: ἐξελθοῦσα
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - fue afuera
  - habiendo salido
  lexicon: LSJ
  rationale: El participio aoristo de ἐξέρχομαι indica salida/movimiento hacia afuera. «Salió» es natural en español y conserva el sentido direccional sin forzar una estructura más pesada.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported
  chosen_spanish: anunció
  alternatives_spanish:
  - reportó
  - les dijo
  lexicon: LSJ
  rationale: ἀπαγγέλλω puede significar comunicar o anunciar una noticia. En este contexto narrativo, «anunció» transmite con claridad el acto de llevar la noticia a otros; «reportó» suena menos natural en español bíblico.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: LSJ
  rationale: El dativo plural se expresa de manera natural con el pronombre átono «les» como objeto indirecto del verbo de comunicación.
- source_word: ζῇ
  english_pob_choice: he was alive
  chosen_spanish: estaba vivo
  alternatives_spanish:
  - vive
  - está vivo
  lexicon: LSJ
  rationale: El presente griego ζῇ literalmente significa «vive / está vivo». En español narrativo, tras un verbo en pasado, «estaba vivo» comunica bien el contenido del mensaje y conserva la fuerza semántica sin sonar artificial.
theological_decisions:
- issue: Sujeto implícito de «ζῇ»
  english_pob_reading: The subject 'he' is implicit in the Greek verb and is supplied from the context as Tobias.
  chosen_spanish_reading: El sujeto «él» queda implícito y se entiende por el contexto como Tobías.
  alternative_spanish_readings:
  - estaba vivo
  - Tobías estaba vivo
  rationale: El griego no nombra el sujeto; la identificación con Tobías depende del contexto inmediato. En el texto principal se mantiene la referencia implícita, y la nota aclara la suplencia contextual sin añadir material innecesario al versículo.
  doctrine_reference: Coherencia contextual y suplencia pronominal en traducción bíblica; no implica decisión doctrinal.
translation_notes:
  revision_awareness: El cotejo de revisión indica alta concordancia y no registra cambios aplicados; se conserva una solución de equivalencia óptima alineada con el audit trail inglés y el griego subyacente.
  spanish_consistency_notes:
  - Se mantiene «vivo» en lugar de «vive» para que la cláusula reporte con naturalidad en español tras el pasado «anunció».
  - Se evita introducir «Cristo», «SEÑOR» u այլ terminología no presente en el griego de este versículo.
  - La referencia implícita al sujeto se preserva en la nota para no sobrecargar el texto principal.
