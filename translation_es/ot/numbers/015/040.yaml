translation:
  language: es
  text: para que recuerden y hagan todos mis mandamientos[a], y sean santos para con su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'apartados para con su Dios'.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - para que
  lexicon: HALOT
  rationale: Expresa con naturalidad en español la fuerza de propósito del hebreo, manteniendo el valor final de la cláusula sin añadir matices ajenos.
- source_word: תִּזְכְּרוּ
  english_pob_choice: you may remember
  chosen_spanish: recuerden
  alternatives_spanish:
  - se acuerden
  - recuerden
  lexicon: HALOT
  rationale: En una cláusula de propósito, el subjuntivo español transmite bien la finalidad. 'Recordar'/'acordarse' son posibles, pero 'recordar' en forma de 'recuerden' suena más directo y bíblicamente natural.
- source_word: וַעֲשִׂיתֶם
  english_pob_choice: and do
  chosen_spanish: hagan
  alternatives_spanish:
  - hagan
  - cumplan
  lexicon: HALOT
  rationale: עָשָׂה aquí es 'hacer' en el sentido de ejecutar lo mandado. 'Hagan' conserva esa fuerza concreta; 'cumplan' sería interpretativo y acercaría el verbo a 'guardar' sin base explícita en el hebreo.
- source_word: כָּל מִצְוֺתָי
  english_pob_choice: all my commandments
  chosen_spanish: todos mis mandamientos
  alternatives_spanish:
  - todos mis mandamientos
  - todos mis mandatos
  lexicon: HALOT
  rationale: '''Mandamientos'' conserva el registro legal/covenantal de מִצְוֹת. ''Mandatos'' es posible, pero ''mandamientos'' es más estable en español bíblico y no debilita el plural intensivo de ''todos''.'
- source_word: וִהְיִיתֶם
  english_pob_choice: and be
  chosen_spanish: y sean
  alternatives_spanish:
  - y sean
  - y serán
  lexicon: HALOT
  rationale: El hebreo presenta un resultado ligado al propósito; en español, el subjuntivo 'sean' encaja mejor que un futuro, que sonaría menos dependiente de la finalidad previa.
- source_word: קְדֹשִׁים
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - santos
  - sagrados
  - apartados
  lexicon: HALOT
  rationale: '''Santos'' preserva el campo semántico de קדוש en una forma natural para el español bíblico y mantiene la tensión entre pureza, consagración y pertenencia a Dios. ''Apartados'' explicita una sola faceta; ''sagrados'' es menos idiomático aquí.'
- source_word: לֵאלֹהֵיכֶם
  english_pob_choice: to your God
  chosen_spanish: para su Dios
  alternatives_spanish:
  - para su Dios
  - para su Dios
  lexicon: HALOT
  rationale: Se mantiene la relación de pertenencia/referencia del lamed con un español fluido. 'Su' refleja el plural de segunda persona del hebreo; 'para' ayuda a conservar el valor relacional sin forzar una lectura meramente direccional. Dado que el texto se dirige a Israel, el pronombre plural de respeto en español es adecuado.
theological_decisions:
- issue: Cómo verter קְדֹשִׁים en el contexto de obediencia pactal
  english_pob_reading: Retain 'holy' rather than paraphrasing as merely moral obedience or ritual separation.
  chosen_spanish_reading: '''Sean santos'' conserva la amplitud pactal, cultual y ética del término.'
  alternative_spanish_readings:
  - sean apartados
  - sean consagrados
  rationale: El verso une recordar, hacer y ser santos; reducir קדוש a una sola dimensión empobrecería el argumento. 'Santos' permite oír tanto la consagración como la diferencia de pertenencia a Dios.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El draft sigue de cerca el estado final del POB inglés, sin cambios revisionales adicionales; conserva la lectura de propósito y la equivalencia léxica principal, adaptándolas a un español natural y auditables desde el hebreo.
  spanish_consistency_notes:
  - Se mantiene 'mandamientos' para מִצְוֺת, conforme al uso legal-covenantal del término.
  - Se evita 'SEÑOR' para el nombre divino porque aquí el hebreo dice 'Dios' (אֱלֹהֵיכֶם), y la POB española debe reflejar esa distinción.
  - '''Santos'' se usa como equivalente principal de קְדֹשִׁים, mientras la nota preserva la alternativa ''apartados'' para la tensión lexical documentada.'
