- from: 'Y se informó al rey David, diciendo: «Yahvé ha bendecido la casa de Obed-edom y todo lo que le pertenece, por causa del arca de Dios». Entonces David fue y subió el arca de Dios desde la casa de Obed-edom a la ciudad de David, con regocijo.'
  to: 'Y se informó al rey David, diciendo: «Yahvé ha bendecido la casa de Obed-edom y todo lo que le pertenece, por causa del arca de Dios». Entonces David fue e hizo subir el arca de Dios de la casa de Obed-edom a la ciudad de David, con regocijo.'
  rationale: Se ajusta solo el verbo principal del traslado para reflejar mejor el sentido idiomático de עלה en este contexto narrativo y evitar ambigüedad en español. También se suaviza la preposición de origen para mayor naturalidad.
