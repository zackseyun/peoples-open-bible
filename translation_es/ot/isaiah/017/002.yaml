translation:
  language: es
  text: Las ciudades de Aroer están abandonadas[a]; serán para rebaños[b], y estos se echarán sin que nadie los espante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Las ciudades de Aroer están desamparadas» o «desiertas».'
    reason: lexical_alternative
  - marker: b
    text: «Rebaños» también puede traducirse «manadas»; la idea es que los asentamientos abandonados pasan a ser lugar de pastoreo para animales.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲזֻבוֹת
  english_pob_choice: abandoned
  chosen_spanish: están abandonadas
  alternatives_spanish:
  - están desiertas
  - están desamparadas
  - están forsaken
  lexicon: HALOT
  rationale: El participio pasivo femenino plural comunica un estado resultante. «Están abandonadas» conserva ese valor pasivo y suena natural en español moderno.
- source_word: עָרֵי
  english_pob_choice: cities of
  chosen_spanish: las ciudades de
  alternatives_spanish:
  - las urbes de
  - los pueblos de
  lexicon: HALOT
  rationale: El constructo plural de עִיר se expresa con claridad por medio de «las ciudades de». Mantiene el alcance del término sin volverlo más técnico de lo necesario.
- source_word: עֲרֹעֵר
  english_pob_choice: Aroer
  chosen_spanish: Aroer
  lexicon: nombre propio
  rationale: Nombre propio transliterado, conforme al tratamiento estándar de topónimos en el proyecto.
- source_word: לַעֲדָרִים
  english_pob_choice: for flocks
  chosen_spanish: para rebaños
  alternatives_spanish:
  - para flocks
  - para manadas
  - para hatos
  lexicon: HALOT
  rationale: עֵדֶר puede referirse a rebaño o manada. En español, «rebaños» preserva la imagen pastoril y resulta más idiomático en este contexto de lugares desolados convertidos en pastizal.
- source_word: וְרָבְצוּ
  english_pob_choice: and they will lie down
  chosen_spanish: y se echarán
  alternatives_spanish:
  - y se acostarán
  - y reposarán
  lexicon: HALOT
  rationale: El verbo describe a animales echados o tendidos. «Se echarán» mantiene la imagen concreta del ganado reposando sobre el terreno.
- source_word: וְאֵין מַחֲרִיד
  english_pob_choice: with no one to make them afraid
  chosen_spanish: sin que nadie las espante
  alternatives_spanish:
  - sin que nadie las atemorice
  - sin que nadie las asuste
  lexicon: HALOT
  rationale: La expresión hebrea indica ausencia de quien cause sobresalto o pánico. En español, «las espante» conserva bien el matiz de ahuyentar o perturbar a los animales.
translation_notes:
  revision_awareness: 'El borrador coincide con el texto fuente y con la evaluación de alta concordancia del último pase: no se requieren cambios sustanciales. Se mantiene la imagen profética de ciudades deshabitadas convertidas en pastizal, con la seguridad implícita de que no habrá quien ahuyente a los animales.'
  spanish_consistency_notes:
  - Se mantiene «Aroer» como topónimo transliterado.
  - Se conserva el plural «ciudades» para עָרֵי y el sentido colectivo de los animales con «rebaños».
  - No se introduce terminología eclesiástica ajena al pasaje; el registro es bíblico pero actual.
  - La clausula final se vierte de forma natural en español sin perder el sentido idiomático de ausencia total de amenaza.
