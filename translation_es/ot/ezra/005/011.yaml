    rationale: El arameo introduce el contenido de la respuesta con un giro del tipo 'Y así/esta es la respuesta'. En español, 'Y así fue...' suena más retrospectivo que presentativo. 'Y esta es la respuesta...' o 'Y esta fue la respuesta...' preserva mejor la función discursiva.
  - severity: medium
    issue: '''que nos dieron'' es algo más débil que la decisión documentada para הֲתִיבוּנָא.'
    rationale: Aunque es comprensible, el verbo arameo conserva la idea de 'devolver/retornar' una respuesta. En este contexto español, 'nos devolvieron' suena natural y además armoniza con la nota léxica ya incluida. Ayuda a reflejar mejor la rationale del POB.
  - severity: low
    issue: La nota [a] queda menos útil si el texto principal no conserva suficientemente el contraste entre 'respuesta' y 'mensaje' ni la imagen de 'devolver'.
    rationale: Si el texto principal se ajusta a 'Y esta es la respuesta que nos devolvieron', la nota alternativa 'Y así fue el mensaje...' funciona mejor como verdadera alternativa léxica y sintáctica.
