translation:
  language: es
  text: 'Y esta casa, que había sido exaltada, será un horror[a] para todo el que pase junto a ella, y dirán: «¿Por qué Yahvé ha hecho así a esta tierra y a esta casa[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será desolación» o «será algo espantoso». El verbo hebreo puede abarcar devastación y el espanto que esta produce.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «casa»; aquí se refiere al templo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַבַּיִת הַזֶּה
  english_pob_choice: And this house
  chosen_spanish: Y esta casa
  alternatives_spanish:
  - Y este templo
  lexicon: HALOT
  rationale: בַּיִת significa literalmente «casa». Mantener «casa» preserva la forma hebrea y su resonancia teológica, aunque el referente sea el templo.
- source_word: אֲשֶׁר הָיָה עֶלְיוֹן
  english_pob_choice: which was exalted
  chosen_spanish: que había sido exaltada
  alternatives_spanish:
  - que estaba en alto
  - que era exaltada
  lexicon: HALOT
  rationale: עֶלְיוֹן comunica elevación o prominencia. «Había sido exaltada» conserva el valor de altura y grandeza con un matiz de estado previo, acorde con el contexto de contraste con la ruina.
- source_word: לְכָל עֹבֵר עָלָיו
  english_pob_choice: to everyone passing by it
  chosen_spanish: para todo el que pase junto a ella
  alternatives_spanish:
  - para todos los que pasan junto a ella
  - para cualquiera que pase junto a ella
  lexicon: HALOT
  rationale: 'La construcción participial hebrea se expresa naturalmente en español con una relativa general: «todo el que pase». «Junto a ella» evita una literalidad rígida y conserva la imagen de los transeúntes.'
- source_word: יִשֹּׁם
  english_pob_choice: will become a horror
  chosen_spanish: será un horror
  alternatives_spanish:
  - será desolación
  - será algo espantoso
  lexicon: HALOT
  rationale: El verbo puede incluir la idea de devastación y la reacción de horror ante ella. «Será un horror» sigue de cerca la decisión inglesa revisada y mantiene la fuerza pública del juicio sin diluirla.
- source_word: וְאָמַר
  english_pob_choice: and they will say
  chosen_spanish: y dirán
  alternatives_spanish:
  - y dirá
  - y se dirá
  lexicon: HALOT
  rationale: Aunque la forma hebrea es singular distributiva, el español suena mejor en plural impersonal con referencia a los transeúntes. «Dirán» comunica ese valor colectivo de manera natural.
- source_word: בַּמֶּה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Con qué motivo?
  - ¿Por qué razón?
  lexicon: HALOT
  rationale: En una pregunta sobre juicio divino, «¿Por qué?» es la forma idiomática y sobria en español para expresar la causa o razón implícita.
- source_word: עָשָׂה יְהוָה
  english_pob_choice: has Yahweh done
  chosen_spanish: Yahvé ha hecho
  alternatives_spanish:
  - Yahvé hizo
  - el Yahvé ha hecho
  lexicon: HALOT
  rationale: Se conserva el nombre divino «Yahvé» según la norma del proyecto. El perfecto español («ha hecho») expresa bien el resultado visible de una acción pasada.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue la terminología del proyecto para el Tetragrámaton. En español, «Yahvé» es la forma establecida para mantener el nombre divino revelado, en lugar de sustituirlo por un título.
- source_word: כָּכָה
  english_pob_choice: thus
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de tal manera
  lexicon: HALOT
  rationale: «Así» es la equivalencia más directa y solemne del adverbio demostrativo en este contexto de juicio.
- source_word: לָאָרֶץ הַזֹּאת
  english_pob_choice: to this land
  chosen_spanish: a esta tierra
  alternatives_spanish:
  - a este país
  - a esta tierra
  lexicon: HALOT
  rationale: «Tierra» conserva el alcance bíblico y covenantal de אֶרֶץ mejor que «país». La preposición «a» reproduce el valor direccional del hebreo.
- source_word: וְלַבַּיִת הַזֶּה
  english_pob_choice: and to this house
  chosen_spanish: y a esta casa
  alternatives_spanish:
  - y a este templo
  - y a esta casa
  lexicon: HALOT
  rationale: Se mantiene la repetición de «casa» para respetar la cohesión léxica del versículo, dejando al contexto identificar el templo.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El proyecto exige transliterar el nombre divino en vez de ocultarlo tras una sustitución. «Yahvé» es la forma española más reconocible y litúrgicamente legible, manteniendo la identidad personal del Dios del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance de יִשֹּׁם
  english_pob_reading: will become a horror
  chosen_spanish_reading: será un horror
  alternative_spanish_readings:
  - será desolación
  - será espantoso
  rationale: La frase debe conservar tanto la devastación objetiva como el espanto que provoca. «Será un horror» mantiene la tensión sin reducir el término a mera ruina material.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §5
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del texto inglés, que prefirió «a horror» frente a «an object of horror» por ser más directo y natural. En español se optó por «será un horror» para reflejar esa misma decisión revisada, manteniendo la formalidad y la fuerza del juicio.
  spanish_consistency_notes:
  - Se conserva «casa» de manera consistente en ambos miembros del versículo, en línea con la decisión inglesa auditada.
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Tierra» traduce אֶרֶץ para preservar el matiz bíblico y covenantal.
  - La impersonal plural «dirán» refleja adecuadamente el singular distributivo hebreo.
  - Las comillas españolas se usan para la cita directa dentro del versículo.
