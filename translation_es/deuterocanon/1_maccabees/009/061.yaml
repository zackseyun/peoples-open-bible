    issue: «entre los hombres de la región» no expresa con suficiente precisión el valor de selección de ἀπό
    rationale: El griego indica que fueron tomados de entre un grupo mayor. En español, «entre» solo puede leerse como ámbito o localización; «de entre los hombres de la región» o «de los hombres de la región» preserva mejor la relación fuente-selección.
  - severity: low
    issue: La coma antes de «que eran líderes de la maldad» hace la relativa algo más explicativa que restrictiva
    rationale: 'En este contexto, la frase identifica a cuáles cincuenta hombres se refiere. En español fluye mejor sin coma: «a cincuenta hombres que eran líderes de la maldad».'
