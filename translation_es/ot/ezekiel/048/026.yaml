translation:
  language: es
  text: Y a lo largo del límite de Isacar, desde el lado oriental hasta el lado occidental[a], Zabulón, una porción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «lado del mar»; en esta fórmula territorial, es un modismo para el lado occidental.
    reason: cultural_note
  - marker: b
    text: Hebreo literalmente, «Zabulón, uno»; «porción» se sobreentiende por la fórmula repetida de distribución de tierras en este capítulo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/עַל
  english_pob_choice: And along
  chosen_spanish: Y junto a
  alternatives_spanish:
  - Y sobre
  - Y al lado de
  lexicon: HALOT
  rationale: La combinación de conjunción y preposición introduce el siguiente reparto territorial; «y junto a» conserva la relación espacial sin sonar forzado en español.
- source_word: גְּבוּל
  english_pob_choice: border
  chosen_spanish: límite
  alternatives_spanish:
  - frontera
  - territorio
  lexicon: HALOT
  rationale: En este contexto de repartos de tierras, גְּבוּל designa la línea limítrofe del territorio; «límite» es natural y fiel.
- source_word: יִשָׂשכָר
  english_pob_choice: Issachar
  chosen_spanish: Isacar
  alternatives_spanish:
  - Issacar
  lexicon: Transliteración bíblica estándar en español
  rationale: Se usa la forma española habitual del nombre tribal, inteligible y estable en la tradición bíblica en español.
- source_word: מִפְּאַת קָדִימָה
  english_pob_choice: from the east side
  chosen_spanish: desde el lado del oriente
  alternatives_spanish:
  - desde el lado oriental
  - desde el lado del este
  lexicon: HALOT
  rationale: פֵּאָה es «lado/borde» y קָדִים apunta al oriente; «lado del oriente» conserva el valor direccional con español claro y digno.
- source_word: פְּאַת יָמָּה
  english_pob_choice: the west side
  chosen_spanish: el lado del mar
  alternatives_spanish:
  - el lado occidental
  - el lado del occidente
  lexicon: HALOT
  rationale: Aunque el sentido geográfico es occidental, el hebreo dice literalmente «lado del mar»; aquí se conserva la imagen del original porque el texto fuente usa esa expresión idiomática.
- source_word: זְבוּלֻן
  english_pob_choice: Zebulun
  chosen_spanish: Zabulón
  alternatives_spanish:
  - Zebulón
  lexicon: Transliteración bíblica estándar en español
  rationale: Se adopta la forma española tradicional y ampliamente reconocible del nombre tribal.
- source_word: אֶחָד
  english_pob_choice: one portion
  chosen_spanish: una sola porción
  alternatives_spanish:
  - una porción
  - una
  lexicon: HALOT
  rationale: Se explicita «porción» porque el hebreo dice simplemente «uno», pero el marco repetido del capítulo presupone una porción de tierra; «una sola porción» mantiene la elipsis sin perder claridad.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior integrando los marcadores [a] y [b] directamente en el texto español, de modo que cada nota queda anclada a la palabra o sintagma correspondiente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa «límite» para גְּבוּל y «porción» para el sustantivo implícito de la fórmula de repartos.
  - 'Se prefieren nombres bíblicos en formas españolas establecidas: Isacar, Zabulón.'
