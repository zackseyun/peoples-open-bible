    rationale: El modismo español correspondiente a מִיַּד es «de la mano de». La forma actual compromete la legibilidad y no es aceptable como español natural.
  - severity: medium
    issue: La clausula final suena poco idiomática en español
    rationale: «No serán aceptadas para ustedes» calca el inglés. «No les serán aceptadas» conserva mejor la relación con los oferentes expresada por לָכֶם y suena más natural en español bíblico moderno.
  - severity: low
    issue: La nota b usa «mancha», menos precisa que «defecto»/«blemish»
    rationale: Aunque posible, «mancha» puede sonar demasiado superficial. Sería mejor «imperfección» o mantener «defecto» como principal y «mancha» solo como alternativa menos preferida. No obstante, no impide la comprensión.
