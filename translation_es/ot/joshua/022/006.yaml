revisions:
- from: Entonces Josué los bendijo y los despidió[a]; y ellos fueron a sus tiendas.
  to: Entonces Josué los bendijo y los despidió[a], y se fueron a sus tiendas.
  rationale: Se hace una reparación menor de estilo para lograr un español más natural y fluido, sin cambiar el sentido del hebreo ni las decisiones léxicas ya documentadas. «Se fueron» encaja mejor tras «los despidió», y se elimina el pronombre explícito y el punto y coma por innecesarios.
  reviewer_model: gpt-5.4
