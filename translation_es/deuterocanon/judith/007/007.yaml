base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/007/007.yaml
  text: And he inspected the approaches to their city[a], and he took control of the springs of water and seized them, and he stationed camps of fighting men by them[c][b]; and he himself returned to his people.
  footnotes:
  - marker: a
    text: Or 'the ascents' or 'the ways up to their city.' The Greek emphasizes the uphill access routes to the city.
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'fortified' is rare; it may also be understood as 'secured' or 'blockaded' the water springs.
    reason: lexical_alternative
  - marker: c
    text: Or 'he broke camp and went up/back to his people.' The Greek verb may carry the nuance of striking camp before returning.
    reason: lexical_alternative
