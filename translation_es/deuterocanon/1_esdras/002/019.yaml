  yaml_path: translation/deuterocanon/1_esdras/002/019.yaml
  text: And you will find in the records what has been written about these things[a], and you will know that that city was rebellious, troubling kings and cities, and that the Jews in it were rebels and had organized sieges in it from of old; for this reason this city was laid waste.
