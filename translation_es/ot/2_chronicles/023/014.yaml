revisions:
- from: 'Entonces Joiadá, el sacerdote, sacó a los comandantes de cien, designados sobre el ejército[a], y les dijo: «Sáquenla entre las filas, y al que venga después de ella, mátenlo a espada». Porque el sacerdote había dicho: «No la maten en la casa de Yahvé».'
  to: 'Entonces Joiadá, el sacerdote, sacó a los comandantes de cien, puestos al mando del ejército[a], y les dijo: «Sáquenla entre las filas, y a cualquiera que la siga, que sea muerto a espada». Porque el sacerdote había dicho: «No la maten en la casa de Yahvé».'
  rationale: 'Se hicieron ajustes menores para mejorar fidelidad y naturalidad: «puestos al mando del ejército» expresa mejor la función oficial de פְּקוּדֵי הַחַיִל en español natural; «a cualquiera que la siga» representa mejor el probable sentido de וְהַבָּא אַחֲרֶיהָ; y «que sea muerto a espada» recupera mejor el tono formal de la orden hebrea. Se mantuvo la nota sobre la frase difícil «entre las filas» y el uso de «Yahvé».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:55:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo y del rastro POB: Joiadá saca/presenta a los jefes militares, ordena sacar a Atalía entre las filas, manda matar a quien la siga y prohíbe ejecutarla en la casa de Yahvé. Se preservan bien יהוה → Yahvé y la dificultad de הַשְּׂדֵרוֹת con nota. Sin embargo, dos elecciones debilitan la precisión: «designados sobre el ejército» suena poco natural en español y conviene ajustarlo a «puestos al mando del ejército» o equivalente; y «al que venga después de ella» expresa mera venida posterior más que seguimiento/apoyo, mientras que וְהַבָּא אַחֲרֶיהָ en contexto apunta mejor a quien vaya siguiéndola.'
  spanish_quality_summary: 'El español es claro y digno, pero tiene dos giros mejorables para legibilidad y fidelidad: «designados sobre el ejército» es un calco poco idiomático, y «al que venga después de ella» suena temporal/espacial más amplio que el probable sentido de seguimiento. También puede elevarse ligeramente el registro de la orden judicial con «que sea muerto a espada» o similar, sin perder naturalidad.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Yahvé» está correcto; «casa de Yahvé» preserva בית יהוה; la nota léxica sobre «filas» está bien anclada. No hay conflictos doctrinales mayores. El ajuste recomendado es estilístico-semántico, no terminológico.'
  issues:
  - severity: medium
    issue: «designados sobre el ejército» es poco idiomático
    rationale: Aunque refleja la idea de nombramiento, «sobre el ejército» suena calcado. El hebreo פְּקוּדֵי הַחַיִל apunta a una función oficial respecto de la fuerza militar; en español bíblico legible, «puestos al mando del ejército» comunica mejor esa relación.
  - severity: medium
    issue: «al que venga después de ella» no expresa claramente seguimiento
    rationale: וְהַבָּא אַחֲרֶיהָ en este contexto de arresto/ejecución probablemente se refiere a quien la siga o la acompañe. «Venga después» puede entenderse solo como venir más tarde o detrás, sin matiz de adhesión o escolta.
  - severity: low
    issue: «mátenlo a espada» es correcto pero algo menos formal que el hebreo
    rationale: La cláusula יוּמַת בֶּחָרֶב tiene tono judicial/pasivo de mandato. Una formulación como «que sea muerto a espada» o «sea puesto a muerte a espada» conserva mejor ese registro, aunque la forma actual no es errónea.
  revised_spanish_text: 'Entonces Joiadá, el sacerdote, sacó a los comandantes de cien, puestos al mando del ejército[a], y les dijo: «Sáquenla entre las filas, y a cualquiera que la siga, que sea muerto a espada». Porque el sacerdote había dicho: «No la maten en la casa de Yahvé».'
  revised_footnotes:
  - marker: a
    text: O «hacia el exterior de las filas»; la frase hebrea es difícil. Probablemente se refiere a sacar a Atalía por entre o a través de formaciones ordenadas.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron ajustes menores para mejorar fidelidad y naturalidad: «puestos al mando del ejército» expresa mejor la función oficial de פְּקוּדֵי הַחַיִל en español natural; «a cualquiera que la siga» representa mejor el probable sentido de וְהַבָּא אַחֲרֶיהָ; y «que sea muerto a espada» recupera mejor el tono formal de la orden hebrea. Se mantuvo la nota sobre la frase difícil «entre las filas» y el uso de «Yahvé».'
