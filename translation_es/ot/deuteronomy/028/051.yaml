translation:
  language: es
  text: Consumirá la descendencia de tu ganado y el fruto de tu tierra, hasta que seas destruido; no te dejará grano, vino nuevo ni aceite, ni terneros de tu manada ni corderos[a] de tu rebaño, hasta destruirte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las crías de tu rebaño». El hebreo עַשְׁתְּרֹת צֹאנֶךָ se refiere al rendimiento reproductivo del rebaño.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָכַל
  english_pob_choice: It will consume
  chosen_spanish: Consumirá
  alternatives_spanish:
  - Y comerá
  - Devorará
  lexicon: HALOT
  rationale: El hebreo literalmente dice «comerá», pero en este contexto de maldición y devastación una forma futura simple como «consumirá» comunica bien la acción hostil y la pérdida total sin sonar demasiado coloquial. Mantiene el sujeto singular implícito del invasor.
- source_word: פְּרִי בְהֶמְתְּךָ
  english_pob_choice: the offspring of your livestock
  chosen_spanish: el fruto de tu ganado
  alternatives_spanish:
  - la cría de tu ganado
  - los hijos de tu ganado
  lexicon: HALOT
  rationale: פְּרִי con animales puede designar la descendencia o el aumento reproductivo. «Fruto» conserva la literalidad hebrea y deja abierta la idea de descendencia; «ganado» traduce בְהֵמָה de manera natural en español.
- source_word: וּפְרִי אַדְמָתְךָ
  english_pob_choice: the produce of your land
  chosen_spanish: el fruto de tu tierra
  alternatives_spanish:
  - el producto de tu tierra
  - la cosecha de tu tierra
  lexicon: HALOT
  rationale: אַדְמָה y פְּרִי forman una expresión agrícola amplia. «Fruto de tu tierra» es fiel al hebreo y suficientemente natural en español bíblico moderno.
- source_word: עַד הִשָּׁמְדָךְ
  english_pob_choice: until you are destroyed
  chosen_spanish: hasta que seas destruido
  alternatives_spanish:
  - hasta tu destrucción
  - hasta que seas aniquilado
  lexicon: HALOT
  rationale: La construcción expresa el punto final del consumo. «Seas destruido» conserva el tono de juicio del pacto sin intensificar más allá del hebreo.
- source_word: דָּגָן
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - cereal
  - trigo
  lexicon: HALOT
  rationale: דָּגָן es el cereal/grano en sentido general. «Grano» es el equivalente español más directo y amplio.
- source_word: תִּירוֹשׁ
  english_pob_choice: new wine
  chosen_spanish: mosto
  alternatives_spanish:
  - vino nuevo
  - vino fresco
  lexicon: HALOT
  rationale: תִּירוֹשׁ suele referirse al vino joven o al mosto recién producido. «Mosto» es preciso en español y evita confundirlo con vino ya maduro.
- source_word: יִצְהָר
  english_pob_choice: oil
  chosen_spanish: aceite
  alternatives_spanish:
  - aceite de oliva
  - aceite fresco
  lexicon: HALOT
  rationale: En la tríada grano-mosto-aceite, יִצְהָר alude al aceite, normalmente de oliva. «Aceite» es claro y natural; el contexto agrícola ya sugiere el tipo.
- source_word: שְׁגַר אֲלָפֶיךָ
  english_pob_choice: calves of your herd
  chosen_spanish: crías de tu ganado
  alternatives_spanish:
  - terneros de tu ganado
  - aumento de tu ganado
  lexicon: HALOT
  rationale: El hebreo apunta al aumento reproductivo del ganado. «Crías» es suficientemente amplio y evita restringirlo solo a terneros, aunque el contexto incluye esa idea.
- source_word: וְעַשְׁתְּרֹת צֹאנֶךָ
  english_pob_choice: lambs of your flock
  chosen_spanish: corderos de tu rebaño
  alternatives_spanish:
  - crías de tu rebaño
  - ovejas de tu rebaño
  lexicon: HALOT
  rationale: El término tiene debate lexical, pero en este paralelo de producción animal la referencia al aumento/progenie del rebaño es la más probable. «Corderos» hace la imagen clara en español sin perder el sentido de cría.
- source_word: עַד הַאֲבִידוֹ אֹתָךְ
  english_pob_choice: until it has destroyed you
  chosen_spanish: hasta destruirte
  alternatives_spanish:
  - hasta que te haya destruido
  - hasta arruinarte
  lexicon: HALOT
  rationale: 'El hifil de אבד es causativo: «hacer perecer / destruir». «Hasta destruirte» funciona bien en español y mantiene la culminación del juicio. La primera cláusula ya expresó «ser destruido», así que aquí se evita redundancia excesiva sin perder el paralelismo.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y el audit trail inglés, incorporando la revisión que favorece una referencia más específica al ganado joven/descendencia animal, pero en español se optó por mantener una equivalencia amplia y natural con «crías» para no estrechar indebidamente el sentido. Se preserva además la doble clausula de destrucción final del verso.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el hebreo presenta el nombre divino; aquí no aparece, por lo que no se introduce.
  - 'Se mantiene la tríada agrícola con equivalentes estables: grano, mosto, aceite.'
  - «Ganado» traduce בְהֵמָה en sentido doméstico/agropecuario, no «bestias»; «rebaño» traduce צֹאן de forma natural.
  - No se fuerza «Cristo/Mesías» ni otras terminologías ajenas al pasaje.
  - La alternancia entre «fruto» y «crías» conserva la tensión lexical del hebreo entre producto agrícola y reproductivo.
