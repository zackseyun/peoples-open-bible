theological_decisions:
- issue: Rendering of ἐκ τῶν γενημάτων αὐτῆς in a context where the Greek wording is unusual
  chosen_reading: from her offspring
  alternative_readings:
  - from her inhabitants
  - from those born in her
  rationale: This is primarily a lexical/syntactic difficulty rather than a doctrinal issue, but it affects how concretely the city's emptiness is described. The main text keeps the more literal reading from the extant Greek witness, while alternatives that smooth the sense are preserved in a footnote for transparency.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve source ambiguity rather than over-resolve.'
- issue: Whether to render ἄκρα as a transliterated place-name or translated common noun
  chosen_reading: citadel
  alternative_readings:
  - Acra
  rationale: The term likely refers to the well-known Seleucid stronghold in Jerusalem. The main text translates for readability; the historical place-name is preserved in a footnote.
  doctrine_reference: Translate meaning in the main text where clarity is served; preserve significant alternatives in footnotes.
