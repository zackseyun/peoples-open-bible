translation:
  language: es
  text: Busquen el bien y no el mal, para que vivan; y así Yahvé, el Dios de los ejércitos, estará con ustedes, como han dicho[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como dicen». El perfecto hebreo puede referirse a lo que ellos ya habían afirmado acerca de la presencia de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּרְשׁוּ
  english_pob_choice: Seek
  chosen_spanish: Busquen
  alternatives_spanish:
  - Busquen con empeño
  - Busquen
  lexicon: HALOT
  rationale: דרשׁ en este contexto profético expresa una búsqueda activa y orientada a la obediencia. En español, «buscar» conserva bien ese sentido exhortativo sin añadir contenido ajeno.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: el bien
  alternatives_spanish:
  - lo bueno
  - el bien
  lexicon: HALOT
  rationale: El hebreo funciona aquí como contraste moral con רָע. «El bien» suena natural en español y mantiene el valor sustantivo del término.
- source_word: וְאַל רָע
  english_pob_choice: and not evil
  chosen_spanish: y no el mal
  alternatives_spanish:
  - y no lo malo
  - y no el mal
  lexicon: HALOT
  rationale: La oposición breve del hebreo se conserva mejor con «el mal» que con una expansión interpretativa. «Evil» en inglés se corresponde más naturalmente con «mal» que con «maldad» en esta antítesis directa.
- source_word: לְמַעַן תִּחְיוּ
  english_pob_choice: so that you may live
  chosen_spanish: para que vivan
  alternatives_spanish:
  - para que puedan vivir
  - a fin de que vivan
  lexicon: HALOT
  rationale: למען expresa finalidad. En español, «para que vivan» comunica con claridad la meta y conserva la forma exhortativa sin perder el tono de resultado deseado.
- source_word: וִיהִי כֵן
  english_pob_choice: and so ... will be
  chosen_spanish: y así
  alternatives_spanish:
  - y entonces
  - y así
  lexicon: HALOT
  rationale: La construcción hebrea introduce una consecuencia o estado resultante. En español, «y así» permite enlazar con fluidez la promesa consecuente sin forzar una formulación más rígida.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, conforme al criterio del proyecto, en vez de sustituirlo por un título. «Yahvé» es la forma establecida en el texto español POB.
- source_word: אֱלֹהֵי צְבָאוֹת
  english_pob_choice: the God of hosts
  chosen_spanish: el Dios de los ejércitos
  alternatives_spanish:
  - el Dios de los ejércitos
  - el Dios de las huestes
  lexicon: HALOT
  rationale: «Hosts» puede expresarse en español de forma más transparente como «ejércitos» sin perder la amplitud del título. «Huestes» sería más tradicional, pero menos claro para el lector moderno.
- source_word: אִתְּכֶם
  english_pob_choice: with you
  chosen_spanish: estará con ustedes
  alternatives_spanish:
  - estará con ustedes
  - estará junto a ustedes
  lexicon: HALOT
  rationale: El hebreo indica presencia acompañante. «Estará con ustedes» reproduce bien la relación de cercanía sin cambiar el sentido a mera ubicación.
- source_word: כַּאֲשֶׁר אֲמַרְתֶּם
  english_pob_choice: as you have said
  chosen_spanish: como han dicho
  alternatives_spanish:
  - como han dicho
  - como ustedes han dicho
  - como ustedes dicen
  lexicon: HALOT
  rationale: El perfecto hebreo puede apuntar a una afirmación previa o ya hecha. «Como han dicho» preserva esa referencia retrospectiva mejor que una traducción puramente presente.
theological_decisions:
- issue: Si la presencia divina se presenta como afirmación actual o como consecuencia condicionada por buscar el bien
  english_pob_reading: 'Rendered as a contingent consequence of seeking good: ''and so ... will be with you'''
  chosen_spanish_reading: 'Se mantiene como consecuencia condicional: «y así ... estará con ustedes»'
  alternative_spanish_readings:
  - «y así ... está con ustedes»
  - «entonces ... estará con ustedes»
  rationale: El hebreo enlaza la exhortación con el resultado esperado. La traducción española conserva esa relación sin convertirla en una declaración absoluta e independiente. Así se preserva la tensión del pasaje entre llamado al arrepentimiento y promesa de presencia.
  doctrine_reference: Preservar la tensión textual; primacía del hebreo sobre la armonización teológica.
- issue: Cómo reflejar la posible alusión a una afirmación previa del pueblo sobre la presencia de Yahvé
  english_pob_reading: The Hebrew perfect may refer to what they have previously claimed about the LORD's presence.
  chosen_spanish_reading: «como han dicho» sugiere una referencia a una afirmación ya hecha
  alternative_spanish_readings:
  - «como dicen»
  - «como ustedes han dicho»
  rationale: La forma española escogida conserva la posibilidad de que Amos esté aludiendo a una confesión previa del pueblo, sin cerrar la ambigüedad que el hebreo permite. De este modo se respeta la nota del texto base.
  doctrine_reference: No resolver la ambigüedad del perfecto hebreo; mantener la lectura auditada.
translation_notes:
  revision_awareness: No hubo cambios en la última revisión del texto base; el borrador español sigue el mismo análisis de alta concordancia y conserva la decisión clave sobre la lectura consecuente y la alusión al dicho previo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma constante del nombre divino.
  - Se usa «el Dios de los ejércitos» para mantener transparencia semántica y evitar un arcaísmo innecesario.
  - La nota al pie se ancla en la cláusula final para preservar la alternativa verbal del hebreo.
  - El registro es formal y bíblico, pero con sintaxis española natural.
