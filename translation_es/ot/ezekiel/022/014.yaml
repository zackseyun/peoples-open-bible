    rationale: La frase pregunta si las manos seguirán siendo fuertes o resistirán, no si llegarán a fortalecerse. En español, «se fortalecerán» puede implicar aumento de fuerza, no mera permanencia de fortaleza.
  - severity: medium
    issue: «en que yo te trato» es poco natural y ambiguo en español
    rationale: Aunque intenta preservar la amplitud de «deal with you», en español bíblico actual «te trato» no comunica bien la idea de intervención divina judicial. Una opción como «cuando yo tome medidas contra ti» mantiene el contexto punitivo sin reducirlo estrictamente a «juzgar».
  - severity: low
    issue: La nota al pie puede pulirse para sonar natural en español
    rationale: La fórmula inicial y la alternativa verbal pueden simplificarse y alinearse con el texto revisado.
