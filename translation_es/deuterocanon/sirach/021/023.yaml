review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y del paralelo griego: contrasta al necio que mira de manera impropia desde la entrada con el hombre honorable que se mantiene fuera y habla. Conserva correctamente «y hablará» siguiendo el hebreo y documenta la omisión griega. Sin embargo, «se asoma a la casa» suena menos preciso que una formulación con «se asoma dentro de una casa» o «mira dentro de una casa», porque el original expresa mirar hacia el interior. Además, «permanecerá afuera» introduce una fuerza durativa no exigida por יַעֲמוֹד / στήσεται, mejor representada por «se quedará afuera» o «estará afuera».'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse para sonar más natural y exacto. La ubicación de las notas al final de la oración no ayuda a anclar cada observación al segmento correspondiente; conviene colocar [a] junto a «hombre honorable» y [b] junto a «hablará». «Desde la entrada» es aceptable, pero «desde la puerta» resulta más vívido y cercano al original. La frase revisada mejora legibilidad y precisión sin volverse rígida.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Necio» corresponde bien a אֱוִיל. «Hombre honorable» concuerda con la revisión inglesa documentada para כבוד. La decisión de mantener «hablará» en el texto principal con nota textual está bien alineada con el audit trail del POB.
  issues:
  - severity: medium
    issue: «se asoma a la casa» no expresa con suficiente claridad la idea de mirar hacia dentro
    rationale: El hebreo יַבִּיט אֶל בָּיִת y el griego παρακύπτει εἰς οἰκίαν apuntan a una mirada intrusiva al interior de la casa, no solo a asomarse hacia la casa.
  - severity: medium
    issue: «permanecerá afuera» sobreinterpreta el verbo
    rationale: בַּחוּץ יַעֲמוֹד / ἔξω στήσεται significa más directamente «estará/se quedará afuera» o «se parará afuera»; «permanecerá» añade duración y matiz interpretativo innecesarios.
  - severity: low
    issue: Las notas [a] y [b] están ancladas al final de toda la oración en vez de junto a las palabras relevantes
    rationale: La nota [a] comenta «hombre honorable» y la [b] comenta la inclusión de «hablará»; anclarlas en esos puntos mejora trazabilidad editorial.
  revised_spanish_text: El necio se asoma dentro de una casa desde la puerta, pero el hombre honorable[a] se quedará afuera y hablará.[b]
  revised_footnotes:
  - marker: a
    text: El hebreo dice literalmente «y honor para un hombre [que] estará afuera y hablará», una expresión comprimida que aquí se entiende como «un hombre honorable». El paralelo griego tiene «un hombre formado/instruido estará afuera».
    reason: alternative_reading
  - marker: b
    text: El paralelo griego termina con «estará afuera» y no incluye «y hablará», que sí está presente en el testimonio hebreo seguido aquí.
    reason: textual_variant
