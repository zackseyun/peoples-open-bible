translation:
  language: es
  text: ¿No fue Abraham hallado fiel en la prueba[a][b], y le fue contado por rectitud?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en la tentación’; el término griego también puede significar ‘tentación’, pero aquí se refiere a que Abraham fue probado.
    reason: lexical_alternative
  - marker: b
    text: Alusión a Gn 15:6, vinculada aquí con la prueba de Abraham.
    reason: cross_reference
lexical_decisions:
- source_word: Ἀβραάμ
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrahán
  lexicon: nombre propio
  rationale: El nombre del patriarca se conserva en su forma habitual en español bíblico, sin necesidad de adaptación adicional.
- source_word: πειρασμῷ
  english_pob_choice: in testing
  chosen_spanish: en la prueba
  alternatives_spanish:
  - en la tentación
  - en el ensayo
  - en la tribulación
  lexicon: BDAG
  rationale: El contexto alude a la prueba de Abraham y no a una tentación al mal; por eso 'prueba' comunica mejor el valor de πειρασμός aquí y evita la carga moral indebida de 'tentación'.
- source_word: εὑρέθη πιστός
  english_pob_choice: was found faithful
  chosen_spanish: fue hallado fiel
  alternatives_spanish:
  - fue hallado fiel a
  - resultó fiel
  - se lo halló fiel
  lexicon: BDAG
  rationale: '''Fue hallado fiel'' reproduce con naturalidad la pasiva y el predicado πιστός, manteniendo la valoración de Abraham como probado y reconocido como fiel.'
- source_word: ἐλογίσθη
  english_pob_choice: was counted
  chosen_spanish: le fue contado
  alternatives_spanish:
  - le fue considerado
  - le fue acreditado
  - le fue imputado
  lexicon: BDAG
  rationale: '''Le fue contado'' conserva el matiz de cálculo/recuento del verbo y la resonancia con la formulación de Génesis 15:6 sin cargar el texto con un tecnicismo doctrinal.'
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: BDAG
  rationale: Aunque el audit trail inglés opta por 'righteousness', en español 'justicia' es la equivalencia más directa y reconocible para δικαιοσύνη en este giro bíblico; se mantiene el valor declarativo/covenantal del término sin convertirlo en 'justificación'.
theological_decisions:
- issue: Relación entre la prueba de Abraham y la referencia a Génesis 15:6
  english_pob_reading: Render both clauses straightforwardly without harmonizing or resolving the chronology implied by the allusion.
  chosen_spanish_reading: Se traduce la pregunta retórica de forma directa, dejando intacta la relación entre la prueba de Abraham y el hecho de que le fue contada justicia.
  alternative_spanish_readings:
  - Abraham fue encontrado fiel durante la prueba, y se le contó como justicia.
  - ¿No fue Abraham hallado fiel cuando fue probado, y le fue contada justicia?
  rationale: El griego vincula ambas cláusulas sin explicar su cronología. La traducción conserva ese enlace retórico y la alusión a Génesis 15:6 sin armonizarla ni resolverla interpretativamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Elección de 'justicia' para δικαιοσύνη
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - righteousness
  rationale: En español bíblico 'justicia' es la opción más natural y amplia para δικαιοσύνη; preserva el sentido forense y pactal que el contexto sugiere, mientras que 'rectitud' resultaría más restringida y menos inmediata para el lector.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
translation_notes:
  revision_awareness: El texto en inglés fue revisado por última vez y quedó sin cambios; la presente propuesta sigue ese estado estable y traslada sus decisiones lexicosemánticas al español con ajustes necesarios por naturalidad idiomática.
  spanish_consistency_notes:
  - Se mantiene el nombre propio 'Abraham' de forma uniforme.
  - '''Prueba'' se usa para πειρασμός en este contexto específico, reservando ''tentación'' para casos donde el sentido moral sea claro.'
  - '''Justicia'' se usa para δικαιοσύνη de acuerdo con la práctica española natural y el valor pactal/forense del pasaje.'
  - La construcción 'le fue contado' conserva el registro bíblico sin resultar arcaizante.
  - Se colocan las notas en el texto solo donde hay una alternativa léxica o una alusión explícita a Génesis 15:6.
