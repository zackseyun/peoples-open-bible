translation:
  language: es
  text: 'Y no lo toma a pecho[a], ni hay conocimiento ni entendimiento para decir: «La mitad la quemé en el fuego; también cocí pan sobre sus ascuas; asé carne y comí. ¿Haré del resto una abominación? ¿Me postraré ante un trozo de madera?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no lo vuelve a su corazón» o «no lo considera en su interior»; el hebreo expresa traer algo a la mente y al corazón para reflexionarlo seriamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשִׁיב אֶל לִבּוֹ
  english_pob_choice: take it to heart
  chosen_spanish: lo toma en cuenta
  alternatives_spanish:
  - lo considera en su corazón
  - lo reflexiona en su interior
  lexicon: HALOT
  rationale: El hebreo con שוב + אֶל־לֵב expresa volver algo al interior de la mente o considerarlo de verdad. En español, «tomarlo en cuenta» conserva esa idea reflexiva de atenderlo interiormente sin forzar un calco poco natural.
- source_word: דַעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - discernimiento
  lexicon: HALOT
  rationale: דַעַת suele ser «conocimiento». «Conocimiento» mantiene la primera mitad del par y deja que el segundo término aporte el matiz complementario.
- source_word: תְבוּנָה
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - perspicacia
  lexicon: HALOT
  rationale: תְבוּנָה apunta a comprensión o discernimiento. «Entendimiento» es el correlato natural de «conocimiento» en español y conserva la pareja conceptual del hebreo.
- source_word: חֶצְיוֹ
  english_pob_choice: half of it
  chosen_spanish: la mitad de él
  alternatives_spanish:
  - su mitad
  - la mitad
  lexicon: HALOT
  rationale: El sufijo remite al mismo objeto de madera. «La mitad de él» conserva la referencia directa y el paralelismo del original.
- source_word: שָׂרַפְתִּי בְמוֹ אֵשׁ
  english_pob_choice: I burned half of it in the fire
  chosen_spanish: la quemé en el fuego
  alternatives_spanish:
  - la quemé con fuego
  - la consumí en el fuego
  lexicon: HALOT
  rationale: בְמוֹ אֵשׁ es una expresión idiomática. «En el fuego» suena natural en español y preserva la escena doméstica; no hace falta reforzar con un verbo más explicativo que el hebreo.
- source_word: וְאַף אָפִיתִי
  english_pob_choice: I also baked
  chosen_spanish: también cocí
  alternatives_spanish:
  - también horneé
  - además cocí
  lexicon: HALOT
  rationale: אַף añade valor enfático/aditivo. «También» transmite esa suma irónica. «Cocí» permite abarcar el sentido de preparar pan al fuego sin imponer una imagen demasiado moderna o técnica.
- source_word: עַל גֶּחָלָיו
  english_pob_choice: on its coals
  chosen_spanish: sobre sus ascuas
  alternatives_spanish:
  - sobre sus brasas
  - sobre sus carbones
  lexicon: HALOT
  rationale: El sufijo vuelve al mismo objeto de madera, ahora convertido en combustible. «Ascuas» comunica bien el contexto de brasas calientes y mantiene la idea de cocinar sobre ellas.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: לֶחֶם significa literalmente «pan». «Pan» es la traducción más directa y natural en español.
- source_word: אֶצְלֶה בָשָׂר
  english_pob_choice: I roasted meat
  chosen_spanish: rosticé carne
  alternatives_spanish:
  - asé carne
  - asaré carne
  lexicon: HALOT
  rationale: צלה es asar/rostizar sobre fuego. «Rosticé» conserva el acto de cocinar al fuego y resulta idiomático en español sin perder precisión.
- source_word: וְיִתְרוֹ
  english_pob_choice: the rest of it
  chosen_spanish: el resto de él
  alternatives_spanish:
  - lo que queda de él
  - su resto
  lexicon: HALOT
  rationale: יִתְרוֹ es el remanente. «El resto de él» preserva la relación con el objeto anterior y el contraste con «la mitad».
- source_word: לְתוֹעֵבָה
  english_pob_choice: into an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - una cosa abominable
  lexicon: HALOT
  rationale: תוֹעֵבָה es un término fuerte para algo aborrecible u objetablemente impuro. «Abominación» conserva el peso profético y la dureza del juicio.
- source_word: לְבוּל עֵץ
  english_pob_choice: a block of wood
  chosen_spanish: un trozo de madera
  alternatives_spanish:
  - un bloque de madera
  - un leño
  lexicon: HALOT
  rationale: La frase hebrea es despectiva y subraya que el ídolo no es más que madera. «Trozo de madera» comunica bien el desprecio sin sonar artificial en español.
- source_word: אֶסְגּוֹד
  english_pob_choice: shall I bow down
  chosen_spanish: me postraré
  alternatives_spanish:
  - me inclinaré
  - adoraré
  lexicon: HALOT
  rationale: סגד denota postración en acto de adoración. «Me postraré» mantiene el gesto físico y deja claro el carácter idolátrico por el contexto.
theological_decisions:
- issue: Conservar la ironía profética sobre la idolatría de madera
  english_pob_reading: a block of wood
  chosen_spanish_reading: un trozo de madera
  alternative_spanish_readings:
  - un bloque de madera
  - un leño
  rationale: 'El verso ridiculiza la lógica idolátrica: la misma madera sirve para quemar, cocinar y luego venerar el sobrante. «Un trozo de madera» mantiene el tono despectivo y la materialidad trivial del ídolo.'
  doctrine_reference: Isaías 44; crítica profética de la idolatría
- issue: Mantener el par conceptual conocimiento/entendimiento
  english_pob_reading: knowledge or understanding
  chosen_spanish_reading: conocimiento ni entendimiento
  alternative_spanish_readings:
  - saber ni discernimiento
  - conocimiento ni discernimiento
  rationale: La pareja hebrea acumula dos términos cercanos para subrayar la ceguera moral e intelectual. «Conocimiento ni entendimiento» reproduce esa dupla sin suavizarla.
  doctrine_reference: Sabiduría profética en Isaías
- issue: Preservar el acto físico de postración además del sentido de adoración
  english_pob_reading: shall I bow down
  chosen_spanish_reading: me postraré
  alternative_spanish_readings:
  - me inclinaré
  - adoraré
  rationale: El hebreo destaca el gesto corporal de sumisión. «Me postraré» conserva el acto visible y, por el contexto, su fuerza religiosa/idolátrica.
  doctrine_reference: Culto e idolatría en la Biblia hebrea
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una estructura muy próxima al hebreo y una nota despectiva para לְבוּל עֵץ. La versión española sigue esa decisión, pero adapta el primer miembro a una locución natural («lo toma en cuenta») y conserva la ironía del remanente convertido en objeto de culto. No se introdujeron cambios textuales relevantes respecto del paquete fuente, y no hay revisiones aplicadas en el registro inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto, pero en este versículo no aparece el Tetragrámaton.
  - Se prefirió «conocimiento / entendimiento» como pareja semántica estable, alineada con el paralelismo hebreo.
  - «Trozo de madera» reproduce la desvalorización del ídolo sin añadir interpretaciones ajenas al hebreo.
  - «Postrarse» conserva el gesto físico de adoración implícito en el verbo hebreo.
