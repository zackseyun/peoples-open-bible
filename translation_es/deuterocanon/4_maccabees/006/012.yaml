lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - De ahí que
  lexicon: LSJ
  rationale: Conecta inferencialmente con lo anterior. «Por tanto» mantiene el valor de conclusión de ὅθεν con naturalidad en español y un tono digno de texto bíblico.
- source_word: τὰ μὲν
  english_pob_choice: while some
  chosen_spanish: mientras algunos
  alternatives_spanish:
  - por un lado algunos
  - unos
  - algunos, por su parte
  lexicon: LSJ
  rationale: Μέν introduce una primera mitad de contraste que continúa después. «Mientras algunos» conserva esa apertura contrastiva sin forzar una cláusula más pesada en español.
- source_word: ἐλεῶντες
  english_pob_choice: taking pity
  chosen_spanish: se compadecían
  alternatives_spanish:
  - tenían compasión de
  - se apiadaban de
  - sentían compasión por
  lexicon: BDAG
  rationale: El participio expresa una reacción compasiva activa. «Se compadecían» transmite bien ese movimiento afectivo sin sonar anticuado; también mantiene cierta cercanía al campo semántico de misericordia/compasión.
- source_word: τὰ τοῦ γήρως αὐτοῦ
  english_pob_choice: his old age
  chosen_spanish: su vejez
  alternatives_spanish:
  - las cosas de su vejez
  - las circunstancias de su vejez
  - las condiciones de su avanzada edad
  lexicon: LSJ
  rationale: El griego literalmente dice «las cosas de su vejez», una expresión elíptica para las condiciones o señales propias de la edad avanzada. Siguiendo la revisión inglesa, «su vejez» da una traducción natural y fiel al sentido idiomático.
translation_notes:
  revision_awareness: La revisión inglesa reciente resolvió la literalidad incómoda de «the things of his old age» a favor de «his old age». El español sigue esa decisión revisada, pero conserva la nota para transparentar el giro idiomático del griego.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y cualquier terminología confesional ajena al texto, porque aquí no aparece el nombre divino ni un título cristológico.
  - «Su vejez» es más natural que una transliteración literal del giro griego y coincide con la revisión auditada del texto inglés.
  - Se preservó el valor contrastivo de μέν con «mientras», quedando la frase abierta como en el griego y el inglés auditado.
