translation:
  language: es
  text: Y vinieron de todos los pueblos[a] para oír la sabiduría de Salomón[b], de todos los reyes de la tierra que habían oído hablar de su sabiduría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: “de todas las naciones”. El hebreo עַמִּים está en plural y puede referirse a pueblos o naciones.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: “de todos los reyes de la tierra”; probablemente significa que tales visitantes venían de, o eran enviados por, reyes de toda la tierra que habían oído de la sabiduría de Salomón.'
    reason: cultural_note
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: venían
  alternatives_spanish:
  - vinieron
  - llegaban
  lexicon: HALOT
  rationale: El hebreo es wayyiqtol narrativo; en español, el pretérito simple sería posible, pero el imperfecto de avance narrativo 'venían' conserva mejor el flujo continuo de la fama de Salomón y permite una lectura natural en español sin perder el valor de reporte.
- source_word: מִכָּל הָעַמִּים
  english_pob_choice: from all the peoples
  chosen_spanish: de todos los pueblos
  alternatives_spanish:
  - de todas las naciones
  - de todos los pueblos y naciones
  lexicon: HALOT
  rationale: עַמִּים es plural y señala grupos étnicos o colectivos humanos; 'pueblos' preserva mejor esa pluralidad que 'naciones' en español, aunque ambas opciones son posibles según contexto.
- source_word: לִשְׁמֹעַ
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  lexicon: HALOT
  rationale: El infinitivo final expresa propósito. 'Oír' es la correspondencia más directa y sobria; 'escuchar' podría sugerir atención deliberada, pero aquí el foco está en el acto de acudir para oír la sabiduría.
- source_word: חָכְמַת שְׁלֹמֹה
  english_pob_choice: the wisdom of Solomon
  chosen_spanish: la sabiduría de Salomón
  alternatives_spanish:
  - la sabiduría salomónica
  - la sabiduría que tenía Salomón
  lexicon: HALOT
  rationale: Se mantiene el sintagma constructo de manera transparente y natural en español. 'La sabiduría de Salomón' conserva el sentido y la dignidad del hebreo sin paráfrasis.
- source_word: מֵאֵת כָּל מַלְכֵי הָאָרֶץ
  english_pob_choice: from all the kings of the earth
  chosen_spanish: de parte de todos los reyes de la tierra
  alternatives_spanish:
  - de todos los reyes de la tierra
  - procedentes de todos los reyes de la tierra
  lexicon: HALOT
  rationale: מֵאֵת puede indicar origen, procedencia o instancia. 'De parte de' deja abierta la posibilidad de que acudieran enviados o delegados por los reyes, sin cerrar indebidamente la ambigüedad del hebreo.
- source_word: אֲשֶׁר שָׁמְעוּ אֶת חָכְמָתוֹ
  english_pob_choice: who had heard of his wisdom
  chosen_spanish: que habían oído de su sabiduría
  alternatives_spanish:
  - que habían oído hablar de su sabiduría
  - que habían oído su sabiduría
  lexicon: HALOT
  rationale: En español, la reputación se expresa naturalmente con 'oír de' o 'oír hablar de'. 'Habían oído de su sabiduría' conserva la relación de reporte sobre la fama de Salomón sin forzar una construcción menos idiomática.
translation_notes:
  revision_awareness: 'La versión española sigue el sentido y la estructura del hebreo de 1 Reyes 5:14, en línea con la POB inglesa: evita cerrar la ambigüedad de מֵאֵת y mantiene el valor plural de עַמִּים. Frente al inglés ''came'', se eligió un imperfecto narrativo en español por fluidez y porque el verso describe una afluencia continua asociada con la fama de Salomón.'
  spanish_consistency_notes:
  - Se conserva 'Salomón' como nombre propio establecido.
  - Se usa 'sabiduría' de forma uniforme para חָכְמָה.
  - '''Pueblos'' se emplea para mantener el plural de עַמִּים; la nota a aclara la alternativa ''naciones''.'
  - '''De parte de'' refleja la ambigüedad de מֵאֵת sin imponer una lectura de envío explícita.'
