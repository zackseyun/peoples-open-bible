base_translation:
  language: en
  yaml_path: translation/ot/exodus/027/020.yaml
  text: And you shall command the sons of Israel that they bring to you pure beaten olive oil for the light[c][b][a], to cause a lamp to burn continually.
  footnotes:
  - marker: a
    text: 'Or “the Israelites” or “the people of Israel.” Hebrew: “the sons of Israel.”'
    reason: lexical_alternative
  - marker: b
    text: “Beaten” may also be rendered “crushed,” referring to high-quality oil produced from olives by pounding rather than ordinary pressing.
    reason: lexical_alternative
  - marker: c
    text: “Continually” in tabernacle usage can denote regular ongoing maintenance rather than necessarily every moment without interruption; compare the priestly instructions in Exodus 27:21 and Leviticus 24:2–4.
    reason: cross_reference
