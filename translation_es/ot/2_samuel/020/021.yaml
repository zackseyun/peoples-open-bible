translation:
  language: es
  text: '“No es así. Más bien, un hombre de la región montañosa[a] de Efraín, Seba hijo de Bicri, de nombre, ha alzado su mano[b] contra el rey, contra David. Entréguenlo a él solo, y yo me retiraré de la ciudad.” Y la mujer dijo a Joab: “Mira, su cabeza te será arrojada por encima del muro.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: “de la región montañosa de Efraín”; tradicionalmente también puede traducirse “del monte de Efraín”.'
    reason: lexical_alternative
  - marker: b
    text: 'O, de forma más interpretativa: “se ha rebelado contra el rey, contra David”. El modismo hebreo es literalmente “ha alzado su mano”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לֹא כֵן הַדָּבָר
  english_pob_choice: That is not the matter
  chosen_spanish: Eso no es así
  alternatives_spanish:
  - No es así
  - Eso no es el asunto
  - La cosa no es así
  lexicon: HALOT
  rationale: La fórmula hebrea niega la afirmación previa de manera idiomática; en español, ‘Eso no es así’ comunica con naturalidad la corrección sin volverla rígida o demasiado literal.
- source_word: כִּי
  english_pob_choice: Rather
  chosen_spanish: Más bien
  alternatives_spanish:
  - pero
  - pues
  - sino
  lexicon: HALOT
  rationale: Aquí introduce una corrección explicativa/opositiva; ‘Más bien’ conserva bien ese giro correctivo en español actual.
- source_word: מֵהַר אֶפְרַיִם
  english_pob_choice: from the hill country of Ephraim
  chosen_spanish: de la región montañosa de Efraín
  alternatives_spanish:
  - del monte de Efraín
  - de la serranía de Efraín
  - de las montañas de Efraín
  lexicon: HALOT
  rationale: La expresión designa una región elevada, no necesariamente un monte único; ‘región montañosa’ evita el calco y mantiene el valor geográfico.
- source_word: שֶׁבַע בֶּן בִּכְרִי שְׁמוֹ
  english_pob_choice: Sheba son of Bichri by name
  chosen_spanish: Seba hijo de Bicri, por nombre
  alternatives_spanish:
  - llamado Seba hijo de Bicri
  - de nombre Seba hijo de Bicri
  - cuyo nombre es Seba hijo de Bicri
  lexicon: HALOT
  rationale: ‘Por nombre’ refleja la fórmula hebrea שְׁמוֹ con suficiente naturalidad, y ‘Seba’ es la adaptación estándar en español para el nombre propio.
- source_word: נָשָׂא יָדוֹ
  english_pob_choice: has raised his hand
  chosen_spanish: ha alzado su mano
  alternatives_spanish:
  - ha levantado su mano
  - se ha rebelado
  - ha alzado la mano
  lexicon: HALOT
  rationale: Conservo la imagen idiomática de la mano alzada, porque el texto hebreo la usa de forma concreta; el sentido de rebelión queda claro por el contexto sin borrarse la metáfora.
- source_word: בַּמֶּלֶךְ בְּדָוִד
  english_pob_choice: against the king, against David
  chosen_spanish: contra el rey, contra David
  alternatives_spanish:
  - contra el rey David
  - contra el rey, es decir, David
  lexicon: HALOT
  rationale: Repito ‘contra’ para reproducir la fuerza y la apposición del hebreo, manteniendo visible la doble referencia al rey y a David.
- source_word: תְּנוּ אֹתוֹ לְבַדּוֹ
  english_pob_choice: Hand him over alone
  chosen_spanish: Entréguenlo a él solo
  alternatives_spanish:
  - Entreguen solo a él
  - Denlo a él solo
  - Entréguenlo únicamente a él
  lexicon: HALOT
  rationale: ‘Entréguenlo’ es el equivalente idiomático natural de la orden de entregar/someter a una persona; ‘a él solo’ preserva לְבַדּוֹ sin suavizarlo.
- source_word: וְאֵלְכָה מֵעַל הָעִיר
  english_pob_choice: and I will withdraw from the city
  chosen_spanish: y yo me retiraré de la ciudad
  alternatives_spanish:
  - y me iré de la ciudad
  - y abandonaré la ciudad
  - y me apartaré de la ciudad
  lexicon: HALOT
  rationale: En contexto de asedio, el verbo expresa retirada/alejamiento militar; ‘me retiraré’ comunica ese matiz mejor que un simple ‘me iré’.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Mira, pues
  - Ve
  lexicon: HALOT
  rationale: ‘Mira’ expresa la exhortación enfática de manera natural en español y encaja con el discurso directo dirigido a Joab.
- source_word: רֹאשׁוֹ מֻשְׁלָךְ אֵלֶיךָ בְּעַד הַחוֹמָה
  english_pob_choice: his head will be thrown to you over the wall
  chosen_spanish: su cabeza será arrojada hacia ti por encima del muro
  alternatives_spanish:
  - su cabeza será lanzada hacia ti por encima del muro
  - su cabeza te será arrojada por encima del muro
  - su cabeza caerá sobre ti desde el muro
  lexicon: HALOT
  rationale: ‘Será arrojada’ conserva el pasivo del hebreo; ‘por encima del muro’ reproduce la escena del asedio sin añadir elementos no presentes en el texto.
theological_decisions:
- issue: Permanecer con la imagen idiomática de ‘alzar/levantar la mano’ en vez de explicitar solo ‘rebelarse’
  english_pob_reading: has raised his hand; alternative note allows ‘has rebelled against the king, against David’
  chosen_spanish_reading: ha alzado su mano
  alternative_spanish_readings:
  - se ha rebelado
  - ha levantado la mano
  rationale: El hebreo conserva una metáfora concreta de acción hostil; la traducción principal la mantiene, mientras el contexto político de traición deja claro el sentido. Así no se borra la tensión lexical entre imagen literal e implicación de rebelión.
  doctrine_reference: No aplica; decisión lexical/idiomática
- issue: Mantener la identidad del rey como ‘el rey, contra David’ en vez de compactar todo en un solo título
  english_pob_reading: against the king, against David
  chosen_spanish_reading: contra el rey, contra David
  alternative_spanish_readings:
  - contra el rey David
  - contra el rey, es decir, David
  rationale: La duplicación del hebreo muestra énfasis y apposición; conservarla en español evita perder la estructura retórica del texto fuente.
  doctrine_reference: No aplica; decisión estructural
- issue: Conservar el marco narrativo de asedio con ‘me retiraré de la ciudad’ y ‘por encima del muro’
  english_pob_reading: I will withdraw from the city; over the wall
  chosen_spanish_reading: me retiraré de la ciudad; por encima del muro
  alternative_spanish_readings:
  - me iré de la ciudad
  - sobre el muro
  rationale: La escena presupone un cerco militar; el español elegido preserva ese contexto sin introducir interpretación adicional.
  doctrine_reference: No aplica; decisión de contexto narrativo
translation_notes:
  revision_awareness: 'He tenido en cuenta el audit trail inglés: la revisión reciente solo ajustó ‘Hand over him alone’ a ‘Hand him over alone’, sin afectar el sentido. También mantengo la decisión revisada de conservar la imagen idiomática de ‘alzar la mano’ con el matiz contextual de rebelión/hostilidad implícito.'
  spanish_consistency_notes:
  - ‘Yahvé’ no aparece en este versículo.
  - He usado ‘Seba’ para el nombre propio de שֶׁבַע, conforme a uso español común y coherencia onomástica.
  - He preferido ‘región montañosa’ para מֵהַר, en continuidad con el valor geográfico señalado en el audit trail inglés.
  - He conservado la duplicación ‘contra el rey, contra David’ para reflejar la apposición y el énfasis del hebreo.
