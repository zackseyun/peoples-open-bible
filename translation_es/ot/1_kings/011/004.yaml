revisions:
- from: Y cuando Salomón era viejo[a], sus mujeres inclinaron su corazón tras otros dioses, y su corazón no estaba plenamente entregado a Yahvé su Dios, como el corazón de David su padre.
  to: Y cuando Salomón ya era anciano, sus mujeres desviaron su corazón tras otros dioses, y su corazón no estaba plenamente entregado[a] a Yahvé su Dios, como el corazón de David su padre.
  rationale: 'Se corrige el anclaje de la nota para que corresponda al término que realmente explica (שָׁלֵם), y se hacen dos mejoras menores de estilo y precisión: ''ya era anciano'' por naturalidad, y ''desviaron su corazón'' para expresar con mayor claridad el giro hacia otros dioses en este contexto.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:46:59Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido global del hebreo: vejez de Salomón, acción de sus esposas, seguimiento de otros dioses, y contraste con David. Sin embargo, ''inclinaron su corazón'' atenúa ligeramente el valor de הִטּוּ en contexto, donde ''desviaron'' suena más natural en español bíblico y comunica mejor el giro hacia la idolatría. Además, la nota al pie está anclada en ''viejo[a]'' aunque su contenido trata שָׁלֵם, por lo que el anclaje no corresponde al punto léxico relevante.'
  spanish_quality_summary: El texto es legible y digno, pero requiere un ajuste menor para mayor naturalidad y precisión. 'Sus mujeres' es comprensible, aunque 'sus esposas' sería más preciso; no es un error grave. 'Plenamente entregado a Yahvé' funciona bien y suena natural. El principal problema formal es la nota mal ubicada; además, 'viejo' puede sonar algo seco en español bíblico moderno, y 'ya era anciano' fluye mejor.
  glossary_alignment: Se respeta correctamente 'Yahvé' para יהוה. 'Otros dioses' preserva bien אֱלֹהִים אֲחֵרִים. 'Corazón' mantiene la antropología bíblica. La decisión sobre שָׁלֵם está dentro de lo permitido por el expediente inglés, aunque conviene anclar la nota en esa frase y no en 'viejo'.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en 'viejo[a]' pero explica שָׁלֵם ('entero'/'plenamente devoto').
    rationale: El marcador debe aparecer exactamente en la palabra o frase pertinente. Tal como está, induce a pensar que la nota comenta la vejez de Salomón, no el estado de su corazón.
  - severity: low
    issue: '''Inclinaron su corazón'' es posible, pero suena menos idiomático y menos claro que ''desviaron su corazón'' en este contexto de apostasía.'
    rationale: El hebreo describe que sus mujeres causaron un giro del corazón tras otros dioses. En español bíblico moderno, 'desviar el corazón' expresa mejor esa acción sin añadir demasiada interpretación.
  - severity: low
    issue: '''Cuando Salomón era viejo'' es comprensible, pero ''cuando Salomón ya era anciano'' suena más natural y digno en español general eclesial.'
    rationale: No cambia el sentido, pero mejora la fluidez y el registro.
  revised_spanish_text: Y cuando Salomón ya era anciano, sus mujeres desviaron su corazón tras otros dioses, y su corazón no estaba plenamente entregado[a] a Yahvé su Dios, como el corazón de David su padre.
  revised_footnotes:
  - marker: a
    text: 'O: «plenamente devoto». El hebreo dice literalmente que su corazón no estaba «entero» con Yahvé.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el anclaje de la nota para que corresponda al término que realmente explica (שָׁלֵם), y se hacen dos mejoras menores de estilo y precisión: ''ya era anciano'' por naturalidad, y ''desviaron su corazón'' para expresar con mayor claridad el giro hacia otros dioses en este contexto.'
