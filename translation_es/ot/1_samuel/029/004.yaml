translation:
  language: es
  text: 'Pero los jefes filisteos se enojaron con él, y los jefes filisteos le dijeron: «Devuelve al hombre, para que vuelva a su lugar donde lo asignaste, y que no baje con nosotros a la guerra, no sea que llegue a ser un adversario[a] para nosotros en la guerra. Porque ¿con qué podría este hombre reconciliarse[b] con su señor? ¿No sería con las cabezas de esos hombres?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo שָׂטָן aquí significa «adversario» u «oponente», no el nombre propio «Satanás».
    reason: lexical_alternative
  - marker: b
    text: 'O: «recobrar el favor de su señor». La expresión hebrea se refiere a hacerse aceptable de nuevo ante el superior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי פְלִשְׁתִּים
  english_pob_choice: the Philistine commanders
  chosen_spanish: los jefes filisteos
  alternatives_spanish:
  - los comandantes filisteos
  - los príncipes de los filisteos
  lexicon: HALOT
  rationale: En este contexto militar, שָׂרִים designa líderes o autoridades de guerra. «Jefes» es natural en español y conserva el valor de liderazgo sin el tinte más técnico o arcaico de «príncipes».
- source_word: וַיִּקְצְפוּ עָלָיו
  english_pob_choice: were angry with him
  chosen_spanish: se enojaron con él
  alternatives_spanish:
  - se enfurecieron con él
  - se indignaron contra él
  lexicon: HALOT
  rationale: קצף expresa enojo o ira. «Se enojaron con él» comunica bien la reacción y evita intensificar más de lo que exige el contexto.
- source_word: הָשֵׁב אֶת הָאִישׁ
  english_pob_choice: Send the man back
  chosen_spanish: Devuelve al hombre
  alternatives_spanish:
  - Manda de vuelta al hombre
  - Haz volver al hombre
  lexicon: HALOT
  rationale: 'El imperativo hifil de שוב tiene fuerza causativa: hacer que regrese. «Devuelve» es directo, idiomático y mantiene el mandato.'
- source_word: וְיָשֹׁב אֶל מְקוֹמוֹ
  english_pob_choice: so that he may return to his place
  chosen_spanish: para que vuelva a su lugar
  alternatives_spanish:
  - y que vuelva a su lugar
  - para que regrese a su lugar
  lexicon: HALOT
  rationale: La secuencia expresa el resultado deseado del mandato. «Para que vuelva» conserva la intención resultativa de modo claro y natural.
- source_word: אֲשֶׁר הִפְקַדְתּוֹ שָׁם
  english_pob_choice: where you assigned him
  chosen_spanish: donde lo has asignado
  alternatives_spanish:
  - donde lo has puesto
  - donde lo has puesto a cargo
  - donde lo has destinado
  lexicon: HALOT
  rationale: הפקיד puede significar asignar, encargar o poner en un puesto. «Asignado» sigue de cerca la decisión inglesa y funciona bien en español sin precisar indebidamente el tipo exacto de encargo.
- source_word: וְלֹא יֵרֵד עִמָּנוּ בַּמִּלְחָמָה
  english_pob_choice: and let him not go down with us into battle
  chosen_spanish: y que no baje con nosotros a la guerra
  alternatives_spanish:
  - y que no descienda con nosotros a la guerra
  - y que no vaya con nosotros a la batalla
  lexicon: HALOT
  rationale: Se conserva «baje» para reflejar ירד, que en este contexto es un giro narrativo convencional para emprender la campaña. «A la guerra» refleja con naturalidad בַּמִּלְחָמָה.
- source_word: וְלֹא יִהְיֶה לָּנוּ לְשָׂטָן
  english_pob_choice: lest he become an adversary to us
  chosen_spanish: no sea que llegue a ser un adversario para nosotros
  alternatives_spanish:
  - no sea que llegue a ser un enemigo para nosotros
  - y no sea para nosotros un adversario
  lexicon: HALOT
  rationale: 'שָׂטָן aquí es sustantivo común: adversario u oponente, no nombre propio. «Adversario» preserva la tensión lexical y evita importar una lectura posterior ajena al pasaje.'
- source_word: יִתְרַצֶּה זֶה אֶל אֲדֹנָיו
  english_pob_choice: could this man reconcile himself to his lord
  chosen_spanish: podría este hombre reconciliarse con su señor
  alternatives_spanish:
  - podría este hombre ganar el favor de su señor
  - podría este hombre hacerse aceptable a su señor
  lexicon: HALOT
  rationale: El hitpael de רצה expresa la idea de volver a ser aceptable o ganar favor. «Reconciliarse» conserva la reflexión verbal y deja visible la posibilidad de «ganar el favor» como matiz.
- source_word: אֲדֹנָיו
  english_pob_choice: his lord
  chosen_spanish: su señor
  alternatives_spanish:
  - su amo
  - su señor
  lexicon: HALOT
  rationale: En este relato el referente es la autoridad superior de David, no un dueño esclavista. «Señor» comunica mejor la relación política y jerárquica que «amo».
- source_word: בְּרָאשֵׁי הָאֲנָשִׁים הָהֵם
  english_pob_choice: with the heads of those men
  chosen_spanish: con las cabezas de esos hombres
  alternatives_spanish:
  - con la cabeza de esos hombres
  - por las cabezas de esos hombres
  lexicon: HALOT
  rationale: La frase hebrea es elíptica y apunta a obtener favor mediante la entrega de cabezas enemigas. «Con las cabezas» mantiene la cercanía al hebreo y sugiere esa omisión calculada.
theological_decisions:
- issue: Sentido de שָׂטָן en contexto narrativo
  english_pob_reading: common noun 'adversary'
  chosen_spanish_reading: adversario
  alternative_spanish_readings:
  - Satanás
  - enemigo
  rationale: El texto habla de oposición militar y política; no de un ser personal malvado. Traducirlo como «adversario» preserva la lectura común del sustantivo y evita una carga doctrinal no sustentada por el contexto.
  doctrine_reference: 'Translation philosophy: preserve plain sense of source text and avoid importing later doctrinal associations.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la decisión inglesa revisada, sin cambios necesarios según el pase más reciente: mantiene la lectura de שָׂטָן como sustantivo común y conserva la ambigüedad de יִתְרַצֶּה con una formulación española equivalente y auditable.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo contiene.
  - Se prefirió «jefes» para שָׂרִים en un contexto militar, coherente con el uso de «commanders» en la POB inglesa.
  - «Señor» se emplea para אֲדֹנָיו como relación jerárquica, no como traducción de יהוה.
  - Se mantuvo «adversario» para שָׂטָן, evitando capitalización y evitando la lectura como nombre propio.
