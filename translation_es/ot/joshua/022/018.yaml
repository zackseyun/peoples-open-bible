review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: acusación presente de apartarse de Yahvé, condición de rebelión, y consecuencia corporativa sobre toda la congregación de Israel. Mantiene correctamente Yahvé, ‘rebelan contra’, y ‘congregación’. Sin embargo, falta preservar dos elementos del rastro de auditoría inglés: la alternativa léxica de תָּשֻׁבוּ (‘volver atrás’/‘apartarse’) y la nota sobre el sujeto implícito de ‘se enojará’.'
  spanish_quality_summary: El español es claro y digno, pero ‘de seguir a Yahvé’ suena algo menos natural tras ‘apartando’; ‘de dejar de seguir a Yahvé’ sería demasiado parafrástico, así que conviene mantener la redacción principal y ajustar las notas. La nota actual ‘de seguir atrás de Yahvé’ es poco idiomática. También la nota b del borrador explica política del proyecto en vez de una ambigüedad o alternativa del versículo, lo que no corresponde bien al uso de notas del texto.
  glossary_alignment: Se alinea bien con la terminología del proyecto en ‘Yahvé’ y ‘congregación’. No hay conflicto teológico relevante. Conviene conservar en nota el modismo hebreo ‘de detrás de Yahvé’ y añadir la aclaración de que el sujeto de ‘se enojará’ está implícito en hebreo pero se entiende como Yahvé por el contexto.
  issues:
  - severity: medium
    issue: 'La nota [a] usa una alternativa española poco natural: ‘de seguir atrás de Yahvé’.'
    rationale: El inglés auditado conserva el modismo hebreo como alternativa (‘from after the LORD’), pero en español ‘seguir atrás de’ no suena natural. Debe reformularse como explicación literal del hebreo, no como alternativa principal idiomática.
  - severity: medium
    issue: La nota [b] actual no refleja una nota textual o léxica del versículo, sino una política editorial.
    rationale: Las notas deben servir al lector sobre el texto fuente, no justificar la política general del proyecto en este lugar.
  - severity: medium
    issue: Falta la nota sobre el sujeto implícito de יִקְצֹף.
    rationale: El POB inglés documenta que el hebreo dice simplemente ‘él se enojará’/‘estará airado’, con Yahvé como sujeto implícito por contexto. Esa decisión debe preservarse en la revisión española.
  revised_spanish_text: Y ustedes se están apartando hoy de seguir a Yahvé[a]; y si hoy se rebelan contra Yahvé, mañana él se enojará con toda la congregación de Israel[b].
  revised_footnotes:
  - marker: a
    text: O ‘se vuelven atrás hoy de seguir a Yahvé’. Literalmente, ‘de detrás de Yahvé’, un modismo hebreo que significa dejar de seguirlo con lealtad.
    reason: lexical_alternative
  - marker: b
    text: El hebreo simplemente dice ‘él se enojará’; por el contexto, el sujeto implícito es Yahvé.
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva el texto principal casi intacto porque es fiel y legible, pero corrige las notas para alinearlas con la evidencia fuente y el rastro POB: se reemplaza una nota editorial por notas léxicas/contextuales útiles, se mejora la explicación del modismo hebreo, y se añade la aclaración del sujeto implícito en ‘se enojará’.'
