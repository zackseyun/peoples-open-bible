translation:
  language: es
  text: Y se reunió todo el campamento, y subieron al monte Sión.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνήχθη
  english_pob_choice: assembled
  chosen_spanish: se reunió
  alternatives_spanish:
  - se juntó
  - fue reunido
  lexicon: BDAG
  rationale: 'El aoristo pasivo funciona aquí como acción colectiva: en español, ''se reunió'' comunica de manera natural que el grupo entero se congregó, sin perder el sentido de reunión conjunta que el inglés POB expresó con ''assembled''.'
- source_word: ἡ παρεμβολὴ πᾶσα
  english_pob_choice: the whole camp
  chosen_spanish: todo el campamento
  alternatives_spanish:
  - todo el ejército acampado
  - todo el campamento militar
  lexicon: LSJ
  rationale: παρεμβολή puede significar campamento o encampamiento militar; en este contexto macabeo, 'campamento' es fiel y natural en español. 'Todo' conserva el valor de πᾶσα como totalidad.
- source_word: ἀνέβησαν
  english_pob_choice: they went up
  chosen_spanish: subieron
  alternatives_spanish:
  - ascendieron
  - marcharon hacia arriba
  lexicon: BDAG
  rationale: '''Subieron'' preserva el movimiento ascendente y el idioma bíblico normal en español, sin añadir la idea de marcha militar que el griego no exige de forma explícita.'
- source_word: εἰς ὄρος Σιών
  english_pob_choice: to Mount Zion
  chosen_spanish: al monte Sión
  alternatives_spanish:
  - al monte de Sión
  - hacia el monte Sión
  lexicon: LSJ
  rationale: '''Monte Sión'' es la forma bíblica consolidada y clara en español. ''Al'' refleja bien εἰς con dirección de movimiento, y ''Sión'' mantiene el nombre propio.'
translation_notes:
  revision_awareness: El texto griego y el registro inglés coinciden de manera alta; no se detectaron revisiones aplicadas ni tensiones lexicográficas que requirieran notas.
  spanish_consistency_notes:
  - Se mantuvo una sintaxis breve y paralela al griego, en línea con el inglés POB.
  - '''Campamento'' se eligió por su neutralidad y fuerza militar implícita, evitando un calco más pesado.'
  - No se usó 'SEÑOR' ni terminología teológica ajena, porque el versículo no contiene nombres divinos ni títulos cristológicos.
