translation:
  language: es
  text: por cuya causa también nuestro padre Abraham se apresuró a degollar a Isaac[a], su hijo, el antecesor de la nación, y, al ver la mano ancestral[b] que llevaba la espada descendiendo sobre él, no retrocedió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «matar a Isaac» / «dar muerte a Isaac». El verbo griego σφαγιάσαι es más gráfico y violento que un simple «matar» y no debe suavizarse a «sacrificar».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la mano paterna» / «la mano de su padre». El adjetivo πατρῷος puede significar ancestral o heredado de los padres.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διʼ ὃν
  english_pob_choice: for whose sake
  chosen_spanish: por cuya causa
  alternatives_spanish:
  - por quien
  - por cuyo motivo
  lexicon: LSJ
  rationale: La construcción expresa motivo o causa en relación con un referente anterior del contexto. «Por cuya causa» conserva esa dependencia discursiva sin sobreespecificar el antecedente.
- source_word: ἔσπευδεν
  english_pob_choice: hurried
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - se apresuró con prontitud
  lexicon: LSJ
  rationale: El verbo denota rapidez o premura; «se apresuró» es natural en español y mantiene el impulso dramático del griego.
- source_word: σφαγιάσαι
  english_pob_choice: to slaughter
  chosen_spanish: inmolar
  alternatives_spanish:
  - degollar
  - sacrificar
  - matar
  lexicon: LSJ
  rationale: El griego es gráfico y violento. «Inmolar» comunica la acción sacrificial con fuerza, sin suavizarla excesivamente ni convertirla en una frase genérica.
- source_word: τὸν ἐθνοπάτορα υἱόν
  english_pob_choice: his son, the ancestor of the nation
  chosen_spanish: su hijo, el antecesor de la nación
  alternatives_spanish:
  - su hijo, progenitor de la nación
  - su hijo, el padre de la nación
  - su hijo, quien llegaría a ser padre de la nación
  lexicon: LSJ
  rationale: ἐθνοπάτωρ apunta a antecesor/progenitor de un pueblo. En español, «antecesor de la nación» preserva el valor genealógico sin imponer una paráfrasis más amplia que el sintagma griego.
- source_word: πατρῴαν χεῖρα
  english_pob_choice: the ancestral hand
  chosen_spanish: la mano ancestral
  alternatives_spanish:
  - la mano paterna
  - la mano de sus padres
  lexicon: LSJ
  rationale: πατρῷος significa heredado de los padres/ancestros. «La mano ancestral» mantiene la elevación retórica y la referencia a la línea paterna.
- source_word: ξιφηφόρον
  english_pob_choice: bearing the sword
  chosen_spanish: que llevaba la espada
  alternatives_spanish:
  - espada en mano
  - portadora de espada
  lexicon: LSJ
  rationale: El adjetivo describe la mano como armada con espada. «Que llevaba la espada» suena natural en español y conserva la imaginería activa.
- source_word: καταφερομένην ἐπʼ αὐτόν
  english_pob_choice: descending upon him
  chosen_spanish: descendiendo sobre él
  alternatives_spanish:
  - bajando sobre él
  - lanzándose sobre él
  lexicon: LSJ
  rationale: La imagen es de movimiento hacia abajo sobre Isaac. «Descendiendo sobre él» reproduce bien el gesto visual del participio.
- source_word: οὐκ ἔπτηξεν
  english_pob_choice: did not shrink back
  chosen_spanish: no retrocedió
  alternatives_spanish:
  - no se echó atrás
  - no flaqueó
  - no se acobardó
  lexicon: LSJ
  rationale: El verbo puede expresar encogerse, flaquear o retroceder por temor. «No retrocedió» conserva la idea de resistencia sin añadir una emoción específica que el contexto no exige.
theological_decisions:
- issue: Cómo traducir la referencia a Abraham e Isaac sin suavizar la violencia del verbo griego
  english_pob_reading: Retain the graphic wording 'hurried to slaughter Isaac' rather than softening to 'prepared to offer Isaac'
  chosen_spanish_reading: Conservar un verbo fuerte («inmolar») en lugar de suavizar a «ofrecer» o «preparar»
  alternative_spanish_readings:
  - se apresuró a ofrecer a Isaac
  - se apresuró a preparar a Isaac
  rationale: El pasaje resalta el carácter intenso y ejemplar de la acción. Una traducción más suave perdería la fuerza retórica del griego y del rastro auditado en inglés.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Alcance de διʼ ὃν
  english_pob_reading: Translate generically as 'for whose sake' without specifying the antecedent in the English text
  chosen_spanish_reading: Mantener una referencia abierta con «por cuya causa»
  alternative_spanish_readings:
  - porque él
  - por quien
  rationale: El antecedente depende del contexto previo; resolverlo dentro del verso introduciría más precisión de la que el griego da aquí.
  doctrine_reference: Translation philosophy §3
- issue: Valor de ἐθνοπάτωρ
  english_pob_reading: '''ancestor of the nation'' / note that the compound denotes an ancestor or progenitor of a people'
  chosen_spanish_reading: «antecesor de la nación»
  alternative_spanish_readings:
  - progenitor de la nación
  - padre de la nación
  rationale: La expresión debe conservar la dimensión genealógica y colectiva sin reemplazarla por una fórmula eclesiástica o devocional ajena al griego.
  doctrine_reference: Lexical note on ἐθνοπάτωρ
translation_notes:
  revision_awareness: Se ha seguido el estado de revisión más reciente, que indica que no hubo cambios necesarios tras la última pasada; por eso esta propuesta conserva la lectura estable del dossier inglés y ajusta solo la formulación española para que sea natural y fiel al griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por defecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «inmolar» para conservar la intensidad sacrificial de σφαγιάσαι sin convertirla en una paráfrasis litúrgica.
  - «Antecesor de la nación» traduce ἐθνοπάτωρ con un registro comprensible y genealógico.
  - «No retrocedió» conserva el valor de resistencia de οὐκ ἔπτηξεν sin añadir una emoción explícita.
