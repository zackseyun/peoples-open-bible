review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional del hebreo, conserva los giros pactales clave (''escuchar'', ''andar en mis caminos'', ''guardar mis estatutos y mis mandamientos'') y mantiene correctamente ''casa'' para el sentido dinástico de בַיִת נֶאֱמָן. También preserva la promesa final ''te daré a Israel''. Sin embargo, falla en un punto importante de alineación con el propio expediente POB: עַבְדִּי en este contexto fue documentado como designación honorífica de David y debe rendirse como ''mi siervo'' o ''mi servidor'', no ''mi esclavo''.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'Y sucederá que' suena algo calcado; 'Y sucederá que, si...' es tolerable aunque menos natural que 'Y sucederá que, si...' ya dado. La mayor dificultad de legibilidad está en 'David, mi esclavo', que en español eclesial moderno suena innecesariamente degradante y choca con el registro reverente del pasaje. 'Casa fiel' es aceptable si se apoya con nota explicativa sobre la dinastía duradera.
  glossary_alignment: Buena alineación general con la terminología del proyecto en este versículo, excepto por la decisión sobre עבד. La política por defecto sobre 'slave/esclavo' no debe imponerse mecánicamente aquí porque el expediente inglés ya documentó una excepción contextual honorífica para David ('my servant'). Por eso corresponde 'mi siervo' en español. No hay otros choques relevantes con el glosario del proyecto.
  issues:
  - severity: high
    issue: '''mi esclavo'' para עַבְדִּי contradice la decisión léxica y teológica auditada del POB'
    rationale: El expediente inglés explica explícitamente que aquí עבד funciona como designación honorífica de David en servicio pactual a Dios, y por eso eligió 'my servant'. En español, 'mi esclavo' introduce una dureza social ajena al énfasis del contexto y no preserva la racionalidad documentada.
  - severity: low
    issue: La nota al pie para 'casa fiel' repite el texto principal como alternativa
    rationale: Si el texto principal ya dice 'una casa fiel', la nota no debería ofrecer exactamente la misma forma como alternativa. Conviene listar solo alternativas reales ('casa segura', 'casa duradera') y aclarar el sentido dinástico.
  revised_spanish_text: Y sucederá que, si escuchas todo lo que yo te mande, y andas en mis caminos, y haces lo recto ante mis ojos, guardando mis estatutos y mis mandamientos, como hizo David, mi siervo, yo estaré contigo y te edificaré una casa fiel[a], como edifiqué para David, y te daré a Israel.
  revised_footnotes:
  - marker: a
    text: 'O: «una casa segura» o «una casa duradera»; es decir, una dinastía permanente.'
    reason: lexical_alternative
  revision_rationale: Se corrige 'mi esclavo' a 'mi siervo' para ajustarse al sentido honorífico contextual de עַבְדִּי documentado por el POB y para mantener un español bíblico natural y digno. Se conserva 'casa fiel' con nota léxica depurada, ya que el expediente inglés revisado prefirió 'faithful house' mientras aclaró el sentido dinástico permanente. No se requieren más cambios.
