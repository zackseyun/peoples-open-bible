translation:
  language: es
  text: 'Pero los príncipes de los amonitas dijeron a Hanún: «¿Acaso David está honrando a tu padre a tus ojos[a] porque te ha enviado consoladores? ¿No han venido sus siervos a ti para escudriñar, para derrocar[b] y para espiar la tierra?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tu opinión». El hebraísmo literalmente dice «en tus ojos» y se refiere a la percepción o al juicio de Hanún.
    reason: lexical_alternative
  - marker: b
    text: O «voltear» o «trastornar». El verbo hebreo puede significar dar vuelta o voltear; aquí probablemente tiene el sentido de subversión hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - oficiales
  - jefes
  lexicon: HALOT
  rationale: שָׂרִים designa altos funcionarios o gobernantes; «príncipes» conserva el rango cortesano y la relación con una escena política de consejo.
- source_word: בְנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los ammonitas
  alternatives_spanish:
  - los hijos de Amón
  - los amonitas
  lexicon: HALOT
  rationale: La expresión hebrea es étnico-política; «ammonitas» es natural en español bíblico y evita una traducción demasiado literal de «hijos de Amón».
- source_word: הַמְכַבֵּד
  english_pob_choice: honoring
  chosen_spanish: honrando
  alternatives_spanish:
  - mostrando honor a
  - glorificando
  lexicon: HALOT
  rationale: כבד aquí tiene el sentido de tratar con honor. «Honrando» conserva la acusación de aparente respeto sin introducir una interpretación más fuerte.
- source_word: בְּעֵינֶיךָ
  english_pob_choice: in your sight
  chosen_spanish: a tus ojos
  alternatives_spanish:
  - en tu opinión
  - a tu parecer
  lexicon: HALOT
  rationale: El hebraísmo literalmente dice «en tus ojos» y señala percepción o juicio de Hanún; por eso se mantiene la imagen con una nota explicativa.
- source_word: מְנַחֲמִים
  english_pob_choice: comforters
  chosen_spanish: consoladores
  alternatives_spanish:
  - quienes consuelan
  - consuelo
  lexicon: HALOT
  rationale: El participio de נחם refiere a enviados de duelo o consuelo. «Consoladores» corresponde bien al contexto de condolencia por la muerte del padre.
- source_word: לַחְקֹר
  english_pob_choice: to search out
  chosen_spanish: escudriñar
  alternatives_spanish:
  - investigar
  - buscar
  lexicon: HALOT
  rationale: חקר implica examinar o buscar a fondo; «escudriñar» transmite el examen minucioso y encaja con la secuencia de espionaje sin perder solemnidad.
- source_word: וְלַהֲפֹךְ
  english_pob_choice: to overthrow
  chosen_spanish: derrocar
  alternatives_spanish:
  - voltear
  - trastornar
  lexicon: HALOT
  rationale: En este contexto político-militar, הפך no se reduce a «voltear» físicamente; «derrocar» comunica mejor la subversión hostil sugerida por los consejeros.
- source_word: וּלְרַגֵּל
  english_pob_choice: to spy out
  chosen_spanish: espiar
  alternatives_spanish:
  - reconocer
  - vigilar
  lexicon: HALOT
  rationale: רגל en piel se refiere a espionaje o reconocimiento. «Espiar» es claro y reproduce la intención de inteligencia clandestina.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el territorio
  - el país
  lexicon: HALOT
  rationale: אֶרֶץ puede referirse al territorio; «la tierra» es una equivalencia bíblica natural y mantiene la amplitud del sustantivo.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus servidores
  - sus hombres
  lexicon: HALOT
  rationale: עֶבֶד puede traducirse como servidor o siervo. Aquí se conserva «siervos» para mantener el registro bíblico y la relación de dependencia sin especificar cargo diplomático.
theological_decisions:
- issue: La frase idiomática «בְּעֵינֶיךָ» puede sonar antropomórfica si se traduce literalmente; además, la sintaxis puede interpretarse como juicio subjetivo, no como visión física.
  english_pob_reading: “in your sight” with a footnote noting the idiom may mean “in your eyes.”
  chosen_spanish_reading: «a tus ojos» con nota que explica que el hebraísmo alude a la percepción o juicio de Hanún.
  alternative_spanish_readings:
  - en tu opinión
  - a tu parecer
  rationale: Se conserva la metáfora hebrea en el texto principal para ser auditable, y la nota aclara su sentido perceptivo. Esto evita borrar la tensión entre forma idiomática y sentido contextual.
  doctrine_reference: Lenguaje figurado e idiomático del hebreo bíblico
- issue: El verbo וְלַהֲפֹךְ puede significar «voltear/voltear al revés» literalmente, pero el contexto militar sugiere hostilidad política.
  english_pob_reading: “to overthrow,” with a note that the Hebrew can mean “to overturn” and likely implies hostile subversion.
  chosen_spanish_reading: «derrocar» en el texto principal.
  alternative_spanish_readings:
  - voltear
  - trastornar
  - derrocar
  rationale: «Derrocar» comunica mejor la intención subversiva que el contexto exige, sin ocultar la polisemia original. La alternativa más literal se preserva en la nota.
  doctrine_reference: Semántica verbal contextual
- issue: הַמְכַבֵּד expresa honor aparente hacia el padre de Hanún, no necesariamente sinceridad.
  english_pob_reading: “honoring your father in your sight”
  chosen_spanish_reading: «honrando a tu padre a tus ojos»
  alternative_spanish_readings:
  - mostrando honor a tu padre
  - glorificando a tu padre
  rationale: La formulación conserva la ambigüedad entre honor real y aparente, que es parte de la acusación de los consejeros. No se moraliza ni se suaviza el motivo.
  doctrine_reference: Narrativa histórica bíblica y discurso indirecto
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que afinó לַחְקֹר como «search out»; en español se optó por «escudriñar» para reflejar un examen minucioso y natural. También se mantuvo la lectura hostil de וְלַהֲפֹךְ como «derrocar», coherente con la revisión inglesa y con el contexto político del versículo.
  spanish_consistency_notes:
  - Se conserva «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se usó «siervos» para עֲבָדָיו, en línea con el valor relacional y no meramente funcional del término.
  - Se mantuvo el orden retórico de la pregunta en español para reflejar la acusación escalonada del hebreo.
  - Las notas a y b distinguen dos ángulos del mismo hebraísmo para no perder la tensión semántica.
