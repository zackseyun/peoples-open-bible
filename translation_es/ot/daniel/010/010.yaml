translation:
  language: es
  text: Y he aquí, una mano me tocó y me hizo ponerme sobre mis rodillas y las palmas de mis manos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y de pronto
  lexicon: HALOT
  rationale: Conserva el valor discursivo de atención repentina y solemne. «He aquí» es natural en español bíblico sin caer en arcaísmo excesivo, y «Y» mantiene la conexión narrativa del hebreo.
- source_word: יָד
  english_pob_choice: a hand
  chosen_spanish: una mano
  alternatives_spanish:
  - la mano
  lexicon: HALOT
  rationale: El hebreo no lleva artículo; por eso «una mano» refleja mejor el indefinido y preserva la sorpresa narrativa sobre la identidad de la mano.
- source_word: נָגְעָה בִּי
  english_pob_choice: touched me
  chosen_spanish: me tocó
  alternatives_spanish:
  - me alcanzó
  - me rozó
  lexicon: HALOT
  rationale: נגע expresa contacto físico directo. «Me tocó» es la equivalencia más transparente y natural en español.
- source_word: וַתְּנִיעֵנִי
  english_pob_choice: set me on my knees
  chosen_spanish: me puso sobre mis rodillas
  alternatives_spanish:
  - me movió
  - me hizo tambalear
  lexicon: HALOT
  rationale: La revisión inglesa descartó «trembling» y dejó la idea de ser colocado en una postura de arrodillamiento. El hebreo puede implicar hacer mover o desplazar; en este contexto, «me puso sobre mis rodillas» comunica el resultado corporal descrito sin añadir un matiz no sustentado.
- source_word: עַל בִּרְכַּי
  english_pob_choice: on my knees
  chosen_spanish: sobre mis rodillas
  alternatives_spanish:
  - en mis rodillas
  - de rodillas
  lexicon: HALOT
  rationale: La preposición עַל señala posición resultante sobre las rodillas. «Sobre mis rodillas» conserva la imagen corporal literal del texto.
- source_word: וְכַפּוֹת יָדַי
  english_pob_choice: and the palms of my hands
  chosen_spanish: y las palmas de mis manos
  alternatives_spanish:
  - y mis manos
  - y las plantas de mis manos
  lexicon: HALOT
  rationale: כפות ידיים designa específicamente las palmas, no solo «manos». «Palmas de mis manos» preserva con precisión la imagen física y evita perder el detalle anatómico.
translation_notes:
  revision_awareness: La versión inglesa pasó de «set me trembling» a «set me on my knees», descartando un matiz no suficientemente sustentado. La propuesta española sigue esa revisión y evita introducir «temblor» o «estremecimiento», manteniéndose fiel al resultado corporal explícito del hebreo.
  spanish_consistency_notes:
  - Se usa «Y he aquí» para mantener el arranque enfático del hebreo con español bíblico claro.
  - Se evita «SEÑOR» u otra adaptación teológica porque el versículo no contiene el nombre divino ni un título que requiera decisión doctrinal.
  - «Palmas de mis manos» conserva el complemento anatómico completo y es coherente con el nivel de precisión del inglés auditado.
