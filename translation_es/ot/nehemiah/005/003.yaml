translation:
  language: es
  text: 'Y había otros que decían: «Estamos empeñando nuestros campos, nuestras viñas y nuestras casas[a] para conseguir grano durante el hambre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estamos dando en prenda nuestros campos, nuestras viñas y nuestras casas». El hebreo usa un verbo que refiere a dar la propiedad como garantía por una deuda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵשׁ אֲשֶׁר אֹמְרִים
  english_pob_choice: And there were others who said
  chosen_spanish: Y había otros que decían
  alternatives_spanish:
  - Y había algunos que decían
  - Y había quienes decían
  lexicon: HALOT
  rationale: La construcción introduce otro grupo dentro de la serie de quejas. «Había otros que decían» conserva esa función discursiva de añadir hablantes adicionales con naturalidad en español.
- source_word: שְׂדֹתֵינוּ וּכְרָמֵינוּ וּבָתֵּינוּ
  english_pob_choice: our fields, our vineyards, and our houses
  chosen_spanish: nuestros campos, nuestras viñas y nuestras casas
  alternatives_spanish:
  - nuestras tierras, nuestras viñas y nuestras casas
  - nuestros campos, nuestros viñedos y nuestras casas
  lexicon: HALOT
  rationale: «Campos» corresponde bien a שָׂדוֹת; «viñas» reproduce directamente el término para los cultivos de vid, y «casas» mantiene la concreción del hebreo sin diluirse en «hogares».
- source_word: אֲנַחְנוּ עֹרְבִים
  english_pob_choice: We are mortgaging
  chosen_spanish: Estamos empeñando
  alternatives_spanish:
  - Estamos hipotecando
  - Estamos dando en prenda
  lexicon: HALOT
  rationale: El verbo refiere a poner la propiedad como garantía por deuda. En español, «empeñar» comunica con claridad esa idea de entregar bienes como seguridad, sin exigir un marco jurídico moderno más específico que el hebreo.
- source_word: וְנִקְחָה
  english_pob_choice: to get
  chosen_spanish: para conseguir
  alternatives_spanish:
  - para obtener
  - y tomar
  lexicon: HALOT
  rationale: 'La forma expresa finalidad o resultado: hipotecan/empeñan sus bienes con el propósito de conseguir grano. «Conseguir» es idiomático y mantiene el sentido práctico del verbo sin añadir una idea de compra que el hebreo no explicita.'
- source_word: דָגָן
  english_pob_choice: grain
  chosen_spanish: grano
  alternatives_spanish:
  - grano cereal
  - trigo
  lexicon: HALOT
  rationale: «Grano» es el equivalente más natural y preciso en español general para דָגָן; no limita indebidamente la clase de cereal y conserva la amplitud del término.
- source_word: בָּרָעָב
  english_pob_choice: during the famine
  chosen_spanish: en el tiempo de hambre
  alternatives_spanish:
  - durante el hambre
  - en la hambruna
  lexicon: HALOT
  rationale: La expresión hebrea marca circunstancia. «En el tiempo de hambre» es una formulación pública y clara en español, fiel al marco temporal/situacional del texto sin sobredeterminar la causa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó «so that we may» para dar un giro más directo y natural. Por eso la cláusula española usa «para conseguir» sin ampliar el sentido. También se preservó la decisión léxica de POB de expresar el valor económico de עֹרְבִים como una garantía sobre la propiedad.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones no pertinentes; el versículo no contiene el nombre divino.
  - «Grano» mantiene la neutralidad semántica de דָגָן y es consistente con el registro bíblico en español.
  - '«Empeñando» conserva la tensión económica del original y del inglés POB: no es una mera promesa verbal, sino una garantía real sobre bienes.'
  - La nota [a] está anclada en la palabra «casas[a]» para corresponder al valor alternativo del verbo hebreo.
