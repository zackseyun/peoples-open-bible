translation:
  language: es
  text: Y ofrecerá una de las tórtolas o uno de los pichones,[a] según lo que pueda costear—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'de lo que alcanza su mano', un modismo hebreo que significa según lo que puede costear.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשָׂה
  english_pob_choice: And he shall offer
  chosen_spanish: Y ofrecerá
  alternatives_spanish:
  - Y hará
  - Y realizará
  lexicon: HALOT
  rationale: En contexto sacrificial, עשה no se vierte de forma mecánica como 'hacer', sino como la acción cultual de presentar una ofrenda. 'Ofrecerá' comunica ese sentido con naturalidad en español y sigue la decisión auditada del POB en inglés.
- source_word: אֶת־הָאֶחָד
  english_pob_choice: one
  chosen_spanish: uno de
  alternatives_spanish:
  - el uno de
  - uno
  lexicon: HALOT
  rationale: La construcción hebrea introduce una elección entre dos animales. En español, 'uno de' transmite mejor la selección distributiva sin forzar un artículo innecesario.
- source_word: מִן־הַתֹּרִים
  english_pob_choice: of the turtledoves
  chosen_spanish: de los tórtolos
  alternatives_spanish:
  - de las tórtolas
  - de las palomas torcaces
  lexicon: HALOT
  rationale: תֹּרִים designa el ave de sacrificio específica, usualmente tórtolos o tórtolas silvestres según el contexto. Se eligió 'tórtolos' para mantener el término sacrificial más preciso y evitar una generalización como 'palomas'.
- source_word: אוֹ מִן־בְּנֵי הַיּוֹנָה
  english_pob_choice: or one of the young pigeons
  chosen_spanish: o uno de los pichones
  alternatives_spanish:
  - o uno de los polluelos de paloma
  - o uno de los pichones de paloma
  lexicon: HALOT
  rationale: בְּנֵי הַיּוֹנָה es el giro idiomático para aves jóvenes de la paloma. 'Pichones' expresa bien la juventud del ave en español y evita una perífrasis demasiado pesada.
- source_word: מֵאֲשֶׁר תַּשִּׂיג יָדוֹ
  english_pob_choice: according to what his means can afford
  chosen_spanish: según lo que alcance su mano
  alternatives_spanish:
  - conforme a lo que pueda permitirle su mano
  - según sus medios
  lexicon: HALOT
  rationale: La frase hebrea es literalmente 'de lo que alcanza su mano', un modismo económico. Se conserva la imagen corporal de 'su mano' porque es parte del valor fuente, mientras que 'según lo que alcance' comunica de forma idiomática la capacidad económica.
theological_decisions:
- issue: La metáfora hebrea de la capacidad económica frente a una paráfrasis explícita
  english_pob_reading: according to what his means can afford
  chosen_spanish_reading: según lo que alcance su mano
  alternative_spanish_readings:
  - según sus medios
  - de acuerdo con lo que pueda pagar
  rationale: El inglés POB ya identifica el modismo como capacidad económica, pero mantiene la imagen de 'hand'. El español puede conservar esa metáfora sin perder inteligibilidad. Así se preserva la tensión entre literalidad y sentido idiomático, en lugar de reemplazarla por una formulación totalmente abstracta.
  doctrine_reference: Lectura lexical e idiomática del hebreo; no implica una cuestión doctrinal específica.
translation_notes:
  revision_awareness: La base inglesa fue revisada de 'from what his means can afford' a 'according to what his means can afford' para mayor naturalidad; la versión española sigue ese ajuste con 'según lo que alcance su mano', que preserva tanto el sentido como la imagen del hebreo.
  spanish_consistency_notes:
  - Se mantuvo el registro culto pero claro, apto para lectura pública.
  - Se conservó el valor sacrificial específico de los términos aviares en lugar de generalizarlos como 'aves' o 'palomas'.
  - Se prefirió la imagen hebrea de la 'mano' en la nota para no borrar el modismo original.
  - La puntuación con raya final reproduce el cierre abierto del inglés auditado.
