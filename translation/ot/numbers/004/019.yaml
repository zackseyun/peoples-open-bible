theological_decisions:
- issue: Referent of קֹדֶשׁ הַקֳּדָשִׁים
  chosen_reading: Rendered as 'the most holy things' rather than a spatial 'Holy of Holies.'
  alternative_readings:
  - the Holy of Holies
  - the most holy place
  rationale: The immediate context concerns Kohathite handling and transport of sacred objects after priestly covering, so the phrase is best taken collectively of the holiest items rather than the inner room itself. This avoids importing a narrower spatial sense not demanded by the verse.
  doctrine_reference: Translation philosophy §1, §5
- issue: Gender rendering of אִישׁ אִישׁ
  chosen_reading: Rendered 'each man.'
  alternative_readings:
  - each one
  - each person
  rationale: The referents are male Levites in a priestly service context, so the masculine should be preserved rather than neutralized.
  doctrine_reference: Translation philosophy §4
