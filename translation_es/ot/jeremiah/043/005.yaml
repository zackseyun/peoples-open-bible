translation:
  language: es
  text: Entonces Johanán, hijo de Carea, y todos los jefes de las fuerzas, tomaron a todo el remanente de Judá, que había regresado de todas las naciones donde habían sido expulsados[a], para residir[b] en la tierra de Judá—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «donde habían sido dispersados». El verbo hebreo puede denotar ser expulsados, desterrados o dispersados.
    reason: lexical_alternative
  - marker: b
    text: O «para sojornar». El hebreo לָגוּר suele implicar residir como forastero o residente dependiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: Then ... took
  chosen_spanish: Entonces ... tomaron
  alternatives_spanish:
  - Y ... tomaron
  - Luego ... tomaron
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia narrativa natural en español y mantiene el valor de acción consecutiva de לקח.
- source_word: יוֹחָנָן בֶּן־קָרֵחַ
  english_pob_choice: Johanan son of Kareah
  chosen_spanish: Johanán, hijo de Carea
  alternatives_spanish:
  - Johanan, hijo de Carea
  - Juanan, hijo de Carea
  lexicon: Convención de transliteración bíblica
  rationale: Se translitera el nombre con forma bíblica usual en español. «Hijo de» conserva el patronímico hebreo sin introducir una formulación eclesiástica ajena al texto.
- source_word: שָׂרֵי הַחֲיָלִים
  english_pob_choice: the commanders of the forces
  chosen_spanish: los jefes de las fuerzas
  alternatives_spanish:
  - los comandantes de las fuerzas
  - los capitanes de las tropas
  lexicon: HALOT
  rationale: שָׂרִים designa jefes o comandantes; חֲיָלִים en plural aquí apunta a fuerzas militares. «Jefes de las fuerzas» es claro, natural y mantiene el peso militar sin sonar arcaico.
- source_word: כָּל שְׁאֵרִית יְהוּדָה
  english_pob_choice: all the remnant of Judah
  chosen_spanish: todo el remanente de Judá
  alternatives_spanish:
  - todo el resto de Judá
  - todos los sobrevivientes de Judá
  lexicon: HALOT
  rationale: «Remanente» preserva el valor léxico y teológico frecuente en Jeremías. «Todo el remanente» refleja tanto la totalidad como la noción de un grupo reducido conservado.
- source_word: אֲשֶׁר שָׁבוּ
  english_pob_choice: who had returned
  chosen_spanish: que había regresado
  alternatives_spanish:
  - que regresaron
  - que habían vuelto
  lexicon: HALOT
  rationale: El pluscuamperfecto español expresa que el regreso fue anterior a la acción principal. «Regresado» conserva mejor la referencia de retorno que una simple «vuelta».
- source_word: מִכָּל הַגּוֹיִם
  english_pob_choice: from all the nations
  chosen_spanish: de entre todas las naciones
  alternatives_spanish:
  - de todas las naciones
  - de entre los pueblos
  lexicon: HALOT
  rationale: La preposición compuesta comunica mejor el matiz de procedencia desde el interior de un conjunto disperso. «Naciones» conserva el referente de gentes extranjeras del contexto.
- source_word: אֲשֶׁר נִדְּחוּ שָׁם
  english_pob_choice: where they had been driven away
  chosen_spanish: adonde había sido dispersado
  alternatives_spanish:
  - donde habían sido expulsados
  - donde habían sido echados
  lexicon: HALOT
  rationale: נִדְּחוּ puede abarcar expulsión, dispersión o destierro. Se eligió «dispersado» para mantener la amplitud semántica; la nota recoge la alternativa «expulsados/echados» si se quisiera enfatizar el impulso forzado.
- source_word: לָגוּר
  english_pob_choice: to sojourn
  chosen_spanish: para habitar
  alternatives_spanish:
  - para morar
  - para residir como forasteros
  lexicon: HALOT
  rationale: Aunque לָגוּר suele implicar «sojornar», aquí el destino es la tierra de Judá, por lo que «habitar» comunica el propósito de residencia sin forzar una connotación técnica que podría sonar extraña en español.
- source_word: בְּאֶרֶץ יְהוּדָה
  english_pob_choice: in the land of Judah
  chosen_spanish: en la tierra de Judá
  alternatives_spanish:
  - en el país de Judá
  - en la tierra de Judea
  lexicon: HALOT
  rationale: «Tierra de Judá» reproduce la designación territorial hebrea. «Tierra» es más bíblico y fiel al sustantivo אֶרֶץ que «país».
theological_decisions:
- issue: שְׁאֵרִית יְהוּדָה como término de remanente con carga teológica
  english_pob_reading: all the remnant of Judah
  chosen_spanish_reading: todo el remanente de Judá
  alternative_spanish_readings:
  - todo el resto de Judá
  - todos los sobrevivientes de Judá
  rationale: Se preserva «remanente» porque en Jeremías no es solo una referencia cuantitativa; mantiene la resonancia histórica y teológica del grupo preservado tras juicio y dispersión.
  doctrine_reference: Tema del remanente en Jeremías; cf. Jeremías 23:3; 31:7
- issue: לָגוּר como residencia temporal/dependiente versus mero habitar
  english_pob_reading: to sojourn in the land of Judah
  chosen_spanish_reading: para habitar en la tierra de Judá
  alternative_spanish_readings:
  - para sojornar en la tierra de Judá
  - para residir en la tierra de Judá
  rationale: El POB inglés conservó «sojourn» por su matiz de residencia no plenamente establecida. En español, «habitar» es el equivalente más natural sin perder el valor de propósito; la ambigüedad de residencia temporal se reconoce en la alternativa «residir».
  doctrine_reference: Uso lexical de גור en contextos de residencia provisional; cf. Génesis 47:4
- issue: נִדְּחוּ con matiz de dispersión forzada
  english_pob_reading: driven away
  chosen_spanish_reading: dispersado
  alternative_spanish_readings:
  - expulsado
  - echado lejos
  rationale: El verbo hebreo puede abarcar expulsión, dispersión o destierro. «Dispersado» mantiene amplitud semántica y evita cerrar indebidamente el sentido a una sola violencia verbal; la nota ofrece la alternativa más contundente.
  doctrine_reference: Desplazamiento/exilio de Judá en Jeremías; cf. Jeremías 24:9; 29:14
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que cambió «to dwell» a «to sojourn» para ajustar לָגוּר con mayor precisión y añadió «away» a «driven away». En español se reflejó esa precisión semántica mediante una traducción natural («para habitar») y una nota que preserva el matiz de residencia provisional, además de una nota sobre la fuerza de נִדְּחוּ.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma predeterminada cuando aparezca el tetragrámaton; en este versículo no ocurre.
  - Se usa «remanente» de forma consistente para שְׁאֵרִית, dado su peso temático en Jeremías.
  - 'Se transliteran los nombres propios según uso bíblico en español: Johanán, Carea, Judá.'
  - Se conserva el orden narrativo hebreo con una apertura adverbial («Entonces») y una cláusula relativa compacta para claridad en español.
