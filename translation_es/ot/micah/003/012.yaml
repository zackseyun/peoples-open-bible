- from: Por tanto[a], por causa de ustedes, Sion será arada como un campo, y Jerusalén se convertirá en ruinas[b], y el monte de la casa será convertido en alturas boscosas.
  to: Por tanto, por causa de ustedes, Sion será arada como un campo, y Jerusalén se convertirá en ruinas, y el monte de la casa[a] se convertirá en alturas boscosas[b].
  rationale: Se corrigen los anclajes de las notas para que correspondan exactamente a las expresiones que explican, se mejora la naturalidad de la última cláusula con 'se convertirá', y se ajusta la nota alternativa para alinearla mejor con la documentación léxica de la POB inglesa.
