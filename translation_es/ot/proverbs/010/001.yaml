translation:
  language: es
  text: 'Proverbios de Salomón: el hijo sabio alegra al padre[a], pero el hijo necio es el dolor de su madre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un hijo necio es una tristeza para su madre».'
