translation:
  language: es
  text: Quien da palabras rectas besa los labios[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Una respuesta honesta es como un beso en los labios». El hebreo usa un verbo activo («besa»), aunque el proverbio puede entenderse idiomáticamente como una comparación entre la respuesta adecuada y la intimidad o sinceridad de un beso.'
    reason: alternative_reading
  - marker: b
    text: «Rectas» también puede traducirse «derechas», «directas» u «honestas».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂפָתַיִם
  english_pob_choice: the lips
  chosen_spanish: los labios
  alternatives_spanish:
  - los labios
  lexicon: HALOT
  rationale: La dual hebrea se conserva con el sustantivo concreto 'labios', manteniendo la imagen corporal del proverbio.
- source_word: יִשָּׁק
  english_pob_choice: he kisses
  chosen_spanish: besa
  alternatives_spanish:
  - besar
  - besa
  lexicon: HALOT
  rationale: El verbo qal es activo y significa 'besar'; en español el presente gnómico 'besa' reproduce bien el valor proverbial.
- source_word: מֵשִׁיב
  english_pob_choice: who gives
  chosen_spanish: el que da
  alternatives_spanish:
  - el que responde
  - el que devuelve
  - quien da
  lexicon: HALOT
  rationale: El participio hifil de שוב expresa la acción de responder o devolver palabras; 'el que da' es una solución natural en español y conserva el vínculo con 'palabras'.
- source_word: דְּבָרִים
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - palabras
  - respuestas
  - dichos
  lexicon: HALOT
  rationale: Se preserva el plural explícito del hebreo, sin reducirlo a un singular interpretativo como 'respuesta'.
- source_word: נְכֹחִים
  english_pob_choice: upright
  chosen_spanish: rectas
  alternatives_spanish:
  - rectas
  - derechas
  - honestas
  - correctas
  lexicon: HALOT
  rationale: '''Rectas'' mantiene la idea de algo derecho, justo o conforme a la verdad, sin cargar innecesariamente el matiz moral de ''honestas''.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que los marcadores [a] y [b] aparezcan explícitamente en el texto español principal.
  spanish_consistency_notes:
  - Se mantuvo la imagen concreta de 'labios' para conservar el paralelismo y la viveza poética.
  - Se prefirió el presente gnómico 'besa' para reflejar el valor proverbial del hebreo.
  - Se evitó 'respuesta' en el texto principal para no colapsar el plural 'palabras' del hebreo.
  - Se usó 'rectas' como equivalente base de נְכֹחִים, dejando alternativas semánticas en nota.
