translation:
  language: es
  text: La ira de un rey es como mensajeros de muerte[a], pero un hombre sabio la aplaca[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «mensajeros de muerte»; el término para «mensajeros» también puede significar «ángeles», pero aquí probablemente se refiere a agentes enviados por el rey.'
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo proviene de la misma raíz que a menudo se traduce «hacer expiación». En este contexto significa aplacar o desviar la ira del rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲמַת
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furia
  - cólera
  - enojo
  lexicon: HALOT
  rationale: חֲמַת expresa una ira intensa y peligrosa. En español, "ira" conserva mejor el tono solemne y proverbioso que "enojo", y evita la posible sobreexpresión de "furia".
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  - gobernante
  lexicon: HALOT
  rationale: El sentido directo es el de un rey. "Rey" mantiene la imagen concreta y breve del proverbio.
- source_word: מַלְאֲכֵי
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - ángeles
  - emisarios
  lexicon: HALOT
  rationale: El término hebreo puede significar mensajeros humanos o ángeles. En este contexto sapiencial y cortesano, "mensajeros" preserva la ambigüedad léxica sin introducir seres celestiales que el pasaje no exige.
- source_word: מָוֶת
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - fatalidad
  - mortalidad
  lexicon: HALOT
  rationale: La palabra significa simplemente "muerte". La construcción se conserva de modo literal para retener la imagen vívida de "mensajeros de muerte".
- source_word: וְאִישׁ חָכָם
  english_pob_choice: but a wise man
  chosen_spanish: pero un hombre sabio
  alternatives_spanish:
  - y un hombre sabio
  - pero una persona sabia
  lexicon: HALOT
  rationale: La conjunción funciona adversativamente en el proverbio, de modo que "pero" expresa mejor el contraste. Se mantiene "hombre" como representación del singular masculino hebreo, con valor proverbial y genérico.
- source_word: יְכַפְּרֶנָּה
  english_pob_choice: will appease it
  chosen_spanish: la aplaca
  alternatives_spanish:
  - la apacigua
  - hará expiación por ella
  - la cubrirá
  lexicon: HALOT
  rationale: El verbo de la raíz כפר puede tener sentido cultual de "hacer expiación", pero aquí el objeto es la ira del rey. En español, "aplaca" comunica con naturalidad la idea de desviar o calmar esa ira sin introducir lenguaje sacrificial que el contexto no demanda.
theological_decisions:
- issue: Si כפר debe leerse con matiz cultual de expiación o con sentido no cultual de apaciguar/aplacar
  english_pob_reading: 'Non-cultic: ''will appease it'''
  chosen_spanish_reading: 'No cultual: ''la aplaca'''
  alternative_spanish_readings:
  - hará expiación por ella
  - la apacigua
  rationale: El contexto inmediato trata de la ira de un rey, no de un rito sacrificial. Por eso se evita importar lenguaje de expiación, aunque la relación léxica con usos cultuales de la raíz se conserva mediante la decisión lexical.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La versión sigue el estado de alta concordancia del audit trail inglés, sin revisiones pendientes en el texto base. Se mantiene la estructura proverbial y la tensión léxica de כפר, trasladándola al español con una solución no cultual pero con nota explicativa.
  spanish_consistency_notes:
  - Se usa «rey» y no «monarca» para conservar la concreción del hebreo.
  - «Mensajeros de muerte» mantiene la metáfora compacta del original.
  - «La aplaca» refiere a la ira implícita de «la ira de un rey», no a "la muerte".
  - Se prefirió «aplaca» sobre una expresión más técnica para asegurar naturalidad en español sin perder la referencia semántica a כפר.
