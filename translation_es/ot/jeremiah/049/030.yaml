    rationale: El texto fuente pasa de עֲלֵיכֶם («contra ustedes») a עליהם («contra ellos»). La auditoría inglesa lo documenta en nota. El borrador español armoniza ambas cláusulas a «ustedes», perdiendo una característica significativa del texto recibido.
  - severity: medium
    issue: La nota b está mal priorizada
    rationale: La nota sobre «Yahvé» explica una convención editorial general, no una dificultad propia del versículo. Aquí la nota más necesaria es la que explique el cambio de «ustedes» a «ellos».
