translation:
  language: es
  text: Entonces el sacerdote ungido traerá parte de la sangre del toro[a] a la tienda de reunión[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de la sangre del toro». El hebreo probablemente tiene aquí un sentido partitivo: solo se lleva una parte de la sangre.'
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente se ha traducido «tabernáculo» por «tienda de reunión».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הֵבִיא
  english_pob_choice: Then ... shall bring
  chosen_spanish: Entonces ... traerá
  alternatives_spanish:
  - Y ... traerá
  - Y ... deberá traer
  lexicon: HALOT
  rationale: El prefijo conjuntivo y la forma verbal continúan la secuencia ritual. «Entonces» reproduce bien el valor consecutivo en español y mantiene el tono jurídico-instruccional sin sonar forzado.
- source_word: הַ/כֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote
  - el sacerdote cultual
  lexicon: HALOT
  rationale: En español bíblico contemporáneo «sacerdote» comunica con claridad el cargo cultual de כֹּהֵן. «Sacerdote cultual» sería más explicativo de lo necesario.
- source_word: הַ/מָּשִׁיחַ
  english_pob_choice: anointed
  chosen_spanish: ungido
  alternatives_spanish:
  - consagrado
  - Mesías
  lexicon: HALOT
  rationale: Aquí el término describe al sacerdote investido por unción, no un título mesiánico. «Ungido» conserva el sentido básico del hebreo y evita una lectura cristológica indebida.
- source_word: מִ/דַּם
  english_pob_choice: some of ... blood
  chosen_spanish: parte de la sangre
  alternatives_spanish:
  - de la sangre
  - algo de la sangre
  lexicon: HALOT
  rationale: 'La preposición מִן tiene aquí valor partitivo: no toda la sangre entra, sino una porción. «Parte de la sangre» expresa esa fuerza mejor que un simple «de la sangre».'
- source_word: הַ/פָּר
  english_pob_choice: the bull's
  chosen_spanish: del toro
  alternatives_spanish:
  - del novillo
  - del toro joven
  lexicon: HALOT
  rationale: פַּר se refiere al toro usado en el sacrificio. «Del toro» es directo y natural en español; «novillo» sería posible en algunos contextos, pero aquí no lo exige el texto.
- source_word: אֶל
  english_pob_choice: into
  chosen_spanish: al
  alternatives_spanish:
  - hacia el
  - dentro del
  lexicon: HALOT
  rationale: En español, con «traer» y un destino espacial, «al» comunica la entrada al recinto sagrado sin necesidad de calcar «into».
- source_word: אֹהֶל מוֹעֵד
  english_pob_choice: the tent of meeting
  chosen_spanish: el tabernáculo de reunión
  alternatives_spanish:
  - la tienda de reunión
  - el tabernáculo
  lexicon: HALOT
  rationale: Se preserva la designación tradicional traducida del hebreo, pero en una forma clara para el lector español. «Tabernáculo de reunión» es transparente y mantiene el vínculo con la terminología bíblica.}],
- source_word: הַ/כֹּהֵן הַ/מָּשִׁ֖יחַ
  english_pob_choice: the anointed priest
  chosen_spanish: el sacerdote ungido
  alternatives_spanish:
  - el sacerdote consagrado
  - el Mesías sacerdote
  lexicon: HALOT
  rationale: La combinación funciona como una unidad descriptiva del oficio sacerdotal. Traducirla como «sacerdote ungido» evita convertir el sintagma en un título técnico ajeno al contexto levítico.
theological_decisions:
- issue: Lectura de הַמָּשִׁיחַ en contexto sacerdotal
  english_pob_reading: anointed
  chosen_spanish_reading: ungido
  alternative_spanish_readings:
  - consagrado
  - Mesías
  rationale: El contexto ritual de Levítico 4 no presenta un título mesiánico, sino la identificación del sacerdote instalado por unción. «Ungido» conserva la referencia al acto de unción y evita sobrerreligiosizar el término.
  doctrine_reference: Translation philosophy §2; distinción léxica entre oficio sacerdotal y título mesiánico
- issue: Sentido partitivo de מִן en מִדַּם הַפָּר
  english_pob_reading: some of the bull's blood
  chosen_spanish_reading: parte de la sangre del toro
  alternative_spanish_readings:
  - de la sangre del toro
  - una porción de la sangre del toro
  rationale: La traducción debe reflejar que el texto no manda llevar toda la sangre, sino una porción. «Parte de» hace explícito el valor partitivo sin añadir contenido ajeno al hebreo.
  doctrine_reference: Principio de equivalencia óptima; valor partitivo de מן
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el cotejo de control mostró alta concordancia (acuerdo 1.0). Este borrador sigue esa lectura estable, manteniendo el sentido partitivo de מִן, la descripción sacerdotal de הַמָּשִׁיחַ como «ungido» y la designación espacial de אֹהֶל מוֹעֵד como «tabernáculo de reunión».
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el Tetragrámaton.
  - Se usa «sacerdote ungido» como sintagma descriptivo, no como nombre propio o título mesiánico.
  - «Tabernáculo de reunión» mantiene la transparencia del término hebreo y la coherencia con el resto del proyecto.
  - Se conserva el valor partitivo de מִן mediante «parte de», para no sugerir que se transporta toda la sangre.
