translation:
  language: es
  text: Él también es reprendido con dolor en su cama[a], y con continua contienda en sus huesos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con fuerte contienda en sus huesos». El adjetivo hebreo puede significar «duradera/continua» o «fuerte/poderosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוּכַח
  english_pob_choice: He is also reproved
  chosen_spanish: Él también es reprendido
  alternatives_spanish:
  - Él también es corregido
  - Él también es castigado
  - Él también es disciplinado
  lexicon: HALOT
  rationale: El hophal de יכח comunica ser reprendido/corregido en un sentido correctivo-judicial. «Reprendido» conserva esa fuerza sin convertir el pasaje en una afirmación más dura de castigo retributivo. «También» refleja la conjunción inicial dentro del flujo argumental de Eliú.
- source_word: בְּמַכְאוֹב
  english_pob_choice: with pain
  chosen_spanish: con dolor
  alternatives_spanish:
  - con doloroso padecimiento
  - con sufrimiento
  - por medio del dolor
  lexicon: HALOT
  rationale: מַכְאוֹב denota dolor o sufrimiento físico. «Con dolor» suena natural en español y mantiene el matiz instrumental de ב.
- source_word: עַל מִשְׁכָּבוֹ
  english_pob_choice: on his bed
  chosen_spanish: sobre su cama
  alternatives_spanish:
  - en su cama
  - sobre su lecho
  - mientras está en su cama
  lexicon: HALOT
  rationale: La imagen sitúa la aflicción en el lecho; «sobre su cama» conserva la concreción del hebreo y funciona bien en español bíblico actual.
- source_word: וְרִיב
  english_pob_choice: and with continual strife
  chosen_spanish: y con continua contienda
  alternatives_spanish:
  - y con contienda constante
  - y con lucha continua
  - y con disputa
  lexicon: HALOT
  rationale: רִיב suele significar contienda, pleito o disputa. Aquí, junto con «sus huesos», apunta a un conflicto interno o una agonía persistente. «Contienda» preserva el campo semántico sin perder la metáfora corporal.
- source_word: עֲצָמָיו
  english_pob_choice: his bones
  chosen_spanish: sus huesos
  alternatives_spanish:
  - su armazón
  - su cuerpo
  - su estructura ósea
  lexicon: HALOT
  rationale: Se conserva el literal «sus huesos», porque en hebreo suele expresar la estructura interna del cuerpo y la intensidad del sufrimiento físico.
- source_word: אֵתָן
  english_pob_choice: continual
  chosen_spanish: continua
  alternatives_spanish:
  - duradera
  - constante
  - fuerte
  lexicon: HALOT
  rationale: אֵיתָן puede significar duradero, permanente o fuerte. En este contexto modifica la contienda y la presenta como persistente; por eso «continua» es la opción más natural. Se conserva la posibilidad de la lectura «fuerte» en nota.
theological_decisions:
- issue: El sufrimiento como reprensión divina sin definir una doctrina completa de retribución
  english_pob_reading: The verse presents suffering as a means of divine reproof/correction without specifying a full doctrine of retribution.
  chosen_spanish_reading: El versículo presenta el sufrimiento como medio de reprensión/corrección divina, sin definir una doctrina completa de retribución.
  alternative_spanish_readings:
  - El sufrimiento es un castigo retributivo directo
  - El sufrimiento es solo una enfermedad natural sin agencia divina
  rationale: En el contexto del discurso de Eliú, la aflicción funciona como un modo por el cual Dios advierte o corrige a la persona. «Reprendido» evita cargar el texto con una lectura exclusivamente punitiva y preserva la tensión teológica del pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios; el texto aquí sigue de cerca el acuerdo alto del control cruzado y conserva las dos ambigüedades principales del hebreo: el valor correctivo de יכח y el rango semántico de אֵיתָן.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se prefirió «reprendido» frente a «castigado» para no cerrar la interpretación teológica más allá del hebreo y del audit trail en inglés.
  - Se conservó la imaginería corporal literal («cama», «huesos») por su peso poético y semántico.
