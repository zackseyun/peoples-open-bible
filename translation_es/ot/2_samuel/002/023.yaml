  glossary_alignment: No hay términos del glosario principal especialmente implicados aquí. «Asael», «Abner», «vientre», «apartarse» y «murió donde estaba» son compatibles con las decisiones documentadas. La elección «lo hirió» es aceptable en contexto, aunque «lo golpeó» sería más formalmente cercano a נכה; no exige corrección porque el contexto hace explícita la herida mortal.
