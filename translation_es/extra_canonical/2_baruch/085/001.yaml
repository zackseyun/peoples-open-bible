translation:
  language: es
  text: ‘… los tiempos están cerca y ya se aproximan con apremio. La vasija está cerca del pozo, la nave del puerto, el viaje de la ciudad, y la vida de su culminación.


    Así pues, reciban sus mandamientos, para que no sean cortados de la grandeza de su misericordia, sino que hallen reposo y no condenación.


    Porque cuando el Altísimo haga acontecer estas cosas, ya no habrá lugar para el arrepentimiento, ni límite para los tiempos, ni prolongación de las estaciones, ni un volver al reposo; ni nadie será ayudado por la oración, ni por la mediación de los padres, ni por la petición de los profetas, ni por la ayuda de los justos, ni por el llanto de las mujeres, ni por la ternura de los niños pequeños, ni por el llanto de los bebés, ni por la inocencia de los recién nacidos, ni por la justicia de sus padres. Ninguna de las cosas que antes se pensó y se vio como ayuda podrá ayudar.


    Porque entonces cada uno será juzgado por sí mismo solamente.


    Y preservará para su era a los que esperan en él, pero de inmediato destruirá a los que están contaminados con pecados.’
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ܦܩ̈ܘܕܘܗܝ
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus preceptos
  - sus órdenes
  - sus decretos
  lexicon: Payne Smith
  rationale: «Mandamientos» conserva el valor exhortativo y de autoridad divina que el audit trail inglés ya fijó con “commandments”. En español suena natural y mantiene el tono pactual del llamado final.
- source_word: ܢܝܚ / ܬܐܢܝܚܘܢ
  english_pob_choice: find rest
  chosen_spanish: hallen reposo
  alternatives_spanish:
  - encuentren descanso
  - sean aliviados
  - hallen alivio
  lexicon: Payne Smith
  rationale: La imagen es escatológica y contrasta con la condenación. «Reposo» conserva la idea de descanso final sin perder el matiz de alivio judicial que sugiere el contexto.
- source_word: ܒܒܟܝܐ ܕܢܫ̈ܐ
  english_pob_choice: the weeping of women
  chosen_spanish: el llanto de las mujeres
  alternatives_spanish:
  - el lamento de las mujeres
  lexicon: Payne Smith
  rationale: «Llanto» mantiene la literalidad y la fuerza retórica de la enumeración. «Lamento» sería posible, pero menos directo respecto del sustantivo de llorar.
- source_word: ܒܛܝܒܘܬܐ ܕܛܠܝ̈ܐ
  english_pob_choice: the tenderness of little children
  chosen_spanish: la ternura de los niños pequeños
  alternatives_spanish:
  - la bondad de los niños
  - el encanto de los niños pequeños
  lexicon: Payne Smith
  rationale: «Ternura» expresa bien el valor afectivo y apelativo del término, en línea con la decisión inglesa. «Niños pequeños» preserva el contraste con los demás grupos vulnerables.
- source_word: ܒܕܟܝܘܬܐ ܕܝܠܝ̈ܕܐ
  english_pob_choice: the innocence of newborns
  chosen_spanish: la inocencia de los recién nacidos
  alternatives_spanish:
  - la pureza de los recién nacidos
  - la limpieza de los bebés
  lexicon: Payne Smith
  rationale: «Inocencia» comunica de forma idiomática la idea de pureza infantil que el texto pone como posible argumento de intercesión. «Recién nacidos» refleja con mayor precisión la edad mencionada.
- source_word: ܐܪܙܐ / ܐܬܪܐ ܠܬܝܒܘܬܐ
  english_pob_choice: room for repentance
  chosen_spanish: lugar para el arrepentimiento
  alternatives_spanish:
  - espacio para el arrepentimiento
  - oportunidad para arrepentirse
  - decreto para el arrepentimiento
  lexicon: Payne Smith
  rationale: La tradición textual aquí es inestable en el OCR, pero el sentido confirmado por el audit trail es que ya no habrá posibilidad de arrepentirse. «Lugar para el arrepentimiento» conserva la concreción espacial del inglés POB y evita exagerar el matiz.
- source_word: ܡܦܠܓܝܢ ܒܚܛܝ̈ܬܐ
  english_pob_choice: defiled with sins
  chosen_spanish: están contaminados con pecados
  alternatives_spanish:
  - están manchados por pecados
  - están envueltos en pecados
  - están divididos por pecados
  lexicon: Payne Smith
  rationale: La expresión siriaca es difícil de reproducir literalmente en español sin sonar extraña. «Contaminados con pecados» conserva la condición moral impura que el inglés POB quiso expresar, con una formulación natural.
theological_decisions:
- issue: Cómo renderizar el final sobre el juicio individual
  english_pob_reading: For each of us will then be judged by himself alone.
  chosen_spanish_reading: Porque entonces cada uno será juzgado por sí mismo solamente.
  alternative_spanish_readings:
  - cada uno se mantendrá por sí mismo solamente
  - cada uno estará solo ante el juicio
  rationale: 'La revisión del audit trail corrigió un error previo de sentido: el verbo es ‘ser juzgado’, no ‘estar de pie’. En español conviene conservar el énfasis en responsabilidad individual ante el juicio, sin introducir una paráfrasis más interpretativa.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Cómo traducir la cláusula de preservación final
  english_pob_reading: he will preserve for his age those who have hope in him
  chosen_spanish_reading: preservará para su era a los que esperan en él
  alternative_spanish_readings:
  - preservará para su época a los que tienen esperanza en él
  - guardará para su siglo a los que confían en él
  rationale: El siriaco apunta a personas cuya esperanza está puesta en él. «Esperan en él» reproduce bien esa relación sin sobrecargar la frase; «era» mantiene la idea temporal de la expresión original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
- issue: Cómo mantener la fuerza acumulativa de la lista de mediaciones inútiles
  english_pob_reading: retained the catalogue of prayers, prophets, righteous people, women, children, infants, and fathers
  chosen_spanish_reading: Mantuve el catálogo de oración, mediación, petición y ayuda intercesora como elementos separados.
  alternative_spanish_readings:
  - resumirlo como una sola negación de toda intercesión
  - agruparlo en una fórmula general de ayuda
  rationale: 'La enumeración es parte del énfasis retórico: nadie será ayudado por recursos humanos o intercesores de ningún tipo. En español conviene conservar la acumulación para no perder la severidad del pasaje.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'El audit trail inglés señala una corrección importante: el verbo final debe traducirse como ‘ser juzgado’ y no como ‘ponerse de pie’ o ‘estar en pie’. También se mantiene la lectura larga del catálogo de mediaciones, sin resumirla. La versión española sigue el texto fuente siriaco y las decisiones auditadas en inglés, con terminología ajustada al español bíblico contemporáneo.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma por defecto cuando el texto fuente lo requiera; aquí no aparece el nombre divino explícito en esta línea, por lo que se conserva ‘Altísimo’ y ‘él’ según el contexto.
  - Se mantiene ‘Mesías’/‘Cristo’ fuera de este pasaje porque no corresponde al contenido del verso.
  - ‘Arrepentimiento’ se usa para ܬܝܒܘܬܐ por el sentido de posibilidad moral/escatológica de volver atrás, no como mera ‘cambio mental’.
  - ‘Reposo’ se eligió para conservar la resonancia de descanso final sin banalizarla como simple alivio.
  - La lista de grupos vulnerables se traduce de forma literal y acumulativa para preservar la retórica del original.
