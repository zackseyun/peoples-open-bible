  - severity: medium
    issue: מֶלֶךְ יְהוּדָה se debilitó a 'sobre Judá'.
    rationale: El hebreo identifica explícitamente a Ezequías como 'rey de Judá'. 'Reinar sobre Judá' expresa dominio territorial, pero no preserva tan bien la apposición titulativa ni la formulación regnal.
  - severity: medium
