translation:
  language: es
  text: En cuanto al profeta que profetiza paz[a], cuando se cumpla la palabra de ese profeta[b], entonces se sabrá que ese profeta es uno a quien Yahvé verdaderamente envió[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bienestar» o «prosperidad» para שָׁלוֹם.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cuando venga la palabra del profeta». El sentido es el cumplimiento del mensaje profético.
    reason: lexical_alternative
  - marker: c
    text: O «a quien Yahvé envió en verdad».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַנָּבִיא
  english_pob_choice: the prophet / that prophet
  chosen_spanish: el profeta / aquel profeta / ese profeta
  alternatives_spanish:
  - un profeta
  lexicon: HALOT
  rationale: El artículo definido está presente en hebreo, por lo que conviene mantener la referencia específica. En español, alternar entre «aquel profeta» y «ese profeta» evita repeticiones rígidas y conserva el carácter determinado del referente.
- source_word: יִנָּבֵא
  english_pob_choice: prophesies
  chosen_spanish: profetiza
  alternatives_spanish:
  - habla como profeta
  - predice
  lexicon: HALOT
  rationale: El nifal de נבא es el verbo técnico para hablar proféticamente. «Profetiza» preserva ese registro sin reducirlo al matiz más estrecho de «predice».
- source_word: לְשָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - prosperidad
  lexicon: HALOT
  rationale: En este contexto profético, «paz» es la traducción más natural y cercana al uso bíblico, aunque el término hebreo también puede abarcar bienestar o prosperidad.
- source_word: בְּבֹא
  english_pob_choice: when ... comes to pass
  chosen_spanish: cuando se cumpla
  alternatives_spanish:
  - cuando llegue
  - al llegar
  lexicon: HALOT
  rationale: La construcción temporal apunta al cumplimiento de la palabra profética. «Cuando se cumpla» expresa con claridad la idea de realización del mensaje.
- source_word: דְּבַר הַנָּבִיא
  english_pob_choice: the word of that prophet
  chosen_spanish: la palabra de aquel profeta
  alternatives_spanish:
  - la palabra del profeta
  - el mensaje de aquel profeta
  lexicon: HALOT
  rationale: «דָּבָר» aquí se refiere a la declaración profética. «Palabra» conserva la forma bíblica y el vínculo con el mensaje pronunciado, mientras que «aquel profeta» ayuda a identificar al referente del que habla el versículo.
- source_word: יִוָּדַע
  english_pob_choice: will be known
  chosen_spanish: se sabrá
  alternatives_spanish:
  - será reconocido
  - quedará demostrado
  lexicon: HALOT
  rationale: El nifal de ידע expresa que la autenticidad del profeta llegará a evidenciarse. «Se sabrá» es una forma natural en español que conserva la idea de reconocimiento público o constatación.
- source_word: שְׁלָח֥וֹ יְהוָ֖ה
  english_pob_choice: whom Yahweh has truly sent
  chosen_spanish: fue enviado verdaderamente por Yahvé
  alternatives_spanish:
  - a quien Yahvé ha enviado verdaderamente
  - a quien Yahvé envió en verdad
  lexicon: HALOT
  rationale: La cláusula relativa indica el envío divino como señal de autenticidad. Se mantiene «Yahvé» para el Tetragrámaton y «verdaderamente» para בֶּאֱמֶת, preservando el énfasis en la genuinidad del envío.
- source_word: בֶּאֱמֶת
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - en verdad
  - de veras
  lexicon: HALOT
  rationale: El adverbio hebreo señala la autenticidad del envío divino. «Verdaderamente» es sobrio y transparente en español contemporáneo.
theological_decisions:
- issue: Criterio para reconocer al profeta verdadero
  english_pob_reading: The verse states that fulfillment of a prophet's message of peace demonstrates that the prophet was truly sent by the LORD.
  chosen_spanish_reading: La culminación de la palabra del profeta muestra que fue enviado verdaderamente por Yahvé.
  alternative_spanish_readings:
  - La simple frase puede entenderse como una verificación del profeta cuando su palabra se cumple.
  - El profeta queda reconocido como verdadero cuando llega su palabra.
  rationale: El hebreo vincula el cumplimiento de la palabra con el reconocimiento del profeta. La traducción conserva esa relación evidencial sin añadir más de lo que dice el texto ni suavizar la prueba implícita.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail en inglés; no se detectaron revisiones posteriores que requirieran ajustes, y se mantiene la lectura de que el cumplimiento de la palabra confirma la autenticidad del profeta.
  spanish_consistency_notes:
  - Se conservó «Yahvé» para יְהוָה, conforme a la política del proyecto.
  - «Profetiza» mantiene el valor técnico del verbo hebreo sin hacerlo más explicativo de lo necesario.
  - «Paz» se dejó en el texto principal y se documentaron sus alternativas semánticas en nota.
  - La formulación «se sabrá» reproduce de forma natural el pasivo resultativo de יִוָּדַע.
  - Se evitó introducir «Mesías» o terminología ajena al pasaje, ya que no corresponde aquí.
