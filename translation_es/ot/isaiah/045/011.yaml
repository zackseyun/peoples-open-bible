base_translation:
  language: en
  yaml_path: translation/ot/isaiah/045/011.yaml
  text: 'Thus says Yahweh[a], the Holy One of Israel and his Maker: Ask me about the things to come concerning my sons[c][b], and command me concerning the work of my hands.'
  footnotes:
  - marker: a
    text: Or 'future things' or 'the coming things.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew says 'my sons'; this may refer collectively to Israel as God's people.
    reason: lexical_alternative
  - marker: c
    text: The wording 'command me' is likely intentionally provocative in context; some understand it as rhetorical rebuke rather than straightforward permission.
    reason: alternative_reading
