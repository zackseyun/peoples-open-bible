  category: mistranslation
  tier: 2
  from: in place of their own exaltation
  to: because of their arrogance
  rationale: The Greek ὕψος here reflects a Hebrew original meaning 'pride' or 'arrogance' (such as גַּאֲוָה), and ἀντί + genitive is used causally here ('because of'). The Hasmonean usurpers set up a kingdom out of their pride, not 'in place of' their exaltation, which makes no sense in the context of their violent usurpation described in verses 6 and 8.
