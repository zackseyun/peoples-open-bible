review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura proverbial y la retribución moral del griego, y «El que hace el mal… no sabrá de dónde le vino» refleja adecuadamente ὁ ποιῶν πονηρὰ … οὐ μὴ ἐπιγνῷ πόθεν ἧκε αὐτῷ. Sin embargo, «se volverá» no preserva suficientemente la imagen concreta de κυλισθήσεται («rodará / volverá rodando / rodará de vuelta»), que el expediente inglés considera importante mantener visible.
  spanish_quality_summary: El español es claro y legible, pero «sobre él se volverá» suena algo forzado e impreciso en español actual. Una formulación como «volverá rodando sobre él» conserva mejor la imaginería y sigue siendo comprensible y digna. El resto de la frase fluye bien.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «el mal» es una buena solución para πονηρὰ. La principal cuestión léxica es κυλισθήσεται, donde conviene mostrar explícitamente la imagen de rodar en vez de reducirla a «se volverá».
  issues:
  - severity: medium
    issue: κυλισθήσεται quedó demasiado atenuado en «se volverá».
    rationale: El griego usa imaginería de rodar/rodar de vuelta. El rastro auditado en inglés subraya que esa metáfora debe permanecer visible en el texto principal, no solo en nota.
  - severity: low
    issue: La secuencia «sobre él se volverá» suena poco natural en español.
    rationale: Aunque comprensible, el orden y el verbo escogido producen una frase rígida. Una leve reformulación mejora la naturalidad sin perder formalidad ni fidelidad.
  revised_spanish_text: El que hace el mal[a], volverá rodando sobre él, y ciertamente no sabrá de dónde le vino.
  revised_footnotes:
  - marker: a
    text: 'O: «rodará de vuelta sobre él». El griego conserva una imagen de movimiento para el mal que regresa al que lo hizo.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «se volverá» por «volverá rodando» para conservar en el texto principal la imaginería de κυλισθήσεται, en línea con la decisión léxica y teológica auditada. La revisión también mejora la naturalidad del español sin alterar el sentido proverbial de retribución.
