review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del hebreo: contraste entre quedarse en la ciudad y salir hacia los caldeos, la tríada de juicio ''espada/hambre/pestilencia'', y el modismo final sobre conservar la vida como botín. Sin embargo, hay dos desajustes importantes: (1) el marcador [a] está anclado a ''morirá'' cuando la nota corresponde al giro ''se pase a''; (2) ''que los sitian'' cambia indebidamente la persona del hebreo עֲלֵיכֶם (''sobre ustedes/vosotros'') a tercera persona plural (''los'').'
  spanish_quality_summary: El español es claro y de registro bíblico moderno. 'El que se quede', 'se pase a los caldeos' y 'su vida le será como botín' son naturales y fieles. La única reparación de estilo-fidelidad necesaria es ajustar 'que los sitian' a 'que los sitian a ustedes' o equivalente para reflejar la segunda persona del original. También conviene recolocar la nota [a] junto a la expresión que explica.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Caldeos' respeta הַכַּשְׂדִּים; 'pestilencia' refleja bien דָּבֶר; 'vida' para נַפְשׁוֹ sigue correctamente la decisión teológica documentada. No aparecen términos sensibles del glosario principal como Yahvé, Mesías o esclavo.
  issues:
  - severity: high
    issue: El marcador de la nota [a] está colocado en 'morirá' en vez de en 'se pase a'.
    rationale: La nota [a] explica el modismo hebreo וְנָפַל עַל ('pasarse al enemigo/defectar'), no el verbo 'morirá'. Así como está, la anotación induce a error y no cumple la disciplina de anclaje requerida.
