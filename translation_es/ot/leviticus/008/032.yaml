  spanish_quality_summary: El español es claro y legible, pero «quemaréis con fuego» suena algo pleonástico y menos natural en español bíblico actual. Dado que בָּאֵשׁ en este contexto se expresa con toda naturalidad como «en el fuego» en español, conviene ajustar la redacción y simplificar la nota para evitar depender de la revisión inglesa por encima del hebreo.
  glossary_alignment: No hay términos del glosario principal en juego aparte de decisiones léxicas comunes. «Carne» está bien alineado con la preferencia por preservar la fuerza léxica frente a una paráfrasis. No hay conflicto teológico ni terminológico de proyecto.
  issues:
