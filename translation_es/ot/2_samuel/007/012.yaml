translation:
  language: es
  text: Cuando se cumplan tus días y te acuestes con tus padres, yo levantaré tu descendencia[a] después de ti, que saldrá de tu propio cuerpo[b], y estableceré su reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu descendiente»; el hebreo usa «tu descendencia/simiente», que puede funcionar en sentido colectivo o como un singular representativo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de tus entrañas», un modismo que significa «de tu propio cuerpo»; es decir, de tu descendencia biológica.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: HALOT
  rationale: Aquí כִּי introduce una circunstancia temporal futura, no una causalidad. «Cuando» conserva la relación temporal con el resto de la oración y suena natural en español.
- source_word: יִמְלְאוּ יָמֶיךָ
  english_pob_choice: your days are fulfilled
  chosen_spanish: se cumplan tus días
  alternatives_spanish:
  - se completen tus días
  - se llenen tus días
  lexicon: HALOT
  rationale: La imagen hebrea de días «llenos/colmados» se expresa con un giro natural en español. «Se cumplan» mantiene el tono solemne y el sentido de término pleno de la vida sin perder la metáfora.
- source_word: וְשָׁכַבְתָּ אֶת־אֲבֹתֶיךָ
  english_pob_choice: and you lie down with your fathers
  chosen_spanish: te acuestes con tus padres
  alternatives_spanish:
  - te recuestes con tus padres
  - duermas con tus padres
  - muertas y te unas a tus padres
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de muerte y reunión con los antepasados. «Te acuestes con tus padres» comunica el giro idiomático de manera comprensible en español sin explicitar de más la muerte.
- source_word: וַהֲקִימֹתִי
  english_pob_choice: I will raise up
  chosen_spanish: yo levantaré
  alternatives_spanish:
  - yo suscitaré
  - yo estableceré
  - yo haré surgir
  lexicon: HALOT
  rationale: Con objeto personal/dinástico, קום en hifil indica hacer surgir o levantar un sucesor. «Levantaré» preserva la fuerza verbal y la sucesión dinástica.
- source_word: זַרְעֲךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tu posteridad
  - tu hijo
  lexicon: HALOT
  rationale: «Descendencia» comunica el valor colectivo o representativo de זֶרַע mejor que una opción singular cerrada. Mantiene abierta la tensión entre un heredero concreto y una línea dinástica.
- source_word: אַחֲרֶיךָ
  english_pob_choice: after you
  chosen_spanish: después de ti
  alternatives_spanish:
  - tras de ti
  - a tu suceder
  lexicon: HALOT
  rationale: Expresa la sucesión temporal y dinástica de forma directa y natural en español.
- source_word: אֲשֶׁר יֵצֵא מִמֵּעֶיךָ
  english_pob_choice: who will come from your own body
  chosen_spanish: la cual saldrá de tu propio cuerpo
  alternatives_spanish:
  - que saldrá de tus entrañas
  - que saldrá de tu interior
  - que procederá de tu propio cuerpo
  lexicon: HALOT
  rationale: El hebreo enfatiza procedencia biológica. «De tu propio cuerpo» comunica el sentido idiomático de forma clara; se usa «la cual» para concordar con «descendencia» como colectivo femenino en español.
- source_word: וַהֲכִינֹתִי
  english_pob_choice: and I will establish
  chosen_spanish: y estableceré
  alternatives_spanish:
  - y afirmaré
  - y confirmaré
  - y haré firme
  lexicon: HALOT
  rationale: «Estableceré» es una equivalencia idiomática para כון en este contexto real y pactal, y funciona bien con «reino» en español.
- source_word: מַמְלַכְתּוֹ
  english_pob_choice: his kingdom
  chosen_spanish: su reino
  alternatives_spanish:
  - su reinado
  - su dominio real
  lexicon: HALOT
  rationale: «Reino» es la forma más natural y fiel para מַמְלָכָה en este contexto dinástico. El posesivo queda ligado a la descendencia prometida.
theological_decisions:
- issue: Alcance de זַרְעֲךָ en la promesa davídica
  english_pob_reading: your offspring
  chosen_spanish_reading: tu descendencia
  alternative_spanish_readings:
  - tu hijo
  - tu simiente
  - tu posteridad
  rationale: El hebreo permite un sentido colectivo o representativo. «Tu descendencia» conserva esa amplitud y evita cerrar prematuramente la referencia en un único hijo, manteniendo la tensión teológica reconocida por el POB inglés.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se siguió el estado revisado más reciente del texto fuente inglés (sin cambios pendientes) y se mantuvo la misma decisión de equivalencia óptima y la misma tensión teológica sobre זַרְעֲךָ.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» por defecto del proyecto solo cuando el texto lo exija; este versículo no contiene el tetragrámaton.
  - Se evitó «Cristo»/«Mesías» porque el versículo no contiene esa terminología.
  - Se prefirió «descendencia» por su valor colectivo y su adecuación al registro bíblico dinámico sin perder la referencia biológica.
  - Se conservó el modismo de muerte/reunión con los antepasados sin explicitarlo como paráfrasis teológica.
