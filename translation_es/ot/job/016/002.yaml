translation:
  language: es
  text: He oído muchas cosas como estas[a]; todos ustedes son consoladores de miseria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: "muchas cosas semejantes". También puede entenderse: "consoladores miserables" o "consoladores penosos".'
