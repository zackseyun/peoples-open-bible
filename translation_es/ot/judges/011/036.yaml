base_translation:
  language: en
  yaml_path: translation/ot/judges/011/036.yaml
  text: And she said to him[a], “My father, you have opened your mouth to Yahweh; do to me according to what has gone out from your mouth, since Yahweh has taken vengeance for you on your enemies[b], on the sons of Ammon.”
  footnotes:
