translation:
  language: es
  text: La soberbia es aborrecida por el Señor y por los hombres[a], y la opresión[b] es una injusticia para ambos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «La soberbia es odiosa ante el Señor y los hombres, y de ambos cometerá cosas injustas». El hebreo se entiende más naturalmente en el sentido de que la opresión es una falta respecto de ambos, Dios y los hombres.'
    reason: alternative_reading
  - marker: b
    text: El hebreo une מַעַל con עֹשֶׁק. Aquí se entiende no como origen causal, sino como una afirmación de que la opresión constituye una falta o injusticia.
    reason: lexical_clarification
lexical_decisions:
- source_word: שְׂנוּאָה / μισητὴ
  english_pob_choice: is hateful
  chosen_spanish: es aborrecida
  alternatives_spanish:
  - es odiada
  - es detestable
  lexicon: HALOT; LXX μισητός
  rationale: El predicado expresa que la soberbia cae bajo rechazo/aborrecimiento. 'Es aborrecida' comunica bien esa fuerza en español sin endurecerla más de lo que permite el texto.
- source_word: לְאָדוֹן / Κυρίου
  english_pob_choice: to the Lord
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - ante el Señor
  - para Yahvé
  lexicon: HALOT; project divine-name policy
  rationale: 'Aunque el hebreo dice literalmente ''a/para el Señor'' y el griego usa Κυρίου, el sentido es relacional y judicial: la soberbia está en la presencia de Dios. Se usa ''Yahvé'' según la política del proyecto para el nombre divino, manteniendo la referencia explícita al Dios de Israel.'
- source_word: וַאֲנָשִׁים / ἀνθρώπων
  english_pob_choice: and to men
  chosen_spanish: y ante los hombres
  alternatives_spanish:
  - y ante los varones
  - y ante la gente
  lexicon: HALOT; LXX ἀνθρώπων
  rationale: '''Hombres'' conserva el plural humano representativo del hebreo y del griego. Se prefiere la construcción ''ante'' para reflejar el valor de presencia/juzgamiento del paralelismo con לְ/ἔναντι.'
- source_word: גַּאֲוָה / ὑπερηφανία
  english_pob_choice: Pride
  chosen_spanish: la soberbia
  alternatives_spanish:
  - el orgullo
  - la arrogancia
  lexicon: HALOT; LXX ὑπερηφανία
  rationale: '''Soberbia'' expresa con más precisión la altivez culpable del término en contexto sapiencial, y evita la ambigüedad positiva que a veces tiene ''orgullo'' en español.'
- source_word: וּמִשְּׁנֵיהֶם / ἐξ ἀμφοτέρων
  english_pob_choice: from both of them
  chosen_spanish: para ambos
  alternatives_spanish:
  - de ambos
  - de los dos
  lexicon: HALOT; LXX ἐξ ἀμφοτέρων
  rationale: El hebreo y el griego apuntan a que el resultado afecta a las dos partes mencionadas. En español, 'para ambos' preserva la idea de alcance bilateral del mal sin sugerir necesariamente procedencia.
- source_word: מַעַל עֹשֶׁק / πλημμελήσει ἄδικα
  english_pob_choice: oppression is wrongdoing
  chosen_spanish: la opresión es injusticia
  alternatives_spanish:
  - la opresión es maldad
  - la opresión es una falta
  lexicon: HALOT; LXX πλημμελήσει ἄδικα
  rationale: La revisión inglesa corrigió el foco hacia la identificación del acto como injusto, no hacia un origen causal. En español, 'injusticia' transmite el carácter moral y socialmente violento de עֹשֶׁק con fidelidad y naturalidad.
theological_decisions:
- issue: Nombre divino en la cláusula paralela
  english_pob_reading: the Lord (God)
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Dios
  rationale: El hebreo y el griego remiten al Dios de Israel; el proyecto exige no ocultar el nombre divino tras 'SEÑOR'. 'Yahvé' conserva la transparencia de la fuente y la coherencia terminológica del POB.
  doctrine_reference: 'DOCTRINE.md: יהוה/YHWH -> Yahvé; original-language primacy'
- issue: Relación de la opresión con la sentencia final
  english_pob_reading: oppression is wrongdoing to both of them
  chosen_spanish_reading: la opresión es injusticia para ambos
  alternative_spanish_readings:
  - de ambos viene la opresión
  - la opresión procede de ambos
  rationale: 'La evidencia hebrea y la revisión inglesa descartan una lectura causal (''procede de''). El sentido es calificativo: la opresión es un acto injusto que recae en la esfera de ambos, es decir, ante Dios y ante los hombres.'
  doctrine_reference: audit trail revision pass 2026-04-23; textual sense of מַעַל עֹשֶׁק
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del audit trail: la segunda cláusula no debe traducirse como si la opresión ''viniera de'' ambos, sino como una identificación moral del acto. También se respetó el cambio del griego y el hebreo al rendir el primer miembro con un valor de presencia (''ante'') y no de mera dirección.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' conforme a la política del proyecto para יהוה, en lugar de 'SEÑOR'.
  - Se eligió 'soberbia' sobre 'orgullo' para evitar una lectura positiva o ambigua en español.
  - Se conservó la paralelía entre 'ante Yahvé y ante los hombres' y la cláusula moral final.
  - No se introdujo lenguaje de origen causal en la segunda cláusula, siguiendo la corrección del audit trail.
