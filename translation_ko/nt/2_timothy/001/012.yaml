id: 2TI.1.12
reference: 2 Timothy 1:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: δι’ ἣν αἰτίαν καὶ ταῦτα πάσχω, ἀλλ’ οὐκ ἐπαισχύνομαι, οἶδα γὰρ ᾧ πεπίστευκα, καὶ πέπεισμαι ὅτι δυνατός ἐστιν τὴν παραθήκην μου φυλάξαι εἰς ἐκείνην τὴν ἡμέραν.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/001/012.yaml
  text: For this reason I also suffer these things, but I am not ashamed, for I know whom I have believed, and I am convinced that he is able to guard my deposit until that day.
translation:
  language: ko
  text: 그 까닭에 내가 이런 고난도 겪고 있습니다. 그러나 부끄러워하지 않습니다. 내가 누구를 믿어 왔는지[a]를 알기 때문이며, 또한 그분께서 내가 맡긴 것[b]을 그 날[c]까지 능히 지키실 줄을 확신하기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「누구를 신뢰해 왔는지」. 헬라어 πιστεύω는 신뢰·믿음·신앙을 함께 담는다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 παραθήκη는 안전한 보관을 위해 다른 이에게 맡긴 것을 가리킨다. 바울이 하나님께 맡긴 것을 의미할 수도 있고, 하나님께서 바울에게 맡기신 것을 의미할 수도 있다.
    reason: lexical_alternative
  - marker: c
    text: 곧 하나님의 최종 심판과 신원(伸寃)의 날이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ταῦτα πάσχω
  english_pob_choice: I suffer these things
  chosen_korean: 이런 고난도 겪고 있습니다
  alternatives_korean:
  - 이런 일들을 당하고 있습니다
  - 이러한 고난을 받고 있습니다
  lexicon: BDAG
  rationale: 현재형 πάσχω의 진행성을 「겪고 있다」로 살린다. 본문의 「고난」 흐름(8절, 11절)을 받아 「고난」으로 옮긴다.
- source_word: οἶδα γὰρ ᾧ πεπίστευκα
  english_pob_choice: for I know whom I have believed
  chosen_korean: 내가 누구를 믿어 왔는지를 알기 때문이며
  alternatives_korean:
  - 내가 신뢰해 온 그분을 알기 때문이며
  - 내가 누구를 의지해 왔는지를 알기 때문이며
  lexicon: BDAG
  rationale: 완료형 πεπίστευκα의 지속된 신뢰를 「믿어 왔다」로 살린다. 한국어로 「누구를 믿어 왔는지」는 그 신뢰의 인격적 대상성을 분명히 드러낸다.
- source_word: τὴν παραθήκην μου
  english_pob_choice: my deposit
  chosen_korean: 내가 맡긴 것
  alternatives_korean:
  - 나의 맡긴 바
  - 내게 맡기신 것
  - 나의 보화
  lexicon: BDAG
  rationale: 글로사리 지침에 따라 παραθήκη는 「맡긴 것/맡기신 것」으로 옮기되, 1인칭 속격 μου를 「내가 맡긴 것」으로 살려 능동적 위탁의 이미지를 보존한다. 가능성(하나님이 바울에게 맡기신 것)은 각주에 명기한다.
- source_word: εἰς ἐκείνην τὴν ἡμέραν
  english_pob_choice: until that day
  chosen_korean: 그 날까지
  alternatives_korean:
  - 그 날에 이르기까지
  lexicon: BDAG
  rationale: 「그 날」은 신약에서 종말의 심판일을 가리키는 정형 표현. 한국 성서 전통대로 보존한다.
- source_word: δυνατός ἐστιν φυλάξαι
  english_pob_choice: he is able to guard
  chosen_korean: 능히 지키실 줄을
  alternatives_korean:
  - 능히 보전하실 줄을
  - 지키실 수 있음을
  lexicon: BDAG
  rationale: δυνατός + 부정사 구문을 한국어 「능히 ~하실」로 옮긴다. φυλάσσω는 「지키다·보전하다」를 뜻하며, 위탁된 것을 안전히 지키는 함의를 살린다.
theological_decisions:
- issue: παραθήκη(맡긴 것)의 위탁 이미지 보존
  chosen_reading: 내가 맡긴 것을 그 날까지 능히 지키실 줄을 확신합니다
  alternative_readings:
  - 내게 맡기신 것을 그 날까지 능히 지키실 줄을 확신합니다
  - 나의 보화를 그 날까지 지키실 줄을 확신합니다
  rationale: 본문 παραθήκη는 「안전한 보관을 위해 다른 이에게 맡긴 것」을 가리키는 법률·상업적 용어이다. 한국 전통의 「의탁한 것」보다 일상적 「맡긴 것」이 그 위탁의 이미지를 분명히 드러낸다. 1인칭 속격 μου를 살려 바울이 능동적으로 자신의 무언가(자신의 영혼·사역·증언·생명)를 하나님께 위탁했음을 표현한다. 2:14의 「맡기신 것」(τὴν καλὴν παραθήκην, 하나님이 디모데에게 맡기신 것)과 짝을 이루는 위탁의 신학을 보존하기 위해 양방향 가능성을 각주에 둔다.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological force of source images'
