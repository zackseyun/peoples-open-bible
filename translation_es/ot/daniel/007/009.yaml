  - marker: b
    text: Arameo «Anciano de Días», un título que enfatiza gran antigüedad y majestad eterna.
    reason: cultural_note
  revision_rationale: Se conserva la traducción base, pero se añade la nota b omitida del rastro auditado, se mejora la colocación del marcador [a], y se alisa levemente la sintaxis con «era» para una lectura española más natural sin perder fidelidad. «Fueron colocados tronos» mantiene el sentido contextual de instalación de la corte celestial y suena más idiomático en este registro.
