translation:
  language: es
  text: 'Y me dijo: «Mira, yo te haré fecundo y te multiplicaré, y te convertiré en una asamblea de pueblos[a], y daré esta tierra a tu descendencia después de ti como posesión perpetua».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una compañía de pueblos». La expresión hebrea puede denotar un colectivo reunido formado por varios pueblos o grupos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר אֵלַי
  english_pob_choice: And he said to me
  chosen_spanish: Y le dijo a mí
  alternatives_spanish:
  - Y me dijo
  - Y dijo a mí
  lexicon: HALOT
  rationale: La construcción reproduce el valor narrativo de אמר con complemento indirecto. «Le dijo a mí» conserva el enfoque de recepción directa del discurso, aunque «me dijo» sería más natural en español. Se mantiene la referencia explícita al receptor para reflejar el formato de recuerdo del hebreo y del inglés POB.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  - Observa
  lexicon: HALOT
  rationale: El hebreo introduce una declaración solemne y enfática. «Mira» comunica esa fuerza apelativa en español moderno sin caer en un arcaísmo pesado; «He aquí» sería más formal, pero más literario/arcaizante. Se evita suavizar la solemnidad del giro.
- source_word: מַפְרְךָ
  english_pob_choice: I will make you fruitful
  chosen_spanish: te haré fecundo
  alternatives_spanish:
  - te haré fructificar
  - te haré fructífero
  - te volveré fecundo
  lexicon: HALOT
  rationale: Se conserva el sentido causativo de פרה. «Fecundo» es digno y claro en español bíblico contemporáneo; «fructificar» puede sonar más mecánico o vegetal. La forma verbal «te haré fecundo» preserva el valor de acción divina causativa.
- source_word: וְהִרְבִּיתִךָ
  english_pob_choice: and multiply you
  chosen_spanish: y te multiplicaré
  alternatives_spanish:
  - y te haré numerosos
  - y te aumentaré
  - y te incrementaré
  lexicon: HALOT
  rationale: La opción sigue de cerca el campo léxico de רבה y conserva la fórmula patriarcal/covenantal del pasaje. «Multiplicar» en español puede funcionar tanto literal como colectivamente y mantiene el paralelismo con «hacer fecundo».
- source_word: וּנְתַתִּיךָ לִקְהַל עַמִּים
  english_pob_choice: and I will make you into an assembly of peoples
  chosen_spanish: y te convertiré en una asamblea de pueblos
  alternatives_spanish:
  - y te haré una asamblea de pueblos
  - y te pondré como asamblea de pueblos
  - y te estableceré como una compañía de pueblos
  lexicon: HALOT
  rationale: Aunque נתן es literalmente «dar», aquí funciona idiomáticamente como constituir/convertir. «Convertiré en» expresa bien la idea de formar a Jacob como una realidad colectiva. «Asamblea de pueblos» conserva קהל como conjunto reunido y עמים como plural real de pueblos, sin usar «congregación», que en español podría sonar eclesial de forma no deseada.
- source_word: קְהַל עַמִּים
  english_pob_choice: assembly of peoples
  chosen_spanish: asamblea de pueblos
  alternatives_spanish:
  - compañía de pueblos
  - congregación de pueblos
  - comunidad de pueblos
  lexicon: HALOT
  rationale: «Asamblea» representa el carácter reunido de קהל; «pueblos» mantiene el plural de עמים. Se evita «congregación» por su carga eclesiástica en español; «asamblea de pueblos» es transparente y suficientemente formal.
- source_word: וְנָתַתִּי אֶת הָאָרֶץ הַזֹּאת
  english_pob_choice: and I will give this land
  chosen_spanish: y daré esta tierra
  alternatives_spanish:
  - y concederé esta tierra
  - y entregaré esta tierra
  lexicon: HALOT
  rationale: La frase conserva la simple promesa de donación pactal. «Daré esta tierra» refleja con naturalidad el hebreo y la cadencia del texto. En español, «tierra» es la forma más estable para esta promesa territorial.
- source_word: לְזַרְעֲךָ אַחֲרֶיךָ
  english_pob_choice: to your offspring after you
  chosen_spanish: a tu descendencia después de ti
  alternatives_spanish:
  - a tu simiente después de ti
  - a tu posteridad después de ti
  - a tu linaje después de ti
  lexicon: HALOT
  rationale: «Descendencia» preserva el sentido colectivo de זרע en un español natural y sobrio. Se evita «simiente», que puede sonar arcaico o técnico; «después de ti» mantiene la sucesión genealógica explícita.
- source_word: אֲחֻזַּת עוֹלָם
  english_pob_choice: as an everlasting possession
  chosen_spanish: como posesión perpetua
  alternatives_spanish:
  - como posesión eterna
  - como heredad perpetua
  - como tenencia perpetua
  lexicon: HALOT
  rationale: אֲחֻזָּה denota posesión/heredad territorial; «posesión» mantiene el carácter jurídico y concreto. «Perpetua» traduce עוֹלָם con el matiz de duración indefinida y estable, sin cargar innecesariamente con fórmulas dogmáticas posteriores.
theological_decisions:
- issue: Concretud de la promesa territorial y fuerza de עוֹלָם
  english_pob_reading: Retain the concrete promise of land to Jacob's offspring as 'this land ... as an everlasting possession'
  chosen_spanish_reading: Conservar la promesa concreta de esta tierra a la descendencia de Jacob como «posesión perpetua»
  alternative_spanish_readings:
  - reducirla a herencia simbólica
  - suavizarla como posesión duradera
  - espiritualizar la tierra como simple metáfora
  rationale: El hebreo habla de una tierra específica y de una posesión duradera. La traducción mantiene esa concreción sin reinterpretarla alegóricamente ni debilitar la fuerza temporal de עוֹלָם. «Perpetua» conserva el carácter de promesa estable y sostenida por pacto.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Valor de la expresión introductoria enfática הִנְנִי
  english_pob_reading: Behold
  chosen_spanish_reading: Mira
  alternative_spanish_readings:
  - He aquí
  - Mira bien
  - Observa
  rationale: La decisión busca reflejar la solemnidad y la atención requerida por la fórmula sin imponer un registro excesivamente arcaico. «Mira» funciona como señal de énfasis en español actual y mantiene la tensión retórica del discurso.
  doctrine_reference: Translation philosophy §2
- issue: Naturaleza colectiva de קְהַל עַמִּים
  english_pob_reading: assembly of peoples
  chosen_spanish_reading: asamblea de pueblos
  alternative_spanish_readings:
  - compañía de pueblos
  - congregación de pueblos
  - comunidad de pueblos
  rationale: La frase puede sugerir una colectividad compuesta por varios pueblos o grupos. «Asamblea de pueblos» conserva la ambigüedad útil del hebreo sin desplazarla a un lenguaje eclesiástico o a una simple enumeración tribal.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que sustituyó «Look» por «Behold» para un registro más formal y más cercano a הִנְנִי. La versión española sigue esa preferencia de solemnidad con «Mira», evitando una paráfrasis más libre y manteniendo la estructura promesa→fecundidad→multiplicación→constitución de un colectivo→don de la tierra.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término estándar cuando el Tetragrámaton esté implicado; este versículo no lo contiene explícitamente.
  - Se evitó «congregación» por su posible carga eclesial, en coherencia con el tratamiento POB de קהל.
  - «Descendencia» se usa para זרע como singular colectivo natural en español.
  - «Posesión perpetua» preserva el matiz legal/territorial de אֲחֻזָּה y la duración de עוֹלָם.
