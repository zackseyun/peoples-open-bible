translation:
  language: es
  text: 'Porque David mismo dice en el Libro de los Salmos[a]: «El Señor dijo a mi Señor: “Siéntate a mi derecha”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo el hebreo de Salmo 110:1: «Yahvé dijo a mi Señor».'
    reason: alternative_reading
lexical_decisions:
- source_word: αὐτὸς γὰρ
  english_pob_choice: For ... himself
  chosen_spanish: Porque ... mismo
  alternatives_spanish:
  - Porque David mismo
  - David mismo, pues
  lexicon: BDAG
  rationale: γάρ introduce explicación causal, bien rendida con «Porque». αὐτός es enfático y se conserva con «mismo», colocado junto a David para reflejar la insistencia del griego sin sobrerreinventar la estructura.
- source_word: Δαυὶδ
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - David
  lexicon: Nombre propio estándar
  rationale: Nombre propio transliterado de forma estable al español.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dice
  - dijo
  lexicon: BDAG
  rationale: El presente histórico de la fórmula de cita se expresa naturalmente en español con «dice», manteniendo el valor literario del griego.
- source_word: ἐν βίβλῳ ψαλμῶν
  english_pob_choice: in the Book of Psalms
  chosen_spanish: en el Libro de los Salmos
  alternatives_spanish:
  - en el libro de los salmos
  - en los Salmos
  lexicon: BDAG
  rationale: βίβλῳ es «libro» y ψαλμῶν es un genitivo plural; «Libro de los Salmos» conserva la referencia canónica reconocible sin alejarse del griego.
- source_word: Εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dijo
  - dice
  lexicon: BDAG
  rationale: 'El aoristo dentro de la cita se vierte con pretérito simple: «dijo».'
- source_word: κύριος
  english_pob_choice: The Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - el Señor Yahvé
  lexicon: Contested terms
  rationale: Aunque el griego dice κύριος, el texto citado alude al hebreo de Salmo 110:1, donde aparece el nombre divino. Siguiendo la primacía del original y el uso del proyecto para יהוה, se refleja con «Yahvé» en el cuerpo principal, y no con el reemplazo reverencial «SEÑOR».
- source_word: τῷ κυρίῳ μου
  english_pob_choice: to my Lord
  chosen_spanish: a mi Señor
  alternatives_spanish:
  - a mi Señor
  - a mi amo
  lexicon: BDAG
  rationale: El segundo κύριος se refiere al destinatario mesiánico del salmo. «Señor» preserva la carga intertextual y cristológica mejor que «amo», que aunque posible, debilita el eco bíblico en español.
- source_word: Κάθου
  english_pob_choice: Sit
  chosen_spanish: Siéntate
  alternatives_spanish:
  - Siéntate
  - Toma asiento
  lexicon: BDAG
  rationale: El imperativo de κάθημαι en segunda persona singular se expresa de modo natural con «Siéntate», que conserva la orden directa.
- source_word: ἐκ δεξιῶν μου
  english_pob_choice: at my right hand
  chosen_spanish: a mi derecha
  alternatives_spanish:
  - a mi derecha
  - a mi diestra
  - a mi lado derecho
  lexicon: BDAG
  rationale: La expresión es idiomática; en español se comunica con claridad y fidelidad como «a mi derecha». «A mi diestra» es posible, pero menos natural en español moderno.
theological_decisions:
- issue: Primer κύριος en la cita del Salmo, donde el hebreo subyacente usa el nombre divino
  english_pob_reading: The Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - el SEÑOR
  rationale: La cita reproduce el texto del Salmo 110:1 aludido por Jesús. Dado que el hebreo subyacente contiene el nombre divino, la lectura principal en español explicita Yahvé para no enmascarar el dato original y mantener la transparencia auditada del proyecto.
  doctrine_reference: Original-language primacy; rendering of יהוה as Yahvé in Spanish POB
- issue: Segundo κύριος en el dicho mesiánico
  english_pob_reading: my Lord
  chosen_spanish_reading: mi Señor
  alternative_spanish_readings:
  - mi amo
  - mi señor
  rationale: 'La fórmula conserva la tensión cristológica del pasaje: el hablante distingue entre Yahvé y el destinatario superior a David. «Mi Señor» mantiene el sentido honorífico y la conexión con la argumentación de Jesús.'
  doctrine_reference: Preserve theological tension rather than collapsing messianic distinction
translation_notes:
  revision_awareness: Se revisó el pasaje para alinear el texto español con la fuente griega y con el trasfondo hebreo del Salmo citado. La decisión principal es explicitar Yahvé en la cita para no ocultar el nombre divino detrás de κύριος, en coherencia con la política del proyecto y con la nota alternativa ya documentada en inglés. No hubo cambios recientes en la revisión inglesa; se mantiene el acuerdo alto con el control cruzado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה en el texto principal, conforme al estándar del proyecto.
  - «Señor» se reserva para κύριος cuando no se trata del nombre divino explícito en el trasfondo hebreo.
  - Se usa «Libro de los Salmos» por ser la forma canónica natural en español y fiel al griego.
  - La puntuación de cita sigue el español moderno con comillas angulares.
  - Se conserva la tensión entre Yahvé y «mi Señor» sin resolverla por paráfrasis.
