  to: Un gobernante[a], un gobernador y un juez son honrados, pero ninguno es mayor que el que teme a Dios.
  rationale: Se ajusta la sintaxis inicial para que refleje con más naturalidad y dignidad el pasivo plural hebreo, sin cambiar el sentido. Se conserva la nota sobre la fuerte divergencia del griego, anclada en el primer elemento de la línea como en el borrador.
