translation:
  language: es
  text: 'Los hijos de Neftalí: Jahziel[a], Guni, Jezer y Salum, los hijos de Bilha.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Génesis 46:24 lee «Shillem» para este nombre; aquí Crónicas tiene «Salum».
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  lexicon: HALOT
  rationale: En una lista genealógica, בְּנֵי puede ser 'hijos de' o, más ampliamente, 'descendientes de'. Aquí introduce cuatro nombres personales inmediatos; 'hijos de' conserva el sentido genealógico directo y suena natural en español.
- source_word: נַפְתָּלִי
  english_pob_choice: Naphtali
  chosen_spanish: Neftalí
  alternatives_spanish:
  - Neftalí
  lexicon: Nombre propio bíblico
  rationale: Se translitera al uso bíblico en español como Neftalí, forma clara y reconocible para lectores hispanos.
- source_word: יַחֲצִיאֵל
  english_pob_choice: Jahziel
  chosen_spanish: Jahziel
  alternatives_spanish:
  - Jahzeel
  - Jajziel
  lexicon: Transliteración tradicional/convencional
  rationale: Se mantiene la transliteración que refleja la decisión del POB inglés en Crónicas. Otras grafías responden a convenciones distintas; 'Jahziel' es legible y preserva la forma del texto base.
- source_word: גוּנִי
  english_pob_choice: Guni
  chosen_spanish: Guni
  alternatives_spanish:
  - Guni
  lexicon: Nombre propio bíblico
  rationale: Nombre propio transliterado sin adaptación adicional, siguiendo la forma estándar en español.
- source_word: יֵצֶר
  english_pob_choice: Jezer
  chosen_spanish: Jezer
  alternatives_spanish:
  - Ézer
  - Jézer
  lexicon: Transliteración convencional
  rationale: La forma 'Jezer' conserva la transliteración habitual de este nombre hebreo y coincide con la decisión auditada del texto inglés.
- source_word: שַׁלּוּם
  english_pob_choice: Shallum
  chosen_spanish: Shallum
  alternatives_spanish:
  - Sallum
  - Shillem
  lexicon: Transliteración convencional
  rationale: Se sigue la lectura masorética de Crónicas reflejada por el POB inglés. 'Shillem' se reserva para la nota de variante paralela en Génesis 46:24.
- source_word: בְּנֵי בִלְהָה
  english_pob_choice: the sons of Bilhah
  chosen_spanish: los hijos de Bilhá
  alternatives_spanish:
  - los descendientes de Bilhá
  lexicon: HALOT
  rationale: La frase appositiva identifica a estos nombres como pertenecientes al linaje de Bilhá. 'Hijos de' mantiene el paralelismo genealógico con el hebreo y evita una formulación más interpretativa.
translation_notes:
  revision_awareness: El texto inglés POB presenta alta concordancia y sin revisiones aplicadas; esta versión española sigue de cerca el trazado auditado, conservando la lista genealógica, la transliteración de nombres propios y la nota de variante paralela.
  spanish_consistency_notes:
  - Se usa 'Neftalí' y 'Bilhá' con acentuación española habitual en nombres bíblicos.
  - Se mantiene la estructura de lista nominal con dos puntos y coma final, adecuada para un registro genealógico breve.
  - La nota al pie se ancla en 'Jahziel' para preservar la variante textual paralela sin alterar el cuerpo del versículo.
