translation:
  language: es
  text: Que venga sobre él la destrucción[a] sin que lo sepa; y que la red[b] que escondió lo atrape; en esa misma destrucción, que caiga[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «inesperadamente». El hebreo dice literalmente: «que venga destrucción sobre él; no sabe».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su red».'
    reason: lexical_alternative
  - marker: c
    text: La frase final también puede entenderse como «que caiga en ella», donde «ella» podría referirse a la red que escondió; el texto principal sigue la lectura que retoma e intensifica «destrucción».
    reason: alternative_reading
lexical_decisions:
- source_word: תְּבוֹאֵהוּ
  english_pob_choice: let ... come upon him
  chosen_spanish: Que venga sobre él
  alternatives_spanish:
  - Que le sobrevenga
  - Que caiga sobre él
  lexicon: HALOT
  rationale: El verbo בוא expresa venir/sobrevenir; en un contexto imprecatorio, el subjuntivo exhortativo español transmite bien el valor volitivo de 'let ... come upon him' sin perder el movimiento de acercamiento sobre el sujeto.
- source_word: שׁוֹאָה
  english_pob_choice: destruction
  chosen_spanish: la destrucción
  alternatives_spanish:
  - la ruina
  - la devastación
  lexicon: HALOT
  rationale: El sustantivo indica ruina devastadora. 'Destrucción' es natural en español y mantiene la consistencia semántica con la segunda ocurrencia del versículo.
- source_word: לֹא יֵדָע
  english_pob_choice: unawares
  chosen_spanish: sin que lo sepa
  alternatives_spanish:
  - inesperadamente
  - sin saberlo
  lexicon: HALOT
  rationale: La frase hebrea es literalmente 'no sabe'; en español conviene conservar la idea de ignorancia/sorpresa sin convertirla en una mera adverbialización que oculte el verbo.
- source_word: וְרִשְׁתּוֹ
  english_pob_choice: the net that he hid
  chosen_spanish: la red
  alternatives_spanish:
  - su red
  - la trampa
  lexicon: HALOT
  rationale: '''Red'' corresponde al sustantivo básico; el posesivo implícito se recupera en la relativa ''que escondió'', como en el audit trail inglés, y evita una repetición innecesaria.'
- source_word: אֲשֶׁר טָמַן
  english_pob_choice: that he hid
  chosen_spanish: que escondió
  alternatives_spanish:
  - que ocultó
  - que puso a escondidas
  lexicon: HALOT
  rationale: טמן suele significar esconder/ocultar. 'Escondió' es claro y idiomático, y preserva el vínculo con la trampa preparada en secreto.
- source_word: תִּלְכְּד֑/וֹ
  english_pob_choice: catch him
  chosen_spanish: lo atrape
  alternatives_spanish:
  - lo capture
  - lo prenda
  lexicon: HALOT
  rationale: לכד con una red se expresa naturalmente en español como 'atrapar'; el subjuntivo mantiene la fuerza jussiva del paralelismo poético.
- source_word: בְּשׁוֹאָה
  english_pob_choice: into that very destruction
  chosen_spanish: en esa misma destrucción
  alternatives_spanish:
  - dentro de esa destrucción
  - en aquella destrucción misma
  lexicon: HALOT
  rationale: El hebreo fronta la preposición para enfatizar y retoma el referente con un pronombre. En español, 'esa misma destrucción' comunica bien la repetición enfática sin introducir una redundancia extraña.
- source_word: יִפָּל בָּהּ
  english_pob_choice: let him fall in it
  chosen_spanish: caerá
  alternatives_spanish:
  - caerá en ella
  - caerá en eso
  lexicon: HALOT
  rationale: Aquí se conserva el efecto de cierre del hebreo con una afirmación prospectiva en español. La referencia de 'en ella' queda absorbida por el antecedente inmediato 'destrucción', siguiendo la revisión inglesa que trata el pronombre como intensificación del mismo sustantivo.
theological_decisions:
- issue: Valor del imperativo/jussivo en un salmo imprecatorio
  english_pob_reading: let ... come upon him / let the net ... catch him / let him fall
  chosen_spanish_reading: Que venga...; y que la red... lo atrape; ... caerá
  alternative_spanish_readings:
  - Venga...
  - Caiga...
  rationale: El hebreo usa formas jussivas/volitivas. El español con 'que + subjuntivo' reproduce de manera natural la petición/imprecación sin suavizarla a simple futuro narrativo.
  doctrine_reference: Salmos imprecatorios; poética bíblica
- issue: Referente de בָּהּ ('en ella')
  english_pob_reading: the final 'in it' may refer to the net...; the revision treats it as referring back to destruction
  chosen_spanish_reading: en esa misma destrucción caerá
  alternative_spanish_readings:
  - caerá en ella (la red)
  - caerá en ella (la destrucción)
  rationale: La nota inglesa preserva la ambigüedad entre la red y la destrucción; la revisión preferida entiende el pronombre como intensificador del mismo sustantivo 'destrucción'. El español principal sigue esa lectura, pero mantiene una nota sobre la alternativa de la red.
  doctrine_reference: Poética hebrea; ambigüedad referencial
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail inglés, que resuelve la última cláusula como un énfasis en «esa misma destrucción» en lugar de mantener la secuencia inglesa más literal «into destruction ... in it». También incorpora la decisión revisada de traducir el valor de לֹא יֵדָע de forma natural como «sin que lo sepa».
  spanish_consistency_notes:
  - Se usó «destrucción» en ambas apariciones para conservar la repetición del hebreo שׁוֹאָה.
  - Se prefirió «red» frente a «trampa» porque corresponde al sustantivo concreto וְרִשְׁתּוֹ; el acto de esconderla se expresa en la relativa.
  - Se empleó «que + subjuntivo» para reflejar el jussivo/imprecativo del hebreo.
  - No se usó «SEÑOR» ni otros reemplazos teológicos ajenos al versículo.
  - El pronombre final se resolvió en el español principal con la lectura intensiva favorecida por la revisión inglesa, pero la nota mantiene la ambigüedad textual relevante.
