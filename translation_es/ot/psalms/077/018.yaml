review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura poética y conserva correctamente «tus flechas» con nota para la alternativa «relámpagos». También distingue adecuadamente עָבוֹת («nubes») de שְׁחָקִים («cielos»). Sin embargo, el primer hemistiquio invierte la relación sintáctica del hebreo: זֹרְמוּ מַיִם עָבוֹת significa que las nubes derramaron agua, no que las aguas se desbordaron de las nubes. Conviene ajustar esa cláusula para preservar con más fidelidad el sujeto y la imagen del original.'
  spanish_quality_summary: El español es generalmente claro y poético. «Dieron su voz» y «se movían de un lado a otro» son naturales. No obstante, «Las aguas se desbordaron de las nubes» suena menos directo y algo interpretativo frente al hebreo. Una formulación como «Las nubes derramaron agua» o «Las nubes vertieron agua» resulta más fiel y más idiomática.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión de mantener «tus flechas[a]» en el texto principal concuerda con la auditoría inglesa y la nota conserva la alternativa interpretativa. No aparecen términos sensibles del glosario principal que requieran ajuste adicional.
  issues:
  - severity: medium
    issue: Relación sintáctica invertida en el primer hemistiquio
    rationale: El hebreo presenta a «las nubes» como sujeto de «derramaron/vertieron» con «agua» como complemento. El borrador español hace que «las aguas» sean el sujeto que «se desbordaron de las nubes», lo cual altera la imagen original.
  - severity: low
    issue: «Se desbordaron» añade un matiz no necesario
    rationale: Aunque expresa abundancia, «desbordarse» sugiere rebasar límites. El audit trail privilegia «poured out» y el hebreo apunta más simplemente a verter/derramar/fluír copiosamente desde las nubes.
  revised_spanish_text: Las nubes derramaron agua; los cielos dieron su voz; sí, tus flechas[a] se movían de un lado a otro.
  revised_footnotes:
  - marker: a
    text: O «tus relámpagos». El hebreo dice «tus flechas», probablemente usando imaginería militar para el relámpago en este contexto de teofanía de tormenta.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el primer hemistiquio para reflejar con fidelidad la sintaxis e imagen del hebreo: las nubes son las que derraman agua. Se mantiene el resto porque preserva bien el paralelismo poético, la intensidad de אַף con «sí», y la decisión documentada de conservar «tus flechas» con nota explicativa sobre «relámpagos».'
