translation:
  language: es
  text: Porque tú lo hiciste en secreto, pero yo haré esto delante de todo Israel y delante del sol[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a plena luz del día»; literalmente, «delante del sol».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la sentencia anunciada. «Porque» conserva la fuerza explicativa de כִּי con naturalidad en español.
- source_word: עָשִׂיתָ
  english_pob_choice: did it
  chosen_spanish: lo hiciste
  alternatives_spanish:
  - lo has hecho
  - actuaste
  lexicon: HALOT
  rationale: El verbo «hacer» en hebreo apunta a la acción culpable ya mencionada; «lo hiciste» mantiene la referencia elíptica sin añadir contenido no explicitado.
- source_word: בַּסָּתֶר
  english_pob_choice: in secret
  chosen_spanish: en secreto
  alternatives_spanish:
  - secretamente
  - a escondidas
  lexicon: HALOT
  rationale: La expresión contrasta con la exposición pública posterior. «En secreto» es idiomático y preserva el contraste.
- source_word: וַאֲנִי
  english_pob_choice: but I
  chosen_spanish: pero yo
  alternatives_spanish:
  - y yo
  lexicon: HALOT
  rationale: Aunque la conjunción puede ser simple copulativa, el contexto exige contraste adversativo entre la acción oculta de David y la acción pública de Yahvé.
- source_word: אֶעֱשֶׂה
  english_pob_choice: will do
  chosen_spanish: haré
  alternatives_spanish:
  - voy a hacer
  - actuaré
  lexicon: HALOT
  rationale: El futuro simple expresa bien el anuncio profético y mantiene la agencia directa de Dios.
- source_word: אֶת־הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - esto
  lexicon: HALOT
  rationale: Se conserva el demostrativo y la concreción del hebreo. «Esta cosa» suena algo más literal que «este asunto», pero sigue siendo aceptable en español bíblico contemporáneo.
- source_word: נֶגֶד כָּל יִשְׂרָאֵל
  english_pob_choice: before all Israel
  chosen_spanish: delante de todo Israel
  alternatives_spanish:
  - ante todo Israel
  - en presencia de todo Israel
  lexicon: HALOT
  rationale: נֶגֶד indica estar enfrente o en presencia de. «Delante de» comunica la publicidad del acto con naturalidad.
- source_word: וְנֶגֶד הַשָּׁמֶשׁ
  english_pob_choice: before the sun
  chosen_spanish: delante del sol
  alternatives_spanish:
  - ante el sol
  - a plena luz del día
  lexicon: HALOT
  rationale: Se conserva la imagen literal «antes/delante del sol», como en el POB inglés, para mantener el giro vívido del hebreo. No se sustituye por la interpretación «a plena luz del día» en el texto principal.
theological_decisions:
- issue: Contraste entre pecado oculto y juicio público
  english_pob_reading: David acted secretly; God will act publicly before all Israel and before the sun.
  chosen_spanish_reading: David lo hizo en secreto, pero Yahvé hará esta cosa delante de todo Israel y delante del sol.
  alternative_spanish_readings:
  - David lo hizo en secreto, pero Dios hará esta cosa públicamente delante de todo Israel y a plena luz del día.
  rationale: El versículo enfatiza la inversión entre lo oculto y lo expuesto. Mantener la imagen literal del sol preserva la fuerza retórica del hebreo y la distinción documental entre la culpa privada y la retribución pública.
  doctrine_reference: 2 Samuel 12:12; traducción con transparencia textual
- issue: Agencia divina directa en la sentencia
  english_pob_reading: I will do this thing
  chosen_spanish_reading: yo haré esta cosa
  alternative_spanish_readings:
  - haré que esto suceda
  - haré que se haga esta cosa
  rationale: El hebreo presenta un verbo de primera persona sin mitigación. La traducción conserva la agencia directa de Yahvé, sin suavizarla a una causativa perifrástica.
  doctrine_reference: 2 Samuel 12:12; agencia divina en el juicio
translation_notes:
  revision_awareness: El pasaje coincide estrechamente con el texto hebreo y con el audit trail inglés. La única decisión notable es mantener la imagen literal de נֶגֶד הַשָּׁמֶשׁ en el texto principal y ofrecer la lectura idiomática alternativa en nota, como hace el POB inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino conforme a la norma del proyecto.
  - Se mantiene «delante de» para נֶגֶד en dos miembros paralelos, para conservar el paralelismo semántico.
  - «En secreto»/«delante del sol» preserva el contraste oculto/público del versículo.
  - No se introduce terminología eclesiástica tradicional ajena al hebreo ni se atenúa la agencia directa de Dios.
