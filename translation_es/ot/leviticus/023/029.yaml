    rationale: Aunque es defendible, el inglés POB no exigía nota para «every person». Como el texto español no crea nueva ambigüedad, conviene simplificar y dejar solo las notas significativas.
  revised_spanish_text: Porque toda persona que no se humille[a] en este mismo día será cortada[b] de entre su pueblo.
