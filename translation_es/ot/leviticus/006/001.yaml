lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: And ... spoke
  chosen_spanish: habló
  alternatives_spanish:
  - y habló
  - entonces habló
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción narrativa. En español, «habló» transmite de forma natural el avance del relato; el contexto ya está marcado por la secuencia verbal, por lo que el «y» inicial puede omitirse sin perder el valor narrativo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino, no un título. La pauta española del proyecto es «Yahvé» como equivalente principal de YHWH, preservando el nombre del pacto en vez de sustituirlo por una convención litúrgica.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición marca el destinatario del habla. En español, «a» es la forma natural y precisa para introducir el complemento indirecto.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico y contemporáneo.
- source_word: לֵּאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: La fórmula introductoria hebrea se mantiene como participio de habla en español, reproduciendo la estructura de introducción al discurso directo que continúa en el siguiente versículo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se conserva el nombre personal de Dios revelado a Israel, en línea con la decisión doctrinal del POB inglés. «Yahvé» es la forma establecida en el proyecto para el Tetragrámaton y evita la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El pasaje coincide con el texto hebreo masorético recibido y con el audit trail inglés; no se observan revisiones textuales o decisiones de traducción adicionales que requieran matiz en español.
  spanish_consistency_notes:
  - Se mantiene el nombre divino como «Yahvé» según la terminología del proyecto.
  - «Habló ... diciendo» conserva la fórmula bíblica de introducción al discurso sin añadir contenido interpretativo.
  - No se añadió puntuación final para respetar el arranque de discurso que continúa en el versículo siguiente.
