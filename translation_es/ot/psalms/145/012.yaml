translation:
  language: es
  text: para dar a conocer a los hijos del hombre[a] sus actos poderosos y la gloria del esplendor de su reino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “a la humanidad” / “al género humano”. El hebreo dice literalmente “a los hijos del hombre”, una expresión genérica para los seres humanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְהוֹדִיעַ
  english_pob_choice: to make known
  chosen_spanish: dar a conocer
  alternatives_spanish:
  - hacer saber
  - declarar
  lexicon: HALOT
  rationale: 'El hifil de ידע tiene fuerza causativa: ''hacer saber'' o ''dar a conocer''. ''Dar a conocer'' comunica bien esa causatividad en español natural, sin endurecer el texto con un calco.'
- source_word: לִבְנֵי הָאָדָם
  english_pob_choice: to the sons of man
  chosen_spanish: a los hijos del hombre
  alternatives_spanish:
  - a los hijos de la humanidad
  - a la humanidad
  - a los hombres
  lexicon: HALOT
  rationale: Conserva la forma hebrea representativa y masculina del giro, cercana al auditable 'sons of man'. En español, 'hijos del hombre' suena más natural que una traducción mecánica, y mantiene visible la metáfora antropológica.
- source_word: הָאָדָם
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la humanidad
  - la gente
  - el ser humano
  lexicon: HALOT
  rationale: En la construcción con בני, אָדָם funciona genéricamente para la humanidad. 'El hombre' preserva el valor formal del hebreo en la expresión fija, mientras el sentido inclusivo se explica en nota.
- source_word: גְּבוּרֹתָיו
  english_pob_choice: his mighty acts
  chosen_spanish: sus proezas
  alternatives_spanish:
  - sus actos poderosos
  - sus hechos poderosos
  - sus grandes obras
  lexicon: HALOT
  rationale: גבורות alude a obras de poder, hazañas o actos de fuerza. 'Proezas' es un equivalente idiomático y digno en español bíblico contemporáneo, sin perder la idea de acciones poderosas.
- source_word: וּכְבוֹד
  english_pob_choice: and the glorious splendor
  chosen_spanish: y el esplendor glorioso
  alternatives_spanish:
  - y la gloria esplendorosa
  - y la gloria
  - y el esplendor
  lexicon: HALOT
  rationale: כבוד aquí se coordina poéticamente con הדר; traducirlo sólo como 'gloria' puede empobrecer el paralelismo. 'Esplendor glorioso' reproduce ambas dimensiones con fluidez en español.
- source_word: הֲדַר
  english_pob_choice: splendor
  chosen_spanish: esplendor
  alternatives_spanish:
  - majestad
  - honor
  lexicon: HALOT
  rationale: הדר remite a brillo, majestad o esplendor. 'Esplendor' es la opción más directa y poética, y enlaza bien con el sustantivo anterior.
- source_word: מַלְכוּתוֹ
  english_pob_choice: his kingdom
  chosen_spanish: de su reino
  alternatives_spanish:
  - de su reinado
  - de su soberanía
  - de su reino real
  lexicon: HALOT
  rationale: מַלְכוּת puede significar reino, reinado o realeza. En este contexto de alabanza real, 'reino' es la opción más natural y reconocible en español.
theological_decisions:
- issue: Expresión genérica en לִבְנֵי הָאָדָם
  english_pob_reading: Preserve the Hebrew-shaped phrase as 'the sons of man' in the main text
  chosen_spanish_reading: Conservar 'los hijos del hombre' como giro semitético en el texto principal
  alternative_spanish_readings:
  - la humanidad
  - la gente
  - los seres humanos
  rationale: El hebreo usa una expresión masculina representativa para hablar de la humanidad en general. Mantenerla en el texto principal respeta la forma del original; la nota explica que el sentido es inclusivo y no exclusivo de varones.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
translation_notes:
  revision_awareness: 'El borrador sigue el consenso alto del audit trail inglés: mantiene la frase hebrea representativa en el texto principal, conserva el paralelismo poético de ''proezas'' y ''esplendor glorioso'', y no introduce cambios doctrinales ni revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Usé 'dar a conocer' para el valor causativo de לְהוֹדִיעַ, acorde con el principio de equivalencia óptima.
  - Mantuve 'reino' para מַלְכוּת, que en este salmo de alabanza real es la opción más clara y natural.
  - La nota al pie preserva la lectura inclusiva sin borrar la forma hebrea masculina del giro.
  - El texto evita el calco rígido de 'gloria de la esplendor' y conserva un castellano publicable y digno.
