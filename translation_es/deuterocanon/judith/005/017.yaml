translation:
  language: es
  text: Y mientras no pecaban[a] delante de su Dios, las cosas buenas[b] estaban con ellos, porque un Dios que odia la injusticia está con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras no pecaron». El español puede reflejar el aoristo negado como una acción puntual o como una conducta continua en el período descrito.
    reason: lexical_alternative
  - marker: b
    text: O «los bienes estaban con ellos». La expresión griega es idiomática y puede referirse a bienestar, favor o condiciones favorables.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ἕως
  english_pob_choice: And as long as
  chosen_spanish: Y mientras no
  alternatives_spanish:
  - Y mientras
  - Y en tanto que
  lexicon: LSJ
  rationale: 'La construcción introduce una condición durativa: el estado favorable se mantiene durante el tiempo en que no pecan. «Mientras no» expresa bien esa continuidad condicional en español sin añadir una causalidad que no está en el griego.'
- source_word: οὐχ ἥμαρτον
  english_pob_choice: they did not sin
  chosen_spanish: no pecaban
  alternatives_spanish:
  - no pecaron
  - no estaban pecando
  lexicon: BDAG
  rationale: El aoristo negado dentro del marco temporal funciona como una referencia al comportamiento continuo del pueblo. «No pecaban» suena natural en español y preserva la idea de conducta reiterada o característica en ese lapso, sin forzar un aspecto más técnico de lo que el contexto exige.
- source_word: ἐνώπιον τοῦ θεοῦ αὐτῶν
  english_pob_choice: before their God
  chosen_spanish: delante de su Dios
  alternatives_spanish:
  - ante su Dios
  - en presencia de su Dios
  lexicon: LSJ
  rationale: «Delante de» conserva el valor relacional y evaluativo de ἐνώπιον y resulta claro en español. «Su Dios» mantiene la referencia posesiva del texto griego sin necesidad de mayor explicitación.
- source_word: ἦν μετʼ αὐτῶν τὰ ἀγαθά
  english_pob_choice: good things were with them
  chosen_spanish: el bien estaba con ellos
  alternatives_spanish:
  - las cosas buenas estaban con ellos
  - los bienes estaban con ellos
  lexicon: LSJ
  rationale: La expresión griega es idiomática. «El bien» intenta preservar el sustantivo colectivo y la amplitud semántica de τὰ ἀγαθά sin estrecharlo demasiado a «prosperidad» ni volverlo demasiado material. Se mantiene la imagen de algo favorable que acompaña al pueblo.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la situación descrita. «Porque» es la opción más directa y transparente en español moderno.
- source_word: θεὸς μισῶν ἀδικίαν
  english_pob_choice: a God who hates injustice
  chosen_spanish: Dios, que odia la injusticia
  alternatives_spanish:
  - un Dios que odia la injusticia
  - Dios, que aborrece la injusticia
  lexicon: LSJ
  rationale: 'Se conserva el carácter cualitativo de la expresión griega: no solo dice que Dios odia un acto concreto, sino que lo caracteriza como el Dios que rechaza la injusticia. «Odia» mantiene la fuerza del verbo sin añadir intensidad no demostrada por el texto.'
- source_word: ἀδικίαν
  english_pob_choice: injustice
  chosen_spanish: la injusticia
  alternatives_spanish:
  - la maldad
  - el agravio
  - la injusticia o la maldad
  lexicon: BDAG
  rationale: «Injusticia» conserva la dimensión moral y jurídica del término y corresponde bien al contexto. Evita el desplazamiento hacia un vocabulario más doctrinal o más general como «maldad».
- source_word: μετʼ αὐτῶν ἐστίν
  english_pob_choice: is with them
  chosen_spanish: está con ellos
  alternatives_spanish:
  - estaba con ellos
  - permanece con ellos
  lexicon: BDAG
  rationale: Se conserva el presente del griego en la cláusula final para mantener la afirmación gnómica o caracterizadora sobre Dios. El cambio de pasado a presente en español reproduce la tensión textual que el audit trail preserva.
theological_decisions:
- issue: Tensión entre el pasado narrativo y el presente gnómico en el cierre
  english_pob_reading: 'Keep the final clause in the present: ''is with them.'''
  chosen_spanish_reading: Mantener «está con ellos» en presente.
  alternative_spanish_readings:
  - estaba con ellos
  - permanece con ellos
  rationale: El griego pasa de una descripción narrativa pasada a una afirmación presente acerca del carácter y la cercanía de Dios. Conservar el presente evita suavizar esa transición y preserva el énfasis teológico en la fidelidad actual de Dios.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Valor de ἀδικίαν en el contexto
  english_pob_reading: injustice
  chosen_spanish_reading: injusticia
  alternative_spanish_readings:
  - maldad
  - mal proceder
  - injusticia o maldad
  rationale: El contexto narrativo habla de oposición moral y relacional a Dios, no de una categoría paulina técnica. «Injusticia» es suficientemente amplia y mantiene el tono ético-jurídico del pasaje.
  doctrine_reference: Consistencia terminológica documentada.
translation_notes:
  revision_awareness: El borrador sigue el último estado del audit trail en el que se prefirió «good things» frente a «prosperity» para τὰ ἀγαθά, evitando estrechar el sentido. Se conserva la clausula final en presente para reflejar la decisión teológica de mantener la tensión entre narración pasada y afirmación gnómica.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός según el estándar del proyecto.
  - Se evita «Cristo/Mesías» porque no aparece en este versículo.
  - Se mantiene un registro sobrio y bíblico, sin calcos innecesarios del inglés.
  - La traducción conserva la alternancia temporal del griego (pasado en la primera mitad, presente al final).
