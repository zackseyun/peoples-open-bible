id: ISA.41.15
reference: Isaiah 41:15
source:
  edition: WLC
  text: הִנֵּ֣ה שַׂמְתִּ֗י/ךְ לְ/מוֹרַג֙ חָר֣וּץ חָדָ֔שׁ בַּ֖עַל פִּֽיפִיּ֑וֹת תָּד֤וּשׁ הָרִים֙ וְ/תָדֹ֔ק וּ/גְבָע֖וֹת כַּ/מֹּ֥ץ תָּשִֽׂים׃
translation:
  text: Behold[a], I have made you a new sharp threshing sledge with double edges; you will thresh the mountains and crush them, and you will make the hills like chaff.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'with many cutting edges' or 'with serrated teeth'; the Hebrew literally says 'possessing edges/mouths.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִנֵּה
  chosen: Behold
  alternatives:
  - Look
  - See
  lexicon: HALOT
  rationale: Discourse marker drawing attention emphatically to what follows. 'Behold' preserves the prophetic force better than flatter modern options, while remaining understandable.
- source_word: שַׂמְתִּיךְ
  chosen: I have made you into
  alternatives:
  - I have set you as
  - I make you
  lexicon: HALOT
  rationale: שׂוּם commonly means 'set/place/make.' In this metaphorical predication with לְמוֹרַג, 'made you into' communicates transformation into an instrument more naturally in English than 'set you as.' Perfect is rendered as present-resultative 'have made' in context.
- source_word: לְמוֹרַג
  chosen: into a ... threshing sledge
  alternatives:
  - for a threshing sledge
  - into a threshing instrument
  lexicon: HALOT
  rationale: מוֹרַג denotes a threshing implement, often a sledge/board used to crush grain. 'Threshing sledge' is specific and idiomatic enough for modern readers.
- source_word: חָרוּץ
  chosen: sharp
  alternatives:
  - threshing
  - decisive
  lexicon: HALOT
  rationale: In this context modifying the threshing implement, the sense is its sharp/cutting character, not the abstract sense 'diligent' or other homonymous values. 'Sharp' fits the imagery of cutting edges.
- source_word: חָדָשׁ
  chosen: new
  lexicon: HALOT
  rationale: Straightforward adjective modifying the instrument.
- source_word: בַּעַל פִּיפִיּוֹת
  chosen: with double edges
  alternatives:
  - having mouths/edges
  - with many blades
  - with serrated teeth
  lexicon: HALOT
  rationale: בעל means 'possessing/having.' פִּיפִיּוֹת literally relates to 'mouths/edges'; in weapon/tool imagery it denotes cutting edges. 'Double edges' is a natural English rendering that preserves the dual-edged sharpness without over-specifying the exact construction.
- source_word: תָּדוּשׁ
  chosen: you will thresh
  alternatives:
  - you shall thresh
  lexicon: HALOT
  rationale: דּוּשׁ is the standard verb for threshing. Future sense fits the promise context.
- source_word: הָרִים
  chosen: mountains
  lexicon: HALOT
  rationale: Literal lexical value retained; in context likely metaphorical for great obstacles or nations, but the image should remain untranslated.
- source_word: וְתָדֹק
  chosen: and crush them
  alternatives:
  - and beat them small
  - and pulverize them
  lexicon: HALOT
  rationale: דקק conveys crushing to smallness. 'Them' is supplied in English from the prior object 'mountains.' 'Crush' is strong and natural; the following clause further explains the result.
- source_word: גְבָעוֹת
  chosen: hills
  lexicon: HALOT
  rationale: Standard rendering paired with 'mountains' for poetic parallelism.
- source_word: כַּמֹּץ
  chosen: like chaff
  lexicon: HALOT
  rationale: מוֹץ is chaff, the light worthless husk separated in threshing; the simile should be preserved directly.
- source_word: תָּשִׂים
  chosen: you will make
  alternatives:
  - you will turn
  - you will render
  lexicon: HALOT
  rationale: 'Again from שׂוּם, here with resultative force: the hills are made like chaff. ''Make'' is simple and faithful.'
