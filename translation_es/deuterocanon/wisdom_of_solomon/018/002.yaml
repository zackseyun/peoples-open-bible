translation:
  language: es
  text: porque los que antes habían sido atacados por ellos daban gracias de que no estaban sufriendo daño[a], y pedían un favor[b] por la diferencia entre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El texto griego aquí es sintácticamente difícil en este testimonio, especialmente en la expresión correspondiente a ''no estar sufriendo daño''. La traducción sigue el sentido más probable en contexto: una antigua hostilidad ha cedido a la gratitud y a una súplica de favor o perdón.'
    reason: textual_variant
  - marker: b
    text: 'O: ''pedían un favor respecto de su desavenencia/conflicto''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ οὐ βλάπτοντιν
  english_pob_choice: they were not being harmed
  chosen_spanish: no estaban siendo dañados
  alternatives_spanish:
  - no eran perjudicados
  - no sufrían daño
  lexicon: LSJ
  rationale: El griego transmitido es difícil y probablemente irregular; en contexto, βλάπτω significa causar daño. La pasiva progresiva en español conserva el sentido de no recibir daño, sin hacer la frase más dura de lo que permite el testimonio.
- source_word: προπολεμημένοι
  english_pob_choice: had been attacked before
  chosen_spanish: los que antes habían sido atacados por ellos
  alternatives_spanish:
  - los que antes habían estado en guerra con ellos
  - los que antes habían sido combatidos por ellos
  lexicon: LSJ
  rationale: El participio perfecto con προ- señala una acción hostil previa. En español, 'habían sido atacados por ellos' expresa con claridad la relación anterior de conflicto que el contexto exige.
- source_word: εὐχαριστοῦσιν
  english_pob_choice: they gave thanks
  chosen_spanish: daban gracias
  alternatives_spanish:
  - expresaban gratitud
  - agradecían
  lexicon: LSJ
  rationale: Es el equivalente verbal directo de agradecer. 'Daban gracias' mantiene el valor de acción en curso o general dentro de la narración.
- source_word: τὸ διενεχθῆναι
  english_pob_choice: their hostility
  chosen_spanish: la diferencia entre ellos
  alternatives_spanish:
  - su conflicto
  - su separación
  - su enemistad
  lexicon: LSJ
  rationale: 'El texto inglés revisado optó por una formulación más literal respecto del sustantivo derivado de διαφέρω: una diferencia o desavenencia entre partes. En español, ''la diferencia entre ellos'' conserva esa ambigüedad sin cerrarla demasiado hacia una interpretación doctrinalmente más fuerte.'
- source_word: χάριν ἐδέοντο
  english_pob_choice: they asked favor
  chosen_spanish: pedían favor
  alternatives_spanish:
  - pedían gracia
  - suplicaban favor
  - rogaban clemencia
  lexicon: LSJ
  rationale: La frase griega pide literalmente favor/gracia. 'Pedían favor' sigue de cerca la forma y evita introducir de manera innecesaria una interpretación más definida como 'perdón'.
theological_decisions:
- issue: Cómo reflejar la secuencia de antigua hostilidad seguida de gratitud y petición
  english_pob_reading: former hostility has given way to gratitude and a plea for pardon/favor
  chosen_spanish_reading: antigua agresión seguida de gratitud por no sufrir daño y de una petición de favor
  alternative_spanish_readings:
  - gratitud por la paz después de la guerra
  - petición de perdón por la enemistad
  rationale: 'La lectura española mantiene el movimiento del versículo: primero hubo ataque previo, luego gratitud por no seguir padeciendo daño, y finalmente una petición vinculada a la relación rota. Se evita convertir ''favor'' en una fórmula explícita de perdón que el griego no exige de manera inequívoca.'
  doctrine_reference: 'PHILOSOPHY.md: preserve source uncertainty honestly; lexical tension should remain visible where the source is difficult'
- issue: Tratamiento de la dificultad sintáctica del testimonio griego
  english_pob_reading: the Greek text here is syntactically difficult in this witness
  chosen_spanish_reading: se conserva la dificultad del testimonio sin forzar una frase totalmente lisa
  alternative_spanish_readings:
  - normalizar la frase como un español más interpretativo
  - resolver la dificultad con una paráfrasis libre
  rationale: Como el texto base es irregular, la traducción española procura claridad sin ocultar la relación algo tensa entre las cláusulas. La elección de 'la diferencia entre ellos' y 'pedían favor' deja visible la incertidumbre del original.
  doctrine_reference: 'PHILOSOPHY.md: source uncertainty must be represented, not erased'
translation_notes:
  revision_awareness: 'Se atendió la revisión más reciente, que pidió reflejar más de cerca el griego: se aclaró que los sujetos son los que habían sido atacados antes, se mantuvo explícitamente la idea de no recibir daño, y se prefirió una versión más literal de ''pedían favor'' para τὸ διενεχθῆναι χάριν ἐδέοντο.'
  spanish_consistency_notes:
  - Se usa 'favor' para χάρις en este contexto relacional, no 'gracia', para conservar la literalidad sin sonar eclesiástico de más.
  - Se evita 'siervo', 'Cristo' o 'SEÑOR' porque no aparecen en el pasaje ni corresponden a esta unidad.
  - '''Daban gracias'' y ''pedían favor'' mantienen la coordinación verbal del griego.'
  - La nota a conserva la advertencia sobre la dificultad sintáctica del testimonio griego; la nota b ofrece la alternativa léxica que el inglés POB también preservó.
