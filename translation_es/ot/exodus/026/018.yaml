translation:
  language: es
  text: 'Y harás las tablas[a] para el tabernáculo: veinte tablas para el lado sur, hacia el sur.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «armazones» en vez de «tablas»; el término hebreo se refiere a las piezas estructurales del tabernáculo y puede entenderse de cualquiera de las dos maneras en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y harás de hacer
  - Y deberás hacer
  - Y harás tú
  lexicon: HALOT
  rationale: En contexto instrucional, el perfecto con waw funciona como mandato/directiva. «Harás» mantiene la fuerza imperativa en un español natural y digno, sin añadir perífrasis innecesarias.
- source_word: הַקְּרָשִׁים
  english_pob_choice: the frames
  chosen_spanish: los armazones
  alternatives_spanish:
  - los marcos
  - las tablas
  - las vigas
  lexicon: HALOT
  rationale: El término hebreo designa las piezas estructurales del tabernáculo. «Armazones» comunica mejor la función portante que «tablas» o «tableros», y evita reducir el sentido a una lámina plana.
- source_word: לַמִּשְׁכָּן
  english_pob_choice: for the tabernacle
  chosen_spanish: para el tabernáculo
  alternatives_spanish:
  - para la morada
  - para la tienda
  - para el lugar de morada
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente tradicional y preciso en español para el santuario estructural del Éxodo. Conserva la referencia cultual sin forzar un giro explicativo.
- source_word: עֶשְׂרִים קֶרֶשׁ
  english_pob_choice: twenty frames
  chosen_spanish: veinte armazones
  alternatives_spanish:
  - veinte tablas
  - veinte piezas
  - veinte paneles
  lexicon: HALOT
  rationale: El hebreo usa una construcción de cantidad con sustantivo singular; en español idiomático se expresa naturalmente en plural. Se conserva la misma unidad estructural ya elegida para הַקְּרָשִׁים.
- source_word: לִפְאַת
  english_pob_choice: for the side
  chosen_spanish: para el lado
  alternatives_spanish:
  - para la parte
  - para el flanco
  - para el costado
  lexicon: HALOT
  rationale: En una descripción arquitectónica, «lado» es la forma más clara y natural en español. Mantiene el sentido espacial sin cargarlo con matices innecesarios.
- source_word: נֶגְבָּה תֵימָנָה
  english_pob_choice: the south side, southward
  chosen_spanish: sur, hacia el sur
  alternatives_spanish:
  - lado sur, al sur
  - lado meridional, hacia el sur
  - lado del sur, hacia el sur
  lexicon: HALOT
  rationale: 'Los dos términos direccionales hebreos intensifican o especifican la orientación meridional. Se conservan ambos en español para no aplanar la duplicación: primero como dirección («sur») y luego como orientación («hacia el sur»).'
translation_notes:
  revision_awareness: El pasaje no presenta cambios textuales o revisiones recientes en el paquete auditado; la redacción sigue el estado de alta concordancia indicado por el control cruzado.
  spanish_consistency_notes:
  - Se mantiene «tabernáculo» como término técnico cultual coherente con la serie de Éxodo 26.
  - Se evita «SEÑOR» y no hay nombres divinos en este versículo.
  - Se conserva una estructura breve y directa, acorde con un mandato constructivo.
  - «Armazones» se usa con valor técnico-constructivo y debe mantenerse consistente en el contexto inmediato si el resto de la sección lo permite.
