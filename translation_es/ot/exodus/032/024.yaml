  to: 'Y les dije[a]: «El que tenga oro, quítenselo». Ellos me lo dieron, y yo lo arrojé al fuego, y salió este becerro.'
  rationale: Se corrige «quíteselo» a «quítenselo» para reflejar la segunda persona plural del hebreo y mejorar la fidelidad gramatical. Se retoca levemente la nota para mantener consistencia con esa forma plural y conservar la alternativa léxica documentada, sin cambiar el sentido general del versículo.
