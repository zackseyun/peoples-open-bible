translation:
  language: es
  text: Merodeó entre los leones; llegó a ser un león joven. Aprendió a desgarrar presa; devoró hombres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gente» / «humanidad»; el hebreo אָדָם puede funcionar aquí con sentido colectivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְהַלֵּךְ
  english_pob_choice: prowled
  chosen_spanish: anduvo
  alternatives_spanish:
  - merodeó
  - se paseó
  lexicon: HALOT
  rationale: El hitpael de הלך expresa movimiento repetido o deambulante dentro de la metáfora. En español, «anduvo entre» conserva ese desplazamiento sin añadir un matiz demasiado interpretativo; «merodeó» sería posible, pero en este contexto puede sonar más cargado de intención que el hebreo exige.
- source_word: בְּתוֹךְ אֲרָיוֹת
  english_pob_choice: among the lions
  chosen_spanish: entre los leones
  alternatives_spanish:
  - en medio de los leones
  - entre leones
  lexicon: HALOT
  rationale: בְּתוֹךְ significa «en medio de / entre». «Entre los leones» es natural en español y mantiene la imagen del sujeto moviéndose dentro del grupo de leones.
- source_word: כְּפִיר
  english_pob_choice: young lion
  chosen_spanish: leoncillo
  alternatives_spanish:
  - joven león
  - león joven
  lexicon: HALOT
  rationale: כְּפִיר designa un león joven y vigoroso. «Leoncillo» comunica juventud y cierto diminutivo afectivo en español, aunque «joven león» sería más literal. Se evita «cachorro» porque puede sonar demasiado pequeño frente al matiz del hebreo.
- source_word: הָיָה
  english_pob_choice: became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - se convirtió en
  - era
  lexicon: HALOT
  rationale: Aquí היה marca desarrollo dentro de la alegoría; no solo estado. «Llegó a ser» conserva ese avance narrativo mejor que un simple «era».
- source_word: וַיִּלְמַד
  english_pob_choice: learned
  chosen_spanish: aprendió
  alternatives_spanish:
  - fue entrenado
  - se acostumbró
  lexicon: HALOT
  rationale: El verbo significa de forma directa «aprendió». El contexto sugiere conducta depredadora adquirida, pero el hebreo no explicita un agente externo; por eso se mantiene «aprendió».
- source_word: לִטְרָף טֶרֶף
  english_pob_choice: to tear prey
  chosen_spanish: a desgarrar presa
  alternatives_spanish:
  - a arrebatar presa
  - a devorar presa
  lexicon: HALOT
  rationale: La construcción infinitiva con objeto cognado intensifica la acción violenta. «Desgarrar presa» preserva la imagen leonina y el carácter brutal del hebreo mejor que una expresión más genérica.
- source_word: אָדָם
  english_pob_choice: man / men
  chosen_spanish: hombres
  alternatives_spanish:
  - gente
  - humanidad
  lexicon: HALOT
  rationale: En este verso אָדָם funciona de manera colectiva y genérica como objeto de la depredación. «Hombres» conserva la concreción del hebreo singular/colectivo sin diluirla en «gente» o «humanidad».
- source_word: אָכָל
  english_pob_choice: devoured
  chosen_spanish: devoró
  alternatives_spanish:
  - comió
  - consumió
  lexicon: HALOT
  rationale: En la imagen animal depredadora, «devoró» es la equivalencia española más vívida y natural. «Comió» sería demasiado plano; «consumió» sería menos imagístico.
theological_decisions:
- issue: Valor colectivo de אָדָם en la cláusula final
  english_pob_reading: man / men; Hebrew 'man' can function collectively here.
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - gente
  - humanidad
  rationale: La frase no formula una tesis doctrinal sobre el ser humano, sino que integra una metáfora política y depredadora. «Hombres» preserva el valor colectivo señalado en el aparato inglés y mantiene la fuerza concreta del hebreo sin neutralizarla.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy #4; Contested terms table for אָדָם'
translation_notes:
  revision_awareness: El testigo inglés pasó de «devoured man» a «devoured men» en la revisión más reciente para reflejar el valor colectivo de אָדָם. La redacción española sigue esa revisión y conserva el tono predatorio del verso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - «Leoncillo» evita el calco rígido de «joven león» sin perder el referente zoológico del hebreo.
  - Se preserva la secuencia verbal en pasado simple para reflejar la narración poética continua.
