source:
  edition: SBLGNT
  text: οἱ μὲν οὖν προπεμφθέντες ὑπὸ τῆς ἐκκλησίας διήρχοντο τήν ⸀τε Φοινίκην καὶ Σαμάρειαν ἐκδιηγούμενοι τὴν ἐπιστροφὴν τῶν ἐθνῶν, καὶ ἐποίουν χαρὰν μεγάλην πᾶσι τοῖς ἀδελφοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/acts/015/003.yaml
  text: So then[a], having been sent on their way by the church, they passed through both Phoenicia and Samaria, describing in detail the conversion of the Gentiles[b], and they brought great joy to all the brothers.
  footnotes:
  - marker: a
    text: Or 'the turning of the Gentiles.'
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here likely refers to fellow believers generally, including women.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그래서 그들은 교회의 전송을 받아 페니키아와 사마리아를 거쳐 가면서 이방인들의 회심을 자세히 전하여 모든 형제들에게 큰 기쁨을 주었습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐκκλησίας
  english_pob_choice: church
  chosen_korean: 교회
  alternatives_korean:
  - 회중
  lexicon: BDAG
  rationale: 안디옥 공동체가 공식적으로 사절단을 파송하는 제도적 행위 맥락이므로 「교회」를 채택한다.
- source_word: ἐπιστροφὴν τῶν ἐθνῶν
  english_pob_choice: conversion of the Gentiles
  chosen_korean: 이방인들의 회심
  alternatives_korean:
  - 이방인들이 돌아온 일
  lexicon: BDAG
  rationale: ἐπιστροφή는 하나님께로 돌아서는 회심을 가리키는 신학 용어이며, 한국어 「회심」이 가장 정확하다.
