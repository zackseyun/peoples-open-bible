translation:
  language: es
  text: Y vestirás a Aarón con las vestiduras santas[a], lo ungirás y lo consagrarás, y me servirá como sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y ministrará como sacerdote para mí». El verbo hebreo expresa el ejercicio de la función sacerdotal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִלְבַּשְׁתָּ
  english_pob_choice: you shall clothe
  chosen_spanish: vestirás
  alternatives_spanish:
  - pondrás
  - vestirás con
  lexicon: HALOT
  rationale: 'El hifil de לבשׁ es causativo: hacer que Aarón lleve las vestiduras. En español, «vestir» comunica de forma natural esa acción de investidura sin perder el sentido ritual. «Ponerle» sería más descriptivo pero menos elegante; «vestirás con» suena forzado.'
- source_word: אַהֲרֹן
  english_pob_choice: Aaron
  chosen_spanish: Aarón
  alternatives_spanish:
  - Aaron
  lexicon: convención bíblica española
  rationale: Se usa la forma española estable del nombre propio, propia de registros bíblicos en español.
- source_word: בִּגְדֵי הַקֹּדֶשׁ
  english_pob_choice: the holy garments
  chosen_spanish: las vestiduras santas
  alternatives_spanish:
  - las vestiduras sagradas
  - las vestiduras de santidad
  lexicon: HALOT
  rationale: El constructo hebreo significa literalmente «vestiduras de santidad». «Vestiduras santas» conserva el valor cultual y suena más natural en español que un giro más literal como «vestiduras de santidad». Se evita «sagradas» porque en español puede sonar más litúrgico-general que específicamente ritual.
- source_word: וּמָשַׁחְתָּ
  english_pob_choice: you shall anoint
  chosen_spanish: lo ungirás
  alternatives_spanish:
  - lo consagrarás con óleo
  - lo ungirás con aceite
  lexicon: HALOT
  rationale: «Ungir» es el equivalente bíblico directo de משׁח en contextos de instalación sacerdotal. No se añade «con aceite» porque el contexto inmediato y la tradición léxica ya lo implican.
- source_word: וְקִדַּשְׁתָּ
  english_pob_choice: you shall consecrate
  chosen_spanish: lo consagrarás
  alternatives_spanish:
  - lo santificarás
  - lo harás santo
  lexicon: HALOT
  rationale: En este contexto קדשׁ expresa la designación ritual para servicio sagrado. «Consagrar» transmite mejor la investidura cultual que «santificar», que en español puede sugerir purificación moral más que nombramiento ritual.
- source_word: וְכִהֵן לִי
  english_pob_choice: and he shall serve as priest to me
  chosen_spanish: y él servirá como sacerdote para mí
  alternatives_spanish:
  - y ministrará como sacerdote para mí
  - y ejercerá como sacerdote para mí
  lexicon: HALOT
  rationale: El verbo כהן denota ejercer el oficio sacerdotal. «Servirá como sacerdote» preserva esa función sin reducirlo a una mera idea de servicio general. Se mantiene «para mí» porque refleja con claridad la relación de servicio dirigida a Yahvé.
theological_decisions:
- issue: Secuencia ritual de investidura sacerdotal
  english_pob_reading: Differentiate clothing, anointing, and consecration as distinct acts before priestly service.
  chosen_spanish_reading: Diferenciar vestir, ungir y consagrar como actos distintos y sucesivos antes del ejercicio sacerdotal.
  alternative_spanish_readings:
  - fusionar todo en «ordénalo»
  - reducirlo a «dedícalo»
  rationale: El hebreo presenta una cadena de acciones rituales específicas. Mantenerlas separadas evita borrar la precisión del rito y no introduce categorías eclesiásticas posteriores que el texto no usa.
  doctrine_reference: Éxodo 40:13; filosofía de traducción POB §§1, 3, 6
- issue: Valor de וְכִהֵן לִי
  english_pob_reading: 'Render as a direct future/result clause: ''and he shall serve as priest to me.'''
  chosen_spanish_reading: 'Renderizarlo como cláusula coordinada de resultado: «y él servirá como sacerdote para mí».'
  alternative_spanish_readings:
  - «para que sirva como sacerdote para mí»
  - «y ministrará como sacerdote para mí»
  rationale: Después de los imperativos de segunda persona, el verbo de tercera persona expresa el resultado esperado del rito. «Y él servirá» sigue de cerca la secuencia hebrea sin forzar explícitamente una finalidad que la revisión inglesa decidió no destacar.
  doctrine_reference: Éxodo 40:13; filosofía de traducción POB §1
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente, que prefirió «and he shall serve as priest to me» frente a una paráfrasis de propósito. Por eso el español adopta una coordinación simple («y él servirá...»), sin añadir «para que».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el tetragrámaton, así que la cláusula final se vierte de forma referida a la primera persona divina («para mí»).
  - 'Se conserva la distinción entre acciones rituales: vestir, ungir y consagrar, evitando resumirlas en un solo término.'
  - «Sacerdote» se usa para כהן porque el contexto define el oficio; no se sustituye por «sacerdocio» ni por un verbo más genérico.
