translation:
  language: es
  text: Los rebeldes[a] se han hundido profundamente hasta la matanza, pero yo soy un reproche[b] para todos ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «los apóstatas».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «disciplina», «corrección» o «instrucción».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׁחֲטָה
  english_pob_choice: into slaughter
  chosen_spanish: en la matanza
  alternatives_spanish:
  - en el sacrificio
  - hacia la matanza
  - en slaughter
  lexicon: HALOT
  rationale: שַׁחֲטָה se entiende aquí como 'matanza' o 'sacrificio sangriento'. 'En la matanza' conserva la imagen de inmersión en violencia y evita suavizar el término. No se introduce una preposición más interpretativa que altere el movimiento expresado por el hebreo y el inglés auditado.
- source_word: שֵׂטִים
  english_pob_choice: the rebels
  chosen_spanish: los rebeldes
  alternatives_spanish:
  - los apóstatas
  - los que se desvían
  - los desviados
  lexicon: HALOT
  rationale: El término apunta a quienes se apartan o se desvían. 'Rebeldes' comunica bien la acusación profética en español y mantiene la fuerza moral sin volverse excesivamente eclesiástico como 'apóstatas'.
- source_word: הֶעְמִיקוּ
  english_pob_choice: have gone deep
  chosen_spanish: se han hundido profundamente
  alternatives_spanish:
  - han ido muy profundo
  - se han metido hondamente
  - han cavado hondo
  lexicon: HALOT
  rationale: 'El verbo hiphil expresa intensificación: ''hacer profundo'' o ''hundirse profundamente''. ''Se han hundido profundamente'' preserva la metáfora de descenso y el aspecto perfectivo del hebreo, con buen español.'
- source_word: וַאֲנִי
  english_pob_choice: but I
  chosen_spanish: pero yo
  alternatives_spanish:
  - y yo
  - mas yo
  lexicon: HALOT
  rationale: En contexto, la conjunción es adversativa. 'Pero yo' marca con claridad el contraste entre la conducta del pueblo y la respuesta de Yahvé.
- source_word: מוּסָר
  english_pob_choice: a rebuke
  chosen_spanish: reprensión
  alternatives_spanish:
  - disciplina
  - corrección
  - amonestación
  lexicon: HALOT
  rationale: מוּסָר puede ser disciplina, corrección, instrucción o reprensión. Dado el marco de denuncia y juicio, 'reprensión' refleja mejor la fuerza correctiva y judicial que la versión inglesa auditada terminó privilegiando. Se evita 'instrucción' por ser demasiado débil en este contexto.
- source_word: לְכֻלָּם
  english_pob_choice: to all of them
  chosen_spanish: para todos ellos
  alternatives_spanish:
  - a todos ellos
  - contra todos ellos
  - para todos
  lexicon: HALOT
  rationale: La preposición ל admite varias posibilidades. 'Para todos ellos' mantiene la estructura nominal del hebreo con naturalidad en español y no fuerza una lectura más dura de 'contra' que el texto no exige explícitamente.
theological_decisions:
- issue: Identificación del sujeto divino en la segunda cola
  english_pob_reading: I am a rebuke for all of them.
  chosen_spanish_reading: pero yo soy reprensión para todos ellos.
  alternative_spanish_readings:
  - pero yo soy disciplina para todos ellos
  - pero yo soy instrucción para todos ellos
  rationale: Se preserva que el hablante es Yahvé y que su relación con el pueblo es de juicio correctivo. 'Reprensión' mantiene la tensión entre instrucción y castigo sin resolverla en un solo polo. Esto sigue la lectura auditada que privilegia el contexto profético inmediato.
  doctrine_reference: Denuncia profética y disciplina divina en el marco del pacto; mantener la tensión lexical de מוּסָר.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de 'a correction' a 'a rebuke' para מוּסָר. La traducción española sigue esa revisión con 'reprensión', manteniendo el tono judicial-correctivo y evitando una solución demasiado pedagógica. También se conserva la ambigüedad de שֵׂטִים como rebeldía/apostasía mediante nota alternativa.
  spanish_consistency_notes:
  - Se usó 'Yahvé' según la norma del proyecto para el nombre divino, aunque aquí el hebreo no lo escriba explícitamente; el hablante es divino en el contexto inmediato.
  - '''Rebeldes'' se prefirió a ''apóstatas'' en el cuerpo para mejor fluidez y porque la alternativa ya queda registrada en nota.'
  - '''Reprensión'' se eligió para evitar una lectura meramente educativa de מוּסָר y reflejar la dimensión judicial del pasaje.'
  - La estructura general conserva el paralelismo breve del hebreo y no añade elementos explicativos no presentes en el texto.
