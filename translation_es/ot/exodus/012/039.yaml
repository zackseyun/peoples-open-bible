base_translation:
  language: en
  yaml_path: translation/ot/exodus/012/039.yaml
  text: And they baked the dough that they had brought out from Egypt into unleavened cakes[a], because it had not leavened; for they had been driven out from Egypt and could not delay[c][b], and they had not prepared provisions for themselves either.
  footnotes:
  - marker: a
    text: Or 'as cakes of unleavened bread.' The Hebrew expression refers to bread-cakes made without leaven.
    reason: lexical_alternative
  - marker: b
    text: Or 'because it was not leavened' or 'because it had not risen.' The Hebrew verb refers to the dough not becoming leavened before baking.
    reason: lexical_alternative
  - marker: c
    text: Or 'could not linger.' The sense is that they had no time to remain or wait.
    reason: lexical_alternative
