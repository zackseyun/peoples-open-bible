translation:
  language: es
  text: Cuando los asdoditas se levantaron temprano al día siguiente, he aquí, Dagón había caído rostro en tierra delante del arca de Yahvé. Entonces tomaron a Dagón y lo devolvieron a su lugar.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּשְׁכִּמוּ
  english_pob_choice: rose early
  chosen_spanish: se levantaron temprano
  alternatives_spanish:
  - se levantaron de madrugada
  - se alzaron temprano
  lexicon: HALOT
  rationale: El imperfecto narrativo con valor de acción temprana se expresa de forma natural en español con 'se levantaron temprano', conservando la idea de madrugar sin forzar un calco.
- source_word: אַשְׁדּוֹדִים
  english_pob_choice: the Ashdodites
  chosen_spanish: los asdoditas
  alternatives_spanish:
  - la gente de Asdod
  - los hombres de Asdod
  lexicon: HALOT
  rationale: El gentilicio plural comunica con precisión a los habitantes de Asdod y mantiene la concisión del original.
- source_word: מִמָּחֳרָת
  english_pob_choice: the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - el día siguiente
  - para el día siguiente
  lexicon: HALOT
  rationale: La expresión temporal se vierte con una locución española idiomática y clara.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - y mira
  lexicon: HALOT
  rationale: '''He aquí'' conserva el valor de sorpresa y atención repentina que marca la partícula hebrea.'
- source_word: נֹפֵל לְפָנָיו אַרְצָה
  english_pob_choice: had fallen on his face to the ground
  chosen_spanish: había caído sobre su rostro al suelo
  alternatives_spanish:
  - había caído de bruces al suelo
  - había caído postrado en tierra
  lexicon: HALOT
  rationale: 'Se preserva la imagen corporal y humillante del hebreo: ''sobre su rostro'' + ''al suelo''. Se evita ''de bruces'' por ser más interpretativo y menos transparente al paralelismo del texto.'
- source_word: לִפְנֵי אֲרוֹן יְהוָה
  english_pob_choice: before the ark of Yahweh
  chosen_spanish: delante del arca de Yahvé
  alternatives_spanish:
  - ante el arca de Yahvé
  - frente al arca de Yahvé
  lexicon: HALOT
  rationale: '''Delante de'' reproduce bien la relación espacial de לִפְנֵי y mantiene el nombre divino ''Yahvé'' según la terminología del proyecto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el criterio doctrinal del proyecto para el Tetragrámaton, adaptado a la forma española establecida 'Yahvé'.
- source_word: וַיִּקְחוּ אֶת־דָּגוֹן
  english_pob_choice: they took Dagon
  chosen_spanish: tomaron a Dagón
  alternatives_spanish:
  - agarraron a Dagón
  - recogieron a Dagón
  lexicon: HALOT
  rationale: '''Tomaron'' traduce con neutralidad el verbo לקח; el objeto personal nombrado se introduce con ''a'' en español. Se mantiene ''Dagón'' con acento gráfico para la adaptación castellana.'
- source_word: וַיָּשִׁבוּ אֹתוֹ לִמְקוֹמוֹ
  english_pob_choice: returned him to his place
  chosen_spanish: lo devolvieron a su lugar
  alternatives_spanish:
  - lo retornaron a su lugar
  - lo pusieron de nuevo en su lugar
  lexicon: HALOT
  rationale: '''Devolvieron'' reproduce היטב el causativo de שׁוב en este contexto, y ''a su lugar'' conserva la referencia al sitio propio de la imagen.'
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  rationale: Se mantiene la decisión del POB de no sustituir el nombre divino por un título. En español, la forma doctrinal y editorialmente establecida es 'Yahvé'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: conserva la literalidad de ''sobre su rostro al suelo'' y el verbo de restitución ''lo devolvieron a su lugar'', evitando una paráfrasis más idiomática que perdería transparencia.'
  spanish_consistency_notes:
  - Se mantiene la transliteración doctrinal 'Yahvé' en lugar de 'SEÑOR'.
  - '''Dagón'' conserva el acento gráfico castellano para el nombre propio.'
  - 'El orden narrativo reproduce el original: levantarse temprano, sorpresa, caída, acción de tomar y devolver.'
  - No se añadieron notas a pie porque el verso no presentó una alternativa textual o léxica que exigiera marcación en el texto español.
