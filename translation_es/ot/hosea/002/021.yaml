translation:
  language: es
  text: Y te desposaré conmigo para siempre; sí, te desposaré conmigo en justicia y en derecho, en amor constante[a] y en compasión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'amor leal'. El hebreo חֶסֶד denota amor de pacto, lealtad y misericordia.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵרַשְׂתִּיךְ
  english_pob_choice: I will betroth you
  chosen_spanish: te desposaré
  alternatives_spanish:
  - te desposaré en matrimonio
  - te tomaré como mi desposada
  lexicon: HALOT
  rationale: ארשׂ denota desposorio o compromiso matrimonial, no simplemente matrimonio consumado. 'Desposar' conserva ese valor técnico y el marco pactual-marital del profeta en un español natural y digno.
- source_word: לִי
  english_pob_choice: to myself
  chosen_spanish: conmigo
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: 'La idea es relacional y pactal: el sujeto se vincula personalmente con la destinataria. En español, ''conmigo'' comunica bien esa unión personal sin sonar forzado como un calco de ''a mí''.'
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - para eternamente
  - por siempre
  lexicon: HALOT
  rationale: עוֹלָם aquí expresa permanencia duradera del vínculo. 'Para siempre' es la forma más natural y fiel en español contemporáneo.
- source_word: בְּצֶדֶק
  english_pob_choice: in righteousness
  chosen_spanish: en justicia
  alternatives_spanish:
  - en rectitud
  - con justicia
  lexicon: HALOT
  rationale: צֶדֶק puede abarcar justicia/rectitud. En este paralelo de cualidades pactales, 'justicia' mantiene el campo moral-jurídico y se coordina bien con el siguiente miembro.
- source_word: וּבְמִשְׁפָּט
  english_pob_choice: and in justice
  chosen_spanish: y en derecho
  alternatives_spanish:
  - y en juicio
  - y en justicia
  lexicon: HALOT
  rationale: מִשְׁפָּט en este contexto enumera cualidades del trato fiel y ordenado, no solo un acto de sentencia. 'Derecho' conserva el sentido de orden justo y resuena de modo natural junto a 'justicia'.
- source_word: וּבְחֶסֶד
  english_pob_choice: and in steadfast love
  chosen_spanish: en amor constante
  alternatives_spanish:
  - en amor leal
  - en amor fiel
  - en misericordia
  lexicon: HALOT
  rationale: חֶסֶד es un término pactal de lealtad amorosa. 'Amor constante' comunica la fidelidad persistente y afectiva del término, evitando arcaísmos y manteniendo su peso teológico.
- source_word: וּבְרַחֲמִים
  english_pob_choice: and in compassion
  chosen_spanish: y en compasión
  alternatives_spanish:
  - y en misericordia
  - y en tierna compasión
  lexicon: HALOT
  rationale: רַחֲמִים expresa ternura misericordiosa. 'Compasión' es claro, solemne y fiel al valor afectivo del plural hebreo.
theological_decisions:
- issue: Imagen matrimonial pactual
  english_pob_reading: Retain 'betroth' language literally rather than flattening to general marital or relational language.
  chosen_spanish_reading: Mantener 'desposar' en lugar de sustituirlo por 'casar' o por una formulación genérica como 'hacerte mía'.
  alternative_spanish_readings:
  - te casarás conmigo
  - te haré mía
  rationale: La imagen profética del desposorio es central para la restauración pactual en Oseas. 'Desposar' conserva la tensión entre promesa, fidelidad y relación, sin adelantar ni diluir el marco simbólico.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Valor pactual de חֶסֶד
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor constante
  alternative_spanish_readings:
  - amor leal
  - amor fiel
  - amor steadfast
  rationale: Se busca un equivalente español natural que conserve la lealtad persistente y el compromiso del término hebreo. 'Amor constante' mantiene la dimensión relacional y de fidelidad sin perder legibilidad.
  doctrine_reference: Consistencia terminológica con matiz contextual; preservar el contenido pactal sin forzar una fórmula tradicional fija.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail en inglés que prefirió 'steadfast love' para חֶסֶד; en español se optó por una equivalencia natural equivalente en registro y contenido, 'amor constante', sin perder el matiz pactual. También se preservó la progresión retórica del texto hebreo con la repetición de 'te desposaré conmigo'.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, evitando arcaísmos innecesarios.
  - '''Desposar'' se eligió por su precisión semántica frente a ''casar'', que sería demasiado amplio.'
  - '''Derecho'' se usó para מִשְׁפָּט por la coordinación semántica con ''justicia'' en este contexto de cualidades pactales.'
  - '''Compasión'' conserva el tono afectivo de רַחֲמִים sin reducirlo a simple ''misericordia''.'
