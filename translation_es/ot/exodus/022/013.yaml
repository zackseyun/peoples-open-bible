revisions:
- from: Y si un hombre toma prestado[a] de su prójimo, y es quebrado o muere, si su dueño no está con él[b], ciertamente hará restitución.
  to: Y si un hombre toma prestado de su prójimo, y se lastima[a] o muere, si su dueño no está con lo prestado, ciertamente hará restitución[b].
  rationale: Se corrige la ubicación y el contenido de las notas para que sigan el expediente inglés y el hebreo original. «Se lastima» reemplaza «es quebrado» por mayor naturalidad y amplitud semántica, mientras la nota preserva la literalidad. «Con lo prestado» aclara el referente jurídico de אֵין עִמּוֹ. Se añade una nota en la cláusula final para reflejar la intensificación de שַׁלֵּם יְשַׁלֵּם, tal como hace el POB en inglés.
