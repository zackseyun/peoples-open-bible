translation:
  language: es
  text: Mikloth engendró a Simea[a]. Ellos también habitaron frente a[b] sus hermanos en Jerusalén, con sus hermanos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Shimea'; el hebreo permite cierta variación en la transliteración del nombre propio.
    reason: lexical_alternative
  - marker: b
    text: O 'cerca de sus hermanos'; la preposición hebrea puede indicar posición delante de, frente a, o en proximidad a alguien.
    reason: lexical_alternative
  - marker: c
    text: '''Hermanos'' aquí probablemente se refiere a miembros del mismo clan o parientes dentro de la genealogía benjaminita, no necesariamente solo a hermanos biológicos.'
    reason: cultural_note
lexical_decisions:
- source_word: וּ/מִקְלֹות
  english_pob_choice: Mikloth
  chosen_spanish: Miklot
  alternatives_spanish:
  - Y Miklot
  lexicon: HALOT
  rationale: Es nombre propio; en español se translitera de forma estable como Miklot. No se expresa la conjunción inicial porque el contexto genealógico ya la integra naturalmente en la serie.
- source_word: הוֹלִיד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: El verbo genealógico expresa causar el nacimiento/descendencia. 'Engendró' conserva el valor genealógico directo sin sonar tan moderno como 'fue padre de'.
- source_word: אֶת שִׁמְאָה
  english_pob_choice: Shimeah
  chosen_spanish: a Sima
  alternatives_spanish:
  - a Simea
  - a Shimea
  lexicon: HALOT
  rationale: Se translitera el nombre al español como Sima para mantener una forma breve y pronunciable; el objeto directo se marca con 'a' por ser nombre personal masculino/femenino en español bíblico. La forma refleja el nombre hebreo sin añadir elementos no presentes.
- source_word: וְ/אַף הֵמָּה
  english_pob_choice: They too
  chosen_spanish: Ellos también
  alternatives_spanish:
  - Y ellos también
  - También ellos
  lexicon: HALOT
  rationale: La combinación añade énfasis inclusivo; 'ellos también' reproduce ese matiz de inclusión de manera natural en español.
- source_word: נֶגֶד
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuesto a
  - en frente de
  - cerca de
  lexicon: HALOT
  rationale: En este contexto de asentamiento, la relación espacial de 'נֶגֶד' se expresa mejor con 'frente a', manteniendo la posibilidad de oposición espacial sin reducirla a mera cercanía.
- source_word: אֲחֵי/הֶם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus deudos
  - sus hermanos de clan
  lexicon: HALOT
  rationale: Se conserva 'hermanos' como traducción literal, y el contexto genealógico permite entender la referencia a miembros del mismo linaje o clan sin cambiar la forma base.
- source_word: יָשְׁבוּ
  english_pob_choice: lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se asentaron
  - moraron
  lexicon: HALOT
  rationale: El verbo puede significar vivir, habitar o asentarse. 'Habitaron' mantiene la idea de residencia estable y suena más digna que 'vivieron' en un registro bíblico.
- source_word: בִ/ירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: Nombre propio estándar en español bíblico.
- source_word: עִם אֲחֵי/הֶם
  english_pob_choice: with their brothers
  chosen_spanish: con sus hermanos
  alternatives_spanish:
  - junto con sus hermanos
  - al lado de sus hermanos
  lexicon: HALOT
  rationale: Se mantiene la repetición final para reflejar el hebreo y no suavizar el énfasis relacional del versículo.
translation_notes:
  revision_awareness: Verso sin cambios sustanciales respecto al texto fuente; se sigue la lectura genealógica breve del hebreo, con conservación del énfasis espacial de נֶגֶד y de la repetición final de 'sus hermanos'.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y moderno, evitando calcos innecesarios.
  - '''Hermanos'' se conserva por literalidad del hebreo, aunque en contexto clan-triibal puede abarcar parientes del linaje.'
  - La repetición final 'con sus hermanos' se dejó explícita para reflejar la estructura del original.
  - No se introdujo 'SEÑOR' ni terminología teológica ajena al versículo.
