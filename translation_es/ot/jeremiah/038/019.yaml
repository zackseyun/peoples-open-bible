translation:
  language: es
  text: 'Entonces el rey Sedequías dijo a Jeremías: «Tengo miedo de los judeanos[a] que se han pasado a los caldeos[b], no sea que me entreguen a ellos[c] y me maltraten[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los judíos». Aquí el hebreo se refiere de modo específico a la gente de Judá en este marco histórico, por eso se usa «judeanos».
    reason: lexical_alternative
  - marker: b
    text: O «los babilonios». El hebreo dice literalmente «los caldeos».
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «me den en sus manos».'
    reason: lexical_alternative
  - marker: d
    text: O «me traten cruelmente» o «me hagan daño».
    reason: lexical_alternative
lexical_decisions:
- source_word: דֹאֵג
  english_pob_choice: I am afraid
  chosen_spanish: Tengo miedo
  alternatives_spanish:
  - Estoy preocupado
  - Me da miedo
  - Estoy temeroso
  lexicon: HALOT
  rationale: El contexto es el temor de Sedequías ante una posible entrega y malos tratos; «tengo miedo» comunica de manera natural la fuerza emocional del hebreo דֹאֵג sin sonar más débil ni más técnico que el original.
- source_word: הַיְּהוּדִים
  english_pob_choice: the Judeans
  chosen_spanish: los judeanos
  alternatives_spanish:
  - los judíos
  lexicon: HALOT
  rationale: El término en este contexto histórico designa a la gente de Judá, no al uso religioso-etnónimo posterior en sentido amplio; «judeanos» preserva esa precisión, como hace la POB en inglés con «Judeans».
- source_word: נָפְלוּ אֶל
  english_pob_choice: have defected to
  chosen_spanish: se han pasado a
  alternatives_spanish:
  - han desertado a
  - se han rendido a
  - han ido con
  lexicon: HALOT
  rationale: La imagen militar de «caer a» otro bando expresa cambio de lealtad; «se han pasado a» es la manera española más natural de conservar esa fuerza sin perder el matiz de defección.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: El hebreo dice específicamente «caldeos»; se conserva la designación histórica propia del libro de Jeremías, en línea con la POB inglesa.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - por temor de que
  lexicon: HALOT
  rationale: «No sea que» transmite en español la combinación de temor y posible consecuencia que expresa פֶּן, con un registro digno y claro.
- source_word: יִתְּנוּ אֹתִי בְּיָדָם
  english_pob_choice: they hand me over to them
  chosen_spanish: me entreguen en sus manos
  alternatives_spanish:
  - me den en sus manos
  - me pongan en sus manos
  - me entreguen a ellos
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «darme en su mano»; «me entreguen en sus manos» conserva la imagen idiomática y su valor de entrega bajo control enemigo.
- source_word: וְהִתְעַלְּלוּ בִי
  english_pob_choice: and they mistreat me
  chosen_spanish: y me maltraten
  alternatives_spanish:
  - y me traten cruelmente
  - y se burlen de mí
  - y me hagan daño
  lexicon: HALOT
  rationale: La POB inglesa revisó de «abuse me» a «mistreat me» por ser más sobria y menos específica; «me maltraten» mantiene ese mismo alcance amplio, formal y fiel al hebreo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente de la POB inglesa, que sustituyó «abuse me» por «mistreat me» para evitar una especificación excesiva en וְהִתְעַלְּלוּ בִי. La traducción española sigue esa revisión con «me maltraten», y conserva también la precisión histórica de «judeanos» y «caldeos», junto con la imagen idiomática de «en sus manos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - «Judeanos» se usa con el mismo criterio histórico que la POB inglesa para הַיְּהוּדִים.
  - «Caldeos» se conserva como designación textual específica del hebreo.
  - El orden y la puntuación buscan lectura pública natural en español sin diluir la estructura causal/temporal del original.
