translation:
  language: es
  text: 'Y vino la palabra de Yahvé a Jeremías, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y aconteció
  - Y sucedió
  lexicon: HALOT
  rationale: El waw consecutivo introduce una fórmula narrativa estándar. En español, «vino» reproduce con naturalidad la llegada de la palabra sin forzar un calco como «aconteció», que aquí suena más impersonal y menos idiomático.
- source_word: דְּבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  lexicon: HALOT
  rationale: En la fórmula profética דְּבַר יְהוָה, «palabra» conserva el valor técnico y recurrente de revelación divina. «Mensaje» es posible, pero debilita la forma estable del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como transliteración de יְהוָה, conforme a la convención del proyecto. «Yahvé» preserva el nombre personal del pacto y evita la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición indica el destinatario de la revelación. En español, «a» es la correspondencia natural y transparente en esta fórmula.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Jeremías
  lexicon: HALOT
  rationale: Se usa la forma española estable del nombre propio, que es plenamente reconocible y no altera el referente.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - para decir
  lexicon: HALOT
  rationale: El infinitivo constructo introduce el discurso directo siguiente. «Diciendo» es la forma idiomática en español y preserva la función introductoria del hebreo.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: 'La decisión refleja la lectura del POB en inglés: no se sustituye el Tetragrámaton por un título. «Yahvé» mantiene el nombre del pacto y la transparencia auditável del texto fuente.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El inglés POB mantiene la fórmula profética estándar («And the word of Yahweh came to Jeremiah, saying,»), sin notas ni revisiones. La versión española sigue la misma estructura y conserva el nombre divino como transliteración, sin añadir explicaciones textuales que el testigo no exige.
  spanish_consistency_notes:
  - Se conserva la cadencia de fórmula profética con orden natural del español.
  - «Yahvé» se usa de manera consistente con el estándar del proyecto para יְהוָה.
  - No se introduce puntuación ni léxico que sugiera una cita más amplia de la que ofrece el versículo.
