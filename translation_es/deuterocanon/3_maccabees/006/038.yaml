    text: Pachon and Epiphi are Egyptian month names used in the administrative dating of the narrative.
    reason: cultural_note
  - marker: b
    text: The Greek verb behind 'Copies were made out' can suggest written copies or official documents being prepared; the object is not stated explicitly in the verse.
    reason: lexical_alternative
