translation:
  language: es
  text: 'Por tanto, así dice el Señor Dios Yahvé: Ahora restauraré las fortunas de Jacob[a], y tendré compasión de toda la casa de Israel, y seré celoso por mi santo nombre[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «traeré de vuelta a los cautivos de Jacob». El hebreo puede referirse específicamente al regreso de la cautividad o, más ampliamente, a la restauración de la fortuna de un pueblo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «tendré celo por mi santo nombre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Expresa con naturalidad la conclusión inferencial del contexto previo y mantiene la relación lógica del hebreo.
- source_word: כֹּה אָמַר
  english_pob_choice: thus says
  chosen_spanish: así dice
  alternatives_spanish:
  - esto dice
  - así ha dicho
  lexicon: HALOT
  rationale: Es la fórmula profética estándar; 'así dice' conserva su fuerza formal sin sonar anticuado en español.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahweh
  lexicon: HALOT
  rationale: Se distingue אֲדֹנָי como 'Señor' y el Tetragrámaton como 'Yahvé', siguiendo el principio del proyecto de no ocultar el nombre divino.
- source_word: עַתָּה
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - En este momento
  - Ya
  lexicon: HALOT
  rationale: Marca el giro decisivo hacia la acción divina presente/futura con una palabra breve y natural.
- source_word: אָשִׁיב אֶת שבית יַעֲקֹב
  english_pob_choice: I will restore the fortunes of Jacob
  chosen_spanish: restauraré las fortunas de Jacob
  alternatives_spanish:
  - traeré de vuelta a los cautivos de Jacob
  - restauraré a Jacob de la cautividad
  lexicon: HALOT
  rationale: Se conserva el sentido idiomático de restauración amplia, sin excluir el matiz histórico de cautiverio que el hebreo puede evocar.
- source_word: יַעֲקֹב
  english_pob_choice: Jacob
  chosen_spanish: Jacob
  alternatives_spanish:
  - Israel
  lexicon: HALOT
  rationale: Se conserva el nombre patriarcal que aparece en el hebreo, sin armonizarlo con 'Israel'.
- source_word: וְרִחַמְתִּי
  english_pob_choice: and I will have compassion
  chosen_spanish: y tendré compasión
  alternatives_spanish:
  - y mostraré misericordia
  - y seré compasivo
  lexicon: HALOT
  rationale: '''Tener compasión'' transmite bien la carga afectiva y de misericordia de רחם en un español claro y digno.'
- source_word: כָּל בֵּית יִשְׂרָאֵל
  english_pob_choice: the whole house of Israel
  chosen_spanish: toda la casa de Israel
  alternatives_spanish:
  - toda la familia de Israel
  - la entera casa de Israel
  lexicon: HALOT
  rationale: Preserva la expresión colectiva de pacto 'casa de Israel' y el alcance total de כָּל.
- source_word: וְקִנֵּאתִי
  english_pob_choice: and I will be jealous
  chosen_spanish: y seré celoso
  alternatives_spanish:
  - y tendré celo
  - y actuaré con celo
  lexicon: HALOT
  rationale: '''Celoso'' conserva el campo semántico de קנא aplicado a Dios; en nota se preserva la alternativa ''celoso/zeloso'' implícita en el inglés por su tensión teológica.'
- source_word: לְשֵׁם קָדְשִׁי
  english_pob_choice: for my holy name
  chosen_spanish: por mi santo nombre
  alternatives_spanish:
  - en favor de mi santo nombre
  - por causa de mi santo nombre
  lexicon: HALOT
  rationale: '''Por mi santo nombre'' expresa de forma natural la orientación del celo divino hacia la honra de su nombre santo.'
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahweh
  rationale: El hebreo usa directamente el Tetragrámaton, y el proyecto pide 'Yahvé' en el texto principal. Se mantiene la distinción entre אֲדֹנָי y YHWH, evitando la convención de ocultar el nombre.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido del modismo אָשִׁיב אֶת שבית יַעֲקֹב
  english_pob_reading: restore the fortunes of Jacob
  chosen_spanish_reading: restauraré las fortunas de Jacob
  alternative_spanish_readings:
  - traeré de vuelta a los cautivos de Jacob
  - restauraré a Jacob de la cautividad
  rationale: Se mantiene el sentido idiomático amplio de restauración nacional, sin borrar que el giro puede estar históricamente ligado a la cautividad. La nota conserva esa tensión interpretativa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Matiz de וְקִנֵּאתִי aplicado a Yahvé
  english_pob_reading: I will be jealous for my holy name
  chosen_spanish_reading: seré celoso por mi santo nombre
  alternative_spanish_readings:
  - seré celoso en favor de mi santo nombre
  - tendré celo por mi santo nombre
  rationale: '''Celoso'' reproduce con cercanía el hebreo y preserva la intensidad pactual. Se evita neutralizarlo totalmente en ''zeal'' porque la tensión entre celo santo y celos humanos es parte del texto.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del control cruzado y conserva las decisiones ya estables del POB inglés: la fórmula profética, el nombre divino explícito, el modismo de restauración y la tensión entre ''jealous''/''zealous'' aplicada al nombre santo. No se introdujeron revisiones nuevas respecto del último pase.'
  spanish_consistency_notes:
  - '''Yahvé'' se usa para יְהוָה según la norma del proyecto; ''Señor'' refleja אֲדֹנָי.'
  - '''casa de Israel'' conserva el sustantivo colectivo del hebreo.'
  - '''fortunas'' se mantiene como equivalente idiomático de restauración, con nota para el posible matiz de cautiverio.'
  - '''celoso'' se conserva para no suavizar la fuerza semántica de קנא; la alternativa se documenta en nota.'
