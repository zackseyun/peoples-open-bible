  rationale: Se corrigió la frase final para reflejar con precisión לְמַס עֹבֵד como trabajo forzoso/corvée, evitando el giro poco natural y semánticamente impreciso «esclavos de trabajo». También se reubicó la nota [b] al lugar pertinente en el texto, ya que explica el singular colectivo hebreo detrás de «cananeos» en la primera mención.
