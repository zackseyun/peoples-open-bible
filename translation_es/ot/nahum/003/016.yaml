    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo también puede significar «se extiende» o «despoja»; aquí probablemente describe a la langosta dejando la tierra desnuda antes de irse.
    reason: lexical_alternative
  revision_rationale: 'Se corrige la segunda mitad para reflejar mejor el sentido contextual documentado en el expediente POB: la imagen no es meramente de extensión, sino de devastación seguida de desaparición. «La langosta» es más clara y natural en español general, mientras la posible especificidad de יֶלֶק se conserva en nota. También se añade una nota para פָּשַׁט, porque el POB inglés preservó alternativas léxicas relevantes.'
