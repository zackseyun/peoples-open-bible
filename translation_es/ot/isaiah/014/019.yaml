  text: וְ/אַתָּ֞ה הָשְׁלַ֤כְתָּ מִֽ/קִּבְרְ/ךָ֙ כְּ/נֵ֣צֶר נִתְעָ֔ב לְב֥וּשׁ הֲרֻגִ֖ים מְטֹ֣עֲנֵי חָ֑רֶב יוֹרְדֵ֥י אֶל אַבְנֵי ב֖וֹר כְּ/פֶ֥גֶר מוּבָֽס־־׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/014/019.yaml
  text: But you are cast out from your grave like a despised branch[a], clothed with the slain, those pierced by the sword, who go down to the stones of the pit[c][b], like a trampled corpse.
  footnotes:
  - marker: a
    text: Or “an abhorred shoot/offshoot.” The Hebrew word can mean “shoot” or “branch”; here it refers to something rejected and thrown away.
    reason: lexical_alternative
  - marker: b
    text: Or “those thrust through with the sword.” The Hebrew expression is difficult; the sense is of the battle-slain.
    reason: lexical_alternative
  - marker: c
    text: “The pit” is a poetic term for the grave or realm of the dead; “stones of the pit” likely evokes a stone-lined burial place.
    reason: cultural_note
