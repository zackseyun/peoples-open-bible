translation:
  language: es
  text: Y al hacer patente su hostilidad hacia nosotros, ellos solos entre las naciones actúan con arrogancia frente a los reyes y frente a sus propios benefactores, y no quieren ofrecer nada genuino[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no quieren mostrar nada genuino». La expresión griega οὐδὲν γνήσιον βούλονται φέρειν es idiomática; puede entenderse como que no están dispuestos a mostrar u ofrecer una actitud auténtica o confiable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δυσμένειαν
  english_pob_choice: hostility
  chosen_spanish: hostilidad
  alternatives_spanish:
  - enemistad
  - mala voluntad
  lexicon: LSJ
  rationale: '''Hostilidad'' expresa bien la actitud activa y pública de rechazo contra nosotros, y encaja con el tono político de la acusación. ''Enemistad'' y ''mala voluntad'' son posibles, pero la primera puede sonar más abstracta y la segunda más débil en este contexto.'
- source_word: ἔκδηλον καθιστάντες
  english_pob_choice: making ... plain
  chosen_spanish: hacer patente
  alternatives_spanish:
  - hacer evidente
  - mostrar abiertamente
  lexicon: LSJ
  rationale: La construcción causativa pide un verbo que exprese volver manifiesta la actitud. 'Hacer patente' suena natural en español y conserva la idea de declarar algo visible o manifiesto.
- source_word: μονώτατοι τῶν ἐθνῶν
  english_pob_choice: alone among the nations
  chosen_spanish: solos entre las naciones
  alternatives_spanish:
  - los únicos entre las naciones
  - únicos entre los pueblos
  lexicon: LSJ
  rationale: El superlativo enfatiza singularidad y aislamiento. 'Solos entre las naciones' mantiene la fuerza polémica sin volver la frase demasiado pesada.
- source_word: βασιλεῦσιν
  english_pob_choice: kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - reyes
  - los gobernantes
  lexicon: LSJ
  rationale: El dativo plural se refiere de forma directa a reyes; se conserva ese término para no ampliar indebidamente el alcance a 'gobernantes'.
- source_word: τοῖς ἑαυτῶν εὐεργέταις
  english_pob_choice: their own benefactors
  chosen_spanish: sus propios benefactores
  alternatives_spanish:
  - quienes les hacen bien
  - sus patronos
  lexicon: LSJ
  rationale: '''Benefactores'' reproduce el valor social y político de εὐεργέταις, y ''sus propios'' refleja ἑαυτῶν. ''Patronos'' sería posible, pero introduce una matización más técnica que no exige el griego.'
- source_word: ὑψαυχνοῦντες
  english_pob_choice: act arrogantly toward
  chosen_spanish: actúan con arrogancia frente a
  alternatives_spanish:
  - se muestran altivos ante
  - levantan el cuello ante
  lexicon: LSJ
  rationale: El verbo es vívido y raro; en español, 'actuar con arrogancia frente a' comunica el sentido idiomático sin recurrir a una imagen demasiado extraña. Se conserva la idea de altivez ofensiva.
- source_word: γνήσιον
  english_pob_choice: genuine
  chosen_spanish: genuino
  alternatives_spanish:
  - sincero
  - auténtico
  - fiel
  lexicon: LSJ
  rationale: '''Genuino'' sigue de cerca la decisión auditada en inglés y deja abierta la gama de sinceridad/lealtad que el contexto sugiere. ''Sincero'' es posible, pero podría estrechar el sentido hacia la emotividad; ''fiel'' sería demasiado específico.'
- source_word: βούλονται φέρειν
  english_pob_choice: are willing to offer
  chosen_spanish: quieren ofrecer
  alternatives_spanish:
  - están dispuestos a ofrecer
  - pretenden presentar
  lexicon: LSJ
  rationale: La combinación volitiva con φέρειν se vierte bien con 'querer ofrecer', que en español mantiene la idea de una disposición o intención de presentar algo. 'Ofrecer' conserva el matiz relacional del verbo griego.
theological_decisions:
- issue: Preservar el tono acusatorio sin suavizarlo
  english_pob_reading: Render the statement as a political slander without softening its rhetoric.
  chosen_spanish_reading: Mantener la acusación hostil como parte del discurso del hablante, sin atenuarla en la traducción.
  alternative_spanish_readings:
  - suavizar el pasaje para neutralizar la polémica
  - parafrasear para hacerlo más neutral
  rationale: El versículo forma parte de una diatriba política contra los judíos; la traducción debe reflejar esa retórica hostil sin convertirla en una versión más benigna que oculte el conflicto textual.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión textual y la voz del original; no armonizar ni domesticar el tono polémico.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que prefirió 'genuine' sobre 'sincere' y eliminó puntuación innecesaria. En español se reflejó esa preferencia con 'genuino' y una sintaxis fluida sin comas superfluas.
  spanish_consistency_notes:
  - Se mantuvo 'benefactores' como término de valor social/político coherente con εὐεργέταις.
  - Se prefirió 'genuino' en lugar de 'sincero' para seguir la actualización auditada del inglés.
  - Se evitó 'SEÑOR' y otras convenciones de máscara, aunque aquí no aparece el nombre divino.
  - La frase 'hacer patente' conserva el matiz manifiesto/evidente del participio causal griego.
