base_translation:
  language: en
  yaml_path: translation/deuterocanon/additions_to_esther/003/012.yaml
  text: And taking off her garments of glory[a], she put on garments of distress and mourning; and instead of splendid perfumes, she filled her head with ashes and dung, and she humbled her body greatly[c][b], and every place of her joyful adornment she filled with the twisting of her hair.
  footnotes:
  - marker: a
    text: Or 'instead of luxurious perfumes.' The Greek literally says 'proud perfumes,' likely referring to costly or ostentatious fragrances.
    reason: lexical_alternative
  - marker: b
    text: Or 'she covered her head with ashes and dung.' The Greek more literally says 'she filled her head.'
    reason: lexical_alternative
  - marker: c
    text: The final phrase is difficult. It may mean that the places once beautified for rejoicing were now marked by her hair left twisted or disheveled in mourning.
    reason: alternative_reading
