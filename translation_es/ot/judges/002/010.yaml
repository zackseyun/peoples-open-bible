base_translation:
  language: en
  yaml_path: translation/ot/judges/002/010.yaml
  text: And all that generation also were gathered to their fathers[a], and another generation arose after them who did not know Yahweh[b], or even the work that he had done for Israel.
  footnotes:
  - marker: a
    text: Hebrew 'were gathered to their fathers,' an idiom for dying and joining one's forebears.
    reason: cultural_note
  - marker: b
    text: Or 'did not acknowledge the LORD'; the Hebrew can denote relational or covenantal knowledge, not only factual awareness.
    reason: lexical_alternative
