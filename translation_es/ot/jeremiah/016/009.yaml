revisions:
- from: 'Porque así dice Yahvé de los Ejércitos, Dios de Israel: He aquí, voy a hacer cesar[a] de este lugar, delante de sus ojos y en sus días, la voz de gozo y la voz de alegría, la voz del novio y la voz de la novia.'
  to: 'Porque así dice Yahvé de los Ejércitos[a], Dios de Israel: He aquí, voy a hacer cesar de este lugar, ante los ojos de ustedes y en sus días, la voz de gozo y la voz de alegría, la voz del novio y la voz de la novia.'
  rationale: Se corrige la referencia pronominal para preservar la segunda persona plural del hebreo sin caer en un registro peninsular ('vuestros'). 'Ante los ojos de ustedes' mantiene el sentido de לְעֵינֵיכֶם de manera clara en español neutral latinoamericano. Se ajusta además la nota alternativa a una formulación tradicional más reconocible y mejor alineada con la auditoría inglesa. El resto del verso puede mantenerse por ser fiel y legible.
