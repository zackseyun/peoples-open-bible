revisions:
- from: Así que guardarás el mandamiento y los estatutos y los juicios[a][b] que yo te ordeno hoy, para ponerlos por obra.
  to: Por tanto, guardarás el mandamiento y los estatutos y los juicios[a][b] que yo te mando hoy, para hacerlos.
  rationale: Se ajusta el inicio a «Por tanto» para un registro más formal sin perder la inferencia contextual; se cambia «te ordeno» por «te mando» para acercarse más al verbo hebreo de mandar; y se reemplaza «para ponerlos por obra» por «para hacerlos» para reflejar con mayor precisión לַעֲשׂוֹתָם y la decisión explícita del POB de no parafrasear ese infinitivo.
