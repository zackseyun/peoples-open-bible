    text: Or 'senate' for 'council of elders'; the Greek term is γερουσία, an institutional body of elders.
    reason: lexical_alternative
  - marker: b
    text: '''Gifts of hospitality'' renders ξένια, gifts associated with receiving or honoring a guest.'
    reason: cultural_note
