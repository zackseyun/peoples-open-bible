translation:
  language: es
  text: Entregó sus animales al granizo, y su ganado a los rayos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los rayos de fuego» o «a las llamas»; el término hebreo puede denotar fuerzas destructivas ardientes o fulgurantes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּסְגֵּר
  english_pob_choice: he gave over
  chosen_spanish: entregó
  alternatives_spanish:
  - dio por entregado
  - concedió
  - entregó en poder de
  lexicon: HALOT
  rationale: El verbo hebreo puede significar 'encerrar', 'poner en manos de', 'entregar'. En este contexto de plaga, 'entregó' comunica bien la acción de poner a merced de fuerzas destructivas, sin perder el sentido de cesión activa que refleja la lectura inglesa 'gave over'.
- source_word: בְּעִירָם
  english_pob_choice: their cattle
  chosen_spanish: sus animales
  alternatives_spanish:
  - su ganado
  - sus bestias
  lexicon: HALOT
  rationale: בְּעִיר suele referirse a bestias domésticas o de carga, no necesariamente solo reses. 'Animales' conserva la amplitud semántica y evita estrechar demasiado el término; 'ganado' sería posible, pero algo más restrictivo en español.
- source_word: מִקְנֵיהֶם
  english_pob_choice: their livestock
  chosen_spanish: su ganado
  alternatives_spanish:
  - su hacienda ganadera
  - sus rebaños
  - su ganado
  lexicon: HALOT
  rationale: מִקְנֶה designa bienes en forma de ganado o hacienda ganadera. Para mantener la distinción poética con el primer hemistiquio, 'su ganado' funciona bien y es natural en español, sin forzar una perífrasis demasiado técnica.
- source_word: לָרְשָׁפִים
  english_pob_choice: to the lightning bolts
  chosen_spanish: a los relámpagos
  alternatives_spanish:
  - a los rayos
  - a los destellos de fuego
  - a las llamas
  lexicon: HALOT
  rationale: רְשָׁפִים puede referir fuerzas ardientes o fulgurantes. Dado el paralelismo con el granizo y la alusión a un juicio meteorológico, 'relámpagos' comunica la imagen de descargas destructivas y mantiene la tensión semántica entre lo ígneo y lo fulgurante. Se conserva la alternativa amplia en la nota.
translation_notes:
  revision_awareness: 'La redacción sigue el sentido confirmado por la POB inglesa y su revisión más reciente: la segunda expresión se mantiene con un término natural en español que preserve el campo semántico de rְשָׁפִים sin exagerar una interpretación meteorológica específica. Se evita un calco rígido y se conserva el paralelismo poético con dos objetos distintos.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - Se evita traducir mecánicamente 'lightning bolts' con una colocación poco natural en español; 'relámpagos' ofrece una solución idiomática y fiel al rango semántico.
  - La nota conserva la ambigüedad léxica documentada por la POB inglesa entre imaginería ardiente y fulgurante.
