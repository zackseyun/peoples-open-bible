translation:
  text: And it shall be[a], when dawn breaks and the sun rises upon the earth, each of you shall take up your weapons of war, and every mighty man shall go out beyond the city. You shall appoint a leader over them, as though going down to the plain against the advance guard of the sons of Asshur[b]; but you shall not go down.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to the outpost of the Assyrians.' The Greek literally reads 'to/against the προφυλακή of the sons of Asshur,' where προφυλακή can mean an advance guard, outpost, or forward watch.
    reason: lexical_alternative
  - marker: b
    text: '''Sons of Asshur'' is a literal rendering of the Greek expression; it refers to the Assyrians.'
    reason: cultural_note
lexical_decisions:
- source_word: διαφαύσῃ ὁ ὄρθρος
  chosen: dawn breaks
  alternatives:
  - morning shines forth
  - daybreak appears
  lexicon: LSJ
  rationale: The clause is idiomatic for the first light of morning. 'Dawn breaks' is natural modern English while preserving the temporal sense.
- source_word: ἐξέλθῃ ὁ ἥλιος ἐπὶ τὴν γῆν
  chosen: the sun comes out upon the earth
  alternatives:
  - the sun rises over the earth
  - the sun comes forth upon the land
  lexicon: LSJ
  rationale: A fairly literal rendering preserves the imagery of the sun emerging. 'Comes out' reflects ἐξέλθῃ directly; 'upon the earth' keeps ἐπὶ τὴν γῆν without overinterpreting as merely 'over the land'.
- source_word: ἀναλήμψεσθε
  chosen: shall take up
  alternatives:
  - shall pick up
  - shall take
  lexicon: LSJ
  rationale: The future middle here conveys taking up or assuming something in hand. 'Take up' fits military preparation idiomatically.
- source_word: τὰ σκεύη τὰ πολεμικὰ
  chosen: your weapons of war
  alternatives:
  - your military equipment
  - your war gear
  lexicon: LSJ
  rationale: σκεύη can mean equipment or gear, but in this martial context 'weapons of war' communicates the intended military implements clearly and forcefully.
- source_word: πᾶς ἀνὴρ ἰσχύων
  chosen: every strong man
  alternatives:
  - every able man
  - every mighty man
  lexicon: LSJ
  rationale: The Greek is explicitly masculine singular used distributively. In keeping with gender-accurate policy, 'every strong man' preserves both the masculine form and the sense of military capability.
- source_word: δώσετε ἀρχηγὸν εἰς αὐτούς
  chosen: You shall appoint a leader over them
  alternatives:
  - you shall set a commander for them
  - you shall give them a chief
  lexicon: LSJ
  rationale: ἀρχηγός here is a leader or commander. 'Appoint a leader over them' is clear English and reflects the causative force of δώσετε in context.
- source_word: ὡς καταβαίνοντες ἐπὶ τὸ πεδίον
  chosen: as though going down to the plain
  alternatives:
  - as if descending to the plain
  - like men going down into the field
  lexicon: LSJ
  rationale: ὡς marks appearance or pretense here. 'As though' captures the feigned movement implied by Judith's tactic.
- source_word: εἰς τὴν προφυλακὴν υἱῶν Ἀσσούρ
  chosen: against the advance guard of the sons of Asshur
  alternatives:
  - to the outpost of the Assyrians
  - against the vanguard of the Assyrians
  lexicon: LSJ
  rationale: προφυλακή denotes an advance guard, outpost, or forward watch. 'Advance guard' best suits the military setting. 'Sons of Asshur' preserves the literal ethnonymal phrasing rather than flattening it immediately to 'Assyrians'.
- source_word: οὐ καταβήσεσθε
  chosen: you shall not go down
  alternatives:
  - do not go down
  - you must not descend
  lexicon: LSJ
  rationale: The future is used imperatively/instructionally. 'You shall not go down' preserves the form while clearly conveying prohibition in context.
