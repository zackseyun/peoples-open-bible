base_translation:
  language: en
  yaml_path: translation/deuterocanon/tobit/003/003.yaml
  text: Remember me and look upon me[a]; do not punish me for my sins and my errors done in ignorance, and for those of my fathers[c][b], which they committed before you.
  footnotes:
  - marker: a
    text: Or 'do not exact vengeance for my sins.' The Greek verb can carry the sense of avenging or exacting justice; here it is rendered 'punish' because the prayer asks God not to requite sins.
    reason: lexical_alternative
  - marker: b
    text: '''My errors done in ignorance'' translates a term for wrongs committed unwittingly or without full awareness.'
    reason: lexical_alternative
  - marker: c
    text: That is, 'my ancestors' or 'my forefathers.'
    reason: lexical_alternative
