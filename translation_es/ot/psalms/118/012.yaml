translation:
  language: es
  text: Me rodearon como abejas[a]; se apagaron como fuego de espinos. En el nombre de Yahvé[b], ciertamente los corté.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se extinguieron como fuego de espinos». El hebreo condensa la imagen y presenta a los enemigos como un fuego de espinos que arde con rapidez y luego se apaga.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los corté por completo». El verbo hebreo puede significar «cortar» o «cortar abajo»; el texto principal conserva la imagen de corte, y la alternativa explicita el matiz de eliminación total.'
    reason: alternative_reading
lexical_decisions:
- source_word: סַבּוּנִי
  english_pob_choice: They surrounded me
  chosen_spanish: Me rodearon
  alternatives_spanish:
  - Me cercaron
  - Me circundaron
  lexicon: HALOT
  rationale: El verbo סבב expresa rodear/encerrar; «me rodearon» es natural en español y conserva la imagen hostil de cerco.
- source_word: כִדְבוֹרִים
  english_pob_choice: like bees
  chosen_spanish: como abejas
  alternatives_spanish:
  - cual abejas
  - como enjambre de abejas
  lexicon: HALOT
  rationale: El כ comparativo se expresa directamente con «como». «Abejas» mantiene la comparación vívida del enjambre.
- source_word: דֹּעֲכוּ
  english_pob_choice: they were extinguished
  chosen_spanish: se apagaron
  alternatives_spanish:
  - fueron extinguidos
  - se extinguieron
  - se consumieron
  lexicon: HALOT
  rationale: El verbo describe apagarse/extinguirse, especialmente de fuego. «Se apagaron» suena natural en español y conserva la imagen de un fuego que deja de arder.
- source_word: כְּאֵשׁ קוֹצִים
  english_pob_choice: like a fire of thorns
  chosen_spanish: como fuego de espinos
  alternatives_spanish:
  - como un fuego entre espinos
  - como fuego de zarzas
  - como fuego de abrojos
  lexicon: HALOT
  rationale: La expresión hebrea comprime la imagen de un fuego alimentado por espinos. «Fuego de espinos» sigue de cerca la construcción y mantiene la idea de una llama breve e inestable.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: In the name of Yahweh
  chosen_spanish: En el nombre de Yahvé
  alternatives_spanish:
  - Por el nombre de Yahvé
  - Bajo el nombre de Yahvé
  lexicon: HALOT
  rationale: «En el nombre de» es la equivalencia normal para acción realizada bajo la autoridad o invocación de YHWH. Se conserva «Yahvé» conforme al criterio del proyecto para יְהוָה.
- source_word: כִּי
  english_pob_choice: surely
  chosen_spanish: sin duda
  alternatives_spanish:
  - ciertamente
  - de veras
  - seguramente
  lexicon: HALOT
  rationale: Aquí כִּי aporta énfasis y seguridad, no causalidad. «Sin duda» transmite bien la certeza enfática en español.
- source_word: אֲמִילַם
  english_pob_choice: I surely cut them down
  chosen_spanish: los derribé
  alternatives_spanish:
  - los corté
  - los corté de raíz
  - los abatí
  lexicon: HALOT
  rationale: La forma puede entenderse como «cortar/cortar abajo» en sentido bélico. «Derribé» comunica el acto de abatir al enemigo en un registro natural, sin perder la fuerza de eliminación.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. En la política del proyecto, se translitera como «Yahvé» para mantener el nombre pactual en el texto principal sin sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de בְּשֵׁם יְהוָה
  english_pob_reading: In the name of Yahweh
  chosen_spanish_reading: En el nombre de Yahvé
  alternative_spanish_readings:
  - Por el nombre de Yahvé
  - Invocando el nombre de Yahvé
  rationale: La frase puede indicar autoridad, apelación o invocación. Se conserva la formulación tradicional y transparente «en el nombre de», que abarca esa gama sin forzar el sentido.
  doctrine_reference: Gramática hebrea y uso bíblico de fórmulas de autoridad/invocación
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que afinó דֹּעֲכוּ y כְּאֵשׁ קוֹצִים hacia una imagen de extinción más literal («were extinguished like a fire of thorns»). El español sigue esa dirección con «se apagaron como fuego de espinos», manteniendo la compresión poética del hebreo y el registro publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal para יְהוָה, coherente con el estándar del proyecto.
  - Se evita introducir «Señor» como sustituto del nombre divino.
  - «Se apagaron» conserva el paralelismo con el fuego sin volverlo interpretativo de más.
  - «Derribé» busca equilibrio entre la fuerza bélica del hebreo y la naturalidad del español.
