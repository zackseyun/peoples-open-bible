  language: en
  yaml_path: translation/ot/zephaniah/003/019.yaml
  text: Behold[a], at that time I will deal with all your oppressors, and I will save the lame and gather the outcast[d][c][b], and I will make them a praise and a name in every land where they were put to shame.
  footnotes:
  - marker: a
    text: Or 'those who afflict you.' The Hebrew verb can denote afflicting, oppressing, or humbling.
    reason: lexical_alternative
  - marker: b
    text: Or 'the one who limps' and 'the one driven away'; the Hebrew uses feminine singular forms, likely personifying the afflicted community.
    reason: lexical_alternative
  - marker: c
    text: Or 'in all the earth.'
    reason: lexical_alternative
  - marker: d
    text: The final phrase is difficult Hebrew; it may also be understood more literally as 'in their shame.' The translation follows the contextual sense, 'where they were put to shame.'
    reason: textual_variant
