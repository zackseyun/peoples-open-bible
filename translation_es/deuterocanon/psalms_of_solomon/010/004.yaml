translation:
  language: es
  text: Y la misericordia de Yahvé está sobre los que lo aman en la verdad[a], y Yahvé se acordará de sus siervos[b] con misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con fidelidad» o «con sinceridad» para «en la verdad».
    reason: lexical_alternative
  - marker: b
    text: O «esclavos» para «siervos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - clemencia
  lexicon: BDAG
  rationale: «Misericordia» es el equivalente natural en español para ἔλεος y conserva tanto la bondad pactal como la respuesta compasiva sin añadir matices no presentes en el griego.
- source_word: Κυρίου / Κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: BDAG
  rationale: Aunque el audit trail inglés usa «Lord» como título, en este proyecto el nombre divino se vierte como «Yahvé» para no enmascarar el nombre sagrado, y el contexto judío devocional apoya esta decisión.
- source_word: ἐπὶ
  english_pob_choice: is upon
  chosen_spanish: está sobre
  alternatives_spanish:
  - reposa sobre
  - cae sobre
  lexicon: BDAG
  rationale: «Está sobre» reproduce la imagen espacial del griego y mantiene la idea de una misericordia que recae o descansa sobre las personas.
- source_word: ἀγαπῶντας
  english_pob_choice: those who love
  chosen_spanish: los que lo aman
  alternatives_spanish:
  - los que aman a él
  - los que le aman
  lexicon: BDAG
  rationale: La forma participial se vuelve una frase sustantiva natural en español; el pronombre enclítico «lo» conserva el objeto directo personal de la acción de amar.
- source_word: ἐν ἀληθείᾳ
  english_pob_choice: in truth
  chosen_spanish: en la verdad
  alternatives_spanish:
  - con fidelidad
  - con sinceridad
  - verdaderamente
  lexicon: BDAG
  rationale: «En la verdad» sigue de cerca la forma griega y preserva el peso moral y covenantal de ἀληθείᾳ; se mantiene la ambigüedad documentada entre verdad, fidelidad y sinceridad.
- source_word: μνήσεται
  english_pob_choice: will remember
  chosen_spanish: se acordará
  alternatives_spanish:
  - recordará
  - tendrá presente
  lexicon: BDAG
  rationale: «Se acordará» comunica de manera natural la acción futura de memoria favorable divina; evita un calco rígido y conserva el matiz relacional del verbo.
- source_word: δούλων
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: BDAG
  rationale: La POB inglesa documenta la alternativa fuerte «slaves» para δούλων. En español, «esclavos» preserva mejor el peso léxico de δοῦλος que «siervos», y la nota permite registrar la alternativa más suave.
- source_word: ἐν ἐλέει
  english_pob_choice: with mercy
  chosen_spanish: con misericordia
  alternatives_spanish:
  - en misericordia
  - misericordiosamente
  lexicon: BDAG
  rationale: «Con misericordia» reproduce con naturalidad el valor acompañante/instrumental de la frase griega y mantiene la repetición intencional de la misericordia en el versículo.
theological_decisions:
- issue: Rendering of κύριος in a Jewish devotional context
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Señor
  rationale: El contexto y la política terminológica del proyecto favorecen explicitar el nombre divino en lugar de sustituirlo por una máscara litúrgica; esto hace visible el referente del título κύριος sin perder reverencia.
  doctrine_reference: 'DOCTRINE.md: יהוה / YHWH = Yahvé; κύριος = Lord when referring to the divine name'
- issue: Rendering of δοῦλος
  english_pob_reading: servants
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - criados
  rationale: La elección conserva la fuerza semántica de δοῦλος y no atenúa la relación de pertenencia/servidumbre implícita. La nota registra que el inglés POB optó por una forma más suave por razones de contexto.
  doctrine_reference: 'DOCTRINE.md: δοῦλος = servant / slave (context-dependent)'
- issue: Ambiguity of ἐν ἀληθείᾳ
  english_pob_reading: in truth
  chosen_spanish_reading: en la verdad
  alternative_spanish_readings:
  - con fidelidad
  - con sinceridad
  rationale: La formulación española debe conservar la tensión entre verdad, fidelidad y sinceridad. «En la verdad» mantiene esa amplitud sin resolverla prematuramente.
  doctrine_reference: BDAG on ἀλήθεια; POB lexical note on 'in truth'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando explícitamente ambas notas: [a] aparece en «en la verdad[a]» y [b] aparece en «esclavos[b]». No se realizaron otras revisiones respecto del último pase, y la redacción sigue el acuerdo alto del cotejo en inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para Κυρίου/Κύριος conforme al estándar terminológico del proyecto.
  - Se preservó la repetición de misericordia/ misericordia para reflejar ἔλεος / ἐλέει.
  - «Esclavos» se usó por fuerza léxica y por coherencia con la nota alternativa documentada.
  - La puntuación sigue el patrón español moderno, con comas que reflejan la sintaxis coordinada del griego.
