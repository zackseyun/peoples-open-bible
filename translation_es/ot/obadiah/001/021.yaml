    issue: «libertadores» como término principal para מוֹשִׁעִים
    rationale: Aunque no es incorrecto, se aleja del campo semántico más cercano a «salvadores/deliverers» y suena más político-histórico en español. La nota ya puede resolver la posible confusión teológica, por lo que «salvadores» preserva mejor el vínculo léxico con el hebreo.
  - severity: medium
    issue: «el monte de Esaú» subrepresenta el valor regional de הַר
    rationale: El expediente fuente y la nota inglesa prefieren el sentido de territorio montañoso de Edom. En español, «la región montañosa de Esaú» comunica mejor esa referencia que una montaña singular.
