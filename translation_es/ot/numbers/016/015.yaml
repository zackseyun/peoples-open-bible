revisions:
- from: 'Entonces Moisés se enojó muchísimo y dijo a Yahvé[a]: «No mires[b] su ofrenda. No he tomado de ellos ni un solo asno, ni he hecho daño a ninguno de ellos».'
  to: 'Entonces Moisés se enojó muchísimo y dijo a Yahvé[a]: «No tomes en cuenta[b] su ofrenda. No he tomado de ellos ni un solo asno, ni he hecho daño a ninguno de ellos».'
  rationale: Se reemplaza «No mires» por «No tomes en cuenta» para reflejar mejor el valor idiomático de פנה אל en una súplica cultual, manteniendo la nota con el literal hebreo y alternativas contextuales. También se corrige la redacción de la nota para evitar el menos natural «considérala».
