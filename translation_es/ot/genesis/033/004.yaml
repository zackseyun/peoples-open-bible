translation:
  language: es
  text: Esaú corrió a su encuentro, lo abrazó, cayó sobre su cuello, lo besó[a], y lloraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo traducido «lo besó» aparece marcado de forma inusual en el texto masorético con puntos sobre la palabra. Algunos intérpretes lo entienden como señal de duda o énfasis; sin embargo, el sentido llano del hebreo aquí es «lo besó».
    reason: textual_variant
lexical_decisions:
- source_word: וַיָּרָץ
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - corría
  - se apresuró
  lexicon: HALOT
  rationale: רוץ expresa correr; «corrió» preserva el movimiento súbito y natural del relato en español sin añadir explicación.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Esau
  lexicon: Convención onomástica bíblica
  rationale: El nombre propio se adapta a la forma habitual en español bíblico, manteniendo identificación clara y lectura natural.
- source_word: לִקְרָאתוֹ
  english_pob_choice: to meet him
  chosen_spanish: a su encuentro
  alternatives_spanish:
  - para encontrarlo
  - hacia él
  lexicon: HALOT
  rationale: La expresión idiomática לקראתו señala ir al encuentro de alguien; «a su encuentro» conserva el valor relacional mejor que una dirección meramente espacial.
- source_word: וַיְחַבְּקֵהוּ
  english_pob_choice: embraced him
  chosen_spanish: lo abrazó
  alternatives_spanish:
  - lo estrechó en un abrazo
  lexicon: HALOT
  rationale: חבק significa abrazar; «lo abrazó» es la equivalencia natural y transparente en español, sin perder el gesto afectuoso.
- source_word: וַיִּפֹּל עַל צַוָּארוֹ
  english_pob_choice: fell on his neck
  chosen_spanish: se echó sobre su cuello
  alternatives_spanish:
  - cayó sobre su cuello
  - se arrojó sobre su cuello
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para un abrazo intenso y emotivo. «Se echó sobre su cuello» conserva la imagen corporal del texto y su fuerza afectiva en español.
- source_word: וַיִּשָּׁקֵהוּ
  english_pob_choice: kissed him
  chosen_spanish: lo besó
  alternatives_spanish:
  - lo besó en el cuello
  lexicon: HALOT
  rationale: נשק en este contexto significa besar; «lo besó» es la forma más directa y natural. Se mantiene el sentido llano indicado por el audit trail, sin introducir sospecha en la traducción principal.
- source_word: וַיִּבְכּוּ
  english_pob_choice: they wept
  chosen_spanish: lloraron
  alternatives_spanish:
  - se echaron a llorar
  - lloraron ambos
  lexicon: HALOT
  rationale: El plural indica que ambos lloraron; «lloraron» expresa correctamente la acción compartida con sobriedad narrativa. «Se echaron a llorar» sería más expansivo.
theological_decisions:
- issue: Lectura de la secuencia afectuosa entre Esaú y Jacob
  english_pob_reading: Render the sequence straightforwardly as genuine reconciliation language without adding suspicion or theological interpretation.
  chosen_spanish_reading: Presentar la secuencia como acciones afectuosas y directas, sin insinuar ironía o sospecha.
  alternative_spanish_readings:
  - Leer el beso con cautela o ambigüedad interpretativa
  - matizar la escena como potencialmente hostil
  rationale: El hebreo acumula verbos de movimiento y afecto de modo frontal. La traducción debe preservar esa superficie narrativa y no importar interpretaciones posteriores al cuerpo principal del texto.
  doctrine_reference: Prioridad del texto original; conservar la tensión interpretativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no hubo cambios necesarios; la versión mantiene el acuerdo alto del control cruzado y conserva la lectura llana del gesto de reconciliación.'
  spanish_consistency_notes:
  - Se mantiene «Esaú» como forma onomástica estándar en español, consistente con el registro bíblico.
  - Se traduce el plural final como «lloraron» para reflejar que el verbo hebreo es plural.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni una cita de κύριος.
  - La nota al pie se limita al detalle masorético del verbo «besó», sin alterar la traducción principal.
