translation:
  language: es
  text: La batalla fue muy feroz aquel día[a], y Abner y los hombres de Israel fueron derrotados delante de los siervos de David[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la batalla fue muy severa aquel día'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'los siervos de David'; aquí se refiere a las fuerzas o los hombres de David.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמִּלְחָמָה
  english_pob_choice: the battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - la guerra
  - el combate
  - la lucha
  lexicon: HALOT
  rationale: En este contexto narrativo militar, מִלְחָמָה se refiere a un enfrentamiento concreto más que a una campaña prolongada; por eso 'batalla' conserva la precisión de la escena y coincide con la decisión inglesa.
- source_word: קָשָׁה עַד מְאֹד
  english_pob_choice: very fierce
  chosen_spanish: muy feroz
  alternatives_spanish:
  - muy dura
  - muy severa
  - muy encarnizada
  lexicon: HALOT
  rationale: El hebreo expresa intensidad extrema. En español, 'feroz' comunica con naturalidad la violencia del combate y preserva el matiz de fuerza/aspereza de קָשָׁה, mientras que 'muy encarnizada' también sería posible pero menos directa.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: La expresión temporal es idiomática. 'Aquel día' suena natural en español y mantiene la distancia narrativa del demostrativo hebreo.
- source_word: וַיִּנָּגֶף
  english_pob_choice: were defeated
  chosen_spanish: fueron derrotados
  alternatives_spanish:
  - fueron vencidos
  - fueron abatidos
  - cayeron derrotados
  lexicon: HALOT
  rationale: El nifal de נָגַף en contexto bélico indica derrota ante un enemigo. 'Fueron derrotados' transmite el sentido militar sin forzar una imagen de lesión física individual.
- source_word: וְאַנְשֵׁי יִשְׂרָאֵל
  english_pob_choice: and the men of Israel
  chosen_spanish: y los hombres de Israel
  alternatives_spanish:
  - y los israelitas
  - y los soldados de Israel
  lexicon: HALOT
  rationale: '''Hombres de Israel'' sigue de cerca el hebreo אַנְשֵׁי יִשְׂרָאֵל y mantiene la referencia al contingente combatiente sin sustituirla por una etiqueta étnica más amplia.'
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  - frente a
  lexicon: HALOT
  rationale: En un contexto militar, לִפְנֵי señala la derrota ante un enemigo. 'Delante de' conserva la relación espacial/idiomática del hebreo de manera clara en español.
- source_word: עַבְדֵי דָוִד
  english_pob_choice: the servants of David
  chosen_spanish: los siervos de David
  alternatives_spanish:
  - los servidores de David
  - los hombres de David
  - los esclavos de David
  lexicon: HALOT
  rationale: El término עֶבֶד aquí designa a quienes están al servicio de David. 'Siervos' mantiene la cercanía formal al hebreo y evita atenuar demasiado la fuerza relacional del término, aunque 'hombres de David' también sería contextualmente viable.
translation_notes:
  revision_awareness: Alineado con la revisión más reciente indicada como sin cambios, y con el informe de alta concordancia; no se introdujeron alteraciones textuales sustantivas respecto del auditorio inglés, solo una adaptación española natural de los mismos valores léxicos.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo semántico con la traducción inglesa auditada: intensidad bélica, referencia temporal, derrota militar y relación servicial/política de David.'
  - Se preservó la ambigüedad útil de עַבְדֵי דָוִד con una nota, dado que en español 'siervos' puede sonar más religioso; la nota aclara su valor militar-político en este contexto.
  - Se eligió una sintaxis sobria y publicable, sin añadir elementos interpretativos ajenos al hebreo ni suavizar la fuerza del relato.
