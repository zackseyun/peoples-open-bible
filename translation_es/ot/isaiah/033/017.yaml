review_pass:
  verdict: revise
  source_alignment_summary: 'La primera cláusula refleja bien el hebreo: «Tus ojos» preserva עֵינֶיךָ, «al rey» mantiene el sentido definido contextual de מֶלֶךְ, y «en su hermosura» transmite adecuadamente בְּיָפְיוֹ. Sin embargo, la nota al pie actual contradice el texto principal al presentar «en su hermosura» como alternativa más literal cuando ya es la lectura adoptada. Además, «una tierra muy distante» reduce el sentido de אֶרֶץ מַרְחַקִּים a mera lejanía/remotidad, mientras que el audit trail inglés preserva mejor la idea de amplitud o gran alcance (“far-reaching land”) y documenta alternativas como «tierra remota» o «tierra de grandes distancias».'
  spanish_quality_summary: El español es claro y legible, pero la segunda cláusula suena algo más estrecha semánticamente que el original y el POB inglés. «Una tierra muy distante» suena natural, pero desplaza la imagen desde extensión/lejanías amplias hacia una ubicación remota. «Una tierra de grandes distancias» suena más literal pero algo pesada; «una tierra que se extiende a lo lejos» sería más idiomática, aunque más interpretativa. Para conservar mejor el equilibrio entre fidelidad y legibilidad, conviene una formulación como «una tierra extensa» con nota que preserve «remota» y «de grandes distancias».
  glossary_alignment: No hay conflictos con la terminología proyectual principal (Yahvé, Mesías, etc.). La decisión «hermosura» es aceptable, aunque «belleza» también sería natural. El punto principal de alineación léxica es que מַרְחַקִּים no debe aplanarse a solo «muy distante» sin conservar en nota el campo semántico de «grandes distancias / remota».
  issues:
  - severity: medium
    issue: La nota [a] está mal formulada y contradice el texto principal.
    rationale: El texto principal ya dice «en su hermosura», pero la nota afirma «o más literalmente, ‘en su hermosura’». La nota debe ofrecer alternativas reales, no repetir la lectura adoptada como alternativa.
  - severity: medium
    issue: «una tierra muy distante» estrecha el sentido de מַרְחַקִּים.
    rationale: El hebreo plural comunica lejanías, grandes distancias o amplitud; el POB inglés revisado eligió «far-reaching» precisamente para evitar una lectura demasiado limitada a «remota». La versión española debería reflejar mejor ese matiz.
  revised_spanish_text: Tus ojos verán al rey en su hermosura[a]; verán una tierra extensa[b].
  revised_footnotes:
