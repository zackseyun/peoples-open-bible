  yaml_path: translation/ot/1_chronicles/002/003.yaml
  text: 'The sons of Judah: Er[a], Onan, and Shelah; three were born to him by Bath-shua the Canaanite. Er, Judah’s firstborn, was evil in the sight of Yahweh[b], and he put him to death.'
  footnotes:
