translation:
  language: es
  text: 'Pero en cuanto a ustedes, casa de Israel, así dice el Señor Dios Yahvé: Vayan, cada uno, sirvan a sus ídolos[a] ahora y en adelante, si no me escuchan[b]; pero ya no profanarán mi santo nombre con sus ofrendas y con sus ídolos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo גִּלּוּלִים es un término intensamente despectivo para los ídolos; también puede entenderse como «ídolos inmundos» o «ídolos de estiércol».
    reason: lexical_alternative
  - marker: b
    text: La sintaxis hebrea después de «sirvan» es difícil; la cláusula también puede puntuarse de manera algo distinta, manteniendo la idea de una secuencia temporal y condicional.
    reason: alternative_reading
lexical_decisions:
- source_word: וְאַתֶּם
  english_pob_choice: But as for you
  chosen_spanish: Pero en cuanto a ustedes
  alternatives_spanish:
  - Y ustedes
  - Pero ustedes
  lexicon: HALOT
  rationale: La partícula introduce un contraste directo y fuerte; en español, «Pero en cuanto a ustedes» conserva el giro adversativo y el foco de tratamiento directo sin sonar forzado.
- source_word: בֵּית יִשְׂרָאֵל
  english_pob_choice: house of Israel
  chosen_spanish: casa de Israel
  alternatives_spanish:
  - casa/linaje de Israel
  - pueblo de Israel
  lexicon: HALOT
  rationale: «Casa de Israel» es la equivalencia estable y preserva el sentido corporativo y pactal del hebreo.
- source_word: אֲדֹנָי יְהֹוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvéh
  lexicon: HALOT
  rationale: 'Se sigue el principio del proyecto para יְהוָה: «Yahvé» en el texto principal. En la combinación אֲדֹנָי יְהֹוִה, «el Señor Yahvé» evita el enredo de «Señor SEÑOR» y conserva la solemnidad del título compuesto.'
- source_word: אִישׁ
  english_pob_choice: each man
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada hombre
  - cada cual
  lexicon: HALOT
  rationale: El singular distributivo exige individualización. «Cada uno» comunica la responsabilidad personal sin imponer una marcación masculina innecesaria en español.
- source_word: גִּלּוּלָיו
  english_pob_choice: his idols
  chosen_spanish: sus ídolos
  alternatives_spanish:
  - sus ídolos inmundos
  - sus ídolos de estiércol
  lexicon: HALOT
  rationale: El término es despectivo en hebreo, pero el texto principal español conserva «ídolos»; el matiz contemptuoso se preserva en nota para no sobrecargar la línea principal.
- source_word: לְכוּ עֲבֹדוּ
  english_pob_choice: Go, ... serve
  chosen_spanish: Vayan, ... sirvan
  alternatives_spanish:
  - Vayan y sirvan
  - Vayan, sirvan
  lexicon: HALOT
  rationale: Los dos imperativos se reflejan de forma directa y natural en español, manteniendo el tono judicial e imperativo.
- source_word: וְאַחַר אִם אֵינְכֶם שֹׁמְעִים אֵלַי
  english_pob_choice: if afterward you will not listen to me
  chosen_spanish: ahora y después, si no me escuchan
  alternatives_spanish:
  - y después, si no me escuchan
  - luego, si no me escuchan
  lexicon: HALOT
  rationale: La sintaxis hebrea es difícil y el audit trail inglés optó por una solución temporal. «Ahora y después» refleja la secuencia/alcance temporal sin resolver en exceso la relación exacta entre cláusulas; «no me escuchan» mantiene el valor de שׁמע con posible obediencia implícita.
- source_word: שֹׁמְעִים אֵלַי
  english_pob_choice: listen to me
  chosen_spanish: me escuchan
  alternatives_spanish:
  - me oyen
  - me obedecen
  lexicon: HALOT
  rationale: «Escuchar» preserva la imagen auditiva y deja abierta la implicación de obediencia que el contexto demanda.
- source_word: שֵׁם קָדְשִׁי
  english_pob_choice: my holy name
  chosen_spanish: mi santo nombre
  alternatives_spanish:
  - el nombre de mi santidad
  - mi nombre santo
  lexicon: HALOT
  rationale: Es la equivalencia idiomática y teológica más natural en español, conservando la referencia al nombre divino en su carácter consagrado.
- source_word: לֹא תְחַלְּלוּ עוֹד
  english_pob_choice: you shall no longer profane
  chosen_spanish: ya no profanarán
  alternatives_spanish:
  - ya no profanen
  - no profanarán más
  lexicon: HALOT
  rationale: En el contexto profético, el imperfecto funciona como declaración fuerte/futuro. «Ya no profanarán» mantiene el valor prohibitivo-declarativo y suena fluido en español.
- source_word: בְּמַתְּנֹתֵיכֶם
  english_pob_choice: with your gifts
  chosen_spanish: con sus ofrendas
  alternatives_spanish:
  - con sus regalos
  - con sus dones
  lexicon: HALOT
  rationale: Aquí el contexto cultual hace que «ofrendas» sea más preciso y natural que «regalos», sin perder el sentido básico de dones/presentes.
- source_word: וּבְגִלּוּלֵיכֶם
  english_pob_choice: and with your idols
  chosen_spanish: y con sus ídolos
  alternatives_spanish:
  - y con sus ídolos inmundos
  - y con sus ídolos de estiércol
  lexicon: HALOT
  rationale: Se mantiene la repetición del referente idólatra del hebreo y la conexión con la profanación del nombre divino.
theological_decisions:
- issue: Fuerza de los imperativos iniciales
  english_pob_reading: 'A judicial concession/ironic command: Israel is told to go serve idols if they refuse to listen, followed by a prohibition/declaration that they must no longer profane God’s holy name.'
  chosen_spanish_reading: 'Una concesión judicial con tono irónico: se les ordena ir a servir a sus ídolos si no escuchan a Yahvé, y luego se declara que ya no profanarán su santo nombre.'
  alternative_spanish_readings:
  - Un permiso real para seguir en la idolatría
  - Una simple descripción sin valor imperativo
  rationale: El texto no aprueba la idolatría; expone la rebeldía de Israel y anuncia el fin de la profanación. La traducción conserva la forma imperativa y el matiz judicial sin suavizar la tensión.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica'
- issue: Tratamiento del nombre divino en el título compuesto
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor YHWH
  rationale: Se sigue la convención del proyecto para el Tetragrámaton y se evita una duplicación poco natural en español. El título compuesto mantiene su solemnidad sin sustituir el nombre divino por una máscara editorial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste más reciente del audit trail inglés: conserva el arranque contrastivo, refleja la secuencia temporal/condicional de וְאַחַר sin resolverla en exceso, y mantiene la prohibición final con un futuro declarativo natural en español. También toma en cuenta la revisión que prefería una formulación directa y publicable, sin perder la ambigüedad sintáctica documentada.'
  spanish_consistency_notes:
  - Se usó «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se prefirió «ídolos» en el texto principal, dejando el matiz peyorativo de גִּלּוּלִים en nota.
  - «Escuchar» conserva la ambivalencia hebrea entre oír y obedecer.
  - La puntuación separa la concesión judicial del cierre prohibitivo para facilitar la lectura pública sin eliminar la tensión del original.
