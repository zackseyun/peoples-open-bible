translation:
  language: es
  text: No conviene el lujo[a] al necio; mucho menos que un esclavo[b] gobierne a príncipes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «placer» o «deleite» en lugar de «lujo». El término hebreo puede referirse al disfrute en general, pero aquí probablemente alude a una vida acomodada o indulgente.
    reason: lexical_alternative
  - marker: b
    text: O «siervo» en lugar de «esclavo». El hebreo עֶבֶד puede abarcar varias condiciones de servidumbre; aquí se usa «esclavo» porque la fuerza del proverbio depende del fuerte contraste social.
    reason: lexical_alternative
  - marker: c
    text: O «nobles» o «funcionarios» en lugar de «príncipes».
    reason: lexical_alternative
lexical_decisions:
- source_word: נָאוֶה
  english_pob_choice: is fitting
  chosen_spanish: conviene
  alternatives_spanish:
  - es propio
  - es adecuado
  - es conveniente
  lexicon: HALOT
  rationale: El adjetivo expresa lo apropiado o lo que encaja con alguien. «Conviene» da en español una evaluación natural y breve, manteniendo el juicio sapiencial sin cargarlo con un tono demasiado formal.
- source_word: כְסִיל
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - tonto
  - insensato
  - estúpido
  lexicon: HALOT
  rationale: En la literatura sapiencial hebrea, כְסִיל es una categoría moral y espiritual. «Necio» conserva mejor ese valor bíblico y evita reducirlo a mera falta de inteligencia.
- source_word: תַּעֲנוּג
  english_pob_choice: luxury
  chosen_spanish: lujo
  alternatives_spanish:
  - placer
  - deleite
  - vida indulgente
  lexicon: HALOT
  rationale: En este proverbio el sentido apunta a comodidad opulenta o disfrute indulgente, no solo a placer en general. «Lujo» transmite mejor esa carga social y ética que «placer» o «deleite».
- source_word: אַף כִּי
  english_pob_choice: much less
  chosen_spanish: mucho menos
  alternatives_spanish:
  - cuánto más
  - con mayor razón
  - menos aún
  lexicon: HALOT
  rationale: La expresión introduce un argumento a fortiori. «Mucho menos» comunica con claridad en español el contraste intensificado entre la primera y la segunda mitad del proverbio.
- source_word: עֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: HALOT
  rationale: 'Aquí el contraste social es central: una persona en condición de servidumbre sometida a gobernar. «Esclavo» preserva mejor la fuerza del hebreo que «siervo», que suaviza el status jurídico y social.'
- source_word: מְשֹׁל
  english_pob_choice: to rule
  chosen_spanish: gobierne
  alternatives_spanish:
  - rija
  - mande
  - gobierne sobre
  lexicon: HALOT
  rationale: El infinitivo verbal expresa ejercer autoridad. En español, «gobierne» funciona con naturalidad en una construcción proverbial y mantiene el sentido de mando sobre otros.
- source_word: שָׂרִים
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - nobles
  - funcionarios
  - gobernantes
  lexicon: HALOT
  rationale: «Príncipes» conserva el nivel social elevado del término hebreo y mantiene la oposición proverbial con «esclavo». Otras opciones son posibles, pero esta es clara y tradicional sin depender de fórmulas eclesiásticas.
translation_notes:
  revision_awareness: El borrador sigue de cerca el hebreo masorético y coincide sustancialmente con la línea de revisión más reciente del POB en inglés, que ya no requirió cambios. Se preserva el contraste sapiencial y social del proverbio sin añadir explicaciones ajenas al texto.
  spanish_consistency_notes:
  - Se usa «esclavo» de forma consistente con la decisión POB cuando el estatus servil es semánticamente relevante.
  - Se usa «necio» para כְסִיל, manteniendo el registro sapiencial bíblico.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, ya que el versículo no contiene el nombre divino ni una cita explícita del mismo.
