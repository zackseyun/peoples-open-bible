translation:
  language: es
  text: Y sus hermanos[a], por todas las familias de Isacar, eran hombres de gran valor, ochenta y siete mil en total[b], inscritos por genealogía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sus parientes' o 'sus familiares'; el hebreo 'hermanos' puede abarcar también a los miembros del clan en contextos genealógicos.
    reason: lexical_alternative
  - marker: b
    text: O 'registrados por genealogía'. El verbo hebreo indica ser incluido en registros genealógicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲחֵיהֶם
  english_pob_choice: And their brothers
  chosen_spanish: Y sus hermanos
  alternatives_spanish:
  - Y sus parientes
  - Y sus deudos
  lexicon: HALOT
  rationale: אָח puede significar 'hermano', y en contextos genealógicos extenderse a miembros del clan. 'Hermanos' conserva el giro hebreo de forma natural en español, mientras que las alternativas explicitan el parentesco ampliado.
- source_word: לְכֹל מִשְׁפְּחוֹת יִשָׂשכָר
  english_pob_choice: throughout all the families of Issachar
  chosen_spanish: por todas las familias de Isacar
  alternatives_spanish:
  - según todas las familias de Isacar
  - a través de todas las familias de Isacar
  lexicon: HALOT
  rationale: La preposición ל con כֹל aquí marca alcance o relación total. En español, 'por todas las familias' comunica la distribución dentro del conjunto de los clanes de Isacar sin sonar forzado.
- source_word: גִּבּוֹרֵי חֲיָלִים
  english_pob_choice: mighty men of valor
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - guerreros valientes
  - hombres poderosos
  - hombres de valor
  lexicon: HALOT
  rationale: La expresión fija denota hombres probados y capaces, con matiz militar. 'Hombres valientes' mantiene la idea de fortaleza y coraje de modo claro en español, aunque es algo menos formular que 'mighty men of valor'.
- source_word: שְׁמוֹנִים וְשִׁבְעָה אֶלֶף
  english_pob_choice: eighty-seven thousand
  chosen_spanish: ochenta y siete mil
  alternatives_spanish:
  - '87.000'
  lexicon: HALOT
  rationale: Se conserva el número en palabras, como es usual en la prosa bíblica, y coincide con el valor literal del hebreo.
- source_word: הִתְיַחְשָׂם
  english_pob_choice: enrolled by genealogy
  chosen_spanish: inscritos por genealogía
  alternatives_spanish:
  - registrados por genealogía
  - inscritos en los registros genealógicos
  - contados en la genealogía
  lexicon: HALOT
  rationale: El hitpael de יחשׂ remite a ser incorporado o asentado en registros genealógicos. 'Inscritos por genealogía' conserva la fuerza administrativa y evita paraphrasear más allá del original.
- source_word: לַכֹּל
  english_pob_choice: in all
  chosen_spanish: en total
  alternatives_spanish:
  - en todo
  - en conjunto
  - sumando todo
  lexicon: HALOT
  rationale: La frase cierra con un total global. 'En total' es idiomático en español y transmite con claridad el valor sumativo de לַכֹּל.
translation_notes:
  revision_awareness: El texto inglés auditado está en concordancia alta con el hebreo y no muestra revisiones aplicadas; la traducción española sigue esa misma lectura sin introducir variantes no documentadas.
  spanish_consistency_notes:
  - Se mantiene 'Isacar' como forma castellana habitual del nombre propio.
  - Se evita 'SEÑOR' o equivalentes porque no aparece el tetragrámaton en este versículo.
  - '''Inscritos por genealogía'' preserva el matiz técnico de registro sin sobreinterpretar el verbo.'
