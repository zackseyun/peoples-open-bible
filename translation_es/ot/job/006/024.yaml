review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: imperativo plural «הוֹרוּנִי», respuesta enfática «y yo», promesa «callaré», y petición causativa «hagan que entienda». También refleja correctamente la interpretación idiomática de וּמַה + שָׁגִיתִי como petición de especificar el error. Sin embargo, la nota al pie no preserva la alternativa del POB inglés; repite esencialmente el texto principal en vez de reflejar la opción alternativa documentada.'
  spanish_quality_summary: 'El español es claro y digno. «Instrúyanme» es fiel pero algo más pesado que «Enséñenme»; aun así, sigue siendo natural y aceptable. El mayor problema es editorial: la nota [a] no aporta una alternativa real y por eso no cumple su función. Además, «en qué he errado» en el texto principal inclina la línea hacia una localización puntual del error; «cómo me he desviado» o similar preserva mejor el matiz de שׁגה como extraviarse, mientras deja la alternativa más literal en nota.'
  glossary_alignment: 'No hay términos del glosario teológicamente sensibles en este versículo. Las decisiones léxicas son en general consistentes con el rastro auditado: הוֹרוּנִי = enseñar/instruir; אַחֲרִישׁ = callar/guardar silencio; שָׁגִיתִי = errar/desviarse; הָבִינוּ לִי = hacer entender. Conviene alinear mejor la nota española con la alternativa inglesa documentada.'
  issues:
  - severity: medium
    issue: La nota al pie [a] no conserva la alternativa léxica del POB inglés.
    rationale: El inglés registra como alternativa «make me understand in what I have erred». La nota española actual («háganme entender en qué he errado») no funciona como alternativa significativa porque casi repite el texto principal y no refleja una distinción real.
  - severity: low
    issue: «en qué he errado» en el texto principal reduce el matiz metafórico de שָׁגִיתִי.
    rationale: Aunque «errar» es legítimo, el rastro inglés escogió «gone astray» para preservar la imagen de desviarse del camino. En español, una formulación como «cómo me he desviado» o «cómo me he extraviado» mantiene mejor ese matiz, dejando «en qué he errado» como alternativa útil en nota.
  revised_spanish_text: Instrúyanme, y yo callaré; hagan que entienda cómo me he desviado[a].
  revised_footnotes:
  - marker: a
    text: 'O: «háganme entender en qué he errado».'
