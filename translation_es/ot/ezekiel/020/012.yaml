translation:
  language: es
  text: También les di mis sábados[a], para que fueran una señal entre mí y ellos, para que supieran que yo soy Yahvé, que los santifica[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mis días de reposo». Se conserva «sábados» para reflejar el plural hebreo שַׁבְּתוֹתַי y su fuerza institucional.
    reason: lexical_alternative
  - marker: b
    text: O «que los hace santos». «Santifica» mantiene el verbo de קדשׁ y su sentido de acción divina de apartar y consagrar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: I also
  chosen_spanish: También
  alternatives_spanish:
  - Y también
  - Además
  lexicon: HALOT
  rationale: El hebreo añade otro elemento a la secuencia; en español, «También» conserva el valor aditivo de forma natural y sobria.
- source_word: שַׁבְּתוֹתַי
  english_pob_choice: my Sabbaths
  chosen_spanish: mis sábados
  alternatives_spanish:
  - mis sábados de reposo
  - mis días de reposo
  lexicon: HALOT
  rationale: Se conserva el plural hebreo y la referencia a la institución del sábado. «Sábados» refleja con más transparencia la forma plural del original; «días de reposo» explicaría el sentido pero suaviza el sustantivo base.
- source_word: נָתַתִּי לָהֶם
  english_pob_choice: gave them
  chosen_spanish: les di
  alternatives_spanish:
  - se los di
  - los di a ellos
  lexicon: HALOT
  rationale: La construcción con dativo se vuelve de modo idiomático en español como «les di», manteniendo la acción directa de dar sin cargar la frase.
- source_word: לִהְיוֹת לְאוֹת
  english_pob_choice: to be a sign
  chosen_spanish: para que fueran una señal
  alternatives_spanish:
  - para ser una señal
  - como señal
  lexicon: HALOT
  rationale: La infinitiva final expresa propósito; en español, una subordinada final con «para que» es clara y transmite el valor de señal del hebreo sin perder la relación verbal.
- source_word: בֵּינִי וּבֵינֵיהֶם
  english_pob_choice: between me and them
  chosen_spanish: entre yo y ellos
  alternatives_spanish:
  - entre mí y ellos
  - entre mí y ellos dos
  lexicon: HALOT
  rationale: Se mantiene la relación recíproca entre las partes. Aunque en español normativo se esperaría «entre mí y ellos», aquí se opta por una forma más cercana al paralelismo del hebreo y al auditorio teológico del texto; la tensión queda documentada en la nota.
- source_word: לָדַעַת
  english_pob_choice: so that they might know
  chosen_spanish: para que supieran
  alternatives_spanish:
  - para que conozcan
  - a fin de que supieran
  lexicon: HALOT
  rationale: La finalidad del infinitivo se expresa con una subordinada final; el imperfecto en pasado narrativo contextualizado queda bien en español como «supieran».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - SEÑOR
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto para el Tetragrámaton. «Yahvé» es la forma española establecida para el nombre divino, en lugar de sustituirlo por un título.
- source_word: מְקַדְּשָׁם
  english_pob_choice: who sanctifies them
  chosen_spanish: que los santifica
  alternatives_spanish:
  - que los hace santos
  - que los consagra
  lexicon: HALOT
  rationale: El participio expresa acción divina continua o característica. «Santifica» conserva el registro teológico de קדשׁ y la relación de pacto, sin diluirlo en una formulación más interpretativa.
theological_decisions:
- issue: Sustitución del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de manera directa. Se preserva el nombre propio de Dios en español, conforme al criterio del proyecto, en lugar de enmascararlo como título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Función covenantal de los sábados como señal
  english_pob_reading: to be a sign between me and them
  chosen_spanish_reading: para que fueran una señal entre yo y ellos
  alternative_spanish_readings:
  - como señal entre mí y ellos
  - para ser una señal entre mí y ellos
  rationale: La frase presenta los sábados como marcador relacional del pacto. Se mantiene el valor de «señal» sin introducir una interpretación adicional.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
- issue: קדשׁ en contexto de santificación
  english_pob_reading: who sanctifies them
  chosen_spanish_reading: que los santifica
  alternative_spanish_readings:
  - que los hace santos
  - que los consagra
  rationale: El participio remite a la acción continua de Dios de apartar a su pueblo para sí. «Santifica» conserva el sentido teológico y evita sustituirlo por un giro más explicativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y coincide con el flujo semántico confirmado por el auditorio inglés POB. Se mantuvo la decisión del nombre divino como Yahvé/Yahweh y la lectura de קדשׁ como santificación, sin cambios sustantivos respecto del pasaje fuente.
  spanish_consistency_notes:
  - Se conserva el plural «sábados» para reflejar שַׁבְּתוֹתַי y evitar neutralizar la forma del original.
  - Se mantiene «señal» como equivalente de אוֹת en el marco de pacto.
  - Se usó «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - La forma «entre yo y ellos» se mantiene por cercanía al paralelismo hebreo; si se prefiere mayor normalidad idiomática, la alternativa normativa sería «entre mí y ellos».
