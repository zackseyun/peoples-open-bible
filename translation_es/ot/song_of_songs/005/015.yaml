    rationale: La POB inglesa preserva explícitamente la incertidumbre léxica principal en «pillars of marble/alabaster». En esta unidad, la nota española debería mantener esa alternativa significativa para el mismo punto del texto.
  - severity: medium
    issue: «Escogido como los cedros» es poco idiomático y no representa con la mayor naturalidad el valor adjectival de בָּחוּר.
    rationale: Aunque semánticamente apunta a excelencia selecta, en español suena rígido y puede leerse como si los cedros fueran los que escogen. «Distinguido entre los cedros» o «selecto como los cedros» comunica mejor la idea poética.
  revised_spanish_text: Sus piernas son columnas de mármol[a], asentadas sobre bases de oro fino. Su apariencia es como el Líbano[b], distinguido entre los cedros.
