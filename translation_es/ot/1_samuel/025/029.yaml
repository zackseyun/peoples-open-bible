revisions:
- from: Aunque un hombre se haya levantado para perseguirte y buscar tu vida[a], la vida de mi señor quedará atada en el haz de los vivos con Yahvé tu Dios, y las vidas de tus enemigos él las arrojará desde el hueco de la honda[b].
  to: Aunque un hombre se haya levantado para perseguirte y buscar tu vida[a], la vida de mi señor quedará atada en el atado de los vivos con Yahvé tu Dios, y las vidas de tus enemigos él las lanzará desde el hueco de la honda[b].
  rationale: Se reemplaza «haz» por «atado» para expresar con más claridad en español la imagen de algo bien sujeto y guardado. Se cambia «arrojará» por «lanzará» para que el texto principal conserve la referencia específica a la honda, conforme al hebreo קלע y a la decisión léxica documentada en el POB inglés. Se mantiene «Yahvé», la concesiva inicial, y «buscar tu vida» porque reflejan fielmente el original y la política del proyecto.
