translation:
  language: es
  text: 'Que se reúnan todas las naciones, y que se congreguen los pueblos. ¿Quién entre ellos podrá declarar esto y hacer oír las cosas primeras[a]? Presenten sus testigos, para que sean justificados[b]; y que oigan y digan: «Es verdad».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cosas antiguas». En Isaías, esta expresión suele referirse a hechos anteriores o declaraciones previas que demuestran la soberanía de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: O «para que sean vindicados» / «para que queden en lo correcto». En este escenario judicial, el verbo hebreo tiene fuerza forense.
    reason: alternative_reading
lexical_decisions:
- source_word: כָּל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los gentiles
  lexicon: HALOT
  rationale: גּוֹיִם aquí funciona mejor como 'naciones' en el marco forense e internacional del pasaje. 'Gentiles' en español suele sonar restringido a una categoría religiosa étnica y no conserva tan bien el alcance universal del contraste.
- source_word: נִקְבְּצוּ יַחְדָּו
  english_pob_choice: be gathered together
  chosen_spanish: se reúnan
  alternatives_spanish:
  - se congreguen juntas
  - sean reunidas juntamente
  lexicon: HALOT
  rationale: El niphal de קבץ expresa una reunión pasiva/reflexiva; en español, 'se reúnan' comunica con naturalidad la convocatoria colectiva y puede abarcar la idea de 'juntamente' sin sonar forzado.
- source_word: וְיֵאָסְפוּ לְאֻמִּים
  english_pob_choice: and let the peoples be assembled
  chosen_spanish: y que se congreguen los pueblos
  alternatives_spanish:
  - y que sean reunidos los pueblos
  - y que se junten los pueblos
  lexicon: HALOT
  rationale: לְאֻמִּים mantiene el paralelo con גּוֹיִם pero con matiz algo distinto; 'pueblos' preserva esa distinción mejor que repetir 'naciones'. 'Congreguen' respeta el valor de reunión formal y pública.
- source_word: מִי בָהֶם
  english_pob_choice: Who among them
  chosen_spanish: ¿Quién entre ellos
  alternatives_spanish:
  - ¿Cuál de ellos
  - ¿Quién de ellos
  lexicon: HALOT
  rationale: La pregunta es idiomática y de desafío judicial. '¿Quién entre ellos?' suena natural en español y mantiene el sentido de selección dentro del grupo.
- source_word: יַגִּיד זֹאת
  english_pob_choice: can declare this
  chosen_spanish: podrá declarar esto
  alternatives_spanish:
  - puede declarar esto
  - podrá anunciar esto
  lexicon: HALOT
  rationale: נגד en hifil tiene fuerza de declarar/anunciar. En el contexto retórico, el futuro de posibilidad 'podrá' refleja el desafío implícito sin añadir un auxiliar no presente.
- source_word: וְרִאשֹׁנוֹת
  english_pob_choice: the former things
  chosen_spanish: las cosas antiguas
  alternatives_spanish:
  - las cosas primeras
  - las cosas pasadas
  lexicon: HALOT
  rationale: '''Former things'' en Isaías puede referirse a hechos o proclamaciones previas que acreditan la soberanía de Yahvé. ''Las cosas antiguas'' conserva esa referencia temporal y, en español, resulta más natural que ''las primeras cosas''.'
- source_word: יַשְׁמִיעֻנוּ
  english_pob_choice: make ... heard
  chosen_spanish: hacer oír
  alternatives_spanish:
  - hacernos oír
  - hacer que oigamos
  lexicon: HALOT
  rationale: El hifil de שמע es causativo. 'Hacer oír' conserva la idea de causar la audición sin introducir 'a nosotros' como complemento que el hebreo no exige en español.
- source_word: יִתְּנוּ עֵדֵיהֶם
  english_pob_choice: Let them present their witnesses
  chosen_spanish: Presenten sus testigos
  alternatives_spanish:
  - Traigan sus testigos
  - Que presenten sus testigos
  lexicon: HALOT
  rationale: נתן con 'testigos' en un escenario judicial funciona como presentar/poner a disposición. 'Presenten sus testigos' mantiene la formalidad forense de la escena.
- source_word: וְיִצְדָּקוּ
  english_pob_choice: that they may be justified
  chosen_spanish: para que sean justificados
  alternatives_spanish:
  - para que sean vindicados
  - para que queden en lo correcto
  lexicon: HALOT
  rationale: En este contexto tribunalicio, צדק conserva un valor forense. 'Sean justificados' mantiene la conexión con el veredicto judicial que el POB inglés optó por 'justified'; en español puede resonar con lenguaje jurídico sin borrar la tensión del texto.
- source_word: וְיִשְׁמְע֖וּ וְיֹאמְר֥וּ אֱמֶת
  english_pob_choice: and let them hear and say, “It is true.”
  chosen_spanish: 'y que oigan y digan: «Es verdad»'
  alternatives_spanish:
  - 'y oigan y digan: «Verdad»'
  - 'y escuchen y digan: «Es cierto»'
  lexicon: HALOT
  rationale: El cierre expresa reconocimiento tras escuchar la evidencia. 'Es verdad' reproduce de forma natural el predicativo אֱמֶת y conserva la fuerza de asentimiento público.
theological_decisions:
- issue: Forensic imagery in the challenge to the nations
  english_pob_reading: Render the verse as a courtroom summons and evidentiary challenge, with 'that they may be justified.'
  chosen_spanish_reading: Mantener la escena como un llamamiento judicial y una prueba pública, con 'para que sean justificados'.
  alternative_spanish_readings:
  - '''para que sean vindicados'''
  - '''para que queden en lo correcto'''
  rationale: Isaías 43 presenta una disputa forense entre Yahvé y las naciones/ídolos. La traducción preserva el lenguaje de juicio sin convertirlo en terminología doctrinal posterior. 'Justificados' respeta mejor la decisión auditada del POB inglés que una paráfrasis más libre.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Rendering of 'former things' in Isaiah
  english_pob_reading: '''former things'' often refers to earlier acts or prior declarations that demonstrate the Lord’s sovereignty.'
  chosen_spanish_reading: '''las cosas antiguas'' como referencia a actos o anuncios previos que manifiestan la soberanía de Yahvé.'
  alternative_spanish_readings:
  - '''las cosas primeras'''
  - '''las cosas pasadas'''
  rationale: En Isaías, la expresión tiene peso histórico y apologético. 'Antiguas' es suficientemente abierto para abarcar tanto hechos como proclamaciones anteriores, y evita una traducción demasiado técnica o artificial.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: He seguido la revisión más reciente del POB inglés al omitir cualquier añadido como «a nosotros» en la segunda pregunta y al mantener una solución forense directa para וְיִצְדָּקוּ. También tomé en cuenta la preferencia revisada por una formulación más directa de la escena legal, sin suavizarla en paráfrasis.
  spanish_consistency_notes:
  - He mantenido 'Yahvé' como nombre divino conforme al estándar del proyecto, aunque en este versículo no aparece explícitamente.
  - He conservado el paralelismo 'naciones/pueblos' para reflejar la distinción hebrea entre גּוֹיִם y לְאֻמִּים.
  - '''Es verdad'' reproduce el asentimiento final de la escena judicial sin convertirlo en una abstracción doctrinal.'
  - No he introducido vocabulario eclesiástico tradicional donde el hebreo pide un registro forense y público.
