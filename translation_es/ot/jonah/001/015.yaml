translation:
  language: es
  text: Así que tomaron a Jonás y lo arrojaron al mar, y el mar cesó de su furia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo arrojaron al mar, y el mar cesó de su furor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂאוּ
  english_pob_choice: picked up
  chosen_spanish: tomaron
  alternatives_spanish:
  - alzaron
  - levantaron
  - cogieron
  lexicon: HALOT
  rationale: El verbo hebreo indica aquí una acción física concreta previa al lanzamiento de Jonás. En español, «tomaron» comunica bien que lo sujetaron para moverlo, sin sonar innecesariamente forzado como «alzaron» ni demasiado coloquial como «cogieron» en muchos registros.
- source_word: וַיְטִלֻהוּ
  english_pob_choice: threw him
  chosen_spanish: lo arrojaron
  alternatives_spanish:
  - lo lanzaron
  - lo echaron
  - lo tiraron
  lexicon: HALOT
  rationale: טול expresa lanzar/arrojar. «Lo arrojaron» conserva la fuerza del acto y encaja con el registro bíblico español. «Lo echaron» podría ser correcto, pero puede sonar menos preciso; «lo tiraron» es demasiado coloquial.
- source_word: אֶל הַיָּם
  english_pob_choice: into the sea
  chosen_spanish: al mar
  alternatives_spanish:
  - hacia el mar
  - dentro del mar
  lexicon: HALOT
  rationale: Aunque la construcción hebrea usa אֶל («a/hacia»), con un verbo de arrojar el español natural pide «al mar» para indicar el destino del movimiento. «Dentro del mar» sería más explícito, pero menos fiel al giro simple del hebreo.
- source_word: וַיַּעֲמֹד הַיָּם
  english_pob_choice: the sea ceased
  chosen_spanish: el mar cesó
  alternatives_spanish:
  - el mar se aquietó
  - el mar quedó en calma
  - el mar se detuvo
  lexicon: HALOT
  rationale: עמד aquí describe la interrupción del movimiento violento del mar. «Cesó» mantiene el valor verbal y refleja bien la transición a la quietud. «Se aquietó» o «quedó en calma» suavizan más la imagen; «se detuvo» es posible, pero puede sonar menos idiomático para el mar.
- source_word: מִזַּעְפּוֹ
  english_pob_choice: from its raging
  chosen_spanish: de su furor
  alternatives_spanish:
  - de su ira
  - de su cólera
  - de su furia
  lexicon: HALOT
  rationale: זעף puede expresar furor/ira/indignación; aplicado al mar, el inglés POB conserva la personificación. En español, «furor» mantiene ese vigor y el matiz personificado mejor que «ira» o «cólera». «Furia» también es posible, pero «furor» queda más cercano al registro bíblico y al cese de un estado violento.
theological_decisions:
- issue: Personificación del mar
  english_pob_reading: the sea ceased from its raging
  chosen_spanish_reading: el mar cesó de su furor
  alternative_spanish_readings:
  - el mar cesó de su furia
  - el mar quedó en calma
  rationale: El hebreo personifica el mar al hablar de su זעף. La versión española conserva esa personificación con un giro natural y sobrio, sin convertirlo en una mera nota meteorológica ni borrar la imagen literaria.
  doctrine_reference: 'Poética bíblica y sentido literal: preservar la personificación sin añadir interpretación doctrinal ajena.'
translation_notes:
  revision_awareness: Se siguió el cierre revisado del inglés POB, que prefiere una formulación más formal y cercana al hebreo para la cláusula final («ceased from its raging») frente a una paráfrasis más libre. La redacción española intenta conservar esa misma relación entre claridad moderna y fidelidad formal.
  spanish_consistency_notes:
  - Se usó «mar» de forma consistente para הַיָּם.
  - Se mantuvo la personificación del mar en la cláusula final, como en el inglés POB.
  - No se introdujo «Mesías», «Yahvé» ni otros términos no presentes en este versículo.
