translation:
  language: es
  text: 'Y él les dijo[a]: «Profanen la casa y llenen los atrios con los muertos[b]. Salgan». Y salieron y abatieron gente en la ciudad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el templo». El hebreo dice literalmente «la casa».
    reason: lexical_alternative
  - marker: b
    text: O «llenen los atrios con cadáveres».
    reason: lexical_alternative
lexical_decisions:
- source_word: טַמְּאוּ
  english_pob_choice: Defile
  chosen_spanish: Profanen
  alternatives_spanish:
  - Contaminen
  - Hagan impura
  lexicon: HALOT
  rationale: El imperativo intensivo pide una acción ritual y judicial de profanación/impureza. «Profanen» conserva bien el choque cultual del mandato y es natural en español bíblico contemporáneo.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: La base hebrea dice literalmente «la casa». Mantener «la casa» preserva la imagen original; el contexto de Ezequiel permite entender que se trata del recinto sagrado.
- source_word: הַחֲצֵרוֹת
  english_pob_choice: the courts
  chosen_spanish: los patios
  alternatives_spanish:
  - los atrios
  - los patios del templo
  lexicon: HALOT
  rationale: En español, «patios» comunica el espacio abierto del complejo con mayor naturalidad que «cortes». «Atrios» sería más tradicional, pero «patios» refleja el valor espacial sin sonar forzado.
- source_word: חֲלָלִים
  english_pob_choice: the slain
  chosen_spanish: los muertos
  alternatives_spanish:
  - los caídos
  - los asesinados
  - los cadáveres
  lexicon: HALOT
  rationale: El término puede denotar a los muertos por violencia, pero el español «los muertos» es el equivalente más directo y amplio. Se conserva la ambigüedad entre el estado del cuerpo y la condición de haber sido abatidos; «cadáveres» estrecharía demasiado el sentido.
- source_word: צֵאוּ
  english_pob_choice: Go out
  chosen_spanish: Salgan
  alternatives_spanish:
  - Vayan afuera
  - Salid
  lexicon: HALOT
  rationale: El mandato es simple y directo. «Salgan» es el equivalente natural en español moderno y mantiene el tono imperativo.
- source_word: וְיָצְאוּ
  english_pob_choice: So they went out
  chosen_spanish: Y salieron
  alternatives_spanish:
  - Entonces salieron
  - Así que salieron
  lexicon: HALOT
  rationale: La forma narrativa hebrea avanza la acción en secuencia. «Y salieron» conserva la coordinación simple del texto.
- source_word: וְהִכּוּ
  english_pob_choice: struck down people
  chosen_spanish: mataron
  alternatives_spanish:
  - golpearon
  - derribaron
  - hirieron
  lexicon: HALOT
  rationale: En este contexto, נכה implica golpe letal. «Mataron» explicita el resultado en español con claridad, sin añadir elementos ajenos al contexto de juicio.
- source_word: בָעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  - por la ciudad
  lexicon: HALOT
  rationale: La preposición locativa se traduce de manera directa y sobria.
theological_decisions:
- issue: El mandato de profanar el recinto sagrado en visión judicial
  english_pob_reading: 'Translate the imperative directly as a divine command within the vision: ''Defile the house.'''
  chosen_spanish_reading: 'Traducir el imperativo de manera directa como un mandato divino dentro de la visión: «Profanen la casa».'
  alternative_spanish_readings:
  - «Hagan impura la casa»
  - «Contaminen la casa»
  rationale: El texto presenta un juicio divino que se expresa mediante la profanación ritual del lugar santo. La traducción debe conservar la fuerza teológica y no atenuarla con una formulación más débil o explicativa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Mantener «la casa» en lugar de explicitar «el templo»
  english_pob_reading: Keep 'the house' in the main text rather than substituting 'the temple.'
  chosen_spanish_reading: Mantener «la casa» en el texto principal en lugar de sustituirlo por «el templo».
  alternative_spanish_readings:
  - «el templo»
  rationale: La decisión sigue de cerca el hebreo y conserva la metáfora original, mientras el contexto identifica con claridad el lugar sagrado. Esto evita una expansión interpretativa innecesaria en el cuerpo del texto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto coincide con el pase final aprobado y el control cruzado reporta acuerdo alto.
  spanish_consistency_notes:
  - Se preservó «la casa» como calco controlado del hebreo, siguiendo la decisión inglesa de mantener «the house».
  - «Profanen» conserva el valor cultual de טמא sin suavizarlo.
  - «Patios» se eligió por claridad en español, aunque «atrios» sigue siendo una alternativa válida si se prefiere un registro más tradicional.
  - «Los muertos» mantiene la referencia a los abatidos sin forzar «cadáveres», que en español podría sonar demasiado clínico.
