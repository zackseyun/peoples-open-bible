translation:
  language: es
  text: Entonces todos los príncipes del mar[a] bajarán de sus tronos, se quitarán sus mantos y se desprenderán de sus vestidos bordados. Se vestirán de temblor[b], se sentarán en tierra, temblarán a cada momento y se quedarán espantados ante ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los líderes del mar». La frase hebrea es literalmente «todos los príncipes del mar», refiriéndose a gobernantes marítimos.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «vestirán temblores»; una imagen vívida del terror como si fuera una prenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָרְדוּ
  english_pob_choice: Then ... will come down
  chosen_spanish: Entonces ... bajarán
  alternatives_spanish:
  - y ... descenderán
  - entonces ... descenderán
  lexicon: WLC / HALOT
  rationale: El hebreo expresa descenso físico y humillación; «bajarán» comunica bien la acción y el tono profético, mientras «entonces» conserva el valor discursivo de la conjunción inicial.
- source_word: מֵעַל כִּסְאוֹתָם
  english_pob_choice: from their thrones
  chosen_spanish: de sus tronos
  alternatives_spanish:
  - de encima de sus tronos
  - de sus asientos
  lexicon: WLC / HALOT
  rationale: «Tronos» mantiene la dignidad regia y la humillación implícita al abandonarlos. En español, la relación espacial de מֵעַל queda suficientemente expresada por «de» en este contexto.
- source_word: כֹּל נְשִׂיאֵי הַיָּם
  english_pob_choice: all the princes of the sea
  chosen_spanish: todos los príncipes del mar
  alternatives_spanish:
  - todos los líderes del mar
  - todos los gobernantes del mar
  lexicon: WLC / HALOT
  rationale: Se conserva la literalidad de «el mar» como lo hace la POB inglesa, sin reinterpretarlo en el texto principal como «costas» o «regiones marítimas». «Príncipes» preserva la fuerza política/elevada de נְשִׂיאִים.
- source_word: וְהֵסִירוּ
  english_pob_choice: remove
  chosen_spanish: se quitarán
  alternatives_spanish:
  - quitarán
  - se desprenderán de
  lexicon: WLC / HALOT
  rationale: Con ropa, «quitarse» es el equivalente natural en español y mantiene la acción de despojarse de sus vestiduras; el prefijo reflexivo encaja con el sujeto que se despoja a sí mismo.
- source_word: מְעִילֵיהֶם
  english_pob_choice: their robes
  chosen_spanish: sus mantos
  alternatives_spanish:
  - sus ropas
  - sus mantos exteriores
  lexicon: WLC / HALOT
  rationale: מְעִיל es un vestido exterior, manto o capa; «manto» conserva mejor esa idea que un genérico como «ropa».
- source_word: בִּגְדֵי רִקְמָתָם
  english_pob_choice: their embroidered garments
  chosen_spanish: sus vestidos bordados
  alternatives_spanish:
  - sus prendas bordadas
  - sus ropas bordadas
  lexicon: WLC / HALOT
  rationale: «Bordados» traduce רִקְמָה con naturalidad en español y preserva la imagen de prendas lujosas y ornamentadas. «Vestidos» es un término amplio y digno para la vestimenta de la élite.
- source_word: יִפְשֹׁטוּ
  english_pob_choice: strip off
  chosen_spanish: se desprenderán de
  alternatives_spanish:
  - se quitarán
  - se despojarán de
  lexicon: WLC / HALOT
  rationale: El verbo intensifica el despojo de la ropa. «Se desprenderán de» mantiene esa fuerza de desvestirse con más viveza que un simple «quitarse» y evita redundancia total con la línea anterior.
- source_word: חֲרָדֹות יִלְבָּשׁוּ
  english_pob_choice: They will clothe themselves with trembling
  chosen_spanish: Se vestirán de temblor
  alternatives_spanish:
  - se vestirán de terror
  - se cubrirán de temblor
  lexicon: WLC / HALOT
  rationale: Se conserva la metáfora de vestir el miedo. «Temblor» reproduce el sustantivo hebreo de manera más literal que «terror», manteniendo la tensión entre imagen corporal y emoción.
- source_word: עַל הָאָרֶץ יֵשֵׁבוּ
  english_pob_choice: sit on the ground
  chosen_spanish: se sentarán en tierra
  alternatives_spanish:
  - se sentarán en el suelo
  - se sentarán sobre la tierra
  lexicon: WLC / HALOT
  rationale: «En tierra» es una opción bíblica y natural en español que refleja abatimiento sin introducir una imagen más moderna o coloquial.
- source_word: וְחָרְדוּ לִרְגָעִים
  english_pob_choice: tremble moment by moment
  chosen_spanish: temblarán a cada momento
  alternatives_spanish:
  - temblarán momento a momento
  - temblarán continuamente
  lexicon: WLC / HALOT
  rationale: La expresión hebrea sugiere temblor repetido o intermitente; «a cada momento» transmite bien ese ritmo y conserva la vividez de la repetición.
- source_word: וְשָׁמְמוּ עָלָיִךְ
  english_pob_choice: and be appalled at you
  chosen_spanish: y se quedarán espantados ante ti
  alternatives_spanish:
  - y quedarán pasmados ante ti
  - y se asombrarán de ti
  lexicon: WLC / HALOT
  rationale: שׁמם puede expresar quedar desolado, atónito o espantado. En contexto de juicio, «espantados» comunica la reacción de horror y desconcierto que marca el texto, y «ante ti» conserva la dirección del hebreo.
translation_notes:
  revision_awareness: Se ha seguido el testimonio hebreo masorético (WLC) y el auditable criterio de la POB inglesa en este versículo; no se identificaron revisiones textuales relevantes en el expediente, y la solución española mantiene la misma imagen retórica de despojo, humillación y temor.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el Tetragrámaton aparece; en este versículo no ocurre.
  - Se conserva la metáfora de vestidura del miedo con un giro español natural («Se vestirán de temblor»).
  - «Príncipes del mar» sigue de cerca el hebreo y la POB inglesa, sin reinterpretar el referente en el texto principal.
  - «En tierra» respeta la postura de abatimiento sin introducir glosa interpretativa en el cuerpo del verso.
