review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura básica: recuerdo continuo de Dios, prohibición volitiva de transgredir, práctica continua de δικαιοσύνη y rechazo de los caminos de ἀδικία. Sin embargo, se aparta innecesariamente del audit trail inglés al elegir «justicia / injusticia» en el texto principal donde el POB documentó como preferente «righteousness / unrighteousness», dejando «justice / injustice» como alternativa de nota. Además, «niño» como vocativo para παιδίον suena menos natural y más reductivo que «hijo» o «hijo mío/niño»; dado que el inglés evitó sobredeterminar género, en español conviene un vocativo más idiomático y digno, sin tono infantilizante.'
  spanish_quality_summary: 'El español es claro y legible, pero «Todos los días, niño» suena algo rígido y poco natural en registro bíblico digno. «Recuerda a Yahvé, nuestro Dios» es comprensible; mejor fluye «acuérdate de Yahvé nuestro Dios» o «recuerda a Yahvé nuestro Dios». La mayor reparación necesaria es léxica: «practica la justicia ... caminos de la injusticia» reduce el contraste moral-religioso más amplio del griego. Una formulación con «rectitud ... injusticia» o «justicia[a] ... injusticia» según nota sería posible, pero, conforme al rastro inglés, «rectitud» en el texto principal funciona mejor en español.'
  glossary_alignment: 'Alinea bien con la pauta del proyecto al usar «Yahvé». «Mandamientos» y «camines» también encajan. La principal desalineación es con δικαιοσύνη: la política del proyecto y la decisión inglesa favorecen «justicia/rectitud» según contexto, preservando aquí el alcance de ‘righteousness’. En español, «rectitud» refleja mejor la elección principal, mientras la dimensión social se conserva en nota como alternativa «justicia ... injusticia».'
  issues:
  - severity: medium
    issue: δικαιοσύνη se vertió como «justicia» en el texto principal
    rationale: El audit trail inglés eligió como lectura principal ‘righteousness / unrighteousness’ y relegó ‘justice / injustice’ a nota. En español, «justicia» privilegia la dimensión social y legal más que la moral-religiosa amplia del contraste.
  - severity: medium
    issue: Vocativo «niño» para παιδίον
    rationale: Aunque léxicamente posible, en español bíblico neutro suena infantilizante y menos natural. «Hijo» es más idiomático en el discurso paternal de Tobit y mejora la dignidad/readabilidad, aun si el griego no marca explícitamente ‘mi’.
  - severity: low
    issue: Nota al pie no refleja bien la alternativa completa del texto principal revisado
    rationale: Si se adopta una lectura principal con «rectitud», la nota debe ofrecer claramente la alternativa «justicia ... injusticia» y explicar la amplitud moral/social del griego.
