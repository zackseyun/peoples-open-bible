translation:
  language: es
  text: Porque no hay recuerdo duradero del sabio más que del necio para siempre[a], pues en los días venideros todo ya habrá sido olvidado. ¡Y cómo muere el sabio, igual que el necio![b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «porque no hay recuerdo del sabio con el necio para siempre». El texto principal expresa el modismo hebreo en español natural, preservando la comparación de su destino compartido.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y cómo muere el sabio con el necio». La redacción probablemente es exclamativa y expresa el hecho doloroso de que el sabio muere igual que el necio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִכְרוֹן
  english_pob_choice: remembrance
  chosen_spanish: recuerdo
  alternatives_spanish:
  - memoria
  - conmemoración
  lexicon: HALOT
  rationale: El sustantivo expresa la idea de recuerdo o memoria perdurable. «Recuerdo» suena natural en español y conserva el matiz existencial de Qohelet sin forzar un término técnico de culto.
- source_word: לֶחָכָם / הֶחָכָם
  english_pob_choice: the wise
  chosen_spanish: el sabio
  alternatives_spanish:
  - la persona sabia
  - el hombre sabio
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo/adjetivo masculino singular sustantivado. «El sabio» preserva esa forma representativa sin añadir «hombre» donde el español puede entenderlo sin pérdida.
- source_word: עִם הַכְּסִיל
  english_pob_choice: any more than of the fool / just like the fool
  chosen_spanish: ni tampoco del necio
  alternatives_spanish:
  - junto con el necio
  - con el necio
  lexicon: HALOT
  rationale: Aquí עִם no funciona como simple compañía, sino como comparación de destino. En español, «ni tampoco del necio» comunica esa equivalencia sin calco pesado.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: El texto enfatiza la ausencia de recuerdo permanente. «Para siempre» conserva la fuerza adverbial del hebreo y encaja con la cadencia del verso.
- source_word: בְּשֶׁכְּבָר
  english_pob_choice: since / already
  chosen_spanish: en los días venideros
  alternatives_spanish:
  - puesto que ya
  - ya que
  lexicon: HALOT
  rationale: La construcción introduce la razón de la afirmación anterior y se completa con el valor de כבר en la frase siguiente. La solución española mantiene la relación causal sin sonar artificial.
- source_word: הַיָּמִים הַבָּאִים
  english_pob_choice: the days to come
  chosen_spanish: los días venideros
  alternatives_spanish:
  - los días que vienen
  - los días por venir
  lexicon: HALOT
  rationale: «Venideros» reproduce bien la orientación futura de la expresión y mantiene un tono bíblico sobrio en español.
- source_word: הַכֹּל נִשְׁכָּח
  english_pob_choice: all will already have been forgotten
  chosen_spanish: todo ya habrá sido olvidado
  alternatives_spanish:
  - todo será olvidado
  - todo está olvidado
  lexicon: HALOT
  rationale: 'El nifal expresa pasividad: «ser olvidado». El plus de כבר se refleja mejor con un futuro perfecto en español, que transmite la idea de que para entonces todo estará ya olvidado.'
- source_word: וְאֵיךְ
  english_pob_choice: And how
  chosen_spanish: ¡Y cómo!
  alternatives_spanish:
  - Y cómo
  - ¡Y de qué manera!
  lexicon: HALOT
  rationale: La forma introduce una exclamación de lamento o asombro, no una pregunta informativa. «¡Y cómo!» conserva ese tono retórico.
- source_word: יָמוּת
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - morirá
  - ha de morir
  lexicon: HALOT
  rationale: El imperfecto hebreo aquí comunica una verdad general. En español, el presente «muere» expresa mejor esa sentencia proverbial que un futuro predictivo.
theological_decisions:
- issue: La comparación de destino entre sabio y necio
  english_pob_reading: The wise dies like the fool; both share the same mortality and the same practical disappearance from memory.
  chosen_spanish_reading: El sabio muere igual que el necio; ambos comparten la misma mortalidad y el mismo olvido práctico.
  alternative_spanish_readings:
  - el sabio muere como el necio
  - el sabio muere del mismo modo que el necio
  rationale: El hebreo es una observación amarga y general sobre la muerte compartida. La traducción mantiene esa equivalencia sin suavizarla ni convertirla en una reflexión abstracta ajena al contexto.
  doctrine_reference: Eclesiastés 2:14-16; cf. 9:2-3
- issue: El valor de לְעוֹלָם en el marco de Qohelet
  english_pob_reading: lasting / forever in the sense of enduring remembrance, not a metaphysical claim about eternal memory.
  chosen_spanish_reading: para siempre, en el sentido de recuerdo que no perdura
  alternative_spanish_readings:
  - eternamente
  - para toda la eternidad
  rationale: La frase no pretende enseñar una doctrina sobre la eternidad del recuerdo, sino negar que exista una memoria duradera del sabio o del necio. «Para siempre» conserva el énfasis sin sobredogmatizar el alcance.
  doctrine_reference: Ecclesiastes 1:11; 2:16
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del texto inglés: se restableció explícitamente «forever», se prefirió una formulación más natural para el colectivo («all») y se simplificó el cierre para reflejar con mayor directa fidelidad el hebreo. En español, eso llevó a mantener «para siempre», a usar «todo» como colectivo, y a conservar el final exclamativo breve del paralelismo.'
  spanish_consistency_notes:
  - Se mantuvo «sabio/necio» para conservar el contraste sapiencial del libro.
  - Se usó «para siempre» en lugar de una perífrasis más interpretativa para respetar לְעוֹלָם.
  - Se evitó «Señor» o cualquier máscara reverencial, porque el versículo no contiene el Tetragrámaton.
  - El tono final se dejó exclamativo para reflejar la fuerza retórica del hebreo y del audit trail inglés.
