base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/019/002.yaml
  text: And David said[a], “I will show kindness to Hanun son of Nahash, because his father showed kindness to me.” So David sent messengers to comfort him concerning his father. And David’s servants came to the land of the Ammonites, to Hanun, to comfort him.
