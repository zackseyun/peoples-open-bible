translation:
  language: es
  text: Y comerás delante de Yahvé tu Dios[a], en el lugar que él escoja para hacer habitar allí su nombre, el diezmo de tu grano, de tu mosto y de tu aceite, y los primogénitos de tu ganado y de tu rebaño, para que aprendas a temer a Yahvé tu Dios todos tus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que su nombre habite allí» o «para poner allí su nombre». El hebreo conserva el modismo de que Yahvé hace habitar su nombre en el santuario escogido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָכַלְתָּ
  english_pob_choice: And you shall eat
  chosen_spanish: Y comerás
  alternatives_spanish:
  - Y has de comer
  - Y comerás entonces
  lexicon: HALOT
  rationale: El perfecto con waw en contexto legal/instructivo funciona como mandato futuro. «Comerás» conserva el valor directivo con español natural.
- source_word: לִפְנֵי יְהוָה אֱלֹהֶיךָ
  english_pob_choice: before Yahweh your God
  chosen_spanish: delante de Yahvé tu Dios
  alternatives_spanish:
  - en presencia de Yahvé tu Dios
  lexicon: HALOT
  rationale: לִפְנֵי expresa estar delante/en presencia de. «Delante de» es la forma más breve y fiel en español bíblico contemporáneo, y mantiene la relación cultual sin suavizarla.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton. «Yahvé» preserva el nombre propio divino en lugar de sustituirlo por un título.
- source_word: בַּמָּקוֹם אֲשֶׁר יִבְחַר
  english_pob_choice: in the place that he will choose
  chosen_spanish: en el lugar que él escogiere
  alternatives_spanish:
  - en el lugar que él escoja
  - en el lugar que él escogerá
  lexicon: HALOT
  rationale: La fórmula deuteronómica apunta al santuario escogido por Dios. «Escogiere» reproduce bien el futuro relativo/formal del hebreo y suena solemne en español bíblico.
- source_word: לְשַׁכֵּן שְׁמוֹ שָׁם
  english_pob_choice: for his name to dwell there
  chosen_spanish: para hacer habitar allí su nombre
  alternatives_spanish:
  - para que su nombre habite allí
  - para poner allí su nombre
  lexicon: HALOT
  rationale: El hebreo conserva la idiomática “hacer habitar” el nombre. La forma elegida refleja la acción divina sin reducirla a una localización cruda, manteniendo la tensión teológica del texto.
- source_word: מַעְשַׂר
  english_pob_choice: the tithe
  chosen_spanish: el diezmo
  alternatives_spanish:
  - la décima parte
  lexicon: HALOT
  rationale: «Diezmo» es el equivalente cultual establecido y comunica mejor la institución legal que una glosa matemática.
- source_word: דְּגָנְךָ
  english_pob_choice: your grain
  chosen_spanish: tu grano
  alternatives_spanish:
  - tu cereal
  - tu cosecha
  lexicon: HALOT
  rationale: דגן designa el producto cereal/agrícola principal. «Grano» es conciso y suficientemente preciso en español.
- source_word: תִּירֹשְׁךָ
  english_pob_choice: your new wine
  chosen_spanish: tu mosto
  alternatives_spanish:
  - tu vino nuevo
  - tu vino fresco
  lexicon: HALOT
  rationale: תירוש se refiere al vino nuevo o mosto. «Mosto» preserva mejor la referencia al vino recién producido que «vino» a secas.
- source_word: וְיִצְהָרֶךָ
  english_pob_choice: your oil
  chosen_spanish: tu aceite
  alternatives_spanish:
  - tu aceite de oliva
  - tu aceite fresco
  lexicon: HALOT
  rationale: יִצְהָר nombra aceite, normalmente de oliva, dentro de la tríada agrícola. «Aceite» mantiene la formulación tradicional y natural en español.
- source_word: וּבְכֹרֹת
  english_pob_choice: and the firstborn
  chosen_spanish: y los primogénitos
  alternatives_spanish:
  - y los primeros nacidos
  - y las primicias
  lexicon: HALOT
  rationale: בכורות se refiere a los primeros nacidos del ganado. «Primogénitos» conserva el sentido técnico y el peso cultual del término.
- source_word: בְּקָרְךָ וְצֹאנֶךָ
  english_pob_choice: of your herd and your flock
  chosen_spanish: de tu ganado y de tu rebaño
  alternatives_spanish:
  - de tus reses y de tu rebaño
  - de tu ganado vacuno y de tu rebaño
  lexicon: HALOT
  rationale: בקר abarca el ganado mayor y צאן el ganado menor. «Ganado» / «rebaño» reproduce la pareja semántica con naturalidad en español.
- source_word: לְמַעַן תִּלְמַד
  english_pob_choice: so that you may learn
  chosen_spanish: para que aprendas
  alternatives_spanish:
  - a fin de que aprendas
  - para que llegues a aprender
  lexicon: HALOT
  rationale: למען introduce finalidad. «Para que aprendas» mantiene el propósito pedagógico sin sobreexplicar.
- source_word: לְיִרְאָה
  english_pob_choice: to fear
  chosen_spanish: a temer
  alternatives_spanish:
  - a reverenciar
  - a tener temor de
  lexicon: HALOT
  rationale: ירא conserva el peso de temor reverente y obediente. Se mantiene «temer» para no suavizar la fuerza lexical del mandato.
- source_word: כָּל הַיָּמִים
  english_pob_choice: all your days
  chosen_spanish: todos los días
  alternatives_spanish:
  - toda tu vida
  - siempre
  lexicon: HALOT
  rationale: La expresión idiomática indica duración continua. «Todos los días» es literal y claro en español bíblico.
theological_decisions:
- issue: Rendering the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se conserva el nombre propio divino, conforme a la convención del proyecto, evitando la sustitución por un título y manteniendo la referencia personal del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: The sanctuary formula לְשַׁכֵּן שְׁמוֹ שָׁם
  english_pob_reading: for his name to dwell there
  chosen_spanish_reading: para hacer habitar allí su nombre
  alternative_spanish_readings:
  - para que su nombre habite allí
  - para poner allí su nombre
  rationale: La traducción conserva el idioma hebreo del “nombre” que habita en el lugar escogido, evitando reducirlo a una presencia puramente abstracta y manteniendo la tensión entre trascendencia y presencia pactal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el anclaje [a] en el texto principal junto a «Yahvé tu Dios», de modo que la nota alternativa queda vinculada explícitamente al giro hebreo sobre el nombre que habita en el lugar escogido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el Tetragrámaton en todo el registro.
  - Se preserva la secuencia legal de mandato futuro con «comerás» y «aprendas».
  - «Mosto» se usa como equivalente más exacto de תירוש dentro de la tríada agrícola.
  - La nota [a] queda anclada en la frase afectada y no introduce marcadores no usados en el texto.
