    text: 'O: «has arrojado su trono a la tierra».'
    reason: lexical_alternative
  revision_rationale: Se simplifica la primera cláusula a una formulación más idiomática y elegante en español ('has puesto fin a') sin perder la fuerza causativa del hifil. Se cambia 'has derribado ... hasta el suelo' por 'has arrojado ... al suelo' para reflejar mejor la imagen verbal de tirar hacia abajo y evitar la redundancia o matiz añadido de 'hasta'. Se conservan las alternativas léxicas del POB en notas, ajustadas a un español más limpio.
