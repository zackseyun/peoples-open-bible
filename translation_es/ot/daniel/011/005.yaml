translation:
  language: es
  text: Entonces el rey del Sur se fortalecerá[a], pero uno de sus comandantes será más fuerte que él y gobernará, y su dominio será un gran dominio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «y de entre sus príncipes uno se fortalecerá sobre él». El hebreo puede leerse más literalmente con la idea de que surge uno de entre sus oficiales y gana superioridad sobre él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֶחֱזַק
  english_pob_choice: will grow strong
  chosen_spanish: se fortalecerá
  alternatives_spanish:
  - se hará fuerte
  - crecerá en fuerza
  - se volverá poderoso
  lexicon: HALOT
  rationale: El verbo qal de חזק expresa llegar a ser fuerte o ganar fuerza. «Se fortalecerá» conserva el valor dinámico y futuro sin sonar forzado en español.
- source_word: מֶלֶךְ הַנֶּגֶב
  english_pob_choice: the king of the South
  chosen_spanish: el rey del Sur
  alternatives_spanish:
  - el rey meridional
  - el rey de la parte sur
  lexicon: HALOT
  rationale: Se mantiene el título político-direccional de Daniel. «Del Sur» es natural en español y conserva el patrón formal del capítulo.
- source_word: וּמִן שָׂרָיו
  english_pob_choice: but one of his commanders
  chosen_spanish: pero uno de sus comandantes
  alternatives_spanish:
  - pero uno de sus príncipes
  - y de entre sus oficiales, uno
  lexicon: HALOT
  rationale: שַׂר aquí designa un alto oficial o comandante. «Comandantes» comunica mejor la función militar/política que «príncipes», que en español puede sonar demasiado monárquico o ambiguo.
- source_word: וְיֶחֱזַק עָלָיו
  english_pob_choice: will grow stronger than he
  chosen_spanish: se fortalecerá más que él
  alternatives_spanish:
  - prevalecerá sobre él
  - será más fuerte que él
  lexicon: HALOT
  rationale: La preposición עַל con חזק indica superioridad sobre la otra persona. «Más que él» conserva la comparación implícita en el hebreo y suena natural en español.
- source_word: וּמָשָׁל
  english_pob_choice: will rule
  chosen_spanish: y gobernará
  alternatives_spanish:
  - y reinará
  - y dominará
  lexicon: HALOT
  rationale: El qal continúa la secuencia narrativa y exige un verbo de ejercicio de autoridad. «Gobernará» es claro y sobrio en español.
- source_word: מִמְשָׁל רַב
  english_pob_choice: a great dominion
  chosen_spanish: un gran dominio
  alternatives_spanish:
  - un dominio vasto
  - un poderío grande
  lexicon: HALOT
  rationale: Se conserva el sustantivo político «dominio» para reflejar el alcance del gobierno, y «gran» reproduce la magnitud sin añadir matices no presentes.
- source_word: מֶמְשַׁלְתּוֹ
  english_pob_choice: his dominion
  chosen_spanish: su dominio
  alternatives_spanish:
  - su gobierno
  - su señorío
  lexicon: HALOT
  rationale: Se repite «dominio» para mantener el juego léxico hebreo entre מִמְשָׁל y מֶמְשָׁלָה/מֶמְשַׁלְתּוֹ, tal como el POB inglés repite «dominion».
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del hebreo de Daniel 11:5 y es coherente con la lectura de alta concordancia del auditable POB inglés. Se preserva la alternativa literal documentada en la nota, pero el texto principal opta por una formulación española más clara sin perder la comparación de fuerza ni el juego léxico de «dominio».
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma POB solo cuando aparece el nombre divino; aquí no aplica.
  - Se conserva la terminología política de Daniel con «rey», «comandantes», «gobernará» y «dominio» para mantener consistencia interna.
  - La nota a evita «príncipes» como primera opción porque en español puede desviar el sentido militar del hebreo שָׂר en este contexto.
