translation:
  language: es
  text: Un hermano y un compañero son para un tiempo de angustia, pero la justicia[a] libra más que ambos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «y la limosna/la misericordia rescatará más que ambas». El testigo hebreo lee «justicia» aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: אח / ἀδελφοὶ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - pariente
  - amigo cercano
  lexicon: HALOT
  rationale: El hebreo y el paralelo griego usan la imagen concreta de parentesco o fraternidad. En español, «hermano» conserva esa fuerza inmediata y no diluye la relación a un vínculo más general.
- source_word: ושותף / βοήθεια
  english_pob_choice: and a companion / help
  chosen_spanish: y un compañero
  alternatives_spanish:
  - y una ayuda
  - y un asociado
  lexicon: HALOT
  rationale: El hebreo habla de alguien que comparte la carga; el inglés POB prefirió «companion» por naturalidad formal. «Compañero» mantiene la relación personal de apoyo y evita una abstracción excesiva. El griego tiene «ayuda», por eso se conserva la tensión en nota.
- source_word: לעת צרה / εἰς καιρὸν θλίψεως
  english_pob_choice: for a time of trouble
  chosen_spanish: para el tiempo de angustia
  alternatives_spanish:
  - en tiempo de angustia
  - para un momento de aflicción
  lexicon: HALOT
  rationale: La expresión señala la utilidad en una crisis. «Tiempo de angustia» es natural, solemne y suficientemente amplio para cubrir la idea de aflicción o presión.
- source_word: ומשניהם
  english_pob_choice: more than both
  chosen_spanish: más que ambos
  alternatives_spanish:
  - más que los dos
  - por encima de ambos
  lexicon: HALOT
  rationale: El comparativo del hebreo exige una formulación explícita. «Más que ambos» es claro y conserva la relación entre los dos apoyos mencionados y lo que los supera.
- source_word: צדק
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia y rectitud
  lexicon: HALOT
  rationale: El testigo hebreo lee צדק, cuyo sentido básico aquí es justicia/rectitud. Se eligió «justicia» por ser la opción más natural y digna en español para una sentencia sapiencial. El paralelo griego introduce una lectura alternativa distinta, por lo que se documenta en nota.
- source_word: מצלת
  english_pob_choice: delivers
  chosen_spanish: libra
  alternatives_spanish:
  - rescata
  - salva
  lexicon: HALOT
  rationale: El verbo expresa rescate o liberación. «Libra» funciona bien en español bíblico moderno, evita una lectura excesivamente técnica y mantiene el tono sapiencial.
theological_decisions:
- issue: Diferencia entre el hebreo צדק y el paralelo griego ἐλεημοσύνη
  english_pob_reading: Follow the Hebrew main text with 'righteousness,' while preserving 'almsgiving/mercy' as an alternative in a footnote from the Greek parallel.
  chosen_spanish_reading: Mantener «la justicia» en el texto principal y preservar «la limosna/la misericordia» como lectura alternativa en nota.
  alternative_spanish_readings:
  - la limosna libra más que ambos
  - la misericordia libra más que ambos
  rationale: El hebreo conservado tiene prioridad como testigo existente y claro; sin embargo, el griego ofrece una variante sustancial que cambia el énfasis ético del proverbio. La traducción española debe hacer visible esa tensión textual en vez de resolverla silenciosamente.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo cuando se conserva; DOCTRINE.md: preservar tensiones textuales y teológicas relevantes.'
translation_notes:
  revision_awareness: El borrador español sigue la revisión más reciente del POB inglés al preferir una forma más natural y formal para שותף/companion, aquí rendida como «compañero». También conserva el juicio editorial del inglés de mantener la lectura hebrea principal «justicia» y registrar la variante griega en nota.
  spanish_consistency_notes:
  - Se mantuvo un registro formal y bíblico, pero con sintaxis natural en español.
  - Se evitó «SEÑOR» como máscara del nombre divino porque este verso no lo contiene.
  - Se usó «justicia» y no «caridad» en el texto principal para respetar el testigo hebreo, dejando la alternativa griega explícita en nota.
