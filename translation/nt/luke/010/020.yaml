theological_decisions:
- issue: Location of the heavenly registry
  chosen_reading: in the heavens
  alternative_readings:
  - in heaven
  rationale: The plural οὐρανοῖς is retained rather than normalized to the traditional singular. This avoids flattening the Greek expression while still conveying the theological idea of divine registration.
  doctrine_reference: Translation philosophy §1, §5
- issue: Nature of the spirits
  chosen_reading: the spirits
  alternative_readings:
  - demons
  - evil spirits
  rationale: The immediate context concerns hostile spiritual beings, but this verse uses πνεύματα rather than a more specific term. The translation preserves the lexical breadth and does not import a narrower label into the main text.
  doctrine_reference: Translation philosophy §1, §3
