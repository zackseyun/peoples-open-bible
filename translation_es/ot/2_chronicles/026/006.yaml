base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/026/006.yaml
  text: He went out and fought against the Philistines[a], and he broke down the wall of Gath, the wall of Jabneh, and the wall of Ashdod[b]; and he built cities in the territory of Ashdod and among the Philistines.
  footnotes:
  - marker: a
    text: Or 'breached' or 'broke down' the wall of Gath, the wall of Jabneh, and the wall of Ashdod.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in Ashdod and among the Philistines'; 'Ashdod' may refer to the city or its surrounding territory.
    reason: cultural_note
