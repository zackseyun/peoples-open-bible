translation:
  language: es
  text: Y el sacerdote pondrá parte de la sangre sobre los cuernos del altar del incienso aromático[b], delante de Yahvé, que está en la tienda de reunión; y derramará toda la sangre del toro[a] en la base del altar del holocausto, que está a la entrada de la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «toda la sangre del toro»; en el contexto, el sentido es la sangre restante después de aplicar parte de la sangre a los cuernos del altar.
    reason: lexical_alternative
  - marker: b
    text: O simplemente, «el altar del incienso».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַן
  english_pob_choice: shall put
  chosen_spanish: pondrá
  alternatives_spanish:
  - colocará
  - pondrá sobre
  lexicon: HALOT
  rationale: נתן es un verbo amplio de ‘dar/poner/colocar’. En esta instrucción ritual, «pondrá» comunica el acto concreto con naturalidad en español sin perder precisión.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el sacerdote
  lexicon: HALOT
  rationale: El sustantivo definido se traduce de forma directa. «Sacerdote» es la equivalencia clara y estándar en español.
- source_word: מִן הַדָּם
  english_pob_choice: some of the blood
  chosen_spanish: parte de la sangre
  alternatives_spanish:
  - algo de la sangre
  - una porción de la sangre
  lexicon: HALOT
  rationale: מן aquí es partitivo. «Parte de la sangre» expresa bien que no se usa toda la sangre en ese primer gesto ritual.
- source_word: קַרְנוֹת
  english_pob_choice: horns
  chosen_spanish: cuernos
  alternatives_spanish:
  - puntas
  - salientes
  lexicon: HALOT
  rationale: En el lenguaje cultual del altar, «cuernos» es el término tradicional y exacto para las protuberancias de las esquinas del altar.
- source_word: מִזְבַּח קְטֹרֶת הַסַּמִּים
  english_pob_choice: the altar of fragrant incense
  chosen_spanish: el altar del incienso aromático
  alternatives_spanish:
  - el altar del incienso
  - el altar del incienso fragante
  - el altar del incienso perfumado
  lexicon: HALOT
  rationale: La cadena nominal designa el altar del incienso; הַסַּמִּים añade la idea de aromas/especias. «Incienso aromático» mantiene el matiz descriptivo sin sonar forzado en español.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino en la forma establecida del proyecto. «Delante de» reproduce la relación espacial y litúrgica de לִפְנֵי.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» según la terminología base del proyecto en español.
- source_word: אֲשֶׁר בְּאֹהֶל מוֹעֵד
  english_pob_choice: which is in the tent of meeting
  chosen_spanish: el cual está en la tienda de reunión
  alternatives_spanish:
  - que está en la tienda de reunión
  - la cual está en la tienda de reunión
  lexicon: HALOT
  rationale: La relativa describe el altar del incienso. «Tienda de reunión» es la traducción estable de אֹהֶל מוֹעֵד, y «el cual» evita ambigüedad referencial en español.
- source_word: וְאֵת כָּל דַּם הַפָּר
  english_pob_choice: all the bull’s blood
  chosen_spanish: toda la sangre del becerro
  alternatives_spanish:
  - toda la sangre del toro
  - toda la sangre del novillo
  lexicon: HALOT
  rationale: פָּר puede referirse a un toro/becerro en el contexto sacrificial. Se eligió «becerro» como opción natural y cultualmente comprensible en español, sin forzar un tecnicismo ajeno al contexto.
- source_word: יִשְׁפֹּךְ
  english_pob_choice: he shall pour out
  chosen_spanish: derramará
  alternatives_spanish:
  - verterá
  - echará
  lexicon: HALOT
  rationale: שׁפך en este contexto ritual se expresa bien con «derramará», que conserva el acto físico y el tono sacrificial.
- source_word: אֶל יְסוֹד
  english_pob_choice: at the base
  chosen_spanish: al pie
  alternatives_spanish:
  - en la base
  - junto a la base
  lexicon: HALOT
  rationale: יְסוֹד es la base/fundamento. En español ritual, «al pie» comunica de manera natural el lugar donde se deposita la sangre.
- source_word: מִזְבַּח הָעֹלָה
  english_pob_choice: the altar of burnt offering
  chosen_spanish: el altar del holocausto
  alternatives_spanish:
  - el altar del sacrificio totalmente quemado
  - el altar del sacrificio consumido
  lexicon: HALOT
  rationale: La fórmula tradicional «holocausto» sigue siendo la manera más reconocible de designar el altar de los sacrificios completamente quemados en español bíblico.
- source_word: אֲשֶׁר פֶּתַח אֹהֶל מוֹעֵד
  english_pob_choice: which is at the entrance of the tent of meeting
  chosen_spanish: el cual está a la entrada de la tienda de reunión
  alternatives_spanish:
  - que está a la entrada de la tienda de reunión
  - el cual está junto a la entrada de la tienda de reunión
  lexicon: HALOT
  rationale: «A la entrada» reproduce fielmente la localización espacial del altar exterior; «tienda de reunión» mantiene la designación cultual estable.
theological_decisions:
- issue: Nombre divino en לִפְנֵי יְהוָה
  english_pob_reading: before Yahweh
  chosen_spanish_reading: delante de Yahvé
  alternative_spanish_readings:
  - ante Yahvé
  - delante del SEÑOR
  rationale: Se conserva el nombre personal de Dios conforme a la política del proyecto. No se sustituye por un título, porque el hebreo usa el Tetragrámaton directamente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Designación cultual de מִזְבַּח הָעֹלָה
  english_pob_reading: altar of burnt offering
  chosen_spanish_reading: altar del holocausto
  alternative_spanish_readings:
  - altar del sacrificio quemado
  - altar del sacrificio totalmente quemado
  rationale: El hebreo nombra el altar asociado al sacrificio completo por fuego. «Holocausto» preserva el término bíblico tradicional en español sin perder el sentido ritual del texto.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
- issue: Relación partitiva en מִן הַדָּם
  english_pob_reading: some of the blood
  chosen_spanish_reading: parte de la sangre
  alternative_spanish_readings:
  - algo de la sangre
  - una porción de la sangre
  rationale: La preposición מִן indica una porción. El español necesita marcar esa partitividad para que la secuencia ritual sea clara y no parezca que se usa toda la sangre en el primer acto.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'El contexto inglés revisado eliminó la expansión interpretativa «the rest of» y mantuvo la literalidad de «all the bull’s blood». La redacción española sigue esa línea: no añade «el resto», pero sí conserva la secuencia ritual implícita mediante «parte de la sangre» al inicio y «toda la sangre del becerro» al final.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, conforme a la convención del proyecto en español.
  - Se usa «tienda de reunión» de manera uniforme para אֹהֶל מוֹעֵד.
  - Se preserva la terminología cultual tradicional donde aporta claridad («holocausto», «cuernos»).
  - La puntuación separa claramente las dos acciones rituales coordinadas por «y» siguiendo el paralelismo del hebreo.
