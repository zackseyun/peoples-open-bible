id: 1TI.2.9
reference: 1 Timothy 2:9
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὡσαύτως ⸀καὶ γυναῖκας ἐν καταστολῇ κοσμίῳ μετὰ αἰδοῦς καὶ σωφροσύνης κοσμεῖν ἑαυτάς, μὴ ἐν πλέγμασιν ⸀καὶ ⸀χρυσίῳ ἢ μαργαρίταις ἢ ἱματισμῷ πολυτελεῖ,
base_translation:
  language: en
  yaml_path: translation/nt/1_timothy/002/009.yaml
  text: Likewise also[a], women are to adorn themselves in respectable clothing, with modesty and self-control, not with braided hair and gold or pearls or expensive clothing[b],
  footnotes:
  - marker: a
    text: Or 'proper attire' or 'modest apparel' for 'respectable clothing.'
    reason: lexical_alternative
  - marker: b
    text: '''Braided hair and gold or pearls or expensive clothing'' likely refers to ostentatious adornment rather than forbidding every use of braids or jewelry in all circumstances.'
    reason: cultural_note
translation:
  language: ko
  text: 이와 같이 여자들도 단정한 옷차림[a]으로 정숙함과 자제함 가운데 자기를 단장하기를 원합니다. 머리를 땋거나 금이나 진주나 값비싼 옷[b]으로 꾸미지 말고,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「적절한 의복」 「단정한 차림새」.
    reason: lexical_alternative
  - marker: b
    text: 「땋은 머리, 금, 진주, 값비싼 옷」은 모든 머리 손질이나 장신구를 금하기보다는, 과시적 치장을 가리키는 것으로 보인다.
    reason: cultural_note
lexical_decisions:
- source_word: ὡσαύτως
  english_pob_choice: Likewise also
  chosen_korean: 이와 같이
  alternatives_korean:
  - 마찬가지로
  - 또한
  lexicon: BDAG
  rationale: 앞 8절(남자들에게 기도를 권함)과 짝을 이룬다.
- source_word: γυναῖκας
  english_pob_choice: women
  chosen_korean: 여자들
  alternatives_korean:
  - 여인들
  - 부녀자들
  lexicon: BDAG
  rationale: γυνή의 일반 어감을 「여자」로 옮긴다. 본 절은 결혼 여부를 명시하지 않으므로 「아내」로 좁히지 않는다.
- source_word: ἐν καταστολῇ κοσμίῳ
  english_pob_choice: in respectable clothing
  chosen_korean: 단정한 옷차림
  alternatives_korean:
  - 적절한 의복
  - 단아한 차림새
  lexicon: BDAG
  rationale: καταστολή는 의복·차림새. κόσμιος는 「질서 잡힌·정숙한·예의 바른」. 「단정한」이 어감을 자연스럽게 담는다.
- source_word: μετὰ αἰδοῦς καὶ σωφροσύνης
  english_pob_choice: with modesty and self-control
  chosen_korean: 정숙함과 자제함 가운데
  alternatives_korean:
  - 부끄러움과 절제 가운데
  - 겸손과 자제 가운데
  lexicon: BDAG
  rationale: αἰδώς는 외부의 시선을 의식하는 「정숙·수치심」. σωφροσύνη는 「분별·자제」.
- source_word: κοσμεῖν ἑαυτάς
  english_pob_choice: to adorn themselves
  chosen_korean: 자기를 단장하기를
  alternatives_korean:
  - 자신을 꾸미기를
  - 자기를 치장하기를
  lexicon: BDAG
  rationale: κοσμέω의 「단장·꾸미다」를 「단장」으로 옮긴다.
- source_word: μὴ ἐν πλέγμασιν
  english_pob_choice: not with braided hair
  chosen_korean: 머리를 땋거나
  alternatives_korean:
  - 땋은 머리
  - 정교한 머리장식
  lexicon: BDAG
  rationale: πλέγμα는 땋아 묶은 머리. 「머리를 땋거나」가 자연스럽다.
- source_word: χρυσίῳ ἢ μαργαρίταις ἢ ἱματισμῷ πολυτελεῖ
  english_pob_choice: gold or pearls or expensive clothing
  chosen_korean: 금이나 진주나 값비싼 옷
  alternatives_korean:
  - 금이나 진주나 호화로운 의복
  lexicon: BDAG
  rationale: 과시적 사치품 목록. 직접적 번역이 자연스럽다.
