translation:
  language: es
  text: 'Hazael dijo: «¿Por qué llora mi señor?» Y él dijo: «Porque sé el mal que harás a los hijos de Israel[a]: prenderás fuego a sus fortalezas[b], matarás a sus jóvenes con la espada, harás pedazos a sus pequeños, y abrirás el vientre de sus mujeres embarazadas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los israelitas» / «al pueblo de Israel». El hebreo dice literalmente «a los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «quemarás sus fortalezas». Literalmente, «enviarás sus fortalezas al fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנִי
  english_pob_choice: my lord
  chosen_spanish: mi señor
  alternatives_spanish:
  - mi amo
  lexicon: HALOT
  rationale: En el trato directo a Eliseo, la expresión es un título respetuoso de deferencia social. «Mi señor» conserva ese valor relacional en español y evita el matiz más servil de «mi amo».
- source_word: בֹכֶה
  english_pob_choice: weeping
  chosen_spanish: llora
  alternatives_spanish:
  - está llorando
  - llorando
  lexicon: HALOT
  rationale: El participio expresa una acción en curso; en español, «llora» funciona con naturalidad en el diálogo y conserva la escena de llanto continuo sin recargar la frase.
- source_word: כִּי יָדַעְתִּי
  english_pob_choice: Because I know
  chosen_spanish: Porque sé
  alternatives_spanish:
  - Pues sé
  - Ya que sé
  lexicon: HALOT
  rationale: La conjunción introduce la explicación de Eliseo. «Porque sé» transmite la causalidad de forma directa y adecuada al flujo del diálogo.
- source_word: אֵת אֲשֶׁר תַּעֲשֶׂה
  english_pob_choice: the evil that you will do
  chosen_spanish: el mal que harás
  alternatives_spanish:
  - lo que harás
  - aquello que harás
  lexicon: HALOT
  rationale: El sustantivo רָעָה se integra naturalmente como «el mal», preservando la carga moral del texto. «Lo que harás» es posible, pero pierde la fuerza ética explícita.
- source_word: לִבְנֵי יִשְׂרָאֵל
  english_pob_choice: to the sons of Israel
  chosen_spanish: a los hijos de Israel
  alternatives_spanish:
  - al pueblo de Israel
  - a los israelitas
  lexicon: HALOT
  rationale: Se mantiene la equivalencia formal del giro hebreo, que nombra colectivamente al pueblo. «Hijos de Israel» conserva la estructura y el eco bíblico sin neutralizar el género gramatical del original.
- source_word: רָעָה
  english_pob_choice: the evil
  chosen_spanish: el mal
  alternatives_spanish:
  - la desgracia
  - el daño
  lexicon: HALOT
  rationale: «Mal» preserva el peso moral de la profecía, tal como hace la traducción inglesa con «evil». «Daño» o «desgracia» suavizan o despersonalizan el alcance del anuncio.
- source_word: מִבְצְרֵיהֶם תְּשַׁלַּח בָּאֵשׁ
  english_pob_choice: you will set their fortresses on fire
  chosen_spanish: prenderás fuego a sus fortalezas
  alternatives_spanish:
  - quemarás sus fortalezas
  - arrojarás sus fortalezas al fuego
  lexicon: HALOT
  rationale: El hebreo expresa una acción de hacer ir al fuego. «Prenderás fuego a sus fortalezas» es una equivalencia natural y precisa que conserva la imagen bélica sin calcar torpemente la sintaxis.
- source_word: וּבַחֻרֵיהֶם
  english_pob_choice: their young men
  chosen_spanish: a sus jóvenes
  alternatives_spanish:
  - a sus hombres jóvenes
  - a sus guerreros
  lexicon: HALOT
  rationale: La palabra hebrea suele referirse a hombres jóvenes en edad vigorosa, a menudo aptos para la guerra. En español, «jóvenes» comunica bien ese grupo etario; el contexto militar ya está dado por la mención de la espada.
- source_word: בַּחֶרֶב תַּהֲרֹג
  english_pob_choice: kill their young men with the sword
  chosen_spanish: matarás a sus jóvenes con la espada
  alternatives_spanish:
  - los matarás a espada
  - los pasarás a espada
  lexicon: HALOT
  rationale: «Con la espada» mantiene la concreción instrumental del hebreo. Se evita «pasar a espada» por ser más idiomático pero menos transparente respecto del verbo explícito del texto.
- source_word: וְעֹלְלֵיהֶם
  english_pob_choice: their little children
  chosen_spanish: a sus pequeños
  alternatives_spanish:
  - a sus niños pequeños
  - a sus niños
  lexicon: HALOT
  rationale: El término designa niños muy pequeños; «sus pequeños» preserva la vulnerabilidad y permite una lectura amplia sin estrechar indebidamente a recién nacidos solamente.
- source_word: תְּרַטֵּשׁ
  english_pob_choice: dash their little children to pieces
  chosen_spanish: estrellarás a sus pequeños contra el suelo
  alternatives_spanish:
  - harás pedazos a sus pequeños
  - los destrozarás
  lexicon: HALOT
  rationale: El verbo denota violencia extrema y trituración. En español, «estrellar ... contra el suelo» comunica esa brutalidad de forma vívida y reconocible, sin suavizarla.
- source_word: וְהָרֹתֵיהֶם
  english_pob_choice: their pregnant women
  chosen_spanish: sus embarazadas
  alternatives_spanish:
  - sus mujeres encintas
  - sus mujeres preñadas
  lexicon: HALOT
  rationale: La expresión hebrea se refiere a mujeres embarazadas. «Sus embarazadas» es breve, natural y fiel; «encintas» es posible pero más literario y menos corriente.
- source_word: תְּבַקֵּעַ
  english_pob_choice: rip open
  chosen_spanish: abrirás el vientre
  alternatives_spanish:
  - rajarás el vientre
  - abrirás en canal
  lexicon: HALOT
  rationale: El verbo implica abrir por la fuerza. En este contexto, «abrirás el vientre» conserva la imagen directa y la crudeza del anuncio profético sin introducir un giro demasiado técnico.
theological_decisions:
- issue: Tratamiento de לִבְנֵי יִשְׂרָאֵל
  english_pob_reading: to the sons of Israel
  chosen_spanish_reading: a los hijos de Israel
  alternative_spanish_readings:
  - al pueblo de Israel
  - a los israelitas
  rationale: Se retiene la forma masculina plural del hebreo por fidelidad al giro idiomático y por coherencia con la filosofía de traducción del proyecto. Las alternativas más idiomáticas son posibles, pero neutralizan la formulación del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Violencia gráfica en la profecía
  english_pob_reading: Explicitly render the atrocities without euphemism
  chosen_spanish_reading: 'Se expresan sin suavizarlos: prender fuego, matar con la espada, estrellar y abrir el vientre'
  alternative_spanish_readings:
  - suavizar el lenguaje a daño, ataque o destrucción
  - emplear eufemismos
  rationale: El texto hebreo es deliberadamente brutal. En español conviene conservar esa severidad para no borrar la intensidad moral y profética del pasaje, manteniendo una equivalencia óptima y auditable.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 y 6
translation_notes:
  revision_awareness: El texto base en inglés no recibió revisiones sustantivas en el último pase; el control cruzado indicó alta concordancia y solo observaciones menores, por lo que la versión española sigue de cerca las decisiones léxicas auditadas sin añadir paráfrasis.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se usa «hijos de Israel» para conservar el giro hebreo documentado, no como traducción neutra genérica.
  - Se preserva la violencia gráfica del anuncio profético sin atenuación léxica.
  - Se evita «Cristo» o terminología litúrgica no pertinente al pasaje.
