  text: שָׁמַ֥עְנוּ אֶת שָׁמְע֖/וֹ רָפ֣וּ יָדֵ֑י/נוּ צָרָה֙ הֶחֱזִיקַ֔תְ/נוּ חִ֖יל כַּ/יּוֹלֵדָֽה־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/006/024.yaml
  text: We have heard the report of it[a]; our hands hang limp. Distress has seized us[c][b], pain like a woman giving birth.
  footnotes:
  - marker: a
    text: Or 'the report about him' / 'his report'; the Hebrew can denote either the report concerning the enemy or, less likely in context, his own report.
    reason: lexical_alternative
  - marker: b
    text: Literally 'our hands have gone slack,' an idiom for losing strength or courage.
    reason: lexical_alternative
  - marker: c
    text: Or 'pain like a woman in labor.'
    reason: lexical_alternative
