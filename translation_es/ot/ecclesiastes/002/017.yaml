revisions:
- from: Y aborrecí la vida[a], porque me fue gravosa[b] la obra que se hace bajo el sol; porque todo es vapor y una persecución del viento.
  to: Así que aborrecí la vida, porque me fue gravosa la obra que se hace bajo el sol; porque todo es vapor[a] y una persecución del viento[b].
  rationale: 'Se corrigieron los anclajes de las notas para que correspondan a los términos fuente adecuados: [a] a «vapor» (הֶבֶל) y [b] a la frase final (רְעוּת רוּחַ). También se ajustó la conjunción inicial a «Así que» para reflejar mejor la progresión discursiva del hebreo y la decisión POB. Se mantuvo «me fue gravosa» y «persecución del viento» como opciones aceptables en español formal.'
  reviewer_model: gpt-5.4
