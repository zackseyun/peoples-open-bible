review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del hebreo: posesión inicial, enumeración de cuarenta hijos y treinta nietos, referencia a montar setenta asnos, y cierre con la fórmula técnica «juzgó a Israel» durante ocho años. Sin embargo, «que montaban setenta asnos» en imperfecto no refleja tan bien el valor narrativo/descriptivo ligado al inglés auditado «who rode»; además, en español la construcción suena más natural con «iban montados en».'
  spanish_quality_summary: 'El texto es generalmente claro y legible, pero presenta dos problemas de calidad: 1) el marcador de nota [a] está puesto en «nietos» cuando la nota explica «asnos jóvenes»; debe anclarse en «asnos». 2) «que montaban setenta asnos» es algo rígido y menos idiomático que «que iban montados en setenta asnos». También conviene usar «hijos» y «nietos» por naturalidad, aunque se pierde algo de explicitud masculina respecto del hebreo; aun así es aceptable en español.'
  glossary_alignment: No hay términos del glosario mayor implicados. «Juzgó a Israel» alinea bien con la decisión POB para שׁפט. «Asnos» es aceptable y de registro bíblico; la nota léxica sobre «asnos jóvenes» debe mantenerse, pero anclada correctamente al término relevante.
  issues:
  - severity: medium
    issue: Marcador de nota mal anclado
    rationale: La nota [a] trata sobre el sentido léxico de עֲיָרִם («asnos» / «asnos jóvenes»), pero en el borrador está colocada en «nietos». Esto induce a error y viola la disciplina de anclar cada nota en la palabra pertinente del texto.
  - severity: low
    issue: Redacción algo rígida en «que montaban setenta asnos»
    rationale: Aunque comprensible, esta formulación suena menos natural en español bíblico contemporáneo que «que iban montados en setenta asnos» o «que montaban en setenta asnos». La revisión mejora legibilidad sin apartarse del hebreo ni del audit trail inglés.
  - severity: low
    issue: Rationale léxica inconsistente
    rationale: La explicación dice evitar «el arcaísmo de “asnos”», pero precisamente la forma elegida es «asnos». Esto no afecta el texto final, pero revela una justificación mal redactada.
  revised_spanish_text: Tuvo cuarenta hijos y treinta nietos, que iban montados en setenta asnos[a], y juzgó a Israel ocho años.
  revised_footnotes:
  - marker: a
    text: O «setenta asnos jóvenes». El término hebreo puede referirse específicamente a asnos jóvenes en algunos contextos.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre «asnos», el término realmente explicado por la nota léxica, y se mejora la naturalidad de la frase participial con «que iban montados en», manteniendo fielmente el sentido del hebreo y la revisión inglesa auditada.
