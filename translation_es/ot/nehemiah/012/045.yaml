translation:
  language: es
  text: Y cumplieron el deber de su Dios y el deber de la purificación[a], y así también lo hicieron los cantores y los porteros[b], conforme al mandamiento de David y de su hijo Salomón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el deber de la limpieza ritual' o 'el deber de la pureza'.
    reason: lexical_alternative
  - marker: b
    text: La frase hebrea sobre 'los cantores y los porteros' es elíptica; probablemente indica que estos grupos también cumplían sus deberes asignados.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמְרוּ
  english_pob_choice: they kept
  chosen_spanish: guardaron
  alternatives_spanish:
  - mantuvieron
  - cumplieron
  - observaron
  lexicon: HALOT
  rationale: שמַר en esta construcción con מִשְׁמֶרֶת expresa el cumplimiento de una responsabilidad asignada. 'Guardaron' conserva la idea de custodiar/atender un encargo y funciona de manera natural en español bíblico contemporáneo.
- source_word: מִשְׁמֶרֶת
  english_pob_choice: the charge
  chosen_spanish: la responsabilidad
  alternatives_spanish:
  - el encargo
  - la tarea
  - el deber
  lexicon: HALOT
  rationale: En español, 'responsabilidad' comunica bien la noción de una obligación encomendada y evita la posible rigidez de 'cargo' o 'custodia'. Como el hebreo repite מִשְׁמֶרֶת, la traducción repite 'responsabilidad' para preservar el paralelismo.
- source_word: אֱלֹהֵיהֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios propio
  - el Dios de ellos
  lexicon: HALOT
  rationale: El sufijo posesivo plural está explícito en hebreo. 'Su Dios' es la forma natural en español y conserva la relación de pertenencia/covenio sin sobrecargar el texto.
- source_word: וּמִשְׁמֶרֶת הַטָּהֳרָה
  english_pob_choice: and the charge of purification
  chosen_spanish: y la responsabilidad de la purificación
  alternatives_spanish:
  - y la responsabilidad de la limpieza ritual
  - y el deber de pureza
  lexicon: HALOT
  rationale: הַטָּהֳרָה en contexto del templo apunta a pureza/limpieza ritual. 'Purificación' mantiene el sentido cultual y evita trasladarlo a una categoría moral abstracta. 'Responsabilidad' permite sostener el paralelo con מִשְׁמֶרֶת.
- source_word: וְהַמְשֹׁרְרִים וְהַשֹּׁעֲרִים
  english_pob_choice: and so did the singers and the gatekeepers
  chosen_spanish: y así también los cantores y los porteros
  alternatives_spanish:
  - y también los cantores y los porteros
  - y de igual modo los cantores y los porteros
  lexicon: HALOT
  rationale: La frase hebrea es elíptica. 'Y así también' explicita que estos grupos igualmente cumplían su asignación, sin añadir elementos ajenos. 'Cantores' es una equivalencia clara de מְשֹׁרְרִים en contexto levítico; 'porteros' es un término bíblico natural en español para שֹׁעֲרִים.
- source_word: שֹּׁעֲרִים
  english_pob_choice: gatekeepers
  chosen_spanish: porteros
  alternatives_spanish:
  - guardianes de la puerta
  - guardianes
  lexicon: HALOT
  rationale: En contexto del templo, 'porteros' es un término tradicional y comprensible en español para quienes custodiaban las entradas. 'Guardaeportes' sería menos idiomático y 'guardianes' pierde especificidad.
- source_word: כְּמִצְוַת
  english_pob_choice: according to the command
  chosen_spanish: conforme al mandamiento
  alternatives_spanish:
  - según el mandato
  - de acuerdo con la orden
  lexicon: HALOT
  rationale: מִצְוָה aquí remite a una orden normativa autorizada. 'Conforme al mandamiento' conserva el tono formal y bíblico sin depender de una expresión demasiado arcaica.
- source_word: דָּוִיד שְׁלֹמֹה בְנוֹ
  english_pob_choice: David and Solomon his son
  chosen_spanish: de David y de Salomón su hijo
  alternatives_spanish:
  - de David y de su hijo Salomón
  - de David y Salomón, su hijo
  lexicon: HALOT
  rationale: El hebreo enumera los nombres y luego aclara la filiación. 'De David y de Salomón su hijo' mantiene esa secuencia de forma legible en español y conserva la relación gramatical del posesivo.
theological_decisions:
- issue: Sentido cultual de הַטָּהֳרָה
  english_pob_reading: purification
  chosen_spanish_reading: purificación
  alternative_spanish_readings:
  - pureza
  - limpieza ritual
  rationale: El contexto inmediato es la organización del servicio del templo y sus obligaciones rituales. 'Purificación' comunica mejor la dimensión cultual que 'pureza', que en español puede sonar más abstracta o moral.
  doctrine_reference: Pureza ritual levítica / servicio del templo
- issue: Elipsis en 'los cantores y los porteros'
  english_pob_reading: and so did the singers and the gatekeepers
  chosen_spanish_reading: y así también los cantores y los porteros
  alternative_spanish_readings:
  - y también los cantores y los porteros
  - incluidos los cantores y los porteros
  rationale: La construcción española necesita explicitar la relación verbal implícita para que el lector entienda que estos grupos también estaban cumpliendo la misma clase de responsabilidad. Esto sigue la lectura auditada del inglés POB y no introduce una interpretación doctrinal nueva.
  doctrine_reference: Organización levítica del culto
translation_notes:
  revision_awareness: La revisión auditada del inglés POB añadió 'and so did' para aclarar la elipsis referente a 'the singers and the gatekeepers'. En español se refleja con 'y así también' para mantener esa aclaración sintáctica sin perder concisión ni forzar el texto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término por defecto cuando el texto lo requiera; este versículo no lo contiene.
  - Se traduce מִשְׁמֶרֶת de forma consistente como 'responsabilidad' para conservar el paralelismo interno del versículo.
  - '''Cantores'' y ''porteros'' se usan como términos bíblicos claros y de lectura eclesial amplia.'
  - Se conserva el orden de los nombres 'David y de Salomón su hijo' siguiendo la secuencia hebrea y la lectura auditada en inglés.
