translation:
  language: es
  text: 'Pero Jesús dijo: «Alguien me tocó, porque supe que de mí había salido poder[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque percibí que de mí había salido poder». El griego ἔγνων (aoristo de γινώσκω) puede verterse como «supe» o «percibí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἥψατό
  english_pob_choice: touched
  chosen_spanish: tocó
  alternatives_spanish:
  - me tocó
  - hizo contacto conmigo
  - me hizo contacto
  lexicon: BDAG
  rationale: ἅπτομαι aquí expresa contacto físico real. En español, «tocó» transmite de forma natural y precisa ese contacto en el relato de sanidad, sin añadir matices ajenos.
- source_word: μού
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - de mí
  lexicon: BDAG
  rationale: 'Aunque el griego usa genitivo con ἅπτομαι, el español idiomático exige objeto directo: «me tocó». Mantiene el sentido sin forzar una construcción literal ajena al español.'
- source_word: τις
  english_pob_choice: someone
  chosen_spanish: alguien
  alternatives_spanish:
  - una persona
  - alguien o alguien de entre la multitud
  lexicon: BDAG
  rationale: El indefinido señala a una persona no identificada. «Alguien» es la equivalencia más clara y natural en español.
- source_word: ἔγνων
  english_pob_choice: I perceived
  chosen_spanish: percibí
  alternatives_spanish:
  - supe
  - me di cuenta
  lexicon: BDAG
  rationale: En este contexto, γινώσκω expresa conciencia inmediata del hecho. «Percibí» conserva esa aprehensión súbita mejor que «supe», y evita interpretar demasiado el modo de conocimiento.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - poder de sanidad
  - poder milagroso
  lexicon: BDAG
  rationale: δύναμις se refiere a la fuerza eficaz que sale de Jesús. «Poder» es el equivalente amplio y sobrio en español; agregar «de sanidad» o «milagroso» explicaría más de lo que dice el texto.
- source_word: ἐξεληλυθυῖαν
  english_pob_choice: had gone out
  chosen_spanish: había salido
  alternatives_spanish:
  - había salido de mí
  - había salido afuera
  lexicon: BDAG
  rationale: El participio perfecto de ἐξέρχομαι indica salida consumada con resultado presente. «Había salido» reproduce bien esa acción completada en español narrativo.
- source_word: ἀπ’ ἐμοῦ
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - desde mí
  - fuera de mí
  lexicon: BDAG
  rationale: La preposición ἀπό marca origen o procedencia. En español, «de mí» es la forma más natural y directa para expresar la fuente.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Entonces
  lexicon: BDAG
  rationale: δέ introduce una leve transición contrastiva después de la situación previa. «Pero» comunica bien ese giro discursivo en español.
theological_decisions:
- issue: La salida de δύναμις de Jesús
  english_pob_reading: Jesus states that power had gone out from him, without further explanation of mechanism.
  chosen_spanish_reading: Jesús afirma que poder había salido de él, sin explicar el mecanismo.
  alternative_spanish_readings:
  - Jesús percibió que el poder sanador procedía de él
  - Jesús percibió que el poder divino actuaba por medio de él
  rationale: 'La frase española debe conservar la tensión del texto: una salida real de poder desde Jesús, sin convertirla en una explicación doctrinal más desarrollada. Se evita añadir «sanador» o «divino» porque el griego no lo explicita.'
  doctrine_reference: Preservar la tensión teológica sin resolverla anticipadamente.
translation_notes:
  revision_awareness: La redacción sigue el ajuste revisado en el expediente inglés, que prefirió «percibí» a «supe» para reflejar mejor ἔγνων como conciencia inmediata en este contexto, y conserva la formulación sobria de δύναμις sin explicaciones añadidas.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma estable para Ἰησοῦς.
  - Se traduce ἅπτομαι de manera verbal natural en español («tocó»), sin calco de la construcción de genitivo.
  - Se conserva la distinción entre conocimiento/percepción con «percibí», acorde con la revisión inglesa.
  - «Poder» preserva la amplitud semántica de δύναμις sin especificar más allá del texto.
  - «De mí» expresa la fuente en ἀπ’ ἐμοῦ de manera idiomática y transparente.
