translation:
  language: es
  text: Y nombrarás a Aarón y a sus hijos, y ellos guardarán su sacerdocio; pero la persona no autorizada[a] que se acerque será puesta a muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el extraño'. El hebreo 'el outsider' se refiere aquí a cualquiera que no esté autorizado para el acceso sacerdotal, no específicamente a un extranjero por etnia.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּפְקֹד
  english_pob_choice: you shall appoint
  chosen_spanish: nombrarás
  alternatives_spanish:
  - apartarás
  - designarás
  - encargarás
  lexicon: HALOT
  rationale: En este contexto, פקד no expresa conteo sino designación para una función. 'Nombrarás' comunica de forma natural la comisión de Aarón y sus hijos para el cargo sacerdotal, sin perder la idea de asignación oficial.
- source_word: וְשָׁמְרוּ
  english_pob_choice: they shall keep
  chosen_spanish: guardarán
  alternatives_spanish:
  - guardarán y cuidarán
  - observarán
  - mantendrán
  lexicon: HALOT
  rationale: '''Guardar'' mantiene en español la idea de custodiar y proteger la esfera y las funciones del sacerdocio. Aquí no se trata solo de cumplir reglas, sino de custodiar un encargo sagrado.'
- source_word: כְּהֻנָּתָם
  english_pob_choice: their priesthood
  chosen_spanish: su sacerdocio
  alternatives_spanish:
  - su oficio sacerdotal
  - su servicio sacerdotal
  lexicon: HALOT
  rationale: '''סacerdocio'' reproduce con naturalidad el sustantivo de cargo/función. ''Su sacerdocio'' conserva el sentido institucional y no solo el de actividad ocasional.'
- source_word: הַזָּר
  english_pob_choice: the outsider
  chosen_spanish: el extraño
  alternatives_spanish:
  - la persona no autorizada
  - el no sacerdote
  - el forastero
  lexicon: HALOT
  rationale: '''El extraño'' puede sonar más amplio que una referencia étnica y, en este marco, comunica la idea de alguien ajeno al ámbito sacerdotal. Se conserva la tensión entre una lectura espacial/social y la precisión funcional de la nota.'
- source_word: הַקָּרֵב
  english_pob_choice: who comes near
  chosen_spanish: que se acerque
  alternatives_spanish:
  - que se aproxime
  - que entre
  - que llegue
  lexicon: HALOT
  rationale: '''Que se acerque'' es una equivalencia natural de קרב y preserva el movimiento hacia una esfera restringida o santa, sin especificar más de lo que el hebreo dice.'
- source_word: יוּמָת
  english_pob_choice: shall be put to death
  chosen_spanish: será muerto
  alternatives_spanish:
  - será puesto a muerte
  - morirá
  - será ejecutado
  lexicon: HALOT
  rationale: La forma legal-penal pasiva se conserva con 'será muerto', una opción bíblica y sobria en español. 'Será ejecutado' introduce un matiz demasiado técnico; 'morirá' debilita la fuerza causativa/jurídica.
theological_decisions:
- issue: Acceso restringido al sacerdocio
  english_pob_reading: Only Aaron and his sons are authorized to exercise and guard the priesthood; any unauthorized person approaching incurs the death penalty.
  chosen_spanish_reading: Solo Aarón y sus hijos reciben el encargo de custodiar el sacerdocio, y cualquiera que no tenga esa autorización y se acerque afronta la pena de muerte.
  alternative_spanish_readings:
  - Solo los sacerdotes pueden acercarse, sin precisar la legitimidad del acceso en esta línea.
  - Cualquier extranjero étnico que se acerque será muerto.
  rationale: La frase hebrea centra la autorización cultual, no la etnicidad. Por eso 'el extraño' se conserva en el texto, pero la nota aclara que designa a quien no está autorizado, no necesariamente a un extranjero por origen. Así se preserva la tensión léxica y teológica del pasaje.
  doctrine_reference: Preservar la tensión del texto; primacía del hebreo sobre la tradición de traducción.
translation_notes:
  revision_awareness: Coincide sustancialmente con la revisión más reciente y el consenso alto del control cruzado; no se detectaron cambios sustantivos necesarios. Se mantuvo la lectura de autorización cultual y la fuerza legal de 'será muerto'.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como forma por defecto cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Sacerdocio'' se usa para כְּהֻנָּה, manteniendo el registro institucional del término.'
  - '''El extraño'' se mantiene con nota para no borrar la ambigüedad funcional presente en el hebreo.'
  - La construcción 'será muerto' refleja el valor jurídico del verbo pasivo sin suavizarlo.
