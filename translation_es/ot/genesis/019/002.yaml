translation:
  language: es
  text: 'Y él dijo: «Por favor, mis señores[a], pasen a la casa de su siervo, y pasen la noche, y laven sus pies. Luego podrán levantarse temprano y seguir su camino». Pero ellos dijeron: «No, sino que pasaremos la noche en la plaza[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi señor» si אֲדֹנַי se toma como singular honorífico; aquí, por el contexto inmediato, encaja mejor el plural respetuoso.
    reason: alternative_reading
  - marker: b
    text: El hebreo se refiere a un espacio público abierto de la ciudad, como plaza o explanada.
    reason: cultural_note
lexical_decisions:
- source_word: הִנֶּה נָּא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - Miren, por favor
  - He aquí, por favor
  lexicon: HALOT
  rationale: La expresión funciona como fórmula de cortesía y apremio. En español, «Por favor» comunica mejor la súplica respetuosa que un calco como «he aquí».
- source_word: אֲדֹנַי
  english_pob_choice: my lords
  chosen_spanish: mis señores
  alternatives_spanish:
  - señores
  - mis amos
  lexicon: HALOT
  rationale: En el contexto Lot se dirige a los dos visitantes como personas honorables, no como título divino. «Mis señores» conserva el plural respetuoso sin introducir lenguaje litúrgico.
- source_word: סוּרוּ נָא
  english_pob_choice: turn aside, please
  chosen_spanish: desvíense, por favor
  alternatives_spanish:
  - apártense, por favor
  - entren, por favor
  lexicon: HALOT
  rationale: El verbo expresa apartarse del camino hacia otra dirección. «Desvíense» mantiene el matiz direccional y resulta natural en español.
- source_word: בֵּית עַבְדְּכֶם
  english_pob_choice: your servant’s house
  chosen_spanish: la casa de su siervo
  alternatives_spanish:
  - la casa del siervo de ustedes
  - la casa de su servidor
  lexicon: HALOT
  rationale: La fórmula es deferencial y autohumillante. «Su siervo» conserva la relación de cortesía y la referencia en singular a Lot.
- source_word: וְלִינוּ
  english_pob_choice: spend the night
  chosen_spanish: pasen la noche
  alternatives_spanish:
  - alójense
  - quédense a pasar la noche
  lexicon: HALOT
  rationale: El verbo indica hospedarse durante la noche. «Pasen la noche» es claro y sigue el registro de hospitalidad del pasaje.
- source_word: וְרַחֲצוּ רַגְלֵיכֶם
  english_pob_choice: wash your feet
  chosen_spanish: laven sus pies
  alternatives_spanish:
  - laven los pies
  - laven sus pies
  lexicon: HALOT
  rationale: Se mantiene la referencia literal a la práctica antigua de hospitalidad. En español, el posesivo plural de respeto resulta más fluido aquí.
- source_word: וְהִשְׁכַּמְתֶּם
  english_pob_choice: you may rise early
  chosen_spanish: podrán levantarse temprano
  alternatives_spanish:
  - se levantarán temprano
  - podrán madrugar
  lexicon: HALOT
  rationale: La forma verbal expresa que, después de hospedarse, podrán ponerse en marcha temprano. «Podrán levantarse temprano» conserva el sentido optativo del contexto.
- source_word: וַהֲלַכְתֶּם לְדַרְכְּכֶם
  english_pob_choice: go on your way
  chosen_spanish: seguir su camino
  alternatives_spanish:
  - ir por su camino
  - continuar su viaje
  lexicon: HALOT
  rationale: La frase hebrea es idiomática. «Seguir su camino» es una equivalencia natural en español y preserva la idea de continuar la ruta.
- source_word: בָרְחוֹב
  english_pob_choice: in the square
  chosen_spanish: en la plaza
  alternatives_spanish:
  - en la calle
  - en el espacio abierto
  lexicon: HALOT
  rationale: El término designa un área pública abierta de la ciudad. «Plaza» comunica mejor ese espacio urbano que «calle».
- source_word: נָלִין
  english_pob_choice: we will spend the night
  chosen_spanish: pasaremos la noche
  alternatives_spanish:
  - nos alojaremos
  - nos quedaremos a pasar la noche
  lexicon: HALOT
  rationale: Se mantiene la misma elección verbal que para לִין en la primera parte del versículo, preservando consistencia léxica.
theological_decisions:
- issue: Si אֲדֹנַי debe entenderse como título divino o como trato humano respetuoso
  english_pob_reading: 'human address: ''my lords'''
  chosen_spanish_reading: 'trato humano respetuoso: ''mis señores'''
  alternative_spanish_readings:
  - '''mi señor'' si se leyera en singular'
  - '''Señor'' como título divino'
  rationale: El contexto narrativo muestra a Lot hablando con dos visitantes humanos; además, la sintaxis del versículo favorece el plural. Traducirlo como «mis señores» evita una lectura teológicamente cargada que el texto inmediato no exige.
  doctrine_reference: Principio de lectura llana del pasaje; no introducir una identificación divina que no está apoyada por el contexto inmediato.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión final del inglés: mantiene la entonación cortés al inicio («Por favor, mis señores»), traduce el segundo כִּי con «sino que», y conserva la repetición de «pasar la noche» para לין/נָלִין. Se evitó una colocación que sonara demasiado calca o que ocultara la ambigüedad de אֲדֹנַי.'
  spanish_consistency_notes:
  - Se usó «pasar la noche» de manera uniforme para וְלִינוּ y נָלִין.
  - Se mantuvo «mis señores» para reflejar el plural respetuoso del contexto.
  - «Plaza» se reservó para בָרְחוֹב por su valor de espacio público abierto.
  - La fórmula de cortesía se expresó con «Por favor» sin duplicarla innecesariamente.
  - 'Se conservó el paralelo de hospitalidad: casa, noche, lavado de pies, levantarse temprano y seguir camino.'
