translation:
  language: es
  text: Él derrama desprecio sobre los nobles[a] y los hace vagar en un lugar desolado, sin camino[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «príncipes». El hebreo נְדִיבִים puede referirse a nobles, príncipes o líderes prominentes.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en un desierto y sin camino»; es decir, en un lugar desolado donde no hay senda.
    reason: lexical_alternative
lexical_decisions:
- source_word: שֹׁפֵךְ
  english_pob_choice: pours
  chosen_spanish: derrama
  alternatives_spanish:
  - vierte
  - derrame
  lexicon: HALOT
  rationale: El participio hebreo expresa una acción continua o característica. «Derrama» conserva la imagen vívida del original y funciona bien en español poético sin volverse mecánico.
- source_word: בּוּז
  english_pob_choice: contempt
  chosen_spanish: desprecio
  alternatives_spanish:
  - contempto
  - escarnio
  - oprobio
  lexicon: HALOT
  rationale: Բוּז denota desprecio o escarnio. «Desprecio» es natural en español y mantiene el valor de humillación pública que busca la imagen de «derramar» algo sobre alguien.
- source_word: נְדִיבִים
  english_pob_choice: nobles
  chosen_spanish: los nobles
  alternatives_spanish:
  - los príncipes
  - los poderosos
  - los jefes
  lexicon: HALOT
  rationale: El sustantivo puede referirse a nobles, príncipes o líderes prominentes. «Los nobles» es suficientemente amplio y natural, y no fuerza una especificación hereditaria que el hebreo no exige aquí.
- source_word: וַיַּתְעֵם
  english_pob_choice: makes them wander
  chosen_spanish: los hace vagar
  alternatives_spanish:
  - los hace errar
  - los hizo vagar
  - los conduce a vagar
  lexicon: HALOT
  rationale: El hifil de תעה expresa causar que alguien ande extraviado o vagando. «Los hace vagar» conserva la acción verbal directa y encaja con el cuadro de juicio en un lugar desolado.
- source_word: בְּתֹהוּ
  english_pob_choice: in a waste
  chosen_spanish: por un desierto
  alternatives_spanish:
  - en un páramo
  - en una tierra desolada
  - en un caos
  lexicon: HALOT
  rationale: תֹהוּ puede significar desolación, vaciedad o informe. En este contexto la idea es un lugar desierto y sin senderos; «por un desierto» comunica bien esa desolación en español, aunque el sentido más literal de vaciedad queda contenido en la imagen completa.
- source_word: לֹא דָרֶךְ
  english_pob_choice: trackless
  chosen_spanish: sin camino
  alternatives_spanish:
  - sin senda
  - sin ruta
  - sin vereda
  lexicon: HALOT
  rationale: La expresión literal es «no [hay] camino». «Sin camino» preserva la imagen bíblica básica de ausencia de senda y es claro para el lector español.
theological_decisions:
- issue: Sujeto implícito de la acción
  english_pob_reading: 'The subject is understood as God: ''He pours... and makes them wander.'''
  chosen_spanish_reading: Se mantiene el sujeto implícito como «Él», entendiendo a Dios por el contexto inmediato.
  alternative_spanish_readings:
  - Dios derrama...
  - Yahvé derrama...
  rationale: El hebreo no nombra el sujeto en este versículo; el salmo atribuye estas reversals al actuar soberano de Yahvé en el contexto circundante. En español, un pronombre explícito evita ambigüedad y respeta la referencia implícita sin añadir contenido ajeno al texto.
  doctrine_reference: Salmo 107; providencia y juicio divino en el marco del poema
- issue: Alcance de נְדִיבִים
  english_pob_reading: nobles / princes as a lexical range
  chosen_spanish_reading: «los nobles» con la alternativa implícita de líderes prominentes o príncipes
  alternative_spanish_readings:
  - los príncipes
  - los líderes nobles
  rationale: No se estrecha el término a una sola clase social cuando el hebreo permite un rango de prominencia y autoridad. La elección conserva la humillación de los poderosos sin sobreinterpretar la estructura política exacta.
  doctrine_reference: Lexicografía hebrea de נְדִיבִים en contextos poéticos
translation_notes:
  revision_awareness: 'No se registraron revisiones posteriores en el paquete de auditoría; el borrador sigue el consenso alto del control cruzado y conserva las dos ambigüedades léxicas principales del hebreo: נְדִיבִים y בְּתֹהוּ לֹא דָרֶךְ.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como nombre divino en la política general del proyecto, pero este versículo no lo expone explícitamente; por eso se preserva el sujeto implícito con «Él».
  - «Desprecio» y «nobles» mantienen un registro digno y contemporáneo, adecuado para poesía bíblica en español.
  - La construcción «por un desierto sin camino» busca equilibrio entre naturalidad y fidelidad a la imagen de un lugar vacío y sin senda.
