translation:
  language: es
  text: Y estarás seguro, porque hay esperanza; mirarás alrededor[a] y te acostarás seguro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cavarás alrededor»; el verbo hebreo se asocia literalmente con cavar, pero aquí puede referirse a mirar alrededor o a preparar el lugar antes de acostarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָטַחְתָּ
  english_pob_choice: you will be secure
  chosen_spanish: estarás seguro
  alternatives_spanish:
  - confiarás
  - estarás confiado
  lexicon: HALOT
  rationale: בטח aquí tiene un valor resultativo de seguridad/confianza más que un mandato de confiar; en español, "estarás seguro" conserva el estado resultante de seguridad que destaca la versión inglesa.
- source_word: כִּי יֵשׁ תִּקְוָה
  english_pob_choice: because there is hope
  chosen_spanish: porque hay esperanza
  alternatives_spanish:
  - pues hay esperanza
  - porque existe esperanza
  lexicon: HALOT
  rationale: תִּקְוָה se rinde naturalmente como "esperanza"; "porque hay esperanza" conserva el nexo causal de כִּי y la sencillez del hebreo sin cargar el sentido con una formulación más abstracta.
- source_word: וְחָפַרְתָּ
  english_pob_choice: you will look around
  chosen_spanish: mirarás alrededor
  alternatives_spanish:
  - buscarás alrededor
  - examinarás alrededor
  - cavarás alrededor
  lexicon: HALOT
  rationale: 'חפר tiene sentido literal de "cavar", pero el contexto sugiere una acción previa al descanso: revisar o mirar alrededor. "Mirarás alrededor" sigue la decisión auditada inglesa más reciente y mantiene la imagen concreta sin forzar una expansión interpretativa.'
- source_word: לָבֶטַח
  english_pob_choice: in safety
  chosen_spanish: en seguridad
  alternatives_spanish:
  - con seguridad
  - seguro
  - en paz
  lexicon: HALOT
  rationale: La forma adverbial/nominal de בטח expresa seguridad o seguridad estable; "en seguridad" refleja bien esa función y enlaza de modo natural con "te acostarás".
- source_word: תִּשְׁכָּב
  english_pob_choice: you will lie down
  chosen_spanish: te acostarás
  alternatives_spanish:
  - te dormirás
  - reposarás
  lexicon: HALOT
  rationale: שׁכב literalmente es "acostarse/recostarse"; "te acostarás" preserva la imagen concreta del texto y deja implícito el descanso sin añadir una interpretación excesiva.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «search around» a «look around» por naturalidad; el español sigue esa última decisión, preservando la alternativa literal documentada del verbo hebreo en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el texto lo exigiera; en este versículo no aparece el nombre divino.
  - Se evitó «SEÑOR» y también «confiarás» para בטח, porque el contexto favorece el estado de seguridad resultante.
  - «Seguridad» se usó de manera consistente para לָבֶטַח, no como sinónimo espiritualizante.
  - La nota de pie marca la tensión lexical entre el sentido literal de cavar y la lectura idiomática de mirar/preparar alrededor.
