translation:
  language: es
  text: Odio[a] la asamblea de los malhechores, y no me sentaré con los malvados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «He odiado la asamblea de los malhechores». El perfecto hebreo puede traducirse con orientación pasada; aquí probablemente expresa una postura firme y establecida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂנֵאתִי
  english_pob_choice: I hate
  chosen_spanish: Aborrezco
  alternatives_spanish:
  - He odiado
  - Odio
  lexicon: HALOT
  rationale: El perfecto hebreo expresa aquí una postura establecida; en español, "aborrezco" comunica un rechazo continuo y solemne sin sonar tan mecánico como "he odiado". Mantiene la fuerza afectiva del verbo sin suavizarla.
- source_word: קְהַל
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - congregación
  - compañía
  lexicon: HALOT
  rationale: '"Asamblea" conserva el sentido de un grupo reunido sin introducir una connotación eclesial específica como puede ocurrir con "congregación". Es el equivalente más natural y auditable para el conjunto de personas aludido.'
- source_word: מְרֵעִים
  english_pob_choice: evildoers
  chosen_spanish: los malhechores
  alternatives_spanish:
  - los que hacen mal
  - los malvados
  lexicon: HALOT
  rationale: El participio sustantivado describe personas caracterizadas por obrar mal. "Malhechores" es breve, idiomático y refleja la agencia del mal hacer; se evita una glosa más larga.
- source_word: וְעִם
  english_pob_choice: and with
  chosen_spanish: y ... con
  alternatives_spanish:
  - y entre
  - pero con
  lexicon: HALOT
  rationale: La preposición hebrea se reproduce de manera directa con "con", manteniendo el paralelismo del bicola. En español, la estructura "no me sentaré con" comunica bien la asociación rechazada.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los malvados
  alternatives_spanish:
  - los impíos
  - los perversos
  lexicon: HALOT
  rationale: '"Malvados" es un equivalente natural y claro para personas moralmente perversas. Se evita "impíos" por su tono más religioso/teológico, que el contexto no exige.'
- source_word: לֹא אֵשֵׁב
  english_pob_choice: I will not sit
  chosen_spanish: no me sentaré
  alternatives_spanish:
  - no me siento
  - no habitaré
  lexicon: HALOT
  rationale: El imperfecto con negación expresa resolución o negativa sostenida; "no me sentaré" conserva la imagen corporal de sentarse y el matiz volitivo. "No me siento" podría sonar demasiado gnómico, y "habitaré" sería excesivo.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete auditado; el borrador español sigue de cerca la lectura estable de la fuente hebrea y del texto inglés auditado, sin cambios textuales relevantes en la tradición POB reciente.
  spanish_consistency_notes:
  - Se mantiene el registro poético y sobrio del Salmo.
  - Se evita "congregación" para no introducir un matiz litúrgico ajeno al hebreo.
  - '"Malhechores" y "malvados" preservan el paralelismo sin sobreinterpretarlo.'
  - La nota textual/lexical se ancla en el verbo inicial porque allí reside la principal alternativa de aspecto/tiempo.
