    text: O «al cargo de Hegai»; literalmente, «a la mano de Hegai».
    reason: lexical_alternative
  - marker: b
    text: O «el palacio del rey».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para אֶל יַד הֵגָי, se añade la nota léxica omitida para בֵּית הַמֶּלֶךְ y se mejora la redacción de la primera nota para evitar redundancia, sin cambiar sustancialmente la traducción principal.
