translation:
  language: es
  text: Para el maestro de coro; con instrumentos de cuerda. Salmo de Asaf[a], canto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De Asaf» puede indicar autoría, asociación con el gremio asafita o dedicación a Asaf, no necesariamente autoría personal estricta.
    reason: alternative_reading
  - marker: b
    text: 'O: «canción».'
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el maestro de coro
  alternatives_spanish:
  - Para el director
  - Para el líder
  lexicon: HALOT
  rationale: En los encabezados de salmos, el término remite al responsable de la ejecución musical. «Maestro de coro» comunica de forma natural esa función litúrgico-musical en español y evita la ambigüedad de «director» o «líder».
- source_word: בִּנְגִינֹת
  english_pob_choice: with stringed instruments
  chosen_spanish: con instrumentos de cuerda
  alternatives_spanish:
  - con instrumentos de cuerda pulsada
  - con música de cuerda
  lexicon: HALOT
  rationale: El término apunta específicamente a instrumentos o música de cuerda. «Con instrumentos de cuerda» conserva ese sentido de manera clara y sobria en español, sin añadir detalles técnicos no explícitos en el hebreo.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Salmo cantado
  lexicon: HALOT
  rationale: Funciona como rótulo genérico de género. En español, «Salmo» es la forma más natural y reconocible para este encabezado, manteniendo el estilo sucinto del hebreo.
- source_word: לְאָסָף
  english_pob_choice: of Asaph
  chosen_spanish: de Asaf
  alternatives_spanish:
  - para Asaf
  - perteneciente a Asaf
  lexicon: HALOT
  rationale: La preposición lamed en encabezados puede indicar autoría, asociación o dedicación. «De Asaf» preserva esa ambigüedad sin forzar una sola lectura.
- source_word: שִׁיר
  english_pob_choice: a song
  chosen_spanish: canción
  alternatives_spanish:
  - canto
  - una canción
  lexicon: HALOT
  rationale: El término añade una segunda etiqueta genérica junto con «Salmo». «Canción» conserva el paralelismo y la sencillez del hebreo; «canto» sería posible, pero puede sonar más litúrgico de lo que exige el texto.
theological_decisions:
- issue: Ambigüedad de לְאָסָף en el encabezado
  english_pob_reading: The phrase 'of Asaph' may indicate authorship, association with the Asaphite guild, or dedication to Asaph rather than strictly personal authorship.
  chosen_spanish_reading: «de Asaf» mantiene abierta la posibilidad de autoría, asociación o dedicación.
  alternative_spanish_readings:
  - «para Asaf»
  - «por Asaf»
  rationale: El hebreo no obliga a una sola relación. Mantener la forma genitiva simple evita cerrar indebidamente la lectura y preserva la tensión documental indicada por el audit trail inglés.
  doctrine_reference: Inmutabilidad del sentido textual y cautela exegética en encabezados de salmos
translation_notes:
  revision_awareness: La revisión inglesa más reciente mantuvo el texto sin cambios; la corrección anterior del signo entre las dos indicaciones musicales respalda en español separarlas con punto y coma para no sugerir que una explica a la otra.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; aquí no aplica.
  - Se mantuvo la función litúrgico-musical del encabezado sin convertirla en una afirmación explícita de autoría.
  - «Salmo» y «canción» se dejaron como rótulos breves para reflejar la doble clasificación del hebreo.
