base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/020/020.yaml
  text: 'They rose early in the morning and went out to the wilderness of Tekoa[a]. As they were going out, Jehoshaphat stood and said, “Listen to me, Judah and inhabitants of Jerusalem: believe in Yahweh your God, and you will be established; believe in his prophets[c][b], and you will succeed.”'
  footnotes:
  - marker: a
    text: 'Or ''trust in the LORD your God, and you will stand firm.'' The Hebrew uses a wordplay on אמן: ''believe'' ... ''be established/stand firm.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'believe his prophets' or 'trust his prophets.' The same Hebrew verb is repeated for rhetorical effect.
    reason: lexical_alternative
  - marker: c
    text: '''the LORD'' renders the divine name YHWH.'
    reason: alternative_reading
