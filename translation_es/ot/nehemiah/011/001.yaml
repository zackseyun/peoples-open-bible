translation:
  language: es
  text: Los oficiales del pueblo vivían en Jerusalén, y el resto del pueblo echó suertes para hacer venir a uno de cada diez a vivir en Jerusalén, la ciudad santa, mientras que nueve partes[a] quedaron en los poblados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literal: «y nueve manos en los poblados», un modismo que significa que las nueve partes restantes de diez se quedaron en los otros poblados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂרֵי הָעָם
  english_pob_choice: the officials of the people
  chosen_spanish: los oficiales del pueblo
  alternatives_spanish:
  - los líderes del pueblo
  - los príncipes del pueblo
  lexicon: HALOT
  rationale: שָׂרִים puede referirse a oficiales, gobernantes o líderes. «Oficiales» conserva el matiz administrativo del contexto de repoblar Jerusalén y evita el tono arcaico de «príncipes».
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: lived
  chosen_spanish: habitaban
  alternatives_spanish:
  - vivían
  - moraban
  - se establecieron
  lexicon: HALOT
  rationale: El verbo ישׁב aquí indica residencia continua, no simplemente sentarse. «Habitaban» comunica bien ese sentido de residencia estable en español.
- source_word: וּשְׁאָר הָעָם
  english_pob_choice: and the rest of the people
  chosen_spanish: y el resto del pueblo
  alternatives_spanish:
  - y el remanente del pueblo
  - y los demás del pueblo
  lexicon: HALOT
  rationale: שְׁאָר significa resto/remanente. «El resto del pueblo» es natural y fiel al valor del hebreo.
- source_word: הִפִּילוּ גוֹרָלוֹת
  english_pob_choice: cast lots
  chosen_spanish: echó suertes
  alternatives_spanish:
  - arrojó suertes
  - sacó suertes
  lexicon: HALOT
  rationale: La expresión idiomática española tradicional y clara para el acto de sorteo es «echar suertes», que reproduce bien el procedimiento de selección.
- source_word: לְהָבִיא
  english_pob_choice: to bring
  chosen_spanish: para hacer venir
  alternatives_spanish:
  - para traer
  - para llevar a
  lexicon: HALOT
  rationale: El hiphil de בוא expresa causar que alguien venga o entre. «Hacer venir» conserva esa causatividad mejor que un simple «traer» en este contexto.
- source_word: אֶחָד מִן הָעֲשָׂרָה
  english_pob_choice: one out of ten
  chosen_spanish: a uno de cada diez
  alternatives_spanish:
  - a uno entre diez
  - a una décima parte
  lexicon: HALOT
  rationale: La frase distribucional del hebreo se expresa con claridad en español como «uno de cada diez», evitando una interpretación demasiado técnica o abstracta.
- source_word: לָשֶׁבֶת
  english_pob_choice: to live
  chosen_spanish: a habitar
  alternatives_spanish:
  - a vivir
  - a residir
  lexicon: HALOT
  rationale: De nuevo ישׁב expresa residencia. «Habitar» mantiene un registro digno y bíblico, sin perder claridad.
- source_word: עִיר הַקֹּדֶשׁ
  english_pob_choice: the holy city
  chosen_spanish: la ciudad santa
  alternatives_spanish:
  - la ciudad sagrada
  lexicon: HALOT
  rationale: La construcción nominal se vierte de forma directa y natural. «Ciudad santa» es el equivalente más fiel y usual en español bíblico contemporáneo.
- source_word: וְתֵשַׁע הַיָּדוֹת
  english_pob_choice: while nine parts remained
  chosen_spanish: mientras que nueve partes quedaron
  alternatives_spanish:
  - mientras que nueve porciones quedaron
  - mientras que nueve partes permanecieron
  lexicon: HALOT
  rationale: El hebreo dice literalmente «nueve manos», un modismo que designa porciones o partes. Siguiendo el ajuste de la POB inglesa, «nueve partes» conserva el sentido literal sin forzar una precisión interpretativa ajena al hebreo.
- source_word: בֶּעָרִים
  english_pob_choice: in the towns
  chosen_spanish: en las ciudades
  alternatives_spanish:
  - en los poblados
  - en los pueblos
  lexicon: HALOT
  rationale: עָרִים puede ser «ciudades» o «pueblos/aldeas» según contexto. Aquí la contraposición con Jerusalén permite «ciudades»; se mantiene una formulación amplia y natural en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y la revisión inglesa más reciente que prefirió «nine parts» por encima de una equivalencia más interpretativa. En español se preservó esa literalidad relativa con «nueve partes», sin introducir una fracción no presente en el texto fuente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca, conforme al criterio del proyecto.
  - Se mantuvo el registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - «Habitar» se emplea para ישׁב con valor de residencia estable, coherente con el uso contextual del pasaje.
