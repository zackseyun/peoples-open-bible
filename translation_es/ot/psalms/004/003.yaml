translation:
  language: es
  text: Hijos de los hombres[a], ¿hasta cuándo será mi honor convertido en vergüenza? ¿Amarán el vacío y buscarán la falsedad? Selah
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi gloria». El hebreo puede denotar honor, gloria o peso; aquí probablemente se refiere a la dignidad del salmista, expuesta públicamente a la vergüenza.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי אִישׁ
  english_pob_choice: Sons of men
  chosen_spanish: Hijos de hombres
  alternatives_spanish:
  - hombres
  - hijos del hombre
  - mortales
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y se dirige a opositores humanos en plural masculino. «Hijos de hombres» conserva mejor la fórmula y el tono retórico que una simplificación como «hombres». No se adopta «mortales» porque suaviza la fuerza directa del reproche.
- source_word: עַד מֶה
  english_pob_choice: how long
  chosen_spanish: ¿hasta cuándo?
  alternatives_spanish:
  - ¿hasta cuándo será?
  - ¿cuánto tiempo?
  lexicon: HALOT
  rationale: Es la equivalencia idiomática natural en español para la protesta poética hebrea de duración indefinida.
- source_word: כְבוֹדִי
  english_pob_choice: my honor
  chosen_spanish: mi honra
  alternatives_spanish:
  - mi gloria
  - mi honor
  lexicon: HALOT
  rationale: El contexto de afrenta pública favorece «honra»/«honor» más que «gloria» como efecto social de reputación. Se eligió «honra» por su naturalidad bíblica y su densidad semántica en español, sin eliminar la posibilidad de que el término abarque dignidad pública.
- source_word: לִכְלִמָּה
  english_pob_choice: be turned into shame
  chosen_spanish: convertida en vergüenza
  alternatives_spanish:
  - hecha vergüenza
  - pasada a vergüenza
  - en vergüenza
  lexicon: HALOT
  rationale: La preposición con el sustantivo expresa resultado o transformación; el español requiere una formulación verbal explícita. «Convertida en vergüenza» mantiene el cambio de estado sin exceder el hebreo.
- source_word: תֶּאֱהָבוּן
  english_pob_choice: will you love
  chosen_spanish: ¿Amarán?
  alternatives_spanish:
  - ¿aman?
  - ¿seguirán amando?
  lexicon: HALOT
  rationale: En una reprensión interrogativa, el imperfecto plural puede sonar futuro o habitual. «Amarán» conserva la fuerza acusatoria y la proyección retórica del hebreo.
- source_word: רִיק
  english_pob_choice: emptiness
  chosen_spanish: la vaciedad
  alternatives_spanish:
  - la vanidad
  - el vacío
  - lo vano
  lexicon: HALOT
  rationale: El sustantivo designa lo vacío, fútil o sin peso. «Vaciedad» expresa bien esa idea en español moderno y mantiene el paralelismo con «mentira».
- source_word: תְּבַקְשׁוּ
  english_pob_choice: seek
  chosen_spanish: buscarán
  alternatives_spanish:
  - buscarán con afán
  - procurarán
  lexicon: HALOT
  rationale: בקשׁ en este paralelismo poético se entiende como «buscar» o «procurar». «Buscarán» es claro y conserva la estructura interrogativa del verso.
- source_word: כָזָב
  english_pob_choice: falsehood
  chosen_spanish: la mentira
  alternatives_spanish:
  - la falsedad
  - el engaño
  lexicon: HALOT
  rationale: El sustantivo abstracto en singular encaja de forma natural con «la mentira», que en español transmite tanto falsedad como engaño sin forzar un plural.
- source_word: סֶלָה
  english_pob_choice: Selah
  chosen_spanish: Selah
  lexicon: HALOT
  rationale: Se translitera por tratarse de un marcador litúrgico de sentido incierto; no se interpreta más allá de los datos disponibles.
theological_decisions:
- issue: Sentido de כְבוֹדִי / referencia de «mi honra»
  english_pob_reading: Rendered without specifying whether the speaker refers to his own royal honor or honor given by God.
  chosen_spanish_reading: Se mantiene una referencia amplia a la honra del hablante, sin concretarla como honra real, religiosa o exclusivamente interior.
  alternative_spanish_readings:
  - mi gloria
  - la honra que Dios me ha dado
  - mi dignidad
  rationale: El hebreo permite un campo semántico amplio entre honor, gloria y peso social. La traducción conserva esa tensión y evita resolverla de forma dogmática o contextual más allá de lo que el verso exige.
  doctrine_reference: Preservar la tensión textual sin sobreinterpretar el referente.
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: no se requieren cambios sustanciales según el historial auditado; la redacción mantiene la equivalencia óptima y la ambigüedad semántica relevante.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto en el proyecto, aunque este versículo no la contiene.
  - Se evita «SEÑOR» y se conserva el tono poético y acusatorio del hebreo.
  - «Honra» se usa en vez de «gloria» en el cuerpo principal para reflejar el contexto social de vergüenza pública, dejando «gloria» en nota como alternativa léxica.
  - «Selah» se conserva transliterado por falta de certeza sobre su función exacta.
  - La puntuación interrogativa reproduce dos preguntas retóricas separadas, acorde con el paralelismo del hebreo.
