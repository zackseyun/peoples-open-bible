translation:
  language: es
  text: Ustedes deben estar en la puerta esta noche[a], y yo saldré con mi sierva; y dentro de los días tras los cuales dijeron que entregarían la ciudad a nuestros enemigos, el Señor visitará a Israel por mi mano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esta misma noche».'
    reason: lexical_alternative
  - marker: b
    text: «Visitará» puede implicar también intervención activa o cuidado, no solo una visita en sentido ordinario.
    reason: lexical_alternative
lexical_decisions:
- source_word: στήσεσθε
  english_pob_choice: stand
  chosen_spanish: habéis de estar
  alternatives_spanish:
  - estar
  - poneros de pie
  - manteneos en la puerta
  lexicon: BDAG
  rationale: El griego futuro medio aquí tiene fuerza de instrucción firme con sentido de permanecer en un lugar. En español, 'habéis de estar' comunica esa obligación o mandato sin introducir una imagen militar más fuerte que la del texto.
- source_word: ἐπὶ τῆς πύλης
  english_pob_choice: at the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - junto a la puerta
  - a la puerta
  - en el portal
  lexicon: BDAG
  rationale: La relación espacial en este contexto es de ubicación en la puerta de la ciudad. 'En la puerta' es natural en español y conserva el valor locativo del griego.
- source_word: τὴν νύκτα ταύτην
  english_pob_choice: this night
  chosen_spanish: esta noche
  alternatives_spanish:
  - esta noche misma
  - esta noche presente
  - esta noche
  lexicon: BDAG
  rationale: '''Esta noche'' expresa con claridad el deíctico ''esta'' del griego y evita un calco más áspero como ''esta noche esta'' o ''esta noche presente''.'
- source_word: ἅβρας
  english_pob_choice: maidservant
  chosen_spanish: sierva
  alternatives_spanish:
  - criada
  - sirvienta
  - sierva
  lexicon: LSJ
  rationale: ἅβρα designa a una servidora femenina personal. 'Sierva' mantiene la condición de servidora y suena más digno y bíblico en español que 'criada' o 'sirvienta', sin perder la referencia a una mujer de servicio.
- source_word: ἐν ταῖς ἡμέραις μεθʼ ἃς
  english_pob_choice: within the days after which
  chosen_spanish: dentro de los días después de los cuales
  alternatives_spanish:
  - en los días después de los cuales
  - durante los días después de los cuales
  - antes de que pasen los días después de los cuales
  lexicon: BDAG
  rationale: La construcción griega marca un lapso posterior al plazo mencionado. 'Dentro de los días después de los cuales' conserva esa secuencia temporal y la idea de cumplimiento dentro del margen indicado.
- source_word: παραδῶσειν
  english_pob_choice: hand over
  chosen_spanish: entregaríais
  alternatives_spanish:
  - cederíais
  - pondríais en manos de
  - rendiríais
  lexicon: BDAG
  rationale: En este contexto el verbo expresa la entrega de la ciudad a los enemigos. 'Entregaríais' reproduce el sentido básico de entregar/poner en manos de otro sin añadir un tecnicismo bélico ajeno al griego.
- source_word: ἐπισκέψεται
  english_pob_choice: will visit
  chosen_spanish: visitará
  alternatives_spanish:
  - visitará
  - se ocupará de
  - intervendrá a favor de
  lexicon: BDAG
  rationale: '''Visitará'' conserva el giro bíblico del verbo y mantiene abierta la posibilidad de intervención benévola o activa, como indica el audit trail en inglés.'
- source_word: Κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  - Yahvé
  lexicon: 'DOCTRINE.md: Contested terms — κύριος → Lord'
  rationale: Se usa 'el Señor' para κύριος en esta línea, siguiendo la decisión doctrinal del POB para el título divino en español cuando el contexto griego alude al Dios de Israel. 'Yahvé' quedaría reservado para el texto donde aparezca explícitamente el nombre divino hebreo o una base textual que lo exija.
- source_word: ἐν χειρί μου
  english_pob_choice: by my hand
  chosen_spanish: por mi mano
  alternatives_spanish:
  - por medio de mí
  - por mi mano
  - mediante mi mano
  lexicon: BDAG
  rationale: La expresión idiomática indica instrumentación. 'Por mi mano' conserva el color bíblico y la imagen de acción mediada por Judith.
theological_decisions:
- issue: Valor de Κύριος en un contexto narrativo judío
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - Señor
  rationale: El griego κύριος funciona aquí como designación del Dios de Israel. En español, 'el Señor' mantiene la referencia reverente y concorda con la decisión auditada del POB, sin introducir una forma no sustentada por el texto griego de esta unidad.
  doctrine_reference: 'DOCTRINE.md: Contested terms — κύριος → Lord'
- issue: Sentido de ἐπισκέψεται
  english_pob_reading: will visit Israel
  chosen_spanish_reading: visitará a Israel
  alternative_spanish_readings:
  - intervendrá a favor de Israel
  - cuidará de Israel
  - se acordará de Israel
  rationale: El verbo puede implicar visita con atención, cuidado o intervención. 'Visitará' preserva la ambigüedad significativa del original y evita decidir de antemano el modo exacto de la acción divina.
  doctrine_reference: BDAG; audit trail lexical decision for ἐπισκέψεται
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado para fortalecer la fuerza futurativo-imperativa del inicio ('You are to stand') y para hacer más formal 'this night'. La versión española refleja esa misma fuerza con 'habéis de estar' y 'esta noche', conservando el resto del período y la imagen de acción divina por medio de Judith.
  spanish_consistency_notes:
  - Se mantiene 'sierva' para ἅβρα, en línea con el valor de servidora femenina y con la preferencia POB por preservar la fuerza lexical de 'maidservant'.
  - Se conserva 'el Señor' para κύριος, consistente con la política doctrinal del proyecto para el título divino en la traducción española.
  - La construcción 'por mi mano' preserva la instrumentalidad idiomática del griego sin convertirla en una paráfrasis explicativa.
  - La frase temporal larga se ha mantenido casi de forma lineal para no diluir la secuencia condicional/temporal del original.
