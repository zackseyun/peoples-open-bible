revisions:
- from: Tú[a], con tu mano, expulsaste a las naciones y las plantaste; afligiste a los pueblos y los enviaste fuera.
  to: Tú, con tu mano, expulsaste naciones y los plantaste; afligiste pueblos y los enviaste fuera.[a]
  rationale: 'Se revisa el texto para corregir el problema principal de fidelidad: «los plantaste» evita que el pronombre se refiera a «naciones» y permite la lectura documentada de los antepasados de Israel implícitos en el contexto. También se reemplaza la nota actual por una que sí refleje la alternativa preservada en la auditoría inglesa sobre el referente del pronombre final y el matiz de dispersión. Se mantiene «con tu mano», «expulsaste», «afligiste» y «los enviaste fuera» por su buena correspondencia con el hebreo y con la revisión inglesa más reciente.'
  reviewer_model: gpt-5.4
