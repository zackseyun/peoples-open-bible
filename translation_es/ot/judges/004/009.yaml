    text: 'O, de manera más idiomática: «Yahvé entregará a Sísara en poder de una mujer».'
    reason: lexical_alternative
  revision_rationale: 'Se revisa para mejorar la naturalidad y fidelidad del español sin apartarse del hebreo ni del POB inglés: se expresa mejor el énfasis de הָלֹךְ אֵלֵךְ con «Ciertamente iré contigo»; se sustituye «pero» por «Sin embargo» para reflejar mejor אֶפֶס; se simplifica la cláusula del camino; se conserva «venderá» en el texto principal por la decisión léxica documentada; se mejora la alternativa idiomática de la nota; y se mueve el marcador al verbo relevante. No se requiere adjudicación adicional.'
