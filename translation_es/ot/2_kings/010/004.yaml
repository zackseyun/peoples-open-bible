translation:
  language: es
  text: 'Pero tuvieron mucho, mucho[a] miedo, y dijeron: «Miren, los dos reyes no pudieron hacerle frente; entonces, ¿cómo podremos hacerle frente nosotros?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «no pudieron estar en pie delante de él … ¿cómo podremos estar en pie nosotros?». El hebreo usa el mismo verbo, «estar en pie», en ambas cláusulas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: they were afraid
  chosen_spanish: sintieron miedo
  alternatives_spanish:
  - tuvieron miedo
  - se asustaron
  - temieron
  lexicon: HALOT
  rationale: El hebreo expresa una reacción de temor; en español, «sintieron miedo» comunica bien el estado emocional sin forzar un calco demasiado duro.
- source_word: מְאֹד מְאֹד
  english_pob_choice: very, very
  chosen_spanish: muchísimo
  alternatives_spanish:
  - muy, muy
  - en gran manera
  - excesivamente
  lexicon: HALOT
  rationale: La duplicación intensifica el temor. «Muchísimo» conserva la fuerza intensiva en español, aunque condensa la repetición explícita del hebreo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Vean
  - Fíjate
  lexicon: HALOT
  rationale: «Mira» reproduce la fuerza deíctica y exhortativa de הִנֵּה de forma natural en español.
- source_word: שְׁנֵי הַמְּלָכִים
  english_pob_choice: the two kings
  chosen_spanish: los dos reyes
  alternatives_spanish:
  - los dos monarcas
  - dos reyes
  lexicon: HALOT
  rationale: Se conserva la referencia al par conocido en el contexto inmediato con una expresión natural en español.
- source_word: לֹא עָמְדוּ לְפָנָיו
  english_pob_choice: could not stand before him
  chosen_spanish: no pudieron resistir delante de él
  alternatives_spanish:
  - no pudieron sostenerse ante él
  - no pudieron mantenerse en pie delante de él
  - no pudieron hacerle frente
  lexicon: HALOT
  rationale: La imagen hebrea de «estar en pie delante de» implica no poder oponerse con éxito. «Resistir» explicita ese sentido, y «delante de él» mantiene el marco espacial del original.
- source_word: וְאֵיךְ נַעֲמֹד אֲנָחְנוּ
  english_pob_choice: so how can we stand?
  chosen_spanish: entonces, ¿cómo podremos resistir nosotros?
  alternatives_spanish:
  - ¿y cómo podremos resistir nosotros?
  - ¿cómo podremos mantenernos en pie nosotros?
  - entonces, ¿cómo podremos hacerle frente nosotros?
  lexicon: HALOT
  rationale: La segunda pregunta retoma el mismo verbo e idea de oposición. En español, «resistir» hace explícita la fuerza idiomática del paralelismo sin perder la relación con la primera cláusula.
theological_decisions:
- issue: La repetición del mismo verbo hebreo para «estar en pie» y «resistir/oponerse»
  english_pob_reading: The Hebrew uses the same verb, “stand,” in both clauses.
  chosen_spanish_reading: El español explicita el sentido de resistencia con «resistir», manteniendo la oposición de fondo entre no poder resistir y preguntar cómo podrán resistir.
  alternative_spanish_readings:
  - conservar «estar en pie» en ambas cláusulas
  - usar «sostenerse» en ambas cláusulas
  - usar «hacer frente» en ambas cláusulas
  rationale: El hebreo conserva una repetición verbal con valor idiomático. En español, una traducción estrictamente literal de «estar en pie» puede sonar menos clara; por eso se opta por una equivalencia que preserve el argumento y la tensión retórica del texto.
  doctrine_reference: Ninguna; decisión semántico-retórica.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] en el texto principal y manteniendo una nota léxica única correspondiente a la alternativa de «estar en pie»/«resistir».
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro, moderno y digno.
  - Se evitó «SEÑOR» porque este versículo no contiene el nombre divino ni una cita directa que lo requiera.
  - Se preservó la relación retórica entre las dos cláusulas mediante un mismo campo semántico de oposición/resistencia.
