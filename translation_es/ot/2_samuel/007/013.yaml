translation:
  language: es
  text: Él edificará una casa para mi nombre[a], y yo estableceré el trono de su reino para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un templo para mi nombre». El hebreo dice «una casa para mi nombre», preservando el juego de palabras del capítulo entre el templo y la dinastía.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּא
  english_pob_choice: He
  chosen_spanish: Él
  alternatives_spanish:
  - Él mismo
  lexicon: HALOT
  rationale: El pronombre independiente de 3.ª masculina singular se expresa naturalmente con «Él» en español. No hace falta intensificarlo, aunque conserva la referencia explícita al sujeto.
- source_word: יִבְנֶה
  english_pob_choice: will build
  chosen_spanish: edificará
  alternatives_spanish:
  - construirá
  lexicon: HALOT
  rationale: El verbo de בנה comunica acción futura en este contexto de promesa. «Edificará» es una opción digna y natural en español bíblico, y mantiene la idea de levantar una construcción sin forzar una paráfrasis.
- source_word: בַּיִת
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - un templo
  lexicon: HALOT
  rationale: Se conserva «casa» para reflejar el hebreo literal y mantener la tensión literaria entre casa como santuario y casa como dinastía. «Templo» interpreta el referente, pero reduce el juego de palabras del capítulo.
- source_word: לִשְׁמִי
  english_pob_choice: for my name
  chosen_spanish: para mi nombre
  alternatives_spanish:
  - en honor de mi nombre
  - para el honor de mi nombre
  lexicon: HALOT
  rationale: La preposición ל con שֵׁם se vierte de manera directa como «para mi nombre», preservando el giro semítico y su fuerza teológica sin explicitar más de lo que dice el texto.
- source_word: וְכֹנַנְתִּי
  english_pob_choice: and I will establish
  chosen_spanish: y yo estableceré
  alternatives_spanish:
  - y yo afirmaré
  - y yo haré firme
  lexicon: HALOT
  rationale: En la secuencia profética, el perfecto con waw funciona con sentido futuro. «Estableceré» es el equivalente más natural para un trono real y reproduce bien la idea de confirmar/afirmar.
- source_word: כִּסֵּא
  english_pob_choice: the throne
  chosen_spanish: el trono
  alternatives_spanish:
  - la sede del gobierno
  - el asiento real
  lexicon: HALOT
  rationale: En contexto real, כִּסֵּא significa literalmente «trono» y debe traducirse así de forma directa. Es la opción más clara y fiel.
- source_word: מַמְלַכְתּוֹ
  english_pob_choice: of his kingdom
  chosen_spanish: de su reino
  alternatives_spanish:
  - de su reinado
  - de su soberanía
  lexicon: HALOT
  rationale: «Reino» comunica el dominio real al que pertenece el trono y suena natural en español. Se mantiene la relación posesiva directa del hebreo.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - hasta siempre
  lexicon: HALOT
  rationale: El modismo expresa perpetuidad en la promesa davídica. «Para siempre» es la equivalencia más idiomática y clara en español, sin debilitar el peso teológico del texto.
theological_decisions:
- issue: Conservar el doble sentido de בַּיִת
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  rationale: La elección de «casa» conserva la ambigüedad intencional entre edificio sagrado y dinastía, central en el pasaje. Traducir «templo» aclararía el sentido inmediato, pero borraría la tensión literaria que el texto explota.
  doctrine_reference: Translation philosophy §3; prioridad del texto original sobre la tradición interpretativa.
- issue: Intensidad temporal de עַד עוֹלָם en la promesa davídica
  english_pob_reading: forever
  chosen_spanish_reading: para siempre
  alternative_spanish_readings:
  - por mucho tiempo
  - por una larga duración
  rationale: En este contexto de pacto, la expresión tiene fuerza de perpetuidad, no de mera duración indeterminada. La traducción mantiene esa fuerza para no atenuar la promesa real-davídica.
  doctrine_reference: Affirmations; Translation philosophy §1 y §3.
translation_notes:
  revision_awareness: Se siguió el texto hebreo (WLC) y el audit trail inglés. No se introdujeron cambios de sentido respecto a la revisión más reciente; la formulación española busca máxima transparencia con español natural. Se conservó la ambigüedad de בַּיִת mediante «casa» y la fuerza perpetua de עַד עוֹלָם mediante «para siempre».
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiere; este versículo no contiene el nombre divino explícito, por lo que no aparece.
  - Se evitó «Mesías/Cristo» porque no hay término mesiánico en el versículo.
  - «Nombre» se mantuvo como traducción de שֵׁם sin expansión interpretativa, en coherencia con el estilo del proyecto.
  - 'La referencia real se expresó con vocabulario directo: «trono» y «reino».'
