translation:
  language: es
  text: Para los que se entretienen con el vino[a], para los que vienen a buscar vino mezclado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vino condimentado» o «vino mezclado con especias». El hebreo se refiere a vino que ha sido mezclado, probablemente para intensificar el sabor o la fuerza.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְאַחֲרִים
  english_pob_choice: linger over
  chosen_spanish: se demoran con
  alternatives_spanish:
  - se detienen mucho en
  - se entretienen con
  - se quedan largo tiempo con
  lexicon: HALOT
  rationale: El participio expresa demora o permanencia prolongada; en español, "se demoran con" comunica la idea de insistir o prolongarse en torno al vino sin sonar arcaico.
- source_word: עַל הַיָּיִן
  english_pob_choice: over wine
  chosen_spanish: con el vino
  alternatives_spanish:
  - sobre el vino
  - en el vino
  - junto al vino
  lexicon: HALOT
  rationale: La preposición hebrea aquí señala ocupación o apego al vino. En español, "con el vino" suena natural y conserva la idea de estar absorbidos por él.
- source_word: בָּאִים
  english_pob_choice: come
  chosen_spanish: vienen
  alternatives_spanish:
  - van
  - acuden
  - llegan
  lexicon: HALOT
  rationale: Se mantiene el valor verbal más cercano al hebreo, "venir", en vez de sustituirlo por "ir"; así se conserva la referencia auditada de la revisión inglesa.
- source_word: לַחְקֹר
  english_pob_choice: to search out
  chosen_spanish: a indagar
  alternatives_spanish:
  - a buscar
  - a explorar
  - a investigar
  lexicon: HALOT
  rationale: El verbo expresa una búsqueda activa y deliberada. "Indagar" conserva ese matiz de búsqueda intencional sin volverlo demasiado técnico.
- source_word: מִמְסָךְ
  english_pob_choice: mixed wine
  chosen_spanish: vino mezclado
  alternatives_spanish:
  - vino condimentado
  - vino sazonado
  - bebida mezclada
  lexicon: HALOT
  rationale: La forma hebrea designa vino mezclado con otros ingredientes; "vino mezclado" es la correspondencia más directa y transparente en español, manteniendo abiertas las alternativas de sabor o refuerzo.
translation_notes:
  revision_awareness: La versión inglesa revisó 'go' por 'come' para ajustarse más al hebreo; en español se refleja ese ajuste con "vienen". También se mantuvo la equivalencia principal de "mixed wine" como "vino mezclado", dejando alternativas léxicas en la nota.
  spanish_consistency_notes:
  - Se evitó "SEÑOR" u otras sustituciones no pertinentes, pues no aparece el nombre divino en este versículo.
  - '"Vino mezclado" se conserva como forma base por transparencia; la nota preserva las alternativas documentadas en la tradición de traducción.'
  - Se eligió una sintaxis breve y paralela para reflejar el paralelismo hebreo sin forzar una construcción calcada.
