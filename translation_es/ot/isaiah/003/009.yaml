translation:
  language: es
  text: La expresión de sus rostros testifica contra ellos[a], y proclaman su pecado como Sodoma; no lo ocultan. ¡Ay de ellos mismos[c][b], porque han traído mal sobre sí mismos!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La apariencia de sus rostros da testimonio contra ellos». El hebreo puede referirse al semblante visible o a la expresión como evidencia de culpa.'
    reason: lexical_alternative
  - marker: b
    text: «Como Sodoma» evoca maldad pública y descarada; compárese Génesis 13:13; 19:5.
    reason: cross_reference
  - marker: c
    text: 'O: «¡Ay de su alma!» o «¡Ay de ellos!». El hebreo néfesh a menudo significa «ser», «vida» o «persona», según el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכָּרַת פְּנֵיהֶם
  english_pob_choice: The look on their faces
  chosen_spanish: La mirada de sus rostros
  alternatives_spanish:
  - La expresión de sus rostros
  - El aspecto de sus rostros
  - La apariencia de sus rostros
  lexicon: HALOT
  rationale: הַכָּרַת, derivado de נכר en esta forma nominal, apunta a lo reconocible en el rostro o la expresión visible. «Mirada» comunica de manera natural en español esa evidencia visible, sin perder el matiz forense del contexto.
- source_word: עָנְתָה בָּם
  english_pob_choice: testifies against them
  chosen_spanish: testifica contra ellos
  alternatives_spanish:
  - responde contra ellos
  - da testimonio contra ellos
  lexicon: HALOT
  rationale: ענה con ב puede tener el sentido de responder o testificar contra alguien. «Testifica contra ellos» conserva la fuerza judicial del hebreo y suena natural en español.
- source_word: וְחַטָּאתָם
  english_pob_choice: and they proclaim their sin
  chosen_spanish: y proclaman su pecado
  alternatives_spanish:
  - y su pecado
  - y proclaman su culpa
  lexicon: HALOT
  rationale: El sustantivo singular colectivo חַטָּאתָם se mantiene bien como «su pecado». En español conviene hacer explícita la relación verbal con הִגִּידוּ, como en la traducción inglesa auditada.
- source_word: כִּסְדֹם
  english_pob_choice: like Sodom
  chosen_spanish: como Sodoma
  alternatives_spanish:
  - igual que Sodoma
  - como la gente de Sodoma
  lexicon: HALOT
  rationale: «Como Sodoma» preserva la brevedad y la alusión bíblica directa al paradigma de maldad pública y descarada.
- source_word: הִגִּידוּ
  english_pob_choice: they proclaim
  chosen_spanish: proclaman
  alternatives_spanish:
  - declaran
  - anuncian
  - dicen
  lexicon: HALOT
  rationale: נגד en hifil significa decir, declarar o dar a conocer. «Proclaman» transmite bien el carácter público y sin vergüenza del contexto.
- source_word: לֹא כִחֵדוּ
  english_pob_choice: they do not hide it
  chosen_spanish: no lo ocultan
  alternatives_spanish:
  - no lo esconden
  - no lo han ocultado
  lexicon: HALOT
  rationale: כחד significa esconder u ocultar. «No lo ocultan» es breve, claro y conserva la idea de falta de vergüenza.
- source_word: א֣וֹי לְנַפְשָׁם
  english_pob_choice: Woe to themselves
  chosen_spanish: ¡Ay de sí mismos!
  alternatives_spanish:
  - ¡Ay de su alma!
  - ¡Ay de ellos!
  lexicon: HALOT
  rationale: נפש aquí funciona de modo reflexivo como la propia persona o el propio ser. «Sí mismos» evita imponer una antropología más técnica que la del hebreo y reproduce la carga reflexiva.
- source_word: כִּי גָמְלוּ לָהֶם רָעָה
  english_pob_choice: for they have brought evil on themselves
  chosen_spanish: porque se han causado mal a sí mismos
  alternatives_spanish:
  - porque se han retribuido con mal
  - porque han hecho mal a sí mismos
  - porque han traído mal sobre sí mismos
  lexicon: HALOT
  rationale: גמל puede significar tratar, pagar o retribuir. En este contexto, la idea es que el mal vuelve sobre ellos; «se han causado mal a sí mismos» conserva el sentido de consecuencia moral y el peso de רָעָה.
theological_decisions:
- issue: Sentido de נֶפֶשׁ en לְנַפְשָׁם
  english_pob_reading: reflexive 'themselves'/'their own selves' rather than a narrowly immaterial 'soul'
  chosen_spanish_reading: 'reflexivo: «sí mismos»'
  alternative_spanish_readings:
  - «su alma»
  - «su vida»
  rationale: En este juicio profético, נֶפֶשׁ se refiere a la propia persona, no necesariamente al alma en sentido técnico. «Sí mismos» evita estrechar indebidamente el sentido del hebreo.
  doctrine_reference: Translation philosophy §1, §6
- issue: Fuerza del último miembro de la frase
  english_pob_reading: self-incurred judgment/consequence
  chosen_spanish_reading: 'consecuencia moral auto-incurrida: «se han causado mal a sí mismos»'
  alternative_spanish_readings:
  - juicio divino expresado más explícitamente
  - simple resultado social
  rationale: El hebreo afirma que han obrado mal de modo que el mal recae sobre ellos; no explicita aquí el mecanismo. La traducción conserva esa afirmación sin sobreespecificarla.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se revisó el pasaje frente al paquete fuente hebreo y el audit trail en inglés. La versión inglesa final no cambió en la última pasada; el consenso de revisión fue alto, con observación menor sobre matices léxicos ya resueltos en la redacción española.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto solo cuando corresponde; en este versículo no aparece el Tetragrámaton.
  - Se prefirió «pecado» para חטאת y «mal» para רעה, distinguiendo culpa moral de la consecuencia dañina.
  - «Proclaman» y «testifica contra ellos» preservan el tono público/forense del hebreo.
  - La nota de [c] se ancla en «sí mismos» porque el español necesita decidir entre un giro reflexivo y una lectura antropológica más estrecha.
