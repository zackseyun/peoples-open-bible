  to: Pero un hombre siempre tiene temor[a]; a quien conoces como guardador del mandamiento.
  rationale: Se reemplaza el texto griego anterior por una traducción española que sigue la lectura hebrea adoptada en la auditoría inglesa vigente, y se añade una nota textual para conservar la transparencia sobre la fuerte divergencia con el paralelo griego. «Tiene temor» suena más natural en español que «es temeroso» en esta construcción, y «guardador del mandamiento» conserva mejor el matiz nominal de שומר מצוה que una paráfrasis más libre.
