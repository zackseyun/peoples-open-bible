  text: וְ/אָמַרְתָּ֗ אֶֽעֱלֶה֙ עַל אֶ֣רֶץ פְּרָז֔וֹת אָבוֹא֙ הַ/שֹּׁ֣קְטִ֔ים יֹשְׁבֵ֖י לָ/בֶ֑טַח כֻּלָּ֗/ם יֹֽשְׁבִים֙ בְּ/אֵ֣ין חוֹמָ֔ה וּ/בְרִ֥יחַ וּ/דְלָתַ֖יִם אֵ֥ין לָ/הֶֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/038/011.yaml
  text: and you will say[a], ‘I will go up against a land of unwalled villages; I will come against those who are at rest, who dwell securely, all of them dwelling without walls[d][c][b], and having no bars or gates.’
  footnotes:
  - marker: a
    text: Or 'a land of open country' or 'a land of rural settlements'; the Hebrew term refers to places lacking defensive walls.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will come to'; the rendering 'come against' reflects the hostile context of Gog's speech.
    reason: lexical_alternative
  - marker: c
    text: Or 'bars or gates'; 'doors' is the more direct rendering of the Hebrew, though the context is defensive structures.
    reason: lexical_alternative
  - marker: d
    text: Or 'all of them dwelling without a wall, and having no bar or doors.'.
    reason: previous_rendering
