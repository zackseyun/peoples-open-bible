translation:
  language: es
  text: Pero nosotros, aunque no tenemos necesidad de estas cosas, tenemos como aliento[a] los libros santos que están en nuestras manos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consuelo» o «consolación» para «aliento».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los libros santos que están en nuestras manos»; la frase también puede implicar «en nuestra posesión».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπρόσδεοι
  english_pob_choice: having no need
  chosen_spanish: no tenemos necesidad de
  alternatives_spanish:
  - estamos sin necesidad de
  - no necesitamos
  lexicon: LSJ
  rationale: El adjetivo expresa falta de necesidad o independencia respecto de algo. En español, «no tenemos necesidad de» comunica con naturalidad esa idea y mantiene el contraste con los apoyos mencionados antes sin añadir matices de autosuficiencia que el griego no exige.
- source_word: τούτων
  english_pob_choice: of these things
  chosen_spanish: de estas cosas
  alternatives_spanish:
  - de éstas
  - de estas
  lexicon: LSJ
  rationale: El pronombre genitivo remite a los elementos mencionados en el contexto inmediato. «De estas cosas» hace explícita la referencia y conserva la amplitud del griego.
- source_word: παράκλησιν
  english_pob_choice: encouragement
  chosen_spanish: aliento
  alternatives_spanish:
  - consuelo
  - consolación
  - exhortación
  - ánimo
  lexicon: BDAG
  rationale: En este contexto la idea es de sostén interno o fortalecimiento que proviene de las Escrituras. «Aliento» funciona bien en español y puede abarcar tanto estímulo como consuelo, sin forzar una lectura más limitada.
- source_word: τὰ βιβλία τὰ ἅγια
  english_pob_choice: the holy books
  chosen_spanish: los libros santos
  alternatives_spanish:
  - los libros sagrados
  - las Escrituras santas
  lexicon: LSJ
  rationale: La traducción conserva el sustantivo concreto «libros» y el calificativo «santos», reflejando de cerca el griego. Se evita sustituirlo por «Escrituras» para no ir más allá de la formulación textual.
- source_word: τὰ ἐν ταῖς χερσὶν ἡμῶν
  english_pob_choice: that are in our hands
  chosen_spanish: que están en nuestras manos
  alternatives_spanish:
  - en nuestro poder
  - en nuestra posesión
  - en nuestro poder y cuidado
  lexicon: LSJ
  rationale: La imagen literal de «en nuestras manos» se mantiene en español porque es natural y preserva la vividez del original. Puede sugerir posesión o acceso directo, como reconoce el audit trail inglés.
theological_decisions:
- issue: Sentido de los «libros santos»
  english_pob_reading: Render generically as 'the holy books' without specifying a narrower canon or importing later terminology.
  chosen_spanish_reading: Traducir genéricamente como «los libros santos» sin precisar un canon posterior ni cambiar la expresión por una fórmula eclesiástica más tardía.
  alternative_spanish_readings:
  - las Escrituras santas
  - los libros sagrados
  rationale: El griego nombra libros santos, pero no define aquí un límite canónico posterior. La versión española debe conservar esa amplitud y la posible tensión histórica, sin resolverla artificialmente.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió el estado más reciente del expediente, que indica que no hubo revisiones adicionales y que el pase final quedó sin cambios. La redacción española se ajusta al griego directo y al trazado auditado en inglés, especialmente en la imagen concreta de «en nuestras manos» y en la amplitud semántica de παράκλησιν.
  spanish_consistency_notes:
  - Se mantuvo «libros santos» para reflejar τὰ βιβλία τὰ ἅγια sin introducir «Escrituras» como equivalente interpretativo.
  - Se prefirió «aliento» como solución natural en español, dejando nota de las alternativas semánticas documentadas.
  - Se conservó la imagen espacial «en nuestras manos», coherente con la lectura literal y la posible implicación de posesión o custodia.
  - El prefijo adversativo «Pero nosotros» reproduce el δὲ inicial y el contraste del contexto inmediato.
