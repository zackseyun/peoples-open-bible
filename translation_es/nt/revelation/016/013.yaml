translation:
  language: es
  text: Y vi tres espíritus inmundos[a] como ranas que salían de la boca del dragón, de la boca de la bestia y de la boca del falso profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de la boca del dragón, de la boca de la bestia y de la boca del falso profeta vi tres espíritus inmundos como ranas». El griego coloca las frases repetidas de origen antes de «tres espíritus inmundos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré y vi
  lexicon: BDAG
  rationale: El aoristo de ὁράω en un relato de visión se expresa de manera natural con el pasado simple español. «Vi» conserva la inmediatez narrativa sin añadir matices no presentes en el griego.
- source_word: ἐκ ... τοῦ στόματος
  english_pob_choice: coming out of the mouth of
  chosen_spanish: que salían de la boca de
  alternatives_spanish:
  - que salían de la boca desde
  - saliendo de la boca de
  - de la boca de
  lexicon: BDAG
  rationale: El griego repite ἐκ con τoῦ στόματος para marcar origen y salida. En español, «que salían de la boca de» comunica de forma natural esa procedencia dinámica sin perder el sentido de fuente que el POB inglés explicita con «coming out of».
- source_word: δράκοντος
  english_pob_choice: the dragon
  chosen_spanish: el dragón
  alternatives_spanish:
  - el monstruo-dragón
  lexicon: BDAG
  rationale: En Apocalipsis, δράκων es la figura simbólica establecida como «dragón». Se conserva ese término tradicional y preciso en español.
- source_word: θηρίου
  english_pob_choice: the beast
  chosen_spanish: la bestia
  alternatives_spanish:
  - el animal salvaje
  lexicon: BDAG
  rationale: θηρίον en Apocalipsis designa una figura apocalíptica; «bestia» preserva ese valor simbólico mejor que un término genérico como «animal».
- source_word: ψευδοπροφήτου
  english_pob_choice: the false prophet
  chosen_spanish: el falso profeta
  alternatives_spanish:
  - el profeta mentiroso
  lexicon: BDAG
  rationale: El compuesto σημα el título fijo «falso profeta». «Falso profeta» es la equivalencia más fiel y reconocible en español.
- source_word: πνεύματα
  english_pob_choice: spirits
  chosen_spanish: espíritus
  alternatives_spanish:
  - seres espirituales
  - espíritus malignos
  lexicon: BDAG
  rationale: πνεύματα nombra entidades espirituales; «espíritus» mantiene la referencia abierta del versículo, sin anticipar una identificación que el contexto inmediato desarrolla después.
- source_word: τρία ἀκάθαρτα
  english_pob_choice: three unclean
  chosen_spanish: tres espíritus inmundos
  alternatives_spanish:
  - tres espíritus impuros
  - tres seres inmundos
  lexicon: BDAG
  rationale: Se colocó el adjetivo después del sustantivo para una sintaxis natural en español. «Inmundos» conserva el peso bíblico-ritual de ἀκάθαρτος, más fuerte y más preciso aquí que «impuros».
- source_word: ὡς βάτραχοι
  english_pob_choice: like frogs
  chosen_spanish: como ranas
  alternatives_spanish:
  - como sapos
  - cual ranas
  lexicon: BDAG
  rationale: ὡς introduce comparación, no identidad. «Como ranas» reproduce la imagen con claridad en español y conserva el valor comparativo del griego.
theological_decisions:
- issue: Naturaleza de los πνεύματα ἀκάθαρτα
  english_pob_reading: Render as 'three unclean spirits like frogs' without allegorical expansion.
  chosen_spanish_reading: «tres espíritus inmundos como ranas», sin agregar en el texto principal que sean demonios.
  alternative_spanish_readings:
  - tres espíritus demoníacos como ranas
  - tres espíritus impuros como ranas
  rationale: El griego de este versículo dice solo «espíritus inmundos» y la identificación demoníaca se aclara en el contexto siguiente. La traducción conserva esa tensión y no resuelve en exceso la imagen apocalíptica.
  doctrine_reference: Preservar la tensión teológica y dejar que el contexto inmediato interprete la imagen.
translation_notes:
  revision_awareness: El texto base presenta alta concordancia con el audit trail inglés y no requiere ajustes sustanciales. Se mantuvo la imagen apocalíptica sin expandirla, y se reordenó la estructura griega para una sintaxis española fluida, preservando el valor de ἐκ + στόματος y la comparación de ὡς.
  spanish_consistency_notes:
  - Se usó «espíritus inmundos» para ἀκάθαρτα, en coherencia con el léxico bíblico y con el valor ritual/moral del término.
  - Se prefirió «dragón», «bestia» y «falso profeta» como títulos apocalípticos ya establecidos.
  - No se introdujo «Cristo» ni otras terminologías ajenas al versículo.
  - La nota al pie conserva la alternativa de ordenamiento reflejada en el audit trail inglés.
