translation:
  language: es
  text: 'Que diga ahora[a] Israel: «Su amor leal[b] es para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ahora» traduce la fuerza exhortativa de נָא; aquí no expresa cortesía, sino urgencia o énfasis litúrgico.
    reason: lexical_alternative
  - marker: b
    text: «Amor leal» busca reflejar חֶסֶד, un amor fiel y de pacto; otras posibilidades son «amor de pacto», «amor constante» o «misericordia», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹאמַר
  english_pob_choice: Let ... say
  chosen_spanish: Que diga
  alternatives_spanish:
  - Que diga ahora
  - Diga ahora
  lexicon: HALOT
  rationale: El yiqtol con sentido exhortativo/jusivo se expresa naturalmente en español con una exhortación introducida por «Que». Esto conserva el llamado colectivo sin añadir un sujeto verbalmente innecesario.
- source_word: נָא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ya
  - por favor
  lexicon: HALOT
  rationale: Aquí נָא aporta urgencia o fuerza exhortativa, no cortesía. «Ahora» reproduce bien ese matiz en un registro litúrgico y evita el tono conversacional de «por favor».
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio y su referencia corporativa al pueblo del pacto.
- source_word: כִּי
  english_pob_choice: — introducing quoted content as “... love endures forever”
  chosen_spanish: introduciendo el contenido de la confesión
  alternatives_spanish:
  - porque
  - que
  lexicon: HALOT
  rationale: En este refrán, כִּי introduce lo que Israel debe decir. En español su función se refleja mejor con dos puntos y cita directa, sin forzar una subordinación causal literal.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: permanece para siempre
  alternatives_spanish:
  - es para siempre
  - es eterno
  lexicon: HALOT
  rationale: Aunque el hebreo es literalmente durativo («para siempre»), en español conviene unirlo con un verbo que exprese permanencia. «Permanece para siempre» mantiene la idea de duración continua y suena natural en una confesión pública.
- source_word: חַסְדּוֹ
  english_pob_choice: His steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su amor constante
  - su amor de pacto
  - su misericordia
  lexicon: HALOT
  rationale: חֶסֶד denota amor leal, covenantal. «Amor leal» preserva la fidelidad relacional sin depender de un término más arcaico; evita reducir el alcance a «misericordia» y deja visible la dimensión de lealtad del pacto.
theological_decisions:
- issue: Cómo rendir חֶסֶד en un refrán de alabanza del pacto
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - amor de pacto
  - misericordia
  - amor constante
  rationale: La frase celebra la fidelidad duradera de Yahvé hacia Israel. «Amor leal» comunica bien esa combinación de afecto y fidelidad pactal sin cargar el texto con una formulación confesional ajena al verso.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Valor de la partícula כִּי en una fórmula litúrgica
  english_pob_reading: introducing quoted content
  chosen_spanish_reading: dos puntos con cita directa
  alternative_spanish_readings:
  - porque
  - que
  rationale: El verso funciona como convocatoria a proclamar una fórmula. La cita directa conserva la estructura pragmática del hebreo y evita decidir prematuramente entre causalidad y contenido proposicional.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El contexto auditado presenta alta concordancia y no registra revisiones aplicadas; esta propuesta sigue la lectura aprobada de exhortación + confesión citada, manteniendo la tensión semántica de חֶסֶד sin normalizarla a un término más débil.
  spanish_consistency_notes:
  - Se conserva «Israel» como sujeto colectivo del llamado.
  - Se usa «Yahvé» en el proyecto cuando el texto lo requiera; en este versículo no aparece el tetragrámaton de forma explícita.
  - «Amor leal» se mantiene como opción consistente para חֶסֶד en contextos de fidelidad pactal.
  - La estructura con cita directa refleja mejor el hebreo que una subordinación causal explícita.
