translation:
  language: es
  text: Una población mixta[a] habitará en Asdod, y extirparé el orgullo de los filisteos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un hijo ilegítimo habitará en Asdod». El hebreo מַמְזֵר es difícil y puede denotar una persona de estatus mixto o excluido; aquí se vierte de manera colectiva según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָשַׁב
  english_pob_choice: will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - vivirá
  - se asentará
  lexicon: HALOT
  rationale: En este contexto profético de ocupación y presencia estable en una ciudad, «habitará» comunica residencia continua de manera natural en español y conserva el valor de morar/establecerse.
- source_word: מַמְזֵר
  english_pob_choice: a mixed people
  chosen_spanish: una población mixta
  alternatives_spanish:
  - un hijo ilegítimo
  - un extranjero
  - una gente mezclada
  lexicon: HALOT
  rationale: El término hebreo es difícil y puede apuntar a una condición social o étnica excluida. Como en el audit trail inglés, el sentido aquí parece colectivo dentro de la ciudad; «población mixta» mantiene esa fuerza colectiva sin reducirlo indebidamente a una sola persona ni cargarlo con un insulto más fuerte que el que la evidencia exige.
- source_word: בְּאַשְׁדּוֹד
  english_pob_choice: in Ashdod
  chosen_spanish: en Asdod
  alternatives_spanish:
  - en la ciudad de Asdod
  - en Ashdod
  lexicon: HALOT
  rationale: La preposición indica localización. «En Asdod» es la forma idiomática y clara en español para residencia dentro de la ciudad.
- source_word: הִכְרַתִּי
  english_pob_choice: I will cut off
  chosen_spanish: cortaré
  alternatives_spanish:
  - eliminaré
  - destruiré
  - extirparé
  lexicon: HALOT
  rationale: «Cortaré» conserva el modismo profético/judicial del hebreo כרת y evita suavizar el golpe verbal del original.
- source_word: גְּאוֹן
  english_pob_choice: the pride
  chosen_spanish: el orgullo
  alternatives_spanish:
  - la arrogancia
  - la altivez
  - la majestad
  lexicon: HALOT
  rationale: En un oráculo de juicio contra los filisteos, el valor negativo de autosuficiencia o jactancia es el más probable. «Orgullo» expresa bien ese sentido en español sin perder la ambigüedad entre orgullo y pretensión.
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - Filistea
  lexicon: HALOT
  rationale: La forma hebrea designa al pueblo, no a la tierra. Por eso corresponde «los filisteos».
theological_decisions:
- issue: Alcance de מַמְזֵר en un oráculo de juicio
  english_pob_reading: Rendered collectively as 'a mixed people' occupying Ashdod
  chosen_spanish_reading: Se vierte colectivamente como «una población mixta» en Asdod
  alternative_spanish_readings:
  - «un hijo ilegítimo»
  - «un extranjero»
  rationale: La evidencia contextual apunta a una transformación o humillación de la identidad cívica de Asdod más que a la sola referencia a una persona aislada. La traducción colectiva evita forzar una lectura individualista y preserva la tensión léxica del hebreo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Mantenimiento del modismo judicial de כרת
  english_pob_reading: I will cut off
  chosen_spanish_reading: «cortaré»
  alternative_spanish_readings:
  - «eliminaré»
  - «destruiré»
  rationale: El verbo mantiene el tono de juicio solemne y la imagen concreta del hebreo. En español, «cortaré» suena duro pero claro, y no diluye el carácter profético de la afirmación.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés sin depender mecánicamente de él: se respetó la lectura colectiva de מַמְזֵר, el valor judicial de כרת y la referencia al pueblo filisteo, sin introducir ampliaciones doctrinales ni suavizar la fuerza profética del hebreo. No hay revisiones registradas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Asdod» como topónimo bíblico estándar en español.
  - Se evita «SEÑOR» porque el versículo no contiene el tetragrámaton ni una sustitución por κύριος.
  - Se conserva un registro moderno y digno, sin arcaísmos innecesarios.
  - «Orgullo» se eligió por ser el equivalente más natural de גְּאוֹן en este juicio; no se usa «majestad» porque aquí el contexto es negativo.
