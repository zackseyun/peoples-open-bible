review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del hebreo: נֹאֵף אִשָּׁה se vierte naturalmente como «comete adulterio con una mujer»; חֲסַר לֵב está bien entendido como falta de juicio/entendimiento; y מַשְׁחִית נַפְשׁוֹ comunica autodestrucción. La nota también preserva la alternativa léxica «esposa». Sin embargo, «el que lo hace destruye su propia vida» atenúa ligeramente la fuerza reflexiva inmediata de נַפְשׁוֹ frente a una formulación más directa como «se destruye a sí mismo» o «destruye su propia vida». Además, el antecedente femenino hebreo del sufijo en יַעֲשֶׂנָּה se refiere al acto, y en español conviene mantener referencia natural al acto mencionado.'
  spanish_quality_summary: 'El español es claro, digno y legible. La única mejora recomendada es de precisión e idiomaticidad en la segunda cola: «el que lo hace destruye su propia vida» es comprensible, pero suena un poco menos proverbial y menos directo que «el que lo hace se destruye a sí mismo». También conviene normalizar la nota al estilo usual, sin comillas innecesarias alrededor de todo el texto de la nota.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son adecuadas: «comete adulterio», «mujer», «carece de entendimiento» y «destruye». La alternativa de nota «esposa» está correctamente preservada. No hay términos teológicos sensibles en este versículo.'
  issues:
  - severity: medium
    issue: La frase «destruye su propia vida» puede sonar algo menos directa que el hebreo reflexivo.
    rationale: נַפְשׁוֹ aquí apunta al propio ser/vida del sujeto. En español proverbial, «se destruye a sí mismo» expresa con más fuerza la autodestrucción implicada por מַשְׁחִית נַפְשׁוֹ.
  - severity: low
    issue: 'La nota al pie usa formato poco natural: comillas que envuelven toda la nota.'
    rationale: 'El contenido es correcto, pero el estilo puede normalizarse a «O bien: …» para mayor limpieza editorial y consistencia.'
  revised_spanish_text: El que comete adulterio con una mujer carece de entendimiento[a]; el que lo hace se destruye a sí mismo.
  revised_footnotes:
  - marker: a
    text: 'O bien: «El que comete adulterio con una esposa carece de entendimiento; quien lo hace arruina su vida».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la segunda cláusula para reflejar con más fuerza y naturalidad en español el valor reflexivo de מַשְׁחִית נַפְשׁוֹ. También se normaliza el estilo de la nota al pie sin cambiar su contenido sustancial.
