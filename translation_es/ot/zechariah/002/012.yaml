translation:
  language: es
  text: 'Porque así ha dicho Yahvé de los ejércitos: Tras la gloria me envió[a] a las naciones que los despojan, porque quien los toca toca la pupila[b] de su ojo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Tras la gloria me ha enviado a las naciones que los despojan'. La expresión hebrea 'Tras la gloria' es difícil y puede expresar propósito, secuencia o relación con el honor o la gloria.
    reason: alternative_reading
  - marker: b
    text: O 'la niña de sus ojos'. El modismo hebreo designa la parte más sensible y cuidadosamente protegida del ojo.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino con la forma española establecida en este proyecto, en lugar de sustituirlo por un título. 'Yahvé' mantiene la transparencia del Tetragrámaton y es idiomático en español bíblico contemporáneo.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de las huestes
  - de los escuadrones
  lexicon: HALOT
  rationale: '''De los ejércitos'' comunica bien el título divino y es natural en español. ''Huestes'' sería más tradicional, pero menos transparente para lectores modernos.'
- source_word: אַחַר כָּבוֹד
  english_pob_choice: After glory
  chosen_spanish: Tras la gloria
  alternatives_spanish:
  - Después de la gloria
  - Por gloria
  - Tras honor
  lexicon: HALOT
  rationale: Se preserva la dificultad sintáctica de la frase hebrea con una traducción sobria y abierta. 'Tras' deja la relación entre 'gloria' y 'envió' deliberadamente no explicitada, como en el texto fuente.
- source_word: שְׁלָחַנִי
  english_pob_choice: he sent me
  chosen_spanish: me envió
  alternatives_spanish:
  - me ha enviado
  - me mandó
  lexicon: HALOT
  rationale: El perfecto hebreo se vierte con pretérito simple para una lectura natural en español, siguiendo la revisión del POB inglés. 'Envió' conserva el sentido de misión sin introducir matices de comisión no presentes de forma explícita.
- source_word: אֶל הַגּוֹיִם
  english_pob_choice: to the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - contra las naciones
  - hacia las naciones
  lexicon: HALOT
  rationale: Se mantiene la preposición más directa de אֶל. Aunque el contexto es hostil, 'a las naciones' preserva la relación sintáctica sin resolverla interpretativamente como 'contra'.
- source_word: הַשֹּׁלְלִים אֶתְכֶם
  english_pob_choice: that plunder you
  chosen_spanish: que os despojan
  alternatives_spanish:
  - que os saquean
  - que os saquean y despojan
  - que os roban
  lexicon: HALOT
  rationale: '''Despojan'' comunica el valor de שׁלל en contexto bélico y preserva la idea de botín/plunder. Se prefiere a ''saquean'' por su cercanía al campo semántico de despojo y expolio.'
- source_word: הַנֹּגֵעַ בָּכֶם
  english_pob_choice: whoever touches you
  chosen_spanish: el que toca en vosotros
  alternatives_spanish:
  - quien os toca
  - el que os toca
  lexicon: HALOT
  rationale: Se mantiene el paralelismo repetido con נגע mediante 'toca'. La forma 'el que' conserva el participio general sin añadir universalidad interpretativa extra. Se conserva 'en vosotros' porque reproduce con fidelidad el hebreo בָכֶם y el patrón español admite esta construcción reverencial/idiomática.
- source_word: נֹגֵעַ
  english_pob_choice: touches
  chosen_spanish: toca
  alternatives_spanish:
  - hace contacto con
  - hiere
  - manosea
  lexicon: HALOT
  rationale: '''Toca'' preserva la repetición retórica del hebreo y evita sobreinterpretar el verbo con fuerza violenta. La misma forma verbal en ambas cláusulas reproduce el énfasis del texto fuente.'
- source_word: בְּבָבַת עֵינוֹ
  english_pob_choice: the pupil of his eye
  chosen_spanish: la niña de su ojo
  alternatives_spanish:
  - el ojo de su ojo
  - la pupila de su ojo
  - la niña de su pupila
  lexicon: HALOT
  rationale: Se elige la expresión española tradicional 'la niña del ojo', pero ajustada a la sintaxis del versículo. Aunque 'pupila' es más técnica, 'niña' mantiene mejor la imagen idiomática y es plenamente inteligible en registros bíblicos españoles.
theological_decisions:
- issue: Ambigüedad del sujeto que habla y del referente de 'su ojo'
  english_pob_reading: The verse is translated without resolving the speaker-identification ambiguity; 'me' and 'his' are left as in the Hebrew.
  chosen_spanish_reading: Se conserva 'me' y 'su' sin identificar al hablante ni armonizar la referencia.
  alternative_spanish_readings:
  - me ha enviado
  - nos envió
  - la niña de tu ojo
  rationale: El hebreo mantiene una tensión real entre la voz que habla y el referente de la misión. La traducción española no resuelve esa ambigüedad, en línea con la filosofía del POB de preservar tensiones teológicas y gramaticales cuando el texto no las aclara.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: usa pretérito simple para שְׁלָחַנִי, conserva la preposición directa de אֶל con ''a las naciones'' en vez de ''contra'', y mantiene la dificultad de ''Tras la gloria'' sin resolverla. También conserva la metáfora ocular con una equivalencia española idiomática.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para el Tetragrámaton.
  - Se prefirió 'de los ejércitos' para צְבָאוֹת por claridad contemporánea.
  - Se conservó la repetición verbal con 'toca' para reflejar el paralelismo hebreo.
  - La nota textual/lexical sobre בְּבָבַת עֵינוֹ usa 'niña' como equivalente idiomático tradicional, con alternativa 'pupila' en nota.
  - No se resolvió la identidad del hablante ni la relación exacta de 'Tras la gloria' con el resto de la cláusula.
