translation:
  language: es
  text: Porque él aflige y también tiene misericordia; hace descender al Hades[a] y hace subir, y no hay quien escape de su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al sepulcro» o «al reino de los muertos». El griego dice «al Hades».
    reason: lexical_alternative
lexical_decisions:
- source_word: μαστιγοῖ
  english_pob_choice: afflicts
  chosen_spanish: azota
  alternatives_spanish:
  - aflige
  - castiga
  - disciplina
  lexicon: LSJ
  rationale: El griego literalmente expresa golpear con azotes; en español, «azota» conserva con más fuerza la imagen corporal y punitiva que «aflige», sin perder el sentido de acción severa de Dios. En este paralelismo poético, el verbo concreto funciona bien y no exige suavizarlo.
- source_word: ἐλεᾷ
  english_pob_choice: shows mercy
  chosen_spanish: tiene misericordia
  alternatives_spanish:
  - muestra misericordia
  - se compadece
  - tiene compasión
  lexicon: LSJ
  rationale: La idea del verbo es misericordia/compasión. «Tiene misericordia» es una fórmula natural y reverente en español bíblico, y conserva el equilibrio antitético con «azota».
- source_word: κατάγει
  english_pob_choice: brings down
  chosen_spanish: hace descender
  alternatives_spanish:
  - baja
  - conduce abajo
  - derriba
  lexicon: LSJ
  rationale: El verbo expresa movimiento hacia abajo. «Hace descender» mantiene la causatividad y el paralelismo con «hace subir» mejor que una formulación más libre.
- source_word: εἰς ᾅδην
  english_pob_choice: to Hades
  chosen_spanish: al Hades
  alternatives_spanish:
  - al sepulcro
  - al reino de los muertos
  - a la tumba
  lexicon: LSJ
  rationale: El texto griego nombra explícitamente ᾅδης. Se conserva «Hades» en el cuerpo del texto para respetar el término fuente y no resolver de antemano su alcance entre sepulcro, morada de los muertos o una referencia más amplia al ámbito de la muerte.
- source_word: ἀνάγει
  english_pob_choice: brings up
  chosen_spanish: hace subir
  alternatives_spanish:
  - levanta
  - saca
  - eleva
  lexicon: LSJ
  rationale: Conviene reflejar el paralelo exacto con «hace descender». «Hace subir» es claro, mantiene la antítesis y no especifica más de lo que el griego dice.
- source_word: οὐκ ἔστιν ὃς ἐκφεύξεται
  english_pob_choice: there is no one who will escape
  chosen_spanish: no hay quien escape
  alternatives_spanish:
  - nadie escapará
  - no hay nadie que escape
  - no podrá escapar nadie
  lexicon: LSJ
  rationale: La frase idiomática en español se naturaliza como «no hay quien escape», que conserva el valor absoluto del griego y su tono proverbial.
- source_word: τὴν χεῖρα αὐτοῦ
  english_pob_choice: his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su poder
  - de su brazo
  - de su control
  lexicon: LSJ
  rationale: «Mano» debe conservarse como imagen bíblica concreta de poder y acción. En español, «escape de su mano» reproduce bien la metáfora sin explicarla.
theological_decisions:
- issue: Sentido de la bajada al Hades y la subida
  english_pob_reading: A general statement of God's sovereign power over death and the realm of the dead, without forcing an explicit resurrection doctrine.
  chosen_spanish_reading: Una afirmación general del poder soberano de Dios sobre la muerte y el ámbito de los muertos, sin cerrar el texto a una lectura más fuerte de resurrección ni reducirlo solo a peligro mortal.
  alternative_spanish_readings:
  - Referencia al sepulcro o a la tumba en sentido más literal
  - Alusión a rescate de una situación extrema sin implicar el más allá
  - Afirmación explícita de resurrección desde el reino de los muertos
  rationale: El binomio descendente/ascendente y el nombre ᾅδης mantienen una tensión que el español no debe resolver prematuramente. «Hades» deja abierta la amplitud semántica del original griego y permite que el lector perciba tanto el dominio sobre la muerte como la posibilidad de rescate o restauración.
  doctrine_reference: Preservar la tensión teológica del texto; no resolver la escatología donde el griego no lo hace.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete 1909 y conserva el paralelismo verbal y nominal del verso. Se tomó como guía la auditoría inglesa, pero se eligieron equivalentes españoles directos y naturales: se mantiene la tensión entre azote/misericordia y entre descenso/ascenso, sin parafrasear el alcance de ᾅδης.'
  spanish_consistency_notes:
  - Se usa «Dios» implícito mediante el pronombre «él», tal como el contexto inmediato de Tobit 13 lo identifica; no se introduce «Yahvé» porque el verso griego no contiene el nombre divino.
  - Se conserva «Hades» en el texto principal por fidelidad al griego; la nota ofrece alternativas españolas sin borrar el término fuente.
  - «No hay quien escape» mantiene el valor absoluto del giro griego y suena natural en español bíblico contemporáneo.
