base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/031/019.yaml
  text: And for the sons of Aaron[a], the priests, in the pasture lands of their cities, in every city[e][d][c][b], there were men designated by name to give portions to every male among the priests and to everyone enrolled by genealogy among the Levites.
  footnotes:
  - marker: a
    text: Or 'descendants of Aaron the priests.' The Hebrew literally says 'sons of Aaron,' a genealogical expression that can include later descendants.
    reason: lexical_alternative
  - marker: b
    text: Or 'common lands' or 'open lands' of their cities. The term refers to the land surrounding the cities, often used as pasture.
    reason: cultural_note
  - marker: c
    text: Hebrew 'every city and city,' an idiom meaning 'each and every city.'
    reason: lexical_alternative
  - marker: d
    text: Or 'listed by name' or 'appointed by name.' The Hebrew indicates men specifically identified in an official manner.
    reason: lexical_alternative
  - marker: e
    text: That is, those entered in genealogical records among the Levites.
    reason: cultural_note
