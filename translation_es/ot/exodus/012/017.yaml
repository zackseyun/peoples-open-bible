revisions:
- from: Y guardarás la Fiesta de los Panes sin Levadura[a], porque en este mismo día saqué tus ejércitos[b] de la tierra de Egipto. Y guardarás este día, por todas tus generaciones, como estatuto perpetuo[c].
  to: Y guardarán la fiesta de los Panes sin Levadura[a], porque en este mismo día saqué a sus huestes[b] de la tierra de Egipto. Y guardarán este día a lo largo de sus generaciones, como estatuto perpetuo[c].
  rationale: Se corrigió la segunda persona singular a plural para reflejar fielmente el hebreo. Se reemplazó «ejércitos» por «huestes» para conservar la imagen de un pueblo ordenado sin sonar excesivamente militarizado en español moderno. Se suavizó la capitalización de «fiesta» y se ajustó «por todas tus generaciones» a «a lo largo de sus generaciones» para una sintaxis más natural y coherente con el plural. Se conservaron las notas léxicas pertinentes.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:42:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura causal del hebreo, la repetición de שׁמר, la distinción entre «este mismo día» y «este día», y el sentido duradero de חֻקַּת עוֹלָם. Sin embargo, no refleja el plural de segunda persona hebrea y usa «tus ejércitos», que en español suena demasiado literal-militar y menos natural para Israel como pueblo organizado saliendo de Egipto. También conviene ajustar la formulación a un español más natural y litúrgicamente claro.
  spanish_quality_summary: El texto es legible, pero «Y guardarás… saqué tus ejércitos» mezcla singular con referentes colectivos y produce una voz menos natural que el plural exigido por el hebreo. «Fiesta de los Panes sin Levadura» es comprensible, aunque en español bíblico más natural es «la fiesta de los Panes sin Levadura» con minúscula inicial dentro de la oración. «Por todas tus generaciones» funciona, pero «a lo largo de sus generaciones» o «por sus generaciones» armoniza mejor con el plural verbal.
  glossary_alignment: No hay conflicto con los términos doctrinales del proyecto. La decisión sobre הַמַּצּוֹת como observancia festiva es defendible, siempre que la nota preserve la alternativa literal. Para צִבְאוֹתֵיכֶם, «huestes» o «compañías» se alinea mejor con la nota y con la racionalidad léxica que «ejércitos».
  issues:
  - severity: high
    issue: Cambio indebido de número gramatical
    rationale: El hebreo usa segunda persona plural en ambos verbos (וּשְׁמַרְתֶּם ... וּשְׁמַרְתֶּם) y en los sufijos («sus/vuestras generaciones», «vuestros ejércitos/huestes»). El borrador español usa singular («guardarás», «tus», «saqué tus»), lo que no preserva fielmente la forma ni el destinatario colectivo del mandato.
  - severity: medium
    issue: «tus ejércitos» suena demasiado estrecho y poco natural
    rationale: צִבְאוֹתֵיכֶם aquí comunica a Israel como cuerpo ordenado/organizado. «Ejércitos» en español moderno sugiere fuerzas militares formales separadas y puede sonar extraño aplicado al éxodo. «Huestes» conserva mejor la imagen bíblica sin forzar una lectura anacrónica.
  - severity: low
    issue: Capitalización de «Fiesta» dentro de la oración
    rationale: En español general y bíblico, dentro de una oración es más natural «la fiesta de los Panes sin Levadura» que capitalizar «Fiesta» como nombre rígido. Esto mejora legibilidad sin perder referencia técnica.
  - severity: low
    issue: La nota c está anclada al lugar menos natural
    rationale: La alternativa documentada corresponde a חֻקַּת עוֹלָם; en español conviene anclar la nota al sintagma traducido «estatuto perpetuo», no a otra parte del versículo.
  revised_spanish_text: Y guardarán la fiesta de los Panes sin Levadura[a], porque en este mismo día saqué a sus huestes[b] de la tierra de Egipto. Y guardarán este día a lo largo de sus generaciones, como estatuto perpetuo[c].
  revised_footnotes:
  - marker: a
    text: 'También: «los panes sin levadura». El hebreo literalmente dice «las cosas/panes sin levadura», que puede referirse al alimento o, por extensión, a la celebración.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «sus compañías» o «sus divisiones». El hebreo צִבְאוֹתֵיכֶם presenta a Israel como un cuerpo ordenado que sale de Egipto.'
    reason: lexical_alternative
  - marker: c
    text: 'También: «como estatuto permanente» o «como estatuto para siempre».'
    reason: lexical_alternative
  revision_rationale: Se corrigió la segunda persona singular a plural para reflejar fielmente el hebreo. Se reemplazó «ejércitos» por «huestes» para conservar la imagen de un pueblo ordenado sin sonar excesivamente militarizado en español moderno. Se suavizó la capitalización de «fiesta» y se ajustó «por todas tus generaciones» a «a lo largo de sus generaciones» para una sintaxis más natural y coherente con el plural. Se conservaron las notas léxicas pertinentes.
