translation:
  language: es
  text: Mi dolor es incurable[a][b]; mi corazón está enfermo en mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo difícil. O bien: "Yo me consolaría en el dolor; mi corazón está enfermo en mí".'
    reason: alternative_reading
  - marker: b
    text: La primera palabra probablemente alude a consuelo, alivio o brillo, pero su matiz exacto es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַבְלִיגִיתִי
  english_pob_choice: My sorrow is beyond healing
  chosen_spanish: Mi dolor es incurable
  alternatives_spanish:
  - Mi consuelo está perdido
  - Yo me consolaría en el dolor
  - Mi alivio está perdido
  lexicon: HALOT
  rationale: El hebreo es difícil y admite un matiz de consuelo, alivio o sanidad. El contexto de lamentación favorece una idea de aflicción imposible de curar; por eso 'incurable' conserva la fuerza del texto revisado en inglés sin forzar una interpretación demasiado precisa del término.
- source_word: עֲלֵי יָגוֹן
  english_pob_choice: in sorrow
  chosen_spanish: dolor
  alternatives_spanish:
  - en el dolor
  - en la tristeza
  - a causa del dolor
  lexicon: HALOT
  rationale: La construcción compacta del hebreo expresa el ámbito o la ocasión del lamento. En español, 'dolor' funciona como sustantivo nuclear de la queja y evita una repetición poco natural de preposiciones.
- source_word: לִבִּי
  english_pob_choice: my heart
  chosen_spanish: mi corazón
  alternatives_spanish:
  - mi interior
  - mi ser
  lexicon: HALOT
  rationale: '''Corazón'' comunica en español el centro interior de la persona, incluyendo emociones y voluntad, de manera fiel y natural.'
- source_word: דַוָּי
  english_pob_choice: is sick
  chosen_spanish: está enfermo
  alternatives_spanish:
  - está doliente
  - está afligido
  - está débil
  lexicon: HALOT
  rationale: El adjetivo expresa enfermedad o aflicción corporal aplicada aquí al interior de la persona. 'Está enfermo' preserva el valor directo y mantiene la imagen de una condición interna de padecimiento.
- source_word: עָלַי
  english_pob_choice: within me
  chosen_spanish: dentro de mí
  alternatives_spanish:
  - en mí
  - sobre mí
  - dentro de mi ser
  lexicon: HALOT
  rationale: Aunque literalmente puede ser 'sobre mí', con 'mi corazón' el sentido idiomático es interior. 'Dentro de mí' expresa bien la localización experiencial sin perder la metáfora.
theological_decisions:
- issue: El primer hemistiquio es filológicamente incierto y admite varias lecturas.
  english_pob_reading: Hebrew difficult. Or, 'I would comfort myself in sorrow; my heart is sick within me.'
  chosen_spanish_reading: 'Hebreo difícil. O: ''Yo me consolaría en el dolor; mi corazón está enfermo dentro de mí.'''
  alternative_spanish_readings:
  - Mi consuelo está perdido; mi corazón está enfermo dentro de mí.
  - Mi dolor es incurable; mi corazón está enfermo dentro de mí.
  rationale: 'No hay una solución única segura para מַבְלִיגִיתִי. La nota conserva la tensión documentada por el POB inglés: una lectura entiende aflicción incurable, otra permite un matiz de consuelo o autoalivio en el dolor. Mantener ambas evita ocultar la ambigüedad del hebreo.'
  doctrine_reference: No doctrinal issue; textual/lexical ambiguity
translation_notes:
  revision_awareness: La versión inglesa revisó el primer miembro desde una formulación más interpretativa ('My joy in sorrow is gone') a 'My sorrow is beyond healing' para acercarse mejor al hebreo. La presente propuesta sigue esa revisión y conserva, en nota, la alternativa tradicional de sentido verbal documentada por el POB.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o sustituciones teológicas no pertinentes; el versículo no contiene el Tetragrámaton.
  - '''Corazón'' se usa como sede interior, no como órgano físico.'
  - Se mantiene un registro poético sobrio y bíblico, evitando paráfrasis expansivas.
