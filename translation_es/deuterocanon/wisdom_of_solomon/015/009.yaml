translation:
  language: es
  text: Pero su preocupación no es que va a cansarse, ni que su vida sea breve; más bien, compite[a] con orfebres y plateros, imita a los broncistas, y considera una gloria moldear cosas falsas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rivaliza con» orfebres y plateros.
    reason: lexical_alternative
  - marker: b
    text: «Cosas falsas» también puede traducirse como «falsificaciones» o «imitaciones burdas».
    reason: lexical_alternative
lexical_decisions:
- source_word: φροντίς
  english_pob_choice: concern
  chosen_spanish: preocupación
  alternatives_spanish:
  - cuidado
  - inquietud
  - interés
  lexicon: BDAG
  rationale: '«Preocupación» comunica bien aquello que ocupa su mente, sin convertir el término en una emoción más fuerte de lo que exige el griego. Mantiene el contraste con lo que sí le importa: su oficio y su orgullo.'
- source_word: μέλλει κάμνειν
  english_pob_choice: is about to grow weary
  chosen_spanish: va a cansarse
  alternatives_spanish:
  - está a punto de fatigarse
  - va a agotarse
  - está por desfallecer
  lexicon: LSJ
  rationale: La combinación expresa cercanía temporal respecto del cansancio. «Va a cansarse» es natural en español y conserva la idea de fatiga inminente sin sobrecargar el sentido.
- source_word: βραχυτελῆ βίον
  english_pob_choice: life is short
  chosen_spanish: su vida sea breve
  alternatives_spanish:
  - su vida es corta
  - su vida dure poco
  - su existencia sea breve
  lexicon: LSJ
  rationale: El adjetivo compuesto apunta a una vida de corta duración. La formulación conserva el sentido idiomático y la referencia a la mortalidad del artesano.
- source_word: ἀντερείδεται
  english_pob_choice: competes with
  chosen_spanish: compite con
  alternatives_spanish:
  - rivaliza con
  - se enfrenta a
  - se compara con
  lexicon: LSJ
  rationale: En este contexto la idea es de emulación competitiva frente a otros artesanos. «Compite con» reproduce bien esa fuerza sin perder claridad.
- source_word: χρυσουργοῖς
  english_pob_choice: goldsmiths
  chosen_spanish: orfebres
  alternatives_spanish:
  - artífices de oro
  - trabajadores del oro
  lexicon: LSJ
  rationale: «Orfebres» abarca de manera natural a los artesanos del oro en español moderno, con dignidad estilística y precisión ocupacional.
- source_word: ἀργυροχόοις
  english_pob_choice: silversmiths
  chosen_spanish: plateros
  alternatives_spanish:
  - artífices de plata
  - trabajadores de la plata
  lexicon: LSJ
  rationale: «Plateros» es el equivalente ocupacional natural para quienes trabajan la plata, y conserva la paralela enumeración de oficios.
- source_word: χαλκοπλάστας
  english_pob_choice: bronze-workers
  chosen_spanish: los broncistas
  alternatives_spanish:
  - trabajadores del bronce
  - artífices del bronce
  - coppersmiths
  lexicon: LSJ
  rationale: El término se refiere a quienes modelan bronce. «Broncistas» es una opción breve y técnica en español; el artículo definido ayuda a reflejar el grupo de artesanos mencionado en paralelo.
- source_word: μιμεῖται
  english_pob_choice: imitates
  chosen_spanish: imita
  alternatives_spanish:
  - copia
  - emula
  lexicon: BDAG
  rationale: El verbo expresa imitación directa. «Imita» es la correspondencia más simple y fiel en español.
- source_word: δόξαν ἡγεῖται
  english_pob_choice: considers it a glory
  chosen_spanish: considera un motivo de gloria
  alternatives_spanish:
  - lo tiene por gloria
  - lo considera un honor
  - lo juzga una gloria
  lexicon: BDAG
  rationale: La expresión mantiene el tono evaluativo y algo irónico del griego. «Motivo de gloria» suena natural en español y conserva la idea de que él toma orgullo en ello.
- source_word: κίβδηλα
  english_pob_choice: counterfeit things
  chosen_spanish: cosas falsas
  alternatives_spanish:
  - cosas apócrifas
  - imitaciones falsas
  - objetos falsificados
  lexicon: LSJ
  rationale: El término puede referirse a lo falso o adulterado. «Cosas falsas» evita especificar más de lo que el contexto exige, sin perder la carga moral del texto.
- source_word: πλάσσει
  english_pob_choice: molds
  chosen_spanish: moldear
  alternatives_spanish:
  - da forma a
  - fabrica
  - modela
  lexicon: BDAG
  rationale: El verbo describe la acción artesanal de dar forma. «Moldear» mantiene el campo semántico de la fabricación de ídolos o figuras hechas por el artesano.
theological_decisions:
- issue: Tono moral e irónico de la descripción del artesano
  english_pob_reading: 'The verse is rendered to emphasize ironic condemnation: the craftsman ignores his mortality and boasts in producing fraudulent objects.'
  chosen_spanish_reading: 'La traducción conserva la ironía crítica: el artesano pasa por alto su propia fragilidad y se gloría en producir cosas falsas.'
  alternative_spanish_readings:
  - Una lectura más neutral podría destacar solo la habilidad técnica del artesano.
  - También podría suavizarse el tono moral diciendo que simplemente imita otros oficios.
  rationale: El contexto inmediato de Sabiduría 15 es una crítica a la fabricación de ídolos. Por eso conviene conservar la tensión moral y no neutralizarla en una mera observación técnica. No se añade nada que el griego no sugiera, pero sí se preserva su ironía.
  doctrine_reference: Mantener la crítica sapiencial al autoengaño idolátrico sin resolver la tensión del texto.
translation_notes:
  revision_awareness: Se siguió el contexto auditado en inglés y la línea lexical del griego Swete 1909. La versión española conserva el paralelismo de oficios, la oposición entre la fragilidad humana y el orgullo artesanal, y el matiz moral de κίβδηλα sin forzar un equivalente más técnico de lo que el español requiere. No se incorporaron revisiones previas porque el expediente indica que no hubo cambios en la última pasada.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda; este versículo no contiene el tetragrámaton ni un equivalente directo.
  - Se mantuvo «cosas falsas» para κίβδηλα por coherencia con el valor de falsedad/adulteración del campo semántico, sin introducir terminología eclesiástica ajena.
  - Se eligieron oficios naturales en español («orfebres», «plateros», «broncistas») para conservar claridad y paralelismo.
  - Se preservó el tono sapiencial crítico del texto, evitando suavizar la ironía contra la manufactura de objetos falsos.
