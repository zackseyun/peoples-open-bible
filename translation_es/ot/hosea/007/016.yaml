translation:
  language: es
  text: Se vuelven[a], pero no hacia lo alto; son como un arco engañoso. Sus príncipes caerán a espada por la insolencia de su lengua. Esto será su burla en la tierra de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero no al Altísimo». Esta lectura entiende «hacia lo alto» como una referencia elíptica a Dios, influida por la redacción del versículo anterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: יָשׁוּבוּ
  english_pob_choice: They turn
  chosen_spanish: se vuelven
  alternatives_spanish:
  - vuelven
  - regresan
  - se apartan
  lexicon: HALOT
  rationale: שׁוּב puede expresar volver, regresar o dar la vuelta. Aquí el sentido es moral y de orientación, no solo espacial; «se vuelven» conserva esa idea de giro/reversión de manera natural en español.
- source_word: לֹא עָל
  english_pob_choice: but not upward
  chosen_spanish: pero no hacia lo alto
  alternatives_spanish:
  - pero no al Altísimo
  - pero no hacia arriba
  - pero no en lo alto
  lexicon: HALOT
  rationale: El hebreo es difícil y literalmente dice «no arriba / no hacia arriba». Mantener «hacia lo alto» preserva la ambigüedad direccional sin introducir explícitamente «Altísimo» en el texto principal.
- source_word: הָיוּ
  english_pob_choice: they are
  chosen_spanish: son
  alternatives_spanish:
  - están
  - han llegado a ser
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfecta, funciona aquí en una comparación descriptiva. En español, el presente copulativo «son» reproduce mejor el valor resultativo del símil.
- source_word: כְּקֶשֶׁת רְמִיָּה
  english_pob_choice: like a deceitful bow
  chosen_spanish: como un arco engañoso
  alternatives_spanish:
  - como un arco fraudulento
  - como un arco traicionero
  - como un arco flojo
  lexicon: HALOT
  rationale: רְמִיָּה puede significar engaño, traición o falta de confiabilidad. «Engañoso» mantiene la fuerza del campo semántico y la imagen profética de un arco que no se puede confiar para disparar recto.
- source_word: יִפְּל֥וּ בַחֶרֶב
  english_pob_choice: will fall by the sword
  chosen_spanish: caerán a espada
  alternatives_spanish:
  - caerán por la espada
  - serán derribados por la espada
  - morirán a espada
  lexicon: HALOT
  rationale: La expresión es un modismo de muerte en juicio o guerra. «Caerán a espada» es un equivalente bíblico natural en español y conserva la brevedad del hebreo.
- source_word: שָׂרֵיהֶם
  english_pob_choice: their princes
  chosen_spanish: sus príncipes
  alternatives_spanish:
  - sus gobernantes
  - sus oficiales
  - sus jefes
  lexicon: HALOT
  rationale: שַׂר designa gobernantes, príncipes o funcionarios. «Príncipes» preserva el matiz elevado y político que suele aparecer en oráculos proféticos de juicio.
- source_word: מִזַּעַם לְשׁוֹנָם
  english_pob_choice: because of the insolence of their tongue
  chosen_spanish: por la insolencia de su lengua
  alternatives_spanish:
  - por el furor de su lengua
  - por la arrogancia de su lengua
  - por la violencia de su lengua
  lexicon: HALOT
  rationale: En este contexto, זַעַם no apunta principalmente a ira interior, sino a habla ofensiva, arrogante y provocadora. «Insolencia» refleja bien esa fuerza en español y sigue la revisión inglesa más reciente.
- source_word: זֹו
  english_pob_choice: This
  chosen_spanish: Esto
  alternatives_spanish:
  - Eso
  - Tal cosa
  lexicon: HALOT
  rationale: El demostrativo resume la consecuencia inmediata. «Esto» es la opción más natural y mantiene el efecto de conclusión del hebreo.
- source_word: לַעְגָּם
  english_pob_choice: their mockery
  chosen_spanish: su burla
  alternatives_spanish:
  - su escarnio
  - su objeto de burla
  - su desprecio
  lexicon: HALOT
  rationale: לַעַג significa burla, escarnio o mofa. «Su burla» es claro en español y permite la ambigüedad de si ellos serán objeto de burla o si esto será su propia burla.
- source_word: בְּאֶרֶץ מִצְרָיִם
  english_pob_choice: in the land of Egypt
  chosen_spanish: en la tierra de Egipto
  alternatives_spanish:
  - en Egipto
  lexicon: HALOT
  rationale: Se conserva la expresión más plena del hebreo por su resonancia profética y geográfica. «Tierra de Egipto» es más formal y mantiene el tono del texto fuente.
theological_decisions:
- issue: Interpretación de לֹא עָל
  english_pob_reading: Render literally as 'but not upward' in the main text
  chosen_spanish_reading: Traducir literalmente «pero no hacia lo alto» en el texto principal
  alternative_spanish_readings:
  - pero no al Altísimo
  - pero no hacia arriba
  rationale: El hebreo inmediato no dice explícitamente «Altísimo»; esa lectura depende del contexto del versículo anterior. Para no resolver la ambigüedad más allá de lo que permite el texto, el cuerpo principal conserva la dirección literal y deja la alternativa interpretativa implícita.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que ajustó זַעַם de «rage» a «insolence» para reflejar mejor el tono ofensivo de la lengua en este contexto. También se mantuvo la decisión revisada de conservar la ambigüedad de לֹא עָל en el texto principal, con alternativa interpretativa en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo cuando el hebreo exige el nombre divino explícito; este versículo no lo contiene.
  - «Mesías»/«Cristo» no aplica en este pasaje.
  - Se conservó el registro profético formal con términos como «príncipes», «burla» y «tierra de Egipto».
  - La nota [a] aparece anclada en «hacia lo alto» para señalar la alternativa interpretativa sin alterar el texto principal.
