    rationale: πρὸς τὴν ἑωθινὴν φυλακήν se refiere al período de la vigilia/guardia matutina. En español bíblico legible, «hacia la vigilia de la mañana» comunica mejor el concepto temporal que «guardia de la mañana».
  - severity: medium
    issue: «envió a Holofernes» suena incompleto en español
    rationale: Aunque el inglés puede decir «sent to Holofernes», en español lo natural es explicitar «mandó un mensaje» o «envió un recado». Esto refleja mejor ἀπέστειλεν πρὸς Ὁλοφέρνην sin perder la concisión del original.
