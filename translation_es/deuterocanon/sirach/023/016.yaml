translation:
  language: es
  text: Dos clases multiplican los pecados[a], y la tercera traerá ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tercera clase traerá ira». El griego deja implícito el sustantivo después de «la tercera».
    reason: lexical_alternative
lexical_decisions:
- source_word: Δύο
  english_pob_choice: Two
  chosen_spanish: Dos
  alternatives_spanish:
  - Hay dos
  lexicon: LSJ
  rationale: Número cardinal directo; en español basta con el numeral inicial sin añadir una cópula innecesaria.
- source_word: εἴδη
  english_pob_choice: kinds
  chosen_spanish: clases
  alternatives_spanish:
  - tipos
  - formas
  - especies
  lexicon: LSJ
  rationale: εἶδος aquí señala categorías o tipos; «clases» conserva la idea enumerativa con naturalidad en español contemporáneo.
- source_word: πληθύνουσιν
  english_pob_choice: multiply
  chosen_spanish: multiplican
  alternatives_spanish:
  - aumentan
  - hacen crecer
  lexicon: LSJ
  rationale: El verbo expresa aumento/multiplicación; el presente plural en español reproduce bien la fuerza gnómica del dicho sapiencial.
- source_word: ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - pecados
  - el pecado
  lexicon: LSJ
  rationale: El plural griego es explícito y conviene preservarlo; en español se añade artículo para una frase natural y readable.
- source_word: τὸ τρίτον
  english_pob_choice: the third
  chosen_spanish: la tercera
  alternatives_spanish:
  - el tercero
  - la tercera clase
  - el tercer tipo
  lexicon: LSJ
  rationale: El neutro con artículo apunta a un tercer elemento en la serie. Como «clases» es femenino, se adapta concordantemente a «la tercera» sin resolver en exceso la elipsis.
- source_word: ἐπάξει
  english_pob_choice: will bring
  chosen_spanish: traerá
  alternatives_spanish:
  - acarreará
  - producirá
  - traerá consigo
  lexicon: LSJ
  rationale: Futuro de ἐπάγω en el sentido de traer sobre sí o causar; «traerá» es idiomático y suficiente en español.
- source_word: ὀργήν
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - ira divina
  - castigo
  lexicon: LSJ
  rationale: «Ira» preserva la gravedad del término sin importar un sujeto explícito. Se evita añadir «de Dios», conforme al griego, que deja el referente implícito.
theological_decisions:
- issue: Referente de la ira
  english_pob_reading: wrath is left unspecified in the main text
  chosen_spanish_reading: la ira queda sin sujeto explícito
  alternative_spanish_readings:
  - la ira de Dios
  - el castigo
  - la ira divina
  rationale: El griego solo dice ὀργήν, sin nombrar a Dios. Mantener «ira» sin especificación conserva la tensión textual y evita introducir una precisión doctrinal no explicitada en la frase.
  doctrine_reference: Preservar la tensión textual; no importar una especificación teológica ausente del original.
translation_notes:
  revision_awareness: 'Se siguió de cerca el griego de Sirach 23:16 y el auditorial inglés: se mantuvo la enumeración breve, el plural de «pecados» y la elipsis de «la tercera» sin añadir un sujeto para «ira». No se realizaron revisiones posteriores en el paquete recibido.'
  spanish_consistency_notes:
  - Se prefirió «ira» para ὀργήν, coherente con el registro bíblico y con la decisión inglesa de no explicitar el sujeto.
  - Se usó «clases» como equivalente natural de εἴδη, manteniendo el tono sapiencial y la enumeración.
  - Se evitó «pecado» en singular porque el griego está en plural explícito.
