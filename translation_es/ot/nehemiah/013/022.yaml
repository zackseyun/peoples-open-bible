  language: en
  yaml_path: translation/ot/nehemiah/013/022.yaml
  text: And I told the Levites that they should purify themselves and come to guard the gates[a], to keep the Sabbath day holy. Remember this also in my favor, my God[b], and spare me according to the greatness of your steadfast love.
  footnotes:
  - marker: a
    text: Or, 'Remember me for this also, my God.' The Hebrew idiom can attach the benefactive sense either to Nehemiah himself or to the deed just mentioned.
    reason: lexical_alternative
  - marker: b
    text: '''Steadfast love'' translates Hebrew hesed, often referring to God''s loyal covenant love and mercy.'
    reason: lexical_alternative
