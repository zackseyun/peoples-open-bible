base_translation:
  language: en
  yaml_path: translation/ot/judges/003/010.yaml
  text: The Spirit of Yahweh came upon him[a], and he judged Israel. He went out to battle, and Yahweh gave Cushan-rishathaim king of Aram into his hand[b], and his hand prevailed over Cushan-rishathaim.
  footnotes:
