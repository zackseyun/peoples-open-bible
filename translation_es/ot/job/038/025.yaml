translation:
  language: es
  text: ¿Quién ha abierto un cauce para el torrente[a], o un camino para el rayo de los truenos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Quién ha abierto un cauce para el aguacero, o un camino para el relámpago de los truenos?». Lit.: «para el torrente ... para el חֲזִיז de voces/sonidos».'
    reason: Preserva las alternativas léxicas documentadas y la formulación más literal del hebreo, evitando una interpretación demasiado estrecha en el texto principal.
lexical_decisions:
- source_word: פִלַּג
  english_pob_choice: has cut
  chosen_spanish: ha trazado
  alternatives_spanish:
  - ha cortado
  - ha dividido
  - ha abierto
  lexicon: HALOT
  rationale: El verbo hebreo expresa la acción de dividir o abrir para formar un curso. En español, «ha trazado» conserva la idea de marcar/abrir un recorrido funcional y resulta natural junto a «canal» sin perder la imagen de una vía formada para el agua.
- source_word: שֶּׁטֶף
  english_pob_choice: the flood
  chosen_spanish: el diluvio
  alternatives_spanish:
  - la crecida
  - el torrente
  - el aguacero
  lexicon: HALOT
  rationale: El término puede referirse a una descarga violenta de agua o a una inundación torrencial. Dado el paralelo con «canal», «diluvio» comunica con fuerza la masa de aguas desbordadas; se mantiene la nota de posible matiz alternativo en la nota textual.
- source_word: תְּעָלָה
  english_pob_choice: a channel
  chosen_spanish: un canal
  alternatives_spanish:
  - una acequia
  - una zanja
  - un cauce
  lexicon: HALOT
  rationale: El sustantivo designa un conducto o vía para el agua. «Canal» es la equivalencia española más clara y digna en el contexto poético, y conserva la imagen de una vía preparada para el flujo.
- source_word: דֶרֶךְ
  english_pob_choice: a path
  chosen_spanish: un camino
  alternatives_spanish:
  - una senda
  - una vía
  - un trayecto
  lexicon: HALOT
  rationale: En paralelismo poético con «canal», el término señala una ruta o curso. «Camino» es la opción más natural y transparente en español.
- source_word: חֲזִיז
  english_pob_choice: the thunderbolt
  chosen_spanish: el rayo
  alternatives_spanish:
  - el relámpago
  - el rayo de luz
  - el fulgor
  lexicon: HALOT
  rationale: Este sustantivo raro suele entenderse como rayo o relámpago. En español, «rayo» mantiene la imagen meteorológica vigorosa y funciona bien con el complemento siguiente.
- source_word: קֹלֽוֹת
  english_pob_choice: thunderbolt
  chosen_spanish: de los truenos
  alternatives_spanish:
  - de las voces
  - de los sonidos
  - del trueno
  lexicon: HALOT
  rationale: Literalmente significa «voces/sonidos», y en contextos meteorológicos se relaciona con el trueno. «De los truenos» preserva el sentido natural en español sin borrar el trasfondo más literal, que se anota en la nota textual.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado actual indica alta coincidencia con observaciones menores, por lo que se mantiene una formulación española que sigue de cerca el hebreo y el audit trail inglés sin añadir interpretaciones no atestiguadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se evita «SEÑOR» como sustituto automático y no hay términos cristológicos ni doctrinales específicos en el versículo.
  - Se mantiene el paralelismo poético entre un curso para aguas torrenciales y una ruta para el fenómeno del trueno/rayo, sin resolver en exceso la ambigüedad léxica del hebreo.
  - La nota textual conserva la alternativa «aguacero/relámpago» para reflejar el rango semántico documentado por el audit trail inglés.
