base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/013/025.yaml
  text: But the king said to Absalom[a], “No, my son, please let us not all go, lest we be a burden to you.” And he urged him, but he was not willing to go[c][b]; so he blessed him.
  footnotes:
  - marker: a
    text: Or, “and let us not be heavy upon you,” expressing concern that the royal party would impose on Absalom’s feast.
    reason: lexical_alternative
  - marker: b
    text: Or, “he urged him strongly” / “he insisted,” for the Hebrew idiom “he pressed him.”
    reason: lexical_alternative
  - marker: c
    text: Or, “he refused to go.” The Hebrew can emphasize either unwillingness or refusal.
    reason: lexical_alternative
