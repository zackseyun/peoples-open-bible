translation:
  language: es
  text: Asael persiguió a Abner[a], y no se desvió ni a la derecha ni a la izquierda de ir tras Abner.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Asael fue tras Abner y no se apartó ni a la derecha ni a la izquierda de detrás de Abner».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְדֹּף
  english_pob_choice: pursued
  chosen_spanish: persiguió
  alternatives_spanish:
  - lo siguió de cerca
  - corrió tras él
  - perseguía
  lexicon: HALOT
  rationale: רדף expresa persecución activa y sostenida. «Persiguió» conserva el valor narrativo y es natural en español bíblico moderno.
- source_word: אַחֲרֵי / מֵאַחֲרֵי
  english_pob_choice: Abner / from following Abner
  chosen_spanish: a Abner / de seguir a Abner
  alternatives_spanish:
  - tras Abner / desde detrás de Abner
  - después de Abner / de ir detrás de Abner
  lexicon: HALOT
  rationale: El hebreo repite la relación espacial de ir tras Abner. En español, con «persiguió» puede integrarse el objeto directo, pero la frase final conserva explícitamente la idea de seguirlo para no perder la imagen del texto.
- source_word: וְלֹא נָטָה
  english_pob_choice: did not turn
  chosen_spanish: no se desvió
  alternatives_spanish:
  - no giró
  - no se apartó
  - no cambió de rumbo
  lexicon: HALOT
  rationale: נטה aquí indica apartarse de una trayectoria. «No se desvió» transmite bien la idea de desviación de un curso recto sin sonar mecánico.
- source_word: עַל הַיָּמִין וְעַל הַשְּׂמֹאול
  english_pob_choice: to the right or to the left
  chosen_spanish: ni a la derecha ni a la izquierda
  alternatives_spanish:
  - ni hacia la derecha ni hacia la izquierda
  - ni a diestra ni a siniestra
  lexicon: HALOT
  rationale: La pareja idiomática hebrea expresa no apartarse del camino. «Ni a la derecha ni a la izquierda» preserva el paralelismo y es claro en español.
- source_word: מֵאַחֲרֵי אַבְנֵר
  english_pob_choice: from following Abner
  chosen_spanish: de seguir a Abner
  alternatives_spanish:
  - desde detrás de Abner
  - de ir tras Abner
  lexicon: HALOT
  rationale: 'La construcción final explica desde dónde no se desvió: desde la acción de seguir a Abner. «De seguir a Abner» mantiene la fuerza verbal del hebreo sin añadir una glosa excesiva.'
- source_word: עֲשָׂהאֵל / אַבְנֵר
  english_pob_choice: Asahel / Abner
  chosen_spanish: Asael / Abner
  alternatives_spanish:
  - Azael / Abner
  lexicon: Conventional transliteration
  rationale: Se emplea la transliteración habitual en español para nombres propios bíblicos, con adaptación fonética estándar («Asael»).
translation_notes:
  revision_awareness: El texto inglés revisado eliminó «as he went» por no estar explícito en el hebreo; la versión española sigue esa revisión y no introduce un equivalente temporal adicional.
  spanish_consistency_notes:
  - Se conserva «Abner» sin artículo, conforme al uso de nombres propios en la serie.
  - Se evita «Cristo», «SEÑOR» u այլ terminología no pertinente; el verso no contiene términos teológicos con decisión especial.
  - La frase final mantiene el paralelismo semítico con negación duplicada («ni... ni...»), más transparente que una sola negación.
  - La nota alternativa refleja la opción inglesa documentada entre «pursued/chased after» y «from following/from behind», sin duplicar marcadores.
