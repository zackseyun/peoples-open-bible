review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo y sigue de cerca la auditoría inglesa: יִבְצֹר como acción decisiva sobre רוּחַ, רוּחַ como «espíritu» con amplitud semántica, נְגִידִים como «príncipes», y נוֹרָא לְמַלְכֵי אָרֶץ como relación de temor respecto de los reyes de la tierra. No hay desvío doctrinal relevante. Sin embargo, la colocación de las notas [a][b] no preserva el mapeo del inglés: la nota sobre la lectura alternativa «él es imponente/temible para los reyes» debe anclarse al segundo hemistiquio, mientras que la nota sobre «reprime/restringe» y los sentidos de רוּחַ debe anclarse al primero.'
  spanish_quality_summary: 'El español es claro y digno, pero «corta el espíritu» suena algo brusco o ligeramente calcado en español bíblico. «Corta el espíritu de los príncipes» sigue siendo entendible y defendible; no requiere reescritura mayor. La mejora necesaria es principalmente de aparato de notas y una formulación más natural en la nota b: «es temible para» es más fiel y más fuerte que «es impresionante para».'
  glossary_alignment: No hay conflicto con la terminología del proyecto. No aparece el nombre divino en el verso. «Príncipes», «espíritu» y «temido» concuerdan con las decisiones auditadas. Las notas deben conservar la amplitud semántica de רוּחַ y la alternativa de נוֹרָא sin debilitarla a «impresionante».
  issues:
  - severity: medium
    issue: Los marcadores de notas están invertidos respecto de la auditoría inglesa y del contenido de cada nota.
    rationale: En el texto inglés, [b] acompaña la primera cláusula por la variante de lectura/entendimiento, y [a] la segunda/primera según el orden mostrado; en español, la nota sobre רוּחַ y «reprime» debe ir con la primera cláusula y la alternativa de נוֹרָא con la segunda. El contenido actual no corresponde idealmente a su anclaje.
  - severity: medium
    issue: La nota b usa «es impresionante para los reyes de la tierra», que debilita נוֹרָא.
    rationale: La auditoría inglesa explícitamente evita «awesome» casual; en español, «impresionante» suena demasiado débil o coloquial. «Es temible para» o «es de temer para» conserva mejor la fuerza reverencial.
  revised_spanish_text: Él corta el espíritu de los príncipes[a]; él es temido por los reyes de la tierra[b].
  revised_footnotes:
  - marker: a
    text: 'O: «Él reprime el espíritu de los gobernantes»; «espíritu» también puede significar «aliento», «coraje» o «ánimo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «él es temible para los reyes de la tierra».'
    reason: alternative_reading
  revision_rationale: Se conserva el texto principal, que es fiel y legible, pero se corrigen las notas para alinearlas mejor con el hebreo y la auditoría inglesa. La alternativa de la primera cláusula debe mencionar el sentido de «reprime/restringe» y la amplitud de רוּחַ; la de la segunda debe reflejar la fuerza de נוֹרָא sin rebajarla a «impresionante».
