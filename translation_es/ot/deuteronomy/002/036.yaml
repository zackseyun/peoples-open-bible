translation:
  language: es
  text: Desde Aroer[a], que está en el borde del valle del Arnón, y desde la ciudad que está en el valle, hasta Galaad, no hubo ninguna ciudad demasiado alta para nosotros; Yahvé nuestro Dios las entregó todas delante de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «demasiado fuerte para nosotros» o «inaccesible para nosotros». El hebreo dice literalmente que ninguna ciudad «fue demasiado alta para nosotros», usando la altura como metáfora de fortaleza defensiva o inaccesibilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: מֵעֲרֹעֵר
  english_pob_choice: From Aroer
  chosen_spanish: Desde Aroer
  alternatives_spanish:
  - De Aroer
  - Partiendo de Aroer
  lexicon: HALOT
  rationale: El prefijo מֵ marca el punto de partida del recorrido territorial. «Desde» conserva ese valor de límite inicial de manera natural en español.
- source_word: שְׂפַת נַחַל אַרְנֹן
  english_pob_choice: the edge of the Arnon Valley
  chosen_spanish: la ribera del valle del Arnón
  alternatives_spanish:
  - el borde del valle del Arnón
  - la orilla del torrente Arnón
  lexicon: HALOT
  rationale: שְׂפָת puede ser «ribera/borde/orilla» y נַחַל puede aludir a un cauce o valle de torrente. «Ribera del valle» conserva la imagen topográfica sin volverla demasiado técnica.
- source_word: וְהָעִיר אֲשֶׁר בַּנַּחַל
  english_pob_choice: and the city that is in the valley
  chosen_spanish: y desde la ciudad que está en el valle
  alternatives_spanish:
  - y la ciudad que está en el valle
  - e incluso la ciudad que está en el valle
  lexicon: HALOT
  rationale: La construcción paralela en hebreo añade otro punto geográfico dentro de la misma zona. Repetir «desde» ayuda a reflejar la estructura de desplazamiento del texto fuente.
- source_word: וְעַד הַגִּלְעָד
  english_pob_choice: as far as Gilead
  chosen_spanish: hasta Galaad
  alternatives_spanish:
  - hasta el Galaad
  - y hasta Galaad
  lexicon: HALOT
  rationale: עַד marca el límite final del alcance territorial. «Hasta» es la forma española más directa y clara.
- source_word: קִרְיָה
  english_pob_choice: town
  chosen_spanish: ciudad
  alternatives_spanish:
  - poblado
  - villa
  lexicon: HALOT
  rationale: En este contexto de asentamientos fortificados, «ciudad» funciona bien en español y no reduce indebidamente la entidad geográfica.
- source_word: שָׂגְבָה מִמֶּנּוּ
  english_pob_choice: too high for us
  chosen_spanish: demasiado alta para nosotros
  alternatives_spanish:
  - demasiado fuerte para nosotros
  - inaccesible para nosotros
  lexicon: HALOT
  rationale: «Alta» reproduce la metáfora espacial del hebreo. En el contexto bélico, también deja sentir la idea de fortaleza o inaccesibilidad sin borrar la imagen original.
- source_word: אֶת הַכֹּל
  english_pob_choice: all of them
  chosen_spanish: todas
  alternatives_spanish:
  - todas ellas
  - todo
  lexicon: HALOT
  rationale: El hebreo remite al conjunto de ciudades/territorios mencionados. «Todas» en femenino plural concuerda con el antecedente implícito y evita una paráfrasis excesiva.
- source_word: יְהוָה אֱלֹהֵינוּ
  english_pob_choice: Yahweh our God
  chosen_spanish: Yahvé nuestro Dios
  alternatives_spanish:
  - Yahvé, nuestro Dios
  - el Yahvé nuestro Dios
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se preserva el nombre divino explícito del texto hebreo con «Yahvé», conforme a la terminología del proyecto, y «nuestro Dios» mantiene la fórmula de pacto.
- source_word: לְפָנֵינוּ
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - ante nosotros
  - en frente de nosotros
  lexicon: HALOT
  rationale: La expresión hebrea comunica entrega o colocación en posición de dominio. «Delante de nosotros» conserva el giro idiomático con buena claridad en español.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh our God
  chosen_spanish_reading: Yahvé nuestro Dios
  alternative_spanish_readings:
  - el SEÑOR nuestro Dios
  - Jehová nuestro Dios
  rationale: El texto hebreo contiene el Tetragrámaton de forma directa. Siguiendo la convención del proyecto, se traduce con el nombre propio «Yahvé» para no ocultar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imagen de altura en שָׂגְבָה מִמֶּנּוּ
  english_pob_reading: too high for us
  chosen_spanish_reading: demasiado alta para nosotros
  alternative_spanish_readings:
  - demasiado fuerte para nosotros
  - inaccesible para nosotros
  rationale: La metáfora de altura está en el hebreo y no debe ser borrada. En español puede entenderse también como fortificación o imposibilidad de acceso, como muestra la nota.
  doctrine_reference: 'DOCTRINE.md: Lexical transparency and metaphor preservation'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del contexto inglés al mantener «Yahvé» para el nombre divino, reflejar la construcción paralela con «desde la ciudad», y conservar la referencia plural implícita en «todas». La redacción española busca preservar la metáfora de altura del hebreo sin perder claridad natural en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la convención del proyecto para יְהוָה.
  - Se prefirió «ciudad» para קִרְיָה por claridad contextual, aunque «poblado» o «villa» serían posibles en otro registro.
  - La nota al pie mantiene la tensión semántica de שָׂגְבָה entre altura, fortaleza e inaccesibilidad.
  - «Delante de nosotros» conserva el valor idiomático de לְפָנֵינוּ sin añadir interpretación militar explícita al texto principal.
