translation:
  language: es
  text: Porque no habrá oscuridad[a] para la que estaba en angustia. Como en el tiempo anterior humilló[b] la tierra de Zabulón y la tierra de Neftalí, en el tiempo posterior glorificará[c] el camino del mar, al otro lado del Jordán[d], Galilea de las naciones[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo es difícil al comienzo del versículo; 'oscuridad' también puede entenderse como 'tinieblas' o 'penumbra'.
    reason: lexical_alternative
  - marker: b
    text: El hebreo aquí expresa la idea de hacer ligera, rebajar o traer desprecio; 'humilló' resume ese contraste con el verbo opuesto del miembro siguiente.
    reason: lexical_alternative
  - marker: c
    text: O 'honrará' o 'hará gloriosa'; el hebreo literalmente dice 'hará pesado', en contraste con el verbo anterior.
    reason: lexical_alternative
  - marker: d
    text: Mateo 4:15-16 cita esta región en relación con el comienzo del ministerio público de Jesús.
    reason: cross_reference
  - marker: e
    text: O 'Galilea de los gentiles'. El hebreo literalmente dice 'Galilea de las naciones'.
    reason: lexical_alternative
lexical_decisions:
- source_word: מוּעָף
  english_pob_choice: gloom
  chosen_spanish: oscuridad
  alternatives_spanish:
  - sombras
  - tinieblas
  - penumbra
  lexicon: HALOT
  rationale: El hebreo es raro y difícil; el POB inglés eligió un campo semántico de opresión lumínica. En español, ‘oscuridad’ comunica bien esa idea sin introducir una emoción nueva. Se conserva la tensión con la nota de posible ‘gloom/darkness/dimness’ en el contexto inglés.
- source_word: מוּצָק
  english_pob_choice: anguish
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - angustia
  - presión
  lexicon: HALOT
  rationale: El término expresa presión o estrechez. ‘Angustia’ mantiene el peso emocional y situacional que el POB inglés quiso reflejar con ‘anguish’.
- source_word: הֵקַל
  english_pob_choice: brought contempt on
  chosen_spanish: humilló
  alternatives_spanish:
  - trató con desprecio
  - rebajó
  - deshonró
  lexicon: HALOT
  rationale: El hebreo contrasta con ‘glorificará’ en la segunda mitad. ‘Humilló’ preserva la idea de rebajar o volver insignificante sin forzar una frase demasiado interpretativa en español; mantiene el movimiento de desprecio/honor documentado por el POB.
- source_word: הִכְבִּיד
  english_pob_choice: will make glorious
  chosen_spanish: glorificará
  alternatives_spanish:
  - honrará
  - hará gloriosa
  - dará gloria a
  lexicon: HALOT
  rationale: La imagen literal es ‘hacer pesado/valioso’, pero el POB inglés explicó que el sentido idiomático apunta a restaurar honor. ‘Glorificará’ transmite ese reverso en español de manera natural y fiel al contraste del verso.
- source_word: דֶּרֶךְ הַיָּם
  english_pob_choice: the way of the sea
  chosen_spanish: el camino del mar
  alternatives_spanish:
  - la ruta del mar
  - el camino junto al mar
  - la vía del mar
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea de forma transparente para no borrar su referencia geográfica ni su eco intertextual.
- source_word: עֵבֶר הַיַּרְדֵּן
  english_pob_choice: beyond the Jordan
  chosen_spanish: al otro lado del Jordán
  alternatives_spanish:
  - más allá del Jordán
  - al otro lado del río Jordán
  lexicon: HALOT
  rationale: Es un giro geográfico idiomático equivalente en español. Mantiene la perspectiva implícita del hebreo sin explicitarla más de lo necesario.
- source_word: גְּלִיל הַגּוֹיִם
  english_pob_choice: Galilee of the nations
  chosen_spanish: Galilea de las naciones
  alternatives_spanish:
  - Galilea de los gentiles
  - Galilea de las gentes
  lexicon: HALOT
  rationale: Se mantiene la forma más literal del hebreo, como en el POB inglés. ‘Naciones’ preserva el plural de גּוֹיִם; ‘gentiles’ queda como alternativa teológica e intertextual conocida, pero no se impone en el texto principal.
- source_word: כִּי לֹא
  english_pob_choice: For there will be no
  chosen_spanish: Porque no habrá
  alternatives_spanish:
  - Pues no habrá
  - Ya no habrá
  lexicon: HALOT
  rationale: La abertura causal introduce el giro de esperanza. ‘Porque no habrá’ es natural en español y mantiene el valor prospectivo del original.
- source_word: לַאֲשֶׁר מוּצָק לָהּ
  english_pob_choice: for her who was in anguish
  chosen_spanish: para la que estaba en angustia
  alternatives_spanish:
  - para la que sufría angustia
  - para quien estaba angustiada
  - para la tierra que estaba en angustia
  lexicon: HALOT
  rationale: El sufijo femenino apunta a una personificación de la región o tierra. En español, ‘la que’ conserva esa personificación sin añadir un sustantivo explícito ausente del hebreo; la formulación evita el calco ‘para ella’ que suena menos idiomático.
theological_decisions:
- issue: Relación entre el estado inicial de aflicción y la inversión final de honor
  english_pob_reading: 'future exaltation: ''he will make glorious'''
  chosen_spanish_reading: 'inversión futura de humillación en gloria: ''glorificará'''
  alternative_spanish_readings:
  - 'continuará la humillación: ''rebajará'''
  - 'hará pesada la tierra: ''hará pesada'''
  rationale: El contexto del pasaje se mueve de la aflicción hacia la esperanza, y el paralelismo con el miembro anterior exige una inversión de estatus. Se conserva la tensión lexical del verbo hebreo, pero se traduce según el sentido contextual preferido por el POB y su auditoría.
  doctrine_reference: Mantener la reversión profética sin resolver en exceso la ambigüedad verbal.
translation_notes:
  revision_awareness: 'Se corrigió la anclaje de notas al texto: cada marcador aparece exactamente donde corresponde en el verso. La redacción sigue el audit trail inglés, especialmente la rareza de מוּעָף, el contraste הֵקַל / הִכְבִּיד y la conservación geográfica de los sintagmas finales.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se eligió ‘Galilea de las naciones’ para conservar la literalidad de גּוֹיִם, dejando ‘gentiles’ como nota.
  - Se evitó ‘SEÑOR’ y otras sustituciones litúrgicas no presentes en el hebreo.
  - La personificación femenina implícita en לָהּ se mantuvo con ‘la que’, para no borrar el referente colectivo del pasaje.
