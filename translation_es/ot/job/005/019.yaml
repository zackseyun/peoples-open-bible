translation:
  language: es
  text: En seis aflicciones, y aun en siete[a], él te librará; ningún mal[b] te tocará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Modismo poético hebreo: «en seis... y en siete» expresa liberación repetida o completa, no necesariamente un conteo literal estricto.'
    reason: cultural_note
  - marker: b
    text: 'O: «ningún daño te alcanzará» o «ninguna calamidad te alcanzará».'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/שֵׁ֣שׁ
  english_pob_choice: In six
  chosen_spanish: En seis
  alternatives_spanish:
  - De seis
  - A través de seis
  lexicon: HALOT
  rationale: La preposición con el numeral funciona en este dicho poético como marco circunstancial, no como sentido espacial. «En seis» conserva el paralelismo numérico de la frase hebrea y suena natural en español.
- source_word: צָ֭רוֹת
  english_pob_choice: troubles
  chosen_spanish: aflicciones
  alternatives_spanish:
  - tribulaciones
  - penas
  - adversidades
  lexicon: HALOT
  rationale: El término hebreo abarca estados de angustia, presión o aflicción. «Aflicciones» mantiene el campo semántico amplio y es una opción digna y clara en español bíblico contemporáneo.
- source_word: יַצִּילֶ֑/ךָּ
  english_pob_choice: he will deliver you
  chosen_spanish: él te librará
  alternatives_spanish:
  - él te rescatará
  - él te salvará
  lexicon: HALOT
  rationale: El verbo en hifil de נצל expresa rescate o liberación. «Librará» es una forma natural y bíblica en español que conserva la idea de librar de peligro sin forzar una interpretación más específica.
- source_word: וּ/בְ/שֶׁ֓בַע
  english_pob_choice: even in seven
  chosen_spanish: aun en siete
  alternatives_spanish:
  - y en siete
  - en siete
  lexicon: HALOT
  rationale: La fórmula numérica «seis... siete» expresa intensificación o completitud. «Aun en siete» preserva el valor culminante señalado en el audit trail inglés y evita convertir el dicho en un conteo literal.
- source_word: לֹא יִגַּ֖ע
  english_pob_choice: will not touch
  chosen_spanish: no te tocará
  alternatives_spanish:
  - no te alcanzará
  - no te herirá
  - no te alcanzará
  lexicon: HALOT
  rationale: נגע puede significar tocar, alcanzar o herir. En español, «tocará» conserva la imagen verbal directa y deja abierta la amplitud del hebreo, tal como hace el inglés POB.
- source_word: רָֽע
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - daño
  - desgracia
  lexicon: HALOT
  rationale: En este contexto sapiencial, רָע puede referirse a mal, daño o calamidad experimentada. «Mal» mantiene la amplitud del hebreo sin restringirlo solo a daño físico o a mal moral abstracto.
theological_decisions:
- issue: Sujetos implícitos y referencia divina
  english_pob_reading: The English keeps the pronoun 'he' rather than replacing it with 'God.'
  chosen_spanish_reading: él te librará
  alternative_spanish_readings:
  - Dios te librará
  rationale: El hebreo usa un verbo en tercera persona singular sin nombrar explícitamente al sujeto. Mantener «él» respeta la forma del texto fuente y evita introducir un nombre divino que no aparece en el versículo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de la fórmula numérica «seis... siete»
  english_pob_reading: Rendered as a Hebrew idiom of repeated/comprehensive deliverance, without flattening it into paraphrase.
  chosen_spanish_reading: aun en siete
  alternative_spanish_readings:
  - y en siete
  - 'literalmente: en seis... y en siete'
  rationale: La versión española conserva los números y la progresión retórica. «Aun en siete» ayuda a comunicar la culminación poética sin negar la posible lectura idiomática de plenitud o repetición.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Revisión más reciente: sin cambios necesarios; el borrador sigue la lectura de alta concordancia y mantiene sin resolver la tensión poética del modismo numérico.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto como forma normal para el nombre divino; aquí no aparece explícitamente en el hebreo, por lo que el texto conserva el sujeto implícito «él».
  - Se eligió «aflicciones» / «mal» por amplitud semántica, evitando estrechar el hebreo a una sola clase de sufrimiento.
  - La puntuación reproduce el paralelismo breve del hebreo y la coma antes de «ningún mal» marca la cláusula final sin añadir explicación interpretativa al cuerpo del texto.
