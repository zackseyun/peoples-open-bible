id: 2MA.6.12
reference: 2 Maccabees 6:12
source:
  edition: lxx-swete-1909
  text: Παρακαλῶ οὖν τοὺς ἐντυγχάνοντας τῇδε τῇ βίβλῳ μὴ συντελεσθαι διὰ τὰς συμφορὰς, λογίζεσθαι δὲ τὰς τιμωρίας μὴ πρὸς ὄλεθρον, ἀλλὰ πρὸς παιδείαν τοῦ γένους ἡμῶν εἶναι.
  language: Greek
  pages:
  - 701
  confidence: high
  validation: agree
translation:
  text: Therefore I urge those who read this book not to be disheartened because of these calamities[a], but to consider that these punishments are not for destruction[c][b], but for the discipline of our people.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'those who read this book.' The Greek expression literally speaks of those 'encountering' this book.
    reason: lexical_alternative
  - marker: b
    text: Or 'not to lose heart.'
    reason: lexical_alternative
  - marker: c
    text: '''Discipline'' can also be rendered ''instruction'' or ''correction''; the Greek includes the sense of formative chastening.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακαλῶ
  chosen: I urge
  alternatives:
  - I exhort
  - I appeal
  - I encourage
  lexicon: BDAG
  rationale: παρακαλέω here introduces an earnest appeal from the narrator to the reader. 'I urge' preserves the force without sounding overly formal or archaic.
- source_word: τοὺς ἐντυγχάνοντας τῇδε τῇ βίβλῳ
  chosen: those who encounter this book
  alternatives:
  - those who read this book
  - those who come upon this book
  lexicon: LSJ
  rationale: ἐντυγχάνω can mean to meet with, encounter, or read. In context of a βιβλίον, it refers to those engaging with the written work. 'Encounter this book' stays close to the Greek while remaining natural; 'read' is possible but slightly more interpretive.
- source_word: μὴ συντελεσθαι
  chosen: not to be disheartened
  alternatives:
  - not to lose heart
  - not to be overwhelmed
  - not to give up
  lexicon: LSJ
  rationale: The middle/passive infinitive here conveys being brought to an end inwardly, i.e., being crushed or discouraged by events. 'Be disheartened' captures the idiomatic sense in readable English.
- source_word: διὰ τὰς συμφορὰς
  chosen: because of these calamities
  alternatives:
  - because of these misfortunes
  - through these disasters
  lexicon: LSJ
  rationale: συμφοραί denotes disasters, misfortunes, or calamities. 'Calamities' fits the severe national suffering in context and matches the gravity of the passage.
- source_word: λογίζεσθαι
  chosen: to consider
  alternatives:
  - to reckon
  - to think
  - to regard
  lexicon: BDAG
  rationale: λογίζομαι here calls for reflective evaluation. 'Consider' is clear modern English and preserves the deliberative sense.
- source_word: τὰς τιμωρίας
  chosen: these punishments
  alternatives:
  - the punishments
  - the penalties
  - the chastisements
  lexicon: LSJ
  rationale: τιμωρία refers to punishment or penalty. 'Punishments' is the most straightforward rendering. 'These' is supplied in English to connect naturally with the immediately preceding calamities.
- source_word: μὴ πρὸς ὄλεθρον
  chosen: not for destruction
  alternatives:
  - not toward ruin
  - not for annihilation
  lexicon: BDAG
  rationale: ὄλεθρος denotes ruin or destruction. 'Not for destruction' preserves the telic force of πρὸς and the contrast with παιδείαν.
- source_word: ἀλλὰ πρὸς παιδείαν
  chosen: but for the discipline
  alternatives:
  - but for instruction
  - but for training
  - but for correction
  lexicon: BDAG
  rationale: παιδεία includes discipline, training, and corrective instruction. In this context of divine/national chastening, 'discipline' best preserves both corrective and formative force.
- source_word: τοῦ γένους ἡμῶν
  chosen: of our people
  alternatives:
  - of our race
  - of our nation
  - of our family line
  lexicon: LSJ
  rationale: γένος here refers to the Jewish people as a collective kin-group or nation. 'Our people' is natural English and avoids the misleading modern connotations of 'race' while preserving communal identity.
- source_word: εἶναι
  chosen: are meant
  alternatives:
  - are
  - exist as
  - serve as
  lexicon: BDAG
  rationale: The infinitive completes λογίζεσθαι with the sense that the punishments are to be regarded as having a certain purpose. 'Are meant' makes the purposive contrast explicit in idiomatic English without adding foreign theology.
