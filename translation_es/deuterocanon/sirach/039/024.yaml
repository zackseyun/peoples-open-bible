translation:
  language: es
  text: Los caminos de los irreprochables[a] quedan rectos[b]; pero para los extraños se vuelven ruinosos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «para los sin ley», es decir, aquellos ajenos al camino de Dios.'
    reason: alternative_reading
  - marker: b
    text: El verbo hebreo final es difícil; la idea de «se vuelven ruinosos» está guiada por el paralelo griego, que dice «tropiezos» o «piedras de tropiezo».
    reason: textual_variant
lexical_decisions:
- source_word: ארחות
  english_pob_choice: ways
  chosen_spanish: caminos
  alternatives_spanish:
  - sendas
  - vías
  lexicon: HALOT
  rationale: ארחות denota plural de "camino/senda" y en español "caminos" conserva bien la imagen proverbial sin sonar demasiado técnico.
- source_word: תמים
  english_pob_choice: the blameless
  chosen_spanish: los sin culpa
  alternatives_spanish:
  - los irreprochables
  - los íntegros
  - los rectos
  lexicon: HALOT
  rationale: תמים puede expresar integridad moral o irreprochabilidad. "Sin culpa" comunica la idea ética con naturalidad en español y evita cargar el verso con un matiz exclusivamente cultual.
- source_word: יישרו
  english_pob_choice: are made straight
  chosen_spanish: son rectos
  alternatives_spanish:
  - son enderezados
  - quedan rectos
  - son puestos en rectitud
  lexicon: HALOT
  rationale: La forma verbal transmite que los caminos resultan rectos/llanos para los justos. En español, "son rectos" preserva la imagen y suena más natural que una pasiva explícita.
- source_word: לזרים
  english_pob_choice: for strangers
  chosen_spanish: para los extraños
  alternatives_spanish:
  - para los forasteros
  - para los ajenos
  - para los extranjeros
  lexicon: HALOT
  rationale: זר significa literalmente "extraño" u "outsider". "Extraños" mantiene el sentido hebreo y deja abierta la posibilidad de una lectura moral o social sin imponer la glosa griega.
- source_word: יסתוללו
  english_pob_choice: they become ruinous
  chosen_spanish: se vuelven tropiezos
  alternatives_spanish:
  - se vuelven ruina
  - se tornan ruinosos
  - caen en tropiezo
  lexicon: HALOT
  rationale: El verbo es oscuro; el paralelo griego propone la idea de "stumbling blocks" (προσκόμματα). "Se vuelven tropiezos" mantiene la imagen de obstáculo y refleja la guía del griego sin borrar la dificultad del hebreo.
theological_decisions:
- issue: Hebrew "extraños" versus Greek interpretive "lawless"
  english_pob_reading: Retain the Hebrew-based 'strangers' in the main text, with a note that the Greek reads 'lawless' and 'stumbling blocks.'
  chosen_spanish_reading: Mantener "extraños" en el texto principal y anotar que el griego interpreta "los sin ley" o "los malvados" como "tropiezos".
  alternative_spanish_readings:
  - los sin ley
  - los impíos
  - los malvados
  rationale: Para este libro, la prioridad recae en el hebreo conservado. La tradición griega parece interpretar moralmente a los "extraños"; por eso se conserva la lectura hebrea en la línea principal y se registra la alternativa interpretativa en una nota.
  doctrine_reference: 'Translation philosophy: primacía del testimonio original preservado; mantener la tensión interpretativa en lugar de resolverla artificialmente.'
translation_notes:
  revision_awareness: Basado en el hebreo de Kahana (alta confianza) y contrastado con el paralelo griego de Swete. Se conservó la lectura hebrea principal ('extraños') y se incorporó el valor interpretativo del griego en la nota de a y en la opción verbal oscura del final.
  spanish_consistency_notes:
  - Se mantuvo "Yahvé" como norma del proyecto no aplicable aquí.
  - Se evitó "Cristo"/"Mesías" por no ser pertinentes al pasaje.
  - Se eligió una formulación española natural que conserve el paralelismo proverbial hebreo.
  - La nota [a] explica la alternativa griega sin desplazar la lectura hebrea principal.
  - La nota [b] preserva la incertidumbre del verbo final sin fijar una etimología no asegurada.
