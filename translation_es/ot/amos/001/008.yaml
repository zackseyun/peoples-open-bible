base_translation:
  language: en
  yaml_path: translation/ot/amos/001/008.yaml
  text: And I will cut off the inhabitant from Ashdod[a], and the one who holds the scepter from Ashkelon; I will turn my hand against Ekron[b], and the remnant of the Philistines shall perish,” says the Lord GOD.
  footnotes:
