translation:
  language: es
  text: Y los llevaré a la tierra que juré[a] dar a Abraham, a Isaac y a Jacob, y se la daré a ustedes como posesión. Yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «que levanté mi mano para dar»; es un modismo hebreo de juramento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵבֵאתִי
  english_pob_choice: And I will bring
  chosen_spanish: Y yo los llevaré
  alternatives_spanish:
  - Y yo los traeré
  - Y yo los introduciré
  lexicon: HALOT
  rationale: El verbo causativo de בוא comunica la acción de hacer entrar al pueblo en la tierra. En español, «llevar» mantiene bien la dirección hacia el destino y suena natural en contexto promesa-covenantal.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra prometida
  lexicon: HALOT
  rationale: Aquí אֶרֶץ se refiere a la tierra prometida en sentido concreto. «Tierra» conserva la amplitud bíblica del término sin volverlo técnico en exceso.
- source_word: אֲשֶׁר נָשָׂאתִי אֶת יָדִי
  english_pob_choice: that I swore
  chosen_spanish: que juré
  alternatives_spanish:
  - que levanté mi mano para dar
  - que alzando mi mano prometí
  lexicon: HALOT
  rationale: El hebreo usa un modismo de juramento literalmente formulado como «levanté mi mano». Como el auditorio español entiende con mayor claridad el valor juramentado con «juré», se adopta la equivalencia natural en el texto principal y se documenta la imagen subyacente en la nota.
- source_word: לָתֵת אֹתָהּ
  english_pob_choice: to give
  chosen_spanish: dar
  alternatives_spanish:
  - conceder
  - entregar
  lexicon: HALOT
  rationale: 'נתן es directo aquí: Dios promete dar la tierra a los patriarcas. «Dar» conserva la simplicidad y la fuerza del acto de promesa.'
- source_word: לְאַבְרָהָם לְיִצְחָק וּלְיַעֲקֹב
  english_pob_choice: to Abraham, to Isaac, and to Jacob
  chosen_spanish: a Abraham, a Isaac y a Jacob
  alternatives_spanish:
  - para Abraham, para Isaac y para Jacob
  lexicon: HALOT
  rationale: Los nombres propios se trasladan en forma estándar al español. La repetición de la preposición se conserva de modo natural con «a».
- source_word: וְנָתַתִּי אֹתָהּ לָכֶם
  english_pob_choice: and I will give it to you
  chosen_spanish: y se la daré a ustedes
  alternatives_spanish:
  - y la pondré en su posesión
  - y se las daré a ustedes
  lexicon: HALOT
  rationale: El clítico «se la» refleja bien el objeto femenino singular («la tierra») y el receptor plural. «A ustedes» explicita el destinatario sin perder el sentido original.
- source_word: מוֹרָשָׁה
  english_pob_choice: as a possession
  chosen_spanish: como posesión
  alternatives_spanish:
  - como heredad
  - como herencia
  lexicon: HALOT
  rationale: מוֹרָשָׁה designa una posesión hereditaria o patrimonio recibido. «Posesión» es una equivalencia sobria y fiel; «heredad» o «herencia» podrían sugerir más de lo que el contexto inmediato exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé». Esto preserva el nombre del pacto sin sustituirlo por una convención de máscara litúrgica.'
theological_decisions:
- issue: Oath idiom נָשָׂאתִי אֶת יָדִי
  english_pob_reading: that I swore
  chosen_spanish_reading: que juré
  alternative_spanish_readings:
  - que levanté mi mano para dar
  - que alzando mi mano prometí
  rationale: La expresión hebrea es un modismo de juramento. El texto español principal prioriza la claridad natural del acto de jurar, mientras la nota conserva la posibilidad de la imagen corporal original.
  doctrine_reference: Translation philosophy §1, §3
- issue: Divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El pasaje cierra con la autodeclaración divina del nombre del pacto. Siguiendo la política del proyecto, se usa «Yahvé» para mantener visible el Tetragrámaton y su fuerza revelacional.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La base inglesa pasó de «that I raised my hand» a la revisión final «that I swore» para expresar con más naturalidad el modismo de juramento. El español sigue la lectura final en el cuerpo principal, pero conserva la imagen literal hebrea en nota para no perder la tensión léxica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - «Posesión» reproduce de forma sobria מוֹרָשָׁה sin cargar innecesariamente hacia «herencia» si el contexto enfatiza la tenencia recibida.
  - La relación objeto-destinatario se aclara con «se la daré a ustedes» para que el referente femenino singular quede transparente en español.
