translation:
  language: es
  text: Lo di en manos de un poderoso[a] de las naciones; ciertamente lo tratará. Conforme a su maldad, lo eché fuera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gobernante de las naciones» / «el poderoso de las naciones». La expresión hebrea puede designar a un gobernante poderoso entre las naciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאֶתְּנֵהוּ
  english_pob_choice: I gave him
  chosen_spanish: Yo lo di
  alternatives_spanish:
  - Yo lo entregué
  - Yo lo puse
  lexicon: HALOT
  rationale: El hebreo expresa la acción divina de entregar/conceder a alguien en poder ajeno. «Di» es breve, natural y conserva el valor de transferencia de control que el contexto exige; «entregué» sería también posible, pero «di» mantiene mejor la concisión del enunciado oracular.
- source_word: בְּיַד
  english_pob_choice: into the hand of
  chosen_spanish: en manos de
  alternatives_spanish:
  - en la mano de
  - bajo el poder de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática para indicar dominio o control. En español, «en manos de» preserva la imagen y su sentido sin sonar artificial; «bajo el poder de» explicita más de lo que el hebreo dice.
- source_word: אֵיל גּוֹיִם
  english_pob_choice: a mighty one of the nations
  chosen_spanish: un poderoso de las naciones
  alternatives_spanish:
  - un gobernante de las naciones
  - el poderoso de las naciones
  lexicon: HALOT
  rationale: אֵיל puede designar a uno fuerte o poderoso, sin exigir que se especifique «gobernante» en el texto principal. «Un poderoso de las naciones» conserva la ambigüedad controlada del hebreo y sigue la decisión inglesa de no nombrar al referente histórico en el cuerpo del verso.
- source_word: עָשׂוֹ יַעֲשֶׂה לוֹ
  english_pob_choice: he will surely deal with him
  chosen_spanish: ciertamente actuará contra él
  alternatives_spanish:
  - sin duda hará con él
  - ciertamente lo tratará
  lexicon: HALOT
  rationale: El infinitivo absoluto con imperfecto intensifica la acción. En español, «ciertamente actuará contra él» transmite el énfasis y el sentido punitivo sin forzar una repetición artificial del verbo «hacer».
- source_word: כְּרִשְׁעוֹ
  english_pob_choice: According to his wickedness
  chosen_spanish: Conforme a su maldad
  alternatives_spanish:
  - según su maldad
  - de acuerdo con su maldad
  lexicon: HALOT
  rationale: El כ comparativo/misurativo indica correspondencia proporcional. «Conforme a» preserva bien esa relación de medida o ajuste; «maldad» es un equivalente claro y bíblicamente adecuado de רֶשַׁע en este contexto.
- source_word: גֵּרַשְׁתִּהוּ
  english_pob_choice: I drove him out
  chosen_spanish: lo eché fuera
  alternatives_spanish:
  - lo expulsé
  - lo arrojé fuera
  lexicon: HALOT
  rationale: גרש significa expulsar o echar fuera. «Lo eché fuera» es idiomático en español y reproduce la fuerza de remoción del puesto o del ámbito de favor divino; «expulsé» es viable pero algo más técnico.
theological_decisions:
- issue: Identificación del agente descrito como אֵיל גּוֹיִם
  english_pob_reading: Rendered generically as 'a mighty one of the nations' without naming the historical figure in the main text.
  chosen_spanish_reading: Se mantiene genéricamente como «un poderoso de las naciones», sin identificarlo en el texto principal.
  alternative_spanish_readings:
  - «el gobernante de las naciones»
  - una identificación explícita con el rey de Babilonia
  rationale: El hebreo presenta al instrumento del juicio en términos genéricos. Aunque el referente histórico probable sea el rey de Babilonia, el versículo no lo nombra aquí; por eso la traducción conserva la formulación abierta y evita introducir una identificación interpretativa en el cuerpo del texto.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el pasaje; la redacción inglesa más reciente permaneció sin cambios, y la presente propuesta sigue esa lectura estable sin introducir ajustes textuales.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» fuera del versículo porque el hebreo aquí usa la primera persona divina implícita, no un nombre explícito.
  - Se conserva el tono oracular y judicial del hebreo, evitando ampliar la frase con explicaciones históricas que el texto no expresa.
  - La alternancia entre «en manos de» y «eché fuera» sigue imágenes distintas del hebreo sin nivelarlas a un solo verbo abstracto.
