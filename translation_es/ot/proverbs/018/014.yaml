review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: רוּחַ como fortaleza interior, יְכַלְכֵּל como capacidad de sostener, y el contraste con un espíritu נְכֵאָה. Sin embargo, la segunda mitad cambia levemente la sintaxis y el foco de la pregunta retórica. El hebreo pregunta quién puede cargar/soportar ese espíritu quebrantado, no simplemente quién puede soportar tenerlo en abstracto. La primera mitad está bien encaminada, aunque la nota alternativa debería corresponder mejor al inglés auditado.'
  spanish_quality_summary: 'El español es claro y digno, pero conviene una leve mejora de naturalidad y precisión: en la segunda cola suena mejor y más fiel ''¿quién lo podrá soportar?'' tras mencionar ''un espíritu abatido''. Además, la nota [a] debería ofrecer ''enfermedad/illness'' en vez de ''dolencia'' como alternativa principal, ya que la alternativa auditada es ''illness'', no un cambio semántico distinto. El registro general es adecuado para un texto bíblico legible en español neutro.'
  glossary_alignment: 'Se alinea bien con la terminología del proyecto: רוּחַ -> ''espíritu'' está bien justificado; no hay términos divinos ni mesiánicos en juego. ''De un hombre'' preserva el singular masculino proverbial conforme al rastro auditado. ''Abatido'' es aceptable para נְכֵאָה, con nota de alternativa ''quebrantado'' preservando el matiz documentado de ''broken''.'
  issues:
  - severity: medium
    issue: La segunda mitad omite el pronombre objeto explícito implícito en יִשָּׂאֶנָּה
    rationale: El hebreo pregunta literalmente '¿quién la llevará/soportará?', refiriéndose al espíritu quebrantado. '¿quién podrá soportar un espíritu abatido?' es comprensible, pero '¿quién lo podrá soportar?' tras introducir el espíritu refleja mejor la estructura y la carga retórica del original.
  - severity: low
    issue: La nota [a] no refleja con precisión la alternativa auditada en inglés
    rationale: La nota inglesa ofrece 'A person's spirit can sustain him in illness'. La nota española actual da 'en su dolencia', lo cual no corresponde exactamente a la alternativa principal conservada por la auditoría. Conviene ajustar la nota para reflejar 'de una persona' y 'enfermedad'/'enfermedad' como alternativa más directa.
  - severity: low
    issue: La documentación léxica interna contiene una frase no idiomática
    rationale: Aunque no afecta el texto bíblico visible, 'lo en su enfermedad' en la decisión léxica de מַחֲלֵהוּ no es español natural. Esto confirma la necesidad de mantener una formulación más idiomática en el texto final.
