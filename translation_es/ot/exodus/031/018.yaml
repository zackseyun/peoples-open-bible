translation:
  language: es
  text: Y cuando terminó de hablar con él en el monte Sinaí, le entregó a Moisés las dos tablas del testimonio, tablas de piedra, escritas con el dedo de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: he gave
  chosen_spanish: le entregó
  alternatives_spanish:
  - le dio
  lexicon: HALOT
  rationale: El verbo נתן expresa una entrega/dación narrativa simple. En español, «le entregó» comunica con naturalidad la transferencia del objeto a Moisés sin perder el valor básico de dar.
- source_word: כְּכַלֹּתוֹ לְדַבֵּר
  english_pob_choice: when he finished speaking
  chosen_spanish: cuando terminó de hablar
  alternatives_spanish:
  - después de terminar de hablar
  - al terminar de hablar
  lexicon: HALOT
  rationale: La construcción temporal con כ + infinitivo de כלה marca culminación previa a la acción siguiente. «Cuando terminó de hablar» preserva la relación temporal y suena idiomático en español.
- source_word: אִתּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - con Moisés
  lexicon: HALOT
  rationale: El referente implícito es Moisés en el contexto inmediato; «con él» mantiene esa referencia sin redundancia.
- source_word: בְּהַר סִינַי
  english_pob_choice: on Mount Sinai
  chosen_spanish: en el monte Sinaí
  alternatives_spanish:
  - sobre el monte Sinaí
  - en el monte del Sinaí
  lexicon: HALOT
  rationale: En español, la localización en una montaña se expresa naturalmente con «en el monte». «Sinaí» se conserva como nombre propio.
- source_word: שְׁנֵי לֻחֹת הָעֵדֻת
  english_pob_choice: the two tablets of the testimony
  chosen_spanish: las dos tablas del testimonio
  alternatives_spanish:
  - las dos tablas del pacto
  - las dos tablas del testimonio
  lexicon: HALOT
  rationale: לֻחֹת son tablas/tabletas de piedra; en español «tablas» es claro y bíblicamente adecuado. «Testimonio» conserva el término pactal sin sustituirlo por una paráfrasis más amplia.
- source_word: לֻחֹת אֶבֶן
  english_pob_choice: tablets of stone
  chosen_spanish: tablas de piedra
  alternatives_spanish:
  - tablas de piedra tallada
  - tablas de piedra
  lexicon: HALOT
  rationale: La construcción appositiva especifica material. «Tablas de piedra» reproduce con sobriedad el sustantivo + material, y evita una redundancia pesada.
- source_word: כְּתֻבִים
  english_pob_choice: written
  chosen_spanish: escritas
  alternatives_spanish:
  - inscritas
  - grabadas
  lexicon: HALOT
  rationale: El participio pasivo de כתב se refleja con «escritas». En español concuerda con «tablas» y conserva la idea de texto trazado en la superficie.
- source_word: בְּאֶצְבַּע אֱלֹהִים
  english_pob_choice: with the finger of God
  chosen_spanish: con el dedo de Dios
  alternatives_spanish:
  - por el dedo de Dios
  lexicon: HALOT
  rationale: La expresión concreta e imagética debe mantenerse. «Con el dedo de Dios» conserva el antropomorfismo y la agencia directa divina, como en el audit trail inglés.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al Dios de Israel en sentido singular. «Dios» es la forma natural y fiel en español.
theological_decisions:
- issue: Antropomorfismo en la expresión de la autoría divina
  english_pob_reading: with the finger of God
  chosen_spanish_reading: con el dedo de Dios
  alternative_spanish_readings:
  - por el dedo de Dios
  - por Dios mismo
  rationale: La frase hebrea presenta una imagen concreta de acción divina. Se preserva sin suavizarla para no borrar la fuerza retórica y teológica de la inscripción directa por Dios.
  doctrine_reference: Translation philosophy §3
- issue: Sentido pactal de הָעֵדֻת
  english_pob_reading: the testimony
  chosen_spanish_reading: el testimonio
  alternative_spanish_readings:
  - el pacto
  - el documento del pacto
  - el testimonio del pacto
  rationale: «Testimonio» mantiene el término tradicional del pasaje y deja intacta la tensión entre testimonio, memorial y documento pactal, sin imponer una paráfrasis interpretativa.
  doctrine_reference: Pentateuchal covenant context
translation_notes:
  revision_awareness: La redacción sigue el sentido y el orden sintáctico del hebreo, alineándose con la decisión inglesa de mantener la imagen antropomórfica y el valor pactal de 'testimony'. No se introdujeron cambios de revisión que alteren la lectura base.
  spanish_consistency_notes:
  - Se usa «Dios» en singular para אֱלֹהִים en sentido referencial.
  - Se conserva «testimonio» como término técnico del contexto del éxodo.
  - Se mantiene «dedo de Dios» para preservar la imagen concreta de agencia divina.
  - «Tablas» se usa como equivalente bíblico natural de לֻחֹת en español.
