translation:
  language: es
  text: Y las escribirás sobre los postes de la puerta[a] de tu casa y en tus portones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'jambas'. El término hebreo se refiere a los postes laterales de la entrada.
    reason: lexical_alternative
  - marker: b
    text: O 'a tus portones'. El hebreo puede referirse tanto a los portones mismos como al área de la entrada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּכְתַבְתָּם
  english_pob_choice: And you shall write them
  chosen_spanish: Y las escribirás
  alternatives_spanish:
  - Y escribirás eso
  - Y las has de escribir
  lexicon: HALOT
  rationale: El perfecto con waw en este contexto legal/instructivo tiene fuerza imperatival futura; en español suena natural con futuro de mandato. El sufijo de 3.ª plural se conserva con el pronombre átono 'las', que remite a las palabras/mandamientos previos.
- source_word: עַל
  english_pob_choice: 'on'
  chosen_spanish: sobre
  alternatives_spanish:
  - en
  - encima de
  lexicon: HALOT
  rationale: '''Sobre'' expresa mejor la colocación física en una superficie y funciona con ambos complementos del verso sin forzar el español.'
- source_word: מְזוּזוֹת
  english_pob_choice: doorposts
  chosen_spanish: postes
  alternatives_spanish:
  - jambas
  - marcos de puerta
  - postes de la puerta
  lexicon: HALOT
  rationale: El hebreo común designa los postes laterales de la entrada. 'Postes' comunica la idea de soporte lateral en español claro; 'jambas' sería más técnico, pero menos transparente para lectura general. Mantiene la distinción con la tradición de transliterar 'mezuzá', que aquí no corresponde al sustantivo común del texto.
- source_word: בֵּיתֶךָ
  english_pob_choice: of your house
  chosen_spanish: de tu casa
  alternatives_spanish:
  - de tu hogar
  lexicon: HALOT
  rationale: '''Casa'' preserva el sentido concreto del sustantivo y el ámbito doméstico/covenantal; ''hogar'' añade un matiz interpretativo más afectivo que el hebreo no exige.'
- source_word: וּבִשְׁעָרֶיךָ
  english_pob_choice: and on your gates
  chosen_spanish: y sobre tus puertas
  alternatives_spanish:
  - y en tus puertas
  - y en tus portones
  - y sobre tus portones
  lexicon: HALOT
  rationale: שַׁעַר puede referirse a la puerta/entrada y también al área de acceso. 'Puertas' es la opción española más natural y amplia para conservar esa posible referencia sin especificarla de más; 'portones' sería más restrictivo y puede sonar demasiado material o urbano.
theological_decisions:
- issue: Alcance de 'gates' / espacio de acceso
  english_pob_reading: '''Or at your gates.'' The Hebrew can refer to the gate area as well as the gates themselves.'
  chosen_spanish_reading: '''sobre tus puertas'' con apertura semántica hacia la entrada o zona de acceso'
  alternative_spanish_readings:
  - '''en tus puertas'''
  - '''en la zona de tus puertas'''
  - '''junto a tus puertas'''
  rationale: El hebreo permite tanto los objetos 'puertas' como el área de entrada. La traducción principal mantiene una formulación breve y natural, sin cerrar indebidamente la extensión del término. La nota a[a][b] preserva el rango semántico documentado por la POB inglesa.
  doctrine_reference: Ninguna; decisión de alcance léxico y espacial.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que los marcadores de nota [a] y [b] aparezcan exactamente en el texto español, y que cada nota esté anclada a un segmento visible del verso.
  spanish_consistency_notes:
  - Se mantuvo 'casa' para בַּיִת y 'puertas' para שַׁעַר, de acuerdo con el registro claro y directo del POB inglés.
  - Se evitó 'SEÑOR' u otra terminología de sustitución, porque este verso no contiene el tetragrámaton ni un caso de cita directa del nombre divino.
  - Se prefirió 'escribirás' como futuro de mandato, equivalente natural del hebreo instructivo.
