revisions:
- from: Yo los herí con tizón, con añublo y con granizo[a], toda la obra de sus manos; pero no se volvieron a mí, declara Yahvé.
  to: Los herí con tizón, con moho y con granizo[a], toda obra de sus manos; pero no se volvieron a mí, declara Yahvé.
  rationale: Se quitó el «Yo» explícito por ser innecesario en español, se mantuvo el sentido judicial directo de הִכֵּיתִי con «Los herí», se mejoró la naturalidad de la secuencia con una puntuación más fluida, y se sustituyó «añublo» por «moho» para mayor claridad contemporánea sin perder el campo semántico de enfermedad agrícola. Se conservó la lectura auditada «no se volvieron a mí» y el nombre divino «Yahvé».
