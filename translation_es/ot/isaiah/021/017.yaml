translation:
  language: es
  text: Y el resto del número de los arqueros[a], los valientes de los hijos de Quedar, será poco[b], porque Yahvé, el Dios de Israel, ha hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hombres del arco»; literalmente, «el arco», usado metonímicamente por los combatientes armados con él.
    reason: lexical_alternative
  - marker: b
    text: O «el resto del número de los valientes arqueros de los hijos de Quedar disminuirá».
    reason: alternative_reading
lexical_decisions:
- source_word: וּשְׁאָר
  english_pob_choice: And the remainder
  chosen_spanish: Y el resto
  alternatives_spanish:
  - Y el remanente
  - Y lo que queda
  lexicon: HALOT
  rationale: שְׁאָר expresa lo que queda después de una reducción. En español, «resto» mantiene el sentido cuantitativo sin cargar de antemano un matiz técnico-teológico que «remanente» podría sugerir.
- source_word: מִסְפַּר
  english_pob_choice: of the number
  chosen_spanish: del número
  alternatives_spanish:
  - del conteo
  - de la cantidad
  lexicon: HALOT
  rationale: El hebreo une «resto» con «número» de manera algo dura; «del número» conserva esa estructura y el énfasis cuantitativo sin suavizarla en exceso.
- source_word: קֶשֶׁת
  english_pob_choice: the bowmen
  chosen_spanish: los hombres del arco
  alternatives_spanish:
  - los arqueros
  - los del arco
  lexicon: HALOT
  rationale: El término es literalmente «arco», usado metonímicamente por los hombres armados con él. En español, «hombres del arco» conserva la metáfora material y evita decidir demasiado pronto por un equivalente interpretativo más estrecho.
- source_word: גִּבּוֹרֵי
  english_pob_choice: the mighty men
  chosen_spanish: los valientes
  alternatives_spanish:
  - los guerreros
  - los poderosos
  lexicon: HALOT
  rationale: גִּבּוֹרִים apunta a fuerza y aptitud militar. «Valientes» comunica bien el perfil bélico en español y suena natural junto con «hijos de Quedar».
- source_word: בְנֵי קֵדָר
  english_pob_choice: of the sons of Kedar
  chosen_spanish: de los hijos de Quedar
  alternatives_spanish:
  - del pueblo de Quedar
  - de los descendientes de Quedar
  lexicon: HALOT
  rationale: La forma genealógica/étnica del hebreo se mantiene con «hijos de Quedar», que es la fórmula bíblica más cercana y transparente.
- source_word: יִמְעָטוּ
  english_pob_choice: will be few
  chosen_spanish: serán pocos
  alternatives_spanish:
  - disminuirán
  - quedarán pocos
  lexicon: HALOT
  rationale: El verbo expresa volverse pocos o menguar. «Serán pocos» es idiomático en español y conserva el resultado sin añadir una imagen diferente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio editorial del proyecto para יְהוָה, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios israelita
  lexicon: HALOT
  rationale: La construcción posesiva es estándar y mantiene la identificación pactual de Yahvé con Israel sin añadir glosa interpretativa.
- source_word: דִּבֵּר
  english_pob_choice: has spoken
  chosen_spanish: ha hablado
  alternatives_spanish:
  - ha dicho
  - habló
  lexicon: HALOT
  rationale: El perfecto profético afirma la certeza del oráculo. «Ha hablado» reproduce bien el cierre solemne y la fuerza declarativa del hebreo.
theological_decisions:
- issue: Nombre divino יְהוָה en español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. La versión española sigue la convención editorial del proyecto para preservar el nombre propio de Dios, no una sustitución reverencial por título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Metonimia de קֶשֶׁת
  english_pob_reading: the bowmen
  chosen_spanish_reading: los hombres del arco
  alternative_spanish_readings:
  - los arqueros
  - el arco
  rationale: El hebreo emplea «arco» por metonimia para los combatientes armados con arco. En español, «los hombres del arco» mantiene visible esa figura sin borrar la tensión entre objeto y combatiente.
  doctrine_reference: HALOT; English POB lexical note on metonymy
- issue: Posible matiz de שְׁאָר
  english_pob_reading: the remainder
  chosen_spanish_reading: el resto
  alternative_spanish_readings:
  - el remanente
  - lo que queda
  rationale: Aunque «remanente» sería posible, puede sugerir un uso teológico más cargado. Aquí el contexto es cuantitativo y militar, por lo que «el resto» preserva mejor la neutralidad del hebreo.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés y no se introdujeron cambios sustanciales respecto de la lectura base. La principal decisión para el español fue conservar la metonimia de קֶשֶׁת de forma visible, mientras que el nombre divino se ajustó al estándar editorial español del proyecto: Yahvé. No se detectaron variantes textuales que exigieran nota adicional.'
  spanish_consistency_notes:
  - Se mantuvo el orden oracional profético con el cierre causal «porque Yahvé, el Dios de Israel, ha hablado».
  - Se evitó «SEÑOR» para יְהוָה conforme a la política del proyecto.
  - «Hijos de Quedar» conserva el idiomatismo bíblico y la designación étnica.
  - «Serán pocos» refleja el resultado del verbo sin sobreinterpretar la disminución.
