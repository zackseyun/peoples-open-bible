revisions:
- from: Esta es la palabra que Yahvé habló acerca de Moab en tiempo pasado[a].
  to: Esta es la palabra que Yahvé habló acerca de Moab antiguamente[a].
  rationale: 'Se realiza una reparación menor para mejorar la naturalidad del español: «antiguamente» expresa mejor מֵאָז que «en tiempo pasado». También se ajusta la nota para ofrecer una alternativa española más idiomática, manteniendo la posibilidad de «mensaje» como equivalente contextual de דָּבָר. No se requiere adjudicación adicional.'
