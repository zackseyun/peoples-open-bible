translation:
  language: es
  text: Como uvas en el desierto[a] hallé a Israel; como el fruto temprano[b] de la higuera, al comienzo de su temporada[c], vi a sus padres[d]. Ellos fueron a Baal-peor[e], se consagraron a la vergüenza[f], y se volvieron abominables como aquello que amaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘en el desierto’. El contraste imagístico es el de un hallazgo inesperado y gozoso en un lugar improductivo.
    reason: lexical_alternative
  - marker: b
    text: O ‘la primicia’ o ‘el primer fruto’. La imagen es la del higo más temprano y especialmente apreciado.
    reason: lexical_alternative
  - marker: c
    text: O ‘en su comienzo’ o ‘al inicio de su estación’. El hebreo puede referirse al comienzo de la temporada de la higuera.
    reason: alternative_reading
  - marker: d
    text: 'O ‘sus antepasados’. Hebreo: ‘sus padres’.'
    reason: lexical_alternative
  - marker: e
    text: Compárese Números 25:1–5, donde Israel se unió a Baal-peor.
    reason: cross_reference
  - marker: f
    text: ‘La vergüenza’ probablemente se refiere de manera despectiva al ídolo asociado con Baal-peor.
    reason: alternative_reading
lexical_decisions:
- source_word: כַּעֲנָבִים בַּמִּדְבָּר
  english_pob_choice: Like grapes in the wilderness
  chosen_spanish: Como uvas en el desierto
  alternatives_spanish:
  - Como uvas en el desierto árido
  - Como racimos en el desierto
  lexicon: HALOT
  rationale: כְּ expresa comparación; עֲנָבִים son uvas/racimos, y מִדְבָּר puede ser 'desierto' o 'desierto/wilderness'. 'Desierto' es natural en español y conserva el contraste entre un lugar improductivo y un hallazgo gozoso.
- source_word: מָצָאתִי
  english_pob_choice: I found
  chosen_spanish: hallé
  alternatives_spanish:
  - encontré
  - descubrí
  lexicon: HALOT
  rationale: El perfecto qal 1cs de מצא permite 'hallé/encontré'. 'Hallé' suena más literario y mantiene el matiz vívido del hallazgo inesperado.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: Nombre propio
  rationale: Nombre propio sin traslado.
- source_word: כְּבִכּוּרָה בִתְאֵנָה
  english_pob_choice: like the first-ripe fruit on the fig tree
  chosen_spanish: como la primicia en la higuera
  alternatives_spanish:
  - como el primer fruto en la higuera
  - como el fruto temprano en la higuera
  lexicon: HALOT
  rationale: בִּכּוּרָה alude al fruto primero y especialmente apreciado. 'Primicia' comunica bien la idea de lo primero y valioso, aunque deja un leve eco cultual; ese eco es aceptable porque el contexto usa lenguaje de imagen, no una terminología técnica rígida.
- source_word: בְּרֵאשִׁיתָהּ
  english_pob_choice: in its first season
  chosen_spanish: en su comienzo
  alternatives_spanish:
  - al inicio de su estación
  - en su primera estación
  lexicon: HALOT
  rationale: Literalmente es 'en su comienzo'. 'En su comienzo' conserva la apertura temporal de la imagen sin forzar un tecnicismo agrícola poco natural en español. Se mantiene la posibilidad de entender el inicio de la temporada de la higuera.
- source_word: רָאִיתִי אֲבוֹתֵיכֶם
  english_pob_choice: I saw your fathers
  chosen_spanish: vi a vuestros padres
  alternatives_spanish:
  - vi a vuestros antepasados
  - consideré a vuestros padres
  lexicon: HALOT
  rationale: ראיתי es 'vi'. אֲבוֹתֵיכֶם es literalmente 'vuestros padres'; se conserva la forma masculina plural como en el hebreo. 'Vuestros' encaja con el plural dirigido a Israel y mantiene la referencia ancestral.
- source_word: בָּאוּ בַעַל פְּעוֹר
  english_pob_choice: They came to Baal-peor
  chosen_spanish: Ellos fueron a Baal-peor
  alternatives_spanish:
  - Vinieron a Baal-peor
  - Acudieron a Baal-peor
  lexicon: HALOT
  rationale: באו puede ser 'vinieron/fueron'. 'Fueron a' suena natural en español y conserva el movimiento hacia el santuario/culto de Baal-peor.
- source_word: וַיִּנָּזְרוּ לַבֹּשֶׁת
  english_pob_choice: and consecrated themselves to shame
  chosen_spanish: se consagraron a la vergüenza
  alternatives_spanish:
  - se apartaron para la vergüenza
  - se dedicaron a la vergüenza
  lexicon: HALOT
  rationale: El nifal de נזר puede llevar el matiz de consagrarse/ apartarse con sentido devocional. 'Se consagraron' conserva la ironía religiosa; 'vergüenza' traduce בֹּשֶׁת y deja abierta la referencia despectiva al ídolo sin explicitar más de lo que el hebreo dice.
- source_word: לַבֹּשֶׁת
  english_pob_choice: to shame
  chosen_spanish: a la vergüenza
  alternatives_spanish:
  - a la vergüenza
  - a la deshonra
  - a la vergüenza/ al oprobio
  lexicon: HALOT
  rationale: בֹּשֶׁת significa 'vergüenza'. En el contexto profético puede funcionar como apelativo polémico para un ídolo; 'vergüenza' preserva esa ambigüedad sin convertirlo en nombre propio.
- source_word: וַיִּהְי֥וּ שִׁקּוּצִ֖ים
  english_pob_choice: and they became detestable
  chosen_spanish: y se volvieron abominables
  alternatives_spanish:
  - y llegaron a ser abominables
  - y se hicieron detestables
  lexicon: HALOT
  rationale: שִׁקּוּצִים expresa lo detestable/abominable. 'Se volvieron abominables' funciona bien con el predicado en español y retiene la fuerza moral-religiosa.
- source_word: כְּאָהֳבָם
  english_pob_choice: like the thing they loved
  chosen_spanish: como aquello que amaron
  alternatives_spanish:
  - como lo que amaron
  - como el objeto de su amor
  lexicon: HALOT
  rationale: La frase es comprimida y algo ambigua. 'Aquello que amaron' mantiene la comparación sin añadir un objeto explícito, respetando la indeterminación del hebreo y del POB inglés.
theological_decisions:
- issue: Referencia polémica en לַבֹּשֶׁת
  english_pob_reading: Rendered as 'shame' with implicit reference to the idol associated with Baal-peor rather than naming the idol directly in the main text.
  chosen_spanish_reading: ‘vergüenza’ como término polémico, sin convertirlo en nombre propio ni explicarlo dentro del texto principal.
  alternative_spanish_readings:
  - ‘la cosa vergonzosa’
  - ‘Vergüenza’ como nombre sustitutivo del ídolo
  rationale: El hebreo usa un término despectivo y no repite el nombre de la deidad. La traducción principal conserva la ambigüedad retórica y la nota puede, si se usa, aclarar la posible referencia idolátrica sin sobreinterpretar.
  doctrine_reference: Preservar la tensión profética e idólatra sin resolverla artificialmente.
- issue: Enfoque en אֲבוֹתֵיכֶם
  english_pob_reading: ‘your fathers’
  chosen_spanish_reading: ‘vuestros padres’
  alternative_spanish_readings:
  - ‘vuestros antepasados’
  rationale: El hebreo es masculino plural y habla de los antepasados del pueblo. 'Padres' conserva la forma fuente; 'antepasados' sería una aclaración interpretativa más inclusiva, pero no es la principal por fidelidad textual.
  doctrine_reference: Fidelidad semántica y gramatical al plural masculino del hebreo.
translation_notes:
  revision_awareness: Se ajustó la redacción para mantener el paralelismo poético y para evitar añadir contraste explícito donde el hebreo no lo marca. También se conservó la ambigüedad polémica de בֹּשֶׁת en el texto principal, en línea con el audio-trail inglés.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y moderno, sin depender de fórmulas eclesiásticas arcaicas.
  - ‘vergüenza’ traduce בֹּשֶׁת con la misma ambigüedad despectiva que el inglés POB; no se sustituyó por un nombre propio.
  - ‘vuestros padres’ conserva el masculino plural del hebreo y la referencia a los ancestros del pueblo.
  - La metáfora agrícola se traduce con vocabulario natural en español, sin eliminar su extrañeza profética.
  - Las notas se anclan únicamente en palabras presentes en el texto español, con marcadores únicos y en orden.
