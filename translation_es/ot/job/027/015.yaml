review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien el sentido general de שָׂרִידוֹ, וְאַלְמְנֹתָיו y לֹא תִבְכֶּינָה, pero se aparta innecesariamente de la sintaxis y voz del hebreo en בַּמָּוֶת יִקָּבֵרוּ. El hebreo tiene verbo nifal pasivo ('serán enterrados/sepultados'), mientras que el borrador lo convierte en activo agentivo ('la muerte los enterrará'), lo cual sobreinterpreta la frase comprimida. La nota alternativa también es útil pero necesita pulirse en español.
  spanish_quality_summary: El español es claro, pero 'A los que le sobrevivan, la muerte los enterrará' suena algo forzado y menos natural que una formulación pasiva. 'Serán sepultados por la muerte' conserva mejor la rareza compacta del hebreo sin introducir un sujeto activo demasiado personificado. También conviene mejorar la redacción de la nota para que suene idiomática y tipográficamente limpia.
  glossary_alignment: 'No hay conflictos con terminología teológica de proyecto. ''Viudas'' y ''llorarán'' están bien. La principal cuestión es de fidelidad léxica/sintáctica: mantener el pasivo de יִקָּבֵרוּ y reflejar בַּמָּוֶת sin expandirlo a una acción activa no explicitada.'
