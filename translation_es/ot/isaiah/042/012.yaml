review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: exhortación plural, ‘gloria’ para Yahvé, y proclamación de su alabanza en lugares marítimos lejanos. Sin embargo, ‘en las costas’ reduce demasiado el alcance de בָּאִיִּים, que en Isaías suele abarcar islas/coastlands/distantes tierras marítimas. Además, falta preservar las alternativas léxicas y la nota del nombre divino que el rastro POB inglés documentó.'
  spanish_quality_summary: El español es claro y digno, pero ‘las costas’ suena algo estrecho y menos idiomático para el uso isaiano que ‘las costas lejanas’ o ‘las regiones costeras’. La construcción general es natural. Conviene añadir notas para conservar el razonamiento lexical y evitar pérdida de matiz.
  glossary_alignment: ‘Yahvé’, ‘gloria’ y ‘alabanza’ están alineados con las pautas del proyecto. La principal desalineación es אִיִּים, donde ‘costas’ no preserva suficientemente el valor amplio de ‘islas/coastlands’.
  issues:
  - severity: medium
    issue: ‘en las costas’ estrecha el sentido de בָּאִיִּים
    rationale: En Isaías, אִיִּים no suele referirse solo a costas inmediatas, sino a islas o tierras marítimas lejanas en sentido amplio. ‘Costas lejanas’ preserva mejor el matiz geográfico del original y del POB inglés.
  - severity: medium
    issue: Faltan notas léxicas significativas preservadas en el POB inglés
    rationale: El inglés documenta la alternativa ‘islands’ frente a ‘coastlands’, la idiomaticidad de יָשִׂימוּ (‘put/set’ → ‘give/ascribe’), y la nota sobre YHWH. Dado que son decisiones significativas del texto fuente, conviene mantenerlas también en español.
  revised_spanish_text: Que den[a] gloria a Yahvé[b], y que declaren su alabanza en las costas lejanas[c].
  revised_footnotes:
  - marker: a
    text: O ‘atribuyan’. El verbo hebreo es literalmente ‘poner/colocar’, pero aquí se usa idiomáticamente con ‘gloria’.
    reason: lexical_alternative
