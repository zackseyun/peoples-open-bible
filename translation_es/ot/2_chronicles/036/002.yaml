translation:
  language: es
  text: Joacaz tenía veintitrés años[a] cuando comenzó a reinar, y reinó tres meses en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘hijo de veintitrés años’—un modismo hebreo estándar para indicar la edad.
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן שָׁל֧וֹשׁ וְעֶשְׂרִ֛ים שָׁנָ֖ה
  english_pob_choice: was twenty-three years old
  chosen_spanish: tenía veintitrés años
  alternatives_spanish:
  - era un hijo de veintitrés años
  - tenía veintitrés años al comenzar a reinar
  lexicon: HALOT
  rationale: El hebreo usa el modismo literal ‘hijo de … años’ para expresar la edad. En español, ‘tenía veintitrés años’ comunica de forma natural el mismo dato sin perder el sentido idiomático.
- source_word: יוֹאָחָז
  english_pob_choice: Jehoahaz
  chosen_spanish: Joacaz
  alternatives_spanish:
  - Jehoacaz
  - Joaquaz
  lexicon: convención bíblica española
  rationale: En español bíblico es más natural y reconocible ‘Joacaz’ para יוֹאָחָז. Mantiene la identificación del nombre propio con una forma estable en castellano.
- source_word: בְּמָלְכ֑וֹ
  english_pob_choice: when he became king
  chosen_spanish: cuando comenzó a reinar
  alternatives_spanish:
  - cuando fue hecho rey
  - en su reinado
  - al acceder al reino
  lexicon: HALOT
  rationale: La construcción marca el momento de la entronización. ‘Cuando comenzó a reinar’ reproduce bien la función temporal de la forma hebrea y es natural en español.
- source_word: וּשְׁלֹשָׁ֣ה חֳדָשִׁ֔ים
  english_pob_choice: three months
  chosen_spanish: tres meses
  alternatives_spanish:
  - y tres meses
  - durante tres meses
  lexicon: HALOT
  rationale: El complemento de duración se expresa de manera directa con ‘tres meses’. En español el ‘y’ puede integrarse naturalmente en la cláusula siguiente sin perder el valor de duración.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - gobernó como rey
  lexicon: HALOT
  rationale: En fórmulas regias, ‘reinó’ es el equivalente conciso y fiel de מלך.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición hebrea indica ubicación; ‘en Jerusalén’ es la traducción directa y natural.
translation_notes:
  revision_awareness: El pasaje presenta un solo enunciado regnal sin variantes textuales relevantes en el paquete fuente; se mantiene la estructura del original y la equivalencia óptima adoptada en el inglés POB.
  spanish_consistency_notes:
  - Se usa ‘reinar’/‘reinó’ de manera consistente para la fórmula regnal.
  - Se evita ‘SEÑOR’ u otras sustituciones ajenas porque el texto no contiene el Nombre divino.
  - ‘Joacaz’ conserva una forma bíblica española reconocible y no depende del patrón inglés ‘Jehoahaz’.
