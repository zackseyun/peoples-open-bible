translation:
  language: es
  text: Y aparté de los líderes de los sacerdotes a doce hombres, y a Eserebias[a] y a Asoamias[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Eserebias probablemente corresponde al nombre hebreo Serebías en el texto paralelo.
    reason: alternative_reading
  - marker: b
    text: Asoamias probablemente corresponde al nombre hebreo Hasabías en el texto paralelo.
    reason: alternative_reading
  - marker: c
    text: El texto griego aquí es más breve que el paralelo hebreo en Esdras 8:24, que continúa con más nombres y con el peso de la plata, el oro y los utensilios.
    reason: cross_reference
lexical_decisions:
- source_word: ἐχώρισα
  english_pob_choice: I set apart
  chosen_spanish: aparté
  alternatives_spanish:
  - separé
  - designé
  lexicon: BDAG
  rationale: El verbo griego expresa separación con matiz de selección/nombramiento. «Aparté» conserva esa doble fuerza mejor que un simple «separé», y resulta natural en español bíblico contemporáneo.
- source_word: φυλάρχων
  english_pob_choice: leaders
  chosen_spanish: líderes
  alternatives_spanish:
  - jefes
  - jefes de clan
  - cabezas
  lexicon: LSJ
  rationale: En este contexto se trata de dirigentes dentro del grupo sacerdotal. «Líderes» comunica la función sin imponer una estructura social más específica que la que permite el griego.
- source_word: τῶν ἱερέων
  english_pob_choice: of the priests
  chosen_spanish: de los sacerdotes
  alternatives_spanish:
  - entre los sacerdotes
  - de entre los sacerdotes
  lexicon: BDAG
  rationale: El genitivo relaciona a esos líderes con el cuerpo sacerdotal. «De los sacerdotes» sigue de cerca la estructura del original y es claro en español.
- source_word: ἄνδρας δέκα δύο
  english_pob_choice: twelve men
  chosen_spanish: doce hombres
  alternatives_spanish:
  - doce personas
  - doce varones
  lexicon: BDAG
  rationale: ἄνδρας es masculino y el contexto habla de representantes sacerdotales. «Doce hombres» es preciso y idiomático.
- source_word: Ἐσερεβίαν
  english_pob_choice: Eserebias
  chosen_spanish: Eserebias
  alternatives_spanish:
  - Sherebías
  lexicon: N/A
  rationale: Se conserva la transliteración griega como forma principal, siguiendo al testigo primario de 1 Esdras. La identificación con Sherebiah se reserva para la nota.
- source_word: Ἀσοαμίαν
  english_pob_choice: Asoamias
  chosen_spanish: Asoamias
  alternatives_spanish:
  - Hasabías
  - Jasabías
  lexicon: N/A
  rationale: También se mantiene la forma griega como base del texto español. El paralelo hebreo sugiere la identificación con Hashabiah, por lo que conviene notarlo aparte.
translation_notes:
  revision_awareness: Basado primariamente en el griego de Swete (1909), con el paralelo hebreo usado solo para identificar nombres propios y notar la brevedad del testigo griego frente a Esdras 8:24. Se mantuvo la transliteración griega de los nombres, como en el POB inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto de base lo exigiera; aquí no aparece.
  - Se mantuvo «Eserebias» y «Asoamias» como formas griegas, con identificación al paralelo hebreo solo en notas.
  - Se evitó «sacerdotes principales» para φυλάρχων porque el griego enfatiza líderes del grupo sacerdotal, no necesariamente un cargo técnico fijo.
