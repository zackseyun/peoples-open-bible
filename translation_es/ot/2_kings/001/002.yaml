    issue: La nota al pie está anclada en «cayó» en lugar de «Baal-zebub».
    rationale: La nota explica una variante/tradición del nombre del dios pagano, por lo que el marcador debe aparecer junto a «Baal-zebub» para evitar confusión y cumplir la disciplina de anclaje.
  - severity: low
