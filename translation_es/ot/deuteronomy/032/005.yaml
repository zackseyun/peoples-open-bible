translation:
  language: es
  text: Han actuado corruptamente hacia él[a]; no son sus hijos, a causa de su defecto. Son una generación torcida y retorcida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo es difícil y condensado. La primera cláusula también puede entenderse: «Se han corrompido a sí mismos», y la siguiente frase puede traducirse: «su mancha» o «su falta».'
    reason: alternative_reading
  - marker: b
    text: 'O: «una generación perversa y torcida».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁחֵת
  english_pob_choice: have acted corruptly
  chosen_spanish: se han portado corruptamente
  alternatives_spanish:
  - han corrompido
  - se han corrompido
  - han actuado corruptamente
  lexicon: HALOT
  rationale: El pi‘el expresa acción corrupta o destructiva. "Se han portado corruptamente" conserva el valor verbal sin forzar de entrada un sentido reflexivo que el hebreo no marca de manera explícita. "Han actuado corruptamente" también sería posible, pero "se han portado" suena más natural en español bíblico actual.
- source_word: לוֹ
  english_pob_choice: toward him
  chosen_spanish: contra él
  alternatives_spanish:
  - a él
  - hacia él
  lexicon: HALOT
  rationale: La preposición ל con sufijo es difícil en este miembro breve. En este contexto poético y polémico, "contra él" comunica adecuadamente la relación adversativa implícita sin afirmar más de lo que el texto hebreo dice de forma explícita. La alternativa "a él" es más literal, pero en español resulta menos clara.
- source_word: לֹא בָּנָיו
  english_pob_choice: they are not his children
  chosen_spanish: no son sus hijos
  alternatives_spanish:
  - no son sus hijos ya
  - no son hijos suyos
  lexicon: HALOT
  rationale: El hebreo es nominal y elíptico. En español se requiere un verbo copulativo; "no son sus hijos" transmite la negación desnuda sin añadir la idea temporal de "ya no". "No son hijos suyos" sería igualmente posible, pero el orden elegido fluye mejor en el paralelo poético.
- source_word: מוּמָם
  english_pob_choice: because of their defect
  chosen_spanish: por su defecto
  alternatives_spanish:
  - por su mancha
  - por su falta
  - debido a su defecto
  lexicon: HALOT
  rationale: מוּם designa un defecto, mancha o blemish. "Defecto" conserva el sentido básico y permite mantener la dureza del reproche. Se prefiere "por" para reflejar la relación causal inferida por la traducción inglesa auditada, sin añadir una explicación más amplia que el hebreo no desarrolla.
- source_word: דּוֹר
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - edad
  - raza
  lexicon: HALOT
  rationale: Es la equivalencia normal y precisa en este contexto poético y de pacto.
- source_word: עִקֵּשׁ
  english_pob_choice: crooked
  chosen_spanish: torcida
  alternatives_spanish:
  - perversa
  - doblada
  - deforme
  lexicon: HALOT
  rationale: El adjetivo conserva la metáfora de lo doblado o desviado moralmente. "Torcida" mantiene la imagen concreta y combina bien con el término siguiente.
- source_word: וּפְתַלְתֹּל
  english_pob_choice: twisted
  chosen_spanish: perversa
  alternatives_spanish:
  - torcida
  - deviada
  - retorcida
  lexicon: HALOT
  rationale: Este adjetivo raro intensifica la distorsión moral. En español, "perversa" captura bien la fuerza ética y evita una repetición mecánica con "torcida"; sin embargo, se reconoce que el par hebreo contiene una doble imagen de desvío que no puede agotarse en una sola palabra.
theological_decisions:
- issue: Cómo entender la relación implícita entre el sujeto y Dios en לוֹ
  english_pob_reading: toward him
  chosen_spanish_reading: contra él
  alternative_spanish_readings:
  - a él
  - hacia él
  rationale: El hebreo es comprimido y permite varias relaciones. "Contra él" hace explícita la dimensión relacional adversativa que el contexto sugiere, pero no pretende resolver definitivamente la ambigüedad. Se preserva así la tensión textual sin suavizarla.
  doctrine_reference: Preservar la tensión textual y no resolver la ambigüedad más allá del hebreo.
- issue: Si לֹא בָּנָיו implica pérdida de filiación pactual o solo negación de carácter filial
  english_pob_reading: they are not his children
  chosen_spanish_reading: no son sus hijos
  alternative_spanish_readings:
  - ya no son sus hijos
  - no son hijos suyos
  rationale: La lectura mantiene la negación tajante del hebreo sin añadir una lectura temporal o sistemática sobre el estatus pactual que el versículo por sí solo no explicita. Así se conserva la severidad del texto y su ambigüedad teológica.
  doctrine_reference: Preservar la tensión doctrinal en lugar de resolverla.
- issue: Cómo reflejar la secuencia sintáctica muy comprimida del versículo
  english_pob_reading: They have acted corruptly toward him; they are not his children, because of their defect. They are a crooked and twisted generation.
  chosen_spanish_reading: Se han portado corruptamente contra él; no son sus hijos, por su defecto. Son una generación torcida y perversa.
  alternative_spanish_readings:
  - Se han corrompido contra él; no son sus hijos; su defecto es suyo. Son una generación torcida y retorcida.
  - Han actuado corruptamente contra él; no son sus hijos, por su mancha.
  rationale: Deuteronomio 32:5 es sintácticamente denso y difícil. La versión elegida sigue de cerca el sentido general del texto masorético y el audit trail inglés, pero en un español publicable y claro. Se mantienen tanto la dureza del reproche como la ambigüedad de la frase final.
  doctrine_reference: Preservar la tensión textual y la dificultad sintáctica del original.
translation_notes:
  revision_awareness: La traducción sigue el último pase del texto fuente inglés, que quedó sin cambios después de la revisión más reciente y fue confirmado con alto grado de acuerdo. No se registraron correcciones aplicadas, así que la redacción española se alinea con esa lectura estable sin introducir enmiendas propias.
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» según corresponda en el conjunto de POB; en este versículo el pronombre de tercera persona conserva el referente sin nombrarlo explícitamente.
  - Se mantiene «corruptamente» para reflejar la fuerza verbal de שִׁחֵת y no reducirlo a mera desviación moral abstracta.
  - Se conserva la pareja semántica «torcida y perversa» para respetar la duplicación hebrea de adjetivos.
  - La puntuación separa las cláusulas para ayudar a la lectura pública sin ocultar la compresión del original.
