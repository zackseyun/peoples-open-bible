translation:
  language: es
  text: no sea que haya entre ustedes un hombre o una mujer[a], o un clan o una tribu, cuyo corazón se aparta hoy de Yahvé nuestro Dios para ir y servir a los dioses de esas naciones; no sea que haya entre ustedes una raíz que produzca veneno y ajenjo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una persona, hombre o mujer'. El hebreo conserva explícitamente el par masculino/femenino; la traducción principal mantiene esa forma.
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: En español, la construcción final negativa expresa bien la advertencia preventiva del hebreo פֶּן. 'Para que no' comunica el riesgo sin introducir una formulación demasiado arcaica.
- source_word: יֵשׁ בָּכֶם
  english_pob_choice: there be among you
  chosen_spanish: haya entre ustedes
  alternatives_spanish:
  - exista entre ustedes
  - haya en medio de ustedes
  lexicon: HALOT
  rationale: La construcción existencial con sentido de advertencia se vierte naturalmente con 'haya entre ustedes', manteniendo el valor de posibilidad amenazante.
- source_word: אִישׁ אוֹ אִשָּׁה
  english_pob_choice: a man or a woman
  chosen_spanish: un hombre o una mujer
  alternatives_spanish:
  - una persona, hombre o mujer
  - cualquier hombre o mujer
  lexicon: HALOT
  rationale: Se conserva el par explícito masculino/femenino del hebreo sin neutralizarlo en una sola palabra genérica.
- source_word: מִשְׁפָּחָה
  english_pob_choice: clan
  chosen_spanish: familia
  alternatives_spanish:
  - clan
  - linaje
  lexicon: HALOT
  rationale: Aunque 'clan' refleja el grupo de parentesco más técnico, 'familia' resulta más natural en español y sigue siendo compatible con el alcance social del término en este contexto. Se evita forzar un tecnicismo si el lector hispano puede entender la advertencia sin pérdida sustancial.
- source_word: שֵׁבֶט
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - tribu
  - tribal
  lexicon: HALOT
  rationale: Aquí el término designa una unidad tribal; 'tribu' es el equivalente directo y claro en español.
- source_word: לְבָבוֹ פֹנֶה
  english_pob_choice: whose heart turns away
  chosen_spanish: cuyo corazón se aparta
  alternatives_spanish:
  - cuyo corazón se vuelve atrás
  - cuyo corazón se desvía
  lexicon: HALOT
  rationale: '''Se aparta'' reproduce la idea de desviación/apostasía sin sobrecargar el español con una calca del participio. Conserva el movimiento relacional ''de Yahvé'' implícito en מֵעִם.'
- source_word: הַיּוֹם
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - hoy mismo
  lexicon: HALOT
  rationale: Equivale de forma natural a la urgencia temporal del texto.
- source_word: מֵעִם יְהוָה אֱלֹהֵינוּ
  english_pob_choice: from Yahweh our God
  chosen_spanish: de Yahvé nuestro Dios
  alternatives_spanish:
  - de parte de Yahvé nuestro Dios
  - de junto a Yahvé nuestro Dios
  lexicon: HALOT
  rationale: Se mantiene el nombre divino como 'Yahvé' conforme al criterio del proyecto. La preposición 'de' expresa con naturalidad el apartarse de su presencia/lealtad; el matiz de alejamiento queda reforzado por 'se aparta'.
- source_word: לָלֶכֶת לַעֲבֹד
  english_pob_choice: to go and serve
  chosen_spanish: para ir y servir
  alternatives_spanish:
  - para ir a servir
  - para ir y adorar
  lexicon: HALOT
  rationale: Se conserva el binomio verbal hebreo de movimiento + servicio. 'Servir' preserva la fuerza cultual del texto sin reemplazarla por un verbo interpretativo como 'adorar'.
- source_word: אֱלֹהֵי הַגּוֹיִם הָהֵם
  english_pob_choice: the gods of those nations
  chosen_spanish: a los dioses de esas naciones
  alternatives_spanish:
  - a los dioses de aquellos pueblos
  - a los dioses de las naciones aquellas
  lexicon: HALOT
  rationale: '''Esas naciones'' refleja bien el demonstrativo הָהֵם y mantiene la referencia externa a los pueblos circundantes.'
- source_word: שֹׁרֶשׁ
  english_pob_choice: a root
  chosen_spanish: una raíz
  alternatives_spanish:
  - un brote
  - un origen
  lexicon: HALOT
  rationale: Se conserva la metáfora botánica del hebreo como imagen de una fuente oculta y peligrosa dentro de la comunidad.
- source_word: פֹּרֶה
  english_pob_choice: bearing
  chosen_spanish: que produzca
  alternatives_spanish:
  - que dé
  - que lleve
  lexicon: HALOT
  rationale: El participio expresa capacidad productiva; 'que produzca' comunica de forma directa que la raíz genera algo tóxico.
- source_word: רֹאשׁ
  english_pob_choice: poison
  chosen_spanish: veneno
  alternatives_spanish:
  - veneno
  - hierba amarga
  - gall
  lexicon: HALOT
  rationale: El POB inglés revisó esta palabra para evitar la opacidad de 'gall'. En español, 'veneno' comunica la noción tóxica con claridad y mantiene el contraste con 'ajenjo' sin introducir una imagen ajena al peligro semántico.
- source_word: וְלַעֲנָה
  english_pob_choice: wormwood
  chosen_spanish: ajenjo
  alternatives_spanish:
  - ajenjo
  - absintio
  lexicon: HALOT
  rationale: '''Ajenjo'' es el equivalente bíblico y tradicional en español para the bitter plant metaphor, y conserva la resonancia de amargura/toxicidad.'
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: Se sigue el criterio del proyecto de no ocultar el Tetragrámaton bajo 'SEÑOR'. 'Yahvé' mantiene el nombre pactual revelado en el texto y es la forma establecida para este trabajo en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: 'La redacción española refleja la revisión más reciente del audit trail inglés: usa una forma verbal simple (''se aparta'') para el participio hebreo y evita añadir ''fruit'' u otro sustantivo no explícito en la cola final, traduciendo directamente ''raíz que produzca veneno y ajenjo''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar del proyecto.
  - Se conserva la secuencia retórica de advertencia con dos cláusulas de finalidad negativa.
  - Se evita 'SEÑOR' como máscara del Tetragrámaton y también 'Cristo', que no aparece en el versículo.
  - '''Servir'' traduce el verbo cultual לַעֲבֹד sin sustituirlo por ''adorar''.'
  - '''Ajenjo'' se usa como término bíblico comprensible en español y coherente con el paralelismo tóxico del texto.'
