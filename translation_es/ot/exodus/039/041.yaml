    text: O 'las vestiduras de servicio'; el hebreo probablemente se refiere a textiles especialmente hechos para el ministerio en el santuario.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'de labor' por 'de tejido elaborado' para reflejar mejor el sentido documentado de הַשְּׂרָד como obra textil especialmente confeccionada, manteniendo a la vez un español natural y la distinción entre este grupo de vestiduras y las 'vestiduras sagradas'. No se requieren otros cambios.
