base_translation:
  language: en
  yaml_path: translation/ot/hosea/011/008.yaml
  text: How can I give you up[a], Ephraim? How can I hand you over, Israel? How can I make you like Admah? How can I set you like Zeboiim? My heart is turned over within me[c][b]; all my compassions are stirred.
  footnotes:
  - marker: a
    text: Admah and Zeboiim were cities associated with the same overthrow as Sodom and Gomorrah; the comparison evokes total destruction (see Deuteronomy 29:23).
    reason: cross_reference
  - marker: b
    text: Or 'My heart is changed within me.' The Hebrew image is more literally that God's heart is 'turned over,' expressing intense inner upheaval.
    reason: lexical_alternative
  - marker: c
    text: Or 'all my pity is kindled' / 'my compassion grows warm.'
    reason: lexical_alternative
