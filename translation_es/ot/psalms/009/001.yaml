translation:
  language: es
  text: 'Para el director del coro: según «Muerte del Hijo». Salmo de David[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo עַלְמוּת לַבֵּן es incierto. Probablemente sea una indicación musical o el título de una melodía; tradicionalmente también se ha dejado sin traducir como una expresión de tipo nombre propio.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Para el director del coro
  alternatives_spanish:
  - Al director del coro
  - Para el maestro de canto
  - Para el músico principal
  lexicon: HALOT
  rationale: En los encabezados de los Salmos, la forma con ל suele funcionar como una indicación de ejecución dirigida al responsable musical. «Director del coro» comunica esa función de manera clara y natural en español, sin perder el matiz litúrgico del original.
- source_word: עַלְמוּת לַבֵּן
  english_pob_choice: according to “Death of the Son”
  chosen_spanish: según «Muerte del hijo»
  alternatives_spanish:
  - según «Alamot-labén»
  - con la melodía «Muerte del hijo»
  - según «Muerte del Hijo»
  lexicon: HALOT
  rationale: La expresión hebrea es oscura y puede referirse a una indicación musical o al nombre de una melodía/título. Se conserva la lectura de título o indicación mediante «según», y se traduce de forma literal el sentido probable de מות + בן, sin ocultar la incertidumbre del texto.
- source_word: מִזְמוֹר
  english_pob_choice: A psalm
  chosen_spanish: Salmo
  alternatives_spanish:
  - Un salmo
  - Cántico
  - Melodía
  lexicon: HALOT
  rationale: מִזְמוֹר señala el género del poema. En español, «Salmo» es la forma más breve, reconocible y fiel al encabezado del libro, y mantiene el valor genérico del término.
- source_word: לְדָוִד
  english_pob_choice: of David
  chosen_spanish: de David
  alternatives_spanish:
  - para David
  - por David
  - perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los encabezados puede indicar autoría, dedicación o asociación. «De David» conserva esa ambigüedad mejor que una formulación más específica como «por David».
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto español se ajusta directamente al análisis fuente-auditado y conserva la incertidumbre lexical donde el hebreo es oscuro.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para el encabezado, ya que aquí no aparece el tetragrámaton sino una fórmula funcional para el responsable musical.
  - Se mantuvo un registro sobrio y bíblico, pero con español actual y legible.
  - La nota al pie conserva la ambigüedad documental de עַלְמוּת לַבֵּן sin imponer una sola solución.
