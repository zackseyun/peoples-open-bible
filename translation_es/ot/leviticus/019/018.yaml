translation:
  language: es
  text: No te vengarás ni guardarás rencor contra los hijos de tu pueblo[a], sino que amarás a tu prójimo como a ti mismo; yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'contra tu propio pueblo'. Literalmente, 'contra los hijos de tu pueblo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִקֹּם
  english_pob_choice: take vengeance
  chosen_spanish: te vengarás
  alternatives_spanish:
  - tomarás venganza
  - te tomarás venganza
  lexicon: HALOT
  rationale: El hebreo expresa la acción activa de vengarse o ejecutar represalia. 'Te vengarás' conserva bien esa fuerza verbal en español sin volverla más abstracta de lo que permite el texto.
- source_word: תִטֹּר
  english_pob_choice: bear a grudge
  chosen_spanish: guardarás rencor
  alternatives_spanish:
  - mantendrás rencor
  - albergarás resentimiento
  lexicon: HALOT
  rationale: נטר aquí denota retener resentimiento o enojo. 'Guardar rencor' es una equivalencia natural y fiel en español para la idea de mantener hostilidad interna.
- source_word: בְּנֵי עַמֶּךָ
  english_pob_choice: the sons of your people
  chosen_spanish: los hijos de tu pueblo
  alternatives_spanish:
  - tu propio pueblo
  - los hijos de tu propia gente
  lexicon: HALOT
  rationale: La frase es literalmente masculina y genealógica ('hijos de tu pueblo'). 'Los hijos de tu pueblo' conserva la estructura del hebreo y la referencia inmediata al grupo comunitario; 'tu propio pueblo' queda como alternativa idiomática, pero no sustituye la forma textual principal.
- source_word: וְאָהַבְתָּ
  english_pob_choice: you shall love
  chosen_spanish: amarás
  alternatives_spanish:
  - deberás amar
  - y amarás
  lexicon: HALOT
  rationale: En un contexto legal, el perfecto con waw tiene fuerza exhortativa o mandativa. 'Amarás' reproduce bien ese valor imperativo en español bíblico contemporáneo.
- source_word: לְרֵעֲךָ
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - tu semejante
  - tu compañero
  lexicon: HALOT
  rationale: רֵעַ puede significar amigo, compañero o prójimo. 'Prójimo' es la opción más estable en español bíblico y ético para designar al otro cercano en la comunidad, sin restringirlo a una mera vecindad geográfica.
- source_word: כָּמוֹךָ
  english_pob_choice: as yourself
  chosen_spanish: como a ti mismo
  alternatives_spanish:
  - como tú mismo
  - igual que a ti mismo
  lexicon: HALOT
  rationale: La comparación es directa y la forma española 'como a ti mismo' transmite de manera natural el estándar de amor medido por el propio cuidado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar ''Yahvé'' en el texto principal español para preservar el nombre divino personal, en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Alcance comunitario de 'los hijos de tu pueblo' frente a 'tu prójimo'
  english_pob_reading: The verse distinguishes the immediate covenant-community object ('the sons of your people') from 'your neighbor' in the love command.
  chosen_spanish_reading: El texto distingue entre el grupo comunitario inmediato ('los hijos de tu pueblo') y el objeto del mandamiento de amar ('tu prójimo').
  alternative_spanish_readings:
  - Fundir ambas expresiones en una sola idea universalizada
  - Reducir ambas a 'hermano' o 'vecino'
  rationale: La traducción conserva la distinción formal del hebreo sin importar una universalización o restricción que el versículo no formula explícitamente.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Nombre divino en el cierre
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se mantiene la directriz del proyecto para יְהוָה, preservando el nombre propio divino y evitando la sustitución por un título.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Coincide con el último pase de revisión en que no se requieren cambios sustanciales; se mantiene la equivalencia óptima con preservación de la distinción hebrea entre el objeto comunitario ('los hijos de tu pueblo') y el término relacional ('tu prójimo').
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al criterio del proyecto para יְהוָה.
  - Se prefirió 'prójimo' para רֵעַ por su uso bíblico y ético en español, sin perder la referencia relacional comunitaria.
  - Se preservó la nota alternativa para la frase literal 'los hijos de tu pueblo' porque el español puede oscilar entre literalidad y naturalidad semántica.
