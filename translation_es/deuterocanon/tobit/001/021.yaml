  text: And before fifty days had passed[a], his two sons killed him and fled to the mountains of Ararat. And Sacherdonos his son reigned in his place, and he appointed Achiacharos, the son of Anael, my brother's son[b], over all the accounts of his kingdom and over the whole administration.
  footnotes:
