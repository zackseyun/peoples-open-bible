translation:
  language: es
  text: Pero si él emprendiera campaña contra Judea, la dejaría pronto nivelada con fuego y lanza, y, después de quemar rápidamente con fuego[a] su santuario, inaccesible para nosotros[b], pondría fin para siempre a los que ofrecen sacrificio allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de «después de quemar» presenta una leve incertidumbre en la transmisión de Swete, pero el sentido de incendiar el santuario es claro.
    reason: textual_variant
  - marker: b
    text: ἄβατον significa literalmente «no pisable» o «no entrable»; también puede entenderse como «prohibido para nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστρατεύσαντα
  english_pob_choice: should campaign against
  chosen_spanish: emprendiera campaña contra
  alternatives_spanish:
  - marchara contra
  - hiciera guerra contra
  - se lanzara contra
  lexicon: LSJ
  rationale: El participio expresa una acción militar proyectada contra Judea. «Emprendiera campaña contra» conserva el matiz bélico sin volver demasiado técnico el español ni convertirlo en una sola batalla puntual.
- source_word: ἰσόπεδον
  english_pob_choice: level
  chosen_spanish: nivelada
  alternatives_spanish:
  - arrasada
  - puesta al nivel del suelo
  - hecha una llanura
  lexicon: LSJ
  rationale: El término comunica dejar algo plano o al ras. «Nivelada» es breve, clara y mantiene la imagen de destrucción total.
- source_word: πυρὶ καὶ δόρατι
  english_pob_choice: with fire and spear
  chosen_spanish: con fuego y lanza
  alternatives_spanish:
  - por fuego y lanza
  - con fuego y la lanza
  lexicon: LSJ
  rationale: El dativo instrumental se rinde naturalmente con «con». «Lanza» conserva el par de instrumentos destructivos del griego.
- source_word: στήσεσθαι
  english_pob_choice: make it
  chosen_spanish: la dejaría
  alternatives_spanish:
  - la haría
  - la pondría
  - la volvería
  lexicon: LSJ
  rationale: En el contexto de ἰσόπεδον, el verbo expresa causar un estado. En español, «la dejaría nivelada» comunica con naturalidad la idea resultante sin añadir contenido nuevo.
- source_word: διὰ τάχους / ἐν τάχει
  english_pob_choice: quickly
  chosen_spanish: pronto / rápidamente
  alternatives_spanish:
  - con rapidez
  - de inmediato
  - en breve
  lexicon: LSJ
  rationale: Las dos expresiones griegas enfatizan celeridad. Conservar ambas como «pronto» y «rápidamente» refleja esa repetición sin sonar artificioso.
- source_word: ἄβατον
  english_pob_choice: impassable to us
  chosen_spanish: inaccesible para nosotros
  alternatives_spanish:
  - prohibido para nosotros
  - no transitable para nosotros
  - vedado para nosotros
  lexicon: LSJ
  rationale: ἄβατον significa literalmente algo no pisable o no entrable. «Inaccesible para nosotros» reproduce bien el sentido y suena natural en español, manteniendo la perspectiva de exclusión del hablante.
- source_word: ναόν
  english_pob_choice: sanctuary
  chosen_spanish: santuario
  alternatives_spanish:
  - templo
  - santuario del templo
  lexicon: LSJ
  rationale: En este contexto ναός se refiere al recinto sagrado principal. «Santuario» preserva mejor la precisión que «templo» y armoniza con ἄβατον.
- source_word: πρή[σα]ν[τα]
  english_pob_choice: after quickly burning with fire
  chosen_spanish: después de quemar rápidamente con fuego
  alternatives_spanish:
  - después de incendiar con rapidez
  - tras prender fuego rápidamente a
  lexicon: LSJ
  rationale: 'La lectura textual presenta cierta incertidumbre, pero el sentido es inequívoco: prender fuego al santuario. «Quemar rápidamente con fuego» mantiene la acción destructiva y deja visible la intensificación del texto.'
- source_word: τῶν συντελούντων ἐκεῖ θυσίαν
  english_pob_choice: those who offer sacrifice there
  chosen_spanish: a los que ofrecen sacrificio allí
  alternatives_spanish:
  - a los que presentan sacrificio allí
  - a los que realizan sacrificios allí
  lexicon: LSJ
  rationale: El participio expresa a quienes llevan a cabo el rito sacrificial. «Ofrecen sacrificio» es la fórmula más fiel y natural en español; se evita introducir terminología sacerdotal no explícita.
- source_word: εἰς τὸν ἅπαντα χρόνον καταστήσειν
  english_pob_choice: put a stop forever
  chosen_spanish: pondría fin para siempre
  alternatives_spanish:
  - aboliría para siempre
  - haría cesar para siempre
  - acabaría para siempre con
  lexicon: LSJ
  rationale: La locución expresa cese permanente. «Pondría fin para siempre» comunica bien la duración total sin perder el tono solemne del griego.
theological_decisions:
- issue: Referencia de ἄβατον con ἡμῖν
  english_pob_reading: The sanctuary is inaccessible to the speaker and his group, preserving the outsider perspective.
  chosen_spanish_reading: El santuario es inaccesible para nosotros, manteniendo la perspectiva de exclusión del hablante.
  alternative_spanish_readings:
  - prohibido para nosotros
  - vedado para nosotros
  - no entrable para nosotros
  rationale: 'No hay una controversia doctrinal, pero sí una carga lexical y perspectival importante: el texto subraya la separación cultual. «Inaccesible para nosotros» conserva esa distancia sin sobrecargar el verso con una calca extraña.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de ναός en contraste con ἄβατον
  english_pob_reading: sanctuary rather than the broader temple complex.
  chosen_spanish_reading: santuario, no simplemente «templo»
  alternative_spanish_readings:
  - templo
  - recinto del templo
  rationale: La precisión lexical ayuda a no diluir la distinción del griego entre el lugar sagrado principal y el conjunto más amplio. No se añade doctrina; se cuida la topografía sagrada del texto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del texto inglés que prefirió «impassable to us» para ἄβατον y ajustó «offer sacrifice» para mayor naturalidad. En español, «inaccesible para nosotros» mantiene el valor semántico de ἄβατον con estilo más fluido, y «ofrecen sacrificio» sigue la misma decisión idiomática. También se conservó la doble idea de rapidez presente en διὰ τάχους y ἐν τάχει, sin perder la secuencia de la acción.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiriera; aquí no aparece.
  - «Santuario» se mantuvo para ναός por precisión contextual.
  - Se evitó «Señor» y otras sustituciones teológicas no presentes en el griego.
  - Se conservó una sintaxis solemne pero natural en español, sin calco rígido del orden griego.
  - 'Se mantuvo la fuerza de la imagen militar y destructiva: fuego, lanza, incendio y cese permanente.'
