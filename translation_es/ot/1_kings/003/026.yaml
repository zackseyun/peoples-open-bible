  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del rastro auditado en inglés: identifica correctamente a la mujer cuyo hijo vive, expresa el ruego al rey, conserva el contraste con la otra mujer y refleja la orden cruel final. Sin embargo, hay un problema de anclaje de nota: la nota [a] en español se presenta como si el texto principal fuera una traducción más idiomática, pero el texto principal ya usa la expresión literal «se le conmovieron las entrañas». Además, «porque» tras «dijo al rey» suena algo rígido; en español formal bíblico fluye mejor como inciso causal. También conviene alinear la nota [a] con la decisión documentada del POB inglés, donde el punto es que el hebreo es un modismo de compasión intensa, no solo repetir literalmente la frase ya usada en el texto.'
