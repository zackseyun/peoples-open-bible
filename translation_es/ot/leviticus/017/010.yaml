base_translation:
  language: en
  yaml_path: translation/ot/leviticus/017/010.yaml
  text: And any man from the house of Israel[a], or from the sojourner who sojourns among them, who eats any blood—I will set my face against the person who eats the blood[c][b], and I will cut him off from among his people.
  footnotes:
  - marker: a
    text: Or 'resident alien' or 'foreigner residing among them' for 'the sojourner who sojourns among them.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the soul/person who eats'; here 'person' is used in the sense of the individual offender.
    reason: lexical_alternative
  - marker: c
    text: '''Cut off'' is a covenantal penalty formula; the text does not specify here whether this means death, expulsion, or another form of divine judgment.'
    reason: alternative_reading
