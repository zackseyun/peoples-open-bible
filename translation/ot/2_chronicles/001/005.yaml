theological_decisions:
- issue: Referent of the suffix in וַיִּדְרְשֵׁהוּ
  chosen_reading: 'The suffix refers to the LORD: ''Solomon and the assembly sought him there.'''
  alternative_readings:
  - 'The suffix refers to the altar: ''Solomon and the assembly sought it/out it.'''
  - 'Impersonal cultic sense: ''Solomon and the assembly inquired there.'''
  rationale: In biblical usage, דרשׁ commonly takes God as its object ('seek the LORD'). The immediate mention of 'the tabernacle of the LORD' supports this reading, and seeking the altar itself is less idiomatic. Still, the nearest explicit noun is the altar, so the ambiguity should remain auditable and the alternative preserved in a footnote rather than silently erased.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
