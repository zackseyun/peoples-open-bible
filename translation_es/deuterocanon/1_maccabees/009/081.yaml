    issue: «Quedó en pie» puede sonar levemente más ingresivo que estático para ὑστήκει.
    rationale: La forma griega sugiere estado continuado o posición mantenida; «se mantuvo en pie» preservaría eso con algo más de precisión. Sin embargo, el contexto y la ambigüedad del sujeto quedan suficientemente conservados, así que no exige corrección.
