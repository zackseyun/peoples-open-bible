review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido base del hebreo: los enemigos son el sujeto, la imagen cinegética de צוד/צדוני se conserva con «cazaron», la comparación con el ave mantiene la vulnerabilidad de la presa, y חנם se transmite correctamente como hostilidad injustificada. Sin embargo, la nota al pie no preserva adecuadamente la alternativa documentada en el rastro inglés: repite prácticamente el texto principal y omite la intensificación explícita del infinitivo absoluto («ciertamente», «de veras», «sin duda», etc.).'
  spanish_quality_summary: El español es claro y digno. No obstante, «como a un ave» suena un poco menos natural en español bíblico moderno que «como a un pájaro» o «como se caza a un ave». Aun así, es aceptable y fiel. El problema principal es la nota, no la línea principal. Además, en español resulta más idiomático «sin motivo» que «sin causa», aunque esta última sigue siendo comprensible y bíblicamente natural.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Mis enemigos», «me cazaron» y «sin causa/sin motivo» están dentro del marco esperado. No intervienen términos teológicos sensibles del glosario general.
  issues:
