    reason: lexical_alternative
  - marker: b
    text: O «con el sonido de la trompeta»; שׁוֹפָר designa un cuerno, a menudo de carnero.
    reason: lexical_alternative
  revision_rationale: La revisión conserva todas las decisiones léxicas clave del proyecto, pero mejora la naturalidad del español y recupera mejor el sentido del hebreo. 'Iban subiendo' expresa la acción en curso de modo más idiomático que 'estaban subiendo'. 'Con aclamación' preserva el componente audible de תְרוּעָה sin redundar con el sonido del shofar, y permite mantener en nota la alternativa más explícita 'gritos de júbilo'. Se elimina la nota sobre 'Yahvé' por innecesaria.
