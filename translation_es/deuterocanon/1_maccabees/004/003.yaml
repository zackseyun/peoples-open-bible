  text: Judas oyó, y él y los hombres fuertes salieron para golpear a la fuerza del rey que estaba en Emaús,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἤκουσεν
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - se enteró
  - escuchó
  lexicon: LSJ
  rationale: El aoristo de ἀκούω puede ser simplemente 'oír' o implicar recibir noticias. En este contexto narrativo militar, 'oyó' conserva la brevedad y la ambigüedad del griego sin añadir un objeto explícito que el texto no da.
- source_word: ἀπῆρεν
  english_pob_choice: set out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - se pusieron en marcha
  - marcharon
  lexicon: LSJ
  rationale: ἀπαίρω indica salida o partida para una acción. 'Salieron' es natural en español y conserva el movimiento intencional sin introducir un matiz militar más fuerte de lo que exige el griego.
- source_word: οἱ δυνατοὶ
  english_pob_choice: the mighty men
  chosen_spanish: los hombres valientes
  alternatives_spanish:
  - los hombres fuertes
  - los valientes
  - los poderosos
  lexicon: LSJ
  rationale: La expresión griega denota literalmente a los fuertes/poderosos. En español, 'hombres valientes' comunica bien la idea militar y conserva una dignidad idiomática, aunque desplaza ligeramente la fuerza física hacia el valor; por eso se deja constancia de la alternativa más literal.
- source_word: πατάξαι
  english_pob_choice: to strike
  chosen_spanish: atacar
  alternatives_spanish:
  - golpear
  - herir
  - someter
  lexicon: LSJ
  rationale: El infinitivo expresa una acción hostil prevista. 'Atacar' comunica intención bélica de forma natural en español, aunque es menos imagístico que 'golpear'; no se traduce como 'vencer' o 'derrotar' para no adelantar el resultado.
- source_word: τὴν δύναμιν
  english_pob_choice: the force
  chosen_spanish: la fuerza
  alternatives_spanish:
  - el ejército
  - las tropas
  - el poder
  lexicon: LSJ
  rationale: En contexto, δύναμις se refiere a una fuerza militar. 'La fuerza' sigue de cerca el valor léxico del griego y evita concretar indebidamente en 'ejército', que sería posible pero más específico.
- source_word: τοῦ βασιλέως
  english_pob_choice: the king’s
  chosen_spanish: del rey
  alternatives_spanish:
  - real
  - del monarca
  lexicon: LSJ
  rationale: El genitivo es posesivo. 'Del rey' expresa con claridad la relación de pertenencia en español y mantiene la sencillez del griego.
- source_word: τὴν ἐν Ἐμμαούμ
  english_pob_choice: that was at Emmaus
  chosen_spanish: que estaba en Emaús
  alternatives_spanish:
  - que estaba en Emmaús
  - acantonada en Emaús
  - que se hallaba en Emaús
  lexicon: LSJ
  rationale: La construcción articula al sustantivo por su ubicación. 'Que estaba en Emaús' reproduce de modo natural la referencia locativa sin añadir la idea de acuartelamiento, que el griego no dice explícitamente.
