translation:
  language: es
  text: Porque ellos no acogían a los extraños[a] que estaban presentes[b], pero estos esclavizaban a benefactores extranjeros[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «los que eran desconocidos para ellos». En este contexto, el sentido es «extraños» o «personas que no conocían».
    reason: lexical_alternative
  - marker: b
