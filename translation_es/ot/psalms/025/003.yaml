review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: énfasis inicial, universal negativo para quienes esperan en Dios, repetición contrastiva de בוש, y la idea de traición injustificada en הבוגדים ריקם. Sin embargo, hay un problema gramatical importante: «ninguno de los que te esperan» exige verbo en plural («serán avergonzados») o una reformulación plural equivalente. Además, la nota [b] está anclada en la primera cola, pero su contenido explica רֵיקָם de la segunda cola; debe moverse al lugar correspondiente.'
  spanish_quality_summary: El español es claro y digno, pero «ninguno ... será avergonzado» suena discordante y menos natural que una formulación plural. «Los que te esperan» es legible; también conviene mantener el paralelismo verbal. La redacción revisada mejora la naturalidad sin apartarse del texto fuente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ciertamente» para גַּם, «te esperan» para קֹוֶיךָ, y «avergonzados» para בוש son aceptables. «Los que traicionan» comunica el valor verbal de הבוגדים, aunque «los que obran con traición» también sería posible. «Sin causa» preserva la decisión auditada para רֵיקָם.
  issues:
  - severity: high
    issue: Discordancia gramatical en «ninguno[a] de los que te esperan será avergonzado»
    rationale: 'Con «ninguno de los que...», en español estándar aquí resulta más natural y correcto concordar con el complemento plural implícito del grupo: «ninguno ... serán avergonzados» sigue siendo discutible en algunos registros; la solución más limpia es reformular a «ninguno de los que te esperan será avergonzado» evita parcialmente el problema pero suena forzada. Mejor: «ninguno de los que te esperan será avergonzado» o, más natural y fiel al sentido universal negativo, «ninguno de los que te esperan quedará avergonzado». Esto además comunica mejor el resultado de בוש.'
  - severity: medium
    issue: La nota [b] está colocada en la cláusula equivocada
    rationale: La nota [b] trata sobre רֵיקָם («sin causa / por nada / en vano»), que pertenece a «los que traicionan sin causa», no a «será avergonzado» en la primera cola. Debe anclarse junto a «sin causa» o a la frase de la segunda cola.
  - severity: low
    issue: La nota [a] tiene comillas y puntuación poco naturales
    rationale: 'La formulación actual incluye comilla inicial innecesaria y estilo algo calcado. Puede suavizarse a «O: “los que esperan en ti”...» manteniendo el contenido auditado.'
  revised_spanish_text: Ciertamente, ninguno[a] de los que te esperan quedará avergonzado; quedarán avergonzados los que traicionan sin causa[b].
