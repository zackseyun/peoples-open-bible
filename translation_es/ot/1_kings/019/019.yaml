translation:
  language: es
  text: Se fue de allí y halló a Eliseo hijo de Safat, y él estaba arando con doce yuntas[a] delante de él, y él estaba con la duodécima yunta. Elías pasó junto a él y echó sobre él su manto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'doce yuntas de bueyes'; el hebreo se refiere a doce equipos pareados para arar.
    reason: lexical_alternative
  - marker: b
    text: 'Tradicional: ''y echó sobre él su manto''. O ''su capa''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ מִשָּׁם
  english_pob_choice: So he went from there
  chosen_spanish: Y de allí fue
  alternatives_spanish:
  - Entonces fue de allí
  - Se fue de allí
  lexicon: HALOT
  rationale: La forma narrativa hebrea avanza la acción; en español, 'Y de allí fue' conserva la continuidad sin añadir una inferencia fuerte como 'entonces'. 'De allí' mantiene מִשָּׁם con naturalidad.
- source_word: וַיִּמְצָא אֶת אֱלִישָׁע בֶּן שָׁפָט
  english_pob_choice: and found Elisha son of Shaphat
  chosen_spanish: y halló a Eliseo hijo de Safat
  alternatives_spanish:
  - y encontró a Eliseo hijo de Safat
  - y dio con Eliseo hijo de Safat
  lexicon: HALOT
  rationale: '''Halló'' reproduce bien el sentido directo de מָצָא y mantiene un registro sobrio. Se conserva la filiación sin añadir elementos explicativos.'
- source_word: וְהוּא חֹרֵשׁ
  english_pob_choice: and he was plowing
  chosen_spanish: y él estaba arando
  alternatives_spanish:
  - y araba
  - mientras araba
  lexicon: HALOT
  rationale: El participio hebreo presenta la acción en curso; 'estaba arando' expresa ese aspecto de manera natural en español. Se evitó 'mientras' porque el repaso textual indicó que la conjunción simple refleja mejor el hebreo sin añadir temporalidad explícita.
- source_word: שְׁנֵים עָשָׂר צְמָדִים
  english_pob_choice: twelve yoke-pairs
  chosen_spanish: doce yuntas
  alternatives_spanish:
  - doce yuntas de bueyes
  - doce pares de yugo
  lexicon: HALOT
  rationale: La POB inglesa deja abierto el referente exacto de צְמָדִים como pares de tiro para arar. 'Yuntas' es el equivalente español más natural para el equipo de arado y conserva la imagen agrícola sin sobreespecificar.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - frente a él
  lexicon: HALOT
  rationale: '''Delante de él'' es una forma clara y idiomática de expresar la disposición espacial de los equipos de arado.'
- source_word: וְהוּא בִּשְׁנֵים הֶעָשָׂר
  english_pob_choice: and he was with the twelfth
  chosen_spanish: y él estaba con la duodécima
  alternatives_spanish:
  - y él estaba en la duodécima
  - y él estaba con el duodécimo
  lexicon: HALOT
  rationale: 'Se conserva la elipsis del hebreo: la frase indica su posición con el duodécimo equipo. ''La duodécima'' sigue la forma abreviada de la fuente sin añadir ''yunta'' en la segunda cola, como hace la POB inglesa.'
- source_word: וַיַּעֲבֹר אֵלִיָּהוּ אֵלָיו
  english_pob_choice: Elijah passed by him
  chosen_spanish: Elías pasó junto a él
  alternatives_spanish:
  - Elías pasó por él
  - Elías pasó de largo junto a él
  lexicon: HALOT
  rationale: '''Pasó junto a él'' refleja bien עָבַר אֵלָיו en una escena física de acercamiento/paso sin cargar el verbo con interpretación adicional.'
- source_word: וַיַּשְׁלֵךְ אַדַּרְתּוֹ אֵלָיו
  english_pob_choice: and threw his cloak over him
  chosen_spanish: y echó sobre él su manto
  alternatives_spanish:
  - y arrojó sobre él su manto
  - y echó sobre él su capa
  lexicon: HALOT
  rationale: '''Manto'' conserva el valor tradicional del atuendo distintivo de Elías y corresponde al objeto simbólico del relato. En español, ''echar sobre él'' reproduce con precisión la acción de colocar o arrojar el manto sobre la persona.'
theological_decisions:
- issue: Valor simbólico del manto de Elías
  english_pob_reading: Render the action plainly as 'threw his cloak over him' without importing an interpretive explanation into the main text.
  chosen_spanish_reading: 'Traducir la acción de manera directa: ''echó sobre él su manto'', sin añadir en el cuerpo del texto que ello lo designa como sucesor.'
  alternative_spanish_readings:
  - '''echó sobre él su capa'''
  - '''lo nombró sucesor echándole el manto'''
  rationale: El hebreo narra el gesto simbólico, pero no lo explica aquí. La traducción debe preservar el acto y dejar la implicación profética para el contexto inmediato, no para una paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Elección entre 'manto' y 'capa'
  english_pob_reading: 'Traditional: ''and threw his mantle over him.'' The garment signifies Elijah''s prophetic office in the surrounding context.'
  chosen_spanish_reading: Usar 'manto' en el texto principal.
  alternative_spanish_readings:
  - '''capa'''
  - '''manto'' con nota explicativa'
  rationale: '''Manto'' es la forma tradicional que mejor preserva la carga narrativa y simbólica del término אַדָּרֶת. ''Capa'' sería más cotidiana, pero menos precisa para la resonancia literaria del pasaje.'
  doctrine_reference: Lexical tradition in context
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés: se descartó ''mientras'' para no introducir una temporalidad que el hebreo no exige, y se mantuvo la estructura narrativa simple con conjunciones coordinadas. También se reflejó la decisión auditada de no explicar en la línea principal el simbolismo del manto, reservándolo para nota.'
  spanish_consistency_notes:
  - Se mantiene 'Elías' y 'Eliseo' como formas españolas estandarizadas de los nombres propios.
  - '''Yahvé'' no aparece en este versículo.'
  - Se conservó un registro narrativo sobrio y publication-readable sin glosa interpretativa en el texto principal.
  - La numeración ordinal 'la duodécima' se usa para reflejar la elipsis del hebreo y armoniza con la brevedad del original.
