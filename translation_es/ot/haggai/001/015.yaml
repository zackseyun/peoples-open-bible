translation:
  language: es
  text: el día veinticuatro del mes sexto, en el segundo año del rey Darío[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Darío el rey». Se traduce «del rey Darío» para un español más natural, conservando el mismo título real explícito de la fórmula de datación original.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּיוֹם
  english_pob_choice: on the ... day
  chosen_spanish: el día ...
  alternatives_spanish:
  - en el día ...
  lexicon: HALOT
  rationale: En fórmulas de fecha, בְּיוֹם introduce el día concreto del mes; en español natural se expresa con «el día ...» o «en el día ...». Se eligió la forma más fluida para una datación cronológica.
- source_word: עֶשְׂרִים וְאַרְבָּעָה
  english_pob_choice: twenty-fourth
  chosen_spanish: veinticuatro
  alternatives_spanish:
  - vigésimo cuarto
  lexicon: HALOT
  rationale: El hebreo usa cardinales dentro de una fórmula de fecha; en español la datación convencional admite el cardinal tras «el día», sin forzar una forma ordinal pesada. «Veinticuatro» conserva la referencia exacta al día.
- source_word: לַחֹדֶשׁ
  english_pob_choice: of the ... month
  chosen_spanish: del mes
  alternatives_spanish:
  - del mes de
  lexicon: HALOT
  rationale: La construcción hebrea señala el mes del calendario; en español «del mes» es la equivalencia idiomática directa y clara.
- source_word: בַּשִּׁשִּׁי
  english_pob_choice: the sixth
  chosen_spanish: sexto
  alternatives_spanish:
  - seis
  lexicon: HALOT
  rationale: Como «mes» ya está explícito en la frase española, basta «sexto» para conservar la estructura de la datación sin redundancia.
- source_word: בִּשְׁנַת שְׁתַּיִם
  english_pob_choice: in the second year
  chosen_spanish: en el segundo año
  alternatives_spanish:
  - en año dos
  lexicon: HALOT
  rationale: Es la fórmula regnal normal; «en el segundo año» reproduce con naturalidad el valor temporal del hebreo.
- source_word: לְדָרְיָוֶשׁ
  english_pob_choice: of Darius
  chosen_spanish: de Darío
  alternatives_spanish:
  - perteneciente a Darío
  lexicon: HALOT
  rationale: La preposición ל en esta fórmula marca el reinado atribuido a Darius; en español se expresa naturalmente con «de Darío».
- source_word: הַמֶּלֶךְ
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: Se conserva el título real explícito del hebreo. A diferencia del inglés POB, en español la secuencia más natural es «Darío el rey» o «Darío, el rey»; se optó por mantener el orden hebreo sin perder claridad.
translation_notes:
  revision_awareness: La corrección principal respecto del intento anterior es la presencia explícita del marcador de nota [a] en el texto español, manteniendo la misma decisión lexical sobre el orden de «Darío el rey» sin dejar notas sin anclaje.
  spanish_consistency_notes:
  - Se mantiene «Darío» como transliteración estándar del nombre propio.
  - Se usa «el rey» de forma explícita para reflejar הַמֶּלֶךְ.
  - La fecha se vierte en español natural sin introducir información ausente del hebreo.
