translation:
  language: es
  text: El temor de Yahvé es el principio de la sabiduría[a]; todos los que lo practican[c] tienen buen entendimiento. Su alabanza permanece para siempre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el temor de Yahvé es el comienzo de la sabiduría». «Principio» reproduce bien el valor fundacional del hebreo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Su alabanza dura para siempre».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los que lo hacen». El hebreo dice literalmente: «los que los hacen», con el objeto plural implícito; puede referirse a los preceptos de Yahvé o a la práctica del temor de él.'
    reason: lexical_alternative
lexical_decisions:
- source_word: רֵאשִׁית
  english_pob_choice: beginning
  chosen_spanish: principio
  alternatives_spanish:
  - comienzo
  - fundamento
  - parte principal
  lexicon: HALOT
  rationale: En construcción con "sabiduría", el término expresa el inicio o base fundacional. "Principio" conserva bien ese valor sin imponer una lectura meramente temporal o solo de primacía.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría práctica
  - habilidad
  - vida sabia
  lexicon: HALOT
  rationale: En literatura sapiencial, el sentido amplio de sabiduría moral y práctica se comunica naturalmente con "sabiduría" en español.
- source_word: יִרְאַת יְהוָה
  english_pob_choice: the fear of Yahweh
  chosen_spanish: el temor de Yahvé
  alternatives_spanish:
  - la reverencia por Yahvé
  - el temor reverente de Yahvé
  lexicon: HALOT
  rationale: Se conserva la fuerza de la fórmula sapiencial sin suavizarla a "reverencia". El nombre divino se vierte como "Yahvé" según la norma del proyecto.
- source_word: שֵׂכֶל
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - prudencia
  - buen juicio
  lexicon: HALOT
  rationale: El sustantivo apunta a comprensión sensata o buen juicio; "entendimiento" es natural y mantiene el matiz cognitivo-moral.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: buen
  alternatives_spanish:
  - bueno
  - sano
  - apropiado
  lexicon: HALOT
  rationale: Como modificador de "entendimiento", "buen" suena idiomático en español y conserva el valor evaluativo del hebreo.
- source_word: לְכָל עֹשֵׂיהֶם
  english_pob_choice: belongs to all who practice it
  chosen_spanish: tienen todos los que lo practican
  alternatives_spanish:
  - corresponde a todos los que lo practican
  - es para todos los que lo practican
  - lo tienen todos los que lo practican
  lexicon: HALOT
  rationale: El hebreo es sintácticamente difícil porque el sufijo plural carece de antecedente explícito. En español, "los que lo practican" permite preservar el verbo de acción y la referencia probable al temor de Yahvé como práctica obediente. Se opta por una construcción idiomática que expresa posesión/participación sin forzar el objeto implícito.
- source_word: תְּהִלָּתוֹ
  english_pob_choice: His praise
  chosen_spanish: su alabanza
  alternatives_spanish:
  - su alabanza
  - su gloria
  - su renombre
  lexicon: HALOT
  rationale: El sufijo masculino singular remite naturalmente a Yahvé en el contexto del salmo. "Alabanza" preserva la relación entre el ser digno de alabanza y el acto de alabar, sin desplazar el sentido hacia "renombre".
- source_word: עֹמֶדֶת לָעַד
  english_pob_choice: stands forever
  chosen_spanish: permanece para siempre
  alternatives_spanish:
  - se mantiene para siempre
  - dura para siempre
  - está firme para siempre
  lexicon: HALOT
  rationale: La imagen verbal de permanencia se comunica con claridad en español mediante "permanece para siempre"; conserva el matiz de continuidad estable sin sonar forzado.
theological_decisions:
- issue: Nombre divino para יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. En la política del proyecto, la forma principal en español es "Yahvé", no una sustitución con mayúsculas ni una máscara devocional. Esto mantiene la trazabilidad al nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fórmula sapiencial 'the fear of the LORD'
  english_pob_reading: the fear of Yahweh
  chosen_spanish_reading: el temor de Yahvé
  alternative_spanish_readings:
  - la reverencia por Yahvé
  - el temor reverente de Yahvé
  rationale: Se conserva "temor" porque el hebreo sapiencial incluye más que respeto; expresa reverencia temerosa y peso teológico real. Traducirlo solo como "reverencia" atenúa indebidamente la fórmula.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #3'
- issue: Referencia de 'los que lo practican'
  english_pob_reading: who practice it
  chosen_spanish_reading: los que lo practican
  alternative_spanish_readings:
  - los que lo hacen
  - los que practican esas cosas
  rationale: Aunque el hebreo permite que el objeto implícito apunte a los preceptos de Yahvé o al temor mismo, en español la forma con pronombre singular masculino resume mejor la referencia probable sin fijarla en exceso. Se conserva así la tensión interpretativa del original.
  doctrine_reference: POB audit trail for Psalms 111:10
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que aclara la referencia de "it" en lugar de "them". En español se resolvió con "lo practican", manteniendo la ambigüedad controlada del hebreo y la fluidez idiomática. También se preservó la tensión del plural implícito en עֹשֵׂיהֶם con una nota alternativa.
  spanish_consistency_notes:
  - Se usó "Yahvé" conforme al estándar del proyecto para יְהוָה.
  - Se eligió "temor" y no "reverencia" para mantener la fuerza sapiencial de la expresión.
  - '"Su alabanza" se entiende del Señor por el contexto, sin perder la posibilidad semántica de renombre/praza.'
  - La construcción "lo practican" equilibra fidelidad y naturalidad; la nota c conserva la alternativa más literal del hebreo.
