translation:
  language: es
  text: Pero cuando el sumo sacerdote indicó que eran depósitos pertenecientes a viudas y huérfanos,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «depósitos de viudas y huérfanos». Los genitivos griegos pueden traducirse de modo más literal, pero el sentido es que esos fondos les pertenecían.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦ δὲ ἀρχιερέως
  english_pob_choice: But when the high priest
  chosen_spanish: Pero cuando el sumo sacerdote
  alternatives_spanish:
  - Y cuando el sumo sacerdote
  - Entonces el sumo sacerdote
  lexicon: LSJ
  rationale: El genitivo absoluto con δέ introduce un cambio circunstancial en la narración. «Pero cuando» conserva el matiz transicional y ligeramente contrastivo del inglés POB, y «sumo sacerdote» es la equivalencia natural y precisa en español.
- source_word: ὑποδείξαντος
  english_pob_choice: pointed out
  chosen_spanish: indicó
  alternatives_spanish:
  - explicó
  - mostró
  - señaló
  lexicon: LSJ
  rationale: El participio aoristo de ὑποδείκνυμι aquí expresa aclarar o dar a conocer formalmente la naturaleza de los fondos. «Indicó» es breve, natural y mantiene la fuerza declarativa sin exagerar el gesto.
- source_word: παρακαταθήκας
  english_pob_choice: deposits
  chosen_spanish: depósitos
  alternatives_spanish:
  - sumas confiadas
  - bienes en depósito
  - fondos confiados
  lexicon: LSJ
  rationale: El término designa bienes o dinero entregados para custodia. «Depósitos» conserva la correspondencia léxica más directa en español y evita introducir una categoría jurídica moderna que el griego no exige.
- source_word: εἶναι
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - fueran
  - habían sido
  lexicon: LSJ
  rationale: La infinitiva en discurso indirecto se vuelve con naturalidad a una forma finita en español. «Eran» reproduce la afirmación simple del contenido indicado por el sacerdote.
- source_word: χρηῶν τε καὶ ὀρφανῶν
  english_pob_choice: belonging to widows and orphans
  chosen_spanish: pertenecientes a viudas y huérfanos
  alternatives_spanish:
  - de viudas y huérfanos
  - para viudas y huérfanos
  lexicon: LSJ
  rationale: Los genitivos expresan de manera más natural posesión o pertenencia, no solo destino. «Pertenecientes a» hace explícita esa fuerza posesiva en español, siguiendo la decisión auditada del inglés POB.
translation_notes:
  revision_awareness: El texto griego y el control inglés están en alto acuerdo; no se observaron revisiones aplicadas ni cambios pendientes. La versión española sigue la misma lectura auditada, manteniendo la relación posesiva de los genitivos y la transición narrativa del genitivo absoluto.
  spanish_consistency_notes:
  - Se conservó «sumo sacerdote» como término eclesial claro y fiel al contexto judío helenístico.
  - Se evitó sustituir el valor posesivo de los genitivos por una mera idea de destino o beneficio.
  - La puntuación y el encadenamiento verbal buscan una lectura fluida y publicable en español sin perder la estructura del original.
