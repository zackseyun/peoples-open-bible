review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente el griego: conserva la doble estructura enfática (''yugo... yugo'', ''ataduras... ataduras''), mantiene ''hierro'' y ''bronce'', y no sobreinterpreta δεσμοί. Sin embargo, la nota al pie no comunica bien la alternativa documentada del inglés, porque en español el contraste no es entre dos posesivos idénticos (''su... sus'') sino entre una lectura personificada y una más abstracta; conviene explicitar ''de ella'' frente a ''de eso/ello'' o reformular la nota.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español. 'Ataduras' funciona bien para δεσμοί y el paralelismo suena bien. La única reparación necesaria es en la nota, para evitar una alternativa que en español no aporta diferencia real y resulta confusa.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones léxicas 'yugo', 'de hierro', 'ataduras' y 'de bronce' están bien alineadas con la evidencia y con la filosofía POB. La personificación femenina se preserva de forma implícita y aceptable mediante 'su/sus'.
  issues:
  - severity: medium
    issue: La nota al pie actual no reproduce de manera útil la alternativa lexical/theological del inglés.
    rationale: 'La nota dice: ''O “su yugo ... sus ataduras”, si la imagen se entiende de modo más abstracto y no como personificación.'' Pero esa formulación repite esencialmente el mismo español del texto principal y no muestra la diferencia entre ''her'' e ''its''. En español hace falta explicitar la distinción de otro modo para que la nota tenga valor.'
  revised_spanish_text: Porque su yugo es un yugo de hierro[a], y sus ataduras son ataduras de bronce.
  revised_footnotes:
  - marker: a
    text: 'O, si la imagen se entiende de modo más abstracto y no como personificación: ''el yugo de eso ... las ataduras de eso''.'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal, que ya es fiel y natural. Solo se corrige la nota para que exprese realmente la alternativa entre personificación femenina y referencia más abstracta documentada en el audit trail inglés.
