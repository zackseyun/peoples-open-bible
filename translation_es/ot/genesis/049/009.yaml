translation:
  language: es
  text: Judá es un cachorro de león[b]; de la presa, hijo mío, has subido. Se agazapó, se echó como león, y como leona[a]; ¿quién lo despertará?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''y como un gran león''. El hebreo aquí usa un término distinto del empleado antes para ''león''; por eso muchas traducciones conservan la diferencia como ''leona'' o ''gran león''.'
    reason: lexical_alternative
  - marker: b
    text: La imagen del león para Judá suele leerse tipológicamente en conexión con la esperanza real y mesiánica posterior, pero el versículo en sí habla directamente de Judá en la bendición de Jacob.
    reason: cross_reference
lexical_decisions:
- source_word: גּוּר אַרְיֵה
  english_pob_choice: lion’s cub
  chosen_spanish: cachorro de león
  alternatives_spanish:
  - cría de león
  - cachorro
  - joven león
  lexicon: HALOT
  rationale: גּוּר expresa un animal joven; la combinación con אַרְיֵה forma la imagen de un león joven. ‘Cachorro de león’ es natural en español y conserva la metáfora sin borrar la diferencia lexical del hebreo.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judah
  lexicon: N/A
  rationale: Nombre propio tribal/personal transliterado según el uso bíblico en español.
- source_word: מִטֶּרֶף
  english_pob_choice: from the prey
  chosen_spanish: de la presa
  alternatives_spanish:
  - de la presa capturada
  - desde la presa
  lexicon: HALOT
  rationale: טֶרֶף denota la presa capturada o despedazada por un depredador. ‘De la presa’ es idiomático y mantiene la imagen predatoria sin sobreexplicar.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - oh, hijo mío
  lexicon: HALOT
  rationale: Se conserva el vocativo afectivo y poético sin añadir interjecciones que el hebreo no exige.
- source_word: עָלִיתָ
  english_pob_choice: you have gone up
  chosen_spanish: has subido
  alternatives_spanish:
  - has ascendido
  - has venido arriba
  lexicon: HALOT
  rationale: La idea literal de movimiento ascendente se mantiene. En el contexto, puede sugerir que el león se aparta de la presa hacia un lugar seguro, pero la traducción no debe fijar más de lo que el hebreo dice.
- source_word: כָּרַע
  english_pob_choice: he crouched
  chosen_spanish: se agazapó
  alternatives_spanish:
  - se crouchó
  - se inclinó
  - se encorvó
  lexicon: HALOT
  rationale: En un contexto de animal, el verbo describe una postura baja y preparada para descansar o acechar. ‘Se agazapó’ transmite bien esa imagen en español.
- source_word: רָבַץ
  english_pob_choice: he lay down
  chosen_spanish: se echó
  alternatives_spanish:
  - se tendió
  - se recostó
  - descansó
  lexicon: HALOT
  rationale: Para un animal, רָבַץ expresa echarse o recostarse. ‘Se echó’ es breve, natural y acorde con la imagen de reposo.
- source_word: כְּאַרְיֵה
  english_pob_choice: like a lion
  chosen_spanish: como león
  alternatives_spanish:
  - como un león
  lexicon: HALOT
  rationale: Comparativo directo; se evita añadir artículo si el ritmo poético en español queda más fiel con una forma breve.
- source_word: וּכְלָבִיא
  english_pob_choice: and like a lioness
  chosen_spanish: y como leona
  alternatives_spanish:
  - y como un gran león
  - y como león
  lexicon: HALOT
  rationale: Se mantiene la distinción lexical entre אַרְיֵה y לָבִיא. ‘Leona’ preserva la diferencia que el POB inglés destacó como posible ‘lioness’ o ‘great lion’, dejando visible la tensión de traducción.
- source_word: מִי יְקִימֶנּוּ
  english_pob_choice: who will rouse him?
  chosen_spanish: ¿quién lo despertará?
  alternatives_spanish:
  - ¿quién lo rousará?
  - ¿quién lo hará levantarse?
  - ¿quién osará despertarlo?
  lexicon: HALOT
  rationale: El causativo de קום aquí significa hacer que se levante o rousar. ‘Despertará’ es una equivalencia viva en español y conserva el desafío retórico; se deja abierta la fuerza de ‘hacer levantarse’.
theological_decisions:
- issue: Referencia principal de la imagen del león respecto de Judá
  english_pob_reading: Primary sense kept at the level of Jacob's blessing over Judah/tribe without making an explicit messianic claim in the translation.
  chosen_spanish_reading: La lectura principal queda en el nivel de la bendición de Jacob sobre Judá/la tribu, sin convertir la frase en una afirmación mesiánica explícita.
  alternative_spanish_readings:
  - Lectura tipológica o mesiánica que conecta la imagen de Judá con la realeza y la esperanza mesiánica posterior.
  rationale: El hebreo presenta una bendición poética sobre Judá con imaginería leonina. La traducción no debe introducir una conclusión teológica que el versículo no expresa de manera directa, aunque la tradición bíblica posterior sí pueda leerla tipológicamente.
  doctrine_reference: 'Principio de traducción POB: preservar la tensión teológica y no importar doctrinas que el texto no afirma explícitamente.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el paquete fuente; el último pase de revisión indica que el texto quedó sin cambios y con alta concordancia general.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo requiera explícitamente; aquí no aparece el Tetragrámaton.
  - ‘Judá’ se mantiene como nombre propio bíblico estándar en español.
  - 'Se conserva el paralelismo poético con dos comparativos: ‘como león’ y ‘como leona’.'
  - La pregunta final se vierte con un verbo natural en español para mantener la fuerza retórica sin sobretraducir el causativo hebreo.
