revisions:
- from: 'Por tanto, montes de Israel, oigan la palabra del Señor Yahvé. Así dice el Señor Yahvé a los montes y a las colinas, a los cauces[a] y a los valles, a las ruinas desoladas y a las ciudades abandonadas, que han llegado a ser botín y objeto de burla para el remanente[b] de las naciones vecinas:'
  to: 'Por tanto, montes de Israel, oigan la palabra del Señor Yahvé. Así dice el Señor Yahvé a los montes y a las colinas, a los barrancos[a] y a los valles, a las ruinas desoladas y a las ciudades abandonadas, que han llegado a ser botín y objeto de burla para el remanente[b] de las naciones vecinas:'
  rationale: Se cambió 'cauces' por 'barrancos' para alinear el texto principal con la elección léxica principal del POB inglés para אֲפִיקִים en esta lista topográfica, conservando 'cauces de agua/canales' como alternativas de nota. También se ajustó la nota [b] para que refleje con precisión el sintagma completo incluyendo el valor de מִסָּבִיב ('vecinas'). No se requiere revisión doctrinal adicional; son reparaciones editoriales y léxicas menores.
