id: JER.20.6
reference: Jeremiah 20:6
source:
  edition: WLC
  text: וְ/אַתָּ֣ה פַשְׁח֗וּר וְ/כֹל֙ יֹשְׁבֵ֣י בֵיתֶ֔/ךָ תֵּלְכ֖וּ בַּ/שֶּׁ֑בִי וּ/בָבֶ֣ל תָּב֗וֹא וְ/שָׁ֤ם תָּמוּת֙ וְ/שָׁ֣ם תִּקָּבֵ֔ר אַתָּה֙ וְ/כָל אֹ֣הֲבֶ֔י/ךָ אֲשֶׁר נִבֵּ֥אתָ לָ/הֶ֖ם בַּ/שָּֽׁקֶר־־׃ס
translation:
  text: And you[a], Pashhur, and all who live in your house will go into captivity; and you will come to Babylon, and there you will die, and there you will be buried—you and all your loved ones, to whom you prophesied falsely.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'to whom you prophesied lies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹשְׁבֵי בֵיתֶךָ
  chosen: all who live in your house
  alternatives:
  - all the inhabitants of your house
  - all the dwellers of your house
  lexicon: HALOT
  rationale: The participial construction literally denotes those dwelling in his house. 'All who live in your house' is natural modern English while preserving the household scope.
- source_word: תֵּלְכוּ בַּשֶּׁבִי
  chosen: will go into captivity
  alternatives:
  - will go into exile
  - will go captive
  lexicon: HALOT
  rationale: The idiom הלך בשבי means to go into captivity/as captives. 'Captivity' is preferred over 'exile' because the noun שבי emphasizes being taken captive, not merely relocation.
- source_word: וּבָבֶל תָּבוֹא
  chosen: you will come to Babylon
  alternatives:
  - you will go to Babylon
  - you will enter Babylon
  lexicon: HALOT
  rationale: The Hebrew verb is 'come/enter.' In English, 'come to Babylon' is slightly marked but still acceptable and preserves the source verb better than the more idiomatic but less literal 'go to Babylon.'
- source_word: וְשָׁם תָּמוּת וְשָׁם תִּקָּבֵר
  chosen: and there you will die, and there you will be buried
  alternatives:
  - there you will die, and there you will be buried
  lexicon: HALOT
  rationale: The repeated 'there' is retained to reflect the emphatic repetition in Hebrew, underscoring the certainty and location of judgment.
- source_word: אֹהֲבֶיךָ
  chosen: your loved ones
  alternatives:
  - your friends
  - those who love you
  - your lovers
  lexicon: HALOT
  rationale: The participle from אהב can denote those who love someone, often friends/allies or loved ones. 'Loved ones' fits the domestic and relational context better than 'lovers,' which would mislead, and is broader than 'friends.'
- source_word: נִבֵּאתָ לָהֶם בַּשָּׁקֶר
  chosen: to whom you prophesied falsely
  alternatives:
  - to whom you prophesied lies
  - for whom you prophesied falsely
  lexicon: HALOT
  rationale: The phrase means he prophesied falsely/with falsehood to them. 'Prophesied falsely' is idiomatic English and preserves the accusation without over-specifying whether the content was deliberate lies or false prophecy more generally.
