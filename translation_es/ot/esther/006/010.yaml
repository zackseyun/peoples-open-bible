translation:
  language: es
  text: 'Entonces el rey dijo a Amán: «Date prisa, toma el manto y el caballo, tal como has dicho, y haz así para Mardoqueo el judío[a], que está sentado junto a la puerta del rey. No omitas nada de todo lo que has dicho»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El judío» también podría traducirse «el judeano», pero aquí lo más probable es que marque la identidad étnico-religiosa de Mardoqueo dentro del relato.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «No hagas caer una cosa de todo lo que has dicho», un modismo que significa no omitir nada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַהֵר
  english_pob_choice: Hurry
  chosen_spanish: Date prisa
  alternatives_spanish:
  - Apresúrate
  - Hazlo de inmediato
  lexicon: HALOT
  rationale: El imperativo exige urgencia inmediata. «Date prisa» es natural en español y conserva el tono imperativo sin sonar arcaico.
- source_word: קַח
  english_pob_choice: take
  chosen_spanish: toma
  alternatives_spanish:
  - recibe
  - lleva
  lexicon: HALOT
  rationale: El verbo básico לקח se rinde de forma directa con «toma», que mantiene la secuencia de mandatos del rey.
- source_word: הַלְּבוּשׁ
  english_pob_choice: the robe
  chosen_spanish: el vestido
  alternatives_spanish:
  - la ropa
  - el manto
  lexicon: HALOT
  rationale: Aquí se refiere a la prenda real mencionada en el contexto inmediato. «Vestido» comunica la prenda sin forzar un término litúrgico posterior; «manto» sería posible, pero el texto no lo especifica.
- source_word: הַסּוּס
  english_pob_choice: the horse
  chosen_spanish: el caballo
  alternatives_spanish:
  - el caballo real
  - el corcel
  lexicon: HALOT
  rationale: El hebreo dice simplemente «el caballo». Mantener «el caballo» evita añadir un calificativo no explícito, aunque el contexto lo haga real.
- source_word: כַּאֲשֶׁר דִּבַּרְתָּ
  english_pob_choice: just as you have said
  chosen_spanish: tal como has dicho
  alternatives_spanish:
  - como has dicho
  - según has dicho
  lexicon: HALOT
  rationale: La comparación remite de forma directa a la propuesta previa de Amán. «Tal como has dicho» preserva esa correspondencia y suena natural en español.
- source_word: וַעֲשֵׂה כֵן
  english_pob_choice: and do so
  chosen_spanish: y haz así
  alternatives_spanish:
  - y hazlo así
  - y obre de ese modo
  lexicon: HALOT
  rationale: La construcción compacta se reproduce de manera breve. «Haz así» conserva la fuerza imperativa y evita una expansión innecesaria.
- source_word: לְמָרְדֳּכַי
  english_pob_choice: for Mordecai
  chosen_spanish: para Mardoqueo
  alternatives_spanish:
  - a Mardoqueo
  lexicon: HALOT
  rationale: 'El benefactivo se expresa naturalmente con «para» en español: «haz así para Mardoqueo». «A Mardoqueo» sería posible, pero menos claro aquí.'
- source_word: הַיְּהוּדִי
  english_pob_choice: the Jew
  chosen_spanish: el judío
  alternatives_spanish:
  - el judeano
  lexicon: HALOT
  rationale: En Ester, יהודי designa normalmente la identidad judía dentro de la narración. «El judío» es la forma clara y estándar en español.
- source_word: הַיּוֹשֵׁב בְּשַׁעַר הַמֶּלֶךְ
  english_pob_choice: who sits at the king’s gate
  chosen_spanish: que se sienta a la puerta del rey
  alternatives_spanish:
  - que está sentado a la puerta del rey
  - que habita a la puerta del rey
  lexicon: HALOT
  rationale: El participio describe la posición habitual de Mardoqueo. «Que se sienta» reproduce de modo natural la referencia continua sin volverla excesivamente rígida; «a la puerta» evita el calco de «en la puerta» y sigue la imagen idiomática del lugar de acceso real.
- source_word: אַל תַּפֵּל דָּבָר מִכֹּל אֲשֶׁר דִּבַּרְתָּ
  english_pob_choice: Leave out nothing from all that you have said
  chosen_spanish: No omitas nada de todo lo que has dicho
  alternatives_spanish:
  - No dejes caer ninguna palabra de todo lo que has dicho
  - No dejes fuera nada de todo lo que has dicho
  lexicon: HALOT
  rationale: El hebreo usa un modismo de «hacer caer» o dejar caer algo, pero el sentido es no omitir nada. «No omitas nada» expresa el valor idiomático con precisión y mantiene la totalidad del mandato.
theological_decisions:
- issue: La expresión honorífica sobre Mardoqueo no debe suavizarse ni explicitarse de más
  english_pob_reading: '"the Jew" marks Mordecai’s ethnic-religious identity within the story.'
  chosen_spanish_reading: '"el judío" mantiene la identidad étnico-religiosa en la narración.'
  alternative_spanish_readings:
  - '"el judeano"'
  - '"el hebreo"'
  rationale: En este pasaje la forma funciona como identificación narrativa dentro de Ester. «El judío» conserva esa función y evita una aclaración interpretativa innecesaria.
  doctrine_reference: Identidad del pueblo judío en el relato de Ester; no se introduce una carga teológica extra-textual.
- issue: El modismo final no debe traducirse literalmente de modo opaco ni perder la fuerza de totalidad
  english_pob_reading: '"Do not let a thing fall from all that you have said," an idiom meaning to omit nothing.'
  chosen_spanish_reading: '"No omitas nada de todo lo que has dicho" expresa el mandato completo sin perder el sentido idiomático.'
  alternative_spanish_readings:
  - '"No dejes caer nada de todo lo que has dicho"'
  - '"No dejes fuera nada de todo lo que has dicho"'
  rationale: 'La imagen hebrea de «caer» no es natural como dicha en español, pero el valor semántico sí lo es: no excluir nada. Se preserva la intensidad sin introducir una frase poco transparente.'
  doctrine_reference: Principio de equivalencia semántica en idiomatismos bíblicos; integridad del mandato del rey.
translation_notes:
  revision_awareness: Se ha seguido el texto hebreo WLC y el audit trail inglés con acuerdo alto; no hubo revisiones recientes que alteraran la lectura base. La decisión principal fue mantener la fuerza idiomática del último mandato en español sin calcar la metáfora de ‘caer’ de manera oscura.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando aparece el nombre divino; este versículo no lo contiene.
  - Se mantiene «Mardoqueo» para Mordecai y «Amán» para Haman siguiendo la ortografía española estándar del proyecto.
  - «Judío» se conserva como identidad narrativa, en línea con el uso establecido en Ester.
  - La estructura de mandatos breves reproduce el ritmo del hebreo sin añadir sujetos explícitos innecesarios.
