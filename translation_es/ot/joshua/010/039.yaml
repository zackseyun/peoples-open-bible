translation:
  language: es
  text: Y la capturaron, junto con su rey y todas sus ciudades; y los golpearon a filo de espada, y consagraron a destrucción[a] a toda persona que había en ella; no dejaron ningún sobreviviente. Como había hecho con Hebrón, así hizo con Debir y su rey, y como había hecho con Libna y su rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los destruyeron por completo»; hebreo: «los consagraron a destrucción», usando lenguaje de ḥerem para algo puesto bajo destrucción total.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּלְכְּדָהּ
  english_pob_choice: they captured it
  chosen_spanish: la capturaron
  alternatives_spanish:
  - la tomaron
  - la asediaron y la tomaron
  lexicon: HALOT
  rationale: לכד en contexto militar significa capturar o tomar por la fuerza. En español, «capturaron» conserva el sentido bélico sin añadir detalles no presentes en el hebreo.
- source_word: מַלְכָּהּ
  english_pob_choice: its king
  chosen_spanish: su rey
  alternatives_spanish:
  - el rey de ella
  - su monarca
  lexicon: HALOT
  rationale: El sufijo femenino concuerda con la ciudad; en español, «su rey» expresa naturalmente la relación posesiva sin forzar el género del referente.
- source_word: כָּל עָרֶיהָ
  english_pob_choice: all its towns
  chosen_spanish: todas sus ciudades
  alternatives_spanish:
  - todas sus aldeas
  - todos sus poblados
  lexicon: HALOT
  rationale: עיר puede ser ciudad o poblado. Aquí «ciudades» mantiene mejor el paralelo con los centros urbanos sometidos, y evita rebajar indebidamente el alcance del término.
- source_word: וַיַּכּוּם לְפִי חֶרֶב
  english_pob_choice: struck them with the edge of the sword
  chosen_spanish: los golpearon a filo de espada
  alternatives_spanish:
  - los mataron a filo de espada
  - los hirieron a filo de espada
  lexicon: HALOT
  rationale: La locución לְפִי חֶרֶב es literalmente «a la boca/filo de espada». «A filo de espada» preserva la imagen hebrea de manera idiomática y fiel en español.
- source_word: וַיַּחֲרִימוּ
  english_pob_choice: they devoted to destruction
  chosen_spanish: consagraron al anatema
  alternatives_spanish:
  - los destruyeron por completo
  - los entregaron a destrucción
  lexicon: HALOT
  rationale: חרם es un término técnico de destrucción consagrada. «Consagraron al anatema» conserva la fuerza cultual-judicial del hebreo y el valor tradicional del término, sin sustituirlo por una mera destrucción ordinaria.
- source_word: כָּל נֶפֶשׁ אֲשֶׁר בָּהּ
  english_pob_choice: every person who was in it
  chosen_spanish: toda persona que había en ella
  alternatives_spanish:
  - todo ser viviente que había en ella
  - cada alma que había en ella
  lexicon: HALOT
  rationale: נפש aquí refiere a personas/inhabitantes, no al alma inmaterial. «Toda persona» es claro y preciso; «había en ella» reproduce con naturalidad la locución locativa hebrea.
- source_word: לֹא הִשְׁאִיר שָׂרִיד
  english_pob_choice: they left no survivor
  chosen_spanish: no dejaron ningún sobreviviente
  alternatives_spanish:
  - no dejaron remanente
  - no dejaron a ningún sobreviviente
  lexicon: HALOT
  rationale: שָׂרִיד significa sobreviviente o remanente. «Sobreviviente» es la opción más directa y natural en español contemporáneo, y «ningún» refuerza el hebreo negativo absoluto.
- source_word: כַּאֲשֶׁר עָשָׂה לְחֶבְרוֹן כֵּן עָשָׂה
  english_pob_choice: Just as he had done to Hebron, so he did
  chosen_spanish: Como había hecho con Hebrón, así hizo
  alternatives_spanish:
  - Tal como había hecho con Hebrón, así hizo
  - Como hizo con Hebrón, así hizo
  lexicon: HALOT
  rationale: La fórmula comparativa marca un patrón de conquista repetido. El pluscuamperfecto «había hecho» ayuda a situar la acción previa antes de la comparación actual, como en el inglés auditado.
- source_word: לִדְבִרָהּ
  english_pob_choice: to Debir
  chosen_spanish: con Debir
  alternatives_spanish:
  - a Debir
  - contra Debir
  lexicon: HALOT
  rationale: Con עשה, la preposición ל puede funcionar idiomáticamente como complemento de referencia del acto realizado. En español, «con Debir» evita una duplicación dura de «hacer a» y mantiene la relación sin añadir matiz hostil no explicitado por la forma.
- source_word: וּלְמַלְכָּהּ
  english_pob_choice: and its king
  chosen_spanish: y con su rey
  alternatives_spanish:
  - y a su rey
  - y su rey
  lexicon: HALOT
  rationale: La coordinación conserva el paralelo con las ciudades conquistadas; «con su rey» suena natural en español y refleja la relación del rey con la ciudad sin necesidad de reiterar la preposición del hebreo.
- source_word: וְכַאֲשֶׁר עָשָׂה לְלִבְנָה וּלְמַלְכָּהּ
  english_pob_choice: and just as he had done to Libnah and its king
  chosen_spanish: y como había hecho con Libna y con su rey
  alternatives_spanish:
  - y tal como había hecho con Libna y con su rey
  - y como hizo con Libna y con su rey
  lexicon: HALOT
  rationale: Se mantiene el mismo patrón comparativo y la misma solución sintáctica que en la cláusula anterior para preservar la repetición retórica del hebreo.
theological_decisions:
- issue: Rendering of חרם warfare language
  english_pob_reading: devoted to destruction
  chosen_spanish_reading: consagraron al anatema
  alternative_spanish_readings:
  - los destruyeron por completo
  - los pusieron bajo anatema
  rationale: חרם es un término técnico que implica destrucción consagrada, no mera violencia militar. «Anatema» conserva la dimensión religiosa/judicial del término, mientras que «consagraron» reproduce la idea de dedicación bajo juicio; juntos expresan mejor el valor de ḥerem que una simplificación como «destruyeron por completo».
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Narrative number shifts between plural and singular
  english_pob_reading: 'retain both: plural for the collective actions, singular for ''he left no survivor'' and comparison clauses'
  chosen_spanish_reading: preservar el plural en las acciones colectivas y la estructura comparativa, sin imponer un singular artificial
  alternative_spanish_readings:
  - regularizar todo en plural
  - regularizar todo en singular
  rationale: El hebreo alterna entre formas plurales y comparativas con sujeto implícito. El español puede mantener la secuencia narrativa sin forzar una uniformidad que borre la textura del texto fuente.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió el último verbo a plural («they left no survivor») para armonizarlo con la serie de acciones plurales. En español se optó por una redacción plural coherente en toda la secuencia narrativa, conservando la fuerza del hebreo sin introducir un quiebre de número innecesario.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como término por defecto para el nombre divino en el proyecto; este versículo no lo contiene.
  - Se usó «anatema» para preservar el término técnico ḥerem, con nota explicativa para lectores que prefieran una glosa más explícita.
  - Se conservó el paralelismo repetido «Como había hecho... así hizo...» para reflejar la estructura retórica del hebreo.
  - «Ciudades» se eligió como término neutro y bíblicamente comprensible para עָרִים en este contexto militar.
  - Se evitó «Señor» o «Cristo» porque no aparecen en el texto base.
