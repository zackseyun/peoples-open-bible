translation:
  language: es
  text: Entonces los hijos de Benjamín se reunieron detrás de Abner[a], formaron un solo grupo[b] y tomaron posición en la cima de una sola colina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'siguiendo a Abner'. La expresión hebrea puede indicar tanto posición espacial ('detrás de') como secuencia o lealtad ('después de, siguiendo a').
    reason: lexical_alternative
  - marker: b
    text: O 'una sola banda' o 'una sola compañía'. El término hebreo se refiere a un grupo unido y cohesionado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְקַבְּצוּ
  english_pob_choice: gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: HALOT
  rationale: El hitpael de קבץ expresa reunión colectiva o reagrupamiento. En español, 'se reunieron' comunica de manera natural esa acción conjunta sin perder la idea de ensamblarse como grupo.
- source_word: בְנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  - los hombres de Benjamín
  lexicon: HALOT
  rationale: Se conserva la expresión hebrea literal de parentesco, como en el audit trail inglés, porque el texto fuente dice 'hijos de Benjamín' y no requiere una etnónimo más libre.
- source_word: אַחֲרֵי אַבְנֵר
  english_pob_choice: behind Abner
  chosen_spanish: detrás de Abner
  alternatives_spanish:
  - tras Abner
  - siguiendo a Abner
  lexicon: HALOT
  rationale: La preposición puede ser espacial ('detrás') o de seguimiento/alineación ('después de, siguiendo a'). En español, 'detrás de Abner' mantiene la imagen espacial del hebreo y deja abierta la lectura de adhesión al mando.
- source_word: לַאֲגֻדָּה אֶחָת
  english_pob_choice: one band
  chosen_spanish: un solo grupo
  alternatives_spanish:
  - una sola banda
  - una sola compañía
  lexicon: HALOT
  rationale: אֲגֻדָּה designa una unidad cohesionada. 'Un solo grupo' suena natural en español y conserva el énfasis en la unidad; 'banda' puede sonar demasiado técnico o ambiguo en español moderno.
- source_word: וַיַּעַמְדוּ
  english_pob_choice: took their stand
  chosen_spanish: se pusieron de pie
  alternatives_spanish:
  - tomaron posición
  - se plantaron
  lexicon: HALOT
  rationale: El verbo עמד aquí puede implicar tomar posición en un contexto narrativo bélico. 'Se pusieron de pie' conserva el acto de colocarse en posición, sin añadir demasiado explicativamente una connotación militar que el hebreo no explicita por sí sola.
- source_word: עַל רֹאשׁ גִּבְעָה אֶחָת
  english_pob_choice: on the top of one hill
  chosen_spanish: sobre la cima de una sola colina
  alternatives_spanish:
  - en la cima de una colina
  - sobre la cumbre de una colina
  lexicon: HALOT
  rationale: רֹאשׁ en uso topográfico significa 'cima' o 'parte superior'. 'Una sola colina' preserva el numeral אֶחָת y refleja la simplicidad del hebreo. 'Cima' es más idiomático en español que 'cabeza' en este contexto.
translation_notes:
  revision_awareness: El contexto inglés fue revisado y quedó sin cambios; la concordancia general con la fuente hebrea es alta, por lo que esta versión española sigue de cerca el sentido base y conserva las alternativas léxicas relevantes documentadas por el POB en inglés.
  spanish_consistency_notes:
  - Se mantiene 'Benjamín' como nombre propio y no se etnónimo libre.
  - Se usa 'Yahvé' sólo cuando el hebreo lo exige; este versículo no lo contiene.
  - Se conserva la ambigüedad de אַחֲרֵי con una nota alternativa, en línea con el audit trail inglés.
  - '''Grupo'' evita un falso amigo o una connotación excesivamente militarizada que ''banda'' puede tener en español moderno.'
