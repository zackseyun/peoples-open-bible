    text: O «para acostarse con él». El verbo hebreo se refiere específicamente a un acto sexual, literalmente con la idea de montar.
    reason: lexical_alternative
  - marker: b
    text: O «su culpa de sangre estará sobre ellos». El modismo expresa que la responsabilidad por su muerte recae sobre ellos mismos.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige tres puntos: hace explícito el sentido sexual de רבע sin usar un giro vulgar («aparearse con él»), reemplaza una pasiva poco idiomática por una fórmula penal natural en español («se les dará muerte»), y restituye el modismo de responsabilidad legal con una imagen estática más cercana al hebreo («su sangre estará sobre ellos»).'
