revisions:
- from: Con cipreses de Senir construyeron todas tus planchas[a][b]; tomaron un cedro del Líbano para hacer un mástil para ti.
  to: Con cipreses de Senir[a][b] construyeron toda tu tablazón; tomaron un cedro del Líbano para hacerte un mástil.
  rationale: Se reemplaza 'todas tus planchas' por 'toda tu tablazón' para reflejar mejor el sentido colectivo de 'planking' en contexto naval. Se cambia 'para hacer un mástil para ti' por 'para hacerte un mástil' para evitar repetición y lograr un español más natural, manteniendo la relación de segunda persona femenina implícita en el hebreo.
