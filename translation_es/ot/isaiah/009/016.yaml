  text: Therefore the Lord does not rejoice over their young men[a], and he does not have compassion on their fatherless and their widows; for every one of them is godless and an evildoer, and every mouth speaks folly. For all this his anger has not turned away[b], and his hand is still stretched out.
  footnotes:
