translation:
  language: es
  text: y cuando el pecado que cometieron llegue a ser conocido[a], la asamblea ofrecerá un toro del ganado como sacrificio por el pecado, y lo traerá ante la tienda de reunión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo חַטָּאת (ḥaṭṭa''t) aparece dos veces en este versículo: primero con el sentido de ''pecado'' y luego con el de ''sacrificio por el pecado''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנֽוֹדְעָה
  english_pob_choice: becomes known
  chosen_spanish: llegue a ser conocido
  alternatives_spanish:
  - se haga conocido
  - sea conocido
  - llegue a conocerse
  lexicon: HALOT
  rationale: 'El nifal de ידע aquí es pasivo/incoativo: el pecado pasa a ser conocido. ''Llegue a ser conocido'' conserva ese valor sin añadir un agente explícito ni sonar demasiado literal en español.'
- source_word: הַחַטָּאת
  english_pob_choice: the sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - el pecado cometido
  - la ofensa
  - el sacrificio por el pecado
  lexicon: HALOT
  rationale: Aquí חטאת se refiere al acto culpable descubierto, no al sacrificio. 'Pecado' mantiene la tensión léxica que el hebreo crea al usar la misma raíz después con sentido sacrificial.
- source_word: אֲשֶׁר חָטְאוּ עָלֶיהָ
  english_pob_choice: that they committed
  chosen_spanish: que cometieron
  alternatives_spanish:
  - en que pecaron
  - por el cual pecaron
  - que incurrieron en él
  lexicon: HALOT
  rationale: En español, 'cometer' enlaza naturalmente con 'pecado' y transmite la acción culpable sin forzar el hebreo preposicional על de manera artificial.
- source_word: הַקָּהָל
  english_pob_choice: the assembly
  chosen_spanish: la asamblea
  alternatives_spanish:
  - la congregación
  - la comunidad
  lexicon: HALOT
  rationale: '''Asamblea'' reproduce bien el sentido corporativo y cultual de קהל y evita un término demasiado eclesiástico o denominacionalizado.'
- source_word: וְהִקְרִיבוּ
  english_pob_choice: shall offer
  chosen_spanish: ofrecerá
  alternatives_spanish:
  - presentará
  - traerá
  - hará presentar
  lexicon: HALOT
  rationale: En contexto sacrificial, הקריב se traduce mejor como 'ofrecer'. En español, el singular verbal concuerda con 'la asamblea' como sujeto colectivo.
- source_word: פַּר בֶּן בָּקָר
  english_pob_choice: a bull, a son of the herd
  chosen_spanish: un toro, un hijo del ganado
  alternatives_spanish:
  - un toro del ganado
  - un novillo
  - un toro, hijo del ganado
  lexicon: HALOT
  rationale: La expresión literal 'hijo del ganado' preserva בן בָקָר sin sustituirla por una equivalencia más libre. 'Toro' comunica el animal sacrificial con claridad en español.
- source_word: לְחַטָּאת
  english_pob_choice: as a sin offering
  chosen_spanish: como sacrificio por el pecado
  alternatives_spanish:
  - como ofrenda por el pecado
  - como sacrificio expiatorio
  - como expiación
  lexicon: HALOT
  rationale: '''Sacrificio por el pecado'' comunica la función sacrificial de חטאת sin imponer un tecnicismo que pudiera ocultar el vínculo con el primer ''pecado'' del versículo.'
- source_word: וְהֵבִיאוּ אֹתוֹ
  english_pob_choice: and bring it
  chosen_spanish: y lo llevará
  alternatives_spanish:
  - y lo traerá
  - y lo presentará
  - y lo llevarán
  lexicon: HALOT
  rationale: La forma verbal hebrea es plural; en español, 'la asamblea' funciona como sujeto colectivo singular y permite una traducción fluida. 'Lo llevará' mantiene la referencia al animal y evita repetición innecesaria.
- source_word: לִפְנֵי אֹהֶל מוֹעֵד
  english_pob_choice: before the tent of meeting
  chosen_spanish: delante de la tienda de reunión
  alternatives_spanish:
  - ante la tienda de reunión
  - frente a la tienda de reunión
  - delante del tabernáculo de reunión
  lexicon: HALOT
  rationale: '''Tienda de reunión'' sigue de cerca אֹהֶל מוֹעֵד y es más transparente que ''tabernáculo'', que introduce una tradición terminológica no exigida por el hebreo.'
theological_decisions:
- issue: El doble uso de חטאת en un mismo versículo
  english_pob_reading: First occurrence means 'sin'; second occurrence means 'sin offering'.
  chosen_spanish_reading: 'Primera ocurrencia: ''pecado''; segunda: ''sacrificio por el pecado''.'
  alternative_spanish_readings:
  - 'Primera y segunda ocurrencia: ''sacrificio por el pecado'''
  - 'Primera y segunda ocurrencia: ''pecado'''
  - '''ofensa'' / ''ofrenda por el pecado'''
  rationale: 'El versículo usa la misma palabra hebrea con dos sentidos contextuales distintos. Mantener esa distinción en español evita borrar la tensión léxica y hace visible la lógica del texto: primero se identifica la culpa, luego se prescribe el sacrificio.'
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'present' por 'offer' y ajustó 'a bull from the herd' a una formulación más literal. La propuesta española sigue esa revisión al usar 'ofrecerá' y al conservar ambos componentes de פַּר בֶּן בָּקָר con una solución que refleja tanto el animal como la relación de pertenencia al ganado.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino.
  - Se preserva 'tienda de reunión' para אֹהֶל מוֹעֵד, coherente con el léxico cultual del proyecto.
  - '''Sacrificio por el pecado'' mantiene la ambigüedad controlada de חטאת sin borrar el contraste entre pecado y ofrenda.'
  - La asamblea se traduce en singular verbal en español por concordancia natural, aunque el hebreo use verbo plural.
