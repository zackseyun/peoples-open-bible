  to: Hizo lo recto ante los ojos de Yahvé, conforme a todo lo que había hecho su padre Uzías, excepto que no entró en el templo de Yahvé[a]. Pero el pueblo todavía actuaba corruptamente[b].
  rationale: Se elimina la nota innecesaria en 'lo recto' y se ajusta la cláusula final para reflejar mejor el matiz continuo y conductual del hebreo מַשְׁחִיתִים, en consonancia con la auditoría inglesa. Se conserva la nota sobre la entrada al templo y se añade una nota lexical apropiada a la cláusula final, con marcadores correctamente anclados en el texto.
