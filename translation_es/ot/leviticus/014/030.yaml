    issue: '''según lo que alcance su mano'' es una reproducción demasiado literal del modismo hebreo.'
    rationale: Aunque el hebreo literalmente habla de la 'mano', en español esta formulación no es idiomática y puede distraer o confundir. El inglés POB ya resolvió el modismo hacia capacidad económica en el texto principal; el español debe hacer lo mismo y reservar la literalidad para la nota.
  - severity: low
    issue: '''tórtolos'' es menos natural que ''tórtolas'' en español bíblico general.'
    rationale: תֹּרִים se refiere a turtledoves. En español eclesial y general, 'tórtolas' es la forma más reconocible y natural; 'tórtolos' puede sonar marcado o innecesariamente raro.
  revised_spanish_text: Y ofrecerá una de las tórtolas o uno de los pichones,[a] según lo que pueda costear—
