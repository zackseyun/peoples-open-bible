revisions:
- from: Así como no sabes cuál es el camino del viento[a], ni cómo se forman los huesos en el vientre de la mujer encinta[b], así tampoco sabes la obra de Dios, el que hace todo.
  to: Así como no sabes cuál es el camino del viento[a], ni cómo se forman los huesos en el vientre de la mujer encinta[b], así no sabes la obra de Dios, que hace todas las cosas.
  rationale: La revisión mantiene todas las decisiones léxicas centrales del original y del POB inglés, pero corrige la sintaxis final para un español más natural y fiel. ‘Que hace todas las cosas’ expresa con mayor claridad la relativa que describe a Dios, evitando la construcción algo rígida ‘el que hace todo’. También se suaviza ‘así tampoco’ a ‘así’, sin pérdida de sentido.
