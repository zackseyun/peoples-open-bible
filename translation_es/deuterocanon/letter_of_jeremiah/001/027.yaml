revisions:
- from: Y sus sacerdotes, tomando de nuevo sus sacrificios, se aprovechan de ellos; asimismo sus mujeres, preservando algo de ellos[a], no dan nada ni al pobre ni al desamparado.
  to: Y sus sacerdotes[a], tomando de nuevo sus sacrificios, se aprovechan de ellos; asimismo sus mujeres, conservando parte de ellas[b], no dan nada ni al pobre ni al desamparado.
  rationale: Se ajusta «preservando» a «conservando» por naturalidad y precisión idiomática en español, se mejora la referencia con «parte de ellas», y se añade la nota cultural presente en el rastro inglés para ταριχεύουσαι. Se mantiene la nota léxica sobre ἀποδιδόμενοι y el resto del sentido original.
