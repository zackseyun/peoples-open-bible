translation:
  language: es
  text: Durante muchos días[a] Josué hizo guerra contra todos estos reyes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Josué hizo guerra contra todos estos reyes por mucho tiempo". El hebreo dice literalmente "muchos días" y usa el modismo "hizo guerra".'
    reason: lexical_alternative
lexical_decisions:
- source_word: יָמִים רַבִּים
  english_pob_choice: for many days
  chosen_spanish: por muchos días
  alternatives_spanish:
  - durante muchos días
  - por largo tiempo
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente 'muchos días' y funciona como un modismo temporal de duración prolongada. 'Por muchos días' conserva esa forma y suena natural en español.
- source_word: עָשָׂה
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - libró
  - combatió
  lexicon: HALOT
  rationale: En la locución עשה מלחמה, el verbo básico 'hacer' se mantiene con fidelidad en español como 'hizo guerra'. 'Libró' o 'combatió' explicitan más el sentido, pero se alejan del giro hebreo.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  lexicon: standard proper name rendering
  rationale: Se usa la forma castellana establecida del nombre propio.
- source_word: אֶת כָּל הַמְּלָכִים הָאֵלֶּה
  english_pob_choice: against all these kings
  chosen_spanish: contra todos estos reyes
  alternatives_spanish:
  - con todos estos reyes
  - a todos estos reyes
  lexicon: HALOT
  rationale: El hebreo combina el objeto directo con el modismo de guerra; en español la preposición 'contra' expresa mejor la hostilidad inherente al contexto. 'Con' sería ambiguo y 'a' menos natural en este giro.
- source_word: מִלְחָמָה
  english_pob_choice: war
  chosen_spanish: guerra
  alternatives_spanish:
  - batalla
  - campaña
  lexicon: HALOT
  rationale: '''Guerra'' reproduce el sustantivo general del hebreo y encaja con la locución verbal ''hizo guerra''. ''Batalla'' sería más puntual y ''campaña'' introduce una idea más interpretativa.'
translation_notes:
  revision_awareness: El texto en inglés y el control cruzado muestran alta concordancia y no requieren revisión sustantiva; se conserva el modismo hebreo de duración y la construcción verbal literal dentro de una sintaxis española natural.
  spanish_consistency_notes:
  - Se mantiene 'Josué' como forma estándar del nombre propio.
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino.
  - '''Hizo guerra'' conserva la fuerza idiomática de עשה מלחמה sin añadir matices no presentes en el hebreo.'
