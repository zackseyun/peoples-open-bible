base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/012/014.yaml
  text: 'Thus says Yahweh concerning all my wicked neighbors who touch the inheritance that I caused my people Israel to inherit: behold[a], I am about to uproot them from upon their land[b], and I will uproot the house of Judah from among them.'
  footnotes:
  - marker: a
    text: Or 'who encroach on the inheritance'—the Hebrew literally says 'who touch the inheritance,' with hostile interference implied by context.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will pluck them up.' The Hebrew verb is a recurring Jeremiah image for uprooting in judgment.
    reason: lexical_alternative
