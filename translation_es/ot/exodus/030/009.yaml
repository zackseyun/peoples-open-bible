review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la prohibición de ofrecer sobre el altar incienso no prescrito, holocausto, ofrenda de cereal y libación. La nota sobre זָרָה está bien orientada al matiz cultual de ''no autorizado''. Sin embargo, hay un problema de concordancia verbal: el hebreo usa segunda persona plural en ambos verbos, mientras que el español usa singular (''ofrecerás'', ''derramarás'').'
  spanish_quality_summary: El español es claro y digno, pero conviene ajustar la persona verbal al plural y mejorar la naturalidad de 'ofrenda vegetal', que suena menos precisa que 'ofrenda de grano' o 'ofrenda de cereal' en contexto sacrificial. 'Libación' es aceptable y preciso. La serie negativa con 'ni' funciona bien en español.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Incienso no autorizado' sigue adecuadamente la decisión POB para זָרָה. 'Holocausto' es apropiado para עֹלָה. Para מִנְחָה, 'ofrenda de grano' alinea mejor con 'grain offering' que 'ofrenda vegetal'.
  issues:
  - severity: high
    issue: Cambio indebido de segunda persona plural a singular
    rationale: 'תַעֲלוּ y תִסְּכוּ son formas de segunda persona plural. El español debe conservar ese número: ''ofrecerán/derramarán'' sería futuro, pero en mandato legal bíblico natural conviene ''no ofrecerán... no derramarán'' o ''no ofreceréis... no derramaréis''; en español latinoamericano neutral, ''no ofrecerán'' dirigido a ustedes es aceptable, pero más directo es ''no ofrecerán'' menos imperativo. La mejor solución de registro bíblico neutral es ''No ofrecerán...'' si se mantiene el patrón de futuros legales, o ''No ofrezcan...'' si se actualiza el modo. Dado el estilo del borrador y del inglés, se prefiere ''No ofrecerán... no derramarán''.'
  - severity: medium
    issue: '''Ofrenda vegetal'' es menos precisa para מִנְחָה'
    rationale: Aunque comprensible, 'ofrenda vegetal' puede sonar amplia o moderna. En este contexto cultual, מִנְחָה se refiere específicamente a una ofrenda de cereal/grano. 'Ofrenda de grano' comunica mejor el sentido y sigue más de cerca la decisión inglesa auditada.
  revised_spanish_text: No ofrecerán sobre él incienso no autorizado[a], ni holocausto, ni ofrenda de grano; y no derramarán sobre él libación.
  revised_footnotes:
  - marker: a
    text: O «incienso extraño» o «incienso extranjero». El adjetivo hebreo puede referirse a algo fuera de lo permitido o prescrito en este contexto cultual.
    reason: lexical_alternative
  revision_rationale: Se corrige la persona verbal de singular a plural para reflejar fielmente las formas hebreas de segunda persona plural. También se sustituye 'ofrenda vegetal' por 'ofrenda de grano' para representar con mayor precisión מִנְחָה y alinearse mejor con la decisión léxica auditada en inglés. Se mantiene 'incienso no autorizado' y la nota correspondiente, así como 'libación', por ser fieles y naturales en este contexto.
