translation:
  language: es
  text: Por tanto, Yahvé oyó y se enfureció[a]; y se encendió un fuego contra Jacob[b][c], y también subió la ira contra Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue provocado a ira».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «en Jacob» y «en Israel»; aquí se traduce «contra» por el contexto hostil de juicio divino.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «y se encendió un fuego contra Jacob, y también subió la ira».'
    reason: previous_rendering
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - Entonces
  lexicon: HALOT
  rationale: Conserva el valor inferencial/consecutivo del hebreo, con un español natural y digno para iniciar la consecuencia de lo anterior.
- source_word: שָׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - oyó atentamente
  lexicon: HALOT
  rationale: ‘Oír’ mantiene la referencia directa al verbo de percepción auditiva sin añadir un matiz explicativo que no está en el hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, preservando el nombre propio del texto hebreo en vez de sustituirlo por un título.
- source_word: וַיִּתְעַבָּר
  english_pob_choice: was enraged
  chosen_spanish: se enfureció
  alternatives_spanish:
  - se airó
  - fue provocado a ira
  - se enojó
  lexicon: HALOT
  rationale: El valor intenso de la forma se conserva con una expresión idiomática fuerte en español, sin suavizar la ira divina.
- source_word: אֵשׁ
  english_pob_choice: a fire
  chosen_spanish: fuego
  alternatives_spanish:
  - una llama
  - un fuego
  lexicon: HALOT
  rationale: En español, el sustantivo sin artículo suena más natural dentro del paralelismo poético; la imagen de juicio permanece sin interpretarla.
- source_word: נִשְּׂקָה
  english_pob_choice: was kindled
  chosen_spanish: se encendió
  alternatives_spanish:
  - fue encendido
  - ardió
  lexicon: HALOT
  rationale: ‘Encenderse’ reproduce el sentido pasivo/incoativo de la imagen y funciona bien con ‘fuego’ en español bíblico contemporáneo.
- source_word: בְיַעֲקֹב
  english_pob_choice: against Jacob
  chosen_spanish: contra Jacob
  alternatives_spanish:
  - en Jacob
  - entre Jacob
  lexicon: HALOT
  rationale: Aunque el hebreo usa la preposición ב, el contexto hostil/judicial requiere en español una relación adversativa que preserve el sentido de juicio dirigido al pueblo.
- source_word: וְגַם
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - también
  - y además
  lexicon: HALOT
  rationale: Mantiene el valor aditivo y el paralelismo entre las dos cláusulas de ira y fuego.
- source_word: אַף
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - enojo
  - cólera
  lexicon: HALOT
  rationale: ‘Ira’ es la opción más sobria y reconocible para el término idiomático, conservando la fuerza teológica del juicio divino.
- source_word: עָלָה
  english_pob_choice: rose
  chosen_spanish: subió
  alternatives_spanish:
  - ascendió
  - se levantó
  lexicon: HALOT
  rationale: Preserva la metáfora vertical del hebreo de manera directa y comprensible en español.
- source_word: בְיִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - en Israel
  - entre Israel
  lexicon: HALOT
  rationale: Se sigue el mismo tratamiento que en ‘contra Jacob’, porque el paralelo poético presenta la misma dirección hostil/judicial.
theological_decisions:
- issue: Lenguaje de la ira divina sin suavización
  english_pob_reading: 'Retain strong wrath language: ''was enraged'' and ''anger also rose against Israel.'''
  chosen_spanish_reading: 'Conservar un lenguaje fuerte: ''se enfureció'' y ''también subió la ira contra Israel''.'
  alternative_spanish_readings:
  - se disgustó
  - estuvo molesto
  - se airó
  rationale: El hebreo presenta una respuesta divina intensa ante la queja e incredulidad de Israel; la versión española debe mantener esa carga sin diluirla.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Imagen del fuego como juicio
  english_pob_reading: Keep 'a fire was kindled against Jacob' in the main text without resolving whether it is literal or metaphorical.
  chosen_spanish_reading: Mantener 'fuego se encendió contra Jacob' sin decidir si es literal o figurado.
  alternative_spanish_readings:
  - se encendió un fuego de juicio contra Jacob
  - una llama literal se encendió
  rationale: El texto presenta la imagen de fuego como expresión del juicio divino, pero no obliga al traductor a cerrar la tensión entre literalidad y metáfora.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El audit trail inglés revisó una redacción anterior con 'for a fire' a 'and a fire' para reflejar mejor la conjunción hebrea; la presente versión española conserva ese paralelismo con 'y fuego se encendió'. También se mantiene la decisión de no suavizar la ira divina ni resolver la imagen del fuego como literal o metafórica.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como forma preferida del nombre divino en todo el proyecto.
  - Se conserva el paralelismo poético con dos miembros coordinados por 'y'.
  - '''Contra'' se usa de manera consistente para el ב hostil en este versículo, siguiendo el sentido judicial del contexto.'
  - '''Ira'' y ''se enfureció'' preservan la tensión semántica entre la reacción divina y su expresión poética.'
