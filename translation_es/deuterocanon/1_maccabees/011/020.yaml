review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: Jonatán reúne gente de Judea con el propósito de hacer guerra contra la ἄκρα en Jerusalén, y luego construyen πολλὰς μηχανάς contra ella. Sin embargo, hay dos ajustes de fidelidad y naturalidad: «los que eran de Judea» suena menos preciso e idiomático que «los de Judea»/«los de Judea» para τοὺς ἐκ τῆς Ἰουδαίας, y la nota «fortaleza fortificada» es redundante y no representa bien la explicación inglesa de ''fortified stronghold''.'
  spanish_quality_summary: El texto es claro y mayormente natural, pero puede mejorarse con español más fluido y eclesialmente legible. «Para guerrear contra» es comprensible, aunque «para hacer guerra contra» refleja mejor la fuerza del griego y la decisión auditada en inglés. «Levantaron ... máquinas de asedio» no es incorrecto, pero «construyeron» suena más directo y transparente para lectores contemporáneos. La nota al pie necesita una redacción más natural.
  glossary_alignment: No hay términos teológicos del glosario principal en juego. La decisión «ciudadela[a]» para τὴν ἄκραν concuerda con la preferencia del POB, conservando «el Acra» en nota. «Máquinas de asedio» también está bien alineado con el audit trail inglés.
  issues:
  - severity: medium
    issue: «los que eran de Judea» es poco idiomático para τοὺς ἐκ τῆς Ἰουδαίας
    rationale: El griego significa 'los de/procedentes de Judea'. La formulación actual suena pesada en español y puede sugerir identidad esencial más que procedencia. «Los de Judea» preserva mejor la elipsis del original y mejora la naturalidad.
  - severity: medium
    issue: La nota «la fortaleza fortificada de Jerusalén» es redundante y semánticamente torpe
    rationale: El inglés auditado dice 'the fortified stronghold in Jerusalem'. En español, «fortaleza fortificada» repite la idea. Conviene algo como «la fortaleza de Jerusalén» o «la fortaleza fortificada en Jerusalén»; la primera es más natural y suficiente en esta nota alternativa.
  - severity: low
    issue: «para guerrear contra» puede sonar menos natural que «para hacer guerra contra»
    rationale: Aunque «guerrear» existe, la decisión inglesa documenta específicamente la fuerza de 'make war against'. «Hacer guerra contra» la reproduce con más transparencia y mejor dignidad en español bíblico moderno.
  - severity: low
    issue: «levantaron ... muchas máquinas de asedio» es menos claro que «construyeron»
    rationale: ποιέω con μηχαναί aquí apunta a fabricar/construir artefactos militares. «Construyeron» transmite la acción con mayor claridad al lector moderno sin perder sentido.
  revised_spanish_text: En aquellos días, Jonatán reunió a los de Judea para hacer guerra contra la ciudadela[a] que estaba en Jerusalén; y construyeron contra ella muchas máquinas de asedio.
  revised_footnotes:
  - marker: a
    text: O «el Acra», la fortaleza de Jerusalén.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para mejorar la naturalidad del español y alinearlo más estrechamente con las decisiones léxicas auditadas: «los de Judea» por procedencia elíptica, «hacer guerra contra» para reflejar mejor ἐκπολεμῆσαι, y «construyeron» para ποιέω con μηχαναί. La nota se simplifica para evitar redundancia y conservar la alternativa técnica «el Acra».'
