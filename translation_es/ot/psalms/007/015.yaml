  text: הִנֵּ֥ה יְחַבֶּל אָ֑וֶן וְ/הָרָ֥ה עָ֝מָ֗ל וְ/יָ֣לַד שָֽׁקֶר־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/007/015.yaml
  text: Look[a], he conceives trouble, and he is pregnant with misery[e][d][c][b], and he gives birth to falsehood.
  footnotes:
  - marker: a
    text: Or 'Behold, he writhes with iniquity'; the opening verb can be understood with labor pains rather than conception, but the surrounding imagery of pregnancy and birth supports the rendering 'conceives.'
    reason: lexical_alternative
  - marker: b
    text: '''Trouble'' (אָוֶן) may also be rendered ''iniquity'' or ''wickedness.'''
    reason: lexical_alternative
  - marker: c
    text: '''Misery'' (עָמָל) may also be rendered ''mischief'' or ''trouble.'''
    reason: lexical_alternative
  - marker: d
    text: '''Falsehood'' (שָׁקֶר) may also be rendered ''deceit'' or ''a lie.'''
    reason: lexical_alternative
  - marker: e
    text: Or 'conceives'.
    reason: previous_rendering
