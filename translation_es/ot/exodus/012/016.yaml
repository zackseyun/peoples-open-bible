    text: Or 'a sacred assembly' or traditionally 'a holy convocation.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'for every nephesh,' that is, for every person; not specifically 'soul' in the modern English sense.
    reason: lexical_alternative
  - marker: c
    text: Literally 'it alone shall be done for you'; the sense is that only food preparation necessary for eating is permitted on those days.
    reason: lexical_alternative
