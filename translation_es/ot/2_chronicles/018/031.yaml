base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/018/031.yaml
  text: And it happened that when the commanders of the chariots saw Jehoshaphat[a], they said, “It is the king of Israel.” So they turned against him to fight, but Jehoshaphat cried out, and Yahweh helped him[b], and God drew them away from him.
  footnotes:
  - marker: a
    text: Or “He is the king of Israel.”
    reason: lexical_alternative
  - marker: b
    text: Or “God diverted them from him.” The Hebrew verb can mean to turn or move someone away from a target.
    reason: lexical_alternative
