    text: Tradicionalmente, «pectoral». Se usa aquí para el objeto sacerdotal y para evitar la impresión de una pieza de armadura.
    reason: lexical_alternative
  revision_rationale: 'Se revisa para reflejar mejor las decisiones léxicas auditadas: «hábil diseñador» conserva la idea de trabajo diseñado de מַעֲשֵׂה חֹשֵׁב; «hilo escarlata» mantiene el valor textil explícito de וְתוֹלַעַת שָׁנִי; y «lino fino torcido» suena más natural en español mientras preserva ambos componentes de וְשֵׁשׁ מָשְׁזָר. Se mantiene «pectoral» y «efod» como buenas soluciones cultuales en español.'
