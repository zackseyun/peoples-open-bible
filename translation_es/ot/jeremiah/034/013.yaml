review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del hebreo: fórmula profética, nombre divino «Yahvé», identificación pactual «el Dios de Israel», pacto con los padres, referencia al éxodo y continuación con «diciendo». Sin embargo, las notas al pie no preservan correctamente el rastro de auditoría inglés: la nota [a] está anclada a «casa de esclavos» aunque en español ese giro ya está en el texto principal y la nota inglesa [a] corresponde a «cut a covenant»; además falta la alternativa tradicional/lexical para «de la casa de esclavos».'
  spanish_quality_summary: 'El español es claro, natural y de buen registro bíblico. «Así dice Yahvé» y «el día en que los saqué» suenan bien. El único ajuste importante es la gestión de notas: conviene anclar [a] en «hice un pacto» para conservar la literalidad hebrea «corté un pacto», y [b] en «casa de esclavos» para reflejar la alternativa «casa de servidumbre».'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé»; עֲבָדִים -> «esclavos», sin suavizar; Dios/Israel correctamente; no hay conflicto doctrinal. «Pacto» es aceptable para בְּרִית en este contexto. El problema no es terminológico principal sino de correspondencia de notas con las decisiones léxicas auditadas.'
  issues:
  - severity: medium
    issue: La nota [a] está mal asignada.
    rationale: En el audit trail inglés, la nota [a] preserva la literalidad de כָּרַתִּי בְרִית («cut a covenant»). En el borrador español, [a] se coloca en «casa de esclavos» y repite literalmente lo que ya dice el texto principal, por lo que no aporta la alternativa significativa del fuente.
  - severity: medium
    issue: Falta una nota léxica para «de la casa de esclavos».
    rationale: El inglés conserva como alternativa «house of bondage». En español conviene preservar «casa de servidumbre» como alternativa tradicional y útil, especialmente porque «casa de esclavos» puede sonar abrupto pero es correcto.
  - severity: low
    issue: La nota [b] sobre «diciendo» no sigue la prioridad del rastro auditado.
    rationale: Aunque «como sigue» es una alternativa posible, la nota inglesa [b] no trata לֵאמֹר sino מִבֵּית עֲבָדִים. Debe priorizarse la equivalencia documentada por el POB.
  revised_spanish_text: 'Así dice Yahvé, el Dios de Israel: Yo hice un pacto[a] con sus padres el día en que los saqué de la tierra de Egipto, de la casa de esclavos[b], diciendo,'
  revised_footnotes:
  - marker: a
    text: Hebreo literalmente, «corté un pacto».
    reason: lexical_alternative
  - marker: b
    text: 'O: «de la casa de servidumbre». El hebreo es literalmente «de la casa de esclavos».'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal casi intacto por su fidelidad y naturalidad, pero se corrige la colocación y el contenido de las notas para que reflejen las alternativas léxicas realmente documentadas en el fuente y en el audit trail inglés.
