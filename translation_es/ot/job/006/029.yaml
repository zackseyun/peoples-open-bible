    rationale: La nota alternativa explica la segunda mitad del versículo, no «por favor». Debe anclarse donde aparece la alternativa correspondiente, idealmente en la segunda repetición del imperativo o en la cláusula final.
  - severity: low
    issue: «Vuélvanse» suena menos natural que «Vuelvan»
    rationale: En español general, para una exhortación a reconsiderar o volver sobre el asunto, «Vuelvan» fluye mejor y evita un matiz reflexivo innecesario.
  - severity: low
    issue: La nota [b] es innecesaria
    rationale: El POB inglés no conserva una nota específica para «my righteousness», y el texto español principal ya mantiene la ambigüedad adecuada con «mi justicia». Añadir esa nota introduce explicación extra no requerida.
