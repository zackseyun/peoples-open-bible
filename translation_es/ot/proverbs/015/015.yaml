translation:
  language: es
  text: Todos los días del afligido[a] son malos, pero un corazón alegre[b] es un banquete continuo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el pobre' para 'el afligido'; el hebreo עָנִי puede referirse a quien es pobre, afligido u oprimido.
    reason: lexical_alternative
  - marker: b
    text: O 'un corazón bueno' para 'un corazón alegre'; la expresión hebrea se refiere a una disposición interior de alegría o bienestar.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל יְמֵי
  english_pob_choice: All the days of
  chosen_spanish: Todos los días de
  alternatives_spanish:
  - Todos los días del curso de
  - Todos los días de la vida de
  lexicon: HALOT
  rationale: Conservo el valor totalizador de כָּל y la construcción en genitivo de יְמֵי con una formulación natural en español. 'Todos los días de' mantiene la imagen hebrea sin añadir 'vida' ni otra glosa interpretativa.
- source_word: עָנִי
  english_pob_choice: the afflicted
  chosen_spanish: el afligido
  alternatives_spanish:
  - el pobre
  - el oprimido
  - el necesitado
  lexicon: HALOT
  rationale: Sigo la opción semántica amplia del inglés POB ('the afflicted') porque el término puede abarcar pobreza, aflicción u opresión. 'Afligido' preserva el contraste con el interior alegre sin restringir el proverbio a la economía.
- source_word: רָעִים
  english_pob_choice: are bad
  chosen_spanish: son malos
  alternatives_spanish:
  - son difíciles
  - son miserables
  - son malos y amargos
  lexicon: HALOT
  rationale: '''Malos'' reproduce el predicado general del hebreo sin estrecharlo a ''miserables'' ni moralizarlo como ''malvados''. Mantiene la sencillez proverbial y la amplitud del término.'
- source_word: טוֹב לֵב
  english_pob_choice: a cheerful heart
  chosen_spanish: un corazón alegre
  alternatives_spanish:
  - un corazón bueno
  - un corazón gozoso
  - un corazón contento
  lexicon: HALOT
  rationale: Aunque el inglés revisó hacia 'cheerful heart', en español 'corazón alegre' comunica con naturalidad la disposición interior de gozo/bienestar. 'Bueno' resultaría más opaco y menos idiomático; 'alegre' conserva la fuerza de la oposición interna del proverbio.
- source_word: מִשְׁתֶּה
  english_pob_choice: a continual feast
  chosen_spanish: un banquete continuo
  alternatives_spanish:
  - un festín continuo
  - un banquete perpetuo
  - una fiesta continua
  lexicon: HALOT
  rationale: '''Banquete'' expresa con precisión el sustantivo de comida festiva y suena digno en español bíblico contemporáneo. ''Continuo'' refleja תָמִיד con un matiz de duración regular/permanente sin forzar ''siempre'' en una metáfora nominal.'
- source_word: תָמִיד
  english_pob_choice: continual
  chosen_spanish: continuo
  alternatives_spanish:
  - siempre
  - perpetuo
  - constantemente
  lexicon: HALOT
  rationale: '''Continuo'' funciona naturalmente con ''banquete'' y conserva la idea de duración ininterrumpida o reiterada. Evita convertir la línea en un adverbio poco idiomático en español.'
translation_notes:
  revision_awareness: La POB inglesa revisó 'good heart' a 'cheerful heart' para reflejar mejor טוֹב לֵב. En español se optó por 'corazón alegre' porque transmite esa misma orientación de disposición interior y evita la opacidad de 'corazón bueno'. También se mantuvo la amplitud de עָנִי con 'el afligido', dejando en nota la alternativa 'el pobre'.
  spanish_consistency_notes:
  - Se usa 'afligido' como equivalente amplio de עָנִי, coherente con el auditable inglés POB.
  - '''Corazón alegre'' conserva el antropologismo hebreo ''corazón'' y la lectura disposicional del término.'
  - '''Banquete continuo'' preserva la metáfora de festín sin introducir una explicación parafrástica.'
  - La puntuación con coma antes de 'pero' refleja el paralelismo antitético del proverbio.
