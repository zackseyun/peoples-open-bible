translation:
  language: es
  text: Pastor de Israel, presta oído, tú que conduces a José[a] como a un rebaño; tú que estás entronizado sobre los querubines[b][c], resplandece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «José» aquí probablemente representa al pueblo de Israel, especialmente a las tribus del norte, aunque el texto hebreo conserva el nombre personal.
    reason: cultural_note
  - marker: b
    text: O «entronizado entre los querubines». El hebreo literalmente dice «sentado/habitando [entre/sobre] los querubines», una expresión habitual de la presencia real de Dios.
    reason: alternative_reading
  - marker: c
    text: 'O «Pastor de Israel, presta oído: tú que conduces a José como a un rebaño, tú que estás entronizado sobre los querubines, resplandece».'
    reason: previous_rendering
lexical_decisions:
- source_word: רֹעֵה
  english_pob_choice: Shepherd
  chosen_spanish: Pastor
  alternatives_spanish:
  - Pastor que apacienta
  - Pastor de
  lexicon: HALOT
  rationale: El participio se usa aquí como título vocativo divino. «Pastor» conserva la metáfora pastoral de forma natural en español y es la equivalencia más clara y digna.
- source_word: הַאֲזִינָה
  english_pob_choice: give ear
  chosen_spanish: da oído
  alternatives_spanish:
  - escucha
  - oye atentamente
  lexicon: HALOT
  rationale: La forma imperativa exige una apelación atenta, no solo oír. «Da oído» mantiene el tono poético elevado y refleja bien el valor intensivo de la raíz.
- source_word: נֹהֵג
  english_pob_choice: lead
  chosen_spanish: conduces
  alternatives_spanish:
  - guías
  - llevas
  lexicon: HALOT
  rationale: En el contexto pastoral, el verbo expresa dirección activa del rebaño. «Conduces» comunica esa guía sin sugerir la dureza posible de «arrear» o «dirigir».
- source_word: כַּצֹּאן
  english_pob_choice: like a flock
  chosen_spanish: como a un rebaño
  alternatives_spanish:
  - como ovejas
  - como un rebaño
  lexicon: HALOT
  rationale: El sustantivo colectivo צאן designa ganado menor en conjunto. «Rebaño» conserva el sentido colectivo natural en español; el «a» ayuda a la fluidez con el verbo «conduces».
- source_word: יוֹסֵף
  english_pob_choice: Joseph
  chosen_spanish: José
  alternatives_spanish:
  - José
  - José, es decir, Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio, como en el texto fuente. No se explicita el valor metonímico en el cuerpo para no introducir glosa interpretativa fuera de la línea poética; esa tensión se deja en nota.
- source_word: יֹשֵׁב הַכְּרוּבִים
  english_pob_choice: you who are enthroned above the cherubim
  chosen_spanish: tú que estás entronizado sobre los querubines
  alternatives_spanish:
  - tú que estás entronizado entre los querubines
  - tú que habitas sobre los querubines
  lexicon: HALOT
  rationale: «Estás entronizado» preserva el valor real/teológico que el inglés POB ya identificó. «Sobre los querubines» evita fijar indebidamente la relación espacial como «entre», aunque la imagen del trono-ark sigue presente.
- source_word: הוֹפִיעָה
  english_pob_choice: shine forth
  chosen_spanish: resplandece
  alternatives_spanish:
  - aparece con esplendor
  - manifiéstate
  lexicon: HALOT
  rationale: En contextos teofánicos el verbo implica manifestación radiante. «Resplandece» comunica la aparición luminosa y solemne sin perder concisión poética.
theological_decisions:
- issue: Imagen de entronización divina sobre los querubines
  english_pob_reading: you who are enthroned above the cherubim
  chosen_spanish_reading: tú que estás entronizado sobre los querubines
  alternative_spanish_readings:
  - tú que habitas entre los querubines
  - tú que estás sentado sobre los querubines
  rationale: La expresión es una fórmula de presencia real y regia ligada al arca/templo. «Entronizado» expresa mejor la carga teológica que un simple «sentado»; «sobre» es menos interpretativo que «entre», aunque ambas lecturas permanecen posibles.
  doctrine_reference: Salmo 80:2; cf. Exodo 25:22; 1 Samuel 4:4; 2 Reyes 19:15
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el orden y la paralelización del hebreo, alineada con la revisión que coloca «da oído» inmediatamente después de «Pastor de Israel» y separa claramente la segunda cláusula de entronización y resplandor. Se evita depender mecánicamente del inglés: se conserva la metáfora pastoral, el nombre «José» y la imagen cultual de los querubines, con notas donde el original admite variantes interpretativas.'
  spanish_consistency_notes:
  - Se usa «Pastor» como título vocativo divino, no como cargo eclesiástico.
  - Se mantiene «José» para preservar el nombre propio del hebreo; la posible referencia metonímica a Israel queda en nota.
  - «Querubines» se conserva como término técnico bíblico; no se sustituye por una paráfrasis.
  - La puntuación con punto y coma reproduce dos miembros poéticos principales y mantiene la cadencia del verso.
