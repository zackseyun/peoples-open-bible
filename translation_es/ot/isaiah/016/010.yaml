translation:
  language: es
  text: La alegría y el gozo han sido quitados del campo fértil[a], y en las viñas nadie canta de alegría ni grita; ningún pisador pisará en los lagares para sacar vino[b]; he puesto fin al grito de vendimia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, "de Carmelo", si כַּרְמֶל se toma como nombre de lugar en vez de "campo fértil".
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: "el grito de vendimia" o "grito de cosecha", el clamor asociado con el pisado de la uva.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶאֱסַף
  english_pob_choice: are taken away
  chosen_spanish: han sido quitados
  alternatives_spanish:
  - han sido retirados
  - se han apartado
  - han sido removidos
  lexicon: HALOT
  rationale: El nifal de אסף aquí expresa que algo es quitado o retirado; el pasivo compuesto en español conserva bien esa fuerza sin volverlo mecánico.
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: HALOT
  rationale: Termino básico para la primera mitad del par poético; 'alegría' funciona naturalmente en español y deja espacio para distinguirlo de גִיל.
- source_word: גִיל
  english_pob_choice: gladness
  chosen_spanish: gozo
  alternatives_spanish:
  - regocijo
  - júbilo
  lexicon: HALOT
  rationale: Se elige 'gozo' para diferenciarlo de 'alegría' y mantener la pareja léxica, aunque ambos campos se superponen en parte.
- source_word: כַּרְמֶל
  english_pob_choice: the fruitful field
  chosen_spanish: el campo fértil
  alternatives_spanish:
  - Carmelo
  - el campo fructífero
  - la tierra fértil
  lexicon: HALOT
  rationale: El contexto agrícola junto a viñas y lagares favorece el sustantivo común; 'campo fértil' comunica bien la imagen sin fijarla como topónimo.
- source_word: כְּרָמִים
  english_pob_choice: the vineyards
  chosen_spanish: las viñas
  alternatives_spanish:
  - los viñedos
  - las viñas
  lexicon: HALOT
  rationale: Término agrícola directo y natural en español; 'viñas' mantiene la concreción del texto poético.
- source_word: יְרֻנָּן
  english_pob_choice: sings for joy
  chosen_spanish: canta de alegría
  alternatives_spanish:
  - canta con júbilo
  - prorrumpe en canto de alegría
  lexicon: HALOT
  rationale: Rנן puede expresar canto jubiloso; 'canta de alegría' suena idiomático y conserva el matiz festivo del contexto de vendimia.
- source_word: יְרֹעָע
  english_pob_choice: shouts
  chosen_spanish: grita
  alternatives_spanish:
  - lanza un grito
  - prorrumpe
  lexicon: HALOT
  rationale: La raíz denota un grito fuerte; 'grita' mantiene el paralelismo con el verbo anterior y el tono de celebración agrícola.
- source_word: יַיִן
  english_pob_choice: wine
  chosen_spanish: vino
  alternatives_spanish:
  - vino
  lexicon: HALOT
  rationale: Equivalente directo y estándar.
- source_word: יְקָבִים
  english_pob_choice: the presses
  chosen_spanish: los lagares
  alternatives_spanish:
  - los lagares de vino
  - las prensas
  lexicon: HALOT
  rationale: '''Lagares'' es el término español más natural para los recipientes/espacios de pisado de uvas y conserva la imagen agrícola del hebreo.'
- source_word: יִדְרֹךְ הַדֹּרֵךְ
  english_pob_choice: no treader treads out
  chosen_spanish: ningún pisador pisa
  alternatives_spanish:
  - nadie pisa
  - el que pisa no pisa
  lexicon: HALOT
  rationale: La repetición verbal hebrea intensifica la acción; 'pisador pisa' reproduce la aliteración y la insistencia sin forzar el español.
- source_word: הֵידָד
  english_pob_choice: the vintage shout
  chosen_spanish: el grito de vendimia
  alternatives_spanish:
  - el grito de cosecha
  - el clamor de vendimia
  - el grito de la vendimia
  lexicon: HALOT
  rationale: La expresión remite al grito asociado al pisado de la uva; 'grito de vendimia' es preciso, sobrio y comprensible.
- source_word: הִשְׁבַּתִּי
  english_pob_choice: I have put an end to
  chosen_spanish: he puesto fin a
  alternatives_spanish:
  - he hecho cesar
  - he terminado con
  - he silenciado
  lexicon: HALOT
  rationale: El hiphil de שבת expresa hacer cesar; 'he puesto fin a' preserva la causatividad con buena naturalidad en español.
theological_decisions:
- issue: El sujeto implícito del verbo en primera persona al final del versículo
  english_pob_reading: Retain the first person 'I have put an end to' without inserting 'the LORD' into the text.
  chosen_spanish_reading: Mantener 'he puesto fin a' sin añadir 'Yahvé' al texto principal.
  alternative_spanish_readings:
  - Yo, Yahvé, he puesto fin a
  - Yahvé ha puesto fin a
  rationale: El hebreo presenta una primera persona singular sin repetir el sujeto; el contexto mayor identifica al hablante, pero añadirlo en el cuerpo del versículo iría más allá de la forma del texto.
  doctrine_reference: Principios de transparencia textual y respeto al sujeto explícito del original
- issue: 'Valor de כַּרְמֶל: topónimo o sustantivo común'
  english_pob_reading: Translate as common noun 'the fruitful field.'
  chosen_spanish_reading: Traducir como sustantivo común 'el campo fértil'.
  alternative_spanish_readings:
  - Carmelo
  - el terreno fértil
  rationale: La serie con viñas, vino y lagares favorece el sentido agrícola común más que el nombre propio; la lectura se decide por contexto inmediato, no por tradición posterior.
  doctrine_reference: Principios de interpretación lexical contextual
translation_notes:
  revision_awareness: La versión inglesa auditada no mostró cambios en la última pasada y fue confirmada con alto acuerdo; esta propuesta española sigue de cerca sus decisiones léxicas y su lectura contextual de כַּרְמֶל, sin introducir expansiones doctrinales ni aclaraciones ajenas al versículo.
  spanish_consistency_notes:
  - Se conserva Yahvé como forma de referencia al nombre divino cuando aparezca explícitamente en decisiones o notas, aunque aquí no se inserta en el texto principal.
  - Se distingue con naturalidad entre 'alegría' y 'gozo' para reflejar el par poético hebreo.
  - '''Lagares'' se usa para mantener la escena del pisado de uvas y el clamor de vendimia.'
  - La primera persona final se mantiene sin explicitar el sujeto en el versículo, en línea con el texto hebreo.
