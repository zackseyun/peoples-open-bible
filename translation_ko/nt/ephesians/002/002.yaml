source:
  edition: SBLGNT
  text: ἐν αἷς ποτε περιεπατήσατε κατὰ τὸν αἰῶνα τοῦ κόσμου τούτου, κατὰ τὸν ἄρχοντα τῆς ἐξουσίας τοῦ ἀέρος, τοῦ πνεύματος τοῦ νῦν ἐνεργοῦντος ἐν τοῖς υἱοῖς τῆς ἀπειθείας·
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/002/002.yaml
  text: in which you once walked, according to the age of this world, according to the ruler of the authority of the air, the spirit now at work in the sons of disobedience.
translation:
  language: ko
  text: 그 죄들 가운데서 여러분은 한때 이 세상의 시대를 따라, 공중[a] 권세의 주관자 곧 지금도 불순종의 아들들[b] 안에서 일하고 있는 그 영을 따라 행하였으며—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 「공중」(ἀήρ)은 고대 우주관에서 적대적 영적 세력이 활동하는 영역을 가리키는 표현이다.
    reason: lexical_alternative
  - marker: b
    text: 「불순종의 아들들」은 「불순종에 사로잡힌 자들」을 가리키는 셈어식 표현이다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν αἰῶνα τοῦ κόσμου τούτου
  english_pob_choice: the age of this world
  chosen_korean: 이 세상의 시대
  alternatives_korean:
  - 이 세상의 풍조
  - 이 세상의 흐름
  lexicon: BDAG
  rationale: αἰών의 시대·풍조 의미를 보존하며 직역을 따른다.
- source_word: τὸν ἄρχοντα τῆς ἐξουσίας τοῦ ἀέρος
  english_pob_choice: the ruler of the authority of the air
  chosen_korean: 공중 권세의 주관자
  alternatives_korean:
  - 공중의 권세 잡은 자
  lexicon: BDAG
  rationale: 한국 교회 전통의 「공중의 권세」 표현을 살리되 「주관자」로 ἄρχων을 옮긴다.
- source_word: τοῖς υἱοῖς τῆς ἀπειθείας
  english_pob_choice: the sons of disobedience
  chosen_korean: 불순종의 아들들
  alternatives_korean:
  - 불순종의 자녀들
  lexicon: BDAG
  rationale: 셈어식 표현을 보존한다.
