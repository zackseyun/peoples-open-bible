translation:
  language: es
  text: Y aunque te escuche y ande con calma, pon tu corazón en guardia contra él.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: ''pon tu alma en guardia y aléjate de él'', lo que hace la advertencia más explícitamente autoprotectoria que el hebreo conservado por sí solo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ישמע לך / listens to you
  english_pob_choice: listens to you
  chosen_spanish: te escuche
  alternatives_spanish:
  - te oiga
  - te preste atención
  - te obedezca
  lexicon: HALOT
  rationale: שמע con ל puede significar oír/escuchar y, según el contexto, obedecer. Aquí conviene mantener la superficie de la idea de escuchar sin convertirla en obediencia explícita, porque el contexto es de cautela ante una persona potencialmente hostil.
- source_word: וִיהַלֵּךְ בְּנַחַת / walks gently
  english_pob_choice: walks gently
  chosen_spanish: ande con calma
  alternatives_spanish:
  - camine con suavidad
  - ande en paz
  - se conduzca humildemente
  lexicon: HALOT
  rationale: La expresión hebrea comunica moverse o comportarse con calma, sin brusquedad. 'Ande con calma' conserva el valor idiomático y resulta natural en español; evita introducir humildad como rasgo interpretativo demasiado fuerte.
- source_word: תֵּן לִבְּךָ / give your heart
  english_pob_choice: give your heart
  chosen_spanish: pon tu corazón
  alternatives_spanish:
  - da tu corazón
  - presta atención
  - atiende
  lexicon: HALOT
  rationale: La metáfora hebrea de 'dar el corazón' se vierte con una forma muy cercana y natural en español. 'Pon tu corazón' conserva el mandato de concentración interior que el hebreo exige.
- source_word: לְהִתְיָרֵא מִמֶּנּוּ / be afraid of him
  english_pob_choice: to be on guard against him
  chosen_spanish: en guardia contra él
  alternatives_spanish:
  - para temerlo
  - para tenerle miedo
  - para cuidarte de él
  lexicon: HALOT
  rationale: Aunque el hebreo usa el verbo 'temer', el contexto práctico es vigilancia prudente. 'En guardia contra él' transmite la cautela sin perder del todo la tensión de temor prudencial; mantiene una equivalencia funcional con el inglés revisado de la POB.
theological_decisions:
- issue: Cómo reflejar el matiz de precaución frente a una persona potencialmente peligrosa sin suavizar el mandato
  english_pob_reading: give your heart to be on guard against him
  chosen_spanish_reading: pon tu corazón en guardia contra él
  alternative_spanish_readings:
  - ten cuidado con él
  - teme de él
  - mantente alejado de él
  rationale: La línea no trata de temor religioso, sino de prudencia relacional. 'En guardia' conserva el sentido protector de la advertencia sin eliminar la carga de cautela que el hebreo y el paralelo griego apoyan.
  doctrine_reference: Sabiduría práctica / prudencia moral; no doctrina sistemática específica
- issue: Relación entre el hebreo conservado y el paralelo griego que intensifica la autoprotección
  english_pob_reading: 'Greek parallel: ''set your soul on guard and keep away from him,'' making the warning more explicitly self-protective than the surviving Hebrew wording alone.'
  chosen_spanish_reading: Y aunque te escuche y ande con calma, pon tu corazón en guardia contra él.[a]
  alternative_spanish_readings:
  - Y aunque te escuche y ande con calma, guarda tu alma y aléjate de él.
  - Y aunque te escuche y ande con calma, mantente alerta y apártate de él.
  rationale: Se mantiene el texto principal cercano al hebreo, pero la nota permite ver que el griego hace la advertencia más explícitamente autoprotectoria. No se incorpora 'aléjate de él' al cuerpo principal para no ir más allá del hebreo base.
  doctrine_reference: Crítica textual / uso de paralelos de la Septuaginta
translation_notes:
  revision_awareness: Seguí la revisión más reciente del inglés POB, que desplazó 'pay attention to yourself so as to be afraid of him' hacia una formulación más literal de 'give your heart' y más natural para el sentido prudencial de cautela. En español, la frase principal conserva ese giro con 'pon tu corazón en guardia', y la nota recoge el paralelo griego más explícito.
  spanish_consistency_notes:
  - Usé 'corazón' para לִבְּךָ de manera consistente con el valor hebreo de centro interior/atención.
  - Mantuve un registro sobrio y bíblico, pero en español natural, sin calcos duros como 'da tu corazón' o 'camina suavemente'.
  - '''En guardia contra él'' preserva la tensión entre temor y prudencia sin resolverla demasiado hacia uno solo de los dos polos.'
