  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura censal del hebreo: dos segmentos paralelos con לְ en sentido genealógico (''de Hezrón ... de Carmi'') y los gentilicios colectivos correspondientes (''hezronitas'', ''carmitas''). Sin embargo, traduce מִשְׁפַּחַת como ''familia'', cuando la evidencia fuente y la auditoría inglesa lo entienden como una subdivisión de linaje más precisa, mejor expresada aquí como ''clan''. También falta la nota alternativa sobre el valor más literal de לְ, preservada en el POB inglés.'
  spanish_quality_summary: El español es claro y natural, pero 'la familia de los hezronitas' puede sonar demasiado doméstico o nuclear y pierde precisión técnico-genealógica en un censo tribal. 'El clan de los hezronitas' y 'el clan de los carmitas' mantiene mejor el registro bíblico moderno y el paralelismo del versículo.
  glossary_alignment: No hay términos teológicos mayores en juego. La principal cuestión terminológica es מִשְׁפַּחַת, para la cual el proyecto inglés documenta 'clan' como opción preferible en contexto censal/genealógico. 'De' para לְ está bien en español, con nota opcional de alternativa literal ('para').
  issues:
  - severity: medium
    issue: מִשְׁפַּחַת se tradujo como 'familia' en vez de 'clan'.
    rationale: En este contexto censal, el término denota una unidad corporativa de parentesco dentro de la tribu. 'Familia' en español puede reducir indebidamente el alcance; 'clan' preserva mejor la precisión y sigue la racionalidad documentada del POB inglés.
  - severity: low
    issue: Falta la nota sobre la alternativa más literal para לְ ('para').
    rationale: La auditoría inglesa conserva explícitamente esta alternativa lexical. También en español conviene preservarla porque 'de' es interpretativa, aunque correcta en contexto genealógico.
