revisions:
- from: Porque este pueblo ha rechazado las aguas de Siloé[a] que fluyen suavemente, y se alegra en Rezín y en el hijo de Remalías[b].
  to: Porque este pueblo ha rechazado las aguas de Shiloah[a] que fluyen suavemente, y se regocija por Rezín y el hijo de Remalías[b].
  rationale: La revisión corrige el topónimo principal a «Shiloah» para preservar la transliteración hebrea documentada por POB y deja «Siloé» como alternativa en nota. También ajusta «se alegra en» a «se regocija por», que suena más natural en español y sigue representando la lectura masorética positiva sin adoptar la interpretación alternativa.
