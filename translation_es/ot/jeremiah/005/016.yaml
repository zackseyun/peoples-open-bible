translation:
  language: es
  text: Sus aljabas son como un sepulcro abierto[a]; todos ellos son hombres valientes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su aljaba», tomando más estrictamente el sufijo singular; el hebreo usa un sufijo singular con referencia colectiva.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «todos ellos son guerreros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשְׁפָּתוֹ
  english_pob_choice: their quiver
  chosen_spanish: su aljaba
  alternatives_spanish:
  - su carcaj
  - su caja de flechas
  lexicon: HALOT
  rationale: אַשְׁפָּתוֹ nombra un recipiente para flechas, equivalente a “quiver/arrow case”. En español, “aljaba” es un término claro y bíblicamente apto; mantiene la imagen sin forzar una forma posesiva plural que el hebreo no expresa literalmente en la morfología.
- source_word: כְּקֶבֶר
  english_pob_choice: is like an open grave
  chosen_spanish: como un sepulcro abierto
  alternatives_spanish:
  - como una tumba abierta
  - como un sepulcro
  lexicon: HALOT
  rationale: כְ indica comparación, y קבר denota sepulcro/grave/tomb. “Sepulcro” conserva la dignidad y el tono fúnebre del paralelo, mientras que “abierto” se mantiene para פָּתוּחַ. “Tumba” también es posible, pero “sepulcro” encaja mejor con el registro bíblico en español.
- source_word: פָּתוּחַ
  english_pob_choice: open
  chosen_spanish: abierto
  alternatives_spanish:
  - abierta
  - desclavado
  lexicon: HALOT
  rationale: El participio/adjetivo describe el sepulcro como abierto. En español, el adjetivo atributivo “abierto” reproduce de forma natural el valor descriptivo del hebreo.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - la totalidad de ellos
  lexicon: HALOT
  rationale: כֻּלָּם subraya la totalidad del grupo. “Todos ellos” preserva esa fuerza colectiva de manera clara y fluida en español.
- source_word: גִּבּוֹרִים
  english_pob_choice: mighty men
  chosen_spanish: hombres valientes
  alternatives_spanish:
  - guerreros
  - valientes
  - hombres poderosos
  lexicon: HALOT
  rationale: גִּבּוֹרִים suele referirse a varones fuertes o combatientes. “Hombres valientes” conserva el rasgo masculino plural y el sentido de fuerza guerrera, sin la posible solemnidad ambigua de “héroes” ni la mayor interpretatividad de “guerreros”.
theological_decisions:
- issue: Género gramatical y referencia de גִּבּוֹרִים
  english_pob_reading: mighty men
  chosen_spanish_reading: hombres valientes
  alternative_spanish_readings:
  - guerreros
  - valientes
  rationale: Se conserva el masculino plural explícito del hebreo, porque el texto describe a los combatientes de la nación invasora. En español, “hombres valientes” mantiene esa referencia sin neutralizarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene en alto acuerdo con el control cruzado y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca en este libro, conforme a la terminología del proyecto.
  - Se usa un registro bíblico natural y sobrio, evitando calcos innecesarios.
  - Se conserva la imagen concreta de la aljaba y del sepulcro abierto sin suavizar el impacto del símil.
