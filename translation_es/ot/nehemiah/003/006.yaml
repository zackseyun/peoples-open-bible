translation:
  language: es
  text: Y Joiada hijo de Paseah, y Meshullam hijo de Besodeía, repararon la Puerta Antigua[a]. Ellos pusieron sus vigas e instalaron sus puertas, sus cerrojos y sus barras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «la Puerta de Jeshaná», si se toma el segundo elemento como nombre de lugar y no como el adjetivo «antigua».
    reason: alternative_reading
lexical_decisions:
- source_word: הֶחֱזִיקוּ
  english_pob_choice: repaired
  chosen_spanish: repararon
  alternatives_spanish:
  - la repararon
  - fortalecieron
  - hicieron reparaciones en
  lexicon: HALOT
  rationale: En Nehemías 3, este verbo funciona como fórmula de trabajo de restauración. «Repararon» conserva el sentido de arreglo/restauración con español natural y sin perder la fuerza de obra material.
- source_word: שַׁעַר הַיְשָׁנָה
  english_pob_choice: the Old Gate
  chosen_spanish: la Puerta Antigua
  alternatives_spanish:
  - la Puerta de Jeshaná
  - la puerta de la ciudad vieja
  lexicon: HALOT
  rationale: La lectura más directa entiende la expresión como nombre descriptivo de la puerta. «Puerta Antigua» es claro en español y sigue la decisión inglesa principal; la alternativa toponímica se preserva en nota porque el hebreo también puede leerse como nombre propio.
- source_word: קֵרֻהוּ
  english_pob_choice: laid its beams
  chosen_spanish: colocaron
  alternatives_spanish:
  - la cubrieron con vigas
  - la techaron
  - pusieron sus vigas
  lexicon: HALOT
  rationale: El verbo apunta a un trabajo de cubrir o disponer vigas. En español, para una puerta de ciudad, «colocaron» permite recoger la acción sin forzar una imagen demasiado doméstica de «techar».
- source_word: וַיַּעֲמִידוּ
  english_pob_choice: set up
  chosen_spanish: colocaron
  alternatives_spanish:
  - instalaron
  - erigieron
  - pusieron
  lexicon: HALOT
  rationale: El verbo literalmente es «hacer que se ponga de pie / colocar en posición». En este contexto de carpintería de puertas, «colocaron» expresa bien la instalación de los componentes.
- source_word: דַּלְתֹתָיו
  english_pob_choice: its doors
  chosen_spanish: sus puertas
  alternatives_spanish:
  - sus hojas de puerta
  - sus hojas
  - sus portones
  lexicon: HALOT
  rationale: El plural hebreo corresponde a las hojas de la puerta. «Sus puertas» es la forma más natural y comprensible en español para la estructura de un portón urbano.
- source_word: מַנְעֻלָיו
  english_pob_choice: its bolts
  chosen_spanish: sus cerrojos
  alternatives_spanish:
  - sus seguros
  - sus pestillos
  - sus trabas
  lexicon: HALOT
  rationale: En contexto de puerta, el término denota el mecanismo de sujeción. «Cerrojos» es concreto, claro y idiomático en español.
- source_word: בְרִיחָיו
  english_pob_choice: its bars
  chosen_spanish: sus barras
  alternatives_spanish:
  - sus travesaños
  - sus varas
  - sus barras transversales
  lexicon: HALOT
  rationale: El término se refiere a las barras que aseguran la puerta. «Barras» mantiene la distinción con los cerrojos y evita sobreinterpretar el tipo exacto de herraje.
- source_word: הֵמָּה
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - Estos
  - Los mismos
  lexicon: HALOT
  rationale: El pronombre enfatiza que esos constructores fueron quienes realizaron la acción. En español, «Ellos» conserva la referencia y su leve énfasis sin sonar pesado.
- source_word: יֽוֹיָדָע ... וּמְשֻׁלָּם
  english_pob_choice: Joiada ... and Meshullam
  chosen_spanish: Joiada ... y Meshullam
  lexicon: Transliteración estándar del proyecto
  rationale: Los nombres propios se transliteran. «Joiada» sigue la forma habitual en español bíblico, mientras que «Meshullam» mantiene la forma del nombre hebreo para consistencia auditable.
- source_word: פָּסֵחַ / בְּסוֹדְיָה
  english_pob_choice: Paseah / Besodeiah
  chosen_spanish: Paseah / Besodeía
  lexicon: Transliteración estándar del proyecto
  rationale: Los patronímicos se preservan como nombres propios. «Besodeía» adapta la forma al español sin alterar su identificación onomástica.
translation_notes:
  revision_awareness: El texto inglés auditado no presenta revisiones aplicadas y fue confirmado por el control cruzado como de alta concordancia; la versión española sigue la decisión principal de «Old Gate» y conserva la alternativa toponímica en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando el texto fuente lo exige; este versículo no la contiene.
  - Se usa «repararon» para la fórmula de obra en Nehemías 3, coherente con el uso inglés auditado.
  - Se preserva la distinción entre «cerrojos» y «barras» para reflejar dos elementos distintos del herraje de la puerta.
  - Los nombres propios se transliteran de forma consistente y no se traducen.
