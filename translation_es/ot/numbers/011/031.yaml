    issue: Marcador de nota [b] anclado en la frase equivocada
    rationale: La nota [b] comenta la cláusula hebrea «como a dos codos sobre la faz de la tierra» y su posible sentido de altura de vuelo o extensión, pero en el borrador el marcador aparece después de «todo el campamento», lo que induce a asociar la nota con la distribución alrededor del campamento.
  - severity: low
    issue: «alrededor de todo el campamento» suena algo cargado
    rationale: Es comprensible y fiel, pero «alrededor del campamento» ya transmite naturalmente la idea en español. El valor comprehensivo del hebreo puede conservarse sin la adición de «todo».
  - severity: low
    issue: «desde el mar» podría mejorarse a «del mar»
    rationale: Ambas opciones son correctas, pero «del mar» es más idiomático en esta secuencia verbal en español bíblico moderno y mantiene el mismo sentido de procedencia.
  revised_spanish_text: Entonces un viento salió de Yahvé[a] e hizo venir codornices del mar, y las dejó caer junto al campamento, como a una jornada de camino de este lado y como a una jornada de camino del otro lado, alrededor del campamento, y como a dos codos sobre la superficie de la tierra[b].
  revised_footnotes:
