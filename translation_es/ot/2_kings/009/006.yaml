translation:
  language: es
  text: 'Él se levantó y entró en la casa, y derramó el aceite sobre su cabeza, y le dijo: «Así dice Yahvé, el Dios de Israel: Yo te he ungido[a] rey sobre el pueblo de Yahvé, sobre Israel»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo te unjo rey sobre el pueblo de Yahvé, sobre Israel». El perfecto hebreo puede entenderse de manera performativa en esta fórmula de unción.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: he got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El verbo de acción narrativa קום se expresa naturalmente en español como «se levantó», conservando el avance secuencial sin arcaísmo.
- source_word: וַיָּבֹא הַבַּיְתָה
  english_pob_choice: went into the house
  chosen_spanish: entró en la casa
  alternatives_spanish:
  - fue a la casa
  - entró en la casa
  lexicon: HALOT
  rationale: La forma con dirección a la casa indica movimiento hacia el interior; «entró en la casa» reproduce bien ese valor y mantiene la perspectiva narrativa.
- source_word: וַיִּצֹק הַשֶּׁמֶן אֶל רֹאשׁוֹ
  english_pob_choice: poured the oil on his head
  chosen_spanish: derramó el aceite sobre su cabeza
  alternatives_spanish:
  - echó el aceite sobre su cabeza
  - vertió el aceite sobre su cabeza
  lexicon: HALOT
  rationale: יצק pide un verbo de vertido/derramamiento; «derramó» es idiomático y conserva el acto ritual de unción. Se mantiene «el aceite» para reflejar el artículo hebreo.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética se vierte con el presente solemne «Así dice», que en español suena natural y conserva el carácter oracular.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se sigue el término base del proyecto para el nombre divino, evitando el reemplazo por «SEÑOR» y conservando la referencia explícita al Tetragrámaton.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción en estado constructo se traduce de forma directa y reverente, manteniendo la identificación pactual.
- source_word: מְשַׁחְתִּיךָ
  english_pob_choice: I have anointed you
  chosen_spanish: yo te he ungido
  alternatives_spanish:
  - yo te unjo
  - te he consagrado
  lexicon: HALOT
  rationale: El perfecto hebreo en este contexto ritual puede leerse como performativo; «yo te he ungido» conserva la acción ya realizada y su fuerza comisiva.
- source_word: לְמֶלֶךְ
  english_pob_choice: king
  chosen_spanish: como rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: En español, tras «ungir» resulta más claro explicitar la función resultativa con «como rey»; mantiene el valor predicativo sin añadir una glosa indebida.
- source_word: אֶל עַם יְהוָה
  english_pob_choice: over the people of Yahweh
  chosen_spanish: sobre el pueblo de Yahvé
  alternatives_spanish:
  - para el pueblo de Yahvé
  - sobre el pueblo de Yahvé
  lexicon: HALOT
  rationale: El אֶל de investidura se expresa mejor con «sobre» para comunicar autoridad/ámbito de reinado, siguiendo la lectura funcional del audit trail inglés.
- source_word: אֶל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - es decir, sobre Israel
  lexicon: HALOT
  rationale: La repetición de אֶל mantiene el paralelismo y la apposición explicativa; «sobre Israel» preserva la estructura de dominio/encargo sin sobreexplicar.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; se conserva el nombre propio en español según el estándar del proyecto, evitando la máscara litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza de מְשַׁחְתִּיךָ en la fórmula de unción
  english_pob_reading: I have anointed you
  chosen_spanish_reading: yo te he ungido
  alternative_spanish_readings:
  - yo te unto
  - te he consagrado
  rationale: El perfecto hebreo puede funcionar de modo performativo en este acto ritual. «Yo te he ungido» mantiene tanto la completitud del acto como su carácter de investidura inmediata.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text sense without paraphrase'
translation_notes:
  revision_awareness: Se revisó el último pase editorial indicado como sin cambios; la formulación española se alinea con el audit trail inglés y con el hebreo, manteniendo la equivalencia óptima y la terminología del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como sustituto del Tetragrámaton para no ocultar la forma original.
  - «Ungido» conserva el campo léxico de משח; no se reemplaza por una paráfrasis más general.
  - La repetición de «sobre» reproduce el paralelismo de אֶל ... אֶל en la investidura real.
  - 'El orden de la frase mantiene la secuencia narrativa del hebreo: levantarse, entrar, derramar, decir.'
