translation:
  language: es
  text: 'Y también te he dado lo que no pediste: tanto riquezas como honor, de modo que no ha habido hombre como tú entre los reyes todos tus días[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que no haya habido hombre como tú entre los reyes todos tus días».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And ... also
  chosen_spanish: Y también
  alternatives_spanish:
  - Además
  - Y asimismo
  lexicon: HALOT
  rationale: La partícula aditiva conserva el avance del discurso divino y añade otro don más allá de lo pedido. «Y también» reproduce bien la suma sin sonar artificial en español.
- source_word: אֲשֶׁר לֹא שָׁאַלְתָּ
  english_pob_choice: what you did not ask for
  chosen_spanish: lo que no pediste
  alternatives_spanish:
  - lo que no habías pedido
  - aquello que no pediste
  lexicon: HALOT
  rationale: El relativo se vuelve naturalmente en español con «lo que». El verbo «pedir» refleja la idea de solicitar un don; el pretérito simple mantiene la fuerza directa del hebreo en el discurso divino.
- source_word: נָתַתִּי לָךְ
  english_pob_choice: I have also given you
  chosen_spanish: te he dado
  alternatives_spanish:
  - te di
  - te he concedido
  lexicon: HALOT
  rationale: El perfecto hebreo en habla divina admite un perfecto español para expresar un acto ya otorgado con vigencia presente. «He dado» es más directo que «concedido» y conserva el don real como acto de dar.
- source_word: גַּם עֹשֶׁר גַּם כָּבוֹד
  english_pob_choice: both riches and honor
  chosen_spanish: riquezas y honra
  alternatives_spanish:
  - riquezas y honor
  - riqueza y honra
  - riqueza y honor
  lexicon: HALOT
  rationale: «Riquezas» expresa bien עֹשֶׁר. Para כָּבוֹד, «honra» comunica mejor el prestigio real y social que «gloria» en este contexto; se mantiene la dualidad de dones sin necesidad de un calco con «ambos... y».
- source_word: אֲשֶׁר לֹא הָיָה כָמוֹךָ אִישׁ
  english_pob_choice: so that there has been no man like you
  chosen_spanish: de modo que no ha habido hombre como tú
  alternatives_spanish:
  - para que no haya habido hombre como tú
  - así que no ha existido hombre como tú
  lexicon: HALOT
  rationale: El hebreo introduce el resultado de los dones concedidos. «No ha habido» expresa bien el resultado durativo hasta el presente. Se conserva «hombre» para reflejar אִישׁ con precisión léxica y la comparación directa.
- source_word: בַּמְּלָכִים
  english_pob_choice: among the kings
  chosen_spanish: entre los reyes
  alternatives_spanish:
  - entre los monarcas
  - en medio de los reyes
  lexicon: HALOT
  rationale: 'La preposición con artículo funciona comparativamente: Salomón queda situado dentro del grupo de reyes. «Entre los reyes» es la forma española más natural y fiel.'
- source_word: כָּל יָמֶיךָ
  english_pob_choice: all your days
  chosen_spanish: todos tus días
  alternatives_spanish:
  - durante todos tus días
  - a lo largo de todos tus días
  lexicon: HALOT
  rationale: El idiomatismo hebreo se conserva literalmente y de forma comprensible. En español, «todos tus días» sigue siendo natural y mantiene la amplitud temporal del original.
theological_decisions:
- issue: Preservación de אִישׁ en la comparación final
  english_pob_reading: there has been no man like you among the kings
  chosen_spanish_reading: no ha habido hombre como tú entre los reyes
  alternative_spanish_readings:
  - no ha habido nadie como tú entre los reyes
  - no ha habido rey como tú
  rationale: El hebreo usa explícitamente אִישׁ, no un pronombre indefinido. Se conserva «hombre» para no borrar la marcación masculina del texto, siguiendo la política de exactitud de género del proyecto. «Nadie» suavizaría la forma; «rey» introduciría una especificación no presente en el sintagma.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Matiz de כָּבוֹד en contexto real
  english_pob_reading: honor
  chosen_spanish_reading: honra
  alternative_spanish_readings:
  - honor
  - gloria
  rationale: En un contexto de realeza y prestigio humano, כָּבוֹד apunta más a honor/estatus que a gloria cultual. «Honra» transmite adecuadamente el reconocimiento público y la dignidad conferida sin desplazar el sentido hacia una gloria abstracta.
  doctrine_reference: Project lexical policy for context-sensitive theological terminology
- issue: Valor del perfecto divino en «te he dado»
  english_pob_reading: I have also given you
  chosen_spanish_reading: te he dado
  alternative_spanish_readings:
  - te doy
  - te he concedido
  rationale: La forma verbal comunica un don ya determinado por Yahvé y válido en el presente. «Te he dado» respeta la cualidad perfectiva sin convertirlo en presente gnómico ni en un lenguaje burocrático de concesión.
  doctrine_reference: Hebrew perfect in direct divine speech / verbal aspect guidance
translation_notes:
  revision_awareness: 'La redacción sigue el sentido del texto hebreo y el auditorio de revisión: se conserva la estructura concesiva/resultativa, se evita una paráfrasis excesiva y se mantiene la comparación explícita con אִישׁ. Frente al borrador inglés auditado, la puntuación española se simplifica de forma natural sin perder la relación entre el don concedido y el resultado comparativo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere; aquí el versículo está en discurso divino sin el Tetragrámaton explícito.
  - Se mantiene «honra» para כָּבוֹד por adecuación contextual al ámbito regio.
  - «Hombre» se conserva por la presencia explícita de אִישׁ; no se neutraliza a «nadie».
  - La nota alternativa se ancla en el resultado final porque la ambigüedad afecta a la relación sintáctica de «de modo que».
