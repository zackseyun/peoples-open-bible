translation:
  language: es
  text: El sacrificio de los impíos es una abominación[a]; ¡cuánto más cuando lo trae con mala intención!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «aún más cuando lo trae con un plan perverso». La frase hebrea puede expresar intención depravada o un proyecto malicioso.'
    reason: alternative_reading
lexical_decisions:
- source_word: זֶבַח
  english_pob_choice: sacrifice
  chosen_spanish: sacrificio
  alternatives_spanish:
  - ofrenda
  lexicon: HALOT
  rationale: זֶבַח designa una ofrenda sacrificial, especialmente un sacrificio ofrecido por inmolación. En español, "sacrificio" es el equivalente natural y conserva la especificidad ritual del término.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los perversos
  lexicon: HALOT
  rationale: El plural sustantivado se refiere a personas moralmente culpables. "Los impíos" es breve, bíblico y conserva el valor categorial sin suavizarlo.
- source_word: תּוֹעֵבָה
  english_pob_choice: an abomination
  chosen_spanish: una abominación
  alternatives_spanish:
  - algo detestable
  - una cosa aborrecible
  lexicon: HALOT
  rationale: תּוֹעֵבָה expresa algo moralmente repugnante ante Dios. "Abominación" preserva esa fuerza teológica mejor que una expresión más débil o meramente emotiva.
- source_word: אַף כִּי
  english_pob_choice: how much more
  chosen_spanish: ¡cuánto más!
  alternatives_spanish:
  - y más aún
  - con mayor razón
  lexicon: HALOT
  rationale: La construcción intensifica el juicio y pasa del caso base a uno aún más fuerte. "Cuánto más" reproduce bien la escalada proverbial en español.
- source_word: בְּזִמָּה
  english_pob_choice: with evil intent
  chosen_spanish: con mala intención
  alternatives_spanish:
  - con un plan perverso
  - con intención malvada
  - con designio perverso
  lexicon: HALOT
  rationale: En este contexto, זִמָּה no apunta principalmente a un matiz sexual, sino a una intención corrupta o un propósito perverso al traer el sacrificio. "Mala intención" comunica con naturalidad ese sentido de motivo torcido.
- source_word: יְבִיאֶנּוּ
  english_pob_choice: he brings it
  chosen_spanish: lo trae
  alternatives_spanish:
  - lo presenta
  - lo lleva
  lexicon: HALOT
  rationale: El verbo en hifil de בוא significa "traer" o "presentar". El sufijo pronominal remite al sacrificio, por eso "lo trae" mantiene la referencia directa y suena natural en español.
theological_decisions:
- issue: Valor moral del sacrificio ofrecido por los impíos
  english_pob_reading: The proverb teaches that ritual sacrifice is abhorrent when offered by wicked persons, and even more so when offered with corrupt intent.
  chosen_spanish_reading: El proverbio enseña que el sacrificio ritual es una abominación cuando lo ofrecen personas impías, y todavía más cuando se presenta con intención corrupta.
  alternative_spanish_readings:
  - El proverbio critica solo el sacrificio ofrecido sin sinceridad, no el rito en sí.
  - 'El proverbio podría leerse de manera más general: especialmente cuando se ofrece con perversidad.'
  rationale: La traducción conserva que el problema no es el sacrificio en sí, sino el oferente impío y la intención torcida. No amplía el dicho a una teología anti-sacrificial general.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con la última revisión del texto fuente inglés: no se requieren cambios adicionales según el registro auditado y la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantuvo "abominación" para תּוֹעֵבָה, en continuidad con el valor fuerte del término en el proyecto.
  - Se usó "impíos" para רְשָׁעִים, evitando neutralizar la carga moral del hebreo.
  - '"Cuánto más" refleja la intensificación de אַף כִּי sin volverlo una paráfrasis explicativa excesiva.'
  - '"Mala intención" preserva la ambigüedad entre motivo corrupto y plan perverso, como en el audit trail inglés.'
