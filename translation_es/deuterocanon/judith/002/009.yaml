translation:
  language: es
  text: Y llevaré a sus cautivos[a] hasta los confines de toda la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su cautiverio’, si αἰχμαλωσίαν se entiende de manera abstracta y no como las personas cautivas.
    reason: lexical_alternative
  - marker: b
    text: Aquí γῆ puede significar ‘tierra’ o ‘país/territorio’; se traduce ‘tierra’ porque la expresión ‘los confines’ sugiere un alcance universal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄξω
  english_pob_choice: I will lead
  chosen_spanish: llevaré
  alternatives_spanish:
  - conduciré
  - guiaré
  lexicon: LSJ
  rationale: El futuro de ἄγω puede expresarse como ‘llevar’ o ‘conducir’. En español, ‘llevaré’ comunica el movimiento activo y forzado de personas cautivas sin sonar artificial; ‘conduciré’ o ‘guiaré’ sugerirían una acción más neutra o incluso pastoral.
- source_word: αἰχμαλωσίαν
  english_pob_choice: captives
  chosen_spanish: cautivos
  alternatives_spanish:
  - cautiverio
  - los cautivos
  lexicon: LSJ
  rationale: El griego puede referirse al estado de cautiverio o al grupo de cautivos. Como el verbo ‘llevar’ se aplica mejor a personas que a un estado abstracto, ‘cautivos’ refleja la lectura concreta que también adoptó la POB en inglés.
- source_word: ἐπὶ τὰ ἄκρα
  english_pob_choice: to the ends
  chosen_spanish: hasta los confines
  alternatives_spanish:
  - a los extremos
  - hasta los extremos
  lexicon: LSJ
  rationale: La expresión idiomática señala las partes más remotas. ‘Hasta los confines’ es una forma natural y solemne en español que preserva la amplitud geográfica del original.
- source_word: πάσης τῆς γῆς
  english_pob_choice: of all the earth
  chosen_spanish: de toda la tierra
  alternatives_spanish:
  - de toda la tierra
  - de toda la tierra habitable
  lexicon: LSJ
  rationale: γῆ puede significar ‘tierra’ o ‘país/territorio’. Aquí, el alcance universal de la frase favorece ‘toda la tierra’, manteniendo la expansión retórica del griego y la decisión inglesa de evitar un sentido meramente local.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail; la traducción sigue la lectura aprobada del griego de Swete (1909) con acuerdo alto y sin cambios posteriores.
  spanish_consistency_notes:
  - Se mantiene el futuro en primera persona singular para conservar la voz directa del contexto.
  - Se usa ‘cautivos’ en lugar de ‘cautiverio’ en el texto principal para seguir la lectura concreta favorecida por el audit trail.
  - ‘Tierra’ se conserva con valor amplio/universal, no como ‘país’ local.
  - La puntuación y el registro buscan ser bíblicos pero modernos, sin calco pesado del inglés.
