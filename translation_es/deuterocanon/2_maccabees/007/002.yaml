translation:
  language: es
  text: 'Pero uno de ellos, tomando la palabra como su portavoz, dijo: «¿Qué piensas preguntar y aprender de nosotros? Porque estamos listos para morir antes que transgredir las leyes ancestrales[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las leyes de nuestros padres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷς δὲ αὐτῶν
  english_pob_choice: But one of them
  chosen_spanish: Pero uno de ellos
  alternatives_spanish:
  - Y uno de ellos
  - Ahora uno de ellos
  lexicon: LSJ
  rationale: εἷς con genitivo partitivo αὐτῶν significa claramente 'uno de ellos'. δέ marca el giro narrativo y la respuesta, por lo que 'Pero' comunica bien el contraste.
- source_word: γενόμενος προήγορος
  english_pob_choice: becoming their spokesman
  chosen_spanish: al convertirse en su portavoz
  alternatives_spanish:
  - tomando la palabra por ellos
  - actuando como portavoz
  lexicon: LSJ
  rationale: προήγορος indica a quien habla primero o en nombre de otros. 'Portavoz' preserva el carácter representativo del hablante; 'al convertirse' mantiene el participio de modo idiomático en español.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - declaró
  lexicon: LSJ
  rationale: Verbo narrativo estándar de habla. 'Dijo' es natural y no añade matiz no asegurado por el griego.
- source_word: Μέλλεις ἐρωτᾷν, καὶ μανθάνειν ἡμῶν;
  english_pob_choice: What do you intend to ask and learn from us?
  chosen_spanish: ¿Qué piensas preguntar y aprender de nosotros?
  alternatives_spanish:
  - ¿Qué intentas preguntar y aprender de nosotros?
  - ¿Qué vas a preguntar y aprender de nosotros?
  lexicon: LSJ
  rationale: μέλλεις expresa intención o inminencia. En español, 'piensas' comunica de forma natural la intención interrogativa implícita. 'De nosotros' reproduce el sentido de ἡμῶν con ambas acciones en el contexto de una pregunta retórica.
- source_word: ἕτοιμοι γάρ
  english_pob_choice: For we are ready
  chosen_spanish: Porque estamos listos
  alternatives_spanish:
  - Porque estamos preparados
  - Porque estamos dispuestos
  lexicon: LSJ
  rationale: ἕτοιμοι significa 'listos/preparados'. 'Listos' es conciso y fluido en español contemporáneo.
- source_word: ἀποθνήσκειν ἐσμέν
  english_pob_choice: to die
  chosen_spanish: para morir
  alternatives_spanish:
  - a morir
  - a morir nosotros
  lexicon: LSJ
  rationale: La construcción ἕτοιμοι ... ἐσμέν + infinitivo expresa estar listos para una acción. 'Para morir' conserva la relación natural en español sin añadir pasiva.
- source_word: ἢ
  english_pob_choice: rather than
  chosen_spanish: antes que
  alternatives_spanish:
  - más que
  - en vez de
  lexicon: LSJ
  rationale: En contraste comparativo moral, 'antes que' expresa con claridad la preferencia entre morir y violar la ley.
- source_word: τὰ πατρῷα νόμους
  english_pob_choice: the ancestral laws
  chosen_spanish: las leyes ancestrales
  alternatives_spanish:
  - las leyes de nuestros padres
  - las leyes heredadas de los padres
  lexicon: LSJ
  rationale: El texto griego subraya lo paterno/ancestral. 'Leyes ancestrales' conserva ese valor y sigue la revisión inglesa más reciente, manteniendo un registro formal y comprensible.
- source_word: παραβαίνειν
  english_pob_choice: transgress
  chosen_spanish: transgredir
  alternatives_spanish:
  - violar
  - quebrantar
  lexicon: LSJ
  rationale: En contexto legal y moral, παραβαίνειν significa transgredir o violar. 'Transgredir' preserva la gravedad del acto sin caer en una arcaización excesiva.
theological_decisions:
- issue: Referencia a la tradición de la ley heredada en πατρῷα νόμους
  english_pob_reading: the ancestral laws
  chosen_spanish_reading: las leyes ancestrales
  alternative_spanish_readings:
  - las leyes de nuestros padres
  - las leyes heredadas
  rationale: La expresión apunta a la ley judía recibida por herencia y sostenida comunitariamente bajo persecución. 'Leyes ancestrales' mantiene el peso tradicional y colectivo sin volver la frase demasiado explicativa.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que prefirió 'the ancestral laws' frente a 'the laws of our fathers'. La versión española adopta 'las leyes ancestrales' para reflejar esa decisión y evitar una traducción demasiado literal que sonaría menos natural en español, sin perder la carga tradicional del término. También se ajustó la pregunta retórica con una formulación española fluida.
  spanish_consistency_notes:
  - Se mantuvo el registro formal y bíblico sin recurrir a giros arcaizantes innecesarios.
  - Se preservó la comparación ética entre la muerte y la transgresión de la ley.
  - '''Portavoz'' comunica la función representativa de προήγορος sin introducir liderazgo institucional que el texto no afirma.'
