  text: But she said[a], “It was given to me as a gift in addition to my wages.” But I did not believe her, and I told her to give it back to its owners; and I was embarrassed before her. Then she answered and said to me, “Where are your acts of mercy and your righteous deeds? Behold[d][c][b], everything about you is known.”
  footnotes:
  - marker: a
    text: Or “along with my wages” / “as part of my wages.” The Greek phrase can indicate something given in connection with her pay; the context suggests she claims it was an extra gift rather than stolen property.
    reason: lexical_alternative
  - marker: b
    text: Greek “masters” (κυρίοις); here rendered “owners” because the context concerns returning disputed property to those who possessed it.
    reason: lexical_alternative
  - marker: c
    text: The Greek literally refers to blushing or reddening; the sense in context is shame or embarrassment.
    reason: lexical_alternative
  - marker: d
    text: Or “your almsgivings and your acts of righteousness.”
    reason: lexical_alternative
