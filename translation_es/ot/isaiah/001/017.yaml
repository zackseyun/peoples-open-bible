review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia imperativa hebrea y sigue de cerca las decisiones auditadas del POB inglés: «Aprendan a hacer el bien; busquen la justicia … hagan justicia al huérfano, aboguen por la viuda». La dificultad léxica de אַשְּׁרוּ חָמוֹץ está correctamente tratada con la lectura principal activa «corrijan al opresor» y una nota alternativa. Sin embargo, la nota al pie está anclada erróneamente a «justicia» en vez de a la frase difícil, por lo que no preserva con precisión la ambigüedad en el lugar pertinente del texto fuente.'
  spanish_quality_summary: El español es claro, natural y digno. «Aprendan», «busquen la justicia», «hagan justicia al huérfano» y «aboguen por la viuda» son lecturas idiomáticas y fieles. La única reparación necesaria es mover la marca de nota al segmento «corrijan al opresor», donde corresponde semánticamente. También conviene pulir levemente la alternativa «pongan derecho» a la forma más natural «enderecen», sin alterar el contenido.
  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen términos sensibles como Yahvé/Mesías. «Justicia», «huérfano», «viuda» y «opresor» concuerdan con las decisiones léxicas auditadas. La elección «huérfano» para יָתוֹם es una adaptación española legítima y claramente documentada.
  issues:
  - severity: medium
    issue: La nota al pie [a] está colocada sobre «justicia» en lugar de sobre «corrijan al opresor».
    rationale: La nota explica la ambigüedad de חָמוֹץ / אַשְּׁרוּ חָמוֹץ, no la de מִשְׁפָּט. Tal como está, el anclaje induce a pensar que la variante afecta «justicia», lo cual desalinearía texto, nota y evidencia fuente.
  - severity: low
    issue: La expresión alternativa «pongan derecho al oprimido» en la nota suena poco natural en español.
    rationale: Aunque reproduce de cerca el inglés auditado, «enderecen al oprimido» o «pongan en orden la causa del oprimido» sería más idiomático. Dado que la nota solo necesita preservar la alternativa, una formulación más natural mejora la legibilidad sin perder la dificultad léxica.
  revised_spanish_text: Aprendan a hacer el bien; busquen la justicia, corrijan al opresor[a]; hagan justicia al huérfano, aboguen por la viuda.
  revised_footnotes:
  - marker: a
    text: O «al oprimido» o «enderecen al oprimido». El hebreo es difícil, y חָמוֹץ puede entenderse de otra manera.
    reason: alternative_reading
  revision_rationale: Se conserva la traducción principal del borrador porque es fiel al hebreo y al POB inglés. La revisión corrige el anclaje de la nota para que recaiga sobre la frase difícil אַשְּׁרוּ חָמוֹץ, que es donde existe la ambigüedad textual, y pule la redacción de una alternativa en la nota para un español más natural.
