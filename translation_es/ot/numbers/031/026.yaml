translation:
  language: es
  text: Haz un recuento del botín capturado[a], tanto de seres humanos[b] como de animales, tú, junto con Eleazar el sacerdote y los jefes de las casas paternas de la congregación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los cautivos’ o ‘el botín cautivo’. La expresión hebrea incluye lo capturado en la guerra; aquí se especifica que abarca tanto seres humanos como animales.
    reason: lexical_alternative
  - marker: b
    text: El hebreo usa אָדָם en contraste con los animales; el sentido es ‘seres humanos’.
    reason: lexical_alternative
  - marker: c
    text: O ‘los jefes de las casas ancestrales’ o, de manera más dinámica, ‘los líderes de los clanes’.
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂא אֵת רֹאשׁ
  english_pob_choice: Take a count
  chosen_spanish: Haz un recuento
  alternatives_spanish:
  - Cuenta
  - Haz el conteo
  lexicon: HALOT
  rationale: El hebreo forma un modismo para hacer un recuento o enumeración, no para ‘levantar’ literalmente. ‘Haz un recuento’ conserva el sentido idiomático de manera natural en español.
- source_word: מַלְקוֹחַ הַשְּׁבִי
  english_pob_choice: the plunder that was taken
  chosen_spanish: el botín tomado
  alternatives_spanish:
  - el botín capturado
  - el botín que fue tomado
  lexicon: HALOT
  rationale: מַלְקוֹחַ alude al botín de guerra, y הַשְּׁבִי matiza que se trata de lo capturado. ‘Botín tomado’ evita una redundancia pesada y mantiene la idea de captura sin forzar ‘cautivos’ en el sustantivo principal.
- source_word: בָּאָדָם
  english_pob_choice: of man
  chosen_spanish: de hombres
  alternatives_spanish:
  - de personas
  - de seres humanos
  lexicon: HALOT
  rationale: En contraste con los animales, אָדָם señala seres humanos. ‘De hombres’ conserva el contraste formal del hebreo y la fuerza colectiva, sin convertirlo en una paráfrasis más amplia.
- source_word: וּבַבְּהֵמָה
  english_pob_choice: and of beast
  chosen_spanish: como de animales
  alternatives_spanish:
  - y de animales
  - y de ganado
  lexicon: HALOT
  rationale: בְּהֵמָה se refiere a animales; en este contexto de botín de guerra, ‘animales’ es claro y no más estrecho que el hebreo. ‘Como de’ refleja la distribución del recuento sobre ambas clases.
- source_word: אֶלְעָזָר הַכֹּהֵן
  english_pob_choice: Eleazar the priest
  chosen_spanish: Eleazar el sacerdote
  alternatives_spanish:
  - Eleazar, el sacerdote
  - Eleazar el sacerdote principal
  lexicon: HALOT
  rationale: Se translitera el nombre y se traduce el título con el equivalente bíblico normal ‘sacerdote’, fiel al uso del Pentateuco y transparente para el lector español.
- source_word: רָאשֵׁי אֲבוֹת הָעֵדָה
  english_pob_choice: the heads of the fathers’ houses of the congregation
  chosen_spanish: los jefes de las casas paternas de la congregación
  alternatives_spanish:
  - los jefes de las casas ancestrales de la congregación
  - los líderes de los clanes de la congregación
  lexicon: HALOT
  rationale: ‘Casas paternas’ reproduce la estructura social del hebreo y evita reducirla a ‘clanes’, que es más interpretativo. ‘Jefes’ mantiene el matiz de liderazgo familiar/linajudo del original.
translation_notes:
  revision_awareness: 'La versión inglesa auditada revisó ‘taken captive’ a ‘taken’ para ajustar la precisión léxica: el texto habla del botín capturado, no de que el botín mismo esté ‘cautivo’. La traducción española sigue ese ajuste y evita atribuir cautiverio al sustantivo principal.'
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma preferente del proyecto cuando el nombre divino aparezca; en este versículo no ocurre.
  - Se conserva una sintaxis de mandato con objeto directo explícito para reflejar el imperativo hebreo y el recuento formal del botín.
  - ‘Sacerdote’ se usa para הַכֹּהֵן conforme al registro bíblico estándar en español.
  - No se introduce ‘Cristo’ ni otra terminología litúrgica ajena al pasaje.
