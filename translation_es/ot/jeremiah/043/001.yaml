revisions:
- from: Y aconteció que, cuando Jeremías terminó de hablar a todo el pueblo todas las palabras de Yahvé su Dios[a], con las que Yahvé su Dios lo había enviado a ellos—todas estas palabras—
  to: 'Y aconteció que, cuando Jeremías terminó de hablar a todo el pueblo todas las palabras de Yahvé, el Dios de ellos[a], con las cuales Yahvé, el Dios de ellos, lo había enviado a ellos: todas estas palabras[b].'
  rationale: Se corrige el posesivo para reflejar con claridad el plural de אֱלֹהֵיהֶם y evitar la ambigüedad de «su». También se suaviza la cláusula relativa con «con las cuales», que conserva mejor el vínculo entre las palabras y el envío profético en español. Se mantienen «Yahvé» y la repetición final de «todas estas palabras».
