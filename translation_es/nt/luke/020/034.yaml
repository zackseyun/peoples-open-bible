translation:
  language: es
  text: 'Y Jesús les dijo[a]: «Los hijos de esta era se casan y son dados en casamiento»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la gente de esta era». El griego dice «los hijos de esta era», una expresión masculina representativa para quienes pertenecen al orden presente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y entonces
  lexicon: BDAG
  rationale: La conjunción simple mantiene la continuidad narrativa sin añadir una relación temporal más fuerte que la del griego.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - dijo
  - les habló
  lexicon: BDAG
  rationale: El aoristo de λέγω se expresa naturalmente como «dijo». En español, el objeto indirecto «les» hace explícito el destinatario del discurso sin alterar el sentido.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a estos
  lexicon: BDAG
  rationale: El dativo plural se integra de forma idiomática con el verbo de habla en español mediante el clítico «les».
- source_word: Οἱ υἱοὶ
  english_pob_choice: The sons
  chosen_spanish: Los hijos
  alternatives_spanish:
  - Los hijos varones
  - Las personas
  lexicon: BDAG
  rationale: Se conserva la expresión masculina representativa del griego con «hijos», que en español reproduce mejor la forma del original que una neutralización como «personas». En este contexto designa a quienes pertenecen a la era presente, no solo a varones biológicos.
- source_word: τοῦ αἰῶνος τούτου
  english_pob_choice: of this age
  chosen_spanish: de esta era
  alternatives_spanish:
  - de este siglo
  - de este mundo
  lexicon: BDAG
  rationale: «Era» comunica con claridad el contraste escatológico entre la presente etapa del orden y la venidera. «Siglo» puede sonar arcaico o ambiguo en español; «mundo» perdería precisión.
- source_word: γαμοῦσιν
  english_pob_choice: marry
  chosen_spanish: se casan
  alternatives_spanish:
  - se casan entre sí
  - contraen matrimonio
  lexicon: BDAG
  rationale: «Se casan» es la forma más natural y fiel en español moderno para el verbo matrimonial activo; mantiene el sentido general sin introducir un matiz demasiado formal.
- source_word: γαμίσκονται
  english_pob_choice: are given in marriage
  chosen_spanish: son dados en matrimonio
  alternatives_spanish:
  - son casados
  - son entregados en matrimonio
  lexicon: BDAG
  rationale: Se conserva la pasiva del griego y la distinción con el verbo anterior. «Son dados en matrimonio» es claro y suficientemente cercano al giro tradicional sin depender de una paráfrasis excesiva.
theological_decisions:
- issue: Expresión masculina representativa en una afirmación general
  english_pob_reading: The sons of this age
  chosen_spanish_reading: Los hijos de esta era
  alternative_spanish_readings:
  - Las personas de esta era
  - Los que pertenecen a esta era
  rationale: El griego usa υἱοὶ, masculino plural. Se mantiene la forma marcada en español con «hijos», entendida de modo representativo, para no borrar la señal formal del texto fuente.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
- issue: αἰών como categoría escatológica
  english_pob_reading: this age
  chosen_spanish_reading: esta era
  alternative_spanish_readings:
  - este mundo
  - este siglo
  rationale: «Era» conserva la oposición teológica entre el orden presente y el venidero. «Mundo» sería más amplio pero menos preciso; «siglo» no resulta tan claro para lectores contemporáneos.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #1, #3'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y no requieren revisión sustantiva. La decisión principal en español fue conservar la expresión masculina representativa y la oposición escatológica de αἰών con un giro natural para lectores modernos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usó «era» para αἰών siguiendo el valor escatológico documentado.
  - Se preservó la pasiva de γαμίσκονται con una construcción española equivalente.
  - La nota al pie recoge la alternativa neutralizante para la expresión masculina sin reemplazarla en el texto principal.
