review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del sentido hebreo: «dijiste», «para siempre», «seré», «estas cosas», y «no recordaste» están bien encaminados, y la nota sobre la personificación femenina de Babilonia está documentada. Sin embargo, «hasta que no pusiste» no reproduce fielmente la decisión auditada para עַד לֹא, que aquí es resultativa/consecutiva («so that»), no temporal. Además, «pusiste estas cosas en tu corazón» suena poco natural en español y pierde la fuerza idiomática mejor expresada por «tomar en serio / tomar a pecho / tomar en cuenta».'
  spanish_quality_summary: El texto es comprensible, pero «hasta que no pusiste» resulta forzado y potencialmente equívoco en español, porque sugiere una secuencia temporal más que una consecuencia de la arrogancia descrita. «Señora» es defendible para גברת, pero en este contexto profético «dueña» comunica mejor dominio sin sobreespecificar realeza ni sonar simplemente como tratamiento cortés. La frase revisada mejora naturalidad y dignidad sin apartarse del hebreo.
  glossary_alignment: 'No hay conflicto con los términos de proyecto mayores. La principal cuestión léxica es גְבָרֶת: el inglés auditado justificó «mistress» por dominio/rango sin llegar a «queen». En español, «dueña» preserva mejor ese matiz de dominio que «señora», que puede leerse como tratamiento social. También conviene alinear עַד לֹא con la racionalidad POB ya documentada: valor resultativo («de modo que») y no temporal («hasta que no»).'
  issues:
  - severity: high
    issue: «hasta que no» traduce mal עַד לֹא en este contexto
    rationale: La auditoría inglesa y el contexto apoyan un sentido consecutivo/resultativo («de modo que / así que»), no una cláusula temporal. «Hasta que no» introduce una relación temporal ajena y puede invertir la lógica del versículo.
  - severity: medium
    issue: «pusiste estas cosas en tu corazón» es poco idiomático en español bíblico natural
    rationale: Aunque intenta conservar la metáfora hebrea, la formulación suena rígida. «Tomaste estas cosas a pecho» o «tomaste en serio estas cosas» comunica mejor el modismo «poner sobre el corazón».
  - severity: medium
    issue: «señora» debilita el matiz de dominio de גְבָרֶת
    rationale: «Señora» en español puede entenderse solo como trato respetuoso o estatus social. «Dueña» conserva mejor la idea de mujer dominante o soberana sin sobreactuarla como «reina».
  - severity: low
    issue: La nota c no presenta una alternativa real distinta del texto
    rationale: Si el texto revisado mantiene «su fin», la nota debe explicar la personificación femenina o dar la alternativa «el fin de ella», no repetir exactamente la misma frase como alternativa.
  revised_spanish_text: 'Dijiste[a]: «Seré dueña para siempre», de modo que no tomaste estas cosas[a][b] a pecho; no recordaste el fin de ella[c].'
  revised_footnotes:
