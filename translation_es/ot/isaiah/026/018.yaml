    rationale: Aunque «salvación» es bíblicamente válida, la decisión inglesa auditada eligió 'deliverance'. En español, «no logramos liberación» o «no obramos liberación» comunica mejor el fracaso histórico/corporativo sin sobreespiritualizar.
