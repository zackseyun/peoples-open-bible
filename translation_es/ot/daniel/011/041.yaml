revisions:
- from: 'Él entrará en la Tierra Hermosa[a], y muchos tropezarán; pero estos escaparán de su mano: Edom, Moab, y la parte principal[b] de los hijos de Amón[c].'
  to: 'Él entrará en la Tierra Hermosa[a], y muchos[b] tropezarán; pero estos escaparán de su mano: Edom, Moab y los más prominentes[c] de los hijos de Amón.'
  rationale: Se corrige el anclaje de la nota sobre ‘muchos’ para que coincida con el término relevante; se mejora la frase final a ‘los más prominentes de los hijos de Amón’ para reflejar mejor רֵאשִׁית בְּנֵי עַמּוֹן en español natural y fiel; y se ajusta la puntuación de la enumeración.
