translation:
  language: es
  text: cubriéndote de luz como de una vestidura, extendiendo los cielos como una cortina[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como una cortina de tienda». El término hebreo puede referirse a un panel de cortina usado en una tienda o tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹטֶה
  english_pob_choice: covering yourself with
  chosen_spanish: cubriéndote de
  alternatives_spanish:
  - envolviéndote en
  - vistiéndote de
  lexicon: HALOT
  rationale: El participio qal de עטה describe una acción continua y poética. «Cubriéndote de» conserva el valor reflexivo implícito y la imagen dinámica sin volverla demasiado explicativa.
- source_word: א֭וֹר
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - resplandor
  - claridad
  lexicon: HALOT
  rationale: אור denota aquí luz literal, el elemento con el que Dios es metafóricamente cubierto. «Luz» es la equivalencia más directa y no añade una abstracción no exigida por el texto.
- source_word: כַּשַּׂלְמָה
  english_pob_choice: as with a garment
  chosen_spanish: como de una vestidura
  alternatives_spanish:
  - como de un vestido
  - como de un manto
  lexicon: HALOT
  rationale: שַׂלְמָה es una prenda/vestidura. «Vestidura» es amplio y solemne en español; mantiene la comparación sin precisar indebidamente un tipo de prenda.
- source_word: נוֹטֶה
  english_pob_choice: stretching out
  chosen_spanish: extendiendo
  alternatives_spanish:
  - tendiendo
  - desplegando
  lexicon: HALOT
  rationale: La forma participial de נטה expresa una acción continua de extender o desplegar. «Extendiendo» fluye naturalmente en español y conserva la imagen cósmica.
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos altos
  - el cielo
  lexicon: HALOT
  rationale: En este contexto de creación, el plural hebreo apunta al ámbito cósmico. «Los cielos» preserva mejor ese sentido elevado que «el cielo».
- source_word: כַּיְרִיעָה
  english_pob_choice: like a curtain
  chosen_spanish: como una cortina
  alternatives_spanish:
  - como una cortina de tienda
  - como un telón
  lexicon: HALOT
  rationale: יְרִיעָה significa una cortina o paño colgante. «Cortina» es natural en español; la posible referencia a una cortina de tienda queda preservada como alternativa sin sobrecargar el texto principal.
theological_decisions:
- issue: Imagen antropomórfica de Dios cubriéndose con luz y extendiendo los cielos
  english_pob_reading: Retain the poetic anthropomorphic imagery directly
  chosen_spanish_reading: Conservar directamente la imaginería antropomórfica poética
  alternative_spanish_readings:
  - Paráfrasis como «estás rodeado de luz»
  - Paráfrasis como «tu esplendor es la luz»
  rationale: El salmo emplea una metáfora vívida para describir la majestad y el poder creador de Dios. La traducción no debe resolver esa tensión poética, sino preservarla con fidelidad al hebreo.
  doctrine_reference: Principio de primacía del texto original; mantener la tensión teológica sin explicitarla en la traducción
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de revisión fue alto y el texto quedó sin modificaciones necesarias.
  spanish_consistency_notes:
  - Se usa «cielos» para el plural hebreo שָׁמַיִם, conforme al registro cósmico del versículo.
  - Se evita «SEÑOR» por convención de máscara; el versículo no contiene el tetragrámaton.
  - Se mantiene la metáfora de luz/vestidura sin explicarla, siguiendo la lectura poética del POB inglés.
