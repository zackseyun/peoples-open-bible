review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia hebrea y la mayoría de las decisiones auditadas: «los hijos de Jacob», «del campo», «cuando lo oyeron», la aflicción y la ira intensa, «en Israel» y el eufemismo sexual «acostarse con». Sin embargo, el cierre «y no se hace así» debilita y desplaza el valor de וְכֵן לֹא יֵעָשֶׂה. El hebreo expresa una norma general sobre una clase de acto («tal cosa no debe hacerse» / «no debería hacerse tal cosa»), no simplemente una manera de actuar («no se hace así»).'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. No obstante, el punto y coma antes del cierre no ayuda a la fluidez, y la formulación final suena algo idiomática pero menos precisa semánticamente que una opción con «tal cosa» o «una cosa así». También conviene conservar la nota cultural sobre «en Israel», ya presente en el rastro inglés y mencionada en la documentación teológica, porque el texto español actualmente no la incluye entre las notas visibles.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Israel» se conserva correctamente, pero falta la nota aclaratoria correspondiente. «Una cosa vergonzosa» es aceptable para נְבָלָה, aunque «deshonrosa» también sería posible; no requiere cambio. «Acostarse con» respeta bien el registro eufemístico de שׁכב.
  issues:
  - severity: medium
    issue: La cláusula final «y no se hace así» no refleja con suficiente precisión וְכֵן לֹא יֵעָשֶׂה.
    rationale: La expresión hebrea formula una norma general impersonal sobre la inadmisibilidad del acto. «No se hace así» en español puede entenderse como ‘no se hace de esa manera’, centrado en el modo, mientras que el texto apunta a ‘tal cosa no debe/debería hacerse’.
  - severity: medium
    issue: Falta en las notas españolas la aclaración sobre «en Israel».
    rationale: 'El rastro inglés preserva una nota cultural importante: aquí «Israel» probablemente se refiere a la familia/comunidad pactual de Jacob, no a la nación posterior en sentido pleno. Dado que el español mantiene la literalidad «en Israel», conviene conservar también esa ayuda interpretativa.'
  - severity: low
    issue: La puntuación con punto y coma antes de la cláusula final resulta algo rígida.
    rationale: Una coma coordina mejor la progresión narrativa y normativa en español moderno sin cambiar el sentido.
