  - Se prefirió una solución natural en español para la cláusula relativa, sin ocultar el sentido de presencia/posesión del hebreo.
  - «Fracturado» mantiene el valor de שֶׁבֶר con mayor precisión formal que una simple paráfrasis como «lastimado».
