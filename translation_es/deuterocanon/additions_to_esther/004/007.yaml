translation:
  language: es
  text: '...completamente cubierto de oro y piedras costosas[a], y era sumamente aterrador. Y alzando su rostro, encendido de resplandor en la intensidad de la ira, miró; y la reina cayó y cambió de color en desfallecimiento[c][b], y se dobló sobre la cabeza de la delicada doncella que iba delante de ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego de este versículo comienza a mitad de una descripción en el testimonio suministrado; por eso la traducción conserva los puntos suspensivos en lugar de reconstruir la frase inicial.
    reason: textual_variant
  - marker: b
    text: 'O: ‘todo adornado con oro y piedras preciosas’.'
    reason: lexical_alternative
  - marker: c
    text: 'O: ‘su color cambió mientras desfallecía’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅλος διὰ χρυσοῦ καὶ λίθων πολυτελῶν
  english_pob_choice: entirely covered with gold and costly stones
  chosen_spanish: completamente cubierto de oro y piedras costosas
  alternatives_spanish:
  - todo adornado con oro y piedras preciosas
  - totalmente revestido de oro y gemas costosas
  lexicon: LSJ
  rationale: El griego conservado es elíptico al inicio; en español, ‘cubierto de’ comunica bien el estado de estar enteramente revestido por materiales preciosos sin añadir una prenda inexistente en el testimonio.
- source_word: φοβερὸς σφόδρα
  english_pob_choice: very terrifying
  chosen_spanish: muy temible
  alternatives_spanish:
  - sumamente aterrador
  - muy imponente y temible
  lexicon: LSJ
  rationale: ‘Temible’ conserva el valor de algo que infunde temor y respeto. ‘Terrible’ en español puede sonar más vago o anticuado; ‘temible’ mantiene la fuerza del griego.
- source_word: ἄρας τὸ πρόσωπον αὐτοῦ
  english_pob_choice: lifting up his face
  chosen_spanish: alzando su rostro
  alternatives_spanish:
  - levantando su rostro
  - alzó su rostro
  lexicon: LSJ
  rationale: La imagen corporal se mantiene de modo natural en español. ‘Alzando su rostro’ refleja el participio aoristo sin convertirlo en un verbo principal.
- source_word: πεπυρωμένον δόξῃ
  english_pob_choice: blazing with splendor
  chosen_spanish: encendido de resplandor
  alternatives_spanish:
  - ardiendo de gloria
  - llameando de esplendor
  lexicon: LSJ
  rationale: ‘πεπυρωμένον’ sugiere fuego/metáfora de brillo intenso; con ‘δόξῃ’ no conviene perder la idea de resplandor majestuoso. ‘Encendido de resplandor’ conserva ambos matices sin sonar forzado.
- source_word: ἐν ἀκμῇ θυμοῦ
  english_pob_choice: in the intensity of anger
  chosen_spanish: en la intensidad de la ira
  alternatives_spanish:
  - en el punto culminante de la ira
  - en el colmo de la ira
  lexicon: LSJ
  rationale: Se sigue la revisión más reciente del audit trail. ‘Intensidad’ reproduce ἀκμή como punto de máxima fuerza, y ‘ira’ comunica mejor el matiz de θυμός en este contexto que ‘enojo’.
- source_word: μετέβαλε τὸ χρῶμα αὐτῆς ἐν ἐκλύσει
  english_pob_choice: changed color in faintness
  chosen_spanish: cambió de color en desfallecimiento
  alternatives_spanish:
  - palideció al desfallecer
  - cambió de color mientras desfallecía
  lexicon: LSJ
  rationale: ‘Cambio de color’ refleja τὸ χρῶμα αὐτῆς, y ‘en desfallecimiento’ conserva la asociación con ἐκλύσει sin explicarla demasiado. En español, ‘desfallecimiento’ es más idiomático que una calca literal.
- source_word: κατέκυψεν
  english_pob_choice: she bent down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se dobló
  - se agachó
  lexicon: LSJ
  rationale: El verbo expresa un movimiento hacia abajo o un abatimiento físico. ‘Se inclinó’ funciona bien en español y permite entender el desplome sin insinuar reverencia deliberada.
- source_word: ἅβρας
  english_pob_choice: delicate
  chosen_spanish: delicada
  alternatives_spanish:
  - suave
  - refinada
  lexicon: LSJ
  rationale: ‘Delicada’ preserva la cualidad de refinamiento o suavidad aplicada a la sirvienta, sin exagerarla ni moralizarla.
- source_word: τῆς προπορευομένης
  english_pob_choice: who was going before her
  chosen_spanish: que iba delante de ella
  alternatives_spanish:
  - que la precedía
  - que caminaba delante de ella
  lexicon: LSJ
  rationale: La frase participial indica a la que precedía en la marcha. ‘Iba delante de ella’ es idiomático y suficientemente cercano al griego.
theological_decisions:
- issue: Manejo del inicio fragmentario del testimonio griego
  english_pob_reading: Represent the surviving clause as an ellipsis with leading suspension points and translate the extant wording without reconstructing omitted material.
  chosen_spanish_reading: Mantener la elipsis inicial y no suplir un sujeto o verbo no atestiguado.
  alternative_spanish_readings:
  - ‘Vestido totalmente de oro y piedras costosas...’
  - ‘Él estaba completamente cubierto de oro y piedras costosas...’
  rationale: El testimonio proporcionado comienza a mitad de descripción. Para ser auditable, el español debe señalar la laguna textual en lugar de reconstruirla silenciosamente.
  doctrine_reference: 'PHILOSOPHY.md: transparencia frente a la incertidumbre del testimonio; no completar sin base textual'
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión del audit trail, que ajustó ἐν ἀκμῇ θυμοῦ de ‘at the height of anger’ a ‘in the intensity of anger’. En español se reflejó ese matiz con ‘en la intensidad de la ira’. También se respetó la decisión de no reconstruir el inicio perdido del testimonio griego.
  spanish_consistency_notes:
  - Se usó ‘Yahvé’ por norma general del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se prefirió ‘ira’ para θυμός porque en este contexto mantiene mejor el tono emocional elevado.
  - Se evitó ‘Cristo’, ‘Señor’ u այլ terminología no presente en el pasaje.
  - La puntuación conserva la secuencia narrativa y el paralelismo de las acciones griegas.
