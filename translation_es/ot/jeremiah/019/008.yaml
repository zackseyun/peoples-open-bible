translation:
  language: es
  text: Y haré de esta ciudad un horror y un motivo de silbidos[a]; todo el que pase por ella quedará horrorizado[b] y silbará por todas sus heridas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una desolación y un silbido». Los sustantivos hebreos enfatizan tanto el estado arruinado de la ciudad como el desprecio que provoca.
    reason: lexical_alternative
  - marker: b
    text: O «quedará asombrado y silbará». El hebreo usa una imagen profética convencional de estupor y burla ante el juicio divino.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשַׂמְתִּי
  english_pob_choice: And I will make
  chosen_spanish: Y haré
  alternatives_spanish:
  - Y pondré
  - Y convertiré
  lexicon: HALOT
  rationale: En este giro profético, שׂים con complementos de resultado expresa causar un estado. En español, «haré» comunica bien el cambio resultante sin perder la fuerza causativa del hebreo.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - la ciudad esta
  - la ciudad
  lexicon: HALOT
  rationale: La construcción demostrativa se conserva de forma directa con «esta ciudad», manteniendo la deíxis del hebreo.
- source_word: לְשַׁמָּה
  english_pob_choice: a horror / a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - un horror
  - una ruina
  lexicon: HALOT
  rationale: שַׁמָּה puede referirse al estado devastado de la ciudad. «Desolación» preserva ese sentido y deja abierta la dimensión de devastación que provoca asombro.
- source_word: וְלִשְׁרֵקָה
  english_pob_choice: an object of hissing
  chosen_spanish: un objeto de silbidos
  alternatives_spanish:
  - un objeto de burlas
  - un objeto de siseos
  lexicon: HALOT
  rationale: El sustantivo de שרק expresa burla mediante silbidos/whistling. «Objeto de silbidos» conserva la imagen profética sin sustituirla por una explicación más interpretativa.
- source_word: כֹּל עֹבֵר עָלֶיהָ
  english_pob_choice: everyone who passes by it
  chosen_spanish: todo el que pase por ella
  alternatives_spanish:
  - todos los que pasan por ella
  - quienquiera que pase por ella
  lexicon: HALOT
  rationale: La forma participial hebrea funciona genéricamente. «Todo el que pase por ella» mantiene el valor universal y la naturalidad del español.
- source_word: יִשֹּׁם
  english_pob_choice: will be appalled
  chosen_spanish: quedará asombrado
  alternatives_spanish:
  - quedará horrorizado
  - quedará desolado
  lexicon: HALOT
  rationale: En este contexto, שׁמם comunica quedar sobrecogido ante la ruina. «Quedará asombrado» preserva la reacción de impacto, aunque no agota la posible nota de espanto.
- source_word: וְיִשְׁרֹק
  english_pob_choice: will hiss / will whistle
  chosen_spanish: silbará
  alternatives_spanish:
  - silbará en señal de burla
  - chiflará
  lexicon: HALOT
  rationale: En profecía, שרק remite al silbido burlón. «Silbará» es el equivalente español más natural y conserva tanto el gesto como la desaprobación implícita.
- source_word: עַל כָּל מַכֹּתֶיהָ
  english_pob_choice: because of all its wounds
  chosen_spanish: a causa de todas sus heridas
  alternatives_spanish:
  - por todas sus heridas
  - a causa de todos sus golpes
  lexicon: HALOT
  rationale: מַכָּה puede ser herida, golpe o plaga. «Heridas» mantiene la imagen de la ciudad golpeada y herida, sin cerrarla en un sentido médico o exclusivamente punitivo.
theological_decisions:
- issue: 'Imagen profética de juicio: desolación y burla pública'
  english_pob_reading: The city will become a ruined object of derision, provoking shocked contempt in passersby.
  chosen_spanish_reading: La ciudad llegará a ser una desolación pública, expuesta al silbido burlón de quienes la vean pasar.
  alternative_spanish_readings:
  - La ciudad será un horror y un objeto de burla
  - La ciudad será una ruina que provocará asombro y escarnio
  rationale: El hebreo une el estado devastado de la ciudad con la reacción de desprecio que suscita. La traducción conserva ambas dimensiones sin suavizar el juicio ni convertirlo en un mero comentario descriptivo.
  doctrine_reference: Profetas del AT; juicio divino sobre Jerusalén/Judá
translation_notes:
  revision_awareness: 'Coincide con la lectura revisada del POB en inglés: mantiene el paralelismo entre la ruina de la ciudad y la reacción burlona de los transeúntes, sin añadir matices no presentes en el hebreo.'
  spanish_consistency_notes:
  - Se prefirió «silbar» por la imagen profética de derisión, en vez de «silbido» abstracto.
  - «Desolación» conserva el núcleo semántico de שַׁמָּה y evita un calco rígido de «horror».
  - «Heridas» sigue la amplitud de מַכֹּתֶיהָ y permite leer calamidades sufridas sin precisar más de lo que el texto exige.
