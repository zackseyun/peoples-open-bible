translation:
  language: es
  text: desde el sur, toda la tierra de los cananeos[a], y Meará[b], que pertenece a los sidonios, hasta Afec, hasta la frontera de los amorreos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa las formas étnicas singulares «el cananeo» y «el amorreo» con sentido colectivo; en español se traducen naturalmente como colectivos plurales.
    reason: lexical_alternative
  - marker: b
    text: O «la cueva», si מְעָרָה se entendiera como sustantivo común en vez de topónimo; el contexto de un listado territorial favorece la transliteración.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִתֵּימָן
  english_pob_choice: from the south
  chosen_spanish: desde el sur
  alternatives_spanish:
  - desde Temán
  - hacia el sur
  lexicon: HALOT
  rationale: En este listado territorial, תֵּימָן funciona mejor como indicación geográfica/direccional. «Desde el sur» conserva la extensión espacial del hebreo sin introducir un topónimo no respaldado por el contexto.
- source_word: כָּל אֶרֶץ הַכְּנַעֲנִי
  english_pob_choice: all the land of the Canaanites
  chosen_spanish: toda la tierra de los cananeos
  alternatives_spanish:
  - toda la tierra del cananeo
  - toda la tierra de Canaán
  lexicon: HALOT
  rationale: El hebreo usa el singular étnico con sentido colectivo. En español, el plural «los cananeos» comunica con naturalidad esa fuerza colectiva y mantiene la transparencia del original.
- source_word: וּמְעָרָה
  english_pob_choice: and Mearah
  chosen_spanish: Meará
  alternatives_spanish:
  - la cueva
  - Mearah
  lexicon: HALOT
  rationale: Aquí se conserva como topónimo transliterado, como en la decisión auditada en inglés. La forma «Meará» evita imponer de entrada el sentido común de «cueva» cuando el contexto territorial favorece un nombre propio.
- source_word: אֲשֶׁר לַצִּידֹנִים
  english_pob_choice: that belongs to the Sidonians
  chosen_spanish: que pertenece a los sidonios
  alternatives_spanish:
  - que es de los sidonios
  - de los sidonios
  lexicon: HALOT
  rationale: La preposición ל expresa pertenencia/posesión. «Pertenece a» reproduce esa relación de manera clara y natural en español.
- source_word: עַד אֲפֵקָה
  english_pob_choice: as far as Aphek
  chosen_spanish: hasta Aphec
  alternatives_spanish:
  - hasta Apéca
  - hasta Aphek
  lexicon: HALOT
  rationale: Se mantiene el nombre propio como topónimo. Se prefirió «Aphec» para una transliteración castellana sobria y publicable, sin añadir una equivalencia interpretativa que el hebreo no exige.
- source_word: עַד גְּב֥וּל הָאֱמֹרִי
  english_pob_choice: to the border of the Amorites
  chosen_spanish: hasta el borde de los amorreos
  alternatives_spanish:
  - hasta la frontera de los amorreos
  - hasta el territorio de los amorreos
  lexicon: HALOT
  rationale: גְּבוּל puede referirse a borde/frontera/límite territorial. «Borde» conserva la imagen espacial simple del hebreo y sigue de cerca la elección auditada en inglés de marcar el límite alcanzado por la extensión territorial.
theological_decisions:
- issue: Uso de etnónimos singulares/plurales y alcance colectivo
  english_pob_reading: Hebrew 'the Canaanite' and 'the Amorite' use singular ethnic forms with collective force; English renders them as collectives.
  chosen_spanish_reading: «los cananeos» y «los amorreos» como colectivos naturales en español
  alternative_spanish_readings:
  - «el cananeo» y «el amorreo»
  - «Canaán» y «Amorreos»
  rationale: El hebreo emplea formas singulares con fuerza colectiva. En español, el plural colectivo es más claro y idiomático, y conserva el sentido étnico sin perder la referencia poblacional.
  doctrine_reference: Ninguna; decisión semántica y gramatical del texto territorial.
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético con acuerdo alto con el audit trail inglés. No se registran revisiones textuales aplicadas; las decisiones principales reproducen el valor direccional de תֵּימָן, la posible toponimia de מְעָרָה, la pertenencia expresada por לַצִּידֹנִים y el límite territorial de גְּבוּל.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el nombre divino aparece explícitamente; aquí no aplica.
  - Se conserva un tono bíblico sobrio y moderno, evitando arcaísmos innecesarios.
  - Se translitera «Meará» y «Aphec» para mantener la transparencia de posibles topónimos.
  - Los etnónimos se normalizan al plural en español cuando el hebreo funciona colectivamente.
