base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/013/021.yaml
  text: And the charge was a pim for the plowshares[a], for the mattocks, for the three-pronged forks, and for the axes[b], and for setting the goads.
  footnotes:
  - marker: a
    text: A pim was likely a small weight or payment, often understood as about two-thirds of a shekel.
    reason: cultural_note
  - marker: b
    text: Or 'the filing/sharpening was a pim'—the Hebrew wording is difficult, and the verse may describe either the fee charged or the sharpening itself.
    reason: alternative_reading
