translation:
  language: es
  text: Como vinagre[a] a los dientes y como humo a los ojos, así es el perezoso a los que lo envían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como vino agrio a los dientes y como humo a los ojos, así es el perezoso a los que lo envían».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כַּחֹמֶץ
  english_pob_choice: vinegar
  chosen_spanish: vinagre
  alternatives_spanish:
  - vino agrio
  - vinagre avinagrado
  lexicon: HALOT
  rationale: חֹמֶץ designa una sustancia agria; en español, «vinagre» es el equivalente natural y comunica el efecto áspero e irritante del símil. «Vino agrio» conservaría la alternativa inglesa 'sour wine', pero suena menos directo en el proverbio.
- source_word: לַשִּׁנַּיִם
  english_pob_choice: to the teeth
  chosen_spanish: a los dientes
  alternatives_spanish:
  - para los dientes
  lexicon: HALOT
  rationale: La preposición ל expresa relación o efecto. «A los dientes» mantiene la estructura comparativa breve del hebreo y suena natural en español; «para los dientes» sería posible, pero puede sugerir finalidad más que impacto.
- source_word: וְכֶעָשָׁן
  english_pob_choice: smoke
  chosen_spanish: como humo
  alternatives_spanish:
  - humo
  lexicon: HALOT
  rationale: עָשָׁן es «humo» de manera directa. Añadir «como» en el texto español refleja la simetría del hebreo y la comparación con vinagre.
- source_word: לָעֵינָיִם
  english_pob_choice: to the eyes
  chosen_spanish: a los ojos
  alternatives_spanish:
  - para los ojos
  lexicon: HALOT
  rationale: Como en el miembro anterior, la preposición indica efecto sobre los ojos. «A los ojos» preserva la imagen sensorial sin cargarla de finalidad.
- source_word: כֵּן
  english_pob_choice: so is
  chosen_spanish: así es
  alternatives_spanish:
  - así
  - de igual manera es
  lexicon: HALOT
  rationale: כֵּן introduce la aplicación proverbial. «Así es» hace explícita la cópula en español sin perder la concisión sentenciosa.
- source_word: הֶעָצֵל
  english_pob_choice: the sluggard
  chosen_spanish: el perezoso
  alternatives_spanish:
  - el holgazán
  - el indolente
  lexicon: HALOT
  rationale: El término funciona como sustantivo caracterizador. «El perezoso» es claro y natural en español; «holgazán» también es viable, pero «perezoso» conserva mejor la sobriedad sapiencial.
- source_word: לְשֹׁלְחָיו
  english_pob_choice: to those who send him
  chosen_spanish: para los que lo envían
  alternatives_spanish:
  - a los que lo envían
  - para quienes lo mandan
  lexicon: HALOT
  rationale: 'La forma participial con sufijo indica plural: «los que lo envían». «Para» traduce bien el efecto/repercusión en el receptor dentro del proverbio, mientras que «a» sería más literal pero menos fluido. El pronombre «lo» expresa el objeto masculino singular del hebreo.'
translation_notes:
  revision_awareness: La versión inglesa POB se mantiene sin cambios en la revisión más reciente, y el cotejo de control muestra alta concordancia. La redacción española sigue la misma lectura principal y conserva la única alternativa léxica documentada para חֹמֶץ mediante nota.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo hebreo en dos miembros comparativos: «como vinagre... y como humo...».'
  - Se evitó «SEÑOR» u otra convención de ocultamiento porque el versículo no contiene el nombre divino.
  - «Perezoso» se usó como término sapiencial sustantivado, coherente con el registro proverbial.
  - La nota al pie preserva la alternativa textual/léxica tradicional «vino agrio» sin desplazar la lectura principal.
