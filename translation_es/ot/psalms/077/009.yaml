translation:
  language: es
  text: ¿Ha cesado para siempre su amor fiel? ¿Ha llegado a su fin su promesa[a] por generación tras generación?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su palabra»'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֶאָפֵס
  english_pob_choice: has ceased
  chosen_spanish: ¿Ha cesado
  alternatives_spanish:
  - ¿Ha llegado a su fin
  - ¿Ha fallado
  lexicon: HALOT
  rationale: La forma interrogativa con perfecto pregunta si algo se ha terminado o desaparecido. «Ha cesado» conserva bien esa idea en español y suena natural en un lamento.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por toda la eternidad
  - perpetuamente
  lexicon: HALOT
  rationale: El adverbio expresa duración permanente o indefinida. «Para siempre» es idiomático y mantiene el tono absoluto de la pregunta.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su misericordia
  alternatives_spanish:
  - su amor fiel
  - su amor constante
  - su lealtad pactal
  lexicon: HALOT
  rationale: חֶסֶד suele abarcar amor leal, favor y misericordia pactal. En español, «misericordia» comunica con claridad el favor bondadoso implícito en el lamento, aunque otras opciones retienen más explícitamente la lealtad. Se conserva la tensión semántica sin forzar un único matiz.
- source_word: גָּמַר
  english_pob_choice: has come to an end
  chosen_spanish: ha llegado a su fin
  alternatives_spanish:
  - ha terminado
  - se ha acabado
  - ha concluido
  lexicon: HALOT
  rationale: El verbo expresa consumación o cesación. «Ha llegado a su fin» reproduce bien la idea de terminación en un registro digno y claro.
- source_word: אֹמֶר
  english_pob_choice: his promise
  chosen_spanish: su palabra
  alternatives_spanish:
  - su promesa
  - su dicho
  - su declaración
  lexicon: HALOT
  rationale: Aunque en contexto puede entenderse como la promesa de Dios, la forma más cercana al léxico básico es «palabra». Esto preserva la alternativa documentada por la POB inglesa entre «promise» y «word» y evita estrechar indebidamente el sentido.
- source_word: לְדֹר וָדֹר
  english_pob_choice: for generation after generation
  chosen_spanish: para generación tras generación
  alternatives_spanish:
  - de generación en generación
  - por todas las generaciones
  lexicon: HALOT
  rationale: El modismo denota continuidad a lo largo de sucesivas generaciones. «Para generación tras generación» refleja esa repetición y mantiene el paralelismo.
theological_decisions:
- issue: 'Cómo rendir חַסְדּוֹ en un salmo de lamento: misericordia, amor fiel o lealtad pactal'
  english_pob_reading: his steadfast love
  chosen_spanish_reading: su misericordia
  alternative_spanish_readings:
  - su amor fiel
  - su lealtad pactal
  - su amor constante
  rationale: La POB inglesa elige «steadfast love» para preservar el peso de חֶסֶד sin caer en arcaísmo. En español, «misericordia» ofrece una equivalencia amplia y litúrgicamente comprensible para el favor fiel de Dios, mientras que las alternativas mantienen con mayor explicitud la dimensión de lealtad. La decisión deja visible que el término hebreo es más rico que una sola palabra castellana.
  doctrine_reference: Translation philosophy §3, §5
- issue: Si אֹמֶר debe leerse como «palabra» o como «promesa»
  english_pob_reading: his promise
  chosen_spanish_reading: su palabra
  alternative_spanish_readings:
  - su promesa
  - su dicho
  - su declaración
  rationale: La POB inglesa privilegia «promise» pero conserva «word» en nota por la ambigüedad léxica. En español, «palabra» mantiene esa transparencia y permite oír la posible referencia a la promesa divina sin cerrarla prematuramente. En el contexto del salmo, la pregunta es si ha fallado la palabra confiable de Yahvé.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El pasaje presenta un paralelismo entre la desaparición aparente de la חֶסֶד de Dios y el posible agotamiento de su אֹמֶר. La revisión inglesa reciente permaneció sin cambios y fue confirmada con alto acuerdo; por eso no se introducen ajustes textuales adicionales en español más allá de la decisión léxica transparente entre «promesa» y «palabra».
  spanish_consistency_notes:
  - Se usa «para siempre» para לָנֶצַח, en coherencia con el valor temporal absoluto documentado.
  - Se evita «SEÑOR»; el verso no contiene יהוה explícito en el hebreo dado.
  - «Su palabra» conserva la alternativa textual/lexical señalada en la nota, sin cerrar el sentido a una sola lectura.
  - La puntuación con dos preguntas mantiene el paralelismo y el tono de lamentación del hebreo.
