lexical_decisions:
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: They lived
  chosen_spanish: Habitaron
  alternatives_spanish:
  - Vivieron
  - Se establecieron
  - Residieron
  lexicon: HALOT
  rationale: El verbo ישׁב en esta forma señala residencia/habitación en un lugar. «Habitaron» mantiene la idea de residir de manera natural en español bíblico y sigue el valor del listado de asentamientos sin sugerir por sí solo una fundación inicial.
- source_word: בִּבְאֵר שֶׁבַע
  english_pob_choice: in Beer-sheba
  chosen_spanish: Beer-seba
  alternatives_spanish:
  - Beerseba
  - Beer-sheba
  lexicon: HALOT
  rationale: Es un topónimo. Se conserva la transliteración del nombre propio en una forma legible para el español, con el guion que refleja la composición del nombre hebreo y evita traducir el lugar.
- source_word: וּמוֹלָדָה
  english_pob_choice: Moladah
  chosen_spanish: Molada
  alternatives_spanish:
  - Moladá
  - Moladah
  lexicon: HALOT
  rationale: Nombre propio de lugar. Se adapta la transliteración al español con terminación natural en -a, manteniendo la identidad del topónimo sin forzar una forma inglesa.
- source_word: וַחֲצַר שׁוּעָל
  english_pob_choice: Hazar-shual
  chosen_spanish: Hazar-Sual
  alternatives_spanish:
  - Hazar-shual
  - Hazar Shual
  - Hazar-Shual
  lexicon: HALOT
  rationale: Topónimo compuesto. Se conserva el elemento «Hazar» y se translitera שׁוּעָל como «Sual», una forma breve y pronunciable en español; el guion mantiene visible la composición del nombre.
theological_decisions:
- issue: Topónimos y transliteración frente a traducción
  english_pob_reading: Names are transliterated rather than translated.
  chosen_spanish_reading: Se conservan los nombres propios de lugar en transliteración, no como traducciones descriptivas.
  alternative_spanish_readings:
  - Traducir parcialmente los nombres
  - Normalizar todo a formas castellanas tradicionales
  rationale: El versículo es una lista geográfica; no hay base textual para convertir los nombres en descripciones. La transliteración respeta el hebreo y preserva la trazabilidad del texto fuente.
  doctrine_reference: Principio de fidelidad textual y onomástica
- issue: Valor aspectual de וַיֵּשְׁבוּ
  english_pob_reading: They lived
  chosen_spanish_reading: Habitaron
  alternative_spanish_readings:
  - Vivieron
  - Se establecieron
  rationale: El hebreo indica residencia. En español, «habitaron» comunica ocupación estable sin añadir matices de origen o fundación que el versículo no explicita.
  doctrine_reference: Exégesis léxica del hebreo bíblico
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al texto fuente; el estado más reciente indica acuerdo alto y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantuvo un español neutral y publicable, con nombres propios transliterados de manera consistente.
  - Se evitó el calco inglés directo «vivieron» para preservar la sobriedad de una lista de asentamientos, aunque «habitaron» y «vivieron» son aceptables semánticamente.
  - Las notas al pie conservan alternativas ortográficas útiles para lectores y editores sin duplicar marcadores.
