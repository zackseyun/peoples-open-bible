- from: El hombre que carece de entendimiento [a] da la mano [b], saliendo fiador [c] delante de su prójimo.
  to: El hombre que carece de entendimiento[a] estrecha la mano[b], haciéndose fiador[c] delante de su prójimo.
  rationale: Se revisa el modismo manual para reflejar mejor el hebreo y la auditoría inglesa revisada, evitando la ambigüedad de «da la mano». También se sustituye «saliendo fiador» por «haciéndose fiador» para un español más natural y preciso en contexto jurídico-sapiencial. Se corrige además la puntuación tipográfica de la nota.
