id: 1CO.1.18
reference: '1 Corinthians 1:18'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ὁ λόγος γὰρ ὁ τοῦ σταυροῦ τοῖς μὲν ἀπολλυμένοις μωρία ἐστίν, τοῖς δὲ σῳζομένοις ἡμῖν δύναμις θεοῦ ἐστιν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/001/018.yaml
  text: For the message of the cross is foolishness to those who are perishing[b][a], but to us who are being saved it is the power of God.
  footnotes:
  - marker: a
    text: Or “word of the cross.”
    reason: lexical_alternative
  - marker: b
    text: Greek “us who are being saved”; the wording presents salvation here as an ongoing reality.
    reason: alternative_reading
translation:
  language: ko
  text: 십자가의 말씀이 멸망하는 자들에게는 어리석음이지만, 구원받는 우리에게는 하나님의 능력입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ὁ λόγος … ὁ τοῦ σταυροῦ
  english_pob_choice: the message of the cross
  chosen_korean: 십자가의 말씀
  alternatives_korean:
  - 십자가에 관한 말씀
  - 십자가의 메시지
  lexicon: BDAG
  rationale: λόγος를 「말씀」으로 옮겨 바울이 17–25절에서 σοφία λόγου와 대비시키는 어휘 흐름을 보존한다.
- source_word: μωρία
  english_pob_choice: foolishness
  chosen_korean: 어리석음
  alternatives_korean:
  - 미련함
  - 우둔함
  lexicon: BDAG
  rationale: σοφία/μωρία 대비를 분명히 드러내는 한국어. 「미련함」도 가능하지만 「어리석음」이 보다 직접적이다.
- source_word: ἀπολλυμένοις … σῳζομένοις
  english_pob_choice: perishing … being saved
  chosen_korean: 멸망하는 자들 … 구원받는
  alternatives_korean:
  - 망해 가는 … 구원받아 가는
  lexicon: BDAG
  rationale: 현재 수동 분사를 진행적 의미로 옮긴다.
- source_word: δύναμις θεοῦ
  english_pob_choice: the power of God
  chosen_korean: 하나님의 능력
  alternatives_korean:
  - 하나님의 권능
  lexicon: BDAG
  rationale: 24절 동일 구문과 일치 유지.
theological_decisions:
- issue: '1:18–25 σοφία/μωρία 역전 보존'
  chosen_reading: 십자가의 말씀=하나님의 어리석음이 사람의 지혜보다 더 지혜로움
  alternative_readings:
  - 「어리석음」을 「미련함」으로 완화하여 옮기는 전통적 선택
  rationale: 바울이 18–25절에서 의도적으로 구축하는 σοφία(지혜) ↔ μωρία(어리석음)의 역전 구조는 본문의 신학적 핵심이다. 「어리석음」을 약화시키지 않고 그대로 옮겨 십자가가 인간적 분류 체계를 뒤집는 능력으로 드러나도록 한다.
  doctrine_reference: 'DOCTRINE.md §5: 원어 일차성; 본문의 강한 어조를 길들이지 않는다'
