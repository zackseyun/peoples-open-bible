translation:
  language: es
  text: Quité la carga de su hombro[a]; sus manos se apartaron[b] del canasto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aparté su hombro de la carga».
    reason: previous_rendering
  - marker: b
    text: O más literalmente, «pasaron del canasto»; el hebreo usa un verbo de «pasar».
    reason: lexical_alternative
  - marker: c
    text: O «cesta», «olla» o «caldero»; el sustantivo hebreo es raro y su referente preciso es incierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲסִירוֹתִי
  english_pob_choice: I removed
  chosen_spanish: Quité
  alternatives_spanish:
  - removí
  - aparté
  lexicon: HALOT
  rationale: El Hifil perfecto de סור expresa acción causativa de quitar o retirar. En español, «quité» comunica con naturalidad la remoción efectuada por Dios sin perder el valor activo del verbo.
- source_word: מִסֵּבֶל
  english_pob_choice: from the burden
  chosen_spanish: la carga
  alternatives_spanish:
  - el peso
  - la tarea pesada
  lexicon: HALOT
  rationale: סֵבֶל designa una carga o peso impuesto. «Carga» mantiene el sentido físico y laboral y encaja bien con el paralelismo del versículo.
- source_word: שִׁכְמוֹ
  english_pob_choice: his shoulder
  chosen_spanish: su hombro
  alternatives_spanish:
  - su espalda
  lexicon: HALOT
  rationale: שכם es literalmente «hombro». Se conserva el singular, como en el hebreo, porque la imagen es concreta y deliberada.
- source_word: כַּפָּיו
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus palmas
  lexicon: HALOT
  rationale: כף puede significar «palma», pero en el contexto de trabajo manual «manos» es la equivalencia idiomática más clara en español.
- source_word: מִדּוּד
  english_pob_choice: from the basket
  chosen_spanish: del canasto
  alternatives_spanish:
  - de la cesta
  - de la olla
  - del caldero
  lexicon: HALOT
  rationale: El sustantivo דּוּד es raro y su referente exacto es incierto. «Canasto» expresa bien el objeto de carga manual sin cerrar indebidamente la ambigüedad léxica.
- source_word: תַּעֲבֹרְנָה
  english_pob_choice: passed away from
  chosen_spanish: pasaron
  alternatives_spanish:
  - se apartaron
  - fueron liberadas
  lexicon: HALOT
  rationale: El verbo עבר conserva la idea de «pasar». En español, «pasaron» evita la falsa lectura funeraria de «pasaron de largo/pasaron away» y mantiene la imagen de manos que ya no siguen cargando el recipiente.
theological_decisions:
- issue: Habla divina en primera persona y acción liberadora
  english_pob_reading: I removed the burden from his shoulder
  chosen_spanish_reading: Quité la carga de su hombro
  alternative_spanish_readings:
  - Aparté la carga de su hombro
  - Removí la carga de su hombro
  rationale: El hebreo presenta a Dios como sujeto que libera de la opresión laboral. «Quité» expresa esa acción divina de manera directa y sobria, sin introducir matices ajenos.
  doctrine_reference: Éxodo 3:7; Salmo 81:6-7
- issue: Imagen de liberación de las manos respecto del recipiente de trabajo
  english_pob_reading: his hands passed away from the basket
  chosen_spanish_reading: sus manos pasaron del canasto
  alternative_spanish_readings:
  - sus manos se apartaron del canasto
  - sus manos fueron libradas del canasto
  rationale: Se preserva la literalidad controlada del verbo עבר sin adoptar «fueron libradas», que explicita más de lo que el hebreo dice. La frase mantiene la imagen de cese de la carga manual.
  doctrine_reference: Salmo 81:7; HALOT, עבר
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del inglés, que volvió a una formulación más cercana al hebreo («removed» y un verbo más literal para עבר) después de evitar una interpretación engañosa. En español se mantiene esa cercanía, pero se adapta la sintaxis para que suene natural y no introduzca ambigüedad funeraria.
  spanish_consistency_notes:
  - Se conservó el singular de «hombro» conforme al hebreo.
  - Se prefirió «carga» frente a «peso» por mejor correspondencia semántica y registro bíblico sobrio.
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton explícito; el sujeto divino se entiende por el contexto inmediato.
  - Se usó «canasto» como equivalente funcional, con nota de ambigüedad para respetar la rareza léxica de דּוּד.
