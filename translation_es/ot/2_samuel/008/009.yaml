- from: Cuando Toi, rey de Hamat, oyó que David había derrotado[a] a todo el ejército de Hadad-ezer,
  to: Cuando Toi[a], rey de Hamat, oyó que David había abatido a todo el ejército de Hadadezer,
  rationale: Se reubica la nota textual sobre 'Toi', que es el elemento al que realmente corresponde. Se ajusta 'había derrotado' a 'había abatido' para reflejar mejor la fuerza de הִכָּה y la decisión léxica auditada en inglés. Se normaliza 'Hadadezer' para mantener consistencia con la transliteración documentada.
