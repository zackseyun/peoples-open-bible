translation:
  language: es
  text: Acab hijo de Omrí hizo lo malo a los ojos de Yahvé, más que todos los que lo precedieron.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «más que todos los que fueron antes que él».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - cometió
  lexicon: HALOT
  rationale: El hebreo עשה con un complemento moral negativo forma un modismo para cometer maldad. «Hizo» conserva el giro verbal directo sin forzar una paráfrasis.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: El adjetivo con artículo funciona sustantivado. «Lo malo» mantiene la valoración moral y suena natural en español.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - en la presencia de Yahvé
  lexicon: HALOT
  rationale: La imagen hebrea de evaluación desde la perspectiva divina se conserva bien con «a los ojos de». Sigue el valor idiomático del original y respeta el nombre divino según la política POB.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El tetragrámaton se vierte como «Yahvé» conforme al estándar español del proyecto, evitando la sustitución por un título.
- source_word: מִכֹּל אֲשֶׁר לְפָנָיו
  english_pob_choice: more than all who were before him
  chosen_spanish: más que todos los que habían estado antes que él
  alternatives_spanish:
  - más que todos los que lo precedieron
  - más que todos los anteriores a él
  lexicon: HALOT
  rationale: La comparación expresa superioridad en grado sobre los predecesores. «Habían estado antes que él» conserva la referencia temporal de לְפָנָיו con español natural.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene el nombre propio del pacto y no una sustitución reverencial. El español «Yahvé» es la forma estándar del proyecto para el Tetragrámaton.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Valor comparativo de מִכֹּל אֲשֶׁר לְפָנָיו
  english_pob_reading: more than all who were before him
  chosen_spanish_reading: más que todos los que habían estado antes que él
  alternative_spanish_readings:
  - más que todos los que lo precedieron
  rationale: La comparación no introduce una lectura doctrinal nueva; simplemente expresa en español la superioridad de Acab sobre sus predecesores, preservando el sentido histórico del texto.
  doctrine_reference: 'DOCTRINE.md: Translation principle — preserve source comparisons without flattening them'
translation_notes:
  revision_awareness: Se corrigió el anclaje de nota para que el marcador [a] aparezca exactamente en el texto español. La redacción sigue el paquete fuente original y el rastreo auditado en inglés, sin cambios de sentido respecto de la versión previa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - «Lo malo» conserva el valor sustantivado de הָרַע.
  - La comparación final mantiene la relación con los predecesores sin introducir matices adicionales.
  - El tono es bíblico y publicable, con sintaxis natural para lectura comunitaria.
