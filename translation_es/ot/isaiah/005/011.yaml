revisions:
- from: ¡Ay de los que se levantan de madrugada para seguir la sidra[a], los que se quedan hasta tarde en la noche hasta que el vino los enciende!
  to: ¡Ay de los que se levantan temprano por la mañana para perseguir la bebida embriagante, los que se quedan hasta tarde, hasta el anochecer[a], hasta que el vino los enciende!
  rationale: Se reemplaza «sidra» por «bebida embriagante» para reflejar con fidelidad y claridad el sentido amplio de שֵׁכָר en español actual. Se ajusta la expresión temporal a «hasta el anochecer» con nota alternativa para preservar el matiz léxico de נֶשֶׁף. También se mejora la fluidez y el paralelismo del verso en español sin alejarse del hebreo ni del audit trail inglés. «Los enciende» puede mantenerse como metáfora natural del efecto inflamante del vino.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:58:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del ay profético y el paralelo temporal, pero falla en un punto léxico clave: שֵׁכָר no debe verterse como «sidra», porque en español moderno remite a una bebida específica y engañosa; el sentido fuente es general, «bebida embriagante/fuerte». También «en la noche» sobreinterpreta נֶשֶׁף, que aquí se entiende mejor como «anochecer/tarde/noche caída», y la repetición «hasta tarde en la noche hasta que» suena torpe. El resto del sentido básico sí está preservado.'
  spanish_quality_summary: El español es comprensible, pero «seguir la sidra» suena poco natural y semánticamente desviado para lectores actuales. «Se quedan hasta tarde en la noche hasta que» es redundante y pesado. Una redacción más natural y fiel sería «persiguen la bebida embriagante» y «se quedan hasta tarde, hasta el anochecer[a]».
  glossary_alignment: No hay términos del glosario mayor en juego salvo coherencia léxica general. La principal desalineación es usar «sidra» para שֵׁכָר en vez de un término amplio y contextualmente correcto como «bebida embriagante» o «bebida fuerte».
  issues:
  - severity: high
    issue: «sidra» para שֵׁכָר
    rationale: El hebreo designa una bebida alcohólica intoxicante distinta del vino, pero no específicamente sidra. En español contemporáneo «sidra» nombra una bebida concreta, creando un falso equivalente y reduciendo indebidamente el alcance del término.
  - severity: medium
    issue: «en la noche» para בַנֶּשֶׁף
    rationale: נֶשֶׁף se refiere a la penumbra/anochecer/crepúsculo, y el propio audit trail conserva alternativa léxica. «En la noche» desplaza el matiz hacia una etapa posterior y menos precisa del día.
  - severity: medium
    issue: 'Redacción poco natural: «se quedan hasta tarde en la noche hasta que»'
    rationale: La secuencia repite la idea de duración y entorpece la lectura. El español puede expresar el paralelo hebreo con mayor claridad sin perder literalidad esencial.
  - severity: low
    issue: «seguir» debilita ligeramente יִרְדֹּפוּ
    rationale: Aunque no es incorrecto, «perseguir» o «andar tras» transmite mejor la idea de ir tras la bebida con afán. «Seguir» puede sonar demasiado neutro.
  revised_spanish_text: ¡Ay de los que se levantan temprano por la mañana para perseguir la bebida embriagante, los que se quedan hasta tarde, hasta el anochecer[a], hasta que el vino los enciende!
  revised_footnotes:
