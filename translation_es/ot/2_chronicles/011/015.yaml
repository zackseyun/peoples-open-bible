  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del hebreo: Jeroboam/Rehoboam ''nombró/instaló'' sacerdotes ''para sí'' para los lugares altos, para los שְׂעִירִים y para los becerros que había hecho. También preserva correctamente el pluscuamperfecto en la cláusula relativa. La única dificultad importante está en la naturalidad y precisión del español para שְׂעִירִים.'
