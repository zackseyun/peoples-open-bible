lexical_decisions:
- source_word: κατὰ πάντα
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - de todas maneras
  - completamente
  - en toda forma
  lexicon: LSJ
  rationale: La expresión intensifica la bendición en sentido global. «En todo» conserva la amplitud del griego con un español breve y natural; evita añadir una matización interpretativa más fuerte que el texto no exige.
- source_word: εὐλογητὸς
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Alabado
  - Bendecido
  - Digno de bendición
  lexicon: LSJ
  rationale: Como predicado doxológico, «bendito» mantiene el registro litúrgico y declarativo del griego. «Alabado» desplaza el valor hacia la acción humana; «bendecido» suena menos estable en esta fórmula.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios
  - el Dios nuestro
  lexicon: LSJ
  rationale: El posesivo del griego ἡμῶν se refleja de modo directo con «nuestro». En español, la estructura «nuestro Dios» es natural y conserva el énfasis relacional del original.
- source_word: ἔδωκεν
  english_pob_choice: gave over
  chosen_spanish: entregó
  alternatives_spanish:
  - dio
  - lo entregó
  - hizo caer
  lexicon: LSJ
  rationale: El verbo puede significar simplemente «dar», pero aquí rige a personas como objeto y el contexto de juicio exige una entrega a consecuencia o en manos de otro. «Entregó» preserva esa fuerza sin sobretraducir con una perífrasis innecesaria.
- source_word: τοὺς ἀσεβήσαντας
  english_pob_choice: those who acted wickedly
  chosen_spanish: a los que actuaban impíamente
  alternatives_spanish:
  - a los impíos
  - a los que obraron maldad
  - a los que fueron impíos
  lexicon: LSJ
  rationale: El participio aoristo de ἀσεβέω expresa conducta impía; «actuaban impíamente» conserva el aspecto verbal y el matiz religioso-moral. «Impíos» sería más estático y perdería la acción contenida en el participio.
theological_decisions:
- issue: Integridad del texto fuente y brevedad inusual del versículo
  english_pob_reading: Translate the extant Zone 1 Greek as a short doxological statement ending with judgment on the wicked, while noting that the source validation flags a major mismatch.
  chosen_spanish_reading: Traducir el griego atestiguado tal como está, como una doxología breve seguida de la entrega de los que actuaban impíamente, sin reconstruir un texto más largo.
  alternative_spanish_readings:
  - Seguir una lectura ampliada basada en otras ediciones o manuscritos.
  - Suavizar el final con una formulación menos judicial.
  rationale: El paquete fuente marca una discrepancia importante y el proyecto exige primacía del idioma original proporcionado. Por eso se traduce el texto griego extenso sólo en la medida en que está atestiguado, y se preserva la rareza textual sin intentar armonizarla.
  doctrine_reference: 'PHILOSOPHY.md: primacía de la fuente original; transparencia ante la incertidumbre textual'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador en español mantiene esa lectura y conserva la brevedad y la incertidumbre textual documentadas.
  spanish_consistency_notes:
  - Se usa «Bendito» como fórmula doxológica, coherente con el registro bíblico y sin sustituirlo por «Alabado».
  - Se mantiene «impíamente» para reflejar el participio griego y no reducirlo a un simple adjetivo estático.
  - La nota al pie se ancla en «nuestro Dios[a]» para reflejar la advertencia sobre la brevedad y posible desajuste del testimonio griego.
