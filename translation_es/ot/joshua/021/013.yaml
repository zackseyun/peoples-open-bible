translation:
  language: es
  text: Y a los hijos de Aarón el sacerdote les dieron Hebrón[a], la ciudad de refugio para el que mató, con sus pastizales, y Libna con sus pastizales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘la ciudad de refugio para el homicida’ o ‘para el que mata’. El término hebreo aquí es un término legal para quien ha causado una muerte y puede huir a una ciudad de refugio; ‘el que mató’ expresa ese matiz sin implicar necesariamente asesinato premeditado.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלִבְנֵי
  english_pob_choice: And to the sons of
  chosen_spanish: Y a los hijos de
  alternatives_spanish:
  - Y para los hijos de
  - Y a los descendientes de
  lexicon: HALOT
  rationale: La preposición ל indica destinatario/beneficiario, por eso 'a'. בנים en constructo con un nombre propio funciona naturalmente como 'hijos de'; en español 'hijos de' preserva la forma genealógica y suena natural en este contexto levítico.
- source_word: אַהֲרֹן הַכֹּהֵן
  english_pob_choice: Aaron the priest
  chosen_spanish: Aarón el sacerdote
  alternatives_spanish:
  - Aarón, el sacerdote
  - Aarón el sumo sacerdote
  lexicon: HALOT
  rationale: El hebreo presenta un sintagma en aposición que identifica a Aarón por su oficio. 'El sacerdote' conserva esa identificación sin introducir 'sumo', que no está en el texto.
- source_word: נָתְנוּ
  english_pob_choice: they gave
  chosen_spanish: les dieron
  alternatives_spanish:
  - les asignaron
  - les concedieron
  lexicon: HALOT
  rationale: נתן es el verbo básico 'dar'. En un contexto de reparto territorial puede implicar asignación, pero 'dar' mantiene mayor cercanía al hebreo y funciona bien con el complemento dativo 'les'.
- source_word: עִיר מִקְלַט הָרֹצֵחַ
  english_pob_choice: the city of refuge for the manslayer
  chosen_spanish: la ciudad de refugio del homicida
  alternatives_spanish:
  - la ciudad de refugio del que mató
  - la ciudad de asilo del homicida
  lexicon: HALOT
  rationale: '''Ciudad de refugio'' es la expresión estable del pasaje. Para רֹצֵחַ, ''homicida'' preserva el valor legal de quien causó una muerte, sin cargar necesariamente la idea de asesinato premeditado; por eso se evita ''asesino'' y también una paráfrasis más larga.'
- source_word: חֶבְרוֹן
  english_pob_choice: Hebron
  chosen_spanish: Hebrón
  alternatives_spanish:
  - Hebrón
  lexicon: HALOT
  rationale: Topónimo estándar en español bíblico.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus ejidos
  alternatives_spanish:
  - sus tierras de pasto
  - sus pastizales
  lexicon: HALOT
  rationale: מִגְרָשׁ designa el terreno abierto que rodea la ciudad, a menudo traducido como 'pasturelands'. En español bíblico 'ejidos' comunica bien el terreno anexo/comunal de la ciudad; se evita 'pasturelands' literal por ser menos natural en español.
- source_word: לִבְנָה
  english_pob_choice: Libnah
  chosen_spanish: Libna
  alternatives_spanish:
  - Libná
  - Libna
  lexicon: HALOT
  rationale: Topónimo estándar. Se emplea la forma castellana breve 'Libna' para mantener uniformidad y legibilidad en español.
- source_word: מִגְרָשֶׁיהָ
  english_pob_choice: its pasturelands
  chosen_spanish: sus ejidos
  alternatives_spanish:
  - sus tierras de pasto
  - sus pastizales
  lexicon: HALOT
  rationale: La misma elección léxica aplica al segundo miembro coordinado para conservar consistencia terminológica en el versículo.
translation_notes:
  revision_awareness: Se ha mantenido el sentido del reparto territorial sacerdotal y la terminología legal de la ciudad de refugio conforme al hebreo y al auditoría inglesa; no se requirieron revisiones posteriores en la pasada más reciente.
  spanish_consistency_notes:
  - Se conserva 'ciudad de refugio' como término técnico uniforme.
  - Se traduce מִגְרָשׁ como 'ejidos' para mantener un equivalente español natural del terreno anexo a la ciudad.
  - Se usa 'hijos de Aarón' para reflejar el constructo genealógico hebreo sin sobreinterpretar.
  - La nota [a] preserva la tensión lexical del término legal רֹצֵחַ.
