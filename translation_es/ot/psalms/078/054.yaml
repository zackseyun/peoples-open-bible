    issue: «su santo límite» es poco natural en español
    rationale: Aunque «límite» es posible léxicamente para גְּבוּל, la combinación «santo límite» suena forzada en español bíblico contemporáneo y dificulta la lectura. «santa frontera» conserva mejor la idea de borde/boundary del texto auditado y suena más idiomática.
  - severity: low
    issue: «Y los llevó» no refleja tan bien el matiz elegido por el POB
    rationale: El expediente inglés escogió deliberadamente 'So he brought them'. En español, «Así los llevó» o «Entonces los llevó» refleja mejor el valor consecutivo/recapitulativo sin ser pesado. No es un error grave, pero conviene alinearlo.
  - severity: medium
    issue: La nota d no reproduce la alternativa documentada en el audit trail inglés
    rationale: La nota inglesa d preserva una redacción previa con 'holy territory'. La nota española actual solo parafrasea el mismo texto principal. Debe reflejar la alternativa «territorio santo» o equivalente, para conservar el historial de revisión.
  revised_spanish_text: Así los llevó a su santa frontera,[a] esta montaña[b] que su mano derecha adquirió.[c][d]
