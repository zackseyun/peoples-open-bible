  lexicon: HALOT
  rationale: Es un nombre propio sacerdotal; en español conviene transliterarlo, no traducirlo. «Sekenías» mantiene la forma sonora del hebreo y evita la carga de una forma inglesa intermedia. La vocalización española se adapta para lectura natural sin alterar la identidad del nombre.
- source_word: רְחֻם
  english_pob_choice: Rehum
  chosen_spanish: Rehum
  alternatives_spanish:
  - Rejún
  - Rejum
  lexicon: HALOT
  rationale: Nombre propio; se conserva la transliteración breve y reconocible. En español, «Rehum» comunica adecuadamente la forma tradicional sin introducir una ortografía más interpretativa que el hebreo no exige.
- source_word: מְרֵמֹת
  english_pob_choice: Meremoth
  chosen_spanish: Meremot
  alternatives_spanish:
  - Meremoth
  - Meremot
  lexicon: HALOT
  rationale: Nombre propio; se translitera. Se prefiere «Meremot» porque en español la terminación -th del inglés no corresponde a ninguna consonante hebrea aquí y puede sonar artificial; «Meremot» conserva mejor la forma del nombre para una lectura en español.
translation_notes:
  revision_awareness: 'El paquete fuente muestra total acuerdo entre el texto hebreo y la auditoría inglesa: solo aparecen tres nombres propios en una lista sacerdotal, sin variantes textuales ni decisiones teológicas. La versión española sigue esa estabilidad y simplemente adapta los nombres a una forma legible en español.'
  spanish_consistency_notes:
  - Se mantiene el formato de lista breve con tres nombres separados por comas, sin añadir conectores no presentes en el hebreo.
  - No se traduce ningún nombre propio; todos se transliteran por tratarse de un registro onomástico.
  - Se evita la ortografía inglesa cuando no aporta valor en español, especialmente en el final de «Meremot».
