translation:
  language: es
  text: Todo lo que en el agua no tiene aletas ni escamas es detestable para ustedes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abominable para ustedes». El hebreo שֶׁקֶץ denota algo ritualmente detestable o aborrecible en este contexto de ley alimentaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: Everything
  chosen_spanish: Todo lo que
  alternatives_spanish:
  - Todo
  - Todo aquello que
  - Cualquier cosa que
  lexicon: HALOT
  rationale: כֹּל introduce una categoría total; en español, «Todo lo que» conserva ese alcance general y suena natural en una cláusula relativa.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  - quien
  lexicon: HALOT
  rationale: La partícula relativa se expresa con «que», la opción más idiomática y neutral en este contexto clasificatorio.
- source_word: אֵין לוֹ
  english_pob_choice: does not have
  chosen_spanish: no tiene
  alternatives_spanish:
  - carece de
  - no posee
  lexicon: HALOT
  rationale: 'La negación existencial con complemento pronominal se vuelve más natural en español con una construcción de posesión: «no tiene».'
- source_word: סְנַפִּיר
  english_pob_choice: fins
  chosen_spanish: aletas
  alternatives_spanish:
  - una aleta
  - aleta
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, aquí funciona genéricamente para la clase de criaturas acuáticas; en español, el plural «aletas» comunica mejor la clasificación zoológica.
- source_word: וְקַשְׂקֶשֶׂת
  english_pob_choice: scales
  chosen_spanish: escamas
  alternatives_spanish:
  - una escama
  - escama
  lexicon: HALOT
  rationale: Como con «aletas», el singular hebreo tiene valor genérico; «escamas» es la forma natural en español para la descripción de peces.
- source_word: בַּמָּיִם
  english_pob_choice: in the water
  chosen_spanish: en el agua
  alternatives_spanish:
  - en las aguas
  lexicon: HALOT
  rationale: El plural hebreo מַיִם suele corresponder al singular colectivo «agua» en español; conserva la localización sin sonar artificial.
- source_word: שֶׁקֶץ
  english_pob_choice: detestable
  chosen_spanish: detestable
  alternatives_spanish:
  - abominable
  - una cosa abominable
  - una cosa detestable
  lexicon: HALOT
  rationale: En este contexto legal alimentario, שֶׁקֶץ expresa repulsión ritual o aborrecimiento; «detestable» reproduce bien esa fuerza sin añadir tecnicismos ajenos.
- source_word: הוּא
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - lo es
  - resulta ser
  lexicon: HALOT
  rationale: El pronombre independiente refuerza la cláusula nominal; en español se expresa de forma directa con el verbo copulativo «es».
- source_word: לָכֶם
  english_pob_choice: to you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - a ustedes
  lexicon: HALOT
  rationale: La frase marca la aplicación del mandamiento al pueblo. «Para ustedes» conserva el valor de destinatario/aplicabilidad y mantiene un registro neutral de español latinoamericano.
theological_decisions:
- issue: Valor ritual de שֶׁקֶץ en el contexto de ley alimentaria
  english_pob_reading: detestable
  chosen_spanish_reading: detestable
  alternative_spanish_readings:
  - abominable
  - una abominación
  - cosa impura
  rationale: La lectura «detestable» preserva el juicio fuerte del término sin confundirlo con vocabulario técnico distinto de impureza ritual. «Abominable» es posible, pero puede sonar más cargado o más abstracto en español contemporáneo.
  doctrine_reference: Levítico 11; distinción léxica entre repulsión ritual y categorías generales de impureza.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto hebreo WLC y el audit trail inglés: כֹּל como totalizador, אֵין לוֹ como negación de posesión, plurales genéricos para סְנַפִּיר y קַשְׂקֶשֶׂת, y שֶׁקֶץ con fuerza ritual más que como término técnico de impureza general. No se requirieron revisiones textuales adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; en este versículo no aparece.
  - Se usa «detestable» de manera coherente con el valor semántico documentado para שֶׁקֶץ.
  - Se adopta español neutro de registro bíblico contemporáneo, evitando calcos innecesarios y evitando sustituir la cita legal por una paráfrasis.
