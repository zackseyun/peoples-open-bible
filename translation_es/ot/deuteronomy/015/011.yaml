translation:
  language: es
  text: 'Porque no dejará de haber pobres de en medio de la tierra; por eso te mando, diciendo: ‘Debes abrir bien tu mano a tu hermano[a], a tu afligido[b] y a tu pobre en tu tierra.’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘a tu compatriota israelita’. El hebreo dice ‘a tu hermano’, usando lenguaje de parentesco pactual con fuerza representativa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ‘a tu necesitado’. El hebreo distingue este término de ‘pobre’; puede implicar aflicción, abatimiento o pobreza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶבְיוֹן
  english_pob_choice: the poor / your poor one
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitado
  - menesteroso
  lexicon: HALOT
  rationale: En este versículo el término funciona de manera colectiva y también reaparece en la expresión final. ‘Pobre’ es la opción más natural en español y conserva el sentido socioeconómico principal sin agregar matices no requeridos por el hebreo.
- source_word: מִקֶּרֶב הָאָרֶץ
  english_pob_choice: from the midst of the land
  chosen_spanish: en medio de la tierra
  alternatives_spanish:
  - de la tierra
  - en medio del país
  lexicon: HALOT
  rationale: ‘En medio de’ reproduce el valor de קֶרֶב como ‘centro/medio’. ‘Tierra’ mantiene el marco deuteronómico de la tierra prometida; ‘país’ sería menos fiel al lenguaje bíblico del contexto.
- source_word: אָנֹכִי מְצַוְּךָ
  english_pob_choice: I am commanding you
  chosen_spanish: te mando
  alternatives_spanish:
  - te estoy mandando
  - te ordeno
  lexicon: HALOT
  rationale: El participio con valor de mandato directo se expresa con naturalidad en español con ‘te mando’. Se conserva la fuerza imperativa sin sobreactuar la progresividad del original.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - 'así:'
  - con estas palabras
  lexicon: HALOT
  rationale: Se mantiene el encabezado quotativo del hebreo. ‘Diciendo’ es formal y transparente, aunque en español suene ligeramente marcadamente bíblico.
- source_word: פָּתֹחַ תִּפְתַּח
  english_pob_choice: You must surely open
  chosen_spanish: Sin falta abrirás
  alternatives_spanish:
  - abrirás de cierto
  - abrirás ciertamente
  - abrirás sin reserva
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto más verbo finito intensifica el mandato. ‘Sin falta’ comunica bien la obligación enfática en español sin depender de un calco pesado.
- source_word: אֶת יָדְךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tu mano abierta
  - tu palma
  lexicon: HALOT
  rationale: Se preserva la metáfora de la mano como signo de generosidad. El verbo intensificado ya aporta la idea de liberalidad, así que no hace falta explicitarla más en el texto principal.
- source_word: לְאָחִיךָ
  english_pob_choice: to your brother
  chosen_spanish: a tu hermano
  alternatives_spanish:
  - a tu pariente
  - a tu compatriota
  lexicon: HALOT
  rationale: Se conserva la kinship language del hebreo. ‘Hermano’ mantiene el valor pactual y representativo mejor que una neutralización interpretativa.
- source_word: לַעֲנִיֶּךָ
  english_pob_choice: to your afflicted one
  chosen_spanish: a tu afligido
  alternatives_spanish:
  - a tu necesitado
  - a tu pobre
  lexicon: HALOT
  rationale: Se sigue la decisión inglesa de distinguir este término de אֶבְיוֹן. ‘Afligido’ preserva el posible matiz de pobreza unida a aflicción o humillación, sin borrar la tensión semántica.
- source_word: וּלְאֶבְיֹנְךָ
  english_pob_choice: and to your poor one
  chosen_spanish: y a tu pobre
  alternatives_spanish:
  - y a tu necesitado
  - y a tu menesteroso
  lexicon: HALOT
  rationale: Se conserva la diferencia respecto a עָנִי/‘afligido’. ‘Pobre’ enlaza además con la primera cláusula y mantiene la repetición del término hebreo.
- source_word: בְּאַרְצֶךָ
  english_pob_choice: in your land
  chosen_spanish: en tu tierra
  alternatives_spanish:
  - en tu país
  - dentro de tu tierra
  lexicon: HALOT
  rationale: ‘Tierra’ reproduce el lenguaje covenantal de Deuteronomio y evita el desplazamiento moderno de ‘país’. También armoniza con la primera cláusula.
theological_decisions:
- issue: Kinship language and covenant scope
  english_pob_reading: to your brother / fellow Israelite
  chosen_spanish_reading: a tu hermano
  alternative_spanish_readings:
  - a tu compatriota
  - a tu pariente
  rationale: El hebreo usa lenguaje de parentesco singular con fuerza representativa. En español, ‘hermano’ conserva esa carga pactual y deja abierta la extensión comunitaria sin borrar la forma del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: La tierra como ámbito pactal
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - territorio
  rationale: En Deuteronomio la referencia es la tierra del pacto, no ‘la tierra’ en sentido planetario ni un ‘país’ moderno. ‘Tierra’ preserva el ámbito teológico-histórico del pasaje.
  doctrine_reference: DOCTRINE.md §Covenant setting and land language
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés: conserva la fuerza enfática de פָּתֹחַ תִּפְתַּח, distingue entre עֲנִיֶּךָ y אֶבְיֹנְךָ, y mantiene el marco de ‘tierra’ coherente con Deuteronomio. No se han aplicado revisiones posteriores porque el expediente inglés indica alta concordancia y sin cambios.'
  spanish_consistency_notes:
  - Se usa ‘tierra’ de manera uniforme para הָאָרֶץ / אַרְצֶךָ.
  - Se preserva ‘hermano’ por la kinship language del pacto.
  - Se mantiene la distinción semántica entre ‘afligido’ y ‘pobre’.
  - La puntuación con comillas simples sigue el estilo del expediente inglés y delimita bien la cita interna.
