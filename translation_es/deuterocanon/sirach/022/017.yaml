    rationale: Aunque intenta reflejar ambos elementos de διανοίας συνέσεως, la combinación suena redundante y dura. «Comprensión inteligente» o «discernimiento reflexivo» expresan mejor el sentido en español.
  - severity: medium
    issue: «decoración de estuco» sobreinterpreta el griego
    rationale: El inglés auditado reconoce incertidumbre en los términos de superficie del muro. Añadir «estuco» fija un material específico no asegurado por el original y desplaza la imagen hacia algo más técnico/oramental de lo necesario.
  - severity: low
    issue: «pared» es aceptable, pero «muro» armoniza mejor con la nota y la imagen arquitectónica
    rationale: No es un error, pero «muro» combina mejor con «acabado» y con la descripción arquitectónica de la nota al pie.
