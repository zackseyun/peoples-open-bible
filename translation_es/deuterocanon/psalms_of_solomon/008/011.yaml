translation:
  language: es
  text: Cada uno estaba cometiendo adulterio con la esposa de su prójimo[a]; hicieron alianzas entre sí bajo juramento acerca de estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse más literalmente: «hicieron alianzas con ellos por juramento acerca de estas cosas». El dativo αὐτοῖς permite una lectura más cercana a «con ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμοιχῶντο
  english_pob_choice: was committing adultery
  chosen_spanish: estaba cometiendo adulterio
  alternatives_spanish:
  - cometía adulterio
  - se estaba adulterando
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o repetida; en español, «estaba cometiendo adulterio» conserva mejor esa fuerza aspectual que un pretérito simple.
- source_word: ἕκαστος
  english_pob_choice: Each one
  chosen_spanish: Cada uno
  alternatives_spanish:
  - Cada cual
  - Cada persona
  lexicon: BDAG
  rationale: La forma distributiva singular se mantiene explícita en español para mostrar que la acusación recaía individualmente sobre cada uno.
- source_word: τὴν γυναῖκα τοῦ πλησίον αὐτοῦ
  english_pob_choice: his neighbor’s wife
  chosen_spanish: la esposa de su prójimo
  alternatives_spanish:
  - la mujer de su prójimo
  - la esposa de su vecino
  lexicon: BDAG
  rationale: «Esposa» comunica con claridad el contexto de adulterio; «prójimo» sigue de cerca el sentido relacional de πλησίον y evita reducirlo a un simple vecino físico.
- source_word: συνέθεντο
  english_pob_choice: made
  chosen_spanish: hicieron
  alternatives_spanish:
  - concertaron
  - entraron en
  lexicon: BDAG
  rationale: Con συνθήκας, el verbo tiene el sentido de concertar o hacer un acuerdo. «Hicieron» es natural en español y mantiene la construcción directa del original.
- source_word: συνθήκας
  english_pob_choice: covenants
  chosen_spanish: pactos
  alternatives_spanish:
  - convenios
  - acuerdos
  lexicon: BDAG
  rationale: Aunque el inglés revisado eligió «covenants», en este contexto la referencia apunta a arreglos solemnes y conspirativos; «pactos» conserva formalidad sin forzar un peso teológico más fuerte que el pasaje exige.
- source_word: αὐτοῖς
  english_pob_choice: with one another
  chosen_spanish: entre sí
  alternatives_spanish:
  - con ellos
  - unos con otros
  lexicon: BDAG
  rationale: El dativo es comprimido; «entre sí» expresa de forma natural la reciprocidad entre los culpables y evita ambigüedad en español.
- source_word: μετὰ ὅρκου
  english_pob_choice: under oath
  chosen_spanish: bajo juramento
  alternatives_spanish:
  - con juramento
  - por juramento
  lexicon: BDAG
  rationale: «Bajo juramento» reproduce el valor solemne y vinculante del original con una expresión idiomática clara en español.
- source_word: περὶ τούτων
  english_pob_choice: about these things
  chosen_spanish: acerca de estas cosas
  alternatives_spanish:
  - sobre estas cosas
  - respecto de esto
  lexicon: BDAG
  rationale: La frase retoma los actos de adulterio mencionados antes; «acerca de estas cosas» es cercana al griego y plenamente inteligible.
theological_decisions:
- issue: Naturaleza del vínculo expresado por συνθήκας
  english_pob_reading: covenants
  chosen_spanish_reading: pactos
  alternative_spanish_readings:
  - convenios
  - acuerdos
  rationale: El inglés POB revisó la lectura hacia «covenants» para reflejar mejor el sustantivo griego, pero en español «pactos» conserva el registro formal sin sugerir automáticamente la categoría bíblico-teológica de «pacto» en sentido redentivo; así se mantiene la denuncia moral y la solemnidad del texto.
  doctrine_reference: Léxico bíblico sobre pacto/alianza
- issue: Relación entre el adulterio y el juramento
  english_pob_reading: under oath
  chosen_spanish_reading: bajo juramento
  alternative_spanish_readings:
  - con juramento
  - por juramento
  rationale: 'La combinación subraya la gravedad moral: no sólo cometen adulterio, sino que además formalizan el mal con juramento. «Bajo juramento» preserva esa tensión sin suavizarla.'
  doctrine_reference: Ética bíblica del juramento
- issue: Reciprocidad del dativo αὐτοῖς
  english_pob_reading: with one another
  chosen_spanish_reading: entre sí
  alternative_spanish_readings:
  - con ellos
  - unos con otros
  rationale: La relación mutua es importante porque el texto describe complicidad colectiva. «Entre sí» comunica esa reciprocidad de manera compacta y natural.
  doctrine_reference: Lectura sintáctica del griego
translation_notes:
  revision_awareness: Se tomó como punto de partida la versión inglesa revisada que optó por «covenants» en lugar de «agreements». La traducción española conserva esa formalidad con «pactos», pero ajusta la sintaxis para sonar natural en español y mantiene el matiz imperfectivo de ἐμοιχῶντο con «estaba cometiendo».
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay aquí un término divino que requiera ese tratamiento.
  - Se usa «prójimo» para πλησίον en coherencia con el sentido relacional del griego.
  - Se mantiene un registro sobrio y judicial, acorde con la acusación del pasaje.
  - La nota textual conserva la alternativa gramatical del dativo sin duplicar el sentido principal del texto.
