translation:
  language: es
  text: No te sobrevendrá mal alguno[a], ni plaga se acercará a tu tienda[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «No te acontecerá mal alguno».
    reason: lexical_alternative
  - marker: b
    text: O «morada», conservando el sentido más amplio de la vivienda o del hogar de una persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: תְאֻנֶּה
  english_pob_choice: will happen
  chosen_spanish: te sobrevendrá
  alternatives_spanish:
  - te acontecerá
  - te sucederá
  - te ocurrirá
  lexicon: HALOT
  rationale: El hebreo expresa que algo le sucede o le cae encima a la persona. En español, «sobrevenir» conserva el matiz de acontecer de manera que irrumpe sobre alguien, y funciona bien con la negación poética del versículo.
- source_word: רָעָה
  english_pob_choice: harm
  chosen_spanish: mal
  alternatives_spanish:
  - daño
  - mal alguno
  - calamidad
  lexicon: HALOT
  rationale: En este contexto protector, el sustantivo no apunta principalmente a maldad moral sino a daño o desgracia. «Mal» es breve, natural y suficientemente amplio en español para conservar esa fuerza.
- source_word: נֶגַע
  english_pob_choice: plague
  chosen_spanish: plaga
  alternatives_spanish:
  - azote
  - aflicción
  - castigo
  lexicon: HALOT
  rationale: El término puede abarcar una aflicción que golpea, y en este contexto la idea de plaga encaja con el campo semántico de amenaza/peste del salmo. «Plaga» mantiene la imagen concreta del texto inglés auditado.
- source_word: יִקְרַב
  english_pob_choice: will come near
  chosen_spanish: se acercará
  alternatives_spanish:
  - vendrá cerca
  - llegará cerca
  - se aproximará
  lexicon: HALOT
  rationale: קרב expresa acercamiento espacial. «Se acercará» es la forma natural en español y conserva la imagen de proximidad negada por el texto.
- source_word: אָהֶל
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - morada
  - vivienda
  - hogar
  lexicon: HALOT
  rationale: El hebreo dice literalmente «tienda». «Tienda» conserva la imagen concreta y, en español bíblico, todavía puede sugerir la morada o casa del creyente sin forzar el sentido.
- source_word: אֵלֶיךָ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - sobre ti
  - contra ti
  lexicon: HALOT
  rationale: La preposición marca dirección hacia el destinatario. En español, «a ti» encaja de forma natural con «sobrevendrá» y evita cargar el verso con una lectura más interpretativa.
theological_decisions:
- issue: Alcance de la promesa de protección
  english_pob_reading: Render the verse as a poetic promise of divine protection without specifying an absolute guarantee against every temporal suffering in all circumstances.
  chosen_spanish_reading: Presentar el versículo como una promesa poética de protección divina sin convertirlo en una garantía absoluta contra todo sufrimiento temporal en toda circunstancia.
  alternative_spanish_readings:
  - Entenderlo como una garantía absoluta de que ningún sufrimiento físico tocará jamás al fiel
  - Suavizarlo hasta tratarlo solo como consuelo general sin carácter promisor
  rationale: El hebreo afirma la protección de manera directa y poética. La traducción debe conservar esa fuerza promesal sin resolver debates teológicos más amplios sobre el sufrimiento y la providencia que el versículo no determina por sí mismo.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente mantiene el texto sin cambios; el control cruzado reporta alta concordancia y acuerdo general, así que no se introdujeron ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología estándar del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - «Tienda» conserva la imagen concreta del hebreo, mientras la nota ofrece la alternativa de sentido ampliado sin sustituirla en el texto principal.
  - «Mal» y «plaga» siguen la distinción contextual entre daño general y azote específico, sin moralizar el primero.
