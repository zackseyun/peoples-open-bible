  text: נֶ֣פֶשׁ שְׂ֭בֵעָה תָּב֣וּס נֹ֑פֶת וְ/נֶ֥פֶשׁ רְ֝עֵבָ֗ה כָּל מַ֥ר מָתֽוֹק־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/027/007.yaml
  text: A satisfied person despises honey[b][a], but to a hungry person every bitter thing is sweet.
  footnotes:
  - marker: a
    text: Or 'A full soul tramples honey underfoot, but to a hungry soul every bitter thing is sweet.' The Hebrew uses 'soul' idiomatically for the person or appetite.
    reason: lexical_alternative
  - marker: b
    text: '''Honey'' may more specifically refer to comb honey or flowing honey.'
    reason: lexical_alternative
