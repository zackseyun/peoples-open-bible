  glossary_alignment: No hay términos del glosario principal en tensión aquí. «Basán», «amorreos» y «Jordán» están bien. La elección «tomaron posesión de» coincide con la decisión documentada para וַיִּירְשׁוּ. «Del otro lado del Jordán» es aceptable para בְּעֵבֶר הַיַּרְדֵּן, y «hacia la salida del sol» preserva la imaginería de מִזְרַח שָׁמֶשׁ.
