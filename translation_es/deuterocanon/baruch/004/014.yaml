translation:
  language: es
  text: Que vengan los vecinos de Sión[a], que vengan los vecinos; y recuerden el cautiverio de mis hijos y de mis hijas[b], que el Eterno hizo venir sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los residentes/forasteros de Sión» o «los vecinos de Sión»; el griego πάροικοι puede referirse a quienes viven cerca o a residentes forasteros.
    reason: lexical_alternative
  - marker: b
    text: El griego repite «que vengan los vecinos» para dar énfasis.
    reason: textual_variant
lexical_decisions:
- source_word: ἐλθάτωσαν
  english_pob_choice: let ... come
  chosen_spanish: que vengan
  alternatives_spanish:
  - vengan
  - que lleguen
  lexicon: LSJ
  rationale: El imperativo exhortativo de tercera persona se expresa de manera natural en español con «que vengan», conservando el tono de convocatoria del griego sin volverlo mecánico.
- source_word: αἱ πάροικοι
  english_pob_choice: the neighbors
  chosen_spanish: los vecinos
  alternatives_spanish:
  - los residentes
  - los forasteros que habitan cerca
  - las vecinas
  lexicon: LSJ
  rationale: POB optó por «neighbors» tras revisar que πάροικοι puede referirse a quienes habitan cerca. En español, «vecinos» comunica esa proximidad sin añadir «mujeres», que el griego no exige como interpretación explícita.
- source_word: Σειών
  english_pob_choice: Zion
  chosen_spanish: Sión
  alternatives_spanish:
  - Zion
  lexicon: LSJ
  rationale: En español bíblico y eclesial, «Sión» es la forma estándar y natural del topónimo.
- source_word: μνήσθητε
  english_pob_choice: remember
  chosen_spanish: recuerden
  alternatives_spanish:
  - recuerden de
  - hagan memoria de
  lexicon: LSJ
  rationale: 'El aoristo imperativo se vierte con un mandato directo plural: «recuerden». Mantiene la fuerza exhortativa y la referencia mental de μιμνῄσκομαι.'
- source_word: τὴν αἰχμαλωσίαν
  english_pob_choice: the captivity
  chosen_spanish: la cautividad
  alternatives_spanish:
  - el cautiverio
  - el exilio
  lexicon: LSJ
  rationale: «Cautividad» conserva el sentido concreto de haber sido llevado preso o cautivo. «Exilio» sería más interpretativo y menos pegado al campo semántico de αἰχμαλωσία.
- source_word: τῶν υἱῶν μου καὶ θυγατέρων
  english_pob_choice: of my sons and daughters
  chosen_spanish: de mis hijos y de mis hijas
  alternatives_spanish:
  - de mis hijos
  - de mis descendientes
  lexicon: LSJ
  rationale: Se preserva la pareja de género del griego. En español, «hijos e hijas» mantiene la explicitud de los dos sustantivos y evita generalizar a «hijos» en sentido genérico.
- source_word: ὁ αἰώνιος
  english_pob_choice: the Eternal One
  chosen_spanish: el Eterno
  alternatives_spanish:
  - el Eterno Uno
  - el Eterno Señor
  lexicon: LSJ
  rationale: Como título sustantivado para Dios, «el Eterno» es el equivalente español más natural y reverente. Conserva el matiz de permanencia sin introducir el nombre divino explícito, ya que el griego aquí usa un epíteto.
- source_word: ἐπήγαγεν αὐτοῖς
  english_pob_choice: brought upon them
  chosen_spanish: les trajo
  alternatives_spanish:
  - les hizo venir
  - les hizo caer encima
  lexicon: LSJ
  rationale: El griego indica que el Eterno les impuso o hizo venir esa cautividad; en español, «les trajo» reproduce la relación verbal sin sobredeterminar con «infligió», que sería más fuerte que el texto.
theological_decisions:
- issue: Identidad de ὁ αἰώνιος como título divino
  english_pob_reading: the Eternal One
  chosen_spanish_reading: el Eterno
  alternative_spanish_readings:
  - el Eterno Uno
  - el Everlasting One
  rationale: La frase funciona como epíteto sustantivado para Dios. «El Eterno» preserva la dignidad del título y la naturalidad del español, sin convertirlo en una paráfrasis doctrinal ni ocultar que no hay aquí el tetragrámaton.
  doctrine_reference: Título divino/epíteto; fidelidad semántica al griego.
- issue: Alcance de αἱ πάροικοι en el contexto de Sión
  english_pob_reading: the neighbors
  chosen_spanish_reading: los vecinos
  alternative_spanish_readings:
  - los residentes
  - los forasteros que habitan cerca
  rationale: El texto llama a una audiencia cercana a Sión; «vecinos» conserva la cercanía espacial y el tono de convocatoria. La alternativa «residentes» suena más administrativa y «forasteros que habitan cerca» añade demasiado.
  doctrine_reference: Preservar la tensión léxica sin resolverla de modo silencioso.
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «neighboring women» a «neighbors» para evitar añadir «women» al griego. La redacción española sigue esa revisión y conserva la repetición del mandato, además de mantener la fuerza del título divino con un equivalente natural en español.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» como máscara del nombre divino porque el texto griego usa ὁ αἰώνιος, no κύριος.
  - Se mantuvo «Sión» como forma española estándar.
  - Se preservó la doble mención de los vecinos mediante repetición y nota textual.
  - Se usó «cautividad» para reflejar mejor αἰχμαλωσία que «exilio».
