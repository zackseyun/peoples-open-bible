id: REV.11.3
reference: 'Revelation 11:3'
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ δώσω τοῖς δυσὶν μάρτυσίν μου, καὶ προφητεύσουσιν ἡμέρας χιλίας διακοσίας ἑξήκοντα, ⸀περιβεβλημένοι σάκκους.
base_translation:
  language: en
  yaml_path: translation/nt/revelation/011/003.yaml
  text: 'And I will grant to my two witnesses[a], and they will prophesy for one thousand two hundred sixty days[b], clothed in sackcloth.'
  footnotes:
  - marker: a
    text: Or more literally, 'And I will give to my two witnesses.' The Greek leaves unstated what is given; the sense is likely authority or commission to prophesy.
    reason: lexical_alternative
  - marker: b
    text: Sackcloth was associated with mourning, repentance, and prophetic lament.
    reason: cultural_note
translation:
  language: ko
  text: '또 내가 나의 두 증인[a]에게 권세를 주리니, 그들이 굵은 베옷을 입고 천이백육십 일을 예언할 것이다」 하셨습니다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 굵은 베옷은 애통, 회개, 예언적 탄식과 결부된다.
    reason: cultural_note
lexical_decisions:
- source_word: οἱ δύο μάρτυρες
  english_pob_choice: my two witnesses
  chosen_korean: 두 증인
  alternatives_korean:
  - 두 순교자
  lexicon: BDAG
  rationale: '11:3-13의 핵심 인물에 대한 정형 호칭. 「증인」으로 옮겨 공적 증언의 무게를 보존.'
theological_decisions:
- issue: '11:3의 「두 증인」 호칭 정형 보존'
  chosen_reading: '「두 증인」 (오이 뒤오 마르튀레스)'
  alternative_readings:
  - 두 순교자
  rationale: '본 호칭은 11:3-13 단락 전체의 인물 정체를 정형화하며, 스가랴 4장의 두 감람나무/두 등잔대 환상과 결합된다. 한국어로도 「증인」으로 일관되게 옮겨, 후대의 「순교자」 의미는 죽임 이후의 사건이 확정한다.'
  doctrine_reference: 'DOCTRINE.md: 인물 호칭 정형 보존'
