  - severity: medium
    issue: «corderos macho» debe ajustarse a «corderos machos»
    rationale: En español, el adjetivo concordante plural mejora la gramática y la naturalidad sin perder la explicitación del sexo reflejada en la auditoría inglesa.
  - severity: high
