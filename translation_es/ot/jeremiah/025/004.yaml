review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: Yahvé envió a todos sus siervos, los profetas, con envío reiterado y diligente; el pueblo no escuchó ni prestó atención. Sin embargo, la apertura «Y Yahvé» es poco natural en español para un waw consecutivo inicial y conviene reparar la sintaxis. Además, el anclaje de la nota al verbo «envió» no corresponde al modismo hebreo, que recae en «levantándose temprano y enviándolos».'
  spanish_quality_summary: 'El español es claro y digno, pero presenta dos detalles mejorables: 1) «Y Yahvé les envió» suena torpe al inicio de versículo; 2) la nota [a] está colocada en el lugar equivocado. El resto del verso es legible y fiel. «Inclinaron su oído» funciona en registro bíblico moderno.'
  glossary_alignment: Se mantiene correctamente «Yahvé» para יְהוָה. «Siervos» para עֲבָדָיו en la fórmula profética está bien justificado. «Escucharon» para שׁמע en contexto de reprensión profética es adecuado. No hay conflicto doctrinal ni terminológico mayor.
  issues:
  - severity: medium
    issue: Inicio con «Y Yahvé»
    rationale: Aunque el hebreo comienza con waw, en español bíblico moderno no conviene reproducirlo mecánicamente al inicio del versículo cuando vuelve la frase menos natural. «Yahvé les envió…» preserva el sentido mejor.
  - severity: medium
    issue: La nota [a] está anclada a «envió» en lugar del modismo idiomático
    rationale: La nota explica הַשְׁכֵּם וְשָׁלֹחַ («levantándose temprano y enviando»), no el verbo principal וְשָׁלַח. El marcador debe ir junto a esa frase.
  revised_spanish_text: Yahvé les envió a todos sus siervos, los profetas, levantándose temprano y enviándolos[a]; pero ustedes no escucharon, ni inclinaron su oído para oír.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «levantándose temprano y enviando»; es un modismo que expresa el envío reiterado y diligente de los profetas.'
    reason: cultural_note
  revision_rationale: Se quita la conjunción inicial para lograr un español natural sin perder el valor narrativo del hebreo, y se mueve la nota al lugar exacto del modismo que explica. También se añade una coma explicativa en «sus siervos, los profetas» para reflejar mejor la aposición.
