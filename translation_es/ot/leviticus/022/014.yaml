translation:
  language: es
  text: Y si un hombre[a] come inadvertidamente[b] algo santo, entonces le añadirá un quinto[c] y dará lo santo al sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cualquiera» / «una persona»; el hebreo dice «un hombre» (אִישׁ), una formulación legal masculina singular que puede funcionar de modo genérico.
    reason: lexical_alternative
  - marker: b
    text: O «por error» / «en error».
    reason: lexical_alternative
  - marker: c
    text: Lit. «añadirá su quinta parte sobre ello»; es decir, añadirá un quinto al valor principal.
    reason: previous_rendering
lexical_decisions:
- source_word: וְ/אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - cualquiera
  - una persona
  lexicon: HALOT
  rationale: El hebreo usa אִישׁ, sustantivo masculino singular en fórmula legal. En español, «un hombre» conserva la forma marcada del original sin neutralizarla, aunque funcione de modo genérico en este contexto.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: En una disposición casuística, כִּי introduce una condición. «Si» expresa mejor esa estructura legal en español.
- source_word: יֹאכַל
  english_pob_choice: eats
  chosen_spanish: come
  alternatives_spanish:
  - comiere
  - comerá
  lexicon: HALOT
  rationale: El imperfecto hebreo formula el caso legal; «come» funciona en español moderno de manera natural y no añade arcaísmo.
- source_word: קֹדֶשׁ
  english_pob_choice: a holy thing
  chosen_spanish: una cosa santa
  alternatives_spanish:
  - una cosa sagrada
  - un objeto santo
  - una porción santa
  lexicon: HALOT
  rationale: קֹדֶשׁ aquí designa algo consagrado para uso santo, no necesariamente 'alimento' en la palabra misma. «Cosa santa» conserva la amplitud del hebreo y la relación con el término repetido al final.
- source_word: בִּ/שְׁגָגָה
  english_pob_choice: unintentionally
  chosen_spanish: inadvertidamente
  alternatives_spanish:
  - por error
  - sin querer
  - sin darse cuenta
  lexicon: HALOT
  rationale: El término expresa inadvertencia, no rebelión abierta. «Inadvertidamente» preserva esa distinción legal con claridad y dignidad en español.
- source_word: וְ/יָסַף
  english_pob_choice: he shall add
  chosen_spanish: añadirá
  alternatives_spanish:
  - deberá añadir
  - sumará
  lexicon: HALOT
  rationale: El verbo expresa la acción requerida en la restitución. «Añadirá» mantiene el valor prescriptivo sin forzar una perífrasis más pesada.
- source_word: חֲמִשִׁית/וֹ
  english_pob_choice: a fifth of it
  chosen_spanish: un quinto
  alternatives_spanish:
  - un quinto de ello
  - su quinta parte
  lexicon: HALOT
  rationale: La medida es «un quinto» con sufijo pronominal. En español, el referente ya queda claro por el contexto, y la formulación evita una repetición torpe sin perder el sentido restitutivo.
- source_word: עָלָיו
  english_pob_choice: to it
  chosen_spanish: sobre ello
  alternatives_spanish:
  - a ello
  - además de ello
  lexicon: HALOT
  rationale: Con יסף, עַל marca adición. «Sobre ello» refleja de manera literal la imagen semítica de añadir encima de la cantidad principal; no se optó por «además» para no diluir el paralelismo del hebreo.
- source_word: וְ/נָתַן
  english_pob_choice: and give
  chosen_spanish: y dará
  alternatives_spanish:
  - y entregará
  - y pagará
  lexicon: HALOT
  rationale: El verbo básico es «dar». Aunque el contexto es restitución, «dará» permanece más cerca del hebreo que «pagará».
- source_word: לַ/כֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al cura
  - al presbítero
  lexicon: HALOT
  rationale: כֹּהֵן se refiere al funcionario sacerdotal del sistema levítico. «Sacerdote» es el término español estándar y más transparente; «priest» no requiere adaptación denominacional.
- source_word: אֶת הַ/קֹּדֶשׁ
  english_pob_choice: the holy thing
  chosen_spanish: la cosa santa
  alternatives_spanish:
  - la porción santa
  - el objeto santo
  lexicon: HALOT
  rationale: La repetición de קֹדֶשׁ retoma el mismo referente consagrado. «La cosa santa» preserva el vínculo léxico con el inicio y evita especificar indebidamente el tipo de bien.
theological_decisions:
- issue: Formulación masculina genérica en un caso legal
  english_pob_reading: Retain 'a man' in the main text
  chosen_spanish_reading: Conservar «un hombre» en el texto principal
  alternative_spanish_readings:
  - cualquiera
  - una persona
  rationale: El hebreo usa una forma masculina singular en una casuística legal. La redacción española conserva esa forma marcada, reconociendo que puede funcionar genéricamente sin neutralizarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Naturaleza de קֹדֶשׁ en el objeto de restitución
  english_pob_reading: Render קֹדֶשׁ as 'holy thing' in both occurrences
  chosen_spanish_reading: Traducir קֹדֶשׁ como «cosa santa» en ambas apariciones
  alternative_spanish_readings:
  - cosa sagrada
  - porción santa
  - alimento santo
  rationale: El versículo habla de consumo indebido de algo consagrado y de su restitución. «Cosa santa» mantiene la amplitud semántica del hebreo sin restringirlo a 'alimento' o 'porción' más de lo que el texto exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Valor de בִּשְׁגָגָה
  english_pob_reading: Or 'by mistake' / 'in error.'
  chosen_spanish_reading: «Inadvertidamente»
  alternative_spanish_readings:
  - por error
  - sin querer
  - sin darse cuenta
  rationale: La palabra hebrea denota falta de intención o inadvertencia. «Inadvertidamente» mantiene ese matiz jurídico y evita confundirlo con una simple equivocación accidental.
  doctrine_reference: Lexical distinction in legal purity/restitution contexts
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; además, el ajuste de la línea inglesa previa eliminó la torpeza de 'add a fifth of it to it' a favor de 'add a fifth to it'. La versión española sigue esa solución idiomática sin perder la relación semántica con חֲמִשִׁיתוֹ עָלָיו.
  spanish_consistency_notes:
  - Se mantiene «sacerdote» para כֹּהֵן, alineado con el uso español estándar y la función cultual del pasaje.
  - «Cosa santa» se repite en ambas ocurrencias de קֹדֶשׁ para conservar la correspondencia léxica del hebreo.
  - El registro es legal y sobrio, evitando arcaísmos innecesarios pero sin suavizar el contenido normativo.
