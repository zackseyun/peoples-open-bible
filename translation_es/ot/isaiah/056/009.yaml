translation:
  language: es
  text: ¡Todas las fieras del campo[a], vengan a devorar[b]— todas las fieras del bosque!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La convocatoria a las fieras probablemente funciona como imagen de juicio venidero; algunos intérpretes entienden las fieras metafóricamente como enemigos invasores.
    reason: alternative_reading
  - marker: b
    text: O «a comer» o «a consumir». El verbo hebreo es el común para «comer»; aquí «devorar» expresa mejor la fuerza depredadora del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todas las
  - cada una de las
  lexicon: HALOT
  rationale: El cuantificador es colectivo y se dirige a las fieras en conjunto; «todas» mantiene la amplitud total de la convocatoria.
- source_word: חַיְתוֹ
  english_pob_choice: beasts
  chosen_spanish: fieras
  alternatives_spanish:
  - animales
  - bestias
  - animales salvajes
  lexicon: HALOT
  rationale: En este paralelismo profético con acción de devorar, «fieras» conserva el matiz de animales salvajes y la fuerza depredadora que el inglés audita con «beasts».
- source_word: שָׂדָי
  english_pob_choice: of the field
  chosen_spanish: del campo
  alternatives_spanish:
  - del llano
  - de la campiña
  - del campo abierto
  lexicon: HALOT
  rationale: «Campo» es el equivalente natural y bíblicamente transparente de שָׂדָי, manteniendo el contraste con «bosque».
- source_word: אֵתָיוּ
  english_pob_choice: come
  chosen_spanish: vengan
  alternatives_spanish:
  - vengan acá
  - acérquense
  - vengan y
  lexicon: HALOT
  rationale: El verbo es un imperativo plural de convocatoria; «vengan» reproduce la invitación directa y solemne.
- source_word: לֶאֱכֹל
  english_pob_choice: to devour
  chosen_spanish: a devorar
  alternatives_spanish:
  - a comer
  - a consumir
  lexicon: HALOT
  rationale: Aunque el hebreo significa literalmente «comer», el contexto de una convocatoria a fieras en juicio exige un verbo más intenso. «A devorar» conserva esa fuerza sin borrar el sentido básico.
- source_word: בַּיָּעַר
  english_pob_choice: of the forest
  chosen_spanish: del bosque
  alternatives_spanish:
  - del monte
  - de la selva
  - del monte arbolado
  lexicon: HALOT
  rationale: «Bosque» reproduce el paralelo con «campo» y refleja bien יער en español moderno; se evita la glosa explicativa para no debilitar la imaginería profética.
theological_decisions:
- issue: Imagen profética de animales convocados para juicio
  english_pob_reading: A literal summons to wild beasts as an image of coming judgment
  chosen_spanish_reading: Una convocatoria literal a fieras, usada como imagen de juicio venidero
  alternative_spanish_readings:
  - Una referencia puramente metafórica a naciones invasoras
  - Una personificación poética sin referente animal real
  rationale: 'La traducción principal preserva la imagen animal directa del texto, sin resolverla interpretativamente dentro del verso. Así se mantiene la tensión señalada por el audit trail: la escena puede funcionar como figura de juicio y, a la vez, como invocación literal a las fieras.'
  doctrine_reference: Principio POB de conservar la tensión teológica y la imaginería profética sin interpretarla de más en el texto principal
translation_notes:
  revision_awareness: Se siguió la revisión final del expediente inglés, que prefiere «of the forest» sobre «in the forest» por correspondencia más estrecha con «of the field». En español se reflejó esa simetría con «del campo» / «del bosque» y se conservó el tono de convocatoria profética.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene el Tetragrámaton ni una cita directa de κύριος.
  - Se eligió «fieras» en lugar de «bestias» para un español natural y con suficiente fuerza semántica; ambas opciones siguen el campo léxico de animales salvajes.
  - La puntuación con raya mantiene la pausa enfática del original auditado y no añade contenido interpretativo.
