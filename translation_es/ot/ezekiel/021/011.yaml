translation:
  language: es
  text: Y tú, hijo de hombre, gime con quebranto de lomos[a], y en amargura gime ante sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con lomos quebrados»; también, «con quebranto de los lomos». La imagen hebrea expresa una angustia corporal intensa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Mantiene el vocativo fijo de Ezequiel sin volverlo una paráfrasis explicativa. En este contexto no es título mesiánico, sino forma profética de address.
- source_word: הֵאָנַח
  english_pob_choice: groan
  chosen_spanish: gime
  alternatives_spanish:
  - gime en voz alta
  - lamenta
  - suspira
  lexicon: HALOT
  rationale: אָנַח expresa gemido audible o lamento corporal. 'Gime' conserva brevedad y fuerza, y funciona bien junto al paralelismo del versículo.
- source_word: בְּשִׁבְרוֹן מָתְנַיִם
  english_pob_choice: with broken loins
  chosen_spanish: con quebranto de lomos
  alternatives_spanish:
  - con lomos quebrados
  - con quebradura de lomos
  - con dolor en los lomos
  lexicon: HALOT
  rationale: La frase hebrea conserva una imagen corporal intensa. 'Quebranto de lomos' preserva el sustantivo abstracto de 'שִׁבְרוֹן' y la imagen de 'mָתְנַיִם' sin suavizarla demasiado.
- source_word: וּבִמְרִירוּת
  english_pob_choice: and in bitterness
  chosen_spanish: y en amargura
  alternatives_spanish:
  - y con amargura
  - y en amarga aflicción
  lexicon: HALOT
  rationale: מְרִירוּת nombra amargura como cualidad del gemido; 'en amargura' suena natural en español y conserva el sustantivo abstracto.
- source_word: תֵּאָנַח
  english_pob_choice: groan
  chosen_spanish: gime
  alternatives_spanish:
  - debes gemir
  - has de gemir
  - gime tú
  lexicon: HALOT
  rationale: El imperfecto tiene fuerza exhortativa/instructiva. Repetir 'gime' reproduce el paralelismo y evita introducir modalizaciones que el hebreo no exige.
- source_word: לְעֵינֵיהֶם
  english_pob_choice: before their eyes
  chosen_spanish: delante de sus ojos
  alternatives_spanish:
  - a la vista de ellos
  - en presencia de ellos
  lexicon: HALOT
  rationale: El hebreo idiomático indica visibilidad pública. 'Delante de sus ojos' es una correspondencia directa y clara en español.
translation_notes:
  revision_awareness: Corregí el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto principal junto a la palabra anotada. También conservé la tensión imagética del hebreo ('lomos') y no la suavicé a una expresión más abstracta.
  spanish_consistency_notes:
  - Usé 'hijo de hombre' para mantener la fórmula vocativa estable de Ezequiel.
  - Conservé 'lomos' por la fuerza imagética del hebreo; la nota aclara la alternativa de lectura/expresión.
  - 'Mantuve el paralelismo con dos imperativos en español: ''gime... y... gime''.'
