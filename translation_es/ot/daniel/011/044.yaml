translation:
  language: es
  text: Pero noticias[a] del oriente y del norte lo alarmarán, y saldrá con gran furor para destruir y para consagrar[b] a muchos a la destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Noticias» también puede entenderse como «rumores» o «informes».
    reason: lexical_alternative
  - marker: b
    text: El hebreo puede significar «poner bajo anatema» o «consagrar a la destrucción», un término más fuerte y específico que el simple «destruir».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמֻעוֹת
  english_pob_choice: reports
  chosen_spanish: noticias
  alternatives_spanish:
  - informes
  - reportes
  - rumores
  lexicon: HALOT
  rationale: El plural hebreo designa cosas oídas, es decir, noticias o informes que llegan. «Noticias» comunica bien el sentido sin cargar innecesariamente la idea de especulación que puede tener «rumores».
- source_word: יְבַהֲלֻהוּ
  english_pob_choice: will alarm him
  chosen_spanish: lo atemorizarán
  alternatives_spanish:
  - lo alarmarán
  - lo turbarán
  - lo espantarán
  lexicon: HALOT
  rationale: El piel de בהל expresa causar agitación súbita, alarma o terror. «Atemorizarán» mantiene la fuerza causal y es natural en español, sin suavizar el impacto del verbo.
- source_word: מִמִּזְרָח
  english_pob_choice: from the east
  chosen_spanish: del oriente
  alternatives_spanish:
  - del este
  - desde el oriente
  lexicon: HALOT
  rationale: «Oriente» es una forma clara y digna en español bíblico para la dirección geográfica; conserva el paralelismo con «del norte».
- source_word: וּמִצָּפוֹן
  english_pob_choice: and from the north
  chosen_spanish: y del norte
  alternatives_spanish:
  - y desde el norte
  - y del septentrión
  lexicon: HALOT
  rationale: Se conserva la simetría direccional del hebreo con un español directo y natural.
- source_word: וְיָצָא
  english_pob_choice: and he will go out
  chosen_spanish: y saldrá
  alternatives_spanish:
  - y saldrá afuera
  - y marchará
  - y partirá
  lexicon: HALOT
  rationale: יצא significa básicamente «salir» o «ir fuera». «Saldrá» es fiel y deja que el contexto militar aporte el matiz de campaña.
- source_word: בְּחֵמָה גְדֹלָה
  english_pob_choice: with great fury
  chosen_spanish: con gran furor
  alternatives_spanish:
  - con gran ira
  - con gran enojo
  - con gran furia
  lexicon: HALOT
  rationale: חֵמָה abarca ira, furia, ardor. «Furor» suena vigoroso y conserva el tono enérgico del pasaje sin perder dignidad literaria.
- source_word: לְהַשְׁמִיד
  english_pob_choice: to destroy
  chosen_spanish: para destruir
  alternatives_spanish:
  - para exterminar
  - para aniquilar
  lexicon: HALOT
  rationale: El hifil de שׁמד tiene el sentido general de destruir. Se conserva el verbo simple para no sobredeterminar la intensidad más allá del texto.
- source_word: וּלְהַחֲרִים
  english_pob_choice: to devote many to destruction
  chosen_spanish: y para dedicar a la destrucción
  alternatives_spanish:
  - y para poner bajo anatema
  - y para consagrar a la destrucción
  - y para entregar al exterminio
  lexicon: HALOT
  rationale: חרם tiene un valor técnico de poner bajo el ban / dedicar a destrucción. «Dedicar a la destrucción» conserva la diferencia con el verbo anterior y evita igualarlos en español.
- source_word: רַבִּים
  english_pob_choice: many
  chosen_spanish: a muchos
  alternatives_spanish:
  - muchos
  - multitud de personas
  lexicon: HALOT
  rationale: 'El adjetivo sustantivado se expresa naturalmente como objeto directo plural en español: «a muchos». Mantiene el alcance amplio sin añadir precisiones.'
theological_decisions:
- issue: Distinción entre שׁמד y חרם en el mismo hemistiquio
  english_pob_reading: to destroy and to devote many to destruction
  chosen_spanish_reading: para destruir y para dedicar a la destrucción
  alternative_spanish_readings:
  - para destruir y para exterminar a muchos
  - para destruir y para poner bajo anatema a muchos
  rationale: El hebreo usa dos verbos distintos; la traducción española debe conservar esa tensión semántica. «Dedicar a la destrucción» mantiene el valor especializado de חרם sin convertirlo en un mero sinónimo de «destruir».
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto inglés auditado está en acuerdo alto con la fuente hebrea y no muestra revisiones aplicadas; la redacción española sigue la distinción léxica clave entre שְׁמֻעוֹת, בהל, שׁמד y חרם, y evita nivelar los dos últimos verbos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se usa español bíblico moderno y claro, con «oriente/norte» para las direcciones geográficas.
  - Se preserva la diferencia entre «destruir» y «dedicar a la destrucción», coherente con la auditoría inglesa.
  - Se evita «Cristo/Mesías» porque el versículo no contiene lenguaje mesiánico nominal.
