  language: en
  yaml_path: translation/ot/nehemiah/012/027.yaml
  text: At the dedication of the wall of Jerusalem[a], they sought the Levites from all their places, to bring them to Jerusalem to celebrate the dedication with gladness, with thanksgivings, and with song, with cymbals, harps[c][b], and lyres.
  footnotes:
  - marker: a
    text: Or 'they looked for the Levites' or, contextually, 'they summoned the Levites.' The Hebrew verb primarily means 'sought.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally 'to do a dedication.'
    reason: lexical_alternative
  - marker: c
    text: The exact distinction between the instruments rendered 'harps' and 'lyres' is uncertain; the Hebrew names two different stringed instruments.
    reason: cultural_note
