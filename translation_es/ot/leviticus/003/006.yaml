review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido básico del hebreo: condición conectada al contexto previo, origen de la ofrenda en el rebaño, dedicación a Yahvé, posibilidad de macho o hembra, y requisito de integridad física. Sin embargo, la cláusula final en español (''sin defecto la ofrecerá'') suena forzada y hace menos clara la relación entre ''sin defecto'' y el animal ofrecido. Además, el pronombre femenino en ''la ofrecerá'' toma como antecedente ''ofrenda'', mientras que en el hebreo el sufijo de objeto remite naturalmente a la víctima.'
  spanish_quality_summary: 'El texto es mayormente comprensible, pero no del todo idiomático. ''Para un sacrificio de ofrendas de paz para Yahvé'' repite ''para'' de manera pesada, aunque tolerable. La mejora principal es reordenar el cierre para español natural y precisión: ''lo ofrecerá sin defecto''. También conviene usar ''[a]'' donde ya existe la nota. La nota es útil y fiel.'
  glossary_alignment: 'Se alinea bien con los términos del proyecto: יהוה -> ''Yahvé''; שְׁלָמִים -> ''ofrendas de paz'' con alternativa en nota; תמים -> ''sin defecto''; זכר/נקבה -> ''macho o hembra''. No hay conflicto doctrinal relevante. La excepción menor es sintáctica, no terminológica.'
  issues:
  - severity: medium
    issue: Orden y naturalidad de la cláusula final
    rationale: '''Sin defecto la ofrecerá'' es gramatical, pero suena marcado y menos natural en español bíblico actual. ''Lo ofrecerá sin defecto'' expresa mejor que la víctima debe estar sin defecto, en línea con el sentido sacrificial del hebreo.'
  - severity: medium
    issue: Referencia pronominal femenina en 'la ofrecerá'
    rationale: El hebreo 'יַקְרִיבֶנּוּ' lleva objeto masculino singular, referido a la víctima/animal. En español, 'la' atrae el antecedente 'ofrenda' y puede desviar ligeramente el foco. 'Lo ofrecerá' encaja mejor con el animal del rebaño.
  - severity: low
    issue: Anclaje de nota al pie
    rationale: La nota marcada como 'a' debe corresponder exactamente a un marcador '[a]' en el texto según las reglas de salida. El borrador textual ya lo incluye, y debe mantenerse en la revisión.
  revised_spanish_text: Y si su ofrenda para un sacrificio de ofrendas de paz para Yahvé es del rebaño[a], macho o hembra, lo ofrecerá sin defecto.
  revised_footnotes:
