translation:
  language: es
  text: Todo aquel cuyo corazón estaba preparado para buscar a Dios, Yahvé, el Dios de sus antepasados, aunque no conforme a la purificación del santuario[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el lugar santo». El hebreo קֹדֶשׁ aquí puede referirse al lugar santo o al santuario en sentido cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּל לְבָבוֹ
  english_pob_choice: everyone whose heart
  chosen_spanish: todo aquel cuyo corazón
  alternatives_spanish:
  - todos los que tenían el corazón
  - cada uno cuyo corazón
  lexicon: HALOT
  rationale: כָּל con un sustantivo singular y sufijo tiene fuerza distributiva. En español, «todo aquel cuyo corazón» conserva el valor individualizante y suena natural en una cláusula relativa.
- source_word: הֵכִין
  english_pob_choice: was prepared
  chosen_spanish: estaba preparado
  alternatives_spanish:
  - estaba dispuesto
  - había sido preparado
  - estaba encaminado
  lexicon: HALOT
  rationale: El hifil de כון expresa aquí la idea de tener el corazón dispuesto o preparado para una acción devocional. «Estaba preparado» sigue de cerca la decisión del audit trail en inglés y evita un giro demasiado libre.
- source_word: לִדְרוֹשׁ
  english_pob_choice: to seek
  chosen_spanish: buscar
  alternatives_spanish:
  - buscar a
  - inquirir de
  - buscar tras
  lexicon: HALOT
  rationale: Con objeto divino, דרש puede expresar búsqueda devocional o consulta religiosa. En español, «buscar a Dios» es claro y fiel; «inquirir de» sería más técnico y menos natural para el lector general.
- source_word: הָאֱלֹהִים יְהוָה
  english_pob_choice: God, Yahweh
  chosen_spanish: Dios, Yahvé
  alternatives_spanish:
  - Dios, el SEÑOR
  - Dios, Yahveh
  lexicon: HALOT
  rationale: 'Se conserva la apposición del hebreo: el Dios buscado es identificado con el nombre propio יְהוָה. El texto base del proyecto exige «Yahvé» para el tetragrámaton, no la sustitución litúrgica por «SEÑOR».'
- source_word: אֱלֹהֵי אֲבוֹתָיו
  english_pob_choice: the God of his fathers
  chosen_spanish: el Dios de sus padres
  alternatives_spanish:
  - el Dios de sus antepasados
  - el Dios de sus padres ancestrales
  lexicon: HALOT
  rationale: La fórmula conserva el trasfondo de pacto y continuidad generacional. «Sus padres» refleja bien el posesivo singular distributivo del hebreo y es idiomático en español bíblico contemporáneo.
- source_word: וְלֹא
  english_pob_choice: though not
  chosen_spanish: aunque no
  alternatives_spanish:
  - y no
  - pero no
  lexicon: HALOT
  rationale: 'La conjunción es concesiva en el contexto: se mantiene la sinceridad de la búsqueda pese a la falta ritual. «Aunque no» preserva esa tensión sin resolverla.'
- source_word: כְּטָהֳרַת
  english_pob_choice: according to the purification of
  chosen_spanish: conforme a la purificación de
  alternatives_spanish:
  - según la purificación de
  - de acuerdo con la purificación de
  lexicon: HALOT
  rationale: El prefijo כ indica conformidad. «Conforme a» refleja esa relación normativa mejor que una paráfrasis más explicativa.
- source_word: הַקֹּדֶשׁ
  english_pob_choice: the sanctuary
  chosen_spanish: el santuario
  alternatives_spanish:
  - el lugar santo
  - la santidad
  lexicon: HALOT
  rationale: En este contexto cultual, קֹדֶשׁ puede referirse al recinto/ámbito sagrado. «El santuario» mantiene la opción lexical del audit trail inglés y es un equivalente claro en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El proyecto pide traducir YHWH como «Yahvé» en el texto principal. Esto preserva el nombre del pacto y evita la convención de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tensión entre sinceridad de búsqueda e impureza ritual
  english_pob_reading: The verse preserves the tension that sincere seeking of God occurred despite failure to meet ritual purification standards.
  chosen_spanish_reading: El versículo conserva la tensión entre una búsqueda sincera de Dios y la falta de conformidad con la purificación requerida.
  alternative_spanish_readings:
  - Una paráfrasis que atenúe la falta ritual
  - Una paráfrasis que convierta la observación en mera censura
  rationale: La frase final no debe suavizar ni resolver el contraste. «Aunque no conforme a la purificación del santuario» deja coexistir la devoción sincera y la deficiencia ritual.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail inglés al preferir «estaba preparado» para הֵכִין y «el santuario» para טָהֳרַת הַקֹּדֶשׁ. La versión española conserva esas decisiones y las adapta a un español natural con el mismo alcance semántico.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - Se evita «SEÑOR» como máscara del nombre divino.
  - «Buscar a Dios» mantiene el sentido devocional de דרש sin tecnicismo innecesario.
  - «Purificación» conserva el matiz ritual de טָהֳרָה; la nota aclara la posible referencia cultual de קֹדֶשׁ.
  - La cláusula concesiva «aunque no» preserva la tensión teológica del pasaje.
