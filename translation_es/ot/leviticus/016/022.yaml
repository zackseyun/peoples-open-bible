revisions:
- from: El macho cabrío[a] llevará sobre sí todas sus iniquidades a una tierra aislada, y soltará el macho cabrío en el desierto.
  to: El macho cabrío llevará sobre sí todas sus iniquidades a una tierra separada[a], y enviará al macho cabrío al desierto.
  rationale: Se quitó la nota innecesaria sobre 'macho cabrío' y se trasladó la nota al lugar de verdadera incertidumbre léxica, אֶרֶץ גְּזֵרָה, en línea con el POB inglés. 'Tierra separada' se acerca mejor a la imagen de 'cut-off land' que 'tierra aislada', sin sonar demasiado forzada, y la nota conserva las alternativas documentadas. 'Enviará ... al desierto' refleja mejor וְשִׁלַּח ... בַּמִּדְבָּר que 'soltará ... en el desierto'.
  reviewer_model: gpt-5.4
