    text: Lit. "en lugares ocultos"; el hebreo usa una preposición que dice "en", pero en español la imagen se expresa mejor como ataque "desde" un lugar de ocultamiento.
    reason: lexical_alternative
  - marker: b
    text: O "al inocente". El término hebreo puede destacar tanto la inocencia como la integridad moral.
    reason: lexical_alternative
  revision_rationale: Se hace una reparación pequeña para mejorar la naturalidad y evitar una asociación demasiado fuerte con armas de fuego modernas en la construcción verbal. Se conserva el mismo sentido, las mismas notas y la misma decisión léxica principal para תם.
