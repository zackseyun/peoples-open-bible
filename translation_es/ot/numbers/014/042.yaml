revisions:
- from: No suban, porque Yahvé no está entre ustedes, para que no sean derribados[a] delante de sus enemigos.
  to: No suban, porque Yahvé no está entre ustedes, para que no sean abatidos[a] ante sus enemigos.
  rationale: Se ajusta תִּנָּגְפוּ de 'derribados' a 'abatidos' para reflejar mejor el sentido pasivo y militar de 'ser heridos/abatidos/derrotados' en contexto bélico, en línea con 'be struck down' del POB inglés. También se cambia 'delante de' por 'ante' para una formulación más natural y digna en español bíblico moderno. No se requieren cambios doctrinales ni adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:45:34Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: prohibición (''No suban''), motivo (''porque Yahvé no está entre ustedes'') y consecuencia a evitar. También preserva correctamente el nombre divino ''Yahvé'' y el sentido comunitario de בְּקִרְבְּכֶם. Sin embargo, ''derribados'' no representa tan bien como podría el campo semántico de נָגַף en contexto militar; el hebreo y el POB inglés favorecen ''ser abatidos/derrotados/ golpeados'' más que una imagen de mero derribo físico.'
  spanish_quality_summary: El español es claro y natural, pero 'para que no sean derribados delante de sus enemigos' suena algo rígido y menos idiomático en registro bíblico moderno que 'para que no sean abatidos ante sus enemigos'. 'Ante' funciona mejor que 'delante de' en contexto de derrota militar. La nota al pie actual también necesita ajustarse al nuevo término principal y a alternativas más precisas.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → ''Yahvé'' correctamente; no hay conflicto con otros términos doctrinales. La revisión propuesta solo afina la representación de תִּנָּגְפוּ y לִפְנֵי אֹיְבֵיכֶם sin apartarse del audit trail inglés ni del hebreo.'
  issues:
  - severity: medium
    issue: '''derribados'' debilita o desvía el sentido bélico de תִּנָּגְפוּ'
    rationale: En Nifal y con 'delante de sus enemigos', נגף expresa ser heridos/abatidos/derrotados en combate. 'Derribados' puede entenderse como tumbar físicamente, pero no transmite tan bien la derrota o golpe militar implícitos.
  - severity: low
    issue: '''delante de sus enemigos'' es menos idiomático que ''ante sus enemigos'' en este contexto'
    rationale: '''Delante de'' no es incorrecto, pero en español bíblico-literario ''ante sus enemigos'' suena más natural y conciso para una escena de derrota militar.'
  - severity: low
    issue: La nota al pie debe actualizarse para corresponder al término principal revisado
    rationale: Si el texto principal usa 'abatidos', las alternativas deben presentarse frente a ese eje léxico y seguir siendo fieles al rango semántico documentado.
  revised_spanish_text: No suban, porque Yahvé no está entre ustedes, para que no sean abatidos[a] ante sus enemigos.
  revised_footnotes:
  - marker: a
    text: O, «sean golpeados» o «sean derrotados».
    reason: lexical_alternative
  revision_rationale: Se ajusta תִּנָּגְפוּ de 'derribados' a 'abatidos' para reflejar mejor el sentido pasivo y militar de 'ser heridos/abatidos/derrotados' en contexto bélico, en línea con 'be struck down' del POB inglés. También se cambia 'delante de' por 'ante' para una formulación más natural y digna en español bíblico moderno. No se requieren cambios doctrinales ni adjudicación adicional.
