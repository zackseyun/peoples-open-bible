translation:
  language: es
  text: ¿O no parece malo que adoramos al Creador de todas las cosas y vivimos conforme a su ley noble[a][b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «incorrecto» en vez de «malo». El griego κακόν puede denotar algo moralmente malo, censurable o equivocado.
    reason: lexical_alternative
  - marker: b
    text: La frase «su ley noble» también podría traducirse «su ley virtuosa» o «su ley excelente».
    reason: lexical_alternative
lexical_decisions:
- source_word: κακὸν
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - malvado
  - incorrecto
  - malo moralmente
  lexicon: LSJ
  rationale: En esta pregunta retórica, κακόν señala algo moralmente reprobable o incorrecto. Elegí «malo» porque en español conserva la evaluación negativa sin sonar tan cargado como «malvado» ni tan explicativo como «incorrecto».
- source_word: οὐ δοκεῖ
  english_pob_choice: does it not seem
  chosen_spanish: no parece
  alternatives_spanish:
  - no se considera
  - no aparenta
  - no parece ser
  lexicon: LSJ
  rationale: δοκεῖ expresa apariencia o juicio percibido. «No parece» mantiene el valor de parecer/juzgar de manera natural en español y conserva el tono retórico.
- source_word: τὸν πάντων κτίστην
  english_pob_choice: the Creator of all things
  chosen_spanish: el Creador de todas las cosas
  alternatives_spanish:
  - el hacedor de todo
  - el creador de todo
  lexicon: LSJ
  rationale: κτίστης es «creador/fundador», y con πάντων el sentido es universal. «El Creador de todas las cosas» reproduce bien el registro elevado y la amplitud total.
- source_word: εὐσεβοῦμεν
  english_pob_choice: we worship
  chosen_spanish: adoremos
  alternatives_spanish:
  - veneramos
  - practiquemos piedad hacia
  - reverenciemos
  lexicon: LSJ
  rationale: El verbo indica mostrar piedad o reverencia hacia Dios. En el giro interrogativo-retórico del español, «que adoremos» comunica con claridad el acto religioso sin añadir un matiz ajeno.
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  lexicon: LSJ
  rationale: Con acusativo, κατά expresa conformidad con una norma. «Conforme a» es idiomático y mantiene la idea de ajuste a un estándar.
- source_word: τὸν ἔναρετον αὐτοῦ νόμον
  english_pob_choice: his virtuous law
  chosen_spanish: su ley virtuosa
  alternatives_spanish:
  - su ley noble
  - su ley excelente
  lexicon: LSJ
  rationale: ἔναρετος significa virtuoso, noble, excelente. «Virtuosa» conserva el valor moral del adjetivo y se ajusta bien a «ley» sin diluir el énfasis ético.
- source_word: ζῶμεν
  english_pob_choice: live
  chosen_spanish: vivamos
  alternatives_spanish:
  - vivimos
  - llevemos nuestra vida
  - sigamos viviendo
  lexicon: LSJ
  rationale: Aquí ζῶμεν forma parte de la misma pregunta retórica y funciona de modo exhortativo en español. «Vivamos» conserva la fuerza del subjuntivo/jusivo implícito del contexto sin perder el sentido de modo de vida.
theological_decisions:
- issue: Forma de la pregunta retórica con ἢ
  english_pob_reading: Or does it not seem evil that we worship the Creator of all things and live according to his virtuous law?
  chosen_spanish_reading: ¿O no parece malo que adoremos al Creador de todas las cosas y vivamos conforme a su ley virtuosa?
  alternative_spanish_readings:
  - ¿O no parece malo que adoremos al Creador de todas las cosas y vivamos según su ley virtuosa?
  - ¿O no se considera malo que adoremos al Creador de todas las cosas y vivamos conforme a su ley virtuosa?
  rationale: El griego mantiene la fuerza adversativa/interrogativa de ἢ. La apertura con «¿O…?» conserva la continuidad argumentativa. «No parece malo» refleja el juicio retórico sin convertirlo en una afirmación absoluta.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 5, 6
- issue: εὐσεβοῦμεν aplicado al Creador
  english_pob_reading: we worship
  chosen_spanish_reading: adoremos
  alternative_spanish_readings:
  - veneremos
  - practiquemos piedad hacia
  - reverenciemos
  rationale: El objeto directo es «el Creador de todas las cosas», por lo que el verbo apunta a devoción religiosa explícita. «Adoremos» es natural en español bíblico y no oculta el contenido de culto que el griego comunica.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego: conserva la pregunta retórica con ἢ, refleja κακόν como juicio moral y mantiene τὸν πάντων κτίστην y ἔναρετον αὐτοῦ νόμον con equivalentes transparentes. Se evitó añadir «a ti», porque no está en el texto fuente, y se optó por una forma española más natural en subjuntivo exhortativo para la secuencia final.'
  spanish_consistency_notes:
  - Se mantuvo «Creador» para κτίστης, en línea con el registro teológico elevado del pasaje.
  - Se usó «ley virtuosa» para ἔναρετον νόμον, preservando la calificación ética sin convertirla en una paráfrasis interpretativa.
  - Se conservó «adoremos» como equivalente funcional de εὐσεβοῦμεν en este contexto de culto al Dios creador.
  - La puntuación interrogativa inicial y el orden de los miembros siguen la cadencia argumentativa del original griego.
