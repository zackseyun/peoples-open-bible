review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y el rastro del POB inglés en la estructura del diálogo, «Entonces/Muy bien», y en la literalidad de «guardián de mi cabeza». Sin embargo, falla en un punto léxico importante: עַבְדֶּךָ aquí es fórmula cortesana de deferencia, y el POB inglés documenta explícitamente «your servant», no «your slave». Además, «todos los días» no refleja bien כָּל הַיָּמִים en este contexto; suena a frecuencia diaria más que a duración continua, y conviene algo como «todos tus días».'
  spanish_quality_summary: El español es generalmente claro, pero «tu esclavo» resulta impropio del registro cortesano y puede inducir una lectura social equivocada. «Te pondré como guardián de mi cabeza todos los días» es comprensible, pero mejora en naturalidad y precisión con «te pondré por guardián de mi cabeza todos tus días» o equivalente. La nota [a] también debe corregirse para no repetir «esclavo» y para explicar mejor la ambigüedad pragmática, no una supuesta ambigüedad léxica del sustantivo.
  glossary_alignment: 'La revisión debe apartarse justificadamente del valor por defecto «esclavo» para עבד, porque aquí el propio expediente inglés documenta una excepción contextual de habla cortesana: «tu siervo». No hay conflicto terminológico adicional con nombres divinos o títulos mesiánicos. La literalidad de שֹׁמֵר לְרֹאשִׁי como «guardián de mi cabeza» puede mantenerse con nota explicativa.'
  issues:
  - severity: high
    issue: «tu esclavo» para עַבְדֶּךָ
    rationale: El propio audit trail inglés razona que aquí no se trata de estatus servil sino de autorreferencia deferente en contexto cortesano. En español, «tu esclavo» distorsiona el registro y el sentido; debe ser «tu siervo».
  - severity: medium
    issue: «todos los días» para כָּל הַיָּמִים
    rationale: 'En español suele significar ‘cada día’, no ‘por toda la vida/continuamente’. El hebreo aquí apunta a duración continua en relación con David: «todos tus días» refleja mejor el sentido y el POB inglés.'
  - severity: low
    issue: La nota [a] describe mal la ambigüedad
    rationale: No es principalmente una ambigüedad léxica de «esclavo/siervo», sino una ambigüedad pragmática sobre lo que David hará o es capaz de hacer. La nota debe alinearse con esa explicación.
