theological_decisions:
- issue: Referent of Κύριος (the Lord)
  chosen_reading: Render κύριος as “the Lord,” referring to God’s agency in revealing
    and rejoicing.
  alternative_readings:
  - Master (non-divine)
  rationale: Context assigns divine initiative and joy; Cartha policy translates κύριος
    as “Lord” for divine referent.
  doctrine_reference: 'DOCTRINE.md — Contested terms: κύριος → Lord'
- issue: Meaning of πίστις here
  chosen_reading: Translate as “faith” (interior trust) rather than a technical sense
    “the faith.”
  alternative_readings:
  - the faith (the body of belief)
  - trust
  rationale: The collocation “were strengthened in faith” emphasizes their renewed
    trusting disposition after God’s compassion.
  doctrine_reference: 'DOCTRINE.md — Contested terms: πίστις → faith'
- issue: Sense of πνεῦμα / πνεύματα
  chosen_reading: Human spirits, not the Holy Spirit.
  alternative_readings:
  - inner self/mind
  rationale: Plural “your spirits” (v.3) and individual context in v.2 indicate human
    interior life rather than the Spirit.
- issue: εἰρηνεύετε ἐν ἑαυτοῖς
  chosen_reading: Communal peace (“among yourselves”) as the condition for further
    revelation.
  alternative_readings:
  - inner tranquility within each individual
  rationale: Plural imperative with reflexive pronoun in reciprocal sense points to
    mutual peace in the community.
- issue: Moral term μαλακία
  chosen_reading: Retain “softness” to preserve Hermas’s moral imagery of laxity/lack
    of resolve.
  alternative_readings:
  - weakness
  - cowardice
  rationale: Hermas contrasts softness with strength in faith; we keep the metaphor
    and explain in a note to avoid anachronistic gender connotations.
- issue: οἰκοδομὴ τοῦ πύργου imagery
  chosen_reading: Translate literally as “the building of the tower,” preserving the
    symbolic image of the church.
  alternative_readings:
  - edification of the tower (metaphorical)
  rationale: Hermas’s vision uses a concrete tower as allegory for the community;
    literal rendering keeps the apocalyptic texture.
