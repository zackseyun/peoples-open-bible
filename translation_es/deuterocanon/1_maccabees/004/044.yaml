translation:
  language: es
  text: Y deliberaron acerca del altar del holocausto[a] profanado, qué debían hacer con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «altar del holocausto profanado» o «altar del holocausto contaminado».
