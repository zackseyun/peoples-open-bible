  yaml_path: translation/ot/ecclesiastes/010/009.yaml
  text: Whoever quarries stones may be hurt by them[b][a], and whoever splits wood may be endangered by it.
  footnotes:
  - marker: a
    text: Or 'Whoever moves/removes stones may be hurt by them.' The Hebrew verb can denote shifting or dislodging stones more generally, not only quarrying them.
    reason: lexical_alternative
  - marker: b
    text: Or 'wood' instead of 'logs.' The Hebrew can refer broadly to wood or trees; here it likely means pieces of wood being split.
    reason: lexical_alternative
