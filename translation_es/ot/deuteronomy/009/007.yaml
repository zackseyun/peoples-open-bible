translation:
  language: es
  text: Recuerda —no olvides— cómo provocaste a ira a Yahvé tu Dios[a] en el desierto. Desde el día en que saliste de la tierra de Egipto hasta que llegaron ustedes a este lugar, ustedes han sido rebeldes contra Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «cómo enojaste a Yahvé tu Dios en el desierto».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «con Yahvé»; aquí el sentido es adversativo: «contra Yahvé».'
    reason: lexical_alternative
lexical_decisions:
- source_word: זְכֹר
  english_pob_choice: Remember
  chosen_spanish: Recuerda
  alternatives_spanish:
  - Acuérdate
  - Recuerden
  lexicon: HALOT
  rationale: El imperativo de זכר pide una orden directa de recordar. «Recuerda» es natural en español y conserva el tono exhortativo del texto.
- source_word: אַל תִּשְׁכַּח
  english_pob_choice: do not forget
  chosen_spanish: no olvides
  alternatives_spanish:
  - no dejes de recordar
  - no te olvides
  lexicon: HALOT
  rationale: La forma negativa refuerza el mandato previo. «No olvides» comunica bien el paralelismo enfático sin volverlo pesado en español.
- source_word: הִקְצַפְתָּ
  english_pob_choice: provoked ... to wrath
  chosen_spanish: provocaste ... en el sentido de ira
  alternatives_spanish:
  - enojaste
  - irritaste
  lexicon: HALOT
  rationale: 'El hifil de קצף tiene fuerza causativa: no solo «enojar», sino provocar a ira. En español, «provocaste a Yahvé ... en el desierto» conserva la carga relacional y covenantal del verbo; la idea de wrath queda implícita en el contexto y en la nota textual.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: usar «Yahvé» como nombre propio divino, en lugar de sustituirlo por un título.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios y Señor
  - tu Dios, Yahvé
  lexicon: HALOT
  rationale: La construcción posesiva es directa; «tu Dios» es la equivalencia natural y fiel.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto / en la estepa
  - en el yermo
  lexicon: HALOT
  rationale: «Desierto» es comprensible en español y puede abarcar el trasfondo del éxodo; no se fuerza una imagen geográfica más estrecha que la del hebreo.
- source_word: לְמִן הַיּוֹם אֲשֶׁר
  english_pob_choice: From the day
  chosen_spanish: Desde el día en que
  alternatives_spanish:
  - A partir del día en que
  - Desde que
  lexicon: HALOT
  rationale: La expresión marca el punto de inicio de un período. «Desde el día en que» mantiene la referencia temporal con naturalidad.
- source_word: יָצָאתָ מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: you came out of the land of Egypt
  chosen_spanish: saliste de la tierra de Egipto
  alternatives_spanish:
  - saliste de la tierra de Egipto
  - saliste de Egipto
  lexicon: HALOT
  rationale: «Saliste» reproduce el verbo de salida del éxodo de forma idiomática en español, y «tierra de Egipto» conserva la fórmula bíblica sin cargar el verso innecesariamente.
- source_word: עַד בֹּאֲכֶם עַד הַמָּקוֹם הַזֶּה
  english_pob_choice: until you came to this place
  chosen_spanish: hasta que llegaste a este lugar
  alternatives_spanish:
  - hasta que viniste a este lugar
  - hasta llegar a este lugar
  lexicon: HALOT
  rationale: Se mantiene el cierre del período temporal en un español fluido. «Llegaste» simplifica la referencia sin perder el movimiento hacia el lugar presente.
- source_word: מַמְרִים הֱיִיתֶם
  english_pob_choice: you have been rebellious
  chosen_spanish: han sido rebeldes
  alternatives_spanish:
  - han sido rebeldes
  - han estado rebeldes
  - han sido contumaces
  lexicon: HALOT
  rationale: מרה expresa rebeldía o contumacia frente a la autoridad divina. En español, «rebeldes» es claro y conserva la acusación del texto; se armoniza con el colectivo implícito del pasaje.
- source_word: עִם יְהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - frente a Yahvé
  - en oposición a Yahvé
  lexicon: HALOT
  rationale: Aunque עִם literalmente es «con», en este contexto con מרה el sentido es adversativo. «Contra Yahvé» expresa de manera idiomática la relación hostil indicada por el hebreo y por la lectura auditada en inglés.
theological_decisions:
- issue: Tratamiento del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino revelado en el hebreo, siguiendo la política del proyecto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Relación de עִם יְהוָה con מרה
  english_pob_reading: against Yahweh
  chosen_spanish_reading: contra Yahvé
  alternative_spanish_readings:
  - con Yahvé
  - en oposición a Yahvé
  rationale: El hebreo usa una preposición que literalmente puede ser «con», pero el contexto de rebeldía exige una equivalencia adversativa. «Contra» preserva la tensión semántica y el juicio implícito.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: Aspecto verbal del reproche de Israel
  english_pob_reading: you have been rebellious
  chosen_spanish_reading: han sido rebeldes
  alternative_spanish_readings:
  - fueron rebeldes
  - han estado rebeldes
  rationale: El inglés opta por presente perfecto para expresar una conducta continua desde el éxodo. En español, «han sido» comunica esa continuidad histórica sin volver el estilo artificial.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El borrador sigue el pasaje como una exhortación doble de memoria («Recuerda —no olvides—»), conserva el nombre divino Yahvé, refleja el rango temporal desde el éxodo hasta la llegada al lugar presente, y adopta una equivalencia adversativa para עִם יְהוָה conforme al análisis auditado. Se tuvo en cuenta la revisión inglesa que prefirió una formulación más natural para el tramo final del tiempo («until you came to this place»), por lo que el español usa «hasta que llegaste a este lugar».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en todo el registro para יְהוָה.
  - «Desierto» se usa como equivalente funcional de «wilderness» sin perder el trasfondo del éxodo.
  - La doble exhortación de memoria se conserva con dos verbos distintos para reflejar el hebreo enfático.
  - «Contra Yahvé» no traduce mecánicamente עִם, sino que sigue la lectura contextual ya auditada en inglés.
