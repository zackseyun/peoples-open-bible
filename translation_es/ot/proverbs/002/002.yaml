review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del hebreo y del POB inglés: el paralelismo, los referentes ''sabiduría'' y ''entendimiento'', y la imagen de oído/corazón orientados intencionalmente. También mantiene correctamente la nota léxica sobre תבונה. Sin embargo, ''haciendo atento tu oído'' no suena natural en español y no expresa con suficiente dignidad ni claridad la fuerza causativa del Hifil en este contexto.'
  spanish_quality_summary: 'La principal debilidad es estilística y de legibilidad: ''haciendo atento'' es un calco poco idiomático. En español bíblico natural y moderno, ''poniendo atento tu oído'' o ''prestando atento oído'' funcionarían mejor; de esas, ''poniendo atento tu oído'' preserva mejor la relación con ''tu oído'' y el matiz causativo sin parafrasear demasiado. El resto del verso es claro, digno y fiel.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Sabiduría', 'corazón' y 'entendimiento' están bien elegidos. La alternativa en nota 'discernimiento' sigue adecuadamente la pista del POB inglés.
  issues:
  - severity: medium
    issue: La expresión 'haciendo atento tu oído' es poco idiomática en español.
    rationale: Aunque intenta reflejar el causativo de לְהַקְשִׁיב, resulta rígida y antinatural. 'Poniendo atento tu oído' comunica mejor la acción deliberada sin perder la imagen corporal ni el valor dependiente/participial del contexto.
  revised_spanish_text: poniendo atento tu oído a la sabiduría, inclinando tu corazón al entendimiento,[a]
  revised_footnotes:
  - marker: a
    text: O ‘al discernimiento’ para ‘al entendimiento’.
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'haciendo atento' por 'poniendo atento' para mejorar la naturalidad y legibilidad en español sin perder la fuerza causativa ni la imagen concreta del hebreo. Se mantiene el resto del verso y la nota léxica del POB inglés. La nota se ancla explícitamente en 'entendimiento' conforme a la disciplina de notas.
