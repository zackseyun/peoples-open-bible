translation:
  language: es
  text: Yahvé Dios formó[a] de la tierra todo animal del campo y toda ave del cielo, y los trajo al hombre[b] para ver cómo los llamaría. Todo nombre que el hombre dio a cada ser viviente, ese fue su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había formado». El hebreo puede leerse como pasado simple; el pluscuamperfecto reflejaría una secuencia discursiva posible, pero aquí se prefiere el pasado narrativo directo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «Adán» para «el hombre». El hebreo tiene ha''adam, literalmente «el hombre».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּצֶר
  english_pob_choice: formed / had formed
  chosen_spanish: formó
  alternatives_spanish:
  - había formado
  - modeló
  - hizo
  lexicon: HALOT
  rationale: El hebreo wayyiqtol aquí permite un pasado narrativo simple. En español, 'formó' comunica de manera natural la acción creadora sin introducir un plus de aspecto que el texto hebreo no marca de forma obligatoria. 'Había formado' sería posible como lectura discursiva, pero no es necesaria en el español publicado.
- source_word: יְהוָה אֱלֹהִים
  english_pob_choice: the LORD God
  chosen_spanish: Yahvé Dios
  alternatives_spanish:
  - el SEÑOR Dios
  - el Señor Dios
  lexicon: HALOT
  rationale: 'Se conserva el nombre divino explicitado por la política del proyecto: ''Yahvé'' en lugar de un reemplazo por mayúsculas. ''Dios'' refleja correctamente אֱלֹהִים y mantiene el título compuesto.'
- source_word: מִן הָאֲדָמָה
  english_pob_choice: from the ground
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del suelo
  - de la tierra
  - del polvo
  lexicon: HALOT
  rationale: '''אֲדָמָה'' se refiere a la tierra/suelo, y ''de la tierra'' suena natural en español. Además mantiene el juego con הָאָדָם / אֲדָמָה en el contexto inmediato mejor que alternativas más técnicas o menos idiomáticas.'
- source_word: כָּל חַיַּת הַשָּׂדֶה
  english_pob_choice: every wild animal
  chosen_spanish: todo animal del campo
  alternatives_spanish:
  - toda bestia del campo
  - todo animal salvaje
  - toda criatura del campo
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y no exige una traducción zoológica rígida. 'Todo animal del campo' conserva el ámbito del campo abierto y evita la carga interpretativa de 'bestia'. En este contexto, 'salvaje' sería posible, pero 'del campo' preserva mejor la forma del hebreo.
- source_word: כָּל עוֹף הַשָּׁמַיִם
  english_pob_choice: every bird of the sky
  chosen_spanish: toda ave del cielo
  alternatives_spanish:
  - todo pájaro del cielo
  - toda ave de los cielos
  - toda ave del aire
  lexicon: HALOT
  rationale: '''עוֹף'' abarca aves/voladores, y ''ave'' es un término amplio y dignificado en español. ''Del cielo'' traduce bien הַשָּׁמַיִם y es más natural en español bíblico moderno que ''del cielo'' con ''pájaro'', que sonaría menos elevado.'
- source_word: וַיָּבֵא אֶל הָאָדָם
  english_pob_choice: he brought them to the man
  chosen_spanish: los trajo al hombre
  alternatives_spanish:
  - los trajo a Adán
  - los llevó al hombre
  lexicon: HALOT
  rationale: El objeto plural implícito en el contexto se vuelve explícito con 'los'. 'El hombre' mantiene el sentido común de הָאָדָם en este pasaje y preserva el juego con 'tierra'. 'Llevó' es posible, pero 'trajo' sigue de cerca el hebreo.
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para observar
  - con el fin de ver
  lexicon: HALOT
  rationale: La preposición final 'para' expresa con claridad la finalidad del infinitivo. 'Ver' es la equivalencia directa y natural del infinitivo hebreo.
- source_word: מַה יִּקְרָא לוֹ
  english_pob_choice: what he would call them
  chosen_spanish: cómo los llamaría
  alternatives_spanish:
  - qué nombre les pondría
  - qué los llamaría
  - cómo los nombraría
  lexicon: HALOT
  rationale: El verbo קרא con ל puede significar 'llamar/nombrar'. En español, 'cómo los llamaría' transmite la idea de asignar nombre y conserva la fluidez del discurso. 'Llamaría' refleja el futuro del verbo en función modal.
- source_word: וְכֹל אֲשֶׁר יִקְרָא לוֹ הָאָדָם
  english_pob_choice: Whatever the man called each living creature
  chosen_spanish: Y todo lo que el hombre llamó a cada ser viviente
  alternatives_spanish:
  - Y todo lo que el hombre nombró a cada criatura viviente
  - Y cuanto el hombre llamó a cada ser viviente
  lexicon: HALOT
  rationale: La cláusula hebrea es distributiva y general. 'Todo lo que' conserva el valor abierto de כֹל אֲשֶׁר, y 'a cada ser viviente' explicita el sentido de נֶפֶשׁ חַיָּה sin cargarlo con asociaciones teológicas ajenas. 'Llamó' mantiene el vínculo léxico con יִקְרָא.
- source_word: נֶפֶשׁ חַיָּה
  english_pob_choice: living creature
  chosen_spanish: ser viviente
  alternatives_spanish:
  - criatura viviente
  - ser vivo
  - alma viviente
  lexicon: HALOT
  rationale: '''נֶפֶשׁ חַיָּה'' en Génesis designa un ser animado/viviente. ''Ser viviente'' es claro, sobrio y evita importar connotaciones doctrinales de ''alma''. ''Criatura viviente'' también sería posible, pero ''ser viviente'' encaja mejor con el sintagma distributivo del versículo.'
- source_word: הוּא שְׁמוֹ
  english_pob_choice: that was its name
  chosen_spanish: ese fue su nombre
  alternatives_spanish:
  - ese era su nombre
  - ese fue el nombre de él/de ella
  lexicon: HALOT
  rationale: La construcción nominal hebrea se refleja naturalmente en español con 'ese fue su nombre'. 'Su' evita forzar género donde el referente es colectivo o no humano, y mantiene la naturalidad narrativa.
theological_decisions:
- issue: Nombre divino YHWH en español
  english_pob_reading: the LORD God / Yahweh God
  chosen_spanish_reading: Yahvé Dios
  alternative_spanish_readings:
  - el SEÑOR Dios
  - el Señor Dios
  rationale: La política del proyecto exige no enmascarar el tetragrámaton por convención. 'Yahvé' hace auditable la decisión de traducir יהוה como nombre propio y no como sustituto reverencial.
  doctrine_reference: Terminología del proyecto POB; política de nombres divinos
- issue: 'הָאָדָם: común o nombre propio'
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - Adán
  rationale: El artículo y el juego inmediato con 'tierra' favorecen el sentido común 'el hombre'. En español, esto preserva la conexión literaria con אָדָם / אֲדָמָה. 'Adán' puede anotarse como posible referencia tradicional, pero no debe desplazar el sentido del texto aquí.
  doctrine_reference: Lectura contextual de Génesis 2; observación lexical del sustantivo con artículo
- issue: נֶפֶשׁ חַיָּה y su alcance semántico
  english_pob_reading: living creature
  chosen_spanish_reading: ser viviente
  alternative_spanish_readings:
  - criatura viviente
  - alma viviente
  rationale: '''Ser viviente'' preserva el valor de entidad animada sin introducir categorías posteriores. ''Alma viviente'' sería teológicamente cargado y menos transparente para el hebreo de Génesis.'
  doctrine_reference: Semántica de נֶפֶשׁ en Génesis; distinción entre léxico y dogmática
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que prefirió un pasado narrativo simple ('formed') en lugar de 'had formed'. Por eso el español usa 'formó' y evita un pluscuamperfecto no exigido. También se mantuvo la preferencia por 'the man' como común sustantivo, no como nombre propio, respetando el juego léxico del hebreo con 'tierra'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme a la terminología del proyecto para יהוה.
  - Se usa 'el hombre' en todo el versículo para conservar la coherencia con הָאָדָם.
  - '''Ser viviente'' traduce נֶפֶשׁ חַיָּה de forma consistente con la semántica de Génesis.'
  - Se evita 'Cristo', 'SEÑOR' y 'alma' donde introducirían cargas no requeridas por el hebreo.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto español y corresponden a las notas provistas.
