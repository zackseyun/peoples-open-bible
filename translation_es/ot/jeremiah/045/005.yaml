  yaml_path: translation/ot/jeremiah/045/005.yaml
  text: And you[a], are you seeking great things for yourself? Do not seek them, for behold, I am bringing disaster on all flesh, declares Yahweh[b]. But I will give you your life as plunder in all the places where you go.
  footnotes:
  - marker: a
    text: Or 'all humanity.' The Hebrew literally says 'all flesh,' a biblical idiom for all people or all living mortals in view.
    reason: lexical_alternative
  - marker: b
    text: Literally 'I will give you your life as plunder'—an idiom meaning he will escape with his life, though losing everything else.
    reason: cultural_note
