  language: en
  yaml_path: translation/ot/leviticus/001/009.yaml
  text: But he shall wash its entrails and its legs with water[a], and the priest shall turn all of it into smoke on the altar, a burnt offering, a food offering[c][b], a pleasing aroma to Yahweh.
  footnotes:
  - marker: a
    text: Or 'an offering by fire' or 'a fire offering' for 'a food offering.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'a pleasing aroma'; the expression is a stock sacrificial formula indicating that the offering is acceptable to the LORD.
    reason: cultural_note
  - marker: c
    text: Or 'to Yahweh.' The main text follows the project default of rendering the divine name as 'the LORD.'
    reason: alternative_reading
