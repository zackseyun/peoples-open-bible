translation:
  language: es
  text: Saúl era hijo de un año en su reinar[a], y reinó dos años sobre Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo aquí es difícil y probablemente está textualmente deficiente. Literalmente, 'Saúl era hijo de un año en su reinar, y reinó dos años sobre Israel'. Algunos testigos antiguos y propuestas posteriores suplen números mayores, como 'treinta' para la edad de Saúl y 'cuarenta y dos' para la duración de su reinado.
    reason: textual_variant
lexical_decisions:
- source_word: בֶּן שָׁנָה
  english_pob_choice: son of one year
  chosen_spanish: hijo de un año
  alternatives_spanish:
  - de un año de edad
  - como de un año
  lexicon: HALOT
  rationale: El hebreo בן שנה es una expresión idiomática difícil. La POB inglesa decidió preservar la dureza formal del texto en lugar de naturalizarla como edad. En español, 'hijo de un año' mantiene esa transparencia sin introducir una emendación interpretativa en el cuerpo del texto.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  alternatives_spanish:
  - Saul
  lexicon: Nombre propio estándar
  rationale: Se usa la forma española habitual del nombre propio, con tilde según la ortografía española.
- source_word: בְּמָלְכוֹ
  english_pob_choice: in his reigning / when he became king
  chosen_spanish: en su llegar a reinar
  alternatives_spanish:
  - cuando llegó a reinar
  - en su reinado
  lexicon: HALOT
  rationale: La POB inglesa conservó la idea temporal del acceso al trono sin forzar una paráfrasis plena. 'En su llegar a reinar' mantiene el valor de la construcción y su aspereza formal, evitando convertirla en una frase más interpretativa como 'cuando llegó a reinar'.
- source_word: וּשְׁתֵּי שָׁנִים
  english_pob_choice: and ... two years
  chosen_spanish: y ... dos años
  alternatives_spanish:
  - y dos años
  - y por dos años
  lexicon: HALOT
  rationale: La conjunción y el numeral se trasladan directamente, conservando la incompletud del hebreo tal como la refleja la POB inglesa.
- source_word: מָלַךְ
  english_pob_choice: he reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - fue rey
  - reinaría
  lexicon: HALOT
  rationale: '''Reinó'' es el equivalente natural del verbo מלך en este contexto regnal y preserva la fuerza verbal del original.'
- source_word: עַל יִשְׂרָאֵל
  english_pob_choice: over Israel
  chosen_spanish: sobre Israel
  alternatives_spanish:
  - sobre el pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la preposición de gobierno 'sobre' para reflejar la relación de dominio expresada por על con un verbo de reinar.
theological_decisions:
- issue: Texto regnal difícil o probablemente deficiente en el hebreo masorético
  english_pob_reading: Retain the Masoretic wording in the main text without conjectural supplementation
  chosen_spanish_reading: Conservar en el texto principal la redacción masorética, sin suplir números conjeturales
  alternative_spanish_readings:
  - Saúl tenía treinta años cuando comenzó a reinar, y reinó cuarenta y dos años sobre Israel
  - Saúl tenía ... años cuando comenzó a reinar, y reinó ... y dos años sobre Israel
  - Saúl tenía treinta años cuando comenzó a reinar, y reinó dos años sobre Israel
  rationale: La fuente hebrea transmitida es difícil y probablemente está incompleta o corrupta. Siguiendo la primacía de la fuente y la transparencia editorial de la POB, la traducción principal conserva la formulación recibida sin armonizarla con cifras de otras tradiciones o con reconstrucciones conjeturales.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que evitó la naturalización engañosa de 'one year old when he became king' y optó por una forma más formal y transparente ('son of one year in his reigning'). Por eso el español conserva la aspereza y la dificultad del hebreo en lugar de suavizarlas con una solución interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'Saúl' para el nombre propio, coherente con el uso bíblico en español.
  - Se conserva 'sobre Israel' para reflejar la preposición de dominio del hebreo.
  - La nota al pie preserva la alternativa numérica documentada por la POB inglesa sin incorporarla al texto principal.
  - La expresión 'hijo de un año' es deliberadamente formal para sostener la transparencia del texto fuente.
