translation:
  language: es
  text: y con sus manos impuras tomaba los vasos sagrados[a], y con manos profanas arrastraba consigo las cosas que habían sido dedicadas por muchos reyes para el aumento, la gloria y el honor del lugar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vasos santos».
    reason: lexical_alternative
  - marker: b
    text: «El lugar» es una manera reverente de referirse al templo.
    reason: cultural_note
lexical_decisions:
- source_word: μιαραῖς
  english_pob_choice: polluted
  chosen_spanish: impuras
  alternatives_spanish:
  - contaminadas
  - profanadas
  - inmundas
  lexicon: LSJ
  rationale: El adjetivo griego expresa impureza ritual y moral. «Impuras» conserva esa carga cultual en español sin exagerar el tono ni volverlo demasiado abstracto.
- source_word: ἱερὰ σκεύη
  english_pob_choice: sacred vessels
  chosen_spanish: vasos sagrados
  alternatives_spanish:
  - vasijas sagradas
  - utensilios sagrados
  - vasos santos
  lexicon: LSJ
  rationale: «Vasos» comunica bien los objetos del culto y evita el tecnicismo de «implementos». «Sagrados» mantiene el contraste con las manos impuras/profanas.
- source_word: ἀνασταθέντα
  english_pob_choice: had been dedicated
  chosen_spanish: habían sido dedicadas
  alternatives_spanish:
  - habían sido levantadas
  - habían sido establecidas
  - habían sido puestas
  lexicon: LSJ
  rationale: En este contexto, el participio apunta a ofrendas reales consagradas al templo. «Dedicadas» expresa mejor el sentido votivo que una traducción más literal como «puestas» o «levantadas».
- source_word: πρὸς αὔξησιν καὶ δόξαν τοῦ τόπου καὶ τιμήν
  english_pob_choice: for the increase and glory and honor of the place
  chosen_spanish: para el aumento, la gloria y el honor del lugar
  alternatives_spanish:
  - para el crecimiento, la gloria y el honor del lugar
  - para acrecentar la gloria y el honor del lugar
  - para la elevación, la gloria y el honor del lugar
  lexicon: LSJ
  rationale: Conservo la estructura nominal del griego y de la POB en inglés. «Lugar» preserva el circunloquio reverencial para el templo; «aumento» mantiene visible αὔξησιν.
- source_word: βεβήλοις
  english_pob_choice: profane
  chosen_spanish: profanas
  alternatives_spanish:
  - impías
  - no sagradas
  - mundanas
  lexicon: LSJ
  rationale: «Profanas» es el antonimio cultual más preciso en español para contrastar con lo sagrado, y reproduce bien la oposición del texto.
- source_word: συνσύρων
  english_pob_choice: dragging away
  chosen_spanish: arrastraba
  alternatives_spanish:
  - arrastraba consigo
  - se llevaba arrastrando
  - arrebataba
  lexicon: LSJ
  rationale: El participio indica una remoción violenta e indigna. «Arrastraba» conserva mejor esa fuerza que «llevaba» o «retiraba».
- source_word: τοῦ τόπου
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el templo
  - este lugar
  - el santuario
  lexicon: LSJ
  rationale: La expresión griega dice literalmente «el lugar» y funciona como circunloquio reverente para el templo. Mantenerlo evita nivelar el tono del original.
theological_decisions:
- issue: Contraste cultual entre manos impuras/profanas y objetos sagrados
  english_pob_reading: Preserve explicitly sacred/profane contrast ('polluted hands,' 'sacred vessels,' 'profane hands,' 'the place')
  chosen_spanish_reading: Conservar explícitamente el contraste entre manos impuras/profanas, vasos sagrados y el lugar reverente
  alternative_spanish_readings:
  - usar lenguaje más genérico como «manos contaminadas» y «templo»
  - suavizar el contraste con expresiones menos rituales
  rationale: El versículo enfatiza sacrilegio y profanación ritual. La traducción española mantiene visible esa polaridad para no diluir la tensión teológica del texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Readable modern Spanish, not archaic or academic'
- issue: Circunloquio reverencial para el templo
  english_pob_reading: '''The place'' is a reverential way of referring to the temple.'
  chosen_spanish_reading: «El lugar» se mantiene como circunloquio reverencial del templo
  alternative_spanish_readings:
  - reemplazar por «el templo»
  - aclarar con «el santuario»
  rationale: Traducirlo como «templo» aclararía el referente, pero perdería la forma reverente del griego y la decisión auditada de la POB en inglés. «Lugar» conserva la deferencia y la literalidad.
  doctrine_reference: POB audit trail on τοῦ τόπου; Preserve source wording when the reverential form carries meaning
translation_notes:
  revision_awareness: La POB en inglés revisó el orden para repetir «with profane hands» antes de «dragging away». En español se reflejó ese paralelismo con «y con manos profanas arrastraba», manteniendo la repetición de la preposición y el ritmo de contraste del griego.
  spanish_consistency_notes:
  - Se mantuvo «el lugar» en lugar de «el templo» para preservar el circunloquio reverente ya documentado en la auditoría inglesa.
  - Se eligió «impuras/profanas» para sostener el contraste cultual visible entre ταῖς μιαραῖς χερσὶν y ταῖς βεβήλοις χερσὶν.
  - «Vasos sagrados» es compatible con el léxico POB y natural en español eclesial contemporáneo.
  - La traducción sigue de cerca la sintaxis participial del griego sin volverla torpe en español.
