translation:
  language: es
  text: Sobre el ganado que pastaba en Sarón estaba Sitrai el saronita[b][a], y sobre el ganado en los valles estaba Safat hijo de Adlai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el ganado vacuno» en lugar de «el ganado».
    reason: lexical_alternative
  - marker: b
    text: Sarón era la llanura costera de Israel; «el saronita» significa un hombre procedente de Sarón.
    reason: cultural_note
lexical_decisions:
- source_word: וְעַל
  english_pob_choice: over
  chosen_spanish: sobre
  alternatives_spanish:
  - encargado de
  - a cargo de
  - sobre
  lexicon: HALOT
  rationale: En una lista administrativa, עַל expresa supervisión o responsabilidad. «Sobre» conserva la estructura breve y funcional del hebreo y del inglés POB, sin añadir paráfrasis.
- source_word: הַבָּקָר
  english_pob_choice: the herds
  chosen_spanish: los hatos
  alternatives_spanish:
  - el ganado
  - los rebaños
  - las reses
  lexicon: HALOT
  rationale: בקר puede referirse al ganado vacuno o al conjunto de animales de cría. «Hatos» transmite bien la idea colectiva de animales bajo cuidado en un registro bíblico natural; mantiene la fuerza administrativa del contexto.
- source_word: הָרֹעִים
  english_pob_choice: grazing
  chosen_spanish: que pastaban
  alternatives_spanish:
  - pastoreando
  - que estaban pastando
  - en pastoreo
  lexicon: HALOT
  rationale: El participio de רעה describe al ganado mientras se alimenta en el campo. «Que pastaban» reproduce esa acción de manera clara y no sobretraduce.
- source_word: בַּשָּׁרוֹן
  english_pob_choice: in Sharon
  chosen_spanish: en Sarón
  alternatives_spanish:
  - en Sharon
  - en la llanura de Sarón
  lexicon: HALOT
  rationale: Sarón es un nombre geográfico. Se conserva como topónimo bíblico tradicional en español, y se mantiene el valor locativo del original.
- source_word: שטרי
  english_pob_choice: Shitrai
  chosen_spanish: Sitrai
  alternatives_spanish:
  - Shitrai
  - Sitrai
  lexicon: BDB
  rationale: Nombre propio transliterado. «Sitrai» sigue una forma española clara y consistente con la consonantización hebrea; se evita una adaptación excesiva.
- source_word: הַשָּׁרוֹנִי
  english_pob_choice: the Sharonite
  chosen_spanish: el saronita
  alternatives_spanish:
  - el de Sarón
  - el sharonita
  lexicon: HALOT
  rationale: El gentilicio indica procedencia regional. «Saronita» comunica esa pertenencia de manera natural en español y preserva la forma gentilicia sin perífrasis.
- source_word: בָּעֲמָקִים
  english_pob_choice: in the valleys
  chosen_spanish: en los valles
  alternatives_spanish:
  - en los valles profundos
  - en las hondonadas
  lexicon: HALOT
  rationale: עֲמָקִים es el plural de «valle». «En los valles» es la correspondencia más directa y transparente.
- source_word: שָׁפָט
  english_pob_choice: Shaphat
  chosen_spanish: Safat
  alternatives_spanish:
  - Shafat
  - Safát
  lexicon: BDB
  rationale: Nombre propio transliterado al español. «Safat» mantiene la forma breve y legible, evitando introducir una vocalización más interpretativa.
- source_word: בֶּן עַדְלָי
  english_pob_choice: son of Adlai
  chosen_spanish: hijo de Adlai
  alternatives_spanish:
  - hijo de Adlai
  - ben Adlai
  lexicon: HALOT
  rationale: La construcción patronímica se vierte de forma transparente. «Hijo de Adlai» comunica claramente la relación familiar sin añadir matices no presentes en el texto.
translation_notes:
  revision_awareness: El texto español sigue el auditable sentido del hebreo y concuerda con la decisión inglesa de mantener una formulación breve y administrativa. Se preserva la referencia geográfica de Sarón y el gentilicio regional, sin ampliar innecesariamente la frase.
  spanish_consistency_notes:
  - Se usa «Sarón» como topónimo bíblico tradicional en español.
  - 'Se mantiene una transliteración española coherente de los nombres propios: Sitrai, Safat, Adlai.'
  - «Hatos» y «que pastaban» reflejan el valor colectivo y pastoral del sustantivo/participio hebreos sin exagerar el detalle.
  - 'El orden del verso conserva la estructura paralela del original: sobre X en Sarón... y sobre X en los valles...'
