translation:
  language: es
  text: Y Baruc leyó las palabras de este libro a oídos de Jeconías[a], hijo de Joaquim, rey de Judá, y a oídos de todo el pueblo, de los que habían venido al libro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La forma griega Ἰεχονίου corresponde al nombre transcrito aquí como Jeconías; el mismo rey suele identificarse también como Joaquín o Jehoiaquín en otras versiones.
    reason: alternative_reading
  - marker: b
    text: La expresión griega dice literalmente ‘los que habían venido al libro’; también puede entenderse, de manera más interpretativa, como ‘los que habían venido a la lectura’ o ‘al rollo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέγνω
  english_pob_choice: read
  chosen_spanish: leyó
  alternatives_spanish:
  - leyó en voz alta
  - leyó
  lexicon: BDAG
  rationale: El verbo significa ‘leer’; en este contexto público, la lectura es necesariamente audible. En español, ‘leyó’ conserva la naturalidad sin añadir una explicación que el griego no exige.
- source_word: τοὺς λόγους
  english_pob_choice: the words
  chosen_spanish: las palabras
  alternatives_spanish:
  - el contenido
  - las palabras dichas
  lexicon: BDAG
  rationale: λόγοι se refiere al contenido verbal del libro. ‘Las palabras’ mantiene el vínculo formal con el griego y evita interpretar de más como un resumen.
- source_word: τοῦ βιβλίου τούτου
  english_pob_choice: of this book
  chosen_spanish: de este libro
  alternatives_spanish:
  - de este rollo
  - de este escrito
  lexicon: BDAG
  rationale: βιβλίον puede referirse a un libro o rollo. ‘Libro’ es la opción más directa y natural en español, y conserva el deíctico ‘este’.
- source_word: ἐν ὠσὶν
  english_pob_choice: in the hearing of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - a los oídos de
  - en el oído de
  lexicon: BDAG
  rationale: La expresión literal ‘en los oídos de’ suena poco natural en español. ‘En presencia de’ transmite una lectura pública ante oyentes, aunque deja un poco más implícito el matiz auditivo.
- source_word: Ἰεχονίου
  english_pob_choice: Jeconiah
  chosen_spanish: Jeconías
  alternatives_spanish:
  - Jeconías
  - Joaquín
  lexicon: Lexicon not consulted
  rationale: La forma griega Ἰεχονίου se refleja con ‘Jeconías’. Se conserva la transliteración cercana al testimonio griego, en lugar de armonizar de inmediato con la forma hebrea o la más conocida en castellano.
- source_word: τῶν ἐρχομένων πρὸς τὴν βίβλον
  english_pob_choice: who had come to the book
  chosen_spanish: que había venido al libro
  alternatives_spanish:
  - que habían venido al libro
  - que habían acudido al libro
  - que habían venido a la lectura
  lexicon: BDAG
  rationale: La frase es poco usual. Mantener ‘al libro’ preserva el objeto concreto βίβλος y deja visible la rareza del giro, en línea con la opción inglesa de no resolverlo interpretativamente a ‘la lectura’.
translation_notes:
  revision_awareness: Se siguió la línea revisada del audit trail inglés al reflejar el participio como ‘había venido’, evitando una forma simple de pasado que diluyera el valor aspectual. También se mantuvo la rareza de πρὸς τὴν βίβλον con ‘al libro’, en lugar de normalizarla hacia ‘a la lectura’.
  spanish_consistency_notes:
  - Se usó ‘Baruc’ con una sola c, conforme al nombre tradicional en español para el autor.
  - Se evitó ‘SEÑOR’ y no hay términos divinos en este versículo.
  - Se mantuvo la estructura repetitiva ‘en presencia de... y en presencia de...’ para reflejar el paralelismo del griego.
  - Se preservó el nombre griego Jeconías sin sustituirlo por una forma armonizada, dado el criterio del proyecto de seguir el testimonio fuente.
