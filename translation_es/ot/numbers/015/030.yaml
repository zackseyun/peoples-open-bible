source:
  edition: WLC
  text: וְ/הַ/נֶּ֜פֶשׁ אֲשֶֽׁר תַּעֲשֶׂ֣ה בְּ/יָ֣ד רָמָ֗ה מִן הָֽ/אֶזְרָח֙ וּ/מִן הַ/גֵּ֔ר אֶת יְהוָ֖ה ה֣וּא מְגַדֵּ֑ף וְ/נִכְרְתָ֛ה הַ/נֶּ֥פֶשׁ הַ/הִ֖וא מִ/קֶּ֥רֶב עַמָּֽ/הּ־׀־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/015/030.yaml
  text: But the person who acts with a high hand[a], whether native-born or a sojourner, is reviling Yahweh, and that person shall be cut off from among his people.
