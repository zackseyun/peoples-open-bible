  verdict: revise
  source_alignment_summary: El borrador refleja bien la súplica, el sentido de חֶרְפָּה como humillación pública, y la idea idiomática de cargar personalmente el oprobio. Sin embargo, omite la alternativa sintáctica importante preservada en el POB inglés para כָּל רַבִּים עַמִּים, y la elección de «Yahvé» para אֲדֹנָי no sigue la evidencia fuente inmediata, que aquí es el título divino «Señor/Lord», no יהוה.
  spanish_quality_summary: El español es claro y digno. «Acuérdate» y «oprobio» funcionan bien en registro de salmo. «En mi pecho» es legible, aunque «en mi seno» se acerca más a la imagen tradicional; con nota, cualquiera puede servir. La construcción «de cómo llevo» suena algo más pesada que «que llevo» o «el cual llevo».
  glossary_alignment: Buena alineación general en «siervos», «oprobio» y el valor idiomático de «en mi pecho/seno». Pero el proyecto usa «Yahvé» para יהוה, no para אֲדֹנָי; aquí conviene «Señor». También debe conservarse en nota la alternativa «el oprobio de todos los muchos pueblos», ya documentada por el POB inglés.
  issues:
  - severity: high
    issue: Se tradujo אֲדֹנָי como «Yahvé».
    rationale: La forma hebrea en este versículo es אֲדֹנָי, no el tetragrámaton יהוה. Aunque el proyecto español usa «Yahvé» para el nombre divino, aquí la evidencia fuente y el rastro de auditoría inglés apoyan el título «Señor».
  - severity: medium
    issue: Falta la nota de variante sintáctica sobre כָּל רַבִּים עַמִּים.
    rationale: 'El POB inglés preserva una alternativa relevante: que la frase modifique el contenido/extensión de lo cargado («el oprobio de todos los muchos pueblos») y no solo la fuente («de muchos pueblos»). Esa ambigüedad debe mantenerse también en español.'
  - severity: low
    issue: «De cómo llevo» es menos natural que una relativa directa.
    rationale: El hebreo permite expresar de forma más fluida en español «el oprobio ... que llevo en mi pecho», sin cambiar el sentido.
  revised_spanish_text: Acuérdate[a], Señor, del oprobio de tus siervos, que llevo en mi pecho[b] de muchos pueblos.
