translation:
  language: es
  text: Los tesoros de maldad no aprovechan[a], pero la rectitud[b] libra de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «no aprovechan los tesoros de maldad».
    reason: lexical_alternative
  - marker: b
    text: O «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: י֭וֹעִילוּ
  english_pob_choice: do not profit
  chosen_spanish: no aprovechan
  alternatives_spanish:
  - no benefician
  - no son de provecho
  lexicon: HALOT
  rationale: El hiphil de יעל expresa ser útil o provechoso. «No aprovechan» reproduce bien la fuerza proverbial en español y evita un calco pesado.
- source_word: אוֹצְר֣וֹת
  english_pob_choice: Treasures
  chosen_spanish: tesoros
  alternatives_spanish:
  - riquezas acumuladas
  - almacenes de riquezas
  - depósitos
  lexicon: HALOT
  rationale: En este paralelismo sapiencial, el sustantivo apunta a riquezas acumuladas, no a edificios literales. «Tesoros» es natural y conserva la imagen.
- source_word: רֶ֑שַׁע
  english_pob_choice: of wickedness
  chosen_spanish: de maldad
  alternatives_spanish:
  - de maldad
  - mal habidos
  - ganados por la maldad
  lexicon: HALOT
  rationale: El constructo hebreo es literalmente «tesoros de maldad». En español, «de maldad» mantiene la relación genitiva sin desplazar el foco a una explicación más interpretativa.
- source_word: וּ֝/צְדָקָ֗ה
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia
  lexicon: HALOT
  rationale: צְדָקָה puede ser «justicia» o «rectitud». Aquí elegí «justicia» porque en español suena natural en contraste con «tesoros de maldad» y mantiene la amplitud moral del término; la alternativa «rectitud» es válida pero menos idiomática en esta sentencia.
- source_word: תַּצִּ֥יל
  english_pob_choice: delivers
  chosen_spanish: libra
  alternatives_spanish:
  - rescata
  - salva
  - libera
  lexicon: HALOT
  rationale: El hiphil de נצל significa rescatar, arrebatar o librar. «Libra» es conciso, digno y suficientemente amplio para el sentido proverbial, sin cargarlo innecesariamente con matiz técnico-soteriológico.
- source_word: מִ/מָּֽוֶת
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de la muerte
  - de morir
  - de peligro mortal
  lexicon: HALOT
  rationale: La preposición מן con «muerte» se expresa de forma directa como «de la muerte». Se conserva así la posibilidad de sentido literal y figurado propia de la sabiduría bíblica.
theological_decisions:
- issue: 'צְדָקָה: justicia vs. rectitud'
  english_pob_reading: righteousness
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - la rectitud
  rationale: El texto inglés documenta «righteousness» como lectura preferida, con «justice» como alternativa. En español, «justicia» y «rectitud» son ambos posibles; aquí se eligió «justicia» porque es la opción más transparente y equilibra bien el contraste con la conducta inicua del primer hemistiquio. No se intenta reducir el término a una sola noción jurídica ni borrar su carga moral.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness / justice (applied by analogy to Hebrew צְדָקָה)'
- issue: Función de la muerte en la sentencia
  english_pob_reading: from death
  chosen_spanish_reading: de la muerte
  alternative_spanish_readings:
  - de peligro mortal
  - de la muerte
  rationale: El hebreo permite una referencia literal a la muerte y, en sabiduría, también una extensión a ruina o peligro mortal. La traducción conserva la formulación amplia sin especificar más de lo que el texto exige.
  doctrine_reference: Principio de amplitud semántica preservada en literatura sapiencial
translation_notes:
  revision_awareness: El texto inglés revisado volvió a la forma más literal y concisa «Treasures of wickedness». La versión española sigue esa decisión con «tesoros de maldad», en vez de explicitar «ganados por maldad», para reflejar más de cerca el constructo hebreo y mantener el tono proverbial.
  spanish_consistency_notes:
  - Se preserva el paralelismo antitético con un contraste directo entre riqueza inicua y justicia.
  - Se evita «SEÑOR» y no hay otros términos divinos en el versículo.
  - «Maldad» traduce el valor relacional/genitivo del hebreo sin sobreparafrasear.
  - «Justicia» se usa aquí como equivalente natural de צְדָקָה en contexto sapiencial; no se fija como único sentido universal del término.
