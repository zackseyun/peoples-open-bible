translation:
  language: es
  text: Y hubo guerra entre Asa y Baasa, rey de Israel, durante todos sus días[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «todos sus días» o «todos los días de sus vidas». El hebreo dice literalmente: «todos sus días».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִלְחָמָה
  english_pob_choice: And there was war
  chosen_spanish: Y hubo guerra
  alternatives_spanish:
  - Y hubo guerra
  - Y había guerra
  - Y continuó la guerra
  lexicon: HALOT
  rationale: מִלְחָמָה designa 'guerra' o 'batalla'. En español, 'hubo guerra' reproduce bien la cláusula existencial y mantiene la sencillez del hebreo sin forzar un aspecto continuo que el texto no expresa de manera explícita.
- source_word: הָיְתָה
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - había
  - existió
  lexicon: HALOT
  rationale: El perfecto de היה en construcción existencial se rinde naturalmente con 'hubo' en español, que comunica presencia real del hecho sin añadir una idea de duración ajena al enunciado.
- source_word: בֵּין ... וּ/בֵין
  english_pob_choice: between ... and
  chosen_spanish: entre ... y
  alternatives_spanish:
  - entre ... y
  lexicon: HALOT
  rationale: La construcción correlative expresa oposición mutua. 'Entre ... y' es la equivalencia española directa y idiomática.
- source_word: אָסָא
  english_pob_choice: Asa
  chosen_spanish: Asa
  alternatives_spanish:
  - Asá
  lexicon: transliteration
  rationale: Se conserva el nombre propio con transliteración usual en español bíblico. 'Asa' es transparente y ampliamente reconocible.
- source_word: בַּעְשָׁא
  english_pob_choice: Baasha
  chosen_spanish: Baasa
  alternatives_spanish:
  - Baasa
  - Baashá
  lexicon: transliteration
  rationale: Se usa la forma española más natural y legible del nombre propio. 'Baasa' evita una grafía demasiado anglicada y sigue la práctica de transliteración bíblica en español.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - el rey de Israel
  lexicon: HALOT
  rationale: El sintagma constructo identifica el oficio real de Baasa. 'Rey de Israel' reproduce fielmente el título sin sobrecargar la frase con un artículo innecesario.
- source_word: כָּל יְמֵי/הֶם
  english_pob_choice: all their days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - todos los días de su vida
  - durante todos sus días
  lexicon: HALOT
  rationale: El hebreo idiomático significa literalmente 'todos sus días'. 'Todos sus días' preserva la forma breve y admite el matiz de duración total que el contexto exige, sin expandirlo a 'de su vida'.
translation_notes:
  revision_awareness: 'Coincide con el sentido del hebreo y con el audit trail inglés: construcción existencial simple, preposición correlativa de oposición y el idiomatismo temporal final conservado de forma literal. No hay revisiones aplicadas en el registro fuente.'
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico, con español contemporáneo pero reverente.
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino.
  - '''Todos sus días'' conserva la literalidad del idiomatismo hebreo y queda explicado en nota para lectores que prefieran una paráfrasis temporal.'
