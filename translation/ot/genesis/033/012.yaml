id: GEN.33.12
reference: Genesis 33:12
source:
  edition: WLC
  text: וַ/יֹּ֖אמֶר נִסְעָ֣ה וְ/נֵלֵ֑כָה וְ/אֵלְכָ֖ה לְ/נֶגְדֶּֽ/ךָ׃
translation:
  text: Then he said[a], “Let us set out and go, and I will go before you.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, “and I will go ahead of you” or “before you.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: Then he said
  alternatives:
  - And he said
  lexicon: HALOT
  rationale: The waw-consecutive advances the narrative. 'Then he said' gives natural modern English while preserving sequential force; 'And he said' is more formally literal but less idiomatic.
- source_word: נִסְעָה
  chosen: Let us set out
  alternatives:
  - Let us journey
  - Let us depart
  lexicon: HALOT
  rationale: From נסע, here a cohortative 1cp expressing proposal/exhortation. 'Set out' fits the travel context well and avoids archaic tone.
- source_word: וְנֵלֵכָה
  chosen: and go
  alternatives:
  - and let us go
  - and walk
  lexicon: HALOT
  rationale: הלך in this context denotes proceeding/traveling. 'And go' preserves the simple coordination with the previous cohortative without overtranslating.
- source_word: וְאֵלְכָה
  chosen: and I will go
  alternatives:
  - and let me go
  - and I shall go
  lexicon: HALOT
  rationale: 1cs imperfect following the cohortative proposal. In context Esau is offering his own accompanying movement, best rendered as future-like 'I will go' rather than volitional 'let me go.'
- source_word: לְנֶגְדֶּךָ
  chosen: alongside you
  alternatives:
  - before you
  - ahead of you
  - opposite you
  - in front of you
  lexicon: HALOT
  rationale: נגד can denote being in front of, opposite, or corresponding to. In this travel context, 'alongside you' best conveys Esau's offer to accompany Jacob without implying hostile opposition or necessarily taking the lead. Because 'ahead of you'/'before you' is also plausible, that alternative is preserved in a footnote.
