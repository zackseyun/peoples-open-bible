translation:
  language: es
  text: Y sucedió[a] que, después de haber comido pan y después de haber bebido, ensilló el asno para el profeta que había hecho volver[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y aconteció».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a quien había traído de vuelta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי introduce la secuencia de eventos; «Y sucedió» conserva ese marcador hebreo en español actual sin sonar arcaico.
- source_word: אַחֲרֵי אָכְלוֹ לֶחֶם
  english_pob_choice: after he had eaten bread
  chosen_spanish: después de haber comido pan
  alternatives_spanish:
  - después de comer pan
  - después de haber comido
  lexicon: HALOT
  rationale: Se conserva la referencia explícita a לֶחֶם como «pan», porque el hebreo la menciona aunque funcione idiomáticamente como comida.
- source_word: וְאַחֲרֵי שְׁתוֹתוֹ
  english_pob_choice: and after he had drunk
  chosen_spanish: y después de haber bebido
  alternatives_spanish:
  - y después de beber
  - y después de haber tomado algo
  lexicon: HALOT
  rationale: El hebreo no especifica qué bebió; por eso «haber bebido» mantiene la indeterminación del original y evita añadir un objeto no expresado.
- source_word: וַיַּחֲבָשׁ
  english_pob_choice: he saddled
  chosen_spanish: le enalbardó
  alternatives_spanish:
  - le ensilló
  - ensilló para él
  lexicon: HALOT
  rationale: En este contexto חבש se refiere a aparejar un animal de montura. «Enalbardar» expresa con precisión esa acción; se eligió esta forma por fidelidad semántica, aunque sea menos común que «ensillar».
- source_word: לוֹ
  english_pob_choice: for him
  chosen_spanish: le
  alternatives_spanish:
  - para él
  - a él
  lexicon: HALOT
  rationale: El dativo pronominal marca beneficio/uso del destinatario. En español, el clítico «le» integra naturalmente esa relación en la construcción verbal.
- source_word: הַחֲמוֹר
  english_pob_choice: the donkey
  chosen_spanish: el asno
  alternatives_spanish:
  - el burro
  - el jumento
  lexicon: HALOT
  rationale: Se prefiere «asno» como equivalente digno y preciso de חמור en español bíblico contemporáneo.
- source_word: לַנָּבִיא
  english_pob_choice: for the prophet
  chosen_spanish: al profeta
  alternatives_spanish:
  - para el profeta
  - al vidente
  lexicon: HALOT
  rationale: La frase hebrea nombra aquí al personaje como «el profeta», no como «el hombre de Dios»; por eso se conserva el título del texto.
- source_word: אֲשֶׁר הֱשִׁיבוֹ
  english_pob_choice: whom he had brought back
  chosen_spanish: que había hecho volver
  alternatives_spanish:
  - a quien había traído de vuelta
  - que había devuelto
  lexicon: HALOT
  rationale: El hiphil de שוב indica causar el regreso. «Hacer volver» preserva esa fuerza causativa mejor que una simple traducción estática.
theological_decisions:
- issue: Término de causalidad en הֱשִׁיבוֹ
  english_pob_reading: whom he had brought back / whom he had caused to return
  chosen_spanish_reading: que había hecho volver
  alternative_spanish_readings:
  - que había traído de vuelta
  - que había devuelto
  rationale: La cláusula final mantiene la ambigüedad entre un regreso causado y un “traer de vuelta” más idiomático. «Hacer volver» conserva la fuerza causativa del hebreo sin cerrar indebidamente la relación narrativa.
  doctrine_reference: Sin referencia doctrinal específica; decisión léxico-sintáctica basada en el hiphil de שוב.
translation_notes:
  revision_awareness: El inglés POB revisó solo la puntuación final del enunciado, sustituyendo un guion largo por coma; no hubo cambios léxicos. La versión española sigue esa estructura narrativa simple y mantiene la relación temporal y causal del hebreo con el mínimo de añadidos.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el Tetragrámaton; aquí no ocurre.
  - Se conserva «profeta» porque el hebreo usa נָבִיא en esta cláusula.
  - Se mantiene una sintaxis narrativa directa, acorde con el estilo POB y con el paralelo temporal del original.
  - «Asno» se prefiere a «burro» por registro bíblico sobrio y neutral.
