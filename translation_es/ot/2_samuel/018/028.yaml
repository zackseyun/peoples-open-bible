translation:
  language: es
  text: 'Ahimaaz llamó en voz alta y dijo al rey[a]: «¡Paz!». Entonces se postró ante el rey con el rostro en tierra, y dijo: «Bendito sea Yahvé, tu Dios[b], que ha entregado a los hombres que alzaron su mano contra mi señor el rey».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¡Todo está bien!». El hebreo shalom puede funcionar como anuncio de bienestar o de buenas noticias, no solo como saludo.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «ha entregado» o «ha puesto en manos de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁלוֹם
  english_pob_choice: Peace!
  chosen_spanish: ¡Paz!
  alternatives_spanish:
  - ¡Todo está bien!
  - ¡Salud!
  lexicon: HALOT
  rationale: En un contexto de mensajero o reporte, shalom puede funcionar como anuncio de bienestar o de buenas noticias, no solo como saludo. «¡Paz!» conserva la brevedad y la amplitud semántica del hebreo sin interpretar en exceso.
- source_word: וַיִּשְׁתַּחוּ
  english_pob_choice: he bowed down
  chosen_spanish: se inclinó
  alternatives_spanish:
  - se postró
  - rindió homenaje
  lexicon: HALOT
  rationale: El verbo describe una reverencia corporal profunda. «Se inclinó» es natural en español y, junto con «con el rostro en tierra», comunica el gesto completo sin cargarlo innecesariamente con una interpretación litúrgica.
- source_word: לְאַפָּיו אָרְצָה
  english_pob_choice: with his face to the ground
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - con la cara en tierra
  - postrado con el rostro en el suelo
  lexicon: HALOT
  rationale: La expresión idiomática indica postración total. «Con el rostro en tierra» preserva la imagen corporal del hebreo con un español digno y fluido.
- source_word: בָּרוּךְ יְהוָה אֱלֹהֶיךָ
  english_pob_choice: Blessed be Yahweh your God
  chosen_spanish: Bendito sea Yahvé, tu Dios
  alternatives_spanish:
  - Bendito sea Yahvé tu Dios
  - Alabado sea Yahvé, tu Dios
  lexicon: HALOT
  rationale: Es una fórmula de bendición/doxología. «Bendito sea» reproduce bien el valor volitivo o declarativo del hebreo, y «Yahvé» sigue el criterio del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración española del tetragrámaton, conforme al criterio del proyecto, en lugar de sustituirlo por un título.
- source_word: סִגַּר
  english_pob_choice: has delivered up
  chosen_spanish: ha entregado
  alternatives_spanish:
  - ha puesto en manos de
  - ha entregado a sus manos
  lexicon: HALOT
  rationale: En este contexto militar, el verbo implica poner a alguien en poder de otro. «Ha entregado» comunica bien esa idea en español y mantiene la ambigüedad útil entre rendir/ceder/poner en poder.
- source_word: הָאֲנָשִׁים
  english_pob_choice: the men
  chosen_spanish: los hombres
  alternatives_spanish:
  - los hombres aquellos
  - esas personas
  lexicon: HALOT
  rationale: El plural masculino concreto se refiere a los opositores de David. «Los hombres» es exacto y suficientemente claro en español.
- source_word: נָשְׂאוּ אֶת יָדָם
  english_pob_choice: lifted their hand against
  chosen_spanish: alzaron su mano contra
  alternatives_spanish:
  - levantaron su mano contra
  - se rebelaron contra
  lexicon: HALOT
  rationale: La frase es idiomática para hostilidad o rebelión. «Alzaron su mano contra» preserva la imagen hebrea sin borrar su fuerza.
- source_word: בַּאדֹנִי הַמֶּלֶךְ
  english_pob_choice: against my lord the king
  chosen_spanish: contra mi señor el rey
  alternatives_spanish:
  - contra mi señor, el rey
  - contra mi dueño, el rey
  lexicon: HALOT
  rationale: «Mi señor» conserva el registro de respeto de אדֹנִי sin convertirlo en un término doméstico como «dueño», y «el rey» mantiene la aposición honorífica.
- source_word: וַיִּקְרָא
  english_pob_choice: called out
  chosen_spanish: llamó
  alternatives_spanish:
  - gritó
  - clamó
  lexicon: HALOT
  rationale: El verbo puede indicar que habló levantando la voz desde cierta distancia. «Llamó» es breve y natural en español; el contexto siguiente ya muestra que se dirige al rey.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: 'Se sigue el criterio doctrinal del proyecto para el tetragrámaton: transliterar el nombre divino en vez de ocultarlo con un sustituto tradicional. No se introduce una afirmación doctrinal nueva; solo se mantiene la convención editorial.'
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de שָׁלוֹם en contexto de informe
  english_pob_reading: Peace!
  chosen_spanish_reading: ¡Paz!
  alternative_spanish_readings:
  - ¡Todo está bien!
  - ¡Salud!
  rationale: En este pasaje, el término puede ser saludo o anuncio de bienestar. «¡Paz!» preserva la ambigüedad lexical que el inglés POB también retiene mediante una nota alternativa.
  doctrine_reference: Lexical issue; no doctrine reference
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el contexto hebreo y el audit trail inglés: conserva la ambigüedad de shalom, la imagen corporal de la reverencia y la fuerza idiomática de «entregar»/«poner en poder». No se aplicaron revisiones posteriores en el expediente inglés, y el estado de alta concordancia sugiere estabilidad textual.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el tetragrámaton conforme al estándar del proyecto.
  - Se mantiene «mi señor el rey» como fórmula de deferencia cortesana.
  - La puntuación reproduce una sola cita directa con cierre claro y tono narrativo bíblico moderno.
  - Los marcadores de nota a y b aparecen únicamente donde corresponden en el texto.
