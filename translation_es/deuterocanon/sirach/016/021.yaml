translation:
  language: es
  text: Si he pecado[a], ningún ojo me ve; o si miento, ¿quién lo sabe en lugar secreto alguno?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testimonio griego paralelo difiere sustancialmente aquí, pues en parte lee que muchas de sus obras están en lugares ocultos. Se sigue el hebreo, porque está conservado para este versículo y es la fuente primaria de Sirácides donde se conserva.
    reason: textual_variant
  - marker: b
    text: 'O: «en todo lugar secreto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם חָטָאתִי
  english_pob_choice: If I have sinned
  chosen_spanish: Si he pecado
  alternatives_spanish:
  - Si pequé
  - Aunque haya pecado
  lexicon: HALOT
  rationale: La partícula condicional אִם con el perfecto חָטָאתִי expresa una hipótesis general; en español, el perfecto compuesto suena natural y mantiene el valor condicional sin volverlo narrativo.
- source_word: לֹא תִרְאֵנִי עָיִן
  english_pob_choice: no eye sees me
  chosen_spanish: ningún ojo me ve
  alternatives_spanish:
  - no me ve ningún ojo
  - nadie me ve
  lexicon: HALOT
  rationale: Se preserva la imagen concreta del ‘ojo’ como sujeto, tal como en el hebreo, en lugar de aplanarla a ‘nadie’. La forma española fluye con naturalidad y mantiene la fuerza figurativa.
- source_word: אוֹ אִם אֲכַזֵב
  english_pob_choice: or if I lie
  chosen_spanish: o si miento
  alternatives_spanish:
  - o si engaño
  - o si resulto falso
  lexicon: HALOT
  rationale: כזב puede abarcar mentir o mostrarse falso; aquí ‘miento’ es la opción más clara y directa en español dentro del marco de culpa oculta.
- source_word: בְּכָל סֵתֶר
  english_pob_choice: in every secret place
  chosen_spanish: en todo lugar secreto
  alternatives_spanish:
  - en todo lugar oculto
  - en toda secrecía
  lexicon: HALOT
  rationale: סֵתֶר designa un lugar oculto o secreto. ‘Lugar secreto’ conserva el matiz espacial y se ajusta al paralelismo con la pregunta sobre lo escondido.
- source_word: מִי יוֹדֵעַ
  english_pob_choice: who knows it
  chosen_spanish: ¿quién lo sabe?
  alternatives_spanish:
  - ¿quién sabe?
  - ¿quién lo conocerá?
  lexicon: HALOT
  rationale: El objeto está implícito por el contexto; en español conviene explicitar ‘lo’ para que la pregunta quede idiomática sin añadir contenido nuevo.
- source_word: καὶ καταιγίς, ἣν οὐκ ὄψεται ἄνθρωπος, τὰ δὲ πλεῖονα τῶν ἔργων αὐτοῦ ἐν ἀποκρύφοις
  english_pob_choice: used as a control on hiddenness, not as the base text
  chosen_spanish: usado como control sobre la idea de lo oculto, no como texto base
  alternatives_spanish:
  - traducir desde el griego como texto principal
  - armonizar plenamente con el griego
  lexicon: BDAG
  rationale: La tradición griega presenta una forma divergente que refuerza el motivo de lo oculto, pero el hebreo conservado es la base principal para este versículo. Por eso la traducción española sigue el hebreo y solo deja que el griego confirme el campo semántico de la ocultación.
theological_decisions:
- issue: Prioridad textual en una divergencia hebreo/griego de Sirácides
  english_pob_reading: Translate the extant Hebrew as the main text while consulting the Greek parallel for semantic confirmation of hiddenness
  chosen_spanish_reading: Traducir el hebreo conservado como texto principal, consultando el paralelo griego solo para confirmar el campo de lo oculto
  alternative_spanish_readings:
  - Hacer una versión basada en el griego que enfatice que muchas obras están ocultas
  - Fusionar ambos testigos en una sola línea armonizada
  rationale: En Sirácides, cuando el hebreo está disponible y es confiable, debe primar como base. Aquí el griego es útil como testigo de control, pero su divergencia es suficiente para no sustituir la línea hebrea conservada. No hay un problema doctrinal; la decisión es textual y metodológica.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácides desde el hebreo donde se conserve; usar la LXX de Swete como apoyo'
- issue: Preservación de la imagen concreta de ‘ojo’
  english_pob_reading: no eye sees me
  chosen_spanish_reading: ningún ojo me ve
  alternative_spanish_readings:
  - nadie me ve
  - no me ve nadie
  rationale: La imagen del ojo se mantiene para no perder el color hebreo del verso. La alternativa generalizante ‘nadie’ suaviza demasiado el concreto literario del original.
  doctrine_reference: Principio POB de no aplanar imágenes concretas del original sin necesidad
- issue: Valor de סֵתֶר como ocultamiento espacial
  english_pob_reading: in every secret place
  chosen_spanish_reading: en todo lugar secreto
  alternative_spanish_readings:
  - en todo lugar oculto
  - en toda ocultación
  rationale: La expresión apunta a un ámbito escondido, no solo a ‘secreto’ en sentido abstracto. ‘Lugar secreto’ comunica bien el matiz espacial en español sin sonar forzado.
  doctrine_reference: Principio POB de mantener la fuerza espacial/imagen cuando el original la usa
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del audit trail que prefería 'secret place' frente a 'hiding place' por ser más natural y formal. Por eso se eligió 'lugar secreto' en español, que conserva el sentido espacial de סֵתֶר sin forzar un calco.
  spanish_consistency_notes:
  - Se usa ‘pecado’ / ‘pequé’ en sentido moral, manteniendo el registro bíblico estándar y el paralelismo con la culpa oculta.
  - ‘Ningún ojo’ conserva la metáfora concreta del hebreo y evita una paráfrasis excesiva.
  - ‘Lugar secreto’ refleja la revisión del inglés y la preferencia por una formulación natural en español.
  - La nota griega se mantiene como variante textual, no como base del versículo, conforme a la prioridad del hebreo en Sirácides cuando está disponible.
