translation:
  language: es
  text: A los hijos de Merari[a], los contarás por sus clanes, por las casas de sus padres[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los descendientes de Merari» o «los meraritas».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «por las casas de sus padres», una expresión genealógica para agrupaciones domésticas paternas.'
    reason: cultural_note
lexical_decisions:
- source_word: בְּנֵי מְרָרִי
  english_pob_choice: the sons of Merari
  chosen_spanish: los hijos de Merari
  alternatives_spanish:
  - los descendientes de Merari
  - los meraritas
  lexicon: HALOT
  rationale: בְּנֵי + nombre propio expresa descendencia de linaje; en español, «hijos de» conserva la estructura genealógica de forma natural y fiel. «Descendientes» explicita la relación, pero pierde la forma hebrea; «meraritas» es más interpretativo.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: En contextos censales, מִשְׁפָּחָה designa subdivisiones de parentesco dentro de la tribu. «Clanes» comunica mejor esa unidad social-administrativa que «familias» en español moderno.
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers' houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - según sus casas paternas
  - por sus casas ancestrales
  lexicon: HALOT
  rationale: La expresión hebrea es técnica y genealógica. «Casas de sus padres» mantiene la estructura literal y la referencia al agrupamiento paternal sin suavizarla demasiado.
- source_word: תִּפְקֹד
  english_pob_choice: you shall count
  chosen_spanish: los contarás
  alternatives_spanish:
  - los numerarás
  - los pasarás revista
  lexicon: HALOT
  rationale: En este contexto censal, פקד significa realizar un recuento o registro. «Contarás» es claro y natural en español; «numerarás» es posible pero menos idiomático, y «pasarás revista» sugiere un matiz militar no necesario aquí.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El pronombre objeto directo se integra naturalmente en español como «los», refiriéndose a los hijos de Merari.
translation_notes:
  revision_awareness: La revisión más reciente no cambió el contenido de base; el pasaje permanece en alto acuerdo con el control de fuentes, así que no se requirieron ajustes textuales especiales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Hijos de» conserva mejor la estructura genealógica de בְּנֵי en este contexto que una paráfrasis más explicativa.
  - «Clanes» traduce el valor administrativo de מִשְׁפְּחֹתָם sin borrar su base de parentesco.
  - «Casas de sus padres» preserva la fórmula técnica לְבֵית אֲבֹתָם.
  - «Contarás» sigue el sentido censal de פקד en este versículo.
