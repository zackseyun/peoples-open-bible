translation:
  language: es
  text: La primera era como un león, y tenía alas de águila. Seguí observando hasta que sus alas fueron arrancadas[a], y fue levantada de la tierra y puesta en pie sobre dos pies como un hombre[b], y le fue dado un corazón humano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fueron desgarradas' o 'fueron despojadas'.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'hecha estar de pie sobre pies como un hombre'.
    reason: lexical_alternative
  - marker: c
    text: O 'le fue dado un corazón de hombre'.
    reason: lexical_alternative
lexical_decisions:
- source_word: קַדְמָיְתָא
  english_pob_choice: The first
  chosen_spanish: La primera
  alternatives_spanish:
  - La primera de ellas
  - La primera bestia
  lexicon: HALOT
  rationale: El ordinal femenino singular se refiere a la primera bestia de la visión. En español, 'La primera' es natural y mantiene la referencia sin añadir un sustantivo que el hebreo-arameo no explicita.
- source_word: כְאַרְיֵה
  english_pob_choice: was like a lion
  chosen_spanish: era como un león
  alternatives_spanish:
  - era semejante a un león
  - parecía un león
  lexicon: HALOT
  rationale: La partícula comparativa indica semejanza, no identidad. 'Era como un león' reproduce fielmente la comparación visionaria en un español claro.
- source_word: וְגַפִּין דִּי נְשַׁר לַהּ
  english_pob_choice: and it had the wings of an eagle
  chosen_spanish: y tenía alas de águila
  alternatives_spanish:
  - y tenía alas de un águila
  - y tenía alas de águila
  lexicon: HALOT
  rationale: 'La construcción expresa posesión: ''alas de águila''. En español, ''tenía alas de águila'' suena natural y conserva la imagen. No se amplía a ''águila'' como ave concreta con artículos innecesarios.'
- source_word: חָזֵה הֲוֵית
  english_pob_choice: I kept watching
  chosen_spanish: Seguí observando
  alternatives_spanish:
  - estuve observando
  - yo observaba
  lexicon: HALOT
  rationale: La forma participial con el auxiliar comunica acción continua en el pasado. 'Seguí observando' preserva bien ese aspecto durativo en español contemporáneo.
- source_word: מְּרִיטוּ גַפַּיהּ
  english_pob_choice: its wings were plucked off
  chosen_spanish: le arrancaron las alas
  alternatives_spanish:
  - le pluckaron las alas
  - le fueron arrancadas las alas
  - le arrancaron las alas de encima
  lexicon: HALOT
  rationale: El verbo admite la idea de arrancar, despojar o arrancar de raíz. 'Le arrancaron las alas' transmite la fuerza del golpe visual y evita una calca demasiado pesada.
- source_word: וּנְטִילַת מִן אַרְעָא
  english_pob_choice: and it was lifted up from the earth
  chosen_spanish: y fue levantada de la tierra
  alternatives_spanish:
  - y fue alzada de la tierra
  - y fue tomada de la tierra
  lexicon: HALOT
  rationale: El pasivo describe que la criatura es elevada fuera del suelo. 'Fue levantada de la tierra' es natural en español y conserva la dirección del movimiento.
- source_word: וְעַל רַגְלַיִן כֶּאֱנָשׁ הֳקִימַת
  english_pob_choice: and made to stand on two feet like a man
  chosen_spanish: y puesta en pie sobre dos patas como un hombre[b]
  alternatives_spanish:
  - y puesta en pie como un hombre
  - y hecha ponerse de pie sobre dos patas como un hombre
  lexicon: HALOT
  rationale: El arameo expresa que fue hecha estar de pie en postura humana. 'Puesta en pie sobre dos patas' comunica la imagen sin perder la corporalidad del cuadro. 'Patas' es menos solemne que 'pies', pero aquí mantiene la referencia zoológica de la bestia transformada; se marca la comparación humana con 'como un hombre'.
- source_word: אֱנָשׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: HALOT
  rationale: Aquí la comparación apunta a la figura humana individual erguida. 'Un hombre' conserva la fuerza imagética del original y coincide con la decisión auditada en inglés.
- source_word: וּלְבַב אֱנָשׁ יְהִיב לַהּ
  english_pob_choice: and a human heart was given to it
  chosen_spanish: y le fue dado un corazón humano[c]
  alternatives_spanish:
  - y le fue dado un corazón de hombre
  - y le fue dado el corazón de un ser humano
  lexicon: HALOT
  rationale: '''Corazón humano'' expresa en español actual la disposición interior, la mente o el ánimo humanos frente a la condición bestial. Mantiene la contraposición del pasaje sin introducir un matiz sexual innecesario.'
theological_decisions:
- issue: Contraste entre figura bestial y rasgos humanos
  english_pob_reading: Render כֶּאֱנָשׁ as 'like a man' and לְבַב אֱנָשׁ as 'a human heart'
  chosen_spanish_reading: Como un hombre / un corazón humano
  alternative_spanish_readings:
  - como una persona / un corazón humano
  - como un ser humano / un corazón de hombre
  rationale: El verso presenta una bestia que recibe rasgos humanos. En español, 'como un hombre' conserva la imagen de postura humana erecta, y 'corazón humano' mantiene el cambio interior sin reducirlo a sexo masculino como rasgo doctrinal. La tensión entre bestialidad y humanidad queda intacta.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail en inglés y no se introdujeron revisiones adicionales; la redacción española mantiene la misma secuencia imagética y las mismas decisiones lexicográficas esenciales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en otros contextos del proyecto, pero este verso no contiene el nombre divino.
  - Se conserva la imagen de una criatura femenina en la sintaxis española ('la primera', 'fue levantada') por concordancia con el arameo.
  - '''Hombre'' se usa para la comparación corporal; ''humano'' para el corazón, siguiendo la distinción auditada en inglés.'
