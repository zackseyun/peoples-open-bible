  to: 'Porque el hombre no sabe ni siquiera su tiempo: como los peces que son atrapados en una red funesta[a], y como las aves que son apresadas en un lazo, así quedan atrapados los hijos del hombre[b] en un tiempo malo[c], cuando cae sobre ellos de repente.'
  rationale: Se ajusta «red mala» a «red funesta» como lectura principal porque comunica mejor en español el valor contextual de רָעָה sin perder la alternativa literal en nota. También se cambia «así son atrapados» por «así quedan atrapados» para evitar repetición mecánica y reflejar mejor la idea de quedar cogidos en la trampa/lazo. Se conserva «el hombre», «los hijos del hombre», «su tiempo» y «tiempo malo» por fidelidad al patrón literario del hebreo y al expediente del POB.
