translation:
  language: es
  text: ¡Oh tierra, no cubras mi sangre[a][b], y no haya lugar para mi clamor[c]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi sangre derramada». El hebreo dice literalmente «mi sangre», pero en contexto puede implicar sangre injustamente derramada.
    reason: lexical_alternative
  - marker: b
    text: La imagen recuerda la sangre que clama desde la tierra pidiendo justicia; compárese con Génesis 4:10.
    reason: cross_reference
  - marker: c
    text: O «grito de auxilio»; el término puede referirse a un clamor de angustia que también funciona como apelación por justicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֶרֶץ
  english_pob_choice: O earth
  chosen_spanish: ¡Oh tierra!
  alternatives_spanish:
  - tierra
  - ¡Oh tierra!
  - ¡Oh, tierra!
  lexicon: HALOT
  rationale: El hebreo vocativo se conserva con una invocación directa. «Tierra» mantiene el alcance amplio y poético mejor que «país» o «territorio».
- source_word: אַל תְּכַסִּי
  english_pob_choice: do not cover
  chosen_spanish: no cubras
  alternatives_spanish:
  - no ocultes
  - no escondas
  lexicon: HALOT
  rationale: כסה significa literalmente «cubrir». En el contexto de sangre injustamente derramada, «cubras» conserva la imagen concreta sin explicarla de más.
- source_word: דָמִי
  english_pob_choice: my blood
  chosen_spanish: mi sangre
  alternatives_spanish:
  - mi sangre derramada
  - mi derramamiento de sangre
  lexicon: HALOT
  rationale: La forma hebrea dice literalmente «mi sangre». En español, «mi sangre» es natural y fiel; «mi sangre derramada» explicita una implicación contextual, pero no se impone en el texto principal.
- source_word: וְאַל יְהִי
  english_pob_choice: and let there be no
  chosen_spanish: y no haya
  alternatives_spanish:
  - y que no haya
  - y no exista
  lexicon: HALOT
  rationale: El giro jussivo/exhortativo se rinde de forma natural con «no haya». Mantiene el deseo o ruego negativo sin volverlo una simple negación indicativa.
- source_word: מָקוֹם
  english_pob_choice: resting place
  chosen_spanish: lugar
  alternatives_spanish:
  - lugar de reposo
  - sitio
  lexicon: HALOT
  rationale: El hebreo dice «lugar»; «lugar» conserva la amplitud y evita fijar innecesariamente el sentido. La idea de «reposo» queda implícita por el contexto, como en el ajuste revisado del inglés.
- source_word: לְזַעֲקָתִי
  english_pob_choice: for my cry
  chosen_spanish: para mi clamor
  alternatives_spanish:
  - para mi grito
  - para mi clamor de auxilio
  lexicon: HALOT
  rationale: זעקה puede ser un clamor de dolor y una apelación por justicia. «Clamor» en español transmite mejor esa intensidad y su posible matiz judicial que un simple «grito».
theological_decisions:
- issue: Sangre inocente que clama por justicia
  english_pob_reading: Retain the concrete imagery 'my blood' and 'my cry' without making the allusion explicit in the main text.
  chosen_spanish_reading: Conservar «mi sangre» y «mi clamor» sin explicitar en el texto principal la alusión a sangre que clama por justicia.
  alternative_spanish_readings:
  - mi sangre derramada
  - mi clamor de justicia
  rationale: El hebreo mantiene una ambigüedad poética entre sangre literal y sangre derramada con carga forense, y entre clamor de dolor y apelación. La traducción principal preserva esa tensión en vez de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa cambió de «no place» a «no resting place» para reflejar mejor מָקוֹם en contexto. En español se optó por conservar «no haya lugar» en el texto principal, con nota que permite entender la posible idea de un lugar donde el clamor no descanse o no se detenga.
  spanish_consistency_notes:
  - Se mantiene «tierra» para אֶרֶץ y no «país» o «territorio», por el alcance cósmico del vocativo.
  - Se conserva «sangre» como traducción literal de דָם, evitando explicitar «derramada» en el cuerpo principal.
  - «Clamor» se eligió para זעקה por su capacidad de abarcar dolor y apelación judicial.
  - Se evita «SEÑOR»; no hay divino nombre en este verso.
  - La puntuación reproduce el tono poético y la secuencia de dos ruegos negativos.
