base_translation:
  language: en
  yaml_path: translation/nt/luke/005/013.yaml
  text: And stretching out his hand[a], he touched him, saying, “I am willing; be cleansed.” And immediately the leprosy left him.
  footnotes:
  - marker: a
    text: Or, more broadly, 'a skin disease'; the Greek term λέπρα in biblical usage may refer to a range of serious skin conditions, not only modern leprosy.
    reason: cultural_note
