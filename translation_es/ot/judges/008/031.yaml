review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo: conserva «concubina», la localización en Siquem, el hecho de que ella también le dio un hijo, y el sentido idiomático de «nombrar». No hay problema teológico. Sin embargo, el nombre propio no sigue de cerca la decisión del POB inglés ni la forma hebrea documentada: el texto fuente y la auditoría usan «Abimelek», mientras que el borrador introduce «Abimélec», y además la nota habla impropiamente de «forma inglesa tradicional» incluyendo «Abimelec», que no es la forma inglesa tradicional señalada en la auditoría.'
  spanish_quality_summary: El español es claro y legible. «Le dio un hijo» es natural, aunque «le dio a luz un hijo» sería más explícito; no es necesario cambiarlo. La principal reparación es normalizar el nombre propio y corregir la nota para que sea precisa y útil en español.
  glossary_alignment: 'La terminología principal está bien alineada: «concubina» respeta פִּילֶגֶשׁ. No hay términos del glosario mayor implicados salvo la transliteración del nombre propio, donde conviene alinear con la decisión auditada «Abimelek» y mantener como alternativa tradicional «Abimelec/Abimelech» solo en nota, formulada correctamente para contexto hispano.'
  issues:
  - severity: medium
    issue: El nombre propio en el texto principal aparece como «Abimélec» en vez de «Abimelek».
    rationale: La auditoría inglesa eligió «Abimelek» por reflejar más de cerca el hebreo אֲבִימֶלֶךְ. La forma con acento y c final introduce una adaptación no documentada y rompe la alineación interlingüística del proyecto sin necesidad.
  - severity: medium
    issue: La nota al pie sobre el nombre es inexacta y confusa.
    rationale: Dice «la forma inglesa tradicional suele ser “Abimelec/Abimelech”», pero la auditoría solo señala «Abimelech» como grafía tradicional en muchas versiones inglesas. Además, para un texto español conviene presentar la alternativa tradicional de modo más claro y no llamar inglesa a «Abimelec» sin matizar.
  revised_spanish_text: Y su concubina que estaba en Siquem también le dio un hijo[a], y le puso por nombre Abimelek.
  revised_footnotes:
  - marker: a
    text: 'Abimelek: tradicionalmente escrito «Abimelec» o, en muchas versiones inglesas, «Abimelech».'
    reason: lexical_alternative
