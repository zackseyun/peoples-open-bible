    rationale: El hebreo termina con שָׂרַף בָּאֵשׁ, una reiteración/especificación del acto de quemar, no con un objeto singular explícito. «la quemó con fuego» introduce un referente singular ajeno al texto y suena discordante después de una enumeración múltiple.
  - severity: medium
