    rationale: 'En español bíblico moderno es más natural una serie con comas: ''luz, entendimiento y sabiduría extraordinaria'', sin perder fidelidad.'
  revised_spanish_text: Y he oído acerca de ti que el espíritu de los dioses[a] está en ti, y que luz[b], entendimiento y sabiduría extraordinaria se hallan en ti.
