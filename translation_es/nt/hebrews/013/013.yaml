translation:
  language: es
  text: Por tanto[a], salgamos a él fuera del campamento, llevando su oprobio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuera del campamento». La expresión evoca la imaginería sacrificial de Levítico 16 y el rechazo que Jesús soportó fuera de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοίνυν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: La partícula inferencial introduce una conclusión de 13:11–12; «Por tanto» conserva la fuerza lógica y suena natural en español bíblico sin volverlo arcaico.
- source_word: ἐξερχώμεθα
  english_pob_choice: let us go out
  chosen_spanish: salgamos
  alternatives_spanish:
  - salgamos fuera
  - vayamos afuera
  lexicon: BDAG
  rationale: El subjuntivo exhortativo en primera persona plural se expresa bien con «salgamos», que mantiene el llamado colectivo y evita una perífrasis pesada.
- source_word: πρὸς αὐτὸν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - para él
  lexicon: BDAG
  rationale: El valor direccional de πρός con acusativo se rinde de forma idiomática con «a él». Se conserva el pronombre, como en el griego, porque el referente se entiende por el contexto inmediato.
- source_word: ἔξω τῆς παρεμβολῆς
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - fuera del encampamento
  - fuera del campamento militar
  lexicon: BDAG
  rationale: «Campamento» comunica de manera clara παρεμβολή y preserva la imagen cultual y del desierto. «Encampamento» sería más técnico y menos natural en español.
- source_word: τὸν ὀνειδισμὸν αὐτοῦ
  english_pob_choice: his reproach
  chosen_spanish: su oprobio
  alternatives_spanish:
  - su reproche
  - su afrenta
  - su vergüenza
  lexicon: BDAG
  rationale: ὀνειδισμός puede abarcar reproche, insulto o deshonra; «oprobio» recoge la carga de vergüenza pública y rechazo, y funciona bien en registro bíblico español. Se evita «reproche», que en español suele sonar más débil o interno.
- source_word: φέροντες
  english_pob_choice: bearing
  chosen_spanish: llevando
  alternatives_spanish:
  - soportando
  - cargando con
  - padeciendo
  lexicon: BDAG
  rationale: El participio presente expresa una acción concomitante y sostenida. «Llevando» conserva la imagen verbal sin interpretar demasiado; «soportando» o «padeciendo» desplazarían el matiz hacia la resistencia o el sufrimiento explícito.
theological_decisions:
- issue: Referente de «él»
  english_pob_reading: '''him'' refers to Jesus, implied from the immediate context (13:12)'
  chosen_spanish_reading: «Él» se refiere a Jesús, implícito por el contexto inmediato de 13:12
  alternative_spanish_readings:
  - Él se refiere a Dios
  - Él se refiere al pueblo creyente
  rationale: Se mantiene el pronombre, como en el griego, y no se explicita «Jesús» en el texto para no sobretraducir. El referente queda claro por el contexto de 13:12 y la exhortación a identificarse con su rechazo.
  doctrine_reference: Primacía del texto original y preservación de la referencia contextual sin resolverla artificialmente en la traducción.
- issue: Imagen de «fuera del campamento»
  english_pob_reading: Retain the metaphor/cultic image rather than paraphrasing it
  chosen_spanish_reading: Se mantiene la imagen cultual y metafórica de «fuera del campamento»
  alternative_spanish_readings:
  - fuera del sistema religioso
  - fuera de la comunidad
  - fuera del establecimiento
  rationale: La frase evoca Levítico 16 y la lógica de exclusión/rechazo en Hebreos 13:11–13. Parafrasearla debilitaría la intertextualidad y la tensión teológica que el autor quiere mantener.
  doctrine_reference: Equivalencia óptima; no diluir la imagen bíblica cuando el original la conserva.
translation_notes:
  revision_awareness: El control de revisión del contexto inglés indica high_agreement y sin cambios aplicados; por tanto, la versión española se alinea directamente con la lectura auditada más reciente, sin introducir modificaciones no justificadas.
  spanish_consistency_notes:
  - Se usa «campamento» para παρεμβολή de manera consistente con la imagen de Hebreos y con el paralelo auditado en inglés.
  - Se conserva el pronombre «él» para respetar la referencia implícita del griego y la estrategia del POB inglés.
  - «Oprobio» mantiene un registro bíblico-natural en español y preserva la carga de vergüenza pública/rechazo del término griego.
