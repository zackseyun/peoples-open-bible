revisions:
- from: Cuando un hombre rico tropieza, lo sostiene un amigo; pero cuando un hombre pobre tropieza, es [a]conducido de amigo en amigo.
  to: Cuando un hombre rico tropieza, lo sostiene un amigo; pero cuando un hombre pobre tropieza, es echado de amigo en amigo[a].
  rationale: Se cambia 'es conducido' por 'es echado' para reflejar mejor נִדְחָה y el contraste con el apoyo que recibe el rico. Se elimina la nota editorial impropia y se la reemplaza por una nota léxica que preserva la alternativa documentada y la idea de rechazo repetido. No se requiere adjudicación adicional porque la corrección es directa y bien apoyada por el hebreo y el rastro inglés.
