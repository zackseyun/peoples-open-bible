  - marker: a
    text: O «salado»; el adjetivo hebreo puede referirse más específicamente a forraje mejorado por sal o por sazón.
    reason: lexical_alternative
  - marker: b
    text: La frase final nombra dos herramientas agrícolas usadas para aventar el grano; también puede entenderse como «pala y bieldo de aventar».
    reason: cultural_note
  revision_rationale: Se reemplaza «el cual habrá sido aventado» por «que ha sido aventado» para evitar un futuro perfecto no motivado por el hebreo y mejorar la naturalidad del español, manteniendo el sentido pasivo implícito documentado por el POB inglés.
