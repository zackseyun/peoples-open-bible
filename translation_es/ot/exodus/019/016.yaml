revisions:
- from: Y sucedió en el tercer día[a], cuando llegó la mañana, que hubo truenos, relámpagos[b], y una nube pesada sobre el monte, y el sonido de un shofar muy fuerte[c]; y todo el pueblo que estaba en el campamento tembló.
  to: Y sucedió al tercer día, cuando llegó la mañana, que hubo truenos[a] y relámpagos, y una nube pesada sobre el monte, y el sonido de una trompeta[b] muy fuerte[c]; y todo el pueblo que estaba en el campamento tembló.
  rationale: Se corrigen los anclajes de notas para que coincidan con las palabras pertinentes, se mejora la naturalidad temporal con «al tercer día», y se alinea «trompeta» con la decisión documentada del POB inglés, preservando la especificidad de shofar en nota. Se mantiene «muy fuerte» como expresión natural en español para un sonido intenso y suficientemente cercana al hebreo.
