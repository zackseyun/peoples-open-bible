translation:
  language: es
  text: ¿Has escuchado en el consejo de Dios[a] y reservado la sabiduría para ti mismo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el secreto/consejo de Dios». El hebreo סוֹד puede denotar un consejo confidencial, un círculo íntimo o una deliberación secreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַ/בְ/סוֹד
  english_pob_choice: in the council
  chosen_spanish: en el consejo
  alternatives_spanish:
  - en el consejo secreto
  - en la deliberación íntima
  - en el secreto consejo
  lexicon: HALOT
  rationale: סוֹד puede designar un consejo confidencial, un círculo íntimo o una deliberación secreta. «Consejo» conserva la escena de deliberación privilegiada sin reducirla meramente a «secreto», y funciona de forma natural en español bíblico contemporáneo.
- source_word: אֱלוֹהַ
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios Todopoderoso
  lexicon: HALOT
  rationale: אֱלוֹהַ es la forma singular de «Dios» frecuente en Job. En español, «Dios» es la equivalencia natural y fiel aquí.
- source_word: תִּשְׁמָע
  english_pob_choice: have you listened
  chosen_spanish: ¿Has escuchado?
  alternatives_spanish:
  - ¿Has oído?
  - ¿Escuchaste?
  lexicon: HALOT
  rationale: שׁמע puede significar oír o escuchar. Aquí, por el contexto de participación en un consejo, «escuchado» transmite mejor la idea de atención receptiva que un simple oír.
- source_word: וְ/תִגְרַע
  english_pob_choice: restricted
  chosen_spanish: has restringido
  alternatives_spanish:
  - has limitado
  - has reducido
  - has reservado
  lexicon: HALOT
  rationale: גרע expresa disminuir, reducir o retener. En este contexto, el sentido es que Job se apropia de la sabiduría de manera exclusiva; «restringido» comunica bien esa idea de limitar el acceso o alcance.
- source_word: אֵלֶיךָ
  english_pob_choice: to yourself
  chosen_spanish: para ti mismo
  alternatives_spanish:
  - para ti
  - a ti mismo
  lexicon: HALOT
  rationale: La preposición con sufijo de 2 ms indica dirección o relación hacia el destinatario. Con «restringido», «para ti mismo» expresa de modo idiomático la apropiación exclusiva.
- source_word: חָכְמָה
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - entendimiento
  - prudencia
  lexicon: HALOT
  rationale: חָכְמָה se traduce normalmente como «sabiduría». Aquí no hay un tecnicismo distinto; se refiere a sabiduría o discernimiento en sentido general.
theological_decisions:
- issue: Sentido de סוֹד en la retórica de Job
  english_pob_reading: Rendered as 'the council of God' to suggest participation in God's deliberative assembly.
  chosen_spanish_reading: «el consejo de Dios» sugiere participación en la asamblea deliberativa divina.
  alternative_spanish_readings:
  - «el secreto de Dios»
  - «el consejo secreto de Dios»
  rationale: El verso se burla de la pretensión de acceso privilegiado a las deliberaciones internas de Dios. «Consejo» conserva mejor la imagen de una asamblea de deliberación; la nota preserva la alternativa léxica de «secreto».
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que sustituyó «limited» por «restricted»; por eso se eligió «has restringido» para reflejar mejor la idea de limitar o retener con precisión, manteniendo intacta la estructura retórica de la pregunta.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלוֹהַ, conforme al uso estándar del proyecto para el singular divino.
  - «Sabiduría» se conserva sin matiz técnico adicional porque el contexto no exige una distinción doctrinal especial.
  - La pregunta retórica se conserva en segunda persona singular, coherente con el hebreo y con el tono acusatorio del verso.
