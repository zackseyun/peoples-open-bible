    text: Or “the survivors”; Hebrew “the remaining ones.”
    reason: lexical_alternative
  - marker: b
    text: Literally “woman the flesh of her companion,” a distributive idiom here meaning “each one ... another,” with feminine grammar matching the flock imagery.
    reason: cultural_note
