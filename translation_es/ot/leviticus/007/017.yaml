    issue: 'Expresión temporal poco idiomática: «en el tercer día»'
    rationale: Aunque imita más de cerca la preposición hebrea, en español moderno y eclesial suena forzada. «Al tercer día» comunica con naturalidad el valor temporal de בַּיּוֹם הַשְּׁלִישִׁי sin perder fidelidad.
  - severity: low
    issue: Nota al pie con formulación parcialmente anglicada
    rationale: 'La nota dice «Alternativa posible: “flesh” / “carne”», mezclando inglés y español de forma innecesaria para el lector hispanohablante. Conviene dejar la alternativa solo en español.'
