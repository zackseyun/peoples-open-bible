lexical_decisions:
- source_word: אֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcaná
  alternatives_spanish:
  - Elcana
  lexicon: nombre propio transliterado
  rationale: Es un nombre propio; en español conviene conservar la forma onomástica con acento final para reflejar la pronunciación esperable y mantener legibilidad.
- source_word: יִשִּׁיָּהוּ
  english_pob_choice: Isshiah
  chosen_spanish: Jisía
  alternatives_spanish:
  - Isía
  - Jisiah
  lexicon: nombre propio transliterado
  rationale: La forma hebrea se vierte como nombre propio; se opta por una adaptación española breve y natural, sin forzar una grafía inglesa.
- source_word: עֲזַרְאֵל
  english_pob_choice: Azarel
  chosen_spanish: Azarel
  alternatives_spanish:
  - Azareel
  lexicon: nombre propio transliterado
  rationale: Nombre propio; la forma coincide bien con la tradición transliterada y es plenamente comprensible en español bíblico.
- source_word: יוֹעֶזֶר
  english_pob_choice: Joezer
  chosen_spanish: Joezer
  alternatives_spanish:
  - Yoézer
  - Joézer
  lexicon: nombre propio transliterado
  rationale: Se mantiene la transliteración onomástica, siguiendo la convención inglesa auditada y respetando el valor del elemento inicial יוֹ representado como 'Jo-'.
- source_word: יָשָׁבְעָם
  english_pob_choice: Jashobeam
  chosen_spanish: Jasobeam
  alternatives_spanish:
  - Jasobéam
  - Jashobeam
  lexicon: nombre propio transliterado
  rationale: Se translitera el nombre propio de manera cercana al hebreo de este versículo, sin adoptar la forma alternativa asociada a otro pasaje.
- source_word: הַקָּרְחִים
  english_pob_choice: the Korahites
  chosen_spanish: los korahitas
  alternatives_spanish:
  - los corajitas
  - los descendientes de Coré
  lexicon: gentilicio/clan
  rationale: El hebreo con artículo y plural designa un grupo/clan; 'korahitas' conserva la referencia al linaje de Coré sin expandirla interpretativamente. Se evita sustituirla por una paráfrasis más amplia salvo donde el contexto lo requiera.
theological_decisions:
- issue: Designación de clan en הַקָּרְחִים
  english_pob_reading: 'the Korahites, with footnote: Or "the descendants of Korah."'
  chosen_spanish_reading: 'los korahitas, con nota: «O: “los descendientes de Coré”»'
  alternative_spanish_readings:
  - los descendientes de Coré
  - los corajitas
  rationale: La forma hebrea es un gentilicio/plural de clan; la lectura principal conserva esa concisión. La nota mantiene la alternativa explicativa reconocida por el POB inglés sin imponerla en el texto principal.
  doctrine_reference: No aplica doctrina; decisión léxica/onomástica.
translation_notes:
  revision_awareness: El testimonio auditado en inglés no muestra revisiones aplicadas y mantiene alta concordancia; por ello, el español sigue de cerca la segmentación y el sentido del original hebreo, conservando el nombre de clan como lectura principal y su alternativa explicativa en nota.
  spanish_consistency_notes:
  - Se mantiene una transliteración uniforme para los nombres propios.
  - Se evita traducir el grupo familiar como explicación principal para no borrar la forma breve del hebreo.
  - Se usa minúscula en 'korahitas' por funcionar como gentilicio/clan en español, no como nombre divino o título.
