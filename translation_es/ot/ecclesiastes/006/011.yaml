translation:
  language: es
  text: Porque hay muchas cosas que aumentan la vanidad; ¿qué ventaja hay para el hombre[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para la humanidad». El hebreo usa אָדָם con sentido genérico para referirse a la humanidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, ya que
  lexicon: HALOT
  rationale: Introduce una relación explicativa o causal con lo anterior. 'Porque' conserva bien esa fuerza en español y mantiene un registro natural y sobrio.
- source_word: יֵשׁ
  english_pob_choice: there are
  chosen_spanish: hay
  alternatives_spanish:
  - existen
  - hay, de hecho
  lexicon: HALOT
  rationale: La forma impersonal 'hay' es el equivalente natural de la construcción existencial hebrea y funciona con claridad en español.
- source_word: דְּבָרִים
  english_pob_choice: things
  chosen_spanish: cosas
  alternatives_spanish:
  - palabras
  - asuntos
  - materias
  lexicon: HALOT
  rationale: 'Aunque el término puede abarcar ''palabras'', el contexto auditado favorece un sentido más amplio: ''cosas''. En español, ''cosas'' mantiene esa amplitud sin forzar una lectura más estrecha que el texto no exige.'
- source_word: הַרְבֵּה
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - en gran número de
  - abundantes
  lexicon: HALOT
  rationale: Concuerda naturalmente con el sustantivo plural 'cosas' y reproduce la cuantificación del hebreo de forma idiomática.
- source_word: מַרְבִּים
  english_pob_choice: increase
  chosen_spanish: aumentan
  alternatives_spanish:
  - multiplican
  - hacen crecer
  lexicon: HALOT
  rationale: El participio de רבה expresa el efecto de hacer crecer o incrementar. 'Aumentan' es claro, directo y suficientemente cercano al valor verbal del hebreo.
- source_word: הָבֶל
  english_pob_choice: vanity
  chosen_spanish: la vanidad
  alternatives_spanish:
  - el vapor
  - la fugacidad
  - la insustancialidad
  lexicon: HALOT
  rationale: Se conserva el término tradicional del libro de Eclesiastés, que en español bíblico comunica la idea de vaciedad, fugacidad e inconsistencia. Mantiene la tensión conceptual del término sin reducirlo a una sola glosa interpretativa.
- source_word: מַה יֹּתֵר
  english_pob_choice: what advantage is there
  chosen_spanish: ¿qué ventaja hay?
  alternatives_spanish:
  - ¿qué provecho hay?
  - ¿qué queda de más?
  lexicon: HALOT
  rationale: Captura la pregunta idiomática sobre ganancia o saldo resultante. 'Ventaja' es natural en español moderno y conserva el sentido de utilidad o provecho.
- source_word: לָאָדָם
  english_pob_choice: for man
  chosen_spanish: para el hombre
  alternatives_spanish:
  - para la humanidad
  - para el ser humano
  lexicon: HALOT
  rationale: Se mantiene la forma genérica singular del hebreo אָדָם, que puede referirse a la humanidad en general. 'El hombre' conserva esa forma representativa, y la alternativa inclusiva queda preservada en la nota.
theological_decisions:
- issue: Sentido genérico de אָדָם
  english_pob_reading: for man
  chosen_spanish_reading: para el hombre
  alternative_spanish_readings:
  - para la humanidad
  - para el ser humano
  rationale: El hebreo emplea אָדָם en sentido genérico, no para señalar a un varón individual. En la línea del criterio de fidelidad formal con claridad natural, se conserva 'el hombre' en el texto principal y se documenta el valor inclusivo en la nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; Contested terms table for אָדָם
- issue: Alcance de דְּבָרִים
  english_pob_reading: things
  chosen_spanish_reading: cosas
  alternative_spanish_readings:
  - palabras
  - asuntos
  rationale: La revisión auditada del inglés decidió ampliar desde 'words' a 'things' para reflejar mejor el valor más amplio de דְּבָרִים. El español 'cosas' sigue esa misma decisión y evita restringir indebidamente el campo semántico.
  doctrine_reference: Applied revision / latest_revision_pass; HALOT for דָּבָר
translation_notes:
  revision_awareness: Se respetó la revisión auditada que amplió דְּבָרִים de 'words' a 'things'; por eso el texto español usa 'cosas' y no 'palabras'. También se mantuvo el valor genérico de אָדָם, documentado en nota.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otra máscara reverencial porque aquí no aparece el nombre divino.
  - Se prefirió 'vanidad' para preservar la terminología característica de Eclesiastés.
  - '''Hombre'' se usa con valor genérico, no masculino exclusivo, conforme al hebreo.'
  - El registro es sobrio y bíblico, sin arcaísmos innecesarios.
