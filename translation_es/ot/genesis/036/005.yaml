  rationale: Se ajustan los nombres propios para acercarlos más a la transliteración documentada en el POB y evitar una forma tradicional no justificada por el audit trail ('Coré'). Se mantiene 'dio a luz' y 'que le nacieron' por su fidelidad e idiomaticidad. Se refuerza בְּנֵי con 'hijos varones' para reflejar mejor que se trata de descendencia masculina específica.
