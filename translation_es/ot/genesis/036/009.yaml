- from: Y estos son los descendientes de Esaú[a], el padre de Edom, en la serranía de Seír.
  to: Y estas son las generaciones de Esaú[a], el padre de Edom, en la serranía de Seír.
  rationale: Se cambia solo «los descendientes» por «las generaciones» para conservar la fórmula estructural de תּוֹלְדוֹת en Génesis, en línea con la evidencia fuente y la rationale auditada en inglés. Se mantiene «en la serranía de Seír» como buena solución española para el valor regional de בְּהַר, con la nota alternativa ya presente.
  reviewer_model: gpt-5.4
