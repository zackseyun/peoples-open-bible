lexical_decisions:
- source_word: אֶרֶץ
  english_pob_choice: a land of
  chosen_spanish: una tierra de
  alternatives_spanish:
  - tierra de
  lexicon: HALOT
  rationale: En este contexto, אֶרֶץ introduce una descripción encomiástica de la tierra prometida. «Una tierra de» mantiene el valor descriptivo y la estructura de lista del hebreo, con naturalidad en español.
- source_word: חִטָּה
  english_pob_choice: wheat
  chosen_spanish: trigo
  alternatives_spanish:
  - trigo común
  lexicon: HALOT
  rationale: Es el equivalente léxico normal en español para el cereal mencionado.
- source_word: שְׂעֹרָה
  english_pob_choice: barley
  chosen_spanish: cebada
  alternatives_spanish:
  - cebada común
  lexicon: HALOT
  rationale: Equivalente léxico estándar; se conserva la pareja habitual con el trigo.
- source_word: גֶּפֶן
  english_pob_choice: vines
  chosen_spanish: vides
  alternatives_spanish:
  - vid
  - parras
  lexicon: HALOT
  rationale: El singular colectivo hebreo se refiere a las vides como cultivo. «Vides» mantiene el sentido agrícola y el plural de lista en español.
- source_word: תְּאֵנָה
  english_pob_choice: fig trees
  chosen_spanish: higueras
  alternatives_spanish:
  - higuera
  - árboles de higo
  lexicon: HALOT
  rationale: El sustantivo suele nombrar el árbol, no solo el fruto; «higueras» refleja bien esa forma léxica en español.
- source_word: רִמּוֹן
  english_pob_choice: pomegranates
  chosen_spanish: granados
  alternatives_spanish:
  - granadas
  - árboles de granado
  lexicon: HALOT
  rationale: El hebreo puede referirse al fruto o al árbol; en una lista de producciones del país, «granados» preserva la referencia arbórea implícita y suena natural en español.
- source_word: זֵית שֶׁמֶן
  english_pob_choice: olive oil
  chosen_spanish: aceite de oliva
  alternatives_spanish:
  - aceite de aceituna
  - olivas para aceite
  lexicon: HALOT
  rationale: La construcción hebrea describe el producto oleoso de la oliva; «aceite de oliva» es la equivalencia idiomática clara en español.
- source_word: דְבָשׁ
  english_pob_choice: honey
  chosen_spanish: miel
  alternatives_spanish:
  - jarabe de dátiles
  - sirope de dátiles
  lexicon: HALOT
  rationale: Se conserva el sentido general de «miel» como traducción base, dejando abierta la alternativa agrícola señalada por el audit trail para el término hebreo.
theological_decisions:
- issue: La repetición de «una tierra de» en dos miembros de la lista
  english_pob_reading: a land of ... a land of ...
  chosen_spanish_reading: una tierra de ... una tierra de ...
  alternative_spanish_readings:
  - tierra de ... tierra de ...
  - una tierra con ...
  rationale: La repetición retórica del hebreo refuerza la abundancia y la estructura del pasaje; conviene conservarla en español para no diluir el énfasis.
  doctrine_reference: Deuteronomio 8:8
translation_notes:
  revision_awareness: El borrador sigue el texto hebreo directo y el audit trail inglés. Se corrigió el fallo previo anclando la nota [a] en el texto español; ahora el marcador aparece junto a «cebada» y se repite al final para cubrir la alternativa léxica de דְבָשׁ, manteniendo el enlace exacto con la nota.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no aparece ningún nombre divino en este versículo.
  - «Vid»/«vides» se usa para reflejar el cultivo de la uva sin introducir una explicitación mayor que la del hebreo.
  - «Miel» conserva la traducción base tradicional y auditable; la alternativa de jarabe de dátiles queda documentada en nota.
