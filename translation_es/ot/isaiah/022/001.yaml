translation:
  language: es
  text: 'Un oráculo acerca del Valle de la Visión: ¿Qué te pasa ahora[a], que todos los tuyos han subido a las azoteas?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El Valle de la Visión» probablemente es una designación poética de Jerusalén, aunque el versículo mismo no lo identifica explícitamente.
    reason: cross_reference
lexical_decisions:
- source_word: מַשָּׂא
  english_pob_choice: oracle
  chosen_spanish: oráculo
  alternatives_spanish:
  - carga
  - pronunciamiento
  lexicon: HALOT
  rationale: En encabezados proféticos, el hebreo מַשָּׂא introduce una declaración profética. «Oráculo» transmite bien ese valor de encabezamiento en español actual y evita el tono arcaico de «carga».
- source_word: גֵּיא חִזָּיוֹן
  english_pob_choice: the Valley of Vision
  chosen_spanish: el Valle de la Visión
  alternatives_spanish:
  - Valle de Visión
  - el valle de la visión
  lexicon: HALOT
  rationale: La construcción nominal se conserva de forma directa como designación poética. Mantener «Visión» sin interpretarlo respeta la ambigüedad del hebreo y su posible función como nombre/título.
- source_word: מַה לָּךְ
  english_pob_choice: What is the matter with you
  chosen_spanish: ¿Qué te pasa
  alternatives_spanish:
  - ¿Qué te sucede?
  - ¿Qué ocurre contigo?
  lexicon: HALOT
  rationale: La expresión idiomática pregunta qué le ocurre a la persona o ciudad personificada. «¿Qué te pasa?» comunica con naturalidad el tono retórico sin exagerar el sentido.
- source_word: אֵפ֔וֹא
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - entonces
  - pues
  lexicon: HALOT
  rationale: En este contexto interrogativo, el adverbio aporta inmediatez o énfasis retórico. «Ahora» funciona de manera natural en español y conserva esa urgencia.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Después de la pregunta, כִּי introduce el contenido que explica la inquietud. «Que» reproduce ese valor explicativo/de contenido de forma directa en español.
- source_word: עָלִית
  english_pob_choice: have gone up
  chosen_spanish: han subido
  alternatives_spanish:
  - han ascendido
  - subieron
  lexicon: HALOT
  rationale: El verbo expresa movimiento ascendente. «Han subido» suena natural en español y conserva la imagen de desplazamiento hacia arriba.
- source_word: כֻּלָּךְ
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - ustedes todos
  - la población entera
  lexicon: HALOT
  rationale: El sufijo femenino singular probablemente personifica a la ciudad, con sentido colectivo. «Todos ustedes» refleja ese plural inclusivo y mantiene la idea de totalidad.
- source_word: לַגַּגּוֹת
  english_pob_choice: to the rooftops
  chosen_spanish: a las azoteas
  alternatives_spanish:
  - a los techos
  - a las terrazas
  lexicon: HALOT
  rationale: Los techos planos de las casas antiguas se expresan naturalmente en español como «azoteas». Esa opción comunica el uso espacial del hebreo sin perder claridad.
theological_decisions:
- issue: Identidad de «el Valle de la Visión»
  english_pob_reading: Retained as a literal title without identifying it in the main text
  chosen_spanish_reading: Se conserva como designación literal sin identificarla en el texto principal
  alternative_spanish_readings:
  - Una referencia explícita a Jerusalén
  - Un valle histórico específico
  rationale: El hebreo nombra el lugar, pero no lo identifica de manera explícita en este versículo. Mantener la designación directa evita introducir una conclusión interpretativa en la traducción principal.
  doctrine_reference: Principio de primacía del texto fuente; preservar la tensión interpretativa cuando el original no la resuelve explícitamente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; esta propuesta conserva la estructura, el sentido y la cautela interpretativa del registro inglés auditado.
  spanish_consistency_notes:
  - Se mantiene «oráculo» para מַשָּׂא, coherente con el valor profético del encabezamiento.
  - Se conserva «Visión» con mayúscula en el sintagma del título, siguiendo el tratamiento de designación poética.
  - Se usa «azoteas» para las superficies accesibles de las casas, preferible en español a un calco rígido de «techos» cuando se busca claridad cultural.
  - La nota al pie se ancla en «Visión» mediante el marcador [a], como corresponde a la identificación probable del topónimo.
