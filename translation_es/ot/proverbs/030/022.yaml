  spanish_quality_summary: El español es comprensible, pero «Debajo de un esclavo» resulta torpe y demasiado espacial. «Bajo un esclavo» es más idiomático y digno en este contexto. «Cuando reina» también es menos vívido que «cuando llega a ser rey», que comunica mejor el giro social del proverbio sin sonar forzado.
  glossary_alignment: Alinea bien con las decisiones del proyecto en «esclavo» para עֶבֶד y evita suavizar נָבָל al usar «necio». No hay cuestiones teológicas especiales. La principal mejora es ajustar la formulación de תַּחַת y de יִמְלֹךְ para reflejar mejor la evidencia fuente y la rationale auditada.
  issues:
