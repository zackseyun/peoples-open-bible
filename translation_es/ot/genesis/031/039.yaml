translation:
  language: es
  text: No te traje un animal[a] desgarrado; yo mismo asumía la pérdida. Tú me lo reclamabas de mi propia mano[b], fuera robado de día o robado de noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Desgarrado» traduce el hebreo de un animal atacado y despedazado por fieras; también podría expresarse «despedazado».
    reason: lexical_alternative
  - marker: b
    text: O «me lo exigías a mí». La expresión «de mi propia mano» conserva el modismo hebreo de responsabilidad personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: טְרֵפָה
  english_pob_choice: an animal torn by beasts
  chosen_spanish: un animal desgarrado
  alternatives_spanish:
  - un animal destrozado por fieras
  - un animal que fue despedazado
  lexicon: HALOT
  rationale: En este contexto pastoril, el término alude a una res atacada y muerta por animales salvajes. «Desgarrado» conserva la imagen concreta sin sobrecargar el verso; «desgarrado por fieras» sería más explícito, pero menos terso.
- source_word: הֵבֵאתִי אֵלֶיךָ
  english_pob_choice: I did not bring to you
  chosen_spanish: No te llevé
  alternatives_spanish:
  - No te lo llevé
  - No traje a ti
  lexicon: HALOT
  rationale: ביא con אֶל indica llevar algo a alguien. En español, «No te llevé» suena natural y mantiene la relación directa con el destinatario; el objeto queda recuperado por el contexto, como en el hebreo.
- source_word: אָנֹכִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - por mi parte, yo
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. «Yo mismo» preserva esa autoseñalación enfática en español, y encaja bien con la idea de asumir la pérdida o la responsabilidad.
- source_word: אֲחַטֶּנָּה
  english_pob_choice: bore the loss of it
  chosen_spanish: respondía por él
  alternatives_spanish:
  - asumía la pérdida
  - pagaba por ello
  - resarcía la pérdida
  lexicon: HALOT
  rationale: El verbo en pi‘el expresa aquí asumir la responsabilidad o soportar la pérdida. «Respondía por él» comunica bien la carga de responsabilidad jurídica y económica sin exagerar el matiz de pago si el español lo hiciera sonar demasiado técnico.
- source_word: מִיָּדִי תְּבַקְשֶׁנָּה
  english_pob_choice: You required it from my hand
  chosen_spanish: Tú lo reclamabas de mi mano
  alternatives_spanish:
  - Tú lo exigías de mi mano
  - Tú me lo pedías como responsabilidad
  lexicon: HALOT
  rationale: בקש con מן/יד expresa exigir o requerir responsabilidad. «Reclamabas de mi mano» conserva el idiomático hebreo de la mano como esfera de responsabilidad; «exigías» sería posible, pero algo menos jurídico en español.
- source_word: גְּנֻבְתִי יוֹם / וּגְנֻבְתִי לָיְלָה
  english_pob_choice: stolen by day / stolen by night
  chosen_spanish: robado de día / robado de noche
  alternatives_spanish:
  - robado durante el día / robado durante la noche
  - hurtado de día / hurtado de noche
  lexicon: HALOT
  rationale: La construcción indica la categoría de lo sustraído en dos circunstancias paralelas. «Robado de día» y «robado de noche» preservan la brevedad y el paralelismo del hebreo. «Hurtado» podría sonar más formal o literario, pero «robado» es más claro y natural aquí.
translation_notes:
  revision_awareness: 'La versión inglesa pasó por una revisión importante en la cola final: el sentido de las dos expresiones de robo se entendió como objetos reclamados por Laban, no como alternativas de una sola pérdida. La redacción española sigue esa lectura añadida y mantiene el paralelismo «robado de día / robado de noche» como objeto de la reclamación.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y no hay términos divinos en el versículo.
  - Se conserva el paralelismo de las dos cláusulas finales, con una estructura española que no introduce una disyunción inexistente en el hebreo.
  - «De mi mano» se mantiene como idiomatismo de responsabilidad personal, no como referencia corporal literal.
