translation:
  language: es
  text: No temamos al que parece poder matar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al que aparenta matar» o «al que se cree capaz de matar». El griego enfatiza solo un poder aparente.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ φοβηθῶμεν
  english_pob_choice: Let us not fear
  chosen_spanish: No temamos
  alternatives_spanish:
  - No tengamos miedo
  - No temamos nosotros
  lexicon: BDAG
  rationale: El subjuntivo exhortativo con μή pide un español exhortativo natural. «No temamos» conserva la fuerza de invitación colectiva y evita una paráfrasis más larga.
- source_word: τὸν δοκοῦντα
  english_pob_choice: the one who seems
  chosen_spanish: al que parece
  alternatives_spanish:
  - al que aparenta
  - al que es tenido por
  lexicon: BDAG
  rationale: δοκέω aquí expresa apariencia o impresión, no certeza real. «Parece» reproduce esa tensión de forma clara y directa en español.
- source_word: ἀποκτενεῖν
  english_pob_choice: to kill
  chosen_spanish: matar
  alternatives_spanish:
  - dar muerte
  - dar muerte a
  lexicon: BDAG
  rationale: «Matar» es la equivalencia más natural y precisa en español moderno para el infinitivo de acción violenta. Mantiene el sentido directo sin añadir solemnidad innecesaria.
theological_decisions:
- issue: Poder solo aparente del perseguidor
  english_pob_reading: The persecutor only seems able to kill
  chosen_spanish_reading: El perseguidor solo parece matar
  alternative_spanish_readings:
  - El perseguidor solo aparenta poder matar
  - El que persigue solo es visto como capaz de matar
  rationale: El griego subraya que el poder del agresor es aparente, no absoluto. «Parece matar» preserva esa tensión teológica sin explicitar más de lo que el texto dice.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La versión inglesa auditada ya fue marcada como estable; no hubo revisiones aplicadas. La redacción española mantiene la misma distinción central entre apariencia y realidad, con ajuste natural al español.
  spanish_consistency_notes:
  - Se mantuvo «matar» para conservar la fuerza verbal directa del griego, en coherencia con el valor léxico documentado.
  - Se evitó «tener miedo» por ser menos exhortativo que «temamos» en este contexto de llamada colectiva.
  - La nota a pie conserva la alternativa de lectura sobre la capacidad aparente, siguiendo el comentario inglés sobre la fuerza solo aparente del verbo.
