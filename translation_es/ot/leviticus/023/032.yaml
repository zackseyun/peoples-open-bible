  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo: un sábado de descanso total, la orden de autoaflicción, el inicio en la tarde del día nueve y la observancia de tarde a tarde. Sin embargo, «afligirán sus vidas» no preserva bien el valor idiomático reflexivo de ועניתם את נפשתיכם; suena poco natural y semánticamente desviado en español.'
  spanish_quality_summary: El texto es mayormente claro, pero «afligirán sus vidas» resulta torpe e impropio en español bíblico natural. «De anochecer a anochecer» es comprensible, aunque «de tarde a tarde» o «de una tarde a otra» serían opciones; no obstante, puede mantenerse por cercanía formal. Conviene reparar la cláusula central para conservar fidelidad y buena legibilidad.
  glossary_alignment: No hay conflicto con la terminología de Yahvé/Mesías/etc. La decisión clave aquí es נַפְשֹׁתֵיכֶם, que en este modismo debe expresarse reflexivamente en español («se afligirán» / «se humillarán») y no como «sus vidas».
  issues:
  - severity: high
    issue: «Afligirán sus vidas» traduce de forma poco fiel y poco idiomática ועניתם את נפשתיכם.
    rationale: En este contexto ritual, נפש funciona reflexivamente. El inglés POB justificó «yourselves», no «your lives». En español, «afligirán sus vidas» suena antinatural y puede sugerir daño a la vida misma, no autoaflicción penitencial.
  - severity: medium
    issue: La nota a no corresponde al contenido del anclaje principal.
    rationale: El anclaje [a] está en «completo reposo», pero la alternativa léxica más necesaria según el expediente inglés corresponde a «se afligirán», incluyendo «se humillarán» y «se negarán a sí mismos». La nota actual inventa alternativas no preservadas en el inglés para שׁבת שבתון y omite la nota importante sobre autoaflicción.
  revised_spanish_text: Es un sábado de completo reposo para ustedes, y se afligirán[a]. El día nueve del mes, al anochecer, de anochecer a anochecer[b], guardarán su sábado.
  revised_footnotes:
