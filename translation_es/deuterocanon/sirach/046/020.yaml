translation:
  language: es
  text: A la vista de todo ser viviente—y aun después de su muerte, fue buscado.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El paralelo griego amplía esto: «después de dormirse, profetizó y mostró al rey su fin, y alzó su voz desde la tierra en profecía, para borrar la maldad del pueblo». Esto probablemente explica el hebreo «fue buscado» como una referencia a que Samuel fue consultado después de muerto.'
    reason: alternative_reading
lexical_decisions:
- source_word: ובעיני
  english_pob_choice: In the sight of
  chosen_spanish: Ante los ojos de
  alternatives_spanish:
  - a la vista de
  - en presencia de
  - a los ojos de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y pública; en español, «ante los ojos de» conserva bien la idea de visibilidad/observación sin sonar rígida.
- source_word: כל חי
  english_pob_choice: every living thing
  chosen_spanish: todo ser viviente
  alternatives_spanish:
  - todos los vivientes
  - toda criatura viviente
  - toda persona viva
  lexicon: HALOT
  rationale: La amplitud del hebreo se mantiene con una formulación natural en español. «Todo ser viviente» conserva el alcance general, aunque el contexto apunte a seres humanos.
- source_word: וגם
  english_pob_choice: and even
  chosen_spanish: y aun
  alternatives_spanish:
  - y también
  - e incluso
  - y hasta
  lexicon: HALOT
  rationale: La partícula añade énfasis; «y aun» reproduce ese matiz mejor que una mera coordinación neutra.
- source_word: אחרי מותו
  english_pob_choice: after his death
  chosen_spanish: después de su muerte
  alternatives_spanish:
  - después de que murió
  - tras su muerte
  - luego de su muerte
  lexicon: HALOT
  rationale: Es una equivalencia directa y natural en español, manteniendo el valor temporal del hebreo.
- source_word: נדרש
  english_pob_choice: was sought out
  chosen_spanish: fue buscado
  alternatives_spanish:
  - fue consultado
  - se recurrió a él
  - fue inquirido
  lexicon: HALOT
  rationale: El nifal de דרש puede expresar búsqueda o consulta. Dado que el hebreo conservado es breve, «fue buscado» sigue de cerca la concisión del original sin cerrar demasiado el sentido. La nota preserva la lectura ampliada del griego.
theological_decisions:
- issue: Actividad póstuma de Samuel y alcance de la tradición griega
  english_pob_reading: Keep the Hebrew's concise 'after his death he was sought out' in the main text, with the Greek expansion preserved in a footnote.
  chosen_spanish_reading: 'Mantener en el texto principal la concisión hebrea: «después de su muerte, fue buscado», con la expansión griega en una nota.'
  alternative_spanish_readings:
  - «después de dormirse, profetizó y mostró al rey su fin…»
  - «después de su muerte, fue consultado»
  rationale: El hebreo disponible es la base principal del versículo en este proyecto. Sin embargo, el paralelo griego añade una tradición interpretativa importante sobre lo que implica que «fue buscado». La nota conserva esa tensión sin sustituir el testimonio hebreo por la expansión griega.
  doctrine_reference: 'PHILOSOPHY.md: prioridad al hebreo cuando está preservado; el griego paralelo puede aclarar, pero no reemplazar, el texto principal.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; este borrador sigue esa dirección, manteniendo la prioridad del hebreo y preservando la ampliación griega solo en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó traducir mecánicamente desde el inglés; el español se ajustó al hebreo breve y a la nota explicativa del griego.
  - No se introdujo terminología eclesial ajena al testimonio disponible; «fue buscado» conserva la ambigüedad del hebreo նדרש.
