    issue: La expresión 'ni aun en la décima generación' no reproduce con suficiente precisión la fuerza de גַּם דּוֹר עֲשִׂירִי.
    rationale: El hebreo y el rastro inglés apuntan a una duración de exclusión 'hasta la décima generación', no meramente a que incluso en la décima siga vigente. En español, 'hasta la décima generación' comunica mejor la extensión legal.
