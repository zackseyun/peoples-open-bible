review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido hebreo: una petición volitiva (''que sepan''), la identificación del destinatario por el nombre divino, la exclusividad de ''solo'', y la supremacía universal ''sobre toda la tierra''. Sin embargo, ''Que lleguen a saber'' añade un matiz progresivo (''lleguen a'') no exigido por וְיֵדְעוּ y menos natural que la forma simple volitiva en español.'
  spanish_quality_summary: La redacción es clara y digna, pero puede mejorarse en naturalidad bíblica y precisión idiomática. 'Que sepan' suena más directo y fiel que 'Que lleguen a saber'. El resto de la frase, 'tú solo, cuyo nombre es Yahvé, eres el Altísimo sobre toda la tierra', es legible y adecuado.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה se rinde como ''Yahvé'', no ''SEÑOR''; עֶלְיוֹן como ''el Altísimo''; הָאָרֶץ como ''la tierra''. No hay conflictos relevantes de glosario. La nota existente sobre YHWH no preserva bien la lógica de la nota inglesa; conviene convertirla en nota de alternativa/tradición previa en vez de justificar la transliteración.'
  issues:
  - severity: medium
    issue: '''Que lleguen a saber'' sobretraduce el volitivo hebreo'
    rationale: וְיֵדְעוּ en este contexto de súplica se expresa naturalmente como 'Que sepan'. 'Lleguen a saber' introduce una idea de proceso o resultado gradual que no está marcada en el hebreo ni en la auditoría inglesa.
  - severity: low
    issue: La nota al pie no corresponde bien al propósito de la nota auditada
    rationale: La nota inglesa conserva una alternativa de representación/tradición ('YHWH' / 'Yahweh' / 'Jehovah' y la redacción previa). La nota española actual solo defiende la transliteración y no aporta una alternativa útil al lector.
  revised_spanish_text: Que sepan que tú solo, cuyo nombre es Yahvé[a], eres el Altísimo sobre toda la tierra.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «YHWH»; también se ha escrito «Yahweh» o «Jehová».'
