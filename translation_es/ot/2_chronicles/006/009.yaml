  glossary_alignment: No hay conflicto con la terminología base del proyecto. «La casa» preserva correctamente הַבַּיִת como designación del templo. «Para mi nombre» también está bien alineado con לִשְׁמִי. La única desviación relevante frente a la rationale documentada es la elección de «entrañas» en lugar de una formulación equivalente a «from your own body».
  issues:
