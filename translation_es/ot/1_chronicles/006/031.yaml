lexical_decisions:
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En listas genealógicas, בֶּן expresa filiación lineal; en español, «hijo de» conserva la relación genealógica de forma natural y transparente. «Descendiente de» queda como alternativa si se quisiera enfatizar compresión genealógica, pero el versículo por sí solo no obliga a esa expansión.
- source_word: אַמְצִי
  english_pob_choice: Amzi
  chosen_spanish: Amzi
  alternatives_spanish:
  - Amazi
  lexicon: transliteración estándar de nombre propio
  rationale: Nombre propio transliterado, no traducido. Se conserva la forma breve y reconocible «Amzi», acorde con el tratamiento del texto fuente y la convención editorial de nombres bíblicos.
- source_word: בָּנִי
  english_pob_choice: Bani
  chosen_spanish: Bani
  lexicon: transliteración estándar de nombre propio
  rationale: Nombre propio transliterado directamente. No hay base textual para alterarlo en español.
- source_word: שָׁמֶר
  english_pob_choice: Shemer
  chosen_spanish: Shemer
  alternatives_spanish:
  - Shamer
  lexicon: transliteración estándar de nombre propio
  rationale: Se mantiene la transliteración tradicional «Shemer», que es legible y ampliamente reconocible en uso bíblico en inglés; en español evita una grafía menos estable sin aporte semántico.
translation_notes:
  revision_awareness: El contexto de auditoría inglesa no requirió cambios de sentido; la única decisión sensible es la equivalencia genealógica de בֶּן, donde el español conserva la lectura literal «hijo de» y registra la alternativa posible «descendiente de».
  spanish_consistency_notes:
  - Se preservó el orden genealógico del hebreo con repetición de «hijo de».
  - Los nombres propios se mantuvieron como transliteraciones, sin adaptación interpretativa.
  - Se evitó mayúscula inicial en «hijo» porque funciona como elemento genealógico dentro de la cláusula, no como título.
