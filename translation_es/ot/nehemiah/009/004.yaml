translation:
  language: es
  text: Entonces Jesúa[a], Bani, Cadmiel, Sebanías, Buni, Serebías, Bani y Quenaní se pusieron de pie sobre el estrado de los levitas, y clamaron a gran voz a Yahvé su Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «la subida / los escalones de los levitas»; la frase puede referirse a un lugar elevado o a una escalera asociada con los levitas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: stood
  chosen_spanish: se pusieron
  alternatives_spanish:
  - se levantaron
  - estuvieron de pie
  lexicon: HALOT
  rationale: El contexto inmediato es una acción pública en un lugar elevado; en español, ‘se pusieron’ comunica con naturalidad que tomaron posición de pie. ‘Se levantaron’ sería más literal, pero puede sonar menos preciso en esta escena.
- source_word: מַעֲלֵה הַלְוִיִּם
  english_pob_choice: platform of the Levites
  chosen_spanish: el estrado de los levitas
  alternatives_spanish:
  - la subida de los levitas
  - los escalones de los levitas
  - la plataforma de los levitas
  lexicon: HALOT
  rationale: El hebreo puede referirse a una subida, escalera o lugar elevado asociado a los levitas. ‘Estrado’ transmite bien una elevación funcional para hablar en público, sin cerrar indebidamente la imagen física.
- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jeshúa
  - Josué
  lexicon: Transliteración bíblica usual en español
  rationale: El nombre hebreo corresponde a Jesúa; en español bíblico, ‘Jesúa’ evita la forma inglesa y conserva la identificación histórica del personaje. ‘Josué’ podría confundirlo con el líder de Josué.
- source_word: וּבָנִי קַדְמִיאֵל שְׁבַנְיָה בֻּנִּי שֵׁרֵבְיָה בָּנִי כְנָנִי
  english_pob_choice: Bani, Kadmiel, Shebaniah, Bunni, Sherebiah, Bani, and Kenani
  chosen_spanish: Bani, Cadmiel, Sebanías, Buni, Serebías, Bani y Quenaní
  alternatives_spanish:
  - Bani, Cadmiel, Sebanías, Buni, Sherebías, Bani y Quenani
  lexicon: Transliteración bíblica usual en español
  rationale: Se transliteran los nombres propios de forma reconocible para lectores hispanohablantes. Se conserva la repetición de Bani porque está en el hebreo y no debe armonizarse.
- source_word: וַיִּזְעֲקוּ
  english_pob_choice: they cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - alzaron su clamor
  - dieron voces
  lexicon: HALOT
  rationale: זעק expresa un clamor fuerte, a menudo dirigido a Dios. ‘Clamaron’ conserva la intensidad y el tono orante mejor que un simple ‘dijeron’ o ‘gritaron’.
- source_word: בְּקוֹל גָּדוֹל
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en alta voz
  - con fuerte voz
  - a gran voz
  lexicon: HALOT
  rationale: La locución hebrea es idiomática. ‘Con voz fuerte’ suena natural en español y mantiene el énfasis auditivo sin volverse arcaizante.
- source_word: אֶל יְהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahweh
  - al SEÑOR
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: El texto hebreo nombra directamente a יהוה. Siguiendo la terminología del proyecto en español, se usa ‘Yahvé’ en vez de una sustitución por ‘SEÑOR’, manteniendo visible el nombre divino.
- source_word: אֱלֹהֵי/הֶם
  english_pob_choice: their God
  chosen_spanish: su Dios
  alternatives_spanish:
  - el Dios de ellos
  - su Dios
  lexicon: HALOT
  rationale: El sufijo posesivo marca relación de pertenencia/pacto. ‘Su Dios’ es la forma natural y fiel en español; ‘Dios de ellos’ sería menos idiomática.
theological_decisions:
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahweh
  rationale: El hebreo usa el Tetragrámaton de forma explícita. Para el español del proyecto, ‘Yahvé’ preserva el nombre del pacto y evita el masking litúrgico de ‘SEÑOR’.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: La comparación con el audit trail inglés muestra alta concordancia y sin revisiones aplicadas; se conserva la decisión de no armonizar el doble Bani y se refleja en español la ambigüedad de מַעֲלֵה mediante ‘estrado’ con nota.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ según la terminología de proyecto para יהוה.
  - Los nombres propios se transliteran de manera consistente con el español bíblico.
  - Se conserva la repetición de Bani porque está atestiguada en el hebreo.
  - ‘Clamaron con voz fuerte’ reproduce el valor intensivo de זעק + בְקוֹל גָּדוֹל sin sobrecargar el castellano.
