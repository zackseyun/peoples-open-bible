translation:
  language: es
  text: 'Entonces me llevó al vestíbulo de la casa[a], y midió las jambas[c] del vestíbulo: cinco codos de este lado y cinco codos de aquel lado[b]; y el ancho de la puerta era de tres codos de este lado y tres codos de aquel lado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pórtico' o 'porche' para 'vestíbulo'.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ''la casa''; en esta visión, se refiere al edificio del templo.'
    reason: lexical_alternative
  - marker: c
    text: El término hebreo aquí es una palabra arquitectónica que también puede traducirse como 'postes' o 'pilares laterales'.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֻלָם
  english_pob_choice: vestibule
  chosen_spanish: vestíbulo
  alternatives_spanish:
  - pórtico
  - porche
  lexicon: HALOT
  rationale: En contexto arquitectónico del templo, el término designa el espacio de entrada antes del edificio principal. 'Vestíbulo' es preciso y natural en español, y evita el matiz demasiado doméstico de 'porche'.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'la casa'. Aunque en la visión se refiere al edificio del templo, 'casa' conserva la forma de la fuente y su resonancia arquitectónica y teológica.
- source_word: אֵל אֻלָם
  english_pob_choice: the jambs of the vestibule
  chosen_spanish: los lados del vestíbulo
  alternatives_spanish:
  - los jambajes del vestíbulo
  - los postes laterales del vestíbulo
  lexicon: HALOT
  rationale: El término hebreo aquí funciona como designación arquitectónica de los elementos laterales medidos a la entrada. En español, 'lados' comunica con claridad la idea bilateral que exige el contexto de las medidas, sin introducir un tecnicismo poco natural.
- source_word: חָמֵשׁ אַמּוֹת ... מִפֹּה וְחָמֵשׁ אַמּוֹת מִפֹּה
  english_pob_choice: five cubits on this side and five cubits on that side
  chosen_spanish: cinco codos de este lado y cinco codos de aquel lado
  alternatives_spanish:
  - cinco codos de un lado y cinco codos del otro
  - cinco codos de aquí y cinco codos de allá
  lexicon: HALOT
  rationale: Las expresiones deícticas marcan dos lados correspondientes. 'De este lado... de aquel lado' reproduce bien la relación espacial en español y mantiene la estructura del hebreo.
- source_word: רֹחַב הַשַּׁעַר
  english_pob_choice: the width of the gate
  chosen_spanish: el ancho de la puerta
  alternatives_spanish:
  - el ancho de la entrada
  - la anchura de la puerta
  lexicon: HALOT
  rationale: En este contexto arquitectónico, 'puerta' es una traducción clara y fiel de 'gate', y 'ancho' suena más natural que 'anchura' en español actual.
- source_word: שָׁלֹשׁ אַמּוֹת מִפּוֹ וְשָׁלֹשׁ אַמּוֹת מִפּוֹ
  english_pob_choice: three cubits on this side and three cubits on that side
  chosen_spanish: tres codos de este lado y tres codos de aquel lado
  alternatives_spanish:
  - tres codos de un lado y tres codos del otro
  - tres codos de aquí y tres codos de allá
  lexicon: HALOT
  rationale: Se conserva el paralelismo deíctico y la simetría de las medidas, como en el hebreo y en la traducción inglesa auditada.
- source_word: וַיְבִאֵנִי ... וַיָּמָד
  english_pob_choice: Then he brought me ... and he measured
  chosen_spanish: Entonces me llevó ... y midió
  alternatives_spanish:
  - Y me llevó ... y midió
  - Luego me llevó ... y midió
  lexicon: HALOT
  rationale: La secuencia verbal narrativa se vierte de forma fluida en español con 'Entonces', preservando el avance de la visión sin añadir contenido.
translation_notes:
  revision_awareness: La traducción inglesa auditada no presenta revisiones aplicadas y mantiene alta concordancia; esta versión española sigue ese estado estable, conservando el paralelismo, las medidas y las referencias espaciales sin ampliar el texto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto hebreo lo exige explícitamente; este versículo no lo contiene.
  - Se usa 'codos' para אַמּוֹת, siguiendo la unidad de medida arquitectónica estándar en español bíblico.
  - Se evita 'SEÑOR' y 'Cristo' porque no aparecen en el hebreo de este versículo.
  - Se conserva el orden narrativo simple con 'Entonces' para reflejar la secuencia verbal del hebreo y del audit trail inglés.
