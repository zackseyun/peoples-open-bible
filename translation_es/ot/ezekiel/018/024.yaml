review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del hebreo: contraste con el versículo previo, alejamiento del justo de su justicia, comisión de injusticia, referencia a las abominaciones del malvado, pregunta retórica de vida, no recuerdo de las obras justas previas, y muerte en su traición e pecado. Sin embargo, hay un problema importante de naturalidad/fidelidad en la reproducción del par cognado בְּמַעֲלוֹ אֲשֶׁר מָעַל: ''ha actuado con traición'' suena forzado y menos idiomático que una formulación española que conserve mejor la idea de infidelidad/deslealtad pactal. También conviene pulir ''hace injusticia'' a ''comete injusticia'' para mejor español sin pérdida semántica.'
  spanish_quality_summary: 'El texto es claro y mayormente legible, con buen tono bíblico moderno. ''El justo'', ''abominaciones'', ''Ninguna de sus obras justas será recordada'' y ''en ellos morirá'' funcionan bien. Los puntos débiles son dos giros poco naturales: ''hace injusticia'' y especialmente ''ha actuado con traición''. Este último calca demasiado el inglés y el hebreo de manera poco elegante para español eclesial general.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Justicia', 'pecado' y 'abominaciones' están bien alineados. Para מעל, una mejor decisión en español es 'infidelidad' / 'ha sido infiel' o 'deslealtad' / 'ha obrado deslealmente', porque preserva mejor la ruptura de fidelidad indicada en la nota léxica y evita un calco torpe con 'traición'.
  issues:
  - severity: medium
    issue: '''hace injusticia'' es gramatical pero poco idiomático en español bíblico actual'
    rationale: El hebreo עשה + עול puede representarse en español con mayor naturalidad como 'comete injusticia', manteniendo el peso moral y la acción activa.
  - severity: high
    issue: '''En la traición con que ha actuado con traición'' es una formulación poco natural y estilísticamente deficiente'
    rationale: Aunque intenta reflejar el par cognado de מעל, en español suena torpe y no comunica bien el matiz de infidelidad o deslealtad. 'En la infidelidad con que ha sido infiel' preserva mejor la ruptura de fidelidad documentada por el POB y es más comprensible.
  revised_spanish_text: Pero cuando el justo se aparta de su justicia y comete injusticia[a], haciendo todas las abominaciones que hace el malvado, ¿vivirá? Ninguna de sus obras justas será recordada. En la infidelidad[b] con que ha sido infiel, y en el pecado que ha cometido, en ellos morirá[c].
  revised_footnotes:
  - marker: a
    text: O ‘todas las cosas detestables’.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse como ‘deslealtad’ o ‘traición’; el hebreo subraya una ruptura de fidelidad mediante un par sustantivo-verbo relacionado.
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: ‘en ellos morirá’, refiriéndose a la infidelidad y al pecado mencionados inmediatamente antes.'
    reason: lexical_alternative
  revision_rationale: 'Se hicieron dos ajustes menores pero necesarios: ''hace injusticia'' se cambió a ''comete injusticia'' por naturalidad idiomática, y ''traición ... ha actuado con traición'' se reformuló como ''infidelidad ... ha sido infiel'' para reflejar mejor el hebreo מעל con un español claro, digno y fiel a la nota léxica del POB. Se mantuvieron la estructura judicial, la pregunta retórica y el literal ''en ellos morirá''.'
