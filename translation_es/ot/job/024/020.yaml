    text: 'O: «ya no será recordado». El hebreo expresa cese de recuerdo.'
    reason: alternative_reading
  - marker: c
    text: 'O: «el injusto» o «el malvado». El hebreo usa un sustantivo abstracto que puede funcionar por metonimia para la persona.'
    reason: alternative_reading
  revision_rationale: La revisión corrige el punto principal de fidelidad semántica en מְתָקוֹ/רִמָּה, alineando el español con la decisión auditada del POB de hacer explícita la imagen de alimento. También reordena las notas para que reflejen las alternativas realmente documentadas y pule la primera cláusula para un español más natural sin perder la imagen literal.
