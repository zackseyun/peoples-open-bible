translation:
  language: es
  text: Entonces el rey de Egipto dijo a las parteras[a] hebreas, una de las cuales se llamaba Sifrá y la otra Puá,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a las parteras de las hebreas» o «a las parteras de las mujeres hebreas». La frase hebrea puede significar que las parteras eran hebreas o que atendían a las mujeres hebreas.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... habló
  alternatives_spanish:
  - Y ... dijo
  - Entonces ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; en español, "Entonces" conserva la secuencia. "Habló" transmite el acto de dirigirse a alguien con tono más natural que un simple "dijo", sin alterar el contenido.
- source_word: מֶלֶךְ מִצְרַיִם
  english_pob_choice: the king of Egypt
  chosen_spanish: el rey de Egipto
  alternatives_spanish:
  - el rey egipcio
  - el rey de los egipcios
  lexicon: HALOT
  rationale: La construcción genitiva se vierte de manera directa y transparente. No se introduce "Faraón" porque el hebreo aquí no lo usa.
- source_word: לַמְיַלְּדֹת
  english_pob_choice: to the ... midwives
  chosen_spanish: a las parteras
  alternatives_spanish:
  - a las comadronas
  - a las mujeres que asistían en el parto
  lexicon: HALOT
  rationale: '"Parteras" es el equivalente natural y preciso en español. Conserva la fuerza léxica del participio hebreo sin expandir innecesariamente el sentido.'
- source_word: הָעִבְרִיֹּת
  english_pob_choice: Hebrew
  chosen_spanish: hebreas
  alternatives_spanish:
  - de los hebreos
  - hebréas
  lexicon: HALOT
  rationale: 'La frase hebrea puede entenderse de dos maneras: parteras hebreas o parteras de las mujeres hebreas. En el texto principal se mantiene la lectura más directa y natural en español; la ambigüedad se documenta en la nota.'
- source_word: אֲשֶׁר שֵׁם הָאַחַת ... וְשֵׁם הַשֵּׁנִית ...
  english_pob_choice: one of whom was named Shiphrah and the other Puah
  chosen_spanish: una de las cuales se llamaba Sifrá y la otra Puá
  alternatives_spanish:
  - cuyo nombre era Sifrá, y el de la otra Puá
  - la una se llamaba Sifrá y la otra Puá
  lexicon: HALOT
  rationale: La cláusula relativa distributiva se vuelve con una formulación idiomática y fiel. "La otra" preserva la relación entre las dos mujeres y sigue la revisión inglesa más natural.
- source_word: שִׁפְרָה
  english_pob_choice: Shiphrah
  chosen_spanish: Sifrá
  alternatives_spanish:
  - Shifrá
  - Siphrah
  lexicon: HALOT
  rationale: Se adopta una transliteración española fluida y reconocible, manteniendo la forma del nombre propio sin anglicizarla.
- source_word: פּוּעָה
  english_pob_choice: Puah
  chosen_spanish: Puá
  alternatives_spanish:
  - Púa
  - Puah
  lexicon: HALOT
  rationale: Se transcribe el nombre propio con ortografía española que preserve la pronunciación aproximada y la transparencia del original.
theological_decisions:
- issue: Ambigüedad de a quién califican las voces 'hebreas' / 'de los hebreos'
  english_pob_reading: The Hebrew phrase may mean either that the midwives were Hebrews or that they served the Hebrew women.
  chosen_spanish_reading: las parteras hebreas
  alternative_spanish_readings:
  - las parteras de las hebreas
  - las parteras de las mujeres hebreas
  - las parteras de los hebreos
  rationale: El hebreo permite ambas lecturas, y la POB inglesa preserva esa tensión. El texto principal opta por la lectura atributiva más directa, pero la nota mantiene abierta la posibilidad de que se trate de parteras que atendían a mujeres hebreas.
  doctrine_reference: Exodus 1:15; nota textual/semántica
- issue: Uso de un nombre propio transliterado en vez de forma castellanizada antigua
  english_pob_reading: Shiphrah ... Puah
  chosen_spanish_reading: Sifrá ... Puá
  alternative_spanish_readings:
  - Shiphrah ... Puah
  - Sifrá ... Púa
  rationale: No hay carga doctrinal en los nombres, pero sí una decisión de legibilidad. Se prefieren formas españolas consistentes y pronunciables, sin perder la conexión con el hebreo ni con la tradición de transliteración.
  doctrine_reference: Exodus 1:15; convención onomástica
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'the second' por 'the other' para sonar más natural sin alterar el sentido. La redacción española sigue esa mejora con 'la otra', que conserva el paralelismo distributivo del hebreo. También se mantuvo la ambigüedad semántica del grupo 'hebreas' mediante nota, conforme al audit trail.
  spanish_consistency_notes:
  - Se usa 'parteras' para לַמְיַלְּדֹת por ser el equivalente natural en español.
  - Se evita 'Faraón' porque el hebreo dice literalmente 'rey de Egipto'.
  - 'Los nombres propios se transliteran de forma española consistente: Sifrá, Puá.'
  - Se conserva la puntuación final abierta con coma para reflejar que el versículo continúa en el siguiente segmento.
