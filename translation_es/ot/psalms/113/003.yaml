review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el merismo hebreo y mantiene correctamente «Yahvé» para יְהוָה. Sin embargo, «es digno de alabanza» desplaza levemente la fuerza de מְהֻלָּל desde una pasiva participial con matiz de ‘ser alabado / ser objeto de alabanza’ hacia una cualidad abstracta (‘digno’). Además, la nota [a] no preserva fielmente la alternativa inglesa «from the east to the west», pues dice «desde el oriente hasta su ocaso», mezclando opción geográfica con la imagen temporal.
  spanish_quality_summary: El español es claro y digno. «Desde la salida del sol hasta su ocaso» suena natural, aunque «su puesta» conecta mejor con la nota literal y con el paralelismo hebreo. La revisión propuesta mejora la precisión semántica sin perder fluidez litúrgica.
  glossary_alignment: Alineación fuerte con la terminología del proyecto en «Yahvé». «El nombre» preserva bien שֵׁם. Se recomienda ajustar מְהֻלָּל a «ha de ser alabado» para acercarse mejor a la decisión auditada en inglés («is to be praised») y a la tensión descriptivo-exhortativa documentada.
  issues:
  - severity: medium
    issue: «es digno de alabanza» para מְהֻלָּל
    rationale: Aunque es aceptable, reformula el participio pasivo como atributo de dignidad y atenúa la idea de que el nombre de Yahvé recibe/debe recibir alabanza. «Ha de ser alabado» o «debe ser alabado» preserva mejor la fuerza elegida en el POB inglés.
  - severity: medium
    issue: La nota [a] no corresponde a la alternativa documentada
    rationale: La nota inglesa ofrece «From the east to the west». El borrador español pone «desde el oriente hasta su ocaso», que no es equivalente; combina una referencia espacial con otra temporal posesiva. Debe decir «desde el oriente hasta el occidente» o similar.
  - severity: low
    issue: Desajuste entre «ocaso» en el texto y «puesta» en la literalidad de la nota
    rationale: No es error grave, pero usar «puesta» en el texto simplifica la relación con la nota y refleja más directamente מְבוֹאוֹ como ‘su ponerse / su entrada’.
  revised_spanish_text: Desde la salida del sol hasta su puesta[a], el nombre de Yahvé[b] ha de ser alabado.
  revised_footnotes:
