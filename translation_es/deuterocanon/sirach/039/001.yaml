translation:
  language: es
  text: Pero el que se entrega a ello y medita en la ley del Altísimo buscará con empeño la sabiduría de todos los antiguos[a], y se ocupará de las profecías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que se dedica a ello»; el griego habla literalmente de dar su alma o sí mismo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se dedicará a los escritos proféticos»; el griego literalmente dice «se ocupará de profecías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πλὴν
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  - No obstante
  lexicon: LSJ
  rationale: Marca contraste con el contexto previo y es natural en español. Conserva la fuerza adversativa sin volver el inicio artificioso.
- source_word: τοῦ ἐπιδιδόντος τὴν ψυχὴν αὐτοῦ
  english_pob_choice: the one who gives himself over to it
  chosen_spanish: el que se entrega a ello
  alternatives_spanish:
  - el que se dedica a ello
  - el que da su alma a ello
  - el que se consagra a ello
  lexicon: LSJ
  rationale: La expresión griega literalmente implica dar la propia ψυχή, es decir, la propia persona o ser. 'Se entrega a ello' preserva la intensidad de dedicación total sin sonar forzado en español.
- source_word: ψυχὴν
  english_pob_choice: himself
  chosen_spanish: se
  alternatives_spanish:
  - su alma
  - su vida
  - sí mismo
  lexicon: LSJ
  rationale: Aquí ψυχή funciona idiomáticamente como la persona entera. El reflejo pronominal en español evita imponer una antropología más específica de la que exige el texto.
- source_word: διανοουμένου
  english_pob_choice: meditates
  chosen_spanish: medita
  alternatives_spanish:
  - piensa profundamente
  - considera
  - reflexiona
  lexicon: LSJ
  rationale: El participio medio indica atención mental sostenida. 'Medita' comunica bien esa actividad en el marco de la literatura sapiencial.
- source_word: ἐν νόμῳ Ὑψίστου
  english_pob_choice: on the law of the Most High
  chosen_spanish: en la ley del Altísimo
  alternatives_spanish:
  - sobre la ley del Altísimo
  - en la ley del Dios Altísimo
  lexicon: LSJ
  rationale: '''Ley'' es la correspondencia directa de νόμος y ''Altísimo'' refleja Ὑψίστου como título divino. ''En'' conserva la estructura del griego y funciona con ''medita'' en español bíblico actual.'
- source_word: σοφίαν πάντων ἀρχαίων
  english_pob_choice: the wisdom of all the ancients
  chosen_spanish: la sabiduría de todos los antiguos
  alternatives_spanish:
  - la sabiduría de todos los de antaño
  - la sabiduría de todos los ancianos
  lexicon: LSJ
  rationale: ἀρχαίων se refiere a personas de tiempos antiguos, no a una cualidad abstracta. 'Los antiguos' es la forma más directa y comprensible.
- source_word: ἐκζητήσει
  english_pob_choice: will seek out
  chosen_spanish: buscará
  alternatives_spanish:
  - buscará con empeño
  - indagará
  - buscará con afán
  lexicon: LSJ
  rationale: El verbo compuesto intensifica la búsqueda, pero en español 'buscará' ya puede expresar esa orientación cuando el contexto es claro. Se conserva el registro sobrio del texto sapiencial.
- source_word: ἐν προφητείαις ἀσχοληθήσεται
  english_pob_choice: will occupy himself with prophecies
  chosen_spanish: se ocupará en las profecías
  alternatives_spanish:
  - se dedicará a las profecías
  - se ocupará de las profecías
  - estará dedicado a las profecías
  lexicon: LSJ
  rationale: ἀσχολέομαι significa ocuparse o mantenerse atento a algo. 'Se ocupará en' reproduce bien la acción continuada y mantiene la relación directa con 'profecías'.
theological_decisions:
- issue: Referencia del objeto implícito en 'se entrega a ello'
  english_pob_reading: The implied object is the pursuit of wisdom/scribal study from the surrounding context, rendered with 'to it.'
  chosen_spanish_reading: El objeto implícito se deja igualmente no explicitado; 'a ello' remite al ámbito de la búsqueda de sabiduría y estudio de la ley que el contexto inmediato ya ha establecido.
  alternative_spanish_readings:
  - el que se entrega
  - el que se entrega al estudio de la ley
  rationale: El griego no especifica el objeto dentro de la frase. En español, 'a ello' preserva la referencia contextual sin sobreexplicarla.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without paraphrasing beyond what the text warrants.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; por eso esta versión sigue de cerca el sentido auditado y conserva las dos alternativas lexicais documentadas.
  spanish_consistency_notes:
  - Se mantiene 'Altísimo' para Ὑψίστου en concordancia con el uso bíblico del título divino.
  - Se usa 'ley' para νόμος y 'profecías' para προφητείαις, sin sustituir por formulaciones eclesiásticas más interpretativas.
  - '''Se entrega'' conserva la intensidad de la dedicación total que el inglés POB resolvió con ''gives himself over''.'
