translation:
  language: es
  text: Y el toro para la ofrenda por el pecado y el macho cabrío para la ofrenda por el pecado[a], cuya sangre fue introducida en el santuario para hacer expiación, los sacará fuera del campamento, y quemarán[b] sus pieles[c], su carne y su estiércol[d] en el fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más idiomáticamente, 'los sacará fuera del campamento'. El hebreo expresa literalmente la idea de sacarlos hacia un lugar fuera del campamento.
    reason: lexical_alternative
  - marker: b
    text: El hebreo cambia de singular ('los sacará') a plural ('quemarán'), probablemente distinguiendo al oficiante de quienes lo ayudan.
    reason: cultural_note
  - marker: c
    text: O 'cueros' para 'pieles'.
    reason: lexical_alternative
  - marker: d
    text: O 'excrementos' para 'estiércol'.
    reason: lexical_alternative
lexical_decisions:
- source_word: פַּר הַחַטָּאת
  english_pob_choice: the bull for the sin offering
  chosen_spanish: el toro para la ofrenda por el pecado
  alternatives_spanish:
  - el toro de la ofrenda por el pecado
  - el toro de expiación
  lexicon: HALOT
  rationale: Conservo la categoría sacrificial con una construcción natural en español. 'Para la ofrenda por el pecado' refleja bien la relación funcional sin forzar un calco excesivo.
- source_word: שְׂעִיר הַחַטָּאת
  english_pob_choice: the goat for the sin offering
  chosen_spanish: el macho cabrío para la ofrenda por el pecado
  alternatives_spanish:
  - el macho cabrío de la ofrenda por el pecado
  - el macho cabrío de expiación
  lexicon: HALOT
  rationale: Mantengo el paralelismo con פַּר הַחַטָּאת y uso 'macho cabrío' para precisar el animal en un registro bíblico claro y natural.
- source_word: הוּבָא אֶת דָּמָם
  english_pob_choice: whose blood was brought in
  chosen_spanish: cuya sangre fue llevada
  alternatives_spanish:
  - cuya sangre fue traída
  - cuya sangre fue introducida
  lexicon: HALOT
  rationale: '''Fue llevada'' conserva el movimiento hacia el interior del ámbito sagrado y evita una perífrasis demasiado mecánica. La sangre es el elemento transportado; el español admite esta pasiva con naturalidad.'
- source_word: לְכַפֵּר
  english_pob_choice: to make atonement
  chosen_spanish: para hacer expiación
  alternatives_spanish:
  - para hacer expiación por
  - para expiar
  lexicon: HALOT
  rationale: '''Hacer expiación'' reproduce el valor cultual de כפר. En español, ''expiación'' comunica mejor el acto ritual que ''atonamiento'' y evita ambigüedad doctrinal innecesaria.'
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en el lugar santo
  - en lo sagrado
  lexicon: HALOT
  rationale: En este contexto cultual, 'santuario' es la forma más clara y precisa en español para el recinto sagrado donde ocurre la expiación.
- source_word: יוֹצִיא
  english_pob_choice: he shall bring out
  chosen_spanish: lo sacará fuera
  alternatives_spanish:
  - lo llevará fuera
  - lo hará salir
  lexicon: HALOT
  rationale: '''Lo sacará'' preserva el valor causativo y la dirección del verbo. Añadir ''fuera'' responde a la redundancia semítica sin perder la fuerza del original.'
- source_word: אֶל מִחוּץ לַמַּחֲנֶה
  english_pob_choice: outside the camp
  chosen_spanish: fuera del campamento
  alternatives_spanish:
  - a fuera del campamento
  - al exterior del campamento
  lexicon: HALOT
  rationale: Uso la forma idiomática y clara 'fuera del campamento'. Mantiene la referencia espacial sin el giro poco natural 'a fuera de'.
- source_word: וְשָׂרְפוּ בָאֵשׁ
  english_pob_choice: and they shall burn in the fire
  chosen_spanish: y quemarán en el fuego
  alternatives_spanish:
  - y los quemarán con fuego
  - y los quemarán en el fuego
  lexicon: HALOT
  rationale: Conservo el plural del verbo, como en el hebreo, y la expresión 'en el fuego' refleja la frase preposicional sin sobrerrellenar el objeto implícito.
- source_word: עֹרֹתָם
  english_pob_choice: their hides
  chosen_spanish: sus pieles
  alternatives_spanish:
  - sus cueros
  - sus pellejos
  lexicon: HALOT
  rationale: '''Pieles'' es una solución comprensible y sobria en español. En una nota dejo abierta la alternativa ''cueros/pellejos'' si se quisiera una precisión más técnica o más rústica.'
- source_word: בְּשָׂרָם
  english_pob_choice: their flesh
  chosen_spanish: su carne
  alternatives_spanish:
  - su cuerpo
  - su carne
  lexicon: HALOT
  rationale: '''Carne'' es el equivalente normal para el tejido animal sacrificial. Conserva el tono ritual sin suavizar la crudeza del texto.'
- source_word: פִּרְשָׁם
  english_pob_choice: their dung
  chosen_spanish: su estiércol
  alternatives_spanish:
  - sus excrementos
  - su desecho
  lexicon: HALOT
  rationale: '''Estiércol'' comunica con precisión el desecho animal y mantiene el carácter directo del hebreo. En español bíblico contemporáneo es claro sin volverse técnico en exceso.'
theological_decisions:
- issue: Traducción de חַטָּאת y su función cultual
  english_pob_reading: 'Use established but accessible cultic language: ''sin offering'' and ''make atonement.'''
  chosen_spanish_reading: ofrenda por el pecado / hacer expiación
  alternative_spanish_readings:
  - ofrenda de purificación
  - ofrenda expiatoria
  rationale: Mantengo el término sacrificial tradicional y transparente. 'Ofrenda por el pecado' conserva la lectura amplia de חַטָּאת en el marco del Día de la Expiación sin imponer una sola explicación interpretativa.
  doctrine_reference: Translation philosophy §§1, 6
- issue: La secuencia singular/plural en el verbo final
  english_pob_reading: 'Retain the shift: ''he shall bring out ... and they shall burn.'''
  chosen_spanish_reading: lo sacará ... y quemarán
  alternative_spanish_readings:
  - lo sacará ... y quemará
  - se sacará ... y se quemará
  rationale: Respeto el cambio de singular a plural del hebreo, que el audit trail inglés también conserva. Así se mantiene visible la participación de asistentes además del oficiante.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene la distinción entre el singular ''he shall bring out'' y el plural ''they shall burn'', y corrige una redacción previa más forzada para ''outside the camp''. La versión española sigue esa línea: evita un calco innecesario, conserva el plural final del hebreo y usa un español más natural sin perder precisión ritual.'
  spanish_consistency_notes:
  - Uso 'ofrenda por el pecado' para חַטָּאת, en consonancia con el valor cultual establecido en la serie.
  - Uso 'Yahvé' no aplica en este versículo; por tanto no hay decisión de nombre divino aquí.
  - Mantengo 'santuario' para בַּקֹּדֶשׁ, en paralelo con el inglés auditado y con el contexto del Día de la Expiación.
  - Conservo la imagen física y ritual de los residuos del sacrificio mediante 'pieles', 'carne' y 'estiércol', sin eufemizar el texto.
