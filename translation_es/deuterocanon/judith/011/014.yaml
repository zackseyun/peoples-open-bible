translation:
  language: es
  text: Y envió aviso a Jerusalén de que también los que habitaban allí habían hecho estas cosas, concediendo amnistía[a] del consejo de los ancianos a los que se habían unido a ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perdón» o «remisión» para ἄφεσις. El griego puede llevar fuerza jurídica/social o moral-religiosa; aquí, el contexto del consejo de ancianos favorece un sentido administrativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεστάλακεν
  english_pob_choice: sent word
  chosen_spanish: envió aviso
  alternatives_spanish:
  - envió noticia
  - mandó decir
  - envió mensaje
  lexicon: LSJ
  rationale: El perfecto de ἀποστέλλω aquí tiene fuerza narrativa con relevancia presente; en español, 'envió aviso' comunica bien el envío de una comunicación sin sonar mecánico. Conserva la idea de mensaje dirigido a Jerusalén.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - en Jerusalén
  lexicon: LSJ
  rationale: La preposición de dirección se expresa naturalmente con 'a' en español. 'A Jerusalén' mantiene el movimiento o destinación del aviso.
- source_word: κατοικοῦντες
  english_pob_choice: those living there
  chosen_spanish: los que habitaban allí
  alternatives_spanish:
  - los que vivían allí
  - los habitantes de allí
  - los que moraban allí
  lexicon: LSJ
  rationale: El participio designa residentes; 'los que habitaban allí' preserva el matiz participial con un registro digno y claro.
- source_word: ἐποίησαν ταῦτα
  english_pob_choice: had done these things
  chosen_spanish: habían hecho estas cosas
  alternatives_spanish:
  - habían hecho esto
  - hicieron estas cosas
  lexicon: LSJ
  rationale: El aoristo se vierte de manera natural en español con pluscuamperfecto en el marco narrativo del POB inglés. 'Estas cosas' conserva la deixis textual sin precisar más de lo que el griego dice.
- source_word: τοὺς μετοικίσαντας αὐτοῖς
  english_pob_choice: those who had joined them
  chosen_spanish: a los que se habían unido a ellos
  alternatives_spanish:
  - a los que se habían trasladado con ellos
  - a los que se habían establecido con ellos
  - a los inmigrados entre ellos
  lexicon: LSJ
  rationale: La forma verbal apunta a un cambio de residencia o incorporación a un grupo. 'Se habían unido a ellos' sigue la revisión inglesa y evita insinuar una categoría técnica de inmigración o asentamiento permanente que el contexto no exige.
- source_word: τὴν ἄφεσιν
  english_pob_choice: amnesty
  chosen_spanish: amnistía
  alternatives_spanish:
  - liberación
  - remisión
  - perdón
  lexicon: LSJ
  rationale: En este contexto cívico/administrativo, la revisión inglesa prefirió 'amnesty'. En español, 'amnistía' es el equivalente más natural y conserva el sentido de una medida pública de absolución o liberación; se deja abierta la tensión semántica de ἄφεσις entre liberación y perdón.
- source_word: παρὰ τῆς γερουσίας
  english_pob_choice: from the council of elders
  chosen_spanish: del consejo de los ancianos
  alternatives_spanish:
  - de la gerusía
  - del senado
  - de la asamblea de ancianos
  lexicon: LSJ
  rationale: γερουσία designa un cuerpo de ancianos o un senado. 'Consejo de los ancianos' comunica el sentido institucional y evita un helenismo innecesario en el texto principal.
theological_decisions:
- issue: Sentido de τὴν ἄφεσιν en un contexto cívico/administrativo
  english_pob_reading: amnesty
  chosen_spanish_reading: amnistía
  alternative_spanish_readings:
  - liberación
  - remisión
  - perdón
  rationale: La escena no formula explícitamente un acto cultual o divino, sino una concesión emitida por una autoridad colectiva. 'Amnistía' refleja mejor el trasfondo administrativo, sin cerrar la posibilidad semántica de 'perdón' o 'remisión', que siguen siendo alternativas legítimas del campo de ἄφεσις.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión léxica y teológica; no resolver artificialmente un término con alcance múltiple cuando el contexto favorece un sentido particular.'
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés POB: se adoptó ''amnesty'' como base semántica para ἄφεσις y se evitó la formulación de asentamiento permanente para μετοικίσαντας αὐτοῖς, prefiriendo una relación de incorporación más neutral (''se habían unido a ellos'').'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino; en este versículo no aparece.
  - '''Jerusalén'' conserva la forma usual en español.'
  - Se evitó 'SEÑOR' o un equivalente litúrgico porque el texto no contiene κύριος ni una cita del nombre divino.
  - El registro es bíblico pero contemporáneo, con sintaxis clara y no arcaizante.
