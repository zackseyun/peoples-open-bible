translation:
  language: es
  text: 'Creí[b], por eso[a] hablé: «Estoy muy afligido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque» o «pues». La partícula hebrea כִּי puede entenderse de más de una manera.
    reason: lexical_alternative
  - marker: b
    text: 'O «Creí aun cuando dije: “Estoy muy afligido”». La sintaxis hebrea es breve y permite otra lectura.'
    reason: alternative_reading
lexical_decisions:
- source_word: הֶאֱמַנְתִּי
  english_pob_choice: I believed
  chosen_spanish: Creí
  alternatives_spanish:
  - Confié
  - Tuve fe
  lexicon: HALOT
  rationale: El hiphil de אמן expresa creer/confiar. «Creí» es la opción más directa y natural en español, y conserva el paralelismo con la cita tradicional del versículo sin sobreinterpretarlo.
- source_word: כִּי
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - porque
  - pues
  - que
  lexicon: HALOT
  rationale: 'La partícula כִּי admite varios valores. Aquí, la relación más clara en español es consecutiva o explicativa entre la fe y la palabra: «por eso». Se preserva así la ambigüedad semántica sin cerrar el hebreo a un solo matiz.'
- source_word: אֲדַבֵּר
  english_pob_choice: I spoke
  chosen_spanish: hablé
  alternatives_spanish:
  - hablo
  - hablaré
  lexicon: HALOT
  rationale: Aunque la forma verbal es imperfecta, en poesía puede funcionar con sentido de acción pasada o de habla pronunciada. Dado el paralelismo del versículo y su recepción, «hablé» comunica con fluidez la acción verbal en español.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: yo / implícito en la cita
  alternatives_spanish:
  - yo
  lexicon: HALOT
  rationale: El pronombre independiente funciona para énfasis en hebreo. En español, su fuerza se expresa bien con la cláusula en primera persona dentro de la cita, sin necesidad de repetir «yo» fuera de lugar.
- source_word: עָנִיתִי
  english_pob_choice: I am greatly afflicted
  chosen_spanish: estoy muy afligido
  alternatives_spanish:
  - estaba muy afligido
  - estoy muy humillado
  - estoy muy abatido
  lexicon: HALOT
  rationale: De ענה en el sentido de estar afligido/humillado. «Afligido» conserva el matiz de sufrimiento pasivo mejor que opciones más interpretativas. El presente en español reproduce de modo natural el contenido directo citado.
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - grandemente
  - en gran manera
  - excesivamente
  lexicon: HALOT
  rationale: Adverbio de intensidad. «Muy» es la forma más idiomática en español dentro de la cita, sin perder el énfasis del hebreo.
theological_decisions:
- issue: Relación sintáctica entre creer y hablar
  english_pob_reading: 'The verse is rendered as belief leading to speech, with the latter clause presented as the content spoken: ''I believed, therefore I spoke: “I am greatly afflicted.”'''
  chosen_spanish_reading: 'El versículo se vierte como una relación consecutiva entre creer y hablar: «Creí, por eso hablé», y la segunda cláusula se entiende como el contenido pronunciado.'
  alternative_spanish_readings:
  - 'Creí, porque hablo: «Estoy muy afligido».'
  - 'Creí aun cuando dije: «Estoy muy afligido».'
  rationale: El hebreo es comprimido y admite más de una constricción. La versión elegida ofrece un español claro y mantiene la tensión interpretativa documentada por la POB inglesa sin forzar una resolución dogmática o estilística.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Se siguió el texto hebreo (הֶאֱמַנְתִּי כִּי אֲדַבֵּר אֲנִי עָנִיתִי מְאֹד) y el audit trail inglés. No hubo revisiones aplicadas en la fuente inglesa, así que la redacción española conserva la lectura establecida y sus ambigüedades documentadas.
  spanish_consistency_notes:
  - Se mantuvo un registro formal, bíblico y publicable, evitando calcos innecesarios.
  - Se prefirió «afligido» para עָנִיתִי por su valor sufriente y su claridad en español.
  - Se usó «por eso» para כִּי con nota alternativa, preservando la ambigüedad semántica.
  - Se conservaron los corchetes de notas en los puntos donde la lectura alternativa afecta directamente el texto.
