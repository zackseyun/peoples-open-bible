translation:
  language: es
  text: 'Párate en la puerta de la casa de Yahvé, y proclama allí esta palabra, y di: “Oigan la palabra de Yahvé, todo Judá, los que entran por estas puertas para postrarse[a] ante Yahvé.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘para adorar a Yahvé’ o ‘para inclinarse ante Yahvé’. El verbo hebreo puede denotar el acto físico de postrarse o inclinarse, especialmente en un contexto de adoración.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֲמֹד
  english_pob_choice: Stand
  chosen_spanish: Ponte
  alternatives_spanish:
  - Párate
  - Mantente de pie
  - Toma tu puesto
  lexicon: HALOT
  rationale: El imperativo de עמד pide situarse/ponerse en un lugar determinado. En español, 'Ponte' transmite mejor la idea de colocarse allí que un calco como 'stand'. 'Toma tu puesto' sería posible, pero más interpretativo.
- source_word: בְּשַׁעַר
  english_pob_choice: in the gate
  chosen_spanish: en la puerta
  alternatives_spanish:
  - en la entrada
  - junto a la puerta
  - en el portón
  lexicon: HALOT
  rationale: שער puede referirse al acceso o portón. 'Puerta' es natural en español bíblico actual y comunica el lugar de acceso del templo sin forzar el calco 'en la puerta' o 'en el portón' de manera innecesariamente técnica.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa de Yahvé
  lexicon: HALOT
  rationale: Se preserva la expresión literal 'casa de Yahvé' para mantener transparencia con el hebreo בֵּית יְהוָה. 'Templo' aclara el contexto, pero sustituye la imagen base de 'casa'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se rinde como 'Yahvé', conforme al criterio del proyecto, evitando la sustitución por un título y manteniendo el nombre propio divino.
- source_word: וְקָרָאתָ
  english_pob_choice: proclaim
  chosen_spanish: proclama
  alternatives_spanish:
  - anuncia
  - clama
  - declara
  lexicon: HALOT
  rationale: En este contexto profético, קרא es una proclamación pública. 'Proclama' conserva ese valor formal y público mejor que 'anuncia' o 'declara'.
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this word
  chosen_spanish: esta palabra
  alternatives_spanish:
  - este mensaje
  - esta orden
  - este dicho
  lexicon: HALOT
  rationale: דבר se mantiene en singular como 'palabra', siguiendo el uso profético de una palabra comunicada por Dios. 'Mensaje' sería válido, pero menos fiel a la formulación hebrea.
- source_word: שִׁמְעוּ דְבַר יְהוָה
  english_pob_choice: Hear the word of Yahweh
  chosen_spanish: Oigan la palabra de Yahvé
  alternatives_spanish:
  - Escuchen la palabra de Yahvé
  - Oíd la palabra de Yahvé
  lexicon: HALOT
  rationale: שמע conserva el sentido de oír/escuchar como acto de atención obediente. 'Oigan' suena natural en español contemporáneo y mantiene el plural exhortativo del hebreo.
- source_word: כָּל יְהוּדָה
  english_pob_choice: all Judah
  chosen_spanish: todo Judá
  alternatives_spanish:
  - toda Judá
  - todo el pueblo de Judá
  lexicon: HALOT
  rationale: Se conserva el colectivo hebreo como 'todo Judá'. 'Todo el pueblo de Judá' explicita, pero añade una glosa no presente en el texto.
- source_word: הַבָּאִים
  english_pob_choice: who enter
  chosen_spanish: los que entran
  alternatives_spanish:
  - que entran
  - los que van entrando
  - quienes entran
  lexicon: HALOT
  rationale: El participio se expresa con una relativa natural en español. 'Los que entran' conserva el sentido de quienes se acercan por las puertas del templo.
- source_word: בַּשְּׁעָרִים הָאֵלֶּה
  english_pob_choice: through these gates
  chosen_spanish: por estas puertas
  alternatives_spanish:
  - a través de estas puertas
  - por estos portones
  - por estas entradas
  lexicon: HALOT
  rationale: ב en este contexto indica el medio o el acceso por el que entran. 'Por estas puertas' es la opción más idiomática en español y mantiene el plural del hebreo.
- source_word: לְהִשְׁתַּחֲוֺת
  english_pob_choice: to worship
  chosen_spanish: para postrarse
  alternatives_spanish:
  - para adorar
  - para inclinarse
  - para postrarse en adoración
  lexicon: HALOT
  rationale: El verbo implica literalmente inclinarse o postrarse. Se mantiene esa fuerza física con 'postrarse', evitando apagar la tensión lexical detrás del acto de adoración.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: ante Yahvé
  alternatives_spanish:
  - a Yahvé
  - para Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Aunque el hebreo es 'a Yahvé', en español el acto de postrarse se expresa con naturalidad como 'ante Yahvé'. Esto conserva la dirección reverencial del gesto sin perder la referencia al destinatario.
theological_decisions:
- issue: Nombre divino יְהוָה en el texto español
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se sigue la norma del proyecto de transparentar el Tetragrámaton con un nombre propio. 'Yahvé' conserva la referencia personal del pacto y evita el reemplazo por un título litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Sentido de לְהִשְׁתַּחֲוֺת
  english_pob_reading: to worship / to bow down
  chosen_spanish_reading: para postrarse
  alternative_spanish_readings:
  - para adorar
  - para inclinarse
  - para postrarse en adoración
  rationale: La POB inglesa preserva la tensión entre 'worship' y la nota que recuerda el gesto físico de inclinarse. 'Postrarse' conserva el componente corporal sin excluir la adoración reverente.
  doctrine_reference: POB lexical note on הִשְׁתַּחֲוָה as physical bowing in worship
- issue: 'Colectivo dirigido: כָּל יְהוּדָה'
  english_pob_reading: all Judah
  chosen_spanish_reading: todo Judá
  alternative_spanish_readings:
  - toda Judá
  - todo el pueblo de Judá
  rationale: Se mantiene el destinatario colectivo como entidad nacional/covenantal, sin convertirlo innecesariamente en una paráfrasis explicativa.
  doctrine_reference: Hebrew collective address
translation_notes:
  revision_awareness: La versión inglesa más reciente refinó la frase 'who enter' para hacerla más fluida sin alterar el sentido. La redacción española refleja ese mismo ajuste con 'los que entran', manteniendo la relación participial natural y el tono formal del encargo profético.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' conforme al criterio del proyecto para יְהוָה.
  - '''Casa de Yahvé'' conserva la imagen literal del hebreo frente a ''templo''.'
  - '''Postrarse'' preserva la tensión entre adoración y gesto físico que la POB inglesa anotó.'
  - La puntuación con comillas angulares no se usa; se emplean comillas españolas estándar para el discurso directo.
  - '''Todo Judá'' conserva el colectivo hebreo sin expansión interpretativa.'
