base_translation:
  language: en
  yaml_path: translation/deuterocanon/psalms_of_solomon/002/019.yaml
  text: You made their memorial perish from the earth[a]. God is a righteous judge[d][c][b], and he will not show partiality.
  footnotes:
  - marker: a
    text: Greek literally uses a verb meaning 'made known' or 'made manifest'; the wording is unusual here, and the translation reflects the likely sense in context.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the land' instead of 'from the earth.'
    reason: lexical_alternative
  - marker: c
    text: Literally 'will not admire a face'; this is a Greek idiom for showing no partiality.
    reason: lexical_alternative
  - marker: d
    text: Or 'You made their memory disappear'.
    reason: previous_rendering
