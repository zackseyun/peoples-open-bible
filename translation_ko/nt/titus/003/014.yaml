id: TIT.3.14
reference: Titus 3:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: μανθανέτωσαν δὲ καὶ οἱ ἡμέτεροι καλῶν ἔργων προΐστασθαι εἰς τὰς ἀναγκαίας χρείας, ἵνα μὴ ὦσιν ἄκαρποι.
base_translation:
  language: en
  yaml_path: translation/nt/titus/003/014.yaml
  text: And let our people also learn to engage in good works for necessary needs[c][b][a], so that they may not be unfruitful.
  footnotes:
  - marker: a
    text: Or 'our own' or 'our own people.'
    reason: lexical_alternative
  - marker: b
    text: Or 'learn to engage in good works' or 'learn to take the lead in good works.'
    reason: lexical_alternative
  - marker: c
    text: Or 'for urgent needs.'
    reason: lexical_alternative
translation:
  language: ko
  text: 우리에게 속한 자들도[a] 절실한 필요를 위하여[c] 선한 일에 힘쓰는 법을 배우게[b] 하십시오. 그리하여 열매 없는 자가 되지 않게 하려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「우리 자신의 사람들」, 「우리에게 속한 자들」.
    reason: lexical_alternative
  - marker: b
    text: 또는 「선한 일에 전념하는 법을 배우게」, 「선한 일에 앞장서는 법을 배우게」.
    reason: lexical_alternative
  - marker: c
    text: 또는 「긴급한 필요를 위하여」.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἡμέτεροι
  english_pob_choice: our people
  chosen_korean: 우리에게 속한 자들도
  alternatives_korean:
  - 우리 사람들도
  - 우리 자신의 사람들도
  lexicon: BDAG
  rationale: ἡμέτερος는 「우리의·우리에게 속한」 소유. 본문에서는 사도와 함께한 신앙 공동체 구성원을 가리킨다. 「우리에게 속한 자들」이 그 친밀성과 공동체성을 살린다.
- source_word: μανθανέτωσαν
  english_pob_choice: let ... learn
  chosen_korean: ~ 법을 배우게 하십시오
  alternatives_korean:
  - 배우도록 하라
  - 익히도록 하라
  lexicon: BDAG
  rationale: μανθάνω의 3인칭 명령. 「배우게 하다」가 자연스럽다.
- source_word: καλῶν ἔργων προΐστασθαι
  english_pob_choice: engage in good works
  chosen_korean: 선한 일에 힘쓰는
  alternatives_korean:
  - 선한 일에 전념하는
  - 선한 일에 앞장서는
  lexicon: BDAG
  rationale: 3:8과 일관되게 προΐστημι를 「힘쓰다」로 옮긴다. 「앞장서다」 어감은 각주.
- source_word: εἰς τὰς ἀναγκαίας χρείας
  english_pob_choice: for necessary needs
  chosen_korean: 절실한 필요를 위하여
  alternatives_korean:
  - 긴급한 필요를 위하여
  - 부득이한 필요를 위하여
  lexicon: BDAG
  rationale: ἀναγκαῖος는 「필수적·긴급한」. 「절실한」이 그 무게를 잘 살린다.
- source_word: ἄκαρποι
  english_pob_choice: unfruitful
  chosen_korean: 열매 없는 자
  alternatives_korean:
  - 열매를 맺지 못하는 자
  lexicon: BDAG
  rationale: ἄκαρπος의 표준 한국어 등가어 「열매 없는」.
