revisions:
- from: Así que la ira de Yahvé se encendió[a] contra Israel, y los vendió[b] en manos de los filisteos y en manos de los hijos de Amón[c].
  to: Así que la ira de Yahvé se encendió[a] contra Israel, y los vendió[b] en manos de los filisteos y en manos de los amonitas[c].
  rationale: 'La revisión mínima corrige el principal desajuste entre fuente, rastro inglés y español natural: se usa «los amonitas» en el texto principal como etnónimo idiomático, y se traslada «los hijos de Amón» a la nota literal. Se conserva «Yahvé», la metáfora de la ira encendida y «los vendió», que son decisiones importantes del proyecto.'
