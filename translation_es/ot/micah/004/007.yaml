  glossary_alignment: 'Buena alineación general con la terminología POB: ‘Yahvé’, ‘remanente’, ‘reinará’, ‘Sion’. No hay conflictos con glosario mayor. Se recomienda ajustar solo הַנַּהֲלָאָה de ‘expulsada’ a ‘desterrada’ para seguir mejor la justificación léxica y teológica del contexto de restauración tras exilio.'
