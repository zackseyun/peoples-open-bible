translation:
  language: es
  text: Porque la rebelión es como el pecado de la adivinación[a], y la obstinación es como la maldad y los ídolos domésticos[b]. Porque has rechazado la palabra de Yahvé, él también te ha rechazado como rey[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el pecado de la hechicería». El hebreo קֶסֶם se refiere de manera más amplia a la adivinación o a buscar conocimiento oculto por medios prohibidos.
    reason: lexical_alternative
  - marker: b
    text: Hebreo תְּרָפִים (terafines), objetos o imágenes de culto doméstico.
    reason: lexical_alternative
  - marker: c
    text: O «él también te ha rechazado de ser rey».
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación que sigue a la reprensión de Samuel. En español, «Porque» reproduce bien el valor causal/explanatorio y deja natural la primera cláusula proverbiale.
- source_word: חַטַּאת קֶסֶם
  english_pob_choice: the sin of divination
  chosen_spanish: el pecado de la adivinación
  alternatives_spanish:
  - el pecado de la hechicería
  - la adivinación como pecado
  lexicon: HALOT
  rationale: «Adivinación» refleja mejor קֶסֶם que «hechicería» y evita un desplazamiento semántico. Se mantiene la estructura genitiva para conservar la comparación proverbial.
- source_word: מֶרִי
  english_pob_choice: rebellion
  chosen_spanish: rebelión
  alternatives_spanish:
  - rebeldía
  - insubordinación
  lexicon: HALOT
  rationale: «Rebelión» conserva el peso jurídico-moral del término y suena natural en español bíblico contemporáneo.
- source_word: וְאָוֶן
  english_pob_choice: wickedness
  chosen_spanish: la maldad
  alternatives_spanish:
  - la iniquidad
  - la perversidad
  lexicon: HALOT
  rationale: En este paralelismo, אָוֶן apunta a maldad/iniquidad moral. «Maldad» es claro y no fuerza un tecnicismo más oscuro para el lector hispano.
- source_word: וּתְרָפִים
  english_pob_choice: household idols
  chosen_spanish: los terafines
  alternatives_spanish:
  - los ídolos domésticos
  - los terafim
  lexicon: HALOT
  rationale: Se conserva el término técnico «terafines» para no perder la referencia cultual específica del hebreo. La elección evita paraphrasear más allá de lo que el texto permite.
- source_word: הַפְצַר
  english_pob_choice: stubbornness
  chosen_spanish: la obstinación
  alternatives_spanish:
  - la terquedad
  - la insistencia arrogante
  lexicon: HALOT
  rationale: El valor de presión insistente/obstinada se expresa con «obstinación». En español comunica la dureza de voluntad que Samuel denuncia.
- source_word: יַעַן
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Marca la causa explícita de la sentencia. Repetir «Porque» mantiene la cadencia causal del hebreo y del inglés auditado.
- source_word: מָאַסְתָּ אֶת דְּבַר יְהוָה
  english_pob_choice: you have rejected the word of Yahweh
  chosen_spanish: has rechazado la palabra de Yahvé
  alternatives_spanish:
  - has desechado la palabra de Yahvé
  - has despreciado la palabra de Yahvé
  lexicon: HALOT
  rationale: «Rechazado» conserva la fuerza del verbo מָאַס y la simetría con la segunda mitad del verso. «Palabra de Yahvé» sigue el estándar del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, manteniendo transparencia frente al original hebreo.
- source_word: וַיִּמְאָסְךָ מִמֶּלֶךְ
  english_pob_choice: he has also rejected you from being king
  chosen_spanish: él también te ha rechazado para que no seas rey
  alternatives_spanish:
  - él también te ha rechazado como rey
  - él también te ha rechazado de ser rey
  lexicon: HALOT
  rationale: La construcción hebrea expresa expulsión o remoción del estatus real. «Para que no seas rey» comunica esa exclusión de manera natural en español, sin perder la fuerza del rechazo.
theological_decisions:
- issue: Paralelismo comparativo entre las dos cláusulas proverbiales
  english_pob_reading: rebellion is compared to divination, and stubbornness is compared to wickedness and household idols
  chosen_spanish_reading: la rebelión es como el pecado de la adivinación, y la obstinación es como la maldad y los terafines
  alternative_spanish_readings:
  - la rebelión es el pecado de la adivinación, y la obstinación es la maldad y los terafines
  - la rebeldía equivale a adivinación, y la obstinación a maldad e ídolos
  rationale: El hebreo usa una comparación proverbial con elipsis verbal. Repetir «es como» en ambas mitades preserva la equivalencia retórica sin volver el español áspero o ambiguo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense and rhetorical force without unnecessary paraphrase.'
- issue: Tratamiento de תְּרָפִים
  english_pob_reading: household idols
  chosen_spanish_reading: los terafines
  alternative_spanish_readings:
  - los ídolos domésticos
  - los ídolos del hogar
  rationale: La preservación del término técnico evita resolver de antemano una referencia cultual que el hebreo nombra de forma específica. Se documenta la equivalencia para el lector, pero el texto principal mantiene la transparencia al original.
  doctrine_reference: Principio POB de conservar términos técnicos cuando el original tiene un referente cultural específico.
- issue: Valor causal de la sentencia final
  english_pob_reading: he has also rejected you from being king
  chosen_spanish_reading: él también te ha rechazado para que no seas rey
  alternative_spanish_readings:
  - él también te ha rechazado como rey
  - él también te ha rechazado del reino
  rationale: El מן con מֶלֶךְ indica remoción del estado de rey. «Para que no seas rey» expresa la exclusión de manera idiomática en español y conserva el acto judicial de despojo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source force and function.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo masorético y el audit trail en inglés. No se detectaron revisiones previas aplicables; se conserva la comparación proverbial, la causalidad doble ('Porque... Porque...') y la remoción del estatus real con una formulación idiomática en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto para יְהוָה.
  - Se preserva la comparación con «es como» para reflejar la estructura proverbial del hebreo.
  - Se mantiene «terafines» como término técnico, con nota explicativa para lectores que prefieran el sentido de 'ídolos domésticos'.
  - «Rechazado» se repite para preservar la simetría con מָאַס en ambos miembros del verso.
  - El cierre «para que no seas rey» comunica la remoción de la dignidad real sin añadir inferencias doctrinales ajenas al texto.
