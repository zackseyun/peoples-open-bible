translation:
  language: es
  text: Béseme con los besos de su boca, porque tus caricias[a] son mejores que el vino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu amor»; el hebreo דֹּדֶיךָ está en plural y puede referirse de manera más concreta a expresiones de amor o caricias.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִשָּׁקֵנִי
  english_pob_choice: Let him kiss me
  chosen_spanish: Béseme
  alternatives_spanish:
  - Que me bese
  - Permita que me bese
  lexicon: HALOT
  rationale: El imperfecto qal con sufijo en este contexto expresa deseo o ruego poético. En español, el imperativo de tercera persona con valor desiderativo («Béseme») reproduce bien esa fuerza volitiva sin volverlo una mera afirmación futura.
- source_word: מִנְּשִׁיקוֹת
  english_pob_choice: with the kisses of
  chosen_spanish: con los besos de
  alternatives_spanish:
  - de los besos de
  - con los ósculos de
  lexicon: HALOT
  rationale: La imagen concreta de נשׁק se conserva con «besos». Aunque מִן puede sugerir «de/desde», el giro poético funciona de manera instrumental en español como «con los besos de», manteniendo naturalidad y la imaginería física del hebreo.
- source_word: פִּיהוּ
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su boca
  - sus labios
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su boca». «Boca» preserva la concreción corporal del original y evita suavizar el texto con una paráfrasis más interpretativa como «labios».
- source_word: דֹּדֶיךָ
  english_pob_choice: your caresses
  chosen_spanish: tus caricias
  alternatives_spanish:
  - tu amor
  - tus abrazos
  - tus caricias
  lexicon: HALOT
  rationale: La decisión inglesa reciente de pasar de «love» a «caresses» refleja el plural concreto de דֹּדֶיךָ. En español, «caricias» comunica mejor ese sentido sensorial y plural que «amor», sin perder la carga afectiva.
- source_word: מִיָּיִן
  english_pob_choice: than wine
  chosen_spanish: que el vino
  alternatives_spanish:
  - más que el vino
  - que el vino
  lexicon: HALOT
  rationale: El hebreo comparativo con מן se expresa de forma más natural en español con «que». Se conserva la comparación explícita con el vino sin sobrecargarla con una estructura más literal y menos idiomática.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que opta por una traducción más concreta de דֹּדֶיךָ como «caresses». En español se ha reflejado esa decisión con «caricias», manteniendo además la estructura poética y la comparación con el vino.
  spanish_consistency_notes:
  - Se preserva el paralelismo poético del verso con una primera cláusula desiderativa y una segunda cláusula comparativa.
  - Se evitó «SEÑOR» y cualquier otra sustitución no pertinente, ya que el versículo no contiene el nombre divino.
  - Se mantuvo el registro sensual y concreto del hebreo sin añadir interpretaciones devocionales ajenas al texto.
