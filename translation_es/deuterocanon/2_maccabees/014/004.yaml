translation:
  language: es
  text: vino al rey Demetrio en el año ciento cincuenta y uno[a], llevándole una corona de oro y una rama de palma, y además de estas, las ofrendas habituales del follaje del templo[b]; y aquel día guardó silencio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el año ciento cincuenta y primero». El griego usa una fórmula cronológica que puede expresarse con cardinal o con ordinal en español.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las cosas acostumbradas, a saber, follaje del templo». El griego es comprimido y algo elíptico; por eso es posible entender que se trata del follaje del templo como aquello que se presentaba habitualmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: he came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - acudió
  lexicon: LSJ
  rationale: En este contexto narrativo, ἦλθεν expresa el movimiento hacia el rey. En español, «vino» conserva la dirección hacia la figura destinataria sin sonar forzado.
- source_word: πρὸς τὸν βασιλέα Δημήτριον
  english_pob_choice: to King Demetrius
  chosen_spanish: al rey Demetrio
  alternatives_spanish:
  - ante el rey Demetrio
  - hacia el rey Demetrio
  lexicon: LSJ
  rationale: πρός con acusativo indica acercamiento o movimiento hacia una persona. «Al rey Demetrio» es natural en español y mantiene la relación direccional.
- source_word: ὡς πρώτῳ καὶ ἑκατοστῷ καὶ πεντηκοστῷ ἔτει
  english_pob_choice: in the one hundred fifty-first year
  chosen_spanish: en el año ciento cincuenta y uno
  alternatives_spanish:
  - en el año 151
  - en el año ciento cincuenta y primero
  lexicon: LSJ
  rationale: La expresión es una fórmula cronológica. En español, el cardinal «ciento cincuenta y uno» funciona con claridad como fecha de reinado/año y evita una forma ordinal menos natural.
- source_word: προσάγων αὐτῷ
  english_pob_choice: bringing him
  chosen_spanish: llevándole
  alternatives_spanish:
  - presentándole
  - ofreciéndole
  lexicon: LSJ
  rationale: El participio describe la acción concomitante de acercarse con el presente. «Llevándole» conserva la idea de traer algo para él y suena más natural que una paráfrasis técnica.
- source_word: στέφανον χρυσοῦν
  english_pob_choice: a gold crown
  chosen_spanish: una corona de oro
  alternatives_spanish:
  - una corona dorada
  - un corona de oro
  lexicon: LSJ
  rationale: στέφανος puede ser corona o guirnalda. Aquí, en contexto de tributo/regalo cortesano, «corona de oro» refleja bien el objeto y mantiene el valor material.
- source_word: φοίvικα
  english_pob_choice: a palm branch
  chosen_spanish: una palma
  alternatives_spanish:
  - una rama de palma
  - una hoja de palma
  lexicon: LSJ
  rationale: φοῖνιξ aquí designa un símbolo o rama de palma ceremonial. «Palma» es conciso y comprensible en español; la nota preserva la alternativa más explícita.
- source_word: τοῖς νομιζομένοις
  english_pob_choice: the customary offerings
  chosen_spanish: las ofrendas habituales
  alternatives_spanish:
  - las cosas acostumbradas
  - lo que se acostumbra presentar
  lexicon: LSJ
  rationale: El participio sustantivado apunta a lo que se considera usual o establecido. «Ofrendas habituales» comunica la idea de práctica reconocida sin añadir elementos no presentes.
- source_word: θαλλῶν τοῦ ἱεροῦ
  english_pob_choice: of the temple foliage
  chosen_spanish: del follaje del templo
  alternatives_spanish:
  - de los brotes del templo
  - de las ramas del templo
  lexicon: LSJ
  rationale: θαλλός alude a brotes o fronda fresca. «Follaje» conserva el sentido vegetal colectivo, y el genitivo se refleja con precisión en «del templo».
- source_word: ἡσυχίαν ἔσχεν
  english_pob_choice: he kept quiet
  chosen_spanish: guardó silencio
  alternatives_spanish:
  - permaneció callado
  - se mantuvo tranquilo
  lexicon: LSJ
  rationale: La expresión idiomática indica que no promovió acción o acusación ese día. «Guardó silencio» es una equivalencia funcional clara en español, sin perder la fuerza de contención.
theological_decisions:
- issue: Cronología del reinado/año 151
  english_pob_reading: in the one hundred fifty-first year
  chosen_spanish_reading: en el año ciento cincuenta y uno
  alternative_spanish_readings:
  - en el año ciento cincuenta y primero
  - en el año 151
  rationale: No hay una cuestión doctrinal, sino de lectura histórica. Se mantiene la datación tal como la presenta el griego y el audit trail inglés, sin introducir incertidumbre adicional.
