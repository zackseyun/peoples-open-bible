review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: contingencia futura (''cuando establezcamos''), contexto político de ''reino'', referencia corporativa a ''tu nación'', y resultado de publicidad universal de la gloria. También preserva correctamente la red léxica δόξα/δοξάζω mediante ''honraremos ... con gran gloria ... vuestra gloria'', en línea con el audit trail. Sin embargo, la sintaxis española con ''te honraremos a ti, a tu nación y al santuario'' introduce una leve aspereza y posible ambigüedad de coordinación; conviene reordenarla para que el objeto directo compuesto quede más claro.'
  spanish_quality_summary: El español es mayormente natural y digno, pero mezcla trato de segunda persona singular ('te', 'tu') con posesivo/pronombre de segunda plural ('vuestra'), lo cual suena inconsistente en español bíblico neutral. Además, 'te honraremos a ti, a tu nación y al santuario' se lee menos fluido que una coordinación directa. Una leve revisión mejora claridad y uniformidad sin alterar el sentido.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. 'Santuario' para ἱερόν y 'gloria' para δόξα están bien justificadas. No aparecen términos sensibles como Yahvé/Mesías. La decisión entre 'honrar' y 'glorificar' está bien documentada; en español 'honraremos' es aceptable en este contexto diplomático.
  issues:
  - severity: medium
    issue: Inconsistencia pronominal entre 'te/tu' y 'vuestra'.
    rationale: El texto comienza tratando a Simón en singular ('te', 'tu') pero luego dice 'vuestra gloria', que cambia al plural. Aunque ὑμῶν es plural y puede abarcar al destinatario y su pueblo, en español conviene resolverlo de modo consistente y claro. 'Tu gloria' mantiene el hilo del discurso directo al destinatario; si se quiere la dimensión corporativa, puede explicarse en la nota léxica, no forzarla en el posesivo.
  - severity: low
    issue: Coordinación algo torpe en 'te honraremos a ti, a tu nación y al santuario'.
    rationale: 'La repetición de preposiciones es posible, pero aquí suena menos natural y puede hacer pensar que ''te'' queda fuera de la misma serie sintáctica. ''Te honraremos a ti, a tu nación y a tu santuario'' sería una opción, pero el griego no repite posesivo con ἱερὸν. Mejor: ''te honraremos a ti, a tu nación y al santuario'' o, más natural aún, ''te honraremos a ti, a tu nación y al santuario...'' con cierre ajustado; sin embargo, la revisión propuesta simplifica la frase para mayor legibilidad.'
  revised_spanish_text: Y cuando establezcamos nuestro reino[a], te honraremos a ti, a tu nación y al santuario con gran gloria[b][c], de modo que tu gloria llegue a ser evidente en toda la tierra.
