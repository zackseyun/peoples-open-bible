    issue: La nota [a] está anclada al topónimo «Elealé», pero comenta una alternativa del verbo «gritan/grita».
    rationale: Las notas deben anclarse exactamente en la palabra o frase pertinente. Tal como está, el marcador induce a pensar que la nota trata del nombre propio, no del verbo hebreo וַתִּזְעַק.
  - severity: low
