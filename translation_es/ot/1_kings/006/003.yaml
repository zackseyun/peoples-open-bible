translation:
  language: es
  text: El pórtico[a] que estaba delante de la nave[b] de la casa medía veinte codos de largo, a lo ancho de la casa[c], y diez codos de profundidad delante de la casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pórtico» también puede traducirse como «porche» o «vestíbulo».
    reason: lexical_alternative
  - marker: b
    text: Hebreo «hekal»; aquí designa la sala principal del edificio del templo.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «según el ancho de la casa»; la idea es que el pórtico tenía la misma medida frontal que la casa.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָאוּלָם
  english_pob_choice: the portico
  chosen_spanish: el pórtico
  alternatives_spanish:
  - el pórtico
  - el porche
  - el vestíbulo
  lexicon: HALOT
  rationale: אוּלָם en arquitectura del templo nombra la estructura de entrada ante la sala principal. 'Pórtico' es el equivalente español más preciso y natural; 'porche' suena más doméstico y 'vestíbulo' puede sugerir un espacio interior cerrado.
- source_word: עַל־פְּנֵי
  english_pob_choice: in front of
  chosen_spanish: delante de
  alternatives_spanish:
  - en frente de
  - ante
  - frente a
  lexicon: HALOT
  rationale: La expresión marca ubicación espacial y orientación arquitectónica. 'Delante de' comunica de forma clara la relación entre el pórtico y la sala del templo.
- source_word: הֵיכַל
  english_pob_choice: the nave
  chosen_spanish: h[e]kal
  alternatives_spanish:
  - la nave
  - la sala principal
  - el salón del templo
  lexicon: HALOT
  rationale: Se conserva el término técnico del hebreo en transliteración para evitar perder la distinción arquitectónica específica que POB documenta para el lugar principal del edificio. 'Nave' o 'sala principal' son explicativas, pero no reproducen con tanta fidelidad la terminología del texto fuente.
- source_word: הַבַּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  - la casa
  lexicon: HALOT
  rationale: Se mantiene 'casa' porque el hebreo dice literalmente בַּיִת, aunque el referente sea el templo. Así se preserva la forma del original sin perder inteligibilidad en contexto.
- source_word: עֶשְׂרִים אַמָּה
  english_pob_choice: twenty cubits
  chosen_spanish: veinte codos
  alternatives_spanish:
  - veinte codos
  - unos seis metros
  - veinte unidades
  lexicon: HALOT
  rationale: Se conserva la unidad antigua de medida, como en el POB inglés, para mantener la primacía del dato del texto original y evitar una conversión que introduciría aproximación moderna.
- source_word: אָרְכּוֹ
  english_pob_choice: long
  chosen_spanish: de largo
  alternatives_spanish:
  - de largo
  - en longitud
  - largo
  lexicon: HALOT
  rationale: El hebreo expresa la longitud del pórtico; en español, 'de largo' suena natural y conserva la función descriptiva de la medida.
- source_word: עַל־פְּנֵי רֹחַב הַבָּיִת
  english_pob_choice: across the width of the house
  chosen_spanish: a lo ancho de la casa
  alternatives_spanish:
  - a lo ancho de la casa
  - correspondiendo al ancho de la casa
  - atravesando el ancho de la casa
  lexicon: HALOT
  rationale: La idea es que la longitud del pórtico correspondía al ancho de la casa. 'A lo ancho de la casa' transmite esa relación dimensional en un español más fluido que una traducción más literal y menos natural.
- source_word: עֶשֶׂר בָּאַמָּה
  english_pob_choice: ten cubits
  chosen_spanish: diez codos
  alternatives_spanish:
  - diez codos
  - diez codos de profundidad
  lexicon: HALOT
  rationale: Se conserva el mismo sistema de medida. El contexto permite entender que esta es la dimensión transversal/profunda del pórtico.
- source_word: רָחְבּוֹ
  english_pob_choice: deep
  chosen_spanish: de profundidad
  alternatives_spanish:
  - de profundidad
  - de ancho
  - su ancho
  lexicon: HALOT
  rationale: Aunque el hebreo usa el sustantivo 'anchura', aquí la referencia arquitectónica es el fondo/proyección del pórtico hacia afuera. 'De profundidad' evita confusión en español y recoge la tensión lexical que el POB inglés también señaló.
- source_word: עַל־פְּנֵי הַבָּיִת
  english_pob_choice: in front of the house
  chosen_spanish: delante de la casa
  alternatives_spanish:
  - delante de la casa
  - frente a la casa
  - ante la casa
  lexicon: HALOT
  rationale: 'Se mantiene la localización espacial final tal como en el hebreo: el pórtico se extiende hacia el frente del edificio.'
translation_notes:
  revision_awareness: El texto base en inglés ya presenta un alta concordancia con la fuente hebrea y no registra revisiones aplicadas; este borrador sigue esa lectura estable, conservando las medidas y la relación espacial del pórtico con la casa/templo.
  spanish_consistency_notes:
  - Se mantiene 'codos' para las medidas, en paralelo con el POB inglés y el hebreo.
  - Se conserva la distinción arquitectónica entre pórtico y la sala principal del edificio.
  - Se evita reemplazar 'casa' por 'templo' en el cuerpo del texto para no borrar el valor literal de בַּיִת, aunque el referente sea el templo.
