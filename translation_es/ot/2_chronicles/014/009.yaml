translation:
  language: es
  text: Y Asa salió a su encuentro[a], y tomaron posiciones para la batalla[b] en el valle de Zefatá, junto a Maresá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «delante de él» o «contra él» para לְפָנָיו; el hebreo dice literalmente «delante de él», pero en contexto probablemente indica que Asa salió a confrontarlo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se formaron en orden de batalla». El hebreo usa un giro idiomático militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - marchó
  - salió a combatir
  lexicon: HALOT
  rationale: יצא en narración con valor militar puede significar 'salir' o 'marchar'. 'Salió' es natural en español y conserva el movimiento sin añadir una especificación militar que el hebreo no explicita en el verbo mismo.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - para enfrentarlo
  - contra él
  lexicon: HALOT
  rationale: La opción principal preserva el sentido literal de 'delante de él', como en el texto hebreo. Las alternativas reflejan la implicación contextual de confrontación, pero la redacción principal evita interpretar más de lo que dice la forma básica.
- source_word: וַיַּעַרְכוּ מִלְחָמָה
  english_pob_choice: they drew up for battle
  chosen_spanish: se dispusieron para la batalla
  alternatives_spanish:
  - se formaron para combatir
  - ordenaron la batalla
  - se prepararon para la guerra
  lexicon: HALOT
  rationale: ערך con מלחמה expresa organizarse o ponerse en formación de combate. 'Se dispusieron para la batalla' comunica esa idea en español actual y mantiene la fuerza militar del giro idiomático.
- source_word: בְּגֵיא
  english_pob_choice: in the Valley of
  chosen_spanish: en el valle de
  alternatives_spanish:
  - en el wadi de
  - en la vaguada de
  lexicon: HALOT
  rationale: גיא designa un valle o garganta. 'Valle' es la equivalencia más clara y natural para un nombre geográfico en español bíblico.
- source_word: צְפַתָה
  english_pob_choice: Zephathah
  chosen_spanish: Zefatá
  alternatives_spanish:
  - Sefatá
  - Zefata
  lexicon: N/A
  rationale: Es un nombre propio de lugar. Se adopta una transliteración española transparente y pronunciable, conservando el nombre como topónimo.
- source_word: לְמָרֵשָׁה
  english_pob_choice: at Mareshah
  chosen_spanish: en Maresá
  alternatives_spanish:
  - cerca de Maresá
  - junto a Maresá
  lexicon: HALOT
  rationale: La preposición ל con un topónimo aquí marca localización vinculada al lugar. 'En Maresá' es idiomático y mantiene la relación locativa sin sobrerinterpretar la preposición.
translation_notes:
  revision_awareness: 'Se siguió el texto hebreo masorético de 2 Crónicas 14:9 y se tomó como contexto auditado la versión inglesa POB, que resuelve el hebreo de forma equivalente: ''before him'' y ''drew up for battle''. No se reportan revisiones aplicadas en el expediente; la redacción española conserva la misma estructura de sentido y traslada las notas alternativas donde el español también permite más de una lectura.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como término por defecto solo cuando corresponda; este versículo no lo contiene.
  - Se transliteraron los topónimos como 'Zefatá' y 'Maresá' para una lectura española clara y consistente.
  - Se preservó el matiz literal de לְפָנָיו en el cuerpo y se dejó la interpretación contextual en nota.
  - '''Batalla'' traduce el sustantivo מלחמה en un giro idiomático natural en español, sin perder el campo semántico militar.'
