    text: Or 'when Abraham sees his children, the work of my hands, in his midst'; the singular pronouns may echo the patriarchs named in the previous verse, especially Abraham or Jacob.
    reason: alternative_reading
  - marker: b
    text: Or 'they will fear' or 'they will revere.' The Hebrew verb includes the sense of reverential dread or awe.
    reason: lexical_alternative
