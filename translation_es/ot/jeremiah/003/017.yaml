translation:
  language: es
  text: En aquel tiempo llamarán a Jerusalén «el trono de Yahvé[b]», y todas las naciones se reunirán a ella[a], a Jerusalén, por el nombre de Yahvé. Ya no andarán tras la obstinación de su corazón malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán reunidas a ella» o «afluirán hacia ella». El verbo hebreo aquí es difícil; en contexto describe a las naciones congregándose hacia Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el trono de Yahvé». La imagen identifica a Jerusalén como el lugar del gobierno real de Yahvé.'
    reason: cultural_note
lexical_decisions:
- source_word: בָּעֵת הַהִיא
  english_pob_choice: At that time
  chosen_spanish: En aquel tiempo
  alternatives_spanish:
  - En ese tiempo
  - Entonces
  lexicon: HALOT
  rationale: La expresión hebrea introduce un marco temporal profético futuro. «En aquel tiempo» conserva ese valor idiomático en español con un registro natural y digno.
- source_word: יִקְרְאוּ לִירוּשָׁלַם כִּסֵּא יְהוָה
  english_pob_choice: they will call Jerusalem ‘the throne of Yahweh,’
  chosen_spanish: llamarán a Jerusalén «el trono de Yahvé»
  alternatives_spanish:
  - Jerusalén será llamada «el trono de Yahvé»
  - proclamarán que Jerusalén es «el trono de Yahvé»
  lexicon: HALOT
  rationale: Se conserva el verbo activo plural del hebreo («llamarán») en vez de pasivizarlo. «Trono» reproduce כִּסֵּא con su imagen real, y «Yahvé» sigue el estándar del proyecto para el Tetragrámaton.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El nombre divino se vierte según el criterio del proyecto como «Yahvé», transliteración reverente y auditable del Tetragrámaton.
- source_word: וְנִקְוּוּ אֵלֶיהָ
  english_pob_choice: and all the nations will gather to it
  chosen_spanish: y todas las naciones se reunirán [a] en ella
  alternatives_spanish:
  - y todas las naciones serán reunidas en ella
  - y todas las naciones fluirán hacia ella
  lexicon: HALOT
  rationale: El nifal de קוה es difícil; en contexto expresa el movimiento convergente de las naciones hacia Jerusalén. «Se reunirán» mantiene la idea de congregación sin decidir de más entre recogerse, ser reunidas o afluir. El pronombre femenino se conserva por Jerusalén.
- source_word: כָל הַגּוֹיִם
  english_pob_choice: all the nations
  chosen_spanish: todas las naciones
  alternatives_spanish:
  - todos los pueblos
  - todos los gentiles
  lexicon: HALOT
  rationale: «Naciones» es la equivalencia más natural en el contexto profético y evita restringir innecesariamente el alcance del hebreo.
- source_word: לְשֵׁם יְהוָה
  english_pob_choice: for the name of Yahweh
  chosen_spanish: por el nombre de Yahvé
  alternatives_spanish:
  - para el nombre de Yahvé
  - en honor del nombre de Yahvé
  lexicon: HALOT
  rationale: La preposición לְ aquí puede expresar orientación, finalidad o relación motivante. «Por el nombre de Yahvé» conserva esa ambigüedad funcional sin sobreinterpretar.
- source_word: לִירוּשָׁלָם
  english_pob_choice: to Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - hacia Jerusalén
  lexicon: HALOT
  rationale: La repetición final de Jerusalén se hace explícita en español para claridad. Se eligió «en Jerusalén» porque el movimiento de las naciones culmina allí y el español fluye mejor en esta construcción, sin borrar la referencia espacial al destino.
- source_word: וְלֹא יֵלְכוּ עוֹד אַחֲרֵי
  english_pob_choice: They will no longer walk after
  chosen_spanish: Ya no andarán más tras
  alternatives_spanish:
  - Ya no seguirán
  - No volverán a andar tras
  lexicon: HALOT
  rationale: El hebreo usa una metáfora de seguimiento leal o conducta. «Andarán tras» conserva la imagen idiomática; «ya no» traduce עוֹד con naturalidad.
- source_word: שְׁרִר֖וּת לִבָּ֥ם הָרָע
  english_pob_choice: the stubbornness of their evil heart
  chosen_spanish: la obstinación de su corazón malo
  alternatives_spanish:
  - la terquedad de su corazón malo
  - la obstinación de su corazón perverso
  - los impulsos de su corazón malo
  lexicon: HALOT
  rationale: שְׁרִרוּת denota obstinación, dureza o terquedad. Se eligió «obstinación» por su fuerza semántica y claridad. «Corazón malo» conserva el adjetivo hebreo sin suavizarlo; «malo» es más sobrio y directo que «perverso» en este contexto.
theological_decisions:
- issue: Jerusalén como «el trono de Yahvé»
  english_pob_reading: Retain the imagery directly without interpreting it as merely symbolic, ecclesial, or millennial in the translation itself.
  chosen_spanish_reading: Mantener la imagen de Jerusalén como «el trono de Yahvé» sin resolver en la traducción si es un símbolo, una localización concreta o una forma de realeza divina futura.
  alternative_spanish_readings:
  - una descripción simbólica del gobierno de Dios centrado en Jerusalén
  - una escena literal de entronización futura
  rationale: El hebreo presenta la imagen con fuerza propia; la traducción debe preservarla sin imponer un sistema escatológico que el versículo no explicita.
  doctrine_reference: Preservar la tensión teológica del texto.
- issue: El movimiento de las naciones hacia Jerusalén
  english_pob_reading: Translate as physical/corporate gathering toward Jerusalem without specifying whether this is pilgrimage, conversion, or political submission.
  chosen_spanish_reading: Traducirlo como congregación de las naciones hacia Jerusalén sin precisar si se trata de peregrinación, conversión o sometimiento político.
  alternative_spanish_readings:
  - peregrinación para adorar
  - giro metafórico de las naciones hacia Yahvé
  rationale: El hebreo permite el sentido de reunirse o afluir hacia Jerusalén, pero no obliga a fijar una explicación teológica más estrecha. La traducción mantiene ese nivel descriptivo.
  doctrine_reference: Primacía del original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando los marcadores [a] y [b] directamente en el texto español donde corresponden. Además, se conservó la distinción entre la imagen del «trono de Yahvé» y el movimiento de las naciones, sin resolver la ambigüedad del nifal de קוה más allá de lo que el hebreo permite.
  spanish_consistency_notes:
  - Se emplea «Yahvé» de forma consistente para יְהוָה.
  - «Naciones» se mantiene para גּוֹיִם por ser el equivalente profético natural.
  - Se preserva la metáfora de conducta en «andar tras».
  - La referencia a Jerusalén se conserva en dos lugares para reflejar la repetición hebrea y evitar pérdida de énfasis.
  - Los marcadores de nota aparecen exactamente en el texto donde se requiere apoyo lexical.
