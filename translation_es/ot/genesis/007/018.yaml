translation:
  language: es
  text: Las aguas prevalecieron y aumentaron mucho sobre la tierra, y el arca se movía sobre la superficie de las aguas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «flotaba sobre la faz de las aguas». El hebreo dice literalmente «iba sobre la faz de las aguas», una expresión idiomática para moverse sobre la superficie de las aguas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְבְּרוּ
  english_pob_choice: prevailed
  chosen_spanish: prevalecieron
  alternatives_spanish:
  - se hicieron poderosas
  - crecieron en poder
  - se impusieron
  lexicon: HALOT
  rationale: גבר comunica hacerse fuerte o imponerse; «prevalecieron» conserva la idea de dominio o fuerza victoriosa que el contexto del diluvio sugiere, sin reducirlo a un mero aumento físico.
- source_word: הַמַּיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  lexicon: HALOT
  rationale: El plural hebreo es natural en español como «las aguas», especialmente en contexto de diluvio, donde el plural preserva la masa de agua como realidad envolvente.
- source_word: וַיִּרְבּוּ מְאֹד
  english_pob_choice: increased greatly
  chosen_spanish: aumentaron mucho
  alternatives_spanish:
  - se multiplicaron muchísimo
  - crecieron en gran manera
  lexicon: HALOT
  rationale: רבה con מְאֹד intensifica el crecimiento; «aumentaron mucho» expresa de forma clara y digna esa intensificación sin sonar arcaico.
- source_word: עַל הָאָרֶץ
  english_pob_choice: over the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre la tierra habitable
  - sobre la tierra
  lexicon: HALOT
  rationale: אָרֶץ puede significar «tierra» o «tierra/país»; aquí el contexto del diluvio universal permite «sobre la tierra» como equivalente natural y fiel, manteniendo la amplitud del término sin introducir una paráfrasis interpretativa adicional.
- source_word: וַתֵּלֶךְ
  english_pob_choice: moved along
  chosen_spanish: se movía
  alternatives_spanish:
  - iba
  - flotaba
  - se deslizaba
  lexicon: HALOT
  rationale: הלך literalmente es «ir/andar», pero con el arca como sujeto sobre el agua la idea es de desplazamiento continuo. «Se movía» conserva el giro hebreo sin especificar más de lo que el texto dice; la nota explica la lectura idiomática de «ir sobre la superficie».
- source_word: הַתֵּבָה
  english_pob_choice: the ark
  chosen_spanish: el arca
  alternatives_spanish:
  - la caja
  - la nave
  lexicon: HALOT
  rationale: En la narrativa de Noé, תבה se refiere de manera estable al arca; «el arca» es la forma ya reconocible y más exacta en español bíblico.
- source_word: עַל פְּנֵי הַמָּיִם
  english_pob_choice: on the surface of the waters
  chosen_spanish: sobre la superficie de las aguas
  alternatives_spanish:
  - sobre la faz de las aguas
  - sobre las aguas
  lexicon: HALOT
  rationale: פְּנֵי literalmente es «rostro/faz», pero en este contexto idiomático refiere a la superficie. «Sobre la superficie de las aguas» comunica el sentido con precisión; la nota conserva la alternativa literal como posibilidad de lectura.
translation_notes:
  revision_awareness: Alineado con el estado de alta concordancia del texto fuente y con la revisión más reciente indicada como sin cambios; se preserva la alternancia idiomática del hebreo en la nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el hebreo lo requiera explícitamente; este versículo no lo contiene.
  - «Las aguas» conserva el plural hebreo y evita singularizar indebidamente.
  - «El arca» sigue la terminología narrativa estable de Génesis 6–9.
  - La nota a pie de página marca la alternativa literal idiomática sin introducir una interpretación nueva.
