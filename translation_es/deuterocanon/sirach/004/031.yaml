review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo como texto base y conserva en nota la forma griega divergente, en línea con el rastro del POB inglés. La estructura semántica principal está bien: prohibición de altivez en el hablar y de flojedad/negligencia en el trabajo. Sin embargo, «en tu habla» suena menos natural y menos digno en español bíblico general que una formulación como «al hablar» o «en tu manera de hablar».'
  spanish_quality_summary: El español es claro, pero «No seas soberbio en tu habla» resulta algo rígido y poco idiomático para un registro bíblico moderno y ampliamente legible. «Soberbio» es posible, pero combinado con «en tu habla» produce una frase más tosca de lo necesario. Conviene un ajuste menor para mejorar naturalidad sin perder precisión. El resto del versículo y la nota son publicables con una leve mejora estilística en la nota.
  glossary_alignment: No hay términos del glosario de proyecto especialmente comprometidos aquí. La elección «soberbio» para גבהן es aceptable, y «flojo y negligente» preserva bien la duplicación hebrea רפוי ורשיש. «Trabajo» para מלאכתך está alineado con la decisión inglesa. La variante griega se maneja correctamente como nota textual, no como texto principal.
  issues:
  - severity: medium
    issue: «en tu habla» suena poco natural en español bíblico general
    rationale: Aunque intenta reflejar «in your speech», en español neutral y digno «habla» como sustantivo aquí resulta algo forzado. «Al hablar» comunica mejor el sentido idiomático de בלשונך sin calco extraño.
  - severity: low
    issue: La nota textual puede afinarse levemente para sonar más natural
    rationale: «El griego ofrece otra forma del dicho» es correcto, pero «una forma distinta de este dicho» y «cuando devuelves» fluye mejor en español actual sin alterar el contenido.
  revised_spanish_text: No seas soberbio[a] al hablar, y flojo y negligente en tu trabajo.
