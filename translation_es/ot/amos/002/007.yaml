translation:
  language: es
  text: los que codician hasta el polvo de la tierra sobre la cabeza de los pobres[a], y tuercen el camino de los humildes[b]; y un hombre y su padre van a la misma muchacha[c][d], para profanar mi santo nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que jadean por el polvo de la tierra sobre la cabeza de los pobres». El verbo hebreo puede leerse más literalmente como un anhelo intenso, pero en este contexto probablemente describe opresión despiadada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y tuercen el sendero de los afligidos / mansos».'
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente «van a la muchacha»; es un eufemismo sexual. «Muchacha» también puede entenderse como «joven mujer».
    reason: lexical_alternative
  - marker: d
    text: El versículo no identifica explícitamente a la muchacha como prostituta cultual o esclava, aunque algunos intérpretes infieren ese tipo de explotación por el contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: הַשֹּׁאֲפִים
  english_pob_choice: those who pant after
  chosen_spanish: los que ansían
  alternatives_spanish:
  - los que jadean por
  - los que suspiran por
  - los que codician
  lexicon: HALOT
  rationale: El verbo puede expresar un deseo intenso o un ansia voraz; en este contexto de opresión social, 'ansían' conserva la fuerza del anhelo abusivo sin forzar una imagen corporal extraña en español. Evita también suavizarlo demasiado con una formulación neutra.
- source_word: עַל עֲפַר אֶרֶץ
  english_pob_choice: the dust of the earth
  chosen_spanish: el polvo de la tierra
  alternatives_spanish:
  - el polvo de la tierra
  - el polvo del suelo
  - el polvo del país
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo. 'De la tierra' reproduce bien el alcance genérico de אֶרֶץ y mantiene el contraste humillante del polvo.
- source_word: בְּרֹאשׁ דַּלִּים
  english_pob_choice: on the head of the poor
  chosen_spanish: sobre la cabeza de los pobres
  alternatives_spanish:
  - sobre la cabeza de los pobres
  - en la cabeza de los pobres
  - sobre la cabeza de los débiles
  lexicon: HALOT
  rationale: '''Cabeza'' se mantiene de forma literal porque forma parte de la imagen de humillación. ''Pobres'' traduce דלים de manera clara y socialmente precisa en español.'
- source_word: וְדֶרֶךְ עֲנָוִים יַטּוּ
  english_pob_choice: and turn aside the way of the humble
  chosen_spanish: y tuercen el camino de los humildes
  alternatives_spanish:
  - y tuercen el camino de los humildes
  - y desvían la senda de los humildes
  - y pervierten el camino de los afligidos
  lexicon: HALOT
  rationale: נטה en este contexto puede ser desviar o torcer; 'tuercen' conserva la imagen de deformar un camino y suena natural en español. עֲנָוִים se rinde como 'humildes' para abarcar la modestia y la vulnerabilidad social sin perder dignidad.
- source_word: וְאִישׁ וְאָבִיו
  english_pob_choice: and a man and his father
  chosen_spanish: y un hombre y su padre
  alternatives_spanish:
  - y un hombre y su padre
  - y un hombre junto con su padre
  lexicon: HALOT
  rationale: La construcción hebrea se conserva sin añadir más precisión de la que ofrece el texto. 'Su padre' mantiene el vínculo familiar escandaloso del pasaje.
- source_word: יֵלְכוּ אֶל הַנַּעֲרָה
  english_pob_choice: go in to the same girl
  chosen_spanish: se llegan a la misma muchacha
  alternatives_spanish:
  - van a la muchacha
  - se llegan a la muchacha
  - entran en la misma muchacha
  lexicon: HALOT
  rationale: La expresión verbal es un eufemismo sexual; 'se llegan a' comunica ese sentido sin vulgaridad. 'Muchacha' rinde נערה de manera comprensible y algo más cuidadosa que 'niña', evitando sugerir una edad más baja de la que el hebreo exige. 'La misma' se conserva porque el contexto indica una sola joven involucrada con ambos hombres.
- source_word: לְמַעַן חַלֵּל
  english_pob_choice: so as to profane
  chosen_spanish: para profanar
  alternatives_spanish:
  - para profanar
  - a fin de profanar
  - con el fin de profanar
  lexicon: HALOT
  rationale: El infinitivo final/resultativo se expresa de forma breve y natural con 'para'. 'Profanar' mantiene el peso cultual y moral del verbo.
- source_word: אֶת שֵׁם קָדְשִׁי
  english_pob_choice: my holy name
  chosen_spanish: mi santo nombre
  alternatives_spanish:
  - mi santo nombre
  - el nombre de mi santidad
  lexicon: HALOT
  rationale: '''Santo nombre'' es la forma natural y fiel en español para la expresión hebrea, conservando el valor teológico de la reputación y presencia de Dios sin introducir una perífrasis innecesaria.'
theological_decisions:
- issue: Naturaleza del abuso sexual en וְאִישׁ וְאָבִיו יֵלְכוּ אֶל הַנַּעֲרָה
  english_pob_reading: The text condemns a man and his father having sexual relations with the same young woman, presented as a profanation of God's holy name.
  chosen_spanish_reading: El texto condena que un hombre y su padre se lleguen a la misma muchacha, como profanación del santo nombre de Dios.
  alternative_spanish_readings:
  - El texto podría aludir específicamente a explotación sexual cultual o servil.
  - El texto podría enfatizar deshonra sexual extrema sin precisar más.
  rationale: El hebreo afirma el acceso sexual compartido y lo vincula con la profanación del nombre santo de Dios. La traducción principal debe mantener esa afirmación sin añadir una identificación no explícita de prostitución cultual, esclavitud o un marco ritual específico.
  doctrine_reference: Preservar la tensión exegética sin resolverla de antemano.
- issue: Sentido de דלים y ענוים en el cuadro de opresión social
  english_pob_reading: poor / humble
  chosen_spanish_reading: pobres / humildes
  alternative_spanish_readings:
  - débiles / mansos
  - afligidos / humildes
  rationale: '''Pobres'' y ''humildes'' recogen la dimensión socioeconómica y la de abatimiento interior del pasaje sin reducirlo a una sola categoría. Esto permite que la denuncia conserve tanto el abuso económico como la perversión del orden moral.'
  doctrine_reference: Justicia social y dignidad de los vulnerables en la denuncia profética.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que corrigió una formulación más interpretativa de 'trample' hacia 'pant after' para reflejar mejor el verbo hebreo שׁאף y mantuvo el resto del versículo sin cambios sustantivos. La versión española sigue esa decisión al evitar un verbo de pisotear y optar por una expresión de ansia/opresión.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino cuando aparece explícitamente; aquí no aparece en el texto hebreo del versículo, por lo que se mantiene 'mi santo nombre'.
  - Se conserva un registro digno y bíblico, evitando arcaísmos innecesarios y sin sustituir el eufemismo sexual por una paráfrasis moderna demasiado explícita.
  - 'La puntuación sigue el flujo hebreo y el orden retórico del pasaje: denuncia social, denuncia moral y finalidad teológica final.'
