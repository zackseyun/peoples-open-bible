id: T12P.DAN.5.6
reference: Testament of Dan 5:6
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: Charles 1908 Greek Versions (pages 201-213, Dan source-fix v2)
  text: '[᾿Ανέγνων γὰρ⁵⁰ ἐν βίβλῳ Ἐνὼχ⁵¹ τοῦ δικαίου ⌈καὶ ἔγνων⌉¹⁵² ὅτι ὁ⁵³ ἄρχων ὑμῶν⁵⁴ ὁ Σατανᾶς ἐστιν⁵⁵ *καὶ ὅτι⁵⁶ τὰ πνεύματα τῆς πονηρίας⁵⁷ καὶ τῆς ὑπερηφανίας †ὑπακούσονται⁵⁸ *τοῦ παρεδρεύειν⁵⁹ τοῖς υἱοῖς Λευί, τοῦ ποιεῖν⁶⁰ αὐτοὺς ἐξαμαρτάνειν ἐνώπιον Κυρίου.'
  language: Greek
base_translation:
  language: en
  yaml_path: translation/extra_canonical/testaments_twelve_patriarchs/dan/005/006.yaml
  text: For I have read in the book of Enoch the righteous, and I learned that your ruler is Satan, and that the spirits of wickedness and pride will obey in attending the sons of Levi, to make them sin before the Lord.
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T14:54:36Z'
    unchanged: false
    changes_summary: Changed 'of pride' to 'pride' for smoother English, and revised 'will attend on' to 'will obey in attending' to more fully reflect ὑπακούσονται together with τοῦ παρεδρεύειν.
translation:
  language: es
  text: Pues he leído en el libro de Enoc el justo, y he sabido que su gobernante es Satanás, y que los espíritus de la maldad y de la soberbia obedecerán al asistir a los hijos de Leví, para hacerlos pecar delante del Señor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀνέγνων
  english_pob_choice: I have read
  chosen_spanish: he leído
  alternatives_spanish:
  - leí
  lexicon: LSJ
  rationale: El aoristo griego con sentido resultativo se traduce naturalmente con perfecto en español aquí.
- source_word: ἐν βίβλῳ Ἐνὼχ τοῦ δικαίου
  english_pob_choice: in the book of Enoch the righteous
  chosen_spanish: en el libro de Enoc el justo
  alternatives_spanish:
  - en el libro del justo Enoc
  lexicon: LSJ
  rationale: Conserva la aposición griega 'Enoc el justo' que es fórmula tradicional intertestamentaria.
- source_word: ὁ ἄρχων ὑμῶν ὁ Σατανᾶς
  english_pob_choice: your ruler is Satan
  chosen_spanish: su gobernante es Satanás
  alternatives_spanish:
  - el príncipe de ustedes es Satanás
  - vuestro gobernante es Satanás
  lexicon: LSJ
  rationale: ἄρχων → 'gobernante' es neutro y preciso; 'príncipe' tendría resonancia johánica útil pero 'gobernante' es más universal.
- source_word: πνεύματα τῆς πονηρίας καὶ τῆς ὑπερηφανίας
  english_pob_choice: spirits of wickedness and pride
  chosen_spanish: los espíritus de la maldad y de la soberbia
  alternatives_spanish:
  - los espíritus de maldad y orgullo
  lexicon: LSJ
  rationale: Mantiene los dos genitivos abstractos paralelos. ὑπερηφανία → 'soberbia' es la traducción tradicional ético-bíblica.
- source_word: ὑπακούσονται τοῦ παρεδρεύειν
  english_pob_choice: will obey in attending
  chosen_spanish: obedecerán al asistir
  alternatives_spanish:
  - obedecerán para servir junto a
  - obedecerán acompañando
  lexicon: LSJ
  rationale: Refleja la revisión inglesa que combina 'obey' + 'attending'. παρεδρεύω = sentarse al lado, asistir.
- source_word: τοῦ ποιεῖν αὐτοὺς ἐξαμαρτάνειν
  english_pob_choice: to make them sin
  chosen_spanish: para hacerlos pecar
  alternatives_spanish:
  - para inducirlos al pecado
  - para que pequen
  lexicon: LSJ
  rationale: ἐξαμαρτάνω es intensivo de ἁμαρτάνω; 'hacerlos pecar' es directo y mantiene la causalidad.
- source_word: ἐνώπιον Κυρίου
  english_pob_choice: before the Lord
  chosen_spanish: delante del Señor
  alternatives_spanish:
  - en presencia del Señor
  - ante el Señor
  lexicon: LSJ
  rationale: '''Delante de'' es la fórmula litúrgica-bíblica estándar en español para ἐνώπιον.'
theological_decisions:
- issue: Satanás como gobernante
  chosen_reading: su gobernante es Satanás
  alternative_readings:
  - su príncipe es Satanás
  rationale: El testamento ubica a Satanás como autoridad sobre la descendencia de Dan; conservar el lenguaje directo refleja la teología moral-cósmica del texto sin atenuarla.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El inglés POB cambió 'of pride' a 'pride' (ya el segundo τῆς ὑπερηφανίας es paralelo a τῆς πονηρίας) y 'will attend on' a 'will obey in attending' para reflejar ὑπακούσονται + τοῦ παρεδρεύειν. El español preserva 'de la soberbia' por paralelismo en español.
  spanish_consistency_notes:
  - Κύριος → Señor; Σατανᾶς → Satanás.
  - πνεύματα → espíritus.
  - ὑπερηφανία → soberbia (consistente con tradición ético-bíblica).
