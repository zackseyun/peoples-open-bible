    rationale: La nota inglesa documenta una alternativa léxica para προενόησεν ('she perceived him coming'), no para «a su padre». En español, el marcador debe aparecer donde se traduce la percepción visual.
  - severity: medium
    issue: El contenido de la nota actual describe incorrectamente el literal griego.
    rationale: Dice que «El griego dice literalmente “habló a su padre”», pero εἶπεν τῷ πατρὶ αὐτοῦ simplemente significa «dijo a su padre» y no es el punto debatido en la auditoría. La nota debe explicar προενόησεν, no εἶπεν.
  revised_spanish_text: 'Y ella lo vio venir[a] y dijo a su padre: «Mira, mi hijo viene, y el hombre que fue con él».'
