    text: Hebreo literalmente, «no había hecho sus pies». La expresión se refiere al descuido del cuidado o aseo normal de los pies.
    reason: lexical_alternative
  - marker: b
    text: O «ni había cuidado su bigote». El término hebreo se refiere específicamente al área del vello sobre el labio superior, no necesariamente a toda la barba.
    reason: lexical_alternative
  - marker: c
    text: O «hasta el día en que vino en paz» o «llegó sano y salvo».
    reason: lexical_alternative
  revision_rationale: Se corrige la traducción de לִקְרַאת a «al encuentro del rey» para mayor fidelidad. Se mejora la naturalidad de la expresión idiomática de los pies. Se reparan las notas para que reflejen las alternativas léxicas reales documentadas por el POB inglés y se elimina una nota innecesaria sobre «vestidos/ropa».
