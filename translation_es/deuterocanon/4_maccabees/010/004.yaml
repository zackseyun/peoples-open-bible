translation:
  language: es
  text: En respuesta a esto[a], si tienen algún instrumento de castigo, tráiganlo contra mi cuerpo; porque mi alma[b], aunque lo deseen, no la tocarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si tienen algún medio de castigo» o «si tienen algún instrumento de tormento»; el término griego se refiere concretamente a un instrumento o medio para castigar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «mi vida»; ψυχή puede significar también «vida», pero aquí «alma» conserva mejor el contraste con «cuerpo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς ταῦτα
  english_pob_choice: In response to this
  chosen_spanish: En respuesta a esto
  alternatives_spanish:
  - A esto
  - Ante esto
  lexicon: LSJ
  rationale: Expresa el valor discursivo de respuesta inmediata del griego sin volverlo más interpretativo de lo que permite el texto.
- source_word: εἴ τι ἔχετε κολαστήριον
  english_pob_choice: if you have any instrument of punishment
  chosen_spanish: si tienen algún instrumento de castigo
  alternatives_spanish:
  - si tienen algún medio de castigo
  - si tienen algún instrumento de tormento
  lexicon: LSJ
  rationale: κολαστήριον apunta concretamente a un medio o instrumento de castigo; 'instrumento de castigo' conserva la concreción y evita precisar indebidamente un tipo de aparato.
- source_word: προσαγάγετε
  english_pob_choice: bring it against
  chosen_spanish: tráiganlo contra
  alternatives_spanish:
  - aplíquenlo contra
  - pónganlo sobre
  lexicon: LSJ
  rationale: El imperativo exige trasladar el castigo para hacerlo efectivo sobre el cuerpo; 'tráiganlo contra' mantiene el sentido hostil/aplicativo de la frase.
- source_word: τῷ σώματί μου
  english_pob_choice: my body
  chosen_spanish: mi cuerpo
  alternatives_spanish:
  - mi carne
  lexicon: LSJ
  rationale: σῶμα se refiere de forma directa al cuerpo físico y contrasta deliberadamente con ψυχή en la siguiente cláusula.
- source_word: τῆς γὰρ ψυχῆς μου
  english_pob_choice: for my soul
  chosen_spanish: de mi alma
  alternatives_spanish:
  - de mi vida
  - de mi ser interior
  lexicon: LSJ
  rationale: ψυχή puede significar 'vida' o 'alma'; aquí se conserva 'alma' para respetar el contraste antropológico con 'cuerpo' que el griego establece explícitamente.
- source_word: οὐδʼ ἂν θέλητε
  english_pob_choice: even if you wish it
  chosen_spanish: ni aun si lo desean
  alternatives_spanish:
  - ni siquiera si quieren
  - aunque lo deseen
  lexicon: LSJ
  rationale: La construcción concesiva se mantiene en español con una fórmula natural que conserva el matiz de posibilidad frustrada.
- source_word: ἅψεσθε
  english_pob_choice: you will not touch
  chosen_spanish: la tocarán
  alternatives_spanish:
  - la alcanzarán
  - pondrán la mano sobre ella
  lexicon: LSJ
  rationale: El verbo ἅπτομαι aquí significa tocar o llegar a tocar; en español, 'tocar' es la opción más directa y mantiene el contraste con la inviolabilidad del alma.
theological_decisions:
- issue: Contraste entre cuerpo y alma
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - ser interior
  rationale: 'Se preserva la tensión teológica y antropológica del griego: el persecutor puede actuar sobre el cuerpo, pero no sobre la ψυχή. ''Alma'' mantiene ese contraste sin reducirlo a mera supervivencia física.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: 'Se revisó la concordancia con el texto griego de Swete y el auditable English POB: no hubo cambios necesarios respecto del sentido base, y se mantuvo el contraste cuerpo/alma sin suavizarlo.'
  spanish_consistency_notes:
  - Se usó 'cuerpo' para σῶμα y 'alma' para ψυχή, manteniendo la oposición del verso.
  - '''Instrumento de castigo'' conserva la concreción de κολαστήριον sin introducir un objeto específico no atestiguado.'
  - 'La forma verbal plural de segunda persona se adaptó al tratamiento reverente/neutral de español público: ''tienen'', ''tráiganlo'', ''desean'', ''la tocarán''.'
