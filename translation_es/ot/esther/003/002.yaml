revisions:
- from: Y todos los siervos del rey que estaban a la puerta del rey se inclinaban y se postraban ante Amán[a], porque así lo había mandado el rey respecto de él[b]. Pero Mardoqueo no se inclinaba ni se postraba.
  to: Y todos los servidores del rey que estaban en la puerta del rey se inclinaban y se postraban ante Amán[a], porque así lo había mandado el rey respecto de él[b]. Pero Mardoqueo no se inclinaba ni se postraba.
  rationale: 'La revisión hace dos ajustes menores de estilo y precisión contextual: sustituye ''siervos'' por ''servidores'' para reflejar mejor personal cortesano sin sobrecargar el matiz de servidumbre, y cambia ''a la puerta del rey'' por ''en la puerta del rey'' para una localización más idiomática en español. Se mantienen intactas las decisiones exegéticas principales y las notas del POB.'
