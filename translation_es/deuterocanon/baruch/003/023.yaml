translation:
  language: es
  text: Y también los hijos de Agar, que buscan entendimiento sobre la tierra—los mercaderes de Merrán[a] y de Temán, y los fabuladores[b] y los que buscan entendimiento—no conocieron el camino de la sabiduría, ni recordaron sus sendas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice «Merrán», un nombre de lugar inusual en este testimonio; algunas tradiciones lo identifican o normalizan de otra manera. La traducción conserva la forma griega atestiguada en lugar de emendarla en silencio.
    reason: textual_variant
  - marker: b
    text: O «hacedores de mitos»; el griego se refiere a personas dedicadas a relatos o mitos.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵ τε υἱοὶ Ἁγὰρ
  english_pob_choice: And the sons of Hagar also
  chosen_spanish: Y también los hijos de Agar
  alternatives_spanish:
  - Y los hijos de Agar también
  - Y también los descendientes de Agar
  lexicon: LSJ
  rationale: υἱοί se mantiene como «hijos» para conservar la cercanía formal con el griego, y τε se expresa naturalmente con «también». «Agar» sigue la forma española usual de Hagar.
- source_word: οἱ ἐκζητοῦντες τὴν σύνεσιν
  english_pob_choice: who seek understanding
  chosen_spanish: que buscan entendimiento
  alternatives_spanish:
  - que buscan con diligencia entendimiento
  - que procuran entendimiento
  lexicon: LSJ
  rationale: ἐκζητέω tiene un matiz intensivo, pero «buscar» comunica bien la fuerza sin volver la frase pesada. σύνεσις se rinde como «entendimiento», según el valor intelectual del término en este contexto.
- source_word: οἱ ἐπὶ γῆς
  english_pob_choice: on the earth
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - en la tierra
  - sobre la tierra de
  - en la tierra
  lexicon: LSJ
  rationale: La construcción es abrupta en griego; «sobre la tierra» preserva el alcance amplio y permite una lectura más natural en español que un calco rígido.
- source_word: οἱ ἔμποροι τῆς Μερρὰν καὶ Θαιμάν
  english_pob_choice: the merchants of Merran and Teman
  chosen_spanish: los mercaderes de Merrán y de Temán
  alternatives_spanish:
  - los comerciantes de Merrán y de Temán
  - los mercaderes de Merrán y Temán
  lexicon: LSJ
  rationale: ἔμποροι es «mercaderes» o «comerciantes»; «mercaderes» conserva el registro elevado. Se preserva la forma transliterada de Μερρὰν como «Merrán» por fidelidad al testimonio griego, y «Temán» sigue la forma española estable.
- source_word: οἱ μυθολόγοι
  english_pob_choice: the myth-makers
  chosen_spanish: los fabuladores
  alternatives_spanish:
  - los hacedores de mitos
  - los mitólogos
  lexicon: LSJ
  rationale: El término alude a quienes se ocupan de relatos, mitos o fábulas. «Fabuladores» mantiene el matiz de producción de relatos sin implicar necesariamente falsedad peyorativa ni perder la referencia al discurso mítico.
- source_word: οἱ ἐκζητηταὶ τῆς συνέσεως
  english_pob_choice: seekers of understanding
  chosen_spanish: los que buscan entendimiento
  alternatives_spanish:
  - los buscadores de entendimiento
  - los investigadores de entendimiento
  lexicon: LSJ
  rationale: Se conserva la repetición retórica de «buscar entendimiento» que corresponde a la doble aparición de ἐκζητέω y de σύνεσις en el verso.
- source_word: ὁδὸν δὲ σοφίας
  english_pob_choice: the way of wisdom
  chosen_spanish: el camino de la sabiduría
  alternatives_spanish:
  - la vía de la sabiduría
  - la senda de la sabiduría
  lexicon: LSJ
  rationale: ὁδός puede ser «camino», «vía» o «senda»; «camino» es claro y natural en español, y mantiene el contraste con las «sendas» del final del verso.
- source_word: οὐκ ἔγνωσαν
  english_pob_choice: did not know
  chosen_spanish: no conocieron
  alternatives_spanish:
  - no supieron
  - no llegaron a conocer
  lexicon: LSJ
  rationale: El aoristo se vierte con pretérito simple. «Conocieron» expresa la negación del conocimiento de manera directa y idiomática.
- source_word: οὐδὲ ἐμνήσθησαν τὰς τρίβους αὐτῆς
  english_pob_choice: nor did they remember her paths
  chosen_spanish: ni recordaron sus sendas
  alternatives_spanish:
  - ni se acordaron de sus sendas
  - ni tuvieron presentes sus sendas
  lexicon: LSJ
  rationale: ἐμνήσθησαν se traduce naturalmente por «recordaron». τρίβοι son huellas, senderos o sendas; «sendas» conserva el paralelismo poético con «camino». El posesivo plural «sus» sigue la referencia a la sabiduría personificada.
theological_decisions:
- issue: Personificación de la sabiduría
  english_pob_reading: Retain feminine reference in 'her paths'
  chosen_spanish_reading: Conservar la personificación mediante «sus sendas»
  alternative_spanish_readings:
  - sus caminos
  - sus huellas
  rationale: Aunque el español no obliga a un posesivo femenino, el contexto presenta a la sabiduría como figura personificada. «Sus sendas» mantiene esa imagen sin forzar una marca de género que el español no requiere aquí.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3, 6
- issue: Nombre geográfico problemático en el testimonio griego
  english_pob_reading: Keep 'Merran' as transliterated from the Greek source and 'Teman' in standard English form
  chosen_spanish_reading: Mantener «Merrán» como transliteración del testimonio griego y «Temán» como forma habitual
  alternative_spanish_readings:
  - normalizar el topónimo a una forma más conocida
  - omitir el nombre inusual
  rationale: El testimonio griego preserva Μερρὰν y la nota de auditoría señala que es una forma inusual. No conviene normalizarla silenciosamente; la transliteración hace visible la lectura del testimonio sin ocultar su rareza.
  doctrine_reference: PHILOSOPHY.md §What we are translating; §transparent
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail en el punto clave de μυθολόγοι, evitando «storytellers» y optando por un término más cercano al griego. También conserva la forma inusual de Μερρὰν como dato auditable, en línea con la política de transparencia del POB.
  spanish_consistency_notes:
  - Se mantiene «Agar» y «Temán» como formas españolas establecidas.
  - Se usa «sabiduría» para σοφία y «entendimiento» para σύνεσις de manera consistente con el contexto.
  - «Camino» y «sendas» preservan el contraste poético entre ὁδός y τρίβοι.
  - El verso se presenta con puntuación española y un guion largo para reflejar el paréntesis explicativo del original.
