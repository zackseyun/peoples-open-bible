  yaml_path: translation/ot/isaiah/032/014.yaml
  text: For the palace is abandoned[a], the crowded city is forsaken; Ophel and the watchtower have become caves forever, a joy for wild donkeys[c][b], a pasture for flocks.
  footnotes:
