base_translation:
  language: en
  yaml_path: translation/ot/haggai/001/012.yaml
  text: Then Zerubbabel son of Shealtiel[a], and Joshua son of Jehozadak, the high priest, and all the remnant of the people, listened to the voice of Yahweh their God and to the words of Haggai the prophet, as Yahweh their God had sent him[d][c][b]; and the people feared before Yahweh.
  footnotes:
  - marker: a
    text: Or 'heard' or 'obeyed'; the Hebrew verb can carry the sense of hearing with responsive heed.
    reason: lexical_alternative
  - marker: b
    text: Or 'the rest of the people'; 'remnant' preserves the prophetic resonance of the surviving covenant community.
    reason: lexical_alternative
  - marker: c
    text: Or 'because the LORD their God had sent him.'
    reason: alternative_reading
  - marker: d
    text: Or 'stood in awe before the LORD'; the Hebrew can express reverent fear as well as dread.
    reason: lexical_alternative
