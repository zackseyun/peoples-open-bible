translation:
  language: es
  text: El que odia la instrucción[a] no llegará a ser sabio, y es zarandeado en una tormenta como un barco.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «ley»: la palabra hebrea תורה puede significar «instrucción», «enseñanza» o «ley».'
    reason: lexical_alternative
  - marker: b
    text: La línea griega suministrada en el paquete de fuentes parece reflejar otra lectura; aquí se sigue el testimonio hebreo coherente de este versículo.
    reason: textual_variant
lexical_decisions:
- source_word: שׂוֹנֵא
  english_pob_choice: one who hates
  chosen_spanish: el que odia
  alternatives_spanish:
  - quien odia
  - el que aborrece
  lexicon: HALOT
  rationale: El participio funciona sustantivamente y describe un tipo de persona. «El que odia» conserva la fuerza activa y es natural en español moderno sin perder el matiz caracterológico.
- source_word: תוֹרָה
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - ley
  - enseñanza
  lexicon: HALOT
  rationale: En Ben Sira, תורה puede abarcar instrucción/enseñanza además de ley codificada. «Instrucción» encaja con el contexto sapiencial y mantiene abierta la amplitud semántica; «ley» se reserva como alternativa documentada.
- source_word: יֶחְכַּם
  english_pob_choice: will not become wise
  chosen_spanish: no llegará a ser sabio
  alternatives_spanish:
  - no será sabio
  - no se hará sabio
  lexicon: HALOT
  rationale: La forma verbal expresa un resultado o llegada a un estado. «No llegará a ser sabio» comunica bien el valor incoativo/resultativo en español sin sonar rígido.
- source_word: מִתְמוֹטֵט
  english_pob_choice: is tossed about
  chosen_spanish: es zarandeado
  alternatives_spanish:
  - es sacudido
  - es llevado de un lado a otro
  - es arrojado de un lado a otro
  lexicon: HALOT
  rationale: El matiz reflexivo/pasivo en el cuadro de tormenta y nave sugiere inestabilidad causada externamente. «Es zarandeado» transmite con claridad el movimiento violento e inestable en español.
- source_word: בְּמִסְעָר
  english_pob_choice: in a storm
  chosen_spanish: en una tormenta
  alternatives_spanish:
  - en un temporal
  - en la tempestad
  lexicon: HALOT
  rationale: El sustantivo designa tormenta/tempestad. «En una tormenta» es la opción más natural y clara en español contemporáneo.
- source_word: כָּאֳנִיָּה
  english_pob_choice: like a ship
  chosen_spanish: como un barco
  alternatives_spanish:
  - como una nave
  - como un navío
  lexicon: HALOT
  rationale: La comparación es directa. «Barco» es transparente y idiomático en español, y conserva la imagen sin elevar innecesariamente el registro.
theological_decisions:
- issue: Alcance de תורה en contexto sapiencial
  english_pob_reading: instruction
  chosen_spanish_reading: instrucción
  alternative_spanish_readings:
  - ley
  - enseñanza
  rationale: La línea es proverbial y ética, no un enunciado explícitamente legal. Traducir תורה como «instrucción» preserva el contexto sapiencial y evita restringir indebidamente el sentido; «ley» permanece como alternativa reconocida por la evidencia léxica.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; consistency of key terms, or documented exception'
- issue: Uso de la variante griega frente al hebreo coherente
  english_pob_reading: Translate from the Hebrew as primary while allowing the Greek ship/storm imagery to confirm the metaphorical sense of instability.
  chosen_spanish_reading: Traducir desde el hebreo como texto primario, manteniendo la imagen de inestabilidad que también apoya la tradición griega sin dejar que esa variante controle la redacción.
  alternative_spanish_readings:
  - seguir la línea griega de vigilancia y temor sobre las naciones
  - declarar la sección demasiado incierta para traducirse directamente
  rationale: El hebreo transmitido aquí es coherente y recibe alta confianza, mientras que la paralela griega citada en el paquete parece corresponder a otra línea. Por eso la traducción se apoya en el hebreo, pero la nota explica honestamente la discrepancia textual.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; por ello se mantiene la línea de trabajo previa, con el hebreo como base y la variante griega señalada solo como nota de control textual.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - «Instrucción» se usa de forma consistente para תורה en este contexto sapiencial, sin excluir «ley» como matiz alternativo.
  - 'Se mantiene el paralelismo imagen-acción del hebreo: rechazo de la instrucción -> ausencia de sabiduría -> inestabilidad en tormenta.'
  - El registro es moderno y reverente, evitando calcos duros mientras preserva la literalidad necesaria.
