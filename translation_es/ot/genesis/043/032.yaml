  - severity: low
    issue: '''a él aparte'' es comprensible, pero menos natural en español bíblico actual que una formulación con ''por separado''.'
    rationale: El hebreo repite la idea de separación. En español, 'por separado' mantiene ese énfasis y fluye mejor en la serie sintáctica triple.
