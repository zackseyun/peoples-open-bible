    changes_summary: Changed 'guilt' to 'iniquity' for closer lexical correspondence to עָוֹן; otherwise retained the draft.
translation:
  language: es
  text: ¿Por qué no comieron la ofrenda por el pecado[a] en el lugar santo? Porque es santísima, y él se la ha dado para llevar la iniquidad de la congregación, para hacer expiación por ellos delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ofrenda de purificación’. El término hebreo חַטָּאת puede referirse tanto a la ofrenda asociada con remover la impureza como a tratar el pecado.
    reason: lexical_alternative
lexical_decisions:
- source_word: מַדּוּעַ
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Por qué razón
  - ¿Cómo es que
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español; conserva el tono de reprensión de Moisés sin añadir matiz innecesario.
- source_word: אֲכַלְתֶּם
  english_pob_choice: did you not eat
  chosen_spanish: no comieron
  alternatives_spanish:
  - no han comido
  - no habéis comido
  lexicon: HALOT
  rationale: En una pregunta reprochadora, el pretérito simple transmite bien la acción esperada no realizada. Se evita una forma más rígida que suene menos natural en español.
- source_word: הַחַטָּאת
  english_pob_choice: the sin offering
  chosen_spanish: la ofrenda por el pecado[a]
  alternatives_spanish:
  - la ofrenda de purificación[a]
  - el sacrificio por el pecado[a]
  lexicon: HALOT
  rationale: En contexto sacrificial, la POB inglesa retiene 'sin offering' con nota sobre el sentido de purificación. En español, 'ofrenda por el pecado' conserva la forma tradicional y comunica la función sacrificial; la nota preserva la alternativa léxica 'ofrenda de purificación' sin borrar la tensión terminológica.
- source_word: בִּמְקוֹם הַקֹּדֶשׁ
  english_pob_choice: in the holy place
  chosen_spanish: en el lugar santo
  alternatives_spanish:
  - en el lugar sagrado
  - en el santuario
  lexicon: HALOT
  rationale: '''Lugar santo'' reproduce con claridad la ubicación cultual designada y evita confundirlo con el recinto interior específico llamado ''el Lugar Santísimo''.'
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: santísima
  alternatives_spanish:
  - santísimo
  - de santidad máxima
  lexicon: HALOT
  rationale: La superlación hebrea se vierte con el superlativo español natural aplicado a un sustantivo femenino implícito ('ofrenda'). 'Santísima' mantiene la fuerza intensiva sin sonar técnico o forzado.
- source_word: נָתַן לָכֶם
  english_pob_choice: he has given it to you
  chosen_spanish: él se la ha dado
  alternatives_spanish:
  - se les ha dado
  - él les ha dado
  lexicon: HALOT
  rationale: Se conserva el sujeto implícito como divino en contexto y se expresa el dativo de beneficio en español. El clítico doble 'se la' refleja que la ofrenda fue entregada a los sacerdotes para su uso ritual.
- source_word: לָשֵׂאת אֶת עֲוֺן הָעֵדָה
  english_pob_choice: to bear the iniquity of the congregation
  chosen_spanish: para llevar la iniquidad de la congregación
  alternatives_spanish:
  - para cargar con la iniquidad de la congregación
  - para llevar la culpa de la congregación
  lexicon: HALOT
  rationale: Se mantiene 'iniquidad' para corresponder de cerca a עָוֹן, conforme a la revisión inglesa. 'Llevar' respeta el verbo de carga/porte sin imponer un giro explicativo excesivo.
- source_word: הָעֵדָה
  english_pob_choice: the congregation
  chosen_spanish: la congregación
  alternatives_spanish:
  - la comunidad
  - la asamblea
  lexicon: HALOT
  rationale: '''Congregación'' preserva el registro formal y el sentido corporativo del pueblo reunido como entidad pactual.'
- source_word: לְכַפֵּר עֲלֵיהֶם
  english_pob_choice: to make atonement for them
  chosen_spanish: para hacer expiación por ellos
  alternatives_spanish:
  - para expiar por ellos
  - para hacer reparación por ellos
  lexicon: HALOT
  rationale: '''Hacer expiación'' comunica bien el valor cultual de כפר en español bíblico sin reemplazarlo por una paráfrasis excesiva. Se prefiere ''expiación'' a ''atonement'' como equivalente funcional y reconocido.'
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para יְהוָה como 'Yahvé', no una forma de sustitución litúrgica. 'Delante de' conserva la idea cultual de comparecer ante la presencia divina.
theological_decisions:
- issue: Designación de la ofrenda sacrificial חַטָּאת
  english_pob_reading: sin offering with a preserved lexical alternative 'purification offering'
  chosen_spanish_reading: ofrenda por el pecado, con nota de alternativa 'ofrenda de purificación'
  alternative_spanish_readings:
  - ofrenda de purificación
  - sacrificio por el pecado
  rationale: El contexto inmediato trata de una ofrenda que debía comerse en un lugar santo; la función sacrificial está clara. Sin embargo, para no borrar la tensión léxica documentada por el POB, se conserva una nota que admite el matiz de purificación del término hebreo.
  doctrine_reference: Levítico 10:17; nota léxica sobre חַטָּאת
- issue: Referencia del sujeto implícito de נָתַן
  english_pob_reading: he has given it to you, referring contextually to God
  chosen_spanish_reading: él se la ha dado, con referencia implícita a Dios
  alternative_spanish_readings:
  - se les ha dado
  - les ha sido dada
  rationale: El hebreo omite el sujeto explícito, pero el contexto sacerdotal y la voz de Moisés apuntan a Dios como dador. Se expresa ese sujeto implícito sin expandir la frase más allá del alcance del texto.
  doctrine_reference: Levítico 10:17; teología del don cultual divino
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió 'iniquity' frente a 'guilt' para עָוֹן. En español se refleja esa decisión con 'iniquidad'. También se conserva la alternativa léxica de חַטָּאת mediante nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene Yahvé conforme al estándar del proyecto para יְהוָה.
  - Se usa 'ofrenda por el pecado' en el texto principal, con nota que preserva la alternativa de 'ofrenda de purificación'.
  - Se prefiere 'expiación' para כפר por su valor técnico-cultual y su naturalidad en español bíblico.
  - Se conserva 'la congregación' para הָעֵדָה por coherencia con la terminología pactual del proyecto.
  - No se emplea 'SEÑOR' como sustituto del nombre divino.
