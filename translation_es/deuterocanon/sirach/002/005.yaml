    issue: La nota [a] está anclada en «fuego» en vez de en la segunda línea problemática.
    rationale: La nota explica una dificultad del hebreo en la segunda cola («בְּכוּר עֹנִי»), no el término «fuego». El marcador debe aparecer junto al segmento relevante para una auditoría clara.
  - severity: medium
    issue: «hombres aceptables» es una formulación poco natural y potencialmente ambigua en español.
    rationale: Aunque calca bastante de cerca el inglés revisado, en español «aceptable» suele sugerir ‘suficiente’ o ‘tolerable’. El sentido documentado por el griego δεκτοί y por la explicación auditada apunta mejor a «aceptados» o «aprobados».
  - severity: low
    issue: «Porque» puede sonar menos proverbial que «Pues» en este contexto sapiencial.
    rationale: No es un error de fidelidad, pero «Pues» encaja mejor con el tono aforístico y la conexión discursiva sin perder significado.
  revised_spanish_text: Pues el oro es probado en el fuego, y los hombres aceptados[a] en el horno de la aflicción.
