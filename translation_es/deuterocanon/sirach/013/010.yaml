translation:
  language: es
  text: No te acerques, para que no seas rechazado[a]; y no te mantengas lejos, para que no seas odiado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo transmitido es difícil en esta cláusula; el paralelo griego apoya la idea de ser repelido o rechazado al acercarse demasiado.
    reason: textual_variant
  - marker: b
    text: 'Griego: «para que no seas olvidado» o «descuidado» en la segunda cláusula, en lugar del hebreo «para que no seas odiado». El texto principal sigue al testimonio hebreo conservado; el griego sugiere una consecuencia más suave que encaja con el contexto social.'
    reason: alternative_reading
lexical_decisions:
- source_word: אַל תִּתְקָרֵב
  english_pob_choice: Do not draw near
  chosen_spanish: No te acerques
  alternatives_spanish:
  - No te pongas cerca
  - No te aproximes
  lexicon: HALOT
  rationale: El verbo hebreo expresa una advertencia de acercamiento relacional y espacial; en español, «acercarse» conserva ese matiz y suena natural en un proverbio sapiencial.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: En español bíblico actual, «para que no» comunica con claridad la finalidad de evitar una consecuencia, sin perder el valor preventivo de פן.
- source_word: תִּתְרַחֵק
  english_pob_choice: you be pushed away
  chosen_spanish: seas rechazado
  alternatives_spanish:
  - seas apartado
  - seas apartado con violencia
  - seas empujado fuera
  lexicon: HALOT; Greek ἀπωσθῇς
  rationale: El hebreo transmitido es difícil; el paralelo griego sugiere ser repelido o echado atrás. «Seas rechazado» expresa esa idea en español con dignidad y sin forzar una imagen física demasiado literal.
- source_word: וְאַל תִּתְרַחֵק
  english_pob_choice: and do not stay far off
  chosen_spanish: y no te mantengas lejos
  alternatives_spanish:
  - y no te alejes
  - y no guardes distancia
  lexicon: HALOT
  rationale: La repetición del mismo radical en hebreo sostiene el contraste entre acercarse y mantenerse distante. «Mantenerse lejos» conserva la antítesis y el tono exhortativo.
- source_word: תִּשָּׂנֵא
  english_pob_choice: you be hated
  chosen_spanish: seas odiado
  alternatives_spanish:
  - seas aborrecido
  - te tomen odio
  lexicon: HALOT
  rationale: El hebreo apoya el sentido fuerte de «ser odiado». Aunque el griego paralelo sugiere «ser olvidado/descuidado», la lectura principal sigue al testimonio hebreo y deja constancia de la tensión en una nota.
theological_decisions:
- issue: Tensión entre el hebreo conservado y el paralelo griego en la última cláusula
  english_pob_reading: The main text follows surviving Hebrew witness; the Greek suggests a softer consequence that fits the social setting.
  chosen_spanish_reading: 'El texto principal sigue al hebreo: «seas odiado»; la alternativa griega queda registrada como posibilidad de «ser olvidado o descuidado».'
  alternative_spanish_readings:
  - seas olvidado
  - seas descuidado
  - seas rechazado
  rationale: No se debe borrar la discrepancia entre testigos. El hebreo transmite una consecuencia social fuerte; el griego permite una lectura más suave. La nota preserva ambas sin resolver artificialmente la tensión.
  doctrine_reference: Principios de crítica textual y transparencia editorial de la POB
translation_notes:
  revision_awareness: Se ha seguido el estado editorial más reciente sin introducir cambios respecto al control de revisión indicado; la versión conserva la tensión textual hebreo-griego y la expresa en español con notas breves y auditablemente alineadas con el expediente inglés.
  spanish_consistency_notes:
  - Se usa «acercarse» para אַל תִּתְקָרֵב por su valor relacional y proverbial.
  - Se mantiene «odiar» para תִּשָּׂנֵא porque el hebreo conservado es más fuerte que el paralelo griego.
  - Las notas distinguen entre la cláusula textual difícil y la alternativa griega sin mezclar ambos problemas.
  - El registro es bíblico actual, sobrio y apto para publicación.
