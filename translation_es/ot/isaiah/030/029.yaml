translation:
  language: es
  text: El canto será para ustedes como en la noche en que se consagra una fiesta[a], y la alegría de corazón como quien va con flauta[b] para venir al monte de Yahvé[c], a la Roca de Israel[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como en la noche de una fiesta consagrada». El hebreo puede referirse específicamente a la noche de un festival, probablemente en un contexto de peregrinación.'
    reason: alternative_reading
  - marker: b
    text: 'O: «con flauta» o «con música de flauta». El sustantivo hebreo designa un instrumento de viento usado en procesiones festivas.'
    reason: lexical_alternative
  - marker: c
    text: El nombre divino יְהוָה se traduce aquí como «Yahvé», en lugar de sustituirlo por un título como «el Señor».
    reason: alternative_reading
  - marker: d
    text: 'O: «a la Roca de Israel». «Roca» es un título divino que enfatiza fortaleza y refugio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשִּׁיר
  english_pob_choice: the song
  chosen_spanish: el canto
  alternatives_spanish:
  - la canción
  - el canto
  lexicon: HALOT
  rationale: El hebreo con artículo señala algo concreto y conocido en el contexto; en español, 'canto' conserva mejor el tono poético y litúrgico que 'canción'.
- source_word: יִהְיֶה לָכֶם
  english_pob_choice: will be for you
  chosen_spanish: será para ustedes
  alternatives_spanish:
  - será para ustedes
  - les pertenecerá
  lexicon: HALOT
  rationale: La expresión idiomática hebrea comunica experiencia o posesión para el pueblo; 'será para ustedes' mantiene esa estructura sin forzarla.
- source_word: כְּלֵיל הִתְקַדֶּשׁ חָג
  english_pob_choice: as in the night when a feast is consecrated
  chosen_spanish: como en la noche en que se consagra una fiesta
  alternatives_spanish:
  - como en la noche en que se consagra una fiesta
  - como en la noche en que una fiesta es santificada
  - como en la noche de la consagración de una fiesta
  lexicon: HALOT
  rationale: El comparativo כ y la construcción verbal indican una comparación con una noche concreta asociada al acto de consagrar una festividad. 'Consagra' mantiene el matiz cultual sin explicitar más de lo que el hebreo dice.
- source_word: חָג
  english_pob_choice: feast
  chosen_spanish: fiesta
  alternatives_spanish:
  - fiesta
  - festividad
  - fiesta sagrada
  lexicon: HALOT
  rationale: '''Fiesta'' es la opción más natural en español para un día religioso de celebración. ''Festividad'' sería posible, pero ''fiesta'' mejor conserva el carácter celebratorio y culto.'
- source_word: וְשִׂמְחַת לֵבָב
  english_pob_choice: and gladness of heart
  chosen_spanish: y la alegría de corazón
  alternatives_spanish:
  - y la alegría de corazón
  - y el gozo de corazón
  lexicon: HALOT
  rationale: La frase nominal hebrea expresa un estado interior; 'alegría de corazón' preserva el paralelismo y el valor antropológico de לֵבָב.
- source_word: כַּהוֹלֵךְ בֶּחָלִיל
  english_pob_choice: as when one goes with the flute
  chosen_spanish: como el que va con flauta
  alternatives_spanish:
  - como el que va con flauta
  - como quien va con flauta
  - como el que marcha con flauta
  lexicon: HALOT
  rationale: El participio comparativo se vierte con una construcción natural en español. 'Flauta' sigue la equivalencia léxica del instrumento y evita el calco 'con el flauta'.
- source_word: לָבוֹא
  english_pob_choice: to come
  chosen_spanish: para venir
  alternatives_spanish:
  - para venir
  - para llegar
  - para ir
  lexicon: HALOT
  rationale: El infinitivo indica dirección y propósito de movimiento hacia el lugar de culto; 'venir' respeta esa orientación desde la perspectiva del peregrino.
- source_word: בְהַר יְהוָה
  english_pob_choice: to the mountain of Yahweh
  chosen_spanish: al monte de Yahvé
  alternatives_spanish:
  - al monte de Yahvé
  - al monte de Yahveh
  - al monte del SEÑOR
  lexicon: HALOT
  rationale: La traducción adopta el nombre divino 'Yahvé' según el criterio del proyecto. 'Monte' es más natural en español bíblico que 'montaña' en este contexto de Sion.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino como transliteración tradicional del Tetragrámaton, conforme al estándar del proyecto en español.
- source_word: אֶל צוּר יִשְׂרָאֵל
  english_pob_choice: to the Rock of Israel
  chosen_spanish: al Roca de Israel
  alternatives_spanish:
  - a la Roca de Israel
  - al Roca de Israel
  - a la Roca de Israel
  lexicon: HALOT
  rationale: צוּר funciona aquí como título divino metafórico. Aunque 'roca' es femenino en español, se conserva el uso titular del original; por eso se mantiene 'Roca de Israel' con artículo masculino por la construcción preposicional fija 'al'.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Yahveh
  rationale: El hebreo usa el Tetragrámaton directamente. En español del proyecto se conserva el nombre divino como 'Yahvé', en vez de sustituirlo por un título como 'Señor', para preservar la referencia personal del texto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Cultic sense of הִתְקַדֶּשׁ חָג
  english_pob_reading: when a feast is consecrated
  chosen_spanish_reading: en que se consagra una fiesta
  alternative_spanish_readings:
  - en que se consagra una fiesta
  - en que una fiesta es santificada
  - de la consagración de una fiesta
  rationale: La frase puede leerse como una noche asociada a la dedicación cultual de una festividad. 'Se consagra' conserva ese valor sin trasladarlo a una terminología doctrinal posterior.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve theological tension rather than resolve it'
- issue: Title metaphor צוּר יִשְׂרָאֵל
  english_pob_reading: the Rock of Israel
  chosen_spanish_reading: la Roca de Israel
  alternative_spanish_readings:
  - la Roca de Israel
  - el Roca de Israel
  rationale: Se conserva el título metafórico de Dios como 'Roca', que expresa firmeza y refugio. En español, la forma más natural y fiel al título es 'la Roca de Israel'.
  doctrine_reference: DOCTRINE.md on divine metaphors and title preservation
translation_notes:
  revision_awareness: La redacción sigue de cerca el análisis del hebreo y coincide con la última revisión auditada, que no requirió cambios. Se conservaron las dos comparaciones del versículo, el matiz cultual de la consagración de la fiesta y el título divino final como metáfora estable.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - 'Se mantuvo el paralelismo poético con dos comparaciones: una ligada a la noche festiva y otra al acompañamiento con flauta.'
  - «Roca de Israel» conserva el título metafórico de צ֥וּר יִשְׂרָאֵל sin reinterpretarlo.
  - Se evitó suavizar «consagra» en una generalización como «celebra», para respetar la carga cultual del hebreo.
