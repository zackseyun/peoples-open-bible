translation:
  language: es
  text: 'Y vi mucha comida[a], y dije a mi hijo: «Ve y trae a cualquiera de nuestros hermanos[b] que halles necesitado y que recuerde al Señor; y he aquí[c], aquí me quedaré esperándote».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muchos platos» o «mucha carne»; el término griego se refiere a comida preparada servida en una comida.
    reason: lexical_alternative
  - marker: b
    text: «Nuestros hermanos» aquí significa los miembros del pueblo de Tobit, no solo hermanos literales.
    reason: cultural_note
  - marker: c
    text: Las palabras finales son torpes en la tradición manuscrita griega; el sentido es que Tobit se queda esperando el regreso de su hijo.
    reason: textual_variant
lexical_decisions:
- source_word: ἐθεασάμην
  english_pob_choice: I saw
  chosen_spanish: vi
  alternatives_spanish:
  - miré
  - contemplé
  lexicon: LSJ
  rationale: El aoristo medio de θεάομαι funciona aquí como verbo de percepción. «Vi» es el equivalente natural y directo en español, sin introducir solemnidad innecesaria ni alterar el orden narrativo.
- source_word: ὄψα πολλά
  english_pob_choice: much food
  chosen_spanish: mucha comida
  alternatives_spanish:
  - muchos platos
  - mucha carne
  - muchas provisiones
  lexicon: LSJ
  rationale: ὄψα/ὄψον se refiere a comida preparada o acompañamiento de una mesa. «Mucha comida» conserva la amplitud semántica y evita especificar indebidamente el tipo de alimento.
- source_word: Βάδισον
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Ponte en camino
  lexicon: LSJ
  rationale: El imperativo de βαδίζω se expresa de manera natural en español con «Ve». «Anda» o «ponte en camino» serían posibles, pero menos directos para este mandato.
- source_word: ἄγαγε
  english_pob_choice: bring
  chosen_spanish: trae
  alternatives_spanish:
  - llévalo
  - conduce
  lexicon: LSJ
  rationale: En este contexto, Tobit manda a su hijo a traer a un hombre necesitado a la casa. «Trae» reproduce bien el valor imperativo de ἄγω sin sonar artificial.
- source_word: ὃν ἐὰν εὕρῃς
  english_pob_choice: whichever one ... you may find
  chosen_spanish: a cualquiera ... que halles
  alternatives_spanish:
  - a quienquiera ... que halles
  - a cualquiera ... que encuentres
  lexicon: LSJ
  rationale: La relativa con ἐάν expresa indefinición. «A cualquiera ... que halles» preserva ese sentido abierto y funciona bien con la construcción española.
- source_word: τῶν ἀδελφῶν ἡμῶν
  english_pob_choice: of our brothers
  chosen_spanish: de nuestros hermanos
  alternatives_spanish:
  - de nuestros compatriotas
  - de nuestra gente
  - de nuestros hermanos de raza
  lexicon: LSJ
  rationale: ἀδελφοί aquí apunta a los miembros de la comunidad del pueblo de Tobit, pero el texto mantiene el término de parentesco. «Nuestros hermanos» conserva esa forma y su fuerza comunitaria sin neutralizarla.
- source_word: ἐνδεής
  english_pob_choice: in need
  chosen_spanish: necesitado
  alternatives_spanish:
  - pobre
  - menesteroso
  - falto de
  lexicon: LSJ
  rationale: ἐνδεής denota carencia o necesidad. «Necesitado» es claro en español y no restringe el sentido solo a pobreza económica.
- source_word: ὃς μέμνηται τοῦ κυρίου
  english_pob_choice: who remembers the Lord
  chosen_spanish: que recuerde al Señor
  alternatives_spanish:
  - que sea fiel al Señor
  - que tenga presente al Señor
  lexicon: LSJ
  rationale: μέμνηται expresa memoria o atención persistente. «Que recuerde al Señor» sigue de cerca el griego y mantiene el criterio piadoso de Tobit. «Señor» se usa aquí porque el texto griego dice κύριος, no el nombre divino hebreo.
- source_word: ἰδοὺ μένω σε
  english_pob_choice: behold, I am waiting for you
  chosen_spanish: he aquí, te estoy esperando
  alternatives_spanish:
  - mira, te espero
  - y estoy esperando por ti
  lexicon: LSJ
  rationale: La frase griega es algo abrupta en la tradición manuscrita. «He aquí, te estoy esperando» conserva ἰδού con un registro formal y expresa con claridad que Tobit permanece aguardando a su hijo.
theological_decisions:
- issue: Renderización de κύριος en una formulación piadosa dentro de Tobit
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el SEÑOR
  rationale: Aquí el griego usa κυρίου. La convención del proyecto para κύριος en griego es «Señor»; no se sustituye por «Yahvé» porque esa es la forma reservada para el nombre divino hebreo cuando el testimonio fuente lo sustenta directamente.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Alcance de τῶν ἀδελφῶν ἡμῶν
  english_pob_reading: our brothers
  chosen_spanish_reading: nuestros hermanos
  alternative_spanish_readings:
  - nuestros compatriotas
  - nuestro pueblo
  - nuestros correligionarios
  rationale: La referencia probable es a los miembros del pueblo pactal de Tobit, no solo a hermanos biológicos. Sin embargo, el griego conserva la forma masculina de parentesco, y la traducción la mantiene para no diluir el término fuente.
  doctrine_reference: DOCTRINE.md §4 Gender-accurate over gender-neutral
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del expediente inglés: se mantuvo la decisión formal y se reflejó ἰδού con una fórmula más solemne que «mira». También se preservó la tensión textual del cierre griego, entendiendo la frase como una afirmación de espera.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος, conforme al criterio del proyecto para el griego, sin introducir «Yahvé» donde el nombre divino no aparece en el testimonio base.
  - Se mantiene «hermanos» para ἀδελφοί por fidelidad al léxico del original, aunque el sentido sea comunitario.
  - La frase final se traduce de forma natural en español pero conserva la idea de permanencia/espera que refleja el griego y su tradición textual problemática.
