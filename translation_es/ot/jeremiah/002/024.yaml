translation:
  language: es
  text: Un asno salvaje, acostumbrado al desierto[a], en el anhelo de su apetito olfatea el viento; en su celo, ¿quién puede hacerla volver? Todos los que la buscan no se cansarán[b]; en su mes la encontrarán[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «habituado al desierto». El hebreo describe a un animal hecho a la vida en terreno árido.
    reason: lexical_alternative
  - marker: b
    text: O «no se fatigarán». El hebreo dice literalmente «no se cansarán», es decir, no necesitarán agotarse en la búsqueda.
    reason: lexical_alternative
  - marker: c
    text: Literalmente «en su mes», probablemente el tiempo de su celo o de su ciclo de apareamiento.
    reason: cultural_note
lexical_decisions:
- source_word: פֶּרֶה
  english_pob_choice: wild donkey
  chosen_spanish: asno salvaje
  alternatives_spanish:
  - burro salvaje
  - asna salvaje
  lexicon: HALOT
  rationale: El término designa al onagro o asno salvaje. «Asno salvaje» conserva el sentido zoológico claro en español y evita la ambigüedad coloquial de «burro». Aunque el referente metafórico es femenino más adelante, el sustantivo genérico puede funcionar en español sin perder fidelidad.
- source_word: לִמֻּד מִדְבָּר
  english_pob_choice: accustomed to the wilderness
  chosen_spanish: acostumbrado al desierto
  alternatives_spanish:
  - adiestrado para el desierto
  - hecho al desierto
  lexicon: HALOT
  rationale: La forma describe un animal habituado a vivir en zona árida. «Acostumbrado al desierto» comunica bien la adaptación estable, de manera natural en español, sin forzar la idea de entrenamiento.
- source_word: בְּאַוַּת נַפְשׁוֹ
  english_pob_choice: in the craving of her appetite
  chosen_spanish: en el anhelo de su apetito
  alternatives_spanish:
  - en el deseo de su alma
  - en su deseo vehemente
  lexicon: HALOT
  rationale: El hebreo expresa deseo intenso; la POB inglesa lo vierte con un giro que conserva el impulso apetitivo. En español, «anhelo de su apetito» mantiene la fuerza del deseo sin reducirlo de entrada a un matiz exclusivamente sexual.
- source_word: שָׁאֲפָה רוּחַ
  english_pob_choice: sniffs the wind
  chosen_spanish: olfatea el viento
  alternatives_spanish:
  - sniffea el viento
  - aspira el viento
  lexicon: HALOT
  rationale: El modismo retrata al animal inhalando/percibiendo el aire con urgencia. «Olfatea el viento» es natural en español y conserva la imagen de rastreo ansioso que la POB documenta.
- source_word: תַּאֲנָתָהּ
  english_pob_choice: in her heat
  chosen_spanish: en su celo
  alternatives_spanish:
  - en su rastrojo
  - en su época de celo
  lexicon: HALOT
  rationale: El sustantivo alude al estado o período de celo sexual. «En su celo» es la forma más concisa y precisa en español; además, mantiene el valor zoológico de la metáfora sin suavizarlo.
- source_word: מִי יְשִׁיבֶנָּה
  english_pob_choice: who can turn her back?
  chosen_spanish: ¿quién puede volverla?
  alternatives_spanish:
  - ¿quién puede hacerla volver?
  - ¿quién puede detenerla?
  lexicon: HALOT
  rationale: El hifil de שוב puede significar «hacer volver / volver atrás». En contexto la pregunta es retórica sobre la imposibilidad de desviarla; «volverla» conserva la brevedad del hebreo y el juego de retorno.
- source_word: כָּל מְבַקְשֶׁיהָ לֹא יִיעָפוּ
  english_pob_choice: All who seek her will not weary themselves
  chosen_spanish: Todos los que la buscan no se cansarán
  alternatives_spanish:
  - Todos los que la buscan no se fatigarán
  - Todos sus buscadores no se agotarán
  lexicon: HALOT
  rationale: בקשׁ significa buscar o procurar. «No se cansarán» refleja el sentido de no fatigarse en la búsqueda; es más idiomático que una traducción mecánica y sigue de cerca la lógica de la POB.
- source_word: בְּחָדְשָׁהּ
  english_pob_choice: in her month
  chosen_spanish: en su mes
  alternatives_spanish:
  - en el mes de su celo
  - en el mes de ella
  lexicon: HALOT
  rationale: La expresión es literalmente «en su mes» y probablemente alude al tiempo de celo o apareamiento. Se mantiene la literalidad en el texto principal para conservar la tensión léxica, dejando la explicación implícita en el contexto y en la nota.
- source_word: יִמְצָאוּנְהָ
  english_pob_choice: they will find her
  chosen_spanish: la encontrarán
  alternatives_spanish:
  - la hallarán
  - encontrarán a la hembra
  lexicon: HALOT
  rationale: El verbo es un futuro simple; «la encontrarán» es natural y directo en español. Se evita una formulación más pesada que debilitaría el ritmo del verso.
theological_decisions:
- issue: Metáfora animal aplicada a Judá con referentes gramaticales mixtos
  english_pob_reading: The POB smooths the animal image with feminine reference ('her') while preserving the one anomalous masculine-looking suffix in the source through the phrase 'her appetite'.
  chosen_spanish_reading: Se mantiene el referente femenino en el conjunto de la imagen («su apetito», «su celo», «la buscan», «la encontrarán»), sin intentar reproducir una rareza morfológica que confundiría al lector español.
  alternative_spanish_readings:
  - Conservar un resto masculino en alguna frase para reflejar el sufijo de נַפְשׁוֹ
  - Neutralizar por completo la personificación
  rationale: El contexto convierte a Judá en una hembra animal en celo; la coherencia de la metáfora es más importante para el lector que una oscilación formal aislada. Esto sigue la lectura documentada por la POB y evita oscurecer el pasaje.
  doctrine_reference: Translation philosophy §5-6 (consistencia documentada y legibilidad moderna)
- issue: Doble sentido de תַּאֲנָה/תַּאֲנָתָהּ como celo animal
  english_pob_reading: '''in her heat'' with a note allowing ''rut'' or ''lust''.'
  chosen_spanish_reading: «En su celo» con nota que reconoce que el término refiere al período/estado de excitación sexual animal.
  alternative_spanish_readings:
  - «en su rut»
  - «en su lust»
  - «en su pasión»
  rationale: En español «celo» es el término zoológico más natural y preciso. La nota preserva la tensión semántica sin sexualizar en exceso ni desanimalizar el hebreo.
  doctrine_reference: Translation philosophy §6 (claridad moderna) y §5 (tensión léxica documentada)
translation_notes:
  revision_awareness: La POB inglesa fue revisada mínimamente para quitar una coma innecesaria después de 'donkey'; el contenido y las decisiones léxicas se mantuvieron estables. La versión española sigue esa lectura final estable, conservando la misma estructura y las mismas notas explicativas esenciales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se usa un registro moderno y digno, evitando arcaísmos innecesarios.
  - Se conserva la imagen zoológica sin sustituirla por un eufemismo teológico.
  - Las notas a, b y c corresponden a alternativas léxicas/culturales documentadas y no a variantes textuales.
