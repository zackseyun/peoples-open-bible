    issue: «fortaleciéndose» debilita el valor verbal principal de ἐνίσχυσαν
    rationale: 'El griego usa un aoristo principal coordinado con «no se apartaron»; en español conviene un verbo finito: «se fortalecieron» o «cobraron ánimo».'
  - severity: medium
    issue: Falta la nota cultural equivalente a la del POB inglés sobre las listas de registro
    rationale: El inglés documenta explícitamente que se trata de registros oficiales usados en el contexto opresivo; esa información debe preservarse en nota.
  - severity: low
    issue: La nota [a] no corresponde a la alternativa significativa del audit trail inglés
    rationale: El inglés ofrece una alternativa de estructura/sentido más amplia, no solo «la mayor parte de ellos».
  - severity: low
    issue: «registros de empadronamiento» suena demasiado administrativo-moderno
    rationale: Aunque es entendible, «listas de registro» refleja mejor ἀπογραφαί en un contexto antiguo y bíblico sin evocar un padrón municipal contemporáneo.
