translation:
  language: es
  text: Y celebraron la Fiesta de las Cabañas[a], como está mandado en la ley, y ofrecieron sacrificios día tras día, como correspondía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «Fiesta de los Tabernáculos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγάγοσαν
  english_pob_choice: they kept
  chosen_spanish: celebraron
  alternatives_spanish:
  - observaron
  - guardaron
  - celebraron la fiesta
  lexicon: LSJ
  rationale: Con una fiesta, el verbo griego expresa su celebración/observancia. En español, «celebraron» suena natural y conserva el sentido de celebración festiva sin perder el valor de cumplimiento.
- source_word: τὴν τῆς σκηνοπηγίας ἑορτήν
  english_pob_choice: the Feast of Booths
  chosen_spanish: la Fiesta de las Cabañas
  alternatives_spanish:
  - la Fiesta de los Tabernáculos
  - la fiesta de las tiendas
  - la Fiesta de las Enramadas
  lexicon: LSJ
  rationale: σκηνοπηγία alude a cabañas/chozas levantadas para la festividad. «Cabañas» mantiene la imagen concreta y sigue la preferencia POB por transparencia semántica; se conserva la mayúscula por tratarse de nombre de fiesta.
- source_word: ὡς ἐπιτέτακται
  english_pob_choice: as it is commanded
  chosen_spanish: como está mandado
  alternatives_spanish:
  - como ha sido mandado
  - como está prescrito
  - según se ha mandado
  lexicon: BDAG
  rationale: El perfecto pasivo comunica una orden vigente. «Está mandado» recoge bien esa fuerza normativa en español actual, sin sobrecargar con perífrasis más pesadas.
- source_word: ἐν τῷ νόμῳ
  english_pob_choice: in the law
  chosen_spanish: en la ley
  alternatives_spanish:
  - en la Ley
  - según la ley
  - dentro de la ley
  lexicon: BDAG
  rationale: La expresión ubica la prescripción dentro del corpus legal. «Ley» funciona de manera clara y natural en español; se evita una capitalización interpretativa innecesaria.
- source_word: θυσίας
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas
  - sacrificios rituales
  lexicon: BDAG
  rationale: θυσίαι se refiere de forma directa a sacrificios/ofrendas sacrificiales. «Sacrificios» es la correspondencia más inmediata y fiel.
- source_word: καθ’ ἡμέραν
  english_pob_choice: day by day
  chosen_spanish: día tras día
  alternatives_spanish:
  - cada día
  - diariamente
  lexicon: BDAG
  rationale: La frase distributiva enfatiza repetición continua. «Día tras día» conserva mejor ese matiz iterativo que un adverbio más plano.
- source_word: ὡς προσῆκον ἦν
  english_pob_choice: as was fitting
  chosen_spanish: como era conveniente
  alternatives_spanish:
  - como era apropiado
  - como era debido
  - como correspondía
  lexicon: LSJ
  rationale: La expresión señala lo adecuado o conveniente en la circunstancia. «Conveniente» reproduce bien el matiz de adecuación sin convertirlo en una obligación legal distinta de la que ya expresó la cláusula anterior.
theological_decisions:
- issue: Nombre de la festividad σκηνοπηγία y su relación con la tradición litúrgica
  english_pob_reading: Feast of Booths, with a footnote noting the traditional 'feast of Tabernacles.'
  chosen_spanish_reading: Fiesta de las Cabañas, con nota sobre la forma tradicional «Fiesta de los Tabernáculos».
  alternative_spanish_readings:
  - Fiesta de los Tabernáculos
  - Fiesta de las Enramadas
  rationale: La decisión sigue la primacía del dato léxico griego y preserva la imagen concreta de viviendas temporales. La forma tradicional puede mantenerse como alternativa de recepción eclesial, pero no debe desplazar la transparencia del original.
  doctrine_reference: 'Principio POB: primacía del texto fuente y transparencia léxica sobre la fórmula litúrgica tradicional cuando no hay impedimento doctrinal.'
translation_notes:
  revision_awareness: El inglés POB revisó la capitalización a «Feast of Booths» como nombre de fiesta y mantuvo el resto por precisión y naturalidad. En español se refleja ese mismo estatus nominal con mayúscula inicial en «Fiesta de las Cabañas», conservando la alternativa tradicional en nota.
  spanish_consistency_notes:
  - Se mantuvo «ley» en minúscula porque el griego no distingue capitalización y aquí funciona como referencia descriptiva a la norma.
  - Se eligió «sacrificios» y no «ofrendas» para mantener la fuerza sacrificial de θυσίας.
  - «Día tras día» preserva la repetición distributiva de καθ’ ἡμέραν.
  - La nota alternativa responde a la tradición eclesial sin ocultar la imagen concreta del término griego.
