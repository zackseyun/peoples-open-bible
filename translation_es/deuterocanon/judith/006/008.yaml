translation:
  language: es
  text: y no perecerá hasta que tú seas destruido[a] con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seas totalmente destruido»; la forma griega intensifica la destrucción.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  lexicon: BDAG
  rationale: La conjunción es coordinante; «y» conserva la unión simple del griego sin introducir contraste que el texto no exige.
- source_word: οὐκ ἀπολῇ
  english_pob_choice: will perish
  chosen_spanish: no perecerá
  alternatives_spanish:
  - no será destruido
  - no morirá
  lexicon: BDAG
  rationale: ἀπόλλυμι en sentido intransitivo expresa perderse/venir a ruina; «perecerá» mantiene ese matiz mejor que una pasiva más transitiva como «será destruido».
- source_word: ἕως οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  lexicon: BDAG
  rationale: La locución temporal se rinde de forma natural con «hasta que», que preserva la relación temporal directa del griego.
- source_word: ἐξολεθρευθῇς
  english_pob_choice: you are destroyed
  chosen_spanish: seas destruido
  alternatives_spanish:
  - seas totalmente destruido
  - seas exterminado
  lexicon: BDAG
  rationale: ἐξολεθρεύω intensifica la destrucción; «destruido» es claro y bíblico en español, y la forma ampliada queda implícita por el contexto sin forzar una paráfrasis.
- source_word: μετʼ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: BDAG
  rationale: La idea de compañía/acompanhamiento se expresa de manera directa y natural con «con ellos».
theological_decisions:
- issue: Alcance de la destrucción expresada por ἐξολεθρευθῇς
  english_pob_reading: you are destroyed / utterly destroyed
  chosen_spanish_reading: seas destruido
  alternative_spanish_readings:
  - seas totalmente destruido
  - seas exterminado
  rationale: El POB inglés conserva la tensión entre «destroyed» y la alternativa intensificada «utterly destroyed». En español, «destruido» mantiene la base semántica sin decidir de antemano entre destrucción simple o total; la intensidad queda disponible en la nota.
  doctrine_reference: Lexical force of ἐξολεθρεύω; no doctrinal claim
- issue: Relación temporal y de simultaneidad en el cierre de la cláusula
  english_pob_reading: until you are destroyed with them
  chosen_spanish_reading: hasta que seas destruido con ellos
  alternative_spanish_readings:
  - hasta que tú seas destruido con ellos
  rationale: La lectura mantiene la dependencia temporal del evento sin añadir interpretación causal o moral. La segunda persona se conserva explícita para reflejar el griego.
  doctrine_reference: Temporal syntax; no doctrinal claim
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas; el pasaje fuente permanece estable en el control auditado más reciente.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparece el nombre divino; aquí no aparece un equivalente directo, así que no aplica.
  - Se conserva un registro sobrio y bíblico, evitando el calco rígido pero sin expandir el sentido del verso.
  - 'Se mantiene la alternancia terminológica exigida por el griego: ἀπόλλυμι → «perecer» y ἐξολεθρεύω → «destruido» con nota de intensidad.'
