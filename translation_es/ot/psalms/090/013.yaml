translation:
  language: es
  text: Vuelve, Yahvé—¿hasta cuándo? Y ten compasión[a] de tus siervos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reléntate en cuanto a tus siervos».'
