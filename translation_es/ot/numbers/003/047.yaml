translation:
  language: es
  text: Tomarás cinco siclos cada uno[a], según el siclo del santuario[b]; el siclo equivale a veinte geras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'cinco siclos por cabeza'.
    reason: lexical_alternative
  - marker: b
    text: Es decir, conforme al peso estándar del santuario; un siclo equivalía a veinte geras.
    reason: cultural_note
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: you shall take
  chosen_spanish: Tomarás
  alternatives_spanish:
  - Y tomarás
  - Deberás tomar
  lexicon: HALOT
  rationale: El hebreo en contexto instructivo funciona como mandato/futuro exhortativo. En español, el futuro simple expresa bien esa fuerza normativa sin añadir una paráfrasis innecesaria.
- source_word: חֲמֵשֶׁת חֲמֵשֶׁת שְׁקָלִים
  english_pob_choice: five shekels apiece
  chosen_spanish: cinco siclos
  alternatives_spanish:
  - cinco siclos cada uno
  - cinco siclos por cabeza
  lexicon: HALOT
  rationale: La repetición distributiva indica una suma para cada individuo. En español, la idea distributiva queda naturalmente reforzada por la frase siguiente 'por cabeza'; por eso no se repite de modo pesado.
- source_word: לַגֻּלְגֹּלֶת
  english_pob_choice: apiece
  chosen_spanish: por cabeza
  alternatives_spanish:
  - por persona
  - por cada cabeza
  - por cada uno
  lexicon: HALOT
  rationale: El sentido literal es 'por cabeza/cráneo', es decir, por individuo. 'Por cabeza' conserva la imagen idiomática y la fuerza distributiva mejor que una mera equivalencia abstracta.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: by the shekel of the sanctuary
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - por el siclo del santuario
  - según el siclo sagrado
  lexicon: HALOT
  rationale: La frase especifica el patrón de peso/valor que debe usarse. 'Según' comunica la norma medida por ese estándar, y 'santuario' mantiene la referencia cultual sin volverla una denominación técnica opaca.
- source_word: תִּקָּח
  english_pob_choice: the shekel is
  chosen_spanish: el siclo equivale a
  alternatives_spanish:
  - el siclo es
  - se toma
  lexicon: HALOT
  rationale: Aunque la forma verbal puede leerse como mandato, en este contexto introduce una aclaración del valor del siclo. 'Equivale a' reproduce mejor esa función explicativa en español que una repetición literal del verbo.
- source_word: עֶשְׂרִים גֵּרָה
  english_pob_choice: twenty gerahs
  chosen_spanish: veinte geras
  alternatives_spanish:
  - veinte gerah
  - veinte gerás
  lexicon: HALOT
  rationale: Se conserva el término técnico 'gera' como medida monetaria/pesos, pluralizado en español como nombre contable natural después de un numeral.
- source_word: הַשָּׁקֶל
  english_pob_choice: the shekel
  chosen_spanish: el siclo
  alternatives_spanish:
  - el shekel
  - el siclo estándar
  lexicon: HALOT
  rationale: Se mantiene 'siclo' como término de peso familiar en español bíblico, consistente con la primera mención y con la explicación de su equivalencia.
theological_decisions:
- issue: Norma cultual del peso estándar
  english_pob_reading: by the shekel of the sanctuary; the shekel is twenty gerahs
  chosen_spanish_reading: según el siclo del santuario; el siclo equivale a veinte geras
  alternative_spanish_readings:
  - por el siclo del santuario
  - conforme al siclo del santuario
  rationale: 'No hay divergencia doctrinal, pero sí una precisión cultual: el texto no define un objeto sagrado distinto, sino un patrón oficial de medida asociado al santuario. ''Según'' y ''equivale a'' preservan esa función normativa y explicativa.'
  doctrine_reference: Éxodo 30:13; Levítico 27:25
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'according to the sanctuary shekel' por 'by the shekel of the sanctuary' para ajustarse más al hebreo. La propuesta española sigue esa preferencia formal con 'según el siclo del santuario' y conserva la explicación metrológica en la misma cláusula final.
  spanish_consistency_notes:
  - Se conserva 'siclo' en vez de 'shekel' para una lectura bíblica en español más estable y ampliamente inteligible.
  - '''Gera'' se deja sin traducción técnica adicional para no perder la referencia metrológica precisa del texto fuente.'
  - Se usa 'por cabeza' como equivalente idiomático de la expresión distributiva hebrea sin borrar el matiz literal.
  - El paralelismo entre la instrucción y la explicación del valor se mantiene en una sola oración con punto y coma, como en el hebreo y el POB inglés.
