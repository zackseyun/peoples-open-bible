base_translation:
  language: en
  yaml_path: translation/ot/judges/016/018.yaml
  text: When Delilah saw that he had told her all his heart[a], she sent and called for the Philistine rulers, saying, “Come up this time[c][b], for he has told her all his heart.” Then the Philistine rulers came up to her and brought the silver in their hands.
  footnotes:
  - marker: a
    text: 'Hebrew: ''for he has told her all his heart.'' In direct speech, some readers may expect ''me'' instead of ''her,'' but the received Hebrew text reads third person feminine singular.'
    reason: textual_variant
  - marker: b
    text: Or 'the lords of the Philistines.'
    reason: lexical_alternative
  - marker: c
    text: That is, silver as payment.
    reason: cultural_note
