    text: El hebreo puede expresarse literalmente como «es sacudido» o «entra en agitación»; la idea es que el pueblo es trastornado súbitamente. La frase final dice literalmente «no por mano», probablemente indicando que esto ocurre sin agencia humana.
    reason: lexical_alternative
