translation:
  language: es
  text: 'Casa de David[a]: Así dice Yahvé: Administren justicia por la mañana, y liberen al que ha sido robado de la mano del opresor[b], no sea que mi ira salga como fuego[c] y arda, sin que nadie la apague, por la maldad de sus obras.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Emitan juicio por la mañana» o «Juzguen cada mañana con justicia».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de la mano del opresor», un giro idiomático para hablar de liberación del poder o control injusto.'
    reason: cultural_note
  - marker: c
    text: O «mi furia salga como fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית דָּוִד
  english_pob_choice: House of David
  chosen_spanish: Casa de David
  alternatives_spanish:
  - hogar de David
  - casa real de David
  lexicon: HALOT
  rationale: Se mantiene la vocación colectiva y dinástica del hebreo constructo. «Casa de David» es la forma más directa y reconocible en español, sin añadir una glosa interpretativa que no exija el texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliterar el nombre divino en lugar de sustituirlo por un título. «Yahvé» es la forma usual en español bíblico académico y eclesial amplio.'
- source_word: דִּינוּ
  english_pob_choice: Administer
  chosen_spanish: Administren justicia
  alternatives_spanish:
  - Juzguen
  - Hagan justicia
  - Emitan juicio
  lexicon: HALOT
  rationale: El verbo דין aquí tiene fuerza administrativa y judicial dirigida al gobierno davídico. «Administren justicia» conserva la obligación de ejercer juicio justo sin reducirlo a un acto meramente forense.
- source_word: לַבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - cada mañana
  lexicon: HALOT
  rationale: La frase temporal en español fluye de manera natural como «por la mañana». No se fuerza una habitualidad explícita que el hebreo puede sugerir, pero no exige de forma inequívoca.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: HALOT
  rationale: En la combinación con דין, el término apunta a justicia recta y orden judicial, no solo a una sentencia aislada. «Justicia» preserva esa amplitud ética y legal.
- source_word: וְהַצִּילוּ
  english_pob_choice: deliver
  chosen_spanish: liberen
  alternatives_spanish:
  - rescaten
  - salven
  - saquen
  lexicon: HALOT
  rationale: En el contexto de quitar a alguien del poder injusto, «liberen» comunica la acción concreta de ponerlo en libertad. Conserva el sentido de intervención eficaz, aunque es menos literal que «rescaten».
- source_word: גָזוּל
  english_pob_choice: the one who has been robbed
  chosen_spanish: al que ha sido robado
  alternatives_spanish:
  - al despojado
  - a la víctima del robo
  - al robado
  lexicon: HALOT
  rationale: Se expresa la idea participial de una persona a la que se le ha hecho una exacción o despojo. La forma elegida es clara en español y mantiene el carácter pasivo del original.
- source_word: מִיַּד עוֹשֵׁק
  english_pob_choice: from the hand of the oppressor
  chosen_spanish: de la mano del opresor
  alternatives_spanish:
  - del poder del opresor
  - de las manos del opresor
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «mano» como poder o control. «Opresor» reproduce bien el sentido social de עֹשֵׁק y permite una traducción natural en español.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o si no
  lexicon: HALOT
  rationale: «No sea que» es una construcción solemnemente natural en español para introducir advertencia y consecuencia, equivalente a «lest».
- source_word: תֵּצֵא כָאֵשׁ חֲמָתִי
  english_pob_choice: my wrath go out like fire
  chosen_spanish: mi ira salga como fuego
  alternatives_spanish:
  - mi furia salga como fuego
  - mi enojo brote como fuego
  lexicon: HALOT
  rationale: «Ira» mantiene el registro profético-jurídico de חמה y «salga como fuego» preserva la metáfora dinámica del hebreo. Se evita atenuar la imagen con una paráfrasis más suave.
- source_word: וּבָעֲרָה
  english_pob_choice: and burn
  chosen_spanish: y arda
  alternatives_spanish:
  - y se encienda
  - y consuma
  lexicon: HALOT
  rationale: El verbo continúa la imagen del fuego. «Arda» es el equivalente español más natural y deja abierta la intensidad exacta del efecto sin sobreinterpretarlo.
- source_word: וְאֵין מְכַבֶּה
  english_pob_choice: with no one to quench it
  chosen_spanish: sin que nadie la apague
  alternatives_spanish:
  - y nadie la apagará
  - sin que nadie pueda apagarla
  lexicon: HALOT
  rationale: Se mantiene la idea de fuego/ira inapagable. El pronombre femenino «la» concuerda con «ira» y también remite al fuego metafórico, preservando la imagen sin oscurecerla.
- source_word: מִפְּנֵי רֹעַ מַעַלְלֵיהֶם
  english_pob_choice: because of the evil of their deeds
  chosen_spanish: por la maldad de sus obras
  alternatives_spanish:
  - a causa de la maldad de sus acciones
  - por la maldad de sus hechos
  lexicon: HALOT
  rationale: «Maldad» traduce רֹעַ con valor moral fuerte, y «obras» mantiene el enlace bíblico habitual con מעשים/מעללים. Se conserva el plural posesivo porque el hebreo apunta a las acciones de varios dentro del colectivo.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se adopta la transliteración del nombre propio divino, conforme al criterio del proyecto y a la transparencia frente al texto hebreo. No se sustituye por «Señor» porque aquí la intención es auditable y el pasaje contiene el Tetragrámaton explícito.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Tono de la orden judicial
  english_pob_reading: Administer justice in the morning
  chosen_spanish_reading: Administren justicia por la mañana
  alternative_spanish_readings:
  - Juzguen por la mañana con justicia
  - Emitan juicio por la mañana
  rationale: El mandato se dirige a la Casa de David como autoridad gobernante. La formulación elegida conserva la dimensión de gobierno justo y la prontitud exigida por el texto, sin reducirla a un procedimiento judicial técnico.
  doctrine_reference: 'Translation philosophy: optimal-equivalence; preserve source sense over tradition'
- issue: Imagen de la ira inapagable
  english_pob_reading: my wrath go out like fire and burn with no one to quench it
  chosen_spanish_reading: mi ira salga como fuego y arda, sin que nadie la apague
  alternative_spanish_readings:
  - mi furia salga como fuego y arda, y no haya quien la apague
  - mi ira brote como fuego y arda, sin que nadie la extinga
  rationale: El hebreo combina la salida de la ira con la metáfora del fuego que arde sin extinción. La versión española conserva ambas imágenes y evita atenuar la advertencia profética.
  doctrine_reference: 'DOCTRINE.md: Preserve metaphor and tension where the source emphasizes judgment'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios; por eso se conserva la línea de sentido ya aprobada: vocativo davídico, mandato judicial temprano, liberación del oprimido y advertencia de ira inapagable. Se han ajustado solo opciones españolas para mayor naturalidad sin alterar la base hebrea.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se conserva el colectivo «Casa de David» como vocativo dinástico.
  - Se traduce דין con un verbo de administración judicial, no con una simple descripción de opinión.
  - Se preserva la metáfora del fuego y la advertencia de juicio sin suavizarla.
  - Se mantiene el plural posesivo «sus obras» para reflejar el sufijo hebreo de tercera persona plural.
