translation:
  language: es
  text: 'Los levitas: los hijos de Jesueis[a], Koddelou, Bannou y Soudiou, setenta y cuatro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Varios nombres de este versículo difieren de los paralelos más conocidos de Esdras-Nehemías; esta traducción sigue el texto griego de 1 Esdras en vez de armonizarlos con la tradición hebrea.
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ Λευεῖται
  english_pob_choice: The Levites
  chosen_spanish: Los levitas
  alternatives_spanish:
  - Y los levitas
  - La tribu de Leví
  lexicon: LSJ
  rationale: En una lista censal, el nominativo con artículo funciona como encabezado. «Los levitas» conserva el tono de catálogo sin añadir conjunciones ni interpretar más allá del griego.
- source_word: υἱοὶ
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - descendientes de
  - los hijos
  lexicon: LSJ
  rationale: En contextos genealógicos y censales, υἱοὶ señala pertenencia de linaje. «Los hijos de» mantiene el estilo formal de la lista y reproduce de cerca la forma del texto fuente.
- source_word: Ἰησουείς
  english_pob_choice: Jesueis
  chosen_spanish: Jesueis
  alternatives_spanish:
  - Jeshua
  - Jesuis
  lexicon: LSJ
  rationale: Se translitera la forma griega tal como aparece en 1 Esdras. Aunque el paralelo hebreo/tradicional pueda sugerir otro nombre, aquí la fuente primaria es el griego y no se armoniza.
- source_word: Κοδδηλοῦ
  english_pob_choice: Koddelou
  chosen_spanish: Koddelou
  alternatives_spanish:
  - Kodelou
  - Kadmiel
  lexicon: LSJ
  rationale: Se conserva la transliteración del nombre propio griego. «Kadmiel» sería una armonización con tradiciones paralelas, no una traducción del testimonio griego presente.
- source_word: Βάννου
  english_pob_choice: Bannou
  chosen_spanish: Bannou
  alternatives_spanish:
  - Bannu
  - Bani
  lexicon: LSJ
  rationale: La forma griega en genitivo se refleja mejor con la transliteración «Bannou». «Bani» correspondería a una nivelación con el paralelo hebreo, no al texto inmediato.
- source_word: Σουδίου
  english_pob_choice: Soudiou
  chosen_spanish: Soudiou
  alternatives_spanish:
  - Sudiou
  - Hodavías
  lexicon: LSJ
  rationale: Se preserva la forma griega del nombre, que puede diferir de los paralelos mejor conocidos. «Hodavías» sería una retroversión interpretativa, no una traducción del texto extante.
- source_word: ἑβδομήκοντα τέσσαρες
  english_pob_choice: seventy-four
  chosen_spanish: setenta y cuatro
  alternatives_spanish:
  - setenta y cuatro personas
  - '74'
  lexicon: LSJ
  rationale: Es el cardinal directo del griego. En español moderno, «setenta y cuatro» es claro, natural y plenamente fiel al valor numérico.
theological_decisions:
- issue: No armonización con los paralelos de Esdras-Nehemías / tradición hebrea
  english_pob_reading: Several names in this verse differ from the better-known Ezra-Nehemiah parallels; this translation follows the Greek text of 1 Esdras rather than harmonizing them to the Hebrew tradition.
  chosen_spanish_reading: Se conservan los nombres griegos tal como aparecen en 1 Esdras, sin armonizarlos con los paralelos de Esdras-Nehemías o con una reconstrucción hebrea.
  alternative_spanish_readings:
  - armonizar los nombres con la tradición hebrea
  - reconstruir los nombres a partir del paralelo conocido
  rationale: 'El problema aquí es textual y traductológico: la edición POB inglesa documenta que el griego de 1 Esdras es la referencia primaria. Por tanto, la versión española debe reflejar esa decisión y no borrar la tensión textual mediante una normalización hacia nombres más conocidos.'
  doctrine_reference: Principio de prioridad textual y transparencia de la tradición manuscrita
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que eliminó una conjunción redundante en la lista para mayor naturalidad, manteniendo el registro formal y todos los nombres propios. La forma española también evita agregar conjunciones no presentes en el griego y conserva la secuencia nominal breve del original.
  spanish_consistency_notes:
  - Se mantiene «levitas» en minúscula como nombre común dentro del encabezado de lista.
  - Se preservan transliteraciones consistentes de los nombres propios griegos, sin sustituirlas por equivalentes de tradiciones paralelas.
  - La puntuación española sigue el patrón de encabezado nominal con dos puntos y cierre numérico simple, adecuado para un registro censal breve.
