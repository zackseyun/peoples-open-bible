review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del hebreo: mandato de silencio, proximidad del día de Yahvé, preparación del sacrificio y consagración de los convocados/invitados. Sin embargo, en el sintagma אֲדֹנָי יְהוִה el proyecto exige conservar יְהוָה como «Yahvé» en el texto principal; «el Señor Dios» no refleja de forma suficientemente fiel ni transparente el nombre divino presente en la fuente.'
  spanish_quality_summary: El español es claro y digno, pero «¡Callen delante de Yahvé, el Señor Dios!» suena algo forzado y mezcla segunda persona plural con una fórmula nominal poco natural. «Guarden silencio ante el Señor Yahvé» fluye mejor en español bíblico contemporáneo y evita la apariencia de aposición confusa.
  glossary_alignment: Hay buen alineamiento general con la terminología del proyecto en «Yahvé», «sacrificio» y «consagró». La principal desviación es אֲדֹנָי יְהוִה, que debe mantenerse en español con «Yahvé» explícito, preferiblemente «el Señor Yahvé», no «el Señor Dios».
  issues:
  - severity: high
    issue: El título compuesto אֲדֹנָי יְהוִה está traducido como «el Señor Dios» en vez de conservar «Yahvé».
    rationale: La fuente contiene explícitamente el Tetragrámaton, y las normas del proyecto piden «Yahvé» en el texto principal, no una sustitución por «Dios». Además, «Dios» corresponde normalmente a אֱלֹהִים, que no aparece aquí.
  - severity: medium
    issue: La construcción inicial «¡Callen delante de Yahvé, el Señor Dios» resulta poco natural y potencialmente ambigua en español.
    rationale: Parece que «Yahvé» y «el Señor Dios» fueran dos referentes en aposición. «Guarden silencio ante el Señor Yahvé» o similar expresa mejor la relación del hebreo y mejora la legibilidad.
  - severity: low
    issue: La nota a sobreexplica una decisión que debe quedar resuelta en el texto principal.
    rationale: Si el texto principal se corrige a «el Señor Yahvé», la nota puede simplificarse o eliminarse; no hace falta justificar una solución menos fiel.
  revised_spanish_text: ¡Guarden silencio ante el Señor Yahvé, porque el día de Yahvé está cerca! Porque Yahvé ha preparado un sacrificio; ha consagrado a sus invitados[a].
  revised_footnotes:
  - marker: a
    text: 'También puede entenderse: «sus convocados», «sus llamados» o «sus huéspedes». En contexto, probablemente alude a quienes Yahvé ha reunido para el acto de juicio sacrificial.'
    reason: lexical_alternative
  revision_rationale: Se corrige el título divino para reflejar explícitamente יְהוָה como «Yahvé», en conformidad con la fuente y la terminología del proyecto. También se mejora la naturalidad del mandato inicial en español. Se conserva la ambigüedad deliberada de «sus invitados» y su nota léxica.
