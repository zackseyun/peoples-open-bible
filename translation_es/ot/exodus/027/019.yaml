  rationale: Se reemplaza «clavos» por «estacas» en ambas ocurrencias para reflejar mejor יָתֵד en el contexto del tabernáculo y del atrio. Se conserva el resto de la redacción porque representa fielmente el hebreo y las decisiones auditadas del POB inglés. La nota sobre «bronce/cobre» sigue siendo adecuada y su anclaje en «servicio[a]» es aceptable al no existir un marcador específico sobre «bronce» exigido por el formato previo.
