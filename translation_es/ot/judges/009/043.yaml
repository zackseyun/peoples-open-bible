revisions:
- from: Tomó al pueblo[a], lo dividió en tres grupos, y se puso en emboscada en el campo. Cuando vio que el pueblo salía de la ciudad, se levantó contra ellos y los hirió.
  to: Tomó al pueblo[a], lo dividió en tres grupos, y se puso al acecho en el campo. Cuando vio que el pueblo salía de la ciudad, se levantó contra ellos y los derribó.
  rationale: Se ajusta una expresión poco natural (“se puso en emboscada”) a un español más idiomático y fiel al hebreo (“se puso al acecho”), y se fortalece “los hirió” a “los derribó” para reflejar mejor la fuerza de נכה en el contexto narrativo sin sobretraducir a “mató”. La nota existente se conserva porque representa correctamente la alternativa idiomática de רָאשִׁים.
