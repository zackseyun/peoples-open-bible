    rationale: '''Avergüéncense, labradores; giman, viñadores'' fluye mejor en español y refleja la dirección profética a grupos concretos.'
  revised_spanish_text: Avergüéncense[a], labradores; giman[b], viñadores, por el trigo y por la cebada, porque se ha perdido la cosecha del campo.
