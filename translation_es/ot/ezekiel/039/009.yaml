translation:
  language: es
  text: 'Entonces los habitantes de las ciudades de Israel saldrán y encenderán fuego[a] con las armas, y las quemarán: el escudo pequeño[b] y el escudo grande, el arco y las flechas, el garrote de mano[c] y la lanza; y encenderán fuego con ellas durante siete años.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «harán/encenderán con las armas»; el verbo hebreo en esta cláusula es difícil, pero el contexto indica que las armas se usan como combustible para el fuego.
    reason: lexical_alternative
  - marker: b
    text: El hebreo distingue aquí dos clases de escudos, probablemente un escudo menor (magen) y un escudo corporal mayor (tsinnah).
    reason: cultural_note
  - marker: c
    text: O «bastón de mano». La expresión hebrea es literalmente «vara de mano» y probablemente designa un arma portátil en esta lista militar.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָצְאוּ
  english_pob_choice: will go out
  chosen_spanish: saldrán
  alternatives_spanish:
  - irán afuera
  - saldrán fuera
  lexicon: HALOT
  rationale: El verbo יצא expresa salida/movimiento hacia afuera. «Saldrán» comunica bien la secuencia futura sin añadir paráfrasis.
- source_word: יֹשְׁבֵי עָרֵי יִשְׂרָאֵל
  english_pob_choice: the inhabitants of the cities of Israel
  chosen_spanish: los habitantes de las ciudades de Israel
  alternatives_spanish:
  - los que habitan en las ciudades de Israel
  - los residentes de las ciudades de Israel
  lexicon: HALOT
  rationale: La frase constructa apunta a los pobladores concretos de las ciudades. «Habitantes» conserva la referencia concreta y suena natural en español.
- source_word: וּבִעֲרוּ
  english_pob_choice: make fires
  chosen_spanish: harán fuego
  alternatives_spanish:
  - encenderán fuego
  - harán hogueras
  lexicon: HALOT
  rationale: בער en este contexto se entiende como encender o producir fuego, con los objetos listados como combustible. «Harán fuego» evita forzar una imagen más específica que el hebreo no exige.
- source_word: וְהִשִּׂיקוּ
  english_pob_choice: with the weapons
  chosen_spanish: con las armas
  alternatives_spanish:
  - a partir de las armas
  - usando las armas
  lexicon: HALOT
  rationale: La secuencia verbal es difícil, pero el contexto indica uso de las armas como material combustible. «Con las armas» sigue de cerca la lectura auditada en inglés y conserva la relación instrumental.
- source_word: נֶשֶׁק
  english_pob_choice: weapons
  chosen_spanish: las armas
  alternatives_spanish:
  - el armamento
  - las armas de guerra
  lexicon: HALOT
  rationale: נשק es un término colectivo para armamento; «armas» es la equivalencia más clara y estándar.
- source_word: מָגֵן
  english_pob_choice: the small shield
  chosen_spanish: el escudo pequeño
  alternatives_spanish:
  - el escudo chico
  - el pequeño escudo
  lexicon: HALOT
  rationale: Se preserva la distinción frente a צִנָּה. «Escudo pequeño» refleja el valor contrastivo documentado por el POB en inglés.
- source_word: צִנָּה
  english_pob_choice: the large shield
  chosen_spanish: el escudo grande
  alternatives_spanish:
  - el gran escudo
  - el escudo mayor
  lexicon: HALOT
  rationale: Se conserva la distinción con מָגֵן. «Escudo grande» es transparente y reproduce la oposición de tamaño sin tecnicismos innecesarios.
- source_word: קֶשֶׁת
  english_pob_choice: the bow
  chosen_spanish: el arco
  alternatives_spanish:
  - el arco de guerra
  lexicon: HALOT
  rationale: Sentido militar estándar; «arco» es natural y fiel.
- source_word: חִצִּים
  english_pob_choice: the arrows
  chosen_spanish: las flechas
  alternatives_spanish:
  - los dardos
  lexicon: HALOT
  rationale: Equivalente estándar y claro del plural hebreo.
- source_word: מַקֵּל יָד
  english_pob_choice: the hand-club
  chosen_spanish: el bastón de mano
  alternatives_spanish:
  - el garrote de mano
  - el palo de mano
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «vara/bastón de mano». En español, «bastón de mano» mantiene el componente formal de «mano» y la ambigüedad del arma sin inventar un término más técnico que el texto no garantiza.
- source_word: רֹמַח
  english_pob_choice: the spear
  chosen_spanish: la lanza
  alternatives_spanish:
  - la pica
  - el venablo
  lexicon: HALOT
  rationale: Término militar común. «Lanza» es natural en español y suficientemente preciso.
- source_word: וּבִעֲרוּ בָהֶם אֵשׁ
  english_pob_choice: and they will make fires with them
  chosen_spanish: y harán fuego con ellas
  alternatives_spanish:
  - y encenderán fuego con ellas
  - y harán hogueras con ellas
  lexicon: HALOT
  rationale: La construcción indica que las armas sirven como combustible/instrumento para el fuego. «Con ellas» mantiene el instrumental y el antecedente plural femenino en español se acomoda al conjunto de armas listadas.
- source_word: שֶׁבַע שָׁנִים
  english_pob_choice: for seven years
  chosen_spanish: durante siete años
  alternatives_spanish:
  - por siete años
  - siete años
  lexicon: HALOT
  rationale: La duración continua se expresa con naturalidad mediante «durante siete años».
theological_decisions:
- issue: Distinción entre dos tipos de escudos
  english_pob_reading: the small shield and the large shield
  chosen_spanish_reading: el escudo pequeño y el escudo grande
  alternative_spanish_readings:
  - el escudo pequeño y el gran escudo
  - el escudo y el escudo mayor
  rationale: El hebreo distingue מָגֵן y צִנָּה, y el POB inglés preserva esa diferencia. Mantener dos tamaños evita diluir una distinción léxica real del texto.
  doctrine_reference: Fidelidad léxica al texto hebreo; no es una decisión doctrinal.
- issue: Sentido de los verbos de encender/burn with the weapons
  english_pob_reading: make fires with the weapons
  chosen_spanish_reading: harán fuego con las armas
  alternative_spanish_readings:
  - harán fuego a partir de las armas
  - quemarán las armas
  rationale: El pasaje presenta las armas como combustible para un fuego prolongado. «Harán fuego con las armas» conserva el carácter instrumental sin sobreexplicar ni suavizar la imagen.
  doctrine_reference: Fidelidad semántica al hebreo y al audit trail del POB; sin implicación doctrinal específica.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión auditada del POB inglés que prefirió «with the weapons» frente a «from the weapons» para ajustarse más de cerca al hebreo, entendiendo las armas como material combustible. La redacción española sigue esa decisión y conserva la lista militar completa con la distinción entre dos escudos y el término ambiguo para מַקֵּל יָד.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma española por defecto cuando el hebreo habla del nombre divino, pero este versículo no lo contiene.
  - Se mantiene «armas» para נשק y no «armamento», por claridad y correspondencia con el registro bíblico.
  - Se evita «Cristo», «Señor» u otra terminología ajena al versículo.
  - La imagen de combustión se conserva sin introducir detalles que el hebreo no explicita.
