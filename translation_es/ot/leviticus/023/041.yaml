revisions:
- from: Lo celebraréis como fiesta para Yahvé[a] durante siete días en el año. Es estatuto permanente[b] por vuestras generaciones; en el séptimo mes lo celebraréis.
  to: Lo celebraréis como fiesta para Yahvé[a] durante siete días en el año. Será estatuto permanente[b] por todas sus generaciones; en el séptimo mes lo celebraréis.
  rationale: Se corrige la nota léxica para que refleje la alternativa real de לַיהוָה y se mejora la naturalidad y neutralidad del español con «por todas sus generaciones». También se suaviza «Es» a «Será», que encaja mejor con el tono legislativo prescriptivo del contexto sin apartarse del sentido fuente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:31:09Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido general del hebreo: mandato de celebrar la fiesta para Yahvé durante siete días, su carácter de estatuto duradero para las generaciones, y su ubicación temporal en el séptimo mes. Conserva además la repetición verbal de חָגַג. Sin embargo, la nota [a] no preserva la alternativa documentada por el inglés, porque el texto principal ya dice «para Yahvé» y la alternativa debía reflejar «a Yahvé». También conviene mejorar «por vuestras generaciones» a una formulación más natural y precisa para לְדֹרֹתֵיכֶם.'
  spanish_quality_summary: 'El español es claro y digno, pero presenta dos detalles mejorables: la nota [a] es redundante/incorrecta, y «por vuestras generaciones» suena menos natural en español general que «por todas sus generaciones» o «a través de sus generaciones». También es preferible un registro más neutro latinoamericano con «sus» en vez de «vuestras», manteniendo buena legibilidad eclesial.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto al usar «Yahvé» para יהוה y «estatuto permanente» para חֻקַּת עוֹלָם. «Fiesta» para חַג y «celebraréis» para חָגַג son adecuados. La única desalineación real está en la nota léxica de לַיהוָה: debe ofrecer «a Yahvé» como alternativa al texto principal «para Yahvé».'
  issues:
  - severity: medium
    issue: La nota [a] repite el texto principal en lugar de dar la alternativa real.
    rationale: El inglés documenta la alternancia 'to Yahweh' / 'for Yahweh'. En español, si el texto principal usa «para Yahvé», la nota debe decir «O «a Yahvé»», no «O «para Yahvé»».
  - severity: medium
    issue: «Por vuestras generaciones» es menos natural y menos preciso para español bíblico general.
    rationale: לְדֹרֹתֵיכֶם expresa continuidad a lo largo de las generaciones. «Por todas sus generaciones» suena más natural y comunica mejor el valor distributivo/continuativo que «por vuestras generaciones».
  - severity: low
    issue: El uso de «vuestras» puede sentirse menos neutral panhispánico.
    rationale: El proyecto pide español neutral latinoamericano/broadly church-readable. «Sus» evita marcación regional y mantiene dignidad.
  revised_spanish_text: Lo celebraréis como fiesta para Yahvé[a] durante siete días en el año. Será estatuto permanente[b] por todas sus generaciones; en el séptimo mes lo celebraréis.
  revised_footnotes:
  - marker: a
    text: O «a Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «estatuto perpetuo» o «estatuto eterno».
    reason: lexical_alternative
  revision_rationale: Se corrige la nota léxica para que refleje la alternativa real de לַיהוָה y se mejora la naturalidad y neutralidad del español con «por todas sus generaciones». También se suaviza «Es» a «Será», que encaja mejor con el tono legislativo prescriptivo del contexto sin apartarse del sentido fuente.
