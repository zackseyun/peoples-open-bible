    rationale: 'En español, el relativo con preposición «al que» se entiende naturalmente como referido a «Carquemis», no al «ejército». El hebreo modifica al ejército: el ejército que estaba junto al Éufrates en Carquemis, y que Nabucodonosor hirió/derrotó.'
  - severity: medium
