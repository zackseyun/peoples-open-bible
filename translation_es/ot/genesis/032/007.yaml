revisions:
- from: 'Los mensajeros[a] regresaron a Jacob, diciendo: «Fuimos a tu hermano, a Esaú, y también viene a encontrarte, y con él hay cuatrocientos hombres».'
  to: 'Los mensajeros[a] regresaron a Jacob, diciendo: «Llegamos hasta tu hermano, hasta Esaú, y él también viene a encontrarte, y cuatrocientos hombres están con él».'
  rationale: Se ajusta «Fuimos» a «Llegamos hasta» para lograr un español más natural sin perder el sentido de arribo implícito en בָּאנוּ dentro del informe de los enviados. También se cambia «y con él hay cuatrocientos hombres» por «y cuatrocientos hombres están con él» para reflejar más directamente וְאַרְבַּע מֵאוֹת אִישׁ עִמּוֹ y mejorar la fluidez.
  reviewer_model: gpt-5.4
