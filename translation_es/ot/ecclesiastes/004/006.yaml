revisions:
- from: Mejor es un puñado con reposo que dos puñados con trabajo arduo y un afanarse tras el viento[a][b].
  to: Mejor es un puñado con reposo que dos puñados con fatiga y un afanarse tras el viento[a][b].
  rationale: Se cambió «trabajo arduo» por «fatiga» para reflejar con mayor precisión y economía el valor de עָמָל en este contexto sapiencial y alinearlo mejor con «toil» en la auditoría inglesa. Se conservó «un afanarse tras el viento» como formulación aceptable y fiel a la metáfora, pero se corrigió la nota léxica para eliminar «aferrarse», que no está respaldado por la evidencia ni por la decisión documentada. También se normalizó levemente la redacción de las notas.
