translation:
  language: es
  text: 'Así como te alegraste por la herencia de la casa de Israel porque estaba desolada, así haré contigo: quedarás desolado[a], monte Seír, y todo Edom, por completo[b]. Entonces sabrán que yo soy Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «serás una desolación». El hebreo usa más literalmente el sustantivo «desolación»: «desolación serás / llegarás a ser desolación».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y todo Edom, todo él/ella», una manera enfática de expresar la totalidad de Edom.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כְּשִׂמְחָתְךָ
  english_pob_choice: As you rejoiced
  chosen_spanish: Así como te alegraste
  alternatives_spanish:
  - Así como te regocijaste
  - Tal como te alegraste
  lexicon: HALOT
  rationale: El prefijo comparativo כְ exige un paralelo temporal/comparativo; שִׂמְחָה expresa alegría o regocijo. En español, un verbo finito resulta más natural que un sustantivo como 'tu alegría', y 'te alegraste' conserva el sentido de gozo malicioso o celebratorio del contexto.
- source_word: לְנַחְלַת בֵּית יִשְׂרָאֵל
  english_pob_choice: over the inheritance of the house of Israel
  chosen_spanish: sobre la herencia de la casa de Israel
  alternatives_spanish:
  - acerca de la herencia de la casa de Israel
  - por la herencia de la casa de Israel
  lexicon: HALOT
  rationale: נַחֲלָה puede significar 'herencia' o 'posesión'. La preposición לְ tras un sustantivo de alegría marca el objeto o motivo del regocijo; 'sobre' mantiene en español esa relación de manera idiomática y fiel.
- source_word: עַל אֲשֶׁר שָׁמֵמָה
  english_pob_choice: because it was desolate
  chosen_spanish: porque estaba desolada
  alternatives_spanish:
  - porque yacía desolada
  - por estar desolada
  lexicon: HALOT
  rationale: La construcción introduce la causa del regocijo de Edom. שָׁמֵמָה es un estado verbal/femenino singular que describe la tierra o herencia; 'estaba desolada' transmite con claridad la situación sin perder el valor causal.
- source_word: כֵּן אֶעֱשֶׂה לָּךְ
  english_pob_choice: so I will do to you
  chosen_spanish: así haré contigo
  alternatives_spanish:
  - así actuaré contra ti
  - de la misma manera te trataré
  lexicon: HALOT
  rationale: כֵּן expresa correspondencia retributiva. עשה con לְ puede significar 'hacer a/tratar a'; 'haré contigo' conserva la fuerza judicial y suena natural en español bíblico contemporáneo.
- source_word: שְׁמָמָה תִהְיֶה
  english_pob_choice: desolate you will be
  chosen_spanish: desolado estarás
  alternatives_spanish:
  - serás desolado
  - te convertirás en desolación
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo predicativo ('desolación') para enfatizar el resultado del juicio. La revisión inglesa prefirió 'desolate you will be' por su mayor cercanía sintáctica; en español, 'desolado estarás' reproduce esa predicación de forma directa y solemne, aunque se deja notar la tensión con el sustantivo subyacente.
- source_word: הַר שֵׂעִיר
  english_pob_choice: Mount Seir
  chosen_spanish: monte Seír
  alternatives_spanish:
  - Montaña de Seír
  - el monte Seír
  lexicon: HALOT
  rationale: Se trata de un topónimo fijo. 'Monte Seír' es la forma más reconocible y respetuosa del nombre geográfico.
- source_word: וְכָל אֱדוֹם כֻּלָּהּ
  english_pob_choice: and all Edom, all of it
  chosen_spanish: y todo Edom, todo ello
  alternatives_spanish:
  - y todo Edom, por completo
  - y toda Edom, entera
  lexicon: HALOT
  rationale: La combinación כָּל + כֻּלָּהּ es enfática y totalizadora. 'Todo Edom, todo ello' intenta conservar esa reiteración sin volverla pesada, y mantiene la idea de totalidad absoluta.
- source_word: וְיָדְעוּ
  english_pob_choice: Then they will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Así sabrán
  lexicon: HALOT
  rationale: El hebreo usa la conjunción simple, pero en contexto funciona como resultado del juicio. 'Entonces' expresa esa consecuencia sin añadir contenido ajeno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: La tradición del proyecto exige renderizar el Tetragrámaton como 'Yahvé' en el texto principal, preservando el nombre propio divino y evitando la sustitución honorífica 'SEÑOR'.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El versículo concluye con יְהוָה, nombre personal del Dios de Israel. Siguiendo la norma del proyecto, se mantiene 'Yahvé' para conservar la referencia directa al nombre revelado y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Retribución proporcional en la fórmula 'así haré contigo'
  english_pob_reading: so I will do to you
  chosen_spanish_reading: así haré contigo
  alternative_spanish_readings:
  - así actuaré contra ti
  - de la misma manera te trataré
  rationale: El texto presenta una retribución medida en correspondencia con la conducta de Edom. 'Así haré contigo' preserva la simetría retributiva sin suavizarla ni convertirla en una mera descripción.
  doctrine_reference: Doctrina bíblica de retribución justa en el juicio profético (cf. principio lex talionis en el marco del lenguaje profético)
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que ajustó la cláusula de juicio de 'you will become a desolation' a 'desolate you will be' para reflejar más directamente la predicación nominal hebrea. En español se preservó esa intensidad con 'desolado estarás', y se mantuvo la nota para no borrar la tensión entre adjetivo y sustantivo implícito.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente con la terminología del proyecto para יְהוָה.
  - '''Monte Seír'' se conserva como topónimo fijo y no se expande a ''montaña de Seír''.'
  - Se mantuvo la redundancia enfática de 'todo Edom, todo ello' para reflejar כָּל + כֻּלָּהּ.
  - La puntuación separa con dos puntos la fórmula retributiva, acorde con el tono oracular del hebreo.
