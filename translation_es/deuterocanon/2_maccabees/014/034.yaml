translation:
  language: es
  text: 'Después de decir estas cosas, se fue. Pero los sacerdotes, extendiendo las manos hacia el cielo, invocaban al que siempre lucha en defensa de nuestra nación[a], diciendo estas cosas:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al que siempre pelea por nuestra nación»; el griego ὑπέρμαχος describe a uno que combate en defensa de otro, con el sentido de campeón o defensor.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοσαῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - tales cosas
  - lo dicho
  lexicon: LSJ
  rationale: En griego funciona como objeto de εἰπών y remite a lo anterior; «estas cosas» conserva la referencia inmediata sin añadir contenido.
- source_word: εἰπὼν
  english_pob_choice: after saying
  chosen_spanish: Después de decir
  alternatives_spanish:
  - habiendo dicho
  - tras decir
  lexicon: LSJ
  rationale: Expresa bien la relación temporal del participio con la acción siguiente y suena natural en español.
- source_word: ἀπῆλθεν
  english_pob_choice: he went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: LSJ
  rationale: Verbo narrativo simple de partida; «se fue» es claro y fiel al movimiento de salida.
- source_word: προτείναντες τὰς χεῖρας
  english_pob_choice: stretching out their hands
  chosen_spanish: con las manos extendidas
  alternatives_spanish:
  - extendiendo las manos
  - alzando las manos
  lexicon: LSJ
  rationale: Preserva la postura de oración descrita por el griego; en español la construcción con «con» evita una frase demasiado pesada sin perder la imagen.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: toward heaven
  chosen_spanish: hacia el cielo
  alternatives_spanish:
  - hacia el cielo
  - al cielo
  lexicon: LSJ
  rationale: «Cielo» comunica la dirección de las manos levantadas sin sugerir entrada en el cielo; es una equivalencia natural para οὐρανόν en este contexto.
- source_word: ἐπεκαλοῦντο
  english_pob_choice: were calling on
  chosen_spanish: invocaban
  alternatives_spanish:
  - clamaban a
  - llamaban sobre
  lexicon: LSJ
  rationale: El imperfecto exige acción continua o insistente; «invocaban» expresa bien la oración dirigida a Dios y es idiomático en español bíblico contemporáneo.
- source_word: τὸν διὰ παντὸς ὑπέρμαχον
  english_pob_choice: the one who is always the champion
  chosen_spanish: el campeón[a] siempre
  alternatives_spanish:
  - el defensor siempre
  - el que siempre combate por
  lexicon: LSJ
  rationale: ὑπέρμαχος puede significar «campeón» en sentido de quien lucha en defensa de otro; en español, «campeón» mantiene el matiz combativo mejor que «defensor» en este pasaje. Se conserva la idea de continuidad con διὰ παντός mediante «siempre».
- source_word: τοῦ ἔθνους ἡμῶν
  english_pob_choice: of our nation
  chosen_spanish: de nuestra nación
  alternatives_spanish:
  - de nuestro pueblo
  - de nuestra gente
  lexicon: LSJ
  rationale: «Nación» refleja el sentido corporativo e histórico de ἔθνος en este contexto judío mejor que una paráfrasis más general.
- source_word: ταῦτα λέγοντες
  english_pob_choice: saying these things
  chosen_spanish: diciendo estas cosas
  alternatives_spanish:
  - diciendo lo siguiente
  - pronunciando estas palabras
  lexicon: LSJ
  rationale: Introduce la oración citada en el versículo siguiente sin añadir contenido; «estas cosas» mantiene la cercanía con el griego.
theological_decisions:
- issue: Descripción de Dios como τὸν διὰ παντὸς ὑπέρμαχον τοῦ ἔθνους ἡμῶν
  english_pob_reading: the one who is always the champion of our nation
  chosen_spanish_reading: el campeón siempre de nuestra nación
  alternative_spanish_readings:
  - el defensor siempre de nuestra nación
  - el que siempre combate por nuestra nación
  rationale: La expresión presenta a Dios como protector y combatiente en favor de su pueblo. «Campeón» conserva el matiz de lucha en favor de otro, siguiendo la decisión inglesa revisada; «siempre» traduce διὰ παντός sin perder la idea de continuidad.
  doctrine_reference: 'Tradición de traducción POB: mantener el sentido funcional del título divino sin suavizar su fuerza bélica.'
translation_notes:
  revision_awareness: La redacción inglesa revisada pasó de «defender» a «champion» para reflejar mejor ὑπέρμαχος. La versión española sigue esa revisión y evita una fórmula más débil o genérica, manteniendo el matiz de combate protector. No se observaron variantes textuales relevantes en el griego base.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece el nombre divino, pero sí una descripción funcional de Dios.
  - Se mantuvo un registro bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - «Cielo» se eligió como equivalente natural de οὐρανός en un gesto de oración hacia lo alto, no como referencia a un lugar de entrada.
