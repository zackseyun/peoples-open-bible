lexical_decisions:
- source_word: זִבְח֥וּ
  english_pob_choice: Offer
  chosen_spanish: Ofreced
  alternatives_spanish:
  - Ofrezcan
  - Presentad
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural dirigido a varios oyentes. En español, «ofreced» conserva el mandato cultual y la concisión del paralelismo. «Ofrezcan» sería más neutro en registro americano moderno, pero «ofreced» mantiene mejor la fuerza exhortativa y la cercanía al imperativo plural del original.
- source_word: זִבְחֵי
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - ofrendas
  - sacrificios cultuales
  lexicon: HALOT
  rationale: El sustantivo de la misma raíz que el verbo pide conservar el campo léxico sacrificial. «Sacrificios» reproduce mejor esa repetición que «ofrendas», que es más amplio y diluye la conexión verbal.
- source_word: צֶדֶק
  english_pob_choice: of righteousness
  chosen_spanish: de justicia
  alternatives_spanish:
  - de rectitud
  - de justicia y rectitud
  lexicon: HALOT
  rationale: El inglés POB preserva la ambigüedad entre rectitud moral y conformidad correcta al culto. En español, «justicia» mantiene esa amplitud semántica y también la alternativa de lectura jurídica/covenantal que el POB conserva con nota. «Rectitud» es posible, pero puede sonar más interpretativa y estrecha en este contexto.
- source_word: וּבִטְחוּ
  english_pob_choice: and trust
  chosen_spanish: y confiad
  alternatives_spanish:
  - y confíen
  - y poned vuestra confianza
  lexicon: HALOT
  rationale: El imperativo plural de בטח se expresa de forma natural como «confiad». Conserva la exhortación directa y evita expandir el verbo más de lo necesario.
- source_word: אֶל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - hacia
  - a
  lexicon: HALOT
  rationale: Aunque el hebreo usa la preposición de dirección «a/toward», con בטח el español natural exige «confiar en». Esta elección reproduce el sentido relacional esperado sin forzar una construcción extraña.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio revelado en el texto, conforme a la política del proyecto. «Yahvé» es la forma establecida en español para el Tetragrámaton y evita la sustitución por un título.
theological_decisions:
- issue: Sentido de «sacrificios de justicia»
  english_pob_reading: A call to offer sacrifices characterized by righteousness/right order, without specifying whether the emphasis is primarily ethical sincerity, proper worship, or both.
  chosen_spanish_reading: Una exhortación a ofrecer sacrificios caracterizados por justicia/rectitud, sin cerrar si el énfasis recae sobre sinceridad moral, corrección ritual o ambas cosas.
  alternative_spanish_readings:
  - Ofrecer sacrificios justos en el sentido de adoración moralmente sincera
  - Ofrecer sacrificios legítimos o debidos según el orden del pacto
  rationale: La frase hebrea admite más de una carga teológica. Mantener «de justicia» preserva la tensión entre la dimensión ética y la cultual, en lugar de resolverla prematuramente con una sola explicación.
  doctrine_reference: Preservar la tensión lexical y teológica sin resolverla de forma reductiva.
translation_notes:
  revision_awareness: Revisión reciente sin cambios sustantivos; el estado de alta concordancia confirma que la lectura y la formulación base no requieren ajustes adicionales.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el nombre divino, en coherencia con el proyecto.
  - Se usa «confiad en» como equivalente idiomático de בטח + אֶל, sin perder el valor relacional del hebreo.
  - «Sacrificios de justicia» mantiene la ambigüedad ética/cultual señalada por el audit trail inglés.
  - El registro es bíblico y digno, sin calco mecánico más allá de lo necesario para preservar el paralelismo hebreo.
