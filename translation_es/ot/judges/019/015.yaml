translation:
  language: es
  text: Se apartaron allí para entrar y pasar la noche en Gabaa. Él entró y se sentó en la plaza de la ciudad[a], y no había nadie[b] que los acogiera a su casa para pasar la noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la calle de la ciudad»; el hebreo puede referirse a un espacio público amplio o a una plaza.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «no había hombre», es decir, ningún residente les ofreció hospitalidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסֻרוּ
  english_pob_choice: They turned aside
  chosen_spanish: Se apartaron
  alternatives_spanish:
  - Se desviaron
  - Tomaron otro camino
  lexicon: HALOT
  rationale: וַיָּסֻרוּ indica desviarse del camino o apartarse de la ruta, no solo detenerse. «Se apartaron» conserva bien la acción de cambiar de dirección en un contexto de viaje.
- source_word: לָבוֹא
  english_pob_choice: to go in
  chosen_spanish: para entrar
  alternatives_spanish:
  - para ir adentro
  - para ingresar
  lexicon: HALOT
  rationale: בוא expresa entrar o ir adentro. «Para entrar» es natural en español y mantiene la dirección hacia el interior sin añadir interpretación.
- source_word: לָלוּן
  english_pob_choice: to spend the night
  chosen_spanish: pasar la noche
  alternatives_spanish:
  - pernoctar
  - quedarse a dormir
  lexicon: HALOT
  rationale: לון significa permanecer durante la noche. «Pasar la noche» comunica claramente el sentido temporal y evita un tono arcaico.
- source_word: בַּגִּבְעָה
  english_pob_choice: at Gibeah
  chosen_spanish: en Gabaa
  alternatives_spanish:
  - en Gibeá
  - en Gabaa de Benjamín
  lexicon: HALOT
  rationale: El topónimo se translitera de manera reconocible y cercana al uso español, manteniendo el nombre propio sin sustituirlo por una glosa interpretativa.
- source_word: וַיָּבֹא
  english_pob_choice: He went in
  chosen_spanish: Él entró
  alternatives_spanish:
  - Fue adentro
  - Ingresó
  lexicon: HALOT
  rationale: El verbo singular marca al viajero principal. «Él entró» conserva el movimiento narrativo y refleja con precisión el cambio a singular.
- source_word: וַיֵּשֶׁב
  english_pob_choice: sat down
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - se quedó sentado
  lexicon: HALOT
  rationale: ישב aquí describe tomar asiento al llegar. «Se sentó» es la equivalencia más natural y directa en español.
- source_word: בִּרְחוֹב הָעִיר
  english_pob_choice: in the open square of the city
  chosen_spanish: en la plaza abierta de la ciudad
  alternatives_spanish:
  - en la calle de la ciudad
  - en la plaza de la ciudad
  lexicon: HALOT
  rationale: רחוב puede designar una amplia zona pública o plaza. «Plaza abierta» preserva ese sentido de espacio público y evita reducirlo a una calle angosta.
- source_word: וְאֵין אִישׁ
  english_pob_choice: and there was no man
  chosen_spanish: y no había nadie
  alternatives_spanish:
  - y no había un hombre
  - y no había ningún hombre
  lexicon: HALOT
  rationale: Aunque אִישׁ es literalmente «hombre», en español «no había nadie» expresa mejor la función genérica de la frase y su fuerza narrativa en este contexto de hospitalidad. La elección evita una formulación más rígida sin cambiar el sentido.
- source_word: מְאַסֵּף
  english_pob_choice: gathering them in
  chosen_spanish: que los recibiera
  alternatives_spanish:
  - que los acogiera
  - que los recogiera
  lexicon: HALOT
  rationale: אסף en contexto de hospitalidad implica recibir y meter bajo techo. «Recibiera» expresa la acción esperada de acoger viajeros, manteniendo el matiz hospitalario sin sonar literalista.
- source_word: הַבַּיְתָה
  english_pob_choice: into his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - a su casa
  - dentro de su casa
  lexicon: HALOT
  rationale: La terminación direccional indica movimiento hacia la casa. En español, «en su casa» funciona bien con el verbo «recibiera» y refleja el destino implícito del hospedar.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y toma en cuenta el audit trail inglés: mantiene la secuencia narrativa de apartarse, entrar, sentarse y la ausencia de hospitalidad. Se optó por un español natural («se apartaron», «pasar la noche», «plaza abierta») sin perder la tensión léxica de רחוב y מְאַסֵּף. También se evitó traducir mecánicamente desde el inglés cuando el español pedía una formulación más idiomática.'
  spanish_consistency_notes:
  - Se mantuvo la transliteración «Gabaa» para el topónimo, en línea con una adaptación española legible.
  - «Pasar la noche» refleja לון de forma clara y consistente con el estilo POB.
  - «Recibiera» en la nota y «los recibiera en su casa» preservan el sentido de hospitalidad implícito en מְאַסֵּף y הַבַּיְתָה.
