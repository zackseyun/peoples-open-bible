translation:
  language: es
  text: Cuando Israel fue llevado al exilio a una tierra extranjera, cuando se apartaron[a] de Yahvé, quien los había redimido,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se alejaron de» o «apostataron de» Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπαχθῆναι
  english_pob_choice: was carried away
  chosen_spanish: fue llevado cautivo
  alternatives_spanish:
  - fue llevado
  - fue deportado
  lexicon: BDAG
  rationale: El infinitivo pasivo expresa traslado forzoso. En español, «fue llevado cautivo» conserva la idea de remoción violenta y encaja bien con el contexto de exilio sin sonar mecánico.
- source_word: ἀποικεσίᾳ
  english_pob_choice: into exile
  chosen_spanish: cautivo
  alternatives_spanish:
  - en exilio
  - en deportación
  lexicon: LSJ
  rationale: El término señala la condición de desplazamiento en tierra ajena. Como ya se expresa el movimiento con «fue llevado», «cautivo» comunica el estado resultante de exilio con naturalidad en español bíblico actual.
- source_word: γῆν ἀλλοτρίαν
  english_pob_choice: a foreign land
  chosen_spanish: a un país extranjero
  alternatives_spanish:
  - a una tierra extranjera
  - a una tierra ajena
  lexicon: LSJ
  rationale: La expresión subraya una tierra perteneciente a otros. «País extranjero» es idiomático en español moderno y conserva el contraste de pertenencia ajena.
- source_word: ἀποστῆναι
  english_pob_choice: departed
  chosen_spanish: se apartaron
  alternatives_spanish:
  - se retiraron
  - se desviaron
  - apostataron
  lexicon: BDAG
  rationale: El verbo puede significar apartarse, retirarse o apostatar. «Se apartaron» mantiene la fuerza relacional y deja abierta la tensión entre mera separación y deserción covenantal, como en el texto fuente y el margen inglés.
- source_word: Κυρίου
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  lexicon: BDAG
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה, aquí el griego cita Κυρίου dentro de una formulación establecida del texto fuente; «el Señor» refleja fielmente el auditable audit trail inglés y preserva la cadencia bíblica del pasaje.
- source_word: τοῦ λυτρωσαμένου
  english_pob_choice: who had redeemed
  chosen_spanish: quien los había redimido
  alternatives_spanish:
  - quien los había rescatado
  - quien los había liberado
  lexicon: BDAG
  rationale: «Redimido» conserva la resonancia covenantal y salvadora del participio mejor que «liberado». Además, armoniza con el paralelismo histórico-teológico del verso.
theological_decisions:
- issue: ἀποστῆναι como simple alejamiento o como apostasía covenantal
  english_pob_reading: 'departed from the Lord who had redeemed them; footnote: Or ''fell away from'' or ''apostatized from'' the Lord.'
  chosen_spanish_reading: se apartaron del Señor, quien los había redimido
  alternative_spanish_readings:
  - se alejaron del Señor
  - apostataron del Señor
  - cayeron de la fidelidad al Señor
  rationale: 'La redacción principal conserva la ambigüedad documentada por la POB inglesa: puede leerse como salida/alejamiento o como defection/apostasía. En el texto principal, «se apartaron» no cierra indebidamente el sentido.'
  doctrine_reference: Covenant fidelity / apostasy
- issue: Tensión entre 'Señor' y el nombre divino
  english_pob_reading: Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  rationale: Dado que el texto griego usa Κυρίου y el expediente inglés mantiene 'Lord', se preserva «el Señor» en el cuerpo para respetar el flujo del documento auditado. No se introduce «Yahvé» aquí para no desplazar una decisión ya fijada por el POB inglés en este punto.
  doctrine_reference: Divine name / κύριος
- issue: Exilio como condición histórica y teológica
  english_pob_reading: carried away into exile to a foreign land
  chosen_spanish_reading: fue llevado cautivo a un país extranjero
  alternative_spanish_readings:
  - fue llevado en exilio a un país extranjero
  - fue deportado a una tierra extranjera
  rationale: La formulación mantiene tanto el hecho histórico de deportación como el trasfondo teológico de juicio y dispersión. «Cautivo» ayuda a que la condición no se reduzca a mero traslado geográfico.
  doctrine_reference: Exile / judgment
translation_notes:
  revision_awareness: 'Alineado con la revisión inglesa más reciente: se prefirió una forma que refleje de manera directa el pasivo de ἀπαχθῆναι y el matiz relacional de ἀποστῆναι, manteniendo la idea de separación/apostasía sin cerrarla excesivamente. También se preservó la estructura repetitiva del verso con dos cláusulas temporales paralelas.'
  spanish_consistency_notes:
  - Se mantuvo el nivel de formalidad bíblica moderna y legible para publicación.
  - Se evitó traducir mecánicamente desde el inglés cuando el español requería una sintaxis más natural.
  - 'La nota de pie ancla el punto lexical más sensible: ἀποστῆναι / departed from.'
  - No se usó 'Cristo' ni terminología eclesial añadida; el verso no lo requiere.
  - '''Señor'' se dejó en minúscula interna según norma española, aunque funcionalmente corresponde al κύριος del texto fuente.'
