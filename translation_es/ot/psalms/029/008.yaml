revisions:
- from: La voz de Yahvé sacude el desierto[a]; Yahvé sacude el desierto de Cades.
  to: La voz de Yahvé sacude la estepa[a]; Yahvé sacude la estepa de Cades.
  rationale: Se revisa 'desierto' a 'estepa' para respetar mejor la decisión léxica documentada para מִדְבָּר como un territorio inculto/salvaje más amplio que el sentido climático estrecho de 'desierto'. Se mantiene 'Yahvé', 'voz' y 'sacude' por su buena fidelidad y naturalidad. La nota se ajusta para conservar mejor las alternativas léxicas del verbo חול.
