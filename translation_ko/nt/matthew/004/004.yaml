  text: 그러나 예수께서 대답하셨습니다. 「기록되어 있습니다. 『사람이 빵으로만 사는 것이 아니라, 하나님의 입에서 나오는 모든 말씀으로 산다』 하였습니다.」
  philosophy: optimal-equivalence
