translation:
  language: es
  text: 'los hijos de Babilonia y todos los caldeos[a], Pecod, Súa y Quoa, todos los hijos de Asiria con ellos: jóvenes deseables, todos ellos, gobernadores y funcionarios, oficiales y hombres de renombre[b], todos ellos montados en caballos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pecod, Súa y Quoa probablemente son nombres de pueblos o regiones aliados con Babilonia; algunos intérpretes los toman, en cambio, como apelativos descriptivos, tales como funcionarios, nobles o guerreros.
    reason: alternative_reading
  - marker: b
    text: O «hombres distinguidos» o, más literalmente, «llamados».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי בָבֶל
  english_pob_choice: the sons of Babylon
  chosen_spanish: los hijos de Babilonia
  alternatives_spanish:
  - los descendientes de Babilonia
  - los babilonios
  lexicon: HALOT
  rationale: Conservo el giro genealógico/étnico del hebreo y su paralelo con «los hijos de Asiria». En español, «hijos de» mantiene mejor la estructura del original que una etnicidad llanamente nominal.
- source_word: כַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  - los caldeanos
  lexicon: HALOT
  rationale: «Caldeos» es la designación étnica convencional y diferenciada de «Babilonia», por lo que evita fusionar dos elementos que el texto presenta en lista aditiva.
- source_word: פְּקוֹד וְשׁוֹעַ וְקוֹעַ
  english_pob_choice: Pekod and Shoa and Koa
  chosen_spanish: Pecod, Súa y Quoa
  alternatives_spanish:
  - Pecod, Soa y Quoa
  - Pecod, Súa y Koa
  lexicon: HALOT
  rationale: Los trato como nombres propios de pueblos o regiones, siguiendo la lectura morfológica y la lista de grupos aliados. Mantengo la posibilidad alternativa de lectura apelativa en la nota [a].
- source_word: כָּל בְּנֵי אַשּׁוּר אוֹתָם
  english_pob_choice: all the sons of Assyria with them
  chosen_spanish: todos los hijos de Asiria con ellos
  alternatives_spanish:
  - todos los asirios con ellos
  - todos los hijos de Assur con ellos
  lexicon: HALOT
  rationale: Reproduzco el paralelismo con «hijos de Babilonia» y conservo el sentido de compañía de אֹתָם mediante «con ellos».
- source_word: בַּחוּרֵי חֶמֶד
  english_pob_choice: desirable young men
  chosen_spanish: jóvenes deseables
  alternatives_spanish:
  - jóvenes hermosos
  - jóvenes escogidos
  lexicon: HALOT
  rationale: «Jóvenes deseables» conserva el valor evaluativo/erótico del hebreo sin sobreadaptarlo. Evito un adjetivo más interpretativo como «hermosos» para no desplazar la base semántica de חֶמֶד.
- source_word: פַּחוֹת
  english_pob_choice: governors
  chosen_spanish: gobernadores
  alternatives_spanish:
  - gobernadores provinciales
  - prefectos
  lexicon: HALOT
  rationale: «Gobernadores» comunica bien el rango administrativo imperial sin introducir tecnicismos más específicos de los que el texto exige.
- source_word: וּסְגָנִים
  english_pob_choice: officials
  chosen_spanish: funcionarios
  alternatives_spanish:
  - deputados
  - prefectos
  lexicon: HALOT
  rationale: «Funcionarios» es suficientemente amplio para un cargo administrativo subordinado y conserva el carácter de jerarquía estatal del listado.
- source_word: שָׁלִשִׁים
  english_pob_choice: officers
  chosen_spanish: oficiales
  alternatives_spanish:
  - capitanes
  - ayudantes
  lexicon: HALOT
  rationale: Dado que el término puede referirse a oficiales militares de élite, «oficiales» mantiene la categoría de mando sin forzar una precisión técnica incierta en español.
- source_word: וּקְרוּאִים
  english_pob_choice: men of renown
  chosen_spanish: hombres de renombre
  alternatives_spanish:
  - hombres llamados
  - hombres distinguidos
  lexicon: HALOT
  rationale: La idea honorífica del participio pasivo se expresa de forma natural como «de renombre», preservando el valor social de estatus que la POB inglesa entendió como «men of renown».
- source_word: רֹכְבֵי סוּסִים
  english_pob_choice: riding on horses
  chosen_spanish: montados a caballo
  alternatives_spanish:
  - cabalgando a caballo
  - jinetes
  lexicon: HALOT
  rationale: Opto por una frase participial natural en español que preserve la descripción de estado/acción. «Jinetes» sería más condensado, pero perdería el flujo descriptivo del hebreo.
- source_word: כֻּלָּם
  english_pob_choice: all of them
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  lexicon: HALOT
  rationale: Mantengo la repetición enfática con «todos ellos» para reflejar el acumulativo del hebreo y la intensificación retórica del listado.
translation_notes:
  revision_awareness: La versión española sigue de cerca el trazado léxico del hebreo y la lectura auditada de la POB inglesa, sin cambios relevantes respecto del último pase revisado; se preserva la enumeración acumulativa y la posible ambigüedad de los tres nombres/epítetos del inicio.
  spanish_consistency_notes:
  - Se mantiene «hijos de» para conservar el paralelismo con el hebreo.
  - Se usa «caldeos» como etnónimo distinto de «Babilonia».
  - La repetición de «todos ellos» refleja el énfasis triple del original.
  - «Montados a caballo» conserva el valor descriptivo del participio hebreo sin reducirlo a un sustantivo único.
