translation:
  language: es
  text: La visión de Isaías, hijo de Amoz[a] que vio acerca de Judá y Jerusalén en los días de Uzías, Jotam, Acaz y Ezequías, reyes de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra Judá y Jerusalén». La preposición hebrea puede introducir el tema de la visión o, en algunos contextos, un mensaje adversativo.
    reason: alternative_reading
lexical_decisions:
- source_word: חֲזוֹן
  english_pob_choice: vision
  chosen_spanish: visión
  alternatives_spanish:
  - oráculo
  - revelación
  lexicon: HALOT
  rationale: חֲזוֹן nombra una experiencia o comunicación profética recibida por visión; «visión» conserva la imagen y coincide con el verbo siguiente חָזָה («vio»). «Oráculo» estrecha demasiado el sentido, y «revelación» amplía más de lo que el hebreo inmediato exige.
- source_word: יְשַׁעְיָהוּ
  english_pob_choice: Isaiah
  chosen_spanish: Isaías
  alternatives_spanish:
  - Yeshayahu
  lexicon: standard proper-name rendering
  rationale: Nombre propio profético transliterado según el uso español bíblico común y legible.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - ben
  lexicon: HALOT
  rationale: La construcción de filiación se expresa naturalmente en español con «hijo de».
- source_word: אָמ֔וֹץ
  english_pob_choice: Amoz
  chosen_spanish: Amoz
  alternatives_spanish:
  - Amós
  lexicon: standard proper-name rendering
  rationale: Nombre propio conservado en forma transliterada estable; «Amós» podría confundirse con el profeta distinto.
- source_word: אֲשֶׁר
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  lexicon: HALOT
  rationale: La partícula relativa introduce la oración que modifica «visión»; en español, «que» suena más natural y no añade matiz innecesario.
- source_word: חָזָה
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - contempló
  - tuvo en visión
  lexicon: HALOT
  rationale: El verbo literalmente significa «ver» en contextos proféticos. «Vio» preserva el enlace léxico con «visión» sin expandir interpretativamente el acto profético.
- source_word: עַל
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - contra
  - sobre
  lexicon: HALOT
  rationale: En el encabezado profético, עַל puede marcar el asunto de la visión. «Acerca de» mantiene apertura semántica; «contra» impondría un tono de juicio no exigido por el encabezado.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judea
  lexicon: standard biblical geography
  rationale: Nombre del reino/territorio en su forma bíblica habitual en español.
- source_word: וִ/ירוּשָׁלִָ֑ם
  english_pob_choice: and Jerusalem
  chosen_spanish: y Jerusalén
  alternatives_spanish:
  - e Jerusalén
  lexicon: standard biblical geography
  rationale: Conjunción y topónimo rendidos de manera directa; «y» es perfectamente eufónica antes de «Jerusalén».
- source_word: בִּ/ימֵ֨י
  english_pob_choice: in the days of
  chosen_spanish: en los días de
  alternatives_spanish:
  - durante los reinados de
  lexicon: HALOT
  rationale: La expresión temporal hebrea se vierte de forma literal e idiomática. «Durante los reinados de» explicita algo implícito, pero no es necesario en el texto principal.
- source_word: עֻזִּיָּ֧הוּ
  english_pob_choice: Uzziah
  chosen_spanish: Uzías
  alternatives_spanish:
  - Azarías
  lexicon: standard biblical name usage
  rationale: Forma española tradicional y ampliamente reconocible para el rey de Judá en este contexto.
- source_word: יוֹתָ֛ם
  english_pob_choice: Jotham
  chosen_spanish: Jotam
  alternatives_spanish:
  - Yotán
  lexicon: standard biblical name usage
  rationale: Forma española estable del nombre del rey; mantiene la identificación histórica.
- source_word: אָחָ֥ז
  english_pob_choice: Ahaz
  chosen_spanish: Acaz
  alternatives_spanish:
  - Ajaz
  lexicon: standard biblical name usage
  rationale: Forma española bíblica habitual y clara para el rey de Judá.
- source_word: יְחִזְקִיָּ֖הוּ
  english_pob_choice: Hezekiah
  chosen_spanish: Ezequías
  alternatives_spanish:
  - Jizquías
  lexicon: standard biblical name usage
  rationale: Forma española tradicional y reconocible del nombre real.
- source_word: מַלְכֵ֥י יְהוּדָֽה
  english_pob_choice: kings of Judah
  chosen_spanish: reyes de Judá
  alternatives_spanish:
  - los reyes de Judá
  lexicon: HALOT
  rationale: La frase en aposición identifica a los gobernantes mencionados. En español, el artículo puede omitirse sin pérdida de sentido y conserva fluidez.
theological_decisions:
- issue: Alcance de עַל en el encabezado profético
  english_pob_reading: concerning Judah and Jerusalem
  chosen_spanish_reading: acerca de Judá y Jerusalén
  alternative_spanish_readings:
  - contra Judá y Jerusalén
  rationale: El hebreo permite que עַל introduzca el tema de la visión o, en ciertos contextos, una carga adversativa. «Acerca de» conserva la amplitud semántica y evita resolver de antemano si el contenido es predominantemente de juicio o de otro tipo.
  doctrine_reference: Preservar la tensión del texto sin adelantar la dirección teológica del libro.
translation_notes:
  revision_awareness: El texto sigue de cerca la lectura estable del POB en inglés y no requiere revisión sustancial; se conserva la elección abierta de עַל con una nota alternativa, y los nombres propios se ajustan a las formas bíblicas españolas estándar.
  spanish_consistency_notes:
  - Se mantuvo «visión» y «vio» para preservar el vínculo léxico del encabezado hebreo.
  - Se prefirieron formas bíblicas españolas comunes de los nombres reales para legibilidad e identificación.
  - Se evitó «SEÑOR» o cualquier sustitución del nombre divino porque este versículo no lo contiene.
  - La nota al pie marca únicamente la alternativa lexical/teológica documentada por el POB en inglés.
