translation:
  language: es
  text: No se queden mirándome porque soy morena[a], porque el sol me ha quemado[b]. Los hijos de mi madre[c] se enfadaron conmigo; me pusieron a cuidar las viñas, pero mi propia viña no la he cuidado[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘negra’, más literal respecto del adjetivo hebreo; ‘morena’ comunica mejor el sentido natural en español moderno.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, ‘porque el sol me ha quemado/escocido’; la expresión tradicional ‘el sol me ha mirado’ sigue más de cerca el giro idiomático, pero oscurece el sentido.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, ‘los hijos de mi madre’.
    reason: lexical_alternative
  - marker: d
    text: ‘Mi propia viña’ probablemente es metafórica, pero el referente exacto no se explicita en hebreo.
    reason: cultural_note
lexical_decisions:
- source_word: אַל תִּרְא֨וּ/נִי֙
  english_pob_choice: Do not stare at me
  chosen_spanish: No me miren
  alternatives_spanish:
  - No me vean
  - No me miren fijamente
  - No me observen
  lexicon: HALOT
  rationale: ראה con negación אַל y objeto de 1cs pide un imperativo plural claro en español. 'No me miren' es natural y conserva la reprensión social sin sobrecargar el matiz de escrutinio de 'stare'.
- source_word: שְׁחַרְחֹ֔רֶת
  english_pob_choice: dark
  chosen_spanish: morena
  alternatives_spanish:
  - oscura
  - negra
  - bronceada
  lexicon: HALOT
  rationale: El adjetivo describe apariencia oscurecida por el sol. 'Morena' es la opción más natural en español para una complexión oscurecida, aunque no agota el matiz de 'darkened'.
- source_word: שֶׁשֱּׁזָפַ֖תְנִי הַשָּׁ֑מֶשׁ
  english_pob_choice: because the sun has scorched me
  chosen_spanish: porque el sol me ha quemado
  alternatives_spanish:
  - porque el sol me ha tostado
  - porque el sol me ha escaldado
  - porque el sol me ha quemado/achicharrado
  lexicon: HALOT
  rationale: El verbo expresa el efecto del sol sobre la piel. 'Me ha quemado' comunica bien la idea de exposición intensa y el resultado visible; 'tostado' sería demasiado coloquial, y 'escaldado' suena menos natural aquí.
- source_word: בְּנֵי אִמִּי
  english_pob_choice: My mother’s sons
  chosen_spanish: Los hijos de mi madre
  alternatives_spanish:
  - Mis hermanos
  - Los hijos de mi madre propia
  - Los hijos de la que me dio a luz
  lexicon: HALOT
  rationale: Se mantiene la literalidad del hebreo ('hijos de mi madre') para preservar el leve distanciamiento y la formulación específica del texto; 'mis hermanos' suaviza esa particularidad.
- source_word: נִחֲרוּ בִי
  english_pob_choice: were angry with me
  chosen_spanish: se enfadaron conmigo
  alternatives_spanish:
  - ardieron contra mí
  - se indignaron contra mí
  - se airaron conmigo
  lexicon: HALOT
  rationale: El verbo comunica ira encendida. 'Se enfadaron conmigo' es claro y idiomático en español, sin forzar un calco como 'ardieron contra mí'.
- source_word: שָׂמֻ֨/נִי֙ נֹטֵרָ֣ה אֶת הַ/כְּרָמִ֔ים
  english_pob_choice: they made me keeper of the vineyards
  chosen_spanish: me pusieron a cuidar las viñas
  alternatives_spanish:
  - me hicieron guardiana de las viñas
  - me nombraron guardiana de las viñas
  - me pusieron como guardiana de las viñas
  lexicon: HALOT
  rationale: נֹטֵרָה es participio femenino de 'guardar/cuidar'. 'Me pusieron a cuidar las viñas' conserva la idea de asignación a una tarea y evita un título demasiado administrativo.
- source_word: כַּרְמִ֥/י שֶׁ/לִּ֖/י
  english_pob_choice: my own vineyard
  chosen_spanish: mi propia viña
  alternatives_spanish:
  - mi viña propia
  - mi viña, la mía
  - mi propio viñedo
  lexicon: HALOT
  rationale: El posesivo reforzado se expresa bien con 'propia'. 'Viña' mantiene la imagen poética y el posible sentido metafórico sin resolverlo.
- source_word: לֹ֥א נָטָֽרְתִּי
  english_pob_choice: I have not kept
  chosen_spanish: no la he guardado
  alternatives_spanish:
  - no la he cuidado
  - no la he vigilado
  - no la he custodiado
  lexicon: HALOT
  rationale: Se conserva la raíz semántica de נטר ('guardar, vigilar, custodiar'). 'He guardado' enlaza con 'cuidar las viñas' y deja abierta la resonancia metafórica.
theological_decisions:
- issue: Ambigüedad metafórica de 'mi propia viña'
  english_pob_reading: Retain the vineyard language literally in the main text without explicating the metaphor.
  chosen_spanish_reading: Conservar literalmente la imagen de 'mi propia viña' sin explicar su referente.
  alternative_spanish_readings:
  - Interpretarla como su cuerpo o su apariencia
  - Interpretarla como su vida personal o castidad
  - Sustituirla por una explicación explícita
  rationale: El hebreo no aclara el referente exacto; mantener la metáfora respeta la tensión poética y evita fijar una interpretación que el texto no exige.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión textual en lugar de resolverla interpretativamente.'
translation_notes:
  revision_awareness: Revisado contra el paquete fuente hebreo (WLC) y el audit trail inglés; la versión española conserva la imaginería, los matices léxicos clave y la ambigüedad metafórica documentada, sin añadir interpretación no respaldada.
  spanish_consistency_notes:
  - Se mantuvo 'viña' para conservar la imagen poética y evitar una paráfrasis interpretativa.
  - Se evitó 'SEÑOR' o equivalentes no pertinentes; el versículo no contiene el Tetragrámaton.
  - '''Morena'' se eligió por naturalidad en español, aunque la nota preserva la alternativa más literal ''negra''.'
  - Se usó el pretérito perfecto compuesto ('he quemado', 'he guardado') para reflejar estado resultante presente en español.
