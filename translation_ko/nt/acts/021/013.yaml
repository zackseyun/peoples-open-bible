  text: ⸂τότε ἀπεκρίθη⸃ ὁ Παῦλος· Τί ποιεῖτε κλαίοντες καὶ συνθρύπτοντές μου τὴν καρδίαν; ἐγὼ γὰρ οὐ μόνον δεθῆναι ἀλλὰ καὶ ἀποθανεῖν εἰς Ἰερουσαλὴμ ἑτοίμως ἔχω ὑπὲρ τοῦ ὀνόματος τοῦ κυρίου Ἰησοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/acts/021/013.yaml
  text: Then Paul answered[a], “What are you doing[b], weeping and breaking my heart? For I am ready not only to be bound but even to die in Jerusalem for the name of the Lord Jesus.”
  footnotes:
  - marker: a
    text: Or “crushing my heart.” The Greek verb is stronger than simple sadness and pictures inward emotional breaking.
    reason: lexical_alternative
  - marker: b
    text: Or “for the sake of the name of the Lord Jesus.” “The name” is a biblical way of referring to Jesus himself, his authority, and the cause identified with him.
    reason: lexical_alternative
translation:
  language: ko
  text: 그때에 바울이 대답하기를, 「여러분이 어찌하여 울며 내 마음을 상하게 하십니까? 나는 결박을 받을 뿐 아니라 주 예수의 이름을 위하여 예루살렘에서 죽을 것도 각오하고 있습니다」 하였습니다.
  philosophy: optimal-equivalence
