translation:
  language: es
  text: Leyeron del libro[a], de la ley de Dios, claramente, y daban el sentido, de modo que entendieran la lectura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «distintamente»; el término hebreo puede indicar una lectura de manera clara, haciendo el texto comprensible por explicación, o posiblemente traduciéndolo para quienes escuchaban.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרְאוּ
  english_pob_choice: They read
  chosen_spanish: Leían
  alternatives_spanish:
  - Leyeron
  - Proclamaban
  - Leían en voz alta
  lexicon: HALOT
  rationale: קרא, con objeto de texto escrito, puede referirse a la acción de leer. En un contexto de lectura pública, el imperfecto narrativo en español funciona bien para la acción continuada o iterativa del relato. 'Leían' mantiene naturalidad y permite el matiz de lectura pública sin añadir una especificación no explicitada por el hebreo.
- source_word: בַסֵּפֶר
  english_pob_choice: from the book
  chosen_spanish: en el libro
  alternatives_spanish:
  - del libro
  - desde el libro
  lexicon: HALOT
  rationale: 'El hebreo con ב puede marcar el ámbito de la lectura pública: leían en el libro. En español, ''en el libro'' comunica de forma natural el lugar textual de la lectura; ''del libro'' sonaría más interpretativo respecto del origen del acto de leer.'
- source_word: בְּתוֹרַת הָאֱלֹהִים
  english_pob_choice: from the law of God
  chosen_spanish: en la ley de Dios
  alternatives_spanish:
  - en la instrucción de Dios
  - de la ley de Dios
  lexicon: HALOT
  rationale: תּוֹרָה en este contexto de Esdras-Nehemías se refiere concretamente a la ley/instrucción divina leída al pueblo. 'Ley de Dios' conserva el sentido textual-covenantal y es idiomática en español bíblico. Se evita 'SEÑOR' porque el hebreo dice 'Dios' (הָאֱלֹהִים).
- source_word: מְפֹרָשׁ
  english_pob_choice: clearly
  chosen_spanish: claramente
  alternatives_spanish:
  - distintamente
  - con explicación
  - traduciendo
  lexicon: HALOT
  rationale: El participio de פרש puede implicar claridad, distinción o explicación. 'Claramente' es una opción natural y suficientemente amplia en español, manteniendo abierta la tensión entre lectura clara, explicación o posible traducción para los oyentes, tal como refleja la nota inglesa.
- source_word: וְשׂוֹם שֶׂכֶל
  english_pob_choice: and they gave the sense
  chosen_spanish: y daban el sentido
  alternatives_spanish:
  - y explicaban el significado
  - y ponían entendimiento
  - y daban comprensión
  lexicon: HALOT
  rationale: La expresión idiomática alude a hacer inteligible el texto. 'Daban el sentido' preserva la formulación concisa del POB inglés y su función explicativa sin sobreespecificar el método. 'Sentido' es la equivalencia más natural para el español bíblico contemporáneo.
- source_word: וַיָּבִינוּ
  english_pob_choice: so that they understood
  chosen_spanish: de modo que entendieran
  alternatives_spanish:
  - y entendían
  - para que entendieran
  - y comprendieron
  lexicon: HALOT
  rationale: 'El verbo בִּין expresa el resultado de la lectura y la explicación. En español, una cláusula de resultado ''de modo que'' refleja bien la secuencia: leer, explicar y lograr comprensión. El subjuntivo mantiene el matiz de resultado esperado o logrado en el relato.'
- source_word: בַּמִּקְרָא
  english_pob_choice: the reading
  chosen_spanish: la lectura
  alternatives_spanish:
  - la recitación
  - lo leído
  - la proclamación
  lexicon: HALOT
  rationale: מִקְרָא designa la lectura pública o el acto de leer en voz alta. 'La lectura' es la forma más clara y natural en español; conserva el carácter formal del contexto sin introducir una paráfrasis más amplia.
translation_notes:
  revision_awareness: 'Coincide con el sentido global del texto hebreo y con el audit trail inglés: lectura pública de la ley, explicación del contenido y resultado de comprensión. Se mantuvo la ambigüedad útil de מְפֹרָשׁ sin cerrarla a una sola técnica (articulación, explicación o traducción).'
  spanish_consistency_notes:
  - Se usó 'Dios' para הָאֱלֹהִים, conforme al término hebreo y al estándar del proyecto.
  - Se prefirió 'ley de Dios' para תּוֹרָה en este contexto narrativo-covenantal.
  - '''La lectura'' reproduce el valor público de מִקְרָא sin calco excesivo.'
  - No se introdujo 'Cristo' ni vocabulario cristianizante ajeno al pasaje.
