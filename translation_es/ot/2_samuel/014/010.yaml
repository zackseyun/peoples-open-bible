translation:
  language: es
  text: 'Y el rey dijo[a]: «El que te hable, tráemelo, y nunca más te tocará».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no volverá a tocarte»; el hebreo puede implicar contacto hostil o daño, no solo tocar físicamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: מֶלֶךְ se traduce de manera directa y natural como «rey»; el artículo hebreo queda reflejado por el artículo definido español.
- source_word: הַמְדַבֵּר אֵלַיִךְ
  english_pob_choice: whoever speaks to you
  chosen_spanish: el que te hable
  alternatives_spanish:
  - quien te hable
  - el que habla contigo
  lexicon: HALOT
  rationale: El participio con artículo funciona sustantivamente como «el que habla contigo». En español, «el que te hable» conserva la referencia abierta a cualquier persona y suena más natural en una orden directa.
- source_word: וַהֲבֵאתוֹ אֵלַי
  english_pob_choice: bring him to me
  chosen_spanish: tráemelo
  alternatives_spanish:
  - tráelo a mí
  - y tráemelo
  lexicon: HALOT
  rationale: El hitpael/causativo de בוא expresa hacer venir; en español el imperativo «tráemelo» comunica bien la acción de llevar a esa persona hasta el rey sin añadir elementos innecesarios.
- source_word: לֹא יֹסִיף עוֹד לָגַעַת בָּךְ
  english_pob_choice: he will never touch you again
  chosen_spanish: nunca más te tocará
  alternatives_spanish:
  - no volverá a tocarte
  - no te tocará más
  lexicon: HALOT
  rationale: La construcción hebrea «no añadir más» con infinitivo expresa cese definitivo. Siguiendo la decisión inglesa revisada, «nunca más te tocará» conserva el valor idiomático y mantiene el verbo literal «tocar», dejando implícita la posible fuerza hostil del contexto.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió una formulación idiomática y natural («never touch you again») sobre una más literal pero pesada. El español refleja ese mismo equilibrio, manteniendo el verbo «tocar» y el matiz de cese definitivo.
  spanish_consistency_notes:
  - Se usa «Yahvé» según la norma del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene un español neutro y bíblico sin calcos innecesarios.
  - No se introduce «Cristo», «SEÑOR» ni otras formas no presentes en el texto fuente.
  - La nota al pie preserva la tensión lexical entre contacto físico y daño hostil, sin resolverla de manera excesiva.
