  spanish_quality_summary: El español es claro, natural y de registro digno. La alternancia «cama / lecho» funciona bien para distinguir los dos términos hebreos paralelos sin sonar forzada. «Soportará mi queja» es idiomático y suficientemente cercano a la metáfora de ‘bear’. La puntuación y el estilo son apropiados.
