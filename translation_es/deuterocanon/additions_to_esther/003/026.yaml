  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aparece en este pasaje.
  - Se conservó la imagen de repulsión explícita sin suavizarla.
  - Los marcadores de nota [a]-[e] aparecen exactamente una vez cada uno en el texto español.
