- from: Entonces Ehud extendió su mano izquierda[a], tomó la espada de sobre su muslo derecho[b] y la hundió en su vientre.
  to: Entonces Ehud extendió su mano izquierda, tomó la espada de su muslo derecho[a] y la hundió en su vientre[b].
  rationale: Se corrigió la ubicación y el contenido de las notas para alinearlas con el rastro inglés y con el hebreo auditado. También se suavizó el calco espacial «de sobre» a «de» para mejorar la naturalidad en español sin perder el sentido de que el arma estaba ceñida al muslo derecho. El resto del versículo es fiel y no requiere cambios mayores.
