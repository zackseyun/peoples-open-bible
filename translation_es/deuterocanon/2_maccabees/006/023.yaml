  - severity: medium
    issue: «la santa y dada-por-Dios ley» es poco natural en español
    rationale: Aunque intenta conservar el compuesto θεοκτίστου, el guionado suena forzado. «La santa ley dada por Dios» o «la santa y divina ley» es más idiomático y fiel al sentido documentado de ‘God-given law’.
