translation:
  language: es
  text: Me he hundido en lodo profundo, y no hay lugar donde afirmarme; he entrado en aguas profundas, y el torrente[a] me ha cubierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «la corriente me ha abrumado» o «el torrente me ha engullido».
    reason: lexical_alternative
lexical_decisions:
- source_word: טָבַעְתִּי
  english_pob_choice: I have sunk
  chosen_spanish: Me he hundido
  alternatives_spanish:
  - me hundo
  - me estoy hundiendo
  - me he hundido
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una condición vivida como ya acontecida y vigente; el pretérito perfecto compuesto español conserva ese efecto resultativo mejor que un simple pretérito.
- source_word: בִּיוֵן מְצוּלָה
  english_pob_choice: in deep mire
  chosen_spanish: en lodo profundo
  alternatives_spanish:
  - en lodo hondo
  - en el cieno de lo profundo
  - en el lodo de las profundidades
  lexicon: HALOT
  rationale: יוֵן expresa lodo/barro, y מְצוּלָה añade la idea de profundidad. ‘Lodo profundo’ mantiene ambas imágenes sin volverla artificial en español.
- source_word: וְאֵין מָעֳמָד
  english_pob_choice: and there is no foothold
  chosen_spanish: y no hay lugar donde afirmarme
  alternatives_spanish:
  - y no hay apoyo
  - y no hay lugar para pararme
  - y no hay firmeza
  lexicon: HALOT
  rationale: מָעֳמָד denota un lugar o soporte para estar de pie. ‘Lugar donde afirmarme’ comunica la falta de apoyo estable con naturalidad en español y conserva la imagen corporal.
- source_word: בָּאתִי
  english_pob_choice: I have come
  chosen_spanish: he entrado
  alternatives_spanish:
  - he venido
  - he llegado
  - entré
  lexicon: HALOT
  rationale: En este contexto espacial de inmersión peligrosa, ‘he entrado’ expresa mejor el movimiento hacia dentro que un simple ‘he venido’, sin perder el valor perfectivo del hebreo.
- source_word: בְמַעֲמַקֵּי מַיִם
  english_pob_choice: into deep waters
  chosen_spanish: en aguas profundas
  alternatives_spanish:
  - en las profundidades de las aguas
  - en lo profundo de las aguas
  - en aguas hondo-profundas
  lexicon: HALOT
  rationale: La expresión hebrea combina ‘profundidades’ con ‘aguas’; ‘aguas profundas’ es una equivalencia idiomática fiel y clara en español.
- source_word: שִׁבֹּלֶת
  english_pob_choice: the flood
  chosen_spanish: el torrente
  alternatives_spanish:
  - la corriente
  - la inundación
  - el río
  lexicon: HALOT
  rationale: La palabra puede señalar corriente o torrente; en este contexto de arrastre violento, ‘torrente’ conserva el impulso destructivo y el movimiento del agua.
- source_word: שְׁטָפָתְנִי
  english_pob_choice: has swept over me
  chosen_spanish: me ha arrastrado
  alternatives_spanish:
  - me ha sobrepasado
  - me ha inundado
  - me ha cubierto
  lexicon: HALOT
  rationale: El verbo de שטף incluye desbordar, inundar y llevar por delante. ‘Me ha arrastrado’ expresa bien la fuerza abrumadora del agua y mantiene la imagen física.
translation_notes:
  revision_awareness: 'El pasaje coincide estrechamente con el hebreo masorético y con la solución de la POB inglesa: condición de hundimiento, falta de apoyo, entrada en aguas profundas y acción del agua que lo sobrepasa/arrastra. No hay revisiones relevantes reportadas en el audit trail.'
  spanish_consistency_notes:
  - Se usa ‘lodo’ para יוֵן y ‘profundas’ para מְצוּלָה/מַעֲמַקֵּי, manteniendo la doble imagen de suciedad y profundidad.
  - Se evita ‘SEÑOR’ y no hay términos divinos en el versículo.
  - ‘Torrente’ se prefiere a ‘flood’/‘inundación’ por su fuerza dinámica y porque permite conservar la alternativa de ‘corriente’ en la nota.
  - 'El orden del paralelismo sigue de cerca el hebreo: hundimiento, falta de apoyo, entrada en aguas profundas, arrastre por el agua.'
