translation:
  language: es
  text: 'Yo también reuní para mí plata y oro, y el tesoro de reyes y provincias. Adquirí para mí cantores y cantoras, y los deleites de los hijos del hombre[a]: una concubina y concubinas[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los deleites de la humanidad». El hebreo dice literalmente «los deleites de los hijos del hombre».
    reason: lexical_alternative
  - marker: b
    text: El sentido de la palabra hebrea aquí es incierto; entre las alternativas se han propuesto «una amante y amantes», «coperos y coperas», o más generalmente «toda clase de lujo».
    reason: lexical_alternative
lexical_decisions:
- source_word: כָּנַסְתִּי
  english_pob_choice: gathered
  chosen_spanish: reuní
  alternatives_spanish:
  - junté
  - acumulé
  lexicon: HALOT
  rationale: El verbo expresa reunir o acumular bienes; en español, «reuní» conserva la idea de acopio activo sin sonar demasiado mecánico.
- source_word: לִי
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  - en mi favor
  lexicon: HALOT
  rationale: El dativo marca posesión y beneficio personal; «para mí» reproduce esa orientación de autoapropiación de modo natural en español.
- source_word: כֶּסֶף וְזָהָב
  english_pob_choice: silver and gold
  chosen_spanish: plata y oro
  alternatives_spanish:
  - plata y oro fino
  - plata y oro preciosos
  lexicon: HALOT
  rationale: La correspondencia metal por metal es directa; «plata y oro» es la forma española más natural y fiel.
- source_word: סְגֻלַּת מְלָכִים וְהַמְּדִינוֹת
  english_pob_choice: the treasure of kings and provinces
  chosen_spanish: el tesoro de reyes y provincias
  alternatives_spanish:
  - la riqueza de reyes y provincias
  - el tesoro especial de reyes y provincias
  lexicon: HALOT
  rationale: סְגֻלָּה designa tesoro/propiedad valiosa; «tesoro» preserva la imagen. מְדִינוֹת se entiende como provincias o distritos administrativos, no como estados abstractos.
- source_word: עָשִׂיתִי לִי
  english_pob_choice: I acquired for myself
  chosen_spanish: me procuré para mí
  alternatives_spanish:
  - me hice para mí
  - adquirí para mí
  lexicon: HALOT
  rationale: En este contexto de posesiones y deleites, «me procuré» refleja la obtención intencional; se mantiene el énfasis reflexivo del hebreo.
- source_word: שָׁרִים וְשָׁרוֹת
  english_pob_choice: male singers and female singers
  chosen_spanish: cantores varones y cantoras
  alternatives_spanish:
  - cantores y cantoras
  - cantantes hombres y mujeres
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente masculino y femenino. «Cantores varones y cantoras» preserva esa distinción sin forzar una perífrasis pesada.
- source_word: תַעֲנוּגֹת בְּנֵי הָאָדָם
  english_pob_choice: the delights of the sons of man
  chosen_spanish: los deleites de los hijos del hombre
  alternatives_spanish:
  - los deleites de la humanidad
  - los placeres de los hombres
  lexicon: HALOT
  rationale: Se conserva la forma hebrea marcada «hijos del hombre», siguiendo la política del proyecto de no aplanar el masculino genérico en el texto principal. «Deleites» mantiene el sentido de lujo/placer.
- source_word: שִׁדָּה וְשִׁדּוֹת
  english_pob_choice: a concubine and concubines
  chosen_spanish: una concubina y concubinas
  alternatives_spanish:
  - una amante y amantes
  - copas y escanciadores
  - toda clase de lujo
  lexicon: HALOT
  rationale: El término es raro y semánticamente incierto; en este contexto de corte real y placeres humanos, la lectura sexual/haremica es plausible y coincide con la decisión auditada en inglés. Se mantiene la incertidumbre en nota.
theological_decisions:
- issue: Traducción de בְּנֵי הָאָדָם
  english_pob_reading: sons of man
  chosen_spanish_reading: los hijos del hombre
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  rationale: Se conserva la forma masculina genérica del hebreo en el texto principal, en línea con la política de fidelidad morfológica del proyecto. La alternativa inclusiva se deja para nota si se desea explicitar el sentido colectivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Tratamiento del término oscuro שִׁדָּה וְשִׁדּוֹת
  english_pob_reading: a concubine and concubines
  chosen_spanish_reading: una concubina y concubinas
  alternative_spanish_readings:
  - una amante y amantes
  - male and female cupbearers
  - toda clase de lujo
  rationale: Se adopta una interpretación que encaja con el contexto de lujo cortesano y placer, pero sin cerrar indebidamente el abanico semántico de un término raro. La nota preserva la incertidumbre léxica.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: Coincide sustancialmente con la auditoría inglesa y la revisión más reciente; no se registran cambios posteriores que obliguen a alterar la solución de fondo. Se mantiene la lectura tradicional de lujo cortesano y se preserva la ambigüedad del término final en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención del proyecto solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «provincias» para מְדִינוֹת, siguiendo el valor administrativo del término.
  - Se distingue el par masculino/femenino en «cantores varones y cantoras» para reflejar el hebreo.
  - La puntuación con dos puntos introduce la lista explicativa final sin alterar la estructura semántica del verso.
