translation:
  language: es
  text: Pero si alguno hace algo contrario a estas disposiciones[a], o deja sin efecto cualquiera de ellas, será responsable.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será culpable». La expresión griega puede indicar responsabilidad jurídica o culpabilidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρὰ ταῦτα
  english_pob_choice: contrary to these things
  chosen_spanish: contrario a estas cosas
  alternatives_spanish:
  - contra estas cosas
  - en violación de estas cosas
  lexicon: LSJ
  rationale: Con ποιήσῃ, παρά + acusativo expresa conducta en oposición o violación de lo establecido. «Contrario a» comunica bien esa fuerza jurídica en español sin añadir una idea ajena.
- source_word: ποιήσῃ
  english_pob_choice: does anything
  chosen_spanish: hace algo
  alternatives_spanish:
  - actúa
  - hace
  lexicon: BDAG
  rationale: El verbo es amplio e indefinido; en una cláusula legal condicional, «hace algo» reproduce esa amplitud de modo natural en español.
- source_word: ἀθετήσῃ
  english_pob_choice: sets aside
  chosen_spanish: anula
  alternatives_spanish:
  - rechaza
  - deja sin efecto
  - desatiende
  lexicon: BDAG
  rationale: En contexto de decreto, ἀθετέω puede significar invalidar o dejar sin efecto. «Anula» mantiene la fuerza jurídica de manera clara y breve.
- source_word: τι τούτων
  english_pob_choice: any of them
  chosen_spanish: cualquiera de ellas
  alternatives_spanish:
  - alguna de ellas
  - alguna de estas cosas
  - cualquiera de estas cosas
  lexicon: LSJ
  rationale: La expresión partitiva se refiere a cualquier punto entre las disposiciones precedentes. «Cualquiera de ellas» es idiomático y conserva el sentido distributivo.
- source_word: ἔνοχος ἔσται
  english_pob_choice: he shall be liable
  chosen_spanish: será considerado responsable
  alternatives_spanish:
  - será culpable
  - será responsable
  - quedará sujeto a pena
  lexicon: BDAG
  rationale: ἔνοχος en contextos legales denota estar sujeto a responsabilidad o pena. «Será considerado responsable» refleja bien la carga jurídica sin fijar indebidamente solo una matización moral.
translation_notes:
  revision_awareness: 'Coincide con el sentido del griego de Swete 1909 y con el audit trail inglés: παρά + acusativo como oposición/violación, ἀθετέω como invalidar o dejar sin efecto, y ἔνοχος como responsabilidad legal. No se detectan revisiones textuales relevantes en el expediente.'
  spanish_consistency_notes:
  - Se mantiene un registro jurídico sobrio y público, acorde con un decreto.
  - Se evita «SEÑOR» o terminología confesional ajena; el versículo no contiene vocabulario divino.
  - «Responsable» se usa en sentido legal, no meramente moral, para conservar la ambigüedad útil de ἔνοχος.
