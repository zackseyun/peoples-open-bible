review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: los terrenos alrededor de las ciudades dadas a los levitas se miden desde el muro de la ciudad hacia afuera por mil codos alrededor. Conserva correctamente «muro», «mil codos» y el sentido perimetral de סָבִיב. Sin embargo, «que darán» cambia innecesariamente la persona frente al hebreo y al contexto exhortativo; en español debe ser «que ustedes den» o equivalente. También conviene pulir el orden para mayor naturalidad.'
  spanish_quality_summary: El texto es mayormente claro y digno. «Ejidos» es defendible y natural en muchos contextos hispanos para מִגְרָשׁ, especialmente con la nota de alternativa. No obstante, la frase «que darán a los levitas» suena menos natural en este contexto directo y puede percibirse como cambio de sujeto o de registro; «que ustedes den a los levitas» lee mejor. La puntuación y las notas requieren una leve limpieza tipográfica.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. «Ejidos» encaja razonablemente con la decisión auditada para מִגְרְשֵׁי, siempre acompañada por nota alternativa. «Levitas», «muro», «codos» y «alrededor» están bien alineados con el rastro léxico inglés y el hebreo fuente.
  issues:
  - severity: medium
    issue: «que darán» no preserva bien la fuerza contextual de la instrucción dirigida al oyente
    rationale: El hebreo תִּתְּנוּ es 2mp; aunque el español puede neutralizar persona en algunos contextos, aquí «que darán» suena más predictivo que directivo y menos fiel al mandato contextual. «Que ustedes den» conserva mejor la referencia a los destinatarios.
  - severity: low
    issue: Orden verbal algo rígido en «serán desde el muro de la ciudad hacia afuera»
    rationale: Es comprensible y cercano a la fuente, pero «se extenderán desde el muro...» añadiría matiz no presente. Mejor mantener «serán… desde…» pero con puntuación y flujo más naturales.
  - severity: low
    issue: La nota b tiene comillas y puntuación poco pulidas
    rationale: Empieza con una comilla simple innecesaria antes de «Hebreo». Conviene normalizar el estilo tipográfico en español.
  revised_spanish_text: Y los [a]ejidos[a] de las ciudades que ustedes den a los levitas serán desde el muro de la ciudad hacia afuera, mil codos alrededor[b].
  revised_footnotes:
  - marker: a
    text: O «tierras comunes» o «terreno abierto» para el terreno que rodea las ciudades.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «desde el muro de la ciudad»; algunos entienden esto de manera más general como «desde el límite de la ciudad».'
    reason: lexical_alternative
  revision_rationale: Se corrige la persona verbal para reflejar mejor el hebreo de segunda persona plural en contexto instructivo y se normaliza la nota b. Se conserva «ejidos» porque transmite bien el terreno comunal/periférico de las ciudades levíticas y está respaldado por la nota léxica.
