  glossary_alignment: No hay términos teológicos de proyecto en juego. Los nombres propios están razonablemente adaptados al español. 'Madián' y 'Moab' son correctos. La decisión 'Avit' con nota alternativa 'Aiot' es admisible, pero la nota debe ir anclada al nombre de la ciudad.
