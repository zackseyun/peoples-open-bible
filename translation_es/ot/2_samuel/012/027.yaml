translation:
  language: es
  text: 'Entonces Joab envió mensajeros a David y dijo[a]: «He combatido contra Rabá; también he capturado la ciudad de las aguas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «la ciudad del agua», probablemente una parte de Rabá que controlaba su abastecimiento de agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then ... sent
  chosen_spanish: Entonces ... envió
  alternatives_spanish:
  - Y ... envió
  - Luego ... envió
  lexicon: WLC/HALOT
  rationale: El waw consecutivo marca avance narrativo. «Entonces» conserva la secuencia y suena natural en español bíblico contemporáneo sin perder el valor discursivo.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - ángeles
  - enviados
  lexicon: HALOT
  rationale: Aquí designa agentes humanos enviados con un informe, no seres celestiales. «Mensajeros» refleja con precisión ese uso.
- source_word: נִלְחַמְתִּי בְרַבָּה
  english_pob_choice: I have fought against Rabbah
  chosen_spanish: He combatido contra Rabá
  alternatives_spanish:
  - He peleado contra Rabá
  - He luchado contra Rabá
  - He combatido en Rabá
  lexicon: HALOT
  rationale: «Combatido» expresa el sentido bélico de נִלְחַם con suficiente fuerza en español. «Contra Rabá» reproduce el valor hostil de בְ en este contexto de asedio o ataque.
- source_word: רַבָּה
  english_pob_choice: Rabbah
  chosen_spanish: Rabá
  alternatives_spanish:
  - Rabbá
  - Rabba
  lexicon: HALOT
  rationale: Se translitera como nombre propio bíblico en forma natural para el español. «Rabá» es claro y coherente con la práctica del proyecto.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: «También» conserva el valor aditivo que enlaza el segundo logro con el primero.
- source_word: לָכַדְתִּי
  english_pob_choice: I have ... captured
  chosen_spanish: he capturado
  alternatives_spanish:
  - he tomado
  - he apresado
  - he conquistado
  lexicon: HALOT
  rationale: «Capturado» es el equivalente militar más directo y mantiene la idea de toma de una ciudad o posición fortificada.
- source_word: עִיר הַמָּיִם
  english_pob_choice: the city of waters
  chosen_spanish: la ciudad de las aguas
  alternatives_spanish:
  - la ciudad del agua
  - la ciudad de las aguas
  - la ciudad de agua
  lexicon: HALOT
  rationale: La expresión hebrea se mantiene de modo transparente en español. «De las aguas» conserva el plural del hebreo y evita interpretar de antemano el referente topográfico o militar.
translation_notes:
  revision_awareness: 'El texto inglés POB presentó una nota alternativa para עִיר הַמָּיִם: «the water city», posiblemente la parte de Rabá que controlaba el suministro de agua. La presente versión conserva la expresión transparente «la ciudad de las aguas» en el cuerpo y registra la alternativa interpretativa en nota.'
  spanish_consistency_notes:
  - Se usa «Rabá» para el topónimo, en coherencia con la transliteración española habitual del nombre propio.
  - Se conserva el tiempo perfecto compuesto («he combatido», «he capturado») para reflejar el informe de acciones completadas con relevancia inmediata, en línea con la lectura inglesa auditada.
  - No se introducen glosas interpretativas en el texto principal acerca de la identificación exacta de la «ciudad de las aguas»; esa tensión queda preservada en la nota.
