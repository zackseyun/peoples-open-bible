translation:
  language: es
  text: Porque yo he desnudado a Esaú[a]; he descubierto sus escondites, y no podrá esconderse. Su descendencia, sus hermanos y sus vecinos han sido destruidos[b], y ya no está.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'Esaú', nombre usado aquí para la nación descendiente de Esaú, es decir, Edom.
    reason: cross_reference
  - marker: b
    text: O 'han sido despojados' / 'han sido devastados' para 'han sido destruidos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque es que
  lexicon: HALOT
  rationale: Introduzco la razón o explicación del juicio anunciado con una conjunción causal natural en español. "Porque" conserva el valor explicativo de כִּי sin sonar forzado.
- source_word: חָשַׂפְתִּי
  english_pob_choice: have stripped ... bare
  chosen_spanish: he desnudado
  alternatives_spanish:
  - he despojado
  - he dejado al descubierto
  lexicon: HALOT
  rationale: El verbo hebreo expresa dejar expuesto al quitar el revestimiento; "desnudado" reproduce bien la imagen concreta de exposición total y es natural en español bíblico moderno.
- source_word: עֵשָׂו
  english_pob_choice: Esau
  chosen_spanish: Esaú
  alternatives_spanish:
  - Edom
  lexicon: HALOT
  rationale: El texto hebreo nombra a Esaú, no a Edom. Se conserva el nombre propio transliterado, dejando implícito el referente nacional por el contexto profético.
- source_word: גִּלֵּיתִי
  english_pob_choice: have uncovered
  chosen_spanish: he descubierto
  alternatives_spanish:
  - he revelado
  - he dejado abierto
  lexicon: HALOT
  rationale: El verbo comunica quitar el velo o sacar a la luz. "Descubierto" mantiene la imaginería de exposición y combina de manera natural con "escondites".
- source_word: מִסְתָּרָיו
  english_pob_choice: his hiding places
  chosen_spanish: sus escondites
  alternatives_spanish:
  - sus lugares secretos
  - sus lugares de ocultamiento
  lexicon: HALOT
  rationale: El sustantivo se refiere a lugares concretos de ocultamiento. "Escondites" conserva el sentido espacial y es idiomático en español.
- source_word: וְנֶחְבָּה לֹא יוּכָל
  english_pob_choice: he will not be able to hide himself
  chosen_spanish: no podrá esconderse
  alternatives_spanish:
  - no podrá ocultarse
  - no podrá mantenerse oculto
  lexicon: HALOT
  rationale: La construcción expresa incapacidad de esconderse. El reflexivo español transmite el mismo valor sin añadir palabras innecesarias.
- source_word: שֻׁדַּד
  english_pob_choice: is destroyed
  chosen_spanish: están destruidos
  alternatives_spanish:
  - están arruinados
  - están devastados
  - están despojados
  lexicon: HALOT
  rationale: El verbo puede implicar despojo violento o devastación. En este contexto, con descendencia, hermanos y vecinos afectados, "están destruidos" comunica la amplitud del juicio y sigue la opción inglesa más general.
- source_word: זַרְעוֹ
  english_pob_choice: his offspring
  chosen_spanish: su descendencia
  alternatives_spanish:
  - su semilla
  - sus descendientes
  lexicon: HALOT
  rationale: '"Descendencia" preserva el sentido colectivo del singular hebreo y es más natural que una traducción literal de "semilla" en español.'
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus allegados
  lexicon: HALOT
  rationale: Se mantiene el término familiar literal, que es el valor básico del hebreo y funciona bien en el paralelismo del versículo.
- source_word: שְׁכֵנָיו
  english_pob_choice: his neighbors
  chosen_spanish: sus vecinos
  alternatives_spanish:
  - los que viven cerca de él
  - sus habitantes cercanos
  lexicon: HALOT
  rationale: '"Vecinos" conserva el valor léxico de שכנים y mantiene la serie paralela con "descendencia" y "hermanos".'
- source_word: וְאֵינֶנּוּ
  english_pob_choice: and he is no more
  chosen_spanish: y ya no existe
  alternatives_spanish:
  - y no queda más
  - y desapareció
  lexicon: HALOT
  rationale: La fórmula hebrea expresa desaparición o aniquilación con tono solemne. "Ya no existe" reproduce esa clausura final de forma clara y natural.
theological_decisions:
- issue: Referente de "Esaú" en un oráculo contra Edom
  english_pob_reading: Translate the personal name 'Esau' while allowing the national referent to remain implicit.
  chosen_spanish_reading: Mantener "Esaú" como nombre propio y dejar implícito que el oráculo apunta a Edom por el contexto.
  alternative_spanish_readings:
  - Edom
  - la nación de Edom
  rationale: El hebreo usa explícitamente el nombre personal. Conservarlo respeta la primacía del texto fuente y evita sustituir el término por una interpretación que no está escrita en el versículo.
  doctrine_reference: Principio de primacía del idioma original; preservación del nombre propio con referente contextual.
- issue: Valor de la cláusula final de aniquilación
  english_pob_reading: His offspring, his brothers, and his neighbors are destroyed, and he is no more.
  chosen_spanish_reading: 'Los sujetos colectivos quedan en una sola cláusula de resultado: "Su descendencia, sus hermanos y sus vecinos están destruidos, y ya no existe."'
  alternative_spanish_readings:
  - Su descendencia está destruida, y sus hermanos y sus vecinos; ya no existe.
  - Su descendencia, sus hermanos y sus vecinos son destruidos, y él ya no está.
  rationale: El hebreo agrupa a descendencia, hermanos y vecinos bajo el mismo verbo de destrucción. La redacción española refleja mejor ese alcance total y evita desgajar el paralelismo.
  doctrine_reference: Coherencia sintáctica con el hebreo; revisión auditada del pasaje según el pass final.
translation_notes:
  revision_awareness: Se incorporó la revisión final que agrupa "su descendencia, sus hermanos y sus vecinos" bajo un solo predicado de destrucción. También se mantuvo la elección auditada de conservar el nombre propio "Esaú" y traducir el resultado final con un cierre solemne equivalente a "and he is no more".
  spanish_consistency_notes:
  - Se mantuvo "Esaú" como transliteración del nombre hebreo, en armonía con la política de preservar nombres propios fuente.
  - '"Desnudo/desnudado" se evitó como calco excesivo; se eligió una formulación natural que conserva la imagen de exposición total.'
  - '"Escondites" y "esconderse" conservan el campo semántico de ocultamiento sin introducir explicaciones añadidas.'
  - El predicado plural "están destruidos" sigue la revisión final del audit trail y preserva el paralelismo del cierre.
  - Se usó "vecinos" para שְׁכֵנָיו, manteniendo la lectura léxica simple y la claridad en español.
