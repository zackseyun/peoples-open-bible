revisions:
- from: Y él mismo será puro[a] de pecado, para gobernar a pueblos grandes, reprender a los gobernantes y quitar a los pecadores con la fuerza de su palabra.
  to: Y él mismo será puro[a] de todo pecado, para gobernar a grandes pueblos, reprender a los gobernantes y quitar a los pecadores con la fuerza de su palabra.
