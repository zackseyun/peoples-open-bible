translation:
  language: es
  text: Y ahora[a], hijos, escúchenme; bienaventurados son los que guardan mis caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hijos e hijas». El hebreo tiene «hijos» en forma masculina plural, típica de la instrucción sapiencial, aunque la exhortación se aplica ampliamente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: La conjunción más el adverbio temporal marcan un giro exhortativo; «Y ahora» conserva ese flujo discursivo de transición sin sonar forzado en español.
- source_word: בָנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - niños
  - hijos míos
  lexicon: HALOT
  rationale: El hebreo usa plural masculino, pero en español «hijos» puede funcionar como vocativo plural convencional y suena más natural que calcar «hijos varones» en esta exhortación sapiencial. Se evita «hijos míos» porque el posesivo no está explícito.
- source_word: שִׁמְעוּ לִי
  english_pob_choice: listen to me
  chosen_spanish: escúchenme
  alternatives_spanish:
  - óiganme
  - escuchen
  lexicon: HALOT
  rationale: El imperativo con לִי pide atención dirigida a la voz hablante; «escúchenme» transmite bien la exhortación directa y el tono de advertencia sapiencial sin sobretraducirlo como obediencia explícita.
- source_word: וְאַשְׁרֵי
  english_pob_choice: blessed are those
  chosen_spanish: bienaventurados los que
  alternatives_spanish:
  - felices los que
  - dichosos los que
  lexicon: HALOT
  rationale: «אַשְׁרֵי» es una fórmula de bienaventuranza. «Bienaventurados» conserva el registro bíblico y la fuerza de declaración de dicha/favor, más plenamente que «felices».
- source_word: דְּרָכַי
  english_pob_choice: my ways
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mis sendas
  - mis rutas
  lexicon: HALOT
  rationale: En contextos sapienciales, דֶּרֶךְ puede denotar modo de vida o conducta. «Caminos» es el equivalente español más natural y fiel; «sendas» sería posible pero algo más literario.
- source_word: יִשְׁמֹרוּ
  english_pob_choice: keep
  chosen_spanish: guardan
  alternatives_spanish:
  - observan
  - cumplen
  lexicon: HALOT
  rationale: שׁמר puede significar guardar, observar o mantener fielmente. «Guardan» reproduce bien la idea de conservar con cuidado y practicar con fidelidad los caminos de la Sabiduría.
theological_decisions:
- issue: Valor del vocativo masculino plural en la instrucción sapiencial
  english_pob_reading: sons
  chosen_spanish_reading: hijos
  alternative_spanish_readings:
  - hijos e hijas
  - niños
  rationale: Se conserva la forma de vocativo masculino plural de la fuente, pero se expresa en un español natural y ampliamente entendible. La aplicación exhortativa sigue siendo inclusiva por contexto, sin borrar el matiz formal del hebreo.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: El auditorio inglés ya consideró y mantuvo la formulación de cierre sapiencial sin cambios; no hay revisiones aplicadas. La versión española sigue el mismo perfil de equivalencia óptima, conservando el giro discursivo, el vocativo plural y la bienaventuranza sin ampliar el sentido.
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial bíblico con «bienaventurados».
  - «Caminos» refleja el plural hebreo de דְּרָכַי y evita una abstracción excesiva.
  - El marcador de nota [a] se coloca en «hijos» para preservar la alternativa inclusiva documentada.
