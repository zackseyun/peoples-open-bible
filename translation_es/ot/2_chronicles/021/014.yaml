review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del hebreo: mantiene הִנֵּה con un llamado de atención, traduce יְהוָה como «Yahvé», conserva la enumeración de pueblo, hijos, esposas y posesiones, y expresa מַגֵּפָה גְדוֹלָה como «gran plaga». Sin embargo, hay dos desajustes importantes: «Mira» rebaja el tono solemne de הִנֵּה en un anuncio profético, y la coordinación final omite la preposición personal antes de «todas tus posesiones», lo que vuelve la frase menos natural y algo ambigua en español. Además, «golpeando ... con una gran plaga» suena algo duro; «hiriendo» o «golpeando» son posibles, pero el conjunto requiere pulido para sonar fiel y natural.'
  spanish_quality_summary: 'La frase es comprensible, pero no del todo digna ni fluida para un registro bíblico moderno. «Mira» suena coloquial frente al carácter solemne del anuncio; «He aquí» o «Mira» con mejor justificación serían posibles, pero aquí el registro favorece «He aquí». También falta paralelismo sintáctico en la serie: «a tu pueblo, a tus hijos, a tus esposas y a todas tus posesiones». El resto es legible y claro.'
  glossary_alignment: Alinea correctamente «Yahvé» para יְהוָה y «plaga» para מַגֵּפָה. «Esposas» concuerda con נָשֶׁיךָ. «Hijos» para בָּנֶיךָ es aceptable en español aunque pierde la especificidad de «sons»; no lo considero error suficiente para rechazo, pero conviene reconocer que el hebreo es masculino plural. No hay problema doctrinal que requiera adjudicación externa.
  issues:
  - severity: medium
    issue: «Mira» para הִנֵּה suena demasiado coloquial
    rationale: Aunque es posible, הִנֵּה en este contexto profético tiene fuerza solemne y de proclamación. «He aquí» preserva mejor el registro digno pedido por el proyecto.
  - severity: medium
    issue: 'Falta la preposición en la última coordinación: «y todas tus posesiones»'
    rationale: 'La serie pide paralelismo con objeto afectado: «a tu pueblo, a tus hijos, a tus esposas y a todas tus posesiones». Sin la preposición, la frase queda menos natural en español.'
  - severity: low
    issue: La nota al pie necesita mejor español editorial
    rationale: 'La redacción actual abre con comilla innecesaria y puede formularse con mayor claridad: «O bien: ...».'
  revised_spanish_text: He aquí[a], Yahvé está golpeando a tu pueblo, a tus hijos, a tus esposas y a todas tus posesiones con una gran plaga.
