translation:
  language: es
  text: La embriaguez multiplica la ira de un necio hasta hacerlo tropezar[a], disminuyendo la fuerza y causando heridas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta su caída»; πρόσκομμα puede denotar un tropiezo o una ocasión de caer.
    reason: lexical_alternative
lexical_decisions:
- source_word: πληθύνει
  english_pob_choice: multiplies
  chosen_spanish: multiplica
  alternatives_spanish:
  - aumenta
  - hace crecer
  lexicon: LSJ
  rationale: El verbo expresa aumento o multiplicación. «Multiplica» conserva bien el valor causativo y el tono proverbial del dicho.
- source_word: μέθη
  english_pob_choice: drunkenness
  chosen_spanish: la embriaguez
  alternatives_spanish:
  - la borrachera
  - la intoxicación
  lexicon: LSJ
  rationale: El sustantivo designa el estado de intoxicación. «Embriaguez» es natural en español y mantiene el registro sapiencial.
- source_word: θυμὸν
  english_pob_choice: anger
  chosen_spanish: la ira
  alternatives_spanish:
  - el enojo
  - el temperamento
  lexicon: LSJ
  rationale: En este contexto, θυμός apunta al arrebato de ira o temperamento encendido. «Ira» es una equivalencia clara y digna en español.
- source_word: ἄφρονος
  english_pob_choice: of a fool
  chosen_spanish: de un necio
  alternatives_spanish:
  - de un fool
  - de un hombre necio
  - de una persona insensata
  lexicon: LSJ
  rationale: El genitivo singular masculino funciona como tipo representativo de sabiduría. «Necio» mantiene la fuerza proverbial y la marca masculina gramatical sin forzar una paráfrasis.
- source_word: εἰς πρόσκομμα
  english_pob_choice: to his stumbling
  chosen_spanish: hasta su tropezón
  alternatives_spanish:
  - a su tropiezo
  - para caer
  - hasta su caída
  lexicon: LSJ
  rationale: La imagen literal es de tropiezo o caída. «Hasta su tropezón» conserva el valor resultativo sin convertirlo en una abstracción moral más amplia que el texto.
- source_word: ἐλαττῶν
  english_pob_choice: diminishing
  chosen_spanish: disminuyendo
  alternatives_spanish:
  - reduciendo
  - menguando
  lexicon: LSJ
  rationale: El participio describe un efecto continuo de la embriaguez. «Disminuyendo» refleja bien ese matiz progresivo.
- source_word: ἰσχὺν
  english_pob_choice: strength
  chosen_spanish: la fuerza
  alternatives_spanish:
  - la fortaleza
  - el vigor
  lexicon: LSJ
  rationale: Aquí se trata de fuerza corporal o capacidad personal. «Fuerza» es directo y comprensible en español.
- source_word: προσποιοῦν
  english_pob_choice: causing
  chosen_spanish: causando
  alternatives_spanish:
  - produciendo
  - ocasionando
  lexicon: LSJ
  rationale: El participio añade un segundo efecto dañino. «Causando» es natural y conserva el enlace causal del griego.
- source_word: τραύματα
  english_pob_choice: wounds
  chosen_spanish: heridas
  alternatives_spanish:
  - lesiones
  - laceraciones
  lexicon: LSJ
  rationale: El sustantivo se refiere a daños físicos concretos. «Heridas» es la opción más natural en español y mantiene la concreción del texto.
theological_decisions:
- issue: Forma masculina representativa en literatura sapiencial
  english_pob_reading: Render ἄφρονος as 'a fool' rather than a gender-neutral expression.
  chosen_spanish_reading: Traducir ἄφρονος como «de un necio», conservando el singular masculino representativo.
  alternative_spanish_readings:
  - de una persona insensata
  - de un insensato
  rationale: El griego es masculino singular y funciona como tipo sapiencial representativo. En español, «necio» preserva esa fuerza proverbial sin neutralizar innecesariamente el género gramatical.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés en los puntos clave: mantiene la relación causal compacta entre embriaguez, ira y tropiezo; evita ampliar πρόσκομμα a «ofensa» o «ruina»; y conserva la secuencia participial con efectos encadenados: disminuir la fuerza y causar heridas.'
  spanish_consistency_notes:
  - Se usa «embriaguez» para μέθη, conforme al registro sapiencial.
  - Se mantiene «ira» para θυμός por su claridad y por conservar el tono de advertencia moral.
  - «Necio» reproduce el valor proverbial del masculino singular sin imponer un giro neutralizador.
  - La puntuación con comas refleja la cadena de participios y efectos del griego.
  - No se reemplaza el vocabulario concreto de tropiezo/herida por términos más abstractos.
