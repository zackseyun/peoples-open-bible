translation:
  language: es
  text: 'Y se informó al rey David, diciendo: «Yahvé ha bendecido la casa de Obed-edom y todo lo que le pertenece, por causa del arca de Dios». Entonces David fue e hizo subir el arca de Dios de la casa de Obed-edom a la ciudad de David, con regocijo.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיֻּגַּד
  english_pob_choice: it was reported
  chosen_spanish: se informó
  alternatives_spanish:
  - se dijo
  - se le comunicó
  lexicon: HALOT
  rationale: El hebreo usa una pasiva impersonal que introduce información reportada sin nombrar al mensajero. «Se informó» conserva ese valor impersonal en español y suena natural en registro narrativo.
- source_word: לַמֶּלֶךְ דָּוִד
  english_pob_choice: to King David
  chosen_spanish: al rey David
  alternatives_spanish:
  - al rey, David
  - a David el rey
  lexicon: HALOT
  rationale: La combinación de título y nombre se mantiene de forma directa y natural en español como «al rey David».
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - que
  lexicon: HALOT
  rationale: Se conserva la introducción quotativa del hebreo para reflejar la estructura del informe directo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: La política del proyecto para el Tetragrámaton es usar «Yahvé» en el texto principal en español. Esto preserva el nombre divino personal en lugar de sustituirlo por un título.
- source_word: בֵּרַךְ
  english_pob_choice: has blessed
  chosen_spanish: ha bendecido
  alternatives_spanish:
  - bendijo
  lexicon: HALOT
  rationale: El perfecto hebreo comunica una acción completada con relevancia actual; el pretérito perfecto compuesto español transmite bien ese valor en discurso reportado.
- source_word: בֵּית עֹבֵד אֱדֹם
  english_pob_choice: the house of Obed-edom
  chosen_spanish: la casa de Obed-edom
  alternatives_spanish:
  - la familia de Obed-edom
  - el hogar de Obed-edom
  lexicon: HALOT
  rationale: «Casa» conserva la referencia concreta del relato y puede incluir el ámbito doméstico y posesiones, como en el contexto narrativo.
- source_word: וְאֶת כָּל אֲשֶׁר לוֹ
  english_pob_choice: and all that belongs to him
  chosen_spanish: y todo lo que le pertenece
  alternatives_spanish:
  - y todo lo que tiene
  - y todo lo que es suyo
  lexicon: HALOT
  rationale: La expresión hebrea incluye posesiones y pertenencias de su casa; «le pertenece» comunica esa amplitud sin resultar mecánico.
- source_word: בַּעֲבוּר
  english_pob_choice: because of
  chosen_spanish: por causa de
  alternatives_spanish:
  - a causa de
  - por razón de
  lexicon: HALOT
  rationale: «Por causa de» expresa claramente la relación causal del hebreo y encaja bien con el tono narrativo.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca del Dios verdadero
  lexicon: HALOT
  rationale: Se mantiene la designación estándar del objeto sagrado sin expansión interpretativa innecesaria.
- source_word: וַיֵּלֶךְ דָּוִד
  english_pob_choice: So David went
  chosen_spanish: Entonces David fue
  alternatives_spanish:
  - Y David fue
  - Luego David fue
  lexicon: HALOT
  rationale: La secuencia narrativa de waw-consecutivo se reproduce con «Entonces», que marca avance lógico de la acción.
- source_word: וַיַּעַל אֶת אֲרוֹן הָאֱלֹהִים
  english_pob_choice: brought up the ark of God
  chosen_spanish: subió el arca de Dios
  alternatives_spanish:
  - hizo subir el arca de Dios
  - trajo arriba el arca de Dios
  lexicon: HALOT
  rationale: עלָה con el arca indica traslado hacia arriba, aquí hacia Jerusalén; «subió» conserva el movimiento ascendente y el contexto permite entender el traslado.
- source_word: מִבֵּית עֹבֵד אֱדֹם
  english_pob_choice: from the house of Obed-edom
  chosen_spanish: desde la casa de Obed-edom
  alternatives_spanish:
  - de la casa de Obed-edom
  lexicon: HALOT
  rationale: «Desde» expresa con claridad el punto de partida del traslado y funciona naturalmente con el verbo de movimiento.
- source_word: עִיר דָּוִד
  english_pob_choice: to the city of David
  chosen_spanish: a la ciudad de David
  alternatives_spanish:
  - hacia la ciudad de David
  lexicon: HALOT
  rationale: La meta del movimiento se expresa con la preposición de destino usual en español.
- source_word: בְּשִׂמְחָה
  english_pob_choice: with rejoicing
  chosen_spanish: con regocijo
  alternatives_spanish:
  - con alegría
  - alegremente
  lexicon: HALOT
  rationale: «Regocijo» conserva el sustantivo de alegría celebrativa, en un registro digno y adecuado al contexto ceremonial.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El hebreo usa directamente el Tetragrámaton. La guía del proyecto pide «Yahvé» en el texto principal español; se evita el reemplazo por un título para preservar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se siguió el estado revisado más reciente sin cambios sustantivos: la lectura auditada coincide en lo esencial con el hebreo y no requiere notas textuales ni variantes adicionales en este versículo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para יְהוָה conforme al criterio del proyecto.
  - Se empleó «arca de Dios» de forma consistente para אֲרוֹן הָאֱלֹהִים.
  - Se optó por un español narrativo claro con equivalencia óptima, evitando calcos innecesarios.
