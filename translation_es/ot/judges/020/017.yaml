translation:
  language: es
  text: Y los hombres de Israel[a], aparte de Benjamín, fueron alistados[b] en cuatrocientos mil hombres que sacaban la espada[c]; todos estos eran hombres de guerra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «excepto Benjamín».
    reason: lexical_alternative
  - marker: b
    text: O «fueron contados»; el verbo hebreo puede denotar ser contados o alistados para servicio militar.
    reason: lexical_alternative
  - marker: c
    text: Lit. «sacando la espada», un modismo hebreo para hombres armados listos para combatir.
    reason: cultural_note
lexical_decisions:
- source_word: וְאִישׁ יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - los israelitas
  - el hombre de Israel
  lexicon: HALOT
  rationale: Aunque אִישׁ está en singular, aquí funciona colectivamente con el verbo plural y en un contexto militar. «Los hombres de Israel» conserva el matiz de varones aptos para combate y evita diluirlo en un etnónimo más general como «los israelitas».
- source_word: הִתְפָּקְדוּ
  english_pob_choice: were mustered
  chosen_spanish: fueron reunidos en censo
  alternatives_spanish:
  - fueron contados
  - fueron reunidos
  - fueron pasados revista
  lexicon: HALOT
  rationale: El hitpael de פקד puede denotar contar, registrar o reunir para servicio militar. «Fueron reunidos en censo» intenta conservar el doble valor de registro/censo y convocatoria militar, sin perder naturalidad en español. «Pasados revista» sería más militar pero menos directo para este contexto.
- source_word: לְבַד מִבִּנְיָמִן
  english_pob_choice: apart from Benjamin
  chosen_spanish: aparte de Benjamín
  alternatives_spanish:
  - excepto Benjamín
  - excluyendo a Benjamín
  - además de Benjamín
  lexicon: HALOT
  rationale: La frase marca a Benjamín como excluido del total. «Aparte de Benjamín» transmite la separación de modo idiomático y sin cargarlo de tecnicismo. Se evita «además de», que podría sugerir inclusión.
- source_word: אַרְבַּע מֵאוֹת אֶלֶף אִישׁ
  english_pob_choice: four hundred thousand men
  chosen_spanish: cuatrocientos mil hombres
  alternatives_spanish:
  - cuatrocientos mil
  - cuatrocientos mil soldados
  lexicon: HALOT
  rationale: Se conserva el sustantivo explícito אִישׁ como «hombres», manteniendo el sabor censal y militar del hebreo. «Soldados» interpretaría más de lo que dice el texto.
- source_word: שֹׁלֵף חָרֶב
  english_pob_choice: drawing the sword
  chosen_spanish: que sacaban la espada
  alternatives_spanish:
  - que empuñaban la espada
  - armados con espada
  - que desenvainaban la espada
  lexicon: HALOT
  rationale: La imagen literal es «sacar/desenvainar la espada». En español, «que sacaban la espada» preserva el giro idiomático y la fuerza de combatientes armados, sin convertirlo en una frase plana. «Empuñaban» expresa el estado, pero pierde el gesto verbal.
- source_word: כָּל זֶה
  english_pob_choice: all these
  chosen_spanish: todos estos
  alternatives_spanish:
  - todo esto
  - todos ellos
  lexicon: HALOT
  rationale: El antecedente es el grupo contado; por eso «todos estos» enlaza naturalmente con el plural humano y mantiene la referencia colectiva.
- source_word: אִישׁ מִלְחָמָה
  english_pob_choice: men of war
  chosen_spanish: hombres de guerra
  alternatives_spanish:
  - guerreros
  - hombres de combate
  - combatientes
  lexicon: HALOT
  rationale: Es una expresión militar hebrea fija. «Hombres de guerra» conserva el registro bíblico y la estructura del original. «Combatientes» sería más moderno, pero menos transparente al paralelismo bíblico.
theological_decisions:
- issue: Valor del recuento militar en הִתְפָּקְדוּ
  english_pob_reading: were mustered / were numbered
  chosen_spanish_reading: fueron reunidos en censo
  alternative_spanish_readings:
  - fueron contados
  - fueron pasados revista
  rationale: 'El texto no solo informa cantidad; la forma verbal puede implicar enrolamiento o recuento para servicio bélico. «Fueron reunidos en censo» intenta mantener esa ambigüedad productiva: tanto número como disposición para guerra. No se especifica más allá de lo que el hebreo permite.'
  doctrine_reference: No aplica; decisión léxica-histórica sobre censos militares en el AT.
translation_notes:
  revision_awareness: Se revisó el pasaje con alta concordancia en el control cruzado; no se detectaron cambios sustantivos necesarios. Se mantuvo la lectura militar de הִתְפָּקְדוּ y la imagen idiomática de שֹׁלֵף חָרֶב, con una solución española que conserva tanto conteo como convocatoria.
  spanish_consistency_notes:
  - Se usa «Benjamín» como nombre propio bíblico estándar en español.
  - Se mantiene el plural masculino colectivo «hombres» para reflejar el hebreo y el contexto de guerra.
  - «Espada» traduce חֶרֶב con el valor normal del arma blanca de combate en este tipo de texto.
  - La puntuación con punto y coma separa el dato censal del comentario final del versículo, como en el hebreo con cláusulas sucesivas.
