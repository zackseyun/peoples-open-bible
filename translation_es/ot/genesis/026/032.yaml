  to: 'Y aconteció aquel día que los siervos de Isaac[b] vinieron y le informaron acerca del pozo que habían cavado[a], y le dijeron: «Hemos hallado agua».'
  rationale: Se ajusta «esclavos» a «siervos» para respetar la decisión contextual documentada por la POB inglesa y la pauta terminológica del proyecto, mientras se conserva «esclavos» como alternativa en nota. También se añade la nota faltante y se mejora levemente la naturalidad de «en aquel día» a «aquel día».
