revisions:
- from: Y salió Jonatán[a], y atravesaba más allá del río y por las ciudades; y se reunieron a él todas las fuerzas de Siria como aliados[b], y llegó a Ascalón, y los hombres de la ciudad lo recibieron con honor.
  to: Y salió Jonatán[a], y atravesaba más allá del río y por las ciudades; y se reunieron a él todas las fuerzas de Siria como aliados[b], y llegó a Ascalón, y los hombres de la ciudad salieron a recibirlo con honor.
  rationale: Se corrige la ubicación de la nota [b] para que ancle la frase de alianza que realmente explica, y se ajusta ‘lo recibieron’ a ‘salieron a recibirlo’ para reflejar mejor ἀπήντησαν αὐτῷ y mejorar la precisión narrativa en español sin apartarse del sentido del inglés auditado ni del griego.
