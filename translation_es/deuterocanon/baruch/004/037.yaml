translation:
  language: es
  text: Mira, tus hijos vienen, a quienes enviaste lejos; vienen reunidos desde el oriente hasta el occidente, a la palabra[a] del Santo, alegrándose en la gloria de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la palabra del Santo». El dativo τῷ ῥήματι puede entenderse instrumentalmente («por») o como respuesta a un mandato («a la»).
    reason: lexical_alternative
  - marker: b
    text: O «ante la gloria de Dios». El dativo con «alegrándose» puede traducirse de más de una manera natural en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - He aquí
  lexicon: LSJ
  rationale: La partícula llama la atención sobre la escena. «Mira» conserva ese golpe de presencia en español moderno mejor que «He aquí», que suena más arcaico.
- source_word: οἱ υἱοί σου
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus descendientes
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «tus hijos varones / hijos», en español bíblico «tus hijos» comunica el referente colectivo de los exiliados sin forzar una marcación de género innecesariamente dura en este contexto de restauración.
- source_word: ἐξαπέστειλας
  english_pob_choice: you sent away
  chosen_spanish: enviaste lejos
  alternatives_spanish:
  - despediste
  - enviaste fuera
  lexicon: LSJ
  rationale: El compuesto expresa envío con alejamiento. «Enviaste lejos» conserva el matiz de separación/exilio y suena natural en español.
- source_word: συνηγμένοι
  english_pob_choice: gathered
  chosen_spanish: reunidos
  alternatives_spanish:
  - juntados
  - congregados
  lexicon: LSJ
  rationale: El participio perfecto pasivo presenta a los hijos como ya reunidos. «Reunidos» es la opción más clara y fiel en español para ese estado resultante.
- source_word: ἀπʼ ἀνατολῶν ἕως δυσμῶν
  english_pob_choice: from east to west
  chosen_spanish: desde el oriente hasta el occidente
  alternatives_spanish:
  - de oriente a occidente
  - desde el este hasta el oeste
  lexicon: LSJ
  rationale: Se mantiene el merismo geográfico, pero en español bíblico «oriente/occidente» suena más digno y tradicional que «este/oeste», sin perder la extensión total indicada por el griego.
- source_word: τῷ ῥήματι τοῦ ἁγίου
  english_pob_choice: at the word of the Holy One
  chosen_spanish: por la palabra del Santo
  alternatives_spanish:
  - a la palabra del Santo
  - por mandato del Santo
  lexicon: LSJ
  rationale: El dativo puede entenderse de modo instrumental o como respuesta a un mandato. «Por la palabra» deja abierta la fuerza causal/instrumental; «del Santo» traduce el título reverente τοῦ ἁγίου sin añadir «Dios» explícitamente, como hace el griego.
- source_word: χαίροντες
  english_pob_choice: rejoicing
  chosen_spanish: alegrándose
  alternatives_spanish:
  - regocijándose
  - gozosos
  lexicon: LSJ
  rationale: El participio expresa la manera en que vienen. «Alegrándose» conserva el valor verbal y resulta natural en español contemporáneo.
- source_word: τῇ τοῦ θεοῦ δόξῃ
  english_pob_choice: in the glory of God
  chosen_spanish: en la gloria de Dios
  alternatives_spanish:
  - por la gloria de Dios
  - ante la gloria de Dios
  lexicon: LSJ
  rationale: La construcción con dativo tras χαίρω admite varias relaciones naturales. «En la gloria de Dios» sigue de cerca la formulación del inglés auditado y mantiene la asociación estrecha entre el gozo y la gloria divina.
theological_decisions:
- issue: Título divino τοῦ ἁγίου
  english_pob_reading: the Holy One
  chosen_spanish_reading: el Santo
  alternative_spanish_readings:
  - el Santo Dios
  - el Santo One
  rationale: El griego usa un título reverencial substantivado. En español, «el Santo» es breve, legítimo y mantiene la tensión del original sin explicitar más de lo que el texto ofrece. No se reemplaza por «Señor» ni por una glosa más interpretativa.
  doctrine_reference: Preservar el título divino tal como funciona en el texto; no suavizar ni expandir la referencia más allá del testimonio del pasaje.
- issue: Relación del dativo τῷ ῥήματι
  english_pob_reading: at the word / by the word
  chosen_spanish_reading: por la palabra
  alternative_spanish_readings:
  - a la palabra
  - por mandato
  rationale: El griego deja abierta una relación instrumental o responsiva. «Por la palabra» conserva esa ambigüedad útil en español y evita resolver prematuramente si el énfasis es medio o mandato.
  doctrine_reference: Mantener la tensión lexical donde el texto permite más de una lectura, en lugar de fijar una sola interpretación sin necesidad.
translation_notes:
  revision_awareness: 'El auditor inglés no hizo cambios en la última pasada y dio acuerdo alto con la lectura base. Esta versión española sigue la misma línea, manteniendo las dos ambigüedades marcadas por el POB: el valor del dativo τῷ ῥήματι y la relación de χαίροντες con la gloria de Dios, sin resolverlas de manera excesiva.'
  spanish_consistency_notes:
  - Se conserva «Dios» para θεός, conforme al estándar del proyecto.
  - Se evita «SEÑOR» para τοῦ ἁγίου porque el griego no usa κύριος aquí; se traduce el título reverencial de forma directa.
  - «Oriente/occidente» mantiene el merismo bíblico en un español natural y solemne.
  - «Hijos» conserva el masculino plural explícito del griego sin neutralizarlo a «hijos e hijas» o «descendientes».
