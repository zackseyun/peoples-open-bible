revisions:
- from: Salieron de Quehelatá y acamparon en el monte Séfer[a].
  to: Salieron de Quehelatá y acamparon en el monte Shéfer[a].
  rationale: Se mantiene la sintaxis y el sentido del borrador, pero se corrige la transliteración del topónimo final para reflejar mejor el hebreo שָׁפֶר y alinearla con la alternativa documentada en la auditoría inglesa. «Shéfer» es más fiel que «Séfer», y la nota conserva una variante tradicional cercana.
