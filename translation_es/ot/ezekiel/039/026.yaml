translation:
  language: es
  text: Llevarán[a] su vergüenza y toda su infidelidad con la que fueron infieles a mí, cuando habiten con seguridad en su tierra, sin que nadie los atemorice.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Olvidarán su vergüenza y toda su infidelidad». Algunas traducciones, influenciadas por versiones antiguas, toman el verbo en ese sentido contextual, pero el hebreo más directamente dice «llevarán».
    reason: alternative_reading
lexical_decisions:
- source_word: וְנָשׂוּ
  english_pob_choice: they will bear
  chosen_spanish: Llevarán
  alternatives_spanish:
  - Portarán
  - Soportarán
  - Cargarán
  lexicon: HALOT
  rationale: El hebreo נָשָׂא en este contexto apunta más directamente a 'llevar/cargar/soportar' que a 'olvidar'. 'Llevarán' conserva la imagen verbal y la ambigüedad de cargar una carga o vergüenza, sin forzar una interpretación más libre.
- source_word: כְּלִמָּתָם
  english_pob_choice: their shame
  chosen_spanish: su vergüenza
  alternatives_spanish:
  - su vergüenza
  - su deshonra
  - su humillación
  lexicon: HALOT
  rationale: כְּלִמָּה denota vergüenza o deshonra. 'Vergüenza' es la equivalencia más directa y clara en español; 'deshonra' o 'humillación' serían posibles, pero menos inmediatas aquí.
- source_word: מַעֲלָם / מָעֲלוּ
  english_pob_choice: their unfaithfulness ... they were unfaithful
  chosen_spanish: toda su infidelidad ... fueron infieles
  alternatives_spanish:
  - toda su deslealtad ... fueron desleales
  - todo su quebrantamiento de pacto ... quebrantaron el pacto
  lexicon: HALOT
  rationale: מעל expresa quebranto de fidelidad, especialmente en contexto pactual. 'Infidelidad/infieles' preserva esa fuerza relacional sin reducirlo a un mero 'pecado' genérico. Se evita 'trespaso' porque suena más técnico y pierde el matiz de lealtad rota.
- source_word: בִי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - contra mí
  - para conmigo
  lexicon: HALOT
  rationale: Con מעל, la preposición marca a la persona afectada por la infidelidad. 'A mí' conserva el giro relacional del hebreo y suena natural en español; 'contra mí' es posible, pero añade una tonalidad más acusatoria que el hebreo no exige explícitamente.
- source_word: בְּשִׁבְתָּם
  english_pob_choice: when they dwell
  chosen_spanish: cuando habiten
  alternatives_spanish:
  - cuando estén habitando
  - mientras habiten
  - al habitar
  lexicon: HALOT
  rationale: El infinitivo constructo con ב indica circunstancia temporal. 'Cuando habiten' reproduce bien la relación temporal y mantiene un español fluido y solemne.
- source_word: עַל אַדְמָתָם
  english_pob_choice: on their land
  chosen_spanish: en su tierra
  alternatives_spanish:
  - sobre su tierra
  - en su país
  - en su suelo
  lexicon: HALOT
  rationale: אַדְמָה es 'tierra/terreno/land'. 'En su tierra' es natural en español y conserva el tema de restauración territorial; 'en su país' sería demasiado interpretativo, y 'sobre' resultaría extraño.
- source_word: לָבֶטַח
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - seguramente
  - en seguridad
  - seguras
  lexicon: HALOT
  rationale: La construcción adverbial comunica seguridad y ausencia de amenaza. 'Con seguridad' es idiomático en español y mantiene el sentido de estabilidad y protección.
- source_word: וְאֵין מַחֲרִיד
  english_pob_choice: with no one to make them afraid
  chosen_spanish: sin que nadie los haga temer
  alternatives_spanish:
  - sin que nadie los atemorice
  - y no habrá quien los aterrorice
  - sin que nadie los espante
  lexicon: HALOT
  rationale: מַחֲרִיד es el que causa terror o espanto. 'Sin que nadie los haga temer' refleja bien el agente humano implícito y evita una formulación demasiado dura o demasiado interpretativa.
theological_decisions:
- issue: Sentido de וְנָשׂוּ en contexto de restauración
  english_pob_reading: retain the plain Hebrew sense 'they will bear' rather than interpretively rendering 'they will forget'
  chosen_spanish_reading: mantener 'Llevarán' en vez de suavizarlo como 'olvidarán'
  alternative_spanish_readings:
  - olvidarán su vergüenza
  - dejarán atrás su vergüenza
  rationale: El hebreo leído de forma directa habla de cargar o llevar vergüenza e infidelidad, no de olvidarlas. Conservar esa tensión respeta el texto base y evita borrar el matiz de responsabilidad y memoria dentro de la restauración.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Este borrador sigue de cerca el hebreo y el análisis auditado de la versión inglesa POB. No hay revisiones aplicadas en el registro fuente, y el veredicto de control cruzado fue de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se ha elegido 'infidelidad/infieles' para מעל porque conserva mejor la fuerza pactual que un genérico 'pecado'.
  - '''Vergüenza'' traduce כְּלִמָּה de forma natural y sin tecnicismos.'
  - La nota al pie se ancla en el verbo 'Llevarán' porque ahí está la tensión de traducción principal.
