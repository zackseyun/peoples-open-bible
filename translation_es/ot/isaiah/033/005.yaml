translation:
  language: es
  text: Yahvé está exaltado, porque mora en las alturas[a]; ha llenado Sion con justicia y rectitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mora en lo alto».
    reason: lexical_alternative
lexical_decisions:
- source_word: נִשְׂגָּב
  english_pob_choice: is exalted
  chosen_spanish: está exaltado
  alternatives_spanish:
  - está enaltecido
  - está encumbrado
  - está elevado
  lexicon: HALOT
  rationale: El hebreo expresa un estado pasivo/de condición elevada. «Está exaltado» conserva la idea de elevación y también la de honor o grandeza, de modo natural en español actual.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton con la forma española ya normalizada en este proyecto. «Yahvé» preserva el nombre propio y evita sustituirlo por un título.
- source_word: שֹׁכֵן מָרוֹם
  english_pob_choice: he dwells on high
  chosen_spanish: mora en las alturas
  alternatives_spanish:
  - habita en lo alto
  - mora en lo alto
  - habita en las alturas
  lexicon: HALOT
  rationale: La construcción participial más sustantivo indica residencia continua en el ámbito elevado. «Mora en las alturas» es fiel al sentido espacial y suena natural y solemne en español.
- source_word: מִלֵּא
  english_pob_choice: he has filled
  chosen_spanish: ha llenado
  alternatives_spanish:
  - llenó
  - llena
  lexicon: HALOT
  rationale: El perfecto hebreo se refleja bien con un perfecto compuesto en español, que mantiene la acción completa con resultado vigente. «Ha llenado» conserva la fuerza de plenitud lograda.
- source_word: צִיּוֹן
  english_pob_choice: Zion
  chosen_spanish: Sion
  alternatives_spanish:
  - Sión
  lexicon: HALOT
  rationale: Se translitera el nombre propio bíblico en su forma usual en español bíblico. «Sion» mantiene la referencia poética y pactal del lugar.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  - sentencia
  lexicon: HALOT
  rationale: En pareja con צְדָקָה, el término apunta al orden recto y justo, no solo a un veredicto judicial. «Justicia» conserva ese campo semántico en español.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: rectitud
  alternatives_spanish:
  - justicia
  - justeza
  - justicia recta
  lexicon: HALOT
  rationale: En el binomio משפט וצדקה, conviene distinguir los dos miembros. «Rectitud» preserva la dimensión moral y evita repetir «justicia» para ambos términos.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio del pacto. En español, «Yahvé» conserva ese nombre sin sustituirlo por un título, en línea con la política del proyecto.
  doctrine_reference: 'DOCTRINE.md — Contested terms: יְהוָה YHWH'
- issue: Pairing of מִשְׁפָּט וּצְדָקָה
  english_pob_reading: justice and righteousness
  chosen_spanish_reading: justicia y rectitud
  alternative_spanish_readings:
  - juicio y rectitud
  - justicia y justicia
  - juicio y justicia
  rationale: El paralelismo hebreo une dos términos emparentados pero no idénticos. «Justicia y rectitud» distingue el orden social/legal del carácter moral, manteniendo la amplitud teológica del texto.
  doctrine_reference: 'DOCTRINE.md — Translation philosophy #5 (consistency of key terms, or documented exception)'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo de WLC y concuerda con la versión inglesa auditada en los puntos principales: exaltación de Yahvé, residencia en lo alto y llenura de Sion con justicia/rectitud. Se adopta la terminología española estándar del proyecto para el Nombre divino y se ajusta el último par léxico para evitar la repetición de «justicia» y preservar el paralelismo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se mantiene el paralelismo semántico con «justicia y rectitud».
  - «Sion» sigue la forma breve habitual en español bíblico, sin artículo.
  - El orden de la cláusula refleja el hebreo y la lectura inglesa auditada, con puntuación natural en español.
