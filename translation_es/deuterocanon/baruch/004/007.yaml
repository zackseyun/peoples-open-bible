translation:
  language: es
  text: Porque provocaron al que los hizo, al sacrificar a demonios y no a Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παρωξύνατε
  english_pob_choice: provoked
  chosen_spanish: provocaron
  alternatives_spanish:
  - irritaron
  - enfurecieron
  - excitaron a ira
  lexicon: BDAG
  rationale: La forma aorista activa en segunda plural expresa una acción pasada realizada contra Dios; «provocaron» conserva bien la idea de ofensa provocadora sin añadir un matiz emocional más fuerte que el griego no exige aquí.
- source_word: τὸν ποιήσαντα ὑμᾶς
  english_pob_choice: the one who made you
  chosen_spanish: al que los hizo
  alternatives_spanish:
  - a su Hacedor
  - al que los creó
  - al que los formó
  lexicon: BDAG
  rationale: «Al que los hizo» sigue de cerca la construcción participial articular y mantiene el referente personal del Creador. «Hacedor» es posible, pero la forma elegida suena más natural en español sin perder la cercanía al griego.
- source_word: θύσαντες
  english_pob_choice: by sacrificing
  chosen_spanish: al sacrificar
  alternatives_spanish:
  - sacrificando
  - cuando sacrificaron
  - habiendo sacrificado
  lexicon: BDAG
  rationale: El participio aoristo aquí explica el medio o la circunstancia por la cual provocaron a Dios. «Al sacrificar» expresa esa relación causal de manera clara y directa en español.
- source_word: δαιμονίοις
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus malignos
  - seres demoníacos
  - divinidades falsas
  lexicon: BDAG
  rationale: En este contexto de sacrificio idolátrico, δαιμονίοις designa seres espirituales hostiles, no simples ídolos o dioses menores. «Demonios» preserva el peso teológico del texto y coincide con la decisión inglesa documentada.
- source_word: καὶ οὐ θεῷ
  english_pob_choice: and not to God
  chosen_spanish: y no a Dios
  alternatives_spanish:
  - y no para Dios
  - y no al Dios verdadero
  - y no en lugar de Dios
  lexicon: BDAG
  rationale: La dativa θεῷ funciona en paralelo con δαιμονίοις dentro del lenguaje sacrificial. En español, «a Dios» mantiene la dirección del ofrecimiento y conserva el contraste explícito con «a demonios».
theological_decisions:
- issue: El destinatario del sacrificio idolátrico en δαιμονίοις
  english_pob_reading: demons
  chosen_spanish_reading: demonios
  alternative_spanish_readings:
  - espíritus malignos
  - poderes idolátricos
  rationale: La frase no suaviza la idolatría como mera falsedad simbólica; presenta una ofrenda dirigida a seres espirituales opuestos a Dios. «Demonios» mantiene esa afirmación teológica con la misma fuerza que la lectura inglesa auditada.
  doctrine_reference: 'Principio POB: primacía del texto original y preservación del peso teológico sin paráfrasis evasiva.'
- issue: Relación entre ofensa y sacrificio en el verbo principal
  english_pob_reading: you provoked the one who made you by sacrificing to demons and not to God
  chosen_spanish_reading: provocaron al que los hizo, al sacrificar a demonios y no a Dios
  alternative_spanish_readings:
  - provocaron al que los hizo sacrificando a demonios y no a Dios
  - provocaron al que los hizo por haber sacrificado a demonios y no a Dios
  rationale: 'La traducción conserva la cadena causal del griego: la provocación ocurre mediante el sacrificio idolátrico. «Al sacrificar» evita un giro demasiado explicativo y conserva la relación sintáctica del original.'
  doctrine_reference: Exégesis gramatical del participio causal/medio en el griego bíblico.
translation_notes:
  revision_awareness: El texto griego y el control inglés coinciden estrechamente; no se detectan variantes textuales ni revisiones posteriores que requieran notas de aparato. Se mantiene la equivalencia semántica de la versión inglesa aprobada, ajustada a una sintaxis natural en español.
  spanish_consistency_notes:
  - Se usa «Dios» de manera directa, sin ocultar el nombre divino mediante mayúsculas de sustitución.
  - Se conserva «demonios» para δαιμονίοις por consistencia con el valor teológico documentado.
  - Se opta por «provocaron» como verbo principal, manteniendo el tono de ofensa de pacto.
  - La preposición «a» en «a Dios» refleja la dirección sacrificial del dativo paralelo.
