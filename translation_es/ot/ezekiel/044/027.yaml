review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura temporal, el ingreso al santuario/atrio interior, el servicio cultual y la obligación de presentar la חַטָּאת. Sin embargo, la fórmula final נְאֻם אֲדֹנָי יְהוִה está mal ordenada en español: «declara Yahvé, el Señor» invierte el título y el nombre respecto del hebreo y suena poco natural. También la nota [a] («su lugar santo») no corresponde al posesivo ausente en el original.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «Y en el día en que» resulta algo rígido; «Y el día que» o «Y cuando» serían más naturales. «En el atrio interior» es aceptable, aunque «hacia/dentro del atrio interior» reflejaría mejor el segundo אֶל. La principal reparación necesaria es la fórmula divina final para mantener fidelidad y buena legibilidad.
  glossary_alignment: Se alinea bien con «Yahvé» para יהוה, «santuario» para קֹדֶשׁ y «ofrenda por el pecado» con nota alternativa para חַטָּאת. No obstante, para אֲדֹנָי יְהוִה la forma recomendada en español, siguiendo la política de «Yahvé» y preservando ambos elementos, es «el Señor Yahvé», no «Yahvé, el Señor».
  issues:
  - severity: high
    issue: 'Fórmula final divina mal ordenada: «declara Yahvé, el Señor»'
    rationale: El hebreo נְאֻם אֲדֹנָי יְהוִה presenta primero el título אֲדֹנָי y luego el nombre divino יהוה. El borrador invierte ese orden y produce una clausula poco idiomática en español. «declara el Señor Yahvé» preserva mejor el original y la terminología del proyecto.
  - severity: medium
    issue: 'Nota [a] introduce un posesivo inexistente: «su lugar santo»'
    rationale: קֹדֶשׁ aquí no lleva sufijo posesivo. La alternativa debe ser «el lugar santo» o similar, no «su lugar santo».
  - severity: low
    issue: 'Inicio algo acartonado: «Y en el día en que»'
    rationale: Aunque fiel, suena menos natural en español contemporáneo. «Y el día que» mantiene la conexión y la fuerza temporal con mejor fluidez.
  revised_spanish_text: Y el día que entre en el santuario[a], en el atrio interior, para ministrar en el santuario, presentará su ofrenda por el pecado[b], declara el Señor Yahvé.
  revised_footnotes:
  - marker: a
    text: O «el lugar santo». El hebreo קֹדֶשׁ en este contexto puede referirse al ámbito sagrado del templo.
    reason: lexical_alternative
  - marker: b
    text: O «su ofrenda de purificación». חַטָּאת en contextos sacrificiales puede designar la ofrenda asociada con el pecado o con la purificación.
    reason: lexical_alternative
  revision_rationale: Se corrigió la fórmula final a «declara el Señor Yahvé» para reflejar el orden y sentido de אֲדֹנָי יְהוִה conforme a la política del proyecto sobre יהוה. Se suavizó la apertura a «Y el día que» para mejor naturalidad sin perder la conexión discursiva. También se reparó la nota [a] eliminando el posesivo no presente en el hebreo.
