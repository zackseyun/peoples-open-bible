translation:
  language: es
  text: 'David consultó a Yahvé[a], diciendo: «¿Debo subir contra los filisteos? ¿Los entregarás en mi mano?» Yahvé dijo a David: «Sube, porque ciertamente entregaré a los filisteos en tu mano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿Los pondrás en mi poder?». El hebreo «dar en la mano» suele referirse a conceder victoria sobre un enemigo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁאַל
  english_pob_choice: inquired
  chosen_spanish: consultó
  alternatives_spanish:
  - preguntó
  - inquirió
  lexicon: HALOT
  rationale: En este contexto, שׁאל expresa buscar dirección divina. «Consultó» comunica bien esa idea en español y conserva el matiz de acudir a Dios para discernir una decisión, sin volverlo demasiado técnico ni ritualista.
- source_word: בַּיהוָה / יְהוָה
  english_pob_choice: the LORD / Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa directamente el nombre divino יְהוָה; por la norma del proyecto, se mantiene «Yahvé» en el texto principal para preservar el nombre del pacto y no enmascararlo con un título.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: La forma participial/infinitiva introductoria se vierte de manera natural con «diciendo», manteniendo la estructura discursiva del hebreo.
- source_word: הַאֶעֱלֶה
  english_pob_choice: Should I go up
  chosen_spanish: ¿Debo subir?
  alternatives_spanish:
  - ¿Subiré?
  - ¿He de subir?
  lexicon: HALOT
  rationale: עלה en contexto militar conserva la imagen de «subir»; en español, «¿Debo subir?» expresa la fuerza deliberativa de la pregunta sin perder la literalidad básica.
- source_word: אֶל פְּלִשְׁתִּים
  english_pob_choice: against the Philistines
  chosen_spanish: contra los filisteos
  alternatives_spanish:
  - hacia los filisteos
  - a los filisteos
  lexicon: HALOT
  rationale: 'Aunque אֶל es literalmente «a/ hacia», el contexto bélico exige un español idiomático que exprese hostilidad: «contra los filisteos».'
- source_word: הֲתִתְּנֵם
  english_pob_choice: Will you give them
  chosen_spanish: ¿Los entregarás?
  alternatives_spanish:
  - ¿Los darás?
  - ¿Los pondrás en mis manos?
  lexicon: HALOT
  rationale: En este pasaje, נתן con el complemento «en la mano» funciona como modismo de victoria. «Entregarás» conserva el sentido bíblico de poner al enemigo en poder del otro, más claramente que un simple «darás».
- source_word: בְּיָדִי
  english_pob_choice: into my hand
  chosen_spanish: en mi mano
  alternatives_spanish:
  - en mi poder
  - en mi control
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática de «mano» porque el hebreo la repite y forma parte del paralelismo del versículo. En español, «en mi mano» es comprensible y mantiene el color original.
- source_word: עֲלֵה
  english_pob_choice: Go up
  chosen_spanish: Sube
  alternatives_spanish:
  - Avanza
  - Ve
  lexicon: HALOT
  rationale: Se repite el mismo verbo que en la pregunta, por lo que se conserva la correspondencia léxica con «sube» para mantener la repetición deliberada del hebreo.
- source_word: כִּי נָתוֹן אֶתֵּן
  english_pob_choice: for I will certainly give
  chosen_spanish: porque ciertamente entregaré
  alternatives_spanish:
  - porque sin duda daré
  - porque de cierto entregaré
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto más verbo finito intensifica la certeza. «Ciertamente entregaré» comunica esa fuerza enfática y, a la vez, conecta con el modismo de victoria ya usado antes.
- source_word: בְּיָדֶךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tu control
  lexicon: HALOT
  rationale: Se mantiene la misma imagen idiomática del versículo para conservar la simetría entre la pregunta de David y la respuesta de Yahvé.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente, y la política del proyecto pide «Yahvé» en el texto principal. Esto preserva el nombre propio del pacto y evita sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Modismo de victoria 'dar/entregar en la mano'
  english_pob_reading: give them into my hand
  chosen_spanish_reading: los entregarás en mi mano / entregaré ... en tu mano
  alternative_spanish_readings:
  - los darás en mi mano
  - los pondrás en mi poder
  rationale: La expresión hebrea indica conceder victoria sobre un enemigo. En español, «entregar» transmite mejor ese sentido que un simple «dar», pero se conserva la imagen de la mano porque el texto la repite y porque forma parte de la estructura poética del versículo.
  doctrine_reference: Uso idiomático hebreo de נָתַן + בְּיַד para victoria concedida por Dios
- issue: Valor del verbo עלה en contexto militar
  english_pob_reading: go up
  chosen_spanish_reading: subir
  alternative_spanish_readings:
  - avanzar
  - atacar
  rationale: עלה significa literalmente «subir», y el hebreo repite el mismo verbo en la pregunta y la orden. Mantener «subir» preserva la repetición; en español se entiende como avance militar por el contexto.
  doctrine_reference: Valor contextual de עלה en narrativa bélica
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión sin cambios: el inglés auditado mantiene un acuerdo alto y no reporta correcciones. La versión española conserva las decisiones nucleares del texto fuente y del trail auditado, con adaptación idiomática mínima para lectura pública.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma fija del nombre divino, conforme al estándar del proyecto.
  - Se conservó la repetición de «mano» para reflejar el paralelismo del hebreo en la pregunta y la respuesta.
  - Se tradujo עלה de forma consistente como «subir» en ambas ocurrencias, para preservar la reiteración léxica.
  - «Entregar» se usó para el modismo de victoria sin ocultar la imagen corporal de la mano.
  - El tono es reverente y sobrio, apto para lectura eclesial amplia sin recurrir al calco rígido.
