revisions:
- from: Y le dio una ley[a], conforme a la cual, al conducirse como ciudadano[b], reinaría sobre un reino sobrio, justo, bueno y valiente.
  to: Y le dio una ley[a], conforme a la cual, al conducirse como ciudadano, reinaría sobre un reino[b] dueño de sí mismo, justo, bueno y valiente.
  rationale: Se corrige σώφρονά con 'dueño de sí mismo' para expresar con mayor claridad el autodominio/templanza central al contexto de 4 Macabeos. Se restaura la nota [b] al sustantivo 'reino', conforme al audit trail inglés sobre βασιλείαν, y se conserva la nota [a] para καθʼ ὃν. El resto del texto es fiel y publicable.
