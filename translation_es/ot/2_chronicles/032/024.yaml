    text: O, más formalmente, «y le dijo». El verbo hebreo es «dijo», pero aquí lleva el sentido de respuesta de Yahvé a la oración de Ezequías.
    reason: lexical_alternative
  - marker: b
    text: O «prodigio» o «portento».
    reason: lexical_alternative
