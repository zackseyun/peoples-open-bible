lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Los descendientes de
  lexicon: HALOT
  rationale: En una genealogía, el hebreo constructo בְּנֵי introduce de forma directa una lista de descendientes inmediatos. «Hijos de» conserva esa relación genealógica de manera natural en español y sigue de cerca la elección del POB en inglés.
- source_word: רְעוּאֵל
  english_pob_choice: Reuel
  chosen_spanish: Reuel
  alternatives_spanish:
  - Raguel
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se conserva la forma estándar «Reuel», en lugar de adaptar por otra tradición transliterada como «Raguel».
- source_word: נַחַת
  english_pob_choice: Nahath
  chosen_spanish: Nahat
  alternatives_spanish:
  - Nahat
  lexicon: HALOT
  rationale: Nombre propio transliterado; en español se simplifica la grafía inglesa final -th, que no corresponde a una pronunciación distintiva en este caso. «Nahat» mantiene la referencia al mismo nombre hebreo sin añadir una consonante muda en español.
- source_word: זֶרַח
  english_pob_choice: Zerah
  chosen_spanish: Zérah
  alternatives_spanish:
  - Zerah
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se mantiene la vocal abierta y se marca acento gráfico para ayudar a la lectura en español; no se traduce el posible sentido léxico del nombre porque aquí funciona como antropónimo.
- source_word: שַׁמָּה
  english_pob_choice: Shammah
  chosen_spanish: Samá
  alternatives_spanish:
  - Shamma
  - Shammah
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se adapta a una forma española más natural sin perder la identificación con el hebreo; la doble m y la h final del inglés reflejan convenciones de transliteración que no son necesarias en español.
- source_word: וּ/מִזָּה
  english_pob_choice: and Mizzah
  chosen_spanish: y Mizzá
  alternatives_spanish:
  - y Mizza
  lexicon: HALOT
  rationale: La conjunción ו se rinde por «y». El nombre propio se translitera como «Mizzá», conservando la geminación sugerida por el hebreo y evitando una forma demasiado anglicada.
translation_notes:
