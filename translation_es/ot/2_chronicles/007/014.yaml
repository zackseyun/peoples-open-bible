translation:
  language: es
  text: Si mi pueblo[a], que es llamado por mi nombre, se humilla, ora, busca mi rostro y se aparta de sus malos caminos, entonces yo oiré desde los cielos, perdonaré su pecado y sanaré su tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «sobre quienes es invocado mi nombre», un hebraísmo que expresa pertenencia o identificación con Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיִכָּנְעוּ
  english_pob_choice: humble themselves
  chosen_spanish: se humilla
  alternatives_spanish:
  - se humillen
  - se someten
  - se abajan
  lexicon: HALOT
  rationale: El nifal de כנע aquí expresa una acción reflexiva o intransitiva de abatirse/humillarse. En español, «se humilla» comunica bien la respuesta voluntaria esperada sin volverla pasiva.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: mi pueblo
  alternatives_spanish:
  - mi gente
  - mi pueblo mío
  lexicon: HALOT
  rationale: Es la designación pactual directa. «Mi pueblo» es natural en español y conserva el sentido de pertenencia comunitaria.
- source_word: אֲשֶׁר נִקְרָא שְׁמִי עֲלֵיהֶם
  english_pob_choice: who are called by my name
  chosen_spanish: sobre quien es invocado mi nombre
  alternatives_spanish:
  - sobre quien se invoca mi nombre
  - que lleva mi nombre
  - sobre quienes es llamado mi nombre
  lexicon: HALOT
  rationale: La imagen hebrea es idiomática y expresa pertenencia/identificación con Dios. «Sobre quien es invocado mi nombre» mantiene la metáfora de modo transparente y evita reducirla solo a un nombre ‘puesto’ encima.
- source_word: וְיִתְפַּלְלוּ
  english_pob_choice: pray
  chosen_spanish: ore
  alternatives_spanish:
  - recen
  - hagan oración
  - oren a mí
  lexicon: HALOT
  rationale: El verbo hitpael de פלל significa «orar/rezar». «Ore» es la forma más natural y sobria en español, y no añade el objeto explícito que el hebreo omite.
- source_word: וִיבַקְשׁוּ פָנַי
  english_pob_choice: seek my face
  chosen_spanish: busca mi rostro
  alternatives_spanish:
  - busque mi rostro
  - me busque
  - busque mi presencia
  lexicon: HALOT
  rationale: Se conserva el giro idiomático «buscar mi rostro», que en español comunica bien la búsqueda de la presencia y favor de Dios sin aplanar la metáfora.
- source_word: וְיָשֻׁבוּ מִדַּרְכֵיהֶם הָרָעִים
  english_pob_choice: turn from their evil ways
  chosen_spanish: se vuelve de sus malos caminos
  alternatives_spanish:
  - se aparta de sus malos caminos
  - se vuelva de sus malos caminos
  - regresa de sus malos caminos
  lexicon: HALOT
  rationale: שׁוב en contexto de pacto implica volverse atrás, es decir, arrepentirse. «Se vuelve de sus malos caminos» conserva el movimiento de retorno y el plural «caminos».
- source_word: וַאֲנִי אֶשְׁמַע מִן הַשָּׁמַיִם
  english_pob_choice: then I will hear from heaven
  chosen_spanish: entonces yo oiré desde los cielos
  alternatives_spanish:
  - y yo oiré desde los cielos
  - entonces yo escucharé desde los cielos
  - yo oiré desde el cielo
  lexicon: HALOT
  rationale: «Desde los cielos» refleja bien מן + plural hebreo y mantiene el registro bíblico sin forzar singularización. «Entonces» expresa con claridad la secuencia condicional.
- source_word: וְאֶסְלַח לְחַטָּאתָם
  english_pob_choice: forgive their sin
  chosen_spanish: perdonaré su pecado
  alternatives_spanish:
  - perdonaré sus pecados
  - perdonaré su falta
  - perdonaré su culpa
  lexicon: HALOT
  rationale: El sustantivo hebreo aparece en singular, con valor colectivo. «Su pecado» preserva esa forma singular y suena natural en español.
- source_word: וְאֶרְפָּא אֶת אַרְצָם
  english_pob_choice: heal their land
  chosen_spanish: sanaré su tierra
  alternatives_spanish:
  - sanaré su país
  - restauraré su tierra
  - curaré su tierra
  lexicon: HALOT
  rationale: רפא significa literalmente «curar/sanar». «Sananaré su tierra» conserva la metáfora de una tierra enferma bajo juicio, sin reemplazarla por un término más interpretativo.
theological_decisions:
- issue: Estructura condicional de la promesa divina
  english_pob_reading: If my people... then I will hear... and forgive... and heal...
  chosen_spanish_reading: Si mi pueblo... entonces yo oiré... y perdonaré... y sanaré...
  alternative_spanish_readings:
  - Y mi pueblo... y yo oiré...
  - Cuando mi pueblo...
  rationale: El hebreo presenta una secuencia de condiciones seguida por la respuesta divina. «Si... entonces... » hace explícita la lógica sin añadir contenido nuevo.
  doctrine_reference: Fidelidad sintáctica al hebreo; equivalencia óptima.
- issue: Idiomática de pertenencia del nombre divino
  english_pob_reading: who are called by my name
  chosen_spanish_reading: sobre quien es invocado mi nombre
  alternative_spanish_readings:
  - que llevan mi nombre
  - sobre quienes es llamado mi nombre
  rationale: La frase expresa pertenencia e identidad pactual, no solo una fórmula nominal. La formulación elegida mantiene la imagen hebrea y su peso teológico.
  doctrine_reference: Lenguaje pactual del AT; no reducir el idiom a mera etiqueta.
translation_notes:
  revision_awareness: Se corrigió la nota al pie para que el marcador [a] aparezca en el texto español. La redacción mantiene la estructura condicional marcada por el inglés POB y la lectura hebrea del pasaje, con la última revisión que añadió el «si» inicial como apertura condicional.
  spanish_consistency_notes:
  - Se usó «mi pueblo» para עַמִּי, manteniendo el valor colectivo y pactual.
  - Se preservó el idiom hebreo «buscar mi rostro» para פָנַי.
  - Se mantuvo el singular colectivo «su pecado» conforme al hebreo.
  - Se eligió «cielos» en plural para reflejar הַשָּׁמַיִם.
  - El registro es bíblico y claro, evitando tanto arcaísmos innecesarios como paráfrasis excesivas.
