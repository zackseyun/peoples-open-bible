revisions:
- from: El primero no terminó de conocerla[a][b][c], y asimismo el último no la rastreó.
  to: El primero no terminó de conocerla[a][b][c], y asimismo el último no la rastreó hasta el fondo.
  rationale: Se mantiene la estructura y las decisiones centrales del borrador, pero se ajusta «no la rastreó» a «no la rastreó hasta el fondo» para reflejar mejor el matiz exhaustivo de ἐξιχνίασεν. También se corrige la nota c para alinearla con las alternativas documentadas en la auditoría inglesa, donde la diferencia principal está en el conector («and so»), no en una reformulación de «conocerla».
