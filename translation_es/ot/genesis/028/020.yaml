translation:
  language: es
  text: 'Entonces Jacob hizo un voto[a], diciendo: «Si Dios está conmigo y me guardará[b] en este camino[c] por donde voy[d], y me dará pan para comer y ropa para ponerme»,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hizo un voto» conserva la solemnidad del hebreo, que usa verbo y sustantivo de la misma raíz.
    reason: lexical_alternative
  - marker: b
    text: 'O: «me cuidará» o «me protegerá»; el hebreo שׁמר abarca la idea de guardar, vigilar y resguardar.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «en este camino»; el contexto habla del trayecto de Jacob.
    reason: lexical_alternative
  - marker: d
    text: 'O: «por este camino que voy recorriendo».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּדַּר / נֶדֶר
  english_pob_choice: made a vow / a vow
  chosen_spanish: hizo un voto
  alternatives_spanish:
  - votó
  - formó un voto
  lexicon: HALOT
  rationale: El hebreo usa el verbo y el sustantivo de la misma raíz para subrayar la solemnidad del acto. «Hizo un voto» mantiene la idea formal y natural en español sin volverlo más religioso de lo que pide el texto.
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - cuando
  - puesto que
  lexicon: HALOT
  rationale: Se conserva la condicionalidad explícita del hebreo. No se resuelve la tensión del voto de Jacob hacia certeza o incertidumbre, sino que se deja en forma condicional como en el original.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: HALOT
  rationale: Aquí el referente es el Dios del contexto inmediato; en español, «Dios» comunica con claridad el singular referencial sin necesidad de marcar la forma hebrea plural.
- source_word: וּשְׁמָרַנִי
  english_pob_choice: and will keep me
  chosen_spanish: me guardará
  alternatives_spanish:
  - me cuidará
  - me vigilará
  - me protegerá
  lexicon: HALOT
  rationale: שׁמר puede abarcar guardar, vigilar o proteger. «Me guardará» preserva bien la fuerza de resguardo y suena más cercano al valor léxico básico que «cuidará».
- source_word: בַּדֶּרֶךְ הַזֶּה
  english_pob_choice: on this way
  chosen_spanish: en este camino
  alternatives_spanish:
  - en este viaje
  - por este camino
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en/en esta manera-camino». En español, «camino» mantiene la imagen concreta; «en este camino» es la forma más directa. Se evitó «viaje» porque sería una interpretación contextual más amplia que la evidencia inmediata no exige.
- source_word: אֲשֶׁר אָנֹכִי הוֹלֵךְ
  english_pob_choice: that I am going
  chosen_spanish: por el cual voy
  alternatives_spanish:
  - que voy recorriendo
  - que estoy yendo
  lexicon: HALOT
  rationale: La frase relativa conserva el movimiento continuo de הוֹלֵךְ sin cargarla con una formulación demasiado literal en español. «Por el cual voy» suena natural y mantiene la idea de desplazamiento.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: Aunque el término puede ampliar su sentido a comida en sentido general, «pan» es la equivalencia más cercana y mantiene la concreción del texto. La idea de sustento ya queda sugerida por el paralelismo con «ropa para vestir».
- source_word: לֶאֱכֹל
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - que comer
  - de comer
  lexicon: HALOT
  rationale: El infinitivo de finalidad queda bien reflejado con «para comer», una solución natural en español que conserva la función del complemento.
- source_word: וּבֶגֶד
  english_pob_choice: clothing
  chosen_spanish: ropa
  alternatives_spanish:
  - vestido
  - vestimenta
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, el sustantivo funciona de manera colectiva. «Ropa» transmite con naturalidad la provisión necesaria y evita una rigidez innecesaria.
- source_word: לִלְבֹּשׁ
  english_pob_choice: to wear
  chosen_spanish: para vestir
  alternatives_spanish:
  - para ponerme
  - para poner
  lexicon: HALOT
  rationale: «Vestir» refleja la finalidad del sustantivo colectivo sin forzar la sintaxis. En español, «ropa para vestir» es idiomático y fiel al valor funcional del infinitivo.
theological_decisions:
- issue: Condición del voto de Jacob
  english_pob_reading: Render the condition straightforwardly with 'If' without softening it into certainty or hardening it into doubt.
  chosen_spanish_reading: Mantener «Si» sin convertirlo en «cuando» ni en «puesto que».
  alternative_spanish_readings:
  - Cuando Dios esté conmigo
  - Puesto que Dios estará conmigo
  rationale: El hebreo presenta una condición real mediante אִם. La traducción conserva esa tensión textual y no decide por anticipado si Jacob habla desde duda, confianza o formulación votiva convencional.
  doctrine_reference: 'Principio de la POB: preservar la tensión teológica del texto en lugar de resolverla interpretativamente.'
translation_notes:
  revision_awareness: 'Se revisó el pasaje según el audit trail en inglés: se mantuvo la estructura condicional con «Si», se conservó la referencia concreta a «pan» y «ropa», y se prefirió una formulación española natural para el relativo de movimiento («por el cual voy») sin abandonar la correspondencia léxica con el hebreo.'
  spanish_consistency_notes:
  - Se emplea «Dios» para אֱלֹהִים según el contexto singular.
  - Se mantiene «camino» para בַּדֶּרֶךְ con una nota que recuerda su sentido contextual de trayecto.
  - Se evita «SEÑOR» porque aquí no aparece el Tetragrámaton.
  - Se conserva el paralelismo «pan para comer y ropa para vestir» como estructura de provisión concreta.
