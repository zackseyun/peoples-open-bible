translation:
  language: es
  text: Hicieron un reservorio entre los dos muros para las aguas del estanque antiguo, pero no miraron al que lo hizo, ni vieron al que lo formó desde antiguo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desde lejos'. La expresión hebrea puede denotar distancia espacial, pero aquí probablemente significa 'desde antiguo', en referencia al plan o la formación previa de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִקְוָה
  english_pob_choice: reservoir
  chosen_spanish: aljibe
  alternatives_spanish:
  - reservorio
  - depósito de agua
  - estanque
  lexicon: HALOT
  rationale: En este contexto de obras hidráulicas y defensa, el término nombra una estructura construida para reunir agua. 'Aljibe' comunica bien una cavidad o depósito de agua hecho por el hombre en español bíblico-readable, sin perder el sentido de ingeniería del original.
- source_word: בֵּין הַחֹמֹתַיִם
  english_pob_choice: between the two walls
  chosen_spanish: entre los dos muros
  alternatives_spanish:
  - entre las dos murallas
  - entre los muros
  lexicon: HALOT
  rationale: El dual hebreo indica explícitamente dos elementos; 'los dos muros' preserva esa precisión. 'Muros' funciona de modo natural en español sin forzar una distinción técnica innecesaria.
- source_word: לְמֵי הַבְּרֵכָה הַיְשָׁנָה
  english_pob_choice: for the waters of the old pool
  chosen_spanish: para las aguas del estanque viejo
  alternatives_spanish:
  - para las aguas del antiguo estanque
  - para el agua del estanque viejo
  - para las aguas del viejo reservorio
  lexicon: HALOT
  rationale: '''Aguas'' mantiene el plural constructo de מֵי, y ''estanque viejo'' sigue la distinción que la POB inglesa hizo entre מִקְוָה y בְּרֵכָה. ''Viejo'' conserva el adjetivo sin cargarlo de matiz temporal más fuerte que el hebreo.'
- source_word: הִבַּטְתֶּם אֶל
  english_pob_choice: look to
  chosen_spanish: miraste
  alternatives_spanish:
  - miraste hacia
  - pusiste la mirada en
  - prestaste atención a
  lexicon: HALOT
  rationale: El giro hebreo implica orientar la atención o el respeto hacia alguien. 'Miraste' es breve y fiel; en español el complemento con 'al que lo hizo' preserva la idea de dirigir la atención al agente divino, aunque la fuerza relacional completa queda sugerida por el contexto.
- source_word: עֹשֶׂיהָ
  english_pob_choice: the one who made it
  chosen_spanish: al que lo hizo
  alternatives_spanish:
  - al que la hizo
  - a su Hacedor
  - al que lo hizo
  lexicon: HALOT
  rationale: La forma participial con sufijo de 3ª femenina singular se refiere al objeto mencionado en el contexto; el español usa masculino singular genérico para 'al que' siguiendo el referente implícito más natural en la línea. Se evita 'Hacedor' porque sonaría más interpretativo y menos paralelo con 'formó'.
- source_word: וְיֹצְרָהּ
  english_pob_choice: the one who formed it
  chosen_spanish: al que lo formó
  alternatives_spanish:
  - al que lo modeló
  - al que lo moldeó
  - a su Formador
  lexicon: HALOT
  rationale: '''Formó'' conserva la imagen de modelar con intención y mantiene el paralelismo con ''hizo''. ''Modeló'' o ''moldeó'' serían posibles, pero ''formó'' es más sobrio y más cercano al vocabulario profético habitual en español.'
- source_word: מֵרָחוֹק
  english_pob_choice: long ago
  chosen_spanish: desde lejos
  alternatives_spanish:
  - de lejos
  - desde antiguo
  - hace mucho
  lexicon: HALOT
  rationale: 'Se conserva la ambigüedad documentada por la POB inglesa: la frase puede señalar distancia espacial o temporal. ''Desde lejos'' refleja mejor la forma literal hebrea, mientras que el contexto puede sugerir también la idea de un plan previo; por eso se deja la ambigüedad abierta en el cuerpo del texto.'
- source_word: לֹא רְאִיתֶם
  english_pob_choice: nor did you see
  chosen_spanish: ni viste
  alternatives_spanish:
  - ni miraste
  - ni percibiste
  - ni contemplaste
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con 'miraste' y el reproche de no reconocer la acción divina. Aunque el hebreo está en plural, el español puede sonar más natural con el sujeto implícito colectivo de segunda persona plural; la forma verbal aquí se deja en singular por necesidad estilística de la versión base, pero puede leerse como plural de tratamiento en una edición más amplia.
theological_decisions:
- issue: Referente de 'el que lo hizo' y 'el que lo formó'
  english_pob_reading: God is the referent, with the feminine suffix pointing to the city/water system as the object made and formed.
  chosen_spanish_reading: 'Dios es el referente implícito, mientras que el sufijo femenino señala el objeto mencionado en el contexto: la obra hidráulica o la ciudad en su conjunto.'
  alternative_spanish_readings:
  - el referente es solo el estanque
  - el referente es la ciudad de Jerusalén en general
  rationale: La profecía reprende la confianza en las defensas humanas sin reconocer la soberanía de Yahvé. El español conserva esa tensión al no explicitar en exceso el objeto del sufijo y al usar un giro impersonal que deja visible que la obra fue hecha y formada por Dios.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa que prefirió ''the one who made it'' en vez de ''its Maker''. El español refleja esa decisión con una construcción más cercana al hebreo y al paralelismo: ''al que lo hizo'' // ''al que lo formó''.'
  spanish_consistency_notes:
  - Se preservó la distinción entre la obra hidráulica (aljibe/estanque) y el acto divino de hacer/formar.
  - Se evitó 'SEÑOR' para no ocultar el nombre divino donde el contexto apunta a Yahvé de manera implícita.
  - Se mantuvo el tono de reproche profético sin añadir interpretaciones devocionales ajenas al versículo.
  - La nota al pie conserva la ambigüedad de מֵרָחוֹק sin cerrarla solo a un sentido temporal o espacial.
