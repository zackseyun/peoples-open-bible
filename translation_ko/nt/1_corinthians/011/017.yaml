theological_decisions:
- issue: 11:17-34 주의 만찬 본문 — 회중 분열에 대한 책망과 만찬 전통의 엄숙성
  chosen_reading: 회중 가난한 자들을 무시한 채 자기 식사를 먼저 먹는 일이 주의 만찬의 본질을 무너뜨림을 책망하는 본문. 만찬 자체의 엄숙성은 23-26절의 전통 인용으로, 회중적 적용은 27-32절의 자기 점검 권면으로 살린다.
  alternative_readings:
  - 단순한 식사 예절 권면
  rationale: 본문은 「함께 모임」이 십자가의 몸과 가난한 형제를 함께 분별하는 자리임을 전제한다. 한국어 본문에서도 엄숙성과 회중적 무게를 유지한다.
  doctrine_reference: 'DOCTRINE.md: preserve Eucharistic gravity without flattening to one tradition'
