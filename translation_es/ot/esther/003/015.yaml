revisions:
- from: Los couriers[a] salieron apresuradamente por la orden del rey, y el decreto fue promulgado en Susa la ciudadela. Y el rey y Amán se sentaron a beber, pero la ciudad de Susa quedó confundida[b].
  to: Los mensajeros[a] salieron apresurados por mandato del rey, y el decreto fue promulgado en Susa la ciudadela. Y el rey y Amán se sentaron a beber, pero la ciudad de Susa quedó confundida[b].
  rationale: Se reemplaza el anglicismo 'couriers' por el español natural 'mensajeros', preservando el matiz técnico en la nota. Se mejora 'por la orden del rey' a 'por mandato del rey' para reflejar mejor la fuerza de בִּדְבַר הַמֶּלֶךְ. También se ajusta 'apresuradamente' a 'apresurados' para representar mejor el participio hebreo aplicado a los mensajeros.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:00:17Z'
review_pass:
