translation:
  language: es
  text: 'Pero Noemí dijo[a]: «Vuélvanse, hijas mías. ¿Por qué habrían de ir conmigo? ¿Acaso todavía tengo hijos varones en mi vientre, para que lleguen a ser esposos de ustedes?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, ‘hijas mías’; Noemí se dirige a sus nueras con afecto familiar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: But Naomi said
  chosen_spanish: Pero Noemí dijo
  alternatives_spanish:
  - Y Noemí dijo
  - Entonces Noemí dijo
  lexicon: WLC / HALOT
  rationale: El waw narrativo se entiende bien como contraste discursivo en este contexto, porque Noemí responde al deseo de sus nueras de ir con ella. ‘Pero’ comunica ese giro sin perder el avance narrativo.
- source_word: שֹׁבְנָה
  english_pob_choice: Turn back
  chosen_spanish: Vuélvanse
  alternatives_spanish:
  - Regresen
  - Vuelvan atrás
  lexicon: HALOT
  rationale: El verbo שוב expresa regreso o vuelta atrás. ‘Vuélvanse’ reproduce la fuerza direccional y mantiene un tono natural en español.
- source_word: בְנֹתַי
  english_pob_choice: my daughters
  chosen_spanish: hijas mías
  alternatives_spanish:
  - mis hijas
  - hijas
  lexicon: HALOT
  rationale: Se conserva el lenguaje familiar literal, con el matiz afectivo que el contexto exige. En español, ‘hijas mías’ suena natural y respeta la cercanía relacional.
- source_word: לָמָּה תֵלַכְנָה עִמִּי
  english_pob_choice: Why would you go with me?
  chosen_spanish: ¿Por qué habrían de ir conmigo?
  alternatives_spanish:
  - ¿Por qué irán conmigo?
  - ¿Por qué deberían ir conmigo?
  lexicon: HALOT
  rationale: El imperfecto hebreo aquí funciona como pregunta modal o prospectiva. ‘Habrían de ir’ mantiene el matiz de expectativa/reprobación mejor que un futuro simple.
- source_word: הַעוֹד לִי
  english_pob_choice: Do I still have
  chosen_spanish: ¿Acaso todavía tengo
  alternatives_spanish:
  - ¿Todavía tengo
  - ¿Aún me quedan
  lexicon: HALOT
  rationale: La partícula עוֹד con el dativo expresa posesión/existencia continuada. ‘Todavía tengo’ es claro; ‘acaso’ refuerza el tono retórico de la pregunta.
- source_word: בָנִים
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - hijos varones de mi vientre
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente ‘hijos/varones’, en español ‘hijos’ aquí puede sonar menos específico. Se añade ‘en mi vientre’ para conservar el punto reproductivo, y la nota de decisión preserva el dato masculino implícito en el hebreo.
- source_word: בְּמֵעַי
  english_pob_choice: in my womb
  chosen_spanish: en mi vientre
  alternatives_spanish:
  - en mi seno
  - en mis entrañas
  lexicon: HALOT
  rationale: El término hebreo apunta al espacio reproductivo interior. ‘Vientre’ es una forma digna y clara en español, más natural que ‘útero’ y más precisa que ‘cuerpo’.
- source_word: וְהָיוּ לָכֶם לַאֲנָשִׁים
  english_pob_choice: that they may become husbands for you
  chosen_spanish: para que puedan llegar a ser esposos para ustedes
  alternatives_spanish:
  - para que fueran esposos para ustedes
  - para que llegaran a ser maridos para ustedes
  lexicon: HALOT
  rationale: 'El hebreo expresa un resultado hipotético: ‘y serían/estarían para ustedes como hombres/esposos’. ‘Puedan llegar a ser’ preserva la modalidad y el sentido matrimonial. ‘Esposos’ comunica bien la relación sin forzar una formulación arcaica.'
theological_decisions:
- issue: Alusión al matrimonio levirático y a la imposibilidad práctica que Naomi plantea
  english_pob_reading: Naomi argues that she cannot provide sons who could become husbands for Ruth and Orpah.
  chosen_spanish_reading: Noemí argumenta que no puede darles hijos que puedan llegar a ser esposos para ellas.
  alternative_spanish_readings:
  - Noemí dice que no puede darles hijos que fueran esposos para ellas
  - Noemí dice que no tiene posibilidad de proveerles nuevos esposos
  rationale: La pregunta retórica no es solo biológica; apela al marco social del matrimonio y la descendencia. ‘Llegar a ser esposos’ conserva la relación hipotética sin introducir una doctrina ajena al texto.
  doctrine_reference: Rut 1:11; trasfondo de parentesco/redención y matrimonio de levirato en la narrativa de Rut
translation_notes:
  revision_awareness: La base inglesa revisada cambió ‘could become’ por ‘may become’; por eso el español usa una construcción de posibilidad/potencialidad (‘puedan llegar a ser’) en vez de una posibilidad pasada o meramente hipotética menos directa. Se mantuvo el contraste discursivo de ‘But’ como ‘Pero’, y se evitó mecanicismo en la pregunta retórica para conservar su tono persuasivo.
  spanish_consistency_notes:
  - Se mantiene ‘Noemí’ como forma estable del nombre propio.
  - ‘Vuélvanse’ respeta el plural femenino dirigido a las nueras.
  - ‘Esposos’ se usa para explicitar el valor matrimonial de אֲנָשִׁים en este contexto.
  - La nota[a] está anclada en ‘hijas mías’ y corresponde a la afirmación de literalidad afectiva, no a una glosa doctrinal.
