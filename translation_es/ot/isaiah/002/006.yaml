base_translation:
  language: en
  yaml_path: translation/ot/isaiah/002/006.yaml
  text: For you have forsaken your people[a], the house of Jacob, because they are full of eastern ways, and they practice divination like the Philistines[c][b], and they strike hands with the children of foreigners.
  footnotes:
  - marker: a
    text: Literally 'from the east'; the phrase likely refers to eastern influences or practices rather than merely geographic origin.
    reason: lexical_alternative
  - marker: b
    text: Or 'they are soothsayers like the Philistines.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew verb is rare and uncertain; it may mean 'they strike hands with,' 'they make agreements with,' or more generally 'they join with' the children of foreigners.
    reason: alternative_reading
