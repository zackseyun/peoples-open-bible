translation:
  language: es
  text: Dios es muy temido en el consejo[a] de los seres santos[b], y temible por encima de todos los que lo rodean.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Consejo» puede entenderse también como «asamblea»; el término hebreo puede designar una reunión íntima o deliberativa.
    reason: lexical_alternative
  - marker: b
    text: «Seres santos» probablemente se refiere aquí a seres celestiales más que a santos humanos.
    reason: cultural_note
lexical_decisions:
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Poderoso
  - dios
  lexicon: HALOT
  rationale: En este contexto poético, אֵל se refiere al Dios de Israel, no a una deidad genérica. «Dios» es la opción natural en español y conserva el referente teológico del texto base.
- source_word: נַעֲרָץ
  english_pob_choice: greatly feared
  chosen_spanish: muy temido
  alternatives_spanish:
  - temido grandemente
  - tenido en gran reverencia
  - sobrecogedor
  lexicon: HALOT
  rationale: El participio niphal expresa ser objeto de temor reverente o sobrecogimiento. «Muy temido» mantiene esa fuerza sin convertirlo en una idea moral negativa, y funciona bien en paralelo con «terrible».
- source_word: בְּסוֹד
  english_pob_choice: in the council
  chosen_spanish: en el consejo
  alternatives_spanish:
  - en la asamblea
  - en el círculo
  - en el consejo secreto
  lexicon: HALOT
  rationale: סוֹד puede denotar un consejo íntimo o una asamblea deliberativa. «Consejo» preserva la imagen de reunión deliberativa y, con el contexto de los seres santos, deja abierta la lectura de consejo celestial.
- source_word: קְדֹשִׁים
  english_pob_choice: the holy ones
  chosen_spanish: los seres santos
  alternatives_spanish:
  - los santos
  - los santos seres
  - los seres celestiales
  lexicon: HALOT
  rationale: En el lenguaje del consejo divino, קְדֹשִׁים probablemente alude a seres celestiales santos, no a creyentes humanos. «Seres santos» evita la carga eclesiástica de «santos» y comunica el referente probable sin sobreespecificarlo demasiado.
- source_word: רַבָּה
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - grandemente
  - en gran manera
  - mucho
  lexicon: HALOT
  rationale: Aquí funciona como intensificador adverbial. «Muy» es la forma más natural en español para reforzar «temido» y conservar el grado de intensidad del hebreo.
- source_word: וְנוֹרָא
  english_pob_choice: and awesome
  chosen_spanish: y terrible
  alternatives_spanish:
  - y asombroso
  - y digno de temor
  - y temible
  lexicon: HALOT
  rationale: נוֹרָא expresa algo que inspira temor reverente y asombro. «Terrible» recoge esa amplitud en español bíblico y mantiene el paralelismo con la primera cola; no se usa aquí «asombroso» porque podría suavizar demasiado el matiz de temor.
- source_word: עַל כָּל סְבִיבָיו
  english_pob_choice: above all who surround him
  chosen_spanish: sobre todos los que lo rodean
  alternatives_spanish:
  - por encima de todos los que lo rodean
  - más que todos los que lo rodean
  - sobre todos sus alrededores
  lexicon: HALOT
  rationale: La preposición עַל expresa superioridad/comparación en este contexto. «Sobre todos los que lo rodean» es un español claro y fiel; conserva la idea de exaltación sobre los seres circundantes, probable referencia a la corte celestial.
theological_decisions:
- issue: Identidad de los «seres santos» / del entorno que rodea a Dios
  english_pob_reading: heavenly beings in the divine council
  chosen_spanish_reading: seres celestiales santos en un consejo divino
  alternative_spanish_readings:
  - santos humanos
  - asamblea de adoradores
  - ángeles
  rationale: El contexto inmediato del salmo y la imagen de consejo favorecen una escena celestial. La traducción principal mantiene «seres santos» para no imponer una identificación más cerrada de la que el hebreo exige, mientras que la decisión teológica documenta la lectura más probable del conjunto.
  doctrine_reference: Salmo 89 en su marco de exaltación de Yahvé y del consejo celestial; cf. lenguaje bíblico del consejo divino.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés auditado quedó aprobado sin observaciones, así que la versión española sigue de cerca sus decisiones léxicas y su lectura del consejo celestial.
  spanish_consistency_notes:
  - Se conservó el paralelismo del hebreo con dos miembros breves y coordinados.
  - Se evitó «SEÑOR» para יהוה porque este versículo no lo contiene; aquí el referente es אֵל, por lo que corresponde «Dios».
  - Se optó por «seres santos» para mantener la tensión interpretativa documentada entre una lectura celestial específica y una formulación más abierta.
  - «Terrible» se eligió como equivalente bíblico digno de נוֹרָא, no en el sentido moderno de «horrible».
