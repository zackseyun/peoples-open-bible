source:
  edition: WLC
  text: אָמַר֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל לִ֥/י דִבֶּ֖ר צ֣וּר יִשְׂרָאֵ֑ל מוֹשֵׁל֙ בָּ/אָדָ֔ם צַדִּ֕יק מוֹשֵׁ֖ל יִרְאַ֥ת אֱלֹהִֽים׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/023/003.yaml
  text: 'The God of Israel has spoken[a]; the Rock of Israel has said to me: One who rules over mankind justly, ruling in the fear of God[b],'
  footnotes:
  - marker: a
    text: Or 'over humankind.' Hebrew 'man' (אָדָם) can function representatively for humanity.
    reason: lexical_alternative
  - marker: b
    text: This line may also be understood with messianic significance, as an ideal description of the king ultimately fulfilled in the Messiah.
    reason: alternative_reading
