translation:
  language: es
  text: Pues se avergonzarán por los encinos[a] que desearon, y quedarán humillados por los jardines que escogieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «terebintos»; el hebreo puede referirse a árboles grandes asociados con la adoración ilícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  - Ciertamente
  lexicon: HALOT
  rationale: Aquí כִּי introduce la consecuencia o explicación dentro del anuncio profético. «Pues» comunica bien esa relación en español sin volverla demasiado causal ni demasiado solemne.
- source_word: יֵבֹשׁוּ
  english_pob_choice: you will be ashamed
  chosen_spanish: se avergonzarán
  alternatives_spanish:
  - ustedes serán avergonzados
  - ustedes sentirán vergüenza
  - se cubrirán de vergüenza
  lexicon: HALOT
  rationale: El verbo expresa la idea de vergüenza o quedar en vergüenza. Aunque la forma hebrea es 3mp, el contexto sigue dirigiéndose a la misma audiencia en 2mp; por eso se mantiene un sujeto implícito de segunda persona en español, como hace el POB inglés.
- source_word: מֵאֵילִים
  english_pob_choice: of the oaks
  chosen_spanish: por los encinos
  alternatives_spanish:
  - por los terebintos
  - por los robles
  - por los árboles fuertes
  lexicon: HALOT
  rationale: אֵילִים puede referirse a árboles grandes o, en un trasfondo cultual, a árboles asociados con culto ilícito. «Encinos» es un equivalente natural y bíblicamente inteligible en español; se conserva la ambigüedad botánica sin forzar una interpretación técnica en el texto principal.
- source_word: אֲשֶׁר חֲמַדְתֶּם
  english_pob_choice: that you desired
  chosen_spanish: que ustedes desearon
  alternatives_spanish:
  - que ustedes codiciaron
  - que ustedes se complacieron en
  - que ustedes anhelaron
  lexicon: HALOT
  rationale: חמד expresa deseo intenso, y en este contexto la idea amplia de «desear» es suficiente. «Codiciar» sería posible, pero sugiere más claramente el décimo mandamiento y puede cargar el verso con una precisión no exigida por el hebreo.
- source_word: וְתַחְפְּרוּ
  english_pob_choice: and you will be disgraced
  chosen_spanish: y se avergonzarán
  alternatives_spanish:
  - y serán humillados
  - y quedarán avergonzados
  - y serán deshonrados
  lexicon: HALOT
  rationale: חפר puede expresar vergüenza, rubor o humillación. En español, para mantener el paralelismo y evitar una distinción artificial con יֵבֹשׁוּ, «se avergonzarán» conserva la fuerza de deshonra pública sin alejarse del campo semántico.
- source_word: מֵהַגַּנּוֹת
  english_pob_choice: because of the gardens
  chosen_spanish: por los jardines
  alternatives_spanish:
  - a causa de los jardines
  - de los jardines
  - por las huertas
  lexicon: HALOT
  rationale: El מִן aquí marca el motivo o el objeto ante el cual surge la vergüenza. «Por los jardines» es natural en español y permite leer el verso con fluidez; «huertas» sería más específico de lo que permite el texto.
- source_word: אֲשֶׁר בְּחַרְתֶּם
  english_pob_choice: that you chose
  chosen_spanish: que escogieron
  alternatives_spanish:
  - que ustedes eligieron
  - que seleccionaron
  - que adoptaron
  lexicon: HALOT
  rationale: בחר es simplemente «escoger/escoger». «Escogieron» es claro, bíblico y natural en español; conserva la agencia deliberada de la audiencia.
theological_decisions:
- issue: Naturaleza cultual de los árboles y jardines
  english_pob_reading: Treat both as references to idolatrous worship sites or cultic settings.
  chosen_spanish_reading: Mantener una traducción literal de los nombres de los lugares, sin explicitar en el cuerpo del verso la interpretación cultual.
  alternative_spanish_readings:
  - Explicitar «sitios de idolatría» en el texto principal
  - Traducir «encinos sagrados» y «jardines de culto»
  rationale: El contexto de Isaías 1 sugiere fuertemente un trasfondo de culto ilícito, pero el texto hebreo nombra primero los objetos/espacios. La decisión española preserva esa precisión y deja la inferencia cultual para nota, como en el POB inglés.
  doctrine_reference: 'Principio POB: primacía del texto original; no expandir la interpretación más allá de lo que el hebreo dice explícitamente.'
translation_notes:
  revision_awareness: El testigo inglés reciente no introduce cambios respecto de la versión auditada; se conserva su elección léxica principal y su nota alternativa sobre el árbol, adaptándolas al español con ambigüedad controlada. No se detectaron revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evita «SEÑOR» porque no aparece en el hebreo de este verso.
  - «Encinos» conserva la referencia botánica amplia del inglés «oaks» sin cerrarla a una especie precisa.
  - Se usa «escogieron» para preservar la deliberación humana implícita en בחר.
