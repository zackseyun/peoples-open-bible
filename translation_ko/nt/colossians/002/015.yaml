id: COL.2.15
reference: Colossians 2:15
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀπεκδυσάμενος τὰς ἀρχὰς καὶ τὰς ἐξουσίας ἐδειγμάτισεν ἐν παρρησίᾳ, θριαμβεύσας αὐτοὺς ἐν αὐτῷ.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/002/015.yaml
  text: 'Having disarmed the rulers and the authorities, he made a public spectacle of them, triumphing over them in him.'
translation:
  language: ko
  text: 통치자들과 권세들을 무장 해제하시고, 그들을 공개적으로 구경거리로 삼으시며, 그분 안에서 그들을 이기시고 개선하셨습니다.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: ἀπεκδυσάμενος
  english_pob_choice: Having disarmed
  chosen_korean: 무장 해제하시고
  alternatives_korean:
  - 벗기시고
  - 무력화하시고
  lexicon: BDAG
  rationale: ἀπεκδύομαι의 「벗기다·무력화하다」를 한국어 「무장 해제하다」로 옮긴다. 영어 POB의 「disarmed」 결정을 따른다.
- source_word: τὰς ἀρχὰς καὶ τὰς ἐξουσίας
  english_pob_choice: the rulers and the authorities
  chosen_korean: 통치자들과 권세들
  alternatives_korean:
  - 정사와 권세들
  - 통치권과 권한들
  lexicon: BDAG
  rationale: 1:16, 2:10과 어휘적 일관성.
- source_word: ἐδειγμάτισεν ἐν παρρησίᾳ
  english_pob_choice: he made a public spectacle of them
  chosen_korean: 그들을 공개적으로 구경거리로 삼으시며
  alternatives_korean:
  - 공공연히 드러내시며
  - 공중 앞에 본보기로 세우시며
  lexicon: BDAG
  rationale: δειγματίζω의 「공개적 노출·전시」와 παρρησία(공개·담대함)를 결합하여 「공개적으로 구경거리로 삼다」로 옮긴다.
- source_word: θριαμβεύσας αὐτοὺς ἐν αὐτῷ
  english_pob_choice: triumphing over them in him
  chosen_korean: 그분 안에서 그들을 이기시고 개선하셨습니다
  alternatives_korean:
  - 그분 안에서 그들에 대해 개선하셨습니다
  - 그분으로 인하여 그들을 이기시고 끌어가셨습니다
  lexicon: BDAG
  rationale: θριαμβεύω의 「개선 행렬」 이미지를 「이기시고 개선하셨습니다」로 살린다. ἐν αὐτῷ는 「그분 안에서」(메시아 또는 십자가) — 영어 POB의 「in him」 결정을 따른다.
