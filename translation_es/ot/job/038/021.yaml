review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido irónico general del hebreo y sigue de cerca la auditoría inglesa en כִּי/אָז/וּמִסְפַּר יָמֶיךָ. Sin embargo, altera dos matices importantes: convierte la afirmación retórica inglesa/hebreo en pregunta inicial («¿Lo sabes?») y usa «nacías», que en español sugiere acción durativa/imperfectiva poco natural aquí. El hebreo funciona mejor como afirmación sarcástica: «Tú lo sabes, porque entonces naciste…».'
  spanish_quality_summary: El español es comprensible, pero «¿Lo sabes? Porque…» rompe innecesariamente la estructura del verso y «entonces nacías» suena poco idiomático para un evento puntual. «Tú lo sabes[a], porque entonces naciste, y el número de tus días es grande» o «…tus días son muchos» es más natural y fiel. También conviene evitar comillas innecesarias en la nota.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones léxicas centrales deben alinearse con la racionalidad POB: יָדַעְתָּ como presente retórico («Tú lo sabes») y תִּוָּלֵד con referencia pasada idiomática («naciste» / «fuiste nacido» no). Para רַבִּים, en español puede conservarse la estructura del hebreo con «el número de tus días es grande», con nota de alternativa «tus días son muchos».'
  issues:
  - severity: medium
    issue: 'Se cambió una afirmación retórica por una pregunta: «¿Lo sabes?»'
    rationale: El hebreo יָדַעְתָּ no exige forma interrogativa aquí; la auditoría inglesa escogió una afirmación sarcástica («You know»). La pregunta cambia el tono y la sintaxis del verso sin apoyo del texto fuente.
  - severity: high
    issue: «entonces nacías» no refleja bien el valor puntual y retrospectivo de תִּוָּלֵד
    rationale: 'Aunque el verbo hebreo es imperfecto, en contexto irónico apunta a un hecho pasado puntual: Job tendría que haber ya nacido entonces. En español, «nacías» suena durativo/habitual y resulta poco natural; «naciste» comunica mejor el sentido idiomático.'
  - severity: low
    issue: La nota usa «¿sabías?» como alternativa principal
    rationale: 'La alternativa de pasado es posible, pero la puntuación interrogativa no es necesaria. Conviene formular la nota de manera más limpia: «O: “Tú sabías”».'
  revised_spanish_text: Tú lo sabes[a], porque entonces naciste, y el número de tus días es grande.
