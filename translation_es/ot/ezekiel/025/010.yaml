translation:
  language: es
  text: a la gente del oriente[a], contra los amonitas; y la daré como posesión[b], para que los amonitas ya no sean recordados entre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los hijos del oriente». La expresión hebrea se refiere a pueblos o tribus orientales.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como herencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִבְנֵי קֶדֶם
  english_pob_choice: to the people of the east
  chosen_spanish: a los pueblos del oriente
  alternatives_spanish:
  - a los hijos del oriente
  - a la gente del oriente
  lexicon: HALOT
  rationale: La expresión hebrea es un giro etnogeográfico idiomático para grupos orientales. «Pueblos del oriente» conserva ese valor colectivo y suena natural en español; «hijos del oriente» sería más literal pero menos claro.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: HALOT
  rationale: En este contexto de juicio y transferencia territorial, la preposición expresa hostilidad o dirección judicial. «Contra» comunica mejor ese matiz que un valor espacial más neutro.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - el pueblo de Amón
  lexicon: HALOT
  rationale: Es la designación étnica habitual. «Amonitas» es idiomático y preciso en español bíblico contemporáneo.
- source_word: וּנְתַתִּיהָ
  english_pob_choice: and I will give it
  chosen_spanish: y la daré
  alternatives_spanish:
  - y la entregaré
  - y la pondré
  lexicon: HALOT
  rationale: El sufijo femenino singular remite al territorio o la tierra del contexto inmediato. «La daré» sigue de cerca el hebreo y mantiene la sencillez del verbo נתן sin sobrecargarlo.
- source_word: לְמוֹרָשָׁה
  english_pob_choice: as a possession
  chosen_spanish: como posesión
  alternatives_spanish:
  - como heredad
  - como herencia
  lexicon: HALOT
  rationale: «Morashá» puede significar posesión o herencia. En un oráculo de juicio territorial, «posesión» evita el tono familiar de «herencia» y reproduce bien la idea de toma posesiva.
- source_word: לְמַעַן לֹא תִזָּכֵר
  english_pob_choice: so that ... may no longer be remembered
  chosen_spanish: para que ... ya no sean recordados
  alternatives_spanish:
  - a fin de que ... no sean recordados
  - para que ... no se recuerden
  lexicon: HALOT
  rationale: 'La forma nifal de זכר pide una pasiva: «ser recordados». Añadir «ya no» expresa el valor resultativo de לְמַעַן לֹא en este anuncio de desaparición del recuerdo nacional.'
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: HALOT
  rationale: «Goyim» aquí designa a las naciones/pueblos en general. «Entre las naciones» reproduce ese campo semántico y conserva la referencia colectiva sin introducir un sentido teológico posterior.
theological_decisions:
- issue: Alcance del juicio contra Amón
  english_pob_reading: Rendered as loss of remembrance/status among the nations without importing total metaphysical erasure.
  chosen_spanish_reading: Se traduce como pérdida de recuerdo y de permanencia pública entre las naciones, sin afirmar una aniquilación total que el hebreo no explicita.
  alternative_spanish_readings:
  - Se traduce como desaparición total
  - Se traduce solo como pérdida de fama
  rationale: El texto dice que Amón no será recordado entre las naciones. La redacción española conserva el veredicto de juicio histórico y político, pero no añade una tesis ontológica más fuerte de la que ofrece el hebreo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que añadió la coma tras «oriente» en el texto inglés para reflejar mejor la cadencia hebrea. En español se mantuvo una puntuación natural equivalente con coma tras «oriente».
  spanish_consistency_notes:
  - Se preserva «amonitas» como etnónimo coherente con el uso bíblico habitual.
  - Se evita «SEÑOR» porque no aparece en este versículo; no hay sustitución terminológica que justificar.
  - «Entre las naciones» mantiene la amplitud colectiva de גוים sin cargarla con un matiz técnico ulterior.
