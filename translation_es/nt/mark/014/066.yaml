translation:
  language: es
  text: Y mientras Pedro estaba abajo en el patio[a], llegó una de las criadas[b] del sumo sacerdote.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «atrio». La palabra griega αὐλή puede abarcar el patio o recinto abierto de una residencia; aquí se elige «patio» por claridad narrativa.
    reason: lexical_alternative
  - marker: b
    text: O «una de las esclavas». El griego παιδίσκη puede denotar una criada doméstica o una esclava joven; se mantiene «criada» porque el relato enfatiza su papel en la casa más que su estatus legal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄντος τοῦ Πέτρου
  english_pob_choice: while Peter was
  chosen_spanish: mientras Pedro estaba
  alternatives_spanish:
  - cuando Pedro estaba
  - al estar Pedro
  lexicon: BDAG
  rationale: El genitivo absoluto con participio presente expresa una circunstancia temporal en curso. «Mientras Pedro estaba» conserva la escena en desarrollo con naturalidad en español, sin volverlo demasiado literal.
- source_word: κάτω
  english_pob_choice: below
  chosen_spanish: abajo
  alternatives_spanish:
  - debajo
  - más abajo
  lexicon: BDAG
  rationale: Aquí indica una posición espacial inferior. «Abajo» es breve y natural en español; mantiene el contraste espacial implícito con el lugar principal de la acción.
- source_word: ἐν τῇ αὐλῇ
  english_pob_choice: in the courtyard
  chosen_spanish: en el patio
  alternatives_spanish:
  - en el atrio
  - en el patio interior
  lexicon: BDAG
  rationale: αὐλή puede referirse al patio o recinto abierto de una casa o residencia. «Patio» comunica bien el espacio doméstico-residencial para lectores de español, sin sobrecargar con una opción más técnica.
- source_word: ἔρχεται
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - se acercó
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo resulta más natural el pretérito. «Llegó» conserva el valor de entrada a la escena sin sonar forzado.
- source_word: μία τῶν παιδισκῶν
  english_pob_choice: one of the servant girls
  chosen_spanish: una de las criadas
  alternatives_spanish:
  - una de las sirvientas
  - una de las esclavas
  lexicon: BDAG
  rationale: παιδίσκη puede designar una criada, sirvienta o esclava joven. Siguiendo la decisión de la POB inglesa de priorizar el rol doméstico en la narración, «criada» comunica bien la función sin perder la posibilidad semántica de subordinación; «esclavas» queda como alternativa lexicalmente posible pero no dominante en este contexto narrativo.
- source_word: τοῦ ἀρχιερέως
  english_pob_choice: of the high priest
  chosen_spanish: del sumo sacerdote
  alternatives_spanish:
  - del jefe de los sacerdotes
  - del alto sacerdote
  lexicon: BDAG
  rationale: El genitivo indica pertenencia o asociación con la casa del sumo sacerdote. «Del sumo sacerdote» es la forma más clara y estable en español para este cargo.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la decisión auditada de la POB inglesa: temporalidad circunstancial para el genitivo absoluto, lectura espacial de κάτω, αὐλή como espacio doméstico-residencial, presente histórico verbalizado en pasado narrativo, y παιδίσκη como servidumbre femenina sin forzar el estatus jurídico. No se registraron revisiones posteriores en el expediente.'
  spanish_consistency_notes:
  - Se mantiene «sumo sacerdote» como término estable para ἀρχιερεύς.
  - Se evita «SEÑOR» u otras sustituciones no relevantes; no aparece el nombre divino en este versículo.
  - Se conserva un registro narrativo natural en español, pero sin añadir información ausente del griego.
