translation:
  language: es
  text: Por eso, los padres comerán a los hijos en medio de ti, y los hijos comerán a sus padres; y yo ejecutaré juicios sobre ti y esparciré a todo tu remanente[a] a todo viento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''todo lo que te quede'' o ''todos tus sobrevivientes''. ''Remanente'' preserva el término hebreo שְׁאֵרִית en un contexto de juicio.'
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'a todo viento', un modismo que significa dispersión total en todas direcciones.
    reason: cultural_note
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: HALOT
  rationale: Introduce con claridad la consecuencia lógica del anuncio previo. 'Por eso' conserva la fuerza inferencial sin sonar rígido en español.
- source_word: אָבוֹת
  english_pob_choice: fathers
  chosen_spanish: padres
  alternatives_spanish:
  - progenitores
  - papás
  lexicon: HALOT
  rationale: '''Padres'' mantiene el vínculo familiar masculino y la reversión de roles que el hebreo subraya.'
- source_word: יֹאכְלוּ ... בָנִים
  english_pob_choice: will eat sons
  chosen_spanish: comerán a sus hijos
  alternatives_spanish:
  - devorarán a sus hijos
  - comerán a sus hijos varones
  lexicon: HALOT
  rationale: En este contexto de juicio, 'comerán' expresa canibalismo sin añadir intensidad no exigida por el verbo. 'Hijos' es natural en español y preserva el choque familiar, aunque el hebreo dice literalmente 'hijos/varones'.
- source_word: בְּתוֹכֵךְ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - en tu interior
  - dentro de ti
  lexicon: HALOT
  rationale: '''En medio de ti'' y ''en medio'' reproducen la idea idiomática de lo que ocurre dentro de la comunidad/ciudad personificada. En español, ''en medio de ti'' suena más idiomático que una calca literal.'
- source_word: וּבָנִים יֹאכְלוּ אֲבוֹתָם
  english_pob_choice: and sons will eat their fathers
  chosen_spanish: y hijos comerán a sus padres
  alternatives_spanish:
  - y los hijos comerán a sus padres
  - y los hijos devorarán a sus padres
  lexicon: HALOT
  rationale: La relación recíproca queda marcada con el mismo verbo y con la inversión familiar. 'Sus padres' evita ambigüedad y mantiene el paralelismo.
- source_word: וְעָשִׂיתִי בָךְ שְׁפָטִים
  english_pob_choice: and I will execute judgments on you
  chosen_spanish: y yo ejecutaré juicios sobre ti
  alternatives_spanish:
  - y yo haré juicios contra ti
  - y yo impondré juicios sobre ti
  lexicon: HALOT
  rationale: '''Ejecutaré juicios'' conserva el valor judicial-activo del hebreo עשה + שפטים, y ''sobre ti'' reproduce la dirección del castigo sin sustituirlo por una explicación más amplia.'
- source_word: שְׁפָטִים
  english_pob_choice: judgments
  chosen_spanish: juicios
  alternatives_spanish:
  - actos de juicio
  - sentencias
  lexicon: HALOT
  rationale: '''Juicios'' mantiene el campo jurídico propio del texto profético. ''Sentencias'' podría sonar más técnico pero desplaza el énfasis del acto divino de juzgar.'
- source_word: וְזֵרִיתִי
  english_pob_choice: and scatter
  chosen_spanish: y esparciré
  alternatives_spanish:
  - y dispersaré
  - y aventaré
  lexicon: HALOT
  rationale: '''Esparciré'' expresa bien la dispersión del exilio y permite conservar el movimiento de separación del verbo hebreo.'
- source_word: כָּל שְׁאֵרִיתֵךְ
  english_pob_choice: all your remnant
  chosen_spanish: a todo tu remanente
  alternatives_spanish:
  - a todo lo que te quede
  - a todos tus sobrevivientes
  lexicon: HALOT
  rationale: '''Remanente'' preserva la carga léxica de שְׁאֵרִית sin importar de entrada una lectura esperanzada. El contexto aquí es de juicio, por lo que se entiende como los que aún quedan para ser dispersados.'
- source_word: לְכָל רוּחַ
  english_pob_choice: to every wind
  chosen_spanish: a todo viento
  alternatives_spanish:
  - a todos los vientos
  - en toda dirección
  lexicon: HALOT
  rationale: La expresión idiomática se mantiene casi literalmente para conservar la imagen hebrea de dispersión total. 'A todo viento' es natural en español bíblico y no borra la metáfora.
theological_decisions:
- issue: Sentido de שְׁאֵרִית en contexto de juicio
  english_pob_reading: remnant
  chosen_spanish_reading: remanente
  alternative_spanish_readings:
  - sobrevivientes
  - lo que queda
  rationale: '''Remanente'' conserva la resonancia bíblica del término sin introducir por sí misma una connotación de restauración. Aquí el contexto inmediato es de castigo y dispersión, no de esperanza explícita.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Alcance idiomático de לְכָל רוּחַ
  english_pob_reading: to every wind
  chosen_spanish_reading: a todo viento
  alternative_spanish_readings:
  - en toda dirección
  - a todos los vientos
  rationale: Se retiene la imagen concreta del hebreo para no banalizarla como mera direccionalidad abstracta. La fórmula transmite dispersión total.
  doctrine_reference: Translation philosophy §7 (preserve idiom when it carries rhetorical force)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el criterio de la POB inglesa: conserva la secuencia causal, el paralelismo familiar, el lenguaje judicial de שְׁפָטִים y la imagen idiomática de dispersión en לְכָל רוּחַ. No se han incorporado revisiones posteriores al pasaje; el estado de revisión más reciente indica que no hubo cambios.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino cuando aparezca en contextos cercanos, aunque este versículo no lo contiene.
  - '''Juicios'' se usa con valor forense/divino, consistente con el léxico profético de la obra.'
  - '''Remanente'' se reserva para שְׁאֵרִית cuando el contexto lo permite; aquí se entiende como resto sujeto a dispersión.'
  - La imagen 'a todo viento' conserva la metáfora hebrea y no se normaliza a 'en todas direcciones'.
