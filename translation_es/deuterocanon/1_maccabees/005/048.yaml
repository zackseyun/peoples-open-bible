translation:
  language: es
  text: 'Y Judas les envió palabras de paz, diciendo: «Pasaremos por su tierra para ir a nuestra tierra; y nadie les hará daño; solamente pasaremos a pie». Pero no quisieron abrirle[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, no quisieron darle entrada ni paso; en el griego el objeto de «abrir» queda implícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγους εἰρηνικούς
  english_pob_choice: peaceful words
  chosen_spanish: palabras de paz
  alternatives_spanish:
  - palabras pacíficas
  - mensajes de paz
  lexicon: LSJ
  rationale: La expresión griega conserva un tono diplomático. En español, «palabras de paz» reproduce bien esa idea sin perder naturalidad ni convertirla en una paráfrasis excesiva.
- source_word: Διελευσόμεθα
  english_pob_choice: We will pass through
  chosen_spanish: Pasaremos por
  alternatives_spanish:
  - Atravesaremos
  - Iremos por
  lexicon: LSJ
  rationale: El verbo expresa tránsito por territorio ajeno. «Pasaremos por» es la forma más natural en español y mantiene el valor de paso, no de ocupación.
- source_word: τοῦ ἀπελθεῖν εἰς τὴν γῆν ἡμῶν
  english_pob_choice: to go to our own land
  chosen_spanish: para ir a la nuestra
  alternatives_spanish:
  - para ir a nuestra tierra
  - para ir a nuestra propia tierra
  lexicon: LSJ
  rationale: La construcción articular de infinitivo expresa finalidad. «Para ir a la nuestra» es breve y fiel al sentido, y evita sobredeterminar «regresar», que el griego no dice explícitamente.
- source_word: οὐδεὶς κακοποιήσει ὑμᾶς
  english_pob_choice: no one will harm you
  chosen_spanish: nadie os hará daño
  alternatives_spanish:
  - nadie les hará daño
  - nadie os perjudicará
  lexicon: LSJ
  rationale: κακοποιέω aquí comunica hacer daño o mal. «Hará daño» conserva el sentido claro y natural; mantengo «os» para seguir la segunda persona plural del griego en un registro bíblico sobrio.
- source_word: πλὴν τοῖς ποσὶν παρελευσόμεθα
  english_pob_choice: we will only pass through on foot
  chosen_spanish: solamente pasaremos a pie
  alternatives_spanish:
  - solamente pasaremos caminando
  - solo atravesaremos a pie
  lexicon: LSJ
  rationale: El giro con τοῖς ποσίν enfatiza un paso meramente físico, sin intención hostil. «A pie» comunica bien la imagen en español y evita una traducción demasiado literal y poco natural.
- source_word: οὐκ ἠβούλοντο ἀνοῖξαι αὐτῷ
  english_pob_choice: they were not willing to open to him
  chosen_spanish: no quisieron abrirle
  alternatives_spanish:
  - no estuvieron dispuestos a abrirle
  - se negaron a abrirle
  lexicon: LSJ
  rationale: El griego deja implícito el objeto de «abrir»; en contexto, se entiende la puerta o acceso. «No quisieron abrirle» conserva esa indefinición y suena fluido en español.
theological_decisions:
- issue: Lectura de «abrirle» como denegación de acceso/paso, con objeto implícito
  english_pob_reading: That is, they would grant neither entry nor passage, with the implied object of 'open' left unstated in the Greek.
  chosen_spanish_reading: No quisieron abrirle, dejando implícito el objeto de abrir, es decir, negar acceso o entrada.
  alternative_spanish_readings:
  - No quisieron abrir la puerta
  - No quisieron concederle entrada ni paso
  rationale: El griego no especifica el objeto directo. Mantenerlo implícito preserva la tensión textual y evita añadir una precisión que el texto no formula. El contexto permite entender que se trata de acceso o entrada.
  doctrine_reference: N/A
- issue: Tratamiento de la segunda persona plural en el discurso directo
  english_pob_reading: We will pass through your land ... and no one will harm you
  chosen_spanish_reading: Pasaremos por tu tierra ... y nadie os hará daño
  alternative_spanish_readings:
  - Pasaremos por vuestra tierra ... y nadie les hará daño
  - Pasaremos por tu tierra ... y nadie te hará daño
  rationale: El griego usa plural en «ὑμᾶς»; por eso conviene conservar el plural en «os». En la primera cláusula, «tu» puede leerse como singular o colectivo; el resto del verso aclara el plural, por lo que la traducción mantiene fidelidad sintáctica en el daño prometido.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete y el audit trail inglés sin cambios sustanciales; la versión española conserva el sentido diplomático, la finalidad del paso y el objeto implícito de «abrir».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece el nombre divino en el texto fuente.
  - Se usó «a pie» para reflejar τοῖς ποσίν de manera natural en español.
  - Se conservó la ambigüedad de «abrirle», como en el griego y en la nota inglesa.
  - Se prefirió un registro bíblico sobrio, pero con sintaxis española moderna y clara.
