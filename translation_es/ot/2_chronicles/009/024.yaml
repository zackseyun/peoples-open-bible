translation:
  language: es
  text: 'Y traían[a], cada hombre su tributo: artículos de plata y artículos de oro, vestiduras[b], armas[c], especias, caballos y mulos, año tras año.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada uno su regalo» o «cada hombre su presente»; el hebreo מִנְחָה puede denotar regalo u ofrenda, pero en este contexto real probablemente significa tributo.
    reason: lexical_alternative
  - marker: b
    text: O «ropas».
    reason: lexical_alternative
  - marker: c
    text: O «armadura» o «armas» en sentido militar amplio.
    reason: lexical_alternative
lexical_decisions:
- source_word: מְבִיאִים
  english_pob_choice: were bringing
  chosen_spanish: estaban trayendo
  alternatives_spanish:
  - traían
  - seguían trayendo
  lexicon: HALOT
  rationale: El participio transmite acción continua o repetida; «estaban trayendo» conserva ese valor imperfectivo sin volverlo demasiado interpretativo.
- source_word: אִישׁ מִנְחָתוֹ
  english_pob_choice: each man his tribute
  chosen_spanish: cada hombre su tributo
  alternatives_spanish:
  - cada uno su regalo
  - cada hombre su presente
  lexicon: HALOT
  rationale: אִישׁ funciona distributivamente como «cada hombre/cada uno». En este contexto real, מִנְחָה se entiende mejor como tributo presentado al rey, no como ofrenda cultual.
- source_word: כְּלֵי כֶסֶף
  english_pob_choice: articles of silver
  chosen_spanish: artículos de plata
  alternatives_spanish:
  - vasos de plata
  - objetos de plata
  lexicon: HALOT
  rationale: 'כְּלִי es un término amplio: artículo, utensilio, recipiente o implemento. «Artículos» mantiene la amplitud semántica y el paralelismo con el hebreo y con la versión inglesa auditada.'
- source_word: וּכְלֵי זָהָב
  english_pob_choice: articles of gold
  chosen_spanish: artículos de oro
  alternatives_spanish:
  - vasos de oro
  - objetos de oro
  lexicon: HALOT
  rationale: Se conserva el mismo patrón que en «artículos de plata» para reflejar la simetría del texto hebreo.
- source_word: וּשְׂלָמוֹת
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - vestiduras
  - mantos
  lexicon: HALOT
  rationale: El término designa prendas de vestir; «vestidos» es claro en español y suficientemente amplio. Se evita especificar «mantos» o «ropas» sin necesidad textual.
- source_word: נֵשֶׁק
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - armamento
  - armas/armamento
  lexicon: HALOT
  rationale: El hebreo puede abarcar armas o equipo militar. «Armas» es una equivalencia natural y compacta en español; se conserva la posibilidad semántica amplia sin forzar «armas de guerra».
- source_word: וּבְשָׂמִים
  english_pob_choice: spices
  chosen_spanish: especias
  alternatives_spanish:
  - aromáticos
  - bálsamos
  lexicon: HALOT
  rationale: En listas de tributos y regalos reales, el término se refiere a productos aromáticos. «Especias» funciona bien en español moderno y conserva la amplitud práctica del hebreo.
- source_word: סוּסִים
  english_pob_choice: horses
  chosen_spanish: caballos
  alternatives_spanish:
  - yeguas
  - corceles
  lexicon: HALOT
  rationale: Equivalencia léxica directa y natural.
- source_word: וּפְרָדִים
  english_pob_choice: mules
  chosen_spanish: mulos
  alternatives_spanish:
  - muías
  - mulas
  lexicon: HALOT
  rationale: Equivalencia léxica directa; «mulos» es la forma estándar en español para este animal híbrido.
- source_word: דְּבַר שָׁנָה בְּשָׁנָה
  english_pob_choice: year by year
  chosen_spanish: año tras año
  alternatives_spanish:
  - cada año
  - anualmente
  lexicon: HALOT
  rationale: La locución hebrea expresa recurrencia regular. «Año tras año» preserva el carácter iterativo de manera natural en español.
theological_decisions:
- issue: Sentido de מִנְחָה en contexto real/tributario
  english_pob_reading: tribute rather than a cultic offering
  chosen_spanish_reading: tributo, no ofrenda cultual
  alternative_spanish_readings:
  - regalo
  - presente
  rationale: El contexto de lista de bienes entregados al rey favorece el sentido de tributo. Mantener «tributo» conserva la tensión semántica documentada por la nota inglesa, sin borrar que la palabra hebrea puede significar también regalo/ofrenda.
  doctrine_reference: Lexical and contextual reading; no doctrinal issue.
translation_notes:
  revision_awareness: Se siguió el estado más reciente del pasaje, que no registra revisiones aplicadas y mantiene alto acuerdo con el texto fuente y la auditoría inglesa. Se conservó la repetición anual y la lista de bienes con paralelismo formal.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología de proyecto cuando el Tetragrámaton aparezca; este versículo no lo contiene.
  - Se mantuvo «tributo» para reflejar el contexto regio y evitar borrar la ambigüedad léxica de מִנְחָה.
  - Se prefirió una lista nominal paralela en español para reproducir el ritmo del hebreo.
