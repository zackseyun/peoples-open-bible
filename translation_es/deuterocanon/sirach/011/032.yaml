translation:
  language: es
  text: Antes de examinar a un hombre[a], no lo llames dichoso, porque en su fin un hombre será llamado dichoso.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Antes de investigar a una persona, no la declares feliz; porque en su desenlace una persona es declarada feliz». El hebreo repite el verbo «llamar dichoso» en forma activa y pasiva.'
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego en Swete dice de otro modo: «De una chispa de fuego se multiplicará un montón de brasas, y un hombre pecador acecha sangre», lo que muestra una divergencia textual importante respecto del hebreo.'
    reason: textual_variant
lexical_decisions:
- source_word: בְּטֶרֶם
  english_pob_choice: Before
  chosen_spanish: Antes de
  alternatives_spanish:
  - Antes que
  - Antes de que
  lexicon: HALOT
  rationale: La preposición temporal introduce la condición previa a la evaluación; «Antes de» suena natural en español y conserva la relación cronológica.
- source_word: תַּחְקֹר
  english_pob_choice: you examine
  chosen_spanish: examinar
  alternatives_spanish:
  - investigar
  - sondear
  - probar
  lexicon: HALOT
  rationale: «Examinar» transmite la acción de evaluar a una persona en el contexto sapiencial y evita un tono excesivamente técnico.
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: HALOT
  rationale: Se mantiene el singular representativo del hebreo, con fuerza genérica para un individuo bajo evaluación, sin neutralizar indebidamente el término.
- source_word: אַל תְּאַשְּׁרֵהוּ
  english_pob_choice: do not call him blessed
  chosen_spanish: no lo llames bienaventurado
  alternatives_spanish:
  - no lo declares feliz
  - no lo pronuncies dichoso
  - no lo consideres afortunado
  lexicon: HALOT
  rationale: «Bienaventurado» preserva el juicio valorativo de אשר en piel mejor que una simple alabanza y mantiene la resonancia proverbial del pasaje.
- source_word: בְּאַחֲרִיתוֹ
  english_pob_choice: in his end
  chosen_spanish: en su fin
  alternatives_spanish:
  - al final de él
  - en su desenlace
  - en su resultado
  lexicon: HALOT
  rationale: «Fin» conserva la concisión del hebreo y la idea sapiencial de que el desenlace revela la verdad del juicio.
- source_word: יְאֻשַּׁר
  english_pob_choice: will be called blessed
  chosen_spanish: será llamado bienaventurado
  alternatives_spanish:
  - será declarado feliz
  - será pronunciado dichoso
  - será considerado bendecido
  lexicon: HALOT
  rationale: Se conserva la pasiva de אשר y la repetición verbal del hebreo entre la prohibición y el cierre del dicho.
theological_decisions:
- issue: Repetición activa/pasiva de אשר en un proverbio sapiencial
  english_pob_reading: The Hebrew repeats the verb 'call blessed' in active and passive forms.
  chosen_spanish_reading: El hebreo repite el verbo con forma activa y pasiva; en español se conserva con «llames bienaventurado / será llamado bienaventurado».
  alternative_spanish_readings:
  - llames feliz / será llamado feliz
  - lo declares dichoso / será declarado dichoso
  rationale: La repetición es parte del efecto retórico del versículo y no debe perderse. «Bienaventurado» comunica mejor el veredicto evaluativo que un simple «feliz».
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אשר
- issue: Tratamiento del paralelismo con el texto hebreo frente al paralelo griego divergente
  english_pob_reading: The Greek parallel in Swete differs substantially here, indicating a major textual divergence between the Hebrew and Greek witnesses for this verse.
  chosen_spanish_reading: Se sigue el hebreo como texto base del versículo en esta unidad, mientras el paralelo griego queda como testimonio divergente no adoptado en el cuerpo principal.
  alternative_spanish_readings:
  - 'Adoptar la versión griega: «De una chispa de fuego se multiplicará un montón de brasas... »'
  - Hacer una traducción mixta entre hebreo y griego
  rationale: El paquete fuente asigna prioridad al hebreo de Kahana para este versículo; la divergencia griega se reconoce, pero no se incorpora al texto principal para evitar mezclar testigos distintos sin base textual suficiente.
  doctrine_reference: Project source-policy note for deuterocanonical textual witnesses
translation_notes:
  revision_awareness: Se corrigió la validación anterior incluyendo ambos marcadores de nota en el texto principal. No se introdujeron notas sin ancla.
  spanish_consistency_notes:
  - Se mantuvo «bienaventurado» para conservar el valor evaluativo del hebreo אשר.
  - Se evitó «SEÑOR» u otras convenciones ajenas porque este versículo no contiene el nombre divino.
  - La formulación sigue el hebreo base del paquete fuente y no fusiona el paralelo griego en el texto principal.
