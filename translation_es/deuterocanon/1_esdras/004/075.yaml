translation:
  language: es
  text: Y a todos los que suben desde Babilonia[a] para edificar la ciudad, que la libertad[b] les pertenezca, a ellos y a sus hijos, y a todos los sacerdotes que suben.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa la forma regional Βαβυλωνία, más precisa que el simple nombre de la ciudad; en español, «Babilonia» es la forma natural.
    reason: lexical_alternative
  - marker: b
    text: O «la libertad será de ellos». El griego dice literalmente que la «libertad» ha de pertenecerles.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσιν τοῖς προσβαίνουσιν
  english_pob_choice: to all who go up
  chosen_spanish: a todos los que suben
  alternatives_spanish:
  - a todos los que ascienden
  - a todos los que vienen subiendo
  lexicon: LSJ
  rationale: La construcción distributiva se expresa naturalmente en español con «a todos los que». Para προσβαίνω en este contexto de retorno a Jerusalén, «suben» conserva el idiomático bíblico de ascenso geográfico sin forzar una paráfrasis.
- source_word: ἀπὸ τῆς Βαβυλωνίας
  english_pob_choice: from Babylonia
  chosen_spanish: desde Babilonia
  alternatives_spanish:
  - desde Babilonia[a la región]
  - desde la Babilonia
  lexicon: LSJ
  rationale: Aunque el inglés POB distingue la forma regional «Babylonia», en español «Babilonia» es la forma disponible y natural; el contexto ya indica el ámbito de procedencia. Se evita «Mesopotamia» porque no refleja el término griego específico.
- source_word: κτίσαι τὴν πόλιν
  english_pob_choice: to build the city
  chosen_spanish: para edificar la ciudad
  alternatives_spanish:
  - para construir la ciudad
  - para reedificar la ciudad
  lexicon: LSJ
  rationale: κτίζω puede ser «fundar», «establecer» o «construir». «Edificar» conserva dignidad y proximidad al verbo sin añadir explícitamente «reedificar», que sería interpretativo y más fuerte que el griego aquí.
- source_word: ὑπάρχειν τὴν ἐλευθερίαν
  english_pob_choice: freedom is to belong
  chosen_spanish: que la libertad les pertenezca
  alternatives_spanish:
  - que tengan libertad
  - que la libertad sea de ellos
  lexicon: LSJ
  rationale: 'La construcción infinitiva expresa el contenido del decreto: que la libertad les corresponda. «Les pertenezca» mantiene la idea de pertenencia/atribución sin resolver el posible alcance legal más técnico de ἐλευθερία.'
- source_word: ἐλευθερίαν
  english_pob_choice: freedom
  chosen_spanish: libertad
  alternatives_spanish:
  - libertad civil
  - exención
  lexicon: LSJ
  rationale: «Libertad» es la equivalencia española más amplia y fiel. No se especifica si se trata de exención fiscal o de inmunidad cívica, por lo que se conserva la amplitud del término griego.
- source_word: αὐτοῖς τε καὶ τοῖς τέκνοις αὐτῶν
  english_pob_choice: to them and to their children
  chosen_spanish: les pertenezca a ellos y a sus hijos
  alternatives_spanish:
  - les corresponda a ellos y a sus hijos
  - sea para ellos y para sus hijos
  lexicon: LSJ
  rationale: El dativo señala a los beneficiarios; en español conviene mantener el doble destinatario con claridad. «Hijos» traduce τέκνα de manera natural y no restringe innecesariamente a «varones» o «descendientes».
- source_word: καὶ πᾶσι τοῖς ἱερεῦσι τοῖς προσβαίνουσιν
  english_pob_choice: and to all the priests who go up
  chosen_spanish: y a todos los sacerdotes que suben
  alternatives_spanish:
  - y a todos los sacerdotes que vienen subiendo
  - y a todos los sacerdotes que ascienden
  lexicon: LSJ
  rationale: Se conserva la repetición del participio para mantener el paralelo con la primera cláusula y el mismo idioma de peregrinación/retorno. «Sacerdotes» traduce ἱερεῦσι de forma directa y litúrgicamente inteligible.
theological_decisions:
- issue: Alcance de la «libertad» concedida
  english_pob_reading: Render broadly as 'freedom' without specifying the exact legal privilege.
  chosen_spanish_reading: Traducir de manera amplia como «libertad», sin precisar si se trata de exención fiscal, inmunidad cívica u otra prerrogativa.
  alternative_spanish_readings:
  - «libertad civil»
  - «exención»
  - «libertad» entendida como privilegio legal específico
  rationale: El griego nombra el don de ἐλευθερία pero no define su mecanismo administrativo. Mantener el término amplio evita imponer una interpretación jurídica que el texto no explicita.
  doctrine_reference: Primacía del texto original y conservación de la tensión lexical sin resolverla artificialmente.
translation_notes:
  revision_awareness: El inglés POB mantuvo una equivalencia óptima con notas sobre la amplitud de ἐλευθερία y la precisión regional de Βαβυλωνία. Esta versión sigue esas decisiones, conserva la estructura paralela del versículo y evita cerrar el sentido legal de la libertad.
  spanish_consistency_notes:
  - Se usa «libertad» y no «libertad civil» en el texto principal para no añadir precisión no explicitada.
  - Se mantiene «suben» como idiomatismo bíblico coherente con el inglés POB «go up».
  - «Edificar» preserva un registro sobrio y evita introducir «reconstruir/reedificar» como interpretación.
  - No se usa «SEÑOR» ni vocabulario teológico no presente en el versículo.
