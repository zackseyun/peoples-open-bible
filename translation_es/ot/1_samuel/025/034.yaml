translation:
  language: es
  text: Pero, tan cierto como que vive Yahvé, el Dios de Israel, que me ha impedido hacerte daño, si no te hubieras dado prisa y venido a mi encuentro, ciertamente para el amanecer no le habría quedado a Nabal ni un solo varón[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el que orina contra la pared», un modismo grosero que significa «varón» o «macho»; la línea principal opta por el referente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאוּלָם
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - No obstante
  lexicon: HALOT
  rationale: Conserva el giro adversativo de apertura y su tono de contraste solemne en español natural.
- source_word: חַי יְהוָה
  english_pob_choice: as Yahweh lives
  chosen_spanish: tan cierto como que vive Yahvé
  alternatives_spanish:
  - vive Yahvé
  - vive Yahvé, el Dios de Israel
  lexicon: HALOT
  rationale: Mantiene la fórmula de juramento hebrea con un equivalente idiomático claro en español, preservando el valor de solemnidad y apelación a la vida divina.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Sigue la terminología base del proyecto para el nombre divino YHWH.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  lexicon: HALOT
  rationale: Traducción directa y transparente del sintagma en constructo, con el matiz covenantal intacto.
- source_word: אֲשֶׁר מְנָעַנִי
  english_pob_choice: who has kept me
  chosen_spanish: que me ha impedido
  alternatives_spanish:
  - que me ha contenido
  - que me ha retenido
  lexicon: HALOT
  rationale: '''Impedir'' comunica bien el valor preventivo de מנע en este contexto, donde se trata de ser frenado antes de obrar contra alguien.'
- source_word: מֵהָרַע אֹתָךְ
  english_pob_choice: from harming you
  chosen_spanish: hacerte daño
  alternatives_spanish:
  - dañarte
  - hacerte mal
  - hacerte el mal
  lexicon: HALOT
  rationale: En español, la expresión natural y fiel para el daño violento es 'hacerte daño'; evita un calco pesado sin perder el sentido.
- source_word: כִּי לוּלֵי מִהַרְתְּ וַתָּבֹאתִי לִקְרָאתִי
  english_pob_choice: if you had not hurried and come to meet me
  chosen_spanish: si no te hubieras dado prisa y venido a encontrarme
  alternatives_spanish:
  - si no hubieras apresurado tu llegada y venido a mi encuentro
  - si no te hubieras apresurado y venido a mi encuentro
  lexicon: HALOT
  rationale: Expresa el contrafactual hebreo con un español fluido y preciso; 'darte prisa' refleja היטב מִהַרְתְּ y 'venir a encontrarme' conserva el idiomático לִקְרָאתִי.
- source_word: כִּי אִם
  english_pob_choice: surely
  chosen_spanish: para
  alternatives_spanish:
  - de seguro
  - ciertamente
  lexicon: HALOT
  rationale: Aquí introduce la consecuencia límite temporal del escenario hipotético; 'para' unido a 'la luz de la mañana' reproduce el valor de plazo marcado por el hebreo con naturalidad en español.
- source_word: עַד א֥וֹר הַ/בֹּ֖קֶר
  english_pob_choice: by the light of morning
  chosen_spanish: para la luz de la mañana
  alternatives_spanish:
  - hasta la luz de la mañana
  - al llegar la luz de la mañana
  lexicon: HALOT
  rationale: Mantiene la imagen temporal del amanecer; se eligió una forma que suena menos forzada en español y conserva la referencia al límite del plazo.
- source_word: מַשְׁתִּ֥ין בְּ/קִֽיר
  english_pob_choice: not one male
  chosen_spanish: ni un solo varón
  alternatives_spanish:
  - ningún varón
  - nadie que orine contra la pared
  lexicon: HALOT
  rationale: El hebreo usa un idiomático grosero para 'varón/macho'; el texto principal conserva el referente con 'varón', mientras la nota preserva la expresión cruda para auditoría lexicográfica.
- source_word: לְנָבָל
  english_pob_choice: to Nabal
  chosen_spanish: a Nabal
  alternatives_spanish:
  - para Nabal
  - de Nabal
  lexicon: HALOT
  rationale: La preposición se entiende de pertenencia o relación familiar en el contexto; 'a Nabal' funciona como dativo de referencia del grupo que le quedaría.
theological_decisions:
- issue: Nombre divino YHWH en juramento
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El hebreo usa explícitamente el Tetragrama en una fórmula de juramento; se mantiene el nombre propio del pacto, no una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor del idiomático coarse Hebrew phrase מַשְׁתִּין בְּקִיר
  english_pob_reading: not one male
  chosen_spanish_reading: ni un solo varón
  alternative_spanish_readings:
  - ningún hombre
  - nadie
  rationale: La POB inglesa optó por el referente semántico 'male' en el texto principal y dejó el idiomático en nota; el español principal sigue esa misma estrategia para no introducir crudeza innecesaria en la línea corrida.
  doctrine_reference: Lexical idiom handling; no doctrinal issue
translation_notes:
  revision_awareness: El texto sigue de cerca el sentido y las decisiones auditadas de la POB inglesa para 1 Samuel 25:34, con adaptación española idiomática mínima. Se preserva el juramento, la referencia al nombre divino y el giro contrafactual; la expresión grosera hebrea se traslada a nota, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» para YHWH conforme al estándar del proyecto.
  - «Dios de Israel» mantiene el constructo hebreo sin expansión interpretativa.
  - «hacerte daño» evita calco duro de 'from harming you' y conserva el sentido violento contextual.
  - La nota reproduce el valor idiomático de מַשְׁתִּין בְּקִיר para auditoría, mientras el cuerpo del texto permanece publicable.
  - Se mantiene una puntuación y ritmo adecuados para lectura bíblica en español moderno.
