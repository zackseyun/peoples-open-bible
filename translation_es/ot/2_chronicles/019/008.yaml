translation:
  language: es
  text: También en Jerusalén, Josafat nombró de entre los levitas, los sacerdotes y los jefes de las casas paternas de Israel, para el juicio de Yahvé[a] y para los pleitos[b]; y regresaron a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para el juicio de Yahvé», es decir, para casos gobernados por la ley de Yahvé.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «y regresaron a Jerusalén». Algunos entienden el texto de otro modo, como «y se sentaron» o «y habitaron en Jerusalén», porque la lectura recibida es algo abrupta en el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: Also
  chosen_spanish: También
  alternatives_spanish:
  - Además
  - Y también
  lexicon: HALOT
  rationale: La partícula añade una acción más al relato. «También» conserva el valor aditivo con naturalidad en español.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa es directa; «en Jerusalén» es la forma natural y fiel.
- source_word: הֶעֱמִיד
  english_pob_choice: appointed
  chosen_spanish: estableció
  alternatives_spanish:
  - nombró
  - destacó
  - puso
  lexicon: HALOT
  rationale: En este contexto administrativo/judicial, el verbo expresa poner a personas en una función. «Estableció» conserva la idea de asignación institucional sin forzar un tecnicismo moderno.
- source_word: מִן הַלְוִיִּם וְהַכֹּהֲנִים וּמֵרָאשֵׁי הָאָבוֹת לְיִשְׂרָאֵל
  english_pob_choice: some of the Levites, the priests, and the heads of the fathers’ houses of Israel
  chosen_spanish: entre los levitas, los sacerdotes y los jefes de las casas paternas de Israel
  alternatives_spanish:
  - de entre los levitas, los sacerdotes y los jefes de las casas paternas de Israel
  - algunos de los levitas, los sacerdotes y los jefes de las casas paternas de Israel
  lexicon: HALOT
  rationale: El hebreo usa מִן / מֵ para selección desde esos grupos. En español, «entre» comunica la selección de miembros de esos colectivos sin sobrecargar la frase. «Casas paternas» conserva la estructura social hebrea del original.
- source_word: לְמִשְׁפַּט יְהוָה
  english_pob_choice: for the judgment of Yahweh
  chosen_spanish: para el juicio de Yahvé
  alternatives_spanish:
  - para el juicio de Yahveh
  - para el juicio del Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino según el estándar del proyecto. «Juicio» conserva la amplitud posible de decisiones legales o casos regidos por la ley de Yahvé, sin estrecharla a una sola acepción.
- source_word: וְלָרִיב
  english_pob_choice: and for disputes
  chosen_spanish: y para los pleitos
  alternatives_spanish:
  - y para disputas
  - y para litigios
  - y para controversias
  lexicon: HALOT
  rationale: רִיב en contexto judicial puede referirse a pleito, disputa o litigio. «Pleitos» es una solución idiomática y jurídica en español, sin perder el matiz de conflicto legal.
- source_word: וַיָּשֻׁבוּ יְרוּשָׁלִָם
  english_pob_choice: and they returned to Jerusalem
  chosen_spanish: y regresaron a Jerusalén
  alternatives_spanish:
  - y volvieron a Jerusalén
  - y retornaron a Jerusalén
  lexicon: HALOT
  rationale: Se conserva el sentido directo de שוב. «Regresaron» es natural en español y mantiene la referencia al desplazamiento de vuelta a Jerusalén.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: Se sigue el estándar del proyecto para el Tetragrámaton en español. Se evita la sustitución por «SEÑOR» para mantener la trazabilidad al nombre fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Alcance de לְמִשְׁפַּט יְהוָה
  english_pob_reading: for the judgment of Yahweh
  chosen_spanish_reading: para el juicio de Yahvé
  alternative_spanish_readings:
  - para el juicio de Yahvé, es decir, casos gobernados por la ley de Yahvé
  - para el juicio de Yahvé / para los casos de Yahvé
  rationale: La expresión puede abarcar asuntos judiciales regidos por la ley divina o decisiones pronunciadas bajo autoridad divina. Se preserva esa amplitud sin resolverla de antemano.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para sustituir «the LORD» por «Yahweh» en coherencia con el nombre divino representado en el verso. Se mantiene el resto de las decisiones léxicas y la nota sobre la lectura final abrupta de וַיָּשֻׁבוּ.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «casas paternas» para reflejar la estructura social hebrea, no «familias» como simplificación.
  - «Pleitos» traduce el campo judicial de רִיב sin perder el tono legal.
  - La puntuación refleja un solo período narrativo con inciso locativo inicial y clausura narrativa final.
