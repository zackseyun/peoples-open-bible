translation:
  language: es
  text: y pon un cuchillo a tu garganta, si eres dado al apetito[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si eres un glotón». El hebreo dice literalmente «poseedor» o «dueño» de apetito/alma, y describe a una persona gobernada por un fuerte deseo en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/שַׂמְתָּ
  english_pob_choice: and put
  chosen_spanish: y pon
  alternatives_spanish:
  - y ponlo
  - y coloca
  lexicon: HALOT
  rationale: El perfecto con waw continúa la instrucción del versículo anterior; en español, el imperativo breve comunica mejor la fuerza exhortativa que un calco como «y has puesto». «Pon» mantiene la concisión y la vividez del mandato.
- source_word: שַׂכִּין
  english_pob_choice: a knife
  chosen_spanish: un cuchillo
  alternatives_spanish:
  - una cuchilla
  - un puñal
  lexicon: HALOT
  rationale: El sustantivo designa un cuchillo. «Cuchillo» es el equivalente moderno más natural en español y conserva el tono gráfico e hiperbólico del proverbio.
- source_word: בְּ/לֹעֶךָ
  english_pob_choice: to your throat
  chosen_spanish: a tu garganta
  alternatives_spanish:
  - en tu garganta
  - a tu cuello
  lexicon: HALOT
  rationale: 'La preposición con לֹעַ favorece en español una relación direccional: «a tu garganta». «Garganta» comunica el sentido corporal de modo claro y digno; evita el calco demasiado crudo «en tu garganta».'
- source_word: אִם
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: HALOT
  rationale: La partícula condicional se traduce de forma directa con «si», que introduce la circunstancia del aviso.
- source_word: בַּעַל נֶפֶשׁ
  english_pob_choice: a man of appetite
  chosen_spanish: un hombre dado al apetito
  alternatives_spanish:
  - un hombre de apetito
  - un glotón
  - un hombre dominado por el deseo
  lexicon: HALOT
  rationale: El hebreo literalmente expresa «dueño/poseedor de alma/vida», un modismo que aquí describe a la persona dominada por el apetito. «Dado al apetito» mantiene la tensión idiomática sin reducirla de entrada a «glotón», que sería más interpretativo y más fuerte de lo que el contexto exige.
- source_word: אָתָּה
  english_pob_choice: you are
  chosen_spanish: eres
  alternatives_spanish:
  - estás
  lexicon: HALOT
  rationale: El pronombre independiente refuerza el sujeto explícito. En español, «eres» fluye de manera natural en la cláusula condicional y preserva el sentido copulativo básico.
theological_decisions:
- issue: El modismo hebreo בַּעַל נֶפֶשׁ y su alcance moral
  english_pob_reading: a man of appetite; possible alternatives include 'given to appetite' or 'a glutton'
  chosen_spanish_reading: un hombre dado al apetito
  alternative_spanish_readings:
  - un glotón
  - un hombre dominado por el deseo
  - uno dado al apetito
  rationale: No conviene fijar de inmediato una calificación moral más dura que el hebreo y su contexto retórico obligan. La formulación elegida conserva la imagen de una persona regida por el apetito, dejando abierta la tensión entre apetito físico y deseo desordenado, tal como lo hace la nota inglesa.
  doctrine_reference: Sabiduría proverbial y discernimiento moral en el marco de Proverbios; cf. la advertencia contra la intemperancia en Prov 23:1-3.
translation_notes:
  revision_awareness: El texto inglés POB permanece sin cambios en la revisión más reciente; el consenso del cotejo es alto, por lo que esta redacción española sigue de cerca la solución auditada sin introducir ajustes doctrinales o textuales nuevos.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo exija; este versículo no contiene el nombre divino.
  - Se traduce בַּעַל נֶפֶשׁ con una expresión abierta para conservar la ambigüedad semántica documentada en el audit trail inglés.
  - La puntuación busca reproducir el tono exhortativo y la pausa condicional del hebreo sin añadir interpretaciones explicativas al cuerpo del versículo.
