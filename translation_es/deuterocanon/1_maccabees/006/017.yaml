lexical_decisions:
- source_word: ἐπέγνω
  english_pob_choice: learned
  chosen_spanish: supo
  alternatives_spanish:
  - llegó a saber
  - se enteró
  lexicon: BDAG
  rationale: El aoristo comunica que Lísias pasó a tener conocimiento de un hecho. En español, «supo» mantiene ese sentido informativo con naturalidad narrativa, sin añadir matices de investigación que no están en el griego.
- source_word: τέθνηκεν
  english_pob_choice: had died
  chosen_spanish: había muerto
  alternatives_spanish:
  - estaba muerto
  - había fallecido
  lexicon: BDAG
  rationale: El perfecto griego expresa una muerte ya consumada con resultado vigente. En español, tras un verbo de percepción en pasado, «había muerto» reproduce bien la anterioridad sin suavizar el hecho.
- source_word: κατέστησεν
  english_pob_choice: installed
  chosen_spanish: instaló
  alternatives_spanish:
  - nombró
  - puso
  - estableció
  lexicon: BDAG
  rationale: El verbo indica colocar formalmente a alguien en una función real. «Instaló» conserva la idea de investidura/colocación en el cargo mejor que un simple «nombró» o «puso».
- source_word: βασιλεύειν
  english_pob_choice: to reign
  chosen_spanish: para que reinara
  alternatives_spanish:
  - para reinar
  - para que gobernara como rey
  - para ser rey
  lexicon: BDAG
  rationale: El infinitivo expresa la función real. La construcción final en español transmite la finalidad de la instalación y mantiene el matiz monárquico de «reinar».
- source_word: ἀντʼ αὐτοῦ
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - en lugar de él
  lexicon: BDAG
  rationale: La expresión señala sucesión o sustitución. «En su lugar» es la forma española más natural y fiel para indicar reemplazo dinástico.
- source_word: ἐξέθρεψεν
  english_pob_choice: had reared
  chosen_spanish: había criado
  alternatives_spanish:
  - había educado
  - había criado y sustentado
  - lo había sacado adelante
  lexicon: BDAG
  rationale: El verbo describe el acto de criar o alimentar a un joven. «Había criado» es claro, fiel y suficientemente amplio para cubrir el cuidado formativo implícito.
- source_word: νεώτερον
  english_pob_choice: from youth
  chosen_spanish: desde joven
  alternatives_spanish:
  - desde la juventud
  - desde niño
  - cuando era joven
  lexicon: BDAG
  rationale: El adverbio marca el período desde el cual comenzó la crianza. «Desde joven» es idiomático en español y conserva la imprecisión relativa del griego sin especificar una edad exacta.
theological_decisions:
- issue: Continuación sintáctica abierta del versículo
  english_pob_reading: The Greek text of this verse ends with 'and,' indicating the sentence continues into the next verse.
  chosen_spanish_reading: El texto español termina también con «y», dejando claro que la frase continúa en el versículo siguiente.
  alternative_spanish_readings:
  - Cerrar la frase con punto.
  - Unirla con una conjunción diferente.
  rationale: La forma griega conserva una unión sintáctica abierta; el español debe reflejar esa continuidad para no ocultar la división textual ni cerrar artificialmente el período.
  doctrine_reference: Crítica textual / segmentación del texto
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no se detectaron cambios aplicados en la última pasada; la decisión principal aquí es reflejar en español la misma continuidad sintáctica abierta y las equivalencias léxicas ya justificadas en el registro inglés.
  spanish_consistency_notes:
  - Se mantiene «Lísias» con tilde española y forma habitual del nombre.
  - «Reinara» conserva el valor dinástico de βασιλεύειν sin convertirlo en un mero gobernar administrativo.
  - Se preserva la conjunción final «y» para respetar la terminación abierta del griego.
