translation:
  language: es
  text: Cuando hayas terminado estas cosas, te acostarás por segunda vez sobre tu lado derecho, y llevarás la iniquidad de la casa de Judá por cuarenta días; un día por un año, un día por un año[a], te lo he asignado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «un día por un año, un día por un año». La repetición subraya la correspondencia simbólica entre los días que Ezequiel permanece acostado y los años representados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִלִּיתָ אֶת־אֵלֶּה
  english_pob_choice: When you have finished these
  chosen_spanish: Cuando hayas terminado con esto
  alternatives_spanish:
  - Cuando hayas terminado estas cosas
  - Y habrás terminado esto
  lexicon: HALOT
  rationale: El valor temporal del perfecto con prefijo introduce la siguiente acción simbólica después de completarse la anterior. «Esto» funciona naturalmente en español para referir los signos previos sin añadir una paráfrasis más pesada.
- source_word: וְשָׁכַבְתָּ עַל־צִדְּךָ הַיְמָנִי שֵׁנִית
  english_pob_choice: you shall lie down a second time on your right side
  chosen_spanish: te acostarás por segunda vez sobre tu lado derecho
  alternatives_spanish:
  - te acostarás de nuevo sobre tu lado derecho
  - te echarás por segunda vez sobre tu lado derecho
  lexicon: HALOT
  rationale: «Acostarte» es una forma natural y digna de expresar el gesto enactuado. «Por segunda vez» explicita שֵׁנִית, preservando la repetición como parte del signo.
- source_word: וְנָשָׂאתָ אֶת־עֲוֺן
  english_pob_choice: you shall bear the iniquity
  chosen_spanish: llevarás la iniquidad
  alternatives_spanish:
  - cargarás con la iniquidad
  - llevarás la culpa
  lexicon: HALOT
  rationale: «Llevarás la iniquidad» conserva la amplitud semántica de נשא עון sin reducirla solo a culpa o castigo. Mantiene la tensión teológica del acto profético.
- source_word: בֵּית יְהוּדָה
  english_pob_choice: the house of Judah
  chosen_spanish: la casa de Judá
  alternatives_spanish:
  - Judá
  - la familia de Judá
  lexicon: HALOT
  rationale: Se conserva la designación profética formal «casa de Judá», que en español es clara y refleja el uso bíblico del término.
- source_word: אַרְבָּעִים יוֹם
  english_pob_choice: forty days
  chosen_spanish: por cuarenta días
  alternatives_spanish:
  - cuarenta días
  - durante cuarenta días
  lexicon: HALOT
  rationale: En español, la duración se expresa de manera natural con «por». Conserva el valor temporal sin sobrecargar la sintaxis.
- source_word: יוֹם לַשָּׁנָה יוֹם לַשָּׁנָה
  english_pob_choice: a day for a year, a day for a year
  chosen_spanish: un día por un año, un día por un año
  alternatives_spanish:
  - día por año, día por año
  - un día por cada año
  lexicon: HALOT
  rationale: La repetición literal es significativa en el hebreo y debe permanecer explícita en español. «Por un año» reproduce bien la relación proporcional y la repetición retórica del original.
- source_word: נְתַתִּיו לָךְ
  english_pob_choice: I have assigned it to you
  chosen_spanish: te lo he asignado
  alternatives_spanish:
  - te lo he dado
  - te lo he destinado
  lexicon: HALOT
  rationale: «Asignado» sigue la decisión del POB inglés y comunica la idea de una medida o período establecido divinamente. El objeto implícito se expresa como «lo» para hacer fluida la frase en español.
theological_decisions:
- issue: Sentido de עָוֺן en el signo profético
  english_pob_reading: Retain 'iniquity' rather than specifying only guilt or punishment
  chosen_spanish_reading: «Iniquidad» en vez de reducirlo a «culpa» o «castigo»
  alternative_spanish_readings:
  - culpa
  - castigo por el pecado
  rationale: El hebreo puede abarcar tanto la maldad como la carga/consecuencia de esa maldad. «Iniquidad» preserva esa amplitud y evita resolver la tensión demasiado pronto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Repetición de la fórmula día-año
  english_pob_reading: a day for a year, a day for a year
  chosen_spanish_reading: Repetir literalmente la fórmula para conservar su carácter simbólico
  alternative_spanish_readings:
  - un día por cada año
  - un día por año
  rationale: La duplicación no es redundante; enmarca el signo como correspondencia simbólica. Mantenerla favorece la lectura profética y el énfasis del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: conserva la cláusula repetida «un día por un año, un día por un año» en lugar de comprimirla a una sola equivalencia, y mantiene el cierre como una asignación divinamente establecida, reflejada en «te lo he asignado».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiere explícitamente; aquí no aparece.
  - Se conserva «casa de Judá» como fórmula profética estable, coherente con el registro bíblico.
  - «Iniquidad» mantiene la tensión semántica que el proyecto POB preserva en עוון.
  - La puntuación separa el signo de duración del cierre final para reflejar la estructura del hebreo y del audit trail inglés.
