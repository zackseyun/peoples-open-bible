translation:
  language: es
  text: ¿Por qué habrías de ser como un hombre aturdido, como un guerrero que no puede salvar? Sin embargo, tú estás en medio de nosotros, Yahvé, y tu nombre es llamado sobre nosotros[a]; no nos abandones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: “se nos llama por tu nombre”. Literalmente: “tu nombre es llamado sobre nosotros”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué habrías de ser...
  alternatives_spanish:
  - ¿Por qué serías...
  - ¿Por qué habrías tú de ser...
  lexicon: HALOT
  rationale: La pregunta en contexto de lamento/petición expresa reproche o súplica, no simple interrogación futura; en español, la perífrasis modal 'habrías de ser' conserva ese matiz.
- source_word: תִהְיֶה
  english_pob_choice: should you be
  chosen_spanish: habrías de ser
  alternatives_spanish:
  - serás
  - serías
  lexicon: HALOT
  rationale: El imperfecto qal en este contexto funciona con valor modal. 'Habrías de ser' transmite una expectativa/reproche más natural que un futuro llano.
- source_word: כְּאִישׁ נִדְהָם
  english_pob_choice: like a stunned man
  chosen_spanish: como un hombre aturdido
  alternatives_spanish:
  - como un hombre pasmado
  - como un hombre desconcertado
  lexicon: HALOT
  rationale: נִדְהָם expresa quedar sorprendido, atónito o paralizado. 'Aturdido' comunica la idea de alguien desorientado e incapaz de actuar, sin perder el peso figurado del hebreo.
- source_word: כְּגִבּוֹר
  english_pob_choice: like a warrior
  chosen_spanish: como un guerrero
  alternatives_spanish:
  - como un hombre valiente
  - como un héroe
  lexicon: HALOT
  rationale: גִּבּוֹר suele referir a un combatiente fuerte o héroe guerrero. 'Guerrero' encaja mejor con el paralelismo inmediato de la incapacidad para salvar.
- source_word: לֹא יוּכַל לְהוֹשִׁיעַ
  english_pob_choice: who cannot save
  chosen_spanish: que no puede salvar
  alternatives_spanish:
  - que no puede rescatar
  - que no puede librar
  lexicon: HALOT
  rationale: יכול + infinitivo expresa incapacidad. 'Salvar' preserva la fuerza léxica de הושיע y su amplitud de rescatar/liberar.
- source_word: וְאַתָּה בְקִרְבֵּנוּ
  english_pob_choice: Yet you are in our midst
  chosen_spanish: Sin embargo, tú estás en medio de nosotros
  alternatives_spanish:
  - Pero tú estás entre nosotros
  - Y tú estás en medio de nosotros
  lexicon: HALOT
  rationale: 'El contraste adversativo es importante: aunque se plantea la incapacidad imaginaria, la realidad confesada es la presencia de Yahvé. ''En medio de nosotros'' conserva la imagen de presencia comunitaria.'
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Yahvéh
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal según la convención del proyecto, en lugar de sustituirlo por un título. 'Yahvé' es la forma de estilo adoptada para el Tetragrámaton.
- source_word: וְשִׁמְךָ עָלֵינוּ נִקְרָא
  english_pob_choice: your name is called over us
  chosen_spanish: tu nombre es invocado sobre nosotros
  alternatives_spanish:
  - se nos llama por tu nombre
  - tu nombre está sobre nosotros
  lexicon: HALOT
  rationale: El hebreo expresa una fórmula de pertenencia/identificación pactal. 'Es invocado sobre nosotros' conserva la imagen verbal con buena inteligibilidad en español; la alternativa más idiomática se deja implícita en la nota.
- source_word: אַל תַּנִּחֵנוּ
  english_pob_choice: do not forsake us
  chosen_spanish: no nos abandones
  alternatives_spanish:
  - no nos dejes
  - no nos desampares
  lexicon: HALOT
  rationale: El valor aquí es dejar a alguien sin amparo; 'abandonar' resulta más natural en español contemporáneo que 'desamparar' y conserva el peso relacional del ruego.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  rationale: Se preserva el nombre propio del pacto en vez de esconderlo tras un título. Esto mantiene la transparencia textual y la coherencia con la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fórmula idiomática de pertenencia en וְשִׁמְךָ עָלֵינוּ נִקְרָא
  english_pob_reading: your name is called over us
  chosen_spanish_reading: tu nombre es invocado sobre nosotros
  alternative_spanish_readings:
  - se nos llama por tu nombre
  - tu nombre está sobre nosotros
  rationale: La imagen hebrea comunica que el pueblo pertenece a Yahvé y lleva su marca. La traducción elegida conserva la metáfora verbal sin perder claridad; la lectura idiomática queda como alternativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El expediente inglés muestra acuerdo alto y sin revisiones aplicadas; se mantiene la lectura principal con una sola nota para la alternativa idiomática de la fórmula de pertenencia.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme a la terminología del proyecto.
  - Se conserva un español natural y reverente, evitando calcos innecesarios.
  - '''Aturdido'' y ''guerrero'' mantienen el paralelismo con tono bíblico claro.'
  - La nota textual/lexical se ancla solo en el sintagma 'aturdido[a]' para no duplicar marcadores.
