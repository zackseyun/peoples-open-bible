    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto para reflejar mejor las decisiones léxicas auditadas: ''abatidos'' conserva la fuerza concreta de נִגָּפִים, ''calzadas'' representa mejor הַמְסִלּוֹת que el genérico ''caminos'', y las notas se reubican en sus anclas exactas. Se mantiene ''apartémoslos'' en el texto principal por el sentido colectivo contextual ya adoptado en la revisión inglesa, explicando en nota el singular hebreo.'
