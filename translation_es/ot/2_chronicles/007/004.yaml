translation:
  language: es
  text: Entonces el rey y todo el pueblo ofrecieron sacrificios[a] delante de Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «sacrificaban un sacrificio», una expresión cognada que significa que ofrecían sacrificios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמֶּלֶךְ
  english_pob_choice: Then the king
  chosen_spanish: Entonces el rey
  alternatives_spanish:
  - Y el rey
  - Luego el rey
  lexicon: HALOT
  rationale: וְ continúa la narración; en español, «Entonces» comunica bien la secuencia sin sonar mecánico. «el rey» corresponde de forma directa a הַמֶּלֶךְ.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  - y toda la asamblea
  lexicon: HALOT
  rationale: עָם se refiere al pueblo reunido con el rey. «Todo el pueblo» mantiene el sentido colectivo y el registro bíblico sin convertirlo en una formulación eclesiástica no exigida por el hebreo.
- source_word: זֹבְחִים
  english_pob_choice: were sacrificing
  chosen_spanish: ofrecían sacrificios
  alternatives_spanish:
  - estaban sacrificando
  - sacrificaban
  lexicon: HALOT
  rationale: El participio describe acción en curso; en español, «ofrecían sacrificios» conserva el aspecto progresivo de forma natural y evita la rigidez de «estaban sacrificando». {
- source_word: זֶבַח
  english_pob_choice: sacrifices
  chosen_spanish: sacrificios
  alternatives_spanish:
  - un sacrificio
  - ofrendas sacrificiales
  lexicon: HALOT
  rationale: Aunque el hebreo usa un singular cognado con זבח, el español normalmente expresa la acción con plural o con un sustantivo colectivo. «Sacrificios» es claro y fiel al valor del conjunto sacrificial.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: HALOT
  rationale: «Delante de» preserva la localización relacional y cultual del hebreo, y en español suena más natural que «antes de» en este contexto. «Ante» también sería posible, pero «delante de» resulta más transparente para lectores generales.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: El tetragrámaton se rinde con el nombre divino «Yahvé», conforme al criterio del proyecto, para no ocultar el nombre propio de Dios bajo un título sustitutivo.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: Se conserva el nombre divino personal en español, siguiendo el estándar del proyecto para יְהוָה. Esto evita la sustitución por un título como «el SEÑOR» y mantiene la transparencia del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La redacción inglesa pasó de una forma muy literal e incómoda («were sacrificing sacrifices») a una formulación más natural («offered sacrifices»). La versión española sigue esa revisión: conserva el valor aspectual del participio hebreo sin reproducir un calco rígido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la terminología del proyecto.
  - «Ofrecían sacrificios» equilibra fidelidad verbal y naturalidad en español.
  - No se usa «SEÑOR» como sustituto del nombre divino.
