translation:
  language: es
  text: Mientras tanto, los medanitas[a] lo vendieron a Egipto, a Potifar, un oficial de Faraón[b], capitán de la guardia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «medanitas»; tradicionalmente se entiende aquí «madianitas» a la luz de la narrativa circundante y de las versiones antiguas.'
    reason: alternative_reading
  - marker: b
    text: O «eunuco de Faraón» o «funcionario de Faraón». El término hebreo puede referirse tanto a un eunuco literal como a un oficial real.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «jefe de los matadores». En contexto de corte real, probablemente se refiere al capitán de la guardia o de la escolta.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַמְּדָנִים
  english_pob_choice: the Medanites / traditionally Midianites
  chosen_spanish: los madianitas
  alternatives_spanish:
  - los medanitas
  lexicon: HALOT
  rationale: El hebreo consonántico apunta a מְדָנִים, pero el contexto narrativo y las versiones antiguas favorecen la lectura tradicional «madianitas». En español, «madianitas» conserva la identificación histórica más asentada sin perder la referencia al grupo comerciante del relato.
- source_word: מָכְרוּ
  english_pob_choice: sold
  chosen_spanish: lo vendieron
  alternatives_spanish:
  - lo habían vendido
  lexicon: HALOT
  rationale: El perfecto qal plural se entiende naturalmente en pasado simple dentro de la secuencia narrativa. El pluscuamperfecto es posible, pero en español aquí no es necesario.
- source_word: אֹתוֹ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El objeto directo referido a José se expresa con el pronombre átono «lo», que es la forma más natural y sobria en español bíblico actual.
- source_word: אֶל מִצְרָיִם
  english_pob_choice: into Egypt
  chosen_spanish: a Egipto
  alternatives_spanish:
  - hacia Egipto
  - en Egipto
  lexicon: HALOT
  rationale: La preposición אֶל marca dirección; en español, «a Egipto» comunica ese movimiento de manera limpia. «Hacia» sería más débil; «en» perdería el matiz direccional.
- source_word: לְפוֹטִיפַר
  english_pob_choice: to Potiphar
  chosen_spanish: a Potifar
  alternatives_spanish:
  - para Potifar
  lexicon: HALOT
  rationale: La ל introduce al destinatario/comprador, por lo que «a Potifar» mantiene la relación sintáctica con el verbo de venta.
- source_word: סְרִיס פַּרְעֹה
  english_pob_choice: an officer of Pharaoh
  chosen_spanish: oficial de Faraón
  alternatives_spanish:
  - eunuco de Faraón
  - funcionario de Faraón
  lexicon: HALOT
  rationale: סָרִיס puede significar tanto eunuco literal como oficial de corte. Como el inglés POB opta por «officer» para no sobredeterminar la función, «oficial de Faraón» preserva esa amplitud en español.
- source_word: שַׂר הַטַּבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: capitán de la guardia
  alternatives_spanish:
  - jefe de los verdugos
  - capitán de los guardias
  lexicon: HALOT
  rationale: La expresión se refiere literalmente a un jefe sobre los טַבָּחִים, pero en el contexto real de la corte se entiende como un cargo de seguridad/guardia. «Capitán de la guardia» reproduce bien la equivalencia funcional que el POB documenta.
theological_decisions:
- issue: Lectura del etnónimo וְהַמְּדָנִים / tradicional «madianitas»
  english_pob_reading: The Hebrew reads 'Medanites,' but the surrounding narrative and ancient versions support the traditional understanding 'Midianites.'
  chosen_spanish_reading: «madianitas», con nota que reconoce la lectura hebrea «medanitas»
  alternative_spanish_readings:
  - «medanitas»
  rationale: No conviene borrar la tensión textual. La forma tradicional encaja mejor con el flujo narrativo, pero la base hebrea conserva otra posibilidad legítima; por eso se deja visible en nota.
  doctrine_reference: Crítica textual / traducción bíblica
translation_notes:
  revision_awareness: 'La POB inglesa fue revisada desde «Midianites» a «Medanites» para ajustarse al hebreo מְדָנִים y desde «in Egypt» a «into Egypt» para reflejar con más precisión אֶל מִצְרָיִם. Esta versión española mantiene ambas precisiones: conserva la posibilidad textual en nota y usa una preposición direccional («a Egipto») acorde con el movimiento del verbo vender.'
  spanish_consistency_notes:
  - Se usa «Faraón» para פַּרְעֹה, conforme al uso estándar del proyecto en español.
  - Se mantiene «Potifar» como transliteración estable del nombre propio.
  - «Oficial» se reserva aquí para סְרִיס, sin forzar el sentido de «eunuco» en el texto principal.
  - «Capitán de la guardia» sigue la equivalencia funcional documentada por el POB para שַׂר הַטַּבָּחִים.
