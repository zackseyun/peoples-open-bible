translation:
  language: es
  text: Sálvanos[a], Yahvé, nuestro Dios, y reúnenos de entre las naciones, para que demos gracias a tu santo nombre y nos gloriemos[b] en tu alabanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Líbranos, Yahvé, nuestro Dios, y reúnenos de entre las naciones»
    reason: lexical_alternative
  - marker: b
    text: O «gloriarnos» o «exultar» en tu alabanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹשִׁיעֵנוּ
  english_pob_choice: Save us
  chosen_spanish: Sálvanos
  alternatives_spanish:
  - Líbranos
  - Delivranos
  lexicon: HALOT
  rationale: El imperativo hifil con sufijo de 1ª persona plural pide rescate/salvación directa. "Sálvanos" es la equivalencia natural y fuerte en español de oración; conserva mejor el tono suplicante que una paráfrasis más débil.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton según la convención editorial del proyecto en español. "Yahvé" mantiene el nombre propio del pacto, en lugar de sustituirlo por un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios y Señor
  lexicon: HALOT
  rationale: 'La forma constructa con sufijo de 1ª persona plural expresa posesión relacional/covenantal de manera directa: "nuestro Dios".'
- source_word: וְקַבְּצֵנוּ
  english_pob_choice: and gather us
  chosen_spanish: y recógenos
  alternatives_spanish:
  - y reúnelos
  - y congrega nos
  - y reúnenos
  lexicon: HALOT
  rationale: El piel imperativo de קבץ con sufijo de 1ª plural significa reunir/gather. En español, "recógenos" reproduce bien la fuerza de reunir a los dispersos y evita un calco menos natural como "congrega nos".
- source_word: מִן הַגּוֹיִם
  english_pob_choice: from among the nations
  chosen_spanish: de entre las naciones
  alternatives_spanish:
  - de las naciones
  - de entre los pueblos
  lexicon: HALOT
  rationale: '"De entre" expresa mejor la idea de dispersión entre los pueblos que un simple "de". "Naciones" mantiene el referente étnico-político del hebreo en este contexto de restauración.'
- source_word: לְהוֹדוֹת
  english_pob_choice: that we may give thanks
  chosen_spanish: para que demos gracias
  alternatives_spanish:
  - para dar gracias
  - a fin de dar gracias
  lexicon: HALOT
  rationale: El infinitivo con ל expresa propósito. "Dar gracias" es el sentido normal de ידה en este marco; la subordinada final en español preserva con claridad la relación de propósito.
- source_word: לְשֵׁם קָדְשֶׁךָ
  english_pob_choice: to your holy name
  chosen_spanish: a tu santo nombre
  alternatives_spanish:
  - a tu nombre santo
  - por tu santo nombre
  lexicon: HALOT
  rationale: 'La construcción se vierte naturalmente con destinatario/objeto de acción de gracias: "a tu santo nombre". "Santo" reproduce קָדְשֶׁךָ sin alterar el foco del sintagma nominal.'
- source_word: לְהִשְׁתַּבֵּחַ
  english_pob_choice: glory in
  chosen_spanish: nos gloriemos
  alternatives_spanish:
  - nos glorifiquemos
  - alabemos
  - nos jactemos
  lexicon: HALOT
  rationale: El hitpael de שׁבח tiene un valor reflexivo/exultante que en español se expresa mejor con "gloriarse". Mantiene la intensidad del hebreo sin caer en "jactarse", que podría sonar peyorativo.
- source_word: בִּתְהִלָּתֶךָ
  english_pob_choice: in your praise
  chosen_spanish: en tu alabanza
  alternatives_spanish:
  - en tu alabanza y gloria
  - en tu canto de alabanza
  lexicon: HALOT
  rationale: '"תְהִלָּה" se traduce de modo natural como "alabanza". La preposición ב indica esfera o ámbito: gloriarse en lo que pertenece a la alabanza de Dios.'
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa יְהוָה directamente. La política del proyecto en español es transliterar el nombre divino como "Yahvé" para conservar la referencia personal y pactual, en lugar de ocultarla tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Nuance de לְהִשְׁתַּבֵּחַ בִּתְהִלָּתֶךָ
  english_pob_reading: glory in your praise
  chosen_spanish_reading: nos gloriemos en tu alabanza
  alternative_spanish_readings:
  - nos jactemos en tu alabanza
  - nos regocijemos en tu alabanza
  rationale: La combinación expresa gozo exultante centrado en Dios y no una vanagloria humana. "Gloriarnos" conserva la fuerza reflexiva y la tradición bíblica del verbo sin neutralizarlo demasiado.
  doctrine_reference: 'DOCTRINE.md: Lexical force and exultant praise'
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés, incluyendo la revisión que prefirió "glory in your praise" sobre "boast in your praise" por naturalidad y adecuación formal. En español, "nos gloriemos" conserva esa decisión revisada y mantiene la tensión exultante del hitpael.
  spanish_consistency_notes:
  - Se usó "Yahvé" de acuerdo con la terminología española del proyecto para el Tetragrámaton.
  - Se prefirió "nos gloriemos" en lugar de "nos jactemos" para evitar una connotación negativa no exigida por el contexto.
  - '"De entre las naciones" preserva la idea de dispersión/restauración implícita en el hebreo.'
