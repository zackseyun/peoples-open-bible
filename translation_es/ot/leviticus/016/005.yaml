review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la estructura hebrea: procedencia desde la congregación de los hijos de Israel, dos machos cabríos y un carnero, con las funciones sacrificiales correspondientes. Sin embargo, לְחַטָּאת en este contexto nominal sacrificial no se preserva fielmente con «para expiación», porque el hebreo nombra una ofrenda específica, no una abstracción. También conviene preservar el numeral de «un carnero» explícitamente, como ya hace el borrador.'
  spanish_quality_summary: El español es claro y eclesialmente legible. «Congregación», «hijos de Israel», «machos cabríos», «carnero» y «holocausto» funcionan bien. La principal mejora de naturalidad y precisión es cambiar «para expiación» por «como ofrenda por el pecado» o equivalente sacrificial concreto; así también armoniza mejor con la nota sobre «ofrenda de purificación».
  glossary_alignment: Alinea bien con los términos del proyecto salvo en חַטָּאת, donde la POB inglesa eligió «sin offering» con nota alternativa «purification offering». En español, «expiación» se aparta de esa decisión léxica y puede desplazar el sentido hacia resultado/efecto en vez de tipo de sacrificio. «Los hijos de Israel» preserva correctamente בְּנֵי יִשְׂרָאֵל, y «holocausto» es una buena equivalencia estable para עֹלָה.
  issues:
  - severity: high
    issue: «para expiación» no traduce adecuadamente לְחַטָּאת en contexto sacrificial
    rationale: El sustantivo aquí designa una ofrenda específica (tradicionalmente «ofrenda por el pecado»; alternativamente «ofrenda de purificación»), no la noción abstracta de expiación. La versión actual pierde la referencia cultual concreta y se aleja de la decisión documentada por la POB inglesa.
  - severity: medium
    issue: La nota b queda desalineada con el texto principal
    rationale: Si el texto dice «para expiación», la alternativa «para una ofrenda de purificación» ya no se presenta como una alternativa del mismo nivel sintáctico-semántico. Conviene que el texto principal también nombre una ofrenda.
  revised_spanish_text: Y de la congregación de los hijos de Israel tomará dos machos cabríos como ofrenda por el pecado[a][b], y un carnero para holocausto.
  revised_footnotes:
  - marker: a
    text: 'O «los israelitas» / «el pueblo de Israel». Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
  - marker: b
    text: O «como ofrenda de purificación». El término hebreo חַטָּאת en Levítico puede denotar la ofrenda que trata con el pecado y la impureza ritual.
    reason: alternative_reading
  revision_rationale: Se revisa únicamente חַטָּאת para reflejar que el hebreo nombra una categoría sacrificial concreta. «Como ofrenda por el pecado» preserva mejor el sentido fuente, se alinea con la POB inglesa y mantiene la alternativa documentada «ofrenda de purificación» en la nota. El resto del versículo puede conservarse tal como está.
