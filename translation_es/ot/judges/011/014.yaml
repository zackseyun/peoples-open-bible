translation:
  language: es
  text: Entonces Jefté volvió a enviar mensajeros al rey de los amonitas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «el rey de los hijos de Amón», un modismo que se refiere al pueblo amonita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹסֶף עוֹד
  english_pob_choice: Then ... again
  chosen_spanish: volvió a
  alternatives_spanish:
  - otra vez
  - nuevamente
  - y otra vez
  lexicon: HALOT
  rationale: La construcción hebrea expresa repetición/continuación de la acción. En español, 'volvió a' comunica de forma natural que Jefté hizo la acción nuevamente sin forzar un calco.
- source_word: יִפְתָּח
  english_pob_choice: Jephthah
  chosen_spanish: Jefté
  alternatives_spanish:
  - Yefté
  - Jeftá
  lexicon: transliteración del nombre propio
  rationale: Se translitera el nombre propio al español como 'Jefté', forma clara y reconocible en contexto bíblico.
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent
  chosen_spanish: enviar
  alternatives_spanish:
  - mandar
  - despachar
  lexicon: HALOT
  rationale: El verbo hebreo שׁלח se rinde de manera natural como 'enviar' en este contexto diplomático; 'volver a enviar' reproduce bien la acción narrativa.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - emisarios
  lexicon: HALOT
  rationale: En un contexto humano y diplomático, מַלְאָכִים se refiere a mensajeros humanos, no a ángeles. 'Mensajeros' es el equivalente directo y transparente.
- source_word: מֶלֶךְ בְּנֵי עַמּוֹן
  english_pob_choice: the king of the Ammonites
  chosen_spanish: el rey de los amonitas
  alternatives_spanish:
  - el rey de los hijos de Amón
  - el rey del pueblo de Amón
  lexicon: HALOT
  rationale: La expresión hebrea idiomática 'rey de los hijos de Amón' designa al pueblo ammonita. 'Amonitas' conserva el referente étnico de manera idiomática en español.
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo WLC y mantiene la decisión auditada del POB inglés de leer מַלְאָכִים como mensajeros humanos y de entender בְּנֵי עַמּוֹן como designación idiomática del pueblo ammonita. No se observan revisiones posteriores que alteren el sentido.
  spanish_consistency_notes:
  - Se usa 'Jefté' como forma española del nombre propio, consistente con transliteración bíblica en español.
  - '''Volvió a enviar'' conserva la idea de repetición contenida en וַיּוֹסֶף עוֹד sin sobreexplicar.'
  - '''Amonitas'' evita el calco pesado ''hijos de Amón'' en el cuerpo principal, pero la nota mantiene el vínculo hebreo.'
  - El orden narrativo con 'Entonces' refleja la secuencia de waw consecutivo de manera natural en español.
