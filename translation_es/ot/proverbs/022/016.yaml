  text: One who oppresses the poor to increase his own wealth[a], or gives to the rich[b], will come only to poverty.
  footnotes:
  - marker: a
    text: Or, 'One who oppresses the poor to enrich himself and gives to the rich—only to poverty.' The Hebrew can be read as describing either two comparable actions or one combined pattern of behavior.
    reason: alternative_reading
