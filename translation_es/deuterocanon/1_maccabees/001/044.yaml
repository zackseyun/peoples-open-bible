translation:
  language: es
  text: Y el rey envió cartas por mano de mensajeros a Jerusalén y a las ciudades de Judá, para que siguieran leyes ajenas a la tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'costumbres ajenas a la tierra'. El griego νόμιμα puede denotar tanto leyes como prácticas consuetudinarias.
    reason: lexical_alternative
lexical_decisions:
- source_word: βιβλία
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas escritas
  - documentos
  - escritos
  lexicon: LSJ
  rationale: En este contexto administrativo, βιβλία designa comunicaciones escritas enviadas por el rey, no 'libros' en sentido moderno. 'Cartas' es el equivalente natural en español y conserva el carácter de un envío oficial.
- source_word: ἐν χειρὶ ἀγγέλων
  english_pob_choice: by the hand of messengers
  chosen_spanish: por mano de mensajeros
  alternatives_spanish:
  - por mensajeros
  - en mano de mensajeros
  lexicon: LSJ
  rationale: La expresión conserva el matiz idiomático de agencia y entrega. 'Por mano de mensajeros' es idiomática en español y mantiene el sabor semítico/administrativo del giro griego.
- source_word: προπορεύθηναι ὀπίσω
  english_pob_choice: that they should follow
  chosen_spanish: para que siguieran
  alternatives_spanish:
  - para que fueran tras
  - para que siguieran después de
  lexicon: LSJ
  rationale: El infinitivo con ὀπίσω expresa la idea de ir detrás o adoptar una pauta. En español, 'para que siguieran' comunica bien la obligación impuesta por el decreto sin sonar forzado.
- source_word: νομίμων
  english_pob_choice: laws
  chosen_spanish: leyes
  alternatives_spanish:
  - costumbres
  - normas
  - ordenanzas
  lexicon: LSJ
  rationale: νόμιμα puede significar leyes o costumbres establecidas. Dado el carácter coercitivo y oficial del decreto real, 'leyes' preserva mejor la fuerza normativa, sin excluir la posible tonalidad de costumbre.
- source_word: ἀλλοτρίων
  english_pob_choice: foreign
  chosen_spanish: extrañas
  alternatives_spanish:
  - extranjeras
  - ajenas
  - foráneas
  lexicon: LSJ
  rationale: El griego marca lo que pertenece a otros, es decir, normas no propias de la tierra. 'Extrañas' en español conserva la idea de no pertenencia y la distancia cultural/religiosa; 'extranjeras' o 'ajenas' también serían posibles.
- source_word: τῆς γῆς
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la región
  - Judá
  lexicon: LSJ
  rationale: El texto griego dice simplemente 'la tierra'. 'La tierra' preserva el alcance del original sin precisar más de lo que el griego expresa.
theological_decisions:
- issue: Alcance de νόμιμα en un contexto de persecución
  english_pob_reading: laws
  chosen_spanish_reading: leyes
  alternative_spanish_readings:
  - costumbres
  - ordenanzas
  rationale: La escena presenta una imposición real de normas no judías. 'Leyes' mantiene el carácter oficial y coercitivo del decreto, aunque 'costumbres' sigue siendo una posibilidad léxica en segundo plano.
  doctrine_reference: 'Philosophy of translation: optimal equivalence; lexical transparency'
- issue: Relación entre 'a las ciudades de Judá' y 'a Jerusalén'
  english_pob_reading: to Jerusalem and the cities of Judah
  chosen_spanish_reading: a Jerusalén y a las ciudades de Judá
  alternative_spanish_readings:
  - a Jerusalén y a las ciudades de Judea
  - a Jerusalén y a las ciudades de Judá
  rationale: Se conserva la forma geográfica explícita del texto. 'Judá' reproduce con sobriedad el genitivo griego y evita sobreexplicar el territorio.
  doctrine_reference: Source-text fidelity; geographic specificity
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Swete y el audit trail inglés: βιβλία se entendió como correspondencia oficial, ἐν χειρὶ ἀγγέλων como un giro de agencia conservado idiomáticamente, y νόμιμα como imposición normativa. Se respetó la ambigüedad léxica documentada en el inglés POB mediante una nota alternativa.'
  spanish_consistency_notes:
  - Se usó 'Y' al inicio para reproducir la coordinación narrativa del griego.
  - '''Cartas'' evita el falso amigo ''libros''.'
  - '''Por mano de mensajeros'' mantiene el tono antiguo sin volverse opaco.'
  - '''Leyes extrañas a la tierra'' refleja la tensión entre legalidad y costumbre documentada en el audit trail.'
