base_translation:
  language: en
  yaml_path: translation/ot/genesis/037/022.yaml
  text: And Reuben said to them[a], “Do not shed blood. Throw him into this pit that is in the wilderness, but do not lay a hand on him”—that he might rescue him from their hand[b], to return him to his father.
  footnotes:
