revisions:
- from: Entonces bajó y habló a la mujer, y ella fue agradable[a] a los ojos de Sansón.
  to: Entonces bajó y habló a la mujer, y ella fue grata[a] a los ojos de Sansón.
  rationale: Se ajusta «fue agradable» a «fue grata» para lograr un español más natural sin perder el matiz estativo ni el modismo «a los ojos de Sansón». Se corrige la nota al pie para eliminar la inversión de sentido en «le agradó Sansón». No se requiere adjudicación adicional porque la corrección es clara, local y no doctrinalmente compleja.
