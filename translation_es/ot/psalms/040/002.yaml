translation:
  language: es
  text: Esperé[a] pacientemente a Yahvé, y él se volvió hacia mí y oyó mi clamor de auxilio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Esperando, esperé», una expresión enfática que significa «esperé pacientemente» o «esperé con insistencia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קַוֺּה קִוִּיתִי
  english_pob_choice: I waited patiently
  chosen_spanish: Esperé[a] pacientemente
  alternatives_spanish:
  - Esperé, sí, esperé
  - Esperé con insistencia
  - Esperé con esperanza
  lexicon: HALOT
  rationale: El infinitivo absoluto con el verbo finito intensifica la acción. En español, la manera más natural de conservar esa fuerza es con un adverbio como "pacientemente"; también puede reflejar espera insistente o sostenida. La nota mantiene la alternativa literal y el matiz enfático del hebreo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: 'Se conserva el nombre propio divino del Tetragrámaton según el criterio del proyecto en español: "Yahvé". Es más fiel al nombre revelado que sustituirlo por un título.'
- source_word: וַיֵּט אֵלַי
  english_pob_choice: he turned to me
  chosen_spanish: se inclinó hacia mí
  alternatives_spanish:
  - se volvió hacia mí
  - se acercó a mí
  - se inclinó a mí
  lexicon: HALOT
  rationale: נטה puede expresar inclinarse, dirigirse o volverse hacia alguien. En español, "se inclinó hacia mí" conserva la imagen relacional y la dirección hacia el salmista sin sonar forzado. "Se volvió hacia mí" también sería posible, pero pierde algo de la matiz de inclinación/atención.
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  - prestó atención a
  lexicon: HALOT
  rationale: En este contexto, שׁמע significa oír con respuesta atenta. "Oyó" es breve y suficiente en español; "escuchó" también sería posible, pero aquí "oyó" mantiene mejor la sencillez del hebreo.
- source_word: שַׁוְעָתִי
  english_pob_choice: my cry for help
  chosen_spanish: mi clamor de auxilio
  alternatives_spanish:
  - mi clamor
  - mi grito de ayuda
  - mi súplica de auxilio
  lexicon: HALOT
  rationale: שַׁוְעָה es un clamor de socorro, no solo un grito cualquiera. "Clamor de auxilio" expresa bien la urgencia y la petición de ayuda con un registro bíblico claro en español.
theological_decisions:
- issue: Tratamiento del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. Siguiendo la convención del proyecto en español, se mantiene el nombre propio "Yahvé" y no se sustituye por un título reverencial.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La revisión inglesa más reciente indica que no hubo cambios necesarios y el cotejo final muestra alta concordancia; por eso esta propuesta española sigue de cerca la lectura estable del audit trail, conservando la intensificación de קוה, el nombre divino como nombre propio y el sentido de clamor de auxilio.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" de forma consistente con el criterio del proyecto.
  - La nota[a] se ancla en el verbo de espera para conservar la intensificación hebrea.
  - '"Clamor de auxilio" evita rebajar שַׁוְעָה a un simple "grito" y encaja con el tono del texto poético.'
