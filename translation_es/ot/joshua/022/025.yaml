    text: 'O: «frontera».'
    reason: lexical_alternative
  revision_rationale: Se cambia 'frontera' por 'límite' como equivalente principal de גְּבוּל para evitar una connotación política moderna y reflejar mejor una división establecida entre grupos. Se conserva el resto porque es fiel al hebreo, al audit trail inglés y a la terminología del proyecto.
