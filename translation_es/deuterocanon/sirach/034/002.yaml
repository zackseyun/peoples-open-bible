translation:
  language: es
  text: Como el que agarra una sombra y persigue el viento[a], así es el que se aferra a los sueños.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que depende de los sueños» o «el que presta atención a los sueños». El verbo griego puede sugerir aferrarse a algo, depender de ello o prestarle atención.
    reason: lexical_alternative
lexical_decisions:
- source_word: δρασσόμενος
  english_pob_choice: grasping at
  chosen_spanish: se apodera de
  alternatives_spanish:
  - intenta asir
  - agarra
  - se aferra a
  lexicon: LSJ
  rationale: El participio describe un intento de tomar algo con la mano, pero con sentido de inutilidad. «Se apodera de» conserva la imagen de tomar sin añadir una lectura demasiado psicológica; en español, «apoderarse de» funciona de modo natural con el objeto imposible de retener.
- source_word: σκιᾶς
  english_pob_choice: a shadow
  chosen_spanish: una sombra
  alternatives_spanish:
  - sombra
  - una sombra pasajera
  - una sombra vana
  lexicon: LSJ
  rationale: La imagen apunta a algo insustancial e imposible de retener. «Una sombra» reproduce la metáfora con naturalidad en español y mantiene la fuerza de futilidad del original.
- source_word: διώκων ἄνεμον
  english_pob_choice: chasing the wind
  chosen_spanish: persigue el viento
  alternatives_spanish:
  - va tras el viento
  - corre tras el viento
  - persigue el aire
  lexicon: LSJ
  rationale: La expresión es una imagen convencional de inutilidad. «Persigue el viento» conserva la metáfora sin paráfrasis y suena idiomática en español.
- source_word: ὁ ἐπέχων
  english_pob_choice: one who clings to
  chosen_spanish: el que se aferra a
  alternatives_spanish:
  - el que se apega a
  - el que depende de
  - el que presta atención a
  lexicon: LSJ
  rationale: El verbo puede implicar sostenerse en algo, depender de ello o fijar la atención en ello. «Se aferra a» refleja bien la idea de adhesión indebida y la crítica del verso a confiar en los sueños.
- source_word: ἐνυπνίοις
  english_pob_choice: dreams
  chosen_spanish: los sueños
  alternatives_spanish:
  - los sueños nocturnos
  - los sueños-visions
  - las visiones en sueños
  lexicon: LSJ
  rationale: El plural se refiere a sueños o visiones vistas durante el dormir. «Los sueños» es la opción más clara y fiel en español; el artículo definido mantiene el tono general del refrán.
theological_decisions:
- issue: Fuerza interpretativa de ὁ ἐπέχων ἐνυπνίοις
  english_pob_reading: one who clings to dreams
  chosen_spanish_reading: el que se aferra a los sueños
  alternative_spanish_readings:
  - el que presta atención a los sueños
  - el que depende de los sueños
  rationale: El contexto compara esta conducta con intentar asir una sombra y perseguir el viento, por lo que el reproche recae en la confianza indebida en los sueños. «Se aferra a» comunica esa dependencia sin introducir una doctrina ajena al texto.
  doctrine_reference: Translator's philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La fuente griega y el audit trail inglés concuerdan de forma alta; no hay revisiones aplicadas en el expediente reciente y la lectura estable se mantiene sin cambios sustantivos.
  spanish_consistency_notes:
  - Se mantiene «sueños» para ἐνυπνίοις por claridad y naturalidad.
  - Se conserva la metáfora completa de sombra y viento, sin suavizarla ni explicarla dentro del texto principal.
  - El registro es reverente pero contemporáneo, apto para lectura eclesial general en español latinoamericano.
