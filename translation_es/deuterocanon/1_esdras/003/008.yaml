  glossary_alignment: 'No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales concuerdan con el expediente inglés: τότε = «entonces», λόγος = «declaración», ἐσφραγίσαντο = «las sellaron», προσκεφάλαιον = «almohada» con alternativa en nota.'
