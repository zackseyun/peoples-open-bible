base_translation:
  language: en
  yaml_path: translation/ot/isaiah/045/018.yaml
  text: 'For thus says Yahweh[a], who created the heavens—he is God—who formed the earth and made it, he established it; he did not create it as a wasteland, but formed it to be inhabited: I am Yahweh, and there is no other.'
  footnotes:
  - marker: a
    text: Or 'he did not create it empty,' 'he did not create it for chaos,' or 'he did not create it formless.' The Hebrew tohu can denote emptiness, desolation, or wasteness; here the contrast with 'to be inhabited' favors 'wasteland.'
