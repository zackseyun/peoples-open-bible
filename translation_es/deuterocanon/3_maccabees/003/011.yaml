translation:
  language: es
  text: 'Así pues[a], envanecido por su prosperidad presente, y sin percibir el poder del Dios más grande, y suponiendo que permanecería para siempre en el mismo propósito, escribió contra ellos esta carta:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el Altísimo Dios». El griego dice literalmente «el Dios más grande».
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ κατὰ τὸ παρὸν εὐημερίᾳ
  english_pob_choice: puffed up by his present prosperity
  chosen_spanish: envanecido por su prosperidad presente
  alternatives_spanish:
  - engreído por su prosperidad presente
  - inflado por su prosperidad de entonces
  lexicon: LSJ
  rationale: 'εὐημερία expresa estar bien o prosperar; «prosperidad» reproduce ese campo semántico con naturalidad en español. γεγαυρωμένος se entiende como orgullo inflado; «envanecido» conserva la idea de exaltación arrogante sin sonar tan coloquial como «hinchado». '
- source_word: γεγαυρωμένος
  english_pob_choice: puffed up
  chosen_spanish: envanecido
  alternatives_spanish:
  - hinchado de orgullo
  - arrogante
  lexicon: LSJ
  rationale: 'La metáfora de estar inflado por orgullo se conserva mejor con «envanecido» que con un adjetivo más plano como «arrogante». '
- source_word: οὐ καθορῶν
  english_pob_choice: not perceiving
  chosen_spanish: no percibiendo
  alternatives_spanish:
  - no viendo
  - sin reconocer
  lexicon: LSJ
  rationale: 'καθορῶν implica no ver con comprensión plena; «no percibiendo» mantiene tanto la dimensión visual como la cognitiva, como en la decisión inglesa. '
- source_word: τὸ τοῦ μεγίστου θεοῦ κράτος
  english_pob_choice: the power of the greatest God
  chosen_spanish: el poder del Dios el más grande
  alternatives_spanish:
  - el poder del Dios más grande
  - la potestad del Dios sumamente grande
  lexicon: LSJ
  rationale: 'Se conserva la literalidad del superlativo μέγιστος. Aunque «el Dios el más grande» suena marcado, refleja la decisión inglesa de no suavizar a «Altísimo» y evita reemplazar el giro por una fórmula tradicional no presente en el griego. «Poder» traduce κράτος de forma natural y suficientemente fuerte. '
- source_word: ὑπολαμβάνων
  english_pob_choice: supposing
  chosen_spanish: suponiendo
  alternatives_spanish:
  - pensando
  - asumiendo
  lexicon: LSJ
  rationale: 'Introduce una inferencia errónea o presunción subjetiva; «suponiendo» es el correlato español más directo y sobrio. '
- source_word: διηνεκῶς
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - continuamente
  - perpetuamente
  lexicon: LSJ
  rationale: 'Aunque el adverbio apunta a continuidad indefinida más que a eternidad metafísica, «para siempre» reproduce la fuerza de duración total que la versión inglesa retuvo con «forever». '
- source_word: ἐν τῇ αὐτῇ διαμένειν βουλῇ
  english_pob_choice: continue forever in the same purpose
  chosen_spanish: permanecería para siempre en el mismo propósito
  alternatives_spanish:
  - continuaría para siempre en el mismo plan
  - persistiría en la misma resolución
  lexicon: LSJ
  rationale: '«διαμένειν» expresa permanecer o mantenerse; el imperfecto proyectado en español por el contexto se vierte con «permanecería». «βουλή» aquí es intención o propósito, no un consejo deliberativo, por lo que «propósito» es adecuado. '
- source_word: ἔγραφεν
  english_pob_choice: he wrote
  chosen_spanish: escribía
  alternatives_spanish:
  - escribió
  - estaba escribiendo
  lexicon: LSJ
  rationale: 'El imperfecto griego puede funcionar como introducción narrativa del contenido de la carta. «Escribía» conserva el aspecto progresivo/narrativo y el enlace con la carta que sigue. '
- source_word: κατʼ αὐτῶν
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - en contra de ellos
  - a su respecto
  lexicon: LSJ
  rationale: 'La preposición con genitivo es adversativa en este contexto hostil; «contra ellos» es la equivalencia natural y fiel. '
- source_word: ἐπιστολὴν τήνδε
  english_pob_choice: this letter
  chosen_spanish: esta carta
  alternatives_spanish:
  - la siguiente carta
  lexicon: LSJ
  rationale: 'El demostrativo apunta a la carta que sigue. «Esta carta» es directo y conserva la referencia inmediata sin añadir explicaciones. '
theological_decisions:
- issue: Renderización de τοῦ μεγίστου θεοῦ
  english_pob_reading: the greatest God
  chosen_spanish_reading: el Dios el más grande
  alternative_spanish_readings:
  - el Dios más grande
  - el Altísimo Dios
  - el Dios supremo
  rationale: Se mantiene el superlativo literal del griego y la opción inglesa, sin armonizarlo automáticamente con un título bíblico más familiar. Esto preserva la tensión léxica del texto fuente y evita sustituir la forma comparativa/superlativa por una denominación tradicional no presente aquí.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: No se observaron revisiones aplicadas en el expediente inglés; el estado más reciente indica que no hubo cambios necesarios y la concordancia de revisión fue alta.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y «poder» para κράτος, siguiendo el valor fuerte del sustantivo en contexto.
  - Se preservó el superlativo literal en la expresión divina, aun cuando suena menos idiomático que una fórmula tradicional, porque el expediente inglés documenta esa elección como deliberada.
  - Se usó «esta carta» con nota porque el demostrativo griego es deíctico y apunta al texto que sigue.
