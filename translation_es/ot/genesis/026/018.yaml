translation:
  language: es
  text: Entonces Isaac volvió a cavar los pozos de agua[a] que habían cavado en los días de Abraham su padre, y que los filisteos habían cegado después de la muerte de Abraham; y les puso los mismos nombres que su padre les había puesto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «los pozos de agua». Se conserva la imagen del pozo como fuente de agua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: Then Isaac dug again
  chosen_spanish: Entonces Isaac volvió a cavar
  alternatives_spanish:
  - Entonces Isaac cavó de nuevo
  - Entonces Isaac retornó y cavó
  lexicon: HALOT
  rationale: שׁוּב aquí funciona de modo resumitivo para indicar reanudación de la acción; en español, 'volvió a cavar' comunica esa repetición natural sin volverlo un mero movimiento físico.
- source_word: וַיַּחְפֹּר
  english_pob_choice: dug again
  chosen_spanish: a cavar
  alternatives_spanish:
  - cavó otra vez
  - reabrió cavando
  lexicon: HALOT
  rationale: חפר significa 'cavar'. Con el verbo previo 'volvió a', el infinitivo 'a cavar' expresa la acción restituida sin sobretraducirla.
- source_word: בְּאֵרֹת הַמַּיִם
  english_pob_choice: the wells of water
  chosen_spanish: los pozos de agua
  alternatives_spanish:
  - los pozos de aguas
  - los pozos
  lexicon: HALOT
  rationale: '''Pozos de agua'' es una equivalencia natural y fiel para בְּאֵרֹת הַמַּיִם; ''pozos'' solo perdería la explicitación del tipo de pozos.'
- source_word: וַיְסַתְּמ֣וּ/ם
  english_pob_choice: had stopped up
  chosen_spanish: habían cegado
  alternatives_spanish:
  - habían tapado
  - habían obstruido
  lexicon: HALOT
  rationale: Para pozos, 'cegar' es un verbo español preciso que conserva la idea de bloquear/llenar el pozo sin especificar el material usado.
- source_word: וַיִּקְרָ֤א לָ/הֶן֙ שֵׁמ֔וֹת
  english_pob_choice: he called them by the names
  chosen_spanish: les puso los mismos nombres
  alternatives_spanish:
  - los llamó por los nombres
  - les dio los nombres
  lexicon: HALOT
  rationale: קרא לְ + 'nombres' expresa asignación nominal. 'Les puso' es idiomático en español y 'los mismos nombres' preserva la correspondencia con los ya dados.
- source_word: כַּ/שֵּׁמֹ֕ת אֲשֶׁר קָרָ֥א לָ/הֶ֖ן אָבִֽי/ו
  english_pob_choice: the same names that his father had given them
  chosen_spanish: los mismos nombres que su padre les había puesto
  alternatives_spanish:
  - los nombres conforme a los que su padre les había dado
  - nombres como los que su padre les había puesto
  lexicon: HALOT
  rationale: El כ comparativo/correspondiente se expresa mejor con 'los mismos nombres', que transmite la equivalencia con los nombres previamente asignados por Abraham.
translation_notes:
  revision_awareness: La versión española sigue la revisión del inglés POB que prefirió 'called them by the names' frente a 'gave them the same names', y refleja esa cercanía con 'les puso los mismos nombres'. También integra la fuerza resumptiva de וַיָּשָׁב como 'volvió a' en vez de 'regresó y'.
  spanish_consistency_notes:
  - Se mantiene 'Isaac' y 'Abraham' sin transliteraciones alternativas.
  - Se usa 'filisteos' como etnónimo estándar.
  - Se evita 'SEÑOR' porque este versículo no contiene el nombre divino.
  - El orden y la puntuación siguen una cadencia narrativa natural en español, sin añadir contenido interpretativo.
