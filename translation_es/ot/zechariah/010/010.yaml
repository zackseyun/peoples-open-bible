review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: retorno desde Egipto, reunión desde Asiria, traslado a Galaad y Líbano, y la idea final de falta de espacio. También preserva correctamente «tierra» para אֶרֶץ y la pasiva implícita de יִמָּצֵא con «se hallará». Sin embargo, la nota al pie está mal anclada y no corresponde al lugar léxico pertinente del versículo.'
  spanish_quality_summary: El español es claro, natural y digno. «Yo los haré volver» y «los reuniré» son buenas elecciones. «Los llevaré» funciona bien con el destino. La principal reparación necesaria es mover la nota al pie desde «Egipto» a la cláusula final, ya que la nota explica la alternativa literal de «no se hallará lugar para ellos».
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. Los topónimos «Egipto», «Asiria», «Galaad» y «Líbano» son adecuados. No aparece terminología teológica sensible adicional.
  issues:
  - severity: medium
    issue: La nota al pie [a] está colocada en «Egipto» pero su contenido explica la cláusula final «y no se hallará lugar para ellos».
    rationale: Las instrucciones exigen que el marcador aparezca en la palabra o frase relevante. Tal como está, el anclaje induce a error y no preserva con precisión el rastro de auditoría del POB inglés.
  - severity: low
    issue: La nota dice «más literalmente» aunque el texto de la nota es idéntico a la traducción principal.
    rationale: 'La nota del inglés pretende señalar una alternativa léxica/literal frente al suministro implícito de «room/place». En español, si la principal ya usa «lugar», la nota debe expresar la literalidad real: que el hebreo dice algo como «y no se hallará para ellos», dejando implícito «lugar».'
  revised_spanish_text: Yo los haré volver de la tierra de Egipto y los reuniré de Asiria; los llevaré a la tierra de Galaad y del Líbano, y no se hallará lugar[a] para ellos.
  revised_footnotes:
  - marker: a
    text: Más literalmente, «y no se hallará para ellos»; el hebreo deja implícita la idea de «lugar» o «espacio».
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota al pie para que recaiga sobre «lugar», que es donde el español hace explícito el objeto implícito del hebreo. También se ajusta el contenido de la nota para reflejar una alternativa verdaderamente más literal, en vez de repetir exactamente el texto principal.
