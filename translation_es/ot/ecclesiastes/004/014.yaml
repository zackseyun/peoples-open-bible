    issue: Tiempo verbal de נוֹלַד traducido como 'nació'
    rationale: Aunque el hebreo permite una forma simple, el contexto concesivo respecto de su realeza posterior se expresa mejor en español con 'había nacido pobre', como también hace el inglés POB con past perfect. Esto evita una lectura más plana y mejora la relación temporal.
  - severity: low
    issue: Acentuación de 'aun'
    rationale: En esta frase tiene valor intensificador equivalente a 'incluso/todavía', por lo que en español estándar conviene escribir 'aún'.
