translation:
  language: es
  text: 'En el año de la muerte del rey Acaz, vino este oráculo[a]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Oráculo» conserva el valor profético del hebreo מַשָּׂא. También podría traducirse «pronunciamiento» o, de forma más formal, «esta carga fue». La opción tradicional «carga» es más literal, pero menos clara para el lector actual.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּשְׁנַת
  english_pob_choice: In the year of
  chosen_spanish: En el año de
  alternatives_spanish:
  - Durante el año de
  - En el año cuando
  lexicon: HALOT
  rationale: La construcción temporal hebrea introduce la fecha del oráculo. «En el año de» conserva la relación constructa y suena natural en español.
- source_word: מוֹת
  english_pob_choice: the death of
  chosen_spanish: la muerte de
  alternatives_spanish:
  - el morir de
  - el fallecimiento de
  lexicon: HALOT
  rationale: El sustantivo en constructo expresa la muerte como evento puntual, no el proceso de morir. «La muerte de» es directo y fiel.
- source_word: הַמֶּלֶךְ
  english_pob_choice: King
  chosen_spanish: el rey
  alternatives_spanish:
  - rey
  lexicon: HALOT
  rationale: Aunque el hebreo lleva artículo, en español es natural conservarlo en una frase de datación. «El rey Acaz» mantiene el sentido del título sin forzar el idioma.
- source_word: אָחָז
  english_pob_choice: Ahaz
  chosen_spanish: Acaz
  alternatives_spanish:
  - Ahaz
  lexicon: convención onomástica bíblica
  rationale: Se usa la forma bíblica española tradicional «Acaz», que es reconocible para lectores de la Biblia en español.
- source_word: הָיָה
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - fue
  - ocurrió
  - se dio
  lexicon: HALOT
  rationale: El verbo hebreo «ser/estar» funciona aquí como fórmula introductoria del mensaje. En español, «vino» reproduce bien la idea de que el oráculo llegó o se dio a conocer.
- source_word: הַמַּשָּׂא
  english_pob_choice: oracle
  chosen_spanish: oráculo
  alternatives_spanish:
  - pronunciamiento
  - carga
  lexicon: HALOT
  rationale: En superscripciones proféticas, מַשָּׂא designa una declaración profética solemne. «Oráculo» comunica esa fuerza mejor que «carga» en español moderno.
- source_word: הַזֶּה
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - el presente
  - el siguiente
  lexicon: HALOT
  rationale: El demostrativo señala la profecía concreta que sigue. «Este» preserva la referencia deíctica de modo natural en español.
translation_notes:
  revision_awareness: 'El texto coincide sustancialmente con el sentido del hebreo y con el inglés POB auditado: una fórmula temporal + la notificación de la llegada de un oráculo. Se evita una traducción demasiado mecánica de הָיָה y se conserva el matiz profético de מַשָּׂא mediante «oráculo».'
  spanish_consistency_notes:
  - Se mantiene «oráculo» como término profético principal para מַשָּׂא en coherencia con el enfoque POB en inglés.
  - Se usa «Acaz» como forma española estándar del nombre propio.
  - La puntuación con dos puntos es una solución editorial española para introducir la cita/proposición final, equivalente funcionalmente a la coma del inglés POB.
