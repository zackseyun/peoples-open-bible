  - severity: low
    issue: La nota [a] está anclada en un lugar poco preciso.
    rationale: La nota explica la adición aclaratoria «las otras» en la segunda cláusula, por lo que el marcador debe aparecer junto a esa frase, no junto a «cortinas» en la primera.
