translation:
  language: es
  text: y con ellos, setenta hombres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto griego dice «setenta hombres». El paralelo aproximado en Esdras 8:12, en cambio, dice «ciento diez varones», lo que refleja una divergencia entre 1 Esdras y el paralelo hebreo.
    reason: textual_variant
lexical_decisions:
- source_word: μετʼ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: LSJ
  rationale: La preposición μετά con genitivo expresa compañía; en español, «con ellos» reproduce de forma natural y fiel la relación de acompañamiento sin añadir matices innecesarios.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - males
  lexicon: LSJ
  rationale: ἄνδρες designa hombres/varones adultos. «Hombres» es el equivalente más directo y natural en español; conserva el valor masculino explícito que el griego comunica.
- source_word: ἑβδομήκοντα
  english_pob_choice: seventy
  chosen_spanish: setenta
  alternatives_spanish:
  - setenta en número
  lexicon: LSJ
  rationale: El cardinal griego es transparente y se traduce sin modificación como «setenta».
theological_decisions:
- issue: Divergencia textual entre 1 Esdras y el paralelo hebreo de Esdras 8:12
  english_pob_reading: The Greek text reads 'seventy men.' The approximate MT parallel in Ezra 8:12 instead reads 'one hundred and ten males,' reflecting a divergence between 1 Esdras and the Hebrew parallel.
  chosen_spanish_reading: El texto griego dice «setenta hombres»; el paralelo aproximado en Esdras 8:12 lee «ciento diez varones».
  alternative_spanish_readings:
  - «setenta personas»
  - «setenta varones»
  rationale: Se mantiene el número del testigo griego, que es la base primaria de 1 Esdras, y se documenta la discrepancia con el paralelo hebreo para no ocultar la tensión textual.
  doctrine_reference: Crítica textual / relación entre testigos paralelos
translation_notes:
  revision_awareness: El texto griego transmitido para 1 Esdras 8:40 es breve y estable; no se requieren ajustes respecto al audit trail inglés. Se conserva el número griego y se registra la diferencia con el paralelo hebreo.
  spanish_consistency_notes:
  - Se mantuvo «hombres» para ἄνδρες, siguiendo la fuerza masculina explícita del griego.
  - Se evitó «SEÑOR» u otra terminología no pertinente, porque el versículo no contiene vocabulario divino.
  - La puntuación española coloca la coma después de la frase inicial para reflejar el ritmo coordinativo simple del griego.
