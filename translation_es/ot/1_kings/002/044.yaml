translation:
  language: es
  text: 'Entonces el rey dijo a Simei: «Tú sabes todo el mal que tu corazón sabe[a], lo que hiciste contra David mi padre; y Yahvé ha devuelto tu mal sobre tu propia cabeza[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que sabes en tu corazón». El hebreo dice literalmente: «que tu corazón sabe», conservando el énfasis en la conciencia interior de la culpa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ha devuelto» o «ha pagado». El verbo hebreo expresa que el mal de Simei vuelve sobre él como retribución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La construcción con waw consecutiva avanza la narración; «Entonces» mantiene la secuencia discursiva en español sin sonar forzado.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Título definido en el contexto, referido a Salomón; «el rey» es natural y fiel.
- source_word: אַתָּה יָדַעְתָּ
  english_pob_choice: You know
  chosen_spanish: Tú sabes
  alternatives_spanish:
  - Tú mismo sabes
  - Tú has sabido
  lexicon: HALOT
  rationale: El énfasis del pronombre se conserva con «Tú»; el presente «sabes» funciona bien en el discurso directo.
- source_word: כָּל הָרָעָה
  english_pob_choice: all the evil
  chosen_spanish: todo el mal
  alternatives_spanish:
  - toda la maldad
  - todo el daño
  lexicon: HALOT
  rationale: Se mantiene el valor moral de רָעָה. «Mal» conserva la fuerza ética sin sonar tan pesado como «maldad» en este contexto narrativo.
- source_word: אֲשֶׁר יָדַע לְבָבְךָ
  english_pob_choice: that your heart knows
  chosen_spanish: que tu corazón sabe
  alternatives_spanish:
  - que tu corazón conoce
  - de lo cual tu corazón es consciente
  lexicon: HALOT
  rationale: Se preserva el hebraísmo que atribuye conocimiento al corazón, evitando suavizarlo a una mera conciencia interior.
- source_word: אֲשֶׁר עָשִׂיתָ לְדָוִד אָבִי
  english_pob_choice: which you did to David my father
  chosen_spanish: lo que hiciste a David mi padre
  alternatives_spanish:
  - lo que cometiste contra David mi padre
  - lo que hiciste contra David mi padre
  lexicon: HALOT
  rationale: «Hiciste a» reproduce bien la relación directa del acto; «cometiste contra» explicita más el daño, pero añade interpretación.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre propio divino en lugar de una sustitución titular.'
- source_word: וְהֵשִׁיב
  english_pob_choice: has returned
  chosen_spanish: ha devuelto
  alternatives_spanish:
  - ha retornado
  - ha repuesto
  lexicon: HALOT
  rationale: El hiphil de שוב expresa hacer volver/traer de vuelta el mal sobre el culpable. «Ha devuelto» es un equivalente natural y cercano al valor de retribución.
- source_word: אֶת רָעָתְךָ
  english_pob_choice: your evil
  chosen_spanish: tu mal
  alternatives_spanish:
  - tu maldad
  - tu wrongdoing
  lexicon: HALOT
  rationale: Se mantiene la repetición de רָעָה con el mismo sustantivo básico «mal», preservando la correspondencia entre la acción y su retorno.
- source_word: בְּרֹאשֶׁךָ
  english_pob_choice: on your own head
  chosen_spanish: sobre tu propia cabeza
  alternatives_spanish:
  - sobre tu cabeza
  - en tu propia cabeza
  lexicon: HALOT
  rationale: Se conserva el modismo de retribución que recae sobre el culpable; «propia» refuerza la personalización del juicio.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español del proyecto se adopta «Yahvé» como forma principal, manteniendo el nombre personal de Dios y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Agencia de la retribución divina
  english_pob_reading: Yahweh has returned your evil on your own head
  chosen_spanish_reading: Yahvé ha devuelto tu mal sobre tu propia cabeza
  alternative_spanish_readings:
  - Yahvé ha repagado tu mal sobre tu propia cabeza
  - Yahvé ha hecho volver tu mal sobre tu propia cabeza
  rationale: La frase atribuye explícitamente a Yahvé la retribución. «Ha devuelto» mantiene esa agencia divina sin suavizarla ni expandirla doctrinalmente.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Idiomatismo del corazón que ‘sabe’
  english_pob_reading: that your heart knows
  chosen_spanish_reading: que tu corazón sabe
  alternative_spanish_readings:
  - que tu corazón conoce
  - que sabes en tu corazón
  rationale: Se preserva la tensión literaria del hebreo, donde el corazón es el sujeto del conocimiento; esto evita una paráfrasis que borre el antropomorfismo interno del original.
  doctrine_reference: 'DOCTRINE.md: lexical fidelity and preserved tensions'
translation_notes:
  revision_awareness: La traducción inglesa auditada pasó de «has brought back» a «has returned» en la revisión más reciente; por eso se eligió en español «ha devuelto», que conserva el sentido de retorno/retribución y suena natural en registro bíblico. También se mantuvo la lectura auditada de la retribución divina sin diluirla en formulaciones más generales.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente con el estándar del proyecto para יְהוָה.
  - Se conserva la repetición de «mal» para reflejar la repetición de רָעָה en el hebreo.
  - Se mantiene la metáfora de la cabeza como lugar de retribución, con una formulación natural en español.
  - El nombre «Simei» se translitera conforme al uso español habitual en narrativas bíblicas, sin adaptar a formas castellanas tradicionales más alejadas del hebreo.
