translation:
  language: es
  text: 'Y Lea dijo[a]: «¡Buena fortuna!». Así llamó su nombre Gad.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo בגד es difícil. Puede entenderse como una exclamación que significa «¡Buena fortuna!»; tradicionalmente, algunos lo traducen «¡Tropa!». El nombre Gad suena como la palabra hebrea implicada en el juego de palabras.
    reason: alternative_reading
lexical_decisions:
- source_word: וַתֹּאמֶר
  english_pob_choice: And Leah said
  chosen_spanish: Y Lea dijo
  alternatives_spanish:
  - Entonces Lea dijo
  - Así dijo Lea
  lexicon: HALOT
  rationale: El wayyiqtol introduce la siguiente acción narrativa; «Y ... dijo» conserva la secuencia hebrea sin sobrecargarla con matiz discursivo adicional.
- source_word: לֵאָה
  english_pob_choice: Leah
  chosen_spanish: Lea
  alternatives_spanish:
  - Leah
  lexicon: Convención onomástica española
  rationale: En español bíblico la forma usual y más natural es «Lea», manteniendo el nombre propio de modo reconocible para lectores de habla hispana.
- source_word: בגד
  english_pob_choice: Good fortune!
  chosen_spanish: ¡Buena fortuna!
  alternatives_spanish:
  - ¡Fortuna favorable!
  - ¡A la fortuna!
  - ¡Tropa!
  lexicon: HALOT
  rationale: El hebreo es un crux y funciona como exclamación relacionada con el juego de palabras con Gad. «¡Buena fortuna!» conserva el sentido de exclamación positiva y la tensión interpretativa, sin cerrar indebidamente la alternativa tradicional «¡Tropa!».
- source_word: וַתִּקְרָא
  english_pob_choice: So she called
  chosen_spanish: Así llamó
  alternatives_spanish:
  - Y llamó
  - Entonces llamó
  - Así nombró
  lexicon: HALOT
  rationale: En contexto de nombrar, קרא puede expresarse de manera natural como «llamar»; «Así llamó» reproduce el resultado narrativo del exclamativo anterior al acto de nombrar.
- source_word: אֶת שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: a su hijo
  alternatives_spanish:
  - su nombre
  - a él
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su nombre», pero el contexto inmediato muestra que el nombre se da al hijo. En español, «llamó a su hijo Gad» evita una repetición forzada y comunica el acto de nombrar con claridad.
- source_word: גָּד
  english_pob_choice: Gad
  chosen_spanish: Gad
  lexicon: Convención onomástica
  rationale: Se translitera el nombre propio estándar. Además, conserva el sonido que participa en el juego de palabras con בגד.
theological_decisions:
- issue: Tratamiento del crux בגד y su efecto en la lectura del nombre
  english_pob_reading: The Hebrew is difficult; it may be understood as an exclamation meaning “Good fortune!”; traditionally, some render it “A troop!”
  chosen_spanish_reading: 'Se mantiene una exclamación positiva: «¡Buena fortuna!», sin eliminar la lectura tradicional alternativa.'
  alternative_spanish_readings:
  - «¡Tropa!»
  - «¡Fortuna!»
  rationale: El texto no exige resolver definitivamente el crux. La traducción española debe preservar la ambigüedad documentada por la POB inglesa y el juego de palabras con el nombre Gad, evitando una solución demasiado cerrada.
  doctrine_reference: Principio de fidelidad al texto y preservación de ambigüedad legítima en lugares textualmente difíciles
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado revisado más reciente del inglés POB, que no registró cambios sustantivos. Se conservó la decisión principal de leer בגד como una exclamación afín a «buena fortuna», manteniendo la alternativa tradicional en nota.
  spanish_consistency_notes:
  - Se usa «Lea» como forma española habitual del nombre לֵאָה.
  - Se mantiene «Gad» como transliteración estable del nombre propio.
  - La exclamación española evita una paráfrasis explicativa en el cuerpo del texto y reserva la tensión del crux para la nota.
  - Se prefiere «llamó a su hijo Gad» para una fluidez natural en español, sin perder el valor de nombrar presente en el hebreo.
