  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: petición a Dios para que oiga la oración y la súplica del pueblo y actúe judicialmente a su favor. Sin embargo, «desde los cielos» se aparta innecesariamente de la decisión auditada «from heaven» y suena menos natural en español en esta fórmula de oración. Además, «mantén su causa» es comprensible, pero resulta algo calcado y menos idiomático que una formulación española que conserve el sentido forense.'
  spanish_quality_summary: El español es claro y digno, pero «desde los cielos» suena más rígido que «desde el cielo» en registro bíblico natural. «Mantén su causa» no es incorrecto, pero en español eclesial general «defiende su causa» o «hazles justicia» comunican mejor el valor judicial. Conviene una pequeña reparación para mejorar naturalidad sin perder fidelidad.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La principal cuestión es estilístico-lexical: preferir «cielo» por idiomaticidad en esta fórmula, en línea con la auditoría inglesa, y ajustar la expresión de מִשְׁפָּטָם a un español más natural manteniendo el matiz forense.'
  issues:
  - severity: medium
    issue: «desde los cielos»
    rationale: Aunque reproduce el plural formal hebreo, la auditoría inglesa justificó el singular idiomático («from heaven»). En español bíblico natural, «desde el cielo» es más fiel al sentido y más legible que «desde los cielos» en este contexto.
  - severity: medium
    issue: «mantén su causa»
    rationale: Preserva de manera literalizante la elección inglesa revisada, pero en español suena poco idiomático. El hebreo «haz su justicia/juicio» pide acción judicial a favor del pueblo; «defiende su causa» expresa bien ese valor forense-relacional sin sonar forzado.
  - severity: low
    issue: Nota de «súplica» podría reflejar mejor la alternativa principal inglesa
    rationale: La nota actual es buena, pero puede alinearse mejor con la auditoría al incluir «ruego por favor» o explicar que también puede traducirse «petición de favor», manteniendo el matiz de misericordia/favor.
