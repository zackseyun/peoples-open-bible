translation:
  language: es
  text: Puso la fuente[a] entre la tienda de reunión y el altar, y puso allí agua para lavarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo כִּיּוֹר se refiere a un recipiente de lavado; «fuente» se usa aquí por claridad en español moderno. Algunas versiones tradicionales emplean «lavacro».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֶׂם
  english_pob_choice: He placed
  chosen_spanish: Puso
  alternatives_spanish:
  - Colocó
  - Puso en su lugar
  lexicon: HALOT
  rationale: שׂוּם expresa poner o colocar algo en una posición determinada. «Puso» es natural en español y mantiene la acción concreta de situar el objeto.
- source_word: הַכִּיֹּר
  english_pob_choice: the basin
  chosen_spanish: la pila
  alternatives_spanish:
  - el lavabo
  - la fuente
  lexicon: HALOT
  rationale: כִּיּוֹר designa el recipiente para lavarse en el servicio del tabernáculo. En español bíblico contemporáneo, «pila» comunica bien la función de lavado sin recurrir a «laver», que sería poco natural.
- source_word: בֵּין אֹהֶל מוֹעֵד וּבֵין הַמִּזְבֵּחַ
  english_pob_choice: between the tent of meeting and the altar
  chosen_spanish: entre la tienda de reunión y el altar
  alternatives_spanish:
  - entre el tabernáculo de reunión y el altar
  - entre la tienda del encuentro y el altar
  lexicon: HALOT
  rationale: אֹהֶל מוֹעֵד se traduce de forma directa como «tienda de reunión», que es claro y fiel. Se mantiene el paralelismo de בין...ובין con «entre... y...».
- source_word: וַיִּתֵּן
  english_pob_choice: and put
  chosen_spanish: y puso
  alternatives_spanish:
  - y colocó
  - y dejó
  lexicon: HALOT
  rationale: נָתַן aquí significa poner o colocar. «Puso» conserva la sencillez y corresponde bien al uso del verbo en contexto.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: El adverbio indica ubicación. «Allí» es la opción más natural en español y refleja el valor locativo sin explicitar de más.
- source_word: לְרָחְצָה
  english_pob_choice: for washing
  chosen_spanish: para lavar
  alternatives_spanish:
  - para el lavado
  - para lavarse
  lexicon: HALOT
  rationale: El infinitivo constructo de רָחַץ expresa finalidad. «Para lavar» preserva la apertura del hebreo sin añadir un sujeto explícito que el texto no menciona.
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el texto hebreo y con la auditoría inglesa. No se detectaron revisiones aplicadas ni cambios necesarios en la decisión léxica principal.
  spanish_consistency_notes:
  - Se conserva «tienda de reunión» para אֹהֶל מוֹעֵד, en coherencia con el resto del proyecto.
  - Se evita introducir «SEÑOR» u otras equivalencias no presentes en el versículo.
  - «Pila» mantiene el sentido funcional del objeto sin volverlo arcaico.
  - La finalidad se expresa con una construcción simple («para lavar») que no fuerza un sujeto inexistente en el hebreo.
