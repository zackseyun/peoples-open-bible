translation:
  language: es
  text: 'Y seis brazos salían de sus lados: tres brazos del candelabro de uno de sus lados[b][a], y tres brazos del candelabro del segundo lado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se proyectaban desde sus lados»; el participio hebreo describe los seis brazos como saliendo hacia afuera del candelabro.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «de uno de sus lados ... del segundo lado»; en español también puede expresarse como «de un lado ... del otro lado».
    reason: lexical_alternative
lexical_decisions:
- source_word: קָנִים / קְנֵי
  english_pob_choice: branches
  chosen_spanish: brazos
  alternatives_spanish:
  - ramas
  - varas
  lexicon: HALOT
  rationale: En el contexto del candelabro del tabernáculo, קנה designa elementos proyectados desde el eje central. En español, 'brazos' comunica bien la estructura del objeto y mantiene la imagen de piezas que salen lateralmente. 'Ramas' es posible, pero puede sonar más botánico; 'varas' es menos natural aquí.
- source_word: יֹצְאִים
  english_pob_choice: were coming out
  chosen_spanish: salían
  alternatives_spanish:
  - estaban saliendo
  - proyectaban
  - se extendían
  lexicon: HALOT
  rationale: El participio expresa salida/proyección continua. 'Salían' conserva el valor verbal descriptivo sin volver la frase demasiado técnica ni estática.
- source_word: מִצִּדֶּיהָ / מִצִּדָּהּ
  english_pob_choice: from its sides / from its ... side
  chosen_spanish: de sus lados / de su un lado ... de su segundo lado
  alternatives_spanish:
  - de sus costados
  - desde sus lados
  - de su otro lado
  lexicon: HALOT
  rationale: צד es 'lado'. Opto por 'lados' porque mantiene la relación espacial clara y permite reflejar el paralelismo del hebreo. La formulación 'su un lado' conserva la correspondencia con 'the one side', aunque suena algo más marcada en español; se usa para sostener la estructura del original.
- source_word: מְנֹרָה
  english_pob_choice: lampstand
  chosen_spanish: candelabro
  alternatives_spanish:
  - lampadario
  - menorá
  lexicon: HALOT
  rationale: El objeto del tabernáculo se entiende naturalmente en español como 'candelabro'. 'Menorá' es transliteración posible, pero el proyecto prioriza traducir sustantivos comunes cuando el equivalente es claro. 'Lampadario' no es el término normal en español bíblico.
- source_word: הָאֶחָד
  english_pob_choice: its one side
  chosen_spanish: su un lado
  alternatives_spanish:
  - su primer lado
  - el lado uno
  - de un lado
  lexicon: HALOT
  rationale: El hebreo usa el artículo con 'uno' en contraste con 'el segundo'. 'Su un lado' busca preservar esa estructura distributiva, aunque en español estándar pueda sentirse menos idiomático. No se reduce a 'de un lado' para no perder el paralelismo explícito con 'el segundo'.
- source_word: הַשֵּׁנִי
  english_pob_choice: its second side
  chosen_spanish: su segundo lado
  alternatives_spanish:
  - el otro lado
  - el segundo lado
  lexicon: HALOT
  rationale: שני significa literalmente 'segundo'. 'Segundo lado' conserva la correspondencia formal y la simetría del hebreo. 'El otro lado' sería más idiomático, pero borra el matiz ordinal presente en el texto.
translation_notes:
  revision_awareness: Se siguió de cerca el trazado léxico del inglés POB y del hebreo, manteniendo la estructura paralela de los dos lados del candelabro. No se detectaron cambios sustantivos respecto al pase de revisión más reciente; la principal atención fue ajustar el español para conservar el participio descriptivo y el contraste ordinal del original.
  spanish_consistency_notes:
  - Se mantuvo 'candelabro' para מְנֹרָה, en línea con la preferencia del proyecto por traducir nombres comunes.
  - Se eligió 'brazos' para קָנִים porque en español describe con naturalidad las piezas laterales del candelabro.
  - El contraste 'un lado / segundo lado' intenta reflejar el hebreo sin sustituirlo por 'otro lado', que sería más idiomático pero menos formalmente cercano.
