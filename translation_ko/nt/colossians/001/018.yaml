id: COL.1.18
reference: Colossians 1:18
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ αὐτός ἐστιν ἡ κεφαλὴ τοῦ σώματος τῆς ἐκκλησίας· ὅς ⸀ἐστιν ἀρχή, πρωτότοκος ἐκ τῶν νεκρῶν, ἵνα γένηται ἐν πᾶσιν αὐτὸς πρωτεύων,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/018.yaml
  text: And he is the head of the body, the church; he is the beginning, the firstborn from the dead, so that he himself might become preeminent in all things,
translation:
  language: ko
  text: 그분은 몸의 머리시니, 곧 교회[a]입니다. 그분은 시작[b]이시며, 죽은 자들 가운데서 먼저 나신 분이십니다. 이는 그분 자신이 만물에서 으뜸이 되시기 위함입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἐκκλησία는 일반적으로 「회중」으로 옮기나, 본 절은 그리스도의 몸 전체를 가리키는 보편적·제도적 무게가 살아 있어 한국 교회의 정립된 「교회」를 사용한다.
    reason: lexical_alternative
  - marker: b
    text: 또는 「근원」, 「통치자」. 헬라어 ἀρχή는 시작·근원·통치를 함께 담을 수 있다.
    reason: lexical_alternative
lexical_decisions:
- source_word: κεφαλή
  english_pob_choice: head
  chosen_korean: 머리
  alternatives_korean:
  - 으뜸
  - 근원
  lexicon: BDAG
  rationale: 「머리」는 헬라어 은유를 그대로 보존한다. 「권위」 또는 「근원」의 한쪽으로 좁히지 않는다.
- source_word: σώματος
  english_pob_choice: body
  chosen_korean: 몸
  alternatives_korean: []
  lexicon: BDAG
  rationale: 머리-몸 은유의 표준 등가어.
- source_word: ἐκκλησίας
  english_pob_choice: church
  chosen_korean: 교회
  alternatives_korean:
  - 회중
  lexicon: BDAG
  rationale: 본 절의 ἐκκλησία는 그리스도의 몸으로서 보편적·제도적 무게가 있으며, 「교회」가 가장 자연스러운 한국어 등가어이다. 글로사리 기본 「회중」 대신 본 문맥의 institutional force를 보존하기 위한 carve-out이다.
- source_word: ἀρχή
  english_pob_choice: beginning
  chosen_korean: 시작
  alternatives_korean:
  - 근원
  - 통치자
  lexicon: BDAG
  rationale: 동격적 「죽은 자들 가운데서 먼저 나신 분」과 결합되어 부활 질서의 「시작」으로 가장 잘 읽힌다.
- source_word: πρωτότοκος ἐκ τῶν νεκρῶν
  english_pob_choice: firstborn from the dead
  chosen_korean: 죽은 자들 가운데서 먼저 나신 분
  alternatives_korean:
  - 죽은 자들 가운데서 첫 열매
  - 죽은 자들 중에서 처음 나신 분
  lexicon: BDAG
  rationale: 1:15과 어휘적 일관성을 위해 「먼저 나신 분」을 사용한다. 부활-우위 언어로서, 다음 분사 「으뜸이 되시기 위함」이 그 의미를 명시한다.
- source_word: ἵνα γένηται
  english_pob_choice: so that he himself might become
  chosen_korean: 이는 그분 자신이 ... 되시기 위함입니다
  alternatives_korean:
  - 그리하여 그분이 ... 되시도록
  lexicon: BDAG
  rationale: ἵνα 목적절을 한국어 「이는 ~ 위함입니다」로 옮긴다. γίνομαι의 동적 「되심」을 보존한다.
- source_word: ἐν πᾶσιν
  english_pob_choice: in all things
  chosen_korean: 만물에서
  alternatives_korean:
  - 모든 것에서
  - 모든 일에서
  lexicon: BDAG
  rationale: 16-17절의 「만물」과 어휘적 일관성.
- source_word: πρωτεύων
  english_pob_choice: preeminent
  chosen_korean: 으뜸이 되시기
  alternatives_korean:
  - 우두머리가 되시기
  - 첫째가 되시기
  lexicon: BDAG
  rationale: 「으뜸」은 「첫 자리·우위」를 한국어로 가장 간결하게 담는다.
theological_decisions:
- issue: κεφαλή 은유의 의미
  chosen_reading: 머리(은유 유지)
  alternative_readings:
  - 권위로서의 머리
  - 근원으로서의 머리
  rationale: 본 절은 풍부한 은유를 사용하며, 본 번역은 「권위」 또는 「근원」 어느 한쪽으로 좁히지 않고 「머리」 그대로 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: πρωτότοκος ἐκ τῶν νεκρῶν의 의미
  chosen_reading: 부활-우위로서의 「먼저 나신 분」
  alternative_readings:
  - 죽은 자들에서 첫 부활하신 분
  rationale: 본 절은 그리스도의 부활에서의 우위(피조성이 아님)를 가리킨다. 「먼저 나신 분」을 보존하고 다음 절이 그 우위를 명시하도록 둔다.
  doctrine_reference: 'DOCTRINE.md: Nicene affirmation; Preserve lexical form unless context demands otherwise'
- issue: ἐκκλησίας를 「교회」로 옮김(글로사리 기본 「회중」의 carve-out)
  chosen_reading: 교회
  alternative_readings:
  - 회중
  rationale: 본 절의 ἐκκλησία는 그리스도의 몸 전체를 가리키는 보편적·제도적 무게가 있으므로, 글로사리의 carve-out에 따라 「교회」를 사용한다.
  doctrine_reference: 'KOREAN_PIPELINE.md: ἐκκλησία glossary carve-out for institutional force'
