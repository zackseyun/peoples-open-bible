translation:
  language: es
  text: Mejor es ir a una casa de duelo que ir a una casa de banquete[a], porque ese es el fin de toda persona, y los que viven deben tomarlo a pecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el fin de toda la humanidad». Hebreo «אָדָם» se usa aquí de manera genérica para la humanidad.'
    reason: alternative_reading
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: It is better
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Más vale
  lexicon: HALOT
  rationale: El hebreo expresa un juicio comparativo de sabiduría; en español, «Mejor es» reproduce con naturalidad la forma proverbial y mantiene el valor evaluativo sin añadir más contenido que el texto.
- source_word: לָלֶכֶת / מִלֶּכֶת
  english_pob_choice: to go ... than to go
  chosen_spanish: ir ... que ir
  alternatives_spanish:
  - andar ... que andar
  - caminar ... que caminar
  lexicon: HALOT
  rationale: En este contexto de acudir a lugares, «ir» es el equivalente natural de הלך y evita una carga innecesaria de ‘caminar’, que en español sonaría menos idiomática.
- source_word: בֵּית אֵבֶל
  english_pob_choice: a house of mourning
  chosen_spanish: una casa de duelo
  alternatives_spanish:
  - una casa de luto
  - la casa del duelo
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «casa de duelo». En español, «casa de duelo» conserva el sustantivo abstracto y el contraste con el siguiente miembro; «luto» sería posible, pero «duelo» resulta más directo y natural aquí.
- source_word: בֵּית מִשְׁתֶּה
  english_pob_choice: a house of feasting
  chosen_spanish: una casa de banquete
  alternatives_spanish:
  - una casa de fiesta
  - una casa de celebración
  - una casa de festín
  lexicon: HALOT
  rationale: מִשְׁתֶּה designa un banquete o festín. «Banquete» mantiene bien el contraste con «duelo» y evita ampliar el sentido a una celebración genérica.
- source_word: בַּאֲשֶׁר
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: HALOT
  rationale: La partícula introduce la razón de la comparación. «Porque» expresa con claridad el valor causal en español contemporáneo.
- source_word: סוֹף כָּל הָאָדָם
  english_pob_choice: the end of every person
  chosen_spanish: el fin de toda persona
  alternatives_spanish:
  - el fin de todo ser humano
  - el fin de cada persona
  - el fin de todo hombre
  lexicon: HALOT
  rationale: El hebreo usa אָדָם en sentido genérico para la humanidad. Siguiendo la revisión inglesa hacia «every person», «toda persona» evita ambigüedad de género en español sin perder la fuerza universal del enunciado.
- source_word: וְהַחַי
  english_pob_choice: and the living
  chosen_spanish: y el que vive
  alternatives_spanish:
  - y los vivos
  - y quien vive
  lexicon: HALOT
  rationale: El colectivo hebreo funciona de modo genérico. «El que vive» conserva la referencia a la persona viva en forma natural para enlazar con el mandato siguiente.
- source_word: יִתֵּן אֶל לִבּוֹ
  english_pob_choice: should take it to heart
  chosen_spanish: debe ponerlo en su corazón
  alternatives_spanish:
  - debe tomarlo a pecho
  - debe considerarlo seriamente
  - debe hacerlo llegar a su corazón
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘dar a su corazón’, una idiomática exhortación a reflexionar seriamente. «Ponerlo en su corazón» preserva la imagen interna; «debe» comunica bien el valor exhortativo de sabiduría.
theological_decisions:
- issue: Áָדָם como referencia genérica a la humanidad
  english_pob_reading: the end of every person
  chosen_spanish_reading: el fin de toda persona
  alternative_spanish_readings:
  - el fin de todo ser humano
  - el fin de todo hombre
  rationale: El texto habla de la mortalidad universal, no de una clase masculina exclusiva. «Toda persona» preserva la universalidad y evita forzar un masculino genérico que en español podría sonar excluyente.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy 4; Contested terms: אָדָם *adam*'
- issue: Valor exhortativo de יִתֵּן אֶל לִבּוֹ
  english_pob_reading: the living should take it to heart
  chosen_spanish_reading: y el que vive debe ponerlo en su corazón
  alternative_spanish_readings:
  - y el que vive debería tomarlo a pecho
  - y el que vive ha de considerarlo
  rationale: La frase no es mera predicción, sino una llamada sapiencial a la reflexión. «Debe» reproduce ese matiz exhortativo sin convertirlo en un imperativo más duro que el hebreo.
  doctrine_reference: Sabiduría proverbial; cf. contexto de exhortación reflexiva en Eclesiastés
translation_notes:
  revision_awareness: El inglés POB fue revisado desde «every man» a «every person» para reflejar con mayor naturalidad la referencia genérica a la humanidad. La versión española sigue esa revisión y la hace explícita con «toda persona», manteniendo el contraste poético entre duelo y banquete y la exhortación sapiencial final.
  spanish_consistency_notes:
  - Se emplea «Dios»/«Yahvé» según corresponda; aquí no aparece el tetragrámaton.
  - Se traduce מִשְׁתֶּה con «banquete» por ser el sustantivo español más exacto y sobrio en este paralelismo.
  - «Casa de duelo» conserva la estructura constructa hebrea sin añadir una localización concreta.
  - Se mantiene el tono sapiencial mediante la forma «Mejor es...» y el cierre exhortativo «debe ponerlo en su corazón».
