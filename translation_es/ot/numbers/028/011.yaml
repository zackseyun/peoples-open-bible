translation:
  language: es
  text: 'Al comienzo de sus meses[a], presentarán un holocausto a Yahvé: dos novillos del ganado, un carnero y siete corderos machos de un año, sin defecto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «en las cabezas/comienzos de sus meses»; es decir, en las observancias de luna nueva.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְרָאשֵׁי חָדְשֵׁיכֶם
  english_pob_choice: At the beginnings of your months
  chosen_spanish: En las lunas nuevas de ustedes
  alternatives_spanish:
  - Al comienzo de cada mes
  - En los nuevos meses
  lexicon: HALOT
  rationale: El hebreo es un idiomа calendárico para la observancia mensual de la luna nueva. En español, «lunas nuevas» comunica la institución cultual con naturalidad y mantiene la referencia litúrgica; «al comienzo de cada mes» preserva más la literalidad estructural, pero pierde la señal ritual.
- source_word: תַּקְרִיבוּ
  english_pob_choice: you shall present
  chosen_spanish: presentarán
  alternatives_spanish:
  - ofrecerán
  - acercarán
  lexicon: HALOT
  rationale: En contexto sacrificial, el hiphil de קרב significa traer/presentar una ofrenda ante Dios. «Presentarán» conserva el acto cultual sin forzar un calco rígido.
- source_word: עֹלָה
  english_pob_choice: a burnt offering
  chosen_spanish: un holocausto
  alternatives_spanish:
  - una ofrenda quemada
  - un sacrificio completamente quemado
  lexicon: HALOT
  rationale: En español bíblico «holocausto» es el término establecido para la ofrenda totalmente consumida por fuego; refleja bien la categoría sacrificial del hebreo y es inteligible para lectores eclesiales.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se preserva el nombre divino explícito como «Yahvé», según la norma del proyecto. La preposición ל indica dirección/dedicación de la ofrenda, por lo que «a Yahvé» es la forma más natural en español.
- source_word: פָּרִים בְּנֵי בָקָר
  english_pob_choice: two bulls from the herd
  chosen_spanish: dos novillos de la vacada
  alternatives_spanish:
  - dos toros del ganado
  - dos becerros de la vacada
  lexicon: HALOT
  rationale: La expresión señala bovinos del rebaño/ganado. «Novillos» comunica bien animales bovinos para sacrificio sin sugerir necesariamente una edad específica; «de la vacada» conserva la relación con בקר.
- source_word: וְאַיִל אֶחָד
  english_pob_choice: one ram
  chosen_spanish: un carnero
  alternatives_spanish:
  - un macho ovino
  - un borrego
  lexicon: HALOT
  rationale: אַיִל es el macho adulto de las ovejas; «carnero» es el equivalente español natural y preciso.
- source_word: כְּבָשִׂים בְּנֵי שָׁנָה שִׁבְעָה
  english_pob_choice: seven male lambs a year old
  chosen_spanish: siete corderos machos de un año
  alternatives_spanish:
  - siete corderos de su primer año
  - siete corderos de un año de edad
  lexicon: HALOT
  rationale: La frase hebrea indica corderos en su primer año. «De un año» es una forma clara y fiel; se mantiene «machos» para reflejar el valor léxico de כבשים en este contexto sacrificial.
- source_word: תְּמִימִם
  english_pob_choice: without blemish
  chosen_spanish: sin defecto
  alternatives_spanish:
  - sin mancha
  - sin tacha
  lexicon: HALOT
  rationale: En sacrificios, el adjetivo exige animales íntegros, libres de defecto. «Sin defecto» es preciso y idiomático en español moderno.
theological_decisions:
- issue: Cómo rendir el calendario ritual de רָאשֵׁי חָדְשֵׁיכֶם
  english_pob_reading: At the beginnings of your months
  chosen_spanish_reading: En las lunas nuevas de ustedes
  alternative_spanish_readings:
  - Al comienzo de cada mes
  - En las nuevas lunas de ustedes
  rationale: El hebreo alude a la observancia de la luna nueva, no solo al inicio civil del mes. La forma elegida hace visible el trasfondo ritual en español, mientras que la nota conserva la alternativa más literal.
  doctrine_reference: Translation philosophy items 1, 3 y 5
- issue: Cómo tratar el nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La política del proyecto exige reflejar el Tetragrámaton con una forma audible del nombre divino. «Yahvé» es la forma principal en español del POB; se evita el reemplazo por un título impersonal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El expediente inglés muestra alta concordancia y sin revisiones aplicadas; la única tensión relevante fue la expresión temporal calendárica y la forma del nombre divino. La versión española mantiene ambas decisiones de manera auditable y sin suavizar la terminología sacrificial.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal del nombre divino, coherente con la norma del proyecto.
  - Se usó «holocausto» para עֹלָה por ser el término culto y tradicionalmente entendible en español.
  - «Sin defecto» conserva la exigencia sacrificial de integridad animal sin añadir matices no presentes en el hebreo.
  - La nota al pie señala la equivalencia interpretativa de «lunas nuevas» con la observancia de la luna nueva.
