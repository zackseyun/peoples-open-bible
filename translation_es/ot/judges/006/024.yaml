translation:
  language: es
  text: Entonces Gedeón edificó allí un altar a Yahvé y lo llamó[a] «Yahvé es paz». Ese altar permanece allí hasta hoy, en Ofra de los abiezeritas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «YHWH shalom»; tradicionalmente transliterado «Yahvé-shalom».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבֶן
  english_pob_choice: built
  chosen_spanish: edificó
  alternatives_spanish:
  - construyó
  - levantó
  lexicon: HALOT
  rationale: En contexto narrativo y cultual, בנה se refiere a la acción de erigir un altar. «Edificó» conserva el sentido de construcción formal y suena natural en español bíblico contemporáneo.
- source_word: מִזְבֵּחַ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - ara
  - altares
  lexicon: HALOT
  rationale: Es el término cultual normal y no hay razón contextual para variarlo.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahweh
  lexicon: HALOT
  rationale: 'La preposición ל indica dirección/dedicación: el altar se erige en relación con Yahvé. Se mantiene el nombre divino conforme a la terminología POB en español.'
- source_word: וַיִּקְרָא ל֥וֹ
  english_pob_choice: called it
  chosen_spanish: lo llamó
  alternatives_spanish:
  - le puso por nombre
  - lo nombró
  lexicon: HALOT
  rationale: En contextos de nombramiento, קרא + ל puede significar «llamar/nombrar». «Lo llamó» es el equivalente natural en español y mantiene el acto de asignar nombre al altar.
- source_word: יְהוָה שָׁלוֹם
  english_pob_choice: Yahweh Is Peace
  chosen_spanish: Yahvé es paz
  alternatives_spanish:
  - Yahvé paz
  - Yahvé-shalom
  - Yahvé es bienestar
  lexicon: HALOT
  rationale: Se traduce el nombre memorial en vez de transliterarlo, para preservar el significado. En español, la cópula implícita del hebreo nominal se expresa con «es» para que el nombre sea claro y natural.
- source_word: שָׁלוֹם
  english_pob_choice: Peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - plenitud
  - integridad
  lexicon: HALOT
  rationale: «Paz» es la opción breve y natural en una fórmula nominal. Las resonancias de bienestar o plenitud existen, pero serían demasiado expansivas para el texto principal.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: Hasta hoy
  alternatives_spanish:
  - Hasta el día de hoy
  - hasta este día
  lexicon: HALOT
  rationale: Expresión idiomática española estándar para indicar continuidad hasta el presente narrativo.
- source_word: עוֹדֶנּוּ
  english_pob_choice: It remains there
  chosen_spanish: permanece
  alternatives_spanish:
  - todavía está allí
  - sigue allí
  lexicon: HALOT
  rationale: El matiz de permanencia/persistencia se conserva con un verbo natural y conciso en español.
- source_word: בְּעָפְרָת
  english_pob_choice: in Ophrah
  chosen_spanish: en Ofra
  alternatives_spanish:
  - en Ophrah
  lexicon: HALOT
  rationale: Nombre propio geográfico transliterado de forma estándar al español.
- source_word: אֲבִי הָעֶזְרִי
  english_pob_choice: of the Abiezrites
  chosen_spanish: de los abiezeritas
  alternatives_spanish:
  - de los abiezeríes
  - del clan de Abiezer
  lexicon: HALOT
  rationale: Se mantiene el valor gentilicio/clánico del hebreo con una forma española transparente y reconocible; «de los abiezeritas» comunica pertenencia territorial o de linaje sin sobreexplicar.
theological_decisions:
- issue: Rendering the divine name יְהוָה in the dedication phrase and altar name
  english_pob_reading: Yahweh / Yahweh Is Peace
  chosen_spanish_reading: Yahvé / Yahvé es paz
  alternative_spanish_readings:
  - el SEÑOR / el SEÑOR es paz
  - Yahweh / Yahweh es paz
  - Yahvé-shalom
  rationale: El hebreo usa el Tetragrámaton directamente; por la convención POB en español, se conserva «Yahvé» en lugar de ocultarlo con una mayúscula funcional. La fórmula nominal del altar se vierte con una cópula explícita para reflejar el nombre memorial de manera inteligible.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El contexto inglés auditado ya había resuelto la equivalencia óptima sin cambios en la revisión más reciente; la versión española sigue esa misma línea, manteniendo el nombre divino explícito y la fórmula memorial traducida, sin añadir expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se mantiene «altar» como término cultual estándar.
  - La fórmula nominal se traduce con «es paz» para evitar transliteración innecesaria y conservar inteligibilidad.
  - «Ofra» y «abiezeritas» siguen la adaptación española coherente con nombres propios y gentilicios bíblicos.
