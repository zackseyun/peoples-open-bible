revisions:
- from: Ahora, por favor, quédense aquí esta noche[a], ustedes también, para que yo sepa qué más hablará Yahvé conmigo.
  to: Ahora, por favor, quédense aquí esta noche[a], ustedes también, para que yo sepa qué más me dirá Yahvé.
  rationale: Se revisa únicamente la cláusula final para alinearla con la decisión del POB de expresar el sentido comunicativo de דַּבֵּר עִמִּי como «decir a / hablar a», no como una conversación mutua. «qué más me dirá Yahvé» es natural en español, fiel al contexto y preserva la idea de revelación adicional. La nota alternativa se ajusta en paralelo.
