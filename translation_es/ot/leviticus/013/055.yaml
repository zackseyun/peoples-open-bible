    rationale: La nota inglesa documenta la alternativa «ha cambiado su color» frente a «ha cambiado su apariencia» para el idiomático «ha cambiado su ojo». El borrador reemplaza eso por una observación sobre el pasivo de «ha sido lavada», perdiendo una decisión léxica significativa.
  - severity: medium
