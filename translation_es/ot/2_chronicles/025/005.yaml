base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/025/005.yaml
  text: Then Amaziah gathered Judah and appointed them by fathers’ houses under commanders of thousands and commanders of hundreds[a], for all Judah and Benjamin. He mustered them from twenty years old and upward, and found them to be three hundred thousand choice men, going out to war[c][b], able to handle spear and shield.
  footnotes:
  - marker: a
    text: Or 'young men' for 'choice men'; the Hebrew בָּחוּר can denote youth, but here likely emphasizes able-bodied/select fighting men in the military census.
    reason: lexical_alternative
  - marker: b
    text: Literally 'going out to war,' a Hebrew idiom for those eligible or ready for military service.
    reason: lexical_alternative
  - marker: c
    text: The Hebrew צִנָּה refers specifically to a large shield.
    reason: lexical_alternative
