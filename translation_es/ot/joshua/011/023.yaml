  yaml_path: translation/ot/joshua/011/023.yaml
  text: So Joshua took all the land[a], according to all that Yahweh had spoken to Moses, and Joshua gave it to Israel as an inheritance according to their divisions by their tribes[b]. And the land had rest from war.
