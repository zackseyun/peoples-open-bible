translation:
  language: es
  text: como un olivo floreciente, lleno de fruto[a], y como un olivo[b] que riega sus ramas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lleno de frutos»; el raro término hebreo probablemente se refiere aquí al fruto del olivo.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «como un ciprés que se alza entre las nubes» en lugar del hebreo «como un olivo que riega sus ramas». El hebreo literal dice «como un árbol graso/rico», imagen de abundancia vegetal; se sigue aquí el testimonio hebreo de la Geniza de El Cairo como fuente principal donde está conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: כְּזַיִת / ὡς ἐλαία
  english_pob_choice: like an olive tree
  chosen_spanish: como un olivo floreciente
  alternatives_spanish:
  - como un árbol de olivo floreciente
  - como una oliva floreciente
  lexicon: HALOT; LXX ἐλαία
  rationale: El hebreo y el griego apuntan al olivo como árbol, no solo al fruto. En español, «olivo» comunica de forma natural el sentido arbóreo y mantiene el paralelo poético.
- source_word: רַעֲנָן / ἀναθάλλουσα
  english_pob_choice: flourishing
  chosen_spanish: floreciente
  alternatives_spanish:
  - verde
  - lozano
  - frondoso
  lexicon: HALOT; LXX ἀναθάλλουσα
  rationale: La idea es de vitalidad y crecimiento vigoroso; «floreciente» conserva el dinamismo poético sin forzar una referencia literal a flores.
- source_word: מָלֵא גַרְגַּר / καρπούς
  english_pob_choice: full of fruit
  chosen_spanish: lleno de fruto
  alternatives_spanish:
  - cargado de fruto
  - lleno de frutos
  - pleno de fruto
  lexicon: HALOT; LXX καρπούς
  rationale: La expresión hebrea rara apunta a la abundancia del árbol, y el griego explicita «frutos». «Lleno de fruto» sigue la lectura principal y mantiene la imagen agrícola sin sobreinterpretar como «bayas».
- source_word: וּכְעֵץ שָׁמֵן / κυπάρισσος
  english_pob_choice: like an oil tree
  chosen_spanish: como un árbol de aceite
  alternatives_spanish:
  - como un árbol rico
  - como un árbol frondoso
  - como un olivo
  lexicon: HALOT; Hebrew witness primary; Greek divergent
  rationale: El hebreo dice literalmente «árbol graso/rico», que en contexto de vegetación abundante puede entenderse como árbol fértil o aceitoso. Se conserva la literalidad de «árbol de aceite» para no borrar la tensión léxica ni sustituirla por una paráfrasis más interpretativa.
- source_word: מְרַוֶּה עָנָף / ὑψουμένη ἐν νεφέλαις
  english_pob_choice: watering its branches
  chosen_spanish: que riega sus ramas
  alternatives_spanish:
  - que empapa sus ramas
  - que humedece sus ramas
  - alzándose entre las nubes
  lexicon: HALOT; LXX ὑψουμένη ἐν νεφέλαις
  rationale: El hebreo describe al árbol que provee humedad a sus ramas, imagen de vigor y savia; el griego ofrece una tradición alternativa con un ciprés elevado entre nubes. La traducción principal sigue el hebreo y preserva en nota la variante griega.
theological_decisions:
- issue: Variante textual entre el hebreo y el griego
  english_pob_reading: The Hebrew Cairo Geniza witness is followed here as the primary source where extant, with a footnote noting the Greek 'like a cypress rising into the clouds.'
  chosen_spanish_reading: Se sigue el testimonio hebreo donde está conservado, con nota de la variante griega «como un ciprés que se alza entre las nubes».
  alternative_spanish_readings:
  - como un ciprés elevándose en las nubes
  - como un ciprés que sube hasta las nubes
  rationale: 'No se debe ocultar la divergencia: el hebreo presenta un árbol fértil y regado, mientras el griego cambia a un ciprés elevado. La nota permite auditar ambas tradiciones sin mezclar imágenes incompatibles en el texto principal.'
  doctrine_reference: Crítica textual y transmisión de Sirácida
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se prefirió una formulación más literal y natural para גַרְגַּר como «lleno de fruto», y para עֵץ שָׁמֵן se evitó tanto una paráfrasis excesiva como una intensificación innecesaria, conservando la imagen vegetal del hebreo. La variante griega se mantiene separada en nota para no fusionar tradiciones distintas.'
  spanish_consistency_notes:
  - Se mantiene «fruto» en singular colectivo para reflejar el valor genérico del hebreo y del griego.
  - Se conserva el paralelismo poético con dos comparaciones coordinadas por «como».
  - No se introduce «Cristo», «Señor» ni otra terminología no presente en el pasaje.
  - «Árbol de aceite» se deja como traducción literal con potencial ambigüedad auditada, en lugar de sustituirlo por una equivalencia interpretativa.
