  lexicon: Crum
  rationale: Definite article retained per Coptic; theological role as source/first
    principle retained.
- source_word: ⲡⲧⲏⲣϥ̄
  chosen: the All
  alternatives:
  - the entirety
  - the totality
  lexicon: Crum; Layton
  rationale: Standard Gnostic/Valentinian term for the cosmic totality; “All” is a
    conventional technical rendering.
- source_word: ⲧⲁⲅⲁⲡⲏ
  chosen: love
  alternatives:
  - love (agapē)
  lexicon: Greek loan in Coptic
  rationale: Agapē retained as “love”; no need to transliterate; context clearly theological.
- source_word: ⲧⲟⲩⲙⲏⲧⲉ
  chosen: deficiency
  alternatives:
