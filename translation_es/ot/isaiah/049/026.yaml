translation:
  language: es
  text: Haré que quienes te oprimen coman su propia carne, y se embriagarán con su propia sangre como con vino dulce[a]. Entonces toda carne sabrá que yo, Yahvé, soy tu Salvador y tu Redentor, el Poderoso de Jacob.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como con vino nuevo». El hebreo עָסִיס puede referirse a vino dulce o recién prensado/jugo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַאֲכַלְתִּי
  english_pob_choice: I will make ... eat
  chosen_spanish: Haré que ... coman
  alternatives_spanish:
  - Los haré comer
  - Hacer comer
  lexicon: HALOT
  rationale: El causativo del hifil pide en español una construcción causativa natural. «Haré que ... coman» conserva la fuerza de causación sin sonar mecánico.
- source_word: מוֹנַיִךְ
  english_pob_choice: those who oppress you
  chosen_spanish: quienes te oprimen
  alternatives_spanish:
  - tus opresores
  - quienes te maltratan
  lexicon: HALOT
  rationale: La idea es de opresión/maltrato; «quienes te oprimen» es claro y mantiene el tono de juicio del pasaje.
- source_word: בְּשָׂרָם
  english_pob_choice: their own flesh
  chosen_spanish: su propia carne
  alternatives_spanish:
  - su carne
  - la carne de ellos
  lexicon: HALOT
  rationale: «Carne» conserva el valor literal y la dureza de la imagen. «Su propia» explicita el matiz reflexivo del sufijo posesivo.
- source_word: וְכֶעָסִיס
  english_pob_choice: as with sweet wine
  chosen_spanish: como con vino dulce
  alternatives_spanish:
  - como con vino nuevo
  - como con jugo recién exprimido
  lexicon: HALOT
  rationale: עָסִיס puede referirse a vino dulce o recién prensado. «Vino dulce» mantiene la imagen de bebida embriagante en español y sigue la opción inglesa auditada.
- source_word: דָּמָם
  english_pob_choice: their own blood
  chosen_spanish: su propia sangre
  alternatives_spanish:
  - su sangre
  - la sangre de ellos
  lexicon: HALOT
  rationale: Como con «su propia carne», el posesivo se mantiene para hacer explícita la intensificación reflexiva del hebreo.
- source_word: יִשְׁכָּרוּן
  english_pob_choice: they will become drunk
  chosen_spanish: se embriagarán
  alternatives_spanish:
  - se volverán ebrios
  - se beberán hasta embriagarse
  lexicon: HALOT
  rationale: «Embriagarse» es natural en español y preserva la idea de intoxicación sin añadir elementos ajenos al texto.
- source_word: כָל בָּשָׂר
  english_pob_choice: all flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - toda la humanidad
  - todas las personas
  lexicon: HALOT
  rationale: Se conserva el giro idiomático literal, importante en la literatura profética y en su alcance universal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Nombre divino: «Yahvé» en lugar de una sustitución titular.'
- source_word: מוֹשִׁיעֵךְ
  english_pob_choice: your Savior
  chosen_spanish: tu Salvador
  alternatives_spanish:
  - el que te salva
  - tu libertador
  lexicon: HALOT
  rationale: El participio funciona como designación personal y relacional; «Salvador» es conciso y fiel al valor identificador.
- source_word: וְגֹאֲלֵךְ
  english_pob_choice: your Redeemer
  chosen_spanish: tu Redentor
  alternatives_spanish:
  - el que te redime
  - tu rescatador
  lexicon: HALOT
  rationale: «Redentor» preserva el término covenantal/jurídico de גאל, acorde con la decisión inglesa de mantener «Redeemer».
- source_word: אֲבִיר יַעֲקֹב
  english_pob_choice: the Mighty One of Jacob
  chosen_spanish: el Poderoso de Jacob
  alternatives_spanish:
  - el Fuerte de Jacob
  - el Valiente de Jacob
  lexicon: HALOT
  rationale: «Poderoso» transmite la idea de fuerza/mayor poder del título אֲבִיר y suena natural en español; se mantiene «de Jacob» porque el hebreo dice Jacob, no Israel.
theological_decisions:
- issue: Mantener la imagen violenta del juicio sin suavizarla
  english_pob_reading: Retain the cannibalistic and blood-intoxication imagery in direct form
  chosen_spanish_reading: Conservar la imagen de comer carne y beber sangre como figura de juicio
  alternative_spanish_readings:
  - Parafrasear como autodestrucción general de los enemigos
  - Suavizar a una imagen menos chocante
  rationale: El hebreo busca una imagen profética impactante; suavizarla ocultaría la fuerza retórica del anuncio a Sion.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; never paraphrase beyond what the source warrants.'
- issue: Renderizar כָל בָּשָׂר
  english_pob_reading: all flesh
  chosen_spanish_reading: toda carne
  alternative_spanish_readings:
  - todas las personas
  - toda la humanidad
  rationale: La forma literal preserva el registro bíblico y la amplitud universal del enunciado sin resolverla prematuramente.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than resolve it unnecessarily.'
translation_notes:
  revision_awareness: 'Se corrigió el problema anterior: la nota [a] ahora aparece anclada en el texto español exactamente donde corresponde, en «carne[a]». No se añadieron notas sin ancla.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Nombre divino, conforme al criterio del proyecto.
  - Se conservaron los términos relacionales «Salvador» y «Redentor» por su valor identificado en el texto profético.
  - La secuencia «toda carne» preserva el hebraísmo y evita una simplificación interpretativa.
  - La construcción causativa española sigue la fuerza del hifil hebreo sin calcar la sintaxis del inglés.
