translation:
  language: es
  text: 'y si vuelven en sí[a] en la tierra donde fueron llevados cautivos, y se vuelven y te imploran en la tierra de su cautiverio, diciendo: «Hemos pecado, hemos actuado perversamente y hemos actuado impíamente»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «hacen volver esto a su corazón», un modismo que significa reflexionar profundamente o tomarlo a pecho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵשִׁ֨יבוּ אֶל לְבָבָ֔ם
  english_pob_choice: come to their senses
  chosen_spanish: vuelven en sí
  alternatives_spanish:
  - traen de nuevo a su corazón
  - lo toman a pecho
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente un giro idiomático de 'hacer volver al corazón'. En español, 'volver en sí' comunica con naturalidad la idea de recobrar lucidez interior o reconocer la realidad, sin perder el sentido de reflexión profunda que el POB documenta en inglés.
- source_word: בָּאָרֶץ אֲשֶׁר נִשְׁבּוּ שָׁם
  english_pob_choice: in the land where they were taken captive
  chosen_spanish: en la tierra donde fueron llevados cautivos
  alternatives_spanish:
  - en la tierra donde fueron hechos cautivos
  - en la tierra donde fueron exiliados
  lexicon: HALOT
  rationale: נִשְׁבּוּ señala el hecho de ser capturados o llevados cautivos. 'Llevados cautivos' mantiene el valor concreto y evita suavizarlo a un mero exilio, que sería menos preciso en este contexto.
- source_word: וְשָׁבוּ
  english_pob_choice: turn back
  chosen_spanish: vuelven
  alternatives_spanish:
  - regresan
  - se vuelven
  - se arrepienten
  lexicon: HALOT
  rationale: Aquí שׁוּב se despliega en paralelo con el reconocimiento interior, la súplica y la confesión. 'Vuelven' conserva el movimiento semántico de retorno sin cerrar demasiado la tensión entre retorno físico y retorno espiritual que el texto mantiene.
- source_word: וְהִתְחַנְּנוּ אֵלֶיךָ
  english_pob_choice: plead with you
  chosen_spanish: te imploran
  alternatives_spanish:
  - te suplican
  - te ruegan encarecidamente
  - te hacen súplicas
  lexicon: HALOT
  rationale: El hitpael de חנן expresa ruego insistente por favor. 'Te imploran' transmite con dignidad y fuerza esa súplica ferviente en un registro natural para el español bíblico actual.
- source_word: בְּאֶרֶץ שִׁבְיָם
  english_pob_choice: in the land of their captivity
  chosen_spanish: en la tierra de su cautiverio
  alternatives_spanish:
  - en la tierra de su cautividad
  - en la tierra donde están cautivos
  lexicon: HALOT
  rationale: שְׁבִי nombra cautiverio/captividad como condición concreta. 'Cautiverio' conserva el sustantivo abstracto pero plenamente transparente en español, y mantiene la correspondencia con el paralelismo del verso.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: HALOT
  rationale: Marcador quotativo estándar; 'diciendo' funciona de manera directa y estilísticamente sobria en español.
- source_word: חָטָאנוּ
  english_pob_choice: We have sinned
  chosen_spanish: Hemos pecado
  alternatives_spanish:
  - Hemos pecado contra ti
  - Hemos faltado
  lexicon: HALOT
  rationale: Confesión directa y establecida; 'hemos pecado' corresponde con precisión y sin añadir elementos no presentes.
- source_word: הֶעֱוִינוּ
  english_pob_choice: we have acted perversely
  chosen_spanish: hemos actuado perversamente
  alternatives_spanish:
  - hemos cometido iniquidad
  - hemos obrado torcidamente
  lexicon: HALOT
  rationale: El hiphil de עוה tiene la idea de actuar torcido/perverso. 'Actuado perversamente' conserva esa desviación moral de forma clara en español y sigue de cerca la elección auditada del POB.
- source_word: וְרָשָׁעְנוּ
  english_pob_choice: we have acted wickedly
  chosen_spanish: hemos obrado mal
  alternatives_spanish:
  - hemos actuado malvadamente
  - hemos sido impíos
  lexicon: HALOT
  rationale: El verbo de רשע culmina la confesión con la idea de conducta culpable/malvada. 'Obrado mal' es una forma natural y solemne en español; mantiene el tercer escalón de la tríada confesional sin cargarlo con terminología eclesiástica menos transparente.
theological_decisions:
- issue: Tensión entre retorno físico y arrepentimiento interior
  english_pob_reading: Render שׁוּב with 'turn back' rather than the more interpretive 'repent.'
  chosen_spanish_reading: Traducirlo con 'vuelven' y no con 'se arrepienten', para preservar el doble movimiento de regreso y conversión implícito en el contexto.
  alternative_spanish_readings:
  - regresan
  - se arrepienten
  - vuelven de nuevo
  rationale: El contexto combina lucidez interior, retorno y súplica/confesión. 'Se arrepienten' resolvería demasiado pronto la ambigüedad; 'vuelven' deja abierta la tensión teológica que el hebreo mantiene entre retorno espacial y respuesta del corazón.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'El borrador sigue el audit trail inglés sin depender mecánicamente de él: conserva la idiomaticidad hebrea de ''volver al corazón'', la secuencia de cautiverio/retorno/súplica/confesión y la tríada final de culpa con un español natural y reverente. No se registran revisiones posteriores en el contexto auditado.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - '''Cautiverio'' se mantuvo como sustantivo para שִׁבְיָם, coherente con ''llevados cautivos'' y con el paralelismo del verso.'
  - 'La confesión final conserva la progresión verbal: pecado general, desviación moral y conducta malvada.'
