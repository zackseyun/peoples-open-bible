  to: Tensó su arco y me puso como blanco para la flecha[a].
  rationale: Se conserva el texto principal casi intacto porque es fiel y natural en español. Se corrige la nota para reflejar mejor la alternativa auditada en inglés ('He drew/bent his bow... like a target for the arrow') sin introducir una construcción menos fiel ('blanco de la flecha') ni una alternativa demasiado específica como 'diana'.
