translation:
  language: es
  text: Su anchura era de cincuenta codos; y colocó sus torres junto a sus puertas[a], de cien codos de altura, y cimentó su anchura en sesenta codos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego repite πλάτος («anchura») en la última cláusula: «y su anchura la cimentó en sesenta codos». La redacción es algo comprimida; en español se conserva la repetición de «anchura» y la referencia al cimiento, manteniendo la medida de forma clara.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλάτος
  english_pob_choice: width
  chosen_spanish: anchura
  alternatives_spanish:
  - ancho
  - anchura
  lexicon: LSJ
  rationale: πλάτος expresa la dimensión horizontal. «Anchura» conserva ese valor con estilo natural en español y permite mantener la repetición léxica del griego cuando reaparece en la última cláusula.
- source_word: πηχῶν πεντήκοντα
  english_pob_choice: fifty cubits
  chosen_spanish: cincuenta codos
  alternatives_spanish:
  - cincuenta codos de ancho
  lexicon: LSJ
  rationale: Se conserva la unidad antigua «codos» sin convertirla; el griego presenta una medida simple que en español puede quedar igualmente concisa.
- source_word: πύργους
  english_pob_choice: towers
  chosen_spanish: torres
  alternatives_spanish:
  - torretas
  - torres defensivas
  lexicon: LSJ
  rationale: El sentido normal es arquitectónico y defensivo; «torres» es el equivalente español más directo, claro y sobrio.
- source_word: ἔστησεν
  english_pob_choice: set up
  chosen_spanish: colocó
  alternatives_spanish:
  - levantó
  - erigió
  lexicon: LSJ
  rationale: El verbo puede abarcar la instalación o disposición de elementos constructivos. «Colocó» es idiomático en español y evita una rigidez innecesaria sin perder el acto de instalar las torres.
- source_word: ἐπὶ ταῖς πύλαις αὐτῆς
  english_pob_choice: at its gates
  chosen_spanish: en sus puertas
  alternatives_spanish:
  - sobre sus puertas
  - junto a sus puertas
  lexicon: LSJ
  rationale: En este contexto arquitectónico, el dativo con ἐπί permite una ubicación espacial cercana o sobre. «En sus puertas» comunica la relación con naturalidad en español, sin especificar más de lo que el griego exige.
- source_word: πηχῶν ἑκατόν
  english_pob_choice: one hundred cubits high
  chosen_spanish: de cien codos
  alternatives_spanish:
  - altas de cien codos
  - con cien codos de altura
  lexicon: LSJ
  rationale: El griego da la medida después de las torres; en español, «de cien codos» mantiene la concisión y deja implícito que la medida se refiere a la altura, como en el análisis auditado del inglés POB.
- source_word: ἐθεμελίωσεν
  english_pob_choice: founded
  chosen_spanish: cimentó
  alternatives_spanish:
  - fundó
  - echó los cimientos de
  lexicon: LSJ
  rationale: El verbo significa poner fundamento. «Cimentó» conserva el valor edilicio de manera precisa y más concreta que «fundó» en este contexto de construcción.
- source_word: εἰς πήχεις ἑξήκοντα
  english_pob_choice: at sixty cubits
  chosen_spanish: en sesenta codos
  alternatives_spanish:
  - a sesenta codos
  - hasta sesenta codos
  lexicon: LSJ
  rationale: La construcción griega es comprimida y ligada a la fundación. «En sesenta codos» reproduce de modo sobrio la idea de dimensión del cimiento sin añadir una paráfrasis extensa.
translation_notes:
  revision_awareness: Se siguió la lectura final del audit trail inglés, que prefirió mantener el paralelismo entre las dos menciones de πλάτος y resolver la cláusula final de forma más formal y natural. La versión española conserva ese paralelismo con «anchura» y evita la paráfrasis excesiva, a la vez que explicita en nota la compresión del griego.
  spanish_consistency_notes:
  - Se mantuvo «codos» para la unidad de medida, en coherencia con el POB inglés.
  - Se prefirió «anchura» en lugar de «ancho» para reflejar el sustantivo griego πλάτος con registro más nominal y literario.
  - No se introdujo «SEÑOR» ni terminología teológica ajena al pasaje, que es descriptivo y arquitectónico.
