  to: Y cuando establezcamos nuestro reino[a], te honraremos a ti, a tu nación y al santuario con gran gloria[b][c], de modo que tu gloria llegue a ser evidente en toda la tierra.
  rationale: Se ajusta 'vuestra gloria' a 'tu gloria' para mantener coherencia pronominal con el resto de la carta en español, sin perder el sentido del original. El resto del texto y las notas pueden conservarse tal como están, pues reflejan adecuadamente el griego y el audit trail inglés.
