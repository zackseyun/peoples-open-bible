translation:
  language: es
  text: Y la tierra ayudó a la mujer[a], y la tierra abrió su boca y tragó el río[b] que el dragón había arrojado de su boca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra ayudó a la mujer», en el sentido de «la tierra» como «territorio» o «suelo». El griego γῆ puede significar «tierra», «territorio» o «suelo».
    reason: lexical_alternative
  - marker: b
    text: O «el río que el dragón echó de su boca» o «envió desde su boca».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβοήθησεν
  english_pob_choice: helped
  chosen_spanish: ayudó
  alternatives_spanish:
  - vino en ayuda de
  - auxilió
  lexicon: BDAG
  rationale: βοηθέω expresa la acción simple de ayudar o acudir en auxilio. En español, «ayudó» reproduce con naturalidad ese sentido directo y narrativo sin sobrecargarlo.
- source_word: ἡ γῆ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el suelo
  - el país
  lexicon: BDAG
  rationale: γῆ puede significar «earth», «land» o «ground». Aquí, «la tierra» conserva la imagen cósmica del contexto apocalíptico y evita restringir innecesariamente el alcance a una zona local.
- source_word: τῇ γυναικί
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la mujer
  lexicon: BDAG
  rationale: γυνή se traduce de forma directa como «mujer». Mantiene a la figura simbólica sin añadir interpretación.
- source_word: ἤνοιξεν ... τὸ στόμα αὐτῆς
  english_pob_choice: opened its mouth
  chosen_spanish: abrió su boca
  alternatives_spanish:
  - abrió la boca
  lexicon: BDAG
  rationale: Aunque en español podría decirse «abrió la boca», el posesivo «su» conserva mejor la personificación de la tierra, paralela al griego, sin volverla extraña.
- source_word: κατέπιεν
  english_pob_choice: swallowed
  chosen_spanish: tragó
  alternatives_spanish:
  - engulló
  - tragó por completo
  lexicon: BDAG
  rationale: καταπίνω significa tragar o engullir. «Tragó» es una equivalencia natural en español y mantiene la fuerza del verbo sin añadir matices no exigidos.
- source_word: τὸν ποταμόν
  english_pob_choice: the river
  chosen_spanish: el río
  alternatives_spanish:
  - el río
  - la corriente
  - el torrente
  lexicon: BDAG
  rationale: ποταμός normalmente significa «río». Aunque el contexto sugiere una avalancha de agua, «río» sigue siendo la correspondencia más directa y no interpreta de más.
- source_word: ὃν ἔβαλεν
  english_pob_choice: that ... had thrown
  chosen_spanish: que ... había arrojado
  alternatives_spanish:
  - que ... había echado
  - que ... había lanzado
  - que ... había expulsado
  lexicon: BDAG
  rationale: βάλλω aquí conserva el valor de lanzar o arrojar con violencia. «Había arrojado» refleja bien esa acción y suena natural en español.
- source_word: ὁ δράκων
  english_pob_choice: the dragon
  chosen_spanish: el dragón
  alternatives_spanish:
  - el dragón
  lexicon: BDAG
  rationale: «El dragón» es la traducción establecida y adecuada para el ser apocalíptico de Apocalipsis.
- source_word: ἐκ τοῦ στόματος αὐτοῦ
  english_pob_choice: from his mouth
  chosen_spanish: de su boca
  alternatives_spanish:
  - de su boca
  - desde su boca
  lexicon: BDAG
  rationale: La expresión preposicional se vierte de manera idiomática como «de su boca». En español comunica con claridad el origen de lo arrojado por el dragón.
theological_decisions:
- issue: Personificación de la tierra
  english_pob_reading: Retain the personified action of the earth without allegorical explanation in the translation.
  chosen_spanish_reading: Mantener a la tierra como sujeto activo sin explicar su simbolismo en el texto principal.
  alternative_spanish_readings:
  - Interpretar la tierra como la humanidad, el territorio o un medio providencial de salvación
  - explicitar el valor simbólico en una nota
  rationale: El versículo presenta una imagen apocalíptica vívida en la que la tierra actúa. La traducción debe conservar esa tensión figurada sin resolverla dentro del cuerpo del texto.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del análisis auditado; se mantiene la imaginería apocalíptica y la equivalencia directa de los verbos principales.'
  spanish_consistency_notes:
  - Se prefiere «tierra» para γῆ en coherencia con el contexto cósmico y con el hábito POB de no reducir el término a una lectura local cuando el texto apunta al escenario apocalíptico.
  - Se conserva «dragón» como término fijo del libro de Apocalipsis.
  - Se mantiene la personificación en «abrió su boca» para reflejar el sujeto gramatical femenino del griego sin perder naturalidad en español.
