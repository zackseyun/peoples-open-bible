translation:
  language: es
  text: Y los hijos de Benjamín eran de Geba, Micmas, Aía[a] y Betel y sus aldeas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Ai» para «Aía»; la forma hebrea aquí es עַיָּה, que puede reflejar el mismo sitio o un nombre de lugar estrechamente relacionado en la tradición de traducción.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְנֵי בִנְיָמִן
  english_pob_choice: And the sons of Benjamin
  chosen_spanish: Y los hijos de Benjamín
  alternatives_spanish:
  - Y los descendientes de Benjamín
  - Y los benjaminitas
  lexicon: HALOT
  rationale: בְנֵי es literalmente «hijos de»; en este censo de asentamientos designa al grupo tribal. «Hijos de Benjamín» conserva la forma hebrea y la referencia tribal sin volverlo demasiado interpretativo.
- source_word: מִגָּבַע
  english_pob_choice: were from Geba
  chosen_spanish: de Geba
  alternatives_spanish:
  - procedían de Geba
  - eran de Geba
  lexicon: HALOT
  rationale: El prefijo מִן indica procedencia o punto de origen. En español, la frase nominal «de Geba» comunica bien esa procedencia; el verbo implícito se sobreentiende por el contexto del listado.
- source_word: מִכְמָשׂ
  english_pob_choice: Michmash
  chosen_spanish: Micmas
  alternatives_spanish:
  - Micmash
  - Mikmas
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. «Micmas» sigue una transliteración española clara y reconocible, manteniendo la referencia geográfica del hebreo.
- source_word: וְעַיָּה
  english_pob_choice: Aijah
  chosen_spanish: Aía
  alternatives_spanish:
  - Aijá
  - Ayya
  lexicon: HALOT
  rationale: La forma hebrea עַיָּה puede reflejar el mismo sitio que otras tradiciones llaman «Ai». «Aía» reproduce el nombre propio de manera sobria y natural en español, sin fijar una identificación más allá de lo que permite el texto.
- source_word: וּבֵית אֵל
  english_pob_choice: Bethel
  chosen_spanish: Betel
  alternatives_spanish:
  - Béthel
  lexicon: HALOT
  rationale: Nombre propio de lugar, convencionalmente «Betel» en español bíblico. Esta forma es clara y ampliamente entendible.
- source_word: וּבְנֹתֶיהָ
  english_pob_choice: and its villages
  chosen_spanish: y sus aldeas
  alternatives_spanish:
  - y sus hijas
  - y sus poblados dependientes
  lexicon: HALOT
  rationale: Literalmente es «sus hijas», un idiomatismo para asentamientos dependientes. «Aldeas» expresa el sentido en español sin perder la relación de dependencia territorial.
translation_notes:
  revision_awareness: Se siguió el contexto del listado territorial de Nehemías 11:31 y la solución auditada en inglés, manteniendo la relación de procedencia y el sentido idiomático de «sus hijas» como aldeas dependientes. No se adoptó una equivalencia más libre que borrara la estructura enumerativa del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Benjamín» como nombre tribal y «Betel» como forma bíblica estable en español.
  - 'Se prefirió una cadena enumerativa breve y pública: «de Geba, de Micmas, de Aía y de Betel, y sus aldeas».'
  - La nota al pie preserva la ambigüedad documentada entre «Aía» y «Ai» sin resolverla artificialmente.
