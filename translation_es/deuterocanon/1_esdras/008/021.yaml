translation:
  language: es
  text: Hágase conforme a la ley de Dios para el Dios Altísimo[a], para que no venga ira sobre el reino del rey y sus hijos.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hágase conforme a la ley de Dios para Dios Altísimo». El griego permite entender el dativo como destinatario o referencia cultual.'
    reason: lexical_alternative
  - marker: b
    text: El texto griego es más breve que el paralelo hebreo de Esdras 7:23, que en este punto presenta una lista detallada de provisiones para el servicio del templo. Aquí 1 Esdras sigue la formulación griega breve como testigo principal.
    reason: textual_variant
lexical_decisions:
- source_word: κατὰ
  english_pob_choice: according to
  chosen_spanish: conforme a
  alternatives_spanish:
  - según
  - de acuerdo con
  lexicon: BDAG
  rationale: κατά con acusativo marca conformidad con una norma. En español, «conforme a» conserva esa relación normativa sin sonar forzado.
- source_word: νόμον
  english_pob_choice: law
  chosen_spanish: ley
  alternatives_spanish:
  - instrucción
  - norma
  lexicon: BDAG
  rationale: Aquí νόμος se refiere al estándar legal/divino vinculante. «Ley» es la equivalencia más directa y mantiene el registro administrativo-sacral del pasaje.
- source_word: ἐπιτελεσθήτω
  english_pob_choice: let it be done
  chosen_spanish: Hágase
  alternatives_spanish:
  - Que se lleve a cabo
  - Que se cumpla
  lexicon: BDAG
  rationale: El imperativo pasivo expresa ejecución/realización de lo prescrito. «Hágase» es conciso y fiel, sin añadir la idea de completarse plenamente más allá del texto.
- source_word: τῷ θεῷ τῷ ὑψίστῳ
  english_pob_choice: for God Most High
  chosen_spanish: para Dios Altísimo
  alternatives_spanish:
  - para el Dios Altísimo
  - a Dios Altísimo
  lexicon: BDAG
  rationale: El dativo puede expresar referencia o beneficio. «Para Dios Altísimo» fluye naturalmente en español y preserva el título sin convertirlo en una paráfrasis.
- source_word: ἕνεκα τοῦ μὴ γενέσθαι
  english_pob_choice: so that ... may not come
  chosen_spanish: para que no venga
  alternatives_spanish:
  - a fin de que no haya
  - para que no ocurra
  lexicon: BDAG
  rationale: La construcción expresa finalidad preventiva. «Para que no venga» comunica bien la prevención de un resultado futuro, manteniendo la fuerza del griego.
- source_word: ὀργὴν
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - indignación
  - furor
  lexicon: BDAG
  rationale: «Ira» en español bíblico conserva la gravedad de ὀργή y puede referirse a juicio o enojo severo; evita suavizar el término.
- source_word: βασιλείαν
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - dominio
  - reino real
  lexicon: BDAG
  rationale: βασιλεία nombra el reino o esfera regia. «Reino» es la correspondencia natural y clara en español.
- source_word: τῶν υἱῶν
  english_pob_choice: his sons
  chosen_spanish: de sus hijos
  alternatives_spanish:
  - de sus hijos varones
  - de sus hijos e hijos
  lexicon: BDAG
  rationale: El griego dice literalmente «de los hijos». En español, «de sus hijos» mantiene la referencia posesiva y el plural masculino genérico natural en la lengua meta.
theological_decisions:
- issue: Naturaleza de la ira amenazada
  english_pob_reading: The verse refers to divine wrath potentially falling on the king's kingdom and sons if God's law is not carried out.
  chosen_spanish_reading: El texto advierte de una ira que puede venir sobre el reino del rey y sus hijos si no se obra conforme a la ley de Dios.
  alternative_spanish_readings:
  - una mera desgracia política
  - una amenaza indefinida de peligro
  rationale: El contexto de la ley de Dios y la mención de ira justifican entender un juicio serio, no solo un contratiempo político. La traducción no explicita más de lo que dice el texto.
  doctrine_reference: Conservar la tensión teológica sin ampliarla indebidamente.
- issue: Relación de la acción con Dios Altísimo
  english_pob_reading: The prescribed acts are to be carried out for God Most High.
  chosen_spanish_reading: Las acciones prescritas se orientan a Dios Altísimo como destinatario/referente culto.
  alternative_spanish_readings:
  - a Dios Altísimo
  - en honor de Dios Altísimo
  rationale: El dativo permite una relación de dirección o beneficio. «Para Dios Altísimo» y el criterio descriptivo en la nota explican esa relación sin forzar una fórmula litúrgica tradicional.
  doctrine_reference: Equivalencia óptima con atención al matiz del dativo griego.
translation_notes:
  revision_awareness: La redacción sigue el texto griego de Swete como testigo principal, en línea con la nota de validación de desajuste mayor respecto del paralelo hebreo; por eso no se incorporan las provisiones detalladas del pasaje paralelo de Esdras 7:23. También se evitó sobretraducir ἐπιτελεσθήτω con una intensificación como «exactamente», ya que el repaso final del POB inglés la eliminó por exceder el griego.
  spanish_consistency_notes:
  - Se mantiene «Dios Altísimo» para τῷ θεῷ τῷ ὑψίστῳ, coherente con el estilo del POB y sin sustituirlo por «SEÑOR».
  - Se traduce ὀργή como «ira» para conservar la gravedad judicial del término.
  - «Ley» se usa para νόμος por el contexto normativo y administrativo del decreto.
  - El texto español conserva la brevedad del griego y no armoniza con el paralelo hebreo, que es notablemente distinto.
