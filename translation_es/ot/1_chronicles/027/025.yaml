translation:
  language: es
  text: Sobre las tesorerías del rey estaba Azmavet hijo de Adiel, y sobre las tesorerías en el campo[a], en las ciudades, en las aldeas y en las torres, estaba Jehonatán hijo de Uzías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el campo». El hebreo singular probablemente tiene aquí un sentido colectivo, refiriéndose a zonas rurales en contraste con las ciudades, las aldeas y las torres.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעַל / עַל
  english_pob_choice: Over ... was
  chosen_spanish: Sobre ... estaba
  alternatives_spanish:
  - Encima de ... estaba
  - Estaba a cargo de ...
  lexicon: HALOT
  rationale: En esta lista administrativa, עַל expresa supervisión o responsabilidad. «Sobre ... estaba» conserva la relación de encargo sin volverla demasiado interpretativa, y funciona naturalmente en español.
- source_word: אֹצְרוֹת / הָאֹצָרוֹת
  english_pob_choice: treasuries / treasuries
  chosen_spanish: tesoros / tesoros
  alternatives_spanish:
  - almacenes
  - depósitos
  - tesorerías
  lexicon: HALOT
  rationale: אֹצָר puede referirse a tesoro, depósito o almacén. En este contexto de administración de bienes, «tesoros» mantiene la amplitud semántica y evita una especificación excesiva que el hebreo no exige.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king’s
  chosen_spanish: del rey
  alternatives_spanish:
  - real
  - del monarca
  lexicon: HALOT
  rationale: La construcción posesiva natural en español es «del rey». Conserva la relación del hebreo constructo sin sonar forzada.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the countryside
  chosen_spanish: en el campo
  alternatives_spanish:
  - en la campaña
  - en el campo y sus alrededores
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por una lectura colectiva («countryside»), el singular hebreo literalmente dice «en el campo». «En el campo» mantiene el dato textual y, en este contexto contrastivo con ciudades, aldeas y torres, puede entenderse colectivamente en español.
- source_word: בֶּעָרִים
  english_pob_choice: in the cities
  chosen_spanish: en las ciudades
  alternatives_spanish:
  - entre las ciudades
  lexicon: HALOT
  rationale: Renderización directa y transparente del locativo plural.
- source_word: וּבַכְּפָרִים
  english_pob_choice: in the villages
  chosen_spanish: en las aldeas
  alternatives_spanish:
  - en los pueblos
  - en las villas
  lexicon: HALOT
  rationale: כְּפָרִים designa asentamientos rurales; «aldeas» preserva mejor el matiz de pequeñas poblaciones que «pueblos», sin perder claridad para el lector moderno.
- source_word: וּבַמִּגְדָּלוֹת
  english_pob_choice: in the towers
  chosen_spanish: en las torres
  alternatives_spanish:
  - en las torres de vigilancia
  - en las torres fortificadas
  lexicon: HALOT
  rationale: El hebreo solo dice «torres». En español, «torres» es la forma más literal y suficientemente clara; añadir «de vigilancia» o «fortificadas» iría más allá del texto.
- source_word: יְהוֹנָתָן
  english_pob_choice: Jehonathan
  chosen_spanish: Jehonatán
  alternatives_spanish:
  - Jonatán
  lexicon: standard transliteration
  rationale: El hebreo conserva la forma plena יְהוֹנָתָן. «Jehonatán» refleja esa forma mejor que «Jonatán», que suele corresponder al nombre abreviado.
- source_word: בֶּן עֻזִּיָּהוּ
  english_pob_choice: son of Uzziah
  chosen_spanish: hijo de Uzías
  alternatives_spanish:
  - hijo de Uzzías
  - hijo de Ozías
  lexicon: standard transliteration
  rationale: «Uzías» es la transliteración castellana más establecida para עֻזִּיָּהוּ y comunica el nombre sin introducir una forma inusual.
translation_notes:
  revision_awareness: El inglés POB ya había resuelto el contraste de בַּשָּׂדֶה como «in the countryside» y la forma plena del nombre como «Jehonathan». Para el español, se mantuvo la estructura administrativa de la oración y se preservó la tensión léxica de שָׂדֶה con una nota, evitando ampliar innecesariamente el sentido del sustantivo hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» no porque aparezca el nombre divino explícito en este versículo, sino para coherencia general del proyecto cuando corresponda; aquí no se usa.
  - Se prefirió «tesoros» en ambos casos para conservar la repetición léxica del hebreo y la consistencia interna del verso.
  - «Jehonatán» conserva la forma plena del nombre hebreo; se evitó «Jonatán» para no borrar la diferencia señalada por el texto fuente.
