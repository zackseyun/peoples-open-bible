review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: el necio manifiesta su enojo de inmediato y el prudente no expone la deshonra/ofensa. Sin embargo, la colocación española ''La ira del necio se conoce al instante'' suena menos natural y algo menos precisa que una formulación donde el sujeto siga siendo ''el necio'' y la ira sea lo que se hace evidente. Además, las notas no preservan la alternativa del segundo hemistiquio que el rastro inglés sí documentó para קָלוֹן.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en naturalidad proverbial. 'Se le conoce al instante la ira al necio' sería torpe; por eso conviene reestructurar a 'El necio da a conocer su ira de inmediato' o 'Al instante se conoce la ira del necio'. También conviene evitar una nota léxica innecesaria sobre 'ira' y en su lugar conservar la alternativa significativa sobre 'vergüenza/afrenta/deshonra'.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Necio' para אֱוִיל y 'prudente' para עָרוּם están bien justificados. 'Vergüenza' para קָלוֹן es aceptable, pero debe acompañarse de una nota que preserve el rango 'afrenta/deshonra/insulto' documentado en la auditoría inglesa.
  issues:
  - severity: medium
    issue: La sintaxis principal en español suena menos natural que el proverbio hebreo y la POB inglesa
    rationale: 'Aunque ''La ira del necio se conoce al instante'' es comprensible, en español proverbial fluye mejor presentar al necio como quien manifiesta su ira: ''El necio da a conocer su ira de inmediato''. Esto conserva mejor la fuerza de ''בַּיּוֹם יִוָּדַע כַּעְסוֹ'' como evidencia inmediata del enojo.'
  - severity: medium
    issue: Falta una nota en el segundo hemistiquio para la alternativa semántica de קָלוֹן
    rationale: La auditoría inglesa conserva explícitamente 'insult/disgrace' como alternativa. El borrador español no la refleja en nota, con lo cual se pierde parte de la amplitud semántica documentada.
  - severity: low
    issue: La nota sobre 'ira' no corresponde a una alternativa necesaria preservada por la POB inglesa
    rationale: El inglés no añadió nota sobre 'anger'. En cambio, sí documentó alternativas importantes para 'in the day/at once' y 'shame/insult-disgrace'. En español conviene priorizar esas notas relevantes.
  revised_spanish_text: El necio da a conocer su ira de inmediato[a], pero el prudente encubre la vergüenza[b].
  revised_footnotes:
  - marker: a
    text: Literalmente, 'en el día'; la idea en este contexto es 'ese mismo día' o 'de inmediato'.
    reason: lexical_alternative
  - marker: b
    text: O 'encubre una afrenta' o 'una deshonra'.
    reason: lexical_alternative
  revision_rationale: La revisión mejora la naturalidad del español sin apartarse del hebreo ni de la filosofía de equivalencia óptima de la POB. También restaura la alternativa semántica importante del segundo hemistiquio y elimina una nota menos necesaria.
