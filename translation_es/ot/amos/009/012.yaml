translation:
  language: es
  text: para que posean el remanente de Edom y todas las naciones que son llamadas por mi nombre[a]”, declara Yahvé[b], quien hace esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: “sobre las cuales ha sido invocado mi nombre”. Este modismo hebreo expresa pertenencia o que Yahvé las reclama como suyas.'
    reason: lexical_alternative
  - marker: b
    text: 'La forma griega citada en Hechos 15:17 difiere notablemente, con una lectura como: “para que el remanente de la humanidad busque al Señor, y todas las naciones sobre las cuales ha sido invocado mi nombre”.'
    reason: textual_variant
lexical_decisions:
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: HALOT
  rationale: En español, 'para que' comunica con naturalidad el valor de propósito/finalidad del hebreo, sin añadir matices extra.
- source_word: יִירְשׁוּ
  english_pob_choice: they may possess
  chosen_spanish: posean
  alternatives_spanish:
  - hereden
  - tomen posesión de
  lexicon: HALOT
  rationale: '''Poseer'' conserva la fuerza de dominio/tenencia de ירשׁ sin sonar demasiado jurídico o patrimonial en español.'
- source_word: שְׁאֵרִית
  english_pob_choice: the remnant
  chosen_spanish: el remanente
  alternatives_spanish:
  - el resto
  - los sobrevivientes
  lexicon: HALOT
  rationale: '''Remanente'' mantiene el valor profético del término y su resonancia teológica en español bíblico contemporáneo.'
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar.
- source_word: וְכָל הַגּוֹיִם
  english_pob_choice: and all the nations
  chosen_spanish: y de todas las naciones
  alternatives_spanish:
  - y todas las naciones
  - y de todos los pueblos
  lexicon: HALOT
  rationale: '''Naciones'' refleja היטב גּוֹיִם en contexto profético. La repetición de ''de'' en español ayuda a la fluidez: ''el remanente de Edom y de todas las naciones''.'
- source_word: אֲשֶׁר נִקְרָא שְׁמִי עֲלֵיהֶם
  english_pob_choice: who are called by my name
  chosen_spanish: sobre las cuales es invocado mi nombre
  alternatives_spanish:
  - que son llamadas por mi nombre
  - sobre quienes mi nombre es invocado
  lexicon: HALOT
  rationale: Se conserva la idiomática hebrea de pertenencia/adscripción mediante una construcción más literal en español, acorde con la nota lexical del POB en inglés. 'Sobre las cuales' concuerda con 'naciones' y mantiene el sentido de 'sobre quienes'.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - oráculo de Yahvé
  - dice Yahvé
  lexicon: HALOT
  rationale: Se mantiene el nombre divino 'Yahvé' según el estándar del proyecto, y 'declara' reproduce bien la fórmula profética נְאֻם.
- source_word: עֹשֶׂה זֹּאת
  english_pob_choice: who does this
  chosen_spanish: el que hace esto
  alternatives_spanish:
  - quien hace esto
  - el que realiza esto
  lexicon: HALOT
  rationale: La frase participial se vierte de forma directa y natural, preservando el carácter activo de Dios como ejecutor de la acción prometida.
theological_decisions:
- issue: Relación entre el texto hebreo de Amos 9:12 y la forma griega citada en Hechos 15:17
  english_pob_reading: 'The main text follows the Hebrew MT: ''possess the remnant of Edom and all the nations...''; the Greek form is noted as a textual variant.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo: ''posean el remanente de Edom y de todas las naciones...''; la tradición griega queda implícita solo en la nota textual del auditable de base.'
  alternative_spanish_readings:
  - '''para que el remanente de la humanidad busque al Señor'''
  - '''para que el resto de los hombres busque a Yahvé'''
  rationale: No se debe importar al texto principal la lectura de la Septuaginta/Hechos 15, porque el hebreo masorético presenta con claridad un verbo de posesión y un objeto etnopolítico. La tensión interpretativa se preserva sin resolverla por armonización.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Expresión del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la convención del proyecto para el Tetragrámaton, evitando la sustitución por un título y manteniendo la forma transliterada establecida.
  doctrine_reference: Project terminology defaults
translation_notes:
  revision_awareness: 'Se siguió la línea revisada más reciente del expediente inglés, que no introdujo cambios respecto del pasaje base. La redacción española conserva el mismo equilibrio: texto principal fiel al hebreo masorético y nota textual para la variante griega en Hechos 15:17.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יהוה en el texto principal, conforme al estándar del proyecto.
  - '''Remanente'' se mantiene para שְׁאֵרִית por coherencia profética en todo el corpus.'
  - '''Naciones'' se prefiere a ''gentiles'' en este contexto de profecía del AT.'
  - La construcción 'sobre las cuales es invocado mi nombre' conserva la idiomática de pertenencia sin perder legibilidad en español.
