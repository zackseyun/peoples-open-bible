base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/014/012.yaml
  text: Though they fast[a], I do not hear their cry; and though they offer up burnt offering and grain offering, I do not accept them. Rather, by the sword, by famine[d][c][b], and by pestilence I am consuming them.
  footnotes:
  - marker: a
    text: Or 'I do not hear their cry.'
    reason: lexical_alternative
  - marker: b
    text: Or 'grain offering' may also be understood more broadly as a 'tribute offering,' but in sacrificial context it usually refers to the grain offering.
    reason: lexical_alternative
  - marker: c
    text: Or 'I do not delight in them' or 'I do not favor them.'
    reason: lexical_alternative
  - marker: d
    text: '''Pestilence'' may also be rendered ''plague.'''
    reason: lexical_alternative
