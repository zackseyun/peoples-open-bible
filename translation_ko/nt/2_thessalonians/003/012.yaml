id: 2TH.3.12
reference: 2 Thessalonians 3:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῖς δὲ τοιούτοις παραγγέλλομεν καὶ παρακαλοῦμεν ⸂ἐν κυρίῳ Ἰησοῦ Χριστῷ⸃ ἵνα μετὰ ἡσυχίας ἐργαζόμενοι τὸν ἑαυτῶν ἄρτον ἐσθίωσιν.
base_translation:
  language: en
  yaml_path: translation/nt/2_thessalonians/003/012.yaml
  text: Now to such people we command and urge in the Lord Jesus Messiah that[a], working quietly[c][b], they should eat their own bread.
translation:
  language: ko
  text: 이제 그러한 사람들에게 우리는 주 예수 메시아[a] 안에서 명하며 또한 권합니다. 곧 그들이 조용히 일하면서[b] 자신의 양식을[c] 먹어야 한다는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「주 예수 그리스도」. 본 번역은 칭호 Χριστός를 「메시아」로 옮긴다.
    reason: alternative_reading
  - marker: b
    text: 또는 「조용함으로 일하면서」. 헬라어 μετὰ ἡσυχίας는 무질서한 시끄러움과 대조되는 조용하고 안정된 태도를 가리킨다.
    reason: lexical_alternative
  - marker: c
    text: 문자적으로 「자신의 빵」. 본 정황에서 환유적으로 자기 노동으로 얻은 생계를 가리킨다.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῖς δὲ τοιούτοις
  english_pob_choice: Now to such people
  chosen_korean: 이제 그러한 사람들에게
  alternatives_korean:
  - 그런 자들에게는
  - 이러한 사람들에게
  lexicon: BDAG
  rationale: 앞 절의 무질서한 자들을 가리키는 자연스러운 한국어.
- source_word: παραγγέλλομεν
  english_pob_choice: we command
  chosen_korean: 명하며
  alternatives_korean:
  - 명령하며
  - 지시하며
  lexicon: BDAG
  rationale: 권위적 명령. 3:6, 3:10과 어휘적 일관.
- source_word: καὶ παρακαλοῦμεν
  english_pob_choice: and urge
  chosen_korean: 또한 권합니다
  alternatives_korean:
  - 또한 권면합니다
  - 또한 간곡히 청합니다
  lexicon: BDAG
  rationale: 권위와 목회적 호소의 결합을 「명하며 ~ 권합니다」로 자연스럽게 표현.
- source_word: ἐν κυρίῳ Ἰησοῦ Χριστῷ
  english_pob_choice: in the Lord Jesus Messiah
  chosen_korean: 주 예수 메시아 안에서
  alternatives_korean:
  - 주 예수 메시아의 권위로
  - 주 예수 그리스도 안에서
  lexicon: BDAG
  rationale: ἐν의 영역·권위적 의미를 「~안에서」로 보존. 칭호 정책 + 표준 글로서리.
- source_word: μετὰ ἡσυχίας
  english_pob_choice: with quietness
  chosen_korean: 조용히
  alternatives_korean:
  - 조용함으로
  - 안정된 마음으로
  lexicon: BDAG
  rationale: 무질서한 시끄러움과 대조되는 평온한 태도를 「조용히」로 부사로 자연스럽게 옮긴다.
- source_word: ἐργαζόμενοι
  english_pob_choice: working
  chosen_korean: 일하면서
  alternatives_korean:
  - 일하여
  - 노동하여
  lexicon: BDAG
  rationale: 동반적 분사.
- source_word: τὸν ἑαυτῶν ἄρτον
  english_pob_choice: their own bread
  chosen_korean: 자신의 양식
  alternatives_korean:
  - 자기 빵
  - 자기 일의 빵
  lexicon: BDAG
  rationale: 환유적 의미(자기 노동으로 얻은 생계)를 「자신의 양식」으로 자연스럽게 옮긴다. 직역 「빵」은 각주.
- source_word: ἐσθίωσιν
  english_pob_choice: they should eat
  chosen_korean: 먹어야 한다
  alternatives_korean:
  - 먹도록 한다
  - 먹게 한다
  lexicon: BDAG
  rationale: ἵνα + 가정법의 의무적 명령을 「~해야 한다」로 자연스럽게 표현.
theological_decisions:
- issue: 명령과 권면의 결합 보존
  chosen_reading: 「명하며 ~ 권합니다」 두 동사 모두 유지
  alternative_readings:
  - 한 동사로 통합
  rationale: 사도적 권위와 목회적 호소가 동시에 작용하는 본문의 어조를 보존한다.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #1, #6'
- issue: Χριστῷ 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 칭호 정책 일관.
  doctrine_reference: 'Contested terms — Χριστός'
