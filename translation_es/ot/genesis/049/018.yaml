translation:
  language: es
  text: Tu salvación espero[a], oh Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he esperado». El verbo hebreo puede expresar espera continua o anterior; el sustantivo también puede entenderse como «liberación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לִישׁוּעָתְךָ
  english_pob_choice: for your salvation
  chosen_spanish: Por tu salvación
  alternatives_spanish:
  - Por tu liberación
  - Por tu victoria
  lexicon: HALOT
  rationale: ישׁוּעָה puede significar 'salvación' o 'liberación'. En este contexto poético, 'salvación' conserva mejor el alcance teológico amplio que el audit trail inglés también prioriza. El prefijo ל se refleja de manera natural con 'por' en una construcción de espera dirigida al objeto esperado.
- source_word: קִוִּיתִי
  english_pob_choice: I wait
  chosen_spanish: espero
  alternatives_spanish:
  - he esperado
  - aguardo
  - tengo esperanza
  lexicon: HALOT
  rationale: קוה expresa espera con expectativa confiada. 'Espero' es idiomático en español y mantiene la tensión de anhelo presente. 'He esperado' suena más retrospectivo; 'aguardo' es posible, pero menos natural aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del texto hebreo mediante la transliteración 'Yahvé', conforme al criterio del proyecto para יְהוָה. Esto evita sustituir el nombre propio por un título y mantiene la referencia directa al Tetragrámaton.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo usa el nombre propio divino directamente. La traducción española sigue el principio del proyecto de preservar ese nombre como 'Yahvé', sin reemplazarlo por una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El texto inglés POB fue ajustado de una redacción más explicativa a una disposición más cercana al orden hebreo: ''For your salvation I wait, O Yahweh.'' La versión española sigue ese mismo énfasis, anteponiendo el complemento de finalidad/objeto de espera y manteniendo el nombre divino explícito.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, en coherencia con el criterio del proyecto.
  - '''Salvación'' se conserva como término principal; ''liberación'' queda en nota como alternativa lexical.'
  - La puntuación reproduce un breve lamento/clamor poético con apelación directa al nombre divino.
