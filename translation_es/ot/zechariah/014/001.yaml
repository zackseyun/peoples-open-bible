translation:
  language: es
  text: Miren[a], viene un día para Yahvé, y tu botín será repartido en medio de ti.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente, «viene un día de Yahvé». El hebreo dice literalmente: «viene un día para Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Miren
  - Obsérvese
  lexicon: HALOT
  rationale: Como marcador discursivo profético, requiere una fórmula elevada que llame la atención sin sonar coloquial. «He aquí» conserva bien la fuerza solemne de introducción que el inglés POB expresó con «Behold».
- source_word: יוֹם
  english_pob_choice: a day
  chosen_spanish: un día
  alternatives_spanish:
  - el día
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo sin artículo definido; «un día» refleja mejor esa apertura de una formulación profética que no fija aún un referente previamente definido.
- source_word: בָּא
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - está por venir
  lexicon: HALOT
  rationale: El participio/construcción verbal expresa futuro profético. En español, «viene» transmite la inminencia con naturalidad y sin recargar la frase con un progresivo menos idiomático.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - de Yahvé
  - perteneciente a Yahvé
  lexicon: HALOT
  rationale: La preposición ל admite relación, destino o pertenencia. Se mantiene «para Yahvé» porque refleja de cerca el hebreo y evita sustituir prematuramente la expresión por la fórmula tradicional «del SEÑOR», aunque el sentido profético global sea afín.
- source_word: וְחֻלַּק
  english_pob_choice: will be divided
  chosen_spanish: será repartido
  alternatives_spanish:
  - será dividido
  - será asignado
  lexicon: HALOT
  rationale: El pasivo con sentido futurado pide una solución clara en español. «Será repartido» comunica la distribución del botín con naturalidad; «dividido» es posible, pero «repartido» encaja mejor con el objeto concreto.
- source_word: שְׁלָלֵךְ
  english_pob_choice: your plunder
  chosen_spanish: tu botín
  alternatives_spanish:
  - tu plunder
  - tu despojo
  lexicon: HALOT
  rationale: El término se refiere al saqueo tomado en guerra. «Botín» es el equivalente natural y claro en español bíblico actual, y conserva el matiz militar del sustantivo hebreo.
- source_word: בְּקִרְבֵּךְ
  english_pob_choice: in your midst
  chosen_spanish: en medio de ti
  alternatives_spanish:
  - en tu seno
  - dentro de ti
  lexicon: HALOT
  rationale: La expresión es idiomática para algo que ocurre dentro de la ciudad o comunidad. «En medio de ti» preserva el valor locativo y la imagen comunitaria mejor que opciones más internas o más abstractas.
theological_decisions:
- issue: Relación de לַיהוָה con la fórmula profética del «día»
  english_pob_reading: for Yahweh
  chosen_spanish_reading: para Yahvé
  alternative_spanish_readings:
  - de Yahvé
  - el día de Yahvé
  rationale: El hebreo tiene ל y no una construcción de estado constructo que exija «de». Por fidelidad al texto fuente, el cuerpo principal conserva «para Yahvé». La lectura tradicional «el día de Yahvé» sigue siendo una equivalencia interpretativa legítima, pero se deja fuera del texto principal para no borrar la tensión documentada entre la forma literal y la fórmula profética conocida.
  doctrine_reference: 'Translation philosophy §1, §3; Contested terms: YHWH → Yahvé'
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó confirmado con alto acuerdo (0,95). Se mantuvo la estructura literal del hebreo, especialmente la relación de לַיהוָה, y se ajustó el español para que suene natural y publicable sin perder la precisión del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se evita «SEÑOR» como sustituto en el texto principal para conservar la transparencia con el hebreo.
  - «Botín» se usa por consistencia léxica con el campo semántico de שָׁלָל.
  - La segunda persona singular femenina («ti») respeta el sufijo hebreo de 2fs dirigido a Jerusalén/Zion.
