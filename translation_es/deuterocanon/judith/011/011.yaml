    issue: Falta la nota equivalente a la nota inglesa sobre «death will fall upon their face»
    rationale: El rastro de auditoría inglés preserva una alternativa literal importante para ἐπὶ πρόσωπον αὐτῶν. El español adoptó bien el giro idiomático, pero debe conservar la información en nota para fidelidad editorial.
  - severity: low
    issue: «Por el cual provocan a su Dios» suena menos natural en español
    rationale: El antecedente inmediato es «el pecado», singular, pero el sentido recae en la situación/acto por medio del cual ellos provocan a Dios. «Con lo cual» o «por esto» fluye mejor y evita rigidez innecesaria.
