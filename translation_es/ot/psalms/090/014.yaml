review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien el ruego principal y la referencia temporal, pero no preserva plenamente el valor de רנן, que en el audit trail inglés se tradujo específicamente como una expresión vocal de júbilo ('sing for joy'). 'Nos alegraremos' debilita esa fuerza y además duplica semánticamente la cláusula siguiente.
  spanish_quality_summary: El español es claro y digno, pero 'nos alegraremos y nos gozaremos' suena redundante y pierde el paralelismo más preciso entre una expresión vocal de gozo y un estado de alegría. 'Sácianos' y 'por la mañana' son naturales y fieles. 'Amor constante' es aceptable, aunque 'amor fiel' o 'amor leal' reflejarían un poco mejor la dimensión de חֶסֶד; no obstante, no exige rechazo.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. La decisión sobre חֶסֶד es defendible, con nota léxica adecuada. El problema principal es léxico-estilístico en וּנְרַנְּנָה / וְנִשְׂמְחָה: debe mantenerse una distinción como ''cantaremos de gozo'' / ''nos alegraremos''.'
  issues:
  - severity: medium
    issue: וּנְרַנְּנָה está subtraducido como 'nos alegraremos'
    rationale: El hebreo רנן denota júbilo expresado en voz alta, y la POB inglesa documenta 'sing for joy'. La versión española propuesta elimina ese componente vocal y reduce la precisión semántica.
  - severity: medium
    issue: Redundancia en 'nos alegraremos y nos gozaremos'
    rationale: Las dos cláusulas quedan casi sin distinción en español, mientras que el hebreo usa dos verbos relacionados pero no idénticos; conviene reflejar el paralelismo con verbos diferenciados.
  - severity: low
    issue: La nota de חֶסֶד incluye 'amor fiel del pacto', formulación algo pesada
    rationale: No es incorrecta, pero en español eclesial general suena menos natural que 'amor del pacto' o simplemente 'amor fiel'. No requiere mayor adjudicación.
  revised_spanish_text: Sácianos por la mañana con tu amor constante[a], y cantaremos de gozo y nos alegraremos todos nuestros días.
  revised_footnotes:
