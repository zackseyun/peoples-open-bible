  yaml_path: translation/deuterocanon/sirach/019/027.yaml
  text: One who lowers his face and pretends not to hear—where he is not recognized[b][a], he will get the better of you.
  footnotes:
  - marker: a
    text: Or 'acts deaf' for 'pretends not to hear'; the Greek participle depicts someone feigning deafness or turning a deaf ear.
    reason: lexical_alternative
  - marker: b
    text: Or 'he will outstrip you' / 'he will anticipate you'; the Greek verb means to come before someone, here likely in the sense of gaining advantage.
    reason: lexical_alternative
