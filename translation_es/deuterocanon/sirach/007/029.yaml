translation:
  language: es
  text: Con todo tu corazón, teme a Dios, y santifica[a] a sus sacerdotes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «santifica a sus sacerdotes» literalmente; el paralelo griego lee «admira» o «ten en reverencia» a sus sacerdotes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּכָל לִבְּך / ἐν ὅλῃ ψυχῇ σου
  english_pob_choice: with all your heart / with all your soul
  chosen_spanish: con todo tu corazón
  alternatives_spanish:
  - con toda tu alma
  - con todo tu ser
  lexicon: HALOT; LXX Swete 1909
  rationale: El hebreo usa 'corazón' como centro interior de voluntad y devoción; el griego paralelo refuerza la idea de totalidad interior con 'alma'. En español, 'con todo tu corazón' comunica de forma natural esa entrega total sin perder el valor antropológico bíblico.
- source_word: פְּחַד / εὐλαβοῦ
  english_pob_choice: fear
  chosen_spanish: teme
  alternatives_spanish:
  - reverencia
  - ten en reverencia
  - vive en temor reverente
  lexicon: HALOT; BDAG
  rationale: El mandato es un temor reverente ante Dios, pero 'teme' conserva mejor el peso sapiencial y la fuerza imperativa del hebreo. En español bíblico, 'teme a Dios' sigue siendo claro y no diluye la seriedad del verbo.
- source_word: אִל / τὸν κύριον
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Señor
  - el Poderoso
  lexicon: HALOT
  rationale: El hebreo nombra a Dios con el título divino אל, por lo que 'Dios' es la equivalencia directa y más transparente. Se evita 'Señor' porque aquí el nombre/título no exige la convención de sustitución del Tetragrámaton.
- source_word: כֹּהֲנָיו / τοὺς ἱερεῖς αὐτοῦ
  english_pob_choice: his priests
  chosen_spanish: a sus sacerdotes
  alternatives_spanish:
  - a sus presbíteros
  - a sus ministros
  lexicon: HALOT; LSJ
  rationale: '''Sacerdotes'' es el término español más directo para כֹּהֲנִים / ἱερεῖς y preserva la referencia concreta al orden sacerdotal. Se mantiene el posesivo ''sus'' para reflejar la pertenencia a Dios en ambos testigos.'
- source_word: הַקְדִישׁ / θαύμαζε
  english_pob_choice: sanctify his priests / honor his priests
  chosen_spanish: santifica
  alternatives_spanish:
  - honra
  - trátalos como santos
  - tenlos en reverencia
  lexicon: HALOT; LSJ
  rationale: La tradición hebrea apunta literalmente a 'hacer santo / tratar como santo', mientras que el griego añade la idea de admiración o reverencia. 'Santifica' conserva la tensión documental entre ambos testigos sin reducirla a mero respeto social.
theological_decisions:
- issue: Cómo reflejar la orden sobre los sacerdotes sin neutralizar la fuerza cultual del hebreo
  english_pob_reading: and sanctify his priests
  chosen_spanish_reading: y santifica a sus sacerdotes
  alternative_spanish_readings:
  - y honra a sus sacerdotes
  - y trátalos como santos
  rationale: '''Santifica'' mantiene el sentido literal de קדשׁ en la construcción hiphil y deja visible la tensión con el griego, que favorece honor/reverencia. No se resuelve la tensión traduciéndola solo como cortesía humana; se conserva el matiz cultual que el audit trail documenta.'
  doctrine_reference: Preserve theological tension rather than resolve it; optimal equivalence
translation_notes:
  revision_awareness: El inglés POB pasó de 'honor his priests' a 'sanctify his priests' para acercarse más a הַקְדִישׁ ('make holy/consecrate, treat as holy'), mientras que el paralelo griego apoya un sentido de admiración/reverencia. La versión española sigue esa revisión y conserva la tensión entre consagración y reverencia en una formulación publicable.
  spanish_consistency_notes:
  - '''Dios'' se usa para אִל / κύριον en el sentido de la referencia divina del pasaje, sin sustituir por ''Señor''.'
  - '''Sacerdotes'' traduce consistentemente כֹּהֲנִים / ἱερεῖς.'
  - '''Santifica'' mantiene el valor cultual del hebreo; la nota aclara la alternativa griega de reverencia.'
