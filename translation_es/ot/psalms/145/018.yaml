translation:
  language: es
  text: Yahvé está cerca de todos los que lo invocan, de todos los que lo invocan en verdad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse 'con sinceridad', 'fielmente' o 'verdaderamente' para la expresión 'en verdad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: קָרוֹב
  english_pob_choice: near
  chosen_spanish: está cerca
  alternatives_spanish:
  - está próximo
  - está cercano
  lexicon: HALOT
  rationale: El predicado hebreo expresa proximidad real, física o relacional. En español, 'está cerca' es natural y conserva esa amplitud sin introducir una idea más técnica o literaria que el contexto no exige.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para representar el Nombre divino con 'Yahvé', preservando el nombre propio del texto hebreo en lugar de sustituirlo por un título.
- source_word: לְכָל
  english_pob_choice: to all
  chosen_spanish: de todos
  alternatives_spanish:
  - para todos
  - a todos
  lexicon: HALOT
  rationale: 'En esta construcción poética, el sentido es relacional: el sujeto está cercano respecto de quienes invocan. ''De todos'' con ''está cerca'' suena natural en español y mantiene el paralelismo del verso.'
- source_word: קֹרְאָיו
  english_pob_choice: who call on him
  chosen_spanish: los que lo invocan
  alternatives_spanish:
  - los que le llaman
  - los que claman a él
  lexicon: HALOT
  rationale: '''Invocar'' comunica con precisión el uso religioso del verbo קרא en contexto de oración. ''Lo'' reproduce el objeto pronominal y evita una lectura demasiado genérica de ''llamar''.'
- source_word: אֲשֶׁר יִקְרָאֻהוּ
  english_pob_choice: who call on him
  chosen_spanish: los que lo invocan
  alternatives_spanish:
  - los que lo llaman
  - los que claman a él
  lexicon: HALOT
  rationale: Se mantiene la repetición enfática del hebreo con la misma solución verbal en ambos hemistiquios, preservando el paralelismo y la intensificación poética.
- source_word: בֶאֱמֶת
  english_pob_choice: in truth
  chosen_spanish: en verdad
  alternatives_spanish:
  - con sinceridad
  - de verdad
  - fielmente
  lexicon: HALOT
  rationale: '''En verdad'' reproduce de manera directa la expresión hebrea y deja abierta la doble fuerza de autenticidad/sinceridad/fidelidad que el inglés auditado también conserva.'
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita. La traducción española conserva el Nombre divino como 'Yahvé', siguiendo la política del proyecto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Scope and qualification of divine nearness
  english_pob_reading: near to all who call on him, to all who call on him in truth
  chosen_spanish_reading: está cerca de todos los que lo invocan... de todos los que lo invocan en verdad
  alternative_spanish_readings:
  - está cerca de todos en general
  - está cerca solo de su pueblo del pacto
  rationale: 'La traducción conserva el alcance universal condicionado del verso: ''todos los que lo invocan'' y la cualificación ''en verdad''. No se estrecha ni se amplía más allá del hebreo.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requieren cambios; el presente borrador mantiene ese acuerdo alto y reproduce el paralelismo del hebreo sin introducir matices doctrinales ajenos.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' para el Nombre divino, conforme al estándar del proyecto.
  - Se usa 'invocar' para קרא en sentido de oración, manteniendo uniformidad en ambos hemistiquios.
  - '''En verdad'' preserva la ambigüedad semántica de אֱמֶת sin resolverla en una sola opción interpretativa.'
  - La sintaxis española mantiene el paralelismo poético del versículo y evita calcos innecesarios.
