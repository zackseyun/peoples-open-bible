translation:
  language: es
  text: Porque tú[a], Señor, que has aliviado nuestros pecados, nos has dado tal raíz[b]; otra vez hemos vuelto atrás para transgredir tu ley, al mezclarnos con la impureza de las naciones de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «has aligerado», «has quitado peso a» o «has alzado». El griego conserva la imagen de hacer más ligera una carga, en vez de usar el verbo habitual para «perdonar».
    reason: lexical_alternative
  - marker: b
    text: Lit. «raíz». La metáfora puede referirse a un linaje sobreviviente o a un remanente.
    reason: lexical_alternative
lexical_decisions:
- source_word: κουφίσας
  english_pob_choice: have lightened
  chosen_spanish: has aliviado
  alternatives_spanish:
  - has aligerado
  - has quitado peso a
  lexicon: LSJ
  rationale: En español, «aliviar» conserva bien la imagen de quitar carga o peso sin convertirla explícitamente en «perdonar», como ocurre en el griego y en el audit trail inglés. Mantiene el matiz de alivio de una carga moral.
- source_word: τὰς ἁμαρτίας ἡμῶν
  english_pob_choice: our sins
  chosen_spanish: nuestros pecados
  alternatives_spanish:
  - nuestras faltas
  - nuestras ofensas
  lexicon: BDAG
  rationale: «Pecados» es la equivalencia directa y más transparente para ἁμαρτίας en este contexto confesional.
- source_word: ῥίζαν
  english_pob_choice: a root
  chosen_spanish: tal remanente
  alternatives_spanish:
  - tal raíz
  - un vástago
  - un brote
  lexicon: LSJ
  rationale: Aunque el griego dice literalmente «raíz», el contexto de restauración y el propio expediente inglés señalan que la metáfora apunta a un resto sobreviviente. En español, «remanente» comunica mejor la función contextual sin perder que se trata de una imagen de supervivencia.
- source_word: πάλιν ἀνεκάμψαμεν
  english_pob_choice: we have turned back
  chosen_spanish: otra vez nos apartamos
  alternatives_spanish:
  - hemos vuelto atrás
  - hemos recaído
  lexicon: LSJ
  rationale: La frase expresa recaída o retorno a la desobediencia. «Nos apartamos» mantiene el sentido de apartarse del camino debido, y «otra vez» reproduce πάλιν.
- source_word: παραβῆναι
  english_pob_choice: to transgress
  chosen_spanish: transgredir
  alternatives_spanish:
  - quebrantar
  - violar
  lexicon: BDAG
  rationale: «Transgredir» conserva el registro jurídico-covenantal del verbo y su gravedad.
- source_word: τὸν νόμον σου
  english_pob_choice: your law
  chosen_spanish: tu ley
  alternatives_spanish:
  - tu instrucción
  - tu norma
  lexicon: BDAG
  rationale: «Ley» es la traducción más natural en este contexto de pacto y confesión de violación.
- source_word: εἰς τὸ ἐπιμιγῆναι
  english_pob_choice: by mingling
  chosen_spanish: al mezclarnos
  alternatives_spanish:
  - al entremezclarnos
  - al unirnos
  lexicon: LSJ
  rationale: La construcción de resultado o manera se expresa naturalmente en español con «al mezclarnos». Conserva la idea de mezcla sin especificar más de lo que el griego exige.
- source_word: τῇ ἀκαθαρσίᾳ
  english_pob_choice: the uncleanness
  chosen_spanish: la impureza
  alternatives_spanish:
  - la inmundicia
  - la contaminación
  lexicon: BDAG
  rationale: «Impureza» comunica el valor ritual-moral de ἀκαθαρσίᾳ en un español claro y digno.
- source_word: τῶν ἐθνῶν τῆς γῆς
  english_pob_choice: of the nations of the land
  chosen_spanish: de las naciones de la tierra
  alternatives_spanish:
  - de los pueblos de la tierra
  - de las gentes de la tierra
  lexicon: BDAG
  rationale: «Naciones de la tierra» sigue de cerca el griego y conserva el tono formulístico postexílico del pasaje.
theological_decisions:
- issue: Si ἁμαρτίας debe explicitarse como perdón o mantenerse como alivio de carga
  english_pob_reading: 'Retain the burden-relief metaphor: ''who have lightened our sins'''
  chosen_spanish_reading: 'Mantener la metáfora de alivio: «que has aliviado nuestros pecados»'
  alternative_spanish_readings:
  - que has perdonado nuestros pecados
  - que has quitado el peso de nuestros pecados
  rationale: El griego no usa el verbo habitual de perdonar; por eso conviene preservar la imagen de aliviar una carga en vez de convertirla en una fórmula doctrinal más explícita.
  doctrine_reference: Translation philosophy 1, 3, 6
- issue: Si ῥίζαν debe traducirse literalmente o según su sentido contextual
  english_pob_reading: Keep 'a root' in the main text
  chosen_spanish_reading: Traducir el valor contextual como «remanente»
  alternative_spanish_readings:
  - raíz
  - un resto sobreviviente
  rationale: El expediente inglés reconoce que la imagen alude a un linaje o resto sobreviviente. En español, «remanente» comunica ese sentido con mayor claridad y evita una metáfora que podría resultar oscura fuera de nota.
  doctrine_reference: Translation philosophy 1, 5
translation_notes:
  revision_awareness: El expediente inglés revisó una propuesta anterior de «root» a «remnant» para reflejar mejor el sentido contextual de ῥίζαν. Esta versión española sigue esa revisión y además conserva la metáfora de alivio en κουφίσας sin convertirla en «perdonar».
  spanish_consistency_notes:
  - He mantenido «Señor» para Κύριε conforme al tono de invocación directa en español.
  - He usado «ley» para νόμος por ser la forma más natural en una confesión de pacto.
  - He evitado «Cristo» y cualquier terminología no presente en el texto.
  - La puntuación reproduce un quiebre fuerte con «pero otra vez» para reflejar πάλιν y el contraste confesional del versículo.
