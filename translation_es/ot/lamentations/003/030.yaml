translation:
  language: es
  text: Que ponga su mejilla al que lo golpea; que se sacie de oprobio[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que tenga su colmo de deshonra» o «de insulto». El modismo hebreo habla literalmente de quedar «saciado de oprobio».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתֵּן
  english_pob_choice: Let him give
  chosen_spanish: que ponga
  alternatives_spanish:
  - que dé
  - que entregue
  lexicon: HALOT
  rationale: El valor yusivo/exhortativo del imperfecto se conserva mejor en español con una subordinada exhortativa en presente subjuntivo. «Poner la mejilla» evita la rigidez de «dar su mejilla» y comunica el gesto idiomático de someterse al golpe o la afrenta.
- source_word: לְמַכֵּהוּ
  english_pob_choice: to the one who strikes him
  chosen_spanish: al que lo golpea
  alternatives_spanish:
  - al que lo hiere
  - a su golpeador
  lexicon: HALOT
  rationale: El participio con sufijo señala a la persona que actúa sobre él. «Golpea» es natural y conserva la fuerza física del verbo, sin perder el valor de agente descrito por el participio.
- source_word: לֶחִי
  english_pob_choice: his cheek
  chosen_spanish: su mejilla
  alternatives_spanish:
  - su cachete
  - su quijada
  lexicon: HALOT
  rationale: «Mejilla» es la equivalencia más clara y digna en español para el área facial de la imagen. Mantiene el idiomatismo corporal de la escena.
- source_word: יִשְׂבַּע
  english_pob_choice: let him be filled
  chosen_spanish: que se sacie
  alternatives_spanish:
  - que se llene
  - que tenga su fill
  lexicon: HALOT
  rationale: El verbo expresa estar lleno/satisfecho; con «oprobio» la imagen es figurada. «Saciarse» preserva la metáfora de plenitud sin sonar forzado en español.
- source_word: בְּחֶרְפָּה
  english_pob_choice: with reproach
  chosen_spanish: de oprobio
  alternatives_spanish:
  - de reproche
  - de vergüenza
  - de afrenta
  lexicon: HALOT
  rationale: «חרפה» puede abarcar reproche, afrenta y deshonra pública. «Oprobio» comunica bien la humillación social y conserva un registro bíblico formal; «de» expresa el complemento de saturación natural en español.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: exhortación con jussivo, agente en participio, metáfora corporal de la mejilla y metáfora de saturación con oprobio. No se detectaron revisiones textuales que exigieran ajuste.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» para el tetragrámaton cuando aparezca en el contexto; aquí no se presenta.
  - Se mantuvo un registro sobrio y bíblico sin usar formulaciones tradicionales que alteren la imagen concreta del hebreo.
  - «Oprobio» conserva la carga de humillación pública que el inglés POB anotó como alternativa de disgrace/insult/shame.
