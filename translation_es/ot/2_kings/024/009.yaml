translation:
  language: es
  text: E hizo lo malo ante los ojos de Yahvé, conforme a todo lo que había hecho su padre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: And he did
  chosen_spanish: E hizo
  alternatives_spanish:
  - Hizo
  - Y hizo
  lexicon: HALOT
  rationale: El wayyiqtol de עשה avanza la narración con pasado simple. En español bíblico, «e hizo» conserva la secuencia narrativa y evita una repetición incómoda de la vocal abierta tras una conjunción anterior implícita en el flujo del relato.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: El adjetivo con artículo funciona de manera sustantiva en la fórmula fija deuteronomista. «Lo malo» reproduce esa sustantivación con naturalidad en español sin perder el valor evaluativo.
- source_word: בְּעֵינֵי
  english_pob_choice: in the eyes of
  chosen_spanish: ante los ojos de
  alternatives_spanish:
  - a los ojos de
  - en los ojos de
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de evaluación. «Ante los ojos de» mantiene la imagen idiomática y su fuerza relacional en español; «a los ojos de» es posible, pero menos solemne aquí.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme a la convención del proyecto en español, en lugar de sustituirlo por un título.
- source_word: כְּכֹל אֲשֶׁר עָשָׂה
  english_pob_choice: according to all that his father had done
  chosen_spanish: conforme a todo lo que había hecho
  alternatives_spanish:
  - según todo lo que había hecho
  - como todo lo que había hecho
  lexicon: HALOT
  rationale: La construcción comparativa כְּכֹל preserva el sentido de conformidad total. «Conforme a todo lo que había hecho» mantiene la amplitud de la referencia y el valor retrospectivo del qatal con pluscuamperfecto español.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su progenitor
  - el padre de él
  lexicon: HALOT
  rationale: El sufijo posesivo de 3ms se expresa de forma natural como «su padre». En contexto, la referencia es clara y no requiere mayor especificación.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español se sigue la decisión del proyecto de verterlo como «Yahvé» para preservar el nombre personal del pacto, no un sustituto titular.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se siguió el texto hebreo masorético proporcionado y la auditoría inglesa coincide en lectura y sentido general; no se documentan variantes textuales ni notas críticas adicionales para este versículo.
  spanish_consistency_notes:
  - Se mantuvo la fórmula deuteronomista con un español transparente y sobrio.
  - Se evitó «SEÑOR» para el Tetragrámaton conforme a la política del proyecto.
  - «Lo malo» conserva la sustantivación del hebreo sin volver la frase demasiado literal o dura en español.
