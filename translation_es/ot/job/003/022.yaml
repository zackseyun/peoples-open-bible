translation:
  language: es
  text: los que se alegran sobremanera[a], que exultan cuando[b] encuentran la tumba[c]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se alegran hasta el regocijo»; la frase hebrea es un intensificador idiomático.
    reason: lexical_alternative
  - marker: b
    text: O «porque». La conjunción hebrea puede leerse causalmente además de circunstancialmente aquí.
    reason: alternative_reading
  - marker: c
    text: O «una tumba». El hebreo קָבֶר puede entenderse como indefinido, aunque en español la forma definida genérica suena natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשְּׂמֵחִים
  english_pob_choice: who rejoice
  chosen_spanish: los que se alegran
  alternatives_spanish:
  - los que regocijan
  - los que están alegres
  lexicon: HALOT
  rationale: El participio con artículo funciona sustantivamente; en español, «los que se alegran» conserva esa función descriptiva sin sonar forzado.
- source_word: אֱלֵי גִיל
  english_pob_choice: exceedingly
  chosen_spanish: hasta el regocijo
  alternatives_spanish:
  - sumamente
  - para regocijo
  - hacia el júbilo
  lexicon: HALOT
  rationale: La expresión es idiomática e intensificadora. «Hasta el regocijo» intenta reflejar el matiz literal de orientación/alcance de אֱלֵי sin perder el valor de intensificación que la POB inglesa destacó.
- source_word: יָשִׂישׂוּ
  english_pob_choice: who exult
  chosen_spanish: que exultan
  alternatives_spanish:
  - que se gozan
  - que se alegran
  lexicon: HALOT
  rationale: Se conserva el segundo verbo de júbilo como intensificación poética del primero. «Exultan» mantiene mejor el registro elevado y la diferencia de fuerza respecto de «se alegran».
- source_word: כִּי
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - porque
  - ya que
  lexicon: HALOT
  rationale: En este contexto, la conjunción introduce la circunstancia de su exultación; «cuando» sigue la lectura circunstancial preferida en la POB inglesa.
- source_word: יִמְצְאוּ
  english_pob_choice: they find
  chosen_spanish: encuentran
  alternatives_spanish:
  - hallan
  - descubren
  lexicon: HALOT
  rationale: «Encuentran» es un equivalente natural y directo de מצא, preservando la simpleza del hebreo.
- source_word: קָבֶר
  english_pob_choice: the grave
  chosen_spanish: la tumba
  alternatives_spanish:
  - una tumba
  - el sepulcro
  - la sepultura
  lexicon: HALOT
  rationale: En español, «la tumba» comunica de forma clara y sobria el destino de muerte/burial que el contexto demanda. Se evita «el sepulcro» por posible solemnidad añadida y «la sepultura» por sonar más abstracto en este verso.
translation_notes:
  revision_awareness: El texto hebreo presenta un paralelismo intensificado entre dos expresiones de alegría y el hallazgo de la tumba. La POB inglesa marcó la ambigüedad de כִּי (cuando/because) y la indeterminación de קָבֶר (the/a grave). En esta versión española se mantiene la lectura circunstancial de כִּי y se conserva la fuerza idiomática de אֱלֵי גִיל sin aplanarla. No se aplicaron revisiones posteriores.
  spanish_consistency_notes:
  - Se mantiene un registro poético y sobrio, adecuado para Job.
  - No se usa «SEÑOR» ni terminología litúrgica añadida; el verso no contiene el nombre divino.
  - Se prefirió «la tumba» como equivalente idiomático español de «the grave», sin perder la referencia a la muerte.
  - Los corchetes de nota se colocan solo donde hay una alternativa real o una ambigüedad relevante en español.
