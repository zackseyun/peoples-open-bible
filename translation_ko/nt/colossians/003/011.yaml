id: COL.3.11
reference: Colossians 3:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ὅπου οὐκ ἔνι Ἕλλην καὶ Ἰουδαῖος, περιτομὴ καὶ ἀκροβυστία, βάρβαρος, Σκύθης, δοῦλος, ἐλεύθερος, ἀλλὰ ⸀τὰ πάντα καὶ ἐν πᾶσιν Χριστός.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/003/011.yaml
  text: where there is no Greek and Jew, circumcision and uncircumcision, barbarian, Scythian, slave, free, but Messiah is all, and in all.
translation:
  language: ko
  text: 거기에는 헬라인이나 유대인이나, 할례나 무할례나, 야만인이나 스구디아인이나, 노예[a]나 자유인이 없으며, 오직 메시아께서 모든 것이시며 모든 것 안에 계십니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 δοῦλος. 「자유」와의 사회적·법적 대조에서 매임의 의미가 두드러지므로, DOCTRINE.md에 따라 「노예」로 옮긴다.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου
  english_pob_choice: where
  chosen_korean: 거기에는
  alternatives_korean:
  - 그곳에는
  - 이런 곳에는
  lexicon: BDAG
  rationale: 앞 절의 「새 사람」의 영역을 가리킨다.
- source_word: οὐκ ἔνι
  english_pob_choice: there is no
  chosen_korean: 없으며
  alternatives_korean:
  - 존재하지 않으며
  lexicon: BDAG
  rationale: 「없다」의 범주적 부정.
- source_word: Ἕλλην καὶ Ἰουδαῖος
  english_pob_choice: Greek and Jew
  chosen_korean: 헬라인이나 유대인
  alternatives_korean:
  - 그리스인과 유대인
  lexicon: BDAG
  rationale: 한국 교회의 정립된 「헬라인·유대인」 사용. 「이방인」으로 일반화하지 않는다.
- source_word: περιτομὴ καὶ ἀκροβυστία
  english_pob_choice: circumcision and uncircumcision
  chosen_korean: 할례나 무할례
  alternatives_korean:
  - 할례자나 무할례자
  lexicon: BDAG
  rationale: 추상 명사로 사회적·종교적 식별 표지를 보존.
- source_word: βάρβαρος
  english_pob_choice: barbarian
  chosen_korean: 야만인
  alternatives_korean:
  - 외인
  - 바바리아인
  lexicon: BDAG
  rationale: 고전적 「문명-비문명」 구분의 어감을 살린다.
- source_word: Σκύθης
  english_pob_choice: Scythian
  chosen_korean: 스구디아인
  alternatives_korean:
  - 스키타이인
  lexicon: BDAG
  rationale: 한국 교회의 정립된 음역.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_korean: 노예
  alternatives_korean:
  - 종
  - 매인 자
  lexicon: BDAG
  rationale: ἐλεύθερος와의 사회적 대조에서 매임의 어감이 핵심이다. DOCTRINE.md와 영어 POB의 「slave」 결정을 따라 「노예」로 옮긴다.
- source_word: ἐλεύθερος
  english_pob_choice: free
  chosen_korean: 자유인
  alternatives_korean:
  - 자유로운 자
  lexicon: BDAG
  rationale: δοῦλος의 표준 대조어.
- source_word: ἀλλὰ τὰ πάντα καὶ ἐν πᾶσιν Χριστός
  english_pob_choice: but Messiah is all, and in all
  chosen_korean: 오직 메시아께서 모든 것이시며 모든 것 안에 계십니다
  alternatives_korean:
  - 도리어 메시아가 만유시며 만유 안에 계십니다
  - 오직 그리스도께서 모든 것이며 모두 안에
  lexicon: BDAG
  rationale: 「모든 것」과 「모든 것 안에」의 양면을 보존. Χριστός는 칭호 「메시아」.
theological_decisions:
- issue: δοῦلος → 「노예」 결정(매임의 무게 보존)
  chosen_reading: 노예
  alternative_readings:
  - 종
  - 매인 자
  rationale: 본 절은 사회적 「노예-자유」 대조이며, 매임의 무게가 핵심이다. DOCTRINE.md는 매임의 어감이 본문에 살아 있을 때 「노예」로 옮기도록 지시한다. 영어 POB도 「slave」로 결정했다.
  doctrine_reference: 'DOCTRINE.md: Contested terms for δοῦλος; Col 3:11 explicit'
- issue: Χριστός를 칭호로 번역
  chosen_reading: 메시아
  alternative_readings:
  - 그리스도
  rationale: 본 절은 메시아의 모든 것 됨을 신학적·칭호적으로 선포한다.
  doctrine_reference: 'DOCTRINE.md: Contested terms for Χριστός'
- issue: ἐν πᾶσιν의 범위
  chosen_reading: 「모든 것 안에」(개인적·일반적 함의를 함께 보존)
  alternative_readings:
  - 「모든 사람 안에」
  - 「모든 것 안에」
  rationale: 헬라어는 압축적·모호하다. 본 번역은 모호성을 보존한다.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension'
