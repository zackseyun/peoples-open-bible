  to: 'Entonces les preguntó a los funcionarios[a] de Faraón que estaban con él en custodia en la casa de su señor: «¿Por qué tienen hoy el rostro abatido?»'
  rationale: Se mejora la naturalidad del español con «les preguntó a» sin alterar el sentido del hebreo. Se elimina «diciendo», que en español resulta innecesario antes de dos puntos, aunque su función quotativa queda plenamente preservada. También se suprime la nota [b] porque no ofrecía una alternativa real ni una aclaración útil.
