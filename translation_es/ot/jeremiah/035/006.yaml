base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/035/006.yaml
  text: But they said[a], “We will not drink wine, for Jonadab son of Rechab, our father, commanded us, saying, ‘You shall not drink wine, you or your sons[c][b], forever.’”
  footnotes:
  - marker: a
    text: Or “And they said.” The Hebrew narrative conjunction can be rendered either way; “But” reflects the contrast with the preceding invitation to drink wine.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “our father,” meaning their forefather or ancestor Jonadab.
    reason: cultural_note
  - marker: c
    text: Hebrew “your sons,” specifically male descendants, not the more general “children.”
    reason: lexical_alternative
