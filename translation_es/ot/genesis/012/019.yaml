translation:
  language: es
  text: '¿Por qué dijiste: “Ella es mi hermana”, y yo la tomé por esposa[a]? Y ahora, aquí está tu esposa[b]. Tómala y vete.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: “la tomé para mí como esposa”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “mira, aquí está tu esposa”.'
    reason: previous_rendering
lexical_decisions:
- source_word: לָמָה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A qué motivo
  - ¿Por qué razón
  lexicon: HALOT
  rationale: Interrogativo directo y natural en español, conservando la reprensión y la búsqueda de causa implícitas en el hebreo.
- source_word: אָמַרְתָּ
  english_pob_choice: did you say
  chosen_spanish: dijiste
  alternatives_spanish:
  - has dicho
  - decías
  lexicon: HALOT
  rationale: El pasado simple en español reproduce bien la pregunta retrospectiva dentro del relato y evita una perífrasis innecesaria.
- source_word: אֲחֹתִי הִוא
  english_pob_choice: She is my sister
  chosen_spanish: Ella es mi hermana
  alternatives_spanish:
  - Es mi hermana
  - Ella era mi hermana
  lexicon: HALOT
  rationale: Se mantiene la cláusula nominal citada como discurso directo. El presente conserva el valor de la afirmación formulada por Abram.
- source_word: וָאֶקַּח
  english_pob_choice: and I took
  chosen_spanish: y yo la tomé
  alternatives_spanish:
  - y la tomé
  - por lo cual la tomé
  lexicon: HALOT
  rationale: Se traduce la conjunción de manera simple y directa, sin introducir finalidad. El pronombre explícito ayuda a la fluidez en español y mantiene la referencia a Sarai.
- source_word: לִי
  english_pob_choice: for myself
  chosen_spanish: para mí
  alternatives_spanish:
  - para mí mismo
  - en beneficio mío
  lexicon: HALOT
  rationale: El dativo de interés se expresa de forma natural con 'para mí'. 'Para mí mismo' sería más enfático de lo que exige el hebreo y más pesado en español.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: como esposa
  alternatives_spanish:
  - por esposa
  - para esposa
  lexicon: HALOT
  rationale: La construcción hebrea indica el estado matrimonial buscado; 'como esposa' es natural y fiel, evitando una calca torpe.
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Se conserva el giro discursivo que introduce el cambio de tono hacia la instrucción.
- source_word: הִנֵּה
  english_pob_choice: look, here is
  chosen_spanish: aquí está
  alternatives_spanish:
  - mira, aquí está
  - he aquí
  lexicon: HALOT
  rationale: La partícula deíctica se expresa en español con una fórmula natural y clara. 'Aquí está' conserva la presencia inmediata y el señalamiento directo.
- source_word: אִשְׁתְּךָ
  english_pob_choice: your wife
  chosen_spanish: tu esposa
  alternatives_spanish:
  - tu mujer
  - tu esposa legítima
  lexicon: HALOT
  rationale: Se mantiene el reconocimiento explícito del vínculo real de Sarai con Abram; 'esposa' es el término más claro y digno en español actual.
- source_word: קַח
  english_pob_choice: Take her
  chosen_spanish: Tómala
  alternatives_spanish:
  - Toma
  - Llévala
  lexicon: HALOT
  rationale: El imperativo hebreo se vierte de forma concisa y natural. El objeto enclítico evita repetir 'her' de manera pesada.
- source_word: וָלֵךְ
  english_pob_choice: and go
  chosen_spanish: y vete
  alternatives_spanish:
  - y anda
  - y sal
  lexicon: HALOT
  rationale: La orden final se expresa con un imperativo natural en español. 'Vete' conserva el movimiento de salida sin añadir dureza ajena al texto.
theological_decisions:
- issue: Reconocimiento explícito de Sarai como esposa legítima de Abram
  english_pob_reading: And now, here is your wife. Take her and go.
  chosen_spanish_reading: Y ahora, aquí está tu esposa. Tómala y vete.
  alternative_spanish_readings:
  - Y ahora, mira, aquí está tu esposa. Tómala y vete.
  - Y ahora, he aquí tu esposa. Tómala y vete.
  rationale: El texto culmina en la rectificación de la relación verdadera de Sarai. La elección española conserva ese reconocimiento sin suavizarlo ni hacerlo más formal de lo requerido.
  doctrine_reference: Génesis 12:19; fidelidad matrimonial y verdad del estado conyugal
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de 'so that I took her' a 'and I took her' para reflejar mejor la conjunción hebrea y evitar un matiz de finalidad. La redacción española sigue esa revisión con 'y la tomé', sin introducir propósito. También se tuvo en cuenta la simplificación auditada de 'look, here is your wife' a 'here is your wife', resuelta en español con 'aquí está tu esposa'.
  spanish_consistency_notes:
  - Se mantiene 'esposa' para לְאִשָּׁה y אִשְׁתְּךָ, evitando alternar con 'mujer' para no perder la coherencia matrimonial.
  - Se evita 'SEÑOR' u otras sustituciones no presentes en el versículo.
  - '''Tómala'' refleja el imperativo singular y conserva la relación directa con el objeto implícito en el hebreo.'
