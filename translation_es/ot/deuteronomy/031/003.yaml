base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/031/003.yaml
  text: Yahweh your God himself is crossing over before you[a]. He himself will destroy these nations from before you, and you will dispossess them. Joshua himself is crossing over before you[b], just as Yahweh has spoken.
  footnotes:
  - marker: a
    text: Or 'goes before you' / 'will cross over before you.' The Hebrew participle can express ongoing, imminent, or certain future action.
    reason: lexical_alternative
  - marker: b
    text: Or 'you will take possession of them/their land.' The Hebrew verb often carries the sense of taking possession by dispossessing prior occupants.
    reason: lexical_alternative
