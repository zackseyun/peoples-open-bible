translation:
  language: es
  text: Y todo Judá se alegró por el juramento, porque con todo su corazón habían jurado y con toda su voluntad lo buscaron, y él se dejó hallar[a] por ellos, y Yahvé les dio reposo por todos lados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «fue hallado por ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׂמְחוּ
  english_pob_choice: rejoiced
  chosen_spanish: se alegró
  alternatives_spanish:
  - se regocijó
  - se llenó de gozo
  lexicon: HALOT
  rationale: שמַח expresa alegría o regocijo. En español, «se alegró» es natural y conserva el tono comunitario del verso; «se regocijó» sería más formal, pero algo más marcado.
- source_word: כָל יְהוּדָה
  english_pob_choice: all Judah
  chosen_spanish: todo Judá
  alternatives_spanish:
  - todo el pueblo de Judá
  - toda Judea
  lexicon: HALOT
  rationale: La referencia es colectiva al reino/pueblo de Judá. «Todo Judá» es conciso y fiel; «Judea» sería anacrónico, y «el pueblo de Judá» añade explicación no requerida por el hebreo.
- source_word: עַל הַשְּׁבוּעָה
  english_pob_choice: over the oath
  chosen_spanish: por el juramento
  alternatives_spanish:
  - a causa del juramento
  - sobre el juramento
  lexicon: HALOT
  rationale: Con verbos de alegría, עַל introduce el motivo o el objeto de la alegría. En español, «por el juramento» comunica bien esa relación causal/ocasional sin sonar forzado.
- source_word: בְכָל לְבָבָם
  english_pob_choice: with all their heart
  chosen_spanish: con todo su corazón
  alternatives_spanish:
  - con su corazón entero
  - de todo corazón
  lexicon: HALOT
  rationale: Es una expresión idiomática estable de integridad y sinceridad. «Con todo su corazón» mantiene la forma y el peso del hebreo sin perder claridad.
- source_word: רְצוֹנָם
  english_pob_choice: with all their will
  chosen_spanish: con toda su voluntad
  alternatives_spanish:
  - con todo su deseo
  - voluntariamente
  lexicon: HALOT
  rationale: Aquí רָצוֹן tiene fuerza de voluntad/disposición decidida, no solo deseo emocional. «Voluntad» sigue la revisión inglesa más precisa y preserva el paralelismo con «corazón».
- source_word: בִּקְשֻׁהוּ
  english_pob_choice: sought him
  chosen_spanish: lo buscaron
  alternatives_spanish:
  - lo buscaron a él
  - buscaron a Yahvé
  lexicon: HALOT
  rationale: El sufijo pronominal remite a Yahvé por el contexto. «Lo buscaron» es natural en español y conserva la referencia pronominal sin repetir el nombre divino innecesariamente.
- source_word: וַיִּמָּצֵא לָהֶם
  english_pob_choice: he let himself be found by them
  chosen_spanish: él se dejó hallar por ellos
  alternatives_spanish:
  - él fue hallado por ellos
  - se les dejó encontrar
  lexicon: HALOT
  rationale: 'El niphal de מצא aquí tiene una carga relacional: no solo que fue hallado, sino que se mostró accesible al ser buscado. «Se dejó hallar» conserva esa tensión sin borrar el matiz de respuesta divina.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» en el texto principal. «El SEÑOR» se evita por ser una sustitución y no el nombre propio del hebreo.'
- source_word: מִסָּבִיב
  english_pob_choice: all around
  chosen_spanish: por todos lados
  alternatives_spanish:
  - alrededor
  - en torno
  lexicon: HALOT
  rationale: La expresión indica ausencia de amenaza o conflicto circundante. «Por todos lados» es una equivalencia idiomática clara en español y conserva la idea de protección completa.
theological_decisions:
- issue: Respuesta divina a la búsqueda humana
  english_pob_reading: he let himself be found by them
  chosen_spanish_reading: él se dejó hallar por ellos
  alternative_spanish_readings:
  - fue hallado por ellos
  - se les dejó encontrar
  rationale: 'La forma hebrea y la lectura inglesa POB mantienen que la hallabilidad de Dios no es meramente pasiva: responde al buscar humano. «Se dejó hallar» preserva esa dimensión relacional y evita reducirlo a un hallazgo accidental.'
  doctrine_reference: 2 Crónicas 15:15; tema bíblico de la búsqueda de Dios y su respuesta
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa explícitamente יהוה. Según la política del proyecto, el nombre se translitera como «Yahvé» para no ocultarlo tras un título. Esto mantiene la identidad pactual del Dios de Israel.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada desde «with all their desire» a «with all their will» por precisión respecto de רְצוֹן. La redacción española adopta esa revisión con «con toda su voluntad», manteniendo el paralelismo de búsqueda íntegra y respondiendo al matiz volitivo del término. También se conserva la decisión auditada de traducir el Tetragrámaton como nombre propio («Yahvé») y no como título sustitutivo.
  spanish_consistency_notes:
  - 'Se mantiene el orden semántico del hebreo: alegría por el juramento, razón de la alegría, búsqueda sincera, respuesta divina y reposo concedido.'
  - «Todo Judá» funciona como colectivo político-religioso y evita añadir elementos no presentes en el texto.
  - «Por todos lados» recoge el cierre inclusivo de מִסָּבִיב sin convertirlo en una paráfrasis más amplia.
