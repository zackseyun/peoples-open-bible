translation:
  language: es
  text: Ahora bien, David mi padre[a] tenía en su corazón edificar una casa[b] para el nombre de Yahvé, el Dios de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mi padre David».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «una casa para el nombre de Yahvé», expresión estándar para el templo como lugar asociado con el nombre de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: Now it was
  chosen_spanish: Ahora bien, estaba
  alternatives_spanish:
  - Y sucedió
  - Y fue
  lexicon: HALOT
  rationale: El hebreo introduce una cláusula narrativa de estado/pasado. «Ahora bien» conserva el giro discursivo de transición, y «estaba» mantiene el valor de estado sin forzar un calco arcaizante.
- source_word: עִם לְבַב
  english_pob_choice: in the heart of
  chosen_spanish: en el corazón de
  alternatives_spanish:
  - en la mente de
  - en el interior de
  lexicon: HALOT
  rationale: La expresión hebrea comunica intención o propósito alojado en la persona. «En el corazón de» reproduce bien la imagen antropológica y coincide con la elección auditada en inglés.
- source_word: דָּוִיד אָבִי
  english_pob_choice: David my father
  chosen_spanish: David mi padre
  alternatives_spanish:
  - mi padre David
  - David, mi padre
  lexicon: HALOT
  rationale: Se conserva el orden hebreo y el vínculo posesivo natural en español. La alternativa entre comas sería posible, pero aquí no es necesaria.
- source_word: לִבְנוֹת
  english_pob_choice: to build
  chosen_spanish: edificar
  alternatives_spanish:
  - construir
  - edificar
  lexicon: HALOT
  rationale: «Edificar» funciona bien en registro bíblico solemne y conserva el sentido de construir una casa/edificio. «Construir» sería correcto, pero menos tradicional en este contexto.
- source_word: בַּיִת
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - una casa
  - un templo
  lexicon: HALOT
  rationale: Se mantiene «casa» para respetar la fórmula hebrea «casa para el nombre de Yahvé». Aunque el referente es el templo, traducir «templo» reduciría la densidad literal de la expresión.
- source_word: לְשֵׁם
  english_pob_choice: for the name of
  chosen_spanish: para el nombre de
  alternatives_spanish:
  - para la honra de
  - para la fama de
  lexicon: HALOT
  rationale: Se preserva la fórmula cultual «para el nombre de», que en Crónicas tiene peso teológico propio. No se parafrasea como «honra» o «fama» para no borrar la expresión técnica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Siguiendo el estándar del proyecto en español, se usa «Yahvé» para el Tetragrámaton, evitando la sustitución por una mayúscula de título. Se mantiene la distinción personal del nombre divino.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción se vierte en la forma española más natural y establecida. Conserva el título pactual sin añadir matices ajenos al hebreo.
theological_decisions:
- issue: Fórmula templaria «casa para el nombre de Yahvé»
  english_pob_reading: a house for the name of Yahweh
  chosen_spanish_reading: una casa para el nombre de Yahvé
  alternative_spanish_readings:
  - un templo para Yahvé
  - una casa para la honra de Yahvé
  rationale: La frase hebrea subraya la relación del edificio con el «nombre» divino, una fórmula teológica de Crónicas que no conviene diluir. «Casa» y «nombre» se preservan para mantener la lógica interna del texto.
  doctrine_reference: 'Translation philosophy #3 and #5; contested terms table for יְהוָה'
- issue: Uso del nombre divino
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue el principio del proyecto de transparentar el Tetragrámaton como nombre propio. En este versículo no hay una cita griega que obligue a una sustitución por «Señor».
  doctrine_reference: Project-level terminology defaults for יהוה / YHWH
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando ambos marcadores de nota en el texto español. La redacción conserva el valor narrativo de וַיְהִי, la imagen idiomática de עִם לְבַב y la fórmula cultual de לְשֵׁם sin depender mecánicamente del inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española del Tetragrámaton, coherente con el estándar del proyecto.
  - «Casa» se preserva para reflejar la fórmula hebrea y evitar el reemplazo interpretativo por «templo».
  - El orden «David mi padre» sigue de cerca la secuencia hebrea y resulta natural en español.
  - No se introducen términos doctrinales ajenos al versículo; el tono es bíblico, sobrio y publicable.
