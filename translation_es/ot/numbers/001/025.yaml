  lexicon: HALOT
  rationale: En este contexto censal, el participio pasivo de פקד se refiere a los que han sido contados o registrados. «Los contados» conserva el valor censal sin añadir «hombres», que no aparece explícitamente en este versículo aislado.
- source_word: לְמַטֵּה
  english_pob_choice: from the tribe of
  chosen_spanish: de la tribu de
  alternatives_spanish:
  - para la tribu de
  - pertenecientes a la tribu de
  lexicon: HALOT
  rationale: La preposición + מַטֶּה expresa afiliación tribal en esta fórmula de censo. En español, «de la tribu de» es natural y fiel al sentido relacional.
- source_word: גָד
  english_pob_choice: Gad
  chosen_spanish: Gad
  alternatives_spanish:
  - —
  lexicon: propio
  rationale: Nombre propio tribal; se conserva sin transliteración adicional.
- source_word: חֲמִשָּׁה וְאַרְבָּעִים אֶלֶף
  english_pob_choice: forty-five thousand
  chosen_spanish: cuarenta y cinco mil
  alternatives_spanish:
