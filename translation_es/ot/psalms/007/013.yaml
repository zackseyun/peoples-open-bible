translation:
  language: es
  text: Si no se vuelve[a], afilará su espada[b]; ha tensado su arco y lo ha preparado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se arrepiente». El verbo hebreo significa «volver/retornar» y, según el contexto, puede llevar el sentido de arrepentimiento.'
    reason: lexical_alternative
  - marker: b
    text: Los pronombres pueden referirse a Dios, que prepara armas de juicio contra el que no se arrepiente, o, menos probablemente, al impío que prepara sus propias armas.
    reason: alternative_reading
  - marker: c
    text: 'O: «y lo ha dejado listo».'
    reason: previous_rendering
lexical_decisions:
- source_word: אִם לֹא
  english_pob_choice: If ... not
  chosen_spanish: Si no
  alternatives_spanish:
  - A menos que
  - Ciertamente, si no
  lexicon: HALOT
  rationale: La estructura condicional hebrea se conserva de manera directa y natural en español con «Si no», sin suavizar el vínculo lógico del texto.
- source_word: יָשׁוּב
  english_pob_choice: he does not turn back
  chosen_spanish: se vuelve atrás
  alternatives_spanish:
  - se arrepiente
  - regresa
  lexicon: HALOT
  rationale: שׁוּב significa de forma básica «volver/retornar». «Se vuelve atrás» mantiene ese sentido amplio y deja abierta la posible resonancia de arrepentimiento sin imponerla en el texto principal.
- source_word: חַרְבּוֹ
  english_pob_choice: his sword
  chosen_spanish: su espada
  alternatives_spanish:
  - su arma
  lexicon: HALOT
  rationale: El sustantivo con sufijo posesivo se traduce de manera directa y transparente como «su espada».
- source_word: יִלְטוֹשׁ
  english_pob_choice: he will sharpen
  chosen_spanish: afilará
  alternatives_spanish:
  - despuntará
  - amolará
  lexicon: HALOT
  rationale: El verbo expresa la acción de afilar o whet una hoja. «Afilará» es la forma más clara y natural en español moderno.
- source_word: קַשְׁתּוֹ
  english_pob_choice: his bow
  chosen_spanish: su arco
  alternatives_spanish:
  - su arco de guerra
  lexicon: HALOT
  rationale: La referencia al arco se expresa con el equivalente usual en español, manteniendo la imagen bélica del hebreo.
- source_word: דָרַךְ
  english_pob_choice: he has bent
  chosen_spanish: ha doblado
  alternatives_spanish:
  - ha tensado
  - ha armado
  lexicon: HALOT
  rationale: Para un arco, דָרַךְ puede referirse a tensarlo o prepararlo para disparar. «Ha doblado» conserva la imagen corporal del hebreo y resulta comprensible en español, aunque el verbo puede sonar más literal que «ha tensado».
- source_word: וַיְכוֹנְנֶהָ
  english_pob_choice: and made it ready
  chosen_spanish: lo ha dejado listo
  alternatives_spanish:
  - lo ha preparado
  - lo ha dispuesto
  lexicon: HALOT
  rationale: El verbo comunica preparar, establecer o dejar listo. «Lo ha dejado listo» capta bien la idea funcional de dejar el arco preparado para el uso; se evita una repetición menos natural de «preparó».
theological_decisions:
- issue: Referente de los pronombres en la segunda cola
  english_pob_reading: The subject is God as the warrior-judge preparing weapons of judgment.
  chosen_spanish_reading: La redacción mantiene la ambigüedad del hebreo sin resolver el sujeto explícitamente en el texto principal.
  alternative_spanish_readings:
  - Dios prepara sus armas de juicio contra el impío.
  - El impío prepara sus propias armas.
  rationale: El hebreo permite más de una lectura sobre quién toma el arco y la espada. En español, el texto principal conserva la forma impersonal/ambigua de la secuencia verbal, mientras que la nota preserva la tensión interpretativa documentada en la tradición de la POB en inglés.
  doctrine_reference: Preservar la ambigüedad textual cuando el original no la resuelve de manera inequívoca.
translation_notes:
  revision_awareness: La base inglesa revisada más reciente conserva «made it ready»; por eso la versión española usa una forma formal y natural («lo ha dejado listo») que refleja esa decisión final, sin perder la posibilidad alternativa documentada en la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el proyecto cuando el hebreo explicite el nombre divino; en este verso no aparece.
  - Se usa «espada» y «arco» como léxico bélico directo, sin introducir términos litúrgicos o interpretativos ajenos al hebreo.
  - La ambigüedad del sujeto se conserva en la formulación verbal y se explica en la nota, en lugar de resolverla en el texto principal.
