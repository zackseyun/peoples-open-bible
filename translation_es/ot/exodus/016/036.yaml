translation:
  language: es
  text: Ahora bien, un ómer es la décima parte de un éfah[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Un ómer y un éfah son antiguas medidas hebreas de grano; el versículo define el ómer como la décima parte de un éfah.
    reason: cultural_note
lexical_decisions:
- source_word: וְ/הָ/עֹמֶר
  english_pob_choice: Now an omer
  chosen_spanish: Ahora bien, un omer
  alternatives_spanish:
  - Y un omer
  - Ahora un omer
  lexicon: HALOT
  rationale: 'עֹמֶר designa una medida de grano y se conserva mejor por transliteración. El hebreo lleva artículo, pero en una enunciación definitoria el español suena más natural con artículo indefinido: ''un omer''. ''Ahora bien'' reproduce con naturalidad el valor explicativo o parentético de וְ en este contexto.'
- source_word: עֲשִׂרִית
  english_pob_choice: a tenth
  chosen_spanish: la décima parte
  alternatives_spanish:
  - una décima parte
  - un décimo
  lexicon: HALOT
  rationale: El sustantivo/ordinal expresa una fracción de medida. 'La décima parte' comunica con claridad la relación cuantitativa y conserva el carácter definitorio del verso.
- source_word: הָאֵיפָה
  english_pob_choice: of an ephah
  chosen_spanish: de un efa
  alternatives_spanish:
  - del efa
  - de la efa
  lexicon: HALOT
  rationale: אֵיפָה es otra medida hebrea de capacidad seca y se conserva por transliteración. En español, 'de un efa' expresa mejor la equivalencia de medida en una frase definitoria que 'del efa', que suena más determinado de lo que pide el contexto.
- source_word: הוּא
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - equivale a
  - se trata de
  lexicon: HALOT
  rationale: El pronombre funciona como cópula en una cláusula nominal. En español, 'es' conserva la relación definitoria sin añadir matices ajenos.
- source_word: וְ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Pues
  lexicon: HALOT
  rationale: La conjunción introduce una aclaración explicativa, no una secuencia narrativa estricta. 'Ahora bien' refleja ese giro discursivo con mayor naturalidad en español.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada coinciden en un enunciado definitorio sobre equivalencias de medida; no se requiere ajuste textual ni nota crítica.
  spanish_consistency_notes:
  - Se preservan como transliteraciones las unidades de medida antiguas, evitando equivalentes modernos imprecisos.
  - Se mantiene el tono definitorio y breve del hebreo.
  - '''Ahora bien'' se usa para reflejar el valor explicativo de la conjunción inicial sin sonar arcaico.'
