revisions:
- from: sino solamente en el lugar que Yahvé tu Dios escogerá para hacer habitar allí su nombre; allí sacrificarás el Pascua[a] por la tarde, al ponerse el sol, en el tiempo señalado de tu salida de Egipto.
  to: sino solamente en el lugar que Yahvé tu Dios escogerá para hacer habitar allí su nombre[a]; allí sacrificarás la Pascua[b] por la tarde, al ponerse el sol, en el tiempo señalado de tu salida de Egipto.
  rationale: Se corrigió el error gramatical «el Pascua» a «la Pascua». También se añadieron notas léxicas que preservan alternativas significativas documentadas en la auditoría inglesa para el idioma del nombre que habita y para el verbo sacrificial, sin recargar el texto principal.
