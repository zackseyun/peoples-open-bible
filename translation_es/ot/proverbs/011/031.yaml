review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del hebreo y el argumento a fortiori: הֵן como llamada de atención, el singular representativo «el justo», בָּאָרֶץ como ámbito terrenal, y אַף כִּי como «cuánto más». Sin embargo, «es recompensado» tiende en español a una lectura positiva de premio y no preserva tan bien como el inglés «is repaid» la amplitud de יְשֻׁלָּם, que puede abarcar retribución debida sin especificar si es favorable o aflictiva.'
  spanish_quality_summary: 'El texto es claro y legible en español general. «Mira» funciona, aunque «Miren»/«He aquí» serían otras opciones; no es un problema mayor. El punto principal de calidad es léxico-teológico: «recompensado» suena más estrecho y positivo de lo deseable. La nota al pie también necesita ajuste porque repite «la tierra/la tierra» y añade un «si» no presente en la alternativa formal documentada en inglés.'
  glossary_alignment: No hay conflicto con los términos globales del proyecto. «El justo», «el malvado» y «el pecador» son adecuados. La revisión propuesta usa «es retribuido», que preserva mejor la decisión auditada para יְשֻׁלָּם sin apartarse del estilo bíblico natural en español.
  issues:
  - severity: medium
    issue: «es recompensado» estrecha el sentido de יְשֻׁלָּם
    rationale: En español, «recompensar» sugiere principalmente premio o beneficio. El audit trail insiste en mantener una retribución amplia y no resolver si se trata de premio, corrección o ambas cosas. «Es retribuido» o «recibe su paga» conservan mejor esa tensión.
  - severity: low
    issue: La nota al pie está formulada de manera imprecisa y redundante
    rationale: Dice «la tierra/la tierra», lo cual es un error claro, y la alternativa «He aquí, si el justo...» no corresponde exactamente a la opción formal documentada, que es más bien «He aquí, el justo será retribuido en la tierra / en la tierra». Conviene limpiar la nota y reflejar mejor las alternativas «He aquí» / «de hecho» y «en la tierra» / «en el país».
  revised_spanish_text: Mira[a], si el justo es retribuido en la tierra, ¡cuánto más el malvado y el pecador!
  revised_footnotes:
  - marker: a
    text: 'O «De hecho, el justo es retribuido en la tierra»; el hebreo también puede traducirse de manera más formal: «He aquí, el justo será retribuido en la tierra/el país».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «recompensado» por «retribuido» para preservar mejor la amplitud semántica de יְשֻׁלָּם y la tensión teológica documentada en el expediente inglés. Se corrige la nota para eliminar la redundancia, alinear mejor las alternativas con el audit trail y ofrecer una formulación española natural y precisa.
