translation:
  language: es
  text: He visto a un necio que echaba raíces[a], y de repente maldije su morada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «declaré su morada maldita» o «marqué su morada como condenada». El verbo hebreo puede entenderse como una maldición directa o como un pronunciamiento observacional de juicio.'
    reason: alternative_reading
lexical_decisions:
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: He visto
  alternatives_spanish:
  - Yo he visto
  - Yo vi
  lexicon: HALOT
  rationale: El hebreo conserva el pronombre explícito para énfasis; en español puede quedar implícito sin perder el valor testimonial. Se mantiene el perfecto compuesto para reproducir bien el matiz de experiencia constatada.
- source_word: רָאִיתִי
  english_pob_choice: have seen
  chosen_spanish: He visto
  alternatives_spanish:
  - vi
  lexicon: HALOT
  rationale: El perfecto hebreo presenta una experiencia observada por el hablante; el perfecto compuesto español comunica bien ese carácter testimonial y su vigencia en la memoria del hablante.
- source_word: אֱוִיל
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un necio insensato
  - un hombre necio
  lexicon: HALOT
  rationale: En literatura sapiencial, אֱוִיל designa al necio moral y espiritualmente, no solo al poco inteligente. 'Necio' conserva mejor esa carga sapiencial que un término meramente descriptivo.
- source_word: מַשְׁרִישׁ
  english_pob_choice: taking root
  chosen_spanish: que echaba raíces
  alternatives_spanish:
  - arraigándose
  - que se establecía
  lexicon: HALOT
  rationale: El participio hifil de שׁרשׁ expresa la idea de echar raíces o hacerse firme. 'Que echaba raíces' conserva la metáfora vegetal y la apariencia de estabilidad/prosperidad.
- source_word: וָאֶקּוֹב
  english_pob_choice: I cursed
  chosen_spanish: maldije
  alternatives_spanish:
  - declaré maldita
  - pronuncié una maldición contra
  lexicon: HALOT
  rationale: El verbo permite el sentido de maldecir o pronunciar una sentencia de maldición. 'Maldije' es la forma más directa y natural en español, sin perder la fuerza del acto verbal.
- source_word: נָוֵהוּ
  english_pob_choice: his dwelling
  chosen_spanish: su morada
  alternatives_spanish:
  - su casa
  - su habitación
  - su vivienda
  lexicon: HALOT
  rationale: נָוֶה puede referirse a morada, habitación o lugar de residencia. 'Morada' es amplio, digno y suficientemente literal para conservar la imagen sin estrecharla innecesariamente.
- source_word: פִתְאֹם
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - de pronto
  - súbitamente
  lexicon: HALOT
  rationale: El adverbio expresa brusquedad e inmediatez. 'De repente' es natural en español y mantiene el impacto del giro súbito del juicio.
theological_decisions:
- issue: 'Alcance de וָאֶקּוֹב: curse vs. declarative judgment'
  english_pob_reading: Elifaz says he himself pronounced a curse on the fool's dwelling after seeing the fool become established.
  chosen_spanish_reading: Elifaz dice que él mismo maldijo la morada del necio tras verlo prosperar o echar raíces.
  alternative_spanish_readings:
  - Elifaz dice que declaró maldita su morada.
  - Elifaz dice que marcó su morada como condenada.
  rationale: La fuerza léxica de נקב, en este contexto poético, admite una maldición explícita; sin embargo, la nota inglesa preserva la posibilidad de entenderlo como una declaración de condena. Por eso la redacción principal usa 'maldije' y la nota ofrece la alternativa interpretativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión inglesa sustituyó 'but' por 'and' para reflejar mejor la conjunción hebrea. En español se ha usado 'y', que mantiene esa relación coordinante sin introducir contraste no presente en el hebreo.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como norma del proyecto cuando aparezca el Tetragrámaton; aquí no aparece, así que no aplica.
  - '''Necio'' se usa en sentido sapiencial, alineado con la terminología del proyecto para אֱוִיל.'
  - La nota al pie mantiene la tensión interpretativa documentada en el audit trail entre maldecir y declarar condenado.
