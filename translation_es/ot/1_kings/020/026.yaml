    rationale: La expresión hebrea significa literalmente 'al retorno/vuelta del año', es decir, cuando el ciclo anual vuelve. 'Al comenzar el año' puede sugerir específicamente enero o inicio formal del año, una precisión no presente en el original ni en la auditoría inglesa.
  - severity: low
    issue: La nota [a] tiene redacción y puntuación mejorables.
    rationale: Empieza y termina con comillas innecesarias y 'vuelve a comenzar' duplica la idea de retorno. Puede expresarse con mayor naturalidad y fidelidad.
