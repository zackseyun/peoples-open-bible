    text: O sencillamente, «dijeron».
    reason: Estilo/seguimiento opcional del marcador presente en el inglés POB sobre la apertura de cita, sin afectar el sentido principal.
  - marker: b
    text: 'O: «nos ha llamado». El hebreo puede denotar que Dios se ha encontrado con ellos o que los ha convocado.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el borrador para alinear mejor el español con el hebreo y con el audit trail POB: se conserva «ha salido a nuestro encuentro» para נִקְרָא עָלֵינוּ, pero se evita repetir ese giro en יִפְגָּעֵנוּ, donde el contexto exige un matiz de juicio; se cambia a «déjanos ir» para expresar la petición al faraón; se sustituye «por un camino de tres días» por «un viaje de tres días»; y se reemplaza «sacrificaremos» por un exhortativo natural en español. También se corrige la nota léxica alternativa para que refleje fielmente «nos ha llamado».'
