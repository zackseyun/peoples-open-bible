id: GEN.47.11
reference: Genesis 47:11
source:
  edition: WLC
  text: וַ/יּוֹשֵׁ֣ב יוֹסֵף֮ אֶת אָבִ֣י/ו וְ/אֶת אֶחָי/ו֒ וַ/יִּתֵּ֨ן לָ/הֶ֤ם אֲחֻזָּה֙ בְּ/אֶ֣רֶץ מִצְרַ֔יִם בְּ/מֵיטַ֥ב הָ/אָ֖רֶץ בְּ/אֶ֣רֶץ רַעְמְסֵ֑ס כַּ/אֲשֶׁ֖ר צִוָּ֥ה פַרְעֹֽה־־׃
translation:
  text: So Joseph settled his father and his brothers[a], and gave them a possession in the land of Egypt, in the best part of the land, in the land of Rameses, just as Pharaoh had commanded.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'the choicest part of the land.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיּוֹשֵׁב
  chosen: settled
  alternatives:
  - caused to dwell
  - established
  lexicon: HALOT
  rationale: 'Hiphil of ישׁב is causative: Joseph caused his family to dwell/reside. ''Settled'' gives natural English while preserving the causative sense better than a simple ''placed'' or overly wooden ''caused to dwell.'''
- source_word: אָבִיו וְאֶת־אֶחָיו
  chosen: his father and his brothers
  alternatives:
  - his father and his family
  lexicon: HALOT
  rationale: The Hebrew explicitly names father and brothers, so the translation keeps those kinship terms rather than broadening to 'family.' 'Brothers' is gender-accurate to the source.
- source_word: וַיִּתֵּן לָהֶם אֲחֻזָּה
  chosen: gave them a possession
  alternatives:
  - gave them property
  - gave them a holding
  - gave them an inheritance
  lexicon: HALOT
  rationale: אֲחֻזָּה denotes a landed holding or possession. 'Possession' preserves the concrete land-tenure sense without importing the covenantal overtones that 'inheritance' can carry in English.
- source_word: בְּאֶרֶץ מִצְרַיִם
  chosen: in the land of Egypt
  alternatives:
  - in Egypt
  lexicon: HALOT
  rationale: The repeated אֶרֶץ language is retained as 'land' for clarity and literary consistency in the verse.
- source_word: בְּמֵיטַב הָאָרֶץ
  chosen: in the best of the land
  alternatives:
  - in the best part of the land
  - in the choicest part of the land
  lexicon: HALOT
  rationale: מֵיטַב refers to the best or choicest portion. 'The best of the land' is idiomatic and close to the Hebrew construction.
- source_word: בְּאֶרֶץ רַעְמְסֵס
  chosen: in the land of Rameses
  alternatives:
  - in the region of Rameses
  lexicon: HALOT
  rationale: The proper name is transliterated per project philosophy. Repeating 'land' mirrors the Hebrew and may denote a district/territory associated with Rameses.
- source_word: כַּאֲשֶׁר צִוָּה פַרְעֹה
  chosen: just as Pharaoh had commanded
  alternatives:
  - as Pharaoh commanded
  - according to Pharaoh's command
  lexicon: HALOT
  rationale: The clause indicates conformity to Pharaoh's prior order. The pluperfect 'had commanded' fits the narrative sequence in English.
