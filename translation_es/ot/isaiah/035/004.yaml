translation:
  language: es
  text: 'Diles a los de corazón ansioso[a]: “Sean fuertes; no teman. Miren, su Dios vendrá con venganza, con la retribución de Dios[b]; él mismo vendrá y los salvará.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “de corazón apresurado”, es decir, de ánimo agitado o presa del pánico.
    reason: lexical_alternative
  - marker: b
    text: O “con la retribución de Dios”.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִמְהֲרֵי לֵב
  english_pob_choice: those with an anxious heart
  chosen_spanish: los de corazón apurado
  alternatives_spanish:
  - los de corazón ansioso
  - los de corazón apresurado
  - los de corazón temeroso
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente “apresurados de corazón”, pero en contexto describe a quienes están internamente agitados o sobresaltados. “Corazón apurado” conserva la idea idiomática sin convertirla en una paráfrasis extensa. “Ansioso” es posible, pero “apurado” mantiene mejor la imagen de prontitud/agitación que subyace al hebreo.
- source_word: חִזְקוּ
  english_pob_choice: Be strong
  chosen_spanish: Sean fuertes
  alternatives_spanish:
  - Tengan valor
  - Fortalézcanse
  - Cobren ánimo
  lexicon: HALOT
  rationale: El imperativo plural pide fortaleza o valentía. “Sean fuertes” es directo, natural en español y mantiene el tono exhortativo del original.
- source_word: אַל תִּירָאוּ
  english_pob_choice: do not fear
  chosen_spanish: no teman
  alternatives_spanish:
  - no tengan miedo
  - no teman ni se asusten
  lexicon: HALOT
  rationale: La prohibición negativa de ירא se expresa con claridad mediante “no teman”, que conserva el registro bíblico y la brevedad del hebreo.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren aquí
  - Vean
  - He aquí
  lexicon: HALOT
  rationale: La partícula introduce atención inmediata a lo que sigue. “Miren” funciona de manera natural en español y conserva la fuerza deíctica sin arcaizar en exceso.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - vuestro Dios
  lexicon: HALOT
  rationale: El sufijo de segunda persona plural se refleja con “su Dios” en español neutro. Se evita “SEÑOR” porque aquí el hebreo dice explícitamente אֱלֹהֵיכֶם, no el tetragrámaton.
- source_word: נָקָם
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - justicia vengadora
  - desquite
  - vindicación
  lexicon: HALOT
  rationale: El sustantivo designa venganza o acto vengador. “Venganza” es la correspondencia más directa y preserva la tensión entre juicio y liberación.
- source_word: גְּמוּל אֱלֹהִים
  english_pob_choice: with the recompense of God
  chosen_spanish: con la retribución de Dios
  alternatives_spanish:
  - con el pago de Dios
  - con la recompensa de Dios
  - con la retribución divina
  lexicon: HALOT
  rationale: La construcción puede decirse literalmente “la retribución de Dios”, y en español esa forma conserva mejor el enlace lexical con אֱלֹהִים que una versión más abstracta. “Retribución” mantiene el sentido de paga/repago sin suavizar el matiz judicial del texto.
- source_word: הוּא
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - justamente él
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. “Él mismo” preserva esa insistencia en que Dios vendrá personalmente.
- source_word: וְיֹשַׁעֲכֶם
  english_pob_choice: and save you
  chosen_spanish: y los salvará
  alternatives_spanish:
  - y los librará
  - y los rescatará
  lexicon: HALOT
  rationale: El verbo hiphil de ישׁע abarca salvar/deliverar. “Salvará” es la opción más amplia y teológicamente transparente; el objeto plural se refleja con “los”.
theological_decisions:
- issue: Venganza y salvación en la misma venida de Dios
  english_pob_reading: 'Render both motifs directly: God comes in vengeance/recompense against enemies and in salvation for his people.'
  chosen_spanish_reading: 'Mantener ambos motivos de forma directa: Dios viene con venganza/retribución y también para salvar a su pueblo.'
  alternative_spanish_readings:
  - Suavizar venganza en justicia general
  - Interpretar la salvación solo en sentido espiritual
  rationale: El hebreo coloca lado a lado la venganza/retribución y la acción salvadora. La redacción española conserva esa tensión sin resolverla ni diluirla, siguiendo la lectura auditada de la POB inglesa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: El borrador sigue de cerca el último estado auditado en inglés, pero ajusta el español para que la oposición entre venganza/retribución y salvación suene natural y transparente. También conserva la referencia explícita a Dios en אֱלֹהִים mediante “retribución de Dios”, siguiendo la revisión inglesa más reciente que prefirió una correspondencia más cercana al hebreo.
  spanish_consistency_notes:
  - Se usó “Dios” para אֱלֹהֵיכֶם y אֱלֹהִים, conforme al criterio base del proyecto.
  - Se evitó “SEÑOR” porque el verso no contiene el tetragrámaton.
  - Se mantuvo el paralelismo entre venida, venganza/retribución y salvación sin armonizarlo teológicamente.
  - Los marcadores de nota a y b aparecen anclados en el texto donde corresponde.
