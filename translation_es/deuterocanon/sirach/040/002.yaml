translation:
  language: es
  text: desde el día en que sale del vientre de su madre hasta el día en que vuelve[a] a la madre de todos los vivientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente, «a la madre de todos los vivientes». Es una expresión poética que probablemente se refiere a la tierra como la madre común a la que los seres humanos vuelven en la muerte. El paralelo griego hace explícita la referencia a la muerte: «el día de la muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: מיום
  english_pob_choice: from the day
  chosen_spanish: desde el día
  alternatives_spanish:
  - desde que
  - a partir del día
  lexicon: HALOT
  rationale: La construcción marca el punto de inicio de un período temporal. «Desde el día» conserva ese límite inicial de manera natural en español y refleja bien el valor de מן + יום.
- source_word: צאתו
  english_pob_choice: he comes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale a la luz
  - nace
  lexicon: HALOT
  rationale: El sustantivo/verbo de יצא se mantiene con imagen concreta de salida. En el contexto del vientre materno, «sale» comunica el hecho del nacimiento sin perder la literalidad base que el inglés POB preservó con «comes out».
- source_word: מרחם אמו
  english_pob_choice: from his mother's womb
  chosen_spanish: del vientre de su madre
  alternatives_spanish:
  - del seno de su madre
  - del vientre materno
  lexicon: HALOT
  rationale: «Womb» se vierte de forma natural como «vientre» en español bíblico moderno. La posesión queda en «su madre», manteniendo la referencia personal y la imagen corporal.
- source_word: עד יום
  english_pob_choice: until the day
  chosen_spanish: hasta el día
  alternatives_spanish:
  - hasta que llegue el día
  - hasta el día en que
  lexicon: HALOT
  rationale: La fórmula marca el término del mismo lapso vital. «Hasta el día» reproduce con claridad la estructura temporal del hebreo y sigue el patrón del inglés auditado.
- source_word: שובו
  english_pob_choice: he returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - regresa
  - retorna
  lexicon: HALOT
  rationale: שוב expresa retorno. «Vuelve» conserva la sencillez y el paralelo verbal con «sale», sin cargar el verso con un registro más técnico o literario de más.
- source_word: אל אם כל חי
  english_pob_choice: to the mother of all the living
  chosen_spanish: a la madre de todos los vivientes
  alternatives_spanish:
  - a la madre de todo lo viviente
  - a la madre de todos los seres vivos
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea en lugar de resolverla en el texto principal como «la tierra» o «la tumba». «Vivientes» conserva el carácter poético y el alcance de כל חי, además de preservar la tensión interpretativa documentada en la POB inglesa.
theological_decisions:
- issue: La metáfora de «la madre de todos los vivientes» como alusión a la muerte y/o a la tierra
  english_pob_reading: Retain the Hebrew metaphor in the main text rather than replacing it with an explicit interpretive gloss like 'the earth' or 'death.'
  chosen_spanish_reading: Conservar la metáfora en el texto principal, con una nota que aclare que probablemente alude a la tierra como madre común a la que vuelve el ser humano en la muerte.
  alternative_spanish_readings:
  - a la tierra
  - a la tumba
  - a la muerte
  rationale: La fuente hebrea usa una expresión poética que no debe resolverse por completo dentro del verso. La paralelo griego, al explicitar «el día de la muerte», confirma que el sentido apunta al término de la vida mortal, pero la imagen original merece permanecer visible en la traducción principal.
  doctrine_reference: 'Principio POB: primacía de la fuente original y preservación de la tensión literaria cuando el texto la presenta.'
translation_notes:
  revision_awareness: La redacción sigue la revisión auditada que prefirió «out of» frente a una forma menos natural y mantuvo «all living» como expresión idiomática. En español, eso se refleja en «sale del vientre» y «todos los vivientes», preservando la imagen hebrea sin forzar una paráfrasis explicativa en el cuerpo del verso.
  spanish_consistency_notes:
  - Se usa «vivientes» para mantener el alcance colectivo de כל חי y conservar el tono poético.
  - No se sustituye la metáfora por «tierra» en el texto principal, para respetar la decisión documental del POB inglés.
  - La nota al pie conecta explícitamente con el paralelo griego, que añade el matiz de la muerte sin desplazar la imagen hebrea.
