revisions:
- from: Y se levantaron contra los dos ancianos, porque Daniel los había dejado convictos, por su propia boca, de ser falsos testigos, y les hicieron lo mismo que ellos habían planeado maliciosamente hacer.
  to: Y se levantaron contra los dos ancianos, porque Daniel había probado, por sus propias palabras, que eran falsos testigos, y les hicieron lo mismo que ellos habían planeado maliciosamente hacer.
  rationale: Se reemplaza «los había dejado convictos» por «había probado… que eran falsos testigos» para conservar el sentido forense de συνέστησεν en un español más natural y ampliamente legible. También se ajusta «por su propia boca» a «por sus propias palabras» para expresar con mayor claridad el valor testimonial de ἐκ τοῦ στόματος αὐτῶν sin perder la fuerza jurídica. No se requieren notas nuevas.
