translation:
  language: es
  text: Y el sacerdote hará expiación por él delante de Yahvé con el carnero de la ofrenda por la culpa[a], por el pecado que cometió; y se le perdonará el pecado que cometió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con el carnero de la ofrenda de reparación». El hebreo אָשָׁם puede denotar tanto la culpa como el aspecto compensatorio o reparador de este sacrificio.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִפֶּר
  english_pob_choice: shall make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará atonación
  - hará propiciación
  lexicon: HALOT
  rationale: En contexto sacerdotal sacrificial, כפר expresa el acto ritual de expiar por alguien. «Hará expiación» conserva el sentido cultual con buena naturalidad en español y evita reducirlo a una sola teoría teológica.
- source_word: עָלָיו
  english_pob_choice: for him
  chosen_spanish: por él
  alternatives_spanish:
  - en favor de él
  - a favor de él
  lexicon: HALOT
  rationale: Con כפר, על indica la persona beneficiaria de la expiación. «Por él» es la forma más breve y natural en español, sin perder el valor vicario.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  lexicon: HALOT
  rationale: El término normal para el agente cultual en español bíblico y contemporáneo es «sacerdote».
- source_word: בְּאֵיל הָאָשָׁם
  english_pob_choice: with the ram of the guilt offering
  chosen_spanish: con el carnero de la ofrenda por la culpa
  alternatives_spanish:
  - con el carnero de la ofrenda de reparación
  - con el carnero de la ofrenda por el pecado
  lexicon: HALOT
  rationale: איל es «carnero». Para אָשָׁם, el POB inglés preserva la tensión entre culpa y reparación; en español, «ofrenda por la culpa» mantiene el vínculo con la culpa documentada en la nota inglesa, mientras que «de reparación» queda como alternativa reconocida.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: La fórmula cultual espacial pide una preposición reverencial y clara. Se conserva el nombre divino «Yahvé» según la norma del proyecto, sin sustituirlo por una máscara litúrgica.
- source_word: עַל חַטָּאתוֹ אֲשֶׁר חָטָא
  english_pob_choice: for the sin that he committed
  chosen_spanish: por el pecado que cometió
  alternatives_spanish:
  - por su pecado que cometió
  - a causa del pecado que cometió
  lexicon: HALOT
  rationale: La construcción hebrea concentra la ofensa en un sustantivo cognado. «Pecado que cometió» refleja bien el vínculo verbal sin sonar forzado en español; se evita el posesivo innecesario para seguir la revisión inglesa.
- source_word: וְנִסְלַח לוֹ
  english_pob_choice: and he shall be forgiven
  chosen_spanish: y le será perdonado
  alternatives_spanish:
  - y será perdonado
  - y se le perdonará
  lexicon: HALOT
  rationale: La pasiva hebrea se vierte con una pasiva natural en español, manteniendo el agente implícito. «Le será perdonado» es formal y transparente.
- source_word: מֵחַטָּאתוֹ אֲשֶׁר חָטָא
  english_pob_choice: for the sin that he committed
  chosen_spanish: por el pecado que cometió
  alternatives_spanish:
  - de su pecado que cometió
  - del pecado que cometió
  lexicon: HALOT
  rationale: Aunque el hebreo usa מִן, la fórmula de perdón en español suena más fiel y clara con «por» que con un literal «de». Se conserva la correspondencia semántica con la primera mención de la ofensa.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto fuente usa el Tetragramatón y el proyecto español fija «Yahvé» como forma principal. Se evita la convención de ocultamiento por «SEÑOR» para mantener la transparencia auditiva y textual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de אָשָׁם
  english_pob_reading: guilt offering / reparation offering
  chosen_spanish_reading: ofrenda por la culpa
  alternative_spanish_readings:
  - ofrenda de reparación
  - ofrenda por la culpa y reparación
  rationale: 'La nota inglesa preserva la doble posibilidad: culpa y aspecto reparador. En español, «ofrenda por la culpa» mantiene el valor lexical principal y deja abierta la dimensión reparadora sin imponer una sola reconstrucción doctrinal.'
  doctrine_reference: Levitical sacrificial terminology; lexical tension in אָשָׁם
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó la frase a «for the sin» para reflejar más directamente el hebreo y evitar un posesivo innecesario. La redacción española sigue esa misma preferencia con «por el pecado que cometió» en ambas apariciones, y conserva la nota alternativa sobre אָשָׁם.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, conforme al estándar del proyecto.
  - «Expiación» se reserva para el acto sacrificial de כפר en contexto sacerdotal.
  - Se mantiene «pecado que cometió» en ambas cláusulas para reflejar la construcción cognada hebrea sin sobretraducción.
  - La nota al pie está anclada explícitamente en «ofrenda por la culpa[a]», evitando marcadores huérfanos.
