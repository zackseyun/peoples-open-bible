    reason: lexical_alternative
  - marker: b
    text: «Abel» es la forma abreviada de Abel-bet-maacá, la ciudad sitiada en este contexto.
    reason: cultural_note
  revision_rationale: Se reemplazó «con certeza» por una formulación española natural que no distorsiona el valor del infinitivo absoluto, y se cambió el cierre a un imperfecto habitual («daban fin al asunto») para reflejar el carácter proverbial de la cita. También se ajustó la nota alternativa para conservar mejor las opciones léxicas documentadas en el audit trail inglés.
