translation:
  language: es
  text: 'Y Tobías comenzó[a] a decir: «Bendito seas, oh Dios de nuestros padres, y bendito sea tu santo y glorioso nombre por los siglos; que te bendigan los cielos y toda tu creación»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «empezó».
    reason: lexical_alternative
  - marker: b
    text: O «todas tus criaturas». El griego puede abarcar toda la realidad creada, no solo seres vivos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξατο ... λέγειν
  english_pob_choice: began to say
  chosen_spanish: comenzó a decir
  alternatives_spanish:
  - empezó a decir
  - comenzó a hablar
  lexicon: BDAG
  rationale: La fórmula narrativa griega se expresa de modo natural en español con «comenzó a decir», conservando el inicio de la oración sin endurecer el estilo.
- source_word: Εὐλογητὸς
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Alabado
  - Bendecido
  lexicon: BDAG
  rationale: En una alabanza dirigida a Dios, «Bendito» reproduce bien la fórmula bíblica de bendición y su tono litúrgico.
- source_word: ὁ θεὸς τῶν πατέρων ἡμῶν
  english_pob_choice: O God of our fathers
  chosen_spanish: oh Dios de nuestros padres
  alternatives_spanish:
  - Dios de nuestros padres
  - oh Dios de nuestros antepasados
  lexicon: BDAG
  rationale: Se conserva el parentesco masculino explícito de πατέρων y el tono vocativo de la oración, evitando neutralizar la expresión sin base textual.
- source_word: τὸ ὄνομά σου τὸ ἅγιον καὶ ἔνδοξον
  english_pob_choice: your holy and glorious name
  chosen_spanish: tu santo y glorioso nombre
  alternatives_spanish:
  - tu nombre santo y glorioso
  - tu sagrado y glorioso nombre
  lexicon: BDAG
  rationale: «Santo» traduce ἅγιον de manera bíblica y transparente; el orden español con adjetivos pospuestos mantiene naturalidad sin perder el doble calificativo.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por los siglos de los siglos
  lexicon: BDAG
  rationale: Aunque el inglés opta por «forever», en español «por los siglos» conserva dignidad bíblica y refleja bien la idea de duración indefinida sin añadir de más.
- source_word: εὐλογησάτωσάν σε
  english_pob_choice: may ... bless you
  chosen_spanish: que te bendigan
  alternatives_spanish:
  - que te alaben
  - que te bendigan ellos
  lexicon: BDAG
  rationale: El imperativo jussivo en contexto de súplica se vierte naturalmente con «que te bendigan», que expresa el deseo/oración de manera clara en español.
- source_word: οἱ οὐρανοὶ
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - el cielo
  lexicon: BDAG
  rationale: Se conserva el plural griego con «los cielos», más fiel que singularizarlo y más natural en el registro bíblico.
- source_word: πᾶσαι αἱ κτίσεις σου
  english_pob_choice: all your creation
  chosen_spanish: toda tu creación
  alternatives_spanish:
  - todas tus criaturas
  - todo lo creado por ti
  lexicon: BDAG
  rationale: La revisión inglesa favorece el valor colectivo y comprensivo de κτίσεις; en español «toda tu creación» preserva ese alcance amplio sin restringirlo a seres vivos.
theological_decisions:
- issue: Forma de bendición dirigida a Dios
  english_pob_reading: Blessed are you... and blessed is your holy and glorious name forever
  chosen_spanish_reading: Bendito seas... y bendito sea tu santo y glorioso nombre por los siglos
  alternative_spanish_readings:
  - Alabado seas...
  - Bendito eres...
  rationale: Se mantiene la estructura de bendición litúrgica dirigida a Dios y a su nombre, sin convertirla en una mera alabanza genérica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Alcance de πᾶσαι αἱ κτίσεις σου
  english_pob_reading: all your creation
  chosen_spanish_reading: toda tu creación
  alternative_spanish_readings:
  - todas tus criaturas
  - todo lo creado
  rationale: La elección evita limitar el sentido a seres personales y conserva la amplitud cósmica de la expresión en el contexto de bendición universal.
  doctrine_reference: DOCTRINE.md §Lexical precision on creation language
- issue: Lenguaje paternal en la fórmula ancestral
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: Se retiene el paralelo directo con el griego y con la tradición bíblica, sin sustituirlo por una neutralización que no está exigida por el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Seguí la revisión más reciente del expediente inglés, que ajusta πᾶσαι αἱ κτίσεις a «all your creation». Por eso elegí «toda tu creación» en el texto principal, manteniendo el alcance colectivo y no restringido. También preservé la estructura de bendición y la fórmula ancestral con lenguaje de «padres», conforme al análisis auditado.
  spanish_consistency_notes:
  - Usé «Bendito seas»/«bendito sea» para mantener paralelismo con la doxología del griego.
  - Conservé el plural «los cielos» para οἱ οὐρανοί.
  - Elegí «tu creación» en singular colectivo porque refleja bien el valor inclusivo de κτίσεις en este contexto.
  - Apliqué un español litúrgico sobrio, evitando arcaísmos innecesarios pero conservando solemnidad bíblica.
