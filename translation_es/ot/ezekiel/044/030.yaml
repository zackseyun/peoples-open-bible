    text: 'O: «toda ofrenda de todas sus ofrendas». El término hebreo se refiere a una porción apartada y entregada para uso sagrado.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la primera porción de su masa amasada»; el término hebreo puede referirse a la masa o, por extensión, a la porción amasada.'
    reason: lexical_alternative
  - marker: c
    text: Es decir, para que la bendición descanse sobre tu casa.
    reason: lexical_alternative
  revision_rationale: Se corrige el error principal de sentido reemplazando «primogénito» por «la primera porción», que sí refleja רֵאשִׁית en contexto cultual. También se armoniza la segunda aparición de רֵאשִׁית con la misma idea léxica, se conserva «contribución» para תְּרוּמָה, y se mantienen «masa», «bendición» y «casa» según el análisis del POB. Las notas se pulen para español más natural sin alterar la justificación documentada.
