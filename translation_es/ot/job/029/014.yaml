revisions:
- from: Me vestí de justicia[a], y me cubrió[b]; mi justicia fue como un manto y un turbante.
  to: Me vestí de rectitud[a], y ella me vistió; mi justicia era como un manto y un turbante[b].
  rationale: La revisión restaura la repetición verbal de לבש con «me vestí … me vistió», siguiendo más de cerca el hebreo y la rationale del POB inglés. También distingue צֶדֶק («rectitud») de מִשְׁפָּטִי («mi justicia») para evitar aplanar dos términos emparentados pero no idénticos. Se conserva la imaginería de dignidad con «manto» y «turbante» y se mantiene una nota cultural útil.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:03:43Z'
