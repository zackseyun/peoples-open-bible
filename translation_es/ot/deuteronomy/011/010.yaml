translation:
  language: es
  text: Porque la tierra a la que entras para poseerla no es como la tierra de Egipto[a], de donde saliste, donde sembrabas tu semilla y la regabas con tu pie[b], como un huerto de hortalizas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «donde solías sembrar tu semilla y regarla con tu pie», reflejando la práctica habitual de irrigación en Egipto.'
    reason: alternative_reading
  - marker: b
    text: «Con tu pie» alude probablemente a una técnica de riego accionada con el pie o a dirigir el agua por canales mediante el pie.
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación de la afirmación precedente. «Porque» conserva la relación causal/explicativa sin sonar forzado en español bíblico moderno.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  lexicon: HALOT
  rationale: «Tierra» mantiene el campo semántico covenantal y geográfico de אֶרֶץ en Deuteronomio, y enlaza bien con el contraste con Egipto.
- source_word: בָא שָׁמָּה
  english_pob_choice: you are entering
  chosen_spanish: entras
  alternatives_spanish:
  - estás entrando
  - vas a entrar
  lexicon: HALOT
  rationale: El hebreo expresa movimiento inminente; «entras» da fluidez en español y preserva el sentido prospectivo sin sobrecargar la frase.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: para poseerla
  alternatives_spanish:
  - para tomar posesión de ella
  - para heredarl a
  lexicon: HALOT
  rationale: «Poseerla» reproduce bien el valor de ירשׁ en este contexto de ocupación pactal. «Heredar» sería posible, pero introduce un matiz filial menos explícito aquí.
- source_word: לֹא כְאֶרֶץ מִצְרַיִם
  english_pob_choice: is not like the land of Egypt
  chosen_spanish: no es como la tierra de Egipto
  alternatives_spanish:
  - no es igual a la tierra de Egipto
  - no es como la tierra egipcia
  lexicon: HALOT
  rationale: La comparación directa se conserva con una construcción natural en español. «Tierra de Egipto» mantiene el paralelo con la «tierra» prometida.
- source_word: אֲשֶׁר יְצָאתֶם מִשָּׁם
  english_pob_choice: from where you came out
  chosen_spanish: de donde saliste
  alternatives_spanish:
  - de donde salisteis
  - de donde habéis salido
  lexicon: HALOT
  rationale: El hebreo conserva el modismo del éxodo. «Salir» es la manera española más natural de mantener ese eco sin perder el valor narrativo-salvífico.
- source_word: אֲשֶׁר תִּזְרַע אֶת זַרְעֲךָ
  english_pob_choice: where you sowed your seed
  chosen_spanish: donde sembrabas tu semilla
  alternatives_spanish:
  - donde sembraste tu semilla
  - donde sembrabas tu simiente
  lexicon: HALOT
  rationale: El imperfecto hebreo puede expresar hábito; «sembrabas» refleja mejor la práctica habitual de Egipto que un simple pasado puntual. «Semilla» conserva la concreción de זֶרַע.
- source_word: וְהִשְׁקִיתָ
  english_pob_choice: and watered it
  chosen_spanish: y la regabas
  alternatives_spanish:
  - y la irrigabas
  - y la regabas con agua
  lexicon: HALOT
  rationale: El verbo de riego se traduce de modo natural con «regar», que en español comunica bien la acción agrícola repetida. El objeto está implícito por el contexto, como en el inglés POB.
- source_word: בְרַגְלְךָ
  english_pob_choice: with your foot
  chosen_spanish: con tu pie[a]
  alternatives_spanish:
  - con el pie
  - por medio de tu pie
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la irrigación activada o dirigida con el pie. Mantener «pie» preserva la tensión cultural del hebreo.
- source_word: כְּגַן הַיָּרָק
  english_pob_choice: like a vegetable garden
  chosen_spanish: como un huerto de hortalizas
  alternatives_spanish:
  - como un huerto de verduras
  - como un jardín de hortalizas
  lexicon: HALOT
  rationale: «Huerto de hortalizas» comunica bien la imagen de un terreno pequeño e intensamente regado. Es claro en español y mantiene el contraste agrícola del pasaje.
theological_decisions:
- issue: Idiomo del éxodo en contraste con Egipto
  english_pob_reading: from where you came out
  chosen_spanish_reading: de donde saliste
  alternative_spanish_readings:
  - de donde habéis salido
  - de donde salisteis
  rationale: La traducción conserva la referencia histórica al éxodo sin diluirla en una simple localización. El verbo «salir» mantiene el eco bíblico central de la liberación desde Egipto.
  doctrine_reference: Éxodo como acto fundacional de la identidad de Israel (cf. Éxodo 12–14; Deuteronomio 5–6).
- issue: Valor de ירשׁ en contexto de posesión de la tierra
  english_pob_reading: to possess
  chosen_spanish_reading: para poseerla
  alternative_spanish_readings:
  - para tomar posesión de ella
  - para heredarl a
  rationale: «Poseer» conserva la dimensión legal y pactal de la concesión de la tierra, sin introducir la metáfora de herencia más fuerte de lo que el contexto inmediato exige.
  doctrine_reference: Promesa y posesión de la tierra en el pacto mosaico (cf. Deuteronomio 4:1; 6:10; 11:31).
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el último estado del POB en inglés, pero ajusta la sintaxis a un español natural y mantiene las decisiones léxicas clave: אֶרֶץ como «tierra», ירשׁ como «poseer», el modismo del éxodo como «salir», y la imagen concreta de irrigación con el pie. Se preserva además la alternativa habitual del imperfecto en la descripción agrícola mediante una nota de pie de página.'
  spanish_consistency_notes:
  - Se emplea «tierra» para אֶרֶץ en coherencia con el uso covenantal del libro de Deuteronomio.
  - Se usa «poseerla» para ירשׁ, consistente con la terminología POB de posesión de la tierra.
  - Se conserva «Egipto» sin eufemismos, y el idiomático «saliste» para mantener el eco del éxodo.
  - «Huerto de hortalizas» evita un calco rígido y sigue siendo suficientemente literal respecto a כְּגַן הַיָּרָק.
  - La nota sobre el pie resuelve la ambigüedad cultural sin cargar el texto principal.
