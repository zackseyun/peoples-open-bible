translation:
  language: es
  text: 'una madre[a], con dos cosas ante ella: la piedad[b] y la preservación temporal[c] de sus siete hijos, conforme a la promesa del tirano—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «madre»; el griego no lleva artículo y la frase funciona de modo apposicional.
    reason: lexical_alternative
  - marker: b
    text: O «reverencia por Dios»; el griego εὐσέβεια puede expresar devoción reverente hacia Dios.
    reason: lexical_alternative
  - marker: c
    text: O «liberación temporal». El griego también puede expresarse como «salvación» en sentido no soteriológico; aquí se refiere a una preservación breve de la vida bajo la oferta del tirano.
    reason: lexical_alternative
lexical_decisions:
- source_word: μήτηρ
  english_pob_choice: a mother
  chosen_spanish: una madre
  alternatives_spanish:
  - la madre
  - madre
  lexicon: LSJ
  rationale: El sustantivo aparece sin artículo y funciona de modo predicativo/apposicional; en español, «una madre» conserva esa apertura y suena natural en el flujo sintáctico.
- source_word: δυεῖν προκειμένων
  english_pob_choice: with two things set before her
  chosen_spanish: con dos cosas puestas delante de ella
  alternatives_spanish:
  - cuando dos cosas estaban ante ella
  - con dos opciones delante de ella
  lexicon: LSJ
  rationale: La construcción presenta dos realidades como alternativas o elementos en disputa; «puestas delante de ella» mantiene la imagen sin volverla demasiado interpretativa.
- source_word: εὐσεβείας
  english_pob_choice: piety
  chosen_spanish: la piedad
  alternatives_spanish:
  - la reverencia por Dios
  - la devoción
  - la religiosidad
  lexicon: LSJ
  rationale: La revisión inglesa optó por la forma breve «piety» para mayor correspondencia léxica. En español, «piedad» es el equivalente más directo y formal; aunque puede ser algo amplio, en este contexto martirial conserva el sentido de fidelidad reverente hacia Dios.
- source_word: σωτηρίας προσκαίρου
  english_pob_choice: the temporary safety
  chosen_spanish: la seguridad temporal
  alternatives_spanish:
  - la liberación temporal
  - la preservación temporal
  - la salvación temporal
  lexicon: LSJ
  rationale: Aquí σωτηρία no apunta a salvación escatológica sino a preservación momentánea bajo la oferta del tirano. «Seguridad temporal» comunica bien esa preservación sin forzar un sentido doctrinal de salvación.
- source_word: τῆς ἑπτὰ υἱῶν
  english_pob_choice: of her seven sons
  chosen_spanish: de sus siete hijos
  alternatives_spanish:
  - de los siete hijos
  - de sus siete hijos varones
  lexicon: LSJ
  rationale: El contexto ya establece la maternidad; en español, «sus siete hijos» es natural y transparente. «Hijos» evita una redundancia pesada y mantiene el referente familiar.
- source_word: κατὰ τὴν τοῦ τυράννου ὑπόσχεσιν
  english_pob_choice: according to the tyrant’s promise
  chosen_spanish: conforme a la promesa del tirano
  alternatives_spanish:
  - según la promesa del tirano
  - de acuerdo con la promesa del tirano
  lexicon: LSJ
  rationale: κατά con acusativo expresa conformidad con la promesa; «conforme a» conserva bien ese valor y mantiene el tono formal del pasaje.
theological_decisions:
- issue: εὐσέβεια en contexto de martirio
  english_pob_reading: piety
  chosen_spanish_reading: la piedad
  alternative_spanish_readings:
  - la reverencia por Dios
  - la devoción
  rationale: La escena contrapone fidelidad a Dios con preservación física temporal. «Piedad» mantiene la densidad religiosa del término sin introducir una paráfrasis explicativa más larga, y refleja bien la elección inglesa final.
  doctrine_reference: Translation philosophy §§1, 6
- issue: σωτηρία como preservación temporal, no salvación final
  english_pob_reading: temporary safety
  chosen_spanish_reading: seguridad temporal
  alternative_spanish_readings:
  - liberación temporal
  - preservación temporal
  - salvación temporal
  rationale: El texto habla de la oferta del tirano para prolongar la vida de los hijos por un tiempo. «Seguridad temporal» evita cargar el pasaje con un sentido soteriológico que el contexto no sostiene.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «reverence for God» a «piety» por mayor cercanía a εὐσεβείας y un registro más conciso. En español se siguió esa preferencia con «piedad», manteniendo la estructura general y la distinción entre fidelidad religiosa y preservación temporal.
  spanish_consistency_notes:
  - Se mantuvo «tirano» para τυράννου, en continuidad con el audit trail inglés.
  - Se evitó «salvación» para σωτηρία debido al contexto temporal y político del pasaje.
  - Se usó puntuación con raya para reflejar el encuadre de dos elementos contrapuestos.
  - El registro es formal y bíblico, pero sin recurrir a arcaísmos innecesarios.
