translation:
  language: es
  text: Yo[a], como una vid, hice brotar gracia[c][b], y mis flores son el fruto de gloria y riqueza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'belleza', 'favor' o 'encanto' para 'gracia'. El término griego puede abarcar tanto la belleza estética como la benevolencia en este contexto poético.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'el fruto de gloria y riqueza' también puede entenderse más idiomáticamente como 'fruto marcado por gloria y riqueza' o 'fruto glorioso y rico'.
    reason: lexical_alternative
  - marker: c
    text: 'Otra posibilidad: ''Yo, como una vid, hice brotar gracia, y mis flores son fruto de gloria y riqueza''.'
    reason: previous_rendering
lexical_decisions:
- source_word: ἐγώ
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  - Yo, por mi parte
  lexicon: pronombre personal explícito
  rationale: Se conserva el pronombre explícito para mantener el énfasis de la auto-presentación personificada. En español, 'Yo' al inicio reproduce bien la fuerza enfática sin sobrecargar la línea.
- source_word: ὡς ἄμπελος
  english_pob_choice: like a vine
  chosen_spanish: como una vid
  alternatives_spanish:
  - como una viña
  - cual vid
  lexicon: ἄμπελος
  rationale: '''Vid'' expresa con precisión la planta individual de la imagen y suena más natural que ''viña'' en este contexto poético; ''cual'' sería más literario pero menos claro.'
- source_word: βλαστήσασα
  english_pob_choice: put forth
  chosen_spanish: eché brotes
  alternatives_spanish:
  - broté
  - di brotes
  - eché retoños
  lexicon: βλαστάνω
  rationale: El verbo griego transmite la idea de brotar o sacar crecimiento vegetal. 'Eché brotes' conserva la imagen botánica y funciona bien con 'gracia' como objeto poético, sin volver la frase mecánica.
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - belleza
  - favor
  - encanto
  lexicon: χάρις
  rationale: Se mantiene 'gracia' porque el contexto poético de Sabiduría admite tanto belleza atractiva como favor benéfico. La versión española conserva esa amplitud sin reducir el sentido a una sola cualidad estética.
- source_word: τὰ ἄνθη μου
  english_pob_choice: my blossoms
  chosen_spanish: mis flores
  alternatives_spanish:
  - mis flores abiertas
  - mis flores nuevas
  - mis brotes floridos
  lexicon: ἄνθος
  rationale: '''Flores'' es el equivalente más natural en español. Aunque ''brotes'' también encaja con la metáfora, aquí ἄνθη apunta directamente a las flores de la vid, en paralelo con el fruto.'
- source_word: καρπὸς
  english_pob_choice: the fruit
  chosen_spanish: el fruto
  alternatives_spanish:
  - fruto
  - la cosecha
  lexicon: καρπός
  rationale: 'Se conserva el singular: ''el fruto''. Esto mantiene la estructura del griego y la relación poética entre flores y fruto.'
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: δόξα
  rationale: '''Gloria'' preserva el registro elevado y la amplitud semántica de δόξα. En este contexto sapiencial funciona mejor que ''honor'' por su resonancia poética.'
- source_word: πλούτου
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  - abundancia
  lexicon: πλοῦτος
  rationale: '''Riqueza'' refleja con fidelidad πλοῦτος y resulta más natural en español que una expresión más explicativa. Mantiene el paralelo con ''gloria''.'
theological_decisions:
- issue: Sentido de χάριν en la auto-descripción de Sabiduría
  english_pob_reading: grace; with alternatives beauty, favor, charm
  chosen_spanish_reading: gracia
  alternative_spanish_readings:
  - belleza
  - favor
  - encanto
  rationale: La POB inglesa opta por 'grace' para preservar a la vez la belleza y la benevolencia de la imagen. En español, 'gracia' conserva esa tensión sin convertirla en mera apariencia externa.
  doctrine_reference: Sabiduría personificada en literatura sapiencial; primacía del texto original y del registro poético.
- issue: Relación entre flores y fruto
  english_pob_reading: fruit of glory and wealth; possible idiomatic sense 'fruit marked by glory and wealth'
  chosen_spanish_reading: el fruto de gloria y riqueza
  alternative_spanish_readings:
  - fruto marcado por gloria y riqueza
  - fruto glorioso y rico
  rationale: Se mantiene la construcción directa del griego y de la POB inglesa, sin explicitar una paráfrasis interpretativa. Así se conserva la ambigüedad poética entre cualidad del fruto y procedencia del fruto.
  doctrine_reference: Principio de no desdibujar tensiones semánticas documentadas por el texto fuente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó 'a fruit' a 'the fruit' por naturalidad sin alterar el singular griego. En español se reflejó esa decisión con 'el fruto'. También se respetó la elección auditada de 'put forth grace' como una imagen botánica elevada, trasladándola a 'eché brotes de gracia'.
  spanish_consistency_notes:
  - Se usa 'gracia' para χάρις conforme al criterio del proyecto, manteniendo la amplitud estética y benéfica del término.
  - '''Vid'' se prefirió a ''viña'' para conservar la imagen de la planta y evitar una lectura demasiado agrícola o colectiva.'
  - Se mantuvo el paralelismo poético singular 'el fruto' para καρπός.
  - La puntuación española conserva la coordinación del griego con una coma antes de la segunda cláusula.
