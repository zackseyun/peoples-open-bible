translation:
  language: es
  text: La mujer desvergonzada[a] avergüenza a su padre y a su esposo, y será deshonrada por ambos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '«Desvergonzada» traduce el valor moral negativo del griego θρασεῖα. Alternativas posibles: «audaz», «impúdica» o «descarada»; aquí se prefiere la que mejor comunica la censura sapiencial en español contemporáneo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πατέρα
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - su padre
  lexicon: BDAG
  rationale: En español, como en el inglés auditado, el objeto directo puede quedar sin posesivo expreso; el contexto familiar hace natural entender la relación filial sin añadir más de lo que el griego dice.
- source_word: ἄνδρα
  english_pob_choice: husband
  chosen_spanish: esposo
  alternatives_spanish:
  - varón
  - hombre
  lexicon: BDAG
  rationale: En coordinación con «padre» y dentro del marco de honor familiar, el sentido más probable es «esposo», no un «hombre» genérico.
- source_word: καταισχύνει
  english_pob_choice: brings shame on
  chosen_spanish: avergüenza
  alternatives_spanish:
  - deshonra
  - pone en vergüenza
  lexicon: BDAG
  rationale: El verbo expresa causar vergüenza o deshonra. «Avergüenza» conserva el valor causativo con español natural; «deshonra» queda reservado para la segunda cláusula para mantener el paralelo honor/vergüenza.
- source_word: ἡ θρασεῖα
  english_pob_choice: a shameless woman
  chosen_spanish: la mujer desvergonzada
  alternatives_spanish:
  - la mujer audaz
  - la mujer impúdica
  - la mujer descarada
  lexicon: BDAG
  rationale: 'El adjetivo sustantivado aquí tiene carga moral negativa: no es valentía, sino osadía sin pudor. «Desvergonzada» comunica bien esa fuerza en español actual.'
- source_word: ὑπὸ ἀμφοτέρων
  english_pob_choice: by both
  chosen_spanish: por ambos
  alternatives_spanish:
  - por los dos
  lexicon: BDAG
  rationale: El pronombre dual/plural remite a los dos mencionados antes, padre y esposo. «Por ambos» es la forma más breve y fiel en español.
- source_word: ἀτιμασθήσεται
  english_pob_choice: she will be dishonored
  chosen_spanish: será deshonrada
  alternatives_spanish:
  - será tratada con desprecio
  - será avergonzada
  lexicon: BDAG
  rationale: El futuro pasivo de ἀτιμάζω mantiene el campo semántico de honor/deshonra. «Deshonrada» preserva el paralelismo con la primera cláusula y su fuerza social.
translation_notes:
  revision_awareness: El texto griego transmitido por Swete coincide con el inglés POB auditado y la revisión más reciente no reporta cambios; se mantiene la lectura de honor/vergüenza sin introducir matices no sustentados.
  spanish_consistency_notes:
  - Se mantiene el registro sapiencial y moral del pasaje sin suavizar la censura.
  - Se conserva la cadena honor/vergüenza con «avergüenza / deshonrada» para reflejar el paralelismo del griego.
  - «Esposo» se usa por el contexto familiar, no como traducción genérica de ἀνήρ.
