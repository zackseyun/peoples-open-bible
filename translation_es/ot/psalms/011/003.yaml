translation:
  language: es
  text: Si los fundamentos[a] son derribados, ¿qué puede hacer el justo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si los fundamentos son destruidos»; o: «Porque los fundamentos están siendo derribados; ¿qué ha hecho el justo?». El hebreo permite una lectura más orientada al pasado en el verbo final, aunque el sentido en contexto suele entenderse como «¿qué puede hacer el justo?».'
    reason: alternative_reading
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Porque
  - Cuando
  - Pues
  lexicon: HALOT
  rationale: En este contexto poético introduce una condición que sostiene la pregunta retórica siguiente. «Si» conserva mejor esa función que un causal como «porque».
- source_word: הַשָּׁתוֹת
  english_pob_choice: the foundations
  chosen_spanish: los fundamentos
  alternatives_spanish:
  - las bases
  - los cimientos
  - el orden establecido
  lexicon: HALOT
  rationale: La imagen es literal y metafórica a la vez. «Fundamentos» comunica bien la base estructural sin resolver el símbolo hacia una sola esfera interpretativa.
- source_word: יֵהָרֵסוּן
  english_pob_choice: are destroyed
  chosen_spanish: son destruidos
  alternatives_spanish:
  - son derribados
  - son demolidos
  - son derrumbados
  lexicon: HALOT
  rationale: 'El nifal expresa pasividad: los fundamentos reciben la acción de ser arrasados. «Son destruidos» es natural en español y preserva el valor pasivo.'
- source_word: צַדִּיק
  english_pob_choice: the righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - el recto
  - la persona justa
  - el piadoso
  lexicon: HALOT
  rationale: En español bíblico «el justo» mantiene el valor representativo singular de la expresión hebrea y suena más fluido que una perífrasis más explicativa.
- source_word: מַה
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - qué cosa
  - cómo
  lexicon: HALOT
  rationale: Introduce directamente la pregunta retórica, sin ampliar el sentido más allá de lo que exige el hebreo.
- source_word: פָּעָל
  english_pob_choice: can do
  chosen_spanish: puede hacer
  alternatives_spanish:
  - ha hecho
  - hizo
  - puede lograr
  lexicon: HALOT
  rationale: Aunque la forma verbal es perfectiva, el inglés POB optó por la posibilidad práctica en contexto. En español, «puede hacer» reproduce esa lectura idiomática sin perder la tensión señalada en la nota alternativa.
theological_decisions:
- issue: Alcance metafórico de «los fundamentos»
  english_pob_reading: Retain the metaphor without specifying whether it refers to social order, justice, or covenantal structures.
  chosen_spanish_reading: Mantener la metáfora sin precisar si se refiere al orden social, la justicia o estructuras del pacto.
  alternative_spanish_readings:
  - Interpretar como los fundamentos de la sociedad
  - Interpretar como los fundamentos de la justicia o del orden moral
  rationale: El hebreo abre el campo semántico y el POB inglés preserva esa amplitud. La versión española conserva «fundamentos» para no cerrar la imagen a una sola aplicación doctrinal o social.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar la solución inglesa; la draft española sigue esa misma línea, manteniendo la imagen de los fundamentos y la lectura contextual de la pregunta retórica, sin resolver la tensión del verbo final.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «fundamentos» en concordancia con la imagen concreta preservada por el POB inglés.
  - «El justo» mantiene el valor representativo singular sin forzar género ni pluralización.
