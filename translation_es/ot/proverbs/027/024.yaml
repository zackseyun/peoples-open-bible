translation:
  language: es
  text: Porque la riqueza[a] no dura para siempre, ni la corona[b] dura de generación en generación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘riquezas’ o ‘bienes’; חֹסֶן puede denotar recursos materiales, riqueza o fortaleza, pero aquí el contexto favorece la riqueza material.
    reason: lexical_alternative
  - marker: b
    text: O ‘diadema’ o posiblemente ‘consagración’; נֵזֶר puede abarcar esos sentidos, pero aquí probablemente se refiere a una corona como símbolo de estatus o gobierno.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento del dicho, como en el inglés 'For'; en español 'Porque' conserva la fuerza explicativa de la sentencia sin sonar forzado.
- source_word: חֹסֶן
  english_pob_choice: wealth
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - bienes
  - recursos materiales
  - fortuna
  lexicon: HALOT
  rationale: El contexto favorece un sentido material, no abstractamente 'fuerza'. 'Riquezas' expresa de forma natural el campo semántico de posesiones o recursos y mantiene el matiz proverbial.
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - perpetuamente
  - por siempre
  lexicon: HALOT
  rationale: La negación expresa no permanencia. 'Para siempre' es la equivalencia más idiomática y clara en español, preservando el contraste con la duración generacional del segundo hemistiquio.
- source_word: וְאִם
  english_pob_choice: nor
  chosen_spanish: ni
  alternatives_spanish:
  - y no
  - ni tampoco
  lexicon: HALOT
  rationale: En esta construcción el valor es correlative negativo, no una condición literal. 'Ni' reproduce de manera natural en español el enlace de negación del segundo miembro.
- source_word: נֵזֶר
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - diadema
  - corona real
  - distintivo de realeza
  lexicon: HALOT
  rationale: El paralelo con la riqueza y la frase sobre la sucesión generacional favorecen un objeto concreto de estatus o realeza. 'Corona' mantiene la imagen sin sobreespecificar el sentido cultual posible.
- source_word: לְדוֹר דּוֹר
  english_pob_choice: from generation to generation
  chosen_spanish: de generación en generación
  alternatives_spanish:
  - de una generación a otra
  - para todas las generaciones
  - por generaciones
  lexicon: HALOT
  rationale: La expresión hebrea indica sucesión continua entre generaciones. 'De generación en generación' es la fórmula española más natural y fiel al valor distributivo del hebreo.
theological_decisions:
- issue: Sentido de נֵזֶר en el paralelismo proverbial
  english_pob_reading: crown, as a symbol of royal status or enduring prominence
  chosen_spanish_reading: corona, como símbolo de estatus elevado o autoridad
  alternative_spanish_readings:
  - diadema
  - consagración
  - aderezo cultual
  rationale: 'El verso contrapone cosas que la gente podría pensar estables, pero que no lo son: riqueza y estatus. ''Corona'' conserva la imagen concreta y evita cerrar el sentido hacia una lectura exclusivamente ritual.'
  doctrine_reference: Sabiduría proverbial; semántica léxica de נֵזֶר
translation_notes:
  revision_awareness: 'Coincide con el pasaje en inglés de la POB y con el control de revisión más reciente: no se registran cambios pendientes ni observaciones de desacuerdo; la formulación española sigue de cerca la lectura auditada del hebreo.'
  spanish_consistency_notes:
  - Se prefirió 'Porque' para el valor explicativo de כִּי, en lugar de una traducción causal más pesada.
  - Se mantuvo la negación correlative con 'ni' para reproducir el paralelo negativo del hebreo.
  - Se evitó 'SEÑOR' u otros términos no pertinentes porque no aparece el Tetragrámaton en este verso.
  - '''Corona'' se dejó sin carga litúrgica para respetar la ambigüedad documentada de נֵזֶר.'
