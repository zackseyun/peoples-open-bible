translation:
  language: es
  text: Bendigan al Señor, luz y oscuridad; cántenle alabanzas y exáltenlo en gran manera por los siglos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, “por las edades”.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐλογεῖτε
  english_pob_choice: Bless
  chosen_spanish: Bendigan
  alternatives_spanish:
  - Bendigan alabanzas a
  - Alaben
  lexicon: BDAG
  rationale: El imperativo plural exige una invitación directa a la creación personificada. 'Bendigan' conserva el valor litúrgico y de doxología de εὐλογεῖτε mejor que un simple 'alaben', y evita añadir una explicitación no presente en el griego.
- source_word: φῶς
  english_pob_choice: light
  chosen_spanish: luz
  alternatives_spanish:
  - la luz
  lexicon: BDAG
  rationale: Término cósmico literal; en español el singular colectivo suena natural en esta enumeración poética.
- source_word: σκότος
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  - sombras
  lexicon: BDAG
  rationale: Para el par antitético con 'luz', 'oscuridad' comunica con claridad el sentido cósmico básico. 'Tinieblas' sería más tradicional, pero en español moderno puede sonar más marcado o bíblico-literario de lo necesario.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - al Señor
  - el Señor Dios
  lexicon: BDAG
  rationale: Se conserva el equivalente reverencial de κύριος. En una exhortación litúrgica en español, 'al Señor' integra naturalmente el objeto del imperativo sin perder la referencia divina.
- source_word: ὑμνεῖτε
  english_pob_choice: sing praise
  chosen_spanish: cántenle alabanzas
  alternatives_spanish:
  - himnen
  - alábenlo cantando
  lexicon: BDAG
  rationale: El verbo implica cantar un himno o alabanza. 'Cántenle alabanzas' conserva el componente musical y evita el calco poco natural de 'himnen'.
- source_word: ὑπερυψοῦτε
  english_pob_choice: highly exalt
  chosen_spanish: ensálcenlo altamente
  alternatives_spanish:
  - ensálcenlo sobremanera
  - exáltenlo grandemente
  lexicon: BDAG
  rationale: El compuesto intensifica la idea de exaltar. 'Ensálcenlo altamente' mantiene la fuerza del original y del inglés POB sin perder claridad en español. Se conserva la tensión entre naturalidad y una formulación elevada.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre directo que retoma al Señor. 'Lo' es la forma más natural en español tras 'cántenle' y 'ensálcenlo'.
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por los siglos
  alternatives_spanish:
  - para siempre
  - por las edades
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por 'forever' con nota de 'for the ages', en español 'por los siglos' reproduce bien el matiz doxológico más literal de εἰς τοὺς αἰῶνας sin sonar artificial. Se preserva así la resonancia temporal amplia del original.
theological_decisions:
- issue: Renderizado de κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - el Señor Yahvé
  rationale: Se sigue el equivalente reverencial estándar para κύριος en el discurso litúrgico. Aquí no hay indicio suficiente para introducir 'Yahvé' en el texto principal, dado que el griego cita el título divino en forma directa y el contexto coral favorece la fórmula tradicional española más natural.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Valor de εἰς τοὺς αἰῶνας
  english_pob_reading: forever
  chosen_spanish_reading: por los siglos
  alternative_spanish_readings:
  - para siempre
  - por los siglos de los siglos
  rationale: La expresión funciona como fórmula doxológica de duración incesante. 'Por los siglos' mantiene la literalidad y la solemnidad del original sin sobrerrepresentar con una ampliación que el griego no exige en este versículo concreto.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
translation_notes:
  revision_awareness: El texto griego adjudicado coincide con la capa normalizada de traducción del corpus curado; la revisión más reciente indicó acuerdo alto y sin cambios necesarios. La decisión española sigue el mismo sentido doxológico del inglés POB, pero ajusta la última cláusula a una equivalencia más directa de εἰς τοὺς αἰῶνας.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος, conforme al criterio doctrinal del proyecto y al uso reverencial en español.
  - Se conserva el tono litúrgico y paralelo del verso con dos imperativos coordinados.
  - '''Por los siglos'' es una opción deliberadamente más literal que ''para siempre'', pero sigue siendo idiomática y coherente con el registro del poema.'
  - La marca de nota [a] se coloca sobre 'Señor' para señalar la alternativa más literal del sintagma temporal griego en el marco doxológico.
