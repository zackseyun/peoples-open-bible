  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: dos imperativos plurales, referencia amplia a «las naciones», y atención a los mandatos de la ley. Sin embargo, «retribución» carga ἀνταπόδομα con un matiz más punitivo que el audit trail inglés decidió suavizar a «recompense/recompensa», y «estad atentos a» es aceptable pero menos directo que una formulación de atención deliberada.'
  spanish_quality_summary: El español es claro, pero «Pagad» pertenece más al registro peninsular; para un español neutral y ampliamente legible conviene «Den». Además, «preceptos» es posible, pero «mandatos» se alinea mejor con προστάγματα y con la decisión inglesa «commands».
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. La revisión propuesta mejora la alineación léxica con el audit trail: ἀνταπόδομα -> «recompensa» en vez de «retribución», προστάγματα -> «mandatos» en vez de «preceptos».'
  issues:
  - severity: medium
    issue: «Retribución» sobredetermina ἀνταπόδομα
    rationale: El historial inglés revisó deliberadamente «retribution» a «recompense» para evitar un matiz punitivo excesivo. En español, «retribución» también suele sonar más penal o retributiva que el griego exige aquí.
  - severity: medium
    issue: «Pagad» no es el registro más neutral panhispánico
    rationale: Aunque es gramaticalmente correcto, para español neutral latinoamericano/church-readable es preferible «Den», que conserva el imperativo plural sin sesgo regional marcado.
  - severity: low
    issue: «Preceptos» es menos preciso que «mandatos» para προστάγματα
    rationale: El griego apunta a órdenes/mandatos. «Preceptos» funciona, pero «mandatos» refleja más directamente la fuerza léxica y armoniza mejor con la auditoría inglesa.
  revised_spanish_text: Den a las naciones su recompensa[a], y presten atención a los mandatos de la ley.
