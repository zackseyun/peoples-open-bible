    text: «Siervos» también podría traducirse «esclavos», ya que el término hebreo puede referirse a trabajadores domésticos en condición de servidumbre; aquí el contexto no pone ese matiz social en primer plano.
    reason: lexical_alternative
  revision_rationale: Se ajusta «esclavos» a «siervos» para respetar la decisión contextual documentada por la POB inglesa y la pauta terminológica del proyecto, mientras se conserva «esclavos» como alternativa en nota. También se añade la nota faltante y se mejora levemente la naturalidad de «en aquel día» a «aquel día».
