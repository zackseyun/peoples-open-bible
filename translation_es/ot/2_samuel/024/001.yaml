translation:
  language: es
  text: 'Otra vez el furor de Yahvé se encendió contra Israel[a], e incitó a David contra ellos, diciendo: «Ve[b], cuenta a Israel y a Judá».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 1 Crónicas 21:1 dice que Satanás se opuso a Israel e incitó a David. El texto principal aquí sigue el sujeto manifiesto del hebreo en 2 Samuel y conserva la tensión entre ambos relatos en lugar de armonizarlos.
    reason: cross_reference
  - marker: b
    text: 'O: «numera» o «haz un censo de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסֶף
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Una vez más
  lexicon: HALOT
  rationale: El hebreo expresa acción retomada o renovada; «Otra vez» conserva esa fuerza resumptiva en español natural sin añadir matiz innecesario.
- source_word: אַף
  english_pob_choice: the anger
  chosen_spanish: el furor
  alternatives_spanish:
  - la ira
  - el enojo
  lexicon: HALOT
  rationale: אַף en este giro idiomático comunica ira encendida; «furor» mantiene el tono enfático y el campo semántico de intensidad, con registro digno en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al criterio del proyecto, evitando la sustitución por un título.
- source_word: לַחֲרוֹת
  english_pob_choice: burned
  chosen_spanish: se encendió
  alternatives_spanish:
  - ardió
  - se inflamó
  lexicon: HALOT
  rationale: El verbo comunica la metáfora de ira que arde; «se encendió» es una equivalencia natural en español y preserva la imagen sin mecanicismo.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - sobre Israel
  - con Israel
  lexicon: HALOT
  rationale: La preposición expresa hostilidad dirigida a Israel; «contra» reproduce bien ese valor relacional en español.
- source_word: וַיָּסֶת
  english_pob_choice: he incited
  chosen_spanish: incitó
  alternatives_spanish:
  - instigó
  - movió
  lexicon: HALOT
  rationale: El Hifil de סות pide una acción causativa de provocar a otro; «incitó» es la opción más precisa y transparente.
- source_word: בָּהֶם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - con respecto a ellos
  - entre ellos
  lexicon: HALOT
  rationale: Aunque la construcción es difícil, el contexto inmediato favorece una relación hostil orientada hacia el pueblo; «contra ellos» mantiene esa lectura sin resolver artificialmente la tensión textual.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: HALOT
  rationale: Equivalente estándar que introduce el discurso directo con naturalidad en español.
- source_word: לֵךְ
  english_pob_choice: Go
  chosen_spanish: Ve
  alternatives_spanish:
  - Anda
  - Sal
  lexicon: HALOT
  rationale: Imperativo breve y natural para la orden inmediata.
- source_word: מְנֵה
  english_pob_choice: count
  chosen_spanish: cuenta
  alternatives_spanish:
  - numera
  - haz un censo de
  lexicon: HALOT
  rationale: מנה significa contar o numerar; «cuenta» es conciso y fiel, mientras que «haz un censo de» sería más explicativo de lo que el hebreo exige.
- source_word: יִשְׂרָאֵל וְאֶת יְהוּדָה
  english_pob_choice: Israel and Judah
  chosen_spanish: Israel y Judá
  alternatives_spanish:
  - el pueblo de Israel y de Judá
  lexicon: HALOT
  rationale: Se conservan los nombres propios y la distinción política/geográfica del hebreo sin expansión interpretativa.
theological_decisions:
- issue: Agencia divina en el incitamiento de David frente al paralelo de 1 Crónicas 21:1
  english_pob_reading: and he incited David
  chosen_spanish_reading: e incitó a David contra ellos
  alternative_spanish_readings:
  - y Satanás incitó a David
  - y uno incitó a David
  rationale: El hebreo atribuye la acción al sujeto inmediato, Yahvé, y la traducción conserva esa lectura para mantener la tensión con 1 Crónicas 21:1 en vez de armonizarla en el texto principal.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla por importación interpretativa'
translation_notes:
  revision_awareness: 'El pasaje mantiene el consenso alto del audit trail inglés: se conserva la referencia directa al sujeto hebreo, la metáfora de la ira encendida y la alternativa léxica de מְנֵה como nota, sin cambios sustanciales respecto del último pase revisado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se mantiene «Israel» y «Judá» como nombres propios sin expansión.
  - Se evita «SEÑOR» para no ocultar el nombre divino.
  - «incitó» preserva la fuerza causativa de סות y la tensión con 1 Crónicas 21:1.
  - La puntuación y el estilo buscan una lectura pública, sobria y natural en español latinoamericano.
