translation:
  language: es
  text: Así, la verdad faltaba, y el que se apartaba del mal era despojado[a]. Yahvé vio, y fue malo a sus ojos[b] que no hubiera justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "era tratado como presa" / "se volvía presa". El término hebreo es raro y comunica que quien se aparta del mal queda convertido en víctima.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: "fue malo a sus ojos".'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֱמֶת
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la fidelidad
  lexicon: HALOT
  rationale: אֱמֶת puede expresar 'verdad' o 'fidelidad'. En el contexto de colapso social y judicial de Isaías 59, 'la verdad' conserva el valor moral y público que destaca el texto y coincide con la decisión auditada en inglés.
- source_word: נֶעְדֶּרֶת
  english_pob_choice: was lacking
  chosen_spanish: estaba faltando
  alternatives_spanish:
  - estaba ausente
  - faltaba
  - había desaparecido
  lexicon: HALOT
  rationale: El participio nifal indica ausencia o carencia. 'Estaba faltando' mantiene la idea de carencia de forma natural en español y evita exagerar el grado de desaparición.
- source_word: וְסָר מֵרָע
  english_pob_choice: whoever turned away from evil
  chosen_spanish: el que se apartaba del mal
  alternatives_spanish:
  - quien se apartaba del mal
  - el que se apartó del mal
  - quien se apartó del mal
  lexicon: HALOT
  rationale: El participio singular masculino tiene fuerza genérica. 'El que se apartaba del mal' transmite esa función representativa con español natural y preserva el movimiento moral de apartarse del mal.
- source_word: מִשְׁתּוֹלֵל
  english_pob_choice: was despoiled
  chosen_spanish: era despojado
  alternatives_spanish:
  - era saqueado
  - se volvía presa
  - era tratado como presa
  lexicon: HALOT
  rationale: La forma rara expresa la idea de ser convertido en presa o víctima. 'Era despojado' sigue el registro formal de la traducción inglesa auditada y mantiene la noción de victimización; las alternativas conservan explícitamente la imagen de presa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como 'Yahvé' según la terminología del proyecto, preservando el nombre propio del pacto y no sustituyéndolo por un título.
- source_word: וַיֵּרַע בְּעֵינָיו
  english_pob_choice: it was evil in his eyes
  chosen_spanish: fue malo a sus ojos
  alternatives_spanish:
  - le pareció mal
  - le desagradó
  - fue malo delante de él
  lexicon: HALOT
  rationale: 'La expresión hebrea es literalmente evaluativa: ''fue malo a sus ojos''. Mantenerla conserva el juicio moral fuerte del hebreo y la decisión auditada de no suavizarla a ''le desagradó''.'
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  - orden justo
  lexicon: HALOT
  rationale: En este contexto de ética social, מִשְׁפָּט apunta a justicia como orden legal y moral. 'Justicia' es la opción más clara y fiel en español moderno.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El verso usa יְהוָה directamente. Siguiendo el principio del proyecto, se conserva el nombre propio divino en español como 'Yahvé', en lugar de ocultarlo tras una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Fuerza genérica del participio וְסָר
  english_pob_reading: whoever turned away from evil
  chosen_spanish_reading: el que se apartaba del mal
  alternative_spanish_readings:
  - quien se apartaba del mal
  - el que se apartó del mal
  - quien se apartó del mal
  rationale: El hebreo usa un singular masculino con valor representativo, no necesariamente un individuo masculino específico. La traducción elegida mantiene esa genericidad sin perder naturalidad en español.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Se siguió la última revisión del audit trail: נֶעְדֶּרֶת pasó de ''missing'' a ''lacking'' por mayor naturalidad formal, y מִשְׁתּוֹלֵל pasó de ''plundered'' a ''despoiled'' para un registro más adecuado. La versión española refleja esos ajustes con ''estaba faltando'' y ''era despojado'', manteniendo la evaluación moral literal de ''fue malo a sus ojos''.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se mantiene 'justicia' para מִשְׁפָּט, en continuidad con el sentido socio-legal del contexto.
  - La nota sobre מִשְׁתּוֹלֵל preserva la alternativa 'presa' porque la imagen de victimización es teológicamente y léxicamente significativa.
  - El estilo general busca español bíblico contemporáneo, digno y auditable, sin sustituir el nombre divino ni suavizar el juicio moral del hebreo.
