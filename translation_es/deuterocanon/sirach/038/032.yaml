translation:
  language: es
  text: Con su brazo moldeará el barro[a], y ante sus pies doblará su fuerza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se inclinará con toda su fuerza ante sus pies». La expresión griega «doblará su fuerza» es idiomática y puede describir tanto la postura física del artesano como el esfuerzo de su poder en la obra.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν βραχίονι αὐτοῦ
  english_pob_choice: With his arm
  chosen_spanish: Con su brazo
  alternatives_spanish:
  - Con su brazo extendido
  - Con su antebrazo
  lexicon: LSJ
  rationale: βραχίων se refiere al brazo como instrumento de trabajo. «Con su brazo» conserva la imagen corporal y manual sin añadir precisión anatómica no exigida por el griego.
- source_word: τυπώσει
  english_pob_choice: he will shape
  chosen_spanish: moldeará
  alternatives_spanish:
  - formará
  - modelará
  - dará forma
  lexicon: LSJ
  rationale: En contexto de πηλός, el verbo apunta al trabajo de dar forma al material. «Moldeará» comunica bien la acción artesanal sin reducirla a un mero golpe o estampado.
- source_word: πηλόν
  english_pob_choice: clay
  chosen_spanish: barro
  alternatives_spanish:
  - arcilla
  - lodo
  lexicon: LSJ
  rationale: Aunque πηλός puede ser «arcilla», aquí el español «barro» transmite con naturalidad el material maleable del alfarero y mantiene la imaginería artesanal. Se evita «lodo» por su matiz menos adecuado en español contemporáneo.
- source_word: πρὸ ποδῶν
  english_pob_choice: before his feet
  chosen_spanish: ante sus pies
  alternatives_spanish:
  - delante de sus pies
  - a sus pies
  lexicon: LSJ
  rationale: «Ante sus pies» conserva la relación espacial de πρὸ ποδῶν con un español natural y sobrio, sin suavizar la concreción de la imagen.
- source_word: κάμψει
  english_pob_choice: he will bend
  chosen_spanish: doblará
  alternatives_spanish:
  - inclinará
  - se doblará
  - se inclinará
  lexicon: LSJ
  rationale: κάμπτω puede expresar doblar o inclinar. Aquí, con ἰσχὺν αὐτοῦ, «doblará» mantiene la literalidad de la fuerza ejercida y permite conservar la posible tensión entre postura física y esfuerzo.
- source_word: ἰσχὺν αὐτοῦ
  english_pob_choice: his strength
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su vigor
  - su poder
  - su fortaleza
  lexicon: LSJ
  rationale: ἰσχύς significa fuerza o vigor. «Su fuerza» es la correspondencia más directa y conserva el giro algo condensado del griego, como también lo refleja la nota inglesa.
theological_decisions:
- issue: La imagen del trabajo manual y del esfuerzo corporal puede interpretarse como postura física o como aplicación de poder en la labor.
  english_pob_reading: The Greek phrase 'he will bend his strength' is idiomatic and may describe either the craftsman's physical posture or the exertion of his power in the work.
  chosen_spanish_reading: La frase «doblará su fuerza» se deja deliberadamente ambigua entre la postura del artesano y el esfuerzo de su poder en la tarea.
  alternative_spanish_readings:
  - se inclinará con toda su fuerza
  - empleará toda su fuerza
  rationale: El griego admite una lectura idiomática que no debe cerrarse en una sola explicación. El español conserva esa tensión al no explicitar una sola de las dos posibilidades.
  doctrine_reference: Prudencia hermenéutica sobre imágenes sapienciales; respeto del alcance del texto sin sobreinterpretación.
translation_notes:
  revision_awareness: El pasaje muestra acuerdo general con la versión auditada en inglés. La única zona delicada es ἰσχὺν αὐτοῦ / «his strength», cuya idiomaticidad se mantiene en español mediante una formulación literal y una nota que preserva la alternativa interpretativa documentada en el POB inglés. No se registran revisiones aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se evita el calco excesivo de la sintaxis inglesa, aunque se conserva la concreción corporal del griego.
  - «Barro» y «moldeará» ofrecen un registro natural para la imagen del alfarero sin perder el trasfondo de trabajo artesanal.
