  text: וַ/יְהִ֞י לְ/עֵ֣ת בּ֣וֹא הַ/שֶּׁ֗מֶשׁ צִוָּ֤ה יְהוֹשֻׁ֨עַ֙ וַ/יֹּֽרִידוּ/ם֙ מֵ/עַ֣ל הָ/עֵצִ֔ים וַ/יַּ֨שְׁלִכֻ֔/ם אֶל הַ/מְּעָרָ֖ה אֲשֶׁ֣ר נֶחְבְּאוּ שָׁ֑ם וַ/יָּשִׂ֜מוּ אֲבָנִ֤ים גְּדֹלוֹת֙ עַל פִּ֣י הַ/מְּעָרָ֔ה עַד עֶ֖צֶם הַ/יּ֥וֹם הַ/זֶּֽה׀־־־־׃פ
base_translation:
  language: en
  yaml_path: translation/ot/joshua/010/027.yaml
  text: And at the time of the sun’s going down[a], Joshua commanded, and they took them down from the trees and threw them into the cave where they had hidden[b], and they placed large stones over the mouth of the cave to this very day.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'at sunset.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebrew: ''where they had hidden there''; the wording explicitly includes ''there'' for emphasis.'
    reason: lexical_alternative
