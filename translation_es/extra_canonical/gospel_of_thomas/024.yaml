base_translation:
  language: en
  yaml_path: translation/extra_canonical/gospel_of_thomas/024.yaml
  text: His disciples said[1], "Show us the place where you are, for it is necessary for us to seek it." He said to them, "Whoever has ears, let him hear.[1] There is light within a man of light,[2] and he lights the whole world.[3] When he does not shine[a][e][4][3][2], there is darkness."[4]
  footnotes:
  - marker: '1'
    text: Lit. “whoever has ears with him.” The idiom ⲙⲙⲟϥ ‘with him’ is part of the standard hearing formula.
    reason: dialect_note
  - marker: '2'
    text: 'Coptic is declarative: “A light is within a man of light.” The Greek fragment reads conditionally, “If light is in a man of light….”'
    reason: textual_variant
  - marker: '3'
    text: 'Coptic makes the person the subject: “he lights (the whole world).” The Greek fragment has “it shines,” taking “light” as the subject.'
    reason: textual_variant
  - marker: '4'
    text: 'Coptic: “When he does not shine, it is/there is darkness.” The Greek reconstruction reads, “if it is not, (the world) is in darkness.”'
    reason: textual_variant
  - marker: e
    text: “Man of light” could be rendered “luminous person,” but the genitive construction is preserved to keep Thomas’s distinctive tone.
    reason: lexical_alternative
  - marker: a
    text: Or 'A light is within a man of light'.
    reason: previous_rendering
