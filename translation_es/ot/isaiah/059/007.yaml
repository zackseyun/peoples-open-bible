  text: רַגְלֵי/הֶם֙ לָ/רַ֣ע יָרֻ֔צוּ וִֽ/ימַהֲר֔וּ לִ/שְׁפֹּ֖ךְ דָּ֣ם נָקִ֑י מַחְשְׁבֽוֹתֵי/הֶם֙ מַחְשְׁב֣וֹת אָ֔וֶן שֹׁ֥ד וָ/שֶׁ֖בֶר בִּ/מְסִלּוֹתָֽ/ם׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/059/007.yaml
  text: Their feet run to evil[a], and they hurry to shed innocent blood; their thoughts are thoughts of iniquity[b]; devastation and destruction are in their highways.
  footnotes:
  - marker: a
    text: Or "their plans are plans of iniquity"; the Hebrew word can denote thoughts, plans, or schemes.
    reason: lexical_alternative
  - marker: b
    text: Or "in their paths"; the Hebrew term refers literally to roads or highways and here also suggests the course of their conduct.
    reason: lexical_alternative
