revisions:
- from: Porque para el día de la calamidad el malvado es reservado[a]; para el día de la ira serán llevados[b].
  to: Porque para el día de la calamidad el malvado queda reservado[a]; para el día de la ira serán llevados[b].
  rationale: Se hizo una reparación menor para mejorar la naturalidad del español sin alterar el sentido fuente ni la lógica del POB inglés. "queda reservado" expresa con más fluidez la idea de ser retenido para un juicio futuro. La nota b se afinó para reflejar mejor la ambigüedad documentada del verbo final.
