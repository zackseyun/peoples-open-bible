translation:
  language: es
  text: Y ahora los ángeles están haciendo una estructura de madera[a]; y cuando los ángeles hayan terminado eso, pondré mi mano sobre ella y la guardaré, y de ella saldrá la semilla de la vida, y ocurrirá una transformación[e][d][c][b], para que la tierra seca no permanezca estéril.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El ge'ez de este versículo es difícil en varios puntos, especialmente la cláusula sobre «mi mano sobre ella» y la expresión aquí vertida «estructura de madera». La traducción conserva la imagen visible en vez de suavizarla en una paráfrasis más segura.
    reason: textual_variant
  - marker: b
    text: 'O: «madera trabajada», «estructuras de madera», posiblemente incluso «árboles», según cómo se tome el sustantivo subyacente.'
    reason: lexical_alternative
  - marker: c
    text: «Semilla de la vida» se traduce literalmente. Puede aludir a descendencia que da vida, a poder generativo o a fertilidad renovada.
    reason: lexical_alternative
  - marker: d
    text: 'O bien, en una traducción anterior: «y cuando hayan terminado todo eso, pondré mi mano sobre ella y velaré por ella».'
    reason: previous_rendering
  - marker: e
    text: 'O bien, en una traducción anterior: «vasijas de madera».'
    reason: previous_rendering
lexical_decisions:
- source_word: ይገብሩ
  english_pob_choice: are making
  chosen_spanish: están haciendo
  alternatives_spanish:
  - hacen
  - van a hacer
  - están preparando
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El imperfecto narrativo en ge'ez presenta la acción en curso o inminente; en español, 'están haciendo' conserva la vivacidad de la escena mejor que un futuro liso.
- source_word: መላእክት
  english_pob_choice: angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El contexto apocalíptico de 1 Enoc señala seres celestiales, no mensajeros humanos.
- source_word: ዕፀወ
  english_pob_choice: wooden structure
  chosen_spanish: una estructura de madera
  alternatives_spanish:
  - maderos
  - madera trabajada
  - una obra de madera
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión reconoce que el referente es un solo arca/estructura; 'una estructura de madera' mantiene el material y la unidad del objeto sin cerrar en exceso la forma exacta.
- source_word: ወድኡ
  english_pob_choice: have finished
  chosen_spanish: hayan terminado
  alternatives_spanish:
  - terminen
  - acaben
  - concluyan
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: 'El verbo de completitud encaja con la secuencia narrativa: primero hacen la estructura y después se produce la siguiente acción.'
- source_word: እወዲ እዴየ ዲቤሃ
  english_pob_choice: I will place my hand upon it
  chosen_spanish: pondré mi mano sobre ella
  alternatives_spanish:
  - colocaré mi mano sobre ella
  - pondré mis manos sobre ella
  - colocaré mis manos sobre ella
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La revisión gramatical confirma primera persona singular y singular ('mi mano'); el español debe reflejar ese dato, y 'sobre ella' concuerda con la estructura femenina singular.
- source_word: እዐቅባ
  english_pob_choice: guard it
  chosen_spanish: la guardaré
  alternatives_spanish:
  - la protegeré
  - velaré por ella
  - la vigilaré
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El verbo puede implicar guardar/proteger/vigilar; 'la guardaré' conserva la acción protectora y el tono solemne, aunque en español moderno puede sonar más amplio.
- source_word: ዘርአ ሕይወት
  english_pob_choice: the seed of life
  chosen_spanish: la semilla de la vida
  alternatives_spanish:
  - una semilla de vida
  - la descendencia de la vida
  - la semilla vivificante
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: Se preserva la imagen literal; en español 'semilla de la vida' mantiene abierta la tensión entre descendencia, fertilidad y poder generativo.
- source_word: ተወላጥ ይባእ
  english_pob_choice: a transformation will occur
  chosen_spanish: ocurrirá una transformación
  alternatives_spanish:
  - aparecerá un cambio
  - vendrá una transformación
  - surgirá una transformación
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: La frase es difícil, pero apunta a un resultado de alteración o renovación; 'ocurrirá una transformación' es sobrio y no fuerza una explicación agrícola o escatológica única.
- source_word: የብስ ዕራቆ
  english_pob_choice: the dry ground ... barren
  chosen_spanish: la tierra seca ... estéril
  alternatives_spanish:
  - el suelo seco ... vacío
  - la tierra reseca ... desolada
  - la tierra árida ... infecunda
  lexicon: Dillmann, Lexicon Linguae Aethiopicae
  rationale: El par evoca sequedad e improductividad; 'tierra seca' y 'estéril' conservan la imagen concreta y el tema de fertilidad.
theological_decisions:
- issue: Si la imagen debe resolverse como renovación agrícola o como imagen visionaria de vida que surge de una estructura preparada
  english_pob_reading: Retain the concrete imagery ('wooden structure,' 'seed of life,' 'dry ground') without collapsing it into either pure symbolism or ordinary farming language.
  chosen_spanish_reading: Mantener la imaginería concreta ('estructura de madera', 'semilla de la vida', 'tierra seca') sin reducirla ni a simbolismo puro ni a lenguaje agrícola ordinario.
  alternative_spanish_readings:
  - Interpretar todo el versículo como preparación literal para cultivo o irrigación
  - Interpretar todo el versículo como símbolo puro de resurrección o nueva creación
  rationale: La tradición visionaria de 1 Enoc permite imágenes estratificadas. El ge'ez no obliga a una sola explicación, así que el español conserva la tensión en lugar de resolverla.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente corrigió un error gramatical importante: la acción de poner la mano y guardar/proteger pertenece al hablante en primera persona singular, no a los ángeles. También ajustó el referente a una sola estructura de madera, no a un plural de ''wooden vessels''. La redacción española refleja esas correcciones y mantiene la ambigüedad productiva del cierre.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija; aquí no aparece el tetragrama ni κύριος.
  - '''Semilla de la vida'' se conserva como fórmula literal para no cerrar el campo semántico.'
  - '''Estructura de madera'' evita introducir ''arca'' sin que el ge''ez lo nombre de forma inequívoca en este versículo aislado.'
  - La primera persona singular ('pondré', 'guardaré') sigue la revisión gramatical del ge'ez.
  - La concordancia femenina singular ('ella') sigue el referente singular del objeto de madera.
