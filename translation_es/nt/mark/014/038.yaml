review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: dos imperativos coordinados, propósito preventivo, y el contraste entre espíritu y carne. Sin embargo, la nota léxica no preserva fielmente las alternativas documentadas para πειρασμόν, porque ''juicio'' no corresponde bien aquí al campo semántico señalado por el English POB (''testing'' / ''trial'').'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. 'Manténganse despiertos y oren' funciona bien. 'El espíritu, en verdad, está dispuesto' es comprensible, aunque la puntuación podría simplificarse; no obstante, no exige cambio. La corrección necesaria es principalmente en la nota al pie.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: πνεῦμα como ''espíritu'' sin mayúscula, σάρξ como ''carne'', y no se introduce una lectura doctrinal excesiva. No hay conflicto con Yahvé/Mesías ni otros términos clave del glosario. La única desalineación está en la alternativa para πειρασμόν, que debe reflejar ''prueba'' o ''tribulación/probación'' antes que ''juicio''.'
  issues:
  - severity: medium
    issue: La nota al pie para πειρασμόν usa 'juicio' como alternativa.
    rationale: El rastro de auditoría inglés preserva 'testing' o 'trial', no 'judgment'. En español, 'juicio' desplaza el sentido hacia condena o proceso judicial, y no representa adecuadamente la alternativa léxica documentada.
  revised_spanish_text: Manténganse despiertos y oren[a], para que no entren en tentación. El espíritu, en verdad, está dispuesto, pero la carne es débil.
  revised_footnotes:
  - marker: a
    text: O “prueba” o “tribulación” para πειρασμόν.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, claro y bien alineado con las decisiones léxicas y teológicas del original. Solo se corrige la nota al pie para que refleje con mayor precisión las alternativas semánticas documentadas para πειρασμόν y evite el desvío de sentido introducido por 'juicio'.
