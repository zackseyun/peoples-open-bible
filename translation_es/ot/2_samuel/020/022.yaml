  language: en
  yaml_path: translation/ot/2_samuel/020/022.yaml
  text: Then the woman went to all the people in her wisdom[a], and they cut off the head of Sheba son of Bichri and threw it to Joab. Then he blew the trumpet, and they dispersed from the city, each man to his tent; and Joab returned to Jerusalem to the king.
  footnotes:
