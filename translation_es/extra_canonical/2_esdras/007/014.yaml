review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido básico del latín: una conclusión inferencial, una condición negativa, la entrada en ''estas cosas'' descritas como estrechas/vanas, y la imposibilidad de recibir lo guardado. Sin embargo, introduce una nota al pie innecesaria y mal anclada: el marcador [a] está puesto sobre ''Por tanto'', pero la nota trata del verbo ''entran''. Además, ''ha sido reservado'' es aceptable, pero ''está reservado'' o ''ha sido guardado'' refleja con más naturalidad en español bíblico el participio pasivo de reposita sin sugerir tanto una mera apartación administrativa.'
  spanish_quality_summary: 'El español es claro y digno. ''Por tanto'' funciona bien. ''Los que viven'' es natural. ''Estas cosas angostas y vanas'' es fiel, aunque algo áspero; esa aspereza proviene del original y no requiere suavizarse. El principal problema de calidad es la nota: crea confusión editorial más que ayudar al lector. También conviene hacer más natural la última cláusula con ''está reservado''.'
  glossary_alignment: No hay términos de glosario teológico mayor en disputa. La elección de 'entran' para ingredi es correcta. 'Angostas y vanas' mantiene bien angusta et vana. 'Reservado' está dentro del campo semántico de reposita, aunque 'está reservado' alinea mejor con el estado resultante del participio latino.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en 'Por tanto' pero comenta el verbo 'entran'.
    rationale: Según las instrucciones, el marcador debe aparecer en la palabra o frase pertinente. Tal como está, la nota editorial es confusa y técnicamente incorrecta.
  - severity: low
    issue: La nota sobre una construcción enfática no aporta valor suficiente en español.
    rationale: El inglés auditado terminó descartando 'actually' y conservó una condición simple. En español, explicar aquí la construcción latina añade ruido sin preservar una alternativa significativa para el lector.
  - severity: low
    issue: '''Lo que ha sido reservado'' es menos natural que ''lo que está reservado''.'
    rationale: Ambas son fieles, pero 'está reservado' expresa mejor en español el estado de algo ya guardado/preparado, con mejor fluidez.
  revised_spanish_text: Por tanto, si los que viven no entran en estas cosas angostas y vanas, no podrán recibir lo que está reservado.
  revised_footnotes: []
  revision_rationale: Se elimina la nota porque está mal anclada y no preserva una alternativa textual realmente necesaria. Se ajusta la última cláusula a 'lo que está reservado' para una expresión más natural y fiel al estado resultante de quae sunt reposita.
