translation:
  language: es
  text: Y Jonatán y los que estaban con él saltaron al Jordán y nadaron hasta la otra orilla; y no cruzaron el Jordán detrás de ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no cruzaron el Jordán contra ellos» o «para atacarlos». La frase griega es condensada y puede indicar un movimiento hostil hacia el grupo de Jonatán.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνεπήδησεν
  english_pob_choice: jumped into
  chosen_spanish: saltaron al
  alternatives_spanish:
  - se lanzaron al
  - brincaron al
  lexicon: LSJ
  rationale: El verbo expresa una acción súbita y enérgica. En español, «saltaron al» conserva ese impulso sin volver la frase artificiosa.
- source_word: οἱ μετ᾿ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - sus compañeros
  - los hombres con él
  lexicon: LSJ
  rationale: La expresión griega es amplia y no especifica explícitamente «hombres». «Los que estaban con él» sigue de cerca el sentido inclusivo y natural del texto.
- source_word: διεκολύμβησαν
  english_pob_choice: swam across
  chosen_spanish: nadaron hasta
  alternatives_spanish:
  - nadaron al otro lado
  - cruzaron nadando
  lexicon: LSJ
  rationale: El compuesto indica cruce por medio de natación. «Nadaron hasta» mantiene la acción y su dirección; el contexto ya deja claro que se trata del paso al otro lado.
- source_word: εἰς τὸ πέραν
  english_pob_choice: to the other side
  chosen_spanish: hasta la otra orilla
  alternatives_spanish:
  - al otro lado
  - a la orilla opuesta
  lexicon: LSJ
  rationale: Es un modismo espacial que señala la ribera opuesta. «Hasta la otra orilla» es idiomático en español y conserva la imagen geográfica.
- source_word: οὐ διέβησαν ἐπ᾿ αὐτοὺς τὸν Ἰορδάνην
  english_pob_choice: they did not cross the Jordan after them
  chosen_spanish: no cruzaron el Jordán detrás de ellos
  alternatives_spanish:
  - no cruzaron el Jordán tras ellos
  - no pasaron el Jordán contra ellos
  lexicon: LSJ
  rationale: La frase griega es comprimida y, en contexto, se refiere a quienes seguían a Jonatán. «Detrás de ellos» refleja el matiz de persecución o seguimiento sin forzar demasiado la interpretación, y evita añadir de forma explícita una lectura bélica que el griego deja implícita.
- source_word: Ἰορδάνην
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: LSJ
  rationale: En español bíblico actual, «el Jordán» es claro y natural; agregar «río» sería explicativo pero no necesario.
translation_notes:
  revision_awareness: 'La versión española sigue la lectura revisada del cierre en el audit trail inglés: la cláusula final se entiende como movimiento «después/detrás de ellos», no como una reexpresión fuerte de ataque. Se conservó la compresión del griego sin expandirla indebidamente.'
  spanish_consistency_notes:
  - Se mantuvo «el Jordán» para el topónimo, en concordancia con el uso bíblico común y el criterio del proyecto.
  - Se evitó «Cristo» o cualquier terminología cristológica ajena al versículo.
  - 'La sintaxis española conserva la secuencia narrativa breve del griego: salto, nado, no cruce posterior.'
