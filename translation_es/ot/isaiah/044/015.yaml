  yaml_path: translation/ot/isaiah/044/015.yaml
  text: Then it becomes fuel for a man[a], and he takes some of them and warms himself; he also kindles a fire and bakes bread. He also makes a god and bows down; he makes it a carved image and prostrates himself before it.
  footnotes:
