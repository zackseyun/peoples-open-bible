translation:
  language: es
  text: Él ata las aguas en sus nubes[a], y la nube no se abre[b] debajo de ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en sus nubes espesas»; el hebreo puede destacar la masa densa de nube.
    reason: lexical_alternative
  - marker: b
    text: O «no se parte»; el hebreo dice literalmente que «no es abierta/partida».
    reason: lexical_alternative
lexical_decisions:
- source_word: צֹרֵֽר
  english_pob_choice: binds up
  chosen_spanish: ata
  alternatives_spanish:
  - sujeta
  - encierra
  - ata y retiene
  lexicon: HALOT
  rationale: El participio expresa la acción de atar, sujetar o confinar. En español, «ata» transmite con naturalidad la idea de retener las aguas sin añadir explicación extra.
- source_word: מַ֥יִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - el agua
  - las aguas
  lexicon: HALOT
  rationale: El plural hebreo encaja bien con «las aguas» en registro poético y conserva mejor la imagen cósmica que «el agua».
- source_word: בְּעָבָיו
  english_pob_choice: in his clouds
  chosen_spanish: en sus nubes
  alternatives_spanish:
  - en sus densas nubes
  - en sus nubarrones
  - en sus nubes espesas
  lexicon: HALOT
  rationale: עָב puede referirse a nube, especialmente nube densa. Se prefiere «nubes» como forma clara y fiel, sin ocultar la posibilidad de densidad, que se deja en nota.
- source_word: וְלֹא
  english_pob_choice: yet ... not
  chosen_spanish: y ... no
  alternatives_spanish:
  - pero ... no
  - sin embargo ... no
  - y no
  lexicon: HALOT
  rationale: El hebreo introduce contraste. En español, la coordinación con «y ... no» mantiene la brevedad poética, mientras el contraste se percibe por la segunda cláusula.
- source_word: נִבְקַע
  english_pob_choice: is not split open
  chosen_spanish: se rompe
  alternatives_spanish:
  - se abre
  - se parte
  - se quiebra
  lexicon: HALOT
  rationale: El nifal de בקע indica ser partido o abierto. «Se rompe» comunica la imagen física con fluidez natural en español; la nota preserva la alternativa más literal «se abre / se parte».
- source_word: עָנָן
  english_pob_choice: the cloud
  chosen_spanish: la nube
  alternatives_spanish:
  - una nube
  - la nube
  lexicon: HALOT
  rationale: Aunque singular, el sustantivo puede funcionar colectivamente en poesía. «La nube» conserva el singular hebreo y suena natural en español.
- source_word: תַּחְתָּם
  english_pob_choice: under them
  chosen_spanish: debajo de ellas
  alternatives_spanish:
  - bajo ellas
  - debajo de ellos
  lexicon: HALOT
  rationale: El sufijo es plural masculino. En español, «ellas» concuerda naturalmente con «las aguas» y mantiene el referente plural, sin perder la relación espacial de debajo.
translation_notes:
  revision_awareness: La revisión más reciente del testimonio inglés no introdujo cambios; el consenso fue de alta concordancia y no se detectaron ajustes pendientes. La presente redacción sigue de cerca ese estado estable, respetando la imagen de contener las aguas dentro de las nubes y la cláusula negativa sobre la nube que no se rompe.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el paralelismo poético y la tensión entre contención de las aguas y la integridad de la nube.
  - Las alternativas de nota preservan la ambigüedad léxica de עָב y בקע sin sobreexplicar en el texto principal.
