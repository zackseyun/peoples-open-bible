  text: My son[a], do not be false in the fear of Yahweh[b], and do not draw near to him with a divided heart.
  footnotes:
  - marker: a
    text: Hebrew witness reads, 'My son, do not be false in the fear of the LORD, and do not draw near to him with a divided heart.' The Greek parallel at this verse instead reads, 'He who repays acts of kindness remembers for what comes afterward, and in a time of falling he will find support.'
