translation:
  language: es
  text: Entonces nos volvimos y subimos por el camino de Basán[a], y Og rey de Basán salió a encontrarnos, él y todo su pueblo, para la batalla en Edrei.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el camino hacia Basán». El hebreo, de manera literal, dice «el camino de Basán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַנֵּפֶן
  english_pob_choice: Then we turned
  chosen_spanish: Entonces nos volvimos
  alternatives_spanish:
  - Y nos volvimos
  - Entonces giramos
  lexicon: HALOT
  rationale: El verbo פנה en esta secuencia narrativa expresa cambio de rumbo; «nos volvimos» conserva el movimiento y suena natural en español. «Entonces» reproduce la fuerza secuencial del waw consecutivo sin forzar un hebraísmo mecánico.
- source_word: וַנַּעַל
  english_pob_choice: went up
  chosen_spanish: subimos
  alternatives_spanish:
  - subimos hacia arriba
  - ascendimos
  lexicon: HALOT
  rationale: עלה puede significar subir/ascender. «Subimos» preserva la dirección ascendente y resulta idiomático en español bíblico contemporáneo.
- source_word: דֶּרֶךְ הַבָּשָׁן
  english_pob_choice: by the way of Bashan
  chosen_spanish: por el camino de Basán
  alternatives_spanish:
  - por la ruta de Basán
  - por el camino hacia Basán
  lexicon: HALOT
  rationale: Se mantiene el sustantivo concreto «camino» para reflejar דרך. La preposición «por» comunica el trayecto sin convertir la expresión en una paráfrasis interpretativa.
- source_word: עוֹג מֶלֶךְ הַבָּשָׁן
  english_pob_choice: Og king of Bashan
  chosen_spanish: Og, rey de Basán
  alternatives_spanish:
  - Og, el rey de Basán
  lexicon: HALOT
  rationale: Se conserva el nombre propio transliterado y la apposición natural en español. No se añade artículo porque el hebreo funciona con la cadena nominal de forma sobria y directa.
- source_word: לִקְרָאתֵנוּ
  english_pob_choice: to meet us
  chosen_spanish: a encontrarnos
  alternatives_spanish:
  - para encontrarse con nosotros
  - para salir a nuestro encuentro
  lexicon: HALOT
  rationale: «Encontrarnos» recoge el sentido básico de לקראת sin intensificarlo artificialmente a «contra nosotros». La forma con «a» mantiene la direccionalidad del encuentro.
- source_word: הוּא וְכָל־עַמּוֹ
  english_pob_choice: he and all his people
  chosen_spanish: él y todo su pueblo
  alternatives_spanish:
  - él y toda su gente
  - él y todo su ejército
  lexicon: HALOT
  rationale: עַם es «pueblo/gente»; aquí no obliga a traducir «ejército». «Pueblo» mantiene el alcance amplio del hebreo, aunque el contexto sea bélico.
- source_word: לַמִּלְחָמָה
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  - para combatir
  lexicon: HALOT
  rationale: מִלְחָמָה puede ser «guerra» o «batalla». En este contexto inmediato, «batalla» es más preciso y conserva el carácter concreto del enfrentamiento.
- source_word: אֶדְרֶעִי
  english_pob_choice: at Edrei
  chosen_spanish: en Edrei
  alternatives_spanish:
  - a Edrei
  lexicon: HALOT
  rationale: El topónimo se translitera. Como lugar del encuentro bélico, «en» es la preposición más natural en español para marcar localización.
translation_notes:
  revision_awareness: El texto fuente muestra alta concordancia con la auditoría inglesa y no requiere revisiones textuales; se ha mantenido la estructura narrativa simple, la referencia geográfica y el matiz militar sin añadir elementos no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Basán» con acento gráfico conforme al uso español estándar para el topónimo.
  - Se evita «SEÑOR» o «Eterno» porque no aparece el nombre divino en este versículo.
  - «Batalla» se usa como equivalente contextual de מִלְחָמָה, sin ampliar a «guerra».
  - La nota al pie preserva la alternativa idiomática del hebreo sin duplicar marcadores.
