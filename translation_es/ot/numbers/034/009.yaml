  rationale: La revisión mantiene el contenido del borrador, pero ajusta la dirección geográfica ('a Ziprón'), hace más natural la cláusula resumitiva ('Este será su'), y mejora la expresión final con 'límite norte', sin perder la precisión del original ni la nota del POB sobre el plural formal hebreo.
