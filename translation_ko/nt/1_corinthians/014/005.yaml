  text: θέλω δὲ πάντας ὑμᾶς λαλεῖν γλώσσαις, μᾶλλον δὲ ἵνα προφητεύητε· μείζων ⸀δὲ ὁ προφητεύων ἢ ὁ λαλῶν γλώσσαις, ἐκτὸς εἰ μὴ ⸀διερμηνεύῃ, ἵνα ἡ ἐκκλησία οἰκοδομὴν λάβῃ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/005.yaml
  text: Now I want all of you to speak in tongues[a], but even more that you would prophesy. The one who prophesies is greater than the one who speaks in tongues, unless he interprets[b], so that the church may receive edification.
  footnotes:
  - marker: a
    text: Or, 'unless someone interprets.' The Greek singular verb could refer to the tongue-speaker himself or, more generally in context, to interpretation being provided.
    reason: alternative_reading
  - marker: b
    text: '''Edification'' means the building up of the gathered church.'
    reason: lexical_alternative
translation:
  language: ko
  text: 나는 여러분 모두가 방언으로 말하기를 원하지만, 더 바라는 것은 여러분이 예언하는 것입니다. 방언으로 말하는 사람보다 예언하는 사람이 더 큽니다. 다만 그가 통역하여 교회가 세움을 받게 되는 경우는 다릅니다.
  philosophy: optimal-equivalence
