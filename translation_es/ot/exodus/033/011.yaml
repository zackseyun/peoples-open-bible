translation:
  language: es
  text: Yahvé hablaba a Moisés cara a cara[a], como habla un hombre a su amigo. Luego volvía al campamento, pero su asistente Josué hijo de Nun, un joven[b], no se apartaba de en medio de la tienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «directamente» / «personalmente». El modismo hebreo «cara a cara» expresa un encuentro inusualmente directo.
    reason: lexical_alternative
  - marker: b
    text: Es decir, la tienda de reunión.
    reason: cross_reference
lexical_decisions:
- source_word: וְ/דִבֶּר
  english_pob_choice: would speak
  chosen_spanish: hablaba
  alternatives_spanish:
  - hablaba continuamente
  - solía hablar
  lexicon: HALOT
  rationale: El imperfecto hebreo en este contexto narrativo expresa acción repetida o habitual; en español, «hablaba» comunica mejor ese valor iterativo que un pretérito simple.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración según el estándar del proyecto. «Yahvé» mantiene la referencia personal del Tetragrámaton sin reemplazarla por un título.
- source_word: פָּנִים אֶל פָּנִים
  english_pob_choice: face to face
  chosen_spanish: cara a cara
  alternatives_spanish:
  - directamente
  - personalmente
  lexicon: HALOT
  rationale: «Cara a cara» es el equivalente idiomático natural en español y preserva la fuerza de encuentro directo e inmediato sin forzar una lectura corporal literal.
- source_word: כַּ/אֲשֶׁר יְדַבֵּר אִישׁ אֶל רֵעֵהוּ
  english_pob_choice: as a man speaks to his friend
  chosen_spanish: como habla un hombre a su amigo
  alternatives_spanish:
  - como uno habla a su amigo
  - como habla una persona a su amigo
  lexicon: HALOT
  rationale: Se mantiene «un hombre» para reflejar אִישׁ y «su amigo» para רֵעַ en un registro natural y fiel al hebreo.
- source_word: וְ/שָׁב
  english_pob_choice: Then he would return
  chosen_spanish: Luego volvía
  alternatives_spanish:
  - y regresaba
  - entonces regresaba
  lexicon: HALOT
  rationale: El qatal en secuencia narrativa sigue describiendo la pauta habitual; «volvía» conserva el sentido de repetición y fluidez narrativa.
- source_word: הַֽ/מַּחֲנֶ֔ה
  english_pob_choice: the camp
  chosen_spanish: el campamento
  alternatives_spanish:
  - el campamento de Israel
  - el campamento
  lexicon: HALOT
  rationale: «Campamento» es la equivalencia estándar y clara para el asentamiento del pueblo en el desierto.
- source_word: וּ/מְשָׁרְתּוֹ
  english_pob_choice: his attendant
  chosen_spanish: su asistente
  alternatives_spanish:
  - su servidor
  - su ayudante
  lexicon: HALOT
  rationale: El participio denota una función de ayuda y servicio. «Asistente» evita las connotaciones demasiado domésticas o jerárquicas de «siervo/servidor» en este contexto.
- source_word: יְהוֹשֻׁעַ בִּן נוּן
  english_pob_choice: Joshua son of Nun
  chosen_spanish: Josué hijo de Nun
  alternatives_spanish:
  - Josué, hijo de Nun
  lexicon: HALOT
  rationale: Se translitera el nombre propio de forma estándar al español bíblico y se vierte la filiación con la construcción natural «hijo de».
- source_word: נַעַר
  english_pob_choice: a young man
  chosen_spanish: un joven
  alternatives_spanish:
  - un muchacho
  - un joven muchacho
  lexicon: HALOT
  rationale: Aquí נַעַר señala edad relativa; «joven» es una solución natural y suficiente en español sin añadir matices innecesarios de servicio.
- source_word: לֹא יָמִישׁ
  english_pob_choice: would not depart
  chosen_spanish: no se apartaba
  alternatives_spanish:
  - no se retiraba
  - no se alejaba
  lexicon: HALOT
  rationale: מוּשׁ expresa no moverse de un lugar o no retirarse; «no se apartaba» reproduce bien esa idea en un español fluido.
- source_word: מִ/תּ֥וֹךְ הָ/אֹֽהֶל
  english_pob_choice: from the midst of the tent
  chosen_spanish: del medio de la tienda
  alternatives_spanish:
  - del interior de la tienda
  - de en medio de la tienda
  lexicon: HALOT
  rationale: «Del medio de la tienda» refleja literalmente el hebreo y suena natural en español. «Tienda» conserva el posible referente de la tienda de reunión en el contexto.
theological_decisions:
- issue: Lenguaje antropomórfico de Yahvé hablando 'cara a cara' con Moisés
  english_pob_reading: Retain the idiom 'face to face' in the main text as language of direct personal encounter
  chosen_spanish_reading: Conservar «cara a cara» en el texto principal como lenguaje de encuentro personal y directo
  alternative_spanish_readings:
  - traducir dinámicamente «directamente»
  - traducir «personalmente»
  rationale: La frase hebrea es un modismo que expresa la intensidad e inmediatez del encuentro, no una descripción simplificada de la visión. Conservarlo preserva la tensión teológica que el texto mismo deja en pie.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se siguió el último pase de revisión indicado como sin cambios; no hubo revisiones aplicadas en el contexto fuente. La redacción española conserva la secuencia narrativa habitual del imperfecto y mantiene la tensión teológica de «cara a cara» sin resolverla dinámicamente.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el Tetragrámaton, conforme al criterio del proyecto.
  - Se prefirió «cara a cara» como equivalente idiomático natural y teológicamente conservador.
  - «Asistente» se eligió para evitar cargar el término con connotaciones de esclavitud o ministerio eclesiástico.
  - «Tienda» mantiene el referente contextual de la tienda de reunión sin necesidad de explicitarlo en el texto principal.
