translation:
  language: es
  text: Es como un león[a][c], ansioso por desgarrar, como un leoncillo sentado[b] en escondites.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su semejanza es como un león». El hebreo abre con un sustantivo, «su semejanza», que en español puede expresarse de manera más idiomática como una comparación directa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «acechando». El participio hebreo dice literalmente «sentado», pero en este contexto puede sugerir una postura de emboscada.'
    reason: lexical_alternative
  - marker: c
    text: Lit. «su semejanza es como un león».
    reason: previous_rendering
lexical_decisions:
- source_word: דִּמְיֹנוֹ
  english_pob_choice: He is like
  chosen_spanish: Es como
  alternatives_spanish:
  - Su semejanza es como
  - Su apariencia es como
  lexicon: HALOT
  rationale: El hebreo abre con un sustantivo de semejanza, pero el flujo natural del español exige expresar la comparación de modo directo. «Es como» conserva el sentido comparativo sin sobrecargar la frase con una abstracción poco idiomática.
- source_word: כְּאַרְיֵה
  english_pob_choice: like a lion
  chosen_spanish: como un león
  alternatives_spanish:
  - como un león
  lexicon: HALOT
  rationale: אַרְיֵה designa un león adulto; «como un león» mantiene la imagen animal y la comparación estándar de la partícula כ.
- source_word: יִכְסוֹף
  english_pob_choice: eager
  chosen_spanish: ansioso
  alternatives_spanish:
  - deseoso
  - con anhelo
  lexicon: HALOT
  rationale: En este contexto depredador, el verbo expresa un impulso fuerte y expectante. «Ansioso» comunica esa intensa disposición en un español natural, sin suavizar la fuerza del deseo.
- source_word: לִטְרוֹף
  english_pob_choice: to tear
  chosen_spanish: desgarrar
  alternatives_spanish:
  - hacer presa
  - rajar
  - despedazar
  lexicon: HALOT
  rationale: טרף en imaginería animal apunta a desgarrar a la presa. «Desgarrar» conserva la violencia concreta del verbo mejor que una paráfrasis más abstracta.
- source_word: כְּכְפִיר
  english_pob_choice: like a young lion
  chosen_spanish: como un leoncillo
  alternatives_spanish:
  - como un cachorro de león
  - como un joven león
  lexicon: HALOT
  rationale: כפיר designa un león joven. «Leoncillo» es una opción natural y clara en español, y preserva la idea de juventud sin perder la fuerza poética del paralelismo.
- source_word: יֹשֵׁב
  english_pob_choice: sitting
  chosen_spanish: sentado
  alternatives_spanish:
  - sentado
  - acechando
  lexicon: HALOT
  rationale: El participio significa literalmente «sentado»; mantenerlo evita borrar la imagen hebrea. En español, «sentado en escondites» suena algo marcado pero sigue siendo transparente. Se deja «acechando» como alternativa interpretativa, no principal.
- source_word: בְּמִסְתָּרִים
  english_pob_choice: in hiding places
  chosen_spanish: en escondites
  alternatives_spanish:
  - en lugares ocultos
  - en escondrijos
  lexicon: HALOT
  rationale: El plural indica lugares ocultos o de escondite. «En escondites» conserva la pluralidad y el matiz de ocultamiento con un término breve y publicable en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que corrigió la apertura demasiado literal «His likeness is like a lion» a una comparación más idiomática («He is like a lion»). La versión española refleja esa preferencia, pero mantiene en nota la alternativa más formal basada en el sustantivo hebreo de semejanza.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se mantuvo un registro poético y transparente, evitando suavizar la violencia del léxico animal.
  - Se preservó el paralelismo con dos comparaciones unidas por «y», como refleja el hebreo.
  - Se conservó la tensión entre el participio literal «sentado» y su posible valor contextual de emboscada mediante nota.
