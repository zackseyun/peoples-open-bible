translation:
  language: es
  text: Porque ve que los sabios mueren[a]; juntos, el necio y el hombre bestial[b] perecen, y dejan su riqueza[c] a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los sabios». El hebreo usa formas masculinas para tipos humanos representativos.
    reason: lexical_alternative
  - marker: b
    text: «Hombre bestial» se refiere a una persona insensata o embrutecida, de comportamiento semejante al de una bestia.
    reason: lexical_alternative
  - marker: c
    text: O «sus riquezas» o «sus bienes».
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la explicación de la afirmación anterior. «Porque» conserva bien la fuerza causal/explicativa de כִּי en un español natural y bíblico.
- source_word: יִרְאֶה
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - él ve
  - uno ve
  - verá
  lexicon: HALOT
  rationale: El imperfecto hebreo expresa observación gnómica o general; en español, el presente «ve» comunica mejor esa verdad general sin forzar futuro.
- source_word: חֲכָמִים
  english_pob_choice: wise men
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  - los sabios varones
  - la gente sabia
  lexicon: HALOT
  rationale: Se conserva el plural masculino representativo del hebreo. «Los sabios» es más natural en español que «sabios hombres» y mantiene la categoría humana general.
- source_word: יָמוּתוּ
  english_pob_choice: die
  chosen_spanish: mueren
  alternatives_spanish:
  - morirán
  - mueren los
  lexicon: HALOT
  rationale: El presente español expresa aquí un hecho general. «Mueren» mantiene el carácter proverbial del enunciado.
- source_word: יַחַד
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - juntos
  - a la vez
  - por igual
  lexicon: HALOT
  rationale: «Juntamente» reproduce el sentido de simultaneidad y nivelación de destino entre los grupos contrastados.
- source_word: כְּסִיל
  english_pob_choice: the fool
  chosen_spanish: el necio
  alternatives_spanish:
  - el insensato
  - el tonto
  - el necio
  lexicon: HALOT
  rationale: En la literatura sapiencial, כְּסִיל designa al necio moral y espiritualmente, no solo al poco inteligente. «Neceo» preserva mejor ese peso ético.
- source_word: בַעַר
  english_pob_choice: the brutish man
  chosen_spanish: el hombre brutal
  alternatives_spanish:
  - el hombre sensato no
  - el hombre insensato
  - el hombre bestial
  lexicon: HALOT
  rationale: «Brutish» se vierte como «brutal» para conservar la imagen de rudeza/animalidad sin volver la frase demasiado extraña en español. «Hombre» mantiene la forma masculina representativa del hebreo.
- source_word: יֹאבֵדוּ
  english_pob_choice: perish
  chosen_spanish: perecen
  alternatives_spanish:
  - se pierden
  - son destruidos
  - desaparecen
  lexicon: HALOT
  rationale: '«Perecer» expresa más que morir: implica ruina o desaparición, tal como el hebreo אבד en este contexto sapiencial.'
- source_word: וְעָזְב֖וּ
  english_pob_choice: and they leave
  chosen_spanish: y dejan
  alternatives_spanish:
  - y dejan atrás
  - y abandonan
  lexicon: HALOT
  rationale: «Dejan» es la forma más natural y directa para expresar que su posesión queda para otros.
- source_word: לַאֲחֵרִים
  english_pob_choice: to others
  chosen_spanish: a otros
  alternatives_spanish:
  - a los demás
  - a extraños
  - a otros hombres
  lexicon: HALOT
  rationale: «A otros» reproduce el indefinido hebreo sin añadir matices no explicitados por el texto.
- source_word: חֵילָם
  english_pob_choice: their wealth
  chosen_spanish: su riqueza
  alternatives_spanish:
  - sus riquezas
  - sus bienes
  - su patrimonio
  lexicon: HALOT
  rationale: En este contexto, חֵיל puede referirse a riquezas o recursos acumulados. «Riqueza» expresa con claridad lo que queda para otros, sin sobrecargar la frase.
theological_decisions:
- issue: Valor representativo del masculino plural y del singular sapiencial
  english_pob_reading: wise men ... the brutish man
  chosen_spanish_reading: los sabios ... el hombre brutal
  alternative_spanish_readings:
  - la gente sabia ... la persona brutal
  - los sabios ... el insensato
  rationale: Se conserva la referencia masculina gramatical del hebreo como tipo representativo humano, siguiendo el principio de fidelidad formal sin perder claridad idiomática en español.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Sentido de אבד en contexto de muerte y ruina
  english_pob_reading: perish
  chosen_spanish_reading: perecen
  alternative_spanish_readings:
  - mueren
  - son destruidos
  - desaparecen
  rationale: El texto no solo afirma muerte física sino desaparición/ruina frente al poder de la muerte. «Perecen» mantiene esa tensión mejor que un simple «mueren».
  doctrine_reference: DOCTRINE.md § Lexical precision on semantic range
translation_notes:
  revision_awareness: La versión inglesa auditada no presentó revisiones aplicadas y fue confirmada como estable en la última pasada. La redacción española sigue de cerca la estructura hebrea y conserva las alternativas léxicas documentadas en la POB inglesa, adaptándolas a un español natural.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general de la POB, pero este versículo no contiene el nombre divino.
  - Se prefirió «los sabios» frente a una perífrasis más pesada, porque en español comunica bien el tipo sapiencial masculino sin perder naturalidad.
  - «Perecen» se conservó para no diluir la fuerza de אבד en este paralelismo.
  - «Su riqueza» refleja un sustantivo colectivo singular posible en español; la nota preserva las alternativas plurales documentadas.
