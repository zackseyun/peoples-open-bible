review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: la tierra y sus habitantes están en estado de colapso/inestabilidad, y el hablante enfatiza que él mismo ha afirmado sus pilares. También conserva correctamente la imagen cosmológica y la transliteración de Selah. Sin embargo, dos elecciones principales se apartan del audit trail inglés: ''se derriten'' suena demasiado físico en español para tierra e habitantes, y ''sus columnas'' debilita la decisión documentada de preservar específicamente ''pillars'' como imagen poética.'
  spanish_quality_summary: El texto es claro y legible, pero 'se derriten' resulta menos natural con 'la tierra' en español bíblico moderno y puede sugerir licuefacción literal más que colapso poético. 'Sus pilares' suena más directo, idiomático y fiel a la rationale inglesa que 'sus columnas'. El resto del verso fluye bien en español neutral y digno.
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé/Mesías. Sí importa la decisión teológica documentada sobre עַמּוּדֶיהָ: debe preferirse ''pilares'' frente a ''columnas'' para alinearse con la rationale POB de conservar la imagen cosmológica literal. Para נְמֹגִים, una formulación como ''se desmoronan'' preserva mejor la inestabilidad/colapso en español que ''se derriten''.'
  issues:
