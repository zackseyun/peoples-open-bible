translation:
  language: es
  text: 'Entonces Josué dijo: «Abran la boca[a] de la cueva y sáquenme de la cueva a esos[b] cinco reyes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «la boca de la cueva».
    reason: lexical_alternative
  - marker: b
    text: O «estos cinco reyes».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «entonces» conserva esa secuencia en español con fluidez natural.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Josue
  lexicon: Nombre propio bíblico
  rationale: Se mantiene la forma habitual y readable en español para el nombre propio.
- source_word: פִּתְחוּ
  english_pob_choice: Open
  chosen_spanish: Abrid
  alternatives_spanish:
  - Abrir
  - Destapad
  lexicon: HALOT
  rationale: El imperativo plural pide un mandato directo; «abrid» es fiel y natural en registro bíblico-digno.
- source_word: פִּי הַמְּעָרָה
  english_pob_choice: the mouth of the cave
  chosen_spanish: la boca de la cueva
  alternatives_spanish:
  - la abertura de la cueva
  - la entrada de la cueva
  lexicon: HALOT
  rationale: «Boca» preserva el hebraísmo concreto de פִּי, tal como lo hace la POB en inglés, y mantiene la imagen corporal del texto.
- source_word: וְהוֹצִיאוּ
  english_pob_choice: bring ... out
  chosen_spanish: sacad
  alternatives_spanish:
  - traed ... fuera
  - haced salir
  lexicon: HALOT
  rationale: El verbo causativo se expresa de forma breve con un imperativo idiomático en español; «sacad» comunica la acción de sacar desde el interior.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: hacia mí
  alternatives_spanish:
  - a mí
  - delante de mí
  lexicon: HALOT
  rationale: La preposición de dirección se conserva explícita; «hacia mí» suena natural y refleja el movimiento hacia Josué.
- source_word: חֲמֵשֶׁת הַמְּלָכִים הָאֵלֶּה
  english_pob_choice: those five kings
  chosen_spanish: a estos cinco reyes
  alternatives_spanish:
  - a esos cinco reyes
  - a aquellos cinco reyes
  lexicon: HALOT
  rationale: El demostrativo puede ser «estos/eses/aquellos»; aquí «estos» sigue bien la deixis inmediata del discurso en español y mantiene la referencia específica ya identificada.
- source_word: מִן הַמְּעָרָה
  english_pob_choice: out of the cave
  chosen_spanish: de la cueva
  alternatives_spanish:
  - fuera de la cueva
  - desde la cueva
  lexicon: HALOT
  rationale: Con un verbo de extracción, «sacad de la cueva» ya expresa el movimiento de salida; no hace falta recargar con una segunda preposición. La imagen sigue siendo clara.
translation_notes:
  revision_awareness: Se siguió la lectura auditada de la POB en inglés y el hebreo masorético. No se detectaron revisiones aplicadas en el expediente; la versión española conserva la misma estructura narrativa y las mismas decisiones léxicas principales, ajustadas a la sintaxis natural del español.
  spanish_consistency_notes:
  - Se mantiene «Josué» como forma normal del nombre propio.
  - Se conserva «cave/פה» como «cueva/boca» en vez de neutralizarlo a «entrada», para respetar el hebraísmo documentado.
  - Se usa imperativo plural en segunda persona («Abrid», «sacad»), coherente con el plural hebreo.
