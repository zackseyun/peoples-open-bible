    22 firmum et dicta perseuerantia, Cuius dispositio fortis et iussio

    23 terribilis, cuius aspectus arefacit abyssos et indignatio tabescere facit montes et ueritas testificatur : Exaudi, domine, orationem

    24 serui tui et auribus percipe precationem figmenti tui, intende uerba mea. Dum enim uiuo loquar et dum sapio respondeam.

    25 Ne aspicias populi tui delicta, sed qui tibi in ueritate serui-

