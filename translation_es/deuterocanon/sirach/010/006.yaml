translation:
  language: es
  text: Ante cualquier ofensa[a], no pagues a tu prójimo con mal, y no andes por el camino de la soberbia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «Sobre toda injusticia, no te airés con tu prójimo»; allí el énfasis recae más en el resentimiento que en la represalia.'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּכֵל פֶּשַׁע
  english_pob_choice: for any offense
  chosen_spanish: Por cualquier ofensa
  alternatives_spanish:
  - Por toda ofensa
  - Por cualquier transgresión
  - Por cualquier mal
  lexicon: HALOT
  rationale: La expresión hebrea tiene sentido universal en una prohibición. «Por cualquier ofensa» conserva ese alcance sin volverla mecánica. Evita tanto una acumulación extraña en español como una suavización excesiva del campo semántico de פֶּשַׁע, que puede incluir ofensa, transgresión o falta.
- source_word: אַל תְּשַׁלֵּם רַע
  english_pob_choice: do not repay evil
  chosen_spanish: no le pagues mal
  alternatives_spanish:
  - no le repagas mal
  - no devuelvas mal
  - no recompenses con mal
  lexicon: HALOT
  rationale: שׁלם en piel expresa la idea de pagar o retribuir. «No le pagues mal» mantiene la noción de retribución y la dirección interpersonal del mandato. Se conserva la fuerza ética del hebreo, que prohíbe la represalia con mal.
- source_word: לְרֵעַ
  english_pob_choice: to your neighbor
  chosen_spanish: a tu prójimo
  alternatives_spanish:
  - a tu vecino
  - a tu semejante
  - a tu compañero
  lexicon: HALOT
  rationale: רֵעַ suele abarcar al prójimo o compañero cercano. «Prójimo» es natural, bíblicamente reconocible y comunica bien la relación moral implicada. Aunque «vecino» también es posible, «prójimo» evita restringir indebidamente el sentido geográfico.
- source_word: וְאַל תִּהֲלַךְ
  english_pob_choice: and do not walk
  chosen_spanish: y no camines
  alternatives_spanish:
  - y no vayas
  - y no te conduzcas
  - y no sigas
  lexicon: HALOT
  rationale: El hebreo usa el verbo «caminar» en sentido conductual. En español, «no camines» conserva esa metáfora ética y suena natural en un contexto sapiencial.
- source_word: בְּדֶרֶךְ גַּאֲוָה
  english_pob_choice: in the way of pride
  chosen_spanish: en el camino de la soberbia
  alternatives_spanish:
  - en el camino del orgullo
  - en la senda de la arrogancia
  - en el modo soberbio
  lexicon: HALOT
  rationale: דֶּרֶךְ admite la imagen de «camino» como conducta o estilo de vida. גַּאֲוָה puede traducirse por orgullo, soberbia o arrogancia; «soberbia» mantiene mejor el tono moral admonitorio en español. La opción también deja espacio para la resonancia con el griego sobre obras de insolencia.
theological_decisions:
- issue: Divergencia entre el hebreo y el griego en la primera prohibición
  english_pob_reading: Follow the Hebrew 'do not repay evil' in the main text while noting the Greek's emphasis on anger/resentment in a footnote.
  chosen_spanish_reading: Seguir el hebreo con «no le pagues mal» en el texto principal, y señalar en nota que el griego enfatiza no resentirse ni airarse con el prójimo.
  alternative_spanish_readings:
  - no te enojes con tu prójimo por ninguna injusticia
  - no guardes resentimiento contra tu prójimo por ningún mal
  rationale: Cuando el hebreo está preservado y es de alta confianza, gobierna la redacción principal; sin embargo, el paralelo griego aporta una tensión real que no debe ocultarse. Por eso la nota conserva la lectura alternativa de la reprensión interior/afectiva que el griego sugiere, sin borrar la idea hebrea de represalia.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; DOCTRINE.md: preserve theological tension rather than resolve it silently'
translation_notes:
  revision_awareness: El inglés auditado fue afinado para poner el primer hemistiquio en forma más natural («For any offense, do not repay your neighbor with evil»), y la presente versión española sigue esa misma claridad sin depender mecánicamente del inglés. La elección principal se basa en el hebreo, mientras que la nota preserva la tensión con el griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando corresponda; este versículo no lo requiere.
  - Se usa «prójimo» para לְרֵעַ por fidelidad semántica y buena inteligibilidad.
  - «Soberbia» traduce el campo de גַּאֲוָה sin introducir una noción más estrecha que el hebreo.
  - La nota marcada con [a] aparece exactamente en el punto de ambigüedad relevante y conserva la alternativa griega sin desplazar el texto principal.
