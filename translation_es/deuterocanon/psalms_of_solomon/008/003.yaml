  revision_rationale: 'Se ajusta la redacción para lograr un español natural y fiel: se conserva «en mi corazón» con nota de alternativa literal, y se reemplaza «a él» por «lo», que es la forma idiomática para el objeto directo pronominal. También se mejora la fluidez con la puntuación de «entonces».'
