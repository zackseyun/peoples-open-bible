review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del hebreo: deliberación sobre un campo, adquisición del campo, y luego plantación de una viña con el producto de su trabajo. Sin embargo, «con el fruto de sus manos» cambia la fuerza de מִן (''de/desde, a partir de'') a un matiz más instrumental (''con''), mientras que el English POB y la evidencia fuente destacan origen/procedencia. También la colocación de notas no refleja bien la auditoría inglesa: la nota cultural debe anclarse en la frase idiomática «del fruto de sus manos», y la alternativa léxica corresponde mejor al segmento verbal anterior.'
  spanish_quality_summary: El español es claro y digno. «Ella considera un campo y lo adquiere» suena natural. La única mejora importante es preferir «del fruto de sus manos» en lugar de «con el fruto de sus manos» para mayor fidelidad al hebreo y a la decisión auditada, sin perder naturalidad. La puntuación y legibilidad son buenas.
  glossary_alignment: 'No hay términos del glosario principal comprometidos aquí. Las decisiones léxicas clave son mayormente correctas: «considera», «campo», «lo adquiere», «planta», «viña». La excepción relevante es מִפְּרִי, donde debe alinearse con «del fruto» más que «con el fruto» para preservar la relación de fuente. La nota sobre el modismo debe mantenerse.'
  issues:
  - severity: medium
    issue: «con el fruto de sus manos» debilita la preposición de fuente en מִפְּרִי
    rationale: El hebreo usa מִן, y la auditoría inglesa decidió explícitamente «from the fruit». En español, «del fruto de sus manos» conserva mejor la idea de procedencia/rendimiento sin dejar de ser natural.
  - severity: low
    issue: La nota cultural está anclada en «viña» en vez de en la frase idiomática
    rationale: La explicación trata del modismo «del fruto de sus manos», por lo que el marcador debe aparecer en esa frase para corresponder exactamente con la nota.
  - severity: low
    issue: La redacción de la nota a puede pulirse
    rationale: '«O: “planea un campo y lo toma”» es entendible, pero suena algo forzada. «O: “planea obtener un campo y lo toma”» sería más idiomática, aunque para mantenerse cercana a la auditoría inglesa basta con limpiar comillas y estilo.'
  revised_spanish_text: Ella considera un campo y lo adquiere[a]; del fruto de sus manos[b] planta una viña.
