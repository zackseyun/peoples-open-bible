base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/018/027.yaml
  text: So David arose and went[a], he and his men, and struck down two hundred Philistine men. Then David brought their foreskins, and they counted them out in full to the king, so that he might become the king’s son-in-law. And Saul gave him Michal his daughter as a wife.
  footnotes:
  - marker: a
    text: Or, 'they presented the full number to the king.' The Hebrew verb is difficult and may refer either to counting them out or to completing the required tally before the king.
    reason: lexical_alternative
