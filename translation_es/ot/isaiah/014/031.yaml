translation:
  language: es
  text: ¡Gime[a], puerta! ¡Clama, ciudad! Desfallece[b], toda Filistea; porque del norte viene humo, y no hay rezagado en sus filas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aúlla»; el verbo hebreo también puede traducirse «lamenta» o «gime».
    reason: lexical_alternative
  - marker: b
    text: O «desfallece» puede entenderse como «se derrite», «se disuelve de miedo» o «se desmorona».
    reason: lexical_alternative
  - marker: c
    text: O «y no hay quien quede atrás en sus puestos señalados». El hebreo final puede referirse a tropas completamente reunidas y ordenadas.
    reason: alternative_reading
lexical_decisions:
- source_word: הֵילִילִי
  english_pob_choice: Wail
  chosen_spanish: ¡Aúlla!
  alternatives_spanish:
  - ¡Lamenta!
  - ¡Gime!
  lexicon: HALOT
  rationale: El imperativo femenino singular expresa un lamento agudo de angustia. «Aúlla» conserva la fuerza expresiva de 'Wail' y también permite la alternativa documentada de 'Howl' sin suavizar el tono profético.
- source_word: שַׁעַר
  english_pob_choice: O gate
  chosen_spanish: puerta
  alternatives_spanish:
  - portón
  - puerta de la ciudad
  lexicon: HALOT
  rationale: Aquí funciona como vocativo y metonimia de la ciudad fortificada. En español, «puerta» es la forma más natural y mantiene la llamada directa al acceso/cuerpo cívico de la ciudad.
- source_word: זַעֲקִי
  english_pob_choice: Cry out
  chosen_spanish: ¡Clama!
  alternatives_spanish:
  - ¡Grita!
  - ¡Prorrumpe en un grito!
  lexicon: HALOT
  rationale: El imperativo de זעק pide un grito de alarma. «Clama» preserva solemnidad y urgencia sin volverlo innecesariamente coloquial.
- source_word: עִיר
  english_pob_choice: O city
  chosen_spanish: ciudad
  alternatives_spanish:
  - ciudad, ¡oh ciudad!
  - poblado
  lexicon: HALOT
  rationale: Se trata de un segundo vocativo paralelo a «puerta». En español basta el vocativo por contexto, y la interjección ya está marcada por la exclamación; añadir «oh» sería recargado.
- source_word: נָמֹוג
  english_pob_choice: Melt away
  chosen_spanish: desfalleced
  alternatives_spanish:
  - deshaceos
  - derretíos de miedo
  - desfallece
  lexicon: HALOT
  rationale: El verbo puede expresar derrumbe, descomposición o pérdida de valor. «Desfalleced» comunica bien la desmoralización colectiva y evita una imagen demasiado física que en español sonaría extraña.
- source_word: פְּלֶשֶׁת כֻּלֵּךְ
  english_pob_choice: all of you, Philistia
  chosen_spanish: toda tú, Filistea
  alternatives_spanish:
  - toda Filistea
  - toda tú, tierra de Filistea
  lexicon: HALOT
  rationale: El hebreo trata a Filistea como entidad femenina singular con sufijo de segunda femenina singular. «Toda tú» conserva ese valor y evita perder la personificación colectiva.
- source_word: מִצָּפוֹן
  english_pob_choice: from the north
  chosen_spanish: del norte
  alternatives_spanish:
  - desde el norte
  - del septentrión
  lexicon: HALOT
  rationale: La dirección geográfica es literal; «del norte» es la forma más natural en español y mantiene el matiz profético del origen del peligro.
- source_word: עָשָׁן
  english_pob_choice: smoke
  chosen_spanish: humo
  alternatives_spanish:
  - una nube de humo
  - humo espeso
  lexicon: HALOT
  rationale: La imagen es literal. «Humo» conserva la metáfora sin añadir interpretación.
- source_word: בָּא
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - ha venido
  lexicon: HALOT
  rationale: El perfecto hebreo en discurso profético suele tener fuerza presente o inminente. «Viene» refleja bien la inmediatez en español.
- source_word: וְאֵין בּוֹדֵד
  english_pob_choice: and there is no straggler
  chosen_spanish: y no hay rezagado
  alternatives_spanish:
  - y no hay ninguno separado
  - y no hay quien se quede atrás
  lexicon: HALOT
  rationale: בּוֹדֵד alude a alguien separado del grupo. «Rezagado» reproduce el valor militar de alguien que queda detrás y funciona con naturalidad en español.
- source_word: בְּמוֹעָדָיו
  english_pob_choice: in his ranks
  chosen_spanish: en sus filas
  alternatives_spanish:
  - en sus lugares asignados
  - en sus puestos señalados
  lexicon: HALOT
  rationale: Aunque מועד puede significar tiempo señalado o lugar asignado, el contexto militar favorece una imagen de orden y formación. «Filas» comunica disciplina castrense sin forzar la etimología.
theological_decisions:
- issue: Sentido de la clausula final וְאֵין בּוֹדֵד בְּמוֹעָדָיו
  english_pob_reading: The clause describes the invader's army as disciplined, with no straggler in its assigned ranks.
  chosen_spanish_reading: La cláusula describe al invasor como un ejército disciplinado, sin rezagados en sus filas.
  alternative_spanish_readings:
  - No hay nadie aislado en su tiempo señalado
  - No falta nadie en su puesto asignado
  rationale: El contexto inmediato habla del avance amenazante desde el norte. La lectura militar encaja mejor con la imagen del humo que viene y conserva la fuerza del juicio profético sobre Filistea.
  doctrine_reference: Hermenéutica profética / imaginería militar en oráculos de juicio
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta versión conserva la lectura aprobada y mantiene el valor militar del final del versículo sin suavizar la imaginería.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto hebreo lo exige; este versículo no lo contiene.
  - Se conserva la personificación femenina singular de Filistea con «toda tú».
  - La elección de «filas» para בְּמוֹעָדָיו sigue la línea auditada de orden militar y evita una traducción temporal que rompería el paralelismo del verso.
