translation:
  language: es
  text: Sus obras no los dejan volver a su Dios, porque un espíritu de prostitución[a] está dentro de ellos, y no conocen a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «un espíritu de prostitución» o «un espíritu de harlotía». El hebreo usa una imagen de infidelidad sexual para la deslealtad al pacto y la idolatría.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִתְּנוּ
  english_pob_choice: do not allow
  chosen_spanish: no los dejan
  alternatives_spanish:
  - no les permiten
  - no les dan lugar
  lexicon: HALOT
  rationale: נתן en esta construcción idiomática expresa impedimento efectivo para volver; en español, «no los dejan» comunica esa idea de manera natural sin perder el matiz de restricción.
- source_word: מַעַלְלֵיהֶם
  english_pob_choice: their deeds
  chosen_spanish: sus obras
  alternatives_spanish:
  - sus hechos
  - sus acciones
  - sus prácticas
  lexicon: HALOT
  rationale: El término apunta a lo que hacen habitualmente. «Obras» conserva un tono moral y profético, y en español fluye bien junto al verbo «dejar».
- source_word: לָשׁוּב
  english_pob_choice: to return
  chosen_spanish: volver
  alternatives_spanish:
  - regresar
  - convertirse
  lexicon: HALOT
  rationale: «Volver» preserva el sentido básico de retorno y, en contexto profético, deja abierta la resonancia de arrepentimiento sin explicitarla en exceso.
- source_word: אֶל אֱלֹהֵיהֶם
  english_pob_choice: to their God
  chosen_spanish: a su Dios
  alternatives_spanish:
  - a sus dioses
  lexicon: HALOT
  rationale: Aunque el hebreo admite plural morfológico, el contexto de la acusación pactal apunta al Dios de Israel. El singular «su Dios» refleja mejor esa lectura contextual.
- source_word: רוּחַ זְנוּנִים
  english_pob_choice: a spirit of whoredom
  chosen_spanish: un espíritu de prostitución
  alternatives_spanish:
  - un espíritu de fornicación
  - un espíritu de infidelidad sexual
  - un espíritu de ramera
  lexicon: HALOT
  rationale: El hebreo usa imagen sexual de infidelidad para la idolatría. En español, «prostitución» mantiene la fuerza metafórica y resulta más transparente y publicable que «fornicación» o «ramera».
- source_word: בְּקִרְבָּם
  english_pob_choice: is within them
  chosen_spanish: está dentro de ellos
  alternatives_spanish:
  - está en medio de ellos
  - está en su interior
  lexicon: HALOT
  rationale: La frase puede significar presencia interna o en medio del pueblo. Aquí la corrupción moral se presenta como interna, por lo que «dentro de ellos» es la opción más directa.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se mantiene la convención del proyecto para el Tetragrámaton: «Yahvé», preservando el nombre divino en lugar de sustituirlo por un título.'
- source_word: לֹא יָדָעוּ
  english_pob_choice: they do not know
  chosen_spanish: no conocen
  alternatives_spanish:
  - no han conocido
  - no reconocen
  lexicon: HALOT
  rationale: En contexto de pacto, ידע implica conocimiento relacional. «No conocen» conserva ese valor sin convertirlo en una paráfrasis interpretativa más larga.
theological_decisions:
- issue: Metáfora profética de infidelidad sexual
  english_pob_reading: Rendered זְנוּנִים with 'whoredom' to preserve the force of covenant unfaithfulness imagery.
  chosen_spanish_reading: Se traduce con «prostitución» para mantener la imagen de infidelidad pactal y su carga moral, sin suavizarla.
  alternative_spanish_readings:
  - fornicación
  - harlotía
  - infidelidad sexual
  rationale: El profeta usa un lenguaje sexual duro para describir la idolatría. «Prostitución» conserva el impacto y es inteligible para lectores modernos; en una nota puede explicarse la metáfora de infidelidad de pacto.
  doctrine_reference: Hosea 5:4; Translation philosophy §3
- issue: Sentido relacional de «conocer»
  english_pob_reading: Kept 'know Yahweh' rather than expanding to 'acknowledge' or 'obey Yahweh'.
  chosen_spanish_reading: Se mantiene «no conocen a Yahvé» sin ampliarlo a «no reconocen» o «no obedecen».
  alternative_spanish_readings:
  - no reconocen a Yahvé
  - no obedecen a Yahvé
  - no tienen relación con Yahvé
  rationale: El hebreo ידע incluye conocimiento relacional y de pacto. «Conocen» deja esa tensión intacta, en vez de resolverla en una sola explicación.
  doctrine_reference: Translation philosophy §3
- issue: Referente de אֱלֹהֵיהֶם
  english_pob_reading: Singular 'their God.'
  chosen_spanish_reading: 'Se conserva el singular: «su Dios».'
  alternative_spanish_readings:
  - sus dioses
  - su dios
  rationale: El contexto de la acusación en Oseas apunta al Dios del pacto, no simplemente a deidades cualesquiera. El singular español preserva esa lectura contextual.
  doctrine_reference: Oseas 5:4; HALOT
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; este borrador sigue la lectura aprobada con acuerdo alto entre revisiones.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para el Tetragrámaton, conforme al estándar del proyecto.
  - Se usa «volver» como equivalente principal de שׁוב en sentido profético/covenantal.
  - «Conocen» mantiene el valor relacional de ידע sin añadir glosa interpretativa al texto principal.
  - La nota al pie sigue la alternativa léxica preservada en el audit trail inglés para זְנוּנִים.
