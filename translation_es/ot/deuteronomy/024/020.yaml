translation:
  language: es
  text: Cuando golpees tu olivo, no lo repasarás[a]; será para el forastero[b], para el huérfano[c] y para la viuda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no volverás a recoger lo que quede después de ti», es decir, no debes hacer una segunda pasada para desprender las aceitunas que quedaron tras el primer vareo.'
    reason: lexical_alternative
  - marker: b
    text: «Forastero» traduce גֵּר, una persona no nativa que vive entre Israel; también puede entenderse como «extranjero» o «residente extranjero».
    reason: cultural_note
  - marker: c
    text: 'O: «sin padre» para «huérfano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En esta ley casuística, כִּי introduce una circunstancia temporal o situacional; «Cuando» conserva mejor ese valor que un condicional puro.
- source_word: תַחְבֹּט
  english_pob_choice: you beat
  chosen_spanish: golpees
  alternatives_spanish:
  - sacudas
  - bateas
  - golpees
  lexicon: HALOT
  rationale: El verbo apunta a golpear/sacudir el árbol para desprender el fruto. «Golpees» mantiene la acción concreta sin volverla demasiado técnica o extraña en español.
- source_word: זֵיתְךָ
  english_pob_choice: your olive tree
  chosen_spanish: tu olivo
  alternatives_spanish:
  - tu olivo frutal
  - tu árbol de olivo
  - tus aceitunas
  lexicon: HALOT
  rationale: El contexto agrícola exige el árbol, no solo el fruto. «Olivo» es natural en español y preserva la imagen del hebreo.
- source_word: לֹא תְפָאֵר אַחֲרֶיךָ
  english_pob_choice: you shall not go over it again
  chosen_spanish: no volverás a pasar sobre él
  alternatives_spanish:
  - no lo repasarás
  - no volverás a recorrerlo
  - no volverás a deshojarlo
  lexicon: HALOT
  rationale: La POB inglesa revisó una versión demasiado literal hacia una formulación más natural que expresa la prohibición de hacer una segunda pasada. «No volverás a pasar sobre él» comunica bien ese sentido en español sin perder la restricción legal.
- source_word: לַגֵּר
  english_pob_choice: for the sojourner
  chosen_spanish: para el extranjero
  alternatives_spanish:
  - para el forastero
  - para el residente forastero
  - para el sojourner
  lexicon: HALOT
  rationale: Aunque «sojourner» es la decisión auditada en inglés, en español «extranjero» transmite de manera comprensible la idea de una persona no perteneciente al pueblo. Se evita «sojourner» por no ser natural en el registro bíblico español, pero se preserva la categoría social del texto.
- source_word: לַיָּתוֹם
  english_pob_choice: for the fatherless
  chosen_spanish: para el huérfano
  alternatives_spanish:
  - para el desamparado
  - para el padreless
  - para el huérfano sin padre
  lexicon: HALOT
  rationale: El hebreo destaca la condición de vulnerabilidad familiar. En español, «huérfano» es la equivalente natural y tradicionalmente inteligible; «padreless» sería artificial.
- source_word: וְלָאַלְמָנָה
  english_pob_choice: for the widow
  chosen_spanish: y para la viuda
  alternatives_spanish:
  - y para la mujer viuda
  lexicon: HALOT
  rationale: Correspondencia directa y estable de אַלְמָנָה; el artículo y la conjunción mantienen el paralelismo legal.
- source_word: יִהְיֶה
  english_pob_choice: it shall be
  chosen_spanish: será
  alternatives_spanish:
  - pertenecerá
  - quedará
  lexicon: HALOT
  rationale: 'El verbo «ser» en futuro simple reproduce el tono jurídico de asignación: lo dejado será destinado a estos grupos vulnerables.'
theological_decisions:
- issue: Destino del sobrante agrícola para grupos vulnerables
  english_pob_reading: it shall be for the sojourner, for the fatherless, and for the widow
  chosen_spanish_reading: será para el extranjero, para el huérfano y para la viuda
  alternative_spanish_readings:
  - quedará para el extranjero, para el huérfano y para la viuda
  - pertenecerá al extranjero, al huérfano y a la viuda
  rationale: Se mantiene la lectura de asignación legal y caritativa sin suavizarla. «Será para» conserva la idea de provisión obligatoria y abierta a los vulnerables.
  doctrine_reference: Deuteronomio 24:17-22; cuidado pactal hacia vulnerables
translation_notes:
  revision_awareness: La POB inglesa revisó la formulación de la prohibición para pasar de una imagen demasiado técnica (“go over the branches after yourself”) a una más natural y precisa (“go over it again”). La propuesta española sigue esa revisión y evita un calco que oscurezca la segunda pasada prohibida. También se respeta la decisión auditada de mantener el sentido legal de asignación para los tres grupos vulnerables.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino solo cuando aparezca en el pasaje; aquí no aparece.
  - «Extranjero» se elige como equivalente funcional de גֵּר, sin perder la nota social de residente no nativo.
  - «Huérfano» se prefiere por claridad en español, aunque la nota conserva la alternativa literal «huérfano» como glosa equivalente al inglés auditado.
