review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del griego: condición sobre la impiedad en el exilio, liberación previa de la mano de los enemigos, y súplica para morir según la elección divina. También mantiene correctamente la distinción léxica de δέσποτα frente a κύριος mediante una nota. Sin embargo, la frase «destrúyenos por la muerte que tú elijas» suena menos natural en español y «por» no expresa tan bien el instrumental de μόρῳ como «con» o una reformulación más idiomática.'
  spanish_quality_summary: El español es claro, digno y mayormente natural. «Nuestra manera de vivir en el exilio» e «impiedad» funcionan bien. La principal debilidad es estilística y de naturalidad bíblica en «destrúyenos por la muerte que tú elijas», que resulta algo rígido. «Soberano» es defendible, pero dado que el inglés POB privilegia «Master» y la nota ya preserva alternativas, «Maestro» refleja más de cerca δέσποτα sin confundirlo con κύριος.
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. La decisión sobre δέσποτα debe mantener la distinción frente a κύριος; «Maestro» se alinea mejor con el expediente inglés, mientras que «Soberano» queda como alternativa posible en nota. El resto de las decisiones léxicas principales («impiedad», «exilio», «mano de nuestros enemigos») están bien alineadas con el análisis fuente-POB.
  issues:
  - severity: medium
    issue: «destrúyenos por la muerte que tú elijas» es poco idiomático
    rationale: El griego ᾧ προαιρῇ ... μόρῳ expresa el tipo o medio de muerte escogido por Dios. En español, «por la muerte» suena forzado; «con la muerte que tú elijas» o «con la clase de muerte que tú elijas» comunica mejor el instrumental sin perder fuerza.
  - severity: medium
    issue: «Soberano» se aparta innecesariamente de la opción principal documentada para δέσποτα
    rationale: Aunque teológicamente posible, el expediente inglés eligió «Master» por transparencia léxica frente a κύριος. En español, «Maestro» preserva mejor esa cercanía formal; la alternativa «Soberano» puede conservarse en nota.
  revised_spanish_text: Pero si nuestra manera de vivir en el exilio[a] ha sido marcada por la impiedad, entonces, después de librarnos de la mano de nuestros enemigos, destrúyenos con la muerte que tú elijas, Maestro[b].
  revised_footnotes:
  - marker: a
    text: O «en nuestra colonia/asentamiento»; ἀποικία puede designar una colonia o asentamiento, pero aquí probablemente se refiere a la vida de la comunidad en el exilio.
    reason: lexical_alternative
  - marker: b
    text: O «Soberano» o «Señor» para δέσποτα; el griego usa un vocativo de autoridad absoluta distinto de κύριος.
    reason: lexical_alternative
  revision_rationale: 'Se ajustó la frase final para un español más natural y fiel al valor instrumental de μόρῳ: «con la muerte que tú elijas». También se cambió «Soberano» por «Maestro» para reflejar mejor la elección léxica principal documentada para δέσποτα, manteniendo las alternativas en nota.'
