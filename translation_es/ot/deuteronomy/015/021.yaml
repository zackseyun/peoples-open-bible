translation:
  language: es
  text: Pero si tiene un defecto—si es cojo o ciego, cualquier defecto malo[a]—no lo sacrificarás a Yahvé tu Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cualquier defecto malo», es decir, cualquier defecto físico serio o inaceptable.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/כִּי
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Pero cuando
  lexicon: HALOT
  rationale: En contexto legal, la partícula introduce una condición conectada con la instrucción anterior; «Pero si» conserva el matiz adversativo y condicional del audit trail inglés.
- source_word: יִהְיֶה בּוֹ
  english_pob_choice: it has
  chosen_spanish: tiene
  alternatives_spanish:
  - hay en él
  - tuviera
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hay en él», pero en español jurídico-natural la idea de poseer un defecto se expresa mejor con «tiene».
- source_word: מוּם
  english_pob_choice: defect
  chosen_spanish: defecto
  alternatives_spanish:
  - mancha
  - imperfección
  - defecto físico
  lexicon: HALOT
  rationale: «Defecto» comunica bien una falla física que inhabilita la víctima para el sacrificio sin cargar con un tono más tradicional que no aporta aquí.
- source_word: פִּסֵּחַ
  english_pob_choice: lame
  chosen_spanish: cojo
  alternatives_spanish:
  - rengo
  - lisiado
  lexicon: HALOT
  rationale: Para animales, «cojo» es el equivalente natural en español y mantiene el sentido físico preciso de incapacidad para caminar normalmente.
- source_word: עִוֵּר
  english_pob_choice: blind
  chosen_spanish: ciego
  alternatives_spanish:
  - invidente
  lexicon: HALOT
  rationale: «Ciego» es el equivalente directo y claro para el defecto físico mencionado.
- source_word: כֹּל מוּם רָע
  english_pob_choice: any bad defect
  chosen_spanish: cualquier defecto malo
  alternatives_spanish:
  - cualquier defecto grave
  - todo defecto malo
  lexicon: HALOT
  rationale: Sigo de cerca la decisión inglesa de no interpretarlo como «grave», sino como «malo/defectuoso»; en español «cualquier defecto malo» preserva la tensión léxica sin suavizarla.
- source_word: לֹא תִזְבָּחֶנּוּ
  english_pob_choice: you shall not sacrifice it
  chosen_spanish: no lo sacrificarás
  alternatives_spanish:
  - no debes sacrificarlo
  - no lo ofrecerás en sacrificio
  lexicon: HALOT
  rationale: La prohibición legal se expresa de modo natural con futuro de mandato en español; «sacrificarás» mantiene el acto cultual y el objeto pronominal.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - para Yahvé
  - a Yahweh
  lexicon: HALOT
  rationale: La pauta del proyecto exige «Yahvé» para el Tetragrámaton; la preposición «a» expresa la dirección/dedicación del sacrificio.
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios,
  - el Dios tuyo
  lexicon: HALOT
  rationale: Conserva la fórmula de alianza en segunda persona, directa y sobria en español.
theological_decisions:
- issue: Nombre divino יְהוָה en este versículo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el nombre divino; conforme a la política del proyecto, se traduce con «Yahvé» y no se lo enmascara como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto a la palabra correspondiente; además, se mantuvo la lectura de «cualquier defecto malo» para reflejar de cerca la revisión inglesa más reciente sin sobreinterpretar como «grave».
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente con la política terminológica del proyecto.
  - Se evitó «Señor» como sustituto del nombre divino.
  - «cojo» y «ciego» mantienen el sentido físico de los términos hebreos en un registro claro y bíblico.
  - La nota al pie marca la ambigüedad de רָע sin reemplazarla por una interpretación más fuerte que el audit trail no exige.
