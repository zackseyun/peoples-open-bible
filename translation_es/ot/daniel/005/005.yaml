  text: בַּ/הּ שַׁעֲתָ֗/ה נפקו אֶצְבְּעָן֙ דִּ֣י יַד אֱנָ֔שׁ וְ/כָֽתְבָן֙ לָ/קֳבֵ֣ל נֶבְרַשְׁתָּ֔/א עַל גִּירָ֕/א דִּֽי כְתַ֥ל הֵיכְלָ֖/א דִּ֣י מַלְכָּ֑/א וּ/מַלְכָּ֣/א חָזֵ֔ה פַּ֥ס יְדָ֖/ה דִּ֥י כָתְבָֽה־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/daniel/005/005.yaml
  text: At that moment the fingers of a human hand came out and wrote opposite the lampstand on the plaster of the wall of the king’s palace[e][d][c][b][a], and the king saw the palm of the hand that was writing.
  footnotes:
  - marker: a
    text: Or 'fingers of a man’s hand.' The Aramaic אֱנָשׁ can mean 'man' or more generally 'human being.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in front of the lampstand.'
    reason: lexical_alternative
  - marker: c
    text: Or 'on the lime plaster' or 'whitewash' of the wall.
    reason: lexical_alternative
  - marker: d
    text: Or 'the king’s hall'; the Aramaic term can denote a palace or a grand hall within it.
    reason: lexical_alternative
  - marker: e
    text: Or possibly 'the hand' more generally; the exact nuance of פַּס is debated.
    reason: lexical_alternative
