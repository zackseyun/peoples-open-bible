translation:
  language: es
  text: Porque es un tesoro que no se agota para los hombres[a]; los que se han valido de ella obtuvieron amistad con Dios[b], habiendo sido recomendados mediante los dones que provienen de la instrucción[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para las personas» / «para la humanidad»; el griego usa una referencia humana genérica en forma masculina.
    reason: lexical_alternative
  - marker: b
    text: O «obtuvieron favor con Dios». El griego habla más literalmente de «amistad con Dios».
    reason: alternative_reading
  - marker: c
    text: «Instrucción» también puede entenderse como «disciplina» o «formación»; παιδεία incluye enseñanza formativa y corrección.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεκλιπὴς
  english_pob_choice: unfailing
  chosen_spanish: que no se agota
  alternatives_spanish:
  - inagotable
  - que nunca falla
  - inextinguible
  lexicon: LSJ
  rationale: El adjetivo expresa algo que no falta ni se agota. «Que no se agota» es natural en español y conserva la idea de permanencia sin forzar una cuantificación excesiva.
- source_word: θησαυρός
  english_pob_choice: treasure
  chosen_spanish: tesoro
  alternatives_spanish:
  - riqueza
  - depósito
  - tesorería
  lexicon: LSJ
  rationale: «Tesoro» preserva la metáfora de valor precioso y posesión apreciada, como en el texto griego y en la auditoría inglesa.
- source_word: ἀνθρώποις
  english_pob_choice: for men
  chosen_spanish: para los hombres
  alternatives_spanish:
  - para las personas
  - para la humanidad
  lexicon: LSJ
  rationale: El dativo es genérico para los seres humanos. Se conserva la forma masculina representativa por fidelidad al griego y a la decisión auditada del inglés, con nota explicativa.
- source_word: χρησάμενοι
  english_pob_choice: have made use of
  chosen_spanish: los que se han valido de ella
  alternatives_spanish:
  - los que la usaron
  - los que se sirvieron de ella
  - los que la aprovecharon
  lexicon: LSJ
  rationale: El participio medio sugiere apropiación activa. «Se han valido de ella» comunica uso efectivo y conserva mejor la fuerza de la forma griega que un simple «usaron».
- source_word: πρὸς θεὸν
  english_pob_choice: with God
  chosen_spanish: con Dios
  alternatives_spanish:
  - hacia Dios
  - ante Dios
  lexicon: LSJ
  rationale: Con φιλίαν, la relación se expresa de modo natural en español como «amistad con Dios». Aunque πρὸς puede llevar matiz direccional, aquí la idea relacional es la que la auditoría inglesa destaca.
- source_word: ἐστείλαντο
  english_pob_choice: obtained
  chosen_spanish: obtuvieron
  alternatives_spanish:
  - ganaron
  - consiguieron
  - alcanzaron
  lexicon: LSJ
  rationale: El verbo comunica adquisición o logro de esa amistad. «Obtuvieron» es formal, claro y coincide con la revisión final del inglés.
- source_word: φιλίαν
  english_pob_choice: friendship
  chosen_spanish: amistad
  alternatives_spanish:
  - favor
  - afecto
  lexicon: LSJ
  rationale: «Amistad» conserva la relación personal fuerte que el texto afirma; no se atenúa a «favor», que sería más abstracto.
- source_word: διὰ τὰς ἐκ παιδείας δωρεὰς
  english_pob_choice: through the gifts that come from instruction
  chosen_spanish: mediante los dones que provienen de la instrucción
  alternatives_spanish:
  - por los dones que provienen de la disciplina
  - mediante los dones nacidos de la formación
  lexicon: LSJ
  rationale: Se mantiene la fuente formativa de los dones. «Instrucción» recoge el campo de παιδεία en este contexto, como en la auditoría inglesa, sin reducirlo solo a enseñanza intelectual.
- source_word: συσταθέντες
  english_pob_choice: having been commended
  chosen_spanish: habiendo sido aprobados
  alternatives_spanish:
  - habiendo sido recomendados
  - habiendo sido acreditados
  - habiendo sido presentados como aprobados
  lexicon: LSJ
  rationale: El participio puede significar ser recomendado, aprobado o acreditado. «Aprobados» refleja bien la idea de aceptación/validación resultante del uso de la sabiduría, sin introducir una lectura demasiado técnica.
theological_decisions:
- issue: Relación φιλίαν πρὸς θεόν / amistad con Dios
  english_pob_reading: friendship with God
  chosen_spanish_reading: amistad con Dios
  alternative_spanish_readings:
  - favor con Dios
  - afecto hacia Dios
  rationale: 'Se conserva la fuerza relacional del griego: no solo aprobación divina abstracta, sino una relación de amistad con Dios. Esto sigue la lectura auditada del inglés y evita diluir el vínculo personal.'
  doctrine_reference: Mantener la tensión relacional del texto; equivalencia óptima.
- issue: Sentido genérico de ἀνθρώποις
  english_pob_reading: for men
  chosen_spanish_reading: para los hombres
  alternative_spanish_readings:
  - para las personas
  - para la humanidad
  rationale: El griego usa masculino plural con valor genérico. Se conserva esa forma representativa en el texto principal, y la nota aclara el alcance inclusivo sin borrar la forma del original.
  doctrine_reference: Fidelidad al género gramatical con aclaración contextual.
- issue: Valor de παιδεία
  english_pob_reading: instruction
  chosen_spanish_reading: instrucción
  alternative_spanish_readings:
  - disciplina
  - formación
  rationale: En Sabiduría, παιδεία puede abarcar instrucción formativa y corrección. «Instrucción» mantiene la amplitud pedagógica destacada en la auditoría inglesa, sin cerrar el término a un solo matiz.
  doctrine_reference: Conservar el campo semántico sin resolverlo unilateralmente.
translation_notes:
  revision_awareness: Se siguió la revisión final del audit trail inglés, manteniendo la versión de ἐστείλαντο como «obtuvieron» y conservando la relación fuerte de φιλίαν πρὸς θεόν como «amistad con Dios». También se respetó el matiz pedagógico de παιδεία con «instrucción», según la nota y la decisión lexical auditadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino en forma explícita.
  - Se usó «Dios» para θεόν conforme al estándar del proyecto.
  - Se evitó «Señor» y otras sustituciones que no están respaldadas por el texto fuente.
  - La puntuación sigue el estilo español moderno, con punto y coma para reflejar la estructura del período griego.
