translation:
  language: es
  text: Hagan un censo de toda la congregación de los hijos de Israel[a], por sus clanes, por las casas de sus padres, según el número de nombres, todo varón, cabeza por cabeza[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los israelitas'. Literalmente, 'los hijos de Israel'.
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, ''cabeza por cabeza''. Hebreo: ''por sus cráneos/cabezas'', un modismo para contar personas individualmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׂאוּ אֶת רֹאשׁ
  english_pob_choice: Take a census
  chosen_spanish: Tomen un censo
  alternatives_spanish:
  - Levanten la cabeza de
  - Cuenten
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y, en este contexto administrativo, significa contar o inscribir para un censo. En español, 'Tomen un censo' comunica con claridad la acción oficial sin perder el sentido formal del original.
- source_word: כָּל עֲדַת
  english_pob_choice: the whole congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la asamblea
  - toda la comunidad
  lexicon: HALOT
  rationale: ‘עֵדָה’ designa el cuerpo reunido del pueblo. 'Congregación' conserva bien el sentido corporativo y es natural en español bíblico actual.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la formulación filial del hebreo, que es la más directa y fiel al texto fuente. 'Hijos de Israel' es comprensible y conserva la forma heredada del original.
- source_word: לְמִשְׁפְּחֹתָם
  english_pob_choice: by their clans
  chosen_spanish: por sus clanes
  alternatives_spanish:
  - según sus familias
  - por sus familias
  lexicon: HALOT
  rationale: '''מִשְׁפָּחָה'' aquí se refiere a subdivisiones de parentesco dentro de las tribus. ''Clanes'' expresa mejor ese nivel social que el más general ''familias''.'
- source_word: לְבֵית אֲבֹתָם
  english_pob_choice: by their fathers’ houses
  chosen_spanish: por las casas de sus padres
  alternatives_spanish:
  - por sus casas paternas
  - según sus casas ancestrales
  lexicon: HALOT
  rationale: La expresión conserva la estructura patrilineal del hebreo. 'Casas de sus padres' es transparente y evita suavizar la referencia al orden familiar original.
- source_word: בְּמִסְפַּר שֵׁמוֹת
  english_pob_choice: according to the number of names
  chosen_spanish: según el número de nombres
  alternatives_spanish:
  - por el número de nombres
  - según la cuenta de nombres
  lexicon: HALOT
  rationale: El hebreo habla de una enumeración registrada por nombre. 'Según el número de nombres' mantiene el tono administrativo y la precisión del original.
- source_word: כָּל זָכָר
  english_pob_choice: every male
  chosen_spanish: todo varón
  alternatives_spanish:
  - todo hombre
  - cada macho
  lexicon: HALOT
  rationale: '''זָכָר'' es lenguaje sexual/biológico, no simplemente genérico. ''Varón'' preserva esa fuerza con dignidad y evita la neutralización excesiva.'
- source_word: לְגֻלְגְּלֹתָם
  english_pob_choice: head by head
  chosen_spanish: cabeza por cabeza
  alternatives_spanish:
  - uno por uno
  - por cabeza
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente 'por sus cabezas/calaveras', un modismo de conteo individual. 'Cabeza por cabeza' reproduce la imagen concreta y la función idiomática.
translation_notes:
  revision_awareness: Se mantuvo la lectura del POB en inglés con equivalentes españoles directos y se preservó la idiomaticidad administrativa del mandato sin perder la imaginería hebrea de 'cabeza'.
  spanish_consistency_notes:
  - '''Yahvé'' no aparece en este versículo.'
  - '''Mesías/Cristo'' no aplica aquí.'
  - Se preservó la distinción entre 'congregación' y 'clanes/casas de los padres' para reflejar los niveles sociales del hebreo.
  - Se evitó 'israelitas' en el texto principal para mantener la forma filial explícita del hebreo, pero se dejó como alternativa en nota.
