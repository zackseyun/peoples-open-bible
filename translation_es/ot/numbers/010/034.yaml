translation:
  language: es
  text: Y la nube de Yahvé estaba sobre ellos[a] de día, cuando partían del campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estaba sobre ellos de día».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַ/עֲנַן
  english_pob_choice: And the cloud
  chosen_spanish: Y la nube
  alternatives_spanish:
  - Entonces la nube
  - La nube
  lexicon: HALOT
  rationale: עָנָן significa “nube”. El prefijo conjuntivo וַ se conserva con “Y” para mantener la continuidad narrativa con el versículo anterior. En español, “la nube” es natural y refleja la forma definida que en inglés se expresó como “the cloud”.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton יְהוָה se vierte como el nombre propio divino en español con “Yahvé”, siguiendo la política del proyecto de no sustituirlo por un título. “Jehová” y “el SEÑOR” quedan descartados por no reflejar con la misma transparencia el nombre personal revelado.
- source_word: עֲלֵי/הֶם
  english_pob_choice: was over them
  chosen_spanish: estaba sobre ellos
  alternatives_spanish:
  - estaba encima de ellos
  - estaba sobre ellos de manera protectora
  lexicon: HALOT
  rationale: La preposición עַל con sufijo pronominal expresa posición sobre/encima de ellos. “Estaba sobre ellos” es idiomático en español y conserva el sentido locativo/protectivo sin agregar interpretación innecesaria.
- source_word: יוֹמָם
  english_pob_choice: by day
  chosen_spanish: de día
  alternatives_spanish:
  - durante el día
  - en el día
  lexicon: HALOT
  rationale: יוֹמָם indica tiempo diurno. “De día” es breve, natural y semánticamente equivalente a “by day”.
- source_word: בְּ/נָסְעָ֖/ם
  english_pob_choice: when they set out
  chosen_spanish: cuando salían
  alternatives_spanish:
  - cuando se ponían en marcha
  - al salir
  - mientras salían
  lexicon: HALOT
  rationale: El infinitivo constructo con ב expresa circunstancia temporal. En español, “cuando salían” reproduce la acción de ponerse en marcha desde el campamento con naturalidad, sin perder el valor temporal de “when they set out”.
- source_word: מִן הַֽ/מַּחֲנֶֽה
  english_pob_choice: from the camp
  chosen_spanish: del campamento
  alternatives_spanish:
  - desde el campamento
  - de la campamento
  - desde el encampamento
  lexicon: HALOT
  rationale: מַחֲנֶה significa “campamento/camp”. “Del campamento” fluye bien en español y conserva la referencia al lugar de partida de Israel.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El texto hebreo usa directamente el nombre propio divino. La lectura española “Yahvé” mantiene la decisión del POB de transparentar el Tetragrámaton en lugar de sustituirlo por un título, preservando la identidad del nombre pactal de Dios.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y sin revisiones aplicadas; se conserva la estructura simple del hebreo y la decisión léxica principal sobre יְהוָה como nombre propio divino.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como forma principal del nombre divino en todo el registro.
  - Se usa “campamento” para מַחֲנֶה, coherente con el contexto del desierto y con el inglés auditado.
  - La nota textual alternativa se ancla en la frase verbal para reflejar la posible lectura locativa de עֲלֵיהֶם sin duplicar el sentido principal.
