translation:
  language: es
  text: 'Mientras la palabra aún estaba en la boca del rey[a], una voz cayó del cielo: «A ti se te dice, rey Nabucodonosor: el reino se ha apartado de ti».


    [a] O: «el reino te ha sido quitado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el reino te ha sido quitado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עוֹד
  english_pob_choice: while ... still
  chosen_spanish: aún
  alternatives_spanish:
  - todavía
  - mientras... todavía
  lexicon: HALOT
  rationale: En el contexto de interrupción inmediata, la idea de continuidad se expresa naturalmente con «aún». La combinación con «mientras» al inicio conserva el valor aspectual de la frase sin forzar un calco innecesario.
- source_word: מִלְּתָא
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - la declaración
  lexicon: HALOT
  rationale: El sustantivo singular alude a la expresión que el rey acababa de pronunciar. «La palabra» mantiene la cercanía al arameo y funciona bien en español.
- source_word: בְּפֻם מַלְכָּא
  english_pob_choice: in the king’s mouth
  chosen_spanish: en la boca del rey
  alternatives_spanish:
  - en los labios del rey
  - en boca del rey
  lexicon: HALOT
  rationale: El idioma arameo es literalmente «en la boca del rey». En español, «en la boca del rey» preserva la imagen original; «en los labios» sería más idiomático pero menos cercano al texto fuente.
- source_word: קָל
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - un sonido
  lexicon: HALOT
  rationale: El contexto introduce un anuncio directo, por lo que el término designa una voz articulada, no meramente un ruido.
- source_word: מִן שְׁמַיָּא
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde los cielos
  - del cielo
  lexicon: HALOT
  rationale: En el registro bíblico arameo, la expresión remite al ámbito celestial. «Desde el cielo» conserva esa carga teológica y es natural en español.
- source_word: נְפַל
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - descendió
  - bajó
  lexicon: HALOT
  rationale: El verbo significa literalmente «caer». En español, aplicado a una voz, «cayó» reproduce la imagen con claridad y sin perder fuerza.
- source_word: לָךְ אָמְרִין
  english_pob_choice: To you it is said
  chosen_spanish: A ti se te dice
  alternatives_spanish:
  - Te dicen
  - Se te está diciendo
  lexicon: HALOT
  rationale: El participio plural funciona como una fórmula impersonal de anuncio. «Se te dice» conserva el tono formal y la pasiva impersonal que el arameo sugiere.
- source_word: נְבוּכַדְנֶצַּר מַלְכָּא
  english_pob_choice: King Nebuchadnezzar
  chosen_spanish: rey Nabucodonosor
  alternatives_spanish:
  - Nabucodonosor, rey
  - rey Nebucodonosor
  lexicon: HALOT
  rationale: En español, el vocativo con título antes del nombre suena natural y mantiene la solemnidad de la dirección directa.
- source_word: מַלְכוּתָה
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el dominio real
  - la realeza
  lexicon: HALOT
  rationale: El sustantivo puede referirse al reino como esfera de gobierno. «El reino» es la forma más directa y comprensible en español.
- source_word: עֲדָת
  english_pob_choice: has departed
  chosen_spanish: se ha apartado
  alternatives_spanish:
  - ha sido removido
  - se ha ido
  lexicon: HALOT
  rationale: La idea es que el reino ha salido de su posesión o ha sido quitado. «Se ha apartado» retiene el matiz de alejamiento/departida del arameo y deja abierta la alternativa de «ser removido» que el inglés POB documenta.
- source_word: מִנָּךְ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de tu lado
  - alejado de ti
  lexicon: HALOT
  rationale: La preposición indica separación. «De ti» es la equivalencia más sobria y natural en español, suficiente porque el verbo ya expresa la pérdida del reino.
theological_decisions:
- issue: Naturaleza del anuncio procedente del cielo
  english_pob_reading: from heaven
  chosen_spanish_reading: desde el cielo
  alternative_spanish_readings:
  - desde los cielos
  - del cielo
  rationale: La escena es un oráculo de juicio divino; por eso conviene conservar la referencia al ámbito celestial sin reducirla a una localización física. «Desde el cielo» mantiene la resonancia teológica del original.
  doctrine_reference: Principio de primacía del texto original con claridad reverente en español
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente inglés; la redacción española sigue de cerca la lectura aprobada y conserva la alternativa léxica documentada para el verbo de retirada del reino.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantuvo «reino» para מַלְכוּתָה conforme al contexto de dominio real.
  - Se preservó la imagen concreta «en la boca del rey» por fidelidad al arameo, con estilo español natural en la oración completa.
  - El vocativo se ordenó como «rey Nabucodonosor» para conservar solemnidad y claridad en español.
