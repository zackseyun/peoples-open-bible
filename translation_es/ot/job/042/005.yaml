translation:
  language: es
  text: De oídas[a] había oído de ti, pero ahora mi ojo te ha visto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «por la audición del oído»; el hebreo dice literalmente «por la audición del oído».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְשֵׁמַע אֹזֶן
  english_pob_choice: by the hearing of the ear
  chosen_spanish: De oídas
  alternatives_spanish:
  - por el oír del oído
  - por lo oído
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y contrasta conocimiento mediado por relatos con una percepción directa. En español, «de oídas» comunica de forma natural esa idea de conocimiento por reportes, sin perder el contraste del versículo.
- source_word: שְׁמַעְתִּיךָ
  english_pob_choice: I had heard of you
  chosen_spanish: te había oído
  alternatives_spanish:
  - te oí
  - había oído de ti
  lexicon: HALOT
  rationale: El sufijo de segunda persona mantiene la relación directa con Dios, pero en este contexto el sentido es conocimiento previo sobre él por testimonio ajeno. «Te había oído» conserva el valor de anterioridad respecto de «ahora» y suena idiomático en español.
- source_word: וְעַתָּה
  english_pob_choice: but now
  chosen_spanish: pero ahora
  alternatives_spanish:
  - y ahora
  - ahora
  lexicon: HALOT
  rationale: La partícula introduce contraste fuerte entre la experiencia pasada mediada y la visión presente. «Pero ahora» reproduce esa fuerza adversativa con naturalidad en español.
- source_word: עֵינִי
  english_pob_choice: my eye
  chosen_spanish: mis ojos
  alternatives_spanish:
  - mi ojo
  - mis propias ojos
  lexicon: HALOT
  rationale: Aunque el hebreo es singular, en español «mis ojos» expresa mejor la visión efectiva y resulta más natural en el paralelismo. Se mantiene la imagen visual sin forzar un singular poco idiomático.
- source_word: רָאָתְךָ
  english_pob_choice: has seen you
  chosen_spanish: te han visto
  alternatives_spanish:
  - te ha visto
  - te vio
  lexicon: HALOT
  rationale: El perfecto hebreo expresa un hecho consumado con relevancia presente. En español, el presente perfecto «han visto» transmite esa actualidad. Se evita especificar más de lo que dice el texto sobre el modo de ver a Dios.
theological_decisions:
- issue: Naturaleza de la 'visión' de Dios
  english_pob_reading: Render straightforwardly as 'has seen you' without qualifying it as merely metaphorical or as a full beatific vision.
  chosen_spanish_reading: Traducir de manera directa «te han visto», sin añadir si se trata de una visión meramente interior, metafórica o de una visión plena de Dios.
  alternative_spanish_readings:
  - te han percibido
  - te han encontrado directamente
  rationale: El hebreo habla simplemente de ver; el texto mismo establece el contraste entre oír por reportes y ver ahora. La traducción no debe resolver la tensión teológica que el versículo deja abierta.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El control de revisión indicado muestra acuerdo alto y sin cambios pendientes; por eso se conserva la solución semántica central del auditor inglés, adaptada a un español natural y sobrio.
  spanish_consistency_notes:
  - Se preserva el contraste entre conocimiento mediado y encuentro directo.
  - Se mantiene un registro bíblico moderno, sin caer en calcos innecesarios.
  - La imagen singular/plural se adapta levemente en español para mayor naturalidad, pero sin alterar el sentido central.
