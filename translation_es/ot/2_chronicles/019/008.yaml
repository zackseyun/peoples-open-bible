base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/019/008.yaml
  text: Also in Jerusalem[a], Jehoshaphat appointed some of the Levites, the priests, and the heads of the fathers’ houses of Israel for the judgment of Yahweh and for disputes[b]; and they returned to Jerusalem.
  footnotes:
