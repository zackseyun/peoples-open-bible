- from: Los pastizales están cubiertos de rebaños[a], y los valles se visten de grano; prorrumpen en gritos de júbilo, sí[b], cantan.
  to: Los pastizales se visten de rebaños[a], y los valles se cubren de grano; gritan de alegría, sí[b], cantan.
  rationale: Se ajusta לָבְשׁוּ a 'se visten' para preservar mejor la metáfora poética del hebreo y alinearse con la rationale documentada. Se revisa יַעַטְפוּ a 'se cubren de' para mantener la personificación de manera natural en español. Se simplifica 'prorrumpen en gritos de júbilo' a 'gritan de alegría' para reflejar con mayor claridad y fluidez el verbo hebreo. También se armonizan las notas con el texto revisado.
