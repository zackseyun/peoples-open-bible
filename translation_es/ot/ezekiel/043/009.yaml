review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo y el rastro de auditoría inglés: mantiene el valor exhortativo de יְרַחֲקוּ con «aparten», conserva la metáfora de זְנוּתָם como «prostitución», y preserva la concreción de «los cadáveres de sus reyes». También reproduce adecuadamente «habitaré en medio de ellos para siempre». Sin embargo, la nota léxica alternativa introduce expresiones españolas poco naturales y algo inexactas para un registro bíblico claro.'
  spanish_quality_summary: 'El texto principal es claro, fiel y legible en español eclesial neutral. La única reparación necesaria está en la nota [a]: «su fornicación» y especialmente «su ramera conducta» suenan poco idiomáticos o demasiado torpes; conviene usar alternativas más naturales y cercanas al inglés auditado, como «su prostitución ritual» no, perdón, mejor «su prostituirse» no; en este caso las equivalencias más limpias son «su prostitución», «su prostituirse» tampoco. Lo mejor es reflejar las alternativas inglesas con «su prostituirse» no funciona. Por fidelidad y naturalidad, la nota debe ofrecer «su prostitución», «su infidelidad prostituida» no. La opción más segura es «su prostitución» ya está en texto, así que para las alternativas conviene «su prostituirse» evitar. Mejor: «su lujuria idolátrica» sería interpretativa. Por tanto, la nota debe reformularse para explicar la metáfora sin forzar alternativas españolas extrañas.'
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. No aparecen Yahvé, Mesías, Cristo, δοῦλος, etc. La decisión «prostitución» para זְנוּת es coherente con la política del proyecto de conservar la metáfora profética y evitar interpretaciones reductoras como «idolatría».
  issues:
  - severity: medium
    issue: Nota [a] con alternativas españolas poco naturales
    rationale: «Su fornicación» puede entenderse demasiado literalmente y «su ramera conducta» es una expresión torpe y poco idiomática en español contemporáneo. La nota debe explicar la metáfora profética sin introducir formulaciones deficientes.
  revised_spanish_text: Ahora, aparten de mí su prostitución y los cadáveres de sus reyes[a][b], y habitaré en medio de ellos para siempre.
  revised_footnotes:
  - marker: a
    text: O «su prostituirse» o «su vida prostituida»; el hebreo usa una metáfora de prostitución para la infidelidad pactal, a menudo expresada como idolatría.
    reason: lexical_alternative
  - marker: b
    text: La frase «los cadáveres de sus reyes» puede referirse literalmente a cuerpos reales muertos o, de modo más amplio, a instalaciones funerarias o memoriales reales cerca del santuario.
    reason: cultural_note
  revision_rationale: El texto principal puede mantenerse. Se revisa únicamente la nota léxica [a] para eliminar expresiones poco idiomáticas y conservar una explicación más natural de las alternativas y de la metáfora profética.
