translation:
  language: es
  text: Pero Yahvé se ha vuelto mi baluarte[a], y mi Dios, la roca de mi refugio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Yahvé se volvió mi baluarte'. El verbo hebreo puede verterse con un pasado simple; 'se ha vuelto' resalta el resultado que permanece.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: has become
  chosen_spanish: se ha vuelto
  alternatives_spanish:
  - se volvió
  - llegó a ser
  lexicon: HALOT
  rationale: El waw-consecutivo de היה expresa un cambio real con resultado vigente. En español, 'se ha vuelto' comunica bien ese paso a una nueva condición y su efecto presente, sin perder el matiz perfectivo.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: El texto hebreo usa el nombre propio divino y no un título sustituto. En la política española del proyecto, corresponde 'Yahvé' para preservar el Tetragrámaton con claridad y audibilidad.
- source_word: לִי
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona indica relación personal y posesión funcional. 'Mi' es la forma natural en español para este predicado nominal.
- source_word: לְמִשְׂגָּב
  english_pob_choice: stronghold
  chosen_spanish: baluarte
  alternatives_spanish:
  - fortaleza
  - refugio elevado
  lexicon: HALOT
  rationale: מִשְׂגָּב señala un lugar alto e inaccesible de protección. 'Baluarte' conserva la idea defensiva y es un equivalente idiomático y digno en español, aunque 'fortaleza' también sería posible.
- source_word: וֵאלֹהַי
  english_pob_choice: and my God
  chosen_spanish: y mi Dios
  alternatives_spanish:
  - y Dios mío
  lexicon: HALOT
  rationale: La construcción coordinada con sufijo posesivo se conserva de manera directa. 'Mi Dios' mantiene el paralelismo confesional del verso.
- source_word: לְצוּר
  english_pob_choice: the rock of
  chosen_spanish: la roca de
  alternatives_spanish:
  - el peñasco de
  - la peña de
  lexicon: HALOT
  rationale: צוּר es metáfora estable de Dios como fundamento sólido y protector. 'La roca de' preserva la imagen bíblica con naturalidad en español.
- source_word: מַחְסִי
  english_pob_choice: my refuge
  chosen_spanish: mi refugio
  alternatives_spanish:
  - mi amparo
  - mi asilo
  lexicon: HALOT
  rationale: מַחְסֶה/מַחְסִי denota lugar de protección o cobijo. 'Mi refugio' es breve, claro y fiel al valor semántico del término.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El hebreo emplea directamente el Tetragrámaton. La lectura española debe preservar el nombre propio revelado, no sustituirlo por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el ancla [a] en el texto principal y alineando la nota con esa marca.
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה conforme a la terminología del proyecto.
  - '''Baluarte'' traduce מִשְׂגָּב con una imagen defensiva natural en español, sin diluir la idea de altura/protección.'
  - '''Roca de mi refugio'' conserva el paralelismo poético del hebreo y evita explicitar más de lo que el texto dice.'
