base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/009/024.yaml
  text: So the cook took up the leg and what was on it and set it before Saul[a]. And he said, “Look, what has been kept is set before you. Eat, because it has been kept for you for the appointed time, from when I said[d][c][b], ‘I have invited the people.’” So Saul ate with Samuel that day.
  footnotes:
  - marker: a
    text: Or 'the thigh'; Hebrew שׁוֹק refers to the leg portion of the animal.
    reason: lexical_alternative
  - marker: b
    text: Hebrew literally, 'the leg and what was on it.' The accompanying portion is not explicitly identified in the text.
    reason: lexical_alternative
  - marker: c
    text: Or 'what remains.' The Hebrew can mean either what was left over or what had been reserved; the context favors the sense of a portion specially kept for Saul.
    reason: alternative_reading
  - marker: d
    text: Or 'I have called the people.' In this meal setting, 'invited' brings out the likely sense of the Hebrew verb.
    reason: lexical_alternative
