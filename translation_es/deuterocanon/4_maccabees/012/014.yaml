review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente el contraste adversativo, la muerte noble y la idea de llevar a cumplimiento la εὐσέβεια orientada a Dios. Sin embargo, la nota al pie no preserva una alternativa real, porque repite exactamente el mismo texto de la línea principal.
  spanish_quality_summary: El español es claro y natural. 'Pero los que murieron noblemente cumplieron su piedad hacia Dios' es legible y digno. Aun así, la nota debe repararse para que ofrezca una alternativa válida; además, 'para con Dios' suena un poco más idiomático que 'hacia Dios' en registro bíblico-religioso, aunque 'hacia Dios' no es incorrecto.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Dios' es correcto para θεός. La elección de 'piedad' sigue la revisión documentada del inglés para εὐσέβεια. No se activan términos especiales como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: La nota al pie repite exactamente la misma frase que el texto principal.
    rationale: La nota inglesa preserva una alternativa léxica, pero en español 'O “su piedad hacia Dios”' no añade ninguna variante; por tanto, no cumple la función de nota alternativa.
  - severity: low
    issue: La preposición 'hacia' es aceptable, pero 'para con' expresa con más naturalidad la relación devocional en español bíblico.
    rationale: εἰς τὸν θεόν indica orientación hacia Dios. En español religioso, 'piedad para con Dios' suena más idiomático que 'piedad hacia Dios', aunque ambas pueden defenderse.
  revised_spanish_text: Pero los que murieron noblemente cumplieron su piedad para con Dios;[a]
  revised_footnotes:
  - marker: a
    text: O 'su piedad hacia Dios.'
    reason: lexical_alternative
