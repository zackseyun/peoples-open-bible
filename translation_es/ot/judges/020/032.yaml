translation:
  language: es
  text: 'Los hijos de Benjamín dijeron: «Están siendo abatidos delante de nosotros, como al principio». Pero los hijos de Israel dijeron: «Huyamos y apartémoslos[b] de la ciudad hacia las calzadas[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los caminos principales» o «las carreteras». El hebreo puede referirse a vías principales o elevadas.
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo tiene aquí un sufijo singular en el verbo («apártelo»), probablemente con sentido colectivo para Benjamín o su fuerza militar; por eso también puede entenderse como plural en el contexto: «apartémoslos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נִגָּפִים
  english_pob_choice: are being struck down
  chosen_spanish: están siendo derrotados
  alternatives_spanish:
  - están siendo abatidos
  - están siendo derribados
  - están cayendo
  lexicon: HALOT
  rationale: En contexto militar, el participio pasivo comunica que el enemigo está perdiendo la batalla. «Derrotados» expresa bien el resultado bélico en español natural; «abatidos» o «derribados» conservan más lo concreto, pero suenan algo más marcados o menos fluidos aquí.
- source_word: לְפָנֵינוּ
  english_pob_choice: before us
  chosen_spanish: delante de nosotros
  alternatives_spanish:
  - ante nosotros
  - en nuestra presencia
  - frente a nosotros
  lexicon: HALOT
  rationale: La locución idiomática en español se vuelve más natural como «delante de nosotros». Mantiene la idea espacial y militar de estar en la línea frontal o enfrente.
- source_word: כְּבָרִאשֹׁנָה
  english_pob_choice: as at the first
  chosen_spanish: como al principio
  alternatives_spanish:
  - como antes
  - como en la primera vez
  - como en el primer encuentro
  lexicon: HALOT
  rationale: La frase mira retrospectivamente a los combates previos del capítulo. «Como al principio» conserva esa referencia sin agregar explícitamente «batalla», aunque esa es la referencia contextual.
- source_word: נָנוּסָה
  english_pob_choice: Let us flee
  chosen_spanish: Huyamos
  alternatives_spanish:
  - Vayamos a huir
  - Retirémonos
  - Huyamos de aquí
  lexicon: HALOT
  rationale: El cohortativo plural se expresa de forma natural en español con un imperativo exhortativo inclusivo. «Huyamos» conserva la volición y el movimiento de escape.
- source_word: וּנְתַקְּנֻהוּ
  english_pob_choice: and draw them away
  chosen_spanish: y apartémoslos
  alternatives_spanish:
  - y alejémoslos
  - y arrastremos a ellos
  - y sáquémoslos
  lexicon: HALOT
  rationale: El verbo indica separar o retirar a alguien de un lugar. En español, «apartar» comunica bien la estrategia de alejarlos de la ciudad. Aunque el hebreo presenta un sufijo singular masculino en la forma, el contexto y la revisión inglesa respaldan el sentido colectivo plural, por eso se usa «los».
- source_word: הָעִיר
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la urbe
  - el pueblo
  lexicon: HALOT
  rationale: Traducción directa y transparente. En el contexto se refiere al centro urbano desde el cual se intenta sacar al enemigo.
- source_word: הַמְסִלּוֹת
  english_pob_choice: the highways
  chosen_spanish: los caminos
  alternatives_spanish:
  - las rutas
  - las carreteras
  - las calzadas
  lexicon: HALOT
  rationale: Aunque el inglés POB opta por «highways», en español «caminos» resulta más amplio y natural sin forzar una imagen moderna de autopista. El término mantiene la idea de vías de salida de la ciudad; se deja la alternativa más técnica en nota.
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada para cambiar «draw him away» por «draw them away», a fin de reflejar mejor el sentido contextual colectivo del objeto hebreo. La redacción española sigue esa revisión y evita fijar el singular como si fuera obligatorio, aunque reconoce la forma verbal singular del hebreo en la nota.
  spanish_consistency_notes:
  - Se mantuvo «hijos de Benjamín» y «hijos de Israel» para reflejar el uso bíblico establecido y concordar con el estilo del proyecto.
  - Se prefirió «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se tradujo el movimiento bélico con verbos naturales en español, sin suavizar la intensidad del texto.
  - Se evitó «SEÑOR» por ser un masking convention ajena al criterio editorial del proyecto.
