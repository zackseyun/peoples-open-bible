    issue: «Tortura» sobreespecifica βάσανισον
    rationale: El griego expresa infligir severo sufrimiento o castigo, pero no exige la noción moderna específica de tortura. En español bíblico general, «atormenta» preserva mejor la fuerza del original y del English POB sin introducir una imagen demasiado estrecha.
  - severity: low
    issue: La nota léxica queda desajustada si la mejor opción española no es «Tortura»
    rationale: Si se adopta una lectura principal más fiel, las alternativas deben actualizarse para reflejar opciones reales distintas y evitar redundancia con el texto principal.
  revised_spanish_text: Atormenta[a] a los que nos oprimen y nos ultrajan en su soberbia.
