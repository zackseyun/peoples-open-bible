translation:
  language: es
  text: Por tanto, como sus decretos eran despreciados por el pueblo, él mismo obligaba, mediante torturas, a cada uno de la nación, después de probar alimentos que contaminan[a], a renunciar al judaísmo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alimentos impuros» o «alimentos contaminados». El término griego resalta la contaminación ritual.
    reason: lexical_alternative
  - marker: b
    text: O «a abjurar del judaísmo». El verbo griego puede implicar una renuncia hecha bajo juramento.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ δόγματα
  english_pob_choice: decrees
  chosen_spanish: decretos
  alternatives_spanish:
  - edictos
  - ordenanzas
  lexicon: BDAG
  rationale: δόγματα se refiere aquí a disposiciones o mandatos oficiales del gobernante. «Decretos» conserva el peso autoritativo sin sonar excesivamente técnico.
- source_word: κατεφρονεῖτο
  english_pob_choice: were being despised
  chosen_spanish: eran despreciados
  alternatives_spanish:
  - eran despreciados continuamente
  - eran menospreciados
  - eran desatendidos
  lexicon: BDAG
  rationale: El imperfecto pasivo expresa una acción en curso. «Eran despreciados» comunica el rechazo con desdén; el contexto ya aporta la idea de continuidad.
- source_word: διὰ βασάνων
  english_pob_choice: by tortures
  chosen_spanish: por torturas
  alternatives_spanish:
  - mediante torturas
  - por medio de tormentos
  lexicon: BDAG
  rationale: La frase expresa el medio coercitivo. «Por torturas» es natural en español y mantiene la gravedad de βάσανοι.
- source_word: ἕνα ἕκαστον
  english_pob_choice: each and every one
  chosen_spanish: cada uno y a todos
  alternatives_spanish:
  - cada uno y cada una
  - cada persona
  - cada uno
  lexicon: BDAG
  rationale: La duplicación griega es enfática. «Cada uno y a todos» intenta conservar la fuerza distributiva e inclusiva sin volverlo rígido.
- source_word: τοῦ ἔθνους
  english_pob_choice: of the nation
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de la nación
  - del pueblo judío
  lexicon: BDAG
  rationale: En este contexto ἔθνος designa al colectivo judío como pueblo. «Del pueblo» fluye mejor en español y evita añadir un calificativo que el griego no repite en esta cláusula.
- source_word: μιερῶν ... τροφῶν
  english_pob_choice: defiling foods
  chosen_spanish: alimentos que contaminan
  alternatives_spanish:
  - alimentos impuros
  - alimentos contaminantes
  - alimentos profanadores
  lexicon: LSJ
  rationale: μιερός alude a contaminación ritual, con fuerza evaluativa. «Que contaminan» preserva ese sentido sin depender de un tecnicismo fijo que podría sonar demasiado especializado.
- source_word: ἀπογευομένους
  english_pob_choice: after tasting
  chosen_spanish: después de probar
  alternatives_spanish:
  - tras probar
  - después de gustar
  - una vez que probaban
  lexicon: BDAG
  rationale: El participio marca anterioridad respecto al infinitivo. «Después de probar» refleja la secuencia y suena natural en español.
- source_word: ἐξόμνυσθαι
  english_pob_choice: to renounce
  chosen_spanish: a renunciar
  alternatives_spanish:
  - a abjurar
  - a forswear
  - a renunciar bajo juramento
  lexicon: BDAG
  rationale: El verbo puede incluir la fuerza de negar bajo juramento. «Renunciar» es claro y amplio; el matiz solemne queda disponible en la nota.
- source_word: τὸν Ἰουδαϊσμόν
  english_pob_choice: Judaism
  chosen_spanish: el judaísmo
  alternatives_spanish:
  - la religión judía
  - la manera de vivir judía
  lexicon: BDAG
  rationale: Ἰουδαϊσμός nombra la identidad/práctica/religión judía en conjunto. «El judaísmo» es la equivalencia más directa y transparente en español.
theological_decisions:
- issue: Alcance de τὸν Ἰουδαϊσμόν
  english_pob_reading: Rendered as 'Judaism' without narrowing it to either religion alone or ethnicity alone.
  chosen_spanish_reading: «El judaísmo» sin reducirlo ni a religión solamente ni a etnicidad solamente.
  alternative_spanish_readings:
  - la religión judía
  - la manera de vivir judía
  rationale: En este contexto hay presión contra una identidad de pacto y práctica comunitaria. Mantener «el judaísmo» preserva esa amplitud y evita explicaciones interpretativas innecesarias.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Fuerza de μιερῶν τροφῶν
  english_pob_reading: Rendered as 'defiling foods' to preserve ritual/moral offense.
  chosen_spanish_reading: «Alimentos que contaminan» para conservar la noción de contaminación ritual y moral.
  alternative_spanish_readings:
  - alimentos impuros
  - alimentos contaminantes
  rationale: El texto no describe solo una categoría técnica; resalta el efecto de profanación/contaminación percibida. La formulación elegida comunica esa carga sin endurecerla con un tecnicismo innecesario.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del inglés auditado en el orden temporal de la acción participial: ἀπογευομένους se refleja como «después de probar», más natural que una formulación de anterioridad más pesada, y se mantuvo la coerción por tortura y la fuerza distributiva del original. También se conservó la amplitud de τὸν Ἰουδαϊσμόν y el matiz de contaminación ritual de μιερῶν τροφῶν.'
  spanish_consistency_notes:
  - Se emplea «judaísmo» para τὸν Ἰουδαϊσμόν, en línea con el sentido amplio de identidad, práctica y religión.
  - Se evitó «SEÑOR» u otras máscaras porque no hay aquí el Tetragrámaton ni κύριος con función divina.
  - «Torturas» conserva la violencia del medio coercitivo de διὰ βασάνων.
  - La nota sobre alimentos ofrece equivalentes posibles en español porque el campo semántico de μιερός admite más de una solución legítima.
