    text: 'O, más idiomáticamente: «la tierra que juré dar a sus padres». El hebreo dice literalmente: «la tierra por la cual alcé mi mano para dársela a sus padres», un gesto de juramento.'
    reason: lexical_alternative
  revision_rationale: Se conserva fielmente el nombre divino «Yahvé» y el modismo concreto de juramento, pero se corrige la sintaxis para que el español sea natural y transparente. «Por la cual alcé mi mano» expresa mejor la relación del gesto de juramento con la tierra prometida, y «dársela» refleja con más claridad el objeto femenino explícito del hebreo.
