  yaml_path: translation/ot/jeremiah/019/012.yaml
  text: So I will do to this place[a], declares Yahweh, and to its inhabitants, making this city like Topheth.
  footnotes:
  - marker: a
    text: Topheth was the site in the Valley of Ben Hinnom associated with child sacrifice and later defilement and judgment; the comparison signals that Jerusalem will become a place of horror and uncleanness.
