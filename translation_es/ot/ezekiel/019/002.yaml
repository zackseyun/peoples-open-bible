  to: 'Y dirás: «¿Qué era tu madre? Una leona. Entre leones se echaba[a]; en medio de leones jóvenes crió[b] a sus cachorros».'
  rationale: Se ajusta כְּפִרִים a «leones jóvenes» para conservar la distinción del hebreo y la decisión léxica documentada. Se mejora רָבָצָה con «se echaba», más natural en español. Se rehace la nota b para reflejar con fidelidad las alternativas auditadas sin construcciones españolas torpes o ambiguas.
