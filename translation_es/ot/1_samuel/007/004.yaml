    rationale: «Sirvieron a Yahvé solo» suele entenderse bien, pero «sirvieron solamente a Yahvé» expresa con mayor naturalidad la exclusividad de לְבַדּוֹ.
  revised_spanish_text: Así, los hijos de Israel quitaron los Baales y las Astarot[a], y sirvieron solamente a Yahvé.
  revised_footnotes:
