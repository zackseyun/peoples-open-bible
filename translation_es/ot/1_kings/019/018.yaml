translation:
  language: es
  text: 'Sin embargo, he dejado para mí en Israel siete mil[a]: todas las rodillas que no se han arrodillado ante Baal[b], y toda boca que no lo ha besado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «he reservado para mí»; el verbo hebreo puede expresar dejar en existencia o reservar para sí.'
    reason: lexical_alternative
  - marker: b
    text: Besar a un ídolo era un acto de homenaje o adoración.
    reason: cultural_note
lexical_decisions:
- source_word: וְהִשְׁאַרְתִּי
  english_pob_choice: Yet I have left for myself
  chosen_spanish: Sin embargo, he dejado para mí
  alternatives_spanish:
  - Pero he dejado
  - He reservado para mí
  - Dejaré para mí
  lexicon: HALOT
  rationale: El hebreo en hifil expresa ‘hacer quedar / dejar que permanezca’ con matiz de reservar para sí. En español, ‘he dejado para mí’ conserva el perfecto con valor de resultado presente y refleja bien el matiz de posesión/intención personal sin volverlo más técnico que el original.
- source_word: בְיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - dentro de Israel
  lexicon: HALOT
  rationale: Es la equivalencia locativa directa y natural en español.
- source_word: שִׁבְעַת אֲלָפִים
  english_pob_choice: seven thousand
  chosen_spanish: siete mil
  alternatives_spanish:
  - siete millares
  lexicon: HALOT
  rationale: La construcción cardinal se expresa de modo idiomático en español como ‘siete mil’; ‘millares’ sería menos natural y no añade precisión.
- source_word: כָּל הַבִּרְכַּיִם
  english_pob_choice: all the knees
  chosen_spanish: todos los que no se han doblado
  alternatives_spanish:
  - todas las rodillas
  - toda rodilla
  lexicon: HALOT
  rationale: El hebreo usa la rodilla como metonimia de personas. En español, ‘todas las rodillas’ suena duro y poco natural; por eso se preserva el sentido figurado con una relativa personal, manteniendo la imagen de sometimiento que sigue en el verbo ‘doblarse’.
- source_word: אֲשֶׁר לֹא כָרְעוּ לַבַּעַל
  english_pob_choice: that have not bowed to Baal
  chosen_spanish: que no se han doblado ante Baal
  alternatives_spanish:
  - que no han doblado la rodilla ante Baal
  - que no se han arrodillado ante Baal
  lexicon: HALOT
  rationale: כּרע significa inclinarse/arrodillarse en gesto de homenaje. ‘Doblarse ante Baal’ conserva la idea de sometimiento y permite una continuidad natural con la metonimia anterior. ‘Ante’ expresa mejor la dirección del acto de homenaje en español.
- source_word: הַבַּעַל
  english_pob_choice: Baal
  chosen_spanish: Baal
  alternatives_spanish:
  - el Baal
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como en la tradición académica y en la POB inglesa; no se añade artículo en español porque sonaría artificial como nombre.
- source_word: וְכָל הַפֶּה
  english_pob_choice: and every mouth
  chosen_spanish: y toda boca
  alternatives_spanish:
  - y todas las bocas
  - y cada boca
  lexicon: HALOT
  rationale: La singular colectiva hebrea se refleja con ‘toda boca’, que mantiene la imagen corporal y la fuerza distributiva sin perder naturalidad en español.
- source_word: אֲשֶׁר לֹא נָשַׁק לֽוֹ
  english_pob_choice: that has not kissed him
  chosen_spanish: que no lo ha besado
  alternatives_spanish:
  - que no lo ha saludado con un beso
  - que no le ha besado
  lexicon: HALOT
  rationale: נשׁק significa ‘besar’. En este contexto, el beso es un acto de homenaje o adoración a un ídolo; en español conviene conservar el verbo literal y dejar la carga cultual en nota, sin sustituirlo por una paráfrasis que borre la imagen.
theological_decisions:
- issue: Forma del remanente sin introducir terminología doctrinal añadida
  english_pob_reading: Yet I have left for myself seven thousand in Israel
  chosen_spanish_reading: Sin embargo, he dejado para mí en Israel siete mil
  alternative_spanish_readings:
  - He reservado para mí en Israel siete mil
  - He preservado para mí en Israel siete mil
  rationale: El pasaje presenta la preservación de un remanente fiel, pero la traducción no introduce vocabulario técnico que el hebreo no exige. ‘He dejado para mí’ mantiene la afirmación divina concreta y deja visible la tensión remanente sin cerrarla con lenguaje doctrinal externo.
  doctrine_reference: Mantener la tensión textual; primacía del dato original sobre formulación teológica sistematizada.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés, conservando el valor de remanente, la metonimia corporal (‘rodillas’, ‘boca’) y el gesto cultual de ‘besar’, con naturalización mínima para el español.
  spanish_consistency_notes:
  - Se usa ‘Baal’ como nombre propio divino, en coherencia con la terminología POB.
  - Se conserva ‘he dejado’ en perfecto con valor actual, acorde con el hebreo y con la lectura inglesa auditada.
  - 'La imagen corporal se mantiene parcialmente: ‘rodillas’ queda implicada por ‘doblarse’, y ‘boca’ se conserva de modo literal.'
  - Se evita ‘SEÑOR’ o ‘Cristo’ porque no corresponden al léxico de este versículo.
