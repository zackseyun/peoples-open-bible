review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: el modismo ἐπέβαλον τὰς χεῖρας se vierte adecuadamente como compromiso asumido, γυναῖκας como esposas, ἐξιλασμόν con sentido sacrificial, y κριούς como carneros. También conserva la elipsis algo abrupta de la frase sacrificial. Sin embargo, «despedir a sus esposas» suena menos fiel al contexto de separación matrimonial que «enviar lejos» o «repudiar», porque «despedir» en español moderno suele asociarse más con empleo o con una mera despedida. Además, la nota de a usa «pusieron sus manos», que no refleja bien el griego idiomático ni su literalidad básica.'
  spanish_quality_summary: 'El español es claro y generalmente natural, pero «despedir a sus esposas» resulta poco idiomático y potencialmente equívoco en registro bíblico-eclesial. «Enviar lejos a sus esposas» suena más transparente y cercano al valor contextual de ἐκβαλεῖν sin sobredramatizarlo como «expulsar». El resto del verso lee con dignidad suficiente. Las notas están bien encaminadas, aunque la nota a conviene afinarla a una formulación literal más exacta: «pusieron las manos para...» o mejor «pusieron mano a...» explicando que es un modismo.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Expiación», «carneros» e «ignorancia» están alineados con las decisiones auditadas. El ajuste principal es léxico-contextual en ἐκβαλεῖν: conviene evitar «despedir» y preferir «enviar lejos» para preservar mejor el matiz matrimonial sin introducir un calco demasiado rígido.'
  issues:
  - severity: medium
    issue: «despedir a sus esposas» es equívoco en español moderno
    rationale: Aunque intenta comunicar separación matrimonial, «despedir» suele asociarse con empleo, licenciamiento o una simple despedida. En este contexto, ἐκβαλεῖν apunta a apartar/enviar lejos a las esposas, no a un despido laboral.
  - severity: low
    issue: La nota a no reproduce con precisión suficiente la alternativa literal
    rationale: El inglés auditado conserva la idea de «laid hands». En español, «pusieron sus manos» suena menos exacto y menos idiomático que una formulación como «pusieron mano para...» o «pusieron las manos para...», acompañada de explicación.
  - severity: low
    issue: 'Hay una alternativa léxica errónea en los metadatos: «para atonerse»'
    rationale: No afecta el texto principal, pero no es español válido y no debería sostener la justificación léxica del registro.
  revised_spanish_text: y se comprometieron a enviar lejos a sus esposas[a], y para expiación, carneros por su ignorancia[b].
