revisions:
- from: Y si vendéis algo a vuestro prójimo[a], o compráis de la mano de vuestro prójimo, nadie oprimirá a su hermano.
  to: Y si venden algo a su prójimo, o compran de su prójimo, nadie oprimirá[a] a su hermano.
  rationale: Se corrige el registro al español neutral latinoamericano («venden/compran/su»), se elimina el calco poco natural «de la mano de» conforme al sentido del hebreo y al precedente del rastro inglés, y se reubica la nota para anclarla en el verbo que realmente explica. Se conserva «prójimo» y «hermano» para mantener la red relacional del hebreo y «oprimirá» por coherencia con la decisión léxica de la POB.
  reviewer_model: gpt-5.4
