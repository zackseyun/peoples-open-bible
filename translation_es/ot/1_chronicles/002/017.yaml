translation:
  language: es
  text: Abigail dio a luz a Amasa, y el padre de Amasa fue Jeter el ismaelita[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos y el paralelo en 2 Samuel 17:25 leen «Itra el israelita» en lugar de «Jeter el ismaelita». Aquí el Texto Masorético dice «Jeter el ismaelita».
    reason: textual_variant
lexical_decisions:
- source_word: יָלְדָה
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - engendró
  - parió
  lexicon: HALOT
  rationale: En una nota genealógica con sujeto femenino, יָלְדָה expresa el acto de dar a luz. 'Dio a luz' comunica el sentido natural en español y conserva la referencia materna sin sobrerreformular.
- source_word: אֶת עֲמָשָׂא
  english_pob_choice: Amasa
  chosen_spanish: Amasa
  alternatives_spanish:
  - a Amasa
  lexicon: HALOT
  rationale: El hebreo marca el objeto directo con אֶת. En español no se traduce como marcador aparte; se integra de manera natural con el nombre propio, manteniendo la fluidez genealógica.
- source_word: וַאֲבִי עֲמָשָׂא
  english_pob_choice: and the father of Amasa
  chosen_spanish: el padre de Amasa
  alternatives_spanish:
  - y el padre de Amasa
  - y Amasa era hijo de
  lexicon: HALOT
  rationale: La construcción en genitivo se conserva de forma transparente con 'el padre de Amasa'. Esto mantiene el dato relacional explícito que el texto hebreo presenta.
- source_word: יֶתֶר
  english_pob_choice: Jether
  chosen_spanish: Jeter
  alternatives_spanish:
  - Jéter
  lexicon: HALOT
  rationale: Se translitera el nombre propio al español como 'Jeter', una forma legible y consistente con la adaptación fonética habitual en castellano bíblico.
- source_word: הַיִּשְׁמְעֵאלִי
  english_pob_choice: the Ishmaelite
  chosen_spanish: el ismaelita
  alternatives_spanish:
  - el ismaelí
  lexicon: HALOT
  rationale: El artículo definido hebreo se refleja naturalmente con 'el ismaelita'. En español bíblico, 'ismaelita' funciona como gentilicio identificador y conserva el valor del original sin hacerlo más interpretativo.
theological_decisions:
- issue: Variantes textuales en el nombre y etnónimo de Jeter
  english_pob_reading: Some manuscripts and the parallel in 2 Samuel 17:25 read 'Ithra the Israelite' instead of 'Jether the Ishmaelite.' The Masoretic Text here reads 'Jether the Ishmaelite.'
  chosen_spanish_reading: Jeter el ismaelita
  alternative_spanish_readings:
  - Jéter el ismaelita
  - Itra el israelita
  rationale: Se sigue el texto masorético del pasaje base, tal como hace el POB en inglés, y se conserva la variante en nota. No se armoniza el verso con 2 Samuel en el cuerpo principal.
  doctrine_reference: Crítica textual bíblica; coherencia con el texto base masorético
- issue: Relación genealógica explícita
  english_pob_reading: and the father of Amasa was Jether the Ishmaelite
  chosen_spanish_reading: y el padre de Amasa fue Jeter el ismaelita
  alternative_spanish_readings:
  - y Amasa era hijo de Jeter el ismaelita
  rationale: Se mantiene la formulación relacional directa del hebreo y del POB inglés. La redacción evita inferencias adicionales y preserva el carácter de registro genealógico.
  doctrine_reference: Exégesis gramatical del texto hebreo
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado de revisión más reciente del POB en inglés: no se registraron cambios posteriores y el acuerdo de control fue alto. La versión española sigue el texto base masorético y conserva la nota de variante textual donde corresponde.'
  spanish_consistency_notes:
  - Se usa 'Abigail' y 'Amasa' como nombres propios invariables en español.
  - Se mantiene 'Jeter' para el nombre אישי y 'ismaelita' para el gentilicio con artículo definido implícito en la nota textual.
  - El estilo es conciso y genealógico, acorde con la forma del versículo hebreo y con la filosofía de equivalencia óptima del POB.
