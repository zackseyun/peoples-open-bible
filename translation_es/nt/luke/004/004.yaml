lexical_decisions:
- source_word: ἀπεκρίθη πρὸς αὐτόν
  english_pob_choice: answered him
  chosen_spanish: le respondió
  alternatives_spanish:
  - le contestó
  - respondió a él
  lexicon: BDAG
  rationale: La expresión griega es una fórmula idiomática de respuesta dirigida a alguien. En español, «le respondió» comunica con naturalidad la interacción directa sin calco innecesario.
- source_word: Γέγραπται
  english_pob_choice: It is written
  chosen_spanish: Está escrito
  alternatives_spanish:
  - Escrito está
  lexicon: BDAG
  rationale: La fórmula de cita bíblica se vierte de manera idiomática en español con «Está escrito», preservando el valor de autoridad textual y el tono formal de la cita.
- source_word: ἐπ’ ἄρτῳ μόνῳ
  english_pob_choice: by bread alone
  chosen_spanish: solo de pan
  alternatives_spanish:
  - únicamente de pan
  - por pan solamente
  lexicon: BDAG
  rationale: Con ζήσεται, la preposición expresa la base o sustento de la vida. «Solo de pan» reproduce bien el sentido sin sonar forzado en español.
- source_word: ζήσεται
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - vivirá por medio de
  - tendrá vida
  lexicon: BDAG
  rationale: El futuro medio se expresa naturalmente con «vivirá» en español contemporáneo, manteniendo el sentido de subsistencia o vida sostenida.
- source_word: ὁ ἄνθρωπος
  english_pob_choice: Man
  chosen_spanish: el hombre[a]
  alternatives_spanish:
  - una persona
  - el ser humano
  - la humanidad
  lexicon: BDAG
  rationale: El griego usa singular masculino con valor genérico y cita reconocible de Deuteronomio 8:3. «El hombre» conserva esa forma representativa y la resonancia intertextual; se añade una nota para explicitar la posibilidad inclusiva que el inglés POB preservó.
theological_decisions:
- issue: Valor genérico de ὁ ἄνθρωπος en una cita bíblica
  english_pob_reading: Man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - una persona
  - el ser humano
  - la humanidad
  rationale: La frase es una cita de Deuteronomio 8:3 y mantiene un singular genérico masculino. En la línea de la filosofía POB, se prefiere conservar esa forma antes que neutralizarla, sin ocultar en nota la alternativa inclusiva.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over gender-neutral)'
- issue: Cita dentro de cita en la respuesta de Jesús
  english_pob_reading: 'It is written: ‘Man will not live by bread alone.’'
  chosen_spanish_reading: 'Está escrito: «No solo de pan vivirá el hombre».'
  alternative_spanish_readings:
  - Está escrito que no solo de pan vivirá el hombre.
  - 'Está escrito: “El hombre no vivirá solo de pan”.'
  rationale: La puntuación española debe reflejar claramente la cita directa en el interior de la declaración de Jesús. Se mantiene el contenido verbal y la jerarquía de comillas, sin añadir interpretación.
  doctrine_reference: 'DOCTRINE.md: Fidelity to source discourse structure'
translation_notes:
  revision_awareness: Se ajustó la puntuación para reflejar con claridad la cita dentro de la respuesta de Jesús, conservando el sentido y la estructura discursiva del griego y del audit trail inglés.
  spanish_consistency_notes:
  - Se usó «Y Jesús» para reflejar el inicio narrativo coordinado del griego.
  - Se mantuvo «Está escrito» como fórmula bíblica idiomática y reconocible.
  - Se preservó el singular genérico masculino «el hombre» con nota explicativa, siguiendo la pauta POB de mantener la fuerza representativa del original.
  - La cita interior se marcó con comillas españolas y se evitó calcar la sintaxis inglesa.
