translation:
  language: es
  text: Jóvenes y ancianos yacen en el suelo en las calles[a]; mis vírgenes y mis hombres jóvenes han caído a espada. Los mataste en el día de tu ira[b]; los degollaste sin piedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "mis doncellas"; el hebreo בְּתוּלֹתַי significa más literalmente "mis vírgenes".
    reason: lexical_alternative
  - marker: b
    text: O "no tuviste piedad".
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁכְבוּ
  english_pob_choice: lie
  chosen_spanish: yacen
  alternatives_spanish:
  - han yacido
  - están tendidos
  lexicon: HALOT
  rationale: El perfecto hebreo describe el estado resultante de los muertos; en español, "yacen" conserva la imagen concreta de cuerpos tendidos sin sonar forzado ni demasiado temporal.
- source_word: לָאָרֶץ
  english_pob_choice: on the ground
  chosen_spanish: en el suelo
  alternatives_spanish:
  - sobre el suelo
  - en la tierra
  lexicon: HALOT
  rationale: Con yacer, la expresión señala la posición física del cuerpo. "En el suelo" es natural en español y mantiene la concreción del hebreo.
- source_word: חוּצוֹת
  english_pob_choice: in the streets
  chosen_spanish: en las calles
  alternatives_spanish:
  - en las plazas
  - en los espacios públicos
  lexicon: HALOT
  rationale: El término apunta a las vías o espacios abiertos de la ciudad; "calles" comunica bien ese sentido en español moderno y conserva la escena pública del lamento.
- source_word: נַעַר וְזָקֵן
  english_pob_choice: Young and old
  chosen_spanish: Jóvenes y ancianos
  alternatives_spanish:
  - muchachos y ancianos
  - jóvenes y viejos
  lexicon: HALOT
  rationale: Se trata de un merismo que abarca todas las edades. "Jóvenes y ancianos" preserva la amplitud idiomática con naturalidad en español.
- source_word: בְּתוּלֹתַי
  english_pob_choice: my virgins
  chosen_spanish: mis vírgenes
  alternatives_spanish:
  - mis doncellas
  - mis jóvenes mujeres
  lexicon: HALOT
  rationale: La forma hebrea es literalmente posesiva de בְּתוּלָה, por lo que "vírgenes" refleja el contenido léxico con más transparencia que una ampliación como "doncellas".
- source_word: וּבַחוּרַי
  english_pob_choice: my young men
  chosen_spanish: mis jóvenes
  alternatives_spanish:
  - mis muchachos
  - mis hombres jóvenes
  lexicon: HALOT
  rationale: En este contexto בָּחוּר designa a los jóvenes en edad y vigor, no necesariamente a varones "escogidos"; "mis jóvenes" mantiene el alcance general y evita añadir un matiz no explícito.
- source_word: נָפְלוּ בֶחָרֶב
  english_pob_choice: have fallen by the sword
  chosen_spanish: han caído a espada
  alternatives_spanish:
  - han caído por la espada
  - han caído en batalla
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de muerte violenta. "A espada" conserva la imagen bíblica con brevedad y sin expandirla interpretativamente a "en batalla".
- source_word: הָרַגְתָּ
  english_pob_choice: You killed them
  chosen_spanish: Los mataste
  alternatives_spanish:
  - Los has matado
  - Los asesinaste
  lexicon: HALOT
  rationale: El hebreo atribuye la acción directamente al interlocutor divino; en español el objeto implícito se explicita con "los" para dar claridad, mientras "mataste" mantiene la franqueza del verbo sin intensificarla más de lo que exige el texto.
- source_word: בְּיוֹם אַפֶּךָ
  english_pob_choice: in the day of your anger
  chosen_spanish: en el día de tu ira
  alternatives_spanish:
  - en el día de tu enojo
  - el día de tu furor
  lexicon: HALOT
  rationale: אַף expresa ira/enojo; "ira" preserva el registro solemne y la fuerza teológica del sintagma temporal.
- source_word: טָבַחְתָּ
  english_pob_choice: you slaughtered
  chosen_spanish: los degollaste
  alternatives_spanish:
  - los sacrificaste
  - los sacrificaste como ganado
  lexicon: HALOT
  rationale: El verbo tiene una violencia más gráfica que "matar". "Degollar" reproduce bien esa contundencia en español sin suavizar el acto ni desviarlo hacia un sentido cultual que no está en el contexto.
- source_word: לֹא חָמָלְתָּ
  english_pob_choice: without pity
  chosen_spanish: sin piedad
  alternatives_spanish:
  - sin compasión
  - no tuviste piedad
  lexicon: HALOT
  rationale: El hebreo afirma la ausencia de compasión o de perdón. "Sin piedad" es la forma más concisa y natural en español para ese cierre tajante.
theological_decisions:
- issue: Atribución directa a Dios de la muerte y el degüello
  english_pob_reading: 'Retain the second-person address to God: ''You killed... you slaughtered'''
  chosen_spanish_reading: 'Mantener el адресamiento directo a Dios: "Los mataste... los degollaste"'
  alternative_spanish_readings:
  - 'Suavizar a pasiva: "fueron matados... fueron degollados"'
  - 'usar impersonal: "se mató... se degolló"'
  rationale: El hebreo interpela directamente a Dios como agente en el lamento. La traducción conserva esa tensión teológica en vez de resolverla con pasivas o impersonales que diluirían la fuerza del texto.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión española sigue de cerca el audit trail inglés, conservando la imagen concreta de cuerpos tendidos en las calles, el merismo de edades, la referencia posesiva a las jóvenes y la atribución directa de la violencia a Dios, sin suavizar el lenguaje del lamento.
  spanish_consistency_notes:
  - Se usa "Yahvé" solo cuando el hebreo contiene el nombre divino; este versículo no lo incluye.
  - Se mantuvo "ira" para אַף por coherencia con el registro solemne y con el tratamiento de la emoción divina en pasajes de lamento.
  - '"Mis vírgenes" conserva la fuerza léxica documentada; la nota ofrece la alternativa culturalmente más suave sin reemplazar el término principal.'
  - '"A espada" reproduce el modismo hebreo de muerte violenta sin añadir ''en batalla'', que sería interpretativo.'
