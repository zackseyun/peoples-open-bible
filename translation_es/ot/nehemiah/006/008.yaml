- from: 'Entonces le envié[a], diciendo: «No han sucedido cosas tales como las que tú dices, porque las inventas desde tu propio corazón».'
  to: 'Entonces le envié respuesta[a], diciendo: «No han sucedido cosas tales como las que tú dices, porque te las inventas de tu propio corazón».'
  rationale: Se ajusta «le envié» a «le envié respuesta» para producir un español natural que explicita el objeto implícito del hebreo en contexto; se cambia «desde tu propio corazón» por «de tu propio corazón» por idiomaticidad y fidelidad; y se mantiene «te las inventas» como formulación clara y digna del sentido de בדא.
