revisions:
- from: 'Yahvé me dijo: «Diles: No suban ni peleen, porque yo no estoy en medio de ustedes[a], para que no caigan delante de sus enemigos[b]».'
  to: 'Yahvé me dijo: «Diles: No suban ni peleen, porque yo no estoy en medio de ustedes[a]; no sea que sean derrotados ante sus enemigos[b]».'
  rationale: Se reemplazó «para que no caigan» por «no sea que sean derrotados» para reflejar mejor la advertencia de consecuencia del hebreo y la decisión contextual ya documentada en el inglés POB. También se cambió «delante de» por «ante» en el texto principal por mayor naturalidad, preservando la alternativa más literal en nota.
