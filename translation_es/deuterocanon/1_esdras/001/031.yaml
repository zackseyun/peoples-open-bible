translation:
  language: es
  text: para toda la familia de Israel. Ahora estas cosas han sido registradas en el libro de las historias acerca de los reyes de Judea[a], y cada hecho de Josías, y su gloria, y su entendimiento de la ley del Señor, y las cosas hechas por él, tanto las anteriores como las ahora narradas[b], están registradas en el libro de los Reyes de Israel y de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: “el libro de las historias acerca de los reyes de Judea”. Esto parece aludir a un registro histórico real; “libro de los registros” también sería posible.'
    reason: lexical_alternative
  - marker: b
    text: La frase griega al final es algo enrevesada (“y las cosas hechas por él y las cosas ahora narradas”). La traducción conserva la idea de que tanto los hechos de Josías como lo que acaba de narrarse quedan incluidos en la fuente escrita.
    reason: textual_variant
lexical_decisions:
- source_word: γένος
  english_pob_choice: family
  chosen_spanish: familia
  alternatives_spanish:
  - linaje
  - raza
  - pueblo
  - descendencia
  lexicon: LSJ
  rationale: En εἰς πᾶν τὸ γένος Ἰσραήλ, γένος expresa el conjunto de los descendientes/grupo de parentesco de Israel. 'Familia' conserva ese matiz de parentesco mejor que 'pueblo', y suena natural en español bíblico contemporáneo.
- source_word: ἀναγέγραπται
  english_pob_choice: have been recorded
  chosen_spanish: han sido registradas
  alternatives_spanish:
  - están escritas
  - han sido inscritas
  - han quedado registradas
  lexicon: BDAG
  rationale: El perfecto pasivo señala una acción concluida con resultado vigente. 'Han sido registradas' mantiene el sentido documental del griego sin perder claridad en español.
- source_word: βίβλῳ τῶν ἱστορουμένων
  english_pob_choice: book of the histories
  chosen_spanish: libro de las historias
  alternatives_spanish:
  - libro de los registros
  - libro de los relatos históricos
  - libro de las crónicas
  lexicon: LSJ
  rationale: La frase apunta a una fuente histórica/archival. 'Libro de las historias' refleja la nominalización del griego y conserva la amplitud del término sin convertirlo en una paráfrasis demasiado específica.
- source_word: τὸ καθʼ ἓν πραχθέν
  english_pob_choice: each deed
  chosen_spanish: cada hecho
  alternatives_spanish:
  - cada obra
  - cada acción
  - cada acto
  lexicon: LSJ
  rationale: La expresión indica algo enumerado 'uno por uno' o 'en detalle'. 'Cada hecho' reproduce esa individualización y evita sobrecargar el español con una construcción demasiado literal.
- source_word: πράξεως / πραχθέντα
  english_pob_choice: deed / actions
  chosen_spanish: hecho / cosas hechas
  alternatives_spanish:
  - acto / actos
  - obra / obras
  - acción / acciones
  lexicon: BDAG
  rationale: Conservar dos palabras emparentadas en español ayuda a reflejar la repetición retórica del griego. 'Hecho' y 'cosas hechas' mantienen la relación semántica sin sonar forzados.
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - renombre
  - fama
  lexicon: BDAG
  rationale: Aquí δόξα describe la dignidad o renombre distinguido de Josías. 'Gloria' es el equivalente bíblico directo y conserva la fuerza del término.
- source_word: συνέσεως
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - inteligencia
  - insight
  lexicon: BDAG
  rationale: El contexto vincula esta cualidad con la ley del Señor. 'Entendimiento' comunica una comprensión lúcida y fiel, sin introducir una lectura demasiado técnica.
- source_word: νόμῳ Κυρίου
  english_pob_choice: the law of the Lord
  chosen_spanish: la ley del Señor
  alternatives_spanish:
  - la ley del Señor Yahvé
  - la ley del Yahvé
  - la ley de Yahvé
  lexicon: BDAG
  rationale: El griego tiene Κυρίου. En este texto deuterocanónico griego, la equivalencia directa y auditable es 'Señor' en español. Se conserva la formulación bíblica usual sin trasladar automáticamente el tetragrámaton.
- source_word: τά τε πραχθέντα ὑπʼ αὐτοῦ
  english_pob_choice: the things done by him
  chosen_spanish: las cosas hechas por él
  alternatives_spanish:
  - sus hechos
  - lo que él hizo
  - las obras realizadas por él
  lexicon: BDAG
  rationale: La construcción participial pasiva pide mantener el valor de 'cosas hechas'. 'Las cosas hechas por él' es fiel y prepara la continuación del listado.
- source_word: τὰ νῦν ἱστόρηται
  english_pob_choice: those now recounted
  chosen_spanish: las ahora narradas
  alternatives_spanish:
  - las que ahora se cuentan
  - las presentes narraciones
  - las ahora referidas
  lexicon: LSJ
  rationale: El griego es algo torpe en esta sección, y el POB inglés preserva la idea de que lo que se está contando también queda consignado. 'Las ahora narradas' mantiene esa relación sin suavizarla en exceso.
- source_word: βυβλίῳ τῶν Βασιλέων Ἰσραὴλ καὶ Ἰούδα
  english_pob_choice: book of the Kings of Israel and Judah
  chosen_spanish: libro de los Reyes de Israel y de Judá
  alternatives_spanish:
  - libro de los reyes de Israel y de Judá
  - libro de los Reyes de Israel y Judá
  lexicon: LSJ
  rationale: Se conserva el título de fuente como nombre de libro. 'Reyes' en mayúscula en español ayuda a señalar que se trata de un título, no de una simple referencia a reyes en general.
theological_decisions:
- issue: κύριος en νόμῳ Κυρίου
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - SEÑOR
  - Yahvé
  - Dueño
  rationale: El texto griego usa Κυρίου, y el POB inglés mantiene 'Lord'. En español, 'Señor' comunica de forma natural y reverente el mismo referente sin introducir una transliteración del nombre divino que el griego aquí no ofrece explícitamente.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para quitar un posesivo innecesario (''Josiah’s actions'') y acercarse mejor a la sintaxis griega. La presente redacción española refleja esa misma decisión al mantener una enumeración simple: ''cada hecho de Josías... y las cosas hechas por él''.'
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para Κυρίου en coherencia con el tratamiento del griego deuterocanónico.
  - Se usó 'libro de los Reyes' como título de obra, con mayúscula, para reflejar el carácter de fuente histórica.
  - Se preservó la repetición de verbos/resultados ('registradas' / 'registradas') para mantener la textura documental del original.
  - Se eligió 'familia' para γένος por su valor de parentesco, siguiendo la lectura auditada del inglés POB.
