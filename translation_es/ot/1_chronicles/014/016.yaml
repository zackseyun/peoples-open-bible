revisions:
- from: Así David hizo como Dios le había mandado[a], y ellos derrotaron el campamento de los filisteos desde Gabaón hasta Gezer.
  to: Así David hizo como Dios le había mandado, y golpearon el campamento[a] de los filisteos desde Gabaón hasta Gezer.
  rationale: Se quitó ‘ellos’ para mejorar la naturalidad del español, se ajustó ‘derrotaron’ a ‘golpearon’ para reflejar mejor el valor de נכה en contexto militar, y se movió la nota al sustantivo ‘campamento’, que es donde realmente corresponde la observación léxica.
