translation:
  language: es
  text: Y de Betah y de Berotai[a], ciudades de Hadad-ezer[c][b], el rey David tomó muchísimo bronce.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En el pasaje paralelo de 1 Crónicas 18:8, estos lugares aparecen con los nombres Tibhat y Cun; aquí el texto hebreo lee Betah y Berotai.
    reason: cross_reference
  - marker: b
    text: «Berotai» refleja la forma hebrea de este versículo; algunas traducciones emplean «Berotah» por una forma relacionada del topónimo.
    reason: lexical_alternative
  - marker: c
    text: «Bronce»; el hebreo נְחֹשֶׁת puede referirse también a «cobre», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בֶּטַח
  english_pob_choice: and from Betah
  chosen_spanish: de Betah
  alternatives_spanish:
  - de Tebah
  lexicon: HALOT
  rationale: 'La preposición hebrea con el prefijo conjuntivo se reproduce de forma directa con «de». Se conserva el nombre propio según la forma masorética de este versículo: «Betah». La alternativa «Tebah» queda como posibilidad textual relacionada por el paralelo de 1 Crónicas 18:8.'
- source_word: וּ/מִ/בֵּרֹתַי
  english_pob_choice: and from Berothai
  chosen_spanish: de Berotai
  alternatives_spanish:
  - de Berotah
  lexicon: HALOT
  rationale: Se translitera el topónimo en la forma del texto hebreo de este versículo. «Berotai» mantiene la referencia geográfica sin forzar una normalización traductora; «Berotah» se preserva como variante posible.
- source_word: עָרֵי הֲדַדְעָזֶר
  english_pob_choice: cities of Hadadezer
  chosen_spanish: ciudades de Hadad-ezer
  alternatives_spanish:
  - ciudades pertenecientes a Hadad-ezer
  - ciudades bajo Hadad-ezer
  lexicon: HALOT
  rationale: El constructo señala pertenencia o asociación. «Ciudades de Hadad-ezer» conserva la relación genitiva de manera natural en español. Se mantiene el nombre propio con guion para claridad lectora.
- source_word: לָקַח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - capturó
  - se apoderó de
  lexicon: HALOT
  rationale: El verbo básico לקח se traduce con «tomó» para no añadir más especificación de la que el hebreo obliga. En este contexto de botín bélico, «tomó» comunica bien la acción sin interpretar de más.
- source_word: הַמֶּלֶךְ דָּוִד
  english_pob_choice: King David
  chosen_spanish: el rey David
  alternatives_spanish:
  - rey David
  - David, el rey
  lexicon: HALOT
  rationale: El orden apposicional del hebreo se vierte naturalmente como «el rey David», forma clara y solemne en español.
- source_word: נְחֹשֶׁת
  english_pob_choice: bronze
  chosen_spanish: bronce
  alternatives_spanish:
  - cobre
  lexicon: HALOT
  rationale: En este contexto histórico y bélico, «bronce» es la equivalencia más probable y más estable en español bíblico. «Cobre» se conserva como alternativa semántica posible.
- source_word: הַרְבֵּה מְאֹד
  english_pob_choice: very much
  chosen_spanish: mucho
  alternatives_spanish:
  - en gran abundancia
  - muchísimo
  lexicon: HALOT
  rationale: La combinación intensiva se refleja de manera sobria con «mucho», que en español ya expresa cantidad abundante. Así se evita una paráfrasis excesiva y se conserva la fuerza cuantitativa del hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final del audit trail inglés, que prefirió una expresión más directa para la cantidad: «very much bronze». En español, eso se resolvió como «mucho bronce», evitando una ampliación innecesaria y manteniendo el paralelismo con el hebreo.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la transliteración de topónimos para respetar el texto masorético y permitir notas de variantes.
  - «Bronce» se usa como término principal, con la alternativa «cobre» reservada en nota por la ambigüedad léxica del hebreo.
