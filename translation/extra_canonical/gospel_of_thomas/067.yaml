  phrasing; (3) reading ⲛⲡⲙⲁ ⲧⲏⲣⲛⲧⲟϥ as the totalizing adverbial (“in every respect”);
  (4) the supplied pronoun ⟨ϥ⟩ in 45.20 is editorial, but sense is secure.'
