review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: las piedras fueron puestas aparte en el monte del templo, en un lugar apropiado, hasta la llegada de un profeta que diera respuesta acerca de ellas. Sin embargo, «depositaron» no preserva tan claramente como el griego medio ἀπέθεντο ni como el inglés POB «set aside» la idea de apartarlas o dejarlas reservadas para disposición futura.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «depositaron las piedras» suena algo administrativo y menos natural en este contexto narrativo-sacral. «Pusieron aparte» o «dejaron aparte» comunica mejor el sentido y suena más idiomático. El resto del verso es legible; la nota sobre «el monte de la Casa» funciona bien.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La expresión «la Casa» es aceptable aquí por su valor literal e idiomático, apoyada por la nota. «Un profeta» preserva correctamente el indefinido. «Responder acerca de ellas» es fiel, aunque «dar respuesta» suena algo más natural en español.
  issues:
  - severity: medium
    issue: «depositaron» debilita el matiz de ἀπέθεντο
    rationale: El verbo griego, junto con la decisión inglesa «set ... aside», apunta a apartar o dejar reservado para ulterior decisión. «Depositaron» puede sugerir solo colocar o entregar en depósito, sin el matiz claro de apartar temporalmente.
  - severity: low
    issue: «para responder acerca de ellas» es algo rígido en español
    rationale: Es fiel al griego, pero «para dar respuesta acerca de ellas» conserva mejor el registro formal-consultivo y suena más natural en español eclesial general.
  revised_spanish_text: Y pusieron aparte las piedras en el monte de la Casa, en un lugar adecuado[a], hasta que viniera un profeta para dar respuesta acerca de ellas.
