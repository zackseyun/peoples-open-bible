  yaml_path: translation/deuterocanon/4_maccabees/015/004.yaml
  text: Oh[a], how can I describe the child-loving affections of parents, who imprint the likeness of soul and form in the small, marvelous character of a child[c][b], especially since mothers make fathers more sympathetic toward their children who have been born.
