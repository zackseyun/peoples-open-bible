translation:
  language: es
  text: Y los hijos de Benjamín vieron que habían sido derrotados. Ahora bien, los hombres de Israel habían dado lugar[a] a Benjamín, porque confiaban en la emboscada[b] que habían puesto contra Gabaa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habían cedido lugar a Benjamín». El modismo hebreo significa que Israel cedió deliberadamente espacio o se retiró para sacar a Benjamín.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «confiaban en la fuerza de emboscada que habían puesto en Gabaa». El hebreo אֹרֵב puede referirse tanto a la emboscada misma como a quienes estaban al acecho.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּרְאוּ
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - se dieron cuenta de
  - percibieron
  lexicon: HALOT
  rationale: El hebreo conserva el verbo básico de ver; en este contexto narrativo puede implicar reconocimiento de la derrota. «Vieron» mantiene esa concreción sin añadir explicación ajena al texto.
- source_word: בְנֵי בִנְיָמִן
  english_pob_choice: the sons of Benjamin
  chosen_spanish: los hijos de Benjamín
  alternatives_spanish:
  - los benjaminitas
  lexicon: HALOT
  rationale: Se conserva la expresión de parentesco del hebreo, que es más transparente al texto fuente que una etnicidad ya interpretada.
- source_word: כִּי נִגָּפוּ
  english_pob_choice: that they were defeated
  chosen_spanish: que habían sido derrotados
  alternatives_spanish:
  - que habían sido vencidos
  - que habían sido abatidos
  lexicon: HALOT
  rationale: נִגָּפוּ en contexto militar comunica derrota por choque/abatimiento. «Habían sido derrotados» es natural en español y preserva el sentido pasivo de haber sufrido la derrota.
- source_word: וַיִּתְּנוּ ... מָקוֹם
  english_pob_choice: had given place
  chosen_spanish: habían cedido lugar
  alternatives_spanish:
  - habían dado lugar
  - habían dejado paso
  - se habían retirado
  lexicon: HALOT
  rationale: El idiomatismo hebreo implica ceder espacio tácticamente. «Cedido lugar» conserva la relación con מָקוֹם y sugiere el retroceso deliberado sin perder claridad en español.
- source_word: אִישׁ יִשְׂרָאֵל
  english_pob_choice: the men of Israel
  chosen_spanish: los hombres de Israel
  alternatives_spanish:
  - los varones de Israel
  - la gente de Israel
  lexicon: HALOT
  rationale: La forma singular colectiva se vierte naturalmente como plural colectivo en español. «Hombres» reproduce el registro narrativo y bélico del hebreo.
- source_word: לְבִנְיָמִן
  english_pob_choice: to Benjamin
  chosen_spanish: a Benjamín
  alternatives_spanish:
  - para Benjamín
  - frente a Benjamín
  lexicon: HALOT
  rationale: La preposición marca al grupo beneficiario del espacio cedido. «A Benjamín» respeta la dirección simple del hebreo y funciona bien con el modismo de ceder lugar.
- source_word: כִּי בָטְחוּ
  english_pob_choice: because they trusted
  chosen_spanish: porque confiaban
  alternatives_spanish:
  - porque se apoyaban
  - porque tenían confianza
  lexicon: HALOT
  rationale: בטח expresa confianza o dependencia. «Confiaban» conserva el valor de apoyo confiado que motiva la maniobra militar.
- source_word: אֶל הָאֹרֵב
  english_pob_choice: in the ambush
  chosen_spanish: en la emboscada
  alternatives_spanish:
  - en los emboscados
  - en la fuerza de emboscada
  lexicon: HALOT
  rationale: El hebreo puede referirse a la emboscada como plan o a quienes estaban al acecho. En español, «emboscada» es la opción más natural y mantiene abierta la alternativa de una fuerza emboscada, como lo señala la nota.
- source_word: אֲשֶׁר שָׂמוּ
  english_pob_choice: that they had set
  chosen_spanish: que habían puesto
  alternatives_spanish:
  - que habían preparado
  - que habían colocado
  lexicon: HALOT
  rationale: שָׂמוּ es amplio y admite poner/colocar/establecer. «Habían puesto» es breve y compatible con la colocación de una emboscada.
- source_word: אֶל הַגִּבְעָה
  english_pob_choice: against Gibeah
  chosen_spanish: contra Gabaa
  alternatives_spanish:
  - hacia Gabaa
  - frente a Gabaa
  lexicon: HALOT
  rationale: El giro militar apunta direccionalmente contra la ciudad. «Contra» conserva la orientación adversativa, y «Gabaa» refleja el topónimo habitual en español bíblico.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que prefirió «had given place» para reflejar con mayor precisión מָקוֹם; por eso el español usa «habían cedido lugar» en vez de una paráfrasis más libre.
  spanish_consistency_notes:
  - Se conserva «Benjamín» como nombre propio y «Gabaa» para el topónimo, en coherencia con un registro bíblico formal.
  - Se mantiene el paralelismo narrativo del hebreo con dos oraciones principales unidas por «porque».
  - Se evita sustituir «emboscada» por un término militar más interpretativo, para preservar la ambigüedad lexical documentada en el aparato inglés.
