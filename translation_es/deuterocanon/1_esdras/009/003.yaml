translation:
  language: es
  text: Y se hizo una proclamación en toda Judea y Jerusalén para todos los que venían del cautiverio[a], para reunirse en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, «para todos los exiliados» o «para todos los exiliados que habían regresado». El griego dice literalmente «para todos los que eran/venían de la cautividad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο κήρυγμα
  english_pob_choice: a proclamation was made
  chosen_spanish: se hizo una proclamación
  alternatives_spanish:
  - se publicó una proclamación
  - salió una proclamación
  - se dio un pregón
  lexicon: LSJ
  rationale: La construcción griega expresa la aparición pública de un anuncio. En español, «se hizo una proclamación» conserva el sentido impersonal y solemne sin convertir κήρυγμα en un decreto más formal de lo que el griego exige.
- source_word: ἐν ὅλῃ τῇ Ἰουδαίᾳ καὶ Ἰερουσαλήμ
  english_pob_choice: throughout all Judea and Jerusalem
  chosen_spanish: en toda Judea y Jerusalén
  alternatives_spanish:
  - por toda Judea y Jerusalén
  - en toda la región de Judea y en Jerusalén
  lexicon: LSJ
  rationale: El griego sitúa el ámbito del anuncio en Judea y Jerusalén. «En toda Judea y Jerusalén» reproduce bien la esfera territorial/cívica sin añadir matices no presentes en el texto.
- source_word: πᾶσι τοῖς ἐκ τῆς αἰχμαλωσίας
  english_pob_choice: to all those from the captivity
  chosen_spanish: para todos los que procedían de la cautividad
  alternatives_spanish:
  - para todos los de la cautividad
  - para todos los exiliados
  - para todos los que habían vuelto del cautiverio
  lexicon: LSJ
  rationale: La frase griega es literalmente «los que son/de la cautividad». «Procedían de la cautividad» mantiene la relación de origen sin decidir de manera demasiado interpretativa si el énfasis recae en exilio pasado, retorno, o pertenencia étnica al grupo exílico.
- source_word: συναχθῆναι
  english_pob_choice: to assemble
  chosen_spanish: para reunirse
  alternatives_spanish:
  - para congregarse
  - para ser reunidos
  - para juntarse
  lexicon: LSJ
  rationale: 'El infinitivo pasivo indica el contenido de la proclamación: que se reunieran. «Para reunirse» conserva la intención convocante y suena natural en español, sin forzar una pasiva artificial.'
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - a Jerusalén
  - hasta Jerusalén
  lexicon: LSJ
  rationale: Aunque εἰς suele ser «a/para», con συναχθῆναι el destino funciona naturalmente como lugar de reunión. «En Jerusalén» refleja el resultado de la convocatoria de manera idiomática en español.
translation_notes:
  revision_awareness: La versión española sigue el texto griego como ancla principal y refleja la revisión inglesa más reciente, que prefirió la idea directa de reunir/assemble frente a una paráfrasis más explicativa. Se conservó la tensión lexical de αἰχμαλωσία/cautividad con una nota alternativa en vez de suavizarla a «exilio» sin marcarlo.
  spanish_consistency_notes:
  - Se mantuvo «cautividad» en el texto principal para corresponder al campo semántico del griego y al español eclesial legible, evitando reemplazarlo sin nota por «exilio».
  - Se usó una construcción impersonal («se hizo una proclamación») para respetar el carácter público del κήρυγμα.
  - «Reunirse» se prefirió sobre «ser reunidos» para mayor naturalidad en español, sin perder el valor convocante del infinitivo griego.
