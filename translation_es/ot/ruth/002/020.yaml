    rationale: Aunque comprensible, una formulación como «un pariente cercano de nosotros» o mejor «nuestro pariente cercano» / «un pariente cercano» es más idiomática. Dado que ya aparece «de nosotros» en «uno de nuestros redentores», conviene una opción natural y sobria.
  - severity: low
    issue: La nota [a] omite el matiz ‘hacia’ en la alternativa de «his kindness toward the living and the dead».
    rationale: No es grave, pero la nota inglesa especifica el sentido relacional de la bondad. En español puede reflejarse mejor con «hacia los vivos y los muertos».
