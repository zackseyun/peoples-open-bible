translation:
  language: es
  text: Solo el ganado que tomamos como botín para nosotros[a], junto con el despojo de las ciudades que capturamos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y el despojo de las ciudades que tomamos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Solo que
  - Pero solo
  lexicon: HALOT
  rationale: Expresa la limitación/exclusión del contexto previo de manera natural en español, sin añadir contraste innecesario.
- source_word: הַבְּהֵמָה
  english_pob_choice: the livestock
  chosen_spanish: el ganado
  alternatives_spanish:
  - los animales
  - la hacienda
  lexicon: HALOT
  rationale: Aquí בְּהֵמָה se refiere a animales domésticos tomados como botín; 'ganado' es un colectivo natural y claro en español.
- source_word: בָּזַזְנוּ לָנוּ
  english_pob_choice: we took as plunder for ourselves
  chosen_spanish: tomamos como botín para nosotros
  alternatives_spanish:
  - saqueamos para nosotros
  - tomamos para nosotros como despojo
  lexicon: HALOT
  rationale: '''Tomamos como botín'' conserva el valor de plunder/saqueo sin sonar forzado; ''para nosotros'' mantiene el matiz beneficiario/reflexivo de לָנוּ.'
- source_word: וּשְׁלַל
  english_pob_choice: along with the spoil
  chosen_spanish: junto con el despojo
  alternatives_spanish:
  - y el botín
  - junto con el botín
  lexicon: HALOT
  rationale: שָׁלָל es el botín/despojo de guerra. 'Despojo' evita repetir 'botín' y mantiene la referencia militar.
- source_word: הֶעָרִים
  english_pob_choice: the cities
  chosen_spanish: las ciudades
  alternatives_spanish:
  - los pueblos
  - las urbes
  lexicon: HALOT
  rationale: עִיר suele ser 'ciudad'; 'ciudades' corresponde al registro del relato de conquista.
- source_word: אֲשֶׁר לָכָדְנוּ
  english_pob_choice: that we captured
  chosen_spanish: que capturamos
  alternatives_spanish:
  - que tomamos
  - que apresamos
  lexicon: HALOT
  rationale: לָכַד en contexto militar significa capturar/tomar por fuerza. 'Capturamos' es preciso y natural en español.
translation_notes:
  revision_awareness: El texto inglés no requirió revisiones en el pass más reciente; la versión española sigue de cerca el mismo contenido semántico, ajustando solo la naturalidad idiomática y la elección de equivalentes militares en español.
  spanish_consistency_notes:
  - Se mantiene 'botín' para בָּזַזְנוּ y 'despojo' para שָׁלָל, preservando la distinción que el inglés POB también evita colapsar en un solo término.
  - '''Capturamos'' refleja el verbo militar לָכַד sin sobrecargar el español con una forma arcaica.'
  - No se introducen notas teológicas porque el versículo es descriptivo y no presenta una decisión doctrinal específica.
