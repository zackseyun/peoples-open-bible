translation:
  language: es
  text: El apetito[a] del trabajador trabaja para él[b][c], porque su boca lo impulsa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «El alma» o «el deseo» del trabajador trabaja para él. נֶפֶשׁ puede significar «alma», «vida» o «apetito»; aquí el contexto de «su boca» favorece «apetito».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para sí». El hebreo dice literalmente «para él», aunque algunos entienden aquí un sentido reflexivo.'
    reason: alternative_reading
  - marker: c
    text: 'O: «su boca lo urge», «lo apremia» o «lo constriñe». El verbo hebreo expresa presión o impulso coercitivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ
  english_pob_choice: appetite
  chosen_spanish: apetito
  alternatives_spanish:
  - alma
  - vida
  - deseo
  lexicon: HALOT
  rationale: En proverbios, נֶפֶשׁ puede referirse al impulso interno, no a "alma" en sentido teológico. El contexto inmediato de "su boca" favorece una idea de necesidad/apetito; por eso "apetito" transmite bien la fuerza motivadora sin espiritualizar el término.
- source_word: עָמֵל
  english_pob_choice: laborer
  chosen_spanish: trabajador
  alternatives_spanish:
  - obrero
  - tabaajador
  - el que trabaja
  lexicon: HALOT
  rationale: El sustantivo/adjetivo designa a quien trabaja o se afana. "Trabajador" es natural en español y conserva la relación semántica con el verbo siguiente.
- source_word: עָמְלָה
  english_pob_choice: labors
  chosen_spanish: labora
  alternatives_spanish:
  - trabaja
  - se afana
  - se esfuerza
  lexicon: HALOT
  rationale: '"Labora" preserva el juego de palabras con עָמֵל y mantiene el paralelo léxico con "trabajador". Aunque suena algo más elevado, sigue siendo claro y fiel.'
- source_word: לּוֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - para sí
  - por él
  lexicon: HALOT
  rationale: La forma hebrea es simplemente de tercera persona masculina singular. "Para él" sigue la lectura directa; "para sí" refleja una comprensión reflexiva posible, pero no exigida por la forma.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón del dicho. En español, "porque" hace explícita la relación causal de manera natural y transparente.
- source_word: אָכַף
  english_pob_choice: presses him on
  chosen_spanish: lo impulsa
  alternatives_spanish:
  - lo presiona
  - lo urge
  - lo obliga
  lexicon: HALOT
  rationale: El verbo expresa presión o coerción. "Lo impulsa" comunica la fuerza que mueve a la persona a actuar, con fluidez en español; "lo presiona" conservaría más literalmente la idea de presión.
- source_word: עָלָיו
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - sobre él
  - contra él
  lexicon: HALOT
  rationale: Con אָכַף la preposición contribuye a la idea de presión ejercida sobre la persona. En español, ese matiz queda absorbido de forma idiomática en "lo impulsa".
- source_word: פִּיהוּ
  english_pob_choice: his mouth
  chosen_spanish: su boca
  alternatives_spanish:
  - su hambre
  - su apetito
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de "boca" porque el proverbio personifica la boca como la fuerza que apremia al hombre. Esta literalidad ayuda a conservar el color del texto hebreo.
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo y el audit trail en inglés. La redacción española conserva el paralelismo entre נֶפֶשׁ y עָמֵל/עָמְלָה, y mantiene la imagen literal de "boca". Se evaluó la lectura reflexiva de לּוֹ, pero se dejó en nota por no ser exigida por la forma. No se detectaron revisiones sustantivas en el pass más reciente; el estado de concordancia general es alto.
  spanish_consistency_notes:
  - Se prefirió "Yahvé" en la serie general del proyecto, pero este versículo no contiene el nombre divino.
  - '"Apetito" se usa aquí en sentido de impulso interno/necesidad, no de simple gusto por comer.'
  - '"Trabajador/labora" conserva el juego de palabras hebreo con la raíz עמל.'
  - La puntuación y el orden siguen el paralelismo causal del proverbio.
