    reason: textual_variant
  - marker: b
    text: 'O: «al cabo de algunos días» / «después de un período de tiempo».'
    reason: lexical_alternative
  revision_rationale: La revisión corrige el anclaje de la nota textual para que recaiga sobre «rey de Babilonia», que es el elemento realmente explicado. También ajusta la expresión temporal principal a «después de algún tiempo», que comunica mejor el valor idiomático e indefinido de וּלְקֵץ יָמִים, dejando «al cabo de algunos días» como alternativa en nota.
