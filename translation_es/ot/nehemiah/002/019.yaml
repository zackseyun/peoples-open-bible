translation:
  language: es
  text: 'Pero cuando Sambalat el horonita, Tobías, el esclavo[a] amonita, y Gesem el árabe oyeron, se burlaron de nosotros y nos despreciaron, y dijeron: “¿Qué es esta cosa que ustedes están haciendo? ¿Se están rebelando contra el rey?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Tobías, el siervo amonita”; algunos toman la designación en sentido más amplio como un título o cargo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: when ... heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - supieron
  lexicon: HALOT
  rationale: En español, el simple pretérito 'oyeron' conserva el hecho narrativo de percibir la noticia sin añadir matices interpretativos. El contexto ya aporta la reacción hostil, por lo que no conviene expandir la frase.
- source_word: הַחֹרֹנִי
  english_pob_choice: the Horonite
  chosen_spanish: el horonita
  alternatives_spanish:
  - el de Horón
  - el hombre de Horón
  lexicon: HALOT
  rationale: Se mantiene el gentilicio como designación identificadora ligada al nombre propio, sin convertirlo en una paráfrasis geográfica.
- source_word: הָעֶבֶד
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - oficial
  lexicon: HALOT
  rationale: La POB inglesa documenta la tensión entre 'slave' y una lectura titulativa más amplia. En español, 'esclavo' preserva la fuerza léxica y la transparencia del término, mientras que 'siervo' suavizaría el sentido. Dado que el hebreo usa un sustantivo común con valor identificador, se conserva la dureza léxica con apoyo de nota.
- source_word: הָעַמּוֹנִי
  english_pob_choice: the Ammonite
  chosen_spanish: amonita
  alternatives_spanish:
  - un amonita
  - el amonita
  lexicon: HALOT
  rationale: El gentilicio con artículo funciona como apelativo identificador. En español, el adjetivo sustantivado 'amonita' comunica con naturalidad la procedencia/adscripción étnica.
- source_word: הָעַרְבִי
  english_pob_choice: the Arab
  chosen_spanish: el árabe
  alternatives_spanish:
  - el arabio
  - el arabita
  lexicon: HALOT
  rationale: Se traduce el gentilicio de forma directa y reconocible. 'El árabe' es claro en español moderno y mantiene la designación étnico-regional.
- source_word: וַיַּלְעִגוּ לָנוּ
  english_pob_choice: they mocked us
  chosen_spanish: se burlaron de nosotros
  alternatives_spanish:
  - nos ridiculizaron
  - se mofaron de nosotros
  lexicon: HALOT
  rationale: La idea principal es la burla despectiva. 'Se burlaron de nosotros' es idiomático y conserva el tono de escarnio.
- source_word: וַיִּבְזוּ עָלֵינוּ
  english_pob_choice: despised us
  chosen_spanish: nos despreciaron
  alternatives_spanish:
  - nos trataron con desprecio
  - nos tuvieron en menos
  lexicon: HALOT
  rationale: El paralelo hebreo intensifica la burla con desprecio. 'Nos despreciaron' reproduce bien esa escalada de humillación.
- source_word: מָה הַדָּבָר הַזֶּה
  english_pob_choice: What is this thing
  chosen_spanish: ¿Qué es esta cosa?
  alternatives_spanish:
  - ¿Qué es este asunto?
  - ¿Qué es esto?
  lexicon: HALOT
  rationale: La frase hebrea es concreta y algo áspera. 'Esta cosa' conserva esa literalidad sin sobreexplicar, aunque 'asunto' sería más abstracto y menos incisivo.
- source_word: אֲשֶׁר אַתֶּם עֹשִׂים
  english_pob_choice: that you are doing
  chosen_spanish: que ustedes están haciendo
  alternatives_spanish:
  - que hacen
  - que están realizando
  lexicon: HALOT
  rationale: Se mantiene la cláusula relativa en forma natural y clara en español, con presente progresivo para reflejar la acción en curso.
- source_word: הַעַל הַמֶּלֶךְ אַתֶּם מֹרְדִים
  english_pob_choice: Are you rebelling against the king?
  chosen_spanish: ¿Se están rebelando contra el rey?
  alternatives_spanish:
  - ¿Están ustedes rebelándose contra el rey?
  - ¿Se rebelan contra el rey?
  lexicon: HALOT
  rationale: La construcción hebrea se entiende mejor como pregunta acusatoria. 'Rebelarse contra el rey' expresa היטב el valor de מֹרְדִים y el complemento con על.
theological_decisions:
- issue: Renderización de הָעֶבֶד en la designación de Tobías
  english_pob_reading: slave, with footnoted alternative servant/official-title sense
  chosen_spanish_reading: esclavo, con nota sobre la posible lectura más amplia como título o cargo
  alternative_spanish_readings:
  - siervo
  - oficial
  rationale: No hay una cuestión doctrinal mayor, pero sí una decisión léxica relevante. La forma española 'esclavo' preserva la fuerza semántica que la POB inglesa quiso mantener, mientras que la nota recoge la alternativa contextual de un posible título. Así se evita suavizar indebidamente el hebreo.
  doctrine_reference: Translation philosophy §1; lexical transparency principle
translation_notes:
  revision_awareness: 'La redacción sigue el último estado del audit trail: la revisión había propuesto ''servant'' por naturalidad, pero el ajuste posterior restauró ''slave''. Por eso se conserva en español ''esclavo'', manteniendo la tensión léxica documentada en la fuente inglesa y la nota alternativa sobre posible lectura titulativa.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se mantiene un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - La puntuación de diálogo y la pregunta retórica siguen normas españolas contemporáneas.
  - '''Esclavo'' se usa de modo consistente con la política POB cuando el término bondadoso/no bondadoso está lexicalmente en juego.'
