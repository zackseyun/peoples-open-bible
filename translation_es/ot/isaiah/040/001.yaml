revisions:
- from: '[a] Consolad, consolad a mi pueblo[b], dice tu Dios.'
  to: Consuelen[a], consuelen a mi pueblo, dice[b] su Dios.
  rationale: La revisión corrige el cambio indebido de número en «tu Dios» → «su Dios», adapta el imperativo plural a un español neutral latinoamericano («Consuelen»), y alinea las notas con las decisiones auditadas en inglés, especialmente la de יֹאמַר → «dice». Se mantiene la repetición enfática y la resonancia pactual de «mi pueblo».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T23:46:22Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la repetición imperativa de נַחֲמוּ, el sentido pactual de עַמִּי como «mi pueblo», y el valor formular de יֹאמַר como introducción de habla divina («dice»). Sin embargo, falla en reflejar adecuadamente אֱלֹהֵיכֶם, que es segunda persona plural: «tu Dios» cambia el número y debilita la relación mutua «mi pueblo / su Dios de ustedes».'
  spanish_quality_summary: «Consolad» es fiel pero suena marcadamente peninsular/arcaizante para un objetivo de español neutral latinoamericano. «Consuelen» es más natural y eclesialmente legible sin perder dignidad. Asimismo, el anclaje [a] al inicio de la oración está mal ubicado porque la nota trata de una alternativa léxica para «Consolad/Consuelen», y la nota [b] actual no corresponde al punto más necesario; conviene usarla para explicar «dice» por יֹאמַר. «su Dios» evita tanto el peninsular «vuestro» como el impropio singular «tu».
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Dios» está bien. La revisión propuesta mejora la adecuación al plural hebreo en אֱלֹהֵיכֶם con «su Dios» y mantiene «mi pueblo» por su resonancia comunitaria/pactual.
  issues:
  - severity: high
    issue: «tu Dios» no refleja el plural de אֱלֹהֵיכֶם
    rationale: El hebreo lleva sufijo de segunda persona plural. «Tu» lo singulariza; «su Dios» o «vuestro Dios» preservan mejor el sentido. Para español neutral latinoamericano, «su Dios» es preferible.
  - severity: medium
    issue: «Consolad» suena poco natural para español neutral latinoamericano
    rationale: Aunque formalmente correcto, corresponde al imperativo de vosotros, ajeno al registro neutral latinoamericano pedido. «Consuelen» conserva el plural del mandato y mejora la legibilidad.
  - severity: medium
    issue: Las notas no siguen bien el rastro auditado inglés
    rationale: La nota inglesa b explica el uso de «says» por un imperfecto hebreo; el borrador en cambio crea una nota sobre «mi gente», que no es necesaria aquí. Además, el marcador [a] debería anclarse en el verbo pertinente, no al inicio de toda la frase.
  revised_spanish_text: Consuelen[a], consuelen a mi pueblo, dice[b] su Dios.
  revised_footnotes:
