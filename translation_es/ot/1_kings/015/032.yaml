lexical_decisions:
- source_word: וּ/מִלְחָמָה
  english_pob_choice: And there was war
  chosen_spanish: Y hubo guerra
  alternatives_spanish:
  - Y había guerra
  - Y hubo conflicto
  - Entonces hubo guerra
  lexicon: HALOT
  rationale: מִלְחָמָה nombra guerra en sentido pleno. En español, «hubo guerra» reproduce con naturalidad el valor existencial del hebreo y mantiene el enlace narrativo del waw prefijado sin añadir matices no explicitados.
- source_word: הָיְתָה
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - había
  - era
  - continuó habiendo
  lexicon: HALOT
  rationale: El perfecto de היה funciona aquí de modo existencial con מִלְחָמָה. «Hubo» refleja bien ese valor en español y evita sobreinterpretar una duración que el verbo por sí solo no especifica.
- source_word: בֵּין ... וּ/בֵין
  english_pob_choice: between ... and
  chosen_spanish: entre ... y
  alternatives_spanish:
  - entre ... entre
  - entre ... y entre
  lexicon: HALOT
  rationale: La correlación hebrea בֵּין ... וּבֵין se expresa de forma idiomática en español con «entre ... y». Mantiene la relación recíproca sin calco innecesario.
- source_word: אָסָא
  english_pob_choice: Asa
  chosen_spanish: Asa
  alternatives_spanish:
  - Asás
  lexicon: Transliteración convencional
  rationale: Nombre propio del rey de Judá; se conserva la forma usual en español bíblico.
- source_word: בַּעְשָׁא
  english_pob_choice: Baasha
  chosen_spanish: Baasá
  alternatives_spanish:
  - Baasa
  - Basa
  lexicon: Transliteración convencional
  rationale: Se prefiere «Baasá» para reflejar mejor la vocalización hebrea y mantener una transliteración clara y consistente en español.
- source_word: מֶלֶךְ יִשְׂרָאֵל
  english_pob_choice: king of Israel
  chosen_spanish: rey de Israel
  alternatives_spanish:
  - el rey de Israel
  lexicon: HALOT
  rationale: La frase en constructo identifica a Baasá. En español, la apposición sin artículo («rey de Israel») es natural y fiel al original.
- source_word: כָּל יְמֵי/הֶם
  english_pob_choice: all their days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - toda su vida
  - durante toda su vida
  - a lo largo de todos sus días
  lexicon: HALOT
  rationale: Se conserva el idioma hebreo de «todos sus días», que corresponde al valor temporal amplio del original. «Toda su vida» es una equivalencia idiomática posible, pero el texto hebreo usa literalmente «días».
translation_notes:
  revision_awareness: 'El texto hebreo y el aparato inglés concuerdan en lectura alta: la frase es simple, sin variantes textuales relevantes ni decisiones doctrinales especiales. La única tensión lexical documentada es el giro temporal final, que puede naturalizarse como «toda su vida» sin perder el sentido.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma editorial general, pero este versículo no contiene el tetragrámaton.
  - Se usa «rey de Israel» en minúsculas por ser un título común en aposición, no un nombre propio.
  - «Baasá» se adopta como transliteración española consistente con la vocalización hebrea y para evitar la forma inglesa sin adaptación.
