translation:
  language: es
  text: Pasé junto al campo de un perezoso, y junto a la viña de un hombre falto de entendimiento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin entendimiento»; literalmente, «falto de corazón».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל
  english_pob_choice: by
  chosen_spanish: junto a
  alternatives_spanish:
  - por
  - pasando por
  - sobre
  lexicon: HALOT
  rationale: Con עברתי, la preposición expresa movimiento al lado de un lugar; en español, «junto a» comunica mejor ese paso por un sitio que «sobre» o «por encima de».
- source_word: שְׂדֵה
  english_pob_choice: field
  chosen_spanish: campo
  alternatives_spanish:
  - terreno
  - tierra
  - campo cultivado
  lexicon: HALOT
  rationale: El paralelo con «viña» favorece una referencia a una propiedad agrícola; «campo» es la equivalencia natural y clara en español.
- source_word: אִישׁ
  english_pob_choice: a
  chosen_spanish: un
  alternatives_spanish:
  - un hombre
  - el
  lexicon: HALOT
  rationale: En español, el valor posesivo se expresa de modo natural con «el campo de un…»; no hace falta reproducir «hombre» aparte dentro de la primera línea.
- source_word: עָצֵל
  english_pob_choice: sluggard
  chosen_spanish: perezoso
  alternatives_spanish:
  - holgazán
  - flojo
  - haragán
  lexicon: HALOT
  rationale: El término sapiencial denota una condición moral de negligencia habitual. «Perezoso» es comprensible y conserva ese rasgo caracterizador sin sonar excesivamente coloquial.
- source_word: עָבַרְתִּי
  english_pob_choice: I passed by
  chosen_spanish: Pasé junto a
  alternatives_spanish:
  - Pasé por
  - Iba pasando junto a
  lexicon: HALOT
  rationale: El perfecto qal narra una observación puntual; «Pasé junto a» reproduce bien el escenario observado y el movimiento pasado.
- source_word: כֶּרֶם
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  - viñedo de uvas
  lexicon: HALOT
  rationale: «Viña» es el equivalente bíblico y natural en español para una plantación de vides, manteniendo el paralelismo con «campo».
- source_word: אָדָם
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: HALOT
  rationale: El paralelo con איש conserva el masculino individual; «un hombre» respeta el matiz antropológico y la precisión gramatical del hebreo.
- source_word: חֲסַר לֵב
  english_pob_choice: lacking sense
  chosen_spanish: faltante de corazón
  alternatives_spanish:
  - sin entendimiento
  - falto de entendimiento
  - sin corazón
  lexicon: HALOT
  rationale: El hebreo dice literalmente «falto/lacante de corazón». Para no borrar la tensión entre literalidad e idiomatismo sapiencial, se conserva la imagen de «corazón»; «faltante de corazón» es un calco comprensible pero marcado, fiel al audit trail sobre la literalidad.
theological_decisions:
- issue: Retener la imagen hebrea de «corazón» en חֲסַר לֵב
  english_pob_reading: lacking sense / literally, lacking heart
  chosen_spanish_reading: faltante de corazón
  alternative_spanish_readings:
  - sin entendimiento
  - falto de entendimiento
  rationale: La nota inglesa preserva la tensión entre el sentido idiomático y la literalidad. En español, «faltante de corazón» mantiene visible la metáfora original sin perder del todo la referencia a carencia de juicio, que el lector puede captar en contexto.
  doctrine_reference: DOCTRINE.md §Lexical transparency and auditable reasoning
- issue: Mantener el masculino individual de אָדָם en paralelo con אִישׁ
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El texto hebreo presenta un individuo masculino en paralelo con איש. No se neutraliza la referencia para conservar la exactitud gramatical y la lectura auditada del POB inglés.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La versión inglesa más reciente fue revisada y quedó sin cambios; el acuerdo de revisión fue alto. Este borrador español sigue esa lectura estable y no introduce una reinterpretación textual.
  spanish_consistency_notes:
  - Se mantiene la correspondencia paralela entre «campo» y «viña».
  - Se conserva el masculino singular en «un hombre» para reflejar אָדָם en paralelo con אִישׁ.
  - La nota al pie preserva la alternativa idiomática sin borrar la imagen literal del hebreo.
  - El registro es sobrio y bíblico, sin arcaísmos innecesarios.
