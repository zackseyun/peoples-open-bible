translation:
  language: es
  text: Ada le dio a luz a Elifaz a Esaú, y Basemat dio a luz a Reuel.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתֵּלֶד / יָלְדָה
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - engendró
  - parió
  lexicon: HALOT
  rationale: En español, «dio a luz» es la forma más natural y clara para el nacimiento en un relato genealógico. Conserva el sujeto materno y el valor de ילד sin volver el texto demasiado arcaico o técnico.
- source_word: לְעֵשָׂו
  english_pob_choice: to Esau
  chosen_spanish: para Esaú
  alternatives_spanish:
  - a Esaú
  lexicon: HALOT
  rationale: La construcción con ל en contextos genealógicos expresa relación de descendencia o pertenencia. «Para Esaú» comunica esa relación de forma natural en español sin añadir un matiz interpretativo fuerte.
- source_word: אֱלִיפָז
  english_pob_choice: Eliphaz
  chosen_spanish: Elifaz
  alternatives_spanish:
  - Eliphaz
  lexicon: transliteration policy
  rationale: 'Se translitera el nombre propio al español con la forma más usual y legible: «Elifaz».'
- source_word: בָשְׂמַת
  english_pob_choice: Basemath
  chosen_spanish: Basemat
  alternatives_spanish:
  - Basemath
  - Basemat
  lexicon: transliteration policy
  rationale: Para el nombre propio se prefiere «Basemat», una transliteración clara y natural en español, manteniendo la identificación del personaje.
- source_word: רְעוּאֵל
  english_pob_choice: Reuel
  chosen_spanish: Reuel
  alternatives_spanish:
  - Raguel
  lexicon: transliteration policy
  rationale: Se conserva la transliteración habitual «Reuel», que refleja bien la forma hebrea y es inteligible para lectores bíblicos en español.
- source_word: וּ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: Hebrew grammar
  rationale: La conjunción coordinante se rinde con «y». No se requiere «e» porque la siguiente palabra comienza con consonante.
