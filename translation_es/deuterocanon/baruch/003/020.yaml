translation:
  language: es
  text: Los hombres más jóvenes vieron la luz[a] y vivieron en la tierra, pero no conocieron el camino del conocimiento.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «vieron luz». La expresión puede implicar idiomáticamente estar vivos o disfrutar de la vida.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los jóvenes» o «los más jóvenes». El griego está en masculino plural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: νεώτεροι
  english_pob_choice: the younger men
  chosen_spanish: los más jóvenes
  alternatives_spanish:
  - los jóvenes
  - los más jóvenes varones
  - la gente más joven
  lexicon: LSJ
  rationale: El griego es un plural masculino sustantivado, pero en español 'los más jóvenes' conserva la referencia a personas más jóvenes sin forzar un masculino explícito que suene innecesariamente restrictivo en esta frase proverbial. Mantiene el contraste generacional y la naturalidad del español bíblico moderno.
- source_word: εἶδον φῶς
  english_pob_choice: saw the light
  chosen_spanish: vieron la luz
  alternatives_spanish:
  - vieron luz
  - vieron la luz del día
  - conocieron la luz
  lexicon: LSJ
  rationale: La expresión griega es literalmente 'vieron luz'. En español, 'vieron la luz' conserva el valor imagístico y puede sugerir la vida, sin borrar la imagen concreta ni imponer una interpretación más amplia.
- source_word: κατῴκησαν ἐπὶ τῆς γῆς
  english_pob_choice: lived on the earth
  chosen_spanish: habitaron sobre la tierra
  alternatives_spanish:
  - vivieron sobre la tierra
  - moraron en la tierra
  - habitaron en la tierra
  lexicon: LSJ
  rationale: κατοικέω significa habitar/dwelling. 'Habitaron sobre la tierra' refleja con bastante fidelidad tanto el verbo como ἐπὶ τῆς γῆς, y conserva un registro digno. 'Vivieron' sería más idiomático, pero menos cercano al matiz de residencia.
- source_word: ὁδὸν
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - el modo
  - la vía
  lexicon: LSJ
  rationale: '''Camino'' es el equivalente natural de ὁδός en este contexto sapiencial. Conserva la metáfora de una trayectoria o conducta y suena claro en español.'
- source_word: ἐπιστήμης
  english_pob_choice: of knowledge
  chosen_spanish: del conocimiento
  alternatives_spanish:
  - de la sabiduría
  - de la ciencia
  - del saber
  lexicon: LSJ
  rationale: ἐπιστήμη indica conocimiento, entendimiento o saber competente. 'Conocimiento' es la opción más directa y no sobrecarga el término con el matiz más técnico de 'ciencia' ni con la amplitud de 'sabiduría'.
- source_word: οὐκ ἔγνωσαν
  english_pob_choice: they did not know
  chosen_spanish: no conocieron
  alternatives_spanish:
  - no supieron
  - no llegaron a conocer
  - no reconocieron
  lexicon: LSJ
  rationale: γινώσκω aquí funciona de forma simple como 'conocer'. 'No conocieron' preserva la negación directa y se integra bien con 'el camino del conocimiento'.
theological_decisions:
- issue: La imagen de 'ver la luz' y su posible sentido idiomático de estar vivo
  english_pob_reading: Retain the concrete expression 'saw the light' rather than interpret it as 'came to life' or 'enjoyed life.'
  chosen_spanish_reading: Mantener 'vieron la luz' como imagen concreta, sin explicitarla como 'vivieron' en el texto principal.
  alternative_spanish_readings:
  - vieron la luz
  - cobraron vida
  - disfrutaron la vida
  rationale: El griego presenta la imagen directamente. En español, 'vieron la luz' conserva tanto la literalidad como la posible resonancia idiomática, evitando cerrar una tensión interpretativa que el texto no resuelve de manera explícita.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor de νεώτεροι con referencia masculina gramatical
  english_pob_reading: 'Render with masculine reference: ''the younger men.'''
  chosen_spanish_reading: 'Usar una forma masculina plural no marcada con sentido humano general: ''los más jóvenes''.'
  alternative_spanish_readings:
  - los jóvenes
  - los más jóvenes varones
  - los jóvenes varones
  rationale: El griego es masculino plural sustantivado. En español, 'los más jóvenes' respeta la referencia a un grupo humano masculino gramatical sin volver el texto torpemente sexista o innecesariamente específico. No neutraliza el dato gramatical, pero lo expresa de manera natural.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'La versión inglesa auditada se mantuvo sin cambios en la última pasada revisada (model: gpt-5.4, 2026-04-23T15:38:20Z). La presente propuesta sigue esa línea: conserva la imagen de ''ver la luz'', el valor genérico de ''habitar'' y la clausula sapiencial ''el camino del conocimiento'' sin añadir interpretaciones no exigidas por el griego.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
  - '''Conocimiento'' se mantiene como término sapiencial estable; no se sustituye por ''sabiduría'' para no desplazar el valor léxico de ἐπιστήμης.'
  - '''Habitaron'' preserva el matiz de residencia/establecimiento de κατῴκησαν mejor que un simple ''vivieron''.'
  - La colocación de las notas [a][b] sigue el orden de decisión léxica en el texto y mantiene la ambigüedad documentada.
