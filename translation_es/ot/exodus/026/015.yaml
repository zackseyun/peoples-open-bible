translation:
  language: es
  text: Y harás los marcos[a] de madera de acacia para el tabernáculo, erguidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tablas» para «marcos»; el término hebreo se refiere a los elementos estructurales de madera del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָשִׂיתָ
  english_pob_choice: And you shall make
  chosen_spanish: Y harás
  alternatives_spanish:
  - Y harás de hacer
  - Y harás que se hagan
  lexicon: HALOT
  rationale: La forma verbal funciona como instrucción secuencial. En español, «harás» conserva el valor directivo sin sonar forzado, y la conjunción «Y» refleja el waw consecutivo.
- source_word: הַקְּרָשִׁים
  english_pob_choice: the frames
  chosen_spanish: los marcos
  alternatives_spanish:
  - las tablas
  - los tablones
  lexicon: HALOT
  rationale: El inglés POB opta por «frames» por la función estructural de las piezas del tabernáculo. «Marcos» comunica mejor esa función arquitectónica en español que «tablas», que puede sonar demasiado genérico o engañoso.
- source_word: לַמִּשְׁכָּן
  english_pob_choice: for the tabernacle
  chosen_spanish: para el tabernáculo
  alternatives_spanish:
  - para la morada
  - para el santuario
  lexicon: HALOT
  rationale: «Tabernáculo» es el equivalente técnico y tradicionalmente inteligible para מִשְׁכָּן en este contexto cultual.
- source_word: עֲצֵי שִׁטִּים
  english_pob_choice: of acacia wood
  chosen_spanish: de madera de acacia
  alternatives_spanish:
  - de acacia
  - de madera de shittim
  lexicon: HALOT
  rationale: La cadena nominal indica material. «Madera de acacia» es natural en español y evita el transliterado arcaizante «shittim».
- source_word: עֹמְדִים
  english_pob_choice: standing upright
  chosen_spanish: de pie
  alternatives_spanish:
  - erguidos
  - en posición vertical
  lexicon: HALOT
  rationale: El participio describe la orientación de las piezas. «De pie» conserva la imagen de verticalidad de manera clara y breve en español; la idea de erectitud/verticalidad queda implícita por el contexto constructivo.
translation_notes:
  revision_awareness: Se siguió el audit trail en que English POB mantiene «frames» y explicita la verticalidad de עֹמְדִים. Para evitar ambigüedad en español, se eligió una formulación directa y publicación-readable, conservando la referencia técnica al tabernáculo y el material de acacia.
  spanish_consistency_notes:
  - Se mantuvo «tabernáculo» como término técnico consistente con el proyecto.
  - Se evitó «SEÑOR» o equivalentes no pertinentes; el versículo no contiene el nombre divino.
  - «Madera de acacia» refleja de forma idiomática la cadena hebrea de material.
  - La nota [a] está anclada explícitamente en «marcos[a]» para cumplir la correspondencia texto-nota.
