translation:
  language: es
  text: Jeremías llamó a Baruc hijo de Nerías, y Baruc escribió en un rollo[a] todas las palabras de Yahvé de la boca de Jeremías[b], que él le había dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «sobre un rollo de libro».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de la boca de Jeremías», es decir, mientras Jeremías le dictaba.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - mandó llamar
  lexicon: HALOT
  rationale: El verbo en este contexto expresa que Jeremías hizo venir a Baruc; en español, «llamó» reproduce con naturalidad esa acción sin añadir la fuerza más formal de «convocó» ni la explicitud interpretativa de «mandó llamar».
- source_word: בָּרוּךְ בֶּן נֵרִיָּה
  english_pob_choice: Baruch son of Neriah
  chosen_spanish: Baruc hijo de Nerías
  alternatives_spanish:
  - Baruc, hijo de Nerías
  - Baruc el hijo de Nerías
  lexicon: HALOT
  rationale: Los nombres propios se transliteran de forma estable al español bíblico. «Hijo de» conserva la relación genealógica con buena naturalidad; se evita «el hijo de» por ser más pesado sin aportar más fidelidad.
- source_word: וַיִּכְתֹּב
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - escribió por escrito
  - anotó
  lexicon: HALOT
  rationale: El verbo básico es «escribir»; en español «escribió» comunica sin expansión indebida. «Anotó» rebajaría demasiado el acto, y «escribió por escrito» sería redundante.
- source_word: מִפִּי יִרְמְיָהוּ
  english_pob_choice: from Jeremiah’s mouth
  chosen_spanish: de la boca de Jeremías
  alternatives_spanish:
  - de boca de Jeremías
  - según la dictaba Jeremías
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática hebrea de la oralidad transmitida por dictado. «De la boca de Jeremías» es fiel y comprensible; la alternativa «según la dictaba Jeremías» interpreta correctamente el sentido, pero pierde la metáfora textual.
- source_word: כָּל דִּבְרֵי יְהוָה
  english_pob_choice: all the words of Yahweh
  chosen_spanish: todas las palabras de Yahvé
  alternatives_spanish:
  - todo lo que Yahvé había dicho
  - todas las palabras del Yahvé
  lexicon: HALOT
  rationale: «Palabras» conserva la concreción del hebreo דִּבְרֵי. Se usa «Yahvé» conforme a la norma del proyecto para יְהוָה; «todo lo que Yahvé había dicho» es posible, pero diluye la formulación repetible del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé». Es la forma principal requerida y mantiene el nombre propio divino sin sustituirlo por un título.'
- source_word: אֲשֶׁר דִּבֶּר אֵלָיו
  english_pob_choice: which he had spoken to him
  chosen_spanish: que él le había hablado
  alternatives_spanish:
  - que le había hablado
  - que había hablado con él
  lexicon: HALOT
  rationale: La cláusula relativa se refiere naturalmente a Yahvé como sujeto implícito del hablar; el español permite mantener la referencia con «él». «Le había hablado» es más fluido, pero se explicita «él» para evitar ambigüedad referencial. Se evita «hablado con él» porque debilita la direccionalidad del habla profética.
- source_word: עַל מְגִלַּת סֵפֶר
  english_pob_choice: on a scroll
  chosen_spanish: en un rollo
  alternatives_spanish:
  - sobre un rollo
  - en un pergamino
  lexicon: HALOT
  rationale: «Rollo» es la equivalencia moderna más clara para מְגִלָּה en este contexto documental. «En un pergamino» podría sugerir el material más que el objeto escrito; «sobre un rollo» suena menos natural en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. El proyecto pide mantener el nombre divino como «Yahvé» en el texto principal, evitando la sustitución por un título. Esto preserva la transparencia y la auditabilidad del texto fuente.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor de מִפִּי como metáfora de dictado
  english_pob_reading: from Jeremiah’s mouth
  chosen_spanish_reading: de la boca de Jeremías
  alternative_spanish_readings:
  - según la dictaba Jeremías
  - de boca de Jeremías
  rationale: La POB inglesa conserva la imagen literal y aclara en nota que se trata de dictado. En español se mantiene la metáfora de la boca como fuente del dicho, porque el hebreo no usa una expresión técnica sino una imagen concreta. La nota explica la equivalencia funcional sin borrar la figura.
  doctrine_reference: 'DOCTRINE.md Translation method: source transparency over flattening idiom'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: coloca «de la boca de Jeremías» junto a «escribió en un rollo» para mantener el flujo natural del verso, y conserva la clausula final «que él le había hablado» para reflejar con más precisión la estructura hebrea. También integra el cambio doctrinal del nombre divino a «Yahvé», conforme a la política del proyecto en español.'
  spanish_consistency_notes:
  - Se mantiene «Baruc» con una sola c y la forma genealógica «hijo de Nerías» de modo consistente con la transliteración española usual.
  - «Yahvé» se usa de forma uniforme para יְהוָה; no se sustituye por «SEÑOR».
  - «Rollo» se prefiere a «pergamino» para מְגִלָּה en este contexto documental.
  - La nota a explica la expresión idiomática de dictado sin desfigurar el texto principal.
  - La nota b conserva la alternativa formal del hebreo «rollo de libro», útil para lectores que sigan la transparencia lexical.
