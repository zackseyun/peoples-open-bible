translation:
  language: es
  text: Reúnan ante mí[a] a todos los ancianos de vuestras tribus y a vuestros oficiales, para que hable estas palabras a oídos de ellos y llame al cielo y a la tierra como testigos contra ellos.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a mí». El hebreo dice literalmente «a mí»; «ante mí» explicita en español el sentido de convocatoria personal sin cambiar el referente.
    reason: alternative_reading
  - marker: b
    text: O «los cielos y la tierra». La expresión hebrea es una fórmula estable de Deuteronomio para los testigos del pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַקְהִילוּ
  english_pob_choice: Gather
  chosen_spanish: Congregad
  alternatives_spanish:
  - Reunid
  - Convocad
  lexicon: HALOT
  rationale: El imperativo hifil plural de קהל pide una acción causativa dirigida a varios destinatarios. «Congregad» conserva la idea de reunir por convocatoria y suena natural en español bíblico contemporáneo sin perder el matiz exhortativo.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - ante mí
  - delante de mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona significa de forma más directa «a mí». Se evita «delante de mí» porque introduce una precisión interpretativa que el hebreo no exige aquí.
- source_word: זִקְנֵי שִׁבְטֵיכֶם
  english_pob_choice: the elders of your tribes
  chosen_spanish: los ancianos de sus tribus
  alternatives_spanish:
  - los ancianos de sus clanes
  - los ancianos tribales
  lexicon: HALOT
  rationale: «Ancianos» comunica el cargo de los זקנים en un registro amplio y comprensible. Se mantiene la relación de pertenencia con «de sus tribus» para reflejar la cadena constructa sin simplificarla a una frase menos transparente.
- source_word: שֹׁטְרֵיכֶם
  english_pob_choice: your officers
  chosen_spanish: sus oficiales
  alternatives_spanish:
  - sus funcionarios
  - sus administradores
  lexicon: HALOT
  rationale: En contextos administrativos deuteronómicos, שֹׁטְרִים son subordinados con función oficial. «Oficiales» es suficientemente amplio y natural en español; «funcionarios» pierde algo del matiz de autoridad y «administradores» es más específico de lo que el texto da.
- source_word: וַאֲדַבְּרָה
  english_pob_choice: that I may speak
  chosen_spanish: para que hable
  alternatives_spanish:
  - y hablaré
  - y yo hable
  lexicon: HALOT
  rationale: El cohortativo expresa intención o propósito. En español, «para que hable» reproduce bien la relación final/purpose sin forzar un futuro, y conserva el tono de intención de Moisés.
- source_word: בְּאָזְנֵיהֶם
  english_pob_choice: in their hearing
  chosen_spanish: en sus oídos
  alternatives_spanish:
  - a sus oídos
  - en su audición
  lexicon: HALOT
  rationale: El hebreo dice literalmente «en sus oídos». Se mantiene la imagen corporal porque es una expresión idiomática muy estable y concreta; «en su audición» sería artificial en español.
- source_word: אֵת הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - estos dichos
  lexicon: HALOT
  rationale: Aquí דְּבָרִים se refiere a discurso pronunciado. «Palabras» es la correspondencia más directa y conserva la relación verbal del contexto inmediato.
- source_word: וְאָעִידָה בָּם
  english_pob_choice: call heaven and earth to witness against them
  chosen_spanish: tome por testigos contra ellos
  alternatives_spanish:
  - dé testimonio contra ellos
  - llame al cielo y a la tierra como testigos contra ellos
  lexicon: HALOT
  rationale: El hifil de עוּד en este marco legal-covenantal expresa invocar testigos o dar testimonio solemne. En español, «tome por testigos contra ellos» preserva la fuerza jurídica del acto y evita una paráfrasis demasiado explicativa.
- source_word: הַשָּׁמַיִם וְאֶת הָאָרֶץ
  english_pob_choice: heaven and earth
  chosen_spanish: al cielo y a la tierra
  alternatives_spanish:
  - los cielos y la tierra
  - el cielo y la tierra
  lexicon: HALOT
  rationale: Se conserva la fórmula testifical convencional de Deuteronomio. «Al cielo y a la tierra» refleja la función de objeto de «tome por testigos»; aunque el singular puede sonar menos idiomático que «el cielo y la tierra», sigue siendo fiel al paralelismo hebreo y a la lectura legal del pasaje.
theological_decisions:
- issue: Fórmula de testigos del pacto
  english_pob_reading: call heaven and earth to witness against them
  chosen_spanish_reading: tome por testigos contra ellos al cielo y a la tierra
  alternative_spanish_readings:
  - llame al cielo y a la tierra como testigos contra ellos
  - dé testimonio contra ellos con el cielo y la tierra
  rationale: 'El texto presenta la fórmula de testigos del pacto propia de Deuteronomio: el cielo y la tierra actúan como testigos solemnes de la alianza y de la responsabilidad de Israel. La redacción elegida conserva la dimensión jurídica sin diluirla en una simple mención poética.'
  doctrine_reference: Deuteronomio 30:19; 31:28; 32:1
translation_notes:
  revision_awareness: La versión inglesa auditada revisó «so that I may speak» por «that I may speak» para un registro ligeramente más formal. En español se optó por «para que hable», que conserva el valor final del cohortativo y mantiene naturalidad sintáctica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando aparece en el texto base; en este versículo no aparece explícitamente.
  - Se conserva la fórmula de pacto «cielo y tierra» sin armonizarla a un lenguaje más interpretativo, porque el original hebreo funciona como testimonio solemne y no meramente como marco cosmológico.
  - «Oficiales» se usa en sentido administrativo amplio, coherente con el registro deuteronómico, sin convertirlo en un término eclesiástico tradicional.
