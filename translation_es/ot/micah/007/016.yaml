translation:
  language: es
  text: Las naciones verán y se avergonzarán[a] de todo su poder; se pondrán la mano sobre la boca[b]; sus oídos quedarán sordos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «serán avergonzadas por todo su poder». La frase hebrea puede indicar vergüenza en relación con el poder que poseen o presumen.
    reason: lexical_alternative
  - marker: b
    text: Este gesto idiomático expresa silencio, asombro o sumisión.
    reason: cultural_note
  - marker: c
    text: O «sus oídos quedarán tapados» / «sus oídos se volverán insensibles».
    reason: lexical_alternative
lexical_decisions:
- source_word: יִרְא֤וּ
  english_pob_choice: will see
  chosen_spanish: verán
  alternatives_spanish:
  - verán
  - mirarán
  lexicon: HALOT
  rationale: El imperfecto qal en contexto profético se expresa naturalmente en futuro español. «Verán» conserva el sentido de percepción/constatación sin añadir interpretación.
- source_word: גוֹיִם֙
  english_pob_choice: Nations
  chosen_spanish: Las naciones
  alternatives_spanish:
  - las naciones
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: «Naciones» refleja bien el sentido geopolítico de גוֹיִם en este contexto. El artículo ayuda a la fluidez del español y mantiene la referencia colectiva.
- source_word: וְ/יֵבֹ֔שׁוּ
  english_pob_choice: and be ashamed
  chosen_spanish: se avergonzarán
  alternatives_spanish:
  - serán avergonzadas
  - quedarán avergonzadas
  - serán puestas en vergüenza
  lexicon: HALOT
  rationale: El verbo בוש expresa vergüenza/deshonra. «Se avergonzarán» comunica bien el estado resultante en español, sin forzar una voz pasiva que el hebreo no exige aquí.
- source_word: מִ/כֹּ֖ל גְּבֽוּרָתָ֑/ם
  english_pob_choice: of all their might
  chosen_spanish: de todo su poder
  alternatives_spanish:
  - por todo su poder
  - a causa de todo su poder
  - debido a todo su poder
  lexicon: HALOT
  rationale: גְּבוּרָה puede ser fuerza, poder o poderío. «Poder» es idiomático en español y mantiene la relación compacta del hebreo. La preposición hebrea admite una relación ambigua de referencia o causa; el español conserva esa tensión con una formulación breve.
- source_word: יָשִׂ֤ימוּ יָד֙ עַל פֶּ֔ה
  english_pob_choice: they will put their hand over their mouth
  chosen_spanish: se pondrán la mano sobre la boca
  alternatives_spanish:
  - pondrán la mano sobre la boca
  - se llevarán la mano a la boca
  - se taparán la boca con la mano
  lexicon: HALOT
  rationale: Se conserva el singular idiomático «mano» y la imagen corporal del hebreo. En español, «ponerse la mano sobre la boca» comunica el gesto de silencio, asombro o sumisión sin perder literalidad.
- source_word: אָזְנֵיהֶם תֶּחֱרַשְׁנָה
  english_pob_choice: their ears will become deaf
  chosen_spanish: sus oídos se harán sordos
  alternatives_spanish:
  - sus oídos quedarán sordos
  - sus oídos se volverán sordos
  - sus oídos se cerrarán
  lexicon: HALOT
  rationale: חרשׁ aplicado a «oídos» expresa sordera o incapacidad de oír. «Se harán sordos» conserva la imagen y evita una paráfrasis que borre la metáfora corporal.
translation_notes:
  revision_awareness: Coincide con la lectura auditada en que no hay cambios de revisión aplicados y que el consenso es alto; se mantiene la ambigüedad hebrea sobre la relación entre vergüenza y poder, y el gesto idiomático de silencio.
  spanish_consistency_notes:
  - Se mantiene «naciones» para גוֹיִם, acorde con el contexto.
  - Se elige «poder» para גְּבוּרָה como término amplio y comprensible.
  - 'Se conserva el paralelismo corporal: mano sobre la boca / oídos sordos.'
  - No se usa «SEÑOR» ni terminología eclesiástica innecesaria porque el versículo no contiene el nombre divino.
