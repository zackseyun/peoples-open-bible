translation:
  language: es
  text: Un hombre rico se esfuerza por reunir riqueza, y cuando descansa[b], recibe placer[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: "para recibir deleite/lujo". Aquí se traduce "recibe placer" para conservar la cercanía al hebreo לקבל תענוג. Otra posibilidad es "recibe deleite".'
    reason: lexical_alternative
  - marker: b
    text: El paralelo griego transmitido aquí no coincide con la redacción hebrea de este verso; por eso la traducción sigue como base el testimonio hebreo y no el griego.
    reason: textual_variant
lexical_decisions:
- source_word: עמלי
  english_pob_choice: labors
  chosen_spanish: se esfuerza
  alternatives_spanish:
  - trabaja
  - labora
  - se afana
  lexicon: HALOT
  rationale: El hebreo expresa esfuerzo intenso o fatiga en el trabajo. En español, "se esfuerza" mantiene la fuerza verbal sin sonar tan técnico o arcaico como "labora"; también evita cargar innecesariamente el matiz de miseria que a veces tiene "afana".
- source_word: עשיר
  english_pob_choice: a rich man
  chosen_spanish: Un hombre rico
  alternatives_spanish:
  - El hombre rico
  - Un rico
  - Un hombre adinerado
  lexicon: HALOT
  rationale: El singular hebreo apunta a una persona concreta en tipo general. "Un hombre rico" conserva ese valor genérico y resulta natural en español.
- source_word: לקבץ
  english_pob_choice: to gather
  chosen_spanish: reunir
  alternatives_spanish:
  - juntar
  - amontonar
  - acumular
  lexicon: HALOT
  rationale: El infinitivo indica reunir o acumular. "Reunir" es claro y sobrio en español; evita volver demasiado figurativa la idea de acumulación.
- source_word: הון
  english_pob_choice: wealth
  chosen_spanish: riqueza
  alternatives_spanish:
  - riquezas
  - bienes
  - patrimonio
  lexicon: HALOT
  rationale: '"Riqueza" transmite el campo semántico de הון de forma natural en español. "Riquezas" también es posible, pero el singular abstracto funciona bien con el infinitivo "reunir".'
- source_word: ינוח
  english_pob_choice: he rests
  chosen_spanish: descansa
  alternatives_spanish:
  - se aquieta
  - se relaja
  - toma reposo
  lexicon: HALOT
  rationale: El verbo denota reposo. "Descansa" es la forma más directa y natural en español.
- source_word: לקבל
  english_pob_choice: he receives
  chosen_spanish: recibe
  alternatives_spanish:
  - obtiene
  - goza de
  - percibe
  lexicon: HALOT
  rationale: El hebreo dice literalmente "recibir"; la revisión inglesa prefirió conservar esa cercanía. En español, "recibe" mantiene el vínculo semántico sin forzar una equivalencia idiomática más libre.
- source_word: תענוג
  english_pob_choice: enjoyment
  chosen_spanish: satisfacción
  alternatives_spanish:
  - placer
  - deleite
  - gozo
  lexicon: HALOT
  rationale: El término puede expresar deleite o placer. "Satisfacción" preserva la idea de un bien experimentado tras el descanso sin introducir una expansión concreta como "lujos".
theological_decisions:
- issue: El verso describe una afirmación sapiencial sobre la riqueza y el descanso, no una enseñanza doctrinal directa.
  english_pob_reading: The translation follows the Hebrew witness as primary while noting source-level instability from the Greek parallel.
  chosen_spanish_reading: La traducción sigue principalmente el testimonio hebreo, sin convertir el verso en una tesis doctrinal ni suavizar su observación sapiencial.
  alternative_spanish_readings:
  - 'Lectura más literal y abstracta: "recibe placer"'
  - 'Lectura más concreta: "goza de placer"'
  rationale: No hay tensión doctrinal principal que resolver; la decisión es de registro y de fidelidad al género sapiencial. Se preserva el carácter observacional del proverbio sin añadir interpretación teológica.
  doctrine_reference: Género sapiencial; fidelidad textual al testimonio hebreo con cautela ante la inestabilidad del paralelo griego.
translation_notes:
  revision_awareness: El audit trail inglés revisó la segunda cláusula desde una lectura más interpretativa ('he enjoys luxuries') hacia una más próxima al hebreo ('he receives enjoyment'). La versión española refleja esa revisión al usar "recibe satisfacción", evitando expandir el sentido hacia "lujos" o una paráfrasis más fuerte.
  spanish_consistency_notes:
  - Se mantuvo "un hombre rico" para preservar el singular genérico del hebreo.
  - '"Recibe satisfacción" conserva la idea de לקבל תענוג sin convertirla en una expresión de lujo concreto.'
  - La nota sobre el griego se incluye porque el propio packet marca una discrepancia textual relevante.
