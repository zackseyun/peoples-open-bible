theological_decisions:
- issue: Rendering the divine name יהוה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Partitive sense of Noah's selection for sacrifice
  chosen_reading: some from every clean animal and from every clean bird
  alternative_readings:
  - from every clean animal and from every clean bird
  rationale: The Hebrew literally says 'took from every clean animal and from every clean bird.' In context, since Noah offers sacrifices from the clean creatures preserved in the ark, English benefits from making the partitive implication explicit so as not to suggest he sacrificed every clean creature. This is an optimal-equivalence clarification, not a doctrinal expansion.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence'
