translation:
  language: es
  text: Entonces Eliú, hijo de Barakel el buzita, de la familia de Ram, se encendió de ira contra Job; su ira se encendió porque se justificó a sí mismo[a] en vez de a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «porque se consideraba más justo que Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּחַר אַף
  english_pob_choice: burned with anger
  chosen_spanish: se encendió en ira
  alternatives_spanish:
  - ardió de ira
  - se irritó
  - se encendió de ira
  lexicon: HALOT
  rationale: La imagen hebrea de la ira que ‘arde’ se conserva de manera natural en español con ‘se encendió en ira’, sin perder claridad ni sonar mecánica.
- source_word: אֱלִיהוּא
  english_pob_choice: Elihu
  chosen_spanish: Eliú
  alternatives_spanish:
  - Elihu
  lexicon: Transliteración estándar en español
  rationale: Se usa la forma usual y readable en español bíblico, ajustada a la ortografía y acentuación española.
- source_word: בֶן בַּרַכְאֵל
  english_pob_choice: son of Barakel
  chosen_spanish: hijo de Barakel
  alternatives_spanish:
  - hijo de Barakel
  lexicon: Relación genealógica directa
  rationale: La expresión genealógica se traduce literalmente y con naturalidad en español.
- source_word: הַבּוּזִי
  english_pob_choice: the Buzite
  chosen_spanish: el buzita
  alternatives_spanish:
  - el buzita
  - el buzita
  lexicon: HALOT
  rationale: El gentilicio con artículo se reproduce con un sustantivo de pertenencia/clan en español, manteniendo la referencia étnica sin forzar una perífrasis.
- source_word: מִמִּשְׁפַּחַת רָם
  english_pob_choice: from the family of Ram
  chosen_spanish: de la familia de Ram
  alternatives_spanish:
  - del clan de Ram
  - de la estirpe de Ram
  lexicon: HALOT
  rationale: ‘Familia’ comunica bien מִשְׁפָּחָה en español moderno y conserva el sentido de grupo de parentesco.
- source_word: בְּאִיּוֹב
  english_pob_choice: against Job
  chosen_spanish: contra Job
  alternatives_spanish:
  - contra Job
  - frente a Job
  lexicon: HALOT
  rationale: Con verbos de ira, la preposición hebrea marca el objeto de la indignación; ‘contra’ es la equivalencia idiomática más natural.
- source_word: חָרָה אַפּוֹ
  english_pob_choice: his anger burned
  chosen_spanish: su ira se encendió
  alternatives_spanish:
  - su ira ardió
  - se inflamó su ira
  lexicon: HALOT
  rationale: Se mantiene la repetición enfática del idioma hebreo con una formulación idiomática en español.
- source_word: עַל צַדְּקוֹ נַפְשׁוֹ מֵאֱלֹהִים
  english_pob_choice: because he justified himself rather than God
  chosen_spanish: porque se justificaba a sí mismo más bien que a Dios
  alternatives_spanish:
  - porque se consideraba más justo que Dios
  - porque se declaraba justo antes que Dios
  lexicon: HALOT
  rationale: ‘Se justificaba a sí mismo’ reproduce el valor forense del verbo y el reflexivo de נַפְשׁוֹ sin reducirlo a mera autoestima; ‘más bien que a Dios’ conserva la comparación difícil del hebreo sin suavizarla.
theological_decisions:
- issue: Interpretación de la cláusula final con comparación implícita a Dios
  english_pob_reading: because he justified himself rather than God
  chosen_spanish_reading: porque se justificaba a sí mismo más bien que a Dios
  alternative_spanish_readings:
  - porque se consideraba más justo que Dios
  - porque se declaraba justo antes que Dios
  rationale: 'La frase hebrea es ambigua y no conviene resolverla demasiado. La traducción principal mantiene el contraste con Dios y deja abierta la tensión teológica: Job se vindica a sí mismo en detrimento de Dios, sin convertir la frase en una paráfrasis interpretativa más fuerte que el texto.'
  doctrine_reference: Preservar la tensión textual y teológica sin sobreexplicarla.
translation_notes:
  revision_awareness: 'El borrador sigue el estado más reciente del audit trail: no hay revisiones aplicadas y el consenso de revisión es alto. Se mantiene la decisión de conservar la imagen de ira ‘encendida’ y el contraste final con Dios sin resolverlo de forma excesivamente interpretativa.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como término por defecto solo cuando aparezca el nombre divino; aquí el texto tiene אֱלֹהִים, por lo que corresponde ‘Dios’.
  - Se conserva la diferencia entre el verbo de ira y el segundo miembro reiterativo mediante una repetición similar en español.
  - ‘Se justificaba a sí mismo’ evita reemplazar el matiz forense por un simple ‘se creía inocente’.
  - El gentilicio se presenta con forma natural en español para un lector bíblico general, sin perder la marca étnica/clánica.
