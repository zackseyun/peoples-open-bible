translation:
  language: es
  text: Acuérdate de los mandamientos, y no te enojes con tu prójimo; acuérdate de la alianza del Altísimo, y pasa por alto[a] la ignorancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «deja pasar la ignorancia»; es decir, pasa por alto una ofensa nacida de la ignorancia.
    reason: lexical_alternative
lexical_decisions:
- source_word: μνήσθητι
  english_pob_choice: Remember
  chosen_spanish: Acuérdate de
  alternatives_spanish:
  - Recuerda
  - Ten presente
  lexicon: LSJ
  rationale: El imperativo aoristo medio pide una exhortación activa a la memoria. «Acuérdate de» es natural en español bíblico actual y conserva mejor el matiz exhortativo que un simple «recuerda» en este contexto coordinado.
- source_word: ἐντολῶν
  english_pob_choice: the commandments
  chosen_spanish: los mandamientos
  alternatives_spanish:
  - los preceptos
  - los mandatos
  lexicon: LSJ
  rationale: El plural genitivo se refiere a mandamientos en sentido moral-religioso. «Mandamientos» conserva esa fuerza mejor que «mandatos», y no se añade un complemento como «de la ley» que no está explícito en el griego.
- source_word: μὴ μηνίσῃς
  english_pob_choice: do not be angry
  chosen_spanish: no te enojes
  alternatives_spanish:
  - no te irrites
  - no guardes enojo
  lexicon: LSJ
  rationale: El verbo expresa enojo o ira. En español, «no te enojes» comunica de forma directa y natural la prohibición sin intensificarla indebidamente a «airarte» o «enfurecerte».
- source_word: τῷ πλησίον
  english_pob_choice: with your neighbor
  chosen_spanish: con tu prójimo
  alternatives_spanish:
  - con tu vecino
  - contra tu prójimo
  lexicon: LSJ
  rationale: En contexto ético bíblico, πλησίον designa al prójimo. «Prójimo» es la equivalencia española más estable y precisa; «vecino» puede sonar demasiado doméstico y «contra» introduce una dirección no expresada por la forma griega.
- source_word: διαθήκην Ὑψίστου
  english_pob_choice: the covenant of the Most High
  chosen_spanish: el pacto del Altísimo
  alternatives_spanish:
  - el pacto del Dios Altísimo
  - la alianza del Altísimo
  lexicon: LSJ
  rationale: διαθήκη puede rendirse como «pacto» o «alianza». Aquí se eligió «pacto» para seguir la línea auditada del inglés y mantener una formulación bíblica clara; «del Altísimo» preserva el genitivo sin explicitar «con» que el griego no exige. Se evita «alianza» porque, aunque válida, puede sonar más litúrgica y menos directa en este dicho sapiencial.
- source_word: πάριδε
  english_pob_choice: overlook
  chosen_spanish: pasa por alto
  alternatives_spanish:
  - pasa de largo
  - ignora
  lexicon: LSJ
  rationale: El imperativo sugiere pasar por alto una falta o asunto. «Pasa por alto» comunica la idea ética de no insistir en la ofensa sin convertirla en negación del hecho, que sería más fuerte con «ignora».
- source_word: ἄγνοιαν
  english_pob_choice: ignorance
  chosen_spanish: la ignorancia
  alternatives_spanish:
  - un error por ignorancia
  - la falta de conocimiento
  lexicon: LSJ
  rationale: ἄγνοια significa ignorancia o falta de conocimiento. Se mantiene el sustantivo «ignorancia» para conservar la forma del original y permitir la implicación ética de un agravio nacido de la falta de saber.
theological_decisions:
- issue: Estructura elíptica del griego con dos imperativos
  english_pob_reading: Repeat 'remember' before 'the covenant of the Most High' for clarity in English.
  chosen_spanish_reading: 'Se mantiene la elipsis con coordinación natural en español: «Acuérdate de los mandamientos…; acuérdate del pacto…».'
  alternative_spanish_readings:
  - «Acuérdate de los mandamientos, y del pacto del Altísimo…»
  - 'Dejar la segunda miembro como frase nominal: «y el pacto del Altísimo…»'
  rationale: El griego concentra la exhortación en dos objetos recordados y reanuda luego el mandato; en español, repetir «acuérdate» preserva mejor la claridad sintáctica y no añade contenido nuevo. Además, evita una frase nominal demasiado abrupta para lectura pública.
  doctrine_reference: Principio de equivalencia óptima y claridad sintáctica sin ampliar el texto.
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de alta concordancia del paquete de fuente y la decisión auditada del inglés de mantener «overlook»/«ignorance» de forma cercana al griego. No se detectaron revisiones pendientes relevantes; la redacción española sigue la misma línea de claridad y sobriedad.
  spanish_consistency_notes:
  - Se usa «Altísimo» para Ὑψίστος, en continuidad con el registro bíblico y sin sustituirlo por una perífrasis.
  - «Prójimo» conserva el valor ético-relacional de πλησίον.
  - «Pasa por alto» mantiene la tensión entre perdonar/omitir y reconocer la ignorancia como motivo de la falta.
