translation:
  language: es
  text: Y en cuanto a ustedes, sean fecundos y multiplíquense; pululen[a] en la tierra y multiplíquense en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rebosen en la tierra». El verbo hebreo expresa un aumento prolífico con imagen de enjambre o abundancia creciente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאַתֶּם
  english_pob_choice: And as for you
  chosen_spanish: Y en cuanto a ustedes
  alternatives_spanish:
  - Y ustedes
  - Pero en cuanto a ustedes
  lexicon: HALOT
  rationale: El pronombre independiente con la conjunción introduce un énfasis de resumption/contraste tras el contexto previo. «En cuanto a ustedes» comunica ese relieve de manera natural en español sin añadir interpretación.
- source_word: פְּרוּ
  english_pob_choice: be fruitful
  chosen_spanish: sean fecundos
  alternatives_spanish:
  - fructifiquen
  - den fruto
  lexicon: HALOT
  rationale: En este mandato-bendición, פרה expresa fecundidad reproductiva. «Sean fecundos» conserva el valor idiomático y suena natural en español bíblico contemporáneo; «den fruto» resultaría más agrícola que reproductivo.
- source_word: וּרְבוּ
  english_pob_choice: and multiply
  chosen_spanish: y multiplíquense
  alternatives_spanish:
  - y aumenten
  - y crezcan en número
  lexicon: HALOT
  rationale: רבה aquí denota aumento numérico. «Multiplíquense» mantiene la fuerza de multiplicación y el paralelismo con el primer imperativo.
- source_word: שִׁרְצוּ
  english_pob_choice: swarm
  chosen_spanish: pululen
  alternatives_spanish:
  - se multipliquen prolíficamente
  - teem en
  lexicon: HALOT
  rationale: El verbo שׁרץ comunica proliferación abundante con imagen de enjambre/tejemeneo. «Pululen» transmite bien esa idea en español; «teem» es menos natural, y una paráfrasis suavizaría demasiado la imagen.
- source_word: בָאָרֶץ
  english_pob_choice: in the earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el mundo
  lexicon: HALOT
  rationale: Aquí אֶרֶץ puede referirse al ámbito terrenal como esfera de expansión humana. «En la tierra» refleja con fidelidad la preposición y preserva el paralelo con «en ella».
- source_word: וּרְבוּ בָהּ
  english_pob_choice: and multiply in it
  chosen_spanish: y multiplíquense en ella
  alternatives_spanish:
  - y crezcan en ella
  - y multiplíquense dentro de ella
  lexicon: HALOT
  rationale: El sufijo femenino retoma a אֶרֶץ. «En ella» es el equivalente más natural y mantiene la repetición enfática del verbo רבה.
theological_decisions:
- issue: Relación con el mandato creacional y la bendición posdiluviana
  english_pob_reading: Render as a renewed divine command/blessing to Noah and his sons without adding theological interpretation in the text.
  chosen_spanish_reading: Presentarlo como un mandato-bendición renovado dirigido a Noé y a sus hijos, sin ampliar el texto con explicación doctrinal.
  alternative_spanish_readings:
  - Tratarlo principalmente como una repetición de Génesis 1:28
  - Convertirlo en una fórmula exclusivamente pactual con redacción doctrinal ampliada
  rationale: El hebreo conserva el tono imperativo-bendicional paralelo a Génesis 1:28. La redacción española debe dejar ver ese eco sin introducir conclusiones doctrinales que el versículo no formula explícitamente.
  doctrine_reference: Génesis 1:28; filosofía POB de equivalencia óptima y contención interpretativa
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés, que afinó la preposición para reflejar más de cerca el hebreo y mantener el paralelismo entre «en la tierra» y «en ella». En español se preservó ese paralelismo con «en la tierra» / «en ella», evitando una preposición más idiomática pero menos cercana al original.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino cuando corresponde en el proyecto; este versículo no lo contiene.
  - Se evitó «SEÑOR» como sustituto automático, en coherencia con la política del proyecto.
  - «Fecundos / multiplíquense» preserva el paralelismo semántico de פרה / רבה sin confundirlo con una simple repetición estilística.
  - «Pululen» conserva la imagen fuerte de שׁרץ, que el POB inglés ya documentó con «swarm» y su alternativa «teem».
