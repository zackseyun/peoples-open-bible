translation:
  language: es
  text: Pero Eleazar, el de ánimo noble y verdaderamente de noble origen, como si estuviera en un sueño[a] mientras era torturado, no se dejaba desviar en absoluto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''como en un sueño''. El griego usa un símil, no una afirmación literal de que Eleazar estuviera soñando.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μεγαλόφρων
  english_pob_choice: noble-minded
  chosen_spanish: de ánimo noble
  alternatives_spanish:
  - noble de espíritu
  - magnánimo
  lexicon: LSJ
  rationale: El griego expresa grandeza o nobleza interior de ánimo; 'de ánimo noble' conserva la cualidad moral-psicológica sin sonar arcaico como 'magnánimo'.
- source_word: εὐγενής
  english_pob_choice: well-born
  chosen_spanish: de noble origen
  alternatives_spanish:
  - bien nacido
  - noble
  lexicon: LSJ
  rationale: El término apunta a nobleza de nacimiento o linaje. Como 'de ánimo noble' ya traduce μεγαλόφρων, 'de noble origen' preserva la referencia genealógica distinta.
- source_word: ὡς ἀληθῶς
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - realmente
  - en verdad
  lexicon: LSJ
  rationale: La frase intensifica la caracterización de Eleazar. 'Verdaderamente' es natural en español y mantiene el énfasis.
- source_word: ὥσπερ ἐν ὀνείρῳ
  english_pob_choice: as though in a dream
  chosen_spanish: como si estuviera en un sueño
  alternatives_spanish:
  - como si fuera un sueño
  - como en un sueño
  lexicon: LSJ
  rationale: Se conserva el valor comparativo del símil, sin afirmar que Eleazar estuviera literalmente soñando. 'Estuviera' mantiene la irrealidad modal del giro.
- source_word: βασανιζόμενος
  english_pob_choice: being tortured
  chosen_spanish: siendo torturado
  alternatives_spanish:
  - siendo atormentado
  - sufriendo tortura
  lexicon: LSJ
  rationale: En este contexto martirial el participio señala tortura física. 'Siendo torturado' es directo y fiel al sentido concreto.
- source_word: κατ᾽ οὐδὲν τρόπον
  english_pob_choice: in any way
  chosen_spanish: en absoluto
  alternatives_spanish:
  - de ningún modo
  - en ninguna manera
  lexicon: LSJ
  rationale: El modismo niega por completo la idea de desviación. 'En absoluto' comunica la negación total con buen ritmo en español.
- source_word: μετετρέπετο
  english_pob_choice: was not turned aside
  chosen_spanish: no se dejaba desviar
  alternatives_spanish:
  - no se apartaba
  - no cedía
  lexicon: LSJ
  rationale: El verbo expresa ser desviado o apartado de su resolución. La pasiva griega se vierte en español con una construcción natural que preserva la idea de firmeza bajo presión.
theological_decisions:
- issue: Naturaleza figurada del símil 'como si estuviera en un sueño'
  english_pob_reading: The verse is rendered as a simile describing Eleazar's detachment and steadfastness under torture, not as a literal dream-state.
  chosen_spanish_reading: 'La frase se entiende como símil: la tortura le afecta ''como si'' ocurriera en un sueño, no como afirmación de que él estuviera literalmente soñando.'
  alternative_spanish_readings:
  - como en un sueño, enfatizando la irrealidad de la experiencia
  - como si fuera un sueño, con énfasis en la comparación
  rationale: El griego ὥσπερ ἐν ὀνείρῳ introduce una comparación. La traducción española conserva esa figura para no convertirla en una afirmación literal ni diluir su fuerza retórica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se requerían cambios; se mantuvo la equivalencia óptima y la distinción entre nobleza interior y noble origen, además del símil no literal.'
  spanish_consistency_notes:
  - Se preservó 'Eleazar' como forma estándar del nombre propio.
  - Se evitó 'Cristo', 'Señor' u այլ terminología no presente en el texto.
  - La pasiva griega μετετρέπετο se vertió con una construcción idiomática española que conserva la idea de no ser desviado.
  - '''En absoluto'' refleja la negación enfática de κατ᾽ οὐδὲν τρόπον sin perder naturalidad en español.'
