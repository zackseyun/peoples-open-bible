translation:
  language: es
  text: ¿No has oído? Hace mucho tiempo lo hice; desde los días de antaño lo formé. Ahora he hecho que suceda[a], para que las ciudades fortificadas se conviertan en montones de ruinas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «para desolaciones, montones, ciudades fortificadas». El hebreo junto a «montones» es difícil; el sentido es que las ciudades fortificadas quedan reducidas a montones de ruinas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הֲלֹא
  english_pob_choice: Have you not
  chosen_spanish: ¿No has…?
  alternatives_spanish:
  - ¿Acaso no has…?
  - ¿No has oído acaso?
  lexicon: HALOT
  rationale: La pregunta retórica en hebreo espera una respuesta afirmativa y tiene tono de reprensión. En español, «¿No has…?» conserva esa fuerza de manera natural sin añadir énfasis no documentado.
- source_word: שָׁמַעְתָּ
  english_pob_choice: heard
  chosen_spanish: oído
  alternatives_spanish:
  - escuchado
  - llegado a saber
  lexicon: HALOT
  rationale: El verbo שׁמע aquí se refiere a recibir conocimiento previo. «Oído» es el equivalente más directo y mantiene el paralelismo con la pregunta retórica.
- source_word: לְמֵרָחוֹק
  english_pob_choice: Long ago
  chosen_spanish: desde hace mucho
  alternatives_spanish:
  - desde antiguo
  - desde lejos
  lexicon: HALOT
  rationale: Aunque literalmente puede expresar distancia espacial, en este contexto es temporal. «Desde hace mucho» comunica bien la antigüedad del acto divino en español actual.
- source_word: עָשִׂיתִי
  english_pob_choice: I made
  chosen_spanish: lo hice
  alternatives_spanish:
  - lo realicé
  - lo llevé a cabo
  lexicon: HALOT
  rationale: El objeto pronominal femenino se refiere al plan o evento en cuestión. «Lo hice» conserva la concreción verbal de עשה sin sobreexplicar.
- source_word: מִימֵי קֶדֶם
  english_pob_choice: from days of old
  chosen_spanish: desde los días de antaño
  alternatives_spanish:
  - desde los días antiguos
  - desde tiempos de antaño
  lexicon: HALOT
  rationale: La expresión temporal de antigüedad se vuelve más idiomática en español con «desde los días de antaño», que mantiene el tono elevado del profeta.
- source_word: וִיצַרְתִּיהָ
  english_pob_choice: I formed it
  chosen_spanish: lo formé
  alternatives_spanish:
  - lo modelé
  - lo hice surgir
  lexicon: HALOT
  rationale: יצר sugiere dar forma con intención. «Lo formé» preserva tanto la imagen artesanal como la idea de diseño deliberado.
- source_word: הֲבֵאתִיהָ
  english_pob_choice: I have brought it to pass
  chosen_spanish: lo he hecho acontecer
  alternatives_spanish:
  - lo he traído a cumplimiento
  - lo he hecho realidad
  lexicon: HALOT
  rationale: El hifil de בוא aquí expresa llevar algo a realización histórica. «He hecho acontecer» comunica causación y cumplimiento sin perder el matiz de evento realizado.
- source_word: לְהַשְׁאוֹת
  english_pob_choice: lay waste
  chosen_spanish: se conviertan en
  alternatives_spanish:
  - lleguen a ser
  - queden hechas
  lexicon: HALOT
  rationale: En la cláusula resultativa, el hebreo no necesita suplir un sujeto agente en español. «Se conviertan en» refleja el resultado de ruina sin forzar el verbo a una paráfrasis interpretativa.
- source_word: גַּלִּים
  english_pob_choice: heaps of ruins
  chosen_spanish: montones de ruinas
  alternatives_spanish:
  - montones de escombros
  - ruinas amontonadas
  lexicon: HALOT
  rationale: El sustantivo designa montones o pilas; en contexto bélico, el resultado son ruinas. «Montones de ruinas» conserva la imagen sin añadir elementos ajenos.
- source_word: נִצִּים
  english_pob_choice: into
  chosen_spanish: en
  alternatives_spanish:
  - como
  - a
  lexicon: HALOT
  rationale: La secuencia hebrea es difícil y el inglés la suaviza con una relación de resultado. En español, «en montones de ruinas» expresa la transformación resultante de manera sobria y natural.
- source_word: עָרִים בְּצֻרוֹת
  english_pob_choice: fortified cities
  chosen_spanish: las ciudades fortificadas
  alternatives_spanish:
  - ciudades amuralladas
  - ciudades defendidas
  lexicon: HALOT
  rationale: La expresión fija se traduce de manera estándar con «ciudades fortificadas», manteniendo el valor militar y defensivo del hebreo.
theological_decisions:
- issue: Soberanía divina sobre las conquistas de Asiria
  english_pob_reading: The verse states that the Assyrian king's destructive success occurred only because God had planned it long ago and now brought it about.
  chosen_spanish_reading: El versículo afirma que la ruina de las ciudades fortificadas ocurrió porque Dios la había determinado desde antiguo y ahora la llevó a efecto.
  alternative_spanish_readings:
  - El versículo solo diría que Dios lo previó de antemano.
  - El versículo podría interpretarse como mera अनुमति/permisión divina.
  rationale: La secuencia «lo hice… lo formé… lo he hecho acontecer» va más allá de simple presciencia. La traducción mantiene la tensión teológica de una acción divina real en la historia, sin añadir explicación filosófica ni suavizar el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del inglés POB que ajustó la última cláusula para reflejar mejor la relación resultativa del hebreo, evitando suplir innecesariamente un sujeto agente explícito en la frase final.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» según el criterio general del proyecto para el nombre divino, pero en este versículo no aparece el tetragrámaton explícito.
  - Se eligió «hecho acontecer» para reflejar el valor causativo de הֲבֵאתִיהָ sin caer en una paráfrasis excesiva.
  - La nota al pie conserva la dificultad lexical de גַּלִּים / נִצִּים / עָרִים בְּצֻרוֹת, siguiendo el audit trail inglés y sin resolver artificialmente la ambigüedad.
