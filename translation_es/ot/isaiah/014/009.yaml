  to: El Seol desde abajo se agita por ti, para salir a tu encuentro cuando llegas; despierta por ti a las sombras[a], a todos los jefes[b] de la tierra; hace levantar de sus tronos a todos los reyes de las naciones.
  rationale: Ajusté «Sheol» a «Seol» para una transliteración natural en español, cambié רְפָאִים a «las sombras[a]» para seguir la decisión principal del inglés POB con alternativas en nota, y afiné לִקְרַאת בּוֹאֶךָ a una expresión española más idiomática y fiel a la imagen de encuentro. Mantuve «jefes» y el resto de la estructura porque conservan adecuadamente el sentido fuente.
  reviewer_model: gpt-5.4
