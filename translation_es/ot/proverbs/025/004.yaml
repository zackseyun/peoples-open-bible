    rationale: La nota inglesa registra la alternativa «for the silversmith». La nota española actual introduce una explicación distinta sobre «escoria» y no refleja la decisión auditada relevante para צֹרֵף.
  revised_spanish_text: Quita la escoria de la plata, y sale una vasija para el refinador[a].
  revised_footnotes:
