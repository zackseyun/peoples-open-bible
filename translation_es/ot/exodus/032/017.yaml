translation:
  language: es
  text: 'Cuando Josué oyó el sonido del pueblo en su griterío[a], dijo a Moisés: «Se oye sonido de guerra en el campamento».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras gritaba» / «como gritaba». La expresión hebrea se refiere al clamor o a los gritos ruidosos del pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: heard
  chosen_spanish: oyó
  alternatives_spanish:
  - escuchó
  lexicon: HALOT
  rationale: En este relato narrativo, שׁמע expresa percepción auditiva simple. «Oyó» comunica de forma natural y directa ese valor sin añadir matices de atención deliberada que «escuchó» podría sugerir en algunos contextos.
- source_word: יְהוֹשֻׁעַ
  english_pob_choice: Joshua
  chosen_spanish: Josué
  alternatives_spanish:
  - Josue
  lexicon: Convención bíblica española estándar
  rationale: Se conserva el nombre propio en su forma española habitual y reconocible en contexto bíblico.
- source_word: קוֹל
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - ruido
  lexicon: HALOT
  rationale: Aquí קוֹל no introduce habla articulada sino una percepción audible del clamor del pueblo. «Sonido» mantiene la amplitud semántica del hebreo y funciona bien con la construcción repetida del versículo.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: עָם se refiere colectivamente al pueblo de Israel; «el pueblo» es la equivalencia más directa y sobria.
- source_word: בְּרֵעֹה
  english_pob_choice: as they shouted
  chosen_spanish: mientras gritaba
  alternatives_spanish:
  - en su griterío
  - como gritaba
  lexicon: HALOT
  rationale: La forma hebrea expresa el clamor/griterío del pueblo. En español, «mientras gritaba» conserva el valor aspectual de acción simultánea y el carácter ruidoso del término, sin forzar una literalidad extraña. El sufijo singular se entiende como concordancia con el sustantivo colectivo «el pueblo».
- source_word: וַיֹּאמֶר אֶל־מֹשֶׁה
  english_pob_choice: he said to Moses
  chosen_spanish: dijo a Moisés
  alternatives_spanish:
  - le dijo a Moisés
  lexicon: HALOT
  rationale: La fórmula narrativa se traduce de modo directo y natural. Se omite el pronombre explícito por economía estilística, ya que el sujeto sigue claro por el contexto.
- source_word: קוֹל מִלְחָמָה
  english_pob_choice: the sound of war
  chosen_spanish: sonido de guerra
  alternatives_spanish:
  - ruido de guerra
  - sonido de batalla
  lexicon: HALOT
  rationale: La construcción constructa se mantiene en español como «sonido de guerra», preservando la relación nominal del hebreo. «Guerra» refleja mejor מִלְחָמָה que «batalla».
- source_word: בַּמַּחֲנֶה
  english_pob_choice: in the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - en el campamento militar
  - dentro del campamento
  lexicon: HALOT
  rationale: מַחֲנֶה designa el campamento de Israel; «campamento» es claro y natural en español, y evita una posible ambigüedad moderna de «campamento» no bélico mediante el contexto inmediato.
translation_notes:
  revision_awareness: 'El inglés POB pasó de «in their shouting» a «as they shouted» para ganar naturalidad sin perder el sentido. Esta versión española sigue esa misma decisión: conserva el valor de acción simultánea y el matiz de clamor del hebreo בְּרֵעֹה, evitando una traducción rígida como «en su griterío» en el texto principal, pero ofreciéndola en nota como alternativa válida.'
  spanish_consistency_notes:
  - Se mantiene «Josué» y «Moisés» como formas bíblicas españolas estándar.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - «Sonido» se usa de forma consistente para קוֹל en ambas ocurrencias.
  - «Campamento» traduce מַחֲנֶה de manera uniforme y transparente.
  - La nota al pie preserva la tensión semántica entre «gritar», «griterío» y el valor colectivo del hebreo.
