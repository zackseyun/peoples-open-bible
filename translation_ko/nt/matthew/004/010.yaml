  text: 그때 예수께서 그에게 말씀하셨습니다. 「물러가라, 사탄아. 기록되어 있다. 『너의 하나님 야훼께 절하고, 오직 그분만을 섬기라』 하였다.」
  philosophy: optimal-equivalence
