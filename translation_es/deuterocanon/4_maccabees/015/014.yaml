translation:
  language: es
  text: Al ver a cada uno torturado[a] y quemado, la madre no cambió a causa de su piedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno por uno, siendo puestos en el potro y quemados». El participio griego de «torturado» puede referirse de manera más específica a la tortura en el potro.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθʼ ἓν
  english_pob_choice: each one
  chosen_spanish: uno por uno
  alternatives_spanish:
  - cada uno
  - individualmente
  lexicon: LSJ
  rationale: El giro distributivo indica sucesión y referencia a cada hijo tomado por separado. «Uno por uno» es natural en español y conserva esa idea sin añadir explicaciones.
- source_word: στρεβλούμενον
  english_pob_choice: being tortured
  chosen_spanish: eran torturados
  alternatives_spanish:
  - eran puestos en el potro
  - eran desgarrados bajo tortura
  lexicon: LSJ
  rationale: El verbo puede aludir más específicamente al potro de tortura, pero en español «torturados» comunica el sentido básico con claridad. Se mantiene la posible especificidad mediante la nota textual.
- source_word: φλεγόμενον
  english_pob_choice: burned
  chosen_spanish: quemados
  alternatives_spanish:
  - ardiendo
  - consumidos por el fuego
  lexicon: LSJ
  rationale: El participio expresa estar ardiendo o ser quemado. «Quemados» reproduce bien la imagen violenta y se enlaza de forma natural con el participio anterior.
- source_word: ὁρῶσα
  english_pob_choice: As she watched
  chosen_spanish: Al ver
  alternatives_spanish:
  - mientras veía
  - viendo
  lexicon: LSJ
  rationale: La forma participial es circunstancial y temporal. «Al ver» conserva la simultaneidad del acto de mirar y suena natural en español.
- source_word: μήτηρ
  english_pob_choice: the mother
  chosen_spanish: la madre
  alternatives_spanish:
  - su madre
  - la madre de ellos
  lexicon: LSJ
  rationale: El griego dice simplemente «la madre». En contexto se entiende que es la madre de los hermanos; «la madre» permanece cerca del original.
- source_word: οὐ μετεβάλετο
  english_pob_choice: did not change
  chosen_spanish: no cambió
  alternatives_spanish:
  - no vaciló
  - no se desvió
  lexicon: LSJ
  rationale: El verbo significa cambiar o alterarse. En el contexto se refiere a la firmeza de la madre; «no cambió» conserva la cercanía formal y deja que el contexto exprese la constancia.
- source_word: διὰ τὴν εὐσέβειαν
  english_pob_choice: because of her piety
  chosen_spanish: por su piedad
  alternatives_spanish:
  - por su devoción reverente
  - por su reverencia a Dios
  lexicon: LSJ
  rationale: En 4 Macabeos, εὐσέβεια es una virtud clave de fidelidad reverente a Dios. «Piedad» preserva el registro moral-teológico tradicional sin reducirlo a mera religiosidad. Se evita «devoción» porque en español puede sonar demasiado interpretativo; «por su piedad» es breve y fiel.
theological_decisions:
- issue: εὐσέβεια como virtud central de fidelidad a Dios en 4 Macabeos
  english_pob_reading: piety
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción reverente
  - reverencia a Dios
  rationale: El texto no describe una emoción, sino la firmeza devota con que la madre soporta el martirio. «Piedad» conserva ese vocabulario de virtud y evita suavizar el énfasis ético del libro.
  doctrine_reference: Translation philosophy §5 (consistency of key terms) and §6 (readable modern Spanish, preserving theological weight)
translation_notes:
  revision_awareness: El texto español sigue de cerca la última revisión inglesa al unir la cláusula final sin pausa interna equivalente a una coma innecesaria; también conserva la alternativa léxica de στρεβλούμενον mediante una nota, como hizo el aparato inglés.
  spanish_consistency_notes:
  - Se usa «piedad» para εὐσέβεια, en coherencia con la preferencia terminológica del proyecto para este valor de virtud.
  - Se mantiene el sujeto singular «la madre» y el predicado en negativo directo «no cambió», evitando añadir interpretaciones no presentes en el griego.
  - La nota[a] se ancla en «torturados» para reflejar la alternativa específica del término griego sin sobrecargar el cuerpo principal.
