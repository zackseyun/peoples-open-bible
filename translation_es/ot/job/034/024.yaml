    issue: «sin investigación» es poco natural en español bíblico general
    rationale: Aunque es comprensible y cercano al inglés auditado, en español suena administrativo o forense. «sin indagar[a]» comunica mejor que no hace falta pesquisa prolongada antes de actuar.
  - severity: low
    issue: «despedaza» puede sonar excesivamente corporal
    rationale: El hebreo expresa ruina/quebrantamiento decisivo de los poderosos, no necesariamente desmembramiento literal. «Destroza» conserva la fuerza sin introducir una imagen demasiado física.
  revised_spanish_text: Él destroza a los poderosos sin indagar[a], y pone a otros en su lugar.
