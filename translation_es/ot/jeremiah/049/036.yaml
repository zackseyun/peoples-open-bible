review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: juicio contra Elam, imagen de los cuatro vientos, dispersión total y alcance universal. Sin embargo, dos decisiones conviene ajustar para mayor fidelidad al rastro POB y al hebreo: 1) נִדְּחֵי se documentó en inglés como ''outcasts'', con alternativas ''dispersed/banished''; en español principal ''dispersos'' reduce la fuerza de ''expulsados/echados fuera'' y además repite la idea de esparcir del verbo anterior; 2) la nota [b] está anclada en ''vientos'', pero su contenido explica una alternativa para ''נִדְּחֵי עֵילָם'', por lo que el anclaje es incorrecto.'
  spanish_quality_summary: El español es claro y natural, con buen tono bíblico moderno. 'Traeré contra Elam' y 'los cuatro vientos' funcionan bien. 'Adonde no lleguen' es entendible, pero 'a la que no vayan' sigue más de cerca el movimiento del original y la revisión inglesa. La principal reparación necesaria es reubicar la nota [b] y fortalecer 'los dispersos' a una opción más fiel como 'los desterrados'.
  glossary_alignment: 'No hay conflicto con los términos base del proyecto. ''רוּחוֹת'' como ''vientos'' está bien resuelto. El punto léxico clave es נִדְּחֵי: dado el audit trail, ''desterrados'' encaja mejor que ''dispersos'' como texto principal, dejando ''dispersos'' como alternativa de nota.'
  issues:
  - severity: high
    issue: La nota [b] está colocada sobre 'vientos', pero su contenido corresponde a 'נִדְּחֵי עֵילָם'.
    rationale: La nota explica alternativas para 'outcasts of Elam', no para 'all these winds'. Tal como está, induce a error y rompe la correspondencia entre texto y nota exigida por el proyecto.
  - severity: medium
    issue: '''los dispersos de Elam'' debilita la fuerza léxica principal documentada para נִדְּחֵי.'
    rationale: El audit trail inglés eligió 'outcasts' como principal y dejó 'dispersed/banished' como alternativas. En español, 'desterrados' o 'expulsados' preserva mejor la idea de personas echadas fuera, mientras 'dispersos' solo repite la idea de dispersión ya expresada por 'los esparciré'.
  - severity: low
    issue: '''adonde no lleguen'' es aceptable, pero ''a la que no vayan'' representa más directamente el verbo ''ir/venir'' del hebreo y la precisión de la revisión inglesa.'
    rationale: No es un error grave, pero una formulación con 'vayan' evita el leve cambio de imagen que introduce 'lleguen'.
  revised_spanish_text: Traeré contra Elam los cuatro vientos de los cuatro extremos de los cielos[a], y los esparciré a todos estos vientos. No habrá nación a la que no vayan los desterrados[b] de Elam.
  revised_footnotes:
