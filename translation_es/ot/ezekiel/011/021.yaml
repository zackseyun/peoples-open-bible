revisions:
- from: Pero en cuanto a aquellos cuyo corazón va tras[a] sus cosas detestables y sus abominaciones, he puesto su camino sobre su propia cabeza[b] —declara el Señor Yahvé.
  to: Pero en cuanto a aquellos cuyo corazón va tras sus cosas detestables[b] y sus abominaciones[a], he hecho recaer su camino sobre su propia cabeza, declara el Señor Yahvé.
  rationale: Se reubica la nota [b] en la expresión correcta («sus cosas detestables») para cumplir la disciplina de anclaje de notas. Además, se cambia «he puesto» por «he hecho recaer» para expresar de manera más natural en español la idea idiomática hebrea de retribución que vuelve sobre la propia cabeza, sin perder cercanía al texto fuente. Se conserva «Señor Yahvé» conforme a la política del proyecto sobre el nombre divino.
