translation:
  language: es
  text: Un testigo falso perecerá[a], pero un hombre que escucha hablará para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hablará continuamente» o «hablará con efecto duradero». La expresión hebrea traducida «para siempre» probablemente enfatiza validez duradera más que duración infinita abstracta.
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵד כְּזָבִים
  english_pob_choice: false witness
  chosen_spanish: testigo falso
  alternatives_spanish:
  - testigo de mentiras
  - testigo mentiroso
  lexicon: HALOT
  rationale: עֵד es un testigo en sentido forense, y כְּזָבִים califica la falsedad de su testimonio. En español, "testigo falso" es la equivalencia natural y conserva la fuerza legal del hebreo mejor que una construcción más literal pero menos idiomática.
- source_word: יֹאבֵד
  english_pob_choice: will perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - será destruido
  - desaparecerá
  lexicon: HALOT
  rationale: אבד expresa perderse, perecer o ser destruido. "Perecerá" es conciso y fiel al valor proverbial de ruina/fracaso sin especificar el modo exacto.
- source_word: וְאִישׁ
  english_pob_choice: but a man
  chosen_spanish: pero un hombre
  alternatives_spanish:
  - pero una persona
  - pero alguien
  lexicon: HALOT
  rationale: La conjunción introduce contraste. אִישׁ es masculino singular; "hombre" conserva el paralelismo y la forma proverbial representativa, sin neutralizar innecesariamente el término.
- source_word: שֹׁמֵעַ
  english_pob_choice: who listens
  chosen_spanish: que escucha
  alternatives_spanish:
  - que oye
  - que atiende
  - que escucha con atención
  lexicon: HALOT
  rationale: שׁמע puede significar oír, escuchar o atender. Aquí el contraste con el falso testimonio favorece la idea de alguien que escucha con discernimiento antes de hablar; "que escucha" es natural en español y preserva esa matización.
- source_word: לָנֶצַח
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - continuamente
  - de manera duradera
  - con efecto permanente
  lexicon: HALOT
  rationale: נֶצַח puede indicar duración, permanencia o validez duradera. En este proverbio, el sentido más probable es la permanencia/validez duradera del habla del que escucha; "para siempre" conserva la brevedad proverbial, mientras la nota explica la posible fuerza de "duraderamente".
- source_word: יְדַבֵּר
  english_pob_choice: will speak
  chosen_spanish: hablará
  alternatives_spanish:
  - seguirá hablando
  - podrá hablar
  lexicon: HALOT
  rationale: דבר en piʿel significa hablar. "Hablará" mantiene el futuro simple del hebreo y deja que לָנֶצַח aporte la idea de duración o permanencia del hablar.
theological_decisions:
- issue: El alcance de לָנֶצַח en el proverbio
  english_pob_reading: '''forever'' likely emphasizes lasting validity rather than abstract endless duration.'
  chosen_spanish_reading: '''para siempre'' probablemente enfatiza permanencia o validez duradera, no tanto duración infinita abstracta.'
  alternative_spanish_readings:
  - '''continuamente'''
  - '''con efecto duradero'''
  - '''de manera permanente'''
  rationale: El hebreo no exige una afirmación metafísica de infinitud; el contraste sapiencial apunta a la perdurabilidad o fiabilidad del discurso del que escucha. La traducción principal conserva la forma tradicional, y la nota aclara el matiz semántico.
  doctrine_reference: Sabiduría proverbial; semántica de נצח
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo masorético y conserva la lectura ya aprobada del audit trail en inglés. No se introdujeron cambios de contenido respecto a la revisión más reciente, y se mantuvo el matiz de לָנֶצַח como duración/validez duradera más que eternidad abstracta.
  spanish_consistency_notes:
  - Se mantuvo 'testigo' por la equivalencia forense ya documentada en el POB inglés.
  - Se evitó 'Cristo/SEÑOR' porque no hay términos divinos ni cristológicos en el verso.
  - La estructura antitética se preservó con 'pero' para reflejar el contraste del hebreo.
  - '''Para siempre'' se usa como forma breve y publicable, apoyada por la nota explicativa sobre el matiz de נצח.'
