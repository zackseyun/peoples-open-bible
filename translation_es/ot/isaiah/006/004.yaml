revisions:
- from: Las bases de los umbrales[a] se estremecieron al sonido del que clamaba[b], y la casa fue llena de humo.
  to: Las bases de los umbrales[a] se estremecieron al sonido del que clamaba, y la casa[b] se llenó de humo.
  rationale: Se ajusta la redacción para un español más natural y eclesialmente legible («se llenó de humo»), sin perder fidelidad al hebreo. Se añade la nota sobre «la casa» / «el templo» para reflejar una alternativa significativa preservada en el audit trail inglés. Se mantiene «clamaba» en el texto principal como una representación digna y fiel del participio substantivado.
