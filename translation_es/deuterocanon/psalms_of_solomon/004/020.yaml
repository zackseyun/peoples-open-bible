translation:
  language: es
  text: Que su vejez esté en la soledad de la falta de hijos[a], para ser quitado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la soledad de la esterilidad de hijos». El griego puede expresar el estado de quedar sin descendencia en un sentido de desolación doméstica.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para remoción» o «hacia ser llevado/quitado». La frase griega conserva la idea básica de ser removido, probablemente en la muerte, sin expresar explícitamente un matiz temporal.
    reason: alternative_reading
lexical_decisions:
- source_word: μονίᾳ
  english_pob_choice: solitude
  chosen_spanish: soledad
  alternatives_spanish:
  - solitud
  - aislamiento
  lexicon: LSJ
  rationale: μονίᾳ expresa un estado de estar solo o apartado. En español, «soledad» comunica con naturalidad ese estado de desamparo o aislamiento sin forzar un tecnicismo poco idiomático como «solitud».
- source_word: ἀτεκνίας
  english_pob_choice: childlessness
  chosen_spanish: falta de hijos
  alternatives_spanish:
  - esterilidad
  - infructuosidad
  lexicon: LSJ
  rationale: El término nombra específicamente la condición de no tener hijos. «Falta de hijos» mantiene esa referencia concreta y evita que «esterilidad» sugiera más de lo que el griego dice en este contexto doméstico y judicial.
- source_word: γῆρας
  english_pob_choice: old age
  chosen_spanish: vejez
  alternatives_spanish:
  - ancianidad
  - edad avanzada
  lexicon: LSJ
  rationale: γῆρας se refiere a la etapa de la vida marcada por la vejez. «Vejez» es el equivalente español más directo y claro.
- source_word: εἰς ἀνάλημψιν
  english_pob_choice: for removal
  chosen_spanish: para remoción
  alternatives_spanish:
  - hasta ser llevado
  - para ser quitado
  - para ser tomado
  lexicon: LSJ
  rationale: ἀνάλημψις denota un tomar arriba o una remoción. El español «remoción» conserva la literalidad de la idea de retirada o quitamiento sin introducir explícitamente una temporalidad que el griego no formula de manera directa.
- source_word: '[implicit imprecatory force]'
  english_pob_choice: May his old age be
  chosen_spanish: Que su vejez esté
  alternatives_spanish:
  - Que su vejez sea
  - Sea su vejez
  lexicon: LSJ
  rationale: El griego carece de verbo explícito, pero el contexto es una cadena de imprecaciones. «Que ... esté» reproduce en español el valor optativo/imprecatorio sin convertir el verso en una mera descripción neutra.
theological_decisions:
- issue: Naturaleza imprecatoria del verso sin verbo explícito
  english_pob_reading: 'Render it as an imprecatory wish: ''May his old age be...'''
  chosen_spanish_reading: 'Traducirlo como un deseo imprecatorio: «Que su vejez esté...»'
  alternative_spanish_readings:
  - Convertirlo en una oración descriptiva sin valor de deseo
  - Usar un futuro o indicativo neutro
  rationale: El contexto inmediato consiste en peticiones de juicio. Por eso conviene preservar la fuerza de maldición o deseo judicial, en lugar de suavizarla como una simple observación.
  doctrine_reference: Preservar la fuerza retórica y teológica del texto fuente sin atenuar la tensión imprecatoria.
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que prefirió una forma más literal para εἰς ἀνάλημψιν («for removal») y sustituyó «loneliness» por «solitude». En español se mantuvo la literalidad de la remoción con «para remoción» y se eligió «soledad» como equivalente natural y formal de μονίᾳ, conservando también la referencia específica a la carencia de hijos.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología de estilo litúrgico ajena al texto, porque aquí no aparecen sustituciones reverenciales del nombre divino.
  - Se prefirió «falta de hijos» frente a «esterilidad» para no ampliar el sentido más allá de la condición concreta expresada por ἀτεκνίας.
  - La sintaxis mantiene el carácter breve y sentencioso del griego.
  - «Remoción» es deliberadamente literal; en español suena algo abstracta, pero refleja mejor el valor básico de ἀνάλημψις sin añadir una interpretación temporal explícita.
