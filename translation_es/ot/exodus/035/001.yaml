translation:
  language: es
  text: 'Entonces Moisés reunió a toda la congregación de los hijos de Israel[a] y les dijo: «Estas son las cosas[b] que Yahvé ha mandado que se hagan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «los hijos de Israel», designación pactual para el pueblo de Israel; la expresión se refiere a toda la comunidad, no solo a varones.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «palabras» / «asuntos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּקְהֵל
  english_pob_choice: assembled
  chosen_spanish: reunió
  alternatives_spanish:
  - convocó
  - juntó
  lexicon: HALOT
  rationale: El hifil de קהל indica hacer que el pueblo se congregue como cuerpo reunido. En español, «reunió» transmite bien la acción de juntar formalmente a la asamblea sin sonar artificial.
- source_word: כָּל עֲדַת
  english_pob_choice: all the congregation
  chosen_spanish: toda la congregación
  alternatives_spanish:
  - toda la comunidad
  - toda la asamblea
  lexicon: HALOT
  rationale: עֵדָה designa la comunidad reunida de Israel. «Congregación» conserva el sentido corporativo y cultual mejor que «comunidad», y «toda» refleja כָּל.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos/descendientes de Israel
  lexicon: HALOT
  rationale: Se mantiene la forma masculina plural del hebreo como «los hijos de Israel», siguiendo la decisión del POB inglés de conservar la precisión morfológica y la referencia pactual al pueblo entero.
- source_word: אֵלֶּה הַדְּבָרִים
  english_pob_choice: These are the things
  chosen_spanish: Estas son las cosas
  alternatives_spanish:
  - Estas son las palabras
  - Estas son los asuntos
  lexicon: HALOT
  rationale: דְּבָרִים puede significar «palabras», «cosas» o «asuntos». Aquí introduce mandatos concretos, por lo que «cosas» reproduce la amplitud práctica que el POB inglés resolvió con «things».
- source_word: צִוָּה יְהוָה
  english_pob_choice: Yahweh has commanded
  chosen_spanish: Yahvé ha mandado
  alternatives_spanish:
  - Yahvé ha ordenado
  - Yahvé ha comandado
  lexicon: HALOT
  rationale: El nombre divino se vierte «Yahvé» según la terminología del proyecto. El verbo צוה expresa mandato autoritativo; «ha mandado» es natural en español y mantiene el peso normativo.
- source_word: לַעֲשֹׂת אֹתָם
  english_pob_choice: to be done
  chosen_spanish: hacer
  alternatives_spanish:
  - ser hechos
  - cumplir
  lexicon: HALOT
  rationale: La construcción expresa acciones que deben ejecutarse. En español, la cláusula final queda más idiomática como «ha mandado hacer», sin perder la fuerza de obligación implícita.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton y el proyecto pide transliterarlo como «Yahvé». Se evita la sustitución litúrgica «SEÑOR» para preservar el nombre pactual revelado a Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de בְּנֵי יִשְׂרָאֵל como designación pactual
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos/descendientes de Israel
  rationale: La forma hebrea es masculina plural y, como en el POB inglés, se conserva la precisión gramatical sin reducirla a una neutralización moderna. En contexto designa a todo el pueblo del pacto, no a varones solamente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: Se revisó el audit trail inglés y no se requieren cambios por la pasada de revisión más reciente; la solución mantiene la decisión del nombre divino como Yahvé/Yahweh, conserva la precisión de «hijos de Israel» y refleja la amplitud semántica de דְּבָרִים con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en el texto principal conforme al estándar del proyecto.
  - «Congregación» se usa para עֵדָה por su valor corporativo y pactual.
  - La puntuación española coloca dos puntos antes de la cita directa.
  - Las alternativas de la nota [b] preservan la ambigüedad semántica de דְּבָרִים sin sobreexplicar el texto.
