revisions:
- from: Y extenderé sobre Jerusalén el cordel de Samaria y la plomada de la casa de Ahab[a], y borraré a Jerusalén, así como se borra un plato[b], borrándolo y volteándolo boca abajo.
  to: Y extenderé sobre Jerusalén el cordel de Samaria y la plomada de la casa de Acab[a], y limpiaré a Jerusalén como se limpia un plato[b], limpiándolo y volteándolo boca abajo.
  rationale: Se reemplaza «borrar» por «limpiar» para preservar la imagen física del hebreo y producir un español idiomático en el símil del plato; se ajusta «Ahab» a «Acab» por legibilidad y uso estándar en español bíblico; y se actualizan las notas para concordar con la revisión.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:52:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del hebreo y conserva la imaginería de medición para juicio y de limpiar/voltear un recipiente. Sin embargo, «borraré a Jerusalén» y «se borra un plato» no son naturales en español para este símil concreto y debilitan la correspondencia léxica explicada en el expediente, donde la idea es «wiping» más que «blotting out». También conviene ajustar «Ahab» a la forma española estándar «Acab» para legibilidad eclesial amplia, ya que no hay una razón fuente-lingüística para mantener la transliteración inglesa.
  spanish_quality_summary: La redacción general es clara, pero «borrar un plato» suena impropio y poco idiomático. «Limpiar» preserva mejor la imagen concreta en español, especialmente porque luego sigue «boca abajo». «Tenderé» o «extenderé» son posibles; «extenderé» es aceptable. El conjunto gana naturalidad con «limpiaré Jerusalén como se limpia un plato».
  glossary_alignment: No hay términos del glosario principal directamente implicados salvo nombres propios. El borrador se aparta innecesariamente de la forma española habitual «Acab». La decisión de mantener «casa» es correcta y fiel al hebreo dinástico. Las notas léxicas deben actualizarse para concordar con la revisión.
  issues:
  - severity: medium
    issue: Uso de «borraré» / «se borra un plato»
    rationale: Aunque מָחָה puede significar borrar o borrar por completo en otros contextos, aquí el símil del plato exige en español un verbo de limpieza física. «Borrar un plato» no es idiomático y oscurece la imagen concreta preservada por el inglés POB y el hebreo.
  - severity: medium
    issue: Forma propia «Ahab» en vez de «Acab»
    rationale: Para una Biblia en español de lectura eclesial amplia, «Acab» es la forma establecida y plenamente reconocible. Mantener «Ahab» parece calco de inglés/transliteración, no una exigencia de fidelidad a la fuente.
  - severity: low
    issue: Nota a con transliteración no adaptada
    rationale: 'La nota debe concordar con la forma revisada del nombre y puede expresarse con más naturalidad en español: «con el mismo criterio» o «con la misma medida».'
  revised_spanish_text: Y extenderé sobre Jerusalén el cordel de Samaria y la plomada de la casa de Acab[a], y limpiaré a Jerusalén como se limpia un plato[b], limpiándolo y volteándolo boca abajo.
  revised_footnotes:
