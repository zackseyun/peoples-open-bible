revisions:
- from: Así murió Saúl por su infidelidad con que fue infiel a Yahvé[a], por la palabra de Yahvé, que no guardó, y también porque consultó a un médium[b], para inquirir.
  to: Así murió Saúl por su infidelidad, pues fue infiel a Yahvé[a], por la palabra de Yahvé, que no guardó, y también porque consultó a una médium[b], para consultar.
  rationale: 'Se hicieron ajustes menores para mejorar la naturalidad del español sin perder la fuerza del hebreo ni las decisiones del POB: se suavizó la construcción cognada de מעל, se feminizó «médium» por el contexto narrativo conocido y se reemplazó «inquirir» por «consultar» para un español más claro y eclesialmente legible.'
