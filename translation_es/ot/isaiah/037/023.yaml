review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura retórica hebrea y conserva los elementos clave: doble acusación verbal, levantar la voz, elevar los ojos, y el título fijo «el Santo de Israel». También mantiene correctamente la fuerza adversativa de אֶל como «Contra» en el cierre. Sin embargo, «elevado tus ojos en lo alto» suena poco natural en español y no refleja tan bien el modismo hebreo como una formulación más idiomática. Además, la nota literal actual no corresponde exactamente a la redacción usada en el texto.'
  spanish_quality_summary: El texto es en general claro y fiel, pero «has reprochado» es menos idiomático en español bíblico corriente que «has injuriado» o «has vituperado»; aun así puede tolerarse por cercanía al audit trail inglés. El problema principal de calidad es «elevado tus ojos en lo alto», que resulta forzado. «Has levantado tus ojos en alto» o «has alzado tus ojos a lo alto» es más natural y digno. La nota a debe ajustarse para reflejar una alternativa real al término elegido, y la nota b debe alinearse con la nueva formulación.
  glossary_alignment: No hay conflicto con la glosaría del proyecto. «blasfemado» preserva bien גדף, «el Santo de Israel» es correcto para קְדוֹשׁ יִשְׂרָאֵל, y no aparecen términos sensibles como Yahvé, Mesías o δοῦλος. La diferenciación entre los dos verbos de afrenta se conserva adecuadamente.
  issues:
  - severity: medium
    issue: 'Frase poco natural: «elevado tus ojos en lo alto»'
    rationale: Aunque intenta seguir de cerca la imagen hebrea, en español suena forzado. El hebreo expresa altivez mediante un modismo; en español conviene una formulación más idiomática que preserve la imagen sin calco rígido.
  - severity: low
    issue: La nota b no queda perfectamente alineada con la redacción del texto
    rationale: La nota explica literalmente «has levantado tus ojos a la altura», mientras el texto dice «elevado tus ojos en lo alto». Conviene armonizar texto y nota para mayor coherencia.
  - severity: low
    issue: La nota a ofrece una alternativa válida, pero más débilmente conectada con la elección principal
    rationale: Si el texto mantiene «reprochado», la alternativa «vituperado» está bien, pero sería mejor presentarla como alternativa léxica a la afrenta verbal sin crear sensación de sinonimia exacta exhaustiva.
  revised_spanish_text: ¿A quién has reprochado y blasfemado? ¿Contra quién has alzado tu voz y has levantado tus ojos en alto? Contra el Santo de Israel[a][b].
  revised_footnotes:
  - marker: a
    text: O «vituperado».
    reason: lexical_alternative
  - marker: b
    text: Lit. «has levantado tus ojos a la altura», un modismo que expresa altivez.
    reason: cultural_note
  revision_rationale: Se conserva la fidelidad al hebreo y al audit trail inglés, pero se reemplaza «elevado tus ojos en lo alto» por «has levantado tus ojos en alto», que suena más natural en español y mantiene mejor la imagen idiomática de altivez. Se mantienen las notas con marcadores correctos y coherentes con el texto revisado.
