translation:
  language: es
  text: Y toda la tierra lloraba a gran voz, y todo el pueblo iba pasando. El rey también pasó el valle de Cedrón[b], y todo el pueblo iba pasando por el camino hacia el desierto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «por el camino del desierto».'
    reason: lexical_alternative
  - marker: b
    text: 'Cedrón: tradicionalmente «el torrente Cedrón». נחל puede referirse a un valle, barranco, uadi o curso de agua estacional.'
    reason: cultural_note
lexical_decisions:
- source_word: כָל הָאָרֶץ
  english_pob_choice: all the land
  chosen_spanish: toda la tierra
  alternatives_spanish:
  - todo el país
  - toda la región
  - toda la gente de la tierra
  lexicon: HALOT
  rationale: En este contexto, אָרֶץ funciona como colectivo del territorio y de quienes están en él; 'tierra' conserva el alcance idiomático del hebreo sin reducirlo solo a un grupo de personas.
- source_word: בּוֹכִים קוֹל גָּדוֹל
  english_pob_choice: was weeping with a loud voice
  chosen_spanish: lloraba con fuerte voz
  alternatives_spanish:
  - lloraba en voz alta
  - clamaba con fuerte voz
  - lloraba con gran clamor
  lexicon: HALOT
  rationale: El hebreo usa el participio plural con sujeto colectivo y la expresión literal 'voz grande'. En español, 'lloraba con fuerte voz' preserva la imagen auditiva de lamentación sin sonar forzado.
- source_word: כָל הָעָם
  english_pob_choice: all the people
  chosen_spanish: todo el pueblo
  alternatives_spanish:
  - toda la gente
  - todo el pueblo reunido
  - todos los presentes
  lexicon: HALOT
  rationale: עָם aquí designa al grupo que acompaña al rey; 'pueblo' mantiene el sentido colectivo amplio y encaja bien en el registro narrativo bíblico.
- source_word: עֹבְרִים / עֹבֵר
  english_pob_choice: were crossing over / crossed over
  chosen_spanish: iba pasando / pasó
  alternatives_spanish:
  - cruzaba / cruzó
  - iba cruzando / cruzó
  - iba pasando al otro lado / pasó al otro lado
  lexicon: HALOT
  rationale: עָבַר expresa el movimiento de atravesar o pasar al otro lado. 'Pasar' es natural en español y conserva el verbo base; se mantiene el contraste aspectual entre la acción continuada del pueblo y el paso puntual del rey.
- source_word: בְּנַחַל קִדְרוֹן
  english_pob_choice: the Kidron Valley
  chosen_spanish: el valle de Cedrón
  alternatives_spanish:
  - el torrente de Cedrón
  - el arroyo Cedrón
  - el uadi Cedrón
  lexicon: HALOT
  rationale: נחל puede ser valle, barranco, cauce o arroyo estacional. El POB inglés eligió una forma topográfica clara; en español, 'valle de Cedrón' es comprensible y tradicionalmente reconocible, sin ocultar el valor de נחל como accidente geográfico.
- source_word: עַל פְּנֵי דֶרֶךְ אֶת הַמִּדְבָּר
  english_pob_choice: on the road toward the wilderness
  chosen_spanish: por el camino hacia el desierto
  alternatives_spanish:
  - por el camino del desierto
  - por la ruta hacia el desierto
  - por el camino del desierto
  lexicon: HALOT
  rationale: La construcción hebrea es compacta y orientada al trayecto. 'Por el camino hacia el desierto' comunica bien el sentido de dirección sin sobrecargar la frase; 'desierto' traduce הַמִּדְבָּר con naturalidad bíblica en español.
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el audit trail inglés; no se aplicaron revisiones textuales adicionales. Se mantuvo la progresión narrativa del hebreo: lamento colectivo, avance del pueblo, paso del rey por Cedrón y continuación por el camino hacia el desierto.'
  spanish_consistency_notes:
  - Se prefirió 'tierra' para אָרֶץ y 'pueblo' para עָם, manteniendo el paralelismo del hebreo.
  - Se conservó 'pasar' para עָבַר de manera consistente en ambas ocurrencias, ajustando solo el aspecto verbal por fluidez española.
  - '''Desierto'' se usa como equivalente bíblico estándar de הַמִּדְבָּר; no se expandió a ''región desértica'' porque el hebreo es suficientemente directo.'
  - La nota sobre Cedrón preserva la tensión terminológica entre 'valle', 'torrente', 'arroyo' y 'uadi' sin imponer una sola opción como exclusiva.
