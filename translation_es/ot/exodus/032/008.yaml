translation:
  language: es
  text: 'Se han apartado rápidamente del camino que yo les mandé. Se han hecho para sí mismos una imagen fundida de un becerro, y se han postrado ante él y le han ofrecido sacrificios, y han dicho: «Estos son tus dioses, Israel[a], que te hicieron subir de la tierra de Egipto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este es tu dios, Israel». El hebreo dice literalmente «Estos son tus dioses», aunque en el contexto el referente es un solo becerro.'
    reason: alternative_reading
lexical_decisions:
- source_word: סָרוּ
  english_pob_choice: have turned aside
  chosen_spanish: se han apartado
  alternatives_spanish:
  - se han desviado
  - se han vuelto aparte
  lexicon: HALOT
  rationale: El verbo expresa apartarse de un camino o norma. «Se han apartado» mantiene la imagen de desviación respecto del camino mandado.
- source_word: מַהֵר
  english_pob_choice: quickly
  chosen_spanish: rápidamente
  alternatives_spanish:
  - pronto
  - de inmediato
  lexicon: HALOT
  rationale: Adverbio de rapidez; «rápidamente» suena natural en español y conserva la urgencia del alejamiento.
- source_word: הַדֶּרֶךְ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la ruta
  lexicon: HALOT
  rationale: En español «camino» comunica bien la metáfora bíblica de la conducta obediente y resulta claro sin perder el valor moral de la imagen.
- source_word: צִוִּיתִם
  english_pob_choice: I commanded them
  chosen_spanish: yo les mandé
  alternatives_spanish:
  - yo les ordené
  - yo les di mandamiento
  lexicon: HALOT
  rationale: «Mandé» reproduce de forma directa el acto de dar una orden. En este contexto suena más natural que una formulación más pesada, sin perder el contenido.
- source_word: עָשׂוּ לָהֶם
  english_pob_choice: have made for themselves
  chosen_spanish: se han hecho para sí
  alternatives_spanish:
  - se han fabricado
  - han hecho para sí mismos
  lexicon: HALOT
  rationale: 'La preposición reflexiva tiene fuerza significativa: el ídolo es procurado para su propio uso. «Se han hecho para sí» preserva ese matiz reflexivo.'
- source_word: עֵגֶל מַסֵּכָה
  english_pob_choice: a cast image of a calf
  chosen_spanish: una imagen fundida de un becerro
  alternatives_spanish:
  - un becerro fundido
  - una imagen vaciada de un becerro
  lexicon: HALOT
  rationale: «Imagen fundida» refleja mejor que «becerro fundido» la idea de un ídolo moldeado/vertido en metal, tal como señala el audit trail inglés. Se mantiene «becerro» para la forma concreta del ídolo.
- source_word: וַיִּשְׁתַּחֲווּ לוֹ
  english_pob_choice: have bowed down to it
  chosen_spanish: se han postrado ante él
  alternatives_spanish:
  - se han inclinado ante él
  - lo han adorado
  lexicon: HALOT
  rationale: El verbo denota postración corporal. «Se han postrado ante él» preserva el gesto físico sin colapsarlo en la categoría general de «adorar».
- source_word: וַיִּזְבְּחוּ לוֹ
  english_pob_choice: sacrificed to it
  chosen_spanish: le han ofrecido sacrificios
  alternatives_spanish:
  - le han sacrificado
  - han sacrificado ante él
  lexicon: HALOT
  rationale: «Ofrecido sacrificios» expresa con claridad el acto cultual sin sonar demasiado técnico. Conserva la relación directa con el ídolo.
- source_word: אֵלֶּה אֱלֹהֶיךָ
  english_pob_choice: These are your gods
  chosen_spanish: Estos son tus dioses
  alternatives_spanish:
  - Este es tu dios
  - Estos son tus ídolos
  lexicon: HALOT
  rationale: Se conserva el plural explícito del hebreo («Estos... dioses») tal como lo preserva la POB inglesa, aunque el referente narrativo sea un solo becerro. La forma singular queda como alternativa tensionada en nota implícita por el texto principal.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - oh Israel
  - pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene el vocativo directo sin añadir partículas ajenas al hebreo.
- source_word: הֶעֱלוּךָ
  english_pob_choice: who brought you up
  chosen_spanish: que te hicieron subir
  alternatives_spanish:
  - que te sacaron
  - que te levantaron
  lexicon: HALOT
  rationale: «Hicieron subir» conserva el verbo hebreo de עלה y su resonancia con el éxodo, tal como decide la POB inglesa.
- source_word: מֵאֶרֶץ מִצְרַיִם
  english_pob_choice: from the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - de la tierra de Egipto
  - fuera de la tierra de Egipto
  lexicon: HALOT
  rationale: «Tierra de Egipto» reproduce de manera directa la expresión geográfica del hebreo y deja que el verbo «hicieron subir» lleve la idea de salida.
theological_decisions:
- issue: Número de אֱלֹהֶיךָ en la aclamación idolátrica
  english_pob_reading: 'Render the phrase as plural: ''These are your gods, Israel'''
  chosen_spanish_reading: 'Mantener el plural: «Estos son tus dioses, Israel»'
  alternative_spanish_readings:
  - «Este es tu dios, Israel»
  rationale: El hebreo es formalmente plural y la POB inglesa preserva esa tensión en el texto principal. Aunque el contexto narra un solo becerro, el plural debe permanecer visible; la singularización se reserva como lectura alternativa.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión textual en vez de resolverla'
- issue: Traducción del gesto cultual וַיִּשְׁתַּחֲווּ
  english_pob_reading: Translate as 'bowed down to it' rather than 'worshiped it'
  chosen_spanish_reading: Traducir como «se han postrado ante él» y no como «lo han adorado»
  alternative_spanish_readings:
  - lo han adorado
  - se han arrodillado ante él
  rationale: 'El hebreo describe ante todo una acción corporal de postración. «Postrarse» conserva la secuencia narrativa de actos: postración, sacrificio y habla idolátrica.'
  doctrine_reference: 'Translation philosophy §1: primacía del original sobre la tradición de traducción'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del contexto inglés, que ajustó la frase de un simple 'cast calf' a 'cast image of a calf'. Por eso se eligió «imagen fundida de un becerro» en vez de una formulación más plana, y se conservó el plural de la aclamación idolátrica tal como lo mantiene la POB inglesa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino en español del proyecto, pero este versículo no lo contiene.
  - Se mantuvo «dioses» en plural por fidelidad formal al hebreo; no se normalizó a singular en el texto principal.
  - «Se han postrado» conserva el gesto físico que el audit trail inglés quiso distinguir de un mero «adorar».
  - «Hicieron subir» mantiene el eco del verbo hebreo de ascenso, coherente con la terminología del éxodo.
