translation:
  language: es
  text: ¿Quién es como Yahvé nuestro Dios[a], que está sentado en lo alto[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «¿Quién es como Yahvé nuestro Dios...?»; el nombre divino יהוה se conserva aquí como «Yahvé».'
    reason: alternative_reading
  - marker: b
    text: 'Más literalmente: «que se ha hecho alto para sentarse»; expresa la idea de exaltación o entronización de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es
  - ¿Quién hay
  lexicon: HALOT
  rationale: El interrogativo introduce una pregunta retórica de incomparabilidad; «¿Quién» conserva la concisión y la fuerza del hebreo sin añadir elementos innecesarios.
- source_word: כַּ/יהוָה
  english_pob_choice: is like Yahweh
  chosen_spanish: como Yahvé
  alternatives_spanish:
  - como el SEÑOR
  - como Yahvé nuestro Dios
  lexicon: HALOT
  rationale: La preposición comparativa כ pide «como». Se mantiene «Yahvé» según la norma española del proyecto para el nombre divino, sin ocultarlo con un título.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios y Yahvé
  - nuestro Dios
  lexicon: HALOT
  rationale: El sufijo de 1.ª persona plural se expresa naturalmente como posesivo; queda en aposición con el nombre divino, como en el hebreo.
- source_word: הַמַּגְבִּיהִי
  english_pob_choice: who is seated on high
  chosen_spanish: que está sentado en las alturas
  alternatives_spanish:
  - que se ha exaltado para sentarse
  - que está entronizado en lo alto
  - que se sienta en lo alto
  lexicon: HALOT
  rationale: El participio causativo comunica elevación/exaltación; en español, «está sentado en las alturas» conserva la imagen de entronización con registro natural y formal.
- source_word: לָשָׁבֶת
  english_pob_choice: sits
  chosen_spanish: está sentado
  alternatives_spanish:
  - se sienta
  - para sentarse
  - habita
  lexicon: HALOT
  rationale: Aunque la forma hebrea puede sugerir «sentarse/dwelling», el contexto de entronización apoya una traducción resultativa. «Está sentado» mantiene la referencia al estado exaltado sin forzar el infinitivo.
theological_decisions:
- issue: Representación del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo contiene el Tetragrámaton; la línea doctrinal del proyecto en español usa «Yahvé» para preservar el nombre pactual y evitar la sustitución por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen de exaltación y entronización
  english_pob_reading: who is seated on high
  chosen_spanish_reading: que está sentado en las alturas
  alternative_spanish_readings:
  - que está entronizado en lo alto
  - que se ha exaltado para sentarse
  rationale: La construcción hebrea no describe solo altura espacial, sino la postura real de gobierno/exaltación. «Sentado en las alturas» preserva esa tensión entre ubicación elevada y entronización.
  doctrine_reference: HALOT, גבה + לָשָׁבֶת; revisión inglesa final de PSA.113.5
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «who sits on high» a «who is seated on high» para reflejar mejor el participio y un registro más formal. La redacción española sigue esa revisión con «está sentado en las alturas», conservando el valor resultativo/entronizado sin volver a una fórmula demasiado literal o arcaica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma del nombre divino en todo el texto.
  - «Nuestro Dios» reproduce el posesivo plural del hebreo y queda en aposición natural con el nombre divino.
  - «Las alturas» traduce el valor de lo alto/exaltado de manera idiomática en español, sin borrar la imagen de entronización.
