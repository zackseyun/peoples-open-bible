translation:
  language: es
  text: 'Los servidores del templo[a]: los hijos de Ziha, los hijos de Hasufa[b], los hijos de Tabbaot.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo נְתִינִים, término técnico tradicionalmente transliterado «netinim»; aquí se traduce por su función como clase dedicada al servicio del templo.
