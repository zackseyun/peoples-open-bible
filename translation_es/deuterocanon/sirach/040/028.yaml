    issue: Las notas al pie no preservan el contenido clave del expediente inglés.
    rationale: La nota [a] del inglés explica el hebreo difícil מכי מתן y la dependencia del griego para el sentido 'beggar'; la nota [b] explica que נאסף significa literalmente 'ser reunido', un modismo para morir. El borrador reutiliza [a] para el vocativo griego y [b] para 'vida de mendigo', omitiendo la nota sobre 'morir'.
  - severity: low
