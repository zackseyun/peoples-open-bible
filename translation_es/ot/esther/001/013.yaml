translation:
  language: es
  text: Entonces el rey dijo a los sabios que conocían los tiempos[a]—porque así era la costumbre del rey ante todos los que conocían la ley y la justicia[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que entendían los tiempos», es decir, hombres expertos en discernir la ocasión o el procedimiento apropiados.
    reason: lexical_alternative
  - marker: b
    text: O «porque así era el asunto/costumbre del rey ante todos los que conocían la ley y el juicio». El hebreo es algo comprimido.
    reason: alternative_reading
lexical_decisions:
- source_word: לַחֲכָמִים
  english_pob_choice: to the wise men
  chosen_spanish: a los sabios
  alternatives_spanish:
  - a los hombres sabios
  - a los consejeros
  lexicon: HALOT
  rationale: חֲכָמִים designa literalmente a personas sabias. En el contexto cortesano puede referirse a consejeros instruidos, pero «sabios» conserva el valor léxico sin precisar más oficio del que el hebreo exige.
- source_word: יֹדְעֵי הָעִתִּים
  english_pob_choice: who knew the times
  chosen_spanish: que conocían los tiempos
  alternatives_spanish:
  - que entendían los tiempos
  - que conocían las ocasiones oportunas
  lexicon: HALOT
  rationale: El participio expresa conocimiento/discernimiento de los «tiempos» u ocasiones. «Conocían los tiempos» mantiene la imagen hebrea y permite la lectura de habilidad para distinguir la ocasión o el procedimiento adecuado.
- source_word: כִּי כֵן דְּבַר הַמֶּלֶךְ
  english_pob_choice: for this was the king’s custom
  chosen_spanish: porque así era la costumbre del rey
  alternatives_spanish:
  - porque tal era el asunto del rey
  - porque así era el procedimiento del rey
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra», «asunto» o «materia», pero aquí la cláusula explica una práctica habitual. «Costumbre» recoge de modo natural ese sentido idiomático sin borrar la literalidad de fondo.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - en presencia de
  lexicon: HALOT
  rationale: לִפְנֵי significa «delante de / en presencia de». «Ante» es natural en español y conserva la relación de comparecencia o audiencia.
- source_word: כָּל יֹדְעֵי דָּת וָדִין
  english_pob_choice: all who knew law and justice
  chosen_spanish: todos los que conocían la ley y el juicio
  alternatives_spanish:
  - todos los que conocían la ley y la justicia
  - todos los que conocían decreto y juicio
  lexicon: HALOT
  rationale: דָּת en Ester se usa para «ley» o decreto; דִּין es «juicio» en sentido jurídico. Mantener «ley y juicio» conserva la distinción léxica y el trasfondo administrativo, sin homogeneizarlo en una sola palabra.
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración. «Entonces» ofrece una secuencia natural en español y preserva el movimiento narrativo del hebreo.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo WLC y toma como guía la auditoría inglesa de POB, pero ajusta el núcleo lexical al español: mantiene la ambigüedad de יֹדְעֵי הָעִתִּים en una nota, y refleja la concisión de כִּי כֵן דְּבַר הַמֶּלֶךְ con una cláusula idiomática en español sin borrar el matiz de «asunto/costumbre».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se conservó «ley y juicio» para reflejar la pareja jurídica del hebreo, evitando sustituirla sin necesidad por formulaciones más interpretativas.
  - La puntuación con guiones largos refleja el inciso explicativo del hebreo y la solución auditada en inglés.
