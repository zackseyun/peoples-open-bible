    issue: 'Expresión poco natural: «la cabeza de una ciudad»'
    rationale: Aunque רֹאשׁ es literalmente «cabeza», en español esta metáfora aplicada a una ciudad suena forzada. «El jefe de una ciudad» preserva el sentido de autoridad y mejora la legibilidad sin apartarse del hebreo ni del razonamiento del POB.
  revised_spanish_text: Como el juez[a] de un pueblo, así son sus oficiales; y como el jefe de una ciudad, así son sus habitantes.
  revised_footnotes:
