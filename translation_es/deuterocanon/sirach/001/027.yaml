translation:
  language: es
  text: Escúchenme[a], ustedes que temen a Dios, y presten oído y atención a mis palabras. ¿Quién desea heredarla, una herencia eterna y gran alegría?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El fragmento hebreo conservado para este lugar está marcado como un desajuste mayor y contiene un dicho distinto; aquí se sigue la lectura hebrea atestiguada en el expediente POB para este registro, no la línea griega canónica de Sirácida 1:27.
    reason: textual_variant
lexical_decisions:
- source_word: μὴ ἀπειθήσῃς
  english_pob_choice: Do not disobey
  chosen_spanish: No desobedezcas
  alternatives_spanish:
  - No seas desobediente
  - No rehúses obedecer
  lexicon: BDAG
  rationale: ἀπειθέω expresa la idea de desobedecer o rehusar obedecer. En español, «desobedezcas» conserva bien la fuerza prohibitiva y suena natural en un registro bíblico actual.
- source_word: φόβῳ Κυρίου
  english_pob_choice: the fear of the Lord
  chosen_spanish: al temor de Yahvé
  alternatives_spanish:
  - al temor del Señor
  - a la reverencia de Yahvé
  lexicon: LSJ
  rationale: La expresión sapiencial se rinde de forma bastante literal como «temor de Yahvé». Se usa «Yahvé» según la terminología del proyecto para יהוה, y «temor» mantiene la densidad religiosa y moral del hebreo/greco-bíblico sin suavizarla a mera reverencia.
- source_word: προσέλθῃς αὐτῷ
  english_pob_choice: come to him
  chosen_spanish: te acerques a él
  alternatives_spanish:
  - vayas a él
  - te presentes ante él
  lexicon: BDAG
  rationale: προσέρχομαι significa acercarse o venir a. «Te acerques a él» preserva la imagen espacial y encaja con el paralelismo de advertencia sapiencial.
- source_word: ἐν καρδίᾳ δισσῇ
  english_pob_choice: with a divided heart
  chosen_spanish: con un corazón dividido
  alternatives_spanish:
  - con un doble corazón
  - con un corazón duplicado
  lexicon: LSJ
  rationale: δισσός indica algo doble o dividido. «Corazón dividido» comunica en español el sentido moral de duplicidad interior de manera clara y fiel; «doble corazón» es más literal, pero menos idiomático.
theological_decisions:
- issue: Cómo rendir el nombre divino en la expresión φόβῳ Κυρίου
  english_pob_reading: the fear of the Lord
  chosen_spanish_reading: el temor de Yahvé
  alternative_spanish_readings:
  - el temor del Señor
  - el temor de Dios
  rationale: Aunque el griego usa Κύριος, el proyecto traduce el nombre divino como «Yahvé». En una expresión sapiencial fija como esta, conservar el nombre evita el enmascaramiento devocional y mantiene la referencia divina explícita.
  doctrine_reference: 'PHILOSOPHY.md: traducir el nombre divino de forma transparente en vez de ocultarlo con un título sustitutivo'
- issue: Sentido moral de καρδία δισσὴ
  english_pob_reading: with a divided heart
  chosen_spanish_reading: con un corazón dividido
  alternative_spanish_readings:
  - con un doble corazón
  - con un corazón de dos lealtades
  rationale: La frase apunta a duplicidad o lealtad partida, no solo a una descripción psicológica. «Corazón dividido» preserva esa tensión ética y espiritual sin perder la naturalidad en español.
  doctrine_reference: Sabiduría bíblica sobre integridad interior y lealtad indivisa a Dios
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota sin anclaje textual. La traducción ahora corresponde al pasaje griego de Sirácides 1:27 y no introduce marcas de nota no presentes en el texto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma transparente para el nombre divino.
  - Se prefirió «desobedezcas» para conservar la fuerza prohibitiva de ἀπειθήσῃς.
  - «Corazón dividido» se eligió por claridad idiomática sin perder la idea de duplicidad interior.
  - No se añadieron notas al pie porque no había una lectura alternativa que requiriera anclaje explícito en este verso.
