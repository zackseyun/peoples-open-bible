translation:
  language: es
  text: Deléitate en Yahvé[a], y él te concederá los anhelos de tu corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las peticiones de tu corazón». El sustantivo hebreo puede referirse tanto a lo que se pide como a lo que se desea interiormente.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִתְעַנַּג
  english_pob_choice: Delight yourself
  chosen_spanish: Deléitate
  alternatives_spanish:
  - Date deleite
  - Encuentra deleite
  lexicon: HALOT
  rationale: El hitpael imperativo es reflexivo. En español, «deléitate» expresa con naturalidad la idea de tomar placer o gozo en alguien, sin perder el matiz exhortativo y reflexivo del hebreo.
- source_word: עַל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - upon
  lexicon: HALOT
  rationale: Aunque la preposición básica puede ser «sobre/en», en español «deléitate en Yahvé» reproduce la relación idiomática de confianza y deleite personal con mayor naturalidad que una calca literal.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino del tetragrámaton como «Yahvé», de acuerdo con la terminología del proyecto y sin sustituirlo por un título.
- source_word: יִתֶּן
  english_pob_choice: he will give
  chosen_spanish: él te concederá
  alternatives_spanish:
  - él dará
  - te dará
  lexicon: HALOT
  rationale: El imperfecto con valor de resultado/predicción se vierte naturalmente en futuro. «Concederá» comunica con dignidad la acción de dar de parte de Dios y armoniza con el tono sapiencial del versículo.
- source_word: מִשְׁאֲלוֹת
  english_pob_choice: the desires
  chosen_spanish: los anhelos
  alternatives_spanish:
  - las peticiones
  - los deseos
  lexicon: HALOT
  rationale: El sustantivo puede referirse a peticiones pedidas o a deseos internos. En este contexto poético, «anhelos» recoge mejor la fuerza interior del término sin reducirlo solo a solicitudes verbales.
- source_word: לִבֶּךָ
  english_pob_choice: your heart
  chosen_spanish: de tu corazón
  alternatives_spanish:
  - de tu mente
  - de tu interior
  lexicon: HALOT
  rationale: «Corazón» mantiene la antropología hebrea del centro interior de deseo y voluntad. No se amplía en el texto principal porque la expresión española es clara y fiel.
theological_decisions:
- issue: Posible lectura de prosperidad o de promesa condicionada
  english_pob_reading: Render the statement straightforwardly as a covenantal/wisdom promise without adding interpretive qualifiers.
  chosen_spanish_reading: Se traduce la promesa de forma directa, sin añadir calificadores como «piadosos» ni reinterpretaciones que suavicen el alcance del enunciado.
  alternative_spanish_readings:
  - «Deléitate en Yahvé, y él te dará los deseos que convienen a tu corazón»
  - «...y él moldeará y cumplirá tus deseos»
  rationale: El hebreo presenta la promesa de manera llana. La traducción debe preservar esa tensión, evitando insertar una explicación teológica que el versículo no explicita.
  doctrine_reference: Translation philosophy items 1 and 3
- issue: Nombre divino en el texto
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: El versículo usa directamente el tetragrámaton. Se traduce con «Yahvé» para mantener el nombre de pacto y la coherencia terminológica del proyecto.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el texto fuente y con la solución auditada en inglés. La única decisión principal en español fue elegir una formulación natural y reverente («Deléitate», «anhelos») que preserve el valor reflexivo y la ambigüedad léxica de מִשְׁאֲלוֹת sin añadir interpretación.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al estándar del proyecto para יהוה.
  - Se evitó «SEÑOR» para no ocultar el nombre divino.
  - «Deléitate en» conserva la relación idiomática del hebreo con עַל.
  - «Anhelos» preserva la doble posibilidad entre deseos internos y peticiones explícitas.
  - «Corazón» se mantuvo sin expansión explicativa para respetar la antropología hebrea del versículo.
