base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/024/017.yaml
  text: Then David said to Yahweh[a], when he saw the angel striking the people, “Behold, I have sinned, and I have done wrong[b]; but these sheep—what have they done? Please let your hand be against me and against my father's house.”
  footnotes:
