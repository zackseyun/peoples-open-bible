translation:
  language: es
  text: ¡Oh, mujer única que diste a luz la piedad en toda su plenitud[a][b]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mujer única» o «mujer sola». El griego subraya que ella se destaca de manera singular entre las mujeres en esta muestra de devoción.
    reason: lexical_alternative
  - marker: b
    text: O «devoción». El griego εὐσέβεια es un término clave en 4 Macabeos para la fidelidad devota hacia Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὦ
  english_pob_choice: O
  chosen_spanish: ¡Oh!
  alternatives_spanish:
  - ¡O!
  lexicon: LSJ
  rationale: Es una interjección vocativa elevada; en español, «¡Oh!» conserva mejor el tono retórico y solemne que una formulación más coloquial.
- source_word: μόνη
  english_pob_choice: only
  chosen_spanish: única
  alternatives_spanish:
  - sola
  - única y sola
  lexicon: LSJ
  rationale: El griego destaca la singularidad de la mujer; «única» expresa bien esa fuerza sin sonar antinatural en español. «Sola» podría sugerir soledad física más que exclusividad.
- source_word: γύναι
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - mujer, esposa
  - señora
  lexicon: LSJ
  rationale: Es vocativo singular de γυνή. Aquí es un apelativo directo a la madre, no a una esposa; «mujer» es el equivalente más fiel y natural.
- source_word: τὴν εὐσέβειαν
  english_pob_choice: godliness
  chosen_spanish: la piedad
  alternatives_spanish:
  - la devoción
  - la reverencia a Dios
  lexicon: LSJ
  rationale: En 4 Macabeos εὐσέβεια remite a fidelidad devota hacia Dios. «Piedad» mantiene el término tradicional en español y puede abarcar ese sentido religioso sin perder dignidad.
- source_word: ὁλόκληρον
  english_pob_choice: in its fullness
  chosen_spanish: en toda su plenitud
  alternatives_spanish:
  - completa
  - enteramente
  lexicon: LSJ
  rationale: El adjetivo subraya integridad y totalidad. «En toda su plenitud» preserva la idea de totalidad íntegra y suena más natural que un calco rígido.
- source_word: ἀποκυήσασα
  english_pob_choice: gave birth to
  chosen_spanish: engendraste
  alternatives_spanish:
  - diste a luz a
  - pariste
  lexicon: LSJ
  rationale: El participio aoristo conserva la imagen materna de dar a luz/engendrar. «Engendraste» permite un español digno y metafórico, manteniendo el vigor retórico del original.
theological_decisions:
- issue: Mantener la metáfora de nacimiento aplicada a la virtud religiosa
  english_pob_reading: 'Retain the childbirth metaphor literally: ''gave birth to godliness in its fullness'''
  chosen_spanish_reading: 'Mantener la metáfora de parto: «engendraste la piedad en toda su plenitud»'
  alternative_spanish_readings:
  - diste a luz la piedad en toda su plenitud
  - produjiste la piedad en toda su plenitud
  rationale: El griego usa lenguaje explícito de parto. Conservar la imagen evita suavizar la fuerza retórica y la manera en que 4 Macabeos presenta la virtud devota como algo ‘nacido’ por medio del testimonio materno.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Elección de εὐσέβεια como término de devoción hacia Dios
  english_pob_reading: Or 'piety.' The Greek εὐσέβεια is a key term in 4 Maccabees for devout fidelity toward God.
  chosen_spanish_reading: «piedad» como término principal, con el matiz de devoción fiel a Dios
  alternative_spanish_readings:
  - devoción
  - reverencia
  rationale: «Piedad» es el término más sobrio y reconocible en español eclesial; sin embargo, en la nota se preserva que el sentido no es mera religiosidad genérica, sino fidelidad devota hacia Dios.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: La revisión inglesa reciente afinó «complete godliness» a «godliness in its fullness» para sonar más natural sin perder ὁλόκληρον. La versión española adopta un equivalente igualmente natural, «en toda su plenitud», y conserva la metáfora materna de ἀποκυήσασα.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el nombre divino, pero en este verso no hay referencia explícita al Tetragrámaton.
  - Se evita «Cristo» porque el pasaje no contiene Χριστός ni lenguaje mesiánico directo.
  - «Piedad» se usa aquí por la carga tradicional en español, pero se aclara en nota que el término griego apunta a devoción fiel hacia Dios.
