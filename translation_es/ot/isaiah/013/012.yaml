translation:
  language: es
  text: Haré al mortal más escaso que el oro fino[a], y al ser humano que el oro de Ofir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Haré al hombre más precioso que el oro fino». El verbo hebreo también puede enfatizar el valor o el carácter precioso; en este contexto, probablemente implica una escasez extrema.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אוֹקִיר
  english_pob_choice: I will make rarer
  chosen_spanish: Haré más escasos
  alternatives_spanish:
  - Haré más preciosos
  - Estimaré
  lexicon: HALOT
  rationale: El verbo hifil de יקר puede expresar hacer valioso o preciado, pero en este contexto de juicio la comparación con el oro comunica el resultado concreto de escasez. «Más escasos» conserva la fuerza comparativa en español y suena natural.
- source_word: אֱנוֹשׁ
  english_pob_choice: mortal man
  chosen_spanish: los mortales
  alternatives_spanish:
  - el hombre mortal
  - un mortal
  lexicon: HALOT
  rationale: אֱנוֹשׁ destaca la fragilidad y mortalidad humanas. En español, «los mortales» transmite la idea de humanidad frágil sin perder el matiz de condición mortal; se ajusta bien al paralelismo poético.
- source_word: מִפָּז
  english_pob_choice: than fine gold
  chosen_spanish: que el oro fino
  alternatives_spanish:
  - que el oro puro
  - que el oro refinado
  lexicon: HALOT
  rationale: פָּז se refiere a oro de gran pureza o calidad. «Oro fino» es una equivalencia idiomática clara en español y preserva el valor excepcional del término.
- source_word: וְאָדָם
  english_pob_choice: and mankind
  chosen_spanish: y a la humanidad
  alternatives_spanish:
  - y al hombre
  - y a los seres humanos
  lexicon: HALOT
  rationale: אָדָם funciona aquí de forma genérica y colectiva, en paralelo con אֱנוֹשׁ. «La humanidad» expresa ese sentido colectivo de manera natural en español y evita reducirlo a un individuo masculino.
- source_word: מִכֶּתֶם אוֹפִיר
  english_pob_choice: than the gold of Ophir
  chosen_spanish: que el oro de Ofir
  alternatives_spanish:
  - que el oro puro de Ofir
  - que el fino oro de Ofir
  lexicon: HALOT
  rationale: כֶּתֶם designa oro precioso; «oro de Ofir» conserva la referencia geográfica y la fama de calidad del metal. La repetición de «que» mantiene el paralelismo comparativo del hebreo.
theological_decisions:
- issue: Paralelismo entre אֱנוֹשׁ y אָדָם como humanidad sometida a juicio
  english_pob_reading: mortal man ... mankind
  chosen_spanish_reading: los mortales ... la humanidad
  alternative_spanish_readings:
  - el hombre ... la humanidad
  - la gente ... los seres humanos
  rationale: El hebreo acumula dos términos humanos en paralelismo poético para subrayar la extrema escasez de personas bajo juicio. «Los mortales» y «la humanidad» conservan el contraste entre fragilidad individual y sentido colectivo sin borrar la tensión semántica.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for אָדָם; Translation philosophy §4'
- issue: Valor versus escasez en אוֹקִיר
  english_pob_reading: I will make rarer
  chosen_spanish_reading: Haré más escasos
  alternative_spanish_readings:
  - Haré más preciosos
  - Los consideraré más valiosos
  rationale: El verbo puede sugerir hacer precioso o valioso, pero el contexto de juicio hace que la escasez sea la implicación práctica. «Haré más escasos» comunica ese resultado sin borrar el posible trasfondo de valor; la nota conserva la alternativa semántica.
  doctrine_reference: HALOT; English POB lexical note a
translation_notes:
  revision_awareness: 'La redacción sigue el pase final sin cambios sustantivos del audit trail inglés (latest_revision_pass: unchanged; cross-check high_agreement). Se conserva la lectura de juicio con matiz de escasez, junto con la alternativa semántica de valor/preciosidad en nota.'
  spanish_consistency_notes:
  - Se mantuvo «Ofir» como topónimo transliterado estándar en español.
  - Se evitó «SEÑOR» o lenguaje eclesiástico añadido porque el versículo no contiene el nombre divino.
  - La comparación se formuló con «que» para reflejar el paralelo hebreo y la relación comparativa repetida.
  - «Los mortales» y «la humanidad» conservan el doble paralelismo humano sin forzar una sola palabra genérica.
