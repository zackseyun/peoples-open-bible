revisions:
- from: Porque a los hijos de Neftalí[a] les tocó la sexta suerte, para los hijos de Neftalí, según sus familias.
  to: Para los hijos de Neftalí[a], salió la sexta suerte, para los hijos de Neftalí según sus clanes.
  rationale: Se elimina «Porque» por no estar en la fuente, se cambia «les tocó» a «salió» para seguir más de cerca יָצָא y la decisión inglesa documentada, y se ajusta «familias» a «clanes» para preservar la precisión tribal de לְמִשְׁפְּחֹתָם. La nota se simplifica para sonar natural en español y conservar la alternativa contextual equivalente.
