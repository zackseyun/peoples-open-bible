  text: so that the heart may melt and the stumbling blocks may be many[a]. At all their gates I have set the flash of the sword. Ah! It is made for lightning[b], drawn for slaughter.
  footnotes:
  - marker: a
    text: Or 'and many may stumble' for 'and the stumbling blocks may be many.' The Hebrew noun can point either to stumbling blocks themselves or to the resulting downfall.
    reason: lexical_alternative
  - marker: b
    text: The Hebrew of the final phrase is difficult. 'Drawn for slaughter' could also be rendered 'sharpened for slaughter' or 'polished for slaughter.'
    reason: lexical_alternative
