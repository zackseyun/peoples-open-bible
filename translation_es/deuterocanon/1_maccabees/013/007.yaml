translation:
  language: es
  text: Y se reavivó el espíritu de su pueblo al oír estas palabras;
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀνεζωπύρισεν
  english_pob_choice: was rekindled
  chosen_spanish: se reavivó
  alternatives_spanish:
  - se reencendió
  - fue reavivado
  - se encendió de nuevo
  lexicon: LSJ
  rationale: El verbo expresa la imagen de volver a avivarse como fuego. En español, «se reavivó» conserva la metáfora de renovar vigor o ánimo sin sonar forzado; «se reencendió» sería más literal, pero menos natural para el efecto anímico del contexto.
- source_word: τὸ πνεῦμα
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el ánimo
  - el valor
  - el espíritu interior
  lexicon: LSJ
  rationale: Se mantiene «espíritu» para preservar la metáfora original y no reducirla a una sola matización psicológica. Aunque el contexto apunta al vigor o resolución del pueblo, el término español mantiene esa amplitud.
- source_word: τοῦ λαοῦ αὐτοῦ
  english_pob_choice: of his people
  chosen_spanish: de su pueblo
  alternatives_spanish:
  - del pueblo
  - de su nación
  lexicon: LSJ
  rationale: La posesión con αὐτοῦ se expresa de manera directa con «su pueblo». Es una forma natural en español y conserva la relación personal del texto griego.
- source_word: ἀκοῦσαι
  english_pob_choice: when they heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyeron
  - al escuchar
  lexicon: LSJ
  rationale: El infinitivo de circunstancia se traduce mejor con una construcción temporal breve y natural. «Al oír» conserva el valor de ocasión del acto de escuchar sin añadir matices innecesarios.
- source_word: τῶν λόγων τούτων
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas palabras dichas
  - estos dichos
  lexicon: LSJ
  rationale: «Palabras» es la equivalencia más directa para λόγοι en este contexto de discurso previo. Se evita «dichos» por sonar más interpretativo y menos natural en español contemporáneo.
theological_decisions:
- issue: ¿Cómo reflejar el “espíritu” del pueblo sin reducirlo a mero estado emocional?
  english_pob_reading: the spirit of his people
  chosen_spanish_reading: el espíritu de su pueblo
  alternative_spanish_readings:
  - el ánimo de su pueblo
  - el valor de su pueblo
  rationale: La fuente griega usa τὸ πνεῦμα, no un término explícito para ‘ánimo’ o ‘valor’. Mantener «espíritu» preserva la tensión entre interioridad, energía y resolución colectiva sin decidir prematuramente por una sola interpretación.
  doctrine_reference: Antropología bíblica / semántica de πνεῦμα
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran un sentido figurado de renovación interior o valentía colectiva. La redacción española conserva la imagen de avivamiento y el complemento temporal de ocasión sin ampliar el contenido del verso.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico, pero con español actual.
  - «Espíritu» se conserva por fidelidad al griego y por consistencia terminológica con el proyecto.
  - La construcción «al oír estas palabras» reproduce de forma natural la función circunstancial del infinitivo griego.
