translation:
  language: es
  text: 'Por tanto[a], esto dice Yahvé: «No descenderás de la cama a la que has subido[b], porque ciertamente morirás». Y Elías se fue.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Así dice Yahvé».'
    reason: lexical_alternative
  - marker: b
    text: O «a la que subiste allí». El hebreo dice literalmente «la cama a la que subiste allí»; la redacción conserva el contraste entre «subir» y «descender».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Por eso
  lexicon: HALOT
  rationale: Expresa bien la consecuencia inferida del contexto anterior y conserva el enlace lógico sin volverlo demasiado interpretativo.
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: this is what Yahweh says
  chosen_spanish: esto dice Yahvé
  alternatives_spanish:
  - así dice Yahvé
  - esto es lo que dice Yahvé
  lexicon: HALOT
  rationale: Mantiene la fórmula profética de mensajero con un español natural; Yahvé sigue la terminología del proyecto para el nombre divino.
- source_word: הַמִּטָּה
  english_pob_choice: the bed
  chosen_spanish: la cama
  alternatives_spanish:
  - la cama del enfermo
  - el lecho
  lexicon: HALOT
  rationale: מִטָּה puede ser cama/lecho; aquí 'cama' es directo y fiel, sin añadir explícitamente 'enfermo', que el hebreo no dice.
- source_word: אֲשֶׁר עָלִיתָ שָּׁם
  english_pob_choice: that you have gone up onto
  chosen_spanish: en la que has subido allí
  alternatives_spanish:
  - que has subido allí
  - en la que subiste allí
  lexicon: HALOT
  rationale: Conserva la idea de ascenso de עלה y el adverbio resumptivo שָּׁם. En español se suaviza con 'en la que' para evitar una construcción forzada, pero se mantiene el contraste con 'descenderás'.
- source_word: לֹא תֵרֵד מִמֶּנָּה
  english_pob_choice: You will not come down from
  chosen_spanish: No descenderás de
  alternatives_spanish:
  - No bajarás de
  - No te bajarás de
  lexicon: HALOT
  rationale: '''Descenderás'' preserva con claridad el contraste vertical con ''subido'' y refleja bien ירד sin perder solemnidad.'
- source_word: כִּי מוֹת תָּמוּת
  english_pob_choice: for you will surely die
  chosen_spanish: porque ciertamente morirás
  alternatives_spanish:
  - pues morirás sin falta
  - porque de cierto morirás
  lexicon: HALOT
  rationale: La combinación de infinitivo absoluto + verbo finito intensifica la certeza; 'ciertamente morirás' comunica esa fuerza de manera natural y digna.
- source_word: וַיֵּלֶךְ אֵלִיָּה
  english_pob_choice: And Elijah went
  chosen_spanish: Y Elías se fue
  alternatives_spanish:
  - Y Elías fue
  - Y Elías partió
  lexicon: HALOT
  rationale: וַיֵּלֶךְ avanza la narración; 'se fue' es una equivalencia natural en español para indicar que Elías se marchó.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; siguiendo el estándar del proyecto, se traduce con el nombre propio 'Yahvé' y no con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fórmula profética כֹּה אָמַר יְהוָה
  english_pob_reading: this is what Yahweh says
  chosen_spanish_reading: esto dice Yahvé
  alternative_spanish_readings:
  - así dice Yahvé
  - esto es lo que dice Yahvé
  rationale: Se conserva el carácter oracular de la fórmula sin recurrir al giro eclesiástico tradicional 'así ha dicho'.
  doctrine_reference: HALOT / fórmula profética estándar
translation_notes:
  revision_awareness: La traducción inglesa auditada fue revisada para evitar una construcción inglesa demasiado literal en la cláusula relativa; en español se refleja esa misma decisión con una sintaxis natural ('en la que has subido allí') sin perder el contraste ascenso/descenso. No se introdujeron cambios doctrinales respecto al nombre divino ni al valor intensivo de 'morirás'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' conforme al estándar del proyecto para יְהוָה.
  - Se prefiere 'descenderás' para conservar el paralelismo vertical con 'has subido'.
  - '''Ciertamente morirás'' refleja el intensivo hebreo sin añadir matices ajenos al texto.'
  - '''Elías'' sigue la forma española usual del nombre profético.'
