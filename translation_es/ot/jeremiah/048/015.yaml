  - marker: b
    text: 'Tradicional: «el SEÑOR de los ejércitos».'
    reason: lexical_alternative
  revision_rationale: 'Se conserva el texto principal casi intacto, pero se corrigen las notas para alinearlas con el rastro de auditoría inglés: [a] ahora preserva la alternativa más literal documentada, y [b] vuelve a ser una nota léxica sobre la formulación tradicional del título divino. Además, ''lo mejor de sus jóvenes'' mejora la naturalidad del español manteniendo el sentido de מִבְחַר. El singular colectivo es aceptable en español para ese grupo selecto.'
