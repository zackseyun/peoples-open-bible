translation:
  language: es
  text: 'Hizo el Lugar Santísimo[a], cuya longitud correspondía al ancho de la casa: veinte codos; y su anchura, veinte codos. Lo recubrió de oro fino, con seiscientos talentos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Santo de los santos».
    reason: lexical_alternative
lexical_decisions:
- source_word: בֵּית קֹדֶשׁ הַקֳּדָשִׁים
  english_pob_choice: the Most Holy Place
  chosen_spanish: el Lugar Santísimo
  alternatives_spanish:
  - la casa del Santo de los santos
  - el Santo de los santos
  lexicon: HALOT
  rationale: El hebreo es un giro constructo idiomático para el santuario interior. En español, «Lugar Santísimo» comunica con naturalidad la función cultual y conserva la fuerza superlativa sin introducir una paráfrasis más larga que no añade contenido.
- source_word: אָרְכּוֹ עַל פְּנֵי רֹחַב הַבַּיִת
  english_pob_choice: its length corresponding to the width of the house
  chosen_spanish: de veinte codos de largo, correspondiente al ancho de la casa
  alternatives_spanish:
  - su largo, frente al ancho de la casa
  - su largo, a la medida del ancho de la casa
  lexicon: HALOT
  rationale: La relación espacial עַל־פְּנֵי admite una lectura de correspondencia/alineación. «Correspondiente al ancho de la casa» evita una traducción demasiado literal y expresa bien la idea arquitectónica sin forzar el español.
- source_word: אַמּוֹת עֶשְׂרִים
  english_pob_choice: twenty cubits
  chosen_spanish: veinte codos
  alternatives_spanish:
  - veinte codos de medida
  - veinte codos de longitud
  lexicon: HALOT
  rationale: Se conserva la medida tradicional «codos» para mantener la especificidad del texto fuente y la precisión histórica. No se convierte a unidades modernas.
- source_word: וְרָחְבּוֹ אַמּוֹת עֶשְׂרִים
  english_pob_choice: and its width twenty cubits
  chosen_spanish: y de veinte codos de ancho
  alternatives_spanish:
  - y su ancho, veinte codos
  - y su anchura, veinte codos
  lexicon: HALOT
  rationale: La formulación española mantiene el paralelismo dimensional del hebreo con una sintaxis natural y clara. «Ancho» es preferible a «anchura» por fluidez en este contexto arquitectónico.
- source_word: וַיְחַפֵּהוּ
  english_pob_choice: and he overlaid it
  chosen_spanish: y lo recubrió
  alternatives_spanish:
  - y lo cubrió
  - y lo forró
  lexicon: HALOT
  rationale: En contextos de construcción del templo, חפה implica recubrir una estructura con un material precioso. «Recubrió» evita el calco y conserva la idea de aplicar oro sobre la superficie.
- source_word: זָהָב טוֹב
  english_pob_choice: fine gold
  chosen_spanish: de oro fino
  alternatives_spanish:
  - de buen oro
  - de oro puro
  lexicon: HALOT
  rationale: «Oro fino» es una equivalencia estable y digna en español para resaltar la calidad del material. «Oro puro» sería más fuerte de lo que el hebreo exige; «buen oro» resulta poco natural.
- source_word: לְכִכָּרִים שֵׁשׁ מֵאוֹת
  english_pob_choice: six hundred talents
  chosen_spanish: seiscientos talentos
  alternatives_spanish:
  - por seiscientos talentos
  - hasta seiscientos talentos
  lexicon: HALOT
  rationale: La preposición ל marca aquí cantidad/totalidad. «Seiscientos talentos» comunica el monto sin añadir una expansión explicativa innecesaria.
theological_decisions:
- issue: Nombre del recinto sagrado interior
  english_pob_reading: the Most Holy Place
  chosen_spanish_reading: el Lugar Santísimo
  alternative_spanish_readings:
  - el Santo de los santos
  - la casa del Santo de los santos
  rationale: No hay una tensión doctrinal, pero sí una decisión terminológica. «Lugar Santísimo» es una designación comprensible y reverente en español, alineada con el valor idiomático del hebreo y sin depender de la fórmula tradicional de traducciones eclesiásticas.
  doctrine_reference: Teología del santuario / terminología del tabernáculo y templo
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que reordenó la frase de longitud para reflejar mejor la sintaxis fuente. En español, se adoptó una estructura igualmente clara: «de veinte codos de largo, correspondiente al ancho de la casa», manteniendo el foco en la medida del largo y la correspondencia espacial. También se siguió la depuración de la versión revisada que eliminó expansiones innecesarias en la referencia al peso del oro.'
  spanish_consistency_notes:
  - Se preserva «codos» como medida tradicional consistente con el texto fuente y con la práctica de la serie.
  - «Lugar Santísimo» mantiene coherencia con el valor idiomático del hebreo y evita sustituirlo por una paraphrasis excesiva.
  - Se usa «oro fino» para reflejar la cualidad del material sin sobretraducir «bueno» como pureza química.
  - La puntuación respeta la estructura coordinada del hebreo con una pausa fuerte antes de la cantidad de oro.
