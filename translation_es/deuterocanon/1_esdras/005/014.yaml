translation:
  language: es
  text: los hijos de Adonikam[a], treinta y siete; los hijos de Bosai, dos mil seiscientos seis; los hijos de Adilion, cuatrocientos cincuenta y cuatro;
  philosophy: optimal-equivalence
  footnotes:
