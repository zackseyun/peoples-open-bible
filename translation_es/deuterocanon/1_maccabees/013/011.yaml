translation:
  language: es
  text: Y Jonatán hijo de Absalón envió con él una fuerza considerable a Joppe[a], y expulsó a los que estaban en ella, y permaneció allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «permaneció allí en ella». La doble localización parece subrayar que se quedó dentro de la ciudad misma.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: Verbo narrativo normal para ἀπέστειλεν; «envió» conserva el movimiento de envío sin sobrecargar el registro.
- source_word: Ἰωνάθαν τὸν τοῦ Ἀψαλώμου
  english_pob_choice: Jonathan son of Absalom
  chosen_spanish: Jonatán hijo de Absalón
  alternatives_spanish:
  - Jonatán, hijo de Absalón
  lexicon: LSJ
  rationale: La construcción griega identifica a Jonatán por filiación; en español, «hijo de Absalón» es claro y natural. Se omite la coma porque la frase funciona como identificador directo.
- source_word: δύναμιν ἱκανὴν
  english_pob_choice: a considerable force
  chosen_spanish: una fuerza considerable
  alternatives_spanish:
  - una fuerza suficiente
  - una fuerza numerosa
  lexicon: LSJ
  rationale: δύναμις aquí es fuerza militar, no poder abstracto; ἱκανήν aporta suficiencia/abundancia. «Fuerza considerable» refleja la magnitud sin introducir precisión no explícita en el griego.
- source_word: εἰς Ἰόππην
  english_pob_choice: to Joppa
  chosen_spanish: a Joppe
  alternatives_spanish:
  - hacia Joppe
  - a Jope
  lexicon: LSJ
  rationale: Se mantiene el topónimo tradicional en español bíblico, «Joppe», y el valor direccional de εἰς con «a».
- source_word: ἐξέβαλεν
  english_pob_choice: drove out
  chosen_spanish: expulsó
  alternatives_spanish:
  - echó fuera
  - arrojó fuera
  lexicon: LSJ
  rationale: En contexto político-militar, ἐξέβαλεν expresa expulsión/expulsar; «expulsó» es preciso y más sobrio que una calca literal.
- source_word: τοὺς ἐν αὐτῇ ὄντας
  english_pob_choice: those who were in it
  chosen_spanish: a los que estaban en ella
  alternatives_spanish:
  - a los que se hallaban en ella
  - a los que vivían allí
  lexicon: LSJ
  rationale: El griego no especifica si eran habitantes permanentes o simplemente presentes; «estaban en ella» preserva esa neutralidad.
- source_word: ἔμεινεν ἐκεῖ ἐν αὐτῇ
  english_pob_choice: remained there
  chosen_spanish: permaneció allí
  alternatives_spanish:
  - se quedó allí
  - permaneció allí en ella
  lexicon: LSJ
  rationale: La doble localización griega es enfática, pero en español una repetición literal («allí en ella») sonaría forzada. «Permaneció allí» conserva el sentido y la fluidez, siguiendo la revisión inglesa que resolvió la redundancia final con «there».
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó el redundante «in it» final al representar la segunda locución locativa; en español se optó por una solución natural («permaneció allí») que conserva el énfasis sin sonar artificiosa. También se mantuvo la fuerza militar de δύναμις como «fuerza considerable» y la especificidad neutral de «los que estaban en ella».
  spanish_consistency_notes:
  - Se conservó el topónimo bíblico «Joppe» como forma española tradicional coherente con un registro bíblico amplio.
  - Se evitó traducir mecánicamente la duplicación locativa griega, pero se señaló en nota para mantener la transparencia textual.
  - No hay decisiones teológicas especiales en este versículo; el principal reto es léxico y estilístico.
