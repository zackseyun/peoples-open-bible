revisions:
- from: 'Entonces dirás a ellos[a]: «Porque sus padres me abandonaron, declara Yahvé, y fueron tras otros dioses, y les sirvieron, y se inclinaron ante ellos; pero a mí me abandonaron[b], y mi ley no guardaron».'
  to: 'Entonces les dirás: «Porque sus padres[a] me abandonaron, declara Yahvé, y fueron tras otros dioses, y les sirvieron, y se postraron ante ellos; pero a mí me abandonaron, y no guardaron mi ley[b]».'
  rationale: Se corrige «dirás a ellos» a «les dirás» para un español natural y eclesialmente legible; se mejora el matiz de השתחוה con «se postraron ante ellos»; y se normaliza el orden final a «no guardaron mi ley» sin perder énfasis ni sentido. Se conservan las notas léxicas necesarias para «padres/antepasados» y «ley/instrucción».
  reviewer_model: gpt-5.4
