review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: la pareja poética «esplendor y majestad», el singular colectivo «su obra», y la idea durativa de «permanece/stands forever». Sin embargo, se aparta del rastro auditado del POB en un punto significativo: el inglés base eligió «his righteousness» para צִדְקָתוֹ, con «justice» solo como alternativa léxica en nota. El español invirtió esa prioridad al poner «su justicia» en el texto y «su rectitud» en nota, lo cual no preserva fielmente la decisión principal documentada.'
  spanish_quality_summary: El español es claro, natural y digno. «Esplendor y majestad son su obra» suena bien y «permanece para siempre» es idiomático. La única mejora necesaria es alinear mejor el término central צִדְקָתוֹ con la decisión principal del proyecto y con el matiz de carácter moral duradero; en español bíblico legible, «rectitud» funciona mejor aquí como equivalente de «righteousness» que «justicia».
  glossary_alignment: 'Buen alineamiento general con la terminología del proyecto. El punto a corregir es צדקה/δικαιοσύνη: por contexto, el valor principal aquí debe ir como «rectitud» (o menos idealmente «justicia» si el contexto fuera judicial), manteniendo «justicia» como alternativa en nota, tal como el POB inglés mantuvo la alternativa inversa. No hay otros conflictos terminológicos relevantes.'
  issues:
  - severity: medium
    issue: La elección principal para צִדְקָתוֹ no sigue la decisión auditada del POB inglés.
    rationale: El POB inglés escogió «his righteousness» como lectura principal y preservó «his justice» solo como alternativa. El borrador español puso «su justicia» en el texto y relegó «su rectitud» a nota, invirtiendo la prioridad semántica documentada.
  - severity: low
    issue: La nota al pie también quedó invertida respecto del audit trail.
    rationale: Si el texto principal se corrige a «su rectitud», la alternativa adecuada en nota debe ser «su justicia permanece para siempre», no al revés.
  revised_spanish_text: Esplendor y majestad son su obra, y su rectitud[a] permanece para siempre.
