    issue: «en mi oído» es una traducción poco natural de בְּאָזְנָי
    rationale: Aunque reproduce literalmente la imagen de ‘oído’, en español moderno suena forzado y puede distraer del sentido idiomático. El hebreo expresa que el profeta oyó esa designación directamente; «mientras yo escuchaba» o «en mi presencia» transmite mejor ese valor.
  revised_spanish_text: En cuanto a las ruedas[a], se les llamaba «la rueda giratoria» mientras yo escuchaba.
