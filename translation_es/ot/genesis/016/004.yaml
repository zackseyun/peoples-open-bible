  to: Se llegó a Agar[a], y ella concibió. Cuando vio que había concebido, su señora fue menospreciada a sus ojos.
  rationale: Se revisa el eufemismo sexual a «se llegó a» para reflejar mejor el hebreo בוא אל en español natural y decoroso. Se cambia «en sus ojos» por «a sus ojos», que es el equivalente idiomático normal de בְּעֵינֶיהָ. Se mantiene «su señora fue menospreciada» como una buena representación del valor de קלל en este contexto, con nota que preserva la alternativa «fue despreciada».
