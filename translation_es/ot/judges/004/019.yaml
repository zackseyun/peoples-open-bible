translation:
  language: es
  text: 'Y él le dijo: «Por favor, dame un poco de agua para beber, porque tengo sed». Entonces ella abrió el odre[a] de leche, le dio de beber y lo cubrió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “el odre-botella de leche”. El hebreo se refiere a un recipiente de piel, no a una botella moderna.
    reason: cultural_note
lexical_decisions:
- source_word: הַשְׁקִי/נִי
  english_pob_choice: give me ... to drink
  chosen_spanish: dame ... para beber
  alternatives_spanish:
  - déjame beber
  - dame un trago
  lexicon: HALOT
  rationale: 'El verbo hebreo es causativo: “hacer beber” / “dar de beber”. En español, “dame ... para beber” conserva ese valor sin sonar forzado.'
- source_word: נָא
  english_pob_choice: Please
  chosen_spanish: Por favor
  alternatives_spanish:
  - te ruego
  - por favor, te pido
  lexicon: HALOT
  rationale: La partícula suaviza la petición. “Por favor” es la equivalencia moderna más clara y digna en español.
- source_word: מְעַט מַיִם
  english_pob_choice: a little water
  chosen_spanish: un poco de agua
  alternatives_spanish:
  - algo de agua
  - poquita agua
  lexicon: HALOT
  rationale: “Un poco de agua” reproduce bien la medida pequeña indicada por מְעַט y suena natural en español.
- source_word: כִּי צָמֵאתִי
  english_pob_choice: for I am thirsty
  chosen_spanish: porque tengo sed
  alternatives_spanish:
  - pues estoy sediento
  - porque estoy sediento
  lexicon: HALOT
  rationale: El hebreo expresa la razón de la petición. “Tengo sed” comunica de forma directa e idiomática la misma fuerza.
- source_word: נֹאוד הֶחָלָב
  english_pob_choice: the skin of milk
  chosen_spanish: el odre de leche
  alternatives_spanish:
  - la piel/bota de leche
  - el odre de la leche
  lexicon: HALOT
  rationale: נֹאוד designa un recipiente de cuero, no una botella moderna. “Odre” mantiene el objeto antiguo y sugiere correctamente un contenedor de piel.
- source_word: וַתַּשְׁקֵהוּ
  english_pob_choice: gave him a drink
  chosen_spanish: le dio de beber
  alternatives_spanish:
  - le dio un poco de leche
  - lo hizo beber
  lexicon: HALOT
  rationale: La forma causativa de שׁקה se expresa de modo natural con “dar de beber”. Dado el contexto inmediato, implica la leche sin añadirla de forma innecesaria.
- source_word: וַתְּכַסֵּהוּ
  english_pob_choice: covered him
  chosen_spanish: lo cubrió
  alternatives_spanish:
  - lo tapó
  - lo envolvió
  lexicon: HALOT
  rationale: כסה significa cubrir o ocultar. “Lo cubrió” es la rendición más directa y deja implícito el objeto, como en hebreo.
theological_decisions:
- issue: Referencia al recipiente antiguo frente a una lectura moderna
  english_pob_reading: the skin of milk / skin-bottle of milk
  chosen_spanish_reading: el odre de leche
  alternative_spanish_readings:
  - la botella de leche
  - el recipiente de leche
  rationale: La decisión evita anacronismos y preserva la imagen cultural del texto hebreo. “Odre” mantiene la tensión entre una traducción inteligible y la concreción histórica del recipiente.
  doctrine_reference: Principio de fidelidad semántica y cultural del texto bíblico
translation_notes:
  revision_awareness: El texto inglés auditado no muestra revisiones sustantivas; se mantiene la lectura estable con alta concordancia. La draft española sigue esa estabilidad y refleja el mismo sentido básico sin añadir elementos no presentes en el hebreo.
  spanish_consistency_notes:
  - Se mantiene “Yahvé” como término por defecto en el proyecto, pero este versículo no contiene el tetragrámaton ni una referencia divina directa.
  - Se usa “odre” para נֹאוד por consistencia con la nota cultural y para evitar modernizar el objeto.
  - Se evita “Cristo/Mesías” porque no aplica al versículo.
  - Se conserva un registro bíblico claro, pero con sintaxis española natural y contemporánea.
