base_translation:
  language: en
  yaml_path: translation/deuterocanon/2_maccabees/015/017.yaml
  text: And having been encouraged by the very noble words of Judas[a], which were able to stir them on to virtue and to make the souls of young men manly, they resolved not merely to campaign, but to press on bravely and, engaging with all valor, decide the matter[d][c][b], because the city and the holy things and the temple were also in danger.
  footnotes:
  - marker: a
    text: Or 'able to urge them toward excellence' or, in the military setting, 'valor.' The Greek ἀρετή can carry both moral and martial overtones.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to make the souls of young men manly.' The Greek preserves explicit masculine imagery for courage.
    reason: lexical_alternative
  - marker: c
    text: The sense is not that they decided not to fight, but that they resolved not merely to undertake a campaign; they meant to press the conflict to a decisive outcome.
    reason: alternative_reading
  - marker: d
    text: The Greek distinguishes 'the holy things' from 'the temple,' so both are represented separately here.
    reason: lexical_alternative
