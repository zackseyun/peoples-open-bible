review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura proverbial del hebreo: singular representativo, contraste entre el malvado que toma prestado y no devuelve lo debido, y el justo que actúa con gracia y da. Sin embargo, la colocación de las notas está invertida respecto de las palabras a las que corresponden en el texto base auditado: la nota sobre «does not repay» no existe, mientras que las alternativas documentadas corresponden a חוֹנֵן y וְנוֹתֵן. Además, «no paga» es comprensible, pero «no devuelve» preserva mejor el sentido de repagar lo prestado en este contexto.'
  spanish_quality_summary: El español es claro y natural. «El malvado» y «el justo» funcionan bien en registro bíblico contemporáneo. No obstante, «es bondadoso» debilita un poco la conexión léxica con gracia/favor que el POB quiso conservar; «es generoso» sería demasiado interpretativo, pero «muestra favor» suena algo rígido. Una solución mejor es mantener «es bondadoso» o ajustar a «muestra gracia», pero por naturalidad pastoral puede conservarse «es bondadoso» si la nota queda bien anclada. El cambio más necesario es corregir la ubicación de notas y afinar «no devuelve».
  glossary_alignment: No hay conflictos con la terminología global del proyecto. «El justo» para צַדִּיק y «el malvado» para רָשָׁע son apropiados. Para חוֹנֵן, el borrador necesita que la nota esté anclada en «es bondadoso» y no en «no paga/no devuelve». Para וְנוֹתֵן, la nota debe anclarse en «da».
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en la frase equivocada.
    rationale: La nota a trata sobre חוֹנֵן ('muestra favor' / 'es generoso') y debe marcar la expresión correspondiente al justo, no «no paga». La nota b trata sobre וְנוֹתֵן ('y presta') y debe marcar «da», no la cláusula negativa anterior.
  - severity: medium
    issue: «No paga» es menos preciso que «no devuelve» para לֹא יְשַׁלֵּם en contexto de préstamo.
    rationale: El hebreo aquí expresa repagar lo que se pidió prestado. «No paga» puede sonar a incumplimiento genérico; «no devuelve» o «no paga de vuelta» conecta mejor con el préstamo anterior. «No devuelve» es idiomático y suficientemente preciso en español.
  - severity: low
    issue: «Es bondadoso» atenúa la conexión con gracia/favor.
    rationale: El POB inglés documenta «is gracious» como elección principal. En español, «es bondadoso» es natural, pero conviene sostener la conexión léxica mediante la nota correctamente ubicada.
  revised_spanish_text: El malvado toma prestado y no devuelve, pero el justo es bondadoso[a] y da[b].
  revised_footnotes:
  - marker: a
    text: O «muestra favor» o «es generoso». El verbo hebreo lleva el sentido de mostrar gracia o favor, expresado aquí en una acción benéfica.
    reason: lexical_alternative
  - marker: b
    text: O «y presta». El hebreo dice simplemente «y da»; algunos intérpretes entienden este dar como un préstamo generoso en contexto.
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan a las palabras hebreas documentadas en el rastro de auditoría, y se ajusta «no paga» a «no devuelve» para reflejar con más precisión el sentido de repagar un préstamo. Se conserva «es bondadoso» por naturalidad en español, apoyado por la nota léxica que mantiene la conexión con gracia/favor.
