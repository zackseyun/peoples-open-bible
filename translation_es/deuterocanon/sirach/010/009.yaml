review_pass:
  verdict: revise
  source_alignment_summary: El borrador español sigue bien el hebreo como testimonio principal y conserva la lógica retórica de reprensión contra el orgullo humano. También mantiene adecuadamente la nota sobre la dificultad de la cláusula final y el aporte del griego paralelo. Sin embargo, «la ceniza» en singular debilita la expresión fija bíblica correspondiente a עָפָר וָאֵפֶר / 'dust and ashes', y «es levantado» suena algo torpe y menos natural en español en este contexto.
  spanish_quality_summary: El texto es claro y digno, pero puede ganar naturalidad y fuerza idiomática con «polvo y cenizas» y «es alzado». Además, conviene quitar el artículo inicial para reflejar mejor la expresión estable y evitar una dicción algo pesada.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. Las decisiones «se enaltece», «aunque», «cuerpo» y la nota alternativa están alineadas con el expediente inglés. La principal corrección léxica es usar «cenizas» para preservar la pareja tradicional de mortalidad.
  issues:
  - severity: medium
    issue: «la ceniza» en singular
    rationale: La fuente y el expediente inglés apuntan a la expresión fija de fragilidad humana «dust and ashes». En español bíblico y general, «polvo y cenizas» es la forma más natural y reconocible; el singular suena menos idiomático y pierde fuerza tradicional.
  - severity: low
    issue: «es levantado» es poco natural aquí
    rationale: Aunque es formalmente posible, en español suena algo mecánico. «Es alzado» o «es elevado» conserva mejor la imagen ascendente del hebreo sin aspereza estilística.
  - severity: low
    issue: Artículo en «el polvo y ...»
    rationale: No es incorrecto, pero «polvo y cenizas» funciona mejor como expresión proverbial/general de la condición humana y suena más natural en una pregunta sapiencial.
  revised_spanish_text: ¿Por qué se enaltece polvo y cenizas[a], aunque en su vida su cuerpo es alzado?
