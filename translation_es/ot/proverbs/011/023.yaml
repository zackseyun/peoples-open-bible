    rationale: «Los malos» es entendible, pero «los malvados» o «los impíos» representa mejor el sustantivo moral «the wicked». «Los malvados» mantiene neutralidad y claridad eclesial sin sonar arcaico.
  revised_spanish_text: El deseo de los justos es solo bien, pero la esperanza[a] de los malvados es ira[b].
