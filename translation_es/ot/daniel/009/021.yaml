translation:
  language: es
  text: Mientras todavía hablaba en oración, el hombre Gabriel, a quien había visto en la visión al principio, vino a mí en veloz vuelo[a], como a la hora de la ofrenda de la tarde.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, menos probablemente, «fatigado» o «en fatiga» en lugar de «en veloz vuelo». La frase hebrea es difícil.
    reason: alternative_reading
lexical_decisions:
- source_word: וְעוֹד
  english_pob_choice: while ... still
  chosen_spanish: Todavía estaba... cuando
  alternatives_spanish:
  - Mientras seguía...
  - Aún estaba... cuando
  lexicon: HALOT
  rationale: La combinación expresa acción en curso y simultaneidad con la llegada de Gabriel. En español, «todavía estaba... cuando» mantiene el valor de continuidad de manera natural y fiel al contexto.
- source_word: מְדַבֵּר בַּתְּפִלָּה
  english_pob_choice: speaking in prayer
  chosen_spanish: hablando en oración
  alternatives_spanish:
  - orando
  - hablando en la oración
  lexicon: HALOT
  rationale: El hebreo conserva el matiz verbal de «hablar» unido al ámbito de la oración. «Hablando en oración» refleja ambas piezas sin reducirlo simplemente a «orando».
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - la figura humana
  lexicon: HALOT
  rationale: Se conserva el sustantivo común «hombre», porque el texto presenta a Gabriel con apariencia humana en la visión.
- source_word: גַּבְרִיאֵל
  english_pob_choice: Gabriel
  chosen_spanish: Gabriel
  alternatives_spanish:
  - —
  lexicon: transliteration convention
  rationale: Nombre propio transliterado de forma estándar en español.
- source_word: אֲשֶׁר רָאִיתִי בֶחָזוֹן בַּתְּחִלָּה
  english_pob_choice: whom I had seen in the vision at the beginning
  chosen_spanish: a quien había visto en la visión al principio
  alternatives_spanish:
  - a quien había visto antes en la visión
  - a quien había visto en la visión anterior
  lexicon: HALOT
  rationale: «Al principio» reproduce de manera directa בַּתְּחִלָּה y deja visible la referencia a la aparición previa de Gabriel, sin volverla más explícita de lo que el hebreo exige.
- source_word: מֻעָף בִּיעָף
  english_pob_choice: in swift flight
  chosen_spanish: en veloz vuelo
  alternatives_spanish:
  - en rápido vuelo
  - en vuelo apresurado
  - agotado por el cansancio
  lexicon: HALOT
  rationale: La lectura principal del POB inglés entiende la frase como movimiento rápido. «Veloz vuelo» comunica esa idea en español con naturalidad, mientras conserva abierta la dificultad del hebreo.
- source_word: נֹגֵעַ אֵלַי
  english_pob_choice: came to me
  chosen_spanish: vino a mí
  alternatives_spanish:
  - se acercó a mí
  - llegó hasta mí
  - me tocó
  lexicon: HALOT
  rationale: Aquí se privilegia el sentido de llegada o aproximación. «Vino a mí» corresponde bien al contexto narrativo y evita forzar «tocó», que es posible pero menos seguro en este pasaje.
- source_word: כְּעֵת
  english_pob_choice: at the time of
  chosen_spanish: como a la hora de
  alternatives_spanish:
  - a la hora de
  - al tiempo de
  - aproximadamente a la hora de
  lexicon: HALOT
  rationale: La preposición marca correspondencia temporal aproximada. «Como a la hora de» mantiene esa aproximación de modo idiomático en español.
- source_word: מִנְחַת עָרֶב
  english_pob_choice: the evening offering
  chosen_spanish: la ofrenda de la tarde
  alternatives_spanish:
  - el sacrificio vespertino
  - la ofrenda vespertina
  - el ofrecimiento de la tarde
  lexicon: HALOT
  rationale: «Ofrenda de la tarde» refleja el valor temporal y cultual de la expresión sin estrecharla prematuramente a un tipo específico de sacrificio. «Tarde» funciona aquí como equivalente natural de ערב en español bíblico contemporáneo.
theological_decisions:
- issue: Sentido de מֻעָף בִּיעָף
  english_pob_reading: Gabriel is described as coming in swift flight.
  chosen_spanish_reading: Gabriel viene en veloz vuelo.
  alternative_spanish_readings:
  - Gabriel viene agotado por el cansancio.
  - Gabriel viene en desgaste o fatiga.
  rationale: 'Se mantiene la lectura principal del POB inglés, que toma la expresión como movimiento rápido. El español elegido evita resolver la dificultad del hebreo de modo excesivo, pero sí comunica con claridad la imagen dominante del contexto: llegada repentina mientras Daniel aún ora.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión y fue aprobada con alto acuerdo. El español sigue la decisión principal del POB, pero ajusta la sintaxis para que resulte natural y publicable en español sin perder la ambigüedad documentada del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Gabriel» como nombre propio transliterado estándar.
  - Se conservó el valor temporal aproximado de כְּעֵת con una formulación idiomática.
  - No se sustituyó la expresión cultual por un término más técnico que estrechara indebidamente מִנְחַת עָרֶב.
  - Se preservó la tensión lexical de מֻעָף בִּיעָף mediante una nota alternativa, sin imponer una resolución dogmática.
