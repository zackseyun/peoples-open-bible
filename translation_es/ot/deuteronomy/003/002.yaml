translation:
  language: es
  text: 'Yahvé me dijo: «No le temas, porque lo he entregado en tu mano[a], a él, a todo su pueblo y a su tierra; y harás con él[b] tal como hiciste con Sehón, rey de los amorreos, que habitaba en Hesbón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión «en tu mano» conserva la imagen hebrea de entrega al poder o dominio de alguien.
    reason: source_note
  - marker: b
    text: 'El verbo hebreo es amplio: literalmente, «harás con él / le harás». Aquí se mantiene la formulación general sin especificar más de lo que el contexto indica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: Se mantiene el nombre del pacto en español según el estándar del proyecto. 'Yahvé' preserva el valor auditado de יְהוָה y evita la sustitución litúrgica por 'SEÑOR'.
- source_word: אַל תִּירָא אֹת֔/וֹ
  english_pob_choice: Do not fear him
  chosen_spanish: No temas a él
  alternatives_spanish:
  - No le temas
  - No tengas miedo de él
  lexicon: HALOT
  rationale: Se conserva el mandato negativo y el objeto explícito del hebreo. 'Temer a él' refleja con transparencia el objeto pronominal; 'No le temas' sería más idiomático, pero menos transparente al paralelismo hebreo.
- source_word: בְ/יָדְ/ךָ
  english_pob_choice: into your hand
  chosen_spanish: en tu mano
  alternatives_spanish:
  - en tu poder
  - en tus manos
  lexicon: HALOT
  rationale: Se preserva la imagen idiomática de la entrega en la 'mano'. En español, 'en tu mano' mantiene la metáfora de dominio y traspaso sin explicarla en exceso.
- source_word: נָתַ֧תִּי
  english_pob_choice: I have given
  chosen_spanish: he puesto
  alternatives_spanish:
  - he dado
  - he entregado
  lexicon: HALOT
  rationale: Se opta por una formulación natural en español que mantiene el valor perfecto de acción ya realizada desde la perspectiva divina. 'He puesto' comunica la entrega efectiva dentro de la imagen de la mano; 'he entregado' también sería viable, pero puede sonar más interpretativo.
- source_word: וְ/אֶת כָּל עַמּ֖/וֹ וְ/אֶת אַרְצ֑/וֹ
  english_pob_choice: all his people, and his land
  chosen_spanish: a todo su pueblo, y su tierra
  alternatives_spanish:
  - a todo su pueblo, y la tierra de él
  - a todo su pueblo, y su país
  lexicon: HALOT
  rationale: '''עַם'' se rinde como ''pueblo'' para conservar el alcance total de la población, no solo fuerzas militares. ''Tierra'' sigue el sentido básico de אֶרֶץ y evita sobreinterpretar ''país''.'
- source_word: וְ/עָשִׂ֣יתָ לּ֔/וֹ
  english_pob_choice: you shall do to him
  chosen_spanish: le harás
  alternatives_spanish:
  - harás con él
  - tratarás con él
  lexicon: HALOT
  rationale: Se conserva la amplitud del verbo עשה sin fijar una acción específica más allá del contexto inmediato. La dativa 'le' permite mantener el tono directo y la comparación del verso.
- source_word: כַּ/אֲשֶׁ֣ר עָשִׂ֗יתָ
  english_pob_choice: just as you did
  chosen_spanish: como hiciste
  alternatives_spanish:
  - tal como hiciste
  - según hiciste
  lexicon: HALOT
  rationale: '''Como'' reproduce la comparación de manera natural en español. No se añade intensificación innecesaria; el paralelismo ya está claro por el contexto.'
- source_word: לְ/סִיחֹן֙ מֶ֣לֶךְ הָֽ/אֱמֹרִ֔י
  english_pob_choice: to Sihon king of the Amorites
  chosen_spanish: a Sehón, rey del amorreo
  alternatives_spanish:
  - a Sehón, rey de los amorreos
  - a Sehón, el rey amorreo
  lexicon: HALOT
  rationale: Se mantiene la aposición del hebreo. 'Amorreo' en singular funciona como gentilicio colectivo en español bíblico; 'de los amorreos' también sería posible, pero la forma singular conserva el paralelo con el nombre del rey.
- source_word: אֲשֶׁ֥ר יוֹשֵׁ֖ב בְּ/חֶשְׁבּֽוֹן
  english_pob_choice: who lived in Heshbon
  chosen_spanish: que habitaba en Hesbón
  alternatives_spanish:
  - que vivía en Hesbón
  - que residía en Hesbón
  lexicon: HALOT
  rationale: '''Habitar'' reproduce bien el matiz de residencia estable del participio de ישב y suena natural en español bíblico actual. ''Hesbón'' conserva la forma de nombre propio usada en español.'
theological_decisions:
- issue: El nombre divino יְהוָה en boca de Dios
  english_pob_reading: Yahweh said to me
  chosen_spanish_reading: Yahvé dijo a mí
  alternative_spanish_readings:
  - Yahvé me dijo
  - Yahvé habló conmigo
  rationale: Se preserva el nombre del pacto sin ocultarlo tras una sustitución reverencial. La colocación 'dijo a mí' es más literal al hebreo; aunque 'me dijo' sería más idiomático, aquí se mantiene la estructura fuente para transparencia auditable.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada marcador de nota [a], [b] y [c] aparezca exactamente en el texto español correspondiente. La redacción mantiene la metáfora de la mano, el objeto explícito del temor y la amplitud de עשה, sin añadir notas huérfanas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה conforme al estándar del proyecto.
  - Se conserva 'pueblo' para עַם y 'tierra' para אֶרֶץ, sin reducirlos a sentido militar o político.
  - '''Amorreo'' se usa como gentilicio colectivo para הָאֱמֹרִי.'
  - Se mantiene un español bíblico moderno y comprensible, sin calco mecánico salvo donde la transparencia lo justifica.
