translation:
  language: es
  text: Le habló amablemente y puso su trono por encima de los tronos de los reyes que estaban con él en Babilonia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «le habló buenas cosas», es decir, «le habló favorablemente» o «amablemente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר אִתּוֹ
  english_pob_choice: He spoke to him
  chosen_spanish: Le habló
  alternatives_spanish:
  - Le dijo
  - Habló con él
  lexicon: HALOT
  rationale: דבר con אִתּוֹ expresa hablar con/alguien. En español, «le habló» mantiene la relación directa sin añadir contenido no presente.
- source_word: טֹבוֹת
  english_pob_choice: kindly
  chosen_spanish: bondadosamente
  alternatives_spanish:
  - amablemente
  - con bondad
  - buenas cosas
  lexicon: HALOT
  rationale: El plural adjetival se usa adverbialmente con sentido favorable. «Bondadosamente» conserva el valor de trato favorable y evita la literalidad poco natural de «buenas cosas».
- source_word: וַיִּתֵּן אֶת כִּסְאוֹ
  english_pob_choice: set his throne
  chosen_spanish: puso su trono
  alternatives_spanish:
  - estableció su trono
  - colocó su trono
  - le dio un trono
  lexicon: HALOT
  rationale: נתן con «su trono» en contexto cortesano expresa colocación o asignación de rango. «Puso su trono» conserva la imagen concreta sin volverla demasiado abstracta.
- source_word: כִּסְאוֹ
  english_pob_choice: his throne
  chosen_spanish: su trono
  alternatives_spanish:
  - su asiento
  - su silla real
  lexicon: HALOT
  rationale: כִּסֵּא puede ser «asiento» o «trono», pero el contexto de reyes exige «trono» para preservar la referencia regia.
- source_word: מִמַּעַל לְכִסֵּא מְלָכִים
  english_pob_choice: above the thrones of the kings
  chosen_spanish: por encima de los tronos de los reyes
  alternatives_spanish:
  - sobre los tronos de los reyes
  - más alto que los tronos de los reyes
  - por encima de los asientos de los reyes
  lexicon: HALOT
  rationale: La comparación indica elevación de rango o ubicación superior. «Por encima de» mantiene la relación espacial y jerárquica, y el plural «tronos» refleja היטב el hebreo y el contexto.
- source_word: אֲשֶׁר אִתּוֹ בְּבָבֶל
  english_pob_choice: who were with him in Babylon
  chosen_spanish: que estaban con él en Babilonia
  alternatives_spanish:
  - que estaban con él en Babilonia
  - que estaban junto a él en Babilonia
  lexicon: HALOT
  rationale: La cláusula relativa identifica a los demás reyes presentes con él. «Estaban con él en Babilonia» es fiel y natural en español.
translation_notes:
  revision_awareness: La versión inglesa POB se mantiene estable en este versículo y la revisión más reciente no introdujo cambios; el español sigue la misma solución auditada, conservando el matiz favorable de טֹבוֹת y la imagen jerárquica de los tronos.
  spanish_consistency_notes:
  - Se mantiene «Babilonia» como nombre propio geográfico sin adaptar a perífrasis.
  - Se conserva «trono» para כִּסֵּא por el contexto real/cortesano.
  - Se prefiere un adverbio en español para טֹבוֹת, siguiendo la equivalencia óptima del POB inglés.
  - No se usa «SEÑOR» ni terminología teológica ajena al verso.
