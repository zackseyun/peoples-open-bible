review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: incluye a los que se vuelven atrás de Yahvé y a los que no lo buscan ni recurren a él. También mantiene correctamente Yahvé para יְהוָה y distingue בקש de דרש. Sin embargo, ''se apartan de seguir a Yahvé'' suaviza un poco la imagen de retroceso/volver atrás presente en הַנְּסוֹגִים, y puede mejorarse con una formulación más cercana al audit trail inglés (''se vuelven atrás de seguir a Yahvé'' o similar).'
  spanish_quality_summary: El español es claro y legible, pero 'se apartan de seguir a Yahvé' suena algo menos natural y menos preciso que una formulación con 'dejan de seguir a Yahvé' o 'se vuelven atrás de seguir a Yahvé'. Para equilibrar fidelidad y buen español, conviene usar 'se vuelven atrás de seguir a Yahvé', que conserva la imagen verbal del hebreo. El resto de la frase fluye bien. La nota b también debe ajustarse, porque 'de seguir al Señor' no es la alternativa principal relevante del inglés; la alternativa documentada es 'los que retroceden / se echan atrás'.
  glossary_alignment: 'Alineación buena en términos clave: יְהוָה → ''Yahvé''; בקש → ''buscar''; דרש → ''consultar'' con nota que preserva el solapamiento ''buscar''. No hay conflicto doctrinal serio. Sí conviene alinear mejor la alternativa léxica de הַנְּסוֹגִים con ''los que retroceden / se vuelven atrás'' en vez de centrar la nota b en ''seguir al Señor''.'
  issues:
  - severity: medium
    issue: הַנְּסוֹגִים está algo atenuado en 'se apartan'
    rationale: El hebreo y el audit trail inglés enfatizan retroceso o volverse atrás. 'Se apartan' comunica alejamiento, pero pierde parte de la imagen de retirada/apostasía implícita.
  - severity: medium
    issue: La nota b no refleja la alternativa léxica principal documentada
    rationale: El inglés documenta como alternativa 'those who draw back', no una sustitución de Yahvé por 'el Señor'. En español, la nota debe preservar la alternativa sobre el verbo principal, no desplazar el foco a otro asunto.
  - severity: low
    issue: La nota a es innecesariamente presentada como alternativa
    rationale: No es errónea, pero la nota solo explica la representación de YHWH como Yahvé; está bien mantenerla si se conserva el aparato del registro, aunque no añade una alternativa de traducción real.
  revised_spanish_text: y a los que se vuelven atrás de seguir a Yahvé[a][b], y que no buscan a Yahvé ni lo consultan[c].
