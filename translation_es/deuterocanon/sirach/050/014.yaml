review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura general del hebreo: límite temporal («hasta que terminó»), servicio cultual («ministrar en el altar») y una segunda acción de ordenar/disponer. Sin embargo, se aparta del rastro auditado de POB al introducir en el texto principal «Todopoderoso», añadido procedente del griego paralelo, cuando el inglés POB principal dice «of the Most High» y reserva la lectura griega más explícita para nota. También «la ofrenda» singular es aceptable por la revisión inglesa, pero conviene no reforzar más el griego en el texto principal de lo que hizo POB.'
  spanish_quality_summary: El español es legible y digno, pero «de arreglar» suena algo coloquial en un contexto litúrgico; «de ordenar» o «de disponer» encaja mejor. La frase también mejora al quitar «Todopoderoso» del texto principal, evitando pesadez y manteniendo mejor la nota como lugar de la alternativa griega. La puntuación y el flujo son correctos.
  glossary_alignment: «Altísimo» está bien para עֶלְיוֹן. «Ministrar» es defendible para לְשָׁרֵת en contexto sacerdotal. El problema principal de alineación es incorporar Παντοκράτωρ/Todopoderoso en el cuerpo del texto pese a que el POB inglés lo dejó en nota. La nota debe seguir preservando la alternativa griega y el hebreo más terso.
  issues:
  - severity: high
    issue: El texto principal añade «Todopoderoso» aunque el hebreo base no lo tiene y el POB inglés lo relegó a nota.
    rationale: La política dada exige trabajar desde la evidencia fuente y el rastro auditado. Aquí el hebreo es primario y el inglés principal traduce «of the Most High», con «Most High Almighty» solo en nota. Mantener «Todopoderoso» en el cuerpo sobre-resuelve hacia el griego.
  - severity: medium
    issue: «de arreglar» es menos preciso y más coloquial que una opción cultual como «de ordenar».
    rationale: סדר en este contexto sacerdotal apunta a poner en orden/disponer. «Arreglar» puede sonar doméstico o informal en español bíblico.
  - severity: low
    issue: La nota actual traduce el hebreo alternativo como «disposiciones», pero el texto principal usa singular «ofrenda».
    rationale: No es incorrecto, pero conviene que la nota siga mostrando con claridad la mayor amplitud/tersura del hebreo frente a la explicitación griega.
  revised_spanish_text: hasta que terminó de ministrar en el altar[a], y de ordenar la ofrenda del Altísimo.
  revised_footnotes:
  - marker: a
    text: 'Griego: «adornar/ordenar la ofrenda del Altísimo Todopoderoso». El hebreo dice más escuetamente: «ordenar las disposiciones del Altísimo».'
    reason: alternative_reading
  revision_rationale: Se quita «Todopoderoso» del texto principal para seguir la primacía del hebreo y el rastro del POB inglés, que reserva esa explicitación griega para la nota. Se reemplaza «arreglar» por «ordenar» para reflejar mejor סדר en registro cultual. Se conserva «la ofrenda» como decisión española admisible dentro de la revisión inglesa, mientras la nota preserva la alternativa hebrea más amplia.
