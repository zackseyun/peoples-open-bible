translation:
  language: es
  text: 'Y Josué mandó al pueblo[a], diciendo: «No griten, ni hagan oír su voz, ni salga una palabra de sus bocas[b], hasta el día en que yo les diga: “¡Griten!” Entonces gritarán».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más específicamente, en este contexto puede entenderse como «No den un grito de guerra» o «No lancen un grito de batalla».
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «ni salga de su boca una palabra»; el hebreo usa singular («palabra») con la imagen idiomática de que salga de la boca.'
    reason: lexical_alternative
lexical_decisions:
- source_word: צִוָּה
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - dio mandato a
  lexicon: HALOT
  rationale: El verbo expresa una orden con autoridad. En español, «mandó» comunica bien ese tono directivo sin sonar excesivamente técnico; «ordenó» también sería posible, pero «mandó» conserva un registro bíblico claro y natural.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - las tropas
  lexicon: HALOT
  rationale: Aunque el contexto es militar, el sustantivo hebreo es el término común para «pueblo». «El pueblo» preserva la generalidad del original sin convertirlo en un término más específico de lo que el hebreo exige.
- source_word: לֹא תָרִיעוּ
  english_pob_choice: Do not shout
  chosen_spanish: No griten
  alternatives_spanish:
  - No den un grito de guerra
  - No lancen un grito
  lexicon: HALOT
  rationale: El verbo puede referirse a un grito, incluso un grito de guerra. «No griten» mantiene la relación léxica con el mandato posterior de «¡Griten!» y es idiomático en español; la alternativa más específica se conserva en nota porque el contexto militar permite esa matización.
- source_word: וְלֹא תַשְׁמִיעוּ אֶת קוֹלְכֶם
  english_pob_choice: do not let your voice be heard
  chosen_spanish: ni hagan oír su voz
  alternatives_spanish:
  - ni dejen oír su voz
  - ni hagan que se oiga su voz
  lexicon: HALOT
  rationale: La forma causativa de שמע expresa ‘hacer oír’. «Hagan oír su voz» reproduce el valor causativo de manera natural en español; se evita una construcción demasiado literal que sonaría forzada.
- source_word: וְלֹא יֵצֵא מִפִּיכֶם דָּבָר
  english_pob_choice: do not let a word go out from your mouth
  chosen_spanish: ni salga palabra alguna de su boca
  alternatives_spanish:
  - ni salga una palabra de su boca
  - ni pronuncien palabra
  lexicon: HALOT
  rationale: El hebreo dice literalmente que no salga ‘una palabra’ de la boca. «Palabra alguna» conserva la fuerza negativa y el movimiento idiomático de ‘salir de la boca’, sin perder claridad en español.
- source_word: עַד יוֹם אָמְרִי אֲלֵיכֶם
  english_pob_choice: until the day I say to you
  chosen_spanish: hasta el día en que yo les diga
  alternatives_spanish:
  - hasta el día que yo les diga
  - hasta el día en que les hable
  lexicon: HALOT
  rationale: La construcción temporal se expresa de forma natural con «hasta el día en que yo les diga». Mantiene el valor futuro y la referencia directa de Joshua al pueblo.
- source_word: הָרִיעוּ
  english_pob_choice: Shout!
  chosen_spanish: ¡Griten!
  alternatives_spanish:
  - ¡Den un grito!
  - ¡Prorrumpan en gritos!
  lexicon: HALOT
  rationale: Se repite el mismo lexema verbal que antes; por eso conviene conservar «griten» también aquí, para que el mandato prohibido y el mandato permitido queden ligados por la misma raíz en español.
- source_word: וַהֲרִיעֹתֶם
  english_pob_choice: Then you shall shout
  chosen_spanish: Entonces gritarán
  alternatives_spanish:
  - Entonces darán un grito
  - Y entonces gritarán
  lexicon: HALOT
  rationale: La conjunción consecutiva señala resultado o secuencia. «Entonces gritarán» expresa bien la transición del mandato a la acción permitida, manteniendo la repetición verbal del original.
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios respecto de la versión previa (unchanged: true); por tanto, esta propuesta sigue de cerca el consenso de alta concordancia entre el hebreo y la auditoría inglesa, manteniendo las mismas decisiones léxicas básicas en español.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención del proyecto cuando corresponda; aquí el versículo no contiene el nombre divino en la superficie española, pero sí el sujeto propio Josué.
  - Se mantiene la repetición de «griten» para reflejar el vínculo léxico entre la prohibición inicial y la orden final.
  - Se opta por «el pueblo» en coherencia con el hebreo הָעָם y con el criterio de no sobreespecificar a ‘tropas’ o ‘ejército’ sin necesidad textual.
