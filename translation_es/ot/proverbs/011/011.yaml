    issue: La nota [b] está colocada en 'malvados' en vez de en la frase 'por la boca de los malvados'.
    rationale: La razón de la nota es explicar la metonimia hebrea de la 'boca' como instrumento del habla destructiva. Anclarla solo al sustantivo 'malvados' desorienta al lector y no refleja fielmente la documentación del POB inglés.
  - severity: low
    issue: '''Es exaltada'' suena menos idiomático en español para una ciudad.'
    rationale: Aunque es comprensible y cercano al inglés auditado, en español bíblico natural 'se engrandece' o 'es enaltecida' fluye mejor sin perder el valor de elevación/prosperidad de תָּרוּם.
  revised_spanish_text: Por la bendición de los rectos una ciudad se engrandece[a], pero por la boca de los malvados[b] es derribada.
