translation:
  language: es
  text: La mano derecha de Yahvé está exaltada[a]; la mano derecha de Yahvé hace proezas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'está levantada en alto' o 'triunfa'. El verbo hebreo puede expresar elevación o exaltación y, en este contexto, también puede implicar triunfo.
    reason: lexical_alternative
  - marker: b
    text: O 'muestra poder', 'actúa con fuerza' o 'gana la victoria'. El modismo hebreo 'hacer valor/fuerza' expresa una acción poderosa o victoriosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְמִין
  english_pob_choice: right hand
  chosen_spanish: mano derecha
  alternatives_spanish:
  - diestra
  - lado derecho
  lexicon: HALOT
  rationale: El hebreo nombra literalmente la 'mano derecha' y, en poesía, esa imagen comunica fuerza y acción victoriosa. 'Mano derecha' preserva la metáfora sin convertirla prematuramente en una abstracción como 'poder'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto fuente usa el nombre propio divino, no un título. 'Yahvé' mantiene esa decisión del POB y evita la sustitución por un título genérico.
- source_word: רוֹמֵמָה
  english_pob_choice: is exalted
  chosen_spanish: está enaltecida
  alternatives_spanish:
  - está exaltada
  - está levantada en alto
  - triunfa
  lexicon: HALOT
  rationale: 'La forma femenina concuerda con ''mano derecha'' y expresa un estado/resultante: estar elevada, enaltecida. ''Está enaltecida'' conserva ese matiz sin volverla demasiado interpretativa.'
- source_word: עֹשָׂה
  english_pob_choice: does
  chosen_spanish: hace
  alternatives_spanish:
  - obra
  - actúa
  - realiza
  lexicon: HALOT
  rationale: עָשָׂה es un verbo amplio. En español, 'hace' mantiene la sencillez del hebreo y permite que la expresión idiomática posterior conserve su fuerza.
- source_word: חָיִל
  english_pob_choice: valiantly
  chosen_spanish: proezas
  alternatives_spanish:
  - hazañas
  - fuerza
  - poder
  - victorias
  lexicon: HALOT
  rationale: En la expresión hebrea עֹשָׂה חָיִל, el sustantivo comunica acción poderosa, eficaz o victoriosa. 'Proezas' comunica bien en español la idea de hechos valerosos o extraordinarios, sin perder el tono de triunfo.
theological_decisions:
- issue: Antropomorfismo de la 'mano derecha' divina
  english_pob_reading: Retain 'right hand' literally as a metaphor for the LORD's power and victorious intervention.
  chosen_spanish_reading: Conservar 'mano derecha' como metáfora de la intervención poderosa de Yahvé.
  alternative_spanish_readings:
  - el poder de Yahvé está enaltecido
  - Yahvé actúa poderosamente
  rationale: El hebreo poético usa una imagen corporal concreta. Mantenerla en español preserva el lenguaje bíblico y evita aplanar la figura en una explicación abstracta.
  doctrine_reference: 'Principio POB: primacía del texto original; conservar la tensión metafórica donde el hebreo la presenta.'
translation_notes:
  revision_awareness: El texto coincide con la última revisión auditada, que no introdujo cambios y recibió acuerdo alto en el control cruzado.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el Tetragrámaton, conforme al estándar POB.
  - Se conserva la metáfora corporal 'mano derecha' en lugar de una abstracción como 'poder'.
  - '''Proezas'' intenta rendir el modismo hebreo con naturalidad en español y sin perder el matiz de fuerza victoriosa.'
