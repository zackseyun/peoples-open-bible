review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido global del griego: mortandad común, incapacidad de los vivos para enterrar, y destrucción súbita de la descendencia más estimada. También conserva correctamente la nota sobre la posible lectura contextual «primogénitos». Sin embargo, ὁμοθυμαδόν queda algo debilitado en «todos»; el matiz comparativo/colectivo de ''all alike'' se expresa mejor en español con «todos por igual» o equivalente.'
  spanish_quality_summary: El español es claro y digno, pero «por una sola forma de muerte» suena algo calcado y poco idiomático. Además, «descendencia más honrada» es comprensible, aunque «más estimada» suena más natural para personas y preserva mejor ἐντιμοτέρα en este contexto. El resto del verso fluye bien.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión principal sobre ἡ ἐντιμοτέρα γένεσις mantiene con acierto una formulación no idéntica a «primogénitos» en el texto principal y deja la alternativa en nota. Conviene ajustar la formulación española para mayor naturalidad sin perder esa cautela léxica.
  issues:
  - severity: medium
    issue: ὁμοθυμαδόν se reduce demasiado en «todos».
    rationale: El griego aquí no solo dice 'todos', sino 'todos por igual / todos a una' en cuanto a condición compartida. «Todos» solo conserva la totalidad, pero pierde el matiz adverbial que el inglés auditado recuperó con 'all alike'.
  - severity: medium
    issue: «por una sola forma de muerte» suena poco idiomático en español.
    rationale: Aunque está anclado en la revisión inglesa, «forma de muerte» resulta rígido y algo abstracto. «por una misma clase de muerte» o «por una misma muerte» comunica mejor la designación común sin sonar forzado.
  - severity: low
    issue: «descendencia más honrada» es menos natural que otras opciones.
    rationale: Para γένεσις, «descendencia» es defendible, pero en este contexto de hijos/prole afectados por la plaga, «descendencia más estimada» suena más natural que «honrada» y sigue evitando la sobretraducción «primogénitos».
  revised_spanish_text: Y todos por igual, por una misma clase de muerte, tenían incontables muertos; porque los vivos ni siquiera bastaban para sepultarlos, puesto que en un instante fue destruida su descendencia más estimada[a].
  revised_footnotes:
  - marker: a
    text: O «sus primogénitos»; el contexto alude a la plaga sobre los primogénitos de Egipto, aunque el griego aquí dice más literalmente «su descendencia/línea más estimada».
    reason: alternative_reading
  revision_rationale: Se ajusta ὁμοθυμαδόν a «todos por igual» para conservar el matiz colectivo/comparativo; se reemplaza «eran suficientes» por «bastaban» para un español más natural; se cambia «forma de muerte» por «clase de muerte» para evitar un calco rígido; y «más honrada» por «más estimada» para mejor fluidez y adecuación contextual, manteniendo la cautela frente a la lectura interpretativa «primogénitos».
