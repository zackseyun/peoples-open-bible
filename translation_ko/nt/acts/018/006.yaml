  text: ἀντιτασσομένων δὲ αὐτῶν καὶ βλασφημούντων ἐκτιναξάμενος τὰ ἱμάτια εἶπεν πρὸς αὐτούς· Τὸ αἷμα ὑμῶν ἐπὶ τὴν κεφαλὴν ὑμῶν· καθαρὸς ἐγώ· ἀπὸ τοῦ νῦν εἰς τὰ ἔθνη πορεύσομαι.
base_translation:
  language: en
  yaml_path: translation/nt/acts/018/006.yaml
  text: But when they opposed and reviled him, he shook out his garments and said to them, “Your blood be on your own heads. I am innocent. From now on I will go to the Gentiles.”
  footnotes:
  - marker: a
    text: Or “blasphemed.” The Greek verb can denote blasphemous speech or abusive reviling; here it likely refers to hostile abusive speech against Paul and his message.
    reason: lexical_alternative
  - marker: b
    text: “Your blood be on your own heads” is an idiom meaning that responsibility for the consequences rests on them.
    reason: cultural_note
  - marker: c
    text: “Gentiles” could be rendered “the nations”; in this context it refers to non-Jews.
    reason: lexical_alternative
translation:
  language: ko
  text: 그들이 대적하고 비방하자, 바울이 옷을 떨며 그들에게 말하기를, 「여러분의 피가 여러분의 머리 위에 있을 것이오. 나는 깨끗합니다. 이제부터 나는 이방인들에게로 가겠습니다」 하였습니다.
  philosophy: optimal-equivalence
