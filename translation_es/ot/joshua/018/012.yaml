translation:
  language: es
  text: Y su límite por el lado norte era desde el Jordán, y el límite subía hasta la ladera norte de Jericó[a], luego subía a la región montañosa hacia el oeste, y su extremo estaba en el desierto de Bet-avén[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘hombro de Jericó’, una expresión geográfica que puede significar su costado o ladera.'
    reason: lexical_alternative
  - marker: b
    text: O ‘sus extremos’ o ‘sus salidas’; el hebreo usa un término topográfico plural para el punto final del límite.
    reason: lexical_alternative
lexical_decisions:
- source_word: לִפְאַת צָפוֹנָה
  english_pob_choice: on the north side
  chosen_spanish: por el lado norte
  alternatives_spanish:
  - en el lado norte
  - hacia el lado norte
  lexicon: HALOT
  rationale: פאה expresa lado, borde o región; en una fórmula de linderos, ‘por el lado norte’ comunica la función direccional sin sonar artificioso en español.
- source_word: הַגְּבוּל
  english_pob_choice: border
  chosen_spanish: frontera
  alternatives_spanish:
  - límite
  - borde
  lexicon: HALOT
  rationale: En textos de repartición territorial, גְּבוּל designa el límite territorial. ‘Frontera’ es natural en español y mantiene el valor geográfico-jurídico.
- source_word: מִן הַיַּרְדֵּן
  english_pob_choice: from the Jordan
  chosen_spanish: desde el Jordán
  alternatives_spanish:
  - desde el río Jordán
  - a partir del Jordán
  lexicon: HALOT
  rationale: El nombre propio puede funcionar sin ‘río’. ‘Desde el Jordán’ preserva la referencia topográfica con sobriedad.
- source_word: וְעָלָה
  english_pob_choice: went up
  chosen_spanish: subía
  alternatives_spanish:
  - ascendía
  - iba subiendo
  lexicon: HALOT
  rationale: עלה es el verbo normal en descripciones de linderos. ‘Subía’ conserva el movimiento ascendente de la frontera en un español claro y continuo.
- source_word: אֶל כֶּתֶף יְרִיחוֹ
  english_pob_choice: to the northern slope of Jericho
  chosen_spanish: hasta el hombro norte de Jericó
  alternatives_spanish:
  - hasta la ladera norte de Jericó
  - hasta el lado norte de Jericó
  lexicon: HALOT
  rationale: כֶּתֶף literalmente es ‘hombro’, y en uso geográfico puede referirse a un costado o ladera. Se mantiene ‘hombro’ para no borrar la imagen concreta del hebreo, y se aclara con ‘norte’.
- source_word: בָהָר יָמָּה
  english_pob_choice: into the hill country westward
  chosen_spanish: al monte hacia el oeste
  alternatives_spanish:
  - a la región montañosa hacia el oeste
  - al país montañoso hacia el oeste
  lexicon: HALOT
  rationale: הָר puede funcionar colectivamente como zona montañosa; aquí se traduce de modo breve y natural como ‘al monte’. יָמָּה indica dirección occidental, por eso ‘hacia el oeste’. La formulación conserva el avance del límite sin sobreexplicar.
- source_word: תֹּצְאֹתָיו
  english_pob_choice: its end
  chosen_spanish: su salida
  alternatives_spanish:
  - sus extremos
  - su término
  - su salida o extensión
  lexicon: HALOT
  rationale: El plural técnico תֹּצְאֹתָיו puede referirse a los puntos de salida, extremos o terminaciones del límite. ‘Su salida’ conserva el valor topográfico de ‘outgoings’ y evita simplificar demasiado la pluralidad subyacente.
- source_word: מִדְבַּרָה בֵּית אָוֶן
  english_pob_choice: the wilderness of Beth-aven
  chosen_spanish: el desierto de Bet-avén
  alternatives_spanish:
  - la región desértica de Bet-avén
  - el desierto de Beth-avén
  lexicon: HALOT
  rationale: מִדְבָּר es ‘desierto’ o ‘región árida’; ‘desierto’ es la opción estándar y clara. El nombre propio se translitera como Bet-avén para una forma española coherente.
translation_notes:
  revision_awareness: La redacción inglesa auditada fue revisada para ajustar ‘through the hill country’ a ‘into the hill country westward’, reforzando el matiz direccional del hebreo. La versión española sigue esa decisión con una formulación breve que conserva el movimiento ascendente y occidental del lindero, sin añadir información no presente en el texto fuente.
  spanish_consistency_notes:
  - Se mantiene ‘Jordán’ sin ‘río’ porque el nombre propio funciona como referente geográfico suficiente en este contexto.
  - Se prefirió ‘frontera’ para גְּבוּל por consistencia con un contexto de delimitación territorial.
  - Se conservó ‘Bet-avén’ como transliteración del topónimo, sin normalizarlo a una forma eclesiástica tradicional.
  - La nota sobre כֶּתֶף preserva la tensión entre ‘hombro’ literal y ‘ladera/costado’ geográfico, siguiendo el rastro auditado del inglés.
