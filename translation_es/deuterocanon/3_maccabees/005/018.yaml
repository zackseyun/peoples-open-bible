translation:
  language: es
  text: Pero, mientras la conversación seguía prolongándose[a], el rey mandó llamar a Hermón y, con una amarga amenaza, preguntó por qué motivo los judíos habían sido preservados, habiendo sobrevivido más allá del día señalado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «mientras el diálogo seguía tropezando/prolongándose». El griego es compacto y algo difícil; la traducción entiende que el intercambio se alargaba de forma incómoda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκοπτούσης
  english_pob_choice: kept dragging on
  chosen_spanish: seguía prolongándose
  alternatives_spanish:
  - continuaba
  - iba prolongándose
  - seguía alargándose
  lexicon: LSJ
  rationale: El participio expresa que el intercambio se iba haciendo más largo y difícil, no solo que continuaba. 'Seguía prolongándose' conserva esa idea de extensión molesta sin sonar demasiado coloquial.
- source_word: ὁμιλίας
  english_pob_choice: conversation
  chosen_spanish: conversación
  alternatives_spanish:
  - diálogo
  - discusión
  - plática
  lexicon: LSJ
  rationale: En el contexto narrativo se trata del intercambio verbal ante el rey. 'Conversación' es natural en español y mantiene el sentido de un intercambio continuo.
- source_word: προσκαλεσάμενος
  english_pob_choice: summoned
  chosen_spanish: llamó a
  alternatives_spanish:
  - mandó llamar a
  - convocó a
  - hizo venir a
  lexicon: LSJ
  rationale: El aoristo medio indica que el rey hizo traer a Hermón ante sí. 'Llamó a' es directo y comprensible; el matiz de autoridad se mantiene por el sujeto 'el rey' y el contexto.
- source_word: μετὰ πικρίας ἀπειλῆς
  english_pob_choice: with a bitter threat
  chosen_spanish: con amarga amenaza
  alternatives_spanish:
  - con una amarga amenaza
  - con dura amenaza
  - con amenaza airada
  lexicon: LSJ
  rationale: La expresión une hostilidad ('amenaza') con la cualidad de amargura ('πικρίας'). 'Amarga amenaza' conserva la fuerza del griego sin suavizarlo ni convertirlo en una formulación más interpretativa.
- source_word: ἐπυνθάνετο
  english_pob_choice: asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - inquirió
  - interrogó
  - consultó
  lexicon: LSJ
  rationale: Es el verbo narrativo normal de pedir información. 'Preguntó' comunica bien la acción; el tono amenazante ya está dado por la frase precedente.
- source_word: τίνος ἕνεκεν αἰτίας
  english_pob_choice: for what reason
  chosen_spanish: por qué motivo
  alternatives_spanish:
  - por qué razón
  - con qué causa
  - a causa de qué
  lexicon: LSJ
  rationale: La construcción es enfática y literalmente pregunta por la causa. 'Por qué motivo' refleja esa formalidad sin resultar forzado en español, y mantiene la doble idea de razón/causa.
- source_word: ἰάθησαν
  english_pob_choice: had been spared
  chosen_spanish: habían sido preservados
  alternatives_spanish:
  - habían sido salvados
  - habían sido librados
  - habían sido sanados
  lexicon: LSJ
  rationale: 'Aunque el verbo suele significar ''ser sanado'', aquí el contexto no es médico sino narrativo: los judíos siguen con vida después del día fijado. ''Preservados'' deja abierta la tensión semántica del griego sin imponer ''sanados'' en el cuerpo del texto.'
- source_word: περιοῦσαν ἡμέραν
  english_pob_choice: the appointed day
  chosen_spanish: el día señalado
  alternatives_spanish:
  - el día restante
  - el día asignado
  - el día fijado
  lexicon: LSJ
  rationale: La frase es difícil y el inglés POB interpreta que se trata del día determinado para su destrucción. 'Día señalado' comunica esa idea de un día designado sin sobreespecificar más de lo que el griego exige.
- source_word: περιβεβιωκότες
  english_pob_choice: having survived beyond
  chosen_spanish: habiendo sobrevivido más allá de
  alternatives_spanish:
  - habiendo vivido más allá de
  - habiendo permanecido con vida más allá de
  - habiendo pasado con vida
  lexicon: LSJ
  rationale: El participio perfecto subraya que siguieron vivos más allá del límite esperado. 'Habiendo sobrevivido más allá de' mantiene esa idea de supervivencia continuada y el contraste con el día señalado.
theological_decisions:
- issue: ἰάθησαν en un contexto no médico
  english_pob_reading: had been spared
  chosen_spanish_reading: habían sido preservados
  alternative_spanish_readings:
  - habían sido sanados
  - habían sido salvados
  - habían sido librados
  rationale: 'Sigo la lectura contextual del POB inglés: el verbo griego de ''sanar'' se usa de manera figurada para expresar que no fueron destruidos. ''Preservados'' conserva la tensión entre el sentido léxico básico y el contexto narrativo.'
  doctrine_reference: Sentido contextual del verbo griego y preservación providencial en narrativa
- issue: τίνος ἕνεκεν αἰτίας como pregunta de causa
  english_pob_reading: for what reason
  chosen_spanish_reading: por qué motivo
  alternative_spanish_readings:
  - por qué razón
  - con qué causa
  rationale: La redundancia griega enfatiza la causalidad. En español, 'por qué motivo' mantiene el énfasis sin perder naturalidad. No reduzco la frase a un simple 'por qué' para no borrar ese matiz.
  doctrine_reference: Precisión semántica de la pregunta causal
- issue: περιοῦσαν ἡμέραν y περιβεβιωκότες como referencia al plazo de destrucción
  english_pob_reading: having survived beyond the appointed day
  chosen_spanish_reading: habiendo sobrevivido más allá del día señalado
  alternative_spanish_readings:
  - habiendo vivido más allá del día fijado
  - habiendo permanecido con vida más allá del día asignado
  rationale: La combinación sugiere que el rey pregunta por qué siguen vivos después del día determinado para ellos. 'Día señalado' y 'habiendo sobrevivido más allá de' reproducen la interpretación del POB sin hacerla más explícita de lo que permite el texto.
  doctrine_reference: Tensión textual y narrativa sobre la preservación de los judíos
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del POB en inglés, especialmente al reflejar τίνος ἕνεκεν αἰτίας con una fórmula más explícita que 'por qué' y al conservar la lectura contextual de ἰάθησαν como preservación, no curación física. También mantiene la interpretación de περιοῦσαν ἡμέραν / περιβεβιωκότες como supervivencia más allá del día señalado, sin borrar la dificultad del griego.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general para el nombre divino, pero este versículo no lo contiene.
  - Se conserva un español moderno y sobrio, evitando fórmulas eclesiásticas arcaizantes donde el griego no las exige.
  - '''Preservados'' se eligió para mantener la tensión léxica de ἰάθησαν sin introducir ''sanados'' en el texto principal.'
