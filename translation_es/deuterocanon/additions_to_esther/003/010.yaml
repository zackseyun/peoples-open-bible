  yaml_path: translation/deuterocanon/additions_to_esther/003/010.yaml
  text: Hear my petition and be gracious to your lot[a], and turn our mourning into gladness, so that, living, we may sing praise to your name, O Lord, and do not destroy the mouth of those who praise you. And all Israel cried out with all their strength[b], because death was before their eyes.
  footnotes:
