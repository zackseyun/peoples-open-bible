id: 2TI.3.11
reference: 2 Timothy 3:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τοῖς διωγμοῖς, τοῖς παθήμασιν, οἷά μοι ἐγένετο ἐν Ἀντιοχείᾳ, ἐν Ἰκονίῳ, ἐν Λύστροις, οἵους διωγμοὺς ὑπήνεγκα· καὶ ἐκ πάντων με ἐρρύσατο ὁ κύριος.
base_translation:
  language: en
  yaml_path: translation/nt/2_timothy/003/011.yaml
  text: the persecutions, the sufferings, such as happened to me in Antioch, in Iconium, in Lystra—what persecutions I endured; and from them all the Lord rescued me.
translation:
  language: ko
  text: 박해와 고난도 따랐습니다. 안디옥과 이고니온과 루스드라에서 나에게 일어났던 일들, 내가 견뎌 낸 그러한 박해들 말입니다. 그리고 그 모든 것에서 주께서 나를 건져 주셨습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τοῖς διωγμοῖς ... οἵους διωγμοὺς
  english_pob_choice: the persecutions ... what persecutions
  chosen_korean: 박해 ... 그러한 박해들
  alternatives_korean:
  - 핍박 ... 그러한 핍박들
  lexicon: BDAG
  rationale: 글로사리 지침에 따라 διωγμός는 「박해」로 통일. 한국 성서 전통의 「박해」가 자연스럽다.
- source_word: τοῖς παθήμασιν
  english_pob_choice: the sufferings
  chosen_korean: 고난도 따랐습니다
  alternatives_korean:
  - 고난
  - 수난
  lexicon: BDAG
  rationale: πάθημα는 「겪은 고난」. 10절의 「따랐고」와 자연스럽게 이어지도록 「고난도 따랐습니다」로 옮긴다.
- source_word: Ἀντιοχείᾳ ... Ἰκονίῳ ... Λύστροις
  english_pob_choice: Antioch ... Iconium ... Lystra
  chosen_korean: 안디옥 ... 이고니온 ... 루스드라
  alternatives_korean:
  - 안티오키아 ... 이코니온 ... 뤼스트라
  lexicon: BDAG
  rationale: 글로사리 지침 및 한국 성서 전통(개역개정)을 따라 옮긴다.
- source_word: ὑπήνεγκα
  english_pob_choice: I endured
  chosen_korean: 견뎌 낸
  alternatives_korean:
  - 참아 낸
  - 감당한
  lexicon: BDAG
  rationale: ὑποφέρω는 「아래로 짊어지고 견딤」. 「견뎌 내다」가 2:10, 2:12와 일관된다.
- source_word: ἐκ πάντων με ἐρρύσατο ὁ κύριος
  english_pob_choice: from them all the Lord rescued me
  chosen_korean: 그 모든 것에서 주께서 나를 건져 주셨습니다
  alternatives_korean:
  - 그 모든 것에서 주께서 나를 구해 주셨습니다
  - 모든 것으로부터 주께서 나를 구원해 주셨습니다
  lexicon: BDAG
  rationale: ῥύομαι는 「위기에서 끌어냄·구출」. 「건지다」가 한국 성서 전통의 자연스러운 어휘이다. 4:18의 같은 동사와 통일.
