    reason: lexical_alternative
  revision_rationale: Se ajusta «y corregido» a «y recibía corrección» para reflejar mejor el sustantivo hebreo תּוֹכַחַת y producir un español más natural, sin alterar el sentido del POB. También se normaliza la nota b.
