revisions:
- from: 'Y esto será para ustedes una ordenanza permanente: en el mes séptimo[a], el día diez del mes, se humillarán, y no harán ninguna obra, ni el nacido en la tierra ni el forastero que reside[b] entre ustedes.'
  to: 'Y esto será para ustedes una ordenanza permanente: en el séptimo mes[a], el día diez del mes, se humillarán, y no harán ningún trabajo, tanto el nativo como el forastero que reside[b] entre ustedes.'
  rationale: Se corrige la nota léxica principal para reflejar la alternativa literal documentada por el POB inglés, se mejora la naturalidad y precisión legal del español («séptimo mes», «ningún trabajo», «el nativo»), y se reformula la cláusula final con una estructura inclusiva que refleja mejor el hebreo.
