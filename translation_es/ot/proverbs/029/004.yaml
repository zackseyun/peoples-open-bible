    reason: lexical_alternative
  revision_rationale: Se corrige el término principal a «sobornos» para seguir la decisión contextual del POB inglés y del hebreo en este proverbio. Se conservan las alternativas léxicas en nota. También se reparan los marcadores de nota para que sean únicos y estén anclados a las palabras pertinentes.
