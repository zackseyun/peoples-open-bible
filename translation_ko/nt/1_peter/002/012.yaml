id: 1PE.2.12
reference: 1 Peter 2:12
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: τὴν ἀναστροφὴν ὑμῶν ἐν τοῖς ἔθνεσιν ἔχοντες καλήν, ἵνα, ἐν ᾧ καταλαλοῦσιν ὑμῶν ὡς κακοποιῶν, ἐκ τῶν καλῶν ἔργων ἐποπτεύοντες δοξάσωσι τὸν θεὸν ἐν ἡμέρᾳ ἐπισκοπῆς.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/012.yaml
  text: 'Keep your conduct among the Gentiles honorable, so that, in what they slander you as evildoers, by observing your good works they may glorify God on the day of visitation.'
translation:
  language: ko
  text: '이방인들 가운데서 여러분의 행실을 선하게 가지십시오. 그래서 그들이 여러분을 행악자라 비방하는 그 일에서, 여러분의 선한 일들을 보고 권고하시는 날에 하나님께 영광을 돌리게 하려는 것입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀναστροφὴν ... καλήν
  english_pob_choice: conduct ... honorable
  chosen_korean: 행실을 선하게
  alternatives_korean:
  - 처신을 아름답게
  - 삶의 방식을 선하게
  lexicon: BDAG
  rationale: 1:15·1:17·1:18의 ἀναστροφή를 「행실」로 옮긴 것과 통일.
- source_word: ἐν τοῖς ἔθνεσιν
  english_pob_choice: among the Gentiles
  chosen_korean: 이방인들 가운데서
  alternatives_korean:
  - 이방 사람들 사이에서
  - 열방 가운데
  lexicon: BDAG
  rationale: 한국 성서 전통의 「이방인」 유지.
- source_word: καταλαλοῦσιν
  english_pob_choice: slander
  chosen_korean: 비방하는
  alternatives_korean:
  - 헐뜯는
  lexicon: BDAG
  rationale: 2:1의 καταλαλιάς(비방)와 동근 어휘. 통일하여 「비방하다」 사용.
- source_word: ἐποπτεύοντες
  english_pob_choice: observing
  chosen_korean: 보고
  alternatives_korean:
  - 지켜보고
  - 목격하고
  lexicon: BDAG
  rationale: 3:2의 같은 어휘와 통일. ἐποπτεύω의 「유심히 지켜봄」 어감을 「보다」로 평이하게 옮긴다.
- source_word: ἐν ἡμέρᾳ ἐπισκοπῆς
  english_pob_choice: on the day of visitation
  chosen_korean: 권고하시는 날에
  alternatives_korean:
  - 돌아보시는 날에
  - 방문하시는 날에
  lexicon: BDAG
  rationale: ἐπισκοπή는 「하나님의 방문·돌보심·심판하심」을 모두 함의. 한국 성서 전통의 「권고」를 채택하되, 종말적 「돌아보심」의 함의를 살린다.
