review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del hebreo: fórmula temporal profética, vergüenza de los profetas respecto de su visión, rechazo del atuendo profético y finalidad de engañar. Sin embargo, la nota [a] introduce una alternativa que no corresponde al punto léxico preservado en el rastro inglés, y además omite la alternativa importante de לְמַעַן כַּחֵשׁ (''para mentir'' / ''para engañar'').'
  spanish_quality_summary: El español es claro, natural y digno. 'En aquel día', 'se avergonzarán', 'cada uno de su visión' y 'para engañar' son buenas decisiones. La frase 'cuando profetice' es aceptable, aunque el plural distributivo podría sugerir también 'cuando profeticen'; no es un problema serio porque depende de 'cada uno'. La principal necesidad es corregir el aparato de notas para que siga el audit trail y evite crear una nota secundaria menos relevante.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Los profetas' respeta la decisión de no añadir 'falsos'. 'Manto de pelo' es adecuado para אַדֶּרֶת שֵׂעָר. 'Para engañar' concuerda con la decisión contextual para כַּחֵשׁ, pero debe conservarse en nota la alternativa 'para mentir'.
