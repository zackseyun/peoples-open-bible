base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/010/022.yaml
  text: The sound of a report—behold[a], it is coming!—a great commotion from the land of the north, to make the cities of Judah a desolation[c][b], a haunt of jackals.
  footnotes:
  - marker: a
    text: Or 'a great shaking' or 'a great tumult.' The Hebrew term can denote shaking, noise, or upheaval.
    reason: lexical_alternative
  - marker: b
    text: Or 'a dwelling place of jackals.'
    reason: lexical_alternative
  - marker: c
    text: Traditionally 'dragons' in older English versions; the Hebrew likely refers to jackals in this desolation context.
    reason: alternative_reading
