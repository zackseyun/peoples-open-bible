translation:
  language: es
  text: Y Aram de Damasco[b][a] vino a ayudar a Hadadezer, rey de Zobá, y David abatió a veintidós mil hombres de Aram.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «los arameos de Damasco»; tradicionalmente, «los sirios de Damasco».
    reason: lexical_alternative
  - marker: b
    text: El nombre se escribe aquí «Hadadezer»; en pasajes paralelos aparece la variante «Hadarezer».
    reason: alternative_reading
lexical_decisions:
- source_word: אֲרַם דַּרְמֶשֶׂק
  english_pob_choice: Aram of Damascus
  chosen_spanish: Aram de Damasco
  alternatives_spanish:
  - los arameos de Damasco
  - Siria de Damasco
  - los sirios de Damasco
  lexicon: HALOT
  rationale: Conservo Aram como nombre regional/étnico para mantener el sentido hebreo y evitar la lectura histórica posterior de «Siria» como sustituto automático. «De Damasco» reproduce la relación genitiva sin ampliar el significado.
- source_word: לַעְזוֹר
  english_pob_choice: to help
  chosen_spanish: ayudar
  alternatives_spanish:
  - asistir
  - apoyar
  lexicon: HALOT
  rationale: El infinitivo de עזר expresa ayuda o asistencia. «Ayudar» es natural en español y suficiente para el contexto militar sin introducir matices no requeridos.
- source_word: הֲדַדְעֶזֶר
  english_pob_choice: Hadadezer
  chosen_spanish: Hadadezer
  alternatives_spanish:
  - Hadarezer
  lexicon: HALOT
  rationale: Sigo la forma consonántica de Crónicas, que favorece «Hadadezer»; la variante «Hadarezer» pertenece a pasajes paralelos, no a este verso.
- source_word: מֶלֶךְ צוֹבָה
  english_pob_choice: king of Zobah
  chosen_spanish: rey de Zobá
  alternatives_spanish:
  - rey de Sobá
  lexicon: HALOT
  rationale: Mantengo el título real y el topónimo con transliteración estable. «Zobá» respeta mejor la forma hebrea que una adaptación no documentada aquí.
- source_word: וַיַּךְ
  english_pob_choice: struck down
  chosen_spanish: derribó
  alternatives_spanish:
  - hirió
  - golpeó
  - venció
  lexicon: HALOT
  rationale: En contexto bélico, נכה puede expresar golpear, herir o derrotar. «Derribó» comunica la violencia del golpe y la derrota resultante sin cerrar indebidamente la forma exacta del resultado, acorde con la cautela del inglés POB.
- source_word: בַּאֲרָם
  english_pob_choice: of Aram
  chosen_spanish: de Aram
  alternatives_spanish:
  - entre los arameos
  - a los arameos
  lexicon: HALOT
  rationale: La preposición con el etnónimo se expresa de manera natural como «de Aram» tras el complemento de cantidad, preservando el referente étnico-geográfico sin añadir interpretación.
- source_word: עֶשְׂרִים וּשְׁנַיִם אֶלֶף אִישׁ
  english_pob_choice: twenty-two thousand men
  chosen_spanish: veintidós mil hombres
  alternatives_spanish:
  - veintidós mil tropas
  - veintidós mil hombres de guerra
  lexicon: HALOT
  rationale: La frase hebrea dice literalmente «veinte y dos mil hombre(s)». «Hombres» es la equivalencia directa y sobria; evitar «tropas» o «hombres de guerra» preserva la precisión sin expansión.
translation_notes:
  revision_awareness: 'El registro coincide con el pasaje hebreo y con el audit trail inglés: se conservan Aram/Hadadezer, se mantiene la estructura narrativa simple y no se añaden interpretaciones militares o históricas ajenas al texto. No hubo revisiones aplicadas en el pasaje fuente, y el estado de concordancia alto confirma estabilidad textual.'
  spanish_consistency_notes:
  - He mantenido «Aram» en el texto principal y reservado la alternativa étnica tradicional en nota, para conservar la tensión léxica documentada.
  - «Zobá» sigue la transliteración del topónimo en una forma española legible.
  - 'El número y la unidad de medida permanecen literales: «veintidós mil hombres».'
  - La puntuación y el orden conservan un español natural sin perder la sintaxis hebrea básica del relato.
