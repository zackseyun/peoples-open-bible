translation:
  language: es
  text: Me rodearon[a], sí, me rodearon; en el nombre de Yahvé, los abatí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me cercaron»; el hebreo puede expresarse con la imagen de un cerco hostil.
    reason: lexical_alternative
  - marker: b
    text: O «los rechacé» o «los corté»; el verbo hebreo comunica una acción decisiva contra los enemigos.
    reason: lexical_alternative
lexical_decisions:
- source_word: סַבּוּנִי
  english_pob_choice: they surrounded me
  chosen_spanish: me rodearon
  alternatives_spanish:
  - me cercaron
  - me encircledon
  lexicon: HALOT
  rationale: El hebreo expresa la acción de rodear con hostilidad. «Me rodearon» es natural en español y conserva la imagen de cerco enemigo sin volver el verso artificioso. También permite mantener la repetición enfática del paralelismo.
- source_word: גַם
  english_pob_choice: 'yes'
  chosen_spanish: sí
  alternatives_spanish:
  - también
  - ciertamente
  - incluso
  lexicon: HALOT
  rationale: Aquí גַם refuerza la repetición anterior; no añade un elemento nuevo. «Sí» transmite bien la intensificación afirmativa en español y preserva el ritmo poético.
- source_word: סְבָבוּנִי
  english_pob_choice: they surrounded me
  chosen_spanish: me rodearon
  alternatives_spanish:
  - me cercaron
  - me encircledon
  lexicon: HALOT
  rationale: Se conserva la misma traducción que en la primera cláusula para respetar la repetición deliberada del hebreo. El paralelismo aumenta la presión narrativa y debe oírse también en español.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: in the name of Yahweh
  chosen_spanish: en el nombre de Yahvé
  alternatives_spanish:
  - por el nombre de Yahvé
  - invocando el nombre de Yahvé
  lexicon: HALOT
  rationale: 'La preposición בְּ con «nombre» expresa agencia/apelación: actuar bajo la autoridad y el poder del nombre divino. Se mantiene «Yahvé» según la convención del proyecto para יְהוָה, sin sustituirlo por un título.'
- source_word: כִּי
  english_pob_choice: I cut them down
  chosen_spanish: los derribé
  alternatives_spanish:
  - pues los derribé
  - porque los derribé
  - los corté abajo
  lexicon: HALOT
  rationale: La cláusula funciona como afirmación causal o explicativa, pero en español el sentido queda claro sin añadir una conjunción pesada. «Derribé» comunica la acción decisiva y violenta del verbo en este contexto poético.
- source_word: אֲמִילַם
  english_pob_choice: I cut them down
  chosen_spanish: los derribé
  alternatives_spanish:
  - los corté
  - los abatí
  - los hice caer
  lexicon: HALOT
  rationale: El verbo hifil transmite acción enérgica contra los enemigos. «Los derribé» preserva la fuerza de la imagen y funciona bien con el tono bélico del salmo, sin debilitarla con una expresión demasiado general.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se sigue la política del proyecto de transliterar el Tetragrámaton como nombre propio. «Yahvé» conserva el carácter personal y pactal del nombre revelado, en lugar de ocultarlo tras un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor del cierre verbal en la línea final
  english_pob_reading: I cut them down
  chosen_spanish_reading: los derribé
  alternative_spanish_readings:
  - los corté
  - los abatí
  - los hice caer
  rationale: No se atenúa el golpe del verbo hebreo. La lectura elegida conserva la fuerza de una acción contundente contra enemigos que cercan al salmista, en coherencia con el tono de victoria del contexto.
  doctrine_reference: Lexical force in poetic battle imagery
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada recientemente y quedó sin cambios; el presente borrador español sigue esa misma lectura básica, ajustando únicamente la expresión natural del español y la convención del proyecto para el nombre divino.
  spanish_consistency_notes:
  - Se mantuvo la repetición de «me rodearon» en ambas cláusulas para preservar el paralelismo hebreo.
  - Se usó «Yahvé» consistentemente para יְהוָה, conforme al estándar español del proyecto.
  - Se eligió un verbo final de fuerza contundente («derribé») para conservar el valor bélico del hebreo sin introducir una paráfrasis más débil.
  - El tono es bíblico y digno, pero en español moderno y fluido.
