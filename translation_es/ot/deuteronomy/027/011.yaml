  text: 'Y en aquel día Moisés mandó al pueblo, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיְצַו
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - dio instrucciones a
  - encargó
  lexicon: HALOT
  rationale: צוה expresa una orden o mandato con autoridad. En español, «mandó» comunica mejor ese matiz fuerte y narrativo que una fórmula más suave como «dio instrucciones a».
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moyses
  lexicon: transliteración estándar
  rationale: Se conserva el nombre propio tradicional en español, como corresponde a un antropónimo bíblico ampliamente asentado.
- source_word: אֶת הָעָם
  english_pob_choice: the people
  chosen_spanish: al pueblo
  alternatives_spanish:
  - al pueblo de Israel
  - a la gente
  lexicon: HALOT
  rationale: עָם aquí se refiere colectivamente a Israel. «Al pueblo» es natural en español y conserva el referente colectivo sin añadir información no explícita.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - en aquel día
  - ese día
  lexicon: HALOT
  rationale: La construcción temporal se expresa con naturalidad en español como «aquel día». Mantiene la referencia demostrativa del hebreo sin sobrecargar la frase.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - así
  lexicon: HALOT
  rationale: El infinitivo introduce el discurso siguiente. «Diciendo» preserva la conexión narrativa formal sin anticipar ni resumir el contenido.
translation_notes:
  revision_awareness: El texto inglés auditado no introdujo notas, variantes ni revisiones; la versión española sigue de cerca el sentido del hebreo y mantiene la estructura narrativa simple del versículo.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque aquí no aparece el Tetragrámaton ni una sustitución por κύριος.
  - Se mantiene el tono narrativo legal e introductorio propio del hebreo con una sintaxis española natural.
