translation:
  language: es
  text: los de Netebas[a], cincuenta y cinco; los de Enatos, ciento cincuenta y ocho[b]; los de Baitasmon Zamoth.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los nombres griegos de este versículo difieren notablemente del paralelo hebreo aproximado de Nehemías 7:25, que en la tradición masorética lee «los hijos de Gueba/Gibbar, noventa y cinco». Como 1 Esdras conserva aquí una forma distinta de la lista y de los nombres, la traducción sigue de cerca el testimonio griego en lugar de armonizarlo con el hebreo.
    reason: textual_variant
  - marker: b
    text: El último nombre de lugar es textualmente difícil en griego y puede reflejar un topónimo compuesto o corrupto; por eso se mantiene por transliteración.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἐκ
  english_pob_choice: those from
  chosen_spanish: los de
  alternatives_spanish:
  - los procedentes de
  - los que eran de
  lexicon: LSJ
  rationale: En esta lista censal, la expresión marca pertenencia u origen local. «Los de» transmite de forma natural el valor locativo sin añadir «hijos de», que correspondería a otra tradición paralela y no al griego base.
- source_word: Νετέβας
  english_pob_choice: Netebas
  chosen_spanish: Netebas
  alternatives_spanish:
  - Netebas como nombre propio incierto
  lexicon: LSJ
  rationale: Se translitera el nombre propio del testimonio griego. No se normaliza a un equivalente hebreo porque el griego es la fuente primaria aquí y el paralelo hebreo es aproximado.
- source_word: πεντήκοντα πέντε
  english_pob_choice: fifty-five
  chosen_spanish: cincuenta y cinco
  alternatives_spanish:
  - cincuenta y cinco
  lexicon: LSJ
  rationale: Número cardinal directo y transparente; no presenta dificultad de traducción.
- source_word: Ἐνάτου
  english_pob_choice: Enatos
  chosen_spanish: Enatos
  alternatives_spanish:
  - Enatu
  - Enatou
  lexicon: LSJ
  rationale: Se conserva la forma transliterada del topónimo en una forma española legible, siguiendo el criterio del POB inglés de mantener el nombre griego sin armonizarlo con el paralelo hebreo.
- source_word: ἑκατὸν πεντήκοντα ὀκτώ
  english_pob_choice: one hundred fifty-eight
  chosen_spanish: ciento cincuenta y ocho
  alternatives_spanish:
  - ciento cincuenta y ocho
  lexicon: LSJ
  rationale: Número cardinal directo; la forma española sigue el orden natural moderno sin alterar el contenido.
- source_word: Βαιτασμῶν Ζαμμώθ
  english_pob_choice: Baitasmon Zamoth
  chosen_spanish: Baitasmón Zamot
  alternatives_spanish:
  - Baitasmón Zamot
  - Betasmón Zamot
  - Baitasmon Zamoth
  lexicon: LSJ
  rationale: El pasaje es textualmente difícil y parece conservar un topónimo compuesto o corrupto. Se opta por transliteración cercana al griego, manteniendo la dificultad sin una normalización especulativa.
theological_decisions:
- issue: Preservación del paralelo textual griego frente al hebreo aproximado
  english_pob_reading: The translation follows the Greek witness closely rather than harmonizing to the Hebrew.
  chosen_spanish_reading: La traducción sigue de cerca el testimonio griego en vez de armonizarlo con el hebreo.
  alternative_spanish_readings:
  - armonizar con el paralelo hebreo
  - reformular según la lista de Nehemías
  rationale: No hay motivo textual para sustituir el listado griego por una lista paralela distinta. Mantener la forma griega preserva la evidencia documental y evita borrar una diferencia transmitida por la tradición de 1 Esdras.
  doctrine_reference: Principio de crítica textual y fidelidad al testimonio base
translation_notes:
  revision_awareness: El texto griego es la ancla principal; el paralelo hebreo sirve solo como verificación de nombres y de la forma de la lista. No se aplicaron revisiones previas y se conserva la lectura difícil del final en transliteración.
  spanish_consistency_notes:
  - Se usa «los de» para οἱ ἐκ en listas de procedencia, evitando un calco innecesario.
  - Se transliteran los topónimos griegos de manera consistente y sin armonizarlos con el paralelo hebreo.
  - Los números cardinales se expresan en español moderno y no se conserva ninguna notación arcaica.
  - Se mantiene la distinción entre una lista griega propia de 1 Esdras y su paralelo hebreo aproximado.
