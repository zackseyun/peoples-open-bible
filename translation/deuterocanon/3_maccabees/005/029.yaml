id: 3MA.5.29
reference: 3 Maccabees 5:29
source:
  edition: lxx-swete-1909
  text: ὑπεδείκνυεν ὁ Ἕρμων καὶ πάντες οἱ φίλοι τὰ θηρία καὶ τὰς δυνάμεις Ἡτοίμασται, βασιλεῦ, κατὰ τὴν σὴν ἐκείνην πρόθεσιν.
  language: Greek
  pages:
  - 744
  confidence: high
  validation: agree
translation:
  text: 'Hermon was showing them the beasts and all the forces: “They are prepared[a], O king[c][b], according to that intention of yours.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'was pointing out' or 'was displaying'; the Greek imperfect suggests ongoing action.
    reason: lexical_alternative
  - marker: b
    text: '''The friends'' may refer to royal associates or courtiers in a Hellenistic court setting.'
    reason: cultural_note
  - marker: c
    text: Or 'according to that plan of yours.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπεδείκνυεν
  chosen: was showing
  alternatives:
  - was pointing out
  - was indicating
  - was displaying
  lexicon: LSJ
  rationale: Imperfect tense suggests ongoing or progressive action. In context Hermon is presenting or pointing out the prepared resources to the king, so 'was showing' is natural modern English while preserving the durative sense.
- source_word: ὁ Ἕρμων
  chosen: Hermon
  alternatives:
  - Herman
  rationale: Personal names are transliterated by standard convention per project philosophy. 'Hermon' closely reflects the Greek form Ἕρμων.
- source_word: οἱ φίλοι
  chosen: the friends
  alternatives:
  - his friends
  - the companions
  - the courtiers
  lexicon: LSJ
  rationale: The phrase literally means 'the friends.' In Hellenistic court context it can denote royal associates or courtiers, but the Greek itself does not explicitly mark that nuance here. The sense is represented in English by retaining 'friends' in the clause structure through 'and all the forces'; however the final rendering smooths the sentence by making Hermon the explicit subject and leaving the associated group implicit in the presentation scene.
- source_word: τὰ θηρία
  chosen: the beasts
  alternatives:
  - the animals
  lexicon: LSJ
  rationale: In this context the reference is to the elephants or dangerous animals prepared for execution. 'Beasts' preserves the ominous force better than the flatter 'animals.'
- source_word: τὰς δυνάμεις
  chosen: all the forces
  alternatives:
  - the troops
  - the forces
  - the units
  lexicon: LSJ
  rationale: δύναμις in the plural commonly refers to forces or military strength. 'All the forces' fits the article and plural and leaves the exact composition broad, as in the Greek.
- source_word: Ἡτοίμασται
  chosen: They are prepared
  alternatives:
  - They have been prepared
  - Everything is ready
  lexicon: LSJ
  rationale: Perfect/passive sense indicates a present state resulting from preparation. 'They are prepared' preserves the plural agreement with the previously mentioned beasts and forces and keeps close to the Greek.
- source_word: βασιλεῦ
  chosen: O king
  alternatives:
  - king
  - your majesty
  lexicon: LSJ
  rationale: Vocative direct address is best represented by 'O king' in elevated but still understandable English. 'Your majesty' would be more interpretive than the Greek.
- source_word: κατὰ τὴν σὴν ἐκείνην πρόθεσιν
  chosen: according to that intention of yours
  alternatives:
  - according to that plan of yours
  - in keeping with your purpose then
  - according to your former intention
  lexicon: LSJ
  rationale: πρόθεσις can mean plan, purpose, or intention. 'Intention' preserves the king's prior resolve without over-specifying a formal plan. ἐκείνην adds a deictic or retrospective force, captured by 'that ... of yours.'
