    text: O «en una de tus ciudades» o «en uno de tus pueblos»; literalmente, «en una de tus puertas».
    reason: lexical_alternative
  - marker: b
    text: O «al violar su pacto» o «al quebrantar su pacto».
    reason: lexical_alternative
  revision_rationale: 'Se corrige «entre ti» a «entre ustedes» para preservar el sentido comunitario de בְּקִרְבְּךָ en un español natural y ampliamente legible. Se simplifican y reubican las notas para alinearlas con el rastro auditado: una nota léxica sobre «puertas» y otra sobre «transgredir su pacto». Se mantiene «Yahvé» y «pacto» conforme a la terminología del proyecto.'
