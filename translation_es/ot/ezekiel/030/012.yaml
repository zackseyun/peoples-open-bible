translation:
  language: es
  text: Y secaré los canales del Nilo[a], y venderé[b] la tierra en manos de hombres malos; y devastaré la tierra y su plenitud[c] por mano de extranjeros. Yo, Yahvé, he hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los canales» o «los ríos»; en el contexto de Egipto, el término probablemente se refiere a las vías de agua del Nilo.
    reason: lexical_alternative
  - marker: b
    text: O «entregaré la tierra» o «pondré la tierra en manos de»; el verbo hebreo es literalmente «vender», una imagen de juicio para entregar un pueblo al poder hostil.
    reason: lexical_alternative
  - marker: c
    text: O «la tierra y todo lo que hay en ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: יְאֹרִים
  english_pob_choice: the Nile channels
  chosen_spanish: los canales del Nilo
  alternatives_spanish:
  - los canales
  - los ríos
  - los cauces del Nilo
  lexicon: HALOT
  rationale: En el contexto egipcio de Ezequiel, יְאֹרִים se refiere a las aguas del Nilo y sus conductos, no a ríos genéricos. «Canales del Nilo» conserva el referente egipcio y comunica bien la imagen sin volver el español artificial.
- source_word: חָרָבָה
  english_pob_choice: dry
  chosen_spanish: secos
  alternatives_spanish:
  - en sequedad
  - en tierra seca
  - desecados
  lexicon: HALOT
  rationale: Con נתן en esta construcción, el sentido es volver secos los cursos de agua. En español, «haré secos» es natural y mantiene la fuerza del acto divino.
- source_word: וּמָכַרְתִּי
  english_pob_choice: I will sell
  chosen_spanish: venderé
  alternatives_spanish:
  - entregaré
  - pondré en manos de
  lexicon: HALOT
  rationale: «Venderé» conserva el verbo literal del hebreo y la imagen judicial de abandono o entrega a poder hostil. Se evita suavizarlo demasiado con un equivalente interpretativo.
- source_word: בְּיַד רָעִים
  english_pob_choice: into the hand of evil men
  chosen_spanish: en mano de hombres malos
  alternatives_spanish:
  - en mano de hombres perversos
  - en poder de hombres malos
  - en mano de los impíos
  lexicon: HALOT
  rationale: Se mantiene la fórmula idiomática «en mano de» para reflejar dominio o poder. «Hombres malos» traduce el adjetivo sustantivado sin especificar más de lo que el texto dice.
- source_word: וַהֲשִׁמֹּתִי
  english_pob_choice: I will devastate
  chosen_spanish: asolará
  alternatives_spanish:
  - devastaré
  - dejaré desolada
  - arruinaré
  lexicon: HALOT
  rationale: En español, «asolar» expresa bien la acción devastadora del causativo hebreo con un registro digno y profético.
- source_word: אֶרֶץ וּמְלֹאָהּ
  english_pob_choice: the land and its fullness
  chosen_spanish: la tierra y su plenitud
  alternatives_spanish:
  - la tierra y todo lo que la llena
  - la tierra y cuanto hay en ella
  lexicon: HALOT
  rationale: Se adopta «plenitud» para acercarse a מְלֹאָהּ, manteniendo el paralelismo formal y la amplitud semántica de la expresión hebrea.
- source_word: בְּיַד זָרִים
  english_pob_choice: by the hand of foreigners
  chosen_spanish: en mano de extranjeros
  alternatives_spanish:
  - por mano de extranjeros
  - en poder de extranjeros
  - en mano de forasteros
  lexicon: HALOT
  rationale: «Extranjeros» reproduce bien זָרִים como invasores u outsiders. Se conserva la misma fórmula idiomática «en mano de» para mantener la coherencia retórica con el primer hemistiquio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se usa «Yahvé» conforme al criterio del proyecto para el Tetragrámaton, preservando el nombre divino personal en lugar de una sustitución titular.
- source_word: דִּבַּרְתִּי
  english_pob_choice: I have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - lo he dicho
  - hablé
  lexicon: HALOT
  rationale: 'La fórmula profética queda bien en pretérito perfecto: «he hablado», que en español transmite la solemnidad y certeza del decreto divino.'
theological_decisions:
- issue: Uso del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Según la convención del proyecto, se preserva el nombre divino personal «Yahvé» en vez de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Imagen judicial de ‘vender’ la tierra
  english_pob_reading: I will sell the land into the hand of evil men
  chosen_spanish_reading: venderé la tierra en mano de hombres malos
  alternative_spanish_readings:
  - entregaré la tierra en mano de hombres malos
  - venderé la tierra al poder de hombres malos
  rationale: El verbo hebreo מכר se conserva como «vender», porque forma parte de la imaginería judicial de la entrega divina al poder enemigo. No se neutraliza la metáfora con una paráfrasis más general.
  doctrine_reference: Prophetic judgment imagery in the Hebrew text
translation_notes:
  revision_awareness: La redacción sigue el pasaje hebreo con alta concordancia con la auditoría inglesa más reciente. Se mantuvo el valor literal de מכר como «vender», se actualizó מְלֹאָהּ a «su plenitud» para reflejar mejor la forma hebrea, y se conservó la referencia egipcia específica de יְאֹרִים mediante «los canales del Nilo».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma uniforme del nombre divino.
  - Se conserva la fórmula idiomática «en mano de» para בְּיַד en ambos miembros paralelos.
  - «Hombres malos» y «extranjeros» reflejan el contraste entre רָעִים y זָרִים sin añadir matices no presentes en el hebreo.
  - La puntuación sigue el paralelismo profético de una sola línea con dos miembros y la declaración conclusiva divina.
