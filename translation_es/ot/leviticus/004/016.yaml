    issue: «tabernáculo de reunión» en el texto principal para אֹהֶל מוֹעֵד
    rationale: La auditoría inglesa eligió «tent of meeting» como equivalente principal y dejó «tabernacle» como alternativa tradicional. En español, «tienda de reunión» preserva mejor la transparencia del hebreo y la filosofía del proyecto.
  - severity: low
    issue: La nota b está invertida respecto de la preferencia principal
    rationale: Si el texto principal usa la forma más literal, la nota debe presentar «tabernáculo» como alternativa tradicional, no al revés.
