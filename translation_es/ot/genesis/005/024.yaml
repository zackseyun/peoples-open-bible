translation:
  language: es
  text: Enoc caminó con Dios[a], y ya no estaba, porque Dios lo tomó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «y no estaba». La expresión hebrea indica que Enoc ya no se hallaba presente.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְהַלֵּךְ
  english_pob_choice: walked
  chosen_spanish: caminó
  alternatives_spanish:
  - anduvo
  - vivió
  lexicon: HALOT
  rationale: El hitpael de הלך expresa aquí un modo continuo de vida o conducta, no solo desplazamiento físico. «Caminó» conserva el idiomatismo bíblico y la dimensión relacional/moral de «walked with God» sin sobre-explicitar.
- source_word: אֶת הָאֱלֹהִים
  english_pob_choice: with God
  chosen_spanish: con Dios
  alternatives_spanish:
  - ante Dios
  lexicon: HALOT
  rationale: Con el verbo de movimiento/conducta, אֶת marca acompañamiento. «Con Dios» es la lectura directa y natural en español, y mantiene el matiz de cercanía relacional del hebreo.
- source_word: וְאֵינֶנּוּ
  english_pob_choice: and he was no more
  chosen_spanish: y ya no estaba
  alternatives_spanish:
  - y no estaba
  - y desapareció
  lexicon: HALOT
  rationale: 'El hebreo es breve y sobrio: literalmente «y no estaba». «Ya no estaba» comunica ausencia o desaparición sin añadir demasiado ni resolver cómo ocurrió.'
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Aquí introduce la razón de su ausencia. «Porque» expresa con naturalidad la relación causal en español moderno.
- source_word: לָקַח אֹתוֹ
  english_pob_choice: took him
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo llevó
  - lo recibió
  lexicon: HALOT
  rationale: לָקַח significa normalmente «tomar». «Lo tomó» preserva la literalidad mínima del hebreo y mantiene la reserva del texto sobre el modo exacto de la acción divina.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: HALOT
  rationale: En este relato el referente es el Dios único de Israel; «Dios» es la equivalencia directa y adecuada en español.
theological_decisions:
- issue: Si explicitar la naturaleza de la desaparición de Enoc (muerte, traslado, asunción al cielo)
  english_pob_reading: 'Retain the text''s restrained wording: ''he was no more, because God took him.'''
  chosen_spanish_reading: 'Mantener la sobriedad del hebreo: «ya no estaba, porque Dios lo tomó».'
  alternative_spanish_readings:
  - no murió, porque Dios lo tomó
  - Dios lo llevó al cielo
  - Dios lo trasladó
  rationale: El hebreo sugiere una remoción extraordinaria, pero no dice explícitamente «al cielo» ni formula de manera directa la negación de la muerte en este versículo. La traducción conserva esa tensión teológica en lugar de resolverla con una explicación posterior.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No hay revisiones aplicadas; el texto fuente y el auditor inglés muestran alto acuerdo y una lectura estable.
  spanish_consistency_notes:
  - Se conserva «Dios» de manera uniforme para אֱלֹהִים.
  - Se mantiene el paralelismo sobrio del hebreo sin añadir detalles interpretativos.
  - El verbo principal se traduce con un equivalente idiomático español («caminó») para reflejar conducta continua, no simple locomoción.
