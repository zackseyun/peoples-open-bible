translation:
  language: es
  text: Y algunos de los hijos de los sacerdotes eran preparadores del ungüento de especias[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «preparadores de la mezcla perfumada para las especias aromáticas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִן
  english_pob_choice: And some of
  chosen_spanish: Y de entre
  alternatives_spanish:
  - Y algunos de
  - Y de
  lexicon: HALOT
  rationale: La construcción hebrea tiene sentido partitivo en un listado. «Y de entre» conserva ese valor sin forzar una traducción demasiado literal ni introducir una cuantificación más explícita de la que exige el texto.
- source_word: בְּנֵי הַכֹּהֲנִים
  english_pob_choice: the sons of the priests
  chosen_spanish: los hijos de los sacerdotes
  alternatives_spanish:
  - los hijos de los sacerdotes
  - los descendientes de los sacerdotes
  - los hijos sacerdotales
  lexicon: HALOT
  rationale: Se mantiene la expresión familiar/genealógica del hebreo. «Sacerdotes» traduce correctamente הַכֹּהֲנִים y conserva el sabor cronístico de linajes y funciones.
- source_word: רֹקְחֵי
  english_pob_choice: compounders
  chosen_spanish: los que preparaban
  alternatives_spanish:
  - los que componían
  - los compuestos de
  - los mezcladores
  lexicon: HALOT
  rationale: El participio describe a quienes preparan una mezcla compuesta. En español, «preparaban» comunica la acción técnica sin sonar demasiado técnico o arcaico; «componían» o «mezclaban» podrían ser alternativas, pero «preparaban» es más natural y amplio.
- source_word: הַמִּרְקַחַת
  english_pob_choice: the ointment
  chosen_spanish: el ungüento
  alternatives_spanish:
  - la mezcla
  - la composición
  - el perfume
  lexicon: HALOT
  rationale: El sustantivo designa una preparación compuesta, a menudo ungüento o perfume. «Ungüento» es una opción española clara y tradicional para una sustancia preparada con fines aromáticos o ungentes, sin precisar más de lo que el hebreo garantiza.
- source_word: לַבְּשָׂמִים
  english_pob_choice: of spices
  chosen_spanish: de especias
  alternatives_spanish:
  - de aromas
  - de sustancias aromáticas
  - para las especias
  lexicon: HALOT
  rationale: בְּשָׂמִים refiere a sustancias aromáticas/especias. «De especias» reproduce de forma natural la relación nominal que la POB inglesa decidió también reflejar con «of spices» en su revisión.
translation_notes:
  revision_awareness: 'La redacción sigue el criterio revisado de la POB inglesa: no reduce רֹקְחֵי a un verbo generalizante sin más, sino que conserva la idea de preparación compuesta; además, refleja la relación nominal final como «de especias», evitando interpretar de modo excesivo el propósito o el contenido exacto de la mezcla.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» u այլ máscara porque el versículo no contiene el nombre divino.
  - «Ungüento» mantiene la ambigüedad entre una composición aromática y una preparación ungente, coherente con el hebreo y con la nota alternativa.
  - La nota al pie ofrece una alternativa de lectura léxica, no una variante textual.
