translation:
  language: es
  text: '¡Lamenten por él[a], todos los que lo rodean, y todos los que conocen su nombre[b], digan: «¡Cómo se ha quebrado el cetro[c] de poder, la vara[c] de esplendor!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sacudan la cabeza por él» o «Háganle duelo»; el verbo hebreo puede denotar lamento, a menudo acompañado de un gesto físico.'
    reason: lexical_alternative
  - marker: b
    text: «Conocen su nombre» también puede implicar «conocen su fama» o reputación.
    reason: lexical_alternative
  - marker: c
    text: Ambos términos hebreos pueden traducirse «cetro», «vara» o «bastón»; la imagen probablemente comunica el poder y el honor de Moab, ahora quebrados.
    reason: lexical_alternative
lexical_decisions:
- source_word: נֻדוּ
  english_pob_choice: Mourn
  chosen_spanish: ¡Lamenten
  alternatives_spanish:
  - Lloren
  - Plañan
  - Mueran de dolor
  lexicon: HALOT
  rationale: El hebreo puede expresar duelo con un gesto físico de lamento; en español, “lamenten” transmite esa exhortación de duelo sin volverla demasiado literal o extraña.
- source_word: לּוֹ
  english_pob_choice: for him
  chosen_spanish: por él
  alternatives_spanish:
  - sobre él
  - por ello
  lexicon: HALOT
  rationale: El sufijo masculino singular se conserva con referencia a Moab personificado. “Por él” mantiene la persona retórica del texto y suena natural en español.
- source_word: כָּל סְבִיבָיו
  english_pob_choice: all you around him
  chosen_spanish: todos los que lo rodean
  alternatives_spanish:
  - todos ustedes que están a su alrededor
  - todos sus vecinos
  - todos los de alrededor
  lexicon: HALOT
  rationale: La expresión apunta a los que están en torno a Moab/personificación. En español, la construcción relativa conserva el sentido vocativo sin forzar “ustedes” si el contexto no lo exige explícitamente.
- source_word: וְכֹל יֹדְעֵי שְׁמוֹ
  english_pob_choice: and all who know his name
  chosen_spanish: y todos los que conocen su nombre
  alternatives_spanish:
  - y todos los que conocen su fama
  - y todos los que lo conocen por nombre
  lexicon: HALOT
  rationale: “Nombre” preserva la ambigüedad hebrea entre nombre literal y reputación. No se resuelve a “fama” en el texto principal para no cerrar una tensión que el original permite.
- source_word: אִמְרוּ
  english_pob_choice: say
  chosen_spanish: diciendo
  alternatives_spanish:
  - digan
  - clamen
  - proclamen
  lexicon: HALOT
  rationale: Aquí funciona como introducción de la lamentación citada. “Diciendo” enlaza de manera fluida la orden con la exclamación en español.
- source_word: אֵיכָה
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¡Ay, cómo
  - ¡Cuán
  lexicon: HALOT
  rationale: La interjección se mantiene con una exclamación directa en español. “¿Cómo?” conserva el tono de lamentación y la forma breve del hebreo.
- source_word: נִשְׁבַּר
  english_pob_choice: is broken
  chosen_spanish: se ha quebrado
  alternatives_spanish:
  - está quebrada
  - ha sido quebrada
  - se rompió
  lexicon: HALOT
  rationale: El perfecto nifal expresa el estado resultante de estar roto/quebrado. “Se ha quebrado” mantiene ese valor y la fuerza elegíaca del lamento.
- source_word: מַטֵּה עֹז
  english_pob_choice: the mighty scepter
  chosen_spanish: la vara[b] de poder
  alternatives_spanish:
  - el cetro de poder
  - el báculo de fuerza
  - la vara fuerte
  lexicon: HALOT
  rationale: מַטֶּה puede ser vara, bastón o cetro; en español “vara” deja abierta la imagen y sigue la tradición poética del paralelismo. “De poder” traduce עֹז con un término amplio que mantiene la fuerza/autoridad sin decidir demasiado pronto por una lectura exclusivamente monárquica.
- source_word: מַקֵּל תִּפְאָרָה
  english_pob_choice: the staff of splendor
  chosen_spanish: el cetro[c] de esplendor
  alternatives_spanish:
  - la vara de esplendor
  - el bastón de gloria
  - el cetro glorioso
  lexicon: HALOT
  rationale: מַקֵּל se solapa con el primer término, pero en español conviene variar ligeramente para conservar el paralelismo. “Esplendor” reproduce bien תִּפְאָרָה, y “cetro” permite una imagen digna y reconocible del poder caído.
translation_notes:
  revision_awareness: La versión española sigue el pasaje hebreo directamente y toma como contexto auditado la solución inglesa de mantener la exclamación elegíaca y la ambigüedad entre vara/cetro y nombre/fama. No se registraron revisiones posteriores que alteren el sentido.
  spanish_consistency_notes:
  - Se preservó la personificación de Moab con pronombres masculinos singulares.
  - Se mantuvo la ambigüedad de שֵׁם como “nombre” en vez de explicitar “fama” en el texto principal.
  - Se conservaron dos imágenes paralelas de autoridad/poder con vocabulario cercano pero no idéntico para respetar el hebreo.
  - La puntuación reproduce el estilo de lamento con cita introducida por gerundio.
