translation:
  language: es
  text: Así pues[a], cuando el tirano Antíoco había tomado asiento con su consejo en cierto lugar elevado, y sus tropas, completamente armadas, estaban de pie a su alrededor, por todos lados,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en cierto lugar alto». La frase griega indica un sitio elevado, no necesariamente un «alto lugar» cultual.
    reason: lexical_alternative
lexical_decisions:
- source_word: Προκαθίσας
  english_pob_choice: had taken his seat
  chosen_spanish: se hubo sentado
  alternatives_spanish:
  - se sentó
  - habiendo tomado asiento
  lexicon: LSJ
  rationale: El participio introduce la escena con una acción ya cumplida y un matiz de posición/autoridad. «Se hubo sentado» conserva ese valor anterior sin volverlo rígidamente literal.
- source_word: γέ τοι
  english_pob_choice: So then
  chosen_spanish: Así pues
  alternatives_spanish:
  - Entonces
  - Ahora bien
  lexicon: LSJ
  rationale: La partícula combina fuerza discursiva y transición. «Así pues» comunica bien el enlace narrativo sin añadir contenido nuevo.
- source_word: μετὰ τῶν συνέδρων
  english_pob_choice: with his council
  chosen_spanish: con su consejo
  alternatives_spanish:
  - con sus consejeros
  - con el consejo
  lexicon: LSJ
  rationale: συνέδρων se refiere a los que se sientan con él en consejo. «Su consejo» mantiene el sentido institucional y suena natural en español.
- source_word: ὁ τύραννος
  english_pob_choice: the tyrant
  chosen_spanish: el tirano
  alternatives_spanish:
  - el gobernante
  - el déspota
  lexicon: LSJ
  rationale: El griego usa un término evaluativo y negativo. «Tirano» conserva esa carga sin suavizarla a un título neutral.
- source_word: ἐπὶ τινος ὑψηλοῦ τόπου
  english_pob_choice: on a certain high place
  chosen_spanish: en un lugar elevado
  alternatives_spanish:
  - sobre un lugar elevado
  - en un sitio elevado
  lexicon: LSJ
  rationale: La frase indica un emplazamiento elevado; en español «lugar elevado» evita la ambigüedad cultual de «alto lugar» y sigue la nota auditada de que no necesariamente es un lugar de culto.
- source_word: τῶν στρατευμάτων
  english_pob_choice: troops
  chosen_spanish: sus tropas
  alternatives_spanish:
  - sus fuerzas
  - sus soldados
  lexicon: LSJ
  rationale: El plural colectivo militar se expresa de manera natural con «tropas»; el posesivo queda explícito por el contexto del genitivo.
- source_word: παρεστηκότων
  english_pob_choice: were standing
  chosen_spanish: estaban de pie
  alternatives_spanish:
  - estaban apostadas
  - se hallaban
  lexicon: LSJ
  rationale: El participio describe presencia y postura alrededor del rey. «Estaban de pie» reproduce la imagen visual sin tecnicismos.
- source_word: κυκλόθεν
  english_pob_choice: around on every side
  chosen_spanish: alrededor por todos lados
  alternatives_spanish:
  - por todas partes
  - en derredor
  lexicon: LSJ
  rationale: La idea central es el cerco completo. «Por todos lados» conserva el énfasis de encirclemento.
- source_word: εὐόπλων
  english_pob_choice: fully armed
  chosen_spanish: completamente armadas
  alternatives_spanish:
  - bien armadas
  - en completa armadura
  lexicon: LSJ
  rationale: El adjetivo indica equipamiento bélico completo. En español, «completamente armadas» mantiene el matiz sin introducir una imagen más específica de armadura.
theological_decisions:
- issue: Evaluación negativa de Antíoco en τύραννος
  english_pob_reading: Retain the explicitly negative term 'the tyrant' in the main text
  chosen_spanish_reading: Mantener «el tirano» en el texto principal
  alternative_spanish_readings:
  - el gobernante
  - el rey
  rationale: El texto fuente no presenta un título neutral sino una caracterización polémica. Traducirlo como «tirano» preserva la valoración autoral y evita atenuarla.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La fuente griega y el audit trail inglés están en alto acuerdo y no requieren cambios sustantivos; se preservó la lectura evaluativa de τύραννος y la nota sobre ἐπὶ τινος ὑψηλοῦ τόπου sin convertirla en un término cultual.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «consejo» se usa aquí como cuerpo asesor, coherente con la decisión inglesa sobre συνέδρων.
  - La puntuación reproduce una única cláusula larga, acorde con la sintaxis participial del griego.
