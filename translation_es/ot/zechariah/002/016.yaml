translation:
  language: es
  text: Yahvé heredará[a] a Judá como su porción, en la tierra santa[b], y volverá a escoger a Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tomará posesión de Judá como su herencia». El hebreo conserva lenguaje de herencia en lugar de usar un verbo más general de posesión.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre el suelo de santidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָחַל / וְנָחַ֨ל
  english_pob_choice: will inherit
  chosen_spanish: heredará
  alternatives_spanish:
  - tomará posesión de
  - tendrá como herencia
  lexicon: HALOT
  rationale: En contexto, נחל conserva la imagen de herencia y asignación de pacto. «Heredará» reproduce esa fuerza relacional mejor que un verbo genérico de posesión. El sujeto sigue siendo Yahvé, y el objeto es Judá.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre divino propio mediante la transliteración establecida en el proyecto. «Yahvé» mantiene la transparencia del Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: יְהוּדָה
  english_pob_choice: Judah
  chosen_spanish: Judá
  alternatives_spanish:
  - Judá
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma estándar al español.
- source_word: חֶלְקוֹ
  english_pob_choice: as his portion
  chosen_spanish: como su porción
  alternatives_spanish:
  - como su herencia
  - como su parte
  lexicon: HALOT
  rationale: חלק conserva la idea de porción/asignación. «Como su porción» mantiene el paralelismo con «heredará» sin perder el matiz de repartimiento o asignación.
- source_word: עַל אַדְמַת הַקֹּדֶשׁ
  english_pob_choice: in the holy land
  chosen_spanish: sobre la tierra santa
  alternatives_spanish:
  - en la tierra santa
  - sobre el suelo santo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sobre la tierra/suelo de santidad». «Sobre la tierra santa» conserva la preposición y la imagen territorial, evitando suavizarla demasiado con una paráfrasis más interpretativa.
- source_word: וּבָחַר עוֹד
  english_pob_choice: and he will again choose
  chosen_spanish: y volverá a escoger
  alternatives_spanish:
  - y escogerá otra vez
  - y nuevamente escogerá
  lexicon: HALOT
  rationale: בחר se traduce con «escoger» para mantener el verbo sencillo y directo. «Volverá a escoger» expresa bien el valor de עוֹד como acción renovada sin sonar rígido.
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalén
  lexicon: HALOT
  rationale: Nombre propio español estándar.
theological_decisions:
- issue: Lenguaje de herencia aplicado a Yahvé
  english_pob_reading: Retain the anthropomorphic covenantal wording 'the LORD will inherit Judah as his portion'
  chosen_spanish_reading: Yahvé heredará a Judá como su porción
  alternative_spanish_readings:
  - Yahvé tomará posesión de Judá como su posesión
  - Yahvé tendrá a Judá como su herencia
  rationale: 'Se conserva la tensión teológica del texto: el lenguaje de herencia normalmente aplicado al pueblo se aplica aquí a Yahvé. «Heredará» mantiene esa inversión sin diluirla en una posesión meramente jurídica.'
  doctrine_reference: Translation philosophy §3, §5
- issue: Sentido de אַדְמַת הַקֹּדֶשׁ
  english_pob_reading: the holy land
  chosen_spanish_reading: la tierra santa
  alternative_spanish_readings:
  - el suelo santo
  - la tierra de santidad
  rationale: La frase apunta al territorio consagrado por la presencia y elección de Yahvé. «La tierra santa» comunica ese valor geográfico-covenantal de manera natural en español, sin añadir contenido ajeno al hebreo.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se siguió la lectura revisada más reciente sin cambios sustantivos; el contenido coincide con el acuerdo alto del control cruzado y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה como norma del proyecto.
  - Se conserva «heredará» para נחל, en paralelo con la decisión inglesa, para no perder la imaginería de pacto.
  - Se usa «escoger» para בחר y no «elegir» para conservar un registro bíblico directo y consistente.
  - No se añadieron notas al pie porque la redacción española puede expresar la alternativa sin crear ambigüedad residual.
