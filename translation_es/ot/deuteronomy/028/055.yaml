translation:
  language: es
  text: de modo que no les dé a ninguno de ellos nada de la carne de sus hijos[a], que está comiendo, porque no le queda nada, en el asedio y en la angustia con que tu enemigo te oprimirá en todas tus puertas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sus hijos»; el texto usa una forma masculina específica, no el más general «hijos e hijas» o «niños».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en todas tus ciudades»; «puertas» es una manera hebrea de referirse a los lugares donde vive y se reúne el pueblo.'
    reason: cultural_note
lexical_decisions:
- source_word: מִתֵּת
  english_pob_choice: so that he will not give
  chosen_spanish: de modo que no les dé
  alternatives_spanish:
  - para no dar
  - sin dar
  lexicon: HALOT
  rationale: El infinitivo con מִן continúa la idea de restricción o negativa en el contexto de la maldición. En español, «de modo que no les dé» expresa con naturalidad la finalidad/resultante negativa sin perder la fuerza de la privación.
- source_word: לְאַחַד מֵהֶם
  english_pob_choice: to any of them
  chosen_spanish: a ninguno de ellos
  alternatives_spanish:
  - a uno de ellos
  - a cualquiera de ellos
  lexicon: HALOT
  rationale: La expresión hebrea es distributiva y, en este contexto de hambre extrema, la negación se entiende mejor como exclusión de todos. «A ninguno de ellos» preserva el sentido de negativa absoluta sin sonar forzado.
- source_word: מִבְּשַׂר בָּנָיו
  english_pob_choice: any of the flesh of his sons
  chosen_spanish: nada de la carne de sus hijos
  alternatives_spanish:
  - de la carne de sus hijos
  - de la carne de sus hijos varones
  lexicon: HALOT
  rationale: Se conserva בָּשָׂר como «carne», porque la crudeza del texto es parte del sentido. Aunque el hebreo dice específicamente «sus hijos» en masculino, en español «hijos» puede funcionar de manera genérica y más natural; la nota explica la forma masculina del original. Se evita una calca demasiado áspera como «la carne de sus hijos» sin artículo cuantificador, que en español sonaría menos idiomática.
- source_word: אֲשֶׁר יֹאכֵל
  english_pob_choice: that he is eating
  chosen_spanish: que está comiendo
  alternatives_spanish:
  - que comerá
  - que come
  lexicon: HALOT
  rationale: El imperfecto hebreo describe la acción en curso dentro de la escena de asedio. «Que está comiendo» reproduce bien el aspecto progresivo y la inmediatez dramática.
- source_word: מִבְּלִי הִשְׁאִיר לוֹ כֹּל
  english_pob_choice: because he has nothing left
  chosen_spanish: porque no le queda nada
  alternatives_spanish:
  - porque no le ha dejado nada
  - porque no le queda absolutamente nada
  lexicon: HALOT
  rationale: 'La cláusula explica la negativa: no hay remanente. «No le queda nada» comunica de forma natural la idea de total despojo, manteniendo la relación causal que el contexto exige.'
- source_word: בְּמָצוֹר
  english_pob_choice: in the siege
  chosen_spanish: en el asedio
  alternatives_spanish:
  - durante el asedio
  lexicon: HALOT
  rationale: מָצוֹר se refiere a un sitio militar. «Asedio» es el equivalente español más claro y digno, y conserva el sentido técnico del término.
- source_word: וּבְמָצוֹק
  english_pob_choice: and in the distress
  chosen_spanish: y en la angustia
  alternatives_spanish:
  - y en la aflicción
  - y en la estrechez
  lexicon: HALOT
  rationale: מָצוֹק implica estrechez, angustia, apuro severo. «Angustia» mantiene la intensidad y suena natural junto a «asedio» en español bíblico contemporáneo.
- source_word: אֲשֶׁר יָצִיק לְךָ אֹיִבְךָ
  english_pob_choice: with which your enemy will oppress you
  chosen_spanish: con que tu enemigo te oprimirá
  alternatives_spanish:
  - con que tu enemigo te afligirá
  - con que tu enemigo te presionará
  lexicon: HALOT
  rationale: El hifil de צוּק expresa presión causante de aflicción/opresión. «Oprimirá» conserva bien la fuerza hostil del verbo en el marco del asedio.
- source_word: בְּכָל שְׁעָרֶיךָ
  english_pob_choice: within all your gates
  chosen_spanish: dentro de todas tus puertas
  alternatives_spanish:
  - en todas tus puertas
  - dentro de todas tus ciudades
  lexicon: HALOT
  rationale: Se mantiene la imagen literal de שְׁעָרֶיךָ como «tus puertas», siguiendo la metáfora cívica hebrea. «Dentro de» ayuda a reflejar el valor locativo de la frase. Se evita sustituirla directamente por «ciudades» en el texto principal para no borrar la imagen textual, aunque la nota cultural explica el uso metonímico.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios; el pasaje quedó con alto grado de acuerdo y solo observaciones menores. Se ha mantenido la línea principal del audit trail inglés: la negativa distributiva, la crudeza de «carne», el aspecto progresivo de la acción, la causalidad de la falta total, y la imagen de «puertas» como metonimia territorial.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino en el proyecto, aunque este versículo no lo contiene.
  - Se conserva un registro bíblico contemporáneo, evitando arcaísmos innecesarios.
  - «Asedio» y «angustia» mantienen el paralelismo semántico con el inglés auditado.
  - La nota de «puertas» preserva la tensión entre la imagen literal y el valor metonímico territorial.
