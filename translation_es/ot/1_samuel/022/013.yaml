  to: 'Saúl le dijo: «¿Por qué han conspirado contra mí tú y el hijo de Isaí, al darle pan y espada y al consultar[a] a Dios por él, para que se haya levantado contra mí para acecharme[b], como hoy?»'
  rationale: 'Se corrigió el anclaje de la nota [a] para que aparezca donde realmente corresponde en el texto. Además, se mejoró la naturalidad y la cercanía al POB auditado: «han conspirado» refleja mejor קְשַׁרְתֶּם; «consultar[a] a Dios por él» mantiene אֱלֹהִים como «Dios» y conserva la nota léxica; «para acecharme» expresa con mayor naturalidad לְאֹרֵב en español; y «como hoy» transmite כַּיּוֹם הַזֶּה de forma más idiomática.'
