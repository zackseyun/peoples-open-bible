translation:
  language: es
  text: En los paneles de sus soportes y en sus marcos grabó querubines, leones y palmeras, según el espacio disponible para cada uno[a], con guirnaldas por todo alrededor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «donde hubiera espacio para cada figura». La frase hebrea es difícil y probablemente describe la disposición de las tallas según el espacio disponible.
    reason: alternative_reading
  - marker: b
    text: O «festone[s]». El término hebreo probablemente se refiere a adornos ornamentales que rodeaban las figuras.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְפַתַּח
  english_pob_choice: he engraved
  chosen_spanish: grabó
  alternatives_spanish:
  - esculpió
  - incidió
  lexicon: HALOT
  rationale: En este contexto de decoración arquitectónica, el verbo describe la acción de incidir figuras ornamentales sobre la obra; 'grabó' comunica bien la labor artesanal sin volverlo mecánico. 'Esculpió' sugiere más relieve tridimensional, y 'incidió' resulta menos natural en español bíblico contemporáneo.
- source_word: הַלֻּחֹת
  english_pob_choice: the panels
  chosen_spanish: los paneles
  alternatives_spanish:
  - las tablas
  - las planchas
  lexicon: HALOT
  rationale: Aquí no son 'tablas' de escritura, sino superficies decorativas de la pieza. 'Paneles' conserva la función estructural y ornamental del término en español moderno.
- source_word: יְדֹתֶיהָ
  english_pob_choice: its supports
  chosen_spanish: sus soportes
  alternatives_spanish:
  - sus manos
  - sus lados
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'sus manos', pero en la descripción del mueble se trata de elementos salientes de sostén. 'Soportes' refleja la función arquitectónica y evita un literalismo confuso.
- source_word: מַסְגְּרֹתֶיהָ
  english_pob_choice: its frames
  chosen_spanish: sus marcos
  alternatives_spanish:
  - sus bordes
  - sus molduras
  lexicon: HALOT
  rationale: El término denota contornos o bordes enmarcados de la estructura. 'Marcos' es la equivalencia más natural en español para este contexto artesanal.
- source_word: כְּרוּבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubines alados
  lexicon: HALOT
  rationale: Se conserva el término tradicional transliterado en español, que corresponde a seres del imaginario cultual del templo y no a los 'querubines' infantiles del arte posterior. La forma plural coincide con el hebreo.
- source_word: אֲרָיוֹת
  english_pob_choice: lions
  chosen_spanish: leones
  alternatives_spanish:
  - leonas
  lexicon: HALOT
  rationale: Es el sustantivo zoológico directo en la serie ornamental. 'Leones' mantiene la sencillez descriptiva del original.
- source_word: וְתִמֹרֹת
  english_pob_choice: palm trees
  chosen_spanish: palmeras
  alternatives_spanish:
  - árboles de palma
  - palmas
  lexicon: HALOT
  rationale: En decoración del templo, el motivo es el de palmera/palma estilizada. 'Palmeras' es claro y natural en español, sin perder la referencia vegetal.
- source_word: כְּמַעַר אִישׁ
  english_pob_choice: according to the space on each
  chosen_spanish: según el espacio disponible para cada uno
  alternatives_spanish:
  - según el espacio de cada uno
  - donde había espacio para cada figura
  lexicon: HALOT
  rationale: La frase hebrea es difícil y apunta a la distribución de los motivos conforme al espacio disponible. 'Espacio disponible para cada uno' conserva esa tensión sin fijar de manera excesiva una sola reconstrucción.
- source_word: וְלֹיֹת
  english_pob_choice: wreaths
  chosen_spanish: guirnaldas
  alternatives_spanish:
  - coronas
  - festone[s]
  lexicon: HALOT
  rationale: '''Guirnaldas'' expresa bien el ornamento envolvente y es un equivalente español muy natural. Se evita ''coronas'', que podría sugerir otra clase de adorno, y ''festone[s]'' resulta menos fluido.'
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - rodeándolo todo
  lexicon: HALOT
  rationale: Indica disposición envolvente de los ornamentos. 'Alrededor' es la opción más idiomática y fiel al movimiento espacial del hebreo.
theological_decisions:
- issue: Identidad y sentido de כְּרוּבִים en un contexto cultual
  english_pob_reading: cherubim
  chosen_spanish_reading: querubines
  alternative_spanish_readings:
  - querubes
  - ángeles querubines
  rationale: La forma 'querubines' preserva el término técnico del culto israelita sin domesticarlo hacia un sentido devocional posterior. No se añade explicación en el texto para no sobrecargar una simple descripción ornamental.
  doctrine_reference: Éxodo 25:18-20; 1 Reyes 6:29
- issue: Ambigüedad de כְּמַעַר אִישׁ y su relación con la distribución de los motivos
  english_pob_reading: according to the space on each
  chosen_spanish_reading: según el espacio disponible para cada uno
  alternative_spanish_readings:
  - donde había espacio para cada figura
  - según el espacio de cada uno
  rationale: La frase hebrea es notoriamente oscura. La traducción mantiene la idea de distribución proporcional al espacio disponible, sin resolver de manera indebida si se refiere a cada figura, a cada panel o a cada área de talla.
  doctrine_reference: Principios de traducción de pasajes textualmente difíciles
- issue: Valor ornamental de לֹיֹת
  english_pob_reading: wreaths
  chosen_spanish_reading: guirnaldas
  alternative_spanish_readings:
  - wreaths
  - coronas ornamentales
  rationale: No hay una implicación doctrinal; el punto es conservar el valor decorativo que el contexto exige. 'Guirnaldas' transmite el ornamento circundante con naturalidad en español.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó la frase a 'according to the space on each' para mayor naturalidad, manteniendo en español una solución igualmente fluida pero todavía abierta ante la ambigüedad del hebreo. La equivalencia se construyó desde el texto hebreo y el aparato auditado, no por simple transliteración del inglés.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el hebreo lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo 'querubines' como término técnico estable, coherente con el registro del POB.
  - '''Grabó'' y ''guirnaldas'' conservan el carácter artesanal y ornamental del pasaje sin introducir interpretaciones ajenas.'
  - La nota sobre el espacio disponible preserva la tensión lexical del hebreo y la solución del POB en inglés.
