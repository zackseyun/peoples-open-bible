translation:
  language: es
  text: Porque ella conoce todas las cosas y entiende, y me guiará prudentemente en mis acciones, y me guardará por su gloria[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en su gloria» o «mediante su gloria». La frase griega puede expresar ubicación o medio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδε
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  lexicon: BDAG / uso griego común
  rationale: En español, «conoce» conserva mejor la idea relacional y cognitiva del griego que «sabe», y deja el verbo paralelo con «entiende» sin fusionarlos.
- source_word: ἐκείνη
  english_pob_choice: she
  chosen_spanish: ella
  alternatives_spanish:
  - esa
  - aquella
  lexicon: LSJ
  rationale: El sustantivo implícito es Sabiduría personificada en femenino; «ella» mantiene la personificación de forma natural en español.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo
  lexicon: LSJ
  rationale: La expresión abarca de manera total; «todas las cosas» conserva la amplitud formal del griego y el equilibrio de la cláusula.
- source_word: συνίει
  english_pob_choice: understands
  chosen_spanish: entiende
  alternatives_spanish:
  - comprende
  - tiene entendimiento
  lexicon: BDAG
  rationale: «Entiende» diferencia claramente este verbo de οἶδε y suena natural en español bíblico contemporáneo.
- source_word: ὁδηγήσει
  english_pob_choice: will guide
  chosen_spanish: me guiará
  alternatives_spanish:
  - me conducirá
  - me dirigirá
  lexicon: BDAG
  rationale: «Guiará» refleja bien el verbo de conducción a lo largo de una conducta o camino de vida, apropiado al contexto sapiencial.
- source_word: ἐν ταῖς πράξεσί μου
  english_pob_choice: in my actions
  chosen_spanish: en mis acciones
  alternatives_spanish:
  - en mis obras
  - en mis hechos
  - en mis empresas
  lexicon: LSJ
  rationale: «Acciones» expresa el sentido práctico y moral de πράξεις sin introducir un matiz demasiado técnico o arcaico.
- source_word: σωφρόνως
  english_pob_choice: prudently
  chosen_spanish: prudentemente
  alternatives_spanish:
  - con buen juicio
  - con sensatez
  - con moderación
  lexicon: BDAG
  rationale: El adverbio del grupo σωφρον- apunta a una conducta sensata y bien ordenada; «prudentemente» conserva esa idea de juicio recto en la práctica.
- source_word: φυλάξει
  english_pob_choice: will guard
  chosen_spanish: me guardará
  alternatives_spanish:
  - me preservará
  - me protegerá
  - me custodiará
  lexicon: BDAG
  rationale: «Guardará» mantiene el matiz protector del verbo, sin debilitarlo en una mera ayuda general.
- source_word: ἐν τῇ δόξῃ αὐτῆς
  english_pob_choice: by her glory
  chosen_spanish: por su gloria
  alternatives_spanish:
  - en su gloria
  - mediante su gloria
  lexicon: BDAG
  rationale: La preposición ἐν admite sentido locativo o instrumental; «por su gloria» deja abierta la idea de medio/instrumento y evita cerrar el pasaje a una sola lectura.
theological_decisions:
- issue: Sentido de ἐν τῇ δόξῃ αὐτῆς
  english_pob_reading: 'instrumental: ''by her glory'''
  chosen_spanish_reading: 'instrumental abierto: ''por su gloria'''
  alternative_spanish_readings:
  - 'locativo: ''en su gloria'''
  - 'mediativo: ''mediante su gloria'''
  rationale: El contexto presenta a la Sabiduría actuando en favor del suplicante; el español «por su gloria» conserva la ambigüedad del griego entre esfera, medio e instrumento, sin borrar la tensión textual.
  doctrine_reference: Preservar la ambigüedad semántica del original en vez de resolverla de forma dogmática.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del texto inglés: «conoce todas las cosas y entiende», manteniendo la separación entre οἶδε y συνίει. También conserva la ambigüedad de ἐν τῇ δόξῃ αὐτῆς con una solución española equivalente a la nota inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Sabiduría» implícita en femenino con pronombres femeninos («ella», «su»).
  - Se conserva un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - «Por su gloria» se eligió para no eliminar la posible lectura instrumental del griego.
