  to: 'Y David dijo[a]: «¿Qué tengo yo que ver con ustedes, hijos de Sarvia, para que hoy sean un adversario para mí? ¿Será ejecutado hoy algún hombre en Israel? Pues ¿no sé yo que hoy soy rey sobre Israel?»'
