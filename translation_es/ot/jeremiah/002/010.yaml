translation:
  language: es
  text: Crucen, pues, a las costas de Kittim y vean[a]; envíen a Quedar y consideren muy bien[b]; vean si alguna vez ha habido algo semejante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las islas/costas de Kittim». «Kittim» probablemente se refiere a Chipre o, en sentido más amplio, a tierras marítimas del occidente.
    reason: lexical_alternative
  - marker: b
    text: Quedar se refiere a tribus o territorio árabe al este/sudeste, formando un contraste de occidente a oriente con Kittim.
    reason: cultural_note
lexical_decisions:
- source_word: עִבְרוּ
  english_pob_choice: cross over
  chosen_spanish: pasen
  alternatives_spanish:
  - crucen
  - atraviesen
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural de עבר con sentido de ir al otro lado o atravesar a un lugar geográfico. En español, «pasen» comunica el movimiento requerido sin sonar forzado; «crucen» y «atraviesen» son posibles, pero «pasen» mantiene naturalidad y la idea de desplazamiento.
- source_word: אִיֵּי כִתִּיִּים
  english_pob_choice: the coasts of Kittim
  chosen_spanish: las costas de Kittim
  alternatives_spanish:
  - las islas de Kittim
  - las costas/islas de Kittim
  lexicon: HALOT
  rationale: אִיִּים puede significar islas o costas lejanas; la POB inglesa opta por «coasts» para comunicar el sentido geográfico amplio. En español, «costas» conserva esa amplitud y «Kittim» se translitera por ser un nombre propio cultural/geográfico.
- source_word: וּרְאוּ
  english_pob_choice: and see
  chosen_spanish: y vean
  alternatives_spanish:
  - y miren
  - y observen
  lexicon: HALOT
  rationale: El verbo ראה es una exhortación repetida a observar directamente. «Vean» reproduce con claridad el imperativo y mantiene la fuerza retórica del original.
- source_word: וְקֵדָר
  english_pob_choice: Kedar
  chosen_spanish: Quedar
  alternatives_spanish:
  - Kedar
  lexicon: HALOT
  rationale: Se translitera el nombre propio. En español bíblico, «Quedar» refleja la pronunciación castellana habitual del nombre sin perder la referencia cultural del tribu/región árabe del texto.
- source_word: שִׁלְח֥וּ
  english_pob_choice: send to Kedar
  chosen_spanish: envíen a Quedar
  alternatives_spanish:
  - manden a Quedar
  - envíen mensajeros a Quedar
  lexicon: HALOT
  rationale: El hebreo permite entender un envío de mensajeros o una consulta dirigida a esa región. «Envíen a Quedar» conserva la sobriedad del hebreo y la ambigüedad funcional del mandato, como hace la POB inglesa.
- source_word: וְ/הִֽתְבּוֹנְנ֖וּ מְאֹ֑ד
  english_pob_choice: and consider carefully
  chosen_spanish: y consideren muy bien
  alternatives_spanish:
  - y examinen cuidadosamente
  - y reflexionen mucho
  lexicon: HALOT
  rationale: הִתְבּוֹנֵן implica observar con atención y reflexionar; מְאֹד intensifica la orden. «Consideren muy bien» transmite el matiz de atención diligente y la intensificación sin volverse demasiado pesado.
- source_word: הֵן הָיְתָה כָּזֹאת
  english_pob_choice: whether there has ever been anything like this
  chosen_spanish: vean si alguna vez ha habido cosa semejante
  alternatives_spanish:
  - vean si alguna vez ha sucedido algo así
  - vean si ha habido algo parecido
  lexicon: HALOT
  rationale: La cláusula es retórica e idiomática. En español, «vean si alguna vez ha habido cosa semejante» conserva la pregunta implícita y la extrañeza del original sin sobreexplicar el sentido.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la estructura retórica del hebreo y la solución óptima de la POB inglesa: dos mandatos de observación geográfica (Kittim / Quedar) seguidos por la conclusión interrogativa. No se detectaron revisiones sustantivas en el audit trail más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se translitera Kittim/Quedar para preservar los nombres propios y el contraste geográfico-cultural del verso.
  - «Costas» y «consideren muy bien» buscan un español natural sin perder la precisión semántica del hebreo.
