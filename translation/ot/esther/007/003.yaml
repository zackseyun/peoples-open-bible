id: EST.7.3
reference: Esther 7:3
source:
  edition: WLC
  text: וַ/תַּ֨עַן אֶסְתֵּ֤ר הַ/מַּלְכָּה֙ וַ/תֹּאמַ֔ר אִם מָצָ֨אתִי חֵ֤ן בְּ/עֵינֶ֨י/ךָ֙ הַ/מֶּ֔לֶךְ וְ/אִם עַל הַ/מֶּ֖לֶךְ ט֑וֹב תִּנָּֽתֶן לִ֤/י נַפְשִׁ/י֙ בִּ/שְׁאֵ֣לָתִ֔/י וְ/עַמִּ֖/י בְּ/בַקָּשָׁתִֽ/י־־־־׃
translation:
  text: Then Queen Esther answered and said[a], “If I have found favor in your eyes, O king, and if it pleases the king, let my life be given me at my petition, and my people at my request.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or more idiomatically, “grant me my life at my petition, and my people at my request.” The Hebrew more literally says, “let my life be given to me.”
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַן
  chosen: answered
  alternatives:
  - replied
  lexicon: HALOT
  rationale: ענה in the wayyiqtol narrative sequence commonly introduces a response in dialogue. 'Answered' preserves the formal narrative style and pairs naturally with the following 'and said.'
- source_word: הַמַּלְכָּה
  chosen: Queen
  alternatives:
  - the queen
  lexicon: HALOT
  rationale: Used as an appositional title with Esther. English idiom prefers 'Queen Esther' rather than 'Esther the queen' here, while preserving the royal title.
- source_word: אִם מָצָאתִי חֵן בְּעֵינֶיךָ
  chosen: If I have found favor in your eyes
  alternatives:
  - If I have found favor with you
  - If I have found grace in your eyes
  lexicon: HALOT
  rationale: This is a conventional Hebrew courtly formula. 'Favor in your eyes' keeps the Hebrew imagery while remaining understandable in English. 'Grace' is possible for חֵן but 'favor' better fits the petition context.
- source_word: הַמֶּלֶךְ
  chosen: O king
  alternatives:
  - my king
  - the king
  lexicon: HALOT
  rationale: Direct address after 'your eyes' is vocative in function. 'O king' conveys respectful court speech in natural English.
- source_word: וְאִם עַל הַמֶּלֶךְ טוֹב
  chosen: and if it pleases the king
  alternatives:
  - and if it is good to the king
  - and if it seems good to the king
  lexicon: HALOT
  rationale: This idiom expresses royal pleasure or approval. 'If it pleases the king' is the most natural equivalent in English and fits the formal setting.
- source_word: תִּנָּתֶן לִי נַפְשִׁי
  chosen: let my life be given to me
  alternatives:
  - grant me my life
  - let my life be granted to me
  lexicon: HALOT
  rationale: The Niphal of נתן is passive ('be given'). נֶפֶשׁ here refers to Esther's life rather than 'soul.' The chosen rendering preserves the passive/request form while remaining readable. 'Grant me my life' is smoother but slightly less transparent to the Hebrew syntax.
- source_word: נַפְשִׁי
  chosen: my life
  alternatives:
  - my soul
  - my self
  lexicon: HALOT
  rationale: In this threat-of-death context, נֶפֶשׁ clearly refers to life. 'My soul' would mislead modern readers toward an immaterial sense not intended here.
- source_word: בִּשְׁאֵלָתִי
  chosen: at my petition
  alternatives:
  - for my petition
  - upon my petition
  lexicon: HALOT
  rationale: שְׁאֵלָה denotes a request or petition. The preposition ב marks the circumstance or basis of the request. 'At my petition' is a fairly literal rendering that fits the formal register.
- source_word: וְעַמִּי
  chosen: and my people
  lexicon: HALOT
  rationale: Straightforward possessive construction. Esther's plea extends from herself to her covenant/ethnic community.
- source_word: בְּבַקָּשָׁתִי
  chosen: at my request
  alternatives:
  - for my request
  - upon my request
  - at my plea
  lexicon: HALOT
  rationale: בַּקָּשָׁה is near-synonymous with שְׁאֵלָה but using a second English term ('request') preserves the Hebrew variation without overtranslating. 'Plea' is possible but slightly more emotive than the Hebrew requires.
