    issue: צִדְקָתְךָ se tradujo como 'justicia' en el texto principal.
    rationale: El expediente inglés eligió 'righteousness' como lectura principal por su sentido moral-covenantal amplio y dejó 'justice' como alternativa. En español, 'rectitud' reproduce mejor ese valor principal que 'justicia', que tiende a leerse más judicialmente.
  - severity: low
    issue: 'Puntuación del vocativo: ''oh Dios'''
    rationale: En español es más natural y correcto puntuar el vocativo interjectivo como 'oh, Dios' en ambos casos.
