base_translation:
  language: en
  yaml_path: translation/ot/isaiah/010/014.yaml
  text: My hand found the wealth of the peoples as one finds a nest[a]; and as one gathers abandoned eggs, I gathered all the earth, and there was none that fluttered a wing, or opened a mouth[b], or chirped.
  footnotes:
  - marker: a
    text: Or 'the riches of the nations.' The Hebrew חַיִל can denote wealth, resources, strength, or military force; here the context favors spoil or wealth taken easily.
    reason: lexical_alternative
  - marker: b
    text: Or 'the whole land.' Hebrew אֶרֶץ can mean 'earth' or 'land'; 'earth' is retained here because the speaker's boast is deliberately universal in scope.
    reason: lexical_alternative
