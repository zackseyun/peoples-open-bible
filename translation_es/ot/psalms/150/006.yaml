translation:
  language: es
  text: Todo lo que tiene aliento alabe a Yah. ¡Alaben a Yah[a]!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¡Aleluya!». La expresión hebrea הַלְלוּ־יָהּ es el origen de la forma litúrgica «Aleluya».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: everything that has breath
  chosen_spanish: todo lo que
  alternatives_spanish:
  - cada
  - todo
  lexicon: HALOT
  rationale: En español, con el sustantivo singular implícito «la respiración / lo que respira», la forma distributiva «todo lo que» comunica el alcance universal sin volver la línea forzada. Mantiene la idea inclusiva del hebreo.
- source_word: הַנְּשָׁמָה
  english_pob_choice: breath
  chosen_spanish: respira
  alternatives_spanish:
  - aliento
  - respiración
  - alma
  lexicon: HALOT
  rationale: El hebreo נְשָׁמָה denota «aliento/respiración». En español, para esta línea poética, «lo que respira» conserva el valor concreto y evita «alma», que introduciría una noción distinta. «Respira» permite una frase natural y fiel al cuadro hebreo.
- source_word: תְּהַלֵּל
  english_pob_choice: let ... praise
  chosen_spanish: alabe
  alternatives_spanish:
  - que alabe
  - alabará
  - alabe él
  lexicon: HALOT
  rationale: El imperfecto funciona como yusivo/exhortativo. «Que ... alabe» expresa esa invitación en español de forma natural y digna.
- source_word: יָהּ
  english_pob_choice: Yah
  chosen_spanish: Yah
  alternatives_spanish:
  - el SEÑOR
  - Yavé
  lexicon: HALOT
  rationale: El texto hebreo usa la forma breve poética del nombre divino. Se conserva «Yah» para no aplanar esa distinción ni sustituirla por la forma plena de Yahvé. La breve forma es especialmente apropiada en este salmo doxológico.
- source_word: הַלְלוּ
  english_pob_choice: Praise
  chosen_spanish: Alaben
  alternatives_spanish:
  - Alabad
  - Alaben a
  lexicon: HALOT
  rationale: El imperativo plural exhorta a una convocatoria comunitaria. «Alaben» resulta natural en español contemporáneo reverente y mantiene el llamado directo a la asamblea.
- source_word: יָהּ
  english_pob_choice: Praise Yah!
  chosen_spanish: ¡Alaben a Yah!
  alternatives_spanish:
  - ¡Aleluya!
  - ¡Alaben a él!
  lexicon: HALOT
  rationale: Se traduce la frase imperativa final en vez de dejarla solo transliterada. La alternativa litúrgica «¡Aleluya!» se preserva como opción reconocible, pero el texto principal muestra el contenido semántico del hebreo.
theological_decisions:
- issue: Forma breve del nombre divino en יָהּ
  english_pob_reading: Yah
  chosen_spanish_reading: Yah
  alternative_spanish_readings:
  - Yavé
  - el SEÑOR
  rationale: La decisión mantiene la distinción entre la forma breve poética y la convención para יְהוָה. Traducir aquí como «el SEÑOR» ocultaría la forma específica presente en el hebreo.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §2; table for YHWH/Yah'
- issue: Conservar o traducir el valor litúrgico de הַלְלוּ־יָהּ
  english_pob_reading: Praise Yah! with footnoted Hallelujah alternative
  chosen_spanish_reading: ¡Alaben a Yah! con alternativa litúrgica en nota
  alternative_spanish_readings:
  - ¡Aleluya!
  - ¡Aleluya a Yah!
  rationale: La traducción principal expone el imperativo y el nombre divino; la alternativa tradicional «Aleluya» se conserva como nota porque es una forma litúrgica muy arraigada, pero no reemplaza el sentido explícito del hebreo en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste revisado en el audit trail: la línea inicial no se reduce a una idea demasiado breve, sino que conserva el alcance de la frase hebrea con una formulación natural en español. También mantiene la decisión del audit trail de traducir la fórmula הַלְלוּ־יָהּ en el texto principal y reservar «Aleluya» como alternativa litúrgica en nota.'
  spanish_consistency_notes:
  - Se mantiene «Yah» de forma uniforme para יָהּ, no «Yavé» ni «SEÑOR».
  - Se evita «alma» para נְשָׁמָה porque el hebreo aquí apunta al aliento/respiración.
  - La línea final conserva el paralelismo exhortativo con dos imperativos en español.
  - La nota usa la forma litúrgica tradicional solo como alternativa, coherente con el proyecto.
