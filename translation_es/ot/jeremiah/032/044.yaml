  language: en
  yaml_path: translation/ot/jeremiah/032/044.yaml
  text: Fields will be bought with silver[a], and deeds will be written in a scroll and sealed and witnessed by witnesses in the land of Benjamin, around Jerusalem, and in the cities of Judah, in the cities of the hill country, in the cities of the lowland, and in the cities of the Negeb; for I will restore their fortunes[c][b], declares Yahweh.
  footnotes:
  - marker: a
    text: Or 'attested by witnesses.' The Hebrew reads literally 'and witness witnesses,' a legal formula for formal attestation.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'the Shephelah,' the lowland region of Judah.
    reason: cultural_note
  - marker: c
    text: Or 'I will bring back their exiles' / 'I will restore their captivity.' The Hebrew idiom can denote reversal of exile and broader restoration.
    reason: alternative_reading
