review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: «el segundo», el holocausto, la expiación sacerdotal, el pecado cometido y la fórmula pasiva final de perdón. Sin embargo, «conforme al orden prescrito» no representa tan bien כַּמִּשְׁפָּט como una formulación más procedural como «según el procedimiento prescrito» o «conforme a lo prescrito». Además, «le será perdonado» es comprensible, pero en español suena más natural y mantiene mejor la impersonalidad reverente del hebreo como «se le perdonará».'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «orden prescrito» suena algo forzado en español bíblico moderno, y la repetición «por él por el pecado» resulta un poco pesada aunque tolerable. La revisión propuesta mejora naturalidad sin apartarse del original ni del audit trail inglés.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: «holocausto» y «expiación» están bien elegidos; no aparecen términos sensibles como Yahvé/Mesías. La decisión sobre la pasiva del perdón debe conservar al agente implícito, lo cual se mantiene mejor con «se le perdonará».'
  issues:
  - severity: medium
    issue: «conforme al orden prescrito» para כַּמִּשְׁפָּט
    rationale: מִשְׁפָּט aquí apunta al procedimiento/norma establecida del rito. «Orden prescrito» no es incorrecto, pero suena menos idiomático y menos preciso que «procedimiento prescrito» o «conforme a lo prescrito», además de apartarse de la alternativa ya documentada en la nota inglesa.
  - severity: low
    issue: «le será perdonado» como fórmula pasiva final
    rationale: Preserva la pasiva, pero en español moderno suena algo rígido y puede sugerir que 'el pecado' es el sujeto tácito. «Se le perdonará» conserva mejor la impersonalidad del hebreo y la legibilidad.
  - severity: low
    issue: Nota b no explica plenamente la fórmula hebrea documentada en el audit trail
    rationale: La nota inglesa aclara que el hebreo literalmente expresa una fórmula pasiva del tipo «y será perdonado para él / y le será perdonado». La nota española actual es aceptable, pero puede alinearse mejor explicando que es una fórmula pasiva que deja implícito al agente divino.
  revised_spanish_text: Y ofrecerá el segundo como holocausto, según el procedimiento prescrito[a], y el sacerdote hará expiación por él por el pecado que ha cometido, y se le perdonará[b].
