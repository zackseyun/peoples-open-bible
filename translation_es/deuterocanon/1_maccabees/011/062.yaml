translation:
  language: es
  text: Y los de Gaza pidieron condiciones a Jonatán, y él les dio garantías[a]; tomó a los hijos de sus gobernantes como rehenes y los envió a Jerusalén[b]. Y atravesó la región hasta Damasco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «les dio manos derechas», un modismo para dar garantías o mostrar buena fe.
    reason: lexical_alternative
  - marker: b
    text: El testimonio griego incluye la palabra aislada Ἀσαλήμ después de «Jerusalén». Como no encaja con fluidez en la oración, puede reflejar una corrupción textual o un topónimo intruso en esta línea de transmisión.
    reason: textual_variant
lexical_decisions:
- source_word: ἠξίωσαν
  english_pob_choice: asked terms
  chosen_spanish: pidieron condiciones
  alternatives_spanish:
  - solicitaron términos
  - pidieron arreglo
  - pidieron paz
  lexicon: LSJ
  rationale: En este contexto político-militar, el verbo expresa una gestión formal para obtener condiciones favorables. «Pidieron condiciones» conserva esa idea sin forzar una frase idiomática más interpretativa que el griego no explicita.
- source_word: οἱ ἀπὸ Γάζης
  english_pob_choice: the men from Gaza
  chosen_spanish: los de Gaza
  alternatives_spanish:
  - los hombres de Gaza
  - la gente de Gaza
  - los habitantes de Gaza
  lexicon: LSJ
  rationale: El griego señala a los procedentes de Gaza, probablemente como representantes de la ciudad. «Los de Gaza» suena natural en español y preserva esa referencia colectiva sin añadir género o matiz no requerido.
- source_word: ἔδωκεν αὐτοῖς δεξιάς
  english_pob_choice: he gave them pledges
  chosen_spanish: les dio garantías
  alternatives_spanish:
  - les dio su mano derecha
  - les dio promesas
  - les dio prenda de buena fe
  lexicon: LSJ
  rationale: La expresión literal «dio manos derechas» es idiomática; en español, «les dio garantías» comunica el sentido de compromiso o buena fe sin ocultar el trasfondo figurado. Se evita añadir «de paz» porque no está explícito en el griego y la revisión del inglés retiró ese complemento.
- source_word: τοὺς υἱοὺς τῶν ἀρχόντων αὐτῶν
  english_pob_choice: the sons of their rulers
  chosen_spanish: a los hijos de sus gobernantes
  alternatives_spanish:
  - a los hijos de sus líderes
  - a los hijos de sus jefes
  - a los hijos de sus magistrados
  lexicon: LSJ
  rationale: ἀρχόντων remite a gobernantes o autoridades. «Gobernantes» mantiene el tono político y formal del pasaje y evita suavizar el término a «líderes».
- source_word: εἰς ὅμηρα
  english_pob_choice: as hostages
  chosen_spanish: como rehenes
  alternatives_spanish:
  - como hostages
  - como prenda
  - para rehén
  lexicon: LSJ
  rationale: El valor funcional de la frase es el de retener personas como garantía. «Rehenes» es la equivalencia española más clara y precisa en este contexto.
- source_word: διῆλθεν τὴν χώραν
  english_pob_choice: he passed through the country
  chosen_spanish: recorrió la región
  alternatives_spanish:
  - pasó por el país
  - atravesó la tierra
  - pasó por la comarca
  lexicon: LSJ
  rationale: χώρα puede abarcar territorio, región o país. «Región» comunica el desplazamiento por un territorio amplio sin sonar rígidamente moderno ni reducir el alcance geográfico.
- source_word: ἕως Δαμασκοῦ
  english_pob_choice: as far as Damascus
  chosen_spanish: hasta Damasco
  alternatives_spanish:
  - hasta llegar a Damasco
  - así como Damasco
  lexicon: LSJ
  rationale: «Hasta Damasco» reproduce de forma directa el límite espacial del recorrido.
- source_word: Ἀσαλήμ
  english_pob_choice: omitted from main text as likely corrupt or stray in the transmitted line
  chosen_spanish: omitido del texto principal por probable corrupción o intrusión textual
  alternatives_spanish:
  - Asalém
  - Salem
  lexicon: LSJ
  rationale: El testimonio griego incluye Ἀσαλήμ después de Jerusalén, pero no encaja sintácticamente. Siguiendo el criterio del POB inglés, se omite del cuerpo principal y se preserva en nota textual.
theological_decisions:
- issue: Tratamiento de δεξιάς como fórmula de compromiso o garantía
  english_pob_reading: he gave them pledges
  chosen_spanish_reading: les dio garantías
  alternative_spanish_readings:
  - les dio su mano derecha
  - les dio prenda de buena fe
  - les dio promesas
  rationale: No se introduce una lectura doctrinal ajena; se conserva el valor relacional y jurídico de la fórmula de fidelidad. En español, «garantías» mantiene el sentido de compromiso efectivo sin explicitar «paz» o «buena fe» como glosa doctrinal.
  doctrine_reference: fidelidad pactal / acuerdos de paz
- issue: Preservación de la tensión textual alrededor de Ἀσαλήμ
  english_pob_reading: The Greek witness here includes the isolated word 'Asalim'... it may reflect a textual corruption or stray place-name
  chosen_spanish_reading: Se conserva como nota textual la posible corrupción o intrusión de Ἀσαλήμ
  alternative_spanish_readings:
  - integrarlo como Asalém
  - leerlo como topónimo aparte
  - suprimir toda mención
  rationale: La traducción no debe resolver artificialmente una anomalía textual. Mantener la observación en nota respeta el testimonio griego y la cautela editorial del POB inglés.
  doctrine_reference: crítica textual / integridad del testimonio
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB al no añadir «de paz» a «garantías», porque el griego δεξιάς no lo explicita. También se mantuvo la omisión del elemento textual anómalo Ἀσαλήμ en el texto principal, preservándolo únicamente en nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma proyectual cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se evitó «Cristo»/«Mesías» porque el pasaje no presenta esa terminología.
  - Se eligió «rehenes» para ὅμηρα por claridad jurídica y narrativa.
  - 'La puntuación sigue el orden de miembros del griego: negociación, entrega de garantías, toma de rehenes, envío a Jerusalén y avance territorial.'
