translation:
  language: es
  text: Isaac oró[a] a Yahvé por su esposa[b], porque ella era estéril. Yahvé le respondió, y Rebeca, su esposa, concibió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo usa la misma raíz para ambas cláusulas: Isaac «oró/suplicó», y Yahvé «fue movido por» su ruego.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «frente a su esposa», con el sentido de que Isaac oró con referencia a ella o en favor de ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֶּעְתַּר / וַיֵּעָתֶר (עתר)
  english_pob_choice: prayed / answered him
  chosen_spanish: oró / lo escuchó
  alternatives_spanish:
  - suplicó / fue suplicado
  - rogó / respondió a su oración
  lexicon: HALOT
  rationale: El hebreo repite la misma raíz para crear un juego de palabras entre la oración de Isaac y la respuesta de Yahvé. En español, "oró" comunica con naturalidad la acción de Isaac, y "lo escuchó" mantiene la relación recíproca sin forzar un calco como "fue suplicado", que sonaría rígido. Se evita añadir intensidad no explicitada, en línea con la revisión inglesa reciente.
- source_word: לַיהוָה / יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: Convención POB para el Tetragrámaton
  rationale: El texto hebreo usa el nombre propio divino יהוה. Según el criterio del proyecto, se conserva como "Yahvé" en el cuerpo del texto, en vez de ocultarlo con "SEÑOR". "Jehová" no se adopta por su forma menos probable y su carga confesional tradicional.
- source_word: לְנֹכַח אִשְׁתּוֹ
  english_pob_choice: for his wife
  chosen_spanish: por su esposa
  alternatives_spanish:
  - en presencia de su esposa
  - frente a su esposa
  - en favor de su esposa
  lexicon: HALOT
  rationale: לְנֹכַח literalmente puede indicar "frente a" o "en presencia de"; en este contexto de oración, el sentido es que Isaac oró con referencia a ella o en favor de ella. "Por su esposa" expresa bien ese valor relacional y evita una literalidad poco natural en español.
- source_word: עֲקָרָה
  english_pob_choice: barren
  chosen_spanish: estéril
  alternatives_spanish:
  - barrena
  - infértil
  - sin hijos
  lexicon: HALOT
  rationale: '"Estéril" es el equivalente bíblico y comprensible en español para la condición de no poder concebir. "Infértil" suena más técnico; "sin hijos" describe el resultado más que la condición.'
- source_word: וַתַּהַר
  english_pob_choice: conceived
  chosen_spanish: concibió
  alternatives_spanish:
  - quedó embarazada
  - llegó a concebir
  lexicon: HALOT
  rationale: '"Concibió" conserva el registro narrativo bíblico y corresponde de forma directa al hebreo. "Quedó embarazada" es más explicativo y moderno, pero menos ajustado al estilo del relato.'
- source_word: רִבְקָה
  english_pob_choice: Rebekah
  chosen_spanish: Rebeca
  alternatives_spanish:
  - Rebecca
  lexicon: Convención bíblica española
  rationale: Se usa la forma española habitual del nombre propio, "Rebeca", plenamente reconocible en la tradición bíblica en español.
theological_decisions:
- issue: Cómo reflejar el juego verbal entre la oración humana y la respuesta divina sin suavizarlo en exceso
  english_pob_reading: Isaac prayed / Yahweh answered him
  chosen_spanish_reading: Isaac oró / Yahvé lo escuchó
  alternative_spanish_readings:
  - Isaac suplicó / Yahvé fue suplicado por él
  - Isaac oró con insistencia / Yahvé le respondió
  rationale: El hebreo presenta un paralelismo intencional con la misma raíz עתר en ambas cláusulas. La opción escogida preserva la reciprocidad entre oración y respuesta divina con español natural. Se evita introducir "con insistencia" porque el texto hebreo, en este punto, no exige enfatizar una intensidad adicional.
  doctrine_reference: Principios POB sobre fidelidad léxica y claridad comunicativa
- issue: Representación del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto contiene el Tetragrámaton. La decisión del proyecto en español es rendirlo como "Yahvé" para mantener visible el nombre del pacto, sin sustituirlo por un título genérico.
  doctrine_reference: 'Contested terms: יהוה YHWH'
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión reciente que eliminó "earnestly" para no añadir énfasis no explícito y ajustó la segunda cláusula a un "answered him" más directo. En español, por eso se prefirió "oró" sin adverbio intensificador y "lo escuchó" como respuesta directa y natural, manteniendo el juego verbal del hebreo sin sobretraducirlo.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como forma consistente para יהוה.
  - Se usa "Rebeca" conforme a la convención bíblica española.
  - Se evita "siervo" u otras formas no pertinentes; el verso no contiene δοῦλος.
  - '"Oró" se ajusta al contexto narrativo sin forzar solemnidad arcaizante.'
  - '"Estéril" conserva el valor bíblico de עֲקָרָה con registro digno y claro.'
