review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura temporal («Cuando»), el destino de la noticia («a Egipto») y el topónimo («Tiro»). Sin embargo, «al oír la noticia de Tiro» cambia levemente la construcción hebrea כְּשֵׁמַע de un sustantivo paralelo («al/ante la noticia») a una cláusula verbal («al oír»). Además, la nota al pie está anclada solo en la primera «noticia», aunque la misma elección léxica afecta ambas apariciones de שֵׁמַע.
  spanish_quality_summary: 'El español es claro y natural. No obstante, «se retorcerán» puede sonar algo físico o incluso extraño en este contexto profético para lectores eclesiales en español; «se llenarán de angustia» o «se angustiarán» suena más idiomático, pero el inglés POB privilegia la vividez corporal. Una solución equilibrada es mantener «se retorcerán» y ajustar la segunda mitad para mayor paralelismo y dignidad: «ante la noticia de Tiro».'
  glossary_alignment: No hay términos del glosario principal en juego aparte del topónimo, y «Tiro» está bien. La revisión propuesta preserva mejor el paralelismo de שֵׁמַע / כְּשֵׁמַע sin apartarse del razonamiento léxico documentado.
  issues:
  - severity: medium
    issue: La frase «al oír la noticia» sustituye el sustantivo paralelo hebreo por una construcción verbal.
    rationale: El hebreo repite שֵׁמַע / כְּשֵׁמַע con paralelismo deliberado. «Ante la noticia» o «a la noticia» preserva mejor esa simetría y sigue siendo natural en español.
  - severity: low
    issue: La nota léxica está anclada solo en la primera ocurrencia de «noticia».
    rationale: La misma decisión léxica aplica a ambas ocurrencias del término hebreo. Conviene anclar la nota donde aparece la primera instancia o reformular el texto sin crear ambigüedad; no es un error grave, pero puede mejorarse la correspondencia.
  revised_spanish_text: Cuando llegue la noticia[a] a Egipto, se retorcerán ante la noticia de Tiro.
  revised_footnotes:
  - marker: a
    text: 'También: «el informe» o «el reporte». El hebreo שֵׁמַע puede significar noticia, informe o reporte; aquí se eligió «noticia» por naturalidad en español y para conservar el paralelismo con la segunda mitad del versículo.'
    reason: lexical_alternative
