translation:
  language: es
  text: Arrebatan al huérfano del pecho[a], y toman prenda del pobre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «roban al huérfano del seno de la madre». La expresión hebrea es difícil; el sentido es que los malvados arrancan con violencia incluso a un niño huérfano que aún mama.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִגְזְלוּ
  english_pob_choice: They snatch
  chosen_spanish: Les arrebatan
  alternatives_spanish:
  - les roban
  - les quitan por la fuerza
  - les secuestran
  lexicon: HALOT
  rationale: גזל expresa una apropiación violenta o injusta. «Arrebatar» conserva en español la fuerza brusca y predatoria mejor que «robar», que puede sonar más general.
- source_word: מִשֹּׁד
  english_pob_choice: from the breast
  chosen_spanish: del pecho
  alternatives_spanish:
  - de la mama
  - del seno
  - del pecho de la madre
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y el contexto apunta a un despojo cruel de un niño aún de lactancia. «Del pecho» mantiene la imagen sin volverla demasiado interpretativa; «del pecho de la madre» sería más explícito pero añade un elemento que el hebreo no formula de manera directa.
- source_word: יָתוֹם
  english_pob_choice: the orphan
  chosen_spanish: el huérfano
  alternatives_spanish:
  - el padre de familia no tiene
  - el huérfano de padre
  lexicon: HALOT
  rationale: יָתוֹם designa al huérfano o niño sin padre. «Huérfano» es la equivalencia natural y conserva la vulnerabilidad social del término.
- source_word: עָנִי
  english_pob_choice: the poor
  chosen_spanish: el pobre
  alternatives_spanish:
  - el necesitado
  - el afligido
  - el humilde
  lexicon: HALOT
  rationale: En el contexto económico-jurídico del verso, עָנִי se refiere al pobre al que se exige una prenda. «El pobre» es la forma más directa y sobria en español.
- source_word: יַחְבֹּלוּ
  english_pob_choice: they take a pledge
  chosen_spanish: toman prenda
  alternatives_spanish:
  - exigen prenda
  - toman como garantía
  - toman en prenda
  lexicon: HALOT
  rationale: חבל aquí tiene el sentido técnico de tomar una prenda/cobro de garantía. «Tomar prenda» conserva ese valor legal-económico sin sobreexplicar.
translation_notes:
  revision_awareness: 'Coincide con la lectura auditada del inglés POB: violencia contra el huérfano de lactancia y exacción de prenda al pobre, sin cambios de sentido relevantes respecto al texto hebreo y su nota léxica.'
  spanish_consistency_notes:
  - Se preservó el paralelismo entre el despojo del huérfano y la exigencia de prenda al pobre.
  - Se evitó «SEÑOR» o terminología no presente en el verso.
  - «Prenda» se usó en sentido jurídico-económico, coherente con el hebreo y con el inglés auditado.
