source:
  edition: SBLGNT
  text: Ἄνδρες Ἰσραηλῖται, ἀκούσατε τοὺς λόγους τούτους. Ἰησοῦν τὸν Ναζωραῖον, ἄνδρα ⸂ἀποδεδειγμένον ἀπὸ τοῦ θεοῦ⸃ εἰς ὑμᾶς δυνάμεσι καὶ τέρασι καὶ σημείοις οἷς ἐποίησεν δι’ αὐτοῦ ὁ θεὸς ἐν μέσῳ ὑμῶν, ⸀καθὼς αὐτοὶ οἴδατε,
base_translation:
  language: en
  yaml_path: translation/nt/acts/002/022.yaml
  text: 'Men of Israel[a], hear these words: Jesus the Nazarene, a man attested to you by God with miracles and wonders and signs that God did through him in your midst[b], just as you yourselves know—'
  footnotes:
  - marker: a
    text: Or 'Jesus of Nazareth' or 'Jesus the Nazorean.' The Greek title Ναζωραῖος can be rendered in more than one natural English form.
    reason: lexical_alternative
  - marker: b
    text: Or 'with mighty works and wonders and signs.' The Greek δυνάμεσι can be rendered more literally as 'powers' or idiomatically as 'miracles' in this context.
    reason: lexical_alternative
translation:
  language: ko
  text: 이스라엘 사람들이여, 이 말씀을 들으십시오. 나사렛 사람 예수는 여러분도 친히 아는 바와 같이, 하나님께서 그분을 통하여 여러분 가운데 행하신 능력 있는 일들과 기이한 일들과 표적들로[a] 여러분에게 입증해 보이신 분입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 δυνάμεσι καὶ τέρασι καὶ σημείοις. 「능력 있는 일들·기이한 일들·표적들」 셋을 함께 묶는 정형 표현이다.
    reason: lexical_alternative
