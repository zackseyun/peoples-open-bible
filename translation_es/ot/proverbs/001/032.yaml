translation:
  language: es
  text: Porque la desviación[a] de los simples los matará, y la complacencia de los necios los destruirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Porque el extravío de los simples los matará, y la seguridad o tranquilidad de los necios los destruirá».

      '
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón explicativa del proverbio anterior. En español, «Porque» conserva bien ese valor causal/explanatorio sin volver la frase artificial.
- source_word: מְשׁוּבַת
  english_pob_choice: turning away
  chosen_spanish: desviación
  alternatives_spanish:
  - apartamiento
  - alejamiento
  - apostasía
  - rebeldía
  lexicon: HALOT
  rationale: El sustantivo expresa el acto de apartarse o volverse atrás. «Desviación» conserva la idea de apartarse del camino de la sabiduría sin cargar el término con un matiz doctrinal posterior como «apostasía».
- source_word: פְּתָיִם
  english_pob_choice: the simple
  chosen_spanish: los simples
  alternatives_spanish:
  - los ingenuos
  - los inexpertos
  - los ingenuos e incautos
  lexicon: HALOT
  rationale: En Proverbios, el término designa al incauto o moralmente no formado. «Los simples» mantiene la categoría sapiencial establecida y resulta natural en español bíblico contemporáneo.
- source_word: תַּהַרְגֵם
  english_pob_choice: will kill them
  chosen_spanish: los matará
  alternatives_spanish:
  - los matará de muerte
  - los matará
  lexicon: HALOT
  rationale: El verbo indica matar de manera directa. «Los matará» es la forma natural y sobria en español, y preserva la severidad del hebreo.
- source_word: וְשַׁלְוַת
  english_pob_choice: and the complacency of
  chosen_spanish: y la complacencia de
  alternatives_spanish:
  - y la tranquilidad de
  - y la seguridad de
  - y la facilidad de
  lexicon: HALOT
  rationale: En este contexto, שַׁלְוָה no es simple paz interior, sino una quietud autocomplaciente y peligrosa. «Complacencia» capta mejor ese matiz moral que «tranquilidad» o «seguridad».
- source_word: כְּסִילִים
  english_pob_choice: fools
  chosen_spanish: necios
  alternatives_spanish:
  - fatuos
  - insensatos
  - estúpidos
  lexicon: HALOT
  rationale: Aunque «fools» puede traducirse por «necios», en español «necio» comunica bien la torpeza moral y la obstinación sapiencial, y evita el registro demasiado coloquial de otras opciones.
- source_word: תְּאַבְּדֵם
  english_pob_choice: will destroy them
  chosen_spanish: los destruirá
  alternatives_spanish:
  - los arruinará
  - los perderá
  - los hará perecer
  lexicon: HALOT
  rationale: El verbo en piel expresa causar destrucción o ruina. «Los destruirá» mantiene el paralelismo con «los matará» y la fuerza del original.
theological_decisions:
- issue: Matiz sapiencial de 'los simples' y 'los necios'
  english_pob_reading: Wisdom terms for gullible or morally obstinate persons, not merely intellectual categories.
  chosen_spanish_reading: «los simples» y «los necios» como categorías morales sapienciales, no solo como rasgos intelectuales.
  alternative_spanish_readings:
  - los ingenuos y los tontos
  - los inexpertos y los estúpidos
  rationale: La tradición sapiencial del pasaje apunta a disposición moral y conductual. La redacción española mantiene esa tensión sin convertir el proverbio en simple insulto intelectual.
  doctrine_reference: Sabiduría proverbial en Proverbios; cf. uso sapiencial de פתי y כסיל.
translation_notes:
  revision_awareness: Se siguió el audit trail en inglés y no hubo revisiones aplicadas; el sentido general fue confirmado como de alta concordancia. La principal decisión española fue escoger términos sapienciales naturales («desviación», «complacencia», «necios») sin perder el paralelismo ni suavizar la advertencia.
  spanish_consistency_notes:
  - Se mantuvo el tono proverbial breve y paralelo del hebreo.
  - «Porque» conserva la función explicativa de כִּי.
  - Se evitó «SEÑOR» u այլ masking conventions porque no aplica en este versículo.
  - La nota de alternativa se ancla en «desviación» para reflejar la posible lectura de «manera desviada» o «waywardness».
