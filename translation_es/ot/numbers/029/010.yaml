lexical_decisions:
- source_word: עִשָּׂרוֹן עִשָּׂרוֹן
  english_pob_choice: a tenth for each lamb
  chosen_spanish: una décima
  alternatives_spanish:
  - una medida de un décimo
  - un décimo
  lexicon: HALOT
  rationale: El hebreo repite el sustantivo para expresar una medida de décima parte en el contexto cultual. En español, «una décima» mantiene la brevedad del hebreo y evita añadir «de un efa», que el texto fuente de este versículo no explicita.
- source_word: לַכֶּבֶשׂ הָאֶחָד
  english_pob_choice: for each lamb
  chosen_spanish: para cada cordero
  alternatives_spanish:
  - para el cordero único
  - para un cordero
  lexicon: HALOT
  rationale: 'La construcción hebrea es distributiva: «para el cordero uno / el único». En español, «para cada cordero» comunica con naturalidad esa distribución sin perder el sentido de singularidad aplicado a cada animal.'
- source_word: לְשִׁבְעַת הַכְּבָשִׂים
  english_pob_choice: for the seven lambs
  chosen_spanish: para los siete corderos
  alternatives_spanish:
  - para siete corderos
  - para los siete corderos
  lexicon: HALOT
  rationale: El hebreo apunta al conjunto ya enumerado, con artículo definido. «Los siete corderos» conserva esa referencia anafórica y suena natural en español litúrgico y bíblico.
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa que eliminó «de un efa» por no estar presente en el texto base de este versículo. Por eso la versión española no introduce esa aclaración, aunque conserva la lectura distributiva y el registro cultual.
  spanish_consistency_notes:
  - Se usa «cordero» para לַכֶּבֶשׂ / הַכְּבָשִׂים, coherente con el término sacrificial y con el español bíblico actual.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, porque este versículo no contiene el nombre divino.
  - La nota al pie se ancla en «una décima» para reflejar la ambigüedad medida/porción sin sobreexplicar el texto.
