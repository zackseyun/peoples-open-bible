lexical_decisions:
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En listas genealógicas, בֶּן marca descendencia lineal; en español, «hijo de» conserva mejor la cadencia formal y repetitiva del linaje que «descendiente de», que sería más amplio y menos preciso aquí.
- source_word: אֶלְקָנָה
  english_pob_choice: Elkanah
  chosen_spanish: Elcaná
  alternatives_spanish:
  - Elcana
  lexicon: transliteración estándar
  rationale: Se translitera el nombre propio; «Elcaná» conserva mejor la forma española natural y la acentuación final del nombre hebreo.
- source_word: יְרֹחָם
  english_pob_choice: Jeroham
  chosen_spanish: Jeroam
  alternatives_spanish:
  - Jeroham
  lexicon: transliteración estándar
  rationale: Se mantiene el nombre propio con transliteración directa al español. Se evita una adaptación excesivamente anglicada; «Jeroam» refleja la secuencia consonántica y es legible en español.
- source_word: אֱלִיאֵל
  english_pob_choice: Eliel
  chosen_spanish: Eliel
  alternatives_spanish:
  - Eliel
  lexicon: transliteración estándar
  rationale: El nombre ya coincide con la forma española natural y no requiere ajuste adicional.
- source_word: תּוֹחַ
  english_pob_choice: Tohah
  chosen_spanish: Toá
  alternatives_spanish:
  - Toha
  - Tohu
  lexicon: transliteración estándar
  rationale: El texto hebreo de este versículo presenta תּוֹחַ; la tradición inglesa del POB opta por «Tohah». En español, «Toá» ofrece una transliteración breve y publicable que conserva la forma del hebreo mejor que una simple copia inglesa. Se deja constancia de la variación tradicional frente a otros pasajes afines.
theological_decisions:
- issue: Genealogía nominal sin carga doctrinal explícita
  english_pob_reading: The verse is a straightforward genealogy with no theological expansion.
  chosen_spanish_reading: La traducción sigue la secuencia genealógica sin añadir explicaciones ni armonizaciones en el cuerpo del texto.
  alternative_spanish_readings:
  - Agregar aclaraciones sobre paralelos genealógicos
  - Normalizar el nombre final según 1 Samuel 1:1
  rationale: El versículo solo enumera filiación; la fidelidad exige no introducir armonización en el texto principal. Las posibles diferencias con pasajes paralelos se señalan solo como nota, no como reescritura del versículo.
  doctrine_reference: Principio de fidelidad textual y distinción entre texto base y notas de comparación.
translation_notes:
  revision_awareness: El contexto de revisión indica alta concordancia con el texto fuente y ninguna modificación necesaria; se mantiene una solución breve, genealógica y auditable, con nota de comparación para la discrepancia nominal final.
  spanish_consistency_notes:
  - Se conserva el patrón repetitivo «hijo de» para mantener el ritmo genealógico.
  - Los nombres propios se transliteran sin traducirse.
  - La nota a distingue el nombre de este versículo del paralelo en 1 Samuel 1:1 sin alterar el texto principal.
  - La nota b preserva la alternativa onomástica señalada por la tradición inglesa del POB.
