review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue correctamente el hebreo breve como texto principal: «Había… delante de él; …sopló… y …ardió/se encendió». También preserva bien la nota del paralelo griego expandido. Sin embargo, «un carbón» y «lo sopló» suenan menos fieles y menos naturales en español para una גחלת encendida; el hebreo describe mejor una brasa/ascua sobre la que se sopla.'
  spanish_quality_summary: La redacción es generalmente clara, pero «Había un carbón» puede sugerir carbón mineral o un trozo no encendido, y «lo sopló» es menos idiomático que «sopló sobre ella». «Brasa» mejora la comprensibilidad y dignidad del español bíblico moderno. «Se encendió» es aceptable, aunque «ardió» también sería posible; no requiere cambio.
  glossary_alignment: No hay términos teológicos del glosario central implicados. La principal decisión léxica es גחלת, donde «brasa» se alinea mejor con el referente ardiente concreto del hebreo y evita ambigüedad en español. La nota del griego con «chispa» está bien mantenida como lectura alternativa.
  issues:
  - severity: medium
    issue: «un carbón» para גַחֶלֶת
    rationale: Aunque es un equivalente literal posible, en español general «carbón» puede sonar ambiguo o poco natural aquí. «Brasa» o «ascua» representa mejor un elemento encendido sobre el que se sopla.
  - severity: low
    issue: «lo sopló»
    rationale: Es comprensible, pero menos idiomático que «sopló sobre ella» en el contexto de avivar fuego. Además, al cambiar a «brasa», conviene concordancia femenina.
  revised_spanish_text: Había una brasa[a] delante de él; sopló sobre ella, y se encendió.
  revised_footnotes:
  - marker: a
    text: 'Paralelo griego: «Si soplas una chispa, se encenderá; y si escupes sobre ella, se apagará; y ambas salen de tu boca». El testimonio hebreo es más breve y dice: «Había una brasa delante de él; sopló sobre ella, y se encendió».'
    reason: alternative_reading
