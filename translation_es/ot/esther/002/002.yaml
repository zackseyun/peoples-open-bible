translation:
  language: es
  text: 'Entonces los jóvenes del rey, que le servían, dijeron[a][b]: «Que se busquen para el rey jóvenes vírgenes hermosas en apariencia».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «jóvenes mujeres, vírgenes, buenas de apariencia».
    reason: lexical_alternative
  - marker: b
    text: 'O, más formalmente: «Que busquen para el rey jóvenes vírgenes hermosas en apariencia».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמְרוּ
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijeron
  alternatives_spanish:
  - Y ... dijeron
  - Luego ... dijeron
  lexicon: HALOT
  rationale: La waw consecutiva introduce avance narrativo; «Entonces» conserva la secuencia en español con fluidez natural.
- source_word: נַעֲרֵי הַמֶּלֶךְ
  english_pob_choice: the king’s young men
  chosen_spanish: los jóvenes del rey
  alternatives_spanish:
  - los servidores del rey
  - los muchachos del rey
  lexicon: HALOT
  rationale: נַעַר aquí se entiende mejor como «joven»; se evita «siervos» porque מְשָׁרְתָיו ya expresa la idea de servicio/atención.
- source_word: מְשָׁרְתָיו
  english_pob_choice: who attended him
  chosen_spanish: que le servían
  alternatives_spanish:
  - que le asistían
  - sus asistentes
  lexicon: HALOT
  rationale: El participio comunica servicio personal al rey. «Le servían» preserva esa relación sin sonar demasiado técnico en español.
- source_word: יְבַקְשׁוּ לַמֶּלֶךְ
  english_pob_choice: Let ... be sought for the king
  chosen_spanish: Que se busquen para el rey
  alternatives_spanish:
  - Que las busquen para el rey
  - Busquen para el rey
  lexicon: HALOT
  rationale: Aunque el hebreo es formalmente activo, el inglés POB opta por una construcción impersonal/pasiva para el mandato. En español, «Que se busquen» conserva esa fuerza sin añadir un sujeto no explicitado.
- source_word: נְעָרוֹת
  english_pob_choice: young virgins
  chosen_spanish: jóvenes vírgenes
  alternatives_spanish:
  - muchachas vírgenes
  - doncellas
  lexicon: HALOT
  rationale: Se mantiene el componente de edad/condición con «jóvenes», y se evita «doncellas» por su tono más arcaico.
- source_word: בְּתוּלוֹת
  english_pob_choice: virgins
  chosen_spanish: vírgenes
  alternatives_spanish:
  - doncellas
  - mujeres vírgenes
  lexicon: HALOT
  rationale: El término denota virginidad de forma específica; «vírgenes» es la equivalencia directa y más precisa.
- source_word: טוֹבוֹת מַרְאֶה
  english_pob_choice: beautiful in appearance
  chosen_spanish: hermosas en apariencia
  alternatives_spanish:
  - bellas en apariencia
  - de buen aspecto
  - hermosas de aspecto
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «buenas de aspecto»; «hermosas en apariencia» refleja el idioma sin reducirlo a una paráfrasis interpretativa excesiva.
theological_decisions:
- issue: Redacción del mandato en forma impersonal
  english_pob_reading: Let young virgins beautiful in appearance be sought for the king.
  chosen_spanish_reading: Que se busquen para el rey jóvenes vírgenes, hermosas en apariencia.
  alternative_spanish_readings:
  - Busquen para el rey jóvenes vírgenes hermosas en apariencia.
  - Que busquen para el rey jóvenes vírgenes hermosas en apariencia.
  rationale: El texto hebreo usa un verbo activo en un contexto de orden indirecta; la traducción impersonal mantiene la indefinición del agente y el tono de decreto/corte sin forzar un sujeto explícito.
  doctrine_reference: None
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del inglés POB, que separa «young virgins» de «beautiful in appearance» para reflejar con mayor precisión el orden y la relación de los adjetivos en el hebreo. La versión española conserva esa separación con una construcción natural.
  spanish_consistency_notes:
  - Se mantiene «vírgenes» para בְּתוּלוֹת por precisión léxica.
  - Se evita «siervos» para נַעֲרֵי הַמֶּלֶךְ porque el texto distingue esa idea de מְשָׁרְתָיו.
  - «Hermosas en apariencia» conserva el valor idiomático de טוֹבוֹת מַרְאֶה sin volverlo excesivamente interpretativo.
  - El tono general es sobrio y publicable, con sintaxis natural para español bíblico contemporáneo.
