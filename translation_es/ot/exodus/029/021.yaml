  yaml_path: translation/ot/exodus/029/021.yaml
  text: Then you shall take some of the blood that is on the altar and some of the anointing oil[a], and sprinkle it on Aaron and on his garments and on his sons and on the garments of his sons with him; and he and his garments shall be holy, and his sons and the garments of his sons with him.
  footnotes:
