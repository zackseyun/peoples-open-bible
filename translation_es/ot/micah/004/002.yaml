translation:
  language: es
  text: 'Vendrán muchas naciones y dirán: «Vengan, subamos al monte de Yahvé, a la casa del Dios de Jacob, para que nos enseñe sus caminos y caminemos en sus sendas». Porque de Sion saldrá la Torá[a], y de Jerusalén la palabra de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ley» o «instrucción» para «Torá».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָלְכוּ
  english_pob_choice: will come
  chosen_spanish: caminarán
  alternatives_spanish:
  - irán
  - vendrán
  lexicon: HALOT
  rationale: El hebreo הלך puede significar ir/caminar. En el contexto de naciones que se dirigen hacia Sion, el español natural conserva el movimiento con «caminarán», sin perder el matiz de desplazamiento.
- source_word: גּוֹיִם רַבִּים
  english_pob_choice: many nations
  chosen_spanish: muchas naciones
  alternatives_spanish:
  - muchos pueblos
  - numerosas naciones
  lexicon: HALOT
  rationale: גוֹיִם suele referirse a naciones; «muchas naciones» reproduce de forma directa el alcance internacional de la visión.
- source_word: לְכוּ וְנַעֲלֶה
  english_pob_choice: Come, let us go up
  chosen_spanish: Vengan, subamos
  alternatives_spanish:
  - Vengan, ascendamos
  - Vengan, vayamos arriba
  lexicon: HALOT
  rationale: El imperativo plural con cohortativo expresa invitación a una acción compartida. «Subamos» preserva la imagen de ascenso hacia Jerusalén y suena natural en español.
- source_word: הַר יְהוָה
  english_pob_choice: the mountain of Yahweh
  chosen_spanish: el monte de Yahvé
  alternatives_spanish:
  - la montaña de Yahvé
  - el monte de YHWH
  lexicon: HALOT
  rationale: הַר es «monte»/«montaña»; en español bíblico «monte» es más idiomático. Se mantiene «Yahvé» según la convención del proyecto para el nombre divino.
- source_word: בֵּית אֱלֹהֵי יַעֲקֹב
  english_pob_choice: the house of the God of Jacob
  chosen_spanish: la casa del Dios de Jacob
  alternatives_spanish:
  - el templo del Dios de Jacob
  - la casa del Dios de Israel
  lexicon: HALOT
  rationale: «Casa» conserva el hebraísmo literal y no interpreta de más con «templo». «Dios de Jacob» sigue de cerca la construcción del original.
- source_word: וְיוֹרֵנוּ
  english_pob_choice: that he may teach us
  chosen_spanish: él nos enseñará
  alternatives_spanish:
  - para que nos enseñe
  - y nos instruirá
  lexicon: HALOT
  rationale: La forma causativa expresa instrucción. En español, dentro de la frase final, «él nos enseñará» comunica con claridad el valor final/resultativo sin forzar un subjuntivo poco fluido.
- source_word: מִדְּרָכָיו
  english_pob_choice: his ways
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus vías
  - sus sendas
  lexicon: HALOT
  rationale: דֶּרֶךְ suele corresponder a «camino»; «sus caminos» es la opción más transparente y tradicionalmente inteligible.
- source_word: וְנֵלְכָה
  english_pob_choice: that we may walk
  chosen_spanish: y andaremos
  alternatives_spanish:
  - para que andemos
  - y caminaremos
  lexicon: HALOT
  rationale: La cohesión con el paralelismo favorece un futuro de intención/proyección en español. «Andaremos» mantiene la metáfora bíblica de la conducta sin sonar rígido.
- source_word: בְּאֹרְחֹתָיו
  english_pob_choice: in his paths
  chosen_spanish: en sus sendas
  alternatives_spanish:
  - en sus caminos
  - por sus sendas
  lexicon: HALOT
  rationale: אֹרַח tiene el matiz de senda/paso. «Sendas» ayuda a distinguirlo de דְּרָכָיו, preservando el paralelismo poético.
- source_word: מִצִּיּוֹן
  english_pob_choice: from Zion
  chosen_spanish: de Sion
  alternatives_spanish:
  - desde Sion
  lexicon: HALOT
  rationale: La preposición expresa procedencia. «De Sion» es la forma más natural y compacta en español bíblico.
- source_word: תֵּצֵא
  english_pob_choice: will go out
  chosen_spanish: saldrá
  alternatives_spanish:
  - saldrá fuera
  - irá a salir
  lexicon: HALOT
  rationale: יצא se traduce de manera directa con «saldrá»; es claro, fiel y idiomático.
- source_word: תוֹרָה
  english_pob_choice: Torah
  chosen_spanish: la Torá
  alternatives_spanish:
  - la instrucción
  - la ley
  lexicon: HALOT
  rationale: Se conserva el término transliterado «Torá» para no reducir su alcance a «ley» y para mantener su resonancia canónica y covenantal. La mayúscula refleja su uso como término técnico.
- source_word: וּדְבַר יְהוָה
  english_pob_choice: and the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra de Yahweh
  lexicon: HALOT
  rationale: דָּבָר es «palabra»/«mensaje». «Palabra de Yahvé» conserva la fórmula profética estándar y la referencia al nombre divino.
- source_word: מִירוּשָׁלִָם
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: HALOT
  rationale: La procedencia se expresa naturalmente con «de Jerusalén», manteniendo la concisión del hebreo.
theological_decisions:
- issue: Renderización del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa el nombre propio divino. En la norma del proyecto, se vierte como «Yahvé» para preservar el nombre del pacto en español y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de תּוֹרָה en contexto profético de Sion
  english_pob_reading: Torah
  chosen_spanish_reading: la Torá
  alternative_spanish_readings:
  - la ley
  - la instrucción
  rationale: En este pasaje, תּוֹרָה no se reduce adecuadamente a «ley»; designa la instrucción divina que sale de Sion. «La Torá» conserva el peso canónico y evita empobrecer el término.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: El contexto de auditoría en inglés está en alta concordancia y no muestra revisiones aplicadas; el español sigue esa lectura estable, conservando las decisiones léxicas clave sobre el nombre divino y Torá, con adaptación natural a la sintaxis del español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה de forma consistente con la norma del proyecto.
  - Se distingue «camino(s)» y «senda(s)» para reflejar el paralelismo hebreo entre דְּרָכָיו y אֹרְחֹתָיו.
  - Se usa «Torá» transliterada y se anota la alternativa semántica en nota para no perder el rango de sentido.
  - La puntuación y las comillas siguen convención española, con un discurso directo fluido y publicable.
