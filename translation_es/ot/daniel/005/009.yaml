  yaml_path: translation/ot/daniel/005/009.yaml
  text: Then King Belshazzar became greatly alarmed[a], his color changed[b], and his nobles were perplexed.
  footnotes:
  - marker: a
    text: Or 'his face grew pale' / 'the color of his face changed.' The Aramaic expression literally speaks of his splendor or appearance changing upon him, an idiom for visible loss of color from fear.
    reason: lexical_alternative
  - marker: b
    text: Or 'his lords were bewildered.' The term refers to the king's leading officials or grandees.
    reason: lexical_alternative
