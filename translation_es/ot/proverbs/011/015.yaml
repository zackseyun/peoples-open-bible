revisions:
- from: Malo[a] se dañará quien sale fiador por un extraño, pero el que aborrece dar palmadas de garantía[b] está seguro.
  to: Sufrirá ciertamente daño quien sale fiador por un extraño, pero el que aborrece estrechar manos[a] está seguro.
  rationale: 'La revisión corrige dos puntos principales: 1) reemplaza «Malo se dañará» por «Sufrirá ciertamente daño», que expresa con claridad y naturalidad el valor adversativo-intensivo de רַע יֵרֹועַ sin sugerir maldad moral; 2) sustituye «dar palmadas de garantía» por «estrechar manos», una formulación española más inteligible para el modismo תֹקְעִים, conservando la explicación cultural en nota. El resto del versículo ya era fiel y de buen registro.'
