base_translation:
  language: en
  yaml_path: translation/ot/proverbs/027/010.yaml
  text: Do not forsake your friend or your father’s friend[a], and do not go to your brother’s house in the day of your calamity[b]; a nearby neighbor is better than a distant brother.
  footnotes:
  - marker: a
    text: Or 'and your father’s friend.' The Hebrew conjunction can be rendered either way; 'or' is used in the main text for smoother English under a single prohibition.
    reason: lexical_alternative
  - marker: b
    text: '''Brother'' may also be understood more broadly as a close relative or kinsman.'
    reason: lexical_alternative
