review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia narrativa básica y la mayoría de los valores léxicos: volvió a Judá, reportó que no la encontró, y añadió el testimonio de los hombres del lugar. Sin embargo, no sigue adecuadamente el rastro léxico auditado para קְדֵשָׁה, ya que el inglés POB decidió una traducción en texto principal (''cult prostitute'') con nota de alternativa, mientras el español traslada la palabra hebrea al texto principal sin anclaje de nota en ese término. Además, la nota [a] no corresponde al lugar ni al contenido de la nota inglesa auditada.'
  spanish_quality_summary: 'El español es generalmente natural, pero presenta dos problemas de legibilidad/editorial: la nota [a] está mal ubicada y mal formulada, y la transliteración ''qĕdēšâ'' en el texto principal suena poco legible para una Biblia eclesial en español cuando ya existe una opción clara y documentada: ''prostituta de culto''. También conviene evitar comillas inglesas internas y mantener una puntuación más limpia en español.'
  glossary_alignment: 'No hay conflicto con términos de proyecto mayores como Yahvé, Mesías, etc. El punto clave es קְדֵשָׁה: según el expediente POB debe verterse normalmente en el texto principal como ''prostituta de culto'', con nota que preserve la alternativa ''prostituta del templo'' y explique el matiz cultual. La transliteración en texto principal se aparta de esa decisión sin necesidad suficiente.'
  issues:
  - severity: high
    issue: קְדֵשָׁה se dejó transliterado en el texto principal
    rationale: El expediente inglés eligió explícitamente 'cult prostitute' en el texto principal y reservó las alternativas para nota. En español, 'qĕdēšâ' reduce la inteligibilidad y no preserva la decisión lexical auditada.
  - severity: high
    issue: La nota [a] no refleja la nota inglesa ni está anclada al elemento correcto
    rationale: 'La nota inglesa [a] corresponde a la cláusula existencial final (''There was no cult prostitute here''), no a ''dijo''. En el borrador, [a] aparece tras ''dijo'' y además ofrece ''O: «No la encontré»'', que no tiene base en la evidencia dada.'
  - severity: medium
    issue: Falta un anclaje de nota en el término técnico principal
    rationale: La explicación léxica sobre קְדֵשָׁה debe anclarse al término español correspondiente en el texto, no solo a 'dijeron'.
  - severity: low
    issue: Uso de comillas internas menos idiomático
    rationale: Puede simplificarse con comillas españolas consistentes para mejorar la presentación editorial.
