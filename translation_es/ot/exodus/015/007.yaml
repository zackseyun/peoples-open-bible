revisions:
- from: Y en la grandeza de tu majestad derribas a los que se levantan contra ti[a]; envías tu ardiente enojo[b]; los consume como hojarasca.
  to: Y en la grandeza de tu majestad derribas a los que se levantan contra ti[a]; envías tu ardiente enojo[b]; los consume como paja.
  rationale: Se cambia «hojarasca» por «paja» para reflejar con mayor fidelidad כַּקַּשׁ y conservar la imagen agrícola de material seco rápidamente consumido. También se mejora la nota a para evitar repetición innecesaria y alinear mejor la alternativa con el campo semántico de «grandeur/majesty».
