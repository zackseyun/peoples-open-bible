revisions:
- from: ¿Qué derecho tiene mi amado en mi casa[a][b][c], si ha hecho sus muchos planes perversos? ¿Puede la carne santa apartar tu maldad de ti? ¡Entonces te alegrarás!
  to: ¿Qué derecho tiene mi amada en mi casa[c][b][a], cuando ha hecho sus muchas maquinaciones perversas? ¿Puede la carne santa apartar tu maldad de ti? ¡Entonces te alegras!
  rationale: Se ajusta «mi amado» a «mi amada» para respetar el referente femenino colectivo documentado en el audit trail y evitar incoherencia contextual en español. Se cambia «si ha hecho» por «cuando ha hecho» para reflejar mejor la relación sintáctica adoptada por el POB inglés. Se actualiza «te alegrarás» a «te alegras» para seguir más de cerca el valor no explícitamente futuro del hebreo/POB inglés («you rejoice») y conservar la ironía inmediata. «Maquinaciones perversas» intensifica de manera natural el matiz negativo de מְזִמָּה sin alejarse del original.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:33:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del hebreo y del POB inglés: conserva el giro idiomático de legitimidad en «¿Qué derecho tiene...?», mantiene «mi casa», refleja la ironía de «mi amado», y comunica correctamente la crítica a la confianza en la «carne santa» para quitar la culpa. También preserva las notas de dificultad textual y alternativa literal. Sin embargo, hay dos desajustes relevantes: (1) «si ha hecho» debilita la fuerza temporal/acusatoria mejor representada por «cuando ha hecho» o similar; (2) «mi amado» choca con el femenino implícito del hebreo y con la decisión teológica auditada de Judá/Jerusalén como referente femenino colectivo, por lo que en español conviene «mi amada».'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero requiere un pequeño ajuste para mayor fidelidad y naturalidad. «Mi amada» encaja mejor con el referente femenino y evita una incoherencia interna con «ha hecho»/«tu maldad» dirigidos a una destinataria femenina. Además, «cuando ha hecho» suena más natural y más cercano a la función sintáctica adoptada por el POB inglés que «si ha hecho». El resto del versículo y las notas están bien formulados.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparece Yahvé en este versículo. «Carne santa» es aceptable y coherente con la decisión cultual del POB. «Maldad» representa bien רָעָה en contexto moral. La principal cuestión léxica es de concordancia interpretativa: «לִידִידִי» debe verterse en español de forma que no opaque el referente femenino colectivo; «mi amada» preserva mejor la lectura documentada.'
  issues:
  - severity: medium
    issue: «mi amado» no refleja el referente femenino colectivo implícito
    rationale: Aunque יְדִיד es léxicamente «amado/beloved», el contexto y las formas femeninas del versículo apuntan a Judá/Jerusalén. En español, «mi amada» conserva la ironía pactal sin introducir confusión de género.
  - severity: medium
    issue: «si ha hecho» debilita la relación sintáctica y retórica del hebreo difícil
    rationale: La decisión inglesa auditada prefirió «when she has done». En español, «cuando ha hecho» o equivalente mantiene mejor la acusación temporal/circunstancial que la condicional «si ha hecho», que puede sugerir duda no presente en el reproche.
  - severity: low
    issue: Orden de notas [a][b][c] no sigue el orden ideal del POB inglés
    rationale: No es un error grave, pero conviene mantener correspondencia limpia entre anclajes y contenido de notas. Puede conservarse si el sistema ya lo permite, pero un orden [c][b][a] alinearía mejor con el audit trail.
  revised_spanish_text: ¿Qué derecho tiene mi amada en mi casa[c][b][a], cuando ha hecho sus muchas maquinaciones perversas? ¿Puede la carne santa apartar tu maldad de ti? ¡Entonces te alegras!
  revised_footnotes:
