translation:
  language: es
  text: Y hace que a todos, los pequeños y los grandes, y los ricos y los pobres, y los libres y los esclavos, se les dé una marca[a] en su mano derecha o en su frente,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «para que les den una marca». El griego es sintácticamente difícil; el texto principal vierte el sentido en español natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ποιεῖ
  english_pob_choice: causes
  chosen_spanish: hace que
  alternatives_spanish:
  - causa que
  - provoca que
  - obliga a
  lexicon: BDAG
  rationale: El verbo griego expresa agencia causal eficaz. «Hace que» comunica esa causalidad en español natural sin añadir con demasiada fuerza una idea de coerción que el verbo por sí solo no exige.
- source_word: πάντας
  english_pob_choice: everyone
  chosen_spanish: a todos
  alternatives_spanish:
  - a cada uno
  - a todos ellos
  lexicon: BDAG
  rationale: El acusativo plural con la serie de categorías siguientes tiene alcance universal dentro del grupo en vista. «A todos» conserva esa amplitud de forma clara y natural.
- source_word: τοὺς μικροὺς καὶ τοὺς μεγάλους
  english_pob_choice: the small and the great
  chosen_spanish: los pequeños y los grandes
  alternatives_spanish:
  - los humildes y los poderosos
  - los insignificantes y los importantes
  lexicon: BDAG
  rationale: Se mantiene la pareja de rango social de manera cercana al griego. «Pequeños y grandes» preserva el ritmo retórico y la amplitud de clases sociales.
- source_word: τοὺς πλουσίους καὶ τοὺς πτωχούς
  english_pob_choice: the rich and the poor
  chosen_spanish: los ricos y los pobres
  alternatives_spanish:
  - los adinerados y los necesitados
  lexicon: BDAG
  rationale: Es el contraste socioeconómico estándar y más transparente en español.
- source_word: τοὺς ἐλευθέρους καὶ τοὺς δούλους
  english_pob_choice: the free and the slaves
  chosen_spanish: los libres y los esclavos
  alternatives_spanish:
  - los libres y los siervos
  - los libres y los esclavos sometidos
  lexicon: BDAG
  rationale: En el contraste con «libres», δοῦλος resalta estatus de servidumbre legal/propiedad, por lo que «esclavos» conserva la fuerza lexical mejor que «siervos».
- source_word: ἵνα δῶσιν αὐτοῖς χάραγμα
  english_pob_choice: to be given a mark
  chosen_spanish: se les dé una marca
  alternatives_spanish:
  - para que les den una marca
  - para que reciban una marca
  lexicon: BDAG
  rationale: El griego es sintácticamente difícil; la pasiva española refleja el sentido resultante y mantiene la claridad sin forzar una estructura extraña. «Marca» traduce χάραγμα como signo identificador/inscripción.
- source_word: χάραγμα
  english_pob_choice: mark
  chosen_spanish: marca
  alternatives_spanish:
  - señal
  - sello
  - impronta
  lexicon: BDAG
  rationale: «Marca» es el equivalente más natural y semánticamente adecuado para χάραγμα en Apocalipsis, con posible matiz de identificación visible.
- source_word: ἐπὶ τῆς χειρὸς αὐτῶν τῆς δεξιᾶς
  english_pob_choice: on their right hand
  chosen_spanish: en su mano derecha
  alternatives_spanish:
  - sobre su mano derecha
  - en la mano derecha de ellos
  lexicon: BDAG
  rationale: El singular distributivo de la mano en español es idiomático y fiel; «derecha» traduce δεξιᾶς con precisión.
- source_word: ἢ ἐπὶ τὸ μέτωπον αὐτῶν
  english_pob_choice: or on their forehead
  chosen_spanish: o en su frente
  alternatives_spanish:
  - o sobre su frente
  - o en la frente de ellos
  lexicon: BDAG
  rationale: «Frente» es la forma natural en español para μέτωπον; el singular distributivo conserva la economía del griego.
theological_decisions:
- issue: Renderización de δοῦλος en una lista social contrastada con «libres»
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - siervos sujetos
  rationale: La oposición directa con «libres» hace explícito el estatus de dependencia forzada; «esclavos» evita suavizar una distinción social que el texto subraya.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
- issue: Cómo expresar ἵνα δῶσιν αὐτοῖς χάραγμα
  english_pob_reading: to be given a mark
  chosen_spanish_reading: se les dé una marca
  alternative_spanish_readings:
  - para que les den una marca
  - para que reciban una marca
  rationale: La construcción griega es difícil y puede expresarse de modo pasivo en español para comunicar el resultado sin introducir una explicación interpretativa adicional. Se conserva la ambigüedad sobre el mecanismo exacto, como en el audit trail inglés.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente: la evaluación interna indicó alta concordancia y no registró cambios aplicados; por eso se produjo un borrador alineado con el audit trail inglés sin introducir revisiones nuevas.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» solo donde fuera pertinente; este versículo no contiene el nombre divino.
  - Se eligió «esclavos» para δοῦλος conforme al criterio POB cuando el contraste con «libres» hace saliente la dependencia legal.
  - «Marca» se usa de forma consistente para χάραγμα, evitando términos más interpretativos como «sello» o «señal».
  - Se conservaron listas paralelas con artículo definido para reflejar el ritmo del griego.
