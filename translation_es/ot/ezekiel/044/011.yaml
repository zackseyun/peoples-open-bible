review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura y el sentido general del hebreo: servicio subordinado en el santuario, responsabilidad en las puertas, matanza de los sacrificios para el pueblo y servicio ante ellos. Sin embargo, no sigue la decisión auditada de traducir הַבַּיִת como ''templo'' en este contexto visionario; ''la casa'' en español resulta menos claro y se aparta del razonamiento documentado. Además, ''matarán'' es comprensible pero menos preciso/cultual que ''degollarán'' para יִשְׁחֲטוּ en contexto sacrificial.'
  spanish_quality_summary: El español es mayormente natural y digno, pero 'con supervisión en las puertas' suena algo rígido; 'encargados de la supervisión de las puertas del templo' fluye mejor. 'La casa' es menos claro para lectura eclesial amplia. 'Degollarán' mejora la precisión cultual sin sonar arcaico.
  glossary_alignment: No hay conflicto con términos troncales del proyecto como Yahvé/Mesías. La decisión 'ministros/ministrando' es aceptable para מְשָׁרְתִים. El principal desajuste es mantener 'la casa' donde la auditoría inglesa documenta 'temple' por claridad contextual. Las notas deben reflejar esa elección principal y preservar la alternativa hebrea 'la casa'.
  issues:
  - severity: medium
    issue: Uso de 'la casa' en lugar de 'el templo' para הַבַּיִת
    rationale: La auditoría inglesa documenta explícitamente que, en esta visión del templo, 'temple' aclara el referente. En español, 'la casa' suena más ambiguo y menos natural en el contexto cultual.
  - severity: low
    issue: '''Matarán'' para יִשְׁחֲטוּ es poco preciso en contexto sacrificial'
    rationale: El verbo se refiere al degüello ritual de la ofrenda. 'Degollarán' o 'sacrificarán' comunica mejor la acción cultual; 'degollarán' preserva la especificidad verbal.
  - severity: low
    issue: '''Con supervisión en las puertas'' suena algo poco idiomático'
    rationale: Aunque transmite la idea, una formulación como 'encargados de la supervisión de las puertas del templo' o 'con responsabilidad sobre las puertas del templo' suena más natural y clara en español.
  revised_spanish_text: Pero serán ministros en mi santuario, encargados de la supervisión de las puertas del templo[a] y ministrando en el templo[b]. Ellos degollarán el holocausto y el sacrificio para el pueblo[c], y estarán delante de ellos para ministrarles.
  revised_footnotes:
