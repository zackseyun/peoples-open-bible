translation:
  language: es
  text: José, hijo de Zacarías, y Azarías[a], jefes de las fuerzas, oyó hablar de las hazañas valerosas y de la guerra que habían librado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de Swete parece leer Ζαχαρίας en el segundo nombre; el contexto narrativo y la tradición textual estándar apoyan «Azarías» aquí.
