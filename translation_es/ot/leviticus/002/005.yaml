translation:
  language: es
  text: Y si tu ofrenda es una ofrenda de grano[a] preparada sobre la plancha[b], será de flor de harina mezclada con aceite, sin levadura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ofrenda vegetal'. El hebreo מִנְחָה designa aquí la ofrenda de harina/grano propia de este capítulo, no una ofrenda genérica.
    reason: lexical_alternative
  - marker: b
    text: O 'sobre un sartén plano'. El término hebreo se refiere a una superficie de cocción usada para preparar esta ofrenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְחָה
  english_pob_choice: grain offering
  chosen_spanish: ofrenda de grano
  alternatives_spanish:
  - ofrenda
  - ofrenda vegetal
  - ofrenda de cereal
  lexicon: HALOT
  rationale: En Levítico 2, מִנְחָה designa la ofrenda cultual de harina/grano, no una ofrenda genérica. 'Ofrenda de grano' conserva esa referencia específica sin imponer una terminología extraña al español bíblico.
- source_word: עַל הַמַּחֲבַת
  english_pob_choice: on the griddle
  chosen_spanish: sobre la plancha
  alternatives_spanish:
  - sobre la parrilla
  - sobre el comal
  - sobre la bandeja plana
  lexicon: HALOT
  rationale: El término apunta a una superficie plana de cocción. 'Plancha' comunica en español moderno esa superficie sin precisar indebidamente un utensilio único; evita también el calco demasiado técnico si el contexto hispano no usa 'griddle'.
- source_word: קָרְבָּנְךָ
  english_pob_choice: your offering
  chosen_spanish: tu ofrenda
  alternatives_spanish:
  - tu ofrenda presentada
  - tu sacrificio
  lexicon: HALOT
  rationale: Se mantiene el valor de 'ofrenda' para קָרְבָּן y el posesivo de segunda persona para conservar la dirección inmediata del texto, sin redundancia en español.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: '''Flor de harina'' es una expresión española estable y digna para la harina finamente molida; preserva bien el carácter cultual y la calidad del ingrediente.'
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - amasada con aceite
  - mezclada en aceite
  lexicon: HALOT
  rationale: El participio expresa combinación de la harina con aceite. 'Mezclada con aceite' es claro y natural en español; evita especificar 'amasada' cuando el hebreo no obliga a ese matiz.
- source_word: מַצָּה
  english_pob_choice: unleavened
  chosen_spanish: sin levadura
  alternatives_spanish:
  - á zima
  - unleudada
  lexicon: HALOT
  rationale: Aquí el adjetivo describe el estado requerido de la ofrenda. 'Sin levadura' expresa la ausencia del fermento de forma directa y natural en español; se preserva la función normativa.
- source_word: תִהְיֶה
  english_pob_choice: it shall be
  chosen_spanish: será
  alternatives_spanish:
  - deberá ser
  - ha de ser
  lexicon: HALOT
  rationale: El imperfecto hebreo funciona como requisito prescriptivo. 'Será' mantiene el valor normativo sin sobrecargarlo con una modalización más fuerte que el texto no exige.
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto hebreo masorético y del audit trail en inglés. No se detectaron revisiones textuales ni cambios sustantivos en el sentido; se mantuvo la lectura común del utensilio de cocción como superficie plana, y el resto sigue de cerca la estructura prescriptiva del hebreo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el texto bíblico general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió 'ofrenda de grano' para mantener la especificidad cultual de מִנְחָה.
  - '''Sin levadura'' conserva la obligación ritual sin introducir una paráfrasis doctrinal.'
