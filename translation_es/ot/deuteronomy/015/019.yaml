revisions:
- from: Todo primogénito varón que nazca entre tu ganado y entre tu rebaño, lo consagrarás a Yahvé tu Dios[a]. No trabajarás con el primogénito de tu buey[b], ni esquilarás el primogénito de tu rebaño.
  to: Todo primogénito macho que nazca entre tu ganado y entre tu rebaño lo consagrarás a Yahvé[a] tu Dios. No trabajarás con el primogénito de tu buey, ni esquilarás el primogénito de tu rebaño.
  rationale: 'Se corrige ''varón'' a ''macho'' para reflejar el sexo animal con español natural y fiel. Se elimina la nota sobre YHWH mal ubicada junto a ''buey''; dado que el texto principal ya usa correctamente ''Yahvé'' según la norma del proyecto, no hace falta mantener una nota textual adicional aquí. Se conserva la nota alternativa sobre el distributivo y las preposiciones, anclada de forma coherente en ''Yahvé[a]'' no; mejor: un único anclaje disponible en el texto revisado para la variante global. No se requiere adjudicación adicional.'
  reviewer_model: gpt-5.4
