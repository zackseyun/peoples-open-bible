theological_decisions:
- issue: Moral characterization of the brothers' death
  chosen_reading: to die nobly
  alternative_readings:
  - to die bravely
  - to meet death courageously
  rationale: The Greek presents their death in terms of noble courage without requiring later doctrinal categories to be imported. 'Nobly' preserves the honor-laden moral register of γενναίως while avoiding paraphrase.
  doctrine_reference: Preserve theological tension rather than resolve it; readable modern English, not archaic or academic.
