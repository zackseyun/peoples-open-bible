translation:
  language: es
  text: Y no había nadie allí, excepto los dos ancianos[a], escondidos y observándola.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «espiándola». El verbo griego puede implicar una observación cercana, hostil o furtiva; el texto principal conserva una formulación más literal con «observándola».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ ἦν οὐδεὶς
  english_pob_choice: no one was there
  chosen_spanish: no había nadie allí
  alternatives_spanish:
  - no estaba nadie allí
  - no había ninguna persona allí
  lexicon: BDAG
  rationale: La doble negación griega expresa ausencia de personas presentes. En español, «no había nadie allí» comunica con naturalidad esa ausencia sin añadir matices innecesarios.
- source_word: πλὴν
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - a excepción de
  lexicon: BDAG
  rationale: El valor de excepción se mantiene de forma clara y actual con «excepto».
- source_word: οἱ δύο πρεσβύτεροι
  english_pob_choice: the two elders
  chosen_spanish: los dos ancianos
  alternatives_spanish:
  - los dos ancianos de Israel
  - los dos mayores
  lexicon: BDAG
  rationale: En este relato, πρεσβύτεροι señala a los ancianos/dirigentes, no solo a hombres de mayor edad. «Ancianos» conserva ese peso narrativo y resulta natural en español bíblico.
- source_word: κεκρυμμένοι
  english_pob_choice: hidden
  chosen_spanish: escondidos
  alternatives_spanish:
  - ocultos
  - escondidos ya
  lexicon: BDAG
  rationale: El participio perfecto indica un estado ya establecido de ocultamiento. «Escondidos» comunica bien ese estado de manera idiomática en español.
- source_word: παρατηροῦντες
  english_pob_choice: watching her
  chosen_spanish: vigilando a ella
  alternatives_spanish:
  - observándola
  - acechándola
  - espiándola
  lexicon: BDAG
  rationale: El verbo puede expresar un mirar atento y furtivo, incluso hostil. «Vigilando a ella» conserva la idea de observación atenta sin forzar todavía la interpretación más cargada de «espiándola».
translation_notes:
  revision_awareness: El flujo auditado en inglés no requirió cambios; la revisión más reciente quedó sin modificaciones, con acuerdo alto entre los controles de revisión.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se traduce πρεσβύτεροι como «ancianos» para reflejar el oficio/estatus narrativo, no simplemente la edad.
  - La nota textual/lexical de παρατηροῦντες se mantiene en una nota al pie porque el español, como el inglés, admite un matiz más fuerte de acecho o espionaje.
