base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/033/017.yaml
  text: His firstborn bull has majesty[a], and his horns are the horns of a wild ox; with them he will gore peoples together to the ends of the earth. These are the myriads of Ephraim[b], and these are the thousands of Manasseh.
  footnotes:
  - marker: a
    text: Or 'the horns of a wild bull.' The Hebrew רְאֵם likely refers to a powerful wild bovine, traditionally rendered 'unicorn' in older English versions.
    reason: lexical_alternative
  - marker: b
    text: Or 'ten thousands of Ephraim.' The Hebrew רִבְבֹות denotes very large numbers and is contrasted with 'thousands of Manasseh.'
    reason: lexical_alternative
