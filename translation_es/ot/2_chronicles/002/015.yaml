    reason: lexical_alternative
  revision_rationale: 'Se corrigen pequeños detalles para alinear mejor el español con el hebreo y con el rastro de auditoría del POB: «traeremos» expresa mejor el movimiento hacia el destinatario; la nota [a] ahora registra de verdad la alternativa léxica de «balsas»; «según todo lo que necesites» mejora la naturalidad sin perder sentido; y «la subirás» hace el español más fluido mientras la nota conserva el matiz literal de «harás subir».'
