translation:
  language: es
  text: No dejes que el salario de toda persona que trabaja para ti pase la noche contigo[a], sino págaselo de inmediato. Si sirves a Dios, te será retribuido[b]. Cuídate, niño, en todas tus obras, y sé disciplinado en toda tu conducta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: "no dejes que el salario ... pase la noche contigo". La imagen griega prohíbe retrasar el pago hasta el día siguiente.'
    reason: lexical_alternative
  - marker: b
    text: El griego dice "te será retribuido", dejando implícito el agente; el sentido es que Dios te retribuirá.
    reason: alternative_reading
lexical_decisions:
- source_word: μισθός
  english_pob_choice: wages
  chosen_spanish: salario
  alternatives_spanish:
  - paga
  - remuneración
  lexicon: BDAG
  rationale: En contexto laboral, μισθός se refiere a la compensación debida por el trabajo. 'Salario' comunica esa obligación económica de manera natural en español y conserva el peso ético del mandato de pagar sin demora.
- source_word: παντὸς ἀνθρώπου
  english_pob_choice: any person
  chosen_spanish: toda persona
  alternatives_spanish:
  - cualquier persona
  - todo hombre
  lexicon: BDAG
  rationale: El griego usa ἀνθρώπου con sentido genérico inclusivo. 'Toda persona' reproduce bien ese alcance sin imponer un masculino genérico menos preciso en español contemporáneo.
- source_word: ἐργάσηται
  english_pob_choice: works
  chosen_spanish: trabaja
  alternatives_spanish:
  - labora
  - hace trabajo
  lexicon: BDAG
  rationale: El verbo describe a quien realiza labor para otro. 'Trabaja' es la opción más natural en español y mantiene la relación de empleo implícita en el contexto.
- source_word: παρὰ σοὶ
  english_pob_choice: for you
  chosen_spanish: para ti
  alternatives_spanish:
  - contigo
  - a tu servicio
  lexicon: BDAG
  rationale: Aunque literalmente puede sugerir cercanía o estar 'junto a' alguien, aquí indica trabajo realizado en favor de la persona destinataria. 'Para ti' expresa bien la relación de servicio remunerado.
- source_word: μὴ αὐλισθήτω
  english_pob_choice: do not let ... stay overnight with you
  chosen_spanish: pase la noche contigo
  alternatives_spanish:
  - permanezca contigo hasta la mañana
  - se quede a pasar la noche contigo
  lexicon: LSJ
  rationale: El verbo evoca la imagen de alojarse o pasar la noche. En este contexto se trata de no retener el salario hasta el día siguiente; 'pase la noche contigo' conserva esa imagen sin sonar forzado.
- source_word: ἀπόδος αὐτῷ παραυτίκα
  english_pob_choice: pay him at once
  chosen_spanish: págaselo de inmediato
  alternatives_spanish:
  - entrégaselo enseguida
  - retribúyeselo al instante
  lexicon: BDAG
  rationale: ἀπόδος implica devolver o pagar lo debido, y παραυτίκα añade inmediatez. 'Págaselo de inmediato' es idiomático y mantiene la fuerza de urgencia del mandato.
- source_word: δουλεύσῃς τῷ θεῷ
  english_pob_choice: you serve God
  chosen_spanish: sirves a Dios
  alternatives_spanish:
  - sirves a Dios como esclavo
  - trabajas para Dios
  lexicon: BDAG
  rationale: Aunque el campo semántico de δουλεύω puede incluir servicio con matiz de esclavitud, aquí la exhortación sapiencial favorece 'servir'. 'Sirves a Dios' es fiel al sentido exhortativo sin introducir una imaginería que el contexto no destaca.
- source_word: ἀποδοθήσεταί σοι
  english_pob_choice: it will be repaid to you
  chosen_spanish: te será retribuido
  alternatives_spanish:
  - te será pagado
  - será devuelto a ti
  lexicon: BDAG
  rationale: 'El pasivo griego deja implícito el agente. ''Te será retribuido'' conserva esa forma pasiva y permite mantener la tensión interpretativa: el contexto sugiere a Dios como quien retribuye, pero el texto no lo nombra explícitamente.'
- source_word: πρόσεχε σεαυτῷ
  english_pob_choice: Watch yourself
  chosen_spanish: Vigílate
  alternatives_spanish:
  - Cuídate
  - Presta atención a ti mismo
  lexicon: BDAG
  rationale: Es un imperativo de vigilancia y atención sobre la propia conducta. 'Vigílate' transmite bien el tono exhortativo y la responsabilidad personal, aunque suena algo más marcado que otras opciones.
- source_word: παιδίον
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - hijo mío
  lexicon: BDAG
  rationale: El vocativo puede rendirse como 'hijo' en español bíblico cuando un mayor exhorta a un menor o discípulo. Aunque el griego no expresa posesivo, 'hijo' resulta más natural y pastoral en español que un simple 'niño' en este contexto exhortativo.
- source_word: ἔργοις
  english_pob_choice: works
  chosen_spanish: obras
  alternatives_spanish:
  - acciones
  - hechos
  lexicon: BDAG
  rationale: El término es amplio y moralmente cargado en la literatura sapiencial. 'Obras' conserva esa amplitud y conecta bien con la exhortación sobre la conducta íntegra.
- source_word: ἴσθι πεπαιδευμένος
  english_pob_choice: be disciplined
  chosen_spanish: sé disciplinado
  alternatives_spanish:
  - sé bien instruido
  - sé formado
  lexicon: BDAG
  rationale: El participio perfecto de παιδεύω puede implicar formación, disciplina o instrucción. En este contexto ético, 'sé disciplinado' capta la idea de una vida moldeada por corrección y formación.
- source_word: ἀναστροφῇ
  english_pob_choice: conduct
  chosen_spanish: conducta
  alternatives_spanish:
  - manera de vivir
  - comportamiento
  lexicon: BDAG
  rationale: ἀναστροφή es un término ético para la manera de vivir. 'Conducta' es claro, sobrio y suficientemente amplio para reflejar el alcance de la palabra griega.
theological_decisions:
- issue: Agente implícito en ἀποδοθήσεταί σοι
  english_pob_reading: it will be repaid to you
  chosen_spanish_reading: te será retribuido
  alternative_spanish_readings:
  - él te retribuirá
  - Dios te retribuirá
  rationale: El griego usa pasivo y no explicita el sujeto. La redacción española mantiene ese carácter impersonal y no resuelve la referencia, aunque el contexto deja entender la retribución divina. Esto preserva la tensión textual documentada por el POB inglés.
  doctrine_reference: Preservar la ambigüedad textual donde el griego es impersonal.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del POB inglés, que prefirió 'any person' frente a 'any man' para reflejar mejor el sentido inclusivo de ἀνθρώπου. En español se adoptó 'toda persona' por la misma razón, manteniendo la estructura y la fuerza ética del mandato sin introducir interpretaciones ajenas al texto griego.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para θεῷ conforme al uso estándar del proyecto.
  - Se conservó el tono sapiencial exhortativo con verbos en imperativo y formas breves.
  - '''Retribuido'' preserva el pasivo griego y la tensión sobre el agente implícito.'
  - '''Obras'' y ''conducta'' sostienen la continuidad semántica entre labor externa y vida moral.'
