translation:
  language: es
  text: Entonces[a], cuando se leyó lo que había sido escrito por el rey Artajerjes, Rátimo y Samelio el escriba, y los que se alineaban con ellos, se apresuraron hacia Jerusalén con caballería y en formación de batalla[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Nombres griegos: ''Rátimo'' y ''Samelio''; el paralelo hebreo identifica a estas figuras con Rehum y Shimshai.'
    reason: alternative_reading
  - marker: b
    text: 'O: ''con caballería y una formación de batalla''. El griego es condensado y puede describir un destacamento armado o una fuerza dispuesta militarmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναγνωσθέντων
  english_pob_choice: when ... was read
  chosen_spanish: cuando fue leído
  alternatives_spanish:
  - después de que fue leído
  - cuando había sido leído en voz alta
  lexicon: BDAG
  rationale: El participio aoristo pasivo en genitivo absoluto funciona mejor en español como cláusula temporal; 'cuando fue leído' conserva la pasiva y suena natural. No se añade 'en voz alta' porque el griego no lo exige expresamente.
- source_word: τῶν παρὰ τοῦ βασιλέως Ἀρταξέρξου γραφέντων
  english_pob_choice: what had been written by King Artaxerxes
  chosen_spanish: lo que había escrito el rey Artajerjes
  alternatives_spanish:
  - las cosas escritas por el rey Artajerjes
  - la carta enviada por el rey Artajerjes
  lexicon: BDAG
  rationale: El griego es amplio y alude a 'lo escrito' del rey, no necesariamente a una 'carta' técnica. En español, 'lo que había escrito el rey Artajerjes' conserva esa amplitud y fluye con naturalidad.
- source_word: Ῥάθυμος
  english_pob_choice: Rathymus
  chosen_spanish: Rátimo
  alternatives_spanish:
  - Rehum
  lexicon: Transliteración del griego
  rationale: La forma principal sigue el testimonio griego, no la identificación del paralelo hebreo. Se translitera al español de manera legible, preservando la distancia textual documentada.
- source_word: Σαμέλλιος
  english_pob_choice: Samellius
  chosen_spanish: Samelio
  alternatives_spanish:
  - Shimshai
  lexicon: Transliteración del griego
  rationale: Como en el nombre anterior, se mantiene la forma griega transliterada en el texto principal, dejando el paralelo hebreo como identificación alternativa.
- source_word: ὁ γραμματεὺς
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  lexicon: BDAG
  rationale: '''Escriba'' es la equivalencia más transparente y mantiene el matiz oficial/administrativo del término sin imponer una palabra menos específica.'
- source_word: οἱ τούτοις συντασσόμενοι
  english_pob_choice: those aligned with them
  chosen_spanish: los que se alineaban con ellos
  alternatives_spanish:
  - los que se unían a ellos
  - sus asociados
  - los que estaban en su bando
  lexicon: BDAG
  rationale: El participio sugiere asociación, adherencia o alineamiento. 'Se alineaban con ellos' preserva esa idea de adhesión sin volverlo excesivamente interpretativo.
- source_word: ἀναζεύξαντες
  english_pob_choice: hurried up
  chosen_spanish: se apresuraron
  alternatives_spanish:
  - partieron con prisa
  - subieron apresuradamente
  - marcharon
  lexicon: LSJ
  rationale: El verbo, junto con la expresión de urgencia, indica partida/movimiento rápido hacia Jerusalén. 'Se apresuraron' captura bien la prisa sin forzar un matiz militar explícito.
- source_word: κατὰ σπουδήν
  english_pob_choice: hurried
  chosen_spanish: se apresuraron
  alternatives_spanish:
  - con prisa
  - con diligencia
  - apresuradamente
  lexicon: BDAG
  rationale: La locución refuerza la urgencia; en español queda bien integrada en el verbo principal para evitar redundancia pesada.
- source_word: μεθʼ ἵππου
  english_pob_choice: with cavalry
  chosen_spanish: con caballería
  alternatives_spanish:
  - con jinetes
  - con caballos
  lexicon: LSJ
  rationale: Aunque el griego está en singular y es algo condensado, el sentido militar colectivo se expresa naturalmente en español con 'caballería'. Mantiene el carácter armado y montado del grupo.
- source_word: ὄχλου παρατάξεως
  english_pob_choice: a battle formation
  chosen_spanish: en formación de batalla
  alternatives_spanish:
  - en orden de batalla
  - en formación militar
  - en una multitud dispuesta para el combate
  lexicon: LSJ
  rationale: La frase griega es compacta y combina 'multitud' con 'formación'. El español principal evita una redundancia poco natural y conserva el valor militar de παράταξις mediante 'formación de batalla'.
translation_notes:
  revision_awareness: Seguí la revisión más reciente del audit trail al reflejar la pasiva temporal de ἀναγνωσθέντων con una cláusula española natural, y al traducir μεθʼ ἵππου en sentido militar colectivo como 'caballería'. También evité suavizar la expresión final; 'formación de batalla' conserva la densidad de παράταξις sin añadir elementos no atestiguados.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se transliteraron los nombres propios según el griego, con nota para el paralelo hebreo.
  - Se eligió 'escriba' para γραμματεύς por claridad y porque el contexto es administrativo, no eclesiástico.
  - '''Caballería'' preserva el matiz de fuerza montada/militar sin imponer una lectura demasiado literal de ''caballos''.'
