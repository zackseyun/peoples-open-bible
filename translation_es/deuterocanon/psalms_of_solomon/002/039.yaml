    rationale: El griego dice καὶ ἐλεῆσαι δίκαιον ἀπὸ ταπεινώσεως ἁμαρτωλοῦ, una construcción comprimida. El POB inglés final mantiene la compresión en el texto principal («to show mercy ... from the humiliation...»), dejando la explicitación de rescate en nota. En español conviene hacer lo mismo para preservar mayor cercanía al original y coherencia con la auditoría.
  - severity: medium
    issue: La nota [a] no corresponde bien al problema textual/lexical real.
    rationale: «O “de la humillación”» no ofrece una alternativa significativa. La nota inglesa [a] explica que el griego es comprimido y que puede entenderse como misericordia al justo desde/sacándolo de esa humillación. La nota española debe reflejar esa alternativa real.
  - severity: low
    issue: El orden de notas [a][b][c] en el anclaje puede mantenerse, pero debe acompañar el sintagma pertinente sin crear confusión.
    rationale: Las tres notas recaen sobre la frase final de la primera cláusula. Conviene anclarlas sobre «del pecador» o sobre toda la frase relevante, conservando el orden y la correspondencia exacta con las notas.
