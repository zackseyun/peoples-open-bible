translation:
  language: es
  text: Y mi mano estará contra los profetas que ven mentira y que practican adivinación engañosa. No estarán en el consejo[a] de mi pueblo, ni serán inscritos en el registro[b] de la casa de Israel, ni entrarán en la tierra de Israel. Entonces ustedes sabrán que yo soy el Señor Yahvé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asamblea de mi pueblo» o «consejo secreto de mi pueblo» para «consejo de mi pueblo».
    reason: lexical_alternative
  - marker: b
    text: O «acta» o «lista escrita» para «registro».
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «el Señor Yahvé», que representa אֲדֹנָי יְהוִה; alternativamente, «el Señor DIOS».'
    reason: alternative_reading
lexical_decisions:
- source_word: וְהָיְתָה יָדִי אֶל
  english_pob_choice: And my hand will be against
  chosen_spanish: Y extenderé mi mano contra
  alternatives_spanish:
  - Y mi mano estará contra
  - Y pondré mi mano contra
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de juicio y oposición activa; en español, «extenderé mi mano contra» comunica con naturalidad esa hostilidad judicial sin perder la imagen corporal del original.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los videntes
  - los anunciadores
  lexicon: HALOT
  rationale: Es el término estándar para נביאים y coincide con el contexto de falsa autoridad profética.
- source_word: הַחֹזִים שָׁוְא
  english_pob_choice: who see falsehood
  chosen_spanish: que ven mentira
  alternatives_spanish:
  - que ven falsedad
  - que ven lo falso
  lexicon: HALOT
  rationale: חזים conserva la idea de visión profética; שָׁוְא apunta a falsedad/engaño/vanidad. «Ven mentira» mantiene la fuerza acusatoria del hebreo con español claro.
- source_word: וְהַקֹּסְמִים כָּזָב
  english_pob_choice: who practice lying divination
  chosen_spanish: que practican adivinación engañosa
  alternatives_spanish:
  - que adivinan con mentira
  - que practican adivinación falsa
  lexicon: HALOT
  rationale: קוסמים se refiere a adivinos/practicantes de adivinación. En español, «adivinación engañosa» conserva el acto y el carácter fraudulento sin sonar excesivamente técnico.
- source_word: בְּסוֹד עַמִּי
  english_pob_choice: in the council of my people
  chosen_spanish: en el consejo de mi pueblo
  alternatives_spanish:
  - en la asamblea de mi pueblo
  - en el círculo secreto de mi pueblo
  lexicon: HALOT
  rationale: סוד puede ser consejo, círculo íntimo o asamblea confidencial. «Consejo» es una solución sobria que preserva la idea de pertenencia a la comunidad deliberativa de Dios.
- source_word: וּבִכְתָב בֵּית יִשְׂרָאֵל
  english_pob_choice: in the register of the house of Israel
  chosen_spanish: en el registro de la casa de Israel
  alternatives_spanish:
  - en el libro de la casa de Israel
  - en la lista de la casa de Israel
  lexicon: HALOT
  rationale: כתב aquí funciona como lista o documento oficial. «Registro» transmite bien la noción administrativa de inclusión/exclusión.
- source_word: לֹא יִכָּתֵבוּ
  english_pob_choice: nor will they be written
  chosen_spanish: ni serán inscritos
  alternatives_spanish:
  - ni serán escritos
  - ni serán registrados
  lexicon: HALOT
  rationale: El pasivo niphal sugiere inscripción en una lista oficial. «Serán inscritos» expresa mejor ese matiz en español que un simple «escritos».
- source_word: וְאֶל אַדְמַת יִשְׂרָאֵל לֹא יָבֹאוּ
  english_pob_choice: nor will they enter the land of Israel
  chosen_spanish: ni entrarán en la tierra de Israel
  alternatives_spanish:
  - ni llegarán a la tierra de Israel
  - ni vendrán a la tierra de Israel
  lexicon: HALOT
  rationale: אַדְמָה es «tierra/terreno/suelo»; en este contexto de herencia y juicio, «tierra de Israel» es la forma natural y fiel en español.
- source_word: וִידַעְתֶּם
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Entonces conocerán
  lexicon: HALOT
  rationale: El prefijo conjuntivo aquí introduce consecuencia. El cambio a tercera persona responde al giro del destinatario implícito en el discurso profético; el español lo hace más fluido manteniendo el sentido de reconocimiento resultante.
- source_word: אֲנִי אֲדֹנָי יְהוִה
  english_pob_choice: I am the Lord Yahweh
  chosen_spanish: yo soy el Señor Yahvé
  alternatives_spanish:
  - yo soy el Señor Yahweh
  - yo soy el Señor el Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé» conforme al criterio del proyecto. «Señor Yahvé» refleja con dignidad el título compuesto אֲדֹנָי יְהוִה sin ocultar el Tetragrámaton.
theological_decisions:
- issue: Renderización del nombre divino יְהוִה en el título compuesto אֲדֹנָי יְהוִה
  english_pob_reading: I am the Lord Yahweh
  chosen_spanish_reading: yo soy el Señor Yahvé
  alternative_spanish_readings:
  - yo soy el Señor Yahweh
  - yo soy el Señor, Yahvé
  rationale: El proyecto exige traducir YHWH como «Yahvé». En el compuesto con אֲדֹנָי, «Señor Yahvé» preserva ambos títulos sin recurrir a un sustituto litúrgico como «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «the Lord GOD» a «the Lord Yahweh» para representar más directamente אֲדֹנָי יְהוִה. La versión española sigue esa revisión y mantiene la distinción entre el título אֲדֹנָי y el nombre divino יְהוִה sin masking litúrgico.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española principal para יְהוִה, conforme al criterio del proyecto.
  - Se usa «inscritos» para reflejar el valor de lista/registro oficial de כתב en este contexto.
  - «Consejo» se elige como equivalente principal de סוד, sin excluir las alternativas semánticas documentadas.
  - «Tierra de Israel» conserva el valor territorial-covenantal de אַדְמַת יִשְׂרָאֵל.
  - Se evita «SEÑOR» en mayúsculas como sustituto del nombre divino, porque el criterio del proyecto pide representación transparente de YHWH.
