translation:
  language: es
  text: 'Cuídate, no sea que haya en tu corazón un pensamiento perverso, diciendo: «Está cerca el séptimo año, el año de la remisión[a]»; y tu ojo sea malo[b] hacia tu hermano[c] pobre, y no le des nada; entonces él clamará contra ti a Yahvé, y habrá en ti pecado.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el año de la liberación» o «el año de la cancelación».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tu ojo sea malo», un modismo hebreo para actuar con tacañería o mezquindad hacia alguien necesitado.
    reason: lexical_alternative
  - marker: c
    text: «Hermano» aquí se refiere a un miembro de la comunidad del pacto, no necesariamente a un hermano biológico.
    reason: cultural_note
lexical_decisions:
- source_word: הִשָּׁמֶר לְךָ
  english_pob_choice: Be careful
  chosen_spanish: Cuídate
  alternatives_spanish:
  - Ten cuidado
  - Guárdate
  lexicon: HALOT
  rationale: El imperativo reflexivo transmite bien la advertencia urgente y natural en español, sin perder el matiz de precaución personal del hebreo.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - no vaya a ser que
  lexicon: HALOT
  rationale: Introduce adecuadamente una cláusula de advertencia negativa en español con tono bíblico y claro.
- source_word: דָבָר עִם לְבָבְךָ בְלִיַּעַל
  english_pob_choice: there be in your heart a wicked thought
  chosen_spanish: haya en tu corazón una palabra perversa
  alternatives_spanish:
  - haya en tu corazón un pensamiento malvado
  - haya en tu corazón una cosa vil
  lexicon: HALOT
  rationale: Se conserva la amplitud de דָבָר como 'palabra/materia/cosa' en lugar de reducirlo solo a 'pensamiento'; 'palabra perversa' mantiene la tensión del hebreo y la relación con el discurso interior que sigue en 'diciendo'.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - pensando
  - al decir
  lexicon: HALOT
  rationale: Preserva la estructura discursiva del hebreo y la conexión entre la intención interior y su contenido verbal.
- source_word: שְׁנַת הַשֶּׁבַע
  english_pob_choice: the seventh year
  chosen_spanish: el séptimo año
  alternatives_spanish:
  - el año séptimo
  lexicon: HALOT
  rationale: La forma ordinal es la más natural y fiel en español para expresar el ciclo legal del año sabático.
- source_word: שְׁנַת הַשְּׁמִטָּה
  english_pob_choice: the year of release
  chosen_spanish: el año de la remisión
  alternatives_spanish:
  - el año de la liberación
  - el año de la cancelación
  lexicon: HALOT
  rationale: '''Remisión'' conserva el valor legal del término en Deuteronomio 15 y permite reflejar la alternativa técnica documentada por la POB inglesa.'
- source_word: וְרָעָה עֵינְךָ
  english_pob_choice: your eye be evil
  chosen_spanish: tu ojo sea malo
  alternatives_spanish:
  - mires con avaricia
  - mires con rencor
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática del hebreo para transparencia, como hizo la POB inglesa, sin reemplazarla por una paráfrasis interpretativa en el texto principal.
- source_word: בְּאָחִיךָ הָאֶבְיוֹן
  english_pob_choice: toward your poor brother
  chosen_spanish: contra tu hermano pobre
  alternatives_spanish:
  - hacia tu hermano pobre
  - contra tu pariente pobre
  lexicon: HALOT
  rationale: '''Hermano'' conserva el lenguaje de pacto y ''pobre'' traduce fielmente אֶבְיוֹן. ''Contra'' refleja el sentido adversativo de la mirada hostil o mezquina.'
- source_word: וְלֹא תִתֵּן לוֹ
  english_pob_choice: and you give him nothing
  chosen_spanish: y no le des nada
  alternatives_spanish:
  - y no le darás nada
  - y no le concedas nada
  lexicon: HALOT
  rationale: En español, la prohibición coordinada fluye mejor con subjuntivo exhortativo y mantiene la negatividad absoluta del hebreo.
- source_word: וְקָרָא עָלֶיךָ אֶל יְהוָה
  english_pob_choice: then he may cry out against you to Yahweh
  chosen_spanish: él clamará contra ti a Yahvé
  alternatives_spanish:
  - él clamará a Yahvé contra ti
  - él gritará contra ti a Yahvé
  lexicon: HALOT
  rationale: '''Clamará'' reproduce el tono judicial y de apelación del verbo; ''a Yahvé'' mantiene el destinatario del clamor y el nombre divino según la política del proyecto.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se sigue la terminología doctrinal del proyecto para el Tetragrámaton, con la forma española establecida 'Yahvé'.
- source_word: וְהָיָה בְךָ חֵטְא
  english_pob_choice: and it will be sin in you
  chosen_spanish: y habrá en ti pecado
  alternatives_spanish:
  - y serás hallado culpable
  - y tendrás pecado
  lexicon: HALOT
  rationale: La construcción impersonal en español expresa con naturalidad la consecuencia legal-moral del hebreo sin añadir interpretación excesiva.
theological_decisions:
- issue: Divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton; la política del proyecto pide reflejarlo en español como 'Yahvé' y no ocultarlo tras un equivalente funcional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: מַשְׁמָט / שְׁמִטָּה as legal release
  english_pob_reading: the year of release
  chosen_spanish_reading: el año de la remisión
  alternative_spanish_readings:
  - el año de la liberación
  - el año de la cancelación
  rationale: En Deuteronomio 15 el término tiene un sentido jurídico de condonación/liberación de deudas; 'remisión' preserva esa fuerza técnica y deja abierta la glosa alternativa documentada en la auditoría inglesa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve documented lexical tension; avoid flattening legal terms'
- issue: וְרָעָה עֵינְךָ idiom
  english_pob_reading: your eye be evil
  chosen_spanish_reading: tu ojo sea malo
  alternative_spanish_readings:
  - mires con avaricia
  - mires con mezquindad
  rationale: Se conserva la metáfora hebrea en el texto principal para transparencia exegética; la equivalencia dinámica queda implícita en la comprensión idiomática sin borrar la forma original.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text texture'
- issue: אָחִיךָ as covenant brother
  english_pob_reading: your poor brother
  chosen_spanish_reading: tu hermano pobre
  alternative_spanish_readings:
  - tu pariente pobre
  - tu hermano necesitado
  rationale: '''Hermano'' refleja el lenguaje de la comunidad del pacto y evita neutralizaciones no motivadas por el texto. ''Pobre'' mantiene la cualidad social explícita del hebreo.'
  doctrine_reference: 'DOCTRINE.md: gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La POB inglesa mantiene el idiomático 'your eye be evil' con nota explicativa y traduce שְׁמִטָּה como 'year of release' con alternativas técnicas; el español conserva esas tensiones, pero adapta la sintaxis para que la advertencia fluya de forma natural. También se respeta el nombre divino con Yahvé y el valor comunitario de 'brother'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, coherente con la política del proyecto.
  - Se conserva 'hermano' como término de comunidad del pacto, no como parentesco biológico exclusivo.
  - '''Remisión'' mantiene el sentido jurídico de שְׁמִטָּה sin borrar las alternativas técnicas.'
  - La imagen 'tu ojo sea malo' se preserva en el texto principal para mantener la transparencia frente al hebreo.
