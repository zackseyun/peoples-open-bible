revisions:
- from: 'Y presentaréis un holocausto[a], una ofrenda encendida, de aroma agradable a Yahvé: trece becerros del ganado, dos carneros y catorce corderos macho de un año; todos serán sin defecto.'
  to: 'Y presentaréis un holocausto, una ofrenda hecha por fuego, de aroma agradable[a] a Yahvé: trece toros del ganado, dos carneros y catorce corderos machos de un año; serán sin defecto.'
  rationale: Se corrige el anclaje de la nota para que explique el modismo hebreo pertinente; se mejora אִשֵּׁה con «ofrenda hecha por fuego», formulación más natural y exacta en español bíblico; se ajusta פָּרִים בְּנֵי בָקָר a «toros del ganado» para evitar la sobreespecificación de edad en «becerros»; y se elimina «todos» por no estar explícito en el texto fuente.
  reviewer_model: gpt-5.4
