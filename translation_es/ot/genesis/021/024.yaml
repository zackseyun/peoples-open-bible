revisions:
- from: 'Y Abraham dijo[a]: «Yo juro».'
  to: 'Y Abraham dijo: «Juro[a]»'
  rationale: Se corrige el anclaje de la nota para que recaiga sobre el verbo relevante, se mejora la naturalidad del español eliminando el pronombre innecesario, y se reemplaza la alternativa de la nota por formulaciones idiomáticas que reflejan mejor el campo semántico de אִשָּׁבֵעַ y el historial de auditoría en inglés.
