revisions:
- from: Para el[a] director del coro. Salmo de David.
  to: Para el director del coro. Un salmo de David[a].
  rationale: Se corrige el anclaje de la nota para que corresponda al sintagma «de David», que es donde reside la ambigüedad del hebreo לְדָוִד. Además, se ajusta «Salmo» a «Un salmo» para reflejar con mayor fidelidad y naturalidad la forma encabezatoria auditada.
  reviewer_model: gpt-5.4
