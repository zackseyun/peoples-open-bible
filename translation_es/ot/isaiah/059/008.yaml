translation:
  language: es
  text: No conocieron el camino de la paz, y no hay justicia en sus sendas[a]; torcieron sus caminos para sí. Todo el que anda en ellas[b] no conoce la paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no hay juicio en sus huellas».
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice literalmente «en él»; el singular probablemente se refiere de manera colectiva al conjunto de sus caminos o curso.
    reason: lexical_alternative
lexical_decisions:
- source_word: דֶּרֶךְ שָׁלוֹם
  english_pob_choice: way of peace
  chosen_spanish: camino de la paz
  alternatives_spanish:
  - vía de paz
  - sendero de paz
  lexicon: HALOT
  rationale: «Camino» comunica con naturalidad la metáfora de conducta o curso de vida. «Paz» conserva el valor básico de שָׁלוֹם en este contexto profético y mantiene la repetición con la última cláusula.
- source_word: יָדָעוּ / יָדַע
  english_pob_choice: do not know / does not know
  chosen_spanish: no conocieron / no conoce
  alternatives_spanish:
  - no han conocido / no ha conocido
  - no entienden / no entiende
  lexicon: HALOT
  rationale: En este uso, ידע expresa conocimiento experiencial y moral, no mera información. «Conocer» en español permite repetir el paralelo del hebreo sin perder esa fuerza relacional.
- source_word: מִשְׁפָּט
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - juicio
  - derecho
  lexicon: HALOT
  rationale: En este contexto ético-social, «justicia» comunica mejor la denuncia profética que «juicio», que en español puede sonar más restringido o ambiguo.
- source_word: מַעְגְּלוֹתָם
  english_pob_choice: their paths
  chosen_spanish: sus sendas
  alternatives_spanish:
  - sus caminos
  - sus trayectorias
  lexicon: HALOT
  rationale: El término sugiere recorridos o huellas de conducta. «Sendas» mantiene la imagen y permite distinguirlo de נְתִיבוֹתֵיהֶם sin volver repetitiva la línea.
- source_word: נְתִיבוֹתֵיהֶם
  english_pob_choice: their roads
  chosen_spanish: sus caminos
  alternatives_spanish:
  - sus veredas
  - sus rutas
  lexicon: HALOT
  rationale: «Caminos» es claro y poético, y distingue bien este segundo término del primero. En español conserva el paralelismo sin forzar una equivalencia técnica demasiado rígida.
- source_word: עִקְּשׁוּ
  english_pob_choice: have made ... crooked
  chosen_spanish: torcieron
  alternatives_spanish:
  - enderezaron mal
  - hicieron torcidos
  lexicon: HALOT
  rationale: El verbo expresa volver algo torcido o retorcido. «Torcieron» es breve, natural y mantiene la imagen moral de desvío.
- source_word: לָהֶם
  english_pob_choice: for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos mismos
  - en su propio beneficio
  lexicon: HALOT
  rationale: El dativo tiene valor reflexivo/ventajoso. «Para sí» es conciso y refleja que el desvío fue de su propia hechura y para su propio curso.
- source_word: כֹּל דֹּרֵךְ בָּהּ
  english_pob_choice: everyone who walks in them
  chosen_spanish: Todo el que anda en ellas
  alternatives_spanish:
  - Todo el que camina en ellas
  - Quienquiera que las recorra
  lexicon: HALOT
  rationale: «Anda» es idiomático y abarca la idea de transitar o conducirse. Se conserva el plural en español, como en la revisión inglesa, porque el referente colectivo previo funciona como conjunto de caminos.
theological_decisions:
- issue: Valor de מִשְׁפָּט como término ético-profético
  english_pob_reading: justice
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - juicio
  rationale: La acusación no apunta solo a un fallo judicial puntual, sino a la ausencia de rectitud social y moral. «Justicia» expresa mejor ese alcance profético y evita una lectura demasiado técnica o forense.
  doctrine_reference: Translation philosophy §1, §6
- issue: Pluralidad de los caminos frente al pronombre singular hebreo בָּהּ
  english_pob_reading: everyone who walks in them
  chosen_spanish_reading: Todo el que anda en ellas
  alternative_spanish_readings:
  - Todo el que anda en ella
  rationale: Aunque el hebreo usa un singular pronominal, el referente es colectivo. El plural español evita aspereza y preserva la referencia al sistema de conductas y caminos mencionado antes.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
- issue: Repetición de «paz» en la primera y última cláusula
  english_pob_reading: peace ... peace
  chosen_spanish_reading: paz ... paz
  alternative_spanish_readings:
  - bienestar ... paz
  - plenitud ... paz
  rationale: Conviene mantener la repetición para reproducir el efecto retórico del hebreo y la insistencia del tema. «Paz» es la opción más transparente y bíblicamente reconocible en ambos lugares.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que ajustó la distinción entre מַעְגְּלוֹתָם y נְתִיבוֹתֵיהֶם. En español se conservó esa distinción con «sendas» y «caminos», evitando colapsar ambos términos en un solo equivalente. También se respetó la lectura plural de la última cláusula para reflejar el sentido colectivo del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto cuando no aparece en este versículo.
  - Se prefirió «justicia» y «paz» por consistencia con el léxico profético del POB.
  - Se evitó «SEÑOR» como sustituto del nombre divino, ya que no aplica directamente aquí.
  - Se usó un registro bíblico moderno y claro, sin caer en calcos innecesarios.
