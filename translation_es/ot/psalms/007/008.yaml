review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del hebreo: una petición/jusivo sobre la asamblea de los pueblos y un imperativo a Dios para volver a una posición exaltada. Sin embargo, en וְעָלֶיהָ el expediente inglés documenta que el texto principal debe reflejar el sentido colectivo con ''over them'', dejando la lectura singular formal en nota. El español invirtió esa decisión y puso ''sobre ella'' en el texto principal, lo que no sigue el audit trail ni la mejor naturalidad contextual en español.'
  spanish_quality_summary: El español es generalmente claro y digno. 'Asamblea de los pueblos' y 'te rodee' funcionan bien. No obstante, 'sobre ella vuelve a lo alto' suena algo rígido y menos natural que 'sobre ellos vuelve a lo alto' o mejor 'vuelve a lo alto sobre ellos'. Conviene además corregir un error evidente en las decisiones léxicas ('te окружe').
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. Las elecciones ''asamblea'', ''pueblos'', ''vuelve'' y ''a lo alto'' son adecuadas. El ajuste necesario es al manejo de וְעָלֶיהָ: en el texto principal debe darse el sentido colectivo (''sobre ellos''), con nota para la referencia singular formal a la asamblea.'
  issues:
  - severity: medium
    issue: El texto principal usa 'sobre ella' donde el POB inglés audita 'and over them' como lectura preferida.
    rationale: Aunque el sufijo hebreo es femenino singular, la decisión documentada es que se refiere colectivamente a la asamblea y en el texto principal debe expresarse el sentido natural del referente reunido. Dejar 'sobre ella' en el cuerpo cambia la priorización exegética del audit trail.
  - severity: low
    issue: La redacción 'y sobre ella vuelve a lo alto' es menos natural en español poético que alternativas con referente plural colectivo.
    rationale: '''Sobre ellos vuelve a lo alto'' comunica mejor la idea de gobierno exaltado sobre los pueblos reunidos y evita una lectura demasiado gramaticalista.'
  - severity: low
    issue: 'Hay un error tipográfico en las decisiones léxicas: ''te окружe''.'
    rationale: No afecta el texto bíblico, pero debe señalarse como problema editorial en el expediente.
  revised_spanish_text: Y que la asamblea de los pueblos te rodee[a][b]; y sobre ellos vuelve a lo alto.
  revised_footnotes:
  - marker: a
    text: O "naciones" para "pueblos".
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo también puede entenderse con referencia singular: "y sobre ella vuelve a lo alto", refiriéndose a la asamblea como un todo colectivo.'
    reason: alternative_reading
  revision_rationale: Se restituye en el texto principal la lectura colectiva documentada por el POB para וְעָלֶיהָ ('sobre ellos'), mientras la nota conserva la alternativa singular formal ('sobre ella') que refleja el sufijo femenino singular referido a 'asamblea'. Así el español sigue mejor la evidencia fuente, el audit trail inglés y la naturalidad contextual.
