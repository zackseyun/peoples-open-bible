review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura hebrea con la doble prohibición, mantiene ''casa'' para בֵּית y preserva correctamente la lista de bienes del prójimo. También sigue adecuadamente la decisión de traducir עֶבֶד/אָמָה con ''esclavo/esclava''. Sin embargo, la nota al pie para בַּיִת no reproduce fielmente la alternativa auditada: ''hogar'' y la explicación ''casa-hogar'' desvían el matiz de ''household''/''household unit''.'
  spanish_quality_summary: El texto principal es claro, natural y de registro bíblico digno. 'No codiciarás' y 'tu prójimo' son adecuados y legibles. 'Asno' es aceptable en este registro. El único problema real de calidad está en la formulación de la nota al pie, que suena algo forzada y conceptualmente imprecisa.
  glossary_alignment: 'Buena alineación con las decisiones del proyecto: חמד -> ''codiciar''; רֵעַ -> ''prójimo''; עֶבֶד/אָמָה -> ''esclavo/esclava''; שׁוֹר -> ''buey''; חֲמוֹר -> ''asno''. No hay conflictos con la terminología por defecto del proyecto.'
  issues:
  - severity: medium
    issue: La nota al pie para 'casa' no conserva con precisión la alternativa auditada.
    rationale: El POB inglés documenta como alternativa 'household', no simplemente 'hogar'. En español, 'hogar' puede sugerir principalmente la vivienda o el ambiente doméstico, mientras que aquí la alternativa relevante es 'casa' en el sentido de unidad doméstica/familia. La explicación 'casa entendida como casa-hogar' es poco natural y no refleja bien la decisión léxica.
  revised_spanish_text: No codiciarás la casa de tu prójimo[a]; no codiciarás la mujer de tu prójimo, ni su esclavo varón, ni su esclava, ni su buey, ni su asno, ni cosa alguna que pertenezca a tu prójimo.
  revised_footnotes:
  - marker: a
    text: O "la casa de tu prójimo" en el sentido de "su casa o unidad doméstica"; el hebreo בַּיִת puede referirse también a un hogar o casa entendida como familia, aunque aquí "casa" encaja mejor con la lista separada que sigue.
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal, que es fiel y natural, y se corrige únicamente la nota léxica para que refleje mejor la alternativa documentada en el POB inglés para בַּיִת, evitando una explicación imprecisa basada en 'hogar'.
