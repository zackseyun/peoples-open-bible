  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Mujeres» y «fuertes» están bien elegidos. La decisión de mantener «que» para ὅτι es defendible y se ajusta al rastro del POB inglés revisado. No hay cuestiones teológicas especiales.
