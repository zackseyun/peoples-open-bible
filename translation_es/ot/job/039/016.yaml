translation:
  language: es
  text: Trata a sus crías con dureza[a], como si no fueran suyas; su labor es en vano, sin temor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «endurece a sus hijos contra ella, como si no fueran suyos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הִקְשִׁיחַ
  english_pob_choice: treats ... harshly
  chosen_spanish: trata ... con dureza
  alternatives_spanish:
  - endurece ... contra
  - trata con dureza
  lexicon: HALOT
  rationale: El hiphil de קשׁח expresa hacer duro o actuar con aspereza. En español, «trata ... con dureza» comunica con naturalidad la idea de trato áspero sin volver demasiado literal una imagen corporal que sonaría extraña aquí.
- source_word: בָּנֶיהָ
  english_pob_choice: her young
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus crías
  - sus hijos
  lexicon: HALOT
  rationale: El contexto es zoológico, y el inglés POB usa «her young». En español, «sus hijos» mantiene el valor literal de בָּנֶיהָ y funciona de manera natural; «crías» sería posible, pero introduce un matiz más técnico que no está exigido por el hebreo.
- source_word: לְלֹא לָהּ
  english_pob_choice: as if they were not hers
  chosen_spanish: como si no fueran suyos
  alternatives_spanish:
  - como si no le pertenecieran
  - como no suyos
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente «como no para ella / como no suyos». En español, «como si no fueran suyos» conserva la fuerza comparativa y el sentido de desposesión implícito sin sobrecargar la frase.
- source_word: לְרִיק
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - para nada
  - sin provecho
  lexicon: HALOT
  rationale: Es la equivalencia más idiomática y fiel para רִיק en contextos de esfuerzo frustrado. Mantiene el paralelismo con «su trabajo» y la idea de inutilidad.
- source_word: יְגִיעָהּ
  english_pob_choice: her labor
  chosen_spanish: su trabajo
  alternatives_spanish:
  - su labor
  - su afán
  lexicon: HALOT
  rationale: El término apunta al esfuerzo o trabajo asociado con criar o producir descendencia. «Su trabajo» es claro y natural en español; «su labor» también sería válida, pero «trabajo» conserva mejor el valor concreto del esfuerzo realizado.
- source_word: בְּלִי פָחַד
  english_pob_choice: without fear
  chosen_spanish: sin temor
  alternatives_spanish:
  - sin miedo
  - sin preocupación
  lexicon: HALOT
  rationale: La traducción más directa y tersa es «sin temor». En este contexto sugiere ausencia de preocupación ansiosa por la pérdida aparente de su esfuerzo, sin añadir explicaciones que el hebreo no expone.
translation_notes:
  revision_awareness: La revisión auditada no introdujo cambios y el control cruzado señaló solo observaciones menores; por ello se conserva la lectura base del sentido con una españolización natural de los elementos zoológicos y de esfuerzo.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, pero en español natural.
  - No se introduce «SEÑOR» ni terminología eclesiástica ajena al versículo.
  - Se conserva la ambigüedad relacional de la comparación hebrea mediante «como si no fueran suyos».
