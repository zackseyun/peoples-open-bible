  glossary_alignment: No hay términos del glosario de alto impacto teológico en este versículo. Se mantiene correctamente «filisteos». La elección «saqueadores» concuerda con la decisión contextual para הַמַּשְׁחִית. Los topónimos «Ofra» y «Shual» están bien como transliteraciones.
  issues:
