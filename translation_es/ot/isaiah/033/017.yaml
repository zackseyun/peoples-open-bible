translation:
  language: es
  text: Tus ojos verán al rey en su hermosura[a]; verán una tierra extensa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en su esplendor».'
    reason: lexical_alternative
  - marker: b
    text: O «una tierra remota»; más literalmente, «una tierra de grandes distancias».
    reason: lexical_alternative
lexical_decisions:
- source_word: מֶלֶךְ
  english_pob_choice: the king
  chosen_spanish: al rey
  alternatives_spanish:
  - a un rey
  - al Rey
  lexicon: HALOT
  rationale: El hebreo no lleva artículo, pero el contexto puede sugerir un referente definido. En español, «al rey» mantiene la posible referencia específica sin decidir si se trata de un rey humano, del Mesías o de Yahvé.
- source_word: בְּיָפְיוֹ
  english_pob_choice: in his beauty
  chosen_spanish: en su hermosura
  alternatives_spanish:
  - en su belleza
  - en su esplendor
  - en su belleza y esplendor
  lexicon: HALOT
  rationale: La construcción preposición + sustantivo se conserva de manera natural con «en su hermosura». «Hermosura» comunica el matiz de belleza visible sin forzar una identificación del tipo de gloria o majestad que esté en vista.
- source_word: תֶּחֱזֶינָה
  english_pob_choice: will behold
  chosen_spanish: verán
  alternatives_spanish:
  - contemplarán
  - verán con atención
  lexicon: HALOT
  rationale: Aunque חזה puede sugerir una visión atenta o contemplativa, en español «verán» resulta más natural y sigue permitiendo el matiz de observación intensa por el contexto poético.
- source_word: עֵינֶיךָ
  english_pob_choice: your eyes
  chosen_spanish: Tus ojos
  alternatives_spanish:
  - tus propios ojos
  - los ojos de ti
  lexicon: HALOT
  rationale: Se conserva la imagen concreta del hebreo. En español, el posesivo antepuesto mantiene la vividez del original y la segunda persona singular.
- source_word: תִּרְאֶינָה
  english_pob_choice: they will see
  chosen_spanish: verán
  alternatives_spanish:
  - ellos verán
  - ellos contemplarán
  lexicon: HALOT
  rationale: El hebreo usa un verbo femenino plural concordando con «ojos». En español, el sujeto implícito ya queda claro por la referencia a «Tus ojos», de modo que «verán» comunica la relación sin recargar la frase.
- source_word: אֶרֶץ
  english_pob_choice: a land
  chosen_spanish: una tierra
  alternatives_spanish:
  - una nación
  - el país
  lexicon: HALOT
  rationale: «Tierra» es la equivalencia más amplia y poética para אֶרֶץ aquí, y encaja con el complemento de distancia que sigue.
- source_word: מַרְחַקִּים
  english_pob_choice: far-reaching land
  chosen_spanish: muy distante
  alternatives_spanish:
  - de lejanías
  - de grandes distancias
  - lejana
  lexicon: HALOT
  rationale: El plural expresa distancia o extensiones lejanas. «Muy distante» es una forma breve y natural que preserva la idea de lejanía amplia sin volver la frase pesada o demasiado literal.
theological_decisions:
- issue: Identidad del rey
  english_pob_reading: the king is left unspecified
  chosen_spanish_reading: al rey queda sin identificar explícitamente
  alternative_spanish_readings:
  - al rey Ezequías
  - al Rey divino
  - al Rey Mesías
  rationale: El verso hebreo nombra solo «el rey» y no lo identifica. La traducción española conserva esa ambigüedad doctrinal y literaria, evitando resolverla con una tradición interpretativa no explicitada en el texto.
  doctrine_reference: Preservar la tensión interpretativa del texto
- issue: Valor de la segunda cláusula
  english_pob_reading: a far-reaching land
  chosen_spanish_reading: una tierra muy distante
  alternative_spanish_readings:
  - una tierra de grandes distancias
  - una tierra lejana
  - una tierra que se extiende lejos
  rationale: Se mantiene la referencia espacial amplia del hebreo מַרְחַקִּים. La versión española procura no cerrar si la imagen es geográfica, visionaria o simbólica, como tampoco lo hace el texto base.
  doctrine_reference: Poética profética y ambigüedad deliberada
translation_notes:
  revision_awareness: El inglés POB revisó la segunda cláusula de «a land that stretches far away» a «a far-reaching land» para mayor concisión y formalidad. La versión española sigue esa revisión con «una tierra muy distante», manteniendo la brevedad y la idea de amplitud lejana. También conserva la indefinición de «the king» sin identificarlo.
  spanish_consistency_notes:
  - Se mantiene «rey» y no «Mesías» o «SEÑOR» para respetar la ambigüedad del hebreo y el criterio auditado del POB.
  - Se usa «tierra» en sentido amplio para אֶרֶץ, sin convertirlo en «país» ni en una referencia política específica.
  - La frase «Tus ojos verán» reproduce el paralelismo hebreo de forma natural en español, aunque el hebreo use verbos distintos para contemplar y ver.
