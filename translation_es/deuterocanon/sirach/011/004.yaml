translation:
  language: es
  text: No te burles de un hombre pobre,[a] ni te jactes en días amargos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Variante griega: «No te jactes por la ropa que llevas, ni te enaltezcas en un día de gloria; porque las obras del Señor son maravillosas, y sus obras entre los hombres están ocultas».'
    reason: textual_variant
lexical_decisions:
- source_word: מַעֲטֶה אֹבֵד / poor man in English POB
  english_pob_choice: poor man
  chosen_spanish: un hombre pobre
  alternatives_spanish:
  - un manto gastado
  - un pobre de manto gastado
  - un hombre de capa raída
  lexicon: HALOT; Greek parallel περιβολῇ ἱματίων
  rationale: El hebreo recibido en la fuente apunta a una persona en condición humilde o afligida, mientras que el paralelo griego conserva la imagen de una prenda. En español, el texto principal sigue el sentido hebreo de la admonición social, con una formulación natural y reverente. Las alternativas con prenda se preservan porque el paralelo griego puede reflejar una tradición distinta o más concreta.
- source_word: אַל תְּהַתֵּל / אַל תְּקַלֵּס
  english_pob_choice: do not mock ... and do not boast
  chosen_spanish: No hagas burla ... ni te engrías
  alternatives_spanish:
  - no te burles ... ni te jactes
  - no escarnezcas ... ni te alabes
  - no hagas mofa ... ni te exaltes
  lexicon: HALOT
  rationale: El primer verbo transmite mofa o burla despectiva; 'hacer burla' conserva bien el tono de desprecio. El segundo verbo en el hebreo y su paralelo de autogloria se expresa con 'engreírse', que comunica autoexaltación sin introducir un matiz demasiado coloquial. Se evita 'gloriarse' para mantener claridad moderna y dignidad estilística.
- source_word: בִּמְרִירֵי יוֹם
  english_pob_choice: in bitter days
  chosen_spanish: en días amargos
  alternatives_spanish:
  - en un día amargo
  - en días de amargura
  - en tiempos amargos
  lexicon: HALOT
  rationale: La frase hebrea se refiere a tiempos duros o amargos; 'días amargos' reproduce la metáfora con naturalidad en español. 'En tiempos amargos' sería también posible, pero 'días' mantiene más de cerca la imagen temporal concreta del hebreo. El paralelo griego, que habla de 'un día de gloria', queda reflejado en nota textual.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego en el segundo miembro, con expansión adicional griega
  english_pob_reading: Follow the Hebrew two-colon admonition as the main text; Greek parallel adds 'day of glory' and a clause about the Lord's works.
  chosen_spanish_reading: Seguir el hebreo en el texto principal y registrar el griego como variante textual en nota.
  alternative_spanish_readings:
  - ni te engrías en un día de gloria, porque las obras del Señor son maravillosas, y sus obras entre los hombres son ocultas
  - no te exaltes en un día de gloria
  rationale: En Sirácida, cuando el hebreo está preservado con buena confianza, el proyecto da prioridad a ese testimonio y usa el griego como control y variante real. La adición griega no debe absorberse en el texto principal porque cambiaría la extensión y el foco de la exhortación. La nota textual preserva honestamente la tensión sin borrarla.
  doctrine_reference: 'PHILOSOPHY.md: translate from Hebrew where it survives; preserve source uncertainty honestly'
translation_notes:
  revision_awareness: La redacción sigue el hebreo recibido de Kahana como texto base, en coherencia con la política del proyecto para Sirácida cuando el hebreo está bien atestiguado. El paralelo griego se conserva como variante textual significativa porque difiere en el segundo colon y añade una cláusula explicativa ausente del hebreo. Se tuvo en cuenta que el borrador inglés pasó de una lectura más literal de la prenda a una corrección hacia una exhortación contra la burla a una persona pobre; por eso el español principal refleja la forma más natural y fiel al hebreo.
  spanish_consistency_notes:
  - Se usa 'amargos' para בִּמְרִירֵי יוֹם, manteniendo el valor figurado de dureza temporal.
  - Se evita 'SEÑOR' en el cuerpo principal porque el hebreo base no contiene un tetragrámaton explícito en el texto principal y la variante griega queda solo en nota.
  - El tono es exhortativo y sapiencial, no litúrgico; por eso se prefieren verbos directos y sobrios.
  - La nota usa 'Señor' para reproducir el griego Κυρίου en la variante textual, no como sustituto sistemático del nombre divino en el texto principal.
