translation:
  language: es
  text: Y unirás las cinco cortinas por separado, y las seis cortinas por separado; y doblarás la sexta cortina en dos[a] al frente de la tienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «doblarás sobre sí misma la sexta cortina, frente al frente de la tienda»; también, «opuesta al frente de la tienda».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְחִבַּרְתָּ / חִבַּר
  english_pob_choice: join ... separately
  chosen_spanish: unirás ... separadamente
  alternatives_spanish:
  - juntarás ... aparte
  - conectarás ... separadamente
  lexicon: HALOT
  rationale: חִבַּר expresa unir o conectar piezas. «Unirás» conserva el acto de combinar las cortinas en grupos, y «separadamente» refleja el sentido distributivo de לְבָד sin añadir la idea de ‘juntas’ que ya se sobreentiende en el verbo.
- source_word: יְרִיעֹת / יְרִיעָה
  english_pob_choice: curtains
  chosen_spanish: cortinas
  alternatives_spanish:
  - lienzos
  - paneles
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, יְרִיעָה designa las cubiertas textiles. «Cortinas» es claro y convencional en español bíblico sin perder la referencia arquitectónica.
- source_word: לְבָד
  english_pob_choice: separately
  chosen_spanish: separadamente
  alternatives_spanish:
  - aparte
  - por separado
  lexicon: HALOT
  rationale: 'La forma adverbial «separadamente» comunica bien la distribución de dos conjuntos distintos: cinco y seis. Mantiene la tensión de la fuente sin sonar más interpretativa que el hebreo.'
- source_word: כָפַלְתָּ
  english_pob_choice: fold ... double
  chosen_spanish: doblarás ... doble
  alternatives_spanish:
  - doblarás sobre sí misma
  - plegarás ... en doble
  lexicon: HALOT
  rationale: El verbo indica doblar o duplicar. «Doblarás ... doble» conserva la fuerza de la acción y la idea de una cortina doblada en dos, no solo desplazada.
- source_word: הַשִּׁשִּׁית
  english_pob_choice: the sixth
  chosen_spanish: la sexta
  alternatives_spanish:
  - la sexta de ellas
  lexicon: HALOT
  rationale: Ordinal directo y natural para el referente inmediato, la cortina.
- source_word: אֶל מוּל פְּנֵי הָאֹהֶל
  english_pob_choice: at the front of the tent
  chosen_spanish: al frente de la tienda
  alternatives_spanish:
  - frente a la tienda
  - enfrente de la tienda
  lexicon: HALOT
  rationale: La expresión preposicional indica orientación hacia la parte frontal. «Al frente de la tienda» es fiel y fluido; «tienda» sigue el hebreo אֹהֶל sin sustituirlo por «tabernáculo» como interpretación.
theological_decisions:
- issue: Uso de 'tienda' en vez de 'tabernáculo'
  english_pob_reading: the tent
  chosen_spanish_reading: la tienda
  alternative_spanish_readings:
  - el tabernáculo
  rationale: El hebreo dice literalmente «la tienda». Aunque el referente es la estructura del santuario, «tienda» respeta el vocabulario de la fuente y evita introducir un término interpretativo más amplio que el texto aquí no usa.
  doctrine_reference: Éxodo 26:1-37; precisión lexical del santuario sin sobretraducción
- issue: Valor distributivo de לְבָד
  english_pob_reading: separately
  chosen_spanish_reading: separadamente
  alternative_spanish_readings:
  - aparte
  - por separado
  rationale: La construcción no añade una afirmación teológica; organiza dos grupos de cortinas. Conviene mantener la separación verbal para no perder la lógica de ensamblaje del texto.
  doctrine_reference: Éxodo 26:9; descripción técnica del tabernáculo
translation_notes:
  revision_awareness: 'La base inglesa revisada eliminó el redundante ''together'' tras cada grupo y conservó el valor distributivo de separately. La versión española sigue esa decisión: no añade un equivalente explícito de ‘juntas’, porque el verbo unir ya expresa el agrupamiento. También mantiene la elección de ‘tent/tenda’ como ‘tienda’, en línea con la cautela lexical del audit trail.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se conservan términos técnicos del tabernáculo con español claro y no arcaizante.
  - La puntuación reproduce la coordinación del hebreo con dos miembros paralelos y una cláusula final.
  - La nota textual/lexical se ancla en la frase sobre la sexta cortina para reflejar la alternativa de doblar sobre la misma pieza.
