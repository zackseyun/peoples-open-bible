translation:
  language: es
  text: 'David tomó todos los rebaños y las vacadas[a]. Los llevaron delante del otro ganado, y dijeron: «Este es el botín de David»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las ovejas y las reses». El hebreo distingue entre rebaño menor y ganado mayor.
    reason: lexical_alternative
  - marker: b
    text: El hebreo probablemente indica que los animales recién tomados fueron llevados delante del ganado ya recuperado, como una exhibición pública, mientras declaraban que eran el botín de David.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּקַּח
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - agarró
  - se llevó
  lexicon: HALOT
  rationale: לקח en narración suele expresar simplemente 'tomar'; en español 'tomó' conserva la neutralidad del verbo sin añadir violencia ni interpretación.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - la totalidad de
  - todas y cada una de
  lexicon: HALOT
  rationale: El hebreo expresa totalidad; 'todas' mantiene esa amplitud de manera natural en español.
- source_word: הַצֹּאן וְהַבָּקָר
  english_pob_choice: the flocks and the herds
  chosen_spanish: las ovejas y el ganado vacuno
  alternatives_spanish:
  - los rebaños y las manadas
  - las ovejas y el ganado
  lexicon: HALOT
  rationale: צאן y בקר distinguen entre pequeños animales de rebaño y ganado mayor. En español, 'ovejas y ganado vacuno' comunica bien la distinción concreta y es idiomático; 'ganado' solo podría resultar demasiado general.
- source_word: נָהֲגוּ
  english_pob_choice: they drove
  chosen_spanish: los llevaron
  alternatives_spanish:
  - los arriaron
  - los guiaron
  lexicon: HALOT
  rationale: El verbo refiere el movimiento dirigido de animales. 'Los llevaron' mantiene la idea de conducirlos sin sonar demasiado técnico; 'arriaron' sería más específico, pero menos transparente para lectura general.
- source_word: לִפְנֵי
  english_pob_choice: ahead of
  chosen_spanish: delante de
  alternatives_spanish:
  - en frente de
  - antes que
  lexicon: HALOT
  rationale: '''Delante de'' expresa bien la relación espacial y es natural en español narrativo.'
- source_word: הַמִּקְנֶה הַהוּא
  english_pob_choice: the other livestock
  chosen_spanish: el otro ganado
  alternatives_spanish:
  - ese ganado
  - aquel ganado
  lexicon: HALOT
  rationale: El contexto sugiere una comparación con el ganado ya recuperado; 'el otro ganado' reproduce la distinción contextual que el audit trail inglés también señaló en su revisión.
- source_word: וַיֹּאמְרוּ
  english_pob_choice: and said
  chosen_spanish: y dijeron
  alternatives_spanish:
  - y decían
  - y exclamaron
  lexicon: HALOT
  rationale: La forma narrativa plural se expresa de manera directa con 'dijeron'.
- source_word: זֶה
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Esto es
  - Es
  lexicon: HALOT
  rationale: El demostrativo singular se mantiene con 'Este es', que introduce la identificación del botín de manera clara en español.
- source_word: שְׁלַל
  english_pob_choice: spoil
  chosen_spanish: botín
  alternatives_spanish:
  - despojo
  - plunder
  lexicon: HALOT
  rationale: שׁלל se refiere al botín tomado en incursión o guerra. 'Botín' es el equivalente más natural y preciso en español bíblico contemporáneo.
- source_word: דָּוִד
  english_pob_choice: David’s
  chosen_spanish: de David
  alternatives_spanish:
  - de Davidito
  - de David, el
  lexicon: HALOT
  rationale: La relación de posesión se expresa de forma simple y directa con 'de David'.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y también toma en cuenta la revisión inglesa que aclaró que el segundo grupo de animales es 'el otro ganado', es decir, ganado previamente recuperado frente al cual se conducían los recién tomados.
  spanish_consistency_notes:
  - Se mantiene el nombre divino fuera de este versículo porque no aparece en el texto fuente.
  - '''Botín'' conserva el valor militar de שׁלל sin suavizarlo a un término genérico.'
  - La sintaxis española procura respetar la secuencia narrativa breve del hebreo sin sobreexplicar.
