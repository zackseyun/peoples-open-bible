review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido global del griego: Isaac soporta por εὐσέβεια, los hermanos se animan mutuamente, se entregan a Dios y usan sus cuerpos para la guardia de la ley. Sin embargo, hay varios puntos de ajuste: ὑπέμεινεν se refleja mejor con «resistió/soportó» que con «sufrió con firmeza»; «cada uno ... dijeron» tiene discordancia sintáctica; «al que nos dio las almas» suena poco natural en español y conviene explicitar el posesivo; y «custodia de la ley» es entendible pero menos idiomático que «guardia/vigilancia de la ley».'
  spanish_quality_summary: El español es generalmente digno y comprensible, pero presenta una discordancia gramatical importante («cada uno ... dijeron») y algunos giros algo duros o poco naturales («nos dio las almas», «en la custodia de la ley»). Una revisión menor mejora fidelidad y legibilidad sin apartarse del audit trail.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Dios» está bien. La elección de «piedad» para εὐσέβεια es defendible con nota. «Consagrémonos» es aceptable para ἀφιερώσωμεν. La decisión más débil es «las almas» sin posesivo, por naturalidad española más que por léxico.
  issues:
  - severity: medium
    issue: Discordancia en «cada uno ... dijeron»
    rationale: El griego tiene εἷς δὲ ἕκαστος ... ἔλεγον dentro de una construcción distributiva/colectiva, pero en español «cada uno ... dijeron» suena incorrecto. Debe rehacerse como «cada uno ... decía» o mejor «todos, mirándose unos a otros, ... decían».
  - severity: medium
    issue: «Sufrió con firmeza» no es la mejor representación de ὑπέμεινεν
    rationale: ὑπομένω enfatiza soportar/resistir/perseverar bajo prueba. «Sufrir» introduce una noción más pasiva y menos precisa que «resistió» o «soportó».
  - severity: medium
    issue: «Al que nos dio las almas» es poco natural en español
    rationale: Aunque ψυχάς puede reflejarse formalmente como «almas», en español normalmente se diría «nuestras almas». Sin el posesivo, el giro suena extraño y poco idiomático.
  - severity: low
    issue: «Custodia de la ley» es menos idiomático que otras opciones
    rationale: Preserva la metáfora de φυλακή, pero «guardia de la ley» o «vigilancia de la ley» comunican mejor en español la imagen de guarda vigilante sin sonar administrativo.
  revised_spanish_text: 'Por la piedad[a] Isaac resistió. Y todos, mirándose unos a otros, juntos, alegres y muy valientes, decían: «Consagrémonos a Dios con todo el corazón, al que nos dio nuestras almas[b], y empleemos nuestros cuerpos en la vigilancia[c] de la ley».'
