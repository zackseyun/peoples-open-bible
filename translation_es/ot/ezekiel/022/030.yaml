    rationale: El expediente inglés preserva explícitamente la forma singular masculina de אִישׁ. Dado que el español también traduce «un hombre» y luego «no lo hallé», conviene conservar esa justificación en una nota para mantener trazabilidad léxica y evitar ambigüedad interpretativa.
