    text: Or 'their souls.' Here the sense is likely 'their lives' in the context of risking oneself at sea.
    reason: lexical_alternative
  - marker: b
    text: Or 'a very small piece of wood.' The phrase highlights the frailty of the vessel in contrast to the preserving work of divine wisdom.
    reason: lexical_alternative
