    reason: alternative_reading
  revision_rationale: 'Se corrigió חֲלָלִים de «los muertos» a «los caídos» para conservar mejor el matiz de muerte violenta presente en el hebreo y en la rationale inglesa. Se reubicaron las notas a los segmentos pertinentes: [a] en «moribundos» porque trata la dificultad de מְתִים y la alternativa de lectura de la frase inicial; [b] al final de la cláusula difícil לֹא יָשִׂים תִּפְלָה. También se suavizó «no lo considera como necedad» a «no lo considera necedad» para un español más natural sin cambiar el sentido.'
