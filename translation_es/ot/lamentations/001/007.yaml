revisions:
- from: Jerusalén recordó en los días de su aflicción y de sus wanderings[a] todas sus cosas preciosas, que habían sido desde los días antiguos. Cuando su pueblo cayó en mano del enemigo, y no había quien la ayudara, los enemigos la vieron; se rieron de su ruina[b].
  to: Jerusalén recordó en los días de su aflicción y de su vagar[a] todas sus cosas preciosas, que tenía desde días antiguos. Cuando su pueblo cayó en manos del enemigo, y no había quien la ayudara, los enemigos la vieron; se rieron de su ruina[b].
  rationale: Se reemplaza el anglicismo “wanderings” por “vagar”, manteniendo en nota la incertidumbre léxica documentada por el POB. Se mejora la naturalidad de אֲשֶׁר הָיוּ מִימֵי קֶדֶם con “que tenía desde días antiguos”, y se ajusta el modismo a “en manos del enemigo” para una lectura española más natural sin alterar el sentido.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:40:04Z'
