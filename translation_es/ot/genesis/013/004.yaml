translation:
  language: es
  text: al lugar del altar que había hecho allí antes. Y allí Abram invocó[a] el nombre de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo puede significar también «proclamó el nombre de Yahvé» o «invocó a Yahvé por su nombre». El giro admite tanto proclamación como invocación.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «YHWH»; tradicionalmente se vierte «el SEÑOR». Aquí se conserva el nombre divino como «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: מְקוֹם
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - ubicación
  lexicon: HALOT
  rationale: En este contexto locativo, «lugar» es natural en español y conserva la sencillez del hebreo sin introducir matices técnicos innecesarios.
- source_word: הַמִּזְבֵּחַ
  english_pob_choice: the altar
  chosen_spanish: el altar
  alternatives_spanish:
  - el ara
  - el altar culto
  lexicon: HALOT
  rationale: «Altar» es el término culto y preciso para el objeto mencionado; además retoma el altar ya identificado en el contexto narrativo.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he had made
  chosen_spanish: que había hecho
  alternatives_spanish:
  - que hizo
  - que había construido
  lexicon: HALOT
  rationale: «Había hecho» conserva la literalidad básica de עשה y el pluscuamperfecto refleja bien la anterioridad narrativa respecto de la visita actual. «Construido» aclara el sentido de un altar, pero añade una especificación no expresada por el verbo.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: HALOT
  rationale: «Allí» es el equivalente más neutro y formal para el adverbio de lugar, y mantiene la repetición enfática del hebreo.
- source_word: בָּרִאשֹׁנָה
  english_pob_choice: at first
  chosen_spanish: antes
  alternatives_spanish:
  - primero
  - anteriormente
  - al principio
  lexicon: HALOT
  rationale: Aquí el valor temporal remite a una visita previa; «antes» comunica con claridad esa referencia en español contemporáneo sin exagerar el matiz.
- source_word: וַיִּקְרָא
  english_pob_choice: called on
  chosen_spanish: invocó
  alternatives_spanish:
  - llamó
  - clamó
  - proclamó
  lexicon: HALOT
  rationale: El giro hebreo קרא בשם indica un acto de invocación adoradora más amplio que una mera mención. «Invocó» expresa bien esa carga religiosa en español, aunque la expresión idiomática puede abarcar también proclamación.
- source_word: בְּשֵׁם יְהוָה
  english_pob_choice: on the name of Yahweh
  chosen_spanish: el nombre de Yahvé
  alternatives_spanish:
  - el nombre de Yahweh
  - el nombre de Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme al estándar del proyecto para יְהוָה. En español, después de «invocó» no hace falta reproducir literalmente «sobre/en», porque la construcción natural ya transmite el complemento de nombre invocado.
- source_word: אַבְרָם
  english_pob_choice: Abram
  chosen_spanish: Abram
  alternatives_spanish:
  - Abrán
  lexicon: HALOT
  rationale: Se mantiene la transliteración estándar del nombre propio, sin adaptar la acentuación más allá de la forma usual en español bíblico.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: La POB inglesa opta por «Yahweh» para preservar el nombre propio del pacto. En español, la forma establecida por el proyecto es «Yahvé», que mantiene esa misma decisión teológica y traductológica frente a la sustitución por un título como «el Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Idiomático קרא בשם יהוה
  english_pob_reading: called on the name of Yahweh
  chosen_spanish_reading: invocó el nombre de Yahvé
  alternative_spanish_readings:
  - proclamó el nombre de Yahvé
  - llamó al nombre de Yahvé
  - invocó a Yahvé por su nombre
  rationale: El hebreo permite tanto invocación como proclamación. «Invocó» preserva la dimensión cultual/orante sin excluir la posibilidad de declaración pública, y evita reducir el giro a una sola función.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y el control cruzado reporta alto acuerdo; por ello se mantiene una solución estable, con ajuste español para naturalidad sintáctica y conservación de las decisiones de nombre divino e idiomáticas del hebreo.
  spanish_consistency_notes:
  - Se mantiene la secuencia narrativa con pluscuamperfecto («había hecho») para reflejar la relación temporal entre la acción pasada y la llegada de Abram.
  - «Yahvé» se usa de forma consistente para יְהוָה en el cuerpo del texto.
  - El verbo «invocó» conserva la amplitud del hebreo קרא בשם sin forzar una paráfrasis explicativa en el texto principal.
  - La repetición de «allí» se mantiene en español para reproducir el énfasis locativo del hebreo.
