translation:
  language: es
  text: Y Zedequías rey de Judá no escapará de la mano de los caldeos, porque ciertamente será entregado en la mano del rey de Babilonia, y hablará boca a boca con él[a], y sus ojos verán sus ojos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más idiomáticamente: «hablará con él boca a boca», es decir, en un encuentro personal y directo.'
    reason: lexical_alternative
  - marker: b
    text: 'O más idiomáticamente: «lo verá directamente, cara a cara».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּלֵט
  english_pob_choice: will not escape
  chosen_spanish: no escapará
  alternatives_spanish:
  - no se librará
  - no podrá huir
  lexicon: HALOT
  rationale: El nifal de מלט expresa escaparse o zafarse de una situación de poder. «No escapará» es natural en español y conserva el sentido de escape físico/político del contexto.
- source_word: מִיַּד הַכַּשְׂדִּים
  english_pob_choice: from the hand of the Chaldeans
  chosen_spanish: de la mano de los caldeos
  alternatives_spanish:
  - del poder de los caldeos
  - del alcance de los caldeos
  lexicon: HALOT
  rationale: Se conserva el modismo concreto «mano de» porque refleja bien la imagen hebrea de control y dominio. «Caldeos» mantiene la designación étnico-política del texto fuente.
- source_word: הִנָּתֹן יִנָּתֵן
  english_pob_choice: he will surely be given
  chosen_spanish: ciertamente será entregado
  alternatives_spanish:
  - será ciertamente entregado
  - será entregado sin duda
  lexicon: HALOT
  rationale: La combinación infinitivo absoluto + verbo finito intensifica la certeza. «Ciertamente será entregado» transmite esa fuerza enfática en español y conserva la voz pasiva.
- source_word: בְּיַד מֶלֶךְ בָּבֶל
  english_pob_choice: into the hand of the king of Babylon
  chosen_spanish: en la mano del rey de Babilonia
  alternatives_spanish:
  - en poder del rey de Babilonia
  - en manos del rey de Babilonia
  lexicon: HALOT
  rationale: Se mantiene el mismo modismo de «mano» para no diluir la imagen hebrea. «Rey de Babilonia» es la forma transparente y estándar del título.
- source_word: וְדִבֶּר פִּיו עִם פִּיו
  english_pob_choice: he will speak mouth to mouth with him
  chosen_spanish: hablará boca a boca con él
  alternatives_spanish:
  - hablará con él cara a cara
  - hablará con él de boca a boca
  lexicon: HALOT
  rationale: El hebreo es corporal y concreto; «boca a boca» conserva esa literalidad sin sonar imposible en español. La alternativa idiomática se preserva en nota.
- source_word: וְעֵינָיו אֶת־עֵינוֹ תִּרְאֶינָה
  english_pob_choice: and his eyes will see his eyes
  chosen_spanish: sus ojos verán sus ojos
  alternatives_spanish:
  - lo verá cara a cara
  - lo verá ojo a ojo
  lexicon: HALOT
  rationale: La expresión se mantiene de modo literal para respetar la imagen recíproca del hebreo. «Sus ojos verán sus ojos» deja abierta la fuerza de encuentro directo entre ambos.
- source_word: צִדְקִיָּהוּ
  english_pob_choice: Zedekiah
  chosen_spanish: Zedequías
  alternatives_spanish:
  - Sedecías
  lexicon: Convención onomástica española
  rationale: Se usa la forma castellana común «Zedequías», que comunica mejor al lector español sin alterar la referencia al personaje bíblico.
- source_word: הַכַּשְׂדִּים
  english_pob_choice: the Chaldeans
  chosen_spanish: los caldeos
  alternatives_spanish:
  - los babilonios
  lexicon: HALOT
  rationale: Se conserva «caldeos» por fidelidad al término hebreo específico. Aunque el contexto apunta a Babilonia, el texto distingue a este grupo con su propio nombre.
translation_notes:
  revision_awareness: Esta versión sigue el cierre revisado del audit trail inglés, que prefirió una formulación más natural para el giro de habla directa («mouth to mouth with him») sin perder la concreción del hebreo. También conserva la literalidad de la última cláusula para mantener su fuerza imagética.
  spanish_consistency_notes:
  - Se mantiene «mano» en ambas ocurrencias para reflejar la misma imagen de control en el hebreo.
  - «Caldeos» se conserva de manera consistente con el texto fuente y con la decisión inglesa auditada.
  - La onomástica se adapta al uso bíblico español («Zedequías», «Babilonia») sin alterar la referencia histórica.
  - Las imágenes corporales («boca a boca», «sus ojos verán sus ojos») se traducen con literalidad controlada para no borrar la tensión semítica del versículo.
