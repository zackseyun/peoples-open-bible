base_translation:
  language: en
  yaml_path: translation/ot/amos/009/006.yaml
  text: He who builds his upper chambers in the heavens[a], and has founded his vault upon the earth[b], who calls for the waters of the sea and pours them out upon the face of the earth—Yahweh is his name.
  footnotes:
  - marker: a
    text: Or 'his ascents' or 'his steps' for 'his upper chambers.' The Hebrew term can denote heights, stairways, or upper rooms; here it likely refers to elevated heavenly structures.
    reason: lexical_alternative
  - marker: b
    text: Or 'his band,' 'his structure,' or 'his dome' for 'his vault.' The Hebrew word refers to something bound together and is used here in cosmic architecture imagery.
    reason: lexical_alternative
