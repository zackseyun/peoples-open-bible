  language: en
  yaml_path: translation/ot/1_kings/014/013.yaml
  text: All Israel will mourn for him and bury him[a], because he alone of Jeroboam’s house will come to the grave, since in him something good toward Yahweh, the God of Israel[c][b], has been found in the house of Jeroboam.
