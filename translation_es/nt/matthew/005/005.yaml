translation:
  language: es
  text: Bienaventurados los mansos[a][b], porque ellos heredarán la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra» en sentido de «la tierra de la promesa»; la expresión probablemente alude al Salmo 37:11, donde la promesa puede oírse tanto en términos de la tierra de la alianza como en un sentido más amplio.
    reason: alternative_reading
  - marker: b
    text: O «los apacibles»; aquí «mansos» significa una mansedumbre humilde, no debilidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Felices
  - Dichosos
  lexicon: BDAG
  rationale: En bienaventuranzas, 'bienaventurados' comunica mejor que una simple emoción; conserva el sentido de favor y dicha bajo la bendición de Dios, sin reducirlo a un estado subjetivo.
- source_word: οἱ πραεῖς
  english_pob_choice: the meek
  chosen_spanish: los mansos
  alternatives_spanish:
  - los humildes
  - los apacibles
  - los gentiles
  lexicon: BDAG
  rationale: '''πραεῖς'' denota mansedumbre, suavidad y dominio de sí; ''mansos'' es la equivalencia más natural y fiel en español. ''Humildes'' puede acercarse en parte, pero desplaza el matiz hacia disposición interior general. ''Gentiles'' puede sonar demasiado débil o ambiguo en español moderno.'
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de la bienaventuranza. 'Porque' es la opción más clara y natural en español contemporáneo.
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  lexicon: BDAG
  rationale: El pronombre griego tiene fuerza enfática. En español, 'ellos' puede comunicar suficientemente esa prominencia sin sobrecargar la frase; 'ellos mismos' sería más explícito pero menos fluido.
- source_word: κληρονομήσουσι
  english_pob_choice: will inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - recibirán en herencia
  - poseerán
  lexicon: BDAG
  rationale: El futuro de κληρονομέω expresa recibir como herencia. 'Heredarán' es directo, idiomático y conserva la imagen de promesa hereditaria.
- source_word: τὴν γῆν
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - el país
  - el terreno
  lexicon: BDAG
  rationale: '''γῆ'' puede significar ''tierra'' o ''país/land''. En español, ''la tierra'' mantiene abierta la misma tensión entre un sentido amplio y una resonancia de promesa/covenantalidad, sin decidir prematuramente por ''el mundo'' ni por una sola tierra localizada.'
theological_decisions:
- issue: Alcance de τὴν γῆν
  english_pob_reading: the earth
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - el mundo
  - la tierra prometida
  - el país
  rationale: 'La forma griega permite tanto un sentido amplio como uno más ligado a la promesa del Salmo 37:11. ''La tierra'' preserva en español esa tensión: puede oírse cósmicamente y, a la vez, evocar la herencia prometida sin forzar una resolución que el texto no impone.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto base griego y con la auditoría inglesa; no se requieren revisiones del borrador previo. Se conserva la ambigüedad interpretativa de γῆ mediante una nota y se mantiene la fuerza lexical de πραεῖς con 'mansos'.
  spanish_consistency_notes:
  - Se usa 'Bienaventurados' para μακάριοι, conforme al registro bíblico y al tono de las bienaventuranzas.
  - Se opta por 'mansos' para πραεῖς por ser la equivalencia más estable en español bíblico sin perder el matiz de gentileza con fortaleza.
  - '''La tierra'' mantiene abierta la alternativa entre sentido universal y resonancia de herencia/promesa, coherente con la nota del texto fuente.'
  - El orden y la sintaxis siguen de cerca el griego y el inglés auditado, sin calco innecesario.
