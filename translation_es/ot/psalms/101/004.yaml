  spanish_quality_summary: 'El español es legible y digno. «Un corazón perverso se apartará de mí; no conoceré el mal» suena natural y fiel. No obstante, la nota actual está mal orientada: el problema principal de inteligibilidad en español está en «no conoceré el mal», no en «perverso». Conviene trasladar la nota al segundo hemistiquio y aclarar el sentido idiomático.'
