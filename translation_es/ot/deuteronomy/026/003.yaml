base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/026/003.yaml
  text: And you shall go to the priest who is in office in those days and say to him[c][b][a], ‘Today I declare to Yahweh your God that I have come into the land that Yahweh swore to our fathers to give to us.’
  footnotes:
  - marker: a
    text: 'Hebrew: ''the priest who will be in those days,'' that is, the priest then serving or in office.'
    reason: lexical_alternative
  - marker: b
    text: 'Or ''Today I have declared.'' The Hebrew form likely functions performatively: the speaker makes the declaration by saying it.'
    reason: lexical_alternative
  - marker: c
    text: Or 'our ancestors.' Hebrew 'our fathers' is retained because the wording is masculine and likely refers specifically to the patriarchal forefathers.
    reason: lexical_alternative
