translation:
  language: es
  text: Entregaste tu fuerza[a] a las mujeres, y las dejaste gobernar sobre tu cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «tu fuerza»; el paralelo griego dice «tus lomos», haciendo explícito el sentido sexual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כסלך
  english_pob_choice: your strength
  chosen_spanish: tu fuerza
  alternatives_spanish:
  - tus lomos
  - tu vigor
  - tu necedad
  lexicon: HALOT
  rationale: El hebreo es difícil; el paralelo griego habla de «tus lomos», y el contexto apunta al abandono de la potencia viril. «Tu fuerza» conserva el sentido idiomático sin volver la frase demasiado anatómica en español, a la vez que evita imponer una lectura abstracta como «tu necedad».
- source_word: ותתן
  english_pob_choice: you gave
  chosen_spanish: entregaste
  alternatives_spanish:
  - diste
  - cediste
  - pusiste
  lexicon: HALOT
  rationale: נתן puede ser simplemente «dar», pero aquí el reproche implica haber puesto algo a disposición de otro. «Entregaste» comunica mejor la idea de dar en manos ajenas o rendir.
- source_word: לנשים
  english_pob_choice: to women
  chosen_spanish: a las mujeres
  alternatives_spanish:
  - para las mujeres
  lexicon: HALOT
  rationale: El ל marca el destinatario/dirección del acto; en español «a las mujeres» es más natural y mantiene la orientación del verbo.
- source_word: ותמשילם
  english_pob_choice: let them rule
  chosen_spanish: las dejaste gobernar
  alternatives_spanish:
  - las hiciste gobernar
  - les permitiste dominar
  - las dejaste dominar
  lexicon: HALOT
  rationale: El verbo משל en causativo expresa hacer o permitir gobernar. En español, «las dejaste gobernar» preserva la acusación y su tono reprochador sin forzar una estructura demasiado literal.
- source_word: בגויתך
  english_pob_choice: over your body
  chosen_spanish: sobre tu cuerpo
  alternatives_spanish:
  - en tu cuerpo
  - sobre tu persona
  - sobre tu carne
  lexicon: HALOT
  rationale: גוייה se refiere al cuerpo físico; el griego σώμα lo confirma. «Sobre tu cuerpo» transmite la dominación sugerida por el verbo y mantiene el matiz corporal/sexual del pasaje.
theological_decisions:
- issue: Base hebrea con apoyo del paralelo griego para el matiz corporal/sexual
  english_pob_reading: Translate the Hebrew as the base text, with the Greek parallel informing the sense of the difficult term and the bodily/sexual nuance of the verse.
  chosen_spanish_reading: Traducir el hebreo como texto base, dejando que el paralelo griego determine el matiz de «fuerza» y de la dominación sobre el cuerpo.
  alternative_spanish_readings:
  - «Entregaste tus lomos a las mujeres, y ellas gobernaron en tu cuerpo.»
  - «Entregaste tu necedad a las mujeres, y las dejaste gobernar tu cuerpo.»
  rationale: La tradición de trabajo de POB para Sirácides usa el hebreo donde está conservado, pero no ignora el testimonio griego. Aquí el griego hace explícito el carácter corporal/sexual del reproche, mientras que el hebreo de כסלך es oscuro. «Tu fuerza» es una solución prudente que no borra la tensión textual ni impone una interpretación excesivamente interpretativa.
  doctrine_reference: 'PHILOSOPHY.md: traducir Sirácides desde el hebreo cuando está disponible, usando el paralelo griego como apoyo interpretativo.'
translation_notes:
  revision_awareness: Se revisó el antecedente inglés y el control cruzado; no se detectaron cambios necesarios. La solución española mantiene la tensión entre el hebreo oscuro y el griego más explícito, sin homogeneizarla.
  spanish_consistency_notes:
  - Se emplea «Yahvé» en el proyecto cuando corresponde, pero aquí no aparece el nombre divino.
  - «Cuerpo» conserva el paralelo con σώμα y evita un calco menos natural como «en tu cuerpo».
  - «Entregaste» y «dejaste gobernar» preservan el tono de reproche mejor que una traducción meramente descriptiva.
