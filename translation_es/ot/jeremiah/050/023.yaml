translation:
  language: es
  text: ¡Cómo ha sido derribado y quebrado el martillo de toda la tierra! ¡Cómo Babilonia se ha convertido en una desolación[a][b] entre las naciones!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «martillo de guerra de toda la tierra». El hebreo presenta a Babilonia como el instrumento aplastante usado contra las naciones.
    reason: lexical_alternative
  - marker: b
    text: O «un objeto de horror». El término hebreo puede subrayar tanto la desolación como el asombro sobrecogido ante la ruina.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֵיךְ
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Cuán!
  - ¡Ay, cómo!
  lexicon: HALOT
  rationale: El hebreo expresa exclamación de lamentación y asombro, no pregunta. «¡Cómo!» reproduce de forma natural esa fuerza retórica en español sin añadir interpretación.
- source_word: נִגְדַּע
  english_pob_choice: has been cut down
  chosen_spanish: ha sido derribado
  alternatives_spanish:
  - ha sido cortado
  - ha sido talado
  lexicon: HALOT
  rationale: El nifal comunica ser abatido o cortado. «Ha sido derribado» mantiene el sentido pasivo/resultativo y funciona bien junto con «quebrado» en la imagen del instrumento humillado.
- source_word: וַיִּשָּׁבֵר
  english_pob_choice: and broken
  chosen_spanish: y quebrado
  alternatives_spanish:
  - y roto
  - y destrozado
  lexicon: HALOT
  rationale: «Quebrado» conserva el valor de ser roto o partido y, en español bíblico, mantiene una solemnidad compatible con el paralelismo hebreo. «Roto» sería más general; «destrozado» sería más interpretativo.
- source_word: פַּטִּישׁ
  english_pob_choice: hammer
  chosen_spanish: martillo
  alternatives_spanish:
  - mazo
  - martillo de guerra
  lexicon: HALOT
  rationale: El sustantivo puede referirse a un martillo de herrero. «Martillo» preserva el campo léxico básico y deja visible la metáfora sin explicarla en exceso.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: of the whole earth
  chosen_spanish: de toda la tierra
  alternatives_spanish:
  - de toda la tierra habitada
  - de toda la tierra
  lexicon: HALOT
  rationale: «Tierra» transmite mejor el alcance universal y mantiene una formulación bíblica natural en español. «Toda la tierra» conserva la amplitud global del hebreo mejor que «mundo» en este contexto.
- source_word: הָיְתָה לְשַׁמָּה
  english_pob_choice: has become a desolation
  chosen_spanish: ha llegado a ser una desolación
  alternatives_spanish:
  - se ha vuelto una desolación
  - ha quedado en desolación
  lexicon: HALOT
  rationale: El giro לְשַׁמָּה expresa el resultado de quedar reducida a ruina/desolación. «Ha llegado a ser una desolación» conserva ese estado resultante sin forzar una imagen más fuerte que la del texto.
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babilonia
  lexicon: HALOT
  rationale: 'El nombre propio se adapta a la forma corriente en español: «Babilonia».'
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre las naciones
  lexicon: HALOT
  rationale: En este contexto de juicio histórico-político, «naciones» es la opción más precisa y natural. «Entre» preserva la ubicación relacional del hebreo mejor que una lectura más teológica como «entre los gentiles».
theological_decisions:
- issue: Metáfora de Babilonia como instrumento de juicio
  english_pob_reading: Retain the metaphor directly rather than interpret it as 'destroyer' or similar.
  chosen_spanish_reading: Mantener la metáfora de «martillo de toda la tierra» sin glosarla como «destructor».
  alternative_spanish_readings:
  - el destructor de toda la tierra
  - el martillo de guerra de toda la tierra
  rationale: 'El hebreo presenta una imagen vívida: Babilonia fue el instrumento que golpeó a las naciones y ahora es abatida. Conservar la metáfora respeta el relieve retórico y evita estrechar el sentido con una explicación no explicitada por el texto.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el trazado del inglés POB y coincide con su lectura metafórica principal. Se mantuvieron las dos ambigüedades documentadas: el valor instrumental de פַּטִּישׁ y el matiz de לְשַׁמָּה como desolación/objeto de horror. No se detectaron revisiones posteriores que obligaran a cambiar la solución base.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se evitó «SEÑOR» como sustituto automático, siguiendo la política del proyecto.
  - «Babilonia» se mantiene como topónimo estándar en español.
  - «Naciones» conserva el valor geopolítico de גוים en este contexto.
