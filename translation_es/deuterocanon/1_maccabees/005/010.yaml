translation:
  language: es
  text: 'Y enviaron cartas a Judas y a sus hermanos, diciendo: «Las naciones de alrededor nuestro se han reunido contra nosotros para destruirnos[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para exterminarnos». El infinitivo griego puede traducirse de manera más formal como «para destruirnos», mientras que «para exterminarnos» hace más explícita la fuerza de eliminación total en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλαν
  english_pob_choice: sent
  chosen_spanish: enviaron
  alternatives_spanish:
  - mandaron
  - remitieron
  lexicon: LSJ
  rationale: ἀποστέλλω indica el envío de un mensaje escrito; en español, «enviaron» es natural y preciso en un contexto epistolar.
- source_word: γράμματα
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - cartas escritas
  - mensajes escritos
  lexicon: LSJ
  rationale: El plural griego se refiere a comunicación escrita. «Cartas» conserva el sentido normal y publicable en español.
- source_word: Ἰούδαν
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Judá
  lexicon: LSJ
  rationale: En 1 Macabeos es el nombre propio del líder; «Judas» sigue la transliteración establecida para la persona, no el nombre tribal.
- source_word: τοὺς ἀδελφοὺς αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: a sus hermanos
  alternatives_spanish:
  - a sus hermanos varones
  - a sus hermanos y familiares
  lexicon: LSJ
  rationale: El texto griego dice literalmente «sus hermanos». En este contexto narrativo se trata de los hermanos de Judas; «a sus hermanos» es fiel y natural.
- source_word: Ἐπισυνηγμένοι εἰσὶν
  english_pob_choice: have gathered together
  chosen_spanish: se han reunido
  alternatives_spanish:
  - están reunidas
  - han sido reunidas
  lexicon: LSJ
  rationale: La construcción perifrástica expresa un estado resultante de haberse congregado. «Se han reunido» conserva esa idea en español idiomático.
- source_word: τὰ ἔθνη
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: LSJ
  rationale: Aquí ἔθνη tiene sentido étnico-político de pueblos vecinos hostiles. «Las naciones» mantiene el valor más directo sin cargarlo con un matiz teológico posterior.
- source_word: τὰ κύκλῳ ἡμῶν
  english_pob_choice: around us
  chosen_spanish: que están alrededor de nosotros
  alternatives_spanish:
  - que nos rodean
  - alrededor de nosotros
  lexicon: LSJ
  rationale: La frase idiomática describe a los pueblos circundantes. Añadir «que están» aclara en español la relación espacial sin cambiar el sentido.
- source_word: τοῦ ἐξᾶραι ἡμᾶς
  english_pob_choice: to destroy us
  chosen_spanish: para destruirnos
  alternatives_spanish:
  - para exterminarnos
  - para acabar con nosotros
  lexicon: LSJ
  rationale: El infinitivo expresa propósito hostil. «Destruirnos» sigue de cerca la revisión inglesa más formal y es suficientemente fuerte sin exagerar más allá del griego.
theological_decisions:
- issue: Rendering of ἔθνη in a deuterocanonical historical context
  english_pob_reading: the nations
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  - los pueblos
  rationale: En este pasaje el término es político-étnico y no una categoría teológica desarrollada. «Las naciones» conserva el sentido histórico sin introducir connotaciones ajenas.
  doctrine_reference: 'DOCTRINE.md: original-language primacy; consistency of key terms, or documented exception'
- issue: Gender rendering of ἀδελφοί
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - familiares
  rationale: El contexto presenta a los hermanos de Judas como colaboradores varones. «Hermanos» mantiene fidelidad semántica y la precisión de género del original.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió «to destroy us» frente a «to wipe us out» por un registro más formal y una correspondencia más cercana con ἐξᾶραι. En español se reflejó con «para destruirnos».
  spanish_consistency_notes:
  - Se mantuvo «naciones» para ἔθνη según el uso histórico del libro.
  - Se evitó «Cristo» u այլ terminología no presente en el pasaje.
  - 'La puntuación reproduce el flujo narrativo: envío de cartas, destinatarios y contenido citado.'
