translation:
  language: es
  text: 'Ahora bien, cierto Eleazar, hombre distinguido de entre los judíos de la región, ya avanzado en edad y adornado con toda virtud en su conducta, habiendo calmado a los ancianos que estaban a su alrededor, invocó al Dios santo y oró de esta manera:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἐλεάζαρος
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  alternatives_spanish:
  - Eliezer
  lexicon: transliteración convencional
  rationale: Se conserva el nombre propio con transliteración estándar; no hay motivo textual para castellanizarlo de otro modo.
- source_word: τις
  english_pob_choice: a certain
  chosen_spanish: un tal
  alternatives_spanish:
  - cierto
  - uno
  lexicon: LSJ
  rationale: τις introduce a un personaje particular sin identificarlo plenamente; en español, 'un tal' preserva esa referencia narrativa con naturalidad.
- source_word: ἀνὴρ ἐπίσημος
  english_pob_choice: a distinguished man
  chosen_spanish: hombre distinguido
  alternatives_spanish:
  - hombre notable
  - hombre eminente
  lexicon: LSJ
  rationale: ἐπίσημος indica alguien señalado o notable; 'hombre distinguido' conserva el valor honorífico en español actual sin sonar forzado.
- source_word: τῶν ἀπὸ τῆς χώρας Ἰουδαίων
  english_pob_choice: among the Jews of the country
  chosen_spanish: entre los judíos de la región
  alternatives_spanish:
  - de entre los judíos del país
  - entre los judíos de la tierra
  lexicon: LSJ
  rationale: La frase identifica pertenencia dentro del grupo local; 'de la región' evita fijar una geografía más precisa de la que el griego exige.
- source_word: ἐν πρεσβείῳ τὴν ἡλικίαν ἤδη λελογχώς
  english_pob_choice: already advanced in age
  chosen_spanish: ya avanzado en edad
  alternatives_spanish:
  - habiendo ya alcanzado la vejez
  - ya llegado a la ancianidad
  lexicon: LSJ
  rationale: El giro idiomático expresa haber alcanzado la vejez; 'avanzado en edad' es una solución natural y fiel en español.
- source_word: πάσῃ τῇ κατὰ τὸν βίον ἀρετῇ κεκοσμημένος
  english_pob_choice: adorned with every virtue in life
  chosen_spanish: adornado con toda virtud en su vida
  alternatives_spanish:
  - adornado con toda virtud de conducta
  - distinguido por toda virtud en su modo de vida
  lexicon: LSJ
  rationale: Se mantiene la metáfora de estar 'adornado' y el sentido moral de ἀρετή; 'en su vida' refleja κατὰ τὸν βίον sin añadir interpretación.
- source_word: τοὺς περὶ αὐτὸν καταστείλας πρεσβυτέρους
  english_pob_choice: having quieted the elders around him
  chosen_spanish: después de haber aquietado a los ancianos que estaban a su alrededor
  alternatives_spanish:
  - tras haber calmado a los ancianos que lo rodeaban
  - habiendo aquietado a los ancianos en torno a él
  lexicon: LSJ
  rationale: καταστείλας indica traer a calma u orden antes de la oración; 'aquietado' conserva bien ese matiz y 'que estaban a su alrededor' explicita τοὺς περὶ αὐτόν.
- source_word: ἐπικαλεῖσθαι τὸν ἅγιον θεόν
  english_pob_choice: to call upon the holy God
  chosen_spanish: invocó al Dios santo
  alternatives_spanish:
  - llamó al Dios santo
  - clamó al Dios santo
  lexicon: LSJ
  rationale: ἐπικαλεῖσθαι en contexto de oración puede ser 'invocar' o 'clamar a'; 'invocó' mantiene el valor cultual y 'Dios santo' reproduce el modificador sin volverlo título fijo.
- source_word: προσηύξατο τάδε
  english_pob_choice: prayed as follows
  chosen_spanish: oró de esta manera
  alternatives_spanish:
  - oró así
  - hizo esta oración
  lexicon: LSJ
  rationale: τάδε introduce el contenido de la oración; 'oró de esta manera' anuncia adecuadamente la cita que sigue con español fluido.
theological_decisions:
- issue: ὁ θεός con el adjetivo ἅγιος
  english_pob_reading: the holy God
  chosen_spanish_reading: el Dios santo
  alternative_spanish_readings:
  - el Dios santo y apartado
  - Dios, el Santo
  rationale: El griego modifica a θεόν con ἅγιον; 'el Dios santo' mantiene la relación directa sin introducir un título distinto ni suavizar la fuerza del adjetivo.
  doctrine_reference: Primacía del texto original y preservación de la cualidad divina expresada en el griego.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión final del inglés auditado, especialmente en la sintaxis que hace sujeto a Eleazar de las acciones de invocar y orar, y en el valor participial de καταστείλας. Se evitó una traducción que reubique indebidamente la acción de orar en los ancianos.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός conforme al estándar del proyecto.
  - Se conserva 'Eleazar' como transliteración regular.
  - Se usa 'aquietado' para reproducir el matiz de calma previa a la oración.
  - La estructura general sigue el orden y la progresión del griego, con fluidez natural en español.
  - No se emplea 'Señor' para θεός, ya que aquí el texto griego dice explícitamente 'Dios santo'.
