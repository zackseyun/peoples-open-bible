    text: 'O: «desde los treinta años de edad hacia arriba». La frase hebrea señala un límite inferior de edad.'
    reason: lexical_alternative
  revision_rationale: Se ajustó «venga» a «viene» para reflejar mejor el participio sustantivado hebreo. Se cambió «la obra de cargar» por «el servicio de llevar cargas» para expresar con más claridad וַעֲבֹדַת מַשָּׂא y alinearlo con la alternativa léxica documentada en la auditoría inglesa. También se mejoró «la obra de servicio» a «la obra del servicio» para mayor naturalidad en español sin perder la estructura del original.
