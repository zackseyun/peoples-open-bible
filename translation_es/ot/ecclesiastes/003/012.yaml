    rationale: Aunque el hebreo lleva sufijo singular en בְּחַיָּיו, el POB inglés documenta una resolución distributiva plural por el antecedente «ellos». En español, «durante sus vidas» comunica mejor esa relación y evita ambigüedad.
  - severity: low
    issue: La alternativa de nota «pasarla bien» baja ligeramente el registro.
    rationale: La nota inglesa dice «to fare well» / «to enjoy themselves». En español eclesial más digno, «vivir bien» o «disfrutar de la vida» mantiene mejor el tono sin perder el sentido.
