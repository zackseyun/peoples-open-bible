lexical_decisions:
- source_word: לְ/מַטֵּה
  english_pob_choice: From the tribe of
  chosen_spanish: Para la tribu de
  alternatives_spanish:
  - De la tribu de
  - Perteneciente a la tribu de
  lexicon: HALOT
  rationale: En esta lista de representantes tribales, לְ con מַטֶּה señala asignación o pertenencia a la tribu. En español, "Para la tribu de" conserva bien ese valor relacional y el matiz de nombramiento, sin imponer una lectura demasiado estática.
- source_word: בִנְיָמִן
  english_pob_choice: Benjamin
  chosen_spanish: Benjamín
  alternatives_spanish:
  - Benyamín
  - Biniamín
  lexicon: HALOT
  rationale: Nombre propio tribal estándar en español bíblico. "Benjamín" es la forma más reconocible y fiel al uso eclesial en español.
- source_word: אֱלִידָד
  english_pob_choice: Elidad
  chosen_spanish: Elidad
  alternatives_spanish:
  - Elidád
  lexicon: HALOT
  rationale: Nombre propio transliterado según el uso establecido por el POB en inglés y adaptado a la ortografía española sin modificar el nombre.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La relación constructa entre nombres se expresa de forma natural en español con "hijo de", manteniendo el sentido genealógico directo del hebreo.
- source_word: כִּסְלֹון
  english_pob_choice: Chislon
  chosen_spanish: Quislón
  alternatives_spanish:
  - Kislón
  - Chislón
  lexicon: HALOT
  rationale: Se opta por una transliteración española que preserve la pronunciación aproximada y la correspondencia con la consonante inicial hebrea. "Quislón" evita una grafía inglesa y resulta más natural para lectores hispanohablantes.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene alta concordancia con el hebreo y no introduce notas doctrinales. La única cuestión relevante es el valor de לְ/מַטֵּה en una lista de designaciones tribales; por eso se conserva una alternativa en nota y se elige una formulación española natural que refleje asignación tribal.
  spanish_consistency_notes:
  - Se mantiene "Benjamín" como forma bíblica estable del nombre tribal.
  - Se translitera el nombre personal final como "Quislón" para adecuarlo al español y evitar una grafía inglesa innecesaria.
  - La nota al pie recoge la alternativa de traducción de לְ sin duplicar en el cuerpo la redundancia de "de" y "para".
