theological_decisions:
- issue: Treatment of the bracketed shorter ending after Mark 16:8
  chosen_reading: Exclude the bracketed material from the main translation as a later textual addition, while preserving it in a footnote as a textual variant.
  alternative_readings:
  - Include the shorter ending in the main text
  - Print both endings in the main text
  rationale: The SBLGNT presents the additional sentences in double brackets, signaling that they are not part of the main text being translated here. For an auditable translation, the verse proper should reflect the established main text, while the additional ending is preserved in a footnote for transparency.
