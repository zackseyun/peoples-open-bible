translation:
  language: es
  text: No te alegres, Israel, con exultación como los pueblos[a], porque te has prostituido lejos de tu Dios; has amado el pago de una prostituta[b] en toda era de grano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «para exultar como las naciones». La frase hebrea es condensada y puede expresarse de más de una manera natural.'
    reason: lexical_alternative
  - marker: b
    text: «El pago de una prostituta» se refiere a la paga o salario asociado con la prostitución, aquí usado metafóricamente para la ganancia idolátrica de Israel.
    reason: cultural_note
lexical_decisions:
- source_word: אַל תִּשְׂמַח
  english_pob_choice: Do not rejoice
  chosen_spanish: No te alegres
  alternatives_spanish:
  - No te regocijes
  - No te goce
  lexicon: HALOT
  rationale: אַל con imperfecto expresa prohibición. שׂמח puede ser 'alegrarse' o 'regocijarse'; 'No te alegres' suena natural en español y conserva el tono profético sin sobrerretorcer la frase.
- source_word: אֶל גִּיל כָּעַמִּים
  english_pob_choice: with exultation like the peoples
  chosen_spanish: con exultación como los pueblos
  alternatives_spanish:
  - para exultar como las naciones
  - con gozo como los pueblos
  lexicon: HALOT
  rationale: La construcción hebrea es comprimida y admite varias maneras naturales de decirla. 'Con exultación como los pueblos' conserva la fuerza intensiva de גִּיל y mantiene 'pueblos' más cerca del hebreo עַמִּים.
- source_word: זָנִיתָ
  english_pob_choice: have played the prostitute
  chosen_spanish: te has prostituido
  alternatives_spanish:
  - has cometido prostitución
  - te has prostituido como adúltero
  lexicon: HALOT
  rationale: El profeta usa la metáfora sexual de infidelidad de pacto. 'Te has prostituido' preserva esa imagen con claridad y resulta más natural en español que una glosa abstracta como 'has sido infiel'.
- source_word: מֵעַל אֱלֹהֶיךָ
  english_pob_choice: away from your God
  chosen_spanish: alejándote de tu Dios
  alternatives_spanish:
  - apartándote de tu Dios
  - alejado de tu Dios
  lexicon: HALOT
  rationale: מֵעַל indica separación/apostasia desde una relación debida. 'Alejándote de tu Dios' comunica la desviación relacional sin añadir una interpretación más amplia que el hebreo.
- source_word: אֶתְנָן
  english_pob_choice: a prostitute’s payment
  chosen_spanish: el pago de prostituta
  alternatives_spanish:
  - la paga de prostituta
  - el salario de prostituta
  - el pago de la prostituta
  lexicon: HALOT
  rationale: אֶתְנָן es el pago/hire asociado con prostitución. 'Pago de prostituta' mantiene el referente concreto y evita un eufemismo que debilite la acusación profética.
- source_word: גָּרְנוֹת דָּגָן
  english_pob_choice: threshing floor of grain
  chosen_spanish: eras de trillar de grano
  alternatives_spanish:
  - eras de grano
  - todas las eras de trilla de grano
  - cada era de trillar grano
  lexicon: HALOT
  rationale: גֹּרֶן es 'era' o 'era de trillar'. 'Eras de trillar de grano' conserva la referencia agrícola explícita de דָּגָן y evita convertirla en una generalidad.
theological_decisions:
- issue: Metáfora profética de prostitución para la apostasía
  english_pob_reading: Retain the prostitution imagery in the main text
  chosen_spanish_reading: Conservar la imagen de prostitución en el texto principal
  alternative_spanish_readings:
  - expresar solo 'has sido infiel'
  - suavizar a 'te has apartado'
  rationale: Oseas vincula deliberadamente la infidelidad de pacto con la prostitución. Mantener esa imagen preserva la carga teológica y retórica del oráculo y evita diluir la acusación.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail al evitar ampliar מֵעַל אֱלֹהֶיךָ como «volviéndote de» o «apartándote de» en una forma demasiado interpretativa; en español se prefirió una solución directa y relacional: «alejándote de tu Dios». También se respetó la decisión inglesa de conservar la metáfora de prostitución en el cuerpo principal.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para אֱלֹהִים conforme al estándar del proyecto.
  - Se usó «pueblos» para עַמִּים, con nota por la alternativa posible «naciones».
  - Se preservó el registro profético sin arcaísmos innecesarios y sin sustituir la metáfora por paráfrasis abstracta.
