revisions:
- from: Pero a los impíos[a], una ira implacable[b] les sobrevino hasta el fin; porque él conocía de antemano[c] tanto a ellos como lo que había de venir[d],
  to: Pero a los impíos[a], una ira implacable[b] les sobrevino hasta el fin mismo; porque él sabía de antemano[c] tanto a ellos como lo que estaba por venir,
  rationale: Se reforzó 'hasta el fin' a 'hasta el fin mismo' para reflejar mejor el énfasis de μέχρι τέλους y del POB inglés ('to the very end'). Se cambió 'conocía de antemano' por 'sabía de antemano' por mayor naturalidad idiomática en español. Se simplificó τὰ μέλλοντα como 'lo que estaba por venir', que conserva el registro formal sin necesitar una nota adicional; por eso se eliminó la nota [d]. Se mantuvo 'ira implacable' como opción española natural y suficientemente fiel, con nota léxica que preserva la alternativa más literal.
