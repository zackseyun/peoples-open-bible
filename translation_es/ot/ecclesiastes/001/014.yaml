    rationale: Aunque es fiel al sentido, la nominalización con infinitivo resulta más tosca de lo necesario. «Un afanarse tras el viento» o «afanarse tras el viento» conserva el registro formal y mejora la legibilidad.
  - severity: low
    issue: La nota [b] repite exactamente la misma frase que ya aparece en el texto.
    rationale: Una nota de alternativa lexical debería aportar una variante real o una explicación; si el texto se revisa a «afanarse», entonces «esforzarse» puede funcionar como alternativa útil.
  revised_spanish_text: He visto todas las obras que se hacen debajo del sol, y he aquí, todo es vanidad[a] y un afanarse tras el viento[b].
