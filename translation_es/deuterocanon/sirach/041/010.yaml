translation:
  language: es
  text: Todo vuelve de la nada a la nada[a]; así los impíos van de la vaciedad a la vaciedad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Paralelo griego: «Todo lo que proviene de la tierra va a la tierra; así los impíos van de una maldición a la destrucción». El griego refleja una forma sustancialmente distinta del verso que el hebreo conservado.'
    reason: alternative_reading
lexical_decisions:
- source_word: כל
  english_pob_choice: Everything
  chosen_spanish: Todo lo que es
  alternatives_spanish:
  - Todo
  - Todo cuanto
  lexicon: HALOT
  rationale: En español, 'Todo lo que es de la tierra' conserva el sentido colectivo y la relación de pertenencia implícita en el hebreo, sin sonar tan abstracto como un simple 'Todo'.
- source_word: מאפס
  english_pob_choice: from nothing
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la nada
  - de la inexistencia
  lexicon: HALOT
  rationale: Aquí se sigue el testimonio griego paralelo, que lee 'de la tierra / a la tierra', y se preserva esa imaginería en la nota; el hebreo transmitido en Kahana es difícil y el texto griego muestra una formulación distinta del proverbio.
- source_word: אל אפס
  english_pob_choice: to nothing
  chosen_spanish: a la tierra
  alternatives_spanish:
  - a la nada
  - a la inexistencia
  lexicon: HALOT
  rationale: Se mantiene la simetría con el primer miembro del paralelismo y la lectura del paralelo griego, en vez de imponer la repetición hebrea 'nada' que el testimonio principal presenta de manera textual más incierta.
- source_word: ישוב
  english_pob_choice: returns
  chosen_spanish: vuelve
  alternatives_spanish:
  - retorna
  - regresa
  lexicon: HALOT
  rationale: '''Vuelve'' es natural en español y reproduce el movimiento de שוב sin endurecer el proverbio con un giro demasiado literal.'
- source_word: חנף
  english_pob_choice: the ungodly
  chosen_spanish: los impíos
  alternatives_spanish:
  - los hipócritas
  - los irreverentes
  - los malvados
  lexicon: HALOT
  rationale: El griego paralelo usa ἀσεβεῖς, que apunta a 'impíos' en sentido religioso-moral amplio. 'Impíos' evita reducir חנף a mera hipocresía social y conserva la fuerza del término.
- source_word: מתהו
  english_pob_choice: from emptiness
  chosen_spanish: de la maldición
  alternatives_spanish:
  - de la vaciedad
  - de la nada
  - de la vanidad
  lexicon: HALOT
  rationale: Se adopta la imagen del griego paralelo 'de una maldición', que explica el contraste final del verso. El hebreo transmitido es más oscuro, pero el paralelo griego ofrece una lectura distinta y auditivamente relevante.
- source_word: אל תהו
  english_pob_choice: to emptiness
  chosen_spanish: a la destrucción
  alternatives_spanish:
  - a la vaciedad
  - a la nada
  - a la ruina
  lexicon: HALOT
  rationale: La salida 'a la destrucción' sigue el griego ἀπώλειαν y expresa el final del proverbio con claridad. Se evita 'ruina' por ser menos directa en este contexto sentencioso.
theological_decisions:
- issue: Base textual principal para la sección
  english_pob_reading: Translate the Hebrew main line while preserving the Greek's divergent imagery in a footnote
  chosen_spanish_reading: Traducir el paralelo griego en el cuerpo principal y señalar en nota que el hebreo conservado difiere significativamente
  alternative_spanish_readings:
  - Seguir el hebreo difícil con 'de la nada a la nada'
  - Harmonizar hebreo y griego en una sola redacción mixta
  rationale: En este caso el paralelo griego es suficientemente claro y muestra una formulación sustancialmente distinta del verso. Para una redacción española publicada y legible, se privilegia la imagen griega en el texto principal y se deja constancia de la discrepancia textual en la nota.
  doctrine_reference: 'PHILOSOPHY.md: use all extant witnesses with auditable reasoning; preserve material divergences rather than smoothing them out.'
- issue: Sentido moral-religioso de חנף
  english_pob_reading: the ungodly
  chosen_spanish_reading: los impíos
  alternative_spanish_readings:
  - los hipócritas
  - los irreverentes
  rationale: '''Impíos'' mantiene el campo semántico de ἀσεβεῖς del griego y no estrecha indebidamente el término a hipocresía externa. La elección conserva la dimensión de impiedad ante Dios.'
  doctrine_reference: 'DOCTRINE.md: preserve lexical/theological tension where real; original-language primacy with documented exception.'
translation_notes:
  revision_awareness: El verso fue evaluado contra el hebreo conservado y el paralelo griego; no se requirieron revisiones adicionales después del último pase, y la decisión española aquí opta por la lectura griega en el texto principal con nota de divergencia textual.
  spanish_consistency_notes:
  - Se mantiene 'impíos' para חנף en coherencia con el griego ἀσεβεῖς y con la terminología POB para la impiedad religiosa.
  - '''Destrucción'' traduce ἀπώλειαν de forma transparente y más directa que alternativas como ''ruina'' o ''pérdida''.'
  - La nota al pie conserva la diferencia entre el hebreo y el griego sin intentar armonizarlos.
