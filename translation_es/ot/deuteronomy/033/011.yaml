    rationale: El POB inglés usa [b] en 'those who hate him' para explicar que literalmente el hebreo dice 'Crush the loins of those who rise against him', y que 'loins' es imagen de fuerza. La nota española actual cita solo 'los que se levantan contra él', pero no reproduce adecuadamente la relación con la frase completa ni la explicación contextual.
  - severity: low
