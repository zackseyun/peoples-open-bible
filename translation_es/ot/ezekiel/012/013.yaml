base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/012/013.yaml
  text: I will spread my net over him[a], and he will be caught in my snare. Then I will bring him to Babylon, the land of the Chaldeans; yet he will not see it[b], and there he will die.
  footnotes:
  - marker: a
    text: 'Or ''my trap.'' The Hebrew uses two related hunting terms: ''my net'' and ''my snare.'''
    reason: lexical_alternative
  - marker: b
    text: The statement that he will be brought to Babylon yet not see it is often understood in light of 2 Kings 25:7 and Jeremiah 39:7; 52:11.
    reason: cross_reference
