translation:
  language: es
  text: No fijes la mirada en una virgen[a][b], no sea que quedes atrapado en las penas relacionadas con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego dice: “No mires alrededor en las calles de una ciudad, y no andes errante en sus lugares desiertos”. Los testigos hebreo y griego conservados difieren de manera sustancial aquí.'
    reason: alternative_reading
  - marker: b
    text: 'O: “no sea que quedes atrapado en las penas vinculadas con ella”. La frase hebrea es condensada y puede referirse a las consecuencias asociadas con involucrarse con ella.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּבְתוּלָה
  english_pob_choice: at a virgin
  chosen_spanish: a una virgen
  alternatives_spanish:
  - a una doncella
  - a una muchacha
  lexicon: HALOT
  rationale: El hebreo בְּתוּלָה designa con precisión a una mujer virgen, y el español 'virgen' conserva mejor esa especificidad que opciones más amplias como 'doncella' o 'muchacha'.
- source_word: אַל תִּתְבּוֹנֵן
  english_pob_choice: Do not gaze
  chosen_spanish: No mires
  alternatives_spanish:
  - No fijes la mirada
  - No observes con atención
  - No contemples
  lexicon: HALOT
  rationale: El verbo hebreo comunica una mirada atenta y sostenida. En español, 'no mires' funciona de modo natural y directo para un mandato de advertencia; el contexto ya aporta la idea de una mirada intencional, sin necesidad de volverlo más pesado.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o no vaya a ser que
  lexicon: HALOT
  rationale: La partícula introduce una advertencia de posible consecuencia. 'No sea que' preserva bien ese valor admonitorio en español formal y bíblico.
- source_word: תִּוָּקֵש
  english_pob_choice: you be caught
  chosen_spanish: quedes atrapado
  alternatives_spanish:
  - seas atrapado
  - quedes preso
  - caigas en una trampa
  lexicon: HALOT
  rationale: El pasivo sugiere quedar envuelto o capturado por las consecuencias. 'Quedes atrapado' mantiene la fuerza de cautiverio/atrapamiento sin introducir una imagen demasiado técnica o forzada.
- source_word: בַּעֲנָשֶׁיהָ
  english_pob_choice: in the penalties concerning her
  chosen_spanish: en los castigos relacionados con ella
  alternatives_spanish:
  - en los castigos de ella
  - en las penas vinculadas con ella
  - por los castigos asociados con ella
  lexicon: HALOT
  rationale: El hebreo es comprimido y permite entender una relación con las consecuencias ligadas a ella. 'Castigos relacionados con ella' conserva la ambigüedad documentada por el POB inglés y evita resolver indebidamente si la referencia es a ella como sujeto castigado o al castigo derivado del involucramiento con ella.
- source_word: μὴ περιβλέπου ἐν ῥύμαις πόλεως, καὶ ἐν ταῖς ἐρήμοις αὐτῆς μὴ πλανῶ
  english_pob_choice: used as a control against overreading the Hebrew
  chosen_spanish: preservado como testimonio paralelo divergente
  alternatives_spanish:
  - no mires alrededor en las calles de una ciudad, y no andes errante en sus lugares desiertos
  - no te pongas a mirar en las calles de la ciudad, ni vagues por sus sitios desolados
  lexicon: BDAG
  rationale: El griego ofrece una lectura paralela sustancialmente distinta respecto al hebreo conservado. En español, el texto principal sigue el hebreo, pero la existencia del paralelo griego queda registrada en la decisión textual para no ocultar la inestabilidad de los testigos.
theological_decisions:
- issue: Divergencia entre el hebreo conservado y el paralelo griego
  english_pob_reading: Translate the Hebrew main text while preserving the Greek alternative in a footnote.
  chosen_spanish_reading: Traducir el hebreo principal y señalar el paralelo griego como lectura alternativa divergente.
  alternative_spanish_readings:
  - Traducir directamente el griego de las calles de la ciudad
  - armonizar hebreo y griego en una advertencia general
  rationale: Para Sirácides, el texto hebreo conservado recibe prioridad cuando está disponible. El paralelo griego se conserva para transparencia textual, pero no se fusiona con el hebreo en una paráfrasis general.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo en Sirácides cuando se conserva; preservar honestamente la incertidumbre textual'
translation_notes:
  revision_awareness: Se siguió la última revisión inglesa que cambió 'ensnared' por 'caught' para reflejar con más directidad el pasivo hebreo. En español se evitó 'enredado' o 'atrapado en una trampa' para no cargar la imagen más allá de lo que el hebreo y la revisión reciente sostienen. También se mantuvo la prioridad del hebreo frente al paralelo griego, registrando explícitamente la divergencia textual.
  spanish_consistency_notes:
  - Se usó 'virgen' para בְּתוּלָה conforme al valor léxico principal y a la terminología POB.
  - Se evitó 'Señor' o terminología cristológica ajena al pasaje; no hay términos divinos en este versículo.
  - '''Castigos'' se eligió para עֹנֶשׁ/עֲנָשֶׁיהָ en un registro bíblico claro; ''penas'' también sería posible, pero ''castigos'' mantiene mejor el peso de consecuencia sancionadora.'
  - La puntuación con coma antes de 'no sea que' sigue el tono admonitorio del hebreo y la tradición castellana bíblica.
