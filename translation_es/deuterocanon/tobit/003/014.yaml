translation:
  language: es
  text: Tú sabes, Señor, que soy pura de todo pecado y de ningún hombre[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de un hombre»; el griego dice literalmente «de un hombre», y en contexto probablemente alude al contacto sexual o matrimonial, no solo a la asociación con varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκεις
  english_pob_choice: you know
  chosen_spanish: Tú sabes
  alternatives_spanish:
  - Tú conoces
  - Tú entiendes
  - Tú estás al tanto
  lexicon: BDAG
  rationale: El presente directo en segunda persona dirigido a Dios se expresa con naturalidad en español como «Tú sabes», conservando el sentido de conocimiento pleno y relacional.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Soberano
  lexicon: BDAG
  rationale: «Señor» es el equivalente normal y reverente de κύριος en este contexto de oración dirigida a Dios.
- source_word: καθαρά
  english_pob_choice: pure
  chosen_spanish: pura
  alternatives_spanish:
  - limpia
  - inocente
  lexicon: LSJ
  rationale: «Pura» mantiene en español la amplitud moral y sexual del adjetivo mejor que «limpia», y evita estrechar el sentido con «inocente».
- source_word: ἀπὸ πάσης ἁμαρτίας
  english_pob_choice: from every sin
  chosen_spanish: de todo pecado
  alternatives_spanish:
  - libre de todo pecado
  - sin ningún pecado
  lexicon: BDAG
  rationale: La preposición griega y el sustantivo se pueden verter de forma sobria como «de todo pecado», preservando la estructura de exención sin convertirla en una afirmación doctrinal absoluta.
- source_word: ἀνδρός
  english_pob_choice: from any man
  chosen_spanish: de cualquier hombre
  alternatives_spanish:
  - de un hombre
  - de ningún hombre
  - de un marido
  lexicon: BDAG
  rationale: El singular griego μετά ἀπό se conserva sin estrecharlo a «marido»; «de cualquier hombre» refleja bien la amplitud del inglés POB y el posible trasfondo sexual/matrimonial.
theological_decisions:
- issue: Alcance de la afirmación de pureza
  english_pob_reading: A claim of moral/sexual purity in the face of accusation, not a universal doctrinal claim of sinlessness.
  chosen_spanish_reading: Una afirmación de pureza moral y sexual frente a una acusación, no una declaración doctrinal de impecabilidad universal.
  alternative_spanish_readings:
  - Una afirmación de virginidad solamente
  - Una afirmación de ausencia total de pecado en sentido absoluto
  rationale: El griego combina «de todo pecado» con «y de cualquier hombre», lo que permite una defensa de inocencia y castidad en el marco narrativo. La traducción conserva esa tensión sin resolverla en una doctrina de sin pecado absoluto.
  doctrine_reference: Preservar la tensión teológica del pasaje sin exceder el alcance narrativo.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió «any man» por naturalidad; en español se refleja con «cualquier hombre» para mantener la amplitud semántica sin introducir una restricción innecesaria.
  spanish_consistency_notes:
  - Se usa «Señor» para Κύριε conforme al tratamiento reverente de κύριος en el proyecto.
  - Se mantiene «pura» para καθαρά por su capacidad de abarcar pureza moral y sexual.
  - «De cualquier hombre» conserva la amplitud del ajuste inglés revisado y evita interpretar prematuramente ἀνδρός como «marido».
  - No se sustituye «pecado» por «culpa» porque el griego usa ἁμαρτία, y el texto narrativo depende de esa formulación.
