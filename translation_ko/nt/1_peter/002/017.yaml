id: 1PE.2.17
reference: 1 Peter 2:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: πάντας τιμήσατε, τὴν ἀδελφότητα ἀγαπᾶτε, τὸν θεὸν φοβεῖσθε, τὸν βασιλέα τιμᾶτε.
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/017.yaml
  text: 'Honor everyone, love the brotherhood, fear God, honor the king.'
translation:
  language: ko
  text: '모든 사람을 존중하십시오. 형제자매들을 사랑하십시오. 하나님을 경외하십시오. 왕을 존중하십시오.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πάντας τιμήσατε
  english_pob_choice: Honor everyone
  chosen_korean: 모든 사람을 존중하십시오
  alternatives_korean:
  - 모든 사람을 공경하십시오
  - 모든 이를 귀히 여기십시오
  lexicon: BDAG
  rationale: τιμάω를 「존중하다」로 옮긴다. 「공경」은 윗사람 한정 어감이 강하므로 「존중」이 더 평등하다.
- source_word: τὴν ἀδελφότητα
  english_pob_choice: the brotherhood
  chosen_korean: 형제자매들
  alternatives_korean:
  - 형제 공동체
  - 형제단
  lexicon: BDAG
  rationale: ἀδελφότης는 「믿는 자들의 공동체」 (5:9과 동일). 현대 합쇼체에서는 「형제자매들」이 포괄적으로 자연스럽다.
- source_word: τὸν θεὸν φοβεῖσθε
  english_pob_choice: fear God
  chosen_korean: 하나님을 경외하십시오
  alternatives_korean:
  - 하나님을 두려워하십시오
  lexicon: BDAG
  rationale: 신적 두려움을 「경외」로 옮기되, 단순 공포가 아니라 거룩한 떨림임을 살린다.
- source_word: τὸν βασιλέα τιμᾶτε
  english_pob_choice: honor the king
  chosen_korean: 왕을 존중하십시오
  alternatives_korean:
  - 왕을 공경하십시오
  lexicon: BDAG
  rationale: 모든 사람에게 적용된 τιμάω와 동일 어휘를 왕에게도 적용하므로 「존중」으로 통일.
theological_decisions:
- issue: 하나님의 「경외」 vs. 왕의 「존중」 구별
  chosen_reading: 「경외」와 「존중」을 어휘적으로 명확히 구별
  alternative_readings:
  - 둘 다 「공경」으로 통일
  rationale: 본문은 φοβέομαι(하나님)와 τιμάω(왕)을 구별한다. 한국어 번역도 「경외」와 「존중」으로 그 구별을 보존한다. 왕에게도 「두려워하라」고 말하지 않는 본문의 절제를 살린다.
  doctrine_reference: 'DOCTRINE.md: 원어 우선; 정치 신학적 절제 보존'
