  text: אֵיכָה֙ הָיְתָ֣ה לְ/זוֹנָ֔ה קִרְיָ֖ה נֶאֱמָנָ֑ה מְלֵאֲתִ֣י מִשְׁפָּ֗ט צֶ֛דֶק יָלִ֥ין בָּ֖/הּ וְ/עַתָּ֥ה מְרַצְּחִֽים׃
base_translation:
  language: en
  yaml_path: translation/ot/isaiah/001/021.yaml
  text: How the faithful city has become a prostitute! She was full of justice[a]; righteousness lodged in her[c][b], but now murderers.
  footnotes:
  - marker: a
    text: Or 'harlot.' The Hebrew term refers to a prostitute; the image is metaphorical for the city's unfaithfulness and corruption.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice' for 'righteousness.' The Hebrew צֶדֶק overlaps semantically with justice, especially in parallel with 'justice' earlier in the verse.
    reason: lexical_alternative
  - marker: c
    text: Literally 'righteousness lodged in her'; the verb evokes spending the night or residing there.
    reason: lexical_alternative
