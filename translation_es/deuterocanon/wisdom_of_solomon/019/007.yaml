translation:
  language: es
  text: La nube que cubría el campamento fue vista, y del agua que había estado allí surgió tierra seca; del Mar Rojo[a] vino un camino sin impedimento, y del oleaje violento, una llanura herbosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mar de Juncos». El texto griego aquí lee «Mar Rojo», por lo que esa forma se conserva en el texto principal.
    reason: alternative_reading
lexical_decisions:
- source_word: σκιάζουσα
  english_pob_choice: overshadowed
  chosen_spanish: cubría
  alternatives_spanish:
  - sombreaba
  - cubría con sombra
  lexicon: LSJ
  rationale: El participio expresa la acción de poner sombra o cobertura sobre algo. «Cubría» mantiene la imagen de protección y cobertura de la nube en español natural; «sombreaba» sería más literal pero menos fluido en este contexto poético.
- source_word: παρεμβολήν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento de Israel
  lexicon: LSJ
  rationale: En el contexto del éxodo, el término se refiere al asentamiento del pueblo. «Campamento» conserva el sentido de estancia organizada y es claro en español; no se necesita una expansión interpretativa en el texto principal.
- source_word: προϋφεστῶτος ὕδατος
  english_pob_choice: the water that had stood before them
  chosen_spanish: el agua que había estado delante de ellos
  alternatives_spanish:
  - el agua que había permanecido allí
  - el agua previamente detenida
  lexicon: LSJ
  rationale: La frase participial comunica prioridad temporal y estado de quietud. «Había estado delante de ellos» conserva esa anterioridad sin forzar un calco poco natural en español.
- source_word: ξηρᾶς ἀνάδυσις γῆς
  english_pob_choice: dry land emerged
  chosen_spanish: surgió tierra seca
  alternatives_spanish:
  - emergió tierra seca
  - apareció tierra seca
  lexicon: LSJ
  rationale: El griego presenta la imagen de la tierra seca que sale a la vista. «Surgió tierra seca» reproduce el movimiento de aparición de forma compacta y poética; «emergió» también sería válido.
- source_word: ἐθεωρήθη
  english_pob_choice: was seen
  chosen_spanish: fue vista
  alternatives_spanish:
  - se vio
  - apareció
  lexicon: LSJ
  rationale: El pasivo indica observación. «Fue vista» conserva esa pasividad y el tono testimonial del griego, sin introducir una interpretación más fuerte como «apareció».
- source_word: ἐρυθρᾶς θαλάσσης
  english_pob_choice: the Red Sea
  chosen_spanish: Mar Rojo
  alternatives_spanish:
  - Mar de Juncos
  lexicon: LSJ
  rationale: El testimonio griego conserva la designación convencional «Mar Rojo». En español se mantiene «Mar Rojo» por fidelidad al texto recibido y por su reconocibilidad; la alternativa histórico-crítica no se adopta en el texto principal.
- source_word: ὁδὸς ἀνεμπόδιστος
  english_pob_choice: an unhindered road
  chosen_spanish: un camino sin impedimento
  alternatives_spanish:
  - un camino libre
  - una vía sin obstáculo
  lexicon: LSJ
  rationale: La frase destaca un trayecto libre de estorbo. «Camino sin impedimento» conserva la idea de paso abierto y suena natural en español bíblico contemporáneo.
- source_word: χλοηφόρον πεδίον
  english_pob_choice: a grassy plain
  chosen_spanish: una llanura herbosa
  alternatives_spanish:
  - un llano verde
  - una pradera
  lexicon: LSJ
  rationale: El compuesto alude a una llanura que lleva hierba o verdor. «Llanura herbosa» mantiene la imagen de fertilidad inesperada y evita suavizarla demasiado con términos más genéricos.
- source_word: κλύδωνος βιαίου
  english_pob_choice: the violent surge
  chosen_spanish: la ola violenta
  alternatives_spanish:
  - el oleaje violento
  - la marejada violenta
  lexicon: LSJ
  rationale: La expresión señala el embate impetuoso de las aguas. «Ola violenta» es una solución breve y comprensible; aunque «oleaje» o «marejada» también servirían, «ola» conserva mejor la concreción imagística.
theological_decisions:
- issue: Nombre del mar en la escena del éxodo
  english_pob_reading: the Red Sea
  chosen_spanish_reading: Mar Rojo
  alternative_spanish_readings:
  - Mar de Juncos
  rationale: El texto griego leído aquí usa ἐρυθρᾶς θαλάσσης, que en la tradición textual corresponde a «Mar Rojo». Se mantiene esa forma en el texto principal por primacía del testimonio griego; la variante «Mar de Juncos» queda como alternativa histórico-etimológica no adoptada.
  doctrine_reference: Translation philosophy §1 (primacía de la fuente original y de la lectura textual atestiguada)
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de Swete 1909 y coincide con la decisión inglesa auditada de mantener «Red Sea» por la lectura griega atestiguada. No se introdujeron cambios sustanciales respecto del análisis previo; se ajustó la sintaxis al español para lograr lectura pública natural sin perder las imágenes de cobertura, surgimiento, paso abierto y llanura herbosa.
  spanish_consistency_notes:
  - Se mantuvo «Mar Rojo» como equivalente de ἐρυθρᾶς θαλάσσης en concordancia con la lectura griega auditada.
  - Se eligió un registro bíblico moderno y digno, evitando tanto arcaísmos fuertes como paráfrasis libres.
  - «Campamento», «camino sin impedimento» y «llanura herbosa» preservan el paralelismo imagístico del verso.
  - La nota textual se ancla en «Mar Rojo» porque allí existe la variante relevante en español.
