  to: Para los hebronitas[a], Jerías fue el jefe[b] de los hebronitas, según sus generaciones por casas paternas[c]. En el cuadragésimo año del reinado de David fueron buscados, y entre ellos se hallaron hombres de valor en Jazer de Galaad.
  rationale: Se corrigió la ubicación de la nota sobre רֹאשׁ para anclarla a «jefe», se añadió la nota cultural requerida para «casas paternas» conforme al rastro auditado en inglés, y se ajustó «hombres valientes» a «hombres de valor» para preservar mejor la fuerza léxica de גִּבּוֹרֵי חַיִל. La nota sobre «fueron buscados» se eliminó porque no era necesaria para preservar una alternativa auditada en este punto y la prioridad editorial era reparar las notas mal alineadas y la omisión cultural.
