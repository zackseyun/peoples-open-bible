base_translation:
  language: en
  yaml_path: translation/ot/lamentations/002/007.yaml
  text: The Lord has rejected his altar[a]; he has abandoned his sanctuary. He has given the walls of her palaces into the hand of the enemy[c][b]. They raised a shout in the house of Yahweh as on the day of an appointed feast.
  footnotes:
  - marker: a
    text: Or 'has abhorred his sanctuary.' The Hebrew verb is stronger than the previous 'has rejected.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'into the hand of the enemy,' an idiom meaning to hand over to an enemy's power.
    reason: lexical_alternative
  - marker: c
    text: Or 'as on a feast day' or 'as on the day of an appointed festival.'
    reason: lexical_alternative
