  to: 'Medirán fuera de la ciudad: el lado este, dos mil codos; el lado sur, dos mil codos; el lado oeste[a], dos mil codos; y el lado norte, dos mil codos, con la ciudad en medio. Estos serán para ellos los terrenos de pasto[b] de las ciudades.'
  rationale: Se ajusta «fuera de la ciudad» para mayor precisión y naturalidad; se uniforman las direcciones con «este/oeste»; se corrige la sintaxis final con «Estos serán para ellos...» para reflejar la designación legal del hebreo en español idiomático; y se reubica la nota [b] al término que realmente explica.
