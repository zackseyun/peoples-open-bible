translation:
  language: es
  text: Los príncipes de Zoán han llegado a ser insensatos; los príncipes de Nof están engañados. Han extraviado a Egipto[a], ellos, que son la piedra angular de sus tribus.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Nof es el nombre hebreo de Menfis (Memphis).
    reason: alternative_reading
lexical_decisions:
- source_word: נֽוֹאֲלוּ
  english_pob_choice: have become foolish
  chosen_spanish: han llegado a ser insensatos
  alternatives_spanish:
  - han actuado neciamente
  - son insensatos
  lexicon: HALOT
  rationale: 'El hebreo en nifal expresa un resultado: llegar a ser o mostrarse necio. «Han llegado a ser insensatos» conserva el matiz de estado resultante sin volverlo solo adjetival.'
- source_word: שָׂ֣רֵי
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - oficiales
  - líderes
  lexicon: HALOT
  rationale: שַׂר denota un jefe o gobernante. «Príncipes» mantiene el tono de élite política y coincide con el registro profético.
- source_word: צֹ֔עַן
  english_pob_choice: Zoan
  chosen_spanish: Zoán
  alternatives_spanish:
  - Tanis
  lexicon: transliteration
  rationale: Nombre propio de lugar transliterado. Se conserva la forma bíblica usual en español, con acento gráfico por adaptación ortográfica.
- source_word: נִשְּׁא֖וּ
  english_pob_choice: are deceived
  chosen_spanish: están engañados
  alternatives_spanish:
  - están deludidos
  - han sido engañados
  lexicon: HALOT
  rationale: El verbo en nifal aquí se entiende como ser engañado o deludido, no como exaltado. «Están engañados» refleja bien el estado resultante y suena natural en español.
- source_word: שָׂ֣רֵי
  english_pob_choice: princes
  chosen_spanish: príncipes
  alternatives_spanish:
  - oficiales
  - líderes
  lexicon: HALOT
  rationale: Se mantiene la misma elección por consistencia con el miembro paralelo del verso.
- source_word: נֹ֑ף
  english_pob_choice: Noph
  chosen_spanish: Nof
  alternatives_spanish:
  - Memfis
  lexicon: transliteration
  rationale: Se conserva la transliteración del hebreo como forma principal. La identificación histórica con Memphis se puede consignar en nota, sin reemplazar el nombre del texto.
- source_word: הִתְע֥וּ
  english_pob_choice: have led ... astray
  chosen_spanish: han extraviado a ...
  alternatives_spanish:
  - han hecho errar a ...
  - han desviado a ...
  lexicon: HALOT
  rationale: El hifil de תעה es causativo. «Han extraviado» preserva la fuerza de causar desvío o error y permite introducir el complemento directo de manera natural.
- source_word: מִצְרַ֖יִם
  english_pob_choice: Egypt
  chosen_spanish: Egipto
  alternatives_spanish:
  - la tierra de Egipto
  lexicon: standard proper noun
  rationale: Nombre geográfico/nacional estándar en español.
- source_word: פִּנַּ֥ת
  english_pob_choice: cornerstone
  chosen_spanish: la piedra angular
  alternatives_spanish:
  - la esquina principal
  - la piedra de esquina
  lexicon: HALOT
  rationale: El sustantivo en constructo con las tribus funciona metafóricamente. «Piedra angular» conserva la imagen arquitectónica y la función de sostén principal.
- source_word: שְׁבָטֶֽי/הָ
  english_pob_choice: her tribes
  chosen_spanish: sus tribus
  alternatives_spanish:
  - las tribus de ella
  - sus clanes
  lexicon: HALOT
  rationale: El sufijo 3fs remite a Egipto. En español, «sus tribus» comunica la relación posesiva de manera natural y mantiene la ambigüedad de si se trata de tribus/clanes bajo la metáfora política.
translation_notes:
  revision_awareness: 'Se refleja el estado final del audit trail inglés: no hubo revisiones aplicadas y el consenso de revisión fue de alta concordancia, por lo que no se introducen variantes textuales adicionales ni notas de tensión doctrinal.'
  spanish_consistency_notes:
  - Se mantiene la secuencia paralela de los dos primeros hemistiquios con «príncipes» para שָׂרֵי.
  - Se preserva la metáfora arquitectónica de פִּנַּת mediante «piedra angular».
  - «Zoán» y «Nof» se transliteran para seguir el tratamiento del POB; la identificación de Nof con Menfis queda en nota.
  - «Han extraviado a Egipto» conserva el valor causativo del hifil de תעה y enlaza con la idea de engaño de los jefes.
