review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la secuencia narrativa y el sentido básico del griego: los ὑπηρέται regresan ante los principales sacerdotes y fariseos, y estos preguntan por qué no trajeron a Jesús. Sin embargo, la nota [a] está anclada al sintagma «fariseos» cuando en realidad comenta el sujeto explícito ἐκεῖνοι del segmento siguiente; además, la decisión léxica de ἐκεῖνοι como «les» no es exacta, porque ἐκεῖνοι corresponde al sujeto de «dijeron», no al pronombre dativo αὐτοῖς.'
  spanish_quality_summary: 'El español es claro, natural y eclesialmente legible. «Entonces», «oficiales», «principales sacerdotes» y «¿Por qué no lo trajeron?» funcionan bien. La reparación necesaria es de precisión editorial: mover el anclaje de la nota al verbo de habla o al tramo correspondiente, y ajustar la explicación léxica para no identificar erróneamente ἐκεῖνοι con «les».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Principales sacerdotes» para ἀρχιερεῖς y «fariseos» para Φαρισαίους concuerdan con el expediente. «Oficiales» preserva bien el valor contextual de ὑπηρέται. «Trajeron» refleja adecuadamente ἠγάγετε en este contexto de arresto.
  issues:
  - severity: medium
    issue: La nota [a] está colocada en «fariseos[a]», pero explica ἐκεῖνοι, que pertenece a la cláusula siguiente como sujeto explícito de «dijeron».
    rationale: El anclaje actual puede inducir al lector a pensar que la nota comenta «fariseos» en sí, no el demostrativo enfático griego. Debe colocarse donde corresponde el fenómeno discursivo.
  - severity: medium
    issue: La decisión léxica sobre ἐκεῖνοι identifica como elegido «les», aunque ἐκεῖνοι no corresponde al dativo αὐτοῖς sino al sujeto enfático de la acción de hablar.
    rationale: Esto no arruina el texto principal, pero sí distorsiona el análisis fuente-meta y conviene corregirlo en la revisión editorial.
  revised_spanish_text: 'Entonces los oficiales fueron a los principales sacerdotes y fariseos, y ellos[a] les dijeron: «¿Por qué no lo trajeron?»'
  revised_footnotes:
  - marker: a
    text: El griego expresa aquí un demostrativo enfático (ἐκεῖνοι), que señala a los principales sacerdotes y fariseos como los que hablan. En español, «ellos» permite conservar ese matiz de manera natural.
    reason: lexical_alternative
  - marker: b
    text: 'También puede entenderse: «¿Por qué no lo condujeron aquí?». El verbo griego puede significar «traer» o «conducir/llevar»; «traer» encaja mejor con el contexto de los oficiales enviados a arrestarlo.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige el punto principal de fidelidad editorial: el demostrativo ἐκεῖνοι debe reflejarse en la cláusula de habla, no en «fariseos», y la nota correspondiente debe anclarse allí. Añadir «ellos» mantiene un español natural y preserva mejor el énfasis explícito del griego. La nota sobre ἠγάγετε se conserva, pero al no estar anclada en el borrador revisado no se incluye en el texto final; por eso solo debe mantenerse si se decide anclarla explícitamente. Dado que aquí se requiere una matriz completa de notas coincidente con el texto, se deja únicamente la nota anclada correctamente.'
