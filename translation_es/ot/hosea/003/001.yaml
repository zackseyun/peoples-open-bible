  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: mantiene Yahvé, el doble imperativo «Ve, ama», la indefinición de «una mujer», la comparación con el amor de Yahvé por los hijos de Israel, el matiz concesivo de «aunque», y la referencia a las «tortas de pasas». También preserva adecuadamente la tensión interpretativa de אִשָּׁה y רֵעַ mediante nota.'
  spanish_quality_summary: El texto es claro y legible, pero «amada por otro y adúltera» suena algo estático frente al participio verbal hebreo וּמְנָאָפֶת y frente a la decisión auditada en inglés («and committing adultery»). En español, «que comete adulterio» o «y cometiendo adulterio» representa mejor la acción en curso. Además, la nota [a] introduce «otro esposo», que sobreespecifica más de lo permitido por la evidencia fuente y el audit trail.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> «Yahvé» correctamente; בְּנֵי יִשְׂרָאֵל -> «los hijos de Israel» bien preservado; repetición de אהב -> «ama/ama/aman» bien mantenida. La única corrección léxica importante es ajustar וּמְנָאָפֶת a una formulación verbal más fiel y matizar la nota de רֵעַ para no introducir «esposo» como alternativa destacada.'
  issues:
