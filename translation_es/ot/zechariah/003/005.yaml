    text: 'O: «Y dije». El hebreo con la conjunción puede verterse simplemente «y»; «entonces» refleja mejor el avance narrativo.'
    reason: lexical_alternative
  - marker: b
    text: «Limpio» también puede traducirse «puro», destacando la pureza ritual.
    reason: lexical_alternative
