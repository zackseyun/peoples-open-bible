base_translation:
  language: en
  yaml_path: translation/ot/judges/005/014.yaml
  text: From Ephraim those whose root was in Amalek[a]; after you, Benjamin, among your peoples. From Machir commanders came down[e][d][c][b], and from Zebulun those who wield the staff of the scribe.
  footnotes:
  - marker: a
    text: Or 'their root was against Amalek' or 'their root was in the hill-country of Amalek.' The Hebrew line is difficult and likely poetic-geographical.
    reason: alternative_reading
  - marker: b
    text: Or 'Benjamin followed you, among your clans/kinsmen.' The phrase 'among your peoples' is a close rendering of an unusual Hebrew expression.
    reason: lexical_alternative
  - marker: c
    text: '''Machir'' is the leading clan of Manasseh; some translations render the broader tribal sense as ''Manasseh.'''
    reason: cultural_note
  - marker: d
    text: Or 'lawgivers' for 'commanders.' The Hebrew term can denote rulers or those who decree.
    reason: lexical_alternative
  - marker: e
    text: Or 'those who draw with the scribe's staff' / 'those who bear the marshal's staff.' The Hebrew expression is rare and may refer to military mustering or record-keeping.
    reason: lexical_alternative
