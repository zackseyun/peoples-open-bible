translation:
  language: es
  text: y asesinos despiadados de niños, y un banquete de carne y sangre humanas, de devoradores de entrañas[a], de entre los iniciados de su compañía de orgía ritual[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «una comida de entrañas humanas y sangre»; el griego usa un compuesto que sugiere comer las partes internas o vísceras.'
    reason: lexical_alternative
  - marker: b
