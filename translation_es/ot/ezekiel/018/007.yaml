translation:
  language: es
  text: No oprime a nadie, sino que devuelve la prenda del deudor[a]; no comete robo; da su pan[b] al hambriento y cubre[c] al desnudo con una prenda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «devuelve la prenda tomada como garantía» o «devuelve el colateral al deudor».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «su pan»; es decir, su alimento.'
    reason: lexical_alternative
  - marker: c
    text: O «viste al desnudo».
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹנֶה
  english_pob_choice: oppress
  chosen_spanish: oprime
  alternatives_spanish:
  - maltrata
  - extorsiona
  lexicon: HALOT
  rationale: La forma hiphil expresa trato injusto o explotación; «oprime» conserva la fuerza ética y social del término mejor que opciones más generales o más específicas.
- source_word: אִישׁ
  english_pob_choice: anyone
  chosen_spanish: a nadie
  alternatives_spanish:
  - a un hombre
  - a otra persona
  lexicon: HALOT
  rationale: Aunque el hebreo es formalmente singular masculino, aquí funciona de manera genérica. En español, «a nadie» expresa con naturalidad la prohibición universal sin introducir un sujeto masculino innecesario.
- source_word: חֲבֹלָתוֹ חוֹב יָשִׁיב
  english_pob_choice: restores the debtor’s pledge
  chosen_spanish: devuelve la prenda del deudor
  alternatives_spanish:
  - restaura la prenda del deudor
  - devuelve el colateral tomado por una deuda
  - devuelve la prenda tomada como garantía
  lexicon: HALOT
  rationale: La expresión alude a devolver un objeto retenido como garantía de deuda. «Prenda» preserva el valor técnico; «del deudor» aclara la relación aludida por el contexto de חוֹב sin añadir sobreinterpretación.
- source_word: גְּזֵלָה לֹא יִגְזֹל
  english_pob_choice: he does not commit robbery
  chosen_spanish: no comete robo
  alternatives_spanish:
  - no roba
  - no se apodera por robo
  lexicon: HALOT
  rationale: La construcción sustantivo+verbo intensifica la idea de robo/plunder. «Comete robo» mantiene la fuerza jurídica y ética mejor que un simple «roba», que puede sonar más amplio o menos formal.
- source_word: לַחְמוֹ
  english_pob_choice: his bread
  chosen_spanish: su pan
  alternatives_spanish:
  - su alimento
  - su comida
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «pan», que puede funcionar representativamente como alimento. En español es claro y sobrio; por eso no se neutraliza a «alimento» en el texto principal.
- source_word: לְרָעֵב
  english_pob_choice: to the hungry
  chosen_spanish: al hambriento
  alternatives_spanish:
  - al que tiene hambre
  - a la persona hambrienta
  lexicon: HALOT
  rationale: El adjetivo sustantivado se traduce de modo natural y directo. «Al hambriento» preserva el foco ético sobre la necesidad concreta.
- source_word: עֵירֹם
  english_pob_choice: the naked
  chosen_spanish: al desnudo
  alternatives_spanish:
  - al desnudo sin ropa
  - al que está desnudo
  lexicon: HALOT
  rationale: En español bíblico contemporáneo, «desnudo» comunica la falta de vestido de forma directa y digna. Es una opción natural frente a perífrasis más pesadas.
- source_word: יְכַסֶּה בָּגֶד
  english_pob_choice: covers the naked with a garment
  chosen_spanish: cubre al desnudo con un vestido
  alternatives_spanish:
  - viste al desnudo con un vestido
  - cubre al desnudo con ropa
  lexicon: HALOT
  rationale: El hebreo dice literalmente «cubre» con «vestido/ropa». «Vestido» conserva la concreción del objeto; se evita reemplazarlo por «ropa» para mantener la correspondencia formal con בָּגֶד.
theological_decisions:
- issue: Sujeto genérico masculino y alcance universal de la prohibición
  english_pob_reading: He does not oppress anyone, ...
  chosen_spanish_reading: No oprime a nadie, ...
  alternative_spanish_readings:
  - Un hombre no oprime a nadie, ...
  - No oprime a ninguna persona, ...
  rationale: El hebreo presenta un sujeto singular masculino típico de una descripción sapiencial/jurídica. En español, una formulación impersonal como «No oprime a nadie» mantiene la universalidad de la norma sin forzar un masculino genérico innecesario.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: El audit trail inglés fue de alta concordancia y no registró revisiones aplicadas; esta propuesta sigue la lectura estable sin introducir cambios textuales mayores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología del proyecto cuando el versículo no contiene el tetragrámaton.
  - Se conserva la imagen de «pan» y «vestido» en el texto principal para seguir de cerca el hebreo.
  - «Desnudo» y «al hambriento» se emplean como sustantivos/adjetivos sustantivados naturales en español bíblico contemporáneo.
  - Se evita «siervo» porque no corresponde al léxico del versículo ni al campo semántico documentado en el contexto.
