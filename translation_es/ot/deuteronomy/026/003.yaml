translation:
  language: es
  text: 'Y entrarás al sacerdote[a] que esté en funciones en aquellos días, y le dirás: «Hoy declaro[b] a Yahvé tu Dios que he entrado en la tierra que Yahvé juró a nuestros padres[c] darnos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «al sacerdote que estará en aquellos días», es decir, el sacerdote que entonces esté sirviendo o en funciones.'
    reason: lexical_alternative
  - marker: b
    text: 'O «Hoy he declarado». Es probable que la forma hebrea funcione de manera performativa: el hablante hace la declaración al pronunciarla.'
    reason: lexical_alternative
  - marker: c
    text: O «nuestros antepasados». Se conserva «nuestros padres» porque el hebreo es masculino y probablemente se refiere de manera específica a los padres patriarcales.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָאתָ
  english_pob_choice: And you shall go
  chosen_spanish: irás
  alternatives_spanish:
  - vendrás
  - te acercarás
  lexicon: HALOT
  rationale: El hebreo expresa movimiento hacia el sacerdote en una instrucción; en español, ‘irás’ comunica naturalmente la acción directiva sin perder el valor de desplazamiento.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  - el presbítero
  lexicon: HALOT
  rationale: En contexto cultual, ‘sacerdote’ es el equivalente claro y fiel de כֹּהֵן en español bíblico contemporáneo.
- source_word: אֲשֶׁר יִהְיֶה בַּיָּמִים הָהֵם
  english_pob_choice: who is in office in those days
  chosen_spanish: que esté en funciones en aquellos días
  alternatives_spanish:
  - que estará en aquellos días
  - que esté en oficio en aquellos días
  lexicon: HALOT
  rationale: La idea no es solo existencia temporal, sino el sacerdote entonces desempeñando su cargo. ‘En funciones’ conserva esa fuerza sin sonar demasiado técnica.
- source_word: וְאָמַרְתָּ אֵלָיו
  english_pob_choice: and say to him
  chosen_spanish: y le dirás
  alternatives_spanish:
  - y le dirás a él
  - y le hablarás
  lexicon: HALOT
  rationale: La introducción de discurso directo queda natural en español con ‘le dirás’; evita una literalidad pesada.
- source_word: הִגַּדְתִּי הַיּוֹם
  english_pob_choice: Today I declare
  chosen_spanish: Hoy declaro
  alternatives_spanish:
  - Hoy he declarado
  - Declaro hoy
  lexicon: HALOT
  rationale: 'Se conserva el valor performativo del perfecto hebreo: el acto ocurre al pronunciarse. En español, ‘Hoy declaro’ lo expresa con claridad.'
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a YHWH
  - al Señor
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para el Nombre divino: ‘Yahvé’ en el texto principal.'
- source_word: אֱלֹהֶיךָ
  english_pob_choice: your God
  chosen_spanish: tu Dios
  alternatives_spanish:
  - tu Dios, el Señor
  - tu Dios, Yahvé
  lexicon: HALOT
  rationale: Se mantiene el sufijo de segunda persona singular, como en el hebreo, dirigido al sacerdote en la fórmula confesional.
- source_word: כִּי בָאתִי
  english_pob_choice: that I have come
  chosen_spanish: que he entrado
  alternatives_spanish:
  - que he venido
  - que llegué
  lexicon: HALOT
  rationale: ‘Entrar en la tierra’ refleja mejor el hebreo con אֶל הָאָרֶץ que un simple ‘venir’; el perfecto español mantiene el estado de llegada realizado.
- source_word: אֶל הָאָרֶץ
  english_pob_choice: into the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - a la tierra
  - dentro de la tierra
  lexicon: HALOT
  rationale: En español, con ‘entrado’ la preposición ‘en’ resulta natural y preserva la idea de acceso a la tierra prometida.
- source_word: אֲשֶׁר נִשְׁבַּע יְהוָה
  english_pob_choice: that Yahweh swore
  chosen_spanish: que Yahvé juró
  alternatives_spanish:
  - que Yahvé prometió bajo juramento
  - que el Señor juró
  lexicon: HALOT
  rationale: ‘Juró’ conserva el lenguaje de juramento del pacto, sin suavizarlo a una mera promesa.
- source_word: לַאֲבֹתֵינוּ
  english_pob_choice: to our fathers
  chosen_spanish: a nuestros padres
  alternatives_spanish:
  - a nuestros antepasados
  lexicon: HALOT
  rationale: Se mantiene la referencia masculina plural del hebreo, que en Deuteronomio apunta de modo concreto a los padres patriarcales.
- source_word: לָתֶת לָנוּ
  english_pob_choice: to give to us
  chosen_spanish: darnos
  alternatives_spanish:
  - para darnos
  - para darla a nosotros
  lexicon: HALOT
  rationale: 'El infinitivo con complemento se vuelve naturalmente a un infinitivo español sustantivado: ‘dar[nos]’, sin perder la finalidad del juramento.'
theological_decisions:
- issue: Nombre divino יְהוָה / YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - YHWH
  - el Señor
  rationale: El texto hebreo usa directamente el Tetragrama. El estándar del proyecto en español es ‘Yahvé’, preservando el Nombre propio del pacto en vez de ocultarlo con una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor performativo de הִגַּדְתִּי הַיּוֹם
  english_pob_reading: Today I declare
  chosen_spanish_reading: Hoy declaro
  alternative_spanish_readings:
  - Hoy he declarado
  - Declaro hoy
  rationale: La forma hebrea funciona como acto declarativo pronunciado en el momento. ‘Hoy declaro’ respeta esa fuerza performativa mejor que un pasado simple.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando todos los marcadores de nota dentro del texto español. También se mantuvo la lectura performativa de «Hoy declaro» y el Nombre divino «Yahvé» conforme al auditorio POB.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de forma consistente para יְהוָה.
  - Se prefirió ‘sacerdote’ frente a opciones más técnicas para conservar naturalidad y fidelidad.
  - Se mantuvo el masculino plural ‘nuestros padres’ según el hebreo y el criterio del proyecto.
  - La frase ‘en funciones’ refleja la idea de un sacerdote en cargo/oficio sin sobreinterpretar.
