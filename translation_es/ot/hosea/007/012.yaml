revisions:
- from: Como ellos van[a], yo tenderé mi red sobre ellos; como las aves de los cielos, los haré descender[b]. Los corregiré según el informe de su asamblea.
  to: Mientras van, yo tenderé mi red sobre ellos; como las aves de los cielos, los haré descender. Los corregiré[a] según el informe de su asamblea[b].
  rationale: Se corrigió la ubicación de la nota para alinearla con el audit trail inglés y con el hebreo אַיְסִרֵם. También se reemplazó 'Como ellos van' por 'Mientras van' para lograr un español más natural sin perder el matiz temporal/progresivo. Se mantuvo la ambigüedad de la cláusula final con una nota adecuada.
