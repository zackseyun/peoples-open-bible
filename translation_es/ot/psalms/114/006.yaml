translation:
  language: es
  text: Oh montañas, ¿por qué brincan[a] como carneros? Oh colinas, ¿como corderos del rebaño[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo también puede traducirse «danzan» o «saltan»; aquí se elige «brincan» para mantener la imagen de animales que se mueven con viveza.
    reason: lexical_alternative
  - marker: b
    text: Hebreo literalmente, «como hijos del rebaño», un modismo para corderos u ovejas jóvenes.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרִים
  english_pob_choice: mountains
  chosen_spanish: Montañas
  alternatives_spanish:
  - montes
  - cerros
  lexicon: HALOT
  rationale: El sustantivo denota montañas; en español, «montañas» es la equivalencia más directa y clara para el paralelo con «colinas».
- source_word: תִּרְקְדוּ
  english_pob_choice: do you skip
  chosen_spanish: brincan
  alternatives_spanish:
  - saltan
  - danzan
  - levantan brincando
  lexicon: HALOT
  rationale: El verbo רָקַד puede expresar saltar, brincar o danzar. En este cuadro poético de movimiento vivaz, «brincan» comunica bien el impulso rápido y encaja con la imaginería animal.
- source_word: כְאֵילִים
  english_pob_choice: like rams
  chosen_spanish: como carneros
  alternatives_spanish:
  - como machos de oveja
  - como venados
  lexicon: HALOT
  rationale: אֵילִים se entiende de forma más natural aquí como carneros. «Carneros» conserva la fuerza de la imagen y corresponde al paralelismo con el rebaño del segundo hemistiquio.
- source_word: גְּבָעוֹת
  english_pob_choice: hills
  chosen_spanish: Colinas
  alternatives_spanish:
  - montículos
  - cerros
  lexicon: HALOT
  rationale: El sustantivo significa colinas; se mantiene el vocativo poético con mayúscula inicial por ser una alocución directa.
- source_word: כִּבְנֵי צֹאן
  english_pob_choice: like lambs of the flock
  chosen_spanish: como corderos del rebaño
  alternatives_spanish:
  - como hijos del rebaño
  - como ovejas jóvenes
  lexicon: HALOT
  rationale: La expresión hebrea dice literalmente «como hijos del rebaño», pero en español «corderos del rebaño» transmite el sentido idiomático de crías de oveja sin perder el vínculo explícito con el rebaño.
translation_notes:
  revision_awareness: El texto base y el control de revisión muestran alta concordancia y no registran cambios sustantivos; la redacción española sigue de cerca el valor léxico del hebreo con adaptación idiomática mínima.
  spanish_consistency_notes:
  - Se conserva la alocución poética directa con vocativos iniciales.
  - Se mantiene la metáfora animal en ambos hemistiquios para reflejar el paralelismo hebreo.
  - Se evita introducir términos eclesiásticos no presentes en el original.
