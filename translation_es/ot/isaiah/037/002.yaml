translation:
  language: es
  text: Entonces envió a Eliaquim[b], que estaba sobre la casa, y a Sebna, el escriba, y a los ancianos de los sacerdotes, cubiertos de cilicio[a], a Isaías hijo de Amoz, el profeta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vestidos de cilicio» o «llevando cilicio». El hebreo los presenta en estado de duelo o humillación.
    reason: lexical_alternative
  - marker: b
    text: «Que estaba sobre la casa» es un título oficial para quien estaba a cargo de la casa real.
    reason: cultural_note
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: Then he sent
  chosen_spanish: Entonces envió
  alternatives_spanish:
  - Y envió
  - Así envió
  lexicon: HALOT
  rationale: El wayyiqtol avanza la narración; «Entonces» conserva la secuencia narrativa natural en español sin añadir interpretación.
- source_word: אֶלְיָקִים
  english_pob_choice: Eliakim
  chosen_spanish: Eliaquim
  alternatives_spanish:
  - Eliacim
  - Eliakim
  lexicon: Transliteración bíblica tradicional en español
  rationale: Se adapta el nombre propio a la forma usual en español bíblico, manteniendo la identidad del personaje sin alterar el referente.
- source_word: אֲשֶׁר עַל הַבַּיִת
  english_pob_choice: who was over the household
  chosen_spanish: que estaba sobre la casa
  alternatives_spanish:
  - que estaba sobre el palacio
  - que estaba a cargo de la casa
  lexicon: HALOT
  rationale: La expresión idiomática se conserva de modo transparente. «Casa» refleja el hebreo literal y mantiene la función oficial sin forzar una equivalencia más interpretativa como «palacio».
- source_word: שֶׁבְנָא
  english_pob_choice: Shebna
  chosen_spanish: Sebna
  alternatives_spanish:
  - Shebna
  - Sebná
  lexicon: Transliteración bíblica tradicional en español
  rationale: Nombre propio adaptado a la forma castellana usual, sin perder la referencia al funcionario nombrado en el texto.
- source_word: הַסֹּפֵר
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el secretario
  - el cronista
  lexicon: HALOT
  rationale: «Escriba» es la equivalencia directa y suficientemente amplia para el cargo oficial, sin precisar más de lo que el hebreo garantiza.
- source_word: זִקְנֵי הַכֹּהֲנִים
  english_pob_choice: the elders of the priests
  chosen_spanish: los ancianos de los sacerdotes
  alternatives_spanish:
  - los mayores de los sacerdotes
  - los ancianos entre los sacerdotes
  lexicon: HALOT
  rationale: Se preserva la estructura posesiva del hebreo. La formulación deja abierta la precisión institucional, como en el texto fuente.
- source_word: מִתְכַּסִּים בַּשַּׂקִּים
  english_pob_choice: covered with sackcloth
  chosen_spanish: cubiertos de cilicio
  alternatives_spanish:
  - vestidos de cilicio
  - envueltos en cilicio
  lexicon: HALOT
  rationale: «Cilicio» es el equivalente bíblico natural en español para sackcloth en un contexto de duelo/humillación. «Cubiertos de» refleja bien el estado resultante de la forma verbal sin fijar una imagen demasiado concreta.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: Preposición direccional simple; «a» es la forma natural y fiel en español.
- source_word: יְשַׁעְיָהוּ בֶן אָמ֖וֹץ
  english_pob_choice: Isaiah son of Amoz
  chosen_spanish: Isaías hijo de Amoz
  alternatives_spanish:
  - Isaías, hijo de Amoz
  lexicon: Transliteración bíblica tradicional en español
  rationale: Nombre y patronímico se expresan de manera directa. Se conserva la relación filial sin añadir artículos ni giros explicativos.
- source_word: הַנָּבִיא
  english_pob_choice: the prophet
  chosen_spanish: el profeta
  lexicon: HALOT
  rationale: Título directo y reconocido; se mantiene como apposición final en español igual que en la estructura fuente.
translation_notes:
  revision_awareness: El inglés POB mantiene la estructura narrativa simple, traduce עַל הַבַּיִת de modo funcional como cargo oficial, y conserva la ambigüedad lexical de מִתְכַּסִּים בַּשַּׂקִּים con una nota. En español se siguió la misma línea, pero se optó por «cilicio» como término bíblico más natural para sackcloth; por eso se añadió nota de alternativa para preservar la tensión lexical. No se introdujeron cambios textuales respecto del acuerdo alto del pasaje.
  spanish_consistency_notes:
  - 'Se mantuvo el nombre propio con forma española tradicional: Eliaquim, Sebna, Isaías.'
  - «Casa» reproduce el hebreo literal y permite conservar la nota funcional del cargo sin reemplazarlo por «palacio» en el texto principal.
  - «Cilicio» comunica el valor bíblico de duelo/humillación y evita un calco menos idiomático; la nota preserva las alternativas inglesas.
  - La puntuación y los nombres siguen convención española, con comas para la aposición y el título final.
