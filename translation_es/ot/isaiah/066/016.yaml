review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal del hebreo: causal inicial («Porque»), los dos medios instrumentales («por fuego» / «por su espada»), el idiomatismo «toda carne», y el uso de «Yahvé» para יְהוָה conforme al proyecto. Sin embargo, falla en un punto semántico importante al traducir חַלְלֵי יְהוָה como «los heridos de Yahvé». En contexto y según la evidencia auditada en inglés, חַלְלֵי designa los muertos/abatidos, no meramente heridos. Esa elección atenúa indebidamente el juicio mortal del versículo.'
  spanish_quality_summary: El español es mayormente claro y digno. «Porque por fuego Yahvé ejecutará juicio» es entendible, aunque algo rígido; aun así, es aceptable por su cercanía al original y al POB inglés. La principal deficiencia de calidad es «los heridos de Yahvé», que en español suena menos natural y además cambia el sentido. «Los muertos por Yahvé» o «los que Yahvé mate» serían más claros; la primera mantiene mejor la concisión y el tono solemne.
  glossary_alignment: Buena alineación con la terminología del proyecto en «Yahvé» y en la preservación de «toda carne». No hay problema doctrinal relevante en el resto. Sí hay desalineación con la decisión léxica auditada para חַלְלֵי יְהוָה («those slain by Yahweh»), ya que «heridos» no corresponde a «slain».
  issues:
  - severity: high
    issue: «los heridos de Yahvé» no traduce fielmente חַלְלֵי יְהוָה
    rationale: חַלְלֵי en este contexto de juicio por fuego y espada se refiere a personas muertas/abatidas, no simplemente lesionadas. La versión inglesa auditada lo fijó como «those slain by Yahweh». «Heridos» reduce la fuerza letal del texto y altera el sentido.
  - severity: medium
    issue: La nota [a] invierte la relación entre la alternativa compacta y la lectura más explícita
    rationale: La nota inglesa dice que el verbo puede traducirse más compactamente como «will judge» o más explícitamente como «will enter into judgment». En el borrador español, la alternativa presentada («juzgará con fuego y con su espada») no refleja bien «against all flesh», y además luego llama «ejecutará juicio» a la opción explícita, cuando esa es la principal del texto, no la expansión más explícita.
  - severity: low
    issue: «por fuego» es aceptable, pero algo menos idiomático que «con fuego» en español
    rationale: No es un error; mantiene bien el instrumental hebreo y el paralelismo con «por su espada». Se puede conservar por fidelidad formal.
  revised_spanish_text: Porque por fuego Yahvé ejecutará juicio[a], y por su espada, contra toda carne[b]; y serán muchos los muertos por Yahvé.
  revised_footnotes:
  - marker: a
    text: 'O: «Yahvé juzgará contra toda carne con fuego y con su espada». El verbo hebreo también puede traducirse más compactamente como «juzgará» o más explícitamente como «entrará en juicio».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «toda carne», un idiomatismo profético para toda la humanidad en su condición creatural y mortal.'
    reason: lexical_alternative
  revision_rationale: 'Se requiere una reparación puntual pero importante: cambiar «los heridos de Yahvé» por «los muertos por Yahvé» para reflejar fielmente חַלְלֵי יְהוָה y la decisión auditada en inglés («those slain by Yahweh»). También se ajusta la nota [a] para representar correctamente las alternativas documentadas para נִשְׁפָּט y para no perder «contra toda carne» en la formulación alternativa.'
