translation:
  language: es
  text: Los que siembran con lágrimas cosecharán con gritos de alegría[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Gritos de alegría» traduce el matiz de רִנָּה como clamor jubiloso; también puede entenderse como «cantos de alegría».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַזֹּרְעִים
  english_pob_choice: Those who sow
  chosen_spanish: Los que siembran
  alternatives_spanish:
  - Quienes siembran
  - Los sembradores
  lexicon: HALOT
  rationale: El participio con artículo funciona como sustantivo plural de clase; en español, «Los que siembran» preserva bien ese valor genérico y suena natural y digno.
- source_word: בְּדִמְעָה
  english_pob_choice: in tears
  chosen_spanish: con lágrimas
  alternatives_spanish:
  - en lágrimas
  - llorando
  lexicon: HALOT
  rationale: La preposición ב con el sustantivo singular puede expresar circunstancia o manera. «Con lágrimas» conserva el sentido instrumental/circunstancial del hebreo y resulta idiomático en español.
- source_word: בְּרִנָּה
  english_pob_choice: with joyful shouting
  chosen_spanish: con gritos de alegría
  alternatives_spanish:
  - con clamores de alegría
  - con cantos de alegría
  lexicon: HALOT
  rationale: רִנָּה designa un clamor jubiloso, no solo una emoción interior. «Gritos de alegría» conserva el carácter audible y exuberante que el texto sugiere; «cantos de alegría» sería posible, pero estrecha más el alcance.
- source_word: יִקְצֹרוּ
  english_pob_choice: will reap
  chosen_spanish: cosecharán
  alternatives_spanish:
  - segarán
  - recogerán
  lexicon: HALOT
  rationale: El imperfecto expresa resultado futuro. «Cosecharán» mantiene el paralelo agrícola con «siembran» y comunica con claridad el valor aspectual.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; por eso esta propuesta sigue de cerca el sentido auditado del texto hebreo y la elección inglesa aprobada, ajustándola a un español natural.
  spanish_consistency_notes:
  - Se mantiene el paralelismo poético sembrar/cosechar.
  - Se conserva el contraste entre lágrimas y alegría sin suavizarlo.
  - No se reemplaza el campo léxico agrícola por una paráfrasis devocional.
