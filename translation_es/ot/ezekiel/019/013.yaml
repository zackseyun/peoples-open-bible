review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del hebreo: transición temporal («Y ahora»), participio pasivo («está plantada»), y la descripción de un lugar seco. Conserva correctamente la nota alternativa para שְׁתוּלָה. Sin embargo, «desierto» estrecha algo el valor de בַמִּדְבָּר frente a la preferencia auditada por «wilderness», y «en tierra reseca y sedienta» pierde levemente la fuerza de artículo indefinido presente en «in a land» y la coordinación explícita del hebreo.'
  spanish_quality_summary: 'El español es claro y natural, pero puede ajustarse para reflejar mejor tanto la imaginería bíblica como el rastro auditado: «desierto» puede sonar más específico que «yermo», y «reseca» añade una intensificación no necesaria. «En una tierra seca y sedienta» suena digno, natural y más cercano a la estructura fuente.'
  glossary_alignment: 'No hay términos del glosario mayor en juego aquí. La decisión principal es lexical: conviene alinear mejor בַמִּדְבָּר con una opción española más amplia que «desierto», y mantener שְׁתוּלָה como «plantada» con nota alternativa «trasplantada».'
  issues:
  - severity: medium
    issue: «desierto» para בַמִּדְבָּר
    rationale: El expediente inglés prefirió «wilderness» para no reducir מִדְבָּר a desierto arenoso. En español, «yermo» refleja mejor un paraje desolado sin esa restricción.
  - severity: low
    issue: «reseca» intensifica más de lo necesario צִיָּה
    rationale: El hebreo se satisface con «seca»/«árida». «Reseca» no es incorrecto, pero añade color interpretativo no requerido.
  - severity: low
    issue: «en tierra...» omite el matiz indefinido de בְּאֶרֶץ
    rationale: «En una tierra seca y sedienta» representa más directamente la construcción hebrea y el audit trail inglés.
  revised_spanish_text: Y ahora está plantada[a] en el yermo, en una tierra seca y sedienta.
  revised_footnotes:
  - marker: a
    text: O «trasplantada en el yermo». El participio hebreo puede entenderse en el contexto como si implicara traslado y replantación, aunque la forma misma expresa más directamente que está plantada.
    reason: lexical_alternative
