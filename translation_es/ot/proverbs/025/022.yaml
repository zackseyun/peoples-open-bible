translation:
  language: es
  text: porque tú amontonas brasas encendidas sobre su cabeza[a], y Yahvé te recompensará[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «recoges/rastrillas brasas sobre su cabeza». El hebreo conserva el modismo; los intérpretes discrepan sobre si alude a avergonzar a un enemigo para inducirlo al arrepentimiento o a aumentar su juicio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Yahvé te retribuirá». El verbo hebreo puede significar dar recompensa o retribución; aquí el contexto permite un sentido favorable para la persona recta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - porque
  lexicon: HALOT
  rationale: En español, «porque» expresa con naturalidad la relación explicativa que introduce la razón del dicho precedente. Conserva el enlace causal sin volverlo más interpretativo de lo que permite el hebreo.
- source_word: גֶחָלִים
  english_pob_choice: burning coals
  chosen_spanish: brasas encendidas
  alternatives_spanish:
  - brasas
  - carbones encendidos
  lexicon: HALOT
  rationale: «Brasas encendidas» comunica que se trata de carbones vivos o ardientes, manteniendo la imagen concreta sin añadir explicación doctrinal.
- source_word: חֹתֶה
  english_pob_choice: heap
  chosen_spanish: amontonas
  alternatives_spanish:
  - recoges
  - juntas
  - rastrillas
  lexicon: HALOT
  rationale: El verbo hebreo puede implicar recoger o acarrear brasas; «amontonas» conserva el efecto visual de acumularlas sobre la cabeza y es idiomático en español.
- source_word: עַל רֹאשׁוֹ
  english_pob_choice: on his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - en su cabeza
  - encima de su cabeza
  lexicon: HALOT
  rationale: La preposición hebrea se preserva de forma directa. «Sobre su cabeza» mantiene la metáfora intacta y su fuerza idiomática.
- source_word: וַיהוָה
  english_pob_choice: the LORD
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé» en el texto principal, en lugar de un sustituto tipográfico.'
- source_word: יְשַׁלֶּם לָךְ
  english_pob_choice: will repay you
  chosen_spanish: te recompensará
  alternatives_spanish:
  - te pagará
  - te retribuirá
  - te recompensará
  lexicon: HALOT
  rationale: El verbo admite la idea de retribuir o recompensar. «Te recompensará» conserva la ambigüedad favorable del contexto, sin forzarla a «pagar» en sentido estrecho.
theological_decisions:
- issue: Sentido del gesto de poner brasas sobre la cabeza
  english_pob_reading: Preserve the metaphor in the main text without resolving whether it signifies shame leading to repentance, intensified judgment, or both.
  chosen_spanish_reading: Preservar la metáfora sin decidir si apunta a avergonzar al enemigo para llevarlo al arrepentimiento, o a incrementar su juicio, o a ambas cosas.
  alternative_spanish_readings:
  - es una imagen de humillación que puede conducir al arrepentimiento
  - es una imagen de juicio agravado sobre el enemigo
  rationale: El hebreo presenta la imagen sin explicarla. La traducción española mantiene esa tensión interpretativa y evita cerrar el sentido con una paráfrasis doctrinal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior incorporando ambos marcadores de nota en el texto principal: [a] en la imagen de las brasas y [b] en la cláusula final sobre la recompensa de Yahvé.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme al criterio del proyecto para el nombre divino.
  - Se eligió un español sobrio y bíblico, evitando el calco mecánico pero sin resolver la ambigüedad del proverbio.
  - «Brasas encendidas» conserva el valor imagético de גֶחָלִים y no lo reduce a un mero elemento doméstico.
  - «Te recompensará» deja abierta la posibilidad de retribución favorable, acorde con el hebreo y con la nota auditada en inglés.
