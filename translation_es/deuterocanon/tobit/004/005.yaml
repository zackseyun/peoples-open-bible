revisions:
- from: Todos los días, niño, recuerda a Yahvé, nuestro Dios. No desees transgredir sus mandamientos. Practica la justicia[a] todos los días de tu vida, y no camines por los caminos de la injusticia[a].
  to: Todos los días[a], hijo, recuerda a Yahvé nuestro Dios. No desees transgredir sus mandamientos. Practica la rectitud todos los días de tu vida, y no camines por los caminos de la injusticia.
  rationale: Se ajusta el texto principal para seguir más fielmente la decisión léxica documentada del POB sobre δικαιοσύνη / ἀδικία, preservando «justicia / injusticia» como alternativa en nota. También se mejora la naturalidad y dignidad del vocativo en español con «hijo». Se conserva «Yahvé» conforme a la pauta del proyecto y el resto de la estructura del griego.
