  rationale: The source text has κύριος, and the doctrine defaults specify 'Lord' for κύριος rather than 'LORD.' Since this is an NT quotation mediated through the Greek text, 'the Lord' is the prescribed rendering, while the allusion to the divine speech remains clear from context.
