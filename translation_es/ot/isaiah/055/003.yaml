revisions:
- from: 'Inclinad vuestro oído y venid a mí; oíd[a], y vivirá vuestra alma; y haré con vosotros un pacto eterno: las misericordias fieles prometidas a David.'
  to: 'Inclinen su oído y vengan a mí; oigan, y vivirá su alma; y haré con ustedes una alianza eterna: el amor fiel de pacto[a] prometido a David.'
  rationale: 'Se ajusta el registro al español neutral más ampliamente legible (''inclinen'', ''vengan'', ''oigan'', ''ustedes''). Se cambia ''pacto'' por ''alianza'' por naturalidad bíblica en español. La cláusula final se revisa a ''el amor fiel de pacto prometido a David'' para reflejar mejor la decisión léxica y teológica documentada en el POB inglés: no meras ''misericordias'' abstractas, sino el חסד de contexto pactal vinculado a David. También se mueve la nota al punto donde realmente existe la principal alternativa de traducción.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:57:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea principal: imperativos de invitación/escucha, resultado de vida para el alma, y promesa de pacto eterno vinculada con las חסדי David. Sin embargo, la cláusula final en español (''las misericordias fieles prometidas a David'') preserva demasiado la tradición léxica de ''misericordias'' y pierde la explicación pactal documentada en el audit trail inglés, que opta por ''covenant love'' y por ''promised to David''.'
  spanish_quality_summary: El español es claro y digno, pero mezcla registro peninsular ('inclinad', 'venid', 'oíd', 'vosotros') con una meta de español neutral latinoamericano. Además, 'misericordias fieles' suena algo opaco en español actual y no comunica con suficiente claridad el valor de חסד en contexto de pacto. 'Pacto eterno' es aceptable, pero 'alianza eterna' suele sonar más natural y bíblico en español general.
  glossary_alignment: No hay conflictos con términos mayores del glosario (no aparece Yahvé/Mesías/etc.). Sí conviene alinear mejor בְּרִית con 'alianza' en español bíblico general, y חסד con una solución que exprese amor/fidelidad de pacto, no solo 'misericordias'.
  issues:
  - severity: medium
    issue: Registro pronominal no neutral latinoamericano
    rationale: El uso de 'inclinad/vuestra/venid/oíd/vosotros' es inteligible, pero no encaja bien con la pauta de español neutral latinoamericano/broadly church-readable. Una forma con 'ustedes' o imperativos no voseantes mejora la adecuación del proyecto.
  - severity: high
    issue: La frase 'misericordias fieles' comunica de forma insuficiente el valor pactal de חסדי
    rationale: El audit trail inglés documenta deliberadamente 'covenant love promised to David' como mejor explicación contextual. 'Misericordias fieles' conserva una tradición posible, pero en español moderno resulta ambigua y menos fiel al razonamiento léxico-teológico adoptado.
  - severity: low
    issue: Falta reflejar en la nota la alternativa preservada por el inglés para la cláusula final
    rationale: La nota actual está anclada en 'oíd', pero el inglés preserva la principal variación léxica en la frase de חסדי דוד. En español conviene trasladar esa nota allí, donde está la verdadera tensión de traducción.
  revised_spanish_text: 'Inclinen su oído y vengan a mí; oigan, y vivirá su alma; y haré con ustedes una alianza eterna: el amor fiel de pacto[a] prometido a David.'
  revised_footnotes:
