    reason: lexical_alternative
  - marker: b
    text: '''Actividad'' traduce הָעִנְיָן en el sentido de ocupación o quehacer humano; también puede entenderse como ''ocupación'' o, más ampliamente, ''asunto''.'
    reason: lexical_alternative
  - marker: c
    text: 'La frase preserva la imagen hebrea, literalmente: ''sus ojos no ven sueño''. Una formulación más idiomática sería: ''no duerme ni de día ni de noche'' o ''no logra dormir de día ni de noche''.'
    reason: lexical_alternative
  revision_rationale: 'Se corrige la cláusula final para que el sujeto y el objeto coincidan con el hebreo y con la auditoría inglesa: los ojos son quienes ''no ven'' el sueño. También se ajusta הָעִנְיָן a ''actividad'', que refleja mejor el uso contextual en Eclesiastés y el razonamiento léxico documentado. Las notas se actualizan para corresponder exactamente al texto revisado.'
