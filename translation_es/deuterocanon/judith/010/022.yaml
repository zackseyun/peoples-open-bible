    rationale: El griego αὐτῷ es dativo singular, 'a él'. El borrador cambia el referente a plural sin base textual.
  - severity: medium
    issue: La nota [a] está anclada en la frase equivocada
    rationale: La nota explica una alternativa para λαμπάδες ('lámparas/antorchas'), pero el marcador aparece tras 'ella'. Debe colocarse junto a 'lámparas'.
