translation:
  language: es
  text: 'En el primer año del rey Ciro[a], el rey Ciro promulgó un decreto: Respecto a la casa de Dios en Jerusalén, que la casa sea reedificada, el lugar donde ofrecen sacrificios, y que sus cimientos[b] sean colocados. Su altura será de sesenta codos, y su anchura de sesenta codos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el primer año de Ciro, rey [de Persia]». El arameo nombra a Ciro con el título real; el complemento territorial no está explícito en el texto.'
    reason: source_note
  - marker: b
    text: 'O: «y que sus cimientos sean retenidos/levantados». La expresión aramea es difícil; en este contexto de construcción, «sean colocados» interpreta el verbo en sentido de poner o fijar los cimientos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׂם טְעֵם
  english_pob_choice: issued a decree
  chosen_spanish: promulgó un decreto
  alternatives_spanish:
  - emitió un decreto
  - emitió una orden
  lexicon: HALOT
  rationale: El arameo expresa el acto administrativo de dictar/establecer una disposición oficial. "Promulgó un decreto" conserva el carácter formal y gubernamental del acto, con español natural y auditable frente al idiomático original.
- source_word: בֵּית אֱלָהָא
  english_pob_choice: the house of God
  chosen_spanish: la casa de Dios
  alternatives_spanish:
  - el templo de Dios
  lexicon: HALOT
  rationale: Se mantiene la literalidad de "casa" para reflejar el sustantivo del original y el paralelismo interno con בַּיְתָא más adelante. "Templo" aclararía el referente, pero suaviza la repetición de la imagen original.
- source_word: יִתְבְּנֵא
  english_pob_choice: let the house be rebuilt
  chosen_spanish: que la casa sea reedificada
  alternatives_spanish:
  - que la casa sea construida
  - la casa será reedificada
  lexicon: HALOT
  rationale: El contexto del decreto da fuerza jussiva/ordenativa al imperfecto. "Sea reedificada" preserva esa fuerza y comunica restauración de una casa ya destruida, sin apartarse del verbo básico "construir".
- source_word: אֲתַר דִּי דָבְחִין דִּבְחִין
  english_pob_choice: the place where they offer sacrifices
  chosen_spanish: el lugar donde ofrecen sacrificios
  alternatives_spanish:
  - el lugar para ofrecer sacrificios
  - el lugar donde se sacrifican sacrificios
  lexicon: HALOT
  rationale: El hebreo/arameo usa una construcción cognada difícil; en español conviene expresar con naturalidad la función cultual del lugar. "Donde ofrecen sacrificios" conserva la referencia al acto sacrificial sin forzar una calca.
- source_word: וְאֻשּׁוֹהִי מְסוֹבְלִין
  english_pob_choice: and let its foundations be laid
  chosen_spanish: y que sus fundamentos sean asentados
  alternatives_spanish:
  - y que sus fundamentos sean puestos
  - y que sus fundamentos sean levantados
  lexicon: HALOT
  rationale: La frase es difícil y admite varias soluciones. El inglés POB opta por una lectura de construcción; en español "asentados" conserva la idea arquitectónica de fijar/establecer firmemente los cimientos, sin cerrar indebidamente la ambigüedad textual.
- source_word: רוּמֵהּ
  english_pob_choice: Its height
  chosen_spanish: Su altura
  alternatives_spanish:
  - Su elevación
  lexicon: HALOT
  rationale: '"Altura" es el término arquitectónico directo en español y preserva el valor dimensional del sustantivo.'
- source_word: אַמִּין שִׁתִּין
  english_pob_choice: sixty cubits
  chosen_spanish: sesenta codos
  alternatives_spanish:
  - sesenta codos de altura
  lexicon: HALOT
  rationale: Se conserva la unidad antigua "codos" para mantener el dato histórico y la medida original, sin convertirla a unidades modernas.
- source_word: פְּתָיֵהּ
  english_pob_choice: its width
  chosen_spanish: su anchura
  alternatives_spanish:
  - su ancho
  - su amplitud
  lexicon: HALOT
  rationale: '"Anchura" corresponde bien al sustantivo arquitectónico y permite conservar el paralelismo con "altura". En español bíblico es claro y formal.'
translation_notes:
  revision_awareness: 'El español sigue de cerca el arameo y el trazado del inglés POB, manteniendo la secuencia: datación, decreto real, objeto del decreto, mandato de reconstrucción, localización cultual y medidas arquitectónicas. Se preserva la dificultad de וְאֻשּׁוֹהִי מְסוֹבְלִין mediante una nota alternativa en vez de resolverla de forma excesivamente cerrada.'
  spanish_consistency_notes:
  - Se mantiene «casa de Dios» y luego «la casa» para reflejar la repetición del original.
  - Se conserva «Ciro» como nombre propio sin transliteración adicional.
  - Se usa «codos» como unidad antigua consistente con el registro bíblico.
  - La puntuación separa claramente el decreto y las especificaciones de construcción, siguiendo el flujo del arameo y del POB inglés.
