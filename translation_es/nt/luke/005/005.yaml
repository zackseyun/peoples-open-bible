- from: 'Y respondiendo Simón, dijo: «Maestro, hemos trabajado toda la noche y no hemos capturado nada[a]; pero por tu palabra echaré las redes[b]».'
  to: 'Y Simón respondió[a]: «Maestro, hemos trabajado duro toda la noche y no hemos pescado nada; pero por tu palabra[b] echaré las redes».'
