theological_decisions:
- issue: Moral designation עַוָּל versus Greek ἁμαρτωλός
  chosen_reading: a sinner
  alternative_readings:
  - a wrongdoer
  - an unjust man
  rationale: The Hebrew and Greek differ slightly in nuance, but both describe the wicked in contrast to the righteous. 'A sinner' preserves the broad moral category and aligns with the Greek parallel without overstating a technical theological claim.
  doctrine_reference: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition
- issue: Force of the second colon
  chosen_reading: the longing of the righteous will never be frustrated
  alternative_readings:
  - the desire of the righteous will not cease
  - the patience of the godly will not be delayed
  rationale: The Hebrew wording points to the righteous person's desire/longing, while the Greek reads 'the patience/endurance of the godly' and says it will not be delayed. Since Hebrew is the primary witness here, the main text follows the Hebrew; the Greek-based alternative is preserved in a footnote because it reflects a meaningful variant in sense.
  doctrine_reference: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it
