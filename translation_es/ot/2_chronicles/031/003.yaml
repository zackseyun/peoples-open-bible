translation:
  language: es
  text: 'La porción[a] del rey, de sus propios bienes, era para los holocaustos: los holocaustos de la mañana y de la tarde, y los holocaustos para los sábados, las lunas nuevas y las fiestas señaladas, como está escrito en la Ley de Yahvé.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la asignación del rey' o 'la parte del rey'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמְנָת הַמֶּלֶךְ
  english_pob_choice: The king’s portion
  chosen_spanish: la porción del rey
  alternatives_spanish:
  - la asignación del rey
  - la parte del rey
  lexicon: HALOT
  rationale: מְנָה denota una porción asignada o cuota. 'Porción' comunica bien la idea de un reparto designado y mantiene la relación posesiva con el rey.
- source_word: מִן רְכוּשׁוֹ
  english_pob_choice: from his own possessions
  chosen_spanish: tomada de sus propias posesiones
  alternatives_spanish:
  - de sus bienes
  - de su propiedad
  lexicon: HALOT
  rationale: רְכוּשׁ abarca posesiones, bienes o propiedad. 'Sus propias posesiones' expresa que el recurso provenía del rey mismo, y 'tomada de' refleja el origen marcado por מִן.
- source_word: לָעֹלוֹת
  english_pob_choice: for the burnt offerings
  chosen_spanish: para los holocaustos
  alternatives_spanish:
  - para las ofrendas quemadas
  - para los sacrificios enteros
  lexicon: HALOT
  rationale: עֹלָה es la ofrenda totalmente quemada. 'Holocaustos' es un equivalente tradicional y claro en español bíblico para ese sacrificio, sin perder el valor técnico del término.
- source_word: לְעֹלוֹת הַבֹּקֶר וְהָעֶרֶב
  english_pob_choice: for the burnt offerings of the morning and the evening
  chosen_spanish: los holocaustos de la mañana y de la tarde
  alternatives_spanish:
  - los holocaustos matutinos y vespertinos
  - los holocaustos de mañana y tarde
  lexicon: HALOT
  rationale: El hebreo repite עֹלוֹת y especifica su ocasión con 'la mañana y la tarde'. En español, 'de la mañana y de la tarde' conserva la estructura y fluye con naturalidad.
- source_word: וְהָעֹלוֹת לַשַּׁבָּתוֹת וְלֶחֳדָשִׁים וְלַמֹּעֲדִים
  english_pob_choice: and the burnt offerings for the Sabbaths, the new moons, and the appointed feasts
  chosen_spanish: y los holocaustos para los sábados, las lunas nuevas y las fiestas señaladas
  alternatives_spanish:
  - y los holocaustos para los sábados, las nuevas lunas y los tiempos señalados
  - y los holocaustos para los sábados, los novilunios y las festividades señaladas
  lexicon: HALOT
  rationale: שַׁבָּתוֹת en este calendario cúltico se traduce naturalmente como 'sábados' o 'sábados/descansos'; חֳדָשִׁים alude aquí a observancias de luna nueva, y מוֹעֲדִים a tiempos festivos señalados. 'Fiestas señaladas' conserva el sentido cultual sin volverlo demasiado interpretativo.
- source_word: כַּכָּתוּב
  english_pob_choice: as it is written
  chosen_spanish: conforme a lo que está escrito
  alternatives_spanish:
  - como está escrito
  - según está escrito
  lexicon: HALOT
  rationale: La fórmula introduce conformidad con una prescripción previa. 'Conforme a lo que está escrito' es idiomática en español y mantiene el valor normativo.
- source_word: בְּתוֹרַת יְהוָה
  english_pob_choice: in the Law of Yahweh
  chosen_spanish: en la Ley de Yahvé
  alternatives_spanish:
  - en la Torá de Yahvé
  - en la instrucción de Yahvé
  lexicon: HALOT
  rationale: תּוֹרָה en este contexto es ley/instrucción normativa, y el proyecto usa 'Yahvé' para el Tetragrámaton. 'Ley de Yahvé' es natural y fiel en español bíblico.
theological_decisions:
- issue: Renderización de יְהוָה en texto bíblico
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El criterio del proyecto pide 'Yahvé' como forma principal en español para el Nombre divino, manteniendo la transparencia frente al hebreo y evitando la sustitución por una máscara litúrgica.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido cultual de מוֹעֲדִים
  english_pob_reading: appointed feasts
  chosen_spanish_reading: fiestas señaladas
  alternative_spanish_readings:
  - tiempos señalados
  - festividades señaladas
  rationale: '''Fiestas señaladas'' conserva el carácter de citas sagradas del calendario de culto sin reducirlo a mera celebración civil o estacional.'
  doctrine_reference: Uso cultual de מועדים en calendarios bíblicos
- issue: Sentido de חֳדָשִׁים
  english_pob_reading: new moons
  chosen_spanish_reading: lunas nuevas
  alternative_spanish_readings:
  - novilunios
  - nuevas lunas
  rationale: En el contexto del culto israelita, חֳדָשִׁים no significa simplemente 'meses', sino observancias de luna nueva. 'Lunas nuevas' es claro y comprensible para lectores contemporáneos.
  doctrine_reference: Calendario cúltico israelita
translation_notes:
  revision_awareness: Se corrigió el problema anterior eliminando todo aparato de notas no anclado en el texto. La redacción española conserva la enumeración cultual del hebreo y evita la repetición innecesaria de 'para' en la cláusula explicativa, siguiendo el ajuste ya reconocido en la auditoría inglesa.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma uniforme para יְהוָה.
  - '''Holocaustos'' se mantiene para עֹלוֹת en coherencia con el valor técnico del sacrificio totalmente quemado.'
  - '''Lunas nuevas'' expresa la observancia cultual de חֳדָשִׁים sin añadir explicación al texto principal.'
  - La frase final 'conforme a lo que está escrito' conserva la fórmula normativa sin sobrecargarla.
