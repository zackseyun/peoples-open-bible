base_translation:
  language: en
  yaml_path: translation/ot/proverbs/011/003.yaml
  text: The integrity of the upright guides them[b][a], but the crookedness of the treacherous destroys them.
  footnotes:
  - marker: a
    text: Or 'perversity' instead of 'crookedness' for סֶלֶף; the Hebrew image is of moral twisting set against the 'upright.'
    reason: lexical_alternative
  - marker: b
    text: The final clause could also be rendered 'the perversity of the treacherous ruins them' or more literally 'is their destruction.'
    reason: lexical_alternative
