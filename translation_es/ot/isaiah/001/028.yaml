translation:
  language: es
  text: Pero rebeldes y pecadores serán quebrantados juntos[a][b], y los que abandonan a Yahvé llegarán a su fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la destrucción de rebeldes y pecadores juntos»; el sustantivo hebreo שֶׁבֶר también puede expresarse de manera más nominal.
    reason: lexical_alternative
  - marker: b
    text: O «perecerán» o «serán consumidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֶׁבֶר
  english_pob_choice: will be broken
  chosen_spanish: quebranto
  alternatives_spanish:
  - serán quebrados
  - destrucción
  - ruina
  - quebrantamiento
  lexicon: HALOT
  rationale: El hebreo שֶׁבֶר es un sustantivo con sentido de rompimiento, fractura o ruina. En español, un sustantivo como «quebranto» conserva mejor la forma nominal del original que una paráfrasis verbal, y mantiene la fuerza concreta del juicio. Se evita convertirlo en una explicación más libre como «destrucción» sin necesidad textual.
- source_word: פֹּשְׁעִים
  english_pob_choice: rebels
  chosen_spanish: rebeldes
  alternatives_spanish:
  - transgresores
  - rebeldes de pacto
  - los que se rebelan
  lexicon: HALOT
  rationale: פֹּשְׁעִים designa a quienes se levantan en rebelión o ruptura deliberada. «Rebeldes» es la equivalencia española más natural y enérgica, y preserva la idea de oposición activa. «Transgresores» es posible, pero reduce el matiz de insubordinación que el inglés POB quiso retener.
- source_word: חַטָּאִים
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - culpables
  - ofensores
  lexicon: HALOT
  rationale: חַטָּאִים se refiere a los caracterizados por el pecado. «Pecadores» es el equivalente directo y claro en español, y mantiene la distinción entre rebelión deliberada y condición de pecado.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - juntos
  - a la vez
  - en conjunto
  lexicon: HALOT
  rationale: יַחְדָּו expresa simultaneidad o destino compartido. «Juntamente» suena más solemne y bíblico en español que «juntos», y conserva la idea de un mismo desenlace para ambos grupos.
- source_word: עֹזְבֵי יְהוָה
  english_pob_choice: those who forsake Yahweh
  chosen_spanish: los que abandonan a Yahvé
  alternatives_spanish:
  - los que dejan a Yahvé
  - los que se apartan de Yahvé
  - los que forsaken a Yahvé
  lexicon: HALOT
  rationale: El participio de עזב tiene el sentido de abandonar o dejar atrás. «Abandonan» comunica bien esa ruptura relacional y de pacto. Se conserva «Yahvé» conforme a la norma del proyecto para el nombre divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: Doctrinal default POB; transliteration of the Tetragrammaton
  rationale: El texto hebreo contiene el Tetragrámaton directamente. Conforme al criterio del proyecto, se vierte «Yahvé» y no una sustitución titulada como «el SEÑOR», para preservar el nombre propio divino en el texto español.
- source_word: יִכְלֽוּ
  english_pob_choice: will come to an end
  chosen_spanish: serán consumidos
  alternatives_spanish:
  - llegarán a su fin
  - perecerán
  - se acabarán
  lexicon: HALOT
  rationale: כלה puede significar terminar, acabarse, consumirse o llegar a su fin. Aquí el contexto de juicio permite una traducción fuerte y natural como «serán consumidos». Aunque el inglés POB optó por una formulación más amplia, en español la imagen de consumición encaja bien con el paralelismo y con el peso judicial del verso.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio del pacto en vez de ocultarlo tras un título. Esto sigue la decisión doctrinal del POB de transliterar el Tetragrámaton y mantiene la transparencia frente al texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La revisión auditada indicó que no había cambios necesarios; la presente propuesta mantiene ese acuerdo de alto nivel y conserva las principales decisiones del POB: sustantivo para שֶׁבֶר, pares semánticos rebeldes/pecadores, y transliteración del nombre divino.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico y sobrio, sin calco excesivo del inglés.
  - «Yahvé» se usa de forma consistente para el Tetragrámaton.
  - Se preserva la tensión léxica de שֶׁבֶר con una opción nominal y una nota alternativa.
  - «Rebeldes» y «pecadores» distinguen bien dos campos semánticos relacionados pero no idénticos.
  - La sintaxis española sigue el paralelismo hebreo sin añadir elementos interpretativos innecesarios.
