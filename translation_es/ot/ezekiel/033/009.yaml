translation:
  language: es
  text: Pero si adviertes al impío para que se aparte de su camino, y él no se aparta de su camino, morirá en su iniquidad[a]; pero tú habrás librado tu alma[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «morirá por su iniquidad». El hebreo también puede entenderse en sentido causal: su muerte está ligada a su propia culpa.'
    reason: alternative_reading
  - marker: b
    text: O «habrás librado tu vida». Aquí «alma» traduce el hebreo néfesh en el sentido de la vida o la persona misma, no necesariamente del alma inmaterial.
    reason: lexical_alternative
lexical_decisions:
- source_word: הִזְהַרְתָּ
  english_pob_choice: warn
  chosen_spanish: amonestas
  alternatives_spanish:
  - adviertes
  - das aviso a
  lexicon: HALOT
  rationale: El hifil de זהר expresa la acción de advertir o amonestar. «Amonestas» conserva la fuerza exhortativa y suena natural en español bíblico moderno; «adviertes» también es posible, pero puede sonar menos directo en el contexto profético.
- source_word: רָשָׁע
  english_pob_choice: wicked man
  chosen_spanish: el impío
  alternatives_spanish:
  - el malvado
  - el hombre malvado
  lexicon: HALOT
  rationale: El término hebreo funciona aquí como sustantivo para una persona moralmente culpable. «El impío» preserva esa carga ética y es una equivalencia tradicional y clara en español.
- source_word: מִדַּרְכּוֹ ... לָשׁוּב מִמֶּנָּה
  english_pob_choice: to turn from his way
  chosen_spanish: para que se aparte de su camino
  alternatives_spanish:
  - para volverse de su camino
  - para apartarse de él
  lexicon: HALOT
  rationale: «Camino» mantiene la metáfora ética del hebreo. «Se aparte de su camino» expresa de modo natural la idea de abandonar su conducta; se evita reemplazar la imagen por una paráfrasis abstracta.
- source_word: וְלֹא שָׁב מִדַּרְכּוֹ
  english_pob_choice: and he does not turn from his way
  chosen_spanish: y él no se aparta de su camino
  alternatives_spanish:
  - y no se aparta de él
  - y no vuelve de su camino
  lexicon: HALOT
  rationale: La repetición de «su camino» reproduce la reiteración hebrea y mantiene la metáfora moral explícita. «Se aparta» cubre bien el valor de שׁוּב en este contexto.
- source_word: בַּעֲוֺנוֹ
  english_pob_choice: in his iniquity
  chosen_spanish: por su iniquidad
  alternatives_spanish:
  - en su iniquidad
  - a causa de su iniquidad
  - por su culpa
  lexicon: HALOT
  rationale: La preposición בְּ admite aquí un matiz causal o circunstancial. «Por su iniquidad» comunica con naturalidad en español que la muerte le sobreviene ligada a su culpa, sin perder la conexión con el hebreo.
- source_word: הִצַּלְתָּ
  english_pob_choice: delivered
  chosen_spanish: habrás librado
  alternatives_spanish:
  - habrás salvado
  - habrás rescatado
  lexicon: HALOT
  rationale: נצל en hifil significa librar, rescatar o salvar. «Habrás librado» es preciso y evita cargar el verbo con una connotación soteriológica más amplia que la del deber del atalaya.
- source_word: נַפְשְׁךָ
  english_pob_choice: your soul
  chosen_spanish: tu vida
  alternatives_spanish:
  - tu alma
  - a ti mismo
  lexicon: HALOT
  rationale: Aquí נֶפֶשׁ se refiere a la vida o persona, no necesariamente al alma en sentido metafísico posterior. «Tu vida» es la forma más transparente para el lector español y preserva la decisión lexical del hebreo.
- source_word: כִּי
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - porque
  lexicon: HALOT
  rationale: En esta construcción condicional, כִּי introduce la prótasis con sentido de «si». El español requiere una estructura clara; el matiz adversativo inicial queda expresado por «Pero» según el flujo del discurso.
- source_word: וְאַתָּה ... וְאַתָּה
  english_pob_choice: But if you ... but you
  chosen_spanish: Pero si tú ... pero tú
  alternatives_spanish:
  - Y tú ... y tú
  - así que tú ... pero tú
  lexicon: HALOT
  rationale: La repetición del pronombre es enfática. «Pero si tú» y «pero tú» conservan el contraste con el destino del impío y la responsabilidad del mensajero.
theological_decisions:
- issue: Sentido de נֶפֶשׁ al cierre del versículo
  english_pob_reading: physical life/accountability preserved rather than 'soul' in a later metaphysical sense
  chosen_spanish_reading: vida preservada y no «alma» en sentido metafísico posterior
  alternative_spanish_readings:
  - tu alma has salvado
  - tu ser has librado
  rationale: El contexto trata de la responsabilidad del centinela y de quedar libre de culpa si advierte al impío. «Tu vida» comunica mejor el sentido de נַפְשְׁךָ sin introducir una antropología posterior que el texto no exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Responsabilidad moral en «morirá por su iniquidad»
  english_pob_reading: the wicked man's death is tied to his own iniquity, while the watchman is cleared if he warned him
  chosen_spanish_reading: la muerte del impío queda ligada a su propia iniquidad, mientras el atalaya queda libre si lo advirtió
  alternative_spanish_readings:
  - morirá a causa de su iniquidad
  - morirá por su culpa
  rationale: '«Por su iniquidad» conserva el vínculo textual entre pecado y muerte sin eliminar la tensión del pasaje: el impío es responsable de su destino, y el mensajero cumple su deber al advertir.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa que ajustó נַפְשְׁךָ a «your soul», pero en español se mantiene «tu vida» porque el uso bíblico de נֶפֶשׁ en este contexto apunta a la vida/persona y esa equivalencia resulta más clara y fiel al efecto del hebreo. Se preserva también la tensión causal de בַּעֲוֺנוֹ con una nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma estándar del nombre divino en el proyecto, aunque este versículo no lo contiene.
  - Se mantiene «impío» para רָשָׁע y «camino» para דֶּרֶךְ para conservar la metáfora ética recurrente.
  - «Librado tu vida» sigue el valor de נצל y evita una ampliación doctrinal.
  - La puntuación reproduce la estructura condicional y contrastiva del hebreo con claridad en español.
