    reason: lexical_alternative
  - marker: b
    text: Or 'did not listen to' or 'did not heed.'
    reason: lexical_alternative
  - marker: c
    text: '''Testimonies'' refers to God''s covenantal witness and solemn charges; the clause may also be rendered, ''which you testified against them with.'''
    reason: lexical_alternative
