translation:
  language: es
  text: 'Entonces la esposa de Sansón lloró delante de él y dijo[a]: «Solo me odias; no me amas. Has planteado el acertijo a los hijos de mi pueblo, pero a mí no me lo has dicho». Y él le respondió: «Mira, a mi padre y a mi madre no se lo he dicho; ¿y a ti te lo voy a decir?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «a los hijos de mi pueblo». El hebreo es masculino y probablemente se refiere aquí a los varones de su pueblo en esta escena.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּבְךְּ ... עָלָיו
  english_pob_choice: wept before him
  chosen_spanish: lloró delante de él
  alternatives_spanish:
  - lloró ante él
  - lloró sobre él
  - lo llenó de lágrimas
  lexicon: HALOT
  rationale: בכה se traduce de forma directa como ‘llorar’. Con עַל + persona, el sentido aquí es de llanto en su presencia y sobre él como presión emocional. ‘Delante de él’ conserva la relación personal sin forzar un calco poco natural en español.
- source_word: אֵשֶׁת שִׁמְשׁוֹן
  english_pob_choice: Samson’s wife
  chosen_spanish: la esposa de Sansón
  alternatives_spanish:
  - la mujer de Sansón
  - la esposa de Sansón
  lexicon: HALOT
  rationale: La construcción de estado constructo indica relación matrimonial. ‘Esposa’ es clara y digna en español moderno, y conserva la precisión relacional del hebreo.
- source_word: רַק
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - únicamente
  - nada más
  - solo que
  lexicon: HALOT
  rationale: Raq intensifica la acusación; ‘solo’ expresa bien la restricción y su tono enfático sin añadir matiz interpretativo.
- source_word: שְׂנֵאתַנִי ... וְלֹא אֲהַבְתָּנִי
  english_pob_choice: you only hate me; you do not love me
  chosen_spanish: me odias; no me amas
  alternatives_spanish:
  - me odias; no me quieres
  - me aborreces; no me amas
  lexicon: HALOT
  rationale: Se conservan directamente los verbos ‘odiar’ y ‘amar’, porque el contraste retórico es central en la escena. El español omite ‘solo’ en la segunda cola por economía natural, pero la acusación restrictiva ya quedó expresada en la primera.
- source_word: הַחִידָה
  english_pob_choice: the riddle
  chosen_spanish: el enigma
  alternatives_spanish:
  - la adivinanza
  - el acertijo
  lexicon: HALOT
  rationale: חִידָה puede ser ‘acertijo’ o ‘enigma’. ‘Enigma’ mantiene el carácter retador del texto y evita trivializar la prueba con un vocablo demasiado lúdico; en español bíblico contemporáneo es perfectamente inteligible.
- source_word: חַדְתָּ
  english_pob_choice: have posed
  chosen_spanish: has planteado
  alternatives_spanish:
  - has propuesto
  - has presentado
  - has formulado
  lexicon: HALOT
  rationale: El verbo expresa poner o proponer un acertijo. ‘Plantear’ es natural en español y conserva la iniciativa del hablante al presentar el enigma.
- source_word: לִבְנֵי עַמִּי
  english_pob_choice: to the sons of my people
  chosen_spanish: a los hijos de mi pueblo
  alternatives_spanish:
  - a los hombres de mi pueblo
  - a la gente de mi pueblo
  - a los hijos de mi pueblo
  lexicon: HALOT
  rationale: Se conserva la forma masculina del hebreo con ‘hijos’, siguiendo la decisión auditable de no aplanar el género del original. En este contexto alude probablemente a los varones de su gente.
- source_word: וְלִי לֹא הִגַּדְתָּה
  english_pob_choice: but you have not told me
  chosen_spanish: pero a mí no me lo has dicho
  alternatives_spanish:
  - pero no me lo has contado
  - pero a mí no me lo has revelado
  - y a mí no me lo has dicho
  lexicon: HALOT
  rationale: נגד en piel significa ‘decir, declarar, hacer saber’. ‘Decirlo’ reproduce con sencillez la acusación y mantiene el objeto implícito del enigma mediante el pronombre ‘lo’.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - He aquí
  - Miren bien
  lexicon: HALOT
  rationale: הִנֵּה introduce énfasis discursivo. ‘Mira’ es directo, natural y conserva el gesto apelativo del hebreo sin arcaísmo.
- source_word: לְאָבִי וּלְאִמִּי לֹא הִגַּדְתִּי
  english_pob_choice: I have not told my father or my mother
  chosen_spanish: a mi padre y a mi madre no se lo he dicho
  alternatives_spanish:
  - a mi padre ni a mi madre no se lo he dicho
  - no se lo he dicho a mi padre ni a mi madre
  - a mi padre o a mi madre no se lo he dicho
  lexicon: HALOT
  rationale: El hebreo nombra a ambos progenitores explícitamente. En español, la coordinación ‘y’ conserva ese paralelismo; el dativo enfático ‘a mi padre y a mi madre’ mantiene el orden y el énfasis del original.
- source_word: וְלָךְ אַגִּיד
  english_pob_choice: so should I tell you?
  chosen_spanish: ¿y a ti te lo voy a decir?
  alternatives_spanish:
  - ¿y te lo voy a decir?
  - ¿acaso te lo diré?
  - ¿he de decírtelo?
  lexicon: HALOT
  rationale: La forma verbal es una simple imperfecta, pero en contexto funciona como pregunta retórica. ‘¿Y a ti te lo voy a decir?’ reproduce la ironía implícita sin agregar una glosa interpretativa demasiado explícita.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del auditorio inglés, que prefirió ‘before him’ para וַתֵּבְךְּ ... עָלָיו. En español se ha reflejado como ‘delante de él’, manteniendo el valor preposicional y la naturalidad discursiva. También se preserva la secuencia retórica: llanto, acusación afectiva, referencia al enigma y respuesta defensiva con pregunta final.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene ‘Sansón’ para el nombre propio y ‘esposa’ para אֵשֶׁת, conforme al registro narrativo.
  - ‘Enigma’ se elige aquí por el carácter desafiante del acertijo; la nota aclara la alternativa ‘hijos de mi pueblo’ por el masculino hebreo.
  - Se conserva el paralelismo del hebreo sin sobrerreformularlo en estilo homilético.
  - La puntuación refleja diálogo directo con comillas españolas y mantiene el tono narrativo bíblico moderno.
