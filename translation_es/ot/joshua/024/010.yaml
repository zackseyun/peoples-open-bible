translation:
  language: es
  text: Pero yo no quise escuchar a Balaam[a], y él ciertamente los bendijo; así los libré de su mano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «y de veras los bendijo». El hebreo usa una construcción enfática («bendecir, bendijo»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבִיתִי
  english_pob_choice: I was not willing
  chosen_spanish: yo no quise
  alternatives_spanish:
  - yo no estuve dispuesto
  - yo no consentí
  - yo no quise escuchar
  lexicon: HALOT
  rationale: El verbo expresa voluntad/consentimiento más que capacidad. En español, «no quise» transmite con naturalidad la negativa volitiva en la primera persona divina. Se evitó «no pude» porque introduciría incapacidad, y «no estuve dispuesto» suena más pesado sin añadir precisión real.
- source_word: לִשְׁמֹעַ לְבִלְעָם
  english_pob_choice: to listen to Balaam
  chosen_spanish: escuchar a Balaam
  alternatives_spanish:
  - oír a Balaam
  - hacer caso a Balaam
  - prestar oído a Balaam
  lexicon: HALOT
  rationale: שׁמע con ל puede significar escuchar/obedecer. Aquí el español «escuchar a Balaam» conserva la sencillez del registro y permite que el contexto muestre que se trata de atender su petición o su intento de maldecir, no solo de percibir sonidos.
- source_word: וַיְבָרֶךְ בָּרוֹךְ
  english_pob_choice: he indeed blessed you
  chosen_spanish: él ciertamente los bendijo
  alternatives_spanish:
  - él ciertamente los bendijo
  - él los bendijo en verdad
  - él no hizo sino bendecirlos
  lexicon: HALOT
  rationale: El hebreo usa una construcción enfática con verbo + infinitivo absoluto. «Ciertamente» comunica la fuerza enfática sin convertirla indebidamente en repetición temporal. Se mantuvo el sujeto masculino singular explícito («él») para reflejar la referencia inmediata a Balaam en el contexto.
- source_word: אֶתְכֶם
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - ustedes
  - a ustedes
  - os
  lexicon: HALOT
  rationale: En español, el objeto de segunda persona plural se expresa naturalmente con un pronombre clítico. Como el verbo principal es transitivo y el referente es el pueblo en plural, «los» funciona bien en un registro bíblico-neutral; no se introduce el tratamiento de segunda persona explícita para evitar aspereza sintáctica.
- source_word: וָאַצִּל
  english_pob_choice: I delivered
  chosen_spanish: los libré
  alternatives_spanish:
  - los entregué libres
  - los rescaté
  - los salvé
  lexicon: HALOT
  rationale: נצל suele implicar librar, rescatar, sacar de peligro. «Libré» conserva la acción de sacar de la mano o poder de otro sin cargar demasiado el término con connotaciones soteriológicas más amplias que «salvé». «Rescaté» también sería viable, pero «libré» encaja mejor con la fórmula narrativa.
- source_word: מִיָּדוֹ
  english_pob_choice: from his hand
  chosen_spanish: de su mano
  alternatives_spanish:
  - de su poder
  - de él
  - de su dominio
  lexicon: HALOT
  rationale: El hebreo usa la metáfora de la mano como poder o control. En español, «de su mano» preserva directamente la imagen y su fuerza idiomática. «De su poder» explicitaría el sentido, pero perdería la metáfora textual.
theological_decisions:
- issue: Agencia de la bendición atribuida a Balaam bajo la soberanía divina
  english_pob_reading: The subject of 'he indeed blessed you' is Balaam, whose blessing is compelled/overruled by God.
  chosen_spanish_reading: El sujeto inmediato de «él ciertamente los bendijo» es Balaam, pero el contexto deja claro que su bendición fue frustrada o gobernada por Dios.
  alternative_spanish_readings:
  - Dios los bendijo realmente a través de Balaam
  - yo los bendije realmente
  - él solo pudo bendecirlos
  rationale: El hebreo presenta una tercera persona singular enlazada con Balaam, por lo que no conviene cambiar el sujeto explícito. Al mismo tiempo, el sentido narrativo de Josué 24 y Números 22–24 muestra que la acción fue sobreruled por Dios. La formulación española conserva esa tensión sin resolverla artificialmente.
  doctrine_reference: Josué 24:10; Números 22–24
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del audit trail inglés, que prefirió «indeed blessed» frente a una traducción que sugiriera repetición. Por eso se eligió «ciertamente» en español para reflejar la intensificación del infinitivo absoluto sin añadir una idea de acción repetida.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto lo requiera explícitamente; en este versículo no aparece el nombre divino.
  - Se conserva un registro bíblico claro y contemporáneo, evitando arcaísmos como «no quise oír» o «de su mano» en formas más forzadas que no mejoran la fidelidad.
  - «Bendijo» y «libré» se usan con sentido narrativo directo, sin introducir glosas interpretativas en el texto principal.
