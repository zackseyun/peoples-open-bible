translation:
  language: es
  text: Porque, ¿qué nación grande hay que tenga dioses tan cercanos a ella como Yahvé nuestro Dios lo está de nosotros cada vez que lo invocamos?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «dioses». El versículo contrapone retóricamente las deidades de otras naciones con Yahvé, el Dios de Israel.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «cada vez que le llamamos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: HALOT
  rationale: Introduce la razón o fundamento de la afirmación previa; en español, «Porque» conserva bien ese valor explicativo y suena natural en una pregunta retórica.
- source_word: מִי
  english_pob_choice: what ... is there
  chosen_spanish: qué ... hay
  alternatives_spanish:
  - quién ... hay
  - qué ... existe
  lexicon: HALOT
  rationale: La pregunta es retórica; en español, «qué ... hay» reproduce mejor la fuerza idiomática que un literal «quién».
- source_word: גּוֹי גָּדֹול
  english_pob_choice: great nation
  chosen_spanish: nación grande
  alternatives_spanish:
  - gran nación
  - pueblo grande
  lexicon: HALOT
  rationale: גּוֹי aquí se refiere a una entidad nacional/política; «nación grande» conserva el sentido directo y la estructura natural del español.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: that has
  chosen_spanish: que tenga
  alternatives_spanish:
  - a la que le pertenezcan
  - que posee
  lexicon: HALOT
  rationale: La construcción expresa posesión/relación; «que tenga» transmite con naturalidad la idea de pertenencia implícita.
- source_word: אֱלֹהִים
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - Dios
  - seres divinos
  lexicon: HALOT
  rationale: El plural y el contraste con Yahvé exigen un plural común; «dioses» preserva la referencia a las deidades de otras naciones.
- source_word: קְרֹבִים
  english_pob_choice: so near
  chosen_spanish: tan cerca
  alternatives_spanish:
  - cerca
  - muy cerca
  lexicon: HALOT
  rationale: El adjetivo expresa proximidad comparativa; «tan cerca» mantiene el énfasis retórico del hebreo y del inglés POB.
- source_word: אֵלָיו
  english_pob_choice: to it
  chosen_spanish: de ella
  alternatives_spanish:
  - de él
  - a ella
  lexicon: HALOT
  rationale: El antecedente es גּוֹי («nación»), femenino en español; «de ella» ajusta el pronombre al referente y conserva la relación de cercanía.
- source_word: כַּ/יהוָה
  english_pob_choice: as the LORD / as Yahweh
  chosen_spanish: como Yahvé
  alternatives_spanish:
  - como Yahvé,
  - como el Yahvé
  lexicon: HALOT
  rationale: 'Se preserva el nombre divino según la norma del proyecto: יהוה → «Yahvé». El comparativo כ exige «como».'
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: HALOT
  rationale: Aunque morfológicamente el hebreo puede ser plural de forma, el contexto es el Dios de Israel; «nuestro Dios» es la equivalencia directa y clara.
- source_word: בְּכָל קָרְאֵנוּ אֵלָיו
  english_pob_choice: whenever we call on him
  chosen_spanish: cada vez que lo invocamos
  alternatives_spanish:
  - cuando lo invocamos
  - en toda ocasión en que lo invocamos
  - cada vez que le llamamos
  lexicon: HALOT
  rationale: La construcción con בְּ + כָּל + infinitivo expresa repetición/circunstancia; «cada vez que» reproduce bien ese valor. «Invocar» comunica la idea cultual de llamar a Dios en oración.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme al criterio del proyecto, se translitera al español como «Yahvé» para preservar el nombre personal del pacto y evitar la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de אֱלֹהִים en la primera cláusula
  english_pob_reading: generic plural 'gods' for the nations' deities
  chosen_spanish_reading: plural común «dioses»
  alternative_spanish_readings:
  - Dios
  - seres divinos
  rationale: La concordancia plural con קְרֹבִים y el contraste explícito con «Yahvé nuestro Dios» muestran que aquí se habla de deidades de otras naciones. Traducir «dioses» conserva la tensión retórica del versículo.
  doctrine_reference: 'DOCTRINE.md: lexical/theological contrast between false gods and Yahweh'
- issue: Pronombre en אֵלָיו referido a גּוֹי
  english_pob_reading: to it
  chosen_spanish_reading: de ella
  alternative_spanish_readings:
  - de él
  - de eso
  rationale: En español, «nación» es femenino; ajustar el pronombre al referente mejora la claridad sin cambiar el sentido del hebreo, que apunta a la nación de manera impersonal.
  doctrine_reference: Spanish grammar alignment with Hebrew antecedent
translation_notes:
  revision_awareness: 'Se revisó el pasaje frente al contexto auditado en inglés y no se requirieron cambios posteriores: la versión española conserva el valor retórico de la pregunta, el contraste plural «dioses»/«nuestro Dios», y el tratamiento del nombre divino como «Yahvé».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se usa «Dios» en singular para אֱלֹהֵינוּ, pero «dioses» en la primera cláusula por el contraste contextual.
  - El verbo «invocar» preserva el matiz de oración/llamamiento cultual de קָרְאֵנוּ אֵלָיו.
  - La puntuación reproduce la pregunta retórica de una sola oración con cierre interrogativo.
