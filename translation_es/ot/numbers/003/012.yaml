revisions:
- from: Y yo—he aquí[a], he tomado a los levitas de entre los hijos de Israel, en lugar de todo primogénito que abre el vientre entre los hijos de Israel; y los levitas serán míos.
  to: Y yo—he aquí—he tomado a los levitas de entre los hijos de Israel[a], en lugar de todo primogénito que abre el vientre entre los hijos de Israel, y los levitas serán míos.
  rationale: 'Se corrige el problema principal: mover la nota [a] para que ancle correctamente «los hijos de Israel», que es el elemento al que se refiere la alternativa léxica. También se suaviza la puntuación para una lectura más natural sin alterar el sentido ni las decisiones léxicas principales. Se conserva «he aquí» porque, aunque elevado, sigue siendo fiel al valor enfático y solemne de הִנֵּה en este contexto.'
