translation:
  language: es
  text: Así que eliminé[a] a los tres pastores[c] en un mes, y mi alma se impacientó con ellos[b], y también su alma se hastió de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «destruí» o «corté de raíz»; el verbo hebreo puede expresar hacer desaparecer o eliminar a los pastores.
    reason: lexical_alternative
  - marker: b
    text: La expresión «mi alma se impacientó» traduce un modismo hebreo que expresa impaciencia profunda, disgusto o revulsión.
    reason: lexical_alternative
  - marker: c
    text: El texto no identifica a «los tres pastores»; las interpretaciones propuestas varían.
    reason: alternative_reading
lexical_decisions:
- source_word: וָאַכְחִד
  english_pob_choice: I removed
  chosen_spanish: removí
  alternatives_spanish:
  - destruí
  - corté
  - eliminé
  lexicon: HALOT
  rationale: El verbo hebreo puede expresar hacer desaparecer, quitar o eliminar. «Removí» conserva la acción decisiva sin especificar más de lo que el texto requiere, y permite mantener la ambigüedad entre apartar, eliminar o destruir.
- source_word: שְׁלֹשֶׁת הָרֹעִים
  english_pob_choice: the three shepherds
  chosen_spanish: los tres pastores
  alternatives_spanish:
  - los tres líderes
  - los tres gobernantes
  lexicon: HALOT
  rationale: Se mantiene «pastores» porque la imagen metafórica es central en el capítulo. Traducirlo como «líderes» resolvería interpretativamente algo que el hebreo deja sin identificar.
- source_word: בְּיֶרַח אֶחָד
  english_pob_choice: in one month
  chosen_spanish: en un mes
  alternatives_spanish:
  - dentro de un mes
  lexicon: HALOT
  rationale: La expresión señala una sola unidad de tiempo. «En un mes» suena natural en español y conserva la brevedad temporal marcada por el hebreo.
- source_word: וַתִּקְצַר נַפְשִׁי בָּהֶם
  english_pob_choice: my soul grew impatient with them
  chosen_spanish: mi alma se impacientó con ellos
  alternatives_spanish:
  - me impacienté con ellos
  - mi alma se acortó para con ellos
  lexicon: HALOT
  rationale: Se conserva el idioma hebreo de «mi alma» para reflejar la forma original y su paralelo con «su alma» en la última cláusula. «Se impacientó» expresa la idea de cansancio o pérdida de paciencia sin suavizarla demasiado.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - yo
  lexicon: HALOT
  rationale: Aunque en español podría decirse «yo», mantener «mi alma» conserva el antropomorfismo hebreo y la correspondencia con la frase paralela posterior.
- source_word: וְגַם נַפְשָׁם בָּחֲלָה בִי
  english_pob_choice: and their soul also loathed me
  chosen_spanish: y también su alma se hastió de mí
  alternatives_spanish:
  - y también me aborrecieron
  - y también su alma me detestó
  lexicon: HALOT
  rationale: «בחל» comunica repugnancia, hastío o aborrecimiento. «Se hastió» transmite bien ese disgusto fuerte en español. Se conserva el singular «alma» para reflejar el hebreo y el paralelismo con «mi alma».
theological_decisions:
- issue: Identidad de «los tres pastores»
  english_pob_reading: Retain the metaphor 'the three shepherds' without identifying them in the translation.
  chosen_spanish_reading: Conservar la metáfora «los tres pastores» sin identificarlos.
  alternative_spanish_readings:
  - los tres pastores, es decir, tres líderes concretos
  - los tres pastores, entendidos como tres categorías de autoridad
  rationale: El hebreo no identifica a esos pastores. Nombrar referentes concretos en el texto español introduciría una conclusión interpretativa no obligada por el versículo. Se preserva así la tensión y la ambigüedad del pasaje.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla en la traducción.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; el presente borrador mantiene la decisión de la POB inglesa de preservar la ambigüedad de «los tres pastores» y de traducir el modismo con una formulación idiomática pero cercana al hebreo.
  spanish_consistency_notes:
  - Se mantiene «alma» para נֶפֶשׁ en ambas cláusulas por coherencia interna y para reflejar el paralelismo hebreo.
  - «Removí» evita sobreinterpretar el verbo כחד como únicamente «destruir», respetando la amplitud semántica documentada.
  - El singular «su alma» reproduce el hebreo y no se pluraliza para no perder la simetría con «mi alma».
  - No se reemplaza la metáfora de «pastores» por un término explicativo en el texto principal.
