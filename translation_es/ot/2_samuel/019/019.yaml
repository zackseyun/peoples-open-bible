translation:
  language: es
  text: La barca[a] cruzó para hacer pasar a la familia del rey[b] y para hacer lo que era bueno ante sus ojos[c], y Semeí hijo de Gera cayó delante del rey mientras el rey cruzaba el Jordán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el ferry» o «la barca de cruce»; el término hebreo se refiere al medio para cruzar el río.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «la casa del rey»; se refiere a las personas de la casa real o del séquito del rey, no al edificio del palacio.
    reason: cultural_note
  - marker: c
    text: 'Hebreo: «hacer lo bueno ante sus ojos», un modismo que significa hacer lo que le agradaba.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָעֲבָרָה
  english_pob_choice: the ferryboat
  chosen_spanish: la barca de paso
  alternatives_spanish:
  - la barca
  - el ferry
  - la embarcación de cruce
  lexicon: HALOT
  rationale: El sustantivo designa el medio con que se cruza el río. «Barca de paso» conserva la imagen concreta del cruce sin sonar demasiado técnica; evita también el calco abstracto de «cruce».
- source_word: וְעָבְרָה
  english_pob_choice: crossed over
  chosen_spanish: cruzó
  alternatives_spanish:
  - había cruzado
  - pasó
  - se cruzó
  lexicon: HALOT
  rationale: El perfecto qal concuerda con «la barca» y narra la acción completa en secuencia. En español, el pretérito simple es natural y refleja bien el movimiento ya realizado.
- source_word: לַעֲבִיר אֶת בֵּית הַמֶּלֶךְ
  english_pob_choice: to bring the king’s household across
  chosen_spanish: para hacer pasar la casa del rey
  alternatives_spanish:
  - para llevar a la casa del rey al otro lado
  - para transportar la casa del rey
  - para hacer cruzar la casa del rey
  lexicon: HALOT
  rationale: El hiphil infinitivo expresa causar el paso al otro lado. «Hacer pasar» mantiene esa causalidad y evita interpretar «casa» como edificio; en el contexto, se trata del grupo ligado al rey.
- source_word: בֵּית הַמֶּלֶךְ
  english_pob_choice: the king’s household
  chosen_spanish: la casa del rey
  alternatives_spanish:
  - la familia del rey
  - el séquito del rey
  - la casa real
  lexicon: HALOT
  rationale: En este contexto fluvial, «casa» no se refiere al edificio sino al conjunto asociado al rey. «Casa del rey» conserva la expresión hebrea y permite que el sentido colectivo se entienda por el contexto; se explica en nota.
- source_word: וְלַעֲשׂוֹת הַטּוֹב בְּעֵינָיו
  english_pob_choice: and to do what was good in his sight
  chosen_spanish: y para hacer lo bueno a sus ojos
  alternatives_spanish:
  - y para hacer lo que era bueno a sus ojos
  - y para hacer lo que le agradaba
  - y para hacer lo bueno que él veía
  lexicon: HALOT
  rationale: La frase reproduce el modismo hebreo de valoración por «ojos». Se conserva la forma más cercana al original, porque en español sigue siendo comprensible y mantiene la tensión idiomática que la POB inglesa documenta.
- source_word: בְּעֵינָיו
  english_pob_choice: in his sight
  chosen_spanish: a sus ojos
  alternatives_spanish:
  - en su vista
  - en su opinión
  - ante él
  lexicon: HALOT
  rationale: «A sus ojos» refleja el hebraísmo literal y su matiz evaluativo. En español es idiomático y deja ver el vínculo con la imagen hebrea de percepción/juicio.
- source_word: נָפַל לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: fell before the king
  chosen_spanish: cayó delante del rey
  alternatives_spanish:
  - se postró delante del rey
  - cayó postrado delante del rey
  - se echó a los pies del rey
  lexicon: HALOT
  rationale: «Cayó delante» conserva la literalidad del verbo y el gesto de humillación/súplica. «Postró» explicita la interpretación, pero aquí se prefiere mantener la imagen básica del hebreo.
- source_word: בְּעָבְרוֹ בַּיַּרְדֵּן
  english_pob_choice: as he was crossing the Jordan
  chosen_spanish: mientras éste cruzaba el Jordán
  alternatives_spanish:
  - cuando él cruzaba el Jordán
  - al cruzar el Jordán
  - mientras cruzaba el Jordán
  lexicon: HALOT
  rationale: El sufijo y el contexto inmediato apuntan al rey como antecedente natural. «Mientras éste» evita repetir «el rey» y mantiene la referencia temporal fluida.
theological_decisions:
- issue: Sentido de בֵּית הַמֶּלֶךְ como grupo humano, no edificio
  english_pob_reading: the king’s household refers to the people of the royal house or retinue, not the palace building.
  chosen_spanish_reading: la casa del rey refiere al grupo de personas vinculadas al rey, no al edificio del palacio
  alternative_spanish_readings:
  - la familia del rey
  - el séquito del rey
  - la casa real
  rationale: La escena es un cruce de río, no un traslado arquitectónico. Mantener «casa del rey» en el texto y explicar su valor colectivo preserva la ambigüedad hebrea sin perder inteligibilidad.
  doctrine_reference: N/A — decisión contextual y lexicográfica, no doctrinal
- issue: Modismo de הַטּוֹב בְּעֵינָיו
  english_pob_reading: to do what pleased him / what was good in his sight
  chosen_spanish_reading: hacer lo bueno a sus ojos
  alternative_spanish_readings:
  - hacer lo que le agradaba
  - hacer lo que era bueno a sus ojos
  - hacer lo bueno que él veía
  rationale: El hebreo usa una evaluación visual para expresar aprobación. La traducción conserva el modismo porque la POB inglesa lo documenta como rasgo semántico importante; así se evita una paráfrasis demasiado libre.
  doctrine_reference: N/A — decisión semántica/idiomática
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «had crossed over» por «crossed over» para un pretérito simple más natural; la versión española sigue esa misma secuencia narrativa con pretérito simple («cruzó»).
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó «Cristo» y «Mesías» porque no aparecen en el texto.
  - Se prefirió «casa del rey» sobre «palacio» para no eliminar la referencia colectiva documentada en el audit trail.
  - «A sus ojos» conserva el hebraísmo del original y la nota aclara su sentido idiomático.
  - «La barca de paso» intenta ser natural en español sin perder la concreción del medio de cruce.
