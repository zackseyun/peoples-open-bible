revisions:
- from: Entonces saldrá al altar que está delante de Yahvé y hará expiación por él[a]; tomará de la sangre del toro y de la sangre del macho cabrío, y la pondrá sobre los cuernos del altar alrededor.
  to: Entonces saldrá al altar que está delante de Yahvé y hará expiación por él[a]; tomará parte de la sangre del toro y parte de la sangre del macho cabrío, y la pondrá sobre los cuernos del altar por todo alrededor.
  rationale: Se mantiene la fidelidad global del borrador, pero se corrige la frase final para un español más natural y una representación más clara de סָבִיב. También se explicita levemente el sentido partitivo de מִן con «parte de la sangre», en línea con la decisión inglesa auditada.
