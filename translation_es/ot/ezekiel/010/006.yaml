translation:
  language: es
  text: 'Y sucedió[a] que, cuando le ordenó al hombre vestido de lino, diciendo: «Toma fuego de entre el ruedaje[b], de entre los querubines», él entró y se detuvo junto a la rueda.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aconteció». El hebreo introduce el nuevo episodio con una fórmula narrativa de transición.
    reason: alternative_reading
  - marker: b
    text: O «rueda» o «conjunto de ruedas». El hebreo גַּלְגַּל puede referirse a una rueda o a una estructura de ruedas en esta visión.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And it happened
  chosen_spanish: Y sucedió
  alternatives_spanish:
  - Y aconteció
  - Y pasó
  lexicon: HALOT
  rationale: Mantiene la función narrativa del wayyiqtol introductorio sin caer en un calco rígido ni en una fórmula demasiado arcaica.
- source_word: בְּצַוֺּתוֹ
  english_pob_choice: when he commanded
  chosen_spanish: cuando le ordenó
  alternatives_spanish:
  - cuando mandó
  - al ordenarle
  lexicon: HALOT
  rationale: El sentido temporal de la construcción se expresa naturalmente con 'cuando'. 'Ordenó' comunica el valor de צווה con mayor precisión que un simple 'mandó' en español bíblico moderno.
- source_word: הָאִישׁ לְבֻשׁ הַבַּדִּים
  english_pob_choice: the man clothed in linen
  chosen_spanish: el hombre vestido de lino
  alternatives_spanish:
  - el hombre cubierto de lino
  - el hombre con vestiduras de lino
  lexicon: HALOT
  rationale: '''Vestido de lino'' preserva la identificación ya establecida de la figura y evita una paráfrasis más pesada. ''Lino'' mantiene el material textil sin añadir ''vestiduras'' que el hebreo no exige aquí.'
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: Marcador quotativo directo estándar en español, fiel a la apertura de discurso.
- source_word: קַח אֵשׁ
  english_pob_choice: Take fire
  chosen_spanish: Toma fuego
  alternatives_spanish:
  - Toma un poco de fuego
  - Recibe fuego
  lexicon: HALOT
  rationale: El imperativo directo y el sustantivo sin artículo se conservan sin ampliar innecesariamente la cantidad o naturaleza del fuego.
- source_word: מִבֵּינוֹת לַגַּלְגַּל
  english_pob_choice: from between the wheelwork
  chosen_spanish: de entre el engranaje
  alternatives_spanish:
  - de entre la rueda
  - de entre el conjunto de ruedas
  lexicon: HALOT
  rationale: En este contexto visionario, גַּלְגַּל puede referirse a una estructura de ruedas o rueda giratoria. 'Engranaje' intenta reflejar el sentido colectivo/estructural que el audit trail inglés preserva con 'wheelwork', sin decidir de más por una sola rueda física.
- source_word: מִבֵּינוֹת לַכְּרוּבִים
  english_pob_choice: from between the cherubim
  chosen_spanish: de entre los querubines
  alternatives_spanish:
  - de entre querubines
  - de en medio de los querubines
  lexicon: HALOT
  rationale: Se conserva la repetición espacial del hebreo y el término técnico 'querubines'.
- source_word: וַיָּבֹא
  english_pob_choice: he went in
  chosen_spanish: él entró
  alternatives_spanish:
  - él fue
  - él se acercó
  lexicon: HALOT
  rationale: En español, 'entró' comunica mejor el movimiento hacia el espacio visionario que 'fue' o 'vino', y corresponde al valor direccional del verbo en contexto.
- source_word: וַיַּעֲמֹד אֵצֶל הָאוֹפָן
  english_pob_choice: stood beside the wheel
  chosen_spanish: se puso junto a la rueda
  alternatives_spanish:
  - se detuvo junto a la rueda
  - estuvo al lado de la rueda
  lexicon: HALOT
  rationale: '''Se puso junto'' expresa la colocación resultante de עמד con naturalidad en español. ''Rueda'' mantiene el sentido básico de אוֹפָן y evita introducir una estructura más técnica donde el hebreo es simple.'
theological_decisions:
- issue: Sujeto tácito de la orden
  english_pob_reading: Retained as the pronoun 'he' without specifying 'the LORD' or another figure.
  chosen_spanish_reading: Conservé 'le ordenó' sin explicitar quién da la orden.
  alternative_spanish_readings:
  - el Señor le ordenó
  - él le ordenó
  rationale: El hebreo solo aporta un sufijo pronominal y no nombra de nuevo al sujeto. Mantener la referencia implícita preserva la tensión discursiva y evita cerrar interpretativamente la identidad del que manda.
  doctrine_reference: Preservar la tensión textual sin resolverla por anticipado.
translation_notes:
  revision_awareness: La versión inglesa más reciente reemplazó 'whirling wheel' por 'wheelwork' para reflejar mejor el sentido colectivo/estructural de גַּלְגַּל. Por eso el español evita una imagen demasiado individual de una sola rueda y opta por 'engranaje', manteniendo la ambigüedad visionaria sin sobreinterpretar. También se conservó el sujeto implícito, siguiendo el audit trail inglés.
  spanish_consistency_notes:
  - '''Y sucedió'' mantiene el arranque narrativo de transición y evita la calca arcaica.'
  - '''Lino'' se usa de forma consistente con el sintagma ''vestido de lino'' para la figura ya identificada en el contexto.'
  - '''Querubines'' conserva el término técnico bíblico sin sustituirlo por una glosa.'
  - '''Rueda''/''engranaje'' reflejan la ambigüedad de גַּלְגַּל sin fijarla excesivamente.'
