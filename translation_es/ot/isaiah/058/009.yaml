  yaml_path: translation/ot/isaiah/058/009.yaml
  text: Then you will call[a], and Yahweh will answer; you will cry for help, and he will say, ‘Here I am.’ If you remove from your midst the yoke, the pointing of the finger, and speaking wickedness[c][b],
