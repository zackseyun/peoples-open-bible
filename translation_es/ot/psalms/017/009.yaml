review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general y la fuerza de la amenaza: impíos/enemigos que devastan y rodean al salmista. Sin embargo, מִפְּנֵי aquí se alinea mejor con ''de/delante de'' en sentido de protección frente a una amenaza hostil, no con ''por causa de'', que introduce causalidad y cambia ligeramente la relación semántica. El resto —''los impíos'', ''me devastan'', ''mis enemigos mortales'', ''me rodean''— preserva adecuadamente el sentido fuente y la alternativa de בְּנֶפֶשׁ está bien documentada en nota.'
  spanish_quality_summary: El español es claro y digno, pero 'Por causa de los impíos' suena más causal que protectivo y menos natural en este contexto del salmo. 'De los impíos' o 'de delante de los impíos' funciona mejor; la primera es más idiomática. También conviene pulir la nota al pie para que el español sea más natural y tipográficamente limpio.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Los impíos' es una opción válida para רְשָׁעִים. 'Mortales' para בְּנֶפֶשׁ es aceptable con nota explicativa. No aparecen términos sensibles del glosario principal.
  issues:
  - severity: medium
    issue: מִפְּנֵי se tradujo 'Por causa de'
    rationale: La decisión inglesa auditada escogió 'from' con valor de procedencia/protección frente a una amenaza, no causalidad. 'Por causa de' reorienta el sentido hacia motivo/causa y no refleja tan bien el hebreo en contexto.
  - severity: low
