translation:
  language: es
  text: Pero si el que lo consagró[a] efectivamente redime el campo, añadirá una quinta parte del dinero de tu tasación[b] a ello, y quedará para él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que lo dedicó» o «el que lo santificó».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «una quinta parte de la plata de tu valuación».
    reason: lexical_alternative
  - marker: c
    text: O «le pertenecerá»; literalmente, «se mantendrá para él» o «estará firme para él».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La cláusula continúa una disposición legal previa; en español, «Pero si» conserva mejor el matiz adversativo/continuativo que un simple «Si».
- source_word: גָּאֹל יִגְאַל
  english_pob_choice: indeed redeems
  chosen_spanish: lo redime realmente
  alternatives_spanish:
  - lo redime ciertamente
  - quiere redimirlo
  - lo redime
  lexicon: HALOT
  rationale: La construcción infinitivo absoluto + imperfecto intensifica la acción; «realmente» intenta reflejar esa fuerza sin volver la frase demasiado forzada.
- source_word: הַשָּׂדֶה
  english_pob_choice: the field
  chosen_spanish: del campo
  alternatives_spanish:
  - del terreno
  - de la tierra
  lexicon: HALOT
  rationale: Aquí el sustantivo designa el bien inmueble objeto de la valoración; «campo» es la equivalencia normal y precisa en español.
- source_word: הַמַּקְדִּישׁ אֹתוֹ
  english_pob_choice: the one who consecrated it
  chosen_spanish: el que lo consagró
  alternatives_spanish:
  - el que lo dedicó
  - el que lo santificó
  lexicon: HALOT
  rationale: «Consagró» mantiene el matiz cultual de apartar algo para Yahvé, que el inglés POB expresa con «consecrated».
- source_word: וְיָסַף
  english_pob_choice: he shall add
  chosen_spanish: añadirá
  alternatives_spanish:
  - deberá añadir
  - entonces añadirá
  lexicon: HALOT
  rationale: En este contexto legal, el futuro español puede expresar obligación/resultante sin necesitar un auxiliar explícito.
- source_word: חֲמִשִׁית
  english_pob_choice: a fifth
  chosen_spanish: una quinta parte
  alternatives_spanish:
  - un quinto
  lexicon: HALOT
  rationale: «Una quinta parte» es natural y claro en español jurídico; mantiene el valor fraccional exacto.
- source_word: כֶּסֶף עֶרְכְּךָ
  english_pob_choice: your valuation money
  chosen_spanish: del dinero de tu valuación
  alternatives_spanish:
  - de la plata de tu valuación
  - del dinero de tu tasación
  lexicon: HALOT
  rationale: El hebreo dice literalmente «plata de tu valuación»; en español, «dinero» comunica el monto monetario, y «valuación» preserva el vínculo con la evaluación legal del texto.
- source_word: עָלָיו
  english_pob_choice: to it
  chosen_spanish: sobre él
  alternatives_spanish:
  - a ello
  - encima de ello
  lexicon: HALOT
  rationale: La preposición hebrea expresa adición/puesta encima; «sobre él» mantiene la imagen de agregar la quinta parte al monto ya fijado.
- source_word: וְקָם לוֹ
  english_pob_choice: it shall remain his
  chosen_spanish: le quedará
  alternatives_spanish:
  - será suyo
  - le pertenecerá
  lexicon: HALOT
  rationale: El hebreo idiomático indica que el bien queda establecido para esa persona; «le quedará» es una forma natural que conserva el resultado jurídico sin forzar el español.
theological_decisions:
- issue: Verbo cultual para הקדישׁ
  english_pob_reading: consecrated
  chosen_spanish_reading: consagró
  alternative_spanish_readings:
  - dedicó
  - santificó
  rationale: En una ley de dedicación al santuario, «consagró» conserva el sentido religioso-jurídico mejor que un verbo meramente secular. No se borra la tensión entre dedicación y santificación; se deja abierta en las alternativas.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Fuerza legal de la secuencia verbal
  english_pob_reading: prescriptive future ('shall add ... shall remain')
  chosen_spanish_reading: futuro prescriptivo/resultativo
  alternative_spanish_readings:
  - presente normativo
  - futuro simple narrativo
  rationale: Levítico 27 es legislación; el futuro español transmite obligación y consecuencia jurídica. Esto evita leer la frase como narración pasada.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El testigo hebreo y el contexto de la traducción inglesa muestran acuerdo alto y no requieren revisión sustantiva; se conserva la estructura legal, el intensificador verbal y el cierre idiomático del resultado patrimonial.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el texto base conforme al estándar del proyecto para el nombre divino en español.
  - Se mantiene «consagró» para el matiz cultual de הקדישׁ, evitando sustituirlo por un término meramente secular.
  - «Valuación» se conserva por su conexión directa con el lenguaje legal del pasaje, aunque «tasación» podría ser una alternativa estilística.
  - La frase final se vierte como resultado jurídico natural en español, sin perder la idea de que el bien queda establecido para la misma persona.
