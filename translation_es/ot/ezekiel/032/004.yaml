revisions:
- from: Te arrojaré a la tierra[a]; te echaré sobre la superficie del campo, y haré posar sobre ti a toda ave del cielo[b]; y saciaré con tu carne a las fieras de toda la tierra.
  to: Te arrojaré a la tierra[a]; te echaré en campo abierto, y haré posar sobre ti a toda ave del cielo; y saciaré con tu cuerpo[b] a las fieras de toda la tierra.
  rationale: 'Se corrige el texto para alinearlo mejor con el audit trail inglés y con el hebreo: se suaviza «superficie del campo» a «en campo abierto» para mayor naturalidad, y se reemplaza la nota erróneamente enfocada en las aves por una nota que preserve la literalidad de «de ti». En el texto principal, «con tu cuerpo» mantiene la idiomaticidad española y evita la explicitación más interpretativa de «tu carne», mientras la nota recoge el matiz literal hebreo.'
  reviewer_model: gpt-5.4
