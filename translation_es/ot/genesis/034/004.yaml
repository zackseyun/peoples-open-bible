translation:
  language: es
  text: 'Y Shequem dijo a Hamor, su padre: «Toma para mí a esta muchacha[a] como esposa».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta joven». El hebreo puede denotar una muchacha o una joven; aquí «muchacha» preserva el sentido juvenil y la manera brusca de hablar de Shequem.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And ... said
  chosen_spanish: Y ... dijo
  alternatives_spanish:
  - Entonces ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La waw narrativa avanza la acción; «Y ... dijo» conserva el flujo del relato sin sobreinterpretar la conjunción.
- source_word: שְׁכֶם
  english_pob_choice: Shechem
  chosen_spanish: Shequem
  alternatives_spanish:
  - Siquem
  lexicon: transliteración del nombre propio
  rationale: Se translitera el nombre propio con forma castellana natural y reconocible, manteniendo la referencia al personaje.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para
  lexicon: HALOT
  rationale: La preposición introduce al destinatario del discurso; «a» es la correspondencia directa y natural en español.
- source_word: חֲמוֹר אָבִיו
  english_pob_choice: Hamor his father
  chosen_spanish: Hamor, su padre
  alternatives_spanish:
  - su padre Hamor
  - Hamor, el padre de él
  lexicon: HALOT
  rationale: El hebreo presenta un nombre seguido de su identificación como padre. En español, la aposición con coma comunica bien la relación sin perder naturalidad.
- source_word: קַח לִי
  english_pob_choice: Take for me
  chosen_spanish: Tómame
  alternatives_spanish:
  - Tómalo para mí
  - Tráemela
  lexicon: HALOT
  rationale: El imperativo más el dativo expresa la petición dirigida al padre; «tómame» preserva la fuerza de קַח y el sentido relacional de «para mí» en una forma breve y natural. Se evita «consígueme» porque debilita el paralelo léxico con el hebreo.
- source_word: הַיַּלְדָּה הַזֹּאת
  english_pob_choice: this girl
  chosen_spanish: esta muchacha
  alternatives_spanish:
  - esta joven
  - esta chica
  lexicon: HALOT
  rationale: יַלְדָּה puede denotar una muchacha o joven mujer. «Muchacha» conserva el rasgo juvenil y permite reflejar el tono objetivante de la petición sin sonar excesivamente coloquial.
- source_word: לְאִשָּׁה
  english_pob_choice: as a wife
  chosen_spanish: por esposa
  alternatives_spanish:
  - como esposa
  - para esposa
  - para que sea mi esposa
  lexicon: HALOT
  rationale: La construcción idiomática expresa finalidad/matrimonio; «por esposa» es una forma concisa y fiel en español, equivalente funcional de «as a wife».
translation_notes:
  revision_awareness: Se corrige la validación anterior asegurando que el marcador [a] aparece exactamente en el texto de traducción y que no hay notas sin ancla. La redacción mantiene la correspondencia léxica con קַח y la nota alternativa sobre la aposición del nombre del padre.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en el proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene un estilo bíblico sobrio y moderno, sin calco excesivo del inglés.
  - Se prefiere «muchacha» frente a «joven mujer» porque recoge mejor la fuerza de יַלְדָּה en este contexto narrativo.
