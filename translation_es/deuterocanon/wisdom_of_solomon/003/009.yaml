translation:
  language: es
  text: Los que han confiado en él entenderán la verdad, y los fieles permanecerán con él[a] en amor, porque la gracia y la misericordia son para sus escogidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esperarán por él»; el verbo griego puede significar permanecer con alguien o esperar expectantemente a alguien.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ πεποιθότες
  english_pob_choice: those who have trusted
  chosen_spanish: los que han confiado
  alternatives_spanish:
  - los que confían
  - los que tienen confianza
  lexicon: BDAG
  rationale: El perfecto participial expresa un estado resultado de una confianza ya depositada; en español, «han confiado» conserva mejor ese matiz que un presente simple, y sigue siendo natural y claro.
- source_word: ἐπʼ αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - sobre él
  - en él
  lexicon: BDAG
  rationale: Con verbos de confianza, el español idiomático usa «confiar en él». La preposición «en» comunica correctamente la relación de dependencia/confianza sin forzar un calco.
- source_word: συνήσουσιν
  english_pob_choice: will understand
  chosen_spanish: entenderán
  alternatives_spanish:
  - comprenderán
  - captarán
  lexicon: BDAG
  rationale: El futuro de συνίημι significa entender o comprender. «Entenderán» es la opción más directa y transparente en español.
- source_word: ἀλήθειαν
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  - lo verdadero
  lexicon: BDAG
  rationale: Aunque el griego no lleva artículo, en español «la verdad» es la forma más natural y no añade una carga interpretativa indebida.
- source_word: οἱ πιστοὶ
  english_pob_choice: the faithful
  chosen_spanish: los fieles
  alternatives_spanish:
  - los que son fieles
  - los creyentes
  lexicon: BDAG
  rationale: Aquí πιστοί funciona como sustantivo y señala a personas caracterizadas por fidelidad. «Los fieles» mantiene ese valor y evita restringirlo a una categoría confesional de «creyentes».
- source_word: ἐν ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - en amor
  - en amor leal
  - en cariño
  lexicon: BDAG
  rationale: Se conserva la sobriedad del griego con «en amor». No se amplía a «amor leal» porque el texto no exige especificar el tipo de amor, y el término queda abierto para la ambigüedad teológica presente en el original.
- source_word: προσμενοῦσιν αὐτῷ
  english_pob_choice: will remain with him
  chosen_spanish: permanecerán con él
  alternatives_spanish:
  - se quedarán con él
  - esperarán en él
  - permanecerán junto a él
  lexicon: BDAG
  rationale: προσμένω puede significar permanecer, continuar o esperar. Dado el paralelismo y la frase causal siguiente, «permanecerán con él» refleja mejor la comunión duradera que la mera espera.
- source_word: χάρις καὶ ἔλεος
  english_pob_choice: grace and mercy
  chosen_spanish: la gracia y la misericordia
  alternatives_spanish:
  - gracia y misericordia
  - favor y misericordia
  lexicon: BDAG
  rationale: Ambos términos tienen peso teológico propio y se traducen de forma estable como «gracia» y «misericordia». Se añade artículo por fluidez natural en español.
- source_word: τοῖς ἐκλεκτοῖς αὐτοῦ
  english_pob_choice: for his chosen ones
  chosen_spanish: para sus escogidos
  alternatives_spanish:
  - para sus elegidos
  - para los escogidos de él
  lexicon: BDAG
  rationale: «Escogidos» comunica con claridad ἐκλεκτοῖς sin importar automáticamente el vocabulario doctrinal posterior asociado a «electos». Mantiene la idea de elección divina de modo accesible en español.
theological_decisions:
- issue: Valor de πιστοί junto a los que han confiado en él
  english_pob_reading: the faithful
  chosen_spanish_reading: los fieles
  alternative_spanish_readings:
  - los creyentes
  - los que son fieles
  rationale: En un contexto sapiencial, πιστοί destaca la constancia/fidelidad de los justos más que una etiqueta confesional. «Los fieles» preserva esa fuerza y deja abierta la relación con la confianza previa mencionada en el verso.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión semántica; no reducir πίστις a una sola categoría dogmática'
- issue: Sentido de προσμενοῦσιν αὐτῷ
  english_pob_reading: will remain with him
  chosen_spanish_reading: permanecerán con él en amor
  alternative_spanish_readings:
  - esperarán en él
  - continuarán con él
  rationale: La escena apunta al destino relacional de los justos con Dios. «Permanecerán con él en amor» refleja la continuidad y la esfera relacional indicadas por el griego, y respeta el ajuste revisado en el audit trail.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; conservar el sentido sin paraphrase excesiva'
- issue: Ἐκλεκτοῖς y su posible carga doctrinal
  english_pob_reading: chosen ones
  chosen_spanish_reading: escogidos
  alternative_spanish_readings:
  - elegidos
  - electos
  rationale: Se elige una forma clara y bíblica en español que no obliga a introducir el tecnicismo «electos» ni a desdibujar el acto de elección divina. Así se conserva la referencia a los escogidos de Dios sin sobrecargarla.
  doctrine_reference: 'DOCTRINE.md: lenguaje moderno legible, evitando terminología sistemática no necesaria'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión del audit trail que movió «in love» para modificar a «will remain with him»; por eso se traduce «permanecerán con él en amor» y no se adjunta la frase al sustantivo «los fieles». También se respetó la preferencia del POB por un valor durativo/relacional de προσμένω y por «chosen ones» como «escogidos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general cuando aparezca el nombre divino; aquí no aplica porque el verso usa referencias pronominales a Dios.
  - «Gracia» y «misericordia» se conservan como fórmulas teológicas estables.
  - «Escogidos» se usa de manera consistente para ἐκλεκτοῖς, evitando «electos» salvo necesidad contextual.
  - 'La puntuación sigue el orden semántico del griego y la revisión del POB: el sintagma «en amor» modifica a «permanecerán con él».'
