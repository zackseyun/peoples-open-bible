revisions:
- from: Entonces Betsabé entró donde el rey, en la cámara[a]. Ahora bien, el rey estaba muy anciano[b], y Abisag la sunamita atendía al rey.
  to: Así que Betsabé entró a ver al rey en la cámara[a]. Ahora bien, el rey estaba muy anciano, y Abisag la sunamita atendía[b] al rey.
  rationale: Se corrigió la nota [b] para que corresponda al verbo מְשָׁרַת (‘atendía/servía’) según el audit trail inglés. También se ajustó la sintaxis inicial a ‘entró a ver al rey en la cámara’, que preserva mejor el movimiento hacia el rey y el ámbito privado del חדר en español natural. Se mantuvo ‘cámara’, ‘muy anciano’ y ‘sunamita’ como opciones adecuadas y dignas. No se requiere adjudicación adicional.
