    text: Jaquín y Boaz son transliteraciones de los nombres hebreos de los pilares, no traducciones de sus posibles significados.
    reason: lexical_alternative
  revision_rationale: Se ajusta la ubicación a «en el pórtico del templo» para reflejar mejor el sentido locativo del hebreo y la auditoría inglesa; se reemplaza la nota para que preserve la decisión documentada sobre la transliteración de los nombres; y se suavizan dos giros demasiado calcados («puso en pie», «llamó su nombre») con formulaciones españolas más naturales y fieles al mismo sentido.
