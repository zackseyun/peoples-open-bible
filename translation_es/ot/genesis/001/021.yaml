translation:
  language: es
  text: Entonces Dios creó los grandes seres marinos[a], y todo ser viviente que se mueve, de que están llenas las aguas, según sus especies, y toda ave alada según su especie. Y vio Dios que era bueno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los grandes monstruos marinos» o «los grandes dragones». El hebreo tanninim puede referirse a criaturas grandes, serpenteantes o monstruosas; aquí el contexto acuático favorece «seres marinos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּבְרָא
  english_pob_choice: created
  chosen_spanish: creó
  alternatives_spanish:
  - hizo
  - formó
  lexicon: HALOT
  rationale: En Génesis 1, ברא conserva el verbo distintivo de la obra creadora de Dios. En español, «creó» mantiene ese valor elevado y evita diluirlo en un verbo más genérico como «hizo».
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: El sujeto es el Dios único de Israel con concordancia singular en el verbo; «Dios» es la forma natural y fiel en español.
- source_word: הַתַּנִּינִם הַגְּדֹלִים
  english_pob_choice: the great sea creatures
  chosen_spanish: los grandes seres marinos
  alternatives_spanish:
  - los grandes monstruos marinos
  - los grandes dragones
  lexicon: HALOT
  rationale: תנינים puede referirse a criaturas grandes, serpenteantes o monstruosas. En este contexto acuático, «seres marinos» comunica el referente sin cargar el texto con una mitología que el contexto inmediato no exige. «Grandes» conserva el adjetivo enfático del hebreo.
- source_word: כָּל נֶפֶשׁ הַחַיָּה
  english_pob_choice: every living creature
  chosen_spanish: todo ser viviente
  alternatives_spanish:
  - toda criatura viviente
  - todo ser vivo
  lexicon: HALOT
  rationale: נפש aquí designa vida animada, no «alma» en sentido doctrinal posterior. «Ser viviente» mantiene la amplitud del hebreo y suena natural en español bíblico actual.
- source_word: הָרֹמֶשֶׂת
  english_pob_choice: that moves
  chosen_spanish: que se mueve
  alternatives_spanish:
  - que se arrastra
  - que anda
  lexicon: HALOT
  rationale: El participio de רמש abarca movimiento o reptación. «Que se mueve» preserva la amplitud semántica sin restringir el sentido a animales que se arrastran.
- source_word: אֲשֶׁר שָׁרְצוּ הַמַּיִם
  english_pob_choice: with which the waters swarmed
  chosen_spanish: con que las aguas se inundaron
  alternatives_spanish:
  - con que las aguas pulularon
  - que las aguas teemieron
  lexicon: HALOT
  rationale: שרץ expresa abundancia y proliferación. En español, «se inundaron» comunica la idea de llenarse profusamente, aunque no reproduce de manera literal la imagen de «pulular»; se prefiere una formulación fluida y digna para lectura pública.
- source_word: לְמִינֵהֶם
  english_pob_choice: according to their kinds
  chosen_spanish: según sus especies
  alternatives_spanish:
  - según sus clases
  - según sus géneros
  lexicon: HALOT
  rationale: מין en Génesis 1 señala categorías dentro de la creación. «Especies» es claro en español moderno y conserva la idea de clasificación; «según» refleja היטב la preposición lamed.
- source_word: כָּל עוֹף כָּנָף
  english_pob_choice: every winged bird
  chosen_spanish: toda ave alada
  alternatives_spanish:
  - todo pájaro alado
  - toda ave con alas
  lexicon: HALOT
  rationale: עוֹף es la categoría de las criaturas voladoras; כנף especifica que son aladas. «Ave alada» refleja ambas palabras sin sonar forzado, y mantiene el paralelismo con la primera mitad del versículo.
- source_word: לְמִינֵהוּ
  english_pob_choice: according to its kind
  chosen_spanish: según su especie
  alternatives_spanish:
  - según su clase
  - según su género
  lexicon: HALOT
  rationale: El sufijo singular en hebreo concuerda con la categoría colectiva. En español, «su especie» es idiomático y reproduce la distribución individualizada del texto.
- source_word: וַיַּרְא אֱלֹהִים כִּי טוֹב
  english_pob_choice: And God saw that it was good
  chosen_spanish: Y vio Dios que era bueno
  alternatives_spanish:
  - Y Dios vio que era bueno
  - Y vio Dios que esto era bueno
  lexicon: HALOT
  rationale: La fórmula evaluativa de Génesis 1 se conserva en una forma breve y solemne. «Era bueno» mantiene la valoración general y la cadencia tradicional del pasaje sin introducir un sujeto explícito innecesario.
theological_decisions:
- issue: Cómo traducir תַּנִּינִם en un contexto creacional sin imponer una lectura mitológica excesiva
  english_pob_reading: the great sea creatures
  chosen_spanish_reading: los grandes seres marinos
  alternative_spanish_readings:
  - los grandes monstruos marinos
  - los grandes dragones
  rationale: El contexto inmediato es la creación de las aguas y sus habitantes. «Seres marinos» preserva el campo semántico amplio de תנינים y evita sobrecargar el texto con una identificación monstruosa o legendaria que el hebreo aquí no exige. Las alternativas quedan documentadas para transparencia.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; el texto inglés más reciente aparece sin cambios, y la propuesta española sigue esa línea sin introducir variantes no sustentadas.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים, en concordancia con el uso estándar del proyecto y la concordancia singular del verbo.
  - Se usa «crear»/«creó» para ברא, preservando el verbo técnico de Génesis 1.
  - «Especie» traduce מין de manera uniforme en ambos miembros del versículo.
  - La puntuación reproduce la cadencia del paralelo hebreo con dos segmentos descriptivos y una evaluación final.
  - La nota [a] está anclada en el sintagma «seres marinos» para preservar la alternativa léxica documentada.
