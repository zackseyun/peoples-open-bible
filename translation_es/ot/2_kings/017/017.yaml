review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido del hebreo: mantiene el modismo ''hicieron pasar ... por el fuego'', distingue dos prácticas ocultistas, conserva la metáfora fuerte ''se vendieron'', usa ''Yahvé'' para יְהוָה y comunica el propósito/resultante de provocar la ira divina. La nota [a] también preserva correctamente la alternativa más explícita documentada en el rastro inglés.'
  spanish_quality_summary: 'El texto es generalmente claro y fiel, pero tiene dos puntos de naturalidad/precisión mejorables en español bíblico actual: ''provocándolo a ira'' suena calcado y menos idiomático que ''provocándolo a ira'' o mejor ''provocando su ira'' / ''provocándolo a ira''—sin embargo, para preservar mejor el causativo y el objeto, la formulación más natural es ''provocándolo a ira'' o ''para provocarlo a ira''; además, ''hacer lo malo'' es comprensible pero ''hacer el mal'' suena más natural y dignificado en este registro. Conviene también alinear la última cláusula con el infinitivo hebreo consecutivo: ''para provocarlo a ira''.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé'' correctamente; el modismo del fuego se conserva sin sobreespecificar en el texto principal; no hay conflictos con términos teológicos principales. La elección ''se vendieron'' honra la fuerza metafórica del hebreo. Se recomienda solo mejorar la idiomaticidad de ''hacer el mal'' y la cláusula final.'
  issues:
  - severity: medium
    issue: '''para hacer lo malo'' suena menos natural que ''para hacer el mal'''
    rationale: Aunque es entendible, en español bíblico y general la expresión estable es 'hacer el mal', que representa bien לַעֲשׂוֹת הָרַע sin perder fuerza moral ni sonar forzada.
  - severity: medium
    issue: '''provocándolo a ira'' es poco idiomático en español actual en esta posición'
    rationale: La idea causativa de לְהַכְעִיסוֹ debe conservarse, pero la forma gerundial más complemento 'a ira' resulta rígida. 'Para provocarlo a ira' refleja mejor el infinitivo hebreo y suena más natural en contexto; también mantiene el referente explícito de 'lo'.
  revised_spanish_text: Hicieron pasar a sus hijos y a sus hijas por el fuego[a], practicaron adivinación e interpretaron presagios, y se vendieron para hacer el mal a los ojos de Yahvé, para provocarlo a ira.
  revised_footnotes:
  - marker: a
    text: O, más explícitamente, 'sacrificaron a sus hijos y a sus hijas en el fuego'. El hebreo dice literalmente 'hicieron ... pasar por el fuego'.
    reason: lexical_alternative
  revision_rationale: 'La revisión es menor y no cambia el sentido: mejora la naturalidad y dignidad del español con ''hacer el mal'' y alinea mejor la cláusula final con el infinitivo hebreo mediante ''para provocarlo a ira'', preservando el causativo y el objeto explícito. Se mantiene intacta la decisión clave de conservar el modismo ''pasar por el fuego'' y el nombre divino ''Yahvé''.'
