revisions:
- from: Su resplandor fue como la luz; rayos[a] salían de su mano, y allí estaba escondido su poder.
  to: Su resplandor fue como la luz; rayos[a] procedían de su mano, y allí estaba oculto su poder.
  rationale: Se ajusta la segunda cláusula para expresar procedencia sin añadir el matiz más dinámico de «salían», en línea con la auditoría inglesa que evitó un verbo interpretativo. También se pule «escondido» a «oculto» por naturalidad y registro, sin cambiar el sentido.
