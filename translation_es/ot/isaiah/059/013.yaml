review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia y el sentido del hebreo: transgresión, negación de Yahvé, apartarse de seguir a Dios, hablar opresión y rebelión, y luego concebir/expresar falsedad desde el interior. También respeta la decisión teológica actual de usar «Yahvé». Sin embargo, hay varios puntos donde el español no preserva con suficiente naturalidad o precisión la fuerza del original.'
  spanish_quality_summary: 'La redacción es mayormente clara, pero contiene giros poco naturales en español bíblico actual: «volviéndose atrás de seguir» suena calcado; el punto y coma rompe innecesariamente la serie participial; «revuelta» no es la mejor opción para סָרָה en este contexto, porque en español suele sugerir disturbio popular más que rebeldía moral/covenantal; y «palabras de falsedad» es comprensible pero algo dura. Conviene alisar el español sin perder formalidad.'
  glossary_alignment: 'Alineación buena en «Yahvé», «Dios», y la conservación de la fuerza verbal. No hay conflicto con la terminología del proyecto. La principal excepción es léxica: «revuelta» no refleja tan bien como «rebelión» o «rebeldía» el campo semántico documentado para וְסָרָה en este contexto de infidelidad a Dios.'
  issues:
  - severity: medium
    issue: «y volviéndose atrás de seguir a nuestro Dios» es un giro poco natural
    rationale: Aunque intenta reflejar מֵאַחַר «de seguir/ir tras», en español estándar suena forzado. «apartándonos de seguir a nuestro Dios» o «volviéndonos atrás, dejando de seguir a nuestro Dios» preserva mejor el sentido idiomático de dejar de seguir.
  - severity: medium
    issue: «revuelta» no es la mejor elección para וְסָרָה
    rationale: En español actual «revuelta» suele evocar un alzamiento o disturbio social. El hebreo aquí apunta a rebeldía/desviación/apostasía en contexto moral y covenantal. «Rebelión» comunica mejor la fuerza sin sobreinterpretar.
  - severity: low
    issue: El punto y coma tras «nuestro Dios» interrumpe innecesariamente el paralelismo
    rationale: El hebreo presenta una cadena continua de acciones acusatorias. Una coma mantiene mejor el flujo.
  - severity: low
    issue: «palabras de falsedad» es algo rígido en español
    rationale: Es fiel al giro nominal hebreo, pero «palabras falsas» suena más natural. Aun así, puede mantenerse si se desea mayor textura formal. No es error grave.
