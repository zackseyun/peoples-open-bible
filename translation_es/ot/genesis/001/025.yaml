base_translation:
  language: en
  yaml_path: translation/ot/genesis/001/025.yaml
  text: And God made the beasts of the earth according to their kinds[a], and the livestock according to their kinds, and every creeping thing of the ground according to its kind[c][b]. And God saw that it was good.
  footnotes:
  - marker: a
    text: Or 'the wild animals of the earth.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'according to its kind' / 'according to their kinds'; the term refers to creaturely categories and should not be pressed into a modern scientific taxonomy.
    reason: cultural_note
  - marker: c
    text: Or 'every creeping thing on the earth.' The Hebrew distinguishes 'earth' earlier in the verse from 'ground' here.
    reason: lexical_alternative
