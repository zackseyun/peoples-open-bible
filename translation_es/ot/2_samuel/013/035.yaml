translation:
  language: es
  text: 'Entonces Jonadab dijo al rey[a]: «Mira, han venido los hijos del rey; tal como dijo tu siervo, así ha sucedido.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Mira, han venido los hijos del rey; tal como dijo tu siervo, así fue».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo avanza la acción. «Entonces» preserva la secuencia de manera natural en español sin perder el valor de avance del relato.
- source_word: יֽוֹנָדָב
  english_pob_choice: Jonadab
  chosen_spanish: Jonadab
  alternatives_spanish:
  - Jônadab
  lexicon: convención onomástica
  rationale: Los nombres propios se transliteran conforme al uso estándar del proyecto.
- source_word: אֶל הַמֶּלֶךְ
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - al Rey
  lexicon: HALOT
  rationale: Se refiere al rey humano David, por lo que corresponde minúscula.
- source_word: הִנֵּה
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira, pues
  - Mira bien
  - He aquí
  lexicon: HALOT
  rationale: La partícula deíctica llama la atención del oyente. «Mira» transmite inmediatez y resulta más natural que «He aquí», que en español suena más arcaico.
- source_word: בְנֵי הַמֶּלֶךְ
  english_pob_choice: the king’s sons
  chosen_spanish: los hijos del rey
  alternatives_spanish:
  - los hijos del rey
  - los hijos del monarca
  lexicon: HALOT
  rationale: La construcción posesiva se vierte de modo idiomático en español. Se conserva el plural, necesario para el sentido de la escena.
- source_word: בָּאוּ
  english_pob_choice: have come
  chosen_spanish: han venido
  alternatives_spanish:
  - vinieron
  - están viniendo
  lexicon: HALOT
  rationale: El perfecto hebreo aquí comunica llegada ya constatada; el presente perfecto español encaja bien con el valor de confirmación inmediata.
- source_word: כִּדְבַר עַבְדְּךָ
  english_pob_choice: as your servant said
  chosen_spanish: tal como dijo tu siervo
  alternatives_spanish:
  - según dijo tu siervo
  - como dijo tu siervo
  - conforme dijo tu siervo
  lexicon: HALOT
  rationale: דבר en esta construcción remite a lo dicho. «Tu siervo» conserva el registro cortesano y la autoidentificación humilde del hablante.
- source_word: כֵּן הָיָה
  english_pob_choice: so it has happened
  chosen_spanish: así ha sucedido
  alternatives_spanish:
  - así fue
  - así ocurrió
  - así ha sido
  lexicon: HALOT
  rationale: La cláusula final confirma el cumplimiento exacto de lo dicho. «Ha sucedido» mantiene la correspondencia con el resultado ya verificado y suena más natural en español que un calco rígido.
translation_notes:
  revision_awareness: 'El español sigue la revisión más reciente del POB en inglés, que ajustó la última cláusula para reflejar con mayor precisión la correspondencia hebrea: «as your servant said, so it has happened». Por eso se conserva en español la estructura comparativa-correlativa «tal como ... así ...».'
  spanish_consistency_notes:
  - Se mantiene «tu siervo» en vez de «tu esclavo» porque aquí el registro cortesano del hebreo y del POB inglés favorece la fórmula tradicional de auto-referencia subordinada.
  - Se usa «han venido» / «ha sucedido» para reproducir el valor de perfecto y la confirmación inmediata del contexto narrativo.
  - La nota a pie recoge una alternativa válida más cercana a la sintaxis literal («así fue») sin desplazar la lectura principal.
