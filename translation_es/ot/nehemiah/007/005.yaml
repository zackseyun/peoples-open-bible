revisions:
- from: 'Entonces mi Dios lo puso en mi corazón para reunir a los nobles[a], a los oficiales y al pueblo, para ser registrados por genealogía. Y hallé el libro de la genealogía de los que subieron primero[b], y hallé escrito en él:'
