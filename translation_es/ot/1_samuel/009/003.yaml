translation:
  language: es
  text: 'Ahora bien, las asnas de Kish[a], padre de Saúl, se habían perdido. Entonces Kish dijo a Saúl, su hijo: «Por favor, toma contigo a uno de los jóvenes[b] y levántate, ve, busca las asnas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «asnas», es decir, hembras de asno. Se conserva la especificidad sexual del animal porque el texto la marca explícitamente.'
    reason: lexical_alternative
  - marker: b
    text: O «uno de los siervos» o «uno de los asistentes» para «uno de los jóvenes».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֹּאבַדְנָה
  english_pob_choice: were lost
  chosen_spanish: se habían perdido
  alternatives_spanish:
  - se perdieron
  - andaban perdidas
  lexicon: HALOT
  rationale: El hebreo expresa que las asnas quedaron fuera de alcance o no pudieron encontrarse; 'se habían perdido' comunica ese estado sin implicar muerte ni añadir causa. El pluscuamperfecto narrativo funciona bien en español para el antecedente del relato.
- source_word: הָאֲתֹנוֹת
  english_pob_choice: the donkeys
  chosen_spanish: las asnas
  alternatives_spanish:
  - las burras
  - los burros
  lexicon: HALOT
  rationale: El hebreo señala específicamente hembras de asno. En español, 'asnas' conserva esa precisión y evita neutralizar el dato lexical que el POB inglés atenuó por idiomaticidad.
- source_word: לְקִישׁ
  english_pob_choice: belonging to Kish
  chosen_spanish: de Kish
  alternatives_spanish:
  - que eran de Kish
  - pertenecientes a Kish
  lexicon: HALOT
  rationale: La preposición posesiva se expresa de forma natural con 'de' en español. Es más breve y mantiene la relación de pertenencia sin sobreexplicar.
- source_word: אֲבִי שָׁאוּל
  english_pob_choice: Saul’s father
  chosen_spanish: padre de Saúl
  alternatives_spanish:
  - el padre de Saúl
  - Saúl padre
  lexicon: HALOT
  rationale: La cadena constructa se vierte de manera directa e idiomática como 'padre de Saúl', preservando la apposición explicativa del texto fuente.
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - le dijo
  - habló
  lexicon: HALOT
  rationale: Verbo narrativo estándar. 'Dijo' es la opción más natural y fiel al simple אמר sin intensificar ni matizar el acto de habla.
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - hijo suyo
  - su muchacho
  lexicon: HALOT
  rationale: Se conserva la relación filial explícita en español; la aposición ayuda a identificar a Saúl dentro de la escena narrativa.
- source_word: קַח נָא אִתְּךָ
  english_pob_choice: Please take with you
  chosen_spanish: Por favor, toma contigo
  alternatives_spanish:
  - Toma contigo, por favor
  - Te ruego que tomes contigo
  lexicon: HALOT
  rationale: '''Por favor'' representa bien la partícula נָא como suavizador del mandato. ''Contigo'' reproduce אִתְּךָ sin calco torpe.'
- source_word: אַחַד מֵהַנְּעָרִים
  english_pob_choice: one of the young men
  chosen_spanish: a uno de los jóvenes
  alternatives_spanish:
  - a uno de los muchachos
  - a uno de los servidores
  lexicon: HALOT
  rationale: נְעָרִים puede denotar jóvenes o asistentes. Se conserva la literalidad básica con 'jóvenes', siguiendo la prudencia del POB inglés al no fijar innecesariamente la función social.
- source_word: וְקוּם לֵךְ
  english_pob_choice: get up, go
  chosen_spanish: levántate, ve
  alternatives_spanish:
  - levántate y ve
  - ponte en camino
  lexicon: HALOT
  rationale: Se mantienen los dos imperativos consecutivos. 'Levántate, ve' preserva la rapidez y secuencia de acción del hebreo.
- source_word: בַּקֵּשׁ
  english_pob_choice: seek
  chosen_spanish: busca
  alternatives_spanish:
  - busca con empeño
  - anda buscando
  - busca
  lexicon: HALOT
  rationale: Aunque el POB inglés prefirió 'seek' por registro, en español 'busca' es la forma más natural y adecuada al contexto práctico. Mantiene la idea de búsqueda sin elevar indebidamente el tono.
translation_notes:
  revision_awareness: El borrador inglés base decía “look for”, pero la revisión aprobada lo ajustó a “seek” por un registro ligeramente más formal y más cercano al fuente. En español se optó por “busca”, que conserva el sentido de búsqueda con naturalidad; se mantuvo además la precisión de 'asnas' para reflejar la forma hebrea específica.
  spanish_consistency_notes:
  - Se usa 'Saúl' sin artículo porque el texto lo presenta como nombre propio en función de complemento del verbo de habla.
  - '''Kish'' se conserva transliterado para mantener consistencia con el expediente inglés y la tradición de nombres propios del POB.'
  - Se evita 'SEÑOR' u otro término teológico porque no aparece ningún nombre divino en este versículo.
  - La puntuación reproduce la división narrativa y el discurso directo de manera clara para lectura pública.
