revisions:
- from: Ahora bien, la caída[a] de Ocozías, al ir a Joram, fue de Dios; y cuando llegó, salió con Joram contra Jehú, hijo de Nimsi, a quien Yahvé había ungido para exterminar la casa de Acab.
  to: La caída[a] de Ocozías, al ir a Joram, fue de Dios; y cuando llegó, salió con Jehoram hacia Jehú[b], hijo de Nimsi, a quien Yahvé había ungido para eliminar[c] la casa de Acab.
  rationale: La revisión devuelve al texto principal la neutralidad de אֶל («hacia/a Jehú») y traslada la lectura hostil a nota, en línea con la auditoría inglesa y el hebreo. También preserva la variación formal Joram/Jehoram presente en el original y sustituye «exterminar» por «eliminar» con nota para retener mejor el modismo de «cut off». Se elimina «Ahora bien» por innecesario.
  reviewer_model: gpt-5.4
