revisions:
- from: 'Entonces Absalón mandó a sus jóvenes[a], diciendo: “Por favor, observen: cuando el corazón de Amnón esté alegre por el vino, y yo les diga: ‘Golpeen a Amnón’, entonces mátenlo. No teman. ¿No les he dado yo mismo la orden? Sean fuertes y sean hombres de valor.”'
  to: 'Entonces Absalón mandó a sus hombres,[a] diciendo: “Por favor, fíjense: cuando el corazón de Amnón esté alegre por el vino, y yo les diga: ‘Golpeen a Amnón’, entonces mátenlo. No teman. ¿No les he dado yo mismo la orden? Sean fuertes y sean hombres de valor.”'
  rationale: Se cambia 'sus jóvenes' por 'sus hombres' para reflejar mejor el sentido contextual de נְעָרָיו en español natural y claro. Se ajusta 'observen' a 'fíjense' por mayor idiomaticidad en una instrucción de estar atentos a una señal. La nota se simplifica levemente para un español más fluido, manteniendo la preservación del modismo hebreo.
