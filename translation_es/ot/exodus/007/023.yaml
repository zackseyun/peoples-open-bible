translation:
  language: es
  text: Faraón se volvió y entró en su casa, y no tomó ni siquiera esto a pecho[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no puso su corazón en esto» o «no le prestó atención ni siquiera a esto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּפֶן
  english_pob_choice: turned
  chosen_spanish: se volvió
  alternatives_spanish:
  - se giró
  - volvió la vista
  - se dio vuelta
  lexicon: HALOT
  rationale: פּנה puede expresar simplemente volverse o girarse. «Se volvió» conserva el movimiento narrativo del hebreo sin introducir una dirección adicional que el texto no explicita.
- source_word: פַּרְעֹה
  english_pob_choice: Pharaoh
  chosen_spanish: Faraón
  alternatives_spanish:
  - Pharaón
  lexicon: nombre propio/tradición bíblica
  rationale: En español bíblico estándar, «Faraón» es la forma establecida y clara para el nombre/título egipcio.
- source_word: וַיָּבֹא אֶל בֵּיתוֹ
  english_pob_choice: went into his house
  chosen_spanish: entró en su casa
  alternatives_spanish:
  - fue a su casa
  - entró a su casa
  lexicon: HALOT
  rationale: בוא con אֶל indica entrada hacia un lugar. «Entró en su casa» preserva el sentido de ingreso y suena natural en español narrativo.
- source_word: וְלֹא שָׁת לִבּוֹ
  english_pob_choice: he did not take ... to heart
  chosen_spanish: no le prestó atención
  alternatives_spanish:
  - no lo tomó a pecho
  - no puso su corazón en ello
  - no lo tomó en serio
  lexicon: HALOT
  rationale: El hebreo idiomático significa atender seriamente o considerar de verdad. En español, «no le prestó atención» comunica esa falta de respuesta, aunque no reproduce literalmente la metáfora del corazón.
- source_word: גַּם לָזֹאת
  english_pob_choice: even this
  chosen_spanish: ni siquiera a esto
  alternatives_spanish:
  - incluso a esto
  - también a esto
  - aun esto
  lexicon: HALOT
  rationale: גַּם intensifica («incluso/ni siquiera») y לָזֹאת refiere a la plaga o señal presente. «Ni siquiera a esto» conserva la fuerza intensificadora mejor que un simple «a esto».
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail en inglés: וַיִּפֶן como movimiento de giro, וַיָּבֹא como entrada a la casa, y שָׁת לִבּוֹ como un modismo de atención/consideración. Se ha mantenido la intensidad de גַּם con «ni siquiera».'
  spanish_consistency_notes:
  - Se usa «Faraón» como forma española estable para פַּרְעֹה.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino.
  - Se mantiene el pronombre objeto dativo impersonal «le» en español para reflejar el idioma natural de «prestar atención».
