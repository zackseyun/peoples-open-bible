review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la lista de vicios del hebreo y la fuerza de פָּרָצוּ como irrupción descontrolada. Sin embargo, hay dos problemas de alineación: el anclaje de notas está invertido respecto del contenido, y «sangre sigue a sangre» debilita el sentido idiomático de דָמִים como «derramamiento de sangre / violencia sangrienta», que el inglés POB hizo explícito. La nota sobre «maldición» debe ir anclada a ese término, y la nota literal sobre «sangres tocan sangres» debe ir al sintagma final.'
  spanish_quality_summary: El español es legible y digno, pero el marcador inicial [a] antes de «Maldición» es torpe y además remite a la nota equivocada. «Se desatan» funciona bien para פָּרָצוּ. Para claridad natural y fidelidad semántica, «derramamiento de sangre sigue a derramamiento de sangre» comunica mejor el modismo que «sangre sigue a sangre», que en español suena más opaco y menos preciso.
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos aquí. «Asesinato», «robo», «adulterio» y «se desatan» son adecuados. La principal cuestión léxica es דָמִים, donde conviene seguir la decisión auditada de «bloodshed» con «derramamiento de sangre» en lugar de solo «sangre». También conviene conservar la alternativa de אָלֹה como juramento falso/violación de juramento en nota.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas a los lugares equivocados.
    rationale: 'En el texto, [a] aparece junto a «Maldición», pero la nota a dice «Hebreo, literalmente: “sangres tocan sangres”», que corresponde al final del versículo. La nota b está anclada a «se desatan», pero su contenido trata sobre «Maldición». Esto rompe la trazabilidad exigida entre marcador y palabra/frase relevante.'
  - severity: medium
    issue: «Sangre sigue a sangre» no expresa con suficiente claridad el valor idiomático de דָמִים.
    rationale: Aunque la nota explica el literal hebreo, en español la frase principal queda ambigua y menos idiomática. El POB inglés optó por «bloodshed follows bloodshed» para explicitar el sentido. «Derramamiento de sangre sigue a derramamiento de sangre» o equivalente preserva mejor el significado fuente.
  - severity: low
    issue: La nota literal añade «sin cesar», matiz algo más fuerte que el audit trail.
    rationale: El inglés habla de actos que vienen uno tras otro; «sin cesar» intensifica ligeramente. No es grave, pero puede ajustarse a una formulación más cercana al expediente auditado.
  revised_spanish_text: Maldición[a], mentira, asesinato, robo y adulterio se desatan; derramamiento de sangre sigue a derramamiento de sangre[b].
