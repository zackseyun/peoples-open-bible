translation:
  language: es
  text: Pero si da a luz una niña, entonces será impura durante dos semanas, como en su menstruación[a]; y durante sesenta y seis días permanecerá en la sangre de purificación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más explícita, «como durante su impureza menstrual». El hebreo compara la impureza posparto con el estado asociado a la menstruación.
    reason: lexical_alternative
  - marker: b
    text: «La sangre de purificación» se refiere al período prescrito de purificación posparto, no a culpa moral.
    reason: cultural_note
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: La partícula introduce un caso contrastivo frente al versículo anterior; «Pero si» conserva el matiz adversativo/disyuntivo sin perder la condición.
- source_word: נְקֵבָה
  english_pob_choice: a female child
  chosen_spanish: una niña
  alternatives_spanish:
  - una hija
  - una hembra
  lexicon: HALOT
  rationale: En el contexto de parto, «niña» comunica naturalmente la referencia a un hijo femenino. «Una hija» es posible, pero suena un poco más interpretativa respecto al hebreo, que solo marca el sexo.
- source_word: תֵלֵד
  english_pob_choice: she gives birth
  chosen_spanish: da a luz
  alternatives_spanish:
  - alumbra
  - pare
  lexicon: HALOT
  rationale: Es la equivalencia idiomática natural en español para el acto de dar a luz, manteniendo el sentido verbal del contexto obstétrico.
- source_word: וְטָמְאָה
  english_pob_choice: then she shall be unclean
  chosen_spanish: entonces será impura
  alternatives_spanish:
  - entonces será inmunda
  - entonces quedará impura
  lexicon: HALOT
  rationale: «Impura» conserva el valor ritual de טמא sin sugerir suciedad física o culpa moral. «Quedará impura» añade matiz resultativo válido, pero aquí el futuro simple mantiene la forma legal breve.
- source_word: שְׁבֻעַיִם
  english_pob_choice: for two weeks
  chosen_spanish: durante dos semanas
  alternatives_spanish:
  - por dos semanas
  - por dos sevens
  lexicon: HALOT
  rationale: El dual en este contexto equivale a dos semanas; «durante» expresa mejor la duración legal del estado que un «por» más ambiguo.
- source_word: כְּנִדָּתָהּ
  english_pob_choice: as in her menstruation
  chosen_spanish: como en su menstruación
  alternatives_spanish:
  - como en el tiempo de su impureza menstrual
  - como durante su período menstrual
  lexicon: HALOT
  rationale: «Menstruación» refleja el campo léxico básico de נִדָּה y mantiene la comparación breve. No se amplía en el texto principal a «impureza menstrual» para no añadir interpretación, aunque esa precisión queda implícita y puede explicarse en nota.
- source_word: וְשִׁשִּׁים יוֹם וְשֵׁשֶׁת יָמִים
  english_pob_choice: for sixty-six days
  chosen_spanish: durante sesenta y seis días
  alternatives_spanish:
  - y sesenta días y seis días
  - por sesenta y seis días
  lexicon: HALOT
  rationale: El español fluye naturalmente con el número compuesto «sesenta y seis días», conservando exactamente la cantidad sin calco innecesario.
- source_word: תֵּשֵׁב
  english_pob_choice: she shall remain
  chosen_spanish: permanecerá
  alternatives_spanish:
  - se quedará
  - estará
  lexicon: HALOT
  rationale: Aunque literalmente es «sentarse» o «habitar», en el marco legal expresa continuidad en un estado. «Permanecerá» comunica bien esa duración status-legal en español.
- source_word: עַל
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - sobre
  - a causa de
  lexicon: HALOT
  rationale: Con la expresión siguiente forma una construcción idiomática de estado/condición. «En» es la opción más clara y menos forzada en español.
- source_word: דְּמֵי טָהֳרָה
  english_pob_choice: the blood of purification
  chosen_spanish: la sangre de purificación
  alternatives_spanish:
  - la sangre de su purificación
  - la sangre purificadora
  - el tiempo de purificación
  lexicon: HALOT
  rationale: Se conserva el sustantivo «sangre» para reflejar el hebreo דָּמִים y su valor ritual. «De purificación» mantiene el carácter técnico de la frase; no se interpreta como culpa moral ni se reemplaza por una perífrasis que diluya el trasfondo cultual.
theological_decisions:
- issue: Impureza ritual versus pecado moral
  english_pob_reading: Render טמא/unclean in ritual-cultic terms without implying personal sin or moral defilement.
  chosen_spanish_reading: Traducir טמא como «impura» en sentido ritual, sin sugerir pecado ni suciedad moral.
  alternative_spanish_readings:
  - ceremonialemente impura
  - ritualmente impura
  rationale: El contexto de Levítico trata de estatus cultual tras el parto, no de culpa ética. «Impura» mantiene la terminología bíblica básica; la nota puede aclarar que se trata de una categoría ritual.
  doctrine_reference: 'Leviticus 12:5; translation philosophy: preservar el sentido cultual del texto sin añadir acusación moral.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y la lectura hebrea directa: conserva la estructura legal, la duración exacta y el lenguaje ritual de impureza/purificación, con adaptación natural al español. No se detectan revisiones previas pendientes en el pasaje base.'
  spanish_consistency_notes:
  - Se mantiene «impura» para טמא y «sangre de purificación» para דְּמֵי טָהֳרָה, en coherencia con el léxico POB de otros textos legales.
  - «Pero si» reproduce el valor contrastivo de וְאִם sin volver la frase excesivamente literal.
  - La nota a explica la comparación menstrual sin mover esa precisión al texto principal.
  - La nota b evita una lectura moralizante de la purificación posparto.
