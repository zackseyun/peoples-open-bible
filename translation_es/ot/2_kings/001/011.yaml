translation:
  language: es
  text: 'Otra vez le envió otro capitán de cincuenta con sus cincuenta. Él respondió y le dijo: «Hombre de Dios, así dice el rey: “Desciende[a] pronto”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «baja pronto». El hebreo del verbo solo significa «bajar/descender»; «desciende» conserva esa neutralidad, sin resolver en la superficie del español la dirección pragmática del mandato.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשָׁב
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Otra vez más
  lexicon: HALOT
  rationale: En este contexto narrativo, el verbo marca repetición de la acción anterior más que un retorno físico. «Otra vez» comunica bien la reiteración y suena natural en español.
- source_word: וַיִּשְׁלַח אֵלָיו
  english_pob_choice: he sent to him
  chosen_spanish: envió a él
  alternatives_spanish:
  - lo envió
  - envió hacia él
  lexicon: HALOT
  rationale: El movimiento es dirigido a Elías; en español, «envió a él» mantiene la referencia directa del hebreo y evita añadir más interpretación que el contexto ya da.
- source_word: שַׂר חֲמִשִּׁים
  english_pob_choice: captain of fifty
  chosen_spanish: un capitán de cincuenta
  alternatives_spanish:
  - un comandante de cincuenta
  - un jefe de cincuenta
  lexicon: HALOT
  rationale: Es un título militar fijo en la narrativa. «Capitán de cincuenta» es claro y suficientemente fiel al oficio indicado por el hebreo.
- source_word: אַחֵר
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - distinto
  - uno más
  lexicon: HALOT
  rationale: 'El hebreo señala sustitución del capitán anterior por uno nuevo. En español, ese valor se expresa naturalmente por el artículo y el adjetivo implícito en la estructura: «un capitán de cincuenta ...».'
- source_word: וַחֲמִשָּׁיו
  english_pob_choice: with his fifty
  chosen_spanish: con sus cincuenta
  alternatives_spanish:
  - y sus cincuenta
  lexicon: HALOT
  rationale: La conjunción hebrea aquí expresa acompañamiento. «Con sus cincuenta» conserva la relación entre el capitán y la tropa a su cargo.
- source_word: וַיַּעַן וַיְדַבֵּר
  english_pob_choice: He answered and said
  chosen_spanish: Él respondió y le dijo
  alternatives_spanish:
  - Respondió y habló
  - Contestó y le habló
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se expresa en español con el par tradicional «respondió y le dijo», que comunica tanto la respuesta como la introducción formal del discurso.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: Man of God
  chosen_spanish: Hombre de Dios
  alternatives_spanish:
  - Varón de Dios
  - O hombre de Dios
  lexicon: HALOT
  rationale: Es un título reconocido para Elías. «Hombre de Dios» es la forma más natural y reverente en español; el vocativo queda claro por la puntuación y el contexto.
- source_word: כֹּה אָמַר הַמֶּלֶךְ
  english_pob_choice: thus says the king
  chosen_spanish: así dice el rey
  alternatives_spanish:
  - esto dice el rey
  - el rey dice así
  lexicon: HALOT
  rationale: La fórmula de mensajero se conserva con su tono de autoridad. «Así dice» mantiene el color bíblico y el peso del anuncio regio.
- source_word: מְהֵרָה
  english_pob_choice: quickly
  chosen_spanish: pronto
  alternatives_spanish:
  - de prisa
  - rápidamente
  lexicon: HALOT
  rationale: El adverbio expresa urgencia. «Pronto» es natural en español y suficientemente intenso sin sonar forzado.
- source_word: רֵדָה
  english_pob_choice: Come down / Go down
  chosen_spanish: Desciende
  alternatives_spanish:
  - Baja
  - Ve abajo
  lexicon: HALOT
  rationale: El hebreo simplemente significa «bajar/descender». «Desciende» preserva el valor verbal sin decidir en español por «venir» frente a «ir»; la dirección queda implícita por la escena.
translation_notes:
  revision_awareness: La versión inglesa auditada no introdujo revisiones textuales ni cambios de filosofía en esta unidad; se mantiene el sentido repetitivo de וַיָּשָׁב, la fórmula mensajera y la ambigüedad direccional de רֵדָה. La nota de la POB inglesa sobre «come down/go down» se reflejó en español con una glosa alternativa equivalente.
  spanish_consistency_notes:
  - Se mantiene «Dios» y no aparece YHWH en este versículo.
  - Se usó «Hombre de Dios» como título establecido para Elías, coherente con el registro bíblico.
  - «Desciende» conserva la neutralidad del hebreo רֵדָה; la nota explica la alternativa idiomática «baja».
