translation:
  language: es
  text: Con equidad los conducirá a todos, y no habrá entre ellos arrogancia para oprimirse unos a otros[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «y no habrá entre ellos arrogancia de que alguien sea oprimido entre ellos». El infinitivo griego es formalmente pasivo y difícil; el texto principal da el sentido probable en contexto: no habrá entre ellos arrogancia que lleve a la opresión dentro del pueblo.'
    reason: alternative_reading
  - marker: b
    text: 'O: «para que alguno sea oprimido entre ellos».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ἰσότητι
  english_pob_choice: with equity
  chosen_spanish: con equidad
  alternatives_spanish:
  - con igualdad
  - con imparcialidad
  - equitativamente
  lexicon: LSJ
  rationale: ἰσότης puede denotar igualdad o trato equitativo. En español, «con equidad» comunica bien la idea de gobierno justo e imparcial sin sonar forzado ni reducir el matiz relacional del contexto real/mesiánico.
- source_word: πάντας αὐτοὺς
  english_pob_choice: them all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a todos los conducirá
  - a todos por igual
  lexicon: LSJ
  rationale: La expresión es totalizadora. «A todos» mantiene la extensión completa del grupo sin añadir énfasis innecesario en español.
- source_word: ἄξει
  english_pob_choice: he will lead
  chosen_spanish: los conducirá
  alternatives_spanish:
  - los guiará
  - los llevará
  - los dirigirá
  lexicon: LSJ
  rationale: ἄγω puede significar «conducir/guíar». «Conducirá» conserva la imagen de liderazgo activo y encaja con el tono de gobierno del pasaje.
- source_word: ὑπερηφανία
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - soberbia
  - orgullo
  - altivez
  lexicon: LSJ
  rationale: El sustantivo describe una actitud levantada y dominante. «Arrogancia» es claro en español moderno y se ajusta al contexto de dominio social que sigue.
- source_word: τοῦ καταδυναστευθῆναι
  english_pob_choice: to oppress one another
  chosen_spanish: para que alguno oprima a otro
  alternatives_spanish:
  - para ser oprimidos entre ellos
  - para que se opriman unos a otros
  - para que alguno sea oprimido entre ellos
  lexicon: LSJ
  rationale: 'El infinitivo aoristo pasivo es gramaticalmente difícil en relación con «arrogancia». La POB inglesa optó por el sentido probable: evitar la dominación opresiva dentro del pueblo. El español conserva esa lectura sin perder la tensión del giro griego.'
- source_word: ἐν αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en ellos
  - dentro de ellos
  - entre los cuales
  lexicon: LSJ
  rationale: Con un referente plural personal, «entre ellos» expresa de modo natural la relación interna de la comunidad.
theological_decisions:
- issue: Naturaleza de la igualdad/equidad del reinado
  english_pob_reading: The verse describes the ruler’s community as marked by equitable leadership and freedom from internal oppression.
  chosen_spanish_reading: El versículo presenta un gobierno justo y comunitario, libre de opresión interna.
  alternative_spanish_readings:
  - Una afirmación abstracta sobre igualdad sin implicaciones sociales
  - Una proclamación ideológica más fuerte de la que dice el texto
  rationale: El griego subraya una conducción justa y la ausencia de dominación arrogante entre el pueblo. La traducción española conserva esa dimensión ética y social sin ampliar el alcance del verso.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Resolución del infinitivo pasivo difícil
  english_pob_reading: 'The Greek infinitive is formally passive and difficult; the main text gives the likely sense in context: no one among them will act arrogantly so as to oppress another.'
  chosen_spanish_reading: 'Se mantiene en español una formulación que expresa el efecto: que ninguno llegue a oprimir a otro.'
  alternative_spanish_readings:
  - que cualquiera sea oprimido entre ellos
  - para que se oprima uno a otro
  rationale: La forma pasiva del griego no se deja trasladar de manera elegante sin oscurecer el sentido. La redacción española refleja el resultado social que el contexto exige y preserva la dificultad interpretativa en la nota.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisión inglés: la primera solución activaba el infinitivo de manera más libre, y la revisión posterior prefería una redacción más natural. En español se siguió esa segunda línea, pero sin perder la nota del pasivo griego y su dificultad sintáctica.'
  spanish_consistency_notes:
  - Se conserva «equidad» para ἐν ἰσότητι, coherente con el valor jurídico-social del sustantivo.
  - Se evita «Cristo» y «SEÑOR» porque no aparecen en este verso; tampoco se introduce terminología eclesiástica ajena al griego.
  - «Conducirá» y «entre ellos» mantienen un registro sobrio y publicable sin calco mecánico.
  - La nota principal preserva la tensión del pasivo griego sin volverla excesivamente técnica en el texto base.
