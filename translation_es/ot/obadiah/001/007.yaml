translation:
  language: es
  text: Todos los hombres de tu pacto te han enviado a la frontera[a]; los hombres en paz contigo te han engañado y han prevalecido contra ti. Los que comen tu pan han puesto una trampa bajo ti[b]—no hay discernimiento en él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te han expulsado hasta la frontera» o «te han escoltado hasta la frontera». El verbo hebreo puede tener en este contexto un matiz neutral u hostil.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «han puesto un lazo bajo ti». La palabra hebrea traducida «trampa» es rara y su matiz preciso es incierto.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no hay entendimiento en él», posiblemente refiriéndose a Edom; algunos entienden «en ello» o interpretan la línea de otra manera porque el referente hebreo es ambiguo.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַד הַגְּבוּל
  english_pob_choice: to the border
  chosen_spanish: hasta la frontera
  alternatives_spanish:
  - hasta el límite
  - hasta la frontera misma
  - a la frontera
  lexicon: HALOT
  rationale: La frase indica el destino al que es llevado o escoltado Edom. «Hasta la frontera» conserva la imagen espacial concreta sin decidir de antemano si el matiz es expulsión, envío o escolta.
- source_word: שִׁלְּחוּךָ
  english_pob_choice: have sent you
  chosen_spanish: te han enviado
  alternatives_spanish:
  - te han expulsado
  - te han escoltado
  - te han echado fuera
  lexicon: HALOT
  rationale: El piel de שלח puede significar enviar/mandar lejos. «Te han enviado» mantiene la amplitud del hebreo y deja que el contexto aporte el tono hostil o neutral.
- source_word: אַנְשֵׁי בְרִיתֶךָ
  english_pob_choice: the men of your covenant
  chosen_spanish: los hombres de tu pacto
  alternatives_spanish:
  - tus aliados
  - los hombres ligados a ti por pacto
  - los hombres de tu alianza
  lexicon: HALOT
  rationale: «Pacto» reproduce de forma directa el lenguaje relacional y político del hebreo. Se evita reducirlo sin más a «aliados», para no perder la fuerza del término.
- source_word: הִשִּׁיאוּךָ
  english_pob_choice: have deceived you
  chosen_spanish: te han engañado
  alternatives_spanish:
  - te han seducido
  - te han hecho caer en error
  - te han inducido a engaño
  lexicon: HALOT
  rationale: En este contexto hostil, el hiphil de נשא transmite la idea de inducir a engaño. «Engañado» es la equivalencia española más clara y natural.
- source_word: יָכְלוּ לְךָ
  english_pob_choice: have prevailed against you
  chosen_spanish: han prevalecido contra ti
  alternatives_spanish:
  - te han vencido
  - han podido contigo
  - han triunfado sobre ti
  lexicon: HALOT
  rationale: La locución expresa que lograron imponerse. «Han prevalecido contra ti» sigue de cerca la revisión inglesa y conserva el tono formal del hebreo.
- source_word: אַנְשֵׁי שְׁלֹמֶךָ
  english_pob_choice: the men at peace with you
  chosen_spanish: los hombres en paz contigo
  alternatives_spanish:
  - tus amigos
  - los hombres de tu paz
  - tus aliados pacíficos
  lexicon: HALOT
  rationale: Literalmente es «hombres de tu paz». «En paz contigo» preserva la relación pacífica sin desplazarla hacia una mera amistad moderna.
- source_word: לַחְמְךָ
  english_pob_choice: your bread
  chosen_spanish: tu pan
  alternatives_spanish:
  - tu alimento
  - tu comida
  - tu mesa
  lexicon: HALOT
  rationale: Se conserva «pan» para mantener la imagen hebrea de la hospitalidad y la fidelidad compartida en la mesa.
- source_word: יָשִׂימוּ מָזוֹר תַּחְתֶּיךָ
  english_pob_choice: have set a trap under you
  chosen_spanish: han tendido una trampa debajo de ti
  alternatives_spanish:
  - han puesto un lazo debajo de ti
  - han tendido un lazo bajo ti
  - han colocado una trampa bajo ti
  lexicon: HALOT
  rationale: מָזוֹר es un término raro y su matiz exacto es incierto. «Tendido una trampa debajo de ti» mantiene la imagen subyacente y la ambigüedad lexical sin forzar una interpretación más precisa de la que permite el hebreo.
- source_word: אֵין תְּבוּנָה בּוֹ
  english_pob_choice: there is no understanding in him
  chosen_spanish: no hay discernimiento en él
  alternatives_spanish:
  - no hay entendimiento en él
  - no tiene discernimiento
  - no hay comprensión en él
  lexicon: HALOT
  rationale: «Discernimiento» comunica la capacidad de percibir y entender a tiempo. Se conserva el posible referente masculino singular del sufijo final, tal como lo deja el hebreo.
theological_decisions:
- issue: Referencia del sufijo final en בּוֹ
  english_pob_reading: there is no understanding in him; possibly referring to Edom; some understand 'in it' or take the line differently because the Hebrew referent is ambiguous.
  chosen_spanish_reading: no hay discernimiento en él
  alternative_spanish_readings:
  - no hay discernimiento en ello
  - no hay discernimiento allí
  - no hay discernimiento en eso
  rationale: El hebreo permite más de un referente, pero el masculino singular es la lectura más directa. En español se conserva «en él» y se mantiene la ambigüedad implícita sin resolverla de manera artificial.
  doctrine_reference: Ambigüedad referencial del texto hebreo; cf. lectura prudente de variantes de referente en la exégesis.
translation_notes:
  revision_awareness: El inglés auditado fue revisado para acercar יָכְלוּ לְךָ a «prevailed against you». La versión española sigue esa revisión con «han prevalecido contra ti», y conserva las tres notas de ambigüedad lexical/referencial en los puntos donde el hebreo lo exige.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton.
  - Se usa «pacto» para בְרִית y no «alianza» como forma primaria, para reflejar el lenguaje pactal del hebreo y la práctica POB de conservar la terminología contractual.
  - Se conserva la imagen de «pan» para לַחְם en lugar de «alimento» para no perder la referencia a la mesa y la hospitalidad.
  - Se prefiere «discernimiento» para תְּבוּנָה por su tono bíblico y su amplitud semántica, sin neutralizar la posible ambigüedad del referente final.
