revisions:
- from: Entonces Salomón despertó[a], y he aquí, era un sueño. Y vino a Jerusalén y se puso delante del arca del pacto de Yahvé, y ofreció holocaustos y hizo sacrificios de paz, e hizo un banquete para todos sus siervos.
  to: Entonces Salomón despertó, y he aquí, era un sueño. Y vino a Jerusalén y se puso delante del arca del pacto de Yahvé, y ofreció holocaustos y hizo sacrificios de paz[a], e hizo un banquete para todos sus siervos.
  rationale: Se elimina la nota errónea sobre «despertó» porque no está sustentada por el hebreo ni por el audit trail inglés, y se traslada la nota al término correcto, שְׁלָמִים, preservando la alternativa léxica documentada. El texto principal se mantiene casi intacto porque es sustancialmente fiel, claro y alineado con la terminología del proyecto.
