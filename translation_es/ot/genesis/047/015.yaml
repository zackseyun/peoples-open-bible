translation:
  language: es
  text: 'Cuando el dinero de la tierra de Egipto y de la tierra de Canaán se acabó[a], todos los egipcios[b] vinieron a José, diciendo: «Danos[c] pan. ¿Por qué hemos de morir ante ti? Porque el dinero se acabó».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la plata se acabó»; כֶּסֶף puede significar «plata» o «dinero».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «todo Egipto vino a José».
    reason: lexical_alternative
  - marker: c
    text: «Pan» aquí puede abarcar más ampliamente alimento en el contexto de la hambruna.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֹּם
  english_pob_choice: was gone
  chosen_spanish: se acabó
  alternatives_spanish:
  - terminó
  - se agotó
  - se consumió
  lexicon: HALOT
  rationale: El verbo indica agotamiento o consumación del suministro. «Se acabó» es natural en español y conserva la idea de que el dinero llegó a su fin.
- source_word: הַכֶּסֶף
  english_pob_choice: the money
  chosen_spanish: el dinero
  alternatives_spanish:
  - la plata
  - el efectivo
  lexicon: HALOT
  rationale: כֶּסֶף puede significar «plata» o «dinero». En este contexto de intercambio por alimento durante la hambruna, «dinero» comunica mejor el medio de pago que la referencia al metal.
- source_word: מֵאֶרֶץ מִצְרַיִם וּמֵאֶרֶץ כְּנַעַן
  english_pob_choice: from the land of Egypt and from the land of Canaan
  chosen_spanish: de la tierra de Egipto y de la tierra de Canaán
  alternatives_spanish:
  - desde la tierra de Egipto y desde la tierra de Canaán
  - de Egipto y de Canaán
  lexicon: HALOT
  rationale: Se mantiene la referencia territorial con «de la tierra de», que refleja bien el hebreo מן con אֶרֶץ sin perder claridad en español.
- source_word: וַיָּבֹאוּ כָל מִצְרַיִם
  english_pob_choice: all the Egyptians came
  chosen_spanish: todos los egipcios vinieron
  alternatives_spanish:
  - todo Egipto vino
  - vino toda la gente de Egipto
  lexicon: HALOT
  rationale: El hebreo dice literalmente «todo Egipto», pero el referente son las personas. «Todos los egipcios» comunica el sentido colectivo de manera clara y natural.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijeron
  - al decir
  lexicon: HALOT
  rationale: La forma de infinitivo introduciendo discurso directo se conserva con «diciendo», que mantiene el flujo narrativo del hebreo.
- source_word: הָבָה לָּנוּ לֶחֶם
  english_pob_choice: Give us bread
  chosen_spanish: Denos pan
  alternatives_spanish:
  - Danos pan
  - Danos alimento
  - Provéanos de pan
  lexicon: HALOT
  rationale: הָבָה es una orden/apremio del tipo «da/provee». Se usa «Denos» para reflejar el plural de petición dirigido a José con dignidad; «pan» conserva el literal hebreo y su posible sentido amplio de alimento en contexto de hambre.
- source_word: וְלָמָּה נָמוּת
  english_pob_choice: Why should we die
  chosen_spanish: ¿Por qué hemos de morir?
  alternatives_spanish:
  - ¿Por qué vamos a morir?
  - ¿Por qué deberíamos morir?
  lexicon: HALOT
  rationale: La pregunta es retórica y urgente. «Hemos de morir» reproduce bien la fuerza de la construcción sin sonar artificial en español.
- source_word: נֶגְדֶּךָ
  english_pob_choice: before you
  chosen_spanish: delante de usted
  alternatives_spanish:
  - ante usted
  - en su presencia
  lexicon: HALOT
  rationale: נֶגֶד indica estar frente a alguien. «Delante de usted» expresa con claridad la imagen de morir en la presencia directa de José, y respeta el registro reverente del trato.
- source_word: כִּי אָפֵס כָּסֶף
  english_pob_choice: For the money is gone
  chosen_spanish: Porque el dinero se acabó
  alternatives_spanish:
  - Porque ya no queda dinero
  - Porque se acabó la plata
  lexicon: HALOT
  rationale: 'אָפֵס expresa cesación o inexistencia. Se mantiene la correspondencia con la primera cláusula: el dinero «se acabó».'
translation_notes:
  revision_awareness: Se siguió la revisión auditada del inglés POB que prefirió «before you» sobre una expresión más figurada. En español se reflejó con «delante de usted», que conserva la cercanía semántica y el trato respetuoso, sin introducir una imagen distinta.
  spanish_consistency_notes:
  - Se mantuvo «Dios/Yahvé» sin necesidad de cambio en este versículo, ya que no aparece ningún término divino.
  - Se eligió «dinero» como término principal para כֶּסֶף, pero se preservó la alternativa «plata» en nota por la ambigüedad léxica documentada.
  - El registro de tratamiento pasó a «usted» para mantener cortesía y coherencia con el contexto narrativo.
  - Se evitó calcar el inglés cuando el español podía expresar mejor la misma imagen, especialmente en la petición directa y la pregunta retórica.
