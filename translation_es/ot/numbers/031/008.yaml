translation:
  language: es
  text: 'Mataron a los reyes de Madián entre el resto de sus muertos[a]: Evi, Rekem, Zur, Hur y Reba, los cinco reyes de Madián. También mataron a Balaam hijo de Beor con la espada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre sus muertos». La expresión hebrea es breve y puede describir a los reyes como muertos en medio de los demás caídos.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרְגוּ
  english_pob_choice: they killed
  chosen_spanish: mataron
  alternatives_spanish:
  - los mataron
  - dieron muerte a
  lexicon: HALOT
  rationale: El verbo hebreo denota matar de manera directa. «Mataron» es natural en español actual y conserva la fuerza simple del texto sin añadir matiz interpretativo.
- source_word: עַל חַלְלֵיהֶם
  english_pob_choice: along with the rest of their slain
  chosen_spanish: junto con el resto de sus muertos
  alternatives_spanish:
  - entre sus muertos
  - además de los que ya habían caído
  lexicon: HALOT
  rationale: La construcción hebrea es compacta y puede entenderse como una relación con los muertos ya presentes. «Junto con el resto de sus muertos» refleja bien la lectura auditada en inglés y mantiene la ambigüedad espacial/relacional sin sobreexplicarla.
- source_word: מַלְכֵי מִדְיָן
  english_pob_choice: the kings of Midian
  chosen_spanish: los reyes de Madián
  alternatives_spanish:
  - los reyes midianitas
  lexicon: HALOT
  rationale: 'El constructo hebreo indica posesión o pertenencia: reyes de Madián. «Madián» mantiene el nombre bíblico de forma reconocible y evita una paráfrasis étnica menos transparente.'
- source_word: אֱוִי
  english_pob_choice: Evi
  chosen_spanish: Evi
  alternatives_spanish:
  - Ewi
  lexicon: transliteration
  rationale: Nombre propio; se conserva la transliteración estándar.
- source_word: רֶקֶם
  english_pob_choice: Rekem
  chosen_spanish: Rekem
  alternatives_spanish:
  - Recem
  lexicon: transliteration
  rationale: Nombre propio; se mantiene la forma transliterada recibida por la tradición bíblica en español/inglés.
- source_word: צוּר
  english_pob_choice: Zur
  chosen_spanish: Zur
  alternatives_spanish:
  - Tsur
  lexicon: transliteration
  rationale: Nombre propio; se conserva «Zur», la forma bíblica más extendida.
- source_word: חוּר
  english_pob_choice: Hur
  chosen_spanish: Hur
  alternatives_spanish:
  - Jur
  lexicon: transliteration
  rationale: Nombre propio; transliteración estándar.
- source_word: רֶבַע
  english_pob_choice: Reba
  chosen_spanish: Reba
  alternatives_spanish:
  - Reva
  lexicon: transliteration
  rationale: Nombre propio; se adopta la forma bíblica habitual «Reba».
- source_word: חֲמֵשֶׁת מַלְכֵי מִדְיָן
  english_pob_choice: the five kings of Midian
  chosen_spanish: los cinco reyes de Madián
  alternatives_spanish:
  - cinco reyes de Madián
  lexicon: HALOT
  rationale: La frase es explicativa y resume a los cinco nombrados. En español, el artículo definido hace natural la aposición y deja claro que se trata de los mismos ya enumerados.
- source_word: בִּלְעָם בֶּן בְּעוֹר
  english_pob_choice: Balaam son of Beor
  chosen_spanish: Balaam hijo de Beor
  alternatives_spanish:
  - Balaam, hijo de Beor
  lexicon: transliteration
  rationale: La filiación se expresa con «hijo de», que es la forma más directa y fiel al patronímico hebreo en español bíblico.
- source_word: בֶּחָרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  lexicon: HALOT
  rationale: El prefijo instrumental se rinde de modo natural con «con». «La espada» conserva la concreción del instrumento de muerte sin volverlo abstracto.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'their slain' por 'the rest of their slain' para reflejar con más naturalidad la idea de que los reyes fueron matados en conexión con los demás ya caídos. La redacción española adopta esa lectura auditada con 'junto con el resto de sus muertos', preservando la compactación del hebreo sin imponer una explicación excesiva.
  spanish_consistency_notes:
  - Se mantuvo «Madián» de forma uniforme para Midian.
  - Se conservó la transliteración de los nombres propios siguiendo el POB en inglés.
  - «Con la espada» reproduce el instrumento de muerte de forma concreta y idiomática en español.
  - La nota al pie [a] marca la única ambigüedad lexical importante del hebreo en este versículo.
