revisions:
- from: Si un hombre se acuesta con un varón[a] como quien se acuesta con una mujer, ambos han cometido una abominación; ciertamente serán muertos[b]; su sangre cae sobre ellos.
  to: Si un hombre se acuesta con un varón[a] como se hace con una mujer, ambos han cometido una abominación; ciertamente se les dará muerte[b]; su sangre será sobre ellos.
  rationale: Se ajusta la pena legal a un español más natural y fiel al pasivo intensificado del hebreo, y se corrige el modismo final para no introducir la imagen de ‘caer’ que no está en el texto. También se mejora la nota del modismo hebreo para que sea comprensible en español sin perder el dato lexical preservado por el POB inglés.
