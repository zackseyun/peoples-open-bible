translation:
  language: es
  text: Y al sacar la plata que había sido traída a la casa de Yahvé[a], el sacerdote Hilcías halló el Libro de la Ley de Yahvé por mano de Moisés.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por mano de Moisés», un modismo que significa «por medio de Moisés» o «dado por medio de Moisés».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְהוֹצִיאָם
  english_pob_choice: And when they brought out
  chosen_spanish: Y al sacar
  alternatives_spanish:
  - Y cuando sacaron
  - Y mientras sacaban
  lexicon: HALOT
  rationale: El infinitivo constructo con prefijo y sufijo 3mp expresa una acción temporal concomitante o circunstancial. En español, “al sacar” conserva la relación temporal sin sonar forzado y mantiene el sujeto implícito de forma natural.
- source_word: הַכֶּסֶף
  english_pob_choice: the silver
  chosen_spanish: el dinero
  alternatives_spanish:
  - la plata
  - el silver
  lexicon: HALOT
  rationale: En este contexto del templo y la restauración, כֶּסֶף puede referirse al fondo recaudado. “Dinero” comunica bien la función del término en español. Se mantiene la posibilidad de “plata” como nota de alternativa porque el hebreo es literalmente “plata/silver”.
- source_word: הַמּוּבָא
  english_pob_choice: that had been brought into
  chosen_spanish: que había sido llevado
  alternatives_spanish:
  - que fue llevado
  - traído
  lexicon: HALOT
  rationale: El participio hophal es pasivo; en español, “había sido llevado” reproduce bien la pasividad y el sentido anterior al hallazgo. “Llevado” evita una paráfrasis más interpretativa.
- source_word: בֵּית יְהוָה
  english_pob_choice: the house of Yahweh
  chosen_spanish: la casa de Yahvé
  alternatives_spanish:
  - el templo de Yahvé
  - la casa del SEÑOR
  lexicon: HALOT
  rationale: Se conserva el patrón hebreo “casa de” frente a “templo”, porque el texto dice literalmente “casa”. YHWH se vierte como “Yahvé” conforme al estándar del proyecto.
- source_word: מָצָא
  english_pob_choice: found
  chosen_spanish: halló
  alternatives_spanish:
  - encontró
  - descubrió
  lexicon: HALOT
  rationale: El perfecto qal significa simplemente “halló/encontró”. “Halló” conserva un registro bíblico digno en español y no añade matiz interpretativo.
- source_word: חִלְקִיָּהוּ הַכֹּהֵן
  english_pob_choice: Hilkiah the priest
  chosen_spanish: el sacerdote Hilcías
  alternatives_spanish:
  - Hilkías el sacerdote
  - el sacerdote Hildquías
  lexicon: HALOT
  rationale: 'En español, la apposición suele sonar más natural con el oficio antes del nombre: “el sacerdote Hilcías”. Se mantiene la identificación personal sin alterar el contenido.'
- source_word: סֵפֶר תּוֹרַת יְהוָה
  english_pob_choice: the Book of the Law of Yahweh
  chosen_spanish: el Libro de la Ley de Yahvé
  alternatives_spanish:
  - el libro de la instrucción de Yahvé
  - el libro de la ley de Yahvé
  lexicon: HALOT
  rationale: סֵפֶר se traduce aquí por “Libro” siguiendo el uso tradicional y claro; תּוֹרָה se vierte por “Ley” porque en este contexto legal-covenantal es la opción más estable y reconocible. Se conserva la mayúscula inicial por tratarse del título del documento.
- source_word: בְּיַד מֹשֶׁה
  english_pob_choice: by the hand of Moses
  chosen_spanish: por mano de Moisés
  alternatives_spanish:
  - por medio de Moisés
  - a través de Moisés
  - por la mano de Moisés
  lexicon: HALOT
  rationale: La idiomática hebrea בְּיַד + persona comunica mediación/agentividad. En español, “por mano de Moisés” conserva la imagen original y el matiz de mediación sin expandir demasiado el sentido.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene explícitamente el Tetragrámaton. En este proyecto, el nombre se vierte como “Yahvé” para preservar la referencia al nombre pactal de Dios y evitar el reemplazo por un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de בְּיַד מֹשֶׁה
  english_pob_reading: by the hand of Moses
  chosen_spanish_reading: por mano de Moisés
  alternative_spanish_readings:
  - por medio de Moisés
  - a través de Moisés
  - por la mano de Moisés
  rationale: La frase puede expresar mediación y no solo localización física. Se retiene la metáfora de la “mano” para no borrar la tensión lexical documentada, mientras el español sigue siendo comprensible.
  doctrine_reference: Hebreos 3:5 como eco conceptual; además, la glosa lexical de בְּיַד en el audit trail
translation_notes:
  revision_awareness: El inglés auditado fue revisado para preferir la lectura más literal “by the hand of Moses” en vez de “given through Moses”. La versión española sigue esa decisión y evita suavizar el modismo hebreo, manteniendo la metáfora de mediación con una nota explicativa.
  spanish_consistency_notes:
  - Se usa “Yahvé” de forma consistente para יְהוָה, de acuerdo con el estándar del proyecto.
  - Se prefiere “casa de Yahvé” en vez de “templo de Yahvé” para seguir la literalidad del hebreo.
  - “Ley” se mantiene como traducción de תּוֹרָה por su fuerza jurídico-covenantal en este pasaje.
  - La sintaxis española mantiene una sola oración larga, como en el hebreo, pero con puntuación natural para lectura pública.
