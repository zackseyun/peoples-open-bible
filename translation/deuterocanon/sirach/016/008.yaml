theological_decisions:
- issue: Referent of 'Lot’s sojourners'
  chosen_reading: The phrase refers to the people of the place where Lot lived, i.e., the Sodomites associated with Lot’s residence.
  alternative_readings:
  - Lot’s household
  - the region where Lot sojourned
  rationale: The Hebrew wording is not the standard direct label 'Sodom,' but both Hebrew and Greek point to the community connected with Lot’s sojourn. Rendering too specifically as 'Sodomites' would import an identification not stated explicitly in the Hebrew phrase, though it is clearly the historical referent.
