translation:
  language: es
  text: Entonces el sacerdote dio a los jefes de centenas las lanzas[a] y los escudos que habían pertenecido al rey David y estaban en la casa de Yahvé[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo tiene «la lanza» en singular; el plural refleja el sentido colectivo probable en este contexto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en la casa de Yahvé». También puede entenderse como «en el templo de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן
  english_pob_choice: Then ... gave
  chosen_spanish: Entonces ... dio
  alternatives_spanish:
  - Y ... dio
  - Luego ... dio
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; «Entonces» conserva la secuencia natural en español sin perder el valor de transición narrativa.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el presbítero
  lexicon: HALOT
  rationale: El sustantivo singular con artículo se traduce de forma directa y clara con «sacerdote», el equivalente normal en español bíblico contemporáneo.
- source_word: לְשָׂרֵי הַמֵּאוֹת
  english_pob_choice: to the commanders of hundreds
  chosen_spanish: a los jefes de centenas
  alternatives_spanish:
  - a los comandantes de centenas
  - a los capitanes de centenas
  - a los oficiales de centenas
  lexicon: HALOT
  rationale: La expresión designa líderes militares sobre unidades de cien. «Jefes de centenas» mantiene la estructura hebrea y es comprensible en español sin imponer un término más interpretativo como «capitanes».
- source_word: הַחֲנִית
  english_pob_choice: the spears
  chosen_spanish: las lanzas
  alternatives_spanish:
  - la lanza
  lexicon: HALOT
  rationale: Aunque el hebreo está en singular, el contexto de distribución de armas a varios jefes y el paralelo con «los escudos» favorecen un sentido colectivo. En español, el plural «lanzas» expresa mejor ese valor contextual.
- source_word: הַשְּׁלָטִים
  english_pob_choice: the shields
  chosen_spanish: los escudos
  alternatives_spanish:
  - las defensas
  - las armas defensivas
  lexicon: HALOT
  rationale: El término se entiende mejor aquí como equipo defensivo/armamento real. «Escudos» es el equivalente más natural y probable en español.
- source_word: אֲשֶׁר לַמֶּלֶךְ דָּוִד
  english_pob_choice: that had belonged to King David
  chosen_spanish: que eran del rey David
  alternatives_spanish:
  - que habían pertenecido al rey David
  - que pertenecían al rey David
  lexicon: HALOT
  rationale: El relativo indica posesión histórica. «Eran del rey David» conserva la relación posesiva con una formulación natural en español; la opción «habían pertenecido» sería más explícita pero algo más pesada.
- source_word: בְּבֵית יְהוָה
  english_pob_choice: in the house of Yahweh
  chosen_spanish: en la casa de Yahvé
  alternatives_spanish:
  - en el templo de Yahvé
  - en la casa del SEÑOR
  lexicon: HALOT
  rationale: Se preserva la expresión literal «casa de Yahvé», siguiendo la política del proyecto para el nombre divino y manteniendo la referencia espacial concreta del hebreo. «Templo» sería una explicación, no la forma básica del texto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se usa el nombre divino según la convención del proyecto, en vez de ocultarlo con una sustitución reverencial.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo usa el Tetragrama de manera directa. La lectura elegida preserva el nombre divino en español conforme a la política del proyecto y evita el reemplazo tradicional por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH / יהוה → Yahvé'
- issue: Valor de הַחֲנִית en singular hebreo frente al plural contextual
  english_pob_reading: the spears
  chosen_spanish_reading: las lanzas
  alternative_spanish_readings:
  - la lanza
  rationale: Aunque la forma hebrea es singular, el contexto de entrega de armamento a varios jefes apoya un sentido colectivo. El plural en español refleja ese valor contextual sin negar la forma base del original.
  doctrine_reference: Lexical-contextual decision; no doctrinal issue
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y coincide con la línea de revisión estable del audit trail inglés: se mantiene el nombre divino, se conserva la posesión histórica de las armas de David y se resuelve de forma contextual el singular hebreo de הַחֲנִית como plural en español.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme a la terminología del proyecto.
  - «Casa de Yahvé» conserva la metáfora hebrea sin sustituirla por una paráfrasis más interpretativa.
  - «Jefes de centenas» reproduce la estructura militar del hebreo de forma clara y consistente.
