translation:
  language: es
  text: Y los sacerdotes hicieron oración[a] cuando el sacrificio se había consumido, tanto los sacerdotes como todos los demás, con Jonatán comenzando y los restantes respondiendo, como en Nehemías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La formulación griega es algo enrevesada y repetitiva aquí («los sacerdotes ... tanto los sacerdotes como todos»), probablemente para enfatizar que toda la asamblea participó en la oración.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «como Nehemías», una expresión elíptica que puede significar «como hizo Nehemías» o «como en la oración de Nehemías».
    reason: alternative_reading
lexical_decisions:
- source_word: προσευχὴν ἐποιήσαντο
  english_pob_choice: made prayer
  chosen_spanish: hicieron oración
  alternatives_spanish:
  - ofrecieron oración
  - oraron
  lexicon: LSJ
  rationale: La construcción griega es idiomática; en español, «hacer oración» conserva el valor verbal directo sin sonar forzado. «Ofrecieron oración» sería más cultual, pero menos natural aquí; «oraron» suaviza demasiado la imagen literal del original.
- source_word: οἱ ἱερεῖς
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los presbíteros
  lexicon: LSJ
  rationale: El término designa a los sacerdotes del contexto cultual del sacrificio; «sacerdotes» es el equivalente directo y claro en español.
- source_word: δαπανωμένης τῆς θυσίας
  english_pob_choice: when the sacrifice had been consumed
  chosen_spanish: cuando el sacrificio había sido consumido
  alternatives_spanish:
  - cuando el sacrificio se había consumido
  - cuando el sacrificio había terminado
  lexicon: LSJ
  rationale: δᾳπανάω expresa gastar/consumir. En contexto sacrificial, el sentido más probable es que la víctima había sido consumida por el fuego. «Había sido consumido» preserva esa fuerza mejor que «terminado».
- source_word: οἵ τε ἱερεῖς καὶ πάντες
  english_pob_choice: both the priests and all the others
  chosen_spanish: tanto los sacerdotes como todos los demás
  alternatives_spanish:
  - los sacerdotes y todos
  - tanto los sacerdotes como todos
  lexicon: LSJ
  rationale: La frase griega es redundante y amplía la participación de toda la asamblea. «Tanto ... como ...» refleja bien la inclusión y mantiene la repetición retórica sin borrarla.
- source_word: καταρχομένου Ἰωνάθον
  english_pob_choice: with Jonathan beginning
  chosen_spanish: con Jonatán comenzando
  alternatives_spanish:
  - con Jonatán dando comienzo
  - con Jonatán iniciando
  lexicon: LSJ
  rationale: El participio indica que Jonatán toma la iniciativa o da inicio. «Comenzando» mantiene la cercanía al griego y deja abierta la forma exacta del liderazgo vocal.
- source_word: τῶν τε λοιπῶν ἐπιφωνούντων
  english_pob_choice: and the rest responding
  chosen_spanish: y los restantes respondiendo
  alternatives_spanish:
  - y los demás respondiendo
  - y los demás coreando
  lexicon: LSJ
  rationale: ἐπιφωνέω sugiere respuesta vocal o aclamación. «Respondiendo» reproduce ese sentido antífona/comunal sin añadir más de lo que el texto exige.
- source_word: ὡς Νεεμίου
  english_pob_choice: as in Nehemiah
  chosen_spanish: como en Nehemías
  alternatives_spanish:
  - como Nehemías
  - como en la oración de Nehemías
  lexicon: LSJ
  rationale: El griego es breve y elíptico. La forma más pegada al texto es «como en Nehemías», manteniendo la alusión sin resolverla artificialmente; la nota explica la posible referencia a la oración o práctica de Nehemías.
theological_decisions:
- issue: Frase final elíptica ὡς Νεεμίου
  english_pob_reading: as in Nehemiah
  chosen_spanish_reading: como en Nehemías
  alternative_spanish_readings:
  - como Nehemías
  - como en la oración de Nehemías
  rationale: 'No conviene cerrar la ambigüedad griega con una explicación completa dentro del texto. «Como en Nehemías» conserva la referencia y deja abierta la comparación: puede aludir a lo que hizo Nehemías o a una oración asociada con él. La nota desarrolla esa tensión.'
  doctrine_reference: Preservar ambigüedad interpretativa documentada sin resolverla en el cuerpo del texto.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: mantiene la estructura «los sacerdotes ... tanto los sacerdotes como todos los demás» y conserva el final breve «como en Nehemías», reflejando con más precisión la elipsis del griego y la participación comunitaria destacada por el audit trail.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se mantiene «Jonatán» como forma española habitual del nombre Ἰωνάθον.
  - «Sacrificio» se conserva por el contexto cultual; «ofrenda» sería posible pero menos preciso en esta escena.
  - Se evita «Señor» o fórmulas litúrgicas añadidas, porque el griego presenta una oración comunitaria simple y narrativa.
  - La puntuación refleja la cadencia del griego y la duplicación retórica sin sobreexplicarla en el cuerpo del versículo.
