translation:
  language: es
  text: 'Y se sentó en la sala de audiencia[a], y la carta fue leída delante de ellos. Y dijo: «Llamen a los jóvenes, y ellos explicarán sus palabras». Y fueron llamados, y entraron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Sala de audiencia'' intenta reflejar el sentido del griego χρηματιστήριον como un lugar oficial de deliberación o juicio; también podría entenderse como ''tribunal'' o ''corte'', pero el término no fija con precisión la institución.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάθισεν
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - se sentó en su lugar
  lexicon: LSJ
  rationale: El aoristo narrativo de καθίζω se expresa de forma natural en español con 'se sentó'. 'Tomó asiento' es posible, pero suena algo más marcado y ceremonial de lo que exige el griego.
- source_word: ἐν τῷ χρηματιστηρίῳ
  english_pob_choice: council chamber
  chosen_spanish: la sala de audiencia
  alternatives_spanish:
  - el tribunal
  - la cámara del consejo
  - la sala del juicio
  lexicon: LSJ
  rationale: El término apunta a un lugar oficial de deliberación o audiencia judicial. 'Sala de audiencia' conserva el carácter institucional sin fijarlo demasiado en un formato moderno de tribunal ni reducirlo a un mueble o asiento.
- source_word: ἀνεγνώσθη
  english_pob_choice: was read
  chosen_spanish: fue leída
  alternatives_spanish:
  - fue leída en voz alta
  - se leyó
  lexicon: LSJ
  rationale: El pasivo aoristo de ἀναγινώσκω se traduce con naturalidad como 'fue leída'. El contexto público ya implica la lectura delante de la asamblea, por lo que no hace falta añadir 'en voz alta'.
- source_word: γράμμα
  english_pob_choice: letter
  chosen_spanish: la carta
  alternatives_spanish:
  - el documento
  - el escrito
  lexicon: LSJ
  rationale: En este contexto el escrito presentado por los contendientes funciona como una carta o misiva formal. 'Carta' es la opción más idiomática en español y mantiene la concreción del singular griego.
- source_word: νεανίσκους
  english_pob_choice: young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los mozos
  lexicon: LSJ
  rationale: El griego designa varones jóvenes; en español, 'los jóvenes' comunica bien el grupo sin sonar forzado. El masculino está claro por el contexto narrativo.
- source_word: δηλώσουσιν
  english_pob_choice: will explain
  chosen_spanish: explicarán
  alternatives_spanish:
  - dejarán en claro
  - declararán
  lexicon: LSJ
  rationale: El futuro de δηλόω tiene el sentido de hacer claro o explicar. 'Explicarán' conserva esa fuerza interpretativa mejor que un simple 'dirán'.
- source_word: λόγους
  english_pob_choice: words
  chosen_spanish: sus palabras
  alternatives_spanish:
  - sus declaraciones
  - sus argumentos
  lexicon: LSJ
  rationale: '''Palabras'' sigue de cerca el griego λόγους, y el posesivo ''sus'' ayuda a que la referencia sea natural en español. No se debe elevar innecesariamente a ''argumentos''.'
- source_word: εἰσῆλθοσαν
  english_pob_choice: entered
  chosen_spanish: entraron
  alternatives_spanish:
  - entraron adentro
  - pasaron
  lexicon: LSJ
  rationale: El aoristo de εἰσέρχομαι se traduce de forma directa con 'entraron', una solución clara y sobria en español.
translation_notes:
  revision_awareness: La versión inglesa POB lee χρηματιστήριον como 'council chamber' y añade una nota sobre alternativas como 'tribunal' o 'courtroom'. Esta versión española preserva esa apertura semántica con 'sala de audiencia' y una nota equivalente. No hay revisiones aplicadas en el registro inglés; el texto se mantiene alineado con el audit trail más reciente.
  spanish_consistency_notes:
  - Se mantiene el orden narrativo del griego con tres miembros coordinados por 'y'.
  - '''Carta'' se usa como equivalente idiomático de γράμμα en este contexto formal.'
  - '''Los jóvenes'' conserva el referente masculino plural sin introducir especificaciones no presentes en el griego.'
  - No se introduce lenguaje teológico adicional, ya que el versículo es narrativo y administrativo.
