revisions:
- from: Porque tu siervo apenas cruzaría el Jordán[a] con el rey; ¿por qué habría de recompensarme el rey con esta recompensa?
  to: Porque tu siervo solo cruzaría el Jordán un poco de camino con el rey; ¿por qué habría de recompensarme el rey con esta recompensa[a]?
  rationale: Se reemplaza «apenas» por «solo ... un poco de camino» para reflejar mejor כִּמְעַט como limitación del trayecto y evitar la lectura de ‘casi no’. También se mueve la nota al segmento de recompensa, que es donde realmente recae la observación léxica sobre גמל / גמולה.
