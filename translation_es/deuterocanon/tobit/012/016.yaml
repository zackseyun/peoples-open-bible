translation:
  language: es
  text: Y se turbaron los dos, y cayeron sobre sus rostros, porque tuvieron miedo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐταράχθησαν
  english_pob_choice: were troubled
  chosen_spanish: se turbaron
  alternatives_spanish:
  - quedaron turbados
  - se sobresaltaron
  - se estremecieron
  lexicon: BDAG
  rationale: El pasivo de ταράσσω expresa ser perturbado o agitado interiormente. «Se turbaron» conserva esa perturbación súbita sin convertirla en terror pleno, que el verso explica después con la cláusula de miedo.
- source_word: οἱ δύο
  english_pob_choice: the two
  chosen_spanish: los dos
  alternatives_spanish:
  - ambos
  - las dos personas
  lexicon: LSJ
  rationale: Es la forma más directa y fiel del numeral sustantivado griego. «Los dos» mantiene la referencia conjunta a Tobit y Tobías sin añadir precisión innecesaria.
- source_word: ἔπεσον ἐπὶ πρόσωπον
  english_pob_choice: fell on their faces
  chosen_spanish: cayeron rostro en tierra
  alternatives_spanish:
  - cayeron sobre sus rostros
  - cayeron con el rostro en tierra
  - se postraron
  lexicon: BDAG
  rationale: La expresión griega describe una caída/prostración con el rostro hacia el suelo. «Rostro en tierra» conserva la imagen corporal completa y sugiere postración sin introducir por sí mismo un matiz de adoración que el texto no explicita.
- source_word: ἐφοβήθησαν
  english_pob_choice: they were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - temieron
  - les dio miedo
  - estaban asustados
  lexicon: BDAG
  rationale: El aoristo de φοβέομαι expresa temor. «Tuvieron miedo» es natural en español actual y mantiene la relación causal introducida por ὅτι.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Aquí introduce la causa de su caída rostro en tierra. «Porque» comunica de forma clara y directa esa relación causal.
theological_decisions:
- issue: La postración de los dos ante la revelación de Rafael
  english_pob_reading: The verse describes fear-induced prostration without adding worship language.
  chosen_spanish_reading: El versículo describe una postración causada por el miedo, sin añadir lenguaje de adoración.
  alternative_spanish_readings:
  - Podría entenderse como una postración reverente ante un ángel.
  - Podría leerse como un gesto de culto.
  rationale: El griego afirma explícitamente que cayeron rostro en tierra porque tuvieron miedo. La traducción española conserva ese dato emocional y físico, pero no introduce una afirmación más fuerte sobre adoración que el versículo no formula.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió una formulación más natural para ἐταράχθησαν y una expresión más completa para ἔπεσον ἐπὶ πρόσωπον. En español, «se turbaron» y «cayeron rostro en tierra» reflejan esa línea revisada sin perder la precisión del griego.
  spanish_consistency_notes:
  - Se mantiene «los dos» para οἱ δύο, coherente con la referencia conjunta a Tobit y Tobías.
  - Se usa un registro bíblico moderno y digno, evitando calcos innecesarios pero conservando la estructura causal del verso.
  - No se introduce «Mesías», «Yahvé» ni otras terminologías ajenas porque este versículo no las contiene.
