translation:
  language: es
  text: El que da a los pobres presta a Yahvé[a], y él le devolverá[b] según su buena obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El testigo hebreo conservado para esta referencia es problemático en algunas ediciones, pero la revisión aplicada del POB aquí sigue la lectura que habla de dar a los pobres y de prestar a Yahvé.
    reason: source_note
  - marker: b
    text: Es posible entender la cola final como ‘le recompensará’ o ‘le pagará’; se ha preferido ‘le devolverá’ para conservar el sentido de retribución sin estrecharlo demasiado.
    reason: lexical_alternative
lexical_decisions:
- source_word: מלוה יהוה / lends to Yahweh
  english_pob_choice: lends to Yahweh
  chosen_spanish: presta a Yahvé
  alternatives_spanish:
  - da a Yahvé en préstamo
  - hace un préstamo a Yahvé
  lexicon: Source Hebrew / English POB audit trail
  rationale: 'La imagen principal es jurídica y económica: el acto de ayudar al pobre se describe como un préstamo hecho a Yahvé. En español, ''presta a Yahvé'' conserva la fuerza lexical sin suavizarla a mera ayuda religiosa.'
- source_word: נותן לאביון / gives to the poor
  english_pob_choice: gives to the poor
  chosen_spanish: da a los pobres
  alternatives_spanish:
  - entrega al pobre
  - da al necesitado
  lexicon: Source Hebrew / English POB audit trail
  rationale: '''Los pobres'' mantiene el referente colectivo y funciona bien en español bíblico contemporáneo. ''Necesitado'' sería posible, pero ''pobres'' es más directo y concordante con el paralelismo.'
- source_word: גמולות / repay / recompenses
  english_pob_choice: he will repay him
  chosen_spanish: le devolverá
  alternatives_spanish:
  - le recompensará
  - le pagará
  lexicon: Source Hebrew / English POB audit trail
  rationale: El término hebreo apunta a retribución o recompensa. 'Le devolverá' preserva la idea de restitución/retribución sin imponer una sola connotación meramente comercial; el contexto permite entender que Yahvé retribuye el bien hecho al pobre.
- source_word: כי אם הוא / except him / but he alone
  english_pob_choice: for his good deed
  chosen_spanish: según su buena obra
  alternatives_spanish:
  - por su buena acción
  - a causa de su buena obra
  lexicon: Source Hebrew / English POB audit trail
  rationale: La cola hebrea es idiomática y difícil; la lectura inglesa del POB la entendió como referencia a la recompensa por la buena acción. En español, 'según su buena obra' conserva la relación entre el acto y la retribución sin exceder el alcance del texto.
theological_decisions:
- issue: 'Base textual: conflicto entre el hebreo conservado y el paralelo griego de esta referencia'
  english_pob_reading: Translate from the Greek parallel as the usable Zone 1 text for this verse, while noting the Hebrew mismatch in a footnote.
  chosen_spanish_reading: Traducir la línea hebrea conservada, que coincide con la revisión más reciente del POB y con el texto presentado como de alta confianza.
  alternative_spanish_readings:
  - Traducir el paralelo griego como texto base, advirtiendo el desajuste hebreo.
  - Marcar el hebreo como material desplazado y seguir el griego para el sentido del versículo.
  rationale: El paquete fuente para esta tarea presenta el hebreo como texto de alta confianza y la revisión aplicada reemplazó el borrador griego por una traducción del hebreo. Para un registro español auditable, conviene seguir el estado revisado del POB y reflejar la retribución divina al acto de dar a los pobres, manteniendo honestidad textual mediante nota.
  doctrine_reference: 'PHILOSOPHY.md: translate from the most-original witness available; preserve source uncertainty honestly'
- issue: ¿Cómo representar la relación entre el pobre y Yahvé en el lenguaje de retribución?
  english_pob_reading: He who gives to the poor lends to Yahweh, and he will repay him for his good deed.
  chosen_spanish_reading: El que da a los pobres presta a Yahvé, y él le devolverá según su buena obra.
  alternative_spanish_readings:
  - El que da a los pobres le presta a Yahvé, y él se lo recompensará.
  - Quien ayuda al pobre presta a Yahvé, y él le pagará su acción.
  rationale: '''Presta a Yahvé'' conserva la audaz formulación sapiencial sin rebajarla. ''Le devolverá'' mantiene la retribución divina de manera amplia y reverente, evitando una paráfrasis demasiado interpretativa.'
  doctrine_reference: Sirácides / sabiduría sapiencial sobre la recompensa divina al acto de misericordia
translation_notes:
  revision_awareness: 'El historial del POB muestra una revisión importante: un borrador previo seguía el paralelo griego, pero la pasarela de revisión lo sustituyó por una traducción del hebreo conservado. Este draft español sigue la lectura revisada del POB para producir un texto publicable y coherente con el estado más reciente del expediente.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para el tetragrámaton.
  - Se mantiene un registro sapiencial sobrio y no litúrgico.
  - '''Pobres'' se usa como plural colectivo, conforme al paralelismo hebreo.'
  - '''Presta a Yahvé'' conserva la tensión teológica del texto sin suavizarla.'
