review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo y sigue adecuadamente la línea del POB en חֵרֶם, רַק, הַזּוֹנָה, הֶחְבְּאַתָה y הַמַּלְאָכִים. También mantiene correctamente «Yahvé» para יהוה. Sin embargo, hay un problema importante de español y concordancia en la primera cláusula: «la ciudad y todo lo que hay en ella será devotada» combina sujeto compuesto/mixto con verbo singular y además usa «devotada», forma poco natural en español bíblico actual. Conviene reformular para preservar mejor el sentido de חֵרֶם con español idiomático.'
  spanish_quality_summary: 'La legibilidad es en general buena, pero «[a]devotada a destrucción» suena forzado y poco natural; además el anclaje de nota está mal colocado dentro de la palabra. La nota b no corresponde al modelo inglés: el inglés anota «the messengers», no «with her in the house». También sería mejor «todo lo que está en ella» que «todo lo que hay en ella» por cercanía formal al original y al inglés POB.'
  glossary_alignment: Alineación parcial con el glosario y las decisiones documentadas. «Yahvé», «la prostituta», «los mensajeros» y «vivirá» están bien. Para חֵרֶם, la idea teológica está bien entendida, pero la realización española recomendada es «consagrada a destrucción» o equivalente más natural, no «devotada a destrucción».
  issues:
  - severity: high
    issue: «devotada a destrucción» es español poco natural y además aparece con anclaje de nota mal insertado
    rationale: Aunque intenta reflejar ‘devoted to destruction’, en español «devotada» no es la forma idiomática aquí. «Consagrada a destrucción» conserva mejor la fuerza de dedicación + destrucción. El marcador debe ir después de la frase, no dentro de la palabra.
  - severity: medium
    issue: Discordancia en «la ciudad y todo lo que hay en ella será devotada»
    rationale: La combinación de sujeto compuesto y adjetivo en femenino singular suena defectuosa. Reestructurar la cláusula evita el problema sin perder el sentido del hebreo.
  - severity: medium
    issue: La nota b está anclada a la frase equivocada
    rationale: El rastro inglés conserva una nota sobre «the messengers», no sobre «with her in the house». En español debe mantenerse esa alternativa léxica en «mensajeros».
  revised_spanish_text: Y la ciudad y todo lo que está en ella será consagrado a destrucción para Yahvé[a]. Solo Rahab la prostituta vivirá, ella y todos los que estén con ella en la casa, porque escondió a los mensajeros[b] que enviamos.
  revised_footnotes:
  - marker: a
    text: O «bajo el anatema». El hebreo חֵרֶם se refiere a algo entregado irrevocablemente a Yahvé, aquí mediante destrucción.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «los mensajeros»; en contexto, estos son los hombres que Josué había enviado para reconocer la tierra.
    reason: lexical_alternative
  revision_rationale: 'Se corrigió la primera cláusula para un español natural y fiel al valor de חֵרֶם, reemplazando «devotada a destrucción» por «consagrado a destrucción» y moviendo correctamente la nota al final de la frase pertinente. También se realineó la nota b con el punto léxico documentado en el POB inglés: הַמַּלְאָכִים = «los mensajeros». El resto del versículo se mantiene sustancialmente igual por ser fiel y claro.'
