revisions:
- from: Que escuches en el cielo, el lugar de tu morada, y hagas conforme a todo lo que el extranjero te pida[a], para que todos los pueblos de la tierra conozcan tu nombre, para temerte como tu pueblo Israel[b], y para saber que tu nombre es llamado sobre esta casa que he edificado.
  to: Que escuches en el cielo, el lugar de tu morada, y hagas conforme a todo lo que el extranjero clame a ti por[a], para que todos los pueblos de la tierra conozcan tu nombre, para temerte como lo hace tu pueblo Israel, y para saber que tu nombre es llamado sobre esta casa[b] que he edificado.
  rationale: Se ajusta «te pida» a «clame a ti por» para reflejar mejor קרא אל en contexto de oración; se explicita «lo hace» para una comparación más natural en español; y se traslada la nota [b] al modismo final, preservando la decisión teológica y lexical documentada por la POB inglesa.
