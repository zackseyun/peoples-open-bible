translation:
  text: Judge your neighbor's feelings by your own, and think carefully about every matter.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew witness (Cairo Geniza/Kahana) is markedly different here: ''Does not a tear run down the cheek, and a sigh over her destroyers/rebels?'' The source tradition for this verse is uncertain, so the main text follows the Greek parallel.'
    reason: alternative_reading
lexical_decisions:
- source_word: νόει
  chosen: Judge
  alternatives:
  - Understand
  - Consider
  - Perceive
  lexicon: BDAG
  rationale: The Greek imperative calls for reflective understanding. 'Judge' here means to assess by analogy from oneself, fitting the following phrase 'from yourself,' while remaining natural English in context.
- source_word: τὰ τοῦ πλησίον
  chosen: your neighbor’s feelings
  alternatives:
  - what belongs to your neighbor
  - your neighbor’s situation
  - the things of your neighbor
  lexicon: BDAG
  rationale: The Hebrew witness in Zone 1 is textually divergent and appears to reflect a different line, while the Greek parallel gives the actionable sense of considering what pertains to one's neighbor. 'Feelings' is somewhat interpretive, but it captures the ethical empathy implied by reasoning from oneself to the neighbor.
- source_word: ἐκ σεαυτοῦ
  chosen: by your own
  alternatives:
  - from yourself
  - on the basis of yourself
  lexicon: BDAG
  rationale: This phrase expresses analogy from one's own experience as the measure for understanding another. 'By your own' is concise idiomatic English when paired with 'feelings.'
- source_word: ἐπὶ παντὶ πράγματι
  chosen: about every matter
  alternatives:
  - in every matter
  - concerning everything
  lexicon: BDAG
  rationale: The phrase broadens the exhortation beyond interpersonal empathy to careful deliberation in all affairs. 'Every matter' preserves the concrete sense of πράγματι.
- source_word: διανοοῦ
  chosen: think carefully
  alternatives:
  - reflect
  - consider
  - reason
  lexicon: BDAG
  rationale: The middle/passive imperative conveys deliberate mental engagement. 'Think carefully' is readable modern English and preserves the exhortational force.
