translation:
  language: es
  text: Yahvé sale como un guerrero poderoso; como un hombre de guerra despierta celo[a]. Grita, sí, levanta un grito de batalla[c][b]; sobre sus enemigos se muestra poderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''despierta celos'' para ''despierta celo''. El hebreo קִנְאָה puede significar tanto celo como celos, especialmente en contextos de pacto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''contra sus enemigos prevalece''. La cláusula final también puede rendirse de forma más dinámica para subrayar la victoria.'
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''como un hombre de guerras''; es decir, un guerrero experimentado en combate.'
    reason: cultural_note
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton, siguiendo el criterio POB de transliterar el nombre revelado y no sustituirlo por un título. 'Yahvé' es la forma estable en español para ese nombre.
- source_word: כַּגִּבּוֹר
  english_pob_choice: like a mighty warrior
  chosen_spanish: como un guerrero poderoso
  alternatives_spanish:
  - como un hombre poderoso
  - como un héroe
  lexicon: HALOT
  rationale: El término puede abarcar hombre fuerte, héroe o guerrero; en este contexto bélico, 'guerrero poderoso' comunica la fuerza militar de la comparación sin endurecerla artificialmente.
- source_word: יֵצֵא
  english_pob_choice: goes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale afuera
  - se adelanta
  lexicon: HALOT
  rationale: '''Sale'' reproduce el movimiento del verbo hebreo de manera natural en español y mantiene la imagen de Yahvé que sale al combate.'
- source_word: כְּאִישׁ מִלְחָמוֹת
  english_pob_choice: like a man of war
  chosen_spanish: como un hombre de guerra
  alternatives_spanish:
  - como un guerrero
  - como un hombre de batallas
  lexicon: HALOT
  rationale: Se conserva la forma nominal masculina de אִישׁ y el plural intensivo 'guerras' en una construcción natural para el español. 'Hombre de guerra' mantiene el paralelismo y la literalidad suficiente del hebreo.
- source_word: יָעִיר קִנְאָה
  english_pob_choice: he stirs up zeal
  chosen_spanish: despierta celo
  alternatives_spanish:
  - despierta celo celoso
  - despierta celo ardiente
  - suscita celo
  lexicon: HALOT
  rationale: '''Celo'' preserva la ambivalencia semántica de קִנְאָה y evita cargar el texto con la connotación negativa de ''celos'' cuando se habla de Dios. ''Despierta'' sigue la fuerza causal del verbo.'
- source_word: יָרִיעַ
  english_pob_choice: He shouts
  chosen_spanish: Grita
  alternatives_spanish:
  - Clama
  - Da un grito
  lexicon: HALOT
  rationale: El verbo expresa alzar la voz o gritar. 'Grita' es claro y directo en español, y funciona bien con la progresión poética del verso.
- source_word: אַף
  english_pob_choice: 'yes'
  chosen_spanish: sí
  alternatives_spanish:
  - e incluso
  - además
  - ciertamente
  lexicon: HALOT
  rationale: Como intensificador, 'sí' reproduce la conexión enfática entre los dos verbos sin añadir explicaciones ajenas al texto.
- source_word: יַצְרִיחַ
  english_pob_choice: he raises a battle cry
  chosen_spanish: levanta un grito de batalla
  alternatives_spanish:
  - lanza un grito de guerra
  - clama con voz alta
  lexicon: HALOT
  rationale: El verbo denota clamar en voz fuerte; en este marco militar, 'grito de batalla' comunica con precisión el matiz bélico que el hebreo sugiere.
- source_word: עַל אֹיְבָיו
  english_pob_choice: over his enemies
  chosen_spanish: sobre sus enemigos
  alternatives_spanish:
  - contra sus enemigos
  lexicon: HALOT
  rationale: '''Sobre'' conserva la preposición hebrea עַל y armoniza con la idea de dominio o victoria que sigue en el último hemistiquio. ''Contra'' también sería posible, pero pierde algo del matiz de triunfo.'
- source_word: יִתְגַּבָּר
  english_pob_choice: he shows himself mighty
  chosen_spanish: se muestra poderoso
  alternatives_spanish:
  - prevalece
  - se demuestra fuerte
  - se hace poderoso
  lexicon: HALOT
  rationale: El hitpael comunica mostrarse fuerte o prevalecer. 'Se muestra poderoso' preserva el matiz reflexivo y enlaza con גִּבּוֹר por la raíz de fuerza/poder.
theological_decisions:
- issue: Lenguaje marcial aplicado a Yahvé
  english_pob_reading: Retain strong warfare language for the LORD
  chosen_spanish_reading: Conservar el lenguaje bélico fuerte para Yahvé
  alternative_spanish_readings:
  - Suavizar la imagen a una fuerza más general
  - Parafrasear la guerra como simple poder
  rationale: El hebreo presenta explícitamente a Yahvé como guerrero, hombre de guerra, que grita y lanza grito de batalla. La traducción mantiene esa imaginería sin rebajarla ni ornamentarla.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor de קִנְאָה en referencia a Dios
  english_pob_reading: zeal
  chosen_spanish_reading: celo
  alternative_spanish_readings:
  - celos
  - ardor
  rationale: '''Celo'' conserva la intensidad activa del término y evita la posible asociación negativa de ''celos'' en español. En contexto divino y de juicio, expresa bien el ardor pactal.'
  doctrine_reference: Translation philosophy §§1, 6
- issue: Correspondencia de género en אִישׁ
  english_pob_reading: man of war
  chosen_spanish_reading: hombre de guerra
  alternative_spanish_readings:
  - guerrero
  - varón de guerra
  rationale: La forma 'hombre de guerra' preserva la referencia masculina del hebreo y la simetría poética con 'guerrero poderoso', sin perder claridad para el lector moderno.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: He tenido en cuenta la revisión del audit trail que ajustó 'a man of wars' a 'a man of war' por naturalidad inglesa, pero en español se mantiene 'hombre de guerra', que ya es una forma idiomática y conserva bien el plural intensivo del hebreo מִלְחָמוֹת sin sonar forzada.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino, conforme al estándar POB en español.
  - Se conserva 'celo' para קִנְאָה y no se sustituye por 'celos' en el texto principal.
  - El último cola se traduce con reflexivo ('se muestra poderoso') para reflejar היטפעל y el matiz de auto-manifestación de fuerza.
  - Los marcadores de notas [a], [b], [c] aparecen en el texto exactamente donde corresponden.
