translation:
  language: es
  text: ¿cuando el polvo se endurece en una masa[a], y los terrones se pegan entre sí?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando el polvo es vertido en dureza» / «cuando el polvo llega a ser duro como metal fundido». El hebreo usa imágenes de vertido/fundición para describir cómo el suelo se compacta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּצֶקֶת
  english_pob_choice: when ... hardens
  chosen_spanish: cuando ... se endurece
  alternatives_spanish:
  - cuando ... es vertido/cast
  - en el endurecimiento de
  lexicon: HALOT
  rationale: La forma introduce una cláusula temporal; en español, «cuando» conserva esa relación. Dado el contexto con «polvo» y el resultado del endurecimiento, «se endurece» comunica el efecto natural sin forzar una imagen de vertido literal.
- source_word: עָפָר
  english_pob_choice: the dust
  chosen_spanish: el polvo
  alternatives_spanish:
  - el polvo
  - la tierra suelta
  lexicon: HALOT
  rationale: עָפָר suele referirse a polvo o tierra suelta. «El polvo» es natural en español y conserva la imagen general del material terroso.
- source_word: לַמּוּצָק
  english_pob_choice: into a mass
  chosen_spanish: en una masa
  alternatives_spanish:
  - en dureza
  - como metal fundido
  - en un bloque
  lexicon: HALOT
  rationale: El término puede sugerir algo vertido o solidificado. «En una masa» reproduce el resultado físico de compactación sin introducir innecesariamente la imagen de metal.
- source_word: וּרְגָבִים
  english_pob_choice: and the clods
  chosen_spanish: y los terrones
  alternatives_spanish:
  - y los terrones de tierra
  - y los grumos de tierra
  lexicon: HALOT
  rationale: רְגָבִים son terrones o trozos de tierra. «Terrones» es un equivalente idiomático y claro en español.
- source_word: יְדֻבָּקוּ
  english_pob_choice: stick together
  chosen_spanish: se pegan entre sí
  alternatives_spanish:
  - se adhieren
  - quedan unidos
  lexicon: HALOT
  rationale: El verbo expresa que los terrones se adhieren unos a otros. «Se pegan entre sí» preserva la imagen física de adherencia con naturalidad en español.
translation_notes:
  revision_awareness: El texto en inglés POB fue revisado recientemente sin cambios, con alta concordancia entre revisión y control cruzado; la propuesta española sigue esa lectura estable y mantiene la tensión imagética entre compactación y posible alusión a vertido/fundición en la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se evita «SEÑOR» porque no hay aquí un sustituto del nombre divino en el texto fuente.
  - «Terrones» conserva mejor el sustantivo concreto que una paráfrasis abstracta como «fragmentos».
