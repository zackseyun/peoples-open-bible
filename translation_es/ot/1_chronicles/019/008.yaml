revisions:
- from: Cuando David lo oyó[a], envió a Joab y a todo el ejército, los valientes[b].
  to: 'Cuando David oyó[a], envió a Joab y a todo el ejército: los valientes[b].'
  rationale: Se elimina el pronombre «lo» para ajustarse mejor al hebreo y al uso natural del español narrativo. Se conserva «los valientes» por fidelidad léxica a הַגִּבּוֹרִים y a la nota del POB, pero se marca la apposición con dos puntos para que la frase sea más clara y fluida en español sin perder la relación sintáctica que el POB quiso preservar.
