base_translation:
  language: en
  yaml_path: translation/ot/exodus/035/035.yaml
  text: He has filled them with wisdom of heart to do every kind of work of an engraver[a], a designer, and an embroiderer in blue, in purple, in scarlet yarn, and in fine linen[c][b], and of a weaver—doers of every kind of work and devisers of designs.
  footnotes:
  - marker: a
    text: Or more broadly, 'craftsman' for 'engraver'; the Hebrew term can denote a skilled artisan in general, but here it likely refers to a specific class of tabernacle workmanship.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'wisdom of heart,' a Hebrew expression for inwardly grounded skill, discernment, and craftsmanship.
    reason: cultural_note
  - marker: c
    text: Or 'devisers of artistic designs' for 'designers of designs.' The Hebrew repeats cognate terms for emphasis.
    reason: lexical_alternative
