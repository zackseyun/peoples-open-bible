revisions:
- from: ¿Y quién les escuchará en este asunto? Porque, así como es la parte del que baja a la batalla[a], así será la parte del que se queda junto a los suministros[b]; juntos repartirán.
  to: ¿Y quién les hará caso en este asunto? Porque, así como es la parte del que baja a la batalla[a], así es la parte del que se queda junto al equipaje[b]; juntos repartirán.
  rationale: 'La revisión hace dos ajustes léxicos para reflejar mejor el hebreo y el audit trail: ''les hará caso'' expresa mejor el valor de שׁמע ל en una pregunta retórica de rechazo, y ''equipaje'' representa con más precisión el sentido amplio de כֵּלִים en este contexto. También se regulariza el paralelismo con ''así es la parte'' en vez de ''así será la parte''.'
  reviewer_model: gpt-5.4
