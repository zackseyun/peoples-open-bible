base_translation:
  language: en
  yaml_path: translation/ot/psalms/035/000.yaml
  text: Of David[a]. Contend, Yahweh, with those who contend with me[b]; fight against those who fight against me.
  footnotes:
  - marker: a
    text: Or 'Plead my cause, O LORD, against my adversaries.' The Hebrew verb can carry a legal sense ('plead/argue a case') as well as the broader sense 'contend.'
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'Yahweh.' The translation follows the project default 'the LORD' for the divine name יְהוָה.
    reason: alternative_reading
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T20:36:50Z'
    unchanged: false
    changes_summary: Added the full verse content omitted from the draft, preserving the superscription 'Of David' and rendering the parallel imperatives naturally and accurately with 'Contend, Yahweh' and 'fight against those who fight against me.'
translation:
  language: es
  text: De David. Contiende[a], Yahvé, con los que contienden conmigo; pelea contra los que pelean contra mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pleitea mi causa»; el verbo hebreo puede tener sentido jurídico además del más general «contender».'
    reason: lexical_alternative
lexical_decisions:
- source_word: לְדָוִד
  english_pob_choice: Of David.
  chosen_spanish: De David.
  alternatives_spanish:
  - Salmo de David.
  - De parte de David.
  lexicon: David
  rationale: La superscripción hebrea indica atribución o pertenencia a David; 'De David' conserva la brevedad y la ambigüedad típica sin añadir contenido no explícito.
- source_word: רִיב
  english_pob_choice: Contend
  chosen_spanish: Contiende
  alternatives_spanish:
  - Pleitea
  - Defiende mi causa
  - Alega mi causa
  lexicon: ריב
  rationale: El verbo puede tener un matiz legal de 'pleitear / defender la causa', pero aquí el paralelismo con 'pelean' permite una versión directa y natural como 'contiende', sin borrar la posible tensión jurídica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: יהוה
  rationale: 'Se sigue el estándar del proyecto para el nombre divino: ''Yahvé''. Mantiene la identidad del Tetragrámaton en vez de ocultarlo tras una sustitución reverencial.'
- source_word: יְרִיבַי
  english_pob_choice: those who contend with me
  chosen_spanish: los que contienden conmigo
  alternatives_spanish:
  - mis adversarios
  - los que pleitean conmigo
  lexicon: ריב
  rationale: El participio plural expresa personas en conflicto activo; 'los que contienden conmigo' conserva la reciprocidad verbal del hebreo y el eco del primer imperativo.
- source_word: לְחַם
  english_pob_choice: fight
  chosen_spanish: pelea
  alternatives_spanish:
  - combate
  - lucha
  lexicon: לחם
  rationale: El paralelismo pide un verbo de combate directo. 'Pelea' es idiomático en español y reproduce la fuerza activa del hebreo sin elevar artificialmente el registro.
- source_word: לֹחֲמַי
  english_pob_choice: those who fight against me
  chosen_spanish: los que pelean contra mí
  alternatives_spanish:
  - mis combatientes
  - los que luchan contra mí
  lexicon: לחם
  rationale: Se conserva la repetición léxica del hebreo entre verbo e identificador del enemigo. 'Pelean contra mí' es claro y mantiene la simetría con la primera cola.
theological_decisions:
- issue: Nombre divino en la invocación
  english_pob_reading: The English POB notes the divine name and, in its default tradition, may render it as 'the LORD' in English, but the revision context preserved 'Yahweh' in the verse content.
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - el Señor
  rationale: En español se preserva explícitamente el nombre propio del pacto, coherente con la política del proyecto y con el texto hebreo subyacente.
  doctrine_reference: Tetragrámaton / nombre revelado de Dios
translation_notes:
  revision_awareness: 'La revisión más reciente restauró el contenido completo del versículo y confirmó la traducción de la invocación y del paralelismo verbal: ‘Contend, Yahweh… fight against…’. La presente versión mantiene ese contenido íntegro y ajusta el español para que la nota a corresponda solo a la superscripción, evitando un marcador sin ancla.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' en lugar de una sustitución reverencial, conforme al estándar del proyecto.
  - Se preserva la repetición verbal ('contienden/pelean') para reflejar el paralelismo hebreo.
  - La superscripción se separa del cuerpo poético con punto, siguiendo el estilo legible en español.
