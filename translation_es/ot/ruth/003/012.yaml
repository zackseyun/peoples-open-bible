translation:
  language: es
  text: Y ahora, es verdad que yo soy un redentor[a], pero también hay un redentor más cercano que yo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pariente-redentor» o «guardián-redentor»; el término hebreo designa a un pariente cercano con responsabilidades familiares reconocidas de redención.'
    reason: lexical_alternative
  - marker: b
    text: «Más cercano» aquí significa más cercano en parentesco y en derechos de redención, no simplemente físicamente más próximo.
    reason: cultural_note
lexical_decisions:
- source_word: וְעַתָּה
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  lexicon: HALOT
  rationale: Conserva la transición discursiva y el valor conjuntivo de ו con la marca temporal de עתה; en español, «Y ahora» suena natural y mantiene el arranque de la réplica de Booz.
- source_word: כִּי אָמְנָם
  english_pob_choice: it is true that
  chosen_spanish: es verdad que
  alternatives_spanish:
  - es cierto que
  - en verdad
  lexicon: HALOT
  rationale: La combinación afirma o concede la veracidad de lo dicho. «Es verdad que» expresa esa fuerza confirmatoria de forma idiomática en español sin añadir énfasis excesivo.
- source_word: גֹאֵל
  english_pob_choice: redeemer
  chosen_spanish: redentor
  alternatives_spanish:
  - rescatador
  - pariente redentor
  lexicon: HALOT
  rationale: Se mantiene el término breve y readable del texto principal. «Redentor» conserva la raíz semántica de rescate/redención y permite dejar las opciones más explicativas en nota sin imponer una glosa interpretativa en el texto base.
- source_word: כִּי אִם
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - sino que
  - excepto que
  lexicon: HALOT
  rationale: Tras la concesión/afirmación previa, la secuencia introduce el contenido confirmado. En español, «que» fluye de manera natural y evita sobreinterpretar la construcción.
- source_word: אָנֹכִי
  english_pob_choice: I am
  chosen_spanish: yo soy
  alternatives_spanish:
  - soy yo
  lexicon: HALOT
  rationale: El pronombre independiente intensifica la autodefinición. En español, «yo soy» reproduce esa explicitud sin forzar un orden marcado.
- source_word: וְגַם
  english_pob_choice: yet there is also
  chosen_spanish: pero también hay
  alternatives_spanish:
  - y también hay
  - sin embargo, también hay
  lexicon: HALOT
  rationale: El valor aditivo se conserva y el contexto introduce una limitación que matiza la afirmación anterior; «pero también hay» comunica bien esa concesión contextual en español.
- source_word: יֵשׁ
  english_pob_choice: there is
  chosen_spanish: hay
  alternatives_spanish:
  - existe
  lexicon: HALOT
  rationale: Corresponde al existencial normal del hebreo יֵשׁ y resulta la forma más natural en español.
- source_word: קָרוֹב מִמֶּנִּי
  english_pob_choice: closer than I
  chosen_spanish: más cercano que yo
  alternatives_spanish:
  - más próximo que yo
  - más cercano a mí
  lexicon: HALOT
  rationale: El POB inglés aclara que la cercanía es de parentesco y derecho de rescate, no espacial. En español, «más cercano que yo» conserva la comparación sin añadir todavía una glosa explicativa al cuerpo del versículo.
theological_decisions:
- issue: Rendición de גֹאֵל en un contexto legal-familiar
  english_pob_reading: redeemer
  chosen_spanish_reading: redentor
  alternative_spanish_readings:
  - pariente redentor
  - rescatador
  rationale: El texto habla de obligaciones de redención familiar en Israel, no de una redención abstracta. «Redentor» preserva el núcleo léxico y la amplitud semántica que el POB inglés dejó abierta; las opciones más explicativas quedan disponibles en nota.
  doctrine_reference: Translation philosophy §§1, 5
- issue: La cercanía del otro גֹאֵל
  english_pob_reading: Closer here means more closely related in terms of family redemption rights, not merely physically nearer.
  chosen_spanish_reading: Más cercano aquí significa más cercano en parentesco y en derechos de redención, no solo físicamente próximo.
  alternative_spanish_readings:
  - más próximo
  - más cercano espacialmente
  rationale: La nota debe impedir una lectura espacial. La frase principal conserva la ambigüedad controlada, mientras la explicación aclara la dimensión jurídica y de parentesco que está en juego.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: La revisión más reciente del texto fuente inglés no introdujo cambios; el pasaje se mantiene en acuerdo alto con la lectura ya auditada.
  spanish_consistency_notes:
  - Se mantiene «redentor» como equivalente principal de גֹאֵל para conservar la coherencia terminológica con la política POB y evitar una glosa interpretativa en el cuerpo del verso.
  - Se evita «SEÑOR» o cualquier sustitución devocional ajena al hebreo de este versículo.
  - La estructura concesiva se mantiene con «pero también hay», que refleja adecuadamente la limitación implícita del segundo miembro.
  - El español adopta una comparación de parentesco («más cercano que yo») y la nota precisa que no se trata de proximidad física.
