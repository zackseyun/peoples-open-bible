    issue: La cláusula «Era el ser viviente» cambia de plural a singular de forma que debilita la identificación de los querubines con el ser viviente visto antes.
    rationale: 'El POB inglés documenta explícitamente la decisión de conservar la tensión: «They were the living creature». En español, «Eran el ser viviente» reproduce mejor esa relación que «Era el ser viviente», que parece introducir un nuevo sujeto singular.'
