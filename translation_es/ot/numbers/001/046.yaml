translation:
  language: es
  text: Así, todos los que fueron contados eran seiscientos tres mil quinientos cincuenta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los registrados» o «los alistados». El hebreo se refiere a los inscritos en el censo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּהְיוּ
  english_pob_choice: So ... were
  chosen_spanish: Así, ... fueron
  alternatives_spanish:
  - Y ... fueron
  - Entonces ... fueron
  lexicon: HALOT
  rationale: La forma narrativa hebrea introduce el total como resultado del conteo; en español, «Así» comunica bien esa conclusión sin forzar un calco.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - el total de
  - todos los
  lexicon: HALOT
  rationale: Mantiene la fuerza inclusiva de כָּל en una frase natural y breve.
- source_word: הַפְּקֻדִים
  english_pob_choice: those who were counted
  chosen_spanish: los contados
  alternatives_spanish:
  - los registrados
  - los que fueron contados
  - los mustrados
  lexicon: HALOT
  rationale: «Contados» refleja el sentido pasivo-participial de פקד en el contexto del censo. Evita añadir «hombres» porque el versículo no lo repite explícitamente, aunque el contexto sí es censal y militar.
- source_word: שֵׁשׁ מֵאוֹת אֶלֶף וּשְׁלֹשֶׁת אֲלָפִים וַחֲמֵשׁ מֵאוֹת וַחֲמִשִּׁים
  english_pob_choice: six hundred three thousand five hundred and fifty
  chosen_spanish: seiscientos tres mil quinientos cincuenta
  alternatives_spanish:
  - seiscientos tres mil quinientos y cincuenta
  - seiscientos tres mil y quinientos cincuenta
  lexicon: HALOT
  rationale: Se expresa el número de forma estándar en español, conservando exactamente el valor del hebreo. No se segmenta con repeticiones de «y» porque en español resultaría menos natural y no añade precisión.
theological_decisions:
- issue: Naturaleza del grupo censado
  english_pob_reading: those who were counted
  chosen_spanish_reading: los contados
  alternative_spanish_readings:
  - los registrados
  - los mustrados
  rationale: El texto hebreo designa a los inscritos en el censo. «Los contados» mantiene la referencia sin especificar más allá de lo que el versículo dice; el contexto militar se entiende por el capítulo, no por una adición explícita aquí.
  doctrine_reference: Números 1:2-3, contexto del censo de varones aptos para guerra
translation_notes:
  revision_awareness: El inglés POB mantuvo una traducción de suma narrativa y añadió «and» antes de «fifty» en una revisión para mayor naturalidad. El español adopta el equivalente natural de la cifra completa sin necesidad de repetir conectores, conservando el resultado acumulado del hebreo.
  spanish_consistency_notes:
  - Se usa «contados» para פקד conforme al valor censal documentado en el audit trail.
  - Se evita «SEÑOR» u այլ terminología no pertinente; el versículo no contiene el nombre divino.
  - La cifra se presenta en formato corriente del español, manteniendo el total exacto del original.
