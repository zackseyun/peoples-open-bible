base_translation:
  language: en
  yaml_path: translation/ot/zechariah/006/007.yaml
  text: And the strong ones came out and sought to go[a], to walk throughout the earth. And he said, “Go[b], walk throughout the earth,” and they walked throughout the earth.
  footnotes:
  - marker: a
    text: Or “the dappled ones” (traditionally, a color designation for the horses/teams); the Hebrew as pointed in the Masoretic Text more naturally reads “the strong ones.”
    reason: alternative_reading
  - marker: b
    text: Or “throughout the land”; Hebrew אֶרֶץ can mean either “earth” or “land,” depending on context.
    reason: lexical_alternative
