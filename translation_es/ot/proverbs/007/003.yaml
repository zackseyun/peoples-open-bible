translation:
  language: es
  text: Átalos[a] en tus dedos; escríbelos en la tabla de tu corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Árralos en tus dedos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קָשְׁרֵם
  english_pob_choice: Tie them
  chosen_spanish: Átalos
  alternatives_spanish:
  - Árralos
  - Bíndalos
  lexicon: HALOT
  rationale: El hebreo es un imperativo 2ms con sufijo 3mp de קשר, con sentido concreto de atar/ligar. En español, «atar» conserva la imagen física y resulta natural; se usa el enclítico «-los» para reflejar el objeto plural masculino implícito en el hebreo.
- source_word: עַל אֶצְבְּעֹתֶיךָ
  english_pob_choice: on your fingers
  chosen_spanish: en tus dedos
  alternatives_spanish:
  - sobre tus dedos
  - en tus dedos
  lexicon: HALOT
  rationale: Aunque el inglés POB mantiene «fingers», en español «dedos» es el término natural y claro para las manos. «En» expresa la localización de manera idiomática sin perder la imagen de algo llevado o fijado en los dedos.
- source_word: כָּתְבֵם
  english_pob_choice: write them
  chosen_spanish: escríbelos
  alternatives_spanish:
  - escríbelos
  - grábalos
  lexicon: HALOT
  rationale: כתב se rinde con «escribir», que preserva el paralelismo del verso. «Escríbelos» mantiene el mandato directo y la referencia a las palabras o enseñanzas implícitas.
- source_word: עַל לוּחַ
  english_pob_choice: on the tablet
  chosen_spanish: en la tabla
  alternatives_spanish:
  - sobre la tabla
  - en la tablilla
  lexicon: HALOT
  rationale: לוּחַ puede referirse a una tabla o tablilla de escritura. «Tabla» comunica el objeto de escribir de manera comprensible en español; se evita «tablilla» por sonar más marcado sin necesidad contextual.
- source_word: לִבֶּךָ
  english_pob_choice: of your heart
  chosen_spanish: de tu corazón
  alternatives_spanish:
  - de tu corazón
  - de tu mente
  - de tu interior
  lexicon: HALOT
  rationale: לֵב incluye pensamiento, voluntad y afecto, pero el equivalente bíblico más fiel y reconocible en español es «corazón». Se conserva la metáfora del «corazón» como sede interior, tal como en el inglés POB.
theological_decisions:
- issue: Metáfora de internalización sin parapfrasearla
  english_pob_reading: Retain the concrete metaphors of tying on the fingers and writing on the heart rather than paraphrasing them as merely 'remember' or 'internalize.'
  chosen_spanish_reading: Conservar las imágenes concretas de atarlos en los dedos y escribirlos en el corazón, sin reducirlas a una paráfrasis de memoria o interiorización.
  alternative_spanish_readings:
  - Recuerda siempre estas enseñanzas
  - Tenlas siempre presentes e interiorízalas
  rationale: 'El verso tiene peso sapiencial y una imaginería corporal concreta que no debe disiparse. La traducción mantiene la tensión literaria y teológica del texto: la instrucción debe quedar visible y también profundamente inscrita dentro de la persona.'
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto fuente y con el repaso final: no se requirieron cambios posteriores. Se preservó la equivalencia óptima del inglés POB y su nota léxica alternativa, adaptándolas a un español natural y auditable.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece un tetragrámaton en este versículo.
  - Se mantuvo la imagen concreta de atar/escribir para no diluir el paralelismo hebreo.
  - «Corazón» se conserva como equivalente bíblico estándar de לֵב, con su carga intelectual y volitiva.
  - 'El plural implícito de los objetos se reflejó con pronombres enclíticos masculinos plurales: «los».'
