translation:
  language: es
  text: Y hay un sabio que es sabio para sí[a]; el fruto de su conocimiento está sobre su cuerpo[b].
  philosophy: formal
  footnotes:
  - marker: a
    text: Hebreo 'para su alma'; aquí probablemente significa 'para sí' o 'para su propia vida'.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'cuerpo'; el sustantivo puede en algunos contextos significar 'cadáver', pero aquí se refiere a la persona viva que se beneficia de su entendimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: τέκνον
  english_pob_choice: —
  chosen_spanish: Hijo
  alternatives_spanish:
  - Hijo mío
  - Hijo mío, escucha
  lexicon: —
  rationale: El vocativo griego τέκνον corresponde naturalmente a un tratamiento filial en español. 'Hijo' es breve, directo y fiel al tono sapiencial exhortativo sin añadir afecto no explícito.
- source_word: ἐν τῇ ζωῇ σου
  english_pob_choice: —
  chosen_spanish: en tu vida
  alternatives_spanish:
  - durante tu vida
  - en el tiempo de tu vida
  lexicon: —
  rationale: La construcción expresa el ámbito temporal de la prueba. 'En tu vida' mantiene la sencillez del original y evita una paráfrasis excesiva.
- source_word: πείρασον
  english_pob_choice: —
  chosen_spanish: pon a prueba
  alternatives_spanish:
  - prueba
  - examina
  lexicon: —
  rationale: El imperativo pide una comprobación o examen real. 'Pon a prueba' conserva la fuerza verbal y el matiz de escrutinio.
- source_word: τὴν ψυχήν σου
  english_pob_choice: —
  chosen_spanish: tu alma
  alternatives_spanish:
  - tu vida
  - tu ser
  - ti mismo
  lexicon: —
  rationale: ψυχή puede significar alma, vida o yo mismo según el contexto. Aquí la amonestación sapiencial permite 'alma' como traducción básica, aunque el sentido práctico incluye la propia persona. Se conserva así la tensión léxica sin neutralizarla demasiado.
- source_word: τί πονηρὸν αὐτῇ
  english_pob_choice: —
  chosen_spanish: qué le es malo
  alternatives_spanish:
  - qué cosa mala hay en ella
  - qué le daña
  lexicon: —
  rationale: La expresión pregunta por lo malo o perjudicial para ella. 'Qué le es malo' refleja la estructura breve del griego y mantiene la referencia al daño para la ψυχή.
- source_word: μὴ δῷς αὐτῇ
  english_pob_choice: —
  chosen_spanish: no se lo des
  alternatives_spanish:
  - no le des eso
  - no le concedas nada de ello
  lexicon: —
  rationale: 'El objeto implícito se entiende por el contexto: no conceder a la propia alma lo que se ha identificado como malo. ''Se lo des'' conserva la economía del mandato.'
theological_decisions:
- issue: Sentido antropológico de ψυχή en una advertencia sapiencial
  english_pob_reading: Reflexive/self-regarding sense rather than a technical dualistic 'soul' contrast
  chosen_spanish_reading: '''alma'' con sentido de la propia vida/persona bajo examen'
  alternative_spanish_readings:
  - '''vida'''
  - '''ser'''
  - '''ti mismo'''
  rationale: El griego habla de examinar la ψυχή y de no darle lo que es malo para ella. En español, 'alma' permite conservar la imagen tradicional y la tensión antropológica, mientras el contexto deja claro que se trata del cuidado de la propia persona.
  doctrine_reference: Translation philosophy §1, §6
- issue: Imperativo de autoprueba moral
  english_pob_reading: Internal examination leading to refusal of what is harmful
  chosen_spanish_reading: '''pon a prueba... y mira qué le es malo'''
  alternative_spanish_readings:
  - '''examina... y mira qué le daña'''
  - '''pruébate... y mira qué es malo para ella'''
  rationale: El texto no solo insta a observación, sino a una evaluación práctica que desemboca en abstenerse de lo nocivo. El español propuesto conserva esa secuencia sin intensificarla doctrinalmente.
  doctrine_reference: Sabiduría moral / discernimiento
- issue: Relación entre el mandato y el objeto omitido del verbo dar
  english_pob_reading: Do not give to it what is harmful
  chosen_spanish_reading: '''no se lo des'' con referencia implícita a lo malo'
  alternative_spanish_readings:
  - '''no le des eso'''
  - '''no se lo concedas'''
  rationale: El griego omite el objeto explícito y el español debe suplirlo de manera natural. 'Se lo des' mantiene la referencia indirecta y deja visible la dependencia del mandato respecto de lo previamente discernido.
  doctrine_reference: Source-based ellipsis handling
translation_notes:
  revision_awareness: El inglés audit trail para Sirach 37:27 pertenece a una línea hebrea distinta ('wise for himself...'); aquí se siguió el texto base griego de Swete 1909, que pide un vocativo sapiencial y un imperativo directo. La decisión principal fue conservar ψυχή como 'alma' en el texto, mientras la nota aclara su valor más amplio de vida/persona. No se trasladaron automáticamente las elecciones del hebreo porque el Greek parallel ofrece una redacción y sintaxis diferentes.
  spanish_consistency_notes:
  - Se prefirió un registro sobrio y proverbially directo.
  - Se evitó 'Señor' u otras equivalencias no presentes en el versículo.
  - '''Pon a prueba'' y ''no se lo des'' mantienen la estructura imperativa concisa del griego.'
  - La nota al pie se usa solo donde el español introduce una posible ambigüedad real en ψυχή.
