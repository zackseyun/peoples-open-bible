id: 2PE.1.17
reference: 2 Peter 1:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: λαβὼν γὰρ παρὰ θεοῦ πατρὸς τιμὴν καὶ δόξαν φωνῆς ἐνεχθείσης αὐτῷ τοιᾶσδε ὑπὸ τῆς μεγαλοπρεποῦς δόξης· ⸂Ὁ υἱός μου ὁ ἀγαπητός μου οὗτός ἐστιν⸃, εἰς ὃν ἐγὼ εὐδόκησα—
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/017.yaml
  text: 'For when he received honor and glory from God the Father[a], such a voice was borne to him from the Majestic Glory: “This is my Son, my Beloved[c][b], in whom I am well pleased”—'
  footnotes:
  - marker: a
    text: Or “by the Majestic Glory.” The Greek ὑπό can mark agency; the translation “from” brings out the voice’s source in more natural English.
    reason: lexical_alternative
  - marker: b
    text: Or “This is my beloved Son.” The Greek more literally has “This is my Son, my Beloved.”
    reason: lexical_alternative
  - marker: c
    text: Or “with whom I am well pleased” or “in whom I took delight.” The Greek reads literally “into whom I delighted,” an idiom echoed in the Gospel accounts of Jesus’ baptism and transfiguration.
    reason: alternative_reading
translation:
  language: ko
  text: '그분께서 하나님 아버지로부터 영예와 영광을 받으셨을 때, 위엄 있는 영광으로부터 이러한 음성이 그분께 전해졌습니다: 「이는 내 사랑하는 아들이니, 내가 그를 기뻐하노라」—'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: τιμὴν καὶ δόξαν
  english_pob_choice: honor and glory
  chosen_korean: 영예와 영광
  lexicon: BDAG
  rationale: 쌍을 이루는 명사구를 자연스럽게 옮긴다.
- source_word: μεγαλοπρεποῦς δόξης
  english_pob_choice: Majestic Glory
  chosen_korean: 위엄 있는 영광
  alternatives_korean:
  - 장엄한 영광
  lexicon: BDAG
  rationale: 하나님을 가리키는 우회적 표현. 헬라어의 위엄과 영광의 결합을 살린다.
- source_word: Ὁ υἱός μου ὁ ἀγαπητός μου οὗτός ἐστιν
  english_pob_choice: This is my Son, my Beloved
  chosen_korean: 이는 내 사랑하는 아들이니
  alternatives_korean:
  - 이는 내 아들이요 내가 사랑하는 자라
  lexicon: BDAG
  rationale: 헬라어는 「내 아들, 내 사랑하는 자」로 두 술어가 나란히 놓이나, 한국어로는 「내 사랑하는 아들」이 자연스럽고 공관복음 변화산 본문과도 호응한다.
