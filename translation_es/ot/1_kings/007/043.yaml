lexical_decisions:
- source_word: וְ/אֶת הַ/מְּכֹנ֖וֹת
  english_pob_choice: and the ten stands
  chosen_spanish: y los diez soportes
  alternatives_spanish:
  - y las diez bases
  - y los diez pedestales
  lexicon: HALOT
  rationale: מְכֹנוֹת designa aquí los soportes asociados al mobiliario del templo. En español, “soportes” comunica la función sin sobrecargar con un tecnicismo menos natural; “bases” es posible pero puede sonar más abstracto, y “pedestales” introduce una imagen algo más ornamental que el contexto no exige.
- source_word: עָשֶׂר
  english_pob_choice: ten
  chosen_spanish: diez
  alternatives_spanish:
  - '10'
  lexicon: HALOT
  rationale: Se mantiene el cardinal en palabras para un registro bíblico fluido y consistente con el texto fuente.
- source_word: וְ/אֶת הַ/כִּיֹּרֹ֥ת
  english_pob_choice: and the ten basins
  chosen_spanish: y las diez palanganas
  alternatives_spanish:
  - y las diez vasijas
  - y las diez lavaceras
  lexicon: HALOT
  rationale: כִּיּוֹרֹת son recipientes de lavado. “Palanganas” da una imagen clara en español y conserva la función de recipiente; “vasijas” es más general y puede perder la idea de uso para lavar. “Lavaceras” sería más técnico/arcaizante.
- source_word: עֲשָׂרָה
  english_pob_choice: ten
  chosen_spanish: diez
  alternatives_spanish:
  - '10'
  lexicon: HALOT
  rationale: Se traduce igualmente como cardinal cardinal simple, sin necesidad de marcar el género en español.
- source_word: עַל הַ/מְּכֹנֽוֹת
  english_pob_choice: on the stands
  chosen_spanish: sobre los soportes
  alternatives_spanish:
  - encima de los soportes
  - sobre las bases
  lexicon: HALOT
  rationale: עַל indica colocación encima/de sobre. “Sobre” es la opción más directa y natural; se conserva la repetición del término para que el vínculo objeto-soporte quede explícito.
translation_notes:
  revision_awareness: El texto base hebreo y la auditoría inglesa muestran una simple lista inventarial sin variantes textuales ni cambios de contenido en la revisión más reciente; la redacción española sigue esa misma estructura acumulativa.
  spanish_consistency_notes:
  - Se mantuvo la repetición de מְכֹנוֹת como “soportes” en ambos lugares para conservar consistencia terminológica dentro del versículo.
  - Se eligió “palanganas” como equivalente funcional de כִּיֹּרוֹת, evitando “laveros” o “lavaceras” por ser menos transparentes para el lector moderno.
  - La nota al pie conserva la alternativa lexical documentada en la POB inglesa, adaptada al español sin añadir matices no atestiguados.
