revisions:
- from: En aquel tiempo Josué volvió[a] y capturó a Hazor, e hirió a su rey con la espada[c][b], porque Hazor antes era la cabeza de todos estos reinos.
  to: En aquel tiempo Josué volvió[a] y capturó a Hazor, y golpeó a su rey con la espada[c][b], porque Hazor antes era la cabeza de todos estos reinos.
  rationale: 'Se ajusta únicamente el verbo de הִכָּה בֶחָרֶב para reflejar mejor la contención léxica del hebreo y del expediente inglés: «golpeó ... con la espada» conserva la acción violenta sin afirmar de forma explícita «mató» ni reducirla a una mera herida. Se actualiza la nota correspondiente para armonizarla con el texto revisado.'
