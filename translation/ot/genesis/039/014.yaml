id: GEN.39.14
reference: Genesis 39:14
source:
  edition: WLC
  text: וַ/תִּקְרָ֞א לְ/אַנְשֵׁ֣י בֵיתָ֗/הּ וַ/תֹּ֤אמֶר לָ/הֶם֙ לֵ/אמֹ֔ר רְא֗וּ הֵ֥בִיא לָ֛/נוּ אִ֥ישׁ עִבְרִ֖י לְ/צַ֣חֶק בָּ֑/נוּ בָּ֤א אֵלַ/י֙ לִ/שְׁכַּ֣ב עִמִּ֔/י וָ/אֶקְרָ֖א בְּ/ק֥וֹל גָּדֽוֹל׃
translation:
  text: Then she called the men of her household and said to them[a], “Look, he has brought a Hebrew man to us to mock us. He came in to me to lie with me[b], and I cried out with a loud voice.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “to laugh at us,” “to make sport of us.” The Hebrew verb can denote mocking or abusive sport; in this context it carries the sense of sexual humiliation in Potiphar’s wife’s accusation.
    reason: lexical_alternative
  - marker: b
    text: Or 'he has brought in to us a Hebrew man'.
    reason: previous_rendering
lexical_decisions:
- source_word: וַתִּקְרָא
  chosen: Then she called
  alternatives:
  - And she called
  lexicon: HALOT
  rationale: Wayyiqtol advances the narrative. 'Then' gives natural English sequence while preserving the consecutive force.
- source_word: לְאַנְשֵׁי בֵיתָהּ
  chosen: the men of her household
  alternatives:
  - the men of her house
  - the household men
  lexicon: HALOT
  rationale: אַנְשֵׁי is specifically masculine plural ('men'), not a gender-neutral 'people/servants' here. בֵיתָהּ denotes her household/house. 'Household' is idiomatic and preserves the social sense.
- source_word: וַתֹּאמֶר לָהֶם לֵאמֹר
  chosen: and said to them
  alternatives:
  - and said to them, saying
  lexicon: HALOT
  rationale: Hebrew speech-introduction formula. English normally omits the redundant 'saying' while preserving direct discourse.
- source_word: רְאוּ
  chosen: Look
  alternatives:
  - See
  - Behold
  lexicon: HALOT
  rationale: Imperative drawing attention. 'Look' is natural modern English; 'behold' is archaic.
- source_word: הֵבִיא לָנוּ
  chosen: he has brought in to us
  alternatives:
  - he brought to us
  - he has brought us
  lexicon: HALOT
  rationale: The Hiphil of בוא is causative, 'bring in/bring.' The perfect in direct speech can be rendered with present relevance in English. 'To us' preserves the dative nuance and her appeal to household solidarity.
- source_word: אִישׁ עִבְרִי
  chosen: a Hebrew man
  alternatives:
  - a Hebrew
  - a Hebrew male
  lexicon: HALOT
  rationale: אִישׁ plus adjective עִבְרִי identifies Joseph ethnically and as a man. 'A Hebrew man' preserves both elements and the accusatory tone.
- source_word: לְצַחֶק בָּנוּ
  chosen: to mock us
  alternatives:
  - to laugh at us
  - to make sport of us
  - to toy with us
  lexicon: HALOT
  rationale: צחק in this construction can denote mocking or making sport of someone, with sexual overtones possible in context. 'Mock us' best fits her public accusation to the household and remains broad enough to include disgraceful abuse.
- source_word: בָּא אֵלַי
  chosen: He came in to me
  alternatives:
  - He came to me
  lexicon: HALOT
  rationale: בוא plus אֶל can simply mean 'come to,' but 'came in to me' fits the domestic setting and the implied intrusion.
- source_word: לִשְׁכַּב עִמִּי
  chosen: to lie with me
  alternatives:
  - to sleep with me
  lexicon: HALOT
  rationale: This is the standard Hebrew idiom for sexual intercourse. 'Lie with me' is more transparent to the source and less colloquial than 'sleep with me.'
- source_word: וָאֶקְרָא בְּקוֹל גָּדוֹל
  chosen: but I cried out with a loud voice
  alternatives:
  - and I cried out loudly
  - and I called out with a great voice
  lexicon: HALOT
  rationale: The conjunction is rendered 'but' in English because the clause is adversative in sense within her accusation. 'Cried out' fits the emergency context better than simple 'called.' 'With a loud voice' closely reflects the Hebrew expression.
