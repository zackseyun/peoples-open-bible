  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y la auditoría inglesa en casi todos los segmentos: mantiene la agencia divina de «reuniré», el sentido hostil de «contra Jerusalén», la secuencia bélica, el valor explícito de la agresión sexual, «al exilio» para בַּגּוֹלָה, y la ambigüedad formal de לֹא יִכָּרֵת. Sin embargo, hay un desajuste de anclaje de notas: la nota [a] está puesta en «para la guerra», pero su contenido trata sobre «las mujeres violadas».'
  spanish_quality_summary: 'El texto es mayormente natural y digno. Conviene mejorar dos puntos de legibilidad y precisión: mover la nota [a] al sintagma de agresión sexual, y sustituir «no será cortado de la ciudad» por «no será separado de la ciudad», que conserva la imagen formal de כרת/מן mejor en español idiomático que «cortado de». También es preferible quitar la coma antes de «y» en la serie simple.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «Violadas» refleja correctamente la decisión de no eufemizar תשגלנה. «Resto del pueblo» evita sobrecargar יֶתֶר con «remanente».
  issues:
  - severity: high
    issue: La nota [a] está anclada al lugar equivocado.
    rationale: La nota explica alternativas para תשגלנה («las mujeres violadas/ultrajadas/raviadas»), pero en el texto aparece después de «para la guerra». Esto incumple la disciplina de notas y confunde al lector.
  - severity: medium
    issue: «No será cortado de la ciudad» suena poco idiomático en español.
    rationale: Aunque intenta conservar la metáfora formal de כרת, en español «cortado de la ciudad» resulta torpe. «No será separado de la ciudad» preserva mejor la idea de ser apartado/removido sin sobreinterpretar hacia exterminio; la alternativa fuerte puede quedarse en nota.
  - severity: low
    issue: Puntuación ligeramente poco natural en la coordinación.
    rationale: La coma antes de «y las mujeres violadas» no es necesaria en una serie simple y puede aligerarse para mejor fluidez.
  - severity: low
    issue: La variante «raviadas» en la nota es arcaica y poco transparente para lectores modernos.
    rationale: Puede conservarse por fidelidad a tradiciones de traducción, pero conviene marcarla junto con una alternativa más clara como «ultrajadas» o «forzadas». No es un error grave.
