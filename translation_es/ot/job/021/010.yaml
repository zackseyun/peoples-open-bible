translation:
  language: es
  text: Su toro fecunda[a] y no falla; su vaca pare y no pierde la cría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «y no la desecha» o «y no la deja estéril». El verbo hebreo es difícil aquí; el texto principal expresa el sentido exigido por el paralelismo: la reproducción del toro tiene éxito, no resulta infructuosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שׁוֹרוֹ
  english_pob_choice: his bull
  chosen_spanish: su toro
  alternatives_spanish:
  - su buey
  - su animal macho
  lexicon: HALOT
  rationale: En este contexto reproductivo, el hebreo שׁוֹר se refiere al macho bovino apto para la reproducción. «Toro» conserva mejor esa fuerza que «buey», que suena castrado o de labor, y «su» mantiene el posesivo del sufijo.
- source_word: עִבַּר
  english_pob_choice: breeds
  chosen_spanish: se apareó
  alternatives_spanish:
  - engendró
  - fecundó
  - crió
  lexicon: HALOT
  rationale: El verbo expresa éxito reproductivo del macho. «Se apareó» comunica la relación sexual reproductiva de forma natural en español sin añadir más de lo que el paralelismo requiere.
- source_word: וְלֹא יַגְעִל
  english_pob_choice: and does not fail
  chosen_spanish: y no falló
  alternatives_spanish:
  - y no quedó estéril
  - y no hizo fallar
  - y no rehusó
  lexicon: HALOT
  rationale: El hebreo es difícil; el audit trail inglés mantiene la tensión con una traducción de resultado. En español, «no falló» conserva esa idea de eficacia reproductiva sin fijar indebidamente una sola paráfrasis interpretativa.
- source_word: תְּפַלֵּט
  english_pob_choice: calves
  chosen_spanish: parió
  alternatives_spanish:
  - dio a luz
  - tuvo cría
  lexicon: HALOT
  rationale: El verbo en este contexto de ganado indica dar a luz. «Parió» es breve, preciso y natural para una vaca en español bíblico contemporáneo.
- source_word: פָּרָתוֹ
  english_pob_choice: his cow
  chosen_spanish: su vaca
  alternatives_spanish:
  - su res
  - su hembra
  lexicon: HALOT
  rationale: פָּרָה denota vaca. «Vaca» es la equivalencia directa y más transparente para el lector hispanohablante.
- source_word: וְלֹא תְשַׁכֵּל
  english_pob_choice: and does not miscarry
  chosen_spanish: y no abortó
  alternatives_spanish:
  - y no perdió la cría
  - y no quedó privada de cría
  lexicon: HALOT
  rationale: שׁכל puede expresar quedar privada de hijos o perder la cría. En este marco de parto animal, «abortó» recoge la pérdida temprana del embarazo/cría y suena más natural que una perífrasis humana o excesivamente técnica.
translation_notes:
  revision_awareness: El texto español sigue de cerca el sentido del audit trail inglés y del hebreo, manteniendo la dificultad lexical de יַגְעִל sin resolverla con una glosa demasiado cerrada. Se conserva el paralelismo ganado/perdido del verso.
  spanish_consistency_notes:
  - Se usa «toro/vaca» para reflejar el contexto ganadero reproductivo.
  - Se evita «SEÑOR» u otra convención teológica porque el versículo no contiene el nombre divino.
  - Se mantiene un estilo bíblico moderno, claro y directo, sin añadir imágenes ajenas al paralelismo hebreo.
