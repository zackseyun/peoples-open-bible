translation:
  language: es
  text: 'Cuando el profeta que lo había hecho volver del camino lo oyó, dijo: «Es el hombre de Dios, que se rebeló contra la palabra[a] de Yahvé; por eso Yahvé lo entregó al león, y este lo destrozó y lo mató, conforme a la palabra de Yahvé que le había hablado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «la orden de Yahvé» o «el mandato de Yahvé». El hebreo dice literalmente «la boca de Yahvé».
    reason: lexical_alternative
lexical_decisions:
- source_word: הֱשִׁיבוֹ מִן הַדֶּרֶךְ
  english_pob_choice: had brought him back from the way
  chosen_spanish: lo había hecho volver del camino
  alternatives_spanish:
  - lo había traído de vuelta del camino
  - lo había hecho regresar del camino
  lexicon: HALOT
  rationale: El causativo de שוב con מן + דרך expresa que alguien fue hecho volver de su ruta. En español, «hacer volver» conserva el sentido causativo y suena natural; «camino» mantiene el motivo narrativo de manera más fiel que una paráfrasis como «ruta».
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  lexicon: HALOT
  rationale: Es el título narrativo habitual para el profeta o mensajero comisionado por Dios. «Hombre de Dios» reproduce bien la fuerza titular y la continuidad del relato; «varón de Dios» es posible, pero menos natural en español contemporáneo.
- source_word: מָרָה אֶת פִּי יְהוָה
  english_pob_choice: rebelled against the word of Yahweh
  chosen_spanish: se rebeló contra la palabra de Yahvé
  alternatives_spanish:
  - desobedeció la palabra de Yahvé
  - se rebeló contra el mandato de Yahvé
  - desafió la palabra de Yahvé
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «rebelarse contra la boca de Yahvé», la revisión inglesa ya optó por «word» para expresar la idiomática hebrea con más naturalidad. En español, «la palabra de Yahvé» preserva esa decisión y evita una literalidad extraña; «mandato» o «desafió» suavizan o desplazan el matiz de rebelión.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino transliterado, conforme al criterio del proyecto, en lugar de sustituirlo por un título. «Yahvé» es la forma estándar de este proyecto para el Tetragrámaton.
- source_word: וַיִּתְּנֵהוּ ... לָאַרְיֵה
  english_pob_choice: gave him to the lion
  chosen_spanish: lo entregó al león
  alternatives_spanish:
  - lo dio al león
  - lo puso en manos del león
  lexicon: HALOT
  rationale: נתן con ל expresa entregar a alguien al poder de otro. «Lo entregó al león» comunica la idea de ser puesto bajo el poder del animal con más precisión que un simple «dio».
- source_word: וַיִּשְׁבְּרֵהוּ
  english_pob_choice: mauled him
  chosen_spanish: lo destrozó
  alternatives_spanish:
  - lo desgarró
  - lo hirió gravemente
  lexicon: HALOT
  rationale: El verbo שבר literalmente significa «quebrantar/romper», pero con un león como sujeto describe una violencia mortal. «Destrozó» comunica con fuerza y naturalidad el ataque del animal en español; «desgarró» es viable, pero menos directo según el contexto.
- source_word: וַיְמִתֵהוּ
  english_pob_choice: killed him
  chosen_spanish: lo mató
  alternatives_spanish:
  - le dio muerte
  - lo hizo morir
  lexicon: HALOT
  rationale: El causativo de מות se traduce de forma directa y precisa con «lo mató».
- source_word: כִּדְבַר יְהוָה
  english_pob_choice: according to the word of Yahweh
  chosen_spanish: conforme a la palabra de Yahvé
  alternatives_spanish:
  - según la palabra de Yahvé
  - de acuerdo con la palabra de Yahvé
  lexicon: HALOT
  rationale: «Conforme a» expresa adecuadamente cumplimiento y correspondencia con lo dicho por Dios. Mantiene el paralelismo con el resto del versículo.
- source_word: אֲשֶׁר דִּבֶּר לוֹ
  english_pob_choice: that he spoke to him
  chosen_spanish: que le había hablado
  alternatives_spanish:
  - que le habló
  - que le había dicho
  lexicon: HALOT
  rationale: El relativo final remite a la palabra previa de Yahvé al hombre de Dios. El pluscuamperfecto en español ayuda a dejar claro que se trata de una palabra anterior ya pronunciada.
theological_decisions:
- issue: Traducción del Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre divino personal, coherente con la política del proyecto y con la decisión inglesa de no sustituir el nombre por un título. «Yahvé» es la forma adoptada para el texto español principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Expresión idiomática אֶת פִּי יְהוָה
  english_pob_reading: the word of Yahweh
  chosen_spanish_reading: la palabra de Yahvé
  alternative_spanish_readings:
  - el mandato de Yahvé
  - la boca de Yahvé
  rationale: El hebreo dice literalmente «la boca de Yahvé», pero la tradición auditada del POB inglés ya decidió que el sentido idiomático aquí es «word». En español, «la palabra de Yahvé» comunica fielmente el sentido sin introducir una literalidad opaca; se evita «mandato» porque estrecha demasiado el alcance semántico.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés, que afinó el idiomático פִּי יְהוָה hacia «the word of Yahweh». La versión española refleja esa preferencia con «la palabra de Yahvé», manteniendo a la vez el nombre divino transliterado y un castellano natural. También se conserva la secuencia causal del relato: oír, declarar la culpa, entregar al león, y el cumplimiento exacto de la palabra divina.'
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה, sin sustituirlo por «SEÑOR».
  - Se prefiere «palabra de Yahvé» para el idiomático hebreo פִּי יְהוָה, reservando «boca» solo en la nota como alternativa literal.
  - «Hombre de Dios» se mantiene como título narrativo fijo, coherente con el uso bíblico y con el inglés auditado.
  - «Lo entregó al león» y «lo destrozó» conservan la violencia del contexto sin suavizarla indebidamente.
