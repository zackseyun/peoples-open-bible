translation:
  language: es
  text: Entonces Moisés escribió esta ley y la entregó a los sacerdotes[a], los hijos de Leví[b], que llevan el arca del pacto de Yahvé[c], y a todos los ancianos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta instrucción» o «esta Torá».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los hijos de Leví»; muchas traducciones lo compactan como «los levitas».'
    reason: lexical_alternative
  - marker: c
    text: Hebreo YHWH; tradicionalmente se traduce «el SEÑOR».
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּכְתֹּב
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - anotó
  - redactó
  lexicon: HALOT
  rationale: כתב se refiere de forma directa a la acción de escribir. En español, «escribió» es la correspondencia más natural y precisa para conservar el acto narrativo sin añadir matices no presentes en el hebreo.
- source_word: הַתּוֹרָה הַזֹּאת
  english_pob_choice: this law
  chosen_spanish: esta ley
  alternatives_spanish:
  - esta instrucción
  - esta Torá
  lexicon: HALOT
  rationale: En Deuteronomio, תּוֹרָה puede abarcar ley e instrucción, pero aquí el contexto es el cuerpo normativo del pacto que Moisés pone por escrito. «Ley» comunica bien ese valor en español sin perder la referencia al texto normativo.
- source_word: וַיִּתְּנָהּ
  english_pob_choice: gave it
  chosen_spanish: la entregó
  alternatives_spanish:
  - la dio
  - la puso en manos de
  lexicon: HALOT
  rationale: El verbo נתן con sufijo femenino retoma «la ley». «La entregó» conserva la idea simple de transferencia formal y resulta más preciso en español bíblico que el muy general «la dio».
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  - los presbíteros
  lexicon: HALOT
  rationale: כהנים se traduce de manera estándar como «sacerdotes». En español bíblico contemporáneo, «sacerdotes» es claro y fiel al oficio cultual indicado.
- source_word: בְּנֵי לֵוִי
  english_pob_choice: the sons of Levi
  chosen_spanish: los hijos de Leví
  alternatives_spanish:
  - los levitas
  - los descendientes de Leví
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hijos de Leví». Se mantiene esa estructura para ser transparente con el original, aunque «levitas» sería una compactación posible; aquí se conserva la forma más cercana al texto.
- source_word: הַנֹּשְׂאִים
  english_pob_choice: who carry
  chosen_spanish: que llevaban
  alternatives_spanish:
  - que cargaban
  - que portaban
  lexicon: HALOT
  rationale: El participio describe a los sacerdotes/hijos de Leví en su función de cargar el arca. «Llevaban» es natural en español y preserva la acción continua sin sonar excesivamente arcaico.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahvé
  - el arca del pacto de Yahvé
  lexicon: HALOT
  rationale: La cadena constructa expresa el arca vinculada al pacto de Yahvé. Se conserva el término «pacto» para ברית y el nombre divino «Yahvé» según el criterio del proyecto, evitando la sustitución por una fórmula tradicional de ocultamiento del nombre.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: El Tetragrámaton se vierte como «Yahvé» conforme al criterio del proyecto. En español, esta forma es la transliteración establecida para preservar el nombre personal del Dios del pacto.
- source_word: כָּל זִקְנֵי יִשְׂרָאֵל
  english_pob_choice: all the elders of Israel
  chosen_spanish: todos los ancianos de Israel
  alternatives_spanish:
  - todos los ancianos de Israel
  - todos los líderes de Israel
  lexicon: HALOT
  rationale: זִקְנֵי ישראל designa a los ancianos con autoridad representativa. «Ancianos» es la correspondencia directa y mantiene la terminología de liderazgo del texto.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  rationale: Se preserva el nombre propio divino en vez de sustituirlo por un título litúrgico. Esto sigue la decisión teológica y editorial del proyecto de mantener visible el Tetragrámaton en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de תּוֹרָה en este contexto
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - instrucción
  - Torá
  rationale: Aquí el referente es el cuerpo normativo del pacto que Moisés escribe y entrega. «Ley» expresa mejor ese valor jurídico-covenantal en español, sin reducir el concepto a mera enseñanza.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; original-language primacy'
translation_notes:
  revision_awareness: Coincide con el último pase de revisión indicado como sin cambios y con el veredicto de alta concordancia. No se requieren revisiones adicionales respecto del paquete auditado en inglés.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para YHWH de forma consistente con el criterio del proyecto.
  - Se conservó la estructura transparente «los hijos de Leví» en lugar de compactarla como «levitas».
  - «Arca del pacto» reproduce la cadena nominal hebrea con naturalidad en español.
  - La puntuación y el orden reflejan una lectura narrativa directa, sin añadir explicaciones ajenas al versículo.
