review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el hebreo primario: כל como «Todo lo que», מארץ אל ארץ ישוב como retorno de la tierra a la tierra, y ואשר ממרום אל מרום como una segunda cola elíptica basada en el hebreo y no en el griego. También conserva correctamente la variante griega en nota. Sin embargo, la formulación española de la segunda cola introduce una pequeña inconsistencia semántica con el inglés auditado y con la lógica del hebreo repetido: «de lo alto, a lo que es de lo alto» mezcla un sintagma nominal sin verbo con otro relativo verbalizado. Conviene alinearla mejor con la repetición sobria del original.'
  spanish_quality_summary: El español es claro y natural en general. La primera cola está bien lograda. La segunda cola se entiende, pero la repetición «de lo alto ... de lo alto» con «es» en ambos miembros suena algo pesada y menos elegante de lo necesario. «Y lo que viene de lo alto, vuelve a lo alto» es más idiomático, mantiene la imagen vertical y expresa con claridad el movimiento implícito, en paralelo con «vuelve a la tierra».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos como Yahvé, Mesías, Espíritu, etc. La elección de «tierra» y «lo alto» respeta las decisiones léxicas y la prioridad del hebreo frente al paralelo griego. La nota alternativa griega también está bien formulada en español.
  issues:
  - severity: medium
    issue: Segunda cola algo forzada y desalineada en la repetición
    rationale: «y lo que es de lo alto, a lo que es de lo alto» refleja la literalidad, pero en español queda abrupto y mezcla estructuras distintas. El sentido del hebreo/inglés auditado admite hacer explícito el retorno con «vuelve», como ya se hizo en la primera cola, sin sobreinterpretar ni cambiar la prioridad del hebreo.
  revised_spanish_text: Todo lo que es de la tierra vuelve a la tierra[a], y lo que viene de lo alto vuelve a lo alto.
  revised_footnotes:
  - marker: a
    text: 'El griego dice: «y de las aguas vuelve al mar».'
    reason: alternative_reading
  revision_rationale: Se hace una reparación menor de estilo y claridad en la segunda cola para que el español suene más natural y preserve mejor el paralelismo de retorno del verso, sin abandonar la lectura hebrea primaria ni la nota de variante griega.
