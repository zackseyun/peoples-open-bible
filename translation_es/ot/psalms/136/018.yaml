translation:
  language: es
  text: y mató a reyes poderosos[a], porque su amor leal[b] permanece para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reyes fuertes».
    reason: lexical_alternative
  - marker: b
    text: Hebreo hesed; también puede traducirse «misericordia», «amor constante» o «fidelidad de pacto».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּהֲרֹג
  english_pob_choice: and killed
  chosen_spanish: y mató
  alternatives_spanish:
  - y asesinó
  - y dio muerte a
  - y derribó
  lexicon: HALOT
  rationale: El wayyiqtol de הרג continúa la narración histórica del salmo en pasado. «Mató» comunica la acción de forma clara y natural en español moderno, sin añadir matices más fuertes o más débiles que el hebreo.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: reyes
  alternatives_spanish:
  - monarcas
  - soberanos
  lexicon: HALOT
  rationale: El sustantivo plural básico designa reyes; «reyes» es la equivalencia directa y más transparente en español.
- source_word: אַדִּירִים
  english_pob_choice: mighty
  chosen_spanish: poderosos
  alternatives_spanish:
  - fuertes
  - poderosos y grandes
  - majestuosos
  lexicon: HALOT
  rationale: En este contexto bélico, el adjetivo describe fuerza o imponencia. «Poderosos» conserva la idea de reyes formidables sin sugerir solo esplendor real, como podría pasar con «majestuosos».
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque, en efecto
  lexicon: HALOT
  rationale: En español, «porque» expresa bien la relación explicativa/causal del refrán litúrgico. Mantiene el enlace con la acción anterior sin sonar artificial.
- source_word: לְעוֹלָם
  english_pob_choice: endures forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: Aquí el hebreo aporta la idea de duración indefinida dentro de la fórmula fija del estribillo. En español, el sentido verbal implícito queda bien expresado por «para siempre» dentro de la construcción completa.
- source_word: חַסְדּוֹ
  english_pob_choice: his steadfast love
  chosen_spanish: su amor leal
  alternatives_spanish:
  - su amor constante
  - su misericordia
  - su fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד tiene un campo semántico amplio de amor leal, fidelidad y bondad de pacto. «Amor leal» preserva ese peso relacional y covenantal sin reducirlo a «misericordia» ni usar un término demasiado técnico.
theological_decisions:
- issue: Traducción de חֶסֶד en el estribillo
  english_pob_reading: his steadfast love endures forever
  chosen_spanish_reading: su amor leal para siempre
  alternative_spanish_readings:
  - su misericordia para siempre
  - su fidelidad de pacto para siempre
  - su amor constante para siempre
  rationale: El salmo celebra la fidelidad activa de Dios en la historia. «Amor leal» conserva tanto la dimensión afectiva como la de compromiso fiel, evitando estrechar el término a una sola faceta como «misericordia» o forzar una fórmula demasiado abstracta.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto hebreo y la audit trail inglesa coinciden de manera alta en sentido y estructura; no se registran revisiones textuales o de sentido que requieran nota aparte.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y bíblico, con español moderno y claro.
  - 'Se conservó la estructura paralela del hebreo: acción pasada + objeto + razón/refrán.'
  - No se usó «SEÑOR» como máscara; el verso no contiene el nombre divino, sino la fórmula de חסד.
