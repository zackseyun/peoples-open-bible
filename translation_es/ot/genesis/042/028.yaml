translation:
  language: es
  text: 'Él dijo a sus hermanos: «Mi plata ha sido devuelta, y miren, hasta está en mi costal». Entonces les faltó el valor[a], y temblaron, cada hombre a su hermano, diciendo[b]: «¿Qué es esto que Dios nos ha hecho?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su corazón desfalleció»; literalmente, «su corazón salió».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «unos a otros». Literalmente, «cada hombre a su hermano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: הוּשַׁב
  english_pob_choice: has been returned
  chosen_spanish: ha sido devuelta
  alternatives_spanish:
  - fue devuelta
  - ha sido restituida
  lexicon: HALOT
  rationale: El hophal de שוב expresa que algo fue hecho volver o devuelto. En español, el pretérito perfecto compuesto transmite bien el estado descubierto al hablar, y 'devuelta' conserva la idea concreta de regreso sin añadir una interpretación más amplia.
- source_word: כַּסְפִּי
  english_pob_choice: my silver
  chosen_spanish: mi plata
  alternatives_spanish:
  - mi dinero
  - mi dinero de plata
  lexicon: HALOT
  rationale: כסף significa literalmente 'plata' y, por extensión, dinero. 'Plata' mantiene el material concreto del relato y evita modernizarlo excesivamente con 'dinero'.
- source_word: בְאַמְתַּחְתִּי
  english_pob_choice: sack
  chosen_spanish: costal
  alternatives_spanish:
  - saco
  - saco de grano
  lexicon: HALOT
  rationale: El término designa un recipiente para carga o provisiones. 'Costal' es natural en español bíblico y conserva la imagen de un saco de transporte sin sonar demasiado moderno.
- source_word: וְגַם הִנֵּה
  english_pob_choice: and look, it is even
  chosen_spanish: y miren, está incluso
  alternatives_spanish:
  - y he aquí, está también
  - y miren, incluso está
  lexicon: HALOT
  rationale: La combinación añade énfasis y sorpresa. 'Y miren' reproduce el valor deíctico de הִנֵּה, y 'está incluso' conserva el matiz aditivo y sorpresivo de גַם.
- source_word: וַיֵּצֵא לִבָּם
  english_pob_choice: their hearts failed them
  chosen_spanish: les salió el corazón
  alternatives_spanish:
  - se les salió el corazón
  - les faltó el ánimo
  lexicon: HALOT
  rationale: 'La frase hebrea es literal: ''salió su corazón''. Mantener la imagen en español preserva la tensión lexical que el POB inglés resolvió con una equivalencia idiomática; aquí se opta por una traducción más cercana al hebreo, ya que la expresión es entendible y auditable.'
- source_word: וַיֶּחֶרְדוּ
  english_pob_choice: they trembled
  chosen_spanish: temblaron
  alternatives_spanish:
  - se estremecieron
  - tuvieron miedo
  lexicon: HALOT
  rationale: חרד señala temblor por miedo o agitación. 'Temblaron' conserva el componente físico y emocional sin sobreexplicar la causa.
- source_word: אִישׁ אֶל אָחִיו
  english_pob_choice: each man to his brother
  chosen_spanish: cada hombre a su hermano
  alternatives_spanish:
  - cada uno a su hermano
  - unos a otros
  lexicon: HALOT
  rationale: La construcción distributiva masculina singular se mantiene de forma transparente. 'Cada hombre a su hermano' conserva el paralelismo del hebreo y la referencia fraterna específica del relato.
- source_word: מַה זֹּאת
  english_pob_choice: What is this
  chosen_spanish: ¿Qué es esto?
  alternatives_spanish:
  - ¿Qué es esta cosa?
  - ¿Por qué ha sucedido esto?
  lexicon: HALOT
  rationale: Es una pregunta exclamativa directa. La forma breve en español reproduce el impacto del original sin convertirla en una explicación causal.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - dios
  - los dioses
  lexicon: HALOT
  rationale: En este contexto narrativo, אֱלֹהִים se refiere al Dios verdadero. 'Dios' es la equivalencia natural y mantiene la lectura singular que el contexto exige.
theological_decisions:
- issue: Referencia singular de אֱלֹהִים en la pregunta temerosa de los hermanos
  english_pob_reading: God
  chosen_spanish_reading: Dios
  alternative_spanish_readings:
  - dios
  - los dioses
  rationale: Aunque la forma hebrea es plural morfológicamente, el contexto narrativo apunta al Dios de Israel actuando soberanamente. 'Dios' preserva esa referencia sin introducir una glosa teológica que el texto no expresa.
  doctrine_reference: 'Affirmations; translation philosophy #1 and #3'
- issue: Conservación de la imagen hebrea en וַיֵּצֵא לִבָּם
  english_pob_reading: their hearts failed them
  chosen_spanish_reading: les salió el corazón
  alternative_spanish_readings:
  - se les salió el corazón
  - les faltó el ánimo
  rationale: El POB inglés eligió una equivalencia idiomática; sin embargo, el hebreo es más gráfico y literal. En español, la imagen puede mantenerse de manera inteligible, dejando visible la fuerza corporal del original.
  doctrine_reference: 'Translation philosophy #2 and #4'
translation_notes:
  revision_awareness: Se siguió de cerca el texto hebreo masorético y se cotejó el auditable inglés de POB. A diferencia del inglés, que resolvió la expresión idiomática de לבבם con 'their hearts failed them', esta versión conserva la imagen hebrea 'les salió el corazón' porque en español es comprensible y permite mantener una correspondencia más directa con el source. También se prefirió 'costal' para אַמְתַּחַת por ser natural en registro bíblico español. No se detectaron revisiones aplicadas en el expediente inglés reciente.
  spanish_consistency_notes:
  - Se usó 'Dios' para אֱלֹהִים en singular, conforme al contexto narrativo.
  - Se mantuvo 'plata' para כסף, conservando la concreción del metal/money.
  - Se preservó la estructura distributiva 'cada hombre a su hermano' para reflejar el hebreo y la política de precisión de género.
  - La puntuación y el uso de comillas siguen normas del español moderno para publicación.
