translation:
  language: es
  text: Él arroja su hielo como migajas[a]; ¿quién puede resistir[b] ante su frío?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como trocitos» o «como pedazos». La imagen hebrea señala fragmentos pequeños y quebrados, probablemente evocando restos de pan.
    reason: lexical_alternative
  - marker: b
    text: Lit. «¿quién puede mantenerse en pie delante de su frío?»
    reason: lexical_alternative
lexical_decisions:
- source_word: מַשְׁלִ֣יךְ
  english_pob_choice: throws down
  chosen_spanish: arroja
  alternatives_spanish:
  - lanza
  - echa
  lexicon: HALOT
  rationale: El participio causativo expresa la acción de hacer caer o lanzar algo con fuerza. «Arroja» conserva el impulso vívido del cuadro poético sin sonar demasiado mecánico en español.
- source_word: קַרְחוֹ
  english_pob_choice: his ice
  chosen_spanish: su hielo
  alternatives_spanish:
  - su escarcha
  - su granizo
  lexicon: HALOT
  rationale: La base léxica apunta a hielo o escarcha. «Hielo» mantiene la concreción del sustantivo y encaja con la imagen de partículas frías arrojadas desde arriba.
- source_word: כְפִתִּים
  english_pob_choice: like crumbs
  chosen_spanish: como migajas
  alternatives_spanish:
  - como trozos
  - como pedacitos
  - como pedazos
  lexicon: HALOT
  rationale: El término señala fragmentos pequeños, especialmente restos de pan. «Migajas» conserva la idea de pequeñas piezas dispersas y funciona con naturalidad en español.
- source_word: לִפְנֵי
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: HALOT
  rationale: El valor espacial y retórico de la preposición se expresa bien con «delante de», que mantiene la imagen de estar frente a la fuerza descrita.
- source_word: קָרָתוֹ
  english_pob_choice: his cold
  chosen_spanish: su frío
  alternatives_spanish:
  - su frío glacial
  - su escarcha
  lexicon: HALOT
  rationale: El sustantivo designa frialdad o frío. «Su frío» preserva la posesión y la brevedad poética del hebreo, sin añadir intensificación que el texto no exige.
- source_word: מִי יַעֲמֹד
  english_pob_choice: who can stand
  chosen_spanish: ¿quién puede mantenerse en pie?
  alternatives_spanish:
  - ¿quién puede estar firme?
  - ¿quién puede resistir?
  lexicon: HALOT
  rationale: La forma verbal es literalmente «quién estará de pie». En español, «mantenerse en pie» conserva la imagen corporal de permanecer de pie y comunica adecuadamente la idea de resistencia frente al frío.
translation_notes:
  revision_awareness: La base inglesa y la revisión más reciente muestran acuerdo alto y sin cambios pendientes; por eso se mantuvo la imagen poética central («arroja su hielo... su frío») y solo se ajustó la formulación española para mayor naturalidad y fidelidad al hebreo.
  spanish_consistency_notes:
  - Se preservó el paralelismo entre el objeto arrojado y la pregunta retórica final.
  - Se evitó sustituir la imagen concreta del «hielo» por una abstracción más interpretativa.
  - «Migajas» se eligió por su fuerza idiomática en español y su afinidad con el sentido de pequeños fragmentos.
  - No se capitalizó ningún término divino, ya que el versículo no contiene un nombre divino explícito.
