    issue: Concordancia defectuosa en «tomaron cautivas a las mujeres de Madián y a sus pequeños»
    rationale: El adjetivo/predicativo «cautivas» no cubre naturalmente a «sus pequeños». El hebreo tiene un solo verbo de cautiverio con dos objetos humanos; el español actual necesita una redacción que abarque a ambos sin discordancia.
  - severity: medium
    issue: Ubicación de las notas [c][b] al final de «riquezas»
    rationale: La nota [b] explica «sus pequeños»/«sus hijos», por lo que su marcador debe ir junto a «sus pequeños», no junto a «riquezas». Tal como está, crea confusión referencial.
  - severity: low
    issue: Error ortográfico en la alternativa «bestiame»
    rationale: La forma correcta es «bestiame» en italiano; en español sería «bestiario» no corresponde, o mejor evitar esa alternativa. Dado que no afecta el texto principal, basta con no reproducirla en la revisión.
