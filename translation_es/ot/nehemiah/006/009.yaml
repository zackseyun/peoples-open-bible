base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/006/009.yaml
  text: For all of them were trying to frighten us[a], saying, “Their hands will grow weak from the work, and it will not be done.” But now[b], strengthen my hands.
  footnotes:
  - marker: a
    text: Or 'their hands will become weak from the work.' The Hebrew idiom literally speaks of hands slackening or dropping.
    reason: lexical_alternative
  - marker: b
    text: 'The final clause is a brief prayer: ''But now, strengthen my hands.'' Some have understood it differently, but the Hebrew vocalization supports a direct appeal to God.'
    reason: alternative_reading
