revisions:
- from: Si no tienes con qué pagar[a], ¿por qué han de quitarte la cama de debajo de ti?
  to: Si no tienes con qué pagar[a], ¿por qué habría de quitarte tu cama de debajo de ti?
  rationale: Se reemplaza el plural impersonal por un singular más fiel al hebreo y al contexto del acreedor implícito, y se añade el posesivo «tu» para reflejar mejor מִשְׁכָּבְךָ. El resto del borrador es sólido y no requiere cambios.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:16:05Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional, el sentido de posesión implícita en אֵין לְךָ, el matiz instrumental de לְשַׁלֵּם y la imagen concreta de quitar la cama de debajo del deudor. Sin embargo, se aparta innecesariamente del singular masculino de יִקַּח al usar un plural impersonal («han de quitarte»), cuando el contexto favorece un sujeto singular indefinido/contextual («él», es decir, el acreedor del v. 26).
  spanish_quality_summary: El español es claro y natural. No obstante, «¿por qué han de quitarte…?» introduce un sujeto plural inespecífico menos fiel y algo menos vívido que el singular. También conviene explicitar la posesión en «tu cama» para corresponder mejor a מִשְׁכָּבְךָ y mantener la fuerza concreta del proverbio.
  glossary_alignment: No hay términos del glosario maestro especialmente implicados aquí. La nota léxica sobre מִשְׁכָּב conserva adecuadamente las alternativas. La revisión propuesta mantiene la fidelidad léxica y mejora la correspondencia con el hebreo y con la auditoría inglesa.
  issues:
  - severity: medium
    issue: Cambio de sujeto singular a plural impersonal en «han de quitarte»
    rationale: El hebreo יִקַּח es 3ms singular; la auditoría inglesa lo mantiene como «he take», refiriéndose probablemente al acreedor del versículo anterior. El plural impersonal español diluye ese referente contextual y reduce la precisión.
  - severity: low
    issue: «la cama» en lugar de «tu cama»
    rationale: Aunque «quitarte la cama» es comprensible, מִשְׁכָּבְךָ incluye posesivo explícito. «Tu cama» preserva mejor la forma y la imagen concreta del texto fuente.
  revised_spanish_text: Si no tienes con qué pagar[a], ¿por qué habría de quitarte tu cama de debajo de ti?
  revised_footnotes:
