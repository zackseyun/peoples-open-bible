translation:
  language: es
  text: Y cuando el sol centelleó sobre los escudos de oro, los montes centelleaban desde ellos y brillaban como antorchas de fuego.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔστιλβεν
  english_pob_choice: flashed
  chosen_spanish: resplandecía / resplandecían
  alternatives_spanish:
  - brillaba / brillaban
  - centelleaba / centelleaban
  - fulguraba / fulguraban
  lexicon: LSJ
  rationale: El verbo griego expresa un brillo intenso y repentino. En español, "resplandecer" conserva la idea de una luz viva y visible sin sonar forzado; además permite mantener la repetición del paralelo entre el sol y los montes.
- source_word: χρυσᾶς
  english_pob_choice: golden
  chosen_spanish: de oro
  alternatives_spanish:
  - dorados
  - de oro amarillo
  - áureos
  lexicon: LSJ
  rationale: '"De oro" es una forma natural y fiel para describir los escudos sin añadir la idea de que fueran macizos. Evita un matiz ornamental excesivo que "dorados" podría sugerir en español.'
- source_word: ἀσπίδας
  english_pob_choice: shields
  chosen_spanish: escudos
  alternatives_spanish:
  - broqueles
  - adargas
  lexicon: LSJ
  rationale: '"Escudos" es el término militar estándar y transparente en español. Se evita un vocabulario arcaico o regional que no aporta precisión adicional.'
- source_word: τὰ ὄρη
  english_pob_choice: the mountains
  chosen_spanish: los montes
  alternatives_spanish:
  - las montañas
  - los cerros
  lexicon: LSJ
  rationale: '"ὄρη" puede traducirse por "montes" o "montañas". Elegí "montes" porque suena más natural en un paralelismo poético y conserva bien el registro elevado del pasaje.'
- source_word: ἀπʼ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: por ellos
  alternatives_spanish:
  - desde ellos
  - de ellos
  - a causa de ellos
  lexicon: LSJ
  rationale: La frase expresa que el resplandor de los montes proviene de la luz reflejada por los escudos. "Por ellos" comunica esa dependencia causal/reflejada en español de manera concisa y idiomática.
- source_word: κατήγαζεν
  english_pob_choice: shone
  chosen_spanish: brillaban
  alternatives_spanish:
  - resplandecían
  - irradiaban
  - lucían
  lexicon: LSJ
  rationale: El verbo indica emitir luz o brillar con fuerza. "Brillaban" es claro y natural, y funciona bien junto con el simile final sin sobrecargar el verso.
- source_word: ὡς λαμπάδες πυρός
  english_pob_choice: like torches of fire
  chosen_spanish: como antorchas de fuego
  alternatives_spanish:
  - como teas de fuego
  - como antorchas ardientes
  - como llamas
  lexicon: LSJ
  rationale: '"Antorchas de fuego" reproduce con bastante literalidad la imagen comparativa y mantiene la intensidad visual del griego. "Teas" sería válido, pero menos universal en el español actual.'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con el griego y no requiere correcciones textuales. La traducción sigue la imagen doble de brillo reflejado y fulgor comparativo sin suavizarla ni añadir explicaciones ausentes.
  spanish_consistency_notes:
  - Se mantiene un registro literario claro y sobrio, apto para lectura pública.
  - Se conserva la repetición verbal entre sol y montes para reflejar el paralelismo del griego.
  - No se introducen notas porque el texto griego y la solución española no presentan una ambigüedad doctrinal o textual que requiera aclaración en este versículo.
