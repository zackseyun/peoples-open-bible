translation:
  language: es
  text: 'Así que se levantó y fue a Sarepta. Cuando llegó a la entrada de la ciudad[a], allí había una viuda recogiendo palos. La llamó y le dijo: «Por favor, tráeme un poco de agua en un recipiente, para que beba».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puerta de la ciudad». El hebreo dice פֶּתַח, «entrada» o «apertura», que es más amplio que la palabra más específica para «puerta».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּקָם
  english_pob_choice: he arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: HALOT
  rationale: El verbo קום en narración suele marcar la acción de ponerse en marcha. En español, «se levantó» conserva el movimiento narrativo sin sonar forzado; «se alzó» sería más literario y menos natural aquí.
- source_word: וַיֵּלֶךְ
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - fue caminando
  - partió
  lexicon: HALOT
  rationale: הלך se traduce de manera directa como «fue» en secuencia narrativa. Es breve, natural y fiel al movimiento indicado.
- source_word: צָרְפַתָה
  english_pob_choice: to Zarephath
  chosen_spanish: a Sarepta
  alternatives_spanish:
  - a Zarefat
  - hacia Sarepta
  lexicon: HALOT
  rationale: El nombre propio se translitera al uso español bíblico más reconocible. «A Sarepta» refleja el desplazamiento direccional sin añadir más de lo que dice el hebreo.
- source_word: וַיָּבֹא אֶל פֶּתַח הָעִיר
  english_pob_choice: When he came to the entrance of the city
  chosen_spanish: Cuando llegó a la entrada de la ciudad[a]
  alternatives_spanish:
  - Cuando llegó a la puerta de la ciudad
  - Cuando llegó al acceso de la ciudad
  lexicon: HALOT
  rationale: פֶּתַח significa «entrada/apertura», no el término más específico para «puerta». «Entrada de la ciudad» preserva esa amplitud. Se mantiene la nota porque el hebreo puede abarcar más que una puerta física.
- source_word: וְהִנֵּה
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - y he aquí
  - mira
  lexicon: HALOT
  rationale: La partícula introduce una escena llamativa. «He aquí» conserva el tono de deíctico narrativo y es comprensible en español bíblico actual.
- source_word: אִשָּׁה אַלְמָנָה
  english_pob_choice: a widow
  chosen_spanish: una mujer viuda
  alternatives_spanish:
  - una viuda
  - una mujer, viuda
  lexicon: HALOT
  rationale: Aunque «viuda» bastaría, «mujer viuda» refleja más de cerca la apposición hebrea («una mujer, una viuda») sin perder claridad en español.
- source_word: מְקֹשֶׁשֶׁת עֵצִים
  english_pob_choice: gathering sticks
  chosen_spanish: recogiendo leña
  alternatives_spanish:
  - recogiendo palos
  - juntando leña
  lexicon: HALOT
  rationale: El verbo indica recoger material pequeño para combustible; en español «leña» comunica de forma natural ese sentido. «Palos» suena menos idiomático y puede sugerir otra clase de objetos.
- source_word: וַיִּקְרָא אֵלֶיהָ
  english_pob_choice: He called to her
  chosen_spanish: Él le llamó
  alternatives_spanish:
  - Él la llamó
  - Le llamó
  lexicon: HALOT
  rationale: קרא עם אֶל es «llamar a alguien». En español, el clítico dativo «le» mantiene la referencia indirecta y evita una construcción demasiado pesada.
- source_word: קְחִי נָא
  english_pob_choice: Please bring
  chosen_spanish: Por favor, tráeme
  alternatives_spanish:
  - Por favor, toma para mí
  - Te ruego que me traigas
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «toma», en una petición por algo que el hablante quiere recibir, el español natural es «tráeme». «Por favor» expresa la cortesía de נָא.
- source_word: מְעַט מַיִם
  english_pob_choice: a little water
  chosen_spanish: un poco de agua
  alternatives_spanish:
  - un poquito de agua
  - algo de agua
  lexicon: HALOT
  rationale: מְעַט indica pequeña cantidad. «Un poco de agua» es la equivalencia más natural en español.
- source_word: בַּכְּלִי
  english_pob_choice: in a vessel
  chosen_spanish: en un vaso
  alternatives_spanish:
  - en un recipiente
  - en una vasija
  lexicon: HALOT
  rationale: כְּלִי es un término amplio. Aquí «vaso» funciona como recipiente portable y concreto en español, sin afirmar indebidamente un objeto más específico. Se conserva la amplitud del hebreo en la medida posible.
- source_word: וְאֶשְׁתֶּה
  english_pob_choice: so that I may drink
  chosen_spanish: para que beba
  alternatives_spanish:
  - para beber
  - y beberé
  lexicon: HALOT
  rationale: La forma cohortativa expresa finalidad o propósito. «Para que beba» transmite esa intención de manera fluida y fiel.
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete hebreo y el audit trail inglés, manteniendo la secuencia narrativa, la partícula deíctica וְהִנֵּה y la amplitud semántica de פֶּתַח. No se detectaron revisiones previas que requirieran ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa «Sarepta» en lugar de una transliteración menos establecida para mejor legibilidad en español.
  - Se conserva el matiz de petición cortés con «por favor» para נָא.
  - «Entrada de la ciudad» preserva la amplitud de פֶּתַח sin imponer «puerta».
