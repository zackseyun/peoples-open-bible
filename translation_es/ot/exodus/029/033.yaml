base_translation:
  language: en
  yaml_path: translation/ot/exodus/029/033.yaml
  text: They shall eat those things by which atonement was made[a], to ordain them and to consecrate them; but an outsider shall not eat them[c][b], because they are holy.
  footnotes:
  - marker: a
    text: Literally, 'fill their hand,' a Hebrew idiom for priestly ordination or installation.
    reason: lexical_alternative
  - marker: b
    text: Or 'through which expiation was made for them.'
    reason: lexical_alternative
  - marker: c
    text: '''Outsider'' here means someone not authorized to participate in the priestly rite, not necessarily a foreigner by ethnicity.'
    reason: cultural_note
