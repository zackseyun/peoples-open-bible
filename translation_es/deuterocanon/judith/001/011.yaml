  to: Y todos los que habitaban toda la tierra menospreciaron[a] la palabra de Nabucodonosor, rey de los asirios, y no se unieron a él en la guerra, porque no le temían, sino que él estaba delante de ellos como un hombre cualquiera[b], e hicieron volver a sus mensajeros con las manos vacías y con deshonra de delante de él[c].
