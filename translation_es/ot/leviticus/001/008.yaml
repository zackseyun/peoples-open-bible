translation:
  language: es
  text: Y los hijos de Aarón, los sacerdotes, dispondrán las piezas, la cabeza y la grasa[a] sobre la leña que está sobre el fuego, que está sobre el altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el sebo» o «la cobertura grasa»; el término hebreo se refiere a una porción grasa del animal usada en la ofrenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָרְכוּ
  english_pob_choice: shall arrange
  chosen_spanish: dispondrán
  alternatives_spanish:
  - harán el arreglo de
  - colocarán en orden
  lexicon: HALOT
  rationale: En contexto sacrificial, ערך describe el acto de disponer las porciones para la ofrenda. «Disponer» comunica orden y colocación ritual sin sonar forzado en español; conserva el sentido procedimental de «shall arrange».
- source_word: בְּנֵי אַהֲרֹן הַכֹּהֲנִים
  english_pob_choice: Aaron’s sons, the priests
  chosen_spanish: los hijos de Aarón, los sacerdotes
  alternatives_spanish:
  - los hijos de Aarón, que son los sacerdotes
  - los hijos sacerdotes de Aarón
  lexicon: HALOT
  rationale: La apposición identifica a los hijos de Aarón como los sacerdotes. En español, la coma preserva esa aclaración natural sin alterar la relación del hebreo.
- source_word: הַנְּתָחִים
  english_pob_choice: the pieces
  chosen_spanish: los pedazos
  alternatives_spanish:
  - las piezas
  - los trozos
  lexicon: HALOT
  rationale: Se trata de las partes cortadas del animal ya desmembrado. «Pedazos» mantiene concreción física y el carácter fragmentado mejor que un término más técnico o más neutro.
- source_word: הָרֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - el cabeza
  lexicon: HALOT
  rationale: Es un término anatómico directo y no requiere ajuste especial.
- source_word: הַפָּדֶר
  english_pob_choice: the fat
  chosen_spanish: la grasa
  alternatives_spanish:
  - el sebo
  - la grasa cubierta
  - la cobertura grasa
  lexicon: HALOT
  rationale: פָּדֶר puede referir una porción grasa específica, quizá sebo o cobertura grasa. «La grasa» es la forma más clara y general en español; la ambigüedad léxica se conserva en nota, siguiendo el auditable margen del inglés POB.
- source_word: עַל הָעֵצִים
  english_pob_choice: on the wood
  chosen_spanish: sobre la leña
  alternatives_spanish:
  - sobre la madera
  - encima de la leña
  lexicon: HALOT
  rationale: Aunque עֵצִים es literalmente «madera», en un contexto de sacrificio la referencia funcional es al combustible del altar. «Leña» comunica mejor ese uso en español.
- source_word: אֲשֶׁר עַל הָאֵשׁ אֲשֶׁר עַל הַמִּזְבֵּחַ
  english_pob_choice: that is on the fire that is on the altar
  chosen_spanish: que está sobre el fuego, que está sobre el altar
  alternatives_spanish:
  - que está sobre el fuego sobre el altar
  - sobre el fuego sobre el altar
  lexicon: HALOT
  rationale: Se mantiene la doble cláusula relativa del hebreo para conservar la precisión espacial y ritual. «Que está sobre» evita aplanar la estructura y refleja la secuencia de ubicación del texto fuente.
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la última revisión; no se documentan modificaciones textuales ni doctrinales que obliguen a ajustar esta traducción española. Se conserva la misma lectura estructural y léxica, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se usa «sacerdotes» para הַכֹּהֲנִים, en armonía con la función apposicional del texto.
  - Se conserva la repetición relativa del hebreo en español para no suavizar la precisión procedimental.
  - «Grasa» se usa aquí como equivalente general de פָּדֶר, con nota sobre la alternativa específica.
  - «Leña» se prefiere a «madera» por naturalidad funcional en el contexto del altar.
