translation:
  language: es
  text: Un hombre sabio no aceptará un soborno[c], pero un soberbio escarnecedor[a] no guardará la ley[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo זד ולץ puede leerse también como dos rasgos separados: «el soberbio y el escarnecedor», en vez de una sola caracterización compuesta.'
    reason: alternative_reading
  - marker: b
    text: «Ley» traduce תורה aquí; también es posible «instrucción» o «enseñanza», porque el término hebreo puede abarcar enseñanza autorizada más amplia que un código legal.
    reason: lexical_alternative
  - marker: c
    text: El paralelo griego suministrado no coincide con esta línea; por eso la traducción sigue principalmente el testimonio hebreo conservado.
    reason: textual_variant
lexical_decisions:
- source_word: איש חכם
  english_pob_choice: a wise man
  chosen_spanish: un hombre sabio
  alternatives_spanish:
  - una persona sabia
  - un sabio
  lexicon: HALOT
  rationale: El hebreo es masculino singular y proverbial; en español, «hombre» conserva la marca de género y el valor proverbial sin neutralizar indebidamente el sujeto.
- source_word: לא יקח
  english_pob_choice: will not take
  chosen_spanish: no recibirá
  alternatives_spanish:
  - no tomará
  - no aceptará
  lexicon: HALOT
  rationale: En este contexto sapiencial, la idea es la de no aceptar para sí un soborno. «Recibirá» comunica con naturalidad esa conducta prohibida en español, manteniendo el valor habitual del imperfectivo.
- source_word: שחד
  english_pob_choice: a bribe
  chosen_spanish: un soborno
  alternatives_spanish:
  - un cohecho
  - una dádiva ilícita
  lexicon: HALOT
  rationale: «Soborno» es el equivalente directo y transparente en español moderno para el valor jurídico-moral de שחד.
- source_word: זד
  english_pob_choice: a proud one / an insolent one
  chosen_spanish: soberbio
  alternatives_spanish:
  - insolente
  - presuntuoso
  lexicon: HALOT
  rationale: El término apunta a una actitud arrogante o presuntuosa. «Soberbio» preserva bien esa fuerza moral en español y enlaza naturalmente con «escarnecedor».
- source_word: לץ
  english_pob_choice: scoffer
  chosen_spanish: escarnecedor
  alternatives_spanish:
  - burlador
  - mofador
  - scoffer
  lexicon: HALOT
  rationale: En literatura sapiencial, לץ denota al que desprecia y se burla de la instrucción. «Escarnecedor» mantiene el tono bíblico y la carga moral del término.
- source_word: זד ולץ
  english_pob_choice: a proud scoffer
  chosen_spanish: un soberbio escarnecedor
  alternatives_spanish:
  - un presuntuoso burlador
  - un soberbio y escarnecedor
  lexicon: HALOT
  rationale: La combinación hebrea funciona como una caracterización compuesta. La solución compuesta en español conserva ambos rasgos sin forzar una coordinación que el hebreo no explicita.
- source_word: לא ישמור
  english_pob_choice: will not keep
  chosen_spanish: no guardará
  alternatives_spanish:
  - no observará
  - no cumplirá
  lexicon: HALOT
  rationale: «Guardar» conserva el matiz de observar fielmente una norma o instrucción, y suena natural en registro bíblico castellano.
- source_word: תורה
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la enseñanza
  lexicon: HALOT
  rationale: Aquí תורה designa la norma moral/autoritativa. «Ley» es la opción más clara y tradicional en español para esta oposición sapiencial.
theological_decisions:
- issue: Relación entre el texto hebreo y el paralelo griego dado
  english_pob_reading: The translation follows the extant Hebrew witness primarily because the supplied Greek parallel does not align with this line.
  chosen_spanish_reading: La traducción sigue principalmente el testimonio hebreo conservado; el paralelo griego suministrado no corresponde a esta línea.
  alternative_spanish_readings:
  - Traducir según el paralelo griego
  - Intentar armonizar ambos testigos
  rationale: El paquete de fuente señala una desalineación entre hebreo y griego. Por fidelidad textual, el español debe basarse en el hebreo y no armonizar artificialmente el testimonio griego distinto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
- issue: Valor de תורה en un dicho sapiencial
  english_pob_reading: the law, with a note that instruction/teaching is also possible
  chosen_spanish_reading: la ley, con la posibilidad implícita de instrucción/enseñanza
  alternative_spanish_readings:
  - la instrucción
  - la enseñanza
  rationale: En español, «ley» conserva mejor la oposición ética del proverbio. Aun así, el hebreo puede abarcar una instrucción autorizada más amplia, por lo que la ambigüedad queda preservada en las decisiones léxicas.
  doctrine_reference: DOCTRINE.md §Translation philosophy 5
translation_notes:
  revision_awareness: La redacción española toma en cuenta la revisión más reciente del inglés POB, que sustituyó «insolent» por «proud» para reflejar con mayor precisión זד. Por ello se eligió «soberbio» en lugar de una equivalencia más débil, manteniendo la pareja con «escarnecedor».
  spanish_consistency_notes:
  - Se preservó el paralelismo sapiencial breve y contrastivo del hebreo.
  - Se mantuvo el sustantivo masculino singular para איש חכם, coherente con el audit trail.
  - «Ley» se usa como traducción principal de תורה, pero la nota preserva la alternativa semántica.
  - La frase final evita suavizar el carácter moral negativo del segundo miembro.
