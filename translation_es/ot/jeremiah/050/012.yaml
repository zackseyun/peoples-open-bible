translation:
  language: es
  text: Su madre quedará totalmente avergonzada; la que los dio a luz será deshonrada. Miren[a], ella será la última de las naciones, un desierto, una tierra seca y una estepa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la menor de las naciones». La expresión hebrea puede señalar el estatus final y rebajado de Babilonia entre las naciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: בּוֹשָׁה
  english_pob_choice: will be ... ashamed
  chosen_spanish: quedará totalmente avergonzada
  alternatives_spanish:
  - será avergonzada
  - quedará avergonzada
  - será puesta en vergüenza
  lexicon: HALOT
  rationale: El perfecto profético funciona con sentido futuro/resultativo; «quedará» comunica bien ese estado resultante. «Avergonzada» conserva el valor de vergüenza/deshonra del verbo sin volverlo demasiado forense.
- source_word: אִמְּכֶם
  english_pob_choice: your mother
  chosen_spanish: tu madre
  alternatives_spanish:
  - su madre
  - la madre de ustedes
  - tu madre-ciudad
  lexicon: HALOT
  rationale: El hebreo es literalmente «su madre/tu madre» con sufijo plural; en español, «tu madre» preserva la personificación directa y naturaliza la concordancia en una forma dirigida al pueblo. Se mantiene la metáfora sin interpretarla como «madre-ciudad» en el texto principal.
- source_word: מְאֹד
  english_pob_choice: utterly
  chosen_spanish: totalmente
  alternatives_spanish:
  - grandemente
  - muchísimo
  - por completo
  lexicon: HALOT
  rationale: Es un intensificador de la vergüenza. «Totalmente» da fuerza natural en español moderno y evita una sonoridad forzada.
- source_word: חָפְרָה
  english_pob_choice: will be disgraced
  chosen_spanish: será deshonrada
  alternatives_spanish:
  - será humillada
  - quedará humillada
  - será confundida
  lexicon: HALOT
  rationale: El verbo expresa quedar abochornada o humillada; «deshonrada» mantiene el matiz de vergüenza social y se distingue bien de «avergonzada» en la primera cola.
- source_word: יֹלַדְתְּכֶם
  english_pob_choice: she who gave birth to you
  chosen_spanish: la que te dio a luz
  alternatives_spanish:
  - la que os dio a luz
  - la que te engendró
  - tu madre que te dio a luz
  lexicon: HALOT
  rationale: La forma participial femenina singular con sufijo conserva el sentido de «la que dio a luz». «Te dio a luz» es una manera española directa y poética que mantiene el paralelismo con «tu madre».
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Observa
  - Mira bien
  lexicon: HALOT
  rationale: «Mira» transmite la llamada a la atención del hebreo con dignidad suficiente y resulta más natural que «He aquí» para el español contemporáneo.
- source_word: אַחֲרִית גּוֹיִם
  english_pob_choice: the last of the nations
  chosen_spanish: la última de las naciones
  alternatives_spanish:
  - la menor de las naciones
  - el postrer fin de las naciones
  - la postrera entre las naciones
  lexicon: HALOT
  rationale: אַחֲרִית puede indicar final/estado final o rango posterior. «La última de las naciones» conserva esa ambigüedad entre postración final y último lugar; la alternativa «la menor» queda como opción interpretativa ya documentada por la tradición auditada.
- source_word: מִדְבָּר
  english_pob_choice: a wilderness
  chosen_spanish: un desierto
  alternatives_spanish:
  - una estepa
  - una soledad
  - un yermo
  lexicon: HALOT
  rationale: En poesía de juicio el término señala desolación. Aquí «desierto» es el equivalente español más natural, aunque el conjunto deja ver la gradación con los otros dos sustantivos geográficos.
- source_word: צִיָּה
  english_pob_choice: a dry land
  chosen_spanish: una tierra seca
  alternatives_spanish:
  - una tierra árida
  - una tierra reseca
  - un secadal
  lexicon: HALOT
  rationale: El sustantivo destaca sequedad/parquedad. «Tierra seca» es claro y distingue este término del siguiente, evitando redundancia excesiva con «desierto».
- source_word: וַעֲרָבָה
  english_pob_choice: and a desert
  chosen_spanish: y un desierto
  alternatives_spanish:
  - y una llanura árida
  - y una estepa
  - y un paraje desértico
  lexicon: HALOT
  rationale: El término puede referir un terreno árido y desolado. Se mantiene «desierto» como equivalente claro, aunque en español se repita la imagen; la repetición refleja la acumulación poética del hebreo.
theological_decisions:
- issue: Metáfora maternal aplicada a Babilonia
  english_pob_reading: Retain the maternal metaphor directly in the main text
  chosen_spanish_reading: Conservar directamente la imagen de «tu madre» y «la que te dio a luz»
  alternative_spanish_readings:
  - Interpretar en el texto principal como «tu ciudad madre»
  - sustituir por «tu patria» o «tu origen»
  rationale: El hebreo usa personificación familiar para expresar la vergüenza de Babilonia. Mantener la metáfora en el texto principal evita introducir una explicación no explicitada por el original y preserva la fuerza poética.
  doctrine_reference: Translation philosophy §1, §6
- issue: Perfectos proféticos en contexto de juicio
  english_pob_reading: Render the opening perfect verbs with future sense in English
  chosen_spanish_reading: Usar futuro/resultativo en español («quedará», «será»)
  alternative_spanish_readings:
  - Usar presente («está avergonzada», «está deshonrada»)
  - Usar pretérito perfecto («ha quedado avergonzada»)
  rationale: En oráculos proféticos, estos perfectos describen un desenlace cierto. El futuro español comunica mejor esa certeza discursiva y evita confundir al lector con un presente meramente descriptivo.
  doctrine_reference: 'Translation philosophy: optimal equivalence'
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado: se conserva la personificación maternal, el sentido futuro de los perfectos proféticos y la nota alternativa para אַחֲרִית גּוֹיִם. No se detectaron revisiones aplicadas en la fuente inglesa; el borrador español sigue ese estado estable.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se conserva la distinción verbal entre «avergonzada» y «deshonrada» para reflejar dos raíces hebreas emparentadas pero no idénticas.
  - Se usa «desierto» dos veces porque el hebreo acumula imágenes distintas de desolación; la repetición es intencional y poética.
