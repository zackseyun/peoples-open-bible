translation:
  language: es
  text: Has aumentado la nación, Yahvé; has aumentado la nación; has ganado gloria[a]; has extendido todos los límites de la tierra[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «has sido glorificado», «has sido honrado» o «te has hecho glorioso». El nifal de כבד puede expresar el resultado de ser mostrado glorioso u honrado.
    reason: lexical_alternative
  - marker: b
    text: O «todos los confines de la tierra». El hebreo puede significar «extremos/bordes», pero en este contexto probablemente se refiere a los límites del territorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: יָסַפְתָּ
  english_pob_choice: you have increased
  chosen_spanish: has aumentado
  alternatives_spanish:
  - has incrementado
  - has agrandado
  - has añadido
  lexicon: HALOT
  rationale: יסף con ל y un sustantivo colectivo expresa aumento o ampliación. «Has aumentado» es natural en español y conserva el paralelismo repetido del verso sin perder la fuerza de incremento.
- source_word: לַגּוֹי
  english_pob_choice: the nation
  chosen_spanish: la nación
  alternatives_spanish:
  - el pueblo
  - la gente
  lexicon: HALOT
  rationale: גּוֹי normalmente designa una nación. En español, «nación» mantiene mejor el valor léxico que «pueblo», que puede diluir la referencia política/colectiva.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: oh Yahvé
  alternatives_spanish:
  - Señor
  - oh el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la forma «Yahvé», conforme a la práctica del POB en español. La interjección vocativa «oh» corresponde al hebreo apelativo en el contexto.
- source_word: נִכְבָּדְתָּ
  english_pob_choice: you have gained glory
  chosen_spanish: te has cubierto de gloria
  alternatives_spanish:
  - has ganado gloria
  - has sido glorificado
  - te has honrado
  lexicon: HALOT
  rationale: El nifal de כבד puede expresar ser glorioso/honrado o resultar glorioso. «Te has cubierto de gloria» comunica en español el resultado reflejado en el verbo sin forzar una sola matización; preserva la tensión entre estado y acción, que el POB inglés mantiene con sus alternativas.
- source_word: רִחַקְתָּ
  english_pob_choice: you have extended
  chosen_spanish: has extendido
  alternatives_spanish:
  - has alejado
  - has ensanchado
  - has agrandado
  lexicon: HALOT
  rationale: Con «todos los confines de la tierra», רחק se entiende como hacer más lejanas las fronteras, es decir, extenderlas. «Has extendido» es la solución más directa y clara en español.
- source_word: כָּל קַצְוֵי אָרֶץ
  english_pob_choice: all the borders of the land
  chosen_spanish: todos los confines de la tierra
  alternatives_spanish:
  - todos los bordes de la tierra
  - todos los límites del país
  - todas las extremidades de la tierra
  lexicon: HALOT
  rationale: קצה puede significar extremos, bordes o confines. Aunque el inglés POB opta por «land» por el contexto territorial, en español «confines de la tierra» suena más natural y mantiene la ambigüedad entre borde territorial y extremidad amplia, sin perder el sentido de expansión.
theological_decisions:
- issue: Alcance de אָרֶץ
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - país
  - territorio
  - mundo
  rationale: El contexto de nación y fronteras favorece una lectura territorial. Sin embargo, «tierra» permite conservar la amplitud semántica de אָרֶץ y evita estrechar demasiado el verso a una sola categoría geopolítica.
  doctrine_reference: Contexto literario de Isaías 26:15; no hay afirmación doctrinal disputada.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el audit trail inglés y los datos hebreos: conserva la repetición de יסף, trata נִכְבָּדְתָּ con una solución reflexiva/resultado que no borra la ambigüedad del nifal, y mantiene la imagen de expansión territorial en רִחַקְתָּ y קַצְוֵי אָרֶץ. Se eligió un español publicable y natural sin depender de una sustitución litúrgica de YHWH.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה, conforme al estándar del proyecto.
  - Se mantiene «nación» para גּוֹי y no «pueblo», por precisión léxica.
  - «Confines de la tierra» conserva la amplitud de קצוות אָרֶץ y funciona bien en español bíblico contemporáneo.
  - La construcción reflexiva «te has cubierto de gloria» intenta preservar la tensión del nifal de כבד sin neutralizarla en una pasiva rígida.
