translation:
  language: es
  text: Porque ningún hombre ha hecho en la tierra lo que ellos hicieron.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación o fundamento de lo dicho antes; en español, 'Porque' expresa con naturalidad esa relación causal o explicativa sin añadir interpretación.
- source_word: οὐκ ... πᾶς ἄνθρωπος
  english_pob_choice: no man
  chosen_spanish: ningún hombre
  alternatives_spanish:
  - ninguna persona
  - nadie
  lexicon: BDAG
  rationale: La negación con πᾶς ἄνθρωπος funciona como universal negativa. 'Ningún hombre' conserva bien la forma singular genérica del griego y sigue el valor inclusivo sin volverlo más abstracto de lo que exige el texto.
- source_word: ἐποίησεν
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - hizo
  - ha realizado
  lexicon: BDAG
  rationale: El perfecto español 'ha hecho' comunica la acción completada con relevancia actual, como en la solución inglesa.
- source_word: ἐπ' αὐτῆς
  english_pob_choice: on it
  chosen_spanish: sobre ello
  alternatives_spanish:
  - en ello
  - sobre ella
  lexicon: BDAG
  rationale: El antecedente inmediato es 'la tierra', de sentido neutro en español; 'sobre ello' mantiene la referencia espacial sin introducir un objeto femenino distinto ni suavizar el valor locativo de ἐπ'. La opción 'sobre ella' quedaría menos natural en español y podría sugerir una referencia personalizada no pedida por el contexto inmediato.
- source_word: ὅσα ἐποίησαν
  english_pob_choice: what they did
  chosen_spanish: lo que ellos hicieron
  alternatives_spanish:
  - lo que hicieron
  - las cosas que hicieron
  lexicon: BDAG
  rationale: Reproduce la comparación abierta del griego de forma idiomática. 'Lo que ellos hicieron' conserva la correlación sin cargar el español con una literalidad torpe.
translation_notes:
  revision_awareness: La revisión más reciente corrigió el sentido de ἐπ' αὐτῆς desde una lectura hostil ('against her') a una lectura espacial referida a la tierra ('on it'). La redacción española sigue esa decisión y evita cualquier interpretación de ataque contra una entidad femenina no introducida en el verso inmediato.
  spanish_consistency_notes:
  - Se mantiene un español neutro y publicable, evitando calcos innecesarios.
  - No se introducen notas al pie porque el verso puede leerse con claridad en español sin multiplicar ambigüedades textuales.
  - 'Se conserva el orden y la fuerza comparativa del original: explicación causal + negación universal + acción completada + complemento locativo + cláusula comparativa.'
