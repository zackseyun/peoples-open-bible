    reason: lexical_alternative
  - marker: b
    text: O «a sus apriscos» o «a su morada». El término hebreo puede referirse a pasto, lugar de descanso o habitación; «pastos» encaja mejor con la imagen del rebaño.
    reason: lexical_alternative
