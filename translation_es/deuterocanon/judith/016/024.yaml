  rationale: Se ajusta ἐπένθησεν a una expresión española más fiel y natural en contexto funerario colectivo («hizo duelo por ella»). También se cambia «repartió» por «dividió» para alinearse mejor con διεῖλεν y con la decisión documentada del POB inglés, sin sacrificar claridad. Se conserva la nota alternativa sobre la construcción temporal, con redacción levemente afinada.
