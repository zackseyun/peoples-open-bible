    reason: lexical_alternative
  - marker: b
    text: La identificación exacta del animal es incierta; tradicionalmente «pavos reales», aunque algunos entienden «papagayos» o «loros».
    reason: lexical_alternative
  - marker: c
    text: «Simios» también puede traducirse más ampliamente como «monos».
    reason: lexical_alternative
  revision_rationale: Se ajusta קֹפִים a «simios» para preservar la decisión léxica principal del POB ('apes') y se deja «monos» como alternativa más amplia en nota. También se mejora «en el mar» a «en alta mar» para reflejar de forma más idiomática el valor de בַּיָּם / 'at sea' en español. Se normaliza además el orden de las notas para evitar la secuencia visual invertida [c][b].
