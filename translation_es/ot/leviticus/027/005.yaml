translation:
  language: es
  text: Y si es desde los cinco años hasta los veinte años, tu valoración será de veinte siclos para el varón y de diez siclos para la hembra.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: Conserva la conexión conjuntiva del hebreo y expresa la condición de manera natural en español legal o normativo.
- source_word: מִבֶּן חָמֵשׁ שָׁנִים וְעַד בֶּן עֶשְׂרִים שָׁנָה
  english_pob_choice: from five years old up to twenty years old
  chosen_spanish: desde los cinco años hasta los veinte años
  alternatives_spanish:
  - de cinco años a veinte años
  - desde la edad de cinco años hasta la edad de veinte años
  lexicon: HALOT
  rationale: El hebreo marca un rango de edad. En español, 'desde... hasta...' comunica con claridad ese intervalo sin forzar una calca innecesaria.
- source_word: וְהָיָה
  english_pob_choice: shall be
  chosen_spanish: será
  alternatives_spanish:
  - entonces será
  - deberá ser
  lexicon: HALOT
  rationale: En este contexto legal, el futuro simple español expresa adecuadamente la prescripción sin sobrecargar el estilo.
- source_word: עֶרְכְּךָ
  english_pob_choice: your valuation
  chosen_spanish: tu valoración
  alternatives_spanish:
  - tu valuación
  - tu valor asignado
  lexicon: HALOT
  rationale: '''Valoración'' conserva el término técnico del capítulo sobre votos y estimaciones. ''Tu'' reproduce la segunda persona singular del hebreo.'
- source_word: הַזָּכָר
  english_pob_choice: the male
  chosen_spanish: el varón
  alternatives_spanish:
  - el macho
  - el hombre
  lexicon: HALOT
  rationale: '''Varón'' es natural en español bíblico y preserva la categoría sexual/legal sin sonar zoológico como ''macho'' ni socialmente ambiguo como ''hombre''.'
- source_word: עֶשְׂרִים שְׁקָלִים
  english_pob_choice: twenty shekels
  chosen_spanish: veinte siclos
  alternatives_spanish:
  - veinte shekels
  - veinte monedas de plata
  lexicon: HALOT
  rationale: '''Siclos'' es la adaptación española tradicional del nombre del peso/moneda histórica y mantiene el valor unitario sin modernizarlo.'
- source_word: וְלַנְּקֵבָה
  english_pob_choice: for the female
  chosen_spanish: y de la mujer
  alternatives_spanish:
  - y para la mujer
  - y para la hembra
  lexicon: HALOT
  rationale: Aquí se opta por 'mujer' como equivalente comprensible y digno en español; sin embargo, 'varón'/'mujer' introduce una ligera expansión interpretativa respecto de las categorías sexo-biológicas del hebreo, que el contexto legal permite.
- source_word: עֲשֶׂרֶת שְׁקָלִים
  english_pob_choice: ten shekels
  chosen_spanish: diez siclos
  alternatives_spanish:
  - diez shekels
  - diez monedas de plata
  lexicon: HALOT
  rationale: Se mantiene la misma unidad histórica que en la primera mitad del versículo para conservar la simetría del texto.
theological_decisions:
- issue: Categorías sexuales en una tabla legal de valoración
  english_pob_reading: the male ... the female
  chosen_spanish_reading: el varón ... la mujer
  alternative_spanish_readings:
  - el macho ... la hembra
  - el hombre ... la mujer
  rationale: El hebreo presenta categorías singulares de valoración, no colectivos sociales. 'Varón/mujer' preserva la distinción sexual con un registro digno y legible en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Unidad monetaria/histórica en una normativa levítica
  english_pob_reading: shekels
  chosen_spanish_reading: siclos
  alternative_spanish_readings:
  - shekels
  - siclos de plata
  rationale: '''Siclos'' es la forma tradicional en español y no altera el hecho de que se trata de una unidad histórica, no de moneda moderna.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y no registra notas ni revisiones textuales; por ello se mantiene una versión directa y estable, con ajustes mínimos para naturalidad del español y conservación del valor técnico de la cláusula legal.
  spanish_consistency_notes:
  - Se mantiene 'valoración' para עֶרְכְּךָ, en continuidad con el vocabulario técnico del capítulo.
  - Se usa 'siclos' en ambos casos para conservar la unidad histórica y la simetría del versículo.
  - La pareja 'varón/mujer' preserva la categorización sexual del texto fuente sin introducir pluralización ni lenguaje sociológico.
