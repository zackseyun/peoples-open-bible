    text: O 'este día'.
    reason: lexical_alternative
  - marker: b
    text: El verbo hebreo aquí es inusual y puede traducirse más formalmente como 'has afirmado' o 'has reconocido solemnemente'; en versiones más antiguas se expresa con un giro arcaizante.
    reason: lexical_alternative
  - marker: c
    text: O 'y escucharás su voz'; el hebreo dice literalmente 'y escuchar su voz', con matiz de obediencia en este contexto.
    reason: lexical_alternative
  revision_rationale: Se revisa para reflejar con más fidelidad la relación de pacto ('que Yahvé es tu Dios'), aclarar en español que los verbos siguientes son compromisos incluidos en la declaración, y corregir la nota defectuosa 'avacado'. Se conservan la terminología principal y el matiz obediencial de שׁמע בקולו.
