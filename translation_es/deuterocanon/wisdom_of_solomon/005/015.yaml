translation:
  language: es
  text: Pero los justos viven para siempre, y su recompensa está con el Señor[a], y su cuidado está con el Altísimo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el Señor». La preposición griega puede verterse más literalmente de esa manera.
    reason: lexical_alternative
  - marker: b
    text: O «su bienestar está con el Altísimo» o «el Altísimo cuida de ellos». La frase griega es compacta y admite más de un sentido estrechamente relacionado.
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιοι
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  - los justos (los rectos)
  lexicon: BDAG / uso bíblico común
  rationale: El adjetivo sustantivado δίκαιοι designa a las personas caracterizadas por justicia. En español, «los justos» es natural, bíblico y conserva el sentido moral y teológico sin sonar arcaico.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por la eternidad
  - por siempre
  - para la era venidera
  lexicon: BDAG
  rationale: La expresión comunica duración sin fin en este contexto. «Para siempre» es la equivalencia española más idiomática y mantiene el valor durativo del griego.
- source_word: ζῶσιν
  english_pob_choice: live
  chosen_spanish: viven
  alternatives_spanish:
  - están vivos
  - viven continuamente
  lexicon: BDAG
  rationale: El verbo presenta la vida continua de los justos. «Viven» es directo, sobrio y refleja el presente durativo del original.
- source_word: ἐν Κυρίῳ
  english_pob_choice: with the Lord
  chosen_spanish: con el Señor
  alternatives_spanish:
  - en el Señor
  - junto al Señor
  - en poder del Señor
  lexicon: BDAG
  rationale: Aunque ἐν podría traducirse literalmente «en», en esta cláusula el sentido apunta a la esfera o custodia del Señor. «Con el Señor» conserva la relación de pertenencia/presencia que el POB inglés quiso expresar con «with the Lord», y «Señor» sigue el equivalente estándar para κύριος aquí.
- source_word: ὁ μισθὸς αὐτῶν
  english_pob_choice: their reward
  chosen_spanish: su recompensa
  alternatives_spanish:
  - su salario
  - su galardón
  - su paga
  lexicon: BDAG
  rationale: μισθός puede significar salario o recompensa, pero en este contexto sapiencial se refiere a la retribución concedida a los justos. «Recompensa» preserva ese valor sin introducir una lectura laboral demasiado estrecha.
- source_word: ἡ φροντὶς αὐτῶν
  english_pob_choice: their care
  chosen_spanish: su cuidado
  alternatives_spanish:
  - su preocupación
  - su bienestar
  - la solicitud por ellos
  lexicon: LSJ
  rationale: φροντίς es semánticamente amplia y puede abarcar cuidado, preocupación o bienestar. «Su cuidado» mantiene la compacidad y la ambigüedad del griego, como el POB inglés con «their care», sin resolverla prematuramente a un solo matiz.
- source_word: παρὰ Ὑψίστῳ
  english_pob_choice: with the Most High
  chosen_spanish: con el Altísimo
  alternatives_spanish:
  - ante el Altísimo
  - junto al Altísimo
  - en presencia del Altísimo
  lexicon: BDAG
  rationale: παρά con dativo puede indicar cercanía, presencia o relación. «Con el Altísimo» reproduce de forma natural el paralelismo con la cláusula anterior y conserva la idea de proximidad/custodia. «Altísimo» es una forma bíblica estable para Ὑψίστῳ.
theological_decisions:
- issue: Alcance de ἡ φροντὶς αὐτῶν
  english_pob_reading: their care is with the Most High
  chosen_spanish_reading: su cuidado está con el Altísimo
  alternative_spanish_readings:
  - el Altísimo cuida de ellos
  - su bienestar está con el Altísimo
  - están bajo el cuidado del Altísimo
  rationale: El griego permite leer la frase como el cuidado o bienestar de los justos estando en manos del Altísimo, o como el cuidado providencial del Altísimo hacia ellos. La traducción principal conserva la ambigüedad del original y no la convierte en una paráfrasis explicativa.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Valor de ἐν Κυρίῳ
  english_pob_reading: with the Lord
  chosen_spanish_reading: con el Señor
  alternative_spanish_readings:
  - en el Señor
  - bajo el Señor
  rationale: «En el Señor» sería más literal, pero en español puede sonar más idiomático y, a la vez, preservar el sentido relacional/presencial con «con el Señor». No se quiere borrar la tensión entre localización y pertenencia que el griego admite.
  doctrine_reference: 'DOCTRINE.md §Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: Coincide con la lectura revisada del texto fuente (edición LXX Swete 1909, override normalizado) y no requiere cambios respecto del último pase; se preserva la ambigüedad semántica de φροντίς y la relación relacional de ἐν Κυρίῳ sin imponer una paráfrasis.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí el testimonio fuente y el audit trail inglés usan κύριος/Lord en una cláusula no escrita con el tetragrámaton; por consistencia con el POB inglés, se traduce «Señor» y no «Yahvé».
  - «Altísimo» se usa para Ὑψίστῳ como título divino tradicional y claro en español.
  - «Justos» se emplea como adjetivo sustantivado natural y no como «los justificados», porque el griego describe a quienes son justos, no un acto de justificación expresado explícitamente en la frase.
