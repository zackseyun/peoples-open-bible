  category: awkward_english
  from: in their midst
  to: within them
  rationale: The phrase 'in their midst' translates a Ge'ez pronoun suffix (mā'ekalomu) that refers back to the inanimate plural 'depths' (of the earth). In English, 'in their midst' strongly implies being surrounded by a group of people. 'Within them' is much more natural for a physical location.
