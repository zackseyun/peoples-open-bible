review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura y el sentido básicos del hebreo: cláusula nominal de duración/distancia, punto de partida (Horeb), ruta (por el camino de/por la ruta de Monte Seir) y destino (Kadesh-barnea). También conserva bien la nota sobre Horeb frente a Sinaí. Sin embargo, «por el camino del monte Seir» puede sugerir en español un camino perteneciente al monte, mientras que el hebreo דֶּרֶךְ הַר שֵׂעִיר indica más naturalmente la ruta que pasa por/vía Monte Seir.'
  spanish_quality_summary: 'El español es claro y mayormente natural. La frase inicial «Son once días» funciona bien para la cláusula nominal. La principal mejora necesaria es ajustar la expresión de la ruta a una formulación más idiomática y menos ambigua en español bíblico moderno: «por la ruta del monte Seir» o «por el camino de monte Seir». Además, en español es más tradicional y reconocible «Cades-barnea»; no es obligatorio, pero mejora la legibilidad en un contexto bíblico hispano.'
  glossary_alignment: No hay términos del glosario mayor en juego. Se respeta correctamente «Horeb» y no se sustituye por «Sinaí». La transliteración «Kadesh-barnea» es aceptable por fidelidad al audit trail inglés, aunque «Cades-barnea» sería más natural para lectores hispanos; esto es un asunto de legibilidad, no de fidelidad doctrinal.
  issues:
  - severity: medium
    issue: «por el camino del monte Seir» suena ambiguo en español
    rationale: El hebreo דֶּרֶךְ הַר שֵׂעִיר describe la ruta por/vía Monte Seir. La construcción con «del» puede leerse como posesiva («el camino del monte») más que como designación de ruta.
  - severity: low
    issue: Topónimo «Kadesh-barnea» menos natural en español eclesial
    rationale: Aunque la transliteración es fiel al inglés POB, la forma tradicional española «Cades-barnea» suele ser más reconocible. No obstante, no es imprescindible cambiarla si el proyecto prioriza transliteración cercana al hebreo/inglés auditado.
  revised_spanish_text: Son once días desde Horeb por la ruta del monte Seir hasta Kadesh-barnea[a][b].
  revised_footnotes:
  - marker: a
    text: 'O: «once días de camino». El hebreo expresa el tiempo de viaje entre Horeb y Kadesh-barnea por esta ruta.'
    reason: lexical_alternative
  - marker: b
    text: Horeb es el nombre usado aquí en el texto hebreo; a menudo se asocia con Sinaí.
    reason: alternative_reading
  revision_rationale: 'Se ajusta únicamente la expresión de la ruta: «por la ruta del monte Seir» comunica mejor el valor geográfico de דֶּרֶךְ הַר שֵׂעִיר en español natural y evita la ambigüedad posesiva de «camino del monte». Se mantienen el sentido literal de la cláusula nominal, «Horeb» y las notas existentes.'
