translation:
  language: es
  text: 'Y le dijo: «Tráeme una becerra[a] de tres años[b], una cabra de tres años, un carnero de tres años, una tórtola y un pichón».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «toma para mí». En este contexto, la idea es traer o procurar los animales para el rito del pacto.'
    reason: lexical_alternative
  - marker: b
    text: El término hebreo repetido, aquí traducido «de tres años», se entiende tradicionalmente como indicación de que estos animales tenían tres años de edad.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And he said
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Entonces le dijo
  - Y dijo
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea introducida por wayyiqtol se conserva con una secuencia natural en español. «Y le dijo» mantiene el avance narrativo sin añadir matices no expresados.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El sufijo pronominal de 3ms se expresa de modo natural con el pronombre dativo átono «le» en español, evitando sobrecarga estilística.
- source_word: קְחָה לִי
  english_pob_choice: Bring me
  chosen_spanish: Tráeme
  alternatives_spanish:
  - Toma para mí
  - Consígueme
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «toma para mí», en este contexto de procurar animales para el rito pactal, «tráeme» comunica mejor la acción requerida sin alejarse del sentido auditado en POB.
- source_word: עֶגְלָה
  english_pob_choice: heifer
  chosen_spanish: becerra
  alternatives_spanish:
  - novilla
  - ternera
  lexicon: HALOT
  rationale: El término hebreo designa una res joven hembra. «Becerra» es claro y natural en español; «novilla» también sería posible, pero suena más técnico y menos inmediato para lectura pública.
- source_word: מְשֻׁלֶּשֶׁת
  english_pob_choice: three-year-old
  chosen_spanish: de tres años
  alternatives_spanish:
  - de tres años de edad
  - trienal
  lexicon: HALOT
  rationale: La POB inglesa entiende aquí una indicación de edad, no una cualidad geométrica. En español, «de tres años» reproduce esa lectura de forma idiomática y fiel.
- source_word: עֵז
  english_pob_choice: female goat
  chosen_spanish: cabra
  alternatives_spanish:
  - cabra hembra
  - chiva
  lexicon: HALOT
  rationale: El hebreo es femenino y, en esta lista sacrificial, «cabra» resulta suficiente y natural en español. El rasgo de sexo ya está apoyado por el contexto de la serie de animales.
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - macho de oveja
  - ovejo
  lexicon: HALOT
  rationale: «Carnero» es el equivalente español estándar para un macho de oveja en contexto sacrificial, preservando la precisión léxica.
- source_word: תֹר
  english_pob_choice: turtledove
  chosen_spanish: tórtola
  alternatives_spanish:
  - paloma torcaz
  - torcaza
  lexicon: HALOT
  rationale: La especie designada es específica; «tórtola» corresponde bien al valor del término hebreo y es comprensible en español.
- source_word: גוֹזָל
  english_pob_choice: young pigeon
  chosen_spanish: pichón
  alternatives_spanish:
  - palomino
  - polluelo
  lexicon: HALOT
  rationale: En la pareja cultual con la tórtola, «pichón» transmite el sentido de ave joven de manera natural en español. Es una opción breve y readable para un público amplio.
theological_decisions:
- issue: Sentido de מְשֻׁלֶּשֶׁת en la lista sacrificial
  english_pob_reading: The repeated Hebrew term rendered 'three-year-old' is traditionally understood here to indicate animals three years of age.
  chosen_spanish_reading: 'El término repetido se entiende aquí como indicación de edad: «de tres años»'
  alternative_spanish_readings:
  - «triple»
  - «de tres partes»
  rationale: La POB inglesa adopta la lectura tradicional de edad para este contexto ritual. El español debe conservar esa decisión para no introducir una lectura geométrica o simbólica que el flujo de la lista no respalda.
  doctrine_reference: Uso contextual del hebreo en listas sacrificiales; exégesis lexical no doctrinal.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés sin cambios sustantivos: se mantuvo la lectura de verbos narrativos, la interpretación de מְשֻׁלֶּשֶׁת como edad, y la equivalencia precisa de las aves y animales del rito. No se detectaron revisiones aplicadas en el expediente inglés, y el pasaje presenta alto acuerdo entre controles.'
  spanish_consistency_notes:
  - Se preservó «Yahvé» como término por defecto del proyecto, pero este versículo no lo contiene.
  - Se evitó «Cristo/Mesías» porque no aparece en el texto.
  - Se mantuvo un registro digno y bíblico, con español natural para lectura pública.
  - 'Las notas a y b se anclan en las dos expresiones con tensión lexical: el imperativo idiomático y la edad implícita de los animales.'
