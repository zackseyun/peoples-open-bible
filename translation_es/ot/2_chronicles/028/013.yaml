base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/028/013.yaml
  text: And they said to them[a], “Do not bring the captives here, for you are proposing to add to our sins and to our guilt, bringing guilt from Yahweh upon us, because our guilt is already great[b], and there is fierce anger against Israel.”
  footnotes:
  - marker: a
    text: Or, 'for guilt against the LORD is upon us'; the Hebrew phrase is compact and may emphasize either guilt incurred from the LORD's judgment or guilt in relation to the LORD.
    reason: alternative_reading
  - marker: b
    text: Hebrew 'burning of anger,' an idiom for intense wrath.
    reason: lexical_alternative
