review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura imperativa del hebreo y conserva el campo jurídico de ריב con «defiende tu causa». También mantiene adecuadamente «Recuerda» y la categoría bíblica de «el necio». Sin embargo, la asignación de notas está desalineada con el texto y la primera nota explica la frase jurídica, no «Levántate», mientras que la traducción inglesa ancla una nota léxica en «Rise up» con alternativa «defend your cause».
  spanish_quality_summary: El español es claro y digno, pero puede pulirse en puntuación vocativa y en la expresión de procedencia. «Oh Dios» es preferible a «oh Dios» al inicio de vocativo tras punto y coma. «Que viene del necio» es comprensible, pero «del necio» es más directo y más cercano al hebreo. La ubicación de las notas necesita corrección para que cada marcador corresponda al lugar pertinente.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» y «necio» son apropiados. «Defiende tu causa» es una excepción contextual legítima frente a una traducción más literal como «pleitea tu pleito», y preserva la rationale jurídica documentada.
  issues:
  - severity: medium
    issue: Marcador [a] anclado en «Levántate» pero la nota explica «defiende tu causa»
    rationale: La nota actual dice «O “defiende tu causa”. El hebreo usa lenguaje jurídico de disputa», que corresponde a רִיבָה רִיבֶךָ, no a קוּמָה. Según el rastro inglés, la nota en «Rise up» da la alternativa «defend your cause», por lo que en español debe reformularse para que sea una alternativa de «Levántate», no una explicación del segmento jurídico.
  - severity: medium
    issue: Falta marcador para la nota cultural sobre «necio»
    rationale: La nota [b] trata «Necio», pero en el texto [b] está puesto en «afrenta». Los marcadores deben aparecer exactamente en la palabra o frase pertinente.
  - severity: low
    issue: «que viene del necio» es algo más explicativo de lo necesario
    rationale: 'El hebreo solo tiene «de/desde el necio». En español, «tu afrenta del necio» suena menos natural, pero «tu afrenta por parte del necio» o simplemente «tu afrenta del necio» puede resultar forzado. La opción más natural y fiel es «tu afrenta del necio» no tanto; mejor reestructurar como «la afrenta contra ti por parte del necio» sería interpretativo. La forma más simple y cercana al borrador es conservar el sentido con «del necio» dentro de una sintaxis natural: «Recuerda tu afrenta del necio, todo el día» no fluye bien. Por eso conviene «Recuerda tu afrenta, del necio todo el día» tampoco. La mejor solución idiomática y fiel es «Recuerda tu afrenta de parte del necio, todo el día», aunque añade una locución española estándar para origen.'
  - severity: low
    issue: Capitalización/puntuación de vocativo mejorable
    rationale: «Oh Dios» con mayúscula inicial tras punto y coma ofrece mejor presentación en español bíblico cuidado.
