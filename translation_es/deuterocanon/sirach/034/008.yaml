translation:
  language: es
  text: Sin falsedad se cumplirá la ley,[b] y la sabiduría es perfección para una boca fiel[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la sabiduría es cumplimiento en una boca fiel». El griego de la cláusula final es compacto y puede entenderse con un matiz ligeramente distinto.'
    reason: alternative_reading
  - marker: b
    text: El texto griego de este versículo presenta una cláusula final sintácticamente difícil; esta traducción sigue la redacción transmitida sin afirmar más certeza de la que permite el texto.
    reason: textual_variant
lexical_decisions:
- source_word: ἄνευ
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - sin la presencia de
  - sin
  lexicon: LSJ
  rationale: La preposición privativa se expresa de manera natural y fiel con «sin»; mantiene el valor de ausencia sin añadir matices no presentes en el griego.
- source_word: ψεύδους
  english_pob_choice: falsehood
  chosen_spanish: falsedad
  alternatives_spanish:
  - mentira
  - engaño
  lexicon: LSJ
  rationale: «Falsedad» conserva el sustantivo abstracto y el sentido moral general del griego mejor que una forma más concreta como «mentira».
- source_word: συντελεσθήσεται
  english_pob_choice: will be fulfilled
  chosen_spanish: se cumplirá
  alternatives_spanish:
  - se completará
  - se llevará a cabo
  lexicon: LSJ
  rationale: Para νόμος, «se cumplirá» comunica tanto realización como consumación, en una fórmula española natural y reverente.
- source_word: νόμος
  english_pob_choice: law
  chosen_spanish: la ley
  alternatives_spanish:
  - la instrucción
  - la norma
  lexicon: LSJ
  rationale: Se conserva el valor directo de νόμος como «ley»; es la equivalencia más transparente y visible para el lector.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - sabiduría
  lexicon: LSJ
  rationale: Equivalencia directa y estándar; el artículo definido facilita la fluidez del predicado nominal en español.
- source_word: στόματι πιστῷ
  english_pob_choice: for a faithful mouth
  chosen_spanish: para una boca fiel
  alternatives_spanish:
  - en una boca fiel
  - a una boca fiel
  lexicon: LSJ
  rationale: El dativo griego es compacto y sintácticamente tenso; «para una boca fiel» conserva la relación predicativa sin forzar una construcción poco natural en español. «Boca fiel» mantiene la imagen de una boca/speech fiel al contenido y evita sustituir el adjetivo por términos menos cercanos como «fiable».
- source_word: τελείωσις
  english_pob_choice: perfection
  chosen_spanish: perfección
  alternatives_spanish:
  - completación
  - completitud
  - consumación
  lexicon: LSJ
  rationale: «Perfección» reproduce el valor culminativo del sustantivo y encaja con el tono aforístico. En español suena más idiomático que «completación» y conserva la tensión entre plenitud y culminación.
theological_decisions:
- issue: Sentido de νόμος en un contexto sapiencial/deuterocanónico
  english_pob_reading: law
  chosen_spanish_reading: ley
  alternative_spanish_readings:
  - instrucción
  - enseñanza
  rationale: Aunque en literatura sapiencial puede haber matiz de instrucción, el texto griego dice claramente νόμος. La traducción mantiene la forma más transparente sin estrechar indebidamente el sentido.
  doctrine_reference: Translation philosophy §1, §5
- issue: 'Cláusula final comprimida: στόματι πιστῷ τελείωσις'
  english_pob_reading: rendered as 'for a faithful mouth' / 'wisdom is perfection for a faithful mouth'
  chosen_spanish_reading: para una boca fiel
  alternative_spanish_readings:
  - en una boca fiel
  - a una boca fiel
  rationale: La sintaxis es breve y algo oscura; el español debe preservar esa compactación sin resolverla de forma demasiado interpretativa. La opción elegida mantiene la ambigüedad funcional del dativo y la imagen de una boca caracterizada por fidelidad.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete LXX 1909 y el aparato auditado en inglés. No hubo revisiones aplicadas en la pasada más reciente; la versión final inglesa quedó sin cambios. Se conservó la dificultad sintáctica del tramo final mediante una formulación española prudente y una nota alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió «ley» para νόμος por transparencia y porque el propio audit trail inglés retuvo 'law'.
  - Se evitó suavizar στόματι πιστῷ a una expresión más interpretativa como «persona fiel», para conservar la metáfora de la boca.
  - Se mantuvo «perfección» para τελείωσις, con nota alternativa que preserva la posibilidad de «completación».
