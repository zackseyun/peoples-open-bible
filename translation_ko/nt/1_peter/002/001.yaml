id: 1PE.2.1
reference: 1 Peter 2:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Ἀποθέμενοι οὖν πᾶσαν κακίαν καὶ πάντα δόλον καὶ ὑποκρίσεις καὶ φθόνους καὶ πάσας καταλαλιάς,
base_translation:
  language: en
  yaml_path: translation/nt/1_peter/002/001.yaml
  text: 'Therefore, having put away all malice and all deceit and hypocrisies and envies and all slanders,'
translation:
  language: ko
  text: '그러므로 여러분은 모든 악의와 모든 속임수와 위선들과 시기들과 모든 비방을 다 벗어 버리고,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Ἀποθέμενοι
  english_pob_choice: having put away
  chosen_korean: 벗어 버리고
  alternatives_korean:
  - 버리고
  - 떨쳐 버리고
  lexicon: BDAG
  rationale: ἀποτίθημι의 「옷을 벗다」 같은 이미지(엡 4:22 참조)를 살리기 위해 「벗어 버리다」로 옮긴다.
- source_word: κακίαν
  english_pob_choice: malice
  chosen_korean: 악의
  alternatives_korean:
  - 악
  - 사악함
  lexicon: BDAG
  rationale: κακία의 「의도적 해의(害意)」를 「악의」로 옮긴다.
- source_word: δόλον
  english_pob_choice: deceit
  chosen_korean: 속임수
  alternatives_korean:
  - 간계
  - 기만
  lexicon: BDAG
  rationale: δόλος의 「의도적 속임수」를 평이하게 「속임수」로 옮긴다. 2:22의 같은 단어와 통일.
- source_word: ὑποκρίσεις
  english_pob_choice: hypocrisies
  chosen_korean: 위선들
  alternatives_korean:
  - 가식들
  - 거짓 행세들
  lexicon: BDAG
  rationale: 복수형을 그대로 보존하여 다양한 형태의 위선임을 드러낸다.
- source_word: καταλαλιάς
  english_pob_choice: slanders
  chosen_korean: 비방
  alternatives_korean:
  - 험담
  - 비방함
  lexicon: BDAG
  rationale: καταλαλιά는 뒤에서 헐뜯는 말. 「비방」이 가장 자연스럽다.
