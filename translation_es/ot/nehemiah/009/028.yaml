    issue: Marcador de nota [b] mal ubicado
    rationale: La nota explica el hebraísmo «en la mano de sus enemigos», pero en el borrador el marcador [b] aparece en «los librabas[b]». Esto rompe la correspondencia exigida entre nota y palabra/frase relevante.
  - severity: medium
    issue: «en mano de sus enemigos» es poco natural en español
    rationale: Aunque intenta conservar el singular hebreo idiomático, en español amplio y legible la expresión natural es «en manos de sus enemigos». Esto mantiene el sentido y el color bíblico sin sonar defectuoso.
  - severity: low
    issue: La nota [b] debería ajustarse al texto revisado
    rationale: Si el texto dice «en manos de sus enemigos», la nota literal puede seguir explicando que el hebreo dice «en la mano de sus enemigos», como hebraísmo de poder/control.
