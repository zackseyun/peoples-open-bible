translation:
  language: es
  text: A Hanoc le nació Irad, e Irad engendró a Mehujael[a], y Mehujael engendró a Metusael, y Metusael engendró a Lamec.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El hebreo tiene dos grafías del mismo nombre en este versículo: Mehujael y Mehijael.'
    reason: textual_variant
lexical_decisions:
- source_word: וַיִּוָּלֵד
  english_pob_choice: was born
  chosen_spanish: le nació
  alternatives_spanish:
  - nació
  - fue nacido
  lexicon: HALOT
  rationale: El niphal de ילד expresa nacimiento en voz pasiva; en español, ‘le nació’ reproduce de manera natural la relación del hijo con el padre/madre señalado por לַחֲנוֹךְ, sin forzar una pasiva poco idiomática.
- source_word: לַחֲנוֹךְ
  english_pob_choice: To Hanok
  chosen_spanish: A Hanoc
  alternatives_spanish:
  - A Enoc
  - Para Hanoc
  lexicon: HALOT
  rationale: La preposición hebrea con nombre propio indica el destinatario/parentesco del nacimiento. Se conserva la transliteración basada en el hebreo (‘Hanoc’) para reflejar el testimonio del texto fuente, en vez de la forma tradicional castellana ‘Enoc’.
- source_word: עִירָד
  english_pob_choice: Irad
  chosen_spanish: Irad
  lexicon: HALOT
  rationale: Nombre propio transliterado directamente, manteniendo la forma estable del linaje en español.
- source_word: יָלַד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo como hijo a
  lexicon: HALOT
  rationale: En genealogías, el verbo qal de ילד expresa la generación de descendencia. ‘Engendró’ conserva ese valor genealógico con solemnidad y claridad en español bíblico contemporáneo.
- source_word: מְחוּיָאֵל / מְחִיּיָאֵל
  english_pob_choice: Mehujael
  chosen_spanish: Mehujael
  alternatives_spanish:
  - Mehijael
  lexicon: HALOT
  rationale: Se mantiene una forma principal única para legibilidad, pero se respeta la variación ortográfica hebrea documentada por el testimonio textual. El español puede reflejar esa variación mediante una nota sin alterar la línea principal.
- source_word: מְתוּשָׁאֵל
  english_pob_choice: Methushael
  chosen_spanish: Metusael
  alternatives_spanish:
  - Methusael
  - Metusháel
  lexicon: HALOT
  rationale: Se adapta la transliteración al español con ortografía fluida y reconocible. Se simplifica la secuencia ‘sh’ a ‘s’ por convención española, sin cambiar el nombre propio.
- source_word: לָמֶךְ
  english_pob_choice: Lamech
  chosen_spanish: Lamec
  alternatives_spanish:
  - Lamech
  lexicon: HALOT
  rationale: Se usa la forma castellanizada estable ‘Lamec’, común y fonéticamente adecuada en español bíblico, en lugar de la transliteración inglesa con ‘ch’.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la decisión auditada del inglés POB: pasiva para וַיִּוָּלֵד, verbo genealógico activo para יָלַד, y nota textual para la doble grafía de Mehujael. Se ajusta a la convención española de nombres propios, con transliteración directa y formas castellanizadas donde ayudan a la fluidez sin perder fidelidad.'
  spanish_consistency_notes:
  - Se mantiene la misma lógica genealógica para los tres usos de יָלַד.
  - ‘Hanoc’ y ‘Lamec’ siguen una línea de transliteración/castellanización coherente dentro del español del proyecto.
  - La nota textual preserva la variante ortográfica documentada en la fuente hebrea sin duplicarla en el cuerpo del texto.
