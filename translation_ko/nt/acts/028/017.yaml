  text: Now it happened that after three days he called together the leading men of the Jews[a]. And when they had come together, he said to them, “I, brothers, though I had done nothing against the people or the customs of our fathers[d][c][b], was delivered as a prisoner from Jerusalem into the hands of the Romans.”
  footnotes:
  - marker: a
    text: "Or 'the leaders of the Jews' or 'the foremost among the Jews.'"
    reason: lexical_alternative
  - marker: b
    text: "'Brothers' translates the Greek vocative ἀδελφοί. Here Paul is addressing the leading Jewish men he had called together."
    reason: cultural_note
  - marker: c
    text: "Or 'the ancestral customs.'"
    reason: lexical_alternative
  - marker: d
    text: "Or 'was handed over ... to the Romans.' The Greek more literally says 'was delivered into the hands of the Romans.'"
    reason: lexical_alternative
