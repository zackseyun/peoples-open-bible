translation:
  language: es
  text: Y salieron de él, del confinamiento[a], y algunos de los impíos de Israel se les unieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asedio» o «encierro»; el término griego subraya la idea de estar encerrados o encerradas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron fuera
  - salieron de allí
  lexicon: BDAG
  rationale: «Salieron» es natural en español y reproduce el movimiento de salir sin añadir tono arcaico. Como el contexto ya señala el lugar, se combina con «de allí» para reflejar el valor de ἐξ αὐτοῦ.
- source_word: ἐξ αὐτοῦ
  english_pob_choice: from it
  chosen_spanish: de allí
  alternatives_spanish:
  - de eso
  - de él
  - de allí mismo
  lexicon: BDAG
  rationale: El antecedente queda implícito en el contexto, y el griego usa un pronombre neutro. «De allí» mantiene la referencia sin forzar en español un antecedente más específico que el versículo no expresa.
- source_word: τοῦ συγκλεισμοῦ
  english_pob_choice: confinement
  chosen_spanish: confinación
  alternatives_spanish:
  - confinamiento
  - asedio
  - encierro
  lexicon: LSJ
  rationale: La POB inglesa opta por «confinement» para preservar el sentido de estar encerrados o encerradas, sin especificar «asedio» en el texto principal. En español, «confinación» comunica bien la condición de encierro, aunque «confinamiento» es una alternativa más común; se deja una nota para la posible lectura alternativa de asedio o encierro.
- source_word: ἐκολλήθησαν
  english_pob_choice: joined
  chosen_spanish: se les unieron
  alternatives_spanish:
  - se adhirieron a ellos
  - se juntaron con ellos
  - se aliaron con ellos
  lexicon: BDAG
  rationale: El valor de adhesión/asociación se expresa de manera idiomática con «se les unieron», que funciona bien en español moderno y conserva la idea relacional del verbo griego.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - unos cuantos
  lexicon: BDAG
  rationale: «Algunos» es la equivalencia directa y natural para el indefinido plural sin añadir información no presente en el texto.
- source_word: τῶν ἀσεβῶν
  english_pob_choice: of the ungodly
  chosen_spanish: de los impíos
  alternatives_spanish:
  - de los malvados
  - de los irreverentes
  - de los impíos e irreverentes
  lexicon: BDAG
  rationale: «Impíos» preserva la fuerza religiosa y moral de ἀσεβής mejor que «malvados», que puede sonar más general. Mantiene la tensión entre juicio moral y falta de reverencia.
- source_word: ἐξ Ἰσραήλ
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - entre Israel
  - de en medio de Israel
  lexicon: BDAG
  rationale: La frase identifica el origen interno de estas personas dentro de Israel. «De Israel» es la forma más directa y sobria en español.
theological_decisions:
- issue: Caracterización moral-religiosa de ἀσεβῶν
  english_pob_reading: ungodly
  chosen_spanish_reading: impíos
  alternative_spanish_readings:
  - malvados
  - irreverentes
  - sin piedad
  rationale: El término griego no solo denuncia maldad general sino falta de piedad/reverencia. «Impíos» conserva esa dimensión religiosa sin perder comprensibilidad.
  doctrine_reference: 'DOCTRINE.md: conservar el peso moral y religioso del léxico bíblico sin diluirlo en generalidades'
translation_notes:
  revision_awareness: Se corrigió el error de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español. Además, se mantuvo la distinción entre la salida desde el lugar y la condición de encierro, conforme al audit trail inglés y al griego.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando corresponde, pero este versículo no contiene el nombre divino.
  - Se prefirió «impíos» para mantener el matiz religioso de ἀσεβῶν, siguiendo la intención del inglés «ungodly».
  - Se evitó «Cristo»/«Mesías» porque no aparece en el texto.
  - La nota [a] está anclada en «confinación» para reflejar la alternativa léxica documentada.
