translation:
  language: es
  text: Cuando entró en su casa, tomó el cuchillo, agarró a su concubina y la cortó, miembro por miembro[a], en doce pedazos, y la envió por todo el territorio de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «según sus huesos»; aquí es un giro idiomático que expresa que la cortó por sus miembros o partes esqueléticas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹא אֶל בֵּיתוֹ
  english_pob_choice: When he entered his house
  chosen_spanish: Cuando entró en su casa
  alternatives_spanish:
  - Y llegó a su casa
  - Cuando se metió en su casa
  lexicon: HALOT
  rationale: El hebreo expresa un movimiento concreto hacia el interior de la casa. «Entró en su casa» conserva esa direccionalidad de forma natural en español.
- source_word: הַמַּאֲכֶלֶת
  english_pob_choice: the knife
  chosen_spanish: el cuchillo
  alternatives_spanish:
  - la cuchilla
  - el cuchillo de sacrificio
  lexicon: HALOT
  rationale: El término hebreo designa un instrumento cortante de uso amplio. «Cuchillo» es la opción más clara y neutral en español; «cuchilla» suena más técnico y «cuchillo de sacrificio» introduce una precisión no exigida aquí.
- source_word: וַיַּחֲזֵק בְּפִילַגְשׁוֹ
  english_pob_choice: seized his concubine
  chosen_spanish: se apoderó de su concubina
  alternatives_spanish:
  - la sujetó con fuerza
  - tomó por la fuerza a su concubina
  lexicon: HALOT
  rationale: חזק con ב comunica una acción enérgica de sujetar o tomar con fuerza. «Se apoderó de» refleja mejor la violencia del acto que un simple «tomó». «Concubina» preserva el valor lexical de פִילֶגֶשׁ.
- source_word: וַיְנַתְּחֶהָ
  english_pob_choice: cut her up
  chosen_spanish: la cortó en doce pedazos
  alternatives_spanish:
  - la descuartizó
  - la cortó
  lexicon: HALOT
  rationale: El verbo נתח implica cortar en partes. En español, «la cortó en doce pedazos» comunica el resultado brutal con claridad sin añadir más especificidad anatómica de la que el texto exige.
- source_word: לַעֲצָמֶיהָ
  english_pob_choice: limb by limb
  chosen_spanish: en doce pedazos
  alternatives_spanish:
  - según sus huesos
  - miembro por miembro
  lexicon: HALOT
  rationale: La frase hebrea es literalmente «según sus huesos», un giro idiomático que en contexto apunta a la desmembración. Dado que ya se expresa el resultado con «en doce pedazos», no se repite una traducción literal en el texto principal; la ambigüedad se preserva en la nota.
- source_word: לִשְׁנֵים עָשָׂר נְתָחִים
  english_pob_choice: into twelve pieces
  chosen_spanish: en doce pedazos
  alternatives_spanish:
  - en doce partes
  - en doce trozos
  lexicon: HALOT
  rationale: נְתָחִים son porciones o piezas cortadas. «Pedazos» es un equivalente idiomático apropiado y suficientemente fuerte en español.
- source_word: וַיְשַׁלְּחֶהָ
  english_pob_choice: sent her
  chosen_spanish: la envió
  alternatives_spanish:
  - la mandó
  - la despachó
  lexicon: HALOT
  rationale: El sufijo femenino sigue remitiendo a la concubina como objeto del envío, aun después de haber sido cortada en partes. «La envió» conserva esa referencia personal y el eco brutal del hebreo.
- source_word: בְּכֹל גְּבוּל יִשְׂרָאֵל
  english_pob_choice: throughout all the territory of Israel
  chosen_spanish: por todo el territorio de Israel
  alternatives_spanish:
  - por todo el límite de Israel
  - por toda la región de Israel
  lexicon: HALOT
  rationale: גְּבוּל puede significar borde, frontera o territorio. Aquí el sentido distributivo es el del alcance completo del envío, por lo que «territorio» comunica mejor el conjunto geográfico que «frontera».
translation_notes:
  revision_awareness: El borrador sigue de cerca el sentido auditado del POB en inglés, pero adapta el estilo a un español natural y digno. Se mantuvo la violencia explícita del pasaje y se evitó suavizar la referencia personal en los pronombres, porque el hebreo preserva esa tensión.
  spanish_consistency_notes:
  - Se usó «concubina» para פִילֶגֶשׁ por coherencia con la terminología bíblica estándar y con la decisión inglesa auditada.
  - Se evitó «SEÑOR» o equivalentes de sustitución porque el versículo no contiene el Nombre divino.
  - «Territorio» se prefirió a «frontera» para reflejar גְּבוּל en su sentido distributivo.
  - La nota sobre «según sus huesos» preserva la tensión lexical sin duplicarla en el cuerpo del texto.
