id: JOS.10.21
reference: Joshua 10:21
source:
  edition: WLC
  text: וַ/יָּשֻׁבוּ֩ כָל הָ/עָ֨ם אֶל הַ/מַּחֲנֶ֧ה אֶל יְהוֹשֻׁ֛עַ מַקֵּדָ֖ה בְּ/שָׁל֑וֹם לֹֽא חָרַ֞ץ לִ/בְנֵ֧י יִשְׂרָאֵ֛ל לְ/אִ֖ישׁ אֶת לְשֹׁנֽ/וֹ־־־־־׃
translation:
  text: And all the people returned to the camp[a], to Joshua at Makkedah, in peace. No one moved his tongue against any of the sons of Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'No one uttered a word against any of the sons of Israel.' The Hebrew literally says, 'No one sharpened his tongue.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  chosen: returned
  alternatives:
  - came back
  - turned back
  lexicon: HALOT
  rationale: שׁוּב in the wayyiqtol here narrates physical return after the pursuit. 'Returned' is the most natural and sufficiently formal English rendering.
- source_word: כָל הָעָם
  chosen: all the people
  alternatives:
  - all the army
  - all the troops
  lexicon: HALOT
  rationale: Though the immediate context is military, עָם is literally 'people' rather than a technical term for army. 'All the people' preserves the Hebrew wording while remaining natural.
- source_word: הַמַּחֲנֶה
  chosen: the camp
  alternatives:
  - the encampment
  lexicon: HALOT
  rationale: Standard military/camp sense; 'camp' is idiomatic and accurate.
- source_word: אֶל יְהוֹשֻׁעַ מַקֵּדָה
  chosen: to Joshua at Makkedah
  alternatives:
  - to Joshua, to Makkedah
  - to Joshua in Makkedah
  lexicon: HALOT
  rationale: The sequence is somewhat compressed in Hebrew. English requires clarifying that the return was to Joshua, who was at Makkedah. 'At Makkedah' best captures the locative force without awkward repetition of 'to'.
- source_word: בְּשָׁלוֹם
  chosen: in peace
  alternatives:
  - safely
  - unharmed
  lexicon: HALOT
  rationale: שָׁלוֹם here denotes safe, unharmed return. 'In peace' preserves the Hebrew idiom; the safer dynamic alternatives are possible but less textually transparent.
- source_word: לֹא חָרַץ
  chosen: No one sharpened
  alternatives:
  - No one moved
  - No one uttered
  lexicon: HALOT
  rationale: In the idiom חָרַץ לָשׁוֹן, the verb is literally 'sharpen' and refers figuratively to hostile speech. Retaining 'sharpened' preserves the vivid Hebrew image.
- source_word: לְאִישׁ אֶת־לְשֹׁנוֹ
  chosen: his tongue against any
  alternatives:
  - his tongue against anyone
  - a tongue against any man
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'against a man his tongue.' In English, 'his tongue against any' smooths the syntax while preserving the metaphor. The negative plus אִישׁ yields the sense 'no one ... against any.'
- source_word: לִבְנֵי יִשְׂרָאֵל
  chosen: of the sons of Israel
  alternatives:
  - of the Israelites
  - of the children of Israel
  lexicon: HALOT
  rationale: Because the source explicitly uses 'sons,' and the translation philosophy prefers gender-accurate renderings, 'sons of Israel' is retained rather than flattening to 'Israelites.'
