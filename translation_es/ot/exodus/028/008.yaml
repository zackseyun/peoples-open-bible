    reason: lexical_alternative
  - marker: b
    text: Los colores “azul, púrpura e hilo escarlata” aluden a materiales textiles teñidos usados en el tabernáculo y en las vestiduras sacerdotales.
    reason: cultural_note
  revision_rationale: 'Se hicieron ajustes menores para mejorar fidelidad y naturalidad en español: se desambiguó el referente de אֲשֶׁר עָלָיו con ''sobre el efod'' y se explicitó el valor textil de תוֹלַעַת שָׁנִי con ''hilo escarlata'', en línea con la auditoría inglesa. No se requieren cambios doctrinales ni adjudicación compleja.'
