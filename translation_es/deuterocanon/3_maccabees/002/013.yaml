translation:
  language: es
  text: Pero en nuestra caída este hombre audaz y profano intenta afrentar el lugar santo sobre la tierra, señalado por el nombre de tu gloria[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el lugar santo sobre la tierra que ha sido designado por el nombre de tu gloria».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταπτώσει
  english_pob_choice: downfall
  chosen_spanish: caída
  alternatives_spanish:
  - ruina
  - derrumbamiento
  - desplome
  lexicon: LSJ
  rationale: El sustantivo expresa una caída o desplome; en este contexto alude al abatimiento del pueblo. «Caída» conserva la gravedad del término sin volverlo excesivamente interpretativo.
- source_word: θρασὺς
  english_pob_choice: bold
  chosen_spanish: audaz
  alternatives_spanish:
  - insolente
  - atrevido
  - temerario
  lexicon: LSJ
  rationale: El adjetivo describe una osadía desvergonzada. «Audaz» es natural en español y mantiene la idea de valentía arrogante; el matiz negativo queda reforzado por «profano» y «afrentar».
- source_word: βέβηλος
  english_pob_choice: profane
  chosen_spanish: profano
  alternatives_spanish:
  - impío
  - impuro
  - sin reverencia
  lexicon: LSJ
  rationale: «Profano» reproduce bien la oposición con lo santo y comunica irreverencia hacia lo sagrado, como en el texto griego.
- source_word: ἐπιτηδεύει
  english_pob_choice: is attempting
  chosen_spanish: se empeña en
  alternatives_spanish:
  - intenta
  - procura
  - anda buscando
  lexicon: LSJ
  rationale: El verbo indica una acción deliberada y sostenida. «Se empeña en» expresa propósito activo sin perder la tonalidad de insistencia del griego.
- source_word: καθυβρίσαι
  english_pob_choice: to insult
  chosen_spanish: afrentar
  alternatives_spanish:
  - insultar
  - ultrajar
  - ofender
  lexicon: LSJ
  rationale: El verbo intensifica la idea de trato insolente y humillante. «Afrentar» conserva el matiz de agravio público y solemne mejor que un simple «insultar».
- source_word: ἀναδεδειγμένον
  english_pob_choice: appointed
  chosen_spanish: señalado
  alternatives_spanish:
  - designado
  - establecido
  - manifestado
  lexicon: LSJ
  rationale: El participio perfecto puede sugerir designación o señalamiento público. «Señalado» es suficientemente fiel y evita volver demasiado administrativo el pasaje, manteniendo la idea de un lugar marcado para Dios.
- source_word: τῷ ὀνόματι τῆς δόξης σου
  english_pob_choice: by the name of your glory
  chosen_spanish: por el nombre de tu gloria
  alternatives_spanish:
  - con el nombre de tu gloria
  - en nombre de tu gloria
  - por tu glorioso nombre
  lexicon: LSJ
  rationale: La frase dativa conserva una relación instrumental o normativa difícil de compactar. «Por el nombre de tu gloria» mantiene la estructura y la solemnidad del griego sin fusionar «nombre» y «gloria».
- source_word: ἅγιον τόπον
  english_pob_choice: the holy place
  chosen_spanish: el lugar santo
  alternatives_spanish:
  - el lugar sagrado
  - el santuario santo
  - el recinto santo
  lexicon: LSJ
  rationale: «Lugar santo» es una equivalencia directa y clara para el sintagma, suficientemente amplia para el templo sin estrecharlo indebidamente a una sala específica.
theological_decisions:
- issue: Referencia del sitio sagrado
  english_pob_reading: the phrase refers to the Jerusalem temple as the holy place on earth associated with God's glorious name
  chosen_spanish_reading: la frase se refiere al templo de Jerusalén como el lugar santo sobre la tierra asociado con el nombre de la gloria de Dios
  alternative_spanish_readings:
  - una referencia más técnica al santuario interior
  - una alusión vaga a cualquier sitio sagrado
  rationale: El griego habla del «lugar santo sobre la tierra» sin especificar una cámara interna. La traducción mantiene esa amplitud y, a la vez, deja claro el referente templario que exige el contexto.
  doctrine_reference: Templo de Jerusalén / santidad del lugar dedicado al nombre de Dios
translation_notes:
  revision_awareness: Tomé como base el contexto auditado en inglés, pero ajusté el español para evitar calcos duros y para preservar la tensión entre «señalado/designado» y el matiz más amplio del participio ἀναδεδειγμένον; también mantuve la referencia templaria amplia sin estrecharla a un recinto técnico.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; aquí el texto no lo contiene, por lo que se mantiene «tu gloria».
  - Se prefirió «lugar santo» frente a «santuario» para reflejar el sintagma griego ἅγιον τόπον con mayor transparencia.
  - «Afrentar» se eligió para sostener el tono de agravio solemne del verbo compuesto sin duplicar innecesariamente «profano».
