translation:
  language: es
  text: Acecharon nuestros pasos[a], de modo que no pudiéramos caminar en nuestras calles. Se acercó nuestro fin; nuestros días se cumplieron[b], porque llegó nuestro fin[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rastrearon nuestros pasos» o «cazaron nuestros pasos». El verbo hebreo comunica persecución hostil.
    reason: lexical_alternative
  - marker: b
    text: «Nuestros días se cumplieron» reproduce un modismo hebreo, literalmente «nuestros días fueron llenos», que expresa que el tiempo asignado llegó a su término.
    reason: cultural_note
  - marker: c
    text: O «nuestra ruina» para «nuestro fin»; el hebreo significa «fin» y en este contexto implica destrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: צָדוּ
  english_pob_choice: They hunted
  chosen_spanish: cazaron
  alternatives_spanish:
  - persiguieron
  - acecharon
  - rastrearon
  lexicon: HALOT
  rationale: El verbo hebreo expresa persecución hostil, con matiz depredador. «Cazaron» conserva esa fuerza en español y encaja con la imagen de una persecución deliberada de los pasos.
- source_word: צְעָדֵינוּ
  english_pob_choice: our steps
  chosen_spanish: nuestros pasos
  alternatives_spanish:
  - nuestras pisadas
  - nuestros pasos al andar
  - nuestros andar
  lexicon: HALOT
  rationale: «Pasos» reproduce el sustantivo concreto del hebreo y mantiene la imagen de que cada movimiento era vigilado o perseguido.
- source_word: מִלֶּכֶת
  english_pob_choice: so that we could not walk
  chosen_spanish: de modo que no pudiéramos caminar
  alternatives_spanish:
  - para impedirnos caminar
  - de manera que no pudiéramos ir
  - para que no anduviéramos
  lexicon: HALOT
  rationale: 'La preposición con infinitivo expresa impedimento. En español, una cláusula de resultado con subjuntivo comunica con naturalidad el efecto hostil: no podían moverse libremente.'
- source_word: בִּרְחֹבֹתֵינוּ
  english_pob_choice: in our streets
  chosen_spanish: en nuestras calles
  alternatives_spanish:
  - en nuestras plazas
  - en nuestros lugares abiertos
  - por nuestras calles
  lexicon: HALOT
  rationale: «Calles» es la opción más natural y comprensible en español moderno para el espacio público urbano implícito en רְחֹבוֹת, sin perder la referencia al ámbito de la ciudad.
- source_word: קָרַב
  english_pob_choice: drew near
  chosen_spanish: se acercó
  alternatives_spanish:
  - se aproximó
  - llegó cerca
  - estaba cerca
  lexicon: HALOT
  rationale: «Se acercó» expresa el avance ominoso del fin y es un equivalente idiomático claro de קרב.
- source_word: קִצֵּינוּ
  english_pob_choice: our end
  chosen_spanish: nuestro fin
  alternatives_spanish:
  - nuestra ruina
  - nuestra destrucción
  - nuestro final
  lexicon: HALOT
  rationale: «Fin» preserva el valor léxico básico de קֵץ. En el contexto de Lamentaciones, el término implica ruina o destrucción, pero la forma breve «nuestro fin» deja que el contexto cargue esa fuerza.
- source_word: מָלְאוּ יָמֵינוּ
  english_pob_choice: our days were fulfilled
  chosen_spanish: nuestros días se cumplieron
  alternatives_spanish:
  - nuestros días fueron cumplidos
  - nuestros días se completaron
  - se cumplieron nuestros días
  lexicon: HALOT
  rationale: El hebreo usa una idiomática de plenitud/completitud temporal. «Se cumplieron» refleja bien la idea de que el tiempo asignado llegó a su término, y evita una traducción literal menos natural como «fueron llenos».
- source_word: כִּי בָא קִצֵּינוּ
  english_pob_choice: for our end had come
  chosen_spanish: porque llegó nuestro fin
  alternatives_spanish:
  - pues vino nuestro fin
  - porque vino nuestro fin
  - ya había llegado nuestro fin
  lexicon: HALOT
  rationale: כִּי introduce la razón de la afirmación anterior. «Porque llegó nuestro fin» conserva la repetición de קֵץ y mantiene el tono formal del texto.
theological_decisions:
- issue: Repetición de קֵץ ('end') como marco de ruina inminente
  english_pob_reading: our end / our end had come
  chosen_spanish_reading: nuestro fin / llegó nuestro fin
  alternative_spanish_readings:
  - nuestra ruina / llegó nuestra ruina
  - nuestra destrucción / llegó nuestra destrucción
  - nuestro desastre / llegó nuestro desastre
  rationale: Se mantiene la repetición del mismo núcleo léxico en ambas apariciones para no diluir la estructura poética del versículo. Aunque el contexto implica calamidad, la traducción conserva la literalidad básica y deja que el lamento determine la carga interpretativa.
  doctrine_reference: Poética de Lamentaciones; semántica de קֵץ en contexto de juicio y ruina
translation_notes:
  revision_awareness: El estado de revisión del inglés POB muestra un cambio reciente de «were full» a «were fulfilled» para expresar con más naturalidad el sentido idiomático de los días completados. La versión española adopta esa lectura y la refleja con «se cumplieron», manteniendo la estructura repetida de קֵץ.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino explícito; este versículo no lo contiene.
  - Se mantiene la repetición de «fin» para conservar la paralelismo del hebreo.
  - «Calles» funciona aquí como espacio público urbano equivalente a רְחֹבוֹת, sin necesidad de tecnicismos.
  - La puntuación sigue el ritmo poético del hebreo con dos miembros principales y una clausula causal final.
