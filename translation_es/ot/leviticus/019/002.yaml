review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: mandato a Moisés, destinatario corporativo, llamado a la santidad y fundamento en la santidad de Yahvé como Dios del pueblo. También conserva correctamente ''Yahvé''. Sin embargo, no preserva del todo la decisión auditada del inglés sobre קְדֹשִׁים תִּהְיוּ, que en el texto principal mantiene un matiz legislativo/futuro (''You shall be holy'') y deja ''Be holy/You must be holy'' como alternativas en nota. El español principal ''Sean santos'' mueve una alternativa al texto principal.'
  spanish_quality_summary: 'El español es claro y digno, pero hay dos puntos mejorables: (1) ''Sean santos'' no sigue la jerarquía de decisiones del POB auditado; (2) la colocación de la nota [b] tras ''su Dios'' es confusa, porque la nota se refiere al mandato ''Sean santos'' / ''Serán santos'', no a ''su Dios''. Además, la puntuación española mejora si el punto final va dentro de las comillas.'
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: יְהוָה -> ''Yahvé''; אֱלֹהֵיכֶם -> ''su Dios''; קדוש -> ''santo''. ''Los hijos de Israel'' mantiene la decisión gender-accurate documentada. La principal desalineación es modal: el inglés POB eligió como principal ''You shall be holy'', por lo que en español conviene ''Serán santos'' o mejor ''Ustedes serán santos'' si se quisiera explicitar, dejando ''Sean santos'' y ''Deben ser santos'' en nota. ''Serán santos'' suena natural en registro bíblico-formal y preserva mejor la lógica del audit trail.'
  issues:
  - severity: medium
    issue: El texto principal usa 'Sean santos' en vez de una forma equivalente a 'You shall be holy'.
    rationale: La decisión lexical/theológica auditada del POB hace principal una formulación legislativa, no un imperativo desnudo. En español, 'Serán santos' preserva mejor esa decisión, mientras que 'Sean santos' debe quedar como alternativa.
  - severity: medium
    issue: La nota [b] está anclada a 'su Dios' pero su contenido trata el mandato de santidad.
    rationale: Esto crea una referencia engañosa para el lector. El marcador debe colocarse junto a 'Serán santos' o la frase correspondiente.
  - severity: low
    issue: La puntuación final puede ajustarse a convención española.
    rationale: Con comillas españolas o inglesas, el punto final suele colocarse dentro si cierra la cita completa en este contexto editorial.
  revised_spanish_text: 'Habla a toda la congregación de los hijos de Israel[a], y diles: “Serán santos[b], porque yo, Yahvé, su Dios, soy santo.”'
  revised_footnotes:
  - marker: a
    text: 'O: “toda la asamblea de los israelitas”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “Sean santos” o “Deben ser santos”.'
    reason: alternative_reading
  revision_rationale: Se ajusta el texto principal para reflejar la decisión auditada del POB sobre קְדֹשִׁים תִּהְיוּ con un matiz legislativo ('Serán santos'), y se reubica la nota [b] en la frase a la que realmente corresponde. Se mantiene el resto, incluida la transliteración 'Yahvé' y 'los hijos de Israel', por buena fidelidad al hebreo y a la terminología del proyecto.
