translation:
  language: es
  text: ¿Quién sabe el poder de tu ira[a], y tu furor según el temor debido a ti?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y tu furor es según el temor debido a ti», o: «Como es el temor de ti, así es tu furor». La expresión hebrea es compacta y admite más de una lectura.'
    reason: alternative_reading
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Quién habrá que
  lexicon: HALOT
  rationale: La partícula interrogativa introduce una pregunta retórica. «¿Quién» conserva la fuerza directa del hebreo sin añadir palabras no presentes en el texto.
- source_word: יוֹדֵעַ
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - comprende
  lexicon: HALOT
  rationale: El participio de ידע puede expresar saber o conocer. «Conoce» suena natural en español y mantiene la idea de reconocer plenamente.
- source_word: עֹז
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - maleza
  lexicon: HALOT
  rationale: «Poder» comunica mejor la capacidad efectiva de la ira divina en un registro digno y claro; evita reducirlo a mera intensidad física.
- source_word: אַפֶּךָ
  english_pob_choice: your anger
  chosen_spanish: tu ira
  alternatives_spanish:
  - tu furor
  - tu enojo
  lexicon: HALOT
  rationale: Aunque el hebreo tiene el matiz literal de «nariz/rostro», el uso idiomático apunta a la ira. «Ira» es la equivalencia más directa y sobria en español bíblico contemporáneo.
- source_word: וּכְיִרְאָתְךָ
  english_pob_choice: as great as the fear due to you / according to the fear of you
  chosen_spanish: según el temor debido a ti
  alternatives_spanish:
  - según tu temor
  - conforme al temor de ti
  - como es el temor hacia ti
  lexicon: HALOT
  rationale: La construcción es compacta y admite más de una lectura. «Según el temor debido a ti» conserva la relación comparativa y explicita el valor reverencial implícito sin resolver indebidamente la ambigüedad.
- source_word: עֶבְרָתֶךָ
  english_pob_choice: your wrath
  chosen_spanish: tu furor
  alternatives_spanish:
  - tu ira
  - tu cólera
  lexicon: HALOT
  rationale: עֶבְרָה denota ira intensa, furor o cólera. «Furor» preserva el tono elevado y distingue este término del anterior אַף/ira, que en español ya está vertido con «ira».
theological_decisions:
- issue: Relación entre el furor divino y el temor debido a Dios en el segundo hemistiquio
  english_pob_reading: Your wrath according to the fear due to you.
  chosen_spanish_reading: tu furor según el temor debido a ti
  alternative_spanish_readings:
  - tu furor conforme al temor de ti
  - tu ira según el temor debido a ti
  - y tu furor, como el temor hacia ti
  rationale: El hebreo es condensado y permite varias relaciones sintácticas. La redacción elegida mantiene la ambigüedad funcional del original y evita suavizar el juicio divino; al mismo tiempo sugiere que la respuesta humana apropiada ante Dios es un temor reverente que corresponde a su santidad.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La frase final sigue la revisión más reciente del expediente inglés, que volvió la segunda cláusula más cercana a la sintaxis hebrea («according to the fear due to you») en lugar de parafrasearla como una igualdad explícita. La versión española conserva ese ajuste y mantiene un registro formal y paralelo.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» para el nombre divino cuando corresponda; en este versículo no aparece.
  - Se mantuvo la distinción léxica entre «ira» y «furor» para reflejar la diferencia entre אַף y עֶבְרָה.
  - La nota de pie recoge la ambigüedad sintáctica preservada por el expediente inglés y la expresa en español sin cerrar el sentido.
  - 'El orden del verso reproduce el paralelismo del hebreo: pregunta retórica inicial, luego dos hemistiquios coordinados.'
