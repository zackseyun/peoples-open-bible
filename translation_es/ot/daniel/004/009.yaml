review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del arameo y respeta la mayoría de las decisiones del POB en inglés: follaje/fruto abundante, alimento para todos, bestias del campo, aves de los cielos y el modismo «toda carne» con nota explicativa. Sin embargo, «se refugiaban» para תַּטְלֵל desplaza el matiz más específico de sombra/abrigo bajo el árbol, mientras que el original y el POB inglés conservan esa imagen explícita.'
  spanish_quality_summary: El español es claro, natural y de buen registro bíblico moderno. No obstante, «Debajo de él se refugiaban…» suena algo menos preciso que «encontraban sombra». La revisión propuesta mejora la fidelidad imagética sin perder fluidez. El resto del verso lee bien en español eclesial amplio.
  glossary_alignment: No hay términos del glosario principal en disputa en este versículo. Se preserva correctamente «toda carne» como modismo bíblico, con nota alternativa equivalente a la del inglés. «Las bestias del campo» y «las aves de los cielos» concuerdan con el tono y la racionalidad léxica documentada.
  issues:
  - severity: medium
    issue: «se refugiaban» atenúa la imagen específica de sombra en תַּטְלֵל
    rationale: El verbo arameo se relaciona con dar o hallar sombra/abrigo. «Se refugiaban» comunica resguardo general, pero no expresa tan claramente la sombra del árbol como el original y como la decisión inglesa «found shade». «Encontraban sombra» o similar es más fiel.
  revised_spanish_text: Su follaje era hermoso y su fruto abundante, y en él había alimento para todos. Debajo de él encontraban sombra las bestias del campo, y en sus ramas habitaban las aves de los cielos, y de él se alimentaba toda carne[a].
  revised_footnotes:
