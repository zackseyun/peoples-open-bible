translation:
  language: es
  text: Cuando los mataba, lo buscaban; volvían[a] y buscaban a Dios con diligencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se volvían atrás»; el verbo puede, según el contexto, conllevar el sentido de arrepentirse, pero literalmente significa «volver» o «regresar».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «buscaban temprano», un modismo para buscar con diligencia o con empeño.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Si
  lexicon: HALOT
  rationale: En este contexto poético-histórico, la partícula introduce una circunstancia repetida, no una condición hipotética. «Cuando» conserva ese valor temporal en español.
- source_word: הֲרָגָם
  english_pob_choice: he killed them
  chosen_spanish: los mataba
  alternatives_spanish:
  - los mató
  - los asesinaba
  - los hacía morir
  lexicon: HALOT
  rationale: El verbo הרג expresa matar o dar muerte. «Los mataba» comunica la acción repetida en el marco del versículo y mantiene la referencia al sujeto implícito del contexto.
- source_word: וּדְרָשׁוּהוּ
  english_pob_choice: they sought him
  chosen_spanish: ellos lo buscaban
  alternatives_spanish:
  - lo buscaban
  - lo consultaban
  - lo buscaban a él
  lexicon: HALOT
  rationale: דרש con objeto personal puede significar buscar a alguien o acudir a él. «Lo buscaban» conserva la relación directa con el objeto pronominal y resulta natural en español.
- source_word: וְשָׁבוּ
  english_pob_choice: they returned
  chosen_spanish: volvían
  alternatives_spanish:
  - regresaban
  - se volvían atrás
  - se arrepentían
  lexicon: HALOT
  rationale: שוב significa básicamente volver o regresar. «Volvían» mantiene el sentido léxico sin convertirlo de entrada en una afirmación explícita de arrepentimiento.
- source_word: וְשִׁחֲרוּ
  english_pob_choice: sought earnestly
  chosen_spanish: buscaban ... con diligencia
  alternatives_spanish:
  - buscaban intensamente
  - lo buscaban desde temprano
  - lo buscaban con empeño
  lexicon: HALOT
  rationale: La forma piel de שחר puede implicar buscar desde temprano y, por extensión, con empeño. «Con diligencia» expresa bien esa fuerza en español contemporáneo.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios poderoso
  - el Fuerte
  lexicon: HALOT
  rationale: Aquí אֵל funciona como título divino común. «Dios» es la opción más natural y fiel en español, sin ampliar indebidamente el título.
theological_decisions:
- issue: Si וְשָׁבוּ debe explicitar arrepentimiento
  english_pob_reading: they returned
  chosen_spanish_reading: volvían
  alternative_spanish_readings:
  - se arrepentían
  - volvían atrás
  - se convertían
  rationale: El hebreo permite una resonancia de arrepentimiento en contexto, pero el verbo básico es volver/regresar. La traducción principal preserva esa tensión sin resolverla doctrinalmente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: 'Coincide con el sentido del texto hebreo y con la auditoría inglesa: אִם es temporal («cuando»), הרג es «matar», דרש puede ser «buscar» a una persona o a Dios, שוב conserva el valor básico de «volver», y שחר comunica búsqueda diligente. No se requirieron revisiones del pasaje auditado.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֵל, conforme al uso POB y a la naturalidad del español.
  - Se evitó «Cristo» o terminología litúrgica ajena al hebreo.
  - Se conservó «con diligencia» para reflejar el matiz idiomático de שחר sin calco rígido.
  - La nota sobre «volver» preserva la tensión entre sentido léxico y posible lectura de arrepentimiento.
