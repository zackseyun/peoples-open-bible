translation:
  language: es
  text: Y los cuervos le llevaban pan y carne por la mañana, y pan y carne por la tarde, y bebía del uadi[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arroyo» o «torrente»; el hebreo נַחַל se refiere a un uadi o cauce estacional de agua.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָעֹרְבִים
  english_pob_choice: and the ravens
  chosen_spanish: y los cuervos
  alternatives_spanish:
  - y los ravens
  - y los cuervos
  lexicon: HALOT
  rationale: עֹרְבִים designa aves de la familia de los córvidos; en español, 'cuervos' es el equivalente natural y claro. 'Ravens' no es idiomático en español, y la elección mantiene el sentido básico sin suavizar la imagen concreta.
- source_word: מְבִיאִים
  english_pob_choice: were bringing
  chosen_spanish: le llevaban
  alternatives_spanish:
  - le estaban llevando
  - traían
  lexicon: HALOT
  rationale: El participio expresa acción repetida o continua en el relato. 'Le llevaban' comunica ese aspecto habitual con naturalidad en español mejor que una perífrasis más pesada.
- source_word: לוֹ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: HALOT
  rationale: El dativo hebreo se refleja de manera idiomática con el clítico indirecto 'le', preservando el destinatario del envío.
- source_word: לֶחֶם
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - comida
  lexicon: HALOT
  rationale: '''Pan'' conserva el sustantivo concreto del hebreo sin generalizarlo a ''comida''. En español bíblico moderno es claro y fiel.'
- source_word: וּבָשָׂר
  english_pob_choice: and meat
  chosen_spanish: y carne
  alternatives_spanish:
  - y carne para comer
  - y carne de res
  lexicon: HALOT
  rationale: בָשָׂר aquí es carne comestible. 'Carne' reproduce el valor léxico directo; 'carne' mantiene la concreción sin precisar indebidamente el tipo.
- source_word: בַּבֹּקֶר
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - en la mañana
  - a la mañana
  lexicon: HALOT
  rationale: La locución temporal se expresa de forma natural con 'por la mañana', que conserva la referencia temporal sin calco.
- source_word: וְלֶחֶם וּבָשָׂר בָּעָרֶב
  english_pob_choice: and bread and meat in the evening
  chosen_spanish: y pan y carne por la tarde
  alternatives_spanish:
  - y pan y carne en la tarde
  - y pan y carne al anochecer
  lexicon: HALOT
  rationale: Se mantiene la repetición hebrea y la alternancia mañana/tarde. 'Por la tarde' es la opción más idiomática y amplia para בָעָרֶב en español general.
- source_word: וּמִן הַנַּחַל
  english_pob_choice: from the wadi
  chosen_spanish: del uadi[a]
  alternatives_spanish:
  - del wadi
  - del arroyo
  - del torrente
  lexicon: HALOT
  rationale: נַחַל designa un cauce estacional, más preciso que 'arroyo' o 'torrente' en este contexto. 'Uadi' preserva la especificidad geográfica del término hebreo con mínima interpretación.
- source_word: יִשְׁתֶּה
  english_pob_choice: he would drink
  chosen_spanish: bebía
  alternatives_spanish:
  - estaba bebiendo
  - solía beber
  lexicon: HALOT
  rationale: El imperfecto narrativo expresa acción habitual. 'Bebía' es la forma más concisa y natural en español para ese valor repetido.
theological_decisions:
- issue: Naturaleza de la provisión por parte de los עֹרְבִים
  english_pob_reading: literal ravens
  chosen_spanish_reading: cuervos literales
  alternative_spanish_readings:
  - aves carroñeras en sentido general
  - agentes humanos reinterpretados
  rationale: Se conserva el sentido ordinario del hebreo עֹרְבִים y la lectura milagrosa del relato, sin reinterpretarlo para suavizar la dificultad narrativa.
  doctrine_reference: Primacía del texto original; filosofía de traducción §1, §3
- issue: Valor de נַחַל
  english_pob_reading: wadi / watercourse
  chosen_spanish_reading: uadi
  alternative_spanish_readings:
  - arroyo
  - torrente
  - cauce estacional
  rationale: El término hebreo nombra un cauce estacional; 'uadi' comunica mejor esa realidad que equivalentes más generales, y preserva la precisión geográfica del original.
  doctrine_reference: Lexicografía contextual de נַחַל
translation_notes:
  revision_awareness: 'El contexto auditado del inglés POB coincide de manera alta con el hebreo: se mantiene la imagen literal de los cuervos, la iteración verbal del participio y del imperfecto, y la precisión de נַחַל. La única decisión notable para el español es conservar la especificidad de ''uadi'' con nota explicativa.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo hebreo entre mañana y tarde sin comprimir la estructura.
  - Se evita 'SEÑOR' u otra sustitución innecesaria porque no aparece el Tetragrámaton en este versículo.
  - '''Cuervos'' funciona mejor que ''ravens'' en español y no altera la lectura literal del texto.'
  - La nota del término geográfico se ancla en 'uadi' para conservar la alternativa lexical documentada.
