  - severity: medium
    issue: «cuando rivaliza con otra mujer» sobreinterpreta ἐπὶ γυναικί
    rationale: El griego es comprimido y admite oposición/rivalidad respecto de otra mujer, pero «rivaliza» introduce una acción explícita más fuerte que «puesta contra» o «contra».
