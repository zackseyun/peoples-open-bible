translation:
  language: es
  text: Cuando estos leprosos[a] llegaron al borde del campamento, entraron en una tienda, comieron y bebieron, y se llevaron de allí plata, oro y ropa; luego fueron y lo escondieron. Después regresaron, entraron en otra tienda, se llevaron cosas de allí, y fueron y las escondieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término hebreo tradicionalmente se traduce «leprosos», pero puede abarcar una afección de la piel más amplia que la lepra médica moderna.
    reason: cultural_note
lexical_decisions:
- source_word: הַמְצֹרָעִים
  english_pob_choice: lepers
  chosen_spanish: leprosos
  alternatives_spanish:
  - personas con una afección de la piel
  - los que tenían lepra
  lexicon: HALOT
  rationale: La forma breve y narrativa más natural en español es «leprosos». Conserva la designación convencional del texto, mientras que la nota explica que el término hebreo puede abarcar una afección cutánea más amplia que la lepra médica moderna.
- source_word: קְצֵה הַמַּחֲנֶה
  english_pob_choice: the edge of the camp
  chosen_spanish: el borde del campamento
  alternatives_spanish:
  - la orilla del campamento
  - el extremo del campamento
  lexicon: HALOT
  rationale: «Borde» comunica bien la idea espacial de קָצֶה como límite o extremidad y suena natural en español narrativo.
- source_word: אֹהֶל אֶחָד
  english_pob_choice: one tent
  chosen_spanish: una tienda
  alternatives_spanish:
  - una tienda de campaña
  - una de las tiendas
  lexicon: HALOT
  rationale: «Una tienda» reproduce la referencia indefinida y concreta del hebreo sin añadir especificación innecesaria. En español, «tienda» funciona bien para la estructura de campamento.
- source_word: וַיֹּאכְלוּ וַיִּשְׁתּוּ
  english_pob_choice: ate and drank
  chosen_spanish: comieron y bebieron
  alternatives_spanish:
  - comenzaron a comer y beber
  lexicon: HALOT
  rationale: El encadenamiento verbal simple del hebreo se vierte con pasado simple en español sin introducir un matiz aspectual no expresado en el texto.
- source_word: וַיִּשְׂא֣וּ מִשָּׁם
  english_pob_choice: carried off from there
  chosen_spanish: se llevaron de allí
  alternatives_spanish:
  - tomaron de allí
  - cargaron con ello de allí
  lexicon: HALOT
  rationale: «Llevarse» transmite bien la idea de retirar bienes como botín. El español permite omitir el objeto porque el contexto ya lo determina, como en el hebreo.
- source_word: כֶּסֶף וְזָהָב וּבְגָדִים
  english_pob_choice: silver and gold and clothing
  chosen_spanish: plata, oro y vestidos
  alternatives_spanish:
  - plata, oro y ropa
  - plata, oro y prendas
  lexicon: HALOT
  rationale: «Vestidos» preserva un registro digno y claro para בְּגָדִים. «Plata» y «oro» reproducen los metales preciosos del inventario, y la lista mantiene su acumulación narrativa.
- source_word: וַיַּטְמִנוּ
  english_pob_choice: hid them
  chosen_spanish: los escondieron
  alternatives_spanish:
  - los ocultaron
  - los enterraron
  lexicon: HALOT
  rationale: «Escondieron» expresa de manera directa el sentido de ocultar. «Enterraron» sería demasiado específico para el verbo hebreo sin más indicación contextual.
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: Then they returned
  chosen_spanish: Luego regresaron
  alternatives_spanish:
  - Y regresaron
  - Entonces volvieron
  lexicon: HALOT
  rationale: «Luego» conserva la progresión narrativa sin sobrerrepresentar una consecuencia lógica; «regresaron» es natural y fiel al movimiento de vuelta del verbo.
- source_word: אֹהֶל אַחֵר
  english_pob_choice: another tent
  chosen_spanish: otra tienda
  alternatives_spanish:
  - una tienda distinta
  - una tienda más
  lexicon: HALOT
  rationale: «Otra» refleja אַחֵר de forma directa y idiomática. Se mantiene la misma palabra española para la continuidad del escenario.
- source_word: וַיִּשְׂא֣וּ מִשָּׁ֔ם
  english_pob_choice: carried things off from there
  chosen_spanish: se llevaron de allí
  alternatives_spanish:
  - tomaron de allí
  - cargaron cosas de allí
  lexicon: HALOT
  rationale: Como en la primera ocurrencia, el objeto queda implícito. En español, «se llevaron de allí» preserva esa elipsis sin forzar un complemento explícito.
theological_decisions:
- issue: Designación de los afligidos por צָרַעַת
  english_pob_reading: lepers, with a note that the ancient term may cover a broader range of conditions than modern leprosy
  chosen_spanish_reading: leprosos, con nota que aclara que el término hebreo puede abarcar una afección cutánea más amplia que la lepra médica moderna
  alternative_spanish_readings:
  - personas con una afección de la piel
  - personas con lepra
  rationale: Se conserva la designación tradicional y breve del relato, pero sin borrar la advertencia semántica sobre el alcance más amplio del término antiguo. La nota preserva la tensión léxica documentada por el texto fuente.
  doctrine_reference: N/A — lexical/cultural note, not a doctrinal issue
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia entre el texto hebreo, la traducción inglesa auditada y la revisión reciente; no se identificaron cambios aplicados en la última pasada. La versión española sigue de cerca la secuencia verbal y la acumulación narrativa del hebreo, manteniendo la nota cultural sobre הַמְצֹרָעִים.
  spanish_consistency_notes:
  - Se mantiene «tienda» para אֹהֶל en ambas ocurrencias por coherencia interna y porque resulta natural en contexto de campamento.
  - Se conserva «se llevaron de allí» en ambas apariciones de וַיִּשְׂאוּ מִשָּׁם para reflejar la misma construcción y elipsis del hebreo.
  - Se usa pasado simple coordinado para reproducir la cadena de acciones sin añadir marcadores aspectuales no explicitados en el original.
  - «Yahvé» no aparece en este versículo; no se requiere decisión terminológica sobre el nombre divino.
