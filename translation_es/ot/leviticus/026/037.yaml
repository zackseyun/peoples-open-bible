translation:
  language: es
  text: Se tropezarán unos con otros como delante de una espada[a], aunque no haya quien persiga; y no tendrán capacidad para mantenerse firmes[b] delante de sus enemigos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «un hombre en/contra de su hermano»; es un modismo que aquí significa que se atropellarán mutuamente en pánico.
    reason: lexical_alternative
  - marker: b
    text: 'O: «y no tendrán firmeza delante de sus enemigos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָשְׁלוּ
  english_pob_choice: they will stumble
  chosen_spanish: se tropezarán
  alternatives_spanish:
  - tambalearán
  - vacilarán
  lexicon: HALOT
  rationale: El verbo expresa tropiezo o caída en desorden; "se tropezarán" conserva la imagen concreta y funciona bien con el sujeto colectivo del contexto.
- source_word: אִישׁ בְּאָחִיו
  english_pob_choice: over one another
  chosen_spanish: unos con otros
  alternatives_spanish:
  - el uno con el otro
  - cada uno con su hermano
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y literaliza una relación recíproca; en español, "unos con otros" comunica mejor la colisión mutua en pánico sin perder el valor distributivo.
- source_word: כְּמִפְּנֵי חֶרֶב
  english_pob_choice: as if before a sword
  chosen_spanish: como delante de una espada
  alternatives_spanish:
  - como si estuvieran ante una espada
  - como ante una espada
  lexicon: HALOT
  rationale: Se mantiene la comparación cercana al hebreo, sin añadir de forma explícita la idea de huida que el texto no dice. "Delante de" conserva el matiz espacial de לפני.
- source_word: וְרֹדֵף אָיִן
  english_pob_choice: though no one is pursuing
  chosen_spanish: aunque no haya quien persiga
  alternatives_spanish:
  - y no hay quien persiga
  - aunque nadie persiga
  lexicon: HALOT
  rationale: La forma hebrea afirma ausencia de perseguidor; en español, "aunque no haya quien persiga" reproduce bien la fuerza concesiva que el contexto exige y evita sobrerrepresentar el verbo.
- source_word: וְלֹא תִהְיֶה לָכֶם תְּקוּמָה
  english_pob_choice: you will have no power to stand
  chosen_spanish: no tendrán capacidad para mantenerse en pie
  alternatives_spanish:
  - no tendrán posibilidad de levantarse
  - no tendrán firmeza
  lexicon: HALOT
  rationale: תְּקוּמָה puede implicar levantarse o mantenerse firme; aquí, por el marco militar, la idea es incapacidad de sostenerse frente al enemigo. "Capacidad para mantenerse en pie" preserva esa noción sin volverla demasiado técnica.
- source_word: לִפְנֵי אֹיְבֵיכֶם
  english_pob_choice: before your enemies
  chosen_spanish: delante de sus enemigos
  alternatives_spanish:
  - ante sus enemigos
  - frente a sus enemigos
  lexicon: HALOT
  rationale: '"Delante de" refleja el valor espacial de לפני y mantiene el tono formal del pasaje. Se usa "sus" para concordar con el sujeto plural del versículo.'
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste del POB inglés: se evitó añadir una idea explícita de huida en la comparación con la espada para permanecer más cerca del hebreo. También se respetó la lectura concesiva de la cláusula sobre el perseguidor y la idea militar de תְּקוּמָה como incapacidad de mantenerse firme.'
  spanish_consistency_notes:
  - Se mantiene "delante de" para לפני en contexto hostil, en coherencia con otras fórmulas espaciales del proyecto.
  - Se evita "SEÑOR" porque este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - Se conserva el tono jurídico-militar del texto sin introducir vocabulario eclesiástico ajeno al hebreo.
