id: GEN.33.8
reference: Genesis 33:8
source:
  edition: WLC
  text: וַ/יֹּ֕אמֶר מִ֥י לְ/ךָ֛ כָּל הַ/מַּחֲנֶ֥ה הַ/זֶּ֖ה אֲשֶׁ֣ר פָּגָ֑שְׁתִּי וַ/יֹּ֕אמֶר לִ/מְצֹא חֵ֖ן בְּ/עֵינֵ֥י אֲדֹנִֽ/י־־׃
translation:
  text: And he said[a], “What do you mean by all this camp that I met?” And he said[c][b], “To find favor in the eyes of my lord.”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “all this camp.” The Hebrew מַחֲנֶה often means “camp,” but here likely refers to the whole company or drove Jacob sent ahead.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “to find favor in the eyes of my lord,” a standard idiom for gaining someone's favorable regard.
    reason: cultural_note
  - marker: c
    text: Or 'What do you mean by all this company'.
    reason: previous_rendering
lexical_decisions:
- source_word: מִי לְךָ
  chosen: What do you mean by
  alternatives:
  - What is this to you
  - Who are you with regard to
  lexicon: HALOT
  rationale: The idiom מִי לְךָ here does not ask for identity but for intent or purpose. In context Esau is asking Jacob the meaning of the droves he encountered. 'What do you mean by' captures the idiomatic force in natural English better than a hyper-literal rendering.
- source_word: כָּל הַמַּחֲנֶה הַזֶּה
  chosen: all this company
  alternatives:
  - all this camp
  - all this group
  lexicon: HALOT
  rationale: מַחֲנֶה literally means 'camp,' but in this narrative it refers to the whole drove/procession Jacob sent ahead. 'Company' communicates a sizable traveling group in readable English while preserving the collective sense.
- source_word: אֲשֶׁר פָּגָשְׁתִּי
  chosen: that I met
  alternatives:
  - that I encountered
  - which I came upon
  lexicon: HALOT
  rationale: פָּגַשׁ commonly means 'meet' or 'encounter.' 'That I met' is straightforward and idiomatic in English for Esau's encounter with the droves.
- source_word: לִמְצֹא חֵן
  chosen: To find favor
  alternatives:
  - To find grace
  - To gain favor
  lexicon: HALOT
  rationale: 'The infinitive plus חֵן expresses purpose: Jacob sent the company ahead in order to obtain favorable regard. ''Find favor'' is the standard idiomatic equivalent and fits the social setting.'
- source_word: בְּעֵינֵי
  chosen: in the eyes of
  alternatives:
  - in the sight of
  - with
  lexicon: HALOT
  rationale: The Hebrew idiom literally says 'in the eyes of,' meaning in someone's estimation or regard. Retaining the idiom preserves the source texture and remains understandable in English.
- source_word: אֲדֹנִי
  chosen: my lord
  alternatives:
  - my master
  - sir
  lexicon: HALOT
  rationale: Here אֲדֹנִי is Jacob's deferential address to Esau, not the divine title. 'My lord' preserves the social hierarchy and respectful tone better than the flatter 'sir.'
