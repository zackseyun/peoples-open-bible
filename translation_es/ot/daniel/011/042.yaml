    issue: La frase 'no tendrá escape' es poco idiomática en español.
    rationale: Aunque intenta reflejar el sustantivo hebreo פְּלֵיטָה, en español moderno suena forzada. 'No escapará' transmite fielmente el sentido contextual y coincide con la decisión principal del POB en inglés.
  - severity: medium
    issue: 'La nota al pie contiene una alternativa en español incorrecta: ''tendrá no escape''.'
    rationale: Esa secuencia no es español natural ni gramatical. Si se conserva una nota léxica, la alternativa debe formularse como 'no tendrá escapatoria' o explicar directamente el literal hebreo.
