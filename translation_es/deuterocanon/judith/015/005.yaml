base_translation:
  language: en
  yaml_path: translation/deuterocanon/judith/015/005.yaml
  text: But when the sons of Israel heard[a], they all together fell upon them and kept striking them down as far as Choba. Likewise, those from Jerusalem and from all the hill country also arrived, for the things that had happened in the camp of their enemies had been reported to them; and those in Gilead and those in Galilee outflanked them with a great slaughter[c][b], until they had passed Damascus and its borders.
