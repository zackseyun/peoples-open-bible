  revision_rationale: Se corrige el anclaje de notas para que cada una corresponda al término fuente pertinente, se restaura la nota del modismo hebreo «cortos de mano», y se ajusta la última comparación para reflejar mejor «antes de la mies/grano en pie». También se suaviza «atemorizados» a «consternados», más cercano al POB inglés «dismayed» y al campo semántico documentado de חתו sin limitarlo al miedo.
