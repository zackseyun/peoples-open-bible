review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo en la secuencia narrativa, mantiene correctamente 'Yahvé' para יְהוָה y conserva el efecto de sorpresa de וְהִנֵּה con 'he aquí'. También refleja adecuadamente la especificidad de 'las palmas' y la dificultad deliberada de la cláusula final sin introducir 'tronco'. Sin embargo, la nota al pie actual está anclada en 'temprano' pero no corresponde a la nota del inglés POB, que documenta la cláusula final difícil ('only Dagon was left upon him'). Además, 'sobre él' en español suena demasiado opaco sin esa nota explicativa en el lugar pertinente.
  spanish_quality_summary: 'El español es mayormente natural y digno, pero requiere un pequeño ajuste de notas para alinear el audit trail y mejorar la legibilidad. La frase principal funciona bien; ''había caído boca abajo al suelo'' es comprensible, aunque algo pesada, y ''estaban cortadas'' es aceptable. El problema principal de calidad es documental: la nota existente explica un detalle temporal no señalado en el POB inglés, mientras que falta la nota necesaria para la cláusula final oscura.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יְהוָה -> ''Yahvé'' está correctamente aplicado; no hay conflictos relevantes con otros términos base. La conservación de ''Dagón'' y del lenguaje espacial es adecuada. La excepción necesaria es mover la nota al pie a la cláusula final para reflejar la decisión léxica documentada por el POB inglés.'
  issues:
  - severity: medium
    issue: La nota al pie está puesta en la expresión temporal en vez de la cláusula final difícil.
    rationale: El English POB preserva una nota léxica sobre 'only Dagon was left upon him', no sobre 'the next morning'. La revisión debe respetar ese rastro de auditoría y anclar la nota en el segmento español correspondiente.
  - severity: low
    issue: La cláusula 'sólo Dagón quedó sobre él' es intencionalmente literal pero opaca en español sin nota.
    rationale: El hebreo es difícil y el POB decidió mantener una formulación cercana al original, acompañada por explicación. En español puede mantenerse, pero necesita la nota para evitar confusión innecesaria.
  revised_spanish_text: Cuando se levantaron temprano la mañana siguiente, he aquí, Dagón había caído boca abajo al suelo delante del arca de Yahvé, y la cabeza de Dagón y ambas palmas de sus manos estaban cortadas sobre el umbral; sólo Dagón quedó sobre él[a].
  revised_footnotes:
  - marker: a
    text: 'Hebreo: «sólo Dagón quedó sobre él», probablemente con el sentido de que sólo quedó el cuerpo o tronco del ídolo después de que su cabeza y sus manos fueron cortadas.'
    reason: lexical_alternative
  revision_rationale: Se elimina la nota temporal no respaldada por el audit trail inglés y se añade la nota requerida en la cláusula final difícil, preservando el texto principal cercano al hebreo y la explicación léxica documentada por el POB.
