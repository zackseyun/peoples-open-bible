translation:
  language: es
  text: Ya que sus días están determinados[a], el número de sus meses está contigo; tú has establecido su límite[b], y no podrá sobrepasarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si sus días están determinados». La partícula hebrea puede introducir una condición, pero en este contexto probablemente expresa la base de la apelación de Job: «Ya que sus días están determinados».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su frontera» o «su decreto». El término hebreo puede denotar un límite prescrito o una frontera fijada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: Since
  chosen_spanish: Si
  alternatives_spanish:
  - Ya que
  - Puesto que
  lexicon: HALOT
  rationale: El hebreo puede introducir una condición o un supuesto de base. En español, 'Si' conserva esa apertura sin forzar de entrada una causalidad más explícita que la del hebreo. En el contexto, la relación lógica queda clara sin perder la tensión interpretativa.
- source_word: חֲרוּצִים
  english_pob_choice: determined
  chosen_spanish: están determinados
  alternatives_spanish:
  - están decretados
  - están fijados
  - están decididos
  lexicon: HALOT
  rationale: El participio pasivo señala días fijados o decididos de antemano. 'Están determinados' comunica bien esa fijación y mantiene un registro natural en español.
- source_word: יָמָיו
  english_pob_choice: his days
  chosen_spanish: sus días
  alternatives_spanish:
  - los días de él
  lexicon: HALOT
  rationale: Se traduce de forma directa el sustantivo plural con sufijo de tercera persona, refiriéndose a la duración de la vida humana.
- source_word: מִסְפַּר חֳדָשָׁיו
  english_pob_choice: the number of his months
  chosen_spanish: el número de sus meses
  alternatives_spanish:
  - la cuenta de sus meses
  - sus meses contados
  lexicon: HALOT
  rationale: Se conserva la construcción nominal del hebreo. 'El número de sus meses' mantiene la forma y el sentido de un tiempo vital mensurable.
- source_word: אִתָּךְ
  english_pob_choice: is with you
  chosen_spanish: está contigo
  alternatives_spanish:
  - está en tus manos
  - te pertenece
  lexicon: HALOT
  rationale: La preposición expresa literalmente 'con'. 'Está contigo' conserva la cercanía semántica y permite, sin explicitar demasiado, la idea de conocimiento y control divinos que el contexto sugiere.
- source_word: חֻקּוֹ
  english_pob_choice: his limit
  chosen_spanish: su límite
  alternatives_spanish:
  - su frontera
  - su decreto
  - su límite fijado
  lexicon: HALOT
  rationale: El sustantivo puede designar un límite prescrito o una frontera establecida. 'Su límite' es la opción más natural en español y permite sostener la ambigüedad entre frontera, decreto y medida fija.
- source_word: עָשִׂיתָ
  english_pob_choice: you have set
  chosen_spanish: has establecido
  alternatives_spanish:
  - has hecho
  - has fijado
  - has puesto
  lexicon: HALOT
  rationale: Aunque el verbo básico es 'hacer', en esta colocación con un límite el sentido es establecerlo. 'Has establecido' comunica bien ese valor sin perder el trasfondo lexical.
- source_word: וְלֹא יַעֲבוֹר
  english_pob_choice: and he cannot pass it
  chosen_spanish: y no lo pasará
  alternatives_spanish:
  - y no lo cruzará
  - y no podrá traspasarlo
  - y no lo sobrepasará
  lexicon: HALOT
  rationale: El verbo singular remite al hombre, no al límite. En español, 'no lo pasará' conserva la idea de no rebasar el límite; aunque es menos explícito que 'no podrá', evita añadir un modal que no está en el hebreo y mantiene la cadencia del verso.
theological_decisions:
- issue: Determinación divina de la duración de la vida humana
  english_pob_reading: The verse states that human days and months are fixed by God, who sets a limit a person cannot pass.
  chosen_spanish_reading: El verso afirma que los días y meses de la vida humana están fijados, con Dios como quien establece ese límite.
  alternative_spanish_readings:
  - El verso podría leerse solo como una afirmación del conocimiento divino de la duración de la vida.
  - El verso podría sonar más débilmente como una mera posibilidad o hipótesis.
  rationale: 'La traducción conserva el peso fuerte del hebreo y del rastro inglés: hay fijación real del plazo humano, no solo conocimiento. A la vez, ''están contigo'' deja espacio para la tensión entre conocimiento y soberanía divina sin resolverla artificialmente.'
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no cambió el contenido de fondo; se mantiene la lectura óptima del verso con una equivalencia cercana y auditable, en línea con el expediente inglés y sin necesidad de nuevas enmiendas.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' según el estándar del proyecto cuando corresponda; aquí el verso no contiene el nombre divino explícito.
  - '''Meses'' y ''días'' se conservan de forma literal para reflejar la estructura hebrea.'
  - Se evita introducir 'puede' o 'debe' para no añadir modalización ajena al texto.
  - La nota sobre 'límite' conserva la tensión semántica entre frontera, decreto y medida fija sin cerrar indebidamente el término.
