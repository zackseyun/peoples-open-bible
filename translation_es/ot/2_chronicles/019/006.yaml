translation:
  language: es
  text: 'Y les dijo a los jueces[a]: «Miren lo que están haciendo, porque no juzgan para el hombre, sino para Yahvé[b], y él está con ustedes en el asunto del juicio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la humanidad». El hebreo usa el singular אָדָם como contraste genérico con Yahvé.
    reason: lexical_alternative
  - marker: b
    text: O «en el asunto de la justicia». La expresión hebrea puede referirse tanto al acto de juzgar como a asuntos judiciales en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַשֹּׁפְטִים
  english_pob_choice: the judges
  chosen_spanish: los jueces
  alternatives_spanish:
  - los magistrados
  - los que juzgan
  lexicon: HALOT
  rationale: El participio funciona sustantivamente y se refiere a oficiales judiciales. «Jueces» es natural en español y conserva con precisión el oficio judicial.
- source_word: רְאוּ
  english_pob_choice: See
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Consideren
  lexicon: HALOT
  rationale: Es un imperativo de atención cuidadosa. «Miren» transmite la exhortación directa en un español claro y digno.
- source_word: מָה אַתֶּם עֹשִׂים
  english_pob_choice: what you are doing
  chosen_spanish: lo que están haciendo
  alternatives_spanish:
  - lo que hacen
  - lo que ustedes hacen
  lexicon: HALOT
  rationale: La forma progresiva comunica bien la acción en curso y la llamada a examinar su conducta judicial.
- source_word: לְאָדָם
  english_pob_choice: for man
  chosen_spanish: para el hombre[a]
  alternatives_spanish:
  - para la humanidad
  - para los seres humanos
  lexicon: HALOT
  rationale: Conservo el singular genérico del hebreo אָדָם para mantener el contraste retórico con Yahvé. En español, «el hombre» comunica esa forma singular general mejor que una pluralización.
- source_word: תִּשְׁפְּטוּ
  english_pob_choice: you are judging
  chosen_spanish: juzgan
  alternatives_spanish:
  - están juzgando
  - dictan juicio
  lexicon: HALOT
  rationale: El verbo שׁפט expresa el acto de juzgar en contexto judicial. Aquí «juzgan» suena más natural en español dentro de la cláusula causal y mantiene el valor judicial.
- source_word: לַיהוָה
  english_pob_choice: for Yahweh
  chosen_spanish: para Yahvé[b]
  alternatives_spanish:
  - para Yahvé Dios
  - en nombre de Yahvé
  lexicon: HALOT
  rationale: La forma fuente contiene el Nombre divino, así que uso «Yahvé» conforme al criterio del proyecto, sin sustituirlo por una máscara litúrgica.
- source_word: וְעִמָּכֶם
  english_pob_choice: and he is with you
  chosen_spanish: y él está con ustedes
  alternatives_spanish:
  - y está con ustedes
  - y él permanece con ustedes
  lexicon: HALOT
  rationale: El hebreo presupone a Yahvé como sujeto; en español conviene explicitar «él» para evitar ambigüedad y mantener la referencia divina inmediata.
- source_word: בִּדְבַר מִשְׁפָּט
  english_pob_choice: in the matter of judgment
  chosen_spanish: en el asunto del juicio
  alternatives_spanish:
  - en la causa del juicio
  - en el asunto de la justicia
  lexicon: HALOT
  rationale: דבר significa «asunto/caso» y משפט puede referirse al acto judicial o a la materia de justicia. «Asunto del juicio» conserva el registro jurídico sin cerrar innecesariamente la amplitud semántica.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé Dios
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Sigo la convención del proyecto de reproducir el Nombre como «Yahvé», preservando su valor revelacional y pactual.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Valor genérico de אָדָם frente a Yahvé
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - los seres humanos
  rationale: El hebreo singular funciona de manera genérica y contrasta a los jueces humanos con Yahvé. «El hombre» mantiene ese contraste y la fuerza retórica del singular.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4; Contested terms: אָדָם *adam*'
- issue: Alcance de בִּדְבַר מִשְׁפָּט
  english_pob_reading: in the matter of judgment
  chosen_spanish_reading: en el asunto del juicio
  alternative_spanish_readings:
  - en el asunto de la justicia
  - en materia de juicio
  rationale: La frase hebrea puede referirse al acto de juzgar o a asuntos judiciales en general. La traducción elegida conserva esa amplitud sin forzar una lectura más estrecha.
  doctrine_reference: HALOT on דבר + משפט; POB lexical note
translation_notes:
  revision_awareness: Revisado a la luz del pasaje paralelo y del último pase de revisión sin cambios sustantivos. Se mantuvo la decisión del nombre divino como Yahvé y la lectura genérica de אָדָם, sin introducir ajustes doctrinales nuevos.
  spanish_consistency_notes:
  - Se conserva «Yahvé» para יהוה en coherencia con el estándar del proyecto.
  - Se usa «jueces» para el sustantivo judicial substantivado.
  - Se mantiene el singular genérico «el hombre» para אָדָם, con nota alternativa.
  - «Juicio» se emplea en sentido jurídico amplio; la nota preserva la alternativa «justicia».
  - La puntuación y las comillas siguen el uso editorial español contemporáneo.
