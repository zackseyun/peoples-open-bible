translation:
  language: es
  text: Da al bueno[a], y retén del mal; honra al pobre, y no des a un extraño[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo literalmente, «retén del mal» o posiblemente «del malo»; el paralelo griego dice «no apoyes al pecador», lo cual orienta hacia un referente personal.
    reason: alternative_reading
  - marker: b
    text: O «a un forastero» o «a un extranjero». El término hebreo puede referirse en sentido amplio a alguien de fuera del círculo propio o de la comunidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὸς / תֵּן
  english_pob_choice: Give
  chosen_spanish: Da
  alternatives_spanish:
  - Dale
  - Entrega
  lexicon: HALOT; LSJ
  rationale: El imperativo simple de נתן y δὸς se expresa de modo directo y natural con «Da», conservando la brevedad exhortativa del original.
- source_word: τῷ ἀγαθῷ / לַטּוֹב
  english_pob_choice: to the good
  chosen_spanish: al bueno
  alternatives_spanish:
  - al bueno [persona]
  - al justo
  - al hombre bueno
  lexicon: HALOT; LSJ
  rationale: «El bueno» mantiene la categoría ética breve del hebreo y del griego. En español, «al bueno» funciona de manera más natural que una perífrasis más larga, sin cerrar del todo el sentido personal.
- source_word: μὴ ἀντιλάβῃ / וּמְנַע מֵרָע
  english_pob_choice: withhold from the evil
  chosen_spanish: no ampares al pecador
  alternatives_spanish:
  - no te acerques al pecador
  - no ayudes al pecador
  - apártate del mal
  lexicon: HALOT; LSJ
  rationale: La tradición griega contiene el matiz de no prestar apoyo/ayuda al pecador, mientras que el hebreo puede leerse como «retener de lo malo». En español, «no ampares al pecador» preserva la idea de no darle sostén y evita una abstracción como «del mal» que borraría el referente personal.
- source_word: ἁμαρτωλοῦ / מֵרָע
  english_pob_choice: the sinner / the evil
  chosen_spanish: al pecador
  alternatives_spanish:
  - al malvado
  - al impío
  - al malo
  lexicon: HALOT; LSJ
  rationale: El paralelo griego personaliza el contraste y hace más probable un referente humano. «Pecador» conserva esa lectura sin forzar una tradición teológica posterior.
- source_word: הֹקֵיר
  english_pob_choice: Honor
  chosen_spanish: honra
  alternatives_spanish:
  - estima
  - valora
  - rinde honor a
  lexicon: HALOT
  rationale: El imperativo de הֹקֵיר pide tratar con estima u honor; «honra» es la forma más concisa y digna en español.
- source_word: מָךְ
  english_pob_choice: the poor
  chosen_spanish: al pobre
  alternatives_spanish:
  - al necesitado
  - al humilde
  - al menesteroso
  lexicon: HALOT
  rationale: מָךְ designa al pobre o de baja condición. «Al pobre» es la opción más clara y directa para el lector moderno.
- source_word: וְאַל תִּתֵּן
  english_pob_choice: and do not give
  chosen_spanish: y no des
  alternatives_spanish:
  - y no entregues
  - y no concedas
  - y no le des
  lexicon: HALOT
  rationale: La negación imperativa de נתן se traduce sin adornos; «y no des» conserva la paridad formal con el primer hemistiquio.
- source_word: לְזֵר
  english_pob_choice: to a stranger
  chosen_spanish: al extraño
  alternatives_spanish:
  - al forastero
  - al extranjero
  - al outsider
  lexicon: HALOT
  rationale: זָר abarca extraño, forastero u foráneo. «Extraño» mantiene la amplitud del término sin imponer una lectura étnica más estrecha de la que exige el texto.
theological_decisions:
- issue: 'Primer contraste: si el mandato niega ayudar al pecador o más bien retener el bien/ayuda de aquello que es malo'
  english_pob_reading: withhold from the evil; the Greek parallel points to not supporting the sinner
  chosen_spanish_reading: no ampares al pecador
  alternative_spanish_readings:
  - retén del mal
  - no favorezcas al malvado
  - retira tu apoyo del pecador
  rationale: El hebreo permite una lectura más general, pero el griego paralelo personaliza el objeto como «el pecador». La versión española conserva esa tensión a favor de la lectura personal, sin eliminar del todo la base semántica de retener/restringir.
  doctrine_reference: Principio de primacía de las fuentes originales con consulta del paralelo; preservar tensiones lexicográficas reales.
- issue: Alcance de לְזֵר en el segundo hemistiquio
  english_pob_reading: to a stranger / outsider / foreigner
  chosen_spanish_reading: al extraño
  alternative_spanish_readings:
  - al forastero
  - al extranjero
  - al de fuera
  rationale: «Extraño» es amplio y no introduce por sí mismo una delimitación étnica o eclesial que el texto no exige. Mantiene la distancia social implícita en el hebreo.
  doctrine_reference: No importar precisiones sociológicas o confesionales ajenas al testimonio textual.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo de Ben Sira 12:7 y toma el paralelo griego como apoyo para la lectura personal del segundo miembro. En relación con el audit trail inglés, se evita expandir μὴ ἀντιλάβῃ a una paráfrasis demasiado interpretativa, pero se conserva la tensión entre 'retener de lo malo' y 'no apoyar al pecador' mediante la nota a.
  spanish_consistency_notes:
  - Se mantiene «extraño» como opción amplia, coherente con el tratamiento POB de לְזֵר/ξένος.
  - Se prefiere «pecador» frente a «malo» porque el paralelo griego nombra explícitamente a ἁμαρτωλός.
  - «Honra» se usa para הֹקֵיר por su naturalidad y dignidad en español.
  - El paralelismo se conserva con dos imperativos positivos seguidos de dos negativos, tal como en el original.
