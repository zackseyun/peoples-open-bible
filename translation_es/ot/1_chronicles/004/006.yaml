translation:
  language: es
  text: Naará dio a luz a él a Ahuzam, Hefer, Temení[a] y Haahashtarí[b]. Estos fueron los hijos de Naará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Temení también puede entenderse como un nombre con fuerza adjetival, como «Temenita» o «del sur», pero en esta genealogía se traduce como nombre personal.
    reason: lexical_alternative
  - marker: b
    text: Haahashtarí también puede transliterarse «Ahashtarí». La forma hebrea incluye el artículo prefijado, que puede haber quedado fijo como parte del nombre.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: En una genealogía, el verbo indica nacimiento materno. «Dio a luz» es natural en español y conserva el sujeto femenino sin volver la frase demasiado coloquial.
- source_word: לוֹ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - para él
  lexicon: HALOT
  rationale: La preposición marca al varón relacionado con el nacimiento en la fórmula genealógica. «A él» sigue de cerca la estructura del hebreo sin añadir matices.
- source_word: נַעֲרָה
  english_pob_choice: Naarah
  chosen_spanish: Naará
  alternatives_spanish:
  - Naarah
  lexicon: HALOT
  rationale: Es un nombre propio; se translitera al español con acento gráfico para la pronunciación. Se mantiene la misma forma al inicio y al final del verso.
- source_word: אֲחֻזָּם
  english_pob_choice: Ahuzzam
  chosen_spanish: Ahuzam
  alternatives_spanish:
  - Auzam
  lexicon: HALOT
  rationale: Nombre propio transliterado. Se simplifica la doble consonante al uso habitual del español sin cambiar la identidad del nombre.
- source_word: חֵפֶר
  english_pob_choice: Hepher
  chosen_spanish: Hefer
  alternatives_spanish:
  - Jéfer
  lexicon: HALOT
  rationale: Nombre propio transliterado de forma directa al español; se evita la grafía inglesa con «ph» porque no corresponde al sistema ortográfico español.
- source_word: תֵּימְנִי
  english_pob_choice: Temeni
  chosen_spanish: Temení
  alternatives_spanish:
  - Temenita
  - suderano
  lexicon: HALOT
  rationale: En esta genealogía funciona como nombre propio. Se conserva como transliteración; aunque podría tener fuerza adjetival, el contexto favorece tratarlo como nombre.
- source_word: הָאֲחַשְׁתָּרִי
  english_pob_choice: Haahashtari
  chosen_spanish: Haahashtarí
  alternatives_spanish:
  - Ahashtarí
  lexicon: HALOT
  rationale: Se conserva la prefijación del artículo en la transliteración, como hace la POB inglesa. La forma mantiene el valor onomástico del hebreo sin convertirla en gentilicio.
- source_word: אֵלֶּה
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Éstos
  lexicon: HALOT
  rationale: Demostrativo de recapitulación. En español, «Estos» introduce con claridad la clausura de la lista genealógica.
- source_word: בְּנֵי
  english_pob_choice: sons of
  chosen_spanish: hijos de
  alternatives_spanish:
  - descendientes de
  - varones de
  lexicon: HALOT
  rationale: Aunque el hebreo puede significar «hijos», en español «hijos de» resulta más idiomático en la fórmula final. Mantiene el vínculo genealógico sin forzar un masculino técnico.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto hebreo y el audit trail inglés. Se conserva la lectura genealógica simple, sin desarrollar la posible fuerza adjetival de Temení más allá de una nota opcional, y se mantiene la prefijación del artículo en Haahashtarí como rasgo del nombre.
  spanish_consistency_notes:
  - Se usó la misma transliteración básica de Naará al inicio y al final del verso.
  - Se evitó la grafía inglesa «ph» en nombres propios para ajustarse al español.
  - Se mantuvo el tono genealógico breve y sobrio, acorde con 1 Crónicas.
