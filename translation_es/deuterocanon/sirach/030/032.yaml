- from: En el día en que se cumplan los días de tu vida[a], y en el tiempo de tu muerte, distribuye tu herencia.
  to: El día en que se completen los días de tu vida[a], y en el tiempo de tu muerte, distribuye tu herencia.
  rationale: Se reemplaza «En el día» por «El día en que» para lograr un español más natural sin apartarse del valor temporal del griego, y «se cumplan» por «se completen» para reflejar con mayor precisión la idea de συντελείας como terminación o completitud. Se conserva el resto del versículo porque representa fielmente el sentido del original y la decisión léxica del POB.
