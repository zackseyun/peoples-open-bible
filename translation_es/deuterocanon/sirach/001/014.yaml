    issue: «en el seno» para בַבָּטֶן
    rationale: Aunque puede funcionar en registro bíblico, en español general «seno» suele ser menos preciso y puede evocar el pecho o el regazo. El hebreo apunta claramente a imagen de vientre/matriz; «en el vientre» preserva mejor el sentido prenatal documentado por la auditoría inglesa.
  - severity: low
