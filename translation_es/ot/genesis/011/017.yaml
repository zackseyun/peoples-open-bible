translation:
  language: es
  text: Y Éber vivió después de engendrar a Peleg cuatrocientos treinta años[a], y engendró hijos e hijas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vivió, después de engendrar a Peleg, cuatrocientos treinta años».'
    reason: Preserva la alternativa de puntuación/orden documentada en el rastro de auditoría inglés, adaptada a español natural.
lexical_decisions:
- source_word: וַיְחִי
  english_pob_choice: lived
  chosen_spanish: vivió
  alternatives_spanish:
  - vivió
  - siguió viviendo
  lexicon: HALOT
  rationale: En fórmulas genealógicas, חיה expresa la duración de la vida; «vivió» reproduce de manera natural y fiel el valor verbal sin añadir matices no presentes en el hebreo.
- source_word: עֵבֶר
  english_pob_choice: Eber
  chosen_spanish: Éber
  alternatives_spanish:
  - Eber
  - Heber
  lexicon: convenio onomástico bíblico
  rationale: Se mantiene la transliteración del nombre propio. «Éber» es la forma natural en español bíblico para עֵבֶר y evita la forma tradicional «Heber», que puede confundir con otros nombres.
- source_word: אַחֲרֵי הוֹלִידוֹ אֶת־פֶּלֶג
  english_pob_choice: after he fathered Peleg
  chosen_spanish: después de haber engendrado a Peleg
  alternatives_spanish:
  - después de haber sido padre de Peleg
  - después de engendrar a Peleg
  lexicon: HALOT
  rationale: En contexto genealógico, הוליד indica engendrar/fundar descendencia. «Engendrado» preserva el sentido causal y genealógico de manera fiel; se evita «ser padre» por ser más explicativo que literal.
- source_word: שְׁלֹשִׁים שָׁנָה וְאַרְבַּע מֵאוֹת שָׁנָה
  english_pob_choice: four hundred and thirty years
  chosen_spanish: cuatrocientos treinta años
  alternatives_spanish:
  - treinta años y cuatrocientos años
  lexicon: HALOT
  rationale: El hebreo suma literalmente treinta más cuatrocientos años. En español, la forma idiomática y equivalente es «cuatrocientos treinta años», que comunica el total sin perder el contenido numérico.
- source_word: וַיּוֹלֶד
  english_pob_choice: he fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo
  lexicon: HALOT
  rationale: El verbo ילד en genealogías se traduce mejor por «engendró», que conserva la fuerza genealógica de «fathered» y mantiene la repetición léxica del pasaje.
- source_word: בָּנִים וּבָנוֹת
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - hijos y hijas
  - niños y niñas
  lexicon: HALOT
  rationale: El hebreo distingue explícitamente descendencia masculina y femenina. «Hijos e hijas» conserva esa precisión en un español natural y bíblicamente adecuado.
translation_notes:
  revision_awareness: La redacción inglesa auditada eliminó comas innecesarias en la cláusula temporal para hacer la línea más directa. En español se refleja esa misma fluidez con una sola secuencia verbal natural, manteniendo intacta la relación temporal del hebreo.
  spanish_consistency_notes:
  - Se mantiene «engendró» para el verbo genealógico ילד, en coherencia con un registro bíblico preciso.
  - Se conserva la transliteración de nombres propios sin castellanizar innecesariamente el antropónimo.
  - La nota al pie conserva la alternativa de puntuación/segmentación temporal que también aparece en el rastro inglés, adaptada a un español natural.
