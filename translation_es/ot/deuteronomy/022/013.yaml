translation:
  language: es
  text: Si un hombre toma una esposa y se une a ella[a], y luego la odia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, “y tiene relaciones sexuales con ella”. El hebreo usa un eufemismo que se refiere a la consumación matrimonial.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: En la apertura de una ley casuística, la partícula introduce una situación hipotética; en español jurídico-bíblico, 'Si' comunica mejor esa protasis que 'Cuando'.
- source_word: יִקַּח
  english_pob_choice: takes
  chosen_spanish: toma
  alternatives_spanish:
  - se casa con
  - recibe
  lexicon: HALOT
  rationale: לקח significa literalmente 'tomar'. En este contexto matrimonial, 'toma una esposa' conserva la transparencia del hebreo y evita cerrar prematuramente la imagen con un verbo más interpretativo como 'se casa con'.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - un marido
  lexicon: HALOT
  rationale: El sustantivo es masculino singular y designa al varón implicado en el caso legal. 'Un hombre' mantiene la correspondencia léxica sin anticipar todavía el estatus relacional de 'marido'.
- source_word: אִשָּׁה
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  lexicon: HALOT
  rationale: En la combinación 'tomar una esposa' el sentido marital es el natural. 'Esposa' preserva esa relación mejor que 'mujer', que en español sería demasiado genérico aquí.
- source_word: וּבָא אֵלֶיהָ
  english_pob_choice: and goes in to her
  chosen_spanish: y se llega a ella
  alternatives_spanish:
  - y entra a ella
  - y tiene relaciones con ella
  lexicon: HALOT
  rationale: El hebreo usa un eufemismo convencional para el acto sexual conyugal. 'Se llega a ella' conserva el registro moderado y la alusión idiomática sin explicitar más de lo que el hebreo dice.
- source_word: וּשְׂנֵאָהּ
  english_pob_choice: and then hates her
  chosen_spanish: y luego la odia
  alternatives_spanish:
  - y la odia
  - y después la aborrece
  lexicon: HALOT
  rationale: El verbo significa 'odiar'. 'Luego' refleja la secuencia narrativa del hebreo sin añadir contenido doctrinal o emocional extra; 'odia' mantiene la fuerza del término.
translation_notes:
  revision_awareness: 'El inglés POB revisado permanece sin cambios (''unchanged: true'') y presenta alta concordancia con el control; por tanto, la versión española sigue de cerca la misma lectura casuística y el mismo tratamiento eufemístico del hebreo, sin introducir variantes interpretativas nuevas.'
  spanish_consistency_notes:
  - Se conserva la secuencia legal hipotética con 'Si'.
  - Se mantiene el paralelismo léxico 'toma una esposa' / 'se llega a ella' / 'luego la odia'.
  - No se introdujo 'Cristo', 'SEÑOR' ni otros términos no presentes en el texto fuente.
  - La nota al pie reproduce la alternativa sexual explícita como decisión léxica, no como variante textual.
