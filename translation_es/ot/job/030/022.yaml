translation:
  language: es
  text: Tú me levantas al viento; me haces cabalgar sobre él[a], y me sacudes en la tormenta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tú me levantas sobre el viento; me haces cabalgar en él».'
    reason: lexical_alternative
  - marker: b
    text: La última palabra hebrea es difícil. Puede referirse a tormenta, estruendo o ruina; algunas traducciones entienden la línea como «me sacudes en la tormenta» o «me disuelves en la ruina».
    reason: alternative_reading
lexical_decisions:
- source_word: תִּשָּׂאֵנִי
  english_pob_choice: You lift me up
  chosen_spanish: Tú me levantas
  alternatives_spanish:
  - Tú me alzas
  - Tú me llevas
  lexicon: HALOT
  rationale: נשׂא expresa levantar, alzar o cargar. En español, "me levantas" conserva la imagen concreta de ser elevado por una fuerza externa y mantiene el trato directo a Dios.
- source_word: אֶל רוּחַ
  english_pob_choice: to the wind
  chosen_spanish: al viento
  alternatives_spanish:
  - hacia el viento
  - sobre el viento
  - al espíritu
  lexicon: HALOT
  rationale: רוּחַ puede significar viento, aliento o espíritu. Aquí el contexto poético es meteorológico y destructivo, por lo que "viento" es la lectura más natural y fiel. Se evita "espíritu" por no estar respaldado por el contexto inmediato.
- source_word: תַּרְכִּיבֵנִי
  english_pob_choice: you make me ride on it
  chosen_spanish: me haces ir montado en él
  alternatives_spanish:
  - me haces cabalgar en él
  - me haces montar en él
  - me causas ir montado
  lexicon: HALOT
  rationale: El hiphil de רכב significa causar a montar o hacer ir montado. En español, "ir montado en él" conserva la imagen de ser llevado por el viento sin sonar forzado. El pronombre "él" remite al viento, como en el inglés auditado.
- source_word: וּתְמֹגְגֵנִי
  english_pob_choice: you toss me about
  chosen_spanish: me sacudes
  alternatives_spanish:
  - me zarandeas
  - me agitas
  - me haces tambalear
  lexicon: HALOT
  rationale: מוג comunica deshacerse, derretirse o quedar sin fuerzas; en la revisión inglesa final se prefirió una idea de ser arrojado o zarandeado por la tormenta. "Me sacudes" preserva ese movimiento violento y la fuerza del sufrimiento, sin volverlo interpretativamente más específico de lo que permite el hebreo.
- source_word: תשוה
  english_pob_choice: in the storm
  chosen_spanish: en la tormenta
  alternatives_spanish:
  - en el vendaval
  - en el estruendo
  - hacia la ruina
  lexicon: HALOT
  rationale: La forma final es difícil y puede aludir a tormenta, tumulto o ruina. Siguiendo el contexto de viento y sacudida, "tormenta" mantiene la lectura contextual adoptada por el POB inglés y deja visible la dificultad del término.
theological_decisions:
- issue: Sujeto implícito y referencia a Dios en una escena de juicio/sufrimiento
  english_pob_reading: You lift me up... you make me ride... you toss me about
  chosen_spanish_reading: Tú me levantas... me haces ir montado... me sacudes...
  alternative_spanish_readings:
  - Él me levanta...
  - Tú me impulsas...
  rationale: El hebreo dirige la acción a un interlocutor implícito; el contexto del libro muestra que Job habla a Dios. Se conserva el "Tú" explícito para mantener la fuerza del reproche y la relación directa del discurso.
  doctrine_reference: Job 30:20-23; contexto literario de lamento dirigido a Dios
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que sustituyó una idea de "disolver" por una de ser "sacudido/zarandeado". En español se optó por "me sacudes" para reflejar mejor esa revisión sin perder el trasfondo de desintegración o desmoronamiento implícito en מוג.
  spanish_consistency_notes:
  - Se mantiene "Dios" implícito mediante el discurso en segunda persona, sin añadirlo al texto para no sobredeterminar el hebreo.
  - '"Viento" traduce רוּחַ en su sentido meteorológico; no se usa "espíritu" porque el contexto no lo exige.'
  - La imagen poética se conserva con verbos de movimiento violento en español natural, evitando calcos demasiado rígidos.
