translation:
  language: es
  text: Concibió otra vez y dio a luz un hijo, y lo llamó Onán.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַתַּהַר
  english_pob_choice: She conceived
  chosen_spanish: Concibió
  alternatives_spanish:
  - Quedó embarazada
  - Se embarazó
  lexicon: HALOT
  rationale: El hebreo הרה en esta forma narrativa expresa el inicio del embarazo/concepción. «Concibió» es natural en español bíblico y conserva la concisión del relato.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - todavía
  lexicon: HALOT
  rationale: En este contexto de nacimientos consecutivos, el valor es repetitivo; «otra vez» transmite mejor la repetición que un matiz de continuidad.
- source_word: וַתֵּלֶד בֵּן
  english_pob_choice: and bore a son
  chosen_spanish: y dio a luz un hijo
  alternatives_spanish:
  - y alumbró un hijo
  - y parió un hijo
  lexicon: HALOT
  rationale: ילד en este contexto de parto se expresa con naturalidad como «dar a luz». «Hijo» reproduce el objeto directo explícito del hebreo.
- source_word: וַתִּקְרָא אֶת־שְׁמוֹ
  english_pob_choice: and she named him
  chosen_spanish: y lo llamó
  alternatives_spanish:
  - y le puso por nombre
  - y llamó su nombre
  lexicon: HALOT
  rationale: El hebreo literalmente dice «llamó su nombre», pero en español la fórmula más idiomática y fiel al sentido es «lo llamó». Mantiene el acto de nombrar sin calco innecesario.
- source_word: אוֹנָן
  english_pob_choice: Onan
  chosen_spanish: Onán
  alternatives_spanish:
  - Onan
  lexicon: convención onomástica española
  rationale: Los nombres propios se transliteran; en español bíblico estándar el acento gráfico ayuda a reflejar la pronunciación habitual y la prosodia del nombre.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene una equivalencia óptima sin notas; no hay revisiones aplicadas ni variantes textuales relevantes en el paquete fuente. La versión española sigue esa lectura estable sin introducir explicaciones innecesarias.
  spanish_consistency_notes:
  - Se mantiene el ritmo narrativo breve del hebreo.
  - Se evita el calco «llamó su nombre» por no ser natural en español, aunque la idea subyacente queda preservada.
  - Se conserva la transliteración del nombre propio con acento gráfico según uso español.
