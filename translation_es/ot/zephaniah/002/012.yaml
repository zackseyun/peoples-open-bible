translation:
  language: es
  text: También ustedes, cusitas, caerán muertos por mi espada[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «También ustedes, cusitas: ellos son los muertos de mi espada».'
    reason: lexical_alternative
  - marker: b
    text: «Cusitas» puede también traducirse como «etíopes», refiriéndose al pueblo de Cus.
    reason: alternative_reading
lexical_decisions:
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - también ustedes
  - además
  lexicon: HALOT
  rationale: El adverbio añade a este pueblo al conjunto de naciones bajo juicio. «También» conserva la fuerza aditiva de גַּם de manera natural en español.
- source_word: אַתֶּם
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - tú
  lexicon: HALOT
  rationale: El hebreo usa segunda persona plural masculina. «Ustedes» es la forma neutral y clara en español actual para el plural directo.
- source_word: כּוּשִׁים
  english_pob_choice: Cushites
  chosen_spanish: cusitas
  alternatives_spanish:
  - etíopes
  lexicon: HALOT
  rationale: Se preserva el etnónimo bíblico de Cus/Cush. «Cusitas» evita sustituirlo por una identificación geográfica moderna que puede desviar el referente histórico-textual.
- source_word: חַֽלְלֵי
  english_pob_choice: slain
  chosen_spanish: los muertos
  alternatives_spanish:
  - los heridos de muerte
  - los asesinados
  lexicon: HALOT
  rationale: El sustantivo describe a los caídos por muerte violenta. En español, una estructura nominal como «los muertos» reproduce la idea de resultado sin forzar un verbo que el hebreo no expresa explícitamente.
- source_word: חַרְבִּי
  english_pob_choice: my sword
  chosen_spanish: mi espada
  alternatives_spanish:
  - mi espada de juicio
  - mi arma
  lexicon: HALOT
  rationale: «Espada» mantiene la imagen concreta de instrumento de juicio divino. El posesivo de primera persona se conserva con «mi».
- source_word: הֵמָּה
  english_pob_choice: will be
  chosen_spanish: serán
  alternatives_spanish:
  - son
  - están
  lexicon: HALOT
  rationale: El hebreo presenta una cláusula sin verbo explícito; en contexto profético, el sentido futuro es natural. «Serán» comunica el anuncio de juicio de forma idiomática en español.
theological_decisions:
- issue: Tenso implícito de la cláusula nominal hebrea
  english_pob_reading: 'future sense: ''will be slain'''
  chosen_spanish_reading: 'futuro profético: ''serán los muertos'''
  alternative_spanish_readings:
  - 'presente nominal: ''son los muertos'''
  - '''son los muertos de mi espada'''
  rationale: El hebreo usa una construcción nominal con fuerza predicativa en un oráculo. En español, el futuro profético expresa mejor la proclamación de juicio venidero sin negar la literalidad básica del texto.
  doctrine_reference: Profecía oracular y juicio divino en el AT; cf. la fuerza futurizante del discurso profético.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios, con alto acuerdo del revisor. La versión española sigue ese estado estable y conserva la tensión entre una cláusula nominal hebrea y la expresividad futura exigida por el contexto profético.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» cuando el hebreo corresponde al nombre divino; en este versículo no aparece.
  - Se conserva el etnónimo bíblico «cusitas» para seguir la decisión auditada de transliteración semántica del pueblo de Cush.
  - Se opta por una estructura española natural que preserve la predicación nominal hebrea sin perder la fuerza de anuncio del oráculo.
