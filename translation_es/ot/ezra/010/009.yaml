translation:
  language: es
  text: Así se reunieron todos los hombres de Judá y Benjamín[a] en Jerusalén dentro de los tres días[b]. Era el mes noveno, el día veinte del mes. Y todo el pueblo se sentó en la plaza abierta de la casa de Dios[c], temblando a causa del asunto y a causa de la lluvia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «todos los hombres de Judá y Benjamín»; la redacción es gramaticalmente masculina y probablemente se refiere a los miembros varones o representantes convocados a la asamblea.
    reason: lexical_alternative
  - marker: b
    text: O «se congregaron».
    reason: lexical_alternative
  - marker: c
    text: O «en la explanada de la casa de Dios». El hebreo se refiere a un espacio amplio y abierto, no necesariamente a un atrio interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקָּבְצוּ
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: HALOT
  rationale: El nifal de קבץ expresa reunión/ensamblaje colectivo. «Se reunieron» suena natural en español y conserva el valor pasivo/reflexivo sin añadir interpretación.
- source_word: כָל אַנְשֵׁי יְהוּדָה וּבִנְיָמִן
  english_pob_choice: all the men of Judah and Benjamin
  chosen_spanish: todos los hombres de Judá y Benjamín
  alternatives_spanish:
  - todo el pueblo de Judá y Benjamín
  - todos los varones de Judá y Benjamín
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de». Mantengo la referencia masculina para no borrar el matiz gramatical y social del texto, siguiendo el criterio del POB en inglés.
- source_word: לִשְׁלֹשֶׁת הַיָּמִים
  english_pob_choice: within the three days
  chosen_spanish: dentro de los tres días
  alternatives_spanish:
  - en tres días
  - antes de que pasaran los tres días
  lexicon: HALOT
  rationale: La expresión marca el plazo límite de la convocatoria previa. «Dentro de los tres días» comunica bien el cumplimiento dentro del período fijado.
- source_word: הוּא חֹדֶשׁ הַתְּשִׁיעִי
  english_pob_choice: It was the ninth month
  chosen_spanish: Era el mes noveno
  alternatives_spanish:
  - Era el noveno mes
  - Se trataba del mes noveno
  lexicon: HALOT
  rationale: La fórmula calendárica hebrea se vierte de manera sobria y directa. «Mes noveno» es fiel y natural en estilo bíblico en español.
- source_word: בְּעֶשְׂרִים בַּחֹדֶשׁ
  english_pob_choice: on the twentieth day of the month
  chosen_spanish: a los veinte días del mes
  alternatives_spanish:
  - el día veinte del mes
  - el veinte del mes
  lexicon: HALOT
  rationale: La fórmula hebrea de fecha se expresa en español con una construcción clara y estándar. «A los veinte días del mes» conserva el valor temporal sin rigidez innecesaria.
- source_word: וַיֵּשְׁבוּ
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - se quedaron sentados
  - tomó asiento
  lexicon: HALOT
  rationale: Aunque el verbo es plural, en español la construcción colectiva con «todo el pueblo» funciona de manera natural con un verbo singular coordinado en la frase, y mantiene la escena de permanencia sentada. La alternativa plenamente plural sería posible, pero esta redacción fluye mejor en español bíblico contemporáneo.
- source_word: בִּרְחוֹב בֵּית הָאֱלֹהִים
  english_pob_choice: in the open square of the house of God
  chosen_spanish: en la plaza abierta de la casa de Dios
  alternatives_spanish:
  - en la explanada de la casa de Dios
  - en el espacio abierto de la casa de Dios
  lexicon: HALOT
  rationale: רְחוֹב designa un lugar amplio y abierto; «plaza abierta» conserva ese sentido sin convertirlo en «atrio» o «patio», que serían más específicos de lo que permite el hebreo. «Casa de Dios» traduce de forma directa el hebreo sin usar un término eclesiástico más interpretativo.
- source_word: מַרְעִידִים
  english_pob_choice: trembling
  chosen_spanish: temblando
  alternatives_spanish:
  - estremeciéndose
  - tiritando
  lexicon: HALOT
  rationale: El participio de רעד expresa temblor físico y emocional. «Temblando» es la opción más simple y fiel, y mantiene bien la relación causal con el asunto y la lluvia.
- source_word: עַל הַדָּבָר
  english_pob_choice: because of the matter
  chosen_spanish: a causa del asunto
  alternatives_spanish:
  - por el asunto
  - debido al asunto
  lexicon: HALOT
  rationale: La partícula עַל aquí tiene sentido causal/relacional según el contexto. «A causa del asunto» evita suavizar el tono y conserva el valor referencial del problema tratado.
- source_word: וּמֵהַגְּשָׁמִים
  english_pob_choice: and because of the rain
  chosen_spanish: y a causa de la lluvia
  alternatives_spanish:
  - y por la lluvia
  - y a causa de las lluvias
  lexicon: HALOT
  rationale: El plural hebreo puede referirse a lluvias estacionales o aguaceros. «La lluvia» funciona naturalmente en español y evita añadir el calificativo «fuerte» o «intensa» que el texto no exige.
theological_decisions:
- issue: Referencia masculina y representatividad del grupo convocado
  english_pob_reading: all the men of Judah and Benjamin ... the wording is grammatically masculine and likely refers to the male members or representatives summoned to the assembly.
  chosen_spanish_reading: todos los hombres de Judá y Benjamín
  alternative_spanish_readings:
  - todo el pueblo de Judá y Benjamín
  - los representantes de Judá y Benjamín
  rationale: Mantengo la forma masculina porque el hebreo la usa explícitamente y el contexto de convocatoria pública sugiere los varones convocados o sus representantes. Traducir como «todo el pueblo» borraría una tensión gramatical y social que el texto conserva.
  doctrine_reference: N/A (observación filológica/contextual)
- issue: Espacio abierto de culto
  english_pob_reading: in the open square of the house of God ... a broad open area, not necessarily an inner court.
  chosen_spanish_reading: en la plaza abierta de la casa de Dios
  alternative_spanish_readings:
  - en el patio de la casa de Dios
  - en la explanada de la casa de Dios
  rationale: Evito «atrio» o «patio» como si el hebreo precisara una zona arquitectónica interna. La expresión elegida mantiene la amplitud espacial y la ubicación sin sobreinterpretar el lugar.
  doctrine_reference: N/A (observación espacial/textual)
- issue: Causa del temblor
  english_pob_reading: trembling because of the matter and because of the rain.
  chosen_spanish_reading: temblando a causa del asunto y a causa de la lluvia
  alternative_spanish_readings:
  - temblando por el asunto y por la lluvia
  - estremeciéndose a causa del asunto y de la lluvia
  rationale: Conservo las dos causas de modo paralelo, porque el hebreo las yuxtapone y el POB elimina el adjetivo añadido en una revisión. No reduzco el efecto a una sola causa ni lo intensifico más allá del texto.
  doctrine_reference: N/A (observación textual)
- issue: Terminología divina en בית האלהים
  english_pob_reading: house of God
  chosen_spanish_reading: casa de Dios
  alternative_spanish_readings:
  - casa de Yahvé
  - casa de nuestro Dios
  rationale: Aquí el hebreo dice literalmente «casa de Dios». No hay base inmediata para sustituirlo por «casa de Yahvé» en este sintagma, ya que el texto no contiene יהוה en esta frase.
  doctrine_reference: N/A (observación lexical)
translation_notes:
  revision_awareness: Sigo la revisión del POB inglés que eliminó «heavy» antes de «rain» y ajustó «this matter» a «the matter»; por eso no intensifico la lluvia ni añado adjetivos. También mantengo el valor causal simple de ambas expresiones, sin convertirlas en paráfrasis.
  spanish_consistency_notes:
  - Usé «casa de Dios» de forma consistente para בֵּית הָאֱלֹהִים, evitando términos litúrgicos no exigidos por el hebreo.
  - Conservé el paralelismo causal con «a causa del asunto y a causa de la lluvia» para reflejar tanto el contenido como la estructura del original.
  - Mantuve el matiz masculino de אַנְשֵׁי, en línea con la nota auditada del POB en inglés.
  - Preferí una fecha castellana natural («Era el mes noveno, a los veinte días del mes») que sigue la fórmula hebrea sin perder legibilidad.
