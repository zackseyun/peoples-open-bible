translation:
  language: es
  text: Y, dejando todas estas cosas, se quedan boquiabiertos ante ella, y, con la boca abierta, la miran fijamente; y todos la eligen[a] más bien que al oro, la plata y toda cosa hermosa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la prefieren más que al oro, la plata y toda cosa hermosa»; el verbo griego puede expresar preferencia implícita en esta construcción comparativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφέντες
  english_pob_choice: leaving ... behind
  chosen_spanish: dejando
  alternatives_spanish:
  - habiendo dejado
  - abandonando
  lexicon: BDAG
  rationale: 'El participio aoristo expresa una acción previa: primero dejan de lado esas cosas y luego reaccionan ante ella. «Dejando» conserva esa secuencia natural en español sin volver pesada la frase.'
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - estas cosas todas
  lexicon: BDAG
  rationale: El plural neutro apunta a un conjunto de bienes o asuntos ya mencionados. «Todas estas cosas» mantiene la referencia amplia y transparente.
- source_word: εἰς αὐτὴν κέχηναν
  english_pob_choice: they gape at her
  chosen_spanish: se quedan boquiabiertos ante ella
  alternatives_spanish:
  - la miran boquiabiertos
  - se quedan abiertos de boca ante ella
  lexicon: LSJ
  rationale: El griego expresa una atención fijada y con la boca abierta. «Se quedan boquiabiertos» conserva la imagen corporal y su fuerza idiomática en español.
- source_word: χάσκοντες τὸ στόμα
  english_pob_choice: with mouths hanging open
  chosen_spanish: con la boca abierta
  alternatives_spanish:
  - con las bocas abiertas
  - boquiabiertos
  lexicon: LSJ
  rationale: La frase intensifica la imagen de asombro. En español, «con la boca abierta» es natural y mantiene el valor visual del participio.
- source_word: θεωροῦσιν
  english_pob_choice: they stare at her
  chosen_spanish: la contemplan
  alternatives_spanish:
  - la miran
  - la observan
  - la fijan la vista en ella
  lexicon: BDAG
  rationale: Aquí θεωρέω denota mirar con atención concentrada. «La contemplan» reproduce mejor esa fijación que un simple «la miran».
- source_word: αἱρετίζουσιν
  english_pob_choice: choose
  chosen_spanish: la prefieren
  alternatives_spanish:
  - la eligen
  - la escogen
  lexicon: LSJ
  rationale: En la construcción comparativa con μᾶλλον ἢ, el verbo lleva el matiz de preferencia. «Prefieren» expresa con claridad la relación de comparación y evita redundancia.
- source_word: μᾶλλον ἢ
  english_pob_choice: rather than
  chosen_spanish: antes que
  alternatives_spanish:
  - más que
  - en vez de
  lexicon: BDAG
  rationale: «Antes que» es un equivalente natural de la comparación de preferencia y encaja bien con «prefieren».
- source_word: τὸ χρυσίον καὶ τὸ ἀργύριον καὶ πᾶν πρᾶγμα ὡραῖον
  english_pob_choice: gold and silver and every beautiful thing
  chosen_spanish: al oro, la plata y toda cosa hermosa
  alternatives_spanish:
  - al oro, a la plata y a toda cosa hermosa
  - al oro, la plata y cualquier cosa hermosa
  lexicon: BDAG
  rationale: La lista griega nombra metales preciosos y luego amplía a cualquier cosa hermosa. El singular colectivo «toda cosa hermosa» conserva la amplitud del griego y su valor resumidor.
theological_decisions:
- issue: Preferencia humana por la figura sobre las riquezas
  english_pob_reading: they choose her rather than gold and silver and every beautiful thing
  chosen_spanish_reading: la prefieren antes que al oro, la plata y toda cosa hermosa
  alternative_spanish_readings:
  - la eligen antes que al oro, la plata y toda cosa hermosa
  - la prefieren más que al oro, la plata y toda cosa hermosa
  rationale: 'El texto subraya una preferencia absoluta: la persona admirada supera en valor a los bienes más preciados. «Prefieren» mantiene ese contraste sin suavizarlo.'
  doctrine_reference: Sabiduría/valor comparativo en el lenguaje sapiencial; cf. Prov. 3:14-15 como paralelo conceptual, sin depender de él.
translation_notes:
  revision_awareness: Este borrador sigue de cerca el griego de Swete y conserva la imagen vívida de asombro y preferencia. Se alineó con el audit trail inglés en la distinción entre el gesto corporal («boquiabiertos», «con la boca abierta») y el matiz comparativo de αἱρετίζουσιν en μᾶλλον ἢ.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiere; aquí no aparece.
  - Se evita «Cristo» porque no hay lenguaje mesiánico en este versículo.
  - Se mantiene un registro digno y moderno, sin arcaísmos innecesarios.
  - La nota a distingue entre «prefieren» y «eligen» para conservar la ambigüedad útil del verbo griego.
