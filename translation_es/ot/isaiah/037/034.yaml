translation:
  language: es
  text: Por el camino por el que vino, por él volverá, y no vendrá a esta ciudad, declara Yahvé.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: בַּדֶּרֶךְ
  english_pob_choice: By the way
  chosen_spanish: Por el camino
  alternatives_spanish:
  - Por la vía
  - Por la senda
  lexicon: HALOT
  rationale: דֶּרֶךְ puede significar camino, ruta o vía. «Por el camino» conserva la imagen de ruta y suena natural en español.
- source_word: אֲשֶׁר
  english_pob_choice: that
  chosen_spanish: por el que
  alternatives_spanish:
  - que
  - por la cual
  lexicon: HALOT
  rationale: El relativo introduce la oración que modifica «camino». Como el antecedente es masculino singular, «por el que» mantiene la relación preposicional con buena fluidez.
- source_word: בָּא בָּהּ
  english_pob_choice: he came, by it
  chosen_spanish: vino, por él
  alternatives_spanish:
  - vino por él
  - vino por ella
  lexicon: HALOT
  rationale: El hebreo repite la idea del mismo camino y usa el sufijo femenino de la palabra «camino». En español, «por él» reproduce la referencia al camino; «vino» mantiene el movimiento de llegada sin forzar una construcción más literal que suene pesada.
- source_word: יָשׁוּב
  english_pob_choice: he will return
  chosen_spanish: volverá
  alternatives_spanish:
  - regresará
  - dará vuelta
  lexicon: HALOT
  rationale: שׁוּב aquí expresa volver por la misma ruta. «Volverá» es conciso y preserva el sentido de retorno.
- source_word: וְאֶל
  english_pob_choice: and ... into
  chosen_spanish: y no entrará
  alternatives_spanish:
  - y no vendrá a
  - y no llegará a
  lexicon: HALOT
  rationale: Con «entrará» se expresa con naturalidad el verbo de llegada a una ciudad. El inglés POB distinguía «come into»; en español «entrar en» comunica la misma dirección sin perder claridad.
- source_word: הָעִיר הַזֹּאת
  english_pob_choice: this city
  chosen_spanish: esta ciudad
  alternatives_spanish:
  - la ciudad esta
  - esta urbe
  lexicon: HALOT
  rationale: עִיר se traduce normalmente por «ciudad». El demostrativo se resuelve de modo natural como «esta ciudad».
- source_word: לֹא יָבֹוא
  english_pob_choice: he will not come
  chosen_spanish: no entrará
  alternatives_spanish:
  - no vendrá
  - no llegará
  lexicon: HALOT
  rationale: Aunque בוא literalmente es «venir/venir a», aquí el complemento de destino hace que en español «entrará» sea más natural y conserve la fuerza de prohibición de acceso. Se mantiene el matiz direccional del hebreo.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: נְאֻם es una fórmula profética solemne; «declara» la reproduce bien en español. Se conserva el nombre divino «Yahvé» según la norma del proyecto para יְהוָה.
theological_decisions:
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragrama. Conforme a la terminología del proyecto, se traduce con el nombre divino auditable «Yahvé», en lugar de enmascararlo como un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH → Yahvé'
- issue: Valor de בוא en la cláusula final
  english_pob_reading: he will not come into this city
  chosen_spanish_reading: no entrará en esta ciudad
  alternative_spanish_readings:
  - no vendrá a esta ciudad
  - no llegará a esta ciudad
  rationale: El verbo hebreo mantiene la idea de acceso a la ciudad. En español, «entrar en» expresa mejor la orientación espacial que «venir» y evita una traducción mecánica que debilite el sentido.
  doctrine_reference: Criterio de claridad semántica sin alterar la negación profética
translation_notes:
  revision_awareness: 'La versión inglesa POB ya había resuelto el verso con alta concordancia y sin notas. Esta redacción española sigue de cerca el hebreo y conserva las decisiones auditadas: repetición del mismo camino, negación enfática de acceso a la ciudad y fórmula profética final con el nombre divino explícito.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה en el texto principal.
  - Se prefiere «camino» frente a «ruta» o «senda» por naturalidad y correspondencia semántica.
  - «Entrará en esta ciudad» traduce el valor direccional de בוא sin añadir contenido ajeno.
  - El registro es bíblico pero contemporáneo, sin calco excesivo.
