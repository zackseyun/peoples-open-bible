translation:
  language: es
  text: 'Y Asa clamó a Yahvé su Dios y dijo: «Yahvé, no hay nadie fuera de ti para ayudar entre el poderoso y el que no tiene fuerzas[a]. Ayúdanos, Yahvé nuestro Dios, porque en ti nos apoyamos, y en tu nombre hemos venido contra esta multitud. Yahvé nuestro Dios, tú eres nuestro Dios; no dejes que el hombre prevalezca contra ti[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre muchos y entre los que no tienen fuerza». El hebreo de esta cláusula es compacto y puede enfatizar ya sea la cantidad o la fuerza.'
    reason: alternative_reading
  - marker: b
    text: 'O: «no dejes que el hombre retenga fuerza contra ti» / «no dejes que el hombre te resista».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּקְרָא
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - llamó
  - gritó
  lexicon: HALOT
  rationale: En contexto de oración y súplica, el verbo expresa un clamor dirigido a Dios; «clamó» conserva la intensidad sin sonar forzado en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del texto hebreo como «Yahvé», conforme al criterio del proyecto para יהוה, en vez de sustituirlo por un título.
- source_word: אֱלֹהָיו / אֱלֹהֵינוּ
  english_pob_choice: his God / our God
  chosen_spanish: su Dios / nuestro Dios
  alternatives_spanish:
  - su Dios / Dios nuestro
  lexicon: HALOT
  rationale: La construcción posesiva es directa y de sentido de pacto y oración; en español se conserva sin añadir matices no presentes en el hebreo.
- source_word: אֵין עִמְּךָ לַעְזוֹר
  english_pob_choice: there is none besides you to help
  chosen_spanish: no hay nadie fuera de ti para ayudar
  alternatives_spanish:
  - no hay nadie contigo para ayudar
  - no hay quien pueda ayudar aparte de ti
  lexicon: HALOT
  rationale: La expresión hebrea es compacta e idiomática. «No hay nadie fuera de ti para ayudar» comunica la exclusividad del auxilio divino sin sobreexplicar la sintaxis.
- source_word: בֵּין רַב לְאֵין כֹּחַ
  english_pob_choice: between the mighty and the powerless
  chosen_spanish: entre el poderoso y el que no tiene fuerzas
  alternatives_spanish:
  - entre muchos y los que no tienen fuerza
  - entre el fuerte y el débil
  lexicon: HALOT
  rationale: El hebreo contrapone una fuerza grande/abundante con la ausencia de fuerza. «El poderoso» y «el que no tiene fuerzas» preservan la tensión semántica sin fijar indebidamente si רַב enfatiza número o poder.
- source_word: עָזְרֵנוּ
  english_pob_choice: Help us
  chosen_spanish: Ayúdanos
  alternatives_spanish:
  - Socórrenos
  - Ven en nuestra ayuda
  lexicon: HALOT
  rationale: Es un imperativo breve y natural en la voz de oración. «Ayúdanos» reproduce la súplica directa con claridad.
- source_word: כִּי עָלֶיךָ נִשְׁעַנּוּ
  english_pob_choice: for we rely on you
  chosen_spanish: porque en ti nos apoyamos
  alternatives_spanish:
  - porque confiamos en ti
  - porque nos apoyamos sobre ti
  lexicon: HALOT
  rationale: נשען es literalmente «apoyarse/recostarse sobre». «Nos apoyamos» mantiene la metáfora corporal del hebreo, más cercana al original que «confiamos».
- source_word: וּבְשִׁמְךָ בָאנוּ
  english_pob_choice: in your name we have come
  chosen_spanish: y en tu nombre hemos venido
  alternatives_spanish:
  - y en tu nombre venimos
  - y por tu nombre hemos venido
  lexicon: HALOT
  rationale: La fórmula bíblica «en tu nombre» conserva el valor de autoridad y dependencia. «Hemos venido» refleja el perfecto hebreo con naturalidad en español.
- source_word: הֶהָמוֹן הַזֶּה
  english_pob_choice: this multitude
  chosen_spanish: esta multitud
  alternatives_spanish:
  - esta muchedumbre
  - este gran ejército
  lexicon: HALOT
  rationale: הָמוֹן designa una gran masa o multitud; «esta multitud» es fiel y suficientemente amplia para el contexto militar.
- source_word: אֱנוֹשׁ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el mortal
  - la humanidad
  lexicon: HALOT
  rationale: Se conserva el singular genérico masculino del hebreo, con fuerza representativa humana, sin neutralizarlo en un abstracto colectivo.
- source_word: יַעְצֹר
  english_pob_choice: prevail
  chosen_spanish: prevalezca
  alternatives_spanish:
  - resista
  - se mantenga firme
  - detenga
  lexicon: HALOT
  rationale: El verbo es difícil y el POB inglés lo entiende como vencer/aguantar contra. «Prevalezca» comunica bien la idea de imponerse o resistir victoriosamente en el contexto de batalla.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh / Yahweh
  chosen_spanish_reading: Yahvé / Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton de forma explícita; por coherencia con la doctrina editorial y la transparencia textual, se conserva el nombre propio divino en español como «Yahvé».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה YHWH → Yahvé'
- issue: 'Sentido de la última petición: אַל יַעְצֹר עִמְּךָ אֱנוֹשׁ'
  english_pob_reading: do not let man prevail against you
  chosen_spanish_reading: no dejes que el hombre prevalezca contra ti
  alternative_spanish_readings:
  - no dejes que el hombre te resista
  - no permitas que el mortal se mantenga firme contra ti
  - no dejes que el hombre retenga fuerza contra ti
  rationale: 'La interpretación adopta la lectura combativa de עצר en este contexto: que ningún humano se imponga o resista a Yahvé. «Prevalezca» conserva la idea de superación en combate sin cerrar otras posibilidades semánticas.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Mantenimiento del singular genérico אֱנוֹשׁ
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - el mortal
  - la gente
  - la humanidad
  rationale: Se conserva el singular genérico masculino del hebreo para no borrar la forma marcada del original ni diluir el contraste retórico de la súplica.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se siguió el auditoría inglesa de alta concordancia; no se detectaron cambios textuales sustantivos respecto del pasaje fuente. La principal decisión de español fue preservar la metáfora de נשען («nos apoyamos») y resolver el cierre de עצר con una lectura de prevalecer/resistir compatible con el contexto militar y con la nota alternativa del POB inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה de forma consistente con el proyecto.
  - Se conserva el singular genérico «el hombre» para אֱנוֹשׁ, evitando neutralizaciones no requeridas por el texto.
  - La metáfora corporal de נשען se mantiene con «nos apoyamos» para enlazar con otras ocurrencias del mismo campo semántico.
  - Las notas a y b cubren las alternativas semánticas documentadas sin introducir glosas ajenas al texto.
