    rationale: El hebreo usa una pregunta indirecta introducida por מָה («qué»), no una relativa indefinida («lo que»). La redacción actual cambia levemente el sentido y la sintaxis del ofrecimiento divino.
  - severity: medium
    issue: La nota al pie actual («Pide qué te daré») conserva la literalidad de forma poco idiomática.
    rationale: Aunque intenta reflejar el hebreo, en español suena forzada. Conviene una alternativa más natural que mantenga el valor interrogativo indirecto, por ejemplo «Pide qué he de darte».
  revised_spanish_text: 'Aquella noche Dios se apareció a Salomón y le dijo: «Pide qué he de darte[a]».'
