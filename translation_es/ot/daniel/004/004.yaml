base_translation:
  language: en
  yaml_path: translation/ot/daniel/004/004.yaml
  text: Then the magicians[a], enchanters, Chaldeans, and diviners came in, and I told the dream before them[b], but they did not make its interpretation known to me.
  footnotes:
  - marker: a
    text: Or, 'they could not make its interpretation known to me.' The Aramaic directly says they did not make it known; inability is a contextual inference reflected in some translations.
    reason: alternative_reading
  - marker: b
    text: '''Chaldeans'' may refer here not merely to an ethnic group but to a class of Babylonian court experts.'
    reason: cultural_note
