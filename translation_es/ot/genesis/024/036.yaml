translation:
  language: es
  text: Y Sara[a], la mujer de mi señor, dio a luz un hijo a mi señor cuando ya era anciana, y le dio todo cuanto tenía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «después de su vejez».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶד
  english_pob_choice: bore
  chosen_spanish: dio a luz
  alternatives_spanish:
  - parió
  - engendró
  lexicon: HALOT
  rationale: El verbo narrativo de ילד para una mujer se expresa naturalmente en español con «dio a luz», que conserva el sentido de nacimiento sin volverlo forzado o coloquial.
- source_word: אֵשֶׁת אֲדֹנִי
  english_pob_choice: my master's wife
  chosen_spanish: la mujer de mi señor
  alternatives_spanish:
  - la esposa de mi señor
  - la mujer de mi amo
  lexicon: HALOT
  rationale: «La mujer de mi señor» refleja el constructo hebreo y mantiene el tono deferente del hablante. «Esposa» es posible, pero «mujer de» sigue más de cerca la forma fuente y su registro narrativo.
- source_word: בֵן
  english_pob_choice: a son
  chosen_spanish: un hijo
  alternatives_spanish:
  - un varón
  - un hijo varón
  lexicon: HALOT
  rationale: El hebreo no lleva artículo; en español, «un hijo» transmite bien la indefinición formal y es idiomático. En este contexto el referente es Isaac, pero el texto sigue presentado como un nacimiento de «un hijo».
- source_word: לַאדֹנִי
  english_pob_choice: to my master
  chosen_spanish: a mi señor
  alternatives_spanish:
  - para mi señor
  - para mi amo
  lexicon: HALOT
  rationale: La preposición ל se conserva con «a» para marcar relación/beneficio en un español natural. «Mi señor» preserva el lenguaje respetuoso del relato.
- source_word: אַחֲרֵי זִקְנָתָהּ
  english_pob_choice: after her old age
  chosen_spanish: después de su vejez
  alternatives_spanish:
  - cuando ya era anciana
  - después de haber envejecido
  - en su vejez
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente temporal y puede sonar rara si se calca; «después de su vejez» conserva la idea de que el nacimiento ocurrió tras la etapa de extrema ancianidad. No se suaviza a una paráfrasis más interpretativa.
- source_word: וַיִּתֶּן לוֹ אֶת כָּל אֲשֶׁר לוֹ
  english_pob_choice: and he gave him all that he had
  chosen_spanish: y le dio todo cuanto tenía
  alternatives_spanish:
  - y le dio todo lo que tenía
  - y le dio todo cuanto era suyo
  lexicon: HALOT
  rationale: La fórmula posesiva total se vierte con «todo cuanto tenía», una expresión amplia y natural que preserva la totalidad de la herencia o posesión transmitida. «Cuanto» evita repetición innecesaria y mantiene solemnidad.
theological_decisions:
- issue: Preservación del estado de ancianidad de Sara en la cláusula temporal
  english_pob_reading: after her old age
  chosen_spanish_reading: después de su vejez
  alternative_spanish_readings:
  - en su vejez
  - después de haber envejecido
  rationale: La frase hebrea subraya el embarazo/nacimiento ocurridos más allá de la etapa normal de fecundidad, y la versión española conserva esa tensión temporal sin convertirla en comentario explicativo.
  doctrine_reference: Génesis 18:11-14; Romanos 4:19
- issue: Cesión total de bienes al hijo
  english_pob_reading: and he gave him all that he had
  chosen_spanish_reading: y le dio todo cuanto tenía
  alternative_spanish_readings:
  - y le dio todo lo que tenía
  - y le entregó todo lo suyo
  rationale: Se conserva el alcance total de la transferencia patrimonial sin precisar más de lo que el hebreo dice. La formulación evita añadir matices legales ajenos al texto.
  doctrine_reference: Génesis 25:5-6
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «after she had grown old» a «after her old age» para reflejar con mayor literalidad la locución hebrea. El español sigue esa decisión con una expresión temporal igualmente cercana al hebreo, sin resolverla en una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantiene «mi señor» como tratamiento respetuoso y coherente con la voz del siervo en el contexto inmediato.
  - Se usa «dio a luz» en lugar de un giro más arcaico para conservar fluidez contemporánea sin perder la forma narrativa.
  - Se conserva la tensión de la locución temporal de זִקְנָה mediante una nota de alternativa literal.
  - No se introduce «Cristo», «SEÑOR» ni otras sustituciones no presentes en el hebreo de este versículo.
