translation:
  language: es
  text: 'Y los hombres de la guarnición[a] respondieron a Jonatán y a su portador de armas, y dijeron: «Suban acá, y les diremos algo[b]». Entonces Jonatán dijo a su portador de armas: «Sube detrás de mí, porque Yahvé los ha entregado en manos[c] de Israel».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hombres del puesto avanzado».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «les haremos saber una cosa».'
    reason: lexical_alternative
  - marker: c
    text: 'Modismo hebreo: «en manos de Israel», es decir, bajo el poder de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַנְשֵׁי הַמַּצָּבָה
  english_pob_choice: the men of the garrison
  chosen_spanish: los hombres de la guarnición
  alternatives_spanish:
  - los hombres del puesto avanzado
  - los hombres del destacamento
  lexicon: HALOT
  rationale: En este contexto militar, מַצָּבָה designa una posición ocupada por tropas, no un monumento. «Guarnición» conserva el sentido de fuerza estacionada y suena natural en español bíblico moderno.
- source_word: נֹשֵׂא כֵלָיו
  english_pob_choice: his armor-bearer
  chosen_spanish: su portador de armas
  alternatives_spanish:
  - su escudero
  - el que llevaba sus armas
  lexicon: HALOT
  rationale: El hebreo describe literalmente al que lleva las armas/equipo de otro. «Portador de armas» conserva la fuerza lexical sin importar una lectura más interpretativa como «escudero».
- source_word: וְנוֹדִיעָה אֶתְכֶם דָּבָר
  english_pob_choice: and we will tell you something
  chosen_spanish: y les haremos saber una cosa
  alternatives_spanish:
  - y les diremos algo
  - y les daremos a conocer una cosa
  lexicon: HALOT
  rationale: El verbo en hifil de ידע significa «hacer saber, informar». «Haremos saber» mantiene el valor causativo y «una cosa» refleja el carácter vago de דָּבָר sin volverlo más preciso de lo que el hebreo permite.
- source_word: עֲלֵה אַחֲרַי
  english_pob_choice: Come up after me
  chosen_spanish: Sube detrás de mí
  alternatives_spanish:
  - Sube tras de mí
  - Ven detrás de mí
  lexicon: HALOT
  rationale: El imperativo es singular masculino y conserva la idea de ascender físicamente y seguir en orden. «Detrás de mí» expresa con claridad el matiz de seguimiento que el hebreo contiene.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: El texto hebreo usa el Tetragrama directamente. La política del proyecto para español es «Yahvé», transliteración reverente y auditable del nombre divino, sin sustituirlo por un título.
- source_word: בְּיַד יִשְׂרָאֵל
  english_pob_choice: into the hand of Israel
  chosen_spanish: en manos de Israel
  alternatives_spanish:
  - en la mano de Israel
  - bajo el poder de Israel
  lexicon: HALOT
  rationale: La expresión idiomática hebrea «en la mano de» comunica entrega al poder de otro. En español, «en manos de Israel» preserva el idioma bíblico y resulta inteligible sin excesiva rigidez.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El versículo nombra explícitamente a Yahvé como sujeto de la acción. Mantener el nombre propio evita el ocultamiento del Tetragrama y sigue la norma doctrinal del proyecto para el español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés para la estructura narrativa natural («respondieron... y dijeron» / «dijo a su portador de armas»), pero mantiene la transparencia semítica donde el hebreo lo requiere. No se añadieron notas al pie porque no hay marcadores anclados en el texto español.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה.
  - Se conserva «portador de armas» para נֹשֵׂא כֵלָיו en vez de «escudero», por mayor transparencia lexical.
  - «En manos de Israel» preserva el hebraísmo de בְּיַד sin forzar una paráfrasis.
  - El orden narrativo sigue el hebreo y el audit trail inglés sin duplicar la redundancia semítica en español.
