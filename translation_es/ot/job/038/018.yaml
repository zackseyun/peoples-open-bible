revisions:
- from: ¿Has comprendido la amplitud de la tierra? Háblame[a], si conoces todo esto.
  to: ¿Has comprendido la amplitud de la tierra? Dime[a], si sabes todo esto.
  rationale: Se cambia «Háblame» por «Dime» para reflejar con mayor precisión הַגֵּד y alinearse con el inglés auditado «Tell me». Se cambia «conoces» por «sabes» por mejor español con «todo esto». Se conserva «amplitud de la tierra» y la nota alternativa, ya que representan adecuadamente רַחֲבֵי אָרֶץ.
  reviewer_model: gpt-5.4
