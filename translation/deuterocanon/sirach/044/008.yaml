translation:
  text: Some of them left behind a name[a], to be praised among their inheritance.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebrew 'in their inheritance' may mean 'among their descendants/heritage.' The Greek parallel emphasizes that their praises are recounted.
    reason: lexical_alternative
lexical_decisions:
- source_word: יש מהם
  chosen: Some of them
  alternatives:
  - There are among them
  - Of them, some
  lexicon: HALOT
  rationale: Partitive expression introducing a subset of the worthy ancestors just described. 'Some of them' is natural English and preserves the Hebrew sense.
- source_word: הניחו
  chosen: left behind
  alternatives:
  - left
  - bequeathed
  - caused to remain
  lexicon: HALOT
  rationale: The verb denotes leaving something remaining after one's life. 'Left behind' fits memorial reputation in context better than a more material 'bequeathed'.
- source_word: שם
  chosen: a name
  alternatives:
  - renown
  - a reputation
  - fame
  lexicon: HALOT
  rationale: Hebrew 'name' often carries the sense of reputation or memorial renown. Retaining 'name' preserves the idiom and allows readers to hear the biblical resonance, while the context clarifies that reputation is meant.
- source_word: להשתענות
  chosen: to be praised
  alternatives:
  - for recounting praise
  - for celebration
  - for mention with praise
  lexicon: HALOT
  rationale: The Hebrew form is difficult and likely reflects a sense of being spoken of with admiration; the Greek parallel 'to recount praises' supports a praise-oriented rendering. 'To be praised' gives clear English while staying close to the memorial function of the clause.
- source_word: בנחלתם
  chosen: among their inheritance
  alternatives:
  - in their inheritance
  - by their descendants
  - within their heritage
  lexicon: HALOT
  rationale: Literally 'in their inheritance.' In context this likely refers to the sphere of their posterity/heritage where their memory is preserved. 'Among their inheritance' keeps the Hebrew image without over-resolving it to 'descendants,' though that nuance is possible.
