translation:
  language: es
  text: Y todo Israel estaba trayendo el arca del pacto de Yahvé con aclamación[a], con el sonido de un cuerno[b], con trompetas y con címbalos, haciendo música con arpas y liras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con un grito'; el término hebreo puede denotar un grito fuerte de celebración o aclamación.
    reason: lexical_alternative
  - marker: b
    text: Hebreo 'shofar', tradicionalmente un cuerno, distinto de las 'trompetas' mencionadas a continuación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכָל יִשְׂרָאֵל
  english_pob_choice: And all Israel
  chosen_spanish: Y todo Israel
  alternatives_spanish:
  - Y todo el Israel
  - Y todo Israel reunido
  lexicon: HALOT
  rationale: El colectivo hebreo se mantiene como sujeto total. En español, 'todo Israel' suena natural y preserva el valor corporativo sin añadir 'reunido', que no está en el hebreo.
- source_word: מַעֲלִים
  english_pob_choice: was bringing up
  chosen_spanish: estaba trayendo
  alternatives_spanish:
  - estaba subiendo
  - traía
  - estaba llevando arriba
  lexicon: HALOT
  rationale: El participio hifil en contexto narrativo expresa acción en proceso. 'Estaba trayendo' conserva la progresividad y evita una calca pesada. 'Subiendo' puede sonar demasiado literal y menos idiomático en español.
- source_word: אֲרוֹן בְּרִית יְהוָה
  english_pob_choice: the ark of the covenant of Yahweh
  chosen_spanish: el arca del pacto de Yahvé
  alternatives_spanish:
  - el arca del pacto de Yahvé
  - el arca del pacto de Yahvé
  lexicon: HALOT
  rationale: Se conserva la cadena posesiva y el término técnico 'arca del pacto'. 'Pacto' comunica bien בְּרִית en español y mantiene la especificidad teológica del objeto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: 'DOCTRINE.md contested terms: יְהוָה YHWH'
  rationale: Se sigue el estándar del proyecto para el nombre divino. 'Yahvé' preserva el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: תְרוּעָה
  english_pob_choice: shouting
  chosen_spanish: júbilo
  alternatives_spanish:
  - gritos
  - clamor
  - aclamación
  lexicon: HALOT
  rationale: En este contexto cultual y procesional, la idea es una exclamación celebrativa. 'Júbilo' transmite el tono festivo y evita una repetición poco elegante de 'gritos'.
- source_word: ק֣וֹל שׁוֹפָ֔ר
  english_pob_choice: the sound of a horn
  chosen_spanish: el sonido de un cuerno
  alternatives_spanish:
  - el sonido de un shofar
  - la voz de un cuerno
  - el sonido de un carnero
  lexicon: HALOT
  rationale: '''Cuerno'' preserva la distinción con las trompetas siguientes y funciona bien en español. No se adopta ''shofar'' en el texto principal porque el español general entiende mejor ''cuerno'' sin perder el referente.'
- source_word: חֲצֹצְר֖וֹת
  english_pob_choice: trumpets
  chosen_spanish: trompetas
  alternatives_spanish:
  - clarines
  - trompetas de plata
  lexicon: HALOT
  rationale: Es el equivalente habitual y claro en español. No se añade 'de plata' porque el hebreo aquí no lo especifica.
- source_word: וּבִמְצִלְתָּיִם
  english_pob_choice: with cymbals
  chosen_spanish: con címbalos
  alternatives_spanish:
  - con platillos
  - con campanas
  lexicon: HALOT
  rationale: '''Címbalos'' es el término técnico más fiel y tradicional para este instrumento de percusión.'
- source_word: מַשְׁמִעִים
  english_pob_choice: making music
  chosen_spanish: haciendo música
  alternatives_spanish:
  - sonando
  - haciendo resonar
  - tocando
  lexicon: HALOT
  rationale: El hifil de שמע comunica hacer o causar que se oiga el sonido. 'Haciendo música' refleja naturalmente la función del participio sobre los instrumentos y evita limitar el sentido a un solo instrumento.
- source_word: בִּנְבָלִים
  english_pob_choice: with harps
  chosen_spanish: con arpas
  alternatives_spanish:
  - con liras
  - con cítaras
  lexicon: HALOT
  rationale: '''Arpas'' es una equivalencia española aceptada y clara para נבלים. Se mantiene la distinción con כינורות mediante ''liras'' en la segunda mitad del versículo.'
- source_word: וְכִנֹּרוֹת
  english_pob_choice: and lyres
  chosen_spanish: y liras
  alternatives_spanish:
  - y arpas
  - y cítaras
  lexicon: HALOT
  rationale: '''Liras'' preserva la diferenciación instrumental frente a ''arpas''. Aunque ambos términos antiguos son aproximativos, la distinción es importante para reflejar el paralelo hebreo.'
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se mantiene el tratamiento directo del Tetragrámaton como nombre propio, siguiendo la política del proyecto y evitando la sustitución por un título.
  doctrine_reference: 'DOCTRINE.md contested terms: יְהוָה YHWH'
- issue: Tono de תְרוּעָה en una procesión sagrada
  english_pob_reading: shouting
  chosen_spanish_reading: júbilo
  alternative_spanish_readings:
  - clamor
  - aclamación
  - gritos
  rationale: La escena es una procesión cultual de celebración; 'júbilo' expresa el componente de celebración pública sin imponer una interpretación más específica que el hebreo no exige.
  doctrine_reference: Lexical/contextual reading of תְרוּעָה in celebratory worship contexts
translation_notes:
  revision_awareness: Se respetó la revisión del inglés POB que prefirió 'making music' para el segmento instrumental final; por eso el español usa 'haciendo música', que evita restringir el participio a los címbalos y lo aplica naturalmente al conjunto de los instrumentos. También se mantuvo la distinción entre שׁוֹפָר y חֲצֹצְרוֹת.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה.
  - Se mantiene una distinción estable entre 'cuerno' (שׁוֹפָר) y 'trompetas' (חֲצֹצְרוֹת).
  - Se conserva el paralelismo instrumental con 'arpas' y 'liras' como dos términos distintos.
  - '''Júbilo'' traduce el tono celebrativo de תְרוּעָה sin volverlo excesivamente interpretativo.'
