review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del hebreo: anuncia que los justos hollarán a los malvados, porque estos llegarán a ser ceniza bajo sus pies, en el día de la acción decisiva de Yahvé. También conserva correctamente Yahvé y el título divino con sentido transparente. Sin embargo, hay un problema gramatical importante: el hebreo tiene segunda persona plural (''ustedes''), pero el español mezcla una forma verbal de tercera persona plural (''pisotearán'') con posesivo de tercera (''sus pies'').'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero la concordancia de persona necesita corrección para ser fiel y natural. Además, 'en el día en que' es comprensible, aunque 'el día en que' o 'en el día en que' ambos funcionan; el punto principal es corregir la persona. La nota al pie sobre 'impíos' no refleja una alternativa preservada por el inglés ni una ambigüedad nueva necesaria en español, por lo que conviene eliminarla.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: יְהוָה -> ''Yahvé''; צְבָאוֹת -> ''de los Ejércitos''; רְשָׁעִים -> ''los impíos'' es aceptable en registro bíblico; אֵפֶר -> ''ceniza'' es adecuado en singular incontable en español. No hay conflictos teológicos relevantes.'
  issues:
  - severity: high
    issue: Cambio indebido de segunda persona plural a tercera persona plural
    rationale: 'וְעַסּוֹתֶם y el sufijo en רַגְלֵיכֶם son segunda persona plural: ''ustedes hollarán... bajo las plantas de sus pies''. ''Pisotearán'' y ''sus pies'' introducen tercera persona y debilitan la fidelidad al hebreo.'
  - severity: medium
    issue: Nota al pie innecesaria en 'impíos'
    rationale: El inglés no preserva una alternativa para 'the wicked'; la nota española 'O, «los malvados»' no responde a una ambigüedad fuente importante y añade ruido editorial.
  revised_spanish_text: Y ustedes pisotearán a los impíos, porque serán ceniza debajo de las plantas de sus pies el día en que yo actúe, dice Yahvé de los Ejércitos.
  revision_rationale: 'Se corrige la persona gramatical a segunda persona plural para reflejar fielmente el hebreo y mantener coherencia con ''sus pies''. También se elimina la nota al pie innecesaria. El resto del versículo puede mantenerse: ''pisotearán'' expresa bien la imagen de hollar; ''ceniza'' funciona idiomáticamente en español; ''Yahvé de los Ejércitos'' sigue la política terminológica del proyecto.'
