revisions:
- from: Galaad permaneció al otro lado del Jordán[a]; y Dan, ¿por qué se detuvo junto a las naves? Aser se sentó a la orilla del mar y permaneció en sus bahías[b].
  to: Galaad permaneció [a]al otro lado del Jordán; y Dan, ¿por qué moraba entre las naves? Aser se sentó a la orilla del mar y permaneció junto a sus puertos[b].
  rationale: Se reubica la nota [a] para que ancle correctamente la frase locativa; se cambia «se detuvo» por «moraba» para reflejar mejor יָגוּר y la decisión auditada de ‘sojourn’; y se ajusta «bahías» a «puertos» con nota alternativa para representar mejor el probable sentido marítimo de מִפְרָצָיו en español claro y digno.
