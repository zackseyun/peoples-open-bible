translation:
  language: es
  text: 'Solo en Yahvé[a] se dirá de mí: «En él están la justicia[b] y la fuerza»; a él vendrán, y todos los que se enfurecieron contra él serán avergonzados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Solo en Yahvé están la justicia y la fuerza», dirá uno. Tradicionalmente, «Solo en el SEÑOR están la justicia y la fuerza».'
    reason: alternative_reading
  - marker: b
    text: El hebreo צְדָקוֹת está en plural; también puede entenderse como «actos de justicia» o «vindicaciones».
    reason: lexical_alternative
lexical_decisions:
- source_word: אַךְ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Únicamente
  - Solamente
  lexicon: HALOT
  rationale: אַךְ expresa exclusividad y énfasis. «Solo» comunica bien esa restricción en español contemporáneo sin sonar forzado.
- source_word: בַּיהוָה
  english_pob_choice: in the LORD
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - en el SEÑOR
  - en Yahweh
  lexicon: HALOT
  rationale: 'El hebreo usa el nombre divino directamente; conforme al criterio español del proyecto, se conserva «Yahvé» en lugar de una sustitución reverencial genérica. La preposición ב marca esfera o ámbito: «en Yahvé».'
- source_word: לִי
  english_pob_choice: of me
  chosen_spanish: de mí
  alternatives_spanish:
  - para mí
  - acerca de mí
  lexicon: HALOT
  rationale: La construcción לִי אָמַר es compacta. «Se dirá de mí» preserva el elemento pronominal sin resolver de más la sintaxis ambigua.
- source_word: אָמַר
  english_pob_choice: it shall be said
  chosen_spanish: se dirá
  alternatives_spanish:
  - se dice
  - dirá
  lexicon: HALOT
  rationale: Aunque la forma hebrea es perfecta, en este contexto poético funciona de modo reportivo. El pasivo impersonal español reproduce la ambigüedad del sujeto y su fuerza confesional.
- source_word: צְדָקוֹת
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - actos de justicia
  - vindicaciones
  lexicon: HALOT
  rationale: El plural hebreo puede sugerir «actos de justicia» o «vindicación», pero en esta confesión la palabra central se entiende naturalmente como justicia/rectitud. «Justicia» es idiomática y conserva la amplitud semántica.
- source_word: וָעֹז
  english_pob_choice: and strength
  chosen_spanish: y fuerza
  alternatives_spanish:
  - y poder
  - y fortaleza
  lexicon: HALOT
  rationale: עֹז denota fuerza, poder o vigor. «Fuerza» armoniza bien con «justicia» en español y mantiene el paralelismo breve del hebreo.
- source_word: עָדָיו
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - para él
  lexicon: HALOT
  rationale: La preposición señala movimiento hacia Yahvé. «A él» es la forma más directa y natural.
- source_word: יָבֹא
  english_pob_choice: they shall come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrá
  - acudirán
  lexicon: HALOT
  rationale: Aunque la forma es singular, el sentido en el contexto parece colectivo o distributivo. En español, el plural «vendrán» expresa mejor a los que se acercan a Yahvé.
- source_word: וְיֵבֹשׁוּ
  english_pob_choice: shall be put to shame
  chosen_spanish: serán avergonzados
  alternatives_spanish:
  - quedarán avergonzados
  - serán humillados
  lexicon: HALOT
  rationale: בוש en contextos de juicio suele implicar vergüenza pública o deshonra. «Serán avergonzados» preserva esa fuerza resultativa de manera clara.
- source_word: הַנֶּחֱרִים
  english_pob_choice: who were enraged
  chosen_spanish: los que se enfurecieron
  alternatives_spanish:
  - los que ardían de ira
  - los irritados
  lexicon: HALOT
  rationale: El participio de חרה comunica ira intensa, como fuego encendido. «Se enfurecieron» transmite mejor esa intensidad que un simple «se enojaron».
- source_word: בּוֹ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - con él
  - ante él
  lexicon: HALOT
  rationale: Con חרה, la preposición expresa hostilidad dirigida hacia la persona. «Contra él» hace explícito ese matiz adversativo.
theological_decisions:
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Yahweh
  rationale: El texto hebreo usa el Tetragrama directamente. Siguiendo la terminología del proyecto en español, se conserva «Yahvé» como forma principal para no ocultar el nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Sentido de צְדָקוֹת en paralelo con עֹז
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - actos de justicia
  - vindicaciones
  rationale: En el marco confesional del versículo, la expresión no se reduce a justicia forense. «Justicia» mantiene amplitud semántica y suena natural en español bíblico contemporáneo.
  doctrine_reference: DOCTRINE.md Translation philosophy §5; Contested terms analogy on δικαιοσύνη
- issue: Fórmula ambigua לִי אָמַר
  english_pob_reading: it shall be said of me
  chosen_spanish_reading: se dirá de mí
  alternative_spanish_readings:
  - 'se dirá: «Solo en Yahvé hay justicia y fuerza»'
  - dirá de mí
  rationale: La sintaxis hebrea es comprimida y admite varias lecturas. La opción escogida conserva la ambigüedad reportiva sin imponer innecesariamente un hablante explícito; por eso se mantiene una nota alternativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el estado sigue en alta concordancia con el audit trail inglés, y la decisión principal pendiente en español es conservar el nombre divino como «Yahvé» y reflejar la ambigüedad de לִי אָמַר mediante un pasivo impersonal.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma estándar del Tetragrama en el texto principal, conforme al criterio del proyecto en español.
  - Se eligió «justicia» para צְדָקוֹת, pero se preserva en nota la alternativa plural «actos de justicia» / «vindicaciones».
  - «Serán avergonzados» conserva el matiz de deshonra judicial de בוש.
  - La puntuación sigue la sintaxis española natural sin añadir contenido no sustentado por el hebreo.
