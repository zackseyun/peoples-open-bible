translation:
  language: es
  text: Si camino en medio de la angustia[a], tú me mantienes con vida[b]; extiendes tu mano contra la ira de mis enemigos[c], y tu diestra me salva.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Aunque camino en medio de la angustia». El hebreo אִם puede introducir una cláusula con fuerza condicional o concesiva según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «me reavivas» / «preservas mi vida». El verbo hebreo puede expresar revivir o preservar la vida.
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «contra/sobre la ira de mis enemigos». אַף («nariz») es un modismo hebreo para la ira o el furor.'
    reason: cultural_note
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Aunque
  - Cuando
  lexicon: HALOT
  rationale: La partícula hebrea puede tener fuerza condicional o concesiva según el contexto. En español, «si» conserva esa apertura y permite que el lector perciba la posible lectura concesiva sin forzarla en el texto principal.
- source_word: אֵלֵךְ
  english_pob_choice: I walk
  chosen_spanish: camino
  alternatives_spanish:
  - voy
  - paso
  lexicon: HALOT
  rationale: הלך en qal imperfecto primera común singular expresa literalmente «ir/caminar». «Camino» preserva la imagen concreta y suena natural en español poético.
- source_word: בְּקֶרֶב
  english_pob_choice: in the midst of
  chosen_spanish: en medio de
  alternatives_spanish:
  - en
  - entre
  - a través de
  lexicon: HALOT
  rationale: קֶרֶב denota el interior o el centro de algo. «En medio de» mantiene la fuerza espacial de la imagen mejor que un simple «en».
- source_word: צָרָה
  english_pob_choice: trouble
  chosen_spanish: angustia
  alternatives_spanish:
  - aflicción
  - afán
  - tribulación
  lexicon: HALOT
  rationale: צָרָה puede abarcar aflicción, angustia o dificultad. «Angustia» comunica bien la presión del peligro en un registro bíblico claro y natural.
- source_word: תְּחַיֵּנִי
  english_pob_choice: you preserve my life
  chosen_spanish: preservas mi vida
  alternatives_spanish:
  - me reavivas
  - me mantienes con vida
  lexicon: HALOT
  rationale: El piel de חיה puede significar hacer vivir, revivir o conservar con vida. Dado el contexto de peligro y enemigos, «preservas mi vida» refleja mejor la preservación bajo amenaza que una lectura más estrecha de reanimación.
- source_word: עַל אַף אֹיְבַי
  english_pob_choice: against the anger of my enemies
  chosen_spanish: contra la ira de mis enemigos
  alternatives_spanish:
  - contra el enojo de mis enemigos
  - sobre la ira de mis enemigos
  - contra mis enemigos
  lexicon: HALOT
  rationale: אַף literalmente es «nariz» y por idiomático significa ira o furor. «Contra la ira de mis enemigos» conserva la fuerza del modismo y evita aplanarlo a «contra mis enemigos».
- source_word: תִּשְׁלַח יָדֶךָ
  english_pob_choice: you stretch out your hand
  chosen_spanish: extiendes tu mano
  alternatives_spanish:
  - tiendes tu mano
  - alargas tu mano
  - mandas tu mano
  lexicon: HALOT
  rationale: La idiomática de enviar/estirar la mano expresa intervención activa. «Extiendes tu mano» suena natural en español y conserva la imagen antropomórfica.
- source_word: וְתוֹשִׁיעֵנִי
  english_pob_choice: and your right hand saves me
  chosen_spanish: y tu diestra me salva
  alternatives_spanish:
  - y tu mano derecha me salva
  - y me rescata tu diestra
  - y tu diestra me libra
  lexicon: HALOT
  rationale: ישע en hifil significa salvar o librar. «Me salva» es directo y amplio; «diestra» preserva la imagen hebrea de poder y socorro.
- source_word: יְמִינֶךָ
  english_pob_choice: your right hand
  chosen_spanish: tu diestra
  alternatives_spanish:
  - tu mano derecha
  lexicon: HALOT
  rationale: «Diestra» es un equivalente español digno y bíblico para «right hand», con el valor simbólico de fuerza salvadora. Se mantiene la imagen corporal del hebreo.
theological_decisions:
- issue: Fuerza de la cláusula con אִם
  english_pob_reading: If I walk in the midst of trouble
  chosen_spanish_reading: Si camino en medio de la angustia
  alternative_spanish_readings:
  - Aunque camino en medio de la angustia
  - Cuando camino en medio de la angustia
  rationale: El hebreo permite lectura condicional o concesiva. En el texto principal se conserva «si», y la nota deja abierta la lectura «aunque», sin cerrar indebidamente la ambigüedad.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de תְּחַיֵּנִי
  english_pob_reading: you preserve my life
  chosen_spanish_reading: preservas mi vida
  alternative_spanish_readings:
  - me reavivas
  - me mantienes con vida
  rationale: En el contexto de angustia y enemigos, la acción divina se entiende mejor como preservación de la vida en peligro presente, no como una espiritualización abstracta del verbo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza de עַל אַף אֹיְבַי
  english_pob_reading: you stretch out your hand against the anger of my enemies
  chosen_spanish_reading: extiendes tu mano contra la ira de mis enemigos
  alternative_spanish_readings:
  - extiendes tu mano contra mis enemigos
  - extiendes tu mano sobre la ira de mis enemigos
  rationale: Se mantiene el modismo hebreo para no borrar el objeto semántico de אַף («ira/furor»). La mano de Yahvé se presenta como oposición efectiva al furor hostil.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente sin cambios sustanciales; el inglés POB y la verificación cruzada muestran alto acuerdo, así que no se introdujeron variantes textuales nuevas fuera de las decisiones lexicográficas y de estilo en español.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el nombre divino cuando corresponde al flujo de la POB, aunque en este versículo el texto no lo explicita.
  - Se preservó la metáfora corporal de la «mano» y la «diestra» para no desactivar el paralelismo hebreo.
  - «Angustia» se usó para צָרָה por claridad y naturalidad en español bíblico contemporáneo.
