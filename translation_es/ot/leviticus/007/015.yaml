revisions:
- from: Y la carne del sacrificio de su ofrenda de agradecimiento, su ofrenda de paz[a], se comerá en el día de su ofrenda; no dejará nada de ella hasta la mañana.
  to: Y la carne del sacrificio de su ofrenda de paz de acción de gracias[a] se comerá el día de su ofrenda; no dejará nada de ella hasta la mañana.
  rationale: Se corrige la representación de la cadena constructa hebrea como una sola categoría sacrificial, se mejora la naturalidad del español cultual con «acción de gracias», y se mantiene la alternativa documentada «comunión» solo en nota. No se requiere adjudicación superior porque la corrección es clara desde el hebreo y la auditoría inglesa.
