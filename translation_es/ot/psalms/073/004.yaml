translation:
  language: es
  text: Porque no tienen dolores hasta la muerte[a], y su cuerpo está robusto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tienen dolores en su muerte». El hebreo es difícil, y también puede entenderse como una referencia específica a una muerte sin dolor, en vez de a la ausencia de sufrimiento hasta la muerte.'
    reason: alternative_reading
  - marker: b
    text: 'O: «su cuerpo está sano» o «su vientre está gordo». El hebreo usa una imagen corporal concreta de robustez.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Aquí introduce la explicación del juicio del salmista sobre los impíos; en español, 'Porque' conserva bien la fuerza causal/explanatoria sin sonar arcaico.
- source_word: אֵין
  english_pob_choice: have no
  chosen_spanish: no tienen
  alternatives_spanish:
  - no hay
  - carecen de
  lexicon: HALOT
  rationale: El contexto implícito es el de los impíos; 'no tienen' reproduce naturalmente la negación de posesión/existencia aplicada al sujeto tácito en español.
- source_word: חַרְצֻבּוֹת
  english_pob_choice: pangs
  chosen_spanish: angustias
  alternatives_spanish:
  - padecimientos
  - dolores
  - nudos
  lexicon: HALOT
  rationale: El término es difícil y el POB inglés opta por un dolor corporal/aflictivo. 'Angustias' comunica la idea de aflicciones dolorosas de forma legible en español, sin decidir de manera excesiva por un matiz puramente físico donde el hebreo sigue siendo incierto.
- source_word: לְמוֹתָם
  english_pob_choice: until death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - en su muerte
  - al morir
  lexicon: HALOT
  rationale: Sigue la lectura adoptada por el POB inglés, que entiende la frase como ausencia de sufrimiento hasta el momento de la muerte; 'hasta la muerte' mantiene esa sintaxis y sentido.
- source_word: וּבָרִיא
  english_pob_choice: their body is fat
  chosen_spanish: su cuerpo está robusto
  alternatives_spanish:
  - su cuerpo está gordo
  - su cuerpo está sano
  - su vientre está gordo
  lexicon: HALOT
  rationale: El hebreo presenta una imagen concreta de robustez corporal. 'Robusto' conserva la fuerza semántica de salud/solidez con dignidad en español, evitando una literalidad que podría sonar peyorativa o demasiado cruda.
- source_word: אוּלָם
  english_pob_choice: their body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su vientre
  - su fortaleza
  lexicon: HALOT
  rationale: El sustantivo puede aludir al cuerpo o al vientre; 'su cuerpo' es lo suficientemente amplio y sigue la decisión inglesa de traducir la imagen corporal de manera comprensible para el lector moderno.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que sustituyó 'pains' por 'pangs' para acercarse más al valor léxico del hebreo, manteniendo el resto del sentido y la misma ambigüedad interpretativa del hemistiquio.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto solo cuando el texto lo requiera; este versículo no contiene el Tetragrámaton.
  - '''Mesías''/''Cristo'' no aplican aquí.'
  - Se conserva una imagen corporal concreta ('cuerpo') en lugar de una paráfrasis moralizante, para no borrar la tensión lexical del hebreo.
  - La puntuación y la cadencia buscan ser publicables en español sin perder el paralelismo poético del hebreo.
