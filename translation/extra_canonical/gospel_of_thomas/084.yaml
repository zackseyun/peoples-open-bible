    ϣⲁⲣⲉⲧⲛ̄ⲣⲁϣⲉ uses the aorist (habitual) prefix ϣⲁⲣⲉ-, expressing a general truth
    (''you rejoice''), not the future tense (''you will rejoice'', which would be
    ⲧⲉⲧⲛⲁⲣⲁϣⲉ). Finally, ''when you should see'' for the conditional ⲉⲧⲉⲧⲛ̄ϣⲁⲛⲛⲁⲩ
    is unnecessarily clunky; ''when you see'' captures the conditional force naturally.
