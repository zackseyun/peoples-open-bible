translation:
  language: es
  text: Y tú, y tus hijos y tus hijas contigo, comerán la pechuga de la ofrenda mecida[a] y el muslo de la contribución[b] en un lugar limpio, porque les han sido dados como tu porción y la porción de tus hijos, de los sacrificios de las ofrendas de paz[c] de los hijos de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la pechuga de la ofrenda de presentación'. El término hebreo se refiere a la porción que era mecida ritualmente delante de Yahvé.
    reason: lexical_alternative
  - marker: b
    text: O 'el muslo de la ofrenda alzada'. El término hebreo para 'contribución' es literalmente algo levantado o apartado como porción sacerdotal.
    reason: lexical_alternative
  - marker: c
    text: '''Ofrendas de paz'' también puede verterse ''ofrendas de comunión'', aunque el hebreo puede sugerir un sentido más amplio de paz, plenitud o bienestar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֲזֵה הַתְּנוּפָה
  english_pob_choice: the breast of the wave offering
  chosen_spanish: el pecho de la ofrenda mecida
  alternatives_spanish:
  - el pecho de la ofrenda de presentación
  - el pecho que fue mecido
  lexicon: HALOT
  rationale: חֲזֶה es la porción del animal correspondiente al pecho, y תְּנוּפָה alude al gesto ritual de mecer/presentar ante Yahvé. En español, "ofrenda mecida" conserva el valor técnico y evita una traducción demasiado explicativa.
- source_word: שׁוֹק הַתְּרוּמָה
  english_pob_choice: the thigh of the contribution
  chosen_spanish: la pierna de la ofrenda alzada
  alternatives_spanish:
  - la pierna de la contribución
  - el muslo de la ofrenda alzada
  lexicon: HALOT
  rationale: שׁוֹק designa la pierna o parte de la pierna del animal; en español "pierna" resulta más natural que "muslo" aquí. תְּרוּמָה implica algo levantado o apartado; "ofrenda alzada" refleja mejor esa fuerza literal que "contribución".
- source_word: תֹּאכְלוּ
  english_pob_choice: shall eat
  chosen_spanish: comerán
  alternatives_spanish:
  - podrán comer
  - deberán comer
  lexicon: HALOT
  rationale: El imperfecto hebreo tiene aquí valor instructivo. "Comerán" mantiene la forma directiva sin introducir una perífrasis más interpretativa.
- source_word: בְּמָקוֹם טָהוֹר
  english_pob_choice: in a clean place
  chosen_spanish: en un lugar limpio
  alternatives_spanish:
  - en un lugar puro
  - en un lugar ritualmente limpio
  lexicon: HALOT
  rationale: En contexto levítico, טָהוֹר refiere a pureza ritual. "Lugar limpio" es breve y natural en español, mientras que el matiz ritual queda determinado por el contexto sacrificial.
- source_word: אַתָּה וּבָנֶיךָ וּבְנֹתֶיךָ אִתָּךְ
  english_pob_choice: you, and your sons and your daughters with you
  chosen_spanish: ustedes, y sus hijos y sus hijas con ustedes
  alternatives_spanish:
  - usted, y sus hijos y sus hijas con usted
  - tú, y tus hijos y tus hijas contigo
  lexicon: HALOT
  rationale: El hebreo incluye explícitamente hijos e hijas y añade la idea de acompañamiento. Se eligió un español reverente de segunda persona plural para la lectura pública, preservando el sentido inclusivo dentro del núcleo familiar sin neutralizar el término filial.
- source_word: חָקְךָ וְחָק בָּנֶיךָ
  english_pob_choice: your portion and your sons’ portion
  chosen_spanish: su porción y la porción de sus hijos
  alternatives_spanish:
  - su debido y el debido de sus hijos
  - su cuota y la cuota de sus hijos
  lexicon: HALOT
  rationale: En este contexto sacrificial, חֹק se refiere a la asignación prescrita del sacerdote, no principalmente a un estatuto legal. "Porción" comunica bien la parte asignada y preserva el sentido cultual.
- source_word: נִתְּנוּ
  english_pob_choice: have been given
  chosen_spanish: han sido dados
  alternatives_spanish:
  - les han sido dados
  - fueron dados
  lexicon: HALOT
  rationale: El pasivo perfecto señala una dádiva ya establecida. "Han sido dados" conserva ese estado resultante sin perder la referencia al hecho consumado.
- source_word: מִזִּבְחֵי שַׁלְמֵי
  english_pob_choice: from the sacrifices of the peace offerings
  chosen_spanish: de los sacrificios de las ofrendas de paz
  alternatives_spanish:
  - de los sacrificios de las ofrendas de bienestar
  - de los sacrificios de las ofrendas de comunión
  lexicon: HALOT
  rationale: שְׁלָמִים se traduce aquí con el término tradicional "ofrendas de paz", que en español bíblico comunica mejor el rango semántico amplio de paz, plenitud y bienestar que una equivalencia más restringida.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Se mantiene la fórmula filial explícita del hebreo, en línea con la política del proyecto de preservar la forma masculina plural cuando es parte del idioma bíblico y no una mera referencia genérica neutralizada.
theological_decisions:
- issue: Designación de los sacrificios שְׁלָמִים
  english_pob_reading: peace offerings
  chosen_spanish_reading: ofrendas de paz
  alternative_spanish_readings:
  - ofrendas de comunión
  - ofrendas de bienestar
  rationale: Se conserva la designación tradicional porque transmite el término técnico sacrificial sin reducirlo a una sola idea relacional. La expresión mantiene la amplitud de paz/plenitud/bienestar que el hebreo puede sugerir.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tratamiento de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: La fuente usa una fórmula masculina plural establecida. Se preserva en español por fidelidad formal y por la política de precisión de género del proyecto, sin negar su referencia corporativa al pueblo.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de ‘But’ a ‘And’ para reflejar más directamente la conjunción hebrea. La redacción española sigue ese valor simple de coordinación con ‘Y’, y conserva la estructura legal-sacrificial del versículo sin añadir contraste no presente en el fuente.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y publicable, evitando calcos duros donde el español exigía una solución natural.
  - 'Se preservó la terminología sacrificial técnica con equivalentes consistentes: ofrenda mecida, ofrenda alzada y ofrendas de paz.'
  - Se respetó la inclusión explícita de hijos e hijas y la fórmula filial ‘hijos de Israel’ como parte del estilo bíblico del texto fuente.
