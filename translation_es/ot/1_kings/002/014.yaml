translation:
  language: es
  text: 'Entonces él dijo[a]: «Tengo algo que decirte». Y ella dijo: «Habla».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «Una palabra / asunto hay para mí hacia ti». El giro idiomático significa: «Tengo algo que decirte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then he said
  chosen_spanish: Entonces él dijo
  alternatives_spanish:
  - Y él dijo
  - Luego dijo
  lexicon: HALOT
  rationale: El wayyiqtol introduce la acción narrativa siguiente. «Entonces» conserva la secuencia sin sonar forzado en español; se mantiene el sujeto explícito por claridad en el diálogo.
- source_word: דָּבָר
  english_pob_choice: something
  chosen_spanish: algo
  alternatives_spanish:
  - una palabra
  - un asunto
  - una cosa
  lexicon: HALOT
  rationale: 'El hebreo dice literalmente «una palabra / asunto / cosa», pero en la idiomática דָּבָר לִי אֵלָיִךְ el sentido es indefinido: «tengo algo que decirte». «Algo» reproduce bien esa indeterminación.'
- source_word: לִי
  english_pob_choice: I have
  chosen_spanish: tengo
  alternatives_spanish:
  - me es
  - hay para mí
  lexicon: HALOT
  rationale: La construcción hebrea expresa posesión o intención personal; en español se rinde de forma natural con «tengo», como en la equivalencia auditada inglesa «I have something to say to you».
- source_word: אֵלָיִךְ
  english_pob_choice: to you
  chosen_spanish: que decirte
  alternatives_spanish:
  - para ti
  - a ti
  lexicon: HALOT
  rationale: La dirección hacia la destinataria queda integrada naturalmente en el infinitivo complementario «decirte», evitando una repetición pesada y manteniendo la fuerza del destinatario femenino singular.
- source_word: וַתֹּאמֶר
  english_pob_choice: And she said
  chosen_spanish: Y ella dijo
  alternatives_spanish:
  - Entonces ella dijo
  - Y respondió
  lexicon: HALOT
  rationale: Se conserva la simple continuación narrativa del hebreo. «Ella» se mantiene para evitar ambigüedad en una línea breve de diálogo.
- source_word: דַּבֵּר
  english_pob_choice: Speak
  chosen_spanish: Habla
  alternatives_spanish:
  - Hablad
  - Di
  lexicon: HALOT
  rationale: El imperativo masculino singular de דָּבַר se traduce de forma breve y directa. «Habla» es el equivalente idiomático más natural en español.
translation_notes:
  revision_awareness: El texto inglés auditado mantiene la equivalencia óptima y una nota que explica el hebraísmo idiomático. La versión española conserva esa misma tensión entre literalidad y naturalidad, sin perder la referencia al original.
  spanish_consistency_notes:
  - Se usa «algo» para דָּבָר conforme al valor idiomático, no «palabra» en el cuerpo del texto.
  - Se preserva el matiz de secuencia narrativa con «Entonces» y la simplicidad del diálogo con verbos de habla directos.
  - La nota al pie mantiene visible el hebraísmo subyacente para auditar la decisión léxica.
