translation:
  language: es
  text: Y un hombre ama más a su propia esposa que a su padre y a su madre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πλεῖον
  english_pob_choice: more
  chosen_spanish: más
  alternatives_spanish:
  - en mayor grado
  - más intensamente
  lexicon: LSJ
  rationale: El comparativo griego expresa grado; en español, «más» reproduce esa relación de manera natural y fiel en combinación con el verbo «ama».
- source_word: ἀγαπᾷ
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - ama con amor
  - quiere
  lexicon: BDAG
  rationale: «Amar» mantiene el sentido directo de ἀγαπάω sin agregar matices no presentes en el texto.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: Aunque el sustantivo puede ser genérico, el contexto inmediato contrasta al hombre con su esposa, padre y madre; «un hombre» conserva ese marco de manera precisa.
- source_word: τὴν ἰδίαν γυναῖκα
  english_pob_choice: his own wife
  chosen_spanish: su propia esposa
  alternatives_spanish:
  - su esposa
  - su mujer
  lexicon: BDAG
  rationale: γυνή aquí significa «esposa»; «propia» preserva el énfasis de ἰδίαν. Se evita «mujer» por ambigüedad en español moderno.
- source_word: μᾶλλον ἢ
  english_pob_choice: more than
  chosen_spanish: más que
  alternatives_spanish:
  - antes que
  - en lugar de
  lexicon: BDAG
  rationale: La construcción comparativa expresa preferencia de grado. «Más que» es la equivalencia más clara y directa en español.
- source_word: τὸν πατέρα καὶ τὴν μητέρα
  english_pob_choice: his father and mother
  chosen_spanish: a su padre y a su madre
  alternatives_spanish:
  - a su padre y madre
  - a sus padres
  lexicon: BDAG
  rationale: El griego menciona los dos sustantivos en singular; en español se conserva la pareja explícita y se añade la referencia posesiva implícita por contexto. Se evita «sus padres» porque suaviza la estructura del original.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones; la versión española mantiene la misma relación comparativa y la misma estructura familiar explícita, sin necesidad de notas textuales adicionales.
  spanish_consistency_notes:
  - Se usa «esposa» para γυναῖκα en sentido conyugal, coherente con el contexto comparativo con padre y madre.
  - Se conserva el comparativo de grado («más que») sin convertirlo en una exclusión absoluta.
  - El artículo y la posesión se acomodan al español para reflejar el posesivo implícito del griego sin sobretraducir.
