translation:
  language: es
  text: 'Noé engendró tres hijos varones: Sem, Cam y Jafet.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיּוֹלֶד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - tuvo
  lexicon: HALOT
  rationale: El hebreo en forma causativa narrativa expresa que Noé fue el padre de los hijos nombrados. «Engendró» conserva el sentido paternal y la formalidad del registro bíblico en español; «tuvo» sería más vago y «fue padre de» más explicativo que literal.
- source_word: שְׁלֹשָׁה בָנִים
  english_pob_choice: three sons
  chosen_spanish: tres hijos
  alternatives_spanish:
  - tres hijos varones
  - tres varones
  lexicon: HALOT
  rationale: Aunque בָנִים significa literalmente «hijos/sons», en español «hijos» comunica naturalmente la relación filial sin perder el referente masculino ya explícito por los nombres propios. «Hijos varones» sería más explícito pero más pesado; «tres varones» omitiría la filiación.
- source_word: אֶת שֵׁם אֶת חָם וְאֶת יָפֶת
  english_pob_choice: Shem, Ham, and Japheth
  chosen_spanish: Sem, Cam y Jafet
  alternatives_spanish:
  - Shem, Ham y Jafet
  - Sem, Jam y Jafet
  lexicon: HALOT
  rationale: 'Se conservan las formas transliteradas usuales en español bíblico: «Sem», «Cam» y «Jafet». Los marcadores אֶת no se reflejan en la superficie española porque funcionan como partículas de objeto directo en hebreo y no tienen equivalente idiomático aquí.'
- source_word: נֹחַ
  english_pob_choice: Noah
  chosen_spanish: Noé
  alternatives_spanish:
  - Noah
  lexicon: HALOT
  rationale: Se usa la forma española estándar del nombre propio. Mantiene la inteligibilidad y la tradición de uso en español bíblico.
translation_notes:
