  yaml_path: translation/ot/1_kings/019/004.yaml
  text: But he himself went a day's journey into the wilderness[a], and came and sat down under a broom tree. And he asked that he might die, and said, “It is enough; now, Yahweh, take my life[b], for I am no better than my fathers.”
