  - severity: low
    issue: «las naciones que hubo antes de ellos» suena poco natural
    rationale: Preserva la anterioridad temporal, pero en español fluido bíblico resulta más natural «las naciones anteriores» o «las naciones que los precedieron».
  - severity: low
