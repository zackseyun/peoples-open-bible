translation:
  language: es
  text: 'Y de los hijos de Benjamín: Sallu, hijo de Mesulam[a], hijo de Hodavías[c][b], hijo de Hassenuá.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «de los hijos de Benjamín». Aquí se entiende como referencia a los miembros de la tribu de Benjamín.'
    reason: lexical_alternative
