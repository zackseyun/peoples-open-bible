translation:
  language: es
  text: El bien de la vida es un número limitado de días[b][a], pero el bien del buen nombre es días sin número.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «y un buen nombre permanecerá para siempre».'
    reason: alternative_reading
  - marker: b
    text: «Nombre» aquí lleva el sentido de reputación u honor recordado, no solo de un nombre personal.
    reason: lexical_alternative
lexical_decisions:
- source_word: טובת
  english_pob_choice: The good of
  chosen_spanish: El bien de
  alternatives_spanish:
  - La bondad de
  - El beneficio de
  - Lo bueno de
  lexicon: HALOT
  rationale: Conserva la estructura paralela del hebreo y el tono proverbial sin introducir una comparación explícita que el hebreo no expresa de forma directa.
- source_word: חי
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vivir
  - la existencia
  lexicon: HALOT
  rationale: En este contexto funciona como sustantivo abstracto y corresponde bien al paralelo griego ζωῆς.
- source_word: ימי מספר
  english_pob_choice: a limited number of days
  chosen_spanish: un número limitado de días
  alternatives_spanish:
  - días contables
  - pocos días
  - días que se pueden contar
  lexicon: HALOT
  rationale: Reproduce el sentido idiomático de 'days of number' como días contables o limitados, en español natural y claro.
- source_word: שם
  english_pob_choice: name
  chosen_spanish: buen nombre
  alternatives_spanish:
  - nombre
  - reputación
  - renombre
  lexicon: HALOT
  rationale: Aquí 'nombre' lleva con naturalidad la idea de reputación; en español, 'buen nombre' hace explícita la valoración positiva implícita en el contexto y evita sonar demasiado abstracto.
- source_word: ימי אין מספר
  english_pob_choice: days without number
  chosen_spanish: días sin número
  alternatives_spanish:
  - días innumerables
  - días sin contar
  - para siempre
  lexicon: HALOT
  rationale: Sigue de cerca la imagen hebrea de 'días sin número' y deja abierta la resonancia interpretativa del griego, que entiende el sentido como permanencia indefinida.
theological_decisions:
- issue: Relación entre el hebreo y la expansión interpretativa griega
  english_pob_reading: 'The good of a name is days without number, with a footnote noting the Greek: ''and a good name will remain forever.'''
  chosen_spanish_reading: Mantener en el cuerpo del texto la imagen hebrea de duración incontable, y señalar la lectura griega como alternativa interpretativa.
  alternative_spanish_readings:
  - y un buen nombre permanecerá para siempre
  - y el buen nombre perdurará para siempre
  rationale: Como el hebreo está conservado y es claro, la base principal sigue la formulación hebrea. La versión griega explicita la duración como permanencia eterna; esa tensión se preserva en nota sin borrar la imagen original.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde Sirácides se conserva; usar el paralelo griego como dato real de control y de matiz interpretativo.'
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente, que no indicó cambios necesarios, y mantiene la preferencia por el hebreo con la nota de apoyo al griego.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; este versículo no lo contiene.
  - '''Buen nombre'' conserva el valor semántico de reputación, coherente con el auditable inglés POB.'
  - La puntuación mantiene el paralelismo proverbial y la oposición entre duración limitada y duración sin número.
