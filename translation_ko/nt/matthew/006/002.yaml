lexical_decisions:
- source_word: ὑποκριταὶ
  english_pob_choice: hypocrites
  chosen_korean: 위선자들
  alternatives_korean:
  - 외식하는 자들
  - 가식자들
  lexicon: BDAG
  rationale: 한국 전통의 「외식하는 자」는 모호하여 현대 독자에게 그 의미가 잘 전달되지 않는다. 「위선자」를 채택해 본문의 신랄한 비판을 명확히 한다.
- source_word: ἀπέχουσιν τὸν μισθὸν αὐτῶν
