translation:
  language: es
  text: Los hijos de Efraín[a], armados con arcos, retrocedieron el día de la batalla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los efraimitas, armados con arcos, retrocedieron el día de la batalla». El hebreo emplea una frase participial comprimida que puede expresarse de más de una manera natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי אֶפְרַיִם
  english_pob_choice: The sons of Ephraim
  chosen_spanish: Los hijos de Efraín
  alternatives_spanish:
  - Los hijos de Efraím
  - Los efraimitas
  lexicon: HALOT
  rationale: Con בני seguido de un nombre tribal, la imagen hebrea es genealógica e idiomática. «Hijos de Efraín» conserva mejor esa forma concreta que la etnónima más interpretativa «efraimitas».
- source_word: נוֹשְׁקֵי
  english_pob_choice: armed
  chosen_spanish: armados
  alternatives_spanish:
  - equipados
  - provistos
  lexicon: HALOT
  rationale: La raíz aquí expresa preparación/armamento militar. «Armados» es natural en español y mantiene la idea de disposición bélica sin añadir contenido ajeno.
- source_word: רוֹמֵי קָשֶׁת
  english_pob_choice: armed with bows
  chosen_spanish: con arcos
  alternatives_spanish:
  - que lanzaban el arco
  - arqueros
  lexicon: HALOT
  rationale: El hebreo es una expresión comprimida relacionada con el arco. En español, «con arcos» refleja directamente el objeto del armamento y evita la redundancia de repetir la idea de arquero ya contenida en «armados».
- source_word: הָפְכוּ
  english_pob_choice: turned back
  chosen_spanish: retrocedieron
  alternatives_spanish:
  - volvieron atrás
  - se volvieron
  lexicon: HALOT
  rationale: El verbo comunica reversión o retirada. «Retrocedieron» conserva el sentido militar de repliegue sin sobreinterpretar la acción más allá del contexto.
- source_word: בְּיוֹם קְרָב
  english_pob_choice: on the day of battle
  chosen_spanish: el día de la batalla
  alternatives_spanish:
  - en el día de la batalla
  - el día del combate
  lexicon: HALOT
  rationale: La frase temporal es directa. «El día de la batalla» suena idiomático en español y conserva la solemnidad del hebreo.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado de «armed archers» a «armed with bows» para reflejar con más precisión el hebreo. La versión española sigue esa revisión y evita la redundancia de una traducción como «arqueros armados».
  spanish_consistency_notes:
  - Se mantiene «Efraín» como nombre tribal propio y no se sustituye por un etnónimo más interpretativo.
  - Se conserva el paralelismo breve y directo del hebreo con una estructura española igualmente concisa.
  - «Retrocedieron» fue preferido por su claridad militar; no se intensifica a «huyeron» porque el hebreo solo exige retirada o repliegue.
