revisions:
- from: Y Judith dijo a su esclava que se quedara fuera de su alcoba y vigilara su salida[a], como en los días anteriores; pues ella había dicho que saldría para su oración[b]. Y habló a Bagoas según estas palabras.
  to: Y Judith le dijo a su esclava que estuviera fuera de su alcoba[a] y vigilara su salida, como en los días anteriores; pues dijo que saldría para su oración[b]. Y habló a Bagoas según estas palabras.
  rationale: Se corrigió la colocación de la nota léxica sobre κοιτῶνος para que ancle en 'alcoba', se ajustó στῆναι a 'estuviera' para reflejar mejor la instrucción de estar apostada afuera, y se simplificó 'había dicho' a 'dijo' para corresponder mejor a ἔφη. El resto del texto se mantiene por su buena fidelidad y legibilidad.
