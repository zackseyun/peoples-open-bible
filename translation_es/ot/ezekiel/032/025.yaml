translation:
  language: es
  text: Entre los caídos le prepararon un lecho, con toda su multitud[a]; sus tumbas están alrededor de ella[b]. Todos ellos son incircuncisos, caídos a espada, porque su terror fue puesto en la tierra de los vivientes.[c] Así llevaron su deshonra con los que descienden a la fosa; ella fue puesta entre los caídos[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo cambia de femenino («ella/su») a masculino («él/suyo») en medio del versículo, probablemente alternando entre la nación personificada y su figura representativa. La traducción principal mantiene la lectura femenina para fluidez, pero conserva aquí el cambio para que quede auditable.
    reason: alternative_reading
  - marker: b
    text: O «sus tumbas están alrededor de él», si se conserva el sufijo masculino del hebreo en esta frase.
    reason: alternative_reading
  - marker: c
    text: O «porque extendieron su terror en la tierra de los vivientes». El hebreo literalmente dice «porque su terror fue puesto en la tierra de los vivientes».
    reason: lexical_alternative
  - marker: d
    text: O «él fue puesto entre los caídos», si el singular final se entiende como referencia a un representante masculino y no a la nación personificada como femenina.
    reason: alternative_reading
lexical_decisions:
- source_word: בְּתוֹךְ חֲלָלִים
  english_pob_choice: Among the slain
  chosen_spanish: Entre los muertos
  alternatives_spanish:
  - En medio de los muertos
  - Entre los muertos caídos
  lexicon: HALOT
  rationale: En español, 'entre los muertos' comunica de manera natural la ubicación funeraria que el hebreo expresa con בְּתוֹךְ. 'Muertos' evita un calco pesado y, en este contexto, mantiene el valor de víctimas de guerra que el inglés POB resolvió con 'slain'.
- source_word: נָתְנוּ מִשְׁכָּב לָהּ
  english_pob_choice: they made a bed for her
  chosen_spanish: le hicieron una cama a ella
  alternatives_spanish:
  - le prepararon un lecho
  - le dieron una cama
  lexicon: HALOT
  rationale: La frase conserva la imagen concreta de 'hacer/preparar una cama' sin convertirla en una paráfrasis general de sepultura. 'Le hicieron una cama' sigue la fuerza idiomática y permite la personificación del personaje femenino.
- source_word: בְּכָל הֲמוֹנָהּ
  english_pob_choice: with all her multitude
  chosen_spanish: con toda su multitud
  alternatives_spanish:
  - con toda su muchedumbre
  - con toda su gente
  lexicon: HALOT
  rationale: '''Multitud'' reproduce bien הָמוֹן como masa de gente asociada con la nación/personificación. ''Muchedumbre'' es posible, pero ''multitud'' suena más sobrio y bíblico sin perder claridad.'
- source_word: סְבִיבוֹתָיו קִבְרֹתֶהָ
  english_pob_choice: her graves are all around her
  chosen_spanish: sus tumbas están alrededor de ella
  alternatives_spanish:
  - sus sepulcros están alrededor de ella
  - las tumbas de ella están alrededor de ella
  lexicon: HALOT
  rationale: Se opta por neutralizar la oscilación de género del hebreo en la línea central, porque el texto español fluye mejor así y el resto del versículo ya conserva la personificación femenina. 'Tumbas' es claro y 'alrededor de ella' preserva el referente femenino.
- source_word: כֻּלָּם עֲרֵלִים
  english_pob_choice: All of them are uncircumcised
  chosen_spanish: Todos ellos son incircuncisos
  alternatives_spanish:
  - Todos son incircuncisos
  - Todos ellos están sin circuncidar
  lexicon: HALOT
  rationale: '''Incircuncisos'' mantiene el término bíblico explícito y su peso de impureza/covenantalidad. Se evita suavizarlo con una perífrasis, en línea con la lectura de juicio del pasaje.'
- source_word: חַלְלֵי חֶרֶב
  english_pob_choice: slain by the sword
  chosen_spanish: muertos a espada
  alternatives_spanish:
  - caídos a espada
  - muertos por la espada
  lexicon: HALOT
  rationale: '''Muertos a espada'' es una equivalencia natural en español y conserva la fórmula bélica del hebreo. Es más idiomática que una traducción demasiado literal y más sobria que ''caídos''.'
- source_word: כִּי נִתַּן חִתִּיתָם
  english_pob_choice: because their terror was set
  chosen_spanish: porque su terror fue puesto
  alternatives_spanish:
  - porque su terror fue establecido
  - porque su terror fue impuesto
  lexicon: HALOT
  rationale: '''Fue puesto'' preserva el pasivo impersonal del hebreo, que el POB decidió no convertir en una frase activa interpretativa. ''Fue establecido'' o ''impuesto'' explicarían más de lo que el texto dice.'
- source_word: בְּאֶרֶץ חַיִּים
  english_pob_choice: in the land of the living
  chosen_spanish: en la tierra de los vivientes
  alternatives_spanish:
  - en la tierra de los vivos
  - en la tierra de la vida
  lexicon: HALOT
  rationale: '''Tierra de los vivientes'' es la forma tradicional y precisa para este contraste con la muerte/Seol. Evita una expresión más abstracta o menos bíblica.'
- source_word: וַיִּשְׂאוּ כְלִמָּתָם
  english_pob_choice: So they bore their disgrace
  chosen_spanish: Así llevaron su deshonra
  alternatives_spanish:
  - Así cargaron su vergüenza
  - Así soportaron su humillación
  lexicon: HALOT
  rationale: '''Llevaron'' conserva נָשָׂא como cargar/soportar, y ''deshonra'' expresa bien כְלִמָּה en un registro digno. ''Vergüenza'' también sería posible, pero ''deshonra'' encaja mejor con el tono judicial.'
- source_word: אֶת יֹרְדֵי בּוֹר
  english_pob_choice: with those who go down to the pit
  chosen_spanish: con los que descienden al pozo
  alternatives_spanish:
  - con los que bajan al pozo
  - con los que van al sepulcro
  lexicon: HALOT
  rationale: '''Pozo'' preserva la imaginería de בּוֹר sin sustituirla por una explicación más amplia. ''Descienden'' mantiene la fórmula bíblica del descenso al reino de los muertos.'
- source_word: בְּתוֹךְ חֲלָלִים נִתָּן
  english_pob_choice: she was placed among the slain
  chosen_spanish: ella fue puesta entre los muertos
  alternatives_spanish:
  - ella fue puesta entre los caídos
  - ella fue colocada entre los muertos
  lexicon: HALOT
  rationale: El final retoma el pasivo singular y la personificación femenina, así que 'fue puesta' es fiel y natural. 'Entre los muertos' enlaza con la apertura del versículo y evita repetir un tecnicismo demasiado rígido.
theological_decisions:
- issue: Mantenimiento del término 'incircuncisos' en un oráculo de juicio
  english_pob_reading: All of them are uncircumcised
  chosen_spanish_reading: Todos ellos son incircuncisos
  alternative_spanish_readings:
  - Todos ellos son impuros
  - Todos ellos son extraños al pacto
  rationale: El hebreo nombra la condición de forma concreta; en Ezequiel esa concreción tiene carga de pacto, juicio y vergüenza. Traducirlo por una abstracción perdería parte de la dureza retórica del texto.
  doctrine_reference: 'Translation philosophy: preserve source-level theological force and tension'
- issue: Imagen funeraria de 'hacer una cama'
  english_pob_reading: they made a bed for her
  chosen_spanish_reading: le hicieron una cama a ella
  alternative_spanish_readings:
  - le prepararon un lecho
  - le dieron sepultura
  rationale: La metáfora no debe resolverse prematuramente en 'sepultura', porque el texto la usa dentro del simbolismo de la muerte y el honor/deshonra. La forma española conserva la imagen con suficiente naturalidad.
  doctrine_reference: 'Translation philosophy: original-image retention where semantically warranted'
- issue: Pasivo impersonal en 'su terror fue puesto'
  english_pob_reading: because their terror was set
  chosen_spanish_reading: porque su terror fue puesto
  alternative_spanish_readings:
  - porque extendieron su terror
  - porque su terror fue establecido
  rationale: El hebreo presenta un pasivo sin sujeto expreso; el español debe dejar visible esa impersonalidad en vez de convertirla en una acción más explícita. Así se preserva la tensión interpretativa del texto.
  doctrine_reference: 'Translation philosophy: avoid resolving ambiguity beyond the source'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando notas al pie no ancladas. La redacción final no usa marcadores de nota, por lo que no hay footnotes que validar contra el texto.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa 'incircuncisos' para conservar el peso covenantal del hebreo.
  - Se traduce בּוֹר como 'pozo' para sostener la imaginería bíblica del descenso a la muerte.
  - Se conserva la personificación femenina ('ella') de manera consistente en todo el versículo.
  - Se evita suavizar חֲלָלִים con un término genérico que borre el matiz de muerte violenta.
