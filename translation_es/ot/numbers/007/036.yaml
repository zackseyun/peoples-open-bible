lexical_decisions:
- source_word: בַּיּוֹם הַחֲמִישִׁי
  english_pob_choice: On the fifth day
  chosen_spanish: Al quinto día
  alternatives_spanish:
  - En el quinto día
  - El quinto día
  lexicon: HALOT
  rationale: La expresión temporal con artículo y ordinal se vierte de forma natural en español como «Al quinto día». Mantiene el valor adverbial del hebreo sin añadir información no expresada en el versículo.
- source_word: נָשִׂיא
  english_pob_choice: leader
  chosen_spanish: jefe
  alternatives_spanish:
  - líder
  - príncipe
  - jefe tribal
  lexicon: HALOT
  rationale: En este contexto de listas tribales, el término designa al representante principal del grupo. «Jefe» comunica ese rango de manera breve y natural en español, sin sugerir realeza como podría ocurrir con «príncipe».
- source_word: לִבְנֵי שִׁמְעוֹן
  english_pob_choice: of the sons of Simeon
  chosen_spanish: de los hijos de Simeón
  alternatives_spanish:
  - de los simeonitas
  - para los hijos de Simeón
  - de la gente de Simeón
  lexicon: HALOT
  rationale: 'Se conserva la forma más transparente al hebreo: la relación de pertenencia/representación se expresa con «de los hijos de Simeón». «Simeonitas» sería más idiomático, pero ocultaría la forma literal del original.'
- source_word: שְׁלֻמִיאֵל
  english_pob_choice: Shelumiel
  chosen_spanish: Shelumiel
  lexicon: policy transliteration
  rationale: Nombre propio transliterado según la práctica del proyecto; no se traduce.
- source_word: בֶּן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  lexicon: HALOT
  rationale: La construcción patronímica se expresa con el español estándar «hijo de». La forma con artículo no es necesaria en aposición nominal.
- source_word: צוּרִישַׁדָּי
  english_pob_choice: Zurishaddai
  chosen_spanish: Zurisadday
  alternatives_spanish:
  - Zurishaddai
  lexicon: policy transliteration
  rationale: Se mantiene el nombre propio transliterado. En español se adapta la grafía final para una lectura más natural, sin alterar la identificación del nombre.
theological_decisions:
- issue: Título tribal y relación representativa
  english_pob_reading: leader of the sons of Simeon
  chosen_spanish_reading: jefe de los hijos de Simeón
  alternative_spanish_readings:
  - líder de los hijos de Simeón
  - jefe de los simeonitas
  rationale: El hebreo presenta una designación de cargo dentro del grupo de Simeón. «Jefe» conserva la función de autoridad reconocida; «de los hijos de Simeón» mantiene la relación de pertenencia del texto fuente sin interpretarla como título dinástico.
  doctrine_reference: Números 7:36; uso de נָשִׂיא en contexto tribal
translation_notes:
  revision_awareness: 'La redacción sigue la revisión del POB inglés que reordenó la aposición para acercarse más al hebreo y eliminó el verbo suplido «was». En español se conserva igualmente la estructura nominal: primero el nombre propio con patronímico y luego el cargo de representación tribal.'
  spanish_consistency_notes:
  - Se mantuvo «hijos de Simeón» para corresponder de forma transparente a בני שִׁמְעוֹן, aunque «simeonitas» sería una alternativa válida y más idiomática.
  - Se prefirió «jefe» para נָשִׂיא por su claridad contextual; no se usó «príncipe» para evitar una carga semántica ajena al pasaje.
  - Los nombres propios se transliteran de manera consistente con el proyecto.
