translation:
  language: es
  text: 'Al director del coro: según Lirios[a]. De David[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente «puesto a Lirios»; la expresión probablemente nombra una melodía o un estilo musical. El hebreo significa literalmente «lirios».
    reason: lexical_alternative
  - marker: b
    text: El hebreo «De David» puede indicar autoría, dedicación o asociación, y por sí solo no resuelve la cuestión.
    reason: alternative_reading
lexical_decisions:
- source_word: לַמְנַצֵּחַ
  english_pob_choice: For the choirmaster
  chosen_spanish: Al director del coro
  alternatives_spanish:
  - Para el director del coro
  - Al maestro de música
  lexicon: HALOT
  rationale: En los encabezamientos de salmos, la expresión introduce una indicación litúrgico-musical dirigida al responsable de la ejecución. «Al director del coro» conserva bien esa función en español sin forzar una interpretación más específica que la del hebreo.
- source_word: עַל
  english_pob_choice: according to
  chosen_spanish: según
  alternatives_spanish:
  - con arreglo a
  - al son de
  - sobre
  lexicon: HALOT
  rationale: En este tipo de superscripción musical, עַל puede introducir la melodía, el estilo o la referencia de ejecución. «Según» preserva esa relación flexible sin decidir demasiado si se trata de una melodía concreta, un estilo o una indicación técnica.
- source_word: שׁוֹשַׁנִּים
  english_pob_choice: Lilies
  chosen_spanish: Lilies
  alternatives_spanish:
  - Lirios
  - Los lirios
  - Lirios de azucena
  lexicon: HALOT
  rationale: El término hebreo significa literalmente «lirios/azucenas», pero en un encabezamiento de salmo probablemente funciona como nombre de melodía o de estilo musical. Mantener «Lilies» conserva el posible título tradicional como nombre propio de la pieza, en continuidad con la decisión inglesa y sin perder la referencia léxica.
- source_word: לְדָוִד
  english_pob_choice: Of David
  chosen_spanish: De David
  alternatives_spanish:
  - Para David
  - Por David
  - Perteneciente a David
  lexicon: HALOT
  rationale: La preposición ל en los encabezamientos puede señalar autoría, dedicación o asociación. «De David» mantiene esa ambigüedad mejor que una opción más cerrada como «por David».
theological_decisions:
- issue: Ambigüedad de la superscripción «De David»
  english_pob_reading: The Hebrew 'Of David' may indicate authorship, dedication, or association, and does not by itself settle the question.
  chosen_spanish_reading: De David puede indicar autoría, dedicación o asociación, sin resolver por sí solo la cuestión.
  alternative_spanish_readings:
  - Por David
  - Para David
  rationale: Se conserva la tensión documental del encabezamiento sin convertirla en una afirmación de autoría segura.
  doctrine_reference: Psalm superscriptions; authorship attribution as a textual rather than doctrinal issue
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando ambos marcadores de nota directamente en el texto español, anclados a «Lilies» y al valor relacional de עַל. La redacción sigue de cerca el audit trail inglés y el hebreo, sin resolver indebidamente la ambigüedad del encabezamiento.
  spanish_consistency_notes:
  - Se mantuvo «De David» para conservar la ambigüedad de לְדָוִד.
  - Se evitó «SEÑOR» o una sustitución doctrinal ajena al texto, porque no aparece el Tetragrámaton aquí.
  - Se prefirió «director del coro» por claridad litúrgica y naturalidad en español.
  - Se conservó «Lilies» como título probable, no como mera traducción botánica, y se explicó la tensión en nota.
