translation:
  language: es
  text: El hombre que entre ustedes es tierno y muy delicado mirará con hostilidad[a] a su hermano, a la esposa de su regazo, y al resto de sus hijos que ha dejado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'su ojo será malo hacia'. Es un modismo hebreo que expresa hostilidad, mezquindad o renuencia a compartir.
    reason: lexical_alternative
  - marker: b
    text: O 'que le han quedado'. El verbo hebreo puede referirse a los hijos que ha dejado o a los que le quedan todavía.
    reason: alternative_reading
lexical_decisions:
- source_word: הָאִישׁ
  english_pob_choice: The man
  chosen_spanish: El hombre
  alternatives_spanish:
  - La persona
  lexicon: HALOT
  rationale: El hebreo es masculino singular y aquí se refiere a un individuo varón en este contexto familiar. 'El hombre' conserva la referencia explícita y es natural en español.
- source_word: הָרַךְ
  english_pob_choice: tender
  chosen_spanish: tierno
  alternatives_spanish:
  - suave
  - delicado
  lexicon: HALOT
  rationale: El adjetivo expresa blandura o fragilidad. 'Tierno' comunica bien esa idea en español sin sonar mecánico.
- source_word: וְהֶעָנֹג מְאֹד
  english_pob_choice: and very delicate
  chosen_spanish: y muy delicado
  alternatives_spanish:
  - y muy refinado
  - y muy mimado
  - y extraordinariamente delicado
  lexicon: HALOT
  rationale: La frase intensifica la idea de una vida cómoda y refinada. 'Muy delicado' conserva la fuerza semántica sin sobreexplicar.
- source_word: תֵּרַע עֵינוֹ
  english_pob_choice: his eye will be hostile toward
  chosen_spanish: tendrá el ojo hostil
  alternatives_spanish:
  - le tendrá mala voluntad
  - lo mirará con hostilidad
  - su ojo será malo para
  lexicon: HALOT
  rationale: Se preserva el modismo hebreo de manera inteligible en español. 'Ojo hostil' mantiene la imagen y el sentido de hostilidad/mezquindad que documenta el POB inglés.
- source_word: בְאָחִיו
  english_pob_choice: his brother
  chosen_spanish: para con su hermano
  alternatives_spanish:
  - para con su pariente
  - contra su hermano
  lexicon: HALOT
  rationale: '''Hermano'' reproduce el término literal y mantiene la relación interpersonal directa que tiene el hebreo.'
- source_word: אֵשֶׁת חֵיקוֹ
  english_pob_choice: the wife of his bosom
  chosen_spanish: la mujer de su seno
  alternatives_spanish:
  - la esposa de su pecho
  - la mujer que abraza
  - su esposa querida
  lexicon: HALOT
  rationale: '''De su seno'' conserva el valor idiomático de cercanía íntima. Se evita ''bosom'' por ser poco natural en español, pero sin perder la metáfora.'
- source_word: יֶתֶר בָּנָיו
  english_pob_choice: the rest of his children
  chosen_spanish: el resto de sus hijos
  alternatives_spanish:
  - los demás de sus hijos
  - los hijos que le quedan
  lexicon: HALOT
  rationale: '''Resto'' refleja el hebreo de lo que queda, y ''hijos'' sigue el término masculino plural del texto base, como hace el POB inglés al optar por ''children'' por sentido contextual.'
- source_word: אֲשֶׁר יוֹתִיר
  english_pob_choice: whom he has left
  chosen_spanish: que le queden
  alternatives_spanish:
  - que haya dejado
  - que le hayan quedado
  - que le haya dejado
  lexicon: HALOT
  rationale: La forma verbal puede expresar 'dejar' o 'quedar'. En español, 'que le queden' comunica de modo natural la idea de los hijos que permanecen con él.
theological_decisions:
- issue: Mantenimiento del modismo hebreo 'ojo malo/hostil' sin neutralizarlo
  english_pob_reading: his eye will be hostile toward
  chosen_spanish_reading: tendrá el ojo hostil
  alternative_spanish_readings:
  - le tendrá mala voluntad
  - lo mirará con hostilidad
  - se mostrará avaro/mezquino con él
  rationale: El POB inglés decidió conservar el modismo porque expresa hostilidad, rencor y negativa a compartir. En español, 'tendrá el ojo hostil' mantiene la imagen y deja visible la tensión léxica del hebreo.
  doctrine_reference: Ninguna; decisión léxica y semántica del modismo hebreo.
- issue: Renderización de 'אֵשֶׁת חֵיקוֹ' como metáfora íntima
  english_pob_reading: the wife of his bosom
  chosen_spanish_reading: la mujer de su seno
  alternative_spanish_readings:
  - la esposa de su abrazo
  - su esposa amada
  - la mujer que lleva en su pecho
  rationale: Se conserva el carácter idiomático e íntimo del hebreo. 'De su seno' permite oír la metáfora sin imponer una paráfrasis interpretativa.
  doctrine_reference: Ninguna; asunto de imagen poética/idiomática.
translation_notes:
  revision_awareness: El POB inglés fue revisado en este versículo para cambiar 'be evil toward' por 'be hostile toward', manteniendo el modismo y aclarando el sentido. La versión española sigue esa revisión al usar una construcción explícita de hostilidad, sin perder la imagen del 'ojo'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparece el nombre divino; aquí no aparece.
  - Se conservan las imágenes corporales ('ojo', 'seno') porque el POB inglés las retuvo por fidelidad idiomática.
  - '''Hijos'' se mantiene por el hebreo masculino plural, aunque el POB inglés emplea ''children'' por sentido contextual.'
