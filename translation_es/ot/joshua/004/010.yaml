translation:
  language: es
  text: Y los sacerdotes que llevaban el arca permanecieron en medio del Jordán hasta que se cumplió todo lo que Yahvé había mandado a Josué hablar al pueblo[a], conforme a todo lo que Moisés había mandado a Josué. Y el pueblo se apresuró y cruzó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hasta que se terminó todo el asunto»; la frase resume la culminación de todo lo que Yahvé había mandado que se hablara al pueblo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַכֹּהֲנִים
  english_pob_choice: the priests
  chosen_spanish: los sacerdotes
  alternatives_spanish:
  - los sacerdotes
  lexicon: HALOT
  rationale: כֹּהֵן designa a los sacerdotes en este contexto narrativo. 'Sacerdotes' es el equivalente natural y fiel en español.
- source_word: נֹשְׂאֵי הָאָרוֹן
  english_pob_choice: carrying the ark
  chosen_spanish: que llevaban el arca
  alternatives_spanish:
  - que portaban el arca
  - que cargaban el arca
  lexicon: HALOT
  rationale: El participio describe a los sacerdotes por su acción continua. 'Llevaban' comunica bien la acción de portar el arca en español sin sonar forzado.
- source_word: עֹמְדִים
  english_pob_choice: stood
  chosen_spanish: permanecieron
  alternatives_spanish:
  - estuvieron de pie
  - estaban de pie
  lexicon: HALOT
  rationale: El participio expresa estado durativo. 'Permanecieron' conserva la permanencia en el lugar y suena más natural en narrativa española que repetir 'estaban de pie'.
- source_word: בְּתוֹךְ הַיַּרְדֵּן
  english_pob_choice: in the midst of the Jordan
  chosen_spanish: en medio del Jordán
  alternatives_spanish:
  - en medio del río Jordán
  - dentro del Jordán
  lexicon: HALOT
  rationale: '''En medio de'' reproduce bien בְּתוֹךְ y mantiene el tono solemne. ''Jordán'' se entiende como el río por contexto.'
- source_word: עַד תֹּם כָּל הַדָּבָר
  english_pob_choice: until everything was finished
  chosen_spanish: hasta que terminó todo
  alternatives_spanish:
  - hasta que se terminó todo
  - hasta que concluyó todo
  lexicon: HALOT
  rationale: La expresión idiomática resume la culminación de todo lo mandado. 'Terminó todo' refleja con claridad la totalidad sin volverla torpemente literal.
- source_word: הַדָּבָר
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - el asunto
  - la cosa
  - la palabra
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra, asunto, cosa'. En este contexto suma el conjunto de lo mandado; 'todo' preserva ese valor global sin sobreespecificar.
- source_word: צִוָּה יְהוָה
  english_pob_choice: the LORD had commanded
  chosen_spanish: Yahvé había mandado
  alternatives_spanish:
  - Yahvé había ordenado
  - Yahvé había dado mandato
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé', conforme al estándar del proyecto. 'Mandado' reproduce bien el campo semántico de צוה.
- source_word: לְדַבֵּר אֶל הָעָם
  english_pob_choice: to speak to the people
  chosen_spanish: decir al pueblo
  alternatives_spanish:
  - hablar al pueblo
  - dirigir la palabra al pueblo
  lexicon: HALOT
  rationale: En español, el infinitivo con 'decir' fluye de manera natural con 'mandó a Josué'. El contenido es verbal, y 'decir al pueblo' evita una construcción pesada.
- source_word: כְּכֹל אֲשֶׁר צִוָּה מֹשֶׁה אֶת יְהוֹשֻׁעַ
  english_pob_choice: according to all that Moses had commanded Joshua
  chosen_spanish: conforme a todo lo que Moisés había mandado a Josué
  alternatives_spanish:
  - según todo lo que Moisés había mandado a Josué
  - tal como Moisés había mandado a Josué
  lexicon: HALOT
  rationale: כְּכֹל expresa conformidad plena. 'Conforme a todo lo que' mantiene esa correspondencia y conserva la relación de mandato previa entre Moisés y Josué.
- source_word: וַיְמַהֲרוּ
  english_pob_choice: hurried
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dieron prisa
  - apuraron
  lexicon: HALOT
  rationale: El verbo denota prisa. En español, la forma reflexiva impersonal/plural 'se apresuró' suena natural con sujeto colectivo.
- source_word: וַיַּעֲבֹרוּ
  english_pob_choice: crossed over
  chosen_spanish: cruzó
  alternatives_spanish:
  - pasó
  - atravesó
  lexicon: HALOT
  rationale: En este contexto de cruce del Jordán, 'cruzó' comunica el movimiento de un lado al otro de manera directa y clara.
theological_decisions:
- issue: Renderizado del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Conforme a la terminología del proyecto, se traduce como 'Yahvé' y no se sustituye por un título enmascarador. Esto preserva el nombre de pacto de Dios en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Se ha seguido de cerca el auditorio inglés sin traducirlo mecánicamente: se conservó la estructura narrativa y la carga semántica del hebreo, pero se adaptó la sintaxis a un español natural. La nota sobre כָּל הַדָּבָר se mantiene porque la expresión hebrea es más literal que la formulación idiomática española.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - '''Jordán'' se usa como nombre del río por el contexto narrativo.'
  - '''Sacerdotes'' se prefirió a ''sacerdotes'' sin variante formal, porque el término es el equivalente estable y transparente en español bíblico.'
  - La nota al pie preserva la tensión entre 'todo el asunto' y la traducción idiomática 'todo'.
