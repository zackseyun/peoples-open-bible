translation:
  language: es
  text: Pero si los ancianos de los hebreos murieron después de soportar torturas por causa de la piedad[a], ¿cuánto más justamente deberíamos morir nosotros, los jóvenes, despreciando las torturas de tu coerción[b], esas que también venció el anciano instructor?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por causa de la devoción a Dios». El griego εὐσέβεια puede expresar devoción reverente a Dios en conducta fiel.
    reason: lexical_alternative
  - marker: b
    text: O «de tus coerciones/constreñimientos». La frase griega τῶν σῶν ἀναγκῶν es comprimida y apunta a las presiones o imposiciones coercitivas del gobernante.
    reason: lexical_alternative
lexical_decisions:
- source_word: γέροντες
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - viejos
  - ancianos de edad avanzada
  lexicon: LSJ
  rationale: El griego señala hombres de edad avanzada y el contraste inmediato es con «los jóvenes». «Ancianos» conserva ese contraste etario sin sugerir cargo eclesiástico ni institucional.
- source_word: διὰ τὴν εὐσέβειαν
  english_pob_choice: because of godliness
  chosen_spanish: por causa de la piedad
  alternatives_spanish:
  - por causa de la devoción a Dios
  - por causa de la reverencia
  lexicon: LSJ
  rationale: εὐσέβεια aquí expresa fidelidad reverente a Dios. «Piedad» mantiene el sentido religioso amplio y también deja abierta la opción lexical que el inglés anotó como alternativa a «godliness».
- source_word: βασανισμοὺς ὑπομείναντες
  english_pob_choice: after enduring tortures
  chosen_spanish: después de soportar torturas
  alternatives_spanish:
  - después de haber soportado tormentos
  - tras padecer torturas
  lexicon: LSJ
  rationale: El participio antecede al verbo principal y expresa una acción anterior. «Soportar torturas» refleja la dureza coercitiva de βασανισμοί y conserva el valor temporal del participio.
- source_word: ἀποθάνοιμεν ἂν δικαιότερον
  english_pob_choice: how much more rightly should we die
  chosen_spanish: ¿cuánto más justamente deberíamos morir?
  alternatives_spanish:
  - ¿cuánto más rectamente deberíamos morir?
  - deberíamos morir con mucha mayor justicia
  lexicon: LSJ
  rationale: La comparación retórica exige una formulación interrogativa natural en español. «Más justamente» conserva la fuerza comparativa de δικαιότερον sin convertir el verso en una paráfrasis doctrinal.
- source_word: οἱ νέοι
  english_pob_choice: the young men
  chosen_spanish: los jóvenes
  alternatives_spanish:
  - los muchachos
  - los hombres jóvenes
  lexicon: LSJ
  rationale: El griego contrasta con «los ancianos» y no requiere marcar el masculino con redundancia. «Los jóvenes» es natural en español y mantiene la oposición etaria.
- source_word: τὰς βασάνους
  english_pob_choice: the tortures
  chosen_spanish: las torturas
  alternatives_spanish:
  - los tormentos
  - los sufrimientos
  lexicon: LSJ
  rationale: El contexto martirial y coercitivo favorece «torturas», que reproduce mejor la violencia del término que «tormentos» en español actual.
- source_word: τῶν σῶν ἀναγκῶν
  english_pob_choice: of your compulsion
  chosen_spanish: de tu coerción
  alternatives_spanish:
  - de tus imposiciones
  - de tus constricciones
  - de tu compulsión
  lexicon: LSJ
  rationale: ἀνάγκη puede abarcar fuerza, presión o necesidad impuesta. «Coerción» comunica la presión forzada del gobernante y evita suavizar el matiz mediante un término demasiado abstracto.
- source_word: ὑπεριδόντες
  english_pob_choice: having disregarded
  chosen_spanish: habiendo despreciado
  alternatives_spanish:
  - habiendo pasado por alto
  - habiendo considerado nada
  lexicon: LSJ
  rationale: El participio expresa tratar algo como insignificante o no tomarlo en cuenta. «Despreciado» recoge mejor la actitud resuelta de desprecio frente a las torturas que un mero «ignorado».
- source_word: ὁ παιδευτὴς γέρων
  english_pob_choice: the aged instructor
  chosen_spanish: el anciano instructor
  alternatives_spanish:
  - el viejo instructor
  - el anciano maestro
  lexicon: LSJ
  rationale: Παιδευτής combina instrucción y formación ejemplar. «Instructor» conserva la función pedagógica y «anciano» mantiene el rasgo etario, sin forzar un término eclesiástico.
- source_word: ἐνίκησεν
  english_pob_choice: conquered
  chosen_spanish: venció
  alternatives_spanish:
  - triunfó sobre
  - conquistó
  lexicon: LSJ
  rationale: En este contexto de martirio, el verbo tiene tono de victoria. «Venció» es natural en español y conserva la imagen de triunfo que el inglés mantuvo con «conquered».
theological_decisions:
- issue: εὐσέβεια en contexto de martirio
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción a Dios
  - reverencia
  rationale: La escena no es de religiosidad genérica sino de fidelidad obediente a Dios frente a la persecución. «Piedad» comunica esa devoción sin imponer una terminología posterior que el griego no exige.
  doctrine_reference: DOCTRINE.md §Translation philosophy 6
- issue: Comparativo δικαιότερον en una exhortación retórica
  english_pob_reading: how much more rightly should we die
  chosen_spanish_reading: ¿cuánto más justamente deberíamos morir?
  alternative_spanish_readings:
  - deberíamos morir con mayor justicia
  - ¿cuánto más rectamente deberíamos morir?
  rationale: 'El hablante razona por mayor razón: si ellos murieron, nosotros con mayor motivo. «Más justamente» mantiene el matiz comparativo y el tono exhortativo sin convertirlo en una afirmación de mérito salvífico.'
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego de Swete (1909) y mantiene la lectura auditada del inglés POB: contraste etario entre ancianos y jóvenes, causalidad de εὐσέβεια, carácter coercitivo de ἀνάγκαι, y tono victorioso de ἐνίκησεν. Se adoptó una formulación española más natural en el inicio («Pero si...») y se mantuvo la lógica comparativa de δικαιότερον sin suavizar la fuerza martirial del pasaje. No se introdujeron variantes textuales adicionales, ya que el expediente muestra alto acuerdo con el griego recibido.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni κύριος.
  - «Ancianos / jóvenes» mantiene la oposición etaria explícita del griego.
  - «Torturas» se usa de modo consistente para βασανισμοί en un contexto de persecución.
  - Se prefirió «coerción» para ἀνάγκαι por su fuerza forzada y su concordancia con la nota auditada del inglés.
  - La estructura interrogativa retórica en español refleja el potencial comparativo del griego sin añadir contenido interpretativo.
