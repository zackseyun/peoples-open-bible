translation:
  language: es
  text: Las primicias de todo lo que hay en su tierra, que traigan a Yahvé, serán tuyas. Todo el que en tu casa esté limpio[a] podrá comerlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo el que esté ceremonialmente limpio»; aquí «limpio» refleja la pureza ritual requerida en el contexto sacerdotal.
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּכּוּרֵי
  english_pob_choice: the firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - los primeros frutos
  - las primeras primicias
  lexicon: HALOT
  rationale: En contexto cultual, בִּכּוּרִים designa la primera porción del producto de la cosecha ofrecida a Dios. «Primicias» es el equivalente español natural y tradicional en lenguaje bíblico, y mantiene el sentido técnico sin ampliar más allá del hebreo.
- source_word: כָּל אֲשֶׁר בְּאַרְצָם
  english_pob_choice: of everything in their land
  chosen_spanish: de todo lo que haya en su tierra
  alternatives_spanish:
  - de todo lo que esté en su tierra
  - de todo lo que haya en su país
  lexicon: HALOT
  rationale: La construcción hebrea indica el conjunto de lo producido o existente en su tierra. «Lo que haya en su tierra» conserva la amplitud del original y suena natural en español.
- source_word: אֲשֶׁר יָבִיאוּ לַיהוָה
  english_pob_choice: that they bring to Yahweh
  chosen_spanish: que traigan a Yahvé
  alternatives_spanish:
  - que lleven a Yahvé
  - que presenten a Yahvé
  lexicon: HALOT
  rationale: יַבִיאוּ significa literalmente «traerán». En este contexto cultual, «traigan a Yahvé» sigue de cerca el verbo hebreo y preserva la referencia directa al nombre divino según el criterio del proyecto.
- source_word: לְךָ יִהְיֶה
  english_pob_choice: shall be yours
  chosen_spanish: serán tuyas
  alternatives_spanish:
  - te pertenecerán
  - serán para ti
  lexicon: HALOT
  rationale: La expresión hebrea asigna la ofrenda a Aarón. En español, «serán tuyas» reproduce la relación de pertenencia de forma idiomática y concisa.
- source_word: כָּל טָהוֹר
  english_pob_choice: Everyone ... who is clean
  chosen_spanish: Todo el que sea limpio
  alternatives_spanish:
  - Toda persona limpia
  - Todo el que esté limpio
  lexicon: HALOT
  rationale: טָהוֹר en legislación sacerdotal tiene fuerza ritual. «Limpio» conserva la idea de pureza ritual sin añadir «ceremonial» al texto principal; esa precisión puede explicitarse en nota.
- source_word: בְּבֵיתְךָ
  english_pob_choice: in your house
  chosen_spanish: en tu casa
  alternatives_spanish:
  - en tu hogar
  - en tu casa y familia
  lexicon: HALOT
  rationale: El hebreo se refiere a la casa/entorno doméstico de Aarón. «En tu casa» es una traducción directa y comprensible en español.
- source_word: יֹאכֲלֶנּוּ
  english_pob_choice: may eat it
  chosen_spanish: podrá comerlo
  alternatives_spanish:
  - podrá comer de ello
  - puede comerlo
  lexicon: HALOT
  rationale: El imperfecto expresa permiso o derecho en contexto. «Podrá comerlo» comunica autorización, no solo futuro simple, y mantiene la relación con el sustantivo singular colectivo en español.
theological_decisions:
- issue: Sentido ritual de טָהוֹר
  english_pob_reading: ritually clean members of Aaron's household may eat the priestly portion
  chosen_spanish_reading: solo quienes estén ritualmente limpios en la casa de Aarón pueden comer la porción sacerdotal
  alternative_spanish_readings:
  - quienes sean moralmente puros
  - quienes estén limpios en un sentido general
  rationale: En Números 18 el contexto es regulatorio-sacerdotal. Por eso, aunque el texto principal diga «limpio», la lectura debe entenderse como pureza ritual; la nota preserva la alternativa inglesa «ceremonially clean».
  doctrine_reference: Levítico 10–11; Números 18:11–13
translation_notes:
  revision_awareness: El texto español sigue la decisión inglesa de mantener la estructura breve y cultual del versículo, sin añadir «ofrenda» donde el hebreo dice simplemente «traigan a Yahvé». Se ajustó el nombre divino a «Yahvé» conforme al criterio del proyecto, y se conservó la ambigüedad útil de טָהוֹר con una nota explicativa.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como forma principal del tetragrámaton, coherente con las normas del proyecto.
  - «Primicias» conserva el término técnico bíblico frente a opciones más descriptivas.
  - «Limpio» en el texto principal requiere lectura ritual por contexto; la nota evita reducirlo a pureza moral.
  - Se tradujo el permiso implícito de יֹאכֲלֶנּוּ con «podrá comerlo» para expresar derecho autorizado.
  - «Casa» se usó en sentido doméstico/priestly household, en paralelo con el inglés auditado.
