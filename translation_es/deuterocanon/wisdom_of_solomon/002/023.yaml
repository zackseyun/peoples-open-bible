  - marker: b
    text: O «a imagen de su propia distintividad» o «a imagen de su propio ser». La frase griega es inusual y admite más de una traducción cercana.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal por su fidelidad y buena naturalidad, y se corrige únicamente la nota léxica [a] para usar «imperecibilidad», que representa mejor la alternativa documentada y suena más idiomático en español.
