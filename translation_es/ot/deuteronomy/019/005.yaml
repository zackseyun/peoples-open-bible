  text: וַ/אֲשֶׁר֩ יָבֹ֨א אֶת רֵעֵ֥/הוּ בַ/יַּעַר֮ לַ/חְטֹ֣ב עֵצִים֒ וְ/נִדְּחָ֨ה יָד֤/וֹ בַ/גַּרְזֶן֙ לִ/כְרֹ֣ת הָ/עֵ֔ץ וְ/נָשַׁ֤ל הַ/בַּרְזֶל֙ מִן הָ/עֵ֔ץ וּ/מָצָ֥א אֶת רֵעֵ֖/הוּ וָ/מֵ֑ת ה֗וּא יָנ֛וּס אֶל אַחַ֥ת הֶ/עָרִים הָ/אֵ֖לֶּה וָ/חָֽי־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/deuteronomy/019/005.yaml
  text: But if a man goes with his neighbor into the forest to cut wood[a], and his hand swings the axe to cut down the tree, and the iron head slips from the handle and strikes his neighbor so that he dies, he may flee to one of these cities and live.
  footnotes:
  - marker: a
    text: Literally, 'the iron slips off from the wood.' Here 'the iron' refers to the axe-head, and 'the wood' refers to the wooden handle.
    reason: lexical_alternative
