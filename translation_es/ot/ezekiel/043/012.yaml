translation:
  language: es
  text: 'Esta es la ley de la casa: en la cima del monte, todo su territorio alrededor[a] es santísimo. He aquí, esta es la ley de la casa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «todo su límite alrededor es santísimo».
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹרַת הַבָּיִת
  english_pob_choice: the law of the house
  chosen_spanish: la ley de la casa
  alternatives_spanish:
  - la instrucción de la casa
  - la ley del templo
  lexicon: HALOT
  rationale: תּוֹרָה puede significar 'ley' o 'instrucción'. En este contexto introduce la norma que rige la casa/templo y su recinto. Mantener 'casa' preserva בַּיִת con transparencia; 'templo' es posible, pero menos directo respecto del hebreo.
- source_word: עַל רֹאשׁ הָהָר
  english_pob_choice: on the top of the mountain
  chosen_spanish: en la cima del monte
  alternatives_spanish:
  - sobre la cumbre del monte
  - en la cabeza del monte
  lexicon: HALOT
  rationale: רֹאשׁ literalmente es 'cabeza', pero en contexto topográfico la equivalencia natural y fiel en español es 'cima' o 'cumbre'. 'En la cima del monte' comunica bien el sentido sin perder la imagen espacial.
- source_word: כָּל גְּבֻל֞וֹ סָבִ֤יב סָבִיב
  english_pob_choice: all its surrounding territory
  chosen_spanish: todo su territorio alrededor
  alternatives_spanish:
  - todo su límite alrededor
  - toda su extensión en derredor
  lexicon: HALOT
  rationale: גְּבוּל puede ser 'límite', 'frontera' o 'territorio'. Aquí se refiere al área completa que rodea la casa en el monte, por lo que 'territorio alrededor' transmite mejor el conjunto. La repetición de סָבִיב se conserva con 'alrededor'.
- source_word: קֹדֶשׁ קָדָשִׁים
  english_pob_choice: most holy
  chosen_spanish: santísimo
  alternatives_spanish:
  - muy santo
  - santo de santos
  lexicon: HALOT
  rationale: La construcción hebrea expresa superlativo. En español, 'santísimo' es la forma más natural y fiel para el valor intensivo del hebreo en este contexto, describiendo el estatus del área circundante, no nombrando aquí un recinto interno específico.
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: HALOT
  rationale: הִנֵּה funciona como marcador discursivo de atención. 'Mira' mantiene el llamado solemne en español actual; 'He aquí' sería más tradicional, pero menos natural para el registro objetivo de esta versión.
- source_word: זֹאת ... זֹאת
  english_pob_choice: This ... this
  chosen_spanish: Esta ... esta
  alternatives_spanish:
  - Esta ... esta misma
  - Esto ... esto
  lexicon: HALOT
  rationale: La repetición del demostrativo enmarca el versículo y se preserva en español para mantener la cohesión estructural y el énfasis del hebreo.
theological_decisions:
- issue: קֹדֶשׁ קָדָשִׁים como superlativo de santidad del área
  english_pob_reading: most holy
  chosen_spanish_reading: santísimo
  alternative_spanish_readings:
  - santo de santos
  - muy santo
  rationale: El hebreo no está nombrando necesariamente el compartimento del santuario, sino atribuyendo al terreno circundante un grado máximo de santidad. 'Santísimo' expresa el superlativo sin trasladar automáticamente una etiqueta litúrgica distinta.
  doctrine_reference: Santidad cultual en Ezequiel 43; superlativo semítico de santidad
- issue: תּוֹרַת הַבָּיִת como norma arquitectónica/cultual
  english_pob_reading: the law of the house
  chosen_spanish_reading: la ley de la casa
  alternative_spanish_readings:
  - la instrucción de la casa
  - la ley del templo
  rationale: '''Ley'' conserva el valor normativo que la POB documenta; ''casa'' mantiene la correspondencia directa con בַּיִת y evita sustituirlo por una interpretación más eclesial que el hebreo no exige.'
  doctrine_reference: Norma de santidad y delimitación del templo en la visión de Ezequiel
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios y el estado de acuerdo general fue alto; esta propuesta mantiene las decisiones auditadas del inglés POB y ajusta únicamente la dicción española para naturalidad y fidelidad semántica.
  spanish_consistency_notes:
  - Se mantiene 'casa' en todo el versículo para conservar la transparencia de בַּיִת.
  - Se evita 'SEÑOR' u otra sustitución teológica no requerida; aquí no aparece el nombre divino.
  - '''Santísimo'' se usa como superlativo adjetival coherente con קֹדֶשׁ קָדָשִׁים.'
  - La nota al pie preserva la alternativa entre 'territorio' y 'límite', reflejando la ambigüedad de גְּבוּל.
