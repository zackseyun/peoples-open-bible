translation:
  language: es
  text: Él habitará en las alturas; fortalezas rocosas serán su refugio[a]; su pan le será dado, su agua será segura[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su baluarte»; el hebreo denota un lugar seguro y elevado de protección.
    reason: lexical_alternative
  - marker: b
    text: O «su agua no faltará».
    reason: lexical_alternative
lexical_decisions:
- source_word: מְרוֹמִים
  english_pob_choice: on the heights
  chosen_spanish: en las alturas
  alternatives_spanish:
  - sobre las alturas
  - en lugares altos
  lexicon: HALOT
  rationale: מְרוֹמִים designa lugares elevados; «en las alturas» conserva la imagen espacial de elevación y seguridad con una formulación natural en español.
- source_word: יִשְׁכֹּן
  english_pob_choice: will dwell
  chosen_spanish: habitará
  alternatives_spanish:
  - morará
  - vivirá
  lexicon: HALOT
  rationale: El imperfecto verbal expresa una acción continua o futura prometida. «Habitará» mantiene esa idea de permanencia y suena digno en español bíblico actual.
- source_word: מְצָדוֹת סְלָעִים
  english_pob_choice: rocky fortresses
  chosen_spanish: fortalezas rocosas
  alternatives_spanish:
  - fortalezas de roca
  - fortalezas entre peñascos
  - baluartes rocosos
  lexicon: HALOT
  rationale: La construcción hebrea literalmente es «fortalezas de rocas». «Fortalezas rocosas» preserva la imagen defensiva y la aspereza del terreno sin forzar un genitivo poco natural en español.
- source_word: מִשְׂגַּבּוֹ
  english_pob_choice: his refuge
  chosen_spanish: su refugio
  alternatives_spanish:
  - su altura segura
  - su baluarte
  - su lugar elevado de protección
  lexicon: HALOT
  rationale: El término puede denotar un lugar alto y seguro. Se traduce «su refugio» porque comunica la función protectora de forma clara, manteniendo el apoyo del contexto ya cargado de altura y fortaleza.
- source_word: לַחְמוֹ
  english_pob_choice: his bread
  chosen_spanish: su pan
  alternatives_spanish:
  - su alimento
  - su comida
  lexicon: HALOT
  rationale: Se conserva el sustantivo concreto «pan», como en hebreo, porque funciona bien como metonimia de provisión y no requiere generalización.
- source_word: נִתָּן
  english_pob_choice: will be given
  chosen_spanish: le será dado
  alternatives_spanish:
  - será dado
  - le es dado
  lexicon: HALOT
  rationale: La forma pasiva se vierte con futuro perifrástico para mantener el valor de promesa. El dativo explícito «le» aclara la relación con el sujeto implícito sin añadir contenido.
- source_word: מֵימָיו
  english_pob_choice: his water
  chosen_spanish: sus aguas
  alternatives_spanish:
  - su agua
  - sus aguas de agua
  lexicon: HALOT
  rationale: Aunque en español «agua» suele ser singular, el plural hebreo מֵימָיו puede reflejar la idea de suministro o provisión de agua. «Sus aguas» conserva mejor la forma y evita perder el matiz del original.
- source_word: נֶאֱמָנִים
  english_pob_choice: will be sure
  chosen_spanish: serán seguras
  alternatives_spanish:
  - serán firmes
  - no faltarán
  - serán confiables
  lexicon: HALOT
  rationale: El término expresa firmeza, confiabilidad y estabilidad. «Serán seguras» comunica la idea de provisión fiable en español, en paralelo con la promesa anterior.
theological_decisions:
- issue: Referente del pronombre singular masculino
  english_pob_reading: The verse speaks of the righteous man described in the preceding context, not directly of God or the Messiah.
  chosen_spanish_reading: El versículo habla del hombre justo descrito en el contexto anterior, no directamente de Dios ni del Mesías.
  alternative_spanish_readings:
  - Una afirmación general sobre el justo
  - Una aplicación tipológica al remanente fiel
  rationale: El contexto inmediato presenta al que anda en justicia; por eso se conserva el singular masculino y no se introduce un referente mesiánico que el texto no exige.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral); principio de no importar afirmaciones doctrinales ajenas al pasaje.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; esta versión sigue el consenso de alta concordancia entre la auditoría inglesa y el texto fuente hebreo.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin calcos innecesarios.
  - Se preserva la imaginería de altura, fortaleza y provisión con vocabulario natural para lectores hispanohablantes.
  - No se sustituye el plural hebreo de מים por una abstracción excesiva; se conserva como «aguas» para respetar la forma del original.
  - Las notas al pie mantienen alternativas relevantes sin sobrecargar el texto principal.
