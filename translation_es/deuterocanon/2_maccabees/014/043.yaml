translation:
  language: es
  text: Pero, como no había logrado su propósito con el golpe[a] a causa de la urgencia de la lucha, y las multitudes irrumpían por las puertas hacia adentro, subió valerosamente al muro y se arrojó con hombría[b] entre las multitudes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no había tenido éxito con el golpe». El griego sugiere que el golpe autoinfligido no logró el efecto previsto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «varonilmente» o «valerosamente». El griego usa un adverbio específicamente masculino para la valentía.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ ... πληγῇ
  english_pob_choice: in the blow
  chosen_spanish: el golpe
  alternatives_spanish:
  - el golpe asestado
  - el golpe dado
  - la herida
  lexicon: LSJ
  rationale: En este contexto, πληγῇ puede referirse al golpe o al impacto de la acción autoinfligida, no solo al resultado como herida. «El golpe» preserva la referencia al acto fallido sin introducir una interpretación más estrecha.
- source_word: μὴ κατευκτήσας
  english_pob_choice: had not succeeded
  chosen_spanish: no había logrado
  alternatives_spanish:
  - no había conseguido
  - no había alcanzado su propósito
  - no había tenido éxito
  lexicon: LSJ
  rationale: El participio indica fracaso en alcanzar el efecto previsto. «No había logrado» es natural en español y mantiene la idea de intento fallido sin añadir explicación excesiva.
- source_word: διὰ τὴν τοῦ ἀγῶνος σπουδήν
  english_pob_choice: because of the urgency of the struggle
  chosen_spanish: a causa de la urgencia de la lucha
  alternatives_spanish:
  - por la prisa de la contienda
  - por la premura del combate
  - a causa del apremio de la lucha
  lexicon: LSJ
  rationale: ἀγών aquí es lucha o combate, no «competencia» en español. σπουδή expresa urgencia o apremio. «Urgencia de la lucha» conserva ambos elementos con claridad.
- source_word: τῶν ὄχλων
  english_pob_choice: the crowds
  chosen_spanish: las multitudes
  alternatives_spanish:
  - las turbas
  - la gente
  - las muchedumbres
  lexicon: LSJ
  rationale: ὄχλοι designa una masa de personas. «Multitudes» es neutral y natural en español; evita el matiz más hostil de «turbas», que no siempre es necesario en la forma lexical.
- source_word: ἔσω τῶν θυρωμάτων εἰσβαλλόντων
  english_pob_choice: were rushing in within the gates
  chosen_spanish: irrumpían dentro de las puertas
  alternatives_spanish:
  - entraban dentro de las puertas
  - se metían por las puertas
  - forzaban la entrada por las puertas
  lexicon: LSJ
  rationale: El genitivo absoluto expresa entrada violenta o invasiva hacia el interior. «Irrumpían dentro de las puertas» conserva el movimiento y la fuerza del verbo sin volverlo torpe en español.
- source_word: ἀναδραμὼν γενναίως
  english_pob_choice: he ran up bravely
  chosen_spanish: subió valerosamente
  alternatives_spanish:
  - subió bravamente
  - corrió hacia arriba con valentía
  - ascendió con arrojo
  lexicon: LSJ
  rationale: ἀναδραμών implica movimiento ascendente rápido; en español, «subió» comunica la dirección con naturalidad. γενναίως se expresa con «valerosamente», que conserva la nota de valentía/nobleza.
- source_word: ἐπὶ τὸ τεῖχος
  english_pob_choice: onto the wall
  chosen_spanish: al muro
  alternatives_spanish:
  - sobre el muro
  - encima del muro
  - a la muralla
  lexicon: LSJ
  rationale: τεῖχος es una muralla o muro fortificado. «Al muro» permite un español fluido unido al verbo de movimiento; «muralla» sería viable, pero «muro» es suficientemente fiel y más directo.
- source_word: ἀπεκρήμνισεν ἑαυτόν
  english_pob_choice: hurled himself down
  chosen_spanish: se arrojó
  alternatives_spanish:
  - se precipitó
  - se lanzó
  - se tiró
  lexicon: LSJ
  rationale: El verbo expresa arrojarse desde una altura con fuerza. «Se arrojó» es fiel y sobrio; el adverbio y el contexto ya transmiten la violencia del acto.
- source_word: ἀνδρωδῶς
  english_pob_choice: manfully
  chosen_spanish: con hombría
  alternatives_spanish:
  - varonilmente
  - como hombre
  - con valentía
  lexicon: LSJ
  rationale: El adverbio griego tiene una carga explícitamente masculina. «Con hombría» conserva ese matiz de manera entendible en español sin perder la nota de coraje.
theological_decisions:
- issue: Carga masculina explícita de ἀνδρωδῶς
  english_pob_reading: manfully
  chosen_spanish_reading: con hombría
  alternative_spanish_readings:
  - varonilmente
  - courageously/valerosamente
  rationale: Se preserva la codificación masculina del adverbio griego, siguiendo la política de precisión de género del proyecto. No se neutraliza a «valerosamente» en el texto principal porque esa opción suavizaría una marca presente en el original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de πληγῇ en el contexto de un intento fallido
  english_pob_reading: in the blow
  chosen_spanish_reading: el golpe
  alternative_spanish_readings:
  - la herida
  - el golpe asestado
  rationale: No se reduce automáticamente a «herida» porque el contexto y la construcción con κατευκτήσας apuntan al acto del golpe y a su fracaso, no solo al estado resultante.
  doctrine_reference: LSJ; contexto narrativo de 2 Macabeos 14:43
- issue: ὄχλοι como masa de gente hostil
  english_pob_reading: the crowds
  chosen_spanish_reading: las multitudes
  alternative_spanish_readings:
  - las turbas
  - las muchedumbres
  rationale: «Multitudes» mantiene el valor colectivo sin forzar un término más peyorativo. La hostilidad está ya sugerida por el contexto narrativo, no necesita cargarse lexicalmente aquí.
  doctrine_reference: LSJ
translation_notes:
  revision_awareness: La redacción española sigue la última revisión del audit trail al preferir una expresión natural para ἔσω τῶν θυρωμάτων y mantiene el énfasis en el fracaso del golpe, la entrada apremiante de las multitudes, el ascenso al muro y el salto final con marca masculina. No se introdujeron cambios doctrinales ni se suavizó la tensión léxica documentada.
  spanish_consistency_notes:
  - Se usa puntuación moderna en español y se conserva la secuencia narrativa del griego.
  - Se mantiene el tono sobrio y público, adecuado para una traducción bíblica de lectura eclesial.
  - Se evita traducir mecánicamente por calcos ingleses cuando el español puede expresar mejor el movimiento ascendente y la irrupción.
  - Las notas al pie conservan las alternativas significativas del audit trail y no añaden interpretaciones externas.
