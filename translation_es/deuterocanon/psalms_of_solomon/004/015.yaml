base_translation:
  language: en
  yaml_path: translation/deuterocanon/psalms_of_solomon/004/015.yaml
  text: He was filled with this lawlessness[a], and his eyes were on another house, to destroy it with relentless words; his soul is not satisfied, like Hades[c][b], with all these things.
  footnotes:
  - marker: a
    text: Or 'another house.' The Greek οἶκος can refer either to a physical house or to a household/family sphere.
    reason: lexical_alternative
  - marker: b
    text: The phrase rendered 'with relentless words' is difficult; it may also mean 'with unhesitating words' or 'with words without delay.'
    reason: alternative_reading
  - marker: c
    text: '''Like Hades'' expresses insatiability; ''the grave'' or ''Sheol'' would be interpretive alternatives.'
    reason: lexical_alternative
