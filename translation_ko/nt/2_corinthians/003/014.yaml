id: 2CO.3.14
reference: 2 Corinthians 3:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ἀλλὰ ἐπωρώθη τὰ νοήματα αὐτῶν. ἄχρι γὰρ τῆς σήμερον ⸀ἡμέρας τὸ αὐτὸ κάλυμμα ἐπὶ τῇ ἀναγνώσει τῆς παλαιᾶς διαθήκης μένει μὴ ἀνακαλυπτόμενον, ⸀ὅτι ἐν Χριστῷ καταργεῖται,
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/003/014.yaml
  text: But their minds were hardened. For until this very day, at the reading of the old covenant, the same veil remains, not being lifted, because in Messiah it is removed.
  footnotes:
  - marker: a
    text: 'Or ''the old testament.'' Greek: ''the old covenant.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'because in Christ it is abolished / set aside.'
    reason: alternative_reading
translation:
  language: ko
  text: 그러나 그들의 생각이 완고하여졌습니다. 오늘날까지도 옛 언약을 읽을 때에 그 같은 베일이 그대로 남아 있어 벗겨지지 아니합니다. 그 베일은 오직 메시아 안에서만 폐하여지기 때문입니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐπωρώθη
  english_pob_choice: were hardened
  chosen_korean: 완고하여지다
  alternatives_korean:
  - 굳어지다
  - 둔하여지다
  lexicon: BDAG
  rationale: πωρόω는 「딱딱해지다·둔감해지다」. 한국어 「완고하여지다」.
- source_word: νοήματα
  english_pob_choice: minds
  chosen_korean: 생각
  alternatives_korean:
  - 마음
  lexicon: BDAG
  rationale: 2:11과 같은 어휘이나 본 문맥에서는 「생각·심중」.
- source_word: παλαιᾶς διαθήκης
  english_pob_choice: old covenant
  chosen_korean: 옛 언약
  alternatives_korean:
  - 구약
  lexicon: BDAG
  rationale: παλαιά διαθήκη가 「구약 (성서)」으로 굳어지기 전의 의미 — 모세 언약. 「옛 언약」으로 옮긴다.
- source_word: ἀνακαλυπτόμενον
  english_pob_choice: being lifted
  chosen_korean: 벗겨지다
  alternatives_korean:
  - 드러나다
  lexicon: BDAG
  rationale: ἀνακαλύπτω는 「베일을 벗기다」. 3:18과 어휘 일관성.
- source_word: καταργεῖται
  english_pob_choice: is removed
  chosen_korean: 폐하여지다
  alternatives_korean:
  - 끝나다
  - 무력화되다
  lexicon: BDAG
  rationale: 3:7, 3:11과 동일 동사. 본 문맥에서는 「폐하여지다」.
