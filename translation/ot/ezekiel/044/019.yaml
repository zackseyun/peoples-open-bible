id: EZK.44.19
reference: Ezekiel 44:19
source:
  edition: WLC
  text: וּ֠/בְ/צֵאתָ/ם אֶל הֶ/חָצֵ֨ר הַ/חִיצוֹנָ֜ה אֶל הֶ/חָצֵ֣ר הַ/חִיצוֹנָה֮ אֶל הָ/עָם֒ יִפְשְׁט֣וּ אֶת בִּגְדֵי/הֶ֗ם אֲשֶׁר הֵ֨מָּה֙ מְשָׁרְתִ֣ם בָּ֔/ם וְ/הִנִּ֥יחוּ אוֹתָ֖/ם בְּ/לִֽשְׁכֹ֣ת הַ/קֹּ֑דֶשׁ וְ/לָֽבְשׁוּ֙ בְּגָדִ֣ים אֲחֵרִ֔ים וְ/לֹֽא יְקַדְּשׁ֥וּ אֶת הָ/עָ֖ם בְּ/בִגְדֵי/הֶֽם־־־־־־־׃
translation:
  text: When they go out to the outer court[a], to the outer court where the people are, they shall take off their garments in which they minister and leave them in the holy chambers. Then they shall put on other garments[b], so that they may not make the people holy with their garments.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'sanctify the people' or 'consecrate the people' with their garments.
    reason: lexical_alternative
  - marker: b
    text: The repeated 'to the outer court' in Hebrew emphasizes movement from the priestly area into the court accessible to the people.
    reason: cultural_note
lexical_decisions:
- source_word: וּבְצֵאתָם
  chosen: When they go out
  alternatives:
  - And when they go out
  - As they go out
  lexicon: HALOT
  rationale: The prefixed conjunction plus infinitive construct with suffix introduces a temporal clause. 'When they go out' is natural English and preserves the temporal sense without over-paraphrase.
- source_word: הֶחָצֵר הַחִיצוֹנָה
  chosen: the outer court
  alternatives:
  - the outer courtyard
  lexicon: HALOT
  rationale: חָצֵר is 'court/courtyard'; 'court' is concise and standard in temple contexts. הַחִיצוֹנָה specifies the outer area.
- source_word: אֶל הֶחָצֵר הַחִיצוֹנָה אֶל הָעָם
  chosen: to the outer court where the people are
  alternatives:
  - to the outer court, to the people
  - into the outer court, to the people
  lexicon: HALOT
  rationale: The repeated אֶל marks movement toward the outer court, further specified as the area of the people. Rendering the second phrase as 'where the people are' communicates the appositional clarification in idiomatic English while retaining the distinction between priestly and public space.
- source_word: יִפְשְׁטוּ אֶת בִּגְדֵיהֶם
  chosen: they shall take off their garments
  alternatives:
  - they shall strip off their garments
  - they shall remove their garments
  lexicon: HALOT
  rationale: פשט in this clothing context means remove/take off. 'Take off' is clear modern English.
- source_word: אֲשֶׁר הֵמָּה מְשָׁרְתִם בָּם
  chosen: in which they minister
  alternatives:
  - with which they minister
  - in which they serve
  lexicon: HALOT
  rationale: שרת denotes ministering/service in cultic context. 'Minister' preserves the priestly/temple nuance better than the more generic 'serve.' The preposition ב is naturally rendered 'in' for garments worn while ministering.
- source_word: וְהִנִּיחוּ אוֹתָם
  chosen: and leave them
  alternatives:
  - and set them down
  - and place them
  lexicon: HALOT
  rationale: The verb means place/leave. In context of depositing garments in designated rooms, 'leave them' is idiomatic and sufficiently precise.
- source_word: בְּלִשְׁכֹת הַקֹּדֶשׁ
  chosen: in the holy chambers
  alternatives:
  - in the holy rooms
  - in the sacred chambers
  lexicon: HALOT
  rationale: לשכה refers to a chamber/room, often in temple architecture. 'Holy chambers' is a conventional and accurate rendering for consecrated temple rooms.
- source_word: וְלָבְשׁוּ בְּגָדִים אֲחֵרִים
  chosen: Then they shall put on other garments
  alternatives:
  - and they shall wear different garments
  lexicon: HALOT
  rationale: לבש means put on/wear. 'Put on' fits the sequence of changing clothes; 'other garments' reflects אֲחֵרִים straightforwardly.
- source_word: וְלֹא יְקַדְּשׁוּ אֶת הָעָם
  chosen: so that they may not make the people holy
  alternatives:
  - and they shall not sanctify the people
  - lest they consecrate the people
  lexicon: HALOT
  rationale: 'קדש in the piel means make holy/consecrate. The clause expresses purpose or prevention: the priests must change garments to avoid transmitting holiness to the people through contact. ''Make the people holy'' is accessible while preserving the cultic concept.'
- source_word: בְּבִגְדֵיהֶם
  chosen: with their garments
  alternatives:
  - by their garments
  - through their garments
  lexicon: HALOT
  rationale: The preposition ב here is instrumental/associative. 'With their garments' is natural English and leaves the mechanism broad enough to match the Hebrew.
