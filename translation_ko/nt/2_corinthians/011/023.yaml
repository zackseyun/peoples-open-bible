base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/011/023.yaml
  text: 'Are they servants of Messiah? I am speaking as if insane: I am more so—in labors more abundantly[a], in imprisonments more abundantly, in beatings beyond measure[b], in deaths often.'
translation:
  language: ko
  text: 그들이 메시아의 일꾼입니까? 내가 정신 나간 사람처럼 말합니다. 나는 더 그렇습니다—수고에서 더욱 많이, 옥에 갇히는 일에서 더욱 많이, 매 맞는 일에서는 한없이 많이, 죽을 뻔한 일에서 자주 그러했습니다.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: διάκονοι Χριστοῦ
  english_pob_choice: servants of Messiah
  chosen_korean: 메시아의 일꾼
  lexicon: BDAG
  rationale: '칭호 보존. 11:15와 같이 「일꾼」 일관.'
  alternatives_korean:
  - 그리스도의 일꾼
- source_word: παραφρονῶν
  english_pob_choice: as if insane
  chosen_korean: 정신 나간 사람처럼
  lexicon: BDAG
  rationale: 분사 「정신 나가서」. 자조적 어조.
  alternatives_korean:
  - 미친 사람처럼
- source_word: κόποις
  english_pob_choice: labors
  chosen_korean: 수고
  lexicon: BDAG
  rationale: 표준.
- source_word: φυλακαῖς
  english_pob_choice: imprisonments
  chosen_korean: 옥에 갇히는 일
  lexicon: BDAG
  rationale: 명사 「감옥」. 동작 의미로 풀어 옮긴다.
- source_word: πληγαῖς
  english_pob_choice: beatings
  chosen_korean: 매 맞는 일
  lexicon: BDAG
  rationale: 명사 「매질」. 풀어 옮긴다.
- source_word: θανάτοις
  english_pob_choice: deaths
  chosen_korean: 죽을 뻔한 일
  lexicon: BDAG
  rationale: 복수형은 「죽음의 위기들」. 「죽을 뻔한 일」이 의미를 분명히.
