id: 2CH.6.4
reference: 2 Chronicles 6:4
source:
  edition: WLC
  text: וַ/יֹּ֗אמֶר בָּר֤וּךְ יְהוָה֙ אֱלֹהֵ֣י יִשְׂרָאֵ֔ל אֲשֶׁר֙ דִּבֶּ֣ר בְּ/פִ֔י/ו אֵ֖ת דָּוִ֣יד אָבִ֑/י וּ/בְ/יָדָ֥י/ו מִלֵּ֖א לֵ/אמֹֽר׃
translation:
  text: And he said[a], “Blessed be Yahweh, the God of Israel, who spoke with his mouth to David my father and has fulfilled it by his hand, saying,”
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'spoke by his mouth to David my father and by his hand fulfilled it.' The Hebrew preserves a deliberate parallel between God's speaking and acting.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  chosen: And he said
  alternatives:
  - Then he said
  lexicon: HALOT
  rationale: Standard narrative wayyiqtol introducing Solomon's speech. 'And he said' preserves the Hebrew narrative flow without overinterpreting sequence.
- source_word: בָּרוּךְ
  chosen: Blessed be
  alternatives:
  - Blessed is
  - Praised be
  lexicon: HALOT
  rationale: A conventional benedictory formula directed toward God. 'Blessed be' best matches the Hebrew passive participial exclamation in elevated but still natural English.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  chosen: the God of Israel
  lexicon: HALOT
  rationale: Construct chain straightforwardly rendered as covenant title identifying the LORD in relation to Israel.
- source_word: אֲשֶׁר
  chosen: who
  alternatives:
  - that
  lexicon: HALOT
  rationale: Relative pronoun referring to the LORD; 'who' is idiomatic for a personal antecedent in English.
- source_word: דִּבֶּר בְּפִיו
  chosen: spoke with his mouth
  alternatives:
  - spoke by his mouth
  - spoke
  lexicon: HALOT
  rationale: The Hebrew explicitly uses the anthropomorphic idiom 'with/by his mouth.' Retaining 'with his mouth' preserves the parallel with 'with his hand' in the next clause and highlights the speech-act/fulfillment contrast.
- source_word: אֵת דָּוִיד אָבִי
  chosen: to David my father
  alternatives:
  - with David my father
  lexicon: HALOT
  rationale: With דבר, the marked object here functions as the person addressed in context. 'To David my father' is the clearest English rendering and matches the sense of divine promise spoken to David.
- source_word: וּבְיָדוֹ מִלֵּא
  chosen: and has fulfilled it with his hand
  alternatives:
  - and by his hand has fulfilled it
  - and has carried it out with his hand
  lexicon: HALOT
  rationale: The idiom contrasts God's speaking and acting. Although the direct object is implicit in Hebrew, English requires 'it,' referring to what he spoke. 'Fulfilled' fits covenant-promise language well.
- source_word: לֵאמֹר
  chosen: saying
  alternatives:
  - when he said
  lexicon: HALOT
  rationale: Standard quotative infinitive introducing the content of the divine speech in the following verse.
