translation:
  language: es
  text: 'Entonces el rey se puso de pie junto a la columna y hizo el pacto delante de Yahvé: para andar tras Yahvé, y para guardar sus mandamientos, sus testimonios y sus estatutos con todo su corazón y con toda su alma, para cumplir las palabras de este pacto, escritas en este libro[a]. Y todo el pueblo entró en el pacto[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'escritas en este rollo'. El hebreo puede referirse a un libro, un rollo o un documento.
    reason: alternative_reading
  - marker: b
    text: Lit. 'se puso de pie en el pacto'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲמֹד ... עַל הָעַמּוּד
  english_pob_choice: stood by the pillar
  chosen_spanish: se puso de pie junto a la columna
  alternatives_spanish:
  - estuvo junto a la columna
  - se puso de pie en la columna
  lexicon: HALOT
  rationale: עָמַד en este contexto indica la postura de estar de pie, y עַל puede funcionar con valor locativo amplio. En español, 'junto a la columna' comunica bien la ubicación ceremonial sin sugerir literalmente que estaba encima de ella. 'Columna' conserva la imagen concreta del lugar real o ceremonial.
- source_word: וַיִּכְרֹת אֶת־הַבְּרִית
  english_pob_choice: made the covenant
  chosen_spanish: hizo el pacto
  alternatives_spanish:
  - selló el pacto
  - hizo un pacto
  - cortó el pacto
  lexicon: HALOT
  rationale: כרת ברית es un modismo fijo para concertar un pacto. 'Hizo el pacto' suena natural en español y conserva el acto formal de ratificación. 'Pacto' mantiene el registro bíblico; 'cortó el pacto' sería más literal, pero menos idiomático para la lectura pública.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - en presencia de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: לִפְנֵי expresa estar delante o en presencia de. 'Delante de Yahvé' conserva la solemnidad del acto pactal y sigue el principio del proyecto de nombrar el Tetragrámaton como 'Yahvé'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
  rationale: Se mantiene 'Yahvé' como forma principal del nombre divino, conforme a la terminología del proyecto, en lugar de sustituirlo por un título como 'Señor'.
- source_word: לָלֶכֶת אַחַר יְהוָה
  english_pob_choice: to walk after Yahweh
  chosen_spanish: para andar tras Yahvé
  alternatives_spanish:
  - para seguir a Yahvé
  - para caminar detrás de Yahvé
  lexicon: HALOT
  rationale: El hebreo conserva la imagen de 'andar tras'. 'Andar tras Yahvé' reproduce esa metáfora del compromiso de obediencia y seguimiento. 'Seguir a Yahvé' es posible, pero pierde parte de la imagen verbal.
- source_word: וְלִשְׁמֹר
  english_pob_choice: to keep
  chosen_spanish: para guardar
  alternatives_spanish:
  - para observar
  - para obedecer
  lexicon: HALOT
  rationale: En contextos legales y pactales, שׁמר significa 'guardar' u 'observar'. 'Guardar' es natural y mantiene el sentido de custodiar fielmente la ley.
- source_word: מִצְוֺתָיו
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus órdenes
  - sus preceptos
  lexicon: HALOT
  rationale: מִצְוָה se refiere a mandamientos o preceptos. 'Mandamientos' es el equivalente más transparente en español y encaja con el resto de la tríada legal.
- source_word: עֵדְוֺתָיו
  english_pob_choice: his testimonies
  chosen_spanish: sus testimonios
  alternatives_spanish:
  - sus estatutos
  - sus decretos
  - sus testimonios legales
  lexicon: HALOT
  rationale: Se conserva 'testimonios' para mantener la distinción léxica con mandamientos y estatutos. Aunque es menos frecuente en español moderno, refleja bien el término técnico del texto.
- source_word: חֻקֹּתָיו
  english_pob_choice: his statutes
  chosen_spanish: sus estatutos
  alternatives_spanish:
  - sus decretos
  - sus ordenanzas
  lexicon: HALOT
  rationale: חֻקִּים designa disposiciones fijas o estatutarias. 'Estatutos' mantiene el paralelo con el vocabulario bíblico tradicional y distingue este término de 'mandamientos'.
- source_word: בְּכָל לֵב וּבְכָל נֶפֶשׁ
  english_pob_choice: with all his heart and with all his soul
  chosen_spanish: con todo su corazón y con toda su alma
  alternatives_spanish:
  - con todo su corazón y con todo su ser
  lexicon: HALOT
  rationale: Se preserva la fórmula antropológica tradicional. 'Corazón' y 'alma' reflejan el hebreo sin diluir נֶפֶשׁ en una paráfrasis abstracta.
- source_word: לְהָקִים
  english_pob_choice: to carry out
  chosen_spanish: para cumplir
  alternatives_spanish:
  - para establecer
  - para realizar
  - para poner por obra
  lexicon: HALOT
  rationale: En este contexto, לְהָקִים expresa llevar a efecto lo pactado. 'Cumplir' comunica con claridad el sentido práctico de hacer efectivas las palabras del pacto.
- source_word: דִּבְרֵי הַבְּרִית הַזֹּאת
  english_pob_choice: the words of this covenant
  chosen_spanish: las palabras de este pacto
  alternatives_spanish:
  - los términos de este pacto
  - las disposiciones de este pacto
  lexicon: HALOT
  rationale: דִּבְרֵי son literalmente 'palabras'. 'Pacto' se usa aquí para ברית por su naturalidad en español y por el registro solemne del pasaje; 'palabras' preserva el énfasis en el contenido escrito del acuerdo.
- source_word: הַכְּתֻבִים עַל הַסֵּפֶר הַזֶּה
  english_pob_choice: that were written in this book
  chosen_spanish: escritas en este libro
  alternatives_spanish:
  - escritas en este rollo
  - escritas en este documento
  lexicon: HALOT
  rationale: סֵפֶר puede significar libro, rollo o documento. 'Libro' es claro y natural en español, mientras que la nota preserva la posibilidad de 'rollo' si se desea resaltar el soporte material antiguo.
- source_word: וַיַּעֲמֹד כָּל הָעָם בַּבְּרִית
  english_pob_choice: And all the people entered into the covenant
  chosen_spanish: Y todo el pueblo se comprometió en el pacto
  alternatives_spanish:
  - Y todo el pueblo estuvo en el pacto
  - Y todo el pueblo se puso en el pacto
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'se puso de pie en el pacto', una forma idiomática de adhesión comunitaria. 'Se comprometió en el pacto' expresa esa ratificación colectiva de manera natural en español, sin perder el sentido de compromiso público.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se sigue la convención del proyecto de traducir el Tetragrámaton como 'Yahvé', manteniendo el nombre personal del Dios del pacto en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido del cierre comunitario del pacto en וַיַּעֲמֹד כָּל־הָעָם בַּבְּרִית
  english_pob_reading: And all the people entered into the covenant
  chosen_spanish_reading: Y todo el pueblo se comprometió en el pacto
  alternative_spanish_readings:
  - Y todo el pueblo entró en el pacto
  - Y todo el pueblo se mantuvo en el pacto
  rationale: La frase hebrea es idiomática y describe la aceptación solemne del pacto por parte del pueblo. 'Se comprometió' comunica esa adhesión sin perder la dimensión comunitaria y jurídica del acto; una opción más literal se conserva como alternativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el audit trail inglés. Se conserva la tríada legal ('mandamientos, testimonios y estatutos'), el nombre divino como Yahvé, y la imagen idiomática de 'andar tras' con una nota explicativa. No se detectaron revisiones posteriores que obliguen a cambiar la redacción base.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en todo el versículo.
  - Se usa 'pacto' para ברית en un registro bíblico natural y consistente.
  - Se preserva la distinción entre 'mandamientos', 'testimonios' y 'estatutos'.
  - La referencia al soporte escrito se deja como 'libro', con nota para 'rollo'.
  - '''Corazón'' y ''alma'' conservan la fórmula antropológica tradicional sin neutralizarla.'
