theological_decisions:
- issue: Metaphorical force of נְחֻשְׁתֵּךְ in a prostitution/idolatry context
  chosen_reading: Retain the literal lexical value 'your bronze' in the main text and allow readers to infer metaphorical overtones of wealth/payment/shame from context.
  alternative_readings:
  - your wealth
  - your lewdness
  rationale: The Hebrew noun's plain sense is 'bronze/copper.' Because the context is metaphorically dense and commentators differ on whether this refers to wealth spent on lovers or to a figurative bodily discharge/shame, the translation preserves the source image rather than collapsing it into one interpretation. This follows the doctrine's principle of preserving tension rather than over-resolving ambiguity.
  doctrine_reference: Translation philosophy §3; §5
- issue: Rendering of child-sacrifice language
  chosen_reading: Translate literally as 'the blood of your children that you gave to them.'
  alternative_readings:
  - the blood of your children whom you sacrificed to them
  - the blood of your children whom you offered to those idols
  rationale: The context clearly implies child sacrifice to idols, but the Hebrew says 'gave.' The main text preserves that wording while the lexical decision documents the sacrificial implication. This avoids importing more than the text explicitly states while still acknowledging the context.
  doctrine_reference: Translation philosophy §1; §3
