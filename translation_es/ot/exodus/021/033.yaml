translation:
  language: es
  text: Y si un hombre abre una fosa[a], o si un hombre cava una fosa y no la cubre, y cae en ella un buey o un asno[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descubre una fosa» para la primera cláusula; el verbo hebreo dice literalmente «abre» y puede referirse a dejar abierta una fosa ya existente, no a cavar una nueva.
    reason: lexical_alternative
  - marker: b
    text: «Un hombre» traduce la fórmula hebrea masculina singular אישׁ, usada de manera genérica en la ley casuística.
    reason: cultural_note
lexical_decisions:
- source_word: וְכִי
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Si
  - Y cuando
  lexicon: HALOT
  rationale: En la ley casuística hebrea, la combinación introduce una nueva situación condicional. «Y si» conserva el enlace con la sección anterior y suena natural en español jurídico.
- source_word: יִפְתַּח
  english_pob_choice: opens
  chosen_spanish: abre
  alternatives_spanish:
  - descubre
  - desocupa
  lexicon: HALOT
  rationale: El verbo básico es «abrir». En este contexto puede referirse a dejar expuesto un pozo ya existente; por eso se evita traducirlo como «cavar».
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - alguien
  - una persona
  lexicon: HALOT
  rationale: La fórmula legal usa el singular masculino de manera genérica. «Un hombre» preserva esa forma sin forzar una neutralización que borre la redacción fuente.
- source_word: בּוֹר
  english_pob_choice: a pit
  chosen_spanish: un pozo
  alternatives_spanish:
  - una fosa
  - un hoyo
  lexicon: HALOT
  rationale: «Pozo» es el equivalente español más natural para un hoyo excavado con riesgo para animales. «Fosa» o «hoyo» son posibles, pero aquí «pozo» comunica mejor la imagen legal.
- source_word: וְכִי ... א֠וֹ כִּי
  english_pob_choice: or if
  chosen_spanish: o si
  alternatives_spanish:
  - o cuando
  - o en caso de que
  lexicon: HALOT
  rationale: La segunda cláusula presenta un caso alternativo paralelo al primero. «O si» mantiene la estructura casuística y la alternancia del hebreo.
- source_word: יִכְרֶה
  english_pob_choice: digs
  chosen_spanish: cava
  alternatives_spanish:
  - excava
  - abre
  lexicon: HALOT
  rationale: 'Aquí el verbo contrasta con «abre» de la primera cláusula: se trata de hacer un pozo nuevo. «Cava» expresa de forma directa y clara esa acción.'
- source_word: וְלֹא יְכַסֶּנּוּ
  english_pob_choice: and does not cover it
  chosen_spanish: y no lo cubre
  alternatives_spanish:
  - y no lo tapa
  - y no lo oculta
  lexicon: HALOT
  rationale: El verbo se refiere a cubrir físicamente la abertura. «Cubrir» conserva la fuerza legal de la obligación de seguridad; «tapar» es posible, pero menos formal.
- source_word: וְנָפַל
  english_pob_choice: and ... falls
  chosen_spanish: y cae
  alternatives_spanish:
  - y cae allí
  - y cae en él
  lexicon: HALOT
  rationale: 'Aunque la forma hebrea continúa la escena como consecuencia legal, en español la secuencia fluye mejor con presente narrativo-jurídico: «y cae».'
- source_word: שָׁמָּה
  english_pob_choice: into it
  chosen_spanish: en él
  alternatives_spanish:
  - allí
  - dentro de él
  lexicon: HALOT
  rationale: 'La referencia direccional se expresa de manera natural en español con el pronombre preposicional: «en él». Es más idiomático que traducir literalmente «allí».'
- source_word: שׁוֹר
  english_pob_choice: an ox
  chosen_spanish: un buey
  alternatives_spanish:
  - un toro
  - un novillo
  lexicon: HALOT
  rationale: «Buey» es un término claro y tradicional para el bovino en este tipo de ley. Aunque «ox» puede ser «buey» o «buey de labor», el contexto legal admite esta equivalencia amplia.
- source_word: א֥וֹ חֲמוֹר
  english_pob_choice: or a donkey
  chosen_spanish: o un asno
  alternatives_spanish:
  - o un burro
  - o un pollino
  lexicon: HALOT
  rationale: «Asno» corresponde bien al registro bíblico y mantiene la pareja tradicional con «buey». «Burro» es más coloquial; «asno» es más digno y preciso en este contexto legal.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la auditoría inglesa: conserva la distinción entre «abre» y «cava», mantiene la cláusula alternativa con «o si», y respeta la formulación legal genérica de אישׁ. No se registran revisiones posteriores que alteren el sentido base.'
  spanish_consistency_notes:
  - Se mantiene «pozo» de forma consistente para בור en ambos miembros de la cláusula.
  - Se conserva el paralelismo legal con presente jurídico («abre / cava / cubre / cae»).
  - Se usa «buey» y «asno» como pares léxicos sobrios y bíblicamente estables, adecuados al registro del versículo.
