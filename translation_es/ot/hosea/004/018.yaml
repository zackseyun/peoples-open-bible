revisions:
- from: Cuando su bebida se ha ido[a], se entregan a la prostitución; sus escudos aman la vergüenza[b][c].
  to: Cuando su bebida se ha acabado[a], se entregan a la prostitución; sus escudos aman profundamente la vergüenza[b][c].
  rationale: Se corrige un calco poco natural («se ha ido» → «se ha acabado»), se repara el error gramatical en la nota a («se ha agriado»), y se añade un intensificador natural («profundamente») para reflejar mejor la fuerza del cierre según el audit trail inglés, sin abandonar la cautela ante el hebreo difícil. Se conservan «prostitución» y «escudos» conforme a las decisiones léxicas y teológicas documentadas.
