translation:
  language: es
  text: Tocad la trompeta en la luna nueva, en la luna llena[a], en el día de nuestra fiesta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la luna cubierta» o «en el tiempo señalado». El término hebreo כֵּסֶה es debatido; se adopta «luna llena» porque encaja con el paralelismo calendárico con «luna nueva» y con el contexto de la fiesta.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּקְעוּ
  english_pob_choice: Blow
  chosen_spanish: Tocad
  alternatives_spanish:
  - Haced sonar
  - Tocad el cuerno
  lexicon: HALOT
  rationale: El imperativo plural de תקע en contexto de shofar exige una orden de hacer sonar el instrumento. «Tocad» mantiene la fuerza imperativa y es natural en español bíblico; «haced sonar» explicita el acto, pero resulta más pesado.
- source_word: בַחֹדֶשׁ
  english_pob_choice: at the new moon
  chosen_spanish: en la luna nueva
  alternatives_spanish:
  - en el novilunio
  - en el mes
  - al comenzar el mes
  lexicon: HALOT
  rationale: En el marco calendárico y en paralelo con כֵּסֶה, la expresión apunta mejor a la luna nueva que a «mes». «Luna nueva» es clara en español y conserva el valor ritual del término.
- source_word: שׁוֹפָר
  english_pob_choice: trumpet
  chosen_spanish: cuerno
  alternatives_spanish:
  - trompeta
  - shofar
  - cuerno de carnero
  lexicon: HALOT
  rationale: שׁוֹפָר designa el cuerno usado para señales cultuales. «Cuerno» traduce el objeto con más sobriedad y evita una transliteración innecesaria; «trompeta» puede sonar demasiado genérica y moderna.
- source_word: בַּכֵּסֶה
  english_pob_choice: at the full moon
  chosen_spanish: en la luna llena
  alternatives_spanish:
  - en la luna cubierta
  - en el tiempo señalado
  lexicon: HALOT
  rationale: El término es debatido, pero en el paralelismo con «luna nueva» y el contexto festivo, «luna llena» ofrece la lectura más probable y legible en español. Se preserva la tensión interpretativa mediante nota.
- source_word: לְיוֹם
  english_pob_choice: on the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - para el día de
  - para el día
  lexicon: HALOT
  rationale: La preposición ל aquí expresa relación temporal/festiva. «En el día de» suena natural en español y mantiene el vínculo con la celebración.
- source_word: חַגֵּנוּ
  english_pob_choice: our feast
  chosen_spanish: nuestra fiesta
  alternatives_spanish:
  - nuestra fiesta solemne
  - nuestra festividad
  - nuestra celebración
  lexicon: HALOT
  rationale: חַג refiere a una fiesta cultual o festividad. «Fiesta» es transparente y bíblicamente apropiada en español; «fiesta solemne» agrega tono litúrgico, pero no es necesario aquí.
theological_decisions:
- issue: Valor de בַּכֵּסֶה en la secuencia calendárica
  english_pob_reading: at the full moon
  chosen_spanish_reading: en la luna llena
  alternative_spanish_readings:
  - en la luna cubierta
  - en el tiempo señalado
  rationale: Es una decisión principalmente léxica e interpretativa. En el paralelismo con «luna nueva» y en relación con una fiesta, «luna llena» mantiene coherencia poética y sigue la solución adoptada por la POB en inglés, preservando la ambigüedad original en nota.
  doctrine_reference: Translation philosophy §3 (preservar tensiones interpretativas genuinas)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la solución revisada y confirmada del texto base en inglés: se mantiene la lectura calendárica de כֵּסֶה como «luna llena», con la alternativa preservada en nota, sin introducir cambios textuales adicionales.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se eligió «cuerno» para שׁוֹפָר por fidelidad léxica y naturalidad; aunque «trompeta» es posible, aquí el objeto cultual del shofar favorece el sustantivo más concreto.
  - «Luna nueva» y «luna llena» conservan el paralelismo poético del hebreo y la lectura adoptada en la tradición auditada de la POB.
