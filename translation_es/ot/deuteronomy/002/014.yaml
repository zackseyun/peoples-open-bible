translation:
  language: es
  text: Y los días que viajamos desde Cades-barnea hasta que cruzamos el wadi[a] de Zered fueron treinta y ocho años, hasta que toda la generación de los hombres de guerra llegó a su fin de en medio del campamento, tal como Yahvé les había jurado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arroyo de Zered». El hebreo נַחַל puede denotar un wadi, cauce estacional o arroyo; «wadi» refleja con mayor precisión la geografía regional.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַיָּמִים
  english_pob_choice: And the days
  chosen_spanish: Y los días
  alternatives_spanish:
  - Y el tiempo
  - Y los días de
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'y los días'; en español, conservar 'los días' mantiene la imagen temporal concreta que la revisión inglesa recuperó frente a 'time'.
- source_word: הָלַכְנוּ
  english_pob_choice: we traveled
  chosen_spanish: viajamos
  alternatives_spanish:
  - anduvimos
  - recorrimos
  lexicon: HALOT
  rationale: En contexto itinerante, 'viajamos' comunica un desplazamiento prolongado sin sonar forzado, y preserva el sentido de recorrido histórico.
- source_word: מִקָּדֵשׁ בַּרְנֵעַ
  english_pob_choice: from Kadesh-barnea
  chosen_spanish: desde Cades-barnea
  alternatives_spanish:
  - desde Cadés-barnea
  - desde Cades Barnea
  lexicon: HALOT
  rationale: Se mantiene el topónimo compuesto en forma reconocible y de lectura eclesial amplia; 'Cades' respeta una transliteración natural al español.
- source_word: עַד אֲשֶׁר עָבַרְנוּ
  english_pob_choice: until we crossed
  chosen_spanish: hasta que cruzamos
  alternatives_spanish:
  - hasta que pasamos
  - hasta cruzar
  lexicon: HALOT
  rationale: Para un curso de agua, 'cruzamos' expresa bien עבר sin perder idiomaticidad en español.
- source_word: נַחַל זֶרֶד
  english_pob_choice: the Wadi Zered
  chosen_spanish: el valle[a] de Zered
  alternatives_spanish:
  - el wadi Zered
  - el torrente Zered
  - el arroyo Zered
  lexicon: HALOT
  rationale: '''Nájal'' puede referirse a wadi, cauce o arroyo estacional. Aquí se optó por ''valle'' como solución de lectura natural en español, pero la nota indica que el término hebreo también puede entenderse como ''wadi'' o ''arroyo'' según el contexto geográfico.'
- source_word: שְׁלֹשִׁים וּשְׁמֹנֶה שָׁנָה
  english_pob_choice: thirty-eight years
  chosen_spanish: treinta y ocho años
  alternatives_spanish:
  - treinta y ocho años y
  lexicon: HALOT
  rationale: Equivalente numérico directo y natural en español.
- source_word: עַד תֹּם
  english_pob_choice: until ... had come to an end
  chosen_spanish: hasta que ... fue acabando
  alternatives_spanish:
  - hasta que ... llegó a su fin
  - hasta que ... terminó
  lexicon: HALOT
  rationale: Se conserva la idea de proceso de consumación; 'fue acabando' intenta reflejar el valor aspectual de un fin progresivo, no meramente puntual.
- source_word: כָּל הַדּוֹר
  english_pob_choice: the entire generation
  chosen_spanish: toda la generación
  alternatives_spanish:
  - la generación entera
  - toda esa generación
  lexicon: HALOT
  rationale: Equivale de manera directa y mantiene el alcance colectivo completo.
- source_word: אַנְשֵׁי הַמִּלְחָמָה
  english_pob_choice: the men of war
  chosen_spanish: los hombres de guerra
  alternatives_spanish:
  - los guerreros
  - los varones de guerra
  lexicon: HALOT
  rationale: Se conserva la explicitud masculina del hebreo y la fuerza literal de la construcción; 'hombres de guerra' es transparente y acorde con el registro bíblico.
- source_word: מִקֶּרֶב הַמַּחֲנֶה
  english_pob_choice: from the midst of the camp
  chosen_spanish: de en medio del campamento
  alternatives_spanish:
  - del medio del campamento
  - de entre el campamento
  lexicon: HALOT
  rationale: '''De en medio'' refleja bien la idiomatización hebrea de ''from the midst'' y sugiere expulsión o desaparición desde el centro del grupo.'
- source_word: כַּאֲשֶׁר נִשְׁבַּע יְהוָה לָהֶם
  english_pob_choice: just as Yahweh had sworn to them
  chosen_spanish: tal como Yahvé les había jurado
  alternatives_spanish:
  - tal como Yahvé les había jurado bajo juramento
  - como Yahvé les había jurado
  lexicon: HALOT
  rationale: Se usa 'Yahvé' según la terminología del proyecto para el Tetragrámaton; 'les había jurado' preserva el lenguaje de juramento explícito del hebreo y la relación de promesa cumplida.
theological_decisions:
- issue: Renderización del nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa יְהוָה directamente. En este proyecto, la forma española principal es 'Yahvé', que conserva el nombre del pacto sin sustituirlo por un título en mayúsculas.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Imagen geográfica de נַחַל זֶרֶד
  english_pob_reading: Wadi Zered / brook Zered
  chosen_spanish_reading: valle de Zered con nota sobre wadi/arroyo
  alternative_spanish_readings:
  - wadi de Zered
  - arroyo Zered
  - torrente Zered
  rationale: La POB inglesa marcó la ambigüedad léxica de נַחַל con nota. En español, 'valle' es legible, pero la nota preserva que el término puede designar un cauce estacional o arroyo; así no se borra la tensión geográfica del término original.
  doctrine_reference: Principio POB de conservar alternativas relevantes sin aplanar la evidencia léxica
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió 'time' a 'days' para acercarse más al hebreo. La versión española sigue esa corrección con 'los días' y mantiene la estructura temporal iterativa del original. También conserva la lectura de juramento divino y la referencia geográfica ambigua de נַחַל mediante nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה, conforme a la terminología del proyecto.
  - Se preserva la masculinidad explícita de 'אַנְשֵׁי הַמִּלְחָמָה' como 'los hombres de guerra'.
  - '''Cades-barnea'' mantiene el topónimo compuesto con grafía española estable y sin descomponerlo.'
  - La nota sobre '[a]' está anclada directamente en 'valle[a]' para cumplir la trazabilidad de la alternativa léxica.
