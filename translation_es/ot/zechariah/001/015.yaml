translation:
  language: es
  text: Y estoy muy enojado[a] contra las naciones que están confiadas[b]; porque yo estaba enojado solo un poco[c], pero ellas agravaron la calamidad[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con gran ira»; el hebreo también puede expresarse como «con gran indignación».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que están a sus anchas» o «complacientes»; el hebreo expresa seguridad despreocupada.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «yo estaba enojado por poco tiempo»; el hebreo puede leerse como duración limitada, aunque aquí encaja mejor el contraste de grado.'
    reason: alternative_reading
  - marker: d
    text: 'Literalmente: «ayudaron hacia el mal», es decir, intensificaron o agravaron la calamidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/קֶצֶף גָּדוֹל
  english_pob_choice: exceedingly angry
  chosen_spanish: tengo gran indignación
  alternatives_spanish:
  - estoy muy enojado
  - estoy lleno de gran ira
  - tengo gran enojo
  lexicon: HALOT
  rationale: קֶצֶף con גָּדוֹל intensifica la ira divina. En español, 'tengo gran indignación' conserva la fuerza del sustantivo y evita una repetición demasiado mecánica de 'enojado', manteniendo un registro digno y natural.
- source_word: קֹצֵף
  english_pob_choice: am ... angry
  chosen_spanish: tengo... indignación
  alternatives_spanish:
  - estoy enojado
  - estoy airado
  - estoy indignado
  lexicon: HALOT
  rationale: El participio expresa un estado presente o continuo. 'Tengo gran indignación' transmite una disposición activa y solemne, y permite conservar el paralelismo con la expresión intensificadora del hebreo.
- source_word: הַגּוֹיִם
  english_pob_choice: the nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - las naciones gentiles
  lexicon: HALOT
  rationale: גּוֹיִם aquí designa a los pueblos extranjeros en contraste con Judá. 'Las naciones' es la opción más directa y fiel, sin introducir un término más técnico como 'gentiles' que no está exigido por el contexto.
- source_word: הַשַּׁאֲנַנִּים
  english_pob_choice: that are at ease
  chosen_spanish: que están en reposo
  alternatives_spanish:
  - que están a gusto
  - que viven confiadas
  - que están tranquilas
  lexicon: HALOT
  rationale: El adjetivo comunica seguridad despreocupada. 'En reposo' conserva la idea de quietud y desahogo; 'tranquilas' o 'confiadas' serían posibles, pero podrían desplazar el matiz hacia estado emocional o psicológico más que hacia una situación de seguridad.
- source_word: אֲשֶׁר
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - por cuanto
  lexicon: HALOT
  rationale: Aunque formalmente es relativo, aquí introduce la base causal de la indignación divina. 'Porque' comunica con claridad la relación causal en español.
- source_word: קָצַפְתִּי מְּעָט
  english_pob_choice: I was only a little angry
  chosen_spanish: yo estaba enojado sólo un poco
  alternatives_spanish:
  - yo estaba enojado por poco tiempo
  - yo estaba apenas enojado
  - yo estaba enojado un poco
  lexicon: HALOT
  rationale: מְּעָט aquí expresa medida/grado, no necesariamente duración. 'Sólo un poco' preserva el contraste con la acción excesiva de las naciones y mantiene abierta la tensión entre grado y posible brevedad sin resolverla de forma unilateral.
- source_word: וְהֵמָּה
  english_pob_choice: but they
  chosen_spanish: pero ellas
  alternatives_spanish:
  - y ellas
  - sin embargo ellas
  lexicon: HALOT
  rationale: El pronombre es enfático y el contexto es adversativo. 'Pero ellas' reproduce el contraste con la limitación de la ira divina; se usa el femenino plural concordando con 'naciones'.
- source_word: עָזְרוּ לְרָעָה
  english_pob_choice: helped forward the disaster
  chosen_spanish: ayudaron al mal
  alternatives_spanish:
  - favorecieron el mal
  - contribuyeron al desastre
  - ayudaron a la calamidad
  lexicon: HALOT
  rationale: La expresión hebrea indica que intensificaron o promovieron el resultado malo. 'Ayudaron al mal' conserva la literalidad de la construcción y deja visible la tensión semántica; en español puede sonar un poco general, pero es suficientemente fiel y transparente. La nota aclara el sentido intensivo.
theological_decisions:
- issue: Intensidad de la ira divina frente a la acción de las naciones
  english_pob_reading: The verse distinguishes between God's limited anger toward his people and the nations' excessive participation in bringing calamity.
  chosen_spanish_reading: El versículo distingue entre la indignación limitada de Dios y la participación excesiva de las naciones en el mal que sobrevino.
  alternative_spanish_readings:
  - Las naciones ejecutaron simplemente el juicio de Dios
  - el hebreo se debe entender principalmente como una ira de corta duración
  rationale: 'La estructura contrastiva del hebreo debe mantenerse: Dios estuvo enojado ''sólo un poco'', pero las naciones agravaron el resultado. La traducción no suaviza la agencia divina ni exculpa a las naciones; conserva la tensión teológica del texto.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue el estado más reciente del texto fuente y del audit trail inglés, sin revisiones pendientes; se conserva la tensión entre grado y posible duración en מְּעָט y la fuerza intensiva de קֶצֶף גָּדוֹל.
  spanish_consistency_notes:
  - Se usa 'Dios' sin ocultar el nombre divino porque el versículo habla en primera persona divina; no aparece YHWH explícito en el hebreo de este versículo.
  - '''Las naciones'' mantiene el plural concreto del hebreo y evita introducir un contraste técnico innecesario.'
  - Se conservó la fuerza adversativa de 'pero' para וְהֵמָּה, coherente con el audit trail inglés.
  - Se prefirió 'mal' en la línea principal por fidelidad a la construcción; la nota explica que el sentido es el de calamidad agravada.
