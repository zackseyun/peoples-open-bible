  text: καὶ οὐκ ἔδωκεν αὐτῷ κληρονομίαν ἐν αὐτῇ οὐδὲ βῆμα ποδός, καὶ ἐπηγγείλατο δοῦναι αὐτῷ εἰς κατάσχεσιν αὐτὴν καὶ τῷ σπέρματι αὐτοῦ μετ’ αὐτόν, οὐκ ὄντος αὐτῷ τέκνου.
base_translation:
  language: en
  yaml_path: translation/nt/acts/007/005.yaml
  text: And he gave him no inheritance in it[a], not even a foot's length, but promised to give it to him as a possession, and to his offspring after him[b], though he had no child.
  footnotes:
  - marker: a
    text: Or, "not even a foot of ground." The Greek expression is an idiom for the smallest possible portion of land.
    reason: lexical_alternative
  - marker: b
    text: Or, "when he had no child." The Greek construction can be taken temporally, though the context strongly supports the concessive sense, "though he had no child."
    reason: alternative_reading
translation:
  language: ko
  text: 하나님께서는 그에게 이 땅에서 유업으로 한 발자국의 땅도 주지 않으셨으나, 그와 그 후손에게 이 땅을 소유로 주시겠다고 약속하셨습니다. 비록 그에게는 자식이 없었지만 말입니다.
  philosophy: optimal-equivalence
