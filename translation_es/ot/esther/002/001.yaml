translation:
  language: es
  text: Después de esto[a], cuando la ira del rey Asuero se había calmado, recordó a Vasti, lo que ella había hecho y lo que había sido decretado contra ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando la ira del rey Asuero había amainado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo que fue decretado contra ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַחַר הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Después de estos hechos
  - Después de estos acontecimientos
  lexicon: HALOT
  rationale: La fórmula hebrea es temporal e idiomática; en español, «Después de estas cosas» conserva la secuencia narrativa sin añadir interpretación.
- source_word: כְּשֹׁךְ חֲמַת
  english_pob_choice: when the anger ... had subsided
  chosen_spanish: cuando se había apaciguado la ira
  alternatives_spanish:
  - cuando la ira se había calmado
  - cuando la ira había cesado
  lexicon: HALOT
  rationale: שׁכך expresa el descenso o apaciguamiento de la furia. «Se había apaciguado» conserva el matiz de enfriamiento emocional y evita hacerla desaparecer por completo.
- source_word: הַמֶּלֶךְ אֲחַשְׁוֵרוֹשׁ
  english_pob_choice: King Ahasuerus
  chosen_spanish: el rey Asuero
  alternatives_spanish:
  - el rey Ahasuero
  - Asuero, el rey
  lexicon: HALOT
  rationale: En español bíblico la forma tradicional y reconocible es «Asuero». Se mantiene el título y el nombre propio, conforme al valor del hebreo.
- source_word: זָכַר
  english_pob_choice: he remembered
  chosen_spanish: se acordó de
  alternatives_spanish:
  - recordó
  - trajo a la memoria
  lexicon: HALOT
  rationale: Aunque el hebreo puede traducirse literalmente como «recordó», en este contexto narrativo «se acordó de» suena natural en español y conserva el acto de volver a tener presente a Vasti y los hechos relacionados.
- source_word: אֲשֶׁר עָשָׂתָה
  english_pob_choice: what she had done
  chosen_spanish: de lo que ella había hecho
  alternatives_spanish:
  - de lo que había hecho ella
  - de lo que hizo
  lexicon: HALOT
  rationale: La relativa hebrea abarca el hecho ocurrido previamente; el pluscuamperfecto español refleja adecuadamente la retrospección desde el recuerdo del rey.
- source_word: אֲשֶׁר נִגְזַר עָלֶיהָ
  english_pob_choice: what had been decreed against her
  chosen_spanish: de lo que había sido decretado contra ella
  alternatives_spanish:
  - de lo que se había decretado contra ella
  - de lo que había sido decidido contra ella
  lexicon: HALOT
  rationale: נִגְזַר tiene fuerza jurídica de decreto/decisión oficial. «Había sido decretado» conserva la pasiva y el peso legal del hebreo; «contra ella» expresa la dirección adversa del decreto.
translation_notes:
  revision_awareness: 'Concordancia alta con el análisis inglés: se mantuvieron la secuencia temporal, el apaciguamiento de la ira, el recuerdo del rey y el lenguaje jurídico de lo decretado contra Vasti. No se introdujeron cambios textuales ni lecturas alternativas adicionales.'
  spanish_consistency_notes:
  - Se usa «Asuero» de forma consistente para אֲחַשְׁוֵרוֹשׁ.
  - Se evita «SEÑOR» u otras sustituciones; el verso no contiene el Tetragrámaton.
  - «Se había apaciguado» y «había sido decretado» preservan la temporalidad retrospectiva del hebreo y del inglés auditado.
  - «Vasti» se mantiene como transliteración estándar del nombre propio.
