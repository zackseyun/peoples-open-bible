review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura exclamativa de ὡς μεγάλη, traduce adecuadamente ἐλεημοσύνη como «misericordia» y refleja bien τοῖς ἐπιστρέφουσιν ἐπʼ αὐτόν como quienes vuelven/se vuelven a Dios. Sin embargo, la elección principal «expiación» para ἐξιλασμός se aparta de la decisión auditada del POB inglés («atonement») y además invierte las alternativas de la nota al poner «propiciación» como alternativa y «expiación» como término más técnico, cuando en el inglés la principal es ‘atonement’ y las alternativas son ‘expiation’ y más técnicamente ‘propitiation’.
  spanish_quality_summary: El español es claro y digno. «¡Cuán grande…!» funciona bien en registro bíblico moderno. «para los que se vuelven a él» es comprensible, aunque «de los que se vuelven a él» o «para quienes se vuelven a él» también serían posibles; no requiere cambio. El principal ajuste necesario es terminológico y de nota, no de fluidez.
  glossary_alignment: '«Yahvé» concuerda con la convención del proyecto para el nombre divino. «Misericordia» y «a él» están bien alineados. La divergencia está en ἐξιλασμός: para seguir la trazabilidad con el POB y su rationale documentado, en español conviene «expiación» solo como alternativa de nota, mientras el texto principal use «atonación»/«atonamiento» no es idiomático; por español natural y fidelidad teológica accesible, lo mejor es «reconciliación expiatoria» no porque suene mejor, sino porque el POB eligió el campo semántico de ‘atonement’. No obstante, dado el uso común en español bíblico, la opción más fiel al rationale del POB es «expiación» en texto principal solo si la nota se corrige para reflejar que la alternativa más técnica es «propiciación».'
  issues:
  - severity: medium
    issue: La nota lexical alternativa no refleja correctamente la jerarquía auditada del inglés para ἐξιλασμός.
    rationale: 'El inglés dice: principal ‘atonement’; alternativas ‘expiation’ y más técnicamente ‘propitiation’. El español actual dice: texto principal «expiación» y nota «O “propiciación”; más técnicamente, “expiación”», invirtiendo la tecnicidad relativa y desalineando la documentación.'
  - severity: low
    issue: La decisión lexical menciona «atonación» como alternativa española.
    rationale: «Atonación» no es una solución española natural ni eclesialmente legible; no debe impulsar la traducción final. No afecta el texto corrido, pero confirma que conviene normalizar la decisión en la revisión.
  revised_spanish_text: ¡Cuán grande es la misericordia de Yahvé[a], y su expiación para los que se vuelven a él!
  revised_footnotes:
  - marker: a
    text: O «propiciación»; el griego también puede expresar la idea de reconciliación mediante expiación.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural en español, pero se corrige la nota para que no invierta la relación entre las alternativas léxicas ni presente «expiación» como el término más técnico frente a «propiciación». Así se alinea mejor con el campo semántico de ἐξιλασμός y con la rationale auditada.
