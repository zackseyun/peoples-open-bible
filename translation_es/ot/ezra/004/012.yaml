revisions:
- from: Sea dado a conocer al rey que los judíos[a] que subieron de tu parte a nosotros han llegado a Jerusalén. Están reconstruyendo la ciudad rebelde y perversa[b], terminando los muros y reparando los cimientos.
  to: Sepa el rey que los judíos[a] que subieron de ti a nosotros han llegado a Jerusalén. Están reconstruyendo la ciudad rebelde y perversa, terminando los muros y reparando los cimientos[b].
  rationale: Se ajusta la fórmula inicial a un español más natural y formal («Sepa el rey») y se corrige la frase de procedencia para evitar el matiz añadido de comisión oficial («de tu parte»). También se mueve la nota [b] al sintagma que realmente explica en español y se pule su redacción. No se requiere una relectura doctrinal ni una adjudicación compleja.
