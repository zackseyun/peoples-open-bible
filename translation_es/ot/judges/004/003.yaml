translation:
  language: es
  text: Entonces los hijos de Israel clamaron a Yahvé[a], porque él tenía novecientos carros[b] de hierro, y oprimía a los hijos de Israel con fuerza[c] durante veinte años.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» / «el pueblo de Israel». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «carros de hierro».'
    reason: lexical_alternative
  - marker: c
    text: O «severamente» o «con violencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְעֲקוּ
  english_pob_choice: cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - clamaron a voces
  - pidieron auxilio
  lexicon: HALOT
  rationale: צעק en este contexto narrativo expresa un clamor urgente dirigido a Dios ante la opresión. En español, «clamaron» conserva ese valor de súplica intensa sin sonar forzado; «clamaron a Yahvé» mantiene explícita la dirección del clamor.
- source_word: בְנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: La expresión es literalmente filial y corporativa. Se conserva la forma «hijos de Israel» para reflejar el hebreo y la decisión POB de no neutralizarla, manteniéndola como designación del pueblo del pacto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El Tetragrámaton se traduce con el nombre divino «Yahvé», siguiendo la política POB de no sustituirlo por un título. Se adapta a la forma usual en español del proyecto, que busca preservar el nombre propio de Dios.
- source_word: תְּשַׁע מֵאוֹת
  english_pob_choice: nine hundred
  chosen_spanish: novecientos
  alternatives_spanish:
  - nueve cientos
  lexicon: HALOT
  rationale: Correspondencia numérica directa y natural en español.
- source_word: רֶכֶב בַּרְזֶל
  english_pob_choice: iron chariots
  chosen_spanish: carros de hierro
  alternatives_spanish:
  - carros de guerra de hierro
  - carros férreos
  lexicon: HALOT
  rationale: La construcción hebrea es literalmente «carros de hierro». En español, «carros de hierro» preserva la imagen y la fuerza militar del original; «de guerra» no está explícito en el hebreo.
- source_word: לוֹ
  english_pob_choice: he had
  chosen_spanish: tenía
  alternatives_spanish:
  - eran suyos
  - los poseía
  lexicon: HALOT
  rationale: El sufijo pronominal expresa posesión. «Tenía» es la forma más natural en español para expresar que Sisara disponía de esos carros.
- source_word: לָחַץ
  english_pob_choice: oppressed
  chosen_spanish: oprimió
  alternatives_spanish:
  - aplastó
  - presionó
  - afligió
  lexicon: HALOT
  rationale: En contextos de dominación y sufrimiento, לחץ comunica opresión sostenida. «Oprimió» conserva el peso semántico y resulta idiomático en español bíblico moderno.
- source_word: בְּחָזְקָה
  english_pob_choice: forcefully
  chosen_spanish: con fuerza
  alternatives_spanish:
  - fuertemente
  - severamente
  - con vehemencia
  lexicon: HALOT
  rationale: La frase indica intensidad o severidad. «Con fuerza» refleja de manera directa la idea de vigor/presión fuerte y evita debilitar el matiz de la base hebrea.
- source_word: עֶשְׂרִים שָׁנָה
  english_pob_choice: for twenty years
  chosen_spanish: durante veinte años
  alternatives_spanish:
  - por veinte años
  - veinte años
  lexicon: HALOT
  rationale: La duración se expresa naturalmente con «durante». El sentido temporal del hebreo queda claro y fluido en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: El verso usa el nombre propio del pacto, no un título. Se mantiene «Yahvé» para preservar la identificación personal y covenantal del texto, en línea con la política POB y la evidencia hebrea directa.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión corporativa בְנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - el pueblo de Israel
  rationale: Se conserva la forma masculina plural del hebreo por fidelidad al texto fuente y por la preferencia POB de mantener la formulación familiar/corporativa sin neutralizarla.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El texto inglés POB pasó por una revisión que ajustó el adverbio final de 'harshly' a 'forcefully' para acercarlo a בְחָזְקָה. La versión española adopta «con fuerza» para reflejar ese matiz de intensidad, evitando un término más interpretativo que pudiera debilitar la conexión con el hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la política del proyecto para יְהוָה.
  - Se conserva la fórmula «hijos de Israel» para seguir la decisión de exactitud de género/corporativa del POB.
  - «Carros de hierro» refleja el constructo hebreo sin añadir «de guerra», que no aparece en el original.
  - 'El orden y la puntuación siguen de cerca el flujo causal del hebreo: clamor, causa, posesión de los carros, opresión y duración.'
