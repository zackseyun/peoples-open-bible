    text: 'O, más formalmente: ''sus pastores los extraviaron; los montes los volvieron errantes'', reflejando la dificultad del hebreo detrás de la expresión traducida aquí como ''apartándolos''.'
    reason: lexical_alternative
  - marker: b
    text: '''De monte en collado'' puede también evocar el desplazamiento de Israel entre los lugares altos, imagen común de apostasía en Jeremías.'
    reason: cross_reference
  revision_rationale: Se quitó 'como' para ajustarse mejor a la predicación directa del hebreo, se cambió 'los hicieron extraviarse' por el español más natural 'los extraviaron', y se corrigió la nota [a], que tenía un error editorial grave. Se mantuvo 'apartándolos en los montes' y 'de monte en collado' porque reflejan adecuadamente la decisión léxica y el tono bíblico del expediente inglés.
