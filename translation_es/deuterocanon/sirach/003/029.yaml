translation:
  language: es
  text: El corazón del sabio entiende las sentencias[a] de los sabios, y un oído atento se alegra en la sabiduría.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «sentencias» también podría traducirse «proverbios» o «parábolas»; el paralelo griego usa el singular «parábola».
    reason: lexical_alternative
  - marker: b
    text: 'El paralelo griego difiere en la segunda línea: aproximadamente «y el oído de un oyente es el deseo de un sabio», mientras que el hebreo conservado dice «y un oído atento se alegra en la sabiduría». La traducción sigue el hebreo como testigo principal.'
    reason: textual_variant
lexical_decisions:
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  lexicon: HALOT
  rationale: En antropología hebrea, לֵב señala la facultad interior de pensar y comprender, no solo la emoción. «Corazón» conserva esa imagen bíblica y es natural en español.
- source_word: חָכָם
  english_pob_choice: the wise
  chosen_spanish: el sabio
  alternatives_spanish:
  - una persona sabia
  - los sabios
  lexicon: HALOT
  rationale: El sustantivo/adjetivo singular funciona en sentido genérico. En español, «el sabio» mantiene la fuerza representativa sin volverlo más abstracto de lo necesario.
- source_word: יָבִין
  english_pob_choice: understands
  chosen_spanish: entiende
  alternatives_spanish:
  - discierne
  - comprende
  lexicon: HALOT
  rationale: בין expresa captar el sentido de algo. «Entiende» es claro, idiomático y suficientemente cercano al valor semántico del verbo.
- source_word: מִשְׁלֵי
  english_pob_choice: the sayings
  chosen_spanish: los dichos
  alternatives_spanish:
  - los proverbios
  - las parábolas
  - los refranes
  lexicon: HALOT
  rationale: El hebreo permite varios matices. Dado que la tradición de sabiduría usa משלים para sentencias breves, «dichos» reproduce bien el género sin estrecharlo a un solo término técnico.
- source_word: חֲכָמִים
  english_pob_choice: of the wise
  chosen_spanish: de los sabios
  alternatives_spanish:
  - de los sabios hombres
  - de los sages
  lexicon: HALOT
  rationale: El plural se refiere a maestros o autores sabios. «De los sabios» conserva el sentido genérico y fluye bien en español.
- source_word: אֹזֶן
  english_pob_choice: ear
  chosen_spanish: oído
  alternatives_spanish:
  - oreja
  - oído atento
  lexicon: HALOT
  rationale: Aunque el hebreo es concreto, en español «oído» suena más natural en esta construcción y mantiene la imagen auditiva.
- source_word: מַקְשֶׁבֶת
  english_pob_choice: attentive
  chosen_spanish: atento
  alternatives_spanish:
  - escuchador
  - heedful
  lexicon: HALOT
  rationale: El participio de קשב describe una atención activa. «Atento» comunica bien ese matiz en español sin forzar la sintaxis.
- source_word: לְחָכְמָה
  english_pob_choice: in wisdom
  chosen_spanish: en la sabiduría
  alternatives_spanish:
  - a la sabiduría
  - para la sabiduría
  lexicon: HALOT
  rationale: La preposición admite varios matices, pero el paralelismo de la línea y el verbo «alegrarse» favorecen una lectura natural como gozo en la sabiduría.
- source_word: תִּשְׂמָח
  english_pob_choice: rejoices
  chosen_spanish: se alegra
  alternatives_spanish:
  - se goza
  - se deleita
  lexicon: HALOT
  rationale: שמח expresa gozo o alegría. «Se alegra» es la forma más transparente y idiomática en español para este contexto sapiencial.
translation_notes:
  revision_awareness: El hebreo conservado de Kahana es el testigo principal; el griego de Swete funciona como paralelo de control. Se mantiene la lectura hebrea en la segunda línea y se registra la variante griega en nota, sin armonizar artificialmente ambos testigos.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque no hay tetragrámaton ni κύριος en este versículo.
  - «Sabio/sabios» se conserva para reflejar el léxico sapiencial del pasaje.
  - La imagen corporal de «corazón» y «oído» se mantiene sin explicitarla como metáfora en el texto principal.
