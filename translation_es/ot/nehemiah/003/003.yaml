translation:
  language: es
  text: Los hijos de Hasenaá[a] edificaron la Puerta de los Peces; la techaron[b] y colocaron sus puertas, sus cerrojos y sus barras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo בני puede significar literalmente «hijos», pero con frecuencia designa un grupo familiar o clánico; por eso también puede entenderse «descendientes de Hasenaá».
    reason: lexical_alternative
  - marker: b
    text: O «la cubrieron» o «pusieron sus vigas». El verbo hebreo se refiere a cubrir una estructura en un contexto de construcción.
    reason: lexical_alternative
lexical_decisions:
- source_word: שַׁעַר הַדָּגִים
  english_pob_choice: the Fish Gate
  chosen_spanish: la Puerta de los Peces
  alternatives_spanish:
  - la puerta de los peces
  - la Puerta del Pescado
  - la Puerta de los Peces
  lexicon: HALOT
  rationale: La expresión hebrea designa una puerta específica de Jerusalén asociada con peces. En español, el nombre propio tradicional y transparente es «Puerta de los Peces», manteniendo la forma nominal de topónimo sin convertirlo en una paráfrasis.
- source_word: בָּנ֖וּ
  english_pob_choice: built
  chosen_spanish: edificaron
  alternatives_spanish:
  - construyeron
  - edificaron
  - reconstruyeron
  lexicon: HALOT
  rationale: El verbo básico בנה es «construir/edificar». Aunque el contexto mayor es de restauración, el hebreo aquí usa el verbo simple de edificar; «edificaron» conserva bien ese valor formal y es natural en registro bíblico.
- source_word: בְּנֵ֣י הַ/סְּנָאָ֑ה
  english_pob_choice: The sons of Hassenaah
  chosen_spanish: Los hijos de Haseana
  alternatives_spanish:
  - Los hijos de Hassenaá
  - Los descendientes de Haseana
  - La familia de Haseana
  lexicon: HALOT
  rationale: בני puede señalar hijos literales o un grupo/clan. En español, «hijos de» conserva la forma hebrea y su posible valor genealógico o clánico. Se mantiene el nombre propio transliterado con una ortografía española simple y estable.
- source_word: קֵר֔וּ/הוּ
  english_pob_choice: roofed it
  chosen_spanish: la cubrieron
  alternatives_spanish:
  - la techaron
  - la cubrieron
  - la recubrieron
  lexicon: HALOT
  rationale: En contextos de construcción, קרה puede referirse a cubrir una estructura con techo o vigas. «La cubrieron» es suficientemente abierto para no forzar «techaron» si el hebreo apunta más ampliamente a cubrir con una estructura superior, y preserva la observación textual del POB inglés.
- source_word: וַיַּעֲמִידוּ דַּלְתֹתָיו
  english_pob_choice: set up its doors
  chosen_spanish: colocaron sus puertas
  alternatives_spanish:
  - pusieron sus puertas
  - instalaron sus puertas
  - colocaron sus puertas
  lexicon: HALOT
  rationale: La expresión literalmente sugiere «hacer estar en pie» las puertas. «Colocaron» comunica instalación sin exagerar el mecanismo, y funciona bien en español arquitectónico y narrativo.
- source_word: מַנְעוּלָיו
  english_pob_choice: its bolts
  chosen_spanish: sus cerrojos
  alternatives_spanish:
  - sus pestillos
  - sus seguros
  - sus cerrojos
  lexicon: HALOT
  rationale: En el conjunto de piezas de una puerta de ciudad, el término apunta al herraje de cierre. «Cerrojos» es el equivalente español más claro y directo, manteniendo la concreción material del texto.
- source_word: וּבְרִיחָיו
  english_pob_choice: and its bars
  chosen_spanish: y sus barras
  alternatives_spanish:
  - y sus travesaños
  - y sus barras
  - y sus barretas
  lexicon: HALOT
  rationale: בריח es una barra de sujeción o cierre de puerta/portón. «Barras» reproduce el valor básico sin introducir una especificación excesiva; mantiene el paralelismo con «cerrojos».
translation_notes:
  revision_awareness: Se siguió el texto hebreo consonántico/morfológico de Nehemías 3:3 y el audit trail inglés. Se conservó la solución idiomática para la Puerta de los Peces y la lectura de קרה como acción de cubrir la estructura, sin introducir intensificación inexistente ni un equivalente mecánico que sonara forzado en español.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el hebreo lo exige; en este versículo no aparece el nombre divino.
  - Se prefirió «hijos de» para בני por fidelidad formal, aunque el sentido puede ser clánico.
  - Se mantuvo el paralelismo material de «puertas, cerrojos y barras» para reflejar la lista de elementos de la puerta.
  - El topónimo se capitalizó como nombre propio establecido en español bíblico.
