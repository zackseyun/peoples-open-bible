translation:
  language: es
  text: Porque oigan la palabra de Yahvé, mujeres[a], y presten oído[b] a la palabra de su boca; enseñen a sus hijas una lamentación[c], y cada mujer a su vecina un canto fúnebre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Escuchen, mujeres». El hebreo puede entenderse como un llamado directo a las mujeres.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «que su oído reciba», un modismo para escuchar con atención.'
    reason: lexical_alternative
  - marker: c
    text: 'Los dos términos hebreos del duelo aquí son afines pero distintos: «lamentación» y «canto fúnebre»; ambos se refieren a expresiones formales de duelo.'
    reason: cultural_note
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, pues
  lexicon: HALOT
  rationale: Introduce la base o motivo de la exhortación profética. «Porque» conserva bien la fuerza conectiva y causal del hebreo en un español natural y solemne.
- source_word: שְׁמַעְנָה
  english_pob_choice: hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - oirán
  - atiendan
  lexicon: HALOT
  rationale: Es imperativo femenino plural dirigido a mujeres. «Oigan» preserva la apelación directa y puede abarcar tanto oír como prestar atención, como sugiere la alternativa inglesa «listen».
- source_word: נָשִׁים
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - oh mujeres
  - damas
  lexicon: HALOT
  rationale: La forma vocativa se expresa de manera natural en español con «mujeres»; el contexto ya marca la llamada directa, por lo que no es necesario añadir una exclamación adicional en el texto principal.
- source_word: דְּבַר יְהוָה
  english_pob_choice: the word of Yahweh
  chosen_spanish: la palabra de Yahvé
  alternatives_spanish:
  - el mensaje de Yahvé
  - la palabra del SEÑOR
  lexicon: HALOT
  rationale: Se mantiene la expresión profética fija «palabra de Yahvé». El nombre divino se rinde como «Yahvé» según el criterio del proyecto, no como sustituto litúrgico.
- source_word: וְתִקַּח אָזְנְכֶם
  english_pob_choice: and let your ear receive
  chosen_spanish: y reciba su oído
  alternatives_spanish:
  - y reciba vuestro oído
  - y preste atención
  - y reciba el oído de ustedes
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo («oído») con sufijo plural. En español, «reciba su oído» conserva la imagen idiomática de receptividad atenta y evita una paráfrasis demasiado plana.
- source_word: דְּבַר פִּיו
  english_pob_choice: the word of his mouth
  chosen_spanish: la palabra de su boca
  alternatives_spanish:
  - el dicho de su boca
  - lo que dice su boca
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de la boca como origen del habla divina. «Palabra de su boca» sigue de cerca la paralelidad hebrea sin volverse artificial.
- source_word: וְלַמֵּדְנָה
  english_pob_choice: teach
  chosen_spanish: enseñen
  alternatives_spanish:
  - instruyan
  - eduquen
  lexicon: HALOT
  rationale: Imperativo femenino plural. «Enseñen» corresponde directamente y mantiene la instrucción comunitaria de transmisión del duelo.
- source_word: בְנוֹתֵיכֶם
  english_pob_choice: your daughters
  chosen_spanish: sus hijas
  alternatives_spanish:
  - vuestras hijas
  - las hijas de ustedes
  lexicon: HALOT
  rationale: En español moderno de registro bíblico, «sus hijas» puede funcionar como tratamiento plural respetuoso y claro. Conserva el vínculo filial explícito del hebreo.
- source_word: נֶהִי
  english_pob_choice: a lament
  chosen_spanish: una lamentación
  alternatives_spanish:
  - un lamento
  - un gemido
  - un llanto
  lexicon: HALOT
  rationale: El término designa una expresión formal de duelo. «Lamentación» comunica mejor esa formalidad que un simple «llanto», y permite distinguirlo del término siguiente sin perder el campo semántico del duelo ritual.
- source_word: וְאִשָּׁה רְעוּתָהּ
  english_pob_choice: and each woman her neighbor
  chosen_spanish: y cada mujer a su vecina
  alternatives_spanish:
  - y cada mujer a su compañera
  - y cada mujer a su amiga
  lexicon: HALOT
  rationale: La construcción es elíptica; el verbo se sobreentiende del contexto anterior. «A su vecina» conserva la relación recíproca y el matiz social más general de רֵעַ, sin restringirlo a una amistad íntima.
- source_word: קִינָה
  english_pob_choice: a dirge
  chosen_spanish: un canto fúnebre
  alternatives_spanish:
  - una elegía
  - un lamento fúnebre
  - un canto de duelo
  lexicon: HALOT
  rationale: קִינָה es una composición formal de duelo. «Canto fúnebre» comunica bien la forma poética y permite distinguirlo de «lamentación» en la cláusula anterior, reflejando la distinción observada por el POB inglés.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El hebreo tiene explícitamente el Tetragrámaton. Siguiendo el criterio del proyecto, se rinde como «Yahvé» en vez de ocultarlo con un título genérico, preservando el nombre del pacto divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Dirección femenina explícita
  english_pob_reading: women / your daughters / each woman
  chosen_spanish_reading: mujeres / sus hijas / cada mujer
  alternative_spanish_readings:
  - personas / sus hijos / cada persona
  - mujeres / vuestras hijas / cada mujer
  rationale: El hebreo emplea formas femeninas explícitas. La traducción conserva esa especificidad de género porque forma parte del llamado profético y de la escena de duelo que el texto describe.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que ajustó el orden a una apelación natural a las mujeres. En español, la estructura «Porque oigan la palabra de Yahvé, mujeres» reproduce la exhortación directa sin perder naturalidad, y mantiene la distinción entre dos términos hebreos de duelo que el audit trail señaló como relacionados pero no idénticos.
  spanish_consistency_notes:
  - Se usa «Yahvé» de manera consistente para יְהוָה.
  - Se preserva la diferencia entre «lamentación» y «canto fúnebre» para נֶהִי y קִינָה.
  - La frase idiomática «reciba su oído» conserva la imagen hebrea de audición receptiva sin convertirla en mera repetición de «oigan».
  - 'Se mantiene el enfoque de género del hebreo: mujeres, hijas y mujer individual.'
