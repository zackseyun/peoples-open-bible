translation:
  language: es
  text: Observa al íntegro[a], y ve al recto, porque hay un porvenir[b] para el hombre de paz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al blameless», «al sin culpa», «al irreprochable». תָּם expresa integridad moral más que perfección absoluta.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «fin», «desenlace» o «resultado». אַחֲרִית puede referirse al final, al resultado o al porvenir; algunos lo entienden aquí como «posteridad».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «hombre pacífico» o «hombre de bienestar». שָׁלוֹם también puede implicar bienestar, plenitud o integridad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמָר
  english_pob_choice: Observe
  chosen_spanish: Observa
  alternatives_spanish:
  - Mira
  - Fíjate en
  - Pon atención a
  lexicon: HALOT
  rationale: El imperativo pide atención cuidadosa a una persona o tipo de persona, no 'guardar' en el sentido literal. 'Observa' conserva la fuerza exhortativa y suena natural en español bíblico moderno.
- source_word: תָּם
  english_pob_choice: blameless
  chosen_spanish: íntegro
  alternatives_spanish:
  - sin culpa
  - irreprochable
  - intachable
  lexicon: HALOT
  rationale: En este contexto sapiencial, תָּם apunta a integridad moral y completitud de conducta más que a perfección sin pecado. 'Íntegro' comunica bien esa idea en español y evita una resonancia excesivamente legal.
- source_word: וּרְאֵה
  english_pob_choice: and see
  chosen_spanish: y ve
  alternatives_spanish:
  - y mira
  - y observa
  - y contempla
  lexicon: HALOT
  rationale: Mantiene el segundo imperativo paralelo, breve y directo. 'Ve' reproduce el paralelismo con 'Observa' sin sobrecargar el verso.
- source_word: יָשָׁר
  english_pob_choice: the upright
  chosen_spanish: el recto
  alternatives_spanish:
  - el justo
  - el íntegro
  - el derecho
  lexicon: HALOT
  rationale: יָׁשָׁר describe rectitud moral o conducta recta. 'El recto' conserva la sustantivación y el paralelismo con 'el íntegro'.
- source_word: אַחֲרִית
  english_pob_choice: a future
  chosen_spanish: un porvenir
  alternatives_spanish:
  - un fin
  - un desenlace
  - un resultado
  lexicon: HALOT
  rationale: El término puede significar fin, resultado o futuro/prospecto. En este contexto de sabiduría, 'porvenir' comunica una perspectiva final positiva sin decidir de manera excesiva entre las posibles matizaciones.
- source_word: לְאִישׁ
  english_pob_choice: for the man
  chosen_spanish: para el hombre
  alternatives_spanish:
  - para la persona
  - para un hombre
  lexicon: HALOT
  rationale: Se conserva el singular masculino del hebreo אִישׁ. En español, 'hombre' es la forma más directa y transparente para mantener la referencia masculina del texto fuente.
- source_word: שָׁלוֹם
  english_pob_choice: peace
  chosen_spanish: de paz
  alternatives_spanish:
  - de bienestar
  - de plenitud
  - pacífico
  lexicon: HALOT
  rationale: שָׁלוֹם aquí caracteriza al hombre como persona de paz y de bienestar. 'De paz' refleja esa cualidad relacional de forma breve; otras opciones amplían la noción, pero 'de paz' preserva la sencillez del original.
theological_decisions:
- issue: Tratamiento del paralelismo imperativo doble
  english_pob_reading: Observe ... and see ...
  chosen_spanish_reading: Observa ... y ve ...
  alternative_spanish_readings:
  - Mira ... y contempla ...
  - Fíjate ... y observa ...
  rationale: El hebreo presenta dos imperativos coordinados. La versión española conserva la duplicación y la progresión poética, evitando fusionarlos en una sola idea.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 3
- issue: Sentido de אַחֲרִית en un contexto sapiencial
  english_pob_reading: there is a future
  chosen_spanish_reading: hay un porvenir
  alternative_spanish_readings:
  - hay un fin
  - hay un desenlace
  - hay un resultado
  rationale: La línea concluye con una afirmación de destino/prospecto. 'Porvenir' permite una lectura positiva y abierta, compatible con futuro, resultado final o desenlace, sin borrar la tensión semántica del hebreo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 3
- issue: Masculino singular en אִישׁ
  english_pob_reading: the man of peace
  chosen_spanish_reading: el hombre de paz
  alternative_spanish_readings:
  - la persona de paz
  - el pacífico
  rationale: Se mantiene el masculino singular del hebreo, que en la poesía sapiencial funciona como figura representativa sin neutralización automática. 'Hombre de paz' es claro y corresponde al sustantivo אישׁ con su complemento.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: La versión española sigue la última revisión auditada al no añadir un equivalente explícito de 'hombre' después de 'íntegro' ni de 'recto', pero sí conserva 'el hombre de paz' para לְאִישׁ שָׁלוֹם. La elección de 'porvenir' refleja la misma cautela semántica que la revisión inglesa, que prefirió 'future' frente a opciones más específicas.
  spanish_consistency_notes:
  - Se mantiene el tono poético y exhortativo del hebreo con dos imperativos breves.
  - Se usa 'íntegro' para תָּם por coherencia con lenguaje bíblico moderno y para evitar una traducción excesivamente forense.
  - '''Porvenir'' conserva la amplitud semántica de אַחֲרִית sin imponer ''fin'' o ''posteridad''.'
  - '''De paz'' traduce שָׁלוֹם de forma sobria, dejando en la nota la posible amplitud de sentido.'
