translation:
  language: es
  text: desde el monte Halac[a], que se eleva hacia Seír, hasta Baal-gad en el Valle de Líbano[b], al pie del monte Hermón. Y capturó a todos sus reyes, los hirió y les dio muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el monte liso». El hebreo puede entenderse descriptivamente, pero en este contexto probablemente funciona como el nombre propio «monte Halac».
    reason: lexical_alternative
  - marker: b
    text: O «en la llanura de Líbano». El término hebreo puede designar un valle ancho o una llanura.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָהָר הֶחָלָק
  english_pob_choice: Mount Halak
  chosen_spanish: el monte Halac
  alternatives_spanish:
  - el monte liso
  - el monte suave
  lexicon: HALOT
  rationale: El contexto geográfico favorece tratar la expresión como nombre propio de lugar. En español, "Halac" conserva la función toponímica sin forzar una traducción descriptiva que aquí sería menos natural.
- source_word: הָעֹלֶה
  english_pob_choice: which rises
  chosen_spanish: que se eleva
  alternatives_spanish:
  - que sube
  - ascendente
  lexicon: HALOT
  rationale: El participio expresa extensión ascendente del relieve. "Que se eleva" mantiene el valor topográfico con español natural y digno.
- source_word: שֵׂעִיר
  english_pob_choice: Seir
  chosen_spanish: Seír
  alternatives_spanish:
  - Seir
  lexicon: HALOT
  rationale: Se conserva el nombre propio del lugar con ortografía castellana usual para la vocal tónica final.
- source_word: וְעַד
  english_pob_choice: as far as
  chosen_spanish: hasta
  alternatives_spanish:
  - y hasta
  - así como hasta
  lexicon: HALOT
  rationale: Marca el límite del territorio descrito. "Hasta" comunica de forma natural el alcance fronterizo.
- source_word: בַּעַל גָּד
  english_pob_choice: Baal-gad
  chosen_spanish: Baal-gad
  alternatives_spanish:
  - Baal Gad
  lexicon: HALOT
  rationale: Se mantiene la transliteración del topónimo compuesto, sin descomponer ni traducir sus elementos.
- source_word: בְּבִקְעַת הַלְּבָנוֹן
  english_pob_choice: in the Valley of Lebanon
  chosen_spanish: en el Valle de Líbano
  alternatives_spanish:
  - en la llanura de Líbano
  - en el valle del Líbano
  lexicon: HALOT
  rationale: בִּקְעָה puede ser valle o llanura. Se eligió "Valle de Líbano" siguiendo el sentido topográfico adoptado por la POB inglesa, y porque resulta claro en español.
- source_word: תַּחַת הַר חֶרְמוֹן
  english_pob_choice: below Mount Hermon
  chosen_spanish: debajo del monte Hermón
  alternatives_spanish:
  - al pie del monte Hermón
  - bajo el monte Hermón
  lexicon: HALOT
  rationale: '"Debajo" conserva la relación espacial de ubicación inferior respecto al monte Hermón sin sobreinterpretar la expresión.'
- source_word: לָכַד
  english_pob_choice: captured
  chosen_spanish: capturó
  alternatives_spanish:
  - apresó
  - tomó prisioneros
  lexicon: HALOT
  rationale: Verbo militar apropiado para el objeto "todos sus reyes". "Capturó" mantiene la idea de aprehensión y dominio.
- source_word: וַיַּכֵּם
  english_pob_choice: struck them down
  chosen_spanish: los hirió
  alternatives_spanish:
  - los golpeó
  - los derrotó
  lexicon: HALOT
  rationale: נכה admite el sentido amplio de golpear o herir. "Los hirió" preserva la violencia del verbo sin repetir el matiz de muerte ya expresado en la cláusula siguiente.
- source_word: וַיְמִיתֵם
  english_pob_choice: put them to death
  chosen_spanish: los hizo morir
  alternatives_spanish:
  - los mató
  - los dio muerte
  lexicon: HALOT
  rationale: El hifil de מות expresa causar la muerte. "Los hizo morir" reproduce esa causalidad de modo más transparente que un simple "los mató", y mantiene la diferencia con el verbo anterior.
theological_decisions:
- issue: Relación entre "herir" y "hacer morir" en la secuencia narrativa
  english_pob_reading: And he captured all their kings and struck them down and put them to death.
  chosen_spanish_reading: Y capturó a todos sus reyes, y los hirió, y los hizo morir.
  alternative_spanish_readings:
  - Y capturó a todos sus reyes, y los derrotó, y los mató.
  - Y capturó a todos sus reyes, y los golpeó, y los dio muerte.
  rationale: 'Se conserva la progresión verbal del hebreo: captura, golpe/lesión, y acción causativa de muerte. Esto evita fundir dos verbos distintos en uno solo y mantiene la tensión narrativa del texto.'
  doctrine_reference: No aplica doctrina específica; observación de fidelidad verbal al relato histórico.
translation_notes:
  revision_awareness: 'Se siguió el criterio del texto inglés de la POB: tratar הָהָר הֶחָלָק como topónimo probable y Bִּקְעָה como una depresión geográfica amplia, manteniendo la secuencia verbal diferenciada (capturar / herir / hacer morir) sin aplanarla en una sola acción.'
  spanish_consistency_notes:
  - Se usó «Yahvé» como forma por defecto en la serie, pero este versículo no la contiene.
  - Se mantuvo la transliteración de nombres propios geográficos para preservar la auditable identificación del lugar.
  - «Hermón» y «Seír» siguen la ortografía española habitual para topónimos bíblicos.
  - La puntuación reproduce la cadencia narrativa breve del hebreo y del inglés auditado.
