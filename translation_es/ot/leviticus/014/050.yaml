revisions:
- from: Entonces degollará el ave[a] una en un recipiente de barro sobre aguas vivas.
  to: Entonces degollará la primera ave en un recipiente de barro sobre aguas vivas[a].
  rationale: Se corrige la expresión no idiomática «el ave una» por «la primera ave» para producir español natural y claro dentro del contexto inmediato de dos aves del rito. Aunque el inglés evitó introducir un ordinal, en español esta solución comunica con fidelidad la distinción funcional sin la torpeza de un calco imposible. También se mueve la nota [a] a «aguas vivas», que es el término explicado por la nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:29:30Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia ritual, el matiz de degüello/degollar, el recipiente de barro y «aguas vivas» como traducción literal de מַיִם חַיִּים. Sin embargo, falla de manera importante en הַצִּפֹּר הָאֶחָת: «el ave una»/«el ave[a] una» no es español natural ni conserva bien la especificidad del hebreo. La mejor equivalencia fiel es «la primera ave» si el contexto inmediato ya ha introducido dos aves, o más estrictamente «una de las aves»/«la una ave» sería poco natural. Dado el audit trail inglés, «el ave una» no debe mantenerse; en español la forma más fiel y legible en este contexto ritual es «la primera ave» o, si se evita ordinal, una reformulación natural. Además, el anclaje de la nota [a] está mal ubicado: debe ir en «aguas vivas», no en «ave».'
  spanish_quality_summary: 'La frase actual suena poco natural por «el ave una». También el artículo debe concordar con «ave»: aunque «el ave» es correcto por la /a/ tónica, el modificador posterior complica la expresión; «la primera ave» resuelve claridad y fluidez. El resto de la sintaxis es comprensible y digna. La nota al pie es buena, pero el marcador debe colocarse sobre la expresión explicada.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Degollará», «recipiente de barro» y «aguas vivas» son compatibles con el audit trail. No intervienen términos doctrinales mayores como Yahvé/Mesías. Se preserva la decisión inglesa revisada de mantener «living water» de forma más literal.
  issues:
  - severity: high
    issue: «el ave una» es una construcción antinatural e inadecuada en español.
    rationale: Aunque intenta reflejar literalmente הַצִּפֹּר הָאֶחָת, no produce español legible ni digno. Debe reformularse de manera natural sin perder la distinción contextual respecto de la otra ave.
  - severity: medium
    issue: El marcador de nota [a] está anclado a «ave» en lugar de «aguas vivas».
    rationale: La nota explica מַיִם חַיִּים, no הַצִּפֹּר. El anclaje actual induce confusión.
  - severity: low
    issue: La decisión léxica documentada para הַצִּפֹּר הָאֶחָת propone alternativas impropias en español.
    rationale: «la una ave» y «el ave única» no son buenas opciones aquí; conviene alinear la documentación con una solución idiomática.
  revised_spanish_text: Entonces degollará la primera ave en un recipiente de barro sobre aguas vivas[a].
  revised_footnotes:
  - marker: a
    text: Literalmente, «aguas vivas»; es decir, agua fresca o corriente.
    reason: lexical_alternative
  revision_rationale: Se corrige la expresión no idiomática «el ave una» por «la primera ave» para producir español natural y claro dentro del contexto inmediato de dos aves del rito. Aunque el inglés evitó introducir un ordinal, en español esta solución comunica con fidelidad la distinción funcional sin la torpeza de un calco imposible. También se mueve la nota [a] a «aguas vivas», que es el término explicado por la nota.
