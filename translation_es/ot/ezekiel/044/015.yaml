  text: וְ/הַ/כֹּהֲנִ֨ים הַ/לְוִיִּ֜ם בְּנֵ֣י צָד֗וֹק אֲשֶׁ֨ר שָׁמְר֜וּ אֶת מִשְׁמֶ֤רֶת מִקְדָּשִׁ/י֙ בִּ/תְע֤וֹת בְּנֵֽי יִשְׂרָאֵל֙ מֵֽ/עָלַ֔/י הֵ֛מָּה יִקְרְב֥וּ אֵלַ֖/י לְ/שָֽׁרְתֵ֑/נִי וְ/עָמְד֣וּ לְ/פָנַ֗/י לְ/הַקְרִ֥יב לִ/י֙ חֵ֣לֶב וָ/דָ֔ם נְאֻ֖ם אֲדֹנָ֥/י יְהוִֽה־־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/044/015.yaml
  text: But the Levitical priests[a], the sons of Zadok, who kept the charge of my sanctuary when the sons of Israel went astray from me—they shall come near to me to minister to me, and they shall stand before me to offer to me fat and blood[c][b], declares the Lord GOD.
  footnotes:
  - marker: a
    text: Or 'the priests, the Levites.' The Hebrew can be read appositionally rather than as the smoother English phrase 'Levitical priests.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the people of Israel' or 'the Israelites' for 'the sons of Israel.'
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the Lord YHWH'; English convention renders this as 'the Lord GOD' to avoid 'Lord LORD.'
    reason: lexical_alternative
