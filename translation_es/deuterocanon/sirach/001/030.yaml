review_pass:
  verdict: revise
  source_alignment_summary: 'La fuente hebrea provista está marcada como major_mismatch, y el rastro de auditoría inglés documenta que para este versículo debe priorizarse el testigo griego coherente: «El agua apaga un fuego ardiente, y la limosna hace expiación por los pecados». El borrador español sigue una revisión inglesa posterior que tradujo el hebreo desajustado; por tanto, no preserva fielmente la decisión textual y teológica documentada en el expediente fuente.'
  spanish_quality_summary: El español del borrador es natural y claro, pero traduce el texto equivocado para Sirácides 1:30 según la evidencia y la nota crítica. Además, la nota actual invierte la prioridad textual al presentar el hebreo como base principal. Conviene restaurar el proverbio griego en un español claro y eclesialmente legible.
  glossary_alignment: No hay conflicto con Yahvé/Mesías u otros términos troncales del glosario. Sí importa mantener ἐλεημοσύνη como «limosna» o una expresión igualmente específica para dar a los pobres; «caridad» sería demasiado amplia. También debe preservarse la fuerza expiatoria de ἐξιλάσεται con «hace expiación por» o equivalente, no suavizarse.
  issues:
  - severity: high
    issue: El texto principal español traduce el hebreo desajustado en lugar del testigo griego que el expediente identifica como la base traducible viable.
    rationale: 'La fuente señala validation: major_mismatch para el hebreo y la decisión teológica inglesa explícitamente ordena traducir del griego aquí. Mantener el hebreo en el texto principal falsea el sentido del versículo referido.'
  - severity: high
    issue: La nota al pie española presenta el hebreo como base de la revisión, contrariando la auditoría textual.
    rationale: La nota debe explicar que el hebreo suministrado parece corresponder a otro lugar y que, por eso, se sigue el griego en el texto principal.
  - severity: medium
    issue: Falta una nota léxica/cultural para «limosna» que preserve la especificidad de ἐλεημοσύνη.
    rationale: El expediente inglés documenta que no se trata de caridad abstracta sino de dar a los pobres. En español, «limosna» puede entenderse bien, pero la nota ayuda a fijar el matiz.
  - severity: low
    issue: Puede añadirse una nota alternativa para la imagen verbal de ἀποσβέσει si se desea reflejar el matiz proverbial de «apaga»/«extingue».
    rationale: No es imprescindible, pero el expediente inglés preserva una alternativa léxica sobre «quenches».
  revised_spanish_text: El agua apaga un fuego ardiente, y la limosna[c] hace expiación por los pecados[a].
  revised_footnotes:
  - marker: a
    text: 'El texto hebreo provisto para esta referencia parece no corresponder a Sirácides 1:30. Por eso, aquí se sigue el testigo griego: «El agua apaga un fuego ardiente, y la limosna hace expiación por los pecados».'
    reason: textual_variant
  - marker: b
    text: O «extingue un fuego en llamas»; la imagen griega es proverbial.
    reason: lexical_alternative
  - marker: c
    text: «Limosna» se refiere específicamente a dar a los pobres; el griego no alude solo a la caridad en sentido amplio o abstracto.
    reason: cultural_note
  revision_rationale: 'Se corrige el texto principal para alinearlo con la evidencia fuente y la decisión auditada: el hebreo del paquete está marcado como desajustado para este versículo, por lo que debe traducirse el proverbio griego. Se usa «limosna» para conservar la especificidad de ἐλεημοσύνη y «hace expiación por» para mantener la fuerza de ἐξιλάσεται. Solo se ancla en el texto la nota crítica principal y la nota cultural relevante; la nota b se omite del texto porque es una alternativa opcional y, según las reglas del proyecto, no debe incluirse una nota sin ancla.'
