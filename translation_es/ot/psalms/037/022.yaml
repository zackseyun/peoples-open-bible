translation:
  language: es
  text: Pues los que son bendecidos por él heredarán la tierra[a], pero los que son malditos por él serán cortados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la tierra entera». El hebreo אֶרֶץ puede significar «tierra/país» o «tierra» en sentido más amplio; aquí «la tierra» encaja mejor con el marco pactal del salmo.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la relación explicativa con el verso anterior. En español, «porque» comunica con naturalidad esa base argumentativa sin forzar un registro arcaico.
- source_word: מְבֹרָכָיו
  english_pob_choice: those blessed by him
  chosen_spanish: los que son bendecidos por él
  alternatives_spanish:
  - sus benditos
  - los benditos por él
  lexicon: HALOT
  rationale: El participio pasivo con sufijo indica personas que reciben la bendición; «los que son bendecidos por él» conserva ese sentido pasivo y hace explícita la acción sobre ellos.
- source_word: יִירְשׁוּ
  english_pob_choice: will inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - poseerán
  - tomarán posesión de
  lexicon: HALOT
  rationale: «Heredarán» reproduce el valor de heredar/recibir en contexto de promesa y mantiene la resonancia pactal del verbo hebreo sin sonar artificial en español.
- source_word: אָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra prometida
  - la tierra / el país
  lexicon: HALOT
  rationale: 'En español, «la tierra» conserva la amplitud semántica de אֶרֶץ y permite la misma tensión que el inglés POB preserva con nota: puede referirse a la tierra como territorio prometido y también a la tierra en sentido más amplio.'
- source_word: וּמְקֻלָּלָיו
  english_pob_choice: but those cursed by him
  chosen_spanish: pero los que son malditos por él
  alternatives_spanish:
  - y sus malditos
  - pero los malditos por él
  lexicon: HALOT
  rationale: La forma pasiva con sufijo se vierte de manera paralela al primer hemistiquio. «Pero» expresa mejor el contraste implícito en el paralelismo que una simple «y».
- source_word: יִכָּרֵתוּ
  english_pob_choice: will be cut off
  chosen_spanish: serán exterminados
  alternatives_spanish:
  - serán cortados
  - serán arrancados
  lexicon: HALOT
  rationale: Aunque «serán cortados» es más literal, en español puede sonar opaco. «Serán exterminados» comunica la fuerza judicial del nifal de כרת en este contexto, sin perder el sentido de eliminación total.
theological_decisions:
- issue: Referente implícito de los sufijos de tercera persona masculina singular
  english_pob_reading: Rendered explicitly as 'by him,' with the referent understood as the Lord from the psalm's context.
  chosen_spanish_reading: Se mantiene «por él» y se entiende que el referente es Yahvé, según el contexto del salmo.
  alternative_spanish_readings:
  - «por Yahvé»
  - «por él» con nota explícita
  rationale: La referencia implícita al sujeto singular del contexto ya es suficiente en español; añadir «Yahvé» en el texto principal aclararía el referente, pero también rompería la simetría del hebreo. Mantener «por él» conserva la forma del texto y deja que el contexto haga la identificación.
  doctrine_reference: Translation philosophy §1, §6
- issue: Alcance de אֶרֶץ
  english_pob_reading: the land
  chosen_spanish_reading: la tierra
  alternative_spanish_readings:
  - la tierra
  - el país
  rationale: El Salmo 37 usa la promesa de heredar אֶרֶץ dentro de un marco sapiencial y pactal. En español, «la tierra» mantiene esa tensión sin decidir de antemano entre territorio y mundo entero; la nota preserva la alternativa lexical inglesa «the earth».
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; el texto sigue el estado más reciente aprobado, con concordancia alta entre revisores.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino de fondo en la lectura teológica, aunque aquí el referente queda implícito por el pronombre.
  - Se conserva el paralelismo pasivo de ambos hemistiquios para respetar la estructura del hebreo.
  - Se evita «SEÑOR» como sustituto del nombre divino, conforme a la política terminológica del proyecto.
