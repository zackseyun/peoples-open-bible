translation:
  language: es
  text: Bienaventurado[b] el hombre que es hallado intachable, y que no se ha descarriado tras las riquezas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El texto hebreo es difícil en la segunda cláusula. El sentido probable es que este hombre no se ha desviado en relación con las riquezas; también puede entenderse «que no se ha descarriado tras las riquezas» o «que no se ha dejado desviar por el dinero».
    reason: alternative_reading
  - marker: b
    text: El paralelo griego de este versículo difiere sustancialmente del hebreo conservado, por lo que la traducción sigue el hebreo y reconoce la incertidumbre en la cláusula sobre las riquezas.
    reason: textual_variant
lexical_decisions:
- source_word: אשרי
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Feliz
  - Dichoso
  lexicon: HALOT
  rationale: En literatura sapiencial, la fórmula expresa una declaración de favor y dicha estable; «Bienaventurado» conserva mejor el tono de beatitud que «Feliz», que suena más subjetivo.
- source_word: איש
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - el ser humano
  lexicon: HALOT
  rationale: El hebreo es masculino singular y la traducción sigue esa forma gramatical, aunque en sentido sapiencial puede funcionar de modo representativo.
- source_word: נמצא
  english_pob_choice: is found
  chosen_spanish: es hallado
  alternatives_spanish:
  - se encuentra
  - se descubre
  lexicon: HALOT
  rationale: «Es hallado» refleja bien el sentido pasivo evaluativo del hebreo, indicando que su integridad es reconocida o verificada.
- source_word: תמים
  english_pob_choice: blameless
  chosen_spanish: sin mancha
  alternatives_spanish:
  - íntegro
  - sin culpa
  - perfecto
  lexicon: HALOT
  rationale: En contexto ético-sapiencial, el término describe integridad moral. «Sin mancha» comunica esa idea con naturalidad en español, sin imponer la noción de perfección absoluta.
- source_word: ממון
  english_pob_choice: wealth
  chosen_spanish: las riquezas
  alternatives_spanish:
  - el dinero
  - los bienes
  - la riqueza
  lexicon: HALOT
  rationale: El sustantivo puede abarcar posesiones y bienes materiales; «las riquezas» es natural en español y mantiene el campo semántico amplio.
- source_word: לא נלוז
  english_pob_choice: has not gone astray
  chosen_spanish: no se ha descarriado
  alternatives_spanish:
  - no se ha desviado
  - no ha torcido el camino
  - no ha errado
  lexicon: HALOT
  rationale: El verbo expresa desviación del camino recto. «Descarriado» conserva la idea moral de apartarse, y encaja con la relación entre la persona y las riquezas.
- source_word: ו
  english_pob_choice: after
  chosen_spanish: tras
  alternatives_spanish:
  - en pos de
  - después de
  lexicon: HALOT
  rationale: Aunque la cláusula hebrea es difícil, la relación adverbial/relacional con el objeto material se puede expresar naturalmente con «tras», preservando el sentido de ir detrás de las riquezas.
theological_decisions:
- issue: Relación entre integridad moral y bienes materiales en la cláusula קשה/textualmente difícil
  english_pob_reading: The Hebrew clause is awkward; the translation preserves the core sense that the man has not gone astray in relation to wealth, while acknowledging uncertainty and the Greek parallel as a check.
  chosen_spanish_reading: …y que no se ha descarriado tras las riquezas.
  alternative_spanish_readings:
  - …y que no se ha descarriado por causa de las riquezas.
  - …y que no se ha dejado llevar por el dinero.
  - …y que no se ha desviado en relación con las riquezas.
  rationale: 'La redacción española mantiene la tensión del texto transmitido sin reconstruir de más. «Tras las riquezas» deja abierta la relación exacta, pero comunica la orientación moral principal: no seguirlas como guía ni dejarse dominar por ellas.'
  doctrine_reference: 'PHILOSOPHY.md: preservar honestamente la incertidumbre de la fuente y traducir con cautela donde el testimonio es difícil o mixto.'
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del audit trail, que reordenó la segunda cláusula para reflejar mejor el hebreo: «que no se ha descarriado tras las riquezas» en lugar de una formulación menos natural. Se ha mantenido la cautela textual indicada por el seguimiento inglés.'
  spanish_consistency_notes:
  - Se usa «Bienaventurado» como fórmula sapiencial de beatitud, en línea con el inglés POB.
  - Se conserva «el hombre» por fidelidad al singular masculino del hebreo.
  - «Sin mancha» traduce la integridad ética de תמים sin forzar una perfección absoluta.
  - «Riquezas» mantiene el alcance amplio de ממון y evita reducirlo solo a dinero.
  - La nota sobre el texto difícil se vincula a la cláusula de las riquezas, no al saludo de beatitud.
