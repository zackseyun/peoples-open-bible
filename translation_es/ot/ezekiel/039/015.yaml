translation:
  language: es
  text: Y los que pasen por la tierra la recorrerán, y cuando alguno vea un hueso humano[a], pondrá junto a él una marca, hasta que los sepultureros lo hayan enterrado en el Valle de Hamón-gog[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "un hueso de hombre". El hebreo usa אָדָם, que puede significar "hombre" o referirse de manera genérica a un ser humano; aquí el sentido genérico encaja mejor con el procedimiento funerario.
    reason: lexical_alternative
  - marker: b
    text: Hamón-gog probablemente significa "la multitud de Gog" o "la multitud que pertenece a Gog", pero se conserva aquí como nombre de lugar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָבְרוּ הָעֹבְרִים
  english_pob_choice: And those who pass through the land will pass through
  chosen_spanish: Y los que pasen por la tierra pasarán
  alternatives_spanish:
  - Y los que atraviesan la tierra, la atravesarán
  - Y los transeúntes pasarán
  lexicon: HALOT
  rationale: La duplicación hebrea del verbo עבר con el participio sustantivado conserva un efecto enfático o iterativo. En español, “los que pasen... pasarán” mantiene esa repetición sin volverse demasiado torpe.
- source_word: בָּאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En este contexto profético, “la tierra” comunica naturalmente el ámbito recorrido; “territorio” o “país” serían posibles, pero menos bíblicamente transparentes en español.
- source_word: וְרָאָה
  english_pob_choice: when one sees
  chosen_spanish: cuando alguno vea
  alternatives_spanish:
  - y vea
  - cuando uno vea
  lexicon: HALOT
  rationale: El hebreo es singular genérico. “Cuando alguno vea” preserva la fuerza procedimental y evita fijar un sujeto masculino específico en español.
- source_word: עֶצֶם אָדָם
  english_pob_choice: a human bone
  chosen_spanish: un hueso humano
  alternatives_spanish:
  - un hueso de hombre
  - un hueso de una persona
  lexicon: HALOT
  rationale: אָדָם aquí funciona de manera genérica como “humano”. “Hueso humano” conserva la neutralidad antropológica y evita la restricción masculina de “hombre”.
- source_word: וּבָנָה אֶצְלוֹ צִיּוּן
  english_pob_choice: he will set up a marker beside it
  chosen_spanish: pondrá junto a él una señal
  alternatives_spanish:
  - levantará junto a él un marcador
  - edificará junto a él un signo
  lexicon: HALOT
  rationale: בנה puede significar “construir”, pero con צִיּוּן en este contexto funerario indica levantar o colocar una marca. “Señal” es un equivalente natural y suficientemente amplio para un marcador funerario.
- source_word: עַד קָבְרוּ אֹתוֹ הַמְקַבְּרִים
  english_pob_choice: until the buriers have buried it
  chosen_spanish: hasta que los sepultureros lo hayan enterrado
  alternatives_spanish:
  - hasta que los que sepultan lo hayan sepultado
  - hasta que los enterradores lo hayan enterrado
  lexicon: HALOT
  rationale: El participio denota a quienes realizan el acto de enterrar. “Sepultureros” es una forma clara y digna en español, y conserva el vínculo verbal con “enterrar”.
- source_word: אֶל גֵּיא הֲמוֹן גּוֹג
  english_pob_choice: in the Valley of Hamon-gog
  chosen_spanish: en el Valle de Hamón-gog
  alternatives_spanish:
  - al Valle de Hamón-gog
  - en el valle de la multitud de Gog
  lexicon: HALOT
  rationale: Se mantiene el topónimo transliterado, como en el audit trail inglés. “Valle de Hamón-gog” preserva el nombre propio y sugiere el sentido de המון sin traducirlo dentro del texto principal.
theological_decisions:
- issue: Sentido genérico de אָדָם
  english_pob_reading: human
  chosen_spanish_reading: humano
  alternative_spanish_readings:
  - hombre
  - persona
  rationale: La escena trata de restos humanos hallados en el terreno, no de un varón particular. “Humano” mantiene el alcance genérico y evita introducir una lectura masculina que el hebreo no exige.
  doctrine_reference: 'Contested terms: אָדָם adam → man / humankind (context)'
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés, sin cambios sustanciales respecto del último pase: se mantiene la repetición enfática del verbo, el valor genérico de אָדָם y la transliteración del topónimo Hamón-gog. No se detectaron revisiones pendientes relevantes.'
  spanish_consistency_notes:
  - Se usa “tierra” para בָּאָרֶץ en coherencia con el uso profético natural en español.
  - Se evita “Cristo” u otra terminología doctrinal ajena porque el versículo no la contiene.
  - Se conserva un registro sobrio y bíblico; “señal” y “sepultureros” son preferidos por claridad sin perder precisión.
  - 'El topónimo se translitera con acento gráfico español: Hamón-gog.'
