translation:
  language: es
  text: Entonces saldrá al altar que está delante de Yahvé y hará expiación por él[a]; tomará parte de la sangre del toro y parte de la sangre del macho cabrío, y la pondrá sobre los cuernos del altar por todo alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo purifique»; el verbo hebreo puede llevar, en contextos rituales sacerdotales, un matiz de purificación.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיָצָא
  english_pob_choice: Then he shall go out
  chosen_spanish: Entonces saldrá
  alternatives_spanish:
  - Y saldrá
  - Luego saldrá
  lexicon: HALOT
  rationale: El hebreo continúa una secuencia ritual de acciones; «entonces» conserva el valor secuencial de la waw narrativa/instructiva, y «saldrá» expresa el movimiento fuera del espacio previo sin cargar el texto con pasado narrativo innecesario.
- source_word: הַמִּזְבֵּחַ אֲשֶׁר לִפְנֵי יְהוָה
  english_pob_choice: the altar that is before Yahweh
  chosen_spanish: el altar que está delante de Yahvé
  alternatives_spanish:
  - el altar delante de Yahvé
  - el altar en presencia de Yahvé
  lexicon: HALOT
  rationale: «Altar» corresponde directamente a מִזְבֵּחַ; «que está delante de» conserva bien לִפְנֵי con un español natural. Se usa «Yahvé» según la convención del proyecto para el Tetragrama, manteniendo el nombre divino donde el hebreo lo tiene.
- source_word: וְכִפֶּר עָלָיו
  english_pob_choice: and make atonement for it
  chosen_spanish: hará expiación por él
  alternatives_spanish:
  - hará atonamiento por él
  - lo purificará
  lexicon: HALOT
  rationale: En contexto sacerdotal, כפר admite el sentido cultual de expiación/purificación. «Hará expiación» preserva el peso ritual y teológico del verbo sin reducirlo a una mera limpieza física; el pronombre masculino singular refleja el referente del altar en español.
- source_word: וְלָקַח מִדַּם הַפָּר וּמִדַּם הַשָּׂעִיר
  english_pob_choice: and he shall take some of the bull's blood and some of the goat's blood
  chosen_spanish: tomará de la sangre del toro y de la sangre del macho cabrío
  alternatives_spanish:
  - tomará parte de la sangre del toro y parte de la sangre del macho cabrío
  - tomará sangre del toro y del macho cabrío
  lexicon: HALOT
  rationale: El valor partitivo de מִן queda bien expresado con «de la sangre». «Toro» sigue la equivalencia del POB inglés para פָּר, y «macho cabrío» distingue con más precisión שָׂעִיר como macho de la especie caprina, manteniendo el registro ritual.
- source_word: הַפָּר
  english_pob_choice: the bull
  chosen_spanish: el toro
  alternatives_spanish:
  - el bull
  - el novillo
  lexicon: HALOT
  rationale: פָּר puede traducirse como toro o novillo según contexto; aquí, en lenguaje sacrificial, «toro» es claro y digno, y evita una especificación juvenil que el hebreo no exige en este verso.
- source_word: הַשָּׂעִיר
  english_pob_choice: the goat
  chosen_spanish: el macho cabrío
  alternatives_spanish:
  - la cabra
  - el chivo
  lexicon: HALOT
  rationale: Aunque el POB inglés simplifica a «goat», el hebreo שָׂעִיר es un macho de la especie caprina. «Macho cabrío» conserva mejor la precisión léxica y el registro sacrificial.
- source_word: וְנָתַן עַל קַרְנוֹת הַמִּזְבֵּחַ סָבִיב
  english_pob_choice: and put it on the horns of the altar all around
  chosen_spanish: y la pondrá sobre los cuernos del altar alrededor
  alternatives_spanish:
  - y la aplicará sobre los cuernos del altar alrededor
  - y la pondrá en los cuernos del altar por todos lados
  lexicon: HALOT
  rationale: נָתַן se rinde con «poner» para mantener cercanía al hebreo sin perder naturalidad; «la» retoma la sangre mencionada. «Cuernos» traduce קַרְנוֹת literalmente, y «alrededor» expresa סָבִיב con una fórmula sobria y exacta.
theological_decisions:
- issue: Sentido cultual de כפר aplicado al altar
  english_pob_reading: make atonement for it
  chosen_spanish_reading: hará expiación por él
  alternative_spanish_readings:
  - lo purificará
  - hará expiación/purificación por él
  rationale: El versículo describe un rito de Día de Expiación sobre el altar. «Hará expiación» conserva la densidad sacrificial del término sin borrar la posible dimensión de purificación que el POB inglés dejó en nota; en español también podría decirse «purificación», pero no debe sustituir sin más el sentido expiatorio tradicional del contexto.
  doctrine_reference: Translation philosophy §6; mantener el peso teológico del rito sin estrechar el verbo
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: Se sigue el criterio del proyecto para el Tetragrama. «Yahvé» es una transliteración estable en español y evita la sustitución por un título. Esto preserva la referencia al nombre propio divino en el texto base hebreo.
  doctrine_reference: Convención terminológica del proyecto para יהוה / YHWH
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se documentaron cambios adicionales y el acuerdo con la fuente auditada fue alto. La redacción española sigue de cerca el hebreo y conserva la alternativa semántica principal de כפר en nota, como en el POB inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con la política del proyecto para el Tetragrama.
  - Se usa lenguaje cultual sobrio y directo, evitando paráfrasis explicativas no presentes en el original.
  - «Hará expiación» conserva la tensión expiación/purificación sin reducir el verbo a un solo matiz.
