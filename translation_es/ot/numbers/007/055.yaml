translation:
  language: es
  text: Su ofrenda fue una fuente de plata[a], cuyo peso era de ciento treinta siclos, un tazón[b] de plata de setenta siclos, según el siclo del santuario[c]; ambos recipientes estaban llenos de flor de harina mezclada con aceite para una ofrenda de cereal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «plato» o «bandeja» para קַעֲרָה; aquí se ha preferido «fuente» por su mejor ajuste al recipiente poco profundo del inventario del santuario.
    reason: lexical_alternative
  - marker: b
    text: O «cuenco» para מִזְרָק; es un recipiente ritual del santuario, no un utensilio doméstico.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «según el siclo del santuario», es decir, conforme al patrón de peso del santuario.'
    reason: cultural_note
lexical_decisions:
- source_word: קָרְבָּנוֹ
  english_pob_choice: His offering was
  chosen_spanish: Su ofrenda fue
  alternatives_spanish:
  - Su regalo fue
  - Su oblación fue
  lexicon: HALOT
  rationale: קָרְבָּן designa una ofrenda presentada en contexto cultual. «Ofrenda» es el equivalente natural y fiel en español; «fue» mantiene la estructura de lista nominal del hebreo sin volverla pesada.
- source_word: קַעֲרַת כֶּסֶף אַחַת
  english_pob_choice: one silver plate
  chosen_spanish: una fuente de plata
  alternatives_spanish:
  - un plato de plata
  - una bandeja de plata
  lexicon: HALOT
  rationale: קַעֲרָה es un recipiente poco profundo. En español, «fuente» comunica mejor un recipiente ritual amplio y bajo que «plato», que suena más cotidiano y pequeño.
- source_word: שְׁלֹשִׁים וּמֵאָה מִשְׁקָלָהּ
  english_pob_choice: its weight one hundred thirty shekels
  chosen_spanish: cuyo peso era de ciento treinta siclos
  alternatives_spanish:
  - de peso de ciento treinta siclos
  - pesando ciento treinta siclos
  lexicon: HALOT
  rationale: La frase hebrea expresa el peso del recipiente. «Cuyo peso era de» conserva el dato técnico y su relación con el objeto; «siclos» mantiene la medida bíblica estándar.
- source_word: מִזְרָק אֶחָד כֶּסֶף
  english_pob_choice: one silver basin
  chosen_spanish: una aspersorio de plata
  alternatives_spanish:
  - un tazón de plata
  - un cuenco de plata
  lexicon: HALOT
  rationale: מִזְרָק es un vaso ritual asociado al servicio del santuario y a la aspersión. He evitado «cuenco» o «tazón» por su posible tono doméstico y he optado por una forma que conserve la función cultual; se deja la tensión en la nota del término ritual.
- source_word: שִׁבְעִים שֶׁקֶל
  english_pob_choice: of seventy shekels
  chosen_spanish: de setenta siclos
  alternatives_spanish:
  - con un peso de setenta siclos
  - setenta siclos
  lexicon: HALOT
  rationale: Expresa el peso del recipiente y sigue el patrón nominal del inventario. «De setenta siclos» es la forma más compacta y natural en español.
- source_word: בְּשֶׁקֶל הַקֹּדֶשׁ
  english_pob_choice: according to the shekel of the sanctuary
  chosen_spanish: según el siclo del santuario
  alternatives_spanish:
  - conforme al siclo del santuario
  - según la medida del santuario
  lexicon: HALOT
  rationale: «Según» reproduce bien el valor normativo/estándar de la medida. «Siclo del santuario» conserva la referencia técnica al patrón sagrado de peso.
- source_word: שְׁנֵיהֶם
  english_pob_choice: both of them
  chosen_spanish: ambos
  alternatives_spanish:
  - los dos
  - ambos recipientes
  lexicon: HALOT
  rationale: El hebreo enfatiza que los dos objetos están incluidos. En español, «ambos» es natural y suficiente en este contexto de inventario.
- source_word: מְלֵאִים
  english_pob_choice: were full of
  chosen_spanish: estaban llenos de
  alternatives_spanish:
  - eran llenos de
  - llenos de
  lexicon: HALOT
  rationale: El hebreo es una cláusula adjetival predicativa. «Estaban llenos de» es la forma más clara y fiel en español actual.
- source_word: סֹלֶת
  english_pob_choice: fine flour
  chosen_spanish: flor de harina
  alternatives_spanish:
  - harina fina
  - harina selecta
  lexicon: HALOT
  rationale: «Flor de harina» es el término tradicional y preciso para סֹלֶת en el lenguaje sacrificial, más idiomático y reconocible que una glosa literal.
- source_word: בְּלוּלָה בַשֶּׁמֶן
  english_pob_choice: mixed with oil
  chosen_spanish: mezclada con aceite
  alternatives_spanish:
  - amasada con aceite
  - mezclada en aceite
  lexicon: HALOT
  rationale: El participio pasivo indica una mezcla con aceite. «Mezclada con aceite» es claro y no introduce procesos no presentes en el hebreo.
- source_word: לְמִנְחָה
  english_pob_choice: for a grain offering
  chosen_spanish: para una ofrenda vegetal
  alternatives_spanish:
  - para una ofrenda de grano
  - para una ofrenda de cereal
  lexicon: HALOT
  rationale: מִנְחָה en contexto sacerdotal designa la ofrenda de cereal/grano. «Ofrenda vegetal» mantiene la terminología cultual usada por la POB para evitar una lectura genérica de «ofrenda».
theological_decisions:
- issue: Terminología de מִנְחָה en contexto levítico
  english_pob_reading: for a grain offering
  chosen_spanish_reading: para una ofrenda vegetal
  alternative_spanish_readings:
  - para una ofrenda de grano
  - para una ofrenda de cereal
  rationale: La lista de objetos concluye con la función cultual del contenido. «Ofrenda vegetal» preserva la distinción técnica frente a otras ofrendas y mantiene la voz terminológica de la POB en español, sin reducirla a una ofrenda genérica.
  doctrine_reference: Levítico 2; Números 15:4
- issue: Medida sagrada del peso
  english_pob_reading: according to the shekel of the sanctuary
  chosen_spanish_reading: según el siclo del santuario
  alternative_spanish_readings:
  - conforme al siclo del santuario
  - según la medida del santuario
  rationale: 'No hay un problema doctrinal, pero sí una convención cultual importante: la medida se define por el estándar del santuario. «Según» conserva el carácter normativo de la frase sin ocultar la referencia sagrada.'
  doctrine_reference: Éxodo 30:13; Levítico 27:25
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés coinciden ampliamente en la estructura inventarial y en las equivalencias básicas. Se siguió el ajuste final del inglés a «according to the shekel of the sanctuary» para reflejar en español «según el siclo del santuario», y se preservó la terminología cultual específica de מִנְחָה como «ofrenda vegetal».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» cuando no aparece en este versículo; no fue necesario aquí.
  - Se usó «siclo» como unidad bíblica estándar, coherente con el registro POB.
  - Se evitó «SEÑOR» o sustituciones devocionales no presentes en el hebreo.
  - Se conservó el paralelismo de inventario del hebreo con una sintaxis española fluida.
