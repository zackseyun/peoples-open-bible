translation:
  language: es
  text: Hizo lo malo[a] ante los ojos de Yahvé. No se apartó de los pecados de Jeroboam hijo de Nabat, con los que[b] hizo pecar a Israel, todos sus días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hizo el mal». El hebreo usa una expresión idiomática de valoración moral.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con el cual hizo pecar a Israel», si el relativo se toma con «Jeroboam hijo de Nabat» en vez de con «los pecados».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעַשׂ
  english_pob_choice: He did
  chosen_spanish: Hizo
  alternatives_spanish:
  - Y hizo
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de עשה se vierte naturalmente con pasado simple en español. Se omite la conjunción inicial para mantener fluidez narrativa, como en el auditorio inglés.
- source_word: הָרַע
  english_pob_choice: what was evil
  chosen_spanish: lo malo
  alternatives_spanish:
  - el mal
  - lo que era malo
  lexicon: HALOT
  rationale: La expresión con עשה en Reyes es un juicio moral. En español, 'hacer lo malo' comunica de forma idiomática esa evaluación sin forzar una perífrasis pesada.
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the eyes of Yahweh
  chosen_spanish: ante los ojos de Yahvé
  alternatives_spanish:
  - a los ojos de Yahvé
  - delante de Yahvé
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo con 'ojos' para reflejar la metáfora de evaluación divina. 'Ante los ojos de' es transparente y natural en español bíblico moderno.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio POB de transliterar el nombre divino. 'Yahvé' preserva el nombre propio del pacto y evita la sustitución por un título.
- source_word: לֹא סָר
  english_pob_choice: He did not turn away
  chosen_spanish: No se apartó
  alternatives_spanish:
  - No se desvió
  - No volvió atrás
  lexicon: HALOT
  rationale: סור con negación expresa no abandonar un patrón. 'Apartarse' conserva la imagen de separación y suena más natural que una calca rígida.
- source_word: מֵעַל חַטֹּאות
  english_pob_choice: from the sins
  chosen_spanish: de los pecados
  alternatives_spanish:
  - de las pecados
  - de las ofensas
  lexicon: HALOT
  rationale: Se vierte la pluralidad de חטאות con 'pecados'. En español, el giro 'apartarse de los pecados de...' mantiene la relación de procedencia y abandono.
- source_word: יָרָבְעָם בֶּן נְבָט
  english_pob_choice: Jeroboam son of Nebat
  chosen_spanish: Jeroboam hijo de Nabat
  alternatives_spanish:
  - Jeroboam, hijo de Nabat
  - Jeroboam, el hijo de Nabat
  lexicon: HALOT
  rationale: La relación constructa se expresa de forma directa con 'hijo de'. Se usa 'Nabat' como transliteración coherente de נְבָט.
- source_word: אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  english_pob_choice: with which he caused Israel to sin
  chosen_spanish: con los que hizo pecar a Israel
  alternatives_spanish:
  - con lo cual hizo pecar a Israel
  - por los cuales hizo pecar a Israel
  - que hizo pecar a Israel
  lexicon: HALOT
  rationale: Se conserva el sentido causativo del hiphil de חטא con 'hacer pecar'. El relativo plural 'los que' mantiene la posibilidad de que el antecedente cercano sean los 'pecados', como en la lectura preferida del POB inglés, sin excluir la lectura alternativa.
- source_word: כָּל יָמָיו
  english_pob_choice: all his days
  chosen_spanish: todos sus días
  alternatives_spanish:
  - durante todos sus días
  - mientras vivió
  lexicon: HALOT
  rationale: Se preserva el idiomatismo temporal hebreo en una forma corriente y clara en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La política POB para el Tetragrama es transliterar el nombre propio. 'Yahvé' comunica de modo consistente la referencia al nombre del pacto, sin sustituirlo por una abreviación litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Alcance del relativo אֲשֶׁר הֶחֱטִיא אֶת יִשְׂרָאֵל
  english_pob_reading: The clause can be taken with 'Jeroboam' rather than with 'the sins.'
  chosen_spanish_reading: 'Se mantiene la ambigüedad: ''con los que hizo pecar a Israel'' puede leerse con ''los pecados'' como antecedente inmediato, sin cerrar la posibilidad de que el relativo se relacione semánticamente con Jeroboam.'
  alternative_spanish_readings:
  - Jeroboam hijo de Nabat, que hizo pecar a Israel
  - con los pecados de Jeroboam hijo de Nabat, que hizo pecar a Israel
  rationale: El hebreo permite más de una vinculación sintáctica. La traducción española conserva la lectura preferida por el POB inglés y deja abierta la alternativa sin resolver en exceso la relación del relativo.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió 'by which' por 'with which' para acercarse más a la construcción hebrea sin perder naturalidad. La redacción española ya refleja esa solución con 'con los que' y conserva la ambigüedad anotada entre el antecedente inmediato («los pecados») y la posible vinculación semántica con Jeroboam.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se mantiene 'hijo de' para relaciones genealógicas, no 'el hijo de'.
  - '''Hizo pecar'' conserva el valor causativo del hiphil, evitando suavizarlo a ''llevar al pecado''.'
  - El tono es sobrio y bíblico, sin recurrir a arcaísmos innecesarios.
