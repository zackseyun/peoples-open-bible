revisions:
- from: Te adornaste con oro y plata[a], y tu vestimenta fue de lino fino, seda y tela bordada. Comiste flor de harina, miel y aceite[b], y te volviste bellísima en gran manera, y prosperaste hasta llegar a la realeza.
  to: Te adornaste con oro y plata, y tu vestimenta fue de lino fino, seda[a] y tela bordada. Comiste flor de harina, miel y aceite, y te volviste sumamente hermosa, y prosperaste hasta llegar a la realeza[b].
  rationale: Se corrigen los anclajes de las notas para que correspondan a las palabras pertinentes del texto, y se mejora la naturalidad de la intensificación de belleza con 'sumamente hermosa' sin alterar el sentido del hebreo ni las decisiones del POB inglés.
