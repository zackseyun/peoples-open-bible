translation:
  language: es
  text: '—Ni uno siquiera. Daniel se rió, y detuvo al rey para que no entrara dentro, y dijo: «Mira ahora el piso, y fíjate bien[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego literalmente dice «conoce» o «reconoce»; el sentido aquí es observar con atención y percibir lo que muestra el piso.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ εἷς
  english_pob_choice: Not even one
  chosen_spanish: Ni uno siquiera
  alternatives_spanish:
  - No hay ni uno
  - No uno
  lexicon: LSJ
  rationale: La negación enfática breve se expresa de forma natural en español con «ni uno siquiera», conservando el golpe abrupto del griego sin sobreexplicar.
- source_word: ἐγέλασεν
  english_pob_choice: laughed
  chosen_spanish: se rió
  alternatives_spanish:
  - rió
  - se burló
  lexicon: LSJ
  rationale: El verbo básico es «reírse»; «se burló» introduciría una intención no explícita, y «rió» suena menos idiomático en este contexto narrativo.
- source_word: ἐκράτησεν τὸν βασιλέα
  english_pob_choice: held the king back
  chosen_spanish: detuvo al rey
  alternatives_spanish:
  - lo retuvo
  - lo contuvo
  lexicon: LSJ
  rationale: En español, «detuvo» comunica bien la acción preventiva y física sin añadir violencia; mantiene el objeto directo personal del griego.
- source_word: τοῦ μὴ εἰσελθεῖν αὐτὸν ἔσω
  english_pob_choice: from going inside
  chosen_spanish: para que no entrara dentro
  alternatives_spanish:
  - de entrar dentro
  - para impedirle entrar
  lexicon: LSJ
  rationale: El infinitivo articular de prevención se vierte mejor como una finalidad negativa natural en español. «Dentro» conserva la idea de entrar al interior del recinto.
- source_word: Ἴδε δὴ
  english_pob_choice: Now look
  chosen_spanish: Mira ahora
  alternatives_spanish:
  - Mira, pues
  - Ve ahora
  lexicon: LSJ
  rationale: «Mira ahora» conserva el imperativo de atención y la inmediatez de δή sin volverse arcaico.
- source_word: τὸ ἔδαφος
  english_pob_choice: the floor
  chosen_spanish: el piso
  alternatives_spanish:
  - el suelo
  - el pavimento
  lexicon: LSJ
  rationale: En español, «piso» resulta más natural para el interior de una habitación o templo; «suelo» sería más amplio y menos preciso en este contexto.
- source_word: γνῶθι
  english_pob_choice: take notice
  chosen_spanish: toma nota
  alternatives_spanish:
  - reconoce
  - observa
  lexicon: LSJ
  rationale: El imperativo pide percibir e interpretar lo que el piso muestra. «Toma nota» reproduce esa llamada a fijarse cuidadosamente sin reducirla a simple conocimiento abstracto.
translation_notes:
  revision_awareness: Se siguió el texto griego de Swete (Theodotion stream) y el audit trail inglés existente. No hubo revisiones aplicadas en el tramo más reciente; la concordancia general es alta, con una sola observación menor ya absorbida en la elección española de γνῶθι.
  spanish_consistency_notes:
  - Se mantuvo el estilo narrativo sobrio y directo del POB.
  - Se evitó «SEÑOR» u այլ terminología teológica no pertinente.
  - «Ni uno siquiera» conserva la concisión enfática del griego.
  - La nota[a] se ancla en «se rió» para preservar la alternativa semántica de γνῶθι.
