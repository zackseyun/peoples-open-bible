  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «Porque», «hacen el mal», «se les quita el sueño» y «hacen tropezar a alguien»/«causan tropiezo» son coherentes con el expediente inglés y con el hebreo. No intervienen términos sensibles del glosario mayor (Yahvé, Mesías, Espíritu, etc.).
