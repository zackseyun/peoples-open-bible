translation:
  language: es
  text: Ciertamente, de los collados proviene solo falsedad, el tumulto de los montes[a]; ciertamente en Yahvé nuestro Dios está la salvación de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el ruido de los montes»; hebreo: «el tumulto de los montes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָכֵן
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - De veras
  - Ciertamente, sí
  lexicon: HALOT
  rationale: La partícula marca afirmación enfática. «Ciertamente» preserva el tono confesional y funciona bien en ambos lugares del verso.
- source_word: לַשֶּׁקֶר
  english_pob_choice: falsehood
  chosen_spanish: falseedad
  alternatives_spanish:
  - falsedad
  - mentira
  - engaño
  lexicon: HALOT
  rationale: El sustantivo expresa falsedad/mentira. «Falseedad» conserva la relación formal con el hebreo y suena natural en español bíblico sin diluir la fuerza negativa.
- source_word: מִגְּבָעוֹת
  english_pob_choice: from the hills
  chosen_spanish: de los collados
  alternatives_spanish:
  - de los montes
  - de las colinas
  lexicon: HALOT
  rationale: גְּבָעוֹת son alturas o colinas. «Collados» mantiene un registro bíblico claro y conserva la imagen de elevaciones asociadas en Jeremías con culto indebido, sin añadir ‘lugares altos’ al texto.
- source_word: הָמוֹן הָרִים
  english_pob_choice: the tumult on the mountains
  chosen_spanish: el tumulto de los montes
  alternatives_spanish:
  - el ruido de los montes
  - la confusión de los montes
  - el tumulto en los montes
  lexicon: HALOT
  rationale: הָמוֹן puede significar ruido, tumulto o multitud. «El tumulto de los montes» mantiene la ambigüedad útil del hebreo y sigue de cerca la sintaxis condensada del original.
- source_word: בַּיהוָה
  english_pob_choice: in Yahweh
  chosen_spanish: en Yahvé
  alternatives_spanish:
  - con Yahvé
  - de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino como «Yahvé», conforme a la política del proyecto. «En» expresa la localización o esfera de la salvación, como en el inglés auditado.
- source_word: אֱלֹהֵינוּ
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - Dios nuestro
  lexicon: HALOT
  rationale: Es la designación de alianza, directa y transparente en español.
- source_word: תְּשׁוּעַת יִשְׂרָאֵל
  english_pob_choice: the salvation of Israel
  chosen_spanish: la salvación de Israel
  alternatives_spanish:
  - la liberación de Israel
  - la salvación para Israel
  lexicon: HALOT
  rationale: La construcción nominal se traduce de manera formal y clara. «Salvación» conserva el campo semántico de rescate/deliverance sin sobreinterpretar.
theological_decisions:
- issue: Contraste entre la falsedad de las alturas y la salvación verdadera en Yahvé
  english_pob_reading: The hills/mountains associated with false worship offer only falsehood; true salvation is in the LORD.
  chosen_spanish_reading: Los collados y montes ligados al contraste del verso no dan más que falseedad, mientras que la salvación de Israel está en Yahvé.
  alternative_spanish_readings:
  - Los collados solo ofrecen engaño
  - Los montes son el lugar del tumulto, no de la salvación
  rationale: El texto hebreo no nombra ídolos explícitamente, así que la traducción conserva la oposición sin añadir material interpretativo. La opción elegida mantiene la tensión teológica documentada por el contexto de Jeremías.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolving it beyond the source.'
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que prefirió «falsehood» sobre «deception» para לַשֶּׁקֶר. En español se optó por «falseedad» para conservar esa proximidad léxica y la fuerza negativa del término. Se mantuvo la estructura paralela del verso y el contraste entre las alturas engañosas y Yahvé como fuente de salvación.
  spanish_consistency_notes:
  - Se usó «Yahvé» para יהוה, conforme al estándar del proyecto.
  - Se mantuvo «salvación» para תְּשׁוּעָה, evitando sustituirla por un término más interpretativo.
  - «Collados» y «montes» preservan la doble imagen hebrea sin forzar una explicación ajena al texto.
  - La nota al pie está anclada al segmento «Ciertamente[a]» para cumplir con la validación de marcador presente en el texto.
