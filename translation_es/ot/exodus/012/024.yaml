revisions:
- from: Y guardaréis esta cosa como estatuto para vosotros y para vuestros hijos para siempre[a][b].
  to: Y guardaréis este asunto como estatuto para vosotros y para vuestros hijos para siempre[a][b].
  rationale: Se reemplaza «esta cosa» por «este asunto» para un español más natural sin perder la amplitud semántica de הַדָּבָר. Se corrige la nota b eliminando «vuestros niños», que no refleja adecuadamente el hebreo.
