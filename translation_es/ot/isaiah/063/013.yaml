review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo: participio continuativo («guiándolos»), tránsito «por las profundidades», símil singular («como un caballo») y negación final («no tropezaron»). Sin embargo, «en el desierto» para בַּמִּדְבָּר es menos fiel al matiz auditado de «wilderness» y en este símil suena menos natural que una opción más amplia como «campo abierto» o «llanura».'
  spanish_quality_summary: El texto es claro y digno, pero «como un caballo en el desierto» resulta algo extraño en español y puede evocar un caballo perdido en arena árida más que un caballo que corre sin tropiezo en terreno abierto. Una leve mejora aumenta naturalidad sin apartarse del hebreo.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Profundidades» preserva adecuadamente תְּהֹמוֹת sin sobreinterpretar «mar». No intervienen términos sensibles como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: «en el desierto» para בַּמִּדְבָּר en este símil
    rationale: Aunque מִדְבָּר puede traducirse «desierto», el inglés auditado eligió «wilderness» para no sobreespecificar aridez. En español, «como un caballo en el desierto» suena menos idiomático y puede desviar la imagen. «Por campo abierto» conserva mejor la idea de terreno libre donde no se tropieza.
  - severity: low
    issue: Texto de nota al pie algo débil como alternativa
    rationale: La nota comienza con «O» pero la alternativa «a través de las profundidades» es prácticamente equivalente a la principal. Conviene conservar la nota por fidelidad al audit trail, pero afinar la redacción para explicar que también puede entenderse como «por las aguas profundas».
  revised_spanish_text: guiándolos por las profundidades[a] como un caballo por campo abierto; no tropezaron.
  revised_footnotes:
  - marker: a
    text: O «por las aguas profundas». El hebreo dice «por las profundidades», evocando el cruce del éxodo.
    reason: lexical_alternative
