    text: Or 'that the opportunity favored him' or 'that the time was working in his favor.' The Greek expression is somewhat idiomatic, indicating that circumstances were advantageous to Jonathan.
    reason: lexical_alternative
  - marker: b
    text: '''Friendship'' here likely refers to formal diplomatic relations, not merely private affection.'
    reason: cultural_note
