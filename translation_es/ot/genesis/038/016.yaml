  revision_rationale: Se revisa la expresión eufemística para que el español sea más natural sin perder el matiz del hebreo. «Llegarme a ti / a mí» preserva mejor el tono insinuado del original que «entrar a ti / a mí». También se ajusta el arranque narrativo a «Entonces» para mayor fluidez.
