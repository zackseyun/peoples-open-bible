translation:
  language: es
  text: 'Entonces el que estaba a cargo del palacio, y el que estaba a cargo de la ciudad, junto con los ancianos y los guardianes[a], enviaron este mensaje a Jehú: «Somos tus siervos, y haremos todo lo que nos digas. No haremos rey a ningún hombre. Haz lo que sea bueno a tus ojos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los padres adoptivos» o «los cuidadores» para «los guardianes». El término hebreo se refiere a quienes estaban encargados del cuidado de los hijos reales.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשֶׁר עַל הַבַּיִת
  english_pob_choice: the one who was over the palace
  chosen_spanish: el que estaba sobre el palacio
  alternatives_spanish:
  - el que estaba sobre la casa
  - el mayordomo del palacio
  lexicon: HALOT
  rationale: En español, «palacio» conserva mejor el contexto real y administrativo que «casa», que suena más doméstico. «Estaba sobre» reproduce el valor funcional del hebreo sin convertirlo en un título más específico de lo que el texto permite.
- source_word: וַאֲשֶׁר עַל הָעִיר
  english_pob_choice: the one who was over the city
  chosen_spanish: el que estaba sobre la ciudad
  alternatives_spanish:
  - el gobernador de la ciudad
  - el supervisor de la ciudad
  lexicon: HALOT
  rationale: Se mantiene la descripción de cargo sin sobreinterpretar el oficio. «Sobre la ciudad» refleja la construcción hebrea y evita fijar un título administrativo que el texto no precisa.
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los líderes
  lexicon: HALOT
  rationale: «Ancianos» es el equivalente estándar y conserva el matiz social y político del término hebreo.
- source_word: הָאֹמְנִים
  english_pob_choice: the guardians
  chosen_spanish: los guardianes
  alternatives_spanish:
  - los padres adoptivos
  - los cuidadores
  lexicon: HALOT
  rationale: «Guardianes» mantiene la amplitud semántica del término en este contexto de tutela de los hijos reales. Se evita «padres adoptivos», que sería demasiado específico, y «cuidadores», que pierde algo del carácter de responsabilidad formal.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus esclavos
  lexicon: HALOT
  rationale: Aunque el término puede significar «esclavos», aquí funciona como fórmula de sumisión política y respeto. «Siervos» comunica mejor esa deferencia en español y mantiene el registro reverente que exige la escena.
- source_word: וְכֹל אֲשֶׁר תֹּאמַר אֵלֵינוּ נַעֲשֶׂה
  english_pob_choice: all that you say to us we will do
  chosen_spanish: y todo lo que nos digas haremos
  alternatives_spanish:
  - y todo lo que nos ordenes haremos
  - y todo cuanto nos digas lo haremos
  lexicon: HALOT
  rationale: La frase conserva la promesa de obediencia. Se prefiere un orden natural en español sin añadir intensificadores ajenos al hebreo.
- source_word: לֹא נַמְלִיךְ אִישׁ
  english_pob_choice: We will not make any man king
  chosen_spanish: No proclamaremos rey a ningún hombre
  alternatives_spanish:
  - No haremos rey a ningún hombre
  - No pondremos a ningún hombre por rey
  lexicon: HALOT
  rationale: El causativo de מלך expresa instalar o hacer rey. «Proclamaremos rey» da en español una idea clara de entronización; aunque no es la única posibilidad, evita la dureza de un calco y conserva el sentido de investidura.
- source_word: הַטּוֹב בְּעֵינֶיךָ
  english_pob_choice: what is good in your eyes
  chosen_spanish: lo que sea bueno a tus ojos
  alternatives_spanish:
  - lo que te parezca bueno
  - lo que sea recto ante ti
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea de «ojos» para no perder el modismo, pero se adapta la sintaxis al español. «Bueno» reproduce el valor evaluativo del original.
- source_word: עֲשֵׂה
  english_pob_choice: Do
  chosen_spanish: Haz
  alternatives_spanish:
  - Actúa
  - Hazlo
  lexicon: HALOT
  rationale: Imperativo breve y natural en español, correspondiente al cierre conciso del hebreo.
theological_decisions:
- issue: Cómo traducir el cierre «lo bueno en tus ojos» sin neutralizar el modismo semítico
  english_pob_reading: Do what is good in your eyes.
  chosen_spanish_reading: Haz lo que sea bueno a tus ojos.
  alternative_spanish_readings:
  - Haz lo que te parezca bueno.
  - Haz lo recto ante ti.
  rationale: Se preserva el valor idiomático de la expresión para mantener la imaginería bíblica. La formulación elegida suena natural en español y no desplaza el énfasis de discernimiento personal que el hebreo comunica.
  doctrine_reference: Proverbios 3:7; 1 Samuel 16:7 (lenguaje evaluativo y de percepción en la Biblia hebrea)
- issue: Cómo reflejar la autoidentificación política «tus siervos»
  english_pob_reading: We are your servants.
  chosen_spanish_reading: Nosotros somos tus siervos.
  alternative_spanish_readings:
  - Somos tus servidores.
  - Somos tus esclavos.
  rationale: «Siervos» comunica subordinación y lealtad en una petición política sin cargar innecesariamente la frase con la dureza social de «esclavos». En este contexto el habla es diplomática, pero no meramente neutral.
  doctrine_reference: Romanos 13:1-7 (lenguaje de sujeción y autoridad); 2 Reyes 10:5 contexto narrativo
translation_notes:
  revision_awareness: La versión revisa la salida inglesa auditada con acuerdo alto y no incorpora cambios textuales; la principal atención estuvo en conservar el valor administrativo de los cargos, la fuerza causativa de נַמְלִיךְ y el modismo evaluativo de «lo bueno en tus ojos» dentro de un español publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - «Jehú» sigue la forma española estándar del nombre propio.
  - «Siervos» se usa como término de deferencia política, no como equivalencia automática de δοῦλος.
  - La nota al pie se ancla solo en «guardianes», siguiendo la alternativa lexical documentada en el POB inglés.
