revisions:
- from: Y amontonaron a[a] en montones, y la tierra apestó.
  to: Y amontonaron las ranas en montones[a], y la tierra apestó.
  rationale: Se corrige el objeto directo para reflejar fielmente אֹתָם y producir español gramatical y claro. Se reubica la nota a 'montones' porque allí está la repetición hebrea חֳמָרִם חֳמָרִם. Se conserva 'apestó' por su fuerza idiomática y cercanía al hebreo.
  reviewer_model: gpt-5.4
