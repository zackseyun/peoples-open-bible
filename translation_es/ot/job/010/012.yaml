translation:
  language: es
  text: Tú me has dado vida y amor leal, y tu cuidado[a] ha preservado mi espíritu[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu visitación» o «tu vigilancia» ha preservado mi espíritu.
    reason: lexical_alternative
  - marker: b
    text: O «aliento».
    reason: lexical_alternative
lexical_decisions:
- source_word: חַיִּים
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vidas
  - vivir
  lexicon: HALOT
  rationale: Aunque el hebreo está en plural, funciona como plural de plenitud con sentido abstracto. En español, «vida» es la equivalencia natural y fiel en este contexto de don divino.
- source_word: וָחֶסֶד
  english_pob_choice: steadfast love
  chosen_spanish: amor leal
  alternatives_spanish:
  - bondad
  - misericordia
  - amor constante
  - fidelidad amorosa
  lexicon: HALOT
  rationale: חֶסֶד abarca lealtad pactual, bondad y amor perseverante. «Amor leal» conserva mejor esa carga que «bondad» o «misericordia», y evita reducir el término a una sola faceta.
- source_word: עָשִׂיתָ עִמָּדִי
  english_pob_choice: you have granted me
  chosen_spanish: tú me has dado
  alternatives_spanish:
  - tú has tratado conmigo al darme
  - tú me has concedido
  - has obrado conmigo
  lexicon: HALOT
  rationale: La construcción hebrea literalmente dice «hiciste conmigo», pero en este contexto expresa beneficio concedido. «Me has dado» comunica el sentido benefactivo con naturalidad en español sin perder la base verbal del hebreo.
- source_word: וּפְקֻדָּתְךָ
  english_pob_choice: your care
  chosen_spanish: tu cuidado
  alternatives_spanish:
  - tu vigilancia
  - tu visita
  - tu providencia
  - tu supervisión
  lexicon: HALOT
  rationale: פְקֻדָּה puede referirse a cuidado atento, supervisión o visita. «Tu cuidado» expresa aquí la función preservadora y benevolente que el contexto favorece, mientras que «visita» queda como alternativa léxica posible.
- source_word: שָׁמְרָה
  english_pob_choice: has preserved
  chosen_spanish: ha preservado
  alternatives_spanish:
  - ha guardado
  - ha protegido
  - ha velado por
  lexicon: HALOT
  rationale: El verbo implica guardar, conservar o preservar. «Ha preservado» hace explícito el resultado duradero de la acción divina y encaja bien con la clausula final.
- source_word: רוּחִי
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi aliento
  - mi hálito
  - mi vida
  lexicon: HALOT
  rationale: רוּחַ puede significar espíritu, aliento o viento. Aquí, por el paralelo con «vida» y la preservación divina, «mi espíritu» es la mejor opción; «aliento» permanece como alternativa léxica legítima.
theological_decisions:
- issue: Valor de חֶסֶד en relación con Dios
  english_pob_reading: steadfast love
  chosen_spanish_reading: amor leal
  alternative_spanish_readings:
  - bondad
  - misericordia
  - amor constante
  - fidelidad amorosa
  rationale: El versículo describe el bien que Dios ha otorgado a Job sin exigir una formulación doctrinal más estrecha. «Amor leal» conserva la dimensión de fidelidad persistente y benevolencia del término hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 6
- issue: Sentido de פְקֻדָּה
  english_pob_reading: positive divine care/oversight
  chosen_spanish_reading: cuidado divino atento y preservador
  alternative_spanish_readings:
  - visita
  - vigilancia
  - supervisión
  - providencia
  rationale: En el contexto inmediato, la acción que preserva el espíritu favorece un sentido positivo de atención divina, no uno punitivo. «Tu cuidado» mantiene esa orientación y deja abierta la amplitud semántica del hebreo.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: El control de revisión más reciente indicó que no eran necesarios cambios, con acuerdo alto entre revisores y sin incidencias reportadas. Esta propuesta mantiene ese alineamiento y conserva la ambigüedad lexical documentada en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» fuera del versículo porque aquí no aparece el tetragrámaton ni una forma explícita de כינוי divino en el texto fuente.
  - «Espíritu» se usa con mayúscula no requerida; aquí se conserva minúscula por referirse al espíritu de Job, no al Espíritu Santo.
  - La elección «amor leal» evita el calco rígido de «amor inquebrantable» y conserva la carga de חֶסֶד sin secularizarla.
