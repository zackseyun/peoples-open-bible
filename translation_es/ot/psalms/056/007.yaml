review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia hebrea: reunión hostil, ocultamiento, vigilancia de los pasos y espera contra la vida del salmista. Sin embargo, la cláusula final «como esperan mi vida» no suena idiomática en español y debilita el sentido hostil-documentado de קִוּוּ + נַפְשִׁי. Además, la nota a mezcla español e inglés («lurk») y atribuye a la primera cláusula una alternativa que en el expediente inglés pertenece a «they hide themselves».'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «como esperan mi vida» resulta poco natural; «mientras esperan contra mi vida» o similar sería más claro. También conviene evitar el anglicismo crudo en la nota y ajustar la nota d para que corresponda mejor al texto.
  glossary_alignment: No hay términos del glosario mayor implicados. «mi vida» para נַפְשִׁי y «vigilan» para יִשְׁמֹרוּ están bien. «se esconden» es adecuado para יצפינו. «se juntan» es posible para יָגוּרוּ, aunque «se reúnen» sería un poco más digno; no es un problema grave.
  issues:
  - severity: medium
    issue: La frase «como esperan mi vida» es poco idiomática y puede sonar semánticamente extraña en español.
    rationale: Aunque conserva formalmente «como esperan», en español no se dice naturalmente «esperar mi vida» para expresar una espera hostil contra alguien. Debe aclararse con una formulación como «mientras esperan contra mi vida» o equivalente, preservando el sentido sin sobreinterpretar.
  - severity: medium
    issue: La nota a está desalineada con el expediente inglés y contiene el anglicismo «lurk».
    rationale: La alternativa de emboscada corresponde al verbo «se esconden», no a «se juntan». Además, una nota en inglés dentro del texto español reduce la calidad editorial.
  - severity: low
    issue: La nota d no corresponde bien a la redacción principal actual.
    rationale: Si el texto revisado usa «mientras esperan contra mi vida», la nota d debe ofrecer la variante anterior/alternativa de manera coherente.
  revised_spanish_text: Ellos se juntan; se esconden[a]; vigilan mis pasos[b], mientras esperan contra mi vida[c][d].
  revised_footnotes:
