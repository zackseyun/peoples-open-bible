revisions:
- from: Hanún y los habitantes de Zanoaj[a] repararon la Puerta del Valle. Ellos la edificaron y colocaron sus puertas, sus cerrojos y sus barras; y repararon mil codos[b] de la muralla, hasta la Puerta del Estiércol[c].
  to: Hanún y los habitantes de Zanoa[a] repararon la Puerta del Valle. La construyeron y colocaron sus puertas, sus cerrojos y sus barras; y repararon mil codos[b] de la muralla, hasta la Puerta del Estiércol[c].
  rationale: Se corrige 'Zanoaj' a 'Zanoa' para usar una forma española más natural y reconocible; se sustituye la alternativa de nota 'Refugo' por 'Basurero', que comunica fielmente el sentido de desechos/refuse; y se mejora la fluidez eliminando el pronombre explícito e introduciendo 'La construyeron', que sigue de cerca el hebreo y suena más natural en español.
