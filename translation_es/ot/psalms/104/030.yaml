translation:
  language: es
  text: Cuando envías tu Espíritu[a], son creados[b], y renuevas la faz del suelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu aliento» o «tu viento»; רוּחַ en hebreo puede abarcar esos sentidos.
    reason: lexical_alternative
  - marker: b
    text: O «Envías tu Espíritu, y son creados».
    reason: previous_rendering
lexical_decisions:
- source_word: תְּשַׁלַּח
  english_pob_choice: send out
  chosen_spanish: envías
  alternatives_spanish:
  - envías fuera
  - mandas
  - despachas
  lexicon: HALOT
  rationale: El pi'el de שלח expresa envío activo. En español, «envías» comunica con naturalidad esa acción divina sin añadir matices ajenos; «envías fuera» sería más literal pero menos idiomático. El complemento verbal posterior ya preserva la idea de emisión/expulsión implícita en el hebreo.
- source_word: רוּחֲךָ
  english_pob_choice: your Spirit
  chosen_spanish: tu Espíritu
  alternatives_spanish:
  - tu aliento
  - tu viento
  lexicon: HALOT
  rationale: רוּחַ admite «espíritu», «aliento» y «viento». En este contexto de creación y renovación, «tu Espíritu» conserva la agencia vivificadora de Dios y la resonancia teológica que el inglés POB también prioriza, sin borrar la multivalencia, que se mantiene en nota.
- source_word: יִבָּרֵאוּן
  english_pob_choice: they are created
  chosen_spanish: son creados
  alternatives_spanish:
  - son traídos a la existencia
  - son creados de nuevo
  lexicon: HALOT
  rationale: 'El nifal de ברא se rinde de forma directa como pasivo: «son creados». Esta forma española es fiel, breve y no introduce la idea de renovación en el verbo mismo, ya expresada por el siguiente miembro.'
- source_word: וּתְחַדֵּשׁ
  english_pob_choice: and you renew
  chosen_spanish: y renuevas
  alternatives_spanish:
  - y haces nuevas
  - y restauras
  lexicon: HALOT
  rationale: El pi'el de חדשׁ significa «renovar» o «hacer nuevo». «Renuevas» mantiene la relación semántica con restauración y rejuvenecimiento sin sugerir sustitución total.
- source_word: פְּנֵי
  english_pob_choice: the face of
  chosen_spanish: la faz de
  alternatives_spanish:
  - la superficie de
  - el rostro de
  lexicon: HALOT
  rationale: «Faz» preserva el valor poético de פנים en una expresión idiomática muy natural en español bíblico y actual. «Superficie» sería más explicativo, pero menos literario.
- source_word: אֲדָמָה
  english_pob_choice: the ground
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - el terreno
  lexicon: HALOT
  rationale: אֲדָמָה apunta a la tierra/ground/soil. Aquí «la tierra» es el equivalente más natural y poético en español para la imagen de la faz renovada; evita el tecnicismo de «suelo» y mantiene el paralelismo con la creación.
theological_decisions:
- issue: רוּחַ en contexto creador
  english_pob_reading: your Spirit
  chosen_spanish_reading: tu Espíritu
  alternative_spanish_readings:
  - tu aliento
  - tu viento
  rationale: El versículo presenta la acción vivificadora de Dios en la creación. Traducir רוּחַ como «Espíritu» preserva ese peso teológico y sigue siendo lexically defensible; las otras posibilidades se conservan para no eliminar la tensión semántica del hebreo.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El inglés POB fue revisado de «You send out your Spirit, they are created» a «When you send out your Spirit, they are created» para resolver la estructura en inglés. En español, la subordinación temporal queda naturalizada con «Cuando envías…», por lo que se mantiene la relación causal/temporal sin forzar una coma espuria.
  spanish_consistency_notes:
  - Se conserva «Espíritu» con mayúscula por referirse al agente divino.
  - «Faz» y «tierra» mantienen registro bíblico claro sin caer en arcaísmo opaco.
  - No se sustituye «Yahvé» porque el verso hebreo no contiene el Tetragrámaton explícito.
