    changes_summary: Revised 'until the breaking of dawn' to 'until the dawn came up' for a closer rendering of עַד עֲלוֹת הַשַּׁחַר ('until the rising of the dawn') while keeping natural formal English.
translation:
  language: es
  text: Y Jacob quedó solo[a][b], y un hombre luchó con él hasta que despuntó el alba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que salió el alba»; literalmente: «hasta el levantarse del alba».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo dice «un hombre»; el contexto posterior y Oseas 12:4 contribuyen a identificar más plenamente a la figura.
    reason: cross_reference
lexical_decisions:
- source_word: וַיִּוָּתֵר
  english_pob_choice: was left
  chosen_spanish: quedó
  alternatives_spanish:
  - fue dejado
  - quedó atrás
  - permaneció
  lexicon: HALOT
  rationale: El nifal de יתר expresa que Jacob quedó en esa condición de estar solo; en español, «quedó» comunica bien el resultado pasivo sin sonar forzado. «Fue dejado» sería más literal, pero menos natural en este contexto narrativo.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - en soledad
  - por sí mismo
  lexicon: HALOT
  rationale: «Solo» reproduce con claridad la idea de aislamiento de Jacob y mantiene la concisión del hebreo. «En soledad» es posible, pero más abstracto para el relato.
- source_word: וַיֵּאָבֵק
  english_pob_choice: wrestled
  chosen_spanish: luchó
  alternatives_spanish:
  - forcejeó
  - peleó
  - se batió
  lexicon: HALOT
  rationale: El verbo raro אבק apunta a un forcejeo corporal, específicamente de lucha cuerpo a cuerpo. «Luchó» es la opción más natural en español para conservar esa fuerza sin restringir innecesariamente el matiz con una palabra demasiado técnica. «Forcejeó» también es viable, pero suena menos pleno como acción narrativa.
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un individuo
  - alguien
  lexicon: HALOT
  rationale: El hebreo dice explícitamente «un hombre». Se mantiene esa designación para preservar la tensión narrativa; no se adelanta una identificación angelical o divina que el versículo no explicita.
- source_word: עִמּוֹ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: HALOT
  rationale: Preposición directa y natural en español para expresar que la lucha fue con Jacob.
- source_word: עַד עֲלוֹת הַשָּׁחַר
  english_pob_choice: until the dawn came up
  chosen_spanish: hasta que despuntó el alba
  alternatives_spanish:
  - hasta que salió el alba
  - hasta el amanecer
  - hasta el despuntar del alba
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «hasta el levantarse/rising of the dawn». «Despuntó el alba» conserva la imagen del alba que comienza a aparecer y suena natural en español bíblico moderno. «Hasta que salió el alba» también es posible, pero «despuntó» refleja mejor el matiz de surgimiento.
theological_decisions:
- issue: Identidad del personaje que lucha con Jacob
  english_pob_reading: Render as 'a man' in the main text without specifying angelic or divine identity.
  chosen_spanish_reading: Traducir «un hombre» sin resolver su identidad en el texto principal.
  alternative_spanish_readings:
  - un ángel
  - Dios
  - el Señor aparecido como hombre
  rationale: El versículo presenta al personaje simplemente como «un hombre». Aunque el contexto posterior y Oseas 12:4 aportan más luz interpretativa, la traducción debe conservar la tensión narrativa y no cerrar prematuramente la identidad del personaje.
  doctrine_reference: Preservar la tensión teológica y narrativa; no resolver interpretativamente más allá del versículo.
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente del inglés POB, que ajustó la clausula final de una paráfrasis más libre («until the breaking of dawn») a una forma más cercana al hebreo («until the dawn came up»). En español, «hasta que despuntó el alba» conserva esa cercanía al movimiento del amanecer y mantiene un registro natural.
  spanish_consistency_notes:
  - Se usa «alba» para mantener consistencia con el campo semántico de עֲלוֹת הַשָּׁחַר.
  - Se preserva «un hombre» como designación narrativa sin ampliación doctrinal en el cuerpo principal.
  - La estructura de la oración respeta el paralelismo narrativo del hebreo con dos acciones principales unidas por «y».
