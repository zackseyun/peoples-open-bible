translation:
  language: es
  text: Entonces la mujer fue a todo el pueblo en su sabiduría, y cortaron la cabeza de Seba hijo de Bicri y se la arrojaron a Joab. Entonces él tocó la trompeta, y se dispersaron de la ciudad, cada hombre a su tienda[a]; y Joab volvió a Jerusalén, donde estaba el rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «cada hombre a su tienda», un modismo fijo para dispersarse cada uno a su propio lugar.'
    reason: cultural_note
lexical_decisions:
- source_word: וַתָּבוֹא
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - fue y llegó
  lexicon: HALOT
  rationale: El verbo hebreo puede leerse desde la perspectiva del movimiento hacia el grupo; en español, 'fue' conserva ese desplazamiento sin forzar un calco de 'vino' que sonaría menos natural en este contexto narrativo.
- source_word: הָאִשָּׁה
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la mujer aquella
  - la mujer
  lexicon: HALOT
  rationale: Se mantiene el sustantivo definido de manera simple y fiel, sin repetir 'sabia' en el sintagma nominal, porque la cualidad ya aparece en el complemento siguiente.
- source_word: אֶל כָּל הָעָם
  english_pob_choice: to all the people
  chosen_spanish: a todo el pueblo
  alternatives_spanish:
  - a toda la gente
  - a todo el pueblo
  lexicon: HALOT
  rationale: '''Pueblo'' conserva el alcance colectivo del hebreo עָם y funciona bien en español bíblico sin restringir indebidamente a soldados o habitantes.'
- source_word: בְּחָכְמָתָהּ
  english_pob_choice: in her wisdom
  chosen_spanish: en su sabiduría
  alternatives_spanish:
  - con su sabiduría
  - por su sabiduría
  lexicon: HALOT
  rationale: La preposición ב expresa aquí el modo o esfera de la acción. 'En su sabiduría' sigue la revisión inglesa aprobada y evita el calco menos natural 'con su sabiduría'.
- source_word: וַיִּכְרְתוּ
  english_pob_choice: cut off
  chosen_spanish: cortaron
  alternatives_spanish:
  - cortaron
  - seccionaron
  lexicon: HALOT
  rationale: Con el objeto 'la cabeza', 'cortaron' comunica la decapitación con claridad y sin añadir una formulación más fuerte de la que el hebreo exige.
- source_word: רֹאשׁ
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la cabeza
  lexicon: HALOT
  rationale: Traducción literal y directa, requerida por el contexto.
- source_word: שֶׁבַע בֶּן בִּכְרִי
  english_pob_choice: Sheba son of Bichri
  chosen_spanish: Seba hijo de Bicri
  alternatives_spanish:
  - Seba, hijo de Bicri
  - Sheba hijo de Bicri
  lexicon: HALOT
  rationale: Se translitera el nombre según uso español coherente y se mantiene la filiación con 'hijo de'. La forma 'Seba' refleja la vocalización habitual en español para este personaje.
- source_word: וַיַּשְׁלִכוּ
  english_pob_choice: threw
  chosen_spanish: se la arrojaron
  alternatives_spanish:
  - la arrojaron
  - se la echaron
  lexicon: HALOT
  rationale: '''Arrojaron'' conserva el gesto violento del verbo; el dativo ''se la'' deja claro el destino del objeto hacia Joab, como en el inglés auditado.'
- source_word: אֶל יוֹאָב
  english_pob_choice: to Joab
  chosen_spanish: a Joab
  alternatives_spanish:
  - a Joab
  - hacia Joab
  lexicon: HALOT
  rationale: La preposición indica dirección/recipientario. 'A Joab' es la opción más natural y fiel en español.
- source_word: וַיִּתְקַע בַּשּׁוֹפָר
  english_pob_choice: he blew the trumpet
  chosen_spanish: tocó la trompeta
  alternatives_spanish:
  - tocó el cuerno
  - hizo sonar la trompeta
  lexicon: HALOT
  rationale: תקע בשופר es el giro idiomático para hacer sonar el shofar; 'tocó la trompeta' comunica bien el acto y evita una traducción demasiado técnica que podría sonar extraña fuera de un glosario.
- source_word: וַיָּפֻצוּ
  english_pob_choice: they dispersed
  chosen_spanish: se dispersaron
  alternatives_spanish:
  - se dispersaron
  - se desbandaron
  lexicon: HALOT
  rationale: '''Se dispersaron'' mantiene el sentido de ruptura del grupo y el matiz militar de retirada ordenada mejor que ''se desbandaron'', que suena más caótico.'
- source_word: מֵעַל הָעִיר
  english_pob_choice: from the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - de la ciudad
  - de encima de la ciudad
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'de sobre/contra la ciudad', en español 'de la ciudad' transmite con naturalidad que cesó la acción contra ella, sin sobrecargar la frase.
- source_word: אִישׁ לְאֹהָלָיו
  english_pob_choice: each man to his tent
  chosen_spanish: cada hombre a su tienda
  alternatives_spanish:
  - cada hombre a su tienda
  - cada uno a su tienda
  lexicon: HALOT
  rationale: Se conserva el idiomatismo hebreo y la referencia concreta a 'tienda', como en el audit trail inglés. 'Cada hombre' reproduce אִישׁ con precisión; 'tienda' evita domesticar el giro a 'hogar'.
- source_word: וְיוֹאָב שָׁב יְרוּשָׁלַם אֶל הַמֶּלֶךְ
  english_pob_choice: and Joab returned to Jerusalem to the king
  chosen_spanish: y Joab volvió a Jerusalén al rey
  alternatives_spanish:
  - y Joab volvió a Jerusalén al rey
  - y Joab regresó a Jerusalén al rey
  lexicon: HALOT
  rationale: '''Volvió'' reproduce bien שׁוּב y es idiomático en español. Se mantiene ''a Jerusalén'' y ''al rey'' para reflejar la relación de destino y audiencia en la corte.'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y toma en cuenta la revisión inglesa más reciente, especialmente la preferencia por 'in her wisdom' como forma natural de expresar בְּחָכְמָתָהּ. No se introdujeron cambios doctrinales ni alternativas textuales adicionales porque el acuerdo entre las fuentes es alto y las variaciones son mínimas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el nombre divino aparece explícitamente; aquí no aparece.
  - Se conserva 'trompeta' para שׁוֹפָר por ser claro y ampliamente entendible, aunque el referente es el cuerno ritual.
  - '''Cada hombre a su tienda'' se marca con nota porque en español puede sonar literal, pero refleja un modismo hebreo establecido.'
  - Se mantiene el orden narrativo del hebreo sin añadir conectores interpretativos innecesarios.
