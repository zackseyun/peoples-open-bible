lexical_decisions:
- source_word: Μετανοεῖτε
  english_pob_choice: Repent
  chosen_korean: 회개하십시오
  alternatives_korean:
  - 뉘우치십시오
  - 돌이키십시오
  lexicon: BDAG
  rationale: μετάνοια의 한국 성서 정형 「회개」를 채택한다. 합쇼체 명령형으로 옮긴다.
- source_word: βασιλεία τῶν οὐρανῶν
  english_pob_choice: kingdom of heaven
  chosen_korean: 하늘 나라
  alternatives_korean:
  - 천국
  - 하나님의 나라
  lexicon: BDAG
  rationale: 마태 고유의 「하늘 나라」(다른 복음서의 「하나님의 나라」와 짝)를 그대로 보존한다. 한국 전통의 「천국」은 후대의 영혼 사후 처소 함의가 짙어 피한다.
- source_word: ἤγγικεν
  english_pob_choice: has drawn near
  chosen_korean: 가까이 왔습니다
  alternatives_korean:
  - 임박하였습니다
  - 다가왔습니다
  lexicon: BDAG
  rationale: 완료시제의 결과 상태를 살려, 이미 도래의 임박이 현재적 사실임을 드러낸다.
theological_decisions:
- issue: 마태의 「하늘 나라」 vs 「하나님의 나라」
  chosen_reading: 하늘 나라
  alternative_readings:
  - 하나님의 나라
  - 천국
  rationale: 마태는 유대적 회피 정형(직접적 「하나님」 호명을 피함)에 따라 「하늘 나라」를 사용하며, 다른 공관복음과 의미는 같다. 한국어 본문도 마태 고유 표현을 보존하여 본문의 색채를 살린다.
  doctrine_reference: 'Glossary: βασιλεία τῶν οὐρανῶν → 하늘 나라 (Matt-specific)'
- issue: 세례자 요한의 군중을 향한 발화 — 합쇼체
  chosen_reading: 회개하십시오
  alternative_readings:
  - 회개하라
  rationale: '본 번역 원칙: 신적·메시아적 선포는 합쇼체. 광야의 회개 선포는 권위 있는 공적 메시지이므로 합쇼체로 옮겨 권위를 살린다.'
  doctrine_reference: Korean pipeline register policy
