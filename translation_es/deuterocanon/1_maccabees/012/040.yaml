translation:
  language: es
  text: Y tuvo miedo de que Jonathan no le permitiera[a] y de que guerreara contra él, y buscaba un medio para prenderlo y matarlo; y partió y llegó a Bet-sán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente «no le permitiera», con αὐτόν como objeto explícito de ἐάσῃ. El objeto queda algo elíptico en contexto, y el español conserva esa concisión para mantenerse cerca del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: ηὐλαβήθη
  english_pob_choice: became afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - se alarmó
  - quedó temeroso
  lexicon: LSJ
  rationale: El verbo griego aquí expresa una reacción de temor o cautela. «Tuvo miedo» conserva el valor ingesivo de la reacción sin introducir matices de reverencia que no son dominantes en este contexto narrativo.
- source_word: μὴ ποτε οὐκ ἐάσῃ αὐτὸν
  english_pob_choice: might not permit him
  chosen_spanish: no le permitiera nada
  alternatives_spanish:
  - no le permitiera
  - no lo dejara
  lexicon: LSJ
  rationale: El griego presenta a αὐτόν como objeto implícito de ἐάσῃ, pero el sentido completo en contexto es que Jonathan pudiera impedir su plan. En español, «no le permitiera nada» conserva esa idea de impedimento sin forzar una redundancia extraña; la nota explica la tensión del objeto implícito.
- source_word: πολεμήσῃ πρὸς αὐτόν
  english_pob_choice: might make war against him
  chosen_spanish: no guerreara contra él
  alternatives_spanish:
  - no peleara contra él
  - no hiciera guerra contra él
  lexicon: LSJ
  rationale: El verbo es militar y no meramente una riña. «Guerreara contra él» conserva ese registro bélico en un español natural y digno.
- source_word: ἐζήτει πόρον
  english_pob_choice: was seeking a way
  chosen_spanish: buscaba un medio
  alternatives_spanish:
  - buscaba una forma
  - buscaba una manera
  lexicon: LSJ
  rationale: πόρος puede significar camino, medio o recurso. «Buscaba un medio» mantiene la amplitud del término y sugiere una estrategia práctica, como en el texto griego.
- source_word: τοῦ συλλαβεῖν αὐτὸν τοῦ ἀποκτεῖναι
  english_pob_choice: to seize him and kill him
  chosen_spanish: para prenderlo y matarlo
  alternatives_spanish:
  - para capturarlo y matarlo
  - para apresarlo y darle muerte
  lexicon: LSJ
  rationale: Los infinitivos articularios expresan propósito. «Prenderlo» comunica captura o aprehensión sin implicar un proceso legal formal; «matarlo» reproduce directamente ἀποκτεῖναι con claridad.
- source_word: ἀπάρας
  english_pob_choice: set out
  chosen_spanish: partió
  alternatives_spanish:
  - salió
  - se puso en camino
  lexicon: LSJ
  rationale: El participio indica salida/departida previa a la llegada. «Partió» es breve, natural y suficientemente preciso.
- source_word: Βεθσά
  english_pob_choice: Beth-shan
  chosen_spanish: Bet-sán
  alternatives_spanish:
  - Beth-shan
  - Betshán
  lexicon: LSJ
  rationale: El topónimo griego corresponde a la ciudad conocida en español como Bet-sán. Se adopta una transliteración cercana y reconocible, siguiendo el valor del nombre propio en la tradición geográfica bíblica.
translation_notes:
  revision_awareness: 'La redacción española sigue el sentido confirmado por el texto griego y por el audit trail inglés: temor inicial, impedimento potencial por parte de Jonathan, intención de guerra, búsqueda de un medio para capturarlo y matarlo, y partida hacia Bet-sán. Se evitó traducir mecánicamente el inglés cuando el griego pedía una sintaxis más natural en español, especialmente en el segmento de ἐάσῃ αὐτόν.'
  spanish_consistency_notes:
  - Se mantuvo «Jonathan» como forma estable del nombre propio, coherente con el audit trail inglés y de uso reconocible en español bíblico.
  - Se prefirió «Bet-sán» para el topónimo, conservando la identificación geográfica sin depender de una forma inglesa transliterada.
  - «Guerrear» y «prender» preservan el matiz militar y de captura del griego sin introducir un registro jurídico ajeno al pasaje.
