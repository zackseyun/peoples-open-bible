translation:
  language: es
  text: Clamaron con voz muy fuerte[a], implorando al Soberano de todo[b] que tuviera misericordia de ellos con una manifestación[c], cuando ya estaban a las puertas del Hades.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con una voz muy grande». El griego acumula intensificación: φωνῇ μεγάλῃ σφόδρα.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el Gobernante de todo» o «el soberano de todos». La expresión griega subraya la soberanía universal.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «con una aparición visible» o «de manera manifiesta». La frase griega μετὰ ἐπιφανείας puede enfatizar una misericordia mostrada abiertamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνεβόησαν
  english_pob_choice: they cried out
  chosen_spanish: clamaron
  alternatives_spanish:
  - gritaron
  - exclamaron con fuerza
  lexicon: LSJ
  rationale: El verbo griego expresa un clamor fuerte y colectivo. «Clamaron» conserva la urgencia súplica del contexto y suena natural en español bíblico actual.
- source_word: φωνῇ μεγάλῃ σφόδρα
  english_pob_choice: with a very loud voice
  chosen_spanish: con voz muy grande
  alternatives_spanish:
  - con voz muy fuerte
  - muy fuertemente
  lexicon: LSJ
  rationale: La frase intensifica el modo del clamor. «Con voz muy grande» mantiene de manera bastante literal la imagen de una voz extraordinariamente alta; en español suena algo marcada, pero conserva la acumulación del griego.
- source_word: τὸν τῆς ἁπάσης δυνάστην
  english_pob_choice: the Sovereign of all
  chosen_spanish: el Soberano de todo
  alternatives_spanish:
  - el soberano de todos
  - el Gobernante de todo
  lexicon: LSJ
  rationale: δυνάστης denota quien posee dominio o soberanía. «Soberano» preserva la majestad y el alcance universal de ἁπάσης sin caer en una formulación demasiado eclesiástica.
- source_word: ἱκετεύοντες
  english_pob_choice: imploring
  chosen_spanish: implorando
  alternatives_spanish:
  - suplicando
  - rogando
  lexicon: LSJ
  rationale: El participio expresa petición intensa y urgente. «Implorando» reproduce bien el tono de súplica desesperada del contexto.
- source_word: οἰκτείραι
  english_pob_choice: to have mercy
  chosen_spanish: que les tuviera misericordia
  alternatives_spanish:
  - que se compadeciera de ellos
  - que los apiadara
  lexicon: LSJ
  rationale: En una oración de auxilio, «tener misericordia» es la equivalencia natural y fiel. Se conserva el sentido de compasión activa sin volverlo una simple emoción.
- source_word: μετὰ ἐπιφανείας
  english_pob_choice: with a manifestation
  chosen_spanish: con una manifestación
  alternatives_spanish:
  - con una aparición
  - de manera visible
  lexicon: LSJ
  rationale: La POB inglesa retuvo la literalidad de ἐπιφάνεια. «Manifestación» preserva esa elección y deja abierta la idea de una intervención divina manifiesta, sin adelantar más de lo que el griego dice.
- source_word: αὐτούς
  english_pob_choice: on them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - sobre ellos
  lexicon: LSJ
  rationale: El pronombre funciona como objeto del ruego de misericordia. En español, el dativo «les» resulta natural y mantiene la referencia personal sin añadir interpretación.
- source_word: πρὸς πύλας ᾅδου
  english_pob_choice: at the gates of Hades
  chosen_spanish: junto a las puertas del Hades
  alternatives_spanish:
  - a las puertas del Hades
  - en las puertas del Hades
  lexicon: LSJ
  rationale: La imagen es espacial e inmediata. «Junto a» comunica la proximidad extrema a las puertas del Hades sin borrar el matiz de cercanía inminente a la muerte.
theological_decisions:
- issue: Traducción de ᾅδου en un contexto judío-griego deuterocanónico
  english_pob_reading: Hades
  chosen_spanish_reading: Hades
  alternative_spanish_readings:
  - el sepulcro
  - el reino de los muertos
  - la muerte
  rationale: Se conserva el término griego transliterado, como hace la POB inglesa, para preservar la imaginería original y no sustituirla por una explicación doctrinal posterior. En español, «Hades» es entendible en registro bíblico y mantiene la tensión del texto.
  doctrine_reference: Principio de primacía del texto original; no se impone una glosa doctrinal donde el griego nombra explícitamente ᾅδης.
- issue: Valor de μετὰ ἐπιφανείας en la súplica
  english_pob_reading: with a manifestation
  chosen_spanish_reading: con una manifestación
  alternative_spanish_readings:
  - con una aparición visible
  - de manera manifiesta
  rationale: La frase puede aludir a una intervención abierta y visible. Se conserva la ambigüedad productiva del griego, evitando precisar más allá de lo que el texto garantiza.
  doctrine_reference: Lectura lexical prudente; la petición es de misericordia visible o manifiesta, no una definición sistemática de teofanía.
translation_notes:
  revision_awareness: Se siguió el pasaje griego de Swete (LXX 1909) y el audit trail inglés de la POB, especialmente la revisión que volvió más literal φωνῇ μεγάλῃ y μετὰ ἐπιφανείας. La versión española conserva esa mayor cercanía al griego, manteniendo también la tensión de ᾅδης/Hades sin interpretarlo como simple 'muerte'.
  spanish_consistency_notes:
  - Se mantuvo «Hades» por consistencia con la terminología del audio trail inglés.
  - Se evitó «Señor» como sustituto automático de δυνάστης; «Soberano» conserva mejor la carga de dominio.
  - «Misericordia» se eligió por ser la forma natural en petición religiosa; no se redujo a mera emoción.
  - La puntuación y el orden siguen de cerca la sintaxis griega, pero con fluidez suficiente para publicación en español.
