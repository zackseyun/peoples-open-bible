translation:
  language: es
  text: Las nubes son una cobertura para él[a], de modo que no ve; y anda por la bóveda de los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Nubes densas son una cobertura para él, y no ve; anda por el círculo de los cielos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָבִים
  english_pob_choice: Clouds
  chosen_spanish: nubes
  alternatives_spanish:
  - nubes densas
  - nubes espesas
  lexicon: HALOT
  rationale: El plural hebreo designa nubes; en este contexto la imagen de ocultamiento se conserva naturalmente con «nubes». Se evita añadir «densas» en el texto principal porque la idea de cobertura ya queda explícita en el resto del verso.
- source_word: סֵתֶר
  english_pob_choice: a covering
  chosen_spanish: cubrimiento
  alternatives_spanish:
  - cobertura
  - ocultamiento
  - velo
  lexicon: HALOT
  rationale: El sustantivo expresa algo que cubre o encubre. «Cubrimiento» mantiene el valor concreto de cobertura sin sonar excesivamente abstracto; el matiz de ocultación queda reforzado por la cláusula siguiente.
- source_word: לוֹ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - de él
  - ante él
  - a él
  lexicon: HALOT
  rationale: La preposición con sufijo pronominal se adapta de manera idiomática al español como «para él», preservando la función de cobertura en relación con el sujeto implícito del discurso.
- source_word: וְלֹא יִרְאֶה
  english_pob_choice: so that he does not see
  chosen_spanish: de modo que no ve
  alternatives_spanish:
  - y no ve
  - así que no puede ver
  lexicon: HALOT
  rationale: El hebreo permite una relación coordinada o resultativa; la elección española explicita el valor consecutivo que el contexto pide, sin perder la estructura del argumento.
- source_word: חוּג שָׁמַיִם
  english_pob_choice: the vault of heaven
  chosen_spanish: la bóveda de los cielos
  alternatives_spanish:
  - el círculo de los cielos
  - la bóveda del cielo
  - el arco de los cielos
  lexicon: HALOT
  rationale: «חוּג» describe una forma circular o abovedada. «Bóveda de los cielos» comunica bien la imagen cosmológica antigua sin forzar una precisión técnica ajena al texto.
- source_word: יִתְהַלָּךְ
  english_pob_choice: he walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - se pasea
  - va y viene
  lexicon: HALOT
  rationale: El hitpael de הלך sugiere andar de un lado a otro o moverse. «Anda» es breve y natural en español, y conserva el retrato de movimiento por las alturas.
theological_decisions:
- issue: Sujeto implícito y perspectiva discursiva
  english_pob_reading: The verse continues Eliphaz's report of the wicked person's claim about God; the pronoun 'he' is left implicit and not replaced by an explicit 'God' in the main line.
  chosen_spanish_reading: El verso mantiene el pronombre implícito «él» en lugar de insertar «Dios», de modo que la acusación fluye dentro del discurso de Elifaz sin cerrar la referencia de forma prematura.
  alternative_spanish_readings:
  - Las nubes son un cubrimiento de Dios...
  - Las nubes son un cubrimiento para él; por tanto, Dios no ve...
  rationale: El contexto inmediato (Job 22:13-14) muestra que Elifaz está citando o resumiendo la perspectiva del impío. En español conviene conservar esa ambigüedad controlada, porque el texto fuente no explicita el antecedente en la frase misma y la traducción no debe resolver la tensión más de lo que permite el hebreo.
  doctrine_reference: Preservar la tensión narrativa y la primacía del texto original; no introducir aclaraciones interpretativas innecesarias.
translation_notes:
  revision_awareness: El texto inglés auditado traduce con valor resultativo ('so that he does not see') y conserva la imagen cosmológica de 'vault of heaven'. La versión española sigue esas decisiones, manteniendo también la referencia implícita del sujeto sin explicitarla más allá de lo que el hebreo exige.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando el hebreo nombra el nombre divino; aquí no aparece, por lo que no se introduce.
  - Se mantiene «cielos» en plural para reflejar שָׁמַיִם y la elevación poética del verso.
  - «Cubrimiento» y «bóveda» sostienen un registro bíblico claro sin recurrir a fórmulas eclesiásticas tradicionales que no son necesarias aquí.
