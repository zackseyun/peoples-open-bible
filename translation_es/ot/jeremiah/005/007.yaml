revisions:
- from: ¿Cómo podría perdonarte por esto? Tus hijos me han abandonado y han jurado por los que no son dioses[a]. Cuando yo los sacié[b], cometieron adulterio y se amontonaron en una casa de prostituta[c].
  to: ¿Cómo podría perdonarte por esto? Tus hijos me han abandonado y han jurado por los que no son dioses[a]. Cuando yo los sacié[b], cometieron adulterio y se agolparon en la casa de una prostituta[c].
  rationale: La revisión conserva el sentido del borrador pero corrige la focalización de las notas conforme al audit trail inglés y mejora la naturalidad del español en la última cláusula. 'La casa de una prostituta' es más idiomático que 'una casa de prostituta', y la nota c ahora comenta la verdadera dificultad léxica de יִתְגֹּדָדוּ, no del sustantivo 'casa'. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
