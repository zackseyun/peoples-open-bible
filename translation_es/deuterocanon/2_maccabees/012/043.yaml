    rationale: El borrador reduce la expresión técnica/distributiva a 'una contribución[a]', dejando en nota el valor 'de hombre en hombre'. Pero el inglés POB preserva ese matiz en el texto principal, y el griego sí aporta más que el mero hecho de una contribución.
  - severity: low
