  glossary_alignment: No hay conflicto con la terminología del proyecto. «Él», «los sabios», «astucia» y «consejo» son adecuados. «Los torcidos» es aceptable como metáfora moral, aunque «los retorcidos» o «los perversos» podrían aclarar más; no es necesario cambiarlo en el texto principal. La revisión se centra en נִמְהָרָה y en la calidad de las notas.
