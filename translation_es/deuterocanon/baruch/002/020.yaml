translation:
  language: es
  text: porque has traído sobre nosotros tu ira[a] y tu indignación, tal como hablaste por mano de tus siervos los profetas
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «por medio de tus siervos los profetas». El griego dice literalmente «por mano de».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνῆκας
  english_pob_choice: you have brought ... upon
  chosen_spanish: has traído sobre nosotros
  alternatives_spanish:
  - has puesto sobre nosotros
  - has hecho caer sobre nosotros
  - has causado sobre nosotros
  lexicon: LSJ
  rationale: El griego expresa una acción causativa de traer o hacer recaer algo sobre alguien. «Has traído sobre nosotros» conserva esa fuerza sin volver la frase innecesariamente técnica o interpretativa.
- source_word: θυμόν
  english_pob_choice: wrath
  chosen_spanish: ira
  alternatives_spanish:
  - furor
  - cólera
  lexicon: BDAG
  rationale: Para el primer término del par, «ira» comunica bien la intensidad del juicio divino en español bíblico sin sonar tan coloquial como «enojo».
- source_word: ὀργήν
  english_pob_choice: anger
  chosen_spanish: enojo
  alternatives_spanish:
  - ira
  - indignación
  lexicon: BDAG
  rationale: Se distingue del primer término para preservar el paralelismo y la tensión retórica del griego. «Enojo» funciona como segundo miembro del par en español y evita borrar la duplicación semántica.
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - justo como
  lexicon: LSJ
  rationale: «Tal como» expresa correspondencia directa con la palabra profética anterior y suena natural en español contemporáneo.
- source_word: ἐλάλησας
  english_pob_choice: you spoke
  chosen_spanish: hablaste
  alternatives_spanish:
  - dijiste
  - pronunciaste
  lexicon: BDAG
  rationale: «Hablaste» mantiene el vínculo con la mediación profética mejor que «dijiste», y refleja el habla declarativa del contexto.
- source_word: ἐν χειρί
  english_pob_choice: by the hand of
  chosen_spanish: por mano de
  alternatives_spanish:
  - por medio de
  - a través de
  lexicon: LSJ
  rationale: Se conserva el giro idiomático bíblico sin ocultarlo bajo una paráfrasis más plana. «Por mano de» es transparente y fiel al original.
- source_word: παίδων
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - esclavos
  - servidores
  lexicon: BDAG
  rationale: En la expresión fija «tus siervos, los profetas», «siervos» comunica comisión y servicio a Dios con mayor naturalidad que «esclavos» en español, aunque se reconoce la amplitud semántica de παῖς.
- source_word: προφητῶν
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - profetas
  lexicon: BDAG
  rationale: 'La traducción directa mantiene la aposición explicativa del griego: los siervos son identificados como profetas.'
theological_decisions:
- issue: Conservar el doblete de juicio divino θυμός / ὀργή
  english_pob_reading: 'distinct pair: ''wrath and ... anger'''
  chosen_spanish_reading: 'par distintivo: «ira y enojo»'
  alternative_spanish_readings:
  - «furor y cólera»
  - «ira e indignación»
  rationale: El griego acumula dos términos cercanos para intensificar el juicio de Dios. La versión española conserva esa tensión en lugar de resolverla en un solo concepto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Mediación profética en ἐν χειρί τῶν παίδων σου τῶν προφητῶν
  english_pob_reading: '''by the hand of your servants the prophets'''
  chosen_spanish_reading: «por mano de tus siervos, los profetas»
  alternative_spanish_readings:
  - «por medio de tus siervos, los profetas»
  - «a través de tus siervos, los profetas»
  rationale: La frase mantiene visible la imagen bíblica de agencia profética. «Por mano de» respeta mejor la textura del original y la correspondencia con la advertencia previa.
  doctrine_reference: 'DOCTRINE.md: optimal equivalence; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: La base inglesa fue revisada de «brought» a «have brought» para reflejar mejor el perfecto griego; la redacción española adopta igualmente un perfecto natural («has traído») y conserva la relación causal y retrospectiva del texto. Se mantiene también el paralelismo semántico del doblete divino y el giro idiomático de mediación profética.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino explícito; aquí el texto habla de «tú», por lo que no aparece.
  - Se preserva la distinción entre los dos términos de juicio divino como «ira» y «enojo» para no borrar la duplicación del griego.
  - «Siervos» se usa para παίδων en coherencia con la decisión lexical del inglés POB y con la expresión fija «tus siervos, los profetas».
  - La nota al pie se ancla en «por mano de» para advertir la alternativa idiomática sin alterar el texto principal.
