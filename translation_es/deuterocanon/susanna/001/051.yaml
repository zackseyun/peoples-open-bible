lexical_decisions:
- source_word: Δανιήλ
  english_pob_choice: Daniel
  chosen_spanish: Daniel
  alternatives_spanish:
  - Daniel
  lexicon: nombre propio
  rationale: Se conserva el nombre propio en su forma española estándar sin variación.
- source_word: Διαχωρίσατε
  english_pob_choice: Separate
  chosen_spanish: Sepárenlos
  alternatives_spanish:
  - Sepárenlos aparte
  - Divídanlos
  - Aíslenlos
  lexicon: BDAG
  rationale: El imperativo plural pide una separación física inmediata de los dos hombres. «Sepárenlos» transmite esa orden de forma natural en español sin suavizar el mandato.
- source_word: ἀπ᾽ ἀλλήλων
  english_pob_choice: from one another
  chosen_spanish: el uno del otro
  alternatives_spanish:
  - uno del otro
  - entre sí
  lexicon: BDAG
  rationale: La expresión recíproca se vierte con una fórmula española clara y natural, manteniendo la idea de separación mutua entre dos personas.
- source_word: μακράν
  english_pob_choice: far
  chosen_spanish: bien lejos
  alternatives_spanish:
  - lejos
  - a distancia
  lexicon: BDAG
  rationale: El adverbio intensifica la separación. «Bien lejos» conserva la fuerza del griego y comunica que no deben quedar cerca para evitar toda coordinación.
- source_word: ἀνακρινῶ
  english_pob_choice: I will examine
  chosen_spanish: yo los examinaré
  alternatives_spanish:
  - yo los interrogaré
  - yo los cuestionaré
  - yo los investigaré
  lexicon: BDAG
  rationale: En contexto judicial, ἀνακρίνω puede significar examinar o interrogar. «Examinaré» preserva el carácter formal de la averiguación sin inclinarse excesivamente por una sola matización.
theological_decisions:
- issue: Valor judicial de ἀνακρίνω
  english_pob_reading: I will examine them.
  chosen_spanish_reading: yo los examinaré
  alternative_spanish_readings:
  - yo los interrogaré
  - yo los cuestionaré
  rationale: No hay una cuestión doctrinal directa, pero sí una tensión lexical entre examen formal e interrogatorio. Se mantiene «examinaré» como equivalente amplio que deja abierta la fuerza judicial del verbo griego.
  doctrine_reference: N/A
translation_notes:
