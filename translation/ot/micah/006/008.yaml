id: MIC.6.8
reference: Micah 6:8
source:
  edition: WLC
  text: הִגִּ֥יד לְ/ךָ֛ אָדָ֖ם מַה טּ֑וֹב וּ/מָֽה יְהוָ֞ה דּוֹרֵ֣שׁ מִמְּ/ךָ֗ כִּ֣י אִם עֲשׂ֤וֹת מִשְׁפָּט֙ וְ/אַ֣הֲבַת חֶ֔סֶד וְ/הַצְנֵ֥עַ לֶ֖כֶת עִם אֱלֹהֶֽי/ךָ־־־־׃פ
translation:
  text: He has told you[a], O man, what is good; and what does Yahweh require of you but to do justice, and to love steadfast love[b], and to walk humbly with your God?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'to love mercy,' 'to love kindness,' or 'to love covenant loyalty.' The Hebrew חֶסֶד carries the sense of loyal, steadfast love within covenant relationship.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'O man' uses a singular representative address to a human hearer.
    reason: cultural_note
lexical_decisions:
- source_word: הִגִּיד
  chosen: He has told
  alternatives:
  - He has declared
  - He told
  lexicon: HALOT
  rationale: The Hiphil of נגד means to make known or declare. Present perfect in English captures the force of a prior disclosure with continuing relevance in this rhetorical setting.
- source_word: אָדָם
  chosen: O man
  alternatives:
  - humanity
  - humankind
  - man
  lexicon: HALOT
  rationale: Per doctrine, gender-accurate over gender-neutral. Here the singular vocative addresses the human hearer representatively, so 'O man' preserves both the singular and the rhetorical force better than a pluralized or abstract rendering.
- source_word: טּוֹב
  chosen: good
  alternatives:
  - what is right
  - what is beneficial
  lexicon: HALOT
  rationale: טוֹב is the broad moral term 'good'; no contextual pressure requires narrowing it to 'right' or 'beneficial'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Follows the project's default rendering for the divine name, preserving reverential convention and alignment with the doctrine table.
- source_word: דּוֹרֵשׁ מִמְּךָ
  chosen: require from you
  alternatives:
  - seek from you
  - demand of you
  - ask of you
  lexicon: HALOT
  rationale: דרש with מן in this context conveys what the LORD expects or requires. 'Require from you' is natural English and preserves the covenantal-ethical force without overstating it.
- source_word: כִּי אִם
  chosen: but
  alternatives:
  - except
  - other than
  lexicon: HALOT
  rationale: 'In this rhetorical question, כִּי אִם introduces the content of what is required in an exceptive sense. English ''but'' idiomatically fits the construction: ''what does ... require ... but to ...''.'
- source_word: עֲשׂוֹת מִשְׁפָּט
  chosen: to do justice
  alternatives:
  - to do what is just
  - to practice justice
  lexicon: HALOT
  rationale: מִשְׁפָּט here is best rendered 'justice' in an ethical sense, and 'do justice' is a well-established, accurate English collocation that preserves the verbal force of עשה.
- source_word: אַהֲבַת חֶסֶד
  chosen: to love steadfast love
  alternatives:
  - to love mercy
  - to love covenant loyalty
  - to love kindness
  lexicon: HALOT
  rationale: חֶסֶד is a theologically rich term often flattened as 'mercy.' 'Steadfast love' better preserves its covenantal and loyal-love dimensions. Retaining the cognate 'love ... steadfast love' reflects the Hebrew expression rather than paraphrasing it away.
- source_word: הַצְנֵעַ לֶכֶת
  chosen: to walk humbly
  alternatives:
  - to walk modestly
  - to walk carefully
  lexicon: HALOT
  rationale: The infinitive absolute/adverbial expression conveys humble or modest conduct. 'Walk humbly' is idiomatic and captures the ethical posture intended.
- source_word: עִם אֱלֹהֶיךָ
  chosen: with your God
  alternatives:
  - before your God
  lexicon: HALOT
  rationale: עִם normally means 'with.' Rendering it straightforwardly preserves the relational aspect of covenant life rather than shifting to the more interpretive 'before.'
