translation:
  language: es
  text: No examinará si es bueno o malo[a], ni lo cambiará; y si de hecho lo cambia[b], entonces tanto él como su sustituto quedarán consagrados; no será redimido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «examinará entre bueno y malo». El modismo hebreo se refiere a hacer una distinción cualitativa al seleccionar el animal.'
    reason: lexical_alternative
  - marker: b
    text: 'El hebreo intensifica el verbo: «si ciertamente lo cambia» o «si en verdad lo cambia».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְבַקֵּר
  english_pob_choice: inspect
  chosen_spanish: hará distinción
  alternatives_spanish:
  - examinará
  - inspeccionará
  - considerará
  lexicon: HALOT
  rationale: En este contexto legal-sacral, el verbo expresa evaluar o distinguir cualitativamente entre animales, no solo mirar. ‘Hará distinción’ conserva el valor idiomático de decidir entre opciones, y encaja bien con la expresión siguiente ‘entre lo bueno y lo malo’.
- source_word: בֵּין טוֹב לָרַע
  english_pob_choice: whether it is good or bad
  chosen_spanish: entre lo bueno y lo malo
  alternatives_spanish:
  - si es bueno o malo
  - entre bueno y malo
  - acerca de si es bueno o malo
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo de discriminación cualitativa. En español, ‘entre lo bueno y lo malo’ mantiene la forma idiomática y permite que el sentido de evaluación quede explícito sin sobreexplicar.
- source_word: יְמִירֶנּוּ / הָמֵר יְמִירֶנּוּ
  english_pob_choice: exchange it / does in fact exchange it
  chosen_spanish: lo cambiará / de hecho lo cambia
  alternatives_spanish:
  - lo intercambiará
  - lo sustituirá
  - si verdaderamente lo cambia
  lexicon: HALOT
  rationale: En este pasaje, מור funciona como término técnico de sustitución de un animal votivo o del diezmo. ‘Cambiar’ es natural en español y conserva el acto jurídico. Para la forma enfática con infinitivo absoluto, ‘de hecho lo cambia’ refleja la intensificación sin volverlo pesado.
- source_word: תְמוּרָתוֹ
  english_pob_choice: its substitute
  chosen_spanish: su sustituto
  alternatives_spanish:
  - su reemplazo
  - el animal sustituido por él
  - su sustitución
  lexicon: HALOT
  rationale: La frase designa al animal puesto en lugar del original. ‘Su sustituto’ es breve, claro y acorde con el registro legal del texto.
- source_word: קֹדֶשׁ
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - sagrado
  - consagrado
  - apartado para Dios
  lexicon: HALOT
  rationale: En Levítico, קדש describe lo consagrado a Dios. Se traduce con ‘santos’ para conservar el registro cultual y la fuerza de pertenencia sagrada; en plural concuerda con ‘tanto él como su sustituto’.
- source_word: לֹא יִגָּאֵל
  english_pob_choice: it shall not be redeemed
  chosen_spanish: no podrá ser redimido
  alternatives_spanish:
  - no será redimido
  - no podrá ser rescatado
  - no podrá ser recomprado
  lexicon: HALOT
  rationale: גאל en contexto levítico es el término técnico de redención/rescate cultual. ‘Ser redimido’ conserva la terminología bíblica y el matiz legal-sacral mejor que una paráfrasis más general.
theological_decisions:
- issue: Mantener la fuerza cultual de la consagración
  english_pob_reading: Render קדש as 'holy' and גאל as 'redeemed' in their sacrally charged legal sense.
  chosen_spanish_reading: Traducir קדש como ‘santos’ y גאל como ‘redimido’, conservando el sentido legal-cultual de la consagración.
  alternative_spanish_readings:
  - ‘sagrado’ y ‘rescatado’
  - ‘consagrado’ y ‘comprado de nuevo’
  rationale: El versículo trata de un animal dedicado en un marco de ley ritual. ‘Santos’ y ‘redimido’ preservan la carga teológica sin desplazar el texto hacia un lenguaje eclesiástico ajeno al pasaje.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Reflejar la intensificación verbal hebrea
  english_pob_reading: 'Hebrew intensifies the verb: ''if he surely exchanges it'' or ''if he does indeed exchange it.'''
  chosen_spanish_reading: ‘si de hecho lo cambia’ intenta reproducir la intensificación del infinitivo absoluto hebreo.
  alternative_spanish_readings:
  - ‘si ciertamente lo cambia’
  - ‘si lo cambia, en efecto’
  rationale: El hebreo no solo describe la posibilidad del acto, sino que lo enfatiza. La redacción española debe conservar esa tensión enfática sin perder fluidez.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: 'Se ha mantenido concordancia con la revisión más reciente sin cambios sustantivos: la solución sigue la lectura de alta concordancia del audit trail inglés, conservando las decisiones de ‘inspect/exchange/holy/redeemed’ en un español natural y formal.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ como forma estándar del tetragrámaton en este proyecto, aunque en este versículo no aparece explícitamente.
  - ‘Redimido’ se mantiene como término técnico de Levítico para evitar diluir el sentido jurídico-cultual.
  - ‘Santos’ funciona aquí como plural concordante con el sujeto compuesto ‘él y su sustituto’.
