translation:
  language: es
  text: Y Benaía, hijo de Joyadá, estaba a cargo de los quereteos y los peleteos[a], y los hijos de David eran los principales oficiales[b] al lado del rey[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “cereteos”, forma tradicional en algunas versiones; el hebreo nombra aquí a un grupo, no lo interpreta.
    reason: lexical_alternative
  - marker: b
    text: Lit. “los primeros” o “los principales”; aquí funciona como designación de rango en la corte.
    reason: lexical_alternative
  - marker: c
    text: Lit. “a la mano del rey”, un modismo hebreo para servicio o presencia cercana junto al rey.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנָיָהוּ בֶּן יְהוֹיָדָע
  english_pob_choice: Benaiah son of Jehoiada
  chosen_spanish: Benaía, hijo de Joyadá
  alternatives_spanish:
  - Benaía hijo de Joyadá
  - Benaía, hijo de Yehoyadá
  lexicon: HALOT
  rationale: Los nombres propios se transliteran. ‘Hijo de’ conserva la relación filial con naturalidad en español; ‘Joyadá’ sigue la forma más reconocible y eufónica en español, sin introducir una forma no atestiguada por el texto base.
- source_word: עַל
  english_pob_choice: was over
  chosen_spanish: estaba sobre
  alternatives_spanish:
  - estaba a cargo de
  - era jefe de
  - mandaba sobre
  lexicon: HALOT
  rationale: En contexto administrativo/militar, עַל expresa supervisión o autoridad. ‘Estaba sobre’ conserva esa idea con un registro bíblico claro y sin cargar demasiado la frase.
- source_word: הַכְּרֵתִי
  english_pob_choice: the Kerethites
  chosen_spanish: los quereteos
  alternatives_spanish:
  - los cereteos
  - 'los quereteos (también: chereteos)'
  lexicon: HALOT
  rationale: Se trata de un nombre de grupo/etnónimo. ‘Quereteos’ mantiene la transliteración y evita interpretar el término; es la forma española más natural para este grupo.
- source_word: הַפְּלֵתִי
  english_pob_choice: the Pelethites
  chosen_spanish: los peleteos
  alternatives_spanish:
  - los peletitas
  - los peleteos
  lexicon: HALOT
  rationale: También es un nombre de grupo. ‘Peleteos’ sigue la transliteración y se adapta a la morfología española sin añadir explicación que el texto no da.
- source_word: הָרִאשֹׁנִים
  english_pob_choice: the chief officials
  chosen_spanish: los principales oficiales
  alternatives_spanish:
  - los primeros
  - los más prominentes
  - los oficiales principales
  lexicon: HALOT
  rationale: Literalmente ‘los primeros’ o ‘los principales’, con fuerza de título/rango en la corte. ‘Principales oficiales’ preserva el valor de prioridad y la referencia a cargos de alto rango sin volver opaca la frase en español.
- source_word: לְיַד הַמֶּלֶךְ
  english_pob_choice: at the king’s side
  chosen_spanish: al lado del rey
  alternatives_spanish:
  - junto al rey
  - al servicio del rey
  - a la mano del rey
  lexicon: HALOT
  rationale: El hebreo es idiomático y señala cercanía/servicio en la corte. ‘Al lado del rey’ reproduce bien la proximidad relacional sin forzar el hebraísmo literal.
- source_word: וּבְנֵי דָוִיד
  english_pob_choice: David’s sons
  chosen_spanish: los hijos de David
  alternatives_spanish:
  - los hijos de David
  - los hijos de David
  lexicon: HALOT
  rationale: La frase es directa y no requiere ajuste interpretativo. ‘Los hijos de David’ es la forma natural y fiel en español.
translation_notes:
  revision_awareness: Se revisó la concordancia con el hebreo masorético y con el audit trail inglés. No hubo cambios de sentido sustanciales respecto del POB inglés; se mantuvo la lectura administrativa/cortesana de la segunda cláusula y la transliteración de los nombres de grupo.
  spanish_consistency_notes:
  - Se usó ‘quereteos’ y ‘peleteos’ como transliteraciones consistentes de nombres de grupo.
  - Se evitó ‘SEÑOR’ porque este versículo no contiene el Tetragrámaton ni una cita directa relevante.
  - Se conservó el orden de las dos cláusulas del hebreo para mantener la estructura paralela.
  - ‘Principales oficiales’ intenta reflejar el valor titular de הָרִאשֹׁנִים sin exagerar el rango más allá del contexto.
