translation:
  language: es
  text: El Espíritu de Yahvé habló por mí[a], y su palabra estaba sobre mi lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «habló por medio de mí». La preposición hebrea puede expresar instrumentación o mediación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ר֥וּחַ יְהוָ֖ה
  english_pob_choice: The Spirit of Yahweh
  chosen_spanish: El Espíritu de Yahvé
  alternatives_spanish:
  - El רוח de Yahvé
  - El aliento de Yahvé
  - El viento de Yahvé
  lexicon: HALOT
  rationale: En este contexto de habla profética, רוּחַ funciona como agente revelador y personal, no como 'viento' o 'aliento'. 'Espíritu' preserva ese valor. YHWH se vierte como 'Yahvé' conforme al criterio del proyecto para el nombre divino.
- source_word: דִּבֶּר
  english_pob_choice: spoke
  chosen_spanish: habló
  alternatives_spanish:
  - ha hablado
  - habló por medio de
  lexicon: HALOT
  rationale: El verbo indica acto de hablar; en español 'habló' suena natural y conserva el pasado narrativo-poético. No se introduce de inmediato 'por medio de', porque esa mediación ya la sugiere el hebreo con la preposición siguiente.
- source_word: בִּי
  english_pob_choice: by me
  chosen_spanish: por mí
  alternatives_spanish:
  - en mí
  - por medio de mí
  lexicon: HALOT
  rationale: La preposición puede expresar instrumento o mediación. 'Por mí' mantiene la relación instrumental sin forzar una paráfrasis más larga. 'Por medio de mí' es una alternativa viable pero menos compacta.
- source_word: וּמִלָּתוֹ
  english_pob_choice: and his word
  chosen_spanish: y su palabra
  alternatives_spanish:
  - y su mensaje
  - y lo que dijo
  lexicon: HALOT
  rationale: מִלָּה conserva el peso de una comunicación verbal concreta. 'Palabra' es la correspondencia más directa y también preserva el alcance teológico del habla divina.
- source_word: עַל לְשׁוֹנִי
  english_pob_choice: was on my tongue
  chosen_spanish: estuvo sobre mi lengua
  alternatives_spanish:
  - estuvo en mi lengua
  - estaba en mi boca
  lexicon: HALOT
  rationale: La imagen hebrea dice literalmente 'sobre mi lengua'. 'Estuvo sobre mi lengua' conserva esa imagen con una forma española natural y digna. 'En mi boca' sería más idiomática pero menos cercana al original.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrama de forma explícita. Siguiendo la convención del proyecto en español, se translitera como 'Yahvé' para conservar el nombre pactual y evitar el reemplazo litúrgico por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Sentido de רוּחַ en contexto profético
  english_pob_reading: Spirit
  chosen_spanish_reading: Espíritu
  alternative_spanish_readings:
  - aliento
  - viento
  rationale: La escena es un oráculo atribuido a David, donde la agencia divina en el hablar es central. 'Espíritu' comunica mejor esa agencia reveladora que 'aliento' o 'viento', sin añadir una doctrina extra al texto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: preserve source text''s plain sense; do not import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el audit trail inglés; no se detectan revisiones textuales que requieran ajuste. Se conserva la lectura optimizado-equivalente, con la nota sobre la posible mediación de בִּי.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se traduce רוּחַ como 'Espíritu' en contexto de revelación profética.
  - '''Palabra'' conserva el paralelismo con el habla divina del verso.'
