  to: Sale el sol; ellos se recogen[a] y se echan en sus guaridas[b].
  rationale: Se corrige la subordinación añadida por 'Cuando', se acerca יֵאָסֵפוּן al matiz reflexivo destacado en la auditoría inglesa mediante 'se recogen', y se sustituye 'cuevas' por 'guaridas' para reflejar mejor el alcance de מְעוֹנוֹתָם en contexto animal. Se añaden notas léxicas paralelas a las preservadas en el expediente inglés.
