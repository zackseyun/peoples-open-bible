review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del hebreo: interjección de lamento, apóstrofe a la espada de Yahvé, pregunta de duración y tres imperativos para cesar la acción. También preserva correctamente «Yahvé» para יהוה y la personificación femenina de «espada». Sin embargo, «Métete en tu vaina» suena demasiado coloquial e incluso brusco para el registro poético-digno del pasaje, y se aleja del matiz reflexivo-documentado de «recógete / reúnete en tu vaina».'
  spanish_quality_summary: El texto es mayormente claro y legible, pero requiere un ajuste de estilo en el imperativo central. «Reposa y estate quieta» es comprensible, aunque «estate quieta» resulta algo conversacional; «quédate quieta» o «permanece quieta» serían opciones, pero la actual todavía es aceptable. El problema principal de calidad es «Métete», que rebaja el tono.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: יהוה -> «Yahvé»; חֶרֶב -> «espada»; תער -> «vaina». Las notas léxicas conservan alternativas útiles. No obstante, en la nota c «escarcela» no es una alternativa adecuada para sheath/scabbard en este contexto; puede inducir error léxico. Conviene limitar la alternativa a «funda».'
  issues:
  - severity: medium
    issue: «Métete en tu vaina» es demasiado coloquial para el registro del poema profético.
    rationale: Aunque comunica el movimiento hacia el interior de la vaina, en español suena brusco y poco digno. «Recógete en tu vaina» mantiene mejor el reflexivo del hebreo הֵאָסְפִי y armoniza con el tono literario.
  - severity: low
    issue: La nota c incluye «escarcela», término inadecuado para «sheath/scabbard».
    rationale: «Escarcela» normalmente no designa la vaina de una espada en español actual y puede confundir al lector. La alternativa documentada y suficiente es «funda».
  revised_spanish_text: ¡Ah[a], espada de Yahvé, ¿hasta cuándo no te aquietarás? Recógete en tu vaina[b][c]; reposa y estate quieta.
  revised_footnotes:
