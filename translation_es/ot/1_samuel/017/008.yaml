base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/017/008.yaml
  text: He stood and called out to the battle lines of Israel and said to them[a], “Why do you come out to array yourselves for battle? Am I not the Philistine, and are you not slaves of Saul? Choose a man for yourselves[b], and let him come down to me.”
  footnotes:
  - marker: a
    text: Or “servants of Saul.” The Hebrew עֲבָדִים can denote either servants or slaves; here “slaves” preserves the insulting force of Goliath’s taunt.
    reason: lexical_alternative
  - marker: b
    text: Or “draw up for battle.” The Hebrew expression literally refers to arranging or lining up for combat.
    reason: lexical_alternative
