translation:
  language: es
  text: El cuarto día se reunieron en el Valle de Beracá[a], porque allí bendijeron a Yahvé. Por eso llamaron a aquel lugar Valle de Beracá hasta el día de hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Beracá significa «bendición».
    reason: lexical_alternative
lexical_decisions:
- source_word: נִקְהֲלוּ
  english_pob_choice: they assembled
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se congregaron
  - se juntaron
  lexicon: HALOT
  rationale: El nifal expresa que el grupo llegó a reunirse. En español, 'se reunieron' comunica con naturalidad el sentido intransitivo/reflexivo sin perder el valor formal de la acción colectiva.
- source_word: עֵמֶק
  english_pob_choice: Valley
  chosen_spanish: Valle
  alternatives_spanish:
  - valle
  - hondonada
  lexicon: HALOT
  rationale: El término denota un valle; 'Valle' es la equivalencia directa y natural en español para la construcción toponímica.
- source_word: בְּרָכָה
  english_pob_choice: Beracah
  chosen_spanish: Beracá
  alternatives_spanish:
  - Beracah
  - Beraquía
  lexicon: HALOT
  rationale: Se translitera el nombre propio del lugar para conservar la forma toponímica. Se adapta la acentuación al español como 'Beracá' para lectura pública, manteniendo reconocible el nombre bíblico y el juego de palabras con 'bendición'.
- source_word: כִּי שָׁם בֵּרֲכוּ אֶת יְהוָה
  english_pob_choice: because there they blessed Yahweh
  chosen_spanish: porque allí bendijeron a Yahvé
  alternatives_spanish:
  - pues allí bendijeron a Yahvé
  - porque allí alabaron a Yahvé
  lexicon: HALOT
  rationale: כִּי expresa causalidad; 'porque' la refleja con claridad. בֵּרֲכוּ se traduce 'bendijeron' para conservar el vínculo léxico con בְּרָכָה. 'Alabaron' sería posible en algunos contextos, pero aquí debilita la conexión nominal que el versículo subraya.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se usa 'Yahvé' como forma española estable del nombre divino, en lugar de sustituirlo por un título. Esto preserva el Tetragrámaton conforme a la política del proyecto.
- source_word: קָרְאוּ אֶת שֵׁם הַמָּקוֹם הַהוּא
  english_pob_choice: they called the name of that place
  chosen_spanish: llamaron al nombre de aquel lugar
  alternatives_spanish:
  - pusieron nombre a aquel lugar
  - nombraron aquel lugar
  lexicon: HALOT
  rationale: Se mantiene la fórmula hebrea de nombramiento con 'llamaron al nombre de aquel lugar', ligeramente suavizada para español. Conserva el giro idiomático y el paralelismo con el texto fuente.
- source_word: עַד הַיּוֹם
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - todavía hoy
  lexicon: HALOT
  rationale: Es el equivalente idiomático más natural en español para indicar la persistencia del nombre hasta el presente del narrador.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrámaton directamente. La forma española 'Yahvé' preserva el nombre propio divino sin recurrir a la sustitución litúrgica por un título, en línea con la política del POB.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La versión inglesa revisada se mantuvo sin cambios según el registro más reciente; no hay revisiones posteriores que requieran ajuste en la lectura española. La solución conserva el juego de palabras entre el nombre del valle y el acto de bendecir a Yahvé.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para el nombre divino, conforme al estándar español del proyecto.
  - Se conserva la transliteración del topónimo con acento español ('Beracá') para facilitar lectura pública.
  - '''Bendijeron'' mantiene la conexión léxica con ''Beracá'' y evita una paráfrasis teológica más débil.'
  - La fórmula de nombramiento se conserva de manera cercana al hebreo para no perder el matiz narrativo.
