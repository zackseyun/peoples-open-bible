translation:
  language: es
  text: 'Y los animó y les dijo: «Ustedes mismos saben cuánto hemos hecho por las leyes y las cosas santas[a], yo, mis hermanos y la casa de mi padre, y las guerras y las angustias».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la ley y el santuario». El griego dice literalmente «las cosas santas», que puede referirse de manera más amplia al santuario y a otros asuntos sagrados.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκάλεσεν
  english_pob_choice: encouraged
  chosen_spanish: lo animó
  alternatives_spanish:
  - los exhortó
  - los alentó
  - los animó
  lexicon: BDAG
  rationale: παρακαλέω aquí comunica impulso y fortalecimiento previo al recuento de sacrificios. «Lo animó» conserva el matiz de apoyo y ánimo sin volverlo demasiado técnico o formal.
- source_word: Αὐτοὶ οἴδατε
  english_pob_choice: You yourselves know
  chosen_spanish: Ustedes mismos saben
  alternatives_spanish:
  - Ustedes saben
  - Ustedes bien saben
  lexicon: BDAG
  rationale: El pronombre enfático αὐτοὶ se refleja con «ustedes mismos», preservando el énfasis explícito del griego.
- source_word: οἶκος τοῦ πατρός μου
  english_pob_choice: my father’s house
  chosen_spanish: la casa de mi padre
  alternatives_spanish:
  - la familia de mi padre
  - mi casa paterna
  - mi linaje paterno
  lexicon: BDAG
  rationale: La expresión idiomática griega designa la unidad familiar o de linaje. «La casa de mi padre» mantiene el giro semita y sigue siendo claro en español.
- source_word: περὶ τῶν νόμων καὶ τῶν ἁγίων
  english_pob_choice: for the laws and the holy things
  chosen_spanish: por las leyes y las cosas santas
  alternatives_spanish:
  - por la ley y el santuario
  - por las leyes y el santuario
  - por las leyes y las cosas sagradas
  lexicon: BDAG
  rationale: Se conserva el plural «leyes» y el sintagma más literal «cosas santas» para no estrechar τῶν ἁγίων a un solo referente institucional. «Por» expresa bien la idea de causa/defensa comprometida en el contexto.
- source_word: τοὺς πολέμους
  english_pob_choice: the wars
  chosen_spanish: las guerras
  alternatives_spanish:
  - las batallas
  - la guerra
  - los combates
  lexicon: BDAG
  rationale: El plural se mantiene de manera directa. «Guerras» es la equivalencia más transparente y fiel al léxico.
- source_word: τὰς στενοχωρίας
  english_pob_choice: the distresses
  chosen_spanish: las angustias
  alternatives_spanish:
  - las aflicciones
  - las dificultades
  - las tribulaciones
  lexicon: BDAG
  rationale: στενοχωρία denota presión, angustia o aflicción. «Angustias» reproduce bien la carga de opresión y sufrimiento sin introducir una expansión explicativa no presente en el griego.
theological_decisions:
- issue: Alcance de τῶν ἁγίων
  english_pob_reading: Rendered as 'the holy things' rather than narrowing to 'the sanctuary.'
  chosen_spanish_reading: Se traduce como «las cosas santas» y no se reduce a «el santuario».
  alternative_spanish_readings:
  - el santuario
  - las cosas sagradas
  - lo santo
  rationale: El plural sustantivado del griego puede abarcar objetos, asuntos o realidades consagradas. La traducción conserva esa amplitud y evita resolver la referencia a una sola institución.
  doctrine_reference: Primacía del texto fuente; conservar la tensión semántica donde el griego es amplio.
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail que elimina cualquier adición interpretativa equivalente a «we have endured»; por eso el final queda coordinado como parte de lo que conocen, sin ampliar con un verbo no presente en el griego. También se corrigió la anclación de la nota, colocando [a] en el lugar exacto en el texto.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico, con español contemporáneo pero digno.
  - Se evita sustituir términos con glosas tradicionales cuando el griego conserva mayor amplitud semántica.
  - Se preserva el plural «leyes» y la coordinación final sin insertar verbos auxiliares ajenos al original.
