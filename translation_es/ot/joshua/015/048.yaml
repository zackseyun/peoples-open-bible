translation:
  language: es
  text: 'En la región montañosa: Shamir[a], Jattir[b] y Socoh[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «y en la región montañosa»; la conjunción inicial enlaza este versículo con la lista continua de ciudades.'
    reason: lexical_alternative
  - marker: b
