translation:
  language: es
  text: El hombre[a] no conoce su valor[b], y no se halla en la tierra de los vivientes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El hombre» traduce un singular hebreo representativo de los seres humanos mortales.
    reason: lexical_alternative
  - marker: b
    text: O «su precio». El término hebreo se refiere a valuación o valor.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱנוֹשׁ
  english_pob_choice: Man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el mortal
  - la humanidad
  - una persona
  lexicon: HALOT
  rationale: El hebreo אֱנוֹשׁ funciona aquí como sujeto representativo de la humanidad mortal. En español, «el hombre» conserva bien ese valor singular y proverbial sin volver la frase demasiado abstracta. «El mortal» subraya la fragilidad, pero cambia el tono; «la humanidad» pluraliza de modo interpretativo.
- source_word: יָדַע
  english_pob_choice: does not know
  chosen_spanish: no conoce
  alternatives_spanish:
  - no ha conocido
  - no puede conocer
  lexicon: HALOT
  rationale: El perfecto hebreo expresa aquí una verdad general. En español, el presente gnómico «no conoce» comunica mejor esa afirmación proverbial. «No puede conocer» añadiría una imposibilidad que el hebreo no exige.
- source_word: עֶרְכָּהּ
  english_pob_choice: its worth
  chosen_spanish: su valor
  alternatives_spanish:
  - su worth
  - su precio
  - su medida
  lexicon: HALOT
  rationale: La raíz ערך puede referirse a valuación, worth o precio. En español, «valor» conserva el campo semántico de aprecio/estimación y suena natural en un contexto sapiencial. «Precio» sería más comercial y menos amplio; «medida» es posible pero menos directo.
- source_word: תִּמָּצֵא
  english_pob_choice: it is not found
  chosen_spanish: no se halla
  alternatives_spanish:
  - no puede hallarse
  - no se encuentra
  lexicon: HALOT
  rationale: El nifal pasivo se vierte con naturalidad como «no se halla». Esta forma mantiene la pasividad del hebreo sin introducir una modalidad adicional. «No se encuentra» es viable, pero «se halla» conserva un tono más literario.
- source_word: בְּאֶרֶץ הַחַיִּים
  english_pob_choice: in the land of the living
  chosen_spanish: en la tierra de los vivientes
  alternatives_spanish:
  - en la tierra de los vivos
  - entre los vivientes
  - en el país de los vivientes
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo poético para el ámbito de la vida terrenal. «La tierra de los vivientes» preserva la imagen y el registro poético. «Vivientes» refleja mejor el sustantivo hebreo que «vivos», aunque esta última sería más corriente.
translation_notes:
  revision_awareness: La revisión final del contexto inglés no introdujo cambios respecto del sentido base; por eso la versión española sigue de cerca la lectura establecida, manteniendo el paralelismo poético y la ambigüedad léxica de עֶרְכָּהּ como «valor».
  spanish_consistency_notes:
  - Se mantuvo un registro poético y sobrio, apto para lectura litúrgica y estudio.
  - Se evitó «SEÑOR» u otras sustituciones ajenas porque el versículo no contiene el nombre divino.
  - «Vivientes» se conservó para reflejar el paralelismo idiomático con el hebreo.
  - La nota al pie marca solo la carga representativa de אֱנוֹשׁ, sin añadir interpretaciones doctrinales.
