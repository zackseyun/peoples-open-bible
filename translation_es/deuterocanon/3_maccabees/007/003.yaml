review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del audit trail inglés: algunos amigos/cortesanos, movidos por mala intención y con acceso frecuente al rey, lo persuadieron para castigar a los judíos bajo su dominio tras reunirlos en grupos, tratándolos como rebeldes. Sin embargo, las notas al pie están intercambiadas respecto de sus anclas y una elección léxica principal puede mejorarse: ξενιζούσαις ... τιμωρίαις se expresa mejor como ''penas extraordinarias'' o ''inusuales'' que como ''penas extrañas'', que en español suena más raro que jurídico.'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero ''más constantemente a nuestro lado'' suena algo calcado; ''más de continuo junto a nosotros'' sería posible, aunque no indispensable. La corrección necesaria es más bien terminológica y editorial: ''penas extrañas'' no suena natural en registro bíblico-jurídico español, y las notas al pie deben corresponder al lugar correcto. El resto del verso es legible y fiel.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto (no aparecen Yahvé/Mesías/etc.). 'Amigos' para φίλων y 'rebeldes' para ἀποστάντων concuerdan con la justificación auditada. 'En grupos' para τὰ συστήματα también concuerda, pero su nota debe ir en [b], mientras la nota sobre 'penas extraordinarias' debe anclarse en la frase de castigo.
  issues:
  - severity: high
    issue: Las notas al pie están asignadas a los anclajes equivocados.
    rationale: En el texto, [a] aparece sobre 'amigos', pero la nota [a] del inglés auditado preserva una alternativa para τὰ συστήματα ('in groups' / 'organized bodies'). Asimismo, [b] aparece sobre 'grupos', pero la nota [b] del inglés auditado corresponde a 'unusual penalties'. Esto altera el aparato crítico y debe corregirse.
  - severity: medium
    issue: '''Penas extrañas'' no es la mejor opción para ξενιζούσαις ... τιμωρίαις.'
    rationale: Aunque 'extrañas' refleja literalmente la rareza, en español jurídico y bíblico suena poco idiomático. 'Penas extraordinarias' o 'penas inusuales' comunica mejor el sentido de castigos fuera de lo común, en línea con el rationale inglés.
  - severity: low
    issue: '''más constantemente a nuestro lado'' suena algo rígido en español.'
    rationale: Es comprensible y fiel, pero tiene sabor de calco. Una leve mejora estilística a 'más de continuo junto a nosotros' o 'más constantemente junto a nosotros' haría el español más natural sin cambiar el sentido.
