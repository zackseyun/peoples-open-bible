translation:
  language: es
  text: 'Y cuando las vasijas[a] estuvieron llenas, ella dijo a su hijo: «Tráeme otra vasija». Pero él le dijo: «No hay otra vasija». Entonces el aceite[b] se detuvo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «recipientes» o «contenedores». כְּלִי es un término amplio.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el aceite se paró» o «el aceite quedó inmóvil». El sentido es que dejó de fluir.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּמְלֹאת הַכֵּלִים
  english_pob_choice: when the containers were full
  chosen_spanish: cuando las vasijas estuvieron llenas
  alternatives_spanish:
  - cuando los recipientes estuvieron llenos
  - cuando se llenaron las vasijas
  lexicon: HALOT
  rationale: El hebreo expresa una cláusula temporal con sentido de completarse el llenado. «Cuando las vasijas estuvieron llenas» conserva la relación temporal y suena natural en español. «Vasijas» mantiene el alcance amplio de כְּלִי sin concretarlo demasiado.
- source_word: הַכֵּלִים / כֶּלִי
  english_pob_choice: containers / container
  chosen_spanish: vasijas
  alternatives_spanish:
  - recipientes
  - contenedores
  - vasos
  lexicon: HALOT
  rationale: כְּלִי es un término amplio para objeto/receptáculo. En este contexto de aceite, «vasijas» es claro y bíblicamente inteligible en español sin forzar a «jarra» o «vaso», que serían más específicos o menos naturales.
- source_word: הַגִּישָׁה
  english_pob_choice: Bring
  chosen_spanish: Tráeme
  alternatives_spanish:
  - Acércame
  - Pásame
  lexicon: HALOT
  rationale: El imperativo hifil de נגשׁ significa traer/acercar/presentar. En el diálogo, el español más natural es «Tráeme», que comunica la petición de pasar otro recipiente sin calco innecesario.
- source_word: עוֹד כֶּלִי
  english_pob_choice: another container
  chosen_spanish: otra vasija
  alternatives_spanish:
  - una vasija más
  - una vasija adicional
  - otro recipiente
  lexicon: HALOT
  rationale: Con un sustantivo singular, עוֹד expresa un elemento adicional del mismo tipo. «Otra vasija» reproduce esa idea de manera idiomática y breve.
- source_word: אֵין עוֹד כֶּלִי
  english_pob_choice: There is not another container
  chosen_spanish: No hay otra vasija
  alternatives_spanish:
  - No queda otra vasija
  - No hay más vasijas
  - No hay otra vasija disponible
  lexicon: HALOT
  rationale: אֵין expresa inexistencia o ausencia. «No hay otra vasija» es fiel, natural y no añade más de lo que dice el texto, aunque el contexto sugiere que no quedaba ninguna más a mano.
- source_word: וַיַּעֲמֹד הַשָּׁמֶן
  english_pob_choice: the oil stopped
  chosen_spanish: el aceite se detuvo
  alternatives_spanish:
  - el aceite paró
  - el aceite cesó
  - el aceite dejó de fluir
  lexicon: HALOT
  rationale: עָמַד literalmente es «estar de pie», pero aquí indica cese. «Se detuvo» preserva esa cesación de forma natural y sin añadir explícitamente «fluir», que es inferido pero no dicho.
theological_decisions:
- issue: Valor narrativo del cese del aceite
  english_pob_reading: the oil stopped
  chosen_spanish_reading: el aceite se detuvo
  alternative_spanish_readings:
  - el aceite cesó
  - el aceite dejó de fluir
  rationale: No hay una carga doctrinal explícita en el verso; la decisión es mantener el sentido narrativo concreto de la acción y la imagen verbal sin explicar más de lo que el hebreo expresa.
  doctrine_reference: Narrativa histórica; no aplica una formulación doctrinal específica.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés, manteniendo sus decisiones léxicas principales: el valor temporal de כִּמְלֹאת, el alcance amplio de כְּלִי, el imperativo de נגשׁ como petición natural en español, la lectura idiomática de עוֹד como «otra», la ausencia de más vasijas con אֵין, y el cese del aceite con עָמַד. No se registraron revisiones posteriores en el paquete auditado.'
  spanish_consistency_notes:
  - Se prefirió «vasijas» como equivalente amplio y culto de כְּלִי; es consistente con el uso bíblico en español y evita restringir el sentido a un tipo específico de envase.
  - Se mantuvo «aceite» para הַשָּׁמֶן, sin añadir «flujo» al texto principal, reservando esa explicitación para la nota.
  - El tono narrativo se conservó sobrio y directo, adecuado para un texto histórico breve.
