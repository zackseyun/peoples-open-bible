translation:
  language: es
  text: En el décimo año, en el décimo mes, el día doce del mes, la palabra de Yahvé vino a mí, diciendo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ‘el año décimo’. Se conserva la forma ordinal directa; el texto no especifica el punto de referencia del cómputo.'
    reason: alternative_reading
lexical_decisions:
- source_word: בַּשָּׁנָה הָעֲשִׂירִית
  english_pob_choice: In the tenth year
  chosen_spanish: En el año décimo
  alternatives_spanish:
  - En el décimo año
  - En el año diez
  lexicon: HALOT
  rationale: La fórmula hebrea es una datación absoluta con ‘año’ + ordinal. En español, ‘año décimo’ conserva la forma formal sin añadir un referente no explicitado en el versículo.
- source_word: בָּעֲשִׂרִי
  english_pob_choice: in the tenth month
  chosen_spanish: en el mes décimo
  alternatives_spanish:
  - en el décimo mes
  - en el mes diez
  lexicon: HALOT
  rationale: El hebreo omite el sustantivo ‘mes’ por el carácter formular de la fecha; el español necesita expresarlo para que la frase sea natural y precisa.
- source_word: בִּשְׁנֵים עָשָׂר לַחֹדֶשׁ
  english_pob_choice: on the twelfth day of the month
  chosen_spanish: a los doce del mes
  alternatives_spanish:
  - el día doce del mes
  - a los doce días del mes
  lexicon: HALOT
  rationale: La construcción hebrea fija el día dentro del mes. ‘A los doce del mes’ reproduce la tersedad de la fórmula y evita introducir una expansión más interpretativa que la fuente.
- source_word: הָיָה דְבַר יְהוָה
  english_pob_choice: the word of Yahweh came to me
  chosen_spanish: la palabra de Yahvé vino a mí
  alternatives_spanish:
  - la palabra de Yahvé llegó a mí
  - la palabra de Yahvé me llegó
  lexicon: HALOT
  rationale: Se conserva la fórmula profética con ‘vino a mí’, que en español comunica el inicio de la revelación sin desnaturalizar el hebreo הָיָה. Se mantiene ‘palabra’ como sujeto del enunciado.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto hebreo usa el Tetragrámaton. Según la terminología del proyecto, se translitera como ‘Yahvé’ en el texto principal, preservando el nombre divino y evitando la sustitución por un título.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hacia mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona indica dirección hacia el hablante. ‘A mí’ es la forma natural y fiel en español.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo,
  alternatives_spanish:
  - y diciendo,
  - 'al decir:'
  lexicon: HALOT
  rationale: Es la partícula introductoria de la cita que enlaza con el discurso siguiente. ‘Diciendo,’ mantiene la función sintáctica y el tono profético formular.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La base hebrea lleva explícitamente el Tetragrámaton. La práctica del proyecto en español es usar ‘Yahvé’ como nombre propio divino, no una sustitución por título, para conservar la identificación personal del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el paquete fuente; el pasaje presenta alta concordancia entre la traducción inglesa auditada y la lectura del hebreo masorético. Se preserva la fórmula profética y la datación sin añadir referencias interpretativas.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ para יהוה conforme al estándar del proyecto.
  - Se usa ‘palabra de Yahvé vino a mí’ como equivalente idiomático de la fórmula profética hebrea.
  - La fecha se vierte con un español natural pero sobrio, evitando explicaciones no presentes en el texto.
