- from: Entonces algunos de los ancianos de Israel vinieron a mí y se sentaron delante de mí[a].
  to: Entonces algunos de los ancianos de Israel vinieron a mí y se sentaron ante mí[a].
  rationale: Se conserva el texto principal con una mejora estilística menor («ante mí») y se corrige la nota para que ofrezca una alternativa real basada en la construcción hebrea מִן, en vez de duplicar la redacción principal.
