lexical_decisions:
- source_word: τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  lexicon: LSJ
  rationale: Pregunta retórica directa y natural en español, sin añadir énfasis ausente en el griego.
- source_word: ἀνέβη
  english_pob_choice: has gone up
  chosen_spanish: ha subido
  alternatives_spanish:
  - subió
  - ha ascendido
  lexicon: LSJ
  rationale: El aoristo se vierte con perfecto compuesto en español para conservar el valor resultativo-retórico que reflejó la revisión inglesa, y 'subido' suena más natural que 'ascendido'.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: into heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - al cielo de Dios
  - a los cielos
  lexicon: LSJ
  rationale: En este contexto sapiencial οὐρανός se refiere al ámbito celestial; 'al cielo' es idiomático en español y conserva la dirección del movimiento expresada por εἰς.
- source_word: ἔλαβεν αὐτήν
  english_pob_choice: taken her
  chosen_spanish: la ha tomado
  alternatives_spanish:
  - la ha recibido
  - la ha obtenido
  lexicon: LSJ
  rationale: '''Tomar'' reproduce con sobriedad λαμβάνω; el pronombre femenino se mantiene porque en el contexto inmediato se trata de la Sabiduría personificada.'
- source_word: κατεβίβασεν
  english_pob_choice: brought her down
  chosen_spanish: la ha hecho bajar
  alternatives_spanish:
  - la ha bajado
  - la ha traído abajo
  lexicon: LSJ
  rationale: El verbo expresa causar el descenso; 'hacer bajar' preserva bien ese sentido causativo sin sonar forzado en español.
- source_word: ἐκ τῶν νεφελῶν
  english_pob_choice: from the clouds
  chosen_spanish: de las nubes
  alternatives_spanish:
  - desde las nubes
  - fuera de las nubes
  lexicon: LSJ
  rationale: Plural literal de νεφέλαι; 'de las nubes' conserva la imagen y suena natural en español.
theological_decisions:
- issue: Pronombre femenino referido a la Sabiduría personificada
  english_pob_reading: Render αὐτήν as 'her'
  chosen_spanish_reading: Mantener 'la' como pronombre femenino
  alternative_spanish_readings:
  - lo
  - la cosa
  rationale: El griego usa pronombre femenino y el contexto presenta a la Sabiduría como figura femenina personificada; en español conviene conservar esa textura literaria y teológica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió el perfecto compuesto para los aoristos en esta pregunta retórica, y conserva el descenso causativo y la referencia femenina a la Sabiduría.
  spanish_consistency_notes:
  - Se mantuvo 'cielo' y no 'cielos' para reflejar el singular de οὐρανός en el griego.
  - Se evitó 'Cristo' u otra terminología ajena porque el pasaje no la contiene.
  - Se conservó la personificación femenina con pronombre y nota, como en el audit trail inglés.
