translation:
  language: es
  text: Tus votos están sobre mí[a], oh, Dios; te rendiré ofrendas de agradecimiento[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, 'mis votos a ti'. El hebreo dice literalmente 'tus votos', expresando votos debidos a Dios.
    reason: alternative_reading
  - marker: b
    text: O 'agradecimientos'; el término hebreo puede referirse tanto a expresiones de gratitud como a ofrendas de agradecimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלַי
  english_pob_choice: are upon me
  chosen_spanish: están sobre mí
  alternatives_spanish:
  - están en mí
  - pesan sobre mí
  - recaen sobre mí
  lexicon: HALOT
  rationale: Conserva la imagen de algo que está 'sobre' la persona y el sentido de obligación o carga implícito en la expresión hebrea, sin volverla demasiado interpretativa.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: oh Dios
  alternatives_spanish:
  - Dios
  - ¡oh, Dios!
  lexicon: HALOT
  rationale: En vocativo, 'oh Dios' expresa la llamada directa de manera natural en español y mantiene la fuerza apelativa del original.
- source_word: נְדָרֶיךָ
  english_pob_choice: Your vows
  chosen_spanish: Tus votos
  alternatives_spanish:
  - Tus votos hechos a ti
  - Mis votos para ti
  lexicon: HALOT
  rationale: La forma hebrea es literalmente 'tus votos'; el español mantiene esa literalidad. 'Votos' conserva el término de compromiso religioso; 'mis votos para ti' explicita el sentido, pero introduce elementos no expresados en el hebreo.
- source_word: אֲשַׁלֵּם
  english_pob_choice: I will render
  chosen_spanish: te rendiré
  alternatives_spanish:
  - te pagaré
  - los cumpliré
  - los saldaré
  lexicon: HALOT
  rationale: El verbo piel de שלם puede significar pagar, saldar o cumplir una obligación. 'Rendir' funciona bien con ofrendas y conserva el matiz de ofrecer lo debido sin sonar excesivamente comercial en español.
- source_word: תּוֹדֹת
  english_pob_choice: thank offerings
  chosen_spanish: ofrendas de agradecimiento
  alternatives_spanish:
  - acciones de gracias
  - ofrendas de gratitud
  - agradecimientos
  lexicon: HALOT
  rationale: El sustantivo admite un sentido de acción de gracias y uno cultual/ofrendario. 'Ofrendas de agradecimiento' preserva ambas posibilidades y se ajusta al contexto de votos y cumplimiento.
- source_word: לָךְ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: HALOT
  rationale: El dativo indirecto se expresa naturalmente con el clítico 'te' en español. Aunque la vocalización morfológica del paquete muestra una irregularidad, el referente sigue siendo Dios, por lo que el sentido del destinatario se mantiene.
theological_decisions:
- issue: Literalidad de 'Tus votos' frente a una aclaración interpretativa
  english_pob_reading: The main text preserves the literal wording 'Your vows' rather than resolving it to 'my vows to you.'
  chosen_spanish_reading: El texto principal conserva 'Tus votos' y no lo resuelve como 'mis votos para ti'.
  alternative_spanish_readings:
  - Mis votos para ti
  - Los votos que hice para ti
  rationale: La forma hebrea es literalmente segunda persona y la POB inglesa preserva esa tensión. En español se mantiene la literalidad para no ocultar el problema textual/semántico; la opción idiomática queda sólo como alternativa implícita, no en el cuerpo principal.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: He seguido la revisión auditada del inglés POB que prefirió 'render' para ofrendas; en español, 'rendir' reproduce ese ajuste con mayor naturalidad que 'repagar'. También mantengo la tensión documentada de נְדָרֶיךָ con una nota, en vez de normalizarla en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Dios' en vocativo con 'oh' para reflejar la dirección explícita del discurso.
  - Se conserva 'votos' y no 'promesas', porque el léxico del hebreo apunta a votos/vinculaciones votivas.
  - '''Ofrendas de agradecimiento'' mantiene la ambivalencia cultual de תּוֹדֹת sin reducirla sólo a sentimientos internos.'
  - No se introduce 'SEÑOR' ni 'Cristo'; el verso trata de una súplica/voto dirigido a Dios.
