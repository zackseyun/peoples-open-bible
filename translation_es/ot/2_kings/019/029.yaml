translation:
  language: es
  text: 'Y esta será la señal para ti: este año se comerá lo que brote por sí solo[a], y en el segundo año, lo que nazca de este[b]; y en el tercer año sembrarán y segarán, y plantarán viñas y comerán su fruto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «crecimiento espontáneo»; el hebreo alude a la producción que sale sin haber sido sembrada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el segundo crecimiento»; el término hebreo es raro y probablemente designa el crecimiento espontáneo del segundo año procedente de la cosecha no sembrada del año anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאוֹת
  english_pob_choice: the sign
  chosen_spanish: la señal
  alternatives_spanish:
  - el signo
  - la señal confirmatoria
  lexicon: HALOT
  rationale: En este contexto de promesa profética, "señal" comunica de forma natural el valor de confirmación de אֹות sin sonar técnico. "Signo" también es posible, pero "señal" es más idiomático en español bíblico actual.
- source_word: אָכוֹל
  english_pob_choice: eat
  chosen_spanish: comerán
  alternatives_spanish:
  - coman
  - habrán de comer
  lexicon: HALOT
  rationale: El infinitivo absoluto hebreo tiene fuerza directiva/predictiva; en español, el futuro plural conserva bien ese valor en una frase de anuncio. No se requiere un imperativo explícito.
- source_word: סָפִיחַ
  english_pob_choice: what grows by itself
  chosen_spanish: lo que brote por sí solo
  alternatives_spanish:
  - el crecimiento espontáneo
  - lo que crece solo
  lexicon: HALOT
  rationale: La expresión española mantiene la idea de producción no sembrada y suena natural para lectores modernos. "Brote por sí solo" preserva la noción de surgimiento espontáneo sin tecnicismo excesivo.
- source_word: סָחִישׁ
  english_pob_choice: what springs from that
  chosen_spanish: lo que nazca de ello
  alternatives_spanish:
  - el segundo crecimiento
  - lo que brote de eso
  lexicon: HALOT
  rationale: El término es raro y el inglés POB opta por una paráfrasis prudente. En español, "lo que nazca de ello" conserva la referencia secuencial y la ambigüedad del hebreo, sin fijar más de lo que permite el texto.
- source_word: זִרְעוּ
  english_pob_choice: sow
  chosen_spanish: sembrarán
  alternatives_spanish:
  - siembren
  lexicon: HALOT
  rationale: La forma hebrea es plural e imperativa/predictiva; el futuro mantiene el tono de instrucción profética enlazada con las acciones sucesivas del versículo.
- source_word: וְקִצְרוּ
  english_pob_choice: and reap
  chosen_spanish: y segarán
  alternatives_spanish:
  - y cosecharán
  - y recogerán
  lexicon: HALOT
  rationale: '"Segar" conserva la correspondencia más precisa con קָצַר, especialmente en un paralelo agrícola con sembrar. "Cosechar" sería más general, pero menos específico.'
- source_word: וְנִטְעוּ כְרָמִים
  english_pob_choice: and plant vineyards
  chosen_spanish: y plantarán viñas
  alternatives_spanish:
  - y plantarán viñedos
  - y sembrarán viñas
  lexicon: HALOT
  rationale: כְּרָמִים se refiere a viñedos/viñas cultivadas para uva. "Viñas" es breve y tradicionalmente comprensible; "plantarán viñas" mantiene la imagen agrícola sin convertirla en una expresión más abstracta.
- source_word: וְאִכְלוּ פִרְיָם
  english_pob_choice: and eat their fruit
  chosen_spanish: y comerán su fruto
  alternatives_spanish:
  - y comerán su fruto
  - y disfrutarán de su fruto
  lexicon: HALOT
  rationale: El sufijo plural refiere naturalmente a las viñas/viñedos. "Su fruto" reproduce el referente colectivo de forma idiomática en español; "disfrutarán" añadiría una interpretación no explícita.
translation_notes:
  revision_awareness: 'La redacción española refleja la revisión auditada del inglés POB: se evitó toda idea de contraste introducida por una traducción con «pero», y se mantuvo la simple coordinación de acciones que exige el hebreo. También se conservó la prudencia semántica en el término raro סָחִישׁ, siguiendo la decisión inglesa de no fijar una glosa demasiado técnica.'
  spanish_consistency_notes:
  - Se usó «Yahvé» no porque aparezca en este versículo, sino como norma del proyecto cuando corresponda al Tetragrama; aquí no aplica.
  - Se prefirió un futuro profético en español («comerán», «sembrarán», «segarán», «plantarán») para reflejar la secuencia exhortativa/predictiva del hebreo.
  - Se mantuvo la coordinación con «y» en todo el versículo para no introducir contraste inexistente en el original.
  - «Viñas» traduce de manera natural כְרָמִים en este contexto agrícola, sin necesidad de una perífrasis más técnica.
