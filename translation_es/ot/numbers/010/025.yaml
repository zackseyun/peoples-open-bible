translation:
  language: es
  text: Entonces el estandarte[a] del campamento de los hijos de Dan partió, sirviendo de retaguardia[b] para todos los campamentos según sus divisiones[c]; y al frente de su compañía estaba Ahiezer hijo de Amisadai.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bandera» para «estandarte».
    reason: lexical_alternative
  - marker: b
    text: O «yendo al final de la marcha» para «sirviendo de retaguardia».
    reason: lexical_alternative
  - marker: c
    text: El término hebreo también puede verterse «huestes» o «compañías»; aquí se refiere a las divisiones tribales organizadas en el orden de marcha.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסַע
  english_pob_choice: Then ... set out
  chosen_spanish: Entonces ... partió
  alternatives_spanish:
  - Y ... partió
  - Entonces ... se puso en marcha
  lexicon: HALOT
  rationale: El waw consecutivo aquí avanza la narración; «entonces» preserva la secuencia y «partió» comunica de forma natural el movimiento del campamento en español.
- source_word: דֶּגֶל
  english_pob_choice: banner
  chosen_spanish: estandarte
  alternatives_spanish:
  - bandera
  - insignia
  lexicon: HALOT
  rationale: En este contexto tribal y militar, «estandarte» comunica bien la idea del distintivo que guía al campamento. Mantiene un registro digno y evita ambigüedad con una bandera moderna.
- source_word: מַחֲנֵה
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento
  - campamento militar
  lexicon: HALOT
  rationale: La construcción «estandarte del campamento» reproduce con claridad el genitivo hebreo y resulta natural en español.
- source_word: בְנֵי דָן
  english_pob_choice: the sons of Dan
  chosen_spanish: los hijos de Dan
  alternatives_spanish:
  - los descendientes de Dan
  - la tribu de Dan
  lexicon: HALOT
  rationale: Se conserva la fórmula literal del hebreo, como en el texto inglés, sin neutralizarla. «Hijos» refleja de manera transparente בני y mantiene la expresión tribal tradicional del pasaje.
- source_word: מְאַסֵּף
  english_pob_choice: serving as the rear guard
  chosen_spanish: sirviendo como la retaguardia
  alternatives_spanish:
  - sirviendo de retaguardia
  - llevando la retaguardia
  - haciendo de retaguardia
  lexicon: HALOT
  rationale: El participio expresa función en la marcha. «Retaguardia» comunica la posición y tarea defensiva del grupo; es más natural en español que una traducción demasiado literal del verbo.
- source_word: לְכָל הַמַּחֲנֹת
  english_pob_choice: for all the camps
  chosen_spanish: para todos los campamentos
  alternatives_spanish:
  - para todos los campamentos
  - de todos los campamentos
  lexicon: HALOT
  rationale: La relación de Dan con el conjunto de la formación se expresa con «para», como función en beneficio de todos los campamentos. «Campamentos» conserva el paralelo del plural hebreo.
- source_word: לְצִבְאֹתָם
  english_pob_choice: by their divisions
  chosen_spanish: según sus divisiones
  alternatives_spanish:
  - por sus divisiones
  - según sus cuerpos
  lexicon: HALOT
  rationale: צְבָאוֹת aquí refiere a las agrupaciones organizadas para la marcha, no a «ejércitos» en sentido bélico estrecho. «Según sus divisiones» refleja la organización del desplazamiento con claridad en español.
- source_word: וְעַל צְבָאוֹ
  english_pob_choice: and over its company was
  chosen_spanish: y sobre su compañía estaba
  alternatives_spanish:
  - y sobre su compañía estaba
  - y al frente de su compañía estaba
  - y sobre su tropa estaba
  lexicon: HALOT
  rationale: Se conserva la relación de autoridad o supervisión de על. «Compañía» sigue la revisión final del inglés POB y evita repetir «divisiones»; en este contexto puede entenderse como una unidad organizada del campamento.
- source_word: אֲחִיעֶזֶר בֶּן עַמִּישַׁדָּי
  english_pob_choice: Ahiezer the son of Ammishaddai
  chosen_spanish: Ahiezer hijo de Ammisadai
  alternatives_spanish:
  - Ahiezer, hijo de Ammisadai
  - Ahiezer hijo de Ammishaddai
  lexicon: HALOT
  rationale: Los nombres propios se transliteran; se adapta la forma al uso español habitual de nombres bíblicos, con «Ammisadai»/«Ammisadai» conforme a la tradición transliterada más inteligible en español.
translation_notes:
  revision_awareness: Se siguió la revisión auditada que prefiere «company» en la cláusula final del inglés POB para reflejar mejor צבא en este contexto y evitar la repetición de «divisiones».
  spanish_consistency_notes:
  - Se mantuvo «hijos de Dan» para conservar la fórmula tribal literal del hebreo, coherente con la decisión inglesa.
  - Se evitó «SEÑOR» o una sustitución equivalente porque este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - «Retaguardia» se eligió como equivalente funcional de מְאַסֵּף en contexto de marcha, sin convertirlo en una glosa excesivamente explicativa.
