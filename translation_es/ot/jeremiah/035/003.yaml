translation:
  language: es
  text: Entonces[a] tomé a Jaazanías, hijo de Jeremías, hijo de Habazinías, y a sus hermanos, y a todos sus hijos varones, y a toda la casa[b] de los recabitas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Y tomé». El hebreo narrativo también puede expresarse como «Entonces tomé».
    reason: lexical_alternative
  - marker: b
    text: «Casa» aquí significa el hogar, la familia o el clan de los recabitas, no solamente un edificio.
    reason: cultural_note
lexical_decisions:
- source_word: וָאֶקַּח
  english_pob_choice: So I took
  chosen_spanish: Así que tomé
  alternatives_spanish:
  - Entonces tomé
  - Y tomé
  lexicon: HALOT
  rationale: La forma narrativa wayyiqtol expresa una acción sucesiva en la historia. «Así que» conserva bien la secuencia y suena natural en español, sin perder el valor consecutivo del hebreo.
- source_word: יַאֲזַנְיָה
  english_pob_choice: Jaazaniah
  chosen_spanish: Jaazanías
  alternatives_spanish:
  - Jazanías
  - Jaazanías
  lexicon: Transliteración de nombre propio
  rationale: Se mantiene el nombre propio con una transliteración hispana que refleja de cerca la forma hebrea y resulta legible para lectores en español.
- source_word: בֶן
  english_pob_choice: son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - descendiente de
  lexicon: HALOT
  rationale: En esta cadena genealógica inmediata, בֶן indica filiación directa; «hijo de» es la correspondencia más natural y precisa en español.
- source_word: יִרְמְיָהוּ
  english_pob_choice: Jeremiah
  chosen_spanish: Jeremías
  alternatives_spanish:
  - Yirmeyahu
  lexicon: Transliteración de nombre propio
  rationale: Se usa la forma española tradicional del nombre propio, que es transparente para el lector y corresponde al referente hebreo.
- source_word: חֲבַצִּנְיָה
  english_pob_choice: Habazziniah
  chosen_spanish: Habazzinías
  alternatives_spanish:
  - Jabazzinías
  lexicon: Transliteración de nombre propio
  rationale: Se conserva el nombre propio con una transliteración consistente en español, procurando reflejar la consonancia hebrea y la convención gráfica del texto bíblico.
- source_word: אֶחָיו
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus hermanos de clan
  lexicon: HALOT
  rationale: אח normalmente significa «hermano». No hay aquí presión contextual suficiente para ampliar a «parientes», así que se preserva el sentido directo.
- source_word: כָּל בָּנָיו
  english_pob_choice: all his sons
  chosen_spanish: todos sus hijos
  alternatives_spanish:
  - todos sus hijos varones
  - todos sus descendientes
  lexicon: HALOT
  rationale: Aunque בנים puede referirse a hijos varones, en español «hijos» evita una rigidez innecesaria y mantiene la referencia familiar amplia del contexto; la nota puede conservar la posibilidad masculina si se desea subrayar el matiz del hebreo.
- source_word: כָּל בֵּית הָרֵכָבִים
  english_pob_choice: the whole house of the Rechabites
  chosen_spanish: toda la casa de los recabitas
  alternatives_spanish:
  - todo el linaje de los recabitas
  - toda la familia de los recabitas
  lexicon: HALOT
  rationale: בֵּית en este uso señala una unidad doméstica/clánica, no un edificio. «Casa» conserva el valor corporativo tradicional y «toda» refleja adecuadamente כָּל.
translation_notes:
  revision_awareness: La revisión más reciente indica alta concordancia y sin cambios necesarios; este borrador sigue de cerca el texto hebreo y el trazado auditado en inglés, sin introducir variaciones interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se conserva la forma genealógica «hijo de» para la cadena de filiación inmediata.
  - «Casa» se usa en sentido corporativo/clánico, no arquitectónico.
  - Los nombres propios se transliteran en español de forma consistente y legible.
