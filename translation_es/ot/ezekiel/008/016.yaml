translation:
  language: es
  text: Entonces me llevó al atrio interior de la casa de Yahvé; y he aquí, a la entrada del templo de Yahvé, entre el pórtico y el altar, había como veinticinco hombres, con sus espaldas hacia el templo de Yahvé y sus rostros hacia el oriente; y se postraban hacia el oriente al sol[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo hebreo denota postrarse en adoración; por eso, «adoraban al sol» también es un sentido posible más explícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֵא
  english_pob_choice: Then he brought me
  chosen_spanish: Entonces me llevó
  alternatives_spanish:
  - Y me llevó
  - Luego me llevó
  lexicon: HALOT
  rationale: El wayyiqtol marca secuencia narrativa; «entonces» conserva la progresión en español. «Llevar» transmite con naturalidad la acción de introducir al profeta en la visión, sin perder la dirección del movimiento.
- source_word: חֲצַר בֵּית־יְהוָה הַפְּנִימִית
  english_pob_choice: the inner court of the house of Yahweh
  chosen_spanish: el atrio interior de la casa de Yahvé
  alternatives_spanish:
  - el patio interior de la casa de Yahvé
  - el atrio interior del templo de Yahvé
  lexicon: HALOT
  rationale: «חָצֵר» es «atrio/patio»; «atrio» es más natural en registro bíblico y conserva la imagen arquitectónica. «Casa de Yahvé» sigue de cerca el hebreo בֵּית יְהוָה y evita sustituir el nombre por un título.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: transliteración del nombre divino, no sustitución por un título. «Yahvé» es la forma establecida en este proyecto para el texto principal.'
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y resulta que
  lexicon: HALOT
  rationale: «He aquí» reproduce el giro deíctico y visionario con dignidad bíblica en español, sin añadir paráfrasis.
- source_word: פֶּתַח הֵיכַל יְהוָה
  english_pob_choice: at the entrance of the temple of Yahweh
  chosen_spanish: a la entrada del templo de Yahvé
  alternatives_spanish:
  - en la puerta del templo de Yahvé
  - a la entrada del santuario de Yahvé
  lexicon: HALOT
  rationale: «פֶּתַח» es «entrada/puerta»; aquí «entrada» mantiene la neutralidad espacial y encaja bien con «del templo». «Templo» traduce de modo idiomático הֵיכָל en este contexto.
- source_word: בֵּין הָאוּלָם וּבֵין הַמִּזְבֵּחַ
  english_pob_choice: between the porch and the altar
  chosen_spanish: entre el pórtico y el altar
  alternatives_spanish:
  - entre el vestíbulo y el altar
  - entre el portal y el altar
  lexicon: HALOT
  rationale: «אוּלָם» designa el espacio de acceso del templo; «pórtico» es una equivalencia clara y digna en español. «Altar» es la traducción directa de מִזְבֵּחַ.
- source_word: כְּעֶשְׂרִים וַחֲמִשָּׁה אִישׁ
  english_pob_choice: about twenty-five men
  chosen_spanish: como veinticinco hombres
  alternatives_spanish:
  - unos veinticinco hombres
  - aproximadamente veinticinco hombres
  lexicon: HALOT
  rationale: El prefijo כ expresa aproximación; «como» preserva esa indefinición de forma natural. «Hombres» refleja el colectivo humano del hebreo tras la cifra.
- source_word: אֲחֹרֵיהֶם אֶל הֵיכַל יְהוָה
  english_pob_choice: with their backs toward the temple of Yahweh
  chosen_spanish: con sus espaldas vueltas hacia el templo de Yahvé
  alternatives_spanish:
  - de espaldas al templo de Yahvé
  - con la espalda hacia el templo de Yahvé
  lexicon: HALOT
  rationale: La expresión hebrea indica orientación deliberada en dirección opuesta al santuario. «Espaldas vueltas hacia» conserva la imagen corporal y el contraste intencional con el templo.
- source_word: וּפְנֵיהֶם קֵדְמָה
  english_pob_choice: and their faces toward the east
  chosen_spanish: y sus rostros hacia el oriente
  alternatives_spanish:
  - y su rostro hacia el este
  - y sus caras hacia el este
  lexicon: HALOT
  rationale: «פְּנֵיהֶם» es literalmente «sus rostros». «Oriente» es una forma solemne y clara para קֵדְמָה en español bíblico contemporáneo, sin perder la dirección cardinal.
- source_word: מִשְׁתַּחֲוִיתֶם
  english_pob_choice: they were bowing down
  chosen_spanish: se postraban
  alternatives_spanish:
  - se inclinaban
  - se prosternaban
  lexicon: HALOT
  rationale: El verbo puede implicar postración reverente; «se postraban» conserva el acto físico y deja que el objeto siguiente explicite el carácter idolátrico. «Se prosternaban» sería más técnico, pero menos natural.
- source_word: קֵדְמָה לַשָּׁמֶשׁ
  english_pob_choice: toward the east to the sun
  chosen_spanish: hacia el oriente delante del sol
  alternatives_spanish:
  - hacia el oriente al sol
  - orientados al sol
  lexicon: HALOT
  rationale: La frase hebrea combina dirección y objeto de adoración. «Delante del sol» refleja la orientación del gesto ritual en español natural, manteniendo la relación con el astro sin añadir una paráfrasis interpretativa como «adoraban al sol».
theological_decisions:
- issue: Nombre divino en יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se conserva el nombre propio divino como transliteración, siguiendo el principio del proyecto y la decisión auditada en inglés. Esto evita ocultar el Tetragrámaton bajo un título.
  doctrine_reference: 'DOCTRINE.md: contested terms — יְהוָה / YHWH → Yahvé'
- issue: Sentido cultual de מִשְׁתַּחֲוִיתֶם
  english_pob_reading: they were bowing down ... to the sun
  chosen_spanish_reading: se postraban ... delante del sol
  alternative_spanish_readings:
  - adoraban al sol
  - se prosternaban ante el sol
  rationale: Se conserva el gesto corporal concreto en el texto principal, como hace el POB inglés, y se deja que el contexto del sol haga inequívoca la idolatría. «Adoraban» sería una explicitación posible, pero más interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Relación espacial entre templo y orientación
  english_pob_reading: with their backs toward the temple ... and their faces toward the east
  chosen_spanish_reading: con sus espaldas vueltas hacia el templo ... y sus rostros hacia el oriente
  alternative_spanish_readings:
  - de espaldas al templo ... y de frente al este
  - con la espalda hacia el templo ... y el rostro al este
  rationale: La formulación mantiene el contraste intencional del hebreo entre el templo y el oriente, sin suavizar la oposición física y simbólica.
  doctrine_reference: Ezekiel 8:16 source text; spatial imagery in vision report
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el auditable English POB: conserva la secuencia narrativa, el nombre divino como Yahvé, el espacio del templo con términos claros en español, y la tensión entre la orientación hacia el templo y hacia el oriente. Se evitó expandir «se postraban» a «adoraban» en el cuerpo principal para no sobreinterpretar, tal como en el inglés auditado.'
  spanish_consistency_notes:
  - «Yahvé» se usa consistentemente para יְהוָה.
  - «Atrio» y «templo» mantienen el registro bíblico sin arcaísmos excesivos.
  - «Oriente» se prefiere para קֵדְמָה por claridad y tono solemne.
  - La puntuación reproduce la progresión del hebreo con una sola oración amplia, apta para lectura pública.
