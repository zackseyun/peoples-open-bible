translation:
  language: es
  text: Permitió que comiéramos las cosas apropiadas para nuestras almas[a], pero nos prohibió comer carne contraria a ellas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «afines a nuestras almas». El griego enfatiza la congruencia o incongruencia moral con el alma.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκειωθησόμενα
  english_pob_choice: suited
  chosen_spanish: convenientes
  alternatives_spanish:
  - afines
  - apropiadas
  - adecuadas
  lexicon: LSJ
  rationale: El participio expresa lo que resulta propio, afín o ajustado al alma. «Convenientes» comunica esa idoneidad sin volver el español forzado ni perder la idea de correspondencia moral.
- source_word: ψυχαῖς
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - seres
  - yoes
  lexicon: LSJ
  rationale: «Almas» preserva el peso antropológico y ético del término en este contexto, en paralelo con la lectura inglesa que mantiene «souls» para no reducirlo a mera vida biológica.
- source_word: ἐπέτρεψεν
  english_pob_choice: permitted
  chosen_spanish: permitió
  alternatives_spanish:
  - permitió
  - autorizó
  - dejó
  lexicon: LSJ
  rationale: «Permitió» reproduce bien el matiz legal-ético de la frase y sigue de cerca la decisión inglesa sin sonar demasiado técnica en español.
- source_word: ἐναντιωθησόμενα
  english_pob_choice: opposed
  chosen_spanish: contraria
  alternatives_spanish:
  - opuesta
  - contraria
  - hostil
  lexicon: LSJ
  rationale: El participio marca oposición o contrariedad respecto del alma. «Contraria» mantiene la fuerza semántica y encaja con el giro idiomático español.
- source_word: ἐκώλυσεν
  english_pob_choice: forbade
  chosen_spanish: prohibió
  alternatives_spanish:
  - prohibió
  - vedó
  - impidió
  lexicon: LSJ
  rationale: «Prohibió» expresa con claridad la negativa normativa del verbo y resulta natural en español moderno; preserva el paralelismo con «permitió».
- source_word: σαρκοφαγεῖν
  english_pob_choice: to eat flesh
  chosen_spanish: comer carne
  alternatives_spanish:
  - comer carne
  - comer la carne
  - ingerir carne
  lexicon: LSJ
  rationale: La expresión literal es «comer carne»; este giro conserva la referencia concreta a σάρξ sin suavizarla a «carne» en sentido figurado ni introducir una perífrasis menos directa.
theological_decisions:
- issue: Correspondencia moral entre el alma y los alimentos
  english_pob_reading: Rendered as 'souls' and retained the moral correspondence language ('suited... opposed')
  chosen_spanish_reading: Se mantuvo «almas» y el contraste «convenientes... contraria»
  alternative_spanish_readings:
  - «vidas» en lugar de «almas»
  - reformular como «adecuadas... opuesta»
  rationale: El versículo no habla simplemente de salud física ni de preferencia cultural, sino de congruencia moral y antropológica. Mantener «almas» preserva esa tensión interpretativa y evita rebajar el argumento.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del audit trail en cuanto a la acción principal y el objeto directo: «eat flesh» fue reflejado como «comer carne», manteniendo la repetición de «comer» para conservar el paralelismo del griego y la naturalidad del español. También se preservó la lectura antropológica de ψυχαῖς como «almas», conforme a la decisión inglesa y su nota lexical.'
  spanish_consistency_notes:
  - Se usa «almas» de manera consistente para ψυχαῖς, en lugar de «vidas», para no diluir el matiz moral-psicológico.
  - Se traduce σαρκοφαγεῖν de forma directa como «comer carne», manteniendo el contraste con «comiéramos» en la primera cláusula.
  - «Permitió» / «prohibió» conserva el paralelismo normativo del original.
  - El marcador [a] está anclado en «almas» para reflejar la alternativa lexical principal del audit trail.
