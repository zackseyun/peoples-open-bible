translation:
  language: es
  text: Oye[a] hijo mío, la instrucción de tu padre, y no abandones la enseñanza[b] de tu madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Escucha». El hebreo שְׁמַע pide atención receptiva; en sabiduría puede implicar obediencia, pero el texto no la expresa de forma explícita aquí.'
    reason: alternative_reading
  - marker: b
    text: 'O también: «ley». El hebreo תּוֹרָה puede significar «ley» o «instrucción»; aquí se refiere a la enseñanza autoritativa de la madre, no a un código legal formal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁמַע
  english_pob_choice: Hear
  chosen_spanish: Oye
  alternatives_spanish:
  - Escucha
  - Oye, presta atención
  lexicon: HALOT
  rationale: Hebreo imperativo de atención receptiva en literatura sapiencial. «Oye» conserva la concisión y el tono exhortativo directo sin volverlo más interpretativo que el original.
- source_word: בְּנִי
  english_pob_choice: my son
  chosen_spanish: hijo mío
  alternatives_spanish:
  - mi hijo
  - hijo
  lexicon: HALOT
  rationale: El hebreo usa vocativo masculino singular con sufijo de primera persona. «Hijo mío» mantiene el llamado filial directo y el registro sapiencial.
- source_word: מוּסַר
  english_pob_choice: instruction
  chosen_spanish: instrucción
  alternatives_spanish:
  - disciplina
  - corrección
  lexicon: HALOT
  rationale: En este contexto paterno-sapiencial, el término abarca formación correctiva y enseñanza. «Instrucción» comunica bien ese alcance sin reducirlo a un sentido sólo punitivo.
- source_word: אָבִיךָ
  english_pob_choice: your father's
  chosen_spanish: de tu padre
  alternatives_spanish:
  - de tu papá
  - paterna
  lexicon: HALOT
  rationale: El genitivo posesivo se expresa de forma natural en español como «de tu padre», conservando la relación de pertenencia y el paralelismo con la segunda mitad del versículo.
- source_word: תּוֹרָת
  english_pob_choice: teaching
  chosen_spanish: enseñanza
  alternatives_spanish:
  - instrucción
  - ley
  lexicon: HALOT
  rationale: Aunque תּוֹרָה puede significar «ley», aquí el contexto doméstico y sapiencial señala la guía autorizada de la madre. «Enseñanza» evita sugerir un código legal formal.
- source_word: אִמֶּךָ
  english_pob_choice: your mother's
  chosen_spanish: de tu madre
  alternatives_spanish:
  - materna
  - de tu mamá
  lexicon: HALOT
  rationale: Se mantiene el paralelismo natural con la primera cola y el sentido posesivo del hebreo mediante «de tu madre».
- source_word: תִּטֹּשׁ
  english_pob_choice: forsake
  chosen_spanish: abandones
  alternatives_spanish:
  - dejes
  - rechaces
  - descuides
  lexicon: HALOT
  rationale: El verbo expresa dejar atrás o abandonar. «Abandones» preserva mejor esa fuerza que «descuides», que sería más débil.
theological_decisions:
- issue: Vocativo filial masculino en literatura sapiencial
  english_pob_reading: my son
  chosen_spanish_reading: hijo mío
  alternative_spanish_readings:
  - mi hijo
  - hijo
  rationale: El hebreo es gramaticalmente masculino singular y el marco literario de Proverbios usa este llamado paterno de forma marcada. Se conserva sin neutralizarlo para no borrar la forma retórica del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de תּוֹרָה en un contexto no legal-cúltico
  english_pob_reading: teaching
  chosen_spanish_reading: enseñanza
  alternative_spanish_readings:
  - ley
  - instrucción
  rationale: Aquí תּוֹרָה no apunta a la Torá mosaica como corpus legal, sino a la guía autoritativa de la madre. «Enseñanza» comunica ese sentido sin imponer una lectura jurídica.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: La revisión previa falló por carecer de anclajes visibles para las notas. En esta versión, los marcadores [a] y [b] aparecen exactamente en el texto español junto a los términos correspondientes.
  spanish_consistency_notes:
  - Se mantiene el paralelismo poético entre padre/madre con genitivos naturales en español.
  - «Oye» y «abandones» reflejan imperativo/negativa del hebreo sin sobreexplicación.
  - «Instrucción» y «enseñanza» conservan la amplitud semántica del par מוּסָר / תּוֹרָה en un contexto sapiencial doméstico.
