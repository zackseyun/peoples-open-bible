translation:
  language: es
  text: 'Entonces Moisés dijo a Yahvé: «Mira, tú me estás diciendo: “Haz subir a este pueblo”, pero no me has hecho saber a quién[a] enviarás conmigo. Sin embargo, tú has dicho: “Te conozco por tu nombre[b], y también has hallado favor[c] ante mis ojos”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quién enviarás conmigo». La construcción hebrea puede expresarse en español con «a quién» o «quién», y en ambos casos se refiere a una persona que acompañará a Moisés.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «Te conozco por nombre / por tu nombre», un modismo que expresa conocimiento personal y trato favorable.'
    reason: cultural_note
  - marker: c
    text: 'O: «gracia». El hebreo חֵן puede traducirse por «favor» o «gracia»; aquí «favor» suena más natural en la expresión idiomática «hallar favor ante mis ojos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: El texto fuente usa el nombre divino del Tetragrámaton, y el criterio del proyecto pide conservarlo como nombre propio. «Yahvé» mantiene la referencia personal al nombre revelado, en vez de sustituirlo por un título.
- source_word: רְאֵה
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Ve
  - Considera
  lexicon: HALOT
  rationale: Es un imperativo discursivo de apelación. «Mira» suena natural en español y conserva la inmediatez de la súplica de Moisés.
- source_word: הַעַל
  english_pob_choice: Bring up
  chosen_spanish: Haz subir
  alternatives_spanish:
  - Saca
  - Lleva arriba
  - Conduce
  lexicon: HALOT
  rationale: El hifil de עלה expresa causar que alguien suba o ascienda. «Haz subir» conserva el valor causativo y la dirección del verbo sin perder naturalidad en español.
- source_word: הָעָם הַזֶּה
  english_pob_choice: this people
  chosen_spanish: este pueblo
  alternatives_spanish:
  - este pueblo de aquí
  - estas gentes
  lexicon: HALOT
  rationale: «Pueblo» refleja bien el sustantivo colectivo hebreo. El demostrativo singular «este» preserva el tono del hebreo y la deixis del hablante.
- source_word: הוֹדַעְתַּנִי
  english_pob_choice: have not made known to me
  chosen_spanish: no me has hecho saber
  alternatives_spanish:
  - no me has dado a conocer
  - no me has informado
  lexicon: HALOT
  rationale: 'El hifil de ידע tiene fuerza causativa: hacer saber / dar a conocer. «Has hecho saber» conserva esa causatividad mejor que un simple «has dicho».'
- source_word: אֵת אֲשֶׁר תִּשְׁלַח עִמִּי
  english_pob_choice: whom you will send with me
  chosen_spanish: a quién enviarás conmigo
  alternatives_spanish:
  - a quien mandarás conmigo
  - quién será el que envíes conmigo
  lexicon: HALOT
  rationale: La construcción hebrea apunta a una persona que acompañará a Moisés. En español, «a quién enviarás conmigo» preserva el carácter personal y la relación de acompañamiento; se evita «qué», que despersonificaría el referente.
- source_word: יְדַעְתִּיךָ בְשֵׁם
  english_pob_choice: I know you by name
  chosen_spanish: Yo te conozco por nombre
  alternatives_spanish:
  - Yo te conozco personalmente
  - Te conozco por tu nombre
  lexicon: HALOT
  rationale: La frase es un idiomá hebreo de conocimiento personal y favorable. «Por nombre» mantiene el contacto con la imagen del original; se conserva el valor relacional sin expandirlo a una paráfrasis doctrinal.
- source_word: מָצָאתָ חֵן בְּעֵינָי
  english_pob_choice: you also have found favor in my sight
  chosen_spanish: también has hallado gracia ante mis ojos
  alternatives_spanish:
  - también has hallado favor ante mis ojos
  - también has encontrado gracia en mi presencia
  lexicon: HALOT
  rationale: חֵן puede ser «gracia» o «favor». Dado el lenguaje bíblico y la traducción del proyecto, «gracia» es una opción válida y fiel; «ante mis ojos» reproduce literalmente la imagen hebrea de valoración personal.
- source_word: וְגַם
  english_pob_choice: and you also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - además
  lexicon: HALOT
  rationale: El adverbio intensifica y añade énfasis. En español, «también» conserva esa adición sin redundancia excesiva.
- source_word: וְאַתָּה ... לֹא ... וְאַתָּה אָמַרְתָּ
  english_pob_choice: but you ... Yet you have said
  chosen_spanish: pero ... Y tú has dicho
  alternatives_spanish:
  - mas ... y tú has dicho
  - pero ... sin embargo tú has dicho
  lexicon: HALOT
  rationale: La repetición enfática del pronombre se transmite con la estructura contrastiva del español. «Pero» y luego «Y tú has dicho» conservan la oposición y el énfasis sin recargar la sintaxis.
theological_decisions:
- issue: Tratamiento del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre propio del Dios del pacto, conforme al principio del proyecto de no enmascarar el Tetragrámaton. «Yahvé» es la forma española adoptada para esta transliteración.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de יְדַעְתִּיךָ בְשֵׁם
  english_pob_reading: I know you by name
  chosen_spanish_reading: Yo te conozco por nombre
  alternative_spanish_readings:
  - Yo te conozco personalmente
  - Te conozco por tu nombre
  rationale: La expresión se mantiene como idiomá de conocimiento personal y favorable, sin convertirla en una afirmación doctrinal más amplia de lo que el hebreo dice. Se respeta así la tensión entre literalidad e implicación relacional.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Traducción de חֵן
  english_pob_reading: favor
  chosen_spanish_reading: gracia
  alternative_spanish_readings:
  - favor
  - benevolencia
  rationale: «Gracia» preserva una lectura bíblica tradicional y abierta del término, sin excluir el matiz de favor. En este contexto, el hebreo puede abarcar gracia/favor, y la traducción mantiene esa amplitud.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: 'Se revisó el texto inglés auditado y no se detectaron cambios posteriores: latest_revision_pass indica unchanged=true y applied_revisions=[]; el cotejo posterior también reporta alta concordancia con observaciones menores, sin necesidad de alterar la lectura base.'
  spanish_consistency_notes:
  - Se conserva Yahvé como forma del nombre divino, conforme al estándar del proyecto.
  - Se evita el calco de «SEÑOR» y se mantiene el tono reverente sin ocultar el nombre propio.
  - «Gracia» se usa para חֵן en consonancia con la tradición del proyecto, pero la nota deja abierta la alternativa «favor».
  - La pregunta indirecta se resuelve en español con «a quién» para reflejar mejor el referente personal del hebreo.
  - La repetición enfática de «y tú» se atenúa ligeramente para fluidez, sin perder el contraste del original.
