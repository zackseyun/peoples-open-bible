  - marker: b
    text: La sintaxis hebrea es compacta y también puede entenderse como una prohibición de pago relacionado con su permanencia en la ciudad de refugio o con su regreso de ella antes de que muera el sacerdote.
    reason: alternative_reading
  revision_rationale: Se ajusta solo la cláusula temporal de «hasta la muerte del sacerdote» a «antes de la muerte del sacerdote» para reflejar con mayor precisión la decisión exegética auditada y evitar una ambigüedad innecesaria en español. Se afina además la nota alternativa para expresar mejor el alcance de la sintaxis compacta del hebreo.
