revisions:
- from: Y no volveré a quitar el pie de Israel de sobre la tierra que establecí para sus padres[a], con tal de que cuiden de hacer todo lo que les mandé[b], conforme a toda la ley, los estatutos y los juicios por mano de Moisés.
  to: Y no volveré a quitar el pie de Israel de sobre la tierra que designé para sus padres[a], con tal de que cuiden de hacer todo lo que les mandé, conforme a toda la ley, los estatutos y los juicios dados por medio de Moisés[b].
  rationale: La revisión conserva las decisiones fuertes del borrador —«el pie de Israel», la condición real y la tríada legal— pero ajusta dos puntos para una mejor fidelidad a la evidencia y a la auditoría POB. «Designé» refleja mejor la asignación de la tierra a los padres. «Dados por medio de Moisés» comunica claramente la mediación de בְּיַד מֹשֶׁה en español natural, mientras que la forma literal se preserva en nota.
