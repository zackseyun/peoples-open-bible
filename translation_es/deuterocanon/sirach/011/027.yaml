review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el hebreo base y preserva la divergencia textual con el griego en nota. Sin embargo, se aparta innecesariamente del audit trail inglés en גּוֹרָל al traducir 'la porción' en vez de un equivalente más cercano a 'the lot', y la nota textual omite el contenido concreto del paralelo griego que el inglés sí documenta.
  spanish_quality_summary: El español es claro y digno, pero 'la porción' atenúa la metáfora concreta de asignación/suerte presente en גורל. 'La suerte' suena más fiel aquí y sigue siendo natural en español bíblico-sapiencial. El resto del verso fluye bien. Las notas son legibles, pero conviene alinearlas más estrechamente con la información preservada por el POB inglés.
  glossary_alignment: No hay conflicto con los términos teológicos principales del proyecto. 'Dios', 'justos', 'esperanza' y 'florecerá' están bien. La principal desalineación léxica es גורל, para el cual el audit trail favorece 'lot'; en español, 'la suerte' preserva mejor esa imagen que 'la porción'.
  issues:
  - severity: medium
    issue: גּוֹרָל se tradujo como 'la porción'
    rationale: Aunque 'porción' es posible, el audit trail inglés justifica 'the lot' para conservar la metáfora concreta de lo asignado por sorteo o asignación divina. 'La suerte' refleja mejor esa fuerza sin sobreinterpretar como 'destino'.
  - severity: medium
    issue: La nota textual sobre la variante griega es demasiado general
    rationale: El POB inglés conserva el contenido de la lectura griega divergente. La nota española debería mencionar esa lectura concreta para preservar la trazabilidad textual, no solo afirmar en abstracto que es diferente.
  - severity: low
    issue: La nota b puede expresar mejor la alternativa
    rationale: 'Decir solo ''También puede leerse: “su esperanza”'' resulta algo impreciso, porque esa frase ya está en el texto. Conviene aclarar que la alternativa es entender ''florecerá'' con ''su esperanza'': ''su esperanza florecerá''.'
  revised_spanish_text: La bendición de Dios es la suerte de los justos[a], y en el tiempo de su esperanza[b] florecerá.
  revised_footnotes:
  - marker: a
    text: 'Hebreo: ''La bendición de Dios es la suerte de los justos, y en el tiempo de su esperanza florecerá''. El paralelo griego dice algo muy diferente: ''Una hora mala trae olvido del lujo, y en el fin de un hombre hay revelación de sus obras''. Esto sugiere una tradición textual divergente para este versículo.'
    reason: textual_variant
  - marker: b
    text: O 'su esperanza florecerá'. El verbo hebreo puede entenderse con 'la bendición' o con 'su esperanza' como su referente.
    reason: lexical_alternative
  revision_rationale: Se ajusta גּוֹרָל a 'la suerte' para reflejar mejor la imagen concreta documentada en el audit trail inglés, y se fortalecen las notas para conservar la variante griega específica y la ambigüedad del referente de 'florecerá'. No se requiere una reescritura mayor del verso.
