base_translation:
  language: en
  yaml_path: translation/deuterocanon/prayer_of_azariah/001/017.yaml
  text: As with whole burnt offerings of rams and bulls[a], and as with tens of thousands of fat lambs, so let our sacrifice be before you today and make atonement before you, for there is no shame for those who have put their trust in you[b], and let it be brought to completion before you.
  footnotes:
