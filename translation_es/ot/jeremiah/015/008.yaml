  spanish_quality_summary: 'El español es generalmente claro y digno, pero hay dos tropiezos importantes de legibilidad/fidelidad: ''contra ellas'' contradice el plural masculino del hebreo y desordena la escena, y ''he hecho caer sobre ella ciudad y terrores'' suena demasiado abrupto en español. ''Han llegado a ser más numerosas'' funciona, aunque ''se han multiplicado'' sería más idiomático; no es imprescindible cambiarlo.'
