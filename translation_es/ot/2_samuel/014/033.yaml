translation:
  language: es
  text: Entonces Joab vino al rey y le informó; y llamó a Absalón[a]. Él vino al rey y se postró con el rostro en tierra delante del rey[b], y el rey besó a Absalón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mandó llamar a Absalón».'
    reason: lexical_alternative
  - marker: b
    text: El beso del rey probablemente señala reconciliación o favor restaurado, aunque el texto solo dice que lo besó.
    reason: theological_note
lexical_decisions:
- source_word: וַיָּבֹא
  english_pob_choice: came
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: HALOT
  rationale: En esta secuencia narrativa, בוא expresa movimiento hacia el rey. «Fue» conserva la direccionalidad en español sin forzar una repetición innecesaria de «vino» en la misma frase.
- source_word: וַיַּגֶּד לוֹ
  english_pob_choice: told him
  chosen_spanish: le informó
  alternatives_spanish:
  - le contó
  - le dijo
  lexicon: HALOT
  rationale: נגד en hifil puede significar informar o comunicar. «Le informó» mantiene el sentido de reporte formal en un contexto de corte, y evita un coloquialismo excesivo.
- source_word: וַיִּקְרָא אֶל אַבְשָׁלוֹם
  english_pob_choice: he called for Absalom
  chosen_spanish: llamó a Absalón
  alternatives_spanish:
  - mandó llamar a Absalón
  - lo convocó
  lexicon: HALOT
  rationale: קרא אל en este contexto real implica hacer venir a alguien a la presencia del rey. «Llamó a Absalón» reproduce el idioma de forma natural en español; «mandó llamar» sería una expansión interpretativa más explícita.
- source_word: וַיִּשְׁתַּחוּ לוֹ
  english_pob_choice: bowed himself
  chosen_spanish: se postró
  alternatives_spanish:
  - se inclinó
  - se prosternó
  lexicon: HALOT
  rationale: El verbo expresa una reverencia corporal profunda. «Se postró» comunica bien la acción en español bíblico actual y mantiene la intensidad del gesto.
- source_word: עַל אַפָּיו אַרצה
  english_pob_choice: with his face to the ground
  chosen_spanish: con el rostro en tierra
  alternatives_spanish:
  - con la cara en tierra
  - con el rostro hacia el suelo
  lexicon: HALOT
  rationale: La expresión hebrea describe la postura completa de humillación. «Con el rostro en tierra» es idiomática, clara y fiel al sentido corporal del original.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - en presencia del rey
  lexicon: HALOT
  rationale: «Delante del rey» conserva la escena de audiencia y suena natural en español; «en presencia del rey» es igualmente posible, pero algo más formal.
- source_word: וַיִּשַּׁק הַמֶּלֶךְ לְאַבְשָׁלוֹם
  english_pob_choice: the king kissed Absalom
  chosen_spanish: el rey besó a Absalón
  alternatives_spanish:
  - el rey le dio un beso a Absalón
  lexicon: HALOT
  rationale: נשק se traduce literalmente por «besó». Se conserva la ambigüedad narrativa del gesto sin explicitar en el texto principal su valor relacional.
theological_decisions:
- issue: Significado del beso del rey
  english_pob_reading: Render literally as an act of kissing without specifying more than the text states.
  chosen_spanish_reading: Traducir literalmente el beso del rey sin precisar en el cuerpo del texto si implica reconciliación o restauración de favor.
  alternative_spanish_readings:
  - el rey lo recibió con un beso de reconciliación
  - el rey le dio un beso en señal de favor restaurado
  rationale: 'El hebreo afirma solo la acción: el rey besó a Absalón. Aunque el gesto probablemente comunica reconciliación, la traducción principal preserva la tensión interpretativa y no añade una interpretación que el texto no formula explícitamente.'
  doctrine_reference: Preservar la tensión interpretativa del relato sin resolverla en la traducción principal.
translation_notes:
  revision_awareness: El texto sigue de cerca el consenso del audit trail inglés y conserva la decisión clave de no explicitar en el cuerpo principal el valor teológico del beso real. Se ajustó la sintaxis al español natural, manteniendo la progresión narrativa y la ambigüedad significativa del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma proyectada del tetragrama cuando corresponda en otros pasajes del proyecto, aunque este versículo no lo contiene.
  - Se mantiene «Absalón» y «Joab» según la transliteración habitual en español bíblico.
  - No se emplea «SEÑOR» como sustituto del nombre divino en este versículo porque no aparece el tetragrama.
  - «Se postró» y «con el rostro en tierra» separan el gesto general de la postura específica, reflejando la duplicación hebrea de reverencia y abatimiento.
