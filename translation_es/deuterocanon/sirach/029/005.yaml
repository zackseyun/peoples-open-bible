  to: Hasta que lo reciba, besará su mano, y por el dinero de su prójimo bajará la voz[a]; pero en el tiempo del pago dará largas, y devolverá[b] palabras de indiferencia y culpará al momento.
  rationale: Se movió la nota [a] al lugar correcto y se sustituyó «humillará la voz» por «bajará la voz» en el texto principal para mantener el sentido con español natural. Se reemplazó «retrasará el tiempo» por «dará largas», que comunica la dilación del pago de manera idiomática. La nota [b] se reancló en «devolverá», donde realmente está la ironía de ἀποδώσει. También se suavizó la frase final a «culpará al momento» para mejor legibilidad sin perder el sentido.
