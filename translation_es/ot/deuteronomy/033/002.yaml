translation:
  language: es
  text: 'Y dijo: «Yahvé vino desde Sinaí y amaneció desde Seir sobre ellos; resplandeció desde el monte Parán, y vino de miríadas de santos[a]; desde su mano derecha salieron rayos de fuego para ellos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de miríadas de santidad». El hebreo puede referirse a acompañantes santos, no a una abstracción de santidad.'
    reason: alternative_reading
  - marker: b
    text: Hebreo oscuro; tradicionalmente se ha entendido como «una ley de fuego», pero también puede aludir a fulgores, rayos o fuego que procede de su mano derecha.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre propio divino en forma transliterada, siguiendo el criterio POB de no sustituir el Tetragrámaton por un título. En español, «Yahvé» es la forma más clara y reverente para lectores eclesiales amplios.
- source_word: מִ/סִּינַ֥י בָּא֙
  english_pob_choice: came from Sinai
  chosen_spanish: vino desde Sinaí
  alternatives_spanish:
  - llegó desde Sinaí
  - vino de Sinaí
  lexicon: HALOT
  rationale: «בוא» en este contexto expresa llegada/aparición divina. «Vino desde Sinaí» conserva el movimiento de procedencia y la sencillez poética del hebreo.
- source_word: וְ/זָרַ֤ח מִ/שֵּׂעִיר֙ לָ֔/מוֹ
  english_pob_choice: and dawned from Seir upon them
  chosen_spanish: y amaneció desde Seir sobre ellos
  alternatives_spanish:
  - y resplandeció desde Seir sobre ellos
  - y salió como luz desde Seir sobre ellos
  lexicon: HALOT
  rationale: «זרח» conserva la imagen de luz/día naciente. «Amaneció» transmite la metáfora poética mejor que un simple «apareció» y mantiene el paralelismo con la siguiente cláusula.
- source_word: הוֹפִ֨יעַ֙
  english_pob_choice: he shone forth
  chosen_spanish: resplandeció
  alternatives_spanish:
  - brilló
  - se manifestó con resplandor
  lexicon: HALOT
  rationale: El hifil de יפע comunica aparición radiante. «Resplandeció» preserva el matiz luminoso y evita una traducción demasiado abstracta.
- source_word: מֵ/הַ֣ר פָּארָ֔ן
  english_pob_choice: from Mount Paran
  chosen_spanish: desde el monte Parán
  alternatives_spanish:
  - desde el monte de Parán
  - desde Parán
  lexicon: HALOT
  rationale: La construcción con הר se vierte naturalmente como «monte». «Parán» se conserva como nombre propio geográfico tradicional y transparente.
- source_word: וְ/אָתָ֖ה
  english_pob_choice: and came
  chosen_spanish: y vino
  alternatives_spanish:
  - y llegó
  - y avanzó
  lexicon: HALOT
  rationale: El verbo expresa venir/aproximarse. «Y vino» mantiene el ritmo de los verbos de teofanía sin sobreinterpretar el movimiento.
- source_word: מֵ/רִבְבֹ֣ת קֹ֑דֶשׁ
  english_pob_choice: from myriads of holy ones
  chosen_spanish: de entre miríadas de seres santos
  alternatives_spanish:
  - de miríadas de santos
  - de miríadas de seres sagrados
  - de miríadas de santidad
  lexicon: HALOT
  rationale: El hebreo es ambiguo entre «santidad» y «seres santos». En español, «seres santos» conserva la posibilidad de un cortejo celestial sin fijar indebidamente la frase como una abstracción.
- source_word: מִֽ/ימִינ֕/וֹ
  english_pob_choice: from his right hand
  chosen_spanish: desde su mano derecha
  alternatives_spanish:
  - de su mano derecha
  - a su mano derecha
  lexicon: HALOT
  rationale: La preposición מִן pide un valor de procedencia. «Desde su mano derecha» encaja con la imagen de algo que procede de Yahvé.
- source_word: אשדת
  english_pob_choice: fiery bolts
  chosen_spanish: fulgores ígneos
  alternatives_spanish:
  - fulgores de fuego
  - rayos ígneos
  - llamas ígneas
  lexicon: HALOT
  rationale: La forma es oscura y el POB inglés reciente optó por una solución no tradicional para no imponer «ley» en el texto principal. En español, «fulgores ígneos» conserva el campo semántico de fuego/luz y la incertidumbre léxica sin forzar una equivalencia doctrinal.
- source_word: לָֽ/מוֹ
  english_pob_choice: for them
  chosen_spanish: para ellos
  alternatives_spanish:
  - a ellos
  - sobre ellos
  lexicon: HALOT
  rationale: El pronombre plural se expresa de modo natural con «para ellos», acorde con la idea de beneficio o destino de la acción divina en el verso.
theological_decisions:
- issue: Identidad del sujeto divino en la teofanía poética
  english_pob_reading: Render the subject as the covenant God, 'the LORD,' without importing later christological interpretation into the translation.
  chosen_spanish_reading: Nombrar al sujeto como Yahvé, sin cristologizar el pasaje ni sustituir el nombre por un título.
  alternative_spanish_readings:
  - el SEÑOR
  - el Señor
  rationale: El texto describe la venida teofánica de Yahvé en el contexto mosaico. La traducción debe conservar ese marco veterotestamentario y el nombre divino revelado a Israel.
  doctrine_reference: Affirmations; Translation philosophy items 1 and 3
- issue: Interpretación de מֵרִבְבֹת קֹדֶשׁ
  english_pob_reading: Keep an ambiguous main-text rendering ('myriads of holiness') and preserve 'myriads of holy ones' in a footnote.
  chosen_spanish_reading: Mantener una formulación principal ambigua y documentar la lectura de «seres santos» en nota.
  alternative_spanish_readings:
  - de miríadas de santos
  - de miríadas de santidad
  rationale: El hebreo permite más de una construcción. En español conviene no cerrar el sentido en el cuerpo principal, porque la ambigüedad afecta si se alude a un cortejo celestial o a otra idea.
  doctrine_reference: Translation philosophy item 3
- issue: Interpretación de אשדת
  english_pob_reading: Use 'a fiery law' in the main text, with a footnote noting lexical uncertainty.
  chosen_spanish_reading: Usar una expresión que comunique fuego y resplandor sin resolver de forma dogmática el lexema oscuro.
  alternative_spanish_readings:
  - ley ígnea
  - ley de fuego
  - rayos de fuego
  rationale: La forma hebrea es incierta y la tradición interpretativa varía. La redacción española debe conservar la dificultad visible y evitar imponer una lectura demasiado específica.
  doctrine_reference: Translation philosophy items 1, 3, and 5
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés, que ajustó dos puntos: la frase ambigua de קֹדֶשׁ hacia «holy ones» y el término oscuro אשדת lejos de «a fiery law» en el texto principal. La versión española sigue esa sensibilidad: mantiene la ambigüedad de la expresión celestial en el cuerpo principal y documenta la incertidumbre léxica de אשדת en nota, evitando una resolución dogmática.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma constante del Tetragrámaton.
  - 'Se conserva el paralelismo poético con verbos de movimiento y resplandor: vino/amaneció/resplandeció/vino.'
  - «Monte Parán» se mantiene como topónimo convencional y claro.
  - «Seres santos» traduce de modo amplio la posible referencia a seres celestiales, sin perder la opción de una lectura abstracta.
  - La nota de אשדת evita el calco tradicional «ley» porque el inglés POB revisado señaló una solución más cauta y el español debe preservar esa cautela.
