id: MAT.15.6
reference: Matthew 15:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: ⸀οὐ μὴ ⸀τιμήσει τὸν πατέρα ⸀αὐτοῦ· καὶ ἠκυρώσατε ⸂τὸν λόγον⸃ τοῦ θεοῦ διὰ τὴν παράδοσιν ὑμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/matthew/015/006.yaml
  text: 'he certainly need not honor his father[b][a]. And you have nullified the word of God for the sake of your tradition.'
translation:
  language: ko
  text: '그는 결코 자기 아버지를 공경하지 않아도 된다[a][b]. 그렇게 너희는 너희의 전통 때문에 하나님의 말씀을 폐했다.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 어떤 사본은 「하나님의 말씀」 대신 「하나님의 계명」으로 읽는다.
    reason: textual_variant
  - marker: b
    text: 여기서 「공경」은 단순한 존경뿐 아니라 부모를 실제로 부양해야 할 의무까지 포함할 가능성이 크다.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μὴ ... τιμήσει
  english_pob_choice: certainly need not honor
  chosen_korean: 결코 ... 공경하지 않아도 된다
  alternatives_korean:
  - 반드시 ... 공경할 필요가 없다
  lexicon: BDAG
  rationale: 강조형 부정 οὐ μή가 여기서는 예언적 미래가 아니라 의무 면제의 함의를 가진다. 「공경하지 않아도 된다」로 그 면제 효과를 자연스럽게 살린다.
- source_word: ἠκυρώσατε
  english_pob_choice: have nullified
  chosen_korean: 폐했다
  alternatives_korean:
  - 무효로 만들었다
  - 헛되게 했다
  lexicon: BDAG
  rationale: ἀκυρόω는 권위·효력을 무효화한다는 뜻. 「폐하다」는 한국 성경 전통에서 정착된 강한 어휘이다.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_korean: 하나님의 말씀
  alternatives_korean:
  - 하나님의 계명
  lexicon: BDAG
  rationale: SBLGNT 독법은 「말씀(λόγον)」이다. 잘 알려진 사본 변이 「계명(ἐντολήν)」은 각주로 보존한다.
