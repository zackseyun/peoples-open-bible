revisions:
- from: 'Y he aquí[a], un profeta se acercó a Ahab, rey de Israel, y dijo: «Así dice Yahvé: ¿Has visto toda esta gran multitud? He aquí, yo la entrego hoy en tu mano, y sabrás que yo soy Yahvé».'
  to: 'Y he aquí, cierto profeta se acercó a Ahab, rey de Israel, y dijo: «Así dice Yahvé: ¿Has visto toda esta gran multitud[a]? He aquí, yo la entrego hoy en tu mano, y sabrás que yo soy Yahvé».'
  rationale: Se ajusta «un profeta» a «cierto profeta» para reflejar mejor la función introductoria e indefinida de נָבִיא אֶחָד. Se elimina la nota sobre «he aquí» y se reemplaza por una nota léxica en «multitud», que conserva la alternativa significativa documentada para הֶהָמוֹן en contexto militar. El resto del texto se mantiene porque es fiel, claro y alineado con la terminología del proyecto.
