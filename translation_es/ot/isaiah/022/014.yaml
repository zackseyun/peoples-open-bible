base_translation:
  language: en
  yaml_path: translation/ot/isaiah/022/014.yaml
  text: 'And Yahweh of Armies has revealed in my ears: “Surely this iniquity will not be atoned for until you die,” says the Lord GOD of Armies[a][b].'
  footnotes:
  - marker: a
    text: 'Hebrew oath formula: literally, ''if this iniquity will be atoned for you,'' an idiom expressing emphatic denial: ''surely it will not be atoned for.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'the LORD of Hosts' / 'the Lord GOD of Hosts.'
    reason: lexical_alternative
