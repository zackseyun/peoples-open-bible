translation:
  language: es
  text: Y el rey les asignó una porción diaria[a] de la comida del rey y del vino que él bebía, y para criarlos durante tres años; y al final de ese tiempo[b] habrían de estar delante del rey[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de los manjares del rey» o «de la comida rica del rey». El hebreo se refiere a provisiones de la mesa real y puede implicar alimento de lujo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «al final de ellos», refiriéndose al final de los tres años.
    reason: lexical_alternative
  - marker: c
    text: «Estar delante del rey» es una expresión de corte que puede significar aparecer para servicio o asistencia real.
    reason: cultural_note
lexical_decisions:
- source_word: וַיְמַן
  english_pob_choice: assigned
  chosen_spanish: les asignó
  alternatives_spanish:
  - les nombró
  - les designó
  - les adjudicó
  lexicon: HALOT
  rationale: El verbo expresa una acción administrativa de fijar u otorgar una provisión para alguien. «Les asignó» comunica bien ese sentido en español y conserva el matiz de disposición oficial.
- source_word: דְּבַר י֣וֹם בְּ/יוֹמ֗/וֹ
  english_pob_choice: a daily portion
  chosen_spanish: una porción diaria
  alternatives_spanish:
  - una ración diaria
  - la porción de cada día
  - diariamente
  lexicon: HALOT
  rationale: La expresión hebrea señala una asignación fija para cada día. «Una porción diaria» mantiene la idea concreta de una ración establecida sin perder naturalidad en español.
- source_word: מִ/פַּת בַּג הַ/מֶּ֨לֶךְ
  english_pob_choice: from the king’s food
  chosen_spanish: de la comida del rey
  alternatives_spanish:
  - de los manjares del rey
  - de la mesa del rey
  - de la comida real
  lexicon: HALOT
  rationale: El hebreo se refiere a provisiones de la mesa real. «Comida del rey» es sobria y fiel; evita sobrecargar el texto con una interpretación más lujosa, aunque esa posibilidad queda reflejada en la nota.
- source_word: וּ/מִ/יֵּ֣ין מִשְׁתָּ֔י/ו
  english_pob_choice: from the wine he drank
  chosen_spanish: del vino que él bebía
  alternatives_spanish:
  - del vino de su beber
  - del vino del rey
  - del vino de sus banquetes
  lexicon: HALOT
  rationale: La construcción alude al vino asociado con la bebida del rey. «Que él bebía» preserva la referencia personal y resulta idiomática en español.
- source_word: וּֽ/לְ/גַדְּלָ֖/ם
  english_pob_choice: to bring them up
  chosen_spanish: para criarlos
  alternatives_spanish:
  - para educarlos
  - para nutrirlos
  - para hacerlos crecer
  lexicon: HALOT
  rationale: גדל aquí tiene el sentido de hacerlos crecer, criarlos hasta la madurez, no solo alimentarlos. «Criarlos» recoge bien esa idea de formación y cuidado continuados en un registro natural.
- source_word: שָׁנִ֣ים שָׁל֑וֹשׁ
  english_pob_choice: for three years
  chosen_spanish: durante tres años
  alternatives_spanish:
  - por tres años
  - tres años
  lexicon: HALOT
  rationale: Es una duración temporal directa; «durante tres años» es claro y fiel.
- source_word: וּ/מִ֨/קְצָתָ֔/ם
  english_pob_choice: at the end of them
  chosen_spanish: al final de ellos
  alternatives_spanish:
  - al cabo de ellos
  - al término de ese tiempo
  - al final de ese período
  lexicon: HALOT
  rationale: La frase literal apunta al final del período de tres años. «Al final de ellos» conserva la referencia pronominal del hebreo, y la nota aclara la lectura idiomática.
- source_word: יַֽעַמְד֖וּ לִ/פְנֵ֥י הַ/מֶּֽלֶךְ
  english_pob_choice: they were to stand before the king
  chosen_spanish: habrían de estar delante del rey
  alternatives_spanish:
  - habrían de servir ante el rey
  - habrían de presentarse ante el rey
  - deberían estar en presencia del rey
  lexicon: HALOT
  rationale: La expresión es una fórmula cortesana que puede implicar servicio o asistencia en la corte. «Estar delante del rey» preserva el giro semítico y deja abierta la fuerza idiomática documentada por la POB en inglés.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «to bring them up» en lugar de «raise them» por ser una forma más natural y formal de expresar el sentido de גדל. También conserva la estructura concesiva/administrativa del versículo y la nota sobre el final del período.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se eligió «delante del rey» en vez de una paráfrasis de servicio para preservar la expresión cortesana señalada por la auditoría inglesa.
  - Se evitó «SEÑOR» y también «Cristo», pues no corresponden al contenido del versículo.
  - «Comida del rey» se dejó sin intensificar como «manjares» en el texto principal para no sobreinterpretar; la alternativa queda en nota.
  - Se usó «habrían de estar» para reflejar el valor de obligación/futuro contextual sin volverlo excesivamente moderno ni demasiado rígido.
