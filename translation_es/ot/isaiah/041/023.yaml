translation:
  language: es
  text: Declaren las cosas que vendrán después[a], para que sepamos que ustedes son dioses; sí, hagan bien o hagan mal[b], para que quedemos desconcertados[c] y veamos juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cosas posteriores». La expresión hebrea se refiere a lo que viene después y aquí funciona como reto para predecir el futuro.
    reason: lexical_alternative
  - marker: b
    text: O «hagan bien y hagan mal». El sentido es un desafío a mostrar algún poder real, sea para beneficio o para daño.
    reason: lexical_alternative
  - marker: c
    text: El verbo traducido «quedemos desconcertados» es raro y también puede tener el sentido de «miremos con asombro» o «miremos alrededor con alarma».
    reason: lexical_alternative
lexical_decisions:
- source_word: הַגִּידוּ
  english_pob_choice: Declare
  chosen_spanish: Declaren
  alternatives_spanish:
  - Digan
  - Anuncien
  lexicon: HALOT
  rationale: El imperativo plural pide una proclamación pública y desafiante. «Declaren» conserva mejor el tono formal de reto que «digan».
- source_word: הָאֹתִיּוֹת לְאָחוֹר
  english_pob_choice: the things to come afterward
  chosen_spanish: las cosas que vendrán después
  alternatives_spanish:
  - las cosas posteriores
  - las cosas del porvenir
  lexicon: HALOT
  rationale: La expresión apunta a lo que viene más tarde, en contexto como desafío a predecir el futuro. «Las cosas que vendrán después» mantiene ese valor temporal con claridad natural en español.
- source_word: וְנֵדְעָה
  english_pob_choice: that we may know
  chosen_spanish: para que sepamos
  alternatives_spanish:
  - y sabremos
  - y podamos saber
  lexicon: HALOT
  rationale: 'El cohortativo expresa finalidad o resultado: si anuncian el futuro, entonces podremos saber. «Para que sepamos» reproduce bien esa fuerza.'
- source_word: כִּי אֱלֹהִים אַתֶּם
  english_pob_choice: that you are gods
  chosen_spanish: que ustedes son dioses
  alternatives_spanish:
  - que ustedes son seres divinos
  - que ustedes son Dios
  lexicon: HALOT
  rationale: El plural dirigido a los ídolos exige «dioses», no «Dios». «Ustedes» mantiene el segundo plural y el matiz polémico del original.
- source_word: אַף
  english_pob_choice: indeed
  chosen_spanish: sí
  alternatives_spanish:
  - de hecho
  - en verdad
  lexicon: HALOT
  rationale: La partícula añade énfasis al reto. «Sí» funciona como intensificador breve y natural en español bíblico moderno.
- source_word: תֵּיטִיבוּ וְתָרֵעוּ
  english_pob_choice: do good or do harm
  chosen_spanish: hagan bien o hagan mal
  alternatives_spanish:
  - hagan bien o hagan daño
  - hagan el bien o el mal
  lexicon: HALOT
  rationale: La pareja verbal forma un merismo de poder eficaz, no una exhortación moral. «Hagan bien o hagan mal» conserva el contraste y su fuerza desafiante sin suavizarla.
- source_word: וְנִשְׁתָּעָה
  english_pob_choice: that we may be dismayed
  chosen_spanish: para que quedemos asombrados
  alternatives_spanish:
  - para que nos aterremos
  - para que nos alarmemos
  lexicon: HALOT
  rationale: La forma es rara y puede llevar la idea de sobresalto, alarma o asombro. En español, «quedemos asombrados» transmite la reacción ante una demostración de poder sin exagerar con un matiz que el contexto no obliga a fijar exclusivamente.
- source_word: וְנִרְאֶה
  english_pob_choice: and see
  chosen_spanish: y veamos
  alternatives_spanish:
  - y veamos esto
  - y veamos juntos
  lexicon: HALOT
  rationale: El verbo es simplemente «ver» en primera plural. Se conserva sin objeto explícito, conforme a la revisión inglesa que retiró «it» por no estar en el hebreo.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: juntos
  alternatives_spanish:
  - a la vez
  - en conjunto
  lexicon: HALOT
  rationale: Adverbio de colectividad. «Juntos» es la opción más natural y directa en español.
theological_decisions:
- issue: Traducción de אֱלֹהִים en una polémica contra los ídolos
  english_pob_reading: that you are gods
  chosen_spanish_reading: que ustedes son dioses
  alternative_spanish_readings:
  - que ustedes son Dios
  - que ustedes son seres divinos
  rationale: El contexto ridiculiza a los ídolos mediante un reto público. El plural «dioses» conserva la ironía y evita imponer un singular teológico ajeno al pasaje.
  doctrine_reference: Monoteísmo bíblico; crítica profética a la idolatría
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del audit trail inglés al omitir cualquier objeto explícito tras «ver», porque el hebreo no lo expresa. También mantiene el valor desafiante de la serie verbal sin introducir una frase explicativa adicional que exceda el original.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se mantuvo «dioses» para אֱלֹהִים conforme al uso polémico plural del texto.
  - No se añadió objeto a «ver», en consonancia con la revisión auditada del inglés y el hebreo.
  - «Hagan bien o hagan mal» preserva el merismo de poder, no una evaluación moral de los actos.
