    issue: Anclaje incorrecto de la nota al pie
    rationale: La nota explica הַשֹּׁאֲבֹת ('las mujeres que sacan agua'), pero el marcador [a] está colocado en 'a la hora de la tarde', donde no corresponde semánticamente.
  - severity: low
    issue: '''Se arrodillaran'' suena menos natural para camellos en español'
    rationale: Aunque no es falso, en español aplicado a animales de carga resulta más idiomático expresar que el siervo hizo que los camellos se echaran o los hizo arrodillar. La redacción actual es entendible pero algo tiesa.
  revised_spanish_text: E hizo que los camellos se echaran fuera de la ciudad, junto al pozo de agua, a la hora de la tarde, a la hora en que salen las mujeres[a] a sacar agua.
