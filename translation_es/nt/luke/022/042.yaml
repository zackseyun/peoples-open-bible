review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: vocativo «Padre», condición «si quieres», preservación de la metáfora «copa» y sumisión final a la voluntad del Padre. Sin embargo, la colocación de «se haga» en «no se haga mi voluntad, sino la tuya» introduce una asimetría no ideal respecto al griego nominal «no mi voluntad, sino la tuya» completado por γινέσθω al final; en español es más fiel y claro «pero no mi voluntad,[c] sino la tuya, se haga».'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. «Aparta de mí esta copa» funciona, aunque «quita de mí» sonaría menos idiomático; el texto actual es aceptable. La principal mejora es alinear mejor la segunda cláusula con el orden y contraste del original, y añadir el anclaje correcto para la nota alternativa sobre «no lo que yo quiero…».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Padre», «copa» y «voluntad» están bien. No aplica vocabulario como Yahvé/Mesías aquí. La decisión de mantener «copa» concuerda con la política de conservar la metáfora bíblica.
  issues:
  - severity: medium
    issue: La frase «no se haga mi voluntad, sino la tuya» redistribuye γινέσθω de manera menos fiel al contraste nominal del griego.
    rationale: El griego presenta «no mi voluntad, sino la tuya» y luego «γινέσθω» como verbo que completa la cláusula. En español, «pero no mi voluntad, sino la tuya, se haga» preserva mejor la tensión y la estructura.
  - severity: medium
    issue: La nota alternativa equivalente al inglés c no está anclada en el texto español.
    rationale: El rastro de auditoría inglés conserva la alternativa «not what I will, but what you will». Si se mantiene esa nota en español, debe aparecer con marcador en la frase correspondiente dentro de `spanish_text`.
  - severity: low
    issue: La nota a sobre «mientras decía» no refleja la alternativa inglesa principal «and saying / he said» y suena menos pertinente.
    rationale: 'No es un error grave, pero una nota más directa sobre «o simplemente: “dijo”» encaja mejor con el participio introductorio y evita una perífrasis temporal menos natural en este contexto.'
  revised_spanish_text: 'diciendo[a]: «Padre, si quieres, aparta[b] de mí esta copa. Pero no mi voluntad,[c] sino la tuya, se haga».'
  revised_footnotes:
  - marker: a
    text: 'O simplemente: «dijo». El participio griego introduce el contenido de la oración de Jesús.'
    reason: alternative_reading
  - marker: b
    text: O «quita» o «retira». El verbo griego puede expresarse con distintos matices de apartar o remover.
    reason: lexical_alternative
  - marker: c
    text: O «no lo que yo quiero, sino lo que tú quieres».
    reason: alternative_reading
  - marker: d
    text: La «copa» es una metáfora bíblica de la porción asignada, a menudo de sufrimiento o juicio.
    reason: cross_reference
  revision_rationale: Se revisa para reflejar con mayor fidelidad la estructura griega de la cláusula final, anclar correctamente la nota alternativa sobre la voluntad y conservar un español natural y digno. También se preserva la nota teológica sobre «copa» con marcador único en el lugar correspondiente del texto.
