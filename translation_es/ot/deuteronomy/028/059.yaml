translation:
  language: es
  text: 'entonces Yahvé hará extraordinarias tus plagas y las plagas de tu descendencia: plagas grandes y duraderas[a][b], y enfermedades graves y duraderas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "asombrosas". El hebreo puede significar hacer algo extraordinario o notable; aquí describe el carácter excepcional del juicio.
    reason: lexical_alternative
  - marker: b
    text: '"Duraderas" traduce un término hebreo que expresa firmeza, permanencia o persistencia; el mismo vocablo aparece tanto para las plagas como para las enfermedades.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִפְלָא
  english_pob_choice: will make ... extraordinary
  chosen_spanish: hará extraordinarios
  alternatives_spanish:
  - hará maravillosos
  - hará asombrosos
  - hará severos
  lexicon: HALOT
  rationale: El verbo en hifil de פלא expresa hacer algo extraordinario o sorprendente; en contexto de juicio no conviene un matiz positivo de "maravillosos". "Extraordinarios" conserva la idea de singularidad e intensidad sin suavizar la amenaza.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino. "Yahvé" preserva el nombre propio del Tetragrámaton, en lugar de sustituirlo por un título.
- source_word: מַכֹּתְךָ / מַכּוֹת
  english_pob_choice: your plagues / plagues
  chosen_spanish: tus golpes / los golpes
  alternatives_spanish:
  - tus plagas / las plagas
  - tus azotes / los azotes
  - tus golpes / los golpes
  lexicon: HALOT
  rationale: מכה puede significar golpe, azote o plaga. Para mantener el vínculo semántico con el verbo de herir y evitar una traducción demasiado interpretativa, "golpes" reproduce la fuerza física del término, aunque en un contexto de maldición también alude a aflicciones enviadas por Dios.
- source_word: זַרְעֶךָ
  english_pob_choice: your offspring
  chosen_spanish: tu descendencia
  alternatives_spanish:
  - tu simiente
  - tus descendientes
  - tu linaje
  lexicon: HALOT
  rationale: '"Descendencia" comunica el sentido colectivo de זרע con naturalidad en español actual y evita el arcaísmo de "simiente".'
- source_word: גְּדֹלוֹת
  english_pob_choice: great
  chosen_spanish: grandes
  alternatives_spanish:
  - severos
  - enormes
  - poderosos
  lexicon: HALOT
  rationale: El adjetivo literalmente significa "grandes". En combinación con los sustantivos de juicio, el español natural es "grandes" para mantener la relación formal con el hebreo.
- source_word: נֶאֱמָנוֹת
  english_pob_choice: lasting
  chosen_spanish: duraderos
  alternatives_spanish:
  - persistentes
  - firmes
  - perdurables
  - seguros
  lexicon: HALOT
  rationale: Aquí el sentido es firme, estable, persistente. "Duraderos" expresa que los castigos no son pasajeros y conserva la repetición del mismo valor semántico para ambos usos del término.
- source_word: חֳלָיִם
  english_pob_choice: sicknesses
  chosen_spanish: enfermedades
  alternatives_spanish:
  - dolencias
  - padecimientos
  - sicknesses
  lexicon: HALOT
  rationale: חֳלָיִם se refiere a enfermedades o dolencias. "Enfermedades" es el equivalente más claro y normal en español para un registro bíblico contemporáneo.
- source_word: רָעִים
  english_pob_choice: severe
  chosen_spanish: graves
  alternatives_spanish:
  - malas
  - dañinas
  - severas
  lexicon: HALOT
  rationale: Aunque literalmente significa "malas" o "malvadas", aplicado a enfermedades el sentido es grave, dañino, peligroso. "Graves" comunica el impacto real sin usar un adjetivo moral inapropiado para la enfermedad.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se mantiene la transliteración del nombre divino conforme al criterio del proyecto, preservando la referencia personal al Dios del pacto y evitando la sustitución por un título impersonal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de פלא en contexto de juicio
  english_pob_reading: make ... extraordinary
  chosen_spanish_reading: hará extraordinarios
  alternative_spanish_readings:
  - hará asombrosos
  - hará maravillosos
  rationale: En este contexto la idea no es admiración positiva sino una intervención excepcional de juicio. "Extraordinarios" conserva la intensidad sin añadir un matiz devocional ajeno al pasaje.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: original-language primacy; preserve source sense over tradition'
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y no requirió cambios; esta versión mantiene el sentido auditado del hebreo y la decisión terminológica del nombre divino, con español natural y fiel al paralelismo del texto.
  spanish_consistency_notes:
  - Se conserva Yahvé para el Tetragrámaton, conforme al estándar del proyecto.
  - Se traduce consistentemente נֶאֱמָנוֹת / נֶאֱמָנִים como "duraderos" para reflejar la repetición hebrea.
  - '"Golpes" mantiene la ambigüedad de מכה entre golpe/plaga sin perder la referencia a juicio divino.'
  - 'El paralelismo hebreo se conserva con una estructura de dos miembros: golpes / enfermedades, ambos calificados por magnitud y duración.'
