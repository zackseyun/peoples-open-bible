translation:
  language: es
  text: Los prudentes en palabras también se hicieron sabios, e hicieron llover proverbios exactos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego se relaciona literalmente con la lluvia; la imagen es la de dichos que salen en abundancia, como si llovieran.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνετοὶ
  english_pob_choice: those who are prudent
  chosen_spanish: los prudentes
  alternatives_spanish:
  - los inteligentes
  - los discernidores
  - los sensatos
  lexicon: LSJ
  rationale: El adjetivo expresa entendimiento y discernimiento. «Prudentes» encaja bien en el contexto sapiencial y conserva un matiz de juicio maduro sin perder naturalidad en español.
- source_word: ἐν λόγοις
  english_pob_choice: in words
  chosen_spanish: en palabras
  alternatives_spanish:
  - en el hablar
  - en el discurso
  - con palabras
  lexicon: LSJ
  rationale: λόγοις puede significar «palabras» o «habla». «En palabras» sigue de cerca el griego y mantiene el paralelismo con la producción de proverbios.
- source_word: ἐσοφίσαντο
  english_pob_choice: became wise
  chosen_spanish: se hicieron sabios
  alternatives_spanish:
  - mostraron ser sabios
  - actuaron sabiamente
  - fueron hechos sabios
  lexicon: LSJ
  rationale: 'El aoristo medio es mejor entendido aquí de modo reflexivo/intransitivo: ellos mismos llegaron a ser sabios. «Se hicieron sabios» conserva ese sentido de adquisición o manifestación de sabiduría.'
- source_word: ἀνώμβρησαν
  english_pob_choice: poured forth
  chosen_spanish: derramaron
  alternatives_spanish:
  - llovieron
  - llovieron sobre
  - desataron
  lexicon: LSJ
  rationale: El verbo alude literalmente a la lluvia. En español, «derramaron» comunica con naturalidad la salida abundante de palabras y conserva la imagen de un flujo que cae copiosamente.
- source_word: παροιμίας
  english_pob_choice: proverbs
  chosen_spanish: proverbios
  alternatives_spanish:
  - dichos
  - sentencias
  - máximas
  lexicon: LSJ
  rationale: En la literatura sapiencial παροιμία designa dichos proverbiales. «Proverbios» es la equivalencia más directa y reconocible.
- source_word: ἀκριβεῖς
  english_pob_choice: exact proverbs
  chosen_spanish: exactos
  alternatives_spanish:
  - precisos
  - cuidadosos
  - ajustados
  lexicon: LSJ
  rationale: El adjetivo expresa exactitud y precisión. «Exactos» sigue la revisión inglesa más reciente y conserva el matiz de formulación cuidadosa.
translation_notes:
  revision_awareness: La base inglesa revisada cambió «precise proverbs» por «exact proverbs» para dar una versión más formal de ἀκριβεῖς, manteniendo la imagen de «poured forth» para ἀνώμβρησαν. La versión española sigue esa revisión con «proverbios exactos» y conserva el carácter metafórico con «derramaron».
  spanish_consistency_notes:
  - Se evitó «Cristo» o terminología cristianizada, porque el pasaje es sapiencial y no contiene esos términos.
  - «Sabios» se mantuvo como adjetivo resultativo, no como título técnico.
  - «Derramaron» conserva la metáfora de abundancia verbal sin forzar un calco difícil en español.
