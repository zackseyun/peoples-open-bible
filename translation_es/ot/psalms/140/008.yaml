translation:
  language: es
  text: ¡Oh Yahvé[a], mi Señor, la fuerza de mi salvación, tú has cubierto mi cabeza en el día de batalla!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el día de las armas» o «en el día del armamento». El hebreo probablemente alude al tiempo de conflicto armado; por eso se traduce «batalla» en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהֹוִה
  english_pob_choice: O Yahweh
  chosen_spanish: ¡Oh Yahvé!
  alternatives_spanish:
  - ¡Oh el SEÑOR!
  - ¡Oh Jehová!
  lexicon: HALOT
  rationale: Se conserva el nombre divino del Tetragrámaton como «Yahvé», conforme al estándar del proyecto. Se usa la interjección de apelación «Oh» para reflejar el vocativo del salmo.
- source_word: אֲדֹנָי
  english_pob_choice: my Lord
  chosen_spanish: mi Señor
  alternatives_spanish:
  - Señor
  - mi Dueño
  - mi Amo
  lexicon: HALOT
  rationale: La forma con sufijo posesivo pide «mi Señor». Se mantiene la distinción con el nombre divino precedente sin aplanarlo a una sola forma.
- source_word: עֹז
  english_pob_choice: the strength of
  chosen_spanish: la fuerza de
  alternatives_spanish:
  - la fortaleza de
  - el poder de
  - la fortaleza
  lexicon: HALOT
  rationale: «עֹז» expresa fuerza o poder. En español, «la fuerza de mi salvación» conserva bien la relación de constructo sin forzar una imagen distinta.
- source_word: יְשׁוּעָתִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi rescate
  - mi victoria
  lexicon: HALOT
  rationale: «Salvación» es el equivalente más amplio y fiel, y funciona bien en el contexto de protección y auxilio.
- source_word: סַכֹּתָה
  english_pob_choice: you have covered
  chosen_spanish: tú has cubierto
  alternatives_spanish:
  - tú cubriste
  - tú has protegido
  - tú me has cubierto
  lexicon: HALOT
  rationale: El verbo de cubrir/sombrear se mantiene literal para preservar la metáfora concreta de protección. Se usa pretérito perfecto para expresar una acción completada con efecto presente.
- source_word: לְרֹאשִׁי
  english_pob_choice: my head
  chosen_spanish: mi cabeza
  alternatives_spanish:
  - sobre mi cabeza
  - para mi cabeza
  lexicon: HALOT
  rationale: «Cabeza» comunica de forma natural el objeto de la cobertura. En contexto de protección, la imagen sugiere resguardo de la parte más vulnerable.
- source_word: בְּיוֹם
  english_pob_choice: in the day of
  chosen_spanish: en el día de
  alternatives_spanish:
  - en tiempo de
  - en la hora de
  lexicon: HALOT
  rationale: Se conserva la construcción temporal hebrea de manera transparente y natural en español.
- source_word: נָשֶׁק
  english_pob_choice: battle
  chosen_spanish: la batalla
  alternatives_spanish:
  - las armas
  - la guerra
  - el combate
  lexicon: HALOT
  rationale: El término puede referir a armas o armamento, pero el contexto idiomático señala conflicto armado. «La batalla» reproduce de manera clara el sentido contextual, manteniendo la nota de la alternativa más literal.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: Se sigue la directriz del proyecto de traducir el nombre del pacto como «Yahvé», no como una máscara reverencial. Esto preserva la referencia explícita al nombre divino en el texto español.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Distinction between יְהֹוִה and אֲדֹנָי
  english_pob_reading: O Yahweh, my Lord
  chosen_spanish_reading: ¡Oh Yahvé, mi Señor!
  alternative_spanish_readings:
  - ¡Oh Yahvé, mi Dueño!
  - ¡Oh Yahvé, mi Amo!
  rationale: 'Se mantiene la doble invocación: el nombre propio de Dios y luego el título posesivo. Traducir ambos con «Señor» borraría una distinción importante del hebreo y del audit trail inglés.'
  doctrine_reference: 'DOCTRINE.md: Preserve lexical distinctions where the source distinguishes them'
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB inglés, que actualizó el nombre divino de «LORD» a «Yahweh» por precisión léxica. También conserva la decisión estable de traducir נָשֶׁק por un sentido contextual de conflicto armado, con la alternativa literal documentada en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma española estable para el nombre divino.
  - «mi Señor» preserva la posesión explícita del hebreo.
  - «la batalla» evita un calco raro en español, pero la nota conserva la alternativa léxica.
  - La puntuación exclamativa refleja el vocativo inicial del versículo en estilo poético.
