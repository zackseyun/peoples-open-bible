revisions:
- from: Sean avergonzados y humillados a una[a] los que buscan destruir[b] mi vida[c]; vuelvan atrás y sean deshonrados los que se complacen en mi mal.
  to: Sean avergonzados y humillados juntos[a] los que buscan mi vida para acabar con ella[b]; vuelvan atrás y sean deshonrados los que se complacen en mi daño[c].
  rationale: La revisión restaura mejor la estructura del hebreo y del audit trail inglés al mantener «buscar mi vida» + propósito «para acabar con ella», mejora la claridad contextual de רָעָתִי con «mi daño», y usa una formulación más natural para español eclesial amplio con «juntos».
  reviewer_model: gpt-5.4
