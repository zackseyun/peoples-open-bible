  text: צַ֚ו אֶת בְּנֵ֣י יִשְׂרָאֵ֔ל וִֽ/ישַׁלְּחוּ֙ מִן הַֽ/מַּחֲנֶ֔ה כָּל צָר֖וּעַ וְ/כָל זָ֑ב וְ/כֹ֖ל טָמֵ֥א לָ/נָֽפֶשׁ־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/numbers/005/002.yaml
  text: Command the sons of Israel that they send out of the camp everyone with a skin disease[a], and everyone with a discharge[b], and everyone unclean by a dead body.
  footnotes:
  - marker: a
    text: Or, 'every leprous person.' The Hebrew term refers broadly to a serious skin affliction in ritual-law contexts, not necessarily modern leprosy.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'everyone unclean by a person/soul'; this idiom refers to impurity from a dead body.
    reason: lexical_alternative
