  rationale: Se ajusta el registro a español neutral latinoamericano usando formas de ‘ustedes’; se mejora τὸν ἅπαντα χρόνον con ‘todos sus días’, en línea con la revisión auditada del inglés; y se completa la nota con el matiz temporal ‘para siempre’ presente en la alternativa inglesa. El resto del sentido y de las decisiones léxicas se conserva.
