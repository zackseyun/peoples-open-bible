review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el hebreo y la pista del POB inglés en la estructura general y en las imágenes principales: exclusión del sepulcro, rama/vástago despreciado, descenso a las piedras del pozo/fosa y cadáver pisoteado. Sin embargo, dos elecciones debilitan la precisión del sentido fuente: ''los muertos'' reduce la fuerza violenta de הֲרֻגִים (''los asesinados/caídos/los muertos a espada'') y ''los heridos de espada'' no refleja suficientemente el matiz letal que el POB inglés fijó como ''those pierced by the sword''. También ''pozo'' resulta menos natural en español bíblico para בּוֹר en este contexto funerario que ''fosa'', aunque la nota compensa parcialmente.'
  spanish_quality_summary: El español es claro y digno, pero tiene pequeñas asperezas. 'Vestido con los muertos' suena raro en español y además pierde el matiz de 'los caídos/los muertos violentamente'; 'cubierto de los caídos' o 'vestido con los caídos' sigue siendo imagístico, pero la mejor reparación es mantener la imagen con un complemento más natural. 'Piedras del pozo' es comprensible, pero 'piedras de la fosa' suena más idiomático y acorde al registro funerario. El resto del verso fluye bien.
  glossary_alignment: No hay conflicto con la terminología doctrinal principal del proyecto. La decisión 'rama' para כְּנֵצֶר concuerda con la justificación anti-mesiánica documentada. El principal ajuste terminológico es preferir 'fosa' frente a 'pozo' para בּוֹר en este contexto, y reforzar la referencia a muerte violenta en הֲרֻגִים / מְטֹעֲנֵי חָרֶב.
  issues:
  - severity: medium
    issue: הֲרֻגִים traducido como 'los muertos'
    rationale: El hebreo se refiere específicamente a los muertos violentamente, 'los caídos' o 'los asesinados/slain'. 'Los muertos' es demasiado amplio y rebaja la imagen bélica.
  - severity: medium
    issue: מְטֹעֲנֵי חָרֶב traducido como 'los heridos de espada'
    rationale: En contexto funerario y siguiendo la auditoría inglesa, la frase apunta a los traspasados por la espada, no meramente heridos. La formulación actual deja abierta la supervivencia y debilita la escena.
  - severity: low
    issue: בּוֹר como 'pozo' en un contexto funerario
    rationale: Aunque léxicamente posible, 'pozo' en español contemporáneo sugiere más un pozo de agua. 'Fosa' conserva mejor la imaginería concreta y funeraria del hebreo y del POB inglés.
  revised_spanish_text: Pero tú eres arrojado de tu sepulcro, como una rama despreciada[a], vestido con los caídos, los traspasados por la espada[b], los que descienden a las piedras de la fosa[c], como un cadáver pisoteado.
  revised_footnotes:
