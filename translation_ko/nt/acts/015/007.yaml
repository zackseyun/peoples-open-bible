  yaml_path: translation/nt/acts/015/007.yaml
  text: And after much debate had taken place[a], Peter stood up and said to them, “Brothers[c][b], you know that from ancient days God chose among you that through my mouth the Gentiles should hear the word of the gospel and believe.”
  footnotes:
  - marker: a
    text: Or “Men, brothers.” The Greek address is masculine plural; “Brothers” preserves the form, though the audience may have included others represented by this conventional address.
    reason: lexical_alternative
  - marker: b
    text: Or “from early days.”
    reason: lexical_alternative
  - marker: c
    text: Or “the nations.” Here the sense is non-Jewish peoples, hence “the Gentiles.”
    reason: lexical_alternative
