translation:
  language: es
  text: Así humilló su corazón[a] con trabajo forzado; tropezaron[c][b], y no hubo quien ayudara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de trabajo penoso» o «con aflicción»; el hebreo עָמָל puede denotar labor pesada, fatiga o miseria.
    reason: lexical_alternative
  - marker: b
    text: Hebreo «su corazón», con singular «corazón» usado colectivamente.
    reason: lexical_alternative
  - marker: c
    text: O «cayeron»; el verbo puede denotar tropezar o caer.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּכְנַע
  english_pob_choice: he humbled
  chosen_spanish: humilló
  alternatives_spanish:
  - subyugó
  - abajó
  lexicon: HALOT
  rationale: 'El Hifil de כנע expresa acción causativa: hacer bajar o humillar. «Humilló» comunica bien esa causalidad en español y conserva el sujeto implícito divino sin recargar la frase con una glosa.'
- source_word: בֶּעָמָל
  english_pob_choice: with hard labor
  chosen_spanish: con duro trabajo
  alternatives_spanish:
  - con afán
  - con fatiga
  - por medio de trabajo penoso
  lexicon: HALOT
  rationale: עָמָל puede referirse a trabajo penoso, fatiga o aflicción. «Duro trabajo» mantiene el matiz concreto y opresivo que el contexto sugiere, sin forzar un sentido técnico.
- source_word: לִבָּם
  english_pob_choice: their heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - sus corazones
  - su interior
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo singular con sufijo plural colectivo. En español, «su corazón» conserva el idiomático singular colectivo y el sentido del centro interior de la persona.
- source_word: כָּשְׁלוּ
  english_pob_choice: they stumbled
  chosen_spanish: tropezaron
  alternatives_spanish:
  - cayeron
  - vacilaron
  lexicon: HALOT
  rationale: כשל puede significar tropezar, tambalear o caer. «Tropezaron» preserva la imagen verbal de inestabilidad sin añadir necesariamente la caída completa.
- source_word: וְאֵין עֹזֵר
  english_pob_choice: and there was no one to help
  chosen_spanish: y no hubo quien ayudara
  alternatives_spanish:
  - y no había ayudador
  - y no hubo ayuda
  lexicon: HALOT
  rationale: La construcción expresa ausencia de un ayudador. «No hubo quien ayudara» es natural en español y mantiene la fuerza existencial de אֵין más el participio con sentido de agente.
theological_decisions:
- issue: Sujeto implícito de וַיַּכְנַע
  english_pob_reading: 'God is the subject: ''he humbled'''
  chosen_spanish_reading: 'Se mantiene un sujeto divino implícito en el verbo activo: «humilló».'
  alternative_spanish_readings:
  - «su corazón fue humillado»
  - «fue humillado su corazón»
  rationale: El contexto del salmo atribuye tanto la aflicción como la liberación a la acción soberana de Yahvé. En español, conservar el verbo activo sin explicitar el sujeto en este verso respeta la sintaxis del hebreo y la teología del contexto.
  doctrine_reference: Salmos 107 en su conjunto; disciplina/providencia divina
- issue: Singular colectivo de לִבָּם
  english_pob_reading: '''their heart,'' with singular ''heart'' used collectively'
  chosen_spanish_reading: «su corazón» en singular colectivo.
  alternative_spanish_readings:
  - «sus corazones»
  - «su interior»
  rationale: El singular colectivo refleja mejor el hebreo y evita diluir el énfasis en el centro interior afectado por la humillación. En español, el singular posesivo funciona de manera natural y fiel.
  doctrine_reference: Antropología bíblica; uso hebreo del singular colectivo
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente hebreo y el auditor inglés POB: sujeto divino implícito, עָמָל como medio aflictivo, singular colectivo para לִבָּם, כָּשְׁלוּ como tropezar, y ausencia de ayudador con valor existencial.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» para no ocultar el nombre divino cuando el contexto del salmo apunta a la acción de Yahvé.
  - Se usó «corazón» en singular para reflejar el hebreo colectivo y mantener coherencia con antropología bíblica.
  - «Tropezaron» conserva la imagen verbal sin añadir interpretación de caída completa.
  - La cláusula final se formuló con una negación natural en español que sigue la fuerza de אֵין + participio.
