  text: ἀλλὰ ταῦτα λελάληκα ὑμῖν ἵνα ὅταν ἔλθῃ ἡ ὥρα ⸀αὐτῶν μνημονεύητε ⸁αὐτῶν ὅτι ἐγὼ εἶπον ὑμῖν. Ταῦτα δὲ ὑμῖν ἐξ ἀρχῆς οὐκ εἶπον, ὅτι μεθ’ ὑμῶν ἤμην.
base_translation:
  language: en
  yaml_path: translation/nt/john/016/004.yaml
  text: But I have spoken these things to you so that when their hour comes[a], you may remember that I told you. But I did not tell you these things from the beginning, because I was with you.
  footnotes:
  - marker: a
    text: Or, more literally, 'when their hour comes, you may remember them, that I told you.' The Greek includes two occurrences of 'them/their' (αὐτῶν), which are difficult to represent smoothly in English.
    reason: lexical_alternative
translation:
  language: ko
  text: 그러나 내가 이것들을 여러분에게 말한 것은, 그들의 때가 올 때에 내가 여러분에게 말했다는 것을 기억하게 하려는 것입니다. 처음부터 이것들을 여러분에게 말하지 않은 것은, 내가 여러분과 함께 있었기 때문입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 더 문자적으로 「그들의 때가 올 때, 너희가 그것들을 기억하기를, 곧 내가 너희에게 말했다는 것을」. 헬라어는 「그것들/그들」 αὐτῶν을 두 번 포함한다.
    reason: lexical_alternative
