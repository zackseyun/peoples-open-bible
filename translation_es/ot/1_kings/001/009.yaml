base_translation:
  language: en
  yaml_path: translation/ot/1_kings/001/009.yaml
  text: Adonijah sacrificed sheep[a], cattle, and fattened animals by the stone of Zoheleth, which is beside En-rogel, and he invited all his brothers, the king’s sons, and all the men of Judah[e][d][c][b], the king’s servants.
  footnotes:
  - marker: a
    text: Or 'fatted cattle' or 'stall-fed cattle' for 'fattened calves.'
    reason: lexical_alternative
  - marker: b
    text: Zoheleth is a place-name; its exact meaning is uncertain.
    reason: cultural_note
  - marker: c
    text: Or 'called' or 'summoned' instead of 'invited.'
    reason: lexical_alternative
  - marker: d
    text: Or 'the people of Judah,' though the Hebrew says 'the men of Judah.'
    reason: lexical_alternative
  - marker: e
    text: '''The king’s servants'' may refer to royal attendants or officials.'
    reason: lexical_alternative
