lexical_decisions:
- source_word: ἔδοξαν
  english_pob_choice: they seemed
  chosen_spanish: parecían
  alternatives_spanish:
  - parecieron
  - se los tenía por
  lexicon: BDAG
  rationale: El aoristo de δοκέω expresa aquí apariencia desde la perspectiva de observadores; en español, «parecían» conserva ese matiz sin afirmar objetivamente la muerte.
- source_word: ἐν ὀφθαλμοῖς ἀφρόνων
  english_pob_choice: in the eyes of fools
  chosen_spanish: a los ojos de los necios
  alternatives_spanish:
  - en los ojos de los necios
  - para los necios
  - a la vista de los necios
  lexicon: BDAG
  rationale: La imagen idiomática se mantiene de modo natural en español con «a los ojos de», y «necios» reproduce el valor moral y sapiencial de ἄφρων.
- source_word: τεθνάναι
  english_pob_choice: to have died
  chosen_spanish: haber muerto
  alternatives_spanish:
  - estar muertos
  - morir
  lexicon: BDAG
  rationale: El infinitivo perfecto indica el estado resultante de la muerte; «haber muerto» preserva ese valor y encaja con «parecían».
- source_word: ἐλογίσθη
  english_pob_choice: was regarded
  chosen_spanish: fue tenida por
  alternatives_spanish:
  - fue considerada
  - se juzgó
  lexicon: BDAG
  rationale: λογίζομαι aquí expresa valoración o juicio de observadores; la pasiva impersonal «fue tenida por» suena natural en español y conserva el juicio ajeno.
- source_word: ἡ ἔξοδος αὐτῶν
  english_pob_choice: their departure
  chosen_spanish: su partida
  alternatives_spanish:
  - su salida
  - su muerte
  - su partida de este mundo
  lexicon: BDAG
  rationale: ἔξοδος significa literalmente «salida» o «partida». «Partida» conserva el lenguaje figurado de la fuente y evita reducirlo de inmediato a «muerte».
theological_decisions:
- issue: Metáfora de la muerte expresada como «partida»
  english_pob_reading: their departure
  chosen_spanish_reading: su partida
  alternative_spanish_readings:
  - su muerte
  - su salida
  rationale: El contexto contrasta la apariencia humana con la realidad de los justos; conservar «partida» mantiene la tensión metafórica sin resolverla prematuramente.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; consistency of key terms, or documented exception.'
translation_notes:
  revision_awareness: El borrador sigue el texto griego normalizado de Sabiduría 3:2 y refleja el audit trail inglés, incluyendo la conservación de ἔξοδος como imagen de «partida» en vez de reducirla a «muerte». No hay revisiones adicionales aplicadas en el paquete fuente.
  spanish_consistency_notes:
  - Se mantiene «necios» para ἄφρων, en consonancia con el registro sapiencial.
  - Se usa «partida» como equivalente de ἔξοδος para preservar la metáfora y la tensión teológica.
  - La pasiva «fue tenida por» conserva el juicio externo sin añadir un sujeto explícito.
  - No se introduce «SEÑOR» ni terminología cristológica ajena al versículo.
