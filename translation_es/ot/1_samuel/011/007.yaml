base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/011/007.yaml
  text: Then he took a yoke of oxen and cut them in pieces[a], and sent them throughout all the territory of Israel by the hand of the messengers, saying, “Whoever does not come out after Saul and after Samuel, so shall it be done to his oxen.” Then the dread of Yahweh fell on the people[d][c][b], and they came out as one man.
  footnotes:
  - marker: a
    text: Or “a pair of oxen.”
    reason: lexical_alternative
  - marker: b
    text: Hebrew “by the hand of the messengers,” an idiom meaning “by means of the messengers.”
    reason: cultural_note
  - marker: c
    text: Or “the fear of the LORD fell on the people.” Here the sense is likely a divinely sent dread that moved them to act.
    reason: alternative_reading
  - marker: d
    text: Hebrew “as one man,” an idiom for unified action.
    reason: lexical_alternative
