id: ISA.26.1
reference: Isaiah 26:1
source:
  edition: WLC
  text: בַּ/יּ֣וֹם הַ/ה֔וּא יוּשַׁ֥ר הַ/שִּׁיר הַ/זֶּ֖ה בְּ/אֶ֣רֶץ יְהוּדָ֑ה עִ֣יר עָז לָ֔/נוּ יְשׁוּעָ֥ה יָשִׁ֖ית חוֹמ֥וֹת וָ/חֵֽל־־׃
translation:
  text: 'In that day this song will be sung in the land of Judah: “We have a strong city[c][b][a]; he sets salvation as walls and rampart.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'We have a fortified city.'
    reason: lexical_alternative
  - marker: b
    text: Or 'he appoints salvation for walls and rampart.' The Hebrew leaves the subject of 'he sets up/appoints' implicit, though in context it is commonly understood to refer to God.
    reason: alternative_reading
  - marker: c
    text: '''Rampart'' translates a Hebrew term for a defensive outer fortification; traditional English versions often render it ''bulwark.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּיּוֹם הַהוּא
  chosen: In that day
  alternatives:
  - On that day
  lexicon: HALOT
  rationale: Standard temporal idiom in prophetic literature. 'In that day' is idiomatic English and preserves the eschatological/prophetic force.
- source_word: יוּשַׁר
  chosen: will be sung
  alternatives:
  - shall be sung
  lexicon: HALOT
  rationale: 'Hophal of שׁיר expresses passive/causative sense: the song is sung. ''Will be sung'' is natural modern English.'
- source_word: הַשִּׁיר הַזֶּה
  chosen: this song
  alternatives:
  - this song of praise
  lexicon: HALOT
  rationale: The Hebrew simply says 'this song'; adding 'of praise' would over-interpret.
- source_word: בְּאֶרֶץ יְהוּדָה
  chosen: in the land of Judah
  alternatives:
  - in Judah
  lexicon: HALOT
  rationale: Retains אֶרֶץ explicitly as 'land,' preserving the geographic-national sense.
- source_word: עִיר עָז
  chosen: a strong city
  alternatives:
  - a fortified city
  - a city of strength
  lexicon: HALOT
  rationale: Predicate expression describing the city. 'Strong city' is concise and natural while preserving the metaphor of security.
- source_word: לָנוּ
  chosen: We have
  alternatives:
  - for us
  - belongs to us
  lexicon: HALOT
  rationale: 'The dative pronoun in this verbless clause is idiomatically rendered in English as possession: ''We have a strong city.'' This best conveys the sense without woodenness.'
- source_word: יְשׁוּעָה
  chosen: salvation
  alternatives:
  - deliverance
  - victory
  lexicon: HALOT
  rationale: '''Salvation'' is the most direct and theologically weighty rendering. ''Deliverance'' is possible, but the broader saving sense fits Isaiah well.'
- source_word: יָשִׁית
  chosen: he sets up
  alternatives:
  - he appoints
  - he makes
  - he places
  lexicon: HALOT
  rationale: Qal of שׂים means to set/place/make. 'Sets up' works well with defensive structures and keeps the active divine action.
- source_word: חוֹמוֹת
  chosen: walls
  alternatives:
  - wall
  lexicon: HALOT
  rationale: Plural in Hebrew should be preserved.
- source_word: וָחֵל
  chosen: and rampart
  alternatives:
  - and bulwark
  - and outer wall
  - and fortress
  lexicon: HALOT
  rationale: חֵל refers to a defensive fortification or rampart. 'Rampart' is accessible and concrete; 'bulwark' is traditional but less common in contemporary English.
