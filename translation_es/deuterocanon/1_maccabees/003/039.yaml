translation:
  language: es
  text: Y envió con ellos a cuarenta mil hombres y siete mil de caballería[a], para entrar en la tierra de Judá y destruirla, conforme a la palabra del rey[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «siete mil caballos». El griego probablemente usa «caballos» de manera metonímica para referirse a tropas montadas; por eso se traduce «caballería».
    reason: lexical_alternative
  - marker: b
    text: O «conforme a la orden del rey». El griego dice «conforme a la palabra del rey», donde «palabra» tiene fuerza de orden en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: LSJ
  rationale: ἀποστέλλω en aoristo expresa el envío de tropas; «envió» es natural, solemne y fiel al movimiento del texto sin añadir matiz innecesario.
- source_word: μετʼ αὐτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - junto con ellos
  lexicon: LSJ
  rationale: La frase indica acompañamiento de los contingentes previamente mencionados. «Con ellos» reproduce de modo directo y claro la relación sintáctica.
- source_word: τεσσεράκοντα χιλιάδας ἀνδρῶν
  english_pob_choice: forty thousand men
  chosen_spanish: cuarenta mil hombres
  alternatives_spanish:
  - cuarenta mil soldados
  lexicon: LSJ
  rationale: ἀνδρῶν dice literalmente «hombres». En contexto militar, «hombres» mantiene la literalidad fuente y sigue siendo inteligible; «soldados» sería más interpretativo.
- source_word: ἑπτακισχιλίον ἵππον
  english_pob_choice: seven thousand cavalry
  chosen_spanish: siete mil de caballería
  alternatives_spanish:
  - siete mil jinetes
  - siete mil caballos
  lexicon: LSJ
  rationale: ἵππος puede funcionar metonímicamente por tropas montadas. En español, «de caballería» comunica el sentido militar con naturalidad, evitando la literalidad engañosa de «caballos».
- source_word: τοῦ ἐλθεῖν
  english_pob_choice: to come
  chosen_spanish: para entrar
  alternatives_spanish:
  - para venir
  - para llegar
  lexicon: LSJ
  rationale: El infinitivo con artículo expresa propósito. En español, el movimiento hacia una tierra se expresa mejor con «entrar» que con «venir», preservando la finalidad del envío.
- source_word: εἰς γῆν Ἰούδα
  english_pob_choice: into the land of Judah
  chosen_spanish: en la tierra de Judá
  alternatives_spanish:
  - a la tierra de Judá
  - en Judea
  lexicon: LSJ
  rationale: γῆ significa tierra/territorio. «La tierra de Judá» mantiene el paralelo con el griego y evita sustituir el topónimo por la forma regional más interpretativa «Judea».
- source_word: καταφθεῖραι
  english_pob_choice: destroy
  chosen_spanish: devastarla
  alternatives_spanish:
  - destruirla
  - arrasarla
  - asolarla
  lexicon: LSJ
  rationale: El verbo denota acción destructiva contra la tierra. «Devastarla» conserva la fuerza de ruina extensa y suena natural en español bíblico moderno; «destruirla» es posible pero algo más genérico.
- source_word: κατὰ τὸν λόγον τοῦ βασιλέως
  english_pob_choice: according to the word of the king
  chosen_spanish: conforme a la palabra del rey
  alternatives_spanish:
  - según la orden del rey
  - de acuerdo con la palabra del rey
  lexicon: LSJ
  rationale: λόγος puede significar «palabra», «declaración» o, por contexto, «orden». Se conserva «palabra» para reflejar la formulación griega, mientras «conforme a» expresa adecuadamente la dependencia de un mandato real.
theological_decisions:
- issue: λόγος aplicado a un mandato real
  english_pob_reading: according to the word of the king, with 'word' carrying the force of an order in context
  chosen_spanish_reading: conforme a la palabra del rey, entendiendo «palabra» con fuerza de mandato
  alternative_spanish_readings:
  - conforme a la orden del rey
  - según el mandato del rey
  rationale: El griego usa λόγος, no una palabra exclusiva para «mandato». Mantener «palabra» preserva la transparencia del texto, sin perder el valor imperativo que el contexto exige.
  doctrine_reference: Criterio lexical-contextual; no implica decisión doctrinal, sino respeto al sentido pragmático del original.
translation_notes:
  revision_awareness: La versión inglesa final se revisó y quedó sin cambios, con alta concordancia respecto al griego. Esta propuesta sigue esa lectura, manteniendo la tensión léxica de λόγος/«palabra» y la posible metonimia de ἵππον sin sobrecargar el español.
  spanish_consistency_notes:
  - Se usa «Judá» y no «Judea» para seguir la geografía literal del griego.
  - «Caballería» refleja la metonimia militar de ἵππος, como en el audit trail inglés.
  - «Conforme a» evita la rigidez de un calco mientras preserva la relación de dependencia con el decreto real.
  - No se introduce terminología eclesiástica ajena al pasaje.
