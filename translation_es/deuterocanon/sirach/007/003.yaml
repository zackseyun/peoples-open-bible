- from: No busques autoridad de parte de Dios[a], ni del rey un asiento de honor.
  to: No busques autoridad de Dios[a], ni del rey un asiento de honor.
  rationale: Se corrige «de parte de Dios» a «de Dios» para reflejar con mayor fidelidad y naturalidad el hebreo מֵאֵל. Se mantiene la nota textual y la imagen concreta de «asiento de honor», que, aunque algo menos idiomática, sigue siendo fiel y clara.
