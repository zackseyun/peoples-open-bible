translation:
  language: es
  text: Y Asiria caerá por una espada no de hombre[a], y una espada no de ser humano lo devorará; y él huirá de delante de la espada[b], y sus jóvenes[c] serán sometidos a trabajo forzado[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''y una espada no de hombre''. El hebreo contrapone אִישׁ (''hombre'') y אָדָם (''ser humano/humankind'') en paralelo.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, por una espada no empuñada por poder humano; el texto deja sin especificar el medio exacto del juicio de Yahvé.
    reason: alternative_reading
  - marker: c
    text: 'O: ''sus escogidos''. El término hebreo puede referirse a jóvenes en la plenitud de su fuerza, a menudo en contexto militar.'
    reason: lexical_alternative
  - marker: d
    text: 'O: ''serán puestos a corvea/tributo laboral''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אַשּׁוּר
  english_pob_choice: Assyria
  chosen_spanish: Asiria
  alternatives_spanish:
  - Assur
  lexicon: HALOT
  rationale: El nombre designa aquí al poder asirio como entidad nacional, y en español 'Asiria' es la forma estándar y claramente reconocible.
- source_word: בְּחֶרֶב
  english_pob_choice: by a sword
  chosen_spanish: por una espada
  alternatives_spanish:
  - con una espada
  lexicon: HALOT
  rationale: La preposición expresa instrumento; en español, 'por una espada' comunica bien la causa/instrumento sin sonar tan rígido como un calco literal.
- source_word: לֹא אִישׁ
  english_pob_choice: not of man
  chosen_spanish: no de hombre
  alternatives_spanish:
  - no de un hombre
  - no humano
  lexicon: HALOT
  rationale: Se conserva la negación breve y el contraste con אָדָם. 'No de hombre' mantiene la tersura del hebreo y la tensión sobre el origen o la agencia de la espada.
- source_word: וְחֶרֶב לֹא אָדָם
  english_pob_choice: and a sword not of humankind
  chosen_spanish: y una espada no de ser humano
  alternatives_spanish:
  - y una espada no de hombre
  - y una espada no humana
  lexicon: HALOT
  rationale: Para reflejar la variación deliberada entre אִישׁ y אָדָם, aquí se evita repetir 'hombre' y se usa 'ser humano', que comunica el sentido genérico sin borrar la distinción léxica.
- source_word: תֹּאכֲלֶנּוּ
  english_pob_choice: will devour him
  chosen_spanish: la devorará
  alternatives_spanish:
  - lo devorará
  - lo consumirá
  lexicon: HALOT
  rationale: El verbo tiene sujeto femenino singular ('espada'), por eso el objeto se ajusta a 'la' refiriéndose a la espada en español. 'Devorará' preserva la metáfora fuerte y natural.
- source_word: וְנָס לוֹ מִפְּנֵי חֶרֶב
  english_pob_choice: and he will flee from before the sword
  chosen_spanish: y él huirá de delante de la espada
  alternatives_spanish:
  - y huirá de la espada
  - y se huirá delante de la espada
  lexicon: HALOT
  rationale: '''De delante de'' conserva el modismo hebreo מִפְּנֵי sin perder inteligibilidad. Se mantiene el sujeto singular referencial como en la lectura inglesa, con posible referencia colectiva al poder asirio.'
- source_word: בַחוּרָיו
  english_pob_choice: his young men
  chosen_spanish: sus jóvenes
  alternatives_spanish:
  - sus jóvenes hombres
  - sus escogidos
  lexicon: HALOT
  rationale: בָּחוּר puede referirse a varones jóvenes en edad de fuerza, a menudo con matiz militar. 'Sus jóvenes' es fiel y natural en español sin forzar una especificación militar que el hebreo no exige.
- source_word: לָמַס
  english_pob_choice: forced labor
  chosen_spanish: trabajos serviles
  alternatives_spanish:
  - trabajo forzado
  - corvea
  - tributo de trabajo
  lexicon: HALOT
  rationale: לָמַס denota trabajo impuesto, servidumbre laboral o tributo en trabajo. 'Trabajos serviles' comunica la coerción y evita el tecnicismo poco transparente 'corvea'.
- source_word: יִהְיוּ
  english_pob_choice: will become
  chosen_spanish: serán
  alternatives_spanish:
  - llegarán a ser
  - se convertirán en
  lexicon: HALOT
  rationale: En español, 'serán' transmite el estado resultante con naturalidad. La idea de devenir está implícita en el contexto de derrota y sometimiento.
theological_decisions:
- issue: Naturaleza de la espada que derrota a Asiria
  english_pob_reading: a non-human sword/instrument of judgment
  chosen_spanish_reading: una espada no humana / no de ser humano, sin identificar el medio exacto
  alternative_spanish_readings:
  - una espada literal empuñada por un agente no humano
  - una metáfora de intervención divina, como plaga o juicio angélico
  rationale: El hebreo niega dos veces la agencia humana, pero no especifica el mecanismo. La traducción conserva esa tensión en vez de resolverla; 'no de hombre' y 'no de ser humano' mantienen abierta la procedencia del juicio.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sujeto de 'huirá'
  english_pob_reading: he will flee from before the sword
  chosen_spanish_reading: él huirá de delante de la espada, con posible referencia colectiva a Asiria o a su rey
  alternative_spanish_readings:
  - Asiria huirá de delante de la espada
  - el rey de Asiria huirá de delante de la espada
  rationale: El hebreo pasa de una entidad nacional a un singular masculino; el español conserva ese recurso sin sobreespecificarlo. Así se preserva la fluidez referencial y la ambigüedad del original.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se preservó la doble negación de origen humano en la espada, la referencia singular colectiva de Asiria y el cierre con trabajo forzado. No se introdujeron harmonizaciones doctrinales ni se sustituyó el contraste léxico entre אִישׁ y אָדָם.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo en la nota explicativa, no en el texto principal, porque aquí el versículo no contiene el tetragrámaton de forma explícita.
  - '''Espada'' se repite para mantener la imaginería bélica del hebreo.'
  - '''Trabajos serviles'' busca ser transparente y comprensible para lectores eclesiales de habla hispana.'
