translation:
  language: es
  text: 'Entonces el rey dijo a Amasa: “Reúne[a] para mí a los hombres de Judá dentro de tres días, y tú, quédate aquí”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo «los hombres de Judá» usa una expresión colectiva masculina. El contexto probablemente apunta a los hombres aptos para el servicio o la movilización, pero el texto no dice explícitamente «guerreros».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El waw consecutivo marca avance narrativo; «Entonces» conserva la secuencia con naturalidad en español y mantiene el tono histórico.
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: HALOT
  rationale: Es un sustantivo definido sencillo; en contexto se refiere a David y no requiere introducir el nombre propio.
- source_word: הַזְעֶק
  english_pob_choice: Call ... together
  chosen_spanish: Reúne
  alternatives_spanish:
  - Convoca
  - Haz llamar
  lexicon: HALOT
  rationale: El hifil imperativo de זעק aquí tiene sentido causativo de convocatoria o juntamiento. «Reúne» comunica la acción de agrupar al pueblo de forma natural sin perder el mandato.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - en mi favor
  - a mí
  lexicon: HALOT
  rationale: El dativo señala acción hecha en nombre o beneficio del rey; «para mí» es la opción española más directa y fiel.
- source_word: אֶת אִישׁ יְהוּדָה
  english_pob_choice: the men of Judah
  chosen_spanish: a los hombres de Judá
  alternatives_spanish:
  - al pueblo de Judá
  - a los guerreros de Judá
  lexicon: HALOT
  rationale: Aunque אִישׁ está en singular, la expresión funciona colectivamente. «Hombres de Judá» preserva esa fuerza colectiva masculina sin añadir explícitamente un matiz militar que el hebreo no dice de forma abierta.
- source_word: שְׁלֹשֶׁת יָמִים
  english_pob_choice: within three days
  chosen_spanish: dentro de tres días
  alternatives_spanish:
  - en tres días
  - por tres días
  lexicon: HALOT
  rationale: En contexto imperativo, la frase indica un plazo límite. «Dentro de tres días» expresa bien la fecha tope exigida por el mandato.
- source_word: וְאַתָּה
  english_pob_choice: and you
  chosen_spanish: y tú
  alternatives_spanish:
  - pero tú
  - tú, por tu parte
  lexicon: HALOT
  rationale: El pronombre explícito añade énfasis; «y tú» conserva la coordinación y la prominencia del destinatario.
- source_word: פֹּה
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: HALOT
  rationale: Adverbio locativo simple; «aquí» es el equivalente idiomático y claro.
- source_word: עֲמֹד
  english_pob_choice: remain
  chosen_spanish: quédate
  alternatives_spanish:
  - permanece
  - quédate en pie
  lexicon: HALOT
  rationale: Aunque el verbo literalmente es «estar de pie», en esta instrucción de permanencia local el sentido natural en español es «quedarse»; la forma imperativa mantiene el mandato directo y evita un calco rígido.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se mantuvo el valor narrativo de waw consecutivo, el carácter colectivo de אִישׁ יְהוּדָה, el plazo como deadline y el sentido contextual de עֲמֹד como permanencia. No se introdujeron cambios doctrinales ni nombres propios ajenos al hebreo.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exige explícitamente; este versículo no contiene el tetragrámaton.
  - Se prefirió español moderno y digno, evitando calcos como «llama/grita» para הַזְעֶק o «está» para עֲמֹד.
  - La nota[a] marca la misma tensión lexical que el inglés POB preserva respecto a la colectividad masculina de la frase hebrea.
