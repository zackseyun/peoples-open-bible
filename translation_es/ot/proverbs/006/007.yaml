review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura relativa y la lista triple de autoridades del hebreo: אֲשֶׁר + אֵין לָהּ + קָצִין שֹׁטֵר וּמֹשֵׁל. No añade «sobre ella», en línea con la revisión inglesa. Sin embargo, «el cual» suena menos natural en español para retomar «la hormiga», y la nota usa «u gobernante», forma incorrecta antes de palabra que empieza con sonido /g/ y no con /o/.'
  spanish_quality_summary: La frase es clara y digna, pero «que no tiene» es más natural y fluido que «el cual no tiene» en este contexto. La secuencia «jefe, oficial ni gobernante» es legible; mejor mantener «o gobernante» en la nota alternativa. El resto del español es correcto y de registro adecuado.
  glossary_alignment: No hay términos de glosario mayor implicados. Las decisiones léxicas «jefe / oficial / gobernante» preservan adecuadamente las distinciones de קָצִין / שֹׁטֵר / מֹשֵׁל. La nota alternativa también está bien orientada con «líder, funcionario o gobernante».
  issues:
  - severity: medium
    issue: Relativo «el cual» poco natural en español bíblico corriente para este antecedente.
    rationale: Aunque no es incorrecto, «que» enlaza más naturalmente con «la hormiga» del versículo anterior y conserva mejor la fluidez sin perder precisión.
  - severity: medium
    issue: 'Uso incorrecto de «u» en la nota: «u gobernante».'
    rationale: La conjunción «u» solo reemplaza a «o» ante palabras que comienzan con sonido /o/ o /ho/; «gobernante» requiere «o».
  revised_spanish_text: que no tiene[a] jefe, oficial ni gobernante,
