translation:
  language: es
  text: Así que se mantuvo cerca de las jóvenes de Booz para espigar[a], hasta que terminó la cosecha de la cebada y la cosecha del trigo. Y vivió[b] con su suegra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘se apegó a las jóvenes de Booz’. El verbo hebreo puede enfatizar una adhesión estrecha o una cercanía persistente.
    reason: lexical_alternative
  - marker: b
    text: O ‘se quedó con su suegra’. El verbo hebreo puede significar ‘se quedó’, ‘permaneció’ o ‘vivió’, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּדְבַּק
  english_pob_choice: stayed close
  chosen_spanish: se mantuvo cerca
  alternatives_spanish:
  - se apegó
  - se aferró
  - se pegó a
  lexicon: HALOT
  rationale: דבק expresa adhesión o cercanía continua. En español, 'se mantuvo cerca' comunica bien la relación sostenida sin sugerir una carga corporal o emocional más fuerte de la que exige el contexto.
- source_word: בְּנַעֲרוֹת בֹּעַז
  english_pob_choice: to Boaz's young women
  chosen_spanish: de las jóvenes de Booz
  alternatives_spanish:
  - con las jóvenes de Booz
  - entre las jóvenes de Booz
  - de las muchachas de Booz
  lexicon: HALOT
  rationale: El hebreo habla de las נערות de Booz. 'Jóvenes' evita forzar una lectura moderna de 'empleadas' y mantiene el vínculo posesivo con Booz. La preposición se ajusta en español para expresar con naturalidad la cercanía continuada.
- source_word: לְלַקֵּט
  english_pob_choice: to glean
  chosen_spanish: para espigar
  alternatives_spanish:
  - para recoger
  - para recoger espigas
  lexicon: HALOT
  rationale: '''Espigar'' es el equivalente agrícola usual en español para לקט en Ruth. Conserva el acto técnico de recoger las espigas sobrantes, más preciso que un genérico ''recoger''.'
- source_word: עַד כְּלוֹת
  english_pob_choice: until the end of
  chosen_spanish: hasta que terminó
  alternatives_spanish:
  - hasta el fin de
  - hasta la terminación de
  lexicon: HALOT
  rationale: La construcción marca duración hasta completarse algo. En español, 'hasta que terminó' expresa con claridad el límite temporal y suena natural sin perder el valor aspectual del hebreo.
- source_word: קְצִיר הַשְּׂעֹרִים
  english_pob_choice: the barley harvest
  chosen_spanish: la cosecha de la cebada
  alternatives_spanish:
  - la siega de la cebada
  - la cosecha de cebada
  lexicon: HALOT
  rationale: '''Cosecha'' traduce bien קציר en un registro amplio y natural. ''De la cebada'' conserva el constructo y evita una formulación demasiado técnica o arcaizante.'
- source_word: וּקְצִיר הַחִטִּים
  english_pob_choice: and the wheat harvest
  chosen_spanish: y la cosecha del trigo
  alternatives_spanish:
  - y la siega del trigo
  - y la cosecha de trigo
  lexicon: HALOT
  rationale: Paralelo a la frase anterior. 'Del trigo' reproduce la relación constructa y mantiene la referencia a las dos estaciones de cosecha.
- source_word: וַתֵּשֶׁב
  english_pob_choice: she lived
  chosen_spanish: vivió
  alternatives_spanish:
  - se quedó
  - habitó
  - permaneció
  lexicon: HALOT
  rationale: ישב puede significar sentarse, quedarse, residir o vivir. Aquí el sentido narrativo es residencia con Noemí; 'vivió' es claro y conserva ese valor.
- source_word: אֶת חֲמוֹתָהּ
  english_pob_choice: with her mother-in-law
  chosen_spanish: con su suegra
  alternatives_spanish:
  - junto a su suegra
  - con la madre de su esposo
  lexicon: HALOT
  rationale: Aunque אֶת es normalmente marca de objeto directo, con ישב el sentido es residencial/relacional. 'Con su suegra' expresa el vínculo de convivencia de forma natural en español.
translation_notes:
  revision_awareness: Se mantuvo la lectura ya validada por la auditoría inglesa, pero se ajustó la prosa al español natural sin perder la fuerza de דבק ni el valor durativo de עַד כְּלוֹת. No se introdujeron cambios textuales sustantivos respecto al sentido base.
  spanish_consistency_notes:
  - Se conserva 'Booz' como forma estándar de nombre propio en español.
  - Se mantiene la distinción agrícola entre cebada y trigo, importante para la secuencia narrativa.
  - '''Espigar'' se usa como término técnico consistente con Ruth y con el valor de לקט.'
  - '''Vivió con su suegra'' evita calcar la sintaxis hebrea de אֶת y sigue la decisión contextual de residencia.'
