review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura causal, la lista acumulativa de capacidades de Daniel y la recomendación final. Conserva adecuadamente «espíritu» sin sobredeterminarlo teológicamente, distingue «conocimiento» y «entendimiento», y comunica con fidelidad las acciones de interpretar sueños, explicar enigmas y resolver dificultades. Sin embargo, la orden «que llamen a Daniel» cambia innecesariamente la voz pasiva/jusiva del arameo, y la sintaxis «se hallaron en él ... , en Daniel» suena algo torpe en español.
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero tiene dos puntos mejorables de naturalidad y precisión: 1) «que se llame a Daniel» reproduce mejor el pasivo/jusivo que «que llamen a Daniel»; 2) reordenar la cláusula principal evita una construcción pesada con «en él ... en Daniel». También conviene normalizar la nota al estilo de nota, sin comillas externas innecesarias.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Espíritu» está bien elegido en minúscula por contexto; no aparecen Yahvé/Mesías/esclavo u otros términos sensibles del glosario. «Belsasar» es una forma española reconocible para Belteshazzar y funciona bien en un registro bíblico legible.
  issues:
  - severity: medium
    issue: «que llamen a Daniel» no preserva tan de cerca la voz pasiva/jusiva de יִתְקְרֵי
    rationale: El arameo se entiende mejor como «que sea llamado / que se llame a Daniel». La forma activa plural es comprensible, pero desplaza el foco desde la convocatoria de Daniel al agente implícito que lo llama.
  - severity: low
    issue: La secuencia «se hallaron en él ... , en Daniel» es poco fluida en español
    rationale: Aunque formalmente posible, la repetición suena trabada. Reordenar a «fueron hallados en Daniel» o integrar el nombre antes mejora la legibilidad sin alterar el sentido.
  - severity: low
    issue: Formato de la nota al pie poco natural
    rationale: 'La nota «''O: «un espíritu excelente».''» incluye comillas y puntuación redundantes. Conviene simplificarla a una formulación editorial limpia.'
