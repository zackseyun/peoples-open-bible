translation:
  language: es
  text: Porque no obedeciste la voz de Yahvé y no ejecutaste su feroz ira contra Amalec,[a] por eso Yahvé te ha hecho esto hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no llevaste a cabo su feroz ira contra Amalec».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְתָּ בְּקוֹל יְהוָה
  english_pob_choice: obey the voice of Yahweh
  chosen_spanish: obedeciste la voz de Yahvé
  alternatives_spanish:
  - escuchaste la voz de Yahvé
  - prestaste oído a la voz de Yahvé
  lexicon: HALOT
  rationale: En este contexto de alianza y juicio, שׁמע con בְּקוֹל expresa obediencia, no solo audición. En español, «obedeciste la voz» conserva el valor idiomático y la relación personal del mandato divino.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino revelado, conforme a la política terminológica del proyecto, en lugar de sustituirlo por un título.
- source_word: עָשִׂיתָ חֲרוֹן אַפּוֹ
  english_pob_choice: carry out his fierce anger
  chosen_spanish: ejecutaste su feroz ira
  alternatives_spanish:
  - ejecutaste su ira encendida
  - hiciste su ira feroz
  - llevaste a cabo su ira feroz
  lexicon: HALOT
  rationale: El hebreo usa un giro verbal con עשה + חֲרוֹן אַף. «Ejecutaste» conserva la fuerza de cumplimiento de una acción ordenada; «feroz ira» refleja el campo semántico de intensidad sin perder la imagen de ira ardiente que el hebreo sugiere.
- source_word: בַּעֲמָלֵק
  english_pob_choice: against Amalek
  chosen_spanish: contra Amalec
  alternatives_spanish:
  - sobre Amalec
  - contra el pueblo de Amalec
  lexicon: HALOT
  rationale: Con el verbo de ejecutar o llevar a cabo la ira, el complemento natural en español es «contra Amalec», que expresa el blanco de la acción y respeta el valor relacional del hebreo.
- source_word: עַל כֵּן
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: HALOT
  rationale: Marca la consecuencia causal inmediata en un registro claro y bíblico, sin sonar arcaico.
- source_word: הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - este asunto
  - este hecho
  lexicon: HALOT
  rationale: En español, «esto» comunica de manera natural el referente al juicio o desenlace anunciado; «cosa» resultaría menos elegante. El hebreo es amplio y aquí apunta al evento/judicio presente.
- source_word: עָשָׂה לְךָ יְהוָה
  english_pob_choice: Yahweh has done this thing to you
  chosen_spanish: Yahvé ha hecho esto para ti
  alternatives_spanish:
  - Yahvé te ha hecho esto
  - Yahvé ha traído esto sobre ti
  lexicon: HALOT
  rationale: Se conserva el perfecto hebreo con valor de acción ya realizada y vigente en la escena profética. «Ha hecho esto para ti» sigue de cerca la estructura de לְךָ y mantiene la referencia explícita al objeto implícito en el versículo.
- source_word: הַיּוֹם הַזֶּה
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  - en este día
  lexicon: HALOT
  rationale: «Hoy» es la equivalencia natural y mantiene la inmediatez temporal del hebreo sin arcaísmo.
theological_decisions:
- issue: Nombre divino YHWH / יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: Se preserva el nombre propio de Dios en lugar de una sustitución titulativa. Esto mantiene la transparencia del texto fuente y la política terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Fuerza del juicio sobre Amalec
  english_pob_reading: carry out his fierce anger against Amalek
  chosen_spanish_reading: ejecutaste su feroz ira contra Amalec
  alternative_spanish_readings:
  - ejecutaste su ira encendida contra Amalec
  - llevaste a cabo su ira feroz contra Amalec
  rationale: La frase hebrea une la idea de ira intensa con una acción que debía ser ejecutada. En español, «ejecutar su feroz ira» preserva tanto el componente de mandato/jucio como la intensidad emocional sin suavizarla demasiado.
  doctrine_reference: Lexical/theological tension in חֲרוֹן אַף
- issue: Relación entre obediencia y juicio
  english_pob_reading: Because you did not obey... therefore Yahweh has done this thing to you today
  chosen_spanish_reading: Porque no obedeciste... por eso Yahvé ha hecho esto para ti hoy
  alternative_spanish_readings:
  - Ya que no obedeciste... por eso Yahvé ha hecho esto para ti hoy
  - Como no obedeciste... Yahvé ha hecho esto para ti hoy
  rationale: 'La relación causal del hebreo debe quedar explícita: la desobediencia de Saúl fundamenta el juicio anunciado. «Porque... por eso...» reproduce bien esa progresión.'
  doctrine_reference: Covenant judgment in 1 Samuel 28:18
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de una formulación más literal («burning anger») a una más natural («fierce anger»). La versión española sigue esa revisión, evitando calcar la imagen de «ira ardiente» como opción principal, pero sin perder el matiz de intensidad del hebreo חֲרוֹן אַף.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יְהוָה, conforme a la política del proyecto.
  - Se mantiene «Amalec» como nombre propio tradicional en español.
  - «Por eso» y «porque» reflejan con claridad la cadena causal del hebreo.
  - La nota al pie preserva una alternativa lexical importante sin introducir una divergencia doctrinal.
