  - "Se usa \"Egipto\" sin sustituciones lit\0fargicas."
  - La nota textual conserva la variante antigua sin mezclarla con el cuerpo principal.
  - "No se emplea \"SE\0d1OR\" ni terminolog\0eda ajena al vers\0edculo."
