translation:
  language: es
  text: Mi pueblo es destruido por falta de conocimiento[a]. Porque tú has rechazado el conocimiento, yo también te rechazo de ser sacerdote para mí. Puesto que has olvidado la ley de tu Dios[b], yo también olvidaré tu descendencia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perece», «es silenciado» o «es cortado» para נִדְמוּ.
    reason: lexical_alternative
  - marker: b
    text: «Ley» traduce el hebreo torá, que también puede significar «instrucción».
    reason: lexical_alternative
  - marker: c
    text: O «tus hijos» si el plural masculino se toma de manera más estrecha.
    reason: lexical_alternative
lexical_decisions:
- source_word: נִדְמוּ
  english_pob_choice: are destroyed
  chosen_spanish: es destruido
  alternatives_spanish:
  - perece
  - es silenciado
  - es cortado
  lexicon: HALOT
  rationale: El nifal de דמה aquí se entiende en contexto como ruina o perecimiento, no como mera falta de sonido. En español, «es destruido» conserva la fuerza judicial del juicio profético y funciona bien en un presente resultativo.
- source_word: מִבְּלִי הַדָּעַת
  english_pob_choice: for lack of knowledge
  chosen_spanish: por falta de conocimiento
  alternatives_spanish:
  - porque no hay conocimiento
  - sin conocimiento
  lexicon: HALOT
  rationale: El giro expresa privación o carencia. «Por falta de conocimiento» es natural en español y mantiene la idea de ausencia causal sin ampliar el sentido.
- source_word: הַדָּעַת / הַדַּעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - el conocimiento
  - entendimiento
  lexicon: HALOT
  rationale: «Conocimiento» preserva el campo léxico sin añadir explícitamente «de Dios», que no aparece en la cláusula hebrea. En Oseas, este conocimiento tiene peso pactal y moral, y el español «conocimiento» permite esa carga.
- source_word: מָאַסְתָּ
  english_pob_choice: have rejected
  chosen_spanish: has rechazado
  alternatives_spanish:
  - has desechado
  - has despreciado
  - has rehusado
  lexicon: HALOT
  rationale: מאס expresa rechazo con desdén o repudio. «Has rechazado» es claro y fuerte, y reproduce bien la reciprocidad del juicio que sigue.
- source_word: וְאֶמְאָסְאֲךָ
  english_pob_choice: I also reject you
  chosen_spanish: yo también te rechazaré
  alternatives_spanish:
  - yo también te desecharé
  - yo también te despreciaré
  lexicon: HALOT
  rationale: La forma primera persona imperfecta transmite la respuesta judicial de Yahvé. «Yo también te rechazaré» conserva la simetría con el rechazo previo y evita sobreinterpretar con verbos más intensos o más débiles.
- source_word: מִכַּהֵן לִי
  english_pob_choice: from being priest to me
  chosen_spanish: para que no seas sacerdote para mí
  alternatives_spanish:
  - de ser sacerdote para mí
  - de ejercer como sacerdote para mí
  lexicon: HALOT
  rationale: La construcción indica exclusión del ministerio sacerdotal. En español, «para que no seas sacerdote para mí» comunica de manera fiel y natural la privación de esa función cultual sin añadir una paráfrasis demasiado amplia.
- source_word: וַתִּשְׁכַּח
  english_pob_choice: you have forgotten
  chosen_spanish: olvidaste
  alternatives_spanish:
  - has olvidado
  - olvidaste y dejaste de lado
  - descuidaste
  lexicon: HALOT
  rationale: Aunque la forma hebrea es wayyiqtol, en la acusación profética funciona como un hecho culpable ya ocurrido. «Olvidaste» mantiene la correspondencia verbal y la acusación directa en español.
- source_word: תּוֹרַת אֱלֹהֶיךָ
  english_pob_choice: the law of your God
  chosen_spanish: la ley de tu Dios
  alternatives_spanish:
  - la instrucción de tu Dios
  - la Torá de tu Dios
  lexicon: HALOT
  rationale: «Torá» puede significar instrucción, pero en este contexto profético y de alianza «ley» transmite el peso normativo más reconocible en español. Se mantiene la referencia a «tu Dios» como en el hebreo.
- source_word: אֶשְׁכַּח
  english_pob_choice: I also will forget
  chosen_spanish: yo también olvidaré
  alternatives_spanish:
  - yo también pasaré por alto
  - yo también dejaré de recordar
  lexicon: HALOT
  rationale: La respuesta divina reproduce el verbo del reproche humano. «Yo también olvidaré» conserva la simetría retórica y la fuerza de retribución.
- source_word: בָּנֶיךָ
  english_pob_choice: your children
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus niños
  - tu descendencia
  - tus hijos e hijas
  lexicon: HALOT
  rationale: El plural masculino puede funcionar de manera colectiva, pero el español bíblico también permite «hijos» como descendencia. Dado que la forma hebrea es masculina plural, esta versión conserva el paralelo formal sin imponer una expansión explícita.
theological_decisions:
- issue: Sentido de «conocimiento» en el pleito de pacto de Oseas
  english_pob_reading: Rendered simply as 'knowledge' without expanding to 'knowledge of God' in the main text
  chosen_spanish_reading: Se traduce simplemente como «conocimiento» sin expandir a «conocimiento de Dios» en el texto principal
  alternative_spanish_readings:
  - conocimiento de Dios
  rationale: Aunque el contexto de Oseas da al término una densidad relacional y pactal, el hebreo del versículo dice solo «conocimiento». Mantener «conocimiento» respeta el alcance exacto del texto y deja la implicación teológica al contexto inmediato.
  doctrine_reference: Translation philosophy §1, §3
- issue: Destinatario singular de las acusaciones
  english_pob_reading: Addressed to the priestly representative as singular 'you'
  chosen_spanish_reading: Se mantiene el singular «tú / te / tu»
  alternative_spanish_readings:
  - ustedes / vosotros
  - singular representativo del sacerdocio
  rationale: La forma verbal hebrea es singular y la frase «para mí» apunta a un destinatario sacerdotal específico o representativo. El español conserva ese singular sin resolver más allá de lo que permite el texto.
  doctrine_reference: Translation philosophy §3
- issue: Traducción de בָּנֶיךָ
  english_pob_reading: your children
  chosen_spanish_reading: «tus hijos» como descendencia colectiva
  alternative_spanish_readings:
  - tus hijos y descendientes
  - tus hijos
  rationale: El plural masculino hebreo puede abarcar la descendencia en conjunto. «Tus hijos» conserva la relación familiar y la simetría del juicio sin introducir una expansión interpretativa innecesaria.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La versión española sigue de cerca la revisión más reciente del audit trail inglés al reflejar la cláusula sacerdotal como exclusión de ser sacerdote para Yahvé, y mantiene la simetría entre «rechazado / rechazaré» y «olvidaste / olvidaré». También preserva la ambigüedad lexical de נִדְמוּ y תּוֹרָה mediante notas, sin suavizar el juicio profético.
  spanish_consistency_notes:
  - Se usa «Yahvé» conforme al estándar del proyecto, aunque este versículo no contiene el Tetragrámaton explícito; aquí el sujeto divino se expresa por pronombre en primera persona.
  - Se prefirió «ley» en el texto principal por claridad bíblica en español, con nota de que torá también puede ser «instrucción».
  - Se mantuvo el verbo de reciprocidad con una forma futura en la segunda mitad para reflejar el paralelo judicial del hebreo y del audit trail inglés.
  - Se evitó «Cristo» y cualquier terminología eclesiástica no presente en el hebreo; «sacerdote» y «conocimiento» conservan el marco cultual y pactal del pasaje.
