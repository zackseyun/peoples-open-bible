theological_decisions:
- issue: 22:31의 ὑμᾶς는 복수 ― 사탄이 베드로뿐 아니라 열둘 전체를 요구
  chosen_reading: 여러분 모두를
  alternative_readings:
  - 너를
  - 당신을
  rationale: ἐξῃτήσατο의 목적어 ὑμᾶς는 복수형이며, 사탄이 열두 제자 전체에 대한 키질을 요구한 것을 분명히 한다. 그러나 다음 절(σοῦ, σύ)에서 단수로 베드로 한 사람을 향한다는 누가의 정밀한 변환을 보존한다.
  doctrine_reference: DOCTRINE.md §1 author intent — preserve 2nd-person number distinction
