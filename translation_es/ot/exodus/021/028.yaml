  text: וְ/כִֽי יִגַּ֨ח שׁ֥וֹר אֶת אִ֛ישׁ א֥וֹ אֶת אִשָּׁ֖ה וָ/מֵ֑ת סָק֨וֹל יִסָּקֵ֜ל הַ/שּׁ֗וֹר וְ/לֹ֤א יֵאָכֵל֙ אֶת בְּשָׂר֔/וֹ וּ/בַ֥עַל הַ/שּׁ֖וֹר נָקִֽי־־־־׃
