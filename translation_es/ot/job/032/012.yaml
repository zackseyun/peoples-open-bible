translation:
  language: es
  text: Presté mucha atención a ustedes[a], y he aquí que no había entre ustedes nadie que refutara a Job[b], que respondiera a sus palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Los escuché con atención». El verbo hebreo puede expresar atención cuidadosa u observación detenida.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que reprendiera/corrigiera a Job». El término hebreo puede referirse a refutar en un debate o a reprender moralmente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָדֵיכֶם / אֶתְבּוֹנָן
  english_pob_choice: I paid close attention to you
  chosen_spanish: Presté mucha atención a ustedes
  alternatives_spanish:
  - Les presté atención
  - Les escuché con atención
  - Puse mucha atención en ustedes
  lexicon: HALOT
  rationale: El verbo hebreo expresa consideración atenta u observación cuidadosa; en este contexto discursivo, la idea es que Elihú escuchó con atención a sus interlocutores. «Presté mucha atención a ustedes» conserva el énfasis en la atención cuidadosa sin sonar mecánico en español.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y miren
  - y vean
  lexicon: HALOT
  rationale: La expresión funciona como marcador discursivo que introduce una conclusión evaluativa. «Y he aquí» es comprensible en español bíblico contemporáneo y conserva el tono de sorpresa o constatación del hebreo.
- source_word: אֵין לְאִיּוֹב מוֹכִיחַ
  english_pob_choice: there was no one among you to refute Job
  chosen_spanish: no había entre ustedes nadie que refutara a Job
  alternatives_spanish:
  - no había entre ustedes nadie que reprendiera a Job
  - no había entre ustedes nadie que corrigiera a Job
  - Job no tenía quien lo refutara
  lexicon: HALOT
  rationale: מוֹכִיחַ puede significar el que reprende, argumenta o prueba que otro está equivocado. En un contexto de debate, «refutara» comunica mejor la fuerza forense del término que una simple reprensión moral.
- source_word: עוֹנֶה אֲמָרָיו
  english_pob_choice: to answer his words
  chosen_spanish: ni que respondiera sus palabras
  alternatives_spanish:
  - ni que contestara sus palabras
  - ni que respondiera a lo que él dijo
  - ni que replicara sus palabras
  lexicon: HALOT
  rationale: ענה con «palabras» indica responder a lo dicho por Job. «Respondiera sus palabras» mantiene la cercanía a la construcción hebrea y suena natural en español bíblico.
- source_word: מִכֶּם
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - de ustedes
  - en medio de ustedes
  lexicon: HALOT
  rationale: 'En una construcción negativa existencial, el sentido es distributivo: no había nadie dentro del grupo. «Entre ustedes» es la forma más idiomática y precisa en español.'
translation_notes:
  revision_awareness: Se siguió el giro revisado del registro inglés («paid close attention to you») para evitar una calca rígida y conservar un tono formal y natural. También se mantuvo la equivalencia de «refute» como término de disputa, sin borrar la posible lectura alternativa de reprensión indicada por el audit trail.
  spanish_consistency_notes:
  - Se emplea «Yahvé» cuando el texto fuente requiere el nombre divino; aquí no aparece.
  - Se usa «refutar» para preservar la fuerza argumentativa de מוֹכִיחַ en un contexto de debate.
  - Se conserva «he aquí» como marcador discursivo bíblico, no como arcaísmo innecesario.
