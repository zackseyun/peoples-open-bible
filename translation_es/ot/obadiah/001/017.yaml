revisions:
- from: Pero en el monte Sión habrá escape[a], y será santo[c][b], y la casa de Jacob poseerá sus propias posesiones.
  to: Pero en el monte Sión habrá los que escapen[a], y será santo[c][b], y la casa de Jacob poseerá sus propias posesiones.
  rationale: Se reemplaza «habrá escape» por «habrá los que escapen» para seguir la decisión final del POB y evitar un calco poco idiomático. Se corrige la nota léxica con español natural («liberación»). Se normaliza la nota c. Se mantiene «será santo» y «sus propias posesiones» porque conservan bien el sentido y el énfasis del texto auditado. Aunque el hebreo tiene verbo plural en la última cláusula, el ajuste mínimo pedido aquí se concentra en la reparación principal del texto; si se hace una revisión editorial posterior, podría considerarse «poseerán» para reflejar más de cerca la forma hebrea.
  reviewer_model: gpt-5.4
