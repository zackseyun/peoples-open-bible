translation:
  language: es
  text: 'Hizo como había dicho y la hizo entrar allí[a]; y ella lloró. Entonces recibió las lágrimas de su hija y le dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «las lágrimas de su hija», con un pronombre formalmente femenino. En el contexto, se entiende que se refiere a la hija de Ragüel, es decir, Sara.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν
  english_pob_choice: did
  chosen_spanish: hizo
  alternatives_spanish:
  - actuó
  - realizó
  lexicon: BDAG
  rationale: En la secuencia narrativa, ἐποίησεν ὡς εἶπεν se expresa de manera natural y fiel en español como «hizo como había dicho», conservando el valor simple de ποιέω sin añadir matices no presentes.
- source_word: ὡς εἶπεν
  english_pob_choice: as he said
  chosen_spanish: como había dicho
  alternatives_spanish:
  - como dijo
  - tal como había dicho
  lexicon: BDAG
  rationale: El pluscuamperfecto español comunica bien la anterioridad implícita del dicho respecto de la acción. Mantiene la relación temporal y el tono narrativo sin sobreexplicar.
- source_word: εἰσήγαγεν
  english_pob_choice: brought her in
  chosen_spanish: la llevó
  alternatives_spanish:
  - la introdujo
  - la condujo
  lexicon: BDAG
  rationale: En español, «la llevó allí» reproduce con naturalidad el movimiento de entrada al lugar indicado. «Introdujo» sería más literal pero menos idiomático en este contexto narrativo.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en aquel lugar
  lexicon: BDAG
  rationale: «Allí» preserva la referencia locativa explícita del griego y suena natural en español narrativo.
- source_word: ἔκλαυσεν
  english_pob_choice: she wept
  chosen_spanish: ella lloró
  alternatives_spanish:
  - ella se puso a llorar
  - ella lloró amargamente
  lexicon: BDAG
  rationale: La forma singular apunta a la mujer mencionada inmediatamente antes. «Lloró» es claro, sobrio y suficientemente solemne en español contemporáneo.
- source_word: ἀπεδέξατο
  english_pob_choice: received
  chosen_spanish: recibió
  alternatives_spanish:
  - acogió
  - aceptó
  lexicon: BDAG
  rationale: «Recibió» conserva el valor básico de δέχομαι con el prefijo intensivo y permite la imagen de recibir sus lágrimas sin convertirla en una paráfrasis excesiva.
- source_word: τὰ δάκρυα
  english_pob_choice: the tears
  chosen_spanish: las lágrimas
  alternatives_spanish:
  - los lloros
  - sus lágrimas
  lexicon: BDAG
  rationale: El artículo griego puede conservarse naturalmente como plural definido en español. «Las lágrimas» mantiene la concreción del sustantivo sin introducir un posesivo no expresado explícitamente en esta forma nominal.
- source_word: τῆς θυγατρὸς αὐτῆς
  english_pob_choice: of his daughter
  chosen_spanish: de su hija
  alternatives_spanish:
  - de la hija de ella
  - de su hija propia
  lexicon: BDAG
  rationale: Aunque el griego transmitido presenta un pronombre femenino, el contexto narrativo identifica a Ragüel como el sujeto que actúa y consuela. En español, «su hija» refleja esa resolución contextual de manera menos confusa que una traducción estrictamente formal.
- source_word: εἶπεν αὐτῇ
  english_pob_choice: said to her
  chosen_spanish: le dijo
  alternatives_spanish:
  - habló con ella
  - le habló
  lexicon: BDAG
  rationale: La fórmula introductoria del discurso se vierte de modo estándar y conciso. «Le dijo» deja lista la continuación directa del habla en el versículo siguiente.
theological_decisions:
- issue: Resolución contextual del posesivo en τῆς θυγατρὸς αὐτῆς
  english_pob_reading: Render contextually as 'his daughter'
  chosen_spanish_reading: «su hija» entendida contextualmente como la hija de Ragüel
  alternative_spanish_readings:
  - «de la hija de ella» como reflejo formal del pronombre femenino
  - «su hija» sin resolución explícita
  rationale: La lectura griega transmitida tiene una tensión pronominal que, en contexto narrativo, apunta al padre que recibe y consuela. En español conviene mantener la coherencia del episodio sin borrar la dificultad textual, pero tampoco creando una ambigüedad artificial que oscurezca el sentido narrativo inmediato.
  doctrine_reference: Translation philosophy §1, primacía del original; §5, consistencia terminológica con excepciones documentadas.
translation_notes:
  revision_awareness: Se siguió el estado más reciente del expediente, que indica que no hubo cambios adicionales tras la última revisión. La única tensión relevante sigue siendo la resolución contextual del posesivo en τῆς θυγατρὸς αὐτῆς.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y narrativo, adecuado para un pasaje de prosa antigua.
  - Se prefirió «hizo como había dicho» para conservar la secuencia griega sin calco rígido.
  - Se resolvió el referente de la hija de modo contextual, como en el audit trail inglés, y se documentó en nota.
  - No se introdujeron títulos eclesiásticos ni ampliaciones doctrinales ajenas al verso.
