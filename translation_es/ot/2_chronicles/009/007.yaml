translation:
  language: es
  text: ¡Bienaventurados tus hombres[a], y bienaventurados estos tus siervos, que están en tu presencia[b] continuamente y oyen tu sabiduría!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Felices son tus hombres». El hebreo אַשְׁרֵי puede denotar tanto felicidad o ventura como bienaventuranza.
    reason: lexical_alternative
  - marker: b
    text: «Estar en tu presencia» es una expresión cortesana para asistir a un rey en su presencia.
    reason: cultural_note
lexical_decisions:
- source_word: אַשְׁרֵי
  english_pob_choice: Blessed are
  chosen_spanish: ¡Bienaventurados…!
  alternatives_spanish:
  - ¡Felices…!
  - ¡Dichosos…!
  lexicon: HALOT
  rationale: El hebreo אַשְׁרֵי expresa una condición envidiable de dicha o ventura. «Bienaventurados» conserva el tono elevado de bendición real y sigue siendo natural en español eclesial, sin reducir el sentido a simple emoción.
- source_word: אֲנָשֶׁיךָ
  english_pob_choice: your men
  chosen_spanish: tus hombres
  alternatives_spanish:
  - tu gente
  - tus servidores
  lexicon: HALOT
  rationale: אֲנָשִׁים es el término ordinario para «hombres». «Tus hombres» mantiene la referencia masculina y la cercanía al hebreo; «tu gente» ampliaría indebidamente el referente, y «tus servidores» ya corresponde mejor al segundo miembro.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus esclavos
  - tus oficiales
  lexicon: HALOT
  rationale: En este contexto de corte real, el énfasis no parece estar en la condición servil en sentido de esclavitud, sino en el servicio de palacio. «Siervos» comunica bien esa relación en español; «esclavos» sería demasiado fuerte aquí, aunque queda como alternativa léxica documentada.
- source_word: הָעֹמְדִים לְפָנֶיךָ
  english_pob_choice: who stand before you
  chosen_spanish: que están delante de ti
  alternatives_spanish:
  - que te asisten
  - que sirven en tu presencia
  lexicon: HALOT
  rationale: La expresión hebrea es un modismo cortesano para estar al servicio o en audiencia delante de un rey. «Están delante de ti» conserva la imagen literal y en español suena natural; la idea de servicio queda reforzada por el contexto inmediato.
- source_word: תָּמִיד
  english_pob_choice: continually
  chosen_spanish: continuamente
  alternatives_spanish:
  - siempre
  - constantemente
  lexicon: HALOT
  rationale: «Continuamente» reproduce el valor de continuidad o regularidad del adverbio sin exagerar una presencia ininterrumpida absoluta. Encaja con el registro formal del pasaje.
- source_word: וְשֹׁמְעִים
  english_pob_choice: and hear
  chosen_spanish: y oyen
  alternatives_spanish:
  - y escuchan
  - y atienden
  lexicon: HALOT
  rationale: El participio de שׁמע puede significar oír o escuchar. «Oyen» mantiene la concisión del hebreo; en este contexto implica recepción atenta de la sabiduría del rey.
- source_word: חָכְמָתֶךָ
  english_pob_choice: your wisdom
  chosen_spanish: tu sabiduría
  alternatives_spanish:
  - la sabiduría que posees
  - tu conocimiento sabio
  lexicon: HALOT
  rationale: La expresión denota la sabiduría atribuida a Salomón. «Tu sabiduría» es la traducción directa y clara, sin añadir matices que el texto no exige.
translation_notes:
  revision_awareness: El texto inglés auditado está en acuerdo alto y sin cambios sustantivos en la última revisión; se ha preservado la estructura de bendición doble, la imagen cortesana de «estar delante» del rey y la ambigüedad léxica básica de אַשְׁרֵי mediante una nota alternativa en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la distinción entre «hombres» y «siervos», reflejando los dos sustantivos hebreos distintos.
  - Se eligió «bienaventurados» para el paralelismo formal y el registro bíblico, con nota alternativa sobre la posible lectura de «felices».
  - La frase «están delante de ti» retiene el hebraísmo cortesano sin perder inteligibilidad en español.
