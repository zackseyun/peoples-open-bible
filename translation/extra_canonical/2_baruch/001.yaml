translation:
  text: '1 In the twenty-fifth year of Jeconiah king of Judah[a], the word of the Lord came upon Baruch son of Neriah, and he said to him,

    2 “I have seen all that this people has done to me—the evils that these two tribes which remained have done, more than the ten tribes that were carried away captive.

    3 For the former tribes were compelled by their kings to sin, but these two tribes themselves urged and compelled their kings to sin.

    4 Therefore behold, I am bringing evil upon this city and upon its inhabitants, and it shall be removed from before me for a time, and I will scatter this people among the nations, that they may be a reproach among the nations.

    5 And my people shall be afflicted[b][c][c], and the time will come when they will seek the prosperity of their times.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The “two tribes” are Judah and Benjamin, contrasted with the ten northern tribes already taken into exile.
    reason: cultural_note
    anchor_ref: '1:2'
  - marker: c
    text: The Syriac verb in the closing clause is difficult. Its basic sense is something like “be useful / profitable,” and editors differ on how best to smooth it in context.
    reason: textual_variant
    anchor_ref: '1:4'
  - marker: c
    text: “For a time” signals that Jerusalem’s removal is not presented here as final, but as part of a temporary judgment.
    reason: cross_reference
    anchor_ref: '1:4'
  - marker: b
    text: Or 'that it may prove useful among the nations.'.
    reason: previous_rendering
lexical_decisions:
- source_word: ܫܪ̈ܒܢ / ܫܪ̈ܒܬܐ
  chosen: tribes
  alternatives:
  - clans
  - families
  rationale: In context the contrast is between the two remaining tribes and the ten exiled tribes, so “tribes” best preserves the historical-political frame.
- source_word: ܐܫܬܒܝܘ
  chosen: were carried away captive
  alternatives:
  - were led away captive
  - were exiled
  rationale: Keeps the captivity imagery explicit rather than flattening it into a general exile formula.
- source_word: ܐܬܐܠܨܘ / ܐܠܨܘ
  chosen: were driven / compelled
  alternatives:
  - were forced / forced
  - were pressured / pressured
  rationale: The paired verbs emphasize coercion in sin; “driven” and “compelled” preserve the force without sounding too mechanical.
- source_word: ܢܘܬܪ
  chosen: may prove useful
  alternatives:
  - may benefit
  - may be of profit
  rationale: The clause is difficult, but the underlying sense seems to point toward usefulness or profit among the nations; this keeps that basic idea while staying readable.
- source_word: ܡܘܨܠܚܘܬܗܘܢ ܕܙܒܢܝ̈ܗܘܢ
  chosen: the prosperity of their times
  alternatives:
  - the welfare of their age
  - the good of their season
  rationale: A deliberately literal rendering that preserves the temporal horizon of the promise without overdefining it as explicitly messianic.
