translation:
  language: es
  text: 'Y le dijo[c]: «¿Buscas una tribu y una línea familiar[a], o un hombre asalariado que vaya con tu hijo?» Y Tobit le dijo: «Quiero saber[b], hermano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Línea familiar» traduce el valor genealógico de πατριά; no pretende separar dos categorías rígidas en español moderno, sino reflejar el paralelismo del griego con «tribu».
    reason: lexical_alternative
  - marker: b
    text: 'El griego es algo elíptico al final: literalmente, «Quiero, hermano». Se añade «saber» desde la pregunta precedente para hacer explícito el sentido.'
    reason: lexical_alternative
  - marker: c
    text: El texto fuente de este versículo presenta una pequeña discrepancia en la confianza de la transcripción, pero el sentido general es claro.
    reason: textual_variant
lexical_decisions:
- source_word: Φυλήν
  english_pob_choice: tribe
  chosen_spanish: tribu
  alternatives_spanish:
  - clan
  lexicon: LSJ
  rationale: φυλή designa un grupo tribal o de parentesco; «tribu» preserva mejor el valor social y genealógico que «clan» en español.
- source_word: πατριὰν
  english_pob_choice: family line
  chosen_spanish: línea familiar
  alternatives_spanish:
  - linaje
  - familia
  - ascendencia
  lexicon: LSJ
  rationale: πατριά expresa linaje o descendencia familiar. «Línea familiar» comunica con naturalidad la identidad genealógica que el griego sugiere junto a «tribu».
- source_word: μίσθιον
  english_pob_choice: a hired man
  chosen_spanish: un hombre asalariado
  alternatives_spanish:
  - un jornalero
  - un contratado
  - un hombre a sueldo
  lexicon: LSJ
  rationale: El término señala a alguien contratado por paga. «Hombre asalariado» conserva ese sentido sin introducir la carga despectiva posible de «mercenario» o «sirviente».
- source_word: συμπορεύσεται
  english_pob_choice: will go with
  chosen_spanish: vaya con
  alternatives_spanish:
  - viaje con
  - acompañe a
  - camine con
  lexicon: LSJ
  rationale: El verbo significa ir junto con o acompañar. En español, «vaya con» es natural y mantiene la idea de compañía en el viaje.
- source_word: Βούλομαι
  english_pob_choice: I want to know
  chosen_spanish: Quiero saber
  alternatives_spanish:
  - Deseo saber
  - Quiero
  lexicon: LSJ
  rationale: Como en el griego la réplica es elíptica, «Quiero saber» explicita el objeto implícito a partir de la pregunta anterior, sin exceder el sentido.
- source_word: ἀδελφέ
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - amigo
  lexicon: LSJ
  rationale: La forma es literalmente «hermano»; aunque funciona como tratamiento cortés, se conserva la literalidad para transparencia textual.
translation_notes:
  revision_awareness: El audit trail inglés mantiene la lectura óptima de una respuesta elíptica y una diferenciación social/genealógica entre los dos sustantivos. Esta versión española conserva esa relación, evita la paráfrasis excesiva y resuelve la elipsis con una adición mínima y transparentemente marcada.
  spanish_consistency_notes:
  - Se mantiene «Tobit» para el nombre propio conforme al expediente en inglés.
  - Se usa un registro moderno y digno, evitando arcaísmos innecesarios.
  - Se conserva la literalidad de «hermano» por transparencia, aunque el contexto lo haga un trato cortés.
  - Se evita «SEÑOR» o formulaciones doctrinalizadas porque el versículo no lo requiere.
