translation:
  language: es
  text: Entonces tomarán todos los utensilios del servicio con los que ministran en el santuario, y los pondrán en una tela azul, y los cubrirán con una cubierta de cuero fino[a], y los pondrán sobre el armazón de transporte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo תָּחַשׁ (tahash) es incierto; puede referirse a la piel de un animal específico o a un tipo de cuero fino o durable.
    reason: lexical_alternative
  - marker: b
    text: 'O: «sobre el palo de transporte». El hebreo usa el singular «palo/barra», que puede representar el aparato de carga.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקְחוּ
  english_pob_choice: Then they shall take
  chosen_spanish: Entonces tomarán
  alternatives_spanish:
  - Y tomarán
  - Entonces han de tomar
  lexicon: HALOT
  rationale: El waw consecutivo en instrucciones procedimentales expresa secuencia; «Entonces» conserva ese avance sin volverlo mecánico. «Tomarán» reproduce el valor directivo/futuro del contexto ritual.
- source_word: כָּל כְּלֵי הַשָּׁרֵת
  english_pob_choice: all the utensils of service
  chosen_spanish: todos los utensilios del servicio
  alternatives_spanish:
  - todos los utensilios de servicio
  - todos los vasos del servicio
  - todos los implementos del servicio
  lexicon: HALOT
  rationale: כְּלִי puede ser utensilio, vaso o implemento; aquí se trata de objetos del ministerio del tabernáculo. «Utensilios del servicio» mantiene la función cultual y sigue de cerca la decisión inglesa revisada.
- source_word: אֲשֶׁר יְשָׁרְתוּ בָם
  english_pob_choice: with which they minister
  chosen_spanish: con los que ministran
  alternatives_spanish:
  - con los que sirven
  - por medio de los cuales ministran
  lexicon: HALOT
  rationale: שרת en contexto cultual implica ministrar/servir en tarea sagrada. «Ministran» conserva el registro litúrgico sin caer en una formulación anticuada.
- source_word: בַּקֹּדֶשׁ
  english_pob_choice: in the sanctuary
  chosen_spanish: en el santuario
  alternatives_spanish:
  - en el lugar santo
  - en lo santo
  lexicon: HALOT
  rationale: En este contexto se refiere al ámbito sagrado donde se usan estos objetos, no necesariamente a una sola estancia interior. «Santuario» es claro y cultualmente preciso en español.
- source_word: בֶּגֶד תְּכֵלֶת
  english_pob_choice: a blue cloth
  chosen_spanish: una tela azul
  alternatives_spanish:
  - un paño azul
  - una tela de azul
  lexicon: HALOT
  rationale: בֶּגֶד aquí funciona como tela/tejido para envolver. «Tela azul» es natural en español y preserva el color característico de תְּכֵלֶת sin añadir matices innecesarios.
- source_word: מִכְסֵה עוֹר תָּחַשׁ
  english_pob_choice: a covering of fine leather
  chosen_spanish: una cubierta de cuero fino
  alternatives_spanish:
  - una cubierta de piel de tahash
  - una cubierta de cuero durable
  - una cubierta de piel fina
  lexicon: HALOT
  rationale: El término תָּחַשׁ es incierto; el inglés opta por una solución funcional para no imponer una identificación zoológica especulativa. «Cuero fino» comunica una cubierta protectora de calidad, mientras la nota preserva la ambigüedad léxica.
- source_word: וְנָתְנוּ עַל הַמּוֹט
  english_pob_choice: and place them on the carrying frame
  chosen_spanish: y los pondrán sobre el marco para llevarlos
  alternatives_spanish:
  - y los pondrán sobre el palo de transporte
  - y los pondrán sobre el travesaño
  - y los pondrán sobre la barra para llevarlos
  lexicon: HALOT
  rationale: מּוֹט puede referirse a un palo/barra de transporte; el inglés lo interpretó funcionalmente. «Marco para llevarlos» refleja el aparato de carga de manera natural en español y evita la incomodidad de un singular literal con objetos plurales.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la última revisión inglesa: «utensilios del servicio» sin artículo añadido entre «de» y «servicio», y mantiene la secuencia procedimental del versículo. Se preserva la solución funcional para תָּחַשׁ y para הַמּוֹט, con nota donde el original es ambiguo.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - «Santuario» se usa como equivalente cultual general de בַּקֹּדֶשׁ.
  - «Ministran» conserva el matiz de servicio sagrado de שרת.
  - «Cuero fino» traduce funcionalmente el hebreo incierto תָּחַשׁ sin fijar especie.
  - «Marco para llevarlos» intenta reflejar el valor colectivo/funcional de הַמּוֹט en español natural.
