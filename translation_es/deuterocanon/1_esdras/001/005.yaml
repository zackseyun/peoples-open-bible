review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro POB en los puntos principales: γραφήν como ''escritura'', μεγαλειότητα como ''grandeza'', ἐν τῷ ἁγίῳ como ''santuario'', y υἱῶν Ἰσραήλ como ''hijos de Israel''. También respeta la compresión de la frase sobre la división ancestral sin añadir ''de servicio''. Sin embargo, ''permaneciendo'' no refleja bien στᾶντες, que denota estar/de pie o ponerse en pie, no permanencia durativa. Además, la inserción ''vosotros los levitas'' suena marcada y menos natural que un vocativo directo.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero tiene dos problemas de estilo y fidelidad: ''permaneciendo'' resulta semánticamente desviado y poco idiomático en este contexto litúrgico; y ''vosotros'' rompe el objetivo de español neutral latinoamericano. Conviene usar una forma más natural como ''estando de pie'' o ''puestos de pie'', y reemplazar ''vosotros/vuestra/vuestros'' por ''ustedes/su/sus'' o reestructurar para evitar el pronombre explícito.'
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. Se conserva 'hijos de Israel' según la política de expresiones familiares. 'Escritura' aquí puede mantenerse en minúscula por tratarse de un escrito/directiva y no de la Escritura canónica. La nota sobre 'santuario' está bien alineada. La nota sobre la frase comprimida también es adecuada.
  issues:
  - severity: medium
    issue: '''permaneciendo'' para στᾶντες'
    rationale: El participio griego expresa la postura de estar/de pie o ponerse en pie; 'permaneciendo' introduce la idea de duración o continuidad, no presente en el término base.
  - severity: medium
    issue: Uso de 'vosotros/vuestra/vuestros'
    rationale: 'Se aparta del estilo meta requerido: español neutral latinoamericano / ampliamente legible en iglesia. Debe evitarse el voseo peninsular/plural de España.'
  - severity: low
    issue: '''vosotros los levitas'' suena pesado'
    rationale: El vocativo puede expresarse de forma más natural como 'ustedes, levitas,' o integrarse sin pronombre explícito. Esto mejora la fluidez sin alterar el sentido.
