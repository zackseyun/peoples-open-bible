translation:
  language: es
  text: Yahvé es bueno para quienes[a] esperan en él, para el alma que lo busca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «ponen su esperanza en él»; el verbo hebreo incluye la idea de esperar con expectativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bondadoso
  - benéfico
  lexicon: HALOT
  rationale: '''Bueno'' es la equivalencia más directa y natural en español para describir el carácter de Yahvé en este contexto. Mantiene el rango semántico amplio del hebreo sin reducirlo a una sola cualidad moral o afectiva.'
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino según la norma del proyecto para יְהוָה. 'Yahvé' preserva el carácter personal del Tetragrama en lugar de sustituirlo por un título.
- source_word: לְקֹוָו
  english_pob_choice: to those who wait for him
  chosen_spanish: para los que lo esperan
  alternatives_spanish:
  - para los que esperan en él
  - para los que ponen su esperanza en él
  lexicon: HALOT
  rationale: El verbo קוה incluye la idea de esperar con expectativa. En español, 'lo esperan' comunica de forma natural esa espera confiada; la nota conserva la alternativa de esperanza explícita.
- source_word: לְנֶפֶשׁ
  english_pob_choice: to the soul
  chosen_spanish: para el alma
  alternatives_spanish:
  - para la persona
  - para la vida
  lexicon: HALOT
  rationale: '''Alma'' reproduce el valor poético e idiomático de נפש sin imponer una antropología técnica. Además, mantiene el paralelismo con la segunda cola de la línea.'
- source_word: תִּדְרְשֶׁנּוּ
  english_pob_choice: that seeks him
  chosen_spanish: que lo busca
  alternatives_spanish:
  - que lo procura
  - que lo indaga
  lexicon: HALOT
  rationale: דרש en este contexto tiene el sentido relacional de buscar a Dios. 'Lo busca' es fiel, conciso y idiomático en español, y conserva el paralelismo con 'lo esperan'.
theological_decisions:
- issue: Rendering of the divine name יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: La frase hebrea usa directamente el Tetragrama; por eso se traduce con el nombre divino y no con una sustitución titulativa. 'Yahvé' es la forma establecida en el proyecto y preserva la referencia al nombre del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Nuance of קוה
  english_pob_reading: wait for him
  chosen_spanish_reading: lo esperan
  alternative_spanish_readings:
  - ponen su esperanza en él
  - lo aguardan con esperanza
  rationale: El contexto de lamentación sugiere espera paciente y confiada. 'Lo esperan' conserva esa tensión sin perder naturalidad; la nota explicita la posibilidad semántica de esperanza activa.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, preserve theological/interpretive tension where genuine ambiguity exists
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail en su lectura principal: יְהוָה → Yahvé, קוה → esperar con expectativa y דרש → buscar en sentido relacional. No se detectaron revisiones aplicadas en el inglés; por eso la propuesta sigue de cerca el trazado auditado, manteniendo la ambigüedad de קוה en una nota.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como forma consistente del Nombre divino en el texto principal.
  - 'Se conserva el paralelismo poético con dos miembros: ''para los que lo esperan'' / ''para el alma que lo busca''.'
  - '''Alma'' se mantiene por fidelidad al registro poético de נפש.'
  - La nota al pie se ancla en 'lo esperan' porque ese es el punto donde la alternativa semántica de קוה resulta más relevante en español.
