translation:
  text: |-
    I say, "Sir[a], I do not understand these parables, nor am I able to grasp them unless you explain them[b] to me."
    
    He says, "I will explain everything to you, and whatever I speak with you I will show you. The one who has received the instructions of your prudence[c] will fill his own soul and will pray on your behalf to the Lord.
    
    "If, then, you complete the fast in this way as I commanded you, your sacrifice[h] will be acceptable with God, and this fast will be recorded[d]; and the service[e] performed in this way is good and cheerful[f] and welcome to the Lord.
    
    "You shall keep these things thus—you, with your children and your whole household; and having kept them you will be blessed; and as many as, on hearing them, keep them will be blessed—for from the Lord they will receive understanding[g], and it is from him that one receives it."
    
    I say to him, "Sir[a], since I have you with me, I must ask you and question you; for you show me everything and speak with me. But if apart from you I were seeing or hearing them, I would have asked the Lord to make them clear to me."
