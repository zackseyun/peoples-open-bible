translation:
  language: es
  text: Y Uzías lo llevó de la asamblea[a] a su casa, e hizo un banquete para los ancianos[b]; e invocaron al Dios de Israel para pedir ayuda durante toda aquella noche.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἐκκλησία significa aquí la asamblea reunida o congregación, no «iglesia» en un sentido cristiano posterior.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «hizo una bebida» o «ofreció una fiesta de bebida»; la expresión se refiere a ofrecer un banquete.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρέλαβεν
  english_pob_choice: took
  chosen_spanish: lo tomó
  alternatives_spanish:
  - lo recibió
  - lo llevó consigo
  lexicon: BDAG / LEH
  rationale: Aquí παραλαμβάνω expresa tomar a alguien y trasladarlo de un lugar a otro; «lo tomó» conserva la sencillez narrativa y el movimiento desde la asamblea hacia la casa.
- source_word: ἐκ τῆς ἐκκλησίας
  english_pob_choice: from the assembly
  chosen_spanish: de la asamblea
  alternatives_spanish:
  - de la congregación
  lexicon: LEH
  rationale: ἐκκλησία en este contexto es la asamblea reunida, no «iglesia» en sentido cristiano posterior. «Asamblea» evita anacronismo y sigue el valor comunitario/cívico del término.
- source_word: εἰς οἶκον ἑαυτοῦ
  english_pob_choice: into his house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su domicilio
  lexicon: LEH
  rationale: οἶκος señala la vivienda o casa del personaje. «A su casa» es natural en español y reproduce el traslado hacia el espacio doméstico.
- source_word: ἐποίησεν πότον
  english_pob_choice: made a feast
  chosen_spanish: hizo un banquete
  alternatives_spanish:
  - preparó un banquete
  - dio un banquete
  - hizo una fiesta
  lexicon: LEH
  rationale: El giro literal alude a una comida/bebida festiva. Como el audit trail inglés pasó de «drinking feast» a «feast», en español «hizo un banquete» conserva el carácter festivo y la formalidad sin forzar una explicación adicional en el texto principal.
- source_word: τοῖς πρεσβυτέροις
  english_pob_choice: for the elders
  chosen_spanish: para los ancianos
  alternatives_spanish:
  - para los presbíteros
  - para los líderes
  lexicon: BDAG
  rationale: En este relato se refiere a los dirigentes de la comunidad; «ancianos» es la forma española más directa y amplia para ese cargo/rol, sin introducir una terminología eclesiástica posterior.
- source_word: ἐπεκαλέσαντο
  english_pob_choice: called on
  chosen_spanish: llamaron
  alternatives_spanish:
  - invocaron
  - clamaron a
  lexicon: BDAG
  rationale: El medio denota acudir a Dios en oración. «Llamaron» reproduce la idea básica de invocar con una construcción natural en español; la complementación «en busca de ayuda» explicita el matiz de petición ya presente en εἰς βοήθειαν.
- source_word: τὸν θεὸν Ἰσραήλ
  english_pob_choice: the God of Israel
  chosen_spanish: al Dios de Israel
  alternatives_spanish:
  - al Dios de Israel
  lexicon: LEH
  rationale: Título genitivo directo; se mantiene la forma bíblica estándar en español sin desplazar el referente a una fórmula litúrgica distinta.
- source_word: εἰς βοήθειαν
  english_pob_choice: for help
  chosen_spanish: en busca de ayuda
  alternatives_spanish:
  - para ayuda
  - para socorro
  lexicon: BDAG
  rationale: La preposición expresa dirección/propósito hacia el auxilio divino. «En busca de ayuda» suena natural y conserva la orientación de súplica implícita en el griego.
- source_word: ὅλην τὴν νύκτα ἐκείνην
  english_pob_choice: all that night
  chosen_spanish: durante toda aquella noche
  alternatives_spanish:
  - toda aquella noche
  - a lo largo de toda aquella noche
  lexicon: BDAG
  rationale: La expresión marca duración. «Durante toda aquella noche» preserva el alcance temporal completo y mantiene un español fluido.
theological_decisions:
- issue: ἐκκλησία no como 'church' posterior, sino asamblea comunitaria
  english_pob_reading: Greek ἐκκλησία means the gathered assembly or congregation here, not 'church' in a later Christian sense.
  chosen_spanish_reading: asamblea
  alternative_spanish_readings:
  - congregación
  - iglesia
  rationale: Se conserva el sentido histórico del término en Judith sin cristianizarlo anacrónicamente. «Iglesia» se evita porque borraría la referencia a una reunión comunitaria concreta.
  doctrine_reference: Historia de la salvación / terminología bíblica sin anacronismo
- issue: πότον como banquete o fiesta de hospitalidad, no simplemente beber
  english_pob_reading: Literally, 'made a drinking feast' or 'made drink'; the phrase refers to hosting a banquet.
  chosen_spanish_reading: hizo un banquete
  alternative_spanish_readings:
  - dio un banquete
  - hizo una fiesta
  rationale: La frase griega es idiomática y apunta a hospitalidad festiva. En español se mantiene el valor narrativo y social del acto sin una traducción demasiado cruda o técnica.
  doctrine_reference: Fidelidad semántica e idiomatismo
translation_notes:
  revision_awareness: La redacción sigue el estado revisado del audit trail inglés, que cambió «banquet» por «feast» para hacer más natural la traducción de πότον. En español se optó por «hizo un banquete» para conservar el tono formal y la hospitalidad festiva, manteniendo la misma decisión de fondo. Se respetó además la distinción auditada entre ἐκκλησία como asamblea y no como iglesia posterior.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el tetragrama; aquí no ocurre.
  - Se usó «Dios de Israel» como título genitivo estándar, paralelo al inglés auditado.
  - Se evitó «iglesia» para ἐκκλησία a fin de no introducir una lectura eclesial posterior.
  - «Ancianos» refleja el rol comunitario; no se sustituyó por un tecnicismo eclesiástico.
  - 'La duración temporal se expresó con una locución natural en español: «durante toda aquella noche».'
