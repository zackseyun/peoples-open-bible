theological_decisions:
- issue: Referent of κακῶν
  chosen_reading: 'personal: ''the wicked'''
  alternative_readings:
  - 'abstract: ''evils'''
  rationale: The proverb contrasts harmful speech with the swift collapse associated with wicked people. Rendering the genitive personally yields a coherent wisdom saying in English. The abstract reading is possible grammatically but less natural in context.
