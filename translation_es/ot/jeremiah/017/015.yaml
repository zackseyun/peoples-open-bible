revisions:
- from: '¡Miren![a] Ellos me dicen: «¿Dónde está la palabra de Yahvé? ¡Que venga ahora!»'
  to: 'Mira, ellos me dicen: «¿Dónde está la palabra de Yahvé?[a] ¡Que venga ahora!»'
  rationale: Se ajusta הִנֵּה a una llamada de atención más natural en español («Mira,»), se conserva el énfasis de הֵמָּה con «ellos», y se reemplaza la nota redundante por la alternativa léxica significativa documentada en la auditoría inglesa para דְבַר יְהוָה.
