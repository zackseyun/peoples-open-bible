translation:
  language: es
  text: Sin embargo, tú no edificarás la casa; sino que tu hijo, que viene de tu propio cuerpo[a], él edificará la casa para mi nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «que sale de tus lomos», un modismo que significa tu propia descendencia física.
    reason: lexical_alternative
lexical_decisions:
- source_word: רַק
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Solamente
  - Pero
  lexicon: HALOT
  rationale: La partícula introduce una concesión o restricción respecto de lo dicho antes. «Sin embargo» comunica bien ese giro concesivo en español natural, sin perder la relación con la aprobación previa de la intención de David.
- source_word: לֹא תִבְנֶה
  english_pob_choice: you shall not build
  chosen_spanish: tú no edificarás
  alternatives_spanish:
  - no construirás
  - no edificarás la casa
  lexicon: HALOT
  rationale: El hebreo expresa una prohibición/decreto con matiz futuro. «No edificarás» conserva el tono solemne y el verbo tradicional, mientras que la negación personal «tú» refleja el énfasis del sujeto.
- source_word: הַבָּיִת
  english_pob_choice: the house
  chosen_spanish: la casa
  alternatives_spanish:
  - el templo
  lexicon: HALOT
  rationale: Se mantiene el sustantivo «casa» para seguir de cerca el idioma del texto fuente y preservar la expresión teológica de una casa para Yahvé. «Templo» aclararía el referente, pero resolvería interpretivamente lo que el hebreo deja en forma de «casa».
- source_word: כִּי אִם
  english_pob_choice: rather
  chosen_spanish: sino que
  alternatives_spanish:
  - más bien
  - pero
  - excepto que
  lexicon: HALOT
  rationale: 'Aquí la construcción corrige y contrasta: no tú, sino tu hijo. «Sino que» expresa con naturalidad esa oposición correctiva en español, mejor que una simple coordinación adversativa.'
- source_word: בִּנְךָ
  english_pob_choice: your son
  chosen_spanish: tu hijo
  alternatives_spanish:
  - un hijo tuyo
  lexicon: HALOT
  rationale: El singular con sufijo apunta a un descendiente específico en el contexto, Salomón. «Tu hijo» es directo y fiel, sin añadir explicaciones que el verso no da.
- source_word: הַיֹּצֵא מֵחֲלָצֶיךָ
  english_pob_choice: who comes from your own body
  chosen_spanish: el que sale de tus lomos
  alternatives_spanish:
  - el que proviene de tu propio cuerpo
  - el que sale de tu cuerpo
  lexicon: HALOT
  rationale: Se conserva la imagen idiomática literal de «lomos», porque el hebreo habla de la descendencia física con esa expresión. Aunque suena más literal, mantiene la tensión lexical documentada por la POB entre idiomático y literal; «de tu propio cuerpo» sería una paráfrasis aclaratoria.
- source_word: הוּא
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: HALOT
  rationale: El pronombre independiente es enfático y subraya que ese hijo, y no David, edificará la casa. En español puede reflejarse con «él» y la repetición pronominal.
- source_word: יִבְנֶה הַבַּיִת
  english_pob_choice: he shall build the house
  chosen_spanish: edificará la casa
  alternatives_spanish:
  - construirá la casa
  - levantará la casa
  lexicon: HALOT
  rationale: Se conserva la repetición de «casa» y el sentido prospectivo/declarativo del verbo. «Edificará» mantiene un registro digno y bíblico sin mover el referente a «templo».
- source_word: לִשְׁמִי
  english_pob_choice: for my name
  chosen_spanish: para mi nombre
  alternatives_spanish:
  - en honor de mi nombre
  - por mi nombre
  - a mi nombre
  lexicon: HALOT
  rationale: La fórmula bíblica se conserva de manera transparente. «Para mi nombre» mantiene el valor idiomático del hebreo, donde el templo es edificado en relación con la presencia y el nombre de Yahvé.
theological_decisions:
- issue: Renderización de בַּיִת como «casa» y no como «templo»
  english_pob_reading: house
  chosen_spanish_reading: casa
  alternative_spanish_readings:
  - templo
  rationale: La lectura inglesa mantiene «house» por fidelidad al término hebreo y por su carga teológica. En español se conserva «casa» para no perder ese enlace conceptual, aun cuando el referente sea el templo de Yahvé.
  doctrine_reference: Translation philosophy §1, §5
- issue: Expresión de לִשְׁמִי como «para mi nombre»
  english_pob_reading: for my name
  chosen_spanish_reading: para mi nombre
  alternative_spanish_readings:
  - en honor de mi nombre
  - para honra de mi nombre
  rationale: La frase conserva el idioma bíblico del «nombre» de Dios sin explicitarlo en exceso. En este contexto, la casa se construye en relación con el nombre de Yahvé; traducirlo de forma más interpretativa debilitaría la fórmula.
  doctrine_reference: Translation philosophy §2, §5
- issue: Mantenimiento del idiomatismo de «lomos» para la descendencia física
  english_pob_reading: who comes from your own body
  chosen_spanish_reading: el que sale de tus lomos
  alternative_spanish_readings:
  - el que proviene de tu propio cuerpo
  - el que sale de tu cuerpo
  rationale: La POB inglesa documenta la metáfora corporal como un modismo de descendencia física. En español, «lomos» conserva la tensión entre literalidad e idiomatismo, y permite una nota aclaratoria sin borrar la imagen fuente.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La versión española sigue la revisión más reciente del POB inglés, que ajustó la participial «who comes» para sonar más natural y eliminó el guion largo; por eso se adoptó una subordinada descriptiva en español («el que sale de tus lomos») sin añadir marcas tipográficas innecesarias. También se preservó el orden concesivo-correctivo del verso: concesión inicial, prohibición para David, contraste con el hijo específico y conclusión enfática.'
  spanish_consistency_notes:
  - Se mantiene «casa» de manera consistente con la política POB de no resolver de forma interpretativa a «templo» en el texto principal.
  - Se conserva «nombre» en singular con valor teológico, conforme al uso bíblico del hebreo.
  - Se usa el pronombre enfático «él» para reflejar el énfasis del hebreo sin sobrerrepetición.
  - «Sin embargo» y «sino que» reproducen la relación lógica del hebreo sin mecanicismo.
  - La nota a pie de página usa un solo anclaje en «lomos» porque ahí recae la alternativa lexical relevante.
