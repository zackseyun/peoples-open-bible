translation:
  language: es
  text: 'Y Shimí dijo al rey[a]: «La palabra es buena. Tal como ha hablado mi señor el rey, así hará tu siervo». Y Shimí vivió en Jerusalén muchos días.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «El asunto es bueno» o «Lo que dices es bueno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב הַדָּבָר
  english_pob_choice: The word is good
  chosen_spanish: La palabra es buena
  alternatives_spanish:
  - El asunto es bueno
  - La cosa es buena
  - Lo que dices es bueno
  lexicon: HALOT
  rationale: דָּבָר puede significar 'palabra', 'asunto', 'cosa' o 'hecho'. Aquí Shimí responde a la condición expresada por el rey, y el POB inglés conservó la literalidad de 'word' para mantener la cercanía al hebreo. En español, 'la palabra es buena' suena natural y conserva esa misma relación directa con lo dicho por el rey.
- source_word: אֲדֹנִי הַמֶּלֶךְ
  english_pob_choice: my lord the king
  chosen_spanish: mi señor el rey
  alternatives_spanish:
  - mi amo el rey
  - mi señor, el rey
  lexicon: HALOT
  rationale: אֲדֹנִי es un tratamiento deferente equivalente a 'mi señor' en lenguaje cortesano. En español bíblico actual, 'mi señor el rey' conserva el tono de respeto sin introducir una formulación más dura como 'amo'.
- source_word: עַבְדֶּךָ
  english_pob_choice: your servant
  chosen_spanish: tu esclavo
  alternatives_spanish:
  - tu siervo
  - tu servidor
  lexicon: HALOT
  rationale: El POB inglés opta por 'servant' por la función cortesana de autohumillación, pero el proyecto español pide 'esclavo' cuando la fuerza léxica de עֶבֶד debe mantenerse y no hay razón contextual para suavizarla. Aquí la auto-designación de Shimí ante el rey preserva esa dureza y deferencia del hebreo. 'Siervo' sería una atenuación tradicional sin el mismo peso lexical.
- source_word: וַ/יֵּ֧שֶׁב
  english_pob_choice: lived
  chosen_spanish: habitó
  alternatives_spanish:
  - vivió
  - residió
  - se quedó
  lexicon: HALOT
  rationale: יָשַׁב en contextos de asentamiento significa 'habitar' o 'vivir'. 'Habitó' conserva el valor estable de residencia y mantiene un registro bíblico sobrio, sin volverlo arcaizante en exceso.
- source_word: יָמִ֥ים רַבִּֽים
  english_pob_choice: many days
  chosen_spanish: muchos días
  alternatives_spanish:
  - por muchos días
  - un largo tiempo
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente 'muchos días'. 'Muchos días' preserva la textura idiomática del original y corresponde al inglés del POB sin añadir precisión cronológica inexistente.
- source_word: שִׁמְעִי
  english_pob_choice: Shimei
  chosen_spanish: Shimí
  alternatives_spanish:
  - Simeí
  - Simei
  lexicon: Transliteración estándar adaptable al español
  rationale: Se adapta el nombre al español con acentuación final audible para una lectura fluida, manteniendo la identificación con el personaje bíblico sin forzar grafías ajenas al sistema del idioma.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en Yerusalén
  - en la ciudad de Jerusalén
  lexicon: Transliteración estándar
  rationale: La forma española establecida es 'Jerusalén'. La preposición 'en' refleja directamente la localización del hebreo.
theological_decisions:
- issue: Tratamiento cortesano de עֶבֶד frente a lectura devocional de 'siervo'
  english_pob_reading: your servant
  chosen_spanish_reading: tu esclavo
  alternative_spanish_readings:
  - tu siervo
  - tu servidor
  rationale: Aunque en muchos contextos religiosos 'siervo' resulta más familiar, aquí el hebreo usa el vocabulario de subordinación cortesana y el POB no documenta una razón para suavizarlo. Mantener 'esclavo' preserva la tensión lexical entre honor, dependencia y sumisión ante el rey, sin convertirla en un título piadoso abstracto.
  doctrine_reference: Lexical-theological fidelity to עֶבֶד; court speech register in the narrative
- issue: Dābār como 'palabra' versus 'asunto'/'cosa'
  english_pob_reading: The word is good
  chosen_spanish_reading: La palabra es buena
  alternative_spanish_readings:
  - El asunto es bueno
  - La cosa es buena
  - Lo que dices es bueno
  rationale: El contexto permite referirse tanto a la declaración como al contenido de la condición impuesta. Sin embargo, la lectura del POB retiene 'word' para sostener la proximidad al hebreo. En español, 'palabra' conserva esa ambigüedad controlada sin borrar la referencia al dicho del rey.
  doctrine_reference: Semantic range of דָּבָר; discourse and decree in royal speech
translation_notes:
  revision_awareness: Se siguió el estado de revisión más reciente indicado como sin cambios necesarios y con acuerdo alto. No se documentaron revisiones aplicadas; por tanto, se mantuvo la lectura base del POB inglés, ajustándola al español con fidelidad al hebreo y a las decisiones léxicas auditadas.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se preservó la diferencia entre 'palabra' y 'asunto' en una nota para no borrar la ambigüedad de דָּבָר.
  - Se eligió 'esclavo' deliberadamente para reflejar עֶבֶד con más fuerza que 'siervo', conforme a la política española del proyecto.
  - 'Los nombres propios se adaptaron a formas españolas de lectura natural: ''Shimí'' y ''Jerusalén''.'
