translation:
  language: es
  text: A veces la nube permanecía sobre el tabernáculo durante varios días; por mandato de Yahvé[a] acampaban, y por mandato de Yahvé partían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «según la boca de Yahvé»; es decir, por el mandato de Yahvé.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְיֵשׁ אֲשֶׁר
  english_pob_choice: Sometimes
  chosen_spanish: A veces
  alternatives_spanish:
  - Y había ocasiones en que
  - En algunas ocasiones
  lexicon: HALOT
  rationale: La expresión introduce un caso intermitente dentro de la narración. «A veces» comunica bien esa idea en español natural sin perder el sentido de alternancia del hebreo.
- source_word: יִהְיֶה הֶעָנָן
  english_pob_choice: the cloud would remain
  chosen_spanish: la nube permanecía
  alternatives_spanish:
  - la nube estaría
  - la nube se quedaba
  lexicon: HALOT
  rationale: En este contexto, היה con el sujeto «la nube» indica permanencia prolongada, no mera existencia. «Permanecía» expresa mejor esa duratividad.
- source_word: יָמִים מִסְפָּר
  english_pob_choice: for a number of days
  chosen_spanish: por un número de días
  alternatives_spanish:
  - por algunos días
  - por pocos días
  lexicon: HALOT
  rationale: La frase hebrea señala una cantidad limitada de días. «Por un número de días» es fiel y mantiene la indefinición cuantitativa sin precisar más de lo que dice el texto.
- source_word: עַל הַמִּשְׁכָּן
  english_pob_choice: over the tabernacle
  chosen_spanish: sobre el tabernáculo
  alternatives_spanish:
  - encima del tabernáculo
  - sobre la morada
  lexicon: HALOT
  rationale: מִשְׁכָּן se refiere al santuario portátil del desierto; «tabernáculo» es el equivalente estándar y claro. «Sobre» conserva la relación espacial de la nube con la tienda.
- source_word: עַל פִּי יְהוָה
  english_pob_choice: at the command of Yahweh
  chosen_spanish: al mandato de Yahvé
  alternatives_spanish:
  - según la orden de Yahvé
  - por mandato de Yahvé
  lexicon: HALOT
  rationale: La expresión literal «según la boca de» funciona como idioma de autoridad/mandato. «Al mandato de Yahvé» es natural en español y conserva la fuerza directiva del hebreo, manteniendo el nombre divino «Yahvé».
- source_word: יַחֲנוּ
  english_pob_choice: they would camp
  chosen_spanish: acampaban
  alternatives_spanish:
  - acampaban
  - se acampaban
  lexicon: HALOT
  rationale: El imperfecto describe una acción habitual en la secuencia narrativa. «Acampaban» es más natural que una forma perifrástica y refleja bien la costumbre repetida.
- source_word: יִסָּעוּ
  english_pob_choice: they would set out
  chosen_spanish: partían
  alternatives_spanish:
  - se ponían en marcha
  - salían de viaje
  lexicon: HALOT
  rationale: En contexto de marcha en el desierto, נסע implica levantar campamento y avanzar. «Partían» es breve, sobrio y fiel a la idea de salir de un lugar para continuar el viaje.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre propio divino como «Yahvé», en línea con la convención doctrinal del proyecto para יְהוָה, en lugar de sustituirlo por un título.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo presenta explícitamente el Tetragrámaton. La traducción española mantiene el nombre propio «Yahvé» para preservar la referencia personal y pactual, conforme a la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de עַל־פִּי יְהוָה
  english_pob_reading: at the command of Yahweh
  chosen_spanish_reading: al mandato de Yahvé
  alternative_spanish_readings:
  - según la orden de Yahvé
  - por mandato de Yahvé
  rationale: La expresión hebrea literalmente dice «según la boca de Yahvé», pero aquí el sentido contextual es de autoridad y dirección. «Al mandato de Yahvé» comunica esa fuerza sin perder el trasfondo idiomático.
  doctrine_reference: Lexical idiom in the source text, supported by the English POB audit note on lexical alternative
translation_notes:
  revision_awareness: Se corrigió la ubicación del marcador de nota para que [a] aparezca exactamente en el texto español, conforme a la validación previa. La redacción sigue de cerca el hebreo y coincide sustancialmente con la decisión auditada del POB en inglés.
  spanish_consistency_notes:
  - Se usó «Yahvé» de manera consistente para יְהוָה.
  - Se mantuvo el contraste narrativo entre «acampaban» y «partían» como acciones habituales.
  - «Tabernáculo» se conservó para מִשְׁכָּן por claridad y continuidad terminológica.
  - La nota [a] queda anclada en «por[a]» para reflejar el idioma hebreo de manera auditable.
