translation:
  language: es
  text: El vino bebido a su debido tiempo y con moderación[a] es alegría del corazón y gozo del alma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en suficiente medida» o «en cantidad suficiente». El adjetivo griego puede significar más literalmente «suficiente» o «bastante»; aquí probablemente se refiere al uso moderado y no al exceso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαλλίαμα
  english_pob_choice: gladness
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: LSJ
  rationale: El sustantivo expresa júbilo o deleite intenso. «Alegría» mantiene un registro natural y digno en español, y funciona bien con el paralelismo poético de la frase.
- source_word: καρδίας
  english_pob_choice: of heart
  chosen_spanish: del corazón
  alternatives_spanish:
  - para el corazón
  lexicon: LSJ
  rationale: 'El genitivo se conserva de modo directo para mantener la imagen poética breve del original: una alegría que pertenece al corazón.'
- source_word: εὐφροσύνη
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: LSJ
  rationale: «Gozo» expresa con dignidad la dimensión festiva y gozosa del término, y evita repetir exactamente el primer miembro sin perder el paralelismo semántico.
- source_word: ψυχῆς
  english_pob_choice: of soul
  chosen_spanish: del alma
  alternatives_spanish:
  - de la vida
  - del interior
  lexicon: LSJ
  rationale: «Alma» preserva la profundidad antropológica del hebreo/greco-sapiencial y corresponde bien al balance poético con «corazón».
- source_word: οἶνος
  english_pob_choice: Wine
  chosen_spanish: Vino
  alternatives_spanish:
  - vino
  lexicon: LSJ
  rationale: Se mantiene el sentido literal de la palabra fuente. La mayúscula solo obedece a la posición inicial de la oración.
- source_word: πινόμενος
  english_pob_choice: drunk
  chosen_spanish: bebido
  alternatives_spanish:
  - cuando se bebe
  - siendo bebido
  lexicon: LSJ
  rationale: En español, un participio pasivo natural con «vino» es «bebido»; reproduce el valor verbal del griego sin forzar una paráfrasis.
- source_word: ἐν καιρῷ
  english_pob_choice: at the proper time
  chosen_spanish: en el tiempo oportuno
  alternatives_spanish:
  - a su tiempo
  - en el momento adecuado
  lexicon: LSJ
  rationale: «καιρός» expresa tiempo oportuno o propicio, no mera cronología. «Tiempo oportuno» conserva esa fuerza sapiencial y suena natural en español.
- source_word: αὐτάρκης
  english_pob_choice: in moderation
  chosen_spanish: con medida
  alternatives_spanish:
  - en moderación
  - en suficiente medida
  - suficiente
  lexicon: LSJ
  rationale: El término apunta a suficiencia o adecuación, y en este contexto con vino la lectura ética es de cantidad medida. «Con medida» comunica esa idea sin ocultar la tensión entre suficiencia y moderación.
theological_decisions:
- issue: Sentido ético de la suficiencia aplicada al vino
  english_pob_reading: The verse commends wine only when taken in a fitting time and measured amount.
  chosen_spanish_reading: El versículo aprueba el vino solo cuando se bebe en momento oportuno y con cantidad medida.
  alternative_spanish_readings:
  - El vino, bebido oportunamente, es suficiente para alegrar.
  - El texto podría entenderse como una simple afirmación de que el vino suficiente produce gozo.
  rationale: La construcción griega une oportunidad temporal y suficiencia cuantitativa. «Con medida» preserva la advertencia implícita contra el exceso y evita una lectura de aprobación sin límites.
  doctrine_reference: Principio de equivalencia óptima; conservar la fuerza sapiencial del texto sin suavizar su dimensión ética
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de Swete y el audit trail inglés. Se conservó la estructura proverbial y el paralelismo corazón/alma. La principal decisión interpretativa es αὐτάρκης, que en inglés quedó como «in moderation»; en español se vierte «con medida» para mantener la idea de suficiencia sin perder la cautela ética.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se prefirió «gozo» para διαφό; en este caso, por paralelismo poético, la alternancia con «alegría» ayuda a reproducir el equilibrio del original.
  - La puntuación y el orden buscan una frase publicable y natural en español sin añadir contenido interpretativo externo.
