theological_decisions:
- issue: Referent of what is to be seen in Samaria
  chosen_reading: The verse describes social disorder and oppressed people within Samaria, not merely abstract sins.
  alternative_readings:
  - The verse refers to tumults and acts of oppression as abstract conditions
  rationale: The Hebrew עֲשׁוּקִים is best taken substantivally ('the oppressed'), which foregrounds victims of injustice. This is a lexical-syntactic decision, not a doctrinal expansion, and it fits Amos's concern for visible social evil.
