theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Whether רוּחוֹ refers to the Holy Spirit or an impersonal divine impulse
  chosen_reading: by his Spirit
  alternative_readings:
  - by his spirit
  - by his breath/wind
  rationale: In this prophetic context the phrase describes the divine means by which the LORD sent his words through the prophets. Rendering it 'Spirit' best reflects the personal divine agency implied by the context, without going beyond the text.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §3
- issue: How to render צְבָאוֹת
  chosen_reading: Armies
  alternative_readings:
  - Hosts
  rationale: '''Armies'' translates the Hebrew meaning into accessible modern English and preserves the title''s force. ''Hosts'' is traditional but less transparent for contemporary readers.'
  doctrine_reference: DOCTRINE.md Translation philosophy §6
