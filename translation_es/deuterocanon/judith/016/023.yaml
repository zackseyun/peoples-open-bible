  text: And she continued to prosper greatly[a], and she grew old in her husband's house for one hundred five years, and she set her maidservant free. Then she died in Bethulia[b], and they buried her in the cave of her husband Manasseh.
  footnotes:
  - marker: a
    text: Or 'she became very great indeed'; the Greek literally speaks of her 'advancing' or 'becoming great' with strong intensification.
    reason: lexical_alternative
  - marker: b
    text: The Greek term for the woman Judith freed denotes a female attendant or maid; because Judith 'set her free,' the verse implies a servile dependent status.
    reason: lexical_alternative
