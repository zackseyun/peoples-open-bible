translation:
  language: es
  text: Y el faraón Necao hizo rey a Eliaquim, hijo de Josías, en lugar de Josías su padre, y cambió su nombre a Joacim. Pero tomó a Joacaz[b], y él vino[a] a Egipto y murió allí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y fue a Egipto». El hebreo dice «vino a Egipto».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, el faraón Necao rebautizó a Eliaquim como Joacim.
    reason: cultural_note
lexical_decisions:
- source_word: וַיַּמְלֵךְ
  english_pob_choice: made ... king
  chosen_spanish: hizo rey a
  alternatives_spanish:
  - nombró rey a
  - puso como rey a
  - hizo reinar a
  lexicon: HALOT
  rationale: El causativo del verbo hebreo pide una traducción causativa en español. «Hizo rey a» conserva la fuerza de instalación en el trono sin sonar más interpretativo que el hebreo.
- source_word: תַּחַת
  english_pob_choice: in place of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - sustituyendo a
  - bajo
  lexicon: HALOT
  rationale: En este contexto sucesorio, la idea es reemplazo. «En lugar de» reproduce bien el valor de sustitución de תַּחַת sin perder claridad.
- source_word: אָבִיו
  english_pob_choice: his father
  chosen_spanish: su padre
  alternatives_spanish:
  - su propio padre
  lexicon: HALOT
  rationale: El sufijo refiere a Josías como padre de Eliaquim. El español puede mantener la relación de forma natural con «su padre».
- source_word: וַיַּסֵּב אֶת־שְׁמוֹ
  english_pob_choice: changed his name
  chosen_spanish: cambió su nombre a
  alternatives_spanish:
  - le cambió el nombre a
  - lo renombró como
  lexicon: HALOT
  rationale: El hebreo expresa el acto de alterar el nombre; «cambió su nombre a» conserva el sentido y deja visible el nuevo nombre asignado.
- source_word: יְהוֹיָקִים
  english_pob_choice: Jehoiakim
  chosen_spanish: Joacim
  alternatives_spanish:
  - Jehoiaquim
  - Yehoyaquim
  lexicon: standard Spanish biblical name usage
  rationale: En español bíblico, «Joacim» es la forma tradicional y comunicativa del nombre, manteniendo la referencia personal reconocible para lectores hispanos.
- source_word: וְאֶת־יְהוֹאָחָז לָקָח
  english_pob_choice: But he took Jehoahaz
  chosen_spanish: Pero tomó a Joacaz
  alternatives_spanish:
  - Y tomó a Joacaz
  - Pero se llevó a Joacaz
  - Pero capturó a Joacaz
  lexicon: HALOT
  rationale: לקח es «tomar» de forma básica; en este contexto puede implicar remoción/captura, pero «tomó» preserva la sobriedad del hebreo. «Joacaz» sigue la forma española usual.
- source_word: וַיָּבֹא מִצְרַיִם
  english_pob_choice: and he came to Egypt
  chosen_spanish: y éste vino a Egipto
  alternatives_spanish:
  - y vino a Egipto
  - y llegó a Egipto
  - y fue a Egipto
  lexicon: HALOT
  rationale: El inglés POB conserva «came» por cercanía al hebreo; en español, «vino a Egipto» mantiene esa misma dirección verbal. El demostrativo «éste» aclara que el sujeto inmediato es Joacaz, ya que el hebreo cambia de referente de manera compacta.
- source_word: וַיָּמָת שָׁם
  english_pob_choice: and died there
  chosen_spanish: y murió allí
  alternatives_spanish:
  - y murió allá
  - y falleció allí
  lexicon: HALOT
  rationale: «Murió allí» es una correspondencia directa y sobria del cierre narrativo.
translation_notes:
  revision_awareness: El texto sigue de cerca el auditable inglés POB, pero ajusta la antroponimia a formas españolas bíblicas corrientes («Joacim», «Joacaz») y conserva la ambigüedad direccional de וַיָּבֹא mediante una nota que refleja la alternativa documentada del POB en inglés. No se introducen cambios textuales respecto del sentido base del hebreo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Hizo rey a» conserva la fuerza causativa de וַיַּמְלֵךְ sin convertirlo en mera descripción.
  - «Cambió su nombre a» refleja el acto de renombrar sin suavizarlo a una simple alusión.
  - «Tomó» reproduce la simplicidad del hebreo para לָקָח, sin añadir conjeturas de captura en el texto principal.
  - La nota a preserva la tensión entre «vino» y la expectativa idiomática española de «fue/llegó», siguiendo el rastro auditable del POB.
