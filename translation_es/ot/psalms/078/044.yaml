translation:
  language: es
  text: Él convirtió sus ríos en sangre[a], y sus corrientes de agua[b], de modo que no podían beber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «canales del Nilo» para «ríos»; el término hebreo puede referirse al Nilo o a sus canales en contextos egipcios.
    reason: lexical_alternative
  - marker: b
    text: O «aguas corrientes» para «corrientes de agua».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּהֲפֹךְ
  english_pob_choice: He turned
  chosen_spanish: Él convirtió
  alternatives_spanish:
  - Él volvió
  - Él transformó
  lexicon: HALOT
  rationale: El verbo hebreo expresa un giro o cambio de estado hacia otra condición. En español, «convirtió» comunica con naturalidad la idea de transformar algo en otra cosa sin perder el matiz causal.
- source_word: לְדָם
  english_pob_choice: to blood
  chosen_spanish: en sangre
  alternatives_spanish:
  - en sangre roja
  - a sangre
  lexicon: HALOT
  rationale: La preposición ל aquí indica resultado o estado alcanzado. «En sangre» es la forma más natural y fiel en español para expresar la transformación.
- source_word: יְאֹרֵיהֶם
  english_pob_choice: their rivers
  chosen_spanish: sus ríos
  alternatives_spanish:
  - sus canales del Nilo
  - sus canales
  - sus corrientes
  lexicon: HALOT
  rationale: יְאֹר puede aludir al Nilo o a sus canales en contexto egipcio, pero el salmo lo resume poéticamente. «Ríos» transmite el sentido general sin imponer una especificación demasiado técnica.
- source_word: וְנֹזְלֵיהֶם
  english_pob_choice: their flowing streams
  chosen_spanish: sus corrientes fluyentes
  alternatives_spanish:
  - sus aguas corrientes
  - sus corrientes de agua
  - sus aguas fluyentes
  lexicon: HALOT
  rationale: El participio de נזל conserva la imagen de fluir. «Corrientes fluyentes» mantiene esa fuerza verbal y distingue este término del anterior «ríos», aunque suene algo marcado en español para respetar el paralelismo del hebreo.
- source_word: בַּל
  english_pob_choice: so that...not
  chosen_spanish: de modo que no
  alternatives_spanish:
  - para que no
  - así que no
  lexicon: HALOT
  rationale: 'La partícula negativa poética introduce el resultado: la imposibilidad de beber. «De modo que no» refleja bien esa relación de consecuencia sin forzar una subordinación demasiado explicativa.'
- source_word: יִשְׁתָּיֽוּן
  english_pob_choice: they could not drink
  chosen_spanish: podían beber
  alternatives_spanish:
  - podían tomar
  - bebían
  - podían beber de ellas
  lexicon: HALOT
  rationale: El imperfecto con בַּל expresa imposibilidad o resultado frustrado. La negación en el contexto hace que la idea completa sea «no podían beber»; en la frase final se integra esa negación de manera natural y fiel al efecto del hebreo.
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión que aclaró la estructura de la segunda cláusula y volvió a alinear el objeto paralelo con «their rivers». Para el español, se conservó ese paralelismo mediante dos sintagmas coordinados: «sus ríos» y «sus corrientes fluyentes», seguido del resultado «de modo que no podían beber», que deja claro el efecto sin introducir una paráfrasis innecesaria.'
  spanish_consistency_notes:
  - Se mantuvo «Él» implícito en el sujeto para dar fluidez, pero se conservó explícito aquí por claridad poética.
  - Se prefirió «sangre» en lugar de «sangre roja», porque el contexto ya determina el sentido.
  - Se evitó «SEÑOR» y otros términos no presentes en el versículo, ya que no hay referencia al nombre divino en este texto.
  - Se conservó el paralelismo del hebreo entre «ríos» y «corrientes fluyentes» mediante dos complementos directos coordinados.
