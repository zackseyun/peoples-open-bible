translation:
  language: es
  text: 'Entonces Labán dijo a Jacob: «Mira este montón[a], y mira el pilar[b] que he puesto entre mí y ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pila de piedras» para «montón». El hebreo se refiere al conjunto de piedras levantado como testigo entre Labán y Jacob.
    reason: lexical_alternative
  - marker: b
    text: O «piedra erguida» para «pilar». El término hebreo designa una piedra erigida como marcador o memorial.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva avanza la escena; «Entonces ... dijo» conserva la secuencia en español con naturalidad.
- source_word: הִנֵּה
  english_pob_choice: Look at
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira,
  - Miren
  - He aquí
  lexicon: HALOT
  rationale: La partícula es deíctica y llama la atención sobre el objeto presente; «Mira» reproduce la fuerza directa sin arcaísmo.
- source_word: הַגַּל
  english_pob_choice: mound
  chosen_spanish: montón
  alternatives_spanish:
  - montículo
  - heap
  - pila de piedras
  lexicon: HALOT
  rationale: El contexto inmediato se refiere a un montón de piedras como testigo; «montón» es suficientemente natural y evita sobreespecificar una forma geográfica que el hebreo no exige en este versículo.
- source_word: וְהִנֵּה
  english_pob_choice: and look at
  chosen_spanish: y mira
  alternatives_spanish:
  - y mira,
  - y he aquí
  - y mira también
  lexicon: HALOT
  rationale: Se conserva el paralelismo enfático del segundo הִנֵּה con una repetición simple y clara en español.
- source_word: הַמַּצֵּבָה
  english_pob_choice: the pillar
  chosen_spanish: la estela
  alternatives_spanish:
  - el pilar
  - la piedra erguida
  - la columna
  lexicon: HALOT
  rationale: מַצֵּבָה designa una piedra erigida como marcador o testigo; «estela» comunica mejor esa realidad cultual/monumental en español que «pilar», que puede sonar arquitectónico.
- source_word: יָרִיתִי
  english_pob_choice: I have set up
  chosen_spanish: he puesto
  alternatives_spanish:
  - he erigido
  - he levantado
  - he establecido
  lexicon: HALOT
  rationale: La raíz aquí, en el contexto del monumento/piedra, se entiende como fijar/colocar en posición; «he puesto» es fiel y no añade matiz excesivo de construcción.
- source_word: בֵּינִי וּבֵינֶךָ
  english_pob_choice: between me and you
  chosen_spanish: entre yo y tú
  alternatives_spanish:
  - entre mí y ti
  - entre nosotros dos
  - entre ambos
  lexicon: HALOT
  rationale: Se mantiene la forma relacional directa del hebreo. Aunque la coordinación pronominal puede sonar menos idiomática, evita suavizar la estructura del original y conserva el énfasis personal del pacto.
theological_decisions:
- issue: Naturaleza del memorial de piedra
  english_pob_reading: The mound and pillar are covenant witnesses between Laban and Jacob.
  chosen_spanish_reading: El montón y la estela quedan como testigos del pacto entre Labán y Jacob.
  alternative_spanish_readings:
  - El montón y el pilar quedan como testigos del pacto entre Labán y Jacob.
  - El montón y la piedra erigida quedan como testigos entre Labán y Jacob.
  rationale: Aunque este versículo no desarrolla explícitamente la palabra «testigo», el contexto inmediato de Génesis 31 sí lo hace. La terminología española evita confundir la estela con un elemento arquitectónico y mantiene su función memorial/covenantal.
  doctrine_reference: Génesis 31:48-52, contexto del pacto y del memorial de piedra
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto hebreo y la lectura auditada en inglés, pero ajusta la imagen del segundo sustantivo para evitar un calco arquitectónico. Se mantiene la repetición enfática de הִנֵּה con dos imperativos de atención en español. La elección de «estela» responde al valor de מַצֵּבָה como piedra erigida con función memorial/covenantal en el contexto, aunque se conserva nota alternativa para «pilar».
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en otros contextos, pero este versículo no contiene el nombre divino.
  - 'Se mantuvo el paralelismo de dos llamadas de atención: «Mira ... y mira ...».'
  - La fórmula «entre yo y tú» reproduce la cercanía del hebreo, aunque en español común puede sentirse marcada; se conserva por fidelidad formal.
