  text: רְצ֣וֹן מְ֭לָכִים שִׂפְתֵי צֶ֑דֶק וְ/דֹבֵ֖ר יְשָׁרִ֣ים יֶאֱהָֽב־׃
base_translation:
  language: en
  yaml_path: translation/ot/proverbs/016/013.yaml
  text: Righteous lips are the delight of kings[b][a], and they love one who speaks what is upright.
  footnotes:
  - marker: a
    text: Or 'Just lips are the favor of kings.' The Hebrew רְצוֹן can mean 'favor,' 'pleasure,' or 'delight,' and צֶדֶק may be rendered 'justice' or 'righteousness' depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'he loves one who speaks what is right.' The phrase 'what is upright' renders a plural form used substantivally in Hebrew.
    reason: lexical_alternative
