translation:
  language: es
  text: 'Así dice el Señor Yahvé: ¿Eres tú aquel de quien hablé en tiempos antiguos[b] por medio de mis siervos[a], los profetas de Israel, que profetizaban en aquellos días durante años[c], que yo te haría venir contra ellos?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: ''por la mano de'', un modismo que significa ''por medio de'' o ''a través de''.'
    reason: lexical_alternative
  - marker: b
    text: O 'en días antiguos' o 'en días de antaño'.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ''en aquellos días, años''; la formulación subraya que estas profecías se pronunciaron a lo largo de un período prolongado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: el Señor Yahvé
  alternatives_spanish:
  - el Señor Dios
  - el Señor Yahvé
  lexicon: HALOT
  rationale: En español, 'Yahvé' preserva el nombre divino del Tetragrámaton según la política del proyecto; 'Señor' rinde אֲדֹנָי. La combinación evita la máscara tradicional 'SEÑOR' y mantiene el valor reverencial del título compuesto.
- source_word: הַאַתָּה הוּא
  english_pob_choice: Are you the one
  chosen_spanish: ¿Eres tú aquel
  alternatives_spanish:
  - ¿Eres tú el que
  - ¿Eres tú mismo
  lexicon: HALOT
  rationale: La construcción interrogativa enfática pide una identificación personal marcada. 'Aquel' conserva el matiz de reconocimiento directo sin sonar arcaico como 'aquel es' o '¿eres tú he?'.
- source_word: אֲשֶׁר דִּבַּרְתִּי
  english_pob_choice: of whom I spoke
  chosen_spanish: de quien hablé
  alternatives_spanish:
  - de quien mencioné
  - acerca de quien hablé
  lexicon: HALOT
  rationale: '''Hablé de'' es el equivalente idiomático natural en español para un referente personal mencionado previamente.'
- source_word: בְּיָמִים קַדְמוֹנִים
  english_pob_choice: in former days
  chosen_spanish: en tiempos antiguos
  alternatives_spanish:
  - en días antiguos
  - en días de antaño
  lexicon: HALOT
  rationale: '''Tiempos antiguos'' conserva el retroceso temporal con naturalidad en español; ''en días de antaño'' sería más literario y menos neutral.'
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - a través de
  lexicon: HALOT
  rationale: La idiomática hebrea de agencia profética se expresa con claridad en español como 'por medio de', evitando una calca que sonaría extraña aunque es auditable en nota.
- source_word: עֲבָדַי
  english_pob_choice: my servants
  chosen_spanish: mis esclavos
  alternatives_spanish:
  - mis siervos
  - mis servidores
  lexicon: HALOT
  rationale: El proyecto privilegia 'esclavos' para עבד cuando la fuerza léxica de dependencia está presente; aunque en español bíblico tradicional se usa 'siervos', aquí se conserva la tensión léxica y la referencia a agencia subordinada.
- source_word: נְבִיאֵי יִשְׂרָאֵל
  english_pob_choice: the prophets of Israel
  chosen_spanish: los profetas de Israel
  alternatives_spanish:
  - los profetas de Israel
  - los profetas del Israel
  lexicon: HALOT
  rationale: La construcción es directa y no requiere ajuste. Se mantiene el genitivo simple por claridad y fidelidad.
- source_word: הַנִּבְּאִים
  english_pob_choice: who prophesied
  chosen_spanish: que profetizaban
  alternatives_spanish:
  - que profetizaron
  - los cuales profetizaban
  lexicon: HALOT
  rationale: El participio describe acción habitual o extendida en el tiempo; el imperfecto 'profetizaban' conserva esa duración mejor que un pretérito puntual.
- source_word: בַּיָּמִים הָהֵם שָׁנִים
  english_pob_choice: in those days for years
  chosen_spanish: en aquellos días, por años
  alternatives_spanish:
  - en aquellos días, durante años
  - en aquellos días por años
  lexicon: HALOT
  rationale: 'Se mantienen ambos elementos hebreos: ''en aquellos días'' y la intensidad temporal de ''años''. La coma ayuda a reproducir la acumulación enfática sin borrar la rareza semítica.'
- source_word: לְהָבִיא אֹתְךָ עֲלֵיהֶם
  english_pob_choice: that I would bring you against them
  chosen_spanish: para traerte contra ellos
  alternatives_spanish:
  - para llevarte contra ellos
  - para hacer venir contra ellos
  lexicon: HALOT
  rationale: '''Contra ellos'' expresa la relación hostil implícita en el contexto militar. ''Traerte'' reproduce la idea de hacer llegar/dirigir al destinatario hacia el conflicto.'
theological_decisions:
- issue: Nombre divino en אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Señor Yahvé
  rationale: Se preserva el nombre propio del pacto como 'Yahvé' según la política del proyecto, evitando la sustitución por una máscara como 'SEÑOR'. El título אדני se rinde como 'Señor' para mantener la solemnidad y la distinción del compuesto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión inglesa reciente solo suprimió una coma antes de 'the prophets of Israel' para mejorar la fluidez. En español se mantuvo una puntuación equivalente natural ('mis esclavos, los profetas de Israel') sin cambiar el sentido ni perder la relación apposicional.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se usa 'esclavos' para עבד siguiendo la preferencia léxica documentada cuando la subordinación/propiedad es relevante.
  - Se conserva la progresión semítica de tiempo ('en aquellos días, por años') sin fusionarla en una expresión más interpretativa.
  - '''Contra ellos'' explicita la orientación hostil implícita en el hebreo y en el contexto militar de Ezequiel 38.'
