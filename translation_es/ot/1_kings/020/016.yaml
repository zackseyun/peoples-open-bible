translation:
  language: es
  text: Salieron al mediodía, mientras Ben-adad estaba bebiendo hasta embriagarse en las chozas[a], él y los treinta y dos reyes que lo ayudaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los pabellones» o «en las enramadas». El hebreo dice literalmente «en las chozas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּצְאוּ
  english_pob_choice: They went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - salieron afuera
  lexicon: HALOT
  rationale: El verbo יצא en esta secuencia narrativa expresa movimiento de salida; «salieron» es natural en español y conserva el avance militar sin añadir color interpretativo.
- source_word: בַּצָּהֳרָיִם
  english_pob_choice: at noon
  chosen_spanish: al mediodía
  alternatives_spanish:
  - a mediodía
  - al mediodía en punto
  lexicon: HALOT
  rationale: La expresión marca la mitad del día; «al mediodía» es idiomática y precisa en español, equivalente al inglés auditado.
- source_word: וּבֶן הֲדַד
  english_pob_choice: while Ben-hadad
  chosen_spanish: y Ben-adad
  alternatives_spanish:
  - mientras Ben-adad
  - cuando Ben-adad
  lexicon: HALOT
  rationale: El hebreo introduce una circunstancia simultánea; en español, la coordinación simple con «y» mantiene la fluidez narrativa sin forzar una subordinación que el texto no exige. El nombre se transcribe como Ben-adad según uso español claro y reconocible.
- source_word: שֹׁתֶה
  english_pob_choice: was drinking
  chosen_spanish: estaba bebiendo
  alternatives_spanish:
  - bebía
  - estaba tomando
  lexicon: HALOT
  rationale: El participio indica acción en curso; «estaba bebiendo» reproduce bien ese valor aspectual sin añadir el objeto del beber, que no está expresado.
- source_word: שִׁכּוֹר
  english_pob_choice: drinking himself drunk
  chosen_spanish: hasta embriagarse
  alternatives_spanish:
  - borracho
  - embriagado
  lexicon: HALOT
  rationale: El adjetivo describe el estado/resultante de la bebida. En español, «hasta embriagarse» conserva la idea de progresión hacia la embriaguez sin sonar rígido; evita imponer un sustantivo o bebida no explícitos.
- source_word: בַּסֻּכּוֹת
  english_pob_choice: in the booths
  chosen_spanish: en las chozas
  alternatives_spanish:
  - en las tiendas
  - en los pabellones
  - en las enramadas
  lexicon: HALOT
  rationale: סֻכּוֹת es literalmente «booths/shelters». «Chozas» comunica una estructura simple y provisoria en español; aunque no es traducción mecánica, conserva el sentido concreto sin sobreinterpretar como «pabellones».
- source_word: הוּא וְהַמְּלָכִים
  english_pob_choice: he and the thirty-two kings
  chosen_spanish: él y los treinta y dos reyes
  alternatives_spanish:
  - él junto con los treinta y dos reyes
  - él y los treinta y dos monarcas
  lexicon: HALOT
  rationale: El pronombre inclusivo se conserva explícitamente; «reyes» mantiene la referencia directa del hebreo y el vínculo sintáctico con Ben-adad.
- source_word: שְׁלֹשִׁים וּשְׁנַיִם מֶלֶךְ
  english_pob_choice: the thirty-two kings
  chosen_spanish: los treinta y dos reyes
  alternatives_spanish:
  - treinta y dos reyes
  lexicon: HALOT
  rationale: El hebreo usa numeral + sustantivo singular con valor colectivo; el español requiere plural visible. «Los treinta y dos reyes» es la forma más natural y fiel.
- source_word: עֹזֵר אֹתוֹ
  english_pob_choice: who were helping him
  chosen_spanish: que lo ayudaban
  alternatives_spanish:
  - que le ayudaban
  - que lo asistían
  - que lo apoyaban
  lexicon: HALOT
  rationale: עזר expresa ayuda/auxilio continuo. «Lo ayudaban» es claro y directo; evita elevar innecesariamente el registro y preserva la relación de apoyo militar/político sin añadir matices doctrinales.
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés, manteniendo la circunstancia temporal, la progresión verbal y la imagen concreta de בַּסֻּכּוֹת sin introducir elementos ajenos. No se registraron revisiones aplicadas en el contexto inglés, y el estado de concordancia es alto.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponda al Tetragrámaton; este versículo no lo contiene.
  - Se evitó «SEÑOR» como sustituto no pertinente.
  - Se mantuvo un español bíblico moderno, digno y legible, sin arcaísmos innecesarios.
  - La nota a pie de página se ancla en «chozas» para señalar la alternativa léxica documentada por el POB inglés.
