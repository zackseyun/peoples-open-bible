translation:
  language: es
  text: Mikloth engendró a Shimeam[a]. Ellos también habitaron frente a sus hermanos en Jerusalén[b], con sus hermanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo Shimeam; algunas traducciones leen «Shimea», probablemente por armonización con formas genealógicas paralelas.
    reason: alternative_reading
  - marker: b
    text: O «delante de sus hermanos» / «cerca de sus hermanos» para נֶגֶד, que también puede expresar proximidad o posición frontal.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִקְל֖וֹת
  english_pob_choice: Mikloth
  chosen_spanish: Miklot
  alternatives_spanish:
  - Miklot
  - Mikloth
  lexicon: HALOT
  rationale: Es nombre propio; se translitera sin traducir. Se omite la conjunción inicial en español porque la línea genealógica fluye naturalmente sin repetir un inicio coordinante explícito.
- source_word: הוֹלִ֣יד
  english_pob_choice: fathered
  chosen_spanish: engendró
  alternatives_spanish:
  - fue padre de
  - engendró a
  lexicon: HALOT
  rationale: En contexto genealógico, el hifil de ילד expresa paternidad generativa. 'Engendró' conserva ese valor más directamente que una paráfrasis más larga.
- source_word: אֶת שִׁמְאָ֑ם
  english_pob_choice: Shimeam
  chosen_spanish: Shimeam
  alternatives_spanish:
  - Shimea
  lexicon: HALOT
  rationale: Se conserva la forma consonántica del texto base. La nota explica la variante de armonización con formas paralelas.
- source_word: וְ/אַף הֵ֗ם
  english_pob_choice: They also
  chosen_spanish: Ellos también
  alternatives_spanish:
  - Y ellos también
  - ellos incluso
  lexicon: HALOT
  rationale: אַף añade valor enfático/aditivo. 'También' reproduce bien el matiz sin sobrerrepresentarlo.
- source_word: נֶ֧גֶד
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - opuestos a
  - delante de
  - en frente de
  lexicon: HALOT
  rationale: En español, 'frente a' comunica la relación espacial sin sonar demasiado interpretativa. Mantiene la tensión semántica entre 'opuesto' y 'delante de' que el hebreo permite.
- source_word: אֲחֵי/הֶ֛ם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus consanguíneos
  lexicon: HALOT
  rationale: Se conserva 'hermanos' porque el hebreo dice literalmente eso, y en este contexto genealógico puede abarcar el grupo de parentesco sin necesidad de generalizar.
- source_word: יָשְׁב֥וּ
  english_pob_choice: lived
  chosen_spanish: habitaron
  alternatives_spanish:
  - vivieron
  - se establecieron
  lexicon: HALOT
  rationale: '''Habitaron'' expresa residencia asentada y mantiene un registro digno. ''Vivieron'' sería más neutro, pero menos resonante para una lista genealógica.'
- source_word: בִ/ירֽוּשָׁלִַ֖ם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  lexicon: HALOT
  rationale: Se conserva el topónimo estándar con la preposición correspondiente.
- source_word: עִם
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  - al lado de
  lexicon: HALOT
  rationale: '''Con'' reproduce la asociación expresa del hebreo sin añadir matiz espacial no requerido.'
- source_word: אֲחֵי/הֶֽם
  english_pob_choice: their brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus parientes
  - sus consanguíneos
  lexicon: HALOT
  rationale: La repetición se mantiene porque el hebreo repite el término, y esa reiteración refuerza la cercanía familiar.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y el audit trail en inglés: conserva la secuencia genealógica, la referencia espacial de נֶגֶד con una nota de alternativa y la repetición final de ‘sus hermanos’. Se evita imponer una armonización a ‘Shimea’ y se mantiene la forma consonántica del versículo.'
  spanish_consistency_notes:
  - Se usa transliteración consistente para nombres propios.
  - Se conserva el paralelismo de ‘sus hermanos’ en ambas ocurrencias de אֲחֵיהֶם.
  - El estilo es formal y publicable, con léxico bíblico claro pero no arcaizante.
