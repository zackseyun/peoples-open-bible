    reason: lexical_alternative
  - marker: b
    text: 'O: «no se arrepintieron de sus caminos». El hebreo dice «volver(se)/regresar», que en contextos proféticos puede llevar el sentido de arrepentimiento.'
    reason: lexical_alternative
  revision_rationale: 'Hice una reparación pequeña pero necesaria: corregí el aparato de notas para que preserve las alternativas léxicas documentadas por el inglés POB, añadí la nota sobre שׁוּב/«arrepentirse», y reubiqué la nota de הָאָרֶץ al lugar correcto. También ajusté «aventador» a «bieldo» por mayor precisión del implemento y cambié «tierra» por «país» en el texto principal para reflejar mejor la decisión contextual auditada. El resto del verso se conserva sustancialmente igual.'
