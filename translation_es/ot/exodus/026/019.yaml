translation:
  language: es
  text: 'Y harás cuarenta bases de plata debajo de los veinte marcos[a]: dos bases debajo de un marco para sus dos espigas[b], y dos bases debajo del otro marco para sus dos espigas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Tradicionalmente «tabla» o «tablón» en vez de «marco». El hebreo probablemente se refiere a las piezas estructurales verticales del tabernáculo.
    reason: lexical_alternative
  - marker: b
    text: O «tenones»; el hebreo usa un término arquitectónico para las proyecciones de unión de los marcos.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַדְנֵי כֶסֶף
  english_pob_choice: silver bases
  chosen_spanish: bases de plata
  alternatives_spanish:
  - zócalos de plata
  - sockets de plata
  lexicon: HALOT
  rationale: En el contexto de la construcción del tabernáculo, אֲדָנִים designa piezas de apoyo estructural. «Bases» comunica con claridad la función arquitectónica en español y mantiene la equivalencia con la decisión inglesa; «zócalos» o «sockets» son posibles, pero menos naturales o menos transparentes.
- source_word: תַּעֲשֶׂה
  english_pob_choice: you shall make
  chosen_spanish: harás
  alternatives_spanish:
  - harás de hacer
  - deberás hacer
  - harás/harás de
  lexicon: HALOT
  rationale: El imperfecto segunda persona masculina singular en instrucciones puede traducirse con valor injuntivo. «Harás» preserva el mandato y suena natural en español bíblico contemporáneo.
- source_word: תַּחַת
  english_pob_choice: under
  chosen_spanish: debajo de
  alternatives_spanish:
  - bajo
  - por debajo de
  lexicon: HALOT
  rationale: «Debajo de» expresa de manera directa la relación espacial sin forzar el registro. Conserva la concreción arquitectónica del hebreo.
- source_word: הַקָּרֶשׁ / הַקֶּרֶשׁ
  english_pob_choice: frame
  chosen_spanish: marco
  alternatives_spanish:
  - tabla
  - tablón
  - madero
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, קֶרֶשׁ se refiere a los elementos estructurales verticales. «Marco» es un equivalente funcional aceptable en español para describir la pieza portante; evita «tabla» o «tablón», que pueden inducir una imagen inadecuada.
- source_word: שְׁנֵי אֲדָנִים
  english_pob_choice: two bases
  chosen_spanish: dos bases
  alternatives_spanish:
  - dos zócalos
  - dos sockets
  lexicon: HALOT
  rationale: La repetición cuantifica las piezas de apoyo para cada marco. Mantener «bases» asegura consistencia terminológica con la primera expresión de la frase.
- source_word: לִשְׁתֵּי יְדֹתָיו
  english_pob_choice: for its two tenons
  chosen_spanish: para sus dos espigas
  alternatives_spanish:
  - para sus dos tenones
  - para sus dos salientes
  - para sus dos encajes
  lexicon: HALOT
  rationale: יָדוֹת es un término arquitectónico para las proyecciones de unión. En español, «espigas» comunica bien la función de ensamble; «tenones» sería más técnico, pero menos natural para lectores generales. Se conserva el carácter constructivo del término.
- source_word: הָאֶחָד ... הָאֶחָד
  english_pob_choice: one frame ... the next frame
  chosen_spanish: un marco ... el otro marco
  alternatives_spanish:
  - un marco ... el siguiente marco
  - un marco ... cada marco
  lexicon: HALOT
  rationale: El hebreo usa distributivamente «el uno» para dos piezas sucesivas. «Un marco ... el otro marco» preserva la distribución y suena natural en español, evitando una repetición rígida.
translation_notes:
  revision_awareness: Se siguió la revisión del POB inglés que eliminó el artículo innecesario en la primera unidad distributiva («under one frame»), por lo que en español se optó por «debajo de un marco» sin artículo definido innecesario. También se respetó la distinción distributiva del segundo miembro con «el otro marco», reflejando el hebreo repetido y la solución inglesa revisada.
  spanish_consistency_notes:
  - Se mantiene «bases de plata» de forma consistente para אַדְנֵי כֶסֶף y «dos bases» para שְׁנֵי אֲדָנִים.
  - Se evita introducir «SEÑOR» o terminología no pertinente; el versículo es arquitectónico y no requiere decisiones teológicas.
  - «Marco» se usa de manera funcional y consistente con la lectura POB de קֶרֶשׁ como pieza estructural vertical.
  - La frase «sus dos espigas» conserva la posesión del hebreo y la relación con cada marco.
  - Las notas a pie distinguen la alternativa lexical («tenones») y la alternativa tradicional de traducción del objeto («tabla/tablón»).
