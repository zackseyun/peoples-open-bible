review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del hebreo: conserva «Israel», la imagen de «los días» que se acercan, la fórmula de favor, el gesto de juramento y la súplica de no ser enterrado en Egipto. Sin embargo, hay dos fallas importantes de alineación con la evidencia y con el rastro POB: (1) las notas están intercambiadas, ya que [a] aparece en «favor» pero el contenido de la nota [a] trata de «mano bajo mi muslo», mientras [b] aparece en «fidelidad» pero el contenido de la nota [b] trata del gesto; y (2) «muéstrame misericordia y fidelidad» debilita el valor idiomático de וְעָשִׂיתָ עִמָּדִי חֶסֶד וֶאֱמֶת, donde la acción hacia Jacob debe expresarse como ‘actuar/tratar conmigo’ más el par léxico. Además, «misericordia» no recoge tan bien como «amor leal» o «bondad fiel» la fuerza de חֶסֶד en este contexto de obligación solemne.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «muéstrame misericordia y fidelidad» suena menos natural y menos exacto que «trata conmigo con amor leal y fidelidad» o una formulación similar. También conviene evitar la repetición enfática de «por favor» dos veces en el versículo cuando el hebreo usa נָא en distintos puntos con una cortesía que puede expresarse con naturalidad sin duplicación pesada. La puntuación y el registro son adecuados.
  glossary_alignment: 'No hay conflicto con términos de proyecto como Yahvé/Mesías. El punto terminológico relevante es חֶסֶד וֶאֱמֶת: el borrador opta por «misericordia y fidelidad», pero el expediente inglés documenta mejor una combinación como «amor leal y fidelidad»/«bondad fiel»/«amor constante y fidelidad», preservando la lealtad confiable del par. También debe mantenerse literalmente «mano bajo mi muslo» con nota cultural anclada allí.'
  issues:
  - severity: high
    issue: Las notas al pie están mal ancladas e intercambiadas.
    rationale: El marcador [a] está puesto en «favor», pero la nota [a] en el expediente inglés corresponde al gesto «mano bajo mi muslo». El marcador [b] está puesto al final del par léxico, pero la nota [b] del expediente inglés corresponde a la alternativa léxica de חֶסֶד וֶאֱמֶת. Esto incumple la disciplina de marcadores y puede confundir al lector.
  - severity: medium
    issue: «Muéstrame misericordia y fidelidad» no refleja bien וְעָשִׂיתָ עִמָּדִי.
    rationale: El hebreo expresa ‘actuar/tratar conmigo’ de cierta manera, no simplemente ‘mostrarme’. Una formulación con «trata conmigo con…» o «actúa conmigo con…» conserva mejor la sintaxis y el sentido idiomático.
  - severity: medium
    issue: «Misericordia» debilita la fuerza contextual de חֶסֶד.
    rationale: En este contexto patriarcal de juramento y obligación familiar, חֶסֶד apunta más a amor leal/bondad fiel que a misericordia compasiva. «Amor leal y fidelidad» preserva mejor la dimensión de lealtad confiable documentada en el rastro POB.
