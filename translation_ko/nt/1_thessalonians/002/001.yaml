id: 1TH.2.1
reference: 1 Thessalonians 2:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Αὐτοὶ γὰρ οἴδατε, ἀδελφοί, τὴν εἴσοδον ἡμῶν τὴν πρὸς ὑμᾶς ὅτι οὐ κενὴ γέγονεν,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/001.yaml
  text: For you yourselves know[a], brothers, that our coming to you was not in vain,
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; the Greek says 'brothers' and often uses the masculine form to address the whole believing community.
    reason: lexical_alternative
translation:
  language: ko
  text: 형제[a] 여러분, 여러분 자신도 우리가 여러분에게 들어간 일이 헛되지 않았음을 알고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 헬라어 ἀδελφοί는 남성 복수형이나 바울 서신에서는 공동체 전체를 가리키는 경우가 많다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτοὶ ... οἴδατε
  english_pob_choice: you yourselves know
  chosen_korean: 여러분 자신도 ... 알고 있습니다
  alternatives_korean:
  - 여러분 스스로 알고 있습니다
  lexicon: BDAG
  rationale: 강조 대명사 αὐτοί를 「여러분 자신도」로 보존하여 데살로니가인들이 직접 목격한 증인임을 부각한다.
- source_word: τὴν εἴσοδον ἡμῶν τὴν πρὸς ὑμᾶς
  english_pob_choice: our coming to you
  chosen_korean: 우리가 여러분에게 들어간 일
  alternatives_korean:
  - 우리가 여러분에게 나아간 일
  - 우리의 여러분께 향한 입성
  lexicon: BDAG
  rationale: εἴσοδος는 사역의 도착·진입. 「들어간 일」이 1:9의 동일 어휘와 일관되며 자연스럽다.
- source_word: οὐ κενὴ γέγονεν
  english_pob_choice: was not in vain
  chosen_korean: 헛되지 않았음을
  alternatives_korean:
  - 공허하지 않았음을
  - 무익하지 않았음을
  lexicon: BDAG
  rationale: 완료형의 결과 지속. 「헛되지 않다」가 한국 교회 전통의 표준 등가어이며 결과가 지금도 유효함을 자연스럽게 담는다.
