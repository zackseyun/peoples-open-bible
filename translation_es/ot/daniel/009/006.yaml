translation:
  language: es
  text: No hemos escuchado[a] a tus siervos, los profetas, que hablaron en tu nombre a nuestros reyes, a nuestros oficiales, a nuestros padres[b] y a todo el pueblo del país.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hemos obedecido». El verbo hebreo puede implicar atender con respuesta obediente, no solo oír.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «nuestros antepasados». Literalmente, «nuestros padres».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְנוּ
  english_pob_choice: have not listened
  chosen_spanish: no hemos escuchado
  alternatives_spanish:
  - no hemos oído
  - no hemos obedecido
  lexicon: HALOT
  rationale: שמע con אֶל expresa atender/escuchar a alguien; en este contexto confesional también implica falta de respuesta obediente, pero el español principal debe conservar el sentido básico de 'escuchar' sin resolver de más la tensión semántica.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: Con שׁמע, אֶל marca el objeto de la escucha; en español natural se expresa con 'a' en 'escuchar a'.
- source_word: עֲבָדֶיךָ
  english_pob_choice: your servants
  chosen_spanish: tus siervos
  alternatives_spanish:
  - tus servidores
  - tus esclavos
  lexicon: HALOT
  rationale: Aquí el término aplica honoríficamente a los profetas en servicio de Dios. 'Siervos' conserva la relación de servicio sin imponer 'esclavos' donde el contexto no lo destaca.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  lexicon: HALOT
  rationale: Correspondencia directa y transparente del sustantivo con artículo.
- source_word: דִּבְּרוּ בְּשִׁמְךָ
  english_pob_choice: spoke in your name
  chosen_spanish: hablaron en tu nombre
  alternatives_spanish:
  - hablaron por tu autoridad
  - hablaron en representación tuya
  lexicon: HALOT
  rationale: La locución בְּשֵׁם conserva la idea de hablar bajo autorización y representación. 'En tu nombre' es idiomático y fiel en español.
- source_word: מְלָכֵינוּ
  english_pob_choice: our kings
  chosen_spanish: nuestros reyes
  lexicon: HALOT
  rationale: Traducción directa del plural posesivo y del rango real.
- source_word: שָׂרֵינוּ
  english_pob_choice: our officials
  chosen_spanish: nuestros oficiales
  alternatives_spanish:
  - nuestros príncipes
  - nuestros jefes
  lexicon: HALOT
  rationale: שׂרים puede referirse a autoridades gobernantes o príncipes. 'Oficiales' comunica autoridad administrativa de forma clara y contemporánea sin estrechar demasiado el rango.
- source_word: אֲבֹתֵינוּ
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  lexicon: HALOT
  rationale: Se mantiene la forma masculina literal del hebreo. En español, 'padres' conserva la referencia generacional y la resonancia confesional del texto.
- source_word: כָּל עַם הָאָרֶץ
  english_pob_choice: all the people of the land
  chosen_spanish: todo el pueblo de la tierra
  alternatives_spanish:
  - toda la gente de la tierra
  - todo el pueblo del país
  lexicon: HALOT
  rationale: עַם es colectivo singular, bien rendido como 'pueblo'. הָאָרֶץ aquí se conserva como 'la tierra' para respetar la expresión hebrea y evitar precisar indebidamente como 'país'.
theological_decisions:
- issue: Si שָׁמַעְנוּ debe leerse solo como oír o también como obedecer
  english_pob_reading: have not listened
  chosen_spanish_reading: no hemos escuchado
  alternative_spanish_readings:
  - no hemos obedecido
  rationale: La oración de Daniel confiesa infidelidad al pacto; sin embargo, el verbo hebreo es más amplio que 'obedecer'. 'Escuchado' preserva esa amplitud y deja que el contexto aporte la fuerza moral.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Cómo expresar אֲבֹתֵינוּ sin neutralizar el género gramatical del hebreo
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: El hebreo usa plural masculino y alude a generaciones previas. Se conserva la forma masculina literal, que en español sigue siendo inteligible y mantiene la correspondencia formal.
  doctrine_reference: Translation philosophy §4, Gender-accurate over gender-neutral.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el estado final del inglés POB y su auditoría: se mantiene la ambigüedad de שׁמע entre escuchar y obedecer, se conserva la metáfora relacional de בְּשֵׁם como ''en tu nombre'', y se retiene la forma masculina literal de אֲבֹתֵינוּ sin modernizarla a un genérico neutralizador.'
  spanish_consistency_notes:
  - Se prefirió 'siervos' para עֲבָדֶיךָ por su uso reverente en contextos proféticos.
  - '''Oficiales'' se usa para שָׂרֵינוּ en coherencia con el valor administrativo/régico del término.'
  - '''La tierra'' preserva la formulación hebrea de הָאָרֶץ sin estrechar el referente a ''país''.'
  - Los marcadores de nota a y b aparecen anclados en el texto donde corresponde.
