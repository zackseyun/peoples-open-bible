translation:
  language: es
  text: Salva[a], oh Yahvé, porque los piadosos han desaparecido; porque los fieles han desaparecido de entre los seres humanos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Rescata» o «Libra».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «de entre los hijos de Adán / del hombre», un modismo para la comunidad humana.'
    reason: cultural_note
lexical_decisions:
- source_word: הוֹשִׁיעָה
  english_pob_choice: Save
  chosen_spanish: Sálva
  alternatives_spanish:
  - Rescata
  - Libra
  lexicon: HALOT
  rationale: Es un imperativo dirigido a Dios; «sálva» conserva la fuerza de súplica urgente y mantiene el sentido básico de הושׁיע como pedir intervención salvífica.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino del Tetragrámaton como transliteración reverente y consistente con la política del proyecto, en lugar de sustituirlo por un título.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la base del ruego; en español «porque» expresa de modo natural la razón de la petición.
- source_word: גָמַר
  english_pob_choice: is gone
  chosen_spanish: ha desaparecido
  alternatives_spanish:
  - ha llegado a su fin
  - ha perecido
  - se ha acabado
  lexicon: HALOT
  rationale: El verbo indica terminar/llegar al fin; en este contexto poético, «ha desaparecido» comunica la idea de que el justo ya no se ve entre la comunidad sin reducirla a mera cesación de actividad.
- source_word: חָסִיד
  english_pob_choice: the godly
  chosen_spanish: el piadoso
  alternatives_spanish:
  - el fiel
  - el devoto
  - el piadoso
  lexicon: HALOT
  rationale: חסיד designa a la persona marcada por piedad y lealtad de pacto. «Piadoso» conserva ese matiz ético-devocional y permite reflejar el singular masculino del hebreo. La nota del inglés revisado sobre un sentido colectivo se refleja en el verbo y el contexto, sin forzar una neutralización.
- source_word: פַסּוּ
  english_pob_choice: have vanished
  chosen_spanish: se han desvanecido
  alternatives_spanish:
  - han desaparecido
  - se han ido
  - ya no están
  lexicon: HALOT
  rationale: El plural expresa que varios han dejado de estar presentes; «se han desvanecido» reproduce la imagen poética de desaparición y mantiene la intensidad del lamento.
- source_word: אֱמוּנִים
  english_pob_choice: the faithful
  chosen_spanish: los fieles
  alternatives_spanish:
  - los confiables
  - los leales
  - los veraces
  lexicon: HALOT
  rationale: Procede de אמן en sentido de personas confiables/firmes. «Los fieles» es la equivalencia española más natural y preserva el matiz moral y relacional del término.
- source_word: מִ/בְּנֵי אָדָם
  english_pob_choice: from among the sons of man
  chosen_spanish: de entre los hijos de Adán
  alternatives_spanish:
  - de entre los hombres
  - de entre la humanidad
  - de entre los seres humanos
  lexicon: HALOT
  rationale: Se conserva la imagen hebrea «hijos de Adán» para no aplanar el idiomatismo ni perder la fuerza antropológica del giro. «De entre» expresa con naturalidad el valor idiomático de procedencia/extracción.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: El texto hebreo usa directamente el Tetragrámaton. «Yahvé» preserva el nombre propio divino y evita la sustitución por un título, coherente con la política del proyecto y con el testimonio del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor colectivo de חָסִיד en paralelo con el plural siguiente
  english_pob_reading: the godly are gone
  chosen_spanish_reading: el piadoso ha desaparecido
  alternative_spanish_readings:
  - los piadosos han desaparecido
  - la piedad ha desaparecido
  rationale: Aunque el hebreo presenta un singular masculino, el contexto poético y la revisión inglesa señalan un sentido colectivo o representativo. En español se conserva el singular léxico («el piadoso») sin perder el valor general, y el plural posterior mantiene el paralelismo con אֱמוּנִים.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
- issue: Antropología del giro מִבְּנֵי אָדָם
  english_pob_reading: from among the sons of man
  chosen_spanish_reading: de entre los hijos de Adán
  alternative_spanish_readings:
  - de entre los hijos de los hombres
  - de entre la humanidad
  rationale: La expresión hebrea conserva una carga idiomática y antropológica que conviene no neutralizar. «Hijos de Adán» reproduce la imagen literal con claridad suficiente para el lector español y mantiene la referencia a la comunidad humana.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó «the godly man is gone» a «the godly are gone» para reflejar mejor el posible valor colectivo del singular hebreo. En español se mantuvo un singular de valor representativo («el piadoso») acompañado de un verbo que expresa desaparición, dejando abierta la lectura colectiva sin introducir una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el Tetragrámaton, conforme al criterio del proyecto.
  - «Piadoso» y «fieles» conservan la distinción entre חָסִיד y אֱמוּנִים.
  - «Hijos de Adán» mantiene el idiomatismo hebreo; no se sustituyó por una abstracción como «humanidad».
  - El tono es de lamento poético y oración breve, con puntuación española natural y registro bíblico digno.
