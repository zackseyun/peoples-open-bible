translation:
  language: es
  text: '¿Acaso los dioses de las naciones que mis padres destruyeron las libraron: Gozán, Harán, Rezef y los habitantes de Edén[a] que estaban en Telasar?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Edén», es decir, los habitantes o la población de Edén.'
    reason: lexical_alternative
lexical_decisions:
- source_word: הַהִצִּילוּ
  english_pob_choice: Did ... deliver
  chosen_spanish: ¿Acaso ... las libraron?
  alternatives_spanish:
  - ¿Acaso ... las rescataron?
  - ¿Acaso ... las salvaron?
  lexicon: HALOT
  rationale: El hebreo plantea una pregunta retórica con valor de desafío. «Librar» conserva bien la idea de liberar/sacar de peligro y suena natural en español bíblico moderno; «rescatar» es posible, pero «librar» mantiene mejor la fuerza idiomática del reproche.
- source_word: אֱלֹהֵי הַגּוֹיִם
  english_pob_choice: the gods of the nations
  chosen_spanish: los dioses de las naciones
  alternatives_spanish:
  - los dioses de los pueblos
  - los dioses nacionales
  lexicon: HALOT
  rationale: Se mantiene el plural «dioses» y el sentido geopolítico de גוים como «naciones». «Naciones» es la forma más directa y transparente para el español eclesial.
- source_word: אֲשֶׁר הִשְׁחִיתוּ אֲבוֹתַי
  english_pob_choice: that my fathers destroyed
  chosen_spanish: que mis padres destruyeron
  alternatives_spanish:
  - que mis antepasados destruyeron
  - que mis padres arrasaron
  lexicon: HALOT
  rationale: «Mis padres» refleja literalmente אבותַי y conserva el tono dinástico/ancestral. «Destruyeron» sigue la elección del POB inglés para שׁחת en este contexto militar.
- source_word: אֶת גּוֹזָן וְאֶת חָרָן וְרֶצֶף
  english_pob_choice: Gozan, Haran, Rezeph
  chosen_spanish: Gozán, Harán, Rezef
  alternatives_spanish:
  - Gozán, Harán, Rezeph
  - Gozán, Jarán, Rezef
  lexicon: HALOT
  rationale: Se transliteran como nombres propios de lugares. «Gozán» y «Harán» siguen la adaptación española estándar; «Rezef» conserva la vocalización hebrea con una forma clara en español.
- source_word: וּבְנֵי עֶדֶן
  english_pob_choice: the people of Eden
  chosen_spanish: los habitantes de Edén
  alternatives_spanish:
  - los hijos de Edén
  - el pueblo de Edén
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «hijos de Edén», el POB inglés documenta la lectura colectiva como «people of Eden». En español, «habitantes de Edén» comunica esa referencia colectiva sin perder el enlace lexical con בני.
- source_word: אֲשֶׁר בִּתְלַשָּׂר
  english_pob_choice: who were in Telassar
  chosen_spanish: que estaban en Telasar
  alternatives_spanish:
  - que vivían en Telasar
  - que se hallaban en Telasar
  lexicon: HALOT
  rationale: La preposición ב se rinde naturalmente con «en». «Estaban» mantiene la localización simple del relativo y la fluidez del español.
theological_decisions:
- issue: Traducción de אֱלֹהִים en plural en una pregunta retórica de burla contra deidades nacionales
  english_pob_reading: the gods of the nations
  chosen_spanish_reading: los dioses de las naciones
  alternative_spanish_readings:
  - los dioses de los pueblos
  - las deidades de las naciones
  rationale: No se atenúa el plural ni se sustituye por un término más interpretativo. En este contexto la burla se dirige a deidades múltiples de naciones concretas, por lo que «dioses» preserva la tensión textual y retórica.
  doctrine_reference: Isaías 37:12; Salmo 115:4-8
- issue: Sentido colectivo de בני עֶדֶן
  english_pob_reading: the people of Eden
  chosen_spanish_reading: los habitantes de Edén
  alternative_spanish_readings:
  - los hijos de Edén
  - el pueblo de Edén
  rationale: El hebreo usa literalmente «hijos de Edén», pero el POB inglés ya decidió una lectura colectiva. En español, «habitantes» evita una lectura biológica o genealógica errónea y conserva la referencia a una población ubicada en Telasar.
  doctrine_reference: Isaías 37:12; 2 Reyes 19:12
translation_notes:
  revision_awareness: El borrador sigue el estado de alta concordancia del auditorio en inglés; no se registraron revisiones pendientes y no hubo cambios sustantivos en la decisión de traducción base.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino principal en otros contextos, pero este versículo no lo contiene.
  - Se conserva «dioses» en plural para reflejar el contraste polémico del pasaje.
  - 'Los nombres propios se transliteran de manera consistente con ortografía española simple: Gozán, Harán, Rezef, Edén, Telasar.'
