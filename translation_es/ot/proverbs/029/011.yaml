revisions:
- from: Todo espíritu[a] lo saca el necio, pero el sabio lo retiene.
  to: El necio deja salir todo su espíritu[a], pero el sabio lo retiene.
  rationale: Se añade el posesivo «su» para reflejar רוּחוֹ y se reordena la cláusula inicial a una forma idiomática en español («deja salir») que conserva la imagen de exteriorizar lo que está dentro. Se mantiene «espíritu» en el texto principal, conforme a la decisión léxica del POB, y se preserva en nota la alternativa interpretativa de «temperamento/ánimo» con el matiz de calmar o retener.
