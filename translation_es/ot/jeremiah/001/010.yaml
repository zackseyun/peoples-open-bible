    rationale: 'El expediente inglés incluye una aclaración importante: Jeremías no recibe dominio político directo sino comisión profética respecto de ellos. Debe conservarse en español.'
  - severity: low
    issue: «Te he puesto sobre» es posible, pero menos preciso que «te he nombrado sobre» o «te he designado sobre».
    rationale: El hiphil de פקד aquí expresa nombramiento/comisión más formal que simple colocación. Ajustarlo mejora la correspondencia con el análisis léxico sin perder naturalidad.
