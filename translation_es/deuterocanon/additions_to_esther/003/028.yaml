translation:
  language: es
  text: Y tu esclava[a] no se ha alegrado desde el día de mi cambio[b] hasta ahora, excepto en ti, Yahvé, Dios de Abraham.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu sierva». El griego tiene la forma femenina de «esclavo/siervo» (δούλη), una autodesignación humilde ante Dios.
    reason: lexical_alternative
  - marker: b
    text: O «desde el día de mi reversión» o «desde que cambiaron mis circunstancias». La frase griega deja sin precisar la naturaleza exacta del «cambio».
    reason: alternative_reading
lexical_decisions:
- source_word: δούλη
  english_pob_choice: slave
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  lexicon: BDAG
  rationale: El griego usa la forma femenina de δοῦλος, con una carga de dependencia humilde ante Dios. En español, "esclava" preserva mejor esa fuerza lexical que "sierva", que suaviza el término. Se mantiene el registro reverente sin ocultar el matiz de sumisión expresado en el original y en el audit trail inglés.
- source_word: ηὐφράνθη
  english_pob_choice: has not rejoiced
  chosen_spanish: no se ha alegrado
  alternatives_spanish:
  - no se ha regocijado
  - no ha estado alegre
  lexicon: BDAG
  rationale: El verbo expresa alegría o regocijo. "No se ha alegrado" comunica de forma natural en español el valor verbal y afectivo, sin añadir un objeto de alegría que el griego no especifica.
- source_word: ἀφʼ ἡμέρας μεταβολῆς μου
  english_pob_choice: from the day of my change
  chosen_spanish: desde el día de mi cambio
  alternatives_spanish:
  - desde el día de mi reversión
  - desde el día en que cambió mi situación
  lexicon: LSJ
  rationale: μεταβολή puede significar cambio, alteración o reversión. "Mi cambio" conserva la ambigüedad del griego y sigue de cerca la formulación del texto, sin precisar indebidamente la naturaleza de ese cambio.
- source_word: πλὴν ἐπὶ σοί
  english_pob_choice: except in you
  chosen_spanish: sino en ti
  alternatives_spanish:
  - excepto en ti
  - salvo en ti
  - excepto por ti
  lexicon: BDAG
  rationale: La construcción marca excepción y relación de base o esfera. "Sino en ti" es una solución idiomática en español que conserva la exclusividad de Dios como único ámbito o fundamento de la alegría.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Dueño
  lexicon: BDAG
  rationale: El vocativo de κύριος se traduce con el equivalente reverencial estándar "Señor", que mantiene el tono de oración y la convención bíblica sin introducir una paráfrasis.
- source_word: ὁ θεὸς Ἀβραάμ
  english_pob_choice: God of Abraham
  chosen_spanish: Dios de Abraham
  alternatives_spanish:
  - el Dios de Abraham
  lexicon: BDAG
  rationale: Se trata de un título divino pactal. En español, la forma natural y fiel es "Dios de Abraham"; el artículo definido puede omitirse sin pérdida de sentido en esta construcción nominal.
theological_decisions:
- issue: Autodesignación humilde con δούλη
  english_pob_reading: your slave
  chosen_spanish_reading: tu esclava
  alternative_spanish_readings:
  - tu sierva
  rationale: Se conserva la fuerza de la autohumillación ante Dios que el POB inglés preserva con "slave". "Esclava" evita suavizar el término y mantiene la tensión lexical documentada; "sierva" queda como alternativa más atenuada.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος/δούλη; Translation philosophy §1, §5'
- issue: Ambigüedad de μεταβολή
  english_pob_reading: my change
  chosen_spanish_reading: mi cambio
  alternative_spanish_readings:
  - mi reversión
  - mi situación cambiada
  rationale: La frase griega no precisa la clase de cambio. La traducción conserva esa indeterminación, evitando concretar si fue cambio de fortuna, estado o situación personal.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3'
translation_notes:
  revision_awareness: 'El texto español sigue el tramo final del audit trail inglés: se recupera la elección de "slave" frente a la revisión que había suavizado a "servant", y se conserva la ambigüedad de μεταβολή sin especificarla. El resultado busca fidelidad auditables a la base griega y al criterio terminológico del proyecto.'
  spanish_consistency_notes:
  - Se usa «esclava» para δούλη conforme a la política del proyecto sobre δοῦλος/δούλος, evitando el debilitamiento semántico de «sierva».
  - «Señor» se emplea como traducción reverencial de Κύριε.
  - «Dios de Abraham» mantiene el título pactal sin añadir artículo innecesario.
  - La sintaxis española conserva el paralelismo de lamento y excepción del griego, con puntuación natural para lectura pública.
