translation:
  language: es
  text: 'Y de parte de mí, yo, el rey Artajerjes, promulgo un decreto a todos los tesoreros de Más Allá del Río[a]: todo lo que Esdras, el sacerdote, el escriba de la ley del Dios del cielo, les pida, que se haga exactamente[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Más Allá del Río» es el nombre administrativo persa de la región al oeste del Éufrates.
    reason: cultural_note
  - marker: b
    text: O «con exactitud»; el arameo enfatiza un cumplimiento cuidadoso y pleno, más que la rapidez.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּמִנִּי
  english_pob_choice: And from me
  chosen_spanish: Y de parte de mí
  alternatives_spanish:
  - Y de mí
  - Y por mí
  - Además, de parte de mí
  lexicon: HALOT
  rationale: La fórmula conserva el origen personal e inmediato de la orden real sin volverla rígida; «de parte de mí» transmite bien la procedencia autorizadora del decreto.
- source_word: אֲנָה
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  - yo
  lexicon: HALOT
  rationale: Se mantiene el pronombre explícito para conservar el énfasis de la autoidentificación del rey.
- source_word: אַרְתַּחְשַׁסְתְּא מַלְכָּא
  english_pob_choice: King Artaxerxes
  chosen_spanish: el rey Artajerjes
  alternatives_spanish:
  - Artajerjes, el rey
  lexicon: HALOT
  rationale: Orden natural en español para nombre + título, manteniendo la identificación clara y formal.
- source_word: שִׂים טְעֵם
  english_pob_choice: issue a decree
  chosen_spanish: promulgo un decreto
  alternatives_spanish:
  - emito un decreto
  - establezco un decreto
  - doy un decreto
  lexicon: HALOT
  rationale: El hebreo/arameo expresa la instauración oficial de una orden; «promulgo» refleja mejor el acto jurídico que un simple «digo» o «ordeno».
- source_word: לְכֹל גִּזַּבְרַיָּא
  english_pob_choice: to all the treasurers
  chosen_spanish: para todos los tesoreros
  alternatives_spanish:
  - a todos los tesoreros
  - para todos los oficiales del tesoro
  - a todos los tesoreros/funcionarios del tesoro
  lexicon: HALOT
  rationale: «Tesoreros» es la equivalencia más natural y suficientemente precisa para los funcionarios del tesoro en el contexto administrativo persa.
- source_word: דִּי בַּעֲבַר נַהֲרָה
  english_pob_choice: in Beyond the River
  chosen_spanish: de Más Allá del Río
  alternatives_spanish:
  - de la provincia Más Allá del Río
  - de la región Más Allá del Río
  - de allende el Río
  lexicon: HALOT
  rationale: Se conserva el nombre administrativo persa como título propio. «Más Allá del Río» comunica el término técnico sin explicitar indebidamente el Eufrates dentro del texto principal.
- source_word: כָל דִּי
  english_pob_choice: whatever
  chosen_spanish: todo lo que
  alternatives_spanish:
  - cuanto
  - lo que sea que
  - cualquier cosa que
  lexicon: HALOT
  rationale: La construcción relativa indefinida se vierte con naturalidad en español sin perder su amplitud.
- source_word: יִשְׁאֲלֶנְכוֹן
  english_pob_choice: asks of you
  chosen_spanish: les pida
  alternatives_spanish:
  - les solicite
  - les requiera
  - les pida de ustedes
  lexicon: HALOT
  rationale: «Pedir» reproduce el valor básico del verbo y mantiene el equilibrio entre solicitud y autoridad implícita en el decreto.
- source_word: עֶזְרָא כָהֲנָה
  english_pob_choice: Ezra the priest
  chosen_spanish: Ezra, el sacerdote
  alternatives_spanish:
  - Ezra el sacerdote
  - Ezra, sacerdote
  lexicon: HALOT
  rationale: Se conserva la aposición identificadora de modo claro y natural en español.
- source_word: סָפַר דָּתָא
  english_pob_choice: the scribe of the law
  chosen_spanish: el escriba de la ley
  alternatives_spanish:
  - el escriba de la legislación
  - el secretario de la ley
  - el erudito de la ley
  lexicon: HALOT
  rationale: «Escriba» preserva la combinación de oficio administrativo y competencia escrituraria; «ley» mantiene el sentido jurídico/religioso del término arameo.
- source_word: דִּי אֱלָהּ שְׁמַיָּא
  english_pob_choice: of the God of heaven
  chosen_spanish: del Dios del cielo
  alternatives_spanish:
  - del Dios de los cielos
  - del Dios celestial
  lexicon: HALOT
  rationale: Se mantiene el título imperial y bíblico tradicional sin perder el matiz de soberanía celestial.
- source_word: אָסְפַּרְנָא
  english_pob_choice: exactly
  chosen_spanish: exactamente
  alternatives_spanish:
  - con exactitud
  - prontamente
  - con diligencia
  lexicon: HALOT
  rationale: La revisión inglesa descartó «diligently» y prefirió un adverbio de exactitud. «Exactamente» conserva mejor el sentido de cumplimiento cuidadoso y pleno.
- source_word: יִתְעֲבִד
  english_pob_choice: let it be done
  chosen_spanish: que se haga
  alternatives_spanish:
  - que se cumpla
  - que sea hecho
  - debe hacerse
  lexicon: HALOT
  rationale: La forma pasiva/jussiva se expresa naturalmente con «que se haga», preservando el tono de decreto.
theological_decisions:
- issue: Tratamiento del nombre divino en «אֱלָהּ שְׁמַיָּא»
  english_pob_reading: of the God of heaven
  chosen_spanish_reading: del Dios del cielo
  alternative_spanish_readings:
  - del Dios de los cielos
  - del Dios celestial
  rationale: No aparece el Tetragrámaton, sino el título arameo para el Dios de Israel en contexto persa. «Dios del cielo» mantiene el registro bíblico y evita introducir una interpretación adicional.
  doctrine_reference: Título reverencial del Dios único en contexto imperial; cf. uso bíblico de «Dios del cielo» en Esdras.
translation_notes:
  revision_awareness: La versión inglesa de referencia pasó de «diligently» a «exactly» tras una revisión que concluyó que el adverbio arameo expresa mejor exactitud/cuidadoso cumplimiento que celo o prisa. La redacción española sigue esa revisión y conserva el nombre administrativo persa con mayúsculas como título propio.
  spanish_consistency_notes:
  - Se usa «Artajerjes» para el nombre del rey, conforme a la convención española estándar.
  - Se mantiene «Dios del cielo» como título reverencial estable en Esdras.
  - «Más Allá del Río» se trata como designación administrativa propia y no como simple descripción geográfica.
  - «Escriba de la ley» conserva el oficio técnico sin sustituirlo por una paráfrasis.
  - «Exactamente» refleja la decisión revisada de priorizar el sentido de precisión del adverbio arameo.
