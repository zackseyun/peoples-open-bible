  language: en
  yaml_path: translation/ot/1_kings/008/064.yaml
  text: On that day the king consecrated the middle of the court that was before the house of Yahweh[a], because there he offered the burnt offering and the grain offering and the fat portions of the peace offerings[c][b], because the bronze altar that was before Yahweh was too small to contain the burnt offering and the grain offering and the fat portions of the peace offerings.
  footnotes:
