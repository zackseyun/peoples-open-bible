review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el contenido del hebreo: condición inicial, repetición de תּוֹדָה, y las tres clases de productos sin levadura con aceite. También conserva adecuadamente la cautela sobre מֻרְבֶּכֶת mediante nota. Sin embargo, hay dos ajustes de fidelidad/claridad: (1) "junto con" suaviza demasiado el valor de עַל en este contexto de acompañamiento cultual; "con" o "además del" funciona mejor. (2) "hojuelas" y sobre todo "ungidas" producen una combinación poco natural en español eclesial; el texto puede mantener la cercanía léxica y mejorar legibilidad con "obléas" o "tortas delgadas" más "untadas con aceite," dejando en nota la alternativa más literal.'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta cierta rigidez léxica. "Hojuelas" puede sonar a cereal laminado o comida moderna, no a producto sacrificial. "Ungidas con aceite" es comprensible, pero en español activa con mucha fuerza un matiz ritual que la propia nota intenta desactivar. "Flor de harina" es aceptable y eclesialmente reconocible. La sintaxis general es buena.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. "Ofrenda de acción de gracias" y "sacrificio de acción de gracias" siguen bien la auditoría inglesa para תּוֹדָה / זֶבַח הַתּוֹדָה. La revisión propuesta se limita a mejorar la naturalidad y evitar una sobrelectura ritual de מְשֻׁחִים en español, preservando la alternativa literal en nota.
  issues:
  - severity: medium
    issue: '"junto con el sacrificio de acción de gracias" debilita la relación cultual de עַל'
    rationale: El hebreo presenta las ofrendas panificadas como algo ofrecido con/además del sacrificio de acción de gracias. "Junto con" no es incorrecto, pero suena más incidental que cultual. "con el sacrificio" es más directo y fiel.
  - severity: medium
    issue: '"hojuelas sin levadura" no representa naturalmente רְקִיקֵי מַצּוֹת en español bíblico'
    rationale: '"Hojuelas" suele evocar copos finos o alimentos modernos. Para un contexto sacrificial, "obléas sin levadura" o "tortas delgadas sin levadura" comunica mejor la idea de wafers/thin cakes.'
  - severity: medium
    issue: '"ungidas con aceite" sugiere con demasiada fuerza una unción ritual'
    rationale: Aunque sigue de cerca el léxico de משׁח, en español la combinación con un alimento resulta menos natural y más ceremonial que en inglés. El propio expediente inglés reconoce el sentido culinario. Conviene usar "untadas con aceite" en el texto y conservar la alternativa literal en nota.
