translation:
  language: es
  text: Pero cuando Seleuco pasó de esta vida[a], y Antíoco, el llamado Epífanes, asumió el reino,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literal: «habiendo intercambiado la vida», una manera eufemística de decir que Seleuco murió.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μεταλλάξαντος
  english_pob_choice: passed from life
  chosen_spanish: pasó de esta vida
  alternatives_spanish:
  - murió
  - partió de esta vida
  - cambió de vida
  lexicon: LSJ
  rationale: El griego usa una expresión eufemística para la muerte. «Pasó de esta vida» conserva esa delicadeza sin volverla oscura y evita la literalidad extraña de «cambió de vida».
- source_word: τὸν βίον
  english_pob_choice: life
  chosen_spanish: esta vida
  alternatives_spanish:
  - la vida
  - la existencia terrenal
  - su vida
  lexicon: LSJ
  rationale: En combinación con μεταλλάξαντος, βίος se refiere a la vida terrenal de Seleuco. «Esta vida» mantiene el matiz eufemístico y suena natural en español.
- source_word: παραλαβόντος
  english_pob_choice: took over
  chosen_spanish: recibió
  alternatives_spanish:
  - tomó
  - asumió
  - recibió el poder
  lexicon: LSJ
  rationale: En contexto de sucesión real, el participio indica la asunción del reino. «Recibió» sigue bien la idea de sucesión sin forzar una expresión demasiado coloquial.
- source_word: τὴν βασιλείαν
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - la realeza
  - el gobierno
  - la soberanía
  lexicon: LSJ
  rationale: Aquí βασιλεία designa el dominio real heredado por Antíoco. «El reino» es la equivalencia más idiomática y suficientemente amplia en español.
- source_word: τοῦ προσαγορευθέντος
  english_pob_choice: the one called
  chosen_spanish: el que fue llamado
  alternatives_spanish:
  - el llamado
  - el apodado
  - a quien llamaban
  lexicon: LSJ
  rationale: La construcción identifica a Antíoco por su sobrenombre. «El que fue llamado» reproduce esa identificación de forma clara y pública, adecuada para un texto bíblico.
- source_word: Ἐπιφανοῦς
  english_pob_choice: Epiphanes
  chosen_spanish: Epífanes
  alternatives_spanish:
  - Epifanes
  lexicon: LSJ
  rationale: Se conserva el epíteto como nombre propio transliterado, siguiendo la práctica del proyecto de transliterar epítetos nominalizados en vez de traducirlos.
translation_notes:
  revision_awareness: El texto inglés y la revisión más reciente coinciden sin cambios sustantivos; la redacción española sigue directamente el griego y el rastro auditado en inglés, manteniendo el eufemismo de la muerte y la fórmula de sucesión real.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - «Mesías/Cristo», «esclavo/siervo» y otras terminologías doctrinales no aparecen aquí.
  - La puntuación española sigue la sintaxis del participio absoluto griego con una oración principal coordinada por «y».
