translation:
  language: es
  text: No descubrirás la desnudez de la hermana de tu padre[a][b]; ella es la carne de tu padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En Levítico, «descubrir la desnudez de» es un modismo legal para una exposición o relación sexual prohibida.
    reason: lexical_alternative
  - marker: b
    text: 'O: «ella es la carne de tu padre» / «pariente de sangre de tu padre».
    reason: alternative_reading'
lexical_decisions:
- source_word: עֶרְוַת
  english_pob_choice: the nakedness of
  chosen_spanish: la desnudez de
  alternatives_spanish:
  - la desnudez
  - la vergüenza de
  - las partes privadas de
  lexicon: HALOT
  rationale: En Levítico 18, la expresión funciona como un modismo legal fijo. «La desnudez de» conserva con claridad el paralelo formal del hebreo; en español, «la desnudez de» resulta natural y mantiene el registro jurídico sin añadir más interpretación de la necesaria.
- source_word: תְגַלֵּה
  english_pob_choice: you shall not uncover
  chosen_spanish: No descubrirás
  alternatives_spanish:
  - No descubrirás la desnudez de
  - No debes descubrir
  - No tendrás relaciones sexuales con
  lexicon: HALOT
  rationale: «Descubrir» reproduce el verbo del modismo legal hebreo y preserva la formulación tradicional del pasaje sin expandirla a una paráfrasis más explícita. El futuro prohibitivo español comunica adecuadamente la prohibición.
- source_word: אֲחוֹת אָבִיךָ
  english_pob_choice: your father's sister
  chosen_spanish: la hermana de tu padre
  alternatives_spanish:
  - tu tía paterna
  - la hermana de tu padre
  lexicon: HALOT
  rationale: La relación de parentesco se expresa de forma directa y transparente. «La hermana de tu padre» sigue de cerca la estructura del hebreo y evita sustituirla por un término más interpretativo.
- source_word: שְׁאֵר
  english_pob_choice: she is your father's flesh
  chosen_spanish: la carne de tu padre
  alternatives_spanish:
  - tu pariente de sangre
  - la carne de tu padre
  - tu pariente cercano
  lexicon: HALOT
  rationale: «Carne» preserva la fuerza literal y de parentesco del término hebreo, tal como la revisión final del POB inglés prefirió «flesh» sobre «close relative». En español, «la carne de tu padre» suena extraña pero es fiel al matiz de consanguinidad y mantiene la tensión léxica sin suavizarla indebidamente.
- source_word: הִוא
  english_pob_choice: she is
  chosen_spanish: ella es
  alternatives_spanish:
  - es ella
  - ella misma es
  lexicon: HALOT
  rationale: El pronombre simple identifica a la mujer como perteneciente al grado de parentesco prohibido. «Ella es» conserva la claridad y la sobriedad del hebreo.
theological_decisions:
- issue: Mantener el modismo legal de Levítico 18 sin sobreparáfrasis
  english_pob_reading: Retain the formula 'uncover the nakedness of' in the main text.
  chosen_spanish_reading: 'Conservar un equivalente formal: «descubrir la desnudez de».'
  alternative_spanish_readings:
  - Parafrasear como «tener relaciones sexuales con»
  - Explicar como «cometer incesto con»
  rationale: El versículo forma parte de una serie legal estereotipada; la traducción debe preservar el lenguaje de la fórmula para sostener la coherencia interna del capítulo y no importar explicaciones no presentes en el hebreo. La sexualidad prohibida queda clara por el contexto inmediato.
  doctrine_reference: 'Translation philosophy: optimal equivalence; primacía del texto original; no paraphrase beyond source warrant.'
translation_notes:
  revision_awareness: El texto español sigue la revisión final del POB inglés, que sustituyó «close relative» por «flesh» para reflejar más directamente שְׁאֵר. También mantiene la lectura formal del modismo legal en lugar de una paráfrasis dinámica.
  spanish_consistency_notes:
  - Se usa «descubrir» para mantener la fórmula legal recurrente de Levítico 18.
  - Se conserva «carne» para שְׁאֵר, siguiendo la decisión auditada del inglés POB final.
  - La puntuación y el registro buscan ser publicables en español neutro y eclesialmente legible.
