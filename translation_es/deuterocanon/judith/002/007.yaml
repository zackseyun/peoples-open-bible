translation:
  language: es
  text: y preparar tierra y agua[a], porque saldré contra ellos en mi ira, y cubriré toda la faz de la tierra con los pies de mis fuerzas, y los entregaré al saqueo por parte de ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Tierra y agua» probablemente alude a los signos de sumisión que exigía un rey conquistador.
    reason: cultural_note
lexical_decisions:
- source_word: ἑτοιμάζειν
  english_pob_choice: to prepare
  chosen_spanish: preparar
  alternatives_spanish:
  - aprestar
  - dejar listo
  lexicon: BDAG
  rationale: El infinitivo continúa la secuencia imperativa. «Preparar» es claro en español moderno y conserva el sentido amplio sin añadir detalles que el griego no expresa.
- source_word: γῆν καὶ ὕδωρ
  english_pob_choice: earth and water
  chosen_spanish: tierra y agua
  alternatives_spanish:
  - suelo y agua
  - tierra e agua
  lexicon: LSJ
  rationale: La frase se mantiene literal para conservar la imagen concreta del griego. En español, «tierra y agua» suena natural y permite además la posible lectura cultural de sumisión exigida por un conquistador.
- source_word: ἐξελεύσομαι
  english_pob_choice: I will go out
  chosen_spanish: saldré
  alternatives_spanish:
  - saldré fuera
  - marcharé
  lexicon: BDAG
  rationale: «Salir» reproduce bien el valor básico del verbo griego y evita sobrerinterpretar el movimiento militar, aunque ese matiz esté presente por el contexto.
- source_word: ἐν θυμῷ μου
  english_pob_choice: in my wrath
  chosen_spanish: en mi ira
  alternatives_spanish:
  - en mi enojo
  - en mi furor
  lexicon: BDAG
  rationale: «Ira» expresa la fuerza intensa de θυμός y conserva el tono elevado de amenaza real; «furor» sería más enfático, pero menos natural en este registro.
- source_word: καλύψω πᾶν τὸ πρόσωπον τῆς γῆς
  english_pob_choice: I will cover the whole face of the earth
  chosen_spanish: cubriré toda la faz de la tierra
  alternatives_spanish:
  - cubriré toda la superficie de la tierra
  - cubriré el rostro entero de la tierra
  lexicon: LSJ
  rationale: Se conserva el giro bíblico «faz de la tierra», que es fiel al griego y comprensible en español. «Toda» refleja πᾶν con naturalidad.
- source_word: τοῖς ποσὶν τῆς δυνάμεώς μου
  english_pob_choice: with the feet of my forces
  chosen_spanish: con los pies de mis fuerzas
  alternatives_spanish:
  - con los pies de mi ejército
  - con los pies de mi fuerza
  lexicon: LSJ
  rationale: Se preserva la correspondencia con δύναμις como «fuerzas», tal como el audit trail inglés revisado. «Mis fuerzas» mantiene el plural implícito de la tropa y la imagen de pisoteo/ocupación sin sustituirla por un término más tradicional como «ejército».
- source_word: δώσω αὐτοὺς εἰς διαρπαγὴν αὐτοῖς
  english_pob_choice: I will give them over to plunder to them
  chosen_spanish: los entregaré a ellos para ser saqueados
  alternatives_spanish:
  - los entregaré para que ellos los saqueen
  - los daré como botín para ellos
  lexicon: LSJ
  rationale: 'La construcción griega es dura y poco elegante; en español conviene expresar con claridad el resultado pasivo: serán saqueados. «Los entregaré a ellos» conserva el dativo repetido sin borrar la relación entre conquistadores y vencidos.'
theological_decisions:
- issue: Sentido cultural de «tierra y agua»
  english_pob_reading: Retain the literal phrase in the main text and explain its likely submission connotation in a footnote.
  chosen_spanish_reading: Conservar la frase literal «tierra y agua» en el texto principal y explicar en nota su probable sentido de sumisión.
  alternative_spanish_readings:
  - reducirlo a «señales de sumisión»
  - parafrasearlo como «tributo de obediencia»
  rationale: El griego nombra objetos concretos y la traducción no debe borrar esa concreción. La nota permite recuperar la carga histórica probable sin convertirla en paráfrasis del texto principal.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El texto base inglés revisó «army» por «forces» para ajustarse mejor a δύναμις y afinó la última cláusula para reflejar más de cerca la sintaxis griega. La redacción española sigue esa revisión, usando «fuerzas» y una cláusula final pasiva que conserva la relación entre vencedores y vencidos sin suavizar el sentido.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico sobrio y actual, evitando arcaísmos innecesarios.
  - «Yahvé» no aparece porque el versículo no contiene el nombre divino.
  - 'Se conservó la imagen corporal y militar del original: salir en ira, cubrir la faz de la tierra, pies de fuerzas, saqueo.'
  - No se sustituyó «fuerzas» por «ejército» para respetar la decisión léxica auditada en el inglés POB revisado.
