    issue: Uso de 'escogiera' para אֲשֶׁר יִבְחַר
    rationale: El hebreo imperfecto en la fórmula deuteronómica del santuario tiene valor prospectivo. En español, 'escogiera' suena a imperfecto de subjuntivo con matiz hipotético o de estilo indirecto pasado, y no transmite tan claramente 'que Yahvé tu Dios escogerá/elija'.
  - severity: low
    issue: Secuencia 'te volverás y te irás' algo forzada
    rationale: Aunque intenta reflejar literalmente וּפָנִיתָ ... וְהָלַכְתָּ, en español suena menos natural. 'Te volverás' puede mantenerse, pero seguido de 'e irás' fluye mejor que 'te irás' y evita redundancia reflexiva.
  revised_spanish_text: Y cocinarás[a] y comerás en el lugar que Yahvé tu Dios escogerá, y por la mañana te volverás e irás a tus tiendas.
  revised_footnotes:
