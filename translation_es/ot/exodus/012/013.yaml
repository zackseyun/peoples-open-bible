revisions:
- from: Y la sangre les servirá de señal en las casas donde estén ustedes. Cuando vea la sangre, pasaré sobre ustedes[a], y no habrá entre ustedes plaga para destrucción cuando hiera la tierra de Egipto.
  to: Y la sangre les servirá de señal sobre las casas donde estén ustedes. Cuando vea la sangre, pasaré sobre ustedes[a], y no habrá sobre ustedes plaga para destrucción cuando hiera la tierra de Egipto.
  rationale: Se ajusta 'en las casas' a 'sobre las casas' para reflejar mejor עַל y el cuadro espacial de la sangre aplicada a la vivienda. Se cambia 'entre ustedes' por 'sobre ustedes' para seguir más de cerca el hebreo בָכֶם y el ajuste final del POB inglés. Se conserva 'pasaré sobre ustedes' por su valor canónico y léxico, manteniendo la nota alternativa ya documentada.
