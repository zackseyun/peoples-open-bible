review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta la estructura general de la maldición y conserva bien ''el fruto de tu vientre'' / ''el fruto de tu tierra''. Sin embargo, desajusta dos expresiones ganaderas del hebreo: שְׁגַר אֲלָפֶיךָ se refiere a la cría o aumento de tu ganado mayor/herd, no a ''el producto de tus rebaños''; y וְעַשְׁתְּרֹת צֹאנֶךָ se refiere a la cría de tus rebaños/flocks, no específicamente a ''tus ovejas''.'
  spanish_quality_summary: El español es legible, pero 'producto de tus rebaños' suena algo impersonal y menos natural que 'las crías de tu ganado'. Además, usar 'rebaños' para אֲלָפֶיךָ y luego 'ovejas' para צֹאנֶךָ borra la distinción hebrea entre ganado mayor y rebaños de ganado menor. También hay problemas en las decisiones léxicas documentadas ('Acurrado', 'flocks') que indican descuido editorial.
  glossary_alignment: No hay términos teológicos mayores en juego. La principal cuestión de alineación léxica es preservar la distinción entre אֲלָפֶיךָ = ganado/herds y צֹאנֶךָ = rebaños/flocks. 'Vientre' y 'tierra' están bien. 'Maldito será' encaja con el tono formal del pasaje.
  issues:
  - severity: high
    issue: Se perdió la distinción entre ganado mayor y rebaños
    rationale: אֲלָפֶיךָ apunta a ganado bovino/herds, mientras que צֹאנֶךָ designa rebaños de ovejas/cabras. El borrador usa 'rebaños' para el primero y 'ovejas' para el segundo, alterando el contraste del hebreo.
  - severity: medium
    issue: '''el producto de tus rebaños'' no refleja bien שְׁגַר'
    rationale: שְׁגַר se refiere a la cría, progenie o aumento del ganado; 'producto' es más abstracto y menos idiomático en español para animales.
  - severity: medium
    issue: Las notas al pie no reproducen bien la evidencia auditada
    rationale: La nota [a] en inglés preserva una alternativa para 'fruit of your ground', no una explicación de 'fruit of your womb'. La nota [b] trata de las expresiones ganaderas, no de 'tierra/suelo cultivado'.
  - severity: low
    issue: Errores en alternativas léxicas documentadas
    rationale: Aparecen formas incorrectas como 'Acurrado será' y 'flocks', lo que no afecta directamente el texto bíblico final pero sí la calidad del registro editorial.
