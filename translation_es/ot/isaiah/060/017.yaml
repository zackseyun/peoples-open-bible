  rationale: 'Se corrige el marcador inválido y se rehace la cláusula final para reflejar mejor el paralelismo hebreo y la decisión auditada del English POB: dos figuras de autoridad caracterizadas por paz y justicia. ''Gobernante'' y ''regidora'' mantienen personificación poética y buena legibilidad en español; además, ''haré que ... sea ...'' expresa con más fidelidad la fuerza predicativa de שַׂמְתִּי. Se simplifican y realinean las notas para que correspondan exactamente al texto revisado.'
