lexical_decisions:
- source_word: וַאֲשֶׁר
  english_pob_choice: and what
  chosen_spanish: y lo que
  alternatives_spanish:
  - y aquello que
  - y lo cual
  lexicon: HALOT
  rationale: La combinación conjuntiva y relativa introduce aquí el contenido de las obras de Yahvé en favor de Israel. "Y lo que" conserva la referencia relativa de manera natural en español sin volverlo una paráfrasis de modo o manera.
- source_word: עָשָׂה
  english_pob_choice: he did
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo
  - obró
  - realizó
  lexicon: HALOT
  rationale: El verbo hebreo es el común עשה, y en este contexto narrativo se refiere a las acciones de Yahvé por su pueblo. "Hizo" es directo, fiel y natural en español.
- source_word: לָכֶם
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: HALOT
  rationale: El dativo de beneficio expresa acción en favor del pueblo. En español, "por ustedes" comunica mejor ese beneficio que un simple "para ustedes", y conserva el matiz de acción realizada en su favor.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto
  - en la soledad
  lexicon: HALOT
  rationale: Aunque la tradición bíblica en español suele decir "desierto", el contexto del Éxodo y la marcha de Israel permite esta equivalencia. Mantiene la referencia geográfica histórica sin forzar un tecnicismo distinto.
- source_word: בֹּאֲכֶם
  english_pob_choice: you came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - entraron
  lexicon: HALOT
  rationale: El infinitivo constructo con sufijo después de עַד funciona temporalmente. "Llegaron" expresa con naturalidad el arribo del pueblo al destino señalado, sin añadir la idea más específica de entrar en un recinto delimitado.
- source_word: עַד הַמָּקוֹם הַזֶּה
  english_pob_choice: to this place
  chosen_spanish: a este lugar
  alternatives_spanish:
  - hasta este lugar
  - a este sitio
  lexicon: HALOT
  rationale: La segunda עַד marca el punto alcanzado. "A este lugar" es un español claro y natural; conserva la referencia espacial sin repetir de forma rígida la estructura hebrea. "Lugar" mantiene el registro bíblico amplio de הַמָּקוֹם.
theological_decisions:
- issue: Subject implicit in the clause 'he did'
  english_pob_reading: The subject is understood as the LORD from the surrounding context.
  chosen_spanish_reading: El sujeto implícito se entiende como Yahvé por el contexto inmediato.
  alternative_spanish_readings:
  - Dios
  - él
  rationale: El hebreo omite el sujeto porque ya está claro en el discurso. En español conviene mantenerlo implícito y, en la explicación, identificarlo como Yahvé según el contexto deuteronómico, sin alterar el texto base.
  doctrine_reference: Deuteronomio 11:1-4; contexto inmediato del discurso de Moisés sobre las obras de Yahvé
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue ajustada solo por puntuación; no hubo cambios de contenido. La propuesta española sigue el mismo sentido básico y conserva la progresión temporal y espacial del hebreo: obras en el desierto hasta la llegada a este lugar.'
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como nombre divino según el estándar del proyecto, aunque aquí el hebreo no lo escribe de manera explícita en este versículo.
  - '"Desierto" se usa como equivalente bíblico habitual de מִדְבָּר en este contexto narrativo.'
  - '"Lugar" se eligió para הַמָּקוֹם por su amplitud semántica y su naturalidad en español bíblico.'
  - No se añadió puntuación interna antes de "hasta" para reflejar la fluidez del hebreo y el ajuste de la revisión inglesa.
