translation:
  language: es
  text: No confíen en la opresión, ni pongan vana esperanza[a] en el robo; si las riquezas aumentan, no pongan en ellas su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no se vuelvan vanos en el robo» o «no se jacten en el robo». El verbo hebreo es difícil y puede implicar actuar en vano o poner la esperanza en lo vacío.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִּבְטְחוּ
  english_pob_choice: trust
  chosen_spanish: confíen
  alternatives_spanish:
  - pongan su confianza
  - se fíen
  lexicon: HALOT
  rationale: בטח expresa confiar o poner la confianza. «Confíen» conserva el valor de dependencia o respaldo, y funciona bien en una advertencia ética dirigida en plural.
- source_word: בְעֹשֶׁק
  english_pob_choice: in oppression
  chosen_spanish: en la opresión
  alternatives_spanish:
  - en la injusticia
  - en la extorsión
  lexicon: HALOT
  rationale: עֹשֶׁק abarca opresión, explotación y abuso. «Opresión» mantiene el alcance general sin estrecharlo solo a un acto económico.
- source_word: בְגָזֵל
  english_pob_choice: in robbery
  chosen_spanish: en el robo
  alternatives_spanish:
  - en el saqueo
  - en lo robado
  lexicon: HALOT
  rationale: גָזֵל denota robo o lo arrebatado por fuerza. «Robo» es directo, paralelo a «opresión» y claro para el lector español.
- source_word: תֶּהְבָּלוּ
  english_pob_choice: vain hope
  chosen_spanish: vana esperanza
  alternatives_spanish:
  - vanamente se jacten
  - se vuelvan vacíos
  lexicon: HALOT
  rationale: 'La raíz הבל es difícil y puede implicar vaciedad, vanidad o actuar en lo vano. «Vana esperanza» conserva la tensión semántica que el audit trail reconoce: esperanza en algo vacío, sin resolverla demasiado en una sola paráfrasis.'
- source_word: חַיִל
  english_pob_choice: wealth
  chosen_spanish: las riquezas
  alternatives_spanish:
  - la riqueza
  - los recursos
  lexicon: HALOT
  rationale: חַיִל puede significar fuerza, recursos o riqueza. En este contexto, con el incremento posterior, «las riquezas» comunica mejor el sentido material.
- source_word: יָנוּב
  english_pob_choice: if wealth increases
  chosen_spanish: si las riquezas aumentan
  alternatives_spanish:
  - si crecen las riquezas
  - si prosperan
  lexicon: HALOT
  rationale: נוב literalmente alude a brotar o crecer. En español, «aumentan» expresa con naturalidad la idea de incremento de recursos sin perder el matiz de crecimiento.
- source_word: תָּשִׁיתוּ לֵב
  english_pob_choice: set your heart on it
  chosen_spanish: pongan en ellas su corazón
  alternatives_spanish:
  - fijen en ellas su corazón
  - las tengan en el corazón
  lexicon: HALOT
  rationale: La idiomática hebrea שׁית לב se refiere a fijar el corazón o la atención interior en algo. «Pongan en ellas su corazón» conserva el antropologismo bíblico y el paralelismo con la frase anterior.
theological_decisions:
- issue: Sentido del segundo colon difícil de תֶּהְבָּלוּ
  english_pob_reading: The verse warns against placing hope or confidence in wealth gained unjustly, and then broadens to wealth generally if it increases.
  chosen_spanish_reading: El versículo advierte contra poner esperanza vana en el robo y, luego, contra aferrar el corazón a las riquezas aunque aumenten.
  alternative_spanish_readings:
  - No se vuelvan vanos en el robo.
  - No se jacten en el robo.
  rationale: La POB inglesa conserva la tensión interpretativa sin escoger una solución estrecha. «Vana esperanza» mantiene la idea de vaciedad y permite leer la advertencia como una prohibición de apoyarse en el robo como base de seguridad o expectativa.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del audit trail, que cambió «false hope» por «vain hope». En español se reflejó esa preferencia mediante «vana esperanza», manteniendo también el paralelismo entre la opresión, el robo y el aumento de riquezas.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantuvo «corazón» para לֵב, en línea con la antropología bíblica y la práctica POB.
  - «Riquezas» traduce חַיִל en este contexto porque el incremento posterior indica acumulación material, no fuerza militar.
