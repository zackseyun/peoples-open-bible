translation:
  language: es
  text: No desplazarás el mojón[a] de tu prójimo, que fijaron las generaciones anteriores, en tu herencia que heredarás en la tierra que Yahvé tu Dios te da para poseerla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «límite» o «lindero». El hebreo se refiere al límite de la propiedad, representado por una señal o marcador fijo.
    reason: lexical_alternative
lexical_decisions:
- source_word: תַסִּיג
  english_pob_choice: move
  chosen_spanish: mover
  alternatives_spanish:
  - desplazar
  - retirar
  - quitar
  lexicon: HALOT
  rationale: El hifil de נסג expresa el acto de desplazar hacia atrás o alterar un límite. «Mover» es natural en español y conserva la prohibición sin añadir más especificidad de la que pide el hebreo.
- source_word: גְּבוּל
  english_pob_choice: boundary marker
  chosen_spanish: lindero
  alternatives_spanish:
  - límite
  - mojón
  - marca de lindero
  lexicon: HALOT
  rationale: En este contexto legal se trata del límite de una propiedad, normalmente señalado físicamente. «Lindero» comunica bien esa realidad en español y evita tanto la arcaicidad de «mojón» como una paráfrasis demasiado larga.
- source_word: רֵעֲךָ
  english_pob_choice: your neighbor’s
  chosen_spanish: de tu prójimo
  alternatives_spanish:
  - de tu vecino
  - de tu compañero
  - de tu semejante
  lexicon: HALOT
  rationale: רֵעַ alude al miembro cercano de la comunidad, en contexto jurídico-social. «Prójimo» es claro y ampliamente inteligible en español bíblico, y conserva el valor de relación comunitaria sin reducirlo sólo a residencia física.
- source_word: גָּבְלוּ
  english_pob_choice: set
  chosen_spanish: pusieron
  alternatives_spanish:
  - marcaron
  - fijaron
  - establecieron
  lexicon: HALOT
  rationale: El verbo señala la acción de delimitar o marcar un límite. «Pusieron» es idiomático en español junto con «lindero» y deja implícita la fijación del límite realizada por generaciones anteriores.
- source_word: רִאשֹׁנִים
  english_pob_choice: the former generations
  chosen_spanish: los primeros
  alternatives_spanish:
  - los de antes
  - los antepasados
  - las generaciones anteriores
  lexicon: HALOT
  rationale: El hebreo nombra a los que vinieron antes y establecieron primero los límites. «Los primeros» es breve y fiel, aunque deja oír la referencia a la anterioridad histórica; la nota en inglés sobre generaciones anteriores se refleja en la decisión sin sobreexplicar el texto.
- source_word: בְּנַחֲלָתְךָ
  english_pob_choice: in your inheritance
  chosen_spanish: en tu herencia
  alternatives_spanish:
  - en tu heredad
  - en tu posesión heredada
  - dentro de tu herencia
  lexicon: HALOT
  rationale: נַחֲלָה es el término de herencia territorial pactal. «Herencia» es natural en español y conserva el sentido de posesión recibida por asignación divina; «heredad» sería posible, pero menos actual.
- source_word: תִּנְחַל
  english_pob_choice: you will inherit
  chosen_spanish: heredarás
  alternatives_spanish:
  - recibirás como herencia
  - tomarás en herencia
  - poseerás por herencia
  lexicon: HALOT
  rationale: El imperfecto expresa la posesión futura dentro de la distribución de la tierra. «Heredarás» mantiene la relación con נַחֲלָה y su fuerza de posesión recibida, sin perder naturalidad.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino como transliteración del Tetragrámaton, conforme al criterio del proyecto. «Yahvé» es la forma usual en español del POB y evita la sustitución por un título.
- source_word: נֹתֵן לְךָ
  english_pob_choice: is giving you
  chosen_spanish: te da
  alternatives_spanish:
  - te está dando
  - te está dando en posesión
  - te concede
  lexicon: HALOT
  rationale: El participio describe la acción presente y activa de Yahvé respecto de la tierra. En español, «te da» es más natural que una perífrasis continua y mantiene el valor aspectual sin exceso de literalidad.
- source_word: לְרִשְׁתָּהּ
  english_pob_choice: to possess
  chosen_spanish: para que la poseas
  alternatives_spanish:
  - para poseerla
  - para tomar posesión de ella
  - a fin de poseerla
  lexicon: HALOT
  rationale: El infinitivo de ירשׁ expresa la entrada en posesión de la tierra. «Para que la poseas» comunica ese propósito en español claro y conserva la idea de posesión heredada y efectiva.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Se mantiene la transliteración «Yahvé» para preservar el nombre propio del Dios del pacto, en coherencia con la política del proyecto y con el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura aprobada del inglés auditado: mantiene el sentido jurídico de la prohibición, conserva la referencia a generaciones anteriores que fijaron el límite, y refleja el nombre divino como Yahvé/Yahvé́ según la norma del proyecto. No se detectaron revisiones posteriores que alteren esta línea.'
  spanish_consistency_notes:
  - Se conservó un tono bíblico moderno y sobrio, evitando arcaísmos innecesarios.
  - «Lindero» se eligió por claridad jurídica y buena inteligibilidad en español contemporáneo.
  - La construcción «para que la poseas» mantiene el propósito del infinitivo final sin oscurecer la frase.
  - No se usó «Señor» para no borrar el nombre propio divino presente en el hebreo.
