translation:
  language: es
  text: Quien cava un hoyo caerá en él, y quien rompe una pared[a] será mordido por una serpiente.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Pared» también puede entenderse como una cerca o muro limítrofe, probablemente un cerramiento de piedra en el contexto antiguo.
    reason: cultural_note
  - marker: b
    text: 'O: «una serpiente lo morderá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: חֹפֵר
  english_pob_choice: Whoever digs
  chosen_spanish: Quien cava
  alternatives_spanish:
  - El que cava
  - Quien excava
  lexicon: HALOT
  rationale: El participio hebreo tiene fuerza proverbial e indefinida. «Quien cava» conserva esa generalidad con español natural y sobrio; «excava» sería posible, pero «cava» encaja mejor con el objeto «hoyo».
- source_word: גּוּמָּץ
  english_pob_choice: a pit
  chosen_spanish: un hoyo
  alternatives_spanish:
  - un foso
  - un pozo
  lexicon: HALOT
  rationale: El término designa una excavación o hueco cavado. «Hoyo» comunica con claridad la imagen proverbial sin introducir la connotación más técnica o especializada de «foso» o «pozo».
- source_word: יִפּוֹל בּוֹ
  english_pob_choice: will fall into it
  chosen_spanish: caerá en él
  alternatives_spanish:
  - caerá dentro de él
  - caerá en eso
  lexicon: HALOT
  rationale: Con נפל, el español idiomático prefiere «caer en» respecto de un hueco. «En él» mantiene la referencia al hoyo sin recargar la frase y respeta la relación directa del pronombre hebreo.
- source_word: וּפֹרֵץ
  english_pob_choice: whoever breaks through
  chosen_spanish: quien rompe
  alternatives_spanish:
  - quien atraviesa
  - quien derriba
  lexicon: HALOT
  rationale: פרץ expresa irrumpir o abrir una brecha. «Rompe» transmite bien la acción de forzar una barrera en un proverbio breve y es más natural que una paráfrasis más extensa.
- source_word: גָּדֵר
  english_pob_choice: a wall
  chosen_spanish: un muro
  alternatives_spanish:
  - una cerca
  - una tapia
  lexicon: HALOT
  rationale: Aunque el término puede abarcar cerca o muro de contención, el contexto sugiere una barrera sólida. «Muro» conserva esa fuerza física; «cerca» podría sonar demasiado liviano para la imagen.
- source_word: יִשְּׁכֶנּוּ
  english_pob_choice: will be bitten by a snake
  chosen_spanish: será mordido por una serpiente
  alternatives_spanish:
  - lo morderá una serpiente
  - será atacado por una serpiente
  lexicon: HALOT
  rationale: La voz pasiva refleja el hebreo con mayor cercanía estructural y mantiene la advertencia proverbial. «Mordido» conserva el sentido de נשך; «serpiente» es la equivalencia clara y normal en español.
- source_word: נָחָשׁ
  english_pob_choice: a snake
  chosen_spanish: una serpiente
  alternatives_spanish:
  - una culebra
  - un reptil
  lexicon: HALOT
  rationale: «Serpiente» es la equivalencia más clara y amplia en español. «Culebra» puede sonar regional o menos neutral, y «reptil» sería demasiado general.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el ajuste revisado del inglés POB: segunda cláusula en orden paralelo, con voz pasiva en español para conservar la relación directa entre el muro roto y la mordedura de la serpiente.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras terminologías de nombre divino porque el verso no contiene el Tetragrámaton.
  - Se prefirió un español proverbial, breve y directo, acorde al género sapiencial.
  - Se mantuvo «muro» en lugar de «cerca» para no rebajar la imagen de una barrera física vulnerable.
