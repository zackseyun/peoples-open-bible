lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: And ... came
  chosen_spanish: Y vino
  alternatives_spanish:
  - Y sucedió
  - Y aconteció
  lexicon: HALOT
  rationale: El hebreo usa una fórmula narrativa/secuencial. En español, «y vino» conserva el movimiento de llegada del habla divina sin caer en un calco áspero como «y sucedió» o en un giro más arcaico.
- source_word: דְבַר
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - una palabra
  lexicon: HALOT
  rationale: En la fórmula profética דְבַר יְהוָה, «la palabra» es el equivalente más directo y reconocido para una comunicación divina específica. «Mensaje» explicita la idea, pero suaviza la fórmula bíblica recurrente.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio mediante transliteración adaptada al español, conforme al criterio del proyecto. «El SEÑOR» ocultaría el Tetragrámaton; «Jehová» no es la forma preferida por esta tradición de traducción.
- source_word: אֵלַי
  english_pob_choice: to me
  chosen_spanish: a mí
  alternatives_spanish:
  - para mí
  - hasta mí
  lexicon: HALOT
  rationale: La preposición con sufijo de primera persona singular indica dirección hacia el profeta. «A mí» es natural en español y mantiene la relación directa sin añadir matices ajenos.
- source_word: לֵאמֹר
  english_pob_choice: saying,
  chosen_spanish: diciendo,
  alternatives_spanish:
  - para decir,
  - 'y dijo:'
  lexicon: HALOT
  rationale: La forma infinitiva introduce la cita siguiente. «Diciendo,» reproduce bien la función formulaica en español y deja abierta la continuación del discurso.
theological_decisions:
- issue: Representación del nombre divino יְהוָה en la fórmula profética
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrámaton. Siguiendo la política del proyecto y la auditoría inglesa, se conserva el nombre propio de Dios en vez de sustituirlo por un título, para no borrar la forma concreta del original.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la revisión más reciente; se mantiene la lectura estable y de alta concordancia, por lo que la redacción española sigue fielmente la fórmula profética sin introducir variantes no atestiguadas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente con el criterio del proyecto para יהוה.
  - Se prefirió la fórmula profética directa «la palabra de Yahvé» en lugar de una paráfrasis como «el mensaje de Dios».
  - La puntuación con coma final tras «diciendo» prepara la continuación del oráculo, como en el patrón bíblico habitual.
