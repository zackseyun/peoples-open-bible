translation:
  language: es
  text: Salieron de Kibrot-hataava y acamparon en Hazerot[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Kibrot-hataava probablemente significa «Sepulturas del ansia» o «Sepulturas de la lujuria».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Salieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Partieron
  - Jeron en viaje
  lexicon: HALOT
  rationale: En las fórmulas itinerarias del desierto, נסע expresa salida de una estación. En español, «salieron» reproduce bien el valor narrativo y el movimiento de partida sin sonar forzado. «Se pusieron en marcha» es posible, pero más explicativo; «partieron» es correcto pero un poco más formal.
- source_word: מִקִּבְרֹת הַתַּאֲוָה
  english_pob_choice: from Kibroth-hattaavah
  chosen_spanish: de Kibrot-hataavá
  alternatives_spanish:
  - de Kibrot Hattaavá
  - de las Sepulturas del Deseo
  - de las Sepulturas de la Codicia
  lexicon: HALOT
  rationale: Se mantiene el topónimo transliterado, como en la decisión inglesa, porque funciona como nombre de lugar en la ruta del desierto. La preposición מִן se vierte naturalmente con «de». El nombre se adapta a una grafía española legible; la alusión léxica queda explicada en la nota.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: y acamparon
  alternatives_spanish:
  - y acamparon allí
  - y levantaron el campamento
  - y se establecieron en campamento
  lexicon: HALOT
  rationale: En contexto de itinerario, חנה significa instalar el campamento. «Acamparon» es la equivalencia española más natural y fiel; evita la dureza de «encamparon» o «encamparse».
- source_word: בַּחֲצֵרֹת
  english_pob_choice: at Hazeroth
  chosen_spanish: en Jazerot
  alternatives_spanish:
  - en Hazerot
  - a Jazerot
  lexicon: HALOT
  rationale: Es un nombre de lugar y se translitera. En español, el valor locativo de ב en este tipo de nota de itinerario se expresa mejor con «en». Se usa «Jazerot» para una forma castellana más fluida que conserva la referencia al topónimo.
translation_notes:
  revision_awareness: 'El texto coincide con el sentido del hebreo y con la solución auditada en inglés: fórmula itineraria simple, dos topónimos transliterados y una nota léxica para el significado posible del nombre Kibroth-hattaavá. No se requieren cambios de revisión.'
  spanish_consistency_notes:
  - Se conserva el tono sobrio de lista de itinerario propio de Números 33.
  - Se ha preferido transliteración con adaptación ortográfica española («Jazerot», «hataavá») para legibilidad, sin traducir los topónimos en el cuerpo principal.
  - La nota mantiene la alternativa semántica documentada para el nombre de Kibroth-hattaavá.
