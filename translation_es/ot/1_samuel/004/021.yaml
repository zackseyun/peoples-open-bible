translation:
  language: es
  text: 'Y llamó al niño Ichabod[a], diciendo: «La gloria se ha apartado de Israel», porque el arca de Dios había sido tomada, y por su suegro y su esposo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Ichabod» es un nombre formado de elementos hebreos asociados con «sin gloria» o posiblemente «¿dónde está la gloria?»
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּקְרָא
  english_pob_choice: she named
  chosen_spanish: llamó
  alternatives_spanish:
  - nombró
  - le puso nombre
  lexicon: HALOT
  rationale: En contexto de nombrar, קרא con ל introduce el acto de dar nombre. En español, «llamó al niño» es natural y fiel; «nombró» suena más formal, y «le puso nombre» explicita más de lo necesario.
- source_word: לַנַּעַר
  english_pob_choice: the boy
  chosen_spanish: al niño
  alternatives_spanish:
  - al muchacho
  - al joven
  lexicon: HALOT
  rationale: Aunque נַעַר puede ser «muchacho/joven», aquí se trata del hijo recién nacido. «Niño» comunica bien la referencia sin endurecer el matiz etario.
- source_word: אִי כָבוֹד
  english_pob_choice: Ichabod
  chosen_spanish: Icabod
  alternatives_spanish:
  - Ichabod
  - I-jabod
  lexicon: HALOT
  rationale: Se conserva el nombre propio en transliteración; «Icabod» refleja una forma hispanizada legible. No se traduce el sentido en el texto principal para preservar la función onomástica y la tensión etimológica documentada.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: HALOT
  rationale: Es la fórmula de cita estándar. «Diciendo» conserva la transición al discurso sin añadir una coordinación interpretativa innecesaria.
- source_word: גָּלָה
  english_pob_choice: has departed
  chosen_spanish: se ha apartado
  alternatives_spanish:
  - ha partido
  - se ha ido
  lexicon: HALOT
  rationale: El hebreo expresa alejamiento/pérdida de la gloria; «se ha apartado» mantiene el movimiento de retirada sin forzar la imagen de «exilio» en español. «Gloria» se conserva por su fuerza teológica y su equivalencia estable en el contexto.
- source_word: כָבוֹד
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - el honor
  lexicon: HALOT
  rationale: En este pasaje כָבוֹד designa la gloria vinculada con la presencia de Dios y el desastre de Israel. «La gloria» preserva esa amplitud sin reducirla a «honor».
- source_word: מִיִּשְׂרָאֵל
  english_pob_choice: from Israel
  chosen_spanish: de Israel
  alternatives_spanish:
  - de en medio de Israel
  - fuera de Israel
  lexicon: HALOT
  rationale: La preposición מִן indica separación/origen; en español natural, «de Israel» comunica la salida o separación sin sobrecargar la frase.
- source_word: אֶל הִלָּקַח אֲרוֹן הָאֱלֹהִים
  english_pob_choice: because the ark of God had been taken
  chosen_spanish: porque el arca de Dios había sido tomada
  alternatives_spanish:
  - a causa de que el arca de Dios había sido tomada
  - por haber sido tomada el arca de Dios
  lexicon: HALOT
  rationale: Aunque אֶל es gramaticalmente difícil, el contexto causal del relato exige una relación de causa. «Había sido tomada» expresa היטב el pasivo del infinitivo sin endurecer la sintaxis española.
- source_word: אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca de Dios
  lexicon: HALOT
  rationale: Se mantiene la designación directa y transparente del objeto sagrado. No se introduce ninguna reformulación litúrgica adicional.
- source_word: וְאֶל חָמִיהָ וְאִישָׁהּ
  english_pob_choice: and because of her father-in-law and her husband
  chosen_spanish: y por su suegro y su esposo
  alternatives_spanish:
  - y a causa de su suegro y de su esposo
  - y por su suegro y su marido
  lexicon: HALOT
  rationale: El segundo אֶל continúa la motivación causal. «Suegro» y «esposo» son los equivalentes contextuales claros; «esposo» mantiene un registro digno y neutral.
theological_decisions:
- issue: Sentido de «la gloria» en relación con Israel y el arca
  english_pob_reading: Render כָבוֹד as 'the glory' without making explicit whether this means God's manifested presence, Israel's honor, or both.
  chosen_spanish_reading: Renderizar כָבוֹד como «la gloria» sin precisar si alude a la presencia manifiesta de Dios, al honor de Israel, o a ambos.
  alternative_spanish_readings:
  - «La gloria de Dios se ha apartado de Israel»
  - «El honor se ha apartado de Israel»
  rationale: El hebreo conserva una formulación breve y teológicamente cargada. En español, «la gloria» preserva esa amplitud y la tensión entre la pérdida del arca, el juicio sobre la casa de Elí y la retirada de la gloria sin resolver el alcance exacto.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión: no hubo cambios sustantivos respecto del consenso de alta concordancia. La redacción española conserva el valor causal de los dos miembros con אֶל y mantiene la tensión semántica de כָבוֹד sin explicitarla en exceso.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton en otros pasajes, pero aquí el texto dice «Dios» (הָאֱלֹהִים), por lo que no se introduce ningún reemplazo.
  - Se conserva «la gloria» como traducción principal de כָבוֹד, en línea con el audit trail inglés.
  - No se usa «Cristo» ni terminología eclesiástica añadida; el versículo trata del arca y del nombre del niño.
  - «Esposo» se eligió sobre «marido» por registro más neutro y digno, sin alterar el sentido relacional.
