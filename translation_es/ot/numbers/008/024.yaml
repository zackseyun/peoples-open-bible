translation:
  language: es
  text: 'Esto es lo que corresponde a los levitas: de veinticinco años de edad en adelante[a], vendrá a cumplir su servicio en el servicio de la tienda de reunión.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a desempeñar servicio» / «a cumplir deber»; el hebreo לִצְבֹא צָבָא usa un modismo de servicio-deber con resonancias militares.
    reason: lexical_alternative
lexical_decisions:
- source_word: זֹאת אֲשֶׁר לַ/לְוִיִּם
  english_pob_choice: This is what pertains to the Levites
  chosen_spanish: Esto es lo que corresponde a los levitas
  alternatives_spanish:
  - Esto es lo que pertenece a los levitas
  - Esto es lo que concierne a los levitas
  - Esto es lo que aplica a los levitas
  lexicon: HALOT
  rationale: La expresión introduce una norma aplicable al grupo levítico. «Corresponde a» conserva el sentido normativo/legal de la cláusula sin sonar forzado en español.
- source_word: מִ/בֶּן חָמֵשׁ וְ/עֶשְׂרִים שָׁנָה וָ/מַעְלָה
  english_pob_choice: from twenty-five years old and upward
  chosen_spanish: de veinticinco años de edad en adelante
  alternatives_spanish:
  - desde los veinticinco años y más
  - a partir de los veinticinco años
  - de veinticinco años hacia arriba
  lexicon: HALOT
  rationale: La expresión marca una edad mínima. «De ... en adelante» es una forma natural y fiel para el rango inclusivo del hebreo.
- source_word: יָבוֹא
  english_pob_choice: he shall come
  chosen_spanish: entrará
  alternatives_spanish:
  - vendrá
  - ha de entrar
  - vendrá a
  lexicon: HALOT
  rationale: El verbo singular se conserva con un sujeto genérico masculino singular, como en el inglés auditado. «Entrará» funciona bien en español legal y ritual.
- source_word: לִ/צְבֹא צָבָא
  english_pob_choice: to do duty
  chosen_spanish: a hacer servicio
  alternatives_spanish:
  - a desempeñar su servicio
  - a cumplir su deber
  - a hacer deber
  lexicon: HALOT
  rationale: El idiomatismo hebreo tiene un matiz de servicio organizado, incluso con resonancia militar. En español, «hacer servicio» preserva mejor esa fuerza que un simple «servir», y mantiene la nota de deber/duties del texto auditado.
- source_word: בַּ/עֲבֹדַת
  english_pob_choice: in the service of
  chosen_spanish: en el servicio
  alternatives_spanish:
  - en el trabajo de
  - en la labor de
  - en el servicio de
  lexicon: HALOT
  rationale: עֲבֹדָה aquí alude al trabajo asignado en el ámbito sagrado. «En el servicio» conserva el carácter funcional y cultual del término.
- source_word: אֹ֥הֶל מוֹעֵֽד
  english_pob_choice: the tent of meeting
  chosen_spanish: del tabernáculo de reunión
  alternatives_spanish:
  - de la tienda de reunión
  - del tabernáculo del encuentro
  - de la tienda del encuentro
  lexicon: HALOT
  rationale: «Tabernáculo de reunión» es una forma eclesial clara en español bíblico y comunica bien אֹהֶל מוֹעֵד. Se evita una traducción demasiado literal que suene menos idiomática en español.
theological_decisions:
- issue: Sujeto genérico singular en una norma colectiva
  english_pob_reading: he shall come
  chosen_spanish_reading: entrará
  alternative_spanish_readings:
  - ellos entrarán
  - vendrán
  - ha de entrar
  rationale: El hebreo usa singular para una instrucción general sobre los levitas. En español, mantener un verbo singular genérico preserva la forma del texto sin perder el sentido colectivo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Matiz de servicio/duty con posible trasfondo militar en לִצְבֹא צָבָא
  english_pob_reading: to do duty
  chosen_spanish_reading: a hacer servicio
  alternative_spanish_readings:
  - a cumplir deber
  - a desempeñar servicio
  - a hacer el servicio
  rationale: La POB inglesa decidió no aplanar el idiomatismo a «serve» sin más, sino reflejar el sentido de obligación/turno. En español, «hacer servicio» conserva esa dureza funcional y el matiz de deber sin introducir una interpretación excesivamente militarizada.
  doctrine_reference: DOCTRINE.md Translation philosophy §2, §5
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó la cláusula verbal de «to serve» a «to do duty» para reflejar mejor el modismo לִצְבֹא צָבָא. La presente versión española sigue esa decisión, evitando reducir el pasaje a un simple «servir» y conservando el matiz de deber/turno propio del texto fuente.
  spanish_consistency_notes:
  - Se mantiene «levitas» como designación de grupo, en minúscula por tratarse de un etnónimo en español bíblico.
  - Se conserva la fórmula cultual «tabernáculo de reunión» para אֹהֶל מוֹעֵד, en coherencia con el registro bíblico español.
  - Se usa un verbo singular genérico («entrará») para reflejar la forma hebrea y la lectura auditada en inglés.
