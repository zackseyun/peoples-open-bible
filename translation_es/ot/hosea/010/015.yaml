review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del hebreo: Betel como topónimo, la causa del juicio por la maldad intensificada de Israel, y la caída total del rey de Israel al amanecer. Sin embargo, dos puntos necesitan ajuste para una fidelidad más natural al sentido fuente y al rastro POB: (1) «ha hecho Betel con ustedes» suena poco idiomático y no reproduce bien la construcción española esperable para עָשָׂה לָכֶם; (2) «será completamente cortado» preserva demasiado literalmente la imagen verbal y en español resulta torpe/ambigua, mientras que el POB inglés justificó una lectura de destrucción/remoción total con nota de alternativas.'
  spanish_quality_summary: 'El texto es claro en su mayor parte, pero hay dos expresiones poco naturales en español bíblico contemporáneo: «ha hecho Betel con ustedes» y «será completamente cortado». También conviene simplificar «la gran maldad de ustedes» a «su gran maldad» para mayor fluidez sin pérdida de significado. El resto del registro es digno y legible.'
  glossary_alignment: 'No hay conflicto con las directrices terminológicas mayores del proyecto. «Betel» es adecuado para בֵּית אֵל. No aparecen Yahvé, Mesías, esclavo, etc. La decisión principal a corregir es estilístico-lexical: para נִדְמֹה נִדְמָה conviene una formulación española natural como «será totalmente destruido», manteniendo en nota las alternativas «será por completo silenciado» y «será totalmente eliminado/cortado».'
  issues:
  - severity: medium
    issue: «Así ha hecho Betel con ustedes» suena poco idiomático en español.
    rationale: Aunque el hebreo עָשָׂה לָכֶם admite una traducción bastante directa, en español «hacer con alguien» aquí resulta rígido. «Así les ha hecho Betel» o «Así ha tratado Betel a ustedes» es más natural y fiel.
  - severity: medium
    issue: «La gran maldad de ustedes» es comprensible pero menos natural que «su gran maldad».
    rationale: El español neutral y eclesial prefiere el posesivo átono en este contexto. No se pierde el valor enfático de la repetición hebrea, ya explicado en nota.
  - severity: high
    issue: «Será completamente cortado» es torpe y potencialmente confuso en español.
    rationale: La justificación POB inglesa favorece una idea de destrucción/remoción total. En español, «cortado» no comunica de manera clara el juicio profético sobre un rey. «Será totalmente destruido» expresa mejor el sentido principal, dejando las demás posibilidades en nota.
  revised_spanish_text: Así les ha hecho Betel[a] por causa de su gran maldad[b]. Al amanecer, el rey de Israel será totalmente destruido[c].
  revised_footnotes:
