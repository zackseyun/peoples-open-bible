translation:
  language: es
  text: Cuando den un toque de alarma[a], los campamentos que están del lado oriental partirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘una señal de alarma’. El hebreo se refiere aquí al toque distintivo de trompeta que señalaba el movimiento del campamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּתְקַעְתֶּם
  english_pob_choice: When you blow
  chosen_spanish: Cuando toquen
  alternatives_spanish:
  - Y tocarán
  - Cuando hagan sonar
  lexicon: HALOT
  rationale: תקע con trompeta significa tocar o hacer sonar el instrumento. En español, 'Cuando toquen' expresa de manera natural la instrucción temporal sin forzar un futuro literal.
- source_word: תְּרוּעָה
  english_pob_choice: an alarm blast
  chosen_spanish: un toque de alarma
  alternatives_spanish:
  - un toque de señal
  - una alarma sonora
  - un toque de trompeta de alarma
  lexicon: HALOT
  rationale: En el contexto de Números 10, תרועה es un sonido distintivo de señal para mover el campamento. 'Toque de alarma' conserva el valor técnico de señal y la fuerza funcional del término sin reducirlo a una simple 'voz' o 'grito'.
- source_word: וְנָסְעוּ
  english_pob_choice: shall set out
  chosen_spanish: partirán
  alternatives_spanish:
  - saldrán
  - se pondrán en marcha
  - levantarán el campamento
  lexicon: HALOT
  rationale: נסע, aplicado a campamentos, comunica la acción de ponerse en marcha o salir de un lugar. 'Partirán' es breve, natural y mantiene la idea de salida ordenada.
- source_word: הַמַּחֲנוֹת
  english_pob_choice: the camps
  chosen_spanish: los campamentos
  alternatives_spanish:
  - los campamentos tribales
  - los campamentos
  - las huestes
  lexicon: HALOT
  rationale: El plural designa las agrupaciones de Israel dispuestas alrededor del tabernáculo. 'Campamentos' es claro en español y conserva la referencia colectiva.
- source_word: הַחֹנִים
  english_pob_choice: that are camped
  chosen_spanish: que están acampados
  alternatives_spanish:
  - acampados
  - que acampan
  - que están alojados
  lexicon: HALOT
  rationale: El participio describe su estado actual. 'Que están acampados' reproduce bien ese valor durativo/estativo y evita perder la relación con el lugar donde permanecen.
- source_word: קֵדְמָה
  english_pob_choice: on the east side
  chosen_spanish: al oriente
  alternatives_spanish:
  - hacia el oriente
  - en el lado oriental
  - al este
  lexicon: HALOT
  rationale: קֵדְמָה señala la posición oriental del grupo. 'Al oriente' es bíblico, claro y adecuado para un registro eclesial sin necesidad de perifrases.
translation_notes:
  revision_awareness: Se ha seguido de cerca el cierre revisado del inglés POB, que optó por 'that are camped' para mantener naturalidad sin perder el matiz estativo. La versión española conserva esa misma relación aspectual con 'que están acampados'.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa 'campamentos' para el plural hebreo, evitando una paraphrase excesiva como 'tribus' o 'huestes'.
  - Se preserva el valor técnico de תרועה mediante lenguaje de señal/tocar, no de simple ruido.
