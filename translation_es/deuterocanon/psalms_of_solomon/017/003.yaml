translation:
  language: es
  text: Pero nosotros pondremos nuestra esperanza en Dios, nuestro Salvador[a], porque el dominio de nuestro Dios es para siempre con misericordia[d][b], y el reino[c] de nuestro Dios es para siempre sobre las naciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esperaremos en Dios, nuestro libertador».'
    reason: alternative_reading
  - marker: b
    text: 'O: «la soberanía de nuestro Dios es para siempre en misericordia».'
    reason: alternative_reading
  - marker: c
    text: 'O: «el reinado de nuestro Dios es para siempre sobre las naciones».'
    reason: alternative_reading
  - marker: d
    text: 'O: «Pero esperamos en Dios, nuestro Salvador».'
    reason: previous_rendering
lexical_decisions:
- source_word: ἐλπιοῦμεν
  english_pob_choice: we will hope
  chosen_spanish: esperaremos
  alternatives_spanish:
  - tendremos esperanza
  - pondremos nuestra esperanza
  - esperaremos con confianza
  lexicon: BDAG
  rationale: El futuro griego ἐλπιοῦμεν pide un futuro en español. "Esperaremos" conserva el matiz de esperanza confiada y mantiene el contraste temporal con la condición anterior del contexto inmediato.
- source_word: ἐπὶ τὸν θεόν
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - sobre Dios
  - en el Dios
  lexicon: BDAG
  rationale: Con ἐλπίζω, el español natural es "esperar en". "En Dios" transmite dependencia y confianza sin calco forzado.
- source_word: σωτῆρα
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - Libertador
  - Salvador
  lexicon: BDAG
  rationale: '"Salvador" es el equivalente español directo y conserva el valor confesional del título. Se capitaliza por tratarse de un título divino aplicado a Dios.'
- source_word: κράτος
  english_pob_choice: dominion
  chosen_spanish: dominio
  alternatives_spanish:
  - poder
  - soberanía
  - dominio
  lexicon: BDAG
  rationale: Aquí κράτος se entiende como poder gobernante efectivo, en paralelo con "reino" y con la cláusula "sobre las naciones". "Dominio" expresa bien esa autoridad real en español.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - eternamente
  lexicon: BDAG
  rationale: La expresión idiomática de duración perpetua se vierte de modo natural como "para siempre".
- source_word: μετʼ ἐλέους
  english_pob_choice: with mercy
  chosen_spanish: con misericordia
  alternatives_spanish:
  - en misericordia
  - acompañado de misericordia
  lexicon: BDAG
  rationale: μετά con genitivo indica acompañamiento; "con misericordia" preserva que el dominio de Dios se ejerce de manera misericordiosa.
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - realeza
  - reino
  lexicon: BDAG
  rationale: '"Reino" es el equivalente más natural en español y mantiene el paralelismo con el término anterior de autoridad soberana.'
- source_word: ἐπὶ τὰ ἔθνη
  english_pob_choice: over the nations
  chosen_spanish: sobre las naciones
  alternatives_spanish:
  - sobre los pueblos
  - entre las naciones
  lexicon: BDAG
  rationale: ἐπί aquí expresa autoridad o dominio extendido; "sobre las naciones" conserva ese sentido real y evita la ambigüedad de una mera ubicación.
theological_decisions:
- issue: Cómo traducir σωτῆρα como título divino
  english_pob_reading: Savior
  chosen_spanish_reading: Salvador
  alternative_spanish_readings:
  - Libertador
  rationale: En este contexto confesional, el título apunta a la acción salvadora de Dios y no solo a una liberación circunstancial. "Salvador" preserva mejor la fuerza teológica que una opción más situacional como "Libertador".
  doctrine_reference: Original-language primacy; preservation of confessional divine titles
- issue: Cómo reflejar la relación entre κράτος y βασιλεία
  english_pob_reading: dominion ... kingdom
  chosen_spanish_reading: dominio ... reino
  alternative_spanish_readings:
  - poder ... reinado
  - soberanía ... reino
  rationale: La dobletilla presenta autoridad efectiva y esfera/regla real. "Dominio" y "reino" reproducen esa combinación sin homogeneizar los dos términos.
  doctrine_reference: Consistency of key terms, preserving semantic distinction
- issue: Si el matiz de duración debe ser literal o idiomático
  english_pob_reading: forever
  chosen_spanish_reading: para siempre
  alternative_spanish_readings:
  - eternamente
  - por los siglos
  rationale: La frase griega es una fórmula de perpetuidad; "para siempre" es la forma más clara y bíblicamente inteligible en español.
  doctrine_reference: Readable modern Spanish with source fidelity
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente que corrige el valor temporal de ἐλπιοῦμεν: se traduce con futuro en español («esperaremos»), no con presente. También se conserva la capitalización reverencial de «Salvador» conforme al pasaje revisado en inglés.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y «Salvador» para σωτῆρα, siguiendo el uso confesional del pasaje.
  - Se prefirió «reino» para βασιλεία y «dominio» para κράτος para no borrar la distinción semántica documentada.
  - «Sobre las naciones» conserva el valor de autoridad de ἐπὶ τὰ ἔθνη, en paralelo con la nota inglesa.
  - La puntuación y el orden siguen el español formal contemporáneo, evitando calcos innecesarios.
