translation:
  language: es
  text: 'Después de estas cosas, Dios probó a Abraham[a] y le dijo: «¡Abraham!». Él respondió: «Aquí estoy»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «puso a prueba a Abraham».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Y sucedió que
  - Y aconteció que
  lexicon: HALOT
  rationale: La forma narrativa וַיְהִי funciona aquí como transición temporal; en español, «Después de estas cosas» reproduce bien el giro sin añadir un conector innecesario como «Y sucedió que».
- source_word: אַחַר הַדְּבָרִים הָאֵלֶּה
  english_pob_choice: after these things
  chosen_spanish: después de estas cosas
  alternatives_spanish:
  - después de estos acontecimientos
  - tras estas cosas
  lexicon: HALOT
  rationale: «דְּבָרִים» es amplio, por lo que «cosas» conserva la generalidad del hebreo. «Acontecimientos» sería más interpretativo.
- source_word: הָאֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: HALOT
  rationale: Aquí el referente es el Dios verdadero en la narración. En español idiomático, «Dios» es natural; «el Dios» suena menos fluido sin aportar precisión adicional.
- source_word: נִסָּה
  english_pob_choice: tested
  chosen_spanish: probó
  alternatives_spanish:
  - puso a prueba
  - tentó
  lexicon: HALOT
  rationale: El verbo puede significar probar o poner a prueba. «Probó» mantiene la fuerza de la acción y evita la ambigüedad moral de «tentó»; «puso a prueba» también sería viable, pero más explicativo.
- source_word: וַיֹּאמֶר אֵלָיו
  english_pob_choice: and said to him
  chosen_spanish: y le dijo
  alternatives_spanish:
  - y le habló
  - y dijo a él
  lexicon: HALOT
  rationale: «Le dijo» es la forma natural y precisa en español para el habla dirigida a Abraham.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham!
  chosen_spanish: ¡Abraham!
  lexicon: HALOT
  rationale: Se conserva el vocativo con puntuación exclamativa.
- source_word: הִנֵּנִי
  english_pob_choice: Here I am
  chosen_spanish: Aquí estoy
  alternatives_spanish:
  - Heme aquí
  - Presente
  lexicon: HALOT
  rationale: El modismo expresa disponibilidad y atención; «Aquí estoy» es una equivalencia natural y fiel en español contemporáneo.
theological_decisions:
- issue: Sentido de נִסָּה con Dios como sujeto
  english_pob_reading: God tested Abraham
  chosen_spanish_reading: Dios probó a Abraham
  alternative_spanish_readings:
  - Dios puso a prueba a Abraham
  - Dios tentó a Abraham
  rationale: El contexto narrativo apunta a una prueba de fidelidad, no a una incitación al mal. «Probó» conserva la tensión teológica sin resolverla de manera doctrinal; «tentó» induciría una lectura errónea.
  doctrine_reference: Mantener la distinción bíblica entre probar y tentar; cf. Santiago 1:13 como trasfondo doctrinal relevante.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó el arranque redundante «Now» antes de la frase temporal; por eso el español comienza directamente con «Después de estas cosas». También se respetó la elección inglesa de 'tested' para נִסָּה, evitando 'tentó'.
  spanish_consistency_notes:
  - Se mantiene «Dios» para אֱלֹהִים en contexto narrativo.
  - Se conserva un tono bíblico moderno y claro, sin arcaísmos innecesarios.
  - La respuesta de Abraham usa un modismo español natural que preserva la disponibilidad del hebreo.
