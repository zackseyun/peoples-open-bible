theological_decisions:
- issue: Intergenerational guilt and judgment
  chosen_reading: The verse speaks of God judging the present audience together with the iniquities of their fathers because they share in the same pattern of idolatry and reproach.
  alternative_readings:
  - The verse could be read as punishing descendants for ancestors' sins irrespective of their own participation.
  rationale: The immediate context includes 'your iniquities' alongside 'the iniquities of your fathers' and then describes actions in the plural that characterize the judged group. The translation preserves the text's tension without importing a broader doctrinal resolution beyond the verse.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of פְעֻלָּתָם in a judgment context
  chosen_reading: Rendered as 'their deed' rather than 'their recompense.'
  alternative_readings:
  - their recompense
  - their wages
  rationale: The punitive outcome is already expressed by 'I will measure ... into their lap.' Rendering פְעֻלָּתָם as 'their recompense' would risk redundancy and over-interpretation. The text more naturally speaks of measuring back their prior conduct.
