    rationale: «Se mantendrá» añade un matiz de permanencia o continuidad. El hebreo y la decisión inglesa preservan la imagen simple de «estar de pie delante», mejor reflejada por «nadie se levantará delante de él» o «nadie estará delante de él». La primera opción mantiene mejor el tono de confrontación.
