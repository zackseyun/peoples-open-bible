translation:
  language: es
  text: Se apartaron del camino de sus padres y adoraron al Dios del cielo[a], al Dios que habían llegado a conocer. Y fueron expulsados de delante de sus dioses, y huyeron a Mesopotamia[b], y vivieron allí como forasteros por muchos días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al Dios que reconocieron'. El griego puede subrayar tanto el conocimiento decisivo como el reconocimiento pleno.
    reason: lexical_alternative
  - marker: b
    text: La cláusula 'fueron expulsados de delante de sus dioses' es sintácticamente comprimida en griego; el sentido es que fueron expulsados en relación con sus antiguos dioses y luego huyeron a Mesopotamia.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξέβησαν ἐξ ὁδοῦ τῶν γονέων αὐτῶν
  english_pob_choice: They departed from the way of their fathers
  chosen_spanish: Se apartaron del camino de sus padres
  alternatives_spanish:
  - Se desviaron del camino de sus padres
  - Salieron del camino de sus padres
  lexicon: LSJ
  rationale: Mantiene la imagen idiomática de abandonar el camino heredado por los antepasados, sin explicitar más de lo que permite el griego. 'Se apartaron' comunica bien el cambio de dirección y suena natural en español bíblico contemporáneo.
- source_word: προσεκύνησαν
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - se postraron ante
  - rindieron culto a
  lexicon: LSJ
  rationale: En este contexto religioso, el verbo expresa adoración cultual, no solo gesto corporal. 'Adoraron' es claro y fiel para español lector de Biblia.
- source_word: τῷ θεῷ τοῦ οὐρανοῦ
  english_pob_choice: the God of heaven
  chosen_spanish: al Dios del cielo
  alternatives_spanish:
  - al Dios celestial
  - al Dios del cielo y de la tierra
  lexicon: LSJ
  rationale: Es un título bíblico estándar; 'del cielo' conserva la formulación reconocible sin convertirla en paráfrasis. Se evita 'SEÑOR' porque aquí el griego dice explícitamente θεός.
- source_word: θεῷ ᾧ ἐπέγνωσαν
  english_pob_choice: the God whom they had come to know
  chosen_spanish: al Dios que habían llegado a conocer
  alternatives_spanish:
  - al Dios que reconocieron
  - al Dios que conocían
  lexicon: LSJ
  rationale: '''Habían llegado a conocer'' reproduce el valor de ἐπιγινώσκω como conocimiento pleno o decisivo, tal como refleja el auditrail en inglés. ''Conocer'' solo sería posible, pero perdería algo de la fuerza aspectual sugerida por el contexto.'
- source_word: ἐξέβαλον αὐτοὺς ἀπὸ προσώπου τῶν θεῶν αὐτῶν
  english_pob_choice: they were driven out from before their gods
  chosen_spanish: fueron expulsados de delante de sus dioses
  alternatives_spanish:
  - fueron arrojados de delante de sus dioses
  - fueron expulsados de la presencia de sus dioses
  lexicon: LSJ
  rationale: La pasiva y el sujeto implícito del griego se reflejan con 'fueron expulsados', siguiendo la revisión inglesa. 'De delante de' conserva la expresión idiomática de ἀπὸ προσώπου sin suavizarla demasiado.
- source_word: ἔφυγον εἰς Μεσοποταμίαν
  english_pob_choice: fled to Mesopotamia
  chosen_spanish: huyeron a Mesopotamia
  alternatives_spanish:
  - escaparon a Mesopotamia
  lexicon: LSJ
  rationale: '''Huyeron'' expresa el movimiento forzado y la secuencia narrativa posterior a la expulsión. Es la correspondencia natural de ἔφυγον en este contexto.'
- source_word: παρῴκησαν ἐκεῖ ἡμέρας πολλάς
  english_pob_choice: lived there as foreigners for many days
  chosen_spanish: habitaron allí por muchos días
  alternatives_spanish:
  - vivieron allí como forasteros por muchos días
  - residieron allí por largo tiempo
  lexicon: LSJ
  rationale: '''Habitaron'' es más sobrio y bíblico que ''vivieron'', y evita añadir una glosa sociológica que el español podría volver pesada. El matiz de extranjería queda disponible en la nota, como en el inglés, sin obligar al texto principal a una perífrasis más larga.'
theological_decisions:
- issue: Cambio religioso desde la práctica ancestral hacia la adoración del Dios verdadero
  english_pob_reading: The verse is rendered to show a real departure from ancestral religious practice and a turn to the God of heaven, without importing later covenantal or conversion terminology.
  chosen_spanish_reading: El texto muestra un apartarse real del camino religioso heredado y un volverse a la adoración del Dios del cielo, sin introducir vocabulario posterior como 'conversión' o 'alianza' que el versículo no menciona.
  alternative_spanish_readings:
  - Abandonaron la religión de sus padres y se convirtieron al Dios del cielo
  - Renunciaron a sus costumbres antiguas y abrazaron la fe en el Dios del cielo
  rationale: El griego habla de 'salir del camino de los padres' y de adorar al 'Dios del cielo'. La traducción conserva esas categorías propias del texto y evita inferencias doctrinales o eclesiales no explicitadas.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se siguió la revisión del audit trail que cambió la idea de sujeto activo a pasivo/impersonal en el segmento de la expulsión. No se adoptaron expansiones interpretativas adicionales; se mantuvo la progresión narrativa del griego y la equivalencia óptima del inglés POB como guía secundaria auditable.
  spanish_consistency_notes:
  - Se emplea 'Dios' para θεός, conforme al estándar del proyecto.
  - Se mantiene 'Mesopotamia' sin adaptación.
  - Se evita 'SEÑOR' porque el texto griego usa θεός y no κύριος.
  - Se usa 'adoraron' para προσεκύνησαν por su fuerza cultual en contexto religioso.
  - La expresión 'de delante de' conserva el valor idiomático de ἀπὸ προσώπου sin sobreexplicar en el cuerpo del texto.
