revisions:
- from: Esta es la tierra que ustedes asignarán como herencia a las tribus de Israel[a], y estas son sus porciones, declara el Señor Yahvé.
  to: Esta es la tierra que ustedes repartirán como herencia a las tribus de Israel[a], y estas son sus porciones, declara el Señor Dios, Yahvé.
  rationale: Se ajusta el verbo a «repartirán» para un español más natural en contexto de distribución territorial, y se revisa el título divino para reflejar mejor אֲדֹנָי יְהוִה sin ocultar el nombre «Yahvé», manteniendo un tono bíblico claro y digno.
