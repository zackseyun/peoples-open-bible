    issue: 'Frase locativa antinatural: «de junto al lado sur»'
    rationale: Aunque intenta seguir la revisión inglesa «from beside the south side», en español resulta poco idiomática y confusa. Conviene usar «de junto al sur» y dejar la dificultad textual en nota, o una formulación semejante que preserve la ambigüedad sin calco duro.
  - severity: medium
    issue: 'Recíproco forzado: «lloraron el uno con el otro»'
    rationale: El hebreo expresa mutualidad, pero esta formulación es poco natural en español. «Lloraron juntos» transmite bien la acción compartida; si se desea reforzar la mutualidad, puede hacerse en nota o con contexto, sin sacrificar legibilidad.
  - severity: low
    issue: «Cayó rostro en tierra» es posible pero menos claro que «cayó con el rostro en tierra»
    rationale: La forma sin preposición suena bíblica, pero para español moderno y ampliamente legible, la versión con «con» es más transparente y sigue siendo fiel al hebreo.
