translation:
  language: es
  text: 'Y los siervos de Aquis le dijeron[a]: «¿No es este David, el rey de la tierra? ¿No es este de quien cantaban en las danzas, diciendo: “Saúl derribó a sus miles[b], y David a sus diez miles”?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le respondían unos a otros en las danzas», es decir, cantaban de forma responsiva durante el baile.
    reason: lexical_alternative
  - marker: b
    text: «Diez miles» también puede traducirse «miríadas» o «decenas de miles».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַבְדֵי
  english_pob_choice: servants
  chosen_spanish: siervos
  alternatives_spanish:
  - servidores
  - oficiales
  lexicon: HALOT
  rationale: El término hebreo designa a los subordinados de Aquis; en español, «siervos» conserva la amplitud del término sin estrecharlo a una función administrativa específica. Mantiene mejor la correspondencia léxica que «oficiales».
- source_word: אָכִישׁ
  english_pob_choice: Achish
  chosen_spanish: Aquis
  alternatives_spanish:
  - Aquís
  lexicon: Transliteración convencional en español bíblico
  rationale: Se adopta la forma española tradicional y reconocible «Aquis», que representa adecuadamente el nombre propio hebreo en un registro bíblico castellano actual.
- source_word: הֲלוֹא
  english_pob_choice: Is ... not
  chosen_spanish: ¿No es ...?
  alternatives_spanish:
  - ¿Acaso no es ...?
  - ¿No es cierto que ...?
  lexicon: HALOT
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. «¿No es…?» preserva la fuerza interrogativa y la presuposición de acuerdo.
- source_word: מֶלֶךְ הָאָרֶץ
  english_pob_choice: the king of the land
  chosen_spanish: el rey de la tierra
  alternatives_spanish:
  - el rey del país
  - el rey de la tierra
  lexicon: HALOT
  rationale: «Tierra» reproduce directamente אֶרֶץ y conserva la formulación del texto sin interpretar de antemano la extensión política del título.
- source_word: לָזֶה
  english_pob_choice: the one of whom
  chosen_spanish: de quien
  alternatives_spanish:
  - del cual
  - sobre quien
  lexicon: HALOT
  rationale: 'En la construcción con ענה + ב + מחלות, el sentido es referencial: David es el sujeto del canto. «De quien» suena natural en español y conserva esa referencia.'
- source_word: יַעֲנוּ
  english_pob_choice: they sang
  chosen_spanish: cantaban
  alternatives_spanish:
  - respondían
  - entonaban
  lexicon: HALOT
  rationale: En este contexto de danzas y canto responsivo, el verbo implica cantar de manera alternada o responsiva. «Cantaban» comunica el sentido con naturalidad; «respondían» queda implícito en el contexto.
- source_word: בַּמְּחֹלוֹת
  english_pob_choice: in the dances
  chosen_spanish: en las danzas
  alternatives_spanish:
  - en los bailes
  - durante las danzas
  lexicon: HALOT
  rationale: La expresión se refiere a celebraciones danzadas; «en las danzas» es una correspondencia directa y clara en español bíblico contemporáneo.
- source_word: הִכָּה
  english_pob_choice: has struck down
  chosen_spanish: hirió
  alternatives_spanish:
  - derribó
  - mató
  lexicon: HALOT
  rationale: «Hirió» mantiene la fuerza verbal bíblica y el paralelismo poético del canto, sin forzar un registro demasiado moderno o explicativo. En español bíblico, puede abarcar la idea de golpear con resultado letal.
- source_word: בְּאַלְפָּיו
  english_pob_choice: his thousands
  chosen_spanish: a sus miles
  alternatives_spanish:
  - a sus millares
  - a sus miles de hombres
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo numérico en plural. «A sus miles» conserva el paralelismo y la sobriedad del hebreo, aunque en español también puede entenderse como «millares».
- source_word: בְּרִבְבֹתָיו
  english_pob_choice: his ten thousands
  chosen_spanish: a sus diez mil
  alternatives_spanish:
  - a sus miríadas
  - a sus decenas de miles
  lexicon: HALOT
  rationale: «Diez mil» reproduce el valor básico de רבבה y mantiene el paralelismo directo con «miles». Se evita «miríadas» por ser más técnico y menos transparente para la lectura pública.
theological_decisions:
- issue: Alcance del título «rey de la tierra» aplicado a David
  english_pob_reading: the king of the land
  chosen_spanish_reading: el rey de la tierra
  alternative_spanish_readings:
  - el rey del país
  - el rey de la tierra [título literal o percepción hiperbólica]
  rationale: El hebreo solo registra la observación de los siervos de Aquis sin precisar si es título formal, exageración o percepción popular. Se conserva la expresión literal para no resolver la tensión narrativa que el texto deja abierta.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica/narrativa en vez de resolverla interpretativamente.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: conserva la pregunta retórica, el paralelo poético del canto y la ambigüedad narrativa sobre «rey de la tierra», sin suavizarla ni resolverla.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma normal para el nombre divino, pero este versículo no lo contiene.
  - Se mantiene «siervos» para עַבְדֵי según la preferencia léxica del proyecto, en lugar de un término más institucional.
  - La cita poética conserva la estructura paralela y el orden semántico del hebreo para facilitar la auditabilidad.
