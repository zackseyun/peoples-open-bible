translation:
  language: es
  text: No teme la nieve por su casa[a], porque todos en su casa están vestidos de escarlata.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos en su casa están vestidos con vestiduras dobles». Algunos entienden שָׁנִים aquí en el sentido de «doble» más que de tela escarlata.
    reason: lexical_alternative
lexical_decisions:
- source_word: תִירָא
  english_pob_choice: does not fear
  chosen_spanish: no teme
  alternatives_spanish:
  - no está asustada
  - no tiene temor
  lexicon: HALOT
  rationale: El hebreo expresa una ausencia continua de temor; «no teme» mantiene bien el valor verbal sin sonar recargado en español moderno.
- source_word: לְבֵיתָהּ
  english_pob_choice: for her household
  chosen_spanish: por su casa
  alternatives_spanish:
  - por su hogar
  - por su familia
  lexicon: HALOT
  rationale: בַּיִת puede referirse al edificio o al conjunto doméstico. Aquí la imagen parece centrarse en la realidad doméstica concreta, y «por su casa» conserva esa amplitud; en español «casa» puede abarcar también la unidad doméstica.
- source_word: מִשָּׁלֶג
  english_pob_choice: snow
  chosen_spanish: el frío
  alternatives_spanish:
  - la nieve
  - la nevada
  lexicon: HALOT
  rationale: La sintaxis hebrea permite entender la frase como miedo ante la nieve o el peligro del clima invernal para la casa. En español, «el frío» comunica mejor el sentido circunstancial de preocupación práctica sin forzar una imagen que puede sonar extraña en el contexto; por eso se mantiene una formulación interpretativa moderada, coherente con el audit trail inglés sobre el temor en vista de la nieve.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la afirmación anterior; «porque» es la equivalencia más directa y natural en español.
- source_word: בֵּיתָ֗/הּ
  english_pob_choice: all her household
  chosen_spanish: toda su casa
  alternatives_spanish:
  - toda su familia
  - todos los de su casa
  lexicon: HALOT
  rationale: Se conserva el sustantivo «casa» para mantener la correspondencia con בַּיִת y su sentido de conjunto doméstico bajo su cuidado.
- source_word: לָבֻ֥שׁ
  english_pob_choice: are clothed
  chosen_spanish: está vestida
  alternatives_spanish:
  - están vestidos
  - van vestidos
  lexicon: HALOT
  rationale: El hebreo usa un participio singular con valor colectivo. En español, la concordancia puede expresarse de forma natural con un singular colectivo («toda su casa está vestida»), evitando una traducción plana o artificial.
- source_word: שָׁנִים
  english_pob_choice: scarlet
  chosen_spanish: escarlata
  alternatives_spanish:
  - vestiduras dobles
  - doble ropa
  lexicon: HALOT
  rationale: Se sigue la lectura lexical principal de color/tejido escarlata, que es la opción más directa y ampliamente atestiguada; se preserva la alternativa tradicional de «doble» en nota, como en el audit trail inglés.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustantivos: se mantuvo la decisión principal de leer שָׁנִים como «escarlata» y se preservó la alternativa lexical en nota. La única adaptación relevante fue el uso de una formulación española que exprese con naturalidad el temor ante el frío/nieve sin perder el sentido doméstico del verso.'
  spanish_consistency_notes:
  - Se conservó «casa» en vez de «hogar» para reflejar בַּיִת con el doble matiz de casa física y unidad doméstica.
  - Se evitó «SEÑOR» o cualquier sustitución no pertinente; el verso no contiene el nombre divino.
  - La nota a pie de página marca explícitamente la alternativa lexical de שָׁנִים, como exige el expediente inglés.
  - La concordancia singular colectiva («toda su casa está vestida») respeta el hebreo y suena natural en español.
