translation:
  language: es
  text: 'Pero les dijo: «No, sino que han venido para ver[a] la desnudez de la tierra[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para espiar». El verbo hebreo es literalmente «ver», pero en este contexto la acusación es de reconocimiento o espionaje.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «la desnudez de la tierra». La expresión hebrea es metafórica y puede aludir a las zonas expuestas o indefensas de la tierra, es decir, a sus puntos vulnerables.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: But he said
  chosen_spanish: Pero les dijo
  alternatives_spanish:
  - Y les dijo
  - Mas les dijo
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración, pero aquí el valor discursivo es adversativo frente a la negación previa de los hermanos; por eso «Pero» comunica mejor la réplica. «Les dijo» es el equivalente natural de la construcción verbal con objeto indirecto.
- source_word: אֲלֵהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: HALOT
  rationale: El sufijo pronominal plural masculino marca destinatarios del discurso. En español, el dativo átono «les» es la forma más natural y fiel.
- source_word: לֹא
  english_pob_choice: 'No'
  chosen_spanish: 'No'
  alternatives_spanish:
  - No, de ningún modo
  - No, en absoluto
  lexicon: HALOT
  rationale: Se conserva la negación abrupta y enfática como rechazo directo a la afirmación anterior.
- source_word: כִּי
  english_pob_choice: ; / but / for (corrective force)
  chosen_spanish: sino que
  alternatives_spanish:
  - porque
  - pues
  - más bien
  lexicon: HALOT
  rationale: Aquí כִּי introduce una corrección o contraposición tras la negación. En español, «sino que» reproduce mejor esa fuerza correctiva que una causal simple.
- source_word: עֶרְוַת הָאָרֶץ
  english_pob_choice: the nakedness of the land
  chosen_spanish: la desnudez de la tierra
  alternatives_spanish:
  - la desnudez del país
  - las partes expuestas de la tierra
  - las zonas indefensas de la tierra
  lexicon: HALOT
  rationale: Se mantiene la metáfora literal de עֶרְוָה para no borrar la imagen fuente. «Tierra» conserva el sentido básico de אֶרֶץ mejor que «país», y permite dejar visible la tensión entre literalidad e interpretación, que el contexto identifica como vulnerabilidad/exposición.
- source_word: בָּאתֶם
  english_pob_choice: you have come
  chosen_spanish: han venido
  alternatives_spanish:
  - han llegado
  - vinieron
  lexicon: HALOT
  rationale: El perfecto hebreo en discurso directo expresa una acción con relevancia presente; «han venido» suena natural en español y conserva ese valor.
- source_word: לִרְאוֹת
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para mirar
  - para observar
  - para espiar
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente «ver». Se mantiene esa forma en la oración principal para no sustituir la elección léxica fuente por una interpretación directa; la idea de espionaje queda sugerida por el contexto y la nota.
theological_decisions:
- issue: Acusación de espionaje expresada mediante lenguaje metafórico
  english_pob_reading: The Hebrew literally says 'the nakedness of the land,' a metaphor for vulnerable areas that could be exploited by invaders or spies.
  chosen_spanish_reading: Se conserva «la desnudez de la tierra» como metáfora literal, sin convertirla en una explicación interpretativa dentro del texto principal.
  alternative_spanish_readings:
  - las partes expuestas de la tierra
  - las zonas indefensas de la tierra
  rationale: 'No hay una cuestión doctrinal directa, pero sí una decisión hermenéutica importante: el texto acusa a los hermanos con una metáfora de vulnerabilidad territorial. Mantener la imagen evita borrar la tensión semántica y deja la interpretación para la nota.'
  doctrine_reference: Principios de fidelidad textual y preservación de metáforas bíblicas
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «No; you have come...» a «No, but you have come...», afinando la fuerza adversativa/correctiva de כִּי. En español se reflejó esa corrección con «No, sino que...», que mantiene el tono abrupto y la relación de contraste sin perder naturalidad.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «tierra» para אֶרֶץ, coherente con el uso bíblico básico y con la metáfora territorial del pasaje.
  - Se evita traducir interpretativamente לִרְאוֹת como «espiar» en el texto principal, siguiendo la cautela de la edición inglesa auditada.
