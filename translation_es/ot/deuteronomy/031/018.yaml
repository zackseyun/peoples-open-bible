translation:
  language: es
  text: Y yo mismo ciertamente esconderé mi rostro[a] en aquel día, por todo el mal que ha hecho, porque se ha vuelto a otros dioses.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi presencia»; el hebreo dice literalmente «mi rostro», un modismo para el favor o la presencia divina retirada.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/אָנֹכִי
  english_pob_choice: And I myself
  chosen_spanish: Y yo mismo
  alternatives_spanish:
  - Y yo
  - Pero yo
  lexicon: HALOT
  rationale: אָנֹכִי es un pronombre enfático de primera persona. En español, «yo mismo» conserva mejor ese énfasis que un simple «yo». El וְ se toma aquí como conjuntivo «y» en el contexto.
- source_word: הַסְתֵּר אַסְתִּיר
  english_pob_choice: will surely hide
  chosen_spanish: esconderé sin falta
  alternatives_spanish:
  - esconderé ciertamente
  - esconderé del todo
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto más verbo finito intensifica la acción. «Sin falta» comunica esa fuerza enfática en español con naturalidad y sin perder la idea de certeza.
- source_word: פָּנַי
  english_pob_choice: my face
  chosen_spanish: mi rostro
  alternatives_spanish:
  - mi cara
  - mi presencia
  lexicon: HALOT
  rationale: La imagen hebrea es literalmente «mi rostro». «Rostro» mantiene mejor el valor concreto y más solemne que «cara». Se evita resolverla en «presencia» en el texto principal para conservar la tensión idiomática.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - en aquel momento
  lexicon: HALOT
  rationale: Es una expresión temporal estándar. «En aquel día» conserva el demostrativo y suena natural en español bíblico contemporáneo.
- source_word: עַל כָּל הָרָעָה
  english_pob_choice: because of all the evil
  chosen_spanish: por todo el mal
  alternatives_spanish:
  - a causa de todo el mal
  - por toda la maldad
  lexicon: HALOT
  rationale: Aquí עַל expresa causa o base. «Por» comunica esa relación de manera directa. הָרָעָה puede referir mal moral; «mal» mantiene amplitud semántica sin forzar una sola opción.
- source_word: אֲשֶׁר עָשָׂה
  english_pob_choice: that he has done
  chosen_spanish: que ha hecho
  alternatives_spanish:
  - que hizo
  - que él ha hecho
  lexicon: HALOT
  rationale: El verbo está en tercera persona singular. En español se conserva el singular implícito con «ha hecho», sin añadir sujeto explícito que no aparece en el hebreo.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón. «Porque» es la opción más clara y directa en español moderno.
- source_word: פָנָה אֶל
  english_pob_choice: has turned to
  chosen_spanish: se ha vuelto a
  alternatives_spanish:
  - se ha inclinado hacia
  - se ha apartado para ir a
  lexicon: HALOT
  rationale: La expresión idiomática indica giro de lealtad o devoción. «Se ha vuelto a» preserva ese sentido sin sobreexplicarlo.
- source_word: אֱלֹהִים אֲחֵרִים
  english_pob_choice: other gods
  chosen_spanish: otros dioses
  alternatives_spanish:
  - dioses ajenos
  - otros dioses extranjeros
  lexicon: HALOT
  rationale: La expresión designa deidades distintas de Yahvé. «Otros dioses» es la equivalencia más directa y consistente para el español bíblico.
theological_decisions:
- issue: Expresión antropomórfica del ocultamiento divino
  english_pob_reading: Retain 'hide my face' literally in the main text
  chosen_spanish_reading: Mantener «esconderé mi rostro» / «mi rostro» en el texto principal
  alternative_spanish_readings:
  - retiraré mi presencia
  - me apartaré de ellos
  rationale: El hebreo usa la imagen concreta de «rostro». Se conserva para no disolver la tensión teológica en una paráfrasis explicativa. El matiz de favor o presencia queda para la nota.
  doctrine_reference: Translation philosophy §3, §6
- issue: Referencia singular a Israel
  english_pob_reading: Use singular 'he has done ... he has turned'
  chosen_spanish_reading: 'Conservar el singular implícito: «ha hecho... se ha vuelto»'
  alternative_spanish_readings:
  - han hecho... se han vuelto
  - ha hecho... se ha apartado
  rationale: Los verbos hebreos son singulares. Mantenerlos así preserva la personificación de Israel como entidad singular, sin suavizar la forma del texto fuente.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'La versión revisada del POB en inglés no introdujo cambios sustantivos en este versículo; la redacción española sigue el mismo eje de decisiones: conservar el idioma concreto de «rostro», mantener el énfasis del pronombre y reflejar la causalidad de עַל y כִּי sin suavizar la tensión teológica.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como término predeterminado para el nombre divino cuando corresponda; aquí el versículo no lo nombra explícitamente.
  - Se mantiene «otros dioses» por consistencia con la terminología POB para אֱלֹהִים אֲחֵרִים.
  - «Rostro» se usa con sentido idiomático bíblico y no como simple sinónimo de «cara».
  - Se conserva el singular verbal donde el hebreo lo presenta, aunque el referente colectivo sea Israel.
