translation:
  language: es
  text: Pero si reúnen oro y plata y toda cosa hermosa[a], y ven una sola mujer hermosa en apariencia y belleza,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'El griego repite la descripción: literalmente, «hermosa en apariencia y belleza», una manera enfática de subrayar la atracción física.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: LSJ
  rationale: Conserva el valor adversativo de δέ y la condición de ἐάν de manera natural en español. 'Pero si' suena fluido y mantiene el contraste del pasaje.
- source_word: συναγάγωσιν
  english_pob_choice: they gather
  chosen_spanish: juntan
  alternatives_spanish:
  - reúnen
  - recogen
  lexicon: LSJ
  rationale: El verbo expresa reunir o acumular cosas concretas. 'Juntan' es natural en español y no añade una idea comercial más fuerte que la del griego.
- source_word: χρυσίον καὶ ἀργύριον
  english_pob_choice: gold and silver
  chosen_spanish: oro y plata
  alternatives_spanish:
  - oro y plata fina
  lexicon: LSJ
  rationale: Corresponde a los materiales preciosos mencionados literalmente en el griego, con el equivalente idiomático normal en español.
- source_word: πᾶν πρᾶγμα ὡραῖον
  english_pob_choice: every beautiful thing
  chosen_spanish: toda cosa hermosa
  alternatives_spanish:
  - todo objeto bello
  - toda cosa preciosa
  lexicon: LSJ
  rationale: '''Πρᾶγμα'' es amplio, así que ''cosa'' conserva esa amplitud; ''ὡραῖον'' aquí apunta a lo bello o atractivo, por lo que ''hermosa'' es una equivalencia natural sin perder el matiz de valor deseable.'
- source_word: ἴδωσιν
  english_pob_choice: see
  chosen_spanish: ven
  alternatives_spanish:
  - vean
  - divisan
  lexicon: LSJ
  rationale: En español, después de 'si' el presente de indicativo puede funcionar de modo natural en traducción idiomática; aquí 'ven' mantiene sencillez y lectura fluida sin alterar el sentido.
- source_word: γυναῖκα μίαν
  english_pob_choice: one woman
  chosen_spanish: una sola mujer
  alternatives_spanish:
  - una mujer
  - una única mujer
  lexicon: LSJ
  rationale: μίαν es explícito y conviene conservarlo. 'Una sola mujer' refleja mejor la singularidad enfática frente a los bienes acumulados.
- source_word: καλήν
  english_pob_choice: beautiful
  chosen_spanish: hermosa
  alternatives_spanish:
  - bella
  - atractiva
  lexicon: LSJ
  rationale: En este contexto se refiere a la hermosura física; 'hermosa' es claro y plenamente natural en español.
- source_word: τῷ εἴδει καὶ τῷ κάλλει
  english_pob_choice: in appearance and beauty
  chosen_spanish: en apariencia y belleza
  alternatives_spanish:
  - en aspecto y hermosura
  - en forma y belleza
  lexicon: LSJ
  rationale: La repetición griega intensifica la descripción física. 'Apariencia y belleza' conserva la duplicación y permite que el lector perciba el énfasis retórico sin fusionar las dos expresiones.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete y toma como guía el audit trail en inglés: mantiene la condición con δέ, conserva la amplitud de πᾶν πρᾶγμα ὡραῖον con un sustantivo general (''cosa'') y reproduce la repetición enfática de τῷ εἴδει καὶ τῷ κάλλει mediante la nota explicativa.'
  spanish_consistency_notes:
  - Se evitó 'Cristo/Mesías' y terminología teológica ajena porque el versículo no contiene esos conceptos.
  - '''Yahvé'' no aparece en este verso; no hay sustitución ni decisión de nombre divino que aplicar.'
  - Se mantuvo un registro bíblico moderno y sobrio, sin calcos innecesarios del inglés, pero sin expandir el sentido más allá del griego.
