- from: Mientras le seas útil[a], te hará bromas; dos o tres veces te halagará. Luego te mirará como para pasar de largo[b], y moverá la cabeza hacia ti.
  to: Mientras le seas útil[a], se burlará de ti; dos o tres veces te halagará. Luego te mirará como para pasar de largo[b], y sacudirá la cabeza ante ti.
