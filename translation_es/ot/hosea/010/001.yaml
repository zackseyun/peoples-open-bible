  text: גֶּ֤פֶן בּוֹקֵק֙ יִשְׂרָאֵ֔ל פְּרִ֖י יְשַׁוֶּה לּ֑/וֹ כְּ/רֹ֣ב לְ/פִרְי֗/וֹ הִרְבָּה֙ לַֽ/מִּזְבְּח֔וֹת כְּ/ט֣וֹב לְ/אַרְצ֔/וֹ הֵיטִ֖יבוּ מַצֵּבֽוֹת־׃
base_translation:
  language: en
  yaml_path: translation/ot/hosea/010/001.yaml
  text: Israel is a luxuriant vine that yields fruit for himself[a]. The more his fruit increased, the more he multiplied altars; the better his land became[c][b], the better they made the sacred pillars.
  footnotes:
  - marker: a
    text: Or, 'Israel is an emptying vine' or 'a spreading vine.' The Hebrew adjective is difficult; the main text follows the sense favored by the context of abundant fruit and prosperous land.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he brings forth fruit for himself.' The Hebrew may carry a reflexive or self-serving nuance.
    reason: lexical_alternative
  - marker: c
    text: Or, 'standing stones' or 'cult pillars.' These were stone monuments used in worship, here in a condemned idolatrous setting.
    reason: cultural_note
