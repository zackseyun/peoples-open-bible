lexical_decisions:
- source_word: הוֹשֵׁעַ
  english_pob_choice: Hosea
  chosen_spanish: Oseas
  alternatives_spanish:
  - Hoshea
  lexicon: HALOT
  rationale: Nombre propio masculino (HNp). En español bíblico, 'Oseas' es la forma establecida y legible para este nombre; 'Hoshea' conserva una transliteración más cercana al hebreo y se mantiene como alternativa cuando se desea reflejar con mayor proximidad la forma מקורית.
- source_word: חֲנַנְיָה
  english_pob_choice: Hananiah
  chosen_spanish: Hananías
  alternatives_spanish:
  - Hananiá
  lexicon: HALOT
  rationale: Nombre propio masculino (HNp). Se adopta la forma española tradicional y readable 'Hananías', que corresponde al transliterado inglés 'Hananiah'. Se evita una transliteración más rígida porque el nombre ya tiene una forma asentada en español bíblico.
- source_word: חַשּׁוּב
  english_pob_choice: Hasshub
  chosen_spanish: Jasub
  alternatives_spanish:
  - Hasub
  - Jashub
  lexicon: HALOT
  rationale: Nombre propio masculino (HNp). La consonante inicial ח se representa naturalmente con 'J' en español bíblico; por eso 'Jasub' comunica mejor la pronunciación que una transliteración más cruda. 'Hasub' y 'Jashub' se conservan como posibilidades cercanas según la representación del hebreo y la variación ortográfica.
translation_notes:
  revision_awareness: El pasaje es una lista de nombres propios sin variantes textuales relevantes en el paquete de fuente; la revisión más reciente indica que no se requieren cambios. Se conservó la equivalencia óptima del POB inglés, ajustada a formas españolas bíblicamente reconocibles.
  spanish_consistency_notes:
  - Se mantiene la transliteración de nombres propios sin traducirlos.
  - Se usa 'J' para reflejar la fricativa hebrea inicial de ח cuando la forma española común lo favorece.
  - Se preservan notas alternativas donde el audit trail inglés documenta variantes de transliteración.
