    issue: Las notas a y b están asignadas al revés.
    rationale: El ancla [a] está en «bálsamo», pero su nota actual trata la dificultad textual de «has multiplicado»; el ancla [b] está en «remedios», pero su nota actual explica el trasfondo cultural de Galaad y el bálsamo. Esto incumple la disciplina de anclaje de notas.
