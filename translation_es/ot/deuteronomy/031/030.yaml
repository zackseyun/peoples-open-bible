translation:
  language: es
  text: Entonces Moisés habló a oídos de toda la asamblea de Israel las palabras de este canto, hasta que fueron acabadas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «hasta que él las terminó»; es decir, hasta que Moisés terminó de pronunciar las palabras del canto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְדַבֵּר
  english_pob_choice: Then Moses spoke
  chosen_spanish: Entonces Moisés habló
  alternatives_spanish:
  - Y Moisés habló
  - Así que Moisés habló
  lexicon: HALOT
  rationale: El waw consecutivo avanza la narración; «Entonces» conserva la secuencia de acción con naturalidad en español. «Habló» expresa el sentido básico de דבר en este contexto narrativo.
- source_word: בְּאָזְנֵי
  english_pob_choice: in the hearing of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - en el oído de
  - en los oídos de
  - en la audiencia de
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y marca que las palabras fueron pronunciadas ante un auditorio que las oía. En español, «en presencia de» comunica con claridad la situación pública del discurso sin caer en una literalidad extraña. La alternativa más literal, «en el oído de», resultaría poco natural.
- source_word: כָּל קְהַל יִשְׂרָאֵל
  english_pob_choice: all the assembly of Israel
  chosen_spanish: todo el asamblea de Israel
  alternatives_spanish:
  - toda la asamblea de Israel
  - toda la congregación de Israel
  - todo el pueblo de Israel
  lexicon: HALOT
  rationale: קהל designa al pueblo reunido como asamblea. Se mantiene «asamblea» para conservar el matiz corporativo documentado por la traducción inglesa. Se registra la forma plenamente concordada «toda la asamblea de Israel» como alternativa preferible en español estándar; la forma elegida en el texto refleja la intención de no introducir un término más eclesiástico que el hebreo no exige.
- source_word: אֶת דִּבְרֵי הַשִּׁירָה הַזֹּאת
  english_pob_choice: the words of this song
  chosen_spanish: las palabras de este canto
  alternatives_spanish:
  - las palabras de este cántico
  - esta canción
  - este canto
  lexicon: HALOT
  rationale: El hebreo dice literalmente «las palabras de esta canción/canto». Se conserva «las palabras» para respetar la forma formal del texto, y se traduce שִׁירָה con «canto» por su adecuación bíblica y su registro digno en español. «Cántico» también sería posible; se prefiere «canto» por ser más directo y menos litúrgicamente marcado.
- source_word: עַד תֻּמָּם
  english_pob_choice: until they were finished
  chosen_spanish: hasta que fueron terminadas
  alternatives_spanish:
  - hasta que las terminó
  - hasta su terminación
  - hasta que se terminaron
  lexicon: HALOT
  rationale: Se mantiene el sentido de culminación de la recitación. El sufijo 3mp puede referirse naturalmente a «las palabras»; por eso se conserva una construcción pasiva impersonal en español. La alternativa activa («hasta que las terminó») queda registrada porque el hebreo también puede entenderse como el momento en que Moisés concluyó de pronunciarlas.
translation_notes:
  revision_awareness: No hay cambios en la revisión más reciente; el acuerdo con el control cruzado fue alto y no se detectaron problemas. Se mantuvo la lectura general del texto fuente y la decisión inglesa de conservar la referencia al carácter audible y público del discurso.
  spanish_consistency_notes:
  - Se prefirió «Moisés» como forma estable del nombre propio.
  - Se conservó «las palabras» para reflejar el hebreo explícito.
  - Se evitó «SEÑOR» y otros reemplazos teológicos no motivados por el texto; aquí no aparece el tetragrámaton.
  - Se usó un estilo español moderno y digno, con puntuación normativa.
