translation:
  language: es
  text: Hijo mío[a], derrama lágrimas por el muerto, amargúrate y comienza el lamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «sé amargo y ... un lamento»; el verbo final es difícil en el hebreo conservado. El paralelo griego dice: «y como quien sufre terriblemente, comienza el lamento», lo que respalda el sentido adoptado aquí.'
    reason: textual_variant
lexical_decisions:
- source_word: בני
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo
  - Muchacho
  lexicon: HALOT
  rationale: Vocativo singular con sufijo de 1.ª persona; en español, «Hijo mío» conserva el tono paterno-instructivo y la cercanía del apelativo mejor que un simple «Hijo».
- source_word: על המת
  english_pob_choice: for the dead
  chosen_spanish: por el muerto
  alternatives_spanish:
  - por el difunto
  - por el muerto ya fallecido
  lexicon: HALOT
  rationale: El hebreo expresa duelo a causa del fallecido; «por el muerto» es natural en español y mantiene el valor de ocasión/motivo del lamento.
- source_word: הזיב דמעה
  english_pob_choice: shed tears
  chosen_spanish: derrama lágrimas
  alternatives_spanish:
  - haz brotar lágrimas
  - deja correr lágrimas
  lexicon: HALOT
  rationale: 'La imagen es concreta: provocar que la lágrima salga. «Derrama lágrimas» conserva la fuerza imperativa y la materialidad del gesto de duelo.'
- source_word: התמרר
  english_pob_choice: be bitter
  chosen_spanish: sé amargo
  alternatives_spanish:
  - amargúrate
  - vuelve amargo tu corazón
  lexicon: HALOT
  rationale: El hebreo pide entrar en amargura de duelo; la versión inglesa optó por un imperativo directo. «Sé amargo» es breve y fiel, aunque conserva la tensión de una expresión poco usual en español.
- source_word: וגהה קינה
  english_pob_choice: begin the lament
  chosen_spanish: comienza el lamento
  alternatives_spanish:
  - empieza la endecha
  - da inicio al lamento
  lexicon: HALOT
  rationale: קינה es un lamento formal. «Lamento» es claro y sobrio en español; «endecha» sería más técnico pero menos transparente para lectura eclesial amplia.
translation_notes:
  revision_awareness: 'La versión española sigue la línea revisada del texto inglés: no convierte התמרר en un adverbio, sino en un imperativo paralelo («sé amargo»). También conserva el tono de duelo concreto de ambos testigos, hebreo y griego, sin introducir explicaciones interpretativas no exigidas por el verso.'
  spanish_consistency_notes:
  - Se usa «Hijo mío» para mantener el patrón vocativo pastoral de Ben Sira.
  - Se prefirió «muerto» sobre «difunto» por su mayor cercanía al paralelo griego νεκρῷ y por el tono sobrio del pasaje.
  - «Lamento» se usa como equivalente general de קינה; no se introduce «endecha» en el texto principal para evitar una arcaización innecesaria.
