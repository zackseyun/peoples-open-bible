translation:
  language: es
  text: Y Jobab murió, y en su lugar reinó Húsam de la tierra de los temanitas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «de la tierra de Temán» o «de la tierra del temanita». La forma gentilicia hebrea puede entenderse como referencia a la región de Temán o a su gente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָת
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - se murió
  lexicon: HALOT
  rationale: El imperfecto consecutivo narra una acción pasada simple en una nota regnal/genealógica. En español, «murió» es la forma natural y directa, sin añadir matices que el hebreo no exige.
- source_word: יוֹבָב
  english_pob_choice: Jobab
  chosen_spanish: Jobab
  alternatives_spanish:
  - Yobab
  lexicon: Nombre propio
  rationale: Se conserva la transliteración usual del nombre propio. «Jobab» sigue la convención española más extendida y mantiene la identificación del personaje.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: מלך en esta fórmula de sucesión expresa la toma del reinado. «Reinó» reproduce bien la fórmula breve y regnal del hebreo y del POB en inglés.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - en vez de él
  - después de él
  lexicon: HALOT
  rationale: La preposición תחת con sufijo indica sustitución en el cargo. «En su lugar» es la equivalencia española idiomática más clara para sucesión real.
- source_word: חֻשָׁם
  english_pob_choice: Husham
  chosen_spanish: Húsam
  alternatives_spanish:
  - Jusam
  - Jusham
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio según uso español corriente. La acentuación gráfica ayuda a la pronunciación en español sin alterar la identidad del nombre.
- source_word: מֵאֶרֶץ
  english_pob_choice: from the land of
  chosen_spanish: de la tierra de
  alternatives_spanish:
  - de la región de
  - procedente de la tierra de
  lexicon: HALOT
  rationale: מן + אֶרֶץ indica procedencia geográfica. «De la tierra de» mantiene el sentido formal del hebreo con español natural y bíblico.
- source_word: הַתֵּימָנִי
  english_pob_choice: the Temanites
  chosen_spanish: los temanitas
  alternatives_spanish:
  - Temán
  - el temanita
  lexicon: HALOT
  rationale: La forma gentilicia se entiende mejor en español como colectivo plural. «Los temanitas» conserva la relación con Temán y evita la ambigüedad de un singular forzado.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el hebreo y el audit trail inglés: verbo simple de muerte, fórmula regnal breve, expresión de sustitución con תחת y una solución española para el gentilicio de הַתֵּימָנִי. Se corrigió el problema anterior anclando todas las notas al texto con marcadores visibles.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» o terminología eclesiástica no presente en el texto.
  - «Temanitas» se usa como gentilicio colectivo para reflejar la ambigüedad del hebreo sin forzar un singular artificial.
  - La puntuación y el orden buscan ser naturales en español sin perder la secuencia narrativa del hebreo.
