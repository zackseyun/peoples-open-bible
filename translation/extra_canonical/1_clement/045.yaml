translation:
  text: 'You are contentious[a], brothers, and zealous about the things that pertain to salvation. You have looked intently into the holy Scriptures, the true Scriptures, those given through the Holy Spirit. You know that nothing unjust or falsified has been written in them; you will not find righteous people cast off by holy men. The righteous were persecuted, but by the lawless; they were imprisoned, but by the unholy; they were stoned by the lawbreakers; they were killed by those who were defiled and unjust, through intolerable jealousy. While suffering these things, they endured nobly.


    For what shall we say, brothers? Was Daniel thrown into a den of lions by those who feared God? Or were Hananiah and Azariah and Mishael brought down into a furnace of fire by those who practiced the magnificent and glorious religion of the Most High? May this never be! Who then were the ones who did these things? Those who were hateful and full of every evil were stirred up to such a pitch of wrath that they subjected to abuse those who served God with a holy and blameless purpose, not knowing that the Most High is champion and defender of those who worship his all-virtuous name with a pure conscience—to whom be the glory forever and ever. Amen[b].


    But those who endured in confidence inherited glory and honor, and were exalted, and became enrolled by God in their memorial forever and ever[c][d][e][f][b]. Amen.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: The phrase rendered 'through intolerable jealousy' could also be translated 'by unbearable envy.'
    reason: lexical_alternative
    anchor_ref: '45:4'
  - marker: b
    text: The repeated θρησκ- wording is preserved with 'practiced ... religion' to reflect the Greek's emphasis on outward religious devotion.
    reason: lexical_alternative
    anchor_ref: '45:7'
  - marker: b
    text: 'Daniel in the lions'' den: Dan 6. Hananiah, Azariah, and Mishael in the fiery furnace: Dan 3.'
    reason: cross_reference
    anchor_ref: '45:7'
  - marker: f
    text: '''In their memorial'' may evoke the biblical idea of a divine record of remembrance, though the Greek here does not explicitly say ''book.'''
    reason: cross_reference
    anchor_ref: '45:8'
  - marker: e
    text: Or 'the outlawed'.
    reason: previous_rendering
  - marker: d
    text: Or 'The hateful, and those full of every evil, were stirred up'.
    reason: previous_rendering
  - marker: c
    text: Or 'those who endure in confidence inherited'.
    reason: previous_rendering
lexical_decisions:
- source_word: Φιλόνεικοι
  chosen: contentious
  alternatives:
  - fond of strife
  - quarrelsome
  lexicon: LSJ
  rationale: Carries the sense of being eager for strife or rivalry. 'Contentious' preserves the rebuking paraenetic tone without sounding overly colloquial.
- source_word: ζηλωταί
  chosen: zealous
  alternatives:
  - eager
  - devoted
  lexicon: BDAG
  rationale: Retains the positive intensity of earnest concern; the context then qualifies what they are zealous about.
- source_word: τῶν ἀνηκόντων εἰς σωτηρίαν
  chosen: the things that pertain to salvation
  alternatives:
  - the matters belonging to salvation
  - what is fitting for salvation
  lexicon: LSJ
  rationale: Keeps the somewhat formal ecclesial phrasing and preserves the telic relation to salvation.
- source_word: ἐνεκύψατε
  chosen: have bent down to look into
  alternatives:
  - have looked closely into
  - have peered into
  lexicon: BDAG
  rationale: The verb suggests stooping to inspect carefully. This vivid rendering preserves the physical metaphor of close attention to Scripture.
- source_word: ἱερὰς γραφάς
  chosen: holy Scriptures
  alternatives:
  - sacred writings
  lexicon: BDAG
  rationale: Standard ecclesial rendering that preserves scriptural cadence and recognizability.
- source_word: ἀληθεῖς
  chosen: 'true'
  alternatives:
  - truthful
  - reliable
  lexicon: LSJ
  rationale: Simple and weighty; it underscores the trustworthiness of Scripture without overexpansion.
- source_word: παρεπεποιημένον
  chosen: falsified
  alternatives:
  - corrupted
  - forged
  - distorted
  lexicon: LSJ
  rationale: Best captures the idea that nothing in Scripture has been tampered with or made spurious.
- source_word: ἀποβεβλημένους
  chosen: cast off
  alternatives:
  - rejected
  - driven away
  lexicon: BDAG
  rationale: Preserves the force of exclusion while echoing biblical diction.
- source_word: ἀνόμων
  chosen: the lawless
  alternatives:
  - wicked men
  - those without law
  lexicon: BDAG
  rationale: A strong moral-religious term; 'lawless' keeps the scriptural register.
- source_word: ἀνοσίων
  chosen: the unholy
  alternatives:
  - the impious
  - the profane
  lexicon: LSJ
  rationale: Maintains the contrast with the righteous and preserves cultic-moral overtones.
- source_word: παρανόμων
  chosen: the outlawed
  alternatives:
  - the transgressors
  - the lawbreakers
  lexicon: LSJ
  rationale: Used here to vary the cluster of injustice terms. 'Lawbreakers' was possible, but 'outlawed' keeps the harshness and rhetorical compression, though it is somewhat marked.
- source_word: ζήλῳ ἀνεκτρίστῳ
  chosen: through intolerable jealousy
  alternatives:
  - by unbearable jealousy
  - through unrestrainable envy
  lexicon: LSJ
  rationale: ζῆλος here is negative, closer to envy/jealous rivalry. 'Intolerable jealousy' preserves both moral ugliness and rhetorical intensity.
- source_word: εὐκλεῶς
  chosen: nobly
  alternatives:
  - gloriously
  - with honor
  lexicon: LSJ
  rationale: Conveys honorable endurance without sounding inflated in English.
- source_word: θρησκευόντων ... θρησκείαν
  chosen: practiced ... religion
  alternatives:
  - worshiped ... worship
  - observed ... religion
  lexicon: BDAG
  rationale: The repetition is preserved in English as much as possible. 'Religion' here denotes cultic devotion or religious practice, not modern privatized belief.
- source_word: κατείρχθησαν
  chosen: were brought down
  alternatives:
  - were cast down
  - were led down
  lexicon: LSJ
  rationale: The compound verb naturally suggests downward movement into the furnace; 'brought down' preserves that imagery.
- source_word: μηδὲ ταῦτα τοῦτο γένοιτο
  chosen: May this never be!
  alternatives:
  - Far be it!
  - Let not even this be so!
  lexicon: BDAG
  rationale: Idiomatic English equivalent for the emphatic repudiation; preserves rhetorical force.
- source_word: στυγητοί
  chosen: the hateful
  alternatives:
  - the detestable
  - the loathsome
  lexicon: LSJ
  rationale: Describes persons marked by abhorrent character. 'The hateful' is concise and forceful.
- source_word: ἐξήρισαν θυμοῦ
  chosen: were stirred up to such a pitch of wrath
  alternatives:
  - were provoked to such anger
  - were inflamed with rage
  lexicon: LSJ
  rationale: Captures the intensified emotional escalation indicated by the phrase.
- source_word: εἰς αἰκίαν περιβαλεῖν
  chosen: subjected to abuse
  alternatives:
  - wrapped in outrage
  - exposed to mistreatment
  lexicon: LSJ
  rationale: Idiomatic rendering of causing someone to undergo violent mistreatment or insult.
- source_word: προθέσει
  chosen: purpose
  alternatives:
  - resolve
  - intention
  lexicon: BDAG
  rationale: Refers to inward disposition or settled intention; 'purpose' reads naturally while preserving moral seriousness.
- source_word: ὑπέρμαχος καὶ ὑπερασπιστής
  chosen: champion and defender
  alternatives:
  - protector and advocate
  - guardian and defender
  lexicon: LSJ
  rationale: Keeps the paired martial-legal force of the Greek without becoming cumbersome.
- source_word: παναρέτῳ
  chosen: all-virtuous
  alternatives:
  - all-excellent
  - perfectly virtuous
  lexicon: LSJ
  rationale: A rare and elevated adjective; 'all-virtuous' preserves the unusual fullness of praise, even if slightly formal.
- source_word: ὑπομένοντες ἐν πεποιθήσει
  chosen: endure in confidence
  alternatives:
  - persevere in assurance
  - remain steadfast in trust
  lexicon: BDAG
  rationale: πεποίθησις denotes confidence or assurance. This rendering preserves both steadfastness and inward certainty.
- source_word: ἐκληρονόμησαν
  chosen: inherited
  alternatives:
  - received as their portion
  - obtained
  lexicon: BDAG
  rationale: Retains the biblical inheritance motif rather than flattening to a generic 'received'.
- source_word: ἔγγραφοι ἐγένοντο
  chosen: became enrolled
  alternatives:
  - were inscribed
  - were registered
  lexicon: LSJ
  rationale: Suggests formal inscription or registration, fitting the memorial/book imagery.
- source_word: ἐν τῷ μνημοσύνῳ αὐτῶν
  chosen: in their memorial
  alternatives:
  - in the memorial concerning them
  - in his record of remembrance for them
  lexicon: LSJ
  rationale: The phrase is somewhat compressed. This rendering stays close to the Greek while leaving room for later refinement if broader context suggests a more explicit 'book of remembrance' nuance.
theological_decisions:
- issue: Authority and character of Scripture in 'nothing unjust or falsified has been written in them'
  chosen_reading: Render as a strong affirmation of the moral truthfulness and integrity of the Scriptures
  alternative_readings:
  - nothing contradictory has been written in them
  - nothing corrupt has been written in them
  rationale: ἄδικον points to what is unjust/wrong, while παρεπεποιημένον suggests falsified or tampered-with material. The translation preserves Clement's high view of Scripture without importing later technical theories of inerrancy.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
- issue: θρησκεία language for devotion to the Most High
  chosen_reading: Use 'religion' rather than 'worship' in the ironic rhetorical question
  alternative_readings:
  - worship
  - service
  rationale: 'The Greek noun denotes religious observance/practice. ''Religion'' preserves the irony: those who truly practiced devotion to the Most High would not have done such things.'
  doctrine_reference: Readable modern English, not archaic or academic.
- issue: μνημόσυνον imagery in the closing verse
  chosen_reading: Retain 'memorial' rather than expanding to 'book of remembrance' in the main text
  alternative_readings:
  - book of remembrance
  - record
  rationale: The Greek text here does not explicitly say 'book.' Since the imagery may evoke scriptural remembrance motifs, the more explicit alternative is better placed in a footnote than imported into the main text.
  doctrine_reference: Original-language primacy over translation tradition.
