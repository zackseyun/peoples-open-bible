    text: Or 'he digs through houses in the dark'; the Hebrew verb can more literally mean 'digs through,' likely referring to breaking through walls.
    reason: lexical_alternative
  - marker: b
    text: Or 'they seal themselves up by day.' The Hebrew may emphasize shutting themselves in or concealing themselves during daylight hours.
    reason: lexical_alternative
  - marker: c
    text: '''The light'' may refer literally to daylight, while also carrying a possible moral undertone in the context of the wicked avoiding what is exposed.'
    reason: lexical_alternative
