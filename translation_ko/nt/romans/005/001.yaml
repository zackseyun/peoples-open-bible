id: ROM.5.1
reference: Romans 5:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Δικαιωθέντες οὖν ἐκ πίστεως εἰρήνην ⸀ἔχομεν πρὸς τὸν θεὸν διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/romans/005/001.yaml
  text: Therefore[a], since we have been justified by faith, we have peace with God through our Lord Jesus Messiah[c][b],
  footnotes:
  - marker: a
    text: Or, in some manuscripts, 'let us have peace with God.'
    reason: textual_variant
  - marker: b
    text: Or 'on the basis of faith.'
    reason: lexical_alternative
  - marker: c
    text: Greek Christos, 'Messiah'; traditionally 'Christ.'
    reason: lexical_alternative
translation:
  language: ko
  text: 그러므로 우리는 믿음으로 의롭다 함을 받았으니, 우리 주 메시아 예수를 통해 하나님과의 평화를 누리고 있습니다[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 일부 사본에는 「하나님과 평화를 누립시다」(권면형)로 읽는다. SBLGNT 본문이 채택한 직설법 ἔχομεν을 따른다.
    reason: textual_variant
lexical_decisions:
- source_word: Δικαιωθέντες
  english_pob_choice: having been justified
  chosen_korean: 의롭다 함을 받았으니
  alternatives_korean:
  - 의롭게 되었으니
  - 무죄로 인정받았으니
  lexicon: BDAG
  rationale: δικαιόω의 부정과거 수동분사. 바울의 법정적 의미를 보존하기 위해 「의롭다 함을 받다」로 옮긴다.
- source_word: ἐκ πίστεως
  english_pob_choice: by faith
  chosen_korean: 믿음으로
  alternatives_korean:
  - 믿음에서
  - 믿음에 근거하여
  lexicon: BDAG
  rationale: 바울 정형구로서 한국어 「믿음으로」가 가장 자연스럽다.
- source_word: εἰρήνην
  english_pob_choice: peace
  chosen_korean: 평화
  alternatives_korean:
  - 화평
  - 화목
  lexicon: BDAG
  rationale: 하나님과의 회복된 관계를 가리키는 객관적 평화. 「화평」은 전통적이나 「평화」가 현대적 의미 폭을 살린다.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 칭호로 기능하는 Χριστός. DOCTRINE.md 정책에 따라 「메시아」.
