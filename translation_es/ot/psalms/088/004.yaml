review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: causalidad inicial, ''mi alma'', ''mi vida'', y la aproximación a Sheol. Sin embargo, hay dos problemas de fidelidad auditiva y documental: (1) ''harta de males'' introduce en español un matiz algo más subjetivo o coloquial que el simple estado de estar llena; ''llena de males'' o mejor ''llena de calamidades'' preserva mejor la imagen de saturación sin desviar el tono. (2) La nota al pie está mal anclada y mal formulada: el marcador [a] aparece sobre ''males'', pero el contenido de la nota explica ''Sheol''. Eso rompe la correspondencia requerida entre ancla y nota.'
  spanish_quality_summary: El texto es legible y digno, pero 'harta de males' suena menos natural en registro bíblico-neutral y puede sugerir hastío más que plenitud abrumadora. 'Llena de calamidades' fluye mejor y comunica el sentido contextual de רָעוֹת como aflicciones, no maldad moral. También conviene hispanizar el término como 'Seol', forma más establecida y natural en español eclesial, aunque 'Sheol' no es incorrecto si se quiere transliteración más cercana al inglés auditado.
  glossary_alignment: Se preserva correctamente 'alma' para נַפְשִׁי y 'vida' para חַיַּי. La decisión teológica de no colapsar שְׁאוֹל a 'sepulcro' o 'tumba' es acertada, pero en español el equivalente preferible es 'Seol' en vez de 'Sheol' por legibilidad y uso bíblico. La nota debe presentar las alternativas para 'Seol', no para 'males'.
  issues:
  - severity: medium
    issue: La nota al pie [a] está anclada en 'males' pero habla de 'Sheol'.
    rationale: La instrucción del proyecto exige que el marcador aparezca exactamente en la palabra o frase correspondiente. Tal como está, la nota confunde al lector y documenta mal la decisión léxica.
  - severity: medium
    issue: '''Está harta'' no es la mejor equivalencia de שָׂבְעָה en este contexto.'
    rationale: Aunque puede comunicar saturación, en español añade un matiz de cansancio o fastidio que no es el foco léxico primario. 'Está llena' preserva mejor la metáfora base.
  - severity: low
    issue: '''De males'' es menos claro contextualmente que ''de calamidades''.'
    rationale: רָעוֹת aquí se refiere a aflicciones sufridas; 'males' en español puede sonar más abstracto o ambiguo entre mal moral y desgracia padecida. 'Calamidades' aclara el contexto sin paraprasear.
  - severity: low
    issue: '''Sheol'' es menos natural que ''Seol'' en español.'
    rationale: La filosofía de preservar el término hebreo puede mantenerse usando la forma española convencional 'Seol', que mejora la lectura y sigue siendo fiel al concepto fuente.
  revised_spanish_text: Porque mi alma está llena de calamidades, y mi vida se acerca al Seol[a].
  revised_footnotes:
  - marker: a
    text: O «al sepulcro» o «al reino de los muertos». El término hebreo es «Seol».
    reason: lexical_alternative
  revision_rationale: Se corrige la correspondencia entre texto y nota, se mejora la fidelidad semántica de שָׂבְעָה con «está llena», se aclara el sentido contextual de רָעוֹת con «calamidades», y se usa «Seol» como forma española más natural del término hebreo preservado.
