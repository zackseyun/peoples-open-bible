  text: וַ/יְדַבֵּ֣ר שָׁא֗וּל אֶל יוֹנָתָ֤ן בְּנ/וֹ֙ וְ/אֶל כָּל עֲבָדָ֔י/ו לְ/הָמִ֖ית אֶת דָּוִ֑ד וִ/יהֽוֹנָתָן֙ בֶּן שָׁא֔וּל חָפֵ֥ץ בְּ/דָוִ֖ד מְאֹֽד־־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/019/001.yaml
  text: Saul spoke to Jonathan his son and to all his servants to put David to death[b][a], but Jonathan son of Saul delighted greatly in David.
  footnotes:
  - marker: a
    text: Or, 'to kill David.' The Hebrew verb is causative ('put to death'), but in context the sense is straightforwardly that Saul was speaking of David's death.
    reason: lexical_alternative
  - marker: b
    text: Or, 'was very fond of David' or 'loved David greatly.' The Hebrew says Jonathan 'took great delight in' David.
    reason: lexical_alternative
