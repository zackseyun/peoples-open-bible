  yaml_path: translation/ot/2_chronicles/035/003.yaml
  text: And he said to the Levites who taught all Israel[a], who were holy to Yahweh, “Put the holy ark in the house that Solomon son of David, king of Israel, built. You no longer have to carry it on your shoulders[c][b]. Now serve Yahweh your God and his people Israel.”
  footnotes:
  - marker: a
    text: Or 'the Levites who gave understanding to all Israel' or 'the Levites who were instructed for all Israel.' The Hebrew participle can carry the sense of being discerning/instructed or of giving instruction.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'in the house'; that is, the temple built by Solomon.
    reason: cultural_note
  - marker: c
    text: Literally, 'there is no burden for you on the shoulder.'
    reason: lexical_alternative
