translation:
  language: es
  text: Y Petaías, hijo de Meshezabel, de los hijos de Zérah, hijo de Judá, estaba[a] junto al rey para todo asunto[b] relacionado con el pueblo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a la mano del rey'; el hebreo literalmente dice 'a la mano del rey'. La frase puede indicar cercanía cortesana o función oficial.
    reason: lexical_alternative
  - marker: b
    text: O 'para el pueblo'. El hebreo puede significar asuntos relacionados con el pueblo o asuntos tratados en nombre del pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/פְתַֽחְיָה
  english_pob_choice: And Pethahiah
  chosen_spanish: Y Petaías
  alternatives_spanish:
  - Ahora Petaías
  - Petaías
  lexicon: HALOT
  rationale: Se conserva la conjunción inicial para reflejar la continuidad con la lista administrativa. El nombre propio se translitera al español de forma natural y readable.
- source_word: בֶּן מְשֵֽׁיזַבְאֵל
  english_pob_choice: son of Meshezabel
  chosen_spanish: hijo de Meshezabel
  alternatives_spanish:
  - descendiente de Meshezabel
  lexicon: HALOT
  rationale: La construcción genealógica estándar se mantiene de manera formal. 'Hijo de' preserva la relación familiar explícita del hebreo.
- source_word: מִ/בְּנֵי זֶ֤רַח בֶּן יְהוּדָה֙
  english_pob_choice: from the sons of Zerah son of Judah
  chosen_spanish: de los hijos de Zérah, hijo de Judá
  alternatives_spanish:
  - de los descendientes de Zérah, hijo de Judá
  - entre los hijos de Zérah, hijo de Judá
  lexicon: HALOT
  rationale: מִן con 'hijos de' señala procedencia o linaje. 'De los hijos de' conserva la estructura genealógica y mantiene explícito el vínculo 'hijo de Judá'.
- source_word: לְ/יַד הַ/מֶּ֔לֶךְ
  english_pob_choice: was at the king’s side
  chosen_spanish: estaba al lado del rey
  alternatives_spanish:
  - estaba a la mano del rey
  - era el agente del rey
  - estaba en el servicio del rey
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y puede sugerir cercanía, dependencia de autoridad o representación oficial. 'Al lado del rey' reproduce la imagen concreta que el POB inglés ya había suavizado a 'at the king’s side'.
- source_word: לְ/כָל דָּבָ֖ר
  english_pob_choice: for every matter
  chosen_spanish: para todo asunto
  alternatives_spanish:
  - para cada materia
  - para todo negocio
  lexicon: HALOT
  rationale: דָּבָר aquí se entiende como asunto administrativo o encargo, no como 'palabra'. 'Todo asunto' es un equivalente natural y amplio en español.
- source_word: לָ/עָֽם
  english_pob_choice: concerning the people
  chosen_spanish: concerniente al pueblo
  alternatives_spanish:
  - para el pueblo
  - con respecto al pueblo
  lexicon: HALOT
  rationale: El complemento final se toma en relación con el asunto anterior. 'Concerniente al pueblo' evita restringir indebidamente el matiz a beneficio exclusivo del pueblo y mantiene abierta la ambigüedad administrativa.
theological_decisions:
- issue: 'Función de לְיַד הַמֶּלֶךְ: cercanía física, agencia oficial o servicio cortesano'
  english_pob_reading: was at the king’s side
  chosen_spanish_reading: estaba al lado del rey
  alternative_spanish_readings:
  - estaba a la mano del rey
  - era el agente del rey
  - estaba en el servicio del rey
  rationale: 'El hebreo permite más de un matiz: proximidad al rey, posición oficial o representación. La redacción española conserva la imagen relacional sin cerrar el sentido administrativo que el contexto sugiere.'
  doctrine_reference: No aplica; cuestión administrativa y lexical.
translation_notes:
  revision_awareness: La revisión inglesa suavizó 'at the king’s hand' a 'at the king’s side' para mayor naturalidad, manteniendo el sentido de servicio en asuntos del pueblo. La versión española sigue esa decisión estilística con 'al lado del rey', pero conserva en nota la alternativa más literal 'a la mano del rey' para no perder la imagen hebrea.
  spanish_consistency_notes:
  - Se usa 'Y' para conservar la conexión narrativa con la lista.
  - Se transliteran nombres propios sin adaptar a formas litúrgicas tradicionales.
  - '''Pueblo'' se mantiene singular por el valor colectivo del hebreo.'
  - '''Asunto'' se usa para דָּבָר en sentido administrativo, no como ''palabra''.'
  - Se evita 'Señor' o sustitución cultual porque el verso no contiene el Nombre divino.
