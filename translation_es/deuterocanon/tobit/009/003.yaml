translation:
  language: es
  text: Porque Ragüel ha jurado no dejarme salir[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hacer que salga». El griego dice literalmente «salir», y en contexto se refiere a partir de la casa de Ragüel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: LSJ
  rationale: Introduce la causa de la declaración anterior. «Porque» expresa bien la relación causal en español natural sin perder la fuerza explicativa del griego.
- source_word: ὠμόμοκεν
  english_pob_choice: has sworn
  chosen_spanish: ha jurado
  alternatives_spanish:
  - juró
  - ha hecho juramento
  lexicon: LSJ
  rationale: El perfecto griego destaca una acción ya cumplida con efecto presente; «ha jurado» conserva esa relevancia actual y suena natural en español.
- source_word: ὁ Ῥαγουὴλ
  english_pob_choice: Raguel
  chosen_spanish: Ragüel
  alternatives_spanish:
  - Raguel
  lexicon: transliteration
  rationale: Se conserva el nombre propio en transliteración corriente al español. «Ragüel» evita una lectura impropia de las vocales y es reconocible para el lector hispano.
- source_word: μὴ ἐξελθεῖν με
  english_pob_choice: not to let me leave
  chosen_spanish: no dejarme salir
  alternatives_spanish:
  - que no salga
  - no permitirme salir
  - que yo no salga
  lexicon: LSJ
  rationale: El griego expresa el contenido del juramento con ἐξελθεῖν, literalmente «salir». En este contexto narrativo, «salir» comunica la idea de abandonar la casa de Ragüel sin forzar una paráfrasis mayor.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego de Swete y coincide con la decisión auditada en inglés de preservar el sentido de ἐξελθεῖν como «salir/irse» en contexto narrativo. No se identificaron revisiones posteriores que alteren la lectura.
  spanish_consistency_notes:
  - Se usa «Porque» para el enlace causal, en paralelo con el inglés «For».
  - «Ha jurado» mantiene el valor perfectivo del griego mejor que un simple pretérito.
  - Se evita «SEÑOR» o vocabulario teológico no presente en el versículo.
  - La nota al pie conserva la tensión entre la literalidad de «salir» y el sentido contextual de abandonar la casa.
