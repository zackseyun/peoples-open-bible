review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura paralela del hebreo y preserva la imagen corporal de ojos que sobresalen por la gordura, así como la idea de exceso en la segunda cola. Sin embargo, 'se les saltan los ojos' en español suele sugerir sorpresa o codicia más que protrusión física, y puede desviar la imagen concreta de יָצָא מֵחֵלֶב עֵינֵימוֹ. La segunda cola está básicamente bien alineada con עָבְרוּ מַשְׂכִּיּוֹת לֵבָב.
  spanish_quality_summary: El texto es legible, pero 'se les saltan los ojos' suena idiomáticamente ambiguo y menos digno/literal para un salmo. 'Sobresalen' o 'se les salen' comunica mejor la imagen poética sin coloquialismo. 'Las imaginaciones de su corazón desbordan' es comprensible; aunque algo rígida, sigue bien la decisión léxica documentada y mantiene el tono.
  glossary_alignment: No hay términos del glosario mayor en juego. La elección 'imaginaciones' concuerda con la decisión inglesa documentada para מַשְׂכִּיּוֹת. 'Corazón' preserva bien לֵבָב. La nota alternativa debe conservar 'pensamientos/designios' y la idea de ir más allá de la medida.
  issues:
  - severity: medium
    issue: '''Se les saltan los ojos'' no es la mejor representación de יָצָא con ''ojos''.'
    rationale: En español puede entenderse como expresión figurada de deseo o sorpresa, no como protrusión causada por gordura/prosperidad. 'Sus ojos sobresalen' mantiene mejor la imagen física y poética del hebreo.
  - severity: low
    issue: La nota alternativa puede afinarse para sonar más natural en español.
    rationale: '''Los pensamientos/los designios'' es un poco tosco; ''los pensamientos o designios'' fluye mejor manteniendo la amplitud léxica.'
  revised_spanish_text: Sus ojos sobresalen por la gordura[a]; las imaginaciones de su corazón desbordan.
