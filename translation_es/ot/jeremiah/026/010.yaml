revisions:
- from: Cuando los oficiales[a] de Judá oyeron estas palabras, subieron[b] de la casa del rey a la casa de Yahvé y se sentaron a la entrada de la puerta Nueva de Yahvé[c].
  to: Cuando los oficiales[a] de Judá oyeron estas palabras, subieron[b] de la casa del rey a la casa de Yahvé y se sentaron a la entrada de la Puerta Nueva de Yahvé[c].
  rationale: Se mantiene la traducción principal casi intacta por su buena fidelidad al hebreo y a la auditoría inglesa. Se corrige la nota [b] para que explique de forma idiomática y precisa el valor de וַיַּעֲלוּ sin introducir una alternativa española artificial. También se ajusta a «Puerta Nueva» para una designación más natural y coherente en español.
