revisions:
- from: Porque al pasar de largo la sabiduría[a], no solo fueron dañados por no conocer lo que es bueno, sino que también dejaron para la vida un memorial de su insensatez, para que, en las cosas en que se extraviaron, no pudieran ni siquiera quedar ocultos.
  to: Porque al pasar de largo la sabiduría, no solo fueron dañados por no conocer lo que es bueno, sino que también dejaron para la vida[a] un memorial de su insensatez, para que, en las cosas en que se extraviaron, no pudieran ni siquiera pasar inadvertidos.
  rationale: Se mantiene la traducción base porque es fiel al griego y al rastro POB. Se corrige la ubicación de la nota al pie para que ancle correctamente en «vida», que es el término comentado. Además, se mejora la naturalidad y precisión semántica de λανθάνω con «pasar inadvertidos», que expresa mejor la imposibilidad de escapar a la atención pública.
