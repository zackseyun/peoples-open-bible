translation:
  language: es
  text: Dios[a], rompe sus dientes en sus bocas; despedaza sus colmillos[b], oh Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Oh Dios». El hebreo funciona como invocación directa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las mandíbulas de los leones jóvenes» o «los dientes trituradores de los leones jóvenes». El hebreo se refiere a dientes de trituración o dientes de la mandíbula, en paralelo con «leones jóvenes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - ¡Oh Dios!
  lexicon: HALOT
  rationale: En este salmo la forma funciona como invocación directa. En español, 'Dios' comunica el vocativo sin añadir una partícula innecesaria; '¡Oh Dios!' sería posible, pero menos sobria y más interpretativa.
- source_word: הֲרָס
  english_pob_choice: break
  chosen_spanish: rompe
  alternatives_spanish:
  - derriba
  - destruye
  lexicon: HALOT
  rationale: Con objeto corporal ('dientes'), 'rompe' es la equivalencia más natural y directa. Mantiene la fuerza del imperativo sin exagerar hacia una acción distinta como 'derriba'.
- source_word: שִׁנֵּימוֹ
  english_pob_choice: their teeth
  chosen_spanish: sus dientes
  alternatives_spanish:
  - los dientes de ellos
  lexicon: HALOT
  rationale: El sufijo de 3ª plural se expresa de forma natural en español con 'sus'. Se conserva la referencia posesiva sin recargar la línea.
- source_word: בְּפִימוֹ
  english_pob_choice: in their mouths
  chosen_spanish: en su boca
  alternatives_spanish:
  - dentro de su boca
  - en sus bocas
  lexicon: HALOT
  rationale: Aunque el hebreo es plural, el miembro poético puede funcionar de manera colectiva; en español, 'en su boca' suena más fluido y mantiene la imagen corporal. La alternativa plural es posible, pero menos idiomática en esta línea.
- source_word: מַלְתְּעוֹת
  english_pob_choice: fangs
  chosen_spanish: las fauces
  alternatives_spanish:
  - los colmillos
  - las mandíbulas dentadas
  - los dientes trituradores
  lexicon: HALOT
  rationale: El POB inglés preserva la imagen violenta y animal. 'Fauces' en español transmite la boca depredadora con naturalidad poética; 'colmillos' estrecha demasiado el sentido hacia una sola clase de dientes, y 'mandíbulas dentadas' suena más técnico. Se evita suavizar el cuadro metafórico.
- source_word: כְּפִירִים
  english_pob_choice: young lions
  chosen_spanish: los leones jóvenes
  alternatives_spanish:
  - los cachorros de león
  - los leoncillos
  lexicon: HALOT
  rationale: '''Leones jóvenes'' reproduce el valor de vigorización/poder juvenil del término y conserva el paralelismo con la imagen depredadora. ''Cachorros'' o ''leoncillos'' sugieren pequeñez más que ferocidad.'
- source_word: נְתֹץ
  english_pob_choice: shatter
  chosen_spanish: despedaza
  alternatives_spanish:
  - quiebra
  - haz pedazos
  - rompe
  lexicon: HALOT
  rationale: El ajuste inglés pasó de 'tear out' a 'shatter' para reflejar mejor la fuerza del verbo. En español, 'despedaza' comunica destrucción violenta y encaja con la imagen poética de manera más intensa que 'quiebra' o 'rompe'.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el término estándar del proyecto para el nombre divino. En español, 'Yahvé' conserva la pronunciación y la función de nombre propio sin sustituirla por un título.
theological_decisions:
- issue: Nombre divino יְהוָה al final del versículo
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: El testimonio auditado del proyecto evita la sustitución reverencial por un título. 'Yahvé' mantiene el nombre del pacto en español y conserva la distinción entre Dios como invocado al inicio y Yahvé al final del verso.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Imaginería imprecatoria violenta
  english_pob_reading: Retain the literal petition for the destruction of the enemies' teeth/fangs
  chosen_spanish_reading: Conservar la petición literal de romper y despedazar dientes/fauces
  alternative_spanish_readings:
  - suavizar a una metáfora sobre quitar poder
  - parafrasear como anular su fuerza
  rationale: La poesía hebrea usa imágenes corporales concretas. La traducción española debe mantener esa tensión y no reducirla a una abstracción sobre 'poder' o 'fuerza'.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El contexto inglés auditado mantiene la lectura imprecatoria literal y conserva el nombre divino como Yahweh/Yahvé. La revisión más reciente reforzó la fuerza del segundo verbo (de 'tear out' a 'shatter'); por eso se eligió en español 'despedaza' para reflejar esa intensificación sin cambiar el paralelismo básico del verso.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוָה, conforme al estándar del proyecto.
  - Se evita 'SEÑOR' como máscara reverencial.
  - '''Dios'' se mantiene como vocativo directo al inicio del verso.'
  - 'La línea conserva la simetría poética: imperativo sobre dientes / imperativo sobre fauces.'
  - '''Fauces'' se usa por su fuerza animal y poética, sin convertir la imagen en un tecnicismo anatómico.'
