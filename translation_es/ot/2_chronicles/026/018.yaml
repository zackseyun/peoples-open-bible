translation:
  language: es
  text: 'Se pusieron en contra[a] del rey Uzías y le dijeron: «No te corresponde, Uzías, quemar incienso a Yahvé; sino a los sacerdotes, los hijos de Aarón, que están consagrados para quemar incienso. Sal del santuario, porque has actuado infielmente[b], y no será para tu honra[c] de parte de Yahvé Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se enfrentaron a» o «se opusieron a» para la expresión «se pusieron en contra».
    reason: lexical_alternative
  - marker: b
    text: O «has cometido sacrilegio». El verbo hebreo puede denotar una infracción grave en materia sagrada o de pacto.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «y no será para tu honra de parte de Yahvé Dios»; el hebreo es elíptico y expresa que esta conducta no terminará en honor para Uzías.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַמְדוּ עַל
  english_pob_choice: stood against
  chosen_spanish: Se pusieron en contra
  alternatives_spanish:
  - se mantuvieron contra
  - se enfrentaron a
  - se opusieron a
  lexicon: HALOT
  rationale: La expresión hebrea indica oposición activa, no simple cercanía. «Se pusieron en contra» conserva el valor adversativo de manera natural en español.
- source_word: עֻזִּיָּהוּ הַמֶּלֶךְ
  english_pob_choice: King Uzziah
  chosen_spanish: el rey Uzías
  alternatives_spanish:
  - Uzías el rey
  - el rey Uzzías
  lexicon: HALOT
  rationale: Se mantiene el título antes del nombre por fluidez en español y fidelidad al referente real.
- source_word: לֹא לְךָ ... לְהַקְטִיר
  english_pob_choice: It is not for you ... to burn incense
  chosen_spanish: No te corresponde ... quemar incienso
  alternatives_spanish:
  - No te pertenece ... quemar incienso
  - No tienes derecho a ... quemar incienso
  lexicon: HALOT
  rationale: La construcción expresa prerrogativa o competencia legítima. «No te corresponde» transmite esa restricción sin volverla burocrática.
- source_word: לְהַקְטִיר
  english_pob_choice: to burn incense
  chosen_spanish: quemar incienso
  alternatives_spanish:
  - ofrecer incienso
  - presentar incienso
  lexicon: HALOT
  rationale: En este contexto cultual, el infinitivo se refiere específicamente al acto de quemar incienso.
- source_word: לַיהוָה
  english_pob_choice: to the LORD
  chosen_spanish: para Yahvé
  alternatives_spanish:
  - a Yahvé
  - para el SEÑOR
  lexicon: HALOT
  rationale: 'Se sigue la directriz del proyecto: YHWH se vierte como «Yahvé» en el texto principal.'
- source_word: כִּי לַכֹּהֲנִים בְּנֵי אַהֲרֹן
  english_pob_choice: but for the priests, the sons of Aaron
  chosen_spanish: sino a los sacerdotes, los hijos de Aarón
  alternatives_spanish:
  - sino a los sacerdotes, hijos de Aarón
  - sino para los sacerdotes, los hijos de Aarón
  lexicon: HALOT
  rationale: «Los hijos de Aarón» conserva la designación formal del linaje sacerdotal, y «sino a» reproduce la exclusividad contrastiva del hebreo.
- source_word: הַמְקֻדָּשִׁים
  english_pob_choice: who are consecrated
  chosen_spanish: que están consagrados
  alternatives_spanish:
  - que han sido santificados
  - que están apartados
  lexicon: HALOT
  rationale: «Consagrados» preserva el sentido cultual de estar apartados para servicio sagrado en un español claro y digno.
- source_word: צֵא מִן הַמִּקְדָּשׁ
  english_pob_choice: Leave the sanctuary
  chosen_spanish: Sal del santuario
  alternatives_spanish:
  - Sal del lugar santo
  - Sal del templo
  lexicon: HALOT
  rationale: «Santuario» es la forma más amplia y precisa para מִקְדָּשׁ en este contexto; «sal» mantiene la orden directa del hebreo.
- source_word: מָעַלְתָּ
  english_pob_choice: you have acted unfaithfully
  chosen_spanish: has actuado infielmente
  alternatives_spanish:
  - has sido infiel
  - has cometido sacrilegio
  - has obrado con infidelidad
  lexicon: HALOT
  rationale: El verbo מעל expresa una infracción grave, especialmente en materia sagrada o de pacto. «Actuado infielmente» conserva esa gravedad sin suavizarla a un mero error procedimental.
- source_word: וְלֹא לְךָ לְכָבוֹד
  english_pob_choice: it will not be for your honor
  chosen_spanish: no será para tu honra
  alternatives_spanish:
  - no será para tu honor
  - no te resultará en honra
  lexicon: HALOT
  rationale: Se mantiene la construcción elíptica del hebreo, pero en español se hace inteligible con una fórmula breve y natural. «Honra» preserva un registro bíblico sobrio.
- source_word: מֵיְהוָה אֱלֹהִים
  english_pob_choice: from the LORD God
  chosen_spanish: de parte de Yahvé Dios
  alternatives_spanish:
  - de Yahvé Dios
  - de Yahvé, Dios
  lexicon: HALOT
  rationale: La frase indica procedencia o fuente de la honra. «De parte de» comunica mejor en español que un calco rígido de la estructura preposicional hebrea.
theological_decisions:
- issue: Exclusividad sacerdotal en el incienso
  english_pob_reading: The verse states that burning incense to the LORD belongs specifically to the Aaronic priests consecrated for that task.
  chosen_spanish_reading: El derecho de quemar incienso ante Yahvé pertenece exclusivamente a los sacerdotes hijos de Aarón consagrados para esa tarea.
  alternative_spanish_readings:
  - La prohibición es solo circunstancial y no cultual
  - Se trata simplemente de una norma administrativa
  rationale: La línea del versículo establece una prerrogativa sacerdotal concreta. La traducción conserva esa exclusividad sin diluirla en un principio genérico.
  doctrine_reference: Éxodo 30:7-9; Números 16:40
- issue: Fuerza de מָעַלְתָּ
  english_pob_reading: Uzziah has acted unfaithfully/sacrilegiously against the LORD's order.
  chosen_spanish_reading: Uzías ha actuado con infidelidad grave en un asunto sagrado.
  alternative_spanish_readings:
  - Uzías solo se equivocó
  - Uzías cometió una simple irregularidad
  rationale: En contextos cultuales, מעל implica una violación seria de fidelidad/obediencia. El español debe conservar esa carga moral y religiosa.
  doctrine_reference: Levítico 5:15; Josué 7:1
- issue: Procedencia de la honra
  english_pob_reading: The action will not result in honor from God.
  chosen_spanish_reading: La acción no traerá honra de parte de Yahvé Dios.
  alternative_spanish_readings:
  - No será para tu honor
  - No recibirás honra de Yahvé Dios
  rationale: El hebreo final es elíptico y apunta al resultado vergonzoso de la conducta. «De parte de Yahvé Dios» conserva la fuente indicada por el original.
  doctrine_reference: 1 Samuel 2:30; Proverbios 3:35
translation_notes:
  revision_awareness: Se atendió la revisión más reciente del expediente inglés, que prefirió una formulación más literal en la cláusula final («it will not be for your honor»). Por eso el español evita una expansión interpretativa y conserva la elipsis semántica con «no será para tu honra».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» conforme a la norma del proyecto para יהוה.
  - Se preservó «hijos de Aarón» como designación sacerdotal formal.
  - Se tradujo מִקְדָּשׁ por «santuario», no por «lugar santo», para evitar restringir indebidamente el ámbito.
  - Se mantuvo el registro bíblico sobrio y público, apto para lectura eclesial amplia.
