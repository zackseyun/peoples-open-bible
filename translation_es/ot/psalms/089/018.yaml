revisions:
- from: Porque tú eres la gloria de su fuerza[a], y con tu favor exaltas nuestro cuerno[b].
  to: Porque tú eres la gloria de la fuerza de ellos[a], y por tu favor exaltas nuestro cuerno[b].
  rationale: Se revisa «su fuerza» a «la fuerza de ellos» para hacer explícito el plural del hebreo y preservar la decisión auditada del POB de mantener la diferencia entre «their» y «our». También se ajusta «con tu favor» a «por tu favor» para reflejar con más precisión el sentido instrumental de la preposición hebrea, sin perder naturalidad en español. Se conservan «gloria», «exaltas» y la metáfora «nuestro cuerno» con nota explicativa.
