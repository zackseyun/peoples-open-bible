    rationale: Aunque intenta representar עשה + אִתִּי, en español moderno puede sugerir la manera de comportarse con alguien, no una intervención favorable en respuesta a oración. actúa por mí expresa mejor la fuerza peticionaria sin sobreinterpretar demasiado.
  - severity: low
