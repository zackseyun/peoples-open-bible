review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Yahvé es el sujeto, Sion es el objeto escogido, y el segundo verbo expresa deseo con vistas a su morada. Sin embargo, la nota al pie no preserva fielmente la alternativa documentada en el rastro inglés: el texto principal ya dice «la ha deseado», así que la nota «O: “la ha deseado”» no ofrece una alternativa real. La nota debe explicar la posibilidad de traducir el sufijo femenino de otra manera o simplemente aclarar el valor femenino del hebreo.'
  spanish_quality_summary: El español es claro, natural y digno. «Porque Yahvé ha escogido a Sion; la ha deseado para su morada» fluye bien y mantiene buen registro bíblico contemporáneo. La única reparación necesaria está en la nota al pie, que actualmente es redundante y mal formulada.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé», ציון → «Sion», מוֹשָׁב → «morada». La conservación del femenino en «la ha deseado» es defendible en español y coherente con la explicación morfológica. No hay conflicto teológico ni terminológico mayor.'
  issues:
  - severity: medium
    issue: La nota al pie no presenta una alternativa real ni refleja adecuadamente el audit trail inglés.
    rationale: El inglés dice «Or 'he has desired her...'» porque el texto principal usa «it». En español, el texto principal ya eligió «la ha deseado», así que repetir eso como nota no añade información. La nota debe reformularse para explicar el femenino hebreo o dar una alternativa española genuina.
  revised_spanish_text: Porque Yahvé ha escogido a Sion[a]; la ha deseado para su morada.
  revised_footnotes:
  - marker: a
    text: El hebreo usa un sufijo femenino que remite a Sion.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural en español. Solo se corrige la nota para que no repita inútilmente la misma redacción del texto y sí preserve la información morfológica relevante del hebreo de manera útil para el lector español.
