lexical_decisions:
- source_word: כָּל
  english_pob_choice: The whole
  chosen_spanish: Toda
  alternatives_spanish:
  - Toda la
  - Toda la totalidad de
  lexicon: HALOT
  rationale: כָּל con sustantivo definido expresa totalidad. En español, 'Toda la asamblea' comunica esa integridad sin sonar artificial.
- source_word: הַקָּהָל
  english_pob_choice: assembly
  chosen_spanish: asamblea
  alternatives_spanish:
  - congregación
  - comunidad
  lexicon: HALOT
  rationale: קָהָל designa al grupo reunido. 'Asamblea' mantiene el sentido de un cuerpo congregado y evita cargar el texto con un matiz eclesiástico más estrecho que 'congregación'.
- source_word: כְּאֶחָד
  english_pob_choice: together
  chosen_spanish: junta como un solo grupo
  alternatives_spanish:
  - juntos
  - como uno
  - como una sola unidad
  lexicon: HALOT
  rationale: El hebreo significa literalmente 'como uno'. En español, 'junta como un solo grupo' conserva la idea colectiva y sigue siendo legible; se mantiene la alternativa literal en la nota.
- source_word: אַרְבַּע רִבּוֹא
  english_pob_choice: forty thousand
  chosen_spanish: cuarenta mil
  alternatives_spanish:
  - cuarenta mil y
  - cuatro decenas de millar
  lexicon: HALOT
  rationale: La construcción numérica hebrea equivale a cuarenta mil. El español debe expresar el valor numérico directamente, como en el audit trail inglés.
- source_word: אַלְפַּיִם
  english_pob_choice: two thousand
  chosen_spanish: dos mil
  alternatives_spanish:
  - dos millares
  lexicon: HALOT
  rationale: Número cardinal estándar; se traduce de forma directa.
- source_word: שְׁלֹשׁ מֵאוֹת
  english_pob_choice: three hundred
  chosen_spanish: trescientos
  alternatives_spanish:
  - trescientas
  lexicon: HALOT
  rationale: Número cardinal estándar; 'trescientos' concuerda naturalmente con el total.
- source_word: שִׁשִּׁים
  english_pob_choice: sixty
  chosen_spanish: sesenta
  alternatives_spanish:
  - sesenta y
  lexicon: HALOT
  rationale: Número cardinal estándar que completa el total 42,360.
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la última revisión; se conserva su lectura numérica y su matiz idiomático de כְּאֶחָד mediante una formulación española natural con nota literal.
  spanish_consistency_notes:
  - Se usa 'asamblea' como equivalente base de קָהָל, coherente con el audit trail inglés.
  - Se evita 'SEÑOR' u այլ terminología no pertinente, porque el versículo es puramente numérico y no contiene nombres divinos ni cristológicos.
  - 'La cifra se presenta en español con ortografía moderna y concordancia natural: ''cuarenta y dos mil trescientos sesenta''.'
