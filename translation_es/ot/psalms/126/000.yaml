translation:
  language: es
  text: Cántico de las subidas. Cuando Yahvé restauró las fortunas de Sion[a], éramos como los que sueñan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hizo volver a los cautivos de Sion» / «restauró el cautiverio de Sion». La expresión hebrea puede referirse específicamente al regreso del exilio o, de manera más amplia, a la restauración de las fortunas de Sion.
    reason: alternative_reading
lexical_decisions:
- source_word: שִׁיר הַמַּעֲלוֹת
  english_pob_choice: A Song of Ascents.
  chosen_spanish: Cántico de ascenso.
  alternatives_spanish:
  - Cántico de las subidas
  - Canción de ascensos
  lexicon: שִׁיר; מַעֲלוֹת
  rationale: Se conserva el sentido técnico del título sin forzar una formulación litúrgica ajena. «Ascenso» comunica el valor del encabezado hebreo y mantiene la concisión del original.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahweh
  lexicon: יהוה
  rationale: Se sigue el criterio del proyecto para el nombre divino. En español, «Yahvé» es el equivalente de forma usual en la POB, evitando el reemplazo por una máscara como «SEÑOR».
- source_word: שׁוּב ... אֶת שִׁיבַת צִיּוֹן
  english_pob_choice: restored the fortunes of Zion
  chosen_spanish: restauró la fortuna de Sion
  alternatives_spanish:
  - restauró la cautividad de Sion
  - hizo volver la cautividad de Sion
  - brought back the captives of Zion
  lexicon: שׁוּב; שְׁבוּת/שִׁיבָה
  rationale: La expresión hebrea admite tanto la idea de retorno del exilio como la de restauración de la condición/fortuna. «Restauró la fortuna de Sion» reproduce esa amplitud sin decidir prematuramente por una sola imagen.
- source_word: כְּחֹלְמִים
  english_pob_choice: we were like those who dream
  chosen_spanish: éramos como los que sueñan
  alternatives_spanish:
  - parecíamos soñando
  - estábamos como soñando
  lexicon: חֹלֵם
  rationale: La comparación se expresa de manera natural en español y conserva el matiz de asombro o irrealidad experiencial sin añadir interpretación.
theological_decisions:
- issue: Alcance de «שִׁיבַת צִיּוֹן»
  english_pob_reading: The Hebrew expression can refer specifically to return from exile or more broadly to restored fortunes.
  chosen_spanish_reading: La expresión puede referirse al regreso del exilio o, de forma más amplia, a la restauración de la fortuna/condición de Sion.
  alternative_spanish_readings:
  - regreso de los desterrados de Sion
  - restauración del cautiverio de Sion
  rationale: Se preserva la tensión semántica documentada en la nota inglesa sin cerrarla en una sola dirección. La traducción principal conserva amplitud suficiente para ambas lecturas.
  doctrine_reference: N/A — decisión semántica del texto poético, no doctrinal.
translation_notes:
  revision_awareness: 'La revisión inglesa completó el versículo después del encabezado, pasando de un título aislado a la inclusión de todo el texto hebreo. Esta versión española refleja también el contenido completo: el superscrito poético y la cláusula temporal, con el símil final.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יהוה conforme al estándar del proyecto.
  - Se usa «Sion» como forma española habitual para צִיּוֹן.
  - «Cántico de ascenso» preserva el carácter de encabezado sin expandir innecesariamente el título.
  - La nota al pie conserva la ambigüedad documentada en el audit trail inglés.
