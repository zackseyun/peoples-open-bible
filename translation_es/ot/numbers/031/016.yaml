    rationale: Las instrucciones requieren que cada nota aparezca anclada en la palabra o frase pertinente. Tal como está, el aparato de notas es incorrecto y confuso.
  - severity: medium
    issue: «cometieran infidelidad» suena menos natural y menos verbal que el hebreo.
    rationale: מַעַל en esta construcción expresa actuar de manera infiel/quebrantar la fidelidad. «Actuaran infielmente» comunica mejor el sentido verbal y pactual en español natural.
