translation:
  language: es
  text: ¡Cómo ha caído el poderoso[a], el que salvaba a Israel!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión recuerda la fórmula bíblica de lamento «¡Cómo han caído los valientes!», véase 2 Samuel 1:19, 25, 27.
    reason: cross_reference
lexical_decisions:
- source_word: Πῶς
  english_pob_choice: How
  chosen_spanish: ¡Cómo!
  alternatives_spanish:
  - ¡Ay, cómo!
  - ¡Cómo ha sido!
  lexicon: LSJ
  rationale: En español, la exclamación de lamento se expresa de manera natural con «¡Cómo!». Conserva el tono elegíaco sin añadir un adverbio interpretativo como «ay» cuando el griego ya basta por sí mismo.
- source_word: ἔπεσεν
  english_pob_choice: has fallen
  chosen_spanish: ha caído
  alternatives_spanish:
  - cayó
  - ha sucumbido
  lexicon: LSJ
  rationale: El aoristo griego admite en español un perfecto compuesto en una exclamación lamentosa. «Ha caído» suena natural y mantiene la fuerza de la caída reciente sin volverlo demasiado narrativo.
- source_word: δυνατός
  english_pob_choice: the mighty one
  chosen_spanish: el poderoso
  alternatives_spanish:
  - el valiente
  - el fuerte
  - el hombre poderoso
  lexicon: LSJ
  rationale: Aquí el adjetivo funciona sustantivado. «El poderoso» conserva la singularidad y el tono elevado del lamento, sin introducir un sustantivo ajeno al griego como «hombre».
- source_word: σώζων
  english_pob_choice: the one saving
  chosen_spanish: el que salvaba
  alternatives_spanish:
  - el que salva
  - el salvador
  lexicon: LSJ
  rationale: El participio presente indica una acción característica o en curso. «El que salvaba» preserva ese aspecto de manera idiomática en español y evita convertirlo en un título («el salvador») que iría más allá del texto.
- source_word: τὸν Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: LSJ
  rationale: «Israel» es la forma directa y suficiente en español para el complemento objeto; no requiere expansión.
theological_decisions:
- issue: Eco de la fórmula bíblica de lamento
  english_pob_reading: Retain the wording 'How the mighty one has fallen' to preserve the likely allusion and lament tone.
  chosen_spanish_reading: Conservar «¡Cómo ha caído el poderoso!» para mantener el eco de lamento bíblico.
  alternative_spanish_readings:
  - ¡Ay, cómo ha caído el poderoso!
  - ¡Cómo ha caído un valiente!
  rationale: La frase griega remite claramente a la fórmula de duelo conocida por la Escritura (cf. 2 Samuel 1). La versión española debe preservar ese eco sin explicarlo dentro del texto ni debilitarlo con una paráfrasis.
  doctrine_reference: Mantener la resonancia intertextual y el tono de duelo; no resolver ni suavizar la tensión literaria.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al conservar el participio en forma adjetival/relativa breve («el que salvaba») y mantener el tono conciso del lamento, en vez de expandirlo a una frase más explicativa.
  spanish_consistency_notes:
  - Se emplea «Israel» sin artículo, conforme al uso habitual en español para el nombre propio.
  - Se evita «Cristo»/«Mesías» porque no aparece ningún término correspondiente en este versículo.
  - La exclamación inicial se puntúa con apertura y cierre propios del español para reflejar el carácter lamentoso del original.
