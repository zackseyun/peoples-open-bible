  - Se podría normalizar más la ortografía, pero se dañaría la trazabilidad con el original.
  rationale: 'No hay carga doctrinal debatida en este versículo, pero sí una decisión teológica-textual importante: respetar que el texto funciona como registro de suscriptores/afiliados al pacto y no como frase descriptiva.'
