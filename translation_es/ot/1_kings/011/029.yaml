translation:
  language: es
  text: Y aconteció en aquel tiempo, cuando Jeroboam salió de Jerusalén, que Ahías el silonita, el profeta, lo encontró en el camino. Iba cubierto con una capa nueva, y los dos estaban solos en el campo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַֽיְהִי בָּעֵת הַהִיא
  english_pob_choice: And it happened at that time
  chosen_spanish: Y aconteció en aquel tiempo
  alternatives_spanish:
  - Y sucedió en aquel tiempo
  - Y fue en aquel tiempo
  lexicon: HALOT
  rationale: La fórmula narrativa hebrea se rinde de manera natural con 'aconteció' para conservar el arranque histórico sin calco torpe. 'En aquel tiempo' refleja el marco temporal del hebreo.
- source_word: יָצָא מִירוּשָׁלָם
  english_pob_choice: went out from Jerusalem
  chosen_spanish: salió de Jerusalén
  alternatives_spanish:
  - salió de Jerusalén hacia afuera
  - partió de Jerusalén
  lexicon: HALOT
  rationale: '''Salir de'' expresa bien el valor de יָצָא y suena más natural en español que un calco con ''salió de''. Mantiene la dirección de alejamiento de Jerusalén.'
- source_word: וַיִּמְצָא אֹתוֹ
  english_pob_choice: found him
  chosen_spanish: lo encontró
  alternatives_spanish:
  - lo halló
  - se encontró con él
  lexicon: HALOT
  rationale: מצא suele significar 'encontrar/hallar'. 'Lo encontró' conserva la sencillez narrativa y el carácter del encuentro sin añadir una relación recíproca que el hebreo no exige.
- source_word: אֲחִיָּה הַשִּׁילֹנִי הַנָּבִיא
  english_pob_choice: Ahijah the Shilonite, the prophet
  chosen_spanish: Ahías el silonita, el profeta
  alternatives_spanish:
  - Ahías de Silo, el profeta
  - Ahías el silonita, profeta
  lexicon: HALOT
  rationale: '''Silonita'' reproduce el gentilicio hebreo הַשִּׁילֹנִי de manera directa. Se conserva la aposición ''el profeta'' para reflejar la identificación del texto.'
- source_word: בַּדֶּרֶךְ
  english_pob_choice: on the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - sobre el camino
  - por el camino
  lexicon: HALOT
  rationale: '''En el camino'' es la manera natural de expresar la localización concreta en español y corresponde bien al hebreo locativo.'
- source_word: וְהוּא מִתְכַּסֶּה
  english_pob_choice: he had wrapped himself
  chosen_spanish: Él se había cubierto
  alternatives_spanish:
  - se había envuelto
  - estaba cubriéndose
  lexicon: HALOT
  rationale: El hitpael admite una idea reflexiva de cubrirse/ envolverse. 'Se había cubierto' conserva el estado previo al encuentro y evita afirmar más específicamente 'envolverse' cuando el hebreo permite cierta ambigüedad.
- source_word: בְּשַׂלְמָה חֲדָשָׁה
  english_pob_choice: in a new cloak
  chosen_spanish: con una capa nueva
  alternatives_spanish:
  - con un manto nuevo
  - con un vestido nuevo
  lexicon: HALOT
  rationale: שַׂלְמָה designa una prenda exterior; 'capa' comunica bien ese valor en español y mantiene la anticipación simbólica del versículo siguiente. El uso de 'con' refleja el estado descrito en la escena.
- source_word: וּשְׁנֵיהֶם לְבַדָּם
  english_pob_choice: the two of them were alone
  chosen_spanish: los dos estaban solos
  alternatives_spanish:
  - ambos estaban solos
  - los dos estaban por sí solos
  lexicon: HALOT
  rationale: La frase subraya que no había nadie más presente. 'Los dos estaban solos' es idiomático y conserva la exclusividad de la escena.
- source_word: בַּשָּׂדֶה
  english_pob_choice: in the field
  chosen_spanish: en el campo
  alternatives_spanish:
  - en el campo abierto
  - en el campo de labor
  lexicon: HALOT
  rationale: שָׂדֶה puede referirse a un campo abierto o al campo en general. 'En el campo' mantiene la concreción espacial sin añadir el matiz de 'abierto' que el texto hebreo no explicita.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del POB en inglés: conserva la fórmula narrativa ''Y aconteció en aquel tiempo'', el encuadre temporal y la escena final ''en el campo'', evitando añadir ''abierto''. También mantiene la ambigüedad del hebreo en el gesto de cubrirse, expresándola de forma natural en español.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el hebreo presente el nombre divino; este versículo no lo contiene.
  - Se mantiene 'silonita' como equivalente del gentilicio hebreo, sin sustituirlo por una paráfrasis de 'de Silo'.
  - '''Campo'' se usa con el valor espacial básico de שָׂדֶה, de acuerdo con la revisión inglesa más reciente.'
  - No se añadieron notas al pie porque el hebreo y el audit trail inglés no requieren variante textual ni alternativa doctrinal en este versículo.
