translation:
  language: es
  text: Porque el despiadado[a] llegará a nada, el burlador llegará a su fin, y todos los que están atentos a la maldad[b] serán excluidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el tirano». El hebreo עָרִיץ puede denotar a una persona opresora o violenta.
    reason: lexical_alternative
  - marker: b
    text: O «todos los que están entregados al mal» o «todos los que acechan la iniquidad». El participio hebreo sugiere una atención vigilante y deliberada al mal.
    reason: lexical_alternative
lexical_decisions:
- source_word: אָפֵס
  english_pob_choice: will come to nothing
  chosen_spanish: llegará a nada
  alternatives_spanish:
  - se acabará
  - desaparecerá
  - será reducido a nada
  lexicon: HALOT
  rationale: El hebreo expresa llegar a un fin o quedar en la nada; «llegará a nada» conserva la idea resultativa y suena natural en español, sin añadir una imagen más fuerte de la que el texto da.
- source_word: עָרִיץ
  english_pob_choice: the ruthless one
  chosen_spanish: el tirano
  alternatives_spanish:
  - el despiadado
  - el violento
  - el cruel
  lexicon: HALOT
  rationale: El sustantivo puede designar a un opresor violento o tiránico. Aquí se eligió «tirano» porque comunica bien la fuerza opresiva del término en español y mantiene el valor individualizado del singular; la alternativa «despiadado» sería más descriptiva pero menos precisa para el rol social/político implícito.
- source_word: וְכָלָה
  english_pob_choice: will be finished
  chosen_spanish: será acabado
  alternatives_spanish:
  - será terminado
  - será concluido
  - perecerá
  lexicon: HALOT
  rationale: El verbo significa llegar a su término o ser llevado al fin. «Será acabado» conserva esa terminación sin intensificarla hacia destrucción total. En español bíblico suena algo más formal, pero sigue siendo claro.
- source_word: לֵץ
  english_pob_choice: the scoffer
  chosen_spanish: el burlador
  alternatives_spanish:
  - el escarnecedor
  - el escarnecedor arrogante
  - el mofador
  lexicon: HALOT
  rationale: לֵץ es el que se burla con desprecio arrogante. «Burlador» comunica bien esa actitud en español moderno; «escarnecedor» sería más literal pero menos natural.
- source_word: וְנִכְרְתוּ
  english_pob_choice: will be cut off
  chosen_spanish: serán eliminados
  alternatives_spanish:
  - serán cortados
  - serán arrancados
  - serán suprimidos
  lexicon: HALOT
  rationale: La pasiva de כרת conserva la imagen de ser «cortados», pero en español «serán eliminados» transmite con claridad la remoción judicial del grupo. Se optó por no calcar «cortados» porque en español puede sonar demasiado literal o ambiguo sin añadir claridad.
- source_word: שֹׁקְדֵי
  english_pob_choice: who watch for
  chosen_spanish: los que acechan
  alternatives_spanish:
  - los que vigilan
  - los que están al acecho
  - los que esperan
  lexicon: HALOT
  rationale: El participio connota vigilancia atenta y deliberada orientada al mal. «Acechan» expresa mejor la intención hostil que un simple «vigilan» y mantiene la fuerza del retrato hebreo.
- source_word: אָוֶן
  english_pob_choice: wrongdoing
  chosen_spanish: el mal
  alternatives_spanish:
  - la maldad
  - la injusticia
  - la iniquidad
  lexicon: HALOT
  rationale: אָוֶן puede abarcar maldad, iniquidad o perversidad moral. Aquí «el mal» funciona como equivalente amplio y natural en español, aunque pierde algo de precisión forense; se conserva así la amplitud semántica del término.
translation_notes:
  revision_awareness: Se revisó el paquete fuente hebreo y el audit trail inglés; la versión inglesa fue marcada como sin cambios en la última revisión y mostró alta concordancia. La propuesta española sigue de cerca el valor léxico del hebreo sin depender mecánicamente del inglés, preservando las tres figuras paralelas y la pasiva judicial final.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo de tres miembros del hebreo: desaparición del opresor, fin del burlador y remoción de quienes buscan el mal.'
  - Se prefirió un registro bíblico moderno y claro, evitando tanto calcos excesivos como lenguaje eclesiástico arcaizante.
  - No se introdujo terminología doctrinal adicional; el versículo es de juicio moral y social, no de cristología o eclesiología.
