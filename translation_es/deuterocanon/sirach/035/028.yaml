translation:
  language: es
  text: No des autoridad sobre ti mientras vivas al hijo o a la esposa, al hermano o al amigo; y no entregues tus bienes a otro, para que no te arrepientas y tengas que pedirlos de nuevo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὴ δῷς ἐξουσίαν
  english_pob_choice: do not give authority
  chosen_spanish: No des autoridad
  alternatives_spanish:
  - No concedas autoridad
  - No entregues poder
  - No cedas autoridad
  lexicon: BDAG
  rationale: ἐξουσίαν se entiende aquí como autoridad o control concedido sobre la propia persona. «No des autoridad» conserva la estructura verbal directa del griego y reproduce bien la advertencia.
- source_word: ἐπὶ σὲ
  english_pob_choice: over yourself
  chosen_spanish: sobre ti
  alternatives_spanish:
  - sobre ti mismo
  - sobre tu persona
  - contra ti
  lexicon: LSJ
  rationale: La preposición con ἐξουσίαν expresa ejercicio de autoridad sobre la persona. «Sobre ti» es natural en español y mantiene el sentido relacional sin sobrecargar el texto.
- source_word: ἐν ζωῇ σου
  english_pob_choice: in your lifetime
  chosen_spanish: en tu vida
  alternatives_spanish:
  - mientras vivas
  - durante tu vida
  - en tu tiempo de vida
  lexicon: BDAG
  rationale: La expresión marca el período durante el cual no debe cederse el control. «En tu vida» es fiel y fluido; evita una formulación demasiado larga.
- source_word: υἱῷ καὶ γυναικί, ἀδελφῷ καὶ φίλῳ
  english_pob_choice: to son or wife, brother or friend
  chosen_spanish: al hijo o a la esposa, al hermano o al amigo
  alternatives_spanish:
  - al hijo y a la esposa, al hermano y al amigo
  - a tu hijo o esposa, a tu hermano o amigo
  - al hijo o al cónyuge, al hermano o al amigo
  lexicon: LSJ
  rationale: El griego enumera relaciones cercanas como posibles destinatarios de esa autoridad. «O» reproduce el valor distributivo de la lista prohibitiva en español y conserva la fuerza de la advertencia.
- source_word: τὰ χρήματά σου
  english_pob_choice: your property
  chosen_spanish: tus bienes
  alternatives_spanish:
  - tu propiedad
  - tus posesiones
  - tu dinero
  lexicon: BDAG
  rationale: χρήματα puede abarcar bienes, recursos o posesiones. «Tus bienes» comunica mejor en español el alcance más amplio que «dinero» y suena natural en un contexto sapiencial.
- source_word: ἑτέρῳ
  english_pob_choice: to another
  chosen_spanish: a otro
  alternatives_spanish:
  - a otra persona
  - a alguien más
  - a un tercero
  lexicon: BDAG
  rationale: ἑτέρῳ se refiere aquí de manera general a otra persona. «A otro» es breve y suficientemente literal.
- source_word: ἵνα μὴ μεταμεληθεὶς
  english_pob_choice: lest you regret it
  chosen_spanish: para que no te arrepientas
  alternatives_spanish:
  - no sea que te arrepientas
  - para que no lamentes haberlo hecho
  - a fin de que no te arrepientas
  lexicon: BDAG
  rationale: μεταμέλομαι expresa arrepentimiento o remordimiento después de una acción. «Para que no te arrepientas» comunica bien la consecuencia preventiva indicada por ἵνα μὴ.
- source_word: δέῃ περὶ αὐτῶν
  english_pob_choice: have to ask for it back
  chosen_spanish: y tengas que pedirlos de nuevo
  alternatives_spanish:
  - y tengas necesidad de ellos
  - y tengas que rogar por ellos
  - y termines pidiendo por ellos
  lexicon: BDAG
  rationale: La cláusula final es comprimida en griego y puede implicar necesidad respecto de aquello que se dio. En español, «tener que pedirlos de nuevo» conserva la idea práctica de verse obligado a reclamarlos, como en la auditoría inglesa.
theological_decisions:
- issue: Autoridad sobre relaciones cercanas y sobre los propios bienes
  english_pob_reading: Do not give authority over yourself in your lifetime to son or wife, brother or friend; and do not give your property to another.
  chosen_spanish_reading: No des autoridad sobre ti, en tu vida, al hijo o a la esposa, al hermano o al amigo; y no entregues tus bienes a otro.
  alternative_spanish_readings:
  - No pongas a nadie por encima de ti durante tu vida...
  - No cedas el control de ti mismo...
  rationale: El pasaje no formula una doctrina abstracta del poder, sino una advertencia sapiencial sobre no transferir control de sí mismo o de los bienes de manera imprudente. La traducción mantiene esa tensión práctica sin suavizarla.
  doctrine_reference: Sabiduría sapiencial; prudencia en el uso de bienes y autoridad personal
translation_notes:
  revision_awareness: Se mantuvo la lectura de alta concordancia con el texto griego y con la auditoría inglesa. No se introdujeron cambios doctrinales ni se amplió el alcance semántico más allá de χρήματα = «bienes» y δέῃ περὶ αὐτῶν = «tener que pedirlos de nuevo», siguiendo la solución auditada en inglés.
  spanish_consistency_notes:
  - Se emplea «No des autoridad» para conservar la correspondencia directa con μὴ δῷς ἐξουσίαν.
  - «Tus bienes» refleja el alcance amplio de χρήματα sin reducirlo a dinero.
  - «En tu vida» mantiene el marco temporal de ἐν ζωῇ σου con estilo natural.
  - La lista relacional usa «o» como en la lectura prohibitiva inglesa, sin añadir posesivos no expresados en el griego.
