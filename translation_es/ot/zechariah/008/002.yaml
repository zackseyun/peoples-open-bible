translation:
  language: es
  text: 'Así dice Yahvé de los ejércitos: Estoy celoso por Sion con gran celo[a], y con gran ira estoy celoso por ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estoy lleno de celo por Sion con gran celo». El hebreo usa la misma raíz para «estoy celoso» y «celo», enfatizando una intensa pasión pactual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino del Tetragrámaton, siguiendo la pauta del proyecto para español. «Yahvé» es el equivalente directo del transliterado «Yahweh» y evita sustituir el nombre por un título.
- source_word: צְבָאוֹת
  english_pob_choice: of hosts
  chosen_spanish: de los ejércitos
  alternatives_spanish:
  - de los ejércitos celestiales
  - de las huestes
  lexicon: HALOT
  rationale: En español, «de los ejércitos» comunica con claridad el sentido titular y bíblico de צְבָאוֹת sin sonar forzado. «Huestes» sería posible, pero resulta más marcado y menos transparente para lectura general.
- source_word: קִנֵּאתִי
  english_pob_choice: I am jealous
  chosen_spanish: siento gran celo
  alternatives_spanish:
  - estoy celoso
  - tengo gran celo
  lexicon: HALOT
  rationale: Se evita «celoso» por su asociación primaria en español con celos humanos posesivos o connotaciones negativas. «Siento gran celo» conserva la fuerza afectiva y la tensión teológica del texto, aunque requiere una nota para reflejar la alternativa «celos/zelos» que el hebreo permite.
- source_word: לְצִיּוֹן
  english_pob_choice: for Zion
  chosen_spanish: por Sion
  alternatives_spanish:
  - para Sion
  - a favor de Sion
  lexicon: HALOT
  rationale: Con קנא, la preposición expresa orientación de compromiso y pasión hacia Sion. En español, «por Sion» resulta idiomático y mantiene esa dirección relacional.
- source_word: קִנְאָה גְדוֹלָה
  english_pob_choice: with great jealousy
  chosen_spanish: gran celo
  alternatives_spanish:
  - gran celosía
  - gran celo y pasión
  - gran celo/zelos
  lexicon: HALOT
  rationale: El hebreo usa el mismo campo léxico que el verbo, y la traducción debe conservar la intensidad. «Gran celo» es natural en español y mantiene el enlace verbal-semántico con קנא; la nota preserva la alternativa «celo/celos» para no ocultar la tensión lexical.
- source_word: וְחֵמָה גְדוֹלָה
  english_pob_choice: and with great wrath
  chosen_spanish: y con gran ira
  alternatives_spanish:
  - y con gran furor
  - y con gran enojo
  lexicon: HALOT
  rationale: «Ira» comunica bien חֵמָה como indignación ardiente y juicio divino, sin suavizar el tono. «Furor» o «enojo» serían posibles, pero cambian el registro o debilitan la intensidad.
- source_word: לָהּ
  english_pob_choice: for her
  chosen_spanish: por ella
  alternatives_spanish:
  - para ella
  - contra ella
  lexicon: HALOT
  rationale: El pronombre femenino remite a Sion personificada. «Por ella» mantiene la referencia personal y la dirección de la emoción divina; además, ayuda a sostener la segunda mitad del versículo en español.
theological_decisions:
- issue: La pasión celosa de Yahvé
  english_pob_reading: Retain 'jealous' language for YHWH rather than softening to 'concern' or only 'zeal.'
  chosen_spanish_reading: Conservar el lenguaje de celo/ira para Yahvé, sin reducirlo a mera preocupación.
  alternative_spanish_readings:
  - siento gran celo
  - estoy celoso
  - tengo gran celo
  rationale: El hebreo insiste en el mismo campo léxico con verbo y sustantivo cognados. En español, «celo» preserva mejor la tensión teológica que opciones más suaves como «preocupación». La redacción evita sugerir pecado moral en Dios, pero tampoco borra la intensidad del compromiso pactual.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; el borrador español sigue de cerca el estado más reciente, conservando la tensión lexical de קנא / קִנְאָה y חֵמָה sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino, conforme al estándar del proyecto.
  - Se opta por «Sion» sin tilde para mantener la forma bíblica habitual en español.
  - Se mantiene la personificación femenina con «ella», coherente con el referente de Sion.
  - Se conserva un registro bíblico digno y moderno, evitando arcaísmos innecesarios.
