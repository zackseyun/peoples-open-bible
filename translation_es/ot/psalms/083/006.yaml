lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón en el contexto del salmo; «Porque» conserva bien la fuerza explicativa en español natural.
- source_word: נוֹעֲצוּ
  english_pob_choice: have conspired together
  chosen_spanish: conspiraron
  alternatives_spanish:
  - consultaron juntos
  - tomaron consejo juntos
  lexicon: HALOT
  rationale: El contexto hostil y la revisión inglesa favorecen una traducción más fuerte que simplemente «consultaron». «Conspiraron» transmite la deliberación mutua con intención adversa.
- source_word: לֵב
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - intención
  lexicon: HALOT
  rationale: En español, «corazón» conserva el valor hebreo de centro interior de voluntad e intención, sin perder la imagen idiomática.
- source_word: יַחְדָּו
  english_pob_choice: together
  chosen_spanish: un mismo
  alternatives_spanish:
  - juntos
  - en unidad
  lexicon: HALOT
  rationale: Se integra con «corazón» para reproducir la expresión idiomática «con un mismo corazón», que refleja unidad de intención.
- source_word: עָלֶיךָ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - en tu contra
  - sobre ti
  lexicon: HALOT
  rationale: El contexto de alianza hostil exige la fuerza adversativa de «contra ti».
- source_word: בְּרִית
  english_pob_choice: covenant
  chosen_spanish: pacto
  alternatives_spanish:
  - alianza
  - tratado
  lexicon: HALOT
  rationale: «Pacto» comunica bien el carácter formal y vinculante del hebreo en español bíblico actual, sin forzar una terminología eclesiástica específica.
- source_word: יִכְרֹתוּ
  english_pob_choice: they make
  chosen_spanish: hacen
  alternatives_spanish:
  - cortan
  - sellan
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «cortar un pacto», pero en español «hacen un pacto» comunica con naturalidad el modismo sin perder el sentido.
theological_decisions:
- issue: Lenguaje de hostilidad dirigida contra Dios en la cláusula final
  english_pob_reading: against you they make a covenant
  chosen_spanish_reading: contra ti hacen un pacto
  alternative_spanish_readings:
  - hacen un pacto contra ti
  - sellan un pacto contra ti
  rationale: Mantiene la oposición explícita a Dios y evita suavizar el alcance rebelde del texto. El orden y la preposición conservan el valor adversativo del hebreo.
  doctrine_reference: Salmo 83:6; cf. oposición de las naciones a Yahvé en el salmo
- issue: Imagen idiomática de unidad interior
  english_pob_reading: with one heart
  chosen_spanish_reading: con un mismo corazón
  alternative_spanish_readings:
  - con un solo corazón
  - con un corazón unánime
  rationale: Conserva la metáfora hebrea del «corazón» como centro de deliberación e intención, y expresa la unidad de manera idiomática y fiel.
  doctrine_reference: 'Antropología bíblica hebrea: corazón como sede de voluntad e intención'
translation_notes:
  revision_awareness: 'La versión inglesa más reciente añade «together» para reflejar יַחְדָּו y reordena la segunda cláusula para mantener el énfasis de «against you they make a covenant». La redacción española conserva ambos elementos: la unidad de intención en «con un mismo corazón» y la fuerza adversativa en «contra ti hacen un pacto».'
  spanish_consistency_notes:
  - Se mantiene «pacto» para בְּרִית, coherente con el valor formal del término.
  - Se conserva «corazón» para לֵב, en vez de reemplazarlo por «mente», para respetar la imaginería hebrea.
  - La nota textual/lexical del modismo «cortar un pacto» queda visible sin introducir traducción arcaizante en el cuerpo del texto.
  - El orden de la segunda cláusula respeta el énfasis del hebreo y de la revisión inglesa sobre la oposición directa a Dios.
