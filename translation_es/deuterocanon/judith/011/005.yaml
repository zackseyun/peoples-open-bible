  yaml_path: translation/deuterocanon/judith/011/005.yaml
  text: And Judith said to him[a], “Receive the words of your slave, and let your maidservant speak before you[b], and I will not tell a lie to my lord this night.”
  footnotes:
  - marker: a
    text: Or 'your servant' for 'your slave' (Greek δοῦλη). The Greek term can denote a female servant or slave; 'slave' is used here to preserve the stronger status language in Judith's self-humbling speech.
    reason: lexical_alternative
  - marker: b
    text: Or 'my master' for 'my lord' (Greek κυρίῳ μου), since the referent is a human superior, not God.
    reason: lexical_alternative
