translation:
  language: es
  text: Cuando endulza su voz[a], no confíes en él, porque siete[b] abominaciones hay en su corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘cuando habla amablemente’ o ‘cuando hace que suene amable’. El hebreo literalmente dice ‘cuando hace grata su voz’.
    reason: lexical_alternative
  - marker: b
    text: ‘Siete’ probablemente comunica plenitud o totalidad en el estilo sapiencial, pero el número se conserva en el texto principal.
    reason: cultural_note
lexical_decisions:
- source_word: יְחַנֵּן
  english_pob_choice: makes ... gracious
  chosen_spanish: endulza
  alternatives_spanish:
  - habla con gracia
  - hace grata su voz
  - se muestra amable al hablar
  lexicon: HALOT
  rationale: El piel de חנן puede expresar la idea de hacer algo amable, favorable o ‘gracioso’. En español, ‘endulza su voz’ conserva la imagen concreta de una voz suavizada o agradable sin perder la fuerza idiomática del hebreo.
- source_word: קוֹלוֹ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su habla
  - lo que dice
  lexicon: HALOT
  rationale: Se conserva ‘voz’ porque el hebreo dice literalmente ‘su voz’, y la imagen apunta al modo de hablar, no solo al contenido.
- source_word: אַל תַּאֲמֶן בּוֹ
  english_pob_choice: do not trust him
  chosen_spanish: no confíes en él
  alternatives_spanish:
  - no le creas
  - no pongas tu confianza en él
  lexicon: HALOT
  rationale: En hifil, אמן aquí comunica confiar o creer. Dado el complemento con בּוֹ, ‘confiar en él’ refleja mejor la construcción que ‘creerle’.
- source_word: שֶׁבַע
  english_pob_choice: seven
  chosen_spanish: siete
  alternatives_spanish:
  - muchas
  - en plenitud
  lexicon: HALOT
  rationale: Se mantiene el número explícito del hebreo. Aunque ‘siete’ puede sugerir plenitud en estilo sapiencial, la traducción no debe interpretar fuera el número.
- source_word: תּוֹעֵבוֹת
  english_pob_choice: abominations
  chosen_spanish: abominaciones
  alternatives_spanish:
  - cosas detestables
  - cosas aborrecibles
  lexicon: HALOT
  rationale: ‘Abominaciones’ conserva la intensidad moral del término hebreo y su uso bíblico habitual.
- source_word: בְּלִבּוֹ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de él
  - en su interior
  lexicon: HALOT
  rationale: ‘Corazón’ mantiene la antropología bíblica del centro de pensamiento e intención, y es la equivalencia natural en español.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo de Proverbios 26:25 y el criterio auditado de la POB inglesa: se conserva la imagen de la ‘voz’ y el número ‘siete’, evitando suavizar la advertencia sapiencial.'
  spanish_consistency_notes:
  - Se usa ‘corazón’ para בְּלִבּוֹ conforme al uso bíblico del interior humano.
  - ‘Abominaciones’ mantiene el tono moral fuerte del hebreo y la decisión inglesa auditada.
  - ‘No confíes en él’ sigue el valor de confianza del verbo en este contexto, más natural que ‘no le creas’.
