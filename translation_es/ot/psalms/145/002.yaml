review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el hebreo: «Cada día» para בְּכָל יוֹם, «te bendeciré» para אֲבָרֲכֶךָּ, «alabaré tu nombre» para וַאֲהַלְלָה שִׁמְךָ, y la duración enfática de לְעוֹלָם וָעֶד. Sin embargo, falta en español la nota cultural que el inglés ancla a «you/bless you» para explicar el lenguaje de «tu nombre».'
  spanish_quality_summary: El español es claro y digno, pero «por siempre y para siempre» suena redundante y menos idiomático que «por los siglos de los siglos» o «para siempre jamás». Además, la nota actual tiene comillas y puntuación poco naturales y no preserva bien la alternativa inglesa («Todos los días» corresponde mejor a «Every day/Each day» que repetir «Cada día» dentro de la nota).
  glossary_alignment: No hay conflicto con la terminología del proyecto. Se preserva «nombre» correctamente. La elección «bendeciré» y «alabaré» es fiel y natural. Conviene mantener una nota sobre «tu nombre» según la auditoría inglesa.
  issues:
  - severity: medium
    issue: Falta la nota cultural sobre «tu nombre».
    rationale: 'La auditoría inglesa conserva una nota explicativa importante: «your name» como forma bíblica de hablar del carácter y la reputación revelados de Dios. En español también conviene preservarla para sostener la decisión léxica y evitar que el lector la reduzca a un mero nombre propio.'
  - severity: medium
    issue: «por siempre y para siempre» es poco natural y estilísticamente redundante.
    rationale: Aunque intenta reflejar la intensificación hebrea, en español suena acumulativo de manera torpe. «por los siglos de los siglos» o «para siempre jamás» transmiten mejor la fuerza enfática con buena legibilidad eclesial.
  - severity: low
    issue: La nota de alternativa léxica está mal formulada.
    rationale: 'Dice «También: “Cada día” o “Día tras día”», repitiendo la lectura principal y con comillas innecesarias. Debe ofrecer alternativas reales y naturales, por ejemplo «Todos los días» o «Día tras día».'
  revised_spanish_text: Cada día te bendeciré[a][b], y alabaré tu nombre por los siglos de los siglos.
  revised_footnotes:
