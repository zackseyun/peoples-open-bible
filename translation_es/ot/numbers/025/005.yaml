base_translation:
  language: en
  yaml_path: translation/ot/numbers/025/005.yaml
  text: And Moses said to the judges of Israel[b][a], “Each of you must kill his men who have joined themselves to Baal Peor.”
  footnotes:
  - marker: a
    text: Or “Baal-peor.”
    reason: lexical_alternative
  - marker: b
    text: The Hebrew literally reads “kill, each man, his men,” meaning each judge was to put to death the men under his authority who had attached themselves to Baal of Peor.
    reason: lexical_alternative
