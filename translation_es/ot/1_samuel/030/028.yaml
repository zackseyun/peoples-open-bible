translation:
  language: es
  text: y a los de Aroer[a], y a los de Sifmot, y a los de Eshtemoa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Aroer». La preposición hebrea puede reflejarse en español como relación locativa directa o como pertenencia/destino dentro de la lista de pueblos.
    reason: lexical_alternative
  - marker: b
    text: El hebreo repite la fórmula «y a los de ...» antes de cada nombre de lugar, enfatizando a los destinatarios individuales en cada pueblo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלַאֲשֶׁר
  english_pob_choice: and to those
  chosen_spanish: y a los de
  alternatives_spanish:
  - y a aquellos de
  - y a los que estaban en
  lexicon: HALOT
  rationale: La forma hebrea combina conjunción, preposición y relativo; en este contexto introduce destinatarios en una lista de localidades. En español, 'a los de' comunica de manera natural la pertenencia o procedencia del grupo dentro de cada pueblo, sin sobrecargar con una paráfrasis.
- source_word: בַּעֲרֹעֵר
  english_pob_choice: in Aroer
  chosen_spanish: Aroer
  alternatives_spanish:
  - en Aroer
  - en la ciudad de Aroer
  lexicon: HALOT
  rationale: Es un nombre propio de lugar. Se conserva la transliteración estándar y, como el texto español ya marca la relación locativa con 'a los de', no es necesario añadir 'en' para no volver redundante la construcción.
- source_word: בְּשִׂפְמוֹת
  english_pob_choice: in Siphmoth
  chosen_spanish: Sifmot
  alternatives_spanish:
  - Sifmoth
  - en Sifmot
  - en Sifmoth
  lexicon: HALOT
  rationale: Se translitera el topónimo hebreo de manera transparente. Se adapta la grafía al español con 'Sifmot' para una lectura más natural, manteniendo el referente geográfico.
- source_word: בְּאֶשְׁתְּמֹעַ
  english_pob_choice: in Eshtemoa
  chosen_spanish: Eshtemoa
  alternatives_spanish:
  - en Eshtemoa
  - Eshtemóa
  lexicon: HALOT
  rationale: Se conserva el nombre propio con transliteración reconocible. El español admite la forma sin preposición explícita aquí porque la lista ya queda marcada por 'a los de'.
theological_decisions:
- issue: Distribución repetida de la fórmula para cada localidad
  english_pob_reading: Hebrew repeats the formula 'and to those in ...' before each place name, emphasizing the individual recipients in each town.
  chosen_spanish_reading: El español conserva la repetición mediante 'y a los de ... , y a los de ... , y a los de ...', manteniendo el énfasis en los destinatarios individuales de cada localidad.
  alternative_spanish_readings:
  - y a los que estaban en ...
  - y a los de ...
  rationale: 'No hay una cuestión doctrinal de fondo, pero sí un matiz estructural importante: la repetición subraya que cada pueblo recibió su parte de manera individual. La traducción preserva ese efecto sin fusionar la lista.'
  doctrine_reference: No aplica; decisión estilístico-sintáctica basada en la estructura del hebreo.
translation_notes:
  revision_awareness: El texto hebreo es breve y estable; el control auditado coincide con la traducción inglesa POB y no registra revisiones sustantivas. La versión española sigue esa misma lectura sin introducir cambios textuales.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva el paralelismo repetido de la lista para reflejar la distribución individual de los destinatarios.
  - Se usa transliteración de topónimos con ajuste mínimo al español cuando mejora la fluidez sin perder identificabilidad.
