translation:
  language: es
  text: Y los hijos de Israel[a] que habitaban en Judea oyeron todo lo que Holofernes, el comandante en jefe de Nabucodonosor, rey de los asirios, había hecho a las naciones, y cómo había despojado todos sus santuarios[b] y los había entregado a la destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los israelitas» o «los hijos de Jacob». El griego dice literalmente «los hijos de Israel».
    reason: lexical_alternative
  - marker: b
    text: O «sus templos» o «sus cosas sagradas»; el griego puede referirse ampliamente a lugares sagrados o a cosas sagradas.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ υἱοὶ Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: LSJ
  rationale: «Hijos de Israel» conserva el idiomatismo y la forma plural masculina del griego con transparencia suficiente para el español bíblico actual. «Israelitas» sería más fluido, pero reduce la visibilidad de la forma de origen.
- source_word: οἱ κατοικοῦντες ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: who lived in Judea
  chosen_spanish: que habitaban en Judea
  alternatives_spanish:
  - que vivían en Judea
  - residentes en Judea
  lexicon: LSJ
  rationale: El participio indica residencia continua. «Habitaban» preserva mejor el valor durativo y sigue siendo natural en español bíblico.
- source_word: πάντα ὅσα ἐποίησεν
  english_pob_choice: all that ... had done
  chosen_spanish: todo lo que ... había hecho
  alternatives_spanish:
  - todo cuanto ... hizo
  - todas las cosas que ... había hecho
  lexicon: LSJ
  rationale: La construcción totalizante se expresa con «todo lo que», que es idiomático y mantiene la amplitud de πάντα ὅσα. El pluscuamperfecto conserva la anterioridad narrativa.
- source_word: ὁ ἀρχιστράτηγος
  english_pob_choice: the commander-in-chief
  chosen_spanish: el comandante en jefe
  alternatives_spanish:
  - el general en jefe
  - el jefe supremo del ejército
  lexicon: LSJ
  rationale: «Comandante en jefe» reproduce la fuerza del cargo militar superior y corresponde bien al valor de ἀρχιστράτηγος, sin rebajarla a un simple «general».
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the nations
  chosen_spanish: a las naciones
  alternatives_spanish:
  - a los pueblos
  - a los gentiles
  lexicon: LSJ
  rationale: En este contexto narrativo, ἔθνη alude a pueblos/naciones extranjeras. «Naciones» evita una carga teológica que aquí no es primaria.
- source_word: ἐσκύλευσεν
  english_pob_choice: had plundered
  chosen_spanish: había despojado
  alternatives_spanish:
  - había saqueado
  - había despojado de botín
  lexicon: LSJ
  rationale: «Despojado» conserva la idea de quitar los bienes como botín y permite coordinar bien con los objetos sagrados del verso. «Saqueado» es posible, pero menos preciso respecto al acto de despojo.
- source_word: τὰ ἱερὰ αὐτῶν
  english_pob_choice: their sanctuaries
  chosen_spanish: todos sus santuarios
  alternatives_spanish:
  - todos sus lugares santos
  - todas sus cosas sagradas
  - sus templos
  lexicon: LSJ
  rationale: «Santuarios» mantiene la amplitud de τὰ ἱερά como espacios o realidades sagradas. Se añade «todos» porque el griego dice πάντα τὰ ἱερά, subrayando la totalidad.
- source_word: ἔδωκεν αὐτὰ εἰς ἀφανισμόν
  english_pob_choice: given them over to destruction
  chosen_spanish: los había entregado a la destrucción
  alternatives_spanish:
  - los había consagrado a la destrucción
  - los había consignado a la destrucción
  - los había entregado para su aniquilación
  lexicon: LSJ
  rationale: La fórmula expresa entrega para ruina total. «Entregado a la destrucción» conserva el movimiento verbal de ἔδωκεν y la fuerza de ἀφανισμός sin introducir un tecnicismo adicional.
theological_decisions:
- issue: Mantenimiento del lenguaje de filiación covenantal en οἱ υἱοὶ Ἰσραήλ
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se conserva la forma masculina plural del griego, que enmarca a Israel como pueblo de pacto sin neutralizar el registro del original. En español, «hijos de Israel» es comprensible y fiel.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Alcance de τὰ ἱερὰ αὐτῶν
  english_pob_reading: their sanctuaries
  chosen_spanish_reading: todos sus santuarios
  alternative_spanish_readings:
  - todos sus lugares santos
  - sus templos
  - todas sus cosas sagradas
  rationale: «Santuarios» conserva el campo semántico de lo sagrado en un sentido amplio y no reduce el término a edificios solamente. La inclusión de «todos» refleja el valor totalizador de πάντα.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés, sin cambios sustanciales respecto de la lectura de referencia; se conserva la misma comprensión de los sujetos, el cargo militar, la amplitud de «naciones» y el sentido de despojo de los lugares sagrados. Se ajustó el español para hacer explícita la totalidad de «todos sus santuarios» y la secuencia narrativa con pluscuamperfecto.
  spanish_consistency_notes:
  - Se usa «hijos de Israel» de forma consistente con la política de preservar el idiomatismo masculino plural del original cuando no hay razón contextual para neutralizarlo.
  - Se usa «Yahvé» como forma predeterminada solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Santuarios» se emplea en sentido amplio para τὰ ἱερὰ, evitando reducirlo a «templos» o a objetos sagrados exclusivamente.
  - «Comandante en jefe» mantiene la fuerza del título ἀρχιστράτηγος en una forma comprensible para el lector español.
