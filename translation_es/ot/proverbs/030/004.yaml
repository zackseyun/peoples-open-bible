translation:
  language: es
  text: ¿Quién subió[a] al cielo y descendió? ¿Quién reunió el viento[b] en sus puños? ¿Quién envolvió las aguas en un manto? ¿Quién estableció todos los confines de la tierra? ¿Cuál es su nombre, y cuál es el nombre de su hijo[c], si sabes[d]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los cielos». El hebreo שָׁמַיִם es formalmente plural.
    reason: lexical_alternative
  - marker: b
    text: O «espíritu» o «aliento». Aquí רוּחַ se entiende mejor como el viento en sentido físico.
    reason: lexical_alternative
  - marker: c
    text: La interpretación cristiana a menudo ha visto significado en «el nombre de su hijo», pero el texto hebreo no identifica explícitamente al hijo.
    reason: cross_reference
  - marker: d
    text: 'O «si sabes». El hebreo puede leerse como un desafío irónico: «si sabes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: עָלָה ... וַיֵּרַד
  english_pob_choice: has gone up to heaven and come down
  chosen_spanish: subió ... y descendió
  alternatives_spanish:
  - ha subido al cielo y ha bajado
  - ascendió al cielo y descendió
  lexicon: HALOT
  rationale: En español, el paralelismo verbal breve transmite mejor la pregunta retórica que un perfecto compuesto forzado. 'Cielo' funciona naturalmente para שָׁמַיִם en este contexto, sin perder el ámbito celestial/vertical del hebreo.
- source_word: שָׁמַיִם
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - los cielos
  lexicon: HALOT
  rationale: Aunque el hebreo es formalmente plural, en español 'el cielo' es la forma más natural y sobria para este ámbito. 'Los cielos' se mantiene como alternativa válida, pero puede sonar más marcada o literaria.
- source_word: רוּחַ
  english_pob_choice: the wind
  chosen_spanish: el viento
  alternatives_spanish:
  - el espíritu
  - el aliento
  lexicon: HALOT
  rationale: En este cuadro cósmico de aguas y tierra, 'viento' expresa mejor el referente físico de רוּחַ. Se evita 'espíritu' porque aquí desharía la imagen material del pasaje.
- source_word: בְּחָפְנָיו
  english_pob_choice: in his fists
  chosen_spanish: en sus puños
  alternatives_spanish:
  - en sus manos
  - en sus palmas
  lexicon: HALOT
  rationale: '''Puños'' reproduce con más precisión la imagen de manos ahuecadas o cerradas que contienen algo. Aunque suena más concreto que ''manos'', preserva mejor la fuerza visual del hebreo.'
- source_word: צָרַר מַיִם בַּשִּׂמְלָה
  english_pob_choice: has wrapped the waters in a garment
  chosen_spanish: envolvió las aguas en un manto
  alternatives_spanish:
  - envolvió las aguas en una prenda
  - ató las aguas en un manto
  lexicon: HALOT
  rationale: '''Envolver'' traduce bien la idea de צָרַר como reunir/ceñir/envueltas, y ''manto'' comunica en español una vestidura amplia y poética. ''Prenda'' sería más general, pero menos evocadora.'
- source_word: הֵקִים כָּל אַפְסֵי אָרֶץ
  english_pob_choice: has established all the ends of the earth
  chosen_spanish: estableció todos los confines de la tierra
  alternatives_spanish:
  - ha establecido todos los extremos de la tierra
  - fijó todos los confines de la tierra
  lexicon: HALOT
  rationale: '''Estableció'' conserva el valor de poner firmemente en su lugar. ''Confines'' refleja bien אַפְסֵי אָרֶץ como expresión de los límites/extremos de la tierra en un registro bíblico sobrio.'
- source_word: מַה שְּׁמוֹ
  english_pob_choice: What is his name
  chosen_spanish: ¿Cuál es su nombre?
  alternatives_spanish:
  - ¿Qué nombre tiene?
  - ¿Cómo se llama?
  lexicon: HALOT
  rationale: '''¿Cuál es su nombre?'' es natural y fiel al interrogativo hebreo, manteniendo el tono solemne de la pregunta retórica.'
- source_word: וּמַה שֶּׁם בְּנוֹ
  english_pob_choice: and what is his son's name
  chosen_spanish: y cuál es el nombre de su hijo
  alternatives_spanish:
  - y cuál es el nombre de su hijo
  - y qué nombre tiene su hijo
  lexicon: HALOT
  rationale: Se conserva 'su hijo' sin neutralizar ni explicitar más de lo que dice el hebreo. La formulación en español mantiene la tensión interpretativa que el POB documenta.
- source_word: כִּי תֵדָע
  english_pob_choice: if you know
  chosen_spanish: si lo sabes
  alternatives_spanish:
  - si sabes
  - pues lo sabes
  lexicon: HALOT
  rationale: La cláusula se vierte como desafío irónico en forma condicional, tal como permite el hebreo. 'Si lo sabes' conserva la elipsis del objeto y el tono interrogativo sin añadir énfasis ajeno.
theological_decisions:
- issue: Posible lectura cristológica de 'su hijo'
  english_pob_reading: Christian interpretation has often seen significance in 'his son's name,' but the Hebrew text itself does not explicitly identify the son.
  chosen_spanish_reading: Mantener 'su hijo' sin identificarlo explícitamente en el texto principal.
  alternative_spanish_readings:
  - '''el Hijo'''
  - añadir una glosa cristológica en el texto principal
  rationale: El hebreo formula una pregunta retórica y no nombra al hijo. Para no resolver la tensión teológica que el original deja abierta, la traducción conserva la expresión literal y deja cualquier lectura cristológica fuera del texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it; historic Christian orthodoxy'
- issue: Valor de כִּי תֵדָע
  english_pob_reading: if you know
  chosen_spanish_reading: si lo sabes
  alternative_spanish_readings:
  - si sabes
  - ¿lo sabes?
  rationale: La frase final se entiende mejor como provocación o desafío, no como afirmación. El español condicional transmite esa ambigüedad sin transformar el tono en una aseveración.
  doctrine_reference: Audit trail revision on Proverbs 30:4; rhetorical question handling
translation_notes:
  revision_awareness: 'El borrador sigue el audit trail más reciente del POB: adopta la lectura de חָפְנָיו como ''puños'' y la clausula final como un condicional desafiante (''if you know''), en lugar de una afirmación (''surely you know''). También conserva la cautela teológica respecto de ''su hijo'' sin añadir identificación explícita. La revisión respeta el paralelo hebreo y mantiene el tono interrogativo-retórico del versículo.'
  spanish_consistency_notes:
  - Se usa 'cielo' en singular por naturalidad idiomática, pero se documenta la alternativa plural en nota.
  - '''Viento'' se reserva para el sentido físico de רוּחַ; no se usa ''Espíritu'' porque el contexto no lo exige.'
  - '''Confines de la tierra'' mantiene el registro bíblico y la imagen de אַפְסֵי אָרֶץ.'
  - '''Su hijo'' se conserva literalmente para no borrar la tensión interpretativa del original.'
  - Las preguntas se puntúan como interrogativas directas en español, y la última cláusula se deja como condicional para reflejar el hebreo.
