  spanish_quality_summary: El español es claro y eclesialmente legible. «Lugar santo», «un cuadrado de quinientos por quinientos» y «cincuenta codos» funcionan bien. «Todo alrededor» suena aceptable, aunque «alrededor» bastaría; no requiere cambio. El problema principal es de anclaje y precisión editorial de la nota, no de legibilidad.
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. La elección «lugar santo» para קֹדֶשׁ concuerda con la justificación documentada, con nota alternativa «santuario». «Terreno libre» para מִגְרָשׁ es defendible, aunque «terreno abierto» quizá sería un poco más idiomático; no es necesario forzar cambio. La nota alternativa sobre «terreno de pasto / terreno común» debe quedar ligada a «terreno libre».
  issues:
  - severity: medium
    issue: La nota [b] está anclada en la frase equivocada.
    rationale: En el texto inglés auditado, la nota b explica מִגְרָשׁ ('open land'), no סָבִיב ('all around'). En español, [b] aparece tras «todo alrededor», lo que induce al lector a pensar que la alternativa se refiere a la expresión perimetral y no al tipo de terreno.
  - severity: low
    issue: La razón de la nota [a] podría armonizarse mejor con la taxonomía lexical_alternative.
    rationale: No afecta el texto bíblico, pero la nota [a] preserva una alternativa léxica documentada, más que una mera lectura alternativa.
