translation:
  language: es
  text: La mirada altiva del hombre será abatida[a], y la altivez de los hombres será humillada; y Yahvé solo será exaltado en aquel día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La mirada orgullosa del hombre ... la altivez de los hombres». El hebreo usa una imagen de elevación en los ojos para expresar orgullo humano.'
    reason: lexical_alternative
lexical_decisions:
- source_word: עֵינֵי גַּבְהוּת אָדָם
  english_pob_choice: The lofty eyes of man
  chosen_spanish: la mirada altiva del hombre
  alternatives_spanish:
  - los ojos altivos del hombre
  - la mirada orgullosa del hombre
  lexicon: HALOT
  rationale: El hebreo expresa una imagen de elevación orgullosa asociada a los ojos o la mirada. En español, «mirada altiva» conserva la imagen y su fuerza idiomática sin volverse torpe. «Hombre» mantiene el valor genérico singular de אָדָם.
- source_word: שָׁפֵל
  english_pob_choice: will be brought low
  chosen_spanish: será abatida
  alternatives_spanish:
  - será humillada
  - será rebajada
  lexicon: HALOT
  rationale: El verbo comunica ser hecho bajo o abatido. «Será abatida» mantiene la imagen de descenso y funciona bien con «mirada» como sujeto implícito de la primera cláusula.
- source_word: וְשַׁח
  english_pob_choice: will be humbled
  chosen_spanish: será humillada
  alternatives_spanish:
  - será inclinada
  - será abatida
  lexicon: HALOT
  rationale: El segundo verbo refuerza la humillación o el doblarse hacia abajo. «Será humillada» evita repetir exactamente el mismo verbo y preserva la progresión semántica.
- source_word: רוּם אֲנָשִׁים
  english_pob_choice: the haughtiness of men
  chosen_spanish: la altivez de los hombres
  alternatives_spanish:
  - la soberbia de los hombres
  - la altura de los hombres
  lexicon: HALOT
  rationale: Aquí רוּם funciona como sustantivo de elevación/altivez. La revisión inglesa optó por «haughtiness», y en español «altivez» conserva con precisión el matiz de orgullo elevado, mejor que una traducción más literal como «altura».
- source_word: וְנִשְׂגַּב
  english_pob_choice: will be exalted
  chosen_spanish: será exaltado
  alternatives_spanish:
  - será puesto en alto
  - será levantado
  lexicon: HALOT
  rationale: El verbo significa ser alto, inaccesible o exaltado. «Será exaltado» es la forma más directa y natural en español, y conserva el contraste deliberado con la humillación humana.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Se conserva el nombre divino revelado en el texto hebreo. En la tradición de la POB española, «Yahvé» comunica el Tetragrámaton de manera clara y reverente, sin sustituirlo por un título.
- source_word: לְבַדּוֹ
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: HALOT
  rationale: La idea es de exclusividad. «Solo» es breve, natural y suficientemente fuerte para expresar que Yahvé será exaltado sin compañía ni rival.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: La fórmula profética temporal se vierte de manera idiomática con «en aquel día», preservando su tono escatológico y solemne.
theological_decisions:
- issue: Contraste entre orgullo humano y exaltación exclusiva de Yahvé
  english_pob_reading: human pride is lowered; Yahweh alone is exalted
  chosen_spanish_reading: la altivez humana será abatida y humillada; Yahvé solo será exaltado
  alternative_spanish_readings:
  - la soberbia humana será derribada y humillada
  - la humanidad será humillada
  rationale: El versículo no habla solo de una corrección moral general, sino del abatimiento de la autosuficiencia humana frente a la exaltación exclusiva de Yahvé. Mantener la duplicación de verbos y el contraste preserva la intensidad profética.
  doctrine_reference: Isaías 2:11; cf. el principio de contraste teológico en el juicio divino
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El hebreo contiene el Tetragrámaton de forma explícita. Siguiendo la política del proyecto, se evita ocultarlo bajo una sustitución titular y se lo vierte como nombre propio.
  doctrine_reference: 'DOCTRINE.md §Contested terms: יְהוָה YHWH'
- issue: Sentido de אָדָם / אֲנָשִׁים
  english_pob_reading: man ... men
  chosen_spanish_reading: el hombre ... los hombres
  alternative_spanish_readings:
  - la gente ... la gente
  - la humanidad ... los seres humanos
  rationale: El texto alterna singular genérico y plural para expresar el orgullo humano en general. «El hombre» y «los hombres» preservan ese juego retórico sin convertirlo en un abstracto impersonal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La redacción sigue el texto hebreo de Isaías 2:11 y toma en cuenta la revisión inglesa más reciente, que prefirió «haughtiness of men» para רוּם אֲנָשִׁים. En español, esa decisión se refleja con «altivez de los hombres», que mantiene el paralelo con «mirada altiva» y conserva el registro formal del poema profético. También se respeta la decisión auditada de traducir יְהוָה como nombre propio divino y no como un sustituto titular.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico formal pero natural en español.
  - Se conserva el paralelismo poético con dos cláusulas coordinadas y una cláusula final de exaltación exclusiva.
  - «Yahvé» se usa consistentemente para יְהוָה conforme a la pauta del proyecto.
  - La nota textual/lexical ofrece una alternativa válida sin debilitar el texto principal.
