translation:
  language: es
  text: 'Así que Jeroboam y todo el pueblo vinieron a Roboam el tercer día, tal como el rey había hablado, diciendo: «Vuelvan[a] a mí el tercer día».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "Regresen a mí".
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּבֹאוּ
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - llegaron
  - fueron
  lexicon: HALOT
  rationale: בוא expresa movimiento hacia el destinatario; con אֶל רְחַבְעָם, en español natural desde la perspectiva narrativa es «vinieron a Roboam». «Llegaron» es posible, pero menos personal; «fueron» perdería el matiz direccional.
- source_word: יָרָבְעָם
  english_pob_choice: Jeroboam
  chosen_spanish: Jeroboam
  alternatives_spanish:
  - Yeroboam
  lexicon: Transliteración estándar del nombre propio
  rationale: Se conserva la forma usual en español bíblico y en el texto auditado en inglés.
- source_word: וְכָל הָעָם
  english_pob_choice: and all the people
  chosen_spanish: y todo el pueblo
  alternatives_spanish:
  - y toda la gente
  - y toda la asamblea
  lexicon: HALOT
  rationale: עָם aquí designa al conjunto del pueblo que acudió al rey. «Pueblo» es natural, digno y suficientemente amplio; «gente» baja el registro; «asamblea» introduce una connotación no exigida por el hebreo.
- source_word: אֶל רְחַבְעָם
  english_pob_choice: to Rehoboam
  chosen_spanish: a Roboam
  alternatives_spanish:
  - ante Roboam
  - hacia Roboam
  lexicon: HALOT
  rationale: אֶל marca dirección hacia una persona; en español, «a Roboam» reproduce de forma directa esa relación. «Ante» podría sugerir comparecencia judicial no explícita aquí.
- source_word: בַּיּוֹם הַשְּׁלִישִׁי
  english_pob_choice: on the third day
  chosen_spanish: el tercer día
  alternatives_spanish:
  - al tercer día
  - en el tercer día
  lexicon: HALOT
  rationale: 'La expresión temporal hebrea se vierte con el orden más natural en español bíblico contemporáneo: «el tercer día». «Al tercer día» sería idiomático, pero «el tercer día» mantiene mejor la forma del origen y coincide con el audit trail inglés.'
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: HALOT
  rationale: Introduce correspondencia exacta entre la llegada y la instrucción previa. «Tal como» conserva esa equivalencia con claridad y un registro formal.
- source_word: דִּבֶּר הַמֶּלֶךְ
  english_pob_choice: the king had spoken
  chosen_spanish: el rey había hablado
  alternatives_spanish:
  - el rey había dicho
  - el rey habló
  lexicon: HALOT
  rationale: El perfecto hebreo remite a una palabra previa respecto del evento narrado. «Había hablado» sigue el valor anterior y mantiene la secuencia temporal. «Había dicho» sería posible, pero «hablar» preserva mejor la noción de orden dada por el rey.
- source_word: לֵאמֹר
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - con estas palabras
  lexicon: HALOT
  rationale: Es la fórmula quotativa estándar que introduce cita directa; «diciendo» es transparente y fiel.
- source_word: שׁוּבוּ אֵלַי
  english_pob_choice: Return to me
  chosen_spanish: Vuelvan a mí
  alternatives_spanish:
  - Retornen a mí
  - Regresen a mí
  lexicon: HALOT
  rationale: שׁוּב expresa volver/retornar. En español, el imperativo plural «Vuelvan a mí» es claro, formal y natural. «Retornen» suena más literario; «regresen» es válido, pero menos cercano al campo semántico habitual de שׁוּב en este contexto.
translation_notes:
  revision_awareness: La base inglesa revisada cambió «Come back to me» por «Return to me» para elevar el registro y acercarse más al imperativo hebreo. La versión española adopta un equivalente formal («Vuelvan a mí») y conserva la alternativa temporal idiomática «al tercer día» como nota, ya que el hebreo permite esa formulación sin alterar el sentido.
  spanish_consistency_notes:
  - Se mantiene «Roboam» en lugar de «Rehoboam» para coherencia con la ortografía bíblica habitual en español.
  - Se preserva «el tercer día» en el cuerpo principal, con nota alternativa «al tercer día» para reflejar la naturalidad idiomática posible en español.
  - El imperativo plural se traduce con voseo no; se usa el plural formal neutro «Vuelvan» para cubrir a la totalidad del pueblo.
