  text: וְ/עַתָּה֙ יְהוָ֣ה אֱלֹהִ֔ים הַ/דָּבָ֗ר אֲשֶׁ֨ר דִּבַּ֤רְתָּ עַֽל עַבְדְּ/ךָ֙ וְ/עַל בֵּית֔/וֹ הָקֵ֖ם עַד עוֹלָ֑ם וַ/עֲשֵׂ֖ה כַּ/אֲשֶׁ֥ר דִּבַּֽרְתָּ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/007/025.yaml
  text: And now[a], Yahweh God, confirm forever the word that you have spoken concerning your servant and concerning his house[b], and do as you have spoken.
  footnotes:
