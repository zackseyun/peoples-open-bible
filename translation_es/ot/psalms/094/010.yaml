translation:
  language: es
  text: El que disciplina a las naciones, ¿no reprenderá?, el que enseña al hombre[a] conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la humanidad» o «el género humano»; el hebreo אָדָם es un singular representativo aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: יֹסֵר
  english_pob_choice: disciplines
  chosen_spanish: disciplina
  alternatives_spanish:
  - castiga
  - corrige
  - reprende
  lexicon: HALOT
  rationale: יסר comunica disciplina correctiva, no solo castigo. «Disciplina» conserva la idea de corrección con autoridad y suena natural en español bíblico moderno.
- source_word: גּוֹיִם
  english_pob_choice: nations
  chosen_spanish: las naciones
  alternatives_spanish:
  - los pueblos
  - los gentiles
  lexicon: HALOT
  rationale: En el contexto poético de los Salmos, גוים suele referirse a naciones en general. «Las naciones» mantiene el alcance colectivo sin volverlo específicamente étnico.
- source_word: יוֹכִיחַ
  english_pob_choice: rebuke
  chosen_spanish: reprenderá
  alternatives_spanish:
  - reprobará
  - corregirá
  - juzgará
  - convencerá
  lexicon: HALOT
  rationale: יכח en hifil tiene fuerza de reprensión/corrección. «Reprenderá» preserva bien el paralelismo con la disciplina del primer hemistiquio.
- source_word: הַמְלַמֵּד
  english_pob_choice: he who teaches
  chosen_spanish: El que enseña
  alternatives_spanish:
  - el que instruye
  - el maestro que
  lexicon: HALOT
  rationale: El participio funciona sustantivamente. «El que enseña» reproduce la construcción hebrea sin sobreinterpretarla.
- source_word: אָדָם
  english_pob_choice: man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la humanidad
  - al ser humano
  - a la gente
  lexicon: HALOT
  rationale: אָדָם aquí es singular representativo y genérico. «Al hombre» conserva la forma singular del hebreo y el contraste con Dios; se mantiene la tensión de género gramatical con una nota aclaratoria.
- source_word: דָּעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría
  - entendimiento
  lexicon: HALOT
  rationale: דעת denota conocimiento o entendimiento. «Conocimiento» es la correspondencia más directa y natural después de «enseña».
theological_decisions:
- issue: Uso representativo y genérico de אָדָם
  english_pob_reading: man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  - el género humano
  rationale: El hebreo usa un singular representativo, no un abstracto colectivo. «El hombre» mantiene esa forma y el contraste retórico con el sujeto divino, sin ocultar la amplitud genérica del término.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4; Contested terms table for אָדָם
- issue: Paralelismo retórico entre disciplina y reprensión/corrección
  english_pob_reading: disciplines / rebuke
  chosen_spanish_reading: disciplina / reprenderá
  alternative_spanish_readings:
  - corrige / corregirá
  - castiga / castigará
  rationale: El versículo presenta dos acciones correctivas relacionadas. «Disciplina» y «reprenderá» conservan la progresión retórica sin reducirla a mero castigo.
  doctrine_reference: Ps 94:10; lexical decision for יסר and יכח
translation_notes:
  revision_awareness: La redacción sigue de cerca el hebreo y el audit trail inglés. Se mantuvo el paralelismo con dos preguntas retóricas y se evitó suavizar אָדָם a un colectivo abstracto en el texto principal.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo exige; aquí no aparece el Tetragrámaton.
  - «Naciones» conserva el valor amplio de גוים sin especificar etnicidad.
  - «Hombre» se usa en sentido representativo singular, con nota para alternativas inclusivas.
