translation:
  language: es
  text: Si también me quitan a este, y le sucede una desgracia, entonces harán bajar mis canas al Seol[a] con dolor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al sepulcro» o «al reino de los muertos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְקַחְתֶּם
  english_pob_choice: if you also take
  chosen_spanish: si también llevan
  alternatives_spanish:
  - y llevan
  - cuando lleven
  lexicon: HALOT
  rationale: El hebreo continúa una condición implícita en el lamento de Jacob. En español, «si también llevan» expresa mejor esa relación condicional que una coordinación simple, y mantiene el valor aditivo de גַּם.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - incluso
  lexicon: HALOT
  rationale: «También» comunica la adición a la pérdida ya temida, de forma natural en español y sin intensificar más de lo que el contexto exige.
- source_word: מֵעִם פָּנַי
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - de mi presencia
  - de delante de mí
  lexicon: HALOT
  rationale: El hebreo es idiomático y apunta a separación de la presencia de Jacob. Dado el ajuste revisado del inglés POB a «from me», «de mí» es la opción más directa y natural en español, conservando la fuerza relacional.
- source_word: וְקָרָהוּ אָסוֹן
  english_pob_choice: and harm happens to him
  chosen_spanish: y le sucede un mal
  alternatives_spanish:
  - y le ocurre una desgracia
  - y le acontece un desastre
  lexicon: HALOT
  rationale: La construcción verbal expresa que un mal calamitoso le sobreviene. «Le sucede un mal» mantiene la idea de acontecimiento adverso sin sobrecargar el texto con una paráfrasis más interpretativa.
- source_word: וְהוֹרַדְתֶּם
  english_pob_choice: you will bring down
  chosen_spanish: harán bajar
  alternatives_spanish:
  - bajarán
  - llevarán abajo
  lexicon: HALOT
  rationale: El hiphil causativo requiere una forma causativa en español. En una voz más natural para la frase, «harán bajar» conserva la causalidad y la imagen de descenso.
- source_word: שֵׂיבָתִי
  english_pob_choice: my gray hair
  chosen_spanish: mis canas
  alternatives_spanish:
  - mi cabello cano
  - mi vejez
  lexicon: HALOT
  rationale: El hebreo usa una metonimia de vejez por «canicie». «Mis canas» preserva esa imagen concreta y suena idiomático en español.
- source_word: בְּרָעָה
  english_pob_choice: in misery
  chosen_spanish: con dolor
  alternatives_spanish:
  - en miseria
  - en aflicción
  - en angustia
  lexicon: HALOT
  rationale: Aquí רָעָה describe la condición penosa en que Jacob descendería al morir. «Con dolor» es una forma comprensible y sobria en español; se evita convertir el término en juicio moral.
- source_word: שְׁאֹלָה
  english_pob_choice: to Sheol
  chosen_spanish: hasta el Seol
  alternatives_spanish:
  - al Seol
  - a la morada de los muertos
  lexicon: HALOT
  rationale: Se conserva el término técnico hebreo con transliteración, siguiendo la primacía del lenguaje fuente. «Hasta» ayuda a reproducir la imagen de descenso, sin sustituir el concepto por «sepulcro» o una explicación doctrinal.
theological_decisions:
- issue: Renderización de שְׁאוֹל
  english_pob_reading: Sheol
  chosen_spanish_reading: Seol
  alternative_spanish_readings:
  - sepulcro
  - morada de los muertos
  - la tumba
  rationale: La POB en inglés preserva el término conceptual hebreo para no aplanarlo a una simple tumba. En español, «Seol» mantiene esa distinción y deja abierta la gama semántica del concepto bíblico.
  doctrine_reference: Translation philosophy §1, §3
- issue: La fuerza del verbo causativo en la cláusula final
  english_pob_reading: you will bring down my gray hair to Sheol in misery
  chosen_spanish_reading: harán bajar mis canas con dolor hasta el Seol
  alternative_spanish_readings:
  - me harán bajar al Seol con dolor
  - llevarán mis canas al Seol en dolor
  rationale: El texto expresa una consecuencia causada por los hermanos. La forma elegida conserva la causatividad del hiphil y la imagen de descenso, sin introducir precisión doctrinal extra sobre el estado post mortem.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El inglés POB revisó 'from before me' a 'from me' para naturalidad, manteniendo el sentido de separación. La versión española sigue esa revisión con 'de mí' y conserva la imagen de descenso a 'Seol' en lugar de sustituirla por una glosa.
  spanish_consistency_notes:
  - Se usa «Seol» de manera consistente para שְׁאֹל, conforme al criterio POB de conservar el término técnico.
  - «Mis canas» preserva la metonimia hebrea de vejez sin convertirla en una abstracción.
  - Se mantiene la causatividad de וְהוֹרַדְתֶּם con una forma española natural («harán bajar»).
