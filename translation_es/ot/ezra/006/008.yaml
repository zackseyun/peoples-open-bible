base_translation:
  language: en
  yaml_path: translation/ot/ezra/006/008.yaml
  text: 'And by me a decree is issued concerning what you are to do with these elders of the Jews for the rebuilding of the house of God: the full expense is to be paid promptly to these men from the king’s goods[a], from the province Beyond the River[c][b], so that the work may not cease.'
  footnotes:
  - marker: a
    text: Or 'the cost' or 'the expenditure' for 'the full expense.'
    reason: lexical_alternative
  - marker: b
    text: '''Beyond the River'' was the Persian administrative name for the region west of the Euphrates.'
    reason: cultural_note
  - marker: c
    text: Or 'so that there may be no interruption.'
    reason: alternative_reading
