translation:
  language: es
  text: Así que David no quiso llevarse el arca de Yahvé a la Ciudad de David[a]; más bien, David la desvió a la casa de Obed-edom el geteo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia la Ciudad de David» o «arriba a la Ciudad de David». La preposición hebrea puede sugerir movimiento hacia un lugar o hacia arriba en dirección a él.
    reason: lexical_alternative
  - marker: b
    text: 'También: «el de Gat». El gentilicio hebreo puede conservarse como «geteo» o expresarse geográficamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אָבָה
  english_pob_choice: was not willing
  chosen_spanish: no quiso
  alternatives_spanish:
  - no estuvo dispuesto
  - se negó
  lexicon: HALOT
  rationale: אָבָה expresa voluntad o disposición. En español, 'no quiso' comunica bien la falta de disposición sin endurecerla más de lo que exige el contexto. 'No estuvo dispuesto' es más formal, pero menos natural aquí; 'se negó' sería demasiado fuerte.
- source_word: לְהָסִיר אֵלָיו
  english_pob_choice: to bring ... to himself
  chosen_spanish: llevar ... hacia sí
  alternatives_spanish:
  - traer ... hacia sí
  - remover ... hacia sí
  lexicon: HALOT
  rationale: El hebreo literalmente habla de apartar o mover hacia él; en este contexto narrativo, 'llevar ... hacia sí' expresa el movimiento pretendido por David con naturalidad. 'Traer' también sería posible, pero 'llevar' encaja mejor con el giro a la casa de otra persona en la cláusula siguiente.
- source_word: אֲרוֹן יְהוָה
  english_pob_choice: the ark of Yahweh
  chosen_spanish: el arca de Yahvé
  alternatives_spanish:
  - el arca de Yahweh
  - el arca del SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino como 'Yahvé' según la terminología del proyecto. 'Arca de Yahweh' sería una grafía menos habitual en español; 'del SEÑOR' ocultaría el nombre propio y no sigue la directriz del proyecto.
- source_word: עַל עִיר דָּוִד
  english_pob_choice: into the City of David
  chosen_spanish: hacia la Ciudad de David
  alternatives_spanish:
  - a la Ciudad de David
  - hasta la Ciudad de David
  - hacia arriba a la Ciudad de David
  lexicon: HALOT
  rationale: La preposición עַל aquí puede indicar dirección hacia/encima de un lugar. Dado que el POB inglés preserva la nota de alternativa, 'hacia la Ciudad de David' mantiene esa apertura sin forzar una imagen espacial excesiva. En español, 'hacia' comunica bien el destino con posible matiz direccional.
- source_word: וַיַּטֵּהוּ
  english_pob_choice: turned it aside
  chosen_spanish: la desvió
  alternatives_spanish:
  - la apartó
  - la desvió hacia otro lado
  lexicon: HALOT
  rationale: נטה expresa aquí un desvío intencional. 'La desvió' conserva la acción concreta y breve del hebreo. 'La apartó' sería válida, pero menos precisa respecto al cambio de rumbo.
- source_word: בֵּית עֹבֵד אֱדוֹם
  english_pob_choice: the house of Obed-edom
  chosen_spanish: la casa de Obed-edom
  alternatives_spanish:
  - el hogar de Obed-edom
  - la familia de Obed-edom
  lexicon: HALOT
  rationale: בֵּית puede significar 'casa' o 'casa/familia'. Aquí el arca se deposita en un lugar concreto, por lo que 'la casa' es la opción más directa y fiel al contexto narrativo.
- source_word: הַגִּתִּי
  english_pob_choice: the Gittite
  chosen_spanish: el geteo
  alternatives_spanish:
  - el de Gat
  - el giteo
  lexicon: HALOT
  rationale: Se opta por una forma gentilicia española transparente y estable. 'Geteo' refleja el origen en Gat y evita una traducción explicativa dentro del cuerpo del texto; 'el de Gat' quedaría más perifrástico y menos compacto.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - SEÑOR
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la política del proyecto, se mantiene el nombre propio divino en español como 'Yahvé', evitando la sustitución litúrgica por 'SEÑOR'.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin copiarlo mecánicamente: se conservó la tensión de עַל con una nota alternativa y se mantuvo la diferencia entre ''llevar hacia sí'' y el desvío real del arca en la segunda cláusula. No se introdujeron cambios respecto del último pase revisado, y la traducción mantiene el nombre divino como Yahvé según la terminología del proyecto.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' en lugar de 'SEÑOR' para el Tetragrámaton, conforme a la política terminológica del proyecto.
  - '''Casa de Obed-edom'' se conserva como lugar concreto, no como ''casa/familia'', porque el contexto narrativo apunta al sitio donde fue llevada el arca.'
  - '''Geteo'' se usa como gentilicio español compacto y readable; la alternativa ''el de Gat'' queda documentada en nota.'
  - La frase 'hacia la Ciudad de David' preserva la ambigüedad direccional del hebreo sin volverla rígidamente localizativa.
