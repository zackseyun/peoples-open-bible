review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura participial reflexiva del hebreo, conserva adecuadamente la dificultad de «אַחַר אחד בַּתָּוֶךְ» con nota, y mantiene «Yahvé» conforme al proyecto. Sin embargo, hay dos desajustes léxicos importantes: «ratones» cambia innecesariamente la opción auditada «mice»/«mice» hacia un término español que suele evocar más bien ratas pequeñas; «ratas» sería peor, pero en este contexto bíblico la opción más fiel y precisa es «ratones». Además, «todos perecerán juntos» añade «todos», que no está en el hebreo y duplica el sentido de יַחְדָּו.'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. No obstante, «todos perecerán juntos» suena algo redundante y más enfático de lo necesario. También conviene preferir «la carne de cerdo» o mantener «carne de cerdo»; ambas son naturales, pero la redacción general mejora quitando «todos».
  glossary_alignment: 'Buen alineamiento con los términos del proyecto: «Yahvé», «se santifican», «se purifican», «cosas detestables». La principal corrección terminológica es usar «ratones» en el texto final si se entiende como animales pequeños equivalentes a mice; el borrador ya lo hace, pero su propio resumen crítico inglés destaca que la elección segura es ‘mice’, por lo que en español «ratones» sí es la forma correcta. El problema real de glosario está en la decisión lexical declarada para יַחְדָּו como «todos», que no debe pasar al texto principal.'
  issues:
  - severity: medium
    issue: «todos» añade contenido no presente en יַחְדָּו
    rationale: El hebreo tiene el adverbio «juntos», no el pronombre/adjetivo «todos». «Perecerán juntos» ya expresa el alcance colectivo sin expansión innecesaria.
  - severity: low
    issue: La cláusula final queda más natural sin la duplicación «todos ... juntos»
    rationale: En español bíblico moderno, «juntos perecerán» o «perecerán juntos» es suficiente y más elegante.
  revised_spanish_text: Los que se santifican y se purifican para entrar en los jardines[a], siguiendo a uno en medio, comiendo carne de cerdo y cosas detestables y ratones, perecerán juntos, declara Yahvé.
  revised_footnotes:
