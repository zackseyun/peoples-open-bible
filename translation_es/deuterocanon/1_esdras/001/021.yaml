translation:
  language: es
  text: Y las acciones de Josías fueron rectas delante de su Señor, con un corazón lleno de piedad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ''devoción'' o ''reverencia''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὠρθώθη
  english_pob_choice: were upright
  chosen_spanish: fueron rectas
  alternatives_spanish:
  - fueron puestas en orden
  - fueron establecidas como rectas
  - fueron enderezadas
  lexicon: LSJ
  rationale: El griego pasivo de ὀρθόω comunica que las obras de Josías quedaron/en resultaron rectas. En español, 'fueron rectas' conserva la evaluación moral sin forzar una perífrasis causal que no está explícita en el texto.
- source_word: τὰ ἔργα
  english_pob_choice: the deeds
  chosen_spanish: las acciones
  alternatives_spanish:
  - las obras
  - los hechos
  - las obras realizadas
  lexicon: LSJ
  rationale: Aquí ἔργα se refiere a la conducta concreta de Josías. 'Acciones' es natural en español y evita la posible resonancia técnica de 'obras' en contextos doctrinales.
- source_word: Ἰωσείου
  english_pob_choice: Josiah
  chosen_spanish: Josías
  alternatives_spanish:
  - Josias
  lexicon: equivalencia onomástica estándar
  rationale: Se usa la forma española usual y bíblica 'Josías', acorde con el paralelo hebreo y con el uso lectoral en español.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  - a los ojos de
  lexicon: LSJ
  rationale: '''Delante de'' conserva bien la idea relacional y evaluativa de estar bajo la mirada/juzgamiento de alguien, con un español bíblico claro y no arcaizante.'
- source_word: τοῦ κυρίου αὐτοῦ
  english_pob_choice: his Lord
  chosen_spanish: su Señor
  alternatives_spanish:
  - su Señor Dios
  - el Señor su Dios
  - su maestro
  lexicon: LSJ
  rationale: El griego dice literalmente 'su Señor' y no añade θεός. Por eso se mantiene 'Señor' sin expandirlo a 'Dios'; 'maestro' sería engañoso en este contexto.
- source_word: ἐν καρδίᾳ πλήρει
  english_pob_choice: with a heart full of
  chosen_spanish: con un corazón lleno de
  alternatives_spanish:
  - con el corazón lleno de
  - en un corazón lleno de
  lexicon: LSJ
  rationale: La frase es idiomática y describe la disposición interior que acompaña las acciones de Josías. 'Con un corazón lleno de' sigue de cerca la estructura griega y suena natural en español.
- source_word: εὐσεβείας
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - reverencia
  - piedad para con Dios
  lexicon: LSJ
  rationale: εὐσέβεια expresa piedad/devoción religiosa. 'Piedad' conserva el peso religioso del término y es una opción más sobria en español que 'devoción', sin perder el matiz de reverencia ante Dios.
theological_decisions:
- issue: Si πρέπει expandir κύριος a 'Yahvé' o 'Señor Dios' por influencia del paralelismo hebreo
  english_pob_reading: his Lord
  chosen_spanish_reading: su Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  - su Señor Dios
  rationale: En este versículo la base primaria es el griego de 1 Esdras, que lee τοῦ κυρίου αὐτοῦ sin θεός. Aunque el paralelo hebreo apunta al nombre divino, aquí no hay base suficiente para sustituir el término por 'Yahvé'. Por ello se conserva 'Señor' de forma literal y sobria.
  doctrine_reference: Primacía de la fuente original; uso de Yahvé solo cuando el texto fuente lo sostenga directamente o cuando un equivalente indirecto esté claramente justificado
- issue: Cómo traducir εὐσέβεια sin reducirlo a mera moralidad
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - reverencia
  - devoción
  - temor de Dios
  rationale: El término no describe solo una cualidad ética general, sino una orientación religiosa hacia Dios. 'Piedad' mantiene esa densidad espiritual y evita diluir el sentido en una virtud genérica.
  doctrine_reference: Léxico de virtudes religiosas en el corpus deuterocanónico
- issue: Si 'rectas' debe reflejar una cualidad resultante o una acción hecha recta
  english_pob_reading: were upright
  chosen_spanish_reading: fueron rectas
  alternative_spanish_readings:
  - quedaron rectas
  - fueron hechas rectas
  - fueron establecidas rectas
  rationale: La revisión inglesa reciente prefirió un valor más estativo. En español, 'fueron rectas' preserva ese valor sin introducir una causa implícita que el griego no explicita.
  doctrine_reference: Precisión aspectual y semántica en pasivos adjetivales griegos
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail inglés, que ajustó la idea de 'were made upright' a un sentido más estativo ('were upright'). Por eso se evitó una perífrasis causal en español y se optó por una formulación simple y directa. También se respetó la tensión documentada entre el griego κύριος y el paralelismo hebreo, sin expandir el término a 'Yahvé'.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριος, coherente con la política del proyecto cuando el griego no explicita θεός.
  - Se prefirió 'piedad' para εὐσέβεια por ser más exacto que una simple 'virtud' o 'religiosidad'.
  - La estructura 'con un corazón lleno de' conserva el giro idiomático sin sonar calcada en exceso.
  - 'Los nombres propios se adaptaron al uso bíblico estándar en español: Josías.'
