  to: Hizo para él cuatro anillos de oro en sus cuatro apoyos[a], con dos anillos en un lado y dos anillos en el otro lado[b].
  rationale: Se ajusta יצק a una expresión española que comunica fabricación más que simple derretimiento, se reemplaza «para ello» por «para él» para una referencia más natural al altar, y se corrige la nota b para reflejar mejor la literalidad hebrea documentada en el POB inglés. Se conserva «apoyos» como opción principal por la ambigüedad léxica, mientras la nota preserva «pies/esquinas/soportes».
