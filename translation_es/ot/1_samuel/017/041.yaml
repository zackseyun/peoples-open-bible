translation:
  language: es
  text: Y el filisteo venía[a], acercándose a David, con el hombre que llevaba el escudo[b] delante de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «avanzaba, yendo y acercándose a David». El hebreo usa un verbo finito seguido de participios para presentar un movimiento continuo hacia adelante.
    reason: lexical_alternative
  - marker: b
    text: La palabra hebrea para «escudo» (צִנָּה) puede referirse específicamente a un escudo grande.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֵּלֶךְ
  english_pob_choice: came on
  chosen_spanish: venía
  alternatives_spanish:
  - avanzaba
  - iba
  - se acercó
  lexicon: HALOT
  rationale: El hebreo usa un verbo finito seguido de participios para describir un movimiento continuo y hostil hacia el rival. «Venía» conserva el avance progresivo sin sobrecargar el español con una paráfrasis excesiva.
- source_word: הַפְּלִשְׁתִּי
  english_pob_choice: the Philistine
  chosen_spanish: el filisteo
  alternatives_spanish:
  - el filisteo guerrero
  - el campeón filisteo
  lexicon: HALOT
  rationale: El término es una designación étnica definida. «El filisteo» refleja el referente del relato sin introducir «campeón», que no está en este versículo.
- source_word: הֹלֵךְ וְקָרֵב
  english_pob_choice: coming closer
  chosen_spanish: acercándose
  alternatives_spanish:
  - y acercándose
  - avanzando y acercándose
  - aproximándose
  lexicon: HALOT
  rationale: La secuencia participial intensifica la acción de avanzar y acercarse. En español, el gerundio «acercándose» reproduce bien la continuidad del movimiento.
- source_word: אֶל דָּוִד
  english_pob_choice: to David
  chosen_spanish: a David
  alternatives_spanish:
  - hacia David
  - contra David
  lexicon: HALOT
  rationale: La preposición אֶל marca dirección hacia David. «A David» es la forma más directa y natural en español, sin perder la orientación del movimiento.
- source_word: וְהָאִישׁ
  english_pob_choice: with the man
  chosen_spanish: y el hombre
  alternatives_spanish:
  - con el hombre
  - y el hombre
  lexicon: HALOT
  rationale: Aunque el POB inglés resuelve la relación como acompañamiento, en español la coordinación simple con la cláusula siguiente mantiene el flujo narrativo. El sentido se completa con «iba delante de él» y el contexto del portador del escudo.
- source_word: נֹשֵׂא הַצִּנָּה
  english_pob_choice: carrying the shield
  chosen_spanish: que llevaba el escudo
  alternatives_spanish:
  - portando el escudo
  - llevando el escudo
  - que portaba el escudo
  lexicon: HALOT
  rationale: נשא significa cargar o llevar. «Que llevaba el escudo» es una construcción natural en español y preserva la función descriptiva del participio. Se mantiene «escudo» sin añadir «grande» en el texto principal, aunque el término hebreo puede implicar un escudo grande.
- source_word: לְפָנָיו
  english_pob_choice: before him
  chosen_spanish: iba delante de él
  alternatives_spanish:
  - delante de él
  - ante él
  lexicon: HALOT
  rationale: La expresión indica posición frontal respecto del filisteo. «Iba delante de él» comunica de manera clara y narrativa la relación espacial y el papel del escudero.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente los marcadores [a] y [b] en el texto español, sin cambiar el sentido básico del versículo. La redacción sigue el análisis hebreo del movimiento progresivo y del portador del escudo.
  spanish_consistency_notes:
  - Se mantuvo «filisteo» sin ampliar a «campeón», conforme al referente del hebreo y al POB inglés.
  - Se evitó «SEÑOR» o vocabulario teológico ajeno porque el versículo no contiene nombres divinos.
  - «Escudo» se dejó sin adjetivo en el texto principal, siguiendo la cautela del POB inglés; la posible especificidad de un escudo grande queda implícita en la nota si se desea consultarla.
