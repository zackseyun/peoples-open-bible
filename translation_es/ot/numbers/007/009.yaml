translation:
  language: es
  text: Pero a los hijos de Coat no les dio nada[a], porque sobre ellos estaba el servicio de las cosas sagradas; debían llevarlas sobre el hombro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Porque el servicio del santuario estaba sobre ellos; debían llevarlo sobre el hombro». El hebreo probablemente se refiere específicamente a los objetos sagrados confiados a los coatitas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/לִ/בְנֵי קְהָת
  english_pob_choice: But to the sons of Kohath
  chosen_spanish: Pero a los hijos de Coat
  alternatives_spanish:
  - Y a los hijos de Coat
  - Mas a los hijos de Coat
  - Pero a los descendientes de Coat
  lexicon: HALOT
  rationale: El hebreo introduce contraste con la entrega previa a otros clanes levíticos; por eso "Pero" refleja bien la función de וְ en contexto. "Hijos de Coat" conserva la designación clánica tradicional y es natural en español bíblico. "Coat" sigue la forma habitual del nombre propio en español.
- source_word: לֹא נָתָן
  english_pob_choice: he gave none
  chosen_spanish: no les dio nada
  alternatives_spanish:
  - no dio
  - no les dio
  - no les dio nada
  lexicon: HALOT
  rationale: El verbo negado se refiere al contexto inmediato de los carros y bueyes que no fueron asignados a este clan. "No les dio nada" expresa de forma natural la ausencia de esa entrega y mantiene la idea de que no recibieron ningún vehículo ni animal.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: HALOT
  rationale: Introduce la razón de la omisión. "Porque" es claro y directo en español moderno, y conserva la relación causal del hebreo.
- source_word: עֲבֹדַת הַקֹּדֶשׁ
  english_pob_choice: the service of the holy things
  chosen_spanish: el servicio de las cosas sagradas
  alternatives_spanish:
  - el servicio del santuario
  - el servicio sagrado
  - el servicio de las cosas santas
  lexicon: HALOT
  rationale: La evidencia inmediata apunta a los objetos sagrados que los coatitas debían transportar, no al santuario como lugar abstracto. "Cosas sagradas" preserva esa referencia concreta mejor que "santuario" y evita suavizar el sustantivo hebreo hacia una formulación más general.
- source_word: עֲלֵיהֶם
  english_pob_choice: was upon them
  chosen_spanish: estaba sobre ellos
  alternatives_spanish:
  - les estaba asignado
  - recaía sobre ellos
  - estaba sobre ellos
  lexicon: HALOT
  rationale: Se mantiene la imagen idiomática de carga u obligación "sobre" ellos. En español, "estaba sobre ellos" conserva el peso de responsabilidad sin convertirlo en una explicación interpretativa.
- source_word: בַּכָּתֵף
  english_pob_choice: on the shoulder
  chosen_spanish: sobre el hombro
  alternatives_spanish:
  - en el hombro
  - al hombro
  - sobre el hombro
  lexicon: HALOT
  rationale: El hebreo usa el singular colectivo; en español, "sobre el hombro" reproduce bien la imagen de transporte físico y suena más natural que forzar el plural.
- source_word: יִשָּׂאוּ
  english_pob_choice: they were to carry them
  chosen_spanish: las habían de llevar
  alternatives_spanish:
  - las debían llevar
  - las llevarían
  - las tenían que llevar
  lexicon: HALOT
  rationale: El imperfecto expresa deber u obligación. "Habían de llevar" conserva ese valor normativo con un tono bíblico claro y no excesivamente arcaico. Se usa "las" porque el antecedente son las cosas sagradas/objetos sagrados implícitos en el contexto.
theological_decisions:
- issue: '¿Qué significa הַקֹּדֶשׁ en este contexto: santuario o cosas sagradas?'
  english_pob_reading: The Hebrew likely refers specifically to the holy objects entrusted to the Kohathites.
  chosen_spanish_reading: Se refiere específicamente a las cosas sagradas que se les habían confiado a los coatitas.
  alternative_spanish_readings:
  - se refiere al santuario en general
  - se refiere al servicio sagrado
  rationale: La carga de la frase está determinada por el contexto inmediato de Números 7, donde a los coatitas les correspondía transportar objetos sagrados. Por eso se evita una abstracción como "santuario" si puede oscurecer el referente concreto. La formulación española mantiene esa tensión interpretativa sin eliminarla.
  doctrine_reference: Números 7:9; Números 4:4-15
translation_notes:
  revision_awareness: Se verificó el pasaje con el texto hebreo consonante/vocalizado y con el auditorial inglés de la POB; no se requirieron revisiones al sentido base. La principal decisión fue mantener la referencia concreta de הַקֹּדֶשׁ y la obligación implícita del verbo en un español natural pero auditables.
  spanish_consistency_notes:
  - Se usa "Yahvé" como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene "Coat" como nombre propio consagrado por uso bíblico en español.
  - '"Cosas sagradas" preserva la concreción del hebreo y evita sustituirla por una paráfrasis más abstracta.'
