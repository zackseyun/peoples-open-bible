lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le habló
  - dijo
  lexicon: BDAG
  rationale: El aoristo de λέγω se expresa naturalmente en español con «dijo». Como el griego marca destinatario con dativo, «le dijo» conserva la relación directa con el complemento indirecto.
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ funciona aquí como enlace narrativo suave. «Entonces» reproduce bien el avance de la escena sin cargar contraste que el contexto no exige.
- source_word: αὐτῇ
  english_pob_choice: to her
  chosen_spanish: a ella
  alternatives_spanish:
  - le
  lexicon: BDAG
  rationale: El dativo indica el destinatario de la palabra. En español, «a ella» es claro y mantiene explícita la dirección del habla; «le» también sería idiomático, pero «a ella» preserva la referencia pronominal sin ambigüedad.
- source_word: Ἀφέωνταί
  english_pob_choice: are forgiven
  chosen_spanish: son perdonados
  alternatives_spanish:
  - han sido perdonados
  - quedan perdonados
  lexicon: BDAG
  rationale: El perfecto pasivo de ἀφίημι expresa un acto concluido con resultado presente. «Son perdonados» comunica bien ese estado resultante en español, mientras que «han sido perdonados» haría más explícito el perfecto pero sonaría menos natural en una declaración directa.
- source_word: σου
  english_pob_choice: your
  chosen_spanish: tus
  alternatives_spanish:
  - de ti
  lexicon: BDAG
  rationale: El genitivo posesivo se traduce con el posesivo natural en español. «Tus» encaja con el tono directo del pronunciamiento.
- source_word: αἱ ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - ofensas
  lexicon: BDAG
  rationale: ἁμαρτίαι designa pecados en sentido moral y ante Dios. «Pecados» es la equivalencia más directa y precisa en español; «faltas» u «ofensas» suavizarían el peso lexical del término.
theological_decisions:
- issue: Fuerza del perfecto pasivo en una declaración de perdón
  english_pob_reading: 'Render as a present-result declaration: ''Your sins are forgiven.'''
  chosen_spanish_reading: «Tus pecados son perdonados»
  alternative_spanish_readings:
  - «Tus pecados han sido perdonados»
  - «Tus pecados quedan perdonados»
  rationale: El griego perfecto pasivo puede destacar tanto la acción ya cumplida como el estado presente derivado de ella. La forma elegida en español conserva la declaración de perdón como realidad presente, sin resolver en exceso el matiz temporal ni añadir explicación ajena al texto.
  doctrine_reference: Preservar la tensión teológica entre acto consumado y estado presente resultante.
translation_notes:
  revision_awareness: El expediente inglés presenta alta concordancia y no registra revisiones aplicadas; la redacción española sigue ese mismo perfil estable, manteniendo la tensión del perfecto pasivo sin expandirla con interpretación adicional.
  spanish_consistency_notes:
  - Se mantuvo «pecados» para ἁμαρτίαι, en armonía con el valor moral del término en el contexto.
  - Se eligió «perdonados» para Ἀφέωνταί, evitando sustituir el valor verbal por una glosa explicativa.
  - La nota al pie conserva la alternativa formal del inglés para reflejar el matiz del perfecto pasivo.
  - «Entonces» reproduce el conector narrativo δέ con fluidez natural en español.
