  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional, el modismo «en tu corazón», el comparativo «estas naciones… más numerosas», y la pregunta de capacidad. Sin embargo, la nota al pie no preserva la alternativa léxica clave documentada por el POB inglés para לְהוֹרִישָׁם; en cambio, añade una nota no necesaria sobre «en tu corazón».
  spanish_quality_summary: El español es claro y natural. No obstante, «más numerosas que yo» suena menos idiomático en español porque compara naciones con una sola persona; es comprensible, pero «más numerosas que nosotros» expresa mejor el sentido en español sin cambiar la referencia discursiva de Israel representado por el singular. Aun así, para una reparación mínima y más estricta al hebreo singular, se puede conservar la comparación singular y corregir solamente la nota al pie. «Desposeerlas» es fiel pero requiere la nota alternativa ya documentada.
  glossary_alignment: 'No hay términos del glosario principal en conflicto. «Naciones» para גּוֹיִם y «desposeerlas» para לְהוֹרִישָׁם concuerdan con la racionalidad léxica del proyecto. La principal desalineación está en las notas: falta la alternativa «expulsarlas»/«echarlas» para el verbo de posesión, que sí está respaldada por el expediente inglés.'
  issues:
  - severity: medium
    issue: La nota al pie está anclada a «en tu corazón» en lugar de al verbo «desposeerlas».
    rationale: El expediente inglés preserva como alternativa relevante «drive them out» para לְהוֹרִישָׁם, con explicación sobre pérdida de posesión de la tierra. La nota actual sobre «dentro de tu corazón» no es necesaria y desplaza una alternativa semántica más importante.
  - severity: low
    issue: La comparación «más numerosas que yo» es algo tensa en español.
    rationale: Es formalmente cercana al hebreo singular, pero en español puede sonar extraña al comparar pueblos con una persona. No impide la comprensión ni exige adjudicación compleja; puede dejarse en una revisión mínima.
  revised_spanish_text: 'Si dices en tu corazón: «Estas naciones son más numerosas que yo; ¿cómo podré desposeerlas[a]?»'
  revised_footnotes:
  - marker: a
    text: O «expulsarlas». El verbo hebreo también tiene el sentido de hacer que pierdan la posesión de la tierra.
    reason: lexical_alternative
