    rationale: El expediente inglés documenta una alternativa léxica para ἐμφανισμός, no para «the high priest of the city». La nota actual desvía la atención del verdadero punto de decisión textual.
  - severity: medium
    issue: La nota al pie actual introduce una justificación poco útil sobre «de la ciudad».
    rationale: No preserva la alternativa auditada y añade una explicación interpretativa que no hace falta para el español ni para el sentido del griego.
