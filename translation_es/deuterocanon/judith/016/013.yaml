translation:
  language: es
  text: Cantaré a mi Dios un himno nuevo[a]. Señor, grande eres y glorioso, admirable en poder, insuperable[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un cántico nuevo». El griego dice ὕμνον καινόν, más específicamente «un himno nuevo», es decir, un canto de alabanza.
    reason: lexical_alternative
  - marker: b
    text: O «incomparable» o «invencible». El griego ἀνυπέρβλητος significa que no puede ser superado ni vencido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμνήσω
  english_pob_choice: I will sing
  chosen_spanish: Cantaré
  alternatives_spanish:
  - Cantaré alabanzas
  - Entonaré
  lexicon: BDAG
  rationale: El futuro de ὑμνέω expresa aquí una acción de alabanza por medio del canto. En español, 'cantaré' comunica de manera natural la idea sin volver rígida la construcción. El matiz de alabanza queda reforzado por el objeto 'un himno nuevo'.
- source_word: τῷ θεῷ μου
  english_pob_choice: to my God
  chosen_spanish: a mi Dios
  alternatives_spanish:
  - a Dios mío
  - a mi Dios,
  - mi Dios
  lexicon: BDAG
  rationale: El dativo con ὑμνήσω señala el destinatario de la alabanza. 'A mi Dios' refleja esa relación de dirección de modo claro y fluido en español.
- source_word: ὕμνον καινόν
  english_pob_choice: a new hymn
  chosen_spanish: un himno nuevo
  alternatives_spanish:
  - una canción nueva
  - un nuevo cántico
  lexicon: BDAG
  rationale: ὕμνος es más específico que 'song'; 'himno' conserva mejor el valor de canto de alabanza. 'Nuevo' mantiene el adjetivo καινόν sin desplazar el sustantivo a una formulación más general.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Oh Yahvé
  lexicon: BDAG
  rationale: Aunque el texto griego usa Κύριε, el contexto litúrgico y la tradición de la obra apuntan a una referencia al nombre divino. En este proyecto, יהוה/YHWH se rinde como 'Yahvé'; aquí se prefiere esa forma por consistencia con el nombre de Dios en la alabanza directa.
- source_word: μέγας
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - mighty
  - excelso
  lexicon: BDAG
  rationale: '''Grande'' reproduce de forma directa la afirmación de magnitud y majestad. Es la opción más natural y fiel para el elogio del versículo.'
- source_word: ἔνδοξος
  english_pob_choice: glorious
  chosen_spanish: glorioso
  alternatives_spanish:
  - ilustre
  - honroso
  lexicon: BDAG
  rationale: En un contexto doxológico, 'glorioso' expresa apropiadamente la idea de esplendor y honor divinos.
- source_word: θαυμαστὸς
  english_pob_choice: marvelous
  chosen_spanish: admirable
  alternatives_spanish:
  - maravilloso
  - asombroso
  lexicon: BDAG
  rationale: El término indica aquello que provoca admiración y asombro. 'Admirable' funciona bien en registro de alabanza y no pierde la fuerza del elogio.
- source_word: ἐν ἰσχύι
  english_pob_choice: in strength
  chosen_spanish: en poder
  alternatives_spanish:
  - en fuerza
  - con poder
  lexicon: BDAG
  rationale: '''ἰσχύς'' puede traducirse como ''fuerza'' o ''poder''. En este contexto, ''en poder'' comunica con claridad la capacidad divina sin sonar mecánico; además, mantiene la relación con la cláusula final sobre la imposibilidad de superar a Dios.'
- source_word: ἀνυπέρβλητος
  english_pob_choice: unsurpassable
  chosen_spanish: insuperable
  alternatives_spanish:
  - incomparable
  - invencible
  lexicon: LSJ
  rationale: El adjetivo expresa que no puede ser sobrepasado. 'Insuperable' conserva con precisión la fuerza de 'unsurpassable' sin limitar el sentido al ámbito militar.
theological_decisions:
- issue: Tratamiento de Κύριε en el griego frente al nombre divino en la tradición POB
  english_pob_reading: Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - Oh Yahvé
  rationale: Aunque el griego dice Κύριε, el verso es una doxología dirigida a Dios y encaja con la convención del proyecto de usar 'Yahvé' para el nombre divino. Se evita 'Señor' como máscara automática para no ocultar la referencia nominal.
  doctrine_reference: 'DOCTRINE.md: יהוה/YHWH → Yahvé; κύριος puede reflejar esa referencia en contexto de cita o alusión.'
translation_notes:
  revision_awareness: 'El audit trail inglés mantiene ''a new hymn'' frente a la alternativa ''a new song'' y explica ἀνυπέρβλητος como ''unsurpassable'', con posibles matices de ''invincible'' / ''incomparable''. La versión española conserva ese contraste: ''himno nuevo'' y ''insuperable'', con notas que preservan las alternativas semánticas.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' por la convención del proyecto para יהוה/YHWH, aunque el griego presente Κύριε; esto se registra como decisión teológica y de consistencia terminológica.
  - '''Himno'' se mantuvo para reflejar ὕμνος y no diluirlo en ''cántico'' o ''canción''.'
  - '''Insuperable'' conserva la amplitud de ἀνυπέρβλητος sin restringirlo a ''invencible''.'
