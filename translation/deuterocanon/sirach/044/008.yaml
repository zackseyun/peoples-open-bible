theological_decisions:
- issue: Memorial language of 'name' and 'inheritance'
  chosen_reading: Render concretely as 'a name' and 'inheritance' rather than abstracting fully to 'fame' and 'posterity.'
  alternative_readings:
  - Some left behind renown, so that their praises might be recounted by their descendants.
  - Some left a reputation to be celebrated in their heritage.
  rationale: This verse is not a doctrinal crux, but it does use biblically loaded memorial language. The chosen rendering preserves that texture while remaining readable. The Greek parallel supports the praise/recounting idea, but the Hebrew remains primary.
  doctrine_reference: Translation philosophy §§1, 5, 6
