  rationale: Se reubica la nota al verbo/frase que realmente explica el hebreo subyacente, se mejora la naturalidad de בְּעֵינֵי con «ante los ojos de», y se suaviza el inicio narrativo quitando el pronombre sujeto innecesario. Estos cambios preservan mejor el sentido fuente y el estilo español del proyecto.
