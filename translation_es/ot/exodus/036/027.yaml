translation:
  language: es
  text: Y para la parte posterior del tabernáculo[a], hacia el oeste, hizo seis bastidores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tablas'. El término hebreo puede referirse a tablas, tablones o elementos estructurales; 'bastidores' se elige aquí porque puede ajustarse mejor a la construcción del tabernáculo.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּלְיַרְכְּתֵי
  english_pob_choice: and for the rear of
  chosen_spanish: y para la parte posterior de
  alternatives_spanish:
  - y para el fondo de
  - y para la parte trasera de
  lexicon: HALOT
  rationale: יַרְכְּתֵי expresa la zona más remota o posterior; en este contexto constructivo, 'parte posterior' comunica bien el sentido direccional sin perder la referencia arquitectónica. Se conserva el valor de introducción con 'y para'.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - el santuario
  lexicon: HALOT
  rationale: En Éxodo, מִשְׁכָּן nombra la estructura cultual; 'tabernáculo' es el equivalente español establecido y fiel al contexto.
- source_word: יָמָּה
  english_pob_choice: westward
  chosen_spanish: hacia el oeste
  alternatives_spanish:
  - al occidente
  - en dirección al mar
  lexicon: HALOT
  rationale: La forma direccional hebrea funciona idiomáticamente como 'occidente / oeste'. 'Hacia el oeste' es natural en español y conserva la orientación espacial.
- source_word: עָשָׂה
  english_pob_choice: he made
  chosen_spanish: hizo
  alternatives_spanish:
  - construyó
  - fabricó
  lexicon: HALOT
  rationale: El verbo básico עשה se traduce de manera directa como 'hizo'. En una descripción técnica de la construcción, mantiene el estilo sobrio del hebreo.
- source_word: שִׁשָּׁה
  english_pob_choice: six
  chosen_spanish: seis
  lexicon: HALOT
  rationale: Número cardinal directo, sin tensión semántica.
- source_word: קְרָשִׁים
  english_pob_choice: frames
  chosen_spanish: marcos
  alternatives_spanish:
  - tablas
  - tablones
  lexicon: HALOT
  rationale: La POB inglesa opta por 'frames' para reflejar mejor la función estructural de קְרָשִׁים. En español, 'marcos' comunica con claridad el elemento de soporte estructural y evita la idea de simples tablas planas.
theological_decisions:
- issue: Referencia direccional y terminología del tabernáculo
  english_pob_reading: Rear of the tabernacle, westward
  chosen_spanish_reading: Parte posterior del tabernáculo, hacia el oeste
  alternative_spanish_readings:
  - fondo del tabernáculo, al occidente
  - parte trasera del tabernáculo, al oeste
  rationale: No hay decisión doctrinal controvertida; la elección preserva la orientación espacial del texto y el término cultual tradicional sin introducir paráfrasis.
  doctrine_reference: Éxodo 26–40; descripción de la morada sagrada
- issue: Traducción de קְרָשִׁים en el contexto de la tienda sagrada
  english_pob_reading: frames
  chosen_spanish_reading: marcos
  alternative_spanish_readings:
  - tablas
  - tablones
  rationale: La elección evita una traducción tradicional que podría sugerir simple madera plana, mientras conserva la función estructural del elemento descrito. No hay implicación doctrinal, solo precisión material.
  doctrine_reference: Éxodo 26:15-30; descripción constructiva del tabernáculo
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto hebreo y el audit trail inglés: mantiene la localización ''hacia el oeste'', evita ampliar ''rear'' a ''rear sides'', y conserva la decisión lexical de un término estructural para קְרָשִׁים, pero adaptado al español con ''marcos''.'
  spanish_consistency_notes:
  - Se usa 'tabernáculo' de manera uniforme para מִשְׁכָּן.
  - Se evita 'Señor' o sustitutos reverenciales porque no aparecen en este versículo.
  - La nota [a] está anclada explícitamente en 'marcos' dentro del texto.
