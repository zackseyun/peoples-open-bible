- from: desde el seguir a las ovejas que amamantaban lo trajo[a], para pastorear a Jacob, su pueblo, e Israel, su herencia[b].
  to: de detrás de las ovejas que crían lo trajo[a], para pastorear a Jacob su pueblo, e Israel su herencia[b].
  rationale: La revisión corrige un calco poco natural ('desde el seguir a') por una expresión idiomática que sí refleja el hebreo מֵאַחַר, y mejora la naturalidad de עָלוֹת con 'ovejas que crían'. Se conserva la imagen pastoral explícita, el paralelismo Jacob/Israel y la nota sobre 'herencia'.
