translation:
  language: es
  text: El terror de un rey es como el gruñido de un león joven[a]; quien provoca su ira[b] peca contra su propia vida[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el rugido de un león joven».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el que lo provoca»; el sentido es provocar la ira del rey.
    reason: lexical_alternative
  - marker: c
    text: O «peca contra sí mismo» o «contra su alma»; נֶפֶשׁ puede significar «vida», «ser» o «alma» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַהַם
  english_pob_choice: growling
  chosen_spanish: rugido
  alternatives_spanish:
  - gruñido
  - rugido
  lexicon: HALOT
  rationale: El hebreo designa el sonido amenazante emitido por un león. En español, «rugido» comunica con naturalidad la imagen sonora fuerte y aterradora; «gruñido» suena más débil o menos leonino en este contexto sapiencial.
- source_word: כְּפִיר
  english_pob_choice: young lion
  chosen_spanish: leoncillo
  alternatives_spanish:
  - león joven
  - leoncillo
  lexicon: HALOT
  rationale: כְּפִיר suele referirse a un león joven, con fuerza y peligro. «Leoncillo» conserva la idea de juventud y resulta natural en español; «león joven» es más literal pero menos idiomático.
- source_word: אֵימַת מֶלֶךְ
  english_pob_choice: terror of a king
  chosen_spanish: el terror de un rey
  alternatives_spanish:
  - el temor de un rey
  - el pavor de un rey
  lexicon: HALOT
  rationale: La construcción expresa el efecto temible que produce el rey. «Terror» mantiene la intensidad del sustantivo y el carácter proverbial de la advertencia; «temor» sería más débil.
- source_word: מִתְעַבְּרוֹ
  english_pob_choice: whoever provokes him to anger
  chosen_spanish: el que lo provoca a ira
  alternatives_spanish:
  - quien lo enciende en ira
  - quien lo irrita
  lexicon: HALOT
  rationale: El hitpael con sufijo pronominal se entiende como provocar o despertar la ira del rey. En español, «lo provoca a ira» conserva la relación causal y evita una paráfrasis más libre.
- source_word: חוֹטֵא
  english_pob_choice: sins
  chosen_spanish: peca
  alternatives_spanish:
  - peca
  - hace mal
  lexicon: HALOT
  rationale: El participio mantiene lenguaje moral, no solo práctico. «Peca» conserva el peso ético del hebreo mejor que una reducción a consecuencia o peligro.
- source_word: נַפְשׁוֹ
  english_pob_choice: his own life
  chosen_spanish: su propia vida
  alternatives_spanish:
  - su vida
  - él mismo
  - su alma
  lexicon: HALOT
  rationale: En literatura sapiencial, נֶפֶשׁ puede significar vida, ser o yo. Aquí el sentido apunta al riesgo mortal; «su propia vida» preserva la fuerza reflexiva y la concreción del hebreo.
translation_notes:
  revision_awareness: 'Alineado con el audit trail inglés: se mantiene la imagen del león joven, la intensidad de אֵימַת como «terror», el matiz moral de חוֹטֵא como «peca» y el valor contextual de נֶפֶשׁ como «vida». No se requieren revisiones adicionales según el último pass auditado.'
  spanish_consistency_notes:
  - Se preserva «rey» sin sustituirlo por una fórmula reverencial más interpretativa.
  - Se mantiene el registro sapiencial sobrio y proverbial, sin amplificar la advertencia más allá del hebreo.
  - Las notas reproducen las alternativas documentadas en el POB inglés y aclaran la ambigüedad de נֶפֶשׁ en español.
