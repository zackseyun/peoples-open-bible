    text: Or 'calamity'; Hebrew 'the evil/disaster.' In this judgment context the word refers to punitive disaster, not moral evil.
    reason: lexical_alternative
  - marker: b
    text: '''On his house'' can mean on his household or dynasty.'
    reason: lexical_alternative
