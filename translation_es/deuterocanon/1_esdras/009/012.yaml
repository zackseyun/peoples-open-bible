review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido general del griego y sigue de cerca la auditoría inglesa: la elipsis temporal de οὐδὲ δύο, la fuerza moral de ἡμάρτομεν, la función administrativa de στήτωσαν / παραγενηθήτωσαν, y el sentido programado de λαβόντες χρόνου. Sin embargo, hay dos desajustes de fidelidad léxica y una mejora de naturalidad importante: (1) γυναῖκας ἀλλογενεῖς se refiere a ''mujeres/esposas extranjeras'' en contexto matrimonial; en español ''tienen mujeres extranjeras'' puede sonar ambiguo o impropio, por lo que conviene ''tienen esposas extranjeras''. (2) οἱ ἐκ τῶν κατοικιῶν ἡμῶν significa ''los de nuestras poblaciones/asentamientos'', no meramente ''los que están en nuestras poblaciones'', que puede sugerir presencia circunstancial. (3) ἐν τούτοις está mejor como ''en estos asuntos'' que ''en estas cosas'' para reflejar el valor contextual señalado en la auditoría inglesa.'
  spanish_quality_summary: El español es claro y digno, pero 'hemos pecado grandemente en estas cosas' suena algo calcado; 'en estos asuntos' es más natural y preciso. 'Que se pongan en pie los dirigentes de la multitud' es aceptable, aunque algo literal; puede mantenerse porque preserva la imagen de στήτωσαν. 'A un tiempo señalado' es comprensible, pero 'en un tiempo señalado' o 'a la hora señalada' sería más idiomático; aun así, no es un error grave. La reparación principal es mejorar la naturalidad y exactitud matrimonial/administrativa de 'mujeres extranjeras' y 'los que están en'.
  glossary_alignment: No hay términos del glosario maestro en juego como Yahvé/Mesías/Espíritu. La traducción de pecado mantiene correctamente la fuerza moral-teológica. El proyecto inglés eligió 'foreign wives'; por consistencia contextual, el español debe reflejar ese valor matrimonial con 'esposas extranjeras' aunque el griego use literalmente 'mujeres'.
  issues:
  - severity: medium
    issue: Ambigüedad en 'tienen mujeres extranjeras'
    rationale: En español moderno, esa frase puede sonar impropia o ambigua, como si se hablara de mujeres en general y no de esposas. Dado el contexto matrimonial y la auditoría inglesa ('foreign wives'), 'tienen esposas extranjeras' preserva mejor el sentido.
  - severity: medium
    issue: '''Los que están en nuestras poblaciones'' debilita el sentido de procedencia'
    rationale: οἱ ἐκ τῶν κατοικιῶν ἡμῶν señala a los que provienen de esas comunidades, no simplemente a quienes están allí en ese momento. 'Los de nuestras poblaciones' o 'los que son de nuestras poblaciones' es más fiel.
  - severity: low
    issue: '''En estas cosas'' suena menos natural que ''en estos asuntos'''
    rationale: La auditoría inglesa entendió ἐν τούτοις como referencia al asunto en discusión. 'Asuntos' comunica mejor esa referencia contextual en español eclesial legible.
  revised_spanish_text: ni siquiera en dos días[a], porque hemos pecado grandemente en estos asuntos. Pero que se pongan en pie los dirigentes[b] de la multitud, y que todos los de nuestras poblaciones[c] que tienen esposas extranjeras se presenten en un tiempo señalado[d].
  revised_footnotes:
