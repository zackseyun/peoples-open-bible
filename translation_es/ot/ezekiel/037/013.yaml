translation:
  language: es
  text: Entonces sabrán que yo soy Yahvé[a], cuando abra sus sepulcros y los haga subir de sus sepulcros[b], oh pueblo mío.
  philosophy: optimal-equivalence
  footnotes: &id001
  - marker: a
    text: O «el SEÑOR».
    reason: lexical_alternative
  - marker: b
    text: O «y los levante de sus sepulcros». El verbo hebreo literalmente significa «hacer subir» o «sacar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וִידַעְתֶּם
  english_pob_choice: Then you will know
  chosen_spanish: Entonces sabrán
  alternatives_spanish:
  - Y sabrán
  - Y conocerán
  lexicon: HALOT
  rationale: La forma con waw consecutiva en discurso profético expresa resultado o consecuencia futura; «Entonces» conserva ese valor consecutivo sin sonar rígido en español, y «sabrán» transmite bien el conocimiento reconocido en el contexto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene la transliteración del nombre divino según la convención del proyecto. «Yahvé» conserva el nombre personal revelado en el texto hebreo, en lugar de sustituirlo por un título.
- source_word: בְּפִתְחִי
  english_pob_choice: when I open
  chosen_spanish: cuando abra
  alternatives_spanish:
  - al abrir
  - cuando yo abra
  lexicon: HALOT
  rationale: La construcción con preposición más infinitivo y sufijo tiene valor temporal aquí. «Cuando abra» expresa de manera natural en español la relación temporal sin perder el sentido de acción dependiente del sujeto divino.
- source_word: קִבְרוֹתֵיכֶם
  english_pob_choice: your graves
  chosen_spanish: sus sepulcros
  alternatives_spanish:
  - sus tumbas
  - sus sepulcros
  lexicon: HALOT
  rationale: «Sepulcros» es una opción digna y clara en español bíblico para קברים. Se usó el pronombre de cortesía/plural de tercera persona «sus» para reproducir el trato directo del hebreo a la audiencia en español, sin perder referencia.
- source_word: וּבְהַעֲלוֹתִי
  english_pob_choice: and bring you up
  chosen_spanish: y los haga subir
  alternatives_spanish:
  - y los haga salir
  - y los levante
  lexicon: HALOT
  rationale: El hiphil de עלה tiene sentido causativo de «hacer subir/traer arriba». «Los haga subir» conserva la imagen concreta de movimiento ascendente y evita interpretar prematuramente la acción como mera metáfora o como una formulación teológica más específica.
- source_word: מִקִּבְרוֹתֵיכֶם
  english_pob_choice: from your graves
  chosen_spanish: de sus sepulcros
  alternatives_spanish:
  - de en medio de sus sepulcros
  - de sus tumbas
  lexicon: HALOT
  rationale: La preposición מן marca origen; en español, «de sus sepulcros» transmite ese punto de salida de manera directa y fluida, manteniendo la repetición del sustantivo para preservar la fuerza imagética del hebreo.
- source_word: עַמִּי
  english_pob_choice: my people
  chosen_spanish: oh pueblo mío
  alternatives_spanish:
  - pueblo mío
  - mi pueblo
  lexicon: HALOT
  rationale: Se reproduce la fuerza vocativa del hebreo con «oh», como marcó la revisión inglesa con «O my people». «Pueblo mío» mantiene la relación de pertenencia y alianza; la inversión evita una lectura demasiado plana de simple posesión.
theological_decisions:
- issue: Si la imagen de abrir sepulcros debe resolverse como restauración nacional o como resurrección corporal
  english_pob_reading: Retain the grave-opening and bringing-up language directly without interpretive narrowing
  chosen_spanish_reading: Conservar literalmente la imagen de abrir sepulcros y hacer subir de ellos, sin estrecharla hacia una sola lectura
  alternative_spanish_readings:
  - 'Nacionalizar el sentido: cuando los saque de su exilio'
  - Explicitar como resurrección corporal
  rationale: El hebreo usa lenguaje concreto y de fuerte resonancia sepulcral/resurreccional dentro de una visión de restauración. La traducción española retiene esa tensión en vez de decidirla de antemano, de modo que el lector perciba el alcance imagético y teológico del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés al conservar la vocación explícita en «oh pueblo mío»; además, adapta la convención inglesa de «Yahweh» a la terminología española del proyecto («Yahvé») y mantiene sin suavizar la imagen de sepulcros abiertos y del acto causativo de hacer subir. No se introdujo ninguna resolución interpretativa adicional sobre la naturaleza de la restauración.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como equivalente estándar del Tetragrama en el texto principal.
  - Se preservó la repetición de «sepulcros» para reflejar el paralelismo hebreo.
  - Se eligió una forma vocativa explícita («oh») para reflejar עַמִּי y la revisión inglesa.
  - Se evitó «SEÑOR» en el cuerpo del texto para no ocultar el nombre divino según la política del proyecto.
