revisions:
- from: 'Pero él dijo: «No pasarás». Entonces Edom salió a recibirlo con un pueblo numeroso[a] y con mano fuerte[b].'
  to: 'Pero él dijo: «No pasarás por aquí». Entonces Edom salió a su encuentro[a] con una gran multitud[b] y con mano fuerte[c].'
  rationale: La revisión corrige una connotación impropia en «a recibirlo», mejora la naturalidad de la expresión idiomática hebrea sobre la fuerza numérica, y hace más explícita la idea de paso por el territorio en la prohibición. También alinea las notas españolas con el aparato de alternativas conservado en el inglés POB, incluyendo la alternativa para לִקְרָאתוֹ y una nota separada para «mano fuerte».
