    rationale: La evidencia inglesa preserva la alternativa 'madreperla' u otro material de lujo. La nota española debería reflejar esa alternativa concreta, no solo una incertidumbre genérica.
  - severity: low
    issue: La nota [a] actual está anclada al verbo y no al punto de mayor necesidad textual
    rationale: Dado que 'comerciaba contigo' es preferible como texto principal, la nota sobre una alternativa verbal deja de ser necesaria, mientras que sí hacen falta notas en los términos de piedras/materiales inciertos.
