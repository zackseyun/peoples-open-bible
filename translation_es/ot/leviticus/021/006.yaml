translation:
  language: es
  text: Santos serán para su Dios, y no profanarán el nombre de su Dios,[a] porque ofrecen las ofrendas de alimento de Yahvé, el alimento de su Dios; por tanto, serán santos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «las ofrendas por fuego de Yahvé, el pan de su Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: קְדֹשִׁים
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - sagrados
  - consagrados
  - santos / apartados
  lexicon: HALOT
  rationale: En este contexto legal-cultual, el adjetivo expresa pertenencia y separación para Dios. 'Santos' mantiene la repetición temática de la santidad en el versículo y es natural en español bíblico sin perder la fuerza cultual.
- source_word: יִהְיוּ
  english_pob_choice: they shall be
  chosen_spanish: serán
  alternatives_spanish:
  - deberán ser
  - han de ser
  lexicon: HALOT
  rationale: El imperfecto en contexto normativo se vierte con futuro prescriptivo en español. 'Serán' conserva el tono declarativo e instrucional sin añadir obligación explícita que el hebreo no marca de forma directa.
- source_word: לֵאלֹהֵיהֶם
  english_pob_choice: to their God
  chosen_spanish: para su Dios
  alternatives_spanish:
  - a su Dios
  - de su Dios
  - pertenecientes a su Dios
  lexicon: HALOT
  rationale: La preposición ל expresa relación/dirección; en español, con 'santos', 'para su Dios' comunica bien la orientación de consagración. 'A su Dios' también sería posible, pero 'para' suena más natural en este marco de pertenencia cultual.
- source_word: יְחַלְּלוּ
  english_pob_choice: profane
  chosen_spanish: profanarán
  alternatives_spanish:
  - desecrarán
  - contaminarán
  - tratarán como común
  lexicon: HALOT
  rationale: El piel de חלל en contexto de santidad cultual se traduce mejor con 'profanar'. Mantiene el contraste sagrado/común central en Levítico y corresponde al valor elegido por la POB en inglés.
- source_word: שֵׁם אֱלֹהֵיהֶם
  english_pob_choice: the name of their God
  chosen_spanish: el nombre de su Dios
  alternatives_spanish:
  - el nombre de ellos, su Dios
  - el nombre de Dios de ellos
  lexicon: HALOT
  rationale: La construcción de estado constructo se conserva de manera directa. 'El nombre de su Dios' es la formulación más clara y solemne en español y reproduce el valor reverente del hebreo.
- source_word: אִשֵּׁי יְהוָה
  english_pob_choice: the food offerings of Yahweh
  chosen_spanish: las ofrendas encendidas de Yahvé
  alternatives_spanish:
  - las ofrendas por fuego de Yahvé
  - las ofrendas de fuego de Yahvé
  - las ofrendas hechas por fuego de Yahvé
  lexicon: HALOT
  rationale: אִשִּׁים se relaciona etimológicamente con fuego y designa ofrendas ígneas/quemadas. 'Ofrendas encendidas' conserva el vínculo con el fuego sin obligar a un giro más técnico que en español sería pesado; además permite mantener a Yahvé como nombre divino, según el estándar del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue el estándar del proyecto para יהוה: ''Yahvé''. Es la forma más establecida en el español bíblico de este proyecto y preserva el nombre propio del pacto en lugar de sustituirlo por un título.'
- source_word: לֶחֶם אֱלֹהֵיהֶם
  english_pob_choice: the food of their God
  chosen_spanish: el alimento de su Dios
  alternatives_spanish:
  - el pan de su Dios
  - la comida de su Dios
  lexicon: HALOT
  rationale: Aunque לֶחֶם puede ser literalmente 'pan', aquí el paralelismo cultual permite un sentido más amplio de alimento/sustento ofrecido en el rito. 'Alimento' evita estrechar el término a pan horneado y mantiene la relación con las ofrendas sacrificiales.
- source_word: מַקְרִיבִם
  english_pob_choice: they present
  chosen_spanish: ofrecen
  alternatives_spanish:
  - presentan
  - traen cerca
  - presentan como ofrenda
  lexicon: HALOT
  rationale: El participio hifil de קרב en contexto sacrificial puede expresarse naturalmente como 'ofrecer'. En español litúrgico y bíblico es la forma más clara para el acto de presentar ofrendas a Dios.
- source_word: וְהָיוּ קֹדֶשׁ
  english_pob_choice: therefore they shall be holy
  chosen_spanish: por tanto, santos serán
  alternatives_spanish:
  - y serán santos
  - así que santos serán
  - por eso serán santos
  lexicon: HALOT
  rationale: La cláusula final retoma la exigencia de santidad como conclusión del deber sacerdotal. 'Por tanto' explicita la relación lógica del hebreo y 'santos serán' mantiene la repetición enfática del inicio.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa el Tetragrama directamente. Conforme al estándar del proyecto, se transcribe como 'Yahvé' en vez de reemplazarlo por un título como 'Señor', preservando el nombre propio del Dios de Israel.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה / YHWH'
- issue: Expresión sacrificial אִשֵּׁי יְהוָה לֶחֶם אֱלֹהֵיהֶם
  english_pob_reading: the food offerings of Yahweh, the food of their God
  chosen_spanish_reading: las ofrendas encendidas de Yahvé, el alimento de su Dios
  alternative_spanish_readings:
  - las ofrendas por fuego de Yahvé, el pan de su Dios
  - las ofrendas de fuego de Yahvé, el alimento de su Dios
  rationale: 'La combinación hebrea une un término técnico de ofrenda por fuego con una referencia al ''pan/alimento'' de su Dios. La solución española conserva ambos polos: ''ofrendas encendidas'' para el valor cultual de fuego, y ''alimento'' para el sentido sacrificial amplio, evitando tanto la literalidad rígida como la pérdida del trasfondo ritual.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — optimal equivalence'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambiar la segmentación ni el sentido general. Esta versión mantiene la misma lectura que el texto auditado en inglés, pero la ajusta a un español fluido y fiel a los valores léxicos del hebreo, sin suavizar la tensión entre santidad, profanación y culto sacrificial.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יהוה conforme al estándar del proyecto.
  - Se conserva la repetición enfática de 'santos' al inicio y al final del versículo.
  - '''Profanar'' se usa para preservar el contraste técnico de santidad cultual.'
  - '''Ofrendas encendidas'' y ''alimento'' reflejan el doble valor sacrificial de אִשֵּׁי / לֶחֶם sin recurrir a una paráfrasis excesiva.'
