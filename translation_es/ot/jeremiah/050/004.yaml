revisions:
- from: En aquellos días y en aquel tiempo[a], declara Yahvé, vendrán los hijos de Israel, ellos y los hijos de Judá[b] juntos. Irán llorando, irán, y buscarán a Yahvé su Dios.
  to: En aquellos días y en aquel tiempo[a], declara Yahvé, vendrán los hijos de Israel[b], ellos y los hijos de Judá juntos. Yendo y llorando, irán[c], y buscarán a Yahvé su Dios.
  rationale: Se ajustó la nota sobre «hijos de Israel / hijos de Judá» para reflejar correctamente la alternativa documentada para ambos grupos, no solo para Judá. También se revisó la cláusula verbal a «Yendo y llorando, irán» para conservar mejor la repetición hebrea y mejorar la naturalidad en español. Se añadió una nota específica para esa repetición, siguiendo la auditoría inglesa.
