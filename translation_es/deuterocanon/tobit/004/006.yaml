    text: 'O: «tus hechos». El griego ἔργα puede referirse a obras, acciones o hechos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la justicia». Gr. δικαιοσύνη puede significar rectitud o justicia según el contexto; aquí resalta la conducta ética recta.'
    reason: lexical_alternative
  revision_rationale: Se mantiene la estructura lograda del borrador, pero se corrige δικαιοσύνην a «rectitud» para seguir la decisión lexical y teológica ya documentada por el POB inglés en este pasaje. «Justicia» se conserva como alternativa en nota. También se simplifica la nota sobre ἔργα para mejorar naturalidad y economía.
