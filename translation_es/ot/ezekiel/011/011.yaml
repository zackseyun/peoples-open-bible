translation:
  language: es
  text: No será para ustedes como una olla, ni ustedes estarán en medio de ella como carne[a]; en la frontera de Israel los juzgaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carne». El hebreo dice literalmente «carne», pero en esta metáfora de la olla se refiere a carne dentro de la olla.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְסִיר
  english_pob_choice: as a pot
  chosen_spanish: como una olla
  alternatives_spanish:
  - como una cazuela
  - como un caldero
  - como una olla de cocción
  lexicon: HALOT
  rationale: סִיר designa un recipiente de cocina; en español, «olla» comunica de forma natural la metáfora sin alejarse del valor léxico. «Caldero» o «cazuela» podrían sonar más marcados regionalmente o menos neutrales.
- source_word: בְתוֹכָהּ
  english_pob_choice: within it
  chosen_spanish: en medio de ella
  alternatives_spanish:
  - dentro de ella
  - en ella
  - en su interior
  lexicon: HALOT
  rationale: El hebreo expresa ubicación interna espacial. «En medio de ella» conserva mejor la imagen del contenido dentro del recipiente/metáfora urbana que un simple «dentro de ella».
- source_word: לְבָשָׂר
  english_pob_choice: as meat
  chosen_spanish: como carne
  alternatives_spanish:
  - como carne para comer
  - como carne de la olla
  - como carne
  lexicon: HALOT
  rationale: בָּשָׂר es literalmente «carne», y en esta metáfora del recipiente de cocina puede entenderse como carne en la olla. Mantener «carne» preserva la tensión léxica documentada sin forzar una aclaración interpretativa que el hebreo no añade.
- source_word: אֶל גְּב֥וּל יִשְׂרָאֵל
  english_pob_choice: at the border of Israel
  chosen_spanish: en el límite de Israel
  alternatives_spanish:
  - al límite de Israel
  - junto al límite de Israel
  - en la frontera de Israel
  lexicon: HALOT
  rationale: אֶל con גְּבוּל puede señalar destino o localización. «En el límite de Israel» suena natural en español y mantiene el matiz espacial/judicial del contexto sin especificar más de lo que el hebreo dice.
- source_word: אֶשְׁפֹּט אֶתְכֶם
  english_pob_choice: I will judge you
  chosen_spanish: los juzgaré
  alternatives_spanish:
  - los juzgaré a ustedes
  - pronunciaré juicio contra ustedes
  - los someteré a juicio
  lexicon: HALOT
  rationale: שׁפט aquí es judicial. El futuro simple español («los juzgaré») es conciso y fiel, y evita expandir el sentido a una paráfrasis innecesaria.
theological_decisions:
- issue: Imagen profética de Jerusalén como olla protectora invertida en juicio
  english_pob_reading: Retain the pot/meat imagery without interpretive expansion
  chosen_spanish_reading: Conservar la imagen de la olla y la carne sin explicarla más allá del texto
  alternative_spanish_readings:
  - Parafrasear como que Jerusalén no será su protección
  - Explicitar que la ciudad no les servirá de refugio
  rationale: La fuerza profética está en invertir el proverbio/imagen de seguridad. Mantener la metáfora permite que el juicio emerja del propio lenguaje del pasaje, sin sustituirlo por una explicación que suavice el efecto retórico.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y coincide en lo esencial con el audit trail inglés: mantiene la imagen de la olla, conserva la ambigüedad controlada de בָּשָׂר con una nota, y expresa el juicio final en términos judiciales directos. No se aplicaron revisiones posteriores al borrador inglés más allá de la adaptación idiomática al español.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - «Carne» preserva la tensión léxica del hebreo y evita sustituirla por un término culinario que eliminaría el eco literal.
  - «Juzgaré» mantiene el valor forense de שׁפט, sin convertirlo en una paráfrasis de castigo o gobernanza.
