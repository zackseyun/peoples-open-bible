    text: Or, more traditionally, 'the LORD of hosts.'
    reason: lexical_alternative
  - marker: b
    text: Or 'a treasured possession' or 'my special possession'; the Hebrew term denotes a specially valued possession belonging to a king or master.
    reason: lexical_alternative
  - marker: c
    text: The comparison is to a father sparing a son who serves him.
    reason: cultural_note
