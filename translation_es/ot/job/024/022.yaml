translation:
  language: es
  text: Pero arrastra a los poderosos con su poder; se alza[a], pero no tiene seguridad de seguir con vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se levanta». La cláusula final también puede entenderse: «y no confía en la vida» o «y no tiene seguridad de seguir con vida». El hebreo deja ambiguo el sujeto de la última cláusula.'
    reason: alternative_reading
lexical_decisions:
- source_word: וּמָשַׁךְ
  english_pob_choice: drags away
  chosen_spanish: arrastra
  alternatives_spanish:
  - lleva arrastrando
  - tira de
  - arrastra fuera
  lexicon: HALOT, BDB
  rationale: מָשַׁךְ expresa la idea básica de jalar o arrastrar. En este contexto, con אַבִּירִים como objeto, el sentido de violencia o de traslado forzado se conserva mejor con «arrastra» que con un verbo más débil o más interpretativo.
- source_word: אַבִּירִים
  english_pob_choice: the mighty
  chosen_spanish: los poderosos
  alternatives_spanish:
  - los fuertes
  - los valientes
  - los héroes
  lexicon: HALOT, BDB
  rationale: אַבִּירִים designa personas de fuerza, poder o prestigio. «Los poderosos» comunica bien la dimensión social de fuerza y autoridad que el inglés POB captó con «the mighty».
- source_word: בְּכֹחוֹ
  english_pob_choice: by his power
  chosen_spanish: con su fuerza
  alternatives_spanish:
  - por su poder
  - mediante su poder
  - con su poder
  lexicon: HALOT, BDB
  rationale: כֹּחַ significa fuerza o poder. La preposición instrumental admite en español «con» de manera natural; «con su fuerza» conserva la relación instrumental sin sonar tan abstracto como «por su poder».
- source_word: יָקוּם
  english_pob_choice: he rises up
  chosen_spanish: se alza
  alternatives_spanish:
  - se levanta
  - se pone en pie
  - se yergue
  lexicon: HALOT, BDB
  rationale: קוּם conserva la imagen de levantarse o ponerse en pie. «Se alza» mantiene el movimiento verbal y, en español bíblico actual, funciona bien para una acción de afirmación o surgimiento.
- source_word: וְלֹא יַאֲמִין בַּחַיִּין
  english_pob_choice: but he has no assurance of life
  chosen_spanish: no tiene seguridad de la vida
  alternatives_spanish:
  - no confía en la vida
  - no tiene confianza en la vida
  - no está seguro de la vida
  lexicon: HALOT, BDB
  rationale: El hebreo es sintácticamente ambiguo. El POB inglés conservó la tensión entre una lectura donde el sujeto sigue siendo el mismo y una lectura más impersonal. En español, «no tiene seguridad de la vida» expresa esa falta de confianza/certeza sin decidir en exceso el sujeto implícito.
theological_decisions:
- issue: Ambigüedad del sujeto en la cláusula final
  english_pob_reading: but he has no assurance of life
  chosen_spanish_reading: pero no tiene seguridad de la vida
  alternative_spanish_readings:
  - y no confía en la vida
  - y nadie tiene seguridad de la vida
  - pero él no confía en la vida
  rationale: 'El hebreo permite más de una relación sintáctica para la última cláusula. En lugar de resolver la ambigüedad de manera rígida, la versión española conserva la tensión: puede leerse con sujeto singular implícito o como una constatación general de inseguridad vital. Esto sigue la decisión del POB de no aplanar el problema.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa, que prefirió una lectura más cercana al singular («but he has no assurance of life») sin eliminar la ambigüedad básica del hebreo. La redacción española mantiene esa cercanía y conserva la tensión interpretativa en nota.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «los poderosos» para אַבִּירִים por coherencia con el valor social de fuerza/poder y con el registro bíblico en español.
  - La última cláusula evita una paráfrasis excesiva y conserva la incertidumbre sintáctica señalada por el POB inglés.
  - Se usó puntuación de estilo bíblico moderno en español, con punto y coma para reflejar las dos medias oraciones del hebreo.
