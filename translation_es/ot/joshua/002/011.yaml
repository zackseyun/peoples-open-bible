translation:
  language: es
  text: Cuando lo oímos[a], se nos derritieron los corazones, y no quedó ya espíritu en ningún hombre por causa de ustedes, porque Yahvé, su Dios[b], él es Dios en los cielos arriba y en la tierra abajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «no quedó ya valor en ningún hombre». El hebreo dice literalmente: «no quedó ya espíritu en ningún hombre».'
    reason: lexical_alternative
  - marker: b
    text: El hebreo tiene el nombre divino YHWH, aquí traducido como «Yahvé».
    reason: cultural_note
lexical_decisions:
- source_word: וַנִּשְׁמַע
  english_pob_choice: When we heard it
  chosen_spanish: Cuando lo oímos
  alternatives_spanish:
  - Y oímos
  - Cuando lo escuchamos
  lexicon: HALOT
  rationale: El imperfecto con waw consecutivo introduce la reacción en secuencia narrativa. «Cuando lo oímos» conserva el valor temporal y el objeto implícito del reporte previo, sin añadir información ajena.
- source_word: וַיִּמַּס לְבָבֵנוּ
  english_pob_choice: our hearts melted
  chosen_spanish: se nos derritió el corazón
  alternatives_spanish:
  - se nos derritieron los corazones
  - perdimos el ánimo
  lexicon: HALOT
  rationale: La imagen hebrea de «derretirse» se mantiene en español. En un habla natural, el singular colectivo «el corazón» comunica bien la expresión idiomática de miedo y desmayo interior.
- source_word: וְלֹא קָמָה עוֹד רוּחַ בְּאִישׁ
  english_pob_choice: no spirit remained in any man
  chosen_spanish: no quedó ya aliento en ningún hombre
  alternatives_spanish:
  - no quedó ya espíritu en ningún hombre
  - ya no hubo coraje en nadie
  lexicon: HALOT
  rationale: רוּחַ aquí puede abarcar aliento, ánimo o espíritu; la POB inglesa conserva la literalidad metafórica con nota. En español, «aliento» preserva la imagen corporal y permite la ambigüedad de fuerza interior sin confundirlo con el Espíritu Santo.
- source_word: מִפְּנֵיכֶם
  english_pob_choice: because of you
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - a causa de ustedes
  - ante ustedes
  lexicon: HALOT
  rationale: La preposición idiomática expresa causalidad, no localización. «Por causa de ustedes» comunica la razón del temor de forma clara y natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino personal con la forma española de uso amplio «Yahvé», coherente con el criterio POB de no sustituir el Tetragrama por un título. No se usa «SEÑOR» porque el texto fuente nombra explícitamente a YHWH.
- source_word: אֱלֹהֵיכֶם
  english_pob_choice: your God
  chosen_spanish: su Dios
  alternatives_spanish:
  - su Dios de ustedes
  - tu Dios
  lexicon: HALOT
  rationale: El hebreo es plural de segunda persona; en español neutro de trato reverente y plural, «su Dios» refleja la relación posesiva sin perder el referente comunitario de Israel.
- source_word: הוּא אֱלֹהִים
  english_pob_choice: he is God
  chosen_spanish: él es Dios
  alternatives_spanish:
  - él es el Dios verdadero
  - él es Dios mismo
  lexicon: HALOT
  rationale: La frase afirma identidad y supremacía de modo directo. «Él es Dios» evita añadir exclusividad no explícita y preserva la fuerza confesional del hebreo.
- source_word: בַּשָּׁמַיִם מִמַּעַל
  english_pob_choice: in the heavens above
  chosen_spanish: en los cielos arriba
  alternatives_spanish:
  - en el cielo arriba
  - en los cielos de lo alto
  lexicon: HALOT
  rationale: El plural hebreo שָׁמַיִם se vierte con «los cielos». «Arriba» conserva el paralelismo vertical del merismo con la frase siguiente.
- source_word: וְעַל הָאָרֶץ מִתָּחַת
  english_pob_choice: and on the earth below
  chosen_spanish: y en la tierra abajo
  alternatives_spanish:
  - y sobre la tierra abajo
  - y en la tierra debajo
  lexicon: HALOT
  rationale: La contraposición cielo/tierra se expresa con un paralelo simple y claro. «Abajo» reproduce la orientación vertical y el efecto totalizador del merismo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  - el SEÑOR
  rationale: La forma española «Yahvé» conserva el nombre propio del pacto sin la sustitución tradicional por un título. Se evita «el SEÑOR» porque el audit trail inglés ya decidió representar el Tetragrama de manera audible y transparente.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh; aplicado en español con la forma equivalente Yahvé'
- issue: Alcance de la confesión sobre la soberanía de Dios
  english_pob_reading: he is God in the heavens above and on the earth below
  chosen_spanish_reading: él es Dios en los cielos arriba y en la tierra abajo
  alternative_spanish_readings:
  - él es el Dios verdadero en los cielos arriba y en la tierra abajo
  - él solo es Dios en los cielos arriba y en la tierra abajo
  rationale: El hebreo afirma la deidad y soberanía universal mediante un merismo cielo/tierra. La redacción española conserva esa afirmación sin introducir explícitamente «solo» o «verdadero», que excederían la forma directa del texto.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1 y §3
translation_notes:
  revision_awareness: El inglés POB revisado conserva la lectura óptima «When we heard it... no spirit remained... Yahweh your God...». La presente versión española sigue ese mismo perfil de equivalencia óptima, manteniendo la imagen idiomática del «corazón derretido» y la referencia transparente al nombre divino, sin cambios sustantivos respecto del razonamiento auditado.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה, coherente con la política POB de transparencia onomástica.
  - «su Dios» refleja el plural hebreo de segunda persona; no se singulariza.
  - «cielos arriba / tierra abajo» preserva el merismo semítico y su alcance universal.
  - La nota [a] conserva la alternativa lexical documentada para רוּחַ sin borrar la imagen literal.
  - La traducción evita «SEÑOR» y «Cristo», ya que no corresponden al léxico de este versículo.
