    issue: Marcador de nota [a] mal anclado
    rationale: La nota [a] explica la expresión «cortar un pacto contigo», correspondiente a וְיִכְרְתוּ אִתְּךָ בְּרִית, pero en el borrador está colocada después de «David». Esto incumple la disciplina requerida de anclar cada nota en la frase relevante del texto.
  - severity: medium
