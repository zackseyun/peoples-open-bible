translation:
  language: es
  text: 'Y entre los hijos de los sacerdotes que habían tomado[a] mujeres extranjeras, fueron hallados de entre los hijos de Jesúa hijo de Josadac y sus hermanos: Maasías, Eliezer, Jarib y Gedalías.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'que se habían casado con mujeres extranjeras'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּמָּצֵא
  english_pob_choice: there were found
  chosen_spanish: se halló
  alternatives_spanish:
  - fueron hallados
  - se encontraron
  lexicon: HALOT
  rationale: El hebreo usa una forma verbal singular con sentido de hallazgo/existencia en un listado colectivo. En español, 'se halló' conserva el carácter impersonal y evita forzar un plural mecánico; mantiene la idea de descubrimiento en el registro narrativo.
- source_word: מִבְּנֵי הַכֹּהֲנִים
  english_pob_choice: among the sons of the priests
  chosen_spanish: entre los hijos de los sacerdotes
  alternatives_spanish:
  - entre los descendientes de los sacerdotes
  - de entre los hijos de los sacerdotes
  lexicon: HALOT
  rationale: '''Hijos de'' reproduce con transparencia el giro genealógico hebreo y ''entre'' comunica adecuadamente el valor de pertenencia al grupo. ''Sacerdotes'' traduce כהנים sin introducir terminología eclesiástica posterior.'
- source_word: אֲשֶׁר הֹשִׁיבוּ נָשִׁים נָכְרִיּוֹת
  english_pob_choice: who had taken foreign wives
  chosen_spanish: que habían tomado mujeres extranjeras
  alternatives_spanish:
  - que habían desposado mujeres extranjeras
  - que habían tomado esposas extranjeras
  lexicon: HALOT
  rationale: El hebreo literal dice 'poner/tomar mujeres extranjeras', y el contexto de Esdras 10 trata de matrimonios mixtos. 'Tomado mujeres extranjeras' preserva la imagen verbal sin suavizarla demasiado; 'mujeres' sigue el hebreo נָשִׁים, mientras que una nota puede explicitar el matiz matrimonial.
- source_word: נָשִׁים נָכְרִיּוֹת
  english_pob_choice: foreign wives
  chosen_spanish: mujeres extranjeras
  alternatives_spanish:
  - esposas extranjeras
  - mujeres forasteras
  lexicon: HALOT
  rationale: Aunque el marco implica matrimonio, el sustantivo hebreo dice literalmente 'mujeres'. En español, 'mujeres extranjeras' conserva la literalidad y evita imponer una equivalencia más específica en el texto principal; el vínculo matrimonial queda claro por el contexto.
- source_word: מִבְּנֵי יֵשׁוּעַ בֶּן יוֹצָדָק
  english_pob_choice: from the sons of Jeshua son of Jozadak
  chosen_spanish: entre los hijos de Jesúa hijo de Josadac
  alternatives_spanish:
  - de entre los hijos de Jesúa hijo de Josadac
  - entre los descendientes de Jesúa hijo de Josadac
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con 'hijos de' y la estructura genealógica del hebreo. 'Jesúa' y 'Josadac' son transliteraciones normalizadas en español bíblico; 'entre' nuevamente expresa la pertenencia al subgrupo dentro del conjunto sacerdotal.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de sangre
  lexicon: HALOT
  rationale: La referencia vuelve a Jesúa. 'Hermanos' es la equivalencia directa y la más natural en la lista genealógica; no hay necesidad de ampliar a 'parientes' porque el hebreo no lo exige.
- source_word: מַעֲשֵׂיָה וֶאֱלִיעֶזֶר וְיָרִיב וּגְדַלְיָה
  english_pob_choice: Maaseiah, Eliezer, Jarib, and Gedaliah
  chosen_spanish: Maasías, Eliezer, Jarib y Gedalías
  alternatives_spanish:
  - Maaasías, Eliezer, Jarib y Gedalías
  - Maaseías, Eliezer, Jarib y Gedalías
  lexicon: HALOT
  rationale: Son nombres propios y se transliteran al español. 'Maasías' y 'Gedalías' siguen formas usuales en castellano bíblico sin cambiar la identidad del nombre.
theological_decisions:
- issue: Cómo expresar נָשִׁים נָכְרִיּוֹת sin borrar el problema matrimonial del pasaje ni imponer un tecnicismo eclesiástico.
  english_pob_reading: foreign wives
  chosen_spanish_reading: mujeres extranjeras
  alternative_spanish_readings:
  - esposas extranjeras
  - mujeres forasteras
  rationale: El texto hebreo habla literalmente de 'mujeres extranjeras', y el contexto inmediato ya indica que se trata de un asunto de matrimonios prohibidos o cuestionados. Mantener 'mujeres extranjeras' preserva la tensión lexical entre la literalidad del hebreo y la inferencia contextual matrimonial, sin ocultarla con una paráfrasis más interpretativa.
  doctrine_reference: Esdras 10; práctica de fidelidad del pacto y separación comunitaria en el postexilio.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la lectura auditada en inglés. Se mantuvo la estructura colectiva de hallazgo ('se halló') y la genealogía 'hijos de...'. La principal decisión revisada es no convertir 'foreign wives' en 'esposas extranjeras' en el texto principal, para conservar la literalidad del hebreo נָשִׁים y dejar el matiz matrimonial en nota, en consonancia con la sensibilidad del POB a la tensión léxica.
  spanish_consistency_notes:
  - Se usa 'Jesúa' para יֵשׁוּעַ y 'Josadac' para יוֹצָדָק, conforme a formas bíblicas españolas comunes.
  - Se evita 'SEÑOR' u այլ masking porque el versículo no contiene el Tetragrámaton ni un equivalente directo.
  - La lista de nombres propios se conserva transliterada y sin traducir.
  - '''Hijos de los sacerdotes'' y ''hijos de Jesúa'' reflejan el paralelismo genealógico del hebreo en toda la frase.'
