translation:
  language: es
  text: Y pondré mi rostro contra ustedes[a], y serán derribados delante de sus enemigos; los que los odian gobernarán sobre ustedes, y huirán cuando nadie los persiga[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «pondré mi rostro contra ustedes», un modismo que expresa oposición decidida en juicio.'
    reason: cultural_note
  - marker: b
    text: 'O: «aunque nadie los persiga». La cláusula hebrea comunica huida impulsada por el pánico, aun sin perseguidor real.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָתַתִּי פָנַי בָּכֶם
  english_pob_choice: I will set my face against you
  chosen_spanish: pondré mi rostro contra ustedes
  alternatives_spanish:
  - volveré mi rostro contra ustedes
  - dirigiré mi rostro contra ustedes
  lexicon: HALOT
  rationale: Sigo el valor idiomático del hebreo, que expresa oposición deliberada en juicio. «Poner mi rostro contra ustedes» conserva la imagen relacional y covenantal sin volverla una mera abstracción.
- source_word: וְנִגַּפְתֶּם
  english_pob_choice: you will be struck down
  chosen_spanish: serán derribados
  alternatives_spanish:
  - serán derrotados
  - serán golpeados
  lexicon: HALOT
  rationale: El pasivo hebreo comunica caída o derrota en contexto bélico. «Serán derribados» mantiene la fuerza de juicio y suena natural en español; «derrotados» es posible, pero menos vívido.
- source_word: לִפְנֵי אֹיְבֵיכֶם
  english_pob_choice: before your enemies
  chosen_spanish: delante de sus enemigos
  alternatives_spanish:
  - en presencia de sus enemigos
  lexicon: HALOT
  rationale: La expresión espacial y militar se reproduce con claridad mediante «delante de», que conserva la imagen de derrota pública ante los enemigos.
- source_word: וְרָדוּ בָכֶם
  english_pob_choice: will rule over you
  chosen_spanish: dominarán sobre ustedes
  alternatives_spanish:
  - reinarán sobre ustedes
  - gobernarán sobre ustedes
  lexicon: HALOT
  rationale: רדה implica ejercer dominio o gobierno. «Dominarán sobre ustedes» transmite la subordinación opresiva que el contexto de maldición sugiere, sin añadir crueldad no explicitada por el hebreo.
- source_word: שֹׂנְאֵיכֶם
  english_pob_choice: those who hate you
  chosen_spanish: los que los odian
  alternatives_spanish:
  - sus odiadores
  - sus enemigos
  lexicon: HALOT
  rationale: 'Conservo el participio con su fuerza lexical específica: no solo «enemigos» en general, sino quienes los odian. Esto preserva la distinción respecto de אֹיְבֵיכֶם.'
- source_word: וְנַסְתֶּם
  english_pob_choice: you will flee
  chosen_spanish: huirán
  alternatives_spanish:
  - escaparán
  - saldrán corriendo
  lexicon: HALOT
  rationale: נוס es el verbo normal para huir. «Huirán» es breve, preciso y plenamente natural en español bíblico contemporáneo.
- source_word: וְאֵין רֹדֵף אֶתְכֶם
  english_pob_choice: when no one is pursuing you
  chosen_spanish: cuando nadie los persiga
  alternatives_spanish:
  - aunque nadie los persiga
  - sin que nadie los persiga
  lexicon: HALOT
  rationale: La construcción expresa pánico tan grande que huyen sin un perseguidor real. «Cuando nadie los persiga» preserva bien el sentido del hebreo y su flujo sintáctico.
theological_decisions:
- issue: Lenguaje antropomórfico de juicio divino
  english_pob_reading: Retain the idiom 'I will set my face against you'
  chosen_spanish_reading: Poneré mi rostro contra ustedes
  alternative_spanish_readings:
  - me opondré a ustedes
  - volveré mi rostro contra ustedes
  rationale: Mantengo la imagen del rostro para no aplanar la metáfora hebrea. La formulación conserva la fuerza personal y pactal del juicio divino, en lugar de reducirla a una oposición abstracta.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance del dominio enemigo en la maldición
  english_pob_reading: Render רדה as 'rule over' rather than a stronger interpretive gloss
  chosen_spanish_reading: dominarán sobre ustedes
  alternative_spanish_readings:
  - los oprimirán
  - los tiranizarán
  rationale: El texto afirma subordinación bajo quienes los odian, pero no especifica el grado máximo de crueldad. «Dominarán sobre ustedes» preserva el juicio sin añadir más de lo que el hebreo exige.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés de alta concordancia: mantiene el modismo de «poner el rostro contra», traduce נִגַּף con un pasivo vigoroso («serán derribados»), distingue entre enemigos y los que odian, y conserva la ambigüedad prudente de la cláusula final sobre la ausencia de perseguidor.'
  spanish_consistency_notes:
  - Se emplea «ustedes» como forma de segunda persona plural coherente en todo el verso.
  - Se mantiene «rostro» para preservar la metáfora bíblica y la terminología POB.
  - Se evita sustituir el lenguaje de dominio por vocabulario más interpretativo como «tiranizar» o «oprimir» sin apoyo explícito del hebreo.
  - Se conserva la distinción entre «enemigos» y «los que los odian», reflejando dos términos hebreos diferentes.
