translation:
  language: es
  text: doce machos cabríos[a] como ofrenda por el pecado de todo Israel, conforme al número de los doce jefes tribales de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente en lenguaje sacrificial: "doce machos cabríos como sacrificio por el pecado de todo Israel".'
    reason: lexical_alternative
lexical_decisions:
- source_word: χιμάρους
  english_pob_choice: goats
  chosen_spanish: machos cabríos
  alternatives_spanish:
  - cabras
  - chivos
  lexicon: LSJ
  rationale: χίμαρος designa un macho cabrío o cabrío. En español, 'machos cabríos' conserva el rasgo de sexo requerido por el contexto sacrificial y evita la ambigüedad de 'cabras'.
- source_word: ὑπὲρ ἁμαρτίας
  english_pob_choice: as a sin offering for
  chosen_spanish: como ofrenda por el pecado
  alternatives_spanish:
  - para expiación
  - como sacrificio por el pecado
  lexicon: LSJ
  rationale: La expresión griega funciona idiomáticamente en lenguaje sacrificial. 'Como ofrenda por el pecado' comunica de modo natural ese valor cultual en español sin borrar el trasfondo literal de 'por el pecado'.
- source_word: παντὸς τοῦ Ἰσραὴλ
  english_pob_choice: of all Israel
  chosen_spanish: por todo Israel
  alternatives_spanish:
  - de todo Israel
  - para todo Israel
  lexicon: LSJ
  rationale: El griego puede sonar genitivo ('de') o final/representativo ('por/para'). En español, 'por todo Israel' suena más natural junto a 'ofrenda por el pecado' y conserva la idea representativa.
- source_word: πρὸς ἀριθμὸν
  english_pob_choice: according to the number of
  chosen_spanish: conforme al número de
  alternatives_spanish:
  - según el número de
  - de acuerdo con el número de
  lexicon: LSJ
  rationale: '''Conforme al número de'' es una equivalencia clara y digna para la correspondencia cuantitativa expresada por πρὸς ἀριθμόν.'
- source_word: φυλάρχων
  english_pob_choice: tribal leaders
  chosen_spanish: jefes tribales
  alternatives_spanish:
  - líderes de las tribus
  - cabezas de las tribus
  lexicon: LSJ
  rationale: φυλάρχης es un jefe o líder de tribu. 'Jefes tribales' mantiene la función de liderazgo y suena más natural en español bíblico contemporáneo.
theological_decisions:
- issue: Cómo renderizar ὑπὲρ ἁμαρτίας en contexto sacrificial
  english_pob_reading: The English POB chose 'as a sin offering,' with a footnoted alternative keeping closer to the Greek 'for the sin.'
  chosen_spanish_reading: como ofrenda por el pecado
  alternative_spanish_readings:
  - como sacrificio por el pecado
  - por el pecado
  rationale: La frase griega pertenece al registro sacrificial y en español la solución más clara y fiel es explicitar la ofrenda. Esto preserva el sentido cultual sin perder la relación con 'pecado'.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve meaningful sacrificial terminology and avoid flattening cultic language.'
translation_notes:
  revision_awareness: La versión inglesa más reciente aclaró ὑπὲρ ἁμαρτίας como 'for a sin offering' en vez de 'for the sin'. La redacción española sigue esa revisión al explicitar 'ofrenda por el pecado', manteniendo la equivalencia cultual y la lectura natural en español.
  spanish_consistency_notes:
  - Se usa 'machos cabríos' para preservar el sexo del animal sacrificial.
  - '''Jefes tribales'' corresponde a φυλάρχων y evita una paráfrasis eclesiástica.'
  - No se usa 'Mesías' ni terminología cristológica porque el versículo no la requiere.
  - La preposición 'por' en 'ofrenda por el pecado por todo Israel' mantiene la relación sacrificial y representativa del griego.
