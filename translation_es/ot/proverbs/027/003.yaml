translation:
  language: es
  text: La piedra es pesada[a], y la arena pesa; pero la ira de un necio pesa más que ambas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pesada es la piedra, y una carga de arena [es pesada], pero la ira de un necio pesa más que ambas». El hebreo usa términos estrechamente relacionados con la idea de pesadez en la primera y la tercera línea.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּֽבֶד
  english_pob_choice: is heavy
  chosen_spanish: pesadez
  alternatives_spanish:
  - peso
  - pesadez
  - pesado
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo de ‘peso/pesadez’. En español, ‘pesadez’ mantiene el campo semántico nominal y permite el paralelismo proverbial con la segunda mitad del verso.
- source_word: אֶ֭בֶן
  english_pob_choice: stone
  chosen_spanish: piedra
  alternatives_spanish:
  - piedra
  - roca
  lexicon: HALOT
  rationale: ‘Piedra’ es el equivalente natural y concreto en español; ‘roca’ sería más amplio y menos preciso para la imagen proverbial.
- source_word: נֵ֣טֶל
  english_pob_choice: weighty
  chosen_spanish: carga
  alternatives_spanish:
  - carga
  - peso
  - lastre
  lexicon: HALOT
  rationale: El término apunta a algo que se lleva o soporta. ‘Carga’ expresa bien la idea de un peso transportado y funciona de manera idiomática junto con ‘arena’.
- source_word: הַ/ח֑וֹל
  english_pob_choice: sand
  chosen_spanish: la arena
  alternatives_spanish:
  - arena
  - la arena
  lexicon: HALOT
  rationale: Se conserva el artículo del hebreo con ‘la arena’, porque el sustantivo aparece marcado como definido y la frase suena natural en español.
- source_word: כַ֥עַס
  english_pob_choice: anger
  chosen_spanish: ira
  alternatives_spanish:
  - ira
  - enojo
  - vexación
  lexicon: HALOT
  rationale: Aquí el sustantivo describe el arrebato o la disposición airada del necio. ‘Ira’ mantiene la fuerza afectiva y el registro proverbial sin suavizar demasiado el término.
- source_word: אֱוִ֗יל
  english_pob_choice: a fool’s
  chosen_spanish: de un necio
  alternatives_spanish:
  - de un necio
  - del necio
  lexicon: HALOT
  rationale: ‘Necio’ reproduce bien la figura sapiencial del hebreo אֱוִיל y conserva el tono moral del proverbio.
- source_word: כָּבֵ֥ד
  english_pob_choice: is heavier
  chosen_spanish: es más pesada
  alternatives_spanish:
  - es más pesada
  - pesa más
  lexicon: HALOT
  rationale: Aunque la forma hebrea es adjetival, el contexto comparativo exige expresar la comparación en español. ‘Es más pesada’ preserva la imagen de peso y el paralelismo con ‘pesadez’.
- source_word: מִ/שְּׁנֵי/הֶֽם
  english_pob_choice: than both of them
  chosen_spanish: que ambas
  alternatives_spanish:
  - que ambas
  - que las dos
  lexicon: HALOT
  rationale: El hebreo compara con los dos elementos anteriores en conjunto. ‘Que ambas’ es breve, natural y conserva el referente dual sin añadir palabras innecesarias.
theological_decisions:
- issue: Figura sapiencial del necio y su ira
  english_pob_reading: The verse contrasts physical heaviness with the moral/spiritual weight of a fool’s anger.
  chosen_spanish_reading: El proverbio contrasta el peso físico con la gravedad moral de la ira de un necio.
  alternative_spanish_readings:
  - El proverbio contrasta el peso físico con el enojo del necio.
  - El proverbio contrasta el peso físico con la indignación del necio.
  rationale: 'No hay una doctrina especial en juego, pero sí una decisión de tono: ‘ira’ mantiene la intensidad que el inglés POB resguarda con ‘anger’ y evita trivializar el contraste sapiencial.'
  doctrine_reference: Sabiduría proverbial; no aplica una referencia doctrinal específica.
translation_notes:
  revision_awareness: 'Se siguió el sentido del hebreo masorético y el audit trail inglés: el verso usa sustantivos de peso/pesadez en las líneas inicial y final, con una comparación proverbial que culmina en la ira del necio. No se registran revisiones textuales sustanciales en el contexto provisto.'
  spanish_consistency_notes:
  - Se preservó la imagen concreta de peso con un sustantivo en la primera línea para respetar el paralelismo semántico del hebreo.
  - ‘Necio’ se usa de forma consistente con el registro sapiencial bíblico y evita una traducción psicológica más débil.
  - ‘Que ambas’ resume el hebreo dual con naturalidad en español, sin perder la referencia a los dos elementos previos.
