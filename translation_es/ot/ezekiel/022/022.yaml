- from: Como se funde la plata en medio de un horno[a], así seréis fundidos en medio de ella; y sabréis que yo, Yahvé, he derramado mi furor sobre vosotros.
  to: Como se funde la plata en medio de un horno, así serán fundidos en medio de ella[a]; y sabrán que yo, Yahvé, he derramado mi ira sobre ustedes.
