review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: informe formal al rey, condición de que la ciudad sea edificada y sus murallas levantadas, y advertencia sobre pérdida de acceso/paso hacia Celesiria y Fenicia. Sin embargo, dos elecciones no son plenamente fieles al matiz del original y del rastro POB: «oh rey señor» suena antinatural en español y desordena el vocativo κύριε βασιλεῦ; «entrada» para ἔξοδός estrecha demasiado el sentido, ya que el griego apunta más bien a paso/acceso/vía de tránsito, no simplemente al acto de entrar.'
  spanish_quality_summary: El texto es mayormente claro, pero «oh rey señor» no suena idiomático ni digno en español eclesial moderno; «señor rey» conserva mejor ambos títulos y es más natural. «Es edificada» y «son levantadas» son aceptables, aunque algo formales; no requieren cambio. La nota al pie está bien encaminada, pero conviene alinear mejor la explicación con «paso/acceso» y con la preposición «hacia» presente en la explicación inglesa.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Los nombres geográficos «Celesiria» y «Fenicia» están bien. La principal cuestión léxica es ἔξοδός: el POB inglés documenta «passage» con alternativas «access/way through»; por eso el español debe preferir «paso» o «acceso» antes que «entrada».'
  issues:
  - severity: medium
    issue: Vocativo «oh rey señor» poco natural para κύριε βασιλεῦ
    rationale: Aunque intenta conservar ambos elementos, en español suena invertido y forzado. «Señor rey» preserva mejor el doble tratamiento cortesano sin añadir «mi».
  - severity: medium
    issue: «Entrada» no refleja bien ἔξοδός
    rationale: El sustantivo griego, según la nota inglesa, expresa paso/acceso/vía hacia esas regiones, incluso alcance imperial. «Entrada» reduce el matiz y puede sugerir solo ingreso puntual.
  revised_spanish_text: Ahora, pues, te hacemos saber, señor rey, que si esta ciudad es edificada y sus murallas son levantadas, ya no habrá para ti paso[a] hacia Celesiria y Fenicia.
  revised_footnotes:
  - marker: a
    text: O «acceso» o «vía de paso» hacia Celesiria y Fenicia. El griego dice literalmente que ya no habrá para ti una «salida/paso» hacia esas regiones, expresando pérdida de acceso o de alcance imperial.
    reason: lexical_alternative
  revision_rationale: Se ajusta el vocativo a un español más natural y fiel al doble título cortesano del griego, y se sustituye «entrada» por «paso» para reflejar mejor el sentido documentado de ἔξοδός como acceso o vía de tránsito hacia las regiones mencionadas.
