translation:
  language: es
  text: Por medio de mí[a] los reyes reinan, y los gobernantes[b] decretan justicia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por mí». El hebreo también puede entenderse con matiz instrumental.
    reason: lexical_alternative
  - marker: b
    text: O «los nobles» o «los príncipes».
    reason: lexical_alternative
lexical_decisions:
- source_word: בִּי
  english_pob_choice: By me
  chosen_spanish: Por medio de mí
  alternatives_spanish:
  - por mí
  - mediante mí
  - por medio de
  lexicon: HALOT
  rationale: La preposición ב con sufijo de 1ª persona singular expresa aquí medio/instrumento o agencia. «Por medio de mí» conserva ese valor causal e instrumental con naturalidad en español y evita reducir el matiz a una simple referencia personal.
- source_word: מְלָכִים
  english_pob_choice: kings
  chosen_spanish: los reyes
  alternatives_spanish:
  - los monarcas
  - los reyes gobernantes
  lexicon: HALOT
  rationale: El sustantivo plural designa monarcas; «reyes» es la equivalencia directa, clara y idiomática en español.
- source_word: יִמְלֹכוּ
  english_pob_choice: reign
  chosen_spanish: reinan
  alternatives_spanish:
  - gobiernan
  - son reyes
  lexicon: HALOT
  rationale: El verbo מלך expresa ejercer dominio real. «Reinan» preserva el campo semántico monárquico mejor que el más general «gobiernan».
- source_word: וְרֹזְנִים
  english_pob_choice: rulers
  chosen_spanish: los gobernantes
  alternatives_spanish:
  - los príncipes
  - los nobles
  - los magistrados
  lexicon: HALOT
  rationale: רֹזְנִים se refiere a dignatarios o autoridades. «Gobernantes» comunica esa función de mando en español contemporáneo sin cargarlo de un tono excesivamente arcaico como «príncipes».
- source_word: יְחֹקְקוּ
  english_pob_choice: decree
  chosen_spanish: decretan
  alternatives_spanish:
  - promulgan
  - dictan
  - establecen
  lexicon: HALOT
  rationale: En contexto de gobierno y autoridad, חקק puede denotar establecer o promulgar normas. «Decretan» mantiene el acto formal y autoritativo que refleja bien el paralelo con «reinan».
- source_word: צֶדֶק
  english_pob_choice: justice
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - lo justo
  lexicon: HALOT
  rationale: צֶדֶק abarca justicia/rectitud. Tras «decretan», «justicia» conserva la correspondencia léxica más cercana al sustantivo hebreo y su fuerza jurídica y moral.
theological_decisions:
- issue: El alcance de la afirmación sobre la autoridad política y la justicia
  english_pob_reading: The verse states that kings reign and rulers decree justly by means of Wisdom, without implying that every actual ruler always governs justly.
  chosen_spanish_reading: El versículo afirma que los reyes reinan y los gobernantes decretan justicia por medio de la Sabiduría, sin convertir eso en una garantía de que todo gobernante concreto obre siempre con justicia.
  alternative_spanish_readings:
  - Una lectura más fuerte de legitimación providencial de toda autoridad política
  - Una lectura moralizada que presupone que todos los gobernantes en vista emiten decretos siempre justos
  rationale: La traducción conserva la afirmación positiva del papel de la Sabiduría en el buen gobierno, pero no resuelve la tensión textual convirtiéndola en una promesa universal sobre todos los gobernantes reales.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa que prefirió «decree justice» por correspondencia más cercana a צֶדֶק y por mayor concisión formal; en español se reflejó con «decretan justicia» para mantener la misma cercanía léxica sin perder naturalidad.
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo sintáctico breve del hebreo: medio/instrumento + reyes + verbo real, seguido de gobernantes + verbo normativo + objeto abstracto.'
  - Se evitó «SEÑOR» o equivalentes porque el texto no contiene el nombre divino; la línea trata de Sabiduría personificada, no del tetragrámaton.
  - «Reyes» y «gobernantes» conservan el contraste de rango entre מְלָכִים y רֹזְנִים sin forzar vocabulario eclesiástico.
