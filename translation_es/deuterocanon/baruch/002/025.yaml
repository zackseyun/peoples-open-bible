translation:
  language: es
  text: Y he aquí, fueron expuestos[a] al calor del día y a la helada de la noche; y murieron en sufrimientos graves, en hambruna y por la espada y en exilio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron arrojados fuera»; el griego sugiere estar expuestos o echados al descubierto ante los elementos.
    reason: lexical_alternative
  - marker: b
    text: O «en deportación» o «en destierro»; el término griego alude literalmente a un envío lejos, es decir, a un alejamiento forzoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδού
  english_pob_choice: behold
  chosen_spanish: he aquí
  alternatives_spanish:
  - miren
  - vean
  lexicon: BDAG
  rationale: La interjección llama la atención de forma solemne; «he aquí» conserva ese valor discursivo sin sonar mecánico en español.
- source_word: ἐξεριμμένα
  english_pob_choice: have been exposed
  chosen_spanish: fueron expuestos
  alternatives_spanish:
  - han sido expuestos
  - fueron arrojados fuera
  - quedaron expuestos
  lexicon: LSJ
  rationale: El participio pasivo expresa estar arrojados/expuestos; «fueron expuestos» mantiene la imagen de quedar al descubierto ante los elementos, sin añadir un matiz más fuerte de expulsión.
- source_word: τῷ καύματι τῆς ἡμέρας
  english_pob_choice: to the heat of the day
  chosen_spanish: al calor del día
  alternatives_spanish:
  - al calor abrasador del día
  - al calor ardiente del día
  lexicon: LSJ
  rationale: «Calor» comunica el sustantivo de forma natural y mantiene el paralelismo con la segunda cláusula; no se intensifica innecesariamente lo que el griego no explicita.
- source_word: τῷ παγετῷ τῆς νυκτός
  english_pob_choice: to the frost of the night
  chosen_spanish: al hielo de la noche
  alternatives_spanish:
  - a la helada de la noche
  - al frío de la noche
  lexicon: LSJ
  rationale: παγετός puede ser «helada» o «frío congelante»; «hielo de la noche» conserva la concreción imagética y el paralelismo con el calor del día, aunque en español es una opción menos idiomática.
- source_word: ἐν πόνοις πονηροῖς
  english_pob_choice: in grievous sufferings
  chosen_spanish: en dolores graves
  alternatives_spanish:
  - en sufrimientos graves
  - en padecimientos crueles
  - en tormentos dolorosos
  lexicon: BDAG
  rationale: La frase intensifica la miseria y el sufrimiento; «dolores graves» refleja el plural y la fuerza de πονηροῖς sin convertirlo en un término doctrinal o excesivamente interpretativo.
- source_word: ἐν λιμῷ
  english_pob_choice: in famine
  chosen_spanish: en hambre
  alternatives_spanish:
  - por hambre
  - en hambruna
  lexicon: BDAG
  rationale: El griego nombra la calamidad de forma directa; «hambre» es la forma más breve y clara en español, aunque «hambruna» sería una equivalencia más explicativa.
- source_word: ἐν ῥομφαίᾳ
  english_pob_choice: by the sword
  chosen_spanish: por la espada
  alternatives_spanish:
  - a espada
  - por la guerra
  - a causa de la espada
  lexicon: BDAG
  rationale: La espada funciona como metonimia de muerte violenta; «por la espada» conserva la imagen concreta y la fuerza causal de la expresión.
- source_word: ἐν ἀποστολῇ
  english_pob_choice: in exile
  chosen_spanish: en exilio
  alternatives_spanish:
  - en deportación
  - en destierro
  - en banishment
  lexicon: LSJ
  rationale: En este contexto de juicio nacional, el término apunta al desplazamiento forzoso fuera de la tierra; «exilio» comunica bien el sentido teológico e histórico. Se preserva la alternativa más literal en nota.
theological_decisions:
- issue: Sentido de ἐν ἀποστολῇ como castigo nacional
  english_pob_reading: in exile
  chosen_spanish_reading: en exilio
  alternative_spanish_readings:
  - en deportación
  - en destierro
  rationale: El contexto enumera consecuencias de juicio sobre el pueblo. «Exilio» expresa la realidad nacional y teológica del alejamiento forzado sin resolver en exceso la literalidad de ἀποστολή, que puede sugerir envío, deportación o destierro.
  doctrine_reference: Preservar la tensión léxica y el trasfondo de juicio/castigo sin sobreinterpretar.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa más reciente, que prefirió un equivalente más formal para ἰδού y reinterpretó ἐξεριμμένα como «exposed». En español se retuvo la idea de exposición al clima, pero con una formulación natural y sobria («fueron expuestos») y se evitó una traducción demasiado libre de la lista final de calamidades.
  spanish_consistency_notes:
  - Se mantuvo «Y he aquí» para reflejar la interjección solemne sin caer en arcaísmo excesivo.
  - Se prefirió «exilio» para ἀποστολή, siguiendo la decisión inglesa principal, pero se documentó la alternativa más literal.
  - Se conservó el paralelismo «al calor del día / al hielo de la noche» para respetar la simetría del griego.
  - No se sustituyó la imagen concreta de la espada por una paráfrasis abstracta.
