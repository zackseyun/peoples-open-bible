translation:
  language: es
  text: Pero si el sacerdote lo examina, y he aquí que la mancha se ha desvanecido después de ser lavado, entonces la arrancará de la prenda, o del cuero, o de la urdimbre, o de la trama[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la trama transversal'; corresponde al término textil opuesto a 'urdimbre'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: Conserva el encadenamiento condicional y la leve transición discursiva del hebreo; en español, 'Pero si' refleja bien la continuación procedimental sin volverla más fuerte de lo que pide el texto.
- source_word: רָאָה הַכֹּהֵן
  english_pob_choice: the priest examines it
  chosen_spanish: el sacerdote lo examina
  alternatives_spanish:
  - el sacerdote lo ve
  - el sacerdote lo mira
  lexicon: HALOT
  rationale: El verbo hebreo es literalmente 'ver', pero en contexto legal de inspección la función es evaluativa; 'examina' comunica esa acción sin perder el sentido de observación.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y he aquí que
  - y vea
  lexicon: HALOT
  rationale: Mantiene el marcador de atención y sorpresa/constatación del hebreo narrativo-legal. 'He aquí' es un equivalente español sobrio y tradicionalmente comprensible.
- source_word: כֵּהָה
  english_pob_choice: has faded
  chosen_spanish: se ha desvanecido
  alternatives_spanish:
  - se ha apagado
  - se ha vuelto tenue
  - se ha oscurecido menos
  lexicon: HALOT
  rationale: En este contexto de mancha en tejido o cuero, la idea es que perdió intensidad visible. 'Se ha desvanecido' transmite mejor ese debilitamiento que una traducción más literal y evita ambigüedad.
- source_word: הַנֶּגַע
  english_pob_choice: the spot
  chosen_spanish: la mancha
  alternatives_spanish:
  - la marca
  - la lesión
  - el foco afectado
  lexicon: HALOT
  rationale: En materiales textiles o de cuero, נגע designa la zona afectada. 'Mancha' resulta natural en español y conserva el carácter visible del defecto sin medicalizarlo indebidamente.
- source_word: אַחֲרֵי הֻכַּבֵּס אֹתוֹ
  english_pob_choice: after it was washed
  chosen_spanish: después de ser lavada
  alternatives_spanish:
  - después de haber sido lavada
  - después de lavarla
  lexicon: HALOT
  rationale: La pasiva hebrea se reproduce con una pasiva impersonal en español. 'Lavada' concuerda con 'la mancha' y mantiene la secuencia procedimental.
- source_word: וְקָרַע אֹתוֹ
  english_pob_choice: then he shall tear it out
  chosen_spanish: entonces la desgarrará
  alternatives_spanish:
  - entonces la arrancará
  - entonces la cortará y sacará
  - entonces la rasgará
  lexicon: HALOT
  rationale: El hebreo indica una extracción mediante desgarro. En español, 'desgarrará' conserva la fuerza del verbo y evita suavizar el acto; el complemento 'fuera de' explicita la remoción del área afectada.
- source_word: מִן הַבֶּגֶד
  english_pob_choice: out of the garment
  chosen_spanish: fuera de la prenda
  alternatives_spanish:
  - de la prenda
  - fuera del vestido
  - fuera del vestido o prenda
  lexicon: HALOT
  rationale: בגד abarca una prenda/ropa en general; 'prenda' es más natural y amplio que 'vestido' en español, y conserva la referencia material del reglamento.
- source_word: מִן הָעוֹר
  english_pob_choice: out of the leather
  chosen_spanish: fuera del cuero
  alternatives_spanish:
  - fuera de la piel
  - fuera del cuero curtido
  - fuera del pellejo
  lexicon: HALOT
  rationale: En un contexto de objetos tratados, עור se refiere al material de cuero, no a piel humana. 'Cuero' es la opción más clara en español contemporáneo.
- source_word: מִן הַשְּׁתִי
  english_pob_choice: out of the warp
  chosen_spanish: fuera de la urdimbre
  alternatives_spanish:
  - fuera de los hilos de urdimbre
  - fuera del hilo vertical
  lexicon: HALOT
  rationale: שְׁתִי nombra la urdimbre, es decir, los hilos longitudinales. 'Urdimbre' preserva la precisión técnica del hebreo y se corresponde con el par textil tradicional.
- source_word: מִן הָעֵרֶב
  english_pob_choice: out of the woof
  chosen_spanish: fuera de la trama
  alternatives_spanish:
  - fuera de la trama textil
  - fuera de la trama / la trama transversal
  - fuera de la trama o weft
  lexicon: HALOT
  rationale: עֵרֶב designa la trama, los hilos transversales. 'Trama' es el término técnico natural en español y mantiene el paralelismo con 'urdimbre'.
theological_decisions:
- issue: Inspección sacerdotal como acto legal, no mera percepción visual
  english_pob_reading: the priest examines it
  chosen_spanish_reading: el sacerdote lo examina
  alternative_spanish_readings:
  - el sacerdote lo ve
  - el sacerdote lo inspecciona
  rationale: La acción está en un marco ritual-legal de evaluación. 'Examina' preserva el carácter oficial y discernidor del gesto sacerdotal, sin convertirlo en interpretación libre.
  doctrine_reference: Levítico 13; pureza ritual y discernimiento sacerdotal
- issue: Desgaste visible de la mancha tras el lavado
  english_pob_reading: the spot has faded after it was washed
  chosen_spanish_reading: la mancha se ha desvanecido después de ser lavada
  alternative_spanish_readings:
  - la mancha se ha atenuado después de lavarla
  - la mancha se ha vuelto más tenue tras el lavado
  rationale: El hebreo describe una disminución de intensidad visible, no necesariamente desaparición total. 'Se ha desvanecido' deja esa tensión abierta y no exagera el resultado.
  doctrine_reference: Levítico 13:47-59; diagnóstico ritual de afecciones en textiles y cuero
translation_notes:
  revision_awareness: 'El pasaje sigue el acuerdo alto del audit trail en inglés: condicional introductorio, marcador ''he aquí'', ''has faded'' para כֵּהָה, y términos técnicos textiles ''warp/woof'' trasladados a ''urdimbre/trama''. No se detectaron revisiones aplicadas en el pass más reciente.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' en el proyecto general, pero este versículo no contiene el nombre divino.
  - Se mantiene la distinción técnica entre 'urdimbre' y 'trama' para reflejar el par hebreo שְׁתִי / עֵרֶב.
  - '''Cuero'' se usa por tratarse de material tratado, no de piel humana.'
  - El uso de 'la mancha' en lugar de 'plaga' evita una carga semántica excesiva para este contexto material.
