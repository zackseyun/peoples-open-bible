base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/019/025.yaml
  text: And Mephibosheth son of Saul came down to meet the king[a]. He had not cared for his feet, nor trimmed his mustache, nor washed his clothes[c][b], from the day the king departed until the day he came in peace.
  footnotes:
  - marker: a
    text: Hebrew literally, 'had not done his feet.' The expression refers to neglecting normal grooming or care for the feet.
    reason: lexical_alternative
  - marker: b
    text: Or 'nor cared for his mustache.' The Hebrew term refers specifically to the upper-lip facial hair area, not necessarily the whole beard.
    reason: lexical_alternative
  - marker: c
    text: Or 'until the day he came in peace' or 'arrived safely.'
    reason: lexical_alternative
