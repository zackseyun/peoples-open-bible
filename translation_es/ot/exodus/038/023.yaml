translation:
  language: es
  text: Y con él estaba Oholiab, hijo de Ahisamac[a], de la tribu de Dan, grabador, diseñador y bordador en azul, en púrpura, en escarlata[b] y en lino fino.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también ‘Aholiab’. Las transliteraciones españolas de este nombre hebreo varían.
    reason: lexical_alternative
  - marker: b
    text: ‘Escarlata’ traduce una expresión hebrea para material textil teñido de escarlata; alternativamente, simplemente ‘escarlata’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאִתּוֹ
  english_pob_choice: And with him was
  chosen_spanish: Y con él estaba
  alternatives_spanish:
  - Y con él
  - Y estaba con él
  lexicon: HALOT
  rationale: La construcción hebrea introduce a Oholiab como acompañado de Bezalel; en español, ‘estaba’ expresa de manera natural la presencia/acompañamiento implícitos sin añadir contenido ajeno.
- source_word: אָהֳלִיאָב
  english_pob_choice: Oholiab
  chosen_spanish: Aholiab
  alternatives_spanish:
  - Oholiab
  lexicon: HALOT
  rationale: Se conserva la transliteración del nombre propio en una forma española estándar y legible; la variante inglesa con ‘O’ inicial queda documentada como alternativa transliterativa.
- source_word: בֶּן אֲחִיסָמָךְ
  english_pob_choice: son of Ahisamach
  chosen_spanish: hijo de Ahisamac
  alternatives_spanish:
  - hijo de Ahisamaj
  - hijo de Ahisamach
  lexicon: HALOT
  rationale: Se mantiene la relación patronímica de forma directa. La grafía ‘Ahisamac’ sigue una transliteración española coherente; la nota conserva la variación transliterativa documentada.
- source_word: לְמַטֵּה דָן
  english_pob_choice: of the tribe of Dan
  chosen_spanish: de la tribu de Dan
  alternatives_spanish:
  - para la tribu de Dan
  - perteneciente a la tribu de Dan
  lexicon: HALOT
  rationale: ‘De la tribu de Dan’ es la equivalencia española natural para la afiliación tribal y mantiene el sentido genealógico/identitario del hebreo.
- source_word: חָרָשׁ
  english_pob_choice: an engraver
  chosen_spanish: grabador
  alternatives_spanish:
  - artífice
  - artesano
  lexicon: HALOT
  rationale: En este contexto de trabajos del tabernáculo, el término alude a un oficio especializado. ‘Grabador’ sigue la decisión inglesa de una labor técnica específica y funciona bien en la lista de oficios.
- source_word: וְחֹשֵׁב
  english_pob_choice: a designer
  chosen_spanish: diseñador
  alternatives_spanish:
  - artífice de diseños
  - tejedor de diseños
  lexicon: HALOT
  rationale: El participio describe a quien concibe patrones artísticos; ‘diseñador’ comunica esa función conceptual sin perder la relación con el trabajo ornamental.
- source_word: וְרֹקֵם
  english_pob_choice: an embroiderer
  chosen_spanish: bordador
  alternatives_spanish:
  - ricamador
  - bordador artístico
  lexicon: HALOT
  rationale: La acción es de bordado textil; ‘bordador’ es el equivalente español claro y natural, manteniendo la serie de oficios artesanales.
- source_word: בַּתְּכֵלֶת
  english_pob_choice: in the blue
  chosen_spanish: en azul
  alternatives_spanish:
  - en el azul
  - en azul celeste
  lexicon: HALOT
  rationale: Se evita imponer un sustantivo material que el hebreo no exige aquí; ‘en azul’ reproduce el ámbito cromático/tejido que la POB inglesa optó por mantener de forma sencilla.
- source_word: וּבָאַרְגָּמָן
  english_pob_choice: and in purple
  chosen_spanish: en púrpura
  alternatives_spanish:
  - en morado
  - en violeta
  lexicon: HALOT
  rationale: ‘Púrpura’ preserva el registro bíblico-técnico del color/tejido y corresponde bien al lenguaje tabernacular.
- source_word: וּבְתוֹלַעַת הַשָּׁנִי
  english_pob_choice: and in scarlet yarn
  chosen_spanish: en carmesí
  alternatives_spanish:
  - en hilo carmesí
  - en lana escarlata
  - en escarlata
  lexicon: HALOT
  rationale: El hebreo denota un material teñido de rojo intenso; la POB inglesa opta por ‘scarlet yarn’, pero en español ‘carmesí’ permite conservar el color sin introducir de modo forzado un sustantivo material no explicitado en la forma breve del texto. Se deja constancia de la alternativa material si se quiere explicitar en otra tradición traductora.
- source_word: וּבַשֵּׁשׁ
  english_pob_choice: and in fine linen
  chosen_spanish: y en lino fino
  alternatives_spanish:
  - y en lino
  - y en fino lino
  lexicon: HALOT
  rationale: ‘שֵׁשׁ’ se entiende en el contexto sacerdotal/tabernacular como lino fino; la formulación fija de español bíblico ‘lino fino’ es natural y fiel.
theological_decisions:
- issue: ¿Cómo expresar la lista de oficios sin neutralizar su especificidad técnica?
  english_pob_reading: an engraver, a designer, and an embroiderer
  chosen_spanish_reading: grabador, diseñador y bordador
  alternative_spanish_readings:
  - artesano, diseñador y bordador
  - grabador, artífice y bordador
  rationale: La lista presenta capacidades artesanales concretas para la obra del tabernáculo. Mantener términos técnicos evita diluir el perfil del personaje y sigue la decisión inglesa de distinguir oficios específicos.
  doctrine_reference: Éxodo 35–38; cf. Éxodo 31:6
- issue: ¿Conviene explicitar el ‘scarlet yarn’ como material textil o conservar solo el color?
  english_pob_reading: scarlet yarn
  chosen_spanish_reading: carmesí
  alternative_spanish_readings:
  - hilo carmesí
  - escarlata
  rationale: El hebreo puede referirse al material teñido en rojo intenso. En español, ‘carmesí’ mantiene la fuerza cromática y la dignidad del registro sin obligar a una explicitación material que el sintagma breve no requiere de modo inequívoco.
  doctrine_reference: Éxodo 25–28; Éxodo 39
translation_notes:
  revision_awareness: La versión inglesa auditada fue ajustada para eliminar artículos repetidos antes de los materiales y para dejar ‘blue’ sin artículo. La redacción española sigue esa línea al usar ‘en azul, en púrpura, en carmesí y en lino fino’, sin artículos innecesarios, y conserva la serie de oficios especializadas del borrador revisado.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se emplea ‘Aholiab’ como transliteración española coherente, con nota sobre la variante ‘Oholiab’.
  - Se conserva el paralelismo de preposiciones (‘en... en... en...’) para reflejar la estructura enumerativa del hebreo.
  - ‘Lino fino’ se usa como término establecido y legible para שֵׁשׁ en contexto tabernacular.
