review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia ritual del hebreo: sacrificar el animal del אָשָׁם, tomar parte de su sangre y aplicarla a la oreja, mano y pie derechos del que está siendo limpiado. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y la auditoría inglesa: כֶּבֶשׂ se alinea mejor con «cordero» que con «carnero» en esta formulación, y la nota b está anclada en «mano derecha» aunque su contenido trata la terminología de אָשָׁם. Además, הַמִּטַּהֵר se expresa mejor en español como pasivo/procesual («el que está siendo purificado/limpiado») que como reflexivo («se está limpiando»), para no sugerir que la persona realiza la acción sobre sí misma.'
  spanish_quality_summary: El español es claro y mayormente natural, con tono digno y legible. «Degollará» funciona en contexto sacrificial, aunque es algo más marcado; no requiere cambio. Sí conviene mejorar la naturalidad y precisión ritual en «del que está siendo purificado» y corregir la colocación de la nota b para evitar confusión. «Lóbulo de la oreja derecha», «pulgar» y «dedo gordo del pie» son buenos equivalentes.
  glossary_alignment: La decisión «ofrenda por la culpa» es aceptable para אָשָׁם y respeta la rationale de 'guilt offering', aunque también sería viable «ofrenda de culpa». No hay conflicto con la terminología troncal del proyecto. La principal cuestión terminológica es que el inglés documenta «lamb», por lo que «cordero» mantiene mejor la alineación que «carnero».
  issues:
  - severity: medium
    issue: «carnero» para כֶּבֶשׂ הָאָשָׁם
    rationale: La auditoría inglesa fijó «the guilt-offering lamb», y en este contexto «cordero» preserva mejor esa decisión. «Carnero» puede desplazar el referente hacia un macho adulto y alejarse innecesariamente de la base auditada.
  - severity: medium
    issue: «el que se está limpiando» sugiere reflexivo
    rationale: הַמִּטַּהֵר describe a la persona sometida al proceso ritual de purificación; en español, «se está limpiando» puede sugerir autoacción. «El que está siendo purificado» o «el que está siendo limpiado» refleja mejor el participio procesual.
  - severity: high
    issue: La nota b está anclada en «mano derecha» pero comenta אָשָׁם
    rationale: El contenido de la nota b trata la traducción de «ofrenda por la culpa», no «mano derecha». Debe anclarse donde aparece la expresión relevante; de lo contrario, la nota induce confusión y no cumple la disciplina de notas.
  - severity: low
    issue: Contenido de la nota b incluye «ofrenda por el pecado»
    rationale: Como alternativa tradicional de אָשָׁם, «ofrenda por el pecado» no es la mejor equivalencia aquí y puede mezclarla con חַטָּאת. Conviene limitar la nota a «ofrenda por la transgresión» o «ofrenda de reparación»/«trespass offering» en español natural.
  revised_spanish_text: Entonces degollará el cordero de la ofrenda por la culpa[b], y el sacerdote tomará de la sangre de la ofrenda por la culpa y la pondrá sobre el lóbulo[a] de la oreja derecha del que está siendo purificado, y sobre el pulgar de su mano derecha, y sobre el dedo gordo de su pie derecho.
  revised_footnotes:
