translation:
  language: es
  text: Y en aquel tiempo se levantará Miguel, el gran príncipe que está sobre[a] los hijos de tu pueblo. Y habrá un tiempo de angustia[b], cual no ha habido desde que hubo nación hasta aquel tiempo. Y en aquel tiempo tu pueblo escapará[c], todo el que se halle escrito[d] en el libro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘que está a favor de los hijos de tu pueblo’.
    reason: lexical_alternative
  - marker: b
    text: O ‘un tiempo de aflicción’.
    reason: lexical_alternative
  - marker: c
    text: O ‘será librado’.
    reason: lexical_alternative
  - marker: d
    text: O ‘todo el que se halle inscrito en el libro’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָעֵת הַהִיא / and at that time
  english_pob_choice: And at that time
  chosen_spanish: Y en aquel tiempo
  alternatives_spanish:
  - Y en ese tiempo
  - Y en aquel momento
  lexicon: HALOT
  rationale: La repetición del marcador temporal se conserva con una fórmula natural en español. 'Aquel tiempo' refleja bien el demostrativo hebreo sin suavizar la secuencia apocalíptica.
- source_word: יַעֲמֹד
  english_pob_choice: will arise
  chosen_spanish: se levantará
  alternatives_spanish:
  - se pondrá de pie
  - aparecerá
  - se alzará
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'estar de pie', pero en este contexto apocalíptico comunica una toma de acción decisiva. 'Se levantará' mantiene la imagen verbal y la fuerza dinámica sin volverse demasiado interpretativo.
- source_word: מִיכָאֵל
  english_pob_choice: Michael
  chosen_spanish: Miguel
  alternatives_spanish:
  - Miguel
  lexicon: nombre propio
  rationale: El nombre propio se vierte con la forma establecida en español, sin añadir interpretación.
- source_word: הַשַּׂר הַגָּדוֹל
  english_pob_choice: the great prince
  chosen_spanish: el gran príncipe
  alternatives_spanish:
  - el gran gobernante
  - el gran jefe
  lexicon: HALOT
  rationale: שַׂר se entiende aquí como príncipe, jefe o gobernante. 'Príncipe' conserva el valor tradicional del título angélico-político y 'gran' reproduce גָּדוֹל de forma directa.
- source_word: הָעֹמֵד עַל
  english_pob_choice: who stands over
  chosen_spanish: que está de pie sobre
  alternatives_spanish:
  - que está sobre
  - que vela por
  - que está al frente de
  lexicon: HALOT
  rationale: La imagen hebrea de 'estar sobre' se mantiene en el texto principal. 'Está de pie sobre' conserva la relación espacial y la idea de supervisión/protección sin resolver por completo la ambigüedad del participio. La alternativa más idiomática 'vela por' se deja implícita, no como base del texto.
- source_word: בְּנֵי עַמֶּךָ
  english_pob_choice: the sons of your people
  chosen_spanish: los hijos de tu pueblo
  alternatives_spanish:
  - los hijos de tu pueblo
  - tu pueblo
  lexicon: HALOT
  rationale: Se preserva la expresión filial del hebreo en vez de nivelarla a 'tu pueblo'. Esto respeta la forma del original y su posible matiz colectivo/descendiente.
- source_word: עֵת צָרָה
  english_pob_choice: a time of distress
  chosen_spanish: un tiempo de angustia
  alternatives_spanish:
  - un tiempo de aflicción
  - un tiempo de tribulación
  - un tiempo de angustia
  lexicon: HALOT
  rationale: צָרָה admite distress, trouble, anguish. 'Angustia' es natural en español bíblico contemporáneo y conserva la intensidad sin atenuarla a 'problema' ni cargarla doctrinalmente con 'tribulación'.
- source_word: אֲשֶׁר לֹא נִהְיְתָה מִהְיוֹת גּוֹי
  english_pob_choice: such as has not happened since there was a nation
  chosen_spanish: cual no ha habido desde que hubo nación
  alternatives_spanish:
  - tal como no ha habido desde que existió una nación
  - como no ha sucedido desde que hubo una nación
  lexicon: HALOT
  rationale: La estructura comparativa se mantiene sin expandirla. 'Desde que hubo nación' sigue de cerca el hebreo y evita introducir un plural interpretativo ('naciones') que el texto no dice.
- source_word: יִמָּלֵט
  english_pob_choice: will escape
  chosen_spanish: escapará
  alternatives_spanish:
  - será librado
  - será rescatado
  - escapará
  lexicon: HALOT
  rationale: El verbo nifal puede significar escapar o ser librado. Se conserva 'escapará' como base, en línea con la lectura inglesa, para no convertir de antemano la idea en una formulación más teológica como 'será librado'.
- source_word: כָּל הַנִּמְצָא כָּתוּב
  english_pob_choice: everyone who is found written
  chosen_spanish: todos los que se hallen escritos
  alternatives_spanish:
  - todo el que se halle escrito
  - todos los que estén escritos
  - todos los hallados escritos
  lexicon: HALOT
  rationale: 'La construcción participial se vierte con naturalidad: ''los que se hallen escritos''. Añadir ''todos'' refleja bien כָּל. ''Escritos'' conserva la metáfora del registro sin convertirla en una mera abstracción.'
- source_word: בַּסֵּפֶר
  english_pob_choice: in the book
  chosen_spanish: en el libro
  alternatives_spanish:
  - en el libro
  - en el rollo
  lexicon: HALOT
  rationale: '''Libro'' es el equivalente normal y transparente en español bíblico para סֵפֶר, y respeta el motivo de registro celestial sin forzar ''rollo''.'
theological_decisions:
- issue: Naturaleza de la acción de Miguel
  english_pob_reading: Michael will arise as a heavenly protector taking decisive action on behalf of God's people
  chosen_spanish_reading: Miguel se levantará como príncipe y protector en favor del pueblo de Dios, sin explicitar más allá del hebreo
  alternative_spanish_readings:
  - Miguel se pondrá en pie
  - Miguel entrará en acción
  - Miguel se alzará
  rationale: 'El hebreo admite una gama cercana de matices: estar de pie, levantarse, tomar posición. ''Se levantará'' conserva la acción decisiva sin resolver dogmáticamente el modo exacto de intervención angélica.'
  doctrine_reference: Preservar la tensión interpretativa sin cerrarla.
- issue: Sentido de יִמָּלֵט
  english_pob_reading: your people will escape
  chosen_spanish_reading: tu pueblo escapará, con la posibilidad implícita de ser librado
  alternative_spanish_readings:
  - tu pueblo será librado
  - tu pueblo será rescatado
  - tu pueblo escapará
  rationale: El contexto inmediato es nacional y apocalíptico; por eso se deja el verbo de escape en el texto principal. No se impone una lectura soteriológica más amplia que el verso por sí solo no formula.
  doctrine_reference: No importar al verso una doctrina más específica de la que el texto expresa.
translation_notes:
  revision_awareness: El inglés auditado fue revisado de 'But at that time' a 'And at that time'; la traducción española refleja la repetición simple de la conjunción con 'Y en aquel tiempo' en ambos miembros. También se mantuvo la preferencia de 'will escape' frente a 'will be delivered', sin introducir una solución doctrinal más cerrada.
  spanish_consistency_notes:
  - Se usa 'Y en aquel tiempo' en ambas apariciones para reproducir la repetición hebrea de וּבָעֵת הַהִיא.
  - Se mantiene 'Miguel' como forma estable del nombre propio en español.
  - '''Príncipe'' se conserva para שַׂר, en continuidad con el valor angélico-político del texto.'
  - Se evita 'Señor' u otras sustituciones para el nombre divino, que aquí no aparece.
  - '''Libro'' se mantiene para סֵפֶר por claridad y porque el contexto apocalíptico sugiere un registro escrito.'
