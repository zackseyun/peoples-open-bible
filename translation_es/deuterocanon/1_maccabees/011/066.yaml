translation:
  language: es
  text: Y le pidieron que recibiera garantías de ellos[a], y él se las dio; luego los expulsó de allí, tomó la ciudad y puso en ella una guarnición.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «las manos derechas». La frase se refiere a intercambiar prendas o garantías de paz o lealtad, probablemente simbolizadas por estrechar las manos derechas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠξίωσαν
  english_pob_choice: they asked
  chosen_spanish: le pidieron
  alternatives_spanish:
  - le solicitaron
  - le exigieron
  lexicon: LSJ
  rationale: En este contexto narrativo, el verbo expresa una solicitud o petición; «le pidieron» conserva la relación sintáctica sin intensificar indebidamente la fuerza como exigencia.
- source_word: δεξιὰς
  english_pob_choice: pledges
  chosen_spanish: las diestras
  alternatives_spanish:
  - las manos derechas
  - prendas
  - garantías
  lexicon: LSJ
  rationale: La expresión griega es literalmente «las derechas/manos derechas». Se mantiene la forma concreta en español para no borrar el trasfondo idiomático y la posible señal corporal del pacto.
- source_word: λαβεῖν
  english_pob_choice: to receive
  chosen_spanish: recibiera
  alternatives_spanish:
  - tomara
  - aceptara
  lexicon: LSJ
  rationale: El infinitivo con δεξιὰς forma una construcción idiomática de pedir/recibir una señal de acuerdo. «Recibiera» es la opción más natural y cercana al valor relacional del acto.
- source_word: ἔδωκεν αὐτοῖς
  english_pob_choice: he gave them
  chosen_spanish: él se las dio
  alternatives_spanish:
  - se las concedió
  - se las otorgó
  lexicon: LSJ
  rationale: El griego es breve y el objeto se entiende por el contexto previo. «Se las dio» reproduce la concisión y el sentido de conceder la señal solicitada.
- source_word: ἐξέβαλεν
  english_pob_choice: he drove them out
  chosen_spanish: los expulsó
  alternatives_spanish:
  - los echó
  - los arrojó fuera
  lexicon: LSJ
  rationale: «Expulsó» transmite con claridad la acción forzosa de sacar a alguien de un lugar, sin perder el tono narrativo militar.
- source_word: κατελάβετο
  english_pob_choice: took
  chosen_spanish: tomó
  alternatives_spanish:
  - ocupó
  - se apoderó de
  lexicon: LSJ
  rationale: El verbo medio indica tomar posesión de la ciudad. «Tomó la ciudad» sigue de cerca el valor básico del griego y evita una paráfrasis más interpretativa.
- source_word: φρουράν
  english_pob_choice: a garrison
  chosen_spanish: una guarnición
  alternatives_spanish:
  - una guardia
  - tropas
  lexicon: LSJ
  rationale: En contexto militar, φρουρά remite a una fuerza de custodia o guarnición. «Guarnición» es el equivalente técnico más preciso en español.
- source_word: ἔθετο ἐπʼ αὐτὴν
  english_pob_choice: stationed ... in it
  chosen_spanish: puso en ella
  alternatives_spanish:
  - la colocó allí
  - la estableció sobre ella
  lexicon: LSJ
  rationale: La construcción expresa colocar o establecer una fuerza con propósito de control. «Puso en ella» es suficientemente literal y fluido en español, y evita sobredeterminar la relación espacial.
translation_notes:
  revision_awareness: El inglés auditado corrigió una expansión interpretativa («of good faith») y afinó la clausula final para que el destacamento quede «in it». La versión española evita añadir contenido no presente y conserva la brevedad del griego, pero mantiene explícito el idiomatismo de «las diestras» con nota para no ocultar su sentido convencional.
  spanish_consistency_notes:
  - Se preserva el carácter militar del pasaje con «expulsó», «tomó» y «guarnición».
  - Se evita traducir δεξιὰς como una fórmula eclesiástica o abstracta; la nota explica el giro idiomático.
  - «Y le pidieron» mantiene el sujeto plural y el tono narrativo sin sobrecargar el verbo.
  - No se usa «SEÑOR» ni terminología teológica ajena al pasaje.
