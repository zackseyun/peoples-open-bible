    issue: Marcador de nota mal ubicado
    rationale: La nota [a] explica el término hebreo אָלָה (‘juramento’ / posible ‘juramento con maldición’), pero en el borrador está anclada en ‘Y dijeron’, lo que desinforma al lector y rompe la trazabilidad léxica.
  - severity: medium
    issue: 'Expresión española poco natural: ‘Por favor, haya un juramento’'
    rationale: Aunque intenta reflejar תְּהִי נָא, en español suena forzado. ‘Por favor, que haya un juramento’ o ‘Que haya, por favor, un juramento’ expresa mejor el ruego jussivo sin perder fidelidad.
  revised_spanish_text: 'Y dijeron: «Hemos visto claramente que Yahvé ha estado contigo. Entonces dijimos: “Por favor, que haya un juramento[a] entre nosotros, entre tú y nosotros[b], y hagamos un pacto contigo”».'
  revised_footnotes:
