    text: El término hebreo traducido «gallo erguido» es raro e incierto; otras traducciones incluyen «galgo» o «caballo de guerra».
    reason: lexical_alternative
  - marker: b
    text: 'O bien: «un rey con quien nadie puede alzarse». La expresión hebrea es difícil y admite más de una interpretación plausible.'
    reason: alternative_reading
  revision_rationale: Se corrige la cláusula final a un español natural y fiel ('contra quien nadie se levanta') en lugar de la forma agramatical 'no hay alzarse'. Se conservan la estructura y el sentido adoptados por el POB inglés. Además, se mejoran las notas para reflejar en español las alternativas léxicas y la dificultad interpretativa documentadas en la auditoría inglesa.
