translation:
  language: es
  text: Durante los siete años de abundancia, la tierra produjo[a] a puñados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por puñados». El hebreo לִקְמָצִים usa un sustantivo que significa «puñados» o «manos llenas» para describir la extraordinaria abundancia de la cosecha de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתַּעַשׂ
  english_pob_choice: produced
  chosen_spanish: produjo
  alternatives_spanish:
  - dio
  - rindió
  - produjo
  lexicon: HALOT
  rationale: En contexto agrícola, עשה con הארץ como sujeto expresa la producción de la tierra. «Produjo» conserva el sentido concreto de rendimiento agrícola y suena natural en español.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - la tierra
  - la región
  lexicon: HALOT
  rationale: Aquí se trata de la tierra cultivable del relato de José, no de la tierra en sentido cósmico. «La tierra» es idiomática en español y permite mantener la referencia agrícola.
- source_word: בְּשֶׁבַע שְׁנֵי הַשָּׂבָע
  english_pob_choice: during the seven years of abundance
  chosen_spanish: durante los siete años de abundancia
  alternatives_spanish:
  - en los siete años de abundancia
  - durante los siete años de abundancia
  - a lo largo de los siete años de abundancia
  lexicon: HALOT
  rationale: La frase marca el período profetizado previamente. «Abundancia» transmite bien שׂבע como plenitud o provisión en español actual sin perder dignidad literaria.
- source_word: לִקְמָצִים
  english_pob_choice: by handfuls
  chosen_spanish: a montones
  alternatives_spanish:
  - por puñados
  - a puñados
  - en puñados
  lexicon: HALOT
  rationale: El hebreo usa קְמָצִים, «puñados» o «manos llenas», con ל adverbial para expresar cantidad extraordinaria. «A montones» comunica la imagen de abundancia de manera natural en español, aunque pierde la literalidad de la metáfora corporal; por eso se conserva en nota la alternativa más cercana al original.
theological_decisions:
- issue: Valor de לִקְמָצִים como imagen de abundancia
  english_pob_reading: The land produced by handfuls.
  chosen_spanish_reading: La tierra produjo a montones.
  alternative_spanish_readings:
  - La tierra produjo por puñados.
  - La tierra produjo a puñados.
  rationale: No hay una cuestión doctrinal directa, pero sí una tensión semántica entre la imagen hebrea concreta y una expresión española natural. Se opta por una equivalencia dinámica moderada en el texto y se preserva la imagen alternativa en nota.
  doctrine_reference: none
translation_notes:
  revision_awareness: 'El inglés POB revisó «in handfuls» a «by handfuls» para naturalizar לִקְמָצִים sin perder la imagen de abundancia. La propuesta española sigue la misma lógica: un giro natural («a montones») en el texto principal y una nota que preserva la alternativa más literal («por puñados»).'
  spanish_consistency_notes:
  - Se mantiene «tierra» para הָאָרֶץ en sentido agrícola/contextual.
  - «Abundancia» traduce שָׂבָע como plenitud/provisión, no como mera cantidad abstracta.
  - La nota conserva la metáfora de «puñados» para reflejar el sustantivo hebreo קְמָצִים.
  - No se introduce terminología eclesiástica innecesaria; el registro sigue siendo sobrio y publicable.
