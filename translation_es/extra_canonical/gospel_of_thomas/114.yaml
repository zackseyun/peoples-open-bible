translation:
  language: es
  text: 'Simón Pedro les dijo: «Que María salga de entre nosotros, porque la hembra[a] no es digna de la vida». Jesús dijo: «Mira: yo mismo la guiaré[b], para hacerla varón, de modo que ella también llegue a ser un espíritu vivo, como ustedes varones. Porque toda hembra que se haga varón entrará en el reino de los cielos[c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Se conserva «hembra» para reflejar la oposición terminológica con «varón». Otras versiones podrían decir «mujer», pero eso suaviza la polaridad sexada que el texto enfatiza.
    reason: lexical_alternative
  - marker: b
    text: «La guiaré» traduce el verbo copto de llevar/dirigir. El pronombre objeto femenino singular aparece como ⲙ̄ⲙⲟⲥ en la lineación del manuscrito; la normalización de Dilley presenta el equivalente ⲛⲛⲧⲟⲥ. Ambas formas significan «la».
    reason: textual_variant
  - marker: c
    text: «Los cielos» mantiene el plural del término copto. En español también es posible «el cielo», pero aquí se conserva la forma plural para reflejar el color tradicional de la expresión.
    reason: lexical_alternative
lexical_decisions:
- source_word: ⲥϩⲓⲙⲉ
  english_pob_choice: female
  chosen_spanish: la femenina
  alternatives_spanish:
  - mujer
  - hembra
  lexicon: Crum s.v. ⲥϩⲓⲙⲉ
  rationale: El POB inglés eligió “female” para conservar la polaridad sexada con “male”. En español, “la femenina” mantiene esa oposición directa sin volver a un término más social como “mujer”. No es la opción más natural en español corriente, pero sí la más fiel a la dureza lexical del dicho.
- source_word: ϩⲟⲟⲩⲧ
  english_pob_choice: male
  chosen_spanish: varón
  alternatives_spanish:
  - macho
  - masculino
  lexicon: Crum s.v. ϩⲟⲟⲩⲧ
  rationale: Para ϩⲟⲟⲩⲧ, “varón” comunica sexo masculino en un registro digno y evita el tono zoológico de “macho”. “Masculino” sería más adjetival y menos paralelo al sustantivo sexado que exige el contexto.
- source_word: ⲙⲡϣⲁ ⲁⲛ
  english_pob_choice: is not worthy
  chosen_spanish: no es digna
  alternatives_spanish:
  - no es digna de
  - no es apta para
  lexicon: Crum s.v. ϣⲁ ‘to be worthy’
  rationale: El giro gramatical negativo se expresa en español con “no es digna de”. Conserva el valor de merecimiento/worthiness del original y se ajusta al complemento “de la vida”.
- source_word: ⲡⲱⲛϩ
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  - la existencia
  lexicon: Crum s.v. ⲱⲛϩ
  rationale: Se mantiene “vida” sin estrechar el sentido hacia “salvación” o “vida eterna”; el texto no exige una especificación doctrinal adicional.
- source_word: ⲉⲓⲥϩⲏⲏⲧⲉ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira aquí
  - Mira,
  - He aquí
  lexicon: Layton (grammar) deictic particle
  rationale: “Mira” reproduce el deíctico abrupto y suena natural en español moderno, sin atenuar la llamada de atención del Coptic.
- source_word: ⲥⲱⲕ
  english_pob_choice: lead
  chosen_spanish: guiaré
  alternatives_spanish:
  - conduciré
  - arrastraré
  lexicon: Crum s.v. ⲥⲱⲕ ‘to lead, draw’
  rationale: El verbo admite “guiar” o “conducir”. “Guiaré” conserva la idea de llevar hacia un resultado sin añadir la dureza de “arrastraré”, que en español impondría una connotación más física de la que el contexto inmediato requiere.
- source_word: ⲉⲓⲣⲉ … ⲛϩⲟⲟⲩⲧ
  english_pob_choice: make … male
  chosen_spanish: hacerla varón
  alternatives_spanish:
  - hacerla hombre
  - volverla varón
  lexicon: Crum s.v. ⲉⲓⲣⲉ ‘do/make’; Crum s.v. ϩⲟⲟⲩⲧ ‘male’
  rationale: “Hacerla varón” conserva el predicado sexado y el extrañamiento deliberado del texto. “Hombre” podría oscilar entre sexo y condición humana; “varón” mantiene mejor el paralelo con “femenina”.
- source_word: ⲡⲛⲉⲩⲙⲁ
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  lexicon: Crum s.v. ⲡⲛⲉⲩⲙⲁ (from Gk. πνεῦμα)
  rationale: Aquí funciona como nombre común y no como título divino; por eso se usa minúscula. “Espíritu” con mayúscula introduciría una lectura que el texto no marca expresamente.
- source_word: ⲱⲛϩ (participle)
  english_pob_choice: living
  chosen_spanish: vivo
  alternatives_spanish:
  - viviente
  - viva
  lexicon: Crum s.v. ⲱⲛϩ
  rationale: “Vivo” rinde la cualidad de estar con vida y encaja fluidamente con “espíritu”. Aunque “viviente” también es posible, “vivo” es más directo en español.
- source_word: ⲉⲓⲛⲉ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - semejante a
  lexicon: Crum s.v. ⲉⲓⲛⲉ ‘to be like’
  rationale: “Como” es la equivalencia más natural y directa para la comparación con “ustedes varones”. No añade matices ausentes del original.
- source_word: ⲛⲛⲧⲱⲧⲛ
  english_pob_choice: you (plural)
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: Layton (grammar) independent pronouns
  rationale: “Ustedes” es el plural no marcado en español latinoamericano. Se evita “vosotros” por registro regional y “ustedes mismos” porque el original no enfatiza reflexividad aquí.
- source_word: ⲡⲙⲛⲧⲣⲣⲟ
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - señorío
  lexicon: Crum s.v. ⲙⲛⲧⲣⲣⲟ
  rationale: “Reino” es el equivalente tradicional y compacto; “reinado” o “señorío” introducirían una abstracción distinta que el contexto no obliga.
- source_word: ⲡⲡⲉ
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: Crum s.v. ⲡⲉ/ⲡⲡⲉ
  rationale: Se conserva el plural “los cielos” para reflejar el color plural del Coptic y la decisión del POB inglés, sin normalizar a “el cielo”.
translation_notes:
  revision_awareness: 'La redacción española sigue la versión inglesa auditada en su forma final sin arrastrar marcadores incrustados al texto corriente. Se conservaron las decisiones léxicas clave: female/male, living spirit, kingdom of the heavens, y el carácter abrupto de la fórmula introductoria.'
  spanish_consistency_notes:
  - Se mantuvo la polaridad sexada fuerte del original con femenina/varón, en lugar de suavizarla a mujer/hombre.
  - Se optó por ‘los cielos’ para coherencia con el POB inglés y con el valor plural de ⲡⲡⲉ.
  - Se evitó capitalizar ‘espíritu’ porque no funciona aquí como título propio.
  - El registro busca ser publicable y digno, pero sin domesticar el extrañamiento del dicho.
