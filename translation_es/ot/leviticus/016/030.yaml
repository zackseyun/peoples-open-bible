translation:
  language: es
  text: Porque en este día se hará expiación[a] por ustedes para purificarlos; de todos sus pecados delante de Yahvé quedarán limpios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él hará expiación por ustedes». El verbo hebreo es singular y en esta cláusula no expresa el sujeto explícitamente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la explicación o fundamento del mandato previo. «Porque» conserva la fuerza causal/explanatoria de כִּי y suena natural en español bíblico contemporáneo.
- source_word: בַּיּוֹם הַזֶּה
  english_pob_choice: on this day
  chosen_spanish: en este día
  alternatives_spanish:
  - en aquel día
  - hoy
  lexicon: HALOT
  rationale: La referencia ritual es inmediata y demostrativa. «Este día» preserva la cercanía del hebreo sin forzar una formulación arcaica.
- source_word: יְכַפֵּר
  english_pob_choice: atonement shall be made
  chosen_spanish: se hará expiación
  alternatives_spanish:
  - se hará atonamiento
  - hará expiación
  lexicon: HALOT
  rationale: El verbo כפר en este contexto es cultual. «Expiación» mantiene el término ritual y teológico en español; la pasiva impersonal evita introducir un sujeto no expresado en la cláusula.
- source_word: עֲלֵיכֶם
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - sobre ustedes
  - para ustedes
  lexicon: HALOT
  rationale: Con כפר, la preposición expresa beneficio o referencia en favor de las personas. «Por ustedes» refleja mejor el valor relacional que un literal «sobre ustedes».
- source_word: לְטַהֵר אֶתְכֶם
  english_pob_choice: to cleanse you
  chosen_spanish: para purificarlos
  alternatives_spanish:
  - para limpiarlos
  - para limpiarlos ritualmente
  lexicon: HALOT
  rationale: טהר expresa purificación ritual. «Purificar» conserva ese matiz más claramente que «limpiar» y mantiene la relación entre la expiación y el resultado buscado.
- source_word: מִכֹּל חַטֹּאתֵיכֶם
  english_pob_choice: from all your sins
  chosen_spanish: de todos sus pecados
  alternatives_spanish:
  - de todas sus transgresiones
  - de todas sus faltas
  lexicon: HALOT
  rationale: Aquí חטאת significa pecados, no ofrendas por el pecado. «Pecados» es la opción más directa y fiel al contexto de purificación del pueblo.
- source_word: לִפְנֵי יְהוָה
  english_pob_choice: before the LORD / Yahweh
  chosen_spanish: delante de Yahvé
  alternatives_spanish:
  - ante Yahvé
  - en presencia de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino en la forma preferida del proyecto, Yahvé, según el estándar español del POB. «Delante de» mantiene el valor locativo-relacional de לִפְנֵי.
- source_word: תִּטְהָרוּ
  english_pob_choice: you shall be clean
  chosen_spanish: serán limpios
  alternatives_spanish:
  - quedarán limpios
  - serán purificados
  lexicon: HALOT
  rationale: El qal imperfecto expresa el estado resultante tras la purificación. «Serán limpios» conserva esa condición final sin repetir el verbo de la cláusula anterior.
theological_decisions:
- issue: Término cultual de כפר
  english_pob_reading: atonement shall be made
  chosen_spanish_reading: se hará expiación
  alternative_spanish_readings:
  - se hará atonamiento
  - se hará propiciación
  rationale: La traducción mantiene el lenguaje cultual sin reemplazarlo por una explicación doctrinal más estrecha. «Expiación» comunica el acto ritual de purificación/compensación en el marco levítico.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy — preserve the source text''s cultic categories without importing later doctrinal narrowing'
- issue: Nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: Se adopta la forma estándar del proyecto en español, «Yahvé», en lugar de una sustitución reverencial. Esto preserva la visibilidad del nombre propio del pacto en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: El texto inglés revisado simplificó la puntuación y fijó el registro formal con «shall be made». La versión española sigue esa línea de formalidad, mantiene la secuencia causal del original y evita añadir sujetos implícitos donde el hebreo es impersonal o elíptico.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar español del proyecto.
  - Se prefiere «expiación» para כפר y «purificar/purificación» para טהר, manteniendo la distinción cultual entre el acto y su resultado.
  - «Pecados» refleja חטאתֵיכֶם en este contexto, no «ofrendas por el pecado».
  - La estructura final conserva la relación entre expiación, purificación y resultado de limpieza, sin fusionar indebidamente los términos.
