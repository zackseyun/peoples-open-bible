lexical_decisions:
- source_word: וְאִם
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Si
  lexicon: HALOT
  rationale: El hebreo introduce un caso contrastivo respecto del versículo anterior; en español, «Pero si» comunica mejor ese giro adversativo que un simple «si», y suena natural en registro legal.
- source_word: נְקֵבָה
  english_pob_choice: a female
  chosen_spanish: una mujer
  alternatives_spanish:
  - una hembra
  - un ser femenino
  - una femenina
  lexicon: HALOT
  rationale: En este contexto de valoración legal, el término hebreo designa el sexo femenino. En español, «mujer» resulta más natural y digno que «hembra», pero conserva la referencia a una persona femenina sin añadir especificación ajena al texto.
- source_word: הִוא
  english_pob_choice: it is
  chosen_spanish: es
  alternatives_spanish:
  - ella es
  lexicon: HALOT
  rationale: El hebreo usa un pronombre femenino singular; en español, tras «si es una mujer» no hace falta repetir el sujeto. La forma verbal simple mantiene fluidez sin perder el referente.
- source_word: וְהָיָה
  english_pob_choice: then ... shall be
  chosen_spanish: entonces ... será
  alternatives_spanish:
  - y será
  - y resultará
  lexicon: HALOT
  rationale: En lenguaje jurídico, la construcción expresa el resultado normativo de la condición. «Entonces ... será» reproduce bien esa apódosis sin forzar un calco.
- source_word: עֶרְכְּךָ
  english_pob_choice: your valuation
  chosen_spanish: tu tasación
  alternatives_spanish:
  - tu valoración
  - tu valuación
  - el valor que fijes
  lexicon: HALOT
  rationale: Para Levítico 27, el sentido es el valor asignado oficialmente para el voto. «Tasación» conserva el matiz técnico de valoración establecida, y el posesivo de segunda persona singular refleja el sufijo hebreo.
- source_word: שְׁלֹשִׁים
  english_pob_choice: thirty
  chosen_spanish: treinta
  alternatives_spanish:
  - treinta y
  lexicon: HALOT
  rationale: Número cardinal directo sin variación de sentido.
- source_word: שָׁקֶל
  english_pob_choice: shekels
  chosen_spanish: siclos
  alternatives_spanish:
  - siclos de plata
  - shéquels
  lexicon: HALOT
  rationale: «Siclo» es el equivalente español establecido para la unidad monetaria/pesos del hebreo; el plural «siclos» es natural y fiel. No se añade «de plata» porque el hebreo no lo expresa aquí.
theological_decisions:
- issue: Valor legal asignado a una mujer en el voto de Levítico 27
  english_pob_reading: The verse gives a fixed valuation for a female in this legal context without adding interpretive clarification.
  chosen_spanish_reading: El versículo presenta una tasación fija para una mujer en este contexto legal, sin añadir aclaraciones interpretativas.
  alternative_spanish_readings:
  - una estimación simbólica
  - un precio ritual
  rationale: No hay indicio en el hebreo de que se trate de un símbolo o de un «precio» en sentido comercial; la fórmula es legal y técnica. «Tasación» conserva mejor esa precisión que términos más cargados.
  doctrine_reference: Levítico 27:1-8; Números 18:16
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el hebreo y el audit trail inglés: mantiene el giro condicional-contrastivo, la valoración legal fija y la ausencia de ampliaciones como «de plata». No se detectaron revisiones previas que afecten este versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija explícitamente; este versículo no lo contiene.
  - Se mantiene la terminología legal «tasación» para ערך en Levítico 27, consistente con el contexto de votos.
  - «Siclos» conserva la unidad de medida/moneda sin añadir materia no expresada en el hebreo.
