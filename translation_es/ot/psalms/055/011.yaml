translation:
  language: es
  text: Día y noche andan alrededor de ella sobre sus muros[a], y dentro de ella hay problemas y miseria[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la rodean sobre sus muros». El verbo hebreo puede destacar tanto el ir alrededor como el cercar.'
    reason: lexical_alternative
  - marker: b
    text: «Problemas y miseria» también puede traducirse «maldad y opresión» o «iniquidad y aflicción», porque los términos hebreos pueden referirse tanto al mal moral como al sufrimiento que produce.
    reason: lexical_alternative
lexical_decisions:
- source_word: יוֹמָם וָלַיְלָה
  english_pob_choice: Day and night
  chosen_spanish: De día y de noche
  alternatives_spanish:
  - Día y noche
  - By day and by night
  - Todo el día y toda la noche
  lexicon: HALOT
  rationale: La pareja temporal hebrea expresa continuidad. «De día y de noche» conserva el valor idiomático de acción incesante con español natural y digno.
- source_word: יְסוֹבְבֻהָ
  english_pob_choice: they go around her
  chosen_spanish: andan alrededor de ella
  alternatives_spanish:
  - la rodean
  - la circundan
  - van alrededor de ella
  lexicon: HALOT
  rationale: El verbo sugiere moverse en torno, con posible matiz iterativo. «Andan alrededor de ella» preserva el movimiento verbal sin fijar demasiado el sujeto ni aplanar la imagen; «rodean» sería más directo pero menos dinámico.
- source_word: עַל חוֹמֹתֶיהָ
  english_pob_choice: on her walls
  chosen_spanish: sobre sus muros
  alternatives_spanish:
  - en sus muros
  - por sus muros
  - sobre sus murallas
  lexicon: HALOT
  rationale: «עַל» permite «sobre/en/upon». «Sobre sus muros» sigue de cerca el hebreo y mantiene la imagen espacial. «Muros» es más sobrio y ampliamente entendible que «murallas» en este contexto.
- source_word: אָוֶן
  english_pob_choice: trouble
  chosen_spanish: maldad
  alternatives_spanish:
  - trouble
  - iniquidad
  - maldad
  - mal
  lexicon: HALOT
  rationale: El término puede abarcar maldad/injusticia y el daño resultante. Dado que el inglés POB deja abierta la tensión moral y social, «maldad» mantiene con claridad el componente ético sin cerrar el sentido a mera calamidad.
- source_word: עָמָל
  english_pob_choice: misery
  chosen_spanish: afán
  alternatives_spanish:
  - miseria
  - opresión
  - trabajo penoso
  - trouble
  lexicon: HALOT
  rationale: «עָמָל» suele referir aflicción, fatiga o trabajo penoso, y también opresión. «Afán» en español bíblico moderno puede expresar esfuerzo angustioso o fatiga opresiva; conserva mejor la amplitud semántica que «miseria», que suena más a pobreza que a opresión activa.
- source_word: בְּקִרְבָּהּ
  english_pob_choice: are within her
  chosen_spanish: dentro de ella hay
  alternatives_spanish:
  - están dentro de ella
  - en su interior hay
  - están en su seno
  lexicon: HALOT
  rationale: La expresión hebrea significa «en su medio / dentro de ella». «Dentro de ella hay» fluye bien en español y mantiene la personificación de la ciudad sin añadir explicaciones.
theological_decisions:
- issue: Ambigüedad moral y social de אָוֶן וְעָמָל
  english_pob_reading: '''Trouble and misery'' may also be rendered ''wickedness and oppression'' or ''iniquity and trouble,'' since the Hebrew terms can denote both moral evil and the suffering it produces.'
  chosen_spanish_reading: «maldad y afán»
  alternative_spanish_readings:
  - «opresión y miseria»
  - «iniquidad y afán»
  - «maldad y opresión»
  rationale: 'El hebreo permite una tensión entre mal moral y daño sufrido. «Maldad y afán» conserva esa amplitud: el primer término resalta el mal ético; el segundo puede abarcar aflicción/opresión sin reducirse a pobreza material. Así no se elimina la ambigüedad documentada por el POB en inglés.'
  doctrine_reference: Lexical semantics; social evil and its effects
- issue: Imagen urbana/personificación femenina en בְּקִרְבָּהּ
  english_pob_reading: are within her
  chosen_spanish_reading: dentro de ella hay
  alternative_spanish_readings:
  - están dentro de ella
  - en su interior hay
  - están en su seno
  rationale: El texto personifica a la ciudad como femenina. «Dentro de ella hay» conserva la personificación sin forzar una formulación demasiado literal que suene pesada en español.
  doctrine_reference: Poetic personification
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios relevantes de revisión: la lectura base permanece estable, con acuerdo alto en la evaluación cruzada. Se mantuvo la ambigüedad léxica documentada para אָוֶן y עָמָל en una forma española publicable.'
  spanish_consistency_notes:
  - Se emplea «Dios»/«Yahvé» según norma general del proyecto, pero este versículo no los contiene.
  - Se prefirió «muros» por claridad contemporánea; «murallas» queda disponible como alternativa sin cambiar el sentido.
  - La traducción conserva el paralelismo poético y la personificación de la ciudad.
  - Se evitó una equivalencia rígidamente moralizante para no borrar la tensión entre maldad y sufrimiento presente en el hebreo.
