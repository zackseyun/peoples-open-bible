translation:
  language: es
  text: Cuando Israel salió de Egipto[a], la casa de Jacob de un pueblo de habla extraña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de un pueblo que hablaba una lengua extranjera'. El hebreo describe un habla que resultaba ajena o ininteligible para Israel.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/צֵאת
  english_pob_choice: When ... went out
  chosen_spanish: Cuando ... salió
  alternatives_spanish:
  - Al salir de
  - En la salida de
  lexicon: HALOT
  rationale: El infinitivo constructo con ב introduce una cláusula temporal. En español, 'Cuando ... salió' preserva la relación temporal de manera natural y fiel al valor verbal del hebreo, sin nominalizar en exceso.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: Nombre propio bíblico
  rationale: Se mantiene el nombre propio del pueblo del pacto, sin añadir explicación que el hebreo no exige.
- source_word: מִ/מִּצְרָיִם
  english_pob_choice: from Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: El מן marca separación o procedencia. En español, 'de Egipto' funciona bien con 'salió' y conserva la relación fuente/separación que el verso expresa.
- source_word: בֵּית יַעֲקֹב
  english_pob_choice: the house of Jacob
  chosen_spanish: la casa de Jacob
  alternatives_spanish:
  - la casa de Jacob
  - la casa de Israel
  lexicon: HALOT
  rationale: Se conserva la designación poética y pactal 'casa de Jacob' como paralelo de 'Israel', sin sustituirla por una formulación más interpretativa.
- source_word: מֵ/עַם
  english_pob_choice: from a people
  chosen_spanish: de un pueblo
  alternatives_spanish:
  - de una gente
  - lejos de un pueblo
  lexicon: HALOT
  rationale: El hebreo marca separación con מן. En español, 'de un pueblo' mantiene la estructura paralela con 'de Egipto' y prepara la caracterización del término siguiente.
- source_word: לֹעֵז
  english_pob_choice: of strange speech
  chosen_spanish: de habla extraña
  alternatives_spanish:
  - de lengua extranjera
  - de habla extranjera
  - de lengua extraña
  lexicon: HALOT
  rationale: El participio/adjetivo describe una habla ajena o ininteligible desde la perspectiva de Israel. 'De habla extraña' conserva la extrañeza lingüística sin imponer con demasiada fuerza una etiqueta étnica o cultural.
theological_decisions:
- issue: Paralelismo poético de las dos líneas
  english_pob_reading: 'The second line is retained as a parallel restatement of the exodus: ''the house of Jacob'' parallels ''Israel,'' and ''from a people of strange speech'' parallels ''from Egypt.'''
  chosen_spanish_reading: 'La segunda línea se conserva como paralelismo poético del éxodo: ''la casa de Jacob'' corresponde a ''Israel'', y ''de un pueblo de habla extraña'' corresponde a ''de Egipto''.'
  alternative_spanish_readings:
  - Tratar la segunda línea como una aposición explicativa sin repetir la idea verbal.
  - Unificar las dos líneas en una sola idea expositiva.
  rationale: El hebreo usa paralelismo sin sobreexplicarlo. La traducción conserva la repetición y la elipsis implícita para respetar la forma poética y su fuerza retórica.
  doctrine_reference: Poética bíblica; equivalencia óptima con preservación de paralelismo semántico.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; la versión española sigue de cerca esas decisiones léxicas y el paralelismo preservado, ajustando únicamente la naturalidad sintáctica del español.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' no aplicable aquí, ya que el versículo no contiene el nombre divino.
  - '''Casa de Jacob'' se conserva como sintagma fijo poético sin domesticarlo a ''descendientes de Jacob''.'
  - La nota de pie de página marca la ambigüedad de לֹעֵז entre 'habla extraña' y 'lengua extranjera'.
