id: LUK.2.14
reference: Luke 2:14
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Δόξα ἐν ὑψίστοις θεῷ καὶ ἐπὶ γῆς εἰρήνη ἐν ἀνθρώποις ⸀εὐδοκίας.
base_translation:
  language: en
  yaml_path: translation/nt/luke/002/014.yaml
  text: Glory to God in the highest[c][b][a], and on earth peace among people of good pleasure.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'among people with whom he is pleased.'
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'and on earth peace, good will among men.'
    reason: textual_variant
  - marker: c
    text: '''Men'' here represents humanity in a generic sense.'
    reason: cultural_note
translation:
  language: ko
  text: 「지극히 높은 곳에서는 하나님께 영광이요, 땅에서는 그분께서 기뻐하시는 사람들에게 평화입니다.」
  philosophy: optimal-equivalence
theological_decisions:
- issue: 2:14 「ἐν ἀνθρώποις εὐδοκίας」의 번역
  chosen_reading: 그분께서 기뻐하시는 사람들에게 평화
  alternative_readings:
  - 사람들에게 평화, 그분의 호의
  - 사람들에게 기쁨의 평화
  rationale: 속격 「εὐδοκίας」는 SBLGNT 본문에서 신적 호의의 대상이 되는 사람들을 가리킨다. 「선의의 사람들」(라틴-비잔틴 전통)이 아니라 「하나님의 은총을 받은 자들에게 임할 평화」로 옮긴다.
  doctrine_reference: 'DOCTRINE.md: SBLGNT critical reading'
