translation:
  language: es
  text: Se desviaron allí y llegaron a la casa del joven levita, a la casa de Miqueas, y le preguntaron[a] por su bienestar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «y lo saludaron» o «y le preguntaron si todo estaba bien». El modismo hebreo literalmente se refiere a inquirir por la paz o el bienestar de alguien.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּסוּרוּ
  english_pob_choice: They turned aside
  chosen_spanish: Se desviaron
  alternatives_spanish:
  - Se apartaron
  - Tomaron desvío
  lexicon: HALOT
  rationale: סוּר expresa apartarse de la ruta o desviarse hacia otro lugar. «Se desviaron» conserva el movimiento de cambio de rumbo y suena natural en español narrativo.
- source_word: שָׁמָּה
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - a ese lugar
  lexicon: HALOT
  rationale: El adverbio direccional se vierte naturalmente como «allí» en español para indicar el destino hacia el que se desvían.
- source_word: וַיָּבֹאוּ אֶל
  english_pob_choice: and came to
  chosen_spanish: y llegaron a
  alternatives_spanish:
  - y vinieron a
  - y entraron en
  lexicon: HALOT
  rationale: בוא con אֶל marca llegada. «Llegaron a» mantiene la secuencia narrativa sin añadir la idea de ingreso físico que no está explícita.
- source_word: בֵּית הַנַּעַר הַלֵּוִי
  english_pob_choice: the house of the young Levite
  chosen_spanish: la casa del joven levita
  alternatives_spanish:
  - la casa del joven, el levita
  - la casa del levita joven
  lexicon: HALOT
  rationale: נַעַר se refiere aquí a un joven; הַלֵּוִי identifica su tribu/condición. «Joven levita» reproduce ambos elementos de forma breve y comprensible en español.
- source_word: בֵּית מִיכָה
  english_pob_choice: the house of Micah
  chosen_spanish: la casa de Micah
  alternatives_spanish:
  - la casa de Miqueas
  lexicon: HALOT
  rationale: Se conserva el nombre tal como aparece en el contexto inglés auditado para este personaje. La construcción posesiva hebrea se expresa con naturalidad como «la casa de Micah».
- source_word: וַיִּשְׁאֲלוּ ל֖וֹ לְשָׁלוֹם
  english_pob_choice: and asked him about his welfare
  chosen_spanish: y le preguntaron por su bienestar
  alternatives_spanish:
  - y lo saludaron
  - y le preguntaron si todo estaba bien
  - y le preguntaron por su paz
  lexicon: HALOT
  rationale: El hebreo es un modismo de inquirir por la paz/bienestar de alguien. «Por su bienestar» preserva el sentido idiomático sin reducirlo a un simple saludo.
translation_notes:
  revision_awareness: El texto inglés auditado y la revisión más reciente no requieren cambios sustanciales; la versión española sigue de cerca el sentido hebreo y el registro narrativo del pasaje.
  spanish_consistency_notes:
  - Se mantiene «levita» como sustantivo/identidad tribal, no como adjetivo suelto.
  - «Micah» se conserva sin adaptación para mantener coherencia con el contexto auditado; puede normalizarse a «Miqueas» en otros registros si el proyecto lo requiere.
  - La nota al pie conserva la ambigüedad idiomática de לְשָׁלוֹם y ofrece equivalentes españoles válidos sin imponer uno solo.
