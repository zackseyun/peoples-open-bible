translation:
  language: es
  text: Pero cuando Timoteo supo del avance de Judas, envió por delante a las mujeres y el resto del bagaje al lugar llamado Carnión, pues el lugar era difícil de sitiar y difícil de alcanzar, a causa de la estrechez de todos los parajes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «por la estrechez de todos los lugares», refiriéndose a los accesos estrechos alrededor del sitio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφοδον
  english_pob_choice: advance
  chosen_spanish: avance
  alternatives_spanish:
  - ataque
  - asalto
  - expedición
  lexicon: LSJ
  rationale: En este contexto militar, ἔφοδον refiere al movimiento de aproximación de Judas y sus fuerzas. «Avance» conserva el sentido bélico sin forzar la idea de un asalto ya consumado.
- source_word: μεταλαβὼν
  english_pob_choice: learned of
  chosen_spanish: supo de
  alternatives_spanish:
  - recibió noticia de
  - se enteró de
  - conoció el avance de
  lexicon: LSJ
  rationale: El participio expresa que Timoteo recibió información sobre el movimiento de Judas. «Supo de» es natural en español y mantiene la idea de haber recibido noticia.
- source_word: προεξαπέστειλεν
  english_pob_choice: sent ... ahead
  chosen_spanish: envió por delante
  alternatives_spanish:
  - envió antes
  - despachó de antemano
  lexicon: LSJ
  rationale: El verbo compuesto indica envío previo o hacia delante. «Envió por delante» reproduce esa dirección temporal y espacial de manera idiomática.
- source_word: ἀποσκευήν
  english_pob_choice: baggage
  chosen_spanish: bagaje
  alternatives_spanish:
  - equipaje
  - pertenencias
  - bienes móviles
  lexicon: LSJ
  rationale: ἀποσκευήν alude a las pertenencias transportables que acompañan al grupo. «Bagaje» conserva el matiz de carga o impedimenta en registro militar.
- source_word: τὸ λεγόμενον Κάρνιον
  english_pob_choice: the place called Carnion
  chosen_spanish: un lugar llamado Carnión
  alternatives_spanish:
  - el lugar llamado Carnión
  - el llamado Carnión
  lexicon: LSJ
  rationale: λεγόμενον introduce la designación del sitio. «Un lugar llamado Carnión» es fiel y fluido en español, sin sobreinterpretar la naturaleza exacta del sitio.
- source_word: δυσπολιόρκητον
  english_pob_choice: hard to besiege
  chosen_spanish: difícil de sitiar
  alternatives_spanish:
  - duro de sitiar
  - fácilmente insitiable
  lexicon: LSJ
  rationale: El adjetivo expresa una dificultad táctica para el asedio. «Difícil de sitiar» es la equivalencia más clara y natural.
- source_word: δυσπρόσιτον
  english_pob_choice: difficult to approach
  chosen_spanish: difícil de aproximarse
  alternatives_spanish:
  - de difícil acceso
  - inaccesible
  lexicon: LSJ
  rationale: El término señala dificultad de acceso. Se opta por una formulación que conserva el valor espacial concreto del griego, sin volverlo absoluto con «inaccesible».
- source_word: χωρίον
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  - la región
  - la fortaleza
  lexicon: LSJ
  rationale: χωρίον es un término general para localidad o lugar. «El lugar» mantiene la amplitud del griego sin introducir una identificación más específica de la que ofrece el texto.
- source_word: διὰ τὴν πάντων τῶν τόπων στενότητα
  english_pob_choice: because of the narrowness of all the surrounding terrain
  chosen_spanish: a causa de la estrechez de todos los parajes
  alternatives_spanish:
  - porque todos los accesos eran estrechos
  - a causa de la angostura de toda la zona
  lexicon: LSJ
  rationale: La frase griega habla literalmente de la estrechez de todos los lugares. «Parajes» preserva el plural y el carácter geográfico del original, sin añadir detalles que el texto no especifica.
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue calificada como de alta concordancia y no requirió cambios sustantivos. La única observación relevante fue léxica: la frase final admite una lectura más literal («la estrechez de todos los lugares») que apunta a los accesos angostos del emplazamiento; esa alternativa se conserva en nota.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el tetragrámaton ni una referencia directa al nombre divino.
  - Se prefirió vocabulario militar y geográfico concreto («avance», «sitiar», «bagaje», «parajes») para respetar el tono táctico del pasaje.
  - No se introdujo «Cristo/Mesías» ni otro término teológico no presente en el versículo.
