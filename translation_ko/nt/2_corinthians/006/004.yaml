  text: ἀλλ’ ἐν παντὶ ⸀συνιστάνοντες ἑαυτοὺς ὡς θεοῦ διάκονοι· ἐν ὑπομονῇ πολλῇ, ἐν θλίψεσιν, ἐν ἀνάγκαις, ἐν στενοχωρίαις,
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/006/004.yaml
  text: 'but in everything commending ourselves as God''s servants: in great endurance, in afflictions, in hardships, in distresses,'
  footnotes:
  - marker: a
    text: Or 'in every way.' The Greek phrase is broad and may describe every circumstance or every respect in which they prove themselves.
    reason: lexical_alternative
  - marker: b
    text: Or 'as servants of God' or 'as God's ministers.' The Greek διάκονοι emphasizes service; 'ministers' is possible but may sound more institutional in English.
    reason: lexical_alternative
  - marker: c
    text: Or 'with much endurance.' The repeated 'in' reflects the Greek structure of the suffering list.
    reason: lexical_alternative
translation:
  language: ko
  text: '도리어 모든 면에서 우리는 하나님의 일꾼으로서 우리 자신을 추천합니다: 큰 인내 가운데, 환난 가운데, 곤경 가운데, 짓눌림 가운데,'
  philosophy: optimal-equivalence
