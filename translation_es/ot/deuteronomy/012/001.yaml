    text: O «y las ordenanzas» para «y los juicios».
    reason: lexical_alternative
  - marker: b
    text: O «para heredarla» para «para que la posean».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «sobre la tierra»; algunos lo entienden más estrechamente como «en la tierra».
    reason: lexical_alternative
  revision_rationale: Se revisa la pareja legal a «estatutos y juicios» para conservar con mayor fidelidad la distinción hebrea y la decisión léxica auditada en inglés. Se ajusta la cláusula verbal a «tendrán cuidado de cumplir» para reflejar mejor שׁמר + infinitivo en español natural y reverente. Se corrige la nota a para que preserve una alternativa significativa sin invertir la opción principal más fiel.
