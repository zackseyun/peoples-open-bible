  revision_awareness: 'El pasaje coincide en sentido con el texto griego de Swete y con la auditoría inglesa: estructura temporal simple, plural natural en español para el verbo, y un giro espacial conservado sin sobreinterpretación. No se detectaron revisiones textuales que alteren la lectura.'
