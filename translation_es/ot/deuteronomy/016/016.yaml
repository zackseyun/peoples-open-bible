translation:
  language: es
  text: 'Tres veces al año todos tus varones se presentarán[a] ante Yahvé tu Dios, en el lugar que él escoja: en la fiesta de los Panes sin Levadura, en la fiesta de las Semanas y en la fiesta de las Cabañas[b]. Ninguno se presentará ante Yahvé con las manos vacías[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será visto ante Yahvé»; el verbo hebreo es literalmente pasivo/reflexivo, pero en este contexto funciona como el modismo de presentarse ante Dios.
    reason: lexical_alternative
  - marker: b
    text: «La fiesta de las Cabañas» se traduce tradicionalmente «la fiesta de los Tabernáculos».
    reason: alternative_reading
  - marker: c
    text: «Con las manos vacías» significa venir sin el don u ofrenda requeridos.
    reason: cultural_note
lexical_decisions:
- source_word: יֵרָאֶה
  english_pob_choice: shall appear
  chosen_spanish: se presentarán
  alternatives_spanish:
  - se verán
  - aparecerán
  - comparecerán
  lexicon: HALOT
  rationale: El nifal de ראה aquí funciona de manera idiomática como presentarse ante Dios en una fiesta de peregrinación. «Se presentarán» conserva el sentido formal y natural en español, y evita una pasividad literal que suena extraña.
- source_word: כָל זְכוּרְךָ
  english_pob_choice: all your males
  chosen_spanish: todos tus varones
  alternatives_spanish:
  - todos los varones de entre ustedes
  - todos tus hombres
  lexicon: HALOT
  rationale: El hebreo marca explícitamente el grupo masculino obligado por la ley. «Varones» mantiene esa precisión sin suavizarla con un término genérico.
- source_word: פְּנֵי יְהוָה אֱלֹהֶיךָ
  english_pob_choice: before Yahweh your God
  chosen_spanish: ante Yahvé tu Dios
  alternatives_spanish:
  - en presencia de Yahvé tu Dios
  - delante de Yahvé tu Dios
  lexicon: HALOT
  rationale: «Ante» expresa bien la idiomática hebrea de presentarse en la presencia de Dios. Se conserva «Yahvé» para יְהוָה, conforme al criterio del proyecto, y «tu Dios» para אֱלֹהֶיךָ.
- source_word: בַּמָּקוֹם אֲשֶׁר יִבְחָר
  english_pob_choice: in the place that he will choose
  chosen_spanish: en el lugar que él escoja
  alternatives_spanish:
  - en el lugar que él escogerá
  - en el sitio que él elija
  lexicon: HALOT
  rationale: El imperfecto señala el lugar aún por determinar por la elección divina. «Escoja» conserva esa fuerza futura-volitiva en un español natural.
- source_word: חַג הַמַּצּוֹת
  english_pob_choice: the Feast of Unleavened Bread
  chosen_spanish: la fiesta de los Panes sin Levadura
  alternatives_spanish:
  - la fiesta de los Panes Ázimos
  - la fiesta de los Panes sin fermento
  lexicon: HALOT
  rationale: En español, la designación más transparente y bíblica es «Panes sin Levadura», que comunica el nombre festivo con claridad. Se evita «Ázimos» por menos accesible al lector general.
- source_word: חַג הַשָּׁבֻעוֹת
  english_pob_choice: the Feast of Weeks
  chosen_spanish: la fiesta de las Semanas
  alternatives_spanish:
  - la fiesta de las Siete Semanas
  - la fiesta de Pentecostés
  lexicon: HALOT
  rationale: Se conserva el nombre hebreo literal del festival, no el nombre griego posterior. «Semanas» refleja directamente שָׁבֻעוֹת.
- source_word: חַג הַסֻּכּוֹת
  english_pob_choice: the Feast of Booths
  chosen_spanish: la fiesta de las Cabañas
  alternatives_spanish:
  - la fiesta de los Tabernáculos
  - la fiesta de las Enramadas
  lexicon: HALOT
  rationale: «Cabañas» traduce de manera clara y relativamente directa סֻכּוֹת. Se prefiere a «Tabernáculos», que es tradicional pero menos transparente para el lector moderno.
- source_word: וְלֹא יֵרָאֶה אֶת פְּנֵי יְהוָה רֵיקָם
  english_pob_choice: No one shall appear before Yahweh empty-handed
  chosen_spanish: No se presentarán ante Yahvé con las manos vacías
  alternatives_spanish:
  - No comparecerán ante Yahvé vacíos
  - No se presentarán ante Yahvé sin ofrenda
  lexicon: HALOT
  rationale: רֵיקָם en este contexto cultual significa no venir sin la ofrenda o el don requeridos. «Con las manos vacías» transmite la fuerza idiomática en español y mantiene la idea de que nadie debe presentarse sin su presente.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahvé
  - Jehová
  rationale: El texto hebreo usa directamente el Tetragrama. En español, el proyecto usa «Yahvé» como transliteración del nombre divino, evitando la sustitución por un título como «SEÑOR» y preservando el nombre propio del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance legal de כָל זְכוּרְךָ
  english_pob_reading: all your males
  chosen_spanish_reading: todos tus varones
  alternative_spanish_readings:
  - todos tus hombres
  - todos los varones entre ustedes
  rationale: El hebreo especifica varones, no la comunidad en general. Se mantiene esa delimitación legal y ritual sin neutralizar el género del mandato.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del último pase, y la redacción mantiene el acuerdo alto con la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יְהוָה.
  - Se conserva el registro legal y masculino de «todos tus varones».
  - 'Los nombres festivos se traducen con equivalentes transparentes: «Panes sin Levadura», «Semanas» y «Cabañas».'
  - La frase final usa una equivalencia idiomática («con las manos vacías») para רֵיקָם sin perder el sentido cultual.
