  rationale: Se normalizan los nombres propios a formas más legibles y reconocibles en español bíblico ('Irija', 'Selemías'), se elimina un pronombre innecesario para mejorar la naturalidad, y se corrige la nota de alternativas para que no repita la lectura principal. El sentido del hebreo y la lógica lexical del POB se mantienen intactos.
