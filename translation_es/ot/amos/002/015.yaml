  source_alignment_summary: 'El borrador refleja bien la estructura tripartita del hebreo y la mayoría de las decisiones léxicas auditadas: תֹפֵשׂ הַקֶּשֶׁת como expresión participial, קַל בְּרַגְלָיו como descripción de rapidez, y יְמַלֵּט נַפְשׁוֹ como ‘salvar su vida’. Sin embargo, añade una expansión interpretativa en לֹא יַעֲמֹד con ‘se mantendrá firme’, donde la auditoría inglesa preserva el más literal ‘will not stand’ y solo relega ‘hold his ground/stand firm’ a nota. También hay un problema en las notas: la nota [c] española no corresponde a la nota [c] inglesa, que documenta una alternativa para la cláusula del jinete, no para נֶפֶשׁ.'
