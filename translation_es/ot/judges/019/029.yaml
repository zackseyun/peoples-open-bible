    rationale: חזק con ב describe agarrar o sujetar con fuerza. «Se apoderó de» puede sonar más abstracto o de dominio que de contacto físico inmediato.
  revised_spanish_text: Cuando entró en su casa, tomó el cuchillo, agarró a su concubina y la cortó, miembro por miembro[a], en doce pedazos, y la envió por todo el territorio de Israel.
  revised_footnotes:
  - marker: a
    text: Hebreo literalmente, «según sus huesos»; aquí es un giro idiomático que expresa que la cortó por sus miembros o partes esqueléticas.
    reason: lexical_alternative
  revision_rationale: La revisión restituye en el texto principal el matiz de לַעֲצָמֶיהָ con «miembro por miembro», en línea con la evidencia hebrea y el POB inglés, mientras mantiene una nota con la literalidad «según sus huesos». También cambia «se apoderó de» por «agarró a», que suena más físico y directo para חזק con ב. No se requiere adjudicación adicional.
