translation:
  language: es
  text: Y extenderá sus manos en medio de él, como un nadador extiende las suyas para nadar, y abatirá su orgullo junto con la destreza de sus manos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la habilidad de sus manos», o «los ardides» o «las artimañas de sus manos». La expresión hebrea es difícil y puede referirse no a una destreza neutral, sino a recursos mañosos o estratagemas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּפֵרַשׂ
  english_pob_choice: will spread out
  chosen_spanish: extenderá
  alternatives_spanish:
  - estirará
  - desplegará
  lexicon: HALOT
  rationale: El hebreo expresa un gesto físico de abrir o tender las manos. En español, «extenderá» comunica bien ese movimiento sin sonar forzado, y mantiene la imagen corporal que requiere el símil.
- source_word: יָדָיו
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - sus brazos
  lexicon: HALOT
  rationale: «Manos» reproduce de forma directa el sustantivo hebreo y conserva la concreción de la imagen. Aunque en español a veces podría entenderse como «brazos», el texto hebreo dice literalmente «manos».
- source_word: בְּקִרְבּוֹ
  english_pob_choice: in its midst
  chosen_spanish: en medio de él
  alternatives_spanish:
  - en su interior
  - dentro de él
  lexicon: HALOT
  rationale: La expresión señala ubicación interna o central respecto del referente inmediato. «En medio de él» preserva la spatialidad sin añadir una especificación interpretativa innecesaria.
- source_word: כַּאֲשֶׁר יְפָרֵשׂ הַשֹּׂחֶה לִשְׂחוֹת
  english_pob_choice: as a swimmer spreads them out to swim
  chosen_spanish: como se extiende el nadador para nadar
  alternatives_spanish:
  - como el nadador extiende sus manos para nadar
  - como se extiende uno que nada para nadar
  lexicon: HALOT
  rationale: El participio sustantivado y el infinitivo forman un símil de acción corporal. «El nadador» mantiene la referencia natural en español y «para nadar» expresa la finalidad de la acción, en línea con el hebreo.
- source_word: וְהִשְׁפִּיל
  english_pob_choice: he will bring down
  chosen_spanish: abatirá
  alternatives_spanish:
  - humillará
  - rebajará
  - hará bajar
  lexicon: HALOT
  rationale: El verbo causativo de שׁפל transmite hacer bajar, rebajar o humillar. «Abatirá» conserva la fuerza concreta del juicio y suena natural en español bíblico contemporáneo.
- source_word: גַּאֲוָתוֹ
  english_pob_choice: his pride
  chosen_spanish: su orgullo
  alternatives_spanish:
  - su altivez
  - su arrogancia
  - su soberbia
  lexicon: HALOT
  rationale: En este contexto de juicio, el término denota exaltación humana. «Orgullo» es claro y fiel; mantiene el sentido moral sin imponer una intensificación que el hebreo no exige de manera exclusiva.
- source_word: עִם
  english_pob_choice: along with
  chosen_spanish: junto con
  alternatives_spanish:
  - junto a
  - con
  lexicon: HALOT
  rationale: La relación coordinativa se expresa de manera natural en español con «junto con». Conserva la idea de que algo es abatido junto con otra realidad asociada.
- source_word: אָרְבּוֹת יָדָיו
  english_pob_choice: the skill of his hands
  chosen_spanish: la destreza de sus manos
  alternatives_spanish:
  - la habilidad de sus manos
  - las artes de sus manos
  - los ardides de sus manos
  lexicon: HALOT
  rationale: El hebreo es difícil y admite matices como habilidad, destreza, recursos o incluso estratagemas. «Destreza» ofrece una solución sobria y transparente, mientras que las alternativas más negativas quedan como posibilidades léxicas sin imponer una lectura excesiva.
theological_decisions:
- issue: Referente singular del discurso poético
  english_pob_reading: The subject and possessive pronouns are rendered generically as 'he/his,' referring to Moab personified in the immediate context.
  chosen_spanish_reading: Se conserva la referencia singular implícita en «él/sus», entendida como personificación de Moab en el contexto inmediato.
  alternative_spanish_readings:
  - leerlo de manera colectiva como «ellos/sus» refiriéndose al pueblo de Moab
  - explicitar «Moab» dentro del verso
  rationale: El hebreo usa formas singulares, y la poesía profética personifica con frecuencia a una nación como individuo. Mantener el singular respeta esa imaginería y evita expandir el texto más allá de lo dicho.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Valor de אָרְבּוֹת יָדָיו
  english_pob_reading: Rendered as 'the skill of his hands' in the main text, with more negative possibilities preserved in a footnote.
  chosen_spanish_reading: Se traduce en el texto principal como «la destreza de sus manos», dejando abierta la ambigüedad léxica.
  alternative_spanish_readings:
  - «la habilidad de sus manos»
  - «los ardides de sus manos»
  - «las artimañas de sus manos»
  rationale: El sustantivo es oscuro y puede apuntar a capacidades técnicas o a recursos/maquinaciones. La elección principal evita afirmar demasiado, pero una nota preserva las alternativas debatidas sin perder el rango semántico del hebreo.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: Se tomó como base el último estado del audit trail en inglés, que mantiene la estructura y la imagen del símil, con una revisión menor en la coordinación final («along with»). La versión española conserva ese alcance, sin suavizar la dificultad de אָרְבּוֹת יָדָיו y reflejando la misma reserva mediante una nota léxica.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología estándar del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se usa «Mesías/Cristo» solo según el contexto; aquí no aplica.
  - Se preserva un registro bíblico moderno y digno, evitando arcaísmos innecesarios como «abatirá» en vez de giros más viejos, pero sin perder solemnidad.
  - La nota a se ancla en «nadar[a]» para corresponder al lugar donde la ambigüedad léxica afecta la comparación completa.
