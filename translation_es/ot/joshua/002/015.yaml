- from: Entonces la bajó con una cuerda[a] por la ventana, porque su casa estaba en el muro de la ciudad, y ella habitaba en el muro.
  to: Entonces los bajó con una cuerda por la ventana, porque su casa estaba en el muro de la ciudad[a], y ella habitaba en el muro.
  rationale: 'Se corrige el error grave de número en el verbo principal: debe ser ''los bajó'', no ''la bajó''. Se reubica y rehace la nota para reflejar la alternativa lexical preservada en la auditoría inglesa, centrada en la localización de la casa dentro/sobre la estructura del muro, que es donde realmente existe la tensión interpretativa del hebreo. Se conserva ''muro'' y ''habitaba'' por fidelidad y buen registro bíblico en español.'
