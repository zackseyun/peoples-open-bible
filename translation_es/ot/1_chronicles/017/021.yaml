    text: O «grandes y asombrosas obras».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «expulsando naciones de delante de tu pueblo»; algunos entienden de otro modo el orden final de las palabras, porque el paralelo en 2 Samuel 7:23 es textualmente difícil.'
    reason: textual_variant
