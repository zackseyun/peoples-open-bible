revisions:
- from: 'Y me habló el hombre, diciendo: «Hijo de hombre, mira con tus ojos, oye con tus oídos, y pon tu corazón en todo lo que yo te muestro, porque para que te lo mostrara fuiste traído aquí. Declara a la casa de Israel todo lo que ves».[a]'
  to: 'Y el hombre me dijo: «Hijo de hombre[a], mira con tus ojos, oye con tus oídos, y pon tu corazón en todo lo que yo te muestro, porque fuiste traído aquí para que yo te mostrara estas cosas. Declara a la casa de Israel todo lo que ves».'
  rationale: Se ajusta la cláusula de propósito para reflejar el sentido colectivo documentado en el inglés POB (‘estas cosas’), se mejora la naturalidad del inicio con ‘Y el hombre me dijo’, y se mueve la nota al lugar correcto junto a ‘Hijo de hombre’. No se requieren cambios doctrinales ni de terminología mayor.
  reviewer_model: gpt-5.4
