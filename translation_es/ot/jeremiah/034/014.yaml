  to: Al cabo de siete años[a], cada uno de ustedes[b] enviará a su hermano hebreo, que haya sido vendido a usted[c] y le haya servido seis años; lo dejará ir libre de su lado. Pero sus padres no me escucharon ni inclinaron el oído.
  rationale: Se ajustó la redacción para lograr un español más natural y digno sin apartarse del hebreo ni del audit trail inglés. «Al cabo de siete años» expresa mejor la culminación del período. «Lo dejará ir libre de su lado» comunica con claridad la liberación y la separación implícita en מֵעִמָּךְ, evitando la frase forzada «libre de usted». También se suavizó el cierre idiomático con «inclinaron el oído», que conserva la imagen hebrea con mejor fluidez en español.
