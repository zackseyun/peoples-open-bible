lexical_decisions:
- source_word: ὅθεν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - De modo que
  lexicon: LSJ
  rationale: ὅθεν introduce una inferencia; «Por tanto» conserva el valor lógico formal del griego y encaja con el registro sobrio del pasaje.
- source_word: γινώσεσθε
  english_pob_choice: you will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - llegarán a saber
  - reconocerán
  lexicon: BDAG
  rationale: El futuro de γινώσκω expresa el resultado que alcanzarán los destinatarios. «Sabrán» es natural en español y mantiene la idea de conocimiento resultante.
- source_word: θεοί
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - deidades
  - seres divinos
  lexicon: LSJ
  rationale: El plural griego niega la pretendida divinidad de los ídolos. «Dioses» conserva la fuerza polémica directa del original sin suavizarla.
- source_word: μὴ οὖν φοβεῖσθε
  english_pob_choice: therefore do not fear
  chosen_spanish: por tanto, no les tengan miedo
  alternatives_spanish:
  - por tanto, no teman
  - así que no les teman
  - por eso no los teman
  lexicon: BDAG
  rationale: La prohibición sigue lógicamente a la afirmación anterior; en español, «no les tengan miedo» expresa con claridad la idea de temor ante estos objetos sin forzar una forma demasiado literal.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - los
  - a ellos
  - a esas imágenes
  lexicon: BDAG
  rationale: Aunque el griego usa un neutro plural, el referente son las imágenes idolátricas tratadas como objetos de temor. «Les» evita añadir un sustantivo no explícito y permite mantener la referencia ambigua entre las imágenes y los supuestos dioses que representan.
theological_decisions:
- issue: Referencia de los pronombres en la negación de divinidad y en el mandato de no temer
  english_pob_reading: The pronouns refer to the idol-images as supposed gods, denied true divinity.
  chosen_spanish_reading: Los pronombres remiten a las imágenes idolátricas como supuestos dioses, negadas como verdaderos dioses.
  alternative_spanish_readings:
  - Remiten más ampliamente a los dioses paganos representados por las imágenes.
  - Remiten directamente solo a las imágenes, sin extenderse a lo que representan.
  rationale: El contexto inmediato del Libro/Carta de Jeremías ataca los ídolos fabricados y niega su divinidad. La redacción española conserva el referente sin cerrarlo en exceso, manteniendo la tensión entre imagen y dios supuesto que el griego deja abierta.
  doctrine_reference: Primacía del texto original; no resolver de manera excesiva la referencia de los pronombres.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés, que reforzó la relación inferencial de οὖν con «therefore». En español se reflejó con «Por tanto» en ambos miembros para mantener la formalidad y la coherencia lógica.
  spanish_consistency_notes:
  - Se mantiene «dioses» para θεοί, conforme al forcejo polémico del original, en lugar de suavizarlo con «deidades».
  - «No les tengan miedo» traduce el prohibitivo sin añadir explicaciones que el griego no explicita.
  - Se usa una sola nota para preservar la ambigüedad referencial de αὐτά, siguiendo el tratamiento del POB inglés.
