  rationale: Se corrige el primer miembro para reflejar con más precisión el modismo hebreo de desagrado y evitar una lectura de maldad moral. También se reemplaza una construcción calcada por un español más natural para la permisión de redención. Se conserva la estructura, el contenido legal y las notas del POB, con una limpieza menor de la nota a.
