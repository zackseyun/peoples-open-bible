review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español no sigue fielmente el testimonio hebreo primario ni la decisión auditada del POB inglés en un punto clave: traduce וּכְקוֹצֵר como «y siembra» en el texto principal, cuando el hebreo dice «y cosecha/siega» y la variante griega «siembra» debía quedar solo en nota. También debilita לְרֹב תְּבוּאָתָהּ («su abundante cosecha/produce») con «sus buenos frutos», que cambia abundancia por cualidad. El resto refleja bien el sentido general: acercarse a la sabiduría personificada, esperar su rendimiento, poco trabajo relativo y pronto comer su fruto.'
  spanish_quality_summary: El español es claro y legible, con tono digno y natural. Sin embargo, «sus buenos frutos» no es la mejor opción por precisión semántica, y «en su labor trabajarás poco» suena algo menos personal que «a su servicio» o «en su servicio», aunque sigue siendo comprensible. «No tardarás en comer de su fruto» es idiomático y transmite bien el valor temporal documentado.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La personificación femenina de la sabiduría se conserva adecuadamente con «ella», «su» y «fruto». El problema central es de alineación textual y de decisiones léxicas auditadas: el español debe seguir el hebreo sobreviviente en el cuerpo principal («ara y cosecha») y reservar «siembra» para la nota variante griega.'
  issues:
  - severity: high
    issue: El texto principal usa «y siembra» donde el hebreo fuente dice «y cosecha/siega».
    rationale: La política auditada del POB para este versículo es seguir el hebreo en el texto principal y consignar la lectura griega en nota. El borrador invierte esa decisión y por eso no preserva fielmente la fuente primaria ni el rastro de auditoría.
  - severity: medium
    issue: «Sus buenos frutos» no refleja bien «לְרֹב תְּבוּאָתָהּ / her abundant produce».
    rationale: El original enfatiza abundancia de rendimiento, no principalmente calidad moral o sensorial. «Buenos frutos» introduce un matiz distinto y además cambia de «produce/cosecha» a «frutos» antes de que «fruto» aparezca al final del versículo.
  - severity: low
    issue: La decisión teológica documentada en el borrador contradice indebidamente la del POB inglés.
    rationale: El campo `chosen_spanish_reading` afirma seguir el griego en el cuerpo principal, pero el expediente inglés ya resolvió seguir el hebreo y dejar la variante en nota. Esto debe corregirse para coherencia editorial, aunque el problema principal ya se corrige en el texto.
  revised_spanish_text: Acércate a ella como uno que ara y cosecha[a], y espera su abundante cosecha. Porque en su servicio trabajarás solo un poco[b], y antes de mucho comerás de su fruto.
  revised_footnotes:
  - marker: a
    text: El griego dice «como uno que ara y siembra» en lugar de «ara y cosecha».
    reason: textual_variant
  - marker: b
    text: El hebreo dice literalmente «mañana»; aquí el sentido probable es «antes de mucho» o «pronto», en línea con el «rápidamente» del griego.
    reason: lexical_alternative
  revision_rationale: 'Se corrigió el cuerpo principal para seguir el hebreo superviviente y la decisión auditada del POB: «ara y cosecha» en vez de «ara y siembra», dejando la lectura griega solo en nota. También se restauró la idea de abundancia en «su abundante cosecha» para reflejar רֹב תְּבוּאָתָהּ. Se mantuvo la personificación femenina y se conservó una expresión temporal natural en español («antes de mucho») que representa el hebreo literal «mañana» según la nota auditada.'
