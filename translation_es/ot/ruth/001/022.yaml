translation:
  language: es
  text: Así que Noemí volvió, y Rut la moabita, su nuera, con ella, la que volvió de los campos de Moab[a]. Y llegaron a Belén al comienzo de la siega de la cebada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «de la región de Moab». El hebreo dice «de los campos de Moab».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתָּשָׁב
  english_pob_choice: returned
  chosen_spanish: volvió
  alternatives_spanish:
  - regresó
  - volvió de nuevo
  lexicon: HALOT
  rationale: שוב expresa volver o regresar. «Volvió» es natural en español y preserva el movimiento narrativo sin añadir matices no presentes en el hebreo.
- source_word: הַמּוֹאֲבִיָּה
  english_pob_choice: the Moabite
  chosen_spanish: la moabita
  alternatives_spanish:
  - la mujer de Moab
  - la mujer moabita
  lexicon: HALOT
  rationale: Es un adjetivo gentilicio usado sustantivamente. «La moabita» conserva el peso identitario que el texto da a Rut.
- source_word: כַלָּתָהּ
  english_pob_choice: her daughter-in-law
  chosen_spanish: su nuera
  alternatives_spanish:
  - su hija política
  lexicon: HALOT
  rationale: El parentesco directo y usual en español es «nuera»; comunica con claridad la relación familiar.
- source_word: עִמָּהּ
  english_pob_choice: with her
  chosen_spanish: con ella
  alternatives_spanish:
  - junto con ella
  lexicon: HALOT
  rationale: Equivale de forma directa a la preposición con sufijo pronominal y mantiene la compañía de Rut.
- source_word: הַשָּׁבָה
  english_pob_choice: the one who returned
  chosen_spanish: la que volvió
  alternatives_spanish:
  - la que había vuelto
  - volviendo
  lexicon: HALOT
  rationale: El participio femenino funciona de modo appositivo y, por el flujo del español, «la que volvió» conserva esa relación sin sobrecargar la sintaxis.
- source_word: מִשְּׂדֵי מוֹאָב
  english_pob_choice: from the fields of Moab
  chosen_spanish: de los campos de Moab
  alternatives_spanish:
  - del campo de Moab
  - del territorio de Moab
  lexicon: HALOT
  rationale: שׂדה es «campo»; el plural constructo se refleja con «campos». Se mantiene la imagen concreta del hebreo, tal como la POB inglesa prefirió «fields» frente a una paráfrasis territorial.
- source_word: וְהֵמָּה
  english_pob_choice: And they
  chosen_spanish: Y
  alternatives_spanish:
  - Y ellos
  - Entonces
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis, pero en español puede quedar absorbido con naturalidad por la coordinación narrativa.
- source_word: בָּאוּ
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - entraron
  lexicon: HALOT
  rationale: «Llegaron» es el equivalente narrativo más natural cuando ya se menciona el destino. Conserva el sentido de arrival del verbo de movimiento.
- source_word: בֵּית לֶחֶם
  english_pob_choice: Bethlehem
  chosen_spanish: Belén
  alternatives_spanish:
  - Bethlehem
  lexicon: HALOT
  rationale: En español bíblico estándar, el topónimo se expresa como «Belén»; es claro, tradicional y plenamente reconocible.
- source_word: בִּתְחִלַּת
  english_pob_choice: at the beginning of
  chosen_spanish: al comienzo de
  alternatives_spanish:
  - al inicio de
  - al principio de
  lexicon: HALOT
  rationale: El sustantivo de tiempo indica inicio; «al comienzo de» suena natural y fiel al constructo hebreo.
- source_word: קְצִיר שְׂעֹרִים
  english_pob_choice: the barley harvest
  chosen_spanish: la siega de la cebada
  alternatives_spanish:
  - la cosecha de cebada
  - la cosecha de la cebada
  lexicon: HALOT
  rationale: La cadena constructa es literalmente «siega de cebadas/barley». «Siega» reproduce bien el acto agrícola del contexto, y «cebada» preserva el cultivo específico.
translation_notes:
  revision_awareness: La versión española sigue la revisión inglesa más reciente al mantener la clausula appositiva con comas y sin guion largo, conservando la relación entre Rut y su regreso con una sintaxis fluida en español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera explícitamente; este versículo no lo contiene.
  - Se usa «Belén» como topónimo bíblico habitual en español, sin alterar el sentido del hebreo.
  - La nota al pie preserva la alternativa lexical del inglés POB sobre מִשְּׂדֵי מוֹאָב, porque en español también existe la tensión entre la imagen concreta de «campos» y la lectura más idiomática de región/país.
