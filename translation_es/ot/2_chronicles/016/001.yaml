revisions:
- from: En el año treinta y seis del reinado de Asa[a], Baasa, rey de Israel, subió contra Judá y fortificó Ramá, para no permitir que nadie saliera ni entrara a Asa, rey de Judá.
  to: En el año treinta y seis del reinado de Asa[a], Baasa, rey de Israel, subió contra Judá y edificó Ramá, para no permitir que nadie saliera de o entrara a donde estaba Asa, rey de Judá.
  rationale: Se ajustó ‘fortificó’ a ‘edificó’ para reflejar mejor el verbo hebreo בנה sin sobreespecificarlo. También se reformuló la cláusula final para que el español comunique con claridad el sentido de bloqueo de acceso relacionado con Asa, evitando la expresión poco natural ‘entrara a Asa’. Se conservó la nota cronológica y la datación masorética en el texto principal.
