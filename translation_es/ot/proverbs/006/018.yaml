review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura bipartita y el sentido del hebreo: «corazón» para לֵב, «planes» para מַחְשְׁבוֹת, y la imaginería literal de «pies» que se apresuran a correr hacia el mal. La alternativa de nota para חֹרֵשׁ también preserva el matiz de tramar/idear. No obstante, la nota misma está formulada de manera poco natural en español editorial y conviene normalizarla.'
  spanish_quality_summary: 'El texto principal es claro, fiel y ampliamente legible en español eclesial moderno. «Maquina planes perversos» suena natural y dignificado. El único ajuste necesario es de presentación y estilo en la nota al pie: quitar comillas sobrantes y la puntuación inglesa calcada.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. Las decisiones léxicas principales son adecuadas: «corazón», «maquina», «planes», «perversos», «pies», «se apresuran», «correr», «hacia el mal».'
  issues:
  - severity: low
    issue: Redacción no idiomática de la nota al pie
    rationale: 'La nota actual dice: ''O: «un corazón que trama planes perversos».'', con comillas simples externas y puntuación algo calcada del inglés. En español editorial bíblico suena más limpio: «O: “un corazón que trama planes perversos”». Sin punto final dentro de la cita si el estilo del proyecto no lo exige.'
  revised_spanish_text: un corazón que maquina planes perversos[a], pies que se apresuran a correr hacia el mal,
  revised_footnotes:
  - marker: a
    text: 'O: «un corazón que trama planes perversos».'
    reason: lexical_alternative
  revision_rationale: Se conserva íntegramente el texto principal porque es fiel al hebreo y natural en español. Se ajusta la nota al pie como reparación menor de estilo/editorial y se normaliza su reason para alinearla con la función léxica documentada en el audit trail inglés.
