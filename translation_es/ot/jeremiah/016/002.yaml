revisions:
- from: No tomarás esposa para ti[a], ni tendrás hijos ni hijas en este lugar.
  to: No tomarás esposa[a], ni tendrás hijos ni hijas en este lugar.
  rationale: Se aplica una reparación menor para mejorar la naturalidad y dignidad del español sin perder la fuerza léxica del hebreo. Se elimina 'para ti', porque en español suena calco innecesario; el sentido personal del mandato ya está implícito. Se conserva 'tomarás esposa' como equivalente formal de 'take a wife', y la alternativa más dinámica 'No te casarás' permanece en la nota, en línea con el rastro POB inglés. No se requiere adjudicación adicional.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:29:55Z'
