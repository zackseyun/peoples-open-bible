base_translation:
  language: en
  yaml_path: translation/ot/isaiah/044/008.yaml
  text: Do not fear[a], and do not tremble. Have I not long ago made you hear and declared it? And you are my witnesses. Is there a God besides me? There is no Rock[c][b]; I know of none.
  footnotes:
