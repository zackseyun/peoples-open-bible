revisions:
- from: Te acostarás[a], y nadie te hará temer; muchos te rogarán tu favor.
  to: Te acostarás, y nadie te hará temer; muchos procurarán tu favor[a].
  rationale: Se corrige la segunda cola para lograr español natural y fiel al modismo hebreo חִלּוּ פָנֶיךָ. «Procurarán tu favor» conserva la idea de buscar o solicitar favorablemente el trato de alguien. Se traslada la nota al lugar relevante y se explica la literalidad del hebreo, siguiendo la justificación auditada del POB inglés.
