translation:
  language: es
  text: Los mensajeros[a] salieron apresurados por mandato del rey, y el decreto fue promulgado en Susa la ciudadela. Y el rey y Amán se sentaron a beber, pero la ciudad de Susa quedó confundida[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'correos reales' o 'mensajeros oficiales'. El hebreo se refiere a portadores de despachos del rey en un contexto administrativo persa.
    reason: lexical_alternative
  - marker: b
    text: O 'quedó en tumulto', 'quedó perpleja' o 'fue puesta en confusión'. El hebreo puede abarcar desconcierto y agitación cívica.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָרָצִים
  english_pob_choice: the couriers
  chosen_spanish: los couriers
  alternatives_spanish:
  - los mensajeros
  - los corredores
  lexicon: HALOT
  rationale: En este contexto persa administrativo, el término designa a portadores oficiales de despachos. Se conserva el sentido funcional de la POB en un préstamo transparente, aunque 'couriers' no es español nativo; la alternativa más natural sería 'mensajeros', pero pierde algo del matiz técnico de servicio estatal.
- source_word: דְחוּפִים
  english_pob_choice: hurried
  chosen_spanish: apresuradamente
  alternatives_spanish:
  - con prisa
  - apurados
  - precipitados
  lexicon: HALOT
  rationale: El participio comunica urgencia impuesta sobre los portadores. 'Apresuradamente' mantiene el valor adverbial y suena natural en español sin añadir una causa distinta.
- source_word: בִּדְבַר הַמֶּלֶךְ
  english_pob_choice: by the king’s command
  chosen_spanish: por la orden del rey
  alternatives_spanish:
  - según la palabra del rey
  - por la palabra del rey
  - por mandato del rey
  lexicon: HALOT
  rationale: דבר aquí tiene fuerza de mandato autoritativo, no mera palabra hablada. 'Orden' comunica bien esa autoridad y evita la ambigüedad de 'palabra' en español.
- source_word: הַדָּת
  english_pob_choice: the decree
  chosen_spanish: el decreto
  alternatives_spanish:
  - la ley
  - el edicto
  lexicon: HALOT
  rationale: En Ester, דָּת suele referirse a una disposición oficial de corte persa. 'Decreto' es claro y formal; 'ley' podría sugerir un código general, y 'edicto' sería posible pero menos directo en español actual.
- source_word: נִתְּנָה
  english_pob_choice: was issued
  chosen_spanish: fue promulgado
  alternatives_spanish:
  - fue dado
  - fue publicado
  lexicon: HALOT
  rationale: Aunque literalmente significa 'fue dado', el uso administrativo apunta a publicación/enactment formal. 'Promulgado' conserva ese valor jurídico y la pasiva pasible de la forma hebrea.
- source_word: שׁוּשַׁן הַבִּירָה
  english_pob_choice: Susa the citadel
  chosen_spanish: Susa la ciudadela
  alternatives_spanish:
  - Susa la fortaleza
  - la ciudadela de Susa
  lexicon: HALOT
  rationale: בירה denota el complejo fortificado/palaciego. 'Ciudadela' reproduce bien la idea de recinto fortificado y mantiene la apposición breve del hebreo.
- source_word: יָשְׁבוּ לִשְׁתּוֹת
  english_pob_choice: sat down to drink
  chosen_spanish: se sentaron a beber
  alternatives_spanish:
  - se sentaron para beber
  - comenzaron a beber
  lexicon: HALOT
  rationale: Se conserva el giro idiomático y el contraste narrativo con la agitación pública. 'Sentarse a beber' refleja la escena sin sobreinterpretarla.
- source_word: נָבוֹכָה
  english_pob_choice: was thrown into confusion
  chosen_spanish: quedó confundida
  alternatives_spanish:
  - quedó perpleja
  - quedó en tumulto
  - fue puesta en confusión
  lexicon: HALOT
  rationale: El nifal expresa desorden, desconcierto o agitación. 'Quedó confundida' mantiene el estado resultante de la ciudad, aunque 'en tumulto' también sería posible según el matiz contextual.
- source_word: וְ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  lexicon: Hebrew syntax
  rationale: 'La conjunción final introduce un contraste narrativo: mientras el rey y Amán beben, la ciudad está en confusión. ''Pero'' reproduce ese giro discursivo mejor que ''y'' en español.'
theological_decisions:
- issue: Tensión entre 'decreto', 'ley' y 'edicto' para דָּת en el marco persa.
  english_pob_reading: the decree
  chosen_spanish_reading: el decreto
  alternative_spanish_readings:
  - la ley
  - el edicto
  rationale: No se homogeneiza a 'ley' porque en Ester el término apunta a una disposición oficial de corte, no necesariamente a un código moral o toráhico. 'Decreto' preserva la fuerza jurídico-administrativa y evita una carga eclesiástica ajena al texto.
  doctrine_reference: Lenguaje jurídico del Antiguo Testamento; administración persa en Ester.
- issue: Contraste narrativo entre el banquete real y la confusión de la ciudad.
  english_pob_reading: the king and Haman sat down to drink, but the city of Susa was thrown into confusion
  chosen_spanish_reading: el rey y Amán se sentaron a beber, pero la ciudad de Susa quedó confundida
  alternative_spanish_readings:
  - '... y la ciudad de Susa fue puesta en confusión'
  - '... y la ciudad de Susa estuvo en tumulto'
  rationale: Se conserva el contraste moral y narrativo sin intensificarlo doctrinalmente. 'Pero' en español expresa mejor la oposición implícita que una simple coordinación.
  doctrine_reference: Ninguna doctrina; decisión de cohesión narrativa.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: couriers, hurried, command, decree, issued, Susa the citadel, sat down to drink, was thrown into confusion, y la revisión sin cambios aprobada. La versión española mantiene la misma estructura narrativa y conserva la tensión léxica entre ''decreto'' y las posibles alternativas jurídicas, además del contraste final entre la calma del palacio y la confusión de la ciudad.'
  spanish_consistency_notes:
  - Se usa 'Amán' para el nombre propio, conforme a la ortografía española habitual.
  - Se mantiene 'Susa la ciudadela' como equivalente conciso de la apposición hebrea.
  - Se evitó 'SEÑOR' o alusiones no presentes; el verso no contiene el nombre divino.
  - El texto opta por español moderno y digno, evitando arcaismos innecesarios.
