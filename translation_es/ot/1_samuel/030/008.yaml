  yaml_path: translation/ot/1_samuel/030/008.yaml
  text: And David inquired of Yahweh[a], saying, “Should I pursue after this raiding party? Will I overtake it?” And he said to him, “Pursue, for you will surely overtake[b], and you will surely rescue.”
