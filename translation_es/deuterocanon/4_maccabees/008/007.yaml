    text: 'Or ''believe'' or ''trust'': the Greek imperative can denote belief, but here it functions as a demand to submit to the king''s proposal.'
    reason: lexical_alternative
  - marker: b
    text: Or 'the ancestral statute of your commonwealth/constitution.' The Greek can be rendered more civically, but the phrase likely refers to the inherited Jewish order of life under its ancestral law.
    reason: lexical_alternative
