translation:
  language: es
  text: Una flecha clavada en un muslo carnoso[a], así es una palabra en el vientre de un necio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Una flecha alojada en la carne del muslo»; el griego es comprimido y puede entenderse de manera levemente distinta, pero la imagen es la de una flecha incrustada en la carne del muslo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: βέλος
  english_pob_choice: arrow
  chosen_spanish: flecha
  alternatives_spanish:
  - dardo
  - proyectil
  lexicon: LSJ
  rationale: βέλος designa un arma/proyectil; «flecha» conserva la imagen proverbial concreta y es natural en español.
- source_word: πεπηγὸς
  english_pob_choice: stuck
  chosen_spanish: clavada
  alternatives_spanish:
  - hincada
  - embebida
  - atascada
  lexicon: LSJ
  rationale: 'El participio perfecto de πήγνυμι expresa un estado resultante: algo fijado o alojado. «Clavada» comunica bien en español la idea de quedar incrustada o fijada en la carne.'
- source_word: ἐν μηρῷ
  english_pob_choice: in the thigh
  chosen_spanish: en un muslo
  alternatives_spanish:
  - en el muslo
  - en la pierna
  - en los lomos
  lexicon: LSJ
  rationale: μηρός es «muslo» de manera específica. El artículo indefinido español hace natural la frase proverbial sin perder la referencia anatómica.
- source_word: σαρκός
  english_pob_choice: of flesh
  chosen_spanish: de carne
  alternatives_spanish:
  - carnoso
  - del cuerpo
  lexicon: LSJ
  rationale: Aquí σάρξ es literal y físico, no teológico. «De carne» mantiene la rudeza e inmediatez de la imagen y evita diluir el término en «cuerpo».
- source_word: λόγος
  english_pob_choice: word
  chosen_spanish: palabra
  alternatives_spanish:
  - dicho
  - declaración
  - mensaje
  lexicon: LSJ
  rationale: En el proverbio se trata de una expresión verbal retenida dentro de alguien; «palabra» es la equivalencia más directa y amplia en español.
- source_word: ἐν κοιλίᾳ
  english_pob_choice: in the belly
  chosen_spanish: en el vientre
  alternatives_spanish:
  - en el vientre interior
  - en las entrañas
  lexicon: LSJ
  rationale: κοιλία puede ser «vientre» o «estómago». «Vientre» conserva el paralelismo corporal con la primera colon y resulta claro en español actual.
- source_word: μωροῦ
  english_pob_choice: of a fool
  chosen_spanish: de un necio
  alternatives_spanish:
  - de un tonto
  - de un insensato
  - del necio
  lexicon: LSJ
  rationale: En contexto sapiencial, μωρός describe a la persona moral e intelectualmente necia. «Necio» preserva la fuerza proverbial y es más digno que «tonto».
theological_decisions:
- issue: σάρξ como término corporal literal
  english_pob_reading: literal 'flesh'
  chosen_spanish_reading: '''carne'' literal'
  alternative_spanish_readings:
  - '''cuerpo'''
  - '''físico'''
  rationale: Siguiendo la lectura del POB en inglés, aquí σάρξ no tiene sentido doctrinal de 'naturaleza pecaminosa'; es parte de una comparación corporal. Traducirlo por «carne» mantiene la tensión imagética del texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, σάρξ'
translation_notes:
  revision_awareness: El inglés POB revisó «the thigh of flesh» a «a fleshy thigh» para mayor naturalidad sin perder la imagen. En español se siguió esa misma dirección con «un muslo de carne», una formulación natural que conserva el paralelismo corporal del proverbio.
  spanish_consistency_notes:
  - Se mantuvo «carne» para σάρξ por su sentido literal, evitando la atenuación a «cuerpo».
  - «Necio» se eligió por su valor sapiencial tradicional y su precisión semántica.
  - La estructura con dos miembros y guion largo reproduce el paralelismo proverbial del original.
