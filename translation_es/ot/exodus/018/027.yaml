translation:
  language: es
  text: Entonces Moisés despidió a su suegro[a], y él se fue a su propia tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «despidió a su suegro, y él se fue a su tierra».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְשַׁלַּח
  english_pob_choice: sent ... away
  chosen_spanish: despidió
  alternatives_spanish:
  - lo dejó ir
  - lo envió lejos
  lexicon: HALOT
  rationale: El piʿel de שׁלח, con objeto personal, aquí expresa dar por terminada la permanencia y dejar partir a alguien. En español, «despidió» reproduce bien la idea de envío con despedida formal, sin perder la fuerza pragmática del acto.
- source_word: חֹתְנוֹ
  english_pob_choice: his father-in-law
  chosen_spanish: su suegro
  alternatives_spanish:
  - su pariente por matrimonio
  lexicon: HALOT
  rationale: En este contexto el término se refiere claramente a Jetro, el padre de la esposa de Moisés. «Suegro» es la equivalencia natural y precisa en español.
- source_word: וַיֵּלֶךְ לוֹ
  english_pob_choice: and he went
  chosen_spanish: y él se fue
  alternatives_spanish:
  - y partió
  - y se marchó
  lexicon: HALOT
  rationale: La construcción idiomática comunica la partida de Jetro. En español, el verbo pronominal «se fue» expresa de manera natural ese movimiento sin añadir matices no presentes en el hebreo.
- source_word: אֶל אַרְצוֹ
  english_pob_choice: to his own land
  chosen_spanish: a su propia tierra
  alternatives_spanish:
  - a su tierra
  - a su país
  lexicon: HALOT
  rationale: אֶרֶץ puede significar tierra o país, según el contexto. «Su propia tierra» conserva el sentido posesivo y evita introducir una noción moderna de estado-nación que el hebreo no requiere.
translation_notes:
  revision_awareness: 'El texto hebreo y la auditoría inglesa coinciden plenamente en el sentido básico: Moisés despide a su suegro y éste regresa a su tierra. No se registran revisiones textuales ni tensiones interpretativas relevantes en este versículo.'
  spanish_consistency_notes:
  - Se mantiene «suegro» para חֹתְנוֹ por ser el término contextual exacto.
  - Se eligió «despidió» para reflejar el valor de envío con despedida de וַיְשַׁלַּח.
  - «Su propia tierra» conserva el matiz de pertenencia de אֶל אַרְצוֹ sin sobrerinterpretar «país».
  - La nota alternativa refleja la posibilidad de una formulación más breve, pero no cambia el sentido.
