    issue: Cambio de segunda persona singular a plural en el mandato
    rationale: El hebreo הָלֹךְ וְאָמַרְתָּ significa ‘Ve y di’, dirigido a un solo destinatario. ‘Vayan y digan’ cambia el referente y debilita la fidelidad al texto fuente.
  - severity: medium
    issue: Puntuación excesivamente compleja en el discurso citado
    rationale: Las comillas dobles más comillas simples internas y rayas alrededor de ‘declara Yahvé’ dificultan la lectura en español. Puede resolverse con una sola capa de comillas y una puntuación más limpia sin pérdida de sentido.
  - severity: low
    issue: Nota léxica puede formularse con mayor precisión
    rationale: La nota actual mezcla sustantivos (‘disciplina’, ‘corrección’) con la perífrasis verbal ‘recibir instrucción’. Conviene mantener alternativas más paralelas y cercanas a la auditoría inglesa.
  revised_spanish_text: 'Así dice Yahvé de los ejércitos, el Dios de Israel: «Ve y di a los hombres de Judá y a los habitantes de Jerusalén: “¿No aceptarán instrucción[a] y escucharán mis palabras?, declara Yahvé”».'
  revised_footnotes:
