translation:
  language: es
  text: Junto a él, Uzziel hijo de Harhaía, uno de los orfebres, hizo reparaciones; y junto a él, Hananías, uno de los perfumistas, hizo reparaciones. Y restauraron[a] Jerusalén hasta la Muralla Ancha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dejaron». El verbo hebreo suele significar «dejar», pero en este contexto de reconstrucción se entiende comúnmente como «restaurar» o «reparar».
    reason: lexical_alternative
lexical_decisions:
- source_word: עַל יָדוֹ
  english_pob_choice: Next to him
  chosen_spanish: Junto a él
  alternatives_spanish:
  - Al lado de él
  - A su lado
  lexicon: HALOT
  rationale: En Nehemías 3 la expresión marca la posición adyacente dentro de la secuencia de trabajo. «Junto a él» conserva la relación espacial de forma natural en español sin introducir un calco opaco.
- source_word: הֶחֱזִיק
  english_pob_choice: made repairs
  chosen_spanish: hizo reparaciones
  alternatives_spanish:
  - fortaleció
  - reparó
  lexicon: HALOT
  rationale: En este capítulo el verbo funciona de manera idiomática para la labor de reconstrucción del muro. «Hizo reparaciones» comunica la acción de manera clara y fiel al contexto constructivo.
- source_word: צֹרְפִים
  english_pob_choice: one of the goldsmiths
  chosen_spanish: uno de los orfebres
  alternatives_spanish:
  - uno de los plateros
  - uno de los metalúrgicos
  - uno de los refinadores
  lexicon: HALOT
  rationale: El término designa el oficio del grupo al que pertenecía Uzziel. «Orfebres» es un equivalente moderno y suficientemente amplio para el trabajo con metales preciosos, sin forzar una precisión inexistente.
- source_word: הָרַקָּחִים
  english_pob_choice: one of the perfumers
  chosen_spanish: uno de los perfumistas
  alternatives_spanish:
  - uno de los fabricantes de perfumes
  - uno de los ungüentarios
  - uno de los boticarios
  lexicon: HALOT
  rationale: La expresión alude a quienes preparaban perfumes o ungüentos. «Perfumistas» es claro, contemporáneo y evita un arcaísmo como «boticarios».
- source_word: וַיַּעַזְבוּ
  english_pob_choice: they restored
  chosen_spanish: restauraron
  alternatives_spanish:
  - dejaron
  - repararon
  - reconstruyeron
  lexicon: HALOT
  rationale: Aunque el verbo básico puede significar «dejar», en este contexto de lista de obras se entiende como la restauración de Jerusalén. «Restauraron» mantiene la solución de la POB inglesa y conserva la tensión lexical del hebreo sin traducirla mecánicamente como «dejaron».
- source_word: יְרוּשָׁלַםִ
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - la muralla de Jerusalén
  - la ciudad de Jerusalén
  lexicon: HALOT
  rationale: El hebreo nombra la ciudad, probablemente por metonimia de sus defensas. Se conserva «Jerusalén» en el texto principal, como en la POB inglesa, sin añadir explícitamente «muralla» al cuerpo del verso.
- source_word: הַחוֹמָה הָרְחָבָה
  english_pob_choice: the Broad Wall
  chosen_spanish: la Muralla Ancha
  alternatives_spanish:
  - el Muro Ancho
  - la muralla ancha
  lexicon: HALOT
  rationale: La expresión parece designar un elemento conocido de las fortificaciones de Jerusalén. Se capitaliza como nombre propio funcional («Muralla Ancha») para reflejar ese valor identificador, preservando a la vez el sentido literal de «ancha».
theological_decisions:
- issue: Metonimia en «Y restauraron Jerusalén»
  english_pob_reading: The city name stands by metonymy for its fortifications; the English keeps Jerusalem in the main text and signals the repair sense in a footnote.
  chosen_spanish_reading: Se conserva «Jerusalén» en el texto principal, entendida por metonimia de sus defensas, y se expresa el resultado como «restauraron».
  alternative_spanish_readings:
  - Restauraron la muralla de Jerusalén
  - Repararon Jerusalén
  rationale: El hebreo menciona la ciudad, no añade explícitamente «muralla». Traducir «Jerusalén» respeta la forma del source text y mantiene la tensión interpretativa señalada por la POB inglesa; «restauraron» hace inteligible el sentido contextual de reconstrucción.
  doctrine_reference: Nehemías 3:8; nota lexical sobre וַיַּעַזְבוּ en el audit trail inglés
translation_notes:
  revision_awareness: 'Se siguió el pasaje base WLC y el audit trail inglés de la POB, sin cambios respecto a la última revisión: la decisión clave sigue siendo conservar la metonimia «Jerusalén» en el texto principal y reflejar el valor contextual de וַיַּעַזְבוּ como «restauraron».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió «orfebres» y «perfumistas» por claridad moderna y por cercanía al oficio indicado por el hebreo.
  - La frase «Muralla Ancha» se capitaliza por tratarse de una designación histórica/funcional.
