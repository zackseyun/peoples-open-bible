    issue: La nota [a] está mal anclada y describe una alternativa equivocada.
    rationale: En el rastro inglés, la nota a se refiere a «Bath-shua» frente a «daughter of Shua the Canaanite». En el borrador español, [a] aparece tras «Er» y comenta «le nacieron», lo cual no corresponde ni al lugar ni al contenido de la variante fuente.
  - severity: medium
    issue: «y él lo hizo morir» suena marcado e innecesariamente enfático en español.
    rationale: El hebreo deja el sujeto implícito; en español, añadir «él» introduce énfasis contrastivo no exigido por el original. «y lo hizo morir» mantiene la continuidad narrativa y el matiz causativo con mejor naturalidad.
  - severity: low
