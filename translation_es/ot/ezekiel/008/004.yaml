translation:
  language: es
  text: Y he aquí, allí estaba la gloria del Dios de Israel, como la apariencia que yo había visto en el valle[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “en la llanura”. El hebreo בִּקְעָה puede referirse a un valle amplio o a una llanura.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְ/הִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y he aquí, mira
  lexicon: HALOT
  rationale: Conserva la fuerza discursiva y la sorpresa visionaria de הִנֵּה sin sonar mecánico en español. 'He aquí' es un equivalente natural y solemne para una escena profética.
- source_word: שָׁם
  english_pob_choice: there was
  chosen_spanish: allí estaba
  alternatives_spanish:
  - allí
  - en aquel lugar estaba
  lexicon: HALOT
  rationale: El hebreo marca localización; en español, 'allí estaba' comunica de forma natural la presencia localizada sin perder el sentido locativo.
- source_word: כְּבוֹד
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - gloria manifiesta
  lexicon: HALOT
  rationale: '''Gloria'' es el equivalente estándar y fiel para כבוד en contextos de manifestación divina, manteniendo el peso teológico y la visibilidad implícita.'
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israel, su Dios
  - el Dios de Israel
  lexicon: HALOT
  rationale: La cadena constructa se traduce de manera directa y transparente. 'El Dios de Israel' preserva la identificación pactual sin introducir paráfrasis.
- source_word: כַּ/מַּרְאֶה
  english_pob_choice: like the appearance
  chosen_spanish: como la apariencia
  alternatives_spanish:
  - como la visión
  - como el aspecto
  lexicon: HALOT
  rationale: '''Apariencia'' refleja bien מראה en sentido de forma visible o aspecto perceptible, y mantiene la comparación con la experiencia previa de Ezequiel.'
- source_word: אֲשֶׁר רָאִיתִי
  english_pob_choice: that I had seen
  chosen_spanish: que yo había visto
  alternatives_spanish:
  - que había visto
  - que vi
  lexicon: HALOT
  rationale: El pluscuamperfecto en español expresa bien la referencia retrospectiva a una visión anterior, como en la lectura auditada del inglés POB.
- source_word: בַּ/בִּקְעָה
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - en la llanura
  - en la llanura amplia
  lexicon: HALOT
  rationale: '''Valle'' es una traducción natural y aceptable del campo semántico de בִּקְעָה. Se conserva la alternativa ''llanura'' por la amplitud posible del término hebreo.'
theological_decisions:
- issue: Naturaleza de la manifestación divina en 'la gloria del Dios de Israel'
  english_pob_reading: Render straightforwardly as a visible manifestation of God's glory without adding explanatory language.
  chosen_spanish_reading: Traducir de forma directa como presencia visible de la gloria divina, sin explicar más de lo que el verso dice.
  alternative_spanish_readings:
  - la esplendorosa manifestación de la presencia de Dios
  - una teofanía técnica
  rationale: El hebreo afirma que allí estaba la gloria del Dios de Israel y la compara con una apariencia anterior. La traducción debe conservar esa fuerza teofánica sin resolverla con explicaciones que el texto no da.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El inglés POB se mantiene sin cambios en esta revisión y la lectura final confirma alta concordancia; la versión española conserva el mismo equilibrio entre literalidad y naturalidad, con la única decisión destacable en בִּקְעָה, donde se preserva la alternativa semántica 'llanura' en nota.
  spanish_consistency_notes:
  - Se usa 'Dios' para אֱלֹהִים y 'gloria' para כָּבוֹד, siguiendo las convenciones del proyecto.
  - '''He aquí'' conserva el tono profético y la inmediatez de la escena.'
  - La nota sobre 'valle/llanura' mantiene abierta la ambigüedad lexical del hebreo sin introducir interpretación adicional.
