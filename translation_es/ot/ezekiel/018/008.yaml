- from: No dará a interés ni tomará ganancia[a]; apartará su mano de la injusticia[b]; ejecutará verdadera justicia entre un hombre y otro[c].
  to: No prestará a interés ni tomará ganancia[a]; apartará su mano de la injusticia[b]; ejecutará verdadera justicia entre un hombre y otro[c].
  rationale: 'Se corrige la primera cláusula para reflejar el sentido idiomático de יִתֵּן con בַּנֶּשֶׁךְ en español natural y fiel: «prestar» en vez de «dar». Se ajusta también la nota [a] para que represente claramente la alternativa completa preservada por el POB inglés.'
