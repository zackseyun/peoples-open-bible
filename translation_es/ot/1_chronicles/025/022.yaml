translation:
  language: es
  text: 'Para el decimoquinto[a], a Jeremot[b]: sus hijos y sus hermanos, doce.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Para el decimoquinto, a Jeremot». La palabra «lote» está implícita por el patrón repetido del capítulo, pero no aparece en el hebreo de este versículo.'
    reason: cross_reference
  - marker: b
    text: O «para Jeremot». La preposición hebrea puede señalar asignación en esta lista.
    reason: lexical_alternative
lexical_decisions:
- source_word: לַחֲמִשָּׁה עָשָׂר
  english_pob_choice: For the fifteenth
  chosen_spanish: Para el decimoquinto
  alternatives_spanish:
  - Para el decimoquinto lote
  - El decimoquinto
  lexicon: HALOT
  rationale: La forma hebrea funciona como ordinal dentro de la fórmula repetida de asignación por sorteo en este capítulo. En español, «para» refleja la preposición ל en el contexto de distribución, y «decimoquinto» conserva el valor ordinal sin añadir «lote» al texto principal, ya que aquí está implícito por el contexto pero no expresado.
- source_word: לִירֵמוֹת
  english_pob_choice: to Jeremoth
  chosen_spanish: para Jeremot
  alternatives_spanish:
  - a Jeremot
  - para Jeremoth
  lexicon: HALOT
  rationale: La preposición ל marca asignación o destino en esta lista, por lo que «para» es natural en español. Se conserva el nombre propio con transliteración habitual en forma breve y readable, «Jeremot».
- source_word: בָּנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos e hijas
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos» con referencia masculina en el marco genealógico/organizativo. En español, «hijos» comunica ese sentido sin forzar una expansión explicativa innecesaria.
- source_word: וְאֶחָיו
  english_pob_choice: and his brothers
  chosen_spanish: y sus hermanos
  alternatives_spanish:
  - y sus parientes
  - y sus hermanos de clan
  lexicon: HALOT
  rationale: La traducción directa «hermanos» preserva la forma hebrea y la posible amplitud referencial del término en un contexto de organización tribal, sin sustituirlo por un término más interpretativo.
- source_word: שְׁנֵים עָשָׂר
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - doce en total
  lexicon: HALOT
  rationale: Es el cardinal estándar y no requiere ampliación en el texto principal.
translation_notes:
  revision_awareness: La traducción inglesa auditada fue revisada y quedó sin cambios; se mantuvo la misma solución interpretativa para la fórmula de sorteo implícita y para la preposición de asignación. No se detectaron cambios textuales que alteren el sentido base del versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Jeremot» como transliteración española breve y transparente del nombre propio.
  - Se conserva la ambigüedad funcional de ל en nota, sin introducir «lote» en el cuerpo del texto.
