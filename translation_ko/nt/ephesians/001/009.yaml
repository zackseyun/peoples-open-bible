  text: γνωρίσας ἡμῖν τὸ μυστήριον τοῦ θελήματος αὐτοῦ, κατὰ τὴν εὐδοκίαν αὐτοῦ ἣν προέθετο ἐν αὐτῷ
base_translation:
  language: en
  yaml_path: translation/nt/ephesians/001/009.yaml
  text: having made known to us the mystery of his will, according to his good pleasure, which he purposed in himself
translation:
  language: ko
  text: 그분 뜻의 비밀[a]을 우리에게 알리셨으니, 이는 그분이 자기 안에서[b] 작정하신 그분의 기쁘신 뜻을 따른 것이며—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: μυστήριον은 본 번역의 정형 어휘로 「비밀」(이전에 감춰져 있었으나 이제 계시된 하나님의 경륜)을 가리킨다.
    reason: lexical_alternative
  - marker: b
    text: ἐν αὐτῷ는 「자기 안에서」 또는 「그(메시아) 안에서」로 읽을 수 있다. 직접 선행사가 「하나님」이므로 본 번역은 재귀적으로 「자기 안에서」를 택한다.
    reason: alternative_reading
lexical_decisions:
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_korean: 비밀
  alternatives_korean:
  - 신비
  - 오의
  lexicon: BDAG
  rationale: 글로서리 기본값. 한국 교회 전통의 「비밀」이 「감춰졌다 계시됨」의 무게를 담는다.
- source_word: προέθετο
  english_pob_choice: purposed
  chosen_korean: 작정하신
  alternatives_korean:
  - 미리 세우신
  - 정하신
  lexicon: BDAG
  rationale: 중간태로 자기 안에서의 계획·결정. 「작정하신」이 자연스럽다.
