review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura proporcional del hebreo: al grupo mayor se le aumenta la herencia y al menor se le reduce. También conserva el valor distributivo de אִישׁ y la relación entre la herencia y el censo. Sin embargo, la frase final «según los contados de él» es demasiado calcada y poco natural en español, aunque intenta seguir la concisión hebrea.'
  spanish_quality_summary: El español es generalmente claro y digno, pero el cierre suena forzado y poco idiomático. «A cada uno se le dará su herencia según sus contados» o «según sus censados» mejora algo, pero sigue siendo extraño. Una solución más fiel y legible es «según sus contados[a]», acompañada de nota aclaratoria que preserve la alternativa más explícita «según su censo» / «según el número de los contados de él». Además, la nota d actual está mal formulada porque presenta como alternativa exactamente la misma expresión del texto y con comillas/estilo inconsistentes.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Herencia» es adecuado para נַחֲלָה. El manejo de אִישׁ como «cada uno» es defendible en español por función distributiva, con nota. No hay nombres divinos ni términos teológicos sensibles aquí.
  issues:
  - severity: medium
    issue: «los contados de él» es una construcción poco natural en español
    rationale: Aunque busca reflejar la concisión del hebreo פְקֻדָיו, en español resulta torpe y oscurece el sentido. Debe mantenerse la relación con el censo, pero con una formulación más legible.
  - severity: medium
    issue: La nota d no aporta una alternativa real y repite el texto
    rationale: 'La nota dice «O: “según los contados de él”» cuando esa misma frase ya está en el texto; además, conviene explicar el sentido censal con una alternativa idiomática real.'
  - severity: low
    issue: Exceso de notas en a y b para una diferencia que el texto ya comunica bien
    rationale: No es incorrecto, pero las notas a y b son prescindibles si se desea un aparato más limpio. Aun así, pueden mantenerse sin problema.
  revised_spanish_text: Al grupo más numeroso aumentarás su herencia, y al grupo menos numeroso disminuirás su herencia; a cada uno[a] se le dará su herencia según sus contados[b].
  revised_footnotes:
  - marker: a
    text: Hebreo «cada hombre», usado distributivamente; el sentido es que cada grupo tribal recibe su herencia en proporción a su número censado.
    reason: lexical_alternative
  - marker: b
    text: 'O: «según el número de los contados de él»; también, «según su censo». El hebreo es conciso y vincula directamente la herencia con el número contado.'
    reason: lexical_alternative
  revision_rationale: 'Se revisó la frase final para evitar el calco rígido «de él», manteniendo a la vez la referencia a los contados del grupo. Se simplificó el aparato de notas para concentrarlo en las dos decisiones realmente significativas: el distributivo de אִישׁ y la expresión concisa פְקֻדָיו.'
