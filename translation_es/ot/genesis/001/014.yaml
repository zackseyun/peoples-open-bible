base_translation:
  language: en
  yaml_path: translation/ot/genesis/001/014.yaml
  text: And God said[a], “Let there be lights in the expanse of the heavens to separate the day from the night, and let them be for signs and for appointed times[d][c][b], and for days and years.”
  footnotes:
  - marker: a
    text: Or “for seasons.” The Hebrew מוֹעֲדִים often means appointed times and can include festal times in other contexts.
    reason: lexical_alternative
  - marker: b
    text: Or “luminaries” for “lights.”
    reason: lexical_alternative
  - marker: c
    text: Or “firmament” or “vault” for “expanse.”
    reason: lexical_alternative
  - marker: d
    text: Or 'for signs and for appointed times, and for days and years'.
    reason: previous_rendering
