    rationale: El hebreo מַהֲלַלְאֵל corresponde a una transliteración como «Mahalalel»; la omisión de la vocal inicial interna en «Mhalalel» no refleja bien el nombre fuente, reduce la legibilidad y contradice la propia alternativa listada en el expediente.
  - severity: low
