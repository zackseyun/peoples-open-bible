translation:
  language: es
  text: 'Así dice Yahvé: Los que sostienen a Egipto caerán, y el orgullo de su fuerza descenderá. De Migdol hasta Siene caerán por la espada dentro de ella, declara el Señor Dios, Yahvé.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: כֹּה אָמַר יְהוָה
  english_pob_choice: Thus says Yahweh
  chosen_spanish: Así dice Yahvé
  alternatives_spanish:
  - Así dice el Señor
  - Esto dice Yahvé
  lexicon: HALOT
  rationale: La fórmula profética se conserva de manera directa y solemne. Se mantiene Yahvé por la política terminológica del proyecto para יְהוָה, en lugar de ocultarlo con «el Señor».
- source_word: סֹמְכֵי מִצְרַיִם
  english_pob_choice: The supporters of Egypt
  chosen_spanish: Los sostenedores de Egipto
  alternatives_spanish:
  - Los que sostienen a Egipto
  - Los apoyos de Egipto
  lexicon: HALOT
  rationale: El participio de סמך expresa sostener o apoyar. «Sostenedores» conserva el sentido activo y formal de quienes apuntalan a Egipto sin añadir una interpretación militar específica.
- source_word: וְנָפְלוּ
  english_pob_choice: will fall
  chosen_spanish: caerán
  alternatives_spanish:
  - van a caer
  - serán derribados
  lexicon: HALOT
  rationale: El futuro simple reproduce bien la fuerza profética y el verbo básico de caer sin introducir pasividad que no está explícita en el hebreo.
- source_word: גְּאוֹן עֻזָּהּ
  english_pob_choice: the pride of her strength
  chosen_spanish: el orgullo de su fuerza
  alternatives_spanish:
  - la soberbia de su poder
  - el orgullo de su poder
  lexicon: HALOT
  rationale: Se conserva la construcción de genitivo con «orgullo» + «fuerza». «Su» mantiene el referente femenino de Egipto/la tierra sin sobreexplicar la imagen.
- source_word: וְיָרַד
  english_pob_choice: will come down
  chosen_spanish: descenderá
  alternatives_spanish:
  - bajará
  - será abatido
  lexicon: HALOT
  rationale: «Descenderá» reproduce con naturalidad el verbo ירד y mantiene la imagen de humillación/caída sin añadir un agente pasivo que el hebreo no expresa.
- source_word: מִמִּגְדֹּל סְוֵנֵה
  english_pob_choice: From Migdol to Syene
  chosen_spanish: De Migdol hasta Siene
  alternatives_spanish:
  - De Migdol a Siene
  - Desde Migdol hasta Siene
  lexicon: HALOT
  rationale: Se conservan los topónimos como marcadores geográficos del alcance total de Egipto, siguiendo la transliteración atestiguada por la tradición española de estos nombres.
- source_word: בַּחֶרֶב
  english_pob_choice: by the sword
  chosen_spanish: por la espada
  alternatives_spanish:
  - a espada
  - con la espada
  lexicon: HALOT
  rationale: La preposición hebrea admite el valor instrumental de juicio mediante la espada. En español, «por la espada» suena más natural que una calca dura y conserva el sentido de medio de muerte.
- source_word: יִפְּלוּ בָהּ
  english_pob_choice: they will fall within her
  chosen_spanish: caerán dentro de ella
  alternatives_spanish:
  - caerán en ella
  - caerán dentro de la tierra
  lexicon: HALOT
  rationale: Se preserva el referente femenino de Egipto/la tierra. «Dentro de ella» comunica el בָּהּ locativo sin forzar una paráfrasis; en el flujo español se integra con la cláusula anterior.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor Dios
  - oráculo del Señor Yahvé
  lexicon: HALOT
  rationale: Se mantiene la fórmula profética final y se distingue אֲדֹנָי de יְהוָה con la combinación «Señor Yahvé». No se sustituye por «SEÑOR» para no perder la transparencia del nombre divino.
theological_decisions:
- issue: Representación de יְהוָה (Tetragrámaton)
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el Señor
  - Jehová
  rationale: El texto hebreo usa directamente el nombre del pacto. La política del proyecto exige transliterarlo como Yahvé en el texto principal para mantener la transparencia y el acceso auditables al original.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Distinción entre אֲדֹנָי y יְהוָה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - el Señor Yahvé
  rationale: La clausula final combina el título אדני con el nombre divino. En español, «Señor Yahvé» preserva ambos elementos sin ocultar el nombre propio detrás de un solo equivalente tradicional.
  doctrine_reference: 'DOCTRINE.md Contested terms: Divine title combinations'
- issue: Valor semántico de בַּחֶרֶב
  english_pob_reading: by the sword
  chosen_spanish_reading: por la espada
  alternative_spanish_readings:
  - con la espada
  - a espada
  rationale: La expresión hebrea funciona idiomáticamente como medio de ejecución/jucio. «Por la espada» comunica ese medio en español de forma natural y conserva la referencia a la violencia judicial del pasaje.
  doctrine_reference: Lexical decision on Hebrew instrumental idioms
translation_notes:
  revision_awareness: 'El inglés POB revisó la clausula final para unir mejor el medio de muerte con el lugar: «they will fall by the sword within her». Esta versión española sigue esa reordenación con «caerán por la espada dentro de ella», manteniendo el alcance geográfico y el referente femenino. También evita la formulación más libre de «those who support Egypt» y preserva el tono formal con «los sostenedores de Egipto».'
  spanish_consistency_notes:
  - Se mantiene Yahvé para יְהוָה a lo largo del versículo, conforme al estándar del proyecto.
  - «Señor Yahvé» traduce la combinación אדני + יהוה sin volver a una máscara litúrgica.
  - Los topónimos se mantienen transliterados y sin explicación en el cuerpo del texto, como en el audit trail inglés.
  - No se introduce nota de pie porque no hay una ambigüedad española adicional que requiera alternativa textual explícita en este versículo.
