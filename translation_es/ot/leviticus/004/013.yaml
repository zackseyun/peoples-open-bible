  text: וְ/אִ֨ם כָּל עֲדַ֤ת יִשְׂרָאֵל֙ יִשְׁגּ֔וּ וְ/נֶעְלַ֣ם דָּבָ֔ר מֵ/עֵינֵ֖י הַ/קָּהָ֑ל וְ֠/עָשׂוּ אַחַ֨ת מִ/כָּל מִצְוֺ֧ת יְהוָ֛ה אֲשֶׁ֥ר לֹא תֵעָשֶׂ֖ינָה וְ/אָשֵֽׁמוּ־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/leviticus/004/013.yaml
  text: And if the whole congregation of Israel sins unintentionally[a], and the matter is hidden from the eyes of the assembly, and they do one of all the things that Yahweh has commanded not to be done, and they become guilty[d][c][b],
  footnotes:
  - marker: a
    text: Or, 'the whole community of Israel.'
    reason: lexical_alternative
  - marker: b
    text: The Hebrew verb here refers to sin committed unintentionally or by error, not deliberate defiance.
    reason: cultural_note
  - marker: c
    text: Hebrew, 'is hidden from the eyes of the assembly,' an idiom meaning that the matter escaped the community's notice.
    reason: lexical_alternative
  - marker: d
    text: Or 'and they do one thing against any of the commandments of the LORD that should not be done'.
    reason: previous_rendering
  ai_draft:
    model_id: gpt-5.4
