lexical_decisions:
- source_word: ὁ τρίτος
  english_pob_choice: The third
  chosen_spanish: El tercero
  alternatives_spanish:
  - El tercer hombre
  - El tercero de ellos
  lexicon: LSJ
  rationale: El artículo con ordinal funciona sustantivado en griego; en español, «el tercero» reproduce esa función de manera natural y breve, sin añadir información no atestiguada.
- source_word: ἔγραψεν
  english_pob_choice: wrote
  chosen_spanish: escribió
  alternatives_spanish:
  - escribió por escrito
  - redactó
  lexicon: LSJ
  rationale: El verbo denota acción de escribir; «escribió» es directo y fiel al sentido narrativo del pasaje.
- source_word: Ὑπερισχύουσιν
  english_pob_choice: are stronger
  chosen_spanish: son más fuertes
  alternatives_spanish:
  - prevalecen
  - tienen la ventaja
  - son superiores en fuerza
  lexicon: LSJ
  rationale: El griego expresa superioridad o prevalencia. «Son más fuertes» conserva la comparación de fuerza elegida en el POB inglés y mantiene el tono proverbial.
- source_word: αἱ γυναῖκες
  english_pob_choice: Women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  - mujeres
  lexicon: LSJ
  rationale: En este contexto la afirmación es general; «las mujeres» preserva el alcance proverbial sin restringir indebidamente a «esposas».
- source_word: ὑπὲρ δὲ πάντα
  english_pob_choice: but above all things
  chosen_spanish: pero por encima de todo
  alternatives_spanish:
  - pero sobre todas las cosas
  - pero más que todo
  lexicon: LSJ
  rationale: La expresión marca un clímax comparativo. «Por encima de todo» es idiomático en español y mantiene la amplitud total del superlativo.
- source_word: νικᾷ
  english_pob_choice: conquers / is victorious
  chosen_spanish: vence
  alternatives_spanish:
  - conquista
  - triunfa
  - sale victoriosa
  lexicon: LSJ
  rationale: El verbo indica victoria o prevalencia. «Vence» reproduce el núcleo verbal sin recargar la frase, y funciona bien con el sujeto abstracto «la verdad».
- source_word: ἡ ἀλήθεια
  english_pob_choice: truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  - la realidad
  lexicon: LSJ
  rationale: «La verdad» mantiene el artículo griego y la personificación del enunciado; en español suena natural y conserva el valor proverbial del término.
theological_decisions:
- issue: Personificación de la verdad como vencedora final
  english_pob_reading: truth conquers above all things
  chosen_spanish_reading: la verdad vence por encima de todo
  alternative_spanish_readings:
  - la verdad triunfa sobre todo
  - la verdad es victoriosa por encima de todo
  rationale: 'No se suaviza la imagen: la verdad aparece como sujeto activo que vence. «Vence» conserva la fuerza de νικᾷ sin transformar la frase en una mera abstracción.'
  doctrine_reference: Preservar la imagen retórica y el matiz verbal del texto fuente; mantener la tensión lexical documentada.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail inglés, que ajustó la segunda cláusula para reflejar con más precisión νικᾷ como victoria de la verdad y ὑπὲρ δὲ πάντα como una cobertura total («above all things»).
  spanish_consistency_notes:
  - Se mantiene el término «verdad» para ἀλήθεια, en armonía con el español bíblico moderno y con la opción inglesa auditada.
  - Se evita «Mesías», «SEÑOR» u այլ terminología no pertinente; el versículo no contiene esos lexemas.
  - 'La puntuación reproduce el orden y la pausa del original: enunciado narrativo seguido de cita directa con contraste adversativo.'
