review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general la secuencia y el sentido del hebreo: Shimshón va, captura 300 animales, toma antorchas/teas, los dispone cola con cola y coloca una antorcha entre cada par de colas. También preserva correctamente la nota léxica sobre שׁוּעָלִים. Sin embargo, hay un error gramatical importante en «trescientos zorras», y la elección «zorras» introduce un matiz femenino/coloquial innecesario que no refleja el plural masculino genérico hebreo ni la decisión inglesa principal «foxes».'
  spanish_quality_summary: 'La redacción es comprensible, pero presenta problemas de naturalidad y corrección: «trescientos zorras» es agramatical; «zorras» en español suele sonar marcado o peyorativo fuera del contexto zoológico; «teas» es válido pero menos claro para lectura eclesial amplia que «antorchas». «Las puso cola con cola» es aceptable, pero «las volvió cola con cola» o «las dispuso cola con cola» sonarían más cercanos al hebreo; aun así, la formulación actual puede mantenerse si se corrige lo demás. La revisión propuesta mejora fidelidad, claridad y legibilidad.'
  glossary_alignment: No hay términos teológicos mayores en juego. En nombres propios, «Shimshón» sigue la política de transliteración del inglés POB. En el campo léxico, conviene alinear שׁוּעָלִים con «zorros» como equivalente principal, dejando «chacales» en nota, en paralelo con la auditoría inglesa. Para לַפִּידִים, «antorchas» comunica mejor que «teas» en español general.
  issues:
  - severity: high
    issue: «trescientos zorras» es incorrecto en español
    rationale: Hay discordancia de género y número entre numeral y sustantivo; además rompe la legibilidad del texto final.
  - severity: medium
    issue: «zorras» no es la mejor forma principal para שׁוּעָלִים
    rationale: Aunque zoológicamente posible, en español general suele percibirse como femenino específico o con carga coloquial. «Zorros» representa mejor el plural no marcado y mantiene la tradición narrativa, en línea con el inglés POB.
  - severity: medium
    issue: «teas» es menos claro que «antorchas» para una audiencia amplia
    rationale: «Teas» es correcto pero más literario o menos común en muchos contextos latinoamericanos. «Antorchas» preserva el sentido de לַפִּידִים con mayor accesibilidad.
  - severity: low
    issue: La nota al pie debe actualizarse para concordar con el texto revisado
    rationale: Si el texto principal dice «zorros», la nota no debe justificar «zorras» como forma principal.
