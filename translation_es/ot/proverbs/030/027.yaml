  to: Las langostas no tienen rey[a], pero todas salen en filas.
  rationale: Se ajusta «en orden» a «en filas» para representar mejor el valor de חֹצֵץ como disposición en secciones o rangos, manteniendo un español natural y la cautela del inglés POB de no sobrecargar la imagen con un tono militar excesivo. La nota alternativa se conserva sin cambios sustanciales porque documenta fielmente la opción léxica preservada en la auditoría inglesa.
