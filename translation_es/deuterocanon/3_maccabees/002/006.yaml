  - marker: b
    text: 'O: «tú, el soberano sobre toda la creación».'
    reason: lexical_alternative
  revision_rationale: Se ajustó la aposición para que la descripción divina modifique directamente a «ti», conforme al griego y a la revisión auditada en inglés. Se mejoró la naturalidad de «multitud de gente» a «multitud de personas». También se reforzó el matiz de tránsito seguro de διεκόμισας con «los hiciste pasar a salvo».
