  - discipline
  - temperance
  lexicon: Coptic noun denoting restraint/continence; likely a native formation paired
    contrastively with a privative Greek loan in this line.
  rationale: Best captures the ethical virtue opposed to ⲉⲕⲟⲗ; modern and clear while
    preserving the paradox with its opposite.
- source_word: ⲉⲕⲟⲗ
  chosen: lack of self-control
  alternatives:
