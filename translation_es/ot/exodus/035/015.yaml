translation:
  language: es
  text: el altar del incienso y sus varas, y el aceite de la unción, y el incienso aromático[b], y la cortina[c] para la entrada del tabernáculo;
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: O «el incienso de especias» o «el incienso especiado».
    reason: lexical_alternative
  - marker: c
    text: O «la cortina para la entrada» o «a la entrada del tabernáculo».
    reason: lexical_alternative
lexical_decisions:
- source_word: מִזְבַּח הַקְּטֹרֶת
  english_pob_choice: the altar of incense
  chosen_spanish: el altar del incienso
  alternatives_spanish:
  - el altar de incienso
  - el altar para el incienso
  - el altar del sahumerio
  lexicon: HALOT
  rationale: La construcción nominal señala un altar asociado con el incienso. En español, «altar del incienso» es natural, preciso y conserva la especificidad cultual sin ampliar indebidamente el hebreo.
- source_word: בַּדָּיו
  english_pob_choice: its poles
  chosen_spanish: sus varas
  alternatives_spanish:
  - sus postes
  - sus bastones para transportar
  - sus varales
  lexicon: HALOT
  rationale: En el contexto del tabernáculo, בַּדִּים son los elementos de transporte del mobiliario sagrado. «Varas» comunica bien la función y mantiene la sobriedad del término bíblico.
- source_word: שֶׁמֶן הַמִּשְׁחָה
  english_pob_choice: the anointing oil
  chosen_spanish: el aceite de la unción
  alternatives_spanish:
  - el aceite para ungir
  - el aceite de la unción sagrada
  lexicon: HALOT
  rationale: Es la fórmula cultual estable. «Aceite de la unción» es fiel, pero «el aceite de la unción» suena más natural en español bíblico actual y conserva el sentido ritual.
- source_word: קְטֹרֶת הַסַּמִּים
  english_pob_choice: the fragrant incense
  chosen_spanish: el incienso aromático
  alternatives_spanish:
  - el incienso de especias
  - el incienso perfumado
  - el incienso fragante
  lexicon: HALOT
  rationale: הַסַּמִּים apunta a ingredientes aromáticos. «Incienso aromático» reproduce el valor olfativo con naturalidad; evita una literalidad pesada como «incienso de especias».
- source_word: מָסַךְ הַפֶּתַח
  english_pob_choice: the screen for the entrance
  chosen_spanish: la cortina
  alternatives_spanish:
  - el velo
  - la pantalla
  - el cortinaje
  lexicon: HALOT
  rationale: En el lenguaje del tabernáculo, מָסָךְ es una pieza colgante que cubre la entrada. «Cortina» es la opción más clara y entendible en español; «velo» podría confundirse con otra pieza cultual distinta.
- source_word: לְפֶתַח הַמִּשְׁכָּן
  english_pob_choice: for the entrance to the tabernacle
  chosen_spanish: para la entrada del tabernáculo
  alternatives_spanish:
  - a la entrada del tabernáculo
  - en la entrada del tabernáculo
  lexicon: HALOT
  rationale: El ל expresa relación/función respecto de la entrada. «Para la entrada del tabernáculo» mantiene esa función sin forzar una preposición poco natural en español.
- source_word: הַמִּשְׁכָּן
  english_pob_choice: the tabernacle
  chosen_spanish: el tabernáculo
  alternatives_spanish:
  - la morada
  - la tienda de reunión
  lexicon: HALOT
  rationale: «Tabernáculo» es el término tradicional y exacto para esta estructura sagrada en Éxodo; preserva la correspondencia referencial con la tradición textual y el audit trail en inglés.
translation_notes:
  revision_awareness: El inglés auditado pasó de una redacción duplicada («the screen for the entrance, for the entrance of the tabernacle») a «the screen for the entrance to the tabernacle». La versión española refleja esa corrección evitando cualquier duplicación y manteniendo el valor funcional del hebreo.
  spanish_consistency_notes:
  - Se conserva «tabernáculo» como término fijo para מִשְׁכָּן, en continuidad con el uso bíblico establecido.
  - Se eligió «incienso» para קְטֹרֶת y «aromático» para הַסַּמִּים, para no perder el matiz olfativo señalado por el inglés POB.
  - «Varas» mantiene la función portátil de בַּדִּים sin introducir un tecnicismo innecesario.
  - La puntuación y la coordinación reproducen la lista hebrea con estilo publicable en español.
