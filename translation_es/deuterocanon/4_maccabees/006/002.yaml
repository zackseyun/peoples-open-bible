    rationale: La nota inglesa preserva «piety» como alternativa a «godliness», pero en español, si el texto principal ya usa «piedad», la nota debe aclarar más bien el sentido ampliado de la frase o una alternativa como «la graciosa compostura asociada con la piedad».
  revised_spanish_text: Y primero despojaron al anciano, adornado con la dignidad de la piedad[a].
