translation:
  language: es
  text: Si tus hijos varones guardan mi pacto y mis testimonios[a] que yo les enseñaré, también los hijos de ellos se sentarán en tu trono para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Testimonios» también puede entenderse como «decretos» o «estatutos».
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  lexicon: HALOT
  rationale: El hebreo presenta una condición real; «Si» conserva esa fuerza sin suavizarla en una certeza o temporalidad.
- source_word: יִשְׁמְרוּ
  english_pob_choice: keep
  chosen_spanish: guarden
  alternatives_spanish:
  - observen
  - conserven
  - custodien
  lexicon: HALOT
  rationale: En contexto de pacto, שׁמר expresa fidelidad obediente. «Guardar» es la correspondencia natural en español bíblico y moderno.
- source_word: בָנֶיךָ
  english_pob_choice: your sons
  chosen_spanish: tus hijos
  alternatives_spanish:
  - tus hijos varones
  - tus descendientes
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente «tus hijos/sons», «tus hijos» comunica bien el plural filial en español. Se evita «descendientes» porque borra la referencia masculina explícita del texto.
- source_word: בְּרִיתִי
  english_pob_choice: my covenant
  chosen_spanish: mi pacto
  alternatives_spanish:
  - mi alianza
  lexicon: HALOT
  rationale: «Pacto» es el equivalente más transparente y estable para בְּרִית en español bíblico; conserva el carácter formal y vinculante del término.
- source_word: וְעֵדֹתִי
  english_pob_choice: and my testimonies
  chosen_spanish: y mis testimonios
  alternatives_spanish:
  - y mis decretos
  - y mis estatutos
  lexicon: HALOT
  rationale: Se mantiene «testimonios» para respetar la distinción léxica de עֵדֹת frente a otros términos legales. La alternativa tradicional se anota porque el inglés POB la preserva como posibilidad.
- source_word: אֲלַמְּדֵם
  english_pob_choice: I will teach them
  chosen_spanish: que yo les enseñaré
  alternatives_spanish:
  - que yo les enseñe
  - que yo los enseñaré
  lexicon: HALOT
  rationale: La forma verbal expresa una acción futura dentro de la condición. En español, «les enseñaré» comunica con claridad ese valor prospectivo, y el relativo «que» liga naturalmente el objeto de enseñanza con los testimonios.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  lexicon: HALOT
  rationale: '«También» reproduce la adición de גַּם: no solo los hijos presentes, sino además la siguiente generación.'
- source_word: בְּנֵיהֶם
  english_pob_choice: their sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus descendientes
  lexicon: HALOT
  rationale: De nuevo, el hebreo dice literalmente «sus hijos/sons». «Sus hijos» mantiene la referencia natural en español sin diluir el matiz dinástico.
- source_word: עֲדֵי עַד
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - eternamente
  - por siempre
  lexicon: HALOT
  rationale: La locución idiomática expresa perpetuidad. «Para siempre» es la opción más idiomática y fiel en español contemporáneo.
- source_word: יֵשְׁבוּ
  english_pob_choice: will sit
  chosen_spanish: se sentarán
  alternatives_spanish:
  - se sentarán en trono
  - reinarán
  lexicon: HALOT
  rationale: Con «en tu trono», ישב conserva su imagen de entronización. «Se sentarán» mantiene esa figuración sin explicitar de más el sentido de reinar.
- source_word: לְכִסֵּא לָךְ
  english_pob_choice: on your throne
  chosen_spanish: en tu trono
  alternatives_spanish:
  - sobre tu trono
  - en el trono que es tuyo
  lexicon: HALOT
  rationale: La preposición y el sustantivo forman en contexto una imagen de ocupar el trono. «En tu trono» es la solución española más natural y fiel.
theological_decisions:
- issue: Condicionalidad de la promesa davídica
  english_pob_reading: 'The verse states a genuine condition on David''s sons: their continued enthronement depends on covenant faithfulness.'
  chosen_spanish_reading: 'El versículo presenta una condición real: la permanencia de los hijos en el trono depende de su fidelidad al pacto.'
  alternative_spanish_readings:
  - La promesa es meramente formal o retórica.
  - La condición no debe tomarse literalmente por la teología general del pacto davídico.
  rationale: La sintaxis hebrea abre con una condición explícita y no se debe resolver la tensión en la traducción. El español conserva esa relación condicional sin armonizarla con otros textos.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto sigue de cerca el hebreo consonante y la lectura auditada en inglés, sin introducir cambios respecto del pasaje base; se conserva la condición, el vocabulario de pacto y la imaginería dinástica del trono.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el nombre divino aparece explícitamente; en este versículo no es necesario.
  - Se mantiene «pacto» y «testimonios» como términos técnicos coherentes con el proyecto.
  - Se conserva la referencia masculina explícita de בָנֶיךָ / בְּנֵיהֶם con «hijos», no con «descendientes».
  - La estructura condicional se mantiene en español para reflejar la tensión teológica del hebreo.
