lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Conserva la conclusión consecuencial del juicio profético; «Por tanto» es natural y mantiene el nexo lógico del hebreo.
- source_word: עַתָּה
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - ya
  lexicon: HALOT
  rationale: Expresa la inmediatez temporal del adverbio sin sobrecargar el tono.
- source_word: יִגְל֖וּ
  english_pob_choice: they will go into exile
  chosen_spanish: irán al destierro
  alternatives_spanish:
  - serán desterrados
  - irán en cautiverio
  lexicon: HALOT
  rationale: «Ir al destierro» reproduce el sentido de exilio/deportación con un español bíblico claro y fiel al verbo activo hebreo.
- source_word: בְּרֹאשׁ
  english_pob_choice: at the head of
  chosen_spanish: al frente de
  alternatives_spanish:
  - a la cabeza de
  - primero entre
  lexicon: HALOT
  rationale: Comunica la idea de ir en posición principal o de liderazgo entre los deportados, conservando el matiz irónico del texto.
- source_word: גֹּלִים
  english_pob_choice: the exiles
  chosen_spanish: los desterrados
  alternatives_spanish:
  - los exiliados
  - los cautivos
  lexicon: HALOT
  rationale: 'Sustantivación del participio: «los desterrados» mantiene la relación léxica con «destierro» y suena natural en español.'
- source_word: וְסָר
  english_pob_choice: will pass away
  chosen_spanish: cesará
  alternatives_spanish:
  - desaparecerá
  - terminará
  lexicon: HALOT
  rationale: «Cesará» expresa el fin de la actividad festiva con tono sobrio y directo, adecuado al juicio anunciado.
- source_word: מִרְזַח
  english_pob_choice: the revelry
  chosen_spanish: la orgía
  alternatives_spanish:
  - el banquete
  - la fiesta
  - la juerga
  lexicon: HALOT
  rationale: El término hebreo puede designar un banquete festivo con carga negativa; «orgía» intensifica el matiz de excesos y se ajusta al contexto de denuncia profética. Se conserva, sin embargo, la posibilidad de un banquete festivo en la nota.
- source_word: סְרוּחִים
  english_pob_choice: those who sprawl
  chosen_spanish: los que se echan a sprawl
  alternatives_spanish:
  - los que se echan a la larga
  - los que se echan a descansar
  - los que se echan sobre los divanes
  lexicon: HALOT
  rationale: El participio describe a los que yacen reclinados con desenfreno. Se mantiene el término inglés «sprawl» en el texto para no perder la imagen corporal compacta reflejada en la tradición auditada, mientras la nota ofrece equivalentes españoles más interpretativos.
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido del hebreo y el audit trail inglés, pero adapta el orden y la dicción para un español bíblico natural. Se preserva la tensión léxica de מִרְזַח y סְרוּחִים mediante una traducción principal sobria y una nota con alternativas interpretativas.
  spanish_consistency_notes:
  - Se mantuvo «destierro/desterrados» para conservar la relación interna con יִגְלוּ y גֹּלִים.
  - «Por tanto, ahora» refleja la secuencia lógica y temporal del hebreo sin añadir contenido.
  - La decisión de dejar «sprawl» en el texto principal evita forzar una sola equivalencia española para סְרוּחִים y respeta el carácter compacto del giro hebreo.
