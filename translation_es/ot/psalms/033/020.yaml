revisions:
- from: Nuestra alma espera en Yahvé[a]; él es nuestra ayuda y nuestro escudo.
  to: Nuestra alma espera a Yahvé[a]; él es nuestra ayuda y nuestro escudo.
  rationale: Se mantiene la traducción general, pero se corrige la preposición con «espera a Yahvé» para reflejar mejor el sentido del hebreo y sonar más natural en español contemporáneo. También se pulió la redacción de la nota eliminando comillas innecesarias al inicio.
  reviewer_model: gpt-5.4
