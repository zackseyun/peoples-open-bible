translation:
  language: es
  text: Yahvé reina[a]; que los pueblos tiemblen. Se sienta entronizado sobre los querubines[b]; que la tierra se estremezca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “los pueblos tiemblan ... la tierra se estremece”. Los imperfectos hebreos también pueden leerse en forma indicativa, no solo como respuestas volitivas/jusivas.'
    reason: alternative_reading
  - marker: b
    text: “Se sienta entronizado sobre los querubines” también puede traducirse “entronizado entre los querubines” o “está entronizado sobre los querubines”. La expresión hebrea es un título real-templo para Yahvé.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se preserva el nombre propio divino del Tetragrámaton en forma transparente y reconocible en español, conforme a la política del POB de no sustituirlo por un título.
- source_word: מָלָךְ
  english_pob_choice: reigns
  chosen_spanish: reina
  alternatives_spanish:
  - ha llegado a reinar
  - es rey
  lexicon: HALOT
  rationale: El qatal poético funciona aquí como proclamación real presente; 'reina' comunica la afirmación de soberanía con naturalidad en español sin forzar un matiz inceptivo.
- source_word: יִרְגְּזוּ
  english_pob_choice: let the peoples tremble
  chosen_spanish: que los pueblos tiemblen
  alternatives_spanish:
  - que los pueblos se estremezcan
  - los pueblos tiemblan
  lexicon: HALOT
  rationale: Se mantiene el valor volitivo/jussivo del imperfecto en contexto de entronización, con un verbo que expresa temor reverente y sacudida emocional/physical.
- source_word: עַמִּים
  english_pob_choice: the peoples
  chosen_spanish: los pueblos
  alternatives_spanish:
  - las naciones
  - los pueblos de la tierra
  lexicon: HALOT
  rationale: '''Pueblos'' conserva el plural colectivo de grupos humanos y corresponde bien al paralelismo del verso.'
- source_word: יֹשֵׁב כְּרוּבִים
  english_pob_choice: He sits enthroned upon the cherubim
  chosen_spanish: Está entronizado sobre los querubines
  alternatives_spanish:
  - Se sienta entronizado sobre los querubines
  - Está sentado sobre los querubines
  lexicon: HALOT
  rationale: La expresión se entiende como título real-templo de Yahvé. 'Entronizado' comunica el sentido idiomático y evita una literalidad corporal engañosa; 'sobre' conserva la relación espacial amplia sin resolverla indebidamente.
- source_word: כְּרוּבִים
  english_pob_choice: cherubim
  chosen_spanish: querubines
  alternatives_spanish:
  - querubes
  lexicon: HALOT
  rationale: '''Querubines'' es el equivalente estándar en español bíblico y conserva el registro reverente del término.'
- source_word: תָּנ֥וּט
  english_pob_choice: let the earth quake
  chosen_spanish: que la tierra se estremezca
  alternatives_spanish:
  - que la tierra tiemble
  - la tierra se estremece
  lexicon: HALOT
  rationale: El verbo admite sacudida, oscilación o temblor; 'se estremezca' funciona bien en paralelo con 'tiemblen' y mantiene la fuerza volitiva del hebreo poético.
- source_word: הָאָרֶץ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  lexicon: HALOT
  rationale: En este salmo de entronización, el referente es cósmico y universal; 'la tierra' reproduce con claridad ese alcance en español.
theological_decisions:
- issue: Cómo rendir el Tetragrámaton יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: Se conserva el nombre personal de Dios en lugar de reemplazarlo por un título, siguiendo la línea doctrinal del POB y evitando ocultar el texto hebreo.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Fuerza de los imperfectos יִרְגְּזוּ y תָּנ֥וּט en poesía
  english_pob_reading: 'volitive/jussive-like: ''let the peoples tremble ... let the earth quake'''
  chosen_spanish_reading: 'volitivo/jusivo: ''que los pueblos tiemblen ... que la tierra se estremezca'''
  alternative_spanish_readings:
  - 'indicativo: ''los pueblos tiemblan ... la tierra se estremece'''
  rationale: La forma exhortativa refleja mejor el tono de proclamación del salmo; aun así, el POB documenta la lectura indicativa como alternativa válida, y esa tensión se preserva en la nota.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión inglesa más reciente afinó la segunda línea de 'enthroned above the cherubim' a 'sits enthroned upon the cherubim' para acercarse más a יֹשֵׁב כְּרוּבִים sin perder naturalidad. La versión española adopta ese ajuste con 'está entronizado sobre los querubines', manteniendo la lectura idiomática y el valor de título real-templo.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al POB.
  - Se eligió 'querubines' y no 'querubes' por registro bíblico estándar en español.
  - Se mantuvo el paralelismo verbal con dos cláusulas exhortativas ('que... que...') para reflejar el tono poético del hebreo.
  - '''La tierra'' se preserva por el alcance cósmico del verso, no como territorio local.'
