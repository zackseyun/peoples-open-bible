translation:
  language: es
  text: 'Y estas son sus medidas: el lado norte[a], cuatro mil quinientos; el lado sur, cuatro mil quinientos; desde el lado oriental, cuatro mil quinientos; y el lado occidental, cuatro mil quinientos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo, literalmente, «quinientos y cuatro mil» para cada lado; el español invierte el orden para expresar el número de manera natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִדּוֹתֶיהָ
  english_pob_choice: its measurements
  chosen_spanish: sus medidas
  alternatives_spanish:
  - sus dimensiones
  lexicon: HALOT
  rationale: «Medidas» expresa con naturalidad las extensiones medidas de la ciudad y conserva el sentido cuantitativo del contexto. «Dimensiones» es posible, pero menos directo para la repetición numérica del versículo.
- source_word: פְּאַת
  english_pob_choice: side
  chosen_spanish: lado
  alternatives_spanish:
  - costado
  - borde
  - cuarto
  lexicon: HALOT
  rationale: En este contexto de medición territorial, פאה se refiere al lado o flanco de un perímetro. «Lado» es claro y fiel en español actual.
- source_word: צָפוֹן
  english_pob_choice: north
  chosen_spanish: norte
  alternatives_spanish:
  - lado norte
  - septentrión
  lexicon: HALOT
  rationale: Es una dirección cardinal. «Norte» reproduce el valor direccional sin añadir connotación regional.
- source_word: נֶגֶב
  english_pob_choice: south
  chosen_spanish: sur
  alternatives_spanish:
  - lado sur
  - Neguev
  lexicon: HALOT
  rationale: Aquí funciona como dirección cardinal, no como el nombre geográfico «Neguev». «Sur» mantiene la coordinación con las otras direcciones.
- source_word: מִפְּאַת קָדִים
  english_pob_choice: from the east side
  chosen_spanish: el lado oriental
  alternatives_spanish:
  - desde el lado oriental
  - el lado del este
  lexicon: HALOT
  rationale: El hebreo incluye aquí una preposición (מִן), pero en español una repetición literal de «desde» haría la frase menos natural. Dado el paralelismo con las demás direcciones y la función enumerativa, «el lado oriental» comunica el sentido con fidelidad idiomática.
- source_word: קָדִים
  english_pob_choice: east
  chosen_spanish: oriental
  alternatives_spanish:
  - este
  - del este
  lexicon: HALOT
  rationale: «Oriental» conserva el valor direccional y combina bien con la estructura repetitiva del versículo. «Este» también sería válido, pero aquí «oriental» suena más equilibrado en la enumeración.
- source_word: יָמָּה
  english_pob_choice: west
  chosen_spanish: occidental
  alternatives_spanish:
  - oeste
  - hacia el mar
  lexicon: HALOT
  rationale: Aunque el término tiene relación etimológica con «mar», en uso cardinal significa «oeste». «Occidental» armoniza con «oriental» y evita la lectura literal de «mar» que no corresponde aquí.
- source_word: חֲמֵשׁ מֵאוֹת וְאַרְבַּעַת אֲלָפִים
  english_pob_choice: four thousand five hundred
  chosen_spanish: cuatro mil quinientos
  alternatives_spanish:
  - cuatro mil y quinientos
  lexicon: HALOT
  rationale: Se invierte el orden hebreo para seguir la expresión normal del español, como hace la POB inglesa. El valor numérico se mantiene igual para cada lado.
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el marcador [a] en el texto principal donde corresponde a la nota sobre el orden del número. No se introdujeron notas sin anclaje en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó una serie consistente de direcciones cardinales en español («norte», «sur», «oriental», «occidental») para reflejar el paralelismo del hebreo.
  - La nota [a] está anclada exactamente en «norte[a]», siguiendo el criterio de una única marca para una única nota en este registro.
