translation:
  language: es
  text: Porque nosotros solos edificaremos para Yahvé de Israel[a], conforme a lo que Ciro, rey de los persas, nos mandó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conforme a lo que Ciro, rey de Persia, nos mandó». El griego dice «rey de los persas», mientras que en español también puede expresarse el título con el nombre del país.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: LSJ
  rationale: El pronombre explícito se conserva de forma natural en español; la fuerza enfática queda reforzada por "solos" en la frase siguiente.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: LSJ
  rationale: En este contexto explicativo, "porque" comunica con claridad la razón dada para la negativa, sin sonar artificial en español.
- source_word: μόνοι
  english_pob_choice: alone
  chosen_spanish: solos
  alternatives_spanish:
  - solamente
  - por nuestra cuenta
  lexicon: LSJ
  rationale: '"Solos" reproduce la exclusividad del griego y suena más directo que una perífrasis; evita suavizar el contraste con los oferentes.'
- source_word: οἰκοδομήσομεν
  english_pob_choice: will build
  chosen_spanish: edificaremos
  alternatives_spanish:
  - construiremos
  - reedificaremos
  lexicon: LSJ
  rationale: '"Edificar" es un verbo bíblico natural en español para la construcción de un templo y evita añadir explícitamente el prefijo de restauración que el griego no expresa de forma directa.'
- source_word: τῷ κυρίῳ τοῦ Ἰσραήλ
  english_pob_choice: for the Lord of Israel
  chosen_spanish: para el Señor de Israel
  alternatives_spanish:
  - para el Señor de Israel
  - para Yahvé, Dios de Israel
  lexicon: LSJ
  rationale: Se conserva el título divino del texto fuente con "Señor" como equivalente de κύριος en el sustantivo compuesto de la frase; sin embargo, en el léxico del proyecto la referencia divina a יהוה se normaliza como "Yahvé" cuando el contexto lo exige explícitamente. Aquí el griego presenta κύριος sin forma hebrea directa, por lo que la redacción mantiene el título tradicional de la cita griega. Para no borrar la identificación de Israel, se conserva el genitivo "de Israel".
- source_word: ἀκολούθως
  english_pob_choice: in accordance with
  chosen_spanish: conforme a
  alternatives_spanish:
  - de acuerdo con
  - según
  lexicon: LSJ
  rationale: '"Conforme a" expresa adecuadamente la idea de correspondencia/ajuste con una orden previa y mantiene un registro bíblico claro en español.'
- source_word: οἷς προσέταξεν ἡμῖν
  english_pob_choice: what ... commanded us
  chosen_spanish: a lo que ... nos mandó
  alternatives_spanish:
  - según lo que ... nos ordenó
  - conforme a lo que ... nos mandó
  lexicon: LSJ
  rationale: La construcción relativa se vierte de manera idiomática en español. "Mandó" transmite la fuerza de προσέταξεν de forma sobria y natural.
- source_word: Κῦρος ὁ βασιλεὺς Περσῶν
  english_pob_choice: Cyrus king of the Persians
  chosen_spanish: Ciro, rey de los persas
  alternatives_spanish:
  - Ciro, rey de Persia
  - Ciro, el rey de los persas
  lexicon: LSJ
  rationale: Se sigue de cerca el plural étnico del griego con "los persas", en vez de aplanarlo a "Persia"; así se preserva la forma del título en la fuente.
theological_decisions:
- issue: Título divino κύριος en un contexto griego deuterocanónico
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Señor (con nota sobre el título divino)
  rationale: El audit trail inglés opta por "Lord" como título divino. En español, "Señor" es el equivalente más estable y reverente para κύριος en este contexto. No se sustituye por un término explicativo que debilitaría el título.
  doctrine_reference: 'DOCTRINE.md: Contested terms table, κύριος → Lord'
translation_notes:
  revision_awareness: La revisión auditada indica que no hubo cambios necesarios en la última pasada; esta redacción mantiene la lectura alta en acuerdo con el texto griego de Swete y conserva la alternativa léxica sobre Περσῶν reflejada en el inglés.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en armonía con el audit trail inglés y el uso reverente del título divino en español.
  - Se mantiene «los persas» para Περσῶν, evitando la generalización a «Persia» salvo en la nota alternativa.
  - «Edificaremos» y «conforme a» ofrecen un español bíblico claro sin introducir una paráfrasis ajena al griego.
  - La nota al pie se ancla en «de Israel[a]» para señalar la alternativa de traducción del título sin alterar el texto principal.
