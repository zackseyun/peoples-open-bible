revisions:
- from: Él envía manantiales en los valles[a]; ellos fluyen entre los montes.
  to: Él envía manantiales por los valles[a]; corren entre los montes.
  rationale: Se ajusta ‘en los valles’ a ‘por los valles’ para expresar mejor la escena dinámica de los manantiales en su curso, y se reemplaza ‘ellos fluyen’ por ‘corren’ para un español más natural, poético y fiel al movimiento contextual del agua. Se conserva la nota léxica del inglés POB sobre נחל.
