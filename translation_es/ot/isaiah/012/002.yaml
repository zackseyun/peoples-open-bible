translation:
  language: es
  text: He aquí, Dios es mi salvación; confiaré y no temeré, porque Yah, Yahvé[a], es mi fuerza y mi cántico[b], y ha llegado a ser mi salvación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión hebrea combina la forma breve del nombre divino («Yah») con יְהוָה («Yahvé»), un doblete poético que refuerza la proclamación.
    reason: alternative_reading
  - marker: b
    text: Esta línea evoca Éxodo 15:2 casi palabra por palabra.
    reason: cross_reference
lexical_decisions:
- source_word: הִנֵּה
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Miren
  - Mira
  lexicon: HALOT
  rationale: Es una interjección deíctica que llama la atención con énfasis poético. «He aquí» conserva el tono elevado de «Behold» sin sonar forzado en español bíblico actual.
- source_word: אֵל
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios Fuerte
  - Mighty God
  lexicon: HALOT
  rationale: Aquí funciona como designación divina poética general. «Dios» es el equivalente natural y no introduce un matiz no explicitado por el contexto inmediato.
- source_word: יְשׁוּעָתִי
  english_pob_choice: my salvation
  chosen_spanish: mi salvación
  alternatives_spanish:
  - mi liberación
  - mi victoria
  lexicon: HALOT
  rationale: El sustantivo apunta a salvación/liberación. «Mi salvación» preserva el vínculo léxico con la clausura del versículo y con el marco teológico de Isaías 12.
- source_word: אֶבְטַח
  english_pob_choice: I will trust
  chosen_spanish: confiaré
  alternatives_spanish:
  - pondré mi confianza
  - tendré confianza
  lexicon: HALOT
  rationale: El imperfecto en primera persona expresa resolución futura. «Confiaré» reproduce bien esa confianza decidida en español natural.
- source_word: וְלֹא אֶפְחָד
  english_pob_choice: and will not be afraid
  chosen_spanish: y no temeré
  alternatives_spanish:
  - y no tendré miedo
  - y no temeré jamás
  lexicon: HALOT
  rationale: La negación del imperfecto expresa una determinación/confianza continua. «No temeré» es la opción más directa y solemne; «tener miedo» sería más coloquial.
- source_word: עָזִּי
  english_pob_choice: my strength
  chosen_spanish: mi fuerza
  alternatives_spanish:
  - mi fortaleza
  - mi poder
  lexicon: HALOT
  rationale: El término denota fuerza/potencia. «Mi fuerza» es la equivalencia más directa y mantiene la resonancia con Éxodo 15:2.
- source_word: וְזִמְרָת
  english_pob_choice: and song
  chosen_spanish: y mi cántico
  alternatives_spanish:
  - y mi canto
  - y mi alabanza
  lexicon: HALOT
  rationale: En la fórmula poética alusiva al cántico de liberación, «cántico» suena más bíblico y más cercano al paralelismo con la tradición de Éxodo 15:2; se añadió «mi» para reflejar la relación posesiva implícita en el hebreo y mantener el balance español.
- source_word: יָהּ יְהוָה
  english_pob_choice: Yah, Yahweh
  chosen_spanish: Yah, Yahvé
  alternatives_spanish:
  - Yah, el SEÑOR
  - Yah, Yahvé
  lexicon: HALOT
  rationale: Se conserva la doble forma divina como efecto poético. Según la pauta del proyecto, יְהוָה se vierte «Yahvé»; el breve יָהּ se translitera «Yah» para no borrar la tensión expresiva del hebreo.
- source_word: וַיְהִי לִי לִישׁוּעָה
  english_pob_choice: and he has become my salvation
  chosen_spanish: y se ha convertido en mi salvación
  alternatives_spanish:
  - y llegó a ser mi salvación
  - y vino a ser mi salvación
  lexicon: HALOT
  rationale: El wayyiqtol tiene aquí valor retrospectivo/resultativo. «Se ha convertido» comunica el resultado experimentado sin perder la idea de devenir; la repetición de «mi salvación» preserva el encuadre léxico del versículo.
theological_decisions:
- issue: Traducción del nombre divino יְהוָה en este versículo
  english_pob_reading: Yah, the LORD
  chosen_spanish_reading: Yah, Yahvé
  alternative_spanish_readings:
  - Yah, el Señor
  - Yahvé
  rationale: El hebreo presenta la combinación poética de יָהּ y יְהוָה. La política española del proyecto pide «Yahvé» para YHWH; mantener «Yah» en la forma breve preserva la doble invocación sin ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Relación entre «mi salvación» inicial y final
  english_pob_reading: my salvation ... my salvation
  chosen_spanish_reading: mi salvación ... mi salvación
  alternative_spanish_readings:
  - mi liberación ... mi salvación
  - mi victoria ... mi salvación
  rationale: La repetición final no es redundancia accidental, sino un recurso inclusivo que refuerza la confesión de confianza. Mantener «mi salvación» en ambos lugares conserva la cohesión semántica y teológica del verso.
  doctrine_reference: Isaías 12:2 como confesión de confianza y memoria de liberación
- issue: Alusión a Éxodo 15:2 en la expresión de fuerza y canto
  english_pob_reading: my strength and song
  chosen_spanish_reading: mi fuerza y mi cántico
  alternative_spanish_readings:
  - mi fuerza y mi canto
  - mi fortaleza y mi cántico
  rationale: La frase funciona como eco intertextual del cántico de Moisés. «Cántico» conserva mejor el registro litúrgico-poético y hace visible la conexión canónica sin sobreinterpretar el texto.
  doctrine_reference: Éxodo 15:2
translation_notes:
  revision_awareness: 'El texto español sigue la revisión más reciente del audit trail: conserva la estructura confesional del versículo, evita añadir intensificadores no presentes y refleja la corrección que recupera la forma poética doble del nombre divino. También toma en cuenta que la última revisión del inglés pasó de una paráfrasis explicativa a «Yah, the LORD», por lo que el español debía preservar esa tensión nominal en vez de nivelarla.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la terminología del proyecto para יְהוָה.
  - Se usa «mi salvación» de forma consistente al inicio y al final para conservar el inclusio léxico.
  - «Cántico» se reserva para el eco poético de Éxodo 15:2, con registro más bíblico que «canto».
  - La puntuación reproduce una sola gran cláusula confesional con dos miembros coordinados, acorde al hebreo.
  - El único pie de nota ancla la forma poética del nombre divino y no introduce variantes innecesarias.
