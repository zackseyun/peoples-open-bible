revisions:
- from: 'Entonces pasarás de allí y seguirás adelante; llegarás al encinar[a] de Tabor. Allí te encontrarán tres hombres que suben a Dios en Betel[b]: uno lleva tres cabritos, otro lleva tres panes[c], y otro lleva un odre de vino.'
  to: 'Entonces pasarás de allí y seguirás adelante; llegarás a la encina[a] de Tabor. Allí te saldrán al encuentro tres hombres que suben a Dios en Betel[b]: uno lleva tres cabritos, otro lleva tres panes, y otro lleva un odre[c] de vino.'
  rationale: Se corrigió «encinar» por «encina» para reflejar el singular de אֵלוֹן y evitar el sentido de arboleda. Se reubicó la nota [c] al sintagma de «odre» para alinearla con נֵבֶל יָיִן y con el aparato inglés. También se mejoró la naturalidad española con «te saldrán al encuentro», sin apartarse del sentido fuente.
