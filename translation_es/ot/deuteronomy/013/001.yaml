revisions:
- from: Cada palabra[a] que yo les mando, la cuidarán para hacerla. No le añadirás[b], ni le quitarás de ella.
  to: Cada palabra[a] que yo les mando, la cumplirán cuidadosamente. No le añadirán[b] ni le quitarán.
  rationale: 'Se corrigió el español para reflejar con claridad y naturalidad el hebreo y la decisión del POB inglés. ''La cumplirán cuidadosamente'' comunica mejor el idiomático שׁמר + infinitivo que ''la cuidarán para hacerla''. También se uniformó la persona verbal en plural para evitar una alternancia confusa en español, y se simplificó la prohibición final a una formulación idiomática y fiel: ''No le añadirán ni le quitarán''. La nota léxica fue ajustada para corregir la literalidad gramatical en español.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:45:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del hebreo: mandato sobre ''cada palabra'' / ''toda la palabra'', seguido por la prohibición de añadir o quitar. Sin embargo, dos formulaciones principales no representan bien el idiomatismo ni la gramática del original: ''la cuidarán para hacerla'' no comunica de forma natural שׁמר + infinitivo (''cuidar/observar cuidadosamente para hacer''), y ''No le añadirás'' cambia impropiamente de 2mp a 2ms, además de sonar menos claro en español. ''ni le quitarás de ella'' también es poco idiomático para מִמֶּנּוּ.'
  spanish_quality_summary: 'El español actual del borrador suena forzado en varios puntos. ''La cuidarán para hacerla'' y ''ni le quitarás de ella'' son construcciones poco naturales y de difícil lectura eclesial. Conviene usar una formulación más idiomática y digna, manteniendo la fidelidad formal: ''la cumplirán cuidadosamente'' o ''cuidarán de cumplirla'', y ''no le añadirán ni le quitarán''. También debe corregirse la concordancia de persona verbal para mantener el plural del versículo.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal global del proyecto. La cuestión central es estilística y gramatical: preservar el singular colectivo de דָּבָר sin producir español antinatural. ''Cada palabra[a] que yo les mando, la cumplirán cuidadosamente. No le añadirán[b] ni le quitarán'' mantiene mejor el sentido del hebreo y del POB inglés.'
  issues:
  - severity: high
    issue: Cambio injustificado de persona verbal en 'No le añadirás' / 'ni le quitarás'
    rationale: El hebreo pasa de 2mp en תִשְׁמְרוּ a 2ms en תֹסֵף / תִגְרַע, pero el inglés POB uniformó a 'you shall' sin marcar singular. En español, alternar 'les mando' + 'la cuidarán' con 'añadirás/quitarás' genera incoherencia y suena erróneo. Debe mantenerse una línea consistente y legible en plural, como 'añadirán/quitarán'.
  - severity: high
    issue: '''La cuidarán para hacerla'' no comunica naturalmente שׁמר + infinitivo'
    rationale: Aunque intenta reflejar el vínculo entre guardar y hacer, en español suena artificial y puede sugerir proteger una palabra en vez de obedecerla cuidadosamente. El sentido del hebreo es observar/cuidar de cumplir. Una mejor opción es 'la cumplirán cuidadosamente' o 'cuidarán de cumplirla'.
  - severity: medium
    issue: '''ni le quitarás de ella'' es poco idiomático'
    rationale: La combinación de clítico dativo con 'de ella' resulta pesada y extraña. El sentido legal de גרע מִמֶּנּוּ se expresa con naturalidad como 'ni le quitarán' o 'ni le quitarán nada', según el grado de explicitud deseado.
  - severity: low
    issue: 'Texto de nota a con leve problema gramatical: ''todo la palabra'''
    rationale: Si se conserva la literalidad explicativa, en español debe decir 'toda la palabra', no 'todo la palabra'.
  revised_spanish_text: Cada palabra[a] que yo les mando, la cumplirán cuidadosamente. No le añadirán[b] ni le quitarán.
  revised_footnotes:
  - marker: a
    text: 'O: «Toda la palabra que yo les mando». El hebreo usa un singular colectivo, literalmente «toda la palabra».'
    reason: lexical_alternative
  - marker: b
    text: En algunas versificaciones, este versículo se numera como Deuteronomio 12:32.
    reason: textual_variant
  revision_rationale: 'Se corrigió el español para reflejar con claridad y naturalidad el hebreo y la decisión del POB inglés. ''La cumplirán cuidadosamente'' comunica mejor el idiomático שׁמר + infinitivo que ''la cuidarán para hacerla''. También se uniformó la persona verbal en plural para evitar una alternancia confusa en español, y se simplificó la prohibición final a una formulación idiomática y fiel: ''No le añadirán ni le quitarán''. La nota léxica fue ajustada para corregir la literalidad gramatical en español.'
