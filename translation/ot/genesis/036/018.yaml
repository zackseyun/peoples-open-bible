id: GEN.36.18
reference: Genesis 36:18
source:
  edition: WLC
  text: וְ/אֵ֗לֶּה בְּנֵ֤י אָהֳלִֽיבָמָה֙ אֵ֣שֶׁת עֵשָׂ֔ו אַלּ֥וּף יְע֛וּשׁ אַלּ֥וּף יַעְלָ֖ם אַלּ֣וּף קֹ֑רַח אֵ֣לֶּה אַלּוּפֵ֞י אָֽהֳלִיבָמָ֛ה בַּת עֲנָ֖ה אֵ֥שֶׁת עֵשָֽׂו־׃
translation:
  text: 'And these were the sons of Oholibamah[a], Esau’s wife: chief Jeush, chief Jalam, chief Korah. These were the chiefs of Oholibamah daughter of Anah, Esau’s wife.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or “clan chiefs.” The Hebrew term denotes leaders of Edomite groups or clans.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  chosen: sons of
  alternatives:
  - children of
  - descendants of
  lexicon: HALOT
  rationale: The Hebrew specifically uses the masculine plural construct 'sons of,' referring to named male offspring. 'Descendants' would be too broad here, though a broader sense appears later in the verse with the summary statement.
- source_word: אֵשֶׁת עֵשָׂו
  chosen: Esau’s wife
  alternatives:
  - the wife of Esau
  lexicon: HALOT
  rationale: The construct phrase is most naturally rendered in idiomatic English as a possessive. It occurs twice in the verse and is translated consistently.
- source_word: אַלּוּף
  chosen: chief
  alternatives:
  - clan chief
  - duke
  - leader
  lexicon: HALOT
  rationale: In Genesis 36 the term denotes an Edomite tribal or clan leader. 'Chief' is clear modern English and avoids the archaic 'duke.' 'Clan chief' is interpretively fuller but more expansive than the Hebrew in the main text.
- source_word: יְעוּשׁ
  chosen: Jeush
  alternatives:
  - Jeus
  rationale: Standard English transliteration of the personal name.
- source_word: יַעְלָם
  chosen: Jalam
  alternatives:
  - Jaalam
  rationale: Standard English transliteration of the personal name.
- source_word: קֹרַח
  chosen: Korah
  rationale: Standard English transliteration of the personal name.
- source_word: אֵלֶּה אַלּוּפֵי
  chosen: These were the chiefs descended from
  alternatives:
  - These were the chiefs of
  - These are the chiefs of
  lexicon: HALOT
  rationale: The phrase summarizes the named leaders associated with Oholibamah. Rendering with 'descended from' makes explicit in natural English the relationship implied by the preceding genealogy, while staying within the sense of the construct. Past tense 'were' fits the narrative style in English, though the verbless Hebrew could also be rendered more literally.
- source_word: בַּת עֲנָה
  chosen: daughter of Anah
  alternatives:
  - Anah’s daughter
  lexicon: HALOT
  rationale: Straightforward construct rendering; retained in a formal genealogical style.
- source_word: וְאֵלֶּה ... אֵלֶּה
  chosen: And these were ... These were
  alternatives:
  - Now these were ... These are
  lexicon: HALOT
  rationale: The repeated demonstrative frames the verse as a formal genealogical notice. English past tense is smoother in this narrative context than a more wooden present-tense rendering.
