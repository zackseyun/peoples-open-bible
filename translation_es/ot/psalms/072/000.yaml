translation:
  language: es
  text: De Salomón.[a] Dios, da tu justicia al rey, y tu justicia[b] al hijo del rey.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «Para Salomón» o «A Salomón» en la superscripción.
    reason: alternative_reading
  - marker: b
    text: «Tu justicia» también puede traducirse «tu rectitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: לִשְׁלֹמֹה
  english_pob_choice: Of Solomon
  chosen_spanish: De Salomón
  alternatives_spanish:
  - Para Salomón
  - A Salomón
  lexicon: N/A
  rationale: La preposición hebrea en el encabezado permite una relación de dedicación o referencia. En español, «De Salomón» conserva la ambigüedad útil del encabezado, igual que el POB inglés con su nota alternativa.
- source_word: אֱלֹהִים
  english_pob_choice: O God
  chosen_spanish: Oh Dios
  alternatives_spanish:
  - Dios
  lexicon: N/A
  rationale: El hebreo vocativo requiere una invocación directa; «Oh Dios» comunica el llamado al destinatario con naturalidad en español y mantiene el tono solemne del original.
- source_word: מִשְׁפָּטֶיךָ
  english_pob_choice: your justice
  chosen_spanish: tu justicia
  alternatives_spanish:
  - tu juicio
  - tu derecho
  lexicon: N/A
  rationale: «Justicia» es el equivalente principal de מִשְׁפָּט en este contexto regio y judicial. Conserva la fuerza legal/covenantal que refleja el POB inglés.
- source_word: צִדְקָתְךָ
  english_pob_choice: your righteousness
  chosen_spanish: tu rectitud
  alternatives_spanish:
  - tu justicia
  - tu justicia recta
  lexicon: N/A
  rationale: Se eligió «rectitud» para diferenciarlo de מִשְׁפָּטֶיךָ y evitar repetir «justicia» dos veces en español. La nota mantiene la alternativa léxica reconocida por el POB inglés.
- source_word: לְבֶן מֶלֶךְ
  english_pob_choice: to the king's son
  chosen_spanish: al hijo del rey
  alternatives_spanish:
  - al hijo real
  - al príncipe
  lexicon: N/A
  rationale: La expresión hebrea es literal y no requiere embellecimiento. «Hijo del rey» es transparente y mantiene la relación dinástica del original.
theological_decisions:
- issue: Relación entre מִשְׁפָּט / צְדָקָה y sus posibles equivalentes en español
  english_pob_reading: justice / righteousness
  chosen_spanish_reading: justicia / rectitud
  alternative_spanish_readings:
  - justicia / justicia
  - juicio / justicia
  rationale: El hebreo presenta dos términos distintos y el POB inglés también los distingue. En español, «justicia» para מִשְׁפָּט y «rectitud» para צְדָקָה preserva esa tensión sin borrar la diferencia semántica.
  doctrine_reference: Salmo 72:1; lenguaje regio de justicia y rectitud en el reinado davídico
- issue: Encabezado poético como superscripción
  english_pob_reading: Of Solomon.
  chosen_spanish_reading: De Salomón.
  alternative_spanish_readings:
  - Para Salomón.
  - A Salomón.
  rationale: El hebreo lamed inicial en la superscripción admite varias lecturas. Como el POB inglés conserva esa ambigüedad con nota, el español también la preserva con una alternativa en nota.
  doctrine_reference: Superscripción del Salmo 72
translation_notes:
  revision_awareness: 'El contexto auditado muestra una revisión importante: la versión inglesa anterior omitía el cuerpo principal del versículo y fue corregida para incluir la súplica completa. La redacción española sigue el texto hebreo completo de la fuente, no la forma defectuosa previa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto solo cuando el hebreo usa el nombre divino, pero aquí el texto dice אֱלֹהִים, por lo que corresponde «Dios».
  - Se preserva la distinción semántica entre «justicia» y «rectitud» para no colapsar מִשְׁפָּט y צְדָקָה.
  - La superscripción se trata como parte del registro textual con nota de alternativa, coherente con el audit trail inglés.
