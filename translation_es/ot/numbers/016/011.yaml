translation:
  language: es
  text: Por tanto, tú y toda tu compañía[a], los que se han reunido contra Yahvé[b]—y Aarón, ¿qué es él[c], para que murmuran contra él?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu asamblea» o «tu congregación».'
    reason: lexical_alternative
  - marker: b
    text: «Yahvé» traduce el nombre divino YHWH.
    reason: lexical_alternative
  - marker: c
    text: 'O: «y en cuanto a Aarón, ¿quién es él?». El sentido es que la rebelión es, en última instancia, contra Yahvé y no solo contra Aarón.'
    reason: alternative_reading
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduce una conclusión inferida del reproche anterior. «Por tanto» conserva la fuerza lógica de la partícula y suena natural en español bíblico contemporáneo.
- source_word: עֲדָתְךָ
  english_pob_choice: your company
  chosen_spanish: tu compañía
  alternatives_spanish:
  - tu congregación
  - tu asamblea
  lexicon: HALOT
  rationale: En este contexto polémico, «compañía» comunica mejor el sentido de grupo reunido y rebelde que «congregación», que en español suele sonar más eclesial. Se mantiene la referencia al grupo de Coré sin suavizarla.
- source_word: הַנֹּעָדִים
  english_pob_choice: who have assembled
  chosen_spanish: los que se han reunido
  alternatives_spanish:
  - los que están reunidos
  - los que se han juntado
  lexicon: HALOT
  rationale: El participio nifal expresa gente congregada o citada para reunirse. «Los que se han reunido» preserva el valor resultativo sin añadir una intención no explicitada en el hebreo.
- source_word: עַל יְהוָה
  english_pob_choice: against Yahweh
  chosen_spanish: contra Yahvé
  alternatives_spanish:
  - frente a Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: La preposición עַל tiene aquí fuerza adversativa. Se traduce con «contra» para conservar el tono de rebelión. El nombre divino se rinde como «Yahvé» conforme al criterio del proyecto.
- source_word: וְאַהֲרֹן מַה הוּא
  english_pob_choice: and Aaron, what is he
  chosen_spanish: y Aarón, ¿qué es él
  alternatives_spanish:
  - y en cuanto a Aarón, ¿quién es él?
  - y Aarón, ¿qué vale él?
  lexicon: HALOT
  rationale: Se conserva la pregunta retórica que minimiza a Aarón en contraste con la ofensa principal dirigida a Yahvé. «¿Qué es él?» reproduce la dureza del hebreo sin inflarla a una formulación interpretativa más fuerte.
- source_word: תלונו עָלָיו
  english_pob_choice: you grumble against him
  chosen_spanish: murmuren contra él
  alternatives_spanish:
  - se quejen de él
  - murmuren de él
  lexicon: HALOT
  rationale: La forma hifil de לון suele expresar queja o murmuración rebelde en el desierto. «Murmuren» conserva ese matiz negativo mejor que «comenten» o «se quejen», y «contra él» expresa el valor adversativo de עַל en este contexto.
theological_decisions:
- issue: Rendering the divine name YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Siguiendo el criterio del proyecto, se lo vierte como «Yahvé» para preservar el nombre pactual de Dios y evitar la sustitución litúrgica «SEÑOR».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Theologically locating the rebellion
  english_pob_reading: The main clause is rendered to show that the assembly has assembled against the LORD, while Aaron is rhetorically minimized as secondary.
  chosen_spanish_reading: La traducción mantiene que la reunión está contra Yahvé, y que Aarón aparece después como objeto secundario de la murmuración.
  alternative_spanish_readings:
  - La reunión se opone por igual a Yahvé y a Aarón
  - Yahvé y Aarón son atacados en el mismo nivel
  rationale: La sintaxis hebrea coloca el peso principal sobre la rebelión contra Yahvé; la referencia a Aarón funciona como cierre retórico. La redacción española conserva esa jerarquía para no igualar indebidamente ambos objetos de la queja.
  doctrine_reference: Sintaxis y teología narrativa de Números 16:11
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el pasaje auditado en inglés, donde no hubo revisiones posteriores al último pase y el revisor señaló solo observaciones menores. La versión española sigue el mismo análisis sintáctico y teológico: la reunión está «contra Yahvé» y Aarón queda formulado con una pregunta retórica de minimización.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma principal del nombre divino, coherente con el criterio del proyecto.
  - Se conserva «Aarón» sin artículos añadidos, conforme al hebreo y al estilo bíblico español.
  - «Murmuren» se usa para reflejar el valor de queja rebelde del hifil de לון.
  - La puntuación con raya conserva el quiebre retórico del hebreo entre la cláusula principal y la pregunta sobre Aarón.
