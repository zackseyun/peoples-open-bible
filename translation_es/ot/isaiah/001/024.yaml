  to: 'Por tanto, la declaración del Señor[a], Yahvé de los Ejércitos[b], el Poderoso de Israel: «¡Ah![c], me aliviaré de mis adversarios y tomaré venganza de mis enemigos».'
  rationale: 'Se conserva fielmente el contenido del hebreo y del audit trail inglés, pero se corrigen tres puntos: una nota mal formulada, una expresión española menos natural para la venganza divina y una puntuación interna mejorable. «Tomaré venganza de mis enemigos» preserva mejor la fuerza judicial del hebreo en español claro y digno, sin fusionar los dos verbos.'
