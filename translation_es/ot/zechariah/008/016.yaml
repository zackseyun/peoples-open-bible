  text: אֵ֥לֶּה הַ/דְּבָרִ֖ים אֲשֶׁ֣ר תַּֽעֲשׂ֑וּ דַּבְּר֤וּ אֱמֶת֙ אִ֣ישׁ אֶת רֵעֵ֔/הוּ אֱמֶת֙ וּ/מִשְׁפַּ֣ט שָׁל֔וֹם שִׁפְט֖וּ בְּ/שַׁעֲרֵי/כֶֽם־׃
base_translation:
  language: en
  yaml_path: translation/ot/zechariah/008/016.yaml
  text: 'These are the things that you must do: speak truth to one another[c][b][a]; judge with truth and a judgment of peace in your gates.'
  footnotes:
