translation:
  language: es
  text: Canten la gloria de su nombre; hagan gloriosa[a] su alabanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Den gloria a su alabanza». El hebreo emplea el sustantivo «gloria» en un giro idiomático que también puede traducirse de manera más literal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זַמְּרוּ
  english_pob_choice: Sing
  chosen_spanish: Canten
  alternatives_spanish:
  - Canten alabanzas
  - Canten música de alabanza
  lexicon: HALOT
  rationale: El imperativo plural pide una acción de alabanza musical. En español, «canten» transmite de forma natural y digna la invitación colectiva, sin añadir elementos que el hebreo no exige.
- source_word: כְבוֹד שְׁמוֹ
  english_pob_choice: the glory of his name
  chosen_spanish: la gloria de su nombre
  alternatives_spanish:
  - su nombre glorioso
  - el honor de su nombre
  lexicon: HALOT
  rationale: 'Mantiene con transparencia el sintagma en constructo: la gloria pertenece a su nombre. «La gloria de su nombre» conserva mejor la relación nominal que una reformulación adjetival.'
- source_word: שִׂימוּ
  english_pob_choice: make
  chosen_spanish: hagan
  alternatives_spanish:
  - pongan
  - asignen
  - atribuyan
  lexicon: HALOT
  rationale: El sentido literal de «poner/poner en» no suena natural aquí. «Hagan» permite una construcción española idiomática con el predicativo siguiente, equivalente funcionalmente a la exhortación del hebreo.
- source_word: כָבוֹד
  english_pob_choice: glorious
  chosen_spanish: gloriosa
  alternatives_spanish:
  - de gloria
  - honrosa
  lexicon: HALOT
  rationale: El hebreo usa el sustantivo «gloria» de modo idiomático en la segunda cola. En español, la solución más natural es el adjetivo «gloriosa», que conserva la fuerza del giro sin ocultar el valor léxico.
- source_word: תְּהִלָּתוֹ
  english_pob_choice: his praise
  chosen_spanish: su alabanza
  alternatives_spanish:
  - su praise
  - la alabanza para él
  lexicon: HALOT
  rationale: «Alabanza» comunica bien el sustantivo hebreo y su sufijo posesivo. «Su alabanza» mantiene la referencia directa y permite la lectura idiomática de que la alabanza dirigida a Dios ha de ser hecha espléndida.
theological_decisions:
- issue: La relación entre «gloria» y «alabanza» en la segunda cola
  english_pob_reading: Or 'Make glorious his praise.' The Hebrew uses the noun 'glory' in an idiom that can be rendered more literally.
  chosen_spanish_reading: hagan gloriosa su alabanza
  alternative_spanish_readings:
  - hagan la gloria de su alabanza
  - pongan gloria en su alabanza
  - hagan glorioso su elogio
  rationale: 'Se conserva la tensión observada en el original: el hebreo dice literalmente «pongan gloria» sobre la alabanza. El español natural exige un predicativo; «gloriosa» reproduce el efecto idiomático sin perder la base léxica de כָבוֹד.'
  doctrine_reference: Salmo 96:8; 1 Crónicas 16:29
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés y el hebreo fuente. La única adaptación principal fue convertir el segundo miembro a una equivalencia idiomática española («hagan gloriosa su alabanza») para conservar el giro con כָבוֹד sin producir un calco duro. No hubo revisiones posteriores que alteraran el sentido básico.
  spanish_consistency_notes:
  - Se mantiene «gloria» para כָבוֹד y «alabanza» para תְּהִלָּה, sin fusionar ambos términos.
  - Se usa trato imperativo plural coherente con el hebreo.
  - No se reemplazó el nombre divino por una convención de ocultamiento; aquí no aparece el Tetragrámaton.
