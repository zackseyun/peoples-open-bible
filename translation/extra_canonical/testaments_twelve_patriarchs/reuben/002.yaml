theological_decisions:
- issue: How to render μετανοία in a confessional testament context
  chosen_reading: in my repentance
  alternative_readings:
  - in my change of mind
  - when I repented
  rationale: The chapter opens from Reuben's penitential self-disclosure after sexual sin. In this setting, the morally charged sense of repentance is more fitting than the more cognitive 'change of mind.'
  doctrine_reference: 'DOCTRINE.md: μετανοέω context rule'
- issue: Whether the bracketed material describing the seven created spirits should be translated as part of the chapter
  chosen_reading: Included in the main text with no excision
  alternative_readings:
  - Treat as secondary expansion and relegate to note
  - Omit as interpolation
  rationale: The supplied Greek witness includes the passage as part of the chapter, and the project requires honest translation of the witness text. Its somewhat schematic style is noted through lexical transparency rather than silent removal.
