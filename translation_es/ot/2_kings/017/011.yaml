translation:
  language: es
  text: Allí quemaron incienso en todos los lugares altos[a], como las naciones que Yahvé había expulsado de delante de ellos; e hicieron cosas malas para provocar a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «a quienes Yahvé había desterrado de delante de ellos». El verbo hebreo puede denotar llevarse o remover; aquí se refiere a las naciones desposeídas de la tierra.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְקַטְּרוּ
  english_pob_choice: they burned incense
  chosen_spanish: quemaron incienso
  alternatives_spanish:
  - hicieron humo de incienso
  - ofrecieron incienso
  lexicon: HALOT
  rationale: El verbo en piel en este contexto cultual se refiere de manera natural a quemar incienso; en español, 'quemaron incienso' conserva el sentido sacrificial y la fuerza del acto de culto ilícito sin generalizarlo a cualquier ofrenda.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: HALOT
  rationale: '''Allí'' reproduce el valor adverbial del hebreo y se entiende con naturalidad en español, remitiendo a los lugares altos mencionados en el contexto inmediato.'
- source_word: בְּכָל בָּמוֹת
  english_pob_choice: on all the high places
  chosen_spanish: en todos los lugares altos
  alternatives_spanish:
  - sobre todos los lugares altos
  - en cada lugar alto
  lexicon: HALOT
  rationale: '''בָּמוֹת'' designa un término técnico de culto. ''Lugares altos'' preserva esa categoría bíblica; ''en'' refleja de manera natural la preposición hebrea en español.'
- source_word: כַּגּוֹיִם
  english_pob_choice: like the nations
  chosen_spanish: como las naciones
  alternatives_spanish:
  - igual que las naciones
  - como los pueblos
  lexicon: HALOT
  rationale: '''Naciones'' conserva el referente étnico-histórico del hebreo en este pasaje, y ''como'' expresa la comparación sin forzar una interpretación adicional.'
- source_word: אֲשֶׁר הֶגְלָה יְהוָה מִפְּנֵיהֶם
  english_pob_choice: whom Yahweh had driven out before them
  chosen_spanish: que Yahvé había expulsado de delante de ellos
  alternatives_spanish:
  - que Yahvé había desterrado de delante de ellos
  - que Yahvé había removido de delante de ellos
  lexicon: HALOT
  rationale: El verbo הֶגְלָה puede abarcar 'llevar cautivo/exiliar', pero en este contexto de conquista y desposesión el sentido es expulsar/retirar del territorio. 'Expulsado de delante de ellos' preserva el movimiento espacial y la idea de desalojo del país.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Siguiendo el criterio del proyecto, el Tetragrama se rinde como 'Yahvé' en el texto principal, manteniendo el nombre divino personal y evitando la sustitución por un título.
- source_word: וַיַּעֲשׂוּ דְּבָרִים רָעִים
  english_pob_choice: they did evil things
  chosen_spanish: hicieron cosas malas
  alternatives_spanish:
  - hicieron cosas perversas
  - cometieron cosas malas
  lexicon: HALOT
  rationale: La frase hebrea es amplia y acusa conducta moralmente mala. 'Hicieron cosas malas' es directo y fiel al alcance general del original sin estrecharlo indebidamente.
- source_word: לְהַכְעִיס
  english_pob_choice: to provoke
  chosen_spanish: para provocar
  alternatives_spanish:
  - para irritar
  - para provocar a ira
  lexicon: HALOT
  rationale: El hiphil expresa causar enojo o provocar. En español, 'provocar' comunica la acción; el complemento con Yahvé deja claro que se trata de provocarlo a ira, como en el contexto bíblico.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo contiene el Tetragrama. Conforme al criterio del proyecto, se translitera como 'Yahvé' para preservar el nombre propio de Dios en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — YHWH → Yahvé'
- issue: Sentido de הֶגְלָה en contexto de conquista
  english_pob_reading: driven out before them
  chosen_spanish_reading: expulsado de delante de ellos
  alternative_spanish_readings:
  - desterrado de delante de ellos
  - removido de delante de ellos
  rationale: Aquí el verbo apunta a la desposesión de las naciones del territorio, no primariamente al exilio posterior. 'Expulsado de delante de ellos' comunica bien el sentido histórico-teológico sin perder la idea de remoción por acción divina.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 Original-language primacy over translation tradition
translation_notes:
  revision_awareness: 'El borrador sigue el cierre reciente de alta concordancia: no introduce cambios sustanciales respecto del contexto inglés auditado. La única tensión relevante se conserva en la nota de pie sobre הֶגְלָה, donde el español también puede sugerir ''desterrar'' además de ''expulsar''.'
  spanish_consistency_notes:
  - Se conserva 'Yahvé' como forma del nombre divino en todo el registro.
  - '''Lugares altos'' mantiene el término cultual técnico de Reyes.'
  - '''Quemaron incienso'' evita ampliar el verbo a sacrificio general, en línea con el contexto de culto ilícito.'
  - '''Hicieron cosas malas'' refleja la amplitud moral de דְּבָרִים רָעִים sin intensificar más allá del hebreo.'
  - La nota de pie marca la alternativa semántica principal de הֶגְלָה para mantener auditable la decisión.
