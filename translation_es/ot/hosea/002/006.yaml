translation:
  language: es
  text: Y no tendré compasión de sus hijos[a], porque ellos son hijos de fornicación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: "hijos de prostitución" o "hijos de ramería". El hebreo conserva la imaginería sexual cruda de la infidelidad, que simboliza la ruptura del pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בָּנֶיהָ
  english_pob_choice: her children
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos e hijas
  - sus descendientes
  - sus niños
  lexicon: HALOT
  rationale: El hebreo usa un sustantivo masculino plural que puede funcionar de manera genérica para la descendencia. En español, "sus hijos" conserva esa referencia amplia sin forzar un masculino exclusivamente biológico ni añadir una precisión no exigida por el texto.
- source_word: לֹא אֲרַחֵם
  english_pob_choice: I will not show compassion
  chosen_spanish: no tendré compasión
  alternatives_spanish:
  - no mostraré compasión
  - no tendré misericordia
  - no me apiadaré
  lexicon: HALOT
  rationale: El verbo piel de רחם expresa la negación de compasión/clemencia. "No tendré compasión" es natural en español y mantiene el valor afectivo y judicial del giro sin caer en un calco rígido.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  - porque en efecto
  lexicon: HALOT
  rationale: Aquí introduce la razón de la negativa anterior. "Porque" comunica de forma directa la relación causal en español bíblico contemporáneo.
- source_word: בְנֵי זְנוּנִים
  english_pob_choice: children of whoredom
  chosen_spanish: hijos de prostitución
  alternatives_spanish:
  - hijos de fornicación
  - hijos de prostitución ritual
  - hijos de infidelidad
  lexicon: HALOT
  rationale: Se preserva la imagen sexual fuerte del hebreo sin suavizarla a un término abstracto. "Prostitución" es una opción intelligible y digna en español moderno; conserva la carga moral y metafórica que el POB inglés quiso mantener, aunque no reproduce exactamente la palabra "whoredom".
- source_word: הֵמָּה
  english_pob_choice: they are
  chosen_spanish: ellos son
  alternatives_spanish:
  - son ellos
  - ellos mismos son
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis predicativo. En español, "ellos son" conserva ese relieve sin necesidad de una duplicación excesiva.
- source_word: וְ/אֶת
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y además
  - Y en cuanto a
  lexicon: HALOT
  rationale: El prefijo conjuntivo enlaza con la cláusula precedente; en español no se traduce el objeto marcador separado, de modo que "Y" transmite el avance discursivo de manera natural.
theological_decisions:
- issue: Intensidad de la acusación בְנֵי זְנוּנִים en la metáfora profética
  english_pob_reading: children of whoredom
  chosen_spanish_reading: hijos de prostitución
  alternative_spanish_readings:
  - hijos de infidelidad
  - hijos de fornicación
  - hijos de prostitución
  rationale: La frase participa de la metáfora matrimonial de Oseas sobre la infidelidad de Israel. Conviene mantener el lenguaje severo y sexualmente cargado del original, sin convertirlo en una paráfrasis moral abstracta ni insinuar más allá del signo profético. "Prostitución" conserva la dureza sin añadir una interpretación doctrinal adicional.
  doctrine_reference: Oseas 1–2; filosofía de traducción del POB sobre metáfora profética y fidelidad léxica
translation_notes:
  revision_awareness: El texto base inglés mantiene el sentido simple de una negativa divina seguida de una razón causal y conserva la imagen fuerte de זְנוּנִים. No hay revisiones aplicadas en el audit trail; esta versión española sigue esa misma línea, preservando la tensión léxica sin suavización.
  spanish_consistency_notes:
  - Se usa "compasión" para רחם, en coherencia con el valor afectivo del piel y con español contemporáneo.
  - Se eligió "prostitución" para זְנוּנִים por ser claro y mantener la fuerza metafórica; no se sustituyó por un eufemismo doctrinalmente más débil.
  - El pronombre enfático hebreo se refleja con la estructura explícita "ellos son".
  - El marcador de objeto directo no se vierte literalmente, conforme al uso normal del español y al tratamiento del POB inglés.
