translation:
  language: es
  text: Y todos los hijos[a] de Israel hicieron tal como Yahvé había mandado a Moisés y a Aarón; así lo hicieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los israelitas» o «los hijos de Israel». Hebreo: «los hijos de Israel».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: And ... did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - obraron
  lexicon: HALOT
  rationale: עשה en este contexto expresa la acción obediente de cumplir lo mandado. En español, «hicieron» conserva el valor básico de «hacer» y permite mantener el paralelismo con la repetición final del verbo sin recargar el estilo.
- source_word: כָּל
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - la totalidad de
  - el conjunto de
  lexicon: HALOT
  rationale: כָּל con el sintagma siguiente señala totalidad. «Todos» es la forma más natural en español y preserva la idea de totalidad del grupo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la expresión familiar masculina del hebreo. «Hijos de Israel» reproduce el paralelo formal del original mejor que «israelitas», que sería más idiomático pero menos transparente.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: conforme a lo que
  alternatives_spanish:
  - así como
  - según
  lexicon: HALOT
  rationale: La partícula introduce conformidad exacta con el mandato. «Conforme a lo que» expresa bien esa relación de correspondencia sin perder naturalidad en español.
- source_word: צִוָּה
  english_pob_choice: had commanded
  chosen_spanish: había mandado
  alternatives_spanish:
  - había ordenado
  - mandó
  lexicon: HALOT
  rationale: צוה implica ordenar/mandar. «Había mandado» es más directo y bíblicamente sobrio en español, y el pluscuamperfecto preserva la anterioridad del mandato respecto de la obediencia.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrama: usar «Yahvé» en el texto principal, preservando el nombre divino revelado en lugar de sustituirlo por un título.'
- source_word: אֶת מֹשֶׁה וְאֶת אַהֲרֹן
  english_pob_choice: Moses and Aaron
  chosen_spanish: a Moisés y a Aarón
  alternatives_spanish:
  - Moisés y Aarón
  - por medio de Moisés y Aarón
  lexicon: HALOT
  rationale: Los marcadores de objeto directo señalan a Moisés y Aarón como los destinatarios del mandato. En español se conserva con la preposición «a», mientras que «por medio de» introduciría una mediación no explícita en el hebreo.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de esa manera
  - de igual modo
  lexicon: HALOT
  rationale: כֵּן retoma la correspondencia exacta con la orden anterior. «Así» mantiene el énfasis y permite cerrar la frase con buena fluidez.
- source_word: עָשׂוּ
  english_pob_choice: they did
  chosen_spanish: lo hicieron
  alternatives_spanish:
  - así lo hicieron
  - hicieron eso
  lexicon: HALOT
  rationale: La repetición del verbo final intensifica la obediencia. «Lo hicieron» conserva la reiteración de «hacer» sin sonar forzado; el pronombre retoma la acción ya mencionada.
theological_decisions:
- issue: Renderización del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  rationale: El texto hebreo usa directamente el Tetragrama. La forma «Yahvé» sigue la terminología del proyecto para hacer visible el nombre pactual de Dios sin recurrir a la sustitución tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Jacob
  rationale: Se preserva la formulación masculinizada y genealógica del hebreo, conforme al principio de precisión formal del proyecto. «Israelitas» sería aceptable idiomáticamente, pero atenúa la forma fuente.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §4: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El borrador sigue el pasaje hebreo masorético sin cambios textuales reportados en el paquete auditado. Se preserva la repetición final del verbo de obediencia y la estructura de conformidad exacta con el mandato. No se detectaron revisiones aplicadas en el historial reciente, y el estado de control cruzado indica alta concordancia con solo observaciones menores.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה, conforme al estándar del proyecto.
  - Se conserva «los hijos de Israel» para reflejar la forma masculina plural del hebreo.
  - Se mantiene la repetición de la raíz verbal con «hicieron ... lo hicieron» para no suavizar el énfasis de obediencia.
  - La sintaxis sigue el orden lógico del hebreo, pero se ajusta para sonar natural en español bíblico contemporáneo.
