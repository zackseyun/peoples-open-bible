translation:
  language: es
  text: 'Pues consideren también esto: si la mujer hubiera sido de ánimo pusilánime[a], aunque era madre, habría lamentado sobre ellos; y quizá habría dicho estas cosas así:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De ánimo pusilánime» busca mantener el valor moral-psicológico de δειλόψυχος sin cargar el texto con «cobarde», que en español resulta más acusatorio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιλογίσασθαι
  english_pob_choice: consider
  chosen_spanish: consideren
  alternatives_spanish:
  - reflexionen sobre
  - tomen en cuenta
  - razonen también esto
  lexicon: LSJ
  rationale: El infinitivo exhortativo introduce un punto adicional para que el lector lo evalúe. «Consideren» reproduce bien esa llamada a ponderar sin volverla más explicativa de lo que permite el griego.
- source_word: δειλόψυχος
  english_pob_choice: fainthearted
  chosen_spanish: de ánimo pusilánime
  alternatives_spanish:
  - cobarde
  - temerosa
  - de espíritu débil
  lexicon: LSJ
  rationale: El compuesto expresa falta de valor o firmeza interior. En español, «pusilánime» conserva ese matiz moral-psicológico y evita el tono más acusatorio de «cobarde», que sería demasiado fuerte para la hipótesis del pasaje.
- source_word: γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - la madre
  lexicon: LSJ
  rationale: El sustantivo se mantiene genérico como «la mujer», porque el griego la identifica aparte con μήτηρ οὖσα. Traducirla ya como «madre» borraría ese énfasis apposicional.
- source_word: μήτηρ οὖσα
  english_pob_choice: though she was a mother
  chosen_spanish: aunque era madre
  alternatives_spanish:
  - siendo madre
  - pese a ser madre
  lexicon: LSJ
  rationale: La concesión en el griego está reforzada por καίπερ. «Aunque era madre» comunica de forma natural ese contraste y mantiene la fuerza retórica del argumento.
- source_word: ὠλοφύρετο
  english_pob_choice: would have wailed
  chosen_spanish: habría lamentado
  alternatives_spanish:
  - habría gemido
  - habría llorado en duelo
  - habría dado lamentos
  lexicon: LSJ
  rationale: El verbo señala lamentación audible y doliente. «Habría lamentado» es una opción digna y clara en español; evita el arcaísmo de «plañir» y conserva el tono de duelo.
- source_word: ἐπʼ αὐτοῖς
  english_pob_choice: over them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - por ellos
  - a causa de ellos
  lexicon: LSJ
  rationale: En este contexto la preposición indica el objeto del lamento. «Sobre ellos» preserva el vínculo directo con los hijos aludidos y refleja de cerca la imagen griega.
- source_word: ἴσως
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - posiblemente
  lexicon: LSJ
  rationale: La partícula marca una posibilidad hipotética y atenuada. «Quizá» reproduce bien esa cautela antes de la cita imaginada.
- source_word: ταῦτα οὕτως εἶπεν
  english_pob_choice: she would have spoken like this
  chosen_spanish: habría dicho estas cosas así
  alternatives_spanish:
  - habría hablado así
  - habría dicho esto de este modo
  - habría expresado esto así
  lexicon: LSJ
  rationale: La frase introduce el discurso imaginado que sigue. «Habría dicho estas cosas así» conserva la deixis de ταῦτα y la manera adverbial de οὕτως sin forzar un giro demasiado libre.
theological_decisions:
- issue: Tensión entre instinto materno y firmeza ejemplar
  english_pob_reading: 'Render the clause straightforwardly as a hypothetical contrast: if she had been fainthearted, despite being a mother, she would have lamented.'
  chosen_spanish_reading: 'Traducir el contraste hipotético de modo directo: si la mujer hubiera sido de ánimo pusilánime, aunque era madre, habría lamentado sobre ellos.'
  alternative_spanish_readings:
  - si hubiera sido cobarde
  - si hubiera sido débil de ánimo, como madre habría llorado por ellos
  rationale: El verso construye una contraposición retórica, no una afirmación doctrinal. La versión española conserva la tensión entre la condición de madre y la posibilidad hipotética de un lamento, sin suavizar ni explicar de más el argumento.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no añadió notas ni variantes textuales; la redacción española sigue de cerca las decisiones léxicas aprobadas y conserva la progresión sintáctica del griego: exhortación, condicional hipotética, concesión, lamento y cierre introductorio del discurso imaginado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; este versículo no lo contiene.
  - Se preserva «la mujer» en lugar de «la madre» para no perder la apposición μήτηρ οὖσα.
  - «Sobre ellos» refleja el alcance del lamento sin introducir una preposición más interpretativa.
  - El tono es sobrio y bíblico en español moderno, evitando tanto arcaísmos innecesarios como paráfrasis expansivas.
