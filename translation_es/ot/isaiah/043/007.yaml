- from: Todo el que es llamado por mi nombre[a], a quien he creado para mi gloria, a quien he formado, sí, a quien he hecho.
  to: Todo el que es llamado por mi nombre[a], a quien creé para mi gloria, a quien formé, sí, a quien hice.
  rationale: Se corrigió la nota al pie para que sea gramatical y fiel a la alternativa formal documentada. También se cambió la serie verbal al pretérito simple («creé / formé / hice»), que representa mejor la secuencia hebrea y suena más natural y digno en español bíblico contemporáneo. Se mantuvo «por mi nombre» y «para mi gloria» por su buena fidelidad léxica y teológica.
