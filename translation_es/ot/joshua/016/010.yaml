translation:
  language: es
  text: Pero no expulsaron[a] a los cananeos que habitaban en Gezer[b], y los cananeos han habitado en medio de Efraín hasta el día de hoy, y han sido sometidos a trabajo forzoso[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no desposeyeron» o «no echaron fuera». El verbo hebreo puede denotar hacer perder la posesión o remover de la tierra.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «el cananeo», forma singular con fuerza colectiva que se refiere a la población cananea.'
    reason: lexical_alternative
  - marker: c
    text: O «han llegado a ser trabajadores forzados». La frase apunta a servicio laboral compulsorio, no solo al pago de tributo.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹרִישׁוּ
  english_pob_choice: did not drive out
  chosen_spanish: no expulsaron
  alternatives_spanish:
  - no desposeyeron
  - no echaron fuera
  lexicon: HALOT
  rationale: En contextos de conquista, el verbo hifil de ירשׁ expresa hacer salir o remover de la posesión. «Expulsaron» comunica bien la acción de no remover a los habitantes de la tierra, y es natural en español contemporáneo sin perder la fuerza de desalojo/conquista.
- source_word: הַכְּנַעֲנִי
  english_pob_choice: the Canaanites
  chosen_spanish: los cananeos
  alternatives_spanish:
  - el cananeo
  - el pueblo cananeo
  lexicon: HALOT
  rationale: Aunque el hebreo usa forma singular con fuerza colectiva, en español el plural refleja mejor el sentido colectivo que el audit trail inglés ya documenta.
- source_word: הַיּוֹשֵׁב בְּגָזֶר
  english_pob_choice: who lived in Gezer
  chosen_spanish: que habitaban en Gezer
  alternatives_spanish:
  - que vivían en Gezer
  - que residían en Gezer
  lexicon: HALOT
  rationale: El participio describe al grupo residente en Gezer. «Habitaban» preserva el sentido durativo y es fluido en español bíblico sin sonar arcaico.
- source_word: וַיֵּשֶׁב
  english_pob_choice: have lived
  chosen_spanish: han habitado
  alternatives_spanish:
  - han vivido
  - han permanecido
  lexicon: HALOT
  rationale: Con «hasta el día de hoy», el hebreo indica una condición que continúa desde el pasado hasta el presente narrativo. El presente perfecto español («han habitado») reproduce esa continuidad.
- source_word: בְּקֶרֶב אֶפְרַיִם
  english_pob_choice: in the midst of Ephraim
  chosen_spanish: en medio de Efraín
  alternatives_spanish:
  - entre Efraín
  - dentro de Efraín
  lexicon: HALOT
  rationale: «En medio de» conserva la imagen espacial y social del hebreo בקרב, indicando presencia dentro del territorio/ámbito de Efraín.
- source_word: עַד הַיּוֹם הַזֶּה
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: HALOT
  rationale: Es la fórmula temporal idiomática estándar en español y mantiene el valor de continuidad hasta el momento de escritura.
- source_word: לְמַס עֹבֵד
  english_pob_choice: forced laborers
  chosen_spanish: como esclavos de trabajo
  alternatives_spanish:
  - a trabajo forzoso
  - como trabajadores forzados
  - sometidos a trabajo forzoso
  lexicon: HALOT
  rationale: מַס aquí denota corvée o trabajo compulsorio, no simple tributo monetario. «Esclavos de trabajo» intenta conservar la dureza del término y el valor de servicio obligatorio, aunque es una formulación menos común; se usa para no suavizar indebidamente la fuerza lexical.
translation_notes:
  revision_awareness: La versión inglesa más reciente cambió «so» por «and» para reflejar la coordinación hebrea de manera más neutral, y añadió el perfecto «have become» junto con «have lived». En español se reflejó esa coordinación con «y» en ambas cláusulas, y se mantuvo la continuidad temporal con el perfecto «han habitado»; el resultado final se expresó con «han quedado como esclavos de trabajo» para preservar el estado resultativo sin convertirlo en una mera inferencia causal.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se evitó «SEÑOR» porque no aparece en el texto base y no hay razón para ocultar un nombre divino.
  - Se eligió un plural español («los cananeos») para reflejar el singular colectivo hebreo documentado por la auditoría inglesa.
  - La expresión «esclavos de trabajo» es deliberadamente fuerte para mantener la dureza del término מַס; si el equipo editorial prefiere mayor idiomaticidad, la alternativa mejor atestiguada es «sometidos a trabajo forzoso».
