  - severity: medium
    issue: La nota al pie no refleja con precisión la alternativa auditada en inglés
    rationale: La nota española cita prácticamente la misma lectura distributiva ya puesta en el texto principal. El inglés principal lleva 'for the head of their fathers’ house' y la nota ofrece la alternativa distributiva 'for each head...'. Conviene invertir eso en español para preservar mejor la relación entre texto principal y nota.
  - severity: low
    issue: '''por cada cabeza'' en el texto principal suena forzado'
    rationale: La metáfora 'cabeza' puede mantenerse, pero en texto corrido resulta más claro 'jefe' y dejar la literalidad/alternativa en nota si se desea. Esto mejora la legibilidad sin perder el sentido representativo.
  revised_spanish_text: Y escribirás el nombre de Aarón sobre la vara de Leví[a], porque habrá una sola vara para el jefe de la casa de sus padres.
  revised_footnotes:
