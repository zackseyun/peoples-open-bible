review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: Jonatán y su campamento acampan junto al agua de Genesar y luego salen temprano hacia la llanura de Nasor. Las decisiones principales para παρεμβολή, παρενέβαλον, ἐπὶ τὸ ὕδωρ, Γεννησάρ y Νασώρ son fieles. Sin embargo, la nota [b] no corresponde al tipo de nota preservado en el rastro inglés: allí la nota léxica relevante se refiere a la segunda cláusula (el movimiento implícito en εἰς τὸ πεδίον Νασώρ), no a la primera cláusula. Además, ''madrugaron por la mañana'' suena redundante en español.'
  spanish_quality_summary: El texto es generalmente natural y claro, pero 'madrugaron por la mañana' resulta pesado porque 'madrugar' ya incluye la idea matutina. Una formulación como 'se levantaron temprano por la mañana' o 'madrugaron y fueron...' resolvería la redundancia; la primera conserva mejor la doble insistencia temporal de ὤρθρισαν τὸ πρωὶ. También conviene corregir las notas para que anclen las mismas alternativas significativas que el inglés POB.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Los nombres propios 'Genesar' y 'Nasor' respetan la forma griega auditada. 'Campamento', 'acamparon', 'junto al agua' y 'llanura' están bien alineados con las decisiones léxicas documentadas.
  issues:
  - severity: medium
    issue: La nota [b] está mal enfocada y no sigue el rastro de auditoría inglés.
    rationale: 'La nota inglesa [a] explica la segunda cláusula: el griego dice literalmente ''se levantaron temprano por la mañana hacia/a la llanura de Nasor'', con el movimiento implícito. La nota española [b] en cambio comenta la primera cláusula y aporta una observación que no corresponde a una alternativa preservada.'
  - severity: low
    issue: '''Madrugaron por la mañana'' es redundante en español.'
    rationale: El griego sí tiene doble énfasis temporal (ὤρθρισαν + τὸ πρωὶ), pero en español esa combinación concreta suena poco elegante. 'Se levantaron temprano por la mañana' conserva el énfasis con mejor legibilidad.
  revised_spanish_text: Y Jonatán y su campamento acamparon junto al agua de Genesar[a], y se levantaron temprano por la mañana y fueron a la llanura de Nasor[b].
  revised_footnotes:
  - marker: a
    text: «Genesar» sigue la forma griega Γεννησάρ del texto base; muchos lectores conocen este lugar como «Genesaret».
    reason: alternative_reading
  - marker: b
    text: O «a la llanura de Nasor». El griego dice literalmente «se levantaron temprano por la mañana hacia/a la llanura de Nasor», con el movimiento hacia la llanura implícito más que expresado por un verbo separado de viaje.
    reason: lexical_alternative
