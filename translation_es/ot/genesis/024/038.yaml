translation:
  language: es
  text: Pero irás a la casa de mi padre y a mi clan[a], y tomarás esposa para mi hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mi familia» o «mis parientes» para «mi clan». El hebreo se refiere a un grupo familiar ampliado, no solo al hogar inmediato.
    reason: lexical_alternative
lexical_decisions:
- source_word: אִם לֹא
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - sino
  - más bien
  - no, sino
  lexicon: HALOT
  rationale: En este contexto de contraste o corrección dentro de una instrucción, «pero» reproduce de manera natural el giro adversativo que el POB inglés finalmente fijó con «But», sin añadir una intensidad no explicitada por el hebreo.
- source_word: תֵּלֵךְ
  english_pob_choice: you shall go
  chosen_spanish: irás
  alternatives_spanish:
  - deberás ir
  - habrás de ir
  lexicon: HALOT
  rationale: El imperfecto en este encargo tiene valor directivo. «Irás» conserva el tono de mandato formal en español sin sobrecargarlo con modalizaciones ajenas al texto.
- source_word: בֵּית אָבִי
  english_pob_choice: my father's house
  chosen_spanish: la casa de mi padre
  alternatives_spanish:
  - la casa de mi padre
  - el hogar de mi padre
  - la casa paterna
  lexicon: HALOT
  rationale: «Casa» mantiene la imagen concreta del hebreo y su carga de linaje/linaje familiar. «Hogar» suaviza demasiado la expresión y «casa paterna» suena más literario que el hebreo permite aquí.
- source_word: מִשְׁפַּחְתִּי
  english_pob_choice: my clan
  chosen_spanish: mi clan
  alternatives_spanish:
  - mi familia
  - mi parentela
  - mi linaje
  lexicon: HALOT
  rationale: El POB inglés eligió «clan» para conservar el sentido de un grupo ampliado de parientes, más amplio que la familia inmediata. En español, «clan» transmite bien esa amplitud; «familia» podría estrechar indebidamente el alcance.
- source_word: וְלָקַחְתָּ
  english_pob_choice: and you shall take
  chosen_spanish: y tomarás
  alternatives_spanish:
  - y escogerás
  - y buscarás
  - y conseguirás
  lexicon: HALOT
  rationale: «Tomarás» sigue de cerca el verbo לקח, que en contexto matrimonial implica hacerse cargo de una esposa para el hijo. Se evita «escogerás» o «conseguirás», que introducen matices no presentes en el hebreo.
- source_word: אִשָּׁה
  english_pob_choice: a wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - una mujer
  lexicon: HALOT
  rationale: El contexto exige el valor relacional/matrimonial de אִשָּׁה. «Esposa» es el equivalente más claro y digno en español; «mujer» sería demasiado general.
- source_word: לִבְנִי
  english_pob_choice: for my son
  chosen_spanish: para mi hijo
  alternatives_spanish:
  - para mi hijo
  - a mi hijo
  lexicon: HALOT
  rationale: La preposición ל expresa finalidad o beneficio en el arreglo matrimonial. «Para mi hijo» conserva esa relación de propósito mejor que «a mi hijo».
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última revisión inglesa: se evita una intensificación como «no, sino» y se adopta un adversativo simple equivalente a «But». Se mantiene el paralelismo entre la casa paterna y el grupo de parentesco amplio, y se conserva la relación final de propósito en «para mi hijo».'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera del versículo porque no aparece en el texto fuente.
  - Se eligió «clan» como término principal y se señaló la alternativa «familia/parientes» en nota para preservar la amplitud semántica del hebreo.
  - Se usó «esposa» en lugar de «mujer» por claridad contextual matrimonial.
  - La puntuación conserva una cadencia equivalente a la del hebreo y al ritmo del POB inglés revisado.
