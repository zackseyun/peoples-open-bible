translation:
  language: es
  text: Y de esto debéis saber que las mujeres[a] los dominan. ¿No trabajáis y os afanáis, y dais y traéis todo a las mujeres?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las esposas»; sin embargo, el plural griego γυναῖκες aquí es más amplio y se vierte «las mujeres» en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντεῦθεν
  english_pob_choice: from this
  chosen_spanish: de esto
  alternatives_spanish:
  - desde aquí
  - por tanto
  - de aquí
  lexicon: LSJ
  rationale: El demonstrativo apunta a una conclusión sacada de los ejemplos anteriores; «de esto» conserva esa fuerza inferencial sin convertirla en un conector demasiado explicativo como «por tanto».
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debéis
  alternatives_spanish:
  - es necesario
  - tenéis que
  - debe ser
  lexicon: BDAG
  rationale: En el discurso directo, «debéis saber» expresa obligación/necessidad con naturalidad en español y mantiene el tono exhortativo del griego.
- source_word: γνῶναι
  english_pob_choice: know
  chosen_spanish: saber
  alternatives_spanish:
  - conocer
  - reconocer
  - entender
  lexicon: BDAG
  rationale: Aquí el infinitivo tras δεῖ pide una idea de conocimiento directo; «saber» es más natural en español que «conocer» y conserva la simplicidad del enunciado.
- source_word: γυναῖκες
  english_pob_choice: women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: LSJ
  rationale: El plural griego es amplio y no se limita estrictamente a esposas; por eso se mantiene «las mujeres» en el texto principal, como en la decisión inglesa.
- source_word: κυριεύουσιν
  english_pob_choice: rule over
  chosen_spanish: dominan sobre
  alternatives_spanish:
  - gobiernan sobre
  - se enseñorean de
  - tienen dominio sobre
  lexicon: BDAG
  rationale: El verbo expresa ejercicio de señorío o dominio. «Dominar sobre» transmite esa fuerza relacional sin sonar tan arcaico como «se enseñorean de».
- source_word: πονεῖτε
  english_pob_choice: labor
  chosen_spanish: trabajáis
  alternatives_spanish:
  - laboráis
  - os esforzáis
  - os fatigáis
  lexicon: BDAG
  rationale: En español, «trabajáis» comunica de modo claro la acción de laborar; se evita un calco pesado. El matiz de esfuerzo queda reforzado por el verbo siguiente.
- source_word: μοχθεῖτε
  english_pob_choice: toil
  chosen_spanish: os afanáis
  alternatives_spanish:
  - os fatigan
  - os cansáis
  - os esforzáis
  lexicon: BDAG
  rationale: El par con πονεῖτε intensifica la idea de esfuerzo pesado. «Os afanáis» conserva esa carga y suena natural en español bíblico contemporáneo.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo demás
  - todas las cosas
  lexicon: BDAG
  rationale: El acusativo totalizador se expresa de forma natural con «todo», manteniendo el sentido de totalidad sin redundancia innecesaria.
- source_word: δίδοτε καὶ φέρετε
  english_pob_choice: give and bring
  chosen_spanish: dais y traéis
  alternatives_spanish:
  - entregáis y traéis
  - dais y lleváis
  - entregáis y lleváis
  lexicon: BDAG/LSJ
  rationale: Conviene conservar el doble verbo. «Dar y traer» refleja la duplicación retórica del griego; «traéis» mantiene la idea de llevar o aportar cosas a las mujeres.
translation_notes:
  revision_awareness: No se introdujeron cambios respecto del griego recibido ni del audit trail inglés en cuanto al sentido general. La única decisión sensible es mantener el alcance amplio de γυναῖκες como «mujeres» y conservar la doble serie verbal final.
  spanish_consistency_notes:
  - Se mantiene «mujeres» en el texto principal, en línea con la decisión inglesa y con el alcance genérico del plural griego.
  - Se conserva la duplicación verbal final («dais y traéis») para no diluir la acumulación retórica del original.
  - «De esto» evita sobreinterpretar ἐντεῦθεν como simple ‘por tanto’ y mantiene su valor demostrativo-inferencial.
