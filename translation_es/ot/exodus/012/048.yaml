base_translation:
  language: en
  yaml_path: translation/ot/exodus/012/048.yaml
  text: If a sojourner resides with you and keeps the Passover to Yahweh[a], every male belonging to him must be circumcised; then he may come near to keep it, and he shall be like a native of the land[c][b]. But no uncircumcised person may eat of it.
  footnotes:
  - marker: a
    text: Or 'resident foreigner' for 'sojourner' (גֵּר), referring to a non-native living among Israel.
    reason: lexical_alternative
  - marker: b
    text: Literally 'do/make the Passover.' English idiom commonly says 'keep' or 'celebrate' the Passover.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'the LORD' represents the divine name YHWH.
    reason: alternative_reading
