translation:
  language: es
  text: Él hace de sus mensajeros vientos[a][b], y de sus ministros, un fuego llameante.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Él hace a sus ángeles espíritus, y a sus ministros, una llama de fuego». Hebreos 1:7 sigue esta lectura tradicional.'
    reason: alternative_reading
  - marker: b
    text: Hebreo רוּחוֹת puede significar «vientos» o «espíritus».
    reason: lexical_alternative
lexical_decisions:
- source_word: עֹשֶׂה
  english_pob_choice: makes
  chosen_spanish: hace
  alternatives_spanish:
  - hace de
  - convierte en
  - designa
  lexicon: HALOT
  rationale: El participio verbal expresa una acción característica de Dios. En español, 'hace' conserva esa fuerza verbal de manera natural y no añade matices que el hebreo no exige.
- source_word: מַלְאָכָיו
  english_pob_choice: his messengers
  chosen_spanish: sus mensajeros
  alternatives_spanish:
  - sus ángeles
  lexicon: HALOT
  rationale: מַלְאָךְ puede significar 'mensajero' o 'ángel'. 'Mensajeros' preserva el valor léxico amplio sin resolver de antemano la identificación, dejando la tensión documentada por la tradición y por Hebreos 1:7.
- source_word: רוּחוֹת
  english_pob_choice: winds
  chosen_spanish: vientos
  alternatives_spanish:
  - espíritus
  lexicon: HALOT
  rationale: En el contexto poético de Salmo 104, 'vientos' encaja con la imaginería de fuerzas creadas y con el paralelismo con 'fuego abrasador'. Se mantiene en nota la alternativa 'espíritus' por la ambigüedad del término.
- source_word: מְשָׁרְתָיו
  english_pob_choice: his ministers
  chosen_spanish: sus ministros
  alternatives_spanish:
  - sus siervos
  - los que le sirven
  lexicon: HALOT
  rationale: El participio nominal denota asistentes en servicio. 'Ministros' reproduce mejor en español la función de servicio formal que 'siervos', y coincide con el registro de la traducción inglesa auditada.
- source_word: אֵשׁ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  lexicon: HALOT
  rationale: El sustantivo significa literalmente 'fuego'; se conserva el término básico para mantener la imaginería elemental del verso.
- source_word: לֹהֵט
  english_pob_choice: flaming
  chosen_spanish: abrasador
  alternatives_spanish:
  - ardiente
  - llameante
  lexicon: HALOT
  rationale: Como adjetivo/participio que modifica 'fuego', 'abrasador' expresa un fuego activo e intenso con buena naturalidad en español, sin perder la vividez del hebreo.
theological_decisions:
- issue: Si el verso se refiere a ángeles/espíritus o a mensajeros/vientos como agentes de Dios
  english_pob_reading: He makes his messengers winds, his ministers a flaming fire.
  chosen_spanish_reading: Él hace de sus mensajeros vientos, de sus ministros fuego abrasador.
  alternative_spanish_readings:
  - Él hace de sus ángeles espíritus, de sus ministros una llama de fuego.
  - Él hace de los vientos sus mensajeros, del fuego abrasador sus ministros.
  rationale: El hebreo permite más de una constricción sintáctica y semántica. En el contexto inmediato del Salmo 104, la imagen favorece entender fuerzas creadas al servicio de Dios; por eso la redacción principal conserva 'mensajeros' y 'vientos'. A la vez, se preserva la lectura tradicional asociada con Hebreos 1:7 mediante nota para no borrar la tensión interpretativa.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; este borrador mantiene la solución de sentido principal del hebreo en su contexto poético, con las alternativas tradicionales y léxicas preservadas en notas.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino en todo el proyecto, pero este versículo no contiene el Tetragrámaton.
  - '''Mensajeros'' se mantiene como opción principal para no sobretraducir מלאך como ''ángeles'' sin resolver la ambigüedad.'
  - '''Vientos'' se eligió por el contexto de creación y el paralelismo poético, sin eliminar la posibilidad de ''espíritus''.'
  - '''Fuego abrasador'' conserva el tono elemental del hebreo y evita una formulación demasiado litúrgica o interpretativa.'
