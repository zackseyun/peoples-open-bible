translation:
  text: and with the dense planking above arranged so that[a], their eyes being darkened on every side, they might receive a transport fit for plotters throughout the whole voyage.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'they might undergo a conveyance like that of conspirators throughout the entire sea-passage.' The Greek ἐπιβόλων is pejorative and may be rendered 'plotters,' 'conspirators,' or more generally 'dangerous men.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθύπερθε
  chosen: above
  alternatives:
  - overhead
  - from above
  lexicon: LSJ
  rationale: The adverb indicates position over them. 'Above' is concise and natural in English; 'overhead' is possible but slightly more interpretive.
- source_word: πυκνῷ σανιδώματι
  chosen: dense planking
  alternatives:
  - thick boarding
  - close-set planks
  lexicon: LSJ
  rationale: σανίδωμα refers to a boarded structure or planking; πυκνός adds the sense of close/thick arrangement. 'Dense planking' preserves the physical image without over-specifying ship architecture.
- source_word: διακειμένῳ
  chosen: arranged
  alternatives:
  - set in place
  - constructed
  lexicon: LSJ
  rationale: The participle describes the state or disposition of the planking. 'Arranged' captures the purposeful setup indicated by the following ὅπως clause.
- source_word: ὅπως πάντοθεν ἐσκοτισμένοι τοὺς ὀφθαλμούς
  chosen: so that, their eyes being darkened on every side
  alternatives:
  - so that, being kept in darkness from every side
  - so that, with their eyes darkened all around
  lexicon: LSJ
  rationale: 'The phrase expresses purpose: the covering was arranged to deprive them of light/vision from every direction. A participial construction in English preserves the Greek syntax and the emphasis on visual deprivation.'
- source_word: ἀγωγήν
  chosen: transport
  alternatives:
  - conveyance
  - passage
  - journey
  lexicon: LSJ
  rationale: In this context the word refers to the manner of being carried or conveyed by ship, not merely the abstract journey. 'Transport' best fits the forced movement of prisoners.
- source_word: ἐπιβόλων
  chosen: fit for plotters
  alternatives:
  - of conspirators
  - of criminals
  - of men under suspicion
  lexicon: LSJ
  rationale: ἐπίβολος can denote one who plots against others or is dangerous/treacherous. The sense here is pejorative treatment as though they were dangerous schemers. 'Fit for plotters' preserves that evaluative force without flattening it to a generic 'criminals.'
- source_word: ἐν παντὶ τῷ κατάπλῳ
  chosen: throughout the whole voyage
  alternatives:
  - during the entire sea-passage
  - in all the voyage
  lexicon: LSJ
  rationale: κατάπλους denotes a voyage by sea or sailing passage. 'Throughout the whole voyage' is idiomatic and preserves the temporal extent.
