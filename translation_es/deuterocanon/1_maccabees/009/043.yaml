review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: Bacquides/Bacchides oye/recibe noticia, llega hasta las riberas del Jordán, y lo hace con una fuerza numerosa. Sin embargo, hay dos problemas de fidelidad formal y semántica: la frase temporal suena poco natural en español tal como está calzada del griego, y «con mucha fuerza» debilita o desvía el matiz militar de ἐν δυνάμει πολλῇ.'
  spanish_quality_summary: 'El texto es generalmente comprensible, pero contiene una falta ortográfica grave para español moderno («oyó» debe ser «oyó» sin problema de acento? actually current spelling is «oyó», so fine) and, sobre todo, una expresión poco idiomática: «el día de los sábados» no es buena lectura en español e incluso la nota cita otra preposición distinta («en el día...»). Además, «con mucha fuerza» suena más a intensidad que a contingente militar. Conviene ajustar a un español digno y natural conservando la literalidad mediante nota.'
  glossary_alignment: No hay términos teológicos mayores en este versículo. La transliteración del nombre puede mantenerse como «Bacquides» si esa es la convención española del proyecto. El giro σαββάτων debe aclararse en nota, pero en el texto principal conviene usar «en sábado» o «el día de sábado»; y ἐν δυνάμει πολλῇ se vierte mejor como «con una gran fuerza» para preservar el valor militar sin sobreinterpretar como «ejército».
  issues:
  - severity: medium
    issue: «el día de los sábados» es un calco poco natural en español
    rationale: Aunque refleja la forma plural griega, en español resulta extraño y poco legible. La evidencia inglesa ya documenta que se trata de un modismo judeogriego para «el día de sábado / en sábado», por lo que la literalidad puede conservarse en nota y no en el cuerpo principal.
  - severity: medium
    issue: «con mucha fuerza» no transmite bien el sentido militar de ἐν δυνάμει πολλῇ
    rationale: En contexto narrativo militar, la expresión indica una fuerza numerosa o gran contingente. «Mucha fuerza» en español suele leerse como intensidad o vigor, no como fuerza armada.
  - severity: low
    issue: La nota al pie no coincide exactamente con el anclaje textual actual
    rationale: El texto dice «el día de los sábados», pero la nota empieza «en el día de los sábados». Debe armonizarse la formulación para evitar confusión editorial.
  revised_spanish_text: Y Bacquides oyó[a], y en sábado llegó hasta las riberas del Jordán con una gran fuerza.
  revised_footnotes:
  - marker: a
    text: 'Griego literalmente: «el día de los sábados», un giro judeogriego que significa «en sábado» o «el día de sábado».'
    reason: lexical_alternative
  revision_rationale: Se suaviza el calco temporal en el texto principal para lograr un español natural y fiel, preservando la literalidad griega en la nota. También se cambia «con mucha fuerza» por «con una gran fuerza» para mantener el matiz de fuerza militar numerosa sin añadir «ejército». No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo.
