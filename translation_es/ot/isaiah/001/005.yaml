translation:
  language: es
  text: ¿Por qué habrían de seguir siendo golpeados otra vez? ¿Por qué siguen en rebelión? Toda la cabeza está enferma[a], y todo el corazón está desfallecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿En qué parte serían golpeados otra vez?». El hebreo también puede entenderse como una pregunta sobre el lugar donde aún podrían caer más golpes, dado que el cuerpo entero aparece como enfermo.'
    reason: alternative_reading
lexical_decisions:
- source_word: עַ֣ל מֶ֥ה
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué
  - ¿Por qué motivo
  lexicon: HALOT
  rationale: La construcción interrogativa aquí funciona de forma idiomática como pregunta causal-retórica. «¿Por qué?» comunica con naturalidad el valor de עַל־מֶה sin volver la frase artificiosamente literal.
- source_word: תֻכּ֛וּ
  english_pob_choice: should you be struck
  chosen_spanish: habrían de ser golpeados
  alternatives_spanish:
  - serían golpeados
  - deberían ser golpeados
  - serían heridos
  lexicon: HALOT
  rationale: El pasivo de נכה expresa ser herido/golpeado. En español, «ser golpeados» conserva el sentido verbal y la fuerza punitiva mejor que opciones más suaves. «Habrían de» mantiene el matiz retórico de expectativa frustrada.
- source_word: עוֹד
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - todavía
  lexicon: HALOT
  rationale: En un contexto de castigo repetido, «otra vez» es natural y claro en español, y conserva la idea de recurrencia.
- source_word: תּוֹסִ֣יפוּ סָרָ֑ה
  english_pob_choice: You continue in rebellion
  chosen_spanish: siguen en rebelión
  alternatives_spanish:
  - persisten en rebelión
  - siguen rebelándose
  - continúan en apostasía
  lexicon: HALOT
  rationale: El hebreo literalmente dice «añaden rebelión», pero aquí la idea es de persistencia en la desviación. «Siguen en rebelión» conserva el valor aspectual y evita una paráfrasis demasiado interpretativa.
- source_word: כָּל רֹאשׁ
  english_pob_choice: the whole head
  chosen_spanish: toda la cabeza
  alternatives_spanish:
  - cada cabeza
  - la cabeza entera
  lexicon: HALOT
  rationale: Se conserva la imagen colectiva del cuerpo como unidad. «Toda la cabeza» es idiomática en español y mantiene la metáfora sin dispersarla en individuos.
- source_word: לָחֳלִי
  english_pob_choice: is sick
  chosen_spanish: está enferma
  alternatives_spanish:
  - está enferma de dolencia
  - está enferma de enfermedad
  lexicon: HALOT
  rationale: 'El lamed indica condición: «para/en estado de enfermedad». «Está enferma» reproduce la imagen de manera natural y fiel.'
- source_word: וְכָל לֵבָב
  english_pob_choice: and the whole heart
  chosen_spanish: y todo el corazón
  alternatives_spanish:
  - y el corazón entero
  - y cada corazón
  lexicon: HALOT
  rationale: Se mantiene el paralelismo con «toda la cabeza». «Todo el corazón» conserva la imagen corporal colectiva.
- source_word: דַּוָּֽי
  english_pob_choice: is faint
  chosen_spanish: está desfallecido
  alternatives_spanish:
  - está débil
  - está enfermo
  - está marchito
  lexicon: HALOT
  rationale: El adjetivo puede indicar debilidad o languidez. «Desfallecido» preserva la sensación de colapso interior y distingue este miembro del anterior sin diluir la metáfora.
theological_decisions:
- issue: Sentido de la pregunta inicial
  english_pob_reading: A rhetorical question about the futility of further chastisement because the people persist in rebellion
  chosen_spanish_reading: Una pregunta retórica sobre la inutilidad de un nuevo castigo, dado que el pueblo persiste en la rebelión
  alternative_spanish_readings:
  - Una pregunta sobre en qué parte del cuerpo aún podrían recibir golpes
  - Una pregunta causal más neutra sobre la razón del castigo
  rationale: La secuencia con la rebelión inmediata favorece una pregunta retórica causal. Aun así, la imagen corporal del verso deja abierta la posibilidad de una lectura locativa; no se elimina esa tensión, pero el español principal sigue la lectura más probable por flujo sintáctico.
  doctrine_reference: Isaías 1:5 en su denuncia profética del pecado y del juicio disciplinario de Dios
- issue: Imagen corporal colectiva
  english_pob_reading: The whole head is sick, and the whole heart is faint
  chosen_spanish_reading: Toda la cabeza está enferma, y todo el corazón está desfallecido
  alternative_spanish_readings:
  - Cada cabeza está enferma, y cada corazón está desfallecido
  - La cabeza entera está enferma, y el corazón entero está desfallecido
  rationale: Se conserva el paralelismo hebreo de cabeza/corazón como imagen del estado total de la nación. «Toda» retiene mejor el valor colectivo de כָּל que una distribución individualizada.
  doctrine_reference: La figura profética del cuerpo nacional en el juicio divino
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que añadió explícitamente la segunda pregunta interrogativa («Why do you continue in rebellion?»). La redacción española refleja esa duplicidad con dos preguntas separadas y conserva la alternativa de lectura locativa en nota.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como término divino por defecto en este registro, pero este versículo no lo contiene explícitamente.
  - Se tradujo סָרָה como «rebelión» siguiendo el valor covenantal fuerte documentado en el audit trail inglés.
  - Se preservó la metáfora corporal colectiva sin convertirla en una descripción médica literalista ni en una paráfrasis moral abstracta.
