review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del hebreo: la metáfora de refinación con כֶּסֶף נִמְאָס, la causalidad de כִּי y el Nombre divino como Yahvé. Sin embargo, la apertura «Llaman a la plata desechada» no expresa correctamente קָרְאוּ לָהֶם, porque deja sin objeto personal a «ellos» y hace que «a la plata desechada» suene como objeto directo aislado. El hebreo significa «los llaman plata rechazada/desechada» o «se les llama plata rechazada», refiriéndose al pueblo. También conviene mantener con más nitidez el paralelismo de מאס / נמאס con una misma raíz española.'
  spanish_quality_summary: El español es claro, pero la primera cláusula resulta poco natural e incompleta para un lector hispano. «Llaman a la plata desechada» suena como si faltara el referente humano. Una formulación como «Los llaman plata rechazada» o «Los llaman plata desechada» es más fiel y más legible. Además, «rechazada» empareja mejor con «ha rechazado» y preserva mejor la repetición deliberada del hebreo que «desechada ... ha desechado», aunque esta última no es incorrecta.
  glossary_alignment: Se respeta correctamente יהוה -> «Yahvé». No hay otros términos del glosario mayor en juego. Para מאס / נמאס, «rechazar» alinea mejor con la decisión léxica auditada en inglés y preserva el juego verbal entre participio pasivo y verbo finito.
  issues:
  - severity: high
    issue: La construcción «Llaman a la plata desechada» representa mal קָרְאוּ לָהֶם
    rationale: 'El hebreo tiene un sujeto indefinido plural con objeto pronominal «a ellos»: «los llaman...». El borrador omite ese objeto humano y produce una frase española defectuosa o ambigua.'
  - severity: medium
    issue: La repetición deliberada de מאס / נמאס se puede reflejar mejor con «rechazada ... ha rechazado»
    rationale: El inglés auditado explicó que la repetición del mismo verbo es significativa. «Desechada ... ha desechado» funciona, pero «rechazada ... ha rechazado» reproduce más transparentemente el paralelismo léxico y judicial.
  - severity: low
    issue: La nota al pie puede ajustarse al término principal revisado
    rationale: Si se cambia el texto principal a «plata rechazada», la nota debe conservar como alternativas las otras posibilidades sin crear desajuste entre texto y nota.
  revised_spanish_text: Los llaman plata rechazada[a], porque Yahvé los ha rechazado.
  revised_footnotes:
  - marker: a
    text: 'O: «plata desechada» o «plata despreciada». La expresión hebrea usa una metáfora de refinación para un metal considerado inútil después de la prueba.'
    reason: lexical_alternative
  revision_rationale: Se corrige la sintaxis para reflejar el objeto pronominal del hebreo («los llaman»), y se cambia a «rechazada ... ha rechazado» para preservar con mayor claridad la repetición de מאס / נמאס documentada en la POB inglesa. Se mantiene «Yahvé» conforme al criterio del proyecto y la nota conserva alternativas léxicas válidas.
