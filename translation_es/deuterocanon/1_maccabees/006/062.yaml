translation:
  language: es
  text: Y el rey entró en el monte Sión, y al ver la fortificación[a] del lugar, quebrantó el juramento que había hecho y dio órdenes de derribar la muralla de alrededor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fortaleza» o «ciudadela» para ὀχύρωμα; el término griego señala una obra fortificada.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - ingresó
  - entró en
  lexicon: LSJ
  rationale: El aoristo narrativo de εἰσέρχομαι se expresa naturalmente en español con «entró». Mantiene el movimiento hacia adentro sin sobretraducir.
- source_word: ὁ βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el monarca
  lexicon: LSJ
  rationale: Es el equivalente directo y más natural en este contexto histórico-narrativo.
- source_word: τὸ ὄρος Σιών
  english_pob_choice: Mount Zion
  chosen_spanish: monte Sión
  alternatives_spanish:
  - montes Sión
  - monte de Sión
  lexicon: LSJ
  rationale: «Monte Sión» es la forma geográfica establecida en español y preserva el valor topográfico del griego ὄρος.
- source_word: τὸ ὀχύρωμα
  english_pob_choice: the fortification
  chosen_spanish: la fortificación
  alternatives_spanish:
  - la fortaleza
  - el fuerte
  - la ciudadela
  lexicon: LSJ
  rationale: ὀχύρωμα denota una obra fortificada o fortificación; «fortificación» es cercano al griego y evita especificar indebidamente el tipo de estructura.
- source_word: τοῦ τόπου
  english_pob_choice: of the place
  chosen_spanish: del lugar
  alternatives_spanish:
  - del sitio
  - de aquel lugar
  lexicon: LSJ
  rationale: El genitivo se conserva de forma simple y idiomática en español.
- source_word: ἠθέτησεν
  english_pob_choice: he broke
  chosen_spanish: quebrantó
  alternatives_spanish:
  - anuló
  - violó
  - quebró
  lexicon: LSJ
  rationale: El verbo implica invalidar o despreciar un compromiso vinculante. «Quebrantó» conserva la fuerza moral de la ruptura del juramento sin reducirlo a una mera infracción legal.
- source_word: τὸν ὁρκισμὸν ὃν ὤμοσεν
  english_pob_choice: the oath that he had sworn
  chosen_spanish: el juramento que había jurado
  alternatives_spanish:
  - el juramento que hizo
  - el juramento que pronunció
  lexicon: LSJ
  rationale: Se mantiene la repetición del campo léxico del juramento para reflejar el griego. «Había jurado» expresa el valor anterior del acto con claridad.
- source_word: ἐνετείλατο
  english_pob_choice: gave orders
  chosen_spanish: dio órdenes
  alternatives_spanish:
  - mandó
  - ordenó
  lexicon: LSJ
  rationale: La forma media de ἐντέλλομαι en narrativa tiene sentido de mandar/ordenar; «dio órdenes» suena natural en español y conserva el matiz militar.
- source_word: καθεῖλεν
  english_pob_choice: to tear down
  chosen_spanish: derribar
  alternatives_spanish:
  - demoler
  - tumbar
  - destruir
  lexicon: LSJ
  rationale: Tras «dio órdenes», el español admite el infinitivo «derribar» para el sentido de demolición. Es una buena correspondencia de καθαιρέω en este contexto.
- source_word: τὸ τεῖχος κυκλόθεν
  english_pob_choice: the wall all around
  chosen_spanish: el muro todo alrededor
  alternatives_spanish:
  - la muralla todo alrededor
  - el muro alrededor
  lexicon: LSJ
  rationale: «Τεῖχος» puede ser muro o muralla; se elige «muro» por claridad y fluidez, mientras «todo alrededor» reproduce κυκλόθεν con naturalidad.
theological_decisions:
- issue: Fuerza moral de ἠθέτησεν con referencia a un juramento
  english_pob_reading: he broke the oath that he had sworn
  chosen_spanish_reading: quebrantó el juramento que había jurado
  alternative_spanish_readings:
  - violó el juramento que había jurado
  - anuló el juramento que había jurado
  - quebró el juramento que había jurado
  rationale: El texto narra la repudiación de un compromiso solemne. «Quebrantó» comunica bien la gravedad ética sin añadir interpretación doctrinal extra al relato.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
translation_notes:
  revision_awareness: La revisión inglesa más reciente favoreció «fortification» sobre «stronghold» y «tear down» sobre «pull down». En español, por eso se priorizó «fortificación» y «derribar», manteniendo además la explicitación de la obligación rota con «quebrantó el juramento».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma solo cuando aparezca el nombre divino; aquí no aplica.
  - Se usa «monte Sión» como forma geográfica establecida y no como calco rígido.
  - Se conserva la fuerza semántica de ἠθέτησεν con un verbo de ruptura moral, no meramente administrativa.
  - «Juramento» se mantiene en lugar de un sinónimo más débil para reflejar la solemnidad del acto.
  - «Muro todo alrededor» conserva el valor espacial de κυκλόθεν sin arcaísmo.
