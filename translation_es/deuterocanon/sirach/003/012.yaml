translation:
  language: es
  text: Hijo mío[a], esfuérzate en honrar a tu padre, y no lo abandones durante toda tu vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «sostén a tu padre en su vejez, y no lo entristezcas durante su vida».'
    reason: alternative_reading
lexical_decisions:
- source_word: בְּנִי
  english_pob_choice: My son
  chosen_spanish: Hijo mío
  alternatives_spanish:
  - Hijo mío, hija mía no aplica aquí
  - Mi hijo
  lexicon: HALOT
  rationale: El hebreo vocativo בן con sufijo de 1cs pide una dirección filial masculina. «Hijo mío» conserva el tono sapiencial del original y funciona de manera natural en español.
- source_word: הִתְחַזֵּק
  english_pob_choice: be strong
  chosen_spanish: esfuérzate
  alternatives_spanish:
  - sé fuerte
  - fortalécete
  - muéstrate firme
  lexicon: HALOT
  rationale: El hitpael de חזק expresa firmeza o fortalecimiento de uno mismo. «Esfuérzate» comunica una exhortación activa y natural en español, sin perder la idea de constancia y vigor moral.
- source_word: בִּכְבּוּד
  english_pob_choice: in honoring
  chosen_spanish: en honrar
  alternatives_spanish:
  - al honrar
  - en el honrar
  - con honra hacia
  lexicon: HALOT
  rationale: La construcción preposicional con כיבוד es idiomática. «En honrar» mantiene la relación entre la firmeza exhortada y la práctica concreta del honor filial, de modo sobrio y fiel.
- source_word: אָבִיךָ
  english_pob_choice: your father
  chosen_spanish: a tu padre
  alternatives_spanish:
  - a tu padre
  - de tu padre
  lexicon: HALOT
  rationale: Se conserva el poseedor y el sustantivo de forma literal y clara en español.
- source_word: וְאַל תַּעַזְבֵהוּ
  english_pob_choice: and do not forsake him
  chosen_spanish: y no lo abandones
  alternatives_spanish:
  - y no lo dejes
  - y no lo abandones nunca
  lexicon: HALOT
  rationale: עזב abarca dejar, abandonar y forsake. «Abandones» transmite mejor la obligación moral y filial en español contemporáneo que «desampares», sin suavizar el mandato.
- source_word: כָּל יְמֵי חַיֶּיךָ
  english_pob_choice: all the days of your life
  chosen_spanish: todos los días de tu vida
  alternatives_spanish:
  - durante toda tu vida
  - mientras vivas
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de duración total con una formulación natural y transparente en español.
theological_decisions:
- issue: Divergencia entre el hebreo y el paralelo griego en la exhortación central
  english_pob_reading: 'Main text follows the Hebrew: be strong in honoring your father ... do not forsake him. Greek note: support your father in his old age, and do not grieve him during his life.'
  chosen_spanish_reading: 'El texto principal sigue el hebreo: «esfuérzate en honrar a tu padre, y no lo abandones todos los días de tu vida», con nota que preserva la lectura griega: «sostén a tu padre en su vejez, y no lo entristezcas durante su vida».'
  alternative_spanish_readings:
  - «sostén a tu padre en su vejez, y no lo entristezcas durante su vida»
  - «apóyalo en su ancianidad y no lo hieras con tristeza»
  rationale: En Sirácida, el hebreo conservado es la base primaria cuando existe, mientras que el griego ofrece un paralelo interpretativo importante. La redacción española principal sigue el hebreo sin borrar la tensión documental, y la nota registra la variante griega como testigo antiguo significativo.
  doctrine_reference: 'PHILOSOPHY.md: traducir desde el hebreo donde se conserva; usar el paralelo griego como dato de traducción real sin desplazar el testigo primario.'
translation_notes:
  revision_awareness: El registro inglés fue marcado como sin cambios tras la última revisión, con acuerdo alto entre testigos. No se documentaron cambios posteriores relevantes; por ello la propuesta española refleja fielmente esa estabilidad textual y mantiene la nota de la lectura griega como paralelo antiguo importante.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé/Cristo» fuera de este versículo porque no aparecen en el texto.
  - Se conserva el tono sapiencial directo con una forma de segunda persona singular.
  - La nota al pie usa un marcador único y aparece anclada en el vocativo inicial.
