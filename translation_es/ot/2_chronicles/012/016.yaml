translation:
  language: es
  text: Y Rehoboam durmió con sus padres, y fue sepultado en la ciudad de David[a], y su hijo Abías reinó en su lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «durmió con sus padres», expresión convencional de muerte y de incorporación a la línea ancestral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁכַּב
  english_pob_choice: slept
  chosen_spanish: durmió
  alternatives_spanish:
  - se acostó
  - murió
  lexicon: HALOT
  rationale: En español, «durmió con sus padres» conserva mejor la fórmula regia hebrea que un simple «murió», y evita una calca extraña de «slept» manteniendo el valor idiomático heredado del texto fuente.
- source_word: עִם אֲבֹתָיו
  english_pob_choice: with his fathers
  chosen_spanish: con sus padres
  alternatives_spanish:
  - con sus antepasados
  lexicon: HALOT
  rationale: «Padres» reproduce la fórmula tradicional de sucesión y parentesco del pasaje; «antepasados» explicita el sentido, pero pierde el carácter formular del hebreo.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  lexicon: HALOT
  rationale: «Fue sepultado» es una equivalencia natural y digna para el pasivo hebreo, y mantiene el registro narrativo histórico sin sobrecargar el estilo.
- source_word: בְּעִיר דָּוִיד
  english_pob_choice: in the city of David
  chosen_spanish: en la ciudad de David
  alternatives_spanish:
  - en la ciudad de David
  lexicon: HALOT
  rationale: La expresión es un topónimo bíblico establecido; en español conviene mantenerla literalmente para preservar la designación reconocible del lugar.
- source_word: וַיִּמְלֹךְ
  english_pob_choice: reigned
  chosen_spanish: reinó
  alternatives_spanish:
  - comenzó a reinar
  - llegó a reinar
  lexicon: HALOT
  rationale: «Reinó» reproduce la fórmula sucesoria normal del hebreo y su valor narrativo breve, sin añadir matices no presentes en el texto.
- source_word: אֲבִיָּה
  english_pob_choice: Abijah
  chosen_spanish: Abías
  alternatives_spanish:
  - Abías
  lexicon: BDB/uso bíblico tradicional
  rationale: En español bíblico, «Abías» es la forma habitual y transparente del nombre hebreo אֲבִיָּה; evita una transliteración menos asentada y sigue la forma correspondiente al pasaje crónico.
- source_word: בְנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su hijo
  lexicon: HALOT
  rationale: La relación filial se expresa de forma directa y natural en español con «su hijo», sin necesidad de expansión.
- source_word: תַּחְתָּיו
  english_pob_choice: in his place
  chosen_spanish: en su lugar
  alternatives_spanish:
  - después de él
  - en vez de él
  lexicon: HALOT
  rationale: «En su lugar» es la fórmula española más clara para la sucesión real y refleja bien el valor idiomático de תחתיו en este contexto.
translation_notes:
  revision_awareness: Se siguió el acuerdo de alta coincidencia del control final en inglés; no hubo revisiones aplicadas en el audit trail, así que la versión española conserva la fórmula narrativa y los nombres propios de manera estable y sin ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se mantuvo el registro histórico-sucesorio propio de las crónicas.
  - Se usó «Abías» por consistencia con la tradición bíblica en español y con la forma hebrea de este versículo.
  - La nota al pie solo marca la expresión idiomática de muerte; el resto del versículo se deja sin notas por ser directo y estable.
