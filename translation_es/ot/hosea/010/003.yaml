  text: For now they will say[a], “We have no king, because we did not fear Yahweh[b]; and the king—what can he do for us?”
  footnotes:
  - marker: a
    text: Or, 'because we do not fear the LORD' or 'because we have not feared the LORD.' The Hebrew perfect may describe either their settled condition or their culpable past failure.
    reason: lexical_alternative
