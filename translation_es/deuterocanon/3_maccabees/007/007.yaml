translation:
  language: es
  text: Considerando que siempre ha luchado a nuestro lado como un padre por sus hijos[a], y teniendo en cuenta la firme buena voluntad que tienen hacia nosotros y hacia nuestros antepasados como la de un amigo, justamente los hemos liberado por completo de toda acusación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha sido nuestro aliado como un padre por sus hijos». El participio griego puede destacar tanto el apoyo militar activo como la idea más amplia de ayuda aliada.'
    reason: lexical_alternative
  - marker: b
    text: 'La expresión griega final es muy enfática, literalmente algo como «de toda causa, de cualquier modo». La traducción vierte el sentido jurídico global: liberación completa de toda posible acusación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς πατέρα
  english_pob_choice: like a father
  chosen_spanish: como un padre
  alternatives_spanish:
  - cual un padre
  - como padre
  lexicon: LSJ
  rationale: ὡς con acusativo introduce comparación. En español, «como un padre» conserva la imagen comparativa de manera natural y fiel.
- source_word: ὑπὲρ υἱῶν
  english_pob_choice: for his sons
  chosen_spanish: por sus hijos
  alternatives_spanish:
  - por sus hijos varones
  - en favor de sus hijos
  lexicon: LSJ
  rationale: ὑπέρ expresa aquí beneficio o defensa en contexto de apoyo aliado. Aunque υἱῶν es literalmente «hijos/varones», en español «hijos» comunica bien la relación filial sin forzar una precisión de género que el contexto no enfatiza de modo decisivo.
- source_word: διὰ παντὸς
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - sin cesar
  lexicon: LSJ
  rationale: La expresión indica continuidad. «Siempre» es la forma más natural y clara en español, preservando el valor durativo.
- source_word: συμμαχοῦντα
  english_pob_choice: has always fought alongside us
  chosen_spanish: ha luchado a nuestro lado
  alternatives_spanish:
  - ha sido nuestro aliado
  - ha combatido junto a nosotros
  lexicon: LSJ
  rationale: El participio sugiere acción de alianza, especialmente con matiz militar. «Ha luchado a nuestro lado» conserva la fuerza concreta de apoyo en combate mejor que un equivalente más abstracto.
- source_word: τήν τε τοῦ φίλου ... εὔνοιαν
  english_pob_choice: the firm goodwill ... as that of a friend
  chosen_spanish: la firme buena voluntad ... como la de un amigo
  alternatives_spanish:
  - la firme benevolencia ... como la de un amigo
  - el firme favor ... como el de un amigo
  lexicon: LSJ
  rationale: εὔνοια apunta a disposición favorable, benevolencia o buena voluntad. «Buena voluntad» es transparente en español y permite conservar el calificativo «firme» para βεβαίαν. La cláusula «como la de un amigo» reproduce el valor relacional de τοῦ φίλου.
- source_word: ἀναλογιζόμενοι
  english_pob_choice: Considering
  chosen_spanish: reconociendo
  alternatives_spanish:
  - considerando
  - teniendo en cuenta
  lexicon: LSJ
  rationale: El participio introduce la base mental de la decisión. «Reconociendo» funciona bien en español para expresar que se toma en cuenta el hecho al actuar, manteniendo el tono deliberativo.
- source_word: δικαίως
  english_pob_choice: rightly
  chosen_spanish: con justicia
  alternatives_spanish:
  - justamente
  - rectamente
  lexicon: LSJ
  rationale: El adverbio describe la rectitud de la acción. «Con justicia» conserva el matiz jurídico y moral del contexto de absolución o liberación.
- source_word: ἀπολελύκαμεν
  english_pob_choice: we have released
  chosen_spanish: los hemos liberado
  alternatives_spanish:
  - los hemos soltado
  - los hemos absuelto
  lexicon: LSJ
  rationale: El perfecto expresa una acción completada con efecto presente. En este contexto legal, «liberado» comunica una liberación formal sin restringir indebidamente el verbo a una absolución técnica.
- source_word: πάσης καθʼ ὁντινοῦν αἰτίας τρόπον
  english_pob_choice: in every way from any charge whatever
  chosen_spanish: de toda acusación, de cualquier causa que sea
  alternatives_spanish:
  - de toda acusación, por cualquier motivo que sea
  - de toda causa, de cualquier tipo que sea
  lexicon: LSJ
  rationale: La frase griega es enfática y acumulativa. «De toda acusación» recoge αἰτίας en un marco jurídico; «de cualquier causa que sea» preserva el énfasis de καθ᾽ ὁντινοῦν ... τρόπον sin volverla demasiado rígida. La separación en dos miembros ayuda a reflejar el redoble enfático del original.
theological_decisions:
- issue: Alcance de la comparación paternal y del apoyo aliado
  english_pob_reading: has always fought alongside us like a father for his sons
  chosen_spanish_reading: ha luchado a nuestro lado como un padre por sus hijos
  alternative_spanish_readings:
  - ha sido nuestro aliado como un padre por sus hijos
  - ha combatido junto a nosotros como un padre por sus hijos
  rationale: No hay una cuestión doctrinal directa, pero sí una tensión retórica entre apoyo militar y alianza general. La traducción conserva la imagen paternal y la acción concreta de acompañamiento en combate, sin neutralizar el matiz bélico que el griego sugiere.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del POB inglés: mantiene la sintaxis deliberativa, conserva la comparación paternal y el carácter aliado/militar de συμμαχοῦντα, y refleja la clausula final como una liberación jurídica total. También atiende la observación de reordenar la cláusula sobre la buena voluntad para mostrar con claridad que se la considera como la de un amigo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «hijos» para υἱῶν porque el contexto paternal lo vuelve idiomático; no se fuerza «hijos varones» en el texto principal.
  - «Buena voluntad» conserva εὔνοια sin sustituirlo por terminología eclesiástica más tradicional que podría oscurecer el sentido relacional y jurídico del pasaje.
  - «Liberado» conserva el matiz formal de ἀπολελύκαμεν y se acomoda al cierre legal del versículo.
