translation:
  language: es
  text: para que su corazón no se engrandezca sobre sus hermanos[a], y para que no se aparte del mandamiento ni a la derecha ni a la izquierda, a fin de que prolongue sus días en su reino, él y sus hijos varones, en medio de Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sobre sus compatriotas'. El hebreo dice literalmente 'sobre sus hermanos', con lenguaje de parentesco de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: לְבִלְתִּי
  english_pob_choice: so that ... not
  chosen_spanish: para que ... no
  alternatives_spanish:
  - a fin de que ... no
  - para no
  lexicon: HALOT
  rationale: La construcción expresa finalidad/preventiva; en español, 'para que ... no' comunica de forma natural el valor de propósito negativo sin perder el sentido del hebreo.
- source_word: רוּם
  english_pob_choice: be lifted up
  chosen_spanish: se engrandezca
  alternatives_spanish:
  - se eleve
  - sea levantado
  lexicon: HALOT
  rationale: En contexto del corazón del rey, el verbo alude a orgullo o exaltación interior. 'Se engrandezca' conserva la imagen de elevación aplicada al ánimo y sugiere la tensión de soberbia sin forzarla.
- source_word: לְבָבוֹ
  english_pob_choice: his heart
  chosen_spanish: su corazón
  alternatives_spanish:
  - su mente
  - su interior
  lexicon: HALOT
  rationale: Se mantiene 'corazón' como antropología bíblica del interior humano, más fiel y comprensible que una paráfrasis psicológica moderna.
- source_word: מֵאֶחָיו
  english_pob_choice: above his brothers
  chosen_spanish: sobre sus hermanos
  alternatives_spanish:
  - por encima de sus hermanos
  - sobre sus compatriotas
  lexicon: HALOT
  rationale: '''Sobre sus hermanos'' refleja la relación de superioridad expresada por la preposición y conserva el lenguaje de parentesco de pacto; no se neutraliza en el texto principal.'
- source_word: סוּר
  english_pob_choice: turn aside
  chosen_spanish: se aparte
  alternatives_spanish:
  - se desvíe
  - se desvíe del camino
  lexicon: HALOT
  rationale: El verbo tiene el sentido de desviarse o apartarse de la obediencia pactal. 'Se aparte' es idiomático en español y suficientemente cercano al hebreo.
- source_word: הַמִּצְוָה
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - la orden
  - la instrucción
  lexicon: HALOT
  rationale: '''Mandamiento'' preserva el registro normativo y covenantal que el contexto requiere, sin diluirlo en una formulación más general.'
- source_word: יָמִין וּשְׂמֹאול
  english_pob_choice: to the right or to the left
  chosen_spanish: ni a la derecha ni a la izquierda
  alternatives_spanish:
  - a diestra o siniestra
  - ni hacia la derecha ni hacia la izquierda
  lexicon: HALOT
  rationale: Se conserva el modismo hebreo de desviación en ambas direcciones con una solución natural en español.
- source_word: לְמַעַן
  english_pob_choice: in order that
  chosen_spanish: a fin de que
  alternatives_spanish:
  - para que
  - con el fin de que
  lexicon: HALOT
  rationale: Marca claramente el propósito/resultante de la obediencia del rey con un conector formal y claro.
- source_word: יַאֲרִיךְ יָמִים
  english_pob_choice: he may prolong his days
  chosen_spanish: prolongue sus días
  alternatives_spanish:
  - alargue sus días
  - viva largos días
  lexicon: HALOT
  rationale: Se mantiene la metáfora hebrea de 'alargar/prolongar días' en una forma española natural y recognoscible.
- source_word: עַל מַמְלַכְתּוֹ
  english_pob_choice: in his kingdom
  chosen_spanish: en su reino
  alternatives_spanish:
  - sobre su reino
  - en su reinado
  lexicon: HALOT
  rationale: El sentido es permanencia dentro de la esfera del gobierno real; 'en su reino' comunica mejor la duración de su reinado que una traducción espacial literal.
- source_word: הוּא וּבָנָיו
  english_pob_choice: he and his sons
  chosen_spanish: él y sus hijos
  alternatives_spanish:
  - él y sus hijos varones
  - él y su descendencia
  lexicon: HALOT
  rationale: '''Hijos'' puede abarcar tanto la descendencia inmediata como, en contexto dinástico, la línea sucesoria; evita una rigidez excesiva en español manteniendo el foco heredero.'
- source_word: בְּקֶרֶב יִשְׂרָאֵל
  english_pob_choice: in the midst of Israel
  chosen_spanish: en medio de Israel
  alternatives_spanish:
  - en medio del pueblo de Israel
  - entre Israel
  lexicon: HALOT
  rationale: '''En medio de Israel'' reproduce con fidelidad la imagen espacial y comunitaria del hebreo y sugiere pertenencia al pueblo del pacto.'
theological_decisions:
- issue: Lenguaje de superioridad del rey sobre sus pares del pacto
  english_pob_reading: above his brothers
  chosen_spanish_reading: sobre sus hermanos
  alternative_spanish_readings:
  - sobre sus compatriotas
  - por encima de sus hermanos
  rationale: Se mantiene el lenguaje fraternal del hebreo, que subraya que el rey no debe elevar su corazón por encima de sus iguales dentro de la comunidad del pacto. Se evita una neutralización que debilitaría la tensión lexical.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Referencia dinástica explícita
  english_pob_reading: he and his sons
  chosen_spanish_reading: él y sus hijos
  alternative_spanish_readings:
  - él y sus descendientes
  rationale: El hebreo menciona 'hijos' de manera concreta. En español, 'hijos' conserva la idea de sucesión dinástica sin expandir el alcance a una paráfrasis más amplia que el texto no exige.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el análisis del hebreo y coincide con la lectura inglesa auditada en los puntos clave: finalidad preventiva (''para que ... no''), el modismo de elevación del corazón, la desviación del mandamiento en ambas direcciones, y la fórmula dinástica (''él y sus hijos''). No se detectaron revisiones posteriores que alteraran la sustancia de la lectura inglesa; se mantiene la misma arquitectura semántica en español.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' como convención del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se conserva el singular 'mandamiento' para reflejar el hebreo y el audit trail inglés.
  - Se evita 'Cristo' o terminología cristológica porque el versículo es legal-sapiencial y no la requiere.
  - '''En medio de Israel'' mantiene la imagen comunitaria sin sustituirla por una explicación interpretativa.'
