    text: Misrefot-maim es un nombre de lugar; el nombre puede significar algo como «quemazones de agua», pero su sentido exacto es incierto.
    reason: cultural_note
  - marker: b
    text: O «yo mismo los desposeeré de delante de los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: Hebreo «repártela» refleja el giro idiomático de asignar la tierra, a menudo por sorteo.
    reason: lexical_alternative
