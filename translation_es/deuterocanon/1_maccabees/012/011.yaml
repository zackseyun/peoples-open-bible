  rationale: 'Se conserva la traducción base porque es fiel al griego y al expediente inglés, pero se corrigen dos detalles: (1) la nota al pie se reescribe enteramente en español y refleja con claridad la gama léxica de καθηκούσαις; (2) se ajusta levemente la cláusula con sacrificios y oraciones a ''al ofrecer sacrificios y en nuestras oraciones'' para mejorar la naturalidad del español sin perder el paralelismo cultual del original.'
