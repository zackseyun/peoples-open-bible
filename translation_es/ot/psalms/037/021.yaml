- from: El malvado toma prestado y no paga[a][b], pero el justo es bondadoso y da.
  to: El malvado toma prestado y no devuelve, pero el justo es bondadoso[a] y da[b].
  rationale: Se corrigen los anclajes de las notas para que correspondan a las palabras hebreas documentadas en el rastro de auditoría, y se ajusta «no paga» a «no devuelve» para reflejar con más precisión el sentido de repagar un préstamo. Se conserva «es bondadoso» por naturalidad en español, apoyado por la nota léxica que mantiene la conexión con gracia/favor.
