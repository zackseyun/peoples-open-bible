translation:
  language: es
  text: 'Y traerá su ofrenda por culpa[a] a Yahvé: un carnero sin defecto[b] del rebaño, según tu valoración, como ofrenda por culpa, al sacerdote.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ofrenda por reparación». El hebreo אָשָׁם puede referirse tanto a la culpa o reparación como a la ofrenda específica asociada con ella.
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente, «perfecto». La idea es la de un animal apto para el sacrificio, sin imperfección ritual.
    reason: lexical_alternative
lexical_decisions:
- source_word: אֲשָׁמוֹ
  english_pob_choice: his guilt offering
  chosen_spanish: su ofrenda por culpa
  alternatives_spanish:
  - su ofrenda de culpa
  - su ofrenda por reparación
  - su ofrenda por el pecado
  lexicon: HALOT
  rationale: אָשָׁם puede referirse tanto a la culpa como a la ofrenda relacionada con la culpa/reparación. En español, «ofrenda por culpa» conserva el doble valor reparativo y cultual sin forzar una reducción a un término tradicional único. Se evita «por el pecado» porque el hebreo aquí no usa חטאת.
- source_word: יָבִיא
  english_pob_choice: he shall bring
  chosen_spanish: traerá
  alternatives_spanish:
  - deberá traer
  - presentará
  lexicon: HALOT
  rationale: El imperfecto legal hebreo expresa instrucción normativa. «Traerá» comunica con naturalidad la obligación en español jurídico-ritual, sin añadir modalización innecesaria.
- source_word: לַיהוָה
  english_pob_choice: to Yahweh
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Yahvéh
  - al SEÑOR
  lexicon: Source text / project terminology
  rationale: Se sigue el término de proyecto «Yahvé» para el tetragrámaton, preservando el nombre divino en lugar de enmascararlo con «SEÑOR».
- source_word: אַיִל
  english_pob_choice: ram
  chosen_spanish: carnero
  alternatives_spanish:
  - ram
  - macho de oveja
  lexicon: HALOT
  rationale: «Carnero» es el equivalente natural y preciso en español para אַיִל, especialmente en contexto sacrificial.
- source_word: תָּמִים
  english_pob_choice: flawless
  chosen_spanish: perfecto
  alternatives_spanish:
  - sin defecto
  - sin mancha
  - sin tacha
  lexicon: HALOT
  rationale: «Perfecto» comunica aceptabilidad sacrificial y mantiene una formulación digna y clara en español moderno. Las alternativas tradicionales son posibles, pero «perfecto» evita el calco pesado y sigue la intención de la ofrenda íntegra.
- source_word: מִן הַצֹּאן
  english_pob_choice: from the flock
  chosen_spanish: del rebaño
  alternatives_spanish:
  - de la manada
  - de entre el ganado menor
  lexicon: HALOT
  rationale: צֹאן designa el ganado menor, especialmente ovejas y cabras; «del rebaño» es idiomático y suficiente aquí, dado que אַיִל ya especifica el animal.
- source_word: בְּעֶרְכְּךָ
  english_pob_choice: according to your valuation
  chosen_spanish: según tu valoración
  alternatives_spanish:
  - según tu tasación
  - conforme a tu valuación
  - de acuerdo con tu estimación
  lexicon: HALOT
  rationale: «Valoración» reproduce el matiz legal de cálculo/estimación y conserva el sufijo de segunda persona; es más natural que un calco rígido.
- source_word: לְאָשָׁם
  english_pob_choice: as a guilt offering
  chosen_spanish: como ofrenda por culpa
  alternatives_spanish:
  - como ofrenda de culpa
  - como ofrenda por reparación
  - como sacrificio por culpa
  lexicon: HALOT
  rationale: En esta fórmula sacrificial, el término señala la categoría cultual del animal. «Ofrenda por culpa» es una solución transparente que mantiene la relación con אָשָׁם y permite distinguirlo de la frase inicial sin inventar una nueva categoría.
- source_word: אֶל הַכֹּהֵן
  english_pob_choice: to the priest
  chosen_spanish: al sacerdote
  alternatives_spanish:
  - al sacerdote oficiante
  - al presbítero
  lexicon: HALOT
  rationale: «Sacerdote» es la forma estándar y fiel en español para הַכֹּהֵן. «Al sacerdote» conserva la dirección del acto de presentación.
theological_decisions:
- issue: Nombre divino YHWH
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahvéh
  rationale: El texto hebreo contiene el Tetragrámaton. Conforme a la terminología del proyecto, se preserva el nombre divino en español como «Yahvé», en vez de usar una convención de sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יהוה / YHWH → Yahvé'
- issue: Doble uso de אָשָׁם con matiz reparativo y cultual
  english_pob_reading: 'First occurrence: guilt offering; second occurrence: guilt offering'
  chosen_spanish_reading: 'Primera ocurrencia: «ofrenda por culpa»; segunda ocurrencia: «ofrenda por culpa»'
  alternative_spanish_readings:
  - 'Primera ocurrencia: «ofrenda por reparación»; segunda ocurrencia: «ofrenda por culpa»'
  - 'Primera ocurrencia: «ofrenda por culpa»; segunda ocurrencia: «ofrenda por expiación»'
  rationale: El hebreo repite אָשָׁם, y el versículo mezcla la idea reparativa con la designación sacrificial. En español, mantener la misma base léxica en ambos lugares preserva la unidad del término, mientras que el contexto y la preposición «como» ya señalan su función cultual. No se introduce una diferenciación artificial que el hebreo no exige aquí.
  doctrine_reference: Levitical sacrificial terminology; lexical consistency across אָשָׁם
translation_notes:
  revision_awareness: El material auditado en inglés muestra una revisión donde se unificó la primera ocurrencia de אָשָׁם con la segunda por exactitud léxica, manteniendo la formulación final «guilt offering» en ambas. La versión española sigue esa decisión de consistencia, pero conserva en nota la alternativa reparativa para no borrar el matiz semántico reconocido en el análisis léxico.
  spanish_consistency_notes:
  - Se preserva Yahvé para el tetragrámaton, conforme al estándar del proyecto.
  - Se mantiene una sola base léxica para אָשָׁם en el cuerpo del texto, con nota alternativa para el matiz reparativo.
  - «Carnero» se usa como equivalente natural de אַיִל en contexto sacrificial.
  - «Perfecto» se emplea como equivalente idiomático de תָּמִים, con nota sobre la alternativa tradicional «sin defecto».
  - «Sacerdote» se prefiere por claridad y fidelidad al hebreo הַכֹּהֵן.
