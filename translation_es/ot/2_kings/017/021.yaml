base_translation:
  language: en
  yaml_path: translation/ot/2_kings/017/021.yaml
  text: For Israel tore itself away from the house of David[a], and they made Jeroboam son of Nebat king; and Jeroboam drove Israel from following Yahweh and caused them to commit a great sin.
  footnotes:
