translation:
  language: es
  text: Entonces los amonitas cruzaron el Jordán para pelear también contra Judá, Benjamín y la casa de Efraín, e Israel quedó en gran angustia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Israel estaba en muy gran angustia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעַבְרוּ
  english_pob_choice: crossed
  chosen_spanish: cruzaron
  alternatives_spanish:
  - pasaron
  - atravesaron
  lexicon: HALOT
  rationale: El verbo עבר con אֶת־הַירדן indica el cruce concreto del Jordán. «Cruzar» es la opción natural en español y conserva el movimiento físico del original.
- source_word: בְנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - el pueblo de Amón
  lexicon: HALOT
  rationale: En un contexto narrativo, el etnónimo es la forma más idiomática y clara. «Los amonitas» comunica el referente sin perder precisión.
- source_word: אֶת הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: En español bíblico actual, «el Jordán» es natural y suficiente; el sustantivo «río» queda implícito por el contexto.
- source_word: לְהִלָּחֵם
  english_pob_choice: to fight
  chosen_spanish: pelear
  alternatives_spanish:
  - combatir
  - hacer guerra
  lexicon: HALOT
  rationale: El infinitivo de guerra de לחם expresa entablar combate. «Pelear» es claro, sobrio y fiel al sentido narrativo.
- source_word: גַּם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - asimismo
  lexicon: HALOT
  rationale: Marca extensión adicional de la agresión más allá del territorio previo. «También» conserva la fuerza aditiva de manera natural.
- source_word: בִּיהוּדָה וּבְבִנְיָמִין וּבְבֵית אֶפְרָיִם
  english_pob_choice: against Judah, Benjamin, and the house of Ephraim
  chosen_spanish: contra Judá, Benjamín y la casa de Efraín
  alternatives_spanish:
  - en Judá, Benjamín y la casa de Efraín
  - contra Judá y Benjamín y la casa de Efraín
  lexicon: HALOT
  rationale: Aunque la preposición básica es «en», con לְהִלָּחֵם funciona como blanco de hostilidad. «Contra» hace explícita la relación bélica en un español natural. Se conserva «la casa de Efraín» porque el hebreo incluye בֵּית, que puede señalar el clan o entidad territorial.
- source_word: וַתֵּצֶר
  english_pob_choice: was greatly distressed
  chosen_spanish: fue angustiado
  alternatives_spanish:
  - estuvo en gran angustia
  - fue oprimido
  lexicon: HALOT
  rationale: La forma verbal expresa gran estrechez/angustia que recae sobre Israel. «Fue angustiado» mantiene el valor pasivo/resultativo sin interpretar más de lo que el hebreo garantiza.
- source_word: לְיִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - para Israel
  lexicon: HALOT
  rationale: El ל marca al afectado; en español, la formulación resultativa «Israel fue angustiado» expresa mejor el estado resultante que una construcción literal con «para».
- source_word: מְאֹד
  english_pob_choice: greatly
  chosen_spanish: en gran manera
  alternatives_spanish:
  - mucho
  - grandemente
  lexicon: HALOT
  rationale: El intensificador adverbial pide una expresión natural y fuerte. «En gran manera» mantiene el énfasis sin sonar artificial.
translation_notes:
  revision_awareness: Se siguió el pasaje fuente hebreo y se mantuvo la solución auditada del POB inglés para el valor bélico de לְהִלָּחֵם, el cruce concreto del Jordán y la clausura resultativa de וַתֵּצֶר. No se detectaron revisiones posteriores en el paquete auditado que requirieran ajuste adicional.
  spanish_consistency_notes:
  - Se emplea «Yahvé» como forma principal en el proyecto, pero este versículo no contiene el tetragrámaton.
  - Se prefirió «los amonitas» y no una calca como «los hijos de Amón» por claridad narrativa, coherente con el valor etnónimo auditado.
  - Se conservó «la casa de Efraín» para respetar la presencia de בֵּית en el hebreo y no nivelar innecesariamente la referencia territorial/clánica.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el texto fuente.
  - Se mantuvo una sintaxis española natural sin perder las relaciones semánticas de hostilidad y resultatividad del hebreo.
