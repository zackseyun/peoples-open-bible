base_translation:
  language: en
  yaml_path: translation/ot/isaiah/008/019.yaml
  text: And when they say to you[b][a], “Consult the mediums and the spiritists who chirp and mutter,” should not a people consult its God? Should they consult the dead on behalf of the living?
  footnotes:
  - marker: a
    text: Or “the ghosts” / “those with familiar spirits” for “the mediums.” The Hebrew term אֹבוֹת is traditionally rendered with older occult terminology, but here likely refers to necromantic practitioners rather than the spirits themselves.
    reason: lexical_alternative
  - marker: b
    text: Or “who peep and mutter.” The Hebrew imitates eerie, birdlike and murmuring sounds associated with spirit consultation.
    reason: lexical_alternative
