  glossary_alignment: No hay conflicto con los términos de proyecto. «Señor» aquí corresponde a κύριε como apelativo divino griego, no a יהוה explícito. «Dios», «santificados» y «misericordia» están alineados con la terminología POB. La única excepción recomendada es no calcar el plural griego de ὑπερηφανίας con «arrogancias» por razones de naturalidad española.
