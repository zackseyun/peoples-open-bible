base_translation:
  language: en
  yaml_path: translation/ot/genesis/016/012.yaml
  text: And he will be a wild donkey of a man[a]; his hand will be against everyone, and everyone's hand against him[c][b], and he will dwell opposite all his brothers.
  footnotes:
  - marker: a
    text: Or 'a wild-ass man'; the Hebrew literally compares him to a wild donkey, an image of untamed freedom rather than simply saying he is 'wild.'
    reason: lexical_alternative
  - marker: b
    text: Or 'in the presence of' or 'over against.' The Hebrew expression may indicate living opposite, in front of, or in defiance of all his brothers.
    reason: lexical_alternative
  - marker: c
    text: '''Brothers'' may extend beyond literal siblings to close kin or related peoples.'
    reason: lexical_alternative
