  to: 'Entonces Yahvé dijo[a]: «Borraré al hombre, a quien he creado, de sobre la faz de la tierra; desde el hombre hasta el ganado, hasta el reptil y hasta las aves de los cielos[c], porque me pesa[b] haberlos hecho».'
