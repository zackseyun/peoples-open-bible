translation:
  language: es
  text: Abraham circuncidó a Isaac su hijo cuando tenía ocho días[a], tal como Dios le había mandado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «un hijo de ocho días».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּמָל
  english_pob_choice: circumcised
  chosen_spanish: circuncidó
  alternatives_spanish:
  - cortó el prepucio
  - hizo la circuncisión
  lexicon: HALOT
  rationale: El verbo hebreo מול designa específicamente el acto de la circuncisión. En español, «circuncidó» es el equivalente preciso, natural y suficientemente formal para un texto bíblico.
- source_word: אֶת יִצְחָק
  english_pob_choice: Isaac
  chosen_spanish: a Isaac
  alternatives_spanish:
  - Isaac
  lexicon: Nombre propio / marcador de objeto directo
  rationale: El hebreo marca el objeto directo con אֶת y nombra a Isaac. En español se expresa de forma natural con la preposición personal «a Isaac».
- source_word: בְּנוֹ
  english_pob_choice: his son
  chosen_spanish: su hijo
  alternatives_spanish:
  - su propio hijo
  - el hijo de él
  lexicon: HALOT
  rationale: El sufijo posesivo indica la relación filial con Abraham. «Su hijo» conserva esa referencia familiar sin sobrecargar el verso.
- source_word: בֶּן שְׁמֹנַת יָמִים
  english_pob_choice: when he was eight days old
  chosen_spanish: cuando tenía ocho días de nacido
  alternatives_spanish:
  - a los ocho días
  - siendo de ocho días
  - como un hijo de ocho días
  lexicon: HALOT
  rationale: 'La expresión hebrea es literalmente idiomática: «un hijo de ocho días». En español, «cuando tenía ocho días de nacido» comunica la edad con claridad y mantiene el sentido temporal del original.'
- source_word: כַּאֲשֶׁר
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - justo como
  lexicon: HALOT
  rationale: La partícula compara la acción con el mandato divino y señala conformidad exacta. «Tal como» expresa bien esa correspondencia sin sonar forzado.
- source_word: צִוָּה אֹתוֹ
  english_pob_choice: had commanded him
  chosen_spanish: le había mandado
  alternatives_spanish:
  - le mandó
  - le había ordenado
  lexicon: HALOT
  rationale: El contexto narra una orden previa de Dios; el pluscuamperfecto «había mandado» preserva la anterioridad señalada por la lectura inglesa, y «mandado» comunica el verbo de mando de manera bíblica pero clara.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios de Israel
  lexicon: HALOT
  rationale: Aquí אֱלֹהִים se refiere al Dios único de Israel en concordancia con el verbo singular y el contexto narrativo. «Dios» es la equivalencia directa y adecuada en español.
theological_decisions:
- issue: Relación entre la acción de Abraham y el mandato previo de Dios
  english_pob_reading: just as God had commanded him
  chosen_spanish_reading: tal como Dios le había mandado
  alternative_spanish_readings:
  - como Dios le mandó
  - según Dios le había mandado
  rationale: Se conserva la idea de conformidad exacta entre el acto de Abraham y la orden divina. El pluscuamperfecto mantiene el carácter previo del mandato sin introducir matices doctrinales adicionales.
  doctrine_reference: Narrativa de obediencia; continuidad con Génesis 17.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo y el audit trail en inglés: mantiene la precisión verbal de מול con «circuncidó», conserva la relación posesiva de בְּנוֹ con «su hijo», y expresa el idiomático בֶּן שְׁמֹנַת יָמִים mediante un español natural sin perder el valor temporal. No se introdujeron cambios de sentido respecto del pasaje auditado.'
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים conforme al contexto singular.
  - Se mantiene «circuncidó» como término técnico bíblico estándar y claro.
  - El pluscuamperfecto «había mandado» refleja la anterioridad del mandato en relación con la acción narrada.
  - La nota al pie preserva la alternativa literal del hebreo para transparentar la imagen idiomática original.
