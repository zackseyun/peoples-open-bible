review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura imperativa del hebreo, conserva ‘este pueblo’, mantiene las metáforas principales (‘corazón’, ‘oídos’, ‘ojos’) y no suaviza el endurecimiento judicial. También respeta bien הַכְבֵּד como ‘haz pesados’ y וְרָפָא לוֹ como resultado pasivo. Sin embargo, hay dos desajustes con el rastro auditado: 1) פֶּן se vierte mejor como ‘no sea que’ que como ‘para que no’, porque este último puede sonar más teleológico que preventivo; 2) la nota c del inglés sobre el singular colectivo no fue preservada, y en español sigue siendo relevante, especialmente si se ajusta la redacción para mantener claridad.'
  spanish_quality_summary: El texto es legible y digno, pero ‘Haz insensible el corazón’ suena algo menos idiomático y menos cercano a la elección inglesa ‘dull’ que ‘Embota el corazón’ o ‘haz torpe/insensible’. Además, la combinación de ‘este pueblo’ con verbos singulares funciona en español bíblico, pero conviene explicarla en nota para evitar ambigüedad interpretativa. ‘No sea que’ mejora el registro profético y la fuerza preventiva.
  glossary_alignment: No hay conflictos con la terminología global del proyecto. No aparecen Yahvé, Mesías, Espíritu, etc. Las decisiones clave (‘corazón’, ‘este pueblo’, ‘haz pesados’, ‘ciega’, ‘se vuelva’, ‘sea sanado’) están mayormente alineadas con la auditoría inglesa. La excepción importante es la omisión de la nota sobre el singular colectivo; además, ‘para que no’ conviene ajustarlo por fidelidad semántica a פֶּן.
  issues:
  - severity: medium
    issue: פֶּן traducido como ‘para que no’
    rationale: Aunque es posible en contexto, ‘para que no’ puede leerse como finalidad directa más que como prevención. La auditoría inglesa justificó ‘lest’; en español ‘no sea que’ reproduce mejor esa fuerza preventiva y el tono solemne.
  - severity: medium
    issue: Falta la nota sobre el singular colectivo
    rationale: El inglés preservó una nota explicando que ‘este pueblo’ es singular colectivo con verbos/pronombres singulares en hebreo. En español, al conservar verbos singulares, esa información sigue siendo útil y forma parte del rastro documentado que debe preservarse.
  - severity: low
    issue: ‘Haz insensible el corazón’ suena algo rígido
    rationale: Es fiel, pero ‘Embota el corazón’ o ‘haz insensible el corazón’ compite con una opción más idiomática y más cercana al campo semántico de ‘dull’. ‘Embota’ mantiene mejor la imagen de volver torpe o no receptivo sin sonar técnica.
  revised_spanish_text: Embota el corazón de este pueblo, y haz pesados sus oídos, y ciega[a] sus ojos, no sea que vea con sus ojos, y oiga con sus oídos, y entienda con su corazón, y se vuelva[b][c], y sea sanado.
  revised_footnotes:
