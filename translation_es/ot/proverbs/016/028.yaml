translation:
  language: es
  text: El hombre perverso provoca contienda[a]; el murmurador[b] separa a los amigos íntimos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: «desata contienda». El hebreo dice literalmente «envía/manda» contienda, pero aquí el sentido idiomático es poner en marcha o provocar el conflicto.'
    reason: lexical_alternative
  - marker: b
    text: 'Alternativa posible: «el chismoso» o «el calumniador». El hebreo נִרְגָּן describe al que habla en voz baja o de manera encubierta, dañando relaciones.'
    reason: lexical_alternative
  - marker: c
    text: 'Alternativa posible: «los amigos cercanos» o «el amigo íntimo». El hebreo puede referirse a un compañero íntimo en singular o con sentido genérico; el plural español expresa bien la fuerza general del proverbio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: אִישׁ
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - una persona
  lexicon: HALOT
  rationale: El hebreo es singular masculino y, en Proverbios, suele tener valor representativo general. 'El hombre' comunica bien esa generalidad en español sin perder la forma del original.
- source_word: תַּהְפֻּכוֹת
  english_pob_choice: perversions
  chosen_spanish: perverso
  alternatives_spanish:
  - perversiones
  - torcido
  - depravado
  lexicon: HALOT
  rationale: El sustantivo plural hebreo describe lo torcido o perverso. En español, un adjetivo sustantivado en la frase 'el hombre perverso' suena natural y conserva el valor moral del término sin forzar una abstracción extraña.
- source_word: יְשַׁלַּח
  english_pob_choice: stirs up
  chosen_spanish: provoca
  alternatives_spanish:
  - desata
  - envía
  - suscita
  lexicon: HALOT
  rationale: El verbo hebreo significa literalmente 'envía', pero en este dicho sapiencial la acción efectiva es iniciar o desatar la contienda. 'Provoca' transmite ese efecto causal de manera idiomática en español.
- source_word: מָדוֹן
  english_pob_choice: strife
  chosen_spanish: contiendas
  alternatives_spanish:
  - discordias
  - pleitos
  - contienda
  lexicon: HALOT
  rationale: '''Contiendas'' conserva el matiz de conflicto interpersonal sostenido y permite un plural natural en español que refleja bien el valor proverbial del término hebreo.'
- source_word: נִרְגָּן
  english_pob_choice: a whisperer
  chosen_spanish: el chismoso
  alternatives_spanish:
  - el murmurador
  - el calumniador
  - el hablador a escondidas
  lexicon: HALOT
  rationale: El término hebreo apunta a quien habla de modo encubierto y dañino. 'Chismoso' es una equivalencia idiomática clara en español; aunque no reproduce la imagen de 'susurrador' tan literalmente, comunica la función relacionalmente destructiva que el contexto exige.
- source_word: מַפְרִיד
  english_pob_choice: separates
  chosen_spanish: separa
  alternatives_spanish:
  - divide
  - aleja
  - rompe
  lexicon: HALOT
  rationale: El participio expresa una acción característica. 'Separa' es una traducción directa y transparente para la ruptura de relaciones descrita en el proverbio.
- source_word: אַלּוּף
  english_pob_choice: close friends
  chosen_spanish: los amigos íntimos
  alternatives_spanish:
  - el amigo íntimo
  - los compañeros cercanos
  - los amigos cercanos
  lexicon: HALOT
  rationale: El sustantivo designa a un compañero cercano o amigo íntimo. El plural español comunica con naturalidad la fuerza general del proverbio, en línea con la decisión inglesa de expresar el sentido proverbial amplio.
translation_notes:
  revision_awareness: Se corrigió el problema anterior anclando explícitamente todas las notas al texto mediante [a], [b] y [c]. La traducción evita una calca mecánica de 'envía contienda' y opta por un español proverbial natural, manteniendo la tensión semántica del verbo hebreo en la nota.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y sapiencial, adecuado a Proverbios.
  - 'Se prefirieron equivalentes españoles transparentes y eufónicos: ''contiendas'', ''chismoso'', ''amigos íntimos''.'
  - No se introdujo terminología eclesiástica ajena al proverbio.
  - Las notas al pie están todas ancladas en el texto y usan marcadores únicos.
