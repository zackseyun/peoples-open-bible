translation:
  language: es
  text: Y le informaron a Sísara que Barac, hijo de Abinoam, había subido al monte Tabor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּגִּדוּ
  english_pob_choice: And they told
  chosen_spanish: Y se lo informaron
  alternatives_spanish:
  - Y le dijeron
  - Y se lo comunicaron
  lexicon: HALOT
  rationale: El piel/hiphil de נגד comunica ‘decir, informar, anunciar’. En español, ‘informaron’ preserva mejor el valor de dar noticia que un simple ‘dijeron’, y el clítico ‘se lo’ expresa con naturalidad el destinatario indirecto sin perder la estructura del hebreo.
- source_word: לְסִיסְרָא
  english_pob_choice: Sisera
  chosen_spanish: a Sísara
  alternatives_spanish:
  - para Sísara
  - a Sisera
  lexicon: WLC / nombre propio
  rationale: El lamed indica destinatario; en español se rinde naturalmente con ‘a’. Se conserva la forma habitual del nombre en español, con acento gráfico para la pronunciación.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: HALOT
  rationale: Aquí introduce el contenido reportado tras un verbo de informar. ‘Que’ reproduce mejor la función completiva que ‘porque’, que sería causal y alteraría el sentido.
- source_word: עָלָה
  english_pob_choice: had gone up to
  chosen_spanish: había subido a
  alternatives_spanish:
  - subió a
  - había ascendido a
  lexicon: HALOT
  rationale: עלה expresa movimiento ascendente. ‘Había subido’ conserva el valor de desplazamiento hacia arriba y armoniza con el pasado previo del reporte. ‘Ascendido’ suena más formal y menos natural aquí.
- source_word: בָּרָק
  english_pob_choice: Barak
  chosen_spanish: Barac
  alternatives_spanish:
  - Barak
  lexicon: nombre propio
  rationale: Se adopta la forma castellana tradicional del nombre bíblico cuando existe y es plenamente reconocible en español, sin cambiar la referencia.
- source_word: בֶּן אֲבִינֹעַם
  english_pob_choice: son of Abinoam
  chosen_spanish: hijo de Abinoam
  alternatives_spanish:
  - el hijo de Abinoam
  lexicon: patronímico hebreo
  rationale: La construcción patronímica se rinde de manera directa con ‘hijo de’. Esto mantiene la relación genealógica sin añadir artículo innecesario.
- source_word: הַר תָּבוֹר
  english_pob_choice: Mount Tabor
  chosen_spanish: el monte Tabor
  alternatives_spanish:
  - el monte de Tabor
  - el monte Tabor
  lexicon: HALOT
  rationale: הַר designa ‘monte/montaña’. En español bíblico, ‘monte Tabor’ es la forma más natural y fiel para este topónimo geográfico. ‘Monte de Tabor’ suena más explicativo que el hebreo.
theological_decisions:
- issue: Topónimo geográfico y forma tradicional del nombre Barac
  english_pob_reading: Barak son of Abinoam had gone up to Mount Tabor.
  chosen_spanish_reading: Barac, hijo de Abinoam, había subido al monte Tabor.
  alternative_spanish_readings:
  - Barak, hijo de Abinoam, había subido al monte Tabor
  - Barac, hijo de Abinoam, subió al monte Tabor
  rationale: No hay carga doctrinal especial; la decisión afecta legibilidad y tradición onomástica. Se prefiere la forma castellana ‘Barac’ y el perfecto compuesto/pluperfecto ‘había subido’ para expresar adecuadamente el reporte previo sin perder el orden narrativo.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El contexto inglés y el texto hebreo coinciden en sentido y sintaxis; no hay variantes textuales ni revisiones aplicadas en el audit trail. Se mantiene la noticia indirecta, el destinatario en dativo y el desplazamiento ascendente hacia el monte Tabor.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ por norma del proyecto cuando aparezca el nombre divino; aquí no ocurre.
  - Se usa ‘Barac’ como forma castellana tradicional del nombre propio, consistente con uso bíblico en español.
  - ‘Monte Tabor’ se conserva como topónimo bíblico natural en español; no se traduce de forma analítica.
  - No se introducen notas al pie porque no hay variantes textuales ni alternativas teológicas relevantes en este versículo.
