    reason: cultural_note
  revision_rationale: Se revisa «utilidad» a «beneficio» por mayor naturalidad y mejor ajuste semántico a ὠφέλεια; «penuria» a «dificultad» para reflejar κακοπάθεια como esfuerzo penoso y no escasez material; y se españoliza la nota de «symposium» a «simposio».
