lexical_decisions:
- source_word: הַאֲהֵב נַפְשְׁךָ
  english_pob_choice: Love your life
  chosen_spanish: Ama tu vida
  alternatives_spanish:
  - Ama tu alma
  - Quiere tu vida
  - Valora tu vida
  lexicon: Hebreo bíblico / uso contextual
  rationale: El hebreo apunta a un verbo de afecto o aprecio aplicado a la propia vida. En español, 'ama tu vida' conserva la fuerza exhortativa y evita suavizar el imperativo; 'alma' sería una interpretación menos segura aquí.
- source_word: לָעֵדָה
  english_pob_choice: for the assembly
  chosen_spanish: para la asamblea
  alternatives_spanish:
  - para la congregación
  - ante la asamblea
  lexicon: Hebreo bíblico / uso contextual
  rationale: '''עֵדָה'' designa una asamblea o comunidad reunida. ''Asamblea'' es transparente y más neutral que ''congregación'', que puede sonar eclesial en exceso.'
- source_word: וּלְשִׁלְטוֹן
  english_pob_choice: authority
  chosen_spanish: la autoridad
  alternatives_spanish:
  - el poder
  - el dominio
  - la soberanía
  lexicon: Hebreo bíblico / uso contextual
  rationale: El término refiere a gobierno, control o autoridad. 'La autoridad' mantiene el sentido sin cargarlo innecesariamente con matices políticos más fuertes que el contexto no exige.
- source_word: הַאֲכֵף רֹאשׁ
  english_pob_choice: bow your head still more
  chosen_spanish: baja aún más tu cabeza
  alternatives_spanish:
  - inclina aún más tu cabeza
  - agacha todavía más la cabeza
  - humilla aún más tu cabeza
  lexicon: Hebreo bíblico / uso contextual
  rationale: La imagen corporal de inclinar o bajar la cabeza expresa sumisión reverente. 'Baja aún más tu cabeza' es natural en español y conserva la progresión intensiva de 'todavía más'.
theological_decisions:
- issue: Base textual principal para la traducción
  english_pob_reading: The Greek parallel is treated as the operative translation base when the extant Hebrew line is mismatched or unusable as presented; the audit trail notes that the Hebrew in this slot does not correspond to the Greek wording.
  chosen_spanish_reading: La traducción principal sigue el hebreo proporcionado en el expediente, mientras la nota textual explica que el paralelo griego no coincide con esa línea.
  alternative_spanish_readings:
  - 'Traducir el griego: ''Porque si él clama contra ti en la amargura de su alma, su Hacedor escuchará su plea.'''
  - Forzar una reconstrucción híbrida entre hebreo y griego
  rationale: El expediente presenta un hebreo explícito y una nota de desajuste con el griego. Para una lectura publicable y auditable en español, la base visible del texto debe seguir el hebreo dado, mientras la tensión textual se preserva en la nota correspondiente. Esto evita borrar la variante documentada y mantiene la transparencia editorial.
  doctrine_reference: 'PHILOSOPHY.md: traducir del hebreo donde subsiste y del griego donde no; preservar honestamente la incertidumbre de la fuente'
- issue: Tono de sumisión ante autoridad
  english_pob_reading: bow your head still more to authority
  chosen_spanish_reading: baja aún más tu cabeza ante la autoridad
  alternative_spanish_readings:
  - inclina aún más tu cabeza ante la autoridad
  - somete aún más tu cabeza a la autoridad
  rationale: El hebreo usa una imagen corporal concreta para expresar deferencia o sumisión. 'Baja aún más tu cabeza' preserva la imagen sin volverla excesivamente moderna o explicativa.
  doctrine_reference: Principio de equivalencia óptima con preservación de imagen figurativa
translation_notes:
  revision_awareness: El expediente registra una revisión reciente que sustituyó una traducción previa basada en el griego por una traducción alineada con el hebreo proporcionado. Esta versión española sigue esa revisión, pero mantiene la advertencia textual sobre la discrepancia con el paralelo griego para no borrar la variante documentada.
  spanish_consistency_notes:
  - He usado 'asamblea' en lugar de 'congregación' para evitar un sesgo eclesial no requerido por el hebreo.
  - He evitado 'SEÑOR' o 'Yahvé' porque el verso, en el texto principal elegido, no contiene el Tetragrámaton ni un equivalente directo.
  - '''Autoridad'' mantiene la abstracción del hebreo mejor que ''poder'' o ''dominio'', que cargarían el verso con matices más amplios.'
  - La sintaxis es breve y directa, acorde con un proverbio/exhortación sapiencial.
