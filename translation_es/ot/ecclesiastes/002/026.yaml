revisions:
- from: Porque al hombre que es bueno delante de él le ha dado sabiduría, conocimiento y alegría[a]; pero al pecador le ha dado la tarea de reunir y amontonar, para dar al que es bueno delante de Dios[b]. También esto es vanidad y persecución del viento.
  to: Porque al hombre que es bueno delante de él le ha dado sabiduría, conocimiento y alegría[a]; pero al pecador le ha dado la tarea de reunir y amontonar, para dar al que es bueno delante de Dios. También esto es vanidad y correr tras el viento[b].
  rationale: Se mantiene casi todo el borrador porque es fiel al hebreo y al audit trail, pero se corrige la expresión final para reflejar mejor el idiomatismo de רְעוּת רוּחַ en español natural y claro. ‘Correr tras el viento’ comunica con más precisión la idea de esfuerzo inútil que ‘persecución del viento’. La nota [b] se ajusta para ofrecer una alternativa léxica real y útil.
