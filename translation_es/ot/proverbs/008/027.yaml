translation:
  language: es
  text: Cuando él estableció los cielos, yo estaba allí, cuando trazó un círculo[a] sobre la faz de la profundidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «marcó un círculo»; el hebreo puede evocar el horizonte o un límite circular sobre las aguas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בַּהֲכִינוֹ
  english_pob_choice: when he established
  chosen_spanish: cuando él estableció
  alternatives_spanish:
  - cuando él preparó
  - al establecer él
  lexicon: HALOT
  rationale: 'El infinitivo constructo con prefijo ב aquí funciona temporalmente: ''cuando''. ''Estableció'' conserva la idea de fijar, afirmar o poner en orden los cielos, y encaja mejor en el registro cosmológico que ''preparó''.'
- source_word: שָׁמַיִם
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos
  lexicon: HALOT
  rationale: En contexto de creación, el plural hebreo se refleja mejor con 'los cielos', que conserva el alcance cósmico y el tono elevado del original.
- source_word: שָׁם
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - entonces
  lexicon: HALOT
  rationale: El adverbio es locativo; 'allí' expresa la presencia de la Sabiduría en ese acto creador.
- source_word: אָ֑נִי
  english_pob_choice: I was
  chosen_spanish: yo estaba
  alternatives_spanish:
  - yo era
  - yo estaba allí
  lexicon: HALOT
  rationale: El hebreo sólo dice 'yo'; en español se requiere verbo copulativo. 'Yo estaba' transmite presencia en la escena sin añadir más de lo que el texto dice.
- source_word: בְּחֻקוֹ
  english_pob_choice: when he inscribed
  chosen_spanish: cuando trazó
  alternatives_spanish:
  - cuando inscribió
  - cuando marcó
  lexicon: HALOT
  rationale: El verbo puede expresar marcar o trazar un límite. 'Trazó' preserva la imagen concreta del acto geométrico en español natural, sin volverlo demasiado abstracto.
- source_word: חוּג
  english_pob_choice: a circle
  chosen_spanish: un círculo
  alternatives_spanish:
  - un arco
  - un contorno
  lexicon: HALOT
  rationale: '''Círculo'' es la equivalencia más directa del sustantivo y mantiene la imagen geométrica que el inglés POB decidió preservar en el texto principal.'
- source_word: עַל־פְּנֵי
  english_pob_choice: on the face of
  chosen_spanish: sobre la superficie de
  alternatives_spanish:
  - sobre la faz de
  - sobre la cara de
  lexicon: HALOT
  rationale: En español, 'sobre la superficie de' comunica la expresión hebrea sin sonar demasiado literalista, y conserva la imagen de extensión visible del agua primordial.
- source_word: תְהוֹם
  english_pob_choice: the deep
  chosen_spanish: el abismo
  alternatives_spanish:
  - las aguas primordiales
  - la profundidad
  lexicon: HALOT
  rationale: '''Abismo'' es una equivalencia fuerte y bíblica para תהום; mantiene la fuerza primordial del término. ''Las aguas primordiales'' aclara la imagen, pero debilita la densidad lexical del hebreo.'
theological_decisions:
- issue: Imagen cosmológica de la creación
  english_pob_reading: Render the verse as poetic description of Wisdom's presence during creation without importing later doctrinal conclusions into the translation.
  chosen_spanish_reading: Presentar el versículo como descripción poética de la presencia de la Sabiduría en la creación, sin introducir conclusiones doctrinales posteriores.
  alternative_spanish_readings:
  - Traducir de modo que sugiera un modelo cosmológico específico, como una bóveda o un horizonte.
  - Traducir de modo que subraye una lectura cristológica posterior de la Sabiduría.
  rationale: El hebreo presenta una imagen poética y abierta de la creación. La traducción debe conservar esa tensión y no resolver debates interpretativos que el versículo no resuelve por sí mismo.
  doctrine_reference: Preservar la tensión teológica sin cerrarla.
translation_notes:
  revision_awareness: Coincide con la evaluación más reciente de alta concordancia; no se registraron cambios aplicados en la revisión final del texto inglés de referencia.
  spanish_consistency_notes:
  - Se usó 'los cielos' para mantener el plural hebreo y el registro cósmico.
  - Se mantuvo 'abismo' para תהום, evitando suavizar la fuerza primordial del término.
  - Se prefirió un español natural ('allí', 'estaba', 'trazó') sin perder la imaginería poética del hebreo.
