    rationale: Aunque intenta preservar la forma griega, «bugaeo» se siente ortográfica y fonéticamente inestable en español y no refleja tan claramente el testimonio «Bougaean»/Βουγαῖος. Una forma como «el Bougeo» conserva mejor el carácter transliterado y evita sugerir una interpretación indebida.
  - severity: low
