  text: וְ/עַ֣ל הַ/סַּבָּלִ֗ים וּֽ/מְנַצְּחִים֙ לְ/כֹל֙ עֹשֵׂ֣ה מְלָאכָ֔ה לַ/עֲבוֹדָ֖ה וַ/עֲבוֹדָ֑ה וּ/מֵֽ/הַ/לְוִיִּ֔ם סוֹפְרִ֥ים וְ/שֹׁטְרִ֖ים וְ/שׁוֹעֲרִֽים׃
base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/034/013.yaml
  text: They were over the burden-bearers and supervised all who did the work for each kind of service; and some of the Levites were scribes[a], officers, and gatekeepers.
  footnotes:
  - marker: a
    text: Or 'for each kind of service.' The Hebrew repeats 'service' (literally, 'for service and service'), likely expressing distribution across the various tasks.
    reason: lexical_alternative
