translation:
  language: es
  text: 'Aún dirán a tus oídos[a] los hijos de tu duelo[b]: «El lugar es demasiado estrecho para mí; hazme espacio para que pueda habitar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «en tus oídos». El hebreo expresa que Sion los oirá directamente.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «hijos de tu duelo» o «hijos de tu pérdida de hijos». La expresión se refiere a los hijos asociados con tu condición de haber sido privada de hijos; se conserva «hijos» por el valor colectivo natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ע֚וֹד
  english_pob_choice: Yet ... will still
  chosen_spanish: Aún
  alternatives_spanish:
  - Todavía
  - Aún así
  - Sigue
  lexicon: HALOT
  rationale: ע֚וֹד añade continuidad y persistencia en la escena profética. «Aún» conserva esa fuerza de continuidad sin introducir una adversación más fuerte de la que requiere el hebreo.
- source_word: יֹאמְר֣וּ
  english_pob_choice: will ... say
  chosen_spanish: te dirán
  alternatives_spanish:
  - dirán
  - te hablarán
  - te dirán diciendo
  lexicon: HALOT
  rationale: El imperfecto plural expresa futuro en este contexto. En español, «te dirán» es natural y mantiene el habla dirigida a Sion.
- source_word: בְ/אָזְנַ֔יִ/ךְ
  english_pob_choice: in your hearing
  chosen_spanish: al oído
  alternatives_spanish:
  - en tu oído
  - en tu presencia
  - en tu oído mismo
  lexicon: HALOT
  rationale: 'La locución hebrea es idiomática: no describe solo proximidad física al oído, sino habla que Sion oye directamente. «Al oído» conserva esa cercanía auditiva en un español natural.'
- source_word: בְּנֵ֖י שִׁכֻּלָ֑יִ/ךְ
  english_pob_choice: the children of your bereavement
  chosen_spanish: los hijos de tu desolación
  alternatives_spanish:
  - los hijos de tu bereavimiento
  - los hijos de tu luto
  - los hijos de tu pérdida
  lexicon: HALOT
  rationale: בְּנֵי admite un colectivo «hijos/niños». שִׁכּוּלַיִךְ se refiere al estado de haber sido privada de hijos; en español «desolación» comunica el estado de desamparo producido por esa pérdida, aunque no reproduce de modo técnico la raíz de «bereavement». Se conserva la tensión metafórica sin forzar una perífrasis pesada.
- source_word: צַר לִ֥/י הַ/מָּק֖וֹם
  english_pob_choice: The place is too cramped for me
  chosen_spanish: El lugar es demasiado estrecho para mí
  alternatives_spanish:
  - El lugar es muy angosto para mí
  - No hay suficiente espacio para mí
  - El lugar me queda demasiado estrecho
  lexicon: HALOT
  rationale: צַר con מָקוֹם expresa constricción espacial. «Demasiado estrecho» es fiel y claro en español; conserva la imagen de hacinamiento sin un calco rígido.
- source_word: גְּשָׁ/ה לִּ֥/י
  english_pob_choice: make room for me
  chosen_spanish: hazme espacio
  alternatives_spanish:
  - acércate para mí
  - arrímate para mí
  - déjame pasar
  lexicon: HALOT
  rationale: La forma verbal literal puede entenderse como «acércate/draw near», pero el contexto de hacinamiento muestra una petición idiomática de apartarse o dejar sitio. «Hazme espacio» transmite bien ese valor contextual en español.
- source_word: וְ/אֵשֵֽׁבָה
  english_pob_choice: so that I may dwell
  chosen_spanish: para que pueda habitar
  alternatives_spanish:
  - y habite
  - para que yo habite
  - para vivir allí
  lexicon: HALOT
  rationale: ישׁב aquí tiene el sentido de establecerse o habitar, no solo sentarse. «Habitar» mantiene la resonancia bíblica y «para que pueda» expresa finalidad o resultado acorde con el hebreo.
translation_notes:
  revision_awareness: Se siguió el consenso alto del pasaje y la lectura del POB en inglés sin cambios sustantivos; se mantuvo la misma decisión contextual para גְּשָׁה/לִּי como petición idiomática de espacio y la misma solución colectiva para בְּנֵי שִׁכֻּלָיִךְ.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «habitar» sobre «sentarse» para mantener el valor de establecimiento del verbo ישׁב.
  - «Hijos» conserva el colectivo del hebreo y evita una pluralidad artificial o exclusiva de varones en español.
  - No se usó «Cristo», «Señor» ni otras sustituciones teológicas ajenas al hebreo de este verso.
