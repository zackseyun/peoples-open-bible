base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/006/023.yaml
  text: then hear from heaven and act[a], and judge your servants, repaying the wicked by bringing his way upon his own head[b], and vindicating the righteous by giving to him according to his righteousness.
  footnotes:
  - marker: a
    text: Or 'justifying the righteous.' The Hebrew is a forensic term meaning to declare or treat someone as in the right.
    reason: lexical_alternative
  - marker: b
    text: Literally 'giving his way on his head,' a Hebrew idiom for bringing a person's conduct back upon him in judgment.
    reason: cultural_note
