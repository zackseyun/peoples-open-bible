translation:
  language: es
  text: No te juntes con una prostituta[a], no sea que quedes atrapado por sus seducciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo de la última expresión es difícil; el paralelo griego habla de 'sus maniobras/intentonas', lo que apoya un sentido como 'seducciones', 'artimañas' o 'engaños'.
    reason: lexical_alternative
lexical_decisions:
- source_word: עִם
  english_pob_choice: with / keep company with
  chosen_spanish: te juntes con
  alternatives_spanish:
  - te asocies con
  - andes con
  - hagas compañía con
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'con', pero aquí expresa asociación continua y desaconsejada. 'Te juntes con' comunica esa cercanía relacional en un español natural y sobrio.
- source_word: זוֹנָה
  english_pob_choice: a prostitute
  chosen_spanish: una prostituta
  alternatives_spanish:
  - una ramera
  - una meretriz
  - una mujer prostituta
  lexicon: HALOT
  rationale: El término hebreo designa a una prostituta. 'Prostituta' es claro y directo en español moderno, sin el arcaísmo de otras opciones.
- source_word: אַל תִּסְתַּיֵּד
  english_pob_choice: do not keep company
  chosen_spanish: No te juntes
  alternatives_spanish:
  - No te asocies
  - No tengas trato
  - No consientas en acompañarla
  lexicon: HALOT
  rationale: El verbo es poco común y el contexto, junto con el paralelo griego, apunta a una relación sostenida y peligrosa. 'No te juntes' conserva la advertencia contra la cercanía constante sin sobreexplicar.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o si no
  - a fin de que no
  lexicon: HALOT
  rationale: Introduce una consecuencia temida o indeseable. 'No sea que' reproduce bien ese matiz advertente en español bíblico contemporáneo.
- source_word: תִּלָּכֵד
  english_pob_choice: you be caught
  chosen_spanish: quedes atrapado
  alternatives_spanish:
  - seas atrapado
  - quedes preso
  - seas enredado
  lexicon: HALOT
  rationale: El pasivo sugiere caer en una trampa. 'Quedes atrapado' es idiomático y conserva la imagen de captación o captura.
- source_word: בְּלִקְחֹתֶיהָ
  english_pob_choice: by her enticements
  chosen_spanish: en sus artimañas
  alternatives_spanish:
  - por sus encantos
  - en sus engaños
  - por sus seducciones
  lexicon: HALOT
  rationale: La forma hebrea es difícil y el paralelo griego apoya la idea de dispositivos, maniobras o estrategias. 'Artimañas' expresa bien esa mezcla de seducción y engaño en español, manteniendo la incertidumbre léxica del original.
theological_decisions:
- issue: Base hebrea con ayuda del paralelo griego para la frase final difícil
  english_pob_reading: Translate the verse from the Hebrew, but render the final phrase in light of the Greek parallel as 'by her enticements.'
  chosen_spanish_reading: 'Traducir la línea principal desde el hebreo, pero expresar la última frase con una palabra amplia que refleje el paralelo griego: ''en sus artimañas''.'
  alternative_spanish_readings:
  - por sus encantos
  - en sus redes
  - por sus engaños
  rationale: El hebreo es la base, pero la expresión final es semánticamente incierta. El griego sugiere estrategias, maniobras o dispositivos; 'artimañas' mantiene esa amplitud y la advertencia moral sin afirmar más precisión de la que permiten los testigos.
  doctrine_reference: 'PHILOSOPHY.md: translate Sirach from Hebrew where it survives, using the Greek parallel as actual translation input.'
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se documentaron cambios posteriores y el estado de control cruzado fue de alta concordancia.'
  spanish_consistency_notes:
  - Se usa 'prostituta' para el valor léxico directo de זוֹנָה, en línea con la política POB para claridad moderna.
  - Se evita 'Cristo' o vocabulario no pertinente; el versículo no contiene terminología teológica que requiera ajuste adicional.
  - El marcador de nota [a] queda anclado en la palabra que introduce la ambigüedad léxica del tramo final.
