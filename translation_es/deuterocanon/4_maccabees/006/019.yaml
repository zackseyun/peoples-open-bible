translation:
  language: es
  text: y nosotros mismos llegaríamos a ser para los jóvenes un patrón de impiedad, de modo que llegáramos a ser un ejemplo de comer lo impuro.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un ejemplo de comer lo que está contaminado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσεβείας
  english_pob_choice: ungodliness
  chosen_spanish: impiedad
  alternatives_spanish:
  - inmiedad
  - irreligión
  lexicon: LSJ
  rationale: ἀσέβεια expresa falta de reverencia hacia Dios; en español, «impiedad» conserva ese peso religioso-moral con una forma natural y precisa. «Inmiedad» es posible pero menos usual; «irreligión» suena más abstracto y menos moral.
- source_word: τύπος
  english_pob_choice: pattern
  chosen_spanish: modelo
  alternatives_spanish:
  - patrón
  - ejemplo
  lexicon: LSJ
  rationale: τύπος puede ser «patrón», «modelo» o «ejemplo». Aquí se distingue de παράδειγμα, por lo que «modelo» preserva mejor la relación retórica sin repetir «ejemplo».
- source_word: τοῖς νέοις
  english_pob_choice: for the young
  chosen_spanish: para los jóvenes
  alternatives_spanish:
  - para los jóvenes varones
  - para la juventud
  lexicon: LSJ
  rationale: El dativo funciona aquí con valor de referencia o beneficio. «Para los jóvenes» conserva la amplitud del griego sin restringir innecesariamente el grupo a varones.
- source_word: παράδειγμα
  english_pob_choice: example
  chosen_spanish: ejemplo
  alternatives_spanish:
  - modelo
  - advertencia
  lexicon: LSJ
  rationale: παράδειγμα es «ejemplo» o «exemplar». Dado que τύπος ya se rindió como «modelo», «ejemplo» mantiene la distinción léxica documentada en la POB inglesa.
- source_word: μιαροφαγίας
  english_pob_choice: eating what is defiled
  chosen_spanish: comer lo que está contaminado
  alternatives_spanish:
  - comer lo impuro
  - comer lo profanado
  - alimentarse de lo contaminado
  lexicon: LSJ
  rationale: El compuesto une la idea de contaminación/impureza con comer. «Comer lo que está contaminado» reproduce bien la imagen sin convertirla prematuramente en un término técnico más específico que el griego mismo.
- source_word: γενοίμεθα / γενώμεθα
  english_pob_choice: would become / might become
  chosen_spanish: llegaríamos a ser / llegáramos a ser
  alternatives_spanish:
  - seríamos
  - pudiéramos llegar a ser
  - llegaríamos a ser
  lexicon: LSJ
  rationale: Los aoristos subjuntivos en esta construcción expresan posibilidad/finalidad. En español, el condicional y el subjuntivo reflejan esa fuerza hipotética mejor que un presente simple.
theological_decisions:
- issue: Alcance moral-teológico de ἀσεβείας
  english_pob_reading: ungodliness
  chosen_spanish_reading: impiedad
  alternative_spanish_readings:
  - irreverencia
  - irreligión
  rationale: La frase no describe mera torpeza social, sino un acto contrario a la reverencia debida a Dios. «Impiedad» conserva esa carga teológica sin oscurecer el sentido para lectores contemporáneos.
  doctrine_reference: DOCTRINE.md § Translation philosophy 6
- issue: Naturaleza de μιαροφαγίας
  english_pob_reading: eating what is defiled
  chosen_spanish_reading: comer lo que está contaminado
  alternative_spanish_readings:
  - comer alimento impuro
  - comer lo profanado
  rationale: El contexto apunta a la transgresión de la ley por alimentos prohibidos, pero el término griego es más amplio que una etiqueta técnica fija. Se mantiene la formulación descriptiva para no sobreinterpretar.
  doctrine_reference: DOCTRINE.md § Translation philosophy 1, 6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del inglés POB, que ajustó la segunda mitad de «defiled eating» a «eating what is defiled» para mayor naturalidad. En español se siguió esa dirección con una formulación descriptiva equivalente.
  spanish_consistency_notes:
  - Se conserva la distinción léxica entre τύπος («modelo») y παράδειγμα («ejemplo»).
  - Se usa «impiedad» para ἀσέβεια por su fuerza religiosa, en continuidad con el inglés POB «ungodliness».
  - Se evita introducir «SEÑOR» o «Cristo», ya que el verso no contiene esos términos.
  - La nota al pie refleja la ambigüedad legítima de μιαροφαγίας sin fijarla como término técnico más cerrado de lo que exige el griego.
