translation:
  language: es
  text: Y se alargaron los varales[a], y se veían las cabezas de los varales desde el arca, delante del santuario interior[b]; pero no se podían ver desde afuera. Y están allí hasta hoy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «varas».
    reason: lexical_alternative
  - marker: b
    text: O «delante del Lugar Santísimo».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאֲרִיכוּ
  english_pob_choice: were so long / were made long
  chosen_spanish: se alargaron
  alternatives_spanish:
  - fueron alargados
  - se extendieron
  lexicon: HALOT
  rationale: El verbo hebreo en Hifil expresa que los varales quedaron hechos más largos. En español, "se alargaron" comunica bien el resultado sin forzar una voz pasiva pesada ni añadir mecanismo no explicitado.
- source_word: הַבַּדִּים
  english_pob_choice: the poles
  chosen_spanish: los varales
  alternatives_spanish:
  - las varas
  - los polos
  lexicon: HALOT
  rationale: El referente son los palos para cargar el arca. "Varales" es término bíblico claro y bastante natural en español, y evita la posible ambigüedad de "polos". "Varas" sería más general; "varales" conserva mejor la función litúrgico-ritual.
- source_word: רָאשֵׁי הַבַּדִּים
  english_pob_choice: the heads/ends of the poles
  chosen_spanish: las cabezas de los varales
  alternatives_spanish:
  - los extremos de los varales
  - las puntas de los varales
  lexicon: HALOT
  rationale: La POB inglesa mantuvo "heads" para conservar la imagen literal del hebreo, aunque en inglés también se valora "ends". En español, "cabezas" preserva esa imagen concreta y evita una nivelación interpretativa.
- source_word: מִן הָאָרוֹן
  english_pob_choice: from the ark
  chosen_spanish: desde el arca
  alternatives_spanish:
  - del arca
  - a partir del arca
  lexicon: HALOT
  rationale: La preposición marca el punto desde el cual eran visibles las cabezas. "Desde el arca" reproduce bien la relación espacial y es natural en español.
- source_word: עַל פְּנֵי הַדְּבִיר
  english_pob_choice: before/in front of the inner sanctuary
  chosen_spanish: delante del santuario interior
  alternatives_spanish:
  - en frente del santuario interior
  - ante el lugar santísimo
  - antes del santuario interior
  lexicon: HALOT
  rationale: דְּבִיר designa el recinto interior del templo; "santuario interior" mantiene la transparencia arquitectónica de la POB inglesa. "Delante de" traduce bien עַל פְּנֵי como relación espacial, y evita decidir de forma prematura entre "antes" temporal y "ante" más formal.
- source_word: וְלֹא יֵרָאוּ הַחוּצָה
  english_pob_choice: but they could not be seen from outside
  chosen_spanish: pero no se podían ver desde afuera
  alternatives_spanish:
  - pero no eran visibles desde afuera
  - pero no podían verse desde afuera
  lexicon: HALOT
  rationale: 'El contraste es visual: visibles desde el lado interior, no visibles desde afuera. "No se podían ver" conserva la pasividad natural del hebreo sin añadir sujeto explícito.'
- source_word: וַיְהִי שָׁם עַד הַיּוֹם הַזֶּה
  english_pob_choice: and they are there to this day
  chosen_spanish: Y allí han estado hasta hoy
  alternatives_spanish:
  - y están allí hasta hoy
  - y allí permanecen hasta hoy
  lexicon: HALOT
  rationale: La fórmula hebrea marca permanencia hasta el tiempo del narrador. En español, "han estado hasta hoy" mantiene ese valor idiomático sin sonar tan marcado por una traducción verbal literal.
theological_decisions:
- issue: 'Nombre del santuario: דְּבִיר'
  english_pob_reading: inner sanctuary / before the Most Holy Place
  chosen_spanish_reading: santuario interior
  alternative_spanish_readings:
  - lugar santísimo
  - santísimo lugar
  rationale: La POB inglesa opta por un término arquitectónico transparente, con nota alternativa para "Most Holy Place". En español, "santuario interior" conserva esa transparencia y deja abierta la equivalencia cultual sin imponer una denominación más tradicional que podría ocultar el valor espacial del hebreo.
  doctrine_reference: Distribución del templo en 1 Reyes 6 y 2 Crónicas 3–5
translation_notes:
  revision_awareness: 'La redacción sigue la revisión inglesa más reciente que prefirió una estructura más directa: "were so long that...". En español, se reflejó esa fluidez con una sola oración coordinada y una formulación idiomática de permanencia final.'
  spanish_consistency_notes:
  - Se conservó "Yahvé" no aplicable en este versículo por no aparecer el tetragrámaton.
  - Se mantuvo el vocabulario del arca y del santuario de manera coherente con un registro bíblico moderno y no eclesiástico-arcaizante.
  - '"Varales" se eligió como término consistente para los poles del arca, evitando alternar con "barras" o "estacas" sin necesidad textual.'
