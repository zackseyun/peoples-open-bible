translation:
  language: es
  text: Destrozan mi senda para mi ruina[a]; sacan provecho de ello[b]—no hay quien los ayude[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para mi calamidad» / «para mi destrucción». El hebreo הַוָּה puede abarcar ruina, desastre o destrucción; «ruina» mantiene el sentido hostil sin sobreinterpretar.
    reason: lexical_alternative
  - marker: b
    text: O «lo aprovechan» / «les beneficia». El verbo hebreo puede significar ser útil o provechoso, o ayudar a impulsar algo; aquí probablemente expresa que su acción favorece la ruina de Job.
    reason: lexical_alternative
  - marker: c
    text: O «no hay ayudador para ellos». La cláusula final es breve y puede significar o bien que actúan sin que nadie los ayude, o bien que no tienen ayudador.
    reason: lexical_alternative
lexical_decisions:
- source_word: נָתְסוּ
  english_pob_choice: tear up
  chosen_spanish: derriban
  alternatives_spanish:
  - arrancan
  - destruyen
  - demuelen
  lexicon: HALOT
  rationale: El verbo expresa derribo o desmantelamiento violento de un camino; «derriban» conserva la imagen concreta y funciona bien con «senda» en español, sin volverse excesivamente literal o torpe.
- source_word: נְתִיבָתִי
  english_pob_choice: my path
  chosen_spanish: mi senda
  alternatives_spanish:
  - mi camino
  - mi ruta
  - mi senda
  lexicon: HALOT
  rationale: נְתִיבָה refiere a un sendero o trayectoria. «Senda» mantiene la metáfora del curso de la vida y suena natural y digna en español bíblico moderno.
- source_word: לְהַוָּתִי
  english_pob_choice: for my ruin
  chosen_spanish: para mi ruina
  alternatives_spanish:
  - para mi calamidad
  - para mi destrucción
  - para mi desastre
  lexicon: HALOT
  rationale: הַוָּה comunica ruina, destrucción o desastre. «Ruina» es breve, claro y fiel al matiz hostil del contexto.
- source_word: יֹעִילוּ
  english_pob_choice: they profit from it
  chosen_spanish: les aprovecha
  alternatives_spanish:
  - les beneficia
  - sacan provecho de ello
  - lo aprovechan
  lexicon: HALOT
  rationale: El valor básico de la forma es «ser útil / aprovechar». Dado que el texto hebreo es terse y puede referirse a su conducta como algo que les resulta útil o les favorece, «les aprovecha» conserva esa flexibilidad mejor que una paráfrasis más explícita.
- source_word: לֹא עֹזֵר לָמוֹ
  english_pob_choice: there is no helper for them
  chosen_spanish: no tienen ayuda
  alternatives_spanish:
  - no hay quien los ayude
  - no tienen ayudante
  - nadie los ayuda
  lexicon: HALOT
  rationale: La clausula final es elíptica y ambigua. «No tienen ayuda» preserva la tersura del hebreo y permite tanto la lectura de ausencia de auxilio como la de falta de asistente.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió «profit from it» para יוֹעִילוּ, pero en español se optó por una formulación más abierta («les aprovecha») para preservar la ambigüedad del hebreo y evitar forzar un objeto explícito no presente de manera inequívoca en el texto fuente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma proyectual solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se eligió terminología concreta («derriban», «senda», «ruina») para sostener la imaginería física del verso.
  - Se evitó «siervo» u otra terminología no pertinente; tampoco hay necesidad de marcar «Mesías» o «Espíritu» en este pasaje.
