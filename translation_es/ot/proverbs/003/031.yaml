translation:
  language: es
  text: No envidies[a] a un hombre violento, ni elijas ninguno de sus caminos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tengas celos de un hombre violento». El verbo hebreo puede expresar tanto envidia como celos, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: אַל תְּקַנֵּא
  english_pob_choice: Do not envy
  chosen_spanish: No envidies
  alternatives_spanish:
  - No seas celoso de
  - No sientas envidia de
  lexicon: HALOT
  rationale: El hebreo expresa una prohibición con קנא en un contexto de deseo resentido por la condición o el éxito ajeno. «Envidies» conserva la fuerza ética y es natural en español; «celoso» puede sonar más ambiguo o menos preciso aquí.
- source_word: בְּאִישׁ
  english_pob_choice: a man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a un hombre
  - a esa persona
  lexicon: HALOT
  rationale: אִישׁ es masculino singular y el texto presenta un tipo representativo. «Al hombre» mantiene la referencia personal y la forma proverbial sin neutralizar indebidamente el género del término hebreo.
- source_word: חָמָס
  english_pob_choice: violent
  chosen_spanish: violento
  alternatives_spanish:
  - dedicado a la violencia
  - opresor
  - hombre de violencia
  lexicon: HALOT
  rationale: חָמָס abarca violencia, injusticia y acción rapaz. «Violento» reproduce bien el valor adjetival en construcción con אִישׁ y es la opción más breve y clara en español, sin perder la carga moral.
- source_word: תִּבְחַר
  english_pob_choice: choose
  chosen_spanish: elijas
  alternatives_spanish:
  - escojas
  - prefieras
  lexicon: HALOT
  rationale: בחר se traduce naturalmente por «elegir» en este contexto sapiencial. El subjuntivo negativo español («no elijas») corresponde bien a la prohibición hebrea.
- source_word: בְּכָל דְּרָכָיו
  english_pob_choice: any of his ways
  chosen_spanish: ninguno de sus caminos
  alternatives_spanish:
  - ninguna de sus sendas
  - ninguna de sus conductas
  - ningún modo de obrar
  lexicon: HALOT
  rationale: El hebreo usa un totalizador que prohíbe adoptar cualquiera de sus conductas. «Ninguno de sus caminos» conserva la metáfora de דֶּרֶךְ y expresa con claridad la totalidad de la prohibición en español.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas; se mantiene la estructura paralela de dos prohibiciones y la lectura sapiencial directa del versículo.
  spanish_consistency_notes:
  - Se conserva «caminos» para דְּרָכָיו por coherencia con el imaginario sapiencial bíblico.
  - Se evita «SEÑOR» o terminología no pertinente, ya que el versículo no contiene el nombre divino.
  - La nota al pie refleja la ambigüedad léxica documentada de קנא sin introducir una glosa excesiva en el cuerpo del texto.
