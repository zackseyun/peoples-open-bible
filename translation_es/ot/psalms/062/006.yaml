revisions:
- from: Solo para Dios[a], guarda silencio, mi alma[c][b], porque de él proviene mi esperanza.
  to: Solo para Dios[c], guarda silencio, alma mía[a][b], porque de él viene mi esperanza.
  rationale: Se corrigen las notas para alinearlas con el rastro de auditoría inglés y se mejora la naturalidad española con «alma mía» y «viene» en lugar de «proviene», sin alterar la lectura exhortativa ni el contenido semántico básico. Se mantiene «Solo para Dios» como reparación mínima cercana a la decisión del POB, aunque sigue siendo una construcción algo tensa en español.
