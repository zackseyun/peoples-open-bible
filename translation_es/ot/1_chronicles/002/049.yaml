base_translation:
  language: en
  yaml_path: translation/ot/1_chronicles/002/049.yaml
  text: Shaaph fathered Sheva[a], the father of Machbenah and the father of Gibea[c][b]; and Caleb’s daughter was Acsah.
  footnotes:
  - marker: a
    text: Hebrew 'she bore' has a feminine verb form, but in this genealogy it refers to Shepha and is rendered idiomatically as 'fathered.'
    reason: lexical_alternative
  - marker: b
    text: Or 'founder of' for 'father of' in the place-name expressions 'father of Madmannah,' 'father of Machbenah,' and 'father of Gibea.'
    reason: lexical_alternative
  - marker: c
    text: Acsah is also spelled 'Achsah' in English transliteration.
    reason: lexical_alternative
