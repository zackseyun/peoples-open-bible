    issue: Falta el matiz partitivo explícito en וּמִבָּנֶיךָ
    rationale: El hebreo con מן partitivo y la decisión documentada del POB inglés favorecen «algunos de tus hijos». «De tus hijos» puede sonar elíptico y no preserva tan claramente la parcialidad.
  - severity: low
    issue: Ligera torpeza sintáctica en «que saldrán de ti, y que tú engendrarás»
    rationale: La doble conjunción no refleja una necesidad del original y suena menos natural en español. «que saldrán de ti, que tú engendrarás» o una leve recast mejora la fluidez sin alterar el sentido.
  revised_spanish_text: Y algunos de tus hijos, que saldrán de ti, que tú engendrarás, serán llevados, y serán eunucos[a] en el palacio del rey de Babilonia.
  revised_footnotes:
