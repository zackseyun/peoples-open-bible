translation:
  language: es
  text: ¿Cómo, pues, podrías rechazar a un solo capitán[b] de entre los siervos de menor rango de mi señor[a], mientras confías en Egipto para carros y jinetes?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'volver atrás el rostro de'; hebraísmo que significa 'rechazar', 'hacer retroceder' o 'resistir'.
    reason: lexical_alternative
  - marker: b
    text: '''Capitán'' también puede entenderse como ''gobernador'' u ''oficial''; el término hebreo puede designar un jefe provincial o un oficial militar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תָּשִׁיב / אֵת פְּנֵי
  english_pob_choice: turn back the face of
  chosen_spanish: hacer retroceder el rostro
  alternatives_spanish:
  - rechazar
  - hacer retroceder
  - hacer volver el rostro
  lexicon: HALOT
  rationale: Sigo el valor idiomático de la expresión hebrea sin calcarla de forma extraña. En español, 'hacer retroceder el rostro' conserva la imagen de forzar a alguien a retirarse y respeta la revisión inglesa que recupera el modismo original.
- source_word: פַּחַת
  english_pob_choice: captain
  chosen_spanish: capitán
  alternatives_spanish:
  - gobernador
  - oficial
  - comandante
  lexicon: HALOT
  rationale: El contexto es marcadamente militar y de desafío bélico; 'capitán' comunica bien un oficial subordinado sin exceder la evidencia del pasaje. Mantiene la tensión entre función militar y posible rango administrativo.
- source_word: אַחַד
  english_pob_choice: a single
  chosen_spanish: un solo
  alternatives_spanish:
  - uno solo
  - único
  lexicon: HALOT
  rationale: '''Un solo'' reproduce el énfasis retórico del hebreo y del inglés auditado: incluso uno bastaría para evidenciar la desproporción.'
- source_word: עַבְדֵי אֲדֹנִי
  english_pob_choice: my master's servants
  chosen_spanish: los siervos de mi señor
  alternatives_spanish:
  - los esclavos de mi señor
  - los servidores de mi señor
  lexicon: HALOT
  rationale: '''Siervos'' mantiene el registro natural en español y refleja la relación de subordinación. Aunque ''esclavos'' es posible lexicalmente, aquí el matiz de servicio cortesano/militar es más plausible en el discurso del oficial.'
- source_word: הַקְּטַנִּים
  english_pob_choice: the least
  chosen_spanish: los más pequeños
  alternatives_spanish:
  - los menos importantes
  - los más bajos
  - los más insignificantes
  lexicon: HALOT
  rationale: La forma española 'los más pequeños' conserva la comparación superlativa con ambigüedad de tamaño/rango que también existe en la fuente. En este contexto, alude a menor rango o importancia.
- source_word: עַל מִצְרַיִם
  english_pob_choice: in Egypt
  chosen_spanish: en Egipto
  alternatives_spanish:
  - sobre Egipto
  - apoyado en Egipto
  lexicon: HALOT
  rationale: La preposición hebrea con בטח expresa confiar/rely on; en español, 'confiar en Egipto' es la forma más natural y fiel al sentido de dependencia política/militar.
- source_word: לְרֶכֶב וּלְפָרָשִׁים
  english_pob_choice: for chariots and horsemen
  chosen_spanish: para carros y jinetes
  alternatives_spanish:
  - para carros y caballería
  - para carros y hombres de a caballo
  lexicon: HALOT
  rationale: '''Carros y jinetes'' conserva la fuerza militar y evita un término más técnico que sonaría ajeno. ''Jinetes'' es claro y suficientemente preciso para tropas montadas.'
theological_decisions:
- issue: Sentido idiomático de 'hacer retroceder el rostro'
  english_pob_reading: turn back the face of
  chosen_spanish_reading: hacer retroceder el rostro
  alternative_spanish_readings:
  - rechazar a
  - hacer volver atrás a
  rationale: No se trata de una afirmación teológica sino de un modismo bélico. Mantener el giro con 'rostro' preserva la evidencia semítica que la revisión inglesa decidió resguardar.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió volver a 'turn back the face of' para reflejar con mayor cercanía el modismo hebreo, en lugar de una paráfrasis como 'repulse'. La versión española sigue esa decisión al conservar el hebraísmo de forma inteligible y al mantener el tono de desafío militar.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando aparece el nombre divino; en este versículo no aparece.
  - Se mantiene 'siervos' para עַבְדֵי porque el contexto es cortesano/militar y no exige 'esclavos'.
  - '''Carros y jinetes'' conserva la imaginería bélica sin sobreinterpretar ''caballería''.'
  - 'Las notas al pie están ancladas exactamente en los términos marcados en el texto: [a] y [b].'
