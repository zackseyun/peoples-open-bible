translation:
  language: es
  text: Las riquezas no aprovechan[a] en el día de la ira[c], pero la justicia[b] libra de la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Las riquezas no son de provecho en el día de la ira».'
    reason: lexical_alternative
  - marker: b
    text: «Justicia» también puede entenderse como «rectitud» u «obrar recto» en contextos sapienciales.
    reason: lexical_alternative
  - marker: c
    text: «El día de la ira» puede referirse de manera amplia a un tiempo de juicio o calamidad; el proverbio no precisa más.
    reason: alternative_reading
lexical_decisions:
- source_word: הוֹן
  english_pob_choice: wealth
  chosen_spanish: riquezas
  alternatives_spanish:
  - riqueza
  - bienes
  - hacienda
  lexicon: HALOT
  rationale: הוֹן se refiere a riqueza material o posesiones. En español, «riquezas» comunica bien el campo semántico y conserva el plural proverbial del hebreo, sin volver la frase artificial.
- source_word: יוֹעִיל
  english_pob_choice: is of no use
  chosen_spanish: no aprovechan
  alternatives_spanish:
  - no benefician
  - no sirven
  - no son de provecho
  lexicon: HALOT
  rationale: El hifil de יעל expresa producir beneficio o ser útil. «No aprovechan» es natural en español, mantiene el sentido de inutilidad y funciona bien con el sujeto plural «riquezas».
- source_word: בְּיוֹם עֶבְרָה
  english_pob_choice: on the day of wrath
  chosen_spanish: en el día de la ira
  alternatives_spanish:
  - en el día del furor
  - en un día de ira
  - en el día de la cólera
  lexicon: HALOT
  rationale: La expresión señala un tiempo decisivo de ira o juicio. «Ira» es la opción más clara y sobria en español; se conserva el valor temporal con «en el día de» y no se especifica más allá de lo que el proverbio dice.
- source_word: צְדָקָה
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  - el obrar justo
  lexicon: HALOT
  rationale: En contexto sapiencial, צְדָקָה puede ser «justicia» o «rectitud». Aquí se opta por «justicia» porque es una equivalencia natural y mantiene la tensión lexical documentada por la traducción inglesa, sin cerrar el matiz ético del término.
- source_word: תַּצִּיל
  english_pob_choice: delivers
  chosen_spanish: libra
  alternatives_spanish:
  - rescata
  - salva
  - delivers
  lexicon: HALOT
  rationale: El hifil de נצל significa rescatar o librar. «Libra» es idiomático y fuerte en español, y conserva bien la idea de ser sacado del peligro o de la muerte.
- source_word: מִמָּוֶת
  english_pob_choice: from death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - de la muerte
  - de morir
  - de la destrucción
  lexicon: HALOT
  rationale: La expresión es literalmente «de la muerte». Se mantiene de forma directa en español para respetar la formulación hebrea y su fuerza proverbial.
theological_decisions:
- issue: Sentido de «el día de la ira»
  english_pob_reading: A decisive day of judgment or calamity in general terms, without specifying a later doctrinal framework beyond the proverb itself.
  chosen_spanish_reading: Un día decisivo de ira, juicio o calamidad, sin precisar más el marco doctrinal.
  alternative_spanish_readings:
  - Un día de furor humano o desastre
  - Un día escatológico de juicio divino
  rationale: El hebreo permite un sentido amplio de juicio o calamidad. La traducción conserva esa amplitud y evita imponer una lectura más específica que el proverbio no exige por sí mismo.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Sentido de «la justicia libra de la muerte»
  english_pob_reading: Righteousness is presented as the means by which one is delivered from death within wisdom theology, without importing later debates about justification.
  chosen_spanish_reading: La justicia aparece como medio de libramiento de la muerte dentro de la sabiduría bíblica, sin forzar una lectura técnica de justificación.
  alternative_spanish_readings:
  - La conducta recta preserva la vida de consecuencias destructivas
  - La justicia del pacto garantiza liberación divina
  rationale: El proverbio afirma el valor preservador de la justicia en su propio registro sapiencial. Se evita convertirlo en una declaración técnica sobre soteriología y se conserva su fuerza práctica y moral.
  doctrine_reference: Affirmations and Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión más reciente del registro inglés quedó sin cambios tras revisión de alta concordancia; esta propuesta sigue ese estado estable y conserva las decisiones léxicas y teológicas ya auditadas, adaptándolas al español con equivalencias naturales y sin suavizar la tensión interpretativa del proverbio.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «SEÑOR» como convención de enmascaramiento porque el texto no lo requiere.
  - «Justicia» se usa como equivalente principal de צְדָקָה, dejando abierta la alternativa ética de «rectitud».
  - «Libra» refleja bien el valor de rescate de תַּצִּיל y suena natural en español bíblico contemporáneo.
