lexical_decisions:
- source_word: σε
  english_pob_choice: you
  chosen_spanish: Tú
  alternatives_spanish:
  - A ti
  lexicon: BDAG
  rationale: El griego conserva el destinatario en segunda persona singular; en español se mantiene de forma directa como vocativo/objeto dependiente del contexto anterior. Como este fragmento inicia a mitad de frase, 'Tú' preserva la referencia sin añadir palabras.
- source_word: ἀναστὰς
  english_pob_choice: rose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  lexicon: BDAG
  rationale: El participio aoristo de ἀνίστημι expresa la acción de incorporarse antes del verbo principal. En español, 'se levantó' comunica bien el movimiento narrativo sin sonar anticuado.
- source_word: ἔφαγεν
  english_pob_choice: ate
  chosen_spanish: comió
  alternatives_spanish:
  - comió de ello
  - sí comió
  lexicon: BDAG
  rationale: El aoristo simple de ἐσθίω se vierte con el pretérito perfecto simple natural en español. 'Comió' es directo y fiel al evento puntual.
- source_word: ἄγγελος
  english_pob_choice: angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En este contexto narrativo se trata de un ser celestial agente de Dios; 'ángel' preserva el sentido evidente sin reducirlo a 'mensajero'.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  lexicon: BDAG
  rationale: La construcción genitiva se traduce de forma natural como 'de Dios', manteniendo el vínculo posesivo/relacional con el ángel.
- source_word: ἀπε-
  english_pob_choice: departed—
  chosen_spanish: se fue—
  alternatives_spanish:
  - partió—
  - se apartó—
  lexicon: BDAG
  rationale: El griego está truncado en ἀπε-, por lo que no debe fingirse una forma completa. 'Se fue' expresa la idea de partida/departo que el audit trail identifica como segura, y el em dash conserva la incompletitud textual.
theological_decisions:
- issue: Naturaleza del ἄγγελος τοῦ θεοῦ en una narración deuterocanónica
  english_pob_reading: angel
  chosen_spanish_reading: ángel
  alternative_spanish_readings:
  - mensajero
  rationale: La escena presenta un agente celestial que actúa para Dios; traducir 'ángel' mantiene la fuerza narrativa y teológica del texto. 'Mensajero' sería demasiado débil para el español contemporáneo en este contexto.
  doctrine_reference: 'DOCTRINE.md: Translate according to source plain sense; do not flatten theological weight.'
- issue: Conectiva δέ en la secuencia narrativa
  english_pob_reading: and
  chosen_spanish_reading: y
  alternative_spanish_readings:
  - pero
  rationale: El audit trail revisó 'but' a 'and' para evitar una oposición inexistente. En español, 'y' reproduce mejor el δέ narrativo sin introducir contraste.
  doctrine_reference: 'DOCTRINE.md: Preserve simple source connectives unless context requires stronger discourse force.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada que corrigió la relación entre cláusulas de 'but' a 'and' para reflejar mejor δέ. También se respetó la truncación final del griego en ἀπε-, evitando completar artificialmente la forma verbal.
  spanish_consistency_notes:
  - Se usa 'ángel' de manera consistente con la decisión inglesa auditada y con el sentido narrativo sobrenatural.
  - Se evita 'Señor' u otras sustituciones para θεός; se mantiene 'Dios' conforme al estándar del proyecto.
  - La puntuación con raya final conserva la incompletitud textual señalada por el audit trail.
  - El pronombre inicial se conserva por fidelidad al fragmento, aunque depende del contexto previo de la perícopa.
