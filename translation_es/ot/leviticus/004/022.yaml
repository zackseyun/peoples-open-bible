review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido global del hebreo: un líder reconocido peca, comete inadvertidamente una de las cosas prohibidas por Yahvé su Dios, y queda culpable. Sin embargo, hay desajustes menores con el rastro auditado: el anclaje de nota para la inadvertencia está colocado sobre la cláusula prohibitiva en vez de sobre la expresión de שְׁגָגָה; además, la nota a mezcla español e inglés al dejar ‘ruler’ sin traducir.'
  spanish_quality_summary: El texto es claro y natural en español eclesial contemporáneo. No obstante, ‘hace una de cualquiera de las cosas’ suena algo trabado; ‘hace cualquiera de estas cosas’ o ‘hace una de estas cosas’ sería más idiomático, pero para no alejarse del valor partitivo del hebreo conviene una reparación mínima. ‘Sin darse cuenta’ es comprensible, pero ‘inadvertidamente’ encaja mejor con el registro y con el valor técnico de שְׁגָגָה en Levítico.
  glossary_alignment: 'Alinea bien con la terminología del proyecto en ‘Yahvé’ y ‘su Dios’. ‘Dirigente’ para נָשִׂיא es defendible. La decisión para שְׁגָגָה debe conservarse explícitamente en el punto correspondiente del texto y su nota. La nota alternativa para נָשִׂיא debe usar solo español: ‘gobernante’ en lugar de ‘ruler’.'
  issues:
  - severity: medium
    issue: La nota [b] está anclada a ‘que no se hagan’ en vez de a la expresión de inadvertencia.
    rationale: La nota explica בִּשְׁגָגָה (‘por error’, ‘por inadvertencia’), por lo que debe aparecer donde se traduce ese término, no sobre la cláusula ‘que no se hagan’, que corresponde a אֲשֶׁר לֹא תֵעָשֶׂינָה.
  - severity: low
    issue: La nota [a] contiene el anglicismo ‘ruler’.
    rationale: Las notas del producto español deben estar plenamente en español; ‘gobernante’ o ‘jefe’ comunica adecuadamente la alternativa léxica.
  - severity: low
    issue: ‘Hace una de cualquiera de las cosas’ es poco natural en español.
    rationale: Aunque intenta preservar el partitivo hebreo, resulta pesado. Una formulación mínima más idiomática puede mantener el sentido sin paráfrasis excesiva.
  revised_spanish_text: Cuando un dirigente[a] peca y hace inadvertidamente[b] una de las cosas que Yahvé su Dios ha mandado que no se hagan, y queda culpable[c],
  revised_footnotes:
