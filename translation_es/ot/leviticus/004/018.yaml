    text: 'Hebreo: «de la sangre pondrá»; el español explicita «algo de la sangre» para hacer claro el sentido partitivo, en contraste con «toda la sangre» más adelante en el versículo.'
    reason: lexical_alternative
  revision_rationale: La revisión mantiene el contenido del hebreo y las decisiones del POB, pero mejora la fidelidad explícita del partitivo, la naturalidad del español y la precisión ritual de «base». No introduce paráfrasis interpretativa adicional.
