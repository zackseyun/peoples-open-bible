  text: וַ/יָּבֹ֜אוּ וַ/יָּצֻ֣רוּ עָלָ֗י/ו בְּ/אָבֵ֨לָ/ה֙ בֵּ֣ית הַֽמַּעֲכָ֔ה וַ/יִּשְׁפְּכ֤וּ סֹֽלְלָה֙ אֶל הָ/עִ֔יר וַֽ/תַּעֲמֹ֖ד בַּ/חֵ֑ל וְ/כָל הָ/עָם֙ אֲשֶׁ֣ר אֶת יוֹאָ֔ב מַשְׁחִיתִ֖ם לְ/הַפִּ֥יל הַ/חוֹמָֽה־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/2_samuel/020/015.yaml
  text: They came and besieged him in Abel-beth-maacah[a], and they cast up a siege ramp against the city, and it stood against the outer wall[c][b]; and all the people who were with Joab were battering the wall to bring it down.
  footnotes:
  - marker: a
    text: Or 'laid siege against it'; the Hebrew says 'against him,' likely focusing on Sheba as the target even though the city is under siege.
    reason: alternative_reading
  - marker: b
    text: Or 'embankment' or 'mound' for 'siege ramp.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew term rendered 'rampart' can refer to an outer defensive work or fortification.
    reason: lexical_alternative
