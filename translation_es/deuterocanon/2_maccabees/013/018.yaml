translation:
  language: es
  text: Pero el rey[a], habiendo aprendido por experiencia la valentía de los judíos, atacó los lugares por estratagemas[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «habiendo tomado experiencia de la valentía de los judíos».'
    reason: lexical_alternative
  - marker: b
    text: O «las posiciones» o «los lugares»; el griego es más literal que «fortalezas», aunque el contexto militar sugiere ubicaciones defendidas.
    reason: lexical_alternative
  - marker: c
    text: «Por estratagemas» expresa maniobras o recursos tácticos calculados, no simplemente «por métodos».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰληφὼς πεῖραν
  english_pob_choice: having learned by experience
  chosen_spanish: habiendo conocido por experiencia
  alternatives_spanish:
  - habiendo aprendido por experiencia
  - habiendo adquirido experiencia
  - habiendo tomado experiencia
  lexicon: LSJ
  rationale: La expresión griega es idiomática y literalmente sugiere ‘haber tomado experiencia/prueba’. En español, ‘habiendo conocido por experiencia’ conserva el valor de conocimiento adquirido por prueba sin sonar forzado.
- source_word: εὐτολμίας
  english_pob_choice: boldness
  chosen_spanish: valor
  alternatives_spanish:
  - audacia
  - atrevimiento
  - valentía
  lexicon: LSJ
  rationale: En este contexto militar, ‘valor’ comunica la disposición resuelta de los judíos sin cargar el tono negativo de ‘audacia’ ni debilitarlo a un simple ‘atrevimiento’. Se mantiene la fuerza de la reacción del rey ante su firmeza.
- source_word: κατεῖρασεν
  english_pob_choice: attacked
  chosen_spanish: asaltó
  alternatives_spanish:
  - atacó
  - asedió
  - arremetió contra
  lexicon: LSJ
  rationale: El verbo en este contexto apunta a acción hostil contra posiciones; ‘asaltó’ es natural en español militar y expresa mejor la agresión que una forma más vaga.
- source_word: διὰ μεθόδων
  english_pob_choice: by stratagems
  chosen_spanish: por estratagemas
  alternatives_spanish:
  - mediante estratagemas
  - con tácticas
  - por medios estratégicos
  lexicon: LSJ
  rationale: ‘Estratagemas’ reproduce bien el sentido de maniobras o recursos tácticos calculados, en continuidad con la decisión inglesa de no reducirlo a ‘methods’ genérico.
- source_word: τοὺς τόπους
  english_pob_choice: the places
  chosen_spanish: los lugares
  alternatives_spanish:
  - las posiciones
  - los sitios
  - los puestos
  lexicon: LSJ
  rationale: El griego dice literalmente ‘los lugares’. Aunque el contexto es militar, el texto no obliga a especificar ‘fortalezas’; por eso se conserva la referencia general con ‘los lugares’.
translation_notes:
  revision_awareness: 'La revisión inglesa reciente corrigió una lectura más interpretativa (‘tried to take the strongholds’) hacia una más literal (‘attacked the places’). La versión española sigue esa corrección: evita añadir ‘fortalezas’ y conserva la idea de asalto hostil con ‘asaltó los lugares’.'
  spanish_consistency_notes:
  - Se mantiene ‘rey’ sin especificación adicional, siguiendo el griego.
  - Se conserva el plural ‘los judíos’ y el sustantivo abstracto ‘valor’ para εὐτολμίας, evitando una sobreinterpretación moralizante.
  - No se introduce ‘Cristo’, ‘Mesías’ ni lenguaje doctrinal ajeno al versículo.
