translation:
  language: es
  text: 'Entonces les dirás[a]: «Yo estaba presentando mi súplica delante del rey, para que no me hiciera volver a la casa de Jonatán, a morir allí»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse más literalmente: «yo estaba poniendo mi súplica delante del rey». El hebreo usa un modismo: «hacer caer mi petición delante de» alguien, es decir, presentar una petición insistente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ
  english_pob_choice: Then you shall say
  chosen_spanish: Entonces dirás
  alternatives_spanish:
  - Y dirás
  - Luego dirás
  lexicon: HALOT
  rationale: La secuencia con waw más forma verbal funciona aquí como instrucción consecutiva; «Entonces» conserva el valor narrativo y exhortativo de la indicación sin sonar forzado en español.
- source_word: אֲלֵיהֶם
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a ellos mismos
  lexicon: HALOT
  rationale: El dativo clítico «les» expresa naturalmente el destinatario en español y evita una repetición pesada de la preposición.
- source_word: מַפִּיל אֲנִי תְחִנָּתִי לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: I was presenting my plea before the king
  chosen_spanish: yo estaba presentando mi súplica delante del rey
  alternatives_spanish:
  - yo estaba poniendo mi súplica delante del rey
  - yo estaba elevando mi petición ante el rey
  lexicon: HALOT
  rationale: Se conserva el valor idiomático del hebreo sin traducir mecánicamente «hacer caer». «Estaba presentando» reproduce el aspecto progresivo que el POB inglés decidió comunicar con pasado progresivo; «delante del rey» mantiene la imagen espacial/judicial de לִפְנֵי.
- source_word: תְחִנָּתִי
  english_pob_choice: my plea
  chosen_spanish: mi súplica
  alternatives_spanish:
  - mi plea
  - mi petición
  lexicon: HALOT
  rationale: «Súplica» conserva el matiz de ruego intenso y respetuoso. «Plea» sería comprensible, pero menos natural para un registro bíblico en español; «petición» es más neutra y menos urgente.
- source_word: לִפְנֵי הַמֶּלֶךְ
  english_pob_choice: before the king
  chosen_spanish: delante del rey
  alternatives_spanish:
  - ante el rey
  - en presencia del rey
  lexicon: HALOT
  rationale: «Delante del rey» reproduce bien la imagen hebrea y es plenamente inteligible en español bíblico contemporáneo. «Ante el rey» sería igualmente posible, pero algo más formal y menos visual.
- source_word: לְבִלְתִּי הֲשִׁיבֵנִי
  english_pob_choice: that he should not send me back
  chosen_spanish: para que no me hiciera volver
  alternatives_spanish:
  - para no hacerme volver
  - a fin de que no me devolviera
  lexicon: HALOT
  rationale: La construcción expresa el contenido final de la súplica. «Hiciera volver» transmite con precisión la idea causativa de הֲשִׁיבֵנִי, evitando el calco «devolviera» y manteniendo la referencia al agente implícito en el rey.
- source_word: בֵּית יְהוֹנָתָן
  english_pob_choice: the house of Jonathan
  chosen_spanish: la casa de Jonatán
  alternatives_spanish:
  - la casa de Jonathan
  - la casa de Yehonatán
  lexicon: HALOT
  rationale: Se vierte el nombre propio en su forma habitual en español, «Jonatán». «La casa de...» conserva la designación locativa fija del pasaje.
- source_word: לָמוּת שָׁם
  english_pob_choice: to die there
  chosen_spanish: para morir allí
  alternatives_spanish:
  - a morir allí
  - para que muriera allí
  lexicon: HALOT
  rationale: «Para morir allí» comunica con claridad el resultado temido de volver a ese lugar y se ajusta al español natural, sin añadir una interpretación de finalidad más fuerte que la del hebreo.
translation_notes:
  revision_awareness: El texto base de referencia presenta alta concordancia y no registra revisiones aplicadas; esta versión española sigue el sentido del hebreo y la solución auditada del POB inglés sin introducir cambios de contenido.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparece el nombre divino; aquí no aparece, por lo que no se usa.
  - Se conserva el nombre propio «Jonatán» con la forma usual en español.
  - El tono es bíblico y digno, pero con sintaxis natural para lectura pública.
  - No se emplea «SEÑOR» como sustituto del nombre divino porque el versículo no lo contiene.
