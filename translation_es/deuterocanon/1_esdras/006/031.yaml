base_translation:
  language: en
  yaml_path: translation/deuterocanon/1_esdras/006/031.yaml
  text: And issue an order that if anyone transgresses any part of what has been written and nullifies it[a], a beam shall be taken from his own property and he shall be hanged on it, and his possessions shall become royal property.
  footnotes:
  - marker: a
    text: Or, 'he shall be impaled on it' or 'suspended on it.' The Greek says 'hanged,' but the ancient punishment described may have involved impalement or public suspension on a wooden beam.
    reason: lexical_alternative
