translation:
  language: es
  text: Y fue escuchada la oración de ambos delante de la Gloria[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de la gloria de Dios» o «en presencia de la gloria». El griego no nombra explícitamente a Dios en esta cláusula.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσηκούσθη
  english_pob_choice: was heard
  chosen_spanish: fue escuchada
  alternatives_spanish:
  - fue oída
  - fue atendida
  lexicon: BDAG
  rationale: El pasivo de εἰσακούω indica que la oración llegó a ser escuchada favorablemente. «Fue escuchada» conserva la pasividad del griego y suena natural en español; «fue atendida» sugeriría más explícitamente una respuesta que el verbo no exige.
- source_word: προσευχὴ
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - plegaria
  - súplica
  lexicon: BDAG
  rationale: El sentido directo es una oración dirigida a Dios. «Oración» es el equivalente más natural y amplio en español; «plegaria» es posible pero más marcado, y «súplica» estrecha demasiado el término.
- source_word: ἀμφοτέρων
  english_pob_choice: of both
  chosen_spanish: de ambos
  alternatives_spanish:
  - de los dos
  lexicon: BDAG
  rationale: El genitivo se refiere a las dos personas ya mencionadas. «De ambos» es fiel, idiomático y mantiene la referencia conjunta sin añadir explicaciones.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - ante
  lexicon: BDAG
  rationale: La preposición expresa estar delante de o en la presencia de. «Delante de» es claro en español y conserva la relación espacial/reverencial sin sobreinterpretar.
- source_word: δόξης
  english_pob_choice: the Glory
  chosen_spanish: la Gloria
  alternatives_spanish:
  - la gloria
  - la presencia gloriosa
  lexicon: BDAG
  rationale: Se mantiene la referencia reverencial con mayúscula, siguiendo la decisión inglesa de capitalizar «Glory». «La Gloria» preserva el lenguaje indirecto del griego y evita explicitar «de Dios» sin base explícita en la cláusula.
theological_decisions:
- issue: Si δόξης debe volverse una referencia explícita a Dios
  english_pob_reading: before the Glory
  chosen_spanish_reading: delante de la Gloria
  alternative_spanish_readings:
  - delante de la gloria de Dios
  - en presencia de la gloria
  rationale: El griego no nombra a Dios en esta cláusula. Mantener «la Gloria» conserva la tensión reverencial y el carácter alusivo del texto, en vez de resolverlo con una expansión interpretativa.
  doctrine_reference: Preservar la indeterminación reverencial del texto fuente.
translation_notes:
  revision_awareness: La versión inglesa revisada capitaliza «Glory» para reflejar el uso reverencial probable de τῆς δόξης; la redacción española sigue esa decisión con «la Gloria», manteniendo además la ausencia explícita del nombre de Dios en la cláusula.
  spanish_consistency_notes:
  - Se mantuvo la forma pasiva «fue escuchada» para reflejar εἰσηκούσθη sin añadir una respuesta explícita.
  - «Oración» se eligió por naturalidad y amplitud semántica frente a alternativas más estrechas.
  - La mayúscula en «Gloria» conserva el matiz reverencial ya decidido en el audit trail inglés.
  - La nota al pie preserva la alternativa de lectura sin resolver la referencia implícita a Dios.
