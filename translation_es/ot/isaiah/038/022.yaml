revisions:
- from: 'Y Ezequías dijo[a]: «¿Cuál es la señal de que yo subiré a la casa de Yahvé?».'
  to: 'Y Ezequías dijo[a]: «¿Qué señal hay de que he de subir a la casa de Yahvé?»'
  rationale: Se ajusta la pregunta para reflejar más directamente מָה אֹות y para sonar más natural en español bíblico. «¿Qué señal hay…?» preserva mejor la simplicidad interrogativa del hebreo y corresponde bien a la alternativa ya reconocida en el audit trail inglés. «He de subir» mantiene un registro digno y futuro, sin la pesadez de «yo subiré». Se conserva «casa de Yahvé» conforme al proyecto y al hebreo בֵּית יְהוָה.
