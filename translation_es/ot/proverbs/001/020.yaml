review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del hebreo: mantiene la personificación singular de חָכְמוֹת como «la sabiduría», traduce los dos escenarios públicos con naturalidad («en la calle / en las plazas») y expresa bien el paralelo verbal («clama / alza su voz»). La única falla sustancial está en la nota: no preserva la alternativa léxica del inglés, porque repite prácticamente el texto principal en vez de ofrecer una opción distinta para תָּרֹנָּה.'
  spanish_quality_summary: 'El español principal es claro, natural y digno: «La sabiduría clama en la calle; en las plazas alza su voz». Suena bíblico sin arcaísmo excesivo. La puntuación y la sintaxis son correctas. La nota, en cambio, necesita reparación porque no aporta una alternativa real y además queda redundante.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «La sabiduría» conserva adecuadamente la personificación femenina; «clama» corresponde bien a תָּרֹנָּה; «alza su voz» sigue la revisión idiomática documentada para תִּתֵּן קוֹלָהּ.
  issues:
  - severity: medium
    issue: La nota al pie no preserva la alternativa léxica documentada en el audit trail inglés.
    rationale: 'La nota inglesa ofrece una alternativa distinta: «Wisdom calls out in the street...». La nota española actual repite esencialmente el texto principal («la sabiduría clama... alza su voz»), de modo que no cumple la función de registrar una variante significativa.'
  revised_spanish_text: La sabiduría clama en la calle[a]; en las plazas alza su voz.
  revised_footnotes:
  - marker: a
    text: 'O más idiomáticamente: «La sabiduría llama en la calle; en las plazas alza su voz».'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel al hebreo y natural en español. Solo se corrige la nota al pie para que refleje una alternativa léxica real a «clama», en línea con el audit trail inglés («calls out»), en vez de repetir el texto principal.
