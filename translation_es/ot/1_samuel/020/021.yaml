translation:
  language: es
  text: 'Y he aquí, yo enviaré al joven, diciendo: «Ve, busca las flechas». Si claramente le digo al joven: «He aquí, las flechas están de tu lado[a]; tómalas y ven», entonces hay paz para ti y no hay peligro, vive Yahvé[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las flechas están más acá de ti» o «las flechas están a este lado de ti». El hebreo indica que las flechas cayeron antes de pasar al acompañante, no más allá de él.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «vive Yahvé», fórmula de juramento que afirma la veracidad de lo dicho.'
    reason: cultural_note
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y mira
  - Y he aquí ahora
  - Y mira bien
  lexicon: HALOT
  rationale: La partícula deíctica introduce la siguiente acción con atención inmediata. «He aquí» preserva la fuerza exclamativa y formal del hebreo sin sonar artificial en español bíblico moderno.
- source_word: אֶשְׁלַח אֶת הַנַּעַר
  english_pob_choice: I will send the young man
  chosen_spanish: yo enviaré al joven
  alternatives_spanish:
  - yo enviaré al muchacho
  - yo enviaré al muchacho/siervo
  - yo mandaré al joven
  lexicon: HALOT
  rationale: נַעַר puede abarcar edad y condición de ayuda/servicio. «Joven» mantiene la amplitud semántica sin fijarlo innecesariamente como «siervo».
- source_word: לֵךְ מְצָא אֶת הַחִצִּים
  english_pob_choice: Go, find the arrows
  chosen_spanish: Ve, busca las flechas
  alternatives_spanish:
  - Ve, encuentra las flechas
  - Anda, busca las flechas
  - Ve, halla las flechas
  lexicon: HALOT
  rationale: «Busca» funciona naturalmente en español para la orden de localizar algo y comunica bien el movimiento de la señal. «Flechas» es el referente concreto del signo.
- source_word: אִם אָמֹר אֹמַר
  english_pob_choice: If I plainly say
  chosen_spanish: Si de hecho digo
  alternatives_spanish:
  - Si claramente digo
  - Si ciertamente digo
  - Si digo con toda claridad
  lexicon: HALOT
  rationale: La construcción de infinitivo absoluto más verbo finito intensifica la certeza o determinación. «De hecho» intenta reflejar esa fuerza enfática sin volverlo torpe.
- source_word: הִנֵּה הַחִצִּים מִמְּךָ וָהֵנָּה
  english_pob_choice: Behold, the arrows are on this side of you
  chosen_spanish: He aquí, las flechas están de tu lado
  alternatives_spanish:
  - He aquí, las flechas están a este lado de ti
  - He aquí, las flechas están cerca de ti
  - He aquí, las flechas están antes que tú
  lexicon: HALOT
  rationale: La frase señala que las flechas cayeron del lado cercano al mensajero/portador, no más allá de él. «De tu lado» expresa la señal direccional con naturalidad; el matiz espacial se aclara en la nota.
- source_word: קָחֶנּוּ
  english_pob_choice: take them
  chosen_spanish: tómalas
  alternatives_spanish:
  - recógelas
  - llévatelas
  - agárralas
  lexicon: HALOT
  rationale: El sufijo es singular formal pero el referente es plural. «Tómalas» conserva la relación directa con las flechas y el gesto de recogerlas.
- source_word: וָבֹאָה
  english_pob_choice: and come
  chosen_spanish: y ven
  alternatives_spanish:
  - y vuelve
  - y acércate
  - y regresa
  lexicon: HALOT
  rationale: El imperativo direccional pide el retorno del joven hacia el hablante. «Ven» es breve y fiel sin añadir elementos no explícitos.
- source_word: כִּי שָׁלוֹם לְךָ
  english_pob_choice: then there is peace for you
  chosen_spanish: entonces hay paz para ti
  alternatives_spanish:
  - entonces estás a salvo
  - entonces todo va bien para ti
  - entonces es paz para ti
  lexicon: HALOT
  rationale: «Shalom» conserva el sustantivo «paz», manteniendo la señal verbal; en contexto indica bienestar o seguridad, pero el español puede dejar esa implicación sin substituir el término.
- source_word: וְאֵין דָּבָר
  english_pob_choice: and no danger
  chosen_spanish: y no hay peligro
  alternatives_spanish:
  - y no hay nada
  - y no pasa nada
  - y no hay asunto
  lexicon: HALOT
  rationale: En este contexto דָּבָר apunta a una situación adversa o amenaza. «Peligro» expresa con claridad la ausencia de daño, como lectura contextual del hebreo.
- source_word: יְהוָה
  english_pob_choice: as the LORD lives
  chosen_spanish: por Yahvé vive
  alternatives_spanish:
  - vive Yahvé
  - como vive Yahvé
  - por la vida de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino con el término base del proyecto, «Yahvé». La fórmula de juramento se vuelve una equivalencia natural en español bíblico.
theological_decisions:
- issue: Fórmula de juramento con el nombre divino
  english_pob_reading: as the LORD lives
  chosen_spanish_reading: por Yahvé vive
  alternative_spanish_readings:
  - como vive Yahvé
  - vive Yahvé
  - por la vida de Yahvé
  rationale: El hebreo usa una fórmula juratoria estándar con el Tetragrámaton. En español, «por Yahvé vive» mantiene el juramento y el nombre divino sin ocultarlo bajo una sustitución litúrgica.
  doctrine_reference: 'DOCTRINE.md: יְהוָה / YHWH → Yahvé'
- issue: Sentido de שָׁלוֹם y וְאֵין דָּבָר en contexto
  english_pob_reading: there is peace for you and no danger
  chosen_spanish_reading: hay paz para ti y no hay peligro
  alternative_spanish_readings:
  - estás a salvo y no hay peligro
  - todo está bien para ti y no hay problema
  - hay bienestar para ti y no hay daño
  rationale: El texto usa «paz» como señal de seguridad, y «no hay peligro» como aclaración contextual de דָּבָר. Se conserva la tensión entre el término hebreo general y su sentido práctico en la escena.
  doctrine_reference: HALOT; contexto narrativo de 1 Samuel 20:21-22
- issue: Valor de נַעַר
  english_pob_reading: the young man
  chosen_spanish_reading: el joven
  alternative_spanish_readings:
  - el muchacho
  - el muchacho/siervo
  - el ayudante
  rationale: El término hebreo puede abarcar juventud y función de asistente. «Joven» mantiene esa amplitud sin imponer una lectura servil no explicitada en el verso.
  doctrine_reference: HALOT
translation_notes:
  revision_awareness: La redacción sigue la revisión más formal del audit trail inglés, que favoreció «behold» y «take them» por mayor correspondencia léxica. En español, se mantuvo un registro bíblico digno sin caer en arcaísmo excesivo, conservando también la intensificación de la construcción condicional enfática.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה según el criterio del proyecto.
  - Se traduce נַעַר como «joven» por su amplitud semántica en este contexto narrativo.
  - Se conserva «paz» como traducción principal de שָׁלוֹם, con aclaración contextual de seguridad en la nota/decisión.
  - Se emplea «peligro» para וְאֵין דָּבָר por el sentido contextual de ausencia de amenaza.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto donde corresponden.
