revisions:
- from: Así tomaron las provisiones del pueblo en sus manos[a], junto con sus trompetas. Y él despidió a todo hombre de Israel, cada uno a su tienda; pero retuvo a los trescientos hombres. Y el campamento de Madián estaba debajo de él en el valle.
  to: Así tomaron las provisiones del pueblo en sus manos[a], junto con sus trompetas. Y él envió a todo hombre de Israel, cada uno a su tienda; pero retuvo a los trescientos hombres. Y el campamento de Madián estaba más abajo que él, en el valle.
  rationale: Se ajusta שִׁלַּח a «envió» para seguir más de cerca la decisión documentada del POB y la forma básica del hebreo. También se mejora la naturalidad topográfica de «מִתַּחַת לוֹ» con «más abajo que él», que suena idiomático en español sin perder el sentido espacial. No se requieren cambios adicionales.
