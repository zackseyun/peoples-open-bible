translation:
  language: es
  text: Bienaventurados los que estén vivos en aquellos días[a], al ver las cosas buenas de Israel en la asamblea de las tribus. ¡Que Dios lo haga realidad!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «..., las cuales Dios hará realidad» o «..., que Dios hará realidad».'
    reason: Preserva la alternativa de la revisión previa documentada en el audit trail inglés, donde la cláusula final se entendía como subordinada en vez de una exclamación volitiva independiente.
lexical_decisions:
- source_word: μακάριοι
  english_pob_choice: Blessed are
  chosen_spanish: Bienaventurados
  alternatives_spanish:
  - Dichosos
  - Felices
  lexicon: BDAG / LSJ
  rationale: μακάριοι es el término bíblico clásico de bienaventuranza; en español, «bienaventurados» conserva el tono elevado, litúrgico y escatológico mejor que «felices» o «dichosos».
- source_word: οἱ γενόμενοι ἐν ταῖς ἡμέραις ἐκείναις
  english_pob_choice: those who are alive in those days
  chosen_spanish: los que estén vivos en aquellos días
  alternatives_spanish:
  - los que nacieron en aquellos días
  - los que lleguen a existir en aquellos días
  lexicon: BDAG / LSJ
  rationale: γενόμενοι puede ser literalmente «los que llegaron a ser», pero en este contexto beatífico apunta idiomáticamente a quienes alcanzarán a vivir ese tiempo futuro. «Los que estén vivos» expresa esa idea de manera natural en español sin perder el matiz temporal.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para contemplar
  - para mirar
  lexicon: BDAG / LSJ
  rationale: El infinitivo marca el propósito o experiencia de los bienaventurados. «Para ver» es directo y suficiente, y no añade solemnidad innecesaria.
- source_word: τὰ ἀγαθὰ Ἰσραήλ
  english_pob_choice: the good things of Israel
  chosen_spanish: las cosas buenas de Israel
  alternatives_spanish:
  - los bienes de Israel
  - las bendiciones de Israel
  lexicon: BDAG / LSJ
  rationale: τὰ ἀγαθά denota bienes, cosas buenas o beneficios. Mantener «las cosas buenas de Israel» conserva la cercanía al griego y deja abierta la relación genitiva, sin convertirlo en una abstracción interpretativa como «bendiciones».
- source_word: ἐν συναγωγῇ φυλῶν
  english_pob_choice: in the assembly of the tribes
  chosen_spanish: en la asamblea de las tribus
  alternatives_spanish:
  - en el reunir de las tribus
  - en la congregación de las tribus
  lexicon: BDAG / LSJ
  rationale: συναγωγή aquí refiere a una reunión o asamblea. «Asamblea» suena formal y claro en español, y conserva la imagen de las tribus de Israel reunidas.
- source_word: ποιῆσαι ὁ θεός
  english_pob_choice: May God bring it to pass!
  chosen_spanish: ¡Que Dios lo haga acontecer!
  alternatives_spanish:
  - ¡Que Dios lo haga suceder!
  - ¡Que Dios lo realice!
  lexicon: BDAG / LSJ
  rationale: La clausula final es un cierre volitivo u oración de deseo, no una subordinada explicativa. «¡Que Dios lo haga acontecer!» preserva el carácter de súplica y el sentido de cumplimiento divino sin reducirlo a una paráfrasis demasiado libre.
theological_decisions:
- issue: Función de la clausula final divina
  english_pob_reading: May God bring it to pass!
  chosen_spanish_reading: ¡Que Dios lo haga acontecer!
  alternative_spanish_readings:
  - ¡Que Dios lo haga suceder!
  - ¡Que Dios lo realice!
  rationale: La puntuación griega y el paralelo con el verso siguiente favorecen entender una exclamación volitiva independiente. La traducción en español debe sonar a oración o deseo, no a explicación secundaria.
  doctrine_reference: Prayers of petition / divine agency
- issue: Sujeto implícito de la beatitud
  english_pob_reading: those who are alive in those days
  chosen_spanish_reading: los que estén vivos en aquellos días
  alternative_spanish_readings:
  - los que vivan en aquellos días
  - los nacidos en aquellos días
  rationale: El griego apunta a quienes alcanzan a ver ese tiempo futuro. «Estén vivos» expresa con precisión la idea de sobrevivir hasta ese momento sin imponer que el foco sea el nacimiento.
  doctrine_reference: Eschatological expectation
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión que cambió la última cláusula de una lectura subordinada («which God will bring about») a una exclamación volitiva independiente («May God bring it to pass!»), así como la preferencia de la revisión por «assembly» para συναγωγῇ. La redacción española sigue esa línea y evita convertir la clausula final en una relativa.
  spanish_consistency_notes:
  - Se mantiene «Bienaventurados» para μακάριοι por coherencia con el registro bíblico.
  - Se evita «SEÑOR» porque el texto griego usa ὁ θεός, que en la política del proyecto corresponde a «Dios».
  - Se conserva la imagen concreta de «las cosas buenas de Israel» en vez de una abstracción más interpretativa.
  - «Asamblea» se usa para συναγωγῇ por consistencia terminológica y por su adecuación formal al contexto.
