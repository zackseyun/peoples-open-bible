revisions:
- from: Y sucederá que cualquiera que salga por las puertas de tu casa hacia afuera, su sangre caerá sobre su propia cabeza[a], y nosotros quedaremos inocentes[b]. Pero todo el que esté contigo en la casa, su sangre caerá sobre nuestra cabeza, si le ponen una mano encima.
  to: Y sucederá que cualquiera que salga desde las puertas de tu casa hacia afuera, su sangre estará sobre su propia cabeza[a], y nosotros quedaremos inocentes. Pero todo el que esté contigo en la casa, su sangre estará sobre nuestras cabezas, si se le pone la mano encima[b].
  rationale: Se corrigió el modismo jurídico de culpa de sangre para reflejar el hebreo y la decisión del POB inglés ('estará sobre' en lugar de 'caerá sobre'), se restauró el plural 'nuestras cabezas', y se movió la nota [b] al modismo final que realmente explica. También se suavizó levemente la expresión espacial para una lectura más natural sin perder la imagen concreta del original.
  reviewer_model: gpt-5.4
