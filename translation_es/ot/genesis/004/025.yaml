    text: 'Hebreo: «conoció»; usado con la esposa, funciona como eufemismo para relaciones sexuales y preserva el tono del original.'
    reason: lexical_alternative
  - marker: b
    text: El hebreo hace un juego de palabras entre «Set» y el verbo «ha puesto/establecido».
    reason: lexical_alternative
  revision_rationale: Se corrige «me ha dado» a «ha puesto» para reflejar con mayor fidelidad שָׁת y preservar en el texto principal el juego de palabras documentado con «Set». Se reemplaza «linaje» por «descendencia» para representar mejor זֶרַע como prole/offspring en el contexto de reemplazo de Abel. Se simplifican las notas para evitar redundancia y mantener el enfoque en las decisiones realmente significativas.
