translation:
  language: es
  text: y cinco barras para las tablas del segundo lado[a] del tabernáculo, y cinco barras para las tablas del lado del tabernáculo en la parte trasera, hacia el occidente[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el otro lado del tabernáculo» para «el segundo lado del tabernáculo».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «en la parte trasera, hacia el occidente».
    reason: lexical_alternative
lexical_decisions:
- source_word: בְרִיחִם
  english_pob_choice: bars
  chosen_spanish: barras
  alternatives_spanish:
  - travesaños
  - varas
  lexicon: HALOT
  rationale: En el contexto de la construcción del tabernáculo, בְרִיחַ designa las piezas horizontales que unían las tablas. «Barras» reproduce bien la imagen técnica y es natural en español; «travesaños» es posible, pero algo más interpretativo, y «varas» suena menos preciso aquí.
- source_word: קַרְשֵׁי
  english_pob_choice: boards
  chosen_spanish: tablas
  alternatives_spanish:
  - tablones
  - paneles
  lexicon: HALOT
  rationale: El hebreo קֶרֶשׁ en Éxodo 26 se refiere a los elementos estructurales de madera del tabernáculo. «Tablas» comunica el objeto de forma clara y tradicional en español bíblico; «tablones» es viable, pero suele sonar más pesado, y «paneles» moderniza demasiado la imagen.
- source_word: צֶלַע
  english_pob_choice: side
  chosen_spanish: lado
  alternatives_spanish:
  - flanco
  lexicon: HALOT
  rationale: Aquí צֶלַע describe el costado arquitectónico del tabernáculo. «Lado» es el equivalente más natural y fiel; «flanco» mantiene la idea, pero en español suena más literal o figurado de lo necesario.
- source_word: הַשֵּׁנִית
  english_pob_choice: the second
  chosen_spanish: el segundo
  alternatives_spanish:
  - el otro
  lexicon: HALOT
  rationale: La forma hebrea significa literalmente «el segundo». Conservé esa literalidad en «el segundo lado» para no borrar la tensión entre la palabra hebrea y el hecho contextual de que se trata del lado opuesto; «el otro» sería más fluido, pero menos fuente-guiado.
- source_word: מִּשְׁכָּן
  english_pob_choice: tabernacle
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - morada
  - habitáculo sagrado
  lexicon: HALOT
  rationale: En Éxodo, מִשְׁכָּן ya funciona como el nombre establecido del santuario portátil. «Tabernáculo» es el equivalente consagrado y claro en español; «morada» explicita la raíz, pero pierde la designación técnica del texto.
- source_word: לַיַּרְכָתַיִם
  english_pob_choice: at the rear
  chosen_spanish: en la parte trasera
  alternatives_spanish:
  - en el extremo posterior
  - al fondo
  lexicon: HALOT
  rationale: יַרְכָתַיִם indica la zona más posterior o recóndita. «En la parte trasera» comunica bien el sentido arquitectónico en español sin sobrecargar la frase; «al fondo» funciona, pero es menos específico, y «en el extremo posterior» resulta más técnico.
- source_word: יָמָּה
  english_pob_choice: westward
  chosen_spanish: hacia el occidente
  alternatives_spanish:
  - hacia el oeste
  - al poniente
  lexicon: HALOT
  rationale: El adverbio direccional hebreo señala el oeste. «Hacia el occidente» conserva un registro bíblico digno y preciso; «hacia el oeste» sería perfectamente claro, pero algo más coloquial, y «al poniente» es más tradicional pero menos uniforme en español actual.
- source_word: וַחֲמִשָּׁה ... וַחֲמִשָּׁה
  english_pob_choice: and five ... and five
  chosen_spanish: y cinco ... y cinco
  alternatives_spanish:
  - cinco ... y cinco
  lexicon: HALOT
  rationale: Conservé la repetición coordinada para reflejar la cadencia del hebreo y la estructura enumerativa de las instrucciones de construcción. La segunda conjunción no se elidió para mantener la correspondencia formal del paralelo.
theological_decisions:
- issue: Orientación espacial del tabernáculo y traducción de יָמָּה
  english_pob_reading: Literally 'to the rear, westward.'
  chosen_spanish_reading: «en la parte trasera, hacia el occidente»
  alternative_spanish_readings:
  - «al fondo, hacia el oeste»
  - «en la parte trasera, al occidente»
  rationale: 'No hay una decisión doctrinal, pero sí una decisión exegética de orientación: el hebreo combina un término de posterioridad espacial con una dirección cardinal. La traducción conserva ambas dimensiones sin fusionarlas ni interpretarlas más allá del texto.'
  doctrine_reference: Exodus 26:27; lexical/architectural context
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores al último pase; el texto inglés final muestra alta concordancia y no requiere ajustes adicionales. La versión española sigue de cerca la sintaxis hebrea y la auditoría inglesa, preservando la repetición de «y cinco» y la distinción entre «el segundo lado» y «en la parte trasera, hacia el occidente».
  spanish_consistency_notes:
  - Se usa «tabernáculo» de manera consistente para מִשְׁכָּן.
  - Se usa «tablas» para קַרְשֵׁי, coherente con la arquitectura del pasaje.
  - Se mantiene el paralelismo numérico «y cinco ... y cinco» para reflejar la coordinación hebrea.
  - Se conserva «occidente» como registro bíblico claro y uniforme con la dirección cardinal del texto.
