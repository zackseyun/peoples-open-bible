    text: «Desgracia» aquí se refiere a calamidad o infortunio que había golpeado a su casa, no a mal moral.
    reason: lexical_alternative
  - marker: c
    text: 'O: «le puso nombre Bería».'
    reason: alternative_reading
  revision_rationale: 'Se corrigieron los anclajes y contenidos de las notas para alinearlos con el audit trail inglés: las alternativas ahora acompañan la fórmula de nombrar junto a «Bería», y la nota explicativa recae sobre «desgracia». También se ajustó la cláusula final a «había estado en su casa» para reflejar más de cerca el hebreo הָיְתָה בְּבֵיתוֹ y la revisión inglesa documentada.'
