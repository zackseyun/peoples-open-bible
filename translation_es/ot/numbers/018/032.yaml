translation:
  language: es
  text: Y no cargarán con culpa por ello cuando aparten de ella su mejor parte[a]. No profanarán las cosas santas de los hijos de Israel[b], y no morirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘su grasa’ o ‘su parte más selecta’. El hebreo חֶלֶב literalmente significa ‘grasa’, pero en contextos de ofrenda suele referirse idiomáticamente a la porción más rica o mejor.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: ‘los hijos de Israel’, una expresión formal y habitual para el pueblo de Israel.'
    reason: lexical_alternative
lexical_decisions:
- source_word: תִשְׂאוּ ... חֵטְא
  english_pob_choice: you will bear no sin
  chosen_spanish: no llevarán culpa
  alternatives_spanish:
  - no llevarán pecado
  - no incurrirán en culpa
  - no cargarán con pecado
  lexicon: HALOT
  rationale: נשא con חטא expresa asumir o cargar culpa. En español, 'llevar culpa' comunica la carga de responsabilidad sin volver la frase extraña. 'Pecado' sería más literal, pero aquí el sentido es de culpabilidad/incurrencia en falta.
- source_word: עָלָיו
  english_pob_choice: because of it
  chosen_spanish: por ello
  alternatives_spanish:
  - a causa de ello
  - por causa de ello
  - respecto de ello
  lexicon: HALOT
  rationale: La preposición על con sufijo remite a la porción ofrecida y marca relación causal o de responsabilidad. 'Por ello' es natural en español y conserva la idea de que la culpa no recaerá sobre ellos a causa de esa acción.
- source_word: בַּהֲרִימְכֶם
  english_pob_choice: when you lift up
  chosen_spanish: cuando levanten
  alternatives_spanish:
  - cuando eleven
  - cuando presenten
  - cuando ofrezcan
  lexicon: HALOT
  rationale: El Hiphil de רום conserva la imagen de levantar/elevar una porción como contribución. 'Levanten' mantiene esa metáfora y funciona con el plural directo del mandato.
- source_word: חֶלְבּוֹ
  english_pob_choice: its best part
  chosen_spanish: su mejor parte
  alternatives_spanish:
  - su grasa
  - su parte más selecta
  - su parte escogida
  lexicon: HALOT
  rationale: Aunque literalmente significa 'grasa', en contextos sacrificiales suele designar la porción más rica o selecta. Aquí el referente es una porción de tributo/ofrenda, así que 'su mejor parte' preserva el valor idiomático sin inducir a pensar solo en grasa animal.
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de ello
  alternatives_spanish:
  - de él
  - desde eso
  - de la misma
  lexicon: HALOT
  rationale: El sufijo retoma la porción de la que se separa la mejor parte. 'De ello' es neutro y evita forzar género donde el antecedente puede sentirse colectivo o abstracto en español.
- source_word: קָדְשֵׁי בְנֵי יִשְׂרָאֵל
  english_pob_choice: the holy things of the sons of Israel
  chosen_spanish: las cosas santas de los hijos de Israel
  alternatives_spanish:
  - las ofrendas santas de los israelitas
  - las cosas consagradas de Israel
  - los bienes santos de los hijos de Israel
  lexicon: HALOT
  rationale: קָדְשֵׁי abarca cosas santas o consagradas, y el hebreo conserva la forma formal בני ישראל. 'Cosas santas' mantiene la amplitud semántica mejor que 'ofrendas' en este punto, donde el texto no restringe el término a un solo tipo de sacrificio.
- source_word: תְחַלְּל֖וּ
  english_pob_choice: you shall not profane
  chosen_spanish: no profanarán
  alternatives_spanish:
  - no profanarán
  - no profanarán/contaminarán
  - no tratarán como común
  lexicon: HALOT
  rationale: חלל en Piel expresa profanar, desacralizar o tratar como común lo consagrado. 'Profanar' conserva la oposición sagrado/común central al versículo y es idiomático en español bíblico moderno.
- source_word: וְלֹא תָמֽוּתוּ
  english_pob_choice: and you shall not die
  chosen_spanish: y no morirán
  alternatives_spanish:
  - y no morirán
  - para que no mueran
  - y no perecerán
  lexicon: HALOT
  rationale: La coordinación final del hebreo es directa. En español, 'y no morirán' sigue de cerca la forma y mantiene el tono legal-admonitorio sin introducir finalidad adicional.
theological_decisions:
- issue: Rendering בני ישראל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos/descendientes de Israel
  - los hijos de Jacob
  rationale: Se conserva la expresión covenantal y masculina plural del hebreo, que la POB en inglés decidió mantener de forma formal. 'Hijos de Israel' es comprensible en español y respeta el paralelismo ceremonial del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Idiomatic sense of חלב in cultic context
  english_pob_reading: its best part
  chosen_spanish_reading: su mejor parte
  alternative_spanish_readings:
  - su grasa
  - su parte más selecta
  - su porción escogida
  rationale: El contexto trata de separar la porción de tributo/ofrenda que corresponde a Yahvé. 'Su mejor parte' preserva la idea de excelencia/lo más rico sin fijar indebidamente el referente en grasa animal, que en español podría sonar demasiado literal o confuso.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Final warning clause
  english_pob_reading: and you shall not die
  chosen_spanish_reading: y no morirán
  alternative_spanish_readings:
  - para que no mueran
  - y no moriréis
  - y no habrán de morir
  rationale: La revisión inglesa rechazó una finalidad explícita ('so that'). El español sigue la coordinación directa del hebreo y evita suavizar el tono de advertencia/legalidad del mandato.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del inglés POB, que prefirió una coordinación directa en la cláusula final (‘and you shall not die’) en lugar de una finalidad explícita. También conserva la decisión lexical auditada de traducir חֶלֶב con un valor idiomático (‘su mejor parte’) y no como ‘grasa’ en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término de la serie POB para el nombre divino, aunque este versículo no lo contiene explícitamente.
  - '''Hijos de Israel'' se conserva como expresión formal; en notas se reconoce su valor etnónimo establecido.'
  - '''Profanar'' se usa de manera consistente para חלל en contextos de santidad ritual.'
  - La cláusula final sigue la coordinación simple del hebreo para no introducir una relación de propósito que no está explícita en la revisión auditada.
