translation:
  language: es
  text: Yo también[a], armado con noble virtud, seré puesto a reposar con mis hermanos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con nobleza y bondad» o «con excelencia moral»; el término griego denota carácter moral noble.'
    reason: lexical_alternative
  - marker: b
