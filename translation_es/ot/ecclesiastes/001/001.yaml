translation:
  language: es
  text: Las palabras de Qohelet[a], hijo de David, rey en Jerusalén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Qohelet es la designación hebrea del hablante; puede significar «el Maestro», «el Predicador» o alguien relacionado con la asamblea.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: The words of
  chosen_spanish: Las palabras de
  alternatives_spanish:
  - Los dichos de
  lexicon: HALOT
  rationale: El constructo plural de דָּבָר introduce el contenido del libro. 'Palabras' es la equivalencia más directa y natural en español; 'dichos' es posible, pero sugiere más una colección de sentencias sueltas.
- source_word: קֹהֶלֶת
  english_pob_choice: Qoheleth
  chosen_spanish: Qohelet
  alternatives_spanish:
  - el Maestro
  - el Predicador
  - el Asamblador
  lexicon: HALOT
  rationale: Se preserva la designación hebrea transliterada para no resolver prematuramente su matiz semántico. En español, 'Qohelet' mantiene la forma del nombre/título y deja abierta la tensión interpretativa documentada en la tradición de traducción.
- source_word: בֶּן דָּוִד
  english_pob_choice: son of David
  chosen_spanish: hijo de David
  lexicon: HALOT
  rationale: La expresión filial se traduce de manera directa y natural. 'Hijo de David' conserva la posible resonancia real sin añadir interpretación.
- source_word: מֶלֶךְ
  english_pob_choice: king
  chosen_spanish: rey
  alternatives_spanish:
  - monarca
  lexicon: HALOT
  rationale: '''Rey'' es la equivalencia estándar y más fiel de מֶלֶךְ. ''Monarca'' sería más abstracto y menos directo.'
- source_word: בִּירוּשָׁלִָם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - en la ciudad de Jerusalén
  lexicon: HALOT
  rationale: La preposición locativa ב se rinde con 'en'. 'En Jerusalén' es la forma natural y exacta en español.
theological_decisions:
- issue: Tratamiento de קֹהֶלֶת como título o nombre transliterado
  english_pob_reading: Transliterate as 'Qoheleth' in the main text
  chosen_spanish_reading: Transliterar como 'Qohelet' en el texto principal
  alternative_spanish_readings:
  - el Maestro
  - el Predicador
  rationale: El término hebreo es debatido y posee valor literario-teológico propio. Mantener la transliteración preserva la ambigüedad de la fuente y evita fijar una interpretación que el texto no obliga a resolver aquí.
  doctrine_reference: Translation philosophy §§2–3
translation_notes:
  revision_awareness: No hay revisiones aplicadas; el registro inglés más reciente indica que no se requieren cambios.
  spanish_consistency_notes:
  - Se usa 'Qohelet' transliterado para mantener la misma estrategia de preservación de ambigüedad que la edición inglesa.
  - Se prefiere 'rey' y 'en Jerusalén' por ser equivalencias directas y naturales del hebreo.
  - La nota conserva las principales alternativas interpretativas documentadas en el audit trail inglés.
