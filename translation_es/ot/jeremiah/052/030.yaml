base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/052/030.yaml
  text: In the twenty-third year of Nebuchadnezzar[a], Nebuzaradan the captain of the guard carried away 745 Judeans[c][b]. All the persons were 4,600.
  footnotes:
  - marker: a
    text: Or “took into exile” or “deported.” The Hebrew verb means to cause to go into exile.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “souls” (נֶפֶשׁ) in both counts; here it is an idiom for persons.
    reason: lexical_alternative
  - marker: c
    text: The total of 4,600 summarizes the deportees listed in verses 28–30.
    reason: cross_reference
