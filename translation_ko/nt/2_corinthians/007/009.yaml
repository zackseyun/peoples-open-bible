translation:
  language: ko
  text: 이제 내가 기뻐하는 것은 여러분이 슬퍼했기 때문이 아니라, 여러분이 슬픔으로 회개에 이르렀기 때문입니다. 이는 여러분이 하나님께서 원하시는 방식으로 슬퍼했기에, 우리로 인해 어떤 손해도 입지 않게 하려는 것이었습니다.
