    text: 'O: «cuando se hable de ella». El hebreo puede referirse de manera general a que se hable acerca de ella, aunque en el contexto probablemente alude a negociaciones matrimoniales.'
    reason: alternative_reading
  revision_rationale: 'Se corrige la última cláusula para seguir la decisión principal auditada por la POB inglesa: el sentido contextual más probable es matrimonial (''spoken for''), mientras que la lectura más amplia (''spoken about'') se conserva en nota. También se mueve el marcador de nota al segmento pertinente y se mejora la naturalidad del español con ''el día en que''.'
