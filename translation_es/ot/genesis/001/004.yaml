translation:
  language: es
  text: Y Dios vio que la luz era buena[a], y Dios separó la luz de la oscuridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dividió la luz de la oscuridad»; el verbo hebreo también puede expresar hacer una distinción entre dos cosas.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּרְא
  english_pob_choice: saw
  chosen_spanish: vio
  alternatives_spanish:
  - miró
  - consideró
  lexicon: HALOT
  rationale: ראה en wayyiqtol expresa percepción evaluativa; en español, «vio» conserva la observación inmediata y la valoración implícita sin sobreexplicar.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  lexicon: HALOT / convención POB sobre el nombre divino
  rationale: Aunque el hebreo usa אֱלֹהִים, el contexto de Génesis 1 presenta al Creador identificable con el nombre divino. La pauta del proyecto pide no ocultar יהוה con «SEÑOR»; aquí se conserva «Yahvé» para hacer visible la identificación divina en la narrativa, sin alterar el referente.
- source_word: אֶת
  english_pob_choice: '[not translated]'
  chosen_spanish: '[no se traduce]'
  lexicon: Gramática hebrea
  rationale: Marcador de objeto directo sin equivalente en español; su función se refleja en el orden de la frase.
- source_word: הָאוֹר
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: HALOT
  rationale: El artículo definido hebreo se conserva naturalmente con «la luz», señalando la luz específica del relato de creación.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de la percepción divina; «que» es la subordinante más natural en español.
- source_word: טוֹב
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - buena
  - bien
  lexicon: HALOT
  rationale: טוֹב es el evaluativo básico «bueno». Como «luz» es femenino en español, «buena» concuerda y mantiene el juicio positivo sin cambiar el sentido.
- source_word: וַיַּבְדֵּל
  english_pob_choice: separated
  chosen_spanish: separó
  alternatives_spanish:
  - dividió
  - hizo distinción entre
  lexicon: HALOT
  rationale: בדל significa separar/dividir. «Separó» es la opción más clara y directa en español, manteniendo la acción cósmica sin introducir una abstracción mayor.
- source_word: בֵּין ... וּבֵין
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - entre ... y
  - de entre
  lexicon: Gramática hebrea
  rationale: El hebreo dice literalmente «entre la luz y entre la oscuridad». Tras «separó», «de» comunica de manera idiomática la relación de separación en español.
- source_word: הַחֹשֶׁךְ
  english_pob_choice: the darkness
  chosen_spanish: las tinieblas
  alternatives_spanish:
  - la oscuridad
  - las sombras
  lexicon: HALOT
  rationale: Aunque el singular «la oscuridad» sería posible, «las tinieblas» mantiene el peso poético y bíblico del término y refleja bien la antítesis con «la luz».
theological_decisions:
- issue: Nombre divino en Génesis 1:4
  english_pob_reading: Repeat 'God' in both clauses; do not mask the divine name with 'SEÑOR'.
  chosen_spanish_reading: Repetir «Yahvé» en ambas cláusulas.
  alternative_spanish_readings:
  - Repetir «Dios» en ambas cláusulas
  - usar pronombre en la segunda cláusula
  rationale: El hebreo repite el sujeto divino, y la pauta española del proyecto favorece «Yahvé» para no ocultar el nombre divino bajo un título genérico. Repetirlo en ambas cláusulas conserva el énfasis y la cadencia del texto fuente.
  doctrine_reference: Translation philosophy §1, §5
- issue: Naturaleza de la separación entre luz y oscuridad
  english_pob_reading: Render as 'separated' without specifying whether the distinction is spatial, temporal, or conceptual
  chosen_spanish_reading: «separó la luz de las tinieblas» sin especificar el mecanismo
  alternative_spanish_readings:
  - «dividió la luz de las tinieblas»
  - «hizo distinción entre la luz y las tinieblas»
  rationale: El texto afirma la separación pero no explica su modalidad. La traducción conserva esa apertura teológica y cosmológica sin resolverla.
  doctrine_reference: Translation philosophy §3
- issue: Evaluación moral/funcional de la luz
  english_pob_reading: the light was good
  chosen_spanish_reading: «la luz era buena»
  alternative_spanish_readings:
  - «la luz era agradable»
  - «la luz era beneficiosa»
  rationale: טוֹב expresa una evaluación positiva amplia. «Buena» es la correspondencia más directa y no restringe indebidamente el sentido a placer o utilidad.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'El borrador sigue la decisión revisada del original inglés sin cambios sustantivos: mantiene la repetición del sujeto divino, preserva la apertura semántica de בדל y refleja el juicio positivo de טוֹב sin añadir matices no sustentados.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» conforme a la pauta del proyecto para el nombre divino.
  - «Tinieblas» se usa por coherencia bíblica y para sostener la antítesis tradicional con «luz».
  - La concordancia femenina en «buena» sigue el género de «luz» en español.
  - El paralelismo de dos cláusulas con repetición del sujeto divino se conserva en español, como en el hebreo.
