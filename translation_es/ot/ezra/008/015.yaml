  rationale: Se ajusta «junto al río» a «al río» para reflejar con mayor precisión la preposición hebrea אֶל y evitar una interpretación espacial añadida. También se recoloca «allí» al final de la última cláusula para una sintaxis española más natural sin alterar el sentido. Se conservan las notas léxicas existentes porque siguen siendo correctas y útiles.
