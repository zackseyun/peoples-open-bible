translation:
  text: Until the coming of the God of righteousness, to give Jacob rest in peace,
    and all the nations. And he will preserve the might of my kingdom forever; for
    the Lord swore to me by an oath not to blot out the kingdom. Much grief is mine,
    my children, because of the sexual immoralities and sorceries that you will do
    in the kingdom, following ventriloquists, omens, and deceiving demons.
