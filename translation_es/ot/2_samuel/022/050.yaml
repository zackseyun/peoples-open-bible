translation:
  language: es
  text: Por tanto, te alabaré[a] entre las naciones, Yahvé, y cantaré alabanzas a tu nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». El texto principal sigue la convención del proyecto de rendir el nombre divino como «Yahvé».'
    reason: alternative_reading
lexical_decisions:
- source_word: עַל כֵּן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  - Por esta razón
  lexicon: HALOT
  rationale: La expresión introduce una conclusión o resultado del acto previo de rescate. "Por tanto" conserva bien la fuerza inferencial y suena natural en español bíblico contemporáneo.
- source_word: אוֹדְךָ
  english_pob_choice: I will praise you
  chosen_spanish: te alabaré
  alternatives_spanish:
  - te daré gracias
  - te confesaré en alabanza
  lexicon: HALOT
  rationale: El verbo hifil de ידה puede implicar dar gracias o alabar. En este paralelismo con "cantaré alabanzas", "te alabaré" comunica mejor el sentido de culto y mantiene la correspondencia poética sin volverlo meramente una acción de gratitud.
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: HALOT
  rationale: Se sigue la convención del proyecto de traducir el tetragrámaton como "Yahvé" en el texto principal, preservando el nombre propio divino en lugar de sustituirlo por un título.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - entre los gentiles
  lexicon: HALOT
  rationale: '"Naciones" es la forma más directa y natural en español para גּוֹיִם en este contexto amplio e internacional. "Gentiles" introduciría asociaciones posteriores que el hebreo no exige.'
- source_word: וּלְשִׁמְךָ
  english_pob_choice: to your name
  chosen_spanish: a tu nombre
  alternatives_spanish:
  - para tu nombre
  - por tu nombre
  lexicon: HALOT
  rationale: Aunque el giro hebreo apunta literalmente a "tu nombre", en español la construcción natural con "cantar alabanzas" es "a tu nombre". Conserva la referencia al nombre como reputación e identidad revelada.
- source_word: אֲזַמֵּר
  english_pob_choice: I will sing praise
  chosen_spanish: cantaré alabanzas
  alternatives_spanish:
  - cantaré
  - haré música de alabanza
  lexicon: HALOT
  rationale: El piel de זמר expresa hacer música o cantar alabanzas. "Cantaré alabanzas" transmite bien el matiz de adoración y mantiene el paralelismo con "te alabaré".
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: O Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - el SEÑOR
  rationale: El texto hebreo usa directamente el tetragrámaton. La lectura española sigue la decisión del proyecto de preservar el nombre divino como "Yahvé", evitando la sustitución tradicional por un título genérico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: La revisión más reciente no requirió cambios; el cotejo indicó alto acuerdo y ausencia de problemas. Esta redacción española mantiene la lectura del texto hebreo y la decisión doctrinal vigente para el nombre divino.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el tetragrámaton, conforme al estándar del proyecto.
  - Se prefiere un español poético claro y natural, sin diluir el paralelismo entre alabar y cantar alabanzas.
  - «Naciones» conserva el alcance amplio de גּוֹיִם sin cargar el término con matices posteriores.
