translation:
  language: es
  text: El torrente de Quisón los barrió—el torrente antiguo[a], el torrente de Quisón. ¡Marcha, alma mía[b], con fuerza!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el torrente de antaño» o «el torrente primigenio» para «el torrente antiguo». El hebreo קְדוּמִים puede llevar el sentido de antigüedad, y algunos oyen una descripción poética intensificada más que una simple etiqueta cronológica.
    reason: lexical_alternative
  - marker: b
    text: O «Pisa, alma mía, con fuerza» o «Pisotea, alma mía, con poder». El hebreo es conciso y poético, y el verbo puede sugerir pisar o pisotear además de marchar.
    reason: lexical_alternative
lexical_decisions:
- source_word: נַחַל
  english_pob_choice: torrent
  chosen_spanish: torrente
  alternatives_spanish:
  - arroyo
  - corriente
  - río
  lexicon: HALOT
  rationale: En este contexto poético de inundación y arrastre violento, «torrente» comunica mejor la fuerza súbita y devastadora del hebreo que opciones más neutras como «arroyo» o «río».
- source_word: קִישׁוֹן
  english_pob_choice: Kishon
  chosen_spanish: Quisón
  alternatives_spanish:
  - Kishon
  lexicon: nombre propio transliterado
  rationale: Se conserva el nombre del cauce como topónimo; en español bíblico «Quisón» es una transliteración natural y legible.
- source_word: גְּרָפָם
  english_pob_choice: swept them away
  chosen_spanish: los barrió
  alternatives_spanish:
  - los arrastró
  - los llevó consigo
  - los lavó
  lexicon: HALOT
  rationale: El verbo hebreo expresa arrastrar/suprimir por acción violenta del agua. «Barrió» mantiene la imagen dinámica y el efecto de eliminación masiva en un español natural.
- source_word: נַחַל קְדוּמִים
  english_pob_choice: the ancient torrent
  chosen_spanish: el torrente antiguo
  alternatives_spanish:
  - el torrente de antaño
  - el torrente primigenio
  - el torrente de los tiempos antiguos
  lexicon: HALOT
  rationale: קְדוּמִים apunta a antigüedad/antiguo tiempo. «Torrente antiguo» conserva la apposición poética y permite la ambigüedad entre antigüedad temporal e intensificación estilística.
- source_word: תִּדְרְכִי
  english_pob_choice: March on
  chosen_spanish: Marcha
  alternatives_spanish:
  - Pisa
  - Avanza
  - Trampla
  lexicon: HALOT
  rationale: El imperativo poético puede sugerir caminar con decisión, pisar o trillar. «Marcha» transmite exhortación enérgica y es idiomático en español, sin perder el tono de avance triunfal.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: alma mía
  alternatives_spanish:
  - mi alma
  - yo
  - mi ser
  lexicon: HALOT
  rationale: En el autoapóstrofe poético, «alma mía» conserva el valor de נפש como interioridad/vida y mantiene el tono elevado del hebreo.
- source_word: עֹז
  english_pob_choice: with strength
  chosen_spanish: con fuerza
  alternatives_spanish:
  - en fuerza
  - con poder
  - con vigor
  lexicon: HALOT
  rationale: «Fuerza» traduce bien עֹז y funciona de modo natural con el imperativo en español. Se evita una formulación más abstracta que debilitara la energía del verso.
translation_notes:
  revision_awareness: La edición inglesa POB quedó sin cambios en la última pasada y obtuvo alta concordancia en la revisión cruzada; por eso el español sigue de cerca sus decisiones léxicas principales, conservando la ambigüedad poética de קְדוּמִים y la tersura del imperativo final.
  spanish_consistency_notes:
  - Se usa «Yahvé» por norma del proyecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se usa «Mesías/Cristo» solo por contexto; no aplica aquí.
  - «alma mía» se mantiene como vocativo poético y no se reduce a «yo» para conservar la autoexhortación hebrea.
  - La puntuación con raya reproduce el quiebre poético del verso y el paralelismo entre las dos menciones del torrente.
