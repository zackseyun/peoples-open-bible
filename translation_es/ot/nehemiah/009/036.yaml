    reason: lexical_alternative
  - marker: c
    text: Hebreo literalmente «sobre ella», es decir, sobre la misma tierra que Dios dio a sus padres.
    reason: cultural_note
  revision_rationale: 'La revisión corrige el anclaje de notas para que cada una corresponda a la palabra o frase pertinente, elimina una nota estilística innecesaria, y mejora la naturalidad y fidelidad de טוּבָהּ con «lo bueno de ella». También suaviza la puntuación y adopta «Miren» como equivalente más natural de הִנֵּה en este lamento colectivo, sin alterar las decisiones clave ya correctas: «esclavos», «nuestros padres» y «sobre ella».'
