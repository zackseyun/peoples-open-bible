translation:
  language: es
  text: Los de entre ustedes reconstruirán las ruinas antiguas; levantarás los cimientos de generación en generación[a], y se te llamará reparador de la brecha, restaurador de sendas para habitar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los cimientos de muchas generaciones». El hebreo dice literalmente «los cimientos de generación y generación».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «restaurador de sendas para habitar», «restaurador de sendas para que se habite» o «restaurador de caminos para morada». La frase final probablemente alude a hacer habitable de nuevo a la comunidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבָנוּ מִמְּךָ
  english_pob_choice: Those from among you will rebuild
  chosen_spanish: Los que salgan de entre ustedes reconstruirán
  alternatives_spanish:
  - Los de entre ustedes reconstruirán
  - Su gente reconstruirá
  lexicon: HALOT
  rationale: El hebreo plural con מִמְּךָ expresa procedencia 'de entre ustedes', no un material del que se construye. En español, 'salgan de entre ustedes' comunica ese origen humano de manera natural y mantiene el matiz distributivo del texto.
- source_word: חָרְב֣וֹת עוֹלָ֔ם
  english_pob_choice: the ancient ruins
  chosen_spanish: las ruinas antiguas
  alternatives_spanish:
  - las ruinas de antaño
  - las desolaciones antiguas
  lexicon: HALOT
  rationale: חָרְבוֹת son 'ruinas/desolaciones' y עוֹלָם aquí señala antigüedad o larga duración. 'Ruinas antiguas' es claro en español y conserva el valor temporal sin sobrecargarlo con un tono arcaizante.
- source_word: מוֹסְדֵ֥י דוֹר וָד֖וֹר
  english_pob_choice: the foundations of generation after generation
  chosen_spanish: los cimientos de generación en generación
  alternatives_spanish:
  - los cimientos de muchas generaciones
  - los cimientos de generación tras generación
  lexicon: HALOT
  rationale: מוֹסְדֵי son 'cimientos/fundamentos' y דוֹר וָדוֹר es un giro distributivo de sucesión continua. 'De generación en generación' conserva bien esa repetición idiomática y suena natural en español.
- source_word: תְּקוֹמֵ֑ם
  english_pob_choice: you will raise up
  chosen_spanish: levantarán
  alternatives_spanish:
  - restaurarán
  - establecerán
  lexicon: HALOT
  rationale: La forma causativa de קום presenta la idea de hacer que algo se ponga en pie. 'Levantarán' mantiene la imagen de reerguir estructuras derruidas con mayor fuerza visual que 'establecerán'.
- source_word: וְקֹרָא לְךָ
  english_pob_choice: and you will be called
  chosen_spanish: y se les llamará
  alternatives_spanish:
  - y los llamarán
  - y serán llamados
  lexicon: HALOT
  rationale: El hebreo usa un impersonal en 3ms; en español, el pasivo refleja mejor la designación pública que una simple acción activa. 'Se les llamará' conserva ese matiz nominativo y evita personalizar indebidamente al sujeto.
- source_word: גֹּדֵר פֶּרֶץ
  english_pob_choice: the repairer of the breach
  chosen_spanish: reparadores de la brecha
  alternatives_spanish:
  - reparador de la brecha
  - el que cierra la brecha
  lexicon: HALOT
  rationale: גֹּדֵר alude a cerrar o reparar una abertura/rotura, y פֶּרֶץ es 'brecha'. 'Brecha' es la correspondencia más natural para el español bíblico contemporáneo; el plural concuerda con el pasivo impersonal previo en la formulación general de la designación.
- source_word: מְשֹׁבֵ֥ב נְתִיב֖וֹת לָשָֽׁבֶת
  english_pob_choice: the restorer of paths for dwelling
  chosen_spanish: restauradores de sendas para habitar
  alternatives_spanish:
  - restauradores de caminos para vivir
  - restauradores de sendas para morada
  lexicon: HALOT
  rationale: מְשֹׁבֵב viene de שוב en sentido restaurativo; נְתִיבוֹת son 'sendas/caminos'. 'Para habitar' preserva la finalidad del infinitivo לָשָׁבֶת sin forzar una perífrasis más larga.
theological_decisions:
- issue: La designación final es una restauración comunitaria, no solo una metáfora espiritual abstracta
  english_pob_reading: The final phrase likely refers to making the community inhabitable again.
  chosen_spanish_reading: restauradores de sendas para habitar
  alternative_spanish_readings:
  - restauradores de caminos para vivir
  - restauradores de sendas para morada
  rationale: La imagen apunta a rehacer la vida comunitaria y la habitabilidad del espacio, no meramente a una interioridad devocional. 'Para habitar' deja abierta esa restauración concreta y social.
  doctrine_reference: Restauración comunitaria / shalom social en los profetas
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y sin cambios necesarios; esta propuesta sigue de cerca el audit trail inglés, preservando las alternativas léxicas principales y la lectura comunitaria del cierre.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando aparezca el nombre divino, aunque este versículo no lo contiene.
  - Se eligió 'brecha' para פֶּרֶץ, en coherencia con la tradición léxica documentada por el POB inglés.
  - '''Sendas'' traduce נְתִיבוֹת para conservar un registro bíblico claro y evitar el exceso de modernización.'
  - El pasivo 'se les llamará' refleja el hebreo impersonal de forma natural en español.
