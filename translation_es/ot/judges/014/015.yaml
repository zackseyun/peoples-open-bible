  rationale: 'Se corrigió un falso matiz en «Seduce», sustituyéndolo por «Engaña» para reflejar mejor la manipulación de פַּתִּי sin connotación sexual. Se reemplazó «enigma» por «acertijo» por mayor precisión contextual. Se ajustó «habéis invitado» a «invitaron» para español neutral. También se reubicaron los marcadores de nota para que correspondan exactamente a los elementos explicados: [a] en «casa» y [b] en «despojarnos».'
