translation:
  language: es
  text: Porque así como su mente se dispuso a extraviarse de Dios, así también, al volver, búsquenlo diez veces más.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «búsquenlo diez veces más al volver». El griego dice literalmente «háganlo diez veces, volviendo para buscarlo», con el objeto de la intensificación implícito por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: διάνοια
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - pensamiento
  - modo de pensar
  lexicon: BDAG
  rationale: διάνοια aquí apunta al asiento interior de la intención y la disposición; «mente» es natural en español y conserva ese sentido interior sin reducirlo a un solo pensamiento aislado.
- source_word: ἐγένετο
  english_pob_choice: was set on
  chosen_spanish: se orientó
  alternatives_spanish:
  - llegó a
  - se volvió
  - quedó dispuesta
  lexicon: BDAG
  rationale: La combinación con ἡ διάνοια ὑμῶν y el infinitivo expresa un estado/resultante de dirección interior. «Se orientó» comunica esa dirección tomada hacia una meta de forma idiomática en español.
- source_word: εἰς τὸ πλανηθῆναι
  english_pob_choice: going astray
  chosen_spanish: apartarse
  alternatives_spanish:
  - desviarse
  - errar el camino
  - extraviarse
  lexicon: BDAG
  rationale: πλανηθῆναι expresa desviación o extravío respecto de Dios. «Apartarse» suena natural en español y mantiene la idea de desviación relacional y religiosa.
- source_word: ἀπὸ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - lejos de Dios
  - apartándose de Dios
  lexicon: BDAG
  rationale: La preposición ἀπό marca separación. «De Dios» es la forma más directa y sobria; la noción de distancia queda implícita en el verbo de apartarse.
- source_word: δεκαπλασιάσατε
  english_pob_choice: seek him ten times more
  chosen_spanish: búscalo diez veces más
  alternatives_spanish:
  - búscalo diez veces
  - búsquenlo diez veces más
  - búscalo en diez tanto
  lexicon: LSJ
  rationale: El griego expresa una intensificación numérica ligada al retorno y a la búsqueda. En español, «búscalo diez veces más» comunica con claridad la fuerza intensiva sin volver opaco el mandato.
- source_word: ἐπιστρέφοντες
  english_pob_choice: as you return
  chosen_spanish: al volver
  alternatives_spanish:
  - mientras vuelven
  - cuando vuelvan
  - volviendo
  lexicon: BDAG
  rationale: El participio describe la circunstancia acompañante de la exhortación. «Al volver» preserva el matiz de retorno/volverse sin sobrecargar la frase.
- source_word: ζητῆσαι
  english_pob_choice: seek him
  chosen_spanish: búscalo
  alternatives_spanish:
  - búscale
  - procura encontrarlo
  - búsquenlo
  lexicon: BDAG
  rationale: ζητέω en contexto religioso es buscar a Dios con intención devota. «Búscalo» es la forma más natural y reverente en español contemporáneo.
theological_decisions:
- issue: Cómo expresar la intensificación de δεκαπλασιάσατε sin perder el llamado a volver a Dios
  english_pob_reading: 'Render the command as intensified seeking: ''seek him ten times more.'''
  chosen_spanish_reading: «búscalo diez veces más» como búsqueda intensificada al regresar a Dios.
  alternative_spanish_readings:
  - «búscalo en tenfold»
  - «multiplica tu búsqueda diez veces»
  - «búscalo diez veces al volver»
  rationale: 'El griego es elíptico y une intensificación con retorno y búsqueda. La formulación elegida hace explícita la exhortación práctica sin añadir contenido doctrinal ajeno al texto: el pueblo, que se desvió, debe volver con renovado y mucho mayor empeño en buscar a Dios.'
  doctrine_reference: 'Traductología bíblica: equivalencia óptima; conservar el sentido exhortativo y la intensidad retórica del original.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB, que corrigió la idea de 'came to go astray' a una redacción que expresa mejor el estado de la mente inclinada al extravío; en español se reflejó esa dirección interior con 'se orientó a apartarse de Dios'. También se preservó la intensificación numérica del mandato final sin introducir una nota textual no anclada.
  spanish_consistency_notes:
  - Se usó «Dios» conforme al patrón del proyecto para θεός.
  - Se prefirió «mente» como equivalente de διάνοια por claridad y naturalidad.
  - Se evitó «Cristo»/«Mesías» porque el versículo no lo requiere.
  - Se evitó «SEÑOR» para no ocultar el nombre divino ni introducir una convención ajena al texto.
