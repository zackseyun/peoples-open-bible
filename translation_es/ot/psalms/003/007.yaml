lexical_decisions:
- source_word: לֹא
  english_pob_choice: not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No he de
  - No voy a
  lexicon: HALOT
  rationale: La partícula negativa se conserva de forma directa. En español, 'No temeré' expresa adecuadamente la negación volitiva/futura del imperfecto hebreo sin añadir matices ajenos.
- source_word: אִירָא
  english_pob_choice: I will fear
  chosen_spanish: temeré
  alternatives_spanish:
  - tendré miedo
  - me asustaré
  lexicon: HALOT
  rationale: El imperfecto qal de ירא puede expresar resolución futura; 'temeré' reproduce bien esa determinación poética y evita la redundancia de 'No voy a tener miedo'.
- source_word: מֵרִבְבוֹת
  english_pob_choice: myriads of
  chosen_spanish: miríadas de
  alternatives_spanish:
  - decenas de miles de
  - millares de
  - incontables
  lexicon: HALOT
  rationale: '''Miríadas'' conserva el valor de número inmenso y mantiene la imagen del original. ''Decenas de miles'' sería más explicativo, pero menos transparente para esta unidad poética.'
- source_word: עָם
  english_pob_choice: people
  chosen_spanish: gente
  alternatives_spanish:
  - pueblo
  - personas
  - nación
  lexicon: HALOT
  rationale: En este contexto se trata de una multitud humana hostil. 'Gente' comunica la masa de opositores de manera natural en español, sin convertir el término en una categoría política o étnica.
- source_word: אֲשֶׁר
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - quienes
  - el cual
  lexicon: HALOT
  rationale: La relativa introduce la descripción de ese grupo. 'Que' es la forma más natural y fiel en español para este enlace.
- source_word: סָבִיב
  english_pob_choice: all around
  chosen_spanish: alrededor de
  alternatives_spanish:
  - en derredor de
  - por todas partes de
  lexicon: HALOT
  rationale: La idea espacial de rodear se expresa de forma idiomática con 'alrededor de'. Mantiene la imagen de cerco sin forzar un calco.
- source_word: שָׁתוּ
  english_pob_choice: have set themselves
  chosen_spanish: se han puesto
  alternatives_spanish:
  - se han colocado
  - se han apostado
  - se han situado
  lexicon: HALOT
  rationale: El verbo hebreo 'poner/colocar' en este contexto describe una disposición hostil. 'Se han puesto' conserva la acción de posicionarse y encaja con el paralelismo de un cerco enemigo.
- source_word: עָלָי
  english_pob_choice: around me
  chosen_spanish: de mí
  alternatives_spanish:
  - contra mí
  - sobre mí
  - a mi alrededor
  lexicon: HALOT
  rationale: La preposición על puede señalar oposición o superposición. En español, el complemento 'alrededor de mí' ya recoge el valor espacial de סָבִיב; por eso se puede integrar con una relativa más natural. Se preserva en nota la lectura adversarial 'contra mí'.
theological_decisions:
- issue: Encierro hostil versus oposición explícita
  english_pob_reading: who have set themselves all around me
  chosen_spanish_reading: que se han puesto alrededor de mí
  alternative_spanish_readings:
  - que se han puesto contra mí alrededor
  - que se han apostado contra mí por todas partes
  rationale: 'El hebreo une סָבִיב (''alrededor'') con עָלַי (''sobre/contra mí''). El texto inglés POB preserva la imagen espacial y deja la fuerza adversarial en nota. El español principal sigue esa misma estrategia: mantiene el cerco y no reduce el verso a una mera declaración de agresión.'
  doctrine_reference: Salmo 3:7; cf. 2 Samuel 15–18 (contexto de persecución de David)
translation_notes:
  revision_awareness: 'La redacción sigue el sentido de la última revisión inglesa: elimina cualquier artículo innecesario y mantiene el paralelismo poético breve. El español evita sobreexplicar el hebreo y conserva la tensión entre cerco espacial y oposición implícita.'
  spanish_consistency_notes:
  - Se usa 'miríadas' para reflejar el plural intensivo de רבבות, coherente con el valor de número inmenso del hebreo.
  - '''Temeré'' mantiene la resolución futura del imperfecto; no se añadió ''tengo miedo'' para no cambiar el tono poético.'
  - Se preserva el cerco espacial con 'alrededor de mí'; la posible lectura hostil más explícita queda en nota.
  - El registro es bíblico moderno, no arcaizante, y evita fórmulas de equivalencia eclesiástica no motivadas por el texto.
