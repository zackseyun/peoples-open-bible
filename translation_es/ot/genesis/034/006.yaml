lexical_decisions:
- source_word: וַיֵּצֵא
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - fue afuera
  - partió
  lexicon: HALOT
  rationale: El wayyiqtol narra una acción pasada secuencial. «Salió» conserva el movimiento de salida con naturalidad en español y corresponde mejor que una formulación más débil como «fue».
- source_word: חֲמוֹר
  english_pob_choice: Hamor
  chosen_spanish: Hamor
  alternatives_spanish:
  - Amor
  lexicon: conventional transliteration
  rationale: Es nombre propio; se conserva la transliteración estable en español.
- source_word: אֲבִי שְׁכֶם
  english_pob_choice: the father of Shechem
  chosen_spanish: el padre de Siquem
  alternatives_spanish:
  - el padre de Shequem
  - Siquem, su padre
  lexicon: HALOT
  rationale: La relación de parentesco se expresa de forma directa y clara en español. «El padre de Siquem» preserva la construcción del hebreo sin volverla innecesariamente idiomática.
- source_word: אֶל יַעֲקֹב
  english_pob_choice: to Jacob
  chosen_spanish: a Jacob
  alternatives_spanish:
  - hacia Jacob
  - para con Jacob
  lexicon: HALOT
  rationale: אֶל indica dirección o acercamiento. «A Jacob» es la forma más natural en español y conserva la orientación del movimiento.
- source_word: לְדַבֵּר אִתּוֹ
  english_pob_choice: to speak with him
  chosen_spanish: para hablar con él
  alternatives_spanish:
  - para hablar con Jacob
  - para hablarle
  lexicon: HALOT
  rationale: El infinitivo con לְ expresa propósito. «Para hablar con él» refleja el encuentro conversacional de manera natural y conserva la referencia pronominal al antecedente inmediato, Jacob.
