    text: «Carne» traduce el hebreo בָּשָׂר y conserva la repetición de la expresión bíblica.
    reason: source_note
  revision_rationale: 'Se ajusta la primera cláusula para alinearla con la decisión principal del POB auditado: «la vida… es su sangre», dejando la alternativa documentada en nota. Se conserva la segunda cláusula «en su vida está» para reflejar בְנַפְשׁוֹ הוּא. También se mejora la conexión inferencial con «Por eso dije» y se corrigen los anclajes de notas para que coincidan exactamente con el contenido explicado.'
