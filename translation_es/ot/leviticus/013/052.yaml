base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/052.yaml
  text: He shall burn the garment[a], or the warp or the woof in wool or in linen, or any article of leather in which the infection is, for it is a destructive skin disease[b]; it shall be burned in the fire.
  footnotes:
  - marker: a
    text: 'Or ''the weft'' for ''the woof.'' The Hebrew pairs two technical weaving terms: ''warp'' and ''woof/weft.'''
    reason: lexical_alternative
  - marker: b
    text: Hebrew צָרַעַת (traditionally 'leprosy') refers to a broader ritual impurity condition than modern leprosy and can also describe contamination in garments and houses.
    reason: cultural_note
