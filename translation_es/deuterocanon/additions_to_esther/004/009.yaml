lexical_decisions:
- source_word: Τί ἐστιν
  english_pob_choice: What is it
  chosen_spanish: ¿Qué pasa?
  alternatives_spanish:
  - ¿Qué es?
  - ¿Qué sucede?
  - ¿Qué ocurre?
  lexicon: LSJ
  rationale: La pregunta griega es breve e idiomática. En español, «¿Qué pasa?» comunica con naturalidad la misma inquietud directa sin endurecer la frase ni volverla demasiado literal.
- source_word: Ἐσθήρ
  english_pob_choice: Esther
  chosen_spanish: Ester
  alternatives_spanish:
  - Esther
  lexicon: Onomástico bíblico tradicional
  rationale: Se usa «Ester», forma habitual en español bíblico y más natural para la lectura pública. Mantiene la identidad del nombre propio sin forzar la grafía inglesa.
- source_word: ἐγὼ ὁ ἀδελφός σου
  english_pob_choice: I am your brother
  chosen_spanish: Yo soy tu hermano
  alternatives_spanish:
  - Yo, tu hermano
  - Yo soy tu pariente
  lexicon: LSJ
  rationale: El griego dice literalmente «yo [soy] el hermano tuyo». Se conserva «hermano» para reflejar la forma léxica directa del texto, sin resolver de antemano una relación más amplia.
- source_word: θάρσει
  english_pob_choice: take courage
  chosen_spanish: ten ánimo
  alternatives_spanish:
  - ten valor
  - cobra ánimo
  - sé valiente
  lexicon: LSJ
  rationale: El imperativo exhorta a la confianza y firmeza. «Ten ánimo» es una fórmula clara y digna en español que reproduce bien el tono de aliento del original.
theological_decisions:
- issue: Alcance relacional de ἀδελφός
  english_pob_reading: Retain the literal 'brother' in the main text
  chosen_spanish_reading: Mantener «hermano» en el texto principal
  alternative_spanish_readings:
  - «pariente»
  - «pariente cercano»
  - «pariente» en una nota
  rationale: El griego emplea el término familiar concreto. Aunque el contexto de corte puede sugerir parentesco más amplio, la traducción principal conserva la forma literal y deja esa posibilidad para una nota, sin borrar la tensión léxica.
  doctrine_reference: Translation philosophy §1, §5
