    issue: La nota [a] está anclada en «di» pero explica «un pequeño santuario».
    rationale: Las instrucciones requieren que cada nota aparezca anclada exactamente en la palabra o frase relevante. Aquí la nota trata la ambigüedad de לְמִקְדָּשׁ מְעַט, no el imperativo אֱמֹר.
  - severity: medium
    issue: «Así ha dicho» no es la mejor representación de כֹּה אָמַר en esta fórmula profética.
    rationale: En español bíblico y eclesial contemporáneo, «Así dice» reproduce mejor la fórmula mensajera estable y suena más natural que un perfecto compuesto, sin perder fidelidad al hebreo.
  revised_spanish_text: 'Por tanto, di: «Así dice el Señor Yahvé: Aunque los alejé entre las naciones, y aunque los dispersé entre las tierras, he sido para ellos un pequeño santuario[a] en las tierras adonde han ido».'
  revised_footnotes:
  - marker: a
    text: 'O: «un santuario por un poco de tiempo». La expresión hebrea puede describir ya sea un santuario pequeño o una presencia santuarial temporal.'
    reason: alternative_reading
  revision_rationale: Se corrige la fórmula profética a «Así dice» para reflejar mejor el uso idiomático de כֹּה אָמַר en español bíblico actual, y se mueve la nota al sintagma «un pequeño santuario», que es donde realmente recae la alternativa de lectura documentada para לְמִקְדָּשׁ מְעַט. No se requieren cambios doctrinales adicionales.
