  - marker: b
    text: 'O: «para que no te domine por él». El griego refuerza más fuertemente la idea de dominio hostil.'
    reason: alternative_reading
  revision_rationale: 'La revisión conserva la claridad del borrador pero se alinea mejor con la evidencia y el audit trail: añade el posesivo (''tu pan'') conforme a la decisión léxica del POB inglés, devuelve al texto principal un verbo adversativo más cercano al hebreo (''se ponga contra ti''), y mantiene en nota la lectura más fuerte influida por el griego (''te domine''). ''No sea que'' representa bien el valor preventivo de לָמָּה aclarado por ἵνα μὴ.'
