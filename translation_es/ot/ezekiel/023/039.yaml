translation:
  language: es
  text: Porque cuando sacrificaron a sus hijos para sus ídolos, entraron en mi santuario ese mismo día para profanarlo. He aquí, esto hicieron dentro de mi casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para profanarlos», si se toma el pronombre como concordando con el acto de sacrificar a los hijos; el sentido final sigue siendo la profanación del santuario.
    reason: alternative_reading
lexical_decisions:
- source_word: וּבְשַׁחֲטָם
  english_pob_choice: For when they slaughtered
  chosen_spanish: Porque cuando sacrificaron
  alternatives_spanish:
  - Y cuando sacrificaron
  - cuando degollaron
  - cuando mataron
  lexicon: HALOT
  rationale: La construcción hebrea introduce una circunstancia temporal-causal; en español, «Porque cuando» conserva ese valor discursivo. «Sacrificaron» comunica mejor que «degollaron» o «mataron» la carga cultual y ritual del contexto.
- source_word: בְּנֵיהֶם
  english_pob_choice: their sons
  chosen_spanish: a sus hijos
  alternatives_spanish:
  - a sus hijos varones
  - a sus niños
  - a sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «sus hijos/varones» en forma masculina. En español, «hijos» transmite con naturalidad esa referencia general a la descendencia masculina sin forzar una expresión dura o poco idiomática.
- source_word: לְגִלּוּלֵיהֶם
  english_pob_choice: for their idols
  chosen_spanish: para sus ídolos
  alternatives_spanish:
  - a sus ídolos
  - en honor de sus ídolos
  - para sus ídolos inmundos
  lexicon: HALOT
  rationale: «Ídolos» refleja el término peyorativo de Ezequiel sin añadir glosas no sustentadas. «Para» conserva mejor la idea de sacrificio realizado con ese propósito que «a» en este contexto.
- source_word: וַיָּבֹאוּ אֶל מִקְדָּשִׁי
  english_pob_choice: they came into my sanctuary
  chosen_spanish: entraron en mi santuario
  alternatives_spanish:
  - vinieron a mi santuario
  - entraron en mi santuario
  - llegaron a mi santuario
  lexicon: HALOT
  rationale: «Entraron en» expresa con claridad el movimiento hacia el interior. «Santuario» preserva el carácter sagrado del lugar mejor que «templo» o «casa» en esta primera mención.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: on that same day
  chosen_spanish: en aquel mismo día
  alternatives_spanish:
  - en ese mismo día
  - ese mismo día
  - en aquel día
  lexicon: HALOT
  rationale: La expresión enfatiza la inmediación entre el sacrificio y la profanación. «Aquel mismo día» mantiene ese énfasis con un registro natural y solemne en español.
- source_word: לְחַלְּל֑וֹ
  english_pob_choice: to defile it
  chosen_spanish: para profanarlo
  alternatives_spanish:
  - para contaminarlo
  - para deshonrarlo
  - para profanarlo
  lexicon: HALOT
  rationale: El verbo חלל implica violar la santidad de algo consagrado. «Profanarlo» conserva con precisión esa tensión cultual; «contaminarlo» o «deshonrarlo» desplazan el matiz.
- source_word: וְהִנֵּה
  english_pob_choice: Behold,
  chosen_spanish: He aquí,
  alternatives_spanish:
  - Miren,
  - Miren aquí,
  - He aquí,
  lexicon: HALOT
  rationale: «He aquí» reproduce el marcador discursivo con un tono formal y bíblico, equivalente al «Behold» revisado en la auditoría inglesa, sin caer en un calco pesado.
- source_word: כֹה עָשׂוּ
  english_pob_choice: this is what they did
  chosen_spanish: esto hicieron
  alternatives_spanish:
  - así hicieron
  - de esta manera hicieron
  - esto fue lo que hicieron
  lexicon: HALOT
  rationale: La frase resume la acción descrita y apunta a su notoriedad. «Esto hicieron» es breve, directo y fiel al valor resumidor del hebreo.
- source_word: בְּתוֹךְ בֵּיתִי
  english_pob_choice: within my house
  chosen_spanish: dentro de mi casa
  alternatives_spanish:
  - dentro de mi casa
  - en medio de mi casa
  - dentro de mi morada
  lexicon: HALOT
  rationale: «Dentro de mi casa» conserva la imagen espacial y la referencia a la morada divina. En este contexto, «casa» puede referirse al templo, y el término español mantiene esa amplitud sin perder claridad.
theological_decisions:
- issue: Lenguaje de profanación del santuario
  english_pob_reading: to defile it
  chosen_spanish_reading: para profanarlo
  alternative_spanish_readings:
  - para contaminarlo
  - para mancharlo
  rationale: El pasaje no describe mera suciedad ritual, sino la violación de lo santo mediante un acto abominable seguido de ingreso al santuario. «Profanarlo» conserva mejor la gravedad teológica del verbo hebreo.
  doctrine_reference: Translation philosophy §3; §6
- issue: Referencia a la casa de Dios como templo
  english_pob_reading: within my house
  chosen_spanish_reading: dentro de mi casa
  alternative_spanish_readings:
  - dentro de mi templo
  - dentro de mi morada
  rationale: La expresión hebrea conserva una nota de posesión divina («mi casa») que es importante para la acusación. «Casa» permite mantener esa relación sin sustituirla por una explicación más interpretativa.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El texto inglés auditable pasó por una revisión menor: «Look» fue cambiado a «Behold» para un registro más formal. La versión española refleja ese mismo tono con «He aquí». No se detectaron otras tensiones textuales o de sentido relevantes en el paquete de auditoría.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto cuando el texto hebreo apunta al nombre divino, pero en este versículo el hebreo usa la primera persona posesiva («mi santuario», «mi casa»), por lo que no aparece el nombre.
  - «Santuario» y «casa» se diferenciaron para conservar el cambio de imagen del hebreo entre מִקְדָּשִׁי y בֵּיתִי.
  - Se preservó el contraste entre el acto de sacrificar a los hijos y la entrada inmediata al lugar santo mediante «aquel mismo día» y «para profanarlo».
