translation:
  language: es
  text: Y de los hijos de Selomit[a], hijo de Josifía, y con él ciento sesenta varones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de Selomit»; el hebreo dice literalmente «hijos de Selomit».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/בְּנֵי
  english_pob_choice: And from the sons of
  chosen_spanish: Y de los hijos de
  alternatives_spanish:
  - Y de los descendientes de
  - Y de la familia de
  lexicon: HALOT
  rationale: En listas genealógicas y censales, «hijos de» conserva el valor de designación de clan/familia que el hebreo usa literalmente, sin perder la función partitiva de «de». La coordinación inicial «Y» sigue el enlace de la lista.
- source_word: שְׁלוֹמִית
  english_pob_choice: Shelomith
  chosen_spanish: Selomit
  alternatives_spanish:
  - Shelomith
  lexicon: transliteración tradicional española
  rationale: Se translitera el nombre propio de manera natural para el español; «Selomit» evita una secuencia inicial difícil y mantiene cercanía fonética al hebreo.
- source_word: בֶּן
  english_pob_choice: the son of
  chosen_spanish: hijo de
  alternatives_spanish:
  - el hijo de
  - son of
  lexicon: HALOT
  rationale: En español, la relación genealógica se expresa de forma más natural con «hijo de»; el artículo definido es innecesario y el sentido constructo queda claro.
- source_word: יוֹסִפְיָה
  english_pob_choice: Josiphiah
  chosen_spanish: Josifía
  alternatives_spanish:
  - Josiphía
  - Josephía
  lexicon: transliteración tradicional española
  rationale: Se conserva el nombre propio con adaptación ortográfica española coherente y legible, sin forzar una forma eclesiástica que no proviene del texto fuente.
- source_word: וְ/עִמּוֹ
  english_pob_choice: and with him
  chosen_spanish: y con él
  alternatives_spanish:
  - y junto con él
  - con él
  lexicon: HALOT
  rationale: La frase indica acompañamiento en el grupo listado; «y con él» reproduce el vínculo conjuntivo y la dependencia del referente anterior con naturalidad en español.
- source_word: מֵאָה וְשִׁשִּׁים
  english_pob_choice: '160'
  chosen_spanish: ciento sesenta
  alternatives_spanish:
  - '160'
  lexicon: HALOT
  rationale: En español bíblico publicado, los números suelen escribirse con palabras cuando el pasaje es breve y narrativo; se conserva exactamente el valor numérico.
- source_word: הַזְּכָרִים
  english_pob_choice: males
  chosen_spanish: varones
  alternatives_spanish:
  - males
  - hombres
  lexicon: HALOT
  rationale: «Varones» mantiene el rasgo masculino sin reducirlo necesariamente a edad adulta. «Males» sería más técnico, pero menos idiomático; «hombres» podría desplazar el matiz biológico/censal del hebreo.
translation_notes:
  revision_awareness: He seguido el texto hebreo masorético provisto y el trazado inglés auditado; la única tensión relevante es el valor colectivo de «hijos de», que en español puede leerse genealógica o clánicamente. Se preserva esa ambigüedad controlada con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - No se introduce «Cristo», «Señor» ni terminología teológica ajena al contenido censal del versículo.
  - «Varones» se usa aquí en sentido censal y no como sustituto moral o eclesiástico.
