translation:
  language: es
  text: Y quitándose sus vestidos de gloria, se vistió de vestidos de angustia y lamento; y, en lugar de perfumes espléndidos[a], llenó su cabeza con cenizas y estiércol[b], y humilló mucho su cuerpo, y cada parte de su adorno festivo la llenó con el trenzado de su cabello[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''en lugar de perfumes lujosos''. El griego literalmente dice ''perfumes orgullosos'' o ''altivos'', probablemente aludiendo a fragancias costosas u ostentosas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''cubrió su cabeza con cenizas y estiércol''. El griego, más literalmente, dice ''llenó su cabeza''.'
    reason: lexical_alternative
  - marker: c
    text: La frase final es difícil. Puede significar que las partes antes embellecidas para el gozo quedaron ahora marcadas por su cabello trenzado o deshecho en señal de luto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀφελομένη
  english_pob_choice: taking off
  chosen_spanish: quitándose
  alternatives_spanish:
  - despojándose de
  - sacándose
  lexicon: LSJ
  rationale: El participio aoristo medio expresa una acción deliberada de quitarse la vestidura; 'quitándose' es natural en español y conserva la concreción del acto.
- source_word: τὰ ἱμάτια τῆς δόξης αὐτῆς
  english_pob_choice: her garments of glory
  chosen_spanish: sus vestidos de gloria
  alternatives_spanish:
  - sus vestidos gloriosos
  - sus ropas espléndidas
  lexicon: LSJ
  rationale: Conserva la estructura posesiva y el genitivo de cualidad, manteniendo 'gloria' como esplendor/estatus visible, no como abstracción devocional.
- source_word: ἱμάτια στενοχωρίας καὶ πένθους
  english_pob_choice: garments of distress and mourning
  chosen_spanish: vestidos de angustia y lamento
  alternatives_spanish:
  - vestidos de aflicción y duelo
  - vestidos de estrechez y luto
  lexicon: LSJ
  rationale: στενοχωρία puede ser 'angustia' o 'aflicción'; 'angustia' suena natural y preserva el peso emocional. 'Lamento' comunica bien πένθος sin fijarlo en un término eclesiástico más técnico como 'luto'.
- source_word: ἀντὶ τῶν ὑπερηφάνων ἡδυσμάτων
  english_pob_choice: instead of splendid perfumes
  chosen_spanish: en lugar de perfumes espléndidos
  alternatives_spanish:
  - en lugar de perfumes lujosos
  - en lugar de ungüentos espléndidos
  lexicon: LSJ
  rationale: Sigue la revisión inglesa más reciente y evita sobrerresolver ὑπερήφανος; 'espléndidos' transmite el carácter costoso/ostentoso de los perfumes sin imponer 'orgullosos' en español.
- source_word: σποδοῦ καὶ κοπριῶν
  english_pob_choice: ashes and dung
  chosen_spanish: ceniza y estiércol
  alternatives_spanish:
  - ceniza y excremento
  - ceniza y basura
  lexicon: LSJ
  rationale: Mantiene la fuerza del contraste con los perfumes. 'Estiércol' es el equivalente más directo y conserva el tono brusco del griego.
- source_word: ἔπλησεν τὴν κεφαλήν
  english_pob_choice: she filled her head
  chosen_spanish: llenó su cabeza
  alternatives_spanish:
  - cubrió su cabeza
  - colmó su cabeza
  lexicon: LSJ
  rationale: La traducción literal 'llenó' respeta la forma del griego y preserva la intensidad del gesto; la alternativa 'cubrió' suaviza la imagen y se deja solo como posibilidad interpretativa.
- source_word: τὸ σῶμα ἐταπείνωσεν σφόδρα
  english_pob_choice: she humbled her body greatly
  chosen_spanish: humilló mucho su cuerpo
  alternatives_spanish:
  - afligió severamente su cuerpo
  - abajó mucho su cuerpo
  lexicon: LSJ
  rationale: ταπεινόω implica humillar/abatir. 'Humilló mucho su cuerpo' conserva la relación verbal y evita introducir una práctica específica que el texto no menciona.
- source_word: πάντα τόπον κόσμου ἀγαλλιάματος αὐτῆς
  english_pob_choice: every place of her joyful adornment
  chosen_spanish: cada lugar de su adorno gozoso
  alternatives_spanish:
  - cada parte de su adorno festivo
  - todo lugar de su adorno de alegría
  lexicon: LSJ
  rationale: κόσμος aquí es adorno/aderezo, no 'mundo'; 'adorno gozoso' sigue la función del sustantivo ἀγαλλίαμα como ornamento asociado con gozo o festividad.
- source_word: στρεπτῶν τριχῶν αὐτῆς
  english_pob_choice: the twisting of her hair
  chosen_spanish: el trenzado de su cabello
  alternatives_spanish:
  - el desorden de su cabello
  - su cabello trenzado
  lexicon: LSJ
  rationale: La frase es difícil; 'trenzado' mantiene la idea de torsión/entrelazado implícita en στρεπτός y funciona bien en español sin decidir demasiado entre cabello peinado o desarreglado.
theological_decisions:
- issue: Intensidad corporal del duelo
  english_pob_reading: Retain the stark bodily imagery ('ashes and dung,' 'humbled her body') without softening it into generalized sorrow.
  chosen_spanish_reading: Conservar la imaginería corporal fuerte ('ceniza y estiércol', 'humilló mucho su cuerpo') sin suavizarla en una simple tristeza interior.
  alternative_spanish_readings:
  - '''ceniza y basura'''
  - '''afligió severamente su cuerpo'''
  rationale: El pasaje enfatiza la auto-humillación visible y radical. Una traducción más suave reduciría la carga ritual y literaria del texto.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Interpretación de στρεπτῶν τριχῶν αὐτῆς
  english_pob_reading: Translate conservatively as 'the twisting of her hair' and preserve a smoother interpretive alternative in a footnote.
  chosen_spanish_reading: Traducir de forma conservadora como 'el trenzado de su cabello' y dejar la ambigüedad abierta mediante nota.
  alternative_spanish_readings:
  - '''su cabello desordenado'''
  - '''el desarreglo de su cabello'''
  rationale: El griego es poco transparente; 'trenzado' mantiene la cercanía formal sin afirmar con demasiada seguridad si el cabello estaba arreglado, retorcido o descompuesto por el duelo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del contexto inglés, que sustituyó 'proud perfumes' por 'splendid perfumes' por naturalidad y mejor ajuste contextual. En español se optó por 'perfumes espléndidos', reflejando esa revisión sin perder la observación lexicográfica sobre ὑπερήφανοι.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se prefirió 'adorno' para κόσμος, evitando el falso amigo 'mundo'.
  - Se usó un tono solemne pero moderno, apto para lectura eclesial amplia.
  - Se conservó la dureza de 'estiércol' para no atenuar el carácter de auto-abasamiento del texto.
