translation:
  language: es
  text: Y el pueblo creyó; y cuando oyeron que Yahvé había visitado[a] a los hijos de Israel[b] y que había visto su aflicción[c], se inclinaron y adoraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «había atendido a» o «había tomado nota de». El verbo hebreo puede significar «visitar», «atender a» o «tomar nota de», a menudo con el sentido de intervención divina.
    reason: lexical_alternative
  - marker: b
    text: O «los israelitas». Literalmente, «los hijos de Israel».
    reason: lexical_alternative
  - marker: c
    text: O «su miseria» o «su sufrimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּאֲמֵן
  english_pob_choice: believed
  chosen_spanish: creyó
  alternatives_spanish:
  - confió
  - dio crédito
  lexicon: HALOT
  rationale: El hifil de אמן expresa aquí que el pueblo llegó a dar por verdadero el mensaje recibido. «Creyó» es la opción más natural en español y conserva el valor narrativo sin añadir un objeto explícito que el hebreo no expresa.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo de Israel
  lexicon: HALOT
  rationale: El hebreo usa un singular colectivo; en español «el pueblo» reproduce bien ese colectivo y suena más bíblico y preciso que una pluralización explicativa.
- source_word: וַיִּשְׁמְעוּ כִּי
  english_pob_choice: when they heard that
  chosen_spanish: y cuando oyeron que
  alternatives_spanish:
  - y oyeron que
  - pues oyeron que
  lexicon: HALOT
  rationale: La combinación de waw consecutiva con שׁמע introduce el contenido oído y la circunstancia de la reacción. «Y cuando oyeron que» mantiene la relación temporal y causal con fluidez en español.
- source_word: פָקַד יְהוָה
  english_pob_choice: the LORD had visited
  chosen_spanish: Yahvé había visitado
  alternatives_spanish:
  - Yahvé había atendido a
  - Yahvé había tomado nota de
  - Yahvé había cuidado de
  lexicon: HALOT
  rationale: פָקַד abarca visitar, atender, tomar nota o intervenir. «Había visitado» conserva la idiomaticidad hebrea y su resonancia de acción divina concreta. Se mantiene «Yahvé» por el valor propio del nombre del pacto.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los hijos de Jacob
  - los israelitas
  lexicon: HALOT
  rationale: «Hijos de Israel» sigue de cerca la expresión hebrea literal y es natural en español bíblico. Se conserva la forma filial masculina del original, que el POB inglés también retuvo.
- source_word: רָאָה אֶת עָנְיָם
  english_pob_choice: he had seen their affliction
  chosen_spanish: había visto su aflicción
  alternatives_spanish:
  - había visto su miseria
  - había visto su sufrimiento
  lexicon: HALOT
  rationale: עָנְיָם puede significar aflicción, miseria o sufrimiento. «Aflicción» preserva la gravedad del término y encaja bien con el registro bíblico sin perder claridad.
- source_word: וַיִּקְּדוּ
  english_pob_choice: they bowed down
  chosen_spanish: se inclinaron
  alternatives_spanish:
  - se postraron
  - inclinaron la cabeza
  lexicon: HALOT
  rationale: קדד describe un gesto corporal de inclinación. «Se inclinaron» es claro y evita confundirlo con el verbo siguiente, que ya expresa adoración.
- source_word: וַיִּשְׁתַּחֲוּוּ
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - se postraron en adoración
  - rindieron homenaje
  lexicon: HALOT
  rationale: El verbo suele denotar postración en acto de homenaje o culto. Como ya hay un verbo separado para la inclinación física, «adoraron» transmite el sentido devocional sin redundancia.
theological_decisions:
- issue: Cómo traducir יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Jehová
  rationale: El texto hebreo usa explícitamente el Tetragramatón. En la política del POB en español se prefiere «Yahvé» para hacer visible el nombre divino, en lugar de ocultarlo con una sustitución reverencial.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה YHWH'
- issue: Cómo reflejar בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los hijos de Jacob
  - los israelitas
  rationale: La expresión hebrea es literal y masculina plural. «Los hijos de Israel» conserva la forma fuente y permanece inteligible en español sin neutralizar el parentesco del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente mantiene sin cambios el sentido del texto y su aparato crítico; por eso el borrador español conserva la misma estructura de sentido y las mismas decisiones nucleares: creer, oír, la visita de Yahvé, la visión de la aflicción, inclinarse y adorar. No se identifican revisiones textuales adicionales que afecten esta línea.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de forma consistente para יהוה, conforme al criterio del proyecto en español.
  - Se usa «aflicción» para עָנְיָם, preservando el registro bíblico y la carga de opresión/sufrimiento.
  - «Se inclinaron» y «adoraron» distinguen el gesto físico del acto de culto, como hace el hebreo con dos verbos distintos.
  - «Hijos de Israel» conserva la expresión fuente y armoniza con la terminología del POB inglés.
