id: ZEC.14.4
reference: Zechariah 14:4
source:
  edition: WLC
  text: וְ/עָמְד֣וּ רַגְלָ֣י/ו בַּ/יּוֹם הַ֠/הוּא עַל הַ֨ר הַ/זֵּתִ֜ים אֲשֶׁ֨ר עַל פְּנֵ֥י יְרוּשָׁלִַם֮ מִ/קֶּדֶם֒ וְ/נִבְקַע֩ הַ֨ר הַ/זֵּיתִ֤ים מֵֽ/חֶצְי/וֹ֙ מִזְרָ֣חָ/ה וָ/יָ֔מָּ/ה גֵּ֖יא גְּדוֹלָ֣ה מְאֹ֑ד וּ/מָ֨שׁ חֲצִ֥י הָ/הָ֛ר צָפ֖וֹנָ/ה וְ/חֶצְי/וֹ נֶֽגְבָּ/ה־־־־׃
translation:
  text: On that day his feet will stand on the Mount of Olives[a], which is before Jerusalem on the east; and the Mount of Olives will be split in two from east to west into a very great valley[b], with half of the mountain moving northward and half of it southward.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or 'which is opposite Jerusalem to the east.'
    reason: lexical_alternative
  - marker: b
    text: Literally 'will be split' or 'will be cleft'; the Hebrew describes the mountain dividing so that its halves move apart.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְעָמְדוּ
  chosen: will stand
  alternatives:
  - stood
  - shall stand
  lexicon: HALOT
  rationale: Qal perfect with prefixed waw in prophetic context is best rendered as a future event in English. 'Will stand' preserves the concrete bodily imagery without archaic 'shall.'
- source_word: רַגְלָיו
  chosen: his feet
  lexicon: HALOT
  rationale: Literal rendering is appropriate; the plural noun with 3ms suffix refers to the subject previously identified in context. No need to paraphrase as presence or coming.
- source_word: בַּיּוֹם הַהוּא
  chosen: On that day
  alternatives:
  - In that day
  lexicon: HALOT
  rationale: Standard prophetic temporal formula. 'On that day' is idiomatic modern English and preserves eschatological force.
- source_word: הַר הַזֵּתִים / הַר הַזֵּיתִים
  chosen: the Mount of Olives
  alternatives:
  - the mountain of the olives
  - Olive Mountain
  lexicon: HALOT
  rationale: Established geographic rendering that accurately reflects the Hebrew construct phrase and reads naturally in English.
- source_word: אֲשֶׁר עַל פְּנֵי יְרוּשָׁלִַם מִקֶּדֶם
  chosen: which lies before Jerusalem on the east
  alternatives:
  - which is opposite Jerusalem to the east
  - which faces Jerusalem from the east
  lexicon: HALOT
  rationale: עַל־פְּנֵי conveys being before/opposite, and מִקֶּדֶם locates it eastward. 'Lies before Jerusalem on the east' is natural English while preserving spatial orientation.
- source_word: וְנִבְקַע
  chosen: will be split in two
  alternatives:
  - will be split
  - will be cleft
  lexicon: HALOT
  rationale: The Niphal of בקע denotes being split open. 'In two' is supplied from the following description of two halves moving apart and makes the result explicit in idiomatic English.
- source_word: מֵחֶצְיוֹ מִזְרָחָה וָיָמָּה
  chosen: from east to west
  alternatives:
  - from its middle eastward and westward
  - from the middle toward the east and toward the west
  lexicon: HALOT
  rationale: The Hebrew describes the mountain splitting from its middle toward east and west. 'From east to west' communicates the directional axis clearly in concise English.
- source_word: גֵּיא גְּדוֹלָה מְאֹד
  chosen: into a very great valley
  alternatives:
  - a very large valley
  - an exceedingly great valley
  lexicon: HALOT
  rationale: גיא is 'valley' or ravine. 'Very great valley' keeps the intensification of גדולה מאד without sounding wooden.
- source_word: וּמָשׁ
  chosen: with half of the mountain moving
  alternatives:
  - and half of the mountain will move
  - and half of the mountain shifted
  lexicon: HALOT
  rationale: The verb denotes moving away/withdrawing. Rendering it as 'moving' after 'with' smooths the English syntax while preserving the sense of displacement caused by the split.
- source_word: צָפוֹנָה
  chosen: northward
  alternatives:
  - to the north
  lexicon: HALOT
  rationale: Directional he is well represented by the adverb 'northward.'
- source_word: נֶגְבָּה
  chosen: southward
  alternatives:
  - to the south
  lexicon: HALOT
  rationale: Directional he is well represented by the adverb 'southward.'
