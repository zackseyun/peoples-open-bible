translation:
  language: es
  text: Y cuatro mesas para el holocausto eran de piedra cortada[a], de un codo y medio de largo, de un codo y medio de ancho, y de un codo de alto. Sobre ellas colocaron los utensilios con los cuales degollaban el holocausto y el sacrificio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de piedra labrada».
    reason: lexical_alternative
lexical_decisions:
- source_word: שֻׁלְחָנוֹת
  english_pob_choice: tables
  chosen_spanish: mesas
  alternatives_spanish:
  - mesas
  - tablas
  - mesas de sacrificio
  lexicon: HALOT
  rationale: El hebreo designa mesas o superficies de trabajo. En español, «mesas» comunica naturalmente la idea sin añadir una especialización que el contexto ya explica con el uso sacrificial.
- source_word: לָעוֹלָה
  english_pob_choice: for the burnt offering
  chosen_spanish: para el holocausto
  alternatives_spanish:
  - para el holocausto
  - para la ofrenda quemada
  lexicon: HALOT
  rationale: Aunque el inglés POB usa «burnt offering», en español bíblico y culto «holocausto» conserva el valor técnico de la ofrenda totalmente quemada y evita una paráfrasis larga.
- source_word: אַבְנֵי גָזִית
  english_pob_choice: of cut stone
  chosen_spanish: de piedra cortada
  alternatives_spanish:
  - de piedra cortada
  - de piedra labrada
  - de piedra tallada
  lexicon: HALOT
  rationale: La frase hebrea indica piedra trabajada/dimensionada. «Piedra cortada» refleja la decisión inglesa y su fuerza material; «labrada» o «tallada» son alternativas válidas pero más interpretativas.
- source_word: אַמָּה אַחַת וָחֵצִי
  english_pob_choice: a cubit and a half
  chosen_spanish: de un codo y medio
  alternatives_spanish:
  - de un codo y medio
  - de un codo y medio de largo
  lexicon: HALOT
  rationale: Se conserva la unidad antigua «codo» sin convertirla, como hace el POB inglés. La fórmula española «de un codo y medio» suena natural y fiel a la medida.
- source_word: וְגֹבַהּ אַמָּה אֶחָת
  english_pob_choice: and one cubit high
  chosen_spanish: y de un codo de alto
  alternatives_spanish:
  - y de un codo de alto
  - y su altura era de un codo
  lexicon: HALOT
  rationale: El hebreo dice literalmente «su altura, un codo». En español, «de un codo de alto» transmite la dimensión de manera fluida, manteniendo la relación con la altura sin sobreexplicar.
- source_word: אֲלֵיהֶם
  english_pob_choice: On them
  chosen_spanish: Sobre ellas
  alternatives_spanish:
  - Sobre ellas
  - En ellas
  - Encima de ellas
  lexicon: HALOT
  rationale: El pronombre refiere a las mesas y expresa ubicación superior. «Sobre ellas» es la forma más natural en español para marcar colocación encima de la superficie.
- source_word: וְיַנִּיחוּ
  english_pob_choice: they placed
  chosen_spanish: ponían
  alternatives_spanish:
  - ponían
  - pondrían
  - colocaban
  lexicon: HALOT
  rationale: Aunque el inglés revisado prefirió un pasado simple, el valor verbal hebreo en este tipo de instrucción visionaria puede expresarse de manera habitual/descriptiva en español. «Ponían» mantiene el carácter funcional y repetido de la escena.
- source_word: הַכֵּלִים
  english_pob_choice: the implements
  chosen_spanish: los utensilios
  alternatives_spanish:
  - los utensilios
  - los instrumentos
  - las herramientas
  lexicon: HALOT
  rationale: En este contexto de sacrificio, כֵּלִים son los objetos usados para la preparación y manipulación del sacrificio. «Utensilios» es comprensible y suficientemente amplio; «instrumentos» podría sonar más técnico, y «herramientas» menos natural.
- source_word: אֲשֶׁר יִשְׁחֲטוּ
  english_pob_choice: with which they slaughtered
  chosen_spanish: con los cuales degollaban
  alternatives_spanish:
  - con los cuales degollaban
  - con los cuales inmolaban
  - con los cuales sacrificaban
  lexicon: HALOT
  rationale: El verbo שׁחט se refiere al acto de matar ritualmente mediante degüello. «Degollaban» conserva la fuerza concreta del verbo mejor que «inmolaban», que puede sonar más eclesiástico o abstracto.
- source_word: הָעוֹלָה
  english_pob_choice: the burnt offering
  chosen_spanish: el holocausto
  alternatives_spanish:
  - el holocausto
  - la ofrenda quemada
  lexicon: HALOT
  rationale: Se mantiene la misma elección terminológica que para לָעוֹלָה, para preservar consistencia. En español bíblico, «holocausto» comunica la ofrenda totalmente consumida por el fuego.
- source_word: וְהַזָּבַח
  english_pob_choice: and the sacrifice
  chosen_spanish: y el sacrificio
  alternatives_spanish:
  - y el sacrificio
  - y la víctima
  - y la ofrenda
  lexicon: HALOT
  rationale: Se conserva la amplitud semántica de זֶבַח como término general de sacrificio, tal como hizo el POB inglés. «Sacrificio» evita decidir prematuramente por una clase cultual más específica.
theological_decisions:
- issue: Alcance de זֶבַח
  english_pob_reading: Render broadly as 'the sacrifice' rather than specifically 'the peace offering.'
  chosen_spanish_reading: Traducir ampliamente como «el sacrificio» y no como «la ofrenda de paz».
  alternative_spanish_readings:
  - la ofrenda de paz
  - el sacrificio de comunión
  rationale: El hebreo permite un sentido general de sacrificio, y el contexto no obliga a una categoría más precisa. Mantener «el sacrificio» preserva la tensión textual y evita importar una clasificación cultual no explicitada aquí.
  doctrine_reference: Principio de primacía del hebreo original y preservación de la ambigüedad controlada del texto fuente.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió de «would place» a «placed» por una lectura más natural del hebreo en contexto. La redacción española sigue esa decisión con un imperfecto descriptivo («ponían»), adecuado para una instrucción visionaria y arquitectónica, sin forzar un tiempo narrativo más puntual.
  spanish_consistency_notes:
  - Se mantiene «holocausto» para לָעוֹלָה y הָעוֹלָה para asegurar consistencia terminológica.
  - Se conserva «sacrificio» para זֶבַח según la decisión inglesa de amplitud semántica.
  - Se evita «SEÑOR» u այլ máscara devocional porque el versículo no contiene el tetragrámaton.
  - La construcción dimensional se conserva con unidades antiguas («codo») en lugar de convertir medidas.
