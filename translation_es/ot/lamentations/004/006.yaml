    text: 'O: «la culpa de la hija de mi pueblo es mayor que la culpa de Sodoma»; el hebreo עָוֹן puede abarcar iniquidad, culpa o la pena asociada.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo difícil; también puede entenderse: «y no hubo manos sobre ella» o «y no la tocaron manos».'
    reason: alternative_reading
  revision_rationale: Se corrigió la nota [a] para reflejar con fidelidad la alternativa documentada en el POB inglés, preservando la personificación 'la hija de mi pueblo'. Además, se cambió 'fue destruida' por 'fue arrasada' para acercarse mejor a הַהֲפוּכָה y al rationale intertextual de 'overthrown', manteniendo un español natural y eclesialmente legible. La cláusula final se dejó en una forma comprensible con nota de ambigüedad, sin forzar una interpretación única.
