id: ROM.13.6
reference: Romans 13:6
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: διὰ τοῦτο γὰρ καὶ φόρους τελεῖτε, λειτουργοὶ γὰρ θεοῦ εἰσιν εἰς αὐτὸ τοῦτο προσκαρτεροῦντες.
base_translation:
  language: en
  yaml_path: translation/nt/romans/013/006.yaml
  text: For because of this you also pay taxes, for they are God's ministers, devoting themselves to this very thing.
translation:
  language: ko
  text: 이런 까닭에 여러분이 세금도 바치는 것입니다. 그들은 바로 이 일에 전념하는 하나님의 사역자[a]들입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「공직자」. 헬라어 λειτουργός는 공적 직무를 수행하는 자를 가리키며, 칠십인역에서는 종교적 봉사에도 사용된다.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: because of this
  chosen_korean: 이런 까닭에
  alternatives_korean:
  - 이 때문에
  - 그러므로
  lexicon: BDAG
  rationale: 앞 절(양심 때문에도 복종)로부터의 추론을 자연스러운 한국어 인과 연결로 옮긴다.
- source_word: φόρους τελεῖτε
  english_pob_choice: you pay taxes
  chosen_korean: 세금을 바치다
  alternatives_korean:
  - 세금을 내다
  - 세금을 납부하다
  lexicon: BDAG
  rationale: φόρος는 직접세, τελέω는 의무 이행. 「바치다」가 의무성과 공경의 뉘앙스를 함께 살린다.
- source_word: λειτουργοὶ θεοῦ
  english_pob_choice: God's ministers
  chosen_korean: 하나님의 사역자
  alternatives_korean:
  - 하나님의 공직자
  - 하나님의 일꾼
  lexicon: BDAG
  rationale: λειτουργός는 공적 직무 수행자. 직전 13:4의 διάκονος(일꾼)와 어휘적으로 구분하여 「사역자」로 옮겨 공적·종교적 무게를 살린다.
- source_word: εἰς αὐτὸ τοῦτο προσκαρτεροῦντες
  english_pob_choice: devoting themselves to this very thing
  chosen_korean: 바로 이 일에 전념하는
  alternatives_korean:
  - 이 일에 끊임없이 헌신하는
  - 바로 이것을 위해 힘쓰는
  lexicon: BDAG
  rationale: προσκαρτερέω는 끈질긴 전념·고수. αὐτὸ τοῦτο의 강조를 「바로 이 일」로 살린다.
