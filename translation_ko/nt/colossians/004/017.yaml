id: COL.4.17
reference: Colossians 4:17
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ εἴπατε Ἀρχίππῳ· Βλέπε τὴν διακονίαν ἣν παρέλαβες ἐν κυρίῳ, ἵνα αὐτὴν πληροῖς.
base_translation:
  language: en
  yaml_path: translation/nt/colossians/004/017.yaml
  text: "And tell Archippus, \u201CSee to the ministry that you received in the Lord, so that you may fulfill it.\u201D"
translation:
  language: ko
  text: 그리고 아킵보에게 「주 안에서 받은 직분[a]을 잘 살펴 이루도록 하시오」라고 전하십시오.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「주께로부터 받은 직분」. 헬라어 ἐν κυρίῳ는 「주 안에서」(영역) 또는 「주로부터」(근원)의 어감을 함께 담을 수 있다.
    reason: alternative_reading
lexical_decisions:
- source_word: εἴπατε Ἀρχίππῳ
  english_pob_choice: tell Archippus
  chosen_korean: 아킵보에게 ... 전하십시오
  alternatives_korean:
  - 아킵보에게 말하라
  lexicon: BDAG
  rationale: 한국 교회의 정립된 음역 「아킵보」. 합쇼체 명령 「전하십시오」.
- source_word: Βλέπε τὴν διακονίαν
  english_pob_choice: See to the ministry
  chosen_korean: 직분을 잘 살펴
  alternatives_korean:
  - 직무를 주의하여
  - 사역을 살펴
  lexicon: BDAG
  rationale: διακονία는 본 문맥에서 「직분」(맡겨진 책임). 「잘 살피다」가 βλέπω의 「유의·돌봄」을 살린다.
- source_word: ἣν παρέλαβες ἐν κυρίῳ
  english_pob_choice: that you received in the Lord
  chosen_korean: 주 안에서 받은
  alternatives_korean:
  - 주께로부터 받은
  lexicon: BDAG
  rationale: ἐν κυρίῳ를 「주 안에서」(한국 교회의 정립된 표현)로 옮기고, 「주로부터」 가능성은 각주.
- source_word: ἵνα αὐτὴν πληροῖς
  english_pob_choice: so that you may fulfill it
  chosen_korean: 이루도록 하시오
  alternatives_korean:
  - 그것을 완수하도록
  - 그것을 다 행하도록
  lexicon: BDAG
  rationale: πληρόω의 「완수·이룸」을 「이루다」로 옮긴다. 인용 안에 합쇼체보다는 자연스러운 「하시오」체.
