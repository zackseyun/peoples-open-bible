base_translation:
  language: en
  yaml_path: translation/ot/proverbs/003/033.yaml
  text: Yahweh’s curse is on the house of the wicked[b][a], but he blesses the dwelling of the righteous.
  footnotes:
  - marker: a
    text: Or 'in the house of the wicked'; the Hebrew preposition can be rendered more literally, but 'is on the house of' better conveys the sense of a curse resting upon it.
    reason: lexical_alternative
  - marker: b
    text: Or 'abode' or 'home' for 'dwelling.'
    reason: lexical_alternative
