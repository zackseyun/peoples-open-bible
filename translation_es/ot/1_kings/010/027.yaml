translation:
  language: es
  text: El rey hizo la plata en Jerusalén tan común como las piedras, e hizo los cedros tan abundantes como los sicómoros[a] que están en la Sefelá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Hebreo 'sicómoros', es decir, higueras sicómoro.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתֵּן / נָתַן
  english_pob_choice: made ... as common / made ... as plentiful
  chosen_spanish: hizo que ... fuera tan común / hizo que ... fueran tan abundantes
  alternatives_spanish:
  - puso
  - dio
  - hizo ... común
  lexicon: HALOT
  rationale: En este dicho idiomático, נתן expresa causar abundancia o carácter generalizado, no simplemente 'dar'. El español natural transmite mejor la fuerza causal con 'hizo que', conservando el comparativo de abundancia del hebreo y del inglés POB.
- source_word: הַמֶּלֶךְ
  english_pob_choice: The king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey Salomón
  lexicon: HALOT
  rationale: El hebreo dice solo 'el rey'. En español conviene mantener la referencia explícita del texto sin añadir el nombre propio, aunque el contexto identifique a Salomón.
- source_word: הַכֶּסֶף
  english_pob_choice: silver
  chosen_spanish: la plata
  alternatives_spanish:
  - la plata, el dinero
  lexicon: HALOT
  rationale: כֶּסֶף es el metal precioso como mercancía. 'La plata' conserva el valor material y resulta natural en español bíblico contemporáneo.
- source_word: בִּירוּשָׁלִַם
  english_pob_choice: in Jerusalem
  chosen_spanish: en Jerusalén
  alternatives_spanish:
  - dentro de Jerusalén
  lexicon: HALOT
  rationale: Es una simple localización geográfica; la forma española estándar es directa y clara.
- source_word: כָּאֲבָנִים
  english_pob_choice: as stones
  chosen_spanish: tan común como las piedras
  alternatives_spanish:
  - como piedras
  - tan abundante como piedras
  lexicon: HALOT
  rationale: El prefijo comparativo expresa una comparación de frecuencia/abundancia. En español, 'tan común como las piedras' comunica con naturalidad que la plata se volvió algo ordinario, no que equivaliera literalmente a piedras.
- source_word: הָאֲרָזִים
  english_pob_choice: cedars
  chosen_spanish: los cedros
  alternatives_spanish:
  - la madera de cedro
  - los árboles de cedro
  lexicon: HALOT
  rationale: '''Cedros'' preserva el sustantivo plural del hebreo. Aunque puede implicar madera de cedro, el texto habla de los cedros como recurso abundante.'
- source_word: כַּשִּׁקְמִים
  english_pob_choice: as the sycamore trees
  chosen_spanish: tan abundantes como los sicómoros
  alternatives_spanish:
  - como los sicómoros
  - tan abundantes como las higueras sicómoro
  lexicon: HALOT
  rationale: שִׁקְמִים refiere a los sicómoros del Levante, específicamente los higuerales sicómoro. 'Sicómoros' es breve y fiel; el contexto de abundancia exige explicitar el paralelo con 'tan abundantes'.
- source_word: אֲשֶׁר בַּשְּׁפֵלָה
  english_pob_choice: that are in the Shephelah
  chosen_spanish: que están en la Sefelá
  alternatives_spanish:
  - que están en la llanura baja
  - que están en la región de la Sefelá
  lexicon: HALOT
  rationale: '''Sefelá'' preserva el nombre geográfico técnico del hebreo, siguiendo la decisión del POB de no reducirlo solo a ''lowland''. La frase relativa mantiene la ubicación regional de los sicómoros.'
- source_word: לָרֹב
  english_pob_choice: as plentiful
  chosen_spanish: tan abundantes
  alternatives_spanish:
  - en abundancia
  - muy numerosos
  lexicon: HALOT
  rationale: לָרֹב expresa gran cantidad. En español, 'tan abundantes' se integra bien con la comparación y evita un giro más pesado.
translation_notes:
  revision_awareness: El borrador sigue el valor idiomático de נתן como causativo de abundancia, coherente con la lectura auditada del POB en inglés. Se conserva el paralelismo comparativo del hebreo y el nombre geográfico 'Sefelá' conforme al criterio documental del equipo en inglés.
  spanish_consistency_notes:
  - Se mantiene 'la plata' como sustantivo de materia, no 'el dinero'.
  - Se preserva el topónimo técnico 'Sefelá' y se aclara en nota la alternativa 'llanura baja'.
  - '''Sicómoros'' conserva el término bíblico; la nota aclara la referencia botánica.'
  - El texto evita añadir 'Salomón' para respetar la formulación explícita del hebreo.
  - La estructura comparativa se adapta al español para que la frase sea publicable y natural sin perder la fuerza de abundancia.
