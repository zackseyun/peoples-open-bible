  to: Yo me acosté y dormí; desperté[a], porque Yahvé me sostiene[b].
  rationale: 'La traducción principal es sustancialmente fiel y natural, pero las notas al pie deben realinearse con las decisiones léxicas auditadas del inglés: la alternativa corresponde a «desperté», no a «dormí», y debe añadirse la alternativa de «me sostiene». No se requiere reescritura mayor del verso, solo corrección editorial y de trazabilidad léxica.'
