translation:
  language: es
  text: Los hijos de Israel regresaron de perseguir a los filisteos[a], y saquearon sus campamentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de ir tras los filisteos, y saquearon su campamento(s)».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיָּשֻׁבוּ
  english_pob_choice: returned
  chosen_spanish: regresaron
  alternatives_spanish:
  - volvieron
  - retornaron
  lexicon: HALOT
  rationale: שׁוּב expresa regreso o vuelta. En español, «regresaron» comunica con naturalidad el movimiento de vuelta después de la persecución, sin perder el valor básico del verbo hebreo.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: The sons of Israel
  chosen_spanish: Los hijos de Israel
  alternatives_spanish:
  - Los israelitas
  - El pueblo de Israel
  lexicon: HALOT
  rationale: Se conserva la forma masculina plural literal del hebreo para reflejar con transparencia la expresión de pertenencia pactual. «Israelitas» sería más idiomático, pero menos cercano al texto fuente.
- source_word: מִדְּלֹק אַחֲרֵי פְלִשְׁתִּים
  english_pob_choice: from pursuing the Philistines
  chosen_spanish: de perseguir a los filisteos
  alternatives_spanish:
  - de ir tras los filisteos
  - de ir persiguiendo a los filisteos
  lexicon: HALOT
  rationale: La construcción con דְּלֹק + אַחֲרֵי expresa persecución activa. «De perseguir» es natural en español y conserva la fuerza verbal del seguimiento hostil.
- source_word: פְלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - los filisteos
  lexicon: HALOT
  rationale: Nombre étnico convencional en español bíblico y actual.
- source_word: וַיָּשֹׁסּוּ
  english_pob_choice: they plundered
  chosen_spanish: saquearon
  alternatives_spanish:
  - despojaron
  - saquearon y despojaron
  lexicon: HALOT
  rationale: שׁסס tiene el sentido de despojar o saquear en contexto militar. «Saquearon» es claro y mantiene la violencia económica del término.
- source_word: מַחֲנֵיהֶם
  english_pob_choice: their camps
  chosen_spanish: sus campamentos
  alternatives_spanish:
  - su campamento
  - sus tiendas
  lexicon: HALOT
  rationale: El plural constructo con sufijo puede referirse a los campamentos del enemigo. «Sus campamentos» refleja mejor el plural hebreo que un singular genérico.
translation_notes:
  revision_awareness: The English POB text was unchanged on the latest revision pass and the cross-check summary reports high agreement with no issues. This Spanish draft follows the same source-grounded decisions while expressing them in natural modern Spanish.
  spanish_consistency_notes:
  - Se mantiene «hijos de Israel» por transparencia al hebreo, aunque «israelitas» sería una equivalencia idiomática posible.
  - Se traduce el participio verbal con un infinitivo dependiente de «de» para reproducir el valor de la construcción hebrea sin forzar el español.
  - El plural «campamentos» conserva la posibilidad semántica del hebreo frente a una lectura singular demasiado estrecha.
