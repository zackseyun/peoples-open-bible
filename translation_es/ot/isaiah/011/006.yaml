revisions:
- from: Y el lobo morará con el cordero[a], y el leopardo se echará con el cabrito; y el becerro, el cachorro de león y el novillo gordo[b][c][d] estarán juntos, y un niño pequeño los guiará.
  to: Y el lobo morará con el cordero, y el leopardo se echará con el cabrito[a]; y el becerro, el león joven[b] y el becerro cebado estarán juntos, y un niño pequeño[d] los guiará.
  rationale: Se corrigen los anclajes de notas para que correspondan a las alternativas conservadas por el expediente POB; se restituye la prioridad de 'león joven' sobre 'cachorro de león'; y se ajusta מְרִיא a 'becerro cebado' para reflejar mejor 'fattened calf'. No se añade nota para 'morará/sojornará' porque el sistema exige que todo pie tenga anclaje textual claro y el expediente español actual había colocado mal [a]; la revisión prioriza un aparato limpio y fiel en español. Si se quisiera conservar también esa alternativa verbal, habría que anclarla en 'morará[a]' y reenumerar todas las notas.
  reviewer_model: gpt-5.4
