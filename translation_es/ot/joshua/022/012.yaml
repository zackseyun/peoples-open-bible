translation:
  language: es
  text: Cuando los hijos de Israel[a] oyeron[b], toda la congregación de los hijos de Israel se reunió en Silo para subir contra ellos a hacer guerra[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O también «los israelitas» por «los hijos de Israel». El hebreo dice literalmente «hijos de Israel», y esa redacción se conserva aquí para transparentar la fuente.
    reason: lexical_alternative
  - marker: b
    text: «Oyeron» mantiene el valor básico de שׁמע en la secuencia narrativa; también podría traducirse «se enteraron», pero eso explicita más de lo que el hebreo dice de forma directa.
    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: «para subir contra ellos para la guerra», un giro idiomático estándar de acción militar. En español se expresa como «subir contra ellos a hacer guerra» para conservar el sentido con mejor naturalidad.'
    reason: source_note
lexical_decisions:
- source_word: וַֽיִּשְׁמְע֖וּ
  english_pob_choice: heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - escucharon
  - se enteraron
  lexicon: HALOT
  rationale: שׁמע en esta narración funciona de manera directa como recepción de información; «oyeron» conserva la sencillez del hebreo y es natural en español. «Se enteraron» explicita más el resultado, pero añade interpretación.
- source_word: בְּנֵ֣י יִשְׂרָאֵ֑ל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Israel
  lexicon: HALOT
  rationale: Se conserva la expresión literal del hebreo, como en la POB inglesa, en vez de normalizarla a «los israelitas». Esto mantiene la transparencia de la fuente y el paralelo interno del versículo.
- source_word: וַ/יִּקָּ֨הֲל֜וּ
  english_pob_choice: assembled
  chosen_spanish: se reunió
  alternatives_spanish:
  - se congregó
  - se juntó
  lexicon: HALOT
  rationale: קהל expresa reunirse como cuerpo. «Se reunió» es natural y suficientemente formal; «se congregó» sería posible, pero en español puede sonar más eclesiástico que cívico/tribal.
- source_word: כָּל עֲדַ֤ת בְּנֵֽי יִשְׂרָאֵל֙
  english_pob_choice: the whole congregation of the sons of Israel
  chosen_spanish: toda la congregación de los hijos de Israel
  alternatives_spanish:
  - toda la asamblea de los hijos de Israel
  - toda la congregación de Israel
  lexicon: HALOT
  rationale: עֵדָה suele designar la congregación reunida. «Congregación» preserva el matiz colectivo; «asamblea» también es válida, pero «congregación» sigue mejor la terminología tradicional sin perder el sentido comunitario.
- source_word: שִׁלֹ֔ה
  english_pob_choice: Shiloh
  chosen_spanish: Silo
  alternatives_spanish:
  - Siloé
  - Shiloh
  lexicon: HALOT
  rationale: El topónimo bíblico se adapta a la forma española tradicional «Silo», ampliamente reconocible y estable en español bíblico. «Shiloh» preservaría la transliteración, pero no es la forma española más usual.
- source_word: לַ/עֲל֥וֹת
  english_pob_choice: to go up
  chosen_spanish: para subir
  alternatives_spanish:
  - para ir a
  - para avanzar
  lexicon: HALOT
  rationale: עלה conserva el hebreo idiomático de movimiento ascendente. En español, «subir» mantiene la imagen sin sobreexplicar; el contexto militar queda completado por la frase siguiente.
- source_word: עֲלֵי/הֶ֖ם
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - sobre ellos
  - en su contra
  lexicon: HALOT
  rationale: En este contexto hostil, la preposición על con עלה comunica dirección adversativa. «Contra ellos» expresa de forma clara el valor militar del giro.
- source_word: לַ/צָּבָֽא
  english_pob_choice: for war
  chosen_spanish: para la guerra
  alternatives_spanish:
  - para la batalla
  - para el combate
  lexicon: HALOT
  rationale: צָבָא aquí alude a acción militar hostil. «Para la guerra» reproduce bien la frase idiomática con la naturalidad necesaria en español.
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y sin revisiones aplicadas; se mantiene la lectura base de la POB inglesa, con ajustes naturales al español y sin introducir cambios textuales sustantivos.
  spanish_consistency_notes:
  - Se conservó «hijos de Israel» de forma uniforme en ambas ocurrencias para reflejar la repetición del hebreo.
  - Se eligió «Silo» como forma española tradicional del topónimo, coherente con un registro bíblico estándar en español.
  - Se mantuvo la estructura verbal y militar del hebreo sin convertirla en una paráfrasis más interpretativa.
