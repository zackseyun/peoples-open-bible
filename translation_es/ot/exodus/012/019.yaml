translation:
  language: es
  text: Durante siete días no se hallará levadura en sus casas, porque todo el que coma cualquier cosa leudada, esa persona[a] será cortada de la congregación[c] de Israel, sea forastero[b] o natural de la tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esa alma será cortada». El modismo hebreo puede referirse a expulsión, muerte o juicio divino, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «residente forastero» para «forastero».
    reason: lexical_alternative
  - marker: c
    text: O «asamblea» o «comunidad» para «congregación».
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְעַת יָמִים
  english_pob_choice: For seven days
  chosen_spanish: Durante siete días
  alternatives_spanish:
  - Por siete días
  - Siete días
  lexicon: HALOT
  rationale: La expresión hebrea marca duración; en español, «Durante siete días» transmite con naturalidad el intervalo temporal sin perder la fuerza adverbial del original.
- source_word: שְׂאֹר
  english_pob_choice: leaven
  chosen_spanish: levadura
  alternatives_spanish:
  - levadura fermentante
  - masa fermentada
  lexicon: HALOT
  rationale: El término apunta al agente de fermentación prohibido en el contexto ritual. «Levadura» es el equivalente bíblico más claro en español y conserva el valor terminológico.
- source_word: לֹא יִמָּצֵא
  english_pob_choice: is to be found
  chosen_spanish: no se hallará
  alternatives_spanish:
  - no se encontrará
  - no deberá hallarse
  lexicon: HALOT
  rationale: El nifal expresa prohibición de presencia o hallazgo. «No se hallará» mantiene el tono impersonal y legal, cercano al valor del hebreo y al inglés auditado.
- source_word: בְּבָתֵּיכֶם
  english_pob_choice: in your houses
  chosen_spanish: en sus casas
  alternatives_spanish:
  - en sus hogares
  - en sus viviendas
  lexicon: HALOT
  rationale: Se conserva el plural concreto de «casas», que en este marco legal se refiere a las moradas de la comunidad. Se emplea «sus» por el plural colectivo dirigido a Israel.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la prohibición. «Porque» es transparente en español y refleja la función causal de la partícula.
- source_word: כָּל אֹכֵל
  english_pob_choice: whoever eats
  chosen_spanish: todo el que coma
  alternatives_spanish:
  - quien coma
  - cualquiera que coma
  lexicon: HALOT
  rationale: La construcción participial con כָּל tiene alcance genérico. «Todo el que coma» conserva la universalidad y el matiz legal del hebreo.
- source_word: מַחְמֶצֶת
  english_pob_choice: anything leavened
  chosen_spanish: algo leudado
  alternatives_spanish:
  - algo fermentado
  - cualquier cosa leudada
  lexicon: HALOT
  rationale: La palabra no se limita al pan, sino a cualquier cosa afectada por la fermentación/levadura. «Algo leudado» reproduce ese campo semántico de forma compacta.
- source_word: וְנִכְרְתָה הַנֶּפֶשׁ הַהִוא
  english_pob_choice: that person shall be cut off
  chosen_spanish: esa persona será cortada
  alternatives_spanish:
  - esa persona será excluida
  - esa alma será cortada
  lexicon: HALOT
  rationale: Se mantiene la fórmula pactual «será cortada» para preservar la fuerza idiomática de כרת sin resolverla en una explicación interpretativa. «Persona» refleja נפש en este contexto como individuo, como en el audit trail inglés.
- source_word: מֵעֲדַת יִשְׂרָאֵל
  english_pob_choice: from the congregation of Israel
  chosen_spanish: de la congregación de Israel
  alternatives_spanish:
  - de la asamblea de Israel
  - de la comunidad de Israel
  lexicon: HALOT
  rationale: «Congregación» mantiene el registro formal y comunitario del término עֵדָה en un contexto legal-covenantal, siguiendo la decisión inglesa documentada.
- source_word: בַּגֵּר
  english_pob_choice: a sojourner
  chosen_spanish: forastero
  alternatives_spanish:
  - residente forastero
  - advenedizo
  lexicon: HALOT
  rationale: El hebreo designa al no nativo que reside entre el pueblo. «Forastero» es más natural en español bíblico contemporáneo que «sojourner» literal, sin perder la distinción social.
- source_word: וּבְאֶזְרַח הָאָרֶץ
  english_pob_choice: a native of the land
  chosen_spanish: natural de la tierra
  alternatives_spanish:
  - nativo de la tierra
  - nacido en la tierra
  lexicon: HALOT
  rationale: Se preserva el contraste con el forastero mediante una fórmula breve y digna. «Natural de la tierra» reproduce bien la oposición de estatus del original.
theological_decisions:
- issue: Sentido de la sanción 'será cortada'
  english_pob_reading: Retain the idiom 'shall be cut off' without specifying whether it means death, expulsion, or divine judgment.
  chosen_spanish_reading: Mantener «será cortada» sin especificar si implica muerte, expulsión o juicio divino.
  alternative_spanish_readings:
  - será eliminada
  - será excluida de la comunidad
  - morirá
  rationale: La expresión hebrea es una fórmula de sanción de alianza cuya concreción exacta depende del contexto. Conservar el modismo en español preserva la tensión teológica y legal, en lugar de resolverla de antemano.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo entre revisión y texto base; no se registraron cambios en la última pasada y la redacción inglesa auditada permaneció sin modificaciones.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino en todo el proyecto; este versículo no lo contiene.
  - Se conserva el contraste social entre forastero y natural de la tierra, sin introducir categorías modernas de ciudadanía.
  - «Será cortada» retiene la ambigüedad pactual del hebreo y coincide con la decisión teológica auditada en inglés.
  - 'La puntuación sigue el ritmo legal del texto: mandato, razón, sanción y cláusula inclusiva final.'
