translation:
  language: es
  text: Mejor vivir en un rincón de la azotea que con una mujer contenciosa en una casa compartida[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una casa compartida con otros»; el hebreo dice literalmente «y una casa de compañía/asociación».
    reason: lexical_alternative
lexical_decisions:
- source_word: טוֹב
  english_pob_choice: Better
  chosen_spanish: Mejor
  alternatives_spanish:
  - Es mejor
  - Más vale
  lexicon: HALOT
  rationale: En estilo proverbial, טוֹב expresa una comparación de valor; «Mejor» reproduce esa función de manera natural en español sin perder el tono sapiencial.
- source_word: לָשֶׁבֶת
  english_pob_choice: to live
  chosen_spanish: vivir
  alternatives_spanish:
  - habitar
  - sentarse
  lexicon: HALOT
  rationale: Aunque el verbo base es «sentarse», en contextos de morada significa residir o vivir. «Vivir» comunica bien la idea de permanencia en un lugar de habitación.
- source_word: עַל פִּנַּת גָּג
  english_pob_choice: on a corner of the roof
  chosen_spanish: en un rincón de la azotea
  alternatives_spanish:
  - en la esquina del techo
  - sobre un rincón del tejado
  - en un rincón del terrado
  lexicon: HALOT
  rationale: פִּנָּה es «rincón/esquina» y גָּג es la azotea o azotea/techo plano de una casa oriental. «Azotea» es claro para lectores hispanos y conserva la imagen de un espacio expuesto y estrecho.
- source_word: מֵאֵשֶׁת
  english_pob_choice: than with a ... wife
  chosen_spanish: que con una mujer
  alternatives_spanish:
  - que con una esposa
  - que junto a una esposa
  lexicon: HALOT
  rationale: La preposición comparativa marca el contraste «más que». En español la relación se expresa naturalmente con «que con». «Mujer» refleja el término genérico del hebreo y evita imponer un matiz más técnico de «esposa» donde el proverbio habla del conflicto doméstico.
- source_word: מִדְיָנִים
  english_pob_choice: quarrelsome
  chosen_spanish: pendenciera
  alternatives_spanish:
  - discutidora
  - litigiosa
  - peleadora
  lexicon: HALOT
  rationale: El sustantivo plural alude a pleitos y contiendas; como adjetivo, «pendenciera» transmite el rasgo habitual de causar riñas de forma idiomática y fuerte en español.
- source_word: וּבֵית חָבֶר
  english_pob_choice: in a shared house
  chosen_spanish: en una casa compartida
  alternatives_spanish:
  - en una casa en común
  - en una casa de compañía
  - en una casa compartida con otros
  lexicon: HALOT
  rationale: חָבֶר apunta a asociación, compañía o vínculo compartido. «Casa compartida» mantiene el sentido de convivencia/comunidad que el POB inglés dejó explícito, sin volverlo demasiado interpretativo.
translation_notes:
  revision_awareness: Se sigue la lectura estable del texto hebreo masorético y la decisión inglesa POB de tomar el proverbio como una comparación de valor entre aislamiento incómodo y convivencia conflictiva; no se requieren cambios textuales ni revisiones recientes.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «Casa compartida» conserva la ambigüedad útil de חָבֶר entre compañía y convivencia común.
  - «Pendenciera» reproduce el tono fuerte del hebreo sin pasar a un registro excesivamente coloquial.
