translation:
  language: es
  text: Alábenlo con pandero y danza; alábenlo con cuerdas[a] y flauta[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con instrumentos de cuerda».
    reason: lexical_alternative
  - marker: b
    text: Tradicionalmente «y órgano», pero el hebreo probablemente se refiere a un instrumento de viento, como una flauta o flauta de caña, y no al órgano moderno.
    reason: lexical_alternative
lexical_decisions:
- source_word: הַֽלְלוּהוּ
  english_pob_choice: Praise him
  chosen_spanish: Alábenlo
  alternatives_spanish:
  - Péguenle alabanza
  - Alábenlo ustedes
  lexicon: HALOT
  rationale: El hebreo es un imperativo plural con sufijo de 3.ª persona masculina singular. En español, «alábenlo» conserva el mandato comunitario y el objeto directo de forma natural y reverente.
- source_word: בְּתֹף
  english_pob_choice: with tambourine
  chosen_spanish: con pandero
  alternatives_spanish:
  - con tamborín
  - con tambor
  lexicon: HALOT
  rationale: תֹּף designa un instrumento de percusión portátil, tradicionalmente un tambor de marco. «Pandero» es el equivalente español más asentado y no desplaza el sentido hacia un tambor genérico.
- source_word: וּמָחוֹל
  english_pob_choice: and dancing
  chosen_spanish: y danza
  alternatives_spanish:
  - y baile
  - y danzando
  lexicon: HALOT
  rationale: מָחוֹל puede referirse al acto de danzar o a una danza. «Danza» mantiene el sustantivo de la lista instrumental/expresiva y evita convertirlo en una simple forma verbal.
- source_word: בְּמִנִּים
  english_pob_choice: with strings
  chosen_spanish: con cuerdas
  alternatives_spanish:
  - con instrumentos de cuerda
  - con cuerdas musicales
  lexicon: HALOT
  rationale: מִנִּים alude a instrumentos de cuerda. «Cuerdas» sigue la brevedad del original y el sentido colectivo de la categoría instrumental.
- source_word: וְעוּגָב
  english_pob_choice: and pipe
  chosen_spanish: y flauta
  alternatives_spanish:
  - y chirimía
  - y flauta de caña
  - y tubo
  lexicon: HALOT
  rationale: עוּגָב probablemente designa un instrumento de viento, quizá una flauta o flauta de caña; «flauta» comunica bien en español sin imponer el antiguo «órgano», que sería engañoso para el lector moderno.
translation_notes:
  revision_awareness: El texto hebreo y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas; el español sigue esa lectura sin introducir cambios interpretativos.
  spanish_consistency_notes:
  - Se mantiene un registro litúrgico claro y contemporáneo.
  - Se evita «SEÑOR» porque el verso no contiene el nombre divino.
  - Se conserva la secuencia de instrumentos y la tensión léxica entre categorías sonoras e instrumentos concretos.
