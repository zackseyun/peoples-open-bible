theological_decisions:
- issue: Meaning of ענה in the final clause
  chosen_reading: because you answer them
  alternative_readings:
  - because you afflict them
  - because you humble them
  rationale: 'The immediate context is petition and response: drought, prayer toward the temple, acknowledgment of God''s name, and turning from sin. Rendering ענה as ''answer'' preserves that prayer-response logic. The alternative ''afflict/humble'' is lexically possible but less fitting in this sequence; it is preserved in a footnote for auditability.'
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
