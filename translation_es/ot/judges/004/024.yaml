translation:
  language: es
  text: Y la mano de los hijos de Israel iba fortaleciéndose[a] contra Jabín, rey de Canaán, hasta que destruyeron[b] a Jabín, rey de Canaán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “se iba haciendo más fuerte” o “iba creciendo en fuerza”. El hebreo combina una forma verbal con un intensificador que expresa aumento progresivo.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, “cortaron” o “cortaron de raíz”. Aquí significa que lo destruyeron o lo eliminaron de manera decisiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתֵּלֶךְ
  english_pob_choice: went on
  chosen_spanish: fue
  alternatives_spanish:
  - continuó
  - siguió adelante
  lexicon: HALOT
  rationale: En español, el verbo literal ‘ir’ conserva la imaginería verbal hebrea sin sonar forzado; la idea de continuidad queda reforzada por la construcción siguiente. Evito ‘anduvo’ o una paráfrasis más libre para no perder la forma idiomática del texto.
- source_word: יַד
  english_pob_choice: hand
  chosen_spanish: mano
  alternatives_spanish:
  - poder
  - fuerza
  - control
  lexicon: HALOT
  rationale: Mantengo la metáfora corporal del hebreo. ‘Mano’ permite conservar la expresión idiomática ‘la mano de...’ y su valor de agencia o poder sin reemplazarla prematuramente por una explicación.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - el pueblo de Israel
  lexicon: HALOT
  rationale: Conservo el plural masculino del hebreo y la formulación más cercana al original. ‘Hijos de Israel’ es transparente en español bíblico y evita sustituir la expresión por un equivalente más interpretativo.
- source_word: הָלוֹךְ וְקָשָׁה
  english_pob_choice: growing stronger
  chosen_spanish: fue haciéndose más fuerte
  alternatives_spanish:
  - iba fortaleciéndose
  - crecía en fuerza
  - fue haciéndose más severa
  lexicon: HALOT
  rationale: El hebreo expresa un incremento progresivo mediante una construcción idiomática intensiva. ‘Fue haciéndose más fuerte’ comunica bien el crecimiento de la presión/potencia sin perder el matiz de progreso continuo. No sigo una equivalencia demasiado literal de ‘dura/severa’ porque el contexto de dominio sobre Jabín favorece ‘más fuerte’ y la revisión inglesa también corrigió hacia ‘stronger’.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - en contra de
  lexicon: HALOT
  rationale: En este contexto hostil, ‘contra’ expresa mejor la orientación adversarial del hebreo que una preposición más neutra.
- source_word: הִכְרִיתוּ
  english_pob_choice: cut off
  chosen_spanish: destruyeron
  alternatives_spanish:
  - cortaron de raíz
  - eliminaron
  - exterminaron
  lexicon: HALOT
  rationale: El hebreo literalmente ‘cortaron’ puede implicar la eliminación decisiva de un enemigo. En español, ‘destruyeron’ comunica ese resultado consumado con mayor claridad narrativa. Evito ‘cortaron’ en el texto principal para no sonar ambiguo, aunque el valor literal se conserva en la nota.
theological_decisions:
- issue: Cómo rendir la progresión de poder/ presión de Israel sobre Jabín
  english_pob_reading: The hand of the sons of Israel went on, growing stronger against Jabin king of Canaan.
  chosen_spanish_reading: La mano de los hijos de Israel fue haciéndose más fuerte contra Jabín, rey de Canaán.
  alternative_spanish_readings:
  - la mano de los hijos de Israel iba creciendo en fuerza contra Jabín, rey de Canaán
  - la mano de los hijos de Israel seguía fortaleciéndose contra Jabín, rey de Canaán
  rationale: No hay una doctrina en juego directa, pero sí una tensión semántica importante entre la metáfora de ‘mano’ y la idea de incremento de poder. Conservo ambos elementos para que el lector vea el proceso de dominio creciente de Israel sin convertirlo en una explicación abstracta.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión inglesa cambió ‘growing harder’ por ‘growing stronger’ para reflejar mejor la idiomática hebrea; por eso la versión española usa ‘más fuerte’ y no una opción como ‘más severa’. Mantengo además la fórmula ‘mano de los hijos de Israel’ porque el audit trail inglés la conservó de forma deliberada.
  spanish_consistency_notes:
  - Se conservó ‘Jabín’ como transliteración del nombre propio, coherente con el resto del libro.
  - Se mantuvo ‘rey de Canaán’ dos veces, siguiendo la repetición enfática del hebreo y del inglés POB.
  - La nota al pie queda anclada solo en ‘más fuerte’ porque ahí reside la principal ambigüedad léxica.
