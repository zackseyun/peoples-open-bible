translation:
  language: es
  text: Sean borrados del libro de la vida[a], y no sean escritos con los justos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de los vivientes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Sean borrados del libro de la vida[a], y no sean escritos con los justos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: יִמָּחוּ
  english_pob_choice: Let them be blotted out
  chosen_spanish: Sean borrados
  alternatives_spanish:
  - Sean borrados de
  - Sean borrados del registro
  lexicon: HALOT
  rationale: 'El nifal imperfecto con fuerza jussiva en un contexto imprecatorio pide una petición: ''sean borrados''. ''Borrados'' conserva la imagen de eliminación de un registro escrito y suena natural en español bíblico contemporáneo.'
- source_word: מִסֵּפֶר
  english_pob_choice: out of the book
  chosen_spanish: del libro
  alternatives_spanish:
  - de la escritura
  - del rollo
  lexicon: HALOT
  rationale: סֵפֶר puede significar libro, escrito o rollo. En español, 'libro' mantiene la imagen del registro y enlaza bien con la expresión establecida 'libro de la vida'.
- source_word: חַיִּים
  english_pob_choice: of life
  chosen_spanish: de la vida
  alternatives_spanish:
  - de los vivientes
  lexicon: HALOT
  rationale: Aquí la combinación con 'libro' favorece la expresión idiomática 'libro de la vida'. Aunque 'los vivientes' es posible, 'la vida' preserva mejor el giro tradicional y el campo de registro divino.
- source_word: וְעִם
  english_pob_choice: and with
  chosen_spanish: junto con
  alternatives_spanish:
  - y con
  - entre
  lexicon: HALOT
  rationale: La preposición significa literalmente 'con'. 'Junto con' comunica en español la asociación registral con los justos sin forzar una construcción poco natural.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos y rectos
  lexicon: HALOT
  rationale: '''צדיקים'' designa a los justos/rectos. ''Los justos'' es la equivalencia más natural en español y conserva la categoría moral-covenantal.'
- source_word: אַל
  english_pob_choice: let them not
  chosen_spanish: no sean
  alternatives_spanish:
  - no sean dejados
  - que no sean
  lexicon: HALOT
  rationale: Con el imperfecto siguiente, אַל expresa una prohibición o deseo negativo. En español, la negación con subjuntivo ('no sean') reproduce adecuadamente la fuerza de ruego imprecatorio.
- source_word: יִכָּתֵבוּ
  english_pob_choice: be written
  chosen_spanish: escritos
  alternatives_spanish:
  - inscritos
  - anotados
  lexicon: HALOT
  rationale: כתב en nifal es 'ser escrito'. 'Escritos' conserva la imagen del texto y del registro. La opción 'inscritos' es posible, pero 'escritos' mantiene mayor cercanía léxica al hebreo y a la revisión del POB inglés.
theological_decisions:
- issue: Sentido de 'libro de la vida'
  english_pob_reading: Retain the metaphor 'book of life' without resolving whether it refers to temporal life, covenant membership, or final eschatological salvation.
  chosen_spanish_reading: Conservar la metáfora 'libro de la vida' sin cerrar si alude al registro de los vivos, a la pertenencia al pacto o a una realidad escatológica final.
  alternative_spanish_readings:
  - registro de los vivos
  - libro de salvación
  rationale: El hebreo permite un registro divino asociado con vida/vivientes, y el uso bíblico posterior amplía el eco teológico. La traducción preserva esa tensión en vez de reducirla a una sola interpretación.
  doctrine_reference: Translation philosophy §3
- issue: Fuerza del ruego imprecatorio
  english_pob_reading: Translate as a petition/wish ('Let them...') rather than as a prediction.
  chosen_spanish_reading: Traducirlo como ruego o deseo negativo, no como predicción.
  alternative_spanish_readings:
  - Serán borrados
  - Queden borrados
  rationale: Las formas verbales funcionan como jussivos en una serie de imprecaciones. El subjuntivo exhortativo en español mantiene el carácter de petición sin convertirlo en simple descripción futura.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió 'written' sobre 'recorded' para acercarse mejor al verbo hebreo כתב y a la metáfora del libro. Por eso la versión española usa 'escritos' y no un equivalente más interpretativo como 'anotados' o 'registrados'.
  spanish_consistency_notes:
  - Se mantuvo 'libro de la vida' como fórmula estable por coherencia con el registro bíblico y porque el hebreo permite esa lectura idiomática.
  - Se evitó 'SEÑOR' u otra sustitución porque este versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - '''Justos'' traduce el sustantivo/adjetivo plural צדיקים sin añadir matices doctrinales no exigidos por el texto.'
