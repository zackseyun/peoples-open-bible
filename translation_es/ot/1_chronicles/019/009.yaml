revisions:
- from: Y salieron los hijos de Amón y dispusieron la batalla[a][b] a la entrada de la ciudad[c], mientras los reyes que habían venido estaban aparte, en el campo[d].
  to: Y salieron los hijos de Amón[a] y se formaron para la batalla[b] a la entrada de la ciudad[c], mientras los reyes que habían venido estaban aparte, en el campo[d].
  rationale: 'Se corrige el modismo militar principal para lograr fidelidad semántica y español natural: ''se formaron para la batalla'' expresa mejor ערך מלחמה que ''dispusieron la batalla''. También se repara la nota [a] para que preserve la alternativa léxica auditada (''los amonitas'') en lugar de repetir innecesariamente el texto principal.'
