translation:
  language: es
  text: Hazor se convertirá en una guarida de chacales[a], una desolación para siempre; no habitará allí ningún hombre[b], y ningún hijo de Adán morará como forastero en ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una morada de chacales».
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «ningún hombre ... ningún hijo de Adán»; es decir, ningún ser humano vivirá allí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיְתָה
  english_pob_choice: will become
  chosen_spanish: se convertirá
  alternatives_spanish:
  - será
  - llegará a ser
  lexicon: HALOT
  rationale: El perfecto con vav consecutivo en este contexto profético expresa resultado futuro. «Se convertirá» comunica bien el cambio de estado de Hazor, como en la lectura inglesa «will become».
- source_word: חָצוֹר
  english_pob_choice: Hazor
  chosen_spanish: Hazor
  lexicon: nombre propio
  rationale: Topónimo propio; se translitera de forma estable para mantener la referencia histórica y geográfica.
- source_word: לִמְעוֹן
  english_pob_choice: a haunt of
  chosen_spanish: una guarida de
  alternatives_spanish:
  - un lugar de
  - una morada de
  - un refugio de
  lexicon: HALOT
  rationale: מָעוֹן designa un lugar de habitación. En el contexto de una ciudad arruinada ocupada por animales salvajes, «guarida de» conserva la imagen natural en español sin volverlo demasiado literal o torpe.
- source_word: תַּנִּים
  english_pob_choice: jackals
  chosen_spanish: chacales
  alternatives_spanish:
  - dragones
  - perros salvajes
  lexicon: HALOT
  rationale: En fórmulas proféticas de ruina, el término se refiere normalmente a chacales, no a criaturas míticas. «Chacales» reproduce mejor la imagen zoológica y desoladora.
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - un yermo desolado
  - una devastación
  lexicon: HALOT
  rationale: El sustantivo expresa devastación/abandono. «Una desolación» conserva el valor nominal y el tono de fórmula profética.
- source_word: עַד עוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: Expresión idiomática en lenguaje de juicio para duración indefinida. «Para siempre» es natural y fiel al valor duradero de la frase.
- source_word: לֹא יֵשֵׁב שָׁם אִישׁ
  english_pob_choice: no man will dwell there
  chosen_spanish: no habitará allí ningún hombre
  alternatives_spanish:
  - nadie habitará allí
  - no vivirá allí ningún hombre
  lexicon: HALOT
  rationale: יָשַׁב puede significar habitar/vivir. «Habitará» funciona bien en español de registro bíblico. Se conserva «ningún hombre» para reflejar el singular masculino genérico del hebreo, en línea con la política de precisión de género del proyecto.
- source_word: וְלֹא יָגוּר בָּהּ
  english_pob_choice: and no son of man will sojourn in it
  chosen_spanish: y ningún hijo de hombre se hospedará en ella
  alternatives_spanish:
  - y ningún ser humano residirá en ella
  - y ningún hombre morará en ella
  lexicon: HALOT
  rationale: גוּר suele implicar residir como forastero o estar de paso. «Se hospedará» es una opción española que comunica la idea de permanecer como huésped/forastero, distinguiéndola de «habitar». «En ella» refleja el sufijo femenino del hebreo, referido a la ciudad.
- source_word: בֶּן אָדָם
  english_pob_choice: son of man
  chosen_spanish: hijo de hombre
  alternatives_spanish:
  - ser humano
  - mortal
  lexicon: HALOT
  rationale: Se mantiene la forma literal «hijo de hombre» para conservar el paralelismo hebreo y la tensión expresiva del original. Puede sonar menos idiomática, pero preserva la audibilidad del texto fuente.
theological_decisions:
- issue: Lenguaje humano genérico en la fórmula de juicio
  english_pob_reading: Retain 'man' and 'son of man' in the main text
  chosen_spanish_reading: Mantener «ningún hombre» y «ningún hijo de hombre» en la línea principal
  alternative_spanish_readings:
  - nadie ... ningún ser humano
  - ninguna persona ... ningún mortal
  rationale: El hebreo usa אִישׁ y בֶּן אָדָם en sentido representativo/generico. En español se conserva la forma masculina singular para no borrar esa huella del original, añadiendo nota para aclarar el sentido inclusivo implícito.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; tabla de términos controvertidos para אָדָם
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no hacía falta ningún cambio: el acuerdo con la auditoría inglesa es alto y no hubo revisiones aplicadas.'
  spanish_consistency_notes:
  - Se mantiene «Hazor» como topónimo transliterado, en concordancia con el criterio del proyecto.
  - Se conserva el paralelismo entre «no habitará» y «se hospedará» para reflejar la diferencia entre יֵשֵׁב y יָגוּר.
  - La nota al pie aclara el valor genérico de «hombre» y «hijo de hombre» sin reemplazar la forma principal del texto.
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este versículo no contiene el tetragrámaton.
