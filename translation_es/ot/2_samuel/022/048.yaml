translation:
  language: es
  text: el Dios que me da venganza[a] y hace bajar a los pueblos debajo de mí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para mí» o «por mí» para לִי.
    reason: lexical_alternative
  - marker: b
    text: O «naciones» para עַמִּים.
    reason: lexical_alternative
lexical_decisions:
- source_word: הָאֵל
  english_pob_choice: the God
  chosen_spanish: el Dios
  alternatives_spanish:
  - Dios
  lexicon: HALOT
  rationale: El hebreo tiene artículo definido con אֵל; en español, «el Dios» preserva esa definitud y el valor identificador del sintagma poético sin forzar una perífrasis más larga.
- source_word: הַנֹּתֵן
  english_pob_choice: who gives
  chosen_spanish: que me da
  alternatives_spanish:
  - que da
  - que concede
  lexicon: HALOT
  rationale: El participio funciona de modo relativo y describe una acción característica. «Que me da» conserva ese valor verbal y encaja naturalmente en la cláusula española.
- source_word: נְקָמֹת
  english_pob_choice: vengeance
  chosen_spanish: venganza
  alternatives_spanish:
  - actos de venganza
  - vindicación
  lexicon: HALOT
  rationale: El sustantivo expresa retribución vengadora; «venganza» preserva la fuerza léxica sin suavizarla a «justicia» o «vindicación», que interpretarían más de lo que el hebreo dice.
- source_word: לִי
  english_pob_choice: for me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - por mí
  - a mí
  lexicon: HALOT
  rationale: Aunque el valor puede ser de beneficio o favor, en español la construcción más natural con «da venganza» es «me da». Se mantiene la relación favorable implícita en el hebreo sin añadir una glosa innecesaria al texto principal.
- source_word: וּמוֹרִיד
  english_pob_choice: and brings ... down
  chosen_spanish: y somete
  alternatives_spanish:
  - y hace bajar
  - y abaja
  lexicon: HALOT
  rationale: El verbo causativo de ירד conserva la imagen de hacer descender. «Somete» traduce la fuerza del efecto sobre los pueblos con una formulación española natural, aunque menos espacial que el hebreo.
- source_word: עַמִּים
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - naciones
  - gentes
  lexicon: HALOT
  rationale: «Pueblos» reproduce el plural colectivo y evita restringir indebidamente el término a unidades estatales modernas; también conserva la amplitud semántica de עַמִּים.
- source_word: תַּחְתֵּנִי
  english_pob_choice: under me
  chosen_spanish: debajo de mí
  alternatives_spanish:
  - bajo mí
  - sujeto a mí
  lexicon: HALOT
  rationale: La preposición expresa literalmente ubicación inferior. «Debajo de mí» mantiene la imagen espacial de subordinación sin convertirla directamente en un abstracto político.
theological_decisions:
- issue: Lenguaje de venganza divina
  english_pob_reading: Retain 'vengeance' as a description of God's just retribution on behalf of the speaker.
  chosen_spanish_reading: Conservar «venganza» como retribución divina en favor del hablante.
  alternative_spanish_readings:
  - justicia
  - vindicación
  rationale: El hebreo נְקָמֹת pide una traducción fuerte. «Venganza» preserva la tensión teológica del juicio retributivo de Dios sin atenuarla con términos más suaves que interpretan el sentido.
  doctrine_reference: Mantener la tensión teológica sin resolverla artificialmente.
- issue: Imagen de sometimiento político
  english_pob_reading: Render the clause concretely as 'brings peoples down under me' rather than abstracting it to 'gives me victory over nations.'
  chosen_spanish_reading: Traducir concretamente como «somete pueblos debajo de mí» en vez de abstraerlo a una victoria genérica.
  alternative_spanish_readings:
  - me da victoria sobre naciones
  - subyuga pueblos bajo mí
  rationale: El hebreo usa un verbo causativo con imaginería espacial. En español, una formulación concreta conserva mejor la escena de humillación/subordinación y evita añadir una interpretación más amplia que el verso no explicita.
  doctrine_reference: Primacía del texto original sobre la tradición interpretativa.
translation_notes:
  revision_awareness: El audit trail inglés muestra un ajuste reciente de 'to me' a 'for me' para לִי; la versión española mantiene la relación favorable con «me» en la sintaxis natural del verbo «da», sin perder el sentido de beneficio señalado por la revisión. También conserva la elección léxica fuerte de «vengeance» y la imagen concreta de «brings peoples down under me».
  spanish_consistency_notes:
  - Se usa «Dios» para אֱלֹהִים/אֵל conforme al estándar del proyecto, con artículo definido cuando el hebreo lo lleva.
  - Se conserva «pueblos» para עַמִּים, alineado con la distinción del POB frente a «naciones» cuando no hay razón contextual para estrechar el término.
  - La construcción «debajo de mí» mantiene el eje espacial de תַּחְתֵּנִי y evita una paráfrasis doctrinal.
  - La voz poética es sobria y publicable, sin suavizar el contenido retributivo del verso.
