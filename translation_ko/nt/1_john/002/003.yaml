  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Καὶ ἐν τούτῳ γινώσκομεν ὅτι ἐγνώκαμεν αὐτόν, ἐὰν τὰς ἐντολὰς αὐτοῦ τηρῶμεν.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/003.yaml
  text: 'And by this we know that we have come to know him: if we keep his commandments[a].'
  footnotes:
  - marker: a
    text: Or, more literally, 'that we have known him'; the Greek perfect likely carries the sense 'have come to know him.'
    reason: lexical_alternative
translation:
  language: ko
  text: '그리고 우리가 그분을 알게 되었음을 이것으로 압니다: 곧 그분의 계명들을 지키는 것입니다.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐγνώκαμεν / γινώσκομεν
  english_pob_choice: we have come to know / we know
  chosen_korean: 알게 되었음 / 압니다
  alternatives_korean:
  - 체험적으로 알다
  lexicon: BDAG
  rationale: 현재완료 ἐγνώκαμεν은 인격적 앎의 상태를 가리키며, 현재 γινώσκομεν은 그 앎의 검증을 가리킨다. 두 시제의 구별을 「알게 되었음」/「압니다」로 옮긴다.
- source_word: ἐντολὰς
  english_pob_choice: commandments
  chosen_korean: 계명들
  alternatives_korean:
  - 명령들
  lexicon: BDAG
  rationale: ἐντολή는 신약에서 신적 권위의 도덕적 지시. 「계명」이 한국 교회 표준 등가어로 그 신적 권위를 보존한다.
