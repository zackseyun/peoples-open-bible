translation:
  language: es
  text: Sobre las almas[a] de sus hijos vendará sus heridas, y ante todo grito se turbarán sus entrañas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Almas» también puede entenderse como «vidas» o, en sentido más libre, «ellos mismos».
    reason: lexical_alternative
  - marker: b
    text: «Entrañas» traduce literalmente σπλάγχνα, un modismo antiguo para el centro profundo de las emociones; otras versiones lo expresan como «corazón» o «sentimientos».
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ
  english_pob_choice: over
  chosen_spanish: por
  alternatives_spanish:
  - sobre
  - acerca de
  - a favor de
  lexicon: LSJ
  rationale: En este giro, περὶ expresa la esfera u objeto de preocupación. En español, «por» comunica bien esa relación de cuidado o interés sin forzar una causalidad que el griego no exige.
- source_word: ψυχῶν
  english_pob_choice: souls
  chosen_spanish: almas
  alternatives_spanish:
  - vidas
  - personas
  lexicon: LSJ
  rationale: El griego dice literalmente «almas de sus hijos». «Almas» conserva la antropología y el peso afectivo del texto; «vidas» o «personas» suavizarían la formulación.
- source_word: καταδεσμεύσει
  english_pob_choice: will bind up
  chosen_spanish: vendará
  alternatives_spanish:
  - atará
  - vendará las heridas
  lexicon: LSJ
  rationale: El verbo remite a vendar o vendar una herida. En español, «vendará» expresa de manera natural la acción sobre «heridas» y mantiene el sentido concreto del griego.
- source_word: τραύματα
  english_pob_choice: wounds
  chosen_spanish: heridas
  alternatives_spanish:
  - llagas
  - lesiones
  lexicon: LSJ
  rationale: El sentido básico es de heridas físicas; aquí además puede funcionar de modo figurado para el dolor afectivo. «Heridas» es la opción más directa y comprensible en español.
- source_word: βοῇ
  english_pob_choice: cry
  chosen_spanish: grito
  alternatives_spanish:
  - clamor
  - voz
  - llanto
  lexicon: LSJ
  rationale: En este contexto de angustia, βοῇ puede ser un grito o clamor. «Grito» conserva la intensidad sonora sin interpretar demasiado el tipo exacto de manifestación.
- source_word: ταραχθήσεται
  english_pob_choice: will be troubled
  chosen_spanish: se turbarán
  alternatives_spanish:
  - se agitarán
  - se perturbarán
  lexicon: LSJ
  rationale: El futuro pasivo de ταράσσω indica conmoción o turbación interior. «Se turbarán» es una equivalencia natural y formal para el impacto emocional descrito.
- source_word: σπλάγχνα
  english_pob_choice: inward parts
  chosen_spanish: entrañas
  alternatives_spanish:
  - interior
  - sentimientos
  - corazón
  lexicon: LSJ
  rationale: σπλάγχνα nombra literalmente las entrañas y, por extensión, el centro profundo de la emoción. «Entrañas» preserva la imagen concreta del idioma antiguo mejor que una paráfrasis interpretativa.
translation_notes:
  revision_awareness: Alineé la primera cláusula con el orden griego («Por las almas de sus hijos...») y mantuve un registro formal. También conservé la imaginería corporal de σπλάγχνα con «entrañas», siguiendo la tensión léxica documentada en el inglés POB.
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico formal pero readable, evitando «SEÑOR» u այլ masking conventions porque no aplica aquí.
  - Se respetó la diferencia entre el dolor por los hijos y la turbación interior, sin convertir ambas imágenes en una sola paráfrasis psicológica.
  - 'La segunda cláusula refleja el singular colectivo del griego con un sujeto implícito coherente en español: «se turbarán sus entrañas».'
