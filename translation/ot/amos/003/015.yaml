id: AMO.3.15
reference: Amos 3:15
source:
  edition: WLC
  text: וְ/הִכֵּיתִ֥י בֵית הַ/חֹ֖רֶף עַל בֵּ֣ית הַ/קָּ֑יִץ וְ/אָבְד֞וּ בָּתֵּ֣י הַ/שֵּׁ֗ן וְ/סָפ֛וּ בָּתִּ֥ים רַבִּ֖ים נְאֻם יְהוָֽה־־־׃ס
translation:
  text: And I will strike the winter house along with the summer house[a], and the houses of ivory will perish, and many houses will come to an end," declares Yahweh.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, more explicitly, 'the houses adorned with ivory'—likely luxurious houses decorated with ivory inlay rather than houses literally built of ivory.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהִכֵּיתִי
  chosen: And I will strike
  alternatives:
  - And I will smite
  - And I will strike down
  lexicon: HALOT
  rationale: From נכה, a common verb for striking/blowing. 'Strike' is natural modern English and preserves the force of divine judgment without archaic tone. 'Strike down' would over-specify destruction beyond the verb itself in this clause.
- source_word: בֵית הַחֹרֶף
  chosen: the winter house
  alternatives:
  - the house of winter
  - the winter residence
  lexicon: HALOT
  rationale: A construct phrase meaning a house used in winter. 'Winter house' is idiomatic and preserves the socioeconomic implication of multiple seasonal residences.
- source_word: עַל
  chosen: along with
  alternatives:
  - upon
  - against
  - together with
  lexicon: HALOT
  rationale: 'Here עַל links the object of striking to a second house: the winter house is struck together with/against the summer house. ''Along with'' best communicates coordinated judgment on both residences in clear English. ''Upon'' would sound spatial and obscure the sense.'
- source_word: בֵּית הַקָּיִץ
  chosen: the summer house
  alternatives:
  - the house of summer
  - the summer residence
  lexicon: HALOT
  rationale: Parallel to 'winter house'; the phrase denotes a seasonal residence. The paired rendering preserves the poetic and social contrast.
- source_word: וְאָבְדוּ
  chosen: will perish
  alternatives:
  - will be destroyed
  - will vanish
  lexicon: HALOT
  rationale: From אבד, 'perish/be lost/be destroyed.' 'Will perish' keeps the intransitive nuance and allows the following clauses to build the picture of judgment without flattening all verbs into the same English term.
- source_word: בָּתֵּי הַשֵּׁן
  chosen: the houses of ivory
  alternatives:
  - the ivory houses
  - the houses adorned with ivory
  lexicon: HALOT
  rationale: Literally 'houses of the ivory.' This likely refers to luxurious houses decorated with ivory inlay rather than structures made of ivory. The more literal 'houses of ivory' preserves the Hebrew image while remaining understandable; the fuller interpretive alternative is preserved in a footnote.
- source_word: וְסָפוּ
  chosen: will come to an end
  alternatives:
  - will be swept away
  - will be consumed
  - will be ended
  lexicon: HALOT
  rationale: From סוף in the sense of coming to an end/be finished. 'Will come to an end' is a clear modern rendering that preserves the resultative sense without overcommitting to a specific mechanism such as fire or military sweeping away.
- source_word: בָּתִּים רַבִּים
  chosen: many houses
  alternatives:
  - great houses
  - numerous houses
  lexicon: HALOT
  rationale: רבים most naturally means 'many/numerous.' Some English versions render 'great houses' by contextual inference about wealthy estates, but the adjective itself is quantitative, so 'many houses' better reflects the Hebrew.
- source_word: נְאֻם יְהוָה
  chosen: declares the LORD
  alternatives:
  - oracle of the LORD
  - says the LORD
  lexicon: HALOT
  rationale: A standard prophetic formula. 'Declares the LORD' is idiomatic, weighty, and consistent with the doctrinal guideline to render יְהוָה as 'the LORD'.
- source_word: יְהוָה
  chosen: Yahweh
  alternatives:
  - Jehovah
  lexicon: HALOT
  rationale: Per doctrine, the Tetragrammaton יְהוָה is rendered 'Yahweh' — the transliteration of the divine name — rather than the traditional 'the LORD' substitution. This preserves the personal name God revealed to Israel rather than substituting a title.
