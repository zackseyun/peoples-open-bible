  to: Si hay una joven, virgen, desposada[a] con un hombre, y otro hombre la encuentra en la ciudad y se acuesta con ella,
  rationale: Se reemplaza «comprometida con un hombre» por «desposada con un hombre» para reflejar mejor el sentido legalmente vinculante de מְאֹרָשָׂה en este contexto casuístico. Se conserva la claridad general, la neutralidad del acto sexual y la nota léxica con una alternativa española natural.
