base_translation:
  language: en
  yaml_path: translation/ot/1_samuel/016/018.yaml
  text: Then one of the young men answered and said[a], “Look, I have seen a son of Jesse the Bethlehemite who is skillful in playing, a mighty man of valor, a man of war, prudent in speech, and a handsome man[d][c][b], and Yahweh is with him.”
  footnotes:
  - marker: a
    text: 'Hebrew: ''the Bethlehemite,'' a gentilic meaning ''from Bethlehem.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'skillful in playing'; the instrument is not named in this verse, though the context concerns playing for Saul.
    reason: lexical_alternative
  - marker: c
    text: '''Mighty man of valor'' can also mean ''valiant warrior'' or more broadly ''capable man.'''
    reason: lexical_alternative
  - marker: d
    text: Or 'who knows how to play, a mighty man of valor, a man of war, prudent in speech, a handsome man'.
    reason: previous_rendering
