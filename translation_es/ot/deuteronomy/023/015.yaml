translation:
  language: es
  text: Porque Yahvé tu Dios camina en medio de tu campamento para librarte y para entregar[a] a tus enemigos delante de ti. Por eso tu campamento debe ser santo, para que no vea en ti cosa indecente[b] y se aparte de ti[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «poner a tus enemigos delante de ti». El hebreo presenta un giro idiomático que puede expresar la entrega de los enemigos en poder del pueblo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «algún asunto indecente». La expresión hebrea es amplia y puede referirse a cualquier cosa vergonzosa o impura que contamine el campamento.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «se vuelva atrás de ti». Más literalmente, «se aparte de detrás de ti», imagen que sugiere que Yahvé deja de acompañar al campamento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino propio, según el criterio del proyecto en español, evitando el ocultamiento litúrgico y manteniendo la referencia de pacto.
- source_word: מִתְהַלֵּךְ
  english_pob_choice: walks
  chosen_spanish: camina
  alternatives_spanish:
  - anda
  - se pasea
  lexicon: HALOT
  rationale: ‘Camina’ conserva la imagen concreta y antropomórfica del hebreo, sin volverla abstracta como ‘está presente’.
- source_word: בְּקֶרֶב מַחֲנֶךָ
  english_pob_choice: in the midst of your camp
  chosen_spanish: en medio de tu campamento
  alternatives_spanish:
  - dentro de tu campamento
  - entre tu campamento
  lexicon: HALOT
  rationale: ‘En medio de’ refleja bien בקרב y mantiene la idea de presencia central entre el pueblo.
- source_word: לְהַצִּילְךָ
  english_pob_choice: to deliver you
  chosen_spanish: para librarte
  alternatives_spanish:
  - para salvarte
  - para rescatarte
  lexicon: HALOT
  rationale: ‘Librarte’ funciona bien en contexto militar y evita imponer matices posteriores ajenos al pasaje.
- source_word: וְלָתֵת אֹיְבֶיךָ לְפָנֶיךָ
  english_pob_choice: to give your enemies before you
  chosen_spanish: para entregar a tus enemigos delante de ti
  alternatives_spanish:
  - para poner a tus enemigos delante de ti
  - para poner tus enemigos en tus manos
  lexicon: HALOT
  rationale: Se conserva la literalidad visible del giro idiomático, con ‘entregar’ para expresar la idea de dar al poder del pueblo.
- source_word: מַחֲנֶיךָ קָדוֹשׁ
  english_pob_choice: Therefore your camp must be holy
  chosen_spanish: tu campamento debe ser santo
  alternatives_spanish:
  - tu campamento será santo
  - tu campamento ha de ser santo
  lexicon: HALOT
  rationale: ‘Debe ser santo’ expresa el carácter prescriptivo del contexto; ‘santo’ preserva el término bíblico sin sustituirlo por perífrasis.
- source_word: עֶרְוַת דָּבָר
  english_pob_choice: anything indecent
  chosen_spanish: cosa indecente
  alternatives_spanish:
  - alguna cosa indecente
  - algún asunto indecente
  - algo vergonzoso
  lexicon: HALOT
  rationale: La expresión es amplia; ‘cosa indecente’ mantiene la amplitud semántica sin reducirla a desnudez literal.
- source_word: וְלֹא יִרְאֶה בְךָ
  english_pob_choice: so that he may not see in you
  chosen_spanish: para que no vea en ti
  alternatives_spanish:
  - para que no vea entre ti
  - para que no vea en tu campamento
  lexicon: HALOT
  rationale: La cláusula final expresa propósito; el español fluye mejor con ‘para que no vea en ti’, manteniendo la singularidad del destinatario.
- source_word: וְשָׁב מֵאַחֲרֶיךָ
  english_pob_choice: and turn away from you
  chosen_spanish: y se aparte de ti
  alternatives_spanish:
  - y se vuelva de detrás de ti
  - y vuelva atrás de ti
  lexicon: HALOT
  rationale: Se opta por una forma natural en español que conserve el sentido relacional del hebreo; la imagen espacial de ‘de detrás de ti’ queda implícita en el contexto y puede explicarse en nota.
theological_decisions:
- issue: Antropomorfismo de la presencia divina
  english_pob_reading: Retain the concrete language of the LORD 'walking' in the camp
  chosen_spanish_reading: Conservar que Yahvé 'camina' en medio del campamento
  alternative_spanish_readings:
  - Yahvé está presente en medio del campamento
  - Yahvé acompaña al campamento
  rationale: El hebreo usa lenguaje concreto de movimiento para subrayar la cercanía divina y la exigencia de santidad; la versión española lo mantiene sin desmaterializarlo.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza de la cláusula de santidad
  english_pob_reading: 'Render as an obligation: ''your camp must be holy'''
  chosen_spanish_reading: tu campamento debe ser santo
  alternative_spanish_readings:
  - tu campamento será santo
  - tu campamento ha de ser santo
  rationale: 'El contexto es normativo: la santidad del campamento se exige por la presencia de Yahvé y no se presenta solo como una predicción.'
  doctrine_reference: Translation philosophy §6
- issue: Finalidad y retirada de Yahvé
  english_pob_reading: '...and turn away from you'
  chosen_spanish_reading: y se aparte de ti
  alternative_spanish_readings:
  - y se retire de ti
  - y vuelva atrás de ti
  rationale: ‘Se aparte de ti’ comunica la relación rota sin sobrecargar el verso con una reconstrucción más explícita del trasfondo espacial.
  doctrine_reference: Revision awareness / latest_revision_pass
translation_notes:
  revision_awareness: 'La redacción sigue el texto hebreo y el audit trail inglés con alta concordancia. Se evitó introducir «seguir» en la cláusula final, porque la revisión más reciente corrigió esa sobrelectura: el hebreo dice que Yahvé se aparta / vuelve atrás, no que se aleja «de seguirte». También se conservó la ambigüedad amplia de עֶרְוַת דָּבָר mediante «cosa indecente», siguiendo la decisión inglesa de no restringirla a desnudez literal.'
  spanish_consistency_notes:
  - Se usa «Yahvé» según el estándar del proyecto para el nombre divino.
  - Se mantiene «camina» para conservar la imagen antropomórfica.
  - «Campamento» traduce consistentemente מַחֲנֶךָ.
  - «Santo» se usa en sentido cultual, no meramente moral.
  - La cláusula final se formula como apartarse de ti, no como 'alejarse de seguirte'.
