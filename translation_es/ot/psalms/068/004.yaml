translation:
  language: es
  text: Pero los justos se alegrarán[a]; exultarán delante de Dios[b], y se regocijarán con alegría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y los justos se alegrarán». La conjunción hebrea también puede leerse simplemente como «y»; «pero» en el texto principal refleja el contraste con el versículo anterior.'
    reason: alternative_reading
  - marker: b
    text: 'Hebreo: «delante de Dios», es decir, en la presencia de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְצַדִּיקִים
  english_pob_choice: But the righteous
  chosen_spanish: Pero los justos
  alternatives_spanish:
  - Y los justos
  - Mas los justos
  - los justos
  lexicon: HALOT
  rationale: צַדִּיקִים designa a personas justas o rectas; en español bíblico y moderno, "los justos" es natural y fiel. Opto por "Pero" para conservar el valor discursivo contrastivo que el inglés POB marcó con "But" respecto del versículo anterior, sin perder que la conjunción hebrea también puede leerse simplemente como "y".
- source_word: יִשְׂמְחוּ
  english_pob_choice: will be glad
  chosen_spanish: se alegrarán
  alternatives_spanish:
  - se regocijarán
  - estarán alegres
  lexicon: HALOT
  rationale: שׂמח expresa alegría o gozo; "se alegrarán" comunica bien ese sentido sin cargar demasiado el segundo verbo con una solemnidad que en español quedaría reservada para el siguiente par de verbos de gozo.
- source_word: יַעַלְצוּ
  english_pob_choice: will exult
  chosen_spanish: exultarán
  alternatives_spanish:
  - triunfarán de gozo
  - saltarán de alegría
  lexicon: HALOT
  rationale: עָלַץ denota júbilo intenso, exultación. "Exultarán" preserva esa fuerza y distingue este verbo del anterior, como hace la versión inglesa POB.
- source_word: לִפְנֵי אֱלֹהִים
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en la presencia de Dios
  - ante Dios
  lexicon: HALOT
  rationale: La expresión hebrea significa literalmente "ante/delante del rostro de Dios", con un matiz de presencia relacional. "Delante de Dios" es claro, fiel y mantiene la imagen espacial-presencial sin necesidad de explicarla dentro del texto principal.
- source_word: וְיָשִׂישׂוּ
  english_pob_choice: and they will rejoice
  chosen_spanish: y se regocijarán
  alternatives_spanish:
  - y se alegrarán
  - y gozarán
  lexicon: HALOT
  rationale: שׂוש expresa regocijo exuberante. "Se regocijarán" mantiene un registro bíblico digno y conserva la diferencia con "se alegrarán" al inicio del verso.
- source_word: בְשִׂמְחָה
  english_pob_choice: with gladness
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - en alegría
  lexicon: HALOT
  rationale: שִׂמְחָה es el sustantivo de gozo/alegría. "Con alegría" suena natural en español y reproduce el énfasis acumulativo del hebreo con un sustantivo de la misma familia semántica.
theological_decisions:
- issue: Valor de la conjunción inicial וְ en contraste con el contexto inmediato
  english_pob_reading: But the righteous will be glad
  chosen_spanish_reading: Pero los justos se alegrarán
  alternative_spanish_readings:
  - Y los justos se alegrarán
  - Los justos se alegrarán
  rationale: El hebreo permite leer la conjunción como simple coordinación, pero el flujo del salmo enmarca un contraste con lo dicho en el versículo anterior. Por eso "Pero" refleja la función discursiva que la POB inglesa documenta, sin imponer una oposición ajena al texto.
  doctrine_reference: Lectura discursiva del texto poético; no doctrinal en sentido estricto.
- issue: Expresión lִפְנֵי אֱלֹהִים y su matiz de presencia divina
  english_pob_reading: before God, that is, in God's presence
  chosen_spanish_reading: delante de Dios
  alternative_spanish_readings:
  - en la presencia de Dios
  - ante Dios
  rationale: La frase puede leerse espacialmente como "delante de" y, por implicación, como estar en la presencia de Dios. Mantener la forma breve evita explicitar de más en el cuerpo del verso; la nota puede conservar el matiz de presencia si se desea.
  doctrine_reference: Presencia de Dios; lenguaje poético de proximidad divina.
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada del inglés POB: no hay cambios sustanciales aplicados aquí. La elección española sigue la misma lectura contrastiva de la conjunción y conserva la acumulación de vocablos de gozo del hebreo.'
  spanish_consistency_notes:
  - Se preserva la distinción verbal entre alegrarse / exultar / regocijarse para reflejar la serie hebrea de gozo intenso.
  - Se traduce אֱלֹהִים como «Dios» sin artículo, conforme al uso normal en español reverente.
  - Se mantiene un registro bíblico natural, evitando calcos innecesarios pero sin diluir la imagen de presencia en «delante de Dios».
