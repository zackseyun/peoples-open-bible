translation:
  language: es
  text: Así que sus servidores lo sacaron del carro y lo subieron al segundo carro[a] que era suyo, y lo llevaron a Jerusalén. Y murió, y fue sepultado en los sepulcros de sus padres, y todo Judá y Jerusalén guardaron duelo por Josías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo, literalmente: «el carro del segundo [uno]», probablemente el carro secundario o de reserva de Josías.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבִירֻהוּ
  english_pob_choice: removed him
  chosen_spanish: lo sacaron
  alternatives_spanish:
  - lo retiraron
  - lo trasladaron
  lexicon: HALOT
  rationale: El hifil de עבר expresa hacer pasar a alguien de un lugar a otro. En este contexto narrativo de combate, 'lo sacaron' comunica con naturalidad que Josías fue apartado del carro sin perder el movimiento físico del hebreo.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus servidores
  alternatives_spanish:
  - sus siervos
  - sus servidores y asistentes
  lexicon: HALOT
  rationale: עבד puede referirse a servidores o asistentes de rango amplio. 'Servidores' conserva la amplitud contextual sin forzar un título más técnico como 'oficiales'.
- source_word: הַמֶּרְכָּבָה
  english_pob_choice: the chariot
  chosen_spanish: el carro
  alternatives_spanish:
  - el carro de guerra
  - el carro
  lexicon: HALOT
  rationale: Aunque 'carro' y 'carro de guerra' son posibles, aquí el relato contrasta dos vehículos; 'carro' es suficientemente claro en español y evita añadir un rasgo no explicitado por el hebreo.
- source_word: וַיַּרְכִּיבֻהוּ
  english_pob_choice: set him on
  chosen_spanish: lo montaron
  alternatives_spanish:
  - lo colocaron sobre
  - lo hicieron subir a
  lexicon: HALOT
  rationale: El hifil de רכב significa hacer montar o subir. 'Lo montaron' refleja la acción asistida de colocarlo sobre otro vehículo y mantiene el valor verbal del hebreo.
- source_word: רֶכֶב הַמִּשְׁנֶה
  english_pob_choice: the second chariot
  chosen_spanish: el segundo carro
  alternatives_spanish:
  - el carro secundario
  - el carro de reserva
  lexicon: HALOT
  rationale: La expresión es literalmente 'el carro de la segunda [parte/persona]'. En contexto, se entiende mejor como un carro secundario o de reemplazo; 'segundo carro' conserva la cercanía al hebreo.
- source_word: אֲשֶׁר לוֹ
  english_pob_choice: that belonged to him
  chosen_spanish: que era suyo
  alternatives_spanish:
  - que le pertenecía
  - que era de él
  lexicon: HALOT
  rationale: La cláusula relativa identifica el carro como posesión de Josías. 'Que era suyo' es breve, idiomático y fiel al sentido posesivo.
- source_word: וַיּוֹלִיכֻהוּ
  english_pob_choice: brought him
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo trajeron
  lexicon: HALOT
  rationale: El hifil de הלך puede significar llevar o conducir. Con el destino explícito 'a Jerusalén', 'lo llevaron' es natural y transmite el traslado al lugar final.
- source_word: וַיָּמָת
  english_pob_choice: he died
  chosen_spanish: murió
  alternatives_spanish:
  - y murió
  lexicon: HALOT
  rationale: Verbo narrativo simple y directo; el castellano permite omitir el sujeto explícito sin perder claridad.
- source_word: וַיִּקָּבֵר
  english_pob_choice: was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - y fue sepultado
  lexicon: HALOT
  rationale: קבר en pasivo puede rendirse como 'sepultar' o 'enterrar'. 'Fue sepultado' mantiene un registro digno y bíblico, sin recurrir a una fórmula eclesiástica innecesaria.
- source_word: בְּקִבְרוֹת אֲבֹתָיו
  english_pob_choice: in the tombs of his fathers
  chosen_spanish: en los sepulcros de sus padres
  alternatives_spanish:
  - en las tumbas de sus padres
  - en los sepulcros de sus antepasados
  lexicon: HALOT
  rationale: La expresión hebrea es un plural familiar/dinástico para el lugar de entierro ancestral. 'Sepulcros de sus padres' conserva el paralelismo con el original y su dignidad funeraria.
- source_word: וְכָל יְהוּדָה וִירוּשָׁלַם
  english_pob_choice: all Judah and Jerusalem
  chosen_spanish: todo Judá y Jerusalén
  alternatives_spanish:
  - todo Judá y la ciudad de Jerusalén
  - todo Judá y los habitantes de Jerusalén
  lexicon: HALOT
  rationale: El hebreo personifica al reino y a la capital como comunidad doliente. 'Todo Judá y Jerusalén' respeta esa formulación breve sin expandirla innecesariamente.
- source_word: מִתְאַבְּלִים
  english_pob_choice: mourned
  chosen_spanish: lo lloraron
  alternatives_spanish:
  - estaban de duelo por él
  - se lamentaron por Josías
  lexicon: HALOT
  rationale: El participio expresa duelo continuo, pero en español narrativo 'lo lloraron' comunica la reacción colectiva de forma natural y conserva el énfasis afectivo del lamento.
- source_word: עַל יֹאשִׁיָּהוּ
  english_pob_choice: for Josiah
  chosen_spanish: por Josías
  alternatives_spanish:
  - sobre Josías
  - a causa de Josías
  lexicon: HALOT
  rationale: Con אבל, על marca el objeto del duelo. 'Por Josías' es la equivalencia idiomática más clara en español.
translation_notes:
  revision_awareness: La redacción sigue el ajuste final del POB inglés, que prefirió un pasado simple natural ('mourned') en vez de un progresivo. En español se mantuvo un pasado narrativo simple en la cláusula final ('lo lloraron'), coherente con el flujo del relato y con el hebreo wayyiqtol.
  spanish_consistency_notes:
  - Se usa 'Yahvé' en el proyecto cuando aparezca el Tetragrámaton; en este versículo no aparece.
  - Se evita 'SEÑOR' como sustituto y no hay necesidad de equivalente cultual especial.
  - '''Josías'' se mantiene como nombre propio estándar en español bíblico.'
  - El tono es narrativo y solemne, evitando arcaísmos innecesarios sin perder dignidad.
