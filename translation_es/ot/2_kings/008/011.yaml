translation:
  language: es
  text: Y fijó su mirada y la sostuvo hasta que se avergonzó[a], y el hombre de Dios lloró.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que Hazael se avergonzó». El hebreo deja menos explícito de lo que el español normalmente requiere quién es el sujeto de «se avergonzó».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיַּעֲמֵד
  english_pob_choice: fixed
  chosen_spanish: fijó
  alternatives_spanish:
  - mantuvo fija
  - dejó fija
  - clavó
  lexicon: HALOT
  rationale: El Hifil de עמד con el objeto 'su rostro' expresa hacer que quedara inmóvil o fijo. En español, 'fijó' conserva la idea de inmovilidad intencional sin sonar rígido o técnico.
- source_word: אֶת־פָּנָיו
  english_pob_choice: his gaze
  chosen_spanish: su mirada
  alternatives_spanish:
  - su rostro
  - su semblante
  - sus ojos
  lexicon: HALOT
  rationale: Aunque el hebreo dice literalmente 'su rostro', el contexto de mirar fijamente permite expresar la imagen de manera natural como 'su mirada', manteniendo el valor corporal/visual del gesto sin perder inteligibilidad en español.
- source_word: וַיָּשֶׂם
  english_pob_choice: stared
  chosen_spanish: la sostuvo
  alternatives_spanish:
  - la mantuvo
  - la fijó
  - la dejó
  lexicon: HALOT
  rationale: El verbo שׂים continúa la acción de sostener una postura o fijación. En español, 'la sostuvo' refleja la continuidad del gesto y evita una repetición torpe de 'miró' o 'puso'.
- source_word: עַד־בֹּשׁ
  english_pob_choice: until he was ashamed
  chosen_spanish: hasta avergonzarse
  alternatives_spanish:
  - hasta que se avergonzó
  - hasta quedar avergonzado
  - hasta que él se avergonzó
  lexicon: HALOT
  rationale: בוש expresa vergüenza/avergonzarse. La forma reflexiva 'avergonzarse' permite conservar la ambigüedad del sujeto afectado, tal como en el hebreo, sin resolverla de más.
- source_word: וַיֵּבְךְּ
  english_pob_choice: wept
  chosen_spanish: lloró
  alternatives_spanish:
  - lloró amargamente
  - se puso a llorar
  - sollozó
  lexicon: HALOT
  rationale: בכה es 'llorar/llanto'. 'Lloró' es la opción más directa y sobria en español, adecuada al tono narrativo.
- source_word: אִישׁ הָאֱלֹהִים
  english_pob_choice: the man of God
  chosen_spanish: el hombre de Dios
  alternatives_spanish:
  - el varón de Dios
  - el profeta
  - el siervo de Dios
  lexicon: HALOT
  rationale: Se mantiene la expresión tradicional pero de forma transparente. 'Hombre de Dios' conserva el título hebreo sin reemplazarlo por una identificación interpretativa.
theological_decisions:
- issue: Ambigüedad del sujeto en עַד־בֹּשׁ
  english_pob_reading: Preserve the Hebrew ambiguity with 'until he was ashamed' rather than specifying Hazael or Elisha.
  chosen_spanish_reading: hasta avergonzarse
  alternative_spanish_readings:
  - hasta que Hazael se avergonzó
  - hasta que él se avergonzó
  - hasta quedar avergonzado
  rationale: La secuencia hebrea no explicita de manera inequívoca quién queda avergonzado. El español reflexivo permite conservar esa tensión sin decidirla prematuramente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB en cuanto a la idea de mirar fijamente y sostener la mirada, pero adapta la imagen al español con 'fijó su mirada' y 'la sostuvo' para evitar un calco extraño. También conserva la ambigüedad de עַד־בֹּשׁ mediante una forma reflexiva.
  spanish_consistency_notes:
  - Se mantiene 'hombre de Dios' como equivalente transparente de אִישׁ הָאֱלֹהִים.
  - Se evita 'SEÑOR' o 'profeta' porque el texto fuente no los usa.
  - La ambigüedad del verbo de vergüenza se preserva en la traducción principal y en la nota.
  - El tono es sobrio y narrativo, acorde con el hebreo y con la línea editorial del POB.
