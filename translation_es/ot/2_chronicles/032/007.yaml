translation:
  language: es
  text: Sean fuertes y valientes. No teman ni se acobarden ante el rey de Asiria ni ante toda la multitud[a] que está con él, porque con nosotros hay más que con él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todo el ejército que está con él'. El hebreo puede denotar una multitud o una masa de tropas en este contexto.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'porque con nosotros [hay] más que con él', una comparación elíptica aclarada por el versículo siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: חִזְקוּ
  english_pob_choice: Be strong
  chosen_spanish: Sean fuertes
  alternatives_spanish:
  - Manténganse firmes
  - Sean valientes
  lexicon: HALOT
  rationale: El imperativo exhortativo plural de חזק en este contexto militar se expresa de manera natural en español como una llamada a la fortaleza. 'Sean fuertes' conserva el valor de exhortación directa y suena idiomático.
- source_word: וְאִמְצוּ
  english_pob_choice: and courageous
  chosen_spanish: y valientes
  alternatives_spanish:
  - y cobren ánimo
  - y sean valientes
  lexicon: HALOT
  rationale: אמץ integra la fórmula exhortativa 'ser fuertes y valientes'. En español, 'valientes' transmite bien el matiz de firmeza ante el peligro, sin duplicar mecánicamente 'fuertes'.
- source_word: אַל תִּירְאוּ
  english_pob_choice: Do not fear
  chosen_spanish: No teman
  alternatives_spanish:
  - No tengan miedo
  - No temáis
  lexicon: HALOT
  rationale: El negativo de ירא se traduce de forma directa y elevada con 'No teman'. Mantiene el tono de exhortación pública y evita un giro demasiado coloquial.
- source_word: וְאַל תֵּחַתּוּ
  english_pob_choice: or be dismayed
  chosen_spanish: ni se acobarden
  alternatives_spanish:
  - ni se desmayen
  - ni se desalienten
  - ni se aterroricen
  lexicon: HALOT
  rationale: חתת en este contexto puede implicar quedar quebrantado, desalentado o aterrorizado. 'Acobardarse' comunica bien la reacción emocional y práctica ante la amenaza, sin sobrecargar con una interpretación doctrinal.
- source_word: מִפְּנֵי
  english_pob_choice: before
  chosen_spanish: ante
  alternatives_spanish:
  - delante de
  - frente a
  lexicon: HALOT
  rationale: La preposición idiomática 'ante' funciona bien en español para reproducir el valor de 'en la presencia de / frente a' en un contexto de amenaza y exhortación.
- source_word: מֶלֶךְ אַשּׁוּר
  english_pob_choice: the king of Assyria
  chosen_spanish: el rey de Asiria
  alternatives_spanish:
  - el monarca de Asiria
  - el rey asirio
  lexicon: HALOT
  rationale: La construcción de estado constructo se rinde de forma transparente con 'el rey de Asiria'. Es la opción más clara y directa para el lector hispanohablante.
- source_word: וּמִלִּפְנֵי כָּל הֶהָמוֹן אֲשֶׁר עִמּוֹ
  english_pob_choice: or before all the multitude that is with him
  chosen_spanish: ni ante toda la multitud que está con él
  alternatives_spanish:
  - ni ante todo el ejército que está con él
  - ni ante toda la muchedumbre que está con él
  lexicon: HALOT
  rationale: הָמוֹן puede referirse a multitud, masa o tropa. 'Multitud' preserva la amplitud léxica que el inglés POB decidió no restringir a 'army', manteniendo la ambigüedad contextual.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la exhortación. 'Porque' es claro y natural en español para una explicación causal inmediata.
- source_word: עִמָּנוּ רַב מֵעִמּוֹ
  english_pob_choice: there are more with us than with him
  chosen_spanish: con nosotros hay más que con él
  alternatives_spanish:
  - hay más con nosotros que con él
  - están con nosotros más que con él
  lexicon: HALOT
  rationale: 'La construcción hebrea es elíptica: literalmente ''con nosotros [hay] más que con él''. En español, ''con nosotros hay más que con él'' conserva la comparación sin forzar una glosa interpretativa.'
theological_decisions:
- issue: Comparación elíptica final y posible lectura personal vs. numérica
  english_pob_reading: 'Quantitative comparison of forces/supporters: ''there are more with us than with him'''
  chosen_spanish_reading: 'Comparación cuantitativa implícita: ''con nosotros hay más que con él'''
  alternative_spanish_readings:
  - hay más de nuestro lado que del suyo
  - mayor es el que está con nosotros que el que está con él
  rationale: El hebreo usa una construcción elíptica con רַב que, en este contexto inmediato, contrasta la multitud asiria con el apoyo del lado de Judá. La traducción española conserva la comparación abierta sin importar una formulación personal teológicamente cargada que el versículo no expresa explícitamente.
  doctrine_reference: Preservar la tensión textual y el sentido contextual; no resolverlo por tradición interpretativa ajena al versículo.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y la auditoría inglesa. Se preserva la ambigüedad de הָמוֹן como 'multitud' y la comparación final elíptica sin resolverla más allá de lo que el contexto inmediato permite.
  spanish_consistency_notes:
  - Se mantiene 'Asiria' para אַשּׁוּר y no se introduce 'SEÑOR' ni otras sustituciones devocionales.
  - '''Valientes'' se usa para אמץ como parte de la fórmula exhortativa fija ''ser fuertes y valientes''.'
  - '''Multitud'' conserva el rango semántico del hebreo הָמוֹן y la nota ofrece la alternativa militar sin imponerla en el texto principal.'
  - La comparación final evita un giro interpretativo hacia una lectura personal; se conserva el paralelismo cuantitativo del hebreo.
