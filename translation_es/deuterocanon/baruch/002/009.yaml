    rationale: ἐγρηγόρησεν expresa vigilancia activa o mantenerse despierto/sobre aviso con respecto a las calamidades. «Estuvo alerta ante» es comprensible, pero «se mantuvo vigilante sobre» refleja mejor el matiz sin sugerir aprobación.
  - severity: low
