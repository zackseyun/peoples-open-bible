translation:
  language: es
  text: En cuanto al resto del pueblo que quedó en la ciudad, y los desertores[a] que se habían pasado a él, junto con el resto del pueblo que quedó, Nebuzaradán, el capitán de la guardia[c][b], llevó cautivos a Babilonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que habían desertado a él». El hebreo dice literalmente «los que habían caído sobre él», un modismo militar que expresa pasarse al bando contrario.'
    reason: alternative_reading
  - marker: b
    text: El hebreo repite «el resto del pueblo que quedó». Se ha conservado la repetición en lugar de suavizarla.
    reason: source_note
  - marker: c
    text: «Capitán de la guardia» traduce un título relacionado literalmente con «jefe de los verdugos» o «de los ejecutores», un cargo oficial babilónico de corte y milicia.
    reason: cultural_note
lexical_decisions:
- source_word: יֶתֶר
  english_pob_choice: the rest of
  chosen_spanish: el resto de
  alternatives_spanish:
  - lo restante de
  - los demás de
  lexicon: HALOT
  rationale: יֶתֶר expresa lo que queda o permanece. «El resto de» conserva la idea de remanente con español natural y digno.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - los habitantes
  lexicon: HALOT
  rationale: El sustantivo colectivo de referencia es «el pueblo». En español bíblico contemporáneo es claro y conserva el valor colectivo del hebreo.
- source_word: הַנִּשְׁאָרִים
  english_pob_choice: who remained
  chosen_spanish: que quedó
  alternatives_spanish:
  - que permaneció
  - que quedó atrás
  lexicon: HALOT
  rationale: El participio niphal de שׁאר indica los que quedaron. En español, «que quedó» funciona bien con el colectivo «el pueblo» y mantiene el sentido de remanencia sin sobrecargar.
- source_word: בָּעִיר
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - dentro de la ciudad
  lexicon: HALOT
  rationale: Es la expresión locativa simple del hebreo y se puede reproducir directamente en español sin perder claridad.
- source_word: הַנֹּפְלִים אֲשֶׁר נָפְלוּ עָלָיו
  english_pob_choice: the deserters who had gone over to him
  chosen_spanish: los desertores que se habían pasado a él
  alternatives_spanish:
  - los que habían desertado a favor de él
  - los que se le habían pasado
  lexicon: HALOT
  rationale: El hebreo usa el modismo militar־político נפל על/אל, literalmente «caer sobre/al», con el sentido de pasarse al bando contrario. «Se habían pasado a él» expresa bien esa defección en español y conserva el matiz de lealtad cambiada.
- source_word: וְאֵת יֶתֶר הָעָם הַנִּשְׁאָרִים
  english_pob_choice: together with the rest of the people who remained
  chosen_spanish: junto con el resto del pueblo que quedó
  alternatives_spanish:
  - y el resto del pueblo que quedó
  - además del resto del pueblo que quedó
  lexicon: HALOT
  rationale: La repetición hebrea se conserva en español. «Junto con» comunica adecuadamente la fuerza aditiva sin borrar la reiteración textual.
- source_word: הֶגְלָה
  english_pob_choice: carried away to Babylon
  chosen_spanish: los llevó cautivos a Babilonia
  alternatives_spanish:
  - los deportó a Babilonia
  - los llevó al destierro en Babilonia
  lexicon: HALOT
  rationale: El hifil de גלה indica llevar al exilio. «Los llevó cautivos» preserva la idea de traslado forzado y de destierro, con un español natural y bíblicamente sobrio.
- source_word: נְבוּזַר אֲדָן
  english_pob_choice: Nebuzaradan
  chosen_spanish: Nebuzaradán
  alternatives_spanish:
  - Nebuzaradán
  lexicon: HALOT
  rationale: Se translitera el nombre propio con la forma habitual en español bíblico, manteniendo la identificación histórica.
- source_word: רַב טַבָּחִים
  english_pob_choice: the captain of the guard
  chosen_spanish: el capitán de la guardia
  alternatives_spanish:
  - el jefe de los guardias
  - el capitán de los verdugos
  lexicon: HALOT
  rationale: El título hebreo alude literalmente a una función relacionada con ejecutores/guardias, pero en este contexto cortesano y militar la equivalencia establecida es «capitán de la guardia». Se conserva la lectura funcional sin forzar un calco literal.
- source_word: בָּבֶל
  english_pob_choice: Babylon
  chosen_spanish: Babilonia
  alternatives_spanish:
  - Babel
  lexicon: HALOT
  rationale: El topónimo se traduce con la forma española estándar «Babilonia», que es la forma más clara para lectores en español.
translation_notes:
  revision_awareness: 'La redacción sigue el último pass de revisión del inglés POB: se evitó añadir un objeto explícito no presente en el hebreo, y se conservó la repetición de «el resto del pueblo que quedó». También se mantuvo la lectura de «captain of the guard» como título funcional, no literal, por coherencia con el expediente auditado.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una referencia directa al nombre divino.
  - Se prefirió «el pueblo» para הָעָם por consistencia con el estilo bíblico del proyecto.
  - «Se habían pasado a él» conserva el valor de defección del modismo hebreo sin introducir explicación excesiva en el texto principal.
  - La puntuación y el orden de los miembros siguen de cerca el hebreo, respetando la repetición enfática del original.
