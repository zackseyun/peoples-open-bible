translation:
  language: es
  text: ¡Bendito sea Yahvé para siempre[a]! Amén y amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Yahvé»: «¡Bendito sea Yahvé para siempre! Amén y amén.»'
