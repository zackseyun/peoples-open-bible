revisions:
- from: La boca de las mujeres prohibidas[a] es un hoyo profundo; el que está bajo la ira de Yahvé caerá allí.
  to: La boca de las mujeres ajenas[a] es un hoyo profundo; el que está bajo la ira de Yahvé caerá allí.
  rationale: 'Se reemplaza ''mujeres prohibidas'' por ''mujeres ajenas'' para lograr un español más idiomático y fiel al uso sapiencial de זָרוֹת: mujeres que están fuera del vínculo sexual legítimo o del orden del pacto, sin limitar el sentido a etnicidad ni solo a adulterio. Se mantiene la nota con alternativas tradicionales y se pule su explicación para mayor naturalidad en español.'
