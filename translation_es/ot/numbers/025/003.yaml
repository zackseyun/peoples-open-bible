translation:
  language: es
  text: Así Israel se unió a Baal de Peor[a], y la ira de Yahvé se encendió contra Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se unió a Baal-peor» o «se puso bajo yugo con Baal de Peor».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצָּמֶד
  english_pob_choice: joined itself to
  chosen_spanish: se unió a
  alternatives_spanish:
  - se acopló a
  - se pegó a
  - se ató a
  lexicon: HALOT
  rationale: El verbo expresa una unión estrecha y comprometida; en español, «se unió a» comunica la adhesión reflexiva sin sonar mecánico. Mantiene la fuerza relacional e idólatra del hebreo sin introducir una imagen demasiado literal como «yugo» si no es necesaria en la línea principal.
- source_word: יִשְׂרָאֵל
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - el pueblo de Israel
  lexicon: nombre propio
  rationale: El nombre nacional se conserva como «Israel» por fidelidad directa y porque el sujeto colectivo es claro en español.
- source_word: לְבַעַל פְּעוֹר
  english_pob_choice: to Baal of Peor
  chosen_spanish: a Baal de Peor
  alternatives_spanish:
  - a Baal-peor
  - al Baal de Peor
  lexicon: HALOT
  rationale: La construcción posesiva se refleja naturalmente en español como «de Peor». Se evita fijar de entrada la forma fusionada «Baal-peor» en el texto principal, pero se preserva en nota la alternativa documentada.
- source_word: וַיִּחַר אַף
  english_pob_choice: the anger ... burned
  chosen_spanish: el furor ... se encendió
  alternatives_spanish:
  - la ira ... se encendió
  - la ira ... ardió
  - el enojo ... ardió
  lexicon: idiomático hebreo
  rationale: La expresión hebrea literalmente involucra calor/ardor de la ira. «El furor ... se encendió» conserva la metáfora de fuego y suena natural en español bíblico moderno. «Furor» es más fuerte y más cercano al movimiento afectivo del hebreo que un simple «enojo».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
  rationale: Se sigue el criterio del proyecto para renderizar el Tetragrámaton con el nombre divino «Yahvé», preservando el nombre propio del pacto en lugar de sustituirlo por un título.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: against Israel
  chosen_spanish: contra Israel
  alternatives_spanish:
  - en Israel
  - sobre Israel
  lexicon: HALOT
  rationale: Con חרה אף, la preposición marca el objeto de la ira. «Contra Israel» expresa con claridad la dirección adversativa del juicio divino en español.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahveh
  rationale: El texto hebreo usa directamente el Tetragrámaton. En español de este proyecto, la forma estándar es «Yahvé», que conserva el nombre divino y evita la sustitución por un título como «Señor».
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'Coincide con el control de revisión más reciente del paquete fuente: no se reportaron cambios necesarios y el consenso fue alto/agreed. La redacción española sigue ese resultado sin introducir innovaciones no sustentadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente para יְהוָה.
  - Se conserva la fuerza idólatra y relacional de צמד con una construcción reflexiva natural en español.
  - La metáfora de ardor en חרה אף se traduce con vocabulario de fuego para no suavizar la intensidad.
  - La nota alternativa recoge la variante lexical documentada sin duplicarla en el texto principal.
