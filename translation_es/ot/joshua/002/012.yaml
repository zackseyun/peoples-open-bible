  text: וְ/עַתָּ֗ה הִשָּֽׁבְעוּ נָ֥א לִ/י֙ בַּֽ/יהוָ֔ה כִּי עָשִׂ֥יתִי עִמָּ/כֶ֖ם חָ֑סֶד וַ/עֲשִׂיתֶ֨ם גַּם אַתֶּ֜ם עִם בֵּ֤ית אָבִ/י֙ חֶ֔סֶד וּ/נְתַתֶּ֥ם לִ֖/י א֥וֹת אֱמֶֽת־־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/joshua/002/012.yaml
  text: And now[a], please swear to me by Yahweh that, just as I have shown kindness to you, you also will show kindness to my father's house and give me a sure sign,
