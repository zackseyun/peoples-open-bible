translation:
  language: es
  text: Pero dejaré de entre ellos a unos pocos hombres[a], librados de la espada, del hambre, y de la peste, para que cuenten[b] todas sus abominaciones entre las naciones adonde vayan[c]; y sabrán que yo soy Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hombres» refleja el masculino gramatical del hebreo אַנְשֵׁי מִסְפָּר, que en este contexto señala un pequeño remanente masculino.
    reason: theological_note
  - marker: b
    text: «Cuenten» traduce el hebreo piel de ספר, con el sentido de relatar o narrar detalladamente sus actos.
    reason: lexical_alternative
  - marker: c
    text: El verbo hebreo es formalmente perfecto («han venido»), pero en este contexto de destino futuro puede expresarse naturalmente como «adonde vayan».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהוֹתַרְתִּי
  english_pob_choice: I will leave
  chosen_spanish: dejaré
  alternatives_spanish:
  - reservaré
  - haré quedar
  - dejaré con vida
  lexicon: HALOT
  rationale: El verbo hiphil de יתר expresa dejar sobrantes o hacer que queden restos. «Dejaré» comunica bien esa idea de remanente preservado sin añadir una paráfrasis más fuerte que el hebreo.
- source_word: מֵהֶם
  english_pob_choice: from among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - de ellos
  - de entre ellos
  lexicon: HALOT
  rationale: La preposición con pronombre marca selección desde dentro del grupo. «Entre ellos» refleja claramente el sentido partitivo en español natural.
- source_word: אַנְשֵׁי מִסְפָּר
  english_pob_choice: a few men
  chosen_spanish: unos pocos hombres
  alternatives_spanish:
  - unos cuantos hombres
  - un pequeño número de hombres
  - unas pocas personas
  lexicon: HALOT
  rationale: La expresión hebrea indica un remanente pequeño y contable, con masculino gramatical. «Unos pocos hombres» conserva esa referencia sin sonar rígido.
- source_word: מֵחֶרֶב
  english_pob_choice: from the sword
  chosen_spanish: de la espada
  alternatives_spanish:
  - de la guerra
  - de la violencia
  lexicon: HALOT
  rationale: «Espada» preserva el metonímico profético del juicio bélico. No conviene generalizarlo a «guerra» porque el texto conserva la imagen concreta.
- source_word: מֵרָעָב
  english_pob_choice: from famine
  chosen_spanish: del hambre
  alternatives_spanish:
  - de la hambruna
  - de la escasez de alimentos
  lexicon: HALOT
  rationale: Aunque «hambruna» puede servir, «hambre» mantiene una forma más directa y natural en español; el contexto profético ya da el valor de juicio/calamidad.
- source_word: וּמִדָּבֶר
  english_pob_choice: and from pestilence
  chosen_spanish: y de la peste
  alternatives_spanish:
  - y de la pestilencia
  - y de la plaga
  lexicon: HALOT
  rationale: דָּבֶר en fórmulas de juicio suele referirse a una peste o plaga mortal. «Peste» preserva esa triada profética clásica en español.
- source_word: לְמַעַן
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: HALOT
  rationale: Introduce finalidad, no mera consecuencia. «Para que» expresa el propósito con naturalidad en español.
- source_word: יְסַפְּרוּ
  english_pob_choice: they may recount
  chosen_spanish: cuenten
  alternatives_spanish:
  - relaten
  - recuenten
  - narren
  lexicon: HALOT
  rationale: El piel de ספר aquí significa decir o relatar de forma explícita. «Cuenten» es breve y natural; en el contexto incluye el matiz de relatar sus actos.
- source_word: אֵת כָּל תּוֹעֲבוֹתֵיהֶם
  english_pob_choice: all their abominations
  chosen_spanish: todas sus abominaciones
  alternatives_spanish:
  - todas sus cosas abominables
  - todos sus actos detestables
  - todas sus prácticas abominables
  lexicon: HALOT
  rationale: «Abominaciones» conserva el peso moral y cultual de תּוֹעֵבָה en Ezequiel, especialmente en contextos de idolatría y rebelión.
- source_word: בַּגּוֹיִם
  english_pob_choice: among the nations
  chosen_spanish: entre las naciones
  alternatives_spanish:
  - entre los pueblos
  - en medio de las naciones
  lexicon: HALOT
  rationale: En Ezequiel, גּוֹיִם se refiere a las naciones extranjeras. «Entre las naciones» es fiel y natural en español.
- source_word: אֲשֶׁר בָּאוּ שָׁם
  english_pob_choice: where they go
  chosen_spanish: a las cuales vayan
  alternatives_spanish:
  - donde han ido
  - donde vayan
  - a donde hayan ido
  lexicon: HALOT
  rationale: El hebreo tiene un perfecto formal, pero en este contexto futuro funciona como destino relativo de la dispersión. «A las cuales vayan» conserva la orientación futura sin forzar un presente castellano.
- source_word: וְיָדְע֖וּ
  english_pob_choice: and they will know
  chosen_spanish: sabrán
  alternatives_spanish:
  - conocerán
  - y sabrán
  lexicon: HALOT
  rationale: La fórmula de reconocimiento de Ezequiel apunta a conocimiento concluyente de la identidad de Yahvé. «Sabrán» es una forma compacta y clara en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  - Yahweh
  lexicon: HALOT
  rationale: 'Se sigue la convención del proyecto para el Tetragrámaton: «Yahvé», manteniendo el nombre divino personal en lugar de sustituirlo por un título.'
theological_decisions:
- issue: Sexo gramatical en אַנְשֵׁי מִסְפָּר
  english_pob_reading: a few men
  chosen_spanish_reading: unos pocos hombres
  alternative_spanish_readings:
  - unas pocas personas
  - un pequeño número de personas
  rationale: El hebreo usa forma masculina y se refiere a varones concretos dentro del remanente. Se mantiene el masculino explícito para no neutralizar el dato gramatical.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El versículo emplea directamente el Tetragrámaton. Según la norma del proyecto, debe conservarse el nombre divino como nombre propio y no reemplazarse por «Señor».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'La redacción sigue el patrón revisado del audit trail inglés: mantener el sentido partitivo de «leave a few men of them», conservar la tríada profética «sword, famine, and pestilence», y reflejar la cláusula final como conocimiento conclusivo de Yahvé. También se atiende la nota inglesa sobre el perfecto formal en la cláusula relativa, optando por una formulación española futurizante más natural sin perder el valor de destino.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» conforme a la terminología del proyecto para יְהוָה.
  - Se mantiene «abominaciones» para תּוֹעֵבוֹת, en línea con la carga cultual y moral del libro de Ezequiel.
  - La secuencia «de la espada, del hambre y de la peste» reproduce la fórmula profética clásica sin suavizarla.
  - El español usa una construcción natural con «entre ellas/entre ellos» para el sentido partitivo de מֵהֶם.
  - No se introduce terminología eclesiástica tradicional que atenúe el registro profético del versículo.
