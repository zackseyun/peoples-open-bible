translation:
  language: es
  text: Te he instruido en el camino de la sabiduría; te he guiado en sendas de rectitud[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sendas de lo recto». El sustantivo hebreo puede evocar tanto rectitud moral como recteza o derechura literal.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּ/דֶרֶךְ חָכְמָה
  english_pob_choice: in the way of wisdom
  chosen_spanish: en el camino de la sabiduría
  alternatives_spanish:
  - en la senda de la sabiduría
  - en la vía de la sabiduría
  lexicon: HALOT
  rationale: דֶּרֶךְ nombra literalmente un camino o ruta, y en Proverbios suele funcionar como metáfora del modo de vivir. «Camino de la sabiduría» conserva esa imagen sin volverla demasiado abstracta. «Sabiduría» mantiene el sustantivo del hebreo חָכְמָה.
- source_word: הֹרֵתִיךָ
  english_pob_choice: I have instructed you
  chosen_spanish: te he instruido
  alternatives_spanish:
  - te he enseñado
  - te he dirigido
  lexicon: HALOT
  rationale: El hifil de ירה puede significar enseñar, instruir o dirigir. «He instruido» refleja bien la acción pedagógica en un contexto sapiencial y mantiene la relación con el segundo verbo de guía.
- source_word: הִדְרַכְתִּיךָ
  english_pob_choice: I have led you
  chosen_spanish: te he guiado
  alternatives_spanish:
  - te he conducido
  - te he llevado
  lexicon: HALOT
  rationale: El hifil de דרך expresa conducir por un camino. «Guiado» preserva la imagen de dirección y suena natural en español bíblico contemporáneo.
- source_word: בְּ/מַעְגְּלֵי
  english_pob_choice: in paths of
  chosen_spanish: en sendas de
  alternatives_spanish:
  - en caminos de
  - en huellas de
  lexicon: HALOT
  rationale: מַעְגָּל designa huella, sendero o curso. «Sendas» conserva el plural poético y armoniza con «camino» del primer hemistiquio.
- source_word: יֹשֶׁר
  english_pob_choice: uprightness
  chosen_spanish: rectitud
  alternatives_spanish:
  - straightness
  - justicia
  lexicon: HALOT
  rationale: יֹשֶׁר puede evocar tanto la idea física de lo recto como la moral. En español, «rectitud» comunica de modo claro la dimensión ética y conserva la posible tensión con la lectura más literal de «straightness».
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la versión inglesa auditada: se mantiene la estructura paralela de dos miembros y la alternancia instrucción/guía. No se documentan revisiones textuales o doctrinales adicionales en el paquete de auditoría.'
  spanish_consistency_notes:
  - Se prefirió «sabiduría» para חָכְמָה, en línea con el uso sapiencial estándar.
  - Se evitó «SEÑOR» u otras sustituciones porque no hay aquí el Tetragrámaton ni un caso de κύριος.
  - «Rectitud» traduce el valor moral de יֹשֶׁר sin borrar la posible resonancia de «lo recto» en el hebreo.
