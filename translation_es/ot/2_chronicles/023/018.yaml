  to: Y Joyadá estableció las responsabilidades de la casa de Yahvé en manos[a] de los sacerdotes, los levitas[b], a quienes David había asignado sobre la casa de Yahvé, para ofrecer los holocaustos de Yahvé, como está escrito en la Ley de Moisés, con alegría y con canto, según lo dispuesto por David[c].
  rationale: 'Se ajusta el texto para reflejar mejor el sentido administrativo del hebreo y el audit trail inglés: ''había asignado'' en lugar de ''había distribuido''; ''según lo dispuesto por David'' en lugar de ''según la dirección de David''; y se añaden las notas de alternativa relevantes del POB inglés. También se mejora la naturalidad española con ''Joyadá'' y una redacción más idiomática de la nota sobre ''en la mano de''.'
