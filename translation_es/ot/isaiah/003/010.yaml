- from: Di del justo que le irá bien[a], porque comerá el fruto de sus obras.
  to: Digan del justo que le irá bien[a], porque comerán el fruto de sus obras.
  rationale: Se corrige el imperativo a plural para reflejar אִמְרוּ y se restaura en el texto principal el cambio de número de singular representativo a plural en la cláusula final, en línea con la evidencia hebrea y con la decisión del POB inglés. Se mantiene 'el justo' como singular representativo, pero con 'comerán' y 'sus obras' para preservar el rasgo fuente relevante. La nota se conserva, con redacción más clara.
