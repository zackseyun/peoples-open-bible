  language: en
  yaml_path: translation/ot/zephaniah/003/011.yaml
  text: On that day you will not be put to shame because of all your deeds by which you rebelled against me[a], for then I will remove from your midst those who exult in your pride[b], and you will no longer be haughty on my holy mountain.
  footnotes:
