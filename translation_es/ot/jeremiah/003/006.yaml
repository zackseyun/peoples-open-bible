base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/003/006.yaml
  text: And Yahweh said to me in the days of King Josiah[a], “Have you seen what backsliding Israel has done? She went up on every high hill and under every green tree[c][b], and there she committed prostitution.”
  footnotes:
  - marker: a
    text: Or 'apostate Israel' or 'backsliding Israel.' The Hebrew term denotes turning away or covenant unfaithfulness.
    reason: lexical_alternative
  - marker: b
    text: The phrases 'on every high hill' and 'under every green tree' are stock descriptions of places associated with illicit worship.
    reason: cultural_note
  - marker: c
    text: Or 'she played the whore there.' The Hebrew uses sexual infidelity as a metaphor for Israel's idolatry and covenant unfaithfulness.
    reason: lexical_alternative
