translation:
  language: es
  text: Y he aquí, también llegó Sadoc, y con él todos los levitas, llevando el arca del pacto de Dios. Y pusieron[b] el arca de Dios, y Abiatar subió[c] hasta que todo el pueblo hubo terminado de pasar de la ciudad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, de Jerusalén.
    reason: cross_reference
  - marker: b
    text: 'O: «la colocaron». El verbo hebreo puede indicar ponerla en su lugar o dejarla asentada allí.'
    reason: lexical_alternative
  - marker: c
    text: El hebreo dice literalmente «subió», y el matiz narrativo exacto no es seguro.
    reason: alternative_reading
lexical_decisions:
- source_word: וְהִנֵּה
  english_pob_choice: And behold
  chosen_spanish: Y he aquí
  alternatives_spanish:
  - Y miren
  - Y look
  lexicon: HALOT
  rationale: La partícula introduce un cambio vivaz de escena o un llamado a fijar la atención. «He aquí» preserva ese valor discursivo con un registro bíblico claro y natural en español.
- source_word: גַם
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - inclusive
  lexicon: HALOT
  rationale: Marca a Sadoc como participante adicional en la escena; «también» comunica bien la suma de elementos sin sobrecargar el estilo.
- source_word: צָדוֹק
  english_pob_choice: Zadok
  chosen_spanish: Sadoc
  alternatives_spanish:
  - Zadoc
  - Sadoq
  lexicon: Nombre propio (transliteración tradicional española)
  rationale: En español bíblico es común la forma «Sadoc», que respeta la identificación del personaje y suena más natural para lectura eclesial que una transliteración inglesa.
- source_word: כָל הַלְוִיִּם אִתּוֹ
  english_pob_choice: all the Levites with him
  chosen_spanish: todos los levitas, llevando el arca
  alternatives_spanish:
  - todos los levitas que estaban con él
  - todos los levitas con él
  lexicon: HALOT
  rationale: El hebreo presenta a los levitas como acompañantes de Sadoc y, por el participio siguiente, como sujetos de la acción de llevar. La puntuación española deja visible esa relación sin añadir una subordinada innecesaria.
- source_word: נֹשְׂאִים
  english_pob_choice: carrying
  chosen_spanish: llevando
  alternatives_spanish:
  - cargando
  - portando
  lexicon: HALOT
  rationale: El participio describe una acción en curso. «Llevando» es fluido y suficientemente preciso para el acto de transportar el arca.
- source_word: אֲרוֹן בְּרִית הָאֱלֹהִים
  english_pob_choice: the ark of the covenant of God
  chosen_spanish: el arca del pacto de Dios
  alternatives_spanish:
  - el arca del pacto de Dios
  - el arca del pacto divino
  lexicon: HALOT
  rationale: Se conserva la cadena constructa de manera transparente. «Pacto» expresa bien בְּרִית en este contexto narrativo; «de Dios» mantiene el complemento genitivo sin volverlo una paráfrasis.
- source_word: וַיַּצִּקוּ
  english_pob_choice: They set down
  chosen_spanish: pusieron
  alternatives_spanish:
  - la colocaron
  - la dejaron puesta
  - la asentaron
  lexicon: HALOT
  rationale: El verbo admite una idea de colocar o poner en reposo. «Pusieron» es la opción más natural en español y conserva la acción sin forzar un tecnicismo.
- source_word: אֶת אֲרוֹן הָאֱלֹהִים
  english_pob_choice: the ark of God
  chosen_spanish: el arca de Dios
  alternatives_spanish:
  - el arca de Dios
  lexicon: HALOT
  rationale: Se mantiene la variación hebrea entre la expresión más completa y la más breve. En español, «arca de Dios» conserva la referencia y evita redundancia pesada.
- source_word: וַיַּעַל אֶבְיָתָר
  english_pob_choice: and Abiathar went up
  chosen_spanish: y Abiatar subió
  alternatives_spanish:
  - y Abiatar ascendió
  - y Abiatar subió allí
  lexicon: HALOT
  rationale: Se preserva el verbo literal de movimiento ascendente sin resolver interpretativamente la escena. «Subió» es fiel y permite la misma ambigüedad narrativa que el hebreo.
- source_word: עַד תֹּם כָּל הָעָם
  english_pob_choice: until all the people had finished
  chosen_spanish: hasta que todo el pueblo hubo terminado
  alternatives_spanish:
  - hasta que todo el pueblo terminó
  - hasta la terminación de todo el pueblo
  lexicon: HALOT
  rationale: La construcción temporal exige una cláusula finita en español. «Hubo terminado» refleja el valor completivo del hebreo y mantiene el cierre de la acción.
- source_word: לַעֲבוֹר
  english_pob_choice: passing over
  chosen_spanish: de pasar
  alternatives_spanish:
  - de cruzar
  - de pasar al otro lado
  lexicon: HALOT
  rationale: El infinitivo expresa la acción de atravesar o pasar. «De pasar» es simple y directo; en contexto, el movimiento fuera de la ciudad queda claro sin añadir elementos no explícitos.
- source_word: מִן הָעִיר
  english_pob_choice: from the city
  chosen_spanish: desde la ciudad
  alternatives_spanish:
  - de la ciudad
  - fuera de la ciudad
  lexicon: HALOT
  rationale: «Desde la ciudad» conserva el punto de partida del movimiento y suena natural en español. La identificación concreta con Jerusalén queda en el contexto narrativo, sin reemplazar la expresión del texto.
theological_decisions:
- issue: Referencia de «la ciudad»
  english_pob_reading: Rendered generically as 'the city' without specifying Jerusalem in the main text.
  chosen_spanish_reading: Se mantuvo «la ciudad» y no se explicitó «Jerusalén» en el cuerpo del texto.
  alternative_spanish_readings:
  - desde Jerusalén
  rationale: El hebreo dice literalmente «de la ciudad». Aunque el contexto apunta a Jerusalén, la traducción principal conserva la forma del texto y deja la identificación contextual a la lectura continua.
  doctrine_reference: Translation philosophy §1, §5
- issue: Nuance of וַיַּעַל אֶבְיָתָר
  english_pob_reading: Preserved the literal motion verb 'went up' rather than resolving the narrative detail more interpretively.
  chosen_spanish_reading: Se mantuvo el verbo literal «subió» para Abiatar.
  alternative_spanish_readings:
  - Abiatar vino arriba
  - Abiatar ascendió
  rationale: La forma verbal de עלה indica subida o movimiento ascendente; el contexto no obliga a convertirlo en otra acción. Mantener «subió» conserva la tensión narrativa y evita sobreinterpretar el verso.
  doctrine_reference: Translation philosophy §3
- issue: Renderizado de אֲרוֹן בְּרִית הָאֱלֹהִים
  english_pob_reading: the ark of the covenant of God
  chosen_spanish_reading: el arca del pacto de Dios
  alternative_spanish_readings:
  - el arca del pacto de Dios
  rationale: Se mantiene la noción de pacto y la referencia a Dios sin convertir la frase en una expresión litúrgica más tradicional que la hebrea. Esto conserva la estructura semítica transparente.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente al preferir un tono formal equivalente a «he aquí» para וְהִנֵּה y al conservar una cláusula temporal que refleje el valor completivo de עַד תֹּם. Frente a la oscilación entre «pasar», «cruzar» y «pasar sobre», se eligió «pasar» por fidelidad léxica y fluidez en español, mientras que la nota de pie preserva la alternativa de puesta en lugar para וַיַּצִּקוּ y la ambigüedad de וַיַּעַל.
  spanish_consistency_notes:
  - Se conserva «Dios» en todo el verso para אֱלֹהִים, sin introducir «el Señor».
  - Se usa «arca» de manera consistente para אֲרוֹן.
  - Se prefirió «pacto» para בְּרִית por transparencia semántica y coherencia con el patrón POB.
  - 'Los nombres propios se adaptan a una forma española reconocible: Sadoc, Abiatar.'
  - La puntuación separa claramente la acción de los levitas y la de Abiatar, como en el hebreo, sin añadir sujetos implícitos innecesarios.
