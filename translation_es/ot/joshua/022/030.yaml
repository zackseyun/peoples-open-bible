  language: en
  yaml_path: translation/ot/joshua/022/030.yaml
  text: When Phinehas the priest[a], the leaders of the congregation, and the heads of the thousands of Israel who were with him heard the words that the sons of Reuben, the sons of Gad, and the sons of Manasseh spoke[b], it was good in their eyes.
  footnotes:
