translation:
  language: es
  text: Lo persuadió para que llegara a un arreglo[a] en todo lo justo[b], y que también persuadiría al rey, obligándolo a volverse favorable a ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo griego aquí es inusual y el testimonio está marcado con una discrepancia mayor; por eso se traduce de manera prudente como llegar a un arreglo o acuerdo, sin fijar una noción jurídica más estrecha.
    reason: textual_variant
  - marker: b
    text: 'También puede entenderse: «sobre todos los términos justos» o «con respecto a todas las demandas justas». El griego δικαίοις tiene un valor amplio y puede aludir tanto a lo justo como a condiciones equitativas del pacto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεισεν
  english_pob_choice: He persuaded
  chosen_spanish: Lo persuadió
  alternatives_spanish:
  - Lo convenció
  - Lo ganó
  lexicon: LSJ
  rationale: El aoristo de πείθω expresa persuadir de manera directa. «Lo persuadió» mantiene la relación verbal con πείσει y conserva el matiz diplomático del contexto.
- source_word: συλλύεσθαι
  english_pob_choice: to come to terms
  chosen_spanish: que se llegara a un arreglo
  alternatives_spanish:
  - que se reconciliara
  - que se pactara
  - que se resolviera
  lexicon: LSJ
  rationale: El verbo es difícil y el testimonio griego presenta tensión textual/lexical. En este contexto de negociación, la idea más probable es alcanzar un arreglo o acuerdo; en español, «llegar a un arreglo» comunica esa negociación sin sobreespecificar.
- source_word: ἐπὶ πᾶσι τοῖς δικαίοις
  english_pob_choice: on all the just demands
  chosen_spanish: sobre todas las cosas justas
  alternatives_spanish:
  - sobre todas las demandas justas
  - en todo lo justo
  - con respecto a todo lo justo
  lexicon: LSJ
  rationale: δικαίοις funciona sustantivamente como «lo justo / lo correcto». «Cosas justas» conserva la amplitud semántica del original y evita cerrar el sentido a un tecnicismo legal que el griego no exige.
- source_word: διότι καὶ τὸν βασιλέα πείσει
  english_pob_choice: and that he would also persuade the king
  chosen_spanish: que también persuadiría al rey
  alternatives_spanish:
  - y que también persuadiría al rey
  - porque también persuadiría al rey
  - que además convencería al rey
  lexicon: LSJ
  rationale: διότι aquí introduce el contenido de lo prometido, no simplemente una causa. «Que también persuadiría al rey» preserva el futuro de πείσει y el paralelismo con ἔπεισεν.
- source_word: φίλον αὐτοῖς
  english_pob_choice: their friend
  chosen_spanish: volverse favorable a ellos
  alternatives_spanish:
  - serles amigo
  - llegar a ser su amigo
  - hacerse favorable para ellos
  lexicon: LSJ
  rationale: φίλον con dativo aquí expresa disposición favorable más que amistad íntima. En español, «volverse favorable a ellos» evita una lectura excesivamente afectiva y mantiene el matiz político.
- source_word: ἀναγκάζων γενέσθαι
  english_pob_choice: compelling him to become
  chosen_spanish: obligándolo a volverse favorable a ellos
  alternatives_spanish:
  - forzándolo a volverse favorable a ellos
  - compeliéndolo a hacerse su amigo
  - presionándolo para que se hiciera favorable a ellos
  lexicon: LSJ
  rationale: El participio presente de ἀναγκάζω comunica presión fuerte o coerción. «Obligándolo» conserva la fuerza; se integra con el predicado complementario para hacer natural la frase en español.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés, especialmente la dificultad textual de συλλύεσθαι y la lectura diplomática de δικαίοις y φίλον αὐτοῖς. No se siguió mecánicamente el inglés: se ajustó la sintaxis al español y se preservó la tensión semántica del griego donde el testimonio es incierto.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo exigiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantuvo un registro neutral y eclesial, evitando arcaísmos innecesarios.
  - Se tradujo πείθω con verbos de persuasión para conservar la repetición léxica del griego.
