base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/013/020.yaml
  text: 'Therefore thus says the Lord GOD: Behold[a], I am against your magic bands with which you hunt the lives there like birds, and I will tear them from your arms[c][b], and I will let the lives go free—the ones you hunt like birds.'
  footnotes:
  - marker: a
    text: Or 'your cushions' or 'your amulets'; the Hebrew term is rare and its exact referent is uncertain, likely some ritual object used by the prophetesses.
    reason: lexical_alternative
  - marker: b
    text: Literally 'to fly' or 'flying ones'; the Hebrew likely uses bird-hunting imagery for the people being ensnared.
    reason: lexical_alternative
  - marker: c
    text: Hebrew 'souls' or 'lives'; here the sense is people as living beings.
    reason: lexical_alternative
