  spanish_consistency_notes:
  - Se mantuvo el tono narrativo sobrio y la sintaxis abierta del original, sin completar el período con una clausura no atestiguada.
  - Se prefirió «compatriotas» para ὁμοεθνεῖς y «hermanos» para ἀδελφῶν, en continuidad con la terminología de comunidad y parentesco.
  - No se introdujo vocabulario eclesiástico posterior; la frase permanece en un registro judío/narrativo acorde con el pasaje.
