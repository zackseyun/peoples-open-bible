translation:
  language: es
  text: y que son poderosos. Le contaron sus guerras y las hazañas[a] que hicieron entre los gálatas[b], y que los habían sometido y los habían puesto bajo tributo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «actos de valor»; el término griego enfatiza el valor militar.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «entre los gálatas». La frase puede referirse a hechos romanos en relación con los gálatas o en territorio gálata.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνατοὶ ἰσχύϊ
  english_pob_choice: mighty in strength
  chosen_spanish: poderosos en fuerza
  alternatives_spanish:
  - fuertes en poder
  - mighty en fuerza
  lexicon: LSJ
  rationale: La expresión griega es enfática y algo pleonástica; en español, «poderosos en fuerza» conserva la intensificación militar sin sonar demasiado literal o forzado.
- source_word: διηγήσαντο
  english_pob_choice: they told
  chosen_spanish: Le contaron
  alternatives_spanish:
  - Le relataron
  - Le narraron
  lexicon: LSJ
  rationale: El verbo indica dar cuenta o relatar. «Le contaron» es natural en español y mantiene la idea de informe histórico.
- source_word: πολέμους
  english_pob_choice: wars
  chosen_spanish: guerras
  alternatives_spanish:
  - campañas
  - batallas
  lexicon: LSJ
  rationale: El plural amplio se refleja mejor con «guerras»; «batallas» sería demasiado estrecho y «campañas» más interpretativo.
- source_word: ἀνδραγαθίας
  english_pob_choice: brave deeds
  chosen_spanish: hazañas
  alternatives_spanish:
  - actos de valor
  - hechos heroicos
  - proezas
  lexicon: LSJ
  rationale: El término denota actos de valor marcial. «Hazañas» comunica bien la idea de hechos valerosos sin caer en una expresión arcaica o marcadamente masculina.
- source_word: ἐν τοῖς Γαλάταις
  english_pob_choice: among the Galatians
  chosen_spanish: entre los galos
  alternatives_spanish:
  - entre los galatas
  - en Galacia
  lexicon: LSJ
  rationale: El griego dice literalmente «entre los Galatas/Gálatas». En español, «galos» puede evitar una transliteración poco transparente, pero mantiene la nota histórica de un pueblo céltico relacionado con los galatas; se deja la alternativa literal en nota para no borrar la ambigüedad geográfica/étnica del original.
- source_word: κατεκράτησαν αὐτῶν
  english_pob_choice: had subdued them
  chosen_spanish: los habían sometido
  alternatives_spanish:
  - habían prevalecido sobre ellos
  - habían ganado dominio sobre ellos
  lexicon: LSJ
  rationale: El verbo expresa dominio militar y político; «sometido» encaja bien y prepara la cláusula siguiente sobre el tributo.
- source_word: ὑπὸ φόρον
  english_pob_choice: under tribute
  chosen_spanish: bajo tributo
  alternatives_spanish:
  - sujetos a tributo
  - obligados a pagar tributo
  lexicon: LSJ
  rationale: La construcción idiomática señala sujeción mediante tributo impuesto. «Bajo tributo» conserva la fuerza política del original con brevedad.
translation_notes:
  revision_awareness: La versión inglesa auditada cambió «do» por «did» para mantener la secuencia narrativa en pasado; el español refleja ya de forma natural esa coherencia verbal con «le contaron» y «hicieron». También se retuvo el encadenamiento militar-político de δύναμις/κατεκράτησαν/φόρον sin suavizarlo.
  spanish_consistency_notes:
  - Se mantiene el pasado narrativo en toda la cláusula.
  - «Hazañas» se usa para ἀνδραγαθίας por su claridad y dignidad en español.
  - La referencia étnico-geográfica de Γαλάται se resuelve de modo interpretativo en el texto, con nota para la lectura literal.
