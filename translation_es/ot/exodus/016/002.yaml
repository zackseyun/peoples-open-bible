lexical_decisions:
- source_word: וַיִּלּוֹנוּ
  english_pob_choice: grumbled
  chosen_spanish: murmuró
  alternatives_spanish:
  - se quejó
  - refunfuñó
  lexicon: HALOT
  rationale: El verbo en este contexto expresa protesta colectiva contra los líderes; «murmuró» conserva ese matiz de queja hostil sin sonar excesivamente coloquial.
- source_word: כָּל
  english_pob_choice: the whole
  chosen_spanish: toda
  alternatives_spanish:
  - todo el
  - la totalidad de la
  lexicon: HALOT
  rationale: Con un sustantivo colectivo, «toda» comunica con naturalidad la idea de totalidad que el hebreo enfatiza.
- source_word: עֲדַת
  english_pob_choice: congregation
  chosen_spanish: congregación
  alternatives_spanish:
  - asamblea
  - comunidad
  lexicon: HALOT
  rationale: «Congregación» preserva el sentido corporativo del grupo reunido de Israel y es claro en español bíblico actual.
- source_word: בְּנֵי יִשְׂרָאֵל
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: HALOT
  rationale: Se mantiene la forma masculina plural del hebreo como «los hijos de Israel», en lugar de neutralizarla, porque el texto fuente nombra así al pueblo.
- source_word: עַל
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - sobre
  - en contra de
  lexicon: HALOT
  rationale: En esta queja dirigida a personas, la preposición marca oposición; «contra» reproduce mejor esa fuerza adversativa.
- source_word: בַּמִּדְבָּר
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto salvaje
  - en la tierra de desierto
  lexicon: HALOT
  rationale: Aunque «wilderness» puede traducirse como «desierto» o «desierto/yermo», aquí «en el desierto» es el equivalente español más natural y reconocido para el escenario narrativo del éxodo.
theological_decisions:
- issue: Conservar la forma masculina de בְּנֵי יִשְׂרָאֵל
  english_pob_reading: the sons of Israel
  chosen_spanish_reading: los hijos de Israel
  alternative_spanish_readings:
  - los israelitas
  - los hijos de Israel
  rationale: La decisión sigue la lectura del POB en inglés de mantener la forma masculina del hebreo por fidelidad formal y por su principio de precisión de género. No se sustituye por un etnónimo neutral en el texto principal.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no hay cambios aplicados y el consenso de verificación fue de alta concordancia.'
  spanish_consistency_notes:
