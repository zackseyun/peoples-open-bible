translation:
  language: es
  text: Y no dicen en su corazón[a] que yo recuerdo toda su maldad[b]. Ahora sus obras los rodean; están delante de mi rostro[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se dicen a sí mismos». El hebreo dice literalmente: «dicen a su corazón».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «toda su perversidad» o «todas sus malas obras».'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «delante de mi rostro»; el hebreo expresa así la exposición directa ante la presencia y el escrutinio de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבַל יֹאמְרוּ
  english_pob_choice: And they do not say
  chosen_spanish: Y no dicen
  alternatives_spanish:
  - Pero no dicen
  - Y no se dicen
  lexicon: HALOT
  rationale: La combinación conjuntiva y la negación se rinde de forma simple con 'Y no', conservando el flujo acusatorio sin imponer un matiz adversativo que el hebreo no exige.
- source_word: לִלְבָבָם
  english_pob_choice: say in their heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - para sí mismos
  - a su corazón
  lexicon: HALOT
  rationale: El hebreo usa el modismo 'hablar al corazón'. En español, 'en su corazón' preserva la imagen interior con buena naturalidad; 'para sí mismos' sería más dinámico pero menos imagético.
- source_word: כָּל רָעָתָם
  english_pob_choice: all their evil
  chosen_spanish: toda su maldad
  alternatives_spanish:
  - toda su maldad
  - toda su perversidad
  - todas sus malas obras
  lexicon: HALOT
  rationale: רָעָה aquí abarca maldad moral y su expresión concreta. 'Maldad' comunica ese campo semántico con fuerza y sin reducirlo sólo a actos externos.
- source_word: זָכַרְתִּי
  english_pob_choice: I remember
  chosen_spanish: yo recuerdo
  alternatives_spanish:
  - yo he recordado
  - yo tengo presente
  lexicon: HALOT
  rationale: El perfecto hebreo expresa una realidad vigente de conciencia y juicio divinos. 'Yo recuerdo' suena natural en español y conserva la fuerza presente de la acusación.
- source_word: סְבָבוּם
  english_pob_choice: surround them
  chosen_spanish: los rodean
  alternatives_spanish:
  - los cercan
  - los cercan por todas partes
  lexicon: HALOT
  rationale: El verbo describe cómo las obras del pueblo los cercan. 'Los rodean' reproduce la metáfora de manera directa y clara en español.
- source_word: מַעַלְלֵיהֶם
  english_pob_choice: their deeds
  chosen_spanish: sus hechos
  alternatives_spanish:
  - sus obras
  - sus acciones
  - sus prácticas
  lexicon: HALOT
  rationale: מַעֲלָלִים suele referirse a hechos o acciones con carga moral. 'Hechos' es preciso y suficientemente amplio para abarcar el matiz ético.
- source_word: נֶגֶד פָּנַי
  english_pob_choice: before my face
  chosen_spanish: delante de mi rostro
  alternatives_spanish:
  - ante mi presencia
  - delante de mí
  lexicon: HALOT
  rationale: La expresión es idiomática y antropomórfica. 'Delante de mi rostro' mantiene la concreción del hebreo y preserva la idea de exposición directa al escrutinio divino.
- source_word: הָיוּ
  english_pob_choice: they are
  chosen_spanish: están
  alternatives_spanish:
  - han quedado
  - han llegado a estar
  lexicon: HALOT
  rationale: 'Aunque formalmente es perfecto, en contexto describe una condición actual: las obras del pueblo los tienen cercados y visibles ante Dios. ''Están'' comunica bien ese estado presente.'
theological_decisions:
- issue: Preservar el modismo hebreo de interioridad
  english_pob_reading: say in their heart
  chosen_spanish_reading: en su corazón
  alternative_spanish_readings:
  - para sí mismos
  - piensan
  rationale: Mantener la imagen del corazón como sede de la deliberación preserva el tono profético y evita aplanar el modismo en una mera referencia a pensamiento abstracto.
  doctrine_reference: Tradición profética del hebreo bíblico; cf. Pr 23:7 en uso idiomático
- issue: Antropomorfismo de juicio divino
  english_pob_reading: before my face
  chosen_spanish_reading: delante de mi rostro
  alternative_spanish_readings:
  - ante mí
  - en mi presencia
  rationale: La frase conserva el lenguaje concreto del hebreo sobre la cercanía y exposición de la culpa ante Dios. No se suaviza a una fórmula más plana, para respetar el peso retórico y teológico del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: la negación continua de וּבַל, el modismo ''say to their heart'', la amplitud moral de רָעָה, el valor presente de זָכַרְתִּי y la imagen antropomórfica de נֶגֶד פָּנַי. No se detectaron revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se mantiene 'Dios/Yahvé' según el texto; aquí no aparece el nombre divino explícito, por lo que la referencia se expresa con el pronombre de primera persona en discurso directo.
  - '''Maldad'' se usa por su alcance moral amplio y su adecuación profética.'
  - Se conserva el paralelismo visual entre las obras que rodean y la exposición 'delante de mi rostro'.
