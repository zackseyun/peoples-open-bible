revisions:
- from: El que estaba humillado[a] pronto será liberado; no morirá en el hoyo[b], y no le faltará su pan.
  to: El que está encorvado[a] pronto será liberado; no morirá en el hoyo[b], y no le faltará pan.
  rationale: Se revisa «humillado» a «encorvado» para conservar mejor la imagen corporal y opresiva del hebreo צֹעֶה, en línea con la justificación del POB inglés. Se simplifica «no le faltará su pan» a «no le faltará pan» por naturalidad idiomática sin pérdida semántica. También se limpian las notas para un estilo editorial más consistente.
