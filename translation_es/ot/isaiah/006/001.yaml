revisions:
- from: En el año de la muerte del rey Uzías[a], vi al Señor sentado sobre un trono, alto y exaltado[b], y el borde de su manto llenaba el templo.
  to: En el año de la muerte del rey Uzías, vi al Señor sentado sobre un trono, alto y levantado, y el borde[a] de su manto llenaba el templo[b].
  rationale: Se corrigen las notas para que coincidan con el rastro auditado y con sus anclajes en el texto. También se ajusta «alto y exaltado» a «alto y levantado» para preservar mejor la imaginería dual de רָם וְנִשָּׂא según la decisión léxica del POB. El resto del verso ya era fiel y natural en español.
