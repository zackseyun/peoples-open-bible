translation:
  language: es
  text: y no hemos obedecido la voz de Yahvé nuestro Dios, para caminar en sus leyes, que puso delante de nosotros por medio de sus siervos, los profetas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «por la mano de sus siervos, los profetas», un modismo que significa «por medio de sus siervos, los profetas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: שָׁמַעְנוּ
  english_pob_choice: have not obeyed
  chosen_spanish: no hemos obedecido
  alternatives_spanish:
  - no hemos escuchado
  - no hemos atendido
  lexicon: HALOT
  rationale: En este contexto de confesión del pacto, שׁמע con בְּקוֹל expresa escuchar con respuesta obediente. 'Obedecido' comunica mejor la fuerza covenantal que una escucha meramente auditiva.
- source_word: בְּקוֹל
  english_pob_choice: the voice of
  chosen_spanish: la voz de
  alternatives_spanish:
  - el mandato de
  - lo que dijo
  lexicon: HALOT
  rationale: La expresión hebrea conserva la imagen de la voz personal de Yahvé; en español 'la voz de' suena natural y mantiene esa relación directa sin diluirla en una paráfrasis.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  lexicon: HALOT
  rationale: Se mantiene el nombre divino conforme a la pauta del proyecto para יְהוָה. 'Yahvé' preserva el nombre propio y evita la sustitución por un título.
- source_word: לָלֶכֶת
  english_pob_choice: to walk
  chosen_spanish: para caminar
  alternatives_spanish:
  - para andar
  - para vivir
  lexicon: HALOT
  rationale: El infinitivo expresa finalidad o dirección respecto de la obediencia previa. 'Caminar' conserva la metáfora bíblica de conducta de manera comprensible en español actual.
- source_word: בְּתוֹרֹתָיו
  english_pob_choice: in his laws
  chosen_spanish: en sus leyes
  alternatives_spanish:
  - en su instrucción
  - en sus enseñanzas
  lexicon: HALOT
  rationale: Aunque תּוֹרָה puede significar 'instrucción', el plural y el contexto de conducta pactal favorecen 'leyes' como forma concreta de los mandatos dados por Dios.
- source_word: אֲשֶׁר נָתַן לְפָנֵינוּ
  english_pob_choice: which he set before us
  chosen_spanish: que puso delante de nosotros
  alternatives_spanish:
  - que colocó ante nosotros
  - que nos dio delante
  lexicon: HALOT
  rationale: El hebreo idiomático comunica presentación/intimación de normas. 'Puso delante de nosotros' reproduce fielmente la imagen sin sonar forzado en español.
- source_word: בְּיַד
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - a través de
  - mediante
  lexicon: HALOT
  rationale: La locución 'por medio de' expresa la agencia mediadora del hebreo 'por la mano de' sin perder claridad. Se reserva la literalidad idiomática para la nota.
- source_word: עֲבָדָיו
  english_pob_choice: his servants
  chosen_spanish: sus siervos
  alternatives_spanish:
  - sus esclavos
  lexicon: HALOT
  rationale: En fórmulas proféticas, עבד designa al agente comisionado por Dios. 'Siervos' es la opción natural en español e identifica el servicio profético sin introducir la dureza de 'esclavos'.
- source_word: הַנְּבִיאִים
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - los videntes
  lexicon: HALOT
  rationale: El sustantivo definido identifica a los mensajeros proféticos. 'Los profetas' es la correspondencia directa y clara en español.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  rationale: Se conserva el nombre propio del pacto según la política del proyecto, en lugar de ocultarlo tras una sustitución titulada. Esto mantiene la transparencia textual y la continuidad con el original hebreo.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de תּוֹרֹתָיו en plural
  english_pob_reading: laws
  chosen_spanish_reading: leyes
  alternative_spanish_readings:
  - instrucción
  - enseñanzas
  rationale: El plural, unido a 'caminar en', presenta las disposiciones concretas de Dios. 'Leyes' conserva el peso jurídico-covenantal del pasaje sin excluir el sentido más amplio de instrucción.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §5
- issue: יָד / בְּיַד como medio de mediación
  english_pob_reading: through his servants the prophets
  chosen_spanish_reading: por medio de sus siervos, los profetas
  alternative_spanish_readings:
  - por la mano de sus siervos, los profetas
  rationale: La expresión hebrea 'por la mano de' indica mediación. La traducción principal comunica esa mediación en español corriente, y la lectura más literal queda preservada en la nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue el último pase de revisión del texto inglés: conserva el infinitivo final como propósito (''para caminar'') y mantiene la mediación profética con una frase natural en español (''por medio de''). También se retuvo la decisión del nombre divino ''Yahvé'' conforme al estándar del proyecto.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' para יְהוָה en coherencia con el resto del corpus.
  - '''Siervos'' se usa para עֲבָדָיו por tratarse de un contexto profético oficial, no de estatus social general.'
  - '''Leyes'' refleja el plural de תּוֹרֹתָיו y su marco de pacto/obediencia.'
  - La nota al pie cubre la metáfora hebrea de 'por la mano de' sin duplicar su sentido en el cuerpo principal.
