    rationale: Aunque «quedarse» capta permanencia, el hebreo y la auditoría inglesa favorecen el sentido más físico y concreto de «sentarse». «Se sentaron allí» es natural en español y preserva mejor el matiz del original.
  revised_spanish_text: Entonces el pueblo vino a Betel y se sentaron allí hasta la tarde, delante de Dios, y alzaron su voz y lloraron con gran llanto[a].
