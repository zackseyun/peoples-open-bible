    reason: cultural_note
  revision_rationale: Se corrigen los anclajes de notas para que coincidan con las palabras a las que realmente comentan, y se reemplaza «Al tiempo» por «En ese tiempo» para un español más natural y fiel al valor temporal idiomático del griego. Se conserva el resto de las decisiones principales, que son sólidas.
