translation:
  language: es
  text: Tal conocimiento es maravilloso, más allá de mí[a]; es demasiado alto, no puedo alcanzarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Tal conocimiento está más allá de mí; es exaltado; no puedo alcanzarlo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: פלאיה
  english_pob_choice: too wonderful
  chosen_spanish: demasiado maravilloso
  alternatives_spanish:
  - maravilloso
  - extraordinario
  - más allá de mi comprensión
  lexicon: HALOT
  rationale: El hebreo expresa algo extraordinario, admirable y que sobrepasa la capacidad del hablante. «Demasiado maravilloso» conserva la fuerza predicativa de la frase inglesa y sugiere excedencia, sin reducir el término a una simple emoción.
- source_word: דַעַת
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - saber
  lexicon: HALOT
  rationale: En este contexto se refiere al conocimiento descrito en los versículos anteriores. «Conocimiento» es directo, natural en español y mantiene el sentido cognitivo principal.
- source_word: מִמֶּנִּי
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - más allá de mí
  - de mí
  lexicon: HALOT
  rationale: Aunque el hebreo literalmente dice «de/desde mí», el sentido idiomático apunta a la incapacidad personal del hablante. «Para mí» reproduce la fluidez de la lectura inglesa y comunica que está fuera de su alcance.
- source_word: נִשְׂגְּבָה
  english_pob_choice: it is too high
  chosen_spanish: es demasiado alto
  alternatives_spanish:
  - es exaltado
  - está fuera de mi alcance
  - es inaccesible
  lexicon: HALOT
  rationale: La raíz comunica altura, elevación e inaccesibilidad. «Demasiado alto» conserva la metáfora espacial del original y se coordina con la segunda cláusula de incapacidad.
- source_word: לֹא א֥וּכַֽל
  english_pob_choice: I cannot
  chosen_spanish: no puedo
  alternatives_spanish:
  - no soy capaz
  - no podré
  - no tengo capacidad
  lexicon: HALOT
  rationale: La forma verbal expresa imposibilidad. «No puedo» es la equivalencia más natural y directa en español.
- source_word: לָהּ
  english_pob_choice: attain it
  chosen_spanish: alcanzarlo
  alternatives_spanish:
  - llegar a ello
  - asirlo
  - lograrlo
  lexicon: HALOT
  rationale: El pronombre con preposición requiere suplir en español un verbo implícito por el contexto de altura. «Alcanzarlo» preserva la imagen de algo alto e inalcanzable, además de ser idiomático.
translation_notes:
  revision_awareness: El texto español sigue el sentido del hebreo y coincide con el audit trail inglés en mantener la metáfora de altura e inaccesibilidad, evitando una paráfrasis que borre la tensión entre maravilla, elevación e imposibilidad.
  spanish_consistency_notes:
  - Se usa «maravilloso» para פלאיה en vez de un calco literal de «wonderful»; en español, «demasiado maravilloso» comunica bien el exceso semántico.
  - «Conocimiento» mantiene la sustantivación del hebreo דַעַת.
  - La secuencia «demasiado alto, no puedo alcanzarlo» conserva el paralelismo sintáctico y la imagen espacial del verso.
