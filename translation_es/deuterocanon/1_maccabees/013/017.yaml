- from: Y Simón reconoció que le hablaban con engaño; sin embargo, envió el dinero y a los muchachos, para no suscitar una gran hostilidad contra el pueblo.
  to: Y Simón reconoció que le hablaban con engaño; sin embargo, envió el dinero[a] y a los muchachos, no fuera a suscitar una gran hostilidad contra el pueblo[b].
  rationale: Se conservó el sentido básico del borrador, pero se añadieron las notas necesarias para reflejar las alternativas léxicas y sintácticas documentadas en el POB inglés. También se ajustó 'para no suscitar' a 'no fuera a suscitar' para reproducir con más precisión el matiz preventivo de μή ποτε en español natural.
