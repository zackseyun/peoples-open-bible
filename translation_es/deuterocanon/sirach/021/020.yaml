translation:
  language: es
  text: El necio levanta su voz mientras ríe[a], pero el hombre sagaz apenas sonreirá en silencio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la risa». El griego expresa de forma compacta que el alzar la voz ocurre en el contexto de la risa.
    reason: lexical_alternative
lexical_decisions:
- source_word: μωρός
  english_pob_choice: fool
  chosen_spanish: necio
  alternatives_spanish:
  - tonto
  - insensato
  lexicon: BDAG / LSJ
  rationale: En la sabiduría bíblica, μωρός designa a la persona moralmente insensata, no solo poco inteligente. «Necio» conserva el registro proverbial y la fuerza ética mejor que «tonto».
- source_word: ἐν γέλωτι
  english_pob_choice: in laughter
  chosen_spanish: en la risa
  alternatives_spanish:
  - mientras ríe
  - con risa
  lexicon: LSJ
  rationale: La preposición ἐν con γέλωτι expresa el contexto de la acción. «En la risa» mantiene la compactación proverbial del griego y la relación con la voz levantada.
- source_word: ἀνυψοῖ
  english_pob_choice: raises
  chosen_spanish: levanta
  alternatives_spanish:
  - alza
  - eleva
  lexicon: LSJ
  rationale: Con φωνὴν αὐτοῦ, el sentido natural en español es «levantar la voz». «Levanta» reproduce la imagen de voz alzada sin sonar demasiado solemne.
- source_word: φωνὴν αὐτοῦ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - su sonido
  lexicon: LSJ
  rationale: La combinación con ἀνυψοῖ pide el idiomatismo español «levantar la voz». «Su voz» comunica con claridad el hablar o reír en voz alta.
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  lexicon: LSJ
  rationale: El griego usa masculino singular representativo. En un proverbio, «el hombre» conserva la forma proverbial y el paralelismo con «el necio».
- source_word: πανοῦργος
  english_pob_choice: shrewd
  chosen_spanish: astuto
  alternatives_spanish:
  - prudente
  - hábil
  - cauto
  lexicon: LSJ
  rationale: El término puede abarcar astucia, sagacidad o habilidad práctica. Aquí la imagen contrasta con el necio ruidoso y sugiere autocontrol perceptivo; «astuto» transmite esa discreción sin convertir el rasgo en una alabanza excesiva.
- source_word: μόλις
  english_pob_choice: scarcely
  chosen_spanish: apenas
  alternatives_spanish:
  - difícilmente
  - casi no
  lexicon: LSJ
  rationale: «Apenas» reproduce bien la mínima medida de la acción y funciona con naturalidad antes de un verbo futuro en español.
- source_word: ἡσυχῇ
  english_pob_choice: quietly
  chosen_spanish: en silencio
  alternatives_spanish:
  - calladamente
  - tranquilamente
  lexicon: LSJ
  rationale: El dativo adverbial expresa quietud o calma contenida. «En silencio» conserva la compactación y la contraposición con la voz levantada del necio, aunque el inglés audit trail optó por «quietly» por naturalidad.
- source_word: μειδιάσει
  english_pob_choice: will ... smile
  chosen_spanish: sonreirá
  alternatives_spanish:
  - esbozará una sonrisa
  - sonreirá levemente
  lexicon: LSJ
  rationale: μειδιάω indica sonrisa leve, no carcajada. «Sonreirá» mantiene el paralelismo con la risa del necio; el adverbio «apenas» ya limita la intensidad de la acción.
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado en inglés: se mantuvo el contraste entre la verbosidad ruidosa del necio y la sonrisa mínima y contenida del hombre astuto. También se tuvo en cuenta la revisión inglesa que prefirió reflejar ἡσυχῇ como quietud adverbial más que como mero sustantivo estático.'
  spanish_consistency_notes:
  - Se conservó «necio» para μωρός, en línea con el registro sapiencial.
  - Se evitó «Cristo», «Señor» u այլ terminología ajena al versículo; no hay decisiones teológicas explícitas.
  - «En silencio» se emplea para ἡσυχῇ por transparencia semántica, aunque el matiz de quietud contenida también podría expresarse como «calladamente».
