translation:
  language: es
  text: Y reunió a todos los hombres combatientes, y se apresuró a terminar las murallas de Jerusalén, y la fortificó alrededor.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: συνήγαγεν
  english_pob_choice: gathered
  chosen_spanish: reunió
  alternatives_spanish:
  - juntó
  - congregó
  lexicon: LSJ
  rationale: El aoristo de συνάγω aquí expresa reunir personas con un propósito concreto. «Reunió» es natural en español y conserva el sentido de convocar/poner juntos sin añadir matices innecesarios.
- source_word: πάντας τοὺς ἄνδρας τοὺς πολεμιστάς
  english_pob_choice: all the fighting men
  chosen_spanish: a todos los hombres de guerra
  alternatives_spanish:
  - a todos los guerreros
  - a todos los hombres de combate
  lexicon: LSJ
  rationale: El griego es explícitamente masculino con ἄνδρας, y πολεμιστάς marca el campo militar. «Hombres de guerra» mantiene esa referencia masculina y la fuerza bélica de la expresión sin neutralizar el género ni sonar demasiado moderno.
- source_word: ἐτάχυνεν
  english_pob_choice: hastened
  chosen_spanish: se apresuró
  alternatives_spanish:
  - se dio prisa
  - aceleró
  lexicon: LSJ
  rationale: El verbo indica actuar con rapidez para completar una tarea. En español, «se apresuró» comunica bien la urgencia y encaja de forma natural con el infinitivo de propósito que sigue.
- source_word: τοῦ τελέσαι
  english_pob_choice: to finish
  chosen_spanish: a terminar
  alternatives_spanish:
  - a completar
  - para llevar a término
  lexicon: LSJ
  rationale: El infinitivo articular expresa propósito. «A terminar» es breve, idiomático y fiel a τελέω en este contexto de obra concluyente.
- source_word: τὰ τείχη Ἰερουσαλήμ
  english_pob_choice: the walls of Jerusalem
  chosen_spanish: los muros de Jerusalén
  alternatives_spanish:
  - las murallas de Jerusalén
  - los muros de la Jerusalén
  lexicon: LSJ
  rationale: «Muros» refleja bien τείχη y resulta claro en español contemporáneo. «Murallas» sería posible, pero «muros» sigue de cerca el sustantivo griego y mantiene el sentido de fortificación urbana.
- source_word: ὠχύρωσεν
  english_pob_choice: fortified
  chosen_spanish: la fortificó
  alternatives_spanish:
  - la укрепó
  - la hizo fuerte
  lexicon: LSJ
  rationale: 'El verbo es técnico y militar: hacer defensible, fortificar. «La fortificó» conserva esa fuerza específica mejor que verbos más generales como «fortaleció».'
- source_word: κυκλόθεν
  english_pob_choice: all around
  chosen_spanish: por todos lados
  alternatives_spanish:
  - en derredor
  - rodeándola
  lexicon: LSJ
  rationale: κυκλόθεν indica extensión circundante. «Por todos lados» reproduce el alcance en un español claro y moderno, y funciona bien con la imagen de fortificación completa.
theological_decisions:
- issue: Referencia masculina explícita en el contingente militar
  english_pob_reading: all the fighting men
  chosen_spanish_reading: a todos los hombres de guerra
  alternative_spanish_readings:
  - a todos los guerreros
  - a todos los soldados
  rationale: El griego usa ἄνδρας, término masculino explícito, junto con una designación militar. Mantener «hombres de guerra» evita borrar el dato gramatical y sigue la política de precisión de género del texto fuente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés concuerdan plenamente; no se documentan revisiones ni variantes textuales relevantes para esta línea.
  spanish_consistency_notes:
  - He mantenido un registro consistente para πολεμιστής/ἄνδρες como «hombres de guerra» en lugar de neutralizar a «soldados», porque el griego destaca la masculinidad del grupo.
  - He preferido «muros» sobre «murallas» por cercanía léxica con τείχη y porque el contexto de fortificación ya está reforzado por «fortificó».
  - La construcción final «por todos lados» conserva el valor de κυκλόθεν sin introducir una nota explicativa en el cuerpo del texto.
