translation:
  language: es
  text: ¿Por qué habría de temer en días malos[a], cuando la iniquidad de mis perseguidores me rodea?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «la iniquidad de mis talones me rodea»; la frase hebrea puede significar «la iniquidad a mis talones» o referirse a quienes buscan hacerme tropezar.
    reason: alternative_reading
lexical_decisions:
- source_word: לָמָּה
  english_pob_choice: Why should
  chosen_spanish: ¿Por qué habría de…?
  alternatives_spanish:
  - ¿Por qué…?
  - ¿Por qué debería…?
  lexicon: HALOT
  rationale: La pregunta es retórica; en español, «¿Por qué habría de…?» conserva mejor ese matiz que una simple interrogación informativa.
- source_word: אִירָא
  english_pob_choice: I fear
  chosen_spanish: temer
  alternatives_spanish:
  - temo
  - debería temer
  lexicon: HALOT
  rationale: El imperfecto en la pregunta retórica se rinde de manera natural con un infinitivo dependiente de «habría de», manteniendo el sentido sin sonar forzado.
- source_word: בִּימֵי רָע
  english_pob_choice: in days of evil
  chosen_spanish: en días de mal
  alternatives_spanish:
  - en días malos
  - en días de calamidad
  - en días de aflicción
  lexicon: HALOT
  rationale: Se preserva la estructura nominal del hebreo. «Mal» conserva amplitud semántica para adversidad o calamidad, como en la decisión inglesa de no especificar demasiado.
- source_word: עָוֹן
  english_pob_choice: iniquity
  chosen_spanish: iniquidad
  alternatives_spanish:
  - maldad
  - culpa
  - castigo por la iniquidad
  lexicon: HALOT
  rationale: «Iniquidad» reproduce la fuerza moral del término y coincide con la lectura POB, evitando reducirlo a un simple daño externo.
- source_word: עֲקֵבַי
  english_pob_choice: my pursuers / my heels
  chosen_spanish: mis perseguidores
  alternatives_spanish:
  - mis talones
  - los que me quieren hacer tropezar
  - mis supplan­tadores
  lexicon: HALOT
  rationale: La expresión hebrea es difícil y literalmente alude a «mis talones»; en contexto, la lectura de hostilidad encaja bien. «Mis perseguidores» refleja la decisión revisada del POB inglés y conserva la tensión sin volver oscura la frase.
- source_word: יְסוּבֵּנִי
  english_pob_choice: surrounds me
  chosen_spanish: me rodea
  alternatives_spanish:
  - me cerca
  - me circunda
  lexicon: HALOT
  rationale: Verbo de rodear/encerrar; «me rodea» es la forma más natural y fiel en español.
theological_decisions:
- issue: Interpretación de עֲוֹן עֲקֵבַי
  english_pob_reading: The phrase is taken idiomatically of the iniquity of hostile people who seek to trip up or supplant the psalmist.
  chosen_spanish_reading: La frase se entiende idiomáticamente de la iniquidad de adversarios hostiles que buscan hacer tropezar o desplazar al salmista.
  alternative_spanish_readings:
  - la iniquidad a mis talones
  - mi propia iniquidad me sigue a los talones
  - la culpa de mis perseguidores me rodea
  rationale: El hebreo es compacto y admite varias lecturas. En el contexto del salmo, la lectura de hostilidad externa es coherente; aun así, se conserva la ambigüedad principal mediante una nota sobre el giro literal de «mis talones».
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y la ambigüedad genuina sin resolverla de manera prematura.'
translation_notes:
  revision_awareness: El auditorio inglés reciente sustituyó «those who would trip me up» por «my pursuers» para reflejar más directamente la expresión hebrea. La versión española sigue esa revisión al usar «mis perseguidores», pero mantiene en la nota la alternativa literal de «mis talones» para no perder la tensión del hebreo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este verso no lo contiene.
  - «Iniquidad» mantiene la terminología jurídica/moral del POB para עָוֹן.
  - Se eligió «mis perseguidores» por coherencia con la revisión inglesa y con el contexto hostil del salmo.
  - La nota conserva la alternativa literal de la imagen corporal hebrea para auditar la decisión interpretativa.
