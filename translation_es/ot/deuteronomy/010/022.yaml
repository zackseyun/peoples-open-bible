revisions:
- from: Tus padres descendieron a Egipto con setenta personas[a][b], y ahora Yahvé tu Dios te ha hecho tan numeroso como las estrellas de los cielos[c].
  to: Tus padres descendieron a Egipto con setenta personas[a][b], y ahora Yahvé tu Dios te ha multiplicado hasta ser tan numeroso como las estrellas del cielo[c].
  rationale: Se ajusta la cláusula final para un español más natural y fiel al sentido resultativo de שָׂמְךָ ... לָרֹב, evitando una construcción rígida con «te ha hecho tan numeroso». También se alinea la nota c con las alternativas documentadas en el audit trail inglés.
