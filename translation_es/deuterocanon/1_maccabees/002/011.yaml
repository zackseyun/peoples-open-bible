translation:
  language: es
  text: Toda su gloria le fue quitada; en lugar de ser libre[a], se volvió esclava.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Todo su adorno/esplendor le fue quitado». Aquí κόσμος significa adorno o esplendor, no «mundo».
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  english_pob_choice: all
  chosen_spanish: toda
  alternatives_spanish:
  - todo
  - la totalidad de
  lexicon: LSJ
  rationale: Con κόσμος en singular colectivo, πᾶς expresa totalidad. En español, «toda su gloria» conserva esa idea de totalidad de manera natural y fluida.
- source_word: κόσμος
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - adorno
  - esplendor
  - ornamento
  lexicon: LSJ
  rationale: Aquí κόσμος no significa «mundo», sino lo que adorna o da honra/esplendor. «Gloria» funciona en español bíblico y comunica tanto honor como esplendor sin forzar una metáfora demasiado material.
- source_word: ἀφηρέθη
  english_pob_choice: was taken away
  chosen_spanish: le fue quitada
  alternatives_spanish:
  - fue removida
  - fue arrebatada
  - le fue retirada
  lexicon: LSJ
  rationale: El aoristo pasivo indica despojo por un agente externo. «Le fue quitada» conserva el pasivo y la pérdida sufrida, con un español natural.
- source_word: ἀντί
  english_pob_choice: instead of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - en lugar de ser
  - en vez de ser
  lexicon: LSJ
  rationale: La preposición marca sustitución o intercambio de estado. «En lugar de» expresa bien la inversión de condición entre libertad y esclavitud.
- source_word: ἐλευθέρας
  english_pob_choice: being free
  chosen_spanish: estar libre
  alternatives_spanish:
  - ser libre
  - una mujer libre
  - libre
  lexicon: LSJ
  rationale: El adjetivo femenino personifica a la ciudad como mujer. «Estar libre» conserva el contraste con la condición posterior y suena natural en esta construcción.
- source_word: δούλην
  english_pob_choice: a slave
  chosen_spanish: esclava
  alternatives_spanish:
  - sierva
  - criada
  - bondada
  lexicon: LSJ
  rationale: Siguiendo el criterio del proyecto para δοῦλος/δούλη, se mantiene «esclava» para preservar la fuerza de la condición de sujeción frente a «libre».
theological_decisions:
- issue: Contraste libertad/esclavitud en δούλην frente a ἐλευθέρας
  english_pob_reading: slave
  chosen_spanish_reading: esclava
  alternative_spanish_readings:
  - sierva
  - bondwoman
  rationale: 'El texto subraya una reversión radical de estado: de libertad a esclavitud. «Esclava» preserva mejor la dureza del contraste que «sierva», y es coherente con la política terminológica del proyecto.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος *doulos*; Translation philosophy §1'
translation_notes:
  revision_awareness: El control cruzado indica alta concordancia con el expediente inglés y no registra revisiones sustantivas recientes; por eso la redacción sigue de cerca la solución auditada, manteniendo la nota léxica sobre κόσμος.
  spanish_consistency_notes:
  - Se conservó «gloria» para κόσμος por coherencia con el audit trail inglés y porque en español comunica bien honor/esplendor sin introducir «mundo».
  - Se usó «esclava» en vez de «sierva» para reflejar la oposición fuerte con «libre» y mantener la terminología preferida del proyecto para δοῦλος/δούλη.
  - La nota al pie se ancló solo en «gloria», donde está la ambigüedad léxica principal.
