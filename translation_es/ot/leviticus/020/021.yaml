translation:
  language: es
  text: Si un hombre toma la mujer de su hermano, es impureza[a]; ha descubierto la desnudez de su hermano. Quedarán sin hijos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es inmundicia» o «es una impureza». El hebreo puede denotar impureza en sentido ritual-moral.'
    reason: lexical_alternative
  - marker: b
    text: Lit. «serán sin hijos». El hebreo no especifica el medio del juicio, solo el resultado.
    reason: alternative_reading
lexical_decisions:
- source_word: וְ/אִישׁ
  english_pob_choice: And if a man
  chosen_spanish: Si un hombre
  alternatives_spanish:
  - Y si un hombre
  - Y un hombre
  lexicon: HALOT
  rationale: En esta fórmula casuística, אִישׁ es 'hombre' en singular, y la conjunción inicial enlaza con la ley anterior. En español, 'Si un hombre' comunica mejor la condición legal sin añadir un 'y' innecesario al inicio.
- source_word: אֲשֶׁר יִקַּח
  english_pob_choice: if ... takes
  chosen_spanish: toma
  alternatives_spanish:
  - toma para sí
  - tome
  - tome en matrimonio
  lexicon: HALOT
  rationale: לקח conserva su sentido básico de 'tomar'. Aquí el contexto ya especifica que el objeto es la mujer del hermano, así que 'toma' mantiene la concisión del hebreo sin introducir una formulación matrimonial más explícita que el texto no desarrolla.
- source_word: אֵשֶׁת אָחִיו
  english_pob_choice: his brother’s wife
  chosen_spanish: la mujer de su hermano
  alternatives_spanish:
  - la esposa de su hermano
  - la mujer de su hermano
  lexicon: HALOT
  rationale: El hebreo literalmente dice 'la mujer de su hermano'. En español, 'la mujer de su hermano' preserva el vínculo de parentesco y evita imponer un matiz jurídico adicional que 'esposa' podría sugerir en algunos contextos.
- source_word: נִדָּה הִוא
  english_pob_choice: it is uncleanness
  chosen_spanish: es impureza
  alternatives_spanish:
  - es inmundicia
  - es contaminación ritual
  - es inmundicia ritual
  lexicon: HALOT
  rationale: נִדָּה puede expresar impureza ritual-moral. 'Impureza' es un equivalente sobrio y fiel; en este versículo el predicado recae sobre la situación, no sobre la mujer como persona, por eso no se opta por una formulación que suene a juicio personal.
- source_word: עֶרְוַת אָחִיו גִּלָּה
  english_pob_choice: he has uncovered his brother’s nakedness
  chosen_spanish: ha descubierto la desnudez de su hermano
  alternatives_spanish:
  - ha descubierto la desnudez de su hermano
  - ha destapado la desnudez de su hermano
  - ha desnudado a su hermano
  lexicon: HALOT
  rationale: La locución 'descubrir la desnudez' es la metáfora legal estable en Levítico para relaciones sexuales ilícitas. 'Ha descubierto la desnudez de su hermano' conserva la idiomática bíblica y la conexión intertextual con el resto del libro.
- source_word: עֲרִירִים יִהְיֽוּ
  english_pob_choice: They shall be childless
  chosen_spanish: Serán sin hijos
  alternatives_spanish:
  - Quedarán sin hijos
  - Serán estériles
  - Permanecerán sin hijos
  lexicon: HALOT
  rationale: עֲרִירִים significa 'sin hijos'. 'Serán sin hijos' es directo y transparente. Se evita 'estériles' porque podría sugerir una condición biológica previa, mientras que el hebreo expresa el resultado/judgment sin especificar el mecanismo.
theological_decisions:
- issue: Sentido de נִדָּה en una prohibición sexual
  english_pob_reading: it is uncleanness
  chosen_spanish_reading: es impureza
  alternative_spanish_readings:
  - es inmundicia
  - es una defileción
  - es impureza ritual
  rationale: La lectura conserva el valor ritual-moral de נִדָּה sin suavizarlo ni convertirlo en una categoría meramente higiénica. 'Impureza' permite mantener la tensión teológica del término en Levítico.
  doctrine_reference: Levítico 20:21; pureza ritual y moral en la legislación levítica
- issue: Alcance de עֲרִירִים יִהְיוּ
  english_pob_reading: They shall be childless
  chosen_spanish_reading: Serán sin hijos
  alternative_spanish_readings:
  - Quedarán sin hijos
  - Serán dejados sin hijos
  - Morirán sin hijos
  rationale: El hebreo declara el estado de no tener descendencia, pero no explicita el modo en que se ejecuta el juicio. La traducción mantiene esa ambigüedad deliberada, sin añadir la muerte ni otro mecanismo no dicho.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail al preferir una formulación formal para נִדָּה ('uncleanness' en inglés), reflejada en español como 'impureza', y se mantuvo la estructura casuística breve del hebreo sin expandir el castigo más allá de 'sin hijos'.
  spanish_consistency_notes:
  - Se mantuvo 'desnudez' para conservar la metáfora legal estable de Levítico.
  - Se eligió 'impureza' en vez de 'inmundicia' como término principal, por ser más natural en español bíblico actual y seguir el registro formal del POB.
  - '''Serán sin hijos'' preserva la ambigüedad del hebreo entre estado y ejecución del juicio, sin introducir ''morirán''.'
