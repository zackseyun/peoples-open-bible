translation:
  language: es
  text: 'Y cuando cesó[a] el alboroto de los hombres alrededor del consejo, Holofernes, comandante en jefe del ejército de Asshur, habló a Ajior en presencia de toda la asamblea de extranjeros:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Assiria». El griego presenta el nombre propio Ἀσσοὺρ, que puede transliterarse como «Asshur» o verterse interpretativamente como «Asiria».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς κατέπαυσεν
  english_pob_choice: had ceased
  chosen_spanish: cesó
  alternatives_spanish:
  - había cesado
  - se apagó
  - terminó
  lexicon: BDAG / LSJ
  rationale: El griego marca que el ruido se detiene antes de la acción de hablar; en español, la cláusula con "cuando" más pretérito simple comunica con naturalidad ese cese previo sin forzar un pluscuamperfecto innecesario.
- source_word: θροῦβος
  english_pob_choice: uproar
  chosen_spanish: alboroto
  alternatives_spanish:
  - uproar
  - tumulto
  - ruido
  lexicon: LSJ
  rationale: '"Alboroto" conserva la idea de ruido agitado y disturbio público. "Ruido" sería demasiado débil y "tumulto" más intenso de lo que el contexto exige.'
- source_word: τῶν ἀνδρῶν τῶν κύκλῳ τῆς συνεδρίας
  english_pob_choice: the men around the council
  chosen_spanish: de los hombres alrededor del consejo
  alternatives_spanish:
  - de los hombres que rodeaban el consejo
  - de los hombres en torno al consejo
  lexicon: LSJ
  rationale: Mantiene la relación espacial del grupo que rodea la συνεδρία sin añadir interpretación institucional excesiva. "Consejo" reproduce el valor deliberativo documentado en el audit trail.
- source_word: ἀρχιστράτηγος
  english_pob_choice: commander-in-chief
  chosen_spanish: comandante en jefe
  alternatives_spanish:
  - general en jefe
  - supremo comandante
  lexicon: LSJ
  rationale: '"Comandante en jefe" es el equivalente natural en español para un título militar superlativo y conserva la fuerza jerárquica del compuesto griego.'
- source_word: δυνάμεως
  english_pob_choice: army
  chosen_spanish: ejército
  alternatives_spanish:
  - fuerza
  - hueste
  lexicon: BDAG
  rationale: En contexto militar, δύναμις se refiere a una fuerza armada. "Ejército" es claro y fiel en español, sin diluir el carácter bélico.
- source_word: Ἀσσοὺρ
  english_pob_choice: Asshur
  chosen_spanish: Asshur
  alternatives_spanish:
  - Asiria
  lexicon: LSJ
  rationale: Se conserva la transliteración del nombre propio para seguir la preferencia del proyecto por nombres transliterados y no por etiquetas geopolíticas interpretativas.
- source_word: ἐναντίον
  english_pob_choice: in the presence of
  chosen_spanish: en presencia de
  alternatives_spanish:
  - delante de
  - ante
  lexicon: BDAG
  rationale: La expresión señala un marco público y formal de habla; "en presencia de" comunica mejor ese matiz que un simple valor espacial.
- source_word: παντὸς τοῦ δήμου
  english_pob_choice: all the assembly
  chosen_spanish: toda la asamblea
  alternatives_spanish:
  - todo el pueblo
  - toda la multitud
  lexicon: BDAG
  rationale: Aunque δήμος puede significar "pueblo", aquí el contexto público y la referencia a la reunión favorecen "asamblea" como equivalente más preciso.
- source_word: ἀλλοφύλων
  english_pob_choice: foreigners
  chosen_spanish: extranjeros
  alternatives_spanish:
  - forasteros
  - gentes de otra nación
  lexicon: LSJ
  rationale: '"Extranjeros" es idiomático y reproduce el sentido de personas de otro pueblo o nación sin introducir la carga específica de "filisteos".'
theological_decisions:
- issue: Nombre propio Ἀσσοὺρ vs. lectura geopolítica "Asiria"
  english_pob_reading: Asshur
  chosen_spanish_reading: Asshur
  alternative_spanish_readings:
  - Asiria
  rationale: No es una cuestión doctrinal fuerte, pero sí de filosofía de traducción. Se mantiene el nombre propio transliterado para no reemplazarlo por una etiqueta interpretativa de reino o territorio.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto español sigue de cerca el audit trail inglés y el griego de Swete sin añadir ajustes textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene "Yahvé" como convención general del proyecto, pero aquí no aparece el nombre divino.
  - '"Comandante en jefe" preserva el rango militar fuerte de ἀρχιστράτηγος sin convertirlo en un título eclesiástico o genérico.'
  - '"Asamblea" se usa para δήμος por el contexto de reunión pública; no se traduce como "pueblo" para evitar perder el matiz institucional.'
  - Se prefirió "extranjeros" para ἀλλοφύλων por ser el equivalente más natural y neutro en español moderno.
