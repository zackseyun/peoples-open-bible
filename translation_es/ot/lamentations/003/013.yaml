  glossary_alignment: 'No hay términos teológicos de proyecto en juego. Léxicamente, conviene alinear mejor con el POB auditado: הֵבִיא -> ''clavó'' o ''hundió'' como equivalente dinámico de penetración forzada; בְּכִלְיוֹתַי -> ''en mis riñones''; בְּנֵי -> ''los hijos de'' en el texto con nota; אַשְׁפָּתוֹ -> ''su aljaba'' es adecuado.'
