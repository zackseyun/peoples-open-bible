translation:
  language: es
  text: Por eso has puesto tu temor[a] en nuestros corazones, para que invoquemos tu nombre; y te alabaremos en nuestro exilio[b], porque nos hemos apartado, de corazón, de toda injusticia[c] de nuestros padres, los que pecaron delante de ti[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'temor de ti'. El griego dice literalmente 'tu temor', una expresión bíblica para el temor dirigido a Dios.
    reason: lexical_alternative
  - marker: b
    text: O 'en nuestra cautividad'. El término griego puede designar el estado de deportación, cautiverio o exilio.
    reason: lexical_alternative
  - marker: c
    text: O 'toda maldad' o 'todo agravio'. El griego también puede expresar la idea de toda injusticia o de todo mal obrar.
    reason: lexical_alternative
  - marker: d
    text: O 'los que pecaron contra ti'. El griego dice más literalmente 'los que pecaron delante de ti' o 'en tu presencia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: because of this
  chosen_spanish: Porque por esto
  alternatives_spanish:
  - Porque debido a esto
  - Por esta razón
  lexicon: BDAG
  rationale: Conserva el valor causal inmediato del griego sin convertirlo en una inferencia más abstracta. En español, 'Porque por esto' mantiene la relación con lo anterior de manera natural y sobria.
- source_word: ἔδωκας
  english_pob_choice: you have put
  chosen_spanish: has puesto
  alternatives_spanish:
  - has dado
  - has colocado
  lexicon: BDAG
  rationale: Aunque el verbo básico es 'dar', el giro con 'temor' y 'corazones' en español se expresa con más naturalidad como 'poner'. El perfecto 'has puesto' conserva el efecto presente de una acción ya realizada.
- source_word: τὸν φόβον σου
  english_pob_choice: your fear
  chosen_spanish: tu temor[a]
  alternatives_spanish:
  - el temor de ti
  - tu miedo
  lexicon: BDAG
  rationale: '''Temor'' preserva el registro bíblico y deja abierta la tensión entre miedo reverente y temor dirigido a Dios. Se evita resolverlo prematuramente como mera ''reverencia''.'
- source_word: ἐπὶ καρδίαν ἡμῶν
  english_pob_choice: in our hearts
  chosen_spanish: en nuestros corazones
  alternatives_spanish:
  - sobre nuestros corazones
  - en nuestro corazón
  lexicon: BDAG
  rationale: Aunque el griego conserva la imagen de 'sobre', el propio audit trail inglés opta por 'in our hearts' por idiomatismo y cercanía semántica. En español, 'en nuestros corazones' resulta natural y fiel a la idea del interior humano como sede de la disposición.
- source_word: ἐπικαλεῖσθαι τὸ ὄνομά σου
  english_pob_choice: we call on your name
  chosen_spanish: invoquemos tu nombre
  alternatives_spanish:
  - clamemos tu nombre
  - invocaremos tu nombre
  lexicon: BDAG
  rationale: 'La construcción infinitiva expresa finalidad: temor dado para que se invoque el nombre divino. ''Invoquemos'' reproduce bien ese valor final y mantiene el lenguaje cultual de oración.'
- source_word: αἰνέσομέν σε
  english_pob_choice: we will praise you
  chosen_spanish: te alabaremos
  alternatives_spanish:
  - te loaremos
  - te ensalzaremos
  lexicon: BDAG
  rationale: '''Alabar'' es la forma más clara y digna en español para expresar la alabanza prometida; conserva el futuro y el sujeto plural.'
- source_word: ἐν τῇ ἀποικίᾳ ἡμῶν
  english_pob_choice: in our exile
  chosen_spanish: en nuestro exilio[b]
  alternatives_spanish:
  - en nuestra cautividad
  - en nuestro destierro
  lexicon: LSJ
  rationale: '''Exilio'' recoge el estado de deportación y desplazamiento sin sugerir innecesariamente una colonia. Mantiene la lectura contextual del lamento comunitario.'
- source_word: ἀπεστρέψαμεν
  english_pob_choice: we have turned away
  chosen_spanish: hemos apartado
  alternatives_spanish:
  - hemos vuelto la espalda
  - nos hemos apartado
  lexicon: BDAG
  rationale: El verbo griego denota apartarse o apartar(se) de algo. 'Hemos apartado' funciona bien con el complemento 'de nuestros corazones' y conserva la fuerza de una renuncia interior.
- source_word: ἀπὸ καρδίας ἡμῶν
  english_pob_choice: from our hearts
  chosen_spanish: de nuestros corazones
  alternatives_spanish:
  - de nuestro corazón
  - desde nuestros corazones
  lexicon: BDAG
  rationale: Se mantiene el plural y la literalidad antropológica del griego, indicando el origen interior del arrepentimiento.
- source_word: πᾶσαν ἀδικίαν
  english_pob_choice: every unrighteousness
  chosen_spanish: toda injusticia[c]
  alternatives_spanish:
  - toda maldad
  - todo agravio
  lexicon: BDAG
  rationale: '''Injusticia'' preserva el campo semántico moral y jurídico de ἀδικία. En español suena más natural que ''injusticia'' en singular colectivo, y permite abarcar tanto lo incorrecto como lo moralmente torcido.'
- source_word: πατέρων ἡμῶν
  english_pob_choice: of our fathers
  chosen_spanish: de nuestros padres
  alternatives_spanish:
  - de nuestros antepasados
  - de nuestros progenitores
  lexicon: BDAG
  rationale: Se conserva la referencia explícita a los padres/antepasados varones como en el griego, sin neutralizarla. 'Padres' es fiel y comprensible en español bíblico.
- source_word: τῶν ἡμαρτηκότων ἐναντίον σου
  english_pob_choice: who sinned before you
  chosen_spanish: los que pecaron delante de ti[d]
  alternatives_spanish:
  - los que pecaron contra ti
  - los que pecaron en tu presencia
  lexicon: BDAG
  rationale: '''Delante de ti'' conserva la espacialidad relacional de ἐναντίον σου y evita sustituirla por una oposición más interpretativa. ''Pecaron'' mantiene el lenguaje penitencial de la oración.'
theological_decisions:
- issue: Sentido de 'tu temor' como don divino que conduce a la oración
  english_pob_reading: Retained as 'your fear' rather than interpreting it as mere reverence
  chosen_spanish_reading: Se mantiene 'tu temor' y no se reduce a 'reverencia'
  alternative_spanish_readings:
  - temor de ti
  - reverencia por ti
  rationale: El contexto penitencial sugiere un temor dado por Dios que produce invocación y alabanza. 'Temor' conserva la tensión entre sobrecogimiento, obediencia y piedad; 'reverencia' suavizaría demasiado el texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Valor de ἐν τῇ ἀποικίᾳ ἡμῶν
  english_pob_reading: in our exile
  chosen_spanish_reading: en nuestro exilio
  alternative_spanish_readings:
  - en nuestra cautividad
  - en nuestro destierro
  rationale: El contexto de Baruc es el del pueblo deportado y dispersado. 'Exilio' es la forma más clara y equilibrada en español para ese estado histórico y teológico, sin borrar la condición de desarraigo.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
- issue: Referencia a 'nuestros padres' y pecado ancestral
  english_pob_reading: '''our fathers''... ''who sinned before you'''
  chosen_spanish_reading: '''nuestros padres''... ''los que pecaron delante de ti'''
  alternative_spanish_readings:
  - nuestros antepasados... los que pecaron contra ti
  rationale: Se conserva el lenguaje de paternidad heredada y la confesión del pecado de los antepasados. 'Delante de ti' mantiene la formulación más literal del griego, importante para la honestidad textual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El inglés auditado fue revisado para volver ''in our hearts'' más idiomático y para reflejar mejor el infinitivo final (''that we may call''). Esta versión española sigue esa misma línea: ''en nuestros corazones'' y ''para que invoquemos'' expresan con naturalidad la finalidad del griego, sin perder el matiz literal de la imagen corporal y cultual. También conserva la lectura penitencial completa del verso, incluyendo el contraste entre el temor dado por Dios, la invocación del nombre y la confesión del alejamiento interior.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino explícito; aquí el texto dice 'tu nombre', por lo que no se inserta.
  - Se eligió 'temor' en vez de 'reverencia' para mantener la tensión teológica documentada en el audit trail.
  - Se prefirió 'exilio' como equivalente contextual de ἀποικία, coherente con el registro de Baruc.
  - Se mantuvo el lenguaje penitencial directo ('pecaron', 'delante de ti') sin suavizarlo a paráfrasis devocional.
  - Los corchetes de nota se colocan en los mismos puntos donde la alternativa lexical es relevante en español.
