base_translation:
  language: en
  yaml_path: translation/ot/judges/005/011.yaml
  text: From the sound of archers among the watering places[a], there they recount the righteous acts of Yahweh, the righteous acts of his villagers in Israel[c][b]. Then the people of Yahweh went down to the gates.
  footnotes:
  - marker: a
    text: Or 'At the sound of archers by the watering places.' The opening phrase is difficult, and some understand it as describing the place where the song is heard rather than separation from the sound.
    reason: alternative_reading
  - marker: b
    text: The Hebrew term rendered 'villagers' is difficult and has also been understood as 'unwalled settlements,' 'rural folk,' or, less likely, 'rulers.'
    reason: lexical_alternative
  - marker: c
    text: The 'gates' were the public gathering places of a town, associated with civic life, judgment, and security.
    reason: cultural_note
