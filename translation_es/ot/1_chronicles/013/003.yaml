translation:
  language: es
  text: Y traigamos de vuelta el arca de nuestro Dios con nosotros[a], porque no la buscamos en los días de Saúl.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no la consultamos» o «no inquirimos por ella». El verbo hebreo puede abarcar buscar, inquirir o consultar; algunas traducciones hacen explícito a Dios como objeto implícito, pero el objeto gramatical inmediato es el arca.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנָסֵבָּה
  english_pob_choice: And let us bring back
  chosen_spanish: Y traigamos de vuelta
  alternatives_spanish:
  - y llevemos de vuelta
  - y traigamos nuevamente
  lexicon: HALOT
  rationale: La forma cohortativa de סבב expresa aquí una acción comunitaria propuesta para que el arca vuelva al pueblo. En español, "traigamos de vuelta" conserva el valor exhortativo y el movimiento de retorno sin sonar forzado.
- source_word: אֶת אֲרוֹן אֱלֹהֵינוּ
  english_pob_choice: the ark of our God
  chosen_spanish: el arca de nuestro Dios
  alternatives_spanish:
  - el arca de Dios, nuestro
  - el arca de Dios
  lexicon: HALOT
  rationale: 'La cadena constructa con el sufijo de 1cp indica posesión relacional: "de nuestro Dios". "Arca" mantiene el referente cultual concreto y evita una paráfrasis excesiva.'
- source_word: אֵלֵינוּ
  english_pob_choice: to us
  chosen_spanish: a nosotros
  alternatives_spanish:
  - para nosotros
  - hacia nosotros
  lexicon: HALOT
  rationale: La preposición con sufijo de 1cp marca dirección hacia la comunidad. "A nosotros" es la forma más directa y natural en español.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Aquí introduce la razón de la propuesta. "Porque" comunica con claridad la relación causal en español actual.
- source_word: לֹא דְרַשְׁנֻהוּ
  english_pob_choice: we did not seek it
  chosen_spanish: no la buscamos
  alternatives_spanish:
  - no la consultamos
  - no la inquirimos
  lexicon: HALOT
  rationale: El sufijo pronominal apunta gramaticalmente al sustantivo femenino "arca" en español, por lo que "la" es la referencia natural. El verbo דָּרַשׁ puede significar buscar, inquirir o consultar; "buscar" conserva la amplitud semántica sin decidir demasiado en favor de una sola opción.
- source_word: בִּימֵי שָׁאוּל
  english_pob_choice: in the days of Saul
  chosen_spanish: en los días de Saúl
  alternatives_spanish:
  - durante los días de Saúl
  - en tiempos de Saúl
  lexicon: HALOT
  rationale: La expresión temporal se traduce de manera directa y natural. Se conserva el nombre tradicional en español porque el POB inglés ya lo normalizó como "Saul" y en español "Saúl" es la forma establecida.
theological_decisions:
- issue: Objeto de "buscar" y referencia implícita a Dios
  english_pob_reading: Retain the grammatical object as 'it,' referring to the ark, while allowing the theological implication that Israel had neglected seeking God in connection with the ark.
  chosen_spanish_reading: Mantener el objeto gramatical como "la" para el arca, dejando la implicación teológica de que también descuidaron buscar a Dios en relación con el arca.
  alternative_spanish_readings:
  - no lo buscamos
  - no le buscamos
  rationale: El hebreo apunta primero al arca como objeto gramatical. En español, usar "la" preserva esa referencia concreta y evita trasladar al texto principal una interpretación más explícita sobre Dios que el hebreo no formula de modo directo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue la revisión que favoreció un giro más natural para el regreso del arca, pero en español se mantiene la referencia gramatical al arca con pronombre femenino, porque "arca" lo exige en español y evita introducir una lectura interpretativa no necesaria en el texto principal. También se normaliza Saúl como forma española estándar.
  spanish_consistency_notes:
  - Se usa "Yahvé" por defecto en el proyecto, pero aquí el hebreo dice אֱלֹהֵינוּ ('nuestro Dios'), por lo que no aparece el nombre divino.
  - Se conserva "arca" como término cultual técnico, sin sustituirlo por un equivalente explicativo.
  - El pronombre en español debe concordar con "arca"; por eso la referencia se expresa con "la" aunque el hebreo tenga sufijo masculino por el sustantivo hebreo.
  - '"Saúl" sigue la ortografía usual en español; no se translitera como "Shaul" en el texto principal.'
