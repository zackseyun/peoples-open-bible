lexical_decisions:
- source_word: וַיִּסְעוּ
  english_pob_choice: They set out
  chosen_spanish: Partieron
  alternatives_spanish:
  - Se pusieron en marcha
  - Salieron
  lexicon: HALOT
  rationale: En la fórmula itinerante del desierto, נסע expresa salida de un campamento. En español, «partieron» comunica con naturalidad el inicio del traslado sin volverlo demasiado técnico o pesado.
- source_word: מֵעַבְרֹנָה
  english_pob_choice: from Abronah
  chosen_spanish: de Abroná
  alternatives_spanish:
  - desde Abroná
  - de Abrona
  lexicon: HALOT
  rationale: El hebreo marca procedencia con מֵ. El nombre propio se translitera; se usa «Abroná» para una adaptación española clara y consistente, manteniendo la referencia geográfica.
- source_word: וַיַּחֲנוּ
  english_pob_choice: and camped
  chosen_spanish: y acamparon
  alternatives_spanish:
  - y acamparon allí
  - y plantaron el campamento
  lexicon: HALOT
  rationale: חנה en contexto de itinerario describe instalar el campamento. «Acamparon» es la equivalencia natural y precisa en español actual.
- source_word: בְּעֶצְיוֹן גָּבֶר
  english_pob_choice: at Ezion-geber
  chosen_spanish: en Ezión-geber
  alternatives_spanish:
  - en Ezión Geber
  - en Ezión-geber
  lexicon: HALOT
  rationale: La preposición בְּ indica ubicación y se vierte con «en». El topónimo se translitera; el guion conserva el nombre compuesto tradicional sin sustituirlo por una forma interpretativa.
