    rationale: «mi Dios» es posible, pero «Dios mío» suena más idiomático en español de oración y conserva exactamente el sentido posesivo del hebreo.
  - severity: low
    issue: Redacción de la nota al pie mejorable
    rationale: Conviene usar una formulación más natural en español («O bien») y explicitar que la expresión puede indicar culpa o responsabilidad moral.
