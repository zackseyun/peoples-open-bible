review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura básica del hebreo: Yahvé como sujeto, conocimiento divino continuo, pensamientos humanos y su carácter de הבל. Sin embargo, el texto principal cambia la elección auditada para כִּי desde el inglés POB (''that'') a un valor causal explícito (''porque'') en el texto, cuando el matiz causal fue conservado solo como alternativa en nota. Además, la colocación de notas [a][b][c] sobre ''del hombre'' no corresponde bien: la nota sobre הבל debe anclarse en ''vanidad'', y la de כִּי en ''que'' o la conjunción correspondiente.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse para reflejar con más precisión el audit trail y para ordenar mejor las notas. 'Yahvé conoce los pensamientos del hombre, que son vanidad' suena natural en español bíblico y preserva mejor la relación sintáctica del original. Las notas actuales están desancladas semánticamente y la nota b es redundante porque el texto ya usa 'porque'.
  glossary_alignment: Alinea bien con 'Yahvé' y con 'el hombre' como singular genérico. 'Vanidad' es aceptable dado el audit trail revisado, con nota que preserve 'vapor/aliento/vacío'. El punto que no alinea plenamente con el registro auditado es כִּי, donde conviene usar 'que' en el texto principal y dejar 'porque' como alternativa en nota.
  issues:
  - severity: medium
    issue: La conjunción principal 'porque' no sigue la elección auditada 'that'/'que'.
    rationale: El English POB fijó 'that' como lectura principal tras 'knows', dejando el valor causal en nota. En español, 'que' funciona bien después de 'conoce' y preserva mejor esa decisión.
  - severity: medium
    issue: Las notas [a][b][c] están ancladas todas en 'del hombre', aunque tratan referentes distintos.
    rationale: La alternativa de אָדָם debe anclarse en 'hombre'; la de כִּי en la conjunción; y la de הבל en 'vanidad'. La anclación actual puede confundir al lector y no cumple bien la disciplina de notas.
  - severity: low
    issue: La nota b está formulada de manera poco natural.
    rationale: '''de manera más explícitamente causal'' suena torpe; en español natural sería ''si כִּי se entiende de manera más explícitamente causal'' o mejor ''si se entiende con sentido más explícitamente causal''.'
  revised_spanish_text: Yahvé conoce los pensamientos del hombre[a], que[b] son vanidad[c].
  revised_footnotes:
  - marker: a
    text: 'O: “de la humanidad”; el hebreo usa un singular genérico: “hombre”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “porque”, si כִּי se entiende con sentido más explícitamente causal.'
    reason: lexical_alternative
  - marker: c
    text: “Vanidad” también puede traducirse “vapor”, “aliento” o “vacío”.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto principal para seguir la decisión auditada de כִּי como ''that/que'' en vez de hacer causal la conjunción en el texto. También se reubican las notas en los términos que realmente comentan: ''hombre'', la conjunción ''que'' y ''vanidad''. Esto mejora tanto la fidelidad al rastro de auditoría como la claridad para el lector español.'
