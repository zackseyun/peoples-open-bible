translation:
  language: es
  text: Dios es conocido en Judá[a]; grande es su nombre[b] en Israel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios se ha dado a conocer en Judá»; la forma hebrea puede sugerir tanto un sentido estativo («es conocido») como un matiz más eventivo en el contexto.'
    reason: lexical_alternative
  - marker: b
    text: «Su nombre» puede denotar su reputación revelada o su renombre, no solo el nombre pronunciado.
    reason: lexical_alternative
lexical_decisions:
- source_word: נוֹדָע
  english_pob_choice: is known
  chosen_spanish: es conocido
  alternatives_spanish:
  - se ha dado a conocer
  - ha hecho que se le conozca
  - es reconocido
  lexicon: HALOT
  rationale: El nifal de ידע admite un valor estativo/pasivo, y la lectura inglesa principal preserva ese predicado breve. «Es conocido» conserva la concisión poética sin añadir explícitamente una acción reflexiva que el forma verbal no exige. Las alternativas más dinámicas sugieren más evento o énfasis que el hebreo no obliga a expresar en el texto principal.
- source_word: בִּיהוּדָה
  english_pob_choice: in Judah
  chosen_spanish: en Judá
  alternatives_spanish:
  - entre Judá
  - dentro de Judá
  lexicon: HALOT
  rationale: La preposición ב se traduce naturalmente como «en» con un nombre de pueblo/territorio. «Judá» mantiene la posible resonancia tanto territorial como comunitaria sin sobreexplicarla.
- source_word: אֱלֹהִים
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - deidad
  lexicon: HALOT
  rationale: Aquí el sustantivo es singular en sentido y se refiere al Dios de Israel. «Dios» es la equivalencia normal y más fiel en español en este contexto.
- source_word: בְּיִשְׂרָאֵל
  english_pob_choice: in Israel
  chosen_spanish: en Israel
  alternatives_spanish:
  - entre Israel
  - dentro de Israel
  lexicon: HALOT
  rationale: Se conserva el paralelismo con «en Judá» y el valor espacial/comunitario compacto del hebreo.
- source_word: גָּדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - magnífico
  - exaltado
  - glorioso
  lexicon: HALOT
  rationale: El adjetivo significa de manera directa «grande». «Grande» es la opción más literal y poéticamente sobria; evitar «magnífico» o «glorioso» impide introducir matices no exigidos por el hebreo.
- source_word: שְׁמוֹ
  english_pob_choice: his name
  chosen_spanish: su nombre
  alternatives_spanish:
  - su fama
  - su renombre
  - su nombre revelado
  lexicon: HALOT
  rationale: Se preserva la expresión concreta «nombre», que en poesía bíblica puede incluir reputación, identidad revelada y renombre. «Su nombre» mantiene esa densidad sin reducirla a «fama» ni explicitar en paráfrasis lo que el texto deja implícito.
theological_decisions:
- issue: El valor teológico de «nombre» aplicado a Dios
  english_pob_reading: Retain the concrete expression 'his name is great' rather than paraphrasing to 'he is greatly honored' or 'his fame is great.'
  chosen_spanish_reading: Mantener «su nombre es grande» en vez de sustituirlo por «es muy honrado» o «su fama es grande».
  alternative_spanish_readings:
  - su fama es grande
  - él es muy honrado
  rationale: La expresión bíblica «nombre» comunica identidad revelada, memoria pública y reputación, no solo una etiqueta verbal. Conservarla preserva la carga teológica del hebreo y evita aplanar el texto a un simple juicio de honor humano.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El cruce de control indica alta concordancia y no hubo revisiones aplicadas; se mantiene la lectura principal de la fuente hebrea y la solución inglesa auditada.
  spanish_consistency_notes:
  - Se conservó la relación paralela «en Judá / en Israel» para reflejar la estructura hebrea.
  - Se usó «Dios» en singular por el sentido del contexto, aunque אֱלֹהִים sea morfológicamente plural.
  - Se mantuvo «su nombre» como expresión teológicamente densa, sin sustituirla por una paráfrasis explicativa en el cuerpo del texto.
  - Los marcadores de nota [a] y [b] aparecen en el texto exactamente donde corresponden.
