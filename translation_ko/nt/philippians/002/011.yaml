id: PHP.2.11
reference: Philippians 2:11
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: καὶ πᾶσα γλῶσσα ἐξομολογήσηται ὅτι κύριος Ἰησοῦς Χριστὸς εἰς δόξαν θεοῦ πατρός.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/002/011.yaml
  text: 'and every tongue should confess that Jesus Messiah is Lord, to the glory of God the Father.'
translation:
  language: ko
  text: 그리고 모든 혀가 「예수 메시아는 주[a]」라고 고백하여, 아버지 하나님께 영광을 돌리게 하시려는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「주 예수 메시아」. 헬라어 어순은 「주이시다, 예수 메시아」로, 술어 「주」가 강조 위치에 놓여 있다. 「그리스도」 대신 「메시아」를 택하는 본 번역의 일관된 원칙에 따라 옮긴다.
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶσα γλῶσσα
  english_pob_choice: every tongue
  chosen_korean: 모든 혀
  alternatives_korean:
  - 모든 입
  - 모든 사람
  lexicon: BDAG
  rationale: 보편적 고백의 신체적 비유를 그대로 보존한다. 한국어로도 자연스럽다.
- source_word: ἐξομολογήσηται
  english_pob_choice: confess
  chosen_korean: 고백하다
  alternatives_korean:
  - 공개적으로 고백하다
  - 시인하다
  lexicon: BDAG
  rationale: 동사의 공개 선언적 무게를 「고백하다」가 자연스럽게 담는다.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_korean: 주
  alternatives_korean:
  - 주님
  - 주인
  lexicon: BDAG
  rationale: 글로사리 기본형. 신약의 기독론적 칭호로 굳어진 「주(主)」를 유지한다. 헬라어 어순상 「주」가 술어로 강조 위치에 놓여 있어, 한국어에서도 「예수 메시아는 주」로 술어를 뒤로 두어 그 강조를 살린다.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_korean: 메시아
  alternatives_korean:
  - 그리스도
  lexicon: BDAG
  rationale: 본 번역의 일관된 원칙에 따라 칭호 Χριστός를 「메시아」로 옮긴다. 본 고백 정식에서 칭호성이 여전히 살아 있다.
- source_word: εἰς δόξαν
  english_pob_choice: to the glory of
  chosen_korean: 영광을 돌리다
  alternatives_korean:
  - 영광이 되도록
  - 영광을 위하여
  lexicon: BDAG
  rationale: εἰς + δόξα 구조를 한국어 자연 구문 「영광을 돌리다」로 옮긴다.
- source_word: θεοῦ πατρός
  english_pob_choice: God the Father
  chosen_korean: 아버지 하나님
  alternatives_korean:
  - 하나님 아버지
  lexicon: BDAG
  rationale: 한국어로 자연스러운 어순을 택한다.
theological_decisions:
- issue: κύριος Ἰησοῦς Χριστὸς의 한국어 표현
  chosen_reading: 「예수 메시아는 주」 — 술어 「주」를 강조 위치에 두어 헬라어 어순의 강조 효과를 살림
  alternative_readings:
  - 「주 예수 메시아」
  rationale: 헬라어 어순은 술어 κύριος를 문두에 두어 「주이시다」의 강조를 만든다. 한국어 어순에서는 「예수 메시아는 주」 술어 후치형이 그 강조를 가장 잘 보존한다. 단순 「주 예수 메시아」 형태도 가능하므로 각주로 둔다.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός.'
