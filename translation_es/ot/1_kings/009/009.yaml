base_translation:
  language: en
  yaml_path: translation/ot/1_kings/009/009.yaml
  text: And they will say[a], ‘Because they abandoned Yahweh their God, who brought their fathers out of the land of Egypt, and they held fast to other gods and bowed down to them and served them[c][b], therefore Yahweh brought all this disaster on them.’
  footnotes:
