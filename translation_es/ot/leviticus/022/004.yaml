  glossary_alignment: No hay conflicto con los términos troncales del proyecto. No aparecen Yahvé, Mesías/Cristo, δοῦλος, etc. Las elecciones “descendencia de Aarón”, “cosas santas”, “secreción” y “emisión de semen” son coherentes con la línea léxica documentada. El ajuste a “quede limpio” preserva mejor la rationale del POB sobre transición a pureza ritual.
