    rationale: El original distingue יֵבֹשׁוּ y וְתַחְפְּרוּ, y el POB inglés preserva esa distinción con 'be ashamed' / 'be disgraced'. En español conviene mantener una diferencia semántica comparable.
  - severity: low
    issue: Redundancia de 'ustedes' en las subordinadas
    rationale: El español no necesita explicitar el pronombre aquí; omitirlo mejora la naturalidad sin perder referencia.
  - severity: low
    issue: Posible regionalismo de 'encinos'
    rationale: Es válido, pero menos panhispánico. No obstante, no exige adjudicación; puede mantenerse acompañado de la nota 'terebintos'.
  revised_spanish_text: Pues se avergonzarán por los encinos[a] que desearon, y quedarán humillados por los jardines que escogieron.
