  text: לָ/כֵן֩ אֱמֹ֨ר אֲלֵי/הֶ֜ם כֹּֽה אָמַ֣ר אֲדֹנָ֣/י יְהֹוִ֗ה עַל הַ/דָּ֧ם תֹּאכֵ֛לוּ וְ/עֵינֵ/כֶ֛ם תִּשְׂא֥וּ אֶל גִּלּוּלֵי/כֶ֖ם וְ/דָ֣ם תִּשְׁפֹּ֑כוּ וְ/הָ/אָ֖רֶץ תִּירָֽשׁוּ־׀־׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/ezekiel/033/025.yaml
  text: 'Therefore say to them[a], ‘Thus says the Lord GOD: You eat with the blood, and you lift up your eyes to your idols, and you shed blood[c][b]; shall you then possess the land?’'
  footnotes:
  - marker: a
    text: Or, more literally, “You eat over/with the blood,” likely referring to eating meat in violation of the prohibition concerning blood.
    reason: lexical_alternative
  - marker: b
    text: Or “and yet would you possess the land?” The Hebrew final clause may be read as an indignant rhetorical challenge.
    reason: alternative_reading
  - marker: c
    text: Hebrew גִּלּוּלִים is a contemptuous term for idols.
    reason: cultural_note
