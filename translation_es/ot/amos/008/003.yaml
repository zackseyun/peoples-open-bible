translation:
  language: es
  text: Y los cánticos del palacio se convertirán en lamento en aquel día[a] —declara el Señor Yahvé—. Muchos serán los cadáveres; en todo lugar los arrojarán fuera—¡silencio![b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los cánticos del templo». El hebreo הֵיכָל puede significar «palacio» o «templo».
    reason: alternative_reading
  - marker: b
    text: O «¡callen!» / «¡guarden silencio!». El hebreo final הָס es una llamada brusca al silencio, probablemente de horror o desconcierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהֵילִילוּ
  english_pob_choice: will become wailing
  chosen_spanish: se convertirán en lamento
  alternatives_spanish:
  - gemirán
  - se volverán en aullido
  - se trocarán en lamento
  lexicon: HALOT
  rationale: El hebreo expresa que los cánticos pasan a ser lamento; en español, «se convertirán en lamento» conserva esa transformación más que un simple acto de llorar.
- source_word: שִׁירוֹת
  english_pob_choice: songs
  chosen_spanish: cánticos
  alternatives_spanish:
  - canciones
  - cantos
  lexicon: HALOT
  rationale: «Cánticos» mantiene el sustantivo concreto y su registro culto, adecuado al contraste con «lamento».
- source_word: הֵיכָל
  english_pob_choice: palace
  chosen_spanish: palacio
  alternatives_spanish:
  - templo
  lexicon: HALOT
  rationale: Sigo la lectura principal del POB en contexto de juicio social y político; «palacio» encaja mejor con la escena, aunque «templo» sigue siendo una alternativa léxica válida.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: HALOT
  rationale: «En aquel día» reproduce la fórmula profética con registro natural en español.
- source_word: נְאֻם אֲדֹנָי יְהוִה
  english_pob_choice: declares the Lord GOD
  chosen_spanish: declara el Señor Yahvé
  alternatives_spanish:
  - declara el Señor, Yahvé
  - —dice el Señor Yahvé—
  lexicon: HALOT
  rationale: Se conserva la fórmula declarativa profética con «declara». Para אֲדֹנָי יְהוִה, el proyecto usa «Señor Yahvé» para mantener la distinción del título compuesto y el nombre divino.
- source_word: רַב
  english_pob_choice: Many will be
  chosen_spanish: Muchos serán
  alternatives_spanish:
  - Abundantes serán
  - Grandes serán
  lexicon: HALOT
  rationale: La construcción hebrea es predicativa; en español, «Muchos serán» comunica la cantidad sin forzar una estructura ajena.
- source_word: הַפֶּגֶר
  english_pob_choice: the corpses
  chosen_spanish: los cadáveres
  alternatives_spanish:
  - los cuerpos
  - los cuerpos muertos
  - los cadáveres
  lexicon: HALOT
  rationale: «Cadáveres» preserva la crudeza semántica de פגר y su fuerza visual, con un registro claro y natural en español.
- source_word: בְּכָל מָקוֹם
  english_pob_choice: in every place
  chosen_spanish: en todo lugar
  alternatives_spanish:
  - en cada lugar
  - por todas partes
  lexicon: HALOT
  rationale: «En todo lugar» conserva el alcance distributivo sin suavizarlo del todo a una sola adverbialización.
- source_word: הִשְׁלִיךְ
  english_pob_choice: they will throw them out
  chosen_spanish: los arrojarán afuera
  alternatives_spanish:
  - los echarán fuera
  - los tirarán fuera
  lexicon: HALOT
  rationale: Se mantiene la idea de desecho y expulsión. En español, «arrojarán afuera» es suficientemente fuerte y formal.
- source_word: הָס
  english_pob_choice: silence!
  chosen_spanish: ¡silencio!
  alternatives_spanish:
  - ¡callen!
  - ¡hush!
  - ¡silencio, callen!
  lexicon: HALOT
  rationale: La interjección final pide silencio abrupto; «¡silencio!» conserva el golpe retórico y el matiz de estupor/dolor.
theological_decisions:
- issue: Nombre divino en יְהוָה dentro de la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: el Señor Yahvé
  alternative_spanish_readings:
  - el Señor, Yahvé
  - el Señor Dios
  rationale: Sigo el principio del proyecto de rendir יהוה como «Yahvé», sin ocultarlo con una convención de mayúsculas. En el título compuesto, «Señor Yahvé» preserva la diferencia entre אֲדֹנָי y el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso alto del pasaje: mantiene «palacio» como lectura principal con nota para «templo», conserva la fórmula profética y refleja la clausura abrupta con una interjección de silencio. No introduce cambios no atestiguados respecto del paquete fuente ni de la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en concordancia con el estándar del proyecto.
  - Se evita «SEÑOR» como máscara tipográfica, salvo en el título compuesto traducido como «Señor Yahvé».
  - Se conserva un registro profético sobrio, sin suavizar la imagen de cadáveres y destrucción.
  - Los términos con ambigüedad léxica quedan documentados en notas para auditable transparencia.
