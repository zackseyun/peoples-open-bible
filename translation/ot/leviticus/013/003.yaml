theological_decisions:
- issue: Rendering of צָרַעַת in Levitical purity law
  chosen_reading: skin disease
  alternative_readings:
  - leprosy
  - defiling skin disease
  rationale: The Hebrew term denotes a broader ritual-impurity category than modern leprosy/Hansen's disease. Using 'skin disease' avoids anachronistic medical precision while preserving the legal-priestly context. The traditional rendering 'leprosy' is worth preserving in a footnote because readers will expect it.
- issue: Force of the priest's action in וְטִמֵּא אֹתוֹ
  chosen_reading: pronounce him unclean
  alternative_readings:
  - declare him unclean
  - make him unclean
  rationale: The verse concerns priestly examination and verdict. The translation should not imply that the priest metaphysically causes impurity; rather, he identifies and announces ritual status.
