revisions:
- from: Con alegría de corazón entonó alabanzas al nombre de Dios, y suplicó al Señor[a] por toda su casa.
  to: Con alegría en su corazón cantó alabanzas al nombre de Dios, y suplicó al Señor[a] por toda su familia.
  rationale: Se ajusta el primer giro para reflejar mejor καρδία como 'corazón' interior; se mejora la naturalidad de ἐξύμνησεν con 'cantó alabanzas'; y se aclara οἶκος como referente familiar con 'familia', evitando una lectura física de 'casa'. Se mantiene 'al Señor' en el texto principal con nota literal sobre 'el rostro del Señor', lo que preserva el hebraísmo sin volver torpe el español.
