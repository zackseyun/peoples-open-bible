translation:
  language: es
  text: 'Y dijo Moisés[a]: «Como has hablado[b], no volveré a ver tu rostro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo literalmente: «no añadiré otra vez a ver tu rostro», un giro idiomático que significa que no lo veré de nuevo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Como dices» / «Así sea como has dicho».'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: And Moses said
  chosen_spanish: Y dijo Moisés
  alternatives_spanish:
  - Entonces dijo Moisés
  - Y respondió Moisés
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutiva se refleja de manera natural con «Y dijo». «Respondió» sería interpretativo; «dijo» conserva el valor básico del verbo y el movimiento narrativo.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Mosés
  lexicon: Nombre propio bíblico
  rationale: Nombre propio estándar en español bíblico.
- source_word: כֵּן
  english_pob_choice: As
  chosen_spanish: Como
  alternatives_spanish:
  - Así como
  - Tal como
  lexicon: HALOT
  rationale: En la expresión כֵּן דִּבַּרְתָּ, «como» transmite la idea de conformidad con lo dicho. «Así como» sería más pesado; «tal como» es posible, pero menos sobrio aquí.
- source_word: דִּבַּרְתָּ
  english_pob_choice: you have spoken
  chosen_spanish: has hablado
  alternatives_spanish:
  - has dicho
  - hablaste
  lexicon: HALOT
  rationale: El perfecto hebreo admite una forma de pasado completo; «has hablado» conserva ese valor y mantiene un tono más formal. «Has dicho» es viable, pero «hablar» refleja mejor el verbo דּבר en este contexto de respuesta verbal solemne.
- source_word: לֹא אֹסִף עוֹד רְאוֹת
  english_pob_choice: I will not again see
  chosen_spanish: no volveré a ver
  alternatives_spanish:
  - no añadiré a ver
  - no seguiré viendo
  - no veré otra vez
  lexicon: HALOT
  rationale: La construcción idiomática hebrea literalmente dice «no añadiré nuevamente a ver». En español, «no volveré a ver» comunica la misma negación de repetición sin endurecer el texto con una calca poco natural. Se preserva la fuerza de resolución futura sin añadir el énfasis de «nunca jamás».
- source_word: פָּנֶיךָ
  english_pob_choice: your face
  chosen_spanish: tu rostro
  alternatives_spanish:
  - tu cara
  - tu presencia
  lexicon: HALOT
  rationale: Aunque la imagen literal es «rostro», «tu rostro» es más natural y digno en español bíblico que «tu cara». Se conserva la concreción del hebreo; «presencia» suavizaría la imagen y sería más interpretativo.
theological_decisions:
- issue: Intensidad de la negación temporal
  english_pob_reading: I will not again see your face
  chosen_spanish_reading: no volveré a ver tu rostro
  alternative_spanish_readings:
  - no volveré jamás a ver tu rostro
  - no te veré otra vez
  rationale: El hebreo expresa ausencia de repetición mediante una construcción idiomática, no una negación absoluta reforzada. Por eso se evita «jamás» para no intensificar más allá del texto. «No te veré otra vez» es posible, pero «volveré a ver» preserva mejor el matiz de repetición futura.
  doctrine_reference: Éxodo 10:29; principio de fidelidad semántica al hebreo
- issue: Lectura de asentimiento en la frase inicial
  english_pob_reading: As you have spoken
  chosen_spanish_reading: Como has hablado
  alternative_spanish_readings:
  - Como has dicho
  - Así sea como has hablado
  rationale: La frase funciona como asentimiento a la declaración de Faraón. «Como has hablado» mantiene esa aceptación sobria sin convertirla en una fórmula litúrgica ajena al contexto.
  doctrine_reference: Éxodo 10:29; lectura idiomática de כֵּן דִּבַּרְתָּ
translation_notes:
  revision_awareness: 'El borrador sigue la revisión inglesa que prefirió «not again» frente a una intensificación como «never again». Por eso la versión española evita «nunca» o «jamás» y usa una negación de repetición más cercana al hebreo: «no volveré a ver».'
  spanish_consistency_notes:
  - Se conserva el tono narrativo directo con «Y dijo Moisés».
  - Se evita traducir רְאוֹת פָּנֶיךָ por «ver tu presencia» para no perder la imagen concreta del hebreo.
  - La puntuación con comillas angulares mantiene legibilidad bíblica contemporánea.
  - La nota [a] apoya la transparencia del giro idiomático sin sustituir el texto principal.
