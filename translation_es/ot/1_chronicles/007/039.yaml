translation:
  language: es
  text: 'Los hijos de Ula: Arah[a], Haniel[b], y Rizia[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría leerse «Y los hijos de Ula». El hebreo inicia con una conjunción, pero en español genealógico es natural omitirla.
    reason: lexical_alternative
  - marker: b
    text: También puede escribirse «Hanniel».
    reason: lexical_alternative
  - marker: c
    text: También puede darse como «Riziah».
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: The sons of
  chosen_spanish: Los hijos de
  alternatives_spanish:
  - Y los hijos de
  - Los descendientes de
  lexicon: HALOT
  rationale: En contextos genealógicos, בני se expresa de forma natural y fiel como «hijos de». Mantengo el valor genealógico sin forzar una calca del conector inicial, que en español no necesita representarse como «y».
- source_word: עֻלָּא
  english_pob_choice: Ulla
  chosen_spanish: Ula
  alternatives_spanish:
  - Ulla
  lexicon: HALOT
  rationale: Nombre propio transliterado. El español puede simplificar la doble consonante de la forma inglesa, y el contexto auditado reconoce la variante ortográfica «Ula».
- source_word: אָרַח
  english_pob_choice: Arah
  chosen_spanish: Arah
  lexicon: HALOT
  rationale: Nombre propio; transliteración directa y estable en español.
- source_word: חַנִּיאֵל
  english_pob_choice: Hanniel
  chosen_spanish: Haniel
  alternatives_spanish:
  - Hanniel
  lexicon: HALOT
  rationale: Nombre propio transliterado. En español, «Haniel» comunica con claridad el nombre hebreo sin duplicar innecesariamente la consonante inicial; la variante inglesa «Hanniel» queda como alternativa reconocida.
- source_word: רִצְיָא
  english_pob_choice: Rizia
  chosen_spanish: Rizia
  alternatives_spanish:
  - Riziah
  lexicon: HALOT
  rationale: Nombre propio transliterado. La forma breve «Rizia» refleja bien la grafía hebrea y evita añadir una h final no presente en esta forma.
translation_notes:
  revision_awareness: El repaso más reciente indicó alta concordancia y no requirió cambios; la presente redacción conserva esa solución, pero ajusta el español para hacer visibles las alternativas textuales sin depender de marcas no ancladas.
  spanish_consistency_notes:
  - Se mantiene el estilo genealógico breve y directo.
  - Se conserva la transliteración de nombres propios sin traducirlos.
  - No se introduce terminología doctrinal, pues el verso es puramente genealógico.
  - Se evita la conjunción inicial en el cuerpo principal por naturalidad del español, pero se documenta la alternativa hebrea en nota.
