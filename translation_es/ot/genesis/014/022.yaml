base_translation:
  language: en
  yaml_path: translation/ot/genesis/014/022.yaml
  text: But Abram said to the king of Sodom[a], “I have raised my hand to Yahweh, God Most High[c][b], possessor of heaven and earth.”
  footnotes:
  - marker: a
    text: 'Raised my hand: a Hebrew oath gesture; that is, Abram is swearing an oath.'
    reason: cultural_note
  - marker: b
    text: Or 'creator of heaven and earth.' The Hebrew participle can be understood as 'possessor,' 'owner,' or in context 'creator.'
    reason: lexical_alternative
  - marker: c
    text: Or 'earth,”'.
    reason: previous_rendering
