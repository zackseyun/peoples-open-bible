translation:
  language: es
  text: Pero el rey se enfureció y, provocado por las calumnias de aquel hombre sumamente perverso, escribió a Nicanor, diciendo que tomaba muy mal el tratado[a] y le ordenó que enviara a Macabeo a Antioquía como prisionero[b] de inmediato.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acuerdo», «términos de paz» o «acuerdos» para συνθηκῶν.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cautivo» o «prisionero».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔθυμος γενόμενος
  english_pob_choice: became enraged
  chosen_spanish: se enfureció
  alternatives_spanish:
  - se enojó
  - se airó
  lexicon: LSJ
  rationale: La expresión indica un cambio a una ira intensa; «se enfureció» conserva mejor esa intensidad que un simple «se enojó», y suena natural en español bíblico contemporáneo.
- source_word: πανπονήρου
  english_pob_choice: utterly wicked
  chosen_spanish: sumamente perverso
  alternatives_spanish:
  - totalmente malvado
  - completamente perverso
  lexicon: LSJ
  rationale: El compuesto intensifica πονηρός. «Sumamente perverso» transmite la condena moral fuerte sin sonar innecesariamente forzado en español.
- source_word: διαβολαῖς
  english_pob_choice: slanders
  chosen_spanish: calumnias
  alternatives_spanish:
  - acusaciones calumniosas
  - difamaciones
  lexicon: LSJ
  rationale: Aquí el término apunta a denuncias o informes maliciosos. «Calumnias» conserva el carácter de habla dañina y falsa con buena claridad en español.
- source_word: ἐρεθισθεὶς
  english_pob_choice: provoked
  chosen_spanish: provocado
  alternatives_spanish:
  - incitado
  - irritado
  lexicon: LSJ
  rationale: El participio expresa que fue movido o incitado por esas calumnias. «Provocado» mantiene bien la relación causal con la reacción del rey.
- source_word: συνθηκῶν
  english_pob_choice: treaty
  chosen_spanish: tratado
  alternatives_spanish:
  - acuerdo
  - pactos
  - términos de paz
  lexicon: LSJ
  rationale: En este contexto político-militar, el plural griego puede referir a un acuerdo formal. «Tratado» es la opción más natural y oficial en español; la nota conserva las alternativas posibles.
- source_word: φάσκων βαρέως φέρειν
  english_pob_choice: saying that he took the treaty very badly
  chosen_spanish: diciendo que tomaba muy mal el tratado
  alternatives_spanish:
  - diciendo que estaba muy disgustado por el tratado
  - alegando que le pesaban mucho los términos
  lexicon: LSJ
  rationale: La locución βαρέως φέρειν expresa resentimiento o disgusto ante algo. La formulación española conserva el giro de discurso indirecto y la fuerza idiomática sin exagerar el sentido.
- source_word: δέσμιον
  english_pob_choice: as a prisoner
  chosen_spanish: como prisionero
  alternatives_spanish:
  - encadenado
  - preso
  - atado
  lexicon: LSJ
  rationale: El término significa cautivo o sujeto bajo custodia. «Como prisionero» sigue de cerca el valor lexical base y evita añadir una imagen concreta de cadenas que el griego no exige explícitamente.
- source_word: ἐξαποστέλλειν
  english_pob_choice: to send
  chosen_spanish: enviar
  alternatives_spanish:
  - despachar
  - remitir
  lexicon: LSJ
  rationale: El verbo significa enviar o despachar. «Enviar» es suficiente y natural; la urgencia del mandato se expresa con el contexto y con «de inmediato».
- source_word: ταχέως
  english_pob_choice: at once
  chosen_spanish: de inmediato
  alternatives_spanish:
  - sin demora
  - enseguida
  lexicon: LSJ
  rationale: El adverbio marca urgencia. «De inmediato» comunica mejor esa prontitud en español formal que una paráfrasis más libre.
theological_decisions:
- issue: Carga moral en πανπονήρου
  english_pob_reading: that utterly wicked man
  chosen_spanish_reading: aquel hombre sumamente perverso
  alternative_spanish_readings:
  - aquel hombre totalmente malvado
  - aquel hombre completamente perverso
  rationale: El griego mismo aporta una calificación moral muy fuerte. Se conserva explícitamente en español, sin suavizarla ni convertirla en una simple valoración narrativa.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La versión inglesa revisó 'in chains' por 'as a prisoner' para ajustarse mejor a δέσμιον. La redacción española sigue esa corrección con «como prisionero», evitando añadir la imagen de cadenas. También se preserva la intensidad de ἔθυμος γενόμενος con «se enfureció» y la condena de πανπονήρου con un equivalente fuerte pero idiomático.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino por norma del proyecto, aunque este versículo no lo contiene.
  - Se usa «Macabeo» para Μακκαβαῖον, siguiendo el nombre propio español habitual sin perder la referencia al personaje.
  - «Tratado» se ha elegido como término principal, pero la nota conserva las alternativas documentadas en el audit trail inglés.
  - «Como prisionero» evita sobretraducir δέσμιον; la nota permite la lectura alternativa más literal «cautivo».
