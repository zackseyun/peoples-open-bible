translation:
  language: es
  text: Entonces Yahvé dijo a Moisés.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Y dijo Yahvé a Moisés». El conector inicial puede verterse también como «Y», y la fórmula final «diciendo» introduce el discurso en el versículo siguiente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Yahvé dijo
  lexicon: HALOT
  rationale: El waw consecutivo introduce avance narrativo; en español, «Entonces» conserva la secuencia con naturalidad y evita un calco rígido de «Y». El verbo «dijo» reproduce el אמר sin añadir contenido.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se mantiene el nombre divino propio del texto hebreo. «Yahvé» sigue el criterio del proyecto para יְהוָה y evita la sustitución por un título.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - para con
  - hacia
  lexicon: HALOT
  rationale: La preposición marca dirección de habla hacia Moisés; «a» es la equivalencia natural en español.
- source_word: מֹשֶׁה
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: HALOT
  rationale: Nombre propio bíblico estándar en español.
theological_decisions:
- issue: Preservación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La versión inglesa opta por el nombre propio divino. En español, «Yahvé» es la forma coherente con ese criterio y conserva la referencia al Nombre del pacto sin ocultarlo tras un sustituto titulado.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH'
- issue: Fórmula introductoria de habla divina
  english_pob_reading: Then Yahweh said to Moses
  chosen_spanish_reading: Entonces Yahvé dijo a Moisés
  alternative_spanish_readings:
  - Yahvé dijo a Moisés
  - Entonces Yahvé habló a Moisés
  rationale: El hebreo usa una fórmula narrativa con verbo de habla que introduce el discurso siguiente. «Dijo» mantiene la forma directa y la transición narrativa sin expandir el contenido.
  doctrine_reference: Criterio de continuidad narrativa en fórmulas de habla
translation_notes:
  revision_awareness: El audit trail inglés observa una revisión que eliminó la redundancia de «saying» en inglés por naturalidad estilística. En español, la fórmula verbal del hebreo se conserva de manera natural sin añadir un equivalente de «diciendo» en el texto principal, pero se anota como posibilidad de lectura en la nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» de manera consistente con el criterio del proyecto para יְהוָה.
  - Se evita «el SEÑOR» por ser una sustitución del nombre divino que no refleja el texto base.
  - La puntuación con nota al final respeta el flujo de una fórmula introductoria breve.
