translation:
  language: es
  text: De sus fosas nasales[a] sale humo, como de un caldero[b] avivado y juncos encendidos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «de sus narices/fosas nasales». El hebreo se refiere literalmente a las aberturas de la nariz; «fosas nasales» suena más natural y digno en español que «narices» en este contexto poético.
    reason: lexical_clarity
  - marker: b
    text: O «olla». El hebreo דּוּד puede denotar una olla de cocción o un recipiente mayor, como un caldero.
    reason: lexical_alternative
  - marker: c
    text: O «cañas encendidas». אַגְמוֹן puede referirse a juncos o cañas; aquí probablemente alude a vegetación usada como combustible, lo que intensifica la imagen del humo.
    reason: lexical_alternative
lexical_decisions:
- source_word: מִנְּחִירָיו
  english_pob_choice: from his nostrils
  chosen_spanish: de sus narices
  alternatives_spanish:
  - de sus fosas nasales
  - de su nariz
  lexicon: HALOT
  rationale: נְחִירַיִם se refiere a las narices/fosas nasales; en español, «narices» conserva la imagen vívida y concreta, y corresponde bien al plural morfológico del hebreo con sufijo pronominal.
- source_word: יֵצֵא
  english_pob_choice: goes out
  chosen_spanish: sale
  alternatives_spanish:
  - sale fuera
  - brota
  lexicon: HALOT
  rationale: El imperfecto describe una acción característica en la descripción poética. «Sale» es natural en español y preserva el movimiento sin añadir intensidad no explícita.
- source_word: עָשָׁן
  english_pob_choice: smoke
  chosen_spanish: humo
  alternatives_spanish:
  - humo espeso
  - vapores
  lexicon: HALOT
  rationale: «Humo» es el equivalente estándar y no requiere ampliación; el contexto visual de la imagen aporta la densidad sin necesidad de explicitarla.
- source_word: כְּדוּד
  english_pob_choice: like a boiling pot
  chosen_spanish: como de una olla hirviendo
  alternatives_spanish:
  - como de un caldero
  - como de una cacerola
  lexicon: HALOT
  rationale: דּוּד puede designar una vasija de cocción, incluso de tamaño mayor. En español, «olla» es clara y digna; se mantiene la comparación sin cerrar indebidamente la posibilidad léxica de «caldero».
- source_word: נָפוּחַ
  english_pob_choice: burning
  chosen_spanish: encendidas
  alternatives_spanish:
  - avivadas
  - inflamadas
  - ardientes
  lexicon: HALOT
  rationale: El participio pasivo sugiere algo soplado/fanado hasta el calor o el fuego. «Encendidas» comunica el resultado visible y funciona con naturalidad en la imagen junto a «cañas».
- source_word: וְאַגְמֹן
  english_pob_choice: burning rushes
  chosen_spanish: cañas encendidas
  alternatives_spanish:
  - juncos encendidos
  - cañas ardientes
  - juncos ardientes
  lexicon: HALOT
  rationale: אַגְמוֹן suele referirse a juncos/cañas/rushes. En el contexto, la imagen probable es de vegetación usada como combustible; «cañas encendidas» mantiene la referencia vegetal y la función de combustible, con una nota que preserva la alternativa.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste revisado del inglés auditado: «boiling pot» y la imagen de combustión de rushes/reeds. Se optó por un español natural que conserve la comparación dual y la tensión lexical entre «olla/caldero» y «cañas/juncos» sin neutralizarla.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como terminología por defecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se eligió «narices» para preservar la imaginería corporal concreta del hebreo, coherente con el registro poético del pasaje.
  - «Olla hirviendo» refleja la lectura revisada de la comparación, sin imponer «caldero» como única opción.
  - «Cañas encendidas» conserva el posible sentido de combustible vegetal y evita traducir mecánicamente como simple vegetación sin fuego.
