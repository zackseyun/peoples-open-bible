translation:
  language: es
  text: Extiende tu mano desde lo alto[a]; rescátame y líbrame de muchas aguas[b], de la mano de hijos extranjeros[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desde las alturas». El hebreo מִמָּרוֹם designa una posición elevada y no obliga a especificar «cielo».
    reason: lexical_alternative
  - marker: b
    text: O «de grandes aguas». El hebreo expresa una imagen poética de peligro abrumador.
    reason: lexical_alternative
  - marker: c
    text: Hebreo «hijos extranjeros», un modismo para «extranjeros».
    reason: lexical_alternative
lexical_decisions:
- source_word: שְׁלַח
  english_pob_choice: Stretch out
  chosen_spanish: Extiende
  alternatives_spanish:
  - Tiende
  - Alarga
  lexicon: HALOT
  rationale: El imperativo pide una acción de alcance de la mano; en español, «extiende tu mano» conserva la imagen corporal y resulta natural, sin convertirla en una abstracción.
- source_word: יָדֶיךָ
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - tus manos
  - tu brazo
  lexicon: HALOT
  rationale: El hebreo usa singular con sufijo de segunda persona masculino singular. «Mano» mantiene la imagen idiomática; en español no hace falta pluralizarla.
- source_word: מִמָּרוֹם
  english_pob_choice: from on high
  chosen_spanish: desde lo alto
  alternatives_spanish:
  - desde el cielo
  - desde las alturas
  lexicon: HALOT
  rationale: La base léxica es «altura/exaltación», no necesariamente «cielo». «Desde lo alto» conserva la elevación espacial sin especificar más de lo que el hebreo dice.
- source_word: פְּצֵנִי
  english_pob_choice: rescue me
  chosen_spanish: rescátame
  alternatives_spanish:
  - sácame
  - arráncame
  lexicon: HALOT
  rationale: El verbo expresa librar o sacar de peligro; «rescátame» es fiel y claro en español contemporáneo.
- source_word: וְהַצִּילֵנִי
  english_pob_choice: and deliver me
  chosen_spanish: y líbrame
  alternatives_spanish:
  - y sálvame
  - y redímeme
  lexicon: HALOT
  rationale: «Líbrame» conserva el paralelismo con «rescátame» y refleja el matiz de sacar de una situación peligrosa, sin repetir mecánicamente «salva».
- source_word: מִמַּיִם רַבִּים
  english_pob_choice: from many waters
  chosen_spanish: de muchas aguas
  alternatives_spanish:
  - de grandes aguas
  - de aguas poderosas
  lexicon: HALOT
  rationale: La expresión hebrea es literalmente «aguas רבות/abundantes». En español, «muchas aguas» reproduce con fidelidad el sintagma y deja intacta la imagen poética de peligro abrumador.
- source_word: מִיַּד
  english_pob_choice: from the hand of
  chosen_spanish: de manos de
  alternatives_spanish:
  - del poder de
  - de la mano de
  lexicon: HALOT
  rationale: El hebreo usa la metáfora de la mano como poder o control. En español, «de manos de» mantiene la imagen relacional y suena natural en este contexto poético.
- source_word: בְּנֵי נֵכָר
  english_pob_choice: foreign sons
  chosen_spanish: hijos extranjeros
  alternatives_spanish:
  - extranjeros
  - hijos de extranjeros
  lexicon: HALOT
  rationale: La frase hebrea es un modismo masculino para personas extranjeras. «Hijos extranjeros» conserva la forma filial y el rasgo idiomático; no se neutraliza a «extranjeros» en el texto principal.
theological_decisions:
- issue: Lenguaje antropomórfico aplicado a Dios
  english_pob_reading: Retain the concrete image 'Stretch out your hand from on high'
  chosen_spanish_reading: Conservar la imagen concreta «Extiende tu mano desde lo alto»
  alternative_spanish_readings:
  - Intervén desde el cielo
  - Actúa desde lo alto
  rationale: El hebreo presenta la acción salvadora de Dios mediante una imagen corporal. La traducción mantiene esa figuración en lugar de convertirla en una paráfrasis abstracta.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Expresión masculina e idiomática בְּנֵי נֵכָר
  english_pob_reading: Render as 'foreign sons' in the main text
  chosen_spanish_reading: Renderizar como «hijos extranjeros» en el texto principal
  alternative_spanish_readings:
  - extranjeros
  - gente extranjera
  rationale: La forma hebrea es gramaticalmente masculina y conserva una expresión filial idiomática. El español mantiene esa forma en el texto principal y no la reduce a una neutralización interpretativa.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «mighty waters» a «many waters» para ajustarse mejor al valor léxico. La presente redacción sigue ese ajuste y evita intensificar la imagen más allá del hebreo.
  spanish_consistency_notes:
  - Se mantuvo «mano» como imagen idiomática de poder/intervención divina y no se sustituyó por una abstracción.
  - Se conservó el paralelismo verbal mediante «rescátame» / «líbrame».
  - Se tradujo נֵכָר con un equivalente relacional («extranjeros») en una expresión filial que preserva el tono idiomático del hebreo.
  - Las notas a y b están ancladas explícitamente en el texto para cumplir la trazabilidad editorial.
