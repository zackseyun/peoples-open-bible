base_translation:
  language: en
  yaml_path: translation/ot/1_kings/018/004.yaml
  text: Now when Jezebel was cutting off the prophets of Yahweh[a], Obadiah took a hundred prophets and hid them, fifty men to a cave[b], and provided them with bread and water.
  footnotes:
  - marker: a
    text: Or 'was destroying' or more literally 'was cutting off' the prophets of the LORD.
    reason: lexical_alternative
  - marker: b
    text: Literally 'fifty men in a cave'; the Hebrew likely means he hid them in groups of fifty, apparently in separate caves.
    reason: lexical_alternative
