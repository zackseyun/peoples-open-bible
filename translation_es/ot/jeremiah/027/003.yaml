translation:
  language: es
  text: Y envíalos al rey de Edom, al rey de Moab, al rey de los amonitas[a], al rey de Tiro y al rey de Sidón, por medio de los mensajeros que vienen a Jerusalén a Sedequías, rey de Judá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «hijos de Amón»; es decir, los amonitas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתָּם
  english_pob_choice: And send them
  chosen_spanish: Y envíalos
  alternatives_spanish:
  - Entonces envíalos
  - Y los enviarás
  lexicon: HALOT
  rationale: La forma verbal funciona como mandato en secuencia instructiva. En español, el imperativo con enclítico conserva la fuerza directiva con naturalidad; se mantiene la conjunción para reflejar la continuidad del discurso.
- source_word: מֶלֶךְ
  english_pob_choice: king of
  chosen_spanish: rey de
  alternatives_spanish:
  - el rey de
  lexicon: HALOT
  rationale: El hebreo usa una construcción repetida de estado constructo. En español, 'rey de' expresa con claridad la relación sin añadir artículos innecesarios dentro de la serie.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  lexicon: HALOT
  rationale: Se conserva el nombre propio tradicional/transliterado del reino.
- source_word: מוֹאָב
  english_pob_choice: Moab
  chosen_spanish: Moab
  lexicon: HALOT
  rationale: Nombre propio conservado como transliteración estándar.
- source_word: בְּנֵי עַמּוֹן
  english_pob_choice: the Ammonites
  chosen_spanish: los amonitas
  alternatives_spanish:
  - los hijos de Amón
  - el pueblo de Amón
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'los hijos de Amón', pero el audit trail inglés ya decidió una lectura étnica más idiomática ('the Ammonites'). En español, 'amonitas' mantiene esa equivalencia natural sin perder el referente colectivo.
- source_word: צֹר
  english_pob_choice: Tyre
  chosen_spanish: Tiro
  alternatives_spanish:
  - Tyr
  lexicon: HALOT
  rationale: Se usa la forma española habitual del topónimo bíblico.
- source_word: צִידוֹן
  english_pob_choice: Sidon
  chosen_spanish: Sidón
  alternatives_spanish:
  - Sidón
  lexicon: HALOT
  rationale: Se usa la forma española habitual del topónimo bíblico.
- source_word: בְּיַד
  english_pob_choice: by the hand of
  chosen_spanish: por medio de
  alternatives_spanish:
  - por la mano de
  - mediante
  lexicon: HALOT
  rationale: La expresión hebrea señala agencia/instrumentalidad. 'Por medio de' transmite esa mediación en un español claro y fiel, sin sonar excesivamente literal.
- source_word: מַלְאָכִים
  english_pob_choice: messengers
  chosen_spanish: mensajeros
  alternatives_spanish:
  - enviados
  - embajadores
  lexicon: HALOT
  rationale: '''Mensajeros'' es el valor léxico central y evita precisar en exceso su rango diplomático; el contexto ya sugiere una misión oficial.'
- source_word: הַבָּאִים
  english_pob_choice: who are coming
  chosen_spanish: que vienen
  alternatives_spanish:
  - que están viniendo
  - que llegaban
  lexicon: HALOT
  rationale: El participio con artículo describe a los mensajeros como los que están en camino. 'Que vienen' es natural en español y conserva el valor aspectual.
- source_word: יְרוּשָׁלִַם
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  lexicon: HALOT
  rationale: Forma española estándar del nombre de la ciudad.
- source_word: אֶל צִדְקִיָּהוּ
  english_pob_choice: to Zedekiah
  chosen_spanish: a Sedequías
  alternatives_spanish:
  - para Sedequías
  lexicon: HALOT
  rationale: La preposición אֶל indica dirección hacia la persona a la que se encaminan. 'A Sedequías' reproduce ese movimiento de forma natural.
- source_word: מֶלֶךְ יְהוּדָה
  english_pob_choice: king of Judah
  chosen_spanish: rey de Judá
  alternatives_spanish:
  - el rey de Judá
  lexicon: HALOT
  rationale: Se mantiene la identificación appositiva del nombre propio con el título real, como en el original y en el inglés auditado.
theological_decisions:
- issue: בְּנֵי עַמּוֹן como designación étnica masculina plural
  english_pob_reading: the Ammonites
  chosen_spanish_reading: los amonitas
  alternative_spanish_readings:
  - los hijos de Amón
  - el pueblo de Amón
  rationale: El texto hebreo conserva la forma literal 'hijos de Amón', pero el sentido histórico-geopolítico funciona como designación del pueblo. La versión inglesa revisada optó por 'the Ammonites'; en español 'amonitas' comunica esa identidad colectiva sin borrar la forma de base, que queda documentada en la nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Relación entre la lista de reyes y la misión de los mensajeros
  english_pob_reading: by the hand of the messengers who are coming to Jerusalem to Zedekiah king of Judah
  chosen_spanish_reading: por medio de los mensajeros que vienen a Jerusalén, a Sedequías, rey de Judá
  alternative_spanish_readings:
  - por la mano de los mensajeros que vienen a Jerusalén a Sedequías, rey de Judá
  - mediante los mensajeros que vienen a Jerusalén a Sedequías, rey de Judá
  rationale: 'No hay tensión doctrinal, pero sí una decisión de estilo: conservar la mediación instrumental del hebreo sin forzar el modismo ''por la mano de'' cuando en español puede sonar rígido. ''Por medio de'' mantiene la instrumentalidad y la escena diplomática.'
  doctrine_reference: DOCTRINE.md Translation philosophy §2
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail inglés que prefirió 'the Ammonites' frente a 'the sons of Ammon'. La redacción española sigue esa decisión, pero conserva en nota la lectura literal hebrea para transparencia textual. También se respetó la estabilización de los nombres propios y la relación appositiva final 'Sedequías, rey de Judá'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general solo cuando el hebreo lo requiera explícitamente; este versículo no contiene el nombre divino.
  - 'Se prefirieron topónimos españoles establecidos: Edom, Moab, Tiro, Sidón, Jerusalén, Judá.'
  - '''Mensajeros'' se mantiene uniforme para מַלְאָכִים en lugar de ''embajadores'', por fidelidad léxica y menor sobreinterpretación.'
  - La puntuación separa claramente la serie de destinatarios y la frase instrumental final para facilitar la lectura pública.
