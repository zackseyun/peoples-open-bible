  to: Pero él, tomando una resolución noble, digna de su edad y de la dignidad de la vejez, y de la distinción de su honrado modo de vida, y de la excelente conducta que había tenido desde la niñez —más bien, conforme a la santa ley dada por Dios— declaró claramente, diciendo que lo enviaran pronto al Hades[a].
