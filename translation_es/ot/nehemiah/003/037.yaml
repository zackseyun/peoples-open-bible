  - severity: low
    issue: «los constructores» es menos natural en contexto bíblico narrativo
    rationale: הַבּוֹנִים es literalmente «los que edifican/edificaban». «Constructores» no es incorrecto, pero suena más técnico y menos narrativo. «Los que edificaban» preserva bien el contexto de reconstrucción del muro y suena más natural para lectores bíblicos en español.
