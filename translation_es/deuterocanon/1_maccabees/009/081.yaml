lexical_decisions:
- source_word: ὑστήκει
  english_pob_choice: it stood
  chosen_spanish: quedó en pie
  alternatives_spanish:
  - se mantuvo en pie
  - permaneció firme
  lexicon: LSJ
  rationale: El griego expresa la permanencia en posición de pie o fija. Como el sujeto no está explícito en el fragmento conservado, «quedó en pie» preserva esa ambigüedad sin forzar un sujeto masculino o colectivo más específico.
- source_word: καθὼς ἐπέταξεν
  english_pob_choice: as Jonathan had commanded
  chosen_spanish: como había mandado Jonathan
  alternatives_spanish:
  - tal como había ordenado Jonathan
  - como Jonathan había instruido
  lexicon: BDAG
  rationale: καθώς marca correspondencia, y ἐπιτάσσω puede significar mandar u ordenar. «Había mandado» conserva la relación temporal anterior respecto de la acción principal y mantiene un registro natural en español.
- source_word: ἐκοπίασαν
  english_pob_choice: grew weary
  chosen_spanish: se cansaron
  alternatives_spanish:
  - se fatigaron
  - quedaron exhaustos
  lexicon: BDAG
  rationale: κοπιάω puede denotar cansarse por el esfuerzo. En español, «se cansaron» es claro y fiel al sentido de agotamiento progresivo sin exagerar hasta «exhaustos».
- source_word: οἱ ἵπποι αὐτῶν
  english_pob_choice: their horses
  chosen_spanish: sus caballos
  alternatives_spanish:
  - los caballos de ellos
  - sus monturas
  lexicon: LSJ
  rationale: La construcción posesiva es directa; «sus caballos» reproduce el sentido sin añadir información. «Monturas» sería más interpretativo y menos literal.
- source_word: ἐξέλυσεν
  english_pob_choice: deployed
  chosen_spanish: desplegó
  alternatives_spanish:
  - sacó
  - lanzó
  - movilizó
  lexicon: LSJ
  rationale: En contexto militar, ἐξέλυσεν funciona como sacar/soltar para acción táctica. «Desplegó» expresa bien la maniobra militar y evita la ambigüedad de «liberó» o «soltó».
- source_word: τὴν δύναμιν αὐτοῦ
  english_pob_choice: his force
  chosen_spanish: su fuerza
  alternatives_spanish:
  - su ejército
  - sus tropas
  lexicon: BDAG
  rationale: δύναμις en narrativa histórica puede referirse a fuerza militar. «Su fuerza» conserva la amplitud del término griego; «ejército» o «tropas» concretarían más de lo que el texto exige.
- source_word: συνῆψεν πρὸς
  english_pob_choice: joined battle with
  chosen_spanish: trabó batalla con
  alternatives_spanish:
  - entabló combate con
  - se unió en batalla con
  lexicon: LSJ
  rationale: συνάπτω con πρός en contexto bélico significa entrar en combate o trabar batalla. «Trabó batalla con» es una formulación natural y precisa en español para este giro militar.
- source_word: τὴν
  english_pob_choice: the
  chosen_spanish: la
  alternatives_spanish:
  - la —
  - la [frase queda incompleta]
  lexicon: Greek article
  rationale: El fragmento griego termina abruptamente en τὴν, y la traducción española debe conservar esa incompletitud. «La» refleja fielmente el artículo conservado sin reconstruir la continuación perdida.
translation_notes:
  revision_awareness: El cotejo interno indica alta concordancia con el audit trail inglés y sin cambios necesarios en la revisión más reciente; por eso se mantiene una traducción breve, abierta y explícitamente incompleta al final, conforme al testimonio griego disponible.
  spanish_consistency_notes:
  - Se usó «Yahvé» como término por defecto solo cuando corresponde al nombre divino; este versículo no lo contiene.
  - Se prefirió «desplegó su fuerza» y «trabar batalla» para mantener el registro militar del griego sin sobre-interpretar el alcance táctico.
  - Se conservó el final truncado del testimonio griego y la nota explica la incompletitud textual.
