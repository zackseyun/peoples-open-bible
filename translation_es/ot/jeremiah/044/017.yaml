revisions:
- from: 'Pero ciertamente haremos todo lo que salió de nuestra boca: ofrecer incienso a la Reina del Cielo[a] y derramarle libaciones, como hicimos nosotros, nuestros padres, nuestros reyes y nuestros jefes, en las ciudades de Judá y en las calles de Jerusalén; entonces teníamos pan en abundancia, estábamos bien[b] y no vimos calamidad.'
  to: 'Pero ciertamente haremos toda palabra que salió de nuestra boca: ofrecer incienso a la Reina del Cielo y derramarle libaciones, como hicimos nosotros, nuestros padres, nuestros reyes y nuestros oficiales, en las ciudades de Judá y en las calles de Jerusalén; entonces teníamos pan en abundancia[a], estábamos bien[b] y no vimos calamidad.'
  rationale: Se ajusta ‘todo lo que salió de nuestra boca’ a ‘toda palabra que salió de nuestra boca’ para reflejar mejor el hebreo y la decisión inglesa; se cambia ‘jefes’ por ‘oficiales’ para preservar el matiz administrativo de שָׂרִים; se elimina la nota innecesaria sobre ‘Reina de los Cielos’ y se añade la nota léxica pertinente sobre la expresión idiomática de la saciedad con pan, manteniendo la nota sobre ‘estábamos bien’.
  reviewer_model: gpt-5.4
