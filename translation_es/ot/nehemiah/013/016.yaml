translation:
  language: es
  text: También los tirios vivían en ella, trayendo pescado y toda clase de mercancía[a], y vendiendo el sábado a la gente de Judá y en Jerusalén[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mercancías»; el hebreo apunta a bienes para la venta.
    reason: lexical_alternative
  - marker: b
    text: 'La frase final puede entenderse con énfasis: «e incluso en Jerusalén».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַצֹּרִים
  english_pob_choice: Also Tyrians
  chosen_spanish: También los tirios
  alternatives_spanish:
  - Y los tirios
  - También los habitantes de Tiro
  lexicon: HALOT
  rationale: צֹרִים designa a los habitantes de Tiro; en español, el etnónimo plural «los tirios» es natural y preciso. Conservo el valor aditivo de וְ como «También» para mantener la secuencia de infracciones del contexto.
- source_word: יָשְׁבוּ בָהּ
  english_pob_choice: lived in it
  chosen_spanish: vivían en ella
  alternatives_spanish:
  - habitaban en ella
  - se establecían en ella
  lexicon: HALOT
  rationale: יׁשב expresa residencia continua; «vivían» conserva el aspecto habitual del participio/preterito narrativo en español. «En ella» mantiene el referente femenino de la ciudad.
- source_word: מְבִיאִים
  english_pob_choice: bringing in
  chosen_spanish: trayendo
  alternatives_spanish:
  - introduciendo
  - llevando dentro
  lexicon: HALOT
  rationale: El participio hifil describe la acción de introducir mercancías en la ciudad. «Trayendo» es idiomático en español y suficientemente fiel al movimiento hacia dentro del contexto urbano.
- source_word: דָּאג
  english_pob_choice: fish
  chosen_spanish: pescado
  alternatives_spanish:
  - pez
  - peces
  lexicon: HALOT
  rationale: En un contexto de mercado, el sustantivo se refiere al producto de pesca vendido para consumo. «Pescado» comunica mejor esa realidad comercial en español moderno que «pez» o «peces».
- source_word: וְכָל מֶכֶר
  english_pob_choice: every kind of merchandise
  chosen_spanish: toda clase de mercadería
  alternatives_spanish:
  - toda clase de mercancías
  - todo género de mercancía
  lexicon: HALOT
  rationale: מֶכֶר alude a bienes para la venta, mercancía. «Toda clase de mercadería» mantiene el sentido comercial amplio y suena natural; «mercancías» también sería posible, pero aquí el singular colectivo da mejor fluidez.
- source_word: וּמֹכְרִים
  english_pob_choice: selling them
  chosen_spanish: y vendiéndolos
  alternatives_spanish:
  - y vendiendo
  - y los vendían
  lexicon: HALOT
  rationale: El participio prolonga la acción en curso. En español, el pronombre «los» puede referirse globalmente al pescado y a la mercadería mencionados, sin forzar una reconstrucción explícita del objeto en cada caso.
- source_word: בַּשַּׁבָּת
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - el día de reposo
  - en el día de reposo
  lexicon: HALOT
  rationale: «Sábado» es la forma natural y reconocible en español; además, preserva la referencia calendárica concreta del hebreo. Evito «día de reposo» para no desplazar el término básico del texto.
- source_word: לִבְנֵי יְהוּדָה
  english_pob_choice: to the people of Judah
  chosen_spanish: a la gente de Judá
  alternatives_spanish:
  - a los hijos de Judá
  - a los judeanos
  lexicon: HALOT
  rationale: El hebreo dice literalmente «a los hijos de Judá». Sigo la decisión del POB inglés de expresar el referente colectivo de forma natural sin perder el valor étnico-tribal del original; «gente de Judá» evita una lectura exclusivamente masculina y sigue siendo fiel al sentido colectivo.
- source_word: וּבִירוּשָׁלִָם
  english_pob_choice: and in Jerusalem
  chosen_spanish: y en Jerusalén
  alternatives_spanish:
  - e incluso en Jerusalén
  lexicon: HALOT
  rationale: La coordinación simple preserva el hebreo sin sobreinterpretar la fuerza enfática. En español, «y en Jerusalén» deja abierta la posible implicación de énfasis sin imponerla en el texto principal.
theological_decisions:
- issue: Referencia al tiempo de mercado en día sagrado
  english_pob_reading: selling them on the Sabbath
  chosen_spanish_reading: y vendiéndolos en sábado
  alternative_spanish_readings:
  - y vendiéndolos el sábado
  - y vendiéndolos en el día de reposo
  rationale: El texto denuncia una violación práctica del sábado por actividad comercial. «En sábado» mantiene la acusación directa y la concreción temporal del hebreo, sin atenuarla con una formulación más general.
  doctrine_reference: Éxodo 20:8-11; Nehemías 13:15-22
- issue: Destino de la venta en la frase final
  english_pob_reading: and in Jerusalem
  chosen_spanish_reading: y en Jerusalén
  alternative_spanish_readings:
  - e incluso en Jerusalén
  - también en Jerusalén
  rationale: Conservo la coordinación abierta del hebreo. La posible lectura enfática se deja como posibilidad interpretativa, no como decisión obligatoria del texto base.
  doctrine_reference: Nehemías 13:15-22
translation_notes:
  revision_awareness: La base inglesa revisada eliminó el artículo innecesario ante «Tyrians», suavizó «sons of Judah» a «people of Judah» y conservó la posible fuerza enfática de la cláusula final. La propuesta española sigue esas decisiones, pero vuelve explícito el etnónimo plural «tirios», mantiene el referente colectivo de Judá en forma natural y deja la lectura enfática de «y en Jerusalén» como posibilidad en nota, sin imponerla en el cuerpo del texto.
  spanish_consistency_notes:
  - Usé «Yahvé» no aplica aquí; no hay tetragrámaton en este verso.
  - Mantuve un registro bíblico contemporáneo y claro, evitando arcaísmos innecesarios.
  - «Los tirios» se usa como etnónimo plural consistente con el contexto de habitantes de Tiro.
  - La combinación «pescado y toda clase de mercadería» preserva la amplitud comercial del hebreo sin agregar elementos no atestiguados.
