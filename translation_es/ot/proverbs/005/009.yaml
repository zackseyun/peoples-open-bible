translation:
  language: es
  text: no sea que des tu honor[a] a otros, y tus años al cruel[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Honor» traduce de manera principal הוֹד; también puede entenderse como «esplendor» o «vigor».
    reason: lexical_alternative
  - marker: b
    text: La expresión hebrea puede leerse como «al cruel», «a un hombre cruel» o «al despiadado».
    reason: lexical_alternative
lexical_decisions:
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - de otro modo
  lexicon: HALOT
  rationale: La partícula introduce una advertencia de consecuencia indeseable. En español, «no sea que» conserva bien el tono exhortativo y precautorio del hebreo sin sonar explicativo de más.
- source_word: תִּתֵּן
  english_pob_choice: you give
  chosen_spanish: des
  alternatives_spanish:
  - entregues
  - sometas
  lexicon: HALOT
  rationale: El verbo נתן se rinde con un simple «dar» para mantener la forma directa del hebreo. Aquí, el contexto de advertencia aporta la idea de ceder algo valioso.
- source_word: לַאֲחֵרִים
  english_pob_choice: to others
  chosen_spanish: a otros
  alternatives_spanish:
  - a extraños
  - a otras personas
  lexicon: HALOT
  rationale: El plural de אחרים apunta de manera amplia a «otros», no necesariamente a extranjeros. «A otros» conserva esa amplitud y la neutralidad del original.
- source_word: הוֹדֶךָ
  english_pob_choice: your honor
  chosen_spanish: tu honor
  alternatives_spanish:
  - tu esplendor
  - tu vigor
  - tu majestad
  lexicon: HALOT
  rationale: En este contexto sapiencial, הוֹד puede abarcar honor, esplendor o prestigio. «Honor» expresa bien la pérdida de dignidad y reputación que sugiere el proverbio, y es natural en español.
- source_word: וּשְׁנֹתֶיךָ
  english_pob_choice: and your years
  chosen_spanish: y tus años
  alternatives_spanish:
  - y los años de tu vida
  lexicon: HALOT
  rationale: La construcción se puede traducir de forma transparente como «tus años». Mantiene la brevedad proverbial y deja que el contexto sugiera la vida o sus mejores años.
- source_word: לְאַכְזָרִי
  english_pob_choice: to the cruel one
  chosen_spanish: al cruel
  alternatives_spanish:
  - al hombre cruel
  - al despiadado
  - al despiadado hombre
  lexicon: HALOT
  rationale: El adjetivo funciona sustantivado en singular. En español, «al cruel» conserva la concisión del hebreo y deja el referente implícito, como en el original.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el hebreo masorético y coincide sustancialmente con la decisión inglesa auditada: advertencia de pérdida de honor y de años de vida hacia una figura cruel. No se introdujeron cambios textuales ni interpretativos mayores respecto del pass revisado, y se mantuvo la tensión léxica de הוֹד/אַכְזָרִי en notas.'
  spanish_consistency_notes:
  - Se prefirió «no sea que» para פֶּן por su valor admonitorio natural en español.
  - Se mantuvo «tu honor» en el cuerpo del texto y se dejó en nota la gama semántica de הוֹד.
  - Se conservó la estructura breve del proverbio sin expandir «tus años» a «los años de tu vida», aunque esa sea una glosa posible.
  - Se optó por «al cruel» para reproducir el sustantivo adjetival del hebreo sin añadir un sustantivo no explicitado.
