translation:
  language: es
  text: Hijo de hombre[a], ¿en qué es mejor la madera de la vid que cualquier madera, la rama que está entre los árboles del bosque?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿qué es la madera de la vid más que cualquier madera, la rama que está entre los árboles del bosque?». El hebreo es elíptico y comparativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: בֶּן אָדָם
  english_pob_choice: Son of man
  chosen_spanish: Hijo de hombre
  alternatives_spanish:
  - Ser humano
  - Mortal
  lexicon: HALOT
  rationale: Se conserva el vocativo profético fijo de Ezequiel sin convertirlo en una paráfrasis genérica. En español, «Hijo de hombre» mantiene la forma idiomática y la resonancia textual del hebreo mejor que «mortal» o «ser humano».
- source_word: מַה יִּהְיֶה
  english_pob_choice: how is ... better
  chosen_spanish: ¿qué es ... comparada con ...?
  alternatives_spanish:
  - ¿en qué es ... mejor que ...?
  - ¿qué tiene ... sobre ...?
  lexicon: HALOT
  rationale: El hebreo es elíptico y comparativo. En español, «¿qué es ... comparada con ...?» comunica la pregunta de superioridad sin forzar una glosa demasiado explicativa.
- source_word: עֵץ הַגֶּפֶן
  english_pob_choice: the wood of the vine
  chosen_spanish: la madera de la vid
  alternatives_spanish:
  - la madera de la vid
  - la leña de la vid
  - el leño de la vid
  lexicon: HALOT
  rationale: «Madera» preserva el sentido material del hebreo עֵץ en este contexto, y «vid» es el término natural y bíblico en español para גֶּפֶן. Se evita traducir como «árbol» porque aquí la comparación trata del material útil, no del árbol como planta.
- source_word: מִכָּל עֵץ
  english_pob_choice: than any wood
  chosen_spanish: comparada con cualquier madera
  alternatives_spanish:
  - más que cualquier madera
  - sobre toda madera
  lexicon: HALOT
  rationale: La preposición comparativa hebrea se expresa con naturalidad en español mediante «comparada con». «Cualquier madera» conserva la generalidad del contraste sin introducir un matiz ajeno.
- source_word: הַזְּמוֹרָה
  english_pob_choice: the branch
  chosen_spanish: la rama
  alternatives_spanish:
  - el sarmiento
  - el brote
  - la vara
  lexicon: HALOT
  rationale: זְמוֹרָה designa una rama de vid o sarmiento. «Rama» es la opción más clara y amplia para un texto público; «sarmiento» sería más técnico y puede sonar marcado en algunos registros.
- source_word: אֲשֶׁר הָיָה בַּעֲצֵי הַיָּעַר
  english_pob_choice: that is among the trees of the forest
  chosen_spanish: que está entre los árboles del bosque
  alternatives_spanish:
  - que estaba entre los árboles del bosque
  - que estaba entre los árboles del monte
  lexicon: HALOT
  rationale: Se mantiene la imagen comparativa amplia del hebreo. El presente «está» reproduce bien el valor genérico del cuadro en español y evita un pasado que podría sonar más narrativo que proverbial.
theological_decisions:
- issue: Vocativo profético «hijo de hombre»
  english_pob_reading: A fixed prophetic address in Ezekiel; not a messianic title here.
  chosen_spanish_reading: «Hijo de hombre» como llamado profético dirigido a Ezequiel, no como título mesiánico en este versículo.
  alternative_spanish_readings:
  - «ser humano» como apelación genérica
  - «mortal» como apelación poética
  rationale: La forma española conserva la interpelación establecida en Ezequiel y evita borrar la identidad literaria del discurso. No se introduce lectura mesiánica donde el contexto no la requiere.
  doctrine_reference: Ezequiel 2:1; 15:2
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó el guion largo por fluidez, sin cambiar el sentido. La redacción española sigue esa misma lectura fluida y conserva la comparación implícita del hebreo sin añadir elementos no sustentados.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino en otros contextos del proyecto, pero este versículo no contiene el Tetragrámaton.
  - «Hijo de hombre» se conserva como vocativo fijo de Ezequiel, siguiendo la decisión auditada en inglés.
  - Se eligió «vid»/«madera»/«rama» por su naturalidad en español y por reflejar la comparación material del original.
