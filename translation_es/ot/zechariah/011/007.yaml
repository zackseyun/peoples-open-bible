    rationale: El expediente POB documenta como lectura principal 'the afflicted of the flock', con 'the poor of the flock' solo como alternativa. 'Pobres' en español tiende a especificar pobreza económica y no conserva tan bien la amplitud de aflicción/vulnerabilidad del hebreo en este contexto.
  - severity: medium
    issue: '''por tanto'' produce una conexión discursiva poco natural en español en esta cláusula.'
    rationale: Aunque una revisión inglesa tardía cambió a 'therefore', el análisis léxico previo del propio expediente reconoce un valor especificativo/appositivo de לָכֵן. En español, 'por tanto a los afligidos del rebaño' queda torpe; una expresión como 'es decir' o 'a saber' comunica mejor la relación y mejora la legibilidad sin apartarse del sentido.
  - severity: low
