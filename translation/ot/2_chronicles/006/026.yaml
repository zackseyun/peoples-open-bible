id: 2CH.6.26
reference: 2 Chronicles 6:26
source:
  edition: WLC
  text: בְּ/הֵעָצֵ֧ר הַ/שָּׁמַ֛יִם וְ/לֹֽא יִהְיֶ֥ה מָטָ֖ר כִּ֣י יֶֽחֶטְאוּ לָ֑/ךְ וְ/הִֽתְפַּלְל֞וּ אֶל הַ/מָּק֤וֹם הַ/זֶּה֙ וְ/הוֹד֣וּ אֶת שְׁמֶ֔/ךָ מֵ/חַטָּאתָ֥/ם יְשׁוּב֖וּ/ן כִּ֥י תַעֲנֵֽ/ם־־־־׃
translation:
  text: When the heavens are shut up and there is no rain because they have sinned against you[a], and they pray toward this place and confess your name and turn from their sin because you answer them,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Or, 'because you afflict them' or 'because you humble them.' The Hebrew verb can carry either sense depending on context.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּהֵעָצֵר
  chosen: when ... are shut up
  alternatives:
  - when ... are restrained
  - when ... are closed up
  lexicon: HALOT
  rationale: The Niphal infinitive construct of עצר with prefixed ב marks a temporal clause, 'when the heavens are shut up/restrained.' 'Shut up' is idiomatic English for withheld rain and preserves the concrete imagery.
- source_word: הַשָּׁמַיִם
  chosen: the heavens
  alternatives:
  - the sky
  lexicon: HALOT
  rationale: Hebrew commonly uses 'the heavens' for the rain-bearing sky. 'The heavens' preserves the source wording and biblical register better than the flatter 'sky.'
- source_word: וְלֹא יִהְיֶה מָטָר
  chosen: and there is no rain
  alternatives:
  - and rain does not fall
  - and there will be no rain
  lexicon: HALOT
  rationale: This clause states the result of the heavens being shut up. 'There is no rain' is natural English and keeps the simple existential force of היה + noun.
- source_word: כִּי יֶחֶטְאוּ לָךְ
  chosen: because they have sinned against you
  alternatives:
  - for they sin against you
  - because they sin against you
  lexicon: HALOT
  rationale: כִּי here is causal. In this prayer setting, English present perfect ('have sinned') fits the condition leading to drought. 'Against you' correctly renders לָךְ in the ethical sense of sin directed toward God.
- source_word: וְהִתְפַּלְלוּ אֶל הַמָּקוֹם הַזֶּה
  chosen: and they pray toward this place
  alternatives:
  - and they pray to this place
  - and they pray in the direction of this place
  lexicon: HALOT
  rationale: אֶל with 'pray' in this temple-prayer context indicates direction/orientation, not that prayer is addressed to the place itself. 'Toward this place' is the clearest idiomatic rendering.
- source_word: וְהוֹדוּ אֶת שְׁמֶךָ
  chosen: and give thanks to your name
  alternatives:
  - and confess your name
  - and praise your name
  lexicon: HALOT
  rationale: ידה in the Hiphil can denote thanksgiving, praise, or confession depending on context. Here, in a repentance-and-prayer sequence, 'give thanks to your name' fits well and is a common covenantal expression, while the alternatives remain possible.
- source_word: שְׁמֶךָ
  chosen: your name
  lexicon: HALOT
  rationale: Retained literally. In Hebrew theology 'name' represents God's revealed character and reputation, but the literal rendering is standard and sufficient here.
- source_word: מֵחַטָּאתָם יְשׁוּבוּן
  chosen: and turn from their sin
  alternatives:
  - and turn back from their sin
  - and repent of their sin
  lexicon: HALOT
  rationale: שוב + מן expresses turning away/from. 'Turn from their sin' preserves the repentance imagery without over-paraphrasing to the more interpretive 'repent,' though that is conceptually related.
- source_word: כִּי תַעֲנֵם
  chosen: because you answer them
  alternatives:
  - when you afflict them
  - because you humble them
  lexicon: HALOT
  rationale: The verb ענה can mean 'answer/respond' or in other stems/context 'afflict/humble.' In this prayer context, with people praying and then turning from sin, 'answer them' best fits the syntax and sense. The alternative sense is worth preserving because some translations take the clause causally as divine humbling leading to repentance.
