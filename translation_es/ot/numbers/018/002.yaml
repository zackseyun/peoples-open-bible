translation:
  language: es
  text: Y también haz que se acerquen contigo tus hermanos[a], la tribu de Leví, la tribu de tu padre, para que se unan a ti y te sirvan; y tú y tus hijos contigo estaréis delante de la tienda del testimonio[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "que te acompañen" o "que estén adheridos a ti"; el verbo hebreo también hace eco del nombre Leví.'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: "la tienda del testimonio"; muchas versiones en español leen "la tienda del encuentro" por familiaridad con otras expresiones del tabernáculo.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם
  english_pob_choice: And also
  chosen_spanish: Y también
  alternatives_spanish:
  - Además
  - Y asimismo
  lexicon: HALOT
  rationale: Conserva el valor aditivo de la conjunción inicial sin añadir énfasis inexistente en el hebreo.
- source_word: אַחֶיךָ
  english_pob_choice: your brothers
  chosen_spanish: tus hermanos
  alternatives_spanish:
  - tus parientes
  - tus compañeros levitas
  lexicon: HALOT
  rationale: Mantiene el lenguaje familiar literal del hebreo; en contexto se refiere a los levitas, pero 'hermanos' preserva esa cercanía representativa.
- source_word: מַטֵּה לֵוִי
  english_pob_choice: the tribe of Levi
  chosen_spanish: la tribu de Leví
  alternatives_spanish:
  - el bastón de Leví
  - la rama de Leví
  lexicon: HALOT
  rationale: Aquí מַטֶּה designa la unidad tribal, no un objeto físico; 'tribu de Leví' expresa el sentido contextual de forma natural en español.
- source_word: שֵׁבֶט אָבִיךָ
  english_pob_choice: your father's tribe
  chosen_spanish: la tribu de tu padre
  alternatives_spanish:
  - la tribu paterna
  - el clan de tu padre
  lexicon: HALOT
  rationale: Respeta la estructura apposicional del hebreo y deja claro que Leví es la tribu ancestral de Aarón.
- source_word: הַקְרֵב
  english_pob_choice: bring near
  chosen_spanish: acerca
  alternatives_spanish:
  - presenta
  - trae cerca
  lexicon: HALOT
  rationale: El hiphil de קרב puede significar acercar o presentar para servicio; 'acerca' conserva el matiz cultual sin sonar rígido.
- source_word: וְיִלָּוּוּ עָלֶיךָ
  english_pob_choice: so that they may be joined to you
  chosen_spanish: para que se unan a ti
  alternatives_spanish:
  - para que se adhieran a ti
  - para que se asocien contigo
  lexicon: HALOT
  rationale: El nifal de לוה tiene la idea de unirse/adhesión; 'se unan a ti' comunica bien esa relación y permite percibir el eco con el nombre de Leví.
- source_word: וִישָׁרְתוּךָ
  english_pob_choice: and serve you
  chosen_spanish: y te sirvan
  alternatives_spanish:
  - y te ministren
  - y te atiendan
  lexicon: HALOT
  rationale: '''Servir'' conserva el sentido de servicio cultual sin introducir un tecnicismo eclesiástico menos transparente.'
- source_word: וְאַתָּה וּבָנֶיךָ אִתָּךְ
  english_pob_choice: while you and your sons with you
  chosen_spanish: y tú y tus hijos contigo
  alternatives_spanish:
  - mientras tú y tus hijos contigo
  - y tú, con tus hijos
  lexicon: HALOT
  rationale: En español, la simple coordinación reproduce de manera natural el contraste entre Aarón y sus hijos por un lado, y los levitas por el otro.
- source_word: לִפְנֵי אֹהֶל הָעֵדֻת
  english_pob_choice: before the tent of the testimony
  chosen_spanish: delante de la tienda del testimonio
  alternatives_spanish:
  - delante de la tienda del encuentro
  - delante del tabernáculo del testimonio
  lexicon: HALOT
  rationale: Se sigue el hebreo literal 'tienda del testimonio' en vez de armonizarlo con la frase más común 'tienda del encuentro'; 'tienda' resulta idiomático y fiel.
theological_decisions:
- issue: Renderizado de אֹהֶל הָעֵדֻת
  english_pob_reading: the tent of the testimony
  chosen_spanish_reading: la tienda del testimonio
  alternative_spanish_readings:
  - la tienda del encuentro
  rationale: El hebreo usa aquí עֵדוּת ('testimonio'), no la fórmula más frecuente 'encuentro'. La traducción preserva esa diferencia para no borrar una tensión lexical documentada por el texto fuente.
  doctrine_reference: Translation philosophy §1 (primacía del texto original sobre la familiaridad litúrgica)
translation_notes:
  revision_awareness: 'El texto inglés auditable muestra una sola revisión importante: ''the tribe of your father'' pasó a ''your father''s tribe'' para reflejar mejor שֵׁבֶט אָבִיךָ. La versión española adoptó directamente esa relación posesiva (''la tribu de tu padre'') y mantuvo la decisión del audit trail de conservar ''testimony'' en lugar de armonizar con ''meeting''.'
  spanish_consistency_notes:
  - Se mantuvo 'Leví' como nombre propio, no 'levita', porque el sintagma designa la tribu.
  - '''Hermanos'' conserva la literalidad del hebreo; el contexto aclara que son los levitas.'
  - '''Tienda del testimonio'' evita importar una fórmula tradicional que el hebreo de este versículo no usa.'
  - La sintaxis busca fluidez moderna sin perder la secuencia de mandato, propósito y contraste del original.
