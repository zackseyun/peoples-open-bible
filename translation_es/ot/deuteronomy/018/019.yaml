translation:
  language: es
  text: Y el hombre que no escuche las palabras que él hable en mi nombre[a], yo mismo le pediré cuentas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «bajo mi autoridad». El hebreo dice literalmente «en mi nombre», fórmula que subraya representación autorizada.'
    reason: alternative_reading
  - marker: b
    text: Lit. «yo requeriré de él». La expresión hebrea indica responsabilidad o rendición de cuentas ante Dios; también puede entenderse como «yo le pediré cuentas».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהָיָה
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y acontecerá
  - Y será
  lexicon: HALOT
  rationale: El hebreo introduce aquí una consecuencia o continuación solemne; en español, una simple conjunción mantiene la transición sin volverla pesada, como en el audit trail inglés.
- source_word: הָאִישׁ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - la persona
  - quien
  lexicon: HALOT
  rationale: El sustantivo hebreo es masculino singular con valor representativo. 'El hombre' conserva esa forma y evita neutralizar el término sin necesidad textual.
- source_word: לֹא יִשְׁמַע אֶל
  english_pob_choice: does not listen to
  chosen_spanish: no escuche
  alternatives_spanish:
  - no oiga
  - no obedezca
  lexicon: HALOT
  rationale: שמע con אֶל expresa escuchar con atención/responder. En esta cláusula condicional, 'no escuche' comunica bien la idea de no prestar oído a las palabras, sin forzar todavía 'obedecer' como en una paráfrasis más fuerte.
- source_word: דְּבָרַי
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mi palabra
  - lo que digo
  lexicon: HALOT
  rationale: El plural constructo con sufijo de primera persona se refleja mejor con 'mis palabras', conservando el énfasis en el contenido concreto de la խոս. El español necesita el plural para no perder la forma del hebreo.
- source_word: אֲשֶׁר יְדַבֵּר
  english_pob_choice: that he speaks
  chosen_spanish: que él hable
  alternatives_spanish:
  - que hable
  - que dirá
  lexicon: HALOT
  rationale: El relativo apunta a la acción de hablar del profeta. 'Que él hable' preserva el valor genérico del presente hebreo y mantiene la conexión con el contexto profético.
- source_word: בִּשְׁמִי
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - bajo mi autoridad
  - en representación mía
  lexicon: HALOT
  rationale: El modismo hebreo se conserva literalmente porque es claro en español y retiene la fuerza teológica de la autorización divina.
- source_word: אָנֹכִי
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - yo, por mi parte
  lexicon: HALOT
  rationale: El pronombre independiente añade énfasis. 'Yo mismo' reproduce esa fuerza de manera natural en español.
- source_word: אֶדְרֹשׁ מֵעִמּוֹ
  english_pob_choice: will require it from him
  chosen_spanish: le pediré cuentas
  alternatives_spanish:
  - se lo reclamaré
  - lo requeriré de él
  - le exigiré cuenta
  lexicon: HALOT
  rationale: דרשׁ con מעם expresa exigencia de responsabilidad o rendición de cuentas. En español, 'pediré cuentas' comunica el sentido judicial y relacional con buena idiomaticidad. El objeto implícito no se explicita para no sobreespecificar más allá del hebreo.
theological_decisions:
- issue: Naturaleza de la respuesta divina al rechazo de las palabras proféticas
  english_pob_reading: I myself will require it from him
  chosen_spanish_reading: yo mismo le pediré cuentas
  alternative_spanish_readings:
  - yo mismo lo requeriré de él
  - yo mismo lo llamaré a cuentas
  rationale: El hebreo expresa responsabilidad exigida por Dios sin describir con precisión el tipo de juicio o castigo. 'Pediré cuentas' conserva esa advertencia solemne y evita cerrar la tensión teológica con una concreción excesiva.
  doctrine_reference: Preservar la tensión teológica sin resolverla de más.
translation_notes:
  revision_awareness: 'Se revisó el hebreo directamente y se alineó con el auditor inglés: el sentido de שׁמע con אֶל, el valor enfático de אָנֹכִי y el uso judicial de דרשׁ con מעם se mantuvieron sin suavizar la advertencia profética.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto hebreo lo requiere explícitamente; en este versículo no aparece.
  - Se evitó 'obedecer' en la cláusula principal porque el audit trail inglés preserva el matiz de escuchar/prestar oído.
  - Se mantuvo el masculino singular representativo 'el hombre' por fidelidad al hebreo.
  - Se evitó introducir 'castigo' o 'juicio' en el texto principal, porque el original habla de exigir cuentas sin especificar el modo.
