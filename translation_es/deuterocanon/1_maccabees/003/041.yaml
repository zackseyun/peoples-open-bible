translation:
  language: es
  text: Y los mercaderes de la tierra oyeron su nombre[a], y tomaron mucha plata y oro, y siervos, y llegaron al campamento para tomar a los hijos de Israel como siervos[b]. Y fuerzas de Siria y de la tierra de los extranjeros se les añadieron[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su fama» o «el informe sobre ellos». Literalmente, «su nombre».
    reason: lexical_alternative
  - marker: b
    text: O «como esclavos». El griego usa el mismo término tanto para los que se llevaron consigo como para lo que los hijos de Israel habrían de llegar a ser.
    reason: lexical_alternative
  - marker: c
    text: O «se les unieron fuerzas de Siria y de tierras extranjeras».
    reason: alternative_reading
lexical_decisions:
- source_word: ἔμποροι
  english_pob_choice: merchants
  chosen_spanish: mercaderes
  alternatives_spanish:
  - comerciantes
  - traders
  lexicon: LSJ
  rationale: ἔμποροι designa a personas dedicadas al comercio. En español, 'mercaderes' suena natural y conserva el matiz de negocio/compraventa que encaja con el contexto de tráfico de cautivos.
- source_word: τῆς χώρας
  english_pob_choice: of the land
  chosen_spanish: de la tierra
  alternatives_spanish:
  - del país
  - de la región
  lexicon: LSJ
  rationale: χώρα puede significar tierra, país o región. 'De la tierra' sigue de cerca el griego y funciona bien en español bíblico sin volverse arcaizante.
- source_word: τὸ ὄνομα αὐτῶν
  english_pob_choice: their fame
  chosen_spanish: su fama
  alternatives_spanish:
  - su nombre
  - el informe sobre ellos
  lexicon: LSJ
  rationale: Aunque literalmente es 'su nombre', en contexto significa reputación o noticia oída acerca de ellos. 'Su fama' reproduce el sentido idiomático que el audit trail inglés ya decidió en la revisión final.
- source_word: ἀργύριον καὶ χρυσίον πολὺ σφόδρα
  english_pob_choice: a great amount of silver and gold
  chosen_spanish: mucha plata y oro
  alternatives_spanish:
  - una gran cantidad de plata y oro
  - muchísima plata y oro
  lexicon: LSJ
  rationale: La expresión intensifica cantidad. 'Mucha plata y oro' es natural y suficientemente formal en español, sin perder la abundancia del original.
- source_word: παῖδας
  english_pob_choice: fetters
  chosen_spanish: grilletes
  alternatives_spanish:
  - cadenas
  - hierros
  lexicon: LSJ
  rationale: El contexto es el de mercaderes que se preparan para comprar cautivos; el término griego puede referirse a lo que llevan consigo para sujetar esclavos, y la revisión inglesa entendió aquí 'fetters'. 'Grilletes' comunica ese objeto de sujeción en español con claridad.
- source_word: παρεμβολὴν
  english_pob_choice: camp
  chosen_spanish: campamento
  alternatives_spanish:
  - campamento militar
  - campamento de guerra
  lexicon: LSJ
  rationale: Sentido militar estándar de παρεμβολή. 'Campamento' es la equivalencia más natural y clara en español.
- source_word: τοῦ λαβεῖν ... εἰς παῖδας
  english_pob_choice: to take the sons of Israel as slaves
  chosen_spanish: para tomar a los hijos de Israel como esclavos
  alternatives_spanish:
  - para llevarse a los hijos de Israel como esclavos
  - para tomar a los hijos de Israel como cautivos
  lexicon: LSJ
  rationale: La construcción expresa propósito. 'Hijos de Israel' conserva el sintagma explícito del griego (υἱούς). 'Como esclavos' refleja el valor esclavista que la revisión inglesa fijó para el sentido final de la escena.
- source_word: προσετέθησαν πρὸς αὐτούς
  english_pob_choice: were added to them
  chosen_spanish: se les añadieron
  alternatives_spanish:
  - se les unieron
  - se sumaron a ellos
  lexicon: LSJ
  rationale: La pasiva/additiva del griego se conserva mejor con una forma impersonal o pasiva refleja. 'Se les añadieron' sigue de cerca la estructura y mantiene el matiz de incorporación de fuerzas.
- source_word: δυνάμεις Συρίας
  english_pob_choice: forces from Syria
  chosen_spanish: fuerzas de Siria
  alternatives_spanish:
  - fuerzas sirias
  - contingentes de Siria
  lexicon: LSJ
  rationale: El genitivo se puede verter como procedencia o cualidad. 'De Siria' mantiene la relación geográfica y respeta la paralela con el siguiente miembro.
- source_word: γῆς ἀλλοφύλων
  english_pob_choice: from the land of foreigners
  chosen_spanish: de la tierra de los extranjeros
  alternatives_spanish:
  - de tierras extranjeras
  - de la tierra de los filisteos
  lexicon: LSJ
  rationale: ἀλλόφυλοι significa literalmente 'de otra tribu' o 'extranjeros'. Aquí el sentido amplio de extranjeros encaja con la coalición militar y evita introducir 'filisteos' sin apoyo suficiente del contexto inmediato.
theological_decisions:
- issue: Valor de παῖδας en el contexto de trata de personas
  english_pob_reading: fetters / slaves in a slave-trade setting
  chosen_spanish_reading: grilletes / esclavos
  alternative_spanish_readings:
  - cadenas / esclavos
  - esclavos / esclavos
  - sirvientes
  rationale: El contexto describe mercaderes que llevan recursos para adquirir seres humanos como propiedad. La revisión inglesa terminó distinguiendo entre lo que llevan consigo ('fetters') y el destino de los israelitas ('slaves'). En español, 'grilletes' expresa el implemento de sujeción y 'esclavos' expresa el resultado humano de la compraventa, sin diluir la violencia del pasaje.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5'
- issue: τὸ ὄνομα αὐτῶν como reputación o noticia
  english_pob_reading: their fame
  chosen_spanish_reading: su fama
  alternative_spanish_readings:
  - su nombre
  - el informe sobre ellos
  rationale: Aunque la forma literal es 'su nombre', el contexto exige reputación o noticia conocida. 'Su fama' conserva el giro idiomático y refleja la decisión revisada del audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §5'
translation_notes:
  revision_awareness: La versión inglesa auditada revisó 'heard their name' a 'heard their fame', reemplazó la lectura más literal de la cantidad por una formulación más natural, y ajustó el término del botín de 'servants' a 'fetters' por el contexto de trata de esclavos. La presente redacción española sigue esas decisiones finales y preserva la tensión entre el valor literal de algunos términos griegos y su sentido contextual.
  spanish_consistency_notes:
  - Mantengo 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni κύριος.
  - Uso 'esclavos' para el destino de los hijos de Israel porque el contexto es de compra y sometimiento humano; no suavizo a 'sirvientes'.
  - '''Grilletes'' traduce el objeto de sujeción insinuado por la revisión inglesa final y no pretende reinterpretar el griego como si designara personas.'
