translation:
  language: es
  text: Y el rey respondió al pueblo con dureza, y abandonó el consejo de los ancianos que lo habían aconsejado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעַן
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: HALOT
  rationale: ענה en este contexto narrativo introduce la réplica del rey a la petición del pueblo. «Respondió» mantiene el valor discursivo natural en español y evita una repetición demasiado rígida de «contestó».
- source_word: הַמֶּלֶךְ
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el rey
  lexicon: HALOT
  rationale: El referente es el monarca en la narración. «Rey» es el equivalente normal y transparente en español.
- source_word: הָעָם
  english_pob_choice: the people
  chosen_spanish: el pueblo
  alternatives_spanish:
  - la gente
  - el pueblo
  lexicon: HALOT
  rationale: עָם designa al conjunto nacional que se dirige al rey. «El pueblo» conserva mejor el matiz colectivo y político que «la gente».
- source_word: קָשָׁה
  english_pob_choice: harshly
  chosen_spanish: con dureza
  alternatives_spanish:
  - duramente
  - ásperamente
  lexicon: HALOT
  rationale: El hebreo funciona adverbialmente para caracterizar la manera de responder. «Con dureza» expresa bien la severidad de la respuesta en un español natural y digno.
- source_word: וַיַּעֲזֹב
  english_pob_choice: abandoned
  chosen_spanish: abandonó
  alternatives_spanish:
  - dejó de lado
  - rechazó
  - abandonó
  lexicon: HALOT
  rationale: עזב indica dejar, abandonar o apartarse de algo. «Abandonó» conserva la decisión tajante de desechar el consejo de los ancianos.
- source_word: עֲצַת
  english_pob_choice: the counsel
  chosen_spanish: el consejo
  alternatives_spanish:
  - el consejo
  - la aconseja
  lexicon: HALOT
  rationale: עֵצָה puede ser «consejo» o «consejo consultivo»; aquí el sustantivo común «consejo» comunica la idea deliberativa sin sobrecargar la frase.
- source_word: הַזְּקֵנִים
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los ancianos
  - los mayores
  lexicon: HALOT
  rationale: זְקֵנִים puede referirse a hombres de edad y también a una función social de liderazgo. En español, «ancianos» conserva esa ambigüedad funcional y sigue el uso bíblico común.
- source_word: אֲשֶׁר יְעָצֻהוּ
  english_pob_choice: who had advised him
  chosen_spanish: que lo habían aconsejado
  alternatives_spanish:
  - que lo habían aconsejado
  - que le habían dado consejo
  lexicon: HALOT
  rationale: El relativo identifica a los ancianos como quienes ya habían ofrecido consejo al rey. «Lo habían aconsejado» mantiene la relación semántica de עָצַה y el tiempo anterior al rechazo.
translation_notes:
  revision_awareness: La traducción española sigue de cerca el texto hebreo y coincide sustancialmente con la solución auditada en inglés; no hubo revisiones aplicadas en el pasaje de origen, y la equivalencia se mantiene alta.
  spanish_consistency_notes:
  - Se conservó «Yahvé» en la serie general del proyecto cuando aparezca el nombre divino, pero este versículo no lo contiene.
  - Se eligió un registro sobrio y narrativo, sin arcaísmos, manteniendo la secuencia de acciones del hebreo.
  - «Los ancianos» se emplea como término bíblico de rol social, no solo de edad literal.
