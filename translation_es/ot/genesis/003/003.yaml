translation:
  language: es
  text: 'Pero del fruto del árbol que está en medio del jardín[a], Dios dijo: «No comerán de él ni lo tocarán, no sea que mueran».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que está en el interior del jardín».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/מִ/פְּרִי
  english_pob_choice: But from the fruit
  chosen_spanish: Pero del fruto
  alternatives_spanish:
  - Y del fruto
  - Mas del fruto
  lexicon: HALOT
  rationale: La partícula conjuntiva junto con la preposición expresa continuidad contrastiva respecto del contexto anterior; «Pero» reproduce ese matiz adversativo natural en español. «Del fruto» conserva el valor partitivo de מן sin sobrecargar el ritmo del verso.
- source_word: הָעֵץ
  english_pob_choice: the tree
  chosen_spanish: el árbol
  alternatives_spanish:
  - el madero
  - la madera
  lexicon: HALOT
  rationale: El sustantivo es directo y concreto; «árbol» es la equivalencia normal y clara en español.
- source_word: אֲשֶׁר בְּתוֹךְ הַגָּן
  english_pob_choice: that is in the middle of the garden
  chosen_spanish: que está en medio del jardín
  alternatives_spanish:
  - que está en el centro del jardín
  - que está en medio del huerto
  lexicon: HALOT
  rationale: בְּתוֹךְ indica interioridad o posición central. «En medio» es natural en español y conserva la focalización espacial. «Jardín» sigue el sentido básico de גַּן.
- source_word: אָמַר אֱלֹהִים
  english_pob_choice: God said
  chosen_spanish: Dios dijo
  alternatives_spanish:
  - Dios ha dicho
  lexicon: HALOT
  rationale: El perfecto narrativo se vierte de modo natural con pretérito simple en español. «Dios dijo» mantiene el valor de habla reportada sin añadir aspecto no marcado.
- source_word: לֹא תֹאכְלוּ
  english_pob_choice: You shall not eat
  chosen_spanish: No comerán
  alternatives_spanish:
  - No comeréis
  - No deben comer
  lexicon: HALOT
  rationale: 'La prohibición con imperfecto se expresa de forma fluida y solemne en español con futuro de mandato/prohibición: «No comerán». Mantiene el tono normativo sin sonar arcaico.'
- source_word: מִמֶּנּוּ
  english_pob_choice: from it
  chosen_spanish: de él
  alternatives_spanish:
  - de ello
  - de él mismo
  lexicon: HALOT
  rationale: El pronombre retoma «el fruto» de manera natural en español con concordancia masculina singular. Se conserva la idea de separación/partitivo del hebreo.
- source_word: וְלֹא תִגְּעוּ בוֹ
  english_pob_choice: and you shall not touch it
  chosen_spanish: ni lo tocarán
  alternatives_spanish:
  - y no lo tocarán
  - ni lo tocaréis
  lexicon: HALOT
  rationale: Se conserva la segunda prohibición como cláusula coordinada negativa; «ni lo tocarán» suena más natural en español y mantiene la acumulación de mandatos. El referente sigue siendo el fruto.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - lest
  lexicon: HALOT
  rationale: פֶּן introduce la consecuencia temida o evitada. En español, «para que no» comunica bien el propósito preventivo implícito y resulta idiomático; «no sea que» sería también posible, pero algo más marcado.
- source_word: תְּמֻתוּן
  english_pob_choice: you die
  chosen_spanish: mueran
  alternatives_spanish:
  - mueren
  - perezcan
  lexicon: HALOT
  rationale: Se preserva el resultado letal sin armonizarlo con otros textos. «Mueran» mantiene el sentido del verbo y encaja con la cláusula final de prevención.
theological_decisions:
- issue: La advertencia de Eva añade «ni lo tocarán», una diferencia respecto de la prohibición divina en Génesis 2:17.
  english_pob_reading: Translate Eve's speech as given, without harmonizing it to the earlier command.
  chosen_spanish_reading: Traducir el dicho de Eva tal como está, sin armonizarlo con el mandato previo.
  alternative_spanish_readings:
  - Suavizar u omitir la prohibición añadida para acercarla a Génesis 2:17
  - Reformularla para que coincida exactamente con la orden anterior
  rationale: La traducción debe reflejar el texto de este versículo como habla reportada de Eva, preservando la tensión narrativa y teológica en lugar de resolverla por armonización.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se ha seguido el pasaje fuente hebreo y el audit trail inglés, sin cambios de revisión aplicados; el punto sensible principal es la diferencia entre la prohibición original y la formulación de Eva, que se conserva en español.
  spanish_consistency_notes:
  - Se usó «Dios» para אֱלֹהִים, conforme al criterio base.
  - Se conservó el valor partitivo de מִן con «del/de él».
  - Se mantuvo la secuencia de prohibición y consecuencia sin suavizar la tensión narrativa.
  - La nota alternativa sobre «en medio del jardín» refleja la misma ambigüedad léxica documentada en el inglés, adaptada a español.
