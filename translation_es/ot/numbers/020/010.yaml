review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del hebreo: Moisés y Aarón reúnen al pueblo ante la roca, Moisés habla en singular, el reproche «rebeldes» está bien conservado, y la pregunta mantiene el plural de primera persona «¿sacaremos...?», preservando la tensión teológica documentada. También respeta la alternativa léxica para נוֹצִיא.'
  spanish_quality_summary: 'El español es claro y natural, pero tiene un ajuste importante de fidelidad léxica/estilística: «de la roca[a]» inserta una nota sobre «haremos salir» anclada en «roca», cuando la alternativa corresponde al verbo נוֹצִיא, no al sustantivo «roca». Además, «y él les dijo» suena algo marcado en español; «y les dijo» mantiene bien el singular sin forzar el pronombre. Conviene también hacer que la nota alternativa quede anclada en el verbo interrogativo.'
  glossary_alignment: No hay términos del glosario mayor en conflicto. «Congregación» es aceptable aquí por el historial POB auditado. «Rebeldes», «agua» y el plural de primera persona están bien. No aplica Yahvé/Mesías u otros términos de proyecto en este versículo.
  issues:
  - severity: medium
    issue: La nota al pie está anclada en «roca» pero la alternativa léxica corresponde al verbo «sacaremos».
    rationale: El inglés auditado pone la nota en «rock[a]», pero su contenido («shall we bring forth») realmente comenta נוֹצִיא. En español, mantenerla sobre «roca» crea desalineación entre anclaje y variante. Debe marcarse en el verbo o en la pregunta verbal.
  - severity: low
    issue: «Y él les dijo» suena innecesariamente enfático en español.
    rationale: El hebreo singular ya puede reflejarse con «y les dijo» sin perder referencia a Moisés. El pronombre explícito no es incorrecto, pero en español resulta menos natural y algo pesado.
  revised_spanish_text: 'Entonces Moisés y Aarón reunieron a la congregación delante de la roca, y les dijo: «Escuchen ahora, rebeldes: ¿sacaremos[a] agua para ustedes de esta roca?»'
  revised_footnotes:
  - marker: a
    text: O «¿haremos salir agua para ustedes de esta roca?»
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que corresponda al verbo נוֹצִיא, que es donde está la verdadera alternativa léxica documentada («bring out / bring forth»). También se mejora la naturalidad del español al omitir el pronombre explícito «él», sin perder la referencia singular del hebreo.
