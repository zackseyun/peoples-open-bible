base_translation:
  language: en
  yaml_path: translation/deuterocanon/wisdom_of_solomon/012/012.yaml
  text: For who will say[b][a], “What have you done?” Or who will oppose your judgment? And who will bring a charge against you concerning the nations that you destroyed? Or who will come before you as an avenger against unrighteous men?
  footnotes:
  - marker: a
    text: Or “who will come forward to oppose you as an avenger against unjust people?” The Greek expression behind “come before you” is difficult and may carry a more explicitly adversarial or legal sense.
    reason: lexical_alternative
  - marker: b
    text: Literally, “concerning nations having perished, which you made/did.” In context, the sense is that these are nations God brought to ruin, so the translation renders the implied force rather than the bare verb “made.”
    reason: lexical_alternative
