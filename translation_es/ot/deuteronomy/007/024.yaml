revisions:
- from: Y él pondrá sus reyes en tu mano[a], y harás perecer su nombre de debajo del cielo. Ningún hombre se mantendrá delante de ti hasta que los hayas destruido.
  to: Y él entregará sus reyes en tu mano, y harás perecer su nombre de debajo del cielo. Ningún hombre[a] se mantendrá delante de ti hasta que los hayas destruido.
  rationale: Se corrige «pondrá» a «entregará» para reflejar mejor וְנָתַן en este contexto de entrega al poder de otro, manteniendo la imagen «en tu mano». También se mueve la nota [a] a «Ningún hombre», que es el lugar donde realmente aplica la explicación sobre אִישׁ.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:33:33Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del hebreo: promesa futura, entrega de los reyes al poder de Israel, borrado de su nombre, y derrota total de la resistencia enemiga. Sin embargo, «pondrá sus reyes en tu mano[a]» es menos fiel que «entregará sus reyes en tu mano» o «dará sus reyes en tu mano», porque el sujeto y objeto piden el verbo de entrega, no simplemente de colocación. Además, la nota [a] está anclada en la frase equivocada: la alternativa inclusiva corresponde a «Ningún hombre», no a «tu mano».'
  spanish_quality_summary: 'El español es mayormente claro y digno, pero hay dos problemas de legibilidad/fidelidad: 1) «pondrá sus reyes en tu mano» suena algo rígido y menos idiomático que «entregará ... en tu mano»; 2) la colocación de la nota [a] en «tu mano» confunde al lector porque la nota trata sobre «Ningún hombre». El resto del versículo lee bien. «Delante de ti» es aceptable, aunque «ante ti» también sería natural; no requiere cambio.'
  glossary_alignment: No hay términos del glosario principal en disputa aquí. La decisión de conservar «hombre» para אִישׁ concuerda con la política auditada, siempre que la nota inclusiva se ancle correctamente en esa expresión. «Harás perecer su nombre» preserva bien la fuerza causativa de וְהַאֲבַדְתָּ con שֵׁם como objeto.
  issues:
  - severity: medium
    issue: Verbo principal «pondrá» para וְנָתַן
    rationale: Aunque intenta conservar la imagen de «mano», «poner» debilita el matiz estándar de entrega al poder de otro. El hebreo y la auditoría inglesa favorecen «dar/entregar».
  - severity: medium
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota explica אִישׁ (‘hombre’) en «Ningún hombre», pero el marcador aparece tras «tu mano», lo cual rompe la correspondencia exigida entre texto y nota.
  revised_spanish_text: Y él entregará sus reyes en tu mano, y harás perecer su nombre de debajo del cielo. Ningún hombre[a] se mantendrá delante de ti hasta que los hayas destruido.
  revised_footnotes:
  - marker: a
    text: O, en sentido inclusivo, «Nadie se mantendrá delante de ti». El hebreo usa אִישׁ, «hombre», en sentido representativo singular.
    reason: lexical_alternative
  revision_rationale: Se corrige «pondrá» a «entregará» para reflejar mejor וְנָתַן en este contexto de entrega al poder de otro, manteniendo la imagen «en tu mano». También se mueve la nota [a] a «Ningún hombre», que es el lugar donde realmente aplica la explicación sobre אִישׁ.
