translation:
  language: es
  text: ¡Tiemblen, mujeres complacientes; estremézcanse, confiadas! Desnúdense; queden al descubierto[c][b], y cíñanse de cilicio alrededor de la cintura[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «alrededor de los lomos».
    reason: lexical_alternative
  - marker: b
    text: El hebreo no menciona explícitamente «cilicio» en este versículo, pero el mandato de ceñir algo alrededor de la cintura en este contexto profético de duelo suele entenderse así.
    reason: cultural_note
  - marker: c
    text: 'O: «Desnúdense por completo y queden desnudas».'
    reason: alternative_reading
lexical_decisions:
- source_word: חִרְדוּ
  english_pob_choice: Tremble
  chosen_spanish: ¡Tiemblen!
  alternatives_spanish:
  - Estremézcanse
  - Tengan temor
  lexicon: HALOT
  rationale: Imperativo plural de חרד, con valor de estremecerse por temor. «Tiemblen» es la opción más directa y natural en español, manteniendo el tono de advertencia profética.
- source_word: שַׁאֲנַנּוֹת
  english_pob_choice: you complacent women
  chosen_spanish: mujeres complacientes
  alternatives_spanish:
  - mujeres tranquilas
  - mujeres confiadas en su calma
  lexicon: HALOT
  rationale: El adjetivo femenino plural describe a mujeres en calma o autosatisfechas. «Complacientes» conserva el matiz de censura profética mejor que una expresión más suave como «tranquilas».
- source_word: רְגָזָה
  english_pob_choice: shudder
  chosen_spanish: estremézcanse
  alternatives_spanish:
  - estremécense
  - agítense
  lexicon: HALOT
  rationale: Imperativo femenino plural de רגז, con idea de agitación o sacudida. Para evitar repetir exactamente «tiemblen», «estremézcanse» refleja el paralelismo y el matiz de sobresalto.
- source_word: בֹּטְחוֹת
  english_pob_choice: you confident ones
  chosen_spanish: confiadas
  alternatives_spanish:
  - seguras
  - seguras de sí
  lexicon: HALOT
  rationale: Participio femenino plural sustantivado de בטח. «Confiadas» preserva la fuerza descriptiva e irónica del llamado, más que una formulación explicativa.
- source_word: פְּשֹׁטָה
  english_pob_choice: Strip yourselves bare
  chosen_spanish: Desnúdense
  alternatives_spanish:
  - Quítense la ropa
  - Arrójense las vestiduras
  lexicon: HALOT
  rationale: Imperativo femenino plural de פשט en un contexto de despojarse de la ropa. «Desnúdense» es breve, idiomático y suficientemente fuerte para el paralelismo profético.
- source_word: וְעֹרָה
  english_pob_choice: and make yourselves naked
  chosen_spanish: queden al descubierto
  alternatives_spanish:
  - queden desnudas
  - desnúdense
  lexicon: HALOT
  rationale: El segundo imperativo intensifica la exposición. «Queden al descubierto» evita una repetición excesiva de «desnúdense» y conserva el sentido de quedar expuestas.
- source_word: וַחֲגֹרָה
  english_pob_choice: and tie sackcloth
  chosen_spanish: cíñanse cilicio
  alternatives_spanish:
  - átese saco
  - pónganse cilicio
  lexicon: HALOT
  rationale: El verbo חגר significa ceñir o atar alrededor de la cintura. Dado el contexto de duelo profético, «cilicio» explicita el objeto implícito en el verso, siguiendo la nota del POB inglés sobre la convención contextual.
- source_word: עַל חֲלָצָיִם
  english_pob_choice: around your waist
  chosen_spanish: alrededor de la cintura
  alternatives_spanish:
  - alrededor de los lomos
  - en la cintura
  lexicon: HALOT
  rationale: Literalmente «sobre los lomos/cintura». «Alrededor de la cintura» es claro y digno en español moderno, mientras que «lomos» sería más literal pero menos natural.
theological_decisions:
- issue: Supplied mourning garment implied by context
  english_pob_reading: The Hebrew does not explicitly state 'sackcloth' in this verse, but the command to gird something around the waist in this prophetic mourning context is commonly understood as sackcloth.
  chosen_spanish_reading: «cilicio» en el texto principal, con la acción de ceñírselo a la cintura.
  alternative_spanish_readings:
  - 'mantener una forma genérica: «cíñanse algo alrededor de la cintura»'
  - usar una nota para explicar que el elemento está implícito
  rationale: El español necesita un referente concreto para que el mandato suene natural y para reflejar el contexto de duelo. «Cilicio» conserva la lectura tradicional-comprensible y sigue la decisión auditada del POB inglés de suplir el objeto implícito por contexto.
  doctrine_reference: Ninguna; decisión de contexto léxico-litúrgico.
translation_notes:
  revision_awareness: Se siguió la revisión inglesa reciente que simplifica la secuencia a imperativos breves y evita redundancia innecesaria. La versión española conserva ese ritmo conciso, pero mantiene la intensidad retórica y la imagen corporal completa del hebreo.
  spanish_consistency_notes:
  - Se emplea «Yahvé» para el nombre divino cuando aparezca en el contexto inmediato, de acuerdo con la política del proyecto.
  - «Cilicio» se usa aquí por la convención de duelo profético; no se trata de una equivalencia automática para cualquier caso de חגר.
  - Se preserva la feminidad plural del destinatario con formas como «mujeres», «complacientes» y verbos en plural femenino.
  - 'No se neutraliza el matiz de reprensión: el verso mantiene el tono de juicio profético y exposición pública.'
