review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del hebreo: transformación divina del habla de los pueblos, invocación del nombre de Yahvé y servicio unido. También acierta al usar ''Yahvé''. Sin embargo, dos elecciones debilitan la fidelidad funcional al sentido auditado: ''cambiaré a los pueblos un lenguaje puro'' suena gramaticalmente forzado en español y no expresa bien la construcción hebrea de transformación del habla; y ''con un solo hombro'' preserva la imagen literal pero resulta demasiado opaco en el texto principal español, donde el sentido idiomático de unidad debe comunicarse mejor, dejando la literalidad en nota.'
  spanish_quality_summary: 'La redacción es digna y mayormente natural, pero contiene dos puntos de poca legibilidad: ''cambiaré a los pueblos un lenguaje puro'' no suena idiomático; ''con un solo hombro'' es comprensible solo con ayuda de nota y entorpece la lectura pública. Una mejora mínima puede conservar la tensión exegética y la información de las notas sin sacrificar naturalidad.'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → ''Yahvé''; עמים → ''pueblos''; קרא בשם → ''invoquen el nombre de''; עבד → ''sirvan''. Conviene ajustar שׂפה ברורה a ''habla pura'' en vez de ''lenguaje puro'' para reflejar mejor el valor metonímico de שׂפה y el énfasis en el habla/invocación. Para שכם אחד, el español principal debe preferir una expresión idiomática como ''de común acuerdo'' o equivalente, conservando ''con un solo hombro'' en nota.'
  issues:
  - severity: medium
    issue: Construcción española poco natural en 'cambiaré a los pueblos un lenguaje puro'
    rationale: Aunque intenta seguir la literalidad hebrea, en español suena forzado y ambiguo. Una formulación como 'les daré a los pueblos un habla pura' o 'cambiaré el habla de los pueblos a un habla pura' comunica mejor la acción divina sin perder el sentido.
  - severity: medium
    issue: '''con un solo hombro'' es demasiado opaco en el texto principal'
    rationale: La imagen literal hebrea es valiosa, pero en español moderno no comunica con claridad el sentido idiomático de servicio unido. El proyecto permite preservar la alternativa significativa en nota; por ello conviene usar una expresión principal más inteligible.
  - severity: low
    issue: '''lenguaje'' puede sugerir sistema lingüístico más que habla/invocación'
    rationale: Dado el contexto inmediato de 'invocar el nombre de Yahvé', 'habla' o 'forma de hablar' se ajusta mejor a שׂפה y al razonamiento lexical documentado, sin cerrar la alternativa 'lengua' en nota.
  revised_spanish_text: Porque entonces les daré a los pueblos un habla pura[a], para que todos ellos invoquen el nombre de Yahvé[b] y le sirvan de común acuerdo[c].
