    reason: lexical_alternative
  - marker: c
    text: 'Hebreo: ‘dedíquenla a la destrucción’, término asociado con poner algo bajo el anatema para destrucción total.'
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo correspondiente a סָלּוּהָ para reflejar fielmente el hebreo ‘amontonar/apilar’ y la traducción inglesa auditada ‘pile her up’. El resto del verso puede mantenerse, pues comunica bien el sentido militar y judicial del original en un español claro y eclesialmente legible.
