translation:
  language: es
  text: El deseo del perezoso lo hace morir[a], porque sus manos rehúsan trabajar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El deseo del perezoso lo mata».'
    reason: alternative_rendering
lexical_decisions:
- source_word: תַּאֲוַת
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - ansia
  - apetito
  - craving
  lexicon: HALOT
  rationale: El sustantivo puede expresar deseo, ansia o apetito. Siguiendo la revisión inglesa que prefirió una forma más estándar y neutral, «deseo» conserva la amplitud semántica sin intensificar indebidamente el tono.
- source_word: עָצֵל
  english_pob_choice: lazy man
  chosen_spanish: el perezoso
  alternatives_spanish:
  - el hombre perezoso
  - el holgazán
  - el flojo
  lexicon: HALOT
  rationale: El hebreo presenta una figura masculina singular proverbial. «El perezoso» comunica bien ese tipo humano en español y evita una formulación demasiado pesada.
- source_word: תְּמִיתֶנּוּ
  english_pob_choice: puts him to death
  chosen_spanish: lo mata
  alternatives_spanish:
  - lo hace morir
  - lo pone a muerte
  - lo quita de vida
  lexicon: HALOT
  rationale: La forma causativa expresa causar la muerte. En español, «lo mata» es natural y fiel al resultado mortal, aunque «lo hace morir» preservaría más explícitamente la causatividad.
- source_word: כִּי
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la razón de la primera cláusula. «Porque» es la correspondencia más clara y directa en español actual.
- source_word: מֵאֲנוּ
  english_pob_choice: refuse
  chosen_spanish: rehúsan
  alternatives_spanish:
  - se niegan
  - rechazan
  - se resisten a
  lexicon: HALOT
  rationale: El verbo denota negativa o rechazo. «Rehúsan» mantiene el valor de voluntad negativa en un registro sobrio y conciso.
- source_word: יָדָיו
  english_pob_choice: his hands
  chosen_spanish: sus manos
  alternatives_spanish:
  - su mano
  - sus brazos
  lexicon: HALOT
  rationale: La forma dual/plural se refiere concretamente a las manos como instrumento de trabajo. «Sus manos» preserva la imagen corporal y funcional del hebreo.
- source_word: לַעֲשׂוֹת
  english_pob_choice: to work
  chosen_spanish: trabajar
  alternatives_spanish:
  - hacer
  - obrar
  - realizar labor
  lexicon: HALOT
  rationale: Aunque el verbo base es amplio («hacer»), en este contexto con las manos que se niegan cobra sentido de labor productiva. «Trabajar» expresa de forma natural la idea sin oscurecer la imagen.
translation_notes:
  revision_awareness: El texto inglés de referencia pasó de «craving» a «desire» para reflejar una opción más estándar y neutral. La traducción española sigue esa revisión y mantiene el resto de las decisiones auditadas, sin introducir una paráfrasis adicional.
  spanish_consistency_notes:
  - Se conservó el sujeto proverbial singular masculino como «el perezoso», en línea con el hebreo y con el inglés auditado.
  - Se mantuvo la estructura causal simple «porque», equivalente al כִּי explicativo.
  - La nota alternativa se limita a una variante semántica mínima, sin duplicar la lectura principal.
