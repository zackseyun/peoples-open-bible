translation:
  language: es
  text: Mira[a] cuando se sientan y cuando se levantan; yo soy su canción[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su sentarse y su levantarse'. El hebreo usa este par para abarcar toda su actividad o conducta cotidiana.
    reason: alternative_reading
  - marker: b
    text: O 'su canto burlón' / 'su canción de burla'. El término hebreo puede significar 'canción' o 'música', y en este contexto probablemente se refiere a lo que cantan acerca del hablante.
    reason: lexical_alternative
lexical_decisions:
- source_word: שִׁבְתָּם
  english_pob_choice: their sitting down
  chosen_spanish: su sentarse
  alternatives_spanish:
  - su sentarse
  - su estar sentados
  - su sentarse en reposo
  lexicon: HALOT
  rationale: Conserva el sustantivo verbal hebreo y la idea concreta de la postura/acción de sentarse. En español, 'su sentarse' reproduce con fidelidad la forma nominal sin añadir el matiz interpretativo de 'morada' o 'vivir'.
- source_word: וְקִימָתָם
  english_pob_choice: and their rising up
  chosen_spanish: y su levantarse
  alternatives_spanish:
  - y su ponerse de pie
  - y su alzarse
  - y su levantarse
  lexicon: HALOT
  rationale: Mantiene el paralelo con 'sentarse' y el valor de movimiento o acción cotidiana del verbo קום. 'Levantarse' es natural en español y conserva el contraste merístico del hebreo.
- source_word: הַבִּיטָה
  english_pob_choice: Look at
  chosen_spanish: Mira
  alternatives_spanish:
  - Mira
  - Mira hacia
  - Observa
  lexicon: HALOT
  rationale: Imperativo directo dirigido a Dios en el contexto. 'Mira' es breve, natural y suficientemente fiel al tono urgente del ruego.
- source_word: אֲנִי
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo
  - yo mismo
  lexicon: HALOT
  rationale: 'Se conserva el pronombre explícito para reflejar el énfasis del hebreo: el hablante pone su propia persona en primer plano.'
- source_word: מַנְגִּינָתָם
  english_pob_choice: their song
  chosen_spanish: su canción
  alternatives_spanish:
  - su canción
  - su canto
  - su canto burlón
  - su canción de burla
  lexicon: HALOT
  rationale: La palabra hebrea puede significar 'canción' o 'música'; en este contexto lamentativo, el inglés POB optó por una traducción directa en el texto principal y dejó abierta la posibilidad de burla en nota. En español, 'canción' conserva la literalidad sin cerrar la ambigüedad contextual.
theological_decisions:
- issue: Destino de la súplica implícita en el imperativo
  english_pob_reading: Look at their sitting down and their rising up; I am their song.
  chosen_spanish_reading: Mira su sentarse y su levantarse; yo soy su canción.
  alternative_spanish_readings:
  - Mira su sentarse y su levantarse; yo soy su canto.
  - Mira su sentarse y su levantarse; yo soy su canción de burla.
  rationale: El verso presenta un ruego directo a Yahvé para que atienda la totalidad de la conducta de los adversarios. No se introduce en el texto principal la glosa 'de burla' porque el testimonio auditado del inglés POB la reserva como posibilidad léxica, no como certeza obligatoria.
  doctrine_reference: Lamentaciones 3:63; coherencia con la lamentación de un justo oprimido ante Dios.
translation_notes:
  revision_awareness: El inglés POB pasó de 'the subject of their song' a 'their song' para reflejar más directamente el hebreo. La redacción española sigue esa decisión y mantiene una base literal, dejando la posible connotación despectiva en nota.
  spanish_consistency_notes:
  - Se usa 'Mira' en lugar de 'Mira hacia' o 'Observa' para conservar el imperativo breve del hebreo.
  - Se mantiene 'su canción' en el texto principal porque el audit trail inglés decidió no explicitar 'mocking' en la línea principal.
  - La construcción nominal 'su sentarse / su levantarse' procura reproducir la concisión hebrea sin volverla demasiado idiomática ni interpretativa.
