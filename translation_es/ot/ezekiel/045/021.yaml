  text: In the first month[a], on the fourteenth day of the month, you shall have the Passover, a feast of seven days[b]; unleavened bread shall be eaten.
  footnotes:
  - marker: a
    text: Hebrew literally, 'the Passover, a feast of seven days.' Elsewhere the Passover and the Feast of Unleavened Bread can be distinguished, but here the text presents them together.
    reason: alternative_reading
  - marker: b
    text: Or 'for seven days.' The Hebrew expression is literally 'weeks of days,' an idiom here meaning a seven-day period.
