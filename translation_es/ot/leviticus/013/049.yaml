base_translation:
  language: en
  yaml_path: translation/ot/leviticus/013/049.yaml
  text: And if the spot is greenish or reddish in the garment[a], or in the leather, or in the warp or in the woof, or in any article of leather, it is a diseased spot of skin disease[b], and it shall be shown to the priest.
  footnotes:
  - marker: a
    text: Or 'weft' for 'woof,' the crosswise threads in woven fabric.
    reason: lexical_alternative
  - marker: b
    text: Traditionally 'a spot of leprosy.' The Hebrew term refers more broadly to a ritual-physical disease category in Leviticus, not specifically to modern leprosy.
    reason: alternative_reading
