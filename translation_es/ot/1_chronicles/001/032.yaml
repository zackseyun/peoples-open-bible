translation:
  language: es
  text: 'Y los hijos de Quetura[a], concubina de Abraham: engendró a Zimrán, Jocsán, Medán, Madián, Isbac y Suaj. Y los hijos de Jocsán: Seba y Dedán.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Génesis 25:1 llama a Quetura esposa de Abraham; aquí el Cronista la llama específicamente su concubina.
    reason: cross_reference
lexical_decisions:
- source_word: וּבְנֵי
  english_pob_choice: And the sons of
  chosen_spanish: Y los hijos de
  alternatives_spanish:
  - Ahora los hijos de
  - Los hijos de
  lexicon: HALOT
  rationale: La expresión genealógica en hebreo se conserva de forma natural en español con «los hijos de», manteniendo el tono enumerativo y la secuencia formal de Crónicas.
- source_word: קְטוּרָה
  english_pob_choice: Keturah
  chosen_spanish: Quetura
  alternatives_spanish:
  - Keturah
  lexicon: HALOT
  rationale: Se translitera el nombre propio a una forma española transparente y bíblica; «Quetura» evita la grafía inglesa sin alterar la identificación.
- source_word: פִּילֶגֶשׁ
  english_pob_choice: concubine
  chosen_spanish: concubina
  alternatives_spanish:
  - esposa secundaria
  lexicon: HALOT
  rationale: El término hebreo señala una unión reconocida, pero de estatus inferior al de esposa principal. «Concubina» comunica esa fuerza léxica sin suavizarla.
- source_word: יָלְדָה
  english_pob_choice: she bore
  chosen_spanish: dio a luz a
  alternatives_spanish:
  - engendró a
  - parió a
  lexicon: HALOT
  rationale: En una lista genealógica, «dio a luz a» mantiene el valor de dar nacimiento con claridad idiomática en español y preserva el sujeto femenino implícito.
- source_word: זִמְרָן
  english_pob_choice: Zimran
  chosen_spanish: Zimrán
  alternatives_spanish:
  - Zimran
  lexicon: HALOT
  rationale: Nombre propio transliterado según uso bíblico en español, con acento gráfico para la pronunciación natural.
- source_word: יָקְשָׁן
  english_pob_choice: Jokshan
  chosen_spanish: Jocsán
  alternatives_spanish:
  - Yocsán
  - Jokshan
  lexicon: HALOT
  rationale: Se adapta al patrón de transliteración bíblica en español; la grafía con «J» y acento final refleja una lectura hispana natural del nombre.
- source_word: מְדָן
  english_pob_choice: Medan
  chosen_spanish: Medán
  alternatives_spanish:
  - Medan
  lexicon: HALOT
  rationale: Nombre propio transliterado en forma española legible, con acento para orientar la prosodia.
- source_word: מִדְיָן
  english_pob_choice: Midian
  chosen_spanish: Madián
  alternatives_spanish:
  - Madián
  - Madián
  lexicon: HALOT
  rationale: Se prefiere una forma española tradicional y reconocible; conserva la identidad del nombre sin depender de la grafía inglesa.
- source_word: יִשְׁבָּק
  english_pob_choice: Ishbak
  chosen_spanish: Isbac
  alternatives_spanish:
  - Ishbak
  lexicon: HALOT
  rationale: La transliteración se ajusta a un español bíblico fluido, evitando la terminación inglesa y manteniendo el nombre propio distinguible.
- source_word: שׁוּחַ
  english_pob_choice: Shuah
  chosen_spanish: Súa
  alternatives_spanish:
  - Shuá
  - Suah
  lexicon: HALOT
  rationale: Se emplea una forma española breve y pronunciable; el valor nominal se conserva sin forzar una calca de la ortografía inglesa.
- source_word: וּבְנֵי יָקְשָׁן
  english_pob_choice: And the sons of Jokshan
  chosen_spanish: Y los hijos de Jocsán
  alternatives_spanish:
  - Ahora los hijos de Jocsán
  - Los hijos de Jocsán
  lexicon: HALOT
  rationale: Se mantiene la repetición genealógica del hebreo, útil para la estructura del texto y para distinguir el sublinaje de Jocsán.
- source_word: שְׁבָא
  english_pob_choice: Sheba
  chosen_spanish: Seba
  alternatives_spanish:
  - Sheba
  lexicon: HALOT
  rationale: Nombre propio con forma española tradicional; preserva la identidad sin introducir la grafía inglesa.
- source_word: דְדָן
  english_pob_choice: Dedan
  chosen_spanish: Dedán
  alternatives_spanish:
  - Dedan
  lexicon: HALOT
  rationale: Nombre propio transliterado con acento español para lectura natural y consistente con el resto de la lista.
theological_decisions:
- issue: Estatus de Quetura en relación con Abraham
  english_pob_reading: concubine
  chosen_spanish_reading: concubina
  alternative_spanish_readings:
  - esposa
  - esposa secundaria
  rationale: El hebreo פִּילֶגֶשׁ se traduce por su sentido léxico inmediato y no se armoniza con otros pasajes que llaman esposa a Quetura. Así se preserva la tensión textual documentada por el POB en inglés.
  doctrine_reference: Translation philosophy §1, §3
- issue: Mantenimiento del registro genealógico repetitivo
  english_pob_reading: And the sons of ... And the sons of ...
  chosen_spanish_reading: Y los hijos de ... Y los hijos de ...
  alternative_spanish_readings:
  - Ahora los hijos de ...
  - Los hijos de ...
  rationale: Se conserva la forma de lista genealógica del libro de Crónicas, ya que la repetición no es redundante sino estructural y ayuda a separar los dos niveles de descendencia.
  doctrine_reference: Estilo genealógico de Crónicas
translation_notes:
  revision_awareness: Revisado a la luz del audit trail inglés; no hay cambios pendientes documentados en la pasada más reciente, y la concordancia general fue alta. La decisión principal a preservar fue la tensión entre «concubina» en Crónicas y «esposa» en Génesis 25:1, manteniéndola explícita en nota.
  spanish_consistency_notes:
  - Se usó Quetura, no Keturah, para coherencia con una forma española bíblica legible.
  - Se mantuvo la duplicación genealógica «Y los hijos de» para respetar la estructura del hebreo.
  - Los nombres propios se adaptaron a ortografía española cuando existe una forma estable o una transliteración natural; no se introdujeron equivalencias interpretativas adicionales.
