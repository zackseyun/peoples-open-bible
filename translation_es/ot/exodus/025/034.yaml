translation:
  language: es
  text: Y sobre el candelabro habrá cuatro copas con forma de flores de almendro[a], con sus botones[b] y sus flores.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con forma de almendra» o «decoradas con flores de almendro». El hebreo presenta una imagen derivada del almendro y puede destacar la forma o el adorno.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sus nudos» o «sus protuberancias». El término hebreo alude a un rasgo ornamental redondeado del candelabro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּ/בַ/מְּנֹרָה
  english_pob_choice: And on the lampstand
  chosen_spanish: Y en el candelabro
  alternatives_spanish:
  - Y sobre el candelabro
  - Y en la lámpara
  lexicon: HALOT
  rationale: מְנֹרָה designa el candelabro del tabernáculo, no una lámpara individual. En español, 'candelabro' comunica mejor el objeto cultual. La preposición 'en' sigue el uso del lugar o superficie de un objeto elaborado, como en la auditable elección inglesa 'on the lampstand'.
- source_word: אַרְבָּעָה
  english_pob_choice: four
  chosen_spanish: cuatro
  alternatives_spanish:
  - '4'
  lexicon: HALOT
  rationale: Número cardinal directo y sin ambigüedad.
- source_word: גְבִעִים
  english_pob_choice: cups
  chosen_spanish: copas
  alternatives_spanish:
  - cuencos
  - cálices
  lexicon: HALOT
  rationale: El término denota formas redondeadas o cóncavas; 'copas' es natural en español y mantiene la imagen de recipiente ornamental mejor que 'cálices', que puede sonar más litúrgico, o 'cuencos', que suena menos exacto al contexto.
- source_word: מְשֻׁקָּדִים
  english_pob_choice: made like almond blossoms
  chosen_spanish: con forma de flor de almendro
  alternatives_spanish:
  - hechas como flores de almendro
  - decoradas con flores de almendro
  - con forma de almendra
  lexicon: HALOT
  rationale: La forma pasiva/denominativa comunica diseño inspirado en el almendro. 'Con forma de flor de almendro' preserva la imagen botánica sin decidir en exceso entre forma y decoración superficial, en línea con la nota inglesa sobre posible forma u ornamentación.
- source_word: כַּפְתֹּרֶיהָ
  english_pob_choice: its buds
  chosen_spanish: sus botones
  alternatives_spanish:
  - sus nudos
  - sus protuberancias
  - sus knobs
  lexicon: HALOT
  rationale: En este contexto ornamental, 'כפתר' refiere a una pieza redondeada. 'Botones' mantiene la imaginería floral que acompaña a 'flores' y 'flor de almendro', aunque 'nudos' o 'protuberancias' también serían posibles; 'botones' es más legible en español bíblico moderno.
- source_word: וּפְרָחֶיהָ
  english_pob_choice: and its flowers
  chosen_spanish: y sus flores
  alternatives_spanish:
  - y sus floraciones
  - y sus blossoms
  lexicon: HALOT
  rationale: פֶּרַח es 'flor' o 'florecimiento'. 'Flores' es la opción más clara y concordante con la imaginería botánica del versículo.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado y quedó sin cambios; la presente propuesta sigue esa lectura estable, conservando las dos alternativas léxicas principales señaladas por el aparato crítico-auditivo inglés (la imagen del almendro y el valor ornamental de כפתר).
  spanish_consistency_notes:
  - Se usa 'candelabro' para מְנֹרָה, coherente con el objeto del tabernáculo y con la terminología bíblica española moderna.
  - Se evita 'SEÑOR' u otro equivalente porque no hay hereísmo del nombre divino en este versículo.
  - '''Copas'' mantiene el paralelo con la imaginería de flores y botones, sin forzar un tecnicismo arquitectónico.'
  - Las notas conservan la tensión léxica entre forma y ornamentación que el inglés también preserva.
