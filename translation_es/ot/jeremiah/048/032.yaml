  text: מִ/בְּכִ֨י יַעְזֵ֤ר אֶבְכֶּה לָּ/ךְ֙ הַ/גֶּ֣פֶן שִׂבְמָ֔ה נְטִֽישֹׁתַ֨יִ/ךְ֙ עָ֣בְרוּ יָ֔ם עַ֛ד יָ֥ם יַעְזֵ֖ר נָגָ֑עוּ עַל קֵיצֵ֥/ךְ וְ/עַל בְּצִירֵ֖/ךְ שֹׁדֵ֥ד נָפָֽל־־־׃
base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/048/032.yaml
  text: With the weeping of Jazer I weep for you[a], vine of Sibmah; your branches crossed the sea; they reached as far as Jazer[c][b]. Upon your summer fruit and upon your grape harvest the destroyer has fallen.
  footnotes:
  - marker: a
    text: Or 'More than the weeping of Jazer I weep for you'; the opening preposition may carry a comparative nuance.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'your shoots' or 'your tendrils.'
    reason: lexical_alternative
  - marker: c
    text: The Hebrew reads 'they reached as far as the sea of Jazer.' Because Jazer was inland, some understand this as poetic hyperbole, while others propose a textual adjustment such as 'they reached as far as Jazer.'
    reason: textual_variant
