translation:
  language: es
  text: Entonces el ángel de Yahvé se paró en un sendero estrecho entre las viñas, con un muro de un lado y un muro del otro lado.
  philosophy: optimal-equivalence
  footnotes: []
lexical_decisions:
- source_word: וַיַּעֲמֹד
  english_pob_choice: Then ... stood
  chosen_spanish: Entonces ... se puso
  alternatives_spanish:
  - entonces ... estuvo de pie
  - entonces ... se detuvo
  - entonces ... se plantó
  lexicon: HALOT
  rationale: El verbo expresa que el mensajero adopta una posición fija en el camino. En español, «se puso» comunica con naturalidad ese acto de colocarse/ponerse en un lugar, conservando el avance narrativo de la forma wayyiqtol.
- source_word: מַלְאַךְ יְהוָה
  english_pob_choice: the angel of Yahweh
  chosen_spanish: el ángel de Yahvé
  alternatives_spanish:
  - el mensajero de Yahvé
  lexicon: HALOT
  rationale: «מַלְאַךְ» puede significar «mensajero» o «ángel». En este contexto narrativo se trata claramente de un ser sobrenatural, por lo que «ángel» es la mejor opción. Se conserva «Yahvé» como nombre divino, según el criterio doctrinal del proyecto.
- source_word: בְּמִשְׁעוֹל
  english_pob_choice: in a narrow path
  chosen_spanish: en un sendero estrecho
  alternatives_spanish:
  - en un camino estrecho
  - en una vereda estrecha
  - en un sendero angosto
  lexicon: HALOT
  rationale: El sustantivo designa un paso o camino angosto. «Sendero estrecho» comunica bien la idea de un trayecto limitado, sin sobrecargar el texto con una paráfrasis.
- source_word: הַכְּרָמִים
  english_pob_choice: between the vineyards
  chosen_spanish: entre las viñas
  alternatives_spanish:
  - entre los viñedos
  - en medio de las viñas
  - entre los viñedos y las viñas
  lexicon: HALOT
  rationale: Aunque el inglés opta por «vineyards», en español «viñas» funciona de manera más natural y bíblica para el entorno agrícola. La relación espacial «entre» sigue el sentido del hebreo y del audit trail inglés.
- source_word: גָּדֵר
  english_pob_choice: wall
  chosen_spanish: muro
  alternatives_spanish:
  - muro de piedra
  - pared
  - cerco
  - valla
  lexicon: HALOT
  rationale: «גָּדֵר» puede ser muro, cerca o vallado. En el contexto de viñas, «muro» es claro y digno en español sin especificar material, en consonancia con la revisión inglesa que eliminó «stone».
- source_word: מִזֶּה ... וְגָדֵר מִזֶּה
  english_pob_choice: on this side and ... on that side
  chosen_spanish: de un lado y ... del otro lado
  alternatives_spanish:
  - a un lado y ... al otro
  - a este lado y ... al otro lado
  - de este lado y ... de aquel lado
  lexicon: HALOT
  rationale: La construcción demostrativa hebrea marca dos límites laterales. «De un lado y ... del otro lado» refleja bien la simetría sin sonar forzado en español.
theological_decisions:
- issue: Traducción del nombre divino יהוה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo emplea directamente el Tetragrámaton. Siguiendo la política doctrinal del proyecto, se translitera como «Yahvé» para preservar el nombre personal de Dios y no sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Identidad de מַלְאַךְ יְהוָה
  english_pob_reading: the angel of Yahweh
  chosen_spanish_reading: el ángel de Yahvé
  alternative_spanish_readings:
  - el mensajero de Yahvé
  rationale: Aunque «mensajero» es una posibilidad léxica, el contexto narrativo presenta una figura sobrenatural, por lo que «ángel» comunica mejor la lectura adoptada por el texto base en inglés.
  doctrine_reference: HALOT; contexto narrativo de Números 22
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que eliminó «stone» de ambos «wall», porque el hebreo dice simplemente גָּדֵר («muro/cerco») sin especificar material. La redacción española evita también añadir ese detalle. Se respetó además la decisión auditada de leer מַלְאַךְ como ser sobrenatural y de traducir el Nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en lugar de «SEÑOR» para conservar el nombre divino según el estándar del proyecto.
  - Se eligió «muro» para גָּדֵר por claridad y por no introducir material no explícito en el hebreo.
  - «Entre las viñas» se ajusta al plural hebreo y suena natural en español bíblico contemporáneo.
