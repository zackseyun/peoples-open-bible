translation:
  language: es
  text: 'Pero Edom le dijo: «No pasarás por mí[a], no sea que salga con la espada para hacerte frente[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «por mí». Como Edom habla como nación/territorio, la expresión significa pasar por su tierra.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «para encontrarte»; aquí el contexto militar hace que el sentido sea de enfrentamiento hostil.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  lexicon: HALOT
  rationale: El wayyiqtol narrativo de אמר se vierte naturalmente con «dijo» en español, especialmente en discurso directo.
- source_word: אֵלָיו
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: HALOT
  rationale: El dativo de dirección del habla se expresa de forma natural con el pronombre átono «le»; el referente sigue siendo el mensajero/Moisés por el contexto.
- source_word: אֱדוֹם
  english_pob_choice: Edom
  chosen_spanish: Edom
  lexicon: HALOT
  rationale: Nombre propio de la nación/territorio; se conserva transliterado.
- source_word: לֹא תַעֲבֹר
  english_pob_choice: You shall not pass
  chosen_spanish: No pasarás
  alternatives_spanish:
  - No pasarás por aquí
  - No debes pasar
  lexicon: HALOT
  rationale: El imperfecto prohibitivo conserva fuerza declarativa de rechazo. «No pasarás» es directo y fiel sin sonar excesivamente arcaico.
- source_word: בִּי
  english_pob_choice: through me
  chosen_spanish: por mí
  alternatives_spanish:
  - por mi tierra
  - a través de mí
  lexicon: HALOT
  rationale: Literalmente es «en mí/por mí», pero en boca de una nación personificada el sentido es tránsito por su territorio; «por mí» preserva esa personificación sin perder claridad.
- source_word: פֶּן
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - o si no
  lexicon: HALOT
  rationale: Introduce una consecuencia temida o evitada; «no sea que» reproduce bien el valor preventivo del hebreo en español actual.
- source_word: בַּחֶרֶב
  english_pob_choice: with the sword
  chosen_spanish: con la espada
  alternatives_spanish:
  - por la espada
  - armado con la espada
  lexicon: HALOT
  rationale: La metáfora hebrea de acción hostil armada se expresa de modo natural en español con «con la espada».
- source_word: אֵצֵא
  english_pob_choice: I come out
  chosen_spanish: salga
  alternatives_spanish:
  - saldré
  - salga yo
  lexicon: HALOT
  rationale: En la construcción con «no sea que», el valor de futuro/contingencia se refleja bien con subjuntivo en español. Se mantiene la imagen de salida.
- source_word: לִקְרָאתֶךָ
  english_pob_choice: against you
  chosen_spanish: para hacerte frente
  alternatives_spanish:
  - a encontrarte
  - contra ti
  lexicon: HALOT
  rationale: Literalmente es «para encontrarte», pero en contexto bélico implica enfrentamiento hostil. «Para hacerte frente» comunica esa tensión sin perder el matiz de encuentro.
translation_notes:
  revision_awareness: Se siguió el paquete fuente original en hebreo y el audit trail inglés. La redacción española conserva la personificación de Edom, el valor prohibitivo de לֹא תַעֲבֹר y la amenaza implícita de לִקְרָאתֶךָ sin sobreexplicar el texto. No se aplicaron revisiones previas relevantes.
  spanish_consistency_notes:
  - Se mantuvo «Edom» como nombre propio territorial/nacional, coherente con el tratamiento del audit trail inglés.
  - Se eligió «espada» para בַּחֶרֶב por claridad moderna en español; no se usó «sable» ni «armas» porque el singular con artículo es el equivalente más directo.
  - Se evitó «SEÑOR» u otras sustituciones teológicas porque el versículo no contiene el nombre divino.
  - La puntuación de diálogo sigue el uso editorial español, con comillas angulares y comas según la sintaxis del discurso directo.
