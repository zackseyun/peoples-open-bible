  glossary_alignment: 'No hay términos del glosario mayor en juego. Se respetan bien las decisiones léxicas del POB: חַיָּתוֹ = ''su vida'', נַפְשׁוֹ = ''su alma'', לָחֶם = ''pan''. La nota sobre נַפְשׁוֹ se preserva adecuadamente. La nota sobre תַּאֲוָה se puede mantener, pero el texto principal mejora con ''apetecible'' como opción española más natural para comida.'
