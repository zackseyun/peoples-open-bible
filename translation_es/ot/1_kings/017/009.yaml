review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el hebreo y el rastro de auditoría inglés: mantiene los dos imperativos iniciales, la relación de Sarepta con Sidón como pertenencia/asociación, la orden de quedarse allí, y conserva correctamente la tensión teológica de צִוִּיתִי como «he mandado». El sentido global está bien preservado.'
  spanish_quality_summary: 'El texto es claro y natural en español. Sin embargo, la nota [a] no corresponde al uso del marcador en el texto: el anclaje está en «Levántate», pero la nota habla de alternativas que incluyen también el segundo imperativo. Además, la nota [b] omite la alternativa principal documentada por el POB inglés («he nombrado/designado» o equivalente a ‘appointed’) y ofrece «he preparado», que no coincide tan bien con la justificación auditada. Conviene ajustar ambas notas para alinearlas con la evidencia y evitar desajuste entre anclaje y contenido.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El uso de «Sarepta» para צָרְפַת está justificado como forma española tradicional. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: La nota [a] no corresponde con precisión al segmento anclado.
    rationale: El marcador [a] está colocado en «Levántate», pero la nota explica los dos imperativos encadenados e incluye «sal» y «ponte en camino», que pertenecen más al mandato total o al segundo verbo לֵךְ que a קוּם solo. Debe limitarse a alternativas para קוּם o reanclarse; la reparación más simple es ajustar la nota.
  - severity: medium
    issue: La nota [b] no refleja de forma suficientemente fiel las alternativas documentadas en el POB inglés para צִוִּיתִי.
    rationale: La auditoría inglesa preserva «I have commanded» y da como alternativas «I have appointed» e «I have instructed». La nota española ofrece «he dispuesto» y «he preparado», siendo «he preparado» una suavización menos apoyada por el rastro lexical/theológico. Debe alinearse mejor con «he nombrado/designado» o «he instruido».
  revised_spanish_text: Levántate[a], ve a Sarepta, que pertenece a Sidón, y quédate allí. Mira[b], he mandado allí a una viuda para que te provea.
  revised_footnotes:
  - marker: a
    text: O «Ponte de pie» o «Álzate». El hebreo dice literalmente «Levántate».
    reason: lexical_alternative
  - marker: b
    text: O «He designado a una viuda allí para sustentarte» o «He instruido a una viuda allí para que te provea». El hebreo dice «he mandado», lo que puede describir la dirección soberana de Dios aunque la viuda todavía no aparezca como consciente de ese mandato.
    reason: alternative_reading
  revision_rationale: La traducción principal puede mantenerse, pero las notas necesitan corrección para que el anclaje y las alternativas reflejen con precisión la evidencia fuente y la auditoría inglesa. Se conservaron el texto base y la tensión teológica de «he mandado».
