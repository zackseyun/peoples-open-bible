translation:
  language: es
  text: Porque la esperanza del impío es como la borra llevada por el viento, y como la escarcha fina arrastrada por la tormenta, y como el humo dispersado por el viento, y pasa como el recuerdo de un huésped de un día[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como el recuerdo de un viajero que se quedó solo un día». El griego καταλύτου se refiere a alguien que se aloja temporalmente, y μνεία puede significar «recuerdo» o «mención».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐλπὶς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  lexicon: LSJ
  rationale: ‘Esperanza’ es el equivalente natural en español y conserva el contraste moral del pasaje, que habla de algo que no permanece.
- source_word: ἀσεβοῦς
  english_pob_choice: of the ungodly
  chosen_spanish: del impío
  alternatives_spanish:
  - del impío sin Dios
  - del malvado
  lexicon: LSJ
  rationale: ‘Impío’ conserva la orientación hacia Dios de ἀσεβής mejor que ‘malvado’, que es más general. ‘Del impío’ suena sobrio y bíblico en español.
- source_word: χνοῦς
  english_pob_choice: down
  chosen_spanish: borra
  alternatives_spanish:
  - pelusa
  - plumón
  - polvo
  lexicon: LSJ
  rationale: El término griego designa algo ligero, fino y fácil de llevar por el aire. ‘Borra’ comunica esa ligereza mejor que ‘polvo’, que sugiere otra imagen.
- source_word: φερόμενος
  english_pob_choice: carried
  chosen_spanish: llevada
  alternatives_spanish:
  - arrastrada
  - llevado
  - transportada
  lexicon: LSJ
  rationale: En la imagen del viento, ‘llevada’ expresa de manera idiomática el ser movida sin resistencia. Se ajusta al sustantivo femenino ‘borra’.
- source_word: πάχνη
  english_pob_choice: thin frost
  chosen_spanish: la escarcha fina
  alternatives_spanish:
  - la escarcha delgada
  - la helada fina
  lexicon: LSJ
  rationale: ‘Escarcha’ es el equivalente natural de πάχνη. El adjetivo ‘fina’ preserva la fragilidad indicada por λεπτὴ.
- source_word: λαίλαπος
  english_pob_choice: storm
  chosen_spanish: la tormenta
  alternatives_spanish:
  - el vendaval
  - la tempestad
  lexicon: LSJ
  rationale: ‘Tormenta’ comunica con claridad la fuerza destructora del término sin volverlo arcaico. Conserva bien la fuerza de la imagen.
- source_word: διωχθεῖσα
  english_pob_choice: driven away
  chosen_spanish: empujada
  alternatives_spanish:
  - ahuyentada
  - echada
  lexicon: LSJ
  rationale: El pasivo transmite una acción externa que desplaza la escarcha. ‘Empujada’ mantiene la sencillez de la imagen meteorológica en español.
- source_word: καπνὸς
  english_pob_choice: smoke
  chosen_spanish: el humo
  alternatives_spanish:
  - el humo espeso
  lexicon: LSJ
  rationale: Equivalente directo y claro.
- source_word: διεχύθη
  english_pob_choice: dispersed
  chosen_spanish: dispersado
  alternatives_spanish:
  - esparcido
  - disperso
  lexicon: LSJ
  rationale: ‘Dispersado’ conserva el sentido de separación y dilución producido por el viento, sin añadir un matiz innecesario.
- source_word: μνεία
  english_pob_choice: remembrance
  chosen_spanish: el recuerdo
  alternatives_spanish:
  - la memoria
  - la mención
  lexicon: LSJ
  rationale: En este paralelo, el sentido es la huella mental breve de alguien que estuvo de paso. ‘Recuerdo’ es más natural en español que ‘remembranza’ o ‘mención’.
- source_word: καταλύτου
  english_pob_choice: guest
  chosen_spanish: huésped
  alternatives_spanish:
  - viajero
  - posadero
  - forastero
  lexicon: LSJ
  rationale: El término implica alguien que se aloja temporalmente. ‘Huésped’ conserva mejor esa idea de estancia breve que ‘viajero’.
- source_word: μονοημέρου
  english_pob_choice: one-day
  chosen_spanish: de un día
  alternatives_spanish:
  - de un solo día
  - efímero
  lexicon: LSJ
  rationale: ‘De un día’ refleja literalmente la brevedad del adjetivo compuesto sin introducir una paráfrasis interpretativa.
- source_word: παρῴδευσεν
  english_pob_choice: passes by
  chosen_spanish: pasa
  alternatives_spanish:
  - se va
  - desaparece
  lexicon: LSJ
  rationale: El verbo expresa el hecho de pasar o transitar. ‘Pasa’ mantiene la fluidez del símil y sigue la decisión inglesa de no añadir un sujeto explícito.
theological_decisions:
- issue: ἀσεβοῦς como marcador moral-teológico
  english_pob_reading: ungodly
  chosen_spanish_reading: impío
  alternative_spanish_readings:
  - malvado
  - sin Dios
  rationale: ‘Impío’ preserva el carácter teológico del término, centrado en la relación con Dios, sin rebajarlo a mero fallo ético general. ‘Malvado’ sería más amplio y menos preciso aquí.
  doctrine_reference: Translation philosophy §1, §6
- issue: Imagen de fugacidad total en la serie de símiles
  english_pob_reading: like down carried by the wind ... and passes by like the remembrance of a one-day guest
  chosen_spanish_reading: como la borra llevada por el viento ... y pasa como el recuerdo de un huésped de un día
  alternative_spanish_readings:
  - como la pelusa llevada por el viento
  - como el recuerdo de un viajero que se quedó solo un día
  rationale: Se conserva la progresión de imágenes efímeras sin suavizarla. ‘Huésped de un día’ mantiene la tensión entre estancia real y extrema brevedad, en línea con la nota inglesa sobre καταλύτου y μνεία.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del texto inglés al omitir un sujeto explícito antes de ‘pasa’, para reflejar con mayor proximidad la secuencia griega de símiles y evitar añadir una explicitación no presente en el original. También se mantuvo la nota sobre καταλύτου/μνεία porque en español persiste la misma alternativa de sentido entre ‘huésped’ y ‘viajero’, y entre ‘recuerdo’ y ‘mención’.
  spanish_consistency_notes:
  - Se usó ‘impío’ para ἀσεβοῦς, conforme al valor teológico del término y al uso recomendado del proyecto para vocabulario centrado en Dios.
  - Se prefirió ‘borra’ para χνοῦς por su ligereza imaginativa, evitando ‘paja’ o ‘tamo’, que no corresponden bien al paralelo griego.
  - ‘Escarcha fina’ conserva el matiz de λεπτὴ sin hacer la frase pesada.
  - La cadena de símiles se mantuvo unida con ‘y’ para reflejar el ritmo del griego.
  - La nota a pie de página se ancló en ‘borra’ porque allí se concentra la alternativa léxica más relevante en español.
