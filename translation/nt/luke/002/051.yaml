  rationale: The Greek plainly states Jesus' ongoing submission to Mary and Joseph in this stage of his earthly life. The rendering preserves that reality without diminishing his divine identity or importing later doctrinal explanation. The verbal form is maintained to reflect active, ongoing obedience.
