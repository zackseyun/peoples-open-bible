id: PHP.3.1
reference: Philippians 3:1
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Τὸ λοιπόν, ἀδελφοί μου, χαίρετε ἐν κυρίῳ. τὰ αὐτὰ γράφειν ὑμῖν ἐμοὶ μὲν οὐκ ὀκνηρόν, ὑμῖν δὲ ἀσφαλές.
base_translation:
  language: en
  yaml_path: translation/nt/philippians/003/001.yaml
  text: Finally[a], my brothers, rejoice in the Lord. To write the same things to you is not troublesome for me[d][c][b], and is safe for you.
  footnotes:
  - marker: a
    text: Or "As for the rest" or "From now on."
    reason: lexical_alternative
  - marker: b
    text: '"Brothers" here addresses the congregation as a whole; that is, "brothers and sisters."'
    reason: cultural_note
  - marker: c
    text: Or "is no trouble for me" or "is not tedious for me."
    reason: lexical_alternative
  - marker: d
    text: Or "is a safeguard for you."
    reason: lexical_alternative
translation:
  language: ko
  text: 끝으로[a], 나의 형제 여러분[b], 주 안에서 기뻐하십시오. 같은 것을 여러분에게 거듭 쓰는 일이 내게는 번거롭지 않고[c], 여러분에게는 안전합니다[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「그 밖에」 또는 「이제부터」. 헬라어 Τὸ λοιπόν은 담화 전환 표지로, 편지가 더 이어지는 경우에도 흔히 「끝으로」로 옮긴다.
    reason: lexical_alternative
  - marker: b
    text: 헬라어 ἀδελφοί는 문법적 남성 복수이나 바울이 회중 전체(자매 포함)를 부르는 정형이다. 본 번역은 「형제 여러분」으로 남성형을 유지하고, 회중 전체를 향한 호칭임을 각주로 밝힌다.
    reason: cultural_note
  - marker: c
    text: 또는 「내게는 귀찮지 않고」 또는 「내게는 지루하지 않고」. 헬라어 ὀκνηρόν은 꺼리거나 망설이게 하는 일을 가리킨다.
    reason: lexical_alternative
  - marker: d
    text: 또는 「여러분에게는 보호가 됩니다」. 헬라어 ἀσφαλές는 안전·보호의 뜻을 함께 담는다.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τὸ λοιπόν
  english_pob_choice: Finally
  chosen_korean: 끝으로
  alternatives_korean:
  - 그 밖에
  - 이제부터
  - 마지막으로
  lexicon: BDAG
  rationale: 담화 전환 표지로 사용된다. 한국어 「끝으로」가 바울 서신의 정형적 흐름과 가장 자연스럽게 어울리며, 영어 POB의 「Finally」와도 일치한다.
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_korean: 나의 형제 여러분
  alternatives_korean:
  - 내 형제들이여
  - 나의 형제자매 여러분
  lexicon: BDAG
  rationale: 헬라어 남성 복수형을 보존하되, 합쇼체 호격에 자연스러운 「형제 여러분」을 택한다. 회중 전체에 대한 포괄적 함의는 각주에서 보존한다.
- source_word: χαίρετε
  english_pob_choice: rejoice
  chosen_korean: 기뻐하십시오
  alternatives_korean:
  - 즐거워하십시오
  - 기쁘게 살아가십시오
  lexicon: BDAG
  rationale: 현재 능동 명령형 복수. 합쇼체 명령형 「-십시오」로 옮겨 권면의 어조와 격식을 동시에 살린다.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_korean: 주 안에서
  alternatives_korean:
  - 주님 안에서
  lexicon: BDAG
  rationale: 바울의 정형 표현 ἐν κυρίῳ를 한국어로 풀어쓰지 않고 「주 안에서」로 유지하여 기독론적 연합·소속의 의미를 보존한다.
- source_word: τὰ αὐτά
  english_pob_choice: the same things
  chosen_korean: 같은 것을
  alternatives_korean:
  - 같은 말을
  - 동일한 내용을
  lexicon: BDAG
  rationale: 헬라어가 지시 대상을 모호하게 남기므로, 「같은 것을」로 형식적 투명성을 유지한다.
- source_word: γράφειν
  english_pob_choice: to write
  chosen_korean: 쓰는 일
  alternatives_korean:
  - 쓰는 것
  lexicon: BDAG
  rationale: 부정사를 한국어 명사형 「쓰는 일」로 옮겨 자연스러운 구문 흐름을 유지한다. 「거듭」을 더해 τὰ αὐτά의 반복 함의를 자연스럽게 드러낸다.
- source_word: οὐκ ὀκνηρόν
  english_pob_choice: is not troublesome for me
  chosen_korean: 번거롭지 않고
  alternatives_korean:
  - 귀찮지 않고
  - 지루하지 않고
  lexicon: BDAG
  rationale: 반복이 바울에게 부담이 되지 않음을 자연스러운 합쇼체로 표현한다. 「번거롭다」가 「귀찮다」보다 격식에 적절하다.
- source_word: ἀσφαλές
  english_pob_choice: safe for you
  chosen_korean: 안전합니다
  alternatives_korean:
  - 보호가 됩니다
  - 든든한 보호가 됩니다
  lexicon: BDAG
  rationale: 헬라어 형용사의 안전·보호 의미를 「안전합니다」로 직접 옮기고, 보호의 더 해석적 함의는 각주에 둔다.
theological_decisions:
- issue: 회중에 대한 성별 호칭
  chosen_reading: 나의 형제 여러분
  alternative_readings:
  - 나의 형제자매 여러분
  rationale: 헬라어가 문법적 남성 복수이므로 본문은 성별 형태를 유지한다. 회중 전체에 대한 포괄적 의미는 본문에 흡수하지 않고 각주에 둔다.
  doctrine_reference: 'DOCTRINE.md § Translation philosophy #4 (gender-accurate over gender-neutral)'
