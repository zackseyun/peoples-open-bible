    text: O «entro en juicio contigo»; el hebreo usa lenguaje de tribunal.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «Todavía dijiste» por «Pero tú dijiste» para reflejar el contraste discursivo del hebreo sin insinuar temporalidad. Se cambia «¡Mira!» por «He aquí» para mantener un registro más solemne y alineado con «Behold». Se elimina la nota incorrecta sobre «dijiste/Soy inocente» y se conserva únicamente la nota forense documentada en el audit trail inglés, anclada correctamente en «entro en juicio contigo[a]».
