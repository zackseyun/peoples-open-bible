base_translation:
  language: en
  yaml_path: translation/ot/amos/002/004.yaml
  text: 'Thus says Yahweh: “For three transgressions of Judah[a], and for four, I will not turn it back, because they have rejected the law of Yahweh and have not kept his statutes; and their lies have led them astray[c][b], after which their fathers walked.”'
  footnotes:
  - marker: a
    text: Or 'I will not revoke it,' that is, the announced judgment or punishment.
    reason: lexical_alternative
  - marker: b
    text: '''The law of the LORD'' may also be rendered ''the instruction of the LORD.'''
    reason: lexical_alternative
  - marker: c
    text: '''Their lies'' may refer more specifically to false gods or idols—deceptive objects of worship followed by their ancestors.'
    reason: alternative_reading
