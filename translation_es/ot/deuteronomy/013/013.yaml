review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura hebrea general: cláusula condicional («Si»), recepción de un reporte («oyes decir»), referencia a «una de tus ciudades», uso correcto de «Yahvé» para יְהוָה, y mantenimiento de la partícula introductoria «diciendo» para לֵאמֹר. Sin embargo, la frase relativa «de las que Yahvé tu Dios te da para habitar[a]» no expresa con suficiente precisión «que Yahvé tu Dios te está dando para habitar allí», porque omite «allí» en el texto principal y desplaza el sentido hacia una construcción partitiva algo enredada. Además, la nota [b] está anclada en «diciendo», pero su contenido trata de «para habitar allí / establecerte allí», por lo que no corresponde al segmento marcado.'
  spanish_quality_summary: 'El español es mayormente natural y digno, pero «de las que Yahvé tu Dios te da para habitar[a]» suena algo trabado y menos claro de lo necesario. Una redacción más directa mejora legibilidad y fidelidad: «que Yahvé tu Dios te da para habitar allí[a]». También conviene mantener la nota de alternativa para «Si / cuando» y corregir la ubicación de la nota sobre «habitar allí».'
  glossary_alignment: 'Alineación buena con la terminología del proyecto: יְהוָה → «Yahvé», אֱלֹהֶיךָ → «tu Dios». No hay conflictos con otros términos doctrinales. La principal corrección es sintáctica y de anclaje de nota, no terminológica.'
  issues:
  - severity: medium
    issue: La relativa «de las que» introduce una construcción menos fiel y menos clara que «que».
    rationale: אֲשֶׁר simplemente introduce una oración relativa que modifica «ciudades»; «de las que» añade una coloración partitiva innecesaria y vuelve la frase más pesada en español.
  - severity: medium
    issue: Falta «allí» en el texto principal para לָשֶׁבֶת שָׁם.
    rationale: El hebreo incluye explícitamente שָׁם («allí»). Aunque aparece en una nota, debe preservarse en el cuerpo del texto para mantener la referencia locativa completa.
  - severity: high
    issue: La nota [b] está mal anclada.
    rationale: El marcador [b] aparece en «diciendo», pero la nota explica alternativas para «para habitar allí». Esto incumple la disciplina de notas y puede confundir al lector.
  revised_spanish_text: Si oyes decir en una de tus ciudades que Yahvé tu Dios te da para habitar allí[a], diciendo,
  revised_footnotes:
