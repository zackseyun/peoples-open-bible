    text: 'O: «Tú eres el Dios que ve», o «Tú eres un Dios de ver»'
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final es un hebreo difícil. Puede significar: «¿Acaso aun aquí he visto al que me vio y he seguido con vida?»'
    reason: alternative_reading
  - marker: c
    text: 'Una renderización anterior decía: «Así que ella llamó el nombre del SEÑOR, quien le hablaba»'
    reason: previous_rendering
  revision_rationale: Se revisa para conservar mejor el hebraísmo קרא שם con «llamó el nombre de», mantener אַחֲרֵי en la cláusula final («después del que me ve»), y alinear la nota c con el historial auditado de renderización previa. Se mantiene «Yahvé» y la confesión central «Tú eres un Dios que me ve».
