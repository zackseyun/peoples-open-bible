translation:
  language: es
  text: Y Yahvé oye la oración de todo el que vive en el temor de Dios, y Yahvé cumple toda petición de un alma[a] que espera en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «de una persona que espera en él». Griego: «de un alma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κύριος / ὁ κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  lexicon: LEH, LSJ
  rationale: El contexto poético paraleliza dos miembros con el mismo referente divino. En la política del proyecto, יהוה/YHWH se vierte como «Yahvé» en español, y aquí la reiteración del título en ambas cláusulas conserva el énfasis del griego sin sustituir el nombre divino por un equivalente funcional genérico.
- source_word: εἰσήκουσεν
  english_pob_choice: hears
  chosen_spanish: escucha
  alternatives_spanish:
  - ha escuchado
  - oyó
  lexicon: LEH, LSJ
  rationale: El aoristo funciona de manera gnómica en esta sentencia sapiencial; por eso conviene un presente en español. «Escucha» mantiene el valor general y evita fijarlo como una acción puntual del pasado.
- source_word: παντὸς ἐν φόβῳ θεοῦ
  english_pob_choice: everyone in the fear of God
  chosen_spanish: todo el que está en el temor de Dios
  alternatives_spanish:
  - todo el que teme a Dios
  - toda persona en el temor de Dios
  lexicon: LEH, LSJ
  rationale: Se preserva la expresión semítica «en el temor de Dios» sin reducirla a una glosa más libre. «Todo el que está» suena natural en español y mantiene la idea de pertenecer o vivir dentro de esa actitud reverente.
- source_word: αἴτημα
  english_pob_choice: request
  chosen_spanish: petición
  alternatives_spanish:
  - ruego
  - solicitud
  lexicon: LEH, LSJ
  rationale: «Petición» encaja con el lenguaje de oración y mantiene el peso formal del término griego sin volverlo demasiado técnico.
- source_word: ψυχῆς
  english_pob_choice: soul
  chosen_spanish: un alma
  alternatives_spanish:
  - una persona
  - una vida
  lexicon: LEH, LSJ
  rationale: El griego dice explícitamente «alma». Se conserva esa imagen antropológica y devocional, tal como lo hace el audit trail en inglés, en vez de aplanarla a «persona».
- source_word: ἐλπιζούσης πρὸς αὐτόν
  english_pob_choice: that hopes in him
  chosen_spanish: que espera en él
  alternatives_spanish:
  - que confía en él
  - que espera hacia él
  lexicon: LEH, LSJ
  rationale: «Espera en él» es una fórmula natural en español bíblico para la confianza dirigida a Dios y reproduce adecuadamente la orientación de πρὸς αὐτόν sin introducir un matiz distinto.
- source_word: ἐπιτελεῖ
  english_pob_choice: fulfills
  chosen_spanish: cumple
  alternatives_spanish:
  - realiza
  - lleva a cabo
  lexicon: LEH, LSJ
  rationale: «Cumple» funciona bien con «petición» y transmite la idea de llevarla a término. Es más idiomático que «acaba» o «realiza» en este contexto de respuesta divina.
theological_decisions:
- issue: Valor gnómico del aoristo εἰσήκουσεν frente al presente ἐπιτελεῖ
  english_pob_reading: hears / fulfills
  chosen_spanish_reading: escucha / cumple
  alternative_spanish_readings:
  - ha escuchado / cumple
  - escuchó / cumple
  rationale: El paralelismo con el presente del segundo miembro favorece una lectura proverbial o gnómica, no un hecho aislado. El presente en español refleja mejor esa verdad general.
  doctrine_reference: Uso aspectual gnómico; paralelismo poético
- issue: Expresión «en el temor de Dios»
  english_pob_reading: everyone in the fear of God
  chosen_spanish_reading: todo el que está en el temor de Dios
  alternative_spanish_readings:
  - todo el que teme a Dios
  - quien vive reverentemente ante Dios
  rationale: La frase conserva el color hebraizante del original y evita reemplazar la construcción por una paráfrasis que borre su forma. En el POB español conviene mantener la densidad de la expresión religiosa.
  doctrine_reference: Lenguaje sapiencial y reverencia divina
translation_notes:
  revision_awareness: La revisión inglesa más reciente confirmó que εἰσήκουσεν debe leerse gnómicamente como presente, y que la expresión debe conservar su registro elevado. La versión española adopta ese mismo valor con «escucha», manteniendo además la formulación semítica «en el temor de Dios».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según la norma del proyecto para el nombre divino.
  - 'Se usa presente gnómico en ambos verbos principales: «escucha» y «cumple».'
  - Se conserva «alma» para ψυχῆς, siguiendo la preferencia del audit trail por retener la antropología explícita del griego.
  - No se añaden notas al pie porque no hay una alternativa textual que requiera anclaje en el texto español.
