id: GEN.19.22
reference: Genesis 19:22
source:
  edition: WLC
  text: מַהֵר֙ הִמָּלֵ֣ט שָׁ֔מָּ/ה כִּ֣י לֹ֤א אוּכַל֙ לַ/עֲשׂ֣וֹת דָּבָ֔ר עַד בֹּאֲ/ךָ֖ שָׁ֑מָּ/ה עַל כֵּ֛ן קָרָ֥א שֵׁם הָ/עִ֖יר צֽוֹעַר־־־׃
translation:
  text: Hurry[a], escape there[b], for I cannot do anything until you arrive there.” Therefore the city was called Zoar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Zoar sounds like the Hebrew for 'small' or 'insignificant'; see Genesis 19:20.
    reason: cross_reference
  - marker: b
    text: Or, more literally, 'he called the name of the city Zoar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: מַהֵר
  chosen: Hurry
  alternatives:
  - Be quick
  - Quickly
  lexicon: HALOT
  rationale: Imperative from מהר expressing urgency. 'Hurry' is natural modern English and preserves the force better than the adverbial 'quickly' standing alone.
- source_word: הִמָּלֵט
  chosen: escape
  alternatives:
  - flee to safety
  - save yourself
  lexicon: HALOT
  rationale: Niphal imperative of מלט, 'escape' or 'deliver oneself.' 'Escape' is concise and fits the immediate context of urgent flight from judgment.
- source_word: שָׁמָּה
  chosen: there
  alternatives:
  - to there
  lexicon: HALOT
  rationale: Directional adverb meaning 'there/to there.' English idiom prefers simply 'there' after 'escape' and 'arrive.'
- source_word: כִּי
  chosen: for
  alternatives:
  - because
  lexicon: HALOT
  rationale: Introduces the reason for the command. 'For' fits the elevated narrative style while remaining readable.
- source_word: לֹא אוּכַל
  chosen: I cannot
  alternatives:
  - I am not able
  - I will not be able
  lexicon: HALOT
  rationale: Expresses inability. Present 'cannot' best reflects the immediate constraint in context.
- source_word: לַעֲשׂוֹת דָּבָר
  chosen: do anything
  alternatives:
  - do a thing
  - do anything at all
  lexicon: HALOT
  rationale: Hebrew literally 'do a thing.' Idiomatic English is 'do anything,' preserving the totality without awkwardness.
- source_word: עַד בֹּאֲךָ
  chosen: until you arrive
  alternatives:
  - until you come
  - until your coming
  lexicon: HALOT
  rationale: Infinitive construct with 2ms suffix. 'Until you arrive' is smooth English in context of reaching the city; 'come' is possible but less specific in English.
- source_word: עַל כֵּן
  chosen: Therefore
  alternatives:
  - For this reason
  - That is why
  lexicon: HALOT
  rationale: Standard inferential formula introducing the place-name explanation. 'Therefore' preserves the narrative connection.
- source_word: קָרָא שֵׁם הָעִיר
  chosen: the name of the city was called
  alternatives:
  - he called the name of the city
  - the city was named
  lexicon: HALOT
  rationale: The Hebrew uses a 3ms verb with 'name of the city' as object, literally 'he called the name of the city.' English commonly uses a passive here. 'The city was named' is smoother, but 'the name of the city was called' stays closer to the source while remaining understandable.
- source_word: צֹעַר
  chosen: Zoar
  lexicon: HALOT
  rationale: Proper place name; per translation philosophy, names are transliterated rather than translated.
