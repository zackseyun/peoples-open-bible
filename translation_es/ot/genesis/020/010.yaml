translation:
  language: es
  text: 'Entonces Abimelec dijo a Abraham[a]: «¿Qué viste, que hiciste este asunto?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué tenías en mente, que hiciste este asunto?». El hebreo dice literalmente: «¿Qué viste...?»; aquí «ver» funciona de manera idiomática para lo que se percibió, consideró o tuvo en vista.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: El wayyiqtol marca avance narrativo; «Entonces» conserva esa secuencia de manera natural en español y corresponde al valor discursivo de la partícula inicial.
- source_word: אֲבִימֶלֶךְ
  english_pob_choice: Abimelech
  chosen_spanish: Abimelec
  alternatives_spanish:
  - Abimelek
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre propio con una forma usual y legible en español, manteniendo la equivalencia al hebreo.
- source_word: אֶל
  english_pob_choice: to
  chosen_spanish: a
  alternatives_spanish:
  - hacia
  lexicon: HALOT
  rationale: La preposición introduce al destinatario del habla; «a» es la equivalencia natural en español.
- source_word: אַבְרָהָם
  english_pob_choice: Abraham
  chosen_spanish: Abraham
  alternatives_spanish:
  - Abrahán
  lexicon: Nombre propio transliterado
  rationale: Se conserva la forma tradicional y ampliamente reconocible del nombre propio.
- source_word: מָה
  english_pob_choice: What
  chosen_spanish: ¿Qué?
  alternatives_spanish:
  - ¿Por qué?
  lexicon: HALOT
  rationale: El hebreo usa el interrogativo «qué»; aunque la pregunta apunta al motivo, se mantiene la forma literal del interrogativo para no borrar la imagen original.
- source_word: רָאִיתָ
  english_pob_choice: did you see
  chosen_spanish: viste
  alternatives_spanish:
  - habías visto
  - tenías en mente
  lexicon: HALOT
  rationale: Se conserva el verbo de percepción «ver», que en este giro puede implicar percibir, considerar o tener en vista. El pasado simple español suena natural en el diálogo narrativo.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  - para que
  lexicon: HALOT
  rationale: 'Aquí introduce la cláusula enlazada a la pregunta precedente: «¿Qué viste, que hiciste...?». «Que» reproduce bien la relación del hebreo sin sobrerinterpretarla.'
- source_word: עָשִׂיתָ
  english_pob_choice: you did
  chosen_spanish: hiciste
  alternatives_spanish:
  - has hecho
  - actuaste
  lexicon: HALOT
  rationale: El verbo hebreo en simple pasado se expresa de forma directa con «hiciste», manteniendo el tono narrativo y evitando una paráfrasis más explicativa.
- source_word: אֶת הַדָּבָר הַזֶּה
  english_pob_choice: this thing
  chosen_spanish: esta cosa
  alternatives_spanish:
  - este asunto
  - este hecho
  - esta cosa
  lexicon: HALOT
  rationale: דָּבָר puede ser «palabra», «asunto» o «cosa». En este contexto, la formulación directa «esta cosa» conserva la cercanía al hebreo y evita cargar el término con una valoración moral que el texto no añade explícitamente.
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia entre el hebreo base y la auditoría inglesa; no se introdujeron cambios textuales. Se mantuvo la imagen idiomática de «ver» en la pregunta, tal como conserva la POB inglesa, y se ajustó solo la naturalidad del español.
  spanish_consistency_notes:
  - Se usa «Abimelec» para el nombre propio, coherente con transliteración española corriente.
  - Se mantiene el verbo de percepción «viste» para no borrar la metáfora hebrea.
  - «Esta cosa» sigue la opción semánticamente cercana de la auditoría inglesa, sin sustituirla por un término más interpretativo como «hecho» o «asunto».
  - La puntuación respeta el diálogo directo con interrogación en español.
