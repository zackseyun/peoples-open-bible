translation:
  language: es
  text: Si abres la boca contra un amigo[a], no temas, porque hay reconciliación, excepto en caso de insulto, arrogancia, revelación de un secreto y golpe traicionero; en estas cosas, todo amigo huirá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no te asustes». El verbo griego puede incluir temor o cautela; aquí el contexto favorece no perder la esperanza de reconciliación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπὶ φίλον
  english_pob_choice: against a friend
  chosen_spanish: contra un amigo
  alternatives_spanish:
  - a un amigo
  - acerca de un amigo
  lexicon: LSJ
  rationale: 'ἐπί con acusativo y el contexto de una ofensa verbal favorecen un sentido adversativo: hablar contra alguien, no solo dirigirse a él.'
- source_word: ἀνοίξῃς στόμα
  english_pob_choice: open your mouth
  chosen_spanish: abres la boca
  alternatives_spanish:
  - abras la boca
  - hablas
  lexicon: LSJ
  rationale: Conserva la imagen concreta del griego y funciona con naturalidad en español.
- source_word: μὴ εὐλαβηθῇς
  english_pob_choice: do not be afraid
  chosen_spanish: no temas
  alternatives_spanish:
  - no te asustes
  - no desconfíes
  lexicon: LSJ
  rationale: Aunque el verbo puede abarcar cautela o temor, el contexto apunta a no retroceder por miedo ante la posibilidad de restauración.
- source_word: διαλλαγή
  english_pob_choice: reconciliation
  chosen_spanish: reconciliación
  alternatives_spanish:
  - restablecimiento
  - reconciliación mutua
  lexicon: LSJ
  rationale: Es el equivalente moderno más claro para relaciones restablecidas tras una ruptura.
- source_word: ὀνειδισμοῦ
  english_pob_choice: insult
  chosen_spanish: insulto
  alternatives_spanish:
  - reproche
  - afrenta
  lexicon: LSJ
  rationale: Capta bien el agravio verbal y mantiene un español directo y actual.
- source_word: ὑπερηφανίας
  english_pob_choice: arrogance
  chosen_spanish: arrogancia
  alternatives_spanish:
  - orgullo
  - altivez
  lexicon: LSJ
  rationale: En esta lista de ofensas interpersonales, 'arrogancia' expresa mejor el orgullo que hiere al otro.
- source_word: μυστηρίου ἀποκαλύψεως
  english_pob_choice: the revealing of a secret
  chosen_spanish: revelación de un secreto
  alternatives_spanish:
  - divulgación de un secreto
  - descubrimiento de un secreto
  lexicon: LSJ
  rationale: En un contexto sapiencial, μυστήριον se entiende como confidencia o asunto reservado, no como 'misterio' doctrinal.
- source_word: πληγῆς δολίας
  english_pob_choice: a treacherous blow
  chosen_spanish: golpe traicionero
  alternatives_spanish:
  - herida engañosa
  - golpe engañoso
  lexicon: LSJ
  rationale: La imagen puede ser literal o metafórica; 'golpe traicionero' conserva la combinación de daño y perfidia con naturalidad en español.
- source_word: ἀποφεύξεται
  english_pob_choice: will flee
  chosen_spanish: huirá
  alternatives_spanish:
  - se apartará
  - escapará
  lexicon: LSJ
  rationale: Refleja una retirada completa, más fuerte que simplemente evitar.
- source_word: πᾶς φίλος
  english_pob_choice: every friend
  chosen_spanish: todo amigo
  alternatives_spanish:
  - cada amigo
  - todo el que es amigo
  lexicon: LSJ
  rationale: En español, 'todo amigo' transmite bien el distributivo singular sin sonar forzado.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de Swete y toma como guía el auditable inglés POB, pero ajusta a español natural: conserva la imagen de ''abrir la boca'', vierte εὐλαβηθῇς con ''no temas'' según la revisión inglesa y mantiene la serie de excepciones con puntuación clara. Se preserva la fuerza adversativa de ἐπὶ φίλον y la lista final de ofensas como condiciones que hacen huir a todo amigo.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa 'reconciliación' para διαλλαγή, coherente con el registro sapiencial y la lectura auditada en inglés.
  - '''Secreto'' se prefiere a ''misterio'' para μυστηρίου, evitando una lectura teológica ajena al contexto.'
  - '''Golpe traicionero'' conserva el matiz de daño con perfidia sin imponer una literalidad extraña en español.'
