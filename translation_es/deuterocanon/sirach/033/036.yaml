  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: una prohibición de consultar indiscriminadamente y una exhortación a conservar un solo consejero cuidadosamente escogido. Sin embargo, «a todo hombre» suena poco natural con «consultar» en español, y «entre mil» no expresa con suficiente precisión ἕνα ἐκ χιλίων, que es «uno de entre mil / uno entre mil».'
  spanish_quality_summary: La redacción es mayormente clara, pero necesita un ajuste idiomático. «No consultes a todo hombre» es comprensible, aunque más natural y fiel al uso español sería «No consultes con cualquiera» o «No consultes con toda persona»; dado el registro proverbial, «No consultes con cualquiera» funciona mejor. También conviene hacer explícito «un solo consejero» para reflejar ἕνα y mantener la fuerza selectiva. «Conserva» es aceptable, pero «ten» suena más natural aquí; aun así, «conserva» puede mantenerse si se quiere resaltar retención. Opto por «ten un solo consejero entre mil» como español más fluido y suficientemente fiel.
  glossary_alignment: No hay términos teológicos de proyecto en juego. «Consejero» alinea bien con σύμβουλον. Se preserva la nota sobre la hipérbole proverbial. La nota léxica debe adaptarse al español revisado para no repetir exactamente la misma formulación del texto principal sin aportar alternativa real.
