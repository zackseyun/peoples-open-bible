  to: Cuando llamo[a], respóndeme, oh Dios de mi justicia. En la angustia me has dado espacio[b]. Muéstrame tu favor y oye mi oración.
  rationale: Se elimina «te» para no añadir un objeto que el hebreo no expresa y para seguir más de cerca la decisión del POB inglés. Se reemplaza «Sé bondadoso conmigo» por «Muéstrame tu favor» para reflejar mejor חנן como gracia/favor divino, manteniendo un español natural y reverente.
