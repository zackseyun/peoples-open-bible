translation:
  language: es
  text: Así hicieron sus hijos para él, tal como les había mandado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: וַיַּעֲשׂוּ
  english_pob_choice: did
  chosen_spanish: hicieron
  alternatives_spanish:
  - actuaron
  - llevaron a cabo
  - cumplieron
  lexicon: HALOT
  rationale: עָשָׂה es un verbo amplio; aquí, en el contexto de cumplir instrucciones funerarias, ‘hicieron’ es la opción más natural en español y conserva la idea de ejecución obediente sin añadir matices no presentes en el hebreo.
- source_word: בָנָיו
  english_pob_choice: his sons
  chosen_spanish: sus hijos
  alternatives_spanish:
  - sus hijos varones
  - sus hijos
  lexicon: HALOT
  rationale: El hebreo dice literalmente ‘sus hijos’ con forma masculina plural, y en español ‘sus hijos’ comunica bien la referencia familiar. ‘Hijos varones’ explicita el género pero suena más pesado; aquí no es necesario porque el contexto narrativo ya identifica a los hijos de Jacob.
- source_word: לוֹ
  english_pob_choice: for him
  chosen_spanish: por él
  alternatives_spanish:
  - para él
  - en favor de él
  lexicon: HALOT
  rationale: La idea es acción realizada en beneficio o por encargo de Jacob. En español, ‘por él’ suena natural y mantiene el sentido de actuar en su nombre/mejor dicho, en cumplimiento de su disposición.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: Así
  alternatives_spanish:
  - De ese modo
  - De esta manera
  - Entonces
  lexicon: HALOT
  rationale: כֵּן marca manera o conformidad. ‘Así’ enlaza con naturalidad la frase principal y preserva la relación de correspondencia con lo siguiente.
- source_word: כַּאֲשֶׁר
  english_pob_choice: as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - justo como
  - según
  lexicon: HALOT
  rationale: La partícula comparativa introduce conformidad exacta con la orden de Jacob. ‘Tal como’ expresa bien esa correspondencia sin sonar mecánico.
- source_word: צִוָּם
  english_pob_choice: he had commanded them
  chosen_spanish: les había mandado
  alternatives_spanish:
  - les había ordenado
  - les había dado instrucciones
  lexicon: HALOT
  rationale: צוה tiene el sentido de mandar/ordenar. ‘Mandado’ es idiomático y fiel; el pretérito pluscuamperfecto (‘había’) clarifica que la orden antecede a la acción de los hijos, como en el flujo narrativo hebreo.
translation_notes:
  revision_awareness: El texto hebreo y la traducción inglesa auditada están en pleno acuerdo; no hay revisiones aplicadas ni variantes textuales relevantes en este versículo. La versión española mantiene esa correspondencia con una sintaxis natural y sin añadir explicaciones.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - ‘Mandado’ conserva la fuerza de la orden sin recurrir a formulaciones eclesiásticas tradicionales que no aporta el hebreo.
  - La relación de causa/conformidad entre las dos cláusulas queda preservada con ‘Así... tal como...’.
