translation:
  language: es
  text: Tú has apartado[a] mi alma de la paz[b]; he olvidado el bien[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «has rechazado»; o, más idiomáticamente, «mi alma ha sido privada de la paz».
    reason: lexical_alternative
  - marker: b
    text: «Paz» traduce el hebreo shalom, que también puede significar bienestar o plenitud.
    reason: lexical_alternative
  - marker: c
    text: O simplemente, «he olvidado lo bueno» o «he olvidado la prosperidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַתִּזְנַח
  english_pob_choice: You have thrust away
  chosen_spanish: has arrojado
  alternatives_spanish:
  - has rechazado
  - has desechado
  - has apartado
  lexicon: HALOT
  rationale: זנח expresa rechazo o apartamiento fuerte. «Has arrojado» conserva la fuerza de expulsión/remoción del estado de paz y funciona con naturalidad en español poético; además permite mantener el sujeto implícito dirigido a Dios, como en el contexto del lamento.
- source_word: מִשָּׁלוֹם
  english_pob_choice: from peace
  chosen_spanish: de la paz
  alternatives_spanish:
  - del bienestar
  - de la plenitud
  - de la tranquilidad
  lexicon: HALOT
  rationale: שָׁלוֹם abarca paz, bienestar y plenitud. «Paz» es la opción principal por ser la más directa y reconocible, mientras que el campo semántico más amplio queda implícito en el contexto del sufrimiento expresado.
- source_word: נַפְשִׁי
  english_pob_choice: my soul
  chosen_spanish: mi alma
  alternatives_spanish:
  - mi vida
  - mi ser
  - yo
  lexicon: HALOT
  rationale: נֶפֶשׁ puede significar alma, vida o persona. «Mi alma» preserva el registro poético y la dimensión interior del texto; es la correspondencia más natural en español para esta lamentación.
- source_word: נָשִׁיתִי
  english_pob_choice: I have forgotten
  chosen_spanish: he olvidado
  alternatives_spanish:
  - olvidé
  - me he olvidado
  lexicon: HALOT
  rationale: El perfecto hebreo de 1cs se vierte de forma natural con pretérito perfecto compuesto en español. «He olvidado» conserva el valor de estado resultante y la sobriedad del enunciado.
- source_word: טוֹבָה
  english_pob_choice: goodness
  chosen_spanish: el bien
  alternatives_spanish:
  - la bondad
  - lo bueno
  - la prosperidad
  lexicon: HALOT
  rationale: טוֹבָה puede referirse a bondad, bien, prosperidad o bienestar. «El bien» evita restringir el sentido a prosperidad material y refleja con concisión la amplitud semántica que el hebreo deja abierta.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «what goodness is» por «goodness» para ajustarse más al hebreo, que dice simplemente «he olvidado el bien». La versión española sigue esa revisión y evita añadir una estructura explicativa no presente en el texto fuente.
  spanish_consistency_notes:
  - Se mantuvo «paz» como traducción principal de shalom, con nota para su campo semántico ampliado.
  - Se prefirió «alma» para נפש por su registro poético, coherente con el tono de Lamentaciones.
  - «El bien» conserva la amplitud de טוֹבָה sin reducirla a prosperidad económica o felicidad subjetiva.
