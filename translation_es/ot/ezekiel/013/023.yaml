  to: Por tanto, ya no verán visiones falsas ni practicarán adivinación[a], y libraré a mi pueblo de sus manos. Entonces sabrán que yo soy Yahvé.
  rationale: Se mantiene la traducción general porque es fiel y natural, pero se corrige «de su mano» a «de sus manos» para reflejar con mayor precisión el plural femenino del hebreo y conservar la concordancia del pasaje en español. No se requiere adjudicación adicional.
