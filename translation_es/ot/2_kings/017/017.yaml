translation:
  language: es
  text: Hicieron pasar a sus hijos y a sus hijas por el fuego[a], practicaron adivinación e interpretaron presagios, y se vendieron para hacer el mal a los ojos de Yahvé, para provocarlo a ira.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, 'sacrificaron a sus hijos y a sus hijas en el fuego'. El hebreo dice literalmente 'hicieron ... pasar por el fuego'.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיַּעֲבִירוּ ... בָּאֵשׁ
  english_pob_choice: made ... pass through the fire
  chosen_spanish: hicieron pasar ... por el fuego
  alternatives_spanish:
  - causaron que ... pasaran por el fuego
  - quemaron ... en el fuego
  - ofrecieron ... en el fuego
  lexicon: HALOT
  rationale: La construcción hebrea idiomática se conserva de modo bastante literal en español con 'hicieron pasar ... por el fuego', que refleja el verbo causativo y mantiene la resonancia intertextual del idioma original sin precisar más de lo que el texto dice.
- source_word: בְּנֵיהֶם וּבְנוֹתֵיהֶם
  english_pob_choice: their sons and their daughters
  chosen_spanish: sus hijos y sus hijas
  alternatives_spanish:
  - sus hijos
  - sus descendientes
  lexicon: HALOT
  rationale: El hebreo nombra explícitamente a hijos e hijas; mantener ambos términos preserva el énfasis y la crudeza del acto mejor que una generalización como 'sus hijos' o 'sus descendientes'.
- source_word: וַיִּקְסְמוּ קְסָמִים
  english_pob_choice: practiced divination
  chosen_spanish: practicaron adivinación
  alternatives_spanish:
  - usaron adivinación
  - adivinaron
  lexicon: HALOT
  rationale: La construcción verbal con objeto cognado se vierte de manera natural como 'practicaron adivinación', que comunica la práctica oculta sin forzar una calca torpe como 'adivinaron adivinaciones'.
- source_word: וַיְנַחֵשׁוּ
  english_pob_choice: interpreted omens
  chosen_spanish: interpretaron presagios
  alternatives_spanish:
  - practicaron agüero
  - leyeron señales
  - practicaron augurios
  lexicon: HALOT
  rationale: '''Interpretaron presagios'' expresa bien el sentido de lectura de signos o agüeros y distingue esta acción de la adivinación anterior, como hace el texto hebreo.'
- source_word: וַיִּתְמַכְּרוּ
  english_pob_choice: sold themselves
  chosen_spanish: se vendieron
  alternatives_spanish:
  - se entregaron
  - se dieron por completo
  lexicon: HALOT
  rationale: El hitpael de מכר es metafórico y fuerte; 'se vendieron' conserva la imagen de autoenajenación y esclavización moral que el hebreo sugiere, sin suavizarla.
- source_word: לַעֲשׂוֹת הָרַע
  english_pob_choice: to do what was evil
  chosen_spanish: para hacer lo malo
  alternatives_spanish:
  - para hacer el mal
  - para hacer lo que era malo
  lexicon: HALOT
  rationale: '''Para hacer lo malo'' es un español claro y fiel al infinitivo con artículo; conserva el sentido general sin perder la valoración moral del hebreo.'
- source_word: בְּעֵינֵי יְהוָה
  english_pob_choice: in the sight of Yahweh
  chosen_spanish: a los ojos de Yahvé
  alternatives_spanish:
  - delante de Yahvé
  - ante Yahvé
  lexicon: HALOT
  rationale: Se mantiene el idiomatismo evaluativo con la expresión española 'a los ojos de', que reproduce la metáfora de valoración divina y conserva el nombre divino según el estándar del proyecto.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el valor por defecto del proyecto para el Tetragrámaton, usando 'Yahvé' para preservar el nombre personal divino en vez de sustituirlo por un título.
- source_word: לְהַכְעִיסוֹ
  english_pob_choice: provoking him to anger
  chosen_spanish: provocándolo a ira
  alternatives_spanish:
  - irritándolo
  - provocando su enojo
  lexicon: HALOT
  rationale: El causativo de כעס se expresa de forma directa y natural con 'provocándolo a ira', que retiene tanto la fuerza causal como el matiz relacional de ofensa contra Dios.
theological_decisions:
- issue: Naturaleza del rito con fuego aplicado a hijos e hijas
  english_pob_reading: Retain the idiom 'made their sons and their daughters pass through the fire' in the main text without narrowing it further.
  chosen_spanish_reading: Mantener la expresión 'hicieron pasar ... por el fuego' en el texto principal, sin especificar más el rito.
  alternative_spanish_readings:
  - quemaron a sus hijos y a sus hijas en el fuego
  - sacrificaron a sus hijos y a sus hijas en el fuego
  rationale: El contexto más amplio apunta a una práctica condenada de sacrificio infantil, pero la formulación hebrea conserva un giro idiomático que conviene no sobreespecificar en el cuerpo principal. La nota permite señalar la lectura más explícita sin borrar la literalidad del original.
  doctrine_reference: Translation philosophy 1 and 3
- issue: Traducción del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - el SEÑOR
  rationale: La decisión mantiene la política terminológica del proyecto para el nombre propio divino y evita la sustitución por un título, lo cual preserva la transparencia frente al texto hebreo.
  doctrine_reference: 'Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail en inglés: se mantiene la equivalencia óptima, sin cambios necesarios respecto de la última pasada revisada, y se conserva la única nota alternativa sobre el modismo del fuego.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יְהוָה, conforme al estándar del proyecto.
  - Se distingue 'adivinación' de 'interpretaron presagios' para reflejar dos verbos hebreos distintos.
  - '''Se vendieron'' conserva la fuerza metafórica del hitpael de מכר sin suavizarla a una formulación más genérica.'
