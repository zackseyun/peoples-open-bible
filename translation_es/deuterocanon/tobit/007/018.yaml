translation:
  language: es
  text: 'Y Ragüel llamó a Edna, su esposa, y le dijo[a]: «Hermana[b], prepara la otra cámara y llévala allí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la otra cámara». El griego ταμεῖον puede referirse a una cámara interior o aposento.
    reason: lexical_alternative
  - marker: b
    text: «Hermana» es una forma literal de trato a su esposa, no una afirmación de parentesco biológico.
    reason: cultural_note
lexical_decisions:
- source_word: Ἔδναν / Edna
  english_pob_choice: Edna
  chosen_spanish: Edna
  alternatives_spanish:
  - Edna
  lexicon: N/A (nombre propio)
  rationale: Se mantiene el nombre propio transliterado de forma estándar y legible en español.
- source_word: Ἀδελφή
  english_pob_choice: Sister
  chosen_spanish: Hermana
  alternatives_spanish:
  - Sister (préstamo no natural en español)
  - Mi hermana
  - Querida hermana
  lexicon: LSJ
  rationale: Es un vocativo literal de trato hacia la esposa, no una afirmación de parentesco biológico. «Hermana» conserva ese matiz de habla antigua sin volverlo solemne en exceso.
- source_word: ἑτοίμασον
  english_pob_choice: prepare
  chosen_spanish: prepara
  alternatives_spanish:
  - alista
  - dispón
  - haz lista
  lexicon: LSJ
  rationale: Imperativo natural en español moderno, fiel al sentido de hacer listo o disponer algo para uso inmediato.
- source_word: τὸ ἕτερον ταμεῖον
  english_pob_choice: the other chamber
  chosen_spanish: la otra cámara
  alternatives_spanish:
  - la otra habitación
  - la otra alcoba
  - la otra cámara interior
  lexicon: LSJ
  rationale: ταμεῖον puede designar una cámara interior o aposento. «Cámara» conserva mejor el tono elevado y antiguo que «habitación», sin perder inteligibilidad.
- source_word: εἴσαγε
  english_pob_choice: bring her in there
  chosen_spanish: métela allí
  alternatives_spanish:
  - llévala allí
  - tráela allí
  - hazla entrar allí
  lexicon: LSJ
  rationale: En este contexto la orden es de introducirla en el aposento preparado. «Métela allí» reproduce con concisión el sentido direccional de entrada al lugar indicado.
theological_decisions:
- issue: Vocativo familiar hacia la esposa
  english_pob_reading: “Sister” is a literal form of address to his wife, not a statement of biological relationship.
  chosen_spanish_reading: «Hermana» se entiende como forma literal de trato a la esposa, no como relación biológica.
  alternative_spanish_readings:
  - «Esposa»
  - «Hermana mía»
  - «Sister»
  rationale: El griego usa un vocativo de parentesco como fórmula afectiva/cultural. Se conserva literalmente para no borrar la rareza documentada por el POB en inglés.
  doctrine_reference: Uso cultural del vocativo, no cuestión doctrinal
- issue: Designación del espacio para el encuentro matrimonial
  english_pob_reading: The Greek ταμεῖον can refer to an inner room or chamber.
  chosen_spanish_reading: «cámara» refleja un aposento interior, formal y compatible con el contexto matrimonial.
  alternative_spanish_readings:
  - habitación
  - aposento
  - cuarto
  rationale: La opción mantiene la ambigüedad espacial del griego y el registro más formal que el contexto narrativo sugiere.
  doctrine_reference: Ninguna
translation_notes:
  revision_awareness: Se siguió la revisión inglesa más reciente que prefirió «chamber» por registro más formal y mejor ajuste a ταμεῖον; en español se reflejó esa decisión con «cámara» en lugar de «habitación».
  spanish_consistency_notes:
  - Se mantuvo un español neutral y litúrgicamente legible, evitando calcos rígidos.
  - Se conservaron los nombres propios y el vocativo familiar documentado por el audit trail.
  - La puntuación reproduce un estilo bíblico moderno con comillas tipográficas y notas al pie marcadas en el texto.
