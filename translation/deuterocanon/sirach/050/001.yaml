- issue: Status title of Simon
  chosen_reading: the priest
  alternative_readings:
  - the great priest
  - the high priest
  rationale: The extant Hebrew primary witness reads הַכֹּהֵן ('the priest'), while the Greek parallel reads ἱερεὺς ὁ μέγας ('the great priest'), which likely reflects the office of high priest. Because the Hebrew survives for this verse, the main text follows the Hebrew, but the Greek's fuller title is preserved in a footnote due to its historical and interpretive significance.
  doctrine_reference: Original-language primacy over translation tradition; preserve theological tension rather than resolve it
