review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: imperfecto de habla interna («se decía»), condición enfática mínima («Si tan solo»), «manto» para ἱμάτιον y la preservación principal de σωθήσομαι como «seré salvada». Sin embargo, la nota [a] no corresponde bien a la evidencia fuente ni al rastro POB en inglés: ἐν ἑαυτῇ significa discurso interior («para sí / a sí misma / dentro de sí»), no «a solas».'
  spanish_quality_summary: El español es natural y digno. La frase principal se lee bien. La única reparación necesaria es depurar la nota [a] para evitar una alternativa inexacta y algo confusa. También conviene formular la nota [b] con español más idiomático («seré curada» o «quedaré sana» / «seré sanada») evitando «hecha sana», que suena calcado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión de mantener «salvada» para σωθήσομαι en el texto principal está alineada con el POB y con la justificación teológica/lexical documentada. «Manto» para ἱμάτιον es aceptable en este contexto.
  issues:
  - severity: medium
    issue: La nota [a] incluye «a solas» como alternativa para ἐν ἑαυτῇ.
    rationale: «A solas» no expresa habla interior/reflexiva; sugiere estar físicamente sola, algo no dicho por el griego ni por la nota inglesa auditada.
  - severity: low
    issue: La nota [b] usa «seré hecha sana».
    rationale: Aunque intenta reflejar «made well», en español suena poco natural y calcado. Conviene una alternativa idiomática equivalente.
  revised_spanish_text: 'Porque ella se decía a sí misma[a]: «Si tan solo toco su manto, seré salvada[b]».'
