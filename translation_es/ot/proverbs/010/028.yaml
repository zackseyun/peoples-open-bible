translation:
  language: es
  text: La expectativa de los justos es alegría[a], pero la esperanza de los impíos perecerá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esperanza» para «expectativa» en la primera línea; el hebreo usa un sustantivo distinto del de la segunda línea, aunque los sentidos se superponen.
    reason: lexical_alternative
lexical_decisions:
- source_word: תּוֹחֶלֶת
  english_pob_choice: expectation
  chosen_spanish: expectativa
  alternatives_spanish:
  - esperanza
  - expectación
  lexicon: HALOT
  rationale: El sustantivo expresa expectativa o espera confiada. "Expectativa" conserva la ligera diferencia frente a תִקְוָה en el segundo cola, como hizo la POB en inglés, sin sonar forzado en español.
- source_word: צַדִּיקִים
  english_pob_choice: the righteous
  chosen_spanish: los justos
  alternatives_spanish:
  - los rectos
  - los justos
  lexicon: HALOT
  rationale: Es un plural sustantivado para personas justas. "Los justos" es natural en español bíblico y conserva el contraste proverbial con "los impíos".
- source_word: שִׂמְחָה
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: HALOT
  rationale: El término denota alegría o gozo. "Alegría" es claro, digno y idiomático en español para este proverbio.
- source_word: תִקְוַת
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectativa
  lexicon: HALOT
  rationale: Aquí el sustantivo suele significar esperanza. "Esperanza" suena natural en español y mantiene la relación antitética con la alegría de los justos.
- source_word: רְשָׁעִים
  english_pob_choice: the wicked
  chosen_spanish: los impíos
  alternatives_spanish:
  - los malvados
  - los injustos
  lexicon: HALOT
  rationale: Es un plural sustantivado para personas perversas. "Los impíos" es conciso, tradicional en la literatura sapiencial y apropiado para el contraste de clase moral.
- source_word: תֹּאבֵד
  english_pob_choice: will perish
  chosen_spanish: perecerá
  alternatives_spanish:
  - se perderá
  - desaparecerá
  - se desvanecerá
  lexicon: HALOT
  rationale: Del verbo אבד, con sentido de perecer, perderse o desaparecer. "Perecerá" es formal, claro y suficientemente fuerte para el futuro del sujeto implícito por la gramática.
theological_decisions:
- issue: Qué es lo que perece en el segundo cola
  english_pob_reading: La esperanza de los impíos es lo que perece; el verso no afirma explícitamente la aniquilación o el destino final de los impíos mismos.
  chosen_spanish_reading: La esperanza de los impíos es lo que perecerá; la frase no formula de manera explícita el destino final de los impíos como personas.
  alternative_spanish_readings:
  - Los impíos perecerán junto con su esperanza.
  - La línea puede leerse como una implicación más amplia sobre el fracaso de los impíos.
  rationale: El verbo femenino singular concuerda con תִקְוַת ('esperanza'), por lo que la traducción debe respetar ese referente directo y no ampliar la afirmación más allá de la sintaxis.
  doctrine_reference: Principio de transparencia semántica y de no resolver tensiones doctrinales que el texto no resuelve de forma explícita.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que el acuerdo con la auditoría en inglés fue alto. Esta versión conserva la distinción léxica entre תּוֹחֶלֶת y תִקְוָה, y mantiene la lectura gramatical del segundo cola sin extenderla doctrinalmente.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exige; este versículo no lo contiene.
  - Se mantiene la distinción entre el sustantivo de la primera línea («expectativa») y el de la segunda («esperanza») para reflejar el paralelismo hebreo.
  - «Impíos» se prefiere como equivalente conciso y sapiencial de רְשָׁעִים.
  - La puntuación con coma antes de «pero» refleja el paralelismo antitético del proverbio.
