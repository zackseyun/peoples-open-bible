revisions:
- from: ¡Cómo enderezas tu camino para buscar amor! Por tanto, aun mujeres perversas has enseñado tus caminos[a].
  to: ¡Cómo diriges tu camino para buscar amor! Por tanto, aun mujeres perversas has enseñado tus caminos[a].
  rationale: Se sustituye «enderezas» por «diriges» para reflejar mejor la idea de orientar hábilmente el propio camino hacia la búsqueda de amor ilícito, sin el matiz de rectificación moral que «enderezar» suele tener en español. Se conserva el resto, incluida la nota léxica alternativa sobre הָרָעוֹת, porque está bien alineado con la evidencia fuente y el expediente inglés.
