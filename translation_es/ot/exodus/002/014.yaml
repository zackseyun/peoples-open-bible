translation:
  language: es
  text: 'Pero él respondió[a]: «¿Quién te puso por gobernante y juez sobre nosotros? ¿Acaso dices: “¿Vas a matarme como mataste al egipcio?”». Entonces Moisés tuvo miedo y dijo: «Ciertamente el asunto se ha sabido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Acaso pretendes matarme como mataste al egipcio?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: מִי
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién fue el que
  - ¿Quién te
  lexicon: HALOT
  rationale: Interrogativo directo que conserva el desafío de autoridad dirigido a Moisés.
- source_word: שָׂמְךָ
  english_pob_choice: made you
  chosen_spanish: te puso
  alternatives_spanish:
  - te hizo
  - te nombró
  - te estableció
  lexicon: HALOT
  rationale: שׂים puede significar poner, establecer o nombrar; «te puso» mantiene la fuerza de designación sin sobrerrepresentar una investidura formal.
- source_word: לְאִישׁ שַׂר וְשֹׁפֵט
  english_pob_choice: a ruler and a judge
  chosen_spanish: por príncipe y juez
  alternatives_spanish:
  - como príncipe y juez
  - por gobernante y juez
  - por jefe y juez
  lexicon: HALOT
  rationale: En español, la secuencia funciona mejor como una función de nombramiento introducida por «por». «Príncipe» refleja una autoridad principal o gobernante; se evita «príncipe» en sentido monárquico exclusivo, pero es la opción tradicional y semánticamente amplia para שַׂר en este contexto.
- source_word: עָלֵינוּ
  english_pob_choice: over us
  chosen_spanish: sobre nosotros
  alternatives_spanish:
  - encima de nosotros
  - para nosotros
  lexicon: HALOT
  rationale: La preposición expresa autoridad ejercida sobre el grupo, no beneficio a favor de ellos.
- source_word: הַלְהָרְגֵנִי אַתָּה אֹמֵר
  english_pob_choice: Are you saying you will kill me
  chosen_spanish: '¿Acaso dices: “¿Vas a matarme...?”'
  alternatives_spanish:
  - ¿Acaso pretendes matarme...
  - ¿Quieres matarme...?
  lexicon: HALOT
  rationale: Se conserva la interrogación implícita y el tono acusatorio. La construcción española evita la rigidez literal y reproduce la incertidumbre/intención del hablante; se usa una cita interna para reflejar la estructura del hebreo y la revisión inglesa.
- source_word: כַּאֲשֶׁר הָרַגְתָּ אֶת־הַמִּצְרִי
  english_pob_choice: as you killed the Egyptian
  chosen_spanish: como mataste al egipcio
  alternatives_spanish:
  - tal como mataste al egipcio
  - así como mataste al egipcio
  lexicon: HALOT
  rationale: «Como» expresa la comparación directa con naturalidad. «Al egipcio» mantiene el artículo definido implícito del hebreo y el referente específico.
- source_word: וַיִּירָא
  english_pob_choice: was afraid
  chosen_spanish: tuvo miedo
  alternatives_spanish:
  - tuvo temor
  - se asustó
  lexicon: HALOT
  rationale: «Tuvo miedo» es un equivalente idiomático y claro para la reacción narrativa de Moisés.
- source_word: אָכֵן
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - Sin duda
  - De veras
  lexicon: HALOT
  rationale: Partícula de afirmación e inferencia; «ciertamente» transmite la conclusión que Moisés alcanza.
- source_word: נוֹדַע הַדָּבָר
  english_pob_choice: the matter has become known
  chosen_spanish: el asunto se ha dado a conocer
  alternatives_spanish:
  - la cosa se ha sabido
  - el hecho ha llegado a conocimiento
  lexicon: HALOT
  rationale: '«Dābār» se rinde aquí como «asunto» por ser más natural en español formal. «Se ha dado a conocer» preserva el valor pasivo/resultativo de נודע: no solo «es conocido», sino que ha salido a la luz.'
theological_decisions:
- issue: Tratamiento de לְאִישׁ en una fórmula de rechazo de autoridad
  english_pob_reading: a ruler and a judge
  chosen_spanish_reading: por príncipe y juez
  alternative_spanish_readings:
  - por un hombre, príncipe y juez
  - como gobernante y juez
  rationale: El hebreo incluye אִישׁ, pero en este contexto funciona appositivamente con los cargos de autoridad. Siguiendo la revisión inglesa, se evita introducir «hombre» como elemento independiente, porque en español sonaría redundante. La versión conserva el énfasis en la investidura ilegítima que los hablantes cuestionan.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión refleja la revisión inglesa que eliminó el redundante «a man» y reorganizó la cita directa. Por ello, la sintaxis española también evita añadir «hombre» y usa una estructura con cita interna para conservar la pregunta acusatoria implícita en el hebreo y en la POB revisada.
  spanish_consistency_notes:
  - Se mantiene «Moisés» para מֹשֶׁה y «egipcio» en minúscula conforme al español bíblico habitual.
  - Se traduce la particula אָכֵן con un adverbio de afirmación/inferencia («ciertamente»), no con una simple afirmación enfática vacía.
  - «Asunto» se usa para דָּבָר por claridad idiomática; no se fuerza «cosa», que sería menos natural en este contexto.
  - La cita interna reproduce la estructura de pregunta dentro de la pregunta, coherente con el hebreo y con la auditoría inglesa.
