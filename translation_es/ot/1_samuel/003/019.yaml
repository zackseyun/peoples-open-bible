translation:
  language: es
  text: Y Samuel creció[a], y Yahvé estuvo con él y no dejó caer a tierra ninguna de sus palabras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «llegó a ser grande» o «creció hasta la madurez».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no dejó que ninguna de sus palabras fallara». El hebreo literalmente dice «no dejó caer a tierra ninguna de sus palabras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּגְדַּל
  english_pob_choice: grew
  chosen_spanish: creció
  alternatives_spanish:
  - creció más
  - fue creciendo
  - llegó a ser grande
  lexicon: HALOT
  rationale: El verbo expresa crecimiento/maduración en la narración. «Creció» es natural en español, conserva la brevedad del hebreo y no fuerza una lectura exclusivamente física o de prestigio.
- source_word: שְׁמוּאֵל
  english_pob_choice: Samuel
  chosen_spanish: Samuel
  lexicon: transliteración estándar
  rationale: Nombre propio rendido con la forma usual en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - el SEÑOR
  lexicon: DOCTRINE.md contested terms
  rationale: Se sigue el estándar del proyecto para el nombre divino del Tetragrámaton. «Yahvé» preserva el nombre personal del pacto, en lugar de sustituirlo por un título.
- source_word: הָיָה עִמּוֹ
  english_pob_choice: was with him
  chosen_spanish: estuvo con él
  alternatives_spanish:
  - estaba con él
  - fue con él
  lexicon: HALOT
  rationale: La expresión indica presencia y favor continuos. «Estuvo con él» reproduce la fuerza relacional del hebreo de manera idiomática y clara.
- source_word: וְלֹא הִפִּיל
  english_pob_choice: and let none ... fall
  chosen_spanish: y no dejó caer
  alternatives_spanish:
  - y no permitió que cayera
  - y no hizo caer
  lexicon: HALOT
  rationale: El Hifil con negación comunica que Yahvé no permitió el fracaso de las palabras de Samuel. «No dejó caer» conserva la imagen verbal del original sin perder legibilidad.
- source_word: מִכָּל דְּבָרָיו
  english_pob_choice: none of his words
  chosen_spanish: ninguna de sus palabras
  alternatives_spanish:
  - ninguna palabra suya
  - ninguno de sus dichos
  lexicon: HALOT
  rationale: «Palabras» mantiene el término amplio del hebreo, sin restringirlo a profecías o mensajes concretos. El giro negativo con singular femenino encaja bien en español.
- source_word: אָֽרְצָה
  english_pob_choice: to the ground
  chosen_spanish: a tierra
  alternatives_spanish:
  - al suelo
  - al piso
  lexicon: HALOT
  rationale: La expresión idiomática hebrea apunta a la imagen de algo que cae y queda sin efecto. «A tierra» preserva el paralelismo con la metáfora original, y en español bíblico es claro y digno.
theological_decisions:
- issue: Nombre divino del Tetragrámaton
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa directamente יהוה. La traducción conserva el nombre propio y evita la sustitución por un título, siguiendo la convención doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Expresión idiomática sobre las palabras de Samuel
  english_pob_reading: did not let any of his words fail / let none of his words fall to the ground
  chosen_spanish_reading: no dejó caer a tierra ninguna de sus palabras
  alternative_spanish_readings:
  - no permitió que ninguna de sus palabras fallara
  - no dejó fallar ninguna de sus palabras
  - hizo que todas sus palabras se cumplieran
  rationale: Se preserva la imagen hebrea en vez de explicitarla como cumplimiento profético. Así se mantiene la tensión literaria del versículo y se evita una paráfrasis más interpretativa de lo que el hebreo dice de forma directa.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; original-language primacy'
translation_notes:
  revision_awareness: El borrador sigue de cerca el auditable inglés POB y el hebreo subyacente, sin cambios de sentido respecto al último pase revisado; conserva la metáfora de «caer a tierra» y el nombre divino como Yahvé.
  spanish_consistency_notes:
  - Se usa «Yahvé» de forma consistente para יהוה.
  - Se mantiene «palabras» para דְּבָרָיו, sin reducirlo a «profecías» o «mensajes».
  - La imagen idiomática «no dejó caer a tierra» preserva el paralelismo con el hebreo y funciona con naturalidad en español bíblico.
  - El registro es bíblico y digno, pero en español moderno claro, sin calcos innecesarios.
