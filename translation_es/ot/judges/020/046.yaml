translation:
  language: es
  text: Y todos los que cayeron de entre Benjamín aquel día fueron veinticinco mil hombres que sacaban la espada[a]; todos estos eran hombres de valor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hombres valientes» o «hombres de valor» para «hombres poderosos».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיְהִי
  english_pob_choice: So ... were
  chosen_spanish: Así, ... fueron
  alternatives_spanish:
  - Y ... fueron
  - Entonces ... fueron
  lexicon: HALOT
  rationale: La secuencia narrativa hebrea introduce un resumen de resultado; en español, «Así, ... fueron» conserva la continuidad y el cierre del relato sin forzar un calco extraño.
- source_word: כָל הַנֹּפְלִים
  english_pob_choice: all who fell
  chosen_spanish: todos los que cayeron
  alternatives_spanish:
  - todos los caídos
  - todos los que caían
  lexicon: HALOT
  rationale: 'El participio sustantivado se entiende mejor en español como una relativa: «los que cayeron». Mantiene el sentido de bajas en batalla.'
- source_word: מִבִּנְיָמִן
  english_pob_choice: from Benjamin
  chosen_spanish: de Benjamín
  alternatives_spanish:
  - de entre Benjamín
  - de los benjaminitas
  lexicon: HALOT
  rationale: «מִן» puede expresarse naturalmente con «de» en español para indicar procedencia o pertenencia tribal; evita una formulación más pesada.
- source_word: עֶשְׂרִים וַחֲמִשָּׁה אֶלֶף אִישׁ
  english_pob_choice: twenty-five thousand men
  chosen_spanish: veinticinco mil hombres
  alternatives_spanish:
  - veinticinco mil varones
  - veinticinco mil soldados
  lexicon: HALOT
  rationale: «אִישׁ» se vierte de forma directa como «hombre». «Soldados» añadiría una especificación no explícita en esta frase.
- source_word: שֹׁלֵף חֶרֶב
  english_pob_choice: who drew the sword
  chosen_spanish: que blandían la espada
  alternatives_spanish:
  - que sacaban la espada
  - armados con la espada
  lexicon: HALOT
  rationale: El participio expresa hombres armados y listos para combatir. «Blandían la espada» mantiene la imagen militar y suena natural en español. Se evita «armados» por ser más interpretativo y menos imagístico.
- source_word: בַּיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - en aquel día
  lexicon: HALOT
  rationale: «Aquel día» reproduce bien la referencia temporal deíctica y es estilísticamente fluido.
- source_word: אֵת כָּל אֵלֶּה
  english_pob_choice: all these
  chosen_spanish: todos estos
  alternatives_spanish:
  - a todos estos
  - todos ellos
  lexicon: HALOT
  rationale: El acusativo con demostrativo refuerza el total ya contado; en español se expresa naturalmente con «todos estos» sin reproducir el marcador formal.
- source_word: אַנְשֵׁי חָיִל
  english_pob_choice: men of valor
  chosen_spanish: hombres de valor
  alternatives_spanish:
  - varones valerosos
  - hombres valientes
  - mighty men
  lexicon: HALOT
  rationale: La corrección inglesa reciente favorece «men of valor»; en español, «hombres de valor» conserva la carga de valentía y capacidad militar sin caer en una fórmula arcaizante.
theological_decisions:
- issue: Descripción de los guerreros benjaminitas como אַנְשֵׁי חָיִל
  english_pob_reading: men of valor
  chosen_spanish_reading: hombres de valor
  alternative_spanish_readings:
  - hombres valientes
  - varones valerosos
  rationale: 'No hay una decisión doctrinal especial, pero sí una elección semántica importante: la expresión describe calidad marcial y prestigio, no simplemente fuerza física. «Hombres de valor» conserva ese matiz reconocido en la revisión inglesa.'
  doctrine_reference: none
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «mighty men» a «men of valor» para ajustar אַנְשֵׁי חָיִל con mayor precisión. La presente propuesta sigue esa revisión y evita introducir notas innecesarias porque el español puede expresar el matiz directamente sin ambigüedad relevante.
  spanish_consistency_notes:
  - Se mantiene «Benjamín» como nombre tribal propio, no «Benjamitas», para seguir de cerca la procedencia expresada por מִן.
  - Se usa una construcción verbal natural en español («fueron», «cayeron») para reflejar el resumen narrativo sin perder el paralelismo con el hebreo.
  - «Espada» se conserva en singular como en el hebreo חֶרֶב, aunque la referencia sea colectiva; esto mantiene la imagen idiomática bíblica.
