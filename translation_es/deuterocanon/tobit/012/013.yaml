revisions:
- from: Y cuando no vacilaste en levantarte y dejar tu comida, para que fueras y envolvieras al muerto[a], no me pasó inadvertido tu hacer el bien[b], sino que estuve contigo.
  to: Y cuando no vacilaste en levantarte y dejar tu comida[b] para ir a envolver al muerto[a], no me pasó inadvertido tu hacer el bien, sino que estuve contigo.
  rationale: Se corrige la construcción de propósito para un español más natural y fiel, y se limpia el estilo de la nota [a]. La nota [b] se ancla directamente en «comida», que es donde corresponde la aclaración cultural. No se requieren cambios doctrinales ni léxicos mayores.
