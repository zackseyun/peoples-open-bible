review_pass:
  verdict: revise
  source_alignment_summary: El borrador español transmite fielmente la prohibición de entrar en contienda injustificada y conserva bien la condición «si no te ha hecho daño». Refleja adecuadamente תרוב como «contiendas», חִנָּם como «sin causa», y רָעָה como «daño».
  spanish_quality_summary: La redacción es clara y digna, pero «un hombre» suena algo marcado en español contemporáneo para un proverbio genérico. Dado que la nota ya explica el valor genérico y el propio hebreo אָדָם aquí funciona de manera general, «una persona» mejora la legibilidad sin perder el sentido. Al hacer ese cambio, la nota cultural deja de ser necesaria.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. La propuesta revisada sigue el criterio del proyecto de español claro y natural sin apartarse del sentido fuente. El cambio de «un hombre» a «una persona» es una excepción justificada por legibilidad y por el valor genérico documentado en la nota inglesa.
  issues:
  - severity: medium
    issue: «un hombre» suena demasiado masculino-específico en español
    rationale: Aunque el hebreo usa אָדָם y el inglés auditado mantuvo «a man» con nota genérica, en español «No contiendas con un hombre» puede sugerir un varón concreto más fácilmente que un referente genérico. «una persona» comunica mejor el alcance proverbial y evita depender de una nota innecesaria.
  - severity: low
    issue: La nota cultural se vuelve prescindible si se adopta una formulación inclusiva y natural
    rationale: Si el texto dice «una persona», ya no hace falta explicar el uso genérico de «hombre», lo que simplifica la presentación sin pérdida de información relevante.
  revised_spanish_text: No contiendas con una persona sin causa, si no te ha hecho daño.
  revision_rationale: Se revisa «un hombre» a «una persona» para expresar con mayor naturalidad en español el valor genérico de אָדָם en un dicho sapiencial, evitando una lectura innecesariamente masculina-específica. Se elimina la nota porque deja de ser necesaria. El resto del versículo se mantiene, ya que refleja fielmente el hebreo y el audit trail inglés.
