translation:
  language: es
  text: El que los queme lavará su ropa y lavará su cuerpo en agua[b][a]; y después podrá entrar en el campamento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "entrará en el campamento". El verbo hebreo puede leerse como futuro simple, pero aquí probablemente expresa el permiso de reingreso después de la purificación.
    reason: alternative_reading
  - marker: b
    text: Literalmente, "su carne". En este modismo de lavado, el sentido es "su cuerpo".
    reason: lexical_alternative
lexical_decisions:
- source_word: וְהַשֹּׂרֵף
  english_pob_choice: The one who burns
  chosen_spanish: El que los queme
  alternatives_spanish:
  - el que los quema
  - quien los queme
  - el que los incinera
  lexicon: HALOT
  rationale: El participio con artículo funciona como sustantivo y designa al encargado de quemarlos. En español, 'el que los queme' conserva el sentido de función/rol y la referencia al acto prescrito sin volverlo una paráfrasis más libre.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - esas cosas
  lexicon: HALOT
  rationale: El pronombre retoma los restos del becerro y del macho cabrío del contexto inmediato. 'Los' es el objeto directo natural en español y mantiene la referencia sin añadir matiz.
- source_word: יְכַבֵּס
  english_pob_choice: shall wash
  chosen_spanish: lavará
  alternatives_spanish:
  - deberá lavar
  - lavará sus ropas
  lexicon: HALOT
  rationale: El imperfecto aquí tiene fuerza prescriptiva. 'Lavará' conserva el tono legal/instructivo del hebreo sin sobrecargarlo con modalizaciones que el texto no exige.
- source_word: בְּגָדָיו
  english_pob_choice: his clothes
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus prendas
  lexicon: HALOT
  rationale: '''Vestidos'' mantiene un registro bíblico digno y fiel al sustantivo hebreo בגד. ''Ropas'' sería igualmente correcto, pero ''vestidos'' preserva mejor el paralelismo ritual con el lavado corporal.'
- source_word: וְרָחַץ
  english_pob_choice: and bathe
  chosen_spanish: y lavará
  alternatives_spanish:
  - y se bañará
  - y se lavará
  lexicon: HALOT
  rationale: El verbo רחץ junto con 'su cuerpo' indica lavado corporal, no lavado de ropa. En español, repetir 'lavará' evita una posible asociación demasiado moderna o específica de 'bañarse' y sigue siendo natural.
- source_word: אֶת בְּשָׂרוֹ
  english_pob_choice: his body
  chosen_spanish: su cuerpo
  alternatives_spanish:
  - su carne
  - su cuerpo entero
  lexicon: HALOT
  rationale: Aunque בשר es literalmente 'carne', en este modismo de purificación se refiere al cuerpo de la persona. 'Su cuerpo' comunica el sentido idiomático con claridad, como en la decisión inglesa, sin volverlo literalista en exceso.
- source_word: בַּמָּיִם
  english_pob_choice: in water
  chosen_spanish: en agua
  alternatives_spanish:
  - con agua
  lexicon: HALOT
  rationale: La preposición ב con este verbo se expresa naturalmente como 'en'. 'En agua' conserva la sencillez del rito y el paralelismo con el lavado de las vestiduras.
- source_word: וְאַחֲרֵי כֵן
  english_pob_choice: and afterward
  chosen_spanish: y después
  alternatives_spanish:
  - y luego
  - después
  lexicon: HALOT
  rationale: La secuencia temporal se expresa de forma breve y clara. 'Y después' mantiene el orden del hebreo y el tono procedimental del mandato.
- source_word: יָבֹא
  english_pob_choice: he may come
  chosen_spanish: podrá entrar
  alternatives_spanish:
  - entrará
  - podrá venir
  lexicon: HALOT
  rationale: En este contexto, el verbo indica reingreso permitido tras la purificación. 'Podrá entrar' conserva esa fuerza de permiso/restauración mejor que un futuro simple español, que podría sonar meramente cronológico.
- source_word: אֶל־הַמַּחֲנֶה
  english_pob_choice: into the camp
  chosen_spanish: en el campamento
  alternatives_spanish:
  - al campamento
  - dentro del campamento
  lexicon: HALOT
  rationale: Con בוא + אֶל, el español puede usar 'entrar en'. 'Campamento' mantiene la imagen del asentamiento israelita y es más natural que 'campamento' con artículo interno en este contexto narrativo-ritual.
theological_decisions:
- issue: La cláusula final expresa restauración ritual, no solo un evento futuro
  english_pob_reading: he may come into the camp
  chosen_spanish_reading: podrá entrar en el campamento
  alternative_spanish_readings:
  - entrará en el campamento
  - entrará al campamento
  rationale: El contexto de purificación después de manipular los restos de la ofrenda por el pecado sugiere permiso para reingresar una vez cumplido el lavado. 'Podrá entrar' refleja esa lógica ritual sin añadir explicaciones ajenas al versículo.
  doctrine_reference: Pureza ritual y reingreso comunitario en Levítico 16
- issue: '''Su cuerpo'' preserva el modismo hebreo sin perder inteligibilidad'
  english_pob_reading: Literally 'his flesh.' In this washing idiom, the sense is 'his body.'
  chosen_spanish_reading: su cuerpo
  alternative_spanish_readings:
  - su carne
  - su cuerpo físico
  rationale: Mantener el sentido idiomático evita una traducción extraña o potencialmente cruda en español. 'Su cuerpo' sigue de cerca la decisión inglesa y comunica correctamente la acción de ablución ritual.
  doctrine_reference: Lenguaje corporal en ritos de purificación levíticos
translation_notes:
  revision_awareness: Se tuvo en cuenta el último pase de revisión, que indicó alta concordancia y no introdujo cambios. La redacción española sigue la lectura auditada del inglés POB y del hebreo, sin incorporar ampliaciones interpretativas.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como forma de default del proyecto cuando corresponde; en este versículo no aparece el tetragrámaton.
  - Se mantuvo 'campamento' para אֶל הַמַּחֲנֶה, coherente con el marco de la legislación levítica.
  - Se prefirió el verbo 'lavar' para ambos miembros del paralelismo, evitando una distinción innecesaria entre 'lavar' y 'bañar' que podría oscurecer el paralelo hebreo.
