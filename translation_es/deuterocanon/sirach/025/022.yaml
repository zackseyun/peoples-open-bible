translation:
  language: es
  text: Pues por causa de ella hay oprobio y vergüenza, si una esposa mantiene a su marido[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una mujer que mantiene a su marido». El hebreo מְכַלְכֶּלֶת y el griego ἐπιχορηγῇ pueden expresar el sentido de proveer o mantener materialmente.
    reason: lexical_alternative
lexical_decisions:
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, pues
  lexicon: HALOT
  rationale: El hebreo introduce una relación explicativa. «Porque» preserva esa conexión causal en español sin forzar una conclusión más fuerte que la del texto.
- source_word: בַעֲדָהּ
  english_pob_choice: because of her
  chosen_spanish: por causa de ella
  alternatives_spanish:
  - a causa de ella
  - por ella
  lexicon: HALOT
  rationale: La preposición con sufijo expresa ocasión o causa. «Por causa de ella» mantiene con claridad la responsabilidad o motivo atribuido en el enunciado.
- source_word: חֶרְפָּה
  english_pob_choice: reproach
  chosen_spanish: oprobio
  alternatives_spanish:
  - reproche
  - deshonra
  - vergüenza pública
  lexicon: HALOT
  rationale: En español, «oprobio» conserva mejor el matiz de afrenta o deshonra pública del hebreo que «reproche», sin perder el registro honor-vergüenza del pasaje.
- source_word: וּבֹשֶׁת
  english_pob_choice: shame
  chosen_spanish: vergüenza
  alternatives_spanish:
  - deshonra
  - humillación
  lexicon: HALOT
  rationale: «Vergüenza» es el equivalente más natural y directo del sustantivo hebreo, y funciona bien en pareja con «oprobio» para reflejar la duplicación semántica del verso.
- source_word: אִשָּׁה
  english_pob_choice: a wife
  chosen_spanish: una esposa
  alternatives_spanish:
  - una mujer
  lexicon: HALOT
  rationale: El contexto inmediato con «su marido» define una relación matrimonial. «Esposa» evita la ambigüedad de «mujer» y corresponde al sentido contextual que el POB inglés ya documentó.
- source_word: מְכַלְכֶּלֶת
  english_pob_choice: supports
  chosen_spanish: sostiene
  alternatives_spanish:
  - provee para
  - mantiene
  - sustenta
  lexicon: HALOT
  rationale: La raíz כלכל y el paralelo griego ἐπιχορηγῇ apuntan a proveer o mantener materialmente. «Sostiene» conserva esa idea de apoyo material de modo natural en español y evita exagerar con una lectura más interpretativa.
- source_word: אֶת בַּעֲלָהּ
  english_pob_choice: her husband
  chosen_spanish: a su marido
  alternatives_spanish:
  - a su esposo
  - a su hombre
  lexicon: HALOT
  rationale: בעל aquí tiene sentido matrimonial. «Marido» es un término claro y corriente en español bíblico; «esposo» también sería posible, pero «marido» conserva mejor el tono relacional del verso.
theological_decisions:
- issue: Conservar el juicio social de honor y vergüenza sin suavizarlo
  english_pob_reading: Retain the text's statement of reproach and shame without adding interpretive qualifiers.
  chosen_spanish_reading: Mantener el enunciado de oprobio y vergüenza sin añadir aclaraciones interpretativas.
  alternative_spanish_readings:
  - Parafrasear para explicar que refleja supuestos sociales antiguos
  - Suavizar la frase para evitar su fuerza valorativa
  rationale: El verso presenta directamente una valoración social antigua. La traducción debe conservar su fuerza retórica y su tensión cultural, sin editorializar ni atenuar el juicio del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Responder a la elección contextual de אִשָּׁה como relación conyugal
  english_pob_reading: wife
  chosen_spanish_reading: esposa
  alternative_spanish_readings:
  - mujer
  - ama de casa
  rationale: La presencia de «su marido» especifica que no se trata de «mujer» en sentido genérico. Traducir «esposa» mantiene la precisión contextual y la coherencia con la decisión auditada en inglés.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB en inglés, que unió la segunda cláusula con «when» para hacer gramatical la relación entre el sustento de la esposa y el enunciado de oprobio y vergüenza. En español se reflejó esa relación con «cuando», conservando la conexión causal explicativa inicial de כִּי.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usó un vocabulario de honor/vergüenza («oprobio», «vergüenza») para reflejar el campo semántico del hebreo y del griego.
  - «Esposa» y «marido» se eligieron por el contexto marital explícito; no se usó «mujer» como genérico.
  - «Sostiene» deja abierta la idea de proveer o mantener materialmente, en línea con la nota lexical del POB inglés.
