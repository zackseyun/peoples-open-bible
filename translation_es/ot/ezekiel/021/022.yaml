translation:
  language: es
  text: Y yo también golpearé mis manos una contra otra[a], y satisfaré mi ira[b]. Yo, Yahvé, he hablado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «golpearé mi mano a mi mano», un modismo para golpear o juntar las manos en gesto enfático de juicio.
    reason: lexical_alternative
  - marker: b
    text: 'O: «haré reposar mi ira». El hebreo expresa que la ira de Yahvé llega a reposo al ser plenamente ejecutado el juicio.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְגַם / אֲנִי
  english_pob_choice: And I too
  chosen_spanish: Y yo también
  alternatives_spanish:
  - Y también yo
  - Además, yo
  lexicon: HALOT
  rationale: Se conserva el valor aditivo y enfático de גַם junto con el pronombre explícito. «Y yo también» suena natural en español y mantiene el énfasis judicial del hebreo.
- source_word: אַכֶּה
  english_pob_choice: will strike
  chosen_spanish: golpearé
  alternatives_spanish:
  - pegaré
  - daré un golpe a
  lexicon: HALOT
  rationale: El verbo expresa una acción de golpear en contexto de juicio. «Golpearé» transmite la fuerza del acto sin volverlo celebratorio ni suavizarlo.
- source_word: כַפִּי אֶל כַּפִּי
  english_pob_choice: my hands together
  chosen_spanish: una mano contra la otra
  alternatives_spanish:
  - mis manos juntas
  - la palma de mi mano contra la palma de mi mano
  lexicon: HALOT
  rationale: El hebreo es literalmente «mi palma/mano a mi palma/mano», un modismo de golpear o aplaudir las manos. En español, «una mano contra la otra» conserva la imagen física y sugiere el gesto idiomático sin sonar forzado.
- source_word: וַהֲנִחֹתִי
  english_pob_choice: I will satisfy
  chosen_spanish: haré que mi ira se calme
  alternatives_spanish:
  - haré reposar mi ira
  - apaciguaré mi ira
  - haré descansar mi ira
  lexicon: HALOT
  rationale: La frase hebrea significa causar que la ira repose o quede llevada a su cumplimiento. En español, «haré que mi ira se calme» comunica ese resultado judicial sin imponer una paráfrasis demasiado interpretativa como «satisfacer».
- source_word: חֲמָתִי
  english_pob_choice: my wrath
  chosen_spanish: mi ira
  alternatives_spanish:
  - mi furor
  - mi indignación
  - mi cólera
  lexicon: HALOT
  rationale: חֵמָה denota ira/furor ardiente. «Ira» es claro y sobrio en español; se evita «ira» en un sentido meramente emocional, manteniéndolo dentro del marco profético de juicio.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  - Jehová
  lexicon: HALOT
  rationale: 'Se sigue el criterio del proyecto para el Tetragrámaton: «Yahvé» en el texto principal, preservando el nombre divino en lugar de sustituirlo por un título.'
- source_word: דִּבַּרְתִּי
  english_pob_choice: have spoken
  chosen_spanish: he hablado
  alternatives_spanish:
  - he dicho
  - hablé
  lexicon: HALOT
  rationale: El perfecto funciona como fórmula solemne de declaración divina. «He hablado» mantiene el peso performativo y la clausura profética del enunciado.
theological_decisions:
- issue: La ira divina llevada a reposo/cumplimiento
  english_pob_reading: I will satisfy my wrath
  chosen_spanish_reading: haré que mi ira se calme
  alternative_spanish_readings:
  - haré reposar mi ira
  - apaciguaré mi ira
  - satisfaré mi ira
  rationale: El hebreo expresa que la ira llega a su término mediante la ejecución del juicio, no simplemente una emoción tranquilizada. «Haré que mi ira se calme» preserva ese sentido sin endurecer la frase con una equivalencia demasiado literal que en español sonaría extraña.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: optimal equivalence; preserve source-text sense without flattening theological weight'
- issue: Representación del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Yahweh
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton. Se mantiene el nombre propio divino en español para no ocultar la referencia personal del pacto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto hebreo y coincide sustancialmente con la auditoría inglesa: mantiene el gesto idiomático de golpear las manos y la idea de que la ira divina llega a su reposo/cumplimiento. Se adopta «Yahvé» como nombre divino conforme al criterio del proyecto, y se evita una paráfrasis excesiva en la segunda cláusula.'
  spanish_consistency_notes:
  - 'Se preserva el paralelismo verbal con dos acciones coordinadas: golpear las manos y hacer que la ira se calme.'
  - «Yahvé» se usa de manera consistente para יְהוָה.
  - «Ira» se mantiene como término sobrio y profético; no se expande a «furia» salvo necesidad contextual.
  - La nota sobre la segunda cláusula conserva la lectura alternativa documentada por la auditoría inglesa.
