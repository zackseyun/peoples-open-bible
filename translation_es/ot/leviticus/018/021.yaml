    rationale: Aunque refleja bien el hiphil causativo, el English POB revisado optó por 'to pass through' en vez de una formulación causativa más explícita. En español, 'para que pase' o 'para pasar' suenan más naturales y mantienen la ambigüedad ritual sin forzar 'hacerla' con un colectivo singular.
