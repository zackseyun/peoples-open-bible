translation:
  language: es
  text: los hijos de Pahath-moab[a], de los hijos de Jesúa y Joab, 2,818.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «descendientes de Pahath-moab ... descendientes de Jesúa y Joab». En hebreo, «hijos de» suele designar un linaje o clan más amplio que hijos inmediatos.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּנֵי
  english_pob_choice: the sons of
  chosen_spanish: los hijos de
  alternatives_spanish:
  - los descendientes de
  - los hijos de
  lexicon: HALOT
  rationale: En este contexto de lista censal y genealógica, בְּנֵי señala un grupo familiar o de clan. «Los hijos de» conserva el idiomatismo hebreo y, en español bíblico, mantiene mejor el registro de lista de retorno que una expansión más interpretativa como «los descendientes de».
- source_word: פַחַת מוֹאָב
  english_pob_choice: Pahath-moab
  chosen_spanish: Pahat-moab
  alternatives_spanish:
  - Pahath-moab
  - Pahat Moab
  lexicon: HALOT
  rationale: Es un nombre propio transliterado. Se prefiere una forma española sobria y legible, conservando la base del nombre sin traducirlo. El ajuste ortográfico mínimo evita una transliteración excesivamente inglesa, sin perder la identificación del topónimo/nombre de clan.
- source_word: לִבְנֵי
  english_pob_choice: of the sons of
  chosen_spanish: de los hijos de
  alternatives_spanish:
  - pertenecientes a los hijos de
  - es decir, los hijos de
  lexicon: HALOT
  rationale: 'La preposición ל aquí marca subordinación o clasificación dentro del grupo: «Pahat-moab, de los hijos de Jesúa y Joab». En español, «de los hijos de» reproduce con naturalidad esa relación genealógica sin añadir explicación no presente en el hebreo.'
- source_word: יֵשׁוּעַ
  english_pob_choice: Jeshua
  chosen_spanish: Jesúa
  alternatives_spanish:
  - Jeshua
  - Josué
  lexicon: HALOT
  rationale: El nombre postexílico יֵשׁוּעַ se refleja mejor como «Jesúa», forma que conserva la cercanía fonética y evita confundirlo con «Josué», que remite a una forma hebrea más plena y a otro uso establecido en español bíblico.
- source_word: וְיוֹאָב
  english_pob_choice: and Joab
  chosen_spanish: y Joab
  alternatives_spanish:
  - y Joab
  lexicon: HALOT
  rationale: Conjunción simple más nombre propio; se conserva la forma española habitual «Joab».
- source_word: אַלְפַּיִם וּשְׁמֹנֶה מֵאוֹת שְׁמֹנָה עָשָׂר
  english_pob_choice: 2,818
  chosen_spanish: '2.818'
  alternatives_spanish:
  - dos mil ochocientos dieciocho
  - 2,818
  lexicon: HALOT
  rationale: El número hebreo es directo y corresponde a 2,818. En una lista censal, el uso de cifras facilita la lectura y conserva la exactitud del dato; se adapta la puntuación al uso tipográfico español.
theological_decisions:
- issue: Alcance de «hijos de» en una lista genealógica/censal
  english_pob_reading: The sons of often denotes a wider family line, not only immediate sons.
  chosen_spanish_reading: «Hijos de» puede entenderse como linaje o clan, no solo hijos inmediatos.
  alternative_spanish_readings:
  - «Descendientes de»
  - «Miembros del clan de»
  rationale: No se trata de una filiación restringida a hijos literales, sino de una designación de grupo familiar en una lista de repatriados. Se mantiene la fórmula bíblica «hijos de» en el texto y se deja implícita su amplitud semántica, como permite el hebreo.
  doctrine_reference: Uso genealógico/censal de בְּנֵי en listas del postexilio; ver también el principio de traducción contextual de grupos familiares en el AT.
translation_notes:
  revision_awareness: El auditor inglés mantiene agreement completo y no requiere cambios textuales; esta versión sigue el mismo contenido, ajustando únicamente la forma española para legibilidad y para una transliteración más natural del nombre de clan, sin alterar el sentido ni la cuantía.
  spanish_consistency_notes:
  - Se mantiene el registro de lista censal con sintaxis breve y nominal.
  - «Jesúa» se usa para el nombre postexílico יֵשׁוּעַ, evitando la forma «Josué».
  - El número se da con cifras para preservar la función de inventario y facilitar la lectura en español.
  - Se conserva el matiz amplio de «hijos de» mediante la nota al pie, sin sustituirlo en el texto principal por «descendientes de».
