  text: γενόμενος γὰρ ὁ ἡγεμὼν καὶ ἡ περὶ αὐτὸν ἀνυπόστατος δοκοῦσα εἶναι δύναμις, κατεκόπησαν ἐν τῷ τῆς Ναναίας ἱερῷ, παραλογισμῷ χρησαμένων τῶν περὶ τὴν Ναναίαν ἱερέων.
