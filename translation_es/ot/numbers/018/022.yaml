revisions:
- from: Y los hijos de Israel[a] no se acercarán más al tabernáculo de reunión, para que no carguen con pecado y mueran.
  to: Y los hijos de Israel[a] no se acercarán más a la tienda de reunión, para no cargar con pecado[b] y morir.
  rationale: Se cambia 'tabernáculo de reunión' por 'tienda de reunión' para reflejar con más transparencia אֹהֶל מוֹעֵד y alinearse con la decisión documentada del English POB. Se mantiene 'los hijos de Israel' y 'no se acercarán más' por su fidelidad y naturalidad. Se ajusta la cláusula final a 'para no cargar con pecado y morir', que conserva la concisión hebrea, y se añade una nota explicativa indispensable para el sentido legal de לָשֵׂאת חֵטְא.
