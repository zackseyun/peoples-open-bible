revisions:
- from: Ahora los filisteos reunieron sus ejércitos[a] para la guerra, y se concentraron en Soco, que pertenece a Judá, y acamparon entre Soco y Azeca, en Efes-damim.
  to: Los filisteos reunieron sus ejércitos[a] para la batalla, y se reunieron en Soco[b], que pertenece a Judá, y acamparon entre Soco y Azeca, en Efes-damim.
  rationale: 'Se ajusta el verso al expediente fuente y al mejor español bíblico legible: ''para la batalla'' refleja mejor el contexto de לַמִּלְחָמָה; ''se reunieron'' reproduce con mayor naturalidad וַיֵּאָסְפוּ; se elimina ''Ahora'' por fluidez narrativa; y se añade la nota cultural preservada en el POB inglés sobre Soco.'
