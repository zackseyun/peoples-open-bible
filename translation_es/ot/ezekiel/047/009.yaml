translation:
  language: es
  text: Y toda criatura viviente que pulula[a], adonde vaya el río, vivirá. Y habrá muchísimos peces, porque estas aguas van allá y son sanadas[b]; todo vivirá adonde vaya el río.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El hebreo usa un verbo de abundancia para seres vivos, especialmente en contexto acuático; también puede traducirse 'abunda' o 'se multiplica'.
    reason: lexical_alternative
  - marker: b
    text: 'O: ''estas aguas van allí, y las aguas de allí son sanadas''. El hebreo hace explícita la sanidad/restauración de las aguas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: נֶפֶשׁ חַיָּה
  english_pob_choice: living creature
  chosen_spanish: criatura viviente
  alternatives_spanish:
  - ser viviente
  - ser animado
  lexicon: HALOT
  rationale: La expresión hebrea se refiere a vida animada en general, no al sentido técnico de ‘alma’. ‘Criatura viviente’ suena natural en español y encaja con el contexto de vida acuática.
- source_word: יִשְׁרֹץ
  english_pob_choice: swarms
  chosen_spanish: se pulula / se agolpa en abundancia
  alternatives_spanish:
  - se reproduce con abundancia
  - pulula
  lexicon: HALOT
  rationale: El verbo transmite la idea de abundar y moverse en gran número, especialmente de seres acuáticos. En español, una formulación como ‘se pulula’ sería poco idiomática; por eso se opta por una expresión natural que conserve la imagen de abundancia biológica.
- source_word: נַחֲלַיִם
  english_pob_choice: the river
  chosen_spanish: el río
  alternatives_spanish:
  - las corrientes
  - los ríos
  - los cauces
  lexicon: HALOT
  rationale: Aunque la forma hebrea es dual/plural y el contexto menciona las aguas que fluyen, la revisión inglesa documenta que el sentido final aquí es el singular ‘the river’. En español, ‘el río’ comunica con claridad ese curso de agua visionario.
- source_word: יִחְיֶה
  english_pob_choice: will live
  chosen_spanish: vivirá
  alternatives_spanish:
  - tendrá vida
  - vivirá y prosperará
  lexicon: HALOT
  rationale: El futuro simple ‘vivirá’ reproduce de manera directa el valor verbal hebreo sin añadir interpretaciones como ‘prosperará’.
- source_word: הַדָּגָה
  english_pob_choice: fish
  chosen_spanish: peces
  alternatives_spanish:
  - la población de peces
  - la pesca
  lexicon: HALOT
  rationale: Es un colectivo para peces; ‘peces’ es la forma más clara y natural en español.
- source_word: רַבָּה מְאֹד
  english_pob_choice: very many
  chosen_spanish: muchísimos
  alternatives_spanish:
  - muy muchos
  - en gran abundancia
  lexicon: HALOT
  rationale: La combinación intensiva expresa abundancia extrema. ‘Muchísimos’ es idiomático y conserva la fuerza cuantitativa.
- source_word: וְיֵרָפְאוּ
  english_pob_choice: are healed
  chosen_spanish: fueron sanadas
  alternatives_spanish:
  - son sanadas
  - son curadas
  - quedan sanadas
  lexicon: HALOT
  rationale: El hebreo mantiene una imagen explícita de sanidad aplicada a las aguas. En español, ‘fueron sanadas’ conserva el lenguaje metafórico de curación/restauración, aunque la forma verbal pueda sentirse menos literal que un presente; esto sigue la tensión documental del texto.
- source_word: וָחָי כֹּל
  english_pob_choice: everything will live
  chosen_spanish: todo vivirá
  alternatives_spanish:
  - todo cobrará vida
  - todo será vivificado
  lexicon: HALOT
  rationale: La clausula es inclusiva y resumida. ‘Todo vivirá’ es breve, directa y fiel al valor de כלל.
- source_word: הַנָּחַל
  english_pob_choice: the river
  chosen_spanish: el río
  alternatives_spanish:
  - el arroyo
  - el torrente
  lexicon: HALOT
  rationale: En esta visión, נחל se entiende como un curso de agua vivificante de continuidad suficiente; ‘río’ es la opción más clara en español y coincide con la revisión inglesa.
theological_decisions:
- issue: Imagen de sanidad de las aguas
  english_pob_reading: 'Retain the healing language as metaphorically real within the vision: ''these waters go there and are healed.'''
  chosen_spanish_reading: 'Conservar el lenguaje de sanidad de las aguas: ‘estas aguas fueron allá y fueron sanadas’.'
  alternative_spanish_readings:
  - ‘estas aguas llegan allí y quedan sanadas’
  - ‘estas aguas llegan allí y se purifican’
  - ‘las aguas allí se vuelven frescas’
  rationale: El hebreo emplea el lenguaje explícito de ‘ser sanadas’, y la POB inglesa decidió mantenerlo. En español conviene conservar esa imagen teológica de restauración sin diluirla en una mera descripción química o hidrológica.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza totalizante del cierre
  english_pob_reading: everything will live wherever the river goes
  chosen_spanish_reading: todo vivirá adondequiera que vaya el río
  alternative_spanish_readings:
  - todo vivirá dondequiera que llegue el río
  - todo tendrá vida donde pase el río
  rationale: La clausula final resume el poder vivificante del río de manera total. ‘Adondequiera que vaya el río’ mantiene la universalidad del hebreo y la continuidad del motivo de vida.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió ‘the two streams’ a ‘the river’ por precisión léxica; por eso el español sigue el singular ‘el río’ tanto en la cláusula inicial como en la final. También se preservó la imagen de sanidad de las aguas, que el audit trail inglés trata como explícita y no meramente ‘fresca’.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto fuente lo requiera; aquí no aparece el nombre divino.
  - Se mantiene ‘río’ para נחל conforme a la revisión inglesa y al contexto visionario.
  - Se conserva ‘sanadas’ para reflejar el campo semántico de רפא sin sustituirlo por ‘frescas’ como lectura interpretativa principal.
  - El primer verbo se redacta de forma idiomática en español para comunicar la idea de abundar/menudear, no una copia mecánica del inglés.
