id: 1KI.3.26
reference: 1 Kings 3:26
source:
  edition: WLC
  text: וַ/תֹּ֣אמֶר הָ/אִשָּׁה֩ אֲשֶׁר בְּנָ֨/הּ הַ/חַ֜י אֶל הַ/מֶּ֗לֶךְ כִּֽי נִכְמְר֣וּ רַחֲמֶי/הָ֮ עַל בְּנָ/הּ֒ וַ/תֹּ֣אמֶר בִּ֣י אֲדֹנִ֗/י תְּנוּ לָ/הּ֙ אֶת הַ/יָּל֣וּד הַ/חַ֔י וְ/הָמֵ֖ת אַל תְּמִיתֻ֑/הוּ וְ/זֹ֣את אֹמֶ֗רֶת גַּם לִ֥/י גַם לָ֛/ךְ לֹ֥א יִהְיֶ֖ה גְּזֹֽרוּ־־־־׀־־־־־׃
translation:
  text: Then the woman whose son was alive said to the king[a], because her compassion was stirred for her son, and she said, "Please, my lord, give her the living child, and do not put him to death." But the other said, "It shall be neither mine nor yours[b]; cut him in two."
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebrew: ''for her compassion was stirred for her son,'' an idiom expressing intense maternal pity.'
    reason: cultural_note
  - marker: b
    text: 'Or ''do not kill him''; the Hebrew form is emphatic: ''do not, indeed do not, put him to death.'''
    reason: lexical_alternative
lexical_decisions:
- source_word: נִכְמְרוּ רַחֲמֶיהָ
  chosen: her compassion was stirred
  alternatives:
  - her bowels/yearnings were stirred
  - her motherly compassion grew warm
  - her heart yearned
  lexicon: HALOT
  rationale: The idiom combines כמר ('to be moved, grow warm') with רחמים ('compassion, tender feelings'). A literal rendering would sound unnatural in modern English; 'her compassion was stirred' preserves the emotional force without paraphrasing beyond the Hebrew.
- source_word: בִּי אֲדֹנִי
  chosen: Please, my lord
  alternatives:
  - Oh, my lord
  - I beg you, my lord
  lexicon: HALOT
  rationale: בִּי in direct appeal is an interjection of entreaty, not a literal prepositional phrase. 'Please, my lord' is natural English and preserves the deferential urgency.
- source_word: הַיָּלוּד הַחַי
  chosen: the living child
  alternatives:
  - the living baby
  - the child who is alive
  lexicon: HALOT
  rationale: יַלוּד denotes one born, hence 'child' or 'baby.' 'Child' fits readable modern English and avoids over-specifying age while retaining the contrast with 'living.'
- source_word: וְהָמֵת אַל תְּמִיתֻהוּ
  chosen: and by no means put him to death
  alternatives:
  - and do not kill him
  - and you must not put him to death
  lexicon: HALOT
  rationale: The infinitive absolute plus finite verb intensifies the prohibition. 'By no means put him to death' captures the emphatic force more clearly than a simple 'do not kill him.'
- source_word: וְזֹאת אֹמֶרֶת
  chosen: But the other said
  alternatives:
  - And this one said
  - But she said
  lexicon: HALOT
  rationale: The demonstrative refers contrastively to the second woman. English normally makes the contrast explicit with 'the other' rather than the wooden 'this one.'
- source_word: גַּם לִי גַם לָךְ לֹא יִהְיֶה
  chosen: He shall be neither mine nor yours
  alternatives:
  - It shall be neither mine nor yours
  - Neither to me nor to you shall he belong
  lexicon: HALOT
  rationale: The implied subject is the child. 'He shall be neither mine nor yours' is idiomatic and preserves the possessive rivalry in context.
- source_word: גְּזֹרוּ
  chosen: cut him in two
  alternatives:
  - divide him
  - cut
  lexicon: HALOT
  rationale: The imperative is abrupt and cruel; in context it refers to dividing the child, as established in the preceding verse. Supplying 'him in two' makes the English explicit and coherent.
