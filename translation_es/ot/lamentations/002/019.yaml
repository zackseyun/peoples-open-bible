revisions:
- from: '[a] Levántate, da voces en la noche, al comenzar las vigilias; derrama tu corazón como agua delante del rostro del Señor. Alza hacia él tus manos por la vida de tus hijitos, que desfallecen de hambre en la esquina de cada calle.'
  to: Levántate, clama en la noche, al comenzar las vigilias; derrama tu corazón como agua delante del rostro del Señor. Alza hacia él tus manos por la vida de tus pequeños hijos, que desfallecen de hambre al comienzo de cada calle[a].
  rationale: 'Se corrige el principal desajuste con la auditoría POB: el texto principal vuelve a una forma cercana al hebreo («al comienzo de cada calle») y la alternativa idiomática «en la esquina de cada calle» queda en nota, anclada en el lugar correcto. También se suaviza «da voces» a «clama» para mejor naturalidad y se ajusta «hijitos» a «pequeños hijos», que evita exceso de diminutivo y mantiene el pathos sin infantilizar demasiado. No se requiere adjudicación adicional.'
  reviewer_model: gpt-5.4
