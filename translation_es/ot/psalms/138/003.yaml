revisions:
- from: En el día en que clamé, tú me respondiste; me hiciste valiente[a] en mi alma con fuerza.
  to: El día en que te llamé, tú me respondiste; me hiciste valiente[a] en mi alma con fuerza.
  rationale: Se ajusta «clamé» a «te llamé» para seguir mejor la decisión léxica documentada para קָרָאתִי sin añadir intensidad no explícita. Se mejora «En el día en que» a «El día en que» por naturalidad española conservando la expresión temporal concreta. Se conserva la cláusula principal difícil con «me hiciste valiente en mi alma con fuerza» porque mantiene la tensión del hebreo y la visibilidad de «alma» y «fuerza», pero se corrige la nota para eliminar anglicismos y expresar mejor las alternativas auditadas.
