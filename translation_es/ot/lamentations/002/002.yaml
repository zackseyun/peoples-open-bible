source:
  edition: WLC
  text: בִּלַּ֨ע אֲדֹנָ֜/י לא חָמַ֗ל אֵ֚ת כָּל נְא֣וֹת יַעֲקֹ֔ב הָרַ֧ס בְּ/עֶבְרָת֛/וֹ מִבְצְרֵ֥י בַת יְהוּדָ֖ה הִגִּ֣יעַ לָ/אָ֑רֶץ חִלֵּ֥ל מַמְלָכָ֖ה וְ/שָׂרֶֽי/הָ־־׃ס
base_translation:
  language: en
  yaml_path: translation/ot/lamentations/002/002.yaml
  text: The Lord has swallowed up[a], without pity, all the habitations of Jacob; in his wrath he has torn down the strongholds of the daughter of Judah; he has brought them down to the ground[c][b]; he has defiled the kingdom and its princes.
  footnotes:
  - marker: a
    text: Or 'the dwellings of Jacob' or 'the habitations of Jacob.' The Hebrew term can refer to pastures or dwelling places.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'daughter Judah,' a poetic personification of Judah.
    reason: cultural_note
  - marker: c
    text: Or 'has profaned the kingdom and its princes.'
    reason: lexical_alternative
