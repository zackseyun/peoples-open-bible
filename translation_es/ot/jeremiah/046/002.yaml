base_translation:
  language: en
  yaml_path: translation/ot/jeremiah/046/002.yaml
  text: 'Concerning Egypt: concerning the army of Pharaoh Neco king of Egypt[a], which was by the Euphrates River at Carchemish, which Nebuchadnezzar king of Babylon struck down in the fourth year of Jehoiakim son of Josiah[b], king of Judah.'
  footnotes:
  - marker: a
    text: Hebrew could also be rendered 'Against Egypt' at the heading; here 'Concerning Egypt' is chosen because the verse functions as a superscription introducing the subject of the oracle.
    reason: alternative_reading
  - marker: b
    text: The Hebrew name form here is closer to 'Nebuchadrezzar'; English tradition commonly uses 'Nebuchadnezzar.'
    reason: lexical_alternative
