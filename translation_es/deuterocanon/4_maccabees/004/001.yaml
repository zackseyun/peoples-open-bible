base_translation:
  language: en
  yaml_path: translation/deuterocanon/4_maccabees/004/001.yaml
  text: For a certain Simon[a], opposing Onias, who had once held the high priesthood for life, a noble and good man, when he was unable, though slandering him in every way, to harm him on behalf of the nation, went away as an exile[b], intending to betray his homeland.
  footnotes:
  - marker: a
    text: Or 'departed as a fugitive'; the Greek φυγάς can denote either an exile or one in flight.
    reason: lexical_alternative
  - marker: b
    text: The phrase 'in matters concerning the nation' reflects a cautious rendering of the Greek ὑπὲρ τοῦ ἔθνους, which may also be understood more specifically as 'with respect to the nation' or, less likely in context, 'on behalf of the nation.'
    reason: lexical_alternative
