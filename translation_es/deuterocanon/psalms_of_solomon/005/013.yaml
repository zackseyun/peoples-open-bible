translation:
  language: es
  text: Tú alimentas a reyes y gobernantes y pueblos, oh Dios, ¿y quién es la esperanza de los pobres y necesitados, si no tú, Señor?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿qué esperanza tienen los pobres y necesitados, si no tú, Señor?»'
    reason: previous_rendering
lexical_decisions:
- source_word: τρέφεις
  english_pob_choice: feed
  chosen_spanish: alimentas
  alternatives_spanish:
  - nutres
  - sustentas
  - das de comer
  lexicon: LSJ
  rationale: El verbo griego se refiere literalmente a alimentar o nutrir. Dado el contexto inmediato de provisión concreta, «alimentas» conserva la fuerza directa sin volver la frase demasiado técnica ni espiritualizarla como «sustentas».
- source_word: ἄρχοντας
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - príncipes
  - líderes
  - autoridades
  lexicon: LSJ
  rationale: «Gobernantes» comunica de forma clara la idea de quienes ejercen poder de gobierno, sin restringir innecesariamente el término a una forma monárquica como «príncipes».
- source_word: λαοὺς
  english_pob_choice: peoples
  chosen_spanish: pueblos
  alternatives_spanish:
  - naciones
  - gentes
  lexicon: LSJ
  rationale: El plural griego señala grupos colectivos; «pueblos» mantiene mejor esa pluralidad que una referencia más política como «naciones».
- source_word: πτωχοῦ
  english_pob_choice: poor
  chosen_spanish: pobres
  alternatives_spanish:
  - pobres de solemnidad
  - desposeídos
  lexicon: LSJ
  rationale: «Pobres» es la equivalencia natural y transparente en español, y funciona bien en paralelo con el segundo término de la pareja.
- source_word: πένητος
  english_pob_choice: needy
  chosen_spanish: necesitados
  alternatives_spanish:
  - menesterosos
  - indigentes
  lexicon: LSJ
  rationale: «Necesitados» distingue parcialmente πένητος de πτωχός y conserva la idea de carencia y vulnerabilidad social sin sonar arcaico.
- source_word: ἡ ἐλπὶς
  english_pob_choice: hope
  chosen_spanish: la esperanza
  alternatives_spanish:
  - la esperanza
  - el apoyo
  - el amparo
  lexicon: LSJ
  rationale: Se mantiene el sustantivo «esperanza», porque el griego no introduce un matiz como «auxilio»; la afirmación teológica es que el Señor mismo es la esperanza de los marginados.
- source_word: Κύριε
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor
  - Soberano
  lexicon: LSJ
  rationale: En vocativo dirigido a Dios, «Señor» conserva la reverencia y la consistencia terminológica del título divino en español.
theological_decisions:
- issue: Sentido de τρέφεις en el contexto de provisión divina
  english_pob_reading: God feeds kings, rulers, and peoples; the emphasis is on concrete provision across social ranks.
  chosen_spanish_reading: Dios alimenta a reyes, gobernantes y pueblos, con énfasis en provisión concreta para todos los niveles sociales.
  alternative_spanish_readings:
  - Dios sustenta a reyes, gobernantes y pueblos
  - Dios cuida de reyes, gobernantes y pueblos
  rationale: El contexto inmediato favorece una imagen concreta de alimentación/provisión, no solo de sostén general. Por eso «alimentas» preserva la fuerza material del verbo y la amplitud universal de la provisión divina.
  doctrine_reference: Providencia divina
- issue: Estructura de la pregunta final
  english_pob_reading: The line asks who is the hope of the poor and needy, if not the Lord.
  chosen_spanish_reading: La cláusula final pregunta quién es la esperanza de los pobres y necesitados, si no el Señor mismo.
  alternative_spanish_readings:
  - ¿qué esperanza tienen los pobres y necesitados, si no tú, Señor?
  - ¿quién es la esperanza de los pobres y necesitados, sino tú, Señor?
  rationale: El griego usa τίς ἐστιν, una pregunta identificadora. «¿Quién es la esperanza...?» conserva mejor la sintaxis y la identificación directa del Señor como la esperanza personificada de los pobres.
  doctrine_reference: Dependencia exclusiva de Dios
translation_notes:
  revision_awareness: La revisión del audit trail corrigió una expansión duplicada y confirmó que el verbo debe mantenerse con fuerza concreta de alimentación, no sustituirse por un equivalente más genérico. En esta versión se adopta esa dirección y se evita cualquier duplicación o glosa ajena al griego. También se preserva la pregunta directa del original («¿quién es la esperanza...?») en vez de reformularla como «¿qué esperanza tienen...?».
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός y «Señor» para Κύριε en vocativo.
  - Se conserva «pobres y necesitados» para reflejar la pareja πτωχοῦ / πένητος sin borrar su matiz doble.
  - Se prefiere un español litúrgicamente respetuoso pero no arcaizante.
  - La puntuación separa la afirmación de provisión divina de la pregunta final, siguiendo la estructura del griego.
