    text: 'O más literalmente: “sobre las cuales ha sido invocado mi nombre”. Este modismo hebreo expresa pertenencia o que Yahvé las reclama como suyas.'
    reason: lexical_alternative
  - marker: b
    text: 'La forma griega citada en Hechos 15:17 difiere notablemente, con una lectura como: “para que el remanente de la humanidad busque al Señor, y todas las naciones sobre las cuales ha sido invocado mi nombre”.'
    reason: textual_variant
  revision_rationale: Se ajusta la coordinación del objeto directo para reflejar mejor el hebreo ('y todas las naciones') y se restituye en el texto principal la opción idiomática que comunica pertenencia ('que son llamadas por mi nombre'), dejando la formulación más literal en nota, en línea con la auditoría del POB inglés. También se suaviza 'el que hace esto' a 'quien hace esto' por naturalidad sin pérdida de sentido.
