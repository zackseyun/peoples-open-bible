review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro de auditoría inglés: conserva la personificación de la sabiduría, refleja μετὰ σοῦ como cercanía relacional, mantiene ''mundo'' para κόσμος con nota alternativa, y traduce adecuadamente el discernimiento de lo agradable y lo recto. Sin embargo, hay un desajuste menor de tiempo/aspecto en ''está ... y estaba presente'', donde el presente seguido del imperfecto suena menos natural en español para una cadena descriptiva coordinada; además, ''hiciste'' para ἐποίεις puede aceptarse, pero ''hacías'' armoniza mejor con el imperfecto griego y con ''cuando''.'
  spanish_quality_summary: 'El español es claro, digno y eclesialmente legible. La sintaxis general funciona bien, pero una leve pulida mejora la fluidez: ''Y contigo está la sabiduría ... y estaba presente'' mezcla tiempos de forma algo áspera. ''Y contigo está la sabiduría ... y está presente'' no encaja por el contexto creacional pasado; por eso conviene reformular con ''está ... estuvo presente'' o, mejor, mantener presente existencial con pasado puntual y usar ''cuando hacías el mundo'' para suavizar la secuencia. También es preferible ''ante tus ojos'' frente a ''a tus ojos'' por idiomaticidad en este giro evaluativo.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto: ''la sabiduría'', ''mundo'', ''mandamientos''. No hay términos de alta sensibilidad como Yahvé, Mesías, Espíritu o esclavo en este verso. La nota sobre κόσμος está bien preservada.'
  issues:
  - severity: medium
    issue: Mezcla algo torpe de tiempos verbales en 'está ... y estaba presente'
    rationale: Aunque no es incorrecto, en español la secuencia coordinada suena menos natural que una formulación más pulida. El verso describe una realidad vigente ('está contigo') y una presencia en el momento de la creación; conviene afinar la relación temporal para mejor legibilidad.
  - severity: low
    issue: '''a tus ojos'' es menos idiomático que ''ante tus ojos'' en este contexto'
    rationale: Ambas opciones son comprensibles, pero 'ante tus ojos' suena más natural en español bíblico moderno y conserva la perspectiva evaluativa del original sin pérdida de sentido.
  - severity: low
    issue: '''hiciste'' refleja el sentido global, pero ''hacías'' representa mejor ἐποίεις'
    rationale: El imperfecto griego puede expresarse mejor en español con un imperfecto en la subordinada temporal, especialmente en una descripción de acompañamiento durante la acción creadora.
  revised_spanish_text: Y contigo está la sabiduría[a], que conoce tus obras, y estuvo presente cuando hacías el mundo, y entiende lo que es agradable ante tus ojos y lo que es recto según tus mandamientos.
  revised_footnotes:
  - marker: a
    text: O 'el cosmos'. El griego κόσμος puede enfatizar el mundo ordenado.
    reason: lexical_alternative
  revision_rationale: 'La revisión mantiene intacto el sentido del griego y del POB inglés, pero mejora la naturalidad del español: se afina la secuencia temporal con ''estuvo presente cuando hacías'', se cambia ''a tus ojos'' por ''ante tus ojos'' por mejor idiomaticidad, y se conserva la nota léxica sobre κόσμος sin cambios. No se requiere adjudicación adicional porque los ajustes son estilísticos y de matiz aspectual, no doctrinales ni textualmente inciertos.'
