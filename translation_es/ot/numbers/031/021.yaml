translation:
  language: es
  text: 'Entonces Eleazar el sacerdote dijo a los hombres del ejército que habían venido a la batalla[a]: «Este es el estatuto de la ley que Yahvé mandó a Moisés».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ordenanza de la ley» o «el estatuto de la instrucción».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: HALOT
  rationale: La forma narrativa con waw consecutivo avanza la acción; «Entonces» reproduce en español la secuencia narrativa sin sonar rígido.
- source_word: אֶלְעָזָר
  english_pob_choice: Eleazar
  chosen_spanish: Eleazar
  lexicon: convención onomástica
  rationale: Nombre propio transliterado de manera estándar.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el sacerdote oficiante
  lexicon: HALOT
  rationale: El título es directo y claro en español; «sacerdote» comunica el oficio sin añadir matices no presentes en el hebreo.
- source_word: אַנְשֵׁי הַצָּבָא
  english_pob_choice: the men of the army
  chosen_spanish: los hombres del ejército
  alternatives_spanish:
  - los soldados
  - los hombres de guerra
  lexicon: HALOT
  rationale: אַנְשֵׁי es literalmente «hombres de»; «ejército» conserva el colectivo militar de צָבָא. Se evita «soldados» por ser más interpretativo.
- source_word: הַבָּאִים לַמִּלְחָמָה
  english_pob_choice: who had come to the battle
  chosen_spanish: que habían venido a la batalla
  alternatives_spanish:
  - que venían a la guerra
  - que habían llegado al combate
  lexicon: HALOT
  rationale: El participio expresa a los que «vienen/llegan» en relación con la guerra. «Habían venido» mantiene el sentido de desplazamiento sin afirmar explícitamente un retorno que el hebreo no dice.
- source_word: זֹאת
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Ésta es
  - Esto es
  lexicon: HALOT
  rationale: En español es natural suplir el verbo copulativo en una cláusula nominal.
- source_word: חֻקַּת הַתּוֹרָה
  english_pob_choice: the statute of the law
  chosen_spanish: la estatuta de la ley
  alternatives_spanish:
  - el estatuto de la ley
  - la ordenanza de la ley
  - la disposición de la ley
  lexicon: HALOT
  rationale: חֻקָּה designa una norma fija/establecida; para mantener la correspondencia formal con el trail inglés, se usa «estatuta» como femenino concordando con «esta». Se reconoce que «estatuto» es la forma más usual en español, pero aquí se conserva la tensión del inglés «statute» frente a posibles equivalentes como «ordenanza».
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Yahveh
  lexicon: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
  rationale: 'Se sigue el criterio del proyecto para el nombre divino: «Yahvé» en lugar de la sustitución litúrgica «SEÑOR».'
- source_word: אֶת מֹשֶׁה
  english_pob_choice: that the LORD commanded Moses
  chosen_spanish: mandó a Moisés
  alternatives_spanish:
  - mandó Moisés
  - mandó por medio de Moisés
  lexicon: HALOT
  rationale: El marcador de objeto directo indica a Moisés como destinatario del mandato, no como mediador. «Mandó a Moisés» preserva esa relación sintáctica y semántica.
theological_decisions:
- issue: Nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - SEÑOR
  - Yahveh
  rationale: El texto hebreo usa explícitamente el Tetragrámaton. La política del proyecto pide no ocultarlo con una sustitución, por lo que se traslada como «Yahvé».
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: la lectura estable es de alta concordancia y no requiere cambios textuales. La única tensión relevante es léxica en חֻקַּת הַתּוֹרָה, donde el inglés preserva alternativas («ordinance/statute/instruction»); en español se mantiene una opción principal y se anota la alternativa.'
  spanish_consistency_notes:
  - Se preserva el nombre divino como «Yahvé», coherente con el estándar del proyecto.
  - «Batalla» traduce לַמִּלְחָמָה con un término natural y suficientemente formal en español.
  - Se mantiene el paralelismo sintáctico del hebreo con una oración principal seguida de relativa.
  - La nota al pie marca la alternativa lexical sin duplicar marcadores.
