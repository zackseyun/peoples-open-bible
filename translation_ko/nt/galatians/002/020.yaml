  text: ζῶ δὲ οὐκέτι ἐγώ, ζῇ δὲ ἐν ἐμοὶ Χριστός· ὃ δὲ νῦν ζῶ ἐν σαρκί, ἐν πίστει ζῶ τῇ τοῦ ⸂υἱοῦ τοῦ θεοῦ⸃ τοῦ ἀγαπήσαντός με καὶ παραδόντος ἑαυτὸν ὑπὲρ ἐμοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/galatians/002/020.yaml
  text: And it is no longer I who live[a], but Messiah lives in me. And the life that I now live in the flesh, I live by faith in the Son of God, who loved me and gave himself for me.
  footnotes:
  - marker: a
    text: Or, “I live by the faithfulness of the Son of God.”
    reason: alternative_reading
translation:
  language: ko
  text: 이제는 내가 사는 것이 아니라 메시아께서 내 안에 사십니다. 내가 지금 육체 안에서 사는 삶은 나를 사랑하시고 나를 위하여 자기를 내어주신 하나님의 아들의 믿음[a] 안에서 사는 것입니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「하나님의 아들을 믿는 믿음」 또는 「하나님의 아들의 신실하심」. 갈 2:16의 πίστις Χριστοῦ와 같은 양면적 모호성을 지닌다.
    reason: alternative_reading
lexical_decisions:
- source_word: ζῇ δὲ ἐν ἐμοὶ Χριστός
  english_pob_choice: Messiah lives in me
  chosen_korean: 메시아께서 내 안에 사신다
  alternatives_korean:
