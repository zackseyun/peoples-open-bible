translation:
  language: es
  text: Toda la tierra está en reposo y tranquila[a]; prorrumpen en cánticos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Toda la tierra ha descansado y está tranquila; prorrumpen en canto jubiloso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: נָחָה
  english_pob_choice: is at rest
  chosen_spanish: está en reposo
  alternatives_spanish:
  - ha descansado
  - descansa
  lexicon: HALOT
  rationale: El qal perfecto de נוח describe aquí un estado resultante. En español, «está en reposo» comunica ese estado presente con naturalidad y conserva la idea de quietud asentada, sin forzar un pasado narrativo.
- source_word: שָׁקְטָה
  english_pob_choice: quiet
  chosen_spanish: tranquila
  alternatives_spanish:
  - en calma
  - quieta
  - serena
  lexicon: HALOT
  rationale: שקט complementa a נוח como doble descripción de paz/estabilidad. «Tranquila» mantiene esa calma estable y funciona bien junto a «en reposo» sin sonar redundante o demasiado literal.
- source_word: כָּל הָאָרֶץ
  english_pob_choice: All the earth
  chosen_spanish: Toda la tierra
  alternatives_spanish:
  - Toda la tierra habitada
  - Toda la tierra
  lexicon: HALOT
  rationale: אָרֶץ puede significar «tierra» o «país/land», pero aquí el alcance universal de כָּל favorece «toda la tierra». «Tierra» es una opción amplia y natural en español para este contexto.
- source_word: פָּצְחוּ
  english_pob_choice: they break out
  chosen_spanish: prorrumpe
  alternatives_spanish:
  - estallan
  - rompen a cantar
  - prorrumpen
  lexicon: HALOT
  rationale: El verbo expresa un estallido hacia el sonido o el canto. «Prorrumpe» conserva bien ese valor ingesivo y solemne en español, con un tono bíblico sobrio.
- source_word: רִנָּה
  english_pob_choice: in singing
  chosen_spanish: en cánticos
  alternatives_spanish:
  - en canto
  - con júbilo
  - en canto gozoso
  lexicon: HALOT
  rationale: רִנָּה denota grito resonante o canto jubiloso. «Cánticos» transmite de forma natural el carácter vocal y celebrativo, y en español bíblico evita la construcción algo plana de «en canto».
translation_notes:
  revision_awareness: El hebreo presenta una descripción paralela de paz y quietud (נָחָה / שָׁקְטָה) seguida por un estallido de canto (פָּצְחוּ רִנָּה). La redacción española conserva esa secuencia y mantiene la alternativa de traducción señalada en el audit trail inglés.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; no hay tétragrama en este versículo.
  - «Toda la tierra» conserva el alcance universal de כָּל הָאָרֶץ.
  - La combinación «en reposo y tranquila» reproduce la duplicación semántica del hebreo sin sobredeterminarla.
