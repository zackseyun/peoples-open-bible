    rationale: No es incorrecto, pero 'le hablaron a Josué' o 'hablaron con Josué' suena más idiomático. Dado que el hebreo usa אֶת con el interlocutor, una formulación más natural mejora la legibilidad sin alterar el sentido.
  revised_spanish_text: 'Entonces los hijos de José le hablaron a Josué, diciendo: «¿Por qué me has dado un solo lote y una sola porción[a] como herencia, aunque soy un pueblo numeroso, ya que Yahvé me ha bendecido hasta ahora?»'
