translation:
  language: es
  text: Con el soplo de tus narices las aguas se amontonaron[a]; las aguas que fluían se detuvieron como un montón[b][c]; los abismos se cuajaron en el corazón del mar[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el soplo de tus narices».
    reason: lexical_alternative
  - marker: b
    text: «Montón» refleja el sustantivo hebreo; algunas traducciones dicen «muralla» por influencia de la imagen narrativa del cruce del mar.
    reason: lexical_alternative
  - marker: c
    text: O «se helaron». El verbo hebreo puede expresar espesarse, cuajarse o congealarse.
    reason: lexical_alternative
  - marker: d
    text: Literalmente «en el corazón del mar», es decir, en medio del mar.
    reason: lexical_alternative
lexical_decisions:
- source_word: וּבְרוּחַ
  english_pob_choice: At the blast of
  chosen_spanish: Con el soplo de
  alternatives_spanish:
  - Con el aliento de
  - Al soplo de
  lexicon: HALOT
  rationale: רוּחַ puede significar viento, aliento o espíritu. En este contexto poético, unido a "tus narices", la imagen es la de un soplo poderoso. "Soplo" preserva la fuerza expresiva sin perder la metáfora corporal.
- source_word: אַפֶּיךָ
  english_pob_choice: your nostrils
  chosen_spanish: tus narices
  alternatives_spanish:
  - tu nariz
  - tu furor
  lexicon: HALOT
  rationale: El hebreo presenta una imagen corporal concreta. "Narices" conserva el plural y la metáfora antropomórfica mejor que una abstracción como "furor".
- source_word: נֶעֶרְמוּ
  english_pob_choice: piled up
  chosen_spanish: se amontonaron
  alternatives_spanish:
  - se apilaron
  - se amontonaron unas sobre otras
  lexicon: HALOT
  rationale: El verbo expresa acumularse en montones. "Se amontonaron" es natural en español y mantiene la idea de masa acumulada.
- source_word: מַיִם
  english_pob_choice: the waters
  chosen_spanish: las aguas
  alternatives_spanish:
  - aguas
  lexicon: HALOT
  rationale: El plural con artículo funciona bien en español como referente poético de las aguas del mar. "Las aguas" mantiene solemnidad y claridad.
- source_word: נִצְּבוּ
  english_pob_choice: stood
  chosen_spanish: se detuvieron
  alternatives_spanish:
  - se mantuvieron firmes
  - quedaron en pie
  lexicon: HALOT
  rationale: Aunque el verbo básico es "estar de pie", aquí la imagen del agua es de suspensión inmóvil. "Se detuvieron" comunica esa quietud sin abandonar el movimiento poético del verso.
- source_word: כְמוֹ נֵד
  english_pob_choice: like a heap
  chosen_spanish: como un montón
  alternatives_spanish:
  - como un montón de tierra
  - como una muralla
  lexicon: HALOT
  rationale: נֵד designa primariamente un montón o pila. "Montón" refleja el valor léxico más directo; "muralla" quedaría demasiado interpretativa.
- source_word: נֹזְלִים
  english_pob_choice: the flowing waters
  chosen_spanish: las aguas que fluían
  alternatives_spanish:
  - las aguas corrientes
  - las aguas manantes
  lexicon: HALOT
  rationale: El participio describe aguas en acción de fluir. Una construcción relativa en español preserva el valor verbal sin introducir un sustantivo ajeno.
- source_word: קָפְאוּ
  english_pob_choice: congealed
  chosen_spanish: se cuajaron
  alternatives_spanish:
  - se congelaron
  - se helaron
  lexicon: HALOT
  rationale: El verbo puede implicar espesarse, coagularse o cuajarse. "Cuajaron" en español conserva la idea de solidificación o espesamiento poético sin reducirla a un congelamiento físico moderno.
- source_word: תְהֹמֹת
  english_pob_choice: the depths
  chosen_spanish: los abismos
  alternatives_spanish:
  - las profundidades
  - las honduras
  lexicon: HALOT
  rationale: תְהֹמֹת alude a las aguas profundas y abismales. "Abismos" mantiene el tono solemne y la resonancia poética de la imagen.
- source_word: בְּלֶב יָם
  english_pob_choice: in the heart of the sea
  chosen_spanish: en el corazón del mar
  alternatives_spanish:
  - en medio del mar
  - en lo profundo del mar
  lexicon: HALOT
  rationale: El hebreo dice literalmente "en el corazón del mar". Mantener "corazón" conserva la metáfora y su fuerza poética.
theological_decisions:
- issue: Imagen antropomórfica de Dios en el cántico del mar
  english_pob_reading: Retain the concrete imagery of God's 'nostrils' and their 'blast' as poetic anthropomorphism.
  chosen_spanish_reading: Conservar la imagen concreta de las "narices" de Dios y su "soplo" como antropomorfismo poético.
  alternative_spanish_readings:
  - Reformular como "con tu ira"
  - Espiritualizar la imagen a "con tu poder"
  rationale: El hebreo usa deliberadamente lenguaje corporal. Traducirlo de forma abstracta suavizaría una tensión textual real y borraría la fuerza imagética del poema.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La pasarela de revisión más reciente indica que no hubo cambios necesarios y el control cruzado reporta alto acuerdo (1.0). Se mantiene, por tanto, la lectura poética concreta del hebreo y las opciones léxicas ya auditadas por la POB inglesa.
  spanish_consistency_notes:
  - Se conserva el antropomorfismo bíblico sin sustituirlo por una abstracción doctrinal.
  - '"Aguas" y "abismos" mantienen el tono poético y solemne del cántico.'
  - '"Cuajaron" se elige por su valor de espesarse/coagularse, no por sentido culinario.'
  - Los marcadores de nota se colocan en el texto exactamente donde corresponde cada alternativa.
