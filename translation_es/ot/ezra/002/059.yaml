review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del hebreo y sigue de cerca la auditoría inglesa: los nombres se transliteran, הָעֹלִים se conserva como «los que subieron», y la cláusula final mantiene la incertidumbre sobre su ascendencia israelita. Sin embargo, hay un problema de fidelidad/estilo en la transliteración de varios nombres propios, que no debería depender de acentos españoles inventados ni de una forma semánticamente cargada como «Adán».'
  spanish_quality_summary: El español es claro y legible, con registro adecuado. «No pudieron declarar» y «su descendencia» funcionan bien. Pero «Tel-mélaj», «Tel-harshá» y especialmente «Adán» suenan impropios en una edición bíblica moderna y pueden confundir al lector. Conviene normalizar los nombres a formas transliteradas estables y neutrales. También la nota al pie puede pulirse para sonar más natural en español.
  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. Las decisiones léxicas para «casa de sus padres» y «descendencia» concuerdan con la racionalidad documentada. La revisión propuesta solo ajusta la presentación de nombres propios y la redacción de la nota.
  issues:
  - severity: medium
    issue: Transliteración inconsistente o engañosa de nombres propios
    rationale: '«Tel-mélaj» y «Tel-harshá» añaden tildes innecesarias, y «Adán» puede confundirse con el nombre bíblico Adam en vez de representar Addan. Dado que el inglés auditado usa Tel-melah, Tel-harsha, Kerub, Addan, and Immer, el español debe reflejar esos nombres con formas más estables: «Tel-mélah»/«Tel-harsha» o, mejor, sin adaptar de modo confuso. «Addán» preserva mejor el nombre que «Adán».'
  - severity: low
    issue: Nota al pie algo forzada en su alternativa
    rationale: «La casa ancestral de ellos» suena poco idiomático. En español natural y fiel, «su casa ancestral» o «su casa paterna y su descendencia» expresa mejor la alternativa sin perder el matiz genealógico.
  revised_spanish_text: Y estos fueron los que subieron de Tel-melah[a], Tel-harsha, Querub, Addán e Imer; pero no pudieron declarar la casa de sus padres ni su descendencia, si eran de Israel.
  revised_footnotes:
