base_translation:
  language: en
  yaml_path: translation/ot/job/018/002.yaml
  text: How long will you set snares for words? Understand[b][a], and afterward we will speak.
  footnotes:
  - marker: a
    text: Or 'How long will you set limits to words?' The Hebrew phrase is difficult, and some take it as a complaint about endless talk rather than verbal entrapment.
    reason: lexical_alternative
  - marker: b
    text: Or 'then let us speak.' The final verb may be heard as an invitation as well as a simple future.
    reason: lexical_alternative
