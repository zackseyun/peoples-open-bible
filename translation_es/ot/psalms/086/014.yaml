  text: אֱלֹהִ֤ים זֵ֘דִ֤ים קָֽמוּ עָלַ֗/י וַ/עֲדַ֣ת עָ֭רִיצִים בִּקְשׁ֣וּ נַפְשִׁ֑/י וְ/לֹ֖א שָׂמ֣וּ/ךָ לְ/נֶגְדָּֽ/ם׀־׃
base_translation:
  language: en
  yaml_path: translation/ot/psalms/086/014.yaml
