  text: I will shatter Elam before their enemies and before those who seek their life[a]. I will bring disaster on them, my burning anger, declares Yahweh[c][b], and I will send the sword after them until I have consumed them.
  footnotes:
  - marker: a
    text: Or “I will terrify Elam” or “I will dismay Elam”; the Hebrew verb can emphasize causing panic or causing collapse.
    reason: lexical_alternative
  - marker: b
    text: Hebrew “those who seek their life,” an idiom for those seeking to kill them.
    reason: lexical_alternative
  - marker: c
    text: Or “calamity”; Hebrew רָעָה here refers to disaster/judgment, not moral evil.
    reason: lexical_alternative
