base_translation:
  language: en
  yaml_path: translation/ot/2_chronicles/034/017.yaml
  text: They have emptied out the silver that was found in the house of Yahweh and have delivered it into the hand of the overseers and into the hand of those doing the work[a][b].
  footnotes:
