revisions:
- from: Y salió fuego de delante de Yahvé y consumió sobre el altar el holocausto y las grasas[a]. Y todo el pueblo lo vio[b], y gritaron con júbilo y cayeron sobre sus rostros.
  to: Y salió fuego de delante de Yahvé[a] y consumió sobre el altar el holocausto y las porciones de grasa. Y todo el pueblo vio, y gritaron con júbilo[b] y cayeron rostro en tierra.
  rationale: La revisión elimina una explicitación no presente en el hebreo («lo»), mejora la precisión sacrificial de הַחֲלָבִים con «las porciones de grasa», y sustituye un giro español poco natural por una expresión más idiomática de postración sin perder la imagen concreta. También se conserva como nota la alternativa para «de delante de Yahvé», alineada con el rastro auditado inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:48:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del hebreo: salió fuego de delante de Yahvé, consumió el sacrificio sobre el altar, el pueblo vio, lanzó un clamor jubiloso y cayó en reverencia. También respeta correctamente el nombre divino «Yahvé». Sin embargo, dos elecciones necesitan ajuste para mayor fidelidad y naturalidad: «todo el pueblo lo vio» añade un objeto no expreso en hebreo, y «cayeron sobre sus rostros» suena poco idiomático en español para עַל־פְּנֵיהֶם.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero contiene giros algo rígidos. «Salió fuego de delante de Yahvé» y «consumió sobre el altar» funcionan. «Las grasas» es entendible pero menos preciso que «las porciones de grasa» en este contexto sacrificial. «Cayeron rostro en tierra» o «cayeron sobre sus rostros» puede sonar forzado; «cayeron sobre sus rostros» es menos natural que una formulación idiomática como «cayeron rostro en tierra» o «cayeron sobre sus rostros ante él», pero la mejor combinación de fidelidad e idiomaticidad aquí es «cayeron rostro en tierra».
  glossary_alignment: Alineación buena con la terminología del proyecto en «Yahvé». «Holocausto» es una elección defendible para עֹלָה dentro del español bíblico. Para הַחֲלָבִים, el inglés auditado privilegia la especificidad cultual («fat portions»), por lo que en español conviene elevar «las grasas» a «las porciones de grasa» en el texto principal, no solo en nota.
  issues:
  - severity: medium
    issue: Se añade el objeto «lo» en «todo el pueblo lo vio».
    rationale: El hebreo dice simplemente «y vio todo el pueblo». Aunque el contexto permite inferir qué vieron, añadir «lo» explicita un objeto ausente y estrecha innecesariamente la formulación narrativa.
  - severity: medium
    issue: «Las grasas» pierde parte de la especificidad cultual de הַחֲלָבִים.
    rationale: En contexto sacrificial no se trata de grasa genérica sino de las piezas/porciones grasas destinadas a la ofrenda. El inglés POB documenta esa precisión; «las porciones de grasa» la preserva mejor en español.
  - severity: medium
    issue: «Cayeron sobre sus rostros» es poco idiomático en español actual.
    rationale: Aunque reproduce de cerca el hebreo, suena rígido. Una formulación como «cayeron rostro en tierra» conserva la imagen concreta de postración y mejora la legibilidad eclesial en español.
  revised_spanish_text: Y salió fuego de delante de Yahvé[a] y consumió sobre el altar el holocausto y las porciones de grasa. Y todo el pueblo vio, y gritaron con júbilo[b] y cayeron rostro en tierra.
  revised_footnotes:
  - marker: a
    text: O «de la presencia de Yahvé»; hebreo literalmente «de delante de Yahvé».
    reason: lexical_alternative
  - marker: b
    text: O «dieron un grito de júbilo».
    reason: lexical_alternative
  revision_rationale: La revisión elimina una explicitación no presente en el hebreo («lo»), mejora la precisión sacrificial de הַחֲלָבִים con «las porciones de grasa», y sustituye un giro español poco natural por una expresión más idiomática de postración sin perder la imagen concreta. También se conserva como nota la alternativa para «de delante de Yahvé», alineada con el rastro auditado inglés.
