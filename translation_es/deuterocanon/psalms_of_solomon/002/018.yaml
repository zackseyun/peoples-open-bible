lexical_decisions:
- source_word: ἀνέκαλυψας
  english_pob_choice: uncovered
  chosen_spanish: descubriste
  alternatives_spanish:
  - desnudaste
  - develaste
  - pusiste al descubierto
  lexicon: BDAG
  rationale: El verbo griego expresa sacar a la luz lo que estaba oculto. En español, «descubriste» comunica de forma natural esa acción de hacer visibles los pecados sin volver el verso rígido o forzado.
- source_word: ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - ofensas
  lexicon: BDAG
  rationale: «Pecados» conserva el peso moral y teológico de ἁμαρτίας mejor que opciones más débiles como «faltas».
- source_word: ἵνα φανῇ
  english_pob_choice: so that ... might be revealed
  chosen_spanish: para que ... fuera revelado
  alternatives_spanish:
  - a fin de que ... apareciera
  - para que ... se manifestara
  lexicon: BDAG
  rationale: La cláusula final expresa propósito. «Para que ... fuera revelado» sigue de cerca el pasivo de φανῇ y mantiene un español claro y solemne.
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - veredicto
  lexicon: BDAG
  rationale: «Juicio» es el equivalente más amplio y natural en español para κρίμα, sin restringirlo indebidamente a una sentencia formal.
theological_decisions:
- issue: Relación entre descubrir los pecados y la manifestación del juicio divino
  english_pob_reading: You uncovered their sins so that your judgment might be revealed.
  chosen_spanish_reading: Tú descubriste sus pecados para que tu juicio fuera revelado.
  alternative_spanish_readings:
  - Tú descubriste sus pecados para que tu sentencia fuera dada a conocer.
  - Tú descubriste sus pecados para que se manifestara tu juicio.
  rationale: El paralelismo del verso sugiere que la exposición del pecado tiene como fin que la acción judicial de Dios quede patente. «Juicio» preserva la amplitud del término sin reducirlo a condena únicamente.
  doctrine_reference: Salmos de Salomón 2:18; cf. la función judicial divina en textos sapienciales y proféticos.
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «might be seen» a «might be revealed» para acercarse más a φανῇ; por eso el español adopta «fuera revelado» y conserva el paralelismo del original griego.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento en segunda persona singular, coherente con el griego verbal.
  - Se evitó «SEÑOR» porque aquí no aparece el nombre divino ni κύριος como sustituto.
  - «Juicio» se eligió por su amplitud semántica y porque armoniza con el tono judicial del contexto.
  - Las notas al pie están ancladas explícitamente en el texto con [a] y [b].
