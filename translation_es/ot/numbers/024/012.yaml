revisions:
- from: 'Balaam dijo a Balac: “¿No les hablé también a tus mensajeros[a] que enviaste a mí[b], diciendo:”,'
  to: 'Balaán dijo a Balac: «¿No hablé también a tus mensajeros[a] que me enviaste[b], diciendo:»'
  rationale: Se corrige la frase no idiomática «que enviaste a mí» a «que me enviaste», que preserva fielmente אֵלַי en español natural. También se aligera la sintaxis quitando el clítico redundante «les» y se normaliza el nombre a «Balaán» para un registro bíblico español más reconocible. Se conservan el valor retórico de הֲלֹא, el matiz aditivo de גַּם, el sentido humano de מַלְאָכֶיךָ, y la apertura de cita con «diciendo».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:32:53Z'
