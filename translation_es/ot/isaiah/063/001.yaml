    text: 'O: «con vestiduras teñidas de rojo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «dando grandes zancadas» en la grandeza de su poder.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «hablando en justicia».'
    reason: alternative_reading
  revision_rationale: 'Se ajusta el español para seguir más de cerca las decisiones documentadas por POB: ''carmesíes'' expresa con claridad el matiz rojo intenso de חֲמוּץ sin sobreinterpretar la causa; ''marchando'' pasa al texto principal porque corresponde mejor a la elección inglesa principal para צֹעֶה, y la nota conserva una alternativa real; ''rectitud'' pasa al texto principal para reflejar ''righteousness'', dejando ''justicia'' como alternativa en nota conforme al expediente teológico/lexical. También se afina la puntuación para claridad retórica.'
