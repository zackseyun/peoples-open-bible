translation:
  language: es
  text: Y los hebreos cruzaron el Jordán[a] a la tierra de Gad y de Galaad. Pero Saúl todavía estaba en Gilgal[b], y todo el pueblo temblaba detrás de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «israelitas» para «hebreos». El hebreo usa «hebreos», lo que puede reflejar una designación étnica más marcada en este contexto narrativo.
    reason: lexical_alternative
  - marker: b
    text: O «siguiéndolo» para «detrás de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: עִבְרִים
  english_pob_choice: Hebrews
  chosen_spanish: hebreos
  alternatives_spanish:
  - israelitas
  - hombres de Israel
  lexicon: HALOT
  rationale: El hebreo dice literalmente «hebreos». Mantener «hebreos» conserva la designación del texto sin sustituirla por una identificación interpretativa más amplia. En español, «hebreos» es natural y transparente.
- source_word: עָבְרוּ אֶת הַיַּרְדֵּן
  english_pob_choice: crossed over the Jordan
  chosen_spanish: cruzaron el Jordán
  alternatives_spanish:
  - cruzaron al otro lado del Jordán
  - cruzaron el río Jordán
  lexicon: HALOT
  rationale: El verbo עבר expresa el cruce, y en español «cruzaron el Jordán» comunica bien el movimiento sin cargar la frase. «Cruzaron sobre» sería poco natural; la idea direccional ya está implícita en el contexto.
- source_word: אֶרֶץ גָּד וְגִלְעָד
  english_pob_choice: into the land of Gad and Gilead
  chosen_spanish: hacia la tierra de Gad y de Galaad
  alternatives_spanish:
  - a la tierra de Gad y de Galaad
  - en la tierra de Gad y de Galaad
  - hacia el territorio de Gad y de Galaad
  lexicon: HALOT
  rationale: «אֶרֶץ» puede ser «tierra» o «territorio». Aquí «tierra de Gad y de Galaad» mantiene la forma bíblica natural en español y «hacia» refleja el avance tras cruzar el Jordán sin forzar una preposición más rígida que el hebreo no exige.
- source_word: עוֹדֶנּוּ
  english_pob_choice: was still
  chosen_spanish: todavía estaba
  alternatives_spanish:
  - seguía estando
  - aún estaba
  lexicon: HALOT
  rationale: 'La expresión marca continuidad: Saúl permanecía allí en ese momento. «Todavía estaba» suena natural en español y preserva el valor aspectual sin añadir énfasis innecesario.'
- source_word: בַגִּלְגָּל
  english_pob_choice: at Gilgal
  chosen_spanish: en Gilgal
  alternatives_spanish:
  - en el Gilgal
  - at Gilgal
  lexicon: HALOT
  rationale: Los topónimos normalmente se introducen con «en» en español. «En Gilgal» es claro y sobrio; no requiere artículo por tratarse de un nombre propio de lugar.
- source_word: חָרְדוּ
  english_pob_choice: trembled
  chosen_spanish: temblaba
  alternatives_spanish:
  - temblaban
  - tiritaba
  - estaba temblando
  lexicon: HALOT
  rationale: El hebreo expresa temblor por miedo. En español, «temblaba» comunica la reacción física y emocional de manera directa y literaria; aquí se adapta al singular colectivo «todo el pueblo».
- source_word: אַחֲרָיו
  english_pob_choice: behind him
  chosen_spanish: detrás de él
  alternatives_spanish:
  - siguiéndolo
  - tras él
  - después de él
  lexicon: HALOT
  rationale: La imagen espacial de אחר aquí se conserva mejor con «detrás de él». «Siguiéndolo» es una interpretación posible, pero «detrás de él» mantiene más visible la tensión narrativa del hebreo.
translation_notes:
  revision_awareness: 'La revisión disponible no introdujo cambios: el pasaje quedó sin modificaciones respecto del último pase, y la redacción española mantiene la equivalencia óptima con el texto hebreo y el rastro auditado en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino; este versículo no lo contiene.
  - Se conserva «hebreos» como designación étnica literal, en coherencia con la decisión auditada en inglés.
  - «Galaad» se usa como forma española habitual del topónimo; «Gilgal» se deja sin adaptar por ser nombre propio establecido.
  - Se eligió «detrás de él» para preservar la imagen espacial del hebreo, con nota alternativa para la lectura dinámica «siguiéndolo».
