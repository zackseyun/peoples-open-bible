revisions:
- from: Y ahora[a], vive Yahvé, que me ha establecido y me ha hecho sentar en el trono de David mi padre, y que me ha hecho una casa como lo prometió, ciertamente Adonías será muerto hoy.
  to: Y ahora, tan cierto como que Yahvé vive, que me ha establecido y me ha sentado en el trono de David mi padre, y que me ha hecho una casa[a] como lo prometió, ciertamente Adonías será ejecutado hoy.
  rationale: Se reubica la nota al término 'casa' para corresponder al problema léxico real. Se mejora la fórmula de juramento a un español más natural sin perder el sentido de חַי יְהוָה. Se cambia 'será muerto' por 'será ejecutado' para reflejar mejor el matiz jurídico-pasivo de יוּמַת en español claro y digno. También se ajusta 'me ha hecho sentar' a 'me ha sentado' para mayor fluidez conservando el valor causativo.
