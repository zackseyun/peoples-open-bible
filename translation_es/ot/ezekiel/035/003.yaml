translation:
  language: es
  text: 'y le dirás al monte Seír: «Así ha dicho el Señor Yahvé: He aquí, yo estoy contra ti, monte Seír; extenderé mi mano contra ti y te convertiré en una desolación y en una ruina[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y en un objeto de horror/espanto». El segundo sustantivo puede expresar también devastación que provoca horror o asombro.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וְאָמַרְתָּ לּוֹ
  english_pob_choice: and say to it
  chosen_spanish: y dirás a él
  alternatives_spanish:
  - y dirás a él
  - y dirás a eso
  lexicon: HALOT
  rationale: El destinatario es el monte personificado, pero el hebreo usa sufijo masculino singular. En español, 'a él' conserva la forma gramatical del original sin perder la personificación retórica del monte en discurso directo.
- source_word: אֲדֹנָי יְהוִה
  english_pob_choice: the Lord GOD
  chosen_spanish: Adonay Yahvé
  alternatives_spanish:
  - el Señor Yahvé
  - Adonay el Señor
  lexicon: HALOT
  rationale: Se mantiene la distinción entre אֲדֹנָי y el nombre divino יְהוִה. En la tradición POB en español, se prefiere 'Yahvé' para יְהוָה; 'Adonay Yahvé' evita la repetición artificial 'Señor Señor' y preserva ambos títulos.
- source_word: הִנְנִי
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - He aquí
  - Mira, aquí estoy
  lexicon: HALOT
  rationale: '''He aquí'' conserva el tono solemne e introductorio de la declaración profética mejor que una forma conversacional como ''mira''.'
- source_word: אֵלֶיךָ
  english_pob_choice: I am against you
  chosen_spanish: yo estoy contra ti
  alternatives_spanish:
  - estoy contra ti
  - vengo contra ti
  lexicon: HALOT
  rationale: La construcción con הִנְנִי + אֶל en contexto judicial expresa oposición hostil. 'Estoy contra ti' reproduce con claridad esa fuerza sin añadir movimiento no explícito.
- source_word: הַר שֵׂעִיר
  english_pob_choice: Mount Seir
  chosen_spanish: monte Seír
  alternatives_spanish:
  - monte Seír
  - montaña de Seír
  - la serranía de Seír
  lexicon: HALOT
  rationale: Como nombre geográfico personificado, 'monte Seír' es la forma natural en español. 'Seír' conserva el nombre propio sin transliteración excesivamente anglicada.
- source_word: וְנָטִיתִי יָדִי עָלֶיךָ
  english_pob_choice: I will stretch out my hand against you
  chosen_spanish: extenderé mi mano contra ti
  alternatives_spanish:
  - alargaré mi mano contra ti
  - extenderé mi mano contra ti
  lexicon: HALOT
  rationale: '''Extenderé mi mano contra ti'' preserva el idiomatismo hebreo de juicio y castigo. En español resulta natural y mantiene la metáfora corporal del texto.'
- source_word: וּנְתַתִּיךָ
  english_pob_choice: make you
  chosen_spanish: te convertiré en
  alternatives_spanish:
  - te haré
  - te volveré
  lexicon: HALOT
  rationale: 'Con los sustantivos de devastación que siguen, el sentido es causativo: hacer que el destinatario llegue a ser algo. ''Te convertiré en'' mantiene esa fuerza y prepara bien la doble designación posterior.'
- source_word: שְׁמָמָה
  english_pob_choice: a desolation
  chosen_spanish: una desolación
  alternatives_spanish:
  - una desolación
  - un desierto
  - un yermo
  lexicon: HALOT
  rationale: '''Desolación'' refleja el campo semántico de ruina devastada. Se conserva el sustantivo concreto, sin suavizarlo a una imagen menos intensa.'
- source_word: וּמְשַׁמָּה
  english_pob_choice: and a waste
  chosen_spanish: y en una ruina
  alternatives_spanish:
  - y en un yermo
  - y en una devastación
  - y en un espanto
  lexicon: HALOT
  rationale: La segunda palabra intensifica la primera y puede llevar el matiz de devastación resultante. 'Ruina' conserva la idea de destrucción visible y funciona bien junto a 'desolación' en español.
theological_decisions:
- issue: Rendering of the divine name יְהוִה in a verse where it follows אֲדֹנָי
  english_pob_reading: the Lord GOD / doctrinally Yahweh as the covenant name
  chosen_spanish_reading: Adonay Yahvé
  alternative_spanish_readings:
  - el Señor Dios
  - Adonay el Señor
  rationale: El texto hebreo conserva el nombre del pacto, יְהוִה, y la tradición POB en español favorece 'Yahvé'. En la secuencia אֲדֹנָי יְהוִה, 'Adonay Yahvé' evita duplicar 'Señor' y mantiene audible la tensión entre el título soberano y el nombre propio divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for יְהוָה YHWH; Translation philosophy #6'
- issue: Personified geographical addressee with grammatical masculine suffix
  english_pob_reading: and say to it
  chosen_spanish_reading: y dirás a él
  alternative_spanish_readings:
  - y dirás a él
  - y dirás al monte
  rationale: Aunque el referente es el monte Seír, el hebreo usa sufijo masculino singular y lo trata como destinatario personificado. Mantener 'a él' conserva la forma del original sin borrar la personificación profética.
  doctrine_reference: 'POB style principle: preserve source-level personification when the grammar is meaningful'
translation_notes:
  revision_awareness: El contexto auditado muestra acuerdo alto y sin cambios recientes en la revisión más nueva. Se conservó la decisión de traducir el nombre divino como Yahvé, pero se ajustó la secuencia titular hebrea a una forma española natural ('Adonay Yahvé') para evitar una repetición poco idiomática. También se mantuvo la doble imagen final ('desolación' / 'ruina') con nota alternativa para el matiz de horror o espanto.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para יְהוִה conforme al estándar del proyecto en español.
  - Se conserva la personificación del monte con referencia masculina singular, sin neutralizarla.
  - Se mantiene una pareja léxica para שְׁמָמָה / מְשַׁמָּה con dos sustantivos distintos en español.
  - La puntuación y el cierre con comillas siguen un registro bíblico moderno y publicable.
