revisions:
- from: Con ello hizo las bases para la entrada de la tienda de reunión[a], el altar de bronce, la rejilla de bronce para él[b], y todos los utensilios del altar.
  to: Con ello hizo las bases para la entrada de la tienda de reunión[a], el altar de bronce, la rejilla de bronce para el altar[b], y todos los utensilios del altar.
