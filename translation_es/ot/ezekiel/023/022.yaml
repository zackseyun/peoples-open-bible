translation:
  language: es
  text: 'Por tanto[a], Oholibá, así dice el Señor Yahvé: He aquí, yo incito contra ti a tus amantes, aquellos de quienes tu alma se apartó, y los traeré contra ti de todas partes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «aquellos de quienes tu alma sintió repulsión» / «aquellos de quienes te apartaste». El verbo hebreo puede expresar rechazo, repulsión o distanciamiento.'
    reason: lexical_alternative
lexical_decisions:
- source_word: לָכֵן
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: HALOT
  rationale: Introduce la conclusión judicial del pasaje anterior. «Por tanto» conserva el valor consecuencial y el tono profético-formal sin sonar demasiado coloquial.
- source_word: אָהֳלִיבָה
  english_pob_choice: Oholibah
  chosen_spanish: Oholibá
  alternatives_spanish:
  - Oholiba
  lexicon: Nombre propio transliterado
  rationale: Se mantiene el nombre propio con adaptación ortográfica española y acentuación final para lectura natural en español.
- source_word: כֹּה אָמַר אֲדֹנָי יְהוִה
  english_pob_choice: thus says the Lord GOD
  chosen_spanish: así dice Yahvé el Señor
  alternatives_spanish:
  - así dice el Señor Yahvé
  - así dice Yahvé, el Señor
  lexicon: Fórmula profética
  rationale: Se conserva la fórmula profética «así dice» y se vierte יְהוִה como «Yahvé» según la norma del proyecto. Como אֲדֹנָי precede al nombre divino, se usa «el Señor» para reflejar el título adonay sin crear una repetición extraña.
- source_word: הִנְנִי
  english_pob_choice: Behold, I am
  chosen_spanish: He aquí, yo estoy
  alternatives_spanish:
  - Mira, yo estoy
  - Miren, yo estoy
  lexicon: HALOT
  rationale: «He aquí» mantiene el énfasis solemne y deíctico del anuncio divino; se explicita «yo» para claridad en español.
- source_word: מֵעִיר
  english_pob_choice: stirring up
  chosen_spanish: despertando
  alternatives_spanish:
  - incitando
  - levantando
  lexicon: HALOT
  rationale: El hifil de עור comunica poner en movimiento hacia una acción hostil. «Despertando» conserva el sentido de movilización y evita una paráfrasis demasiado interpretativa; el contexto bélico hace que el objeto de la acción quede claro.
- source_word: מְאַהֲבַיִךְ
  english_pob_choice: your lovers
  chosen_spanish: tus amantes
  alternatives_spanish:
  - tus amantes ilícitos
  - los que te amaron
  lexicon: HALOT
  rationale: «Amantes» preserva la metáfora de relaciones ilícitas/políticas en Ezequiel 23 sin suavizarla. En español funciona de forma idiomática y mantiene el tono acusatorio.
- source_word: עָלַיִךְ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - sobre ti
  - en tu contra
  lexicon: HALOT
  rationale: En un contexto hostil, la preposición se vuelve naturalmente adversarial en español; «contra ti» expresa mejor la acción judicial y militar.
- source_word: אֵת אֲשֶׁר נָקְעָה נַפְשֵׁךְ מֵהֶם
  english_pob_choice: those from whom your soul has turned away
  chosen_spanish: aquellos de quienes tu alma se apartó
  alternatives_spanish:
  - aquellos de quienes tu alma se alejó
  - aquellos a quienes tu alma detestó
  - aquellos de los que te apartaste
  lexicon: HALOT
  rationale: Se conserva el sujeto hebreo «tu alma» y el verbo de separación. «Se apartó» mantiene la ambigüedad entre repulsión y extrañamiento que el inglés POB documenta, sin resolverla demasiado pronto.
- source_word: וַהֲבֵאתִים
  english_pob_choice: and I will bring them
  chosen_spanish: y los traeré
  alternatives_spanish:
  - y los haré venir
  - y los traeré allí
  lexicon: HALOT
  rationale: La forma causativa futura se vierte de manera directa y natural en español. El objeto pronominal concuerda con «a tus amantes».
- source_word: מִסָּבִיב
  english_pob_choice: from every side
  chosen_spanish: desde alrededor
  alternatives_spanish:
  - por todos lados
  - de todas partes
  lexicon: HALOT
  rationale: Se conserva la imagen de cerco. «Desde alrededor» sigue de cerca el hebreo y mantiene la idea de procedencia circundante; es menos idiomático que «por todos lados», pero más transparente al texto.
theological_decisions:
- issue: Renderización del nombre divino יְהוִה en la fórmula אֲדֹנָי יְהוִה
  english_pob_reading: the Lord GOD
  chosen_spanish_reading: Yahvé el Señor
  alternative_spanish_readings:
  - el Señor Yahvé
  - Señor Yahvé
  rationale: El estándar del proyecto exige «Yahvé» para יְהוָה. Dado que אֲדֹנָי antecede al nombre, se conserva además el título «el Señor» para reflejar ambos elementos del hebreo sin ocultar el nombre divino.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Valor de נָקְעָה נַפְשֵׁךְ מֵהֶם
  english_pob_reading: those from whom your soul has turned away
  chosen_spanish_reading: aquellos de quienes tu alma se apartó
  alternative_spanish_readings:
  - aquellos de quienes tu alma se alejó
  - aquellos que te causaron repulsión
  - aquellos de quienes tu alma aborreció
  rationale: La construcción puede señalar repulsión, alienación o alejamiento. La redacción española conserva esa tensión y evita fijar una sola matización emocional que el hebreo permite de varias maneras.
  doctrine_reference: Ezequiel 23:22; nota lexical del POB en inglés
translation_notes:
  revision_awareness: Se siguió el análisis del POB en inglés y el cotejo indicó alta concordancia sin revisiones aplicadas. La draft en español conserva la tensión léxica principal de נָקְעָה y la fórmula profética con el nombre divino según la terminología del proyecto.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el Tetragrama y «el Señor» para אֲדֹנָי, conforme a la convención del proyecto.
  - Se usó «tus amantes» para preservar la metáfora de Ezequiel 23 sin neutralizarla.
  - «Desde alrededor» conserva la imagen de cercamiento y procede del hebreo מִסָּבִיב.
  - El marcador [a] aparece en el texto y corresponde exactamente a la nota léxica alternativa.
