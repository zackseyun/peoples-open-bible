translation:
  language: es
  text: Entonces Jetró, sacerdote de Madián, suegro de Moisés, oyó todo lo que Dios había hecho por Moisés y por Israel, su pueblo[a]; es decir, que Yahvé había sacado a Israel de Egipto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «Israel, el pueblo de Moisés». El posesivo en «su pueblo» puede entenderse gramaticalmente como referido a Moisés, aunque en el contexto probablemente se refiere a Dios.'
    reason: alternative_reading
lexical_decisions:
- source_word: וַיִּשְׁמַע
  english_pob_choice: Now ... heard
  chosen_spanish: Ahora ... oyó
  alternatives_spanish:
  - Entonces ... oyó
  - Y oyó
  lexicon: HALOT
  rationale: La waw consecutiva avanza la narración; en español, 'Ahora' conserva esa progresión con fluidez natural. 'Oyó' comunica bien el acto de recibir noticias en este contexto.
- source_word: כֹהֵן מִדְיָן
  english_pob_choice: the priest of Midian
  chosen_spanish: sacerdote de Madián
  alternatives_spanish:
  - el sacerdote de Madián
  - un sacerdote de Madián
  lexicon: HALOT
  rationale: La relación constructa identifica a Jetró por su oficio y vínculo con Madián. Se conserva 'sacerdote' como equivalente transparente y bíblico, y 'Madián' como forma habitual en español.
- source_word: חֹתֵן מֹשֶׁה
  english_pob_choice: Moses’ father-in-law
  chosen_spanish: suegro de Moisés
  alternatives_spanish:
  - pariente por matrimonio de Moisés
  lexicon: HALOT
  rationale: En este contexto, חֹתֵן señala la relación de Moisés con Jetró por matrimonio. 'Suegro' es la equivalencia precisa y natural en español.
- source_word: אֵת כָּל אֲשֶׁר עָשָׂה אֱלֹהִים
  english_pob_choice: all that God had done
  chosen_spanish: todo lo que Dios había hecho
  alternatives_spanish:
  - todo cuanto Dios hizo
  - todas las cosas que Dios había hecho
  lexicon: HALOT
  rationale: '''Todo lo que'' mantiene la fuerza totalizadora de כָּל אֲשֶׁר sin sobrecargar el español. El pluscuamperfecto ''había hecho'' refleja el punto de vista retrospectivo del relato.'
- source_word: לְמֹשֶׁה וּלְיִשְׂרָאֵל
  english_pob_choice: for Moses and for Israel
  chosen_spanish: por Moisés y por Israel
  alternatives_spanish:
  - para Moisés y para Israel
  - a favor de Moisés y de Israel
  lexicon: HALOT
  rationale: Aunque ל puede expresar beneficio, en español 'por' comunica con naturalidad la acción realizada en favor de ellos y mantiene el valor de beneficio implícito del hebreo.
- source_word: עַמּוֹ
  english_pob_choice: his people
  chosen_spanish: su pueblo
  alternatives_spanish:
  - su gente
  - el pueblo de él
  lexicon: HALOT
  rationale: La terminación posesiva de tercera persona singular puede referirse a Dios o, gramaticalmente, a Moisés. 'Su pueblo' conserva la ambigüedad del hebreo sin resolverla en el texto principal.
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: HALOT
  rationale: Aquí introduce el contenido de lo oído; 'que' es la solución más natural en español para una cita indirecta o complemento explicativo.
- source_word: הוֹצִיא
  english_pob_choice: had brought ... out
  chosen_spanish: había sacado
  alternatives_spanish:
  - había traído fuera
  - había hecho salir
  lexicon: HALOT
  rationale: El hiphil de יצא en contextos de éxodo se vierte de forma natural como 'sacar'. 'Había sacado' mantiene el movimiento de salida sin calco.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahveh
  lexicon: HALOT
  rationale: Se conserva el nombre divino en transliteración, conforme a la terminología del proyecto, en lugar de sustituirlo por un título. 'Yahvé' es la forma principal elegida en español.
- source_word: מִמִּצְרַיִם
  english_pob_choice: out of Egypt
  chosen_spanish: de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - desde Egipto
  lexicon: HALOT
  rationale: Con 'sacar', el complemento 'de Egipto' expresa correctamente el origen de la salida en español bíblico claro y natural.
theological_decisions:
- issue: Referente del posesivo en עַמּוֹ
  english_pob_reading: Israel his people = Israel, God's people
  chosen_spanish_reading: Israel, su pueblo
  alternative_spanish_readings:
  - Israel, pueblo de Moisés
  - Israel, pueblo de Dios
  rationale: 'El hebreo permite una ambigüedad real: el posesivo puede volver a Dios o, gramaticalmente, a Moisés. La frase española ''su pueblo'' preserva esa tensión sin resolverla artificialmente en el texto principal.'
  doctrine_reference: Preservar la tensión lexical y teológica documentada; no desambiguar sin necesidad textual.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y la concordancia externa fue alta; por eso se mantiene la decisión del posesivo ambivalente con nota textual anclada en el texto principal.
  spanish_consistency_notes:
  - Se usa 'Yahvé' de forma consistente para יהוה.
  - Se mantiene 'Dios' para אֱלֹהִים.
  - '''Madián'' sigue la forma española habitual y ''sacerdote'' evita una paráfrasis innecesaria.'
  - La ambigüedad de 'su pueblo' se conserva en el texto y se explica en nota con anclaje [a].
