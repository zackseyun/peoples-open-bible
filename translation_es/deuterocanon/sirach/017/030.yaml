translation:
  language: es
  text: Porque no todo se halla entre los seres humanos[a], ya que un hijo de hombre no es inmortal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Expresión griega literal: «un hijo de hombre». En este contexto es un modo semítico de decir «un ser humano mortal», no un título mesiánico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ δύναται
  english_pob_choice: For ... cannot
  chosen_spanish: Porque ... no puede
  alternatives_spanish:
  - Pues ... no puede
  - Porque ... no es capaz
  lexicon: BDAG
  rationale: δύναται expresa capacidad o posibilidad. En español, «no puede» comunica con naturalidad la imposibilidad afirmada por el texto y conserva la relación causal introducida por γάρ.
- source_word: πάντα εἶναι ἐν ἀνθρώποις
  english_pob_choice: everything can be among human beings
  chosen_spanish: todo puede estar entre los seres humanos
  alternatives_spanish:
  - todo puede estar en los seres humanos
  - todas las cosas pueden hallarse entre la humanidad
  lexicon: BDAG
  rationale: La construcción griega es compacta. «Estar entre los seres humanos» refleja de modo natural ἐν ἀνθρώποις y mantiene el sentido general de que no todo se encuentra en la esfera humana.
- source_word: ἀνθρώποις
  english_pob_choice: human beings
  chosen_spanish: los seres humanos
  alternatives_spanish:
  - la gente
  - los hombres
  lexicon: BDAG
  rationale: Aunque el griego es masculino plural, el sentido es genérico. «Seres humanos» evita una lectura exclusivamente masculina y conserva el alcance universal.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: ya que
  alternatives_spanish:
  - porque
  - pues
  lexicon: BDAG
  rationale: Aquí introduce la razón de la afirmación anterior. «Ya que» da una conexión causal clara y fluida en español moderno.
- source_word: οὐκ ἀθάνατος
  english_pob_choice: is not immortal
  chosen_spanish: no es inmortal
  alternatives_spanish:
  - no es deathless / no es sin muerte
  - no es incorruptible
  lexicon: LSJ
  rationale: ἀθάνατος significa «inmortal» o «sin muerte». «No es inmortal» es la opción más clara y fiel para el registro bíblico en español.
- source_word: υἱὸς ἀνθρώπου
  english_pob_choice: a son of man
  chosen_spanish: un hijo de hombre
  alternatives_spanish:
  - un ser humano
  - un hombre
  lexicon: BDAG
  rationale: Se conserva la formulación literal para respetar la textura semítica del giro. En este contexto no funciona como título mesiánico, sino como expresión de la mortalidad humana.
theological_decisions:
- issue: Si υἱὸς ἀνθρώπου debe verterse de forma literal o idiomática
  english_pob_reading: a son of man
  chosen_spanish_reading: un hijo de hombre
  alternative_spanish_readings:
  - un ser humano
  - un hombre
  rationale: Se mantiene la forma literal para no borrar la forma idiomática del original. El contexto de Sirácides indica una referencia a la condición mortal humana, no al uso mesiánico posterior de la expresión.
  doctrine_reference: Translation philosophy §§1, 3, 4
- issue: Alcance de ἀνθρώποις como referencia genérica
  english_pob_reading: human beings
  chosen_spanish_reading: seres humanos
  alternative_spanish_readings:
  - personas
  - humanidad
  rationale: El griego habla de humanidad en general, no de varones exclusivamente. La traducción conserva ese alcance genérico sin introducir matices no presentes en el texto.
  doctrine_reference: Translation philosophy §§1, 4
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente que prefirió «among human beings» frente a «in human beings» por reflejar mejor ἐν ἀνθρώποις. La propuesta española sigue esa decisión con «entre los seres humanos».
  spanish_consistency_notes:
  - Se preserva el contraste entre la afirmación general («todo») y la limitación antropológica («no es inmortal»).
  - Se evita «SEÑOR» u otras sustituciones no requeridas, ya que el versículo no contiene el nombre divino.
  - Se conserva el valor idiomático de «hijo de hombre» mediante nota, para no perder la textura del griego.
