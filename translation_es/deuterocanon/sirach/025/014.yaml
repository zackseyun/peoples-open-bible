    issue: '''Agravio'' para ἐπαγωγήν'
    rationale: Aunque puede expresar daño sufrido, en español contemporáneo 'agravio' suele entenderse primero como ofensa, insulto o injusticia, no como 'wound/harm/affliction'. Esto debilita la relación con la nota inglesa y con el matiz de lesión o daño infligido.
  - severity: low
    issue: '''Todo agravio'' suena menos natural en registro proverbial'
    rationale: La construcción es comprensible, pero 'cualquier herida' reproduce mejor el valor distributivo de πᾶσαν y suena más idiomática en una máxima breve.
  revised_spanish_text: Cualquier herida[a], pero no la herida de los que odian; y cualquier venganza[b], pero no la venganza de los enemigos.
