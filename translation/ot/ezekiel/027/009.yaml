id: EZK.27.9
reference: Ezekiel 27:9
source:
  edition: WLC
  text: זִקְנֵ֨י גְבַ֤ל וַ/חֲכָמֶ֨י/הָ֙ הָ֣יוּ בָ֔/ךְ מַחֲזִיקֵ֖י בִּדְקֵ֑/ךְ כָּל אֳנִיּ֨וֹת הַ/יָּ֤ם וּ/מַלָּֽחֵי/הֶם֙ הָ֣יוּ בָ֔/ךְ לַ/עֲרֹ֖ב מַעֲרָבֵֽ/ךְ־׃
translation:
  text: The elders of Gebal and her skilled men were within you[a], repairing your damage[c][b]. All the ships of the sea and their sailors were within you to trade for your merchandise.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gebal is the Phoenician city later known in Greek as Byblos.
    reason: alternative_reading
  - marker: b
    text: Or 'repairing your breaches'; the Hebrew can refer to structural damage, cracks, or seams needing repair.
    reason: lexical_alternative
  - marker: c
    text: Or 'to barter for your wares.'
    reason: lexical_alternative
lexical_decisions:
- source_word: זִקְנֵי
  chosen: elders
  alternatives:
  - leaders
  - old men
  lexicon: HALOT
  rationale: The plural construct of זָקֵן commonly denotes civic leaders/elders rather than merely aged men in such political-commercial lists. 'Elders' preserves both age and status connotations.
- source_word: גְבַּל
  chosen: Gebal
  alternatives:
  - Byblos
  lexicon: HALOT
  rationale: As a place name, it is transliterated per project philosophy. 'Byblos' is the Greek form and is worth preserving as an alternative identification.
- source_word: חֲכָמֶיהָ
  chosen: her skilled men
  alternatives:
  - her wise men
  - her craftsmen
  lexicon: HALOT
  rationale: In this maritime and technical context, חכמים refers to practical expertise rather than abstract wisdom. 'Skilled men' fits the ship-repair setting while retaining the masculine plural sense.
- source_word: הָיוּ בָךְ
  chosen: were within you
  alternatives:
  - were in you
  - were with you
  lexicon: HALOT
  rationale: Addressed to Tyre as a personified city/ship, בָךְ is best kept spatially as 'within you,' matching the extended ship metaphor in the chapter.
- source_word: מַחֲזִיקֵי
  chosen: repairing
  alternatives:
  - holding fast
  - caulking
  - strengthening
  lexicon: HALOT
  rationale: The participle from חזק literally means 'holding/strengthening,' but with בדק ('damage, breach') it idiomatically refers to repairing or maintaining structural integrity. 'Repairing' communicates the function clearly in English.
- source_word: בִּדְקֵךְ
  chosen: your damage
  alternatives:
  - your breaches
  - your seams
  - your leaks
  lexicon: HALOT
  rationale: בדק can denote a breach, crack, or damage needing repair. In the ship metaphor, 'seams' or 'leaks' are possible, but 'damage' is broad enough to preserve the metaphor without over-specifying a nautical term not explicit in the Hebrew.
- source_word: כָּל אֳנִיּוֹת הַיָּם
  chosen: all the ships of the sea
  alternatives:
  - all the seagoing ships
  - every ship of the sea
  lexicon: HALOT
  rationale: A fairly direct rendering preserves the comprehensive scope and maritime imagery.
- source_word: מַלָּחֵיהֶם
  chosen: their sailors
  alternatives:
  - their mariners
  - their seamen
  lexicon: HALOT
  rationale: '''Sailors'' is the clearest modern English equivalent for the crews of the ships.'
- source_word: לַעֲרֹב
  chosen: to trade
  alternatives:
  - to barter
  - to exchange goods
  lexicon: HALOT
  rationale: In commercial context this infinitive denotes engaging in trade/exchange. 'To trade' is concise and natural modern English.
- source_word: מַעֲרָבֵךְ
  chosen: your merchandise
  alternatives:
  - your wares
  - your trade goods
  lexicon: HALOT
  rationale: The noun refers to exchanged goods or merchandise. 'Your merchandise' fits the commercial lament over Tyre and pairs naturally with 'to trade'.
