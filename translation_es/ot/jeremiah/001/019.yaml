translation:
  language: es
  text: Pelearán contra ti[a], pero no prevalecerán contra ti, porque yo estoy contigo, declara Yahvé[b], para librarte[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lucharán contra ti».
    reason: lexical_alternative
  - marker: b
    text: ‘Hebreo: «declara YHWH»; se conserva el nombre divino como «Yahvé».’
    reason: alternative_reading
  - marker: c
    text: O ‘para rescatarte’.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְנִלְחֲמוּ
  english_pob_choice: they will fight
  chosen_spanish: pelearán
  alternatives_spanish:
  - lucharán
  - combatirán
  lexicon: HALOT
  rationale: El nifal de לחם expresa entrar en combate. «Pelearán» es natural en español y conserva el sentido hostil sin exagerar a guerra formal.
- source_word: אֵלֶיךָ
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - hacia ti
  - a ti
  lexicon: HALOT
  rationale: Con נלחם, la preposición marca dirección hostil; «contra ti» expresa bien el valor idiomático en español.
- source_word: וְלֹא יוּכְלוּ לָךְ
  english_pob_choice: they will not prevail against you
  chosen_spanish: no prevalecerán contra ti
  alternatives_spanish:
  - no te vencerán
  - no podrán contigo
  lexicon: HALOT
  rationale: יׄכל con ל indica incapacidad de tener éxito frente a la persona. «Prevalecerán contra ti» conserva el matiz de no lograr vencer, sin resolverlo a una victoria total o meramente física.
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  lexicon: HALOT
  rationale: Introduce la causa de su fracaso. «Porque» es claro y mantiene la relación causal del hebreo.
- source_word: אִתְּךָ אֲנִי
  english_pob_choice: I am with you
  chosen_spanish: yo estoy contigo
  alternatives_spanish:
  - estoy a tu lado
  - yo estoy con usted
  lexicon: HALOT
  rationale: La fórmula de presencia protectora se expresa de manera directa y bíblica en español con «estoy contigo», conservando el peso pactal de la promesa.
- source_word: נְאֻם יְהוָה
  english_pob_choice: declares Yahweh
  chosen_spanish: declara Yahvé
  alternatives_spanish:
  - dice Yahvé
  - oráculo de Yahvé
  lexicon: HALOT
  rationale: Se conserva el nombre divino YHWH como «Yahvé» según la norma del proyecto. «Declara» reproduce la fórmula profética de enunciación solemne sin añadir un sustantivo ajeno al hebreo.
- source_word: לְהַצִּילֶךָ
  english_pob_choice: to deliver you
  chosen_spanish: para librarte
  alternatives_spanish:
  - para rescatarte
  - para salvarte
  lexicon: HALOT
  rationale: El hiphil de נצל significa sacar/liberar de peligro. «Librarte» mantiene el tono profético y evita cargar el verbo con asociaciones soteriológicas que en español podrían sugerir «salvarte».
theological_decisions:
- issue: Cómo rendir el nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrama directamente. Conforme a la convención del proyecto, se preserva el nombre propio divino como «Yahvé» en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Alcance de la promesa de protección
  english_pob_reading: they will not prevail against you
  chosen_spanish_reading: no prevalecerán contra ti
  alternative_spanish_readings:
  - no te vencerán
  - no lograrán vencerte
  rationale: La promesa afirma fracaso real de los adversarios por la presencia de Dios, sin negar que puedan atacar. «No prevalecerán contra ti» conserva esa tensión teológica.
  doctrine_reference: 'DOCTRINE.md Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del POB en inglés, que afinó ‘prevail against you’ para reflejar mejor la preposición hebrea. En español se mantiene ese alineamiento con «no prevalecerán contra ti», y se conserva la fórmula profética y el nombre divino según la política del proyecto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - «Contra ti» refleja la hostilidad de אֵלֶיךָ con נלחם.
  - «Prevalecerán» conserva la fuerza de יכל sin convertir el verso en una negación absoluta de conflicto.
  - «Librarte» refleja לְהַצִּילֶךָ sin introducir un matiz doctrinal innecesario.
