base_translation:
  language: en
  yaml_path: translation/ot/nehemiah/007/006.yaml
  text: 'These are the sons of the province who came up from the captivity of the exiles[a], whom Nebuchadnezzar king of Babylon had carried away, and who returned to Jerusalem and to Judah[c][b], each man to his city:'
  footnotes:
  - marker: a
    text: Or more smoothly, 'from the exile.' The Hebrew more literally reads 'from the captivity of the exiles,' preserving both related nouns.
    reason: lexical_alternative
  - marker: b
    text: Hebrew 'each man to his city,' a distributive expression referring to the returnees by household or family units.
    reason: lexical_alternative
  - marker: c
    text: Or 'and they returned'.
    reason: previous_rendering
