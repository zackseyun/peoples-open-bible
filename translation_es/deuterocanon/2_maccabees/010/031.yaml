translation:
  language: es
  text: que los judíos hagan uso de sus propios recursos[a] y leyes, como antes; y que a ninguno de ellos, de ninguna manera, se le moleste respecto de las cosas hechas por ignorancia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sus gastos’ o ‘sus medios’; δαπανήμασιν puede referirse a erogaciones o a medios materiales de sostén.
    reason: lexical_alternative
lexical_decisions:
- source_word: χρῆσθαι
  english_pob_choice: should make use of
  chosen_spanish: hagan uso de
  alternatives_spanish:
  - usen
  - se sirvan de
  lexicon: LSJ
  rationale: El infinitivo χρῆσθαι expresa ‘usar / hacer uso de’. En español, ‘hagan uso de’ conserva un registro formal y el matiz de uso deliberado que refleja bien el griego y el audit trail inglés.
- source_word: τοῖς ἑαυτῶν δαπανήμασιν
  english_pob_choice: their own resources
  chosen_spanish: sus propios recursos
  alternatives_spanish:
  - sus propios gastos
  - sus propios medios de sustento
  lexicon: LSJ
  rationale: δαπάνημα puede aludir a gastos, recursos o medios materiales de sostén. ‘Recursos’ sigue la revisión inglesa más reciente y funciona con naturalidad en español sin perder la referencia a medios propios de mantenimiento o provisión.
- source_word: νόμοις
  english_pob_choice: laws
  chosen_spanish: leyes
  alternatives_spanish:
  - normas
  - costumbres
  lexicon: LSJ
  rationale: νόμος aquí se mantiene en su sentido directo de ‘ley’. Aunque podría insinuar costumbre, el inglés POB retuvo ‘laws’, y ‘leyes’ es la correspondencia más transparente en español.
- source_word: καθὰ καὶ τὸ πρότερον
  english_pob_choice: as before
  chosen_spanish: como antes
  alternatives_spanish:
  - como anteriormente
  - tal como antes
  lexicon: LSJ
  rationale: La locución indica continuidad con la práctica previa. ‘Como antes’ es breve, natural y fiel al valor idiomático del griego.
- source_word: παρενοχληθήσεται
  english_pob_choice: should ... be harassed
  chosen_spanish: se le moleste
  alternatives_spanish:
  - se le hostigue
  - se le perturbe
  - se le incomode
  lexicon: LSJ
  rationale: El futuro pasivo expresa ser objeto de molestia o interferencia. En español, ‘se le moleste’ mantiene la idea de imposición indebida sin sonar demasiado coloquial o jurídico.
- source_word: περὶ τῶν ἠγνοημένων
  english_pob_choice: concerning the things done in ignorance
  chosen_spanish: por las cosas hechas por ignorancia
  alternatives_spanish:
  - acerca de las cosas hechas sin saberlo
  - respecto de los hechos cometidos por ignorancia
  lexicon: LSJ
  rationale: La construcción refleja asuntos cometidos sin conocimiento. ‘Por las cosas hechas por ignorancia’ conserva la relación causal o circunstancial del original y evita añadir una paráfrasis más interpretativa.
theological_decisions:
- issue: Traducción de νόμοις en un contexto judío-legal
  english_pob_reading: laws
  chosen_spanish_reading: leyes
  alternative_spanish_readings:
  - costumbres
  - normas
  rationale: No se suaviza a ‘costumbres’ porque el contexto del decreto habla de observancia autorizada y el POB inglés mantuvo ‘laws’. ‘Leyes’ preserva mejor el peso normativo del término.
  doctrine_reference: Torá / orden legal judío en contexto helenístico
- issue: Alcance de περὶ τῶν ἠγνοημένων
  english_pob_reading: concerning the things done in ignorance
  chosen_spanish_reading: por las cosas hechas por ignorancia
  alternative_spanish_readings:
  - por lo cometido sin saber
  - acerca de los actos hechos inadvertidamente
  rationale: Se conserva la idea de actos realizados sin conocimiento previo, sin convertirla en una categoría doctrinal más específica de la que el texto ofrece.
  doctrine_reference: culpa por ignorancia / actos involuntarios
translation_notes:
  revision_awareness: La base inglesa fue revisada de ‘provisions’ a ‘resources’ para δαπανήμασιν; la versión española sigue esa revisión con ‘recursos’, pero deja nota de alternativas porque el término griego también puede apuntar a gastos o medios de sustento. No se detectan otras revisiones sustantivas en el resto del versículo.
  spanish_consistency_notes:
  - Se conserva ‘Yahvé’ como norma del proyecto, pero este versículo no contiene el nombre divino.
  - ‘leyes’ se mantiene por coherencia con el valor normativo de νόμος en este contexto.
  - El pasivo impersonal ‘se le moleste’ transmite bien la prohibición de interferencia oficial o social sin introducir un agente explícito.
