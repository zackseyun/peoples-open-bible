translation:
  language: es
  text: Las palabras de los sabios son como aguijones, y como clavos firmemente fijados son los dichos recopilados[a]; son dados de un solo pastor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los maestros de asambleas»; la frase hebrea es difícil y puede referirse ya sea a compiladores de dichos recopilados o a líderes en asambleas reunidas.'
    reason: alternative_reading
  - marker: b
    text: «De un solo pastor» puede referirse a Dios como fuente última de la sabiduría, pero el texto no identifica explícitamente al pastor.
    reason: lexical_alternative
lexical_decisions:
- source_word: דִּבְרֵי
  english_pob_choice: The words of
  chosen_spanish: Las palabras de
  alternatives_spanish:
  - Los dichos de
  lexicon: HALOT
  rationale: דִּבְרֵי es el plural constructo de דָּבָר y aquí introduce las expresiones o enseñanzas de los sabios. «Palabras» conserva amplitud y naturalidad en español; «dichos» es posible, pero algo más interpretativo.
- source_word: חֲכָמִים
  english_pob_choice: the wise
  chosen_spanish: los sabios
  alternatives_spanish:
  - los hombres sabios
  lexicon: HALOT
  rationale: El hebreo funciona como sustantivo colectivo para personas sabias. «Los sabios» mantiene ese valor sin añadir innecesariamente «hombres».
- source_word: כַּדָּרְבֹנוֹת
  english_pob_choice: like goads
  chosen_spanish: como aguijones
  alternatives_spanish:
  - como goads
  - como aguijadas
  lexicon: HALOT
  rationale: דָּרְבֹן designa un instrumento puntiagudo para incitar o dirigir animales. En español, «aguijones» comunica bien la imagen y el efecto figurado; «aguijadas» es más específico, pero menos natural.
- source_word: וּכְמַשְׂמְרוֹת
  english_pob_choice: and like ... nails
  chosen_spanish: como clavos
  alternatives_spanish:
  - como estacas
  - como espigas
  lexicon: HALOT
  rationale: מַשְׂמֵר/מַשְׂמְרוֹת puede referirse a clavos o estacas. «Clavos» es la opción más clara y tradicional en español; el contexto metáforico permite esa equivalencia sin perder el sentido.
- source_word: נְטוּעִים
  english_pob_choice: firmly planted
  chosen_spanish: bien clavados
  alternatives_spanish:
  - firmemente plantados
  - fijados
  lexicon: HALOT
  rationale: Aunque literalmente viene de «plantar», aquí el participio describe clavos asentados con firmeza. «Bien clavados» transmite la fuerza de la imagen en español sin forzar la metáfora con una expresión vegetal que sonarìa extraña.
- source_word: בַּעֲלֵי אֲסֻפּוֹת
  english_pob_choice: the collected sayings
  chosen_spanish: las palabras reunidas
  alternatives_spanish:
  - los dueños de las asambleas
  - los compiladores de sentencias
  - las sentencias reunidas
  lexicon: HALOT
  rationale: La frase hebrea es difícil y puede aludir a cosas reunidas/recopiladas o a asambleas. Siguiendo la decisión auditada del POB inglés de reflejar el conjunto como un todo, «las palabras reunidas» conserva la idea de algo recopilado sin resolver indebidamente la ambigüedad del hebreo.
- source_word: נִתְּנוּ
  english_pob_choice: are given
  chosen_spanish: son dadas
  alternatives_spanish:
  - fueron dadas
  lexicon: HALOT
  rationale: El pasivo verbal en contexto sapiencial admite un valor general o gnómico. «Son dadas» suena natural en español y refleja la presentación proverbial del enunciado.
- source_word: מֵרֹעֶה אֶחָד
  english_pob_choice: by one shepherd
  chosen_spanish: por un solo pastor
  alternatives_spanish:
  - de un solo pastor
  - por un pastor único
  lexicon: HALOT
  rationale: Aunque el hebreo marca origen con מִן, el POB inglés revisó la frase a una construcción más directa en inglés. En español, «por un solo pastor» comunica la fuente/autoría implícita y mantiene la ambigüedad teológica del título sin capitalizarlo.
theological_decisions:
- issue: Identidad de «un solo pastor»
  english_pob_reading: left ambiguous in the main text as 'one shepherd'
  chosen_spanish_reading: se mantiene ambiguo en «un solo pastor»
  alternative_spanish_readings:
  - Dios como fuente última de la sabiduría
  - Salomón o Qohelet como maestro singular
  - un símbolo general de instrucción unificada
  rationale: La expresión puede leerse teológicamente como referencia a Dios, pero el versículo no lo identifica de forma explícita. Para preservar la tensión del texto y no resolver lo que el hebreo deja abierto, la traducción conserva la fórmula literal y no capitaliza «pastor».
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés, que prefirió «the collected sayings» y «by one shepherd» para dar fluidez sin cerrar la ambigüedad del hebreo. La versión española conserva esa estrategia, pero ajusta la preposición a «por» para naturalidad y mantiene el peso metáforico de los clavos bien clavados.
  spanish_consistency_notes:
  - Se usa «sabios» como sustantivo colectivo, coherente con el tratamiento del hebreo en el resto del proyecto.
  - Se evita «SEÑOR» o mayúsculas teológicas porque aquí no aparece el tetragrámaton y la frase final permanece deliberadamente abierta.
  - «Pastor» se deja en minúscula para sostener la ambigüedad del referente.
  - La imagen de los clavos se vierte con un español idiomático («bien clavados») sin perder la idea de firmeza del participio hebreo.
