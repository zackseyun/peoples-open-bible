translation:
  language: es
  text: 'Así dice Yahvé, el Dios de Israel: Así como estos buenos higos, así miraré con favor a los exiliados de Judá[a], a quienes envié de este lugar a la tierra de los caldeos[b], para bien.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el exilio de Judá' o 'la cautividad de Judá'. El hebreo puede referirse tanto al pueblo desterrado como al estado o acontecimiento del destierro; aquí el sentido personal encaja mejor con 'a quienes envié'.
    reason: alternative_reading
  - marker: b
    text: O 'para su bien'. El hebreo dice simplemente 'para bien', dejando implícito el beneficiario.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - SEÑOR
  - Jehová
  lexicon: HALOT
  rationale: Se sigue el criterio del proyecto para el nombre divino, manteniendo el valor propio del Tetragrámaton y evitando la sustitución litúrgica por 'SEÑOR'.
- source_word: כֹּה אָמַר
  english_pob_choice: Thus says
  chosen_spanish: Así dice
  alternatives_spanish:
  - Así ha dicho
  - Esto dice
  lexicon: HALOT
  rationale: La fórmula profética en español suena natural como 'Así dice' y conserva el registro solemne y directo del mensajero.
- source_word: אֱלֹהֵי יִשְׂרָאֵל
  english_pob_choice: the God of Israel
  chosen_spanish: el Dios de Israel
  alternatives_spanish:
  - el Dios de Israelíes
  - el Dios de Israel
  lexicon: HALOT
  rationale: La construcción posesiva se refleja de forma directa y bíblicamente reconocible en español.
- source_word: כַּתְּאֵנִים הַטֹּבוֹת הָאֵלֶּה
  english_pob_choice: Like these good figs
  chosen_spanish: Como estos buenos higos
  alternatives_spanish:
  - Así como estos buenos higos
  - Como estos higos buenos
  lexicon: HALOT
  rationale: Se preserva la comparación y el demostrativo; 'buenos higos' es la opción más natural en español y mantiene la cualidad evaluativa del texto.
- source_word: כֵּן
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de la misma manera
  - entonces
  lexicon: HALOT
  rationale: '''Así'' reproduce bien la correlación comparativa ''Como... así...'' sin añadir matices ajenos.'
- source_word: אַכִּיר
  english_pob_choice: I will regard
  chosen_spanish: consideraré
  alternatives_spanish:
  - reconoceré
  - tomaré en cuenta
  - miraré con favor
  lexicon: HALOT
  rationale: El verbo en hebreo implica más que reconocimiento mental; 'consideraré' mantiene la idea de tratar/valorar conforme al símil, sin imponer una lectura demasiado emotiva.
- source_word: גָּל֣וּת יְהוּדָה
  english_pob_choice: the exiles of Judah
  chosen_spanish: los exiliados de Judá
  alternatives_spanish:
  - el exilio de Judá
  - la cautividad de Judá
  lexicon: HALOT
  rationale: La forma personal está favorecida por el relativo 'a quienes envié'; por eso se traduce con un referente humano explícito y no con el evento abstracto.
- source_word: שִׁלַּחְתִּי
  english_pob_choice: I sent away
  chosen_spanish: envié
  alternatives_spanish:
  - eché
  - hice partir
  - desterré
  lexicon: HALOT
  rationale: '''Envié'' conserva la agencia divina indicada por el hebreo y funciona bien con ''de este lugar'' en español, sin cargar el texto con un tecnicismo no requerido por la forma verbal.'
- source_word: מִן הַמָּקוֹם הַזֶּה
  english_pob_choice: from this place
  chosen_spanish: de este lugar
  alternatives_spanish:
  - desde este lugar
  - fuera de este lugar
  lexicon: HALOT
  rationale: Equivalente idiomático claro y sobrio; el deíctico mantiene la referencia contextual a la tierra de Judá/Jerusalén.
- source_word: אֶרֶץ כַּשְׂדִּים
  english_pob_choice: the land of the Chaldeans
  chosen_spanish: la tierra de los caldeos
  alternatives_spanish:
  - la tierra de los caldeos
  - Caldea
  - la tierra de Babilonia
  lexicon: HALOT
  rationale: '''Caldeos'' preserva la designación etnogeográfica del hebreo; ''tierra de'' traduce el sustantivo sin necesidad de una equivalencia geográfica más interpretativa.'
- source_word: לְטוֹבָה
  english_pob_choice: for good
  chosen_spanish: para bien
  alternatives_spanish:
  - para su bien
  - para beneficio
  lexicon: HALOT
  rationale: Se mantiene la brevedad del hebreo y la ambigüedad benéfica del cierre; 'para bien' es natural en español y no añade un beneficiario explícito que el texto no expresa.
theological_decisions:
- issue: Referencia de גָּלוּת יְהוּדָה
  english_pob_reading: 'personal: ''the exiles of Judah'''
  chosen_spanish_reading: 'personal: ''los exiliados de Judá'''
  alternative_spanish_readings:
  - 'abstracta: ''el exilio de Judá'''
  - 'colectiva-eventual: ''la cautividad de Judá'''
  rationale: El relativo 'a quienes envié' hace que el sentido personal sea el más fuerte; la traducción lo expresa de manera explícita para evitar perder el referente humano del símil.
  doctrine_reference: 'Exégesis del texto: el pueblo en exilio como objeto del favor y propósito divinos.'
- issue: Alcance de לְטוֹבָה
  english_pob_reading: 'teleological: ''for good'''
  chosen_spanish_reading: 'teleológica: ''para bien'''
  alternative_spanish_readings:
  - 'benefactiva: ''para su bien'''
  - 'final: ''para beneficio'''
  rationale: El hebreo es breve y no explicita el beneficiario; 'para bien' conserva esa concisión y deja abierta la aplicación que el contexto provee.
  doctrine_reference: Teología bíblica del juicio con propósito redentor.
translation_notes:
  revision_awareness: El texto base en inglés fue revisado y quedó sin cambios en el último pase; la presente propuesta sigue ese estado estable y conserva las dos notas de ambigüedad ya auditadas (referente de גָּלוּת יְהוּדָה y valor de לְטוֹבָה).
  spanish_consistency_notes:
  - Se usa 'Yahvé' de acuerdo con la terminología del proyecto, no 'SEÑOR'.
  - '''Exiliados de Judá'' mantiene el referente personal favorecido por el contexto, en línea con la lectura inglesa auditada.'
  - '''Para bien'' conserva la concisión y la ambigüedad benéfica del hebreo; la nota ofrece la alternativa ''para su bien''.'
  - '''Caldeos'' traduce el etnónimo del original y evita una armonización interpretativa con ''Babilonia'' sin base textual directa.'
