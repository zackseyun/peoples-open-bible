translation:
  language: es
  text: Y los filisteos volvieron a desplegarse en el valle[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se extendieron una vez más en el valle».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּסִיפוּ עוֹד
  english_pob_choice: again
  chosen_spanish: volvieron
  alternatives_spanish:
  - otra vez
  - de nuevo
  - volvieron a hacerlo
  lexicon: HALOT
  rationale: El hebreo combina el valor repetitivo de יסף con עוֹד; en español, «volvieron» comunica de forma natural la reiteración sin forzar una duplicación mecánica como «añadieron otra vez».
- source_word: פְּלִשְׁתִּים
  english_pob_choice: the Philistines
  chosen_spanish: los filisteos
  alternatives_spanish:
  - filisteos
  - el pueblo filisteo
  lexicon: HALOT
  rationale: Se conserva el nombre del pueblo con artículo definido, como exige el contexto narrativo.
- source_word: וַיִּפְשְׁטוּ
  english_pob_choice: spread out
  chosen_spanish: se desplegaron
  alternatives_spanish:
  - se extendieron
  - se distribuyeron
  - se hicieron presentes
  lexicon: HALOT
  rationale: En contexto militar, פשט no describe principalmente el saqueo sino la disposición de tropas; «se desplegaron» mantiene esa fuerza táctica mejor que una traducción más genérica o demasiado específica.
- source_word: בָּעֵמֶק
  english_pob_choice: in the valley
  chosen_spanish: en el valle
  alternatives_spanish:
  - por el valle
  - a través del valle
  - en un valle
  lexicon: HALOT
  rationale: El ב locativo se traduce de manera directa como «en», preservando la referencia espacial simple del texto.
