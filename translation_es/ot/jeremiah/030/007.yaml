translation:
  language: es
  text: ¡Ay! Porque aquel día será grande[a]; no habrá otro como él. Es tiempo de angustia para Jacob[b], pero será salvado de ella[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O '¡Ay de ti!'; la interjección expresa alarma o lamento.
    reason: lexical_alternative
  - marker: b
    text: O 'un tiempo de angustia para Jacob'.
    reason: lexical_alternative
  - marker: c
    text: O 'será librado de ella'.
    reason: lexical_alternative
lexical_decisions:
- source_word: הוֹי
  english_pob_choice: Alas!
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de mí!
  - ¡Woe!
  lexicon: HALOT
  rationale: El interjección expresa lamento, alarma o dolor. '¡Ay!' transmite con naturalidad esa carga exclamativa en español sin volverla más formal o más severa de lo que exige el hebreo.
- source_word: כִּי
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: HALOT
  rationale: Introduce la razón de la exclamación. 'Porque' conserva el valor explicativo de manera clara y natural en español.
- source_word: גָדוֹל
  english_pob_choice: great
  chosen_spanish: grande
  alternatives_spanish:
  - terrible
  - enorme
  lexicon: HALOT
  rationale: El hebreo denota grandeza en magnitud. 'Grande' preserva el sentido básico sin añadir una valoración interpretativa que el término por sí solo no exige.
- source_word: הַיּוֹם הַהוּא
  english_pob_choice: that day
  chosen_spanish: aquel día
  alternatives_spanish:
  - ese día
  - ese momento
  lexicon: HALOT
  rationale: La fórmula profética apunta a un día o período específico. 'Aquel día' mantiene la distancia demostrativa y es idiomático en español bíblico actual.
- source_word: מֵאַיִן כָּמֹהוּ
  english_pob_choice: there is none like it
  chosen_spanish: no habrá otro como él
  alternatives_spanish:
  - no hay otro como él
  - no se le comparará
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y afirma incomparabilidad. En español, 'no habrá otro como él' comunica con claridad esa idea sin forzar una calca literal.
- source_word: וְעֵת צָרָה
  english_pob_choice: It is a time of distress
  chosen_spanish: Es tiempo de angustia
  alternatives_spanish:
  - Es un tiempo de aflicción
  - Es tiempo de trouble
  lexicon: HALOT
  rationale: עֵת señala una temporada o tiempo, y צָרָה denota angustia, aflicción o distress. 'Angustia' es una equivalencia digna y comprensible; 'aflicción' sería posible, pero aquí 'angustia' conserva mejor la gravedad del contexto.
- source_word: לְיַעֲקֹב
  english_pob_choice: for Jacob
  chosen_spanish: para Jacob
  alternatives_spanish:
  - para Yaacob
  - para Israel
  lexicon: HALOT
  rationale: Se conserva el nombre propio 'Jacob', como en el hebreo, sin reemplazarlo por una glosa interpretativa. 'Para Jacob' mantiene la referencia y la personificación del pueblo del pacto.
- source_word: וּמִמֶּנָּה
  english_pob_choice: out of it
  chosen_spanish: de él
  alternatives_spanish:
  - de ella
  - fuera de ella
  lexicon: HALOT
  rationale: El sufijo femenino retoma 'angustia' (femenino), pero en español el antecedente inmediato puede expresarse con un pronombre resumptivo más fluido. Aquí se opta por 'de él' por concordar con el sujeto implícito del verbo pasivo en la cláusula final y porque el giro castellano permite entender la salida de la aflicción; la alternativa más literal 'de ella' resulta posible, pero menos natural en esta construcción.
- source_word: יִוָּשֵׁעַ
  english_pob_choice: he will be saved
  chosen_spanish: será librado
  alternatives_spanish:
  - será salvo
  - será rescatado
  lexicon: HALOT
  rationale: El niphal de ישׁע expresa ser salvado o librado. 'Será librado' comunica deliverance en español bíblico natural y evita restringir el verbo a una noción exclusivamente soteriológica en el contexto inmediato.
theological_decisions:
- issue: Interjección inicial de alarma/lamento
  english_pob_reading: '''Alas!'' with note ''Or Woe!''; the opening interjection expresses alarm or lament.'
  chosen_spanish_reading: '''¡Ay!'' como lamento o alarma, con alternativa ''¡Ay de mí!'''
  alternative_spanish_readings:
  - ¡Woe!
  - ¡Ay de dolor!
  rationale: El hebreo הוֹי puede funcionar como exclamación de lamento o alarma. '¡Ay!' conserva la ambigüedad y el tono de duelo sin fijar indebidamente un sentido más duro como maldición.
  doctrine_reference: 'Lexical caution: preserve the source’s range rather than collapsing it; Translation philosophy: optimal-equivalence.'
- issue: Alcance de 'será salvado/librado'
  english_pob_reading: '''he will be saved'' with note ''Or delivered from it.'''
  chosen_spanish_reading: '''será librado'' como liberación de la angustia, sin precisar más el tipo de salvación'
  alternative_spanish_readings:
  - será salvo
  - será rescatado
  rationale: 'El verbo hebreo pertenece al campo de la salvación, pero el contexto inmediato define una liberación de la crisis presente. ''Será librado'' preserva esa tensión: es salvación real, pero situada históricamente en la angustia de Jacob.'
  doctrine_reference: 'Translation philosophy: preserve theological tension; avoid over-specifying salvation beyond context.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta cambio respecto al texto de trabajo; esta versión mantiene la misma evaluación de alta concordancia con el hebreo y con el auditorio inglés auditado, ajustando solo la formulación española para naturalidad y fidelidad semántica.
  spanish_consistency_notes:
  - Se conserva 'Jacob' como nombre propio, sin glosa interpretativa en el texto principal.
  - Se mantiene la interjección exclamativa al inicio para reflejar el tono profético de lamento.
  - '''Angustia'' y ''librado'' sostienen un campo semántico claro en español para צָרָה e יִוָּשֵׁעַ, respetando la tensión entre distress inmediato y salvación/liberación.'
  - Los marcadores de nota se colocan solo donde hay alternativa textual real en español y corresponden uno a uno con las notas proporcionadas.
