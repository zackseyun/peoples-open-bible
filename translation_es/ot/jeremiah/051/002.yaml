translation:
  language: es
  text: Y enviaré a Babilonia extranjeros[a], y la aventarán[b] y vaciarán su tierra, porque estarán contra ella por todos lados en el día de desastre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “forasteros” para זָרִים. El hebreo designa personas de fuera enviadas contra Babilonia.
    reason: lexical_alternative
  - marker: b
    text: 'El verbo aquí conserva una imagen agrícola: “aventar” el grano. También puede entenderse más ampliamente como “dispersar”.'
    reason: lexical_alternative
  - marker: c
    text: “Día de desastre” expresa el tiempo en que cae la calamidad sobre Babilonia, no un día caracterizado por maldad moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: וְשִׁלַּחְתִּי
  english_pob_choice: And I will send
  chosen_spanish: Y enviaré
  alternatives_spanish:
  - Y enviaré entonces
  - Y mandaré
  lexicon: HALOT
  rationale: El verbo hebreo en discurso profético anuncia una acción futura segura; el futuro simple en español transmite bien esa fuerza sin sobretraducir.
- source_word: לְבָבֶל
  english_pob_choice: to Babylon
  chosen_spanish: a Babilonia
  alternatives_spanish:
  - para Babilonia
  - contra Babilonia
  lexicon: HALOT
  rationale: La preposición ל aquí expresa dirección/destino; en español, 'a Babilonia' sigue más de cerca el valor del hebreo que una lectura hostil añadida por contexto.
- source_word: זָרִים
  english_pob_choice: strangers
  chosen_spanish: extraños
  alternatives_spanish:
  - forasteros
  - extranjeros
  lexicon: HALOT
  rationale: '''Extraños'' conserva la idea de personas de fuera y mantiene la cercanía léxica con el hebreo; ''extranjeros'' es posible, pero suena más administrativo y menos relacional.'
- source_word: וְזֵרוּהָ
  english_pob_choice: they will winnow her
  chosen_spanish: la aventarán
  alternatives_spanish:
  - la aventarán como grano
  - la zarandearán
  lexicon: HALOT
  rationale: El verbo tiene imagen agrícola de aventar/aventar el grano. En español, 'la aventarán' conserva esa imagen sin volver la frase pesada; la nota aclara la posible lectura más general de dispersar.
- source_word: וִיבֹקְקוּ
  english_pob_choice: empty her land
  chosen_spanish: vaciarán su tierra
  alternatives_spanish:
  - devastarán su tierra
  - despojarán su tierra
  lexicon: HALOT
  rationale: בקק apunta a vaciar, quedar sin contenido. 'Vaciarán su tierra' mantiene el paralelismo imagético con la acción anterior y evita reemplazarla por una glosa más interpretativa.
- source_word: אֶת אַרְצָהּ
  english_pob_choice: her land
  chosen_spanish: su tierra
  alternatives_spanish:
  - su país
  - su territorio
  lexicon: HALOT
  rationale: '''Tierra'' reproduce el valor amplio de אֶרֶץ y encaja con el lenguaje profético de desolación territorial.'
- source_word: כִּי
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: HALOT
  rationale: Introduce la causa de la devastación; 'porque' expresa con naturalidad la relación causal en español.
- source_word: הָי֥וּ עָלֶ֛יהָ
  english_pob_choice: they will be against her
  chosen_spanish: estuvieron contra ella
  alternatives_spanish:
  - están contra ella
  - se pusieron contra ella
  lexicon: HALOT
  rationale: Aunque el hebreo usa una forma perfecta, en este contexto profético describe una realidad de asedio/hostilidad presentada como segura. El español puede reflejarlo con pasado perfectivo sin forzar un futuro donde el hebreo no lo marca explícitamente.
- source_word: מִסָּבִיב
  english_pob_choice: from every side
  chosen_spanish: por todos lados
  alternatives_spanish:
  - desde todos lados
  - alrededor
  lexicon: HALOT
  rationale: Es un modismo de cerco; 'por todos lados' es idiomático en español y preserva la idea de presión envolvente.
- source_word: בְּיוֹם רָעָה
  english_pob_choice: in the day of disaster
  chosen_spanish: en el día de desastre
  alternatives_spanish:
  - en el día de calamidad
  - en el día malo
  lexicon: HALOT
  rationale: רָעָה aquí es calamidad, no mal moral. 'Desastre' comunica bien el sentido y evita la ambigüedad ética.
theological_decisions:
- issue: Sentido de la preposición ל con Babilonia
  english_pob_reading: to Babylon
  chosen_spanish_reading: a Babilonia
  alternative_spanish_readings:
  - contra Babilonia
  - para Babilonia
  rationale: La revisión del texto inglés corrigió una lectura hostil de la preposición. En español conviene mantener el destino/dirección de ל, dejando que el contexto posterior exprese la oposición.
  doctrine_reference: gramática bíblica; no doctrinal
- issue: Valor de רָעָה en la frase final
  english_pob_reading: day of disaster
  chosen_spanish_reading: día de desastre
  alternative_spanish_readings:
  - día de mal
  - día de calamidad
  rationale: La expresión no describe maldad moral sino una jornada de juicio y calamidad. 'Desastre' evita confundir el lector y sigue la lectura contextual del POB.
  doctrine_reference: hermenéutica contextual
translation_notes:
  revision_awareness: La revisión inglesa reciente corrigió la dirección de לְבָבֶל de 'against Babylon' a 'to Babylon'. La versión española sigue esa corrección y conserva el resto del registro auditado, manteniendo la imagen agrícola de זרה y el sentido de calamidad de בְּיוֹם רָעָה.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo 'Babilonia' como nombre propio, con 'a' para destino.
  - '''Extraños'' y ''aventarán'' preservan el tono del POB y la metáfora del texto hebreo.'
  - No se usó 'SEÑOR' ni 'Cristo', pues no corresponden al pasaje.
  - '''Tierra'' se eligió para אֶרֶץ por su amplitud semántica en profecía.'
