translation:
  language: es
  text: Y se fortaleció, y edificó todo el muro derribado; levantó torres sobre él, y por fuera de este edificó otro muro, y fortaleció el Milo[a] de la ciudad de David, e hizo armas y escudos en abundancia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la terraza» o «el relleno» para «el Milo», probablemente una obra fortificada de tierra o una estructura de sostén en Jerusalén.
    reason: lexical_alternative
  - marker: b
    text: O «proyectiles», «dardos» o «jabalinas» para «armas». El término hebreo es más amplio que un solo tipo de armamento.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּתְחַזַּק
  english_pob_choice: he strengthened himself
  chosen_spanish: se fortaleció
  alternatives_spanish:
  - cobró ánimo
  - se hizo fuerte
  lexicon: HALOT
  rationale: El hitpael es reflexivo; «se fortaleció» conserva la fuerza reflexiva y funciona con naturalidad en español. «Cobró ánimo» sería más interpretativo y «se hizo fuerte» suena menos idiomático aquí.
- source_word: וַיִּבֶן ... כָּל הַחוֹמָה הַפְּרוּצָה
  english_pob_choice: built up all the wall that was broken down
  chosen_spanish: edificó todo el muro que estaba derribado
  alternatives_spanish:
  - reconstruyó todo el muro derribado
  - edificó todo el muro brechado
  lexicon: HALOT
  rationale: «Edificó» preserva el valor constructivo de בנה. «Que estaba derribado» expresa bien el estado resultante de הַפְּרוּצָה sin forzar un tecnicismo militar excesivo.
- source_word: הַפְּרוּצָה
  english_pob_choice: that was broken down
  chosen_spanish: que estaba derribado
  alternatives_spanish:
  - brechado
  - abierto en brecha
  lexicon: HALOT
  rationale: La idea es la de un muro con rotura o brecha. En español, «derribado» comunica el daño de forma clara y digna; «brechado» es más técnico y menos natural en este contexto.
- source_word: וַיַּ֣עַל עַל הַמִּגְדָּל֗וֹת
  english_pob_choice: raised up towers on it
  chosen_spanish: levantó torres sobre él
  alternatives_spanish:
  - alzó torres sobre él
  - lo elevó hasta las torres
  lexicon: HALOT
  rationale: Sigo la revisión inglesa que entendió torres sobre el muro. «Levantó torres sobre él» refleja mejor el hebreo y evita un giro ambiguo sobre el sujeto del verbo.
- source_word: וְלַחוּצָה הַחוֹמָה אַחֶרֶת
  english_pob_choice: and outside it he built another wall
  chosen_spanish: y fuera de él edificó otro muro
  alternatives_spanish:
  - y al exterior edificó otro muro
  - y por fuera otro muro
  lexicon: HALOT
  rationale: «Fuera de él» mantiene la referencia al muro anterior y hace natural la relación espacial. Añadir «edificó» ayuda en español porque el hebreo elíptico depende del verbo previo.
- source_word: הַמִּלּוֹא
  english_pob_choice: the Millo
  chosen_spanish: el Milo
  alternatives_spanish:
  - el Millo
  - la terraza
  - el relleno
  lexicon: HALOT
  rationale: Se conserva el término técnico transliterado como en la tradición de POB, usando una forma española simple y reconocible. No se sustituye por «terraza» o «relleno» en el texto principal porque el referente exacto sigue siendo debatido.
- source_word: שֶׁלַח
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - armamento
  - proyectiles
  - dardos
  lexicon: HALOT
  rationale: El sustantivo es amplio; «armas» comunica bien la generalidad y mantiene la coordinación con «escudos». «Proyectiles» o «dardos» estrecharían indebidamente el campo semántico.
- source_word: לָרֹב
  english_pob_choice: in abundance
  chosen_spanish: en abundancia
  alternatives_spanish:
  - en gran número
  - muchas
  lexicon: HALOT
  rationale: Es el equivalente natural y fiel de la locución adverbial, sin perder el sentido de provisión amplia.
- source_word: וּמָגִנִּים
  english_pob_choice: and shields
  chosen_spanish: y escudos
  alternatives_spanish:
  - y broqueles
  lexicon: HALOT
  rationale: «Escudos» es el término común y exacto en español contemporáneo. «Broqueles» es demasiado arcaico y más restringido.
theological_decisions:
- issue: Si traducir el nombre/estructura הַמִּלּוֹא de forma transliterada o explicativa
  english_pob_reading: the Millo of the city of David
  chosen_spanish_reading: el Milo de la ciudad de David
  alternative_spanish_readings:
  - la terraza de la ciudad de David
  - el relleno de la ciudad de David
  rationale: La lectura de POB preserva el término histórico como designación técnica, reconociendo su sentido probable sin reducirlo a una sola explicación. En español, mantenerlo transliterado evita borrar la tensión lexical documentada.
  doctrine_reference: Ninguno; decisión lexical-histórica sin implicación doctrinal directa.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente en dos puntos: (1) entiende que el hebreo describe torres levantadas sobre el muro, no el muro elevado hasta las torres; y (2) explicita la relación espacial de «fuera de él» para reflejar mejor la sintaxis breve del hebreo. También conserva la estrategia de POB de mantener «Millo» como término técnico y de no estrechar שֶׁלַח a un arma específica.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparezca el Tetragrámaton; en este verso no aplica.
  - «Milo» se translitera de forma consistente como término técnico y no se sustituye por una equivalencia interpretativa en el texto principal.
  - «Armas y escudos» conserva el paralelismo y la amplitud semántica del hebreo.
  - El orden y la puntuación buscan reflejar las cláusulas coordinadas del original sin introducir explicaciones ajenas al verso.
