- from: Di que me dejes ir de la tierra[a], y que ya no escuche reproche.
  to: Di que me libres de la tierra[a], y que ya no escuche reproche.
  rationale: Se ajusta la redacción para que el español sea más natural y solemne, y para reflejar mejor el valor de ἀπολῦσαί como «liberar/soltar» en una petición indirecta de ser quitada de la vida terrenal. Se conserva «de la tierra» y «reproche», y la nota mantiene alternativas significativas documentadas por el inglés POB.
