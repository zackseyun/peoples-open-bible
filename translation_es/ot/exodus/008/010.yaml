translation:
  language: es
  text: Y amontonaron las ranas en montones[a], y la tierra apestó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘montón tras montón’; el hebreo repite el sustantivo para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּצְבְּרוּ
  english_pob_choice: they piled ... up
  chosen_spanish: amontonaron
  alternatives_spanish:
  - apilaron
  - juntaron
  lexicon: HALOT
  rationale: צבר indica reunir o acumular en un montón; en español, 'amontonaron' comunica de forma natural la acción concreta de formar pilas o montones, sin perder la imagen física del hebreo.
- source_word: אֹתָם
  english_pob_choice: them
  chosen_spanish: a
  alternatives_spanish:
  - los
  - a ellos
  lexicon: referencia pronominal al contexto inmediato
  rationale: El objeto directo retoma a las ranas del contexto anterior. En español, la forma explícita natural es el pronombre átono 'las' o la referencia ya implícita; aquí se opta por una formulación condensada en el flujo del verso, dejando la referencia contextual implícita.
- source_word: חֳמָרִם חֳמָרִם
  english_pob_choice: in heap after heap
  chosen_spanish: en montones
  alternatives_spanish:
  - en montón tras montón
  - montón tras montón
  lexicon: HALOT
  rationale: La repetición del sustantivo intensifica la acumulación distributiva. 'En montones' mantiene la idea plural y no sobrecarga el español; la repetición queda explicada en nota por tratarse de un énfasis hebreo.
- source_word: וַתִּבְאַשׁ
  english_pob_choice: stank
  chosen_spanish: apestó
  alternatives_spanish:
  - hediondeó
  - olió mal
  lexicon: HALOT
  rationale: באש significa oler mal, apestar. 'Apestó' es directo, idiomático y fuerte, cercano a la fuerza del hebreo y del inglés POB 'stank'.
- source_word: הָאָרֶץ
  english_pob_choice: the land
  chosen_spanish: la tierra
  alternatives_spanish:
  - el país
  - el territorio
  lexicon: HALOT
  rationale: En el relato de las plagas, אֶרֶץ se refiere al ámbito afectado; 'la tierra' es una opción natural en español bíblico para expresar el territorio, sin convertirlo en 'mundo' ni en una abstracción.
translation_notes:
  revision_awareness: 'El texto coincide con el hebreo masorético y con la auditoría inglesa: acción de amontonar, repetición enfática de ''montones'', y el resultado olfativo de la plaga sobre la tierra.'
  spanish_consistency_notes:
  - Se usa 'la tierra' para הארץ, conforme al contexto narrativo de las plagas.
  - Se mantiene un verbo fuerte y concreto ('apestó') para conservar el impacto del hebreo באש.
  - La nota explica la repetición hebrea sin sustituir el sentido base del verso.
