translation:
  language: es
  text: Yo te hice innumerable como el crecimiento del campo[a], y te multiplicaste y creciste, y llegaste a pleno adorno[b]. Tus pechos se formaron[c] y tu cabello había crecido, y aun así estabas desnuda y descubierta[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como las plantas del campo» o «como la vegetación del campo».'
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «llegaste al adorno de adornos»; la frase probablemente alude a alcanzar plena belleza o madurez, quizá la edad para el adorno.'
    reason: alternative_reading
  - marker: c
    text: 'O: «Tus pechos se desarrollaron».'
    reason: lexical_alternative
  - marker: d
    text: La expresión doble «desnuda y descubierta» intensifica la imagen de exposición total.
    reason: lexical_alternative
lexical_decisions:
- source_word: רְבָבָה
  english_pob_choice: countless
  chosen_spanish: innumerable
  alternatives_spanish:
  - multitudinaria
  - sin número
  - miles y miles
  lexicon: HALOT
  rationale: El hebreo expresa una cantidad muy grande. «Innumerable» comunica abundancia extrema en español sin forzar un número concreto; mantiene el efecto retórico del original y equivale bien a la decisión inglesa de evitar una cifra literal.
- source_word: כְּצֶמַח הַשָּׂדֶה
  english_pob_choice: like the growth of the field
  chosen_spanish: como el crecimiento del campo
  alternatives_spanish:
  - como las plantas del campo
  - como la vegetación del campo
  lexicon: HALOT
  rationale: צמח puede referirse a brote, crecimiento o vegetación. «Crecimiento del campo» conserva la imagen agrícola y el matiz de desarrollo abundante, en una forma natural para el español.
- source_word: נְתַתִּיךְ
  english_pob_choice: I made you
  chosen_spanish: Yo te hice
  alternatives_spanish:
  - Yo te di
  - Yo te puse
  lexicon: HALOT
  rationale: Aunque el verbo básico es «dar», aquí funciona idiomáticamente con el sentido de causar que alguien llegue a ser numeroso. «Yo te hice» refleja mejor ese valor causativo en español.
- source_word: וַתִּרְבִּי
  english_pob_choice: you multiplied
  chosen_spanish: multiplicaste
  alternatives_spanish:
  - te aumentaste
  - te hiciste más
  lexicon: HALOT
  rationale: El verbo רבה expresa aumento en número. «Multiplicaste» conserva el paralelo con la abundancia inicial y mantiene la fuerza verbal del hebreo.
- source_word: וַתִּגְדְּלִי
  english_pob_choice: grew up
  chosen_spanish: creciste
  alternatives_spanish:
  - maduraste
  - creciste en grandeza
  lexicon: HALOT
  rationale: גדל aquí apunta a madurar o desarrollarse. «Creciste» es natural en español y deja abierto el matiz de desarrollo personal sin añadir una paráfrasis excesiva.
- source_word: וַתָּבֹאִי בַּעֲדִי עֲדָיִים
  english_pob_choice: came to full adornment
  chosen_spanish: llegaste a pleno adorno
  alternatives_spanish:
  - llegaste a plena adornación
  - llegaste al adorno completo
  - llegaste a la plenitud del adorno
  lexicon: HALOT
  rationale: La expresión hebrea es idiomática y discutida. «Pleno adorno» preserva el campo semántico de ornamento/aderezo sin concretar indebidamente una lectura sexual o matrimonial que el hebreo no explicita en la forma breve del texto.
- source_word: שָׁדַיִם נָכֹנוּ
  english_pob_choice: Your breasts were formed
  chosen_spanish: Tus pechos se formaron
  alternatives_spanish:
  - Tus pechos se desarrollaron
  - Tus pechos fueron formados
  lexicon: HALOT
  rationale: נכון en nifal puede significar estar establecido, dispuesto o formado. En el contexto de maduración corporal, «se formaron» es claro, fiel y no excesivamente interpretativo.
- source_word: וּשְׂעָרֵךְ צִמֵּחַ
  english_pob_choice: your hair had grown
  chosen_spanish: tu cabello había crecido
  alternatives_spanish:
  - tu cabello había brotado
  - tu cabello crecía
  lexicon: HALOT
  rationale: צמח literalmente es brotar/crecer. «Había crecido» es idiomático en español y conserva la secuencia de desarrollo físico del pasaje.
- source_word: עֵרֹם וְעֶרְיָה
  english_pob_choice: naked and bare
  chosen_spanish: desnuda y al descubierto
  alternatives_spanish:
  - desnuda y desnuda
  - desnuda y vacía
  - desnuda y expuesta
  lexicon: HALOT
  rationale: La doble expresión intensifica la idea de exposición total. «Desnuda y al descubierto» conserva la redundancia enfática con un español natural y sobrio.
theological_decisions:
- issue: Interpretación de בַּעֲדִי עֲדָיִים en la metáfora de maduración
  english_pob_reading: A reference to reaching full adornment / mature beauty, without making an explicit marriage claim in the main text.
  chosen_spanish_reading: Una referencia a llegar a pleno adorno o belleza madura, sin afirmar en el texto principal una lectura matrimonial explícita.
  alternative_spanish_readings:
  - referencia a la edad de los adornos
  - referencia a la madurez puberal
  - referencia al adorno nupcial
  rationale: El hebreo presenta una imagen idiomática y debatida. El español mantiene la expresión del adorno para respetar la tensión interpretativa y evitar añadir precisión sexual o matrimonial que no está dicha de manera directa.
  doctrine_reference: Principio POB de conservar la tensión interpretativa cuando el idioma fuente es idiomático y ambiguo.
translation_notes:
  revision_awareness: La redacción sigue la última revisión del audit trail inglés, que sustituyó una formulación más interpretativa por «full adornment» para acercarse mejor al hebreo. En español se refleja esa misma cautela con «pleno adorno», manteniendo la serie verbal de crecimiento y la imagen final de desnudez total.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el tetragrámaton aparezca explícitamente; este versículo no lo contiene.
  - Se mantuvo «pechos» por fidelidad al vocabulario corporal del hebreo, sin suavizarlo a un término más genérico.
  - 'La secuencia verbal reproduce el paralelismo del hebreo: causar abundancia, multiplicar, crecer, llegar a adorno, formarse y crecer el cabello, cerrar con desnudez total.'
