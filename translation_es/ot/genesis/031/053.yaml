revisions:
- from: Que el Dios de Abraham y el dios de Nacor[a], el dios de su padre, juzgue entre nosotros. Y Jacob juró por el Temor de su padre Isaac[b].
  to: Que el Dios de Abraham y el dios de Nacor[a], el dios de su antepasado, juzgue entre nosotros. Y Jacob juró por el Temor de su padre Isaac[b].
  rationale: Se ajusta «el dios de su padre» a «el dios de su antepasado» para representar con más fidelidad y claridad el posesivo plural hebreo sin volver la frase torpe en español. Se actualiza la nota [a] para mantener esa misma precisión en la lectura alternativa. El resto del texto conserva correctamente la ambigüedad teológica y el título divino inusual del original.
