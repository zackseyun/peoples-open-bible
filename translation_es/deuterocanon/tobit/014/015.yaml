    issue: «oyó la destrucción de Nínive» es poco idiomático en español
    rationale: Aunque no es imposible, en español natural suele expresarse «oyó hablar de la destrucción» o «se enteró de la destrucción» cuando se trata de una noticia y no de un sonido.
  - severity: high
    issue: «habían cautivado» falsea o vuelve ambigua la acción de ᾐχμαλώτισεν
    rationale: En español actual «cautivar» normalmente significa ‘encantar, seducir’, no ‘tomar cautivo’. Aquí se necesita una forma que preserve explícitamente la idea de cautiverio/captura.
