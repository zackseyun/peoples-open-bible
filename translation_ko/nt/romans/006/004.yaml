  text: Therefore we were buried with him through baptism into death[a], so that just as Messiah was raised from the dead through the glory of the Father, so also we might walk in newness of life.
translation:
  language: ko
  text: 그러므로 우리는 세례를 통해 그분과 함께 죽음 속으로 장사되었습니다. 이는 메시아께서 아버지의 영광을 통해 죽은 자들 가운데서 일으킴을 받은 것 같이, 그렇게 우리도 새 생명 가운데서 걸어가게 하려 함입니다.
