translation:
  language: es
  text: 'Y si ustedes dicen[a]: «¿Qué comeremos en el séptimo año? No sembraremos ni recogeremos nuestra producción».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra cosecha» o «nuestro rendimiento» para «nuestra producción».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְכִי / וְכִי תֹאמְרוּ
  english_pob_choice: And if you say
  chosen_spanish: Y si ustedes dicen
  alternatives_spanish:
  - Y si dicen
  - Y si ustedes preguntan
  lexicon: HALOT
  rationale: La construcción introductoria plantea una condición anticipada; en español, «Y si» comunica bien el valor condicional de וְכִי. «Ustedes dicen» conserva el verbo de habla de תֹאמְרוּ sin convertirlo innecesariamente en una paráfrasis interrogativa.
- source_word: מַה נֹּאכַל
  english_pob_choice: What will we eat
  chosen_spanish: ¿Qué comeremos?
  alternatives_spanish:
  - ¿Qué hemos de comer?
  - ¿Qué vamos a comer?
  lexicon: HALOT
  rationale: La pregunta es directa y de sustento futuro. «Comeremos» refleja bien la orientación prospectiva de נֹּאכַל y suena natural en español bíblico contemporáneo.
- source_word: בַּשָּׁנָה הַשְּׁבִיעִת
  english_pob_choice: in the seventh year
  chosen_spanish: en el séptimo año
  alternatives_spanish:
  - durante el séptimo año
  lexicon: HALOT
  rationale: La frase temporal se rinde de forma directa y clara. «En el séptimo año» mantiene el valor cronológico sin añadir matices no presentes en el hebreo.
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: Pues
  alternatives_spanish:
  - Miren
  - He aquí
  - Ciertamente
  lexicon: HALOT
  rationale: El POB inglés revisado tomó הֵן como una partícula que introduce la razón o la constatación del caso, no como una mera exclamación. En español, «Pues» funciona naturalmente como conector explicativo y preserva ese matiz discursivo sin hacerla sonar artificial.
- source_word: לֹא נִזְרָע
  english_pob_choice: we will not sow
  chosen_spanish: no sembramos
  alternatives_spanish:
  - no sembraríamos
  - no hemos de sembrar
  lexicon: HALOT
  rationale: El contexto del año sabático describe una acción que no se realizará; en español, el presente simple en primera persona plural puede expresar esa situación futura o normativa de modo natural. «Sembramos» mantiene la sobriedad del hebreo sin sobretraducir con perífrasis.
- source_word: וְלֹא נֶאֱסֹף
  english_pob_choice: or gather
  chosen_spanish: ni recogeremos
  alternatives_spanish:
  - ni juntaremos
  - ni cosecharemos
  lexicon: HALOT
  rationale: אָסַף apunta a recoger o reunir. En este contexto agrario, «recogeremos» es claro y amplio. Se usa «ni» para reflejar la coordinación negativa natural en español tras «no».
- source_word: תְּבוּאָתֵנוּ
  english_pob_choice: our produce
  chosen_spanish: nuestra producción
  alternatives_spanish:
  - nuestra cosecha
  - nuestro rendimiento
  - nuestro producto
  lexicon: HALOT
  rationale: תְּבוּאָה designa el producto o rendimiento de la tierra. «Producción» transmite la idea de lo que la tierra produce sin restringirla solo a grano; además conserva una amplitud similar a la de «produce» en el inglés POB. «Cosecha» es viable, pero puede sonar más específica.
theological_decisions:
- issue: Partícula הֵן como introducción explicativa vs. exclamativa
  english_pob_reading: Behold, we will not sow or gather our produce.
  chosen_spanish_reading: Pues no sembramos ni recogeremos nuestra producción.
  alternative_spanish_readings:
  - He aquí, no sembramos ni recogeremos nuestra producción.
  - Miren, no sembramos ni recogeremos nuestra producción.
  rationale: El audit trail inglés corrigió un «since» anterior a «Behold» y luego reinterpretó la partícula como una introducción al motivo de la pregunta. En español, «Pues» evita forzar una exclamación extraña y mantiene el valor de constatación/explicación que el hebreo sugiere en este punto.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa que separó la pregunta de la cláusula explicativa y reemplazó una lectura de tipo ''since'' por un valor más cercano de הֵן. Por eso el español también separa ambas unidades: una pregunta directa seguida de una constatación explicativa introducida por «Pues».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como estándar del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se evitó «SEÑOR» y otras formas de ocultamiento porque el hebreo aquí no usa el Tetragrámaton.
  - «Sembramos» y «recogeremos» conservan el paralelismo agrario sin elevar el registro a una formulación litúrgica artificial.
  - «Producción» se eligió por amplitud semántica; la nota conserva alternativas léxicas legítimas en español.
