translation:
  language: es
  text: Porque Yahvé ha puesto el Jordán como límite[a] entre nosotros y ustedes, hijos de Rubén e hijos de Gad. Ustedes no tienen porción en Yahvé. Y así sus hijos podrían hacer que nuestros hijos dejaran de temer a Yahvé.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «frontera».'
    reason: lexical_alternative
lexical_decisions:
- source_word: וּגְבוּל
  english_pob_choice: a boundary
  chosen_spanish: frontera
  alternatives_spanish:
  - límite
  - frontera divisoria
  lexicon: HALOT
  rationale: גְבוּל designa un límite territorial o divisorio. En español, 'frontera' comunica bien la idea de una línea de separación establecida entre grupos, sin volver el texto pesado.
- source_word: נָתַן
  english_pob_choice: has made
  chosen_spanish: ha puesto
  alternatives_spanish:
  - ha hecho
  - ha establecido
  - ha dado
  lexicon: HALOT
  rationale: Con גְבוּל, el verbo no expresa simple entrega sino el establecimiento de una separación. 'Ha puesto' mantiene ese valor causativo/establecedor de forma natural en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahweh
  lexicon: HALOT
  rationale: Siguiendo la norma del proyecto para el Tetragrámaton, se conserva el nombre divino en forma transliterada. 'Yahvé' es la forma establecida en el texto español del proyecto.
- source_word: אֶת הַיַּרְדֵּן
  english_pob_choice: the Jordan
  chosen_spanish: el Jordán
  alternatives_spanish:
  - el río Jordán
  lexicon: HALOT
  rationale: El nombre propio funciona de manera idiomática como 'el Jordán'; añadir 'río' no es necesario para el sentido y alarga innecesariamente la frase.
- source_word: בְּנֵי רְאוּבֵן וּבְנֵי גָד
  english_pob_choice: sons of Reuben and sons of Gad
  chosen_spanish: hijos de Rubén e hijos de Gad
  alternatives_spanish:
  - rubenitas y gaditas
  - hijos de Rubén y de Gad
  lexicon: HALOT
  rationale: El hebreo dice literalmente 'hijos de'. Se conserva esa transparencia para reflejar la forma tribal del original y evitar una reexpresión más interpretativa.
- source_word: אֵין לָכֶם חֵלֶק בַּיהוָה
  english_pob_choice: You have no portion in Yahweh
  chosen_spanish: ustedes no tienen porción en Yahvé
  alternatives_spanish:
  - ustedes no tienen parte en Yahvé
  - ustedes no tienen participación en Yahvé
  lexicon: HALOT
  rationale: חֵלֶק se rinde como 'porción' para conservar el matiz de participación/lotización que el audit trail considera más formal y consistente. 'En Yahvé' mantiene la construcción del original sin convertirla en una paráfrasis teológica.
- source_word: וְהִשְׁבִּיתוּ
  english_pob_choice: might cause ... to stop
  chosen_spanish: podrían hacer que ... dejaran de
  alternatives_spanish:
  - harían cesar a ...
  - podrían hacer cesar a ...
  lexicon: HALOT
  rationale: El hifil de שבת expresa causar cesación. En español, 'hacer que ... dejaran de' reproduce bien la idea de provocar el cese de una acción sin forzar una forma demasiado técnica.
- source_word: לְבִלְתִּי יְרֹא
  english_pob_choice: to stop fearing
  chosen_spanish: dejaran de temer
  alternatives_spanish:
  - dejaran de temer a
  - no siguieran temiendo
  lexicon: HALOT
  rationale: La construcción indica prevención de la acción de temer. 'Dejaran de temer' es una forma clara y natural de expresar esa cesación en español.
- source_word: יְרֹא אֶת יְהוָה
  english_pob_choice: fearing Yahweh
  chosen_spanish: temer a Yahvé
  alternatives_spanish:
  - reverenciar a Yahvé
  - temer a Yahweh
  lexicon: HALOT
  rationale: ירא con objeto divino conserva la fuerza bíblica de 'temer'. Se mantiene la expresión tradicional pero sin suavizarla a 'reverenciar', que perdería parte de la tensión lexical del hebreo.
theological_decisions:
- issue: Renderización del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - el SEÑOR
  - Jehová
  rationale: El texto hebreo usa el Tetragrámaton directamente. Conforme a la política del proyecto, se preserva el nombre divino transliterado en español, en lugar de sustituirlo por un título.
  doctrine_reference: 'DOCTRINE.md Contested terms: יְהוָה YHWH'
- issue: Sentido de חֵלֶק en la frase 'no portion in Yahweh'
  english_pob_reading: You have no portion in Yahweh
  chosen_spanish_reading: ustedes no tienen porción en Yahvé
  alternative_spanish_readings:
  - ustedes no tienen parte en Yahvé
  - ustedes no tienen herencia en Yahvé
  rationale: El audit trail privilegia 'portion' sobre 'share' por consistencia y formalidad. En español, 'porción' preserva el valor concreto-covenantal sin introducir 'herencia', que estrecharía indebidamente el sentido.
  doctrine_reference: Lexical consistency in covenant participation language
- issue: Valor de ירא con objeto divino
  english_pob_reading: fearing Yahweh
  chosen_spanish_reading: temer a Yahvé
  alternative_spanish_readings:
  - reverenciar a Yahvé
  - sentir temor de Yahvé
  rationale: '''Temer a Yahvé'' conserva la fórmula bíblica y la tensión reverencial del hebreo. ''Reverenciar'' sería más explicativo, pero menos fiel a la fuerza lexical del verbo.'
  doctrine_reference: HALOT, ירא with divine object
translation_notes:
  revision_awareness: 'El inglés auditado pasó de ''share'' a ''portion'' para חֵלֶק y mantiene ''fearing the LORD'' como expresión bíblica estable. La versión española sigue esas decisiones: conserva ''porción'' en la cláusula de participación y mantiene la fuerza de ''temer a Yahvé'' sin suavizarla. También refleja el valor causativo de וְהִשְׁבִּיתוּ con una construcción natural en español (''podrían hacer que... dejaran de'').'
  spanish_consistency_notes:
  - Se usa 'Yahvé' de manera consistente para יְהוָה.
  - Se conserva 'hijos de' para reflejar la forma tribal literal del hebreo.
  - '''Porción'' se usa en sentido covenantal, no como medida física.'
  - '''Temer a Yahvé'' mantiene la fórmula bíblica sin reemplazarla por ''reverenciar''.'
