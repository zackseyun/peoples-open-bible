translation:
  language: es
  text: Pero en cuanto a mí[a], en mi integridad me has sostenido, y me has puesto delante de tu rostro[b] para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en mi rectitud», «en mi blamelessness» no; mejor «en mi integridad», o «por causa de mi integridad».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «delante de tu rostro»; es decir, «en tu presencia».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַאֲנִי
  english_pob_choice: But as for me
  chosen_spanish: Pero en cuanto a mí
  alternatives_spanish:
  - Y yo
  - Pero yo
  lexicon: HALOT
  rationale: La construcción es contrastiva frente al contexto previo; «pero en cuanto a mí» transmite mejor el giro adversativo/disyuntivo que un simple «y yo», sin perder naturalidad en español.
- source_word: בְּתֻמִּי
  english_pob_choice: in my integrity
  chosen_spanish: en mi integridad
  alternatives_spanish:
  - por mi integridad
  - en mi blamelessness
  - en mi inocencia
  lexicon: HALOT
  rationale: תֻם expresa integridad, rectitud o blamelessness. «En mi integridad» conserva la preposición ב y mantiene la tensión moral del texto sin convertirla en impecabilidad absoluta ni en mérito salvífico.
- source_word: תָּמַכְתָּ בִּי
  english_pob_choice: you have upheld me
  chosen_spanish: me has sostenido
  alternatives_spanish:
  - me has apoyado
  - me has sustentado
  lexicon: HALOT
  rationale: תמך con ב indica apoyar, sostener o mantener firme. «Me has sostenido» suena natural en español y preserva el sentido de soporte y estabilidad relacional.
- source_word: וַתַּצִּיבֵנִי
  english_pob_choice: and you have set me
  chosen_spanish: me has puesto
  alternatives_spanish:
  - me has establecido
  - me has colocado
  lexicon: HALOT
  rationale: El hiphil de נצב significa poner, establecer o colocar. «Me has puesto» es directo y fiel; «establecido» sería más interpretativo.
- source_word: לְפָנֶיךָ
  english_pob_choice: before your face
  chosen_spanish: delante de tu rostro
  alternatives_spanish:
  - en tu presencia
  - delante de ti
  lexicon: HALOT
  rationale: La expresión es literalmente «ante/delante de tu rostro». Se conserva la concreción hebrea con «delante de tu rostro», aunque también pueda entenderse como «en tu presencia».
- source_word: לְעוֹלָם
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: HALOT
  rationale: עוֹלָם denota duración indefinida y perdurable. «Para siempre» es el equivalente moderno más natural y adecuado en registro salmódico.
theological_decisions:
- issue: Sentido de תֻּם aplicado al hablante
  english_pob_reading: The verse speaks of the psalmist's integrity/uprightness, not absolute sinlessness or meritorious self-righteousness.
  chosen_spanish_reading: El verso habla de la integridad o rectitud del salmista, no de una impecabilidad absoluta ni de una justicia propia meritoria.
  alternative_spanish_readings:
  - El verso afirma inocencia absoluta
  - El verso enseña que el favor divino se gana por perfección moral
  rationale: «Integridad» preserva el valor ético del término sin borrar la tensión teológica del pasaje. Evita resolver el texto hacia una sinlessness absoluta o hacia una doctrina de mérito.
  doctrine_reference: Preservar la tensión teológica del texto; prioridad del hebreo sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios sustanciales; se mantiene el matiz contrastivo de וַאֲנִי, la integridad de תֻּם, y la concreción de לְפָנֶיךָ.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este verso no contiene el tetragrámaton.
  - Se prefiere «integridad» frente a «inocencia» para no borrar la ambigüedad moral documentada.
  - Se conserva un registro bíblico claro y moderno sin depender de formulaciones tradicionales opacas.
