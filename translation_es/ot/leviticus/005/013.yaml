translation:
  language: es
  text: Así, el sacerdote hará expiación por él, por su pecado que cometió en cualquiera de estas cosas[a], y se le perdonará[b]. Y pertenecerá al sacerdote, como la ofrenda vegetal.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en cualquiera de estos casos». La expresión hebrea remite a cualquiera de los asuntos mencionados antes.'
    reason: alternative_reading
  - marker: b
    text: 'O: «y será perdonado». El hebreo está en pasivo y no nombra explícitamente a quien perdona.'
    reason: alternative_reading
lexical_decisions:
- source_word: וְכִפֶּר
  english_pob_choice: shall make atonement
  chosen_spanish: hará expiación
  alternatives_spanish:
  - hará propiciación
  - hará atonamiento
  lexicon: HALOT
  rationale: En contexto sacerdotal levítico, כפר expresa la acción ritual que obtiene expiación por la falta. «Hará expiación» conserva el valor cultual y evita reducir el verbo a una explicación doctrinal estrecha.
- source_word: עָלָיו
  english_pob_choice: for him
  chosen_spanish: por él
  alternatives_spanish:
  - en favor de él
  - por su causa
  lexicon: HALOT
  rationale: La relación con כפר y עַל indica que la expiación se realiza en beneficio del culpable. «Por él» es natural en español y mantiene el matiz de representación/beneficio.
- source_word: הַכֹּהֵן
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - el presbítero
  - el ministro
  lexicon: HALOT
  rationale: כֹּהֵן en Levítico designa al funcionario cultual. En español bíblico contemporáneo, «sacerdote» comunica bien la función ritual sin necesidad de circunloquio.
- source_word: עַל חַטָּאתוֹ
  english_pob_choice: for his sin
  chosen_spanish: por su pecado
  alternatives_spanish:
  - por su culpa
  - por su falta
  lexicon: HALOT
  rationale: Aquí חַטָּאתוֹ se refiere al pecado cometido, no a la ofrenda, porque sigue la cláusula relativa «que cometió». «Pecado» conserva esa referencia concreta y evita confundirlo con «ofrenda por el pecado».
- source_word: אֲשֶׁר חָטָא
  english_pob_choice: that he committed
  chosen_spanish: que cometió
  alternatives_spanish:
  - en que pecó
  - que pecó
  lexicon: HALOT
  rationale: El español requiere un verbo transitivo natural para esta relativa. «Que cometió» comunica el acto culpable sin añadir contenido ajeno al hebreo.
- source_word: מֵאַחַת מֵאֵלֶּה
  english_pob_choice: in any one of these matters
  chosen_spanish: en cualquiera de estas cosas
  alternatives_spanish:
  - en una de estas cosas
  - de entre estas cosas
  lexicon: HALOT
  rationale: La expresión mira hacia los casos previos enumerados. «En cualquiera de estas cosas» refleja el sentido partitivo y referencial del hebreo con claridad moderna.
- source_word: וְנִסְלַח לוֹ
  english_pob_choice: and he shall be forgiven
  chosen_spanish: y le será perdonado
  alternatives_spanish:
  - y será perdonado
  - y se le perdonará
  lexicon: HALOT
  rationale: El nifal de סלח es pasivo y no nombra explícitamente al que perdona. «Le será perdonado» conserva esa pasividad y mantiene abierta la formulación teológica, como en el POB inglés.
- source_word: וְהָיְתָה לַכֹּהֵן
  english_pob_choice: And it shall belong to the priest
  chosen_spanish: Y pertenecerá al sacerdote
  alternatives_spanish:
  - Y será del sacerdote
  - Y quedará para el sacerdote
  lexicon: HALOT
  rationale: El verbo femenino se refiere a la porción de la ofrenda. «Pertenecerá» expresa con precisión el derecho de posesión o asignación cultual del sacerdote.
- source_word: כַּמִּנְחָה
  english_pob_choice: like the grain offering
  chosen_spanish: como la ofrenda vegetal
  alternatives_spanish:
  - como la ofrenda de cereal
  - como la ofrenda de grano
  lexicon: HALOT
  rationale: מִנְחָה en este contexto levítico alude a la ofrenda de cereal/grano. Se eligió «ofrenda vegetal» para conservar una designación tradicional en español bíblico que sigue siendo comprensible, aunque puede sentirse menos explícita que «de grano».
theological_decisions:
- issue: Fórmula de perdón en pasivo sin sujeto explícito
  english_pob_reading: and he shall be forgiven
  chosen_spanish_reading: y le será perdonado
  alternative_spanish_readings:
  - y será perdonado
  - y se le perdonará
  rationale: El hebreo usa una construcción pasiva que enfatiza el resultado del rito sin nombrar al sujeto de la acción perdonadora. «Le será perdonado» conserva esa reserva teológica y no fuerza explícitamente al agente divino en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto hebreo y el acuerdo alto del audit trail en inglés; no se detectaron revisiones textuales que obliguen a cambiar la lectura base. Se mantuvo la pasividad de ונִסְלַח לוֹ y la relación cultual de כפר/חטאת/מִנְחָה sin resolver ambigüedades que el hebreo conserva.
  spanish_consistency_notes:
  - Se usó «Yahvé» como convención general del proyecto no aplicable explícitamente en este versículo.
  - Se preservó «sacerdote» para כֹּהֵן por ser el término técnico más natural en español bíblico.
  - Se eligió «expiación» para כפר, en línea con el campo sacrificial levítico.
  - Se evitó traducir חטאת como «ofrenda por el pecado» porque aquí el contexto inmediato apunta al pecado cometido, no al sacrificio.
