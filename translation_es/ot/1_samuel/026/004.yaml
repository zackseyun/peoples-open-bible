translation:
  language: es
  text: Entonces David envió exploradores, y supo que Saúl efectivamente[a] había venido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y averiguó con certeza que Saúl había venido». El término final en hebreo probablemente añade un matiz de certeza o confirmación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּשְׁלַח
  english_pob_choice: sent out
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - envió fuera
  lexicon: HALOT
  rationale: שׁלח significa “enviar”. En español, “envió” comunica con naturalidad la acción narrativa sin sobrecargarla; “envió fuera” sería más marcado y menos idiomático. El contexto militar/reconocimiento ya queda sugerido por el objeto de la acción.
- source_word: מְרַגְּלִים
  english_pob_choice: scouts
  chosen_spanish: exploradores
  alternatives_spanish:
  - espías
  - reconocedores
  lexicon: HALOT
  rationale: El término viene de la raíz רגל con sentido de reconocer o espiar. “Exploradores” conserva la función de reconocimiento de forma natural en español y evita la carga excesivamente clandestina de “espías”. “Reconocedores” suena técnico o poco natural en una narración.
- source_word: וַיֵּדַע
  english_pob_choice: he learned
  chosen_spanish: supo
  alternatives_spanish:
  - llegó a saber
  - se enteró
  lexicon: HALOT
  rationale: 'Después del envío de los exploradores, ידע expresa el resultado de la investigación: llegó a conocer un hecho. “Supo” es breve y natural en español, y mantiene el valor informativo sin convertirlo en mera percepción interior.'
- source_word: כִּי
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - pues que
  - porque
  lexicon: HALOT
  rationale: 'Aquí introduce el contenido de lo sabido: “que Saúl había venido”. “Que” es el equivalente directo y más claro en español.'
- source_word: בָא
  english_pob_choice: had come
  chosen_spanish: había venido
  alternatives_spanish:
  - vino
  - había llegado
  lexicon: HALOT
  rationale: El perfecto hebreo presenta la llegada como un hecho ya realizado respecto al saber de David. “Había venido” reproduce bien ese valor temporal; “había llegado” es posible, pero “venir” refleja mejor el movimiento expresado por el verbo hebreo.
- source_word: נָכוֹן
  english_pob_choice: indeed
  chosen_spanish: de veras
  alternatives_spanish:
  - ciertamente
  - en efecto
  - con seguridad
  lexicon: HALOT
  rationale: 'La forma final añade un matiz de confirmación o certeza. “De veras” transmite bien ese refuerzo en español sin convertirlo en una explicación excesiva. Mantiene la tensión lexical: no es solo “Saúl vino”, sino que David lo verificó con certeza.'
- source_word: דָּוִד
  english_pob_choice: David
  chosen_spanish: David
  lexicon: Transliteration estándar
  rationale: Nombre propio con transliteración estándar en español bíblico.
- source_word: שָׁאוּל
  english_pob_choice: Saul
  chosen_spanish: Saúl
  lexicon: Transliteration estándar
  rationale: Nombre propio con transliteración estándar en español bíblico.
theological_decisions:
- issue: Matiz de certeza en el final del versículo
  english_pob_reading: he learned that Saul had indeed come
  chosen_spanish_reading: supo que Saúl había venido de veras
  alternative_spanish_readings:
  - supo con certeza que Saúl había venido
  - se enteró de que Saúl había venido con certeza
  rationale: El hebreo final נָכוֹן añade una confirmación/certeza. La redacción española conserva ese matiz sin convertirlo en interpretación excesiva. “De veras” deja visible la fuerza confirmatoria documentada en la nota inglesa.
  doctrine_reference: Ninguna doctrina específica; decisión de matiz semántico.
translation_notes:
  revision_awareness: 'La traducción sigue el acuerdo alto del control cruzado: no requiere cambios respecto al sentido básico del versículo. Se mantiene la nota de certeza asociada al término final hebreo y se adapta a un español natural.'
  spanish_consistency_notes:
  - Se usa “Yahvé” como convención general del proyecto cuando aparezca el Nombre divino; aquí no interviene.
  - “Exploradores” se eligió para conservar la función de reconocimiento sin forzar “espías”.
  - 'La secuencia verbal respeta el orden narrativo: envío, luego conocimiento por verificación.'
  - La nota al pie preserva la alternativa semántica importante del campo léxico de מְרַגְּלִים.
