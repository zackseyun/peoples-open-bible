id: COL.1.24
reference: Colossians 1:24
language:
  code: ko
  name: Korean
  variant: 표준어 / modern formal-polite (합쇼체)
source:
  edition: SBLGNT
  text: Νῦν χαίρω ἐν τοῖς παθήμασιν ὑπὲρ ὑμῶν, καὶ ἀνταναπληρῶ τὰ ὑστερήματα τῶν θλίψεων τοῦ Χριστοῦ ἐν τῇ σαρκί μου ὑπὲρ τοῦ σώματος αὐτοῦ, ὅ ἐστιν ἡ ἐκκλησία,
base_translation:
  language: en
  yaml_path: translation/nt/colossians/001/024.yaml
  text: Now I rejoice in my sufferings for your sake, and in my flesh I am filling up what is lacking in the afflictions of the Messiah for the sake of his body, which is the church,
translation:
  language: ko
  text: 이제 나는 여러분을 위한 나의 고난 가운데서 기뻐하며, 메시아의 환난에 부족한 것[a]을 그분의 몸 곧 교회를 위하여 내 육체에 채워 가고 있습니다.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 또는 「메시아의 환난의 남은 것을 내가 채우다」. 바울이 메시아의 속죄 사역이 부족하다는 뜻이 아니라, 메시아와 그분의 몸인 교회와 결부된 고난에 자신이 동참함을 가리킨다.
    reason: alternative_reading
lexical_decisions:
- source_word: Νῦν
  english_pob_choice: Now
  chosen_korean: 이제
  alternatives_korean:
  - 지금
  - 현재
  lexicon: BDAG
  rationale: 현재 시점·태도를 도입하는 담화 표지.
- source_word: χαίρω
  english_pob_choice: I rejoice
  chosen_korean: 기뻐하며
  alternatives_korean:
  - 즐거워하며
  - 기쁨에 차서
  lexicon: BDAG
  rationale: 현재 능동 직설법. 「기뻐하며」가 자연스럽다.
- source_word: ἐν τοῖς παθήμασιν ὑπὲρ ὑμῶν
  english_pob_choice: in my sufferings for your sake
  chosen_korean: 여러분을 위한 나의 고난 가운데서
  alternatives_korean:
  - 여러분을 위한 고난들 안에서
  - 여러분을 위해 받는 고난 가운데
  lexicon: BDAG
  rationale: 「고난」을 「가운데서」로 처소적·정황적으로 옮기고, ὑπέρ를 「위한」으로 옮긴다.
- source_word: ἀνταναπληρῶ
  english_pob_choice: I am filling up
  chosen_korean: 채워 가고 있습니다
  alternatives_korean:
  - 메우고 있습니다
  - 채우고 있습니다
  lexicon: BDAG
  rationale: 합성 동사 「대신하여 채움」을 「채워 가고 있습니다」로 진행 어감으로 옮긴다.
- source_word: τὰ ὑστερήματα
  english_pob_choice: what is lacking
  chosen_korean: 부족한 것
  alternatives_korean:
  - 결핍된 것
  - 남은 부분
  lexicon: BDAG
  rationale: 「부족한 것」이 한국어 자연성과 의미를 함께 살린다.
- source_word: τῶν θλίψεων
  english_pob_choice: the afflictions
  chosen_korean: 환난에
  alternatives_korean:
  - 고난에
  - 압박에
  lexicon: BDAG
  rationale: θλῖψις를 πάθημα(고난)와 구분하여 「환난」으로 옮긴다.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_korean: 메시아의
  alternatives_korean:
  - 그리스도의
  lexicon: BDAG
  rationale: Χριστός의 칭호성을 보존하여 「메시아」로 옮긴다.
- source_word: ἐν τῇ σαρκί μου
  english_pob_choice: in my flesh
  chosen_korean: 내 육체에
  alternatives_korean:
  - 내 몸에
  - 내 육신에
  lexicon: BDAG
  rationale: σάρξ를 글로사리 기본 「육체」로 옮긴다. 본 문맥은 바울의 실제 신체적 존재를 가리킨다.
- source_word: ὑπὲρ τοῦ σώματος αὐτοῦ
  english_pob_choice: for the sake of his body
  chosen_korean: 그분의 몸을 위하여
  alternatives_korean:
  - 그분의 몸을 대신하여
  lexicon: BDAG
  rationale: ὑπέρ를 「위하여」로 옮긴다.
- source_word: ὅ ἐστιν ἡ ἐκκλησία
  english_pob_choice: which is the church
  chosen_korean: 곧 교회
  alternatives_korean:
  - 곧 그리스도의 회중
  - 즉 교회
  lexicon: BDAG
  rationale: 그리스도의 몸과 동일시되는 ἐκκλησία는 글로사리 carve-out에 따라 「교회」로 옮긴다.
theological_decisions:
- issue: 「메시아의 환난에 부족한 것」의 의미
  chosen_reading: 메시아와 그분의 몸인 교회와 결부된 고난에의 바울의 동참
  alternative_readings:
  - 메시아의 속죄 고난에 결핍이 있다는 뜻
  - 종말적 메시아 환난의 정해진 분량을 가리킴
  rationale: 본문은 강한 표현을 사용하나, 메시아의 속죄 사역의 부족을 함의하지 않는다. πάθημα 대신 θλῖψις 사용과 「그분의 몸인 교회를 위하여」가 교회론적·사역적 동참을 지지한다. 본문의 긴장을 본문에서 보존하고 교리적 안전장치는 각주로 둔다.
  doctrine_reference: 'DOCTRINE.md: Affirmations; Preserve theological tension'
