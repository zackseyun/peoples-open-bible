  rationale: 'Se ajusta el texto principal a la decisión POB sobre la teología del nombre: se mantiene la imagen de que el nombre habite allí, mientras el causativo formal queda en nota. También se corrige la cláusula final para conservar el sentido de hacer votos a Yahvé sin la formulación poco idiomática ''harán a Yahvé''. Se mejora además la claridad de ''Yahvé su Dios'' en español.'
