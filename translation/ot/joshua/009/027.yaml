theological_decisions:
- issue: Rendering the divine name יְהוָה
  chosen_reading: Yahweh
  alternative_readings:
  - Yahweh
  - Jehovah
  rationale: The verse uses the Tetragrammaton יְהוָה directly. Per updated doctrine, the divine name is rendered 'Yahweh' rather than 'the LORD', preserving the covenant name God revealed at Sinai.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahweh'
- issue: Reference of the subject in 'the place that he would choose'
  chosen_reading: he refers implicitly to the LORD
  alternative_readings:
  - an impersonal 'the place that would be chosen'
  rationale: In the Deuteronomic/Joshuan idiom, 'the place that he will choose' regularly refers to the LORD's choosing of the worship site. The English keeps the personal pronoun rather than making the clause passive, preserving the theological emphasis on divine election of the sanctuary location.
