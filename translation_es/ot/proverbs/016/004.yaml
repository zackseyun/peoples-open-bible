translation:
  language: es
  text: Yahvé ha hecho cada cosa para su propio fin[a], aun al malvado para el día de desastre[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para sí mismo»; la frase hebrea también puede entenderse así.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para el día de calamidad» o «para un día de mal». Aquí «mal» se refiere a desastre o ruina, no a mal moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: כֹּל
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo esto
  - todas las cosas
  lexicon: HALOT
  rationale: El hebreo כֹּל expresa alcance total. En español, «todo» comunica la amplitud sin sonar rígido; «todas las cosas» sería más pesado y menos proverbial.
- source_word: פָּעַל
  english_pob_choice: has made
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha hecho
  - ha obrado
  - ha realizado
  lexicon: HALOT
  rationale: El verbo puede significar hacer, obrar o trabajar. Con Yahvé como sujeto y un objeto totalizador, «ha hecho» refleja bien la acción creadora/providencial y mantiene naturalidad en español.
- source_word: יְהוָה
  english_pob_choice: Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Jehová
  - el SEÑOR
  lexicon: HALOT
  rationale: Se conserva el nombre divino con la transliteración «Yahvé», conforme a la norma del proyecto, en lugar de sustituirlo por un título.
- source_word: לַמַּעֲנֵהוּ
  english_pob_choice: for its purpose
  chosen_spanish: para su propósito
  alternatives_spanish:
  - para su fin
  - para su respuesta
  - para sí mismo
  lexicon: HALOT
  rationale: La expresión es difícil y admite un matiz teleológico. «Para su propósito» comunica la finalidad sin obligar el hebreo hacia una lectura exclusivamente reflexiva. Se deja abierta la alternativa documentada de sentido reflexivo en nota.
- source_word: וְגַם
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - e incluso
  - y aun
  lexicon: HALOT
  rationale: La partícula añade énfasis. «Aun» mantiene la extensión enfática de «even» en una construcción natural para el español bíblico moderno.
- source_word: רָשָׁע
  english_pob_choice: the wicked
  chosen_spanish: al malvado
  alternatives_spanish:
  - al impío
  - al perverso
  - al malvado
  lexicon: HALOT
  rationale: El adjetivo sustantivado en singular funciona de modo representativo. «Al malvado» es claro y conserva la referencia a una persona caracterizada por la maldad; «impío» sería posible, pero puede sonar más tradicional y menos directo.
- source_word: לְיוֹם רָעָה
  english_pob_choice: for the day of disaster
  chosen_spanish: para el día de desastre
  alternatives_spanish:
  - para el día de calamidad
  - para el día de mal
  - para un día de desastre
  lexicon: HALOT
  rationale: רָעָה aquí apunta a calamidad, ruina o desastre, no a mal moral. «Día de desastre» transmite esa idea con claridad y evita confusión teológica.
theological_decisions:
- issue: Si el verso afirma que Dios hizo todo, incluso al malvado, sin convertir a Dios en autor de la maldad moral
  english_pob_reading: The LORD has ordered everything toward its fitting purpose, including that the wicked are destined for a day of disaster/judgment.
  chosen_spanish_reading: Yahvé ordena todo hacia un propósito adecuado, e incluso al malvado lo destina para un día de desastre/juicio.
  alternative_spanish_readings:
  - Yahvé hizo todo para sí mismo, incluso al malvado para el día del mal.
  - Yahvé hizo todo para su respuesta, incluso al malvado para el día de desastre.
  rationale: El hebreo sostiene la soberanía y el orden providencial de Yahvé, pero no obliga a afirmar que Dios crea la maldad moral como tal. Traducir רָעָה como «desastre» preserva el contraste con la maldad ética y mantiene la tensión doctrinal sin exagerarla.
  doctrine_reference: Preservar la tensión teológica; prioridad del hebreo original sobre una tradición que suavice el texto.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto hebreo y la auditoría inglesa: mantiene la lectura teleológica principal, conserva la alternativa reflexiva en nota y evita traducir רָעָה como mal moral.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino según la terminología del proyecto.
  - Se traduce כֹּל con «todo» para respetar el alcance total sin sobrecargar la sintaxis.
  - Se mantiene «aun» para la fuerza enfática de וְגַם.
  - Se evita «SEÑOR» como sustituto del nombre divino.
  - «Día de desastre» preserva la referencia a calamidad, no a maldad ética.
