revisions:
- from: Pero si no es redimido por estos medios[a], entonces él saldrá en el año del jubileo, él y sus hijos con él.
  to: Pero si no es redimido por estos medios[a], entonces saldrá en el año del Jubileo, él y sus hijos varones con él.
  rationale: Se ajusta 'hijos' a 'hijos varones' para preservar la decisión documentada sobre בָנָיו como término masculino específico ('sons'). También se alisa la sintaxis española eliminando una repetición innecesaria de 'él' antes del verbo, sin perder el sentido enfático del hebreo. Se capitaliza 'Jubileo' por tratarse del nombre establecido de la institución legal en Levítico.
