revisions:
- from: Durante siete días no se hallará levadura en sus casas[a], porque todo el que coma algo leudado, esa persona será cortada de la congregación de Israel[c][b], sea forastero o natural de la tierra.
  to: Durante siete días no se hallará levadura en sus casas, porque todo el que coma cualquier cosa leudada, esa persona[a] será cortada de la congregación[c] de Israel, sea forastero[b] o natural de la tierra.
  rationale: Se corrige la ubicación y el contenido de la nota [a] para alinearlos con el hebreo y con el audit trail inglés, preservando la ambigüedad teológica de «será cortada». También se mejora la naturalidad y amplitud semántica de מַחְמֶצֶת con «cualquier cosa leudada». El resto del verso puede mantenerse.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:45:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del hebreo: duración temporal, prohibición de presencia de שְׂאֹר en las casas, alcance universal de כָּל אֹכֵל, mantenimiento del modismo pactual וְנִכְרְתָה, y contraste entre גֵּר y אֶזְרַח הָאָרֶץ. Sin embargo, hay dos desajustes con el audit trail inglés y con la precisión semántica: la nota [a] está anclada en «casas» pero en el inglés y en el hebreo la alternativa concierne a «será cortada / that soul shall be cut off»; y «algo leudado» suena menos natural y algo más estrecho que una formulación más idiomática que preserve el sentido de “anything leavened”.'
  spanish_quality_summary: El español es claro y digno, con buen registro legal. No obstante, «esa persona será cortada» resulta algo tieso; «será eliminada de» interpretaría demasiado, pero «será excluida/cortada» también cambia el sentido. Conviene conservar «será cortada» pero con una nota correcta. Además, «cualquier cosa leudada» o «cualquier cosa con levadura» suena más natural que «algo leudado» en español bíblico general.
  glossary_alignment: No aparecen términos del glosario mayor como Yahvé/Mesías. «Congregación» está alineado con la decisión POB para עֵדָה. «Forastero» es aceptable para גֵּר, aunque «residente forastero» queda bien en nota. La preservación del idiomático «será cortada» respeta la decisión teológica documentada de no resolver la sanción.
  issues:
  - severity: high
    issue: La nota [a] está anclada al lugar equivocado y su contenido no corresponde al audit trail inglés.
    rationale: En el inglés POB, la nota [a] comenta «that person shall be cut off / that soul shall be cut off», no «is to be found». En el borrador español, [a] aparece tras «casas» y explica «no se encontrará levadura», creando una desviación documental y una nota mal vinculada al texto.
  - severity: medium
    issue: «Algo leudado» es menos idiomático que otras opciones disponibles para מַחְמֶצֶת.
    rationale: El hebreo abarca cualquier cosa leudada, no solo pan. «Algo leudado» comunica el sentido, pero «cualquier cosa leudada» suena más natural y preserva mejor el alcance genérico de כָּל אֹכֵל מַחְמֶצֶת.
  revised_spanish_text: Durante siete días no se hallará levadura en sus casas, porque todo el que coma cualquier cosa leudada, esa persona[a] será cortada de la congregación[c] de Israel, sea forastero[b] o natural de la tierra.
  revised_footnotes:
  - marker: a
    text: O «esa alma será cortada». El modismo hebreo puede referirse a expulsión, muerte o juicio divino, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «residente forastero» para «forastero».
    reason: lexical_alternative
  - marker: c
    text: O «asamblea» o «comunidad» para «congregación».
    reason: lexical_alternative
  revision_rationale: Se corrige la ubicación y el contenido de la nota [a] para alinearlos con el hebreo y con el audit trail inglés, preservando la ambigüedad teológica de «será cortada». También se mejora la naturalidad y amplitud semántica de מַחְמֶצֶת con «cualquier cosa leudada». El resto del verso puede mantenerse.
