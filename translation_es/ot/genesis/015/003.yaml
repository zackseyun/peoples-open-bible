translation:
  language: es
  text: 'Entonces Abram dijo: «He aquí, no me has dado descendencia,[a] y he aquí que un hijo de mi casa[b] me heredará[c].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Descendencia» traduce el hebreo זרע (zeraʿ), literalmente «semilla», aquí con el sentido de progenie o descendencia.
    reason: lexical_alternative
  - marker: b
    text: «Hijo de mi casa» reproduce literalmente el hebreo בן ביתי, una expresión idiomática para alguien perteneciente al ámbito doméstico de Abram.
    reason: lexical_alternative
  - marker: c
    text: 'O «será mi heredero». El hebreo dice literalmente: «me heredará», es decir, heredará en lugar de Abram o ocupará su lugar como heredero.'
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיֹּאמֶר
  english_pob_choice: Then ... said
  chosen_spanish: Entonces ... dijo
  alternatives_spanish:
  - Y ... dijo
  - Luego ... dijo
  lexicon: WLC/HALOT
  rationale: La forma narrativa con waw consecutiva avanza la acción; «Entonces» conserva la secuencia de manera natural en español.
- source_word: הֵן
  english_pob_choice: Behold
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Mira bien
  lexicon: WLC/HALOT
  rationale: La partícula introduce énfasis y apelación al oyente; «Mira» suena natural en español moderno y mantiene el matiz de atención.
- source_word: לִי
  english_pob_choice: me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: WLC/HALOT
  rationale: 'El dativo se integra de forma natural con el verbo español: «no me has dado».'
- source_word: לֹא נָתַתָּה
  english_pob_choice: you have given ... no
  chosen_spanish: no me has dado
  alternatives_spanish:
  - no me diste
  - no me has concedido
  lexicon: WLC/HALOT
  rationale: El perfecto hebreo expresa una acción completada con vigencia presente; el presente perfecto español reproduce bien la queja actual de Abram.
- source_word: זָרַע
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - semilla
  - prole
  - descendientes
  lexicon: WLC/HALOT
  rationale: Aquí זרע significa progenie, no semilla literal. «Descendencia» conserva el sentido genealógico y el tono sobrio del pasaje.
- source_word: וְהִנֵּה
  english_pob_choice: and behold
  chosen_spanish: y he aquí
  alternatives_spanish:
  - y mira
  - y observa
  lexicon: WLC/HALOT
  rationale: La fórmula deíctica se repite para intensificar la afirmación; «y he aquí» es una correspondencia clara y bíblicamente reconocible en español.
- source_word: בֶן בֵּיתִי
  english_pob_choice: a son of my household
  chosen_spanish: un hijo de mi casa
  alternatives_spanish:
  - un miembro de mi casa
  - uno nacido en mi casa
  lexicon: WLC/HALOT
  rationale: El hebreo dice literalmente «hijo de mi casa», una expresión idiomática de pertenencia al ámbito doméstico; se conserva la imagen sin introducir más especificidad social de la que el texto da.
- source_word: יוֹרֵשׁ אֹתִי
  english_pob_choice: will inherit me
  chosen_spanish: será mi heredero
  alternatives_spanish:
  - me heredará
  - heredará de mí
  - heredará mi casa
  lexicon: WLC/HALOT
  rationale: El participio presenta al heredero en función futura o durativa; en español «será mi heredero» comunica la relación hereditaria con claridad y evita una construcción menos natural como «heredará me».
theological_decisions:
- issue: Identificación del heredero doméstico
  english_pob_reading: The verse does not explicitly call the heir a slave; it says 'son of my household.'
  chosen_spanish_reading: El versículo no identifica explícitamente al heredero como esclavo; dice «un hijo de mi casa».
  alternative_spanish_readings:
  - un esclavo nacido en mi casa
  - un siervo de mi casa
  rationale: Se evita importar una identificación social que el hebreo aquí no formula. La traducción conserva la tensión textual y deja que el contexto mayor determine la identidad del personaje.
  doctrine_reference: 'Principio POB: primacía del texto original y restricción frente a inferencias no explícitas.'
- issue: Valor de זרע en la queja de Abram
  english_pob_reading: Abram laments that God has given him no offspring.
  chosen_spanish_reading: Abram lamenta que Dios no le ha dado descendencia.
  alternative_spanish_readings:
  - semilla
  - hijos
  rationale: La queja apunta a la falta de progenie y herencia del pacto, no a una referencia botánica literal. «Descendencia» preserva el alcance familiar y teológico.
  doctrine_reference: Semántica léxica del hebreo bíblico en contexto narrativo-covenantal.
translation_notes:
  revision_awareness: La redacción sigue de cerca el cierre revisado del POB en inglés, que prefirió una formulación más directa de la deíxis («Behold») y del verbo de herencia («will inherit me»). En español se mantuvo ese énfasis con «Mira» / «y he aquí» y se optó por «será mi heredero» para una lectura natural sin perder el valor prospectivo del participio hebreo.
  spanish_consistency_notes:
  - Se mantiene «descendencia» para זרע conforme al uso POB de «offspring», evitando «semilla» en el texto principal.
  - Se conserva «Yahvé» para el nombre divino cuando corresponda en el proyecto, pero en este versículo Dios no aparece explícitamente en hebreo; la referencia implícita se expresa por el contexto.
  - Se evita «siervo» o «esclavo» en el texto principal porque el hebreo solo dice «hijo de mi casa».
