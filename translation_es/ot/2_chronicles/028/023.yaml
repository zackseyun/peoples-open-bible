translation:
  language: es
  text: 'Y sacrificó a los dioses de Damasco[a], que lo habían herido, y dijo: «Porque los dioses de los reyes de Aram les ayudan[b], yo les sacrificaré, para que me ayuden». Pero ellos resultaron ser su ruina y la ruina de todo Israel[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que lo estaban derrotando». El participio hebreo puede expresar acción continua o característica.
    reason: lexical_alternative
  - marker: b
    text: 'Hebreo: «los dioses de los reyes de Aram», preservando el plural «reyes».'
    reason: lexical_alternative
  - marker: c
    text: O «y fueron para él y para todo Israel motivo de tropiezo». El hebreo literalmente dice «fueron para él para hacerlo tropezar, y para todo Israel».
    reason: lexical_alternative
lexical_decisions:
- source_word: וַיִּזְבַּח
  english_pob_choice: he sacrificed
  chosen_spanish: sacrificó
  alternatives_spanish:
  - ofreció sacrificios
  lexicon: HALOT
  rationale: זבח se refiere a realizar un sacrificio; en español, «sacrificó» reproduce de forma natural la acción cultual sin añadir explicación innecesaria.
- source_word: לֵאלֹהֵי דַרְמֶשֶׂק
  english_pob_choice: to the gods of Damascus
  chosen_spanish: a los dioses de Damasco
  alternatives_spanish:
  - a los dioses de Dammesec
  - al dios o dioses de Damasco
  lexicon: HALOT
  rationale: El hebreo usa un constructo plural y, en este contexto idólatra, «dioses» conserva el sentido. «Damasco» es la forma usual y clara en español.
- source_word: הַמַּכִּים בּוֹ
  english_pob_choice: that had struck him
  chosen_spanish: que lo habían herido
  alternatives_spanish:
  - que lo estaban hirviendo
  - que lo estaban derrotando
  - que lo habían golpeado
  lexicon: HALOT
  rationale: El participio con artículo describe a los dioses como asociados con la derrota de Ahaz. «Habían herido» mantiene el valor resultativo/narrativo y suena natural en español.
- source_word: אֱלֹהֵי מַלְכֵי אֲרָם
  english_pob_choice: the gods of the kings of Aram
  chosen_spanish: los dioses de los reyes de Aram
  alternatives_spanish:
  - los dioses de los reyes arameos
  - los dioses de Aram
  lexicon: HALOT
  rationale: Se preserva el plural «reyes», como en el hebreo y en el POB inglés, porque esa forma forma parte del argumento de Ahaz.
- source_word: מַעְזְרִים אוֹתָם
  english_pob_choice: help them
  chosen_spanish: los ayudan
  alternatives_spanish:
  - les ayudan
  - están ayudándolos
  lexicon: HALOT
  rationale: El participio expresa ayuda habitual o característica. En español, el presente simple «los ayudan» comunica esa idea de manera idiomática.
- source_word: לָהֶם אֲזַבֵּחַ
  english_pob_choice: I will sacrifice to them
  chosen_spanish: yo les sacrificaré
  alternatives_spanish:
  - sacrificaré a ellos
  - les ofreceré sacrificios
  lexicon: HALOT
  rationale: El imperfecto expresa intención futura. «Les sacrificaré» conserva el objeto indirecto explícito y mantiene la fuerza del verbo de culto.
- source_word: וְיַעְזְרוּנִי
  english_pob_choice: that they may help me
  chosen_spanish: para que me ayuden
  alternatives_spanish:
  - y me ayuden
  - a fin de que me ayuden
  lexicon: HALOT
  rationale: La relación es de propósito/resultado según el razonamiento de Ahaz; «para que» reproduce bien esa intención volitiva en español.
- source_word: וְהֵם הָיוּ לוֹ לְהַכְשִׁילוֹ
  english_pob_choice: But they became his downfall
  chosen_spanish: Pero ellos resultaron ser su ruina
  alternatives_spanish:
  - Pero ellos fueron para él motivo de tropiezo
  - Pero ellos se volvieron su caída
  - Pero ellos llegaron a ser su tropiezo
  lexicon: HALOT
  rationale: הכשיל comunica causar caer/tropezar y, por extensión, ruina. «Resultaron ser su ruina» preserva el desenlace negativo sin endurecerlo en una sola metáfora.
- source_word: וּלְכָל יִשְׂרָאֵל
  english_pob_choice: and the downfall of all Israel
  chosen_spanish: y la ruina de todo Israel
  alternatives_spanish:
  - y el tropiezo de todo Israel
  - y la caída de todo Israel
  lexicon: HALOT
  rationale: Se mantiene la coordinación del hebreo y el alcance colectivo. «Ruina» funciona bien como equivalente de la caída/desastre causado por este acto.
theological_decisions:
- issue: Perspectiva sobre los dioses de Damasco y la afirmación de Ahaz
  english_pob_reading: The text reflects Ahaz's own pagan interpretation that Damascus's gods were responsible for his defeat, not the narrator's endorsement of those gods as real divine agents.
  chosen_spanish_reading: El versículo presenta el razonamiento pagano de Ahaz, no una validación narrativa de esos dioses como agentes divinos reales.
  alternative_spanish_readings:
  - El texto podría dejar la afirmación sin aclaración de perspectiva, confiando en que el lector infiera la ironía.
  - El verso podría leerse como si el narrador afirmara la eficacia real de esos dioses.
  rationale: La traducción conserva la formulación de la declaración de Ahaz, pero la clausura final deja claro que el resultado fue ruina. Así se mantiene la tensión irónica del pasaje sin sobreexplicarlo.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del POB inglés que prefirió una formulación más formal en el complemento final y mantuvo el plural 'kings' en la afirmación de Ahaz. La versión española conserva ese plural, opta por un cierre natural («su ruina y la ruina de todo Israel») y mantiene el valor volitivo de la frase final.
  spanish_consistency_notes:
  - Se usó «Dioses» en minúscula porque aquí no se trata del nombre divino de Yahvé sino de ídolos.
  - Se preservó el plural «reyes» por fidelidad al hebreo y al POB inglés.
  - Se eligió «ruina» para cubrir tanto la idea de tropiezo como la de desastre final, sin perder la fuerza del hebreo.
