  spanish_quality_summary: 'El texto es mayormente comprensible, pero tiene cierta rigidez: «Belsasar[a] el rey» y sobre todo «a mí, Daniel» / «la que se me había aparecido» resultan poco naturales en español bíblico moderno. Una leve revisión mejora claridad y dignidad sin alejarse del hebreo.'
  glossary_alignment: 'No hay términos del glosario teológico principal en juego. «Belsasar» es una forma española aceptable. La mejoría principal es estilístico-lexical: usar «yo, Daniel» para אֲנִי דָנִיֵּאל y explicitar «la visión» en la segunda mención, en línea con la nota inglesa que preserva esa alternativa más explícita.'
