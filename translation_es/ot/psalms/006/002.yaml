translation:
  language: es
  text: Oh, Yahvé[a], no me reprendas en tu ira[b], ni me disciplines[c] en tu furor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Hebreo: «Yahvé». Se conserva el nombre divino יְהוָה como nombre propio, no como una máscara reverencial.'
    reason: source_note
  - marker: b
    text: O «me reproches». El verbo hebreo puede expresar reprensión o reproche formal.
    reason: lexical_alternative
  - marker: c
    text: O «me castigues» o «me corrijas». El verbo hebreo puede referirse a disciplina correctiva o castigo disciplinario.
    reason: lexical_alternative
lexical_decisions:
- source_word: יְהוָה
  english_pob_choice: O Yahweh
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Yahvé
  - Yahveh
  - Jehová
  lexicon: HALOT
  rationale: El hebreo usa el nombre divino directo; en español se mantiene como «Yahvé» conforme al criterio del proyecto. No se sustituye por una forma de máscara como «SEÑOR», para conservar el nombre del pacto y la dirección orante del verso.
- source_word: אַל
  english_pob_choice: do not
  chosen_spanish: 'no'
  alternatives_spanish:
  - que no
  - no vayas a
  lexicon: HALOT
  rationale: La partícula negativa en una súplica/prohibición se expresa de manera natural y directa con «no», preservando el tono de petición del hebreo.
- source_word: בְּאַפְּךָ
  english_pob_choice: in your anger
  chosen_spanish: en tu ira
  alternatives_spanish:
  - en tu enojo
  - con tu ira
  - mientras estás airado
  lexicon: HALOT
  rationale: אַף designa idiomáticamente la ira; con בְּ, «en tu ira» conserva el paralelismo poético y la relación de esfera/estado sin volverlo excesivamente literal.
- source_word: תוֹכִיחֵנִי
  english_pob_choice: rebuke me
  chosen_spanish: me reprendas
  alternatives_spanish:
  - me reproches
  - me corrijas
  - me convenzas
  lexicon: HALOT
  rationale: El הִפְעִיל de יכח aquí puede expresar reprensión o reproche. «Reprendas» es fiel, idiomático en español y mantiene el peso exhortativo del verbo sin suavizarlo demasiado.
- source_word: בַּחֲמָתְךָ
  english_pob_choice: in your wrath
  chosen_spanish: en tu furor
  alternatives_spanish:
  - en tu ira
  - con tu furor
  - en tu enojo
  lexicon: HALOT
  rationale: חֵמָה tiene el matiz de ardor, furia o furor. Se elige «furor» para diferenciarlo de «ira» en el primer hemistiquio y preservar la distinción poética de los dos términos hebreos.
- source_word: תְיַסְּרֵנִי
  english_pob_choice: discipline me
  chosen_spanish: me disciplines
  alternatives_spanish:
  - me castigues
  - me corrijas
  - me castigues con disciplina
  lexicon: HALOT
  rationale: El piel de יסר comunica disciplina correctiva, no solo castigo. «Me disciplines» conserva ese valor semántico y el paralelismo con la primera petición.
theological_decisions:
- issue: Uso del nombre divino יְהוָה
  english_pob_reading: Yahweh
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Jehová
  - SEÑOR
  rationale: Se sigue la lectura del nombre del pacto como nombre propio en vez de una sustitución reverencial. «Yahvé» mantiene la identidad del Tetragrámaton y la coherencia terminológica del proyecto.
  doctrine_reference: 'DOCTRINE.md: Contested terms — יְהוָה YHWH → Yahvé'
- issue: Distinción poética entre אַף y חֵמָה
  english_pob_reading: anger / wrath
  chosen_spanish_reading: ira / furor
  alternative_spanish_readings:
  - enojo / furor
  - ira / ira
  - furia / furor
  rationale: El salmo usa dos términos relacionados pero no idénticos. En español se conserva la diferenciación para no aplanar el paralelismo hebreo ni perder la intensificación emocional del segundo cola.
  doctrine_reference: DOCTRINE.md Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'El texto inglés auditado fue revisado sin cambios en la última pasada, con acuerdo alto del revisor. La versión española sigue esa lectura estable: mantiene el nombre divino directo, distingue los dos términos de ira y conserva el paralelismo de las dos prohibiciones.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para יְהוָה conforme al estándar del proyecto.
  - Se mantiene la distinción «ira / furor» para אַף / חֵמָה.
  - «Reprendas» y «disciplines» reflejan la fuerza verbal sin rebajar el registro poético.
  - La puntuación reproduce el paralelismo hebreo con dos miembros coordinados.
