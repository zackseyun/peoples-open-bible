translation:
  language: es
  text: A falta de leña[a], el fuego se apaga, y donde no hay murmurador[b], la contienda se aquieta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «madera»; el hebreo habla de un material para alimentar el fuego. «Leña» explicita ese valor contextual en español.
    reason: lexical_alternative
  - marker: b
    text: O «chismoso». El término hebreo se refiere a una persona que difunde palabras dañinas, a menudo en secreto o murmurando.
    reason: lexical_alternative
lexical_decisions:
- source_word: בְּאֶפֶס
  english_pob_choice: for lack of
  chosen_spanish: a falta de
  alternatives_spanish:
  - en ausencia de
  - sin
  lexicon: HALOT
  rationale: La construcción con ב más אֶפֶס expresa ausencia o carencia. «A falta de» reproduce bien la causa proverbial en un español natural y sobrio.
- source_word: עֵצִים
  english_pob_choice: wood
  chosen_spanish: leña
  alternatives_spanish:
  - madera
  - maderos
  lexicon: HALOT
  rationale: Aunque el inglés usa «wood», en este contexto proverbial el referente es combustible para el fuego. «Leña» comunica mejor esa función en español sin exagerar la interpretación.
- source_word: תִּכְבֶּה
  english_pob_choice: goes out
  chosen_spanish: se apaga
  alternatives_spanish:
  - se extingue
  - se consume
  lexicon: HALOT
  rationale: 'El verbo hebreo es intransitivo: el fuego deja de arder. «Se apaga» es la equivalencia idiomática más natural en español.'
- source_word: אֵשׁ
  english_pob_choice: the fire
  chosen_spanish: el fuego
  alternatives_spanish:
  - fuego
  lexicon: HALOT
  rationale: Se conserva el sustantivo de manera directa; en español el artículo definido puede omitirse o mantenerse. Aquí «el fuego» fluye bien con el verbo pronominal.
- source_word: וּבְאֵין
  english_pob_choice: and where there is no
  chosen_spanish: y donde no hay
  alternatives_spanish:
  - y sin
  - y en ausencia de
  lexicon: HALOT
  rationale: La segunda cola se entiende mejor como condición general o locativa. «Y donde no hay» reproduce esa relación de modo natural.
- source_word: נִרְגָּן
  english_pob_choice: whisperer
  chosen_spanish: chismoso
  alternatives_spanish:
  - murmurador
  - difamador
  - delator
  lexicon: HALOT
  rationale: El término hebreo describe a quien habla dañinamente, a menudo en secreto o murmurando. «Chismoso» es la opción más comunicativa en español; mantiene la advertencia moral sin sonar demasiado técnica. El sentido de «whisperer» se preserva en la nota alternativa.
- source_word: יִשְׁתֹּק
  english_pob_choice: grows quiet
  chosen_spanish: se aquieta
  alternatives_spanish:
  - se queda en silencio
  - se calma
  - calla
  lexicon: HALOT
  rationale: Aplicado a la contienda, el verbo expresa que el conflicto se serena o cesa de agitarse. «Se aquieta» conserva la imagen de algo que se vuelve quieto.
- source_word: מָדוֹן
  english_pob_choice: strife
  chosen_spanish: la contienda
  alternatives_spanish:
  - la riña
  - la discordia
  - la pelea
  lexicon: HALOT
  rationale: «Contienda» recoge bien el valor de conflicto o disputa en estilo proverbial y evita reducir el sentido a una simple pelea física.
translation_notes:
  revision_awareness: El texto sigue el estado del expediente con alta concordancia y sin revisiones aplicadas. Se preserva la estructura proverbial de dos colonias paralelas y la tensión léxica de נִרְגָּן mediante una opción comunicativa y una nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo un estilo bíblico moderno y digno, sin recurrir a SEÑOR ni a fórmulas eclesiásticas innecesarias.
  - «A falta de» y «donde no hay» reflejan con naturalidad las dos construcciones de ausencia del hebreo.
  - Se eligió «leña» por claridad contextual, aunque la nota conserva la posibilidad más literal de «madera».
  - «Chismoso» comunica el perfil pragmático del término hebreo sin perder la idea de habla perjudicial; la nota mantiene la alternativa más cercana a la imagen de «whisperer».
