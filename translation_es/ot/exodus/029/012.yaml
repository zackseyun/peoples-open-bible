translation:
  language: es
  text: Y tomarás algo de la sangre del novillo y la pondrás sobre los cuernos del altar con tu dedo[a][b], y derramarás toda la sangre en la base[c] del altar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la sangre del novillo». La expresión hebrea dice literalmente «de la sangre del novillo», indicando que se toma una porción para aplicarla al altar.
    reason: lexical_alternative
  - marker: b
    text: Los «cuernos» eran las proyecciones en forma de cuerno en las esquinas del altar.
    reason: cultural_note
  - marker: c
    text: O «a la base del altar».
    reason: lexical_alternative
lexical_decisions:
- source_word: וְלָקַחְתָּ
  english_pob_choice: And you shall take
  chosen_spanish: Y tomarás
  alternatives_spanish:
  - Y habrás de tomar
  - Y tomarás entonces
  lexicon: HALOT
  rationale: La forma verbal en contexto ritual expresa una instrucción secuencial. «Tomarás» conserva el valor directivo sin volverlo innecesariamente pesado en español.
- source_word: מִדַּם הַפָּר
  english_pob_choice: some of the blood of the bull
  chosen_spanish: algo de la sangre del novillo
  alternatives_spanish:
  - parte de la sangre del novillo
  - de la sangre del novillo
  lexicon: HALOT
  rationale: El hebreo usa מִן con sentido partitivo. «Algo de» comunica que se toma una porción, y «novillo» refleja bien el animal sacrificial en español bíblico claro.
- source_word: וְנָתַתָּה
  english_pob_choice: and put
  chosen_spanish: la pondrás
  alternatives_spanish:
  - la colocarás
  - la aplicarás
  lexicon: HALOT
  rationale: «Poner» es el equivalente natural de נתן en este acto ritual. Se evita «aplicar» por ser más técnico de lo que exige el hebreo.
- source_word: עַל קַרְנֹת הַמִּזְבֵּחַ
  english_pob_choice: on the horns of the altar
  chosen_spanish: sobre los cuernos del altar
  alternatives_spanish:
  - sobre las puntas del altar
  - sobre las esquinas del altar
  lexicon: HALOT
  rationale: Se conserva la imagen concreta de los «cuernos» del altar, que son sus proyecciones rituales. No se suaviza a «esquinas» porque el término es más literal y cultual.
- source_word: בְּאֶצְבָּעֶךָ
  english_pob_choice: with your finger
  chosen_spanish: con tu dedo
  alternatives_spanish:
  - por medio de tu dedo
  - usando tu dedo
  lexicon: HALOT
  rationale: La preposición bet es instrumental. «Con tu dedo» es natural en español y mantiene el medio específico indicado por el hebreo.
- source_word: וְאֶת כָּל הַדָּם תִּשְׁפֹּךְ
  english_pob_choice: and you shall pour out all the blood
  chosen_spanish: y derramarás toda la sangre
  alternatives_spanish:
  - y vaciarás toda la sangre
  - y echarás toda la sangre
  lexicon: HALOT
  rationale: «Derramar» comunica היטב שׁפך en contexto sacrificial y evita la idea accidental de «verter» demasiado general o «derramar» menos ritual si se usara en otro contexto.
- source_word: אֶל יְסוֹד הַמִּזְבֵּחַ
  english_pob_choice: at the base of the altar
  chosen_spanish: al pie del altar
  alternatives_spanish:
  - en la base del altar
  - junto a la base del altar
  lexicon: HALOT
  rationale: יְסוֹד significa «base»/«fundamento». En español bíblico, «al pie» transmite bien el lugar de la acción y conserva la naturalidad del rito; se mantiene el matiz local sin borrar el sentido de base.
theological_decisions:
- issue: Conservación de la imaginería cultual del altar
  english_pob_reading: Retain the concrete cultic terms 'horns' and 'base' rather than smoothing them into generalized sacrificial language.
  chosen_spanish_reading: Conservar «cuernos» y «al pie/base» del altar, sin generalizarlos a un lenguaje más abstracto.
  alternative_spanish_readings:
  - sobre las esquinas del altar
  - al fondo del altar
  rationale: El versículo describe una acción ritual precisa. Mantener la terminología concreta respeta la textura cultual del texto y evita perder el detalle ritual del gesto.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El borrador inglés revisado cambió «the bull's blood» por «the blood of the bull» para acercarse más al hebreo constructo; esta decisión se reflejó en español con «la sangre del novillo», manteniendo también el sentido partitivo de מִן mediante «algo de».
  spanish_consistency_notes:
  - Se mantuvo el registro reverente y directo, con segunda persona singular dirigida a Moisés/sacerdote.
  - Se preservó la distinción cultual concreta del altar sin reemplazarla por términos eclesiales posteriores.
  - 'La secuencia verbal en español sigue el orden ritual del hebreo: tomar, poner, derramar.'
