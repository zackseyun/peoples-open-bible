base_translation:
  language: en
  yaml_path: translation/ot/isaiah/030/006.yaml
  text: 'An oracle concerning the beasts of the Negev: through a land of distress and hardship[a], of lioness and lion, of viper and flying fiery serpent, they carry their wealth on the shoulders of donkeys and their treasures on the humps of camels[c][b], to a people who cannot profit them.'
  footnotes:
  - marker: a
    text: Or 'A burden concerning the beasts of the South.' The Hebrew heading uses a prophetic term often rendered 'oracle' or 'burden,' and 'Negev' can also be understood more generally as 'the South.'
    reason: lexical_alternative
  - marker: b
    text: Or 'lion and lion.' The two Hebrew lion terms are distinct, but their precise difference in this context is uncertain.
    reason: lexical_alternative
  - marker: c
    text: Or 'to a people that will not help.' The Hebrew verb can mean 'profit' or 'be of help.'
    reason: lexical_alternative
